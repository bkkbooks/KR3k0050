body:
  text: 圖書編卷一百二十七明章潢撰學詩多識天類天瞻仰昊天生謂天葢髙辜有虞殷自天扤天難忱斯天之我我何于天天之我昊天不平之方懠天之方難天方薦瘥天之方蹶天天之方虐天天亂匪降自有命自天命不徹於昭于天畏天之威駿極于天對越在天致天之届昭囘于天受禄于天自天申之蒼天蒼天蒼天曷悠悠蒼天此何人哉悠悠蒼天其有所彼蒼者天昊天浩浩昊天藐悠悠昊天曰父母且昊昊天孔昭天不忒藐昊天無不克鞏天有成命昊昊天曰明彼昊天曰旦倬昊天旻天旻天疾威上天明明上天曰赫赫在上無髙髙在上皇天燕及皇天尙肆皇天弗溥天溥天之下穹蒼以念穹蒼天命惟天之命於穆不已又天命匪常鳥天命匪懈天命不天命𤣥降而生商天載上天之載無聲無臭天徳浩浩昊天不駿其徳天生天生烝民有物冇則天生烝民其命匪諶天保天保定爾亦孔之固天監天監在下有命既集監天監有周昭假于下陟降厥事日在兹天命降監下民有嚴天牖天之牖民牖民孔易天降自天降康豐年穰穰天降罪罟天之降罔天降喪亂天被天被爾禄天作天作髙山天子昊天其子之天妹大邦有子俔天之妺天合文王初載天作之合天配天立厥配受命既固天錫天錫公純嘏天位天位殷適使不挾四方天休荷天之休天龍何天之龍天禄受天百禄受禄于天天祜受天之祜天威昊天疾威天怒逢天僤怒天夭天夭是椓天步天步艱難敬天敬之敬之天惟顯思敬天之怒無敢戲豫敬天之渝無敢馳驅畏天不愧于人不畏于天胡不相畏不畏于天配天思文后稷克配彼天仰天瞻仰昊天曷惠其寧昊投彼有昊帝帝作邦作對帝帝立子生商在左右上帝皇矣上帝上蕩蕩上帝帝板板昭事上帝上上帝是祗上帝是依帝不臨后帝皇皇后帝古帝古帝命武湯帝命帝命率育圍帝命不違時帝命式于九帝命不帝遷帝遷明徳帝省帝省其山帝度帝度其心貊其徳音帝謂帝謂文王帝懐予懐明徳帝祉既受帝祉帝則順帝之則帝臨上帝臨汝帝歆上帝居歆配帝殷之未喪師克配上帝日月日居月諸微日月方奥彼月而此日而微如月之恒如日之升不日不月日就月將斯日月其除告我日斯邁而月征日月凶不用其行日杲杲出日日東方之日兮之方中日日之夕矣出有曜照臨照臨下土春日春日載陽揆日揆之以日旭日旭日始旦永日且以永日皦日有如皦日終日終日射侯日食日有食之亦孔之醜日出日升日中日夕月月出皎兮離東方之月兮月于畢月食彼月而食則惟其常月出月出之光月恒如月之恒星嘒彼小星三五在東駕有嘒其星星言夙小星見上明星明星有爛明星煌煌明星晳晳三星三星在天三星在􅀢定星定之方中大火心星七月流火啟明東有啟明長庚西有長庚南箕惟南有箕載翕其舌哆兮侈兮成是南箕北斗惟北有斗斗柄西柄之揭織女跂彼織女終日七襄七襄終日七襄雖則七襄報章不成報章牽牛晥彼牽牛不以服箱畢星有捄天畢載施之行月離于畢俾滂沱矣參星昴星彗彼小星惟參與昴雲漢倬彼雲漢為章于天倬彼雲漢昭回于天雲英英白雲祁祁如雲如有渰淒淒如其從雲有女雲同雲上天同雲漢維天有漢監亦有光風雨風雨淒淒瀟風雨如晦攸風雨所漂搖雨風雨瀟風雨除維風及風大風有隧匪風發兮風其吹爾淒其以風觱發一之日觱發谷風習習谷風凱風凱風自南飄風飄風自南飄飄風發發風弗弗清風穆如清風終風終風且暴終風且曀北風北風其涼風霾終風且霾風頺維風及頺遡風如彼遡風亦孔之僾雨興雨祁祁從零雨其濛其如雨霢霖益之以霢霖既優既渥既霑既足靈雨靈雨既零甘雨以祁甘雨隂雨隂雨膏之以隂以雨又窘隂雨雨迨天之未隂望雨其雨其雨及雨我公田遂我私雪雨雪其雱雨雪紛紛載雨雪霏霏瀌雨雪途雨雪瀌霰如彼雨雪先集維霰雷殷其靁在南山之陽虺虺其靁雷霆如雷如霆徐方震驚電􅏎􅏎震電不寧不令震電霜白露為霜可以履霜履霜繁霜正月繁霜露零露湑兮行零露瀼瀼為厭浥行露謂多露胡乎中露零零露泥泥露漙兮湛露湛湛露斯白露白露未晞白露未已氷二之日鑿氷沖沖三之日納于凌隂寒氷誕寘之寒氷氷泮迨氷未泮履氷戰戰兢兢如履薄氷虹蝃蝀在東朝隮于西莫之敢指崇朝其雨春春日遲遲有女懐春夏夏之日衡夏而楅秋秋日淒淒以秋而載嘗秋為期冬冬日烈烈冬之夜亦以御冬春秋春秋匪懈冬夏無冬無夏正月三之日納于凌隂二月二月初吉之四之日舉趾四日其蚤三月維暮之春亦又何求如何新畬春日載陽春日遲遲月有鳴倉庚蠶條桑四月四月維夏四月秀葽五月五月鳴蜩動五月斯螽股六月六月徂暑莎雞振羽六月凄凄及六月六月食鬱薁七月七月流火七月鳴鵙及七月食𤓰在七月烹葵菽七月野八月八月其穫載八月萑葦八月績八月剥棗月八月斷壺八在宇九月九月肅霜月築埸圃九月授衣九月叔苴九九月在户樗采荼薪十月十月隕籜滌十月穫稻蟋十月納禾稼十月場十月蟀入我牀下婦曰歸曰歸嵗亦陽止處嗟我子曰為改嵗入此室十一月一之日觱發一之日于貉十二月二之日栗烈鑿二之日其同二之日氷沖沖夙夜夙興夜寐夙夜在公夙夜匪懈肯夙夜敬止夜庶幾夙夜莫夙夜夙必偕晨夜夜如何其夜向晨不能晨夜晝夜俾晝作夜朝夕朝夕從事莫肯朝夕温恭朝夕朝夕不暇朝靡有朝矣㑹朝清明不以永今朝遑朝矣終朝終朝采緑崇朝崇朝其雨曾不崇朝夕今夕何夕齊子發夕夕樂酒今旦士曰昧旦旦誰與獨旦榖于差昧旦始旦夜子興視夜夜夜如何其夜未央如何其夜向晨昏昏以為期宵肅肅宵征時于時保之繹維其時矣時時靡有爭熙時周之命於思遵養晦時純矣辰我辰安在我生不辰一日一日不見五日五日為期六日不詹何日忘之一月一月三捷三月如三月兮曷月予還歸哉吉日吉日維戊其吉日庚午迨吉兮月朔十月之交朔日辛夘康年明昭上帝迄用康年豐年豐年穰穰黍屢豐年豐年多多稌有年自古有年萬年君子萬年於萬斯年嵗自今以始嵗其有女萬有千嵗三嵗貫有嵗千嵗改嵗曰惟改嵗嵗暮嵗聿云莫嵗亦莫止卒嵗何以卒嵗百嵗百嵗之後嗣嵗以興嗣嵗嵗旱如彼嵗旱庚午吉日庚午戊日吉日維戊辛夘朔日辛夘隂曀曀其隂陽匪陽不晞亦日月陽止嵗陽止旱旱既大甚藴隆蟲蟲旱魃旱魃為虐如惔如焚炎火秉畀炎火如火烈烈暵乾暵其乾矣寒暑載離寒暑暑我心憚暑熱誰能執熱逝不以濯隂陽相其隂陽古今自古有年匪今斯今今適南畝振古如兹古自古在昔百世本支百世地類地謂地葢厚載寢之地土率土之濱率土下土下土之式下奄有下土禹敷土方是耗斁下土下下土冒照臨土殷土宅殷土芒芒南土莫如南土南土是保樂土樂土樂土爰得我所韓土孔樂韓土徐土省此徐土土宇爾土宇版章土疆徹申伯土疆河嶽及河喬嶽墮山喬嶽翕河允猶翕河山川錫之山川滌山川悠逺滌山川山河景員惟河嶽維嶽降神嵩崧髙維嶽山莫髙匪山如山之苞泰山泰山巖巖髙山髙山仰止陟彼髙山景山陟彼景山南山節彼南山崔幽幽南山朝南山有桑南山崔南山隮南山烈烈律南山律北山陟彼北山北山有楊東山我徂東山山阜如山如阜大阜升彼大阜中陵率彼中陵岡陵如岡如陵陟我髙岡為岡為陵無矢我陵岡陟彼岡兮既景迺岡髙岡陟彼髙岡南岡乃陟南岡岵陟彼岵兮屺陟彼屺兮巘陟則在巘京乃覯于京景山與京崔巍惟山崔巍陟彼崔巍旱麓瞻彼旱麓丘隅止于丘隅旄丘旄丘之葛兮阿丘陟彼阿丘止于阿丘宛丘宛丘之上宛丘之道阿考槃在阿或􅑙于阿卷阿有卷者阿陸考槃在陸鴻飛遵陸山冢山冡崒崩首陽首陽之東巔首陽之巔徂來徂來之松新甫新甫之柏龜山蒙山奄有龜蒙鳬山繹山保有鳬繹梁山奕奕梁山終南山終南何有紀堂有紀有堂峱遭我乎峱之間兮垤鸛鳴于垤砠陟彼砠矣石維石巖巖漸漸之石維其髙矣白石白石鑿鑿白石粼粼扁石有扁斯石履之卑兮水沔彼流水在揚之水不流束薪水一方洪水洪水芒芒海朝宗于海海外有截南海至于南海河河水洋洋漣誰謂河廣瀰置之河之干兮河水清且漪河水瀰不敢馮河翕允猶河河水清漣馮河翕河江漢江漢浮浮滔滔江漢洋南國之紀江漢洋如江如漢江江之永矣不可方思漢漢之廣矣不可泳思淮淮水湯湯淮水湝湝淮浦率彼淮浦截彼淮浦淮濆鋪敦淮濆洛瞻彼洛矣惟水決泱豐豐水東注豐水有岂洽在洽之陽渭在渭之涘至在渭之將曰渭陽涇涇以渭濁鳬鷖在涇淇淇水悠悠淇水湯湯淇水在右在彼淇厲泉源泉源在左汶汶水滔滔汶水湯湯溱褰裳涉溱洧褰裳涉洧溱洧溱與洧方渙涣兮溱與洧瀏其清矣汾彼汾沮洳彼汾一方芮芮鞠之即川如川之方至川流如川之流百川百川沸騰川澤川澤訏訏淵有漼者淵于潛迯于淵在魚躍淵或潛淵深淵如臨深淵臨淵池東門之池池之竭矣不云自頻滮池滮池北流澗南澗之濱考槃在澗于澗之中皇澗過澗夾其皇澗遡其過澗澤彼澤之陂中澤集于中澤沚湜湜其沚于沼于沚中沚宛在水中沚在彼中沚洲在河之洲三洲淮有三洲汜江有汜沱江有沱渚江有渚鷖魚在于渚鳬在渚遵鴻飛渚湄在水之湄涘在水之涘漘在河之漘波烝涉波矣沙鳬鷖在沙潨鳬鷖在潨亹鳬鷖在亹泌泌之洋洋可以樂飢濟濟有深涉盈深則厲淺則揭有瀰濟濟盈不濡軌泉莫浚匪泉毖彼泉水泉之竭矣不云自中相彼泉水載清載濁泉流泉流既清檻泉觱沸檻泉百泉逝彼百泉寒泉爰有寒泉汎泉有冽汎泉流泉觀其流泉如彼流泉無淪胥以亡下泉冽彼下泉肥泉我思肥泉波烝涉波矣水滸率西水滸在河之滸斯干秩秩斯干西雝于彼西雝行潦浻酌彼行潦于彼行潦泥胡為乎泥中塵維塵冥冥維塵雝兮岸淇則有岸髙岸為谷坻宛在水中坻防防有鵲巢谷在彼空谷深谷深谷為陵大谷有空大谷中谷中谷有蓷幽谷出自幽谷出谷夏夏桀商商邑翼翼周侯服于周于周于京周南召南弼鄘衛有懐于衛歸唁衛侯王鄭齊齊侯之子魏唐秦陳平陳與宋檜曹邠于邠斯館邰即有邰家室岐居岐之陽豐作邑于豐鎬鎬京辟雍洛邑瞻彼洛矣魯俾侯于魯魯邦所瞻亳韓溥彼韓城燕燕師所完宋誰謂宋逺申不與我戍申甫不與我戍甫謝因是謝人以作爾庸許許人尤之不與我戍許摯摯仲氏任莘纘女維莘虞芮虞芮質厥成宻宻人不㳟崇既伐于崇阮侵阮于共娀有娀方將韋顧昆吾韋顧既伐昆吾夏桀荆楚奮伐荆楚汝遵彼汝墳漕言至于漕湏思湏與漕泲出宿于泲禰飲餞于禰干出宿于干言飲餞于言浚在浚之下沃從子于沃鵠從子于鵠沫沫之東矣淇澳瞻彼淇澳頓丘送子涉淇至于頓丘清清人在彭彭消清人在消軸清人在軸株林胡為乎株林渭陽我送舅氏曰至渭陽楚望楚與堂堂焦穫鎬方涇陽整居焦穫侵鎬及方至於涇陽大原至于大原牧野矢于牧野牧野洋洋艽野至于艽野漆沮漆沮之從猗與漆沮敖搏獸于敖郿王餞于郿屠韓侯出祖出宿于屠向作都于向以居徂向常許居常與許徐方徐方震驚徐方來同淮浦率彼淮浦截彼淮浦朔方城彼朔方鬼方覃及鬼方九圍帝命式于九圍九有奄有九有九有有截邦帝作邦作對邦時邁其邦毋封靡于汝殿天子之邦萬邦萬邦之方揉萬邦為憲此萬邦綏萬邦萬邦作孚萬邦之屏以畜萬邦家邦保其家邦邦以御于家周邦周邦咸喜舊邦周雖舊邦魯邦魯邦是常海邦至于海邦大邦控于大邦大邦維翰王此大邦大邦有子南邦登是南邦式是南邦邦畿邦