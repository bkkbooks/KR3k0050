body:
  text: 圖書編卷一百九明章潢撰冠禮敘嘗讀冠義曰凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而後禮義備以正君臣親父子和長幼君臣正父子親長幼和而後禮義立此所以冠為禮之始也此所以責之以成人之禮而古者聖王之重冠也後世各循其俗此禮不講也久矣方其冠也不知去爾幼志責之以成人之禮及其長也猶若童稚不能率循夫成人之道故容體不正顔色不齊辭令不順而身既不能修君臣不正父子不親長幼不和而倫又不能盡人之所以為人顧如是哉究其所以由冠禮不行故人皆昧焉而莫之覺也噫冠禮之係於人其重者如此孰不以成人望子弟也顧於冠禮而忽之哉國朝會典有品官冠禮士庶冠禮品官三加則緇布冠進賢冠爵辨服稱之士庶三加巾帽幞頭服稱之品官從古禮士庶從近禮繁簡稍不同焉冠禮男子年十五至二十皆可冠身父母無期功以上喪始可行之前期三日主人告於祠堂主人以宗子或父若兄為之就位參神鞠躬拜興拜興拜興拜興平身後凡言四拜者倣此行獻禮盥洗酌酒詣香案前焚香跪三獻酒讀祝文云維年月日嗣孫某敢昭告於某某祖考妣尊曰某之子某年漸長成將以某日加冠於其首謹以酒果用伸虔告謹告俯伏興平身復位辭神四拜平身焚祝文禮畢戒賔前一日或二日主人自詣其家隨意致詞請之逺則遣子弟致書書式某頓首拜啓某號大人門下某有子某某或弟某年及成人將以某月某日加冠於其首求所以教之者惟公齒尊仁里德重鄉評至日儻蒙不棄寵臨而惠教之則某之父子感荷無既矣未及恭詣門下伏希照亮不宣某再拜復書式某無似伏承不棄召為冠賔深恐不克共事以病盛禮然嚴命有加不敢不勉至日謹當躬造餘容靣既不宣某再拜復至日主人晨具速柬遣人迎之厥明夙興陳設冠者房於東北隅無房以帷隔之房內陳當用衣服網巾梳匣於卓東北上又設酒盞桌於右長子設冠席於阼階少東西向賔西階少西東向設醮席於西北隅南向設三加冠巾各盛以盤覆以帕用卓子陳西階下設洗盆帨巾於東階下又設便室一處為賔次而無階級以石灰畫而分之主人以下序立主人盛服立東階下少東西向子弟親戚童僕重行在後北上賔立門外東向贊入白主人前曰賔至請迎賔主人出門舉手見賔主東賔西揖平身主人揖賔請行主人舉手揖遜請賔入門分庭而行肅賔至中門主人舉手揖賔請升階至階主人舉手揖賔請升凡三次賔主各就位主人由東階升即東席西向立賔由西階升即西席東向立鞠躬再拜平身行始加冠禮將冠者出房南向席立賔揖將冠者即席賔舉手揖之將冠者即席賔盥洗賔降階主人從之賔洗畢復位主人揖賔升俱復初位執事者以始加冠進以盤子盛冠進至階即小帽也賔降階一等受冠請將冠者前賔向將冠者立將冠者跪祝辭賔祝曰吉月令日始加元服棄爾幼志順爾成德壽考維祺介爾景福跪加冠以冠加將冠者之首復位冠者興賔揖冠者適房易服賔舉手揖之冠者入房解童子服服深衣畢行再加冠禮冠者出房賔揖冠者即席執事者以再加冠進即方巾也賔降階二等受冠詣冠者前冠者跪祝辭賔祝曰吉月令辰乃申爾服敬爾威儀淑慎爾德眉壽萬年永受胡福徹帽以初加冠付與執事者跪加冠賔跪加巾興賔起復位冠者興賔揖冠者適房易服釋深衣易時樣色服畢行三加冠禮冠者出房賔揖冠者即席執事者以三加冠進即儒巾也賔降階三等受冠詣冠者前冠者跪祝辭賔祝曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黃耉無疆受天之慶徹巾跪加冠興復位冠者興賔揖冠者適房易襴衫皂縧納靴有官者加公服無官者緣領袍隨宜行醮禮冠者出房南向立賔揖冠者就醮席賔舉手揖冠者立席右南向執事者酌酒賔詣醮席前北向受酒受執事所酌之酒祝醮賔祝曰旨酒既清嘉薦令芳拜受祭之以定爾祥承天之休壽考不忘冠者升席受酒受而立賔復位東向立席冠者跪祭酒傾酒少許於地飲醮酒興降席授盞授盞授執事者冠者拜賔南向拜鞠躬再拜興平身賔東向答拜拜贊者冠者略側身西向拜贊者鞠躬再拜興平身贊者立賔左東向少退答拜行命字禮賔主俱降階賔降階東向主人降階西向冠者降階冠者降自西階少東向南命字賔祝曰吉月令日禮儀既備昭告爾字字曰某甫蓋取某義也髦士攸宜永保受之冠者對曰某雖不敏敢不夙夜祈奉鞠躬再拜興平身冠者拜賔不答禮畢賔出就次賔請退主人請禮賔賔乃出就别所主人以冠者見祠堂陳設如常儀冠者暫立於階下之東主人先行禮主人就位參神鞠躬四拜平身盥洗主人及各執事皆洗訖執事者酌酒詣香案前焚香跪三獻酒讀祝文曰禮儀三百莫重於冠某之長次子某今日冠畢用敢率見伏惟鑒格俯垂庇祐俾之成人弗墜先志謹告俯伏興平身復位冠者就位鞠躬四拜興平身焚祝文禮畢冠者見父母長上父母堂中南靣坐餘親依次坐於東西序冠者拜父母父母為之起同居有尊長則父母以冠者詣其室拜之尊長為之起遷就同西序每列皆再拜應答拜者乃禮賔主人以酒饌延賔及儐贊者酬之以幣而拜謝之親戚有來觀禮者亦并得之冠者遂出見於鄉先生及父之執友冠者拜先生執友皆答拜冠用時服按程子曰今行冠禮若制古服而冠冠了又不常著却是偽也必須用時之服士冠禮考儀禮曰男子至十五二十皆可冠必無期功以上喪始可行之前期一日主人告於祠堂前三日筮賔前一日宿賔賔許主人再拜賔答拜贊冠者一人亦如之擯者請期宰告曰眀行事告兄弟及有司厥眀陳冠服主人以下序立賔至主人迎入升堂再拜主人見贊者揖與賔揖至於廟門揖入三揖至於階三讓主人升立於序端西靣賔西序東面擯者布筵將冠者采衣采衣童子之飾紒紒結髮也出房南靣賔揖將冠者即筵坐坐即今跪贊者坐櫛設纚纚一副長六尺以韜髮而結之矣冠者適房服深衣納履出房南靣主人曰某有子某將加巾於其首願吾子之教之也賔對曰某不敏恐不能共事以病吾子敢辭主人曰某猶願吾子之終教之也賔對曰吾子重有命某敢不從賔揖冠者即筵始加緇布冠設笄祝曰令月吉日始加元服棄爾幼志順爾成德壽考維祺介爾景福賔揖冠者適房易服服皂衫革帶繫鞋賔揖冠者即筵再加角巾祝曰吉月令辰乃申爾服敬爾威儀淑慎爾德眉壽萬年永受胡福賔揖冠者適房易服服襴衫納靴三加儒巾或幞頭祝曰以嵗之正以月之令咸加爾服兄弟俱在以成厥德黃耉無疆受天之慶賔揖冠者適房徹櫛設醮席於户西南靣冠者出房賔揖冠者就筵賔受醴祝辭曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休壽考不忘冠者筵西拜受觶賔東面答拜薦脯醢冠者即筵坐左執觶右祭脯醢以柶祭醴三興筵末坐啐醴賔醮曰旨酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之冠者降筵奠觶拜賔答拜贊者酌醴賔受醴揖冠者授醴再醮曰旨酒既湑嘉薦伊脯乃申爾服禮儀有序祭此嘉爵承天之祜冠者降筵奠觶於薦東拜賔答禮贊者復酌醴賔受醴揖冠者授醴三醮曰旨酒令芳籩豆有楚咸加爾服殽升折爼承天之慶受福無疆賔降直西序東靣主人降復初位冠者立於西階東南靣賔字之辭曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於假永受保之曰伯某甫仲叔季唯其所當冠者再拜賔答拜主人醴賔以一獻之禮賔就次冠者見於祠堂次父母次兄弟姑姊妹退出見於鄉大夫鄉先生主人酬賔束帛儷皮贊者皆與贊者冠為介賔出主人送於門外再拜記曰古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以為國之夲也故冠於阼以著代也醮於客位三加彌尊加有成也已冠而字之成人之道也見於母母拜之見於兄弟兄弟拜之成人而與為禮也玄冠玄端奠摯於君遂以摯見於鄉大夫鄉先生以成人也成人之者將責成人禮焉也責成人禮焉者將責為人子為人弟為人臣為人少者之禮行焉將責四者之行於人其禮可不重與故孝弟忠順之行立而後可以為人可以為人而後可以治人也故聖王重禮按夫冠者成人之禮嘉事之重者也古人慎之近世視為迂濶寢廢不行粳粃典訓土苴禮經宜古道之難復也至於垂髫總角夲童稚之常顧乃突著巾帽宛若成人體貌儒生韋布之微宜服飾朴雅輒侈用金梁冠制上埒逹官記曰君子耻有其服而無其容詩曰彼其之子不稱其服盍思之婚禮敘婚禮合二姓之好上以祀宗廟下以繼後世故君子重之奈何世俗不察壻婦之性行止以財幣為重輕其往嫁也侈厚其資裝其納婦也靡麗於宴饗凡婚禮親迎奠鴈廟見之儀一切棄之而不講而古人靡嫚之誚賣婢之譏甘冒之而不知愧也俗之澆薄至此良可慨哉昏義謂男女有别而後夫婦有義夫婦有義而後父子有親父子有親而後君臣有正今婚禮之廢也久矣望其君臣父子夫婦之盡道也不亦難哉况財多者習於奢識卑者溺於俗欲復古禮不無望於知禮之君子云洪武五年詔定官民婚禮禮部議納采問名納吉納徴請期親迎儀物自公侯品官一品至九品各有等差納采問名總一禮庶人納采問名納吉總一禮五品以下不行請期禮大明令凡民間婚娶並依文公家禮昏禮男子年十六至三十女子年十四至二十身及主婚者無期以上喪乃可成婚問名媒氏通言女氏許之始行問名之禮即世俗所謂過庚帖約定親之日也書式主婚者具書曰某處黍眷某人頓首拜啓某號某親家門下伏承不鄙俯從媒議議以令嗣或令姪之玉愛貺室僕之男某將以某月某日敬修納采之禮謹遵典制先此問名敢請令愛所出並其所生年月日時伏惟親慈俯賜鑒照不宣名帖式父某母某氏男某行幾某年某月某日某時生遣使者奉書如女氏使者至女氏主人以禮接待畢授使者以復書書云某眷某人頓首拜復復某號某親家門下伏承不棄過聽媒言欲擇僕之第幾女某親之第女作配令嗣兹辱問名謹其所出及其所生年月日時如别幅伏惟親慈俯賜照鑒不宣名帖式父某母某氏女某行幾某年某月某日某時生使者復命納采既已問名約日方行納采之禮即今所謂定親也書式具名拜啓同前中云伏承不鄙寒微曲從媒議諾以某親長次令愛貺室僕之長次某兹卜某日良吉用修納采之敬以定百年之盟所有菲儀具如别楮伏惟親慈俯賜鑒納不宣夙興奉書告祠堂如告冠儀但祝文云禮重婚姻萬世之嗣某之子某議擇某處某親之女為配卜以今日納采伏惟默垂庇佑謹告告畢遣使者奉書如女氏女氏主人出見使者以禮接待啜茶畢使者出就次主人乃奉書告祠堂如壻家儀但祝文云男室女家人道大端某之女某議與某處某親之男作配兹以今日欲受納采謹告告畢乃禮使者具酒饌欵待如常儀畢授使者以復書伏承不棄寒陋過聽媒言謬擇僕之第女作配令嗣兹當納采更辱盛儀永諧伉儷之盟愧乏瓊瑶之報所有回儀具如别楮伏惟親慈俯賜鑒納不宣使者復命壻主人復以告於祠堂不用祝文納徴既已約日迎娶方行納徵之禮即世俗所謂下衣也書式伏承嘉命許以令愛貺室僕之子某兹將迎娶敢涓吉日以請某月某日實惟昏期謹具不腆之儀用申納徴之敬伏惟親慈俯賜鑒允不宣遣使者奉書如女氏女氏主人受書及幣乃禮使者如前儀授使者以復書伏承嘉命委禽寒宗顧微弱息教訓無素竊恐弗堪箕帚之役遇辱厚幣更示吉期敢不惟命是聽先此奉復伏惟尊照不宣親迎前期一日女氏使人張陳壻室俗謂鋪房厥明壻家設位於中堂設二卓於東西相向東西房則南北相向蔬果壺盞匙筋如賔客之禮置合卺卺音謹以一小匏判而兩之用一卓子置於其間俗以紅線絡有腳二銀鍾代之立贊者兩家各擇親戚習熟婚禮婦人為之女家設次於外或借鄰居以待壻主人率子告祠堂如納采儀但祝文云某之子某將以今日親迎於某處某氏不勝感愴謹告醮子先以卓設酒注盤盞於堂中贊者相子立於西階下南向主人盛服坐於堂之東席西向設醮席於堂西北南向一於父座前東向二贊者引子升自西階詣醮席南向鞠躬再拜平身執事者酌酒詣醮席前受酒跪祭酒傾少許於地飲醮酒興以盞授執事者鞠躬再拜平身詣父座前跪聽戒訓父命之曰禮重大壻家先正始往迎汝室承我宗祀勉率以敬母忝大禮子答曰不敢忘命俯伏興平身四拜乃親迎遂出乘馬二燭前導至女家下馬於大門外候於次或鄰女家主人帥女告祠堂儀同壻但改祝云某之長次女將以今日歸於某處某氏不勝感愴謹以酒果用伸虔告謹告姆相女立於兩階間北向四拜醮女先以卓設酒筯盤盞於室內姆相女立於室外南向父坐東席母坐西席諸親屬以次序男東女西設女醮席於母座之東北南向設女拜席二於兩階間北向姆導女出至兩階間北向立辭父母父東座前四拜母西座前四拜辭親屬或東西各行四拜或總拜其有父之尊屬先一日父母導之就其室辭焉詣醮席以下至詣父座前俱同醮子詣父母座前命之曰昔為吾女今為人婦善事舅姑無違夫子必敬必戒宜其室家只作俗語各以其意命之亦可諸母及姑嫂姊妹送至中門之內又申以父母之命父命畢姆導女暫立廳傍執事者布席布壻席於西階上北上乃迎壻主人盛服出大門外主東壻西揖平身主人揖壻請行壻辭主人先入壻從之主東壻西三揖三讓至於廳主賔各就位主就東階位立西向壻就西階北向行奠鴈禮跪壻北向跪奠鴈置鴈於地左首主人使者受之俯伏興再拜平身奠鴈畢壻先出姆奉女從之壻舉轎簾以俟女登車壻乘馬導婦車先行各以二燭前導壻至家下馬立於大門之外俟婦下車導入見家堂先設香案於中堂壻西婦東同北向就位再拜興平身獻酒讀祝文子弟讀曰男室女家人之大倫禮重婚姻嗣源所係某年以長成兹以父命迎某處某氏之女共承宗祀卜以今日成婚特申昭告伏惟顧歆垂佑俾之宜室宜家謹告俯伏興再拜興平身焚祝文然後壻導婦入室布席婦從者布壻席於東方壻從者布婦席於西方就位再拜平身婦拜壻壻答拜就位壻揖婦就位坐壻東婦西行合卺禮從者合卺分置於壻婦之前斟酒飲酒壻揖婦各執一片同飲之飲訖揖平身禮畢乃禮賔男賔於外廳女賔於中堂厥明婦夙興見祠堂先設香燭酒果新婦盛服暫立於傍主人先行四拜禮祝文曰禮重婚姻萬世之嗣某之子某以某日昏畢新婦某氏敢見先宗仰兾昭鑒俯垂庇佑謹告俯伏興平身然後壻帥新婦見同四拜平身辭神主人子婦同四拜平身焚祝文禮畢見舅姑舅姑前各置桌子坐於堂上家人男女少於舅姑者立於兩序婦進立於阼階下拜舅升奠贄幣於舅桌上復降拜西階下拜姑同舅之儀見尊長親屬同居有尊於舅始者則舅姑以婦見於其室與見舅姑儀同還拜諸尊長於兩序無贄壻往見婦之父母四拜婦父則扶而受之或跪而扶之見婦之父母皆有幣次見婦黨諸親不用幣議婚不可慕富貴按溫公曰凡議婚姻當先察其壻與婦之性行及家法如何勿茍慕其富貴也茍能克肖今雖貧賤安知異時不富貴乎茍為不肖今雖富盛安知異時不貧賤乎婦者家之所由盛衰也茍慕一時之富貴而娶之彼挾其富貴鮮有不輕其夫而傲其舅姑養成驕妬之性異日為患庸有極乎借使因婦財以致富依富勢以取貴有丈夫之志氣者能無愧乎昏娶不可論財按文中子曰昏娶而論財靡嫚之道也君子不入其鄉古者男女之族各擇德焉不以財為禮又按司馬溫公有言婚娶論財乃是駔儈才人也賣婢鬻奴之法豈得為之士大夫婚姻哉其舅姑既受欺紿則殘虐其婦以攄其忿往往終為仇讎矣然則議婚有及於財者皆勿與其為婚姻可也童幼未可議婚按溫公曰世俗好於襁褓童幼之時輕許為婚亦有指腹為婚者及既長成不肖或有疾或家貧或逺官遂至棄信負約速獄致訟者多矣先祖太尉嘗曰吾家男女必俟既長然後議婚既通書問不數月必成婚故終身無此悔乃子孫所當法也國朝定制或問國朝定婚禮所以辨上下而防奢僭也自公侯品官至於庶民各有等級上得兼下下不得僭上力雖有餘不許過分故品官一品至四品綵縀各不過八匹五品至九品四匹二匹而已今之富民誇奢鬭靡僭侈過度踰於品官甘心破産傾家不畏重罹刑憲為父母者但欲索取滿意豈慮嫁娶失時致謗生乖遺患莫測當如之何曰宦逹君子諒皆知戒深僻之人未必家喻定制也懼法君子欽仰國朝制度儉約如此縱未能無纎芥之或違亦不可極奢僭之妄作然亦不當為財之寡以誤男女大事也親迎朱子曰親迎之禮恐從伊川之説為是近則迎於其國逺則迎於其館今妻家逺者行禮一則令妻家就近處設一處却就彼往迎歸館行禮一則妻家出至一處壻即就彼迎歸至家成禮娶婦之家不用樂按溫公曰禮記云娶婦之家三日不舉樂思嗣親也今俗婚禮用樂殊為非禮程子曰三日而後宴樂禮畢也士婚禮考儀禮曰行納采禮用鴈辭曰吾子有惠貺室某也先人之禮使某也請納采對曰某之子蠢愚又弗能教吾子命之某不敢辭致命曰敢納采賔降出主人降授老鴈擯者出請賔執鴈請問名曰某既受命將加諸卜敢請女為誰氏對曰吾子有命且以備數而擇之某不敢辭某有先人之禮請醴從者反命主人告於祠堂主人壻也次納吉用鴈如納采禮辭曰吾子有貺命某加諸卜占曰吉使某也敢告對曰某之子不教惟恐弗堪子有吉我與在某不敢辭次納徴玄纁束帛儷皮如納吉禮曰吾子有嘉命貺室某也某有先人之禮儷皮束帛使某也請納徴致命曰某敢納徴對曰吾子順先典貺某重禮某不敢辭敢不承命次請期用鴈如納徴禮曰吾子有賜命某既申受命矣惟是三族之不虞使某也請吉日對曰某固惟命是聽使者曰某使某受命吾子不許某敢不告期曰某日對曰某敢不敬須凡使者歸反命曰某既得將事矣敢以禮告主人曰聞命矣凡女子許嫁筓而字之次親迎父醮子命曰往迎爾相承我宗事朂帥以敬先妣之嗣若則有常子曰諾唯恐弗堪不敢忘命賔壻也爵辨纁裳乘墨車從者執燭前馬至於女家門外主人婦翁也迎於門外揖入賔執鴈從至於階三讓主人升西靣賔升北面奠鴈再拜稽首降出主人醮其女而命之曰戒之敬之夙夜母違命母施襟結帨帨佩巾也曰勉之敬之夙夜無違宫事庶母及門內施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸襟鞶壻御婦車授綏姆辭曰未教不足與禮也壻乘車先俟於門外婦至壻揖婦以入媵布席壻揖婦即對筵坐贊者設醬葅醢臘列四爵合卺飲三飯卒食贊洗爵酌酳主人壻也主人拜受贊答拜酳婦亦如之皆祭卒爵拜皆答拜主人出婦復位乃徹於房中主人親脫婦之纓女子年十五許嫁筓而禮之用著纓明有繫也以五綵為之燭出媵餕主人之餘御餕婦餘夙興婦沐浴纚笄宵衣以俟見質明贊見婦於舅姑婦執笲棗栗進拜奠於席又拜薦脯醢舅姑共饗婦以一獻之禮歸爼於婦氏人舅饗送者酬以束帛姑饗婦人送者酬以束帛三日主人壻也以婦見於祠堂明日壻以摯見主人主人再拜受婦翁也見主婦婦母也主婦闔扉立於其內壻立於門外再拜主人婦答拜醴壻以一獻之禮壻出主人婦翁也送再拜按易曰有夫婦然後有父子人道之綱立教之夲也故女子在室則有保姆之素訓醮遣則有襟鞶之戒辭其壻氏又二姓相偶六禮咸備斯家室允宜而夫婦之道正矣至於壻見主婦主婦闔扉立於其內壻立於門外不以親故而廢男女之防尤别嫌明微之大者後世繆於擇對而茍簡禮文但以貨幣為重輕奩具為觀美甚有傾資嫁遣溺女成風或以壻為內賔而燕見無别則惑矣記曰婚禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以婚禮納采問名納徴納吉請期皆主人筵几於廟而拜迎於門外入揖讓而升聽命於廟所以敬慎重正婚禮也鄭氏曰男女有别然後夫婦有義夫婦有義然後父子有親婚姻者禮之夲所以合二姓之好上以祀先祖下以繼後世可不謹乎是以婚禮有納采問名納吉納徵請期五者之禮皆主人設筵几於家廟而受之所以謹慎重正婚禮也古者男女非有行媒不相知名非受幣不交不親故齋戒以告鬼神為酒食以召鄉黨僚友所以厚其别也夫幽則質之於鬼神明則證之以鄉黨然後婚姻之禮則男女之不可以茍合也如此及婚禮既成男子親迎親受之於父母也母送之門戒之曰往之女家必敬必戒無違夫子以順為正者教以為婦之道也既而出於大門男先率女女從男夫婦之義由此始也蓋婦人從人者也幼從父兄嫁從夫夫死從子男先而女後則從人之義也質明婦執棗栗腵修以見舅姑成婦禮也舅姑入室婦以特豚饋明婦順也舅姑降自西階婦自阼階以著代也古人於婚禮之儀如此今民間或於婚姻之際多不詳審閨闈之間恩義甚薄男夫之家視娶妻如買雞豚為婦人者而視夫家如過傳舍偶然而合忽爾而離淫奔誘略之風久而愈熾誠可傷也應氏曰婚禮將合二姓之好上以事宗廟下以繼後世則擇婦宜重於擇壻也余以大戴德禮考之其略曰娶妻嫁女必擇孝弟世世有行義者則子孫慈愛孝弟不敢淫暴鳳凰生而有仁義之意虎豹生而有貪戾之心無養乳虎將害天下是則婦與壻之性行俱不可以不擇也故司焉公嘗為之説曰凡議婚姻當先察其壻與婦之性行及家何如真西山曰女子五不娶之説即擇婦之法也閏閫之深美不外著賢否未易知也亦觀其家何如耳逆家子不娶是其所取必忠順之家也亂家子不娶是其取必禮義之族也推是求之其中者鮮矣唯喪父長子一節先儒以為疑若父雖喪而母賢則其教女必其有法固又非所拘也勿茍慕其富貴壻茍賢矣今雖貧賤安知異時不富貴乎茍為不肖今雖富貴安知異日不貧賤乎婦者家之所由盛衰也茍慕一時之富貴而娶之彼挾其富貴鮮有不輕其夫而傲其舅姑養成驕妬之性異日為患庸有及乎借使因婦財以致富依婦勢以取貴茍有丈夫之志氣者能無愧乎孔子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之此可以為擇壻之法矣晉武帝以衛氏種賢而多子賈氏種妬而少子欲納衛瓘女為太子妃後惑人言卒娶賈充女果淫妬此可以為擇婦之鑑矣胡安定曰嫁女必求勝吾家者則女之事人也恭娶婦必不若吾家者則婦之執禮也謹按楚諺曰男婚低戶女嫁髙門而今之世俗每不能然將娶婦必問資裝之厚薄不問其女之賢否將嫁女惟問聘財之多少不問其壻之何如及其成親而悔之則事無及矣又有始者婦家責聘財之少而不還其親終也壻家責資裝之薄而欲遣其婦婚姻之家結為讐敵甚至激閨門之變而破家蕩産者有之文中子曰婚娶論財靡嫚之道也君子不入其鄉為其知利而不知義也唐僖宗時裴坦為相性儉素其子娶楊收之女資結豐厚器用多犀玉坦見之盛怒命壞之曰殃我家矣收終以賄敗而坦號太平宰相夲朝范文正公子純仁娶婦歸或傳婦以羅為帳幔者父聞之不説曰羅綺豈帷幔之物即吾家素清儉安得亂吾家法敢持至吾家當火於庭今之人多不師二公能不胥而為靡嫚者少矣溫公又曰世俗好於襁褓童幼之時輕許為婚亦有指腹為婚者及其既長或不肖無賴吳許升少為博徒不治操行妻吕榮躬勤家業以奉姑數勸升學每有不善流涕進規榮父積忿疾升乃呼榮歸欲改嫁之榮歎曰命之所遭義無離二終不肯歸升感激自厲乃尋師逺遊學遂有成或因惡疾華隂吕君舉進士聘里中女後既中第婦家言曰吾女故無疾既聘而後盲敢辭吕君曰既聘而後盲君不為欺又何辭遂娶之生五男子皆中進士第其一人丞相汲公是也或家貧凍餒齊人劉廷式夲田家鄰舍翁有女約與為婚契濶數年廷式登第歸鄉而翁已死女因病雙瞽家極困餓廷式使人申前好而女之家辭以疾仍以傭耕不敢姻士大夫廷曰與翁有約豈可以翁死女疾而背之乎卒成夫婦或喪服相仍南史韋放字元直為徐州刺史與吳郡張率皆有側室懷孕因指腹為婚姻其後産男女未及長成而率亡遺嗣寡弱放常贍恤之及為北徐州時有貴族請婚者放曰吾不失信於故友乃以息岐妻率女又以女適率子時稱放能篤舊或從宦逺方若下所引鮑蘇氏遂至棄信負約速獄致訟者多矣是以先祖太尉嘗曰吾之男女必俟既長然後議婚既通書數月必成婚故終身無此悔乃子孫所當法也世之人又有同姓為婚者尤為不知禮也禮曰娶妻不娶同姓買妾不知其姓則卜之白虎通以為不娶同姓者重人倫防淫佚耻與禽獸同也外屬小功以上亦不得娶為其尊卑混亂人倫失次也帷舅姑兄弟姊妹乃是一等可以為婚而州縣官不能細讀律令者尚斷離之嫁娶不可不謹也容齋隨筆姑舅兄弟婚在禮不禁按刑統户婚律議曰父母舅姑兩姨姊妹於身無服乃是父母緦麻據身是尊故不合娶及姨又是大功尊若堂姨雖與父母無服亦是尊屬母之姑堂姑並是母之小功以上尊已之堂姨及再從姨堂外甥女亦謂堂姊妹而生者女壻子妹於身雖並無服按禮不可為婚並為尊卑失序之故然姑表姊妹兄弟正是一等其於婚娶了無所妨豫嘗記政和八年知漢陽軍王大夫中明此項敕局看詳謂如表叔娶表姪女從甥女嫁從舅之類甚為明白朱文忠公亦云仁宗皇帝以公主嫁於李璋亦是姑舅而成婚此又一證也雖然婚姻之外猶有説焉古者自天子至於士庶人妻妾媵各有等級之數禮天子妻妾十二諸侯九大夫三士二庶人謂之匹夫匹婦後世惟力是視而已此文中子所以有妾媵無數教人以亂之歎也夫正家之本由於夫婦之各正治家以禮而無寵昵之偏使嫡妻之次不紊此夫之正也司馬公為太原府通判尚未有妾夫人為買一妾公殊不顧夫人疑有忌也一日教其妾俟我出汝自飾至書院中冀公一顧妾如其言公訝曰夫人出安敢至此亟遣之撫下以恩而無妬忌之失使怨曠之禍不興此婦人之正也宋鮑女宗者鮑蘇之妻也養姑甚謹鮑蘇出仕於衛三年而娶外妻女宗養姑愈謹因往來者請問鮑蘇不輟賂遺外妻甚厚女宗之姒謂女宗曰夫人既有所好可以去矣女宗曰抗夫室之好茍以自榮吾未知其善也夫禮天子妻妾十二諸侯九大夫三士二今彼室人固士也其有二不亦宜乎且婦人有七去之道妬忌為首姒不教吾以居室之禮反使吾為見棄之行將安所用不聽事姑愈謹宋公聞而異之表其門號曰女宗得其政則家治失其政則家亂此必然之禮也至於妾媵猥多未有不為家之害者內或陷子弟於惡禮曰禽獸無禮則父子聚麀是故聖人作為禮以教人使人以有禮以自别於禽獸者衛宣公卒惠公幼其庶子頑蒸於惠公之母生子五人齊子戴公文公宋桓夫人許穆夫人疾之作墻有茨詩刺之曰不可道也所可道也言之醜也外或生僮僕之變晉王濟字武子有左右人嘗於閣中就婢取濟衣服婢欲姦之其人云不敢婢云若不從我大呼其人終不從婢乃呼曰欲姦我濟令殺之其人具述前狀武子不信其人曰枉不可受當訟府君於天武子疾甚其人見形云府君當去矣遂卒無所不有欲正其家者可不戒哉史記齊桓公多內寵內嬖如夫人者六人長衛姬生無虧少衛姬生惠公元鄭姫生孝公昭葛嬴生昭公潘密姬生懿公商人宋華子公子雍桓公欲以孝公為太子桓公病五公子各樹黨爭立十月己亥桓公卒遂相攻以故宫中空無敢棺公尸在牀上六十七日尸蟲出於户外十二月乙亥無虧立乃棺卧辛巳後斂殯嗚呼桓公糾合諸侯一匡天下為春秋霸主而家道不正嫡庶不分身後至於此讀史者未嘗不掩卷太息焉袁氏世範别宅遺腹子宜及早收養教訓免致身後欣訟或已習為下愚方欲歸尤難處也或婢妾與人私通因事逐去皆不可不於生前早有辨明恐身後自求歸宗暗昧不明子孫被其害者圖書編卷一百九
