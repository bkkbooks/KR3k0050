body:
  text: 圖書編卷二十六明章潢撰舜典璿璣玉衡以齊七政以璿飾璣所以象天地之轉運也以玉為管橫而設之所以窺璣而齊七政之運行也猶今之渾天儀也朱熹曰渾天儀古必有其法遭秦而滅至漢武帝時洛下閎始經營之鮮于妄人又量度之至宣帝時耿壽昌始鑄銅而為之象宋錢樂之又鑄銅作渾天儀衡長八尺孔徑一寸璣徑八尺圓二丈五尺強轉而望以知日月星辰之所在即璇璣玉衡之遺法也渾天之儀有三曰六合儀三辰儀四遊儀共為一器所謂六合儀者平置一黑環凖為地平列十二辰及八方四隅其上又置黑雙環並結於地平之子午半在地上半在地下比為天脊其側刻為周天去極之緯度從地平子位而上三十六度夾小板於黑雙環之間板通圓竅比為北極又從地平午位而下三十六度亦夾木板為竅以比南極别置赤單環比為赤道於上刻周天之經度結於地平之卯酉其最髙處結於北極之南九十一度即天頂之南三十六度也四環之結如天地之定位赤環雖刻周天經度實乃周地之經三百六十餘度黑環雖刻周天去極之度實亦用月之緯度三百六十有餘蓋六合儀不以運轉而天體則左旋故言周地不言周天也三辰儀者亦置黑雙環與六合儀之雙環同而為徑小所刻始為周天去極之度其雙環北板竅與六合儀北板竅相通共貫以圓軸南板亦然軸圓則雙環轉運於六合儀內轉非定體故為周天去極度亦置赤單環如六合儀者附結於雙動環之上去極九十一度是為卯酉兩月之日躔而其上始刻周天赤道之度可以隨雙環而運轉别置黃單環附結於赤環卯酉宿度仍刻周天黃道度數恐赤黃兩環動搖又作白環以輔之使無欹傾而五環總為三辰儀四遊儀者亦置黑雙環與三辰儀之雙環同而圍徑又小其上亦刻周天去極度其北極板竅與在外二板竅通一軸南竅板亦然此雙環內各置一直幹名曰直距如圓扇之脊與兩極相比數均上下俱夾外軸量兩距之常長取其當半作圓竅别置一圓板其心貫以八尺之衡管圓板兩旁聯為圓軸橫距道直距之兩竅軸圓可轉則衡管可以南北低昻而窺天復隨此雙環東西轉運無往不可窺望故謂四遊也窺管長八尺故四遊之環徑八尺在外者以次漸寬若測望可宿星躔去極度數並為於三辰環上驗之又於南軸之外接連一長木貫定水輪引水運之使南軸因而轉運一晝夜而周以比天體之繞地一周也三辰儀上布列珠玉比為星象即璿璣玉衡之遺制也王蕃曰天之形狀似鳥卵天包地外地猶卵之裹黃圓如彈丸故曰渾天言形體渾渾然也按璣衡之象或謂起于伏羲或謂作于帝嚳或云乃羲和舊制非舜創為也馬融謂上天之體不可測知天之事者惟有璣衡一事而已璣衡即今渾天儀也王蕃之論亦謂儀之制置天梁地平以定天體為四遊以綴赤道者此謂璣也置望筒橫簫于儀中以窺七曜之行而知其躔離之次者此謂衡也若六合儀三辰儀四遊儀並列為三重者李淳風所作而黃道儀者一行所增也始張衡祖洛下閎耿夀昌之法别為渾象冥輪密室以漏水轉之以合璇璣所加星度則渾象本别為一器唐李淳風梁令瓚祖之始與渾儀並用宋沈括所上渾天儀載在宋史者其為論精密有志于復古儀象者可考也蔡雍天文志曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師説周髀數術俱在考驗天象多所違失故史官不用惟渾天者近得其情今史官所用候臺銅儀則其法也立八尺圍體之度而具天體之形以正黃道以察法斂以行日月以步五緯精微深妙萬世不易之道也問天道左旋日月星辰右轉朱子曰自疏家有此説人皆守定某看天上日月星辰不曾右轉只是隨天轉天行健這箇物事極是轉得速且如今日日與月星都在這度上明日天一旋轉却過了一度遲些便欠一度月又遲些又欠了十二度如星嵗須一轉爭了三十度要看厯數子細只是璇璣玉衡數中載王蕃渾天説一段極精密便是説一箇現成天地了其説曰天之形狀似鳥卵地居其中天包地外猶殼之裹黃圓如彈丸故曰渾天言其形體渾渾然也唐一行渾天儀一行博覽經史武三思慕其名請徵之逃隱匿于僧習梵律玄宗勑書強起之訪以安國撫人之道言切直無隱受詔與率府兵曹梁令瓚造渾天儀鑄銅為環天之象中具列宿赤道及周天之度數注水激外輪令其自轉外絡二輪綴以日月令與同運天西旋一晝夜適一周而日東行亦適一度月行適十三度十九分度之七二十九轉有餘而日月適會三百六十五轉而日適一周天子儀象正合置木匱為地平儀半在地下晦明朔望遲速有準立木人二于地平上其一前置鼓以候刻能自按鼓擊之其一前置鐘以候辰每歷一辰能自按鐘撞之皆于匱中各施輪軸鈎鍵關鎖交相持而然置武成殿前示百官奪天巧至于此然銅鐵久乃漸澀不能適合久亦不能復運也其黃道遊儀以古尺四分為一度旋樞雙環其表丈四尺六寸一分竪八分厚三分直徑四尺五寸九分古所謂旋儀也南北斜兩極上下循規各三十四度表裏畫周天之度其一面加銀釘釘之使東西運轉如渾天遊旋然中旋樞軸至兩極首內孔徑大兩度半長與旋環徑齊玉衡望筒長四尺五寸八分廣一寸二分厚一寸孔徑六分行旋于軸中旋運持正用窺七曜及列宿之闊狹外方內圓孔徑一度有半周日輪也其陽經雙環表一丈七尺三寸裏一丈四尺六寸四分廣四寸厚四分直徑伍尺四寸四分置于子午左右用八柱相固亦表裏畫周天度一面加釘亦加之銀釘半在地上半隱地下雙間挾樞軸及玉衡望筒旋環于中也其隂緯單環外內廣厚周徑皆準陽經與陽經相䘖各半內外俱齊面乎上為天下為地橫周陽環謂之隂渾也靣上為兩界內外為周天百刻天頂單環表一丈七尺三寸竪廣八尺厚三分直徑五尺四寸四分直中國人頂之上東西當卯酉之中稍南使見日出入令與陽經隂緯相固如鳥殼之中黃然南去赤道三十六度去黃道十二度去北極五十五度去南北平各九十一度而強赤道單環表一丈四尺五寸九分橫八分厚三分直徑四尺五寸八分赤道者當天之中二十八宿之位也後魏斛蘭所造因著雙環規不能運動臣今所造轉運隨天仍度穿一穴即知古者秋分日在角五度今在軫十三度冬至日在牽牛初今在斗十度隨穴退交不復差謬傍在卯酉之南上去天頂三十六度而橫置之黃道單環表一丈五尺四寸一分橫八分厚四分直徑四尺八寸四分是日之所行也故名黃道太陽陟降積嵗有差月及五星亦隨日度出入古無其器意斟酌以為率故踈闊尤甚今設此環置赤道環內仍開闔使運轉出入四十八而極畫兩方周天東西列周天度數南北列百刻可使見日知時上列三百六十刻與用卦相凖度穿一穴與赤道相交白道月環表一丈五尺一寸五分橫八分厚三分直徑四尺七寸六分月行有迂曲遲速與日行緩急相反古亦無其器今創置于黃道環內使就黃道為交合出入六十度以測每夜之月離亦上畫周天之度度穿一穴擬移交會諸皆用銅鐵為之遊儀四柱為龍以龍象天能興雲雨故以致飾也柱在四維崇四尺七寸水槽山崇一尺七寸五分槽長六尺九寸髙廣各四寸地深一寸廣一寸五分龍下有山雲在水平槽之上並銅為之其所測景視古星經宿度詳審較然初淳風造厯定二十四氣中晷與祖沖之長短互異未知其孰是及一行作大衍厯詔太史測天下之晷求土中以為定于是一行上議曰周禮大司徒以土圭之深測土深日至之景尺有五寸謂之地中鄭氏以為日景于地千里而差一寸謂尺有五寸者南戴日下萬五千里地與星辰四遊升降三萬里之中是以半之得地中焉在今潁川陽城宋元嘉中南征林邑以五月立表望之日在表北景居表南于交州景在表南三寸於林邑九寸一分交州距洛水陸九千里蓋山川回折使然以表考其徑當五千里也今所測交州夏至在表南長三寸三分與元嘉所測略同而使者還言於交望極才髙二十餘度八月海中望老人星下有列星粲然明大者甚衆古所未識乃渾天家以為常不見者也蓋隨所至為見如此大史監南宫説擇河南平地設水凖繩樹八尺之表以引度之自滑臺白馬縣夏至之晷尺有五寸七分自滑臺表南行百九十八里二百七十九步得浚儀嶽臺晷尺有五寸微強自浚儀又南百六十七步二百八十一步得許州扶溝晷尺四寸四分自扶溝又南百六十里至上蔡武津晷尺三寸六分半大率五百二十六里二十七十步而晷二寸餘則舊説日千里而差一寸者妄矣今以勾股法校陽城中晷夏至尺四寸七分八釐冬至丈二尺七寸一分半定春秋分五尺四寸三分以覆晷斜視極出地三十四度十分度之四自滑臺浚儀扶溝諸表視之大率三百五十一里八十步而北極差一度極之逺近既異則黃道晷景固隨之而變矣又以圖經校安南日在天頂北二度四分極髙二十度四分冬至晷七尺九寸四分夏至在表南三寸三分定春秋分二尺九寸三分差陽城十四度三分其徑則五千二十三里矣又南至于林邑北至于鐵勒之地各差十七度四分則在鐵勒五月日在天頂南二十七度四分極髙二十二度周圓百有四度常見不隱北至晷四尺一寸三分南至晷二丈九尺二寸六分定春秋分晷五尺八寸七分其沒才十五餘度夕沒亥西晨出丑東校其里數已在回紇之北而骨利幹極南之地猶在其南矣則知吳中常侍王蕃本鄭傳萬五千里為勾股斜射法考周徑之率以揆天度徑五萬里者所謂以蠡測海者也不知目視不能及逺逺則微差其差不已遂與術錯譬遊于大湖之中廣袤不盈百里已見日月朝夕出入于湖中及浮大海不知幾千萬里猶見日月朝夕固出入其中也令于朝夕之際俱設重差而望之必將大小同術無以分矣橫既如此縱亦宜然古人所以步圭影之意將節宣和氣輔相物宜不在于辰次之周徑其所重厯數之意將欲恭授人時欽若乾象不在于渾蓋之是非也而或者各信所傳以術天體謂渾天可任數而測天象可運算而籌是術無稽之法於視聽之所不及君子所富闕而不議者也誠以為蓋天耶則南方之度漸窄果以為渾天耶則北方之極寖髙此又渾蓋家盡智畢議而未有能通其説者也則王仲任葛稚川之徒區區于異同之辨亦何益于人倫之數哉今為覆矩圖南自丹穴北冀幽都每極移一度輒纍其差于以稽日食之多少定晝夜之長短而止則天下之晷皆協其數矣渾儀據堯典仲夏星火至秦月令仲夏昏亢中大率遲二十六度今仲夏昏軫中又遲十七度疏日先論堯典中星多牽合月令乃吕不韋以秦厯增損周公時訓而為之者也大抵季月中星與堯舜仲夏中星多合差其嵗差使然爾嵗差之説有以四十五年差一度者宋大明厯是也有以百八十三年差一度者梁虞􅒠厯是也有以百八十三年差一度者梁祖沖之大同厯是也有以四十八年差一度者唐開元之大衍厯是也虞喜謂五十年差一度何承天謂百年差一度皆未得其實宋朝紀元厯以七十八年差一度最為密率唐志有六考古史及日官候簿以通法紀之三千四十分度之三十九太為一嵗之差蓋亦七十八年而差一度也崇天厯慶厯甲申冬至月在斗五度以嵗差之法推而上之自慶厯甲申去唐開元甲子凡三百二十一年日差五度故唐志云開元甲子日在赤道斗十度是也又推而上之自開元甲子去漢太初元年丁丑凡八百二十七年日差十度故唐志云以開元太衍厯嵗差引而退之則太初元年冬至日在斗二十度是也其太初厯云日在牽牛初為術疏矣自太初丁丑推而上之去秦莊襄王元年一百四十五年日差二度冬至日當在斗二十二度故月令云日在斗也自秦莊襄王元年推而上之去堯之甲子凡一千二十八年日差二十六度冬至日當在虛一度日沒而昴中故堯典云日短星昴是也蓋月令之中星不宗堯典固也用嵗差之法自漢以來迄于晉唐諸儒皆以日在斗牛互為膠柱之説雖厯家亦不悟至宋梁以來厯家雖論其差儒者猶未深察故唐臣疏月令中星參以堯典謂七星畢見果然則中星之度數不必考而玉衡為無用矣至宋朝命儒臣修唐志而嵗差之法始明然先儒占日至所在星度多舉冬至為例此獨仲夏中星者愚於月令仲冬中星有疑故闕之夫中星遲則日至所在不同而黃道隨之矣黃道者光道也日之所行故曰光道晉志載葛洪渾天儀注云謂黃道與赤東交于角五少弱西交於奎十四少強南至斗二十一度北至井二十五度唐志云黃道春分於赤道交於奎五度太秋分與去道交於軫十四度少南至斗十度北至井十三度愚按葛洪所引渾天儀注似是漢人所作其論黃道東西交南北至度數近太初元年日行之度唐志則據開元甲子而云所以不同也至于漢志謂光道北至東井南至牽牛東至角西至婁其北至冬交與葛洪同其南至西交與葛洪異蓋班固主太初厯而云其大初厯謂冬至日在牽牛初東漢賈逵已論其疏矣葛洪與賈逵一説也此所謂日至所在不同而黃道隨之也此只依堯典以著演紀之端也凡厯數所起謂演紀之端皇甫謐曰帝堯以甲辰之嵗即帝位皇極經世書所載亦然凡在位七十年二十一年而得甲子即以為演紀之端是年天正冬至日在虛一度以紀元厯步之一萬分度之百二十八為一嵗之差凡七十八年日差一度自帝堯演紀之端至漢太初元年丁丑積二千一百九十四年日差二十七度八千二百七十二分至唐開元甲子積三千令一年日差凡三十八度四千一百二十八分至宋朝乾德甲子積三千三百四十一年日差凡四十一度四千八百四十分至慶厯甲申積三千三百六十一年日差凡四十二度五千八十八分至紹興甲子積三千四百二十一年日差凡四十三度七千八百八十八分若不存演紀之端則積分計差之法何所從始此所以只依堯典而著演紀之端也春秋文曜鈎云唐堯即位羲和作渾儀王蕃云渾天儀者羲和之舊器也愚按堯典所載有厯有象故作渾象渾象者羲和之舊器也安得不著堯典之中星以為演紀之端乎日月五星是七政皆緯星也不動者為經星動者為緯星張衡云文曜乎天其動者有七日月五星是也故曰七政皆緯星也今著黃道南北至去赤道各二十四度以驗日晷之長短後漢志載張衡渾儀赤道橫帶天之腹黃道斜帶其腹去赤道表裏各二十四度晉志載葛洪渾天儀注赤道帶天之絃黃道出入赤道極逺者去赤道二十四度唐志載一行黃道儀云赤道帶天之中以分列宿之度黃道斜運以明日月之行五代司天考載王朴曰赤道者天之級帶也其勢圓而平紀宿度之常數焉黃道者日軌也其半在赤道內半在赤道外去極二十四度所以著黃道南北至各二十四度也日晷長短之説漢志曰日近極故晷短逺極故晷長日去極逺近難知要知晷景者所以知日之南北也按周禮大司空以土圭之法測土深日至之景尺有五寸謂之地中先儒皆謂地中今陽城是也立八尺之表日永景尺五寸日短景丈三尺鄭康成注及考靈曜周髀靈憲王蕃陸續諸書並云日景于地千里而差一分隋志載元嘉十九年遣使往交州測景夏至日景南出表三寸二分何氶天計陽城去交州路當萬里而景差一尺八寸二分是六百里而差一寸也唐太史議曰交州去洛九千里蓋山川回折使之然以表考其弦當五千里乎開元十二年遣使天下候景太史監官説擇河南平地設水凖繩墨植表以引度之大率五百二十六里晷差二寸餘南候林邑冬至晷六尺九寸夏至在表南五尺七寸比候鐵勒夏至晷四尺一寸三分冬至晷二丈九尺二寸六分計陽城南距林邑六千一百一十二里五月日在天頂比六度北距鐵勒與林邑正等則五月日在天頂南二十七度四分舊説千里而差一度疏矣然則日晷長短之説不必以尺寸為較大約測其晷極長則知日南至測其晷極短則知日北至如斯而已書十二次以來月之晦朔而嵗成矣十二次亦曰十二辰日月之所會也晉志云班固三統厯十二次配十二野其言最詳又有費直説周易蔡雍月令章句所言頗有先後魏大史令陳卓更言郡國所入宿度今合附而次之自軫十二度至氐四度為夀星於辰在辰鄭之分野屬兖州自氐五度至尾九度為大火於辰在卯宋之分野屬豫州自尾十度至南斗十一度為析木於辰在寅燕之分野屬幽州自南斗十二度至須女七度為星紀於辰在丑吳越之分野屬揚州自須女八度至危十五度為玄枵於辰在子齊之分野屬青州自危十六度至奎四度為娵訾於辰在亥衛之分野屬并州自奎五度至胃六度為降婁於辰在戍魯之分野屬徐州自胃七度至畢十一度為大梁於辰在酉趙之分野屬冀州自畢十二度至東井十五度為實沈於辰在申魏之分野屬益州自東井十六度至柳八度為鶉尾於辰在未秦之分野屬雍州自栁九度至張十六度為鶉火於辰在午周之分野屬三河自張十七度至軫十七度為鶉尾於辰在巳楚之分野屬荆州此班固所志也其費直蔡雍之説所先後或一二度或三四度多不過六度又陳卓范蠡鬼谷子張良諸葛亮譙周京房張衡並云角亢氐辰鄭兖州房心卯宋豫州箕尾寅燕幽州斗牛女丑吳越揚州虛危子齊青州室壁亥衛并州奎婁胃戍魯徐州昴畢酉趙冀州觜參申魏益州井鬼未齊雍州栁星張午周三河翼軫已楚荆州皆不計星度舉其大綱耳夫天運一周日移一度月移十三度十九分度之七日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦凡十二晦朔而成歲矣張衡靈憲曰日譬則火月譬則水火則外光水則含影故月光生於曰之所照魄生於日之所蔽當日則光盈就日則光盡也皇極外書占月本黑受日之光而白與靈憲之説合此所以有晦朔也星家於諸緯行度皆能著厯惟月行最速未及八刻已移一度不可著厯其為算法積分成度求之久逺易致差訛欲明其要不若求之晦朔日之所次則月之所會也自朔日計之每日行十三度十九分度之七至晦又求其會則弦望所次皆可得而推雖不中不逺矣日月之行皆有盈縮日盈月縮則後中而朔月盈日縮二則先中而朔故曰雖不中不逺矣日月之會是為十次十二次之所會則十二朔之所紀也十二晦朔雖曰成歲常有餘分蓋日行三百六十五日有二十五刻雖周天月行二十九日有五十三刻強而與日會凡三百五十四日有三十七刻而十二晦朔終矣每歲餘十日有八十八刻三歲餘三十二日有六十四刻而置閏二十九日有五十三刻尚餘三日有十一刻通十九嵗計之共餘二百六日有七十二刻凡置七閏父二百六日有七十二刻而無餘分故揚雄太玄十九嵗為一章一章者閏分盡也按六厯諸緯與周髀云日月同起於度端日舒月速凡日行十九周月行二百五十四周而復會於端是為一章後漢志曰閏七而盡其嵗十九名之曰章是也四章為蔀蔡雍月令章句七十六年為蔀首是也二十四蔀曰紀紀法一千五百二十年三紀為元韓子曰四千五百六十嵗為元是也此所以書十二次以求月之晦朔而成嵗矣其餘緯星自可隨其遲速以數步之也上文既明日月之行矣其餘緯星謂五星也木東方曰嵗火南方曰熒惑金西方曰太白水北方曰辰星土中央曰鎮星張衡靈憲曰日者陽精之宗月者隂精之宗五星者五行之精也日行黃道月與五星皆出入黃道也隋志載宋元嘉十七年作小渾天其日月五星悉居黃道不著出入之度蓋為之大約云唐志載李淳風黃道儀以玉橫旋規别帶日道旁列二百四十九交以攜月遊一行更造遊儀黃道內施白道月環其法大煩所以難述然則月與五星大約出入黃道其纎悉則付之造厯者考其出入之度以推日月之交蝕五星之留連有差則以渾天占之蓋渾天者象也厯紀其詳象著具略厯象與天合則黃道差而七政不齊其厯與象皆當修也按漢志月有九行者黑道二出黃道北赤道二出黃道南青道二出黃道東白道二出黃道西一行考月行出入黃道為圖三十六究九道之增損作大衍厯五代司天考王朴明九道以步月作欽天厯曰九道者月軌也其半在黃道內半在黃道外去極逺六度出黃道謂之正交入黃道謂之中交自古雖有九道之説蓋亦知之未詳徒有祖述之文而無推步之用今以黃道一周分為八節一節之中分為九道盡七十二道而使日月無所隱其邪正之勢焉蓋月之出入黃道時異而日不同非渾天所能述要之極逺不過六度則大數可知矣五星行度有舒有速金水輔日而行謂之輔星一嵗一周天火曰熒惑二嵗周天木曰嵗星嵗易一次十二嵗而周天土曰填星三十嵗而周天其盈縮也近日而疾遠日而遲去日極逺勢盡而留此其大略也或曰七政不齊則厯當修固矣渾象亦有修乎曰安得無修觀堯典與月令中星不同則黃道之交至凡七十八年一修矣黃道定而七政齊故曰其餘緯星自可隨其遲速以數步之也經星有微有著凡萬有一千五百二十前漢志云凡天文在圖籍昭昭可知者經星常宿中外宫凡百八十一名積數七百八十三星皆有州國官宫物類之象張衡靈憲曰星也者體生于地精成于天列居錯時各有攸屬中外之宫常明者百有二十四可名者二百二十為星二千五百而海人之占未存焉微星之數蓋萬有一千五百二十庶物蠢蠢皆得繫命晉志云武帝時大史令陳卓總甘石巫咸三家所著星圖大凡二百八十三官一千四百六十四星以為定紀蓋靈憲所謂常明可名之星者也唐志云使者大相元大言交州望極才髙二十餘度八月海中望見老人下列星燦然明大者其象古所未識乃渾天象所謂常沒地中者也大率去南二十度以上之星則見蓋靈憲所謂海人之占未有存焉者也微星不可勝窮故舉而當諸萬物之數曰萬有一千五百二十者也今斜倚南北樞去地高深三十六度以象二樞王蕃曰天地之地狀如鳥卵天包地外猶殼之裹黃也周旋無端渾渾然故曰渾天也又曰渾象之設地當在天中其勢反觀其形地為匡於已解者無異在內蓋自古作渾象皆然惟吳諸葛衡與宋錢樂之所作使居於天中後之人亦不用其法蓋其勢不便也今置木匱以為地平蓋從古法葛洪曰北極去三十六度南極入地三十六度兩極相去一百八十二度半強繞北極徑七十二度常見不隱繞南極七十二度常隱不見唐志曰地二百五十一里八十步而極差一度林邑極髙十七度四分周圓三十五度常見不隱鐵勒極髙五十二度周圓百四度常見不隱然則南北極去地髙深各三十六度據陽城而言者也著赤道帶天之腹書二十八舍以分周天之度而昏旦之中星定矣二十八舍者二十八宿之度數也以日月五星之所次舍故諸志亦曰二十八舍也東漢志載永元大史黃道銅儀以角為十三度亢十度氐十六房五心五尾十八箕十斗二十四四分度之一牽牛七須女十一虛十危十六營室十八壁十奎十七婁十一胃十五昴十二畢十六觜三參八東井三十輿鬼四柳十四星七張十七翼十九軫十九唐志大衍厯南斗二十六牛八須女十二虛十八危十七營室十六東壁九奎十六婁十二胃十四昴十一畢十七觜觽一參十東井三十二輿鬼三柳十五星七張十八翼十八軫十七角十二亢九氐十五房五心五尾十八箕十一為赤道其畢觜觽參輿鬼四宿度數與古不同舊注角距星去北極九十一度亢八十九度氐九十四度南斗一百一十六度牛百六度虛百四度危九十七度營室八十五度東壁八十六度奎七十六度婁八十度胃昴七十四度畢七十八度觜觽八十四度參九十四度東井七十度輿鬼七十八度柳七十七度七星九十一度張九十七度翼九十七度軫九十八度一行大衍厯角距星去北極九十三度半亢九十一度半氐九十八度房一百一十度半心一百一十度尾百二十四度箕百二十度南斗百一十九度牽牛百四度須女百一度虛百一度危九十七度營室八十三度東壁八十四度奎七十二度婁七十七度胃昴畢七十六度觜觽八十一度參九十三度東井六十八度輿鬼六十八度柳八十度半七星九十三度半張百度翼百三度軫百度今用一行大衍厯更定度數較之於古猶為精矣此所以著赤道帶天之腹書二十舍以分周天之度也定昏旦之中星其妙法尤詳舜典曰在璇璣玉衡以齊七政鄭康成云其轉運者為璣其持正者為衡皆以玉為之七政者日月五星也以璣衡視其行度以觀天意也馬融曰渾天儀可旋轉故曰璣所謂衡者其橫簫也所以視星辰也璿為璣玉為衡天象日月五星皆以此度知其盈縮進退愚按二説皆謂衡以視星辰之行度非謂以衡望璣也惟蔡雍蓋天説謂圓者為璣其徑八尺以璿玉為之懸而運之以象天之行直者為衡其長八尺以美玉為之孔徑一寸從下望璣以視星辰唐孔頴達疏遂採蔡雍説謂懸璣以象天而以衡望之轉璣窺衡以知宿宿且雍謂璣為蓋天懸而運之其徑八尺畫圖列宿故以稠槩管窺則亂矣况在函丈之內安用八尺之管窺乎其説殊不可曉然則當從鄭安成馬融之説以衡視星辰之行度得之矣今採諸家之説為圖以附於後又按隋志載梁天監中祖烜曰錯綜經注以推地中其法曰先驗昏旦定刻漏分辰次乃立表於凖平之地名曰南表候日中更立一表於南表影末名曰中表以望北極樞而立北表令參相直三表皆以懸凖定乃觀三表直者其立表於地即當子午之正三表曲者當更求之又以春秋二分之旦日出東方乃立表於中表之東名曰東表是日之夕入西方半體又立表於中表之西名曰西表乃觀三表直者則其地處卯酉之正也南北經之東西緯之各徑百有二十一尺四分尺之三規而圓之周三百六十有五尺四分尺之一以象周天之度漏刻工水正日之昏從中表之北望之以候二十八宿之先至使與南表及中表相為中星也至明昏時更望之星則西過一度乃移南表一尺以望之又明日昏時星復西過一度又移南表一尺以望之至後日昏當表即是前日度分之盡也如是為法至三百六十五日始候之星還而當中蓋太史占候中星之法至是為特詳愚謂三表之設善矣更當以玉衡望之其法始備故併圖于後右玉衡與璇璣為二器互相為用不可缺一故舜典並言之若共為一器安得並言哉先儒皆知璇璣為渾儀玉衡為橫簫然欲二者必合為一器則膠矣按張衡作渾天儀於密室轉之以告靈臺觀天者皆如合符則知渾儀之轉在密室而橫簫之觀在靈臺二者互相為用不可缺也至吳時玉蕃制渾儀乃設遊筒于其中謂之玉衡其説以為有璣而無衡但謂之渾象不謂之渾儀此強分别也儀謂儀形象謂法象儀象豈有二哉隋志採王蕃之説謂張衡所造止是渾象而譏何承天莫辨儀象之異以為乖戾此乃蔽王蕃之新論而不解張衡之舊制云耳所載魏劉曜光初云年孔挺作鐵儀其規有六其外四規不動其內雙規徑八尺其轉運屬雙軸雙軸之間置衡長八尺通中有圓孔徑一寸當衡之半兩傍有闕各注著雙軸衡既隨內窺東西轉運又自於雙軸之間得南北低昻觀此所云玉衡在渾儀中乃為贅物有之無用去之無損果何為哉又載後魏朝崇作與劉曜大同蓋互相倣述也唐李淳風作銅儀其外四規不動號曰六合儀其內雙規徑八尺轉於六合之內號曰三辰儀去極為軸傍轉于內貫玉衡在玄樞之間而南北遊號曰四遊儀此所云與劉曜所作無以異也一行銅儀徑四尺五寸九分玉衡長四尺五寸八分旋于軸中其制亦與劉曜相類皆附會王蕃之説牽合璣衡以為一器其實無義理也王蕃之説曰渾儀以察三光以窺分宿度渾象以著天體以布星辰愚謂更言之曰衡以察三光以分宿度璣以著天體以布星辰斯三者考于天蓋密矣如此然後昏旦之中星定之矣其餘經星自可因而出沒以象占之也上文既明北極及二十八宿之方位度數矣其餘經星謂如靈憲所載常明可名之星也方位度數既定則出沒之時可知矣出沒之時定則其疏密鱗次之象皆可按圖而占之矣舊經文昌二星在輿鬼四星在東井北斗樞在七星一度璇在張二度璣在箕二度權在翼八度衡在軫八度開陽在角七度杓在亢四度天關在黃道南四度天樽天桴在黃道北天江天髙狗國外屏雲雨虛梁在黃道外天囷土功吏在赤道外上台在東井中台在七星建星在黃道北半度天苑在昴畢王良在壁外屏在觜雷電在赤道外五度霹靂在赤道外四度八魁在室長垣羅堰當黃道唐一行測文昌四星在柳一星在鬼一星在東星北斗樞在張十三度半璣在翼十三度權在翼十七度半開陽在角四度少杓在角十二度少天關天江天樽天桴天髙狗國外屏皆當黃道雲雨在黃道內七度虛梁在黃道內四度天囷當赤道土功吏在赤道內六度上台在柳中台在張建皇在黃道半北四度半天苑在胃昴王良四星在奎一星在壁外屏在畢雷電在赤道內二度霹靂四星在赤道內一星在外八魁五星在壁四星在營室長垣在黃道北五度羅在黃道北凡圖星辰之象其法有二一曰渾天其圓如彈一曰蓋天其圓如蓋渾天全象天體蓋天南方之度反闊所以不類漢末揚子雲難蓋天八事以道渾天其後桓談鄭玄蔡雍陸續各陳周髀之違周髀即蓋天之説也其本庖羲氏立周天厯數其所傳則周公受于殷商周人志之故曰周髀髀股者表也其言天之居如倚蓋極天之中而今在人北所以知天之形如倚蓋也天傍轉如推磨而左行日月右行隨天左轉譬之蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨而左迥回焉此其説亦可取又謂曰朝出陽中暮入隂中夏時隂少故日長冬時隂多故日短此則疏而未詳也愚謂今之星圖凡可以鋟木立石者皆蓋天之遺也渾天不可以鋟木勒石亦有以二分二至為四圍而鋟木勒石者反不如蓋天之圖南方之度天當狹而反闊其星當密而反疏亦勢不得不爾觀者以意會之可也按隋志髙祖平陳得善天官者周墳乃命之參校周齊梁陳官私舊圖刋其大小正彼疏密依凖甘石巫咸三家星位以為蓋圖旁眀摘始分甄表常度并具黃赤二道內外兩規懸象著躔度攸次星之隱見雲漢昭回宛若穹蒼將為正範唐志李淳風以為蓋天之説天地中髙而四瀆隤日月相隱可以為晝夜繞北極常見者謂之上規繞南極常隱者謂之下規赤道橫絡者謂之中規今取以附于後右蓋天之説與渾天並行于世其外又有宣夜之説謂天子無質仰而瞻之髙逺無極眼瞀精絶故蒼然也日月衆星自然浮生虛空之中其行其止遲疾任情其無所係著可知矣若綴附天體不爾也虞喜因宣夜之説作安天論虞聳又立窮天論姚信造昕天論隋志載劉焯曰蓋及宣夜三説並驅平昕安窮四天騰沸大抵四天之説皆宣夜之遺晉志蔡雍之説曰宣夜之説絶無師法周髀術數具存考驗天狀多所違戾惟渾天近得其情又曰渾天之説其來久矣綿代相傳史官禁密學者不覩故宣夜騰沸是故儀象昭著莫如渾天其次蓋天猶有考焉至于宣夜其説無取所以世傳之也若求其備雖萬機千械不足以盡之如舉其綱而知衆目之隨則是亦足矣自古渾天之作其尺度之廣者莫如朝崇李淳風其機械之巧者莫如張衡一行古舊渾象以二分為一度凡周七尺三寸半或曰洛下閎之所作也張衡更制以四分為一度凡周一丈四尺六寸一分王蕃折衷二家以三分為一度凡周一丈九寸五分之三也宋太史令錢樂之考述吳葛衡之説鑄銅為儀使地居于天中以錢動之天動而地止比古制差大亦不過以五分為一度凡周一丈八尺二寸五分大而已惟朝崇鐵儀李淳風銅儀各有內外規其內規各徑八尺凡周二丈四尺故其尺度之廣無如朝崇李淳風之儀雖大皆須人運非能自運也惟張衡一行渾儀各以漏水轉之衡為關棙轉瑞輪蓂莢於階下依月盈虛依厯關開落崔子玉稱其制作侔造化一行立二木人於平地工前置鐘鼓以候辰刻每一辰則自然撞鐘每一刻則自然擊鼓皆於匱中關鎖相持轉運踓同而遲速各異史臣稱其妙過前古無幾銅鐵亦澀不能自轉故曰萬機千械不足以盡之大抵渾天之設欲知日出沒之時某星始見某星當中某星已沒如斯而已矣以水運之當昏而日未沒而未昏而日沒則如之何未免節其漏水以求其齊孰若以人運之及齊而止不亦易且簡乎蓋渾儀與刻漏不同刻漏逐刻候故不可以人運渾儀雖昏旦候日中及夜中皆不候故不必以水運之不以水運則機械之巧可以已矣不然自張衡與一行之外為渾儀者衆矣何為不以水運也且王蕃言張衡渾天儀為器傷大難動移一行言李淳風黃道儀法頗難述遂致寖廢然則為兹器者非不務求簡易也蓋患乎星辰之稠穊焉耳愚採古法作小渾天書星名而不畫其象所以著易簡之理也以一分為三度象天極函三之道徑四寸有竒以象四時周一尺二寸有竒以象十二月其竒以象閏故曰舉其綱而知衆目之隨則是亦足矣舉其綱者謂其中星正而萬有一千五百二十之星皆正也於戲以天地之大而述之於四寸之儀天地可運之掌上矣乃作渾象而患乎器之不能存也又為之圖圖亦豈能有哉當明其理至於理則無時而不存矣中庸曰天地之道可一言而盡也其為物不二則其生物不測又曰上天之載無聲無臭至矣右渾天説愚既摘取大象出具傍又疏其詳於此竊以為至簡至易可以置之几案之上暇日悠然見之目擊而道存焉則知天地之所以為天地也渾象續説宋朝太平興國中命巴人張思訓創渾儀大率依倣一行之法激水運轉加以樓板層髙丈餘以藏關柱冬月用水銀代水以防礙澀撞鐘擊鼓之外復有搖鈴執牌之報太宗詔置於文明殿題曰太平渾儀自思訓死機繩斷壞無復知其法制者至道中韓顯符皇祐中周琮及熙寧元豐新造渾天皆不以水運以是知機械之巧可以已矣元祐初吏部尚書蘇頌舉吏部守當官韓公廉更造渾儀復以水運著新儀象法要三卷藏之太史謂水運者為渾天儀不以水運者止曰銅候儀其説以至道皇祐熙寧新舊渾儀當時翰林院天文院及太火局所用皆是銅候儀不得不為渾天儀蓋信用韓公廉矜尚機巧之事非通論也其制木閣五層司晨擊鼓搖鈴執牌出沒於閣內皆依倣張思訓之舊兩極內置直距直距夾望筒使南北低昂旋轉持正窺測七曜皆依循行之法以望筒在渾儀腹中實無所用也乃出新意使望筒常指日日體常在銅竅中所謂窺測七曜者如是而已矣且望筒果能于渾儀中窺測七曜又何用臺上測驗哉必今使人于其傍驗星在之次與臺上測驗者相應以不差為凖是窺測七曜常在臺上不在望筒也由是觀之望筒當設於司天臺上不當在渾天儀腹中明矣漢晉以來占天者率以渾儀為定然求之之法詳且密載於書可考者鮮焉又其為器乃至一丈八尺有竒原非可為凡格之玩余于丁已嵗始得渾儀書于吉州守胡公而又以未見其器為恨既來郴乃得之渾象總論前璇璣合為一器從晉唐以來悉祖王蕃李淳風一行為之説儒先星厯家皆依倣之獨建安江默疏渾象分為二器今揆之以理似為近之何也機械雖巧皆人為也一涉人為雖水運人運之不同而其轉旋不得不均停畫一守為定法若夫天象之周旋乃自然之化機也列宿次舍度數固一定不易而氣運流行莫知端倪日月五星參差不齊人止能隨其變動以窺測之效法之云耳雖盡夫人之智巧千機萬械莫能先其氣化為之變動遲疾使天象之由乎人也觀宿度本不變者也堯時日中星昴今已移六十五六度矣縱使羲和在今執虞廷之璣衡以窺今日之中星恐不得不因天象之變動以遷移其衡管于一人之機械奚取哉况璣衡之設本以齊七政使人知順天時勤民事非以觀玩為也是故璣衡可以象天之璇轉而天象不由璣衡以轉旋然運轉者璣也持正者衡也璣運轉于密室于以象天體布星辰衡持正於靈臺於以察三光分宿度二者並行不悖不特衡為有用可以定昏旦之中星一定凡萬有一千五百二十之星皆得其正日月五星其遲留順逆亦于此乎察之矣否則衡以望璣縱于璣中宿度一毫不爽其于天象密移變動不測者何與哉可見天活物也窺測天象以敬授民時須有活法可也且器求實用雖古之衡在璣中今置璣于室移衡于臺使璣衡兩得其用亦無不可者故復採其説以俟精渾天儀象之君子云渾天儀總論言天者有三家一曰蓋天二曰宣夜三曰渾天蔡雍言宣夜之學絶無師承周髀術數具存考驗天體惟渾天者近得其情所謂周髀者即蓋天之説也其言天地中髙而四隤日月相隱蔽以為晝夜矣又云天形南髙而北下日出髙故見日入下故隱天之居如倚蓋極在人北是其證也所謂宣夜者惟漢郗萌記先儒所傳而云天本無質日月衆星浮生虛空之中其行其止皆須氣焉晉虞喜因宣夜之説於是而有安天之論虞聳亦祖宣夜之説於是而有穹天之論吳姚信又以天之體南低北髙於是而有昕天之論此皆好竒徇異之説非極數談天者也蓋宣夜有其名而無其傳周髀有其術而無其驗惟渾天謂地居中而天周焉日在地上為晝日在地下為夜雖王仲任據蓋天之説以駁渾儀而葛洪釋之曰周天之度半覆地上半繞地下故二十八宿半見半隱天轉如車轂之運晉志載黃帝書曰天在地外水在天外水浮天而載地者也易之晉坤下離上以證日出於地明夷之離下坤上以證日入於地需之乾下坎上此亦天入水中之象也當有何損而謂為不可乎故歷代所用多用渾天宋朝韓顯符渾天法象序曰自伏羲立渾儀則北極髙下量日影短長定南北東西觀星間廣狹則伏羲已有渾儀矣隋志曰唐堯即位羲和立渾儀舜璇璣玉衡以齊七政而璇璣即渾天儀也是知渾儀者天地造化之準隂陽厯數之元自古聖帝明王莫不用是以精察天象故前漢則有洛下閎渾天儀東漢則有張衡渾天儀在吳則有王蕃渾天儀在晉則有陸績渾天儀在宋元嘉中則有錢樂之渾天儀唐貞觀則有李淳風渾天儀在開元則有梁令瓚黃道遊儀而其中之最精詳者則漢之張衡唐之李淳風為可考也張衡之儀以八尺圓體而具天地之象則有內規外規有南極北極有黃道赤道以至於二十四氣二十八宿與夫日月五星之屬莫不咸在轉之以漏水告之於靈臺而星中出沒與天相值若合符節故崔子玉為之銘曰其數術窮天地制作侔造化范曄云其範圍兩儀天地無所藴其靈陸公紀之云衡為推步七曜之道度歷象昏明之證候校以四八之氣考以刻漏之分占晷影之往來求形證於事情莫密於此則張衡之渾天為可考也淳風之儀表裏三重曰六合儀曰三辰儀四遊儀皆儀之别也天經金渾金當璿璣者儀中之規也上列十日十二辰三百六十五度中著日月五星列宿相距下為元樞主衡遊以橫筒以觀象而察器者儀之用也推驗之法本於黃道蓋帶天之中距極南北定而不易者赤道也視日所照以為光道發斂不時者黃道也治厯者不難於算平朔而難於定氣差制儀者不難於規赤道而難於規黃道是以太宗置於凝暉而用以測候此則淳風之渾儀為可考也漢自張衡渾儀之外而洛下閎之儀君子亦有取焉晉志曰漢太初洛下閎等造圓儀以考厯度揚子雲論渾天亦曰洛下閎營之鮮于妄人度之耿夀昌象之幾乎莫能違也此豈非洛下閎之可取者乎唐自李淳風之後梁令瓚之黃道遊儀君子亦有取焉唐志曰令瓚以木為遊儀使黃道運行以追列舍之變因二分之中以立黃遺法者也嘗觀蘇頌上儀象法要於元祐中有曰古人測候天數其法有二一曰渾天儀二曰銅候儀又按吳王蕃云渾天儀者羲和之舊器又有渾天象者以著天體以布星辰二者以考于天蓋密矣詳此則渾天儀銅候儀之外又有渾天象凡三器也渾天象歷代罕傳其象惟隋書志稱梁祕府有之云元嘉中所造由是言之古人候天具此三器乃能盡妙今惟一法誠恐未得精密古人言天有周髀之術以鈎股法推考天度若通此算術則天數從可知矣唐開元中太史監南宫説等馳往安南蔡尉等州測候日景一行以南北日影校量用勾股法算之即此法也雖然一行作大衍厯詔太史測天下之晷求其地中以為定數其議曰周禮大司徒以土圭之法測土深日至之景又有五寸謂之地中鄭氏以為日景於地千里而差一寸南宫説擇河南平地度之大率五百餘里晷差一寸而舊説謂王畿千里影差一寸妄矣原道以赤道定位黃道遊仰月環白道動與天合簡而易從一行是之乃奏令瓚所謂日道月交皆自然契合於推步尤要此豈非梁令瓚之可取者乎其他如後漢之銅儀則有以銅而為儀者矣後魏之鐵儀則有以鐵而為儀者矣宋元嘉之小儀則曰小渾天李淳風之木渾則曰木渾圖唐明皇武成殿之水渾天則運以水者也張子平之候風地動儀則又用之以測地者也若夫曰赤道曰黃道此其法之不同者也曰單規曰雙規曰雙環規其制之不同者也蓋至宋朝張思訓之渾儀則作於太平興國之中其制則有地軸地輪地足之異有橫輪側輪斜輪之别晝夜長短之刻日月五星之度皆具焉而其機轉之用皆隱於樓中此又踵一行令瓚之遺象者也韓顯符之渾儀則成於大中祥符之間其制則有遊規直規之别黃道赤道之分曰窺曰管曰平準皆其儀之號也曰龍柱曰水臬皆其號之殊也此又本乎淳風一行之古人所以步圭影之意將以節宣和氣輔相物宜不在於辰次之周徑其所以重厯數之意將以恭授人時欽若乾象不在於渾蓋之是非若乃述無稽之法於視聼之所不及則君子當缺而不議也而或者各守所傳之器以術天體謂渾元可任數而測天象可運算而窺迭為矛盾誠以為蓋天耶則南方之度漸狹以為運天耶則北方之極漫髙此二者蓋渾蓋之家盡智畢誠未有能通其説也則王仲任葛稚川區區於異同之辨何益人倫之化哉凡晷度冬夏不同南北亦異先儒一以星數齊之遂失其實今更為覆規圖南自丹穴北暨幽都每極移一度輒纍其差可以稽日食之多少定晝夜之長短而天下之晷皆叶其數矣唐末邊罔修厯術服其精萃以為不刋之數也量天景尺式長四尺八寸寬一寸厚四分面劃以時刻分以刻數首有二冗以定南北二極之天表上冗深一分半下冗深一分兩旁墻刻天表寸數以草量截安冗內對日影正中墨為表頭盡處是其時也皆刻以節氣用表分寸而為凖驗之規冬至日在斗二十度去極一百五十五度影一丈三尺三寸小寒日在女二度去極一百一十三度影一丈二尺三寸大寒日在虛半強去極一百一十度影一丈一尺立春日在危十度大強去極一百六度影九尺六寸雨水在室八度大強去極一百一度影七尺七寸五分驚蟄日在壁八度強去極九十五度影六尺五寸春分日在奎十四度少強去極九十一度少強影五度尺二寸清明日在胃一度去極八十三度少強影四尺一寸五分榖雨日在昴二度大強去極七十七度影二尺五寸立夏日在畢七度去極七十三度影二尺五寸小滿日在參四度去極六十九度影一尺六寸九分芒種日在井二度半弱去極七十七度少弱影一尺六寸八分夏至日在井二十五度半弱去極六十七度強影一尺五寸小暑日在柳三度大弱去極六十七度影一尺五寸大暑日在星四度強去極七十度影二尺立秋日在張一十二度少弱去極七十二度半弱影二尺二寸五分處暑日在翼九度半弱去極七十八度半弱影二尺三寸少弱白露日在軫六度大強去極八十四度少強影四尺二寸五分秋分日在角五度少去極九十一度半弱影五尺五寸二分寒露日在亢八度少弱去極九十六度大強影六尺八寸五分霜降日在氐十四度少強去極一百八十二度強影八尺四寸立冬日在尾四度半去極一百七度少強影一丈八寸二分小雪日在箕一度大強去極一百八十一度弱影一丈四寸大雪日在斗六度去極一百八十一度弱影一丈二尺五寸六分新安陳氏曰四分度之一者周天少度外其零數有一度四分中之一分也以對周歲全日外其零日亦有一日四分中之一分所謂四分日之一也九百四十分為百其二百三十五分即四分中一分九百四十分日之二百三十五即四分日之一也月一日不及天十三分有竒是不及日十二度有竒積二十九日零四百九十九分而月與日會四百九十九分是六時零三刻弱也二十九日零六時三刻實為一月十二會得全日三百四十八乃十二箇二十九日餘分之積以日法算之其五千六百四十分該六日而得六者得六日也零者尚有三百四十八分三百四十八日加六日一歲通三百五十四日此一歲小歲之數也十九年閏餘通得二百單六日須置七閏月所以每十九年或二十年必氣朔同日者一畨也然一歲只有三百五十四日而經云期三百有六旬有六日何也此一歲大歲之數也蓋今年立春到明年立春二十四氣全數並有三百六十五日零二十五刻即四分日之一以二十五刻當一日舉全數而言故曰三百六旬有六日也二氣為一月必有三十日零二時五刻始交後月節氣合二十四氣該三百六十五日零二十五刻此氣盈之溢數也十二月有六小盡者此數朔虛之虧數也一朔無三十日全非朔虛而何二氣必三十日添二時五刻非氣盈而何節氣之有餘與小盡之不足二者並行而不悖因此有餘不足而置閏于其間二者參合而交相成兹其為萬世不能易之妙法歟中星位二十八宿迭見南方午位即中星也正月上旬日在女初昏胃見南方午位中旬日在虛初昏昴見南方午位五月上半月日在觜初昏翼見南方午位下半月日在參初昏軫見南方午位六月上半月日在井初昏角見南方午位下半月日在鬼初昏亢見南方午位七月上旬日在柳初昏氐見南方午位中旬日在星初昏房見南方午位十一月上半月日在尾初昏室見南方午位下半月日在箕初昏壁見南方午位十二月上半月日在斗初昏奎見南方午位下半月日在牛初昏婁見南方午位本朝推步太陽纒度以定昏旦中星冬至日日在箕五度每歲以冬至日度為首冬至日在箕五度日與天會其日寅時初二刻天運始于寅日行亦始于寅按推步之法以璇璣玉衡圖天盤轉輪推步至辰時初初刻日欲出以前九十一度則見軫宿在午為旦中日入之際加申時正四刻以後九十一度則見壁宿在午為昏中後八日自寅時初初刻順行十二位已退一位過丑小寒日日在斗十一度將斗十一度自丑時順行至卯時至二刻日始出則見角宿在午為旦中至午時正一刻斗宿在午井宿在子為日中順行至酉時初初刻則見奎宿在午為昏中順行至子時初四刻斗宿在子井宿在午為宵中大寒日日在牛四度後四日入子女二度其夜子時初四刻女宿在子栁宿在午諸星居垣入局順行至卯時正二刻氐宿在午為旦中自卯時順行至午時正初刻女宿在午為日中自午時順行至酉時初初刻胃宿在午為昏中立春日日在虛四度其日子時正一刻虛宿在子諸星居垣入局而星宿在午為宵中自子至卯時正一刻房宿在午為旦中自卯至午時正初刻虛宿在午為日中自午至酉時正一刻虛宿在酉昴宿在午為昏中雨水日日在危九度其夜亥時正四刻危宿順行至子時而張宿在午為宵中自子順行至卯時正一刻尾宿在午為旦中自卯至酉時初二刻畢宿在午為昏中後四日入亥危十三度驚蟄日日在室九度其夜子時而翼宿在午為宵中卯時尾宿在午為旦中酉時觜宿在午為昏中春分日日在壁五度後七日入戌圭二度其日戌時諸星居垣入局自戌時順行至子時正初刻奎宿在子角宿在午為宵中自子至卯時正二刻斗宿在午為旦中自卯至午奎宿在午為日中自午至酉井宿在午為昏中清明日日在奎十一度自戌時正二刻順行至子時正初刻角宿在午為宵中順行至卯時初三刻斗宿在午為旦中自卯順行至酉時正二刻井宿在午為昏中榖雨日日在婁九度後八日入酉胃四度具日在酉時諸星居垣入局其夜子時正初刻胃宿在子氐宿在午為宵中卯時女宿在午為旦中酉時栁宿在午為昏中立夏日日在胃十一度午時胃中卯時女中子時氐中酉時栁中小滿日日在昴十度後九日入申畢七度子時心中午時畢中卯時危中酉時張中芒種日日在畢十三度中星同前夏至日日在井二度後八日入未井九度其日未時自井宿順時至酉時角宿在午為昏中子時斗中卯時奎宿在午為旦中午時井中酉時軫中小暑日日在井十七度子時斗中午時井中卯時奎中酉時角中大暑日日在鬼一度後七日入午栁四度五時正初刻栁宿在午為日中酉時氐中子時女中卯時胃中立秋日日在栁十三度中星同前但度數不同處暑日日在張七度後九日入巳張十五度午時張宿在午為日中子時危中卯時畢中酉時心中白露日日在翼五度其日午時翼中子時室中卯時觜中酉時尾中秋分日日在軫一度後十二日入辰軫十度其日午時正初刻軫宿在午為日午酉時箕中子時壁中卯時參中寒露日日在軫十五度子時奎中卯時井中酉時斗中霜降日日在角十一度後十三入卯氐二度其日午時正初刻氐宿在午為旦中酉時女中子時胃中卯時栁中立冬日日在氐五度子時胃中卯時栁中午時氐中酉時女中小雪日日在房四度午時房中子時昴中卯時星中酉時虛中後十一日入寅尾四度卯時翼宿在午為旦中午時尾中子時觜中酉時室宿在午為昏中大雪日日在尾八度中星同前夫太陽厯宿以二十八宿為經日月五星為緯上古聖人制立璣衡法天地自然之運夜考中星晝驗日晷以察經星之所在測推日月五星之纒度而推步之法則以日度為首周天三百六十五度四分度之一將大陽所至之度按節逐氣逐時逐刻隨其運轉而步測之自不爽也圖書編卷二十六
