body:
  text: 圖書編卷十二明章潢撰學春秋敘名分在天地間正則世治紊則世亂春秋成而亂賊懼義在正名分也傳春秋者乃以亂天下名分加諸仲尼而咸莫之覺于心忍乎哉若曰仲尼欲行夏時故以夏時冠周月又曰仲尼以天自處故黜天王貶斥當時諸侯卿大夫以其權與魯是為亂賊之尤矣且魯史未經聖筆已前其篇章不知幾何仲尼於每嵗特筆其有關名分者數條云耳餘則削之使其辭相屬事相比一展卷而大義了然非故簡奧辭旨俾人莫之測識然後知所懼也諸家或核其事或精其義或定為正例變例以表章之未必無小補特于從周不倍之仲尼使之冒大不諱之名于心有不安也故敢冒罪竊義以暴白之云孔子曰吾志在春秋孟子曰孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎孔子成春秋而亂臣賊子懼孟子曰王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣孟子曰春秋無義戰彼善于此則有之矣征者上伐下也敵國不相征也左傳君子曰春秋之稱微而顯志而晦婉而成章盡而不汙懲惡而勸善非聖人誰能修之穀梁傳曰成天下之事業定天下之邪正莫善于春秋司馬遷曰春秋文成數萬其旨數千萬物之散聚皆在春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保社稷者不可勝數察其所以皆失其本矣故易曰差以毫釐謬以千里故臣弒君子弒父非一朝一夕之故其漸久矣有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通于春秋之義必蒙首惡之名為人臣子而不通於春秋之義必陷篡逆誅死之罪故春秋者禮義之大宗也王通曰春秋之于王道是輕重之權衡曲直之繩墨也舍則無所折衷矣又曰春秋其以天道終乎故止于獲麟韓愈曰春秋謹嚴又曰孔子之作春秋諸侯用夷禮則夷之進于中國則中國之周子曰春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死者于前所以懼生者于後也宜乎萬世無窮王祀夫子報德報功之無盡焉程頥曰五經載道之文春秋聖人之用五經之有春秋猶法律之有斷例也又曰五經如藥方春秋如用藥如治病聖人之用全在此書又曰春秋傳為案經為斷又曰以傳考經之事迹以經别傳之真偽又序曰孔子作春秋為百王不易之大法後世以史視春秋謂褒善貶惡而已至于經世之大法則不知也春秋大義數十炳如日星乃易見也惟其微辭奧義時措從宜者為難知耳或抑或縱或豫或奪或進或退或微或顯而得乎義理之安文質之中寬猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物而後識化工之神聚衆財而後知作室之用于一事一義而欲窺聖人之用非上智不能也故學春秋者必優遊涵泳默識心通然後能造其微也邵雍曰春秋皆因事而褒貶非有意於其間故曰春秋盡性之書也又曰春秋為君弱臣強而作故謂之名分之書又曰聖人之經渾然無迹如天道焉春秋録其事而善惡形乎其中矣又曰春秋孔子之刑書也胡宏曰天理人欲莫明辨於春秋聖人教人消人欲復天理莫深於春秋胡安國曰春秋為誅亂臣賊子而作其法尤嚴於亂賊之黨又曰通于春秋然後能權天下之事又曰春秋之文有事同則辭同者後人因謂之例然有事同而辭異則其例變矣是故正例非聖人莫能立變例非聖人莫能裁正例天地之常經變例古今之通誼惟窮理精義於例中見法法外通例者斯得之深矣又序曰古者列國各有史官掌記時事春秋魯史爾仲尼就加筆削乃史外傳心之要典也孟子發明宗旨目為天子之事者周道衰微乾綱解紐亂臣賊子接迹當世人欲肆而天理滅矣仲尼天理之所在不以為己任而誰可五典弗惇已所當敘五禮弗庸己所當秩五服弗章己所當命五刑弗用己所當討故曰天之未喪斯文也匡人其如豫何聖人以天自處斯文之興喪在己而由人乎哉故曰我欲載之空言不如見諸行事之深切著明也空言獨能載其理行事然後見其用是故假魯史以寓王法撥亂世反之正又曰春秋見諸行事非空言比也公好惡則發乎詩之情酌古今則貫乎書之事興常典則體乎禮之經本忠恕則導乎樂之和著權制則盡乎易之變百王之法度萬世之凖繩皆在此書朱熹曰春秋本明道正誼之書今人止較齊晉霸業優劣反成謀利大義晦矣又曰左氏曾見國史考事頗精只是不知大義専去小處理會公穀考事甚疏然義理却精二人乃經生都不曾見國史天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出至出自大夫出自陪臣無道極矣孔子修春秋誅亂賊正君臣之名分嚴華夷之大防思以有道易無道也然人臣無將將則必誅當時陪臣大夫以及諸侯豈徒將焉已哉書弒者三十六人特亂賊之尤者耳春秋謹微防漸戮已往懼將來其大書特書誅事誅意一以天王之法律之故曰春秋天子之事而孔子竊取之義蓋指此也觀其首書元年魯隱之元也即書春書王書正月凡春秋所紀載一皆天王之所統一皆正朔之所頒正月乃天王之朔而元年獨非天王之元魯隱之賢可少逭乎蓋將揭禮樂征伐之權以歸之天子而諸侯大夫陪臣其功罪皆據事實書褒貶是非昭然如日星矣是故禮樂掌於大宗伯凡朝聘會盟皆天子之所以敷文命也以諸侯而私相朝聘要結會盟雖其中不無救災恤鄰之舉而要之不可以語天子昭德之公征伐掌於大司馬凡侵伐誅殺皆天子之所以揚武烈也以諸侯而擅侵與國専殺大夫雖其中不無誅叛討二之舉而要之不可以語天子宣威之實連率方伯得賜弓矢斧鉞以討不庭乃天子之所以樹屏翰也以五伯而摟諸侯伐諸侯雖其中不無仗義尊王之舉而要之不可以語天子獨斷之乾剛何也五伯莫如齊桓晉文其盟于召陵會王世子于首止戰于城濮盟于踐土天王狩于河陽斯時也臣不得以陵君夷不得以亂華使天下猶知有天王之當尊功亦偉矣然功之首也禮樂征伐實非天子所自出而久假不歸誰為之哉謂其為罪之魁也詎曰不宜故春秋直書其事而功過自不相掩聖人無容心也所以使人心悚然畏懼不敢階亂賊之禍者實于兹乎寓矣奈何桓文之伯業微而楚人滅江滅六滅蕭滅舒蓼入陳圍鄭宋人及楚人􅊭而夷狄且得以主中國之盟會焉由是會吳于鍾離至會于黃池夷之慿陵中夏也極矣且不特夷狄之亡君也魯三桓晉六卿齊陳鮑各已専擅國柄自大夫専兵戰于大棘至會于向會于戚會于溴梁而直書大夫盟又書豹及諸侯之大夫盟于宋則列國之政皆自大夫出也公孫于齊次于陽州公在乾侯而大夫之僭亂可勝言哉是以其實彌逺其反彌難既書盜竊寶玉大弓又書得寶玉大弓既書叔孫州讎仲孫何忌帥師圍郈又書秋叔孫州讎仲孫何忌帥師圍郈而陪臣執國命雖大夫亦末如之何也噫自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣魯固無道而列國皆魯也聖人修春秋誅亂賊思以有道易無道也豈得已哉或者乃疑春秋果有貶而無褒矣是不知君臣華夷之間名存實亡猶愈於名實之俱亡也所以功過並録而彼善於此褒貶自見即如初獻六羽始作兩觀初也始也其文同也一褒一貶而義自殊矣或者又以經必待傳而後明焉是又不知聖人自謂見之行事深切著明非隱語也即如牛傷不郊其僭郊可知矣大搜比蒲其僭大搜可知矣初稅畝作丘甲作三軍其改田賦可知矣况前書公及邾儀父盟于蔑後書公伐邾前書及宋盟于宿後書公敗宋師于管前書虞師晉師滅下陽後書晉人執虞公如此之類皆可互觀苟必于傳之詳焉如許世子雖弒其君而藥之嘗與未嘗未可知也是聖人竊取之義不足信也已雖然誰毁誰譽直道而行知我罪我何與也此聖人之心也安得獨抱遺經究始終者與之共學春秋之大義與之共學聖人直道而行之心哉春秋四傳孔子修春秋不過因舊史文而筆削之取其足為世道之勸懲者存之云爾茍足以維世道正人心則事何取于不可窮詰何取于不可測識哉是故其辭約其義盡一開卷而是非善惡瞭然具在不待考之傳記而後詳也邵康節云春秋孔子之刑書也常即法家之斷刑獄者例觀之如擬某人以強盜得財之律即信其盜財屬實况春秋之刑書皆經孔子斷擬若必待傳記而後詳其事精其義焉不惟書法隱而不明且疑其所擬不當果將翻駁招案而出脫之乎抑欲别為比擬而深罪之乎一字之間多為條例旁引曲證又欲深文以為能乎要皆不信聖人所擬之律故欲詳審招案以究其所以案律之由也篤信聖人者顧如是哉後世所崇信者莫如左公穀三傳使春秋非傳不明則孔子何不只存舊史而加以筆削反滋後人之惑也耶縱使三傳不可盡廢而其各有長短可無辨乎故以言其長則事莫􅊀於左氏例莫明於公羊義莫精於穀梁以言其短則左失之誣公羊失之亂穀梁失之鑿何也如載惠元公元妃繼室及仲子之歸于魯則隱公兄弟嫡庶之辨攝位之實可按而知此左氏敘事之􅊀也若來賵仲子以為預凶事則誣矣王正月以為大一統此公羊之明於例若母以子貴媵妾許稱夫人則亂矣段弟也弗謂弟公子也弗謂公子賤段而見鄭伯之處心積慮在於殺弟此穀梁之精於義也若曲陳義例以大夫曰卒為正則鑿矣昔人謂左氏曉事該博是做文章之人公穀却是不曉事儒者説道理處不甚差此語良近之今合觀三傳之異同如僖公三年正月不雨左氏謂之不為災公羊謂之記異穀梁謂之勤雨各以己見自為一説皆不知春秋凡經時不雨告廟則書之義也析觀三傳之乖謬如公羊謂求車求金為非禮而不知責諸侯之不貢也謂大閲大搜為罕書而不知譏列國之僭王也穀梁謂秋搜於紅為正而不知搜本春田不可用於秋也不納子糾為內惡而不知讎敵不可得而容也左氏以郎之狩為禮而不知其廢國務而逺田獵也四國伐鄭以為圍鄭狄人入衛以為滅衛經何以不書圍與滅也至如仲子一也公羊以為惠公之妾穀梁以為惠公之母子氏一也公羊以為隱公之母穀梁以為隱公之妾尹氏一也左氏以為夫人公羊以為世卿姑舉此一二言之三傳果可盡信否乎三傳果足以發明經旨否乎經不得三傳則不明否乎若後三傳而為世所最尊信者莫如胡傳其中未能詳舉試即其所關之大者略陳之如春王正月謂以夏時冠周月在孔子不免生今而反古矣以王不稱天為貶周以桓不書王為歸罪天子是孔子以匹夫而黜天王也滕本侯爵因其黨惡來朝故貶而稱子是孔子假魯史用五刑奉天討故得以擅黜陟諸侯之爵位也夫聖人本欲懼亂賊正人心而身為亂賊之尤有是理哉况其釋經者十之三而釋傳者十之七昔人謂胡氏春秋傳有牽強處又有謂其以義理穿鑿豈欺我哉嗚呼傳愈多而經愈晦又何以傳為也豫嘗聞春秋名分之書也春秋性命之書也知春秋為名分之書而貶周黜王何有於名分之正知春秋為性命之書而載事比例何有於性命之精安得讀春秋者惟知尊信聖經而不為後儒見聞所牿則其義固已瞭然於經文中也嗚呼人皆輕於叛經而重於叛傳何哉讀春秋春秋王道也天下無二尊是王道也禮樂征伐會盟朝聘生殺之權一出於天子而無有一人之敢衡者無有一人之敢作好惡作威福是王道也是故大宗伯以賓禮親邦國而以盟會發四方之志天子巡守諸侯既朝則設方明是會盟者天子之權也其或不出於天子而私會私盟者罪也故春秋凡書會書盟者皆罪之諸侯朝於天子而諸侯之自相與也有聘禮無朝禮凡其不朝於天子而私相朝者罪也故凡春秋之書如書朝者皆以罪其朝者與其受朝者九伐之法掌於司馬而天子賜諸弓矢斧鉞然後得専征伐雖其専之亦必臨時請命於天子而後行是侵伐者天子之權也其不出於天子而私侵私伐者罪也故凡春秋之書侵書伐者皆罪之諸侯之大夫公子雖有其罪必請於天子而後刑殺焉其不請於天子而顓殺者罪也故凡春秋書殺大夫殺公子者皆罪之夫侵伐有貪兵有憤兵有應兵有討不睦有以夷狄侵中國有以中國攘夷狄有以中國借夷狄而戕中國者故戰有彼善於此者要之無義戰盟會有解讎有固黨有同欲相求有同力相援有同患相恤有以夷狄受盟有以夷狄主盟者故會盟有彼善於此者而要之無義會義盟殺大夫有誅叛有討二有愎諫有借以説於大國有為強臣去其所忌故殺大夫有彼善於此者要之無義殺是故春秋自于稷澶淵兩會之外並不書其故而至于盟會侵伐則絶無一書其故者非略也以為其會其盟其侵其伐其戰既足以者其罪矣不必問其故也殺大夫必名亦有不名而但書其官如宋人殺其大夫司馬者亦有併其官不書如曹殺其大夫者此非略也以為義繫乎其殺之者而不繫乎其殺者義繫乎其殺之者則其殺也足以著其罪矣義不繫乎其殺者則不必問其為何人與其為罪無罪焉可也説春秋者不逹其意而瑣為之説曰其會也以某故殺某大夫也以某故至於盟戰侵伐亦然是皆無益於春秋也而徒為蛇足之畫者夫春秋經世之書也其經世也以正亂賊也易曰臣弒君子弒父非一朝一夕矣不早辨也説春秋者亦云人臣無將夫人臣而竊其君侵伐會盟刑殺之權其為將也甚矣人臣竊其君侵伐會盟刑殺之權而久假焉而莫之歸也其為漸也甚矣故臣子至於推刃於其君父而春秋書某國弒其君某某人弒其君某者是弒之成也是春秋之所痛也人臣而竊其君會盟侵伐刑殺之權是弒之漸也將也是春秋之所辨也孔子嘗自言之矣曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出無道而至於自大夫出無道而至於陪臣執國命嗚呼是春秋之勢也挈其漏於陪臣大夫者而還之諸侯挈其漏於諸侯者而還之天子是春秋之撥亂而反之正也夫周自東遷以前雖王室已不競矣而其權固在也幽弒而􅊭徙岐豐之地委為草莽瀍洛之外聲教阻絶于是尾大之勢成而諸侯橫變易禮樂馮衆暴寡大小相朝強弱相劫無一不出於諸侯者而天子曾不得尺寸之權矣蓋周之盛王道行頌聲作而其可見者莫如詩雅蓼蕭湛露是諸侯之會同於天子者也彤弓是諸侯聽征伐之命於天子者也出車采薇是天子之自為征伐而四夷不敢侵叛者也故曰詩亡而後春秋作詩未亡天子之權存詩亡天子之權喪春秋收既喪之權而還之天子者也春秋所以接詩亡之後雖一日不得緩也文宣而下則諸侯又不能自執其權而大夫之交政於中國者攘攘矣三桓六卿七穆孫寧魚華陳鮑擁兵樹黨而主勢孤矣葬原仲而私交始矣作三軍舍中軍而魯之權罄於大夫矣衎出奔孫陽州孫越入彭城入朝歌入晉陽而大夫之為禍烈矣蓋天下之勢愈下而春秋之治也愈詳桓僖以前列國之大夫惟特使而與魯接者則名之而會盟侵伐則大夫未有以名見者夫救徐大夫特將也翟泉大夫特盟也春秋第曰人曰大夫而已不以名見也若此者非略也以為不繫乎大夫也文宣而下侵伐會盟大夫未有不以名見者雖溴梁之會其君在也而大夫盟書雞澤之盟君既盟也而大夫盟書若此者非煩也以為繫乎大夫也不繫乎大夫雖夷吾隰朋狐偃衰之勳且賢未嘗以名見焉繫乎大夫雖劣如欒黶荀偃髙厚華閲則瑣瑣以名見焉不繫乎大夫雖其君不在而大夫特盟則亦弗詳焉翟泉是矣繫乎大夫雖其君在而大夫綴盟則亦詳焉溴梁雞澤是矣不繫乎大夫雖主帥亦略而人之桓僖以前侵伐書人者是矣繫乎大夫雖偏禆亦牽連而名之鞍之戰是矣其弗詳大夫者以専治諸侯之為亂賊也其詳大夫者以併大夫之為亂賊也説春秋者不逹其義而曰人大夫貶也夫書人為貶彼黶閲之徒以名見者乃為褒也耶惟曹薛滕許之大夫始終書人説春秋者曰小國無大夫非也夫此數君者且為人役之不暇而未嘗敢執天下之權也而况其大夫乎蓋不繫乎其大夫是以終始人之而弗詳今曰書人為貶則是齊晉諸國之大夫偏受褒而曹薛滕許之大夫偏受貶耶侯犯南蒯弗狃陽虎之徒出則大夫又不能自執其權而陪臣實執之矣墮郈書墮費書圍成弗克書竊寶玉大弓書得寶玉大弓書而春秋之正陪臣又詳矣故孔子欲往公山佛肸之召而曰吾為東周云者即春秋書墮費墮郈意也是春秋之終也或曰盟葵丘盟踐土師于召陵城濮説春秋者以為聖人豫之也今亦曰是禮樂征伐自諸侯出也而奪焉可乎曰是不然矣桓文之未出也權雖不在天子而諸侯亦未能盡得天子之權也蓋其權散桓文之既出也則權既不在天子又不在他諸侯而桓文獨盡得天子權也蓋其權聚譬之主人有千金焉而竊之者十人雖金已不在主人矣然十人而人得百金焉尚未足以當主人也而竊之者一人苟一人而併千金焉則是疑於主人也權之散臣悖於主權之聚臣疑於主故較利害則權之聚而交鬬猶不若權之散而未有所屬隨之屯曰隨有獲人隨而我獲之未害也而謂之凶豫之坤曰由豫由我致豫未害也而六五以為貞疾故桓文者臣之凶而主之所以貞疾者也且桓文以前諸侯固有相朝者則亦一二小邦而已猶未有六服羣然相朝者固有私盟會擅侵伐者則亦一國兩國相讎相結而已未有舉中國而聽於一人未有十餘國而共攻一國者是天子之權未有所屬也桓文之興五年一朝三年一聘而諸侯之玉帛相率而走於其庭天子黼扆之前乃不得一人秉圭而北面者彼齊晉亦偃然諸侯之朝已而終其身未嘗一涉天子之庭也衣裳之會兵車之會未嘗有一介請于天子也是故糾合諸侯同奬王室未有如葵丘踐土者諸侯之羣然役屬臣僕於諸侯亦未有如葵丘踐土之甚者戎狄攘斥中夏乂安未有如召陵城濮者而摟諸侯以伐諸侯亦未有如召陵城濮之甚者説春秋者不逹其意而曰會于某盟于某是聖人以諸侯授之齊晉也夫王室之不競也諸侯既已盡折而入於齊晉矣聖人不能挈而還之天子也其又推而授之以益其逼也耶夫權自諸侯出不問其如何而均謂之無道敵國相征不問其如何而均謂之無義不知禮樂征伐之出於桓文也其為道耶其為無道耶桓文之戰其為義耶其為無義耶使桓文而誠於勤王誠於攘夷急病而其柄則倒持也其分則上陵也聖人猶必律之以法而桓文且將為法受惡矣况其借名勤王而實則自殖陽為急病而隂欲養亂哉滅談滅遂本以自肥執曹畀宋為譎已甚桓之末年侈然有封禪革命之心而文至於請隧以葬此其去問鼎者無幾耳又何以責楚也然則聖人所稱民免於左衽而仁之何也曰是聖人之顓論功也而春秋者顓以明道也穀梁氏曰仁不勝道存王室也然則説春秋者曰謹華夷之辨何也曰此誅亂賊之一也夫春秋之所夷者吳與楚楚之先鬻熊為姬文師國於江漢之間而太伯端委以臨吳蓋皆神明之胄矣荆人不道間周之亂革子以王叢毒上國吳亦相效而王是亂賊之由也是以春秋從而夷之春秋諸侯中顯然為逆者莫如楚吳其隂逆而陽順者莫如齊晉如斷獄之家吳楚則功意俱惡齊晉則功遂意惡功意俱惡故聖人顯誅之顯誅之故其辭直如卒不書葬君臣同詞之類凡此皆直辭也功遂意惡故聖人隂奪之隂奪之故其辭微如遷邢於儀夷城楚丘狩河陽之類凡皆微辭也大小雅未廢而四夷不敢交侵小雅盡廢而後四夷交侵春秋始書荆入蔡以獻舞歸則其躅蹢之勢已見桓文奮而扼之其鋒稍阻文也沒而晉霸衰而楚人之圖北方者遂日長而不可制是故春秋書荆入蔡此霸之未興而楚猾中國之始春秋書次于厥貉此霸之既衰而楚窺中國之始蓋桓文之所以扼楚者其力有難易而楚與中國之所以盛衰其幾有倚伏桓起于海濱而所從者宋衛陳蔡皆弱國故謀之十餘年結江結黃連十二國之師而後能服楚于召陵文據表裏山河之固而所從者齊秦皆徑敵故反國一年僅連三國之師而遂能克楚于城濮一戰而殺其専兵之將然晉之克楚也得策于結秦而晉之不競于楚也失策于讎秦自殽之役而秦晉相讎殺者厯四五世戰彭衙戰令狐戰河曲積十餘戰而不解是晉人自失一強援自生一強敵失一強援則其氣力不完強敵伺近則其勢不暇於略逺故晉霸之衰而楚益橫者殽之役實然説春秋者乃曰殽之役春秋許晉襄繼霸吾不知也夫楚莊者又蠻酋之雄耳而逺交秦巴近攻陳鄭則是晉之讎秦非特生一強敵乃又借盜以兵也春秋書楚人秦人巴人滅庸而楚之謀益狡矣書楚子圍鄭而中國虎牢之險淪于夷矣書宋人及楚人􅊭而南北衡矣天下之勢一變也雖然于時諸侯固有附楚者而猶未敢公然附楚也晉雖已不得盡得諸侯而猶未肯甘心以諸侯委之楚也蜀之盟謂之匱盟蓋諸侯猶惴晉人知之也弭兵之説倡而南北之從交見於是中國諸侯公然朝楚向之玉帛於齊晉者盡在楚矣申之會空中國而聽焉齊晉之所連以扼楚者今楚人連之以扼中國矣申之會諸侯獻六王之禮宋之會虢之會長楚於晉則是諸侯甘心為夷後而晉人甘心以諸侯委於夷也天下之勢又一變也至於吳越交兵而夷禍極矣書伐郯入州來會黃池入吳而春秋所以治夷者又詳矣是春秋之終也或曰楚橫而齊晉扼之則是中國果不可無桓文也今曰禮樂征伐自諸侯出也而奪焉夫賴人之功以紓患靳人之權以資敵是責鷹鶻之搏而縶其足也不亦迂乎曰不然吾又有以譬之今有僕於此鳩黨鑄兵而主人弗能令也然盜夜入其室則其僕揭兵嘯黨而逐之以僕為不善也然而足以逐盜以僕為善也然而足以抗主故天下無霸而至於四夷縱橫而莫之禁者非天下之幸也天下有霸而至於臣疑於主而莫之怪者非天下之幸也夫春秋之事齊桓晉文是也齊桓晉文之功定而王道明矣王道明而亂賊懼矣或謂春秋誅亂賊者誅其弒君者也曰若是則春秋所誅者止於弒三十六君之人耳其亦狹矣然則所謂誅亂賊者何也曰治弒也治諸侯之専也治大夫也治陪臣也治強也凡無王道者皆亂賊之道也春秋大旨玩聖人經典須先提揭大綱得聖人作經本旨則萬目犁然具舉而大義自不容掩况春秋尤經聖人手筆而為萬世提綱書法也惡可各以一人意見牽扯義理以相穿鑿傅會匪特聖人筆削大義不得昭明於天下而反使聖人得罪名教咸朦然莫之覺焉吁可痛哉蓋後儒欲尊孔子不曰聖人以天自處則曰聖人以天子之權與魯夫孔子亦人也止曰天生德於豫曰知我其天何為便以天自處乎孔子亦庶人也曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出至政出大夫國命執于陪臣蓋屢傷之矣未聞與奪天子之權反自庶人出也矧孔子懼亂賊作春秋故春秋成而亂臣賊子懼觀當時列國僭亂極矣未有遽改周家之正朔者乃謂孔子欲行夏時故以夏時冠周春月而孔子身為亂賊之尤矣桓不書王黜天王也滕杞書子貶諸侯也其於大夫陪臣又不待言至不書秋冬則天且在其貶黜中矣從古僭妄未有至此極者乃以加諸孔子於心安乎哉嘗聞孔子曰今天下車同軌書同文行同倫曰吾學周禮今用之吾從周曰為下不倍且曰誰毁誰譽斯民也三代直道而行也信斯言也吾固確信孔子必不敢黜天王貶諸侯與奪當時卿大夫以至敢于改周正朔而必行己之志也然則筆削豫奪非孔子而誰哉蓋魯之春秋與晉乘檮杌一也其事則齊桓晉文其文則史而其義則孔子自謂丘竊取焉可見文皆史氏之舊文孔子未嘗有增損也特擇其有關王迹者筆之無關王迹者削之故遊夏文學無所容其贊也雖一字嚴于衮鉞實合數句以成其文雖每條自為始終實會數條以詳其事惟筆削定而名分秩故善惡明而法紀昭此所以大義燦若日星不待孔子褒之貶之人心勸懲自有不容己者在矣是聖經本簡諸傳必欲求諸繁聖經本易諸傳必欲求之難且緣飾以聖賢之義理綱維以帝王之法度附和以儀秦之智術參錯以孫吳之兵機斷案以申商之法律推究愈精愈深而去經愈逺雖其間多言而中或有得其情者要亦鰓鰓然指摘推尋於一字之間而不知大義未免放飯流醊而問無齒決均於大綱無當也潢淺陋固拙豈敢操戈入室以攻訐諸儒之短哉但據一竅之明故信孔子從周心志必不敢易正朔黜天王貶削諸侯於二百四十年後據義理慿意識以改厯朝信史故揭大綱以歸諸簡易俾學春秋者讀其本文是是非非一開卷而人人可自得之矣至于一字一義不徒四傳有可採者雖諸家不敢悖也雖然孔子於春秋之義且謂之竊取故甘冒僭踰之罪亦取其意而名之為竊義云嘗誦孔子之言曰述而不作信而好古曰吾猶及史之闕文也曰為下不倍曰愚而好自用賤而好自専生乎今之世而反古之道災及其身者也曰吾學周禮今用之吾從周學孔子之學者真信孔子數語則春秋不待傳注而可明矣何也孔子自謂吾志在春秋便可以觀孔子之志也然一字之褒榮踰華衮一字之貶嚴踰鈇鉞是謂字句皆孔子所自筆削而褒貶王侯大夫諸人者也何有於述而不作信而好古耶不知褒貶皆舊史也孔子特擇其有關名教者筆之無關名教者削之而已信述皆實言也即如謂舊史于隱公原有即位之文孔子削之以貶隱也桓公三年原有春王之文孔子削之以貶王也桓四年原有秋冬之文孔子削之以黜天也他如黜諸侯責大夫之文不可勝數則又何有于闕文哉倍上反古亦至矣何有于從周哉不知即位春王秋冬之類皆舊史之闕文也信以傳信疑以傳疑皆史闕文之實事而孔子不敢削即位以貶君不敢削春王以黜王不敢削秋冬以黜天不敢改侯爵以黜諸侯不敢書名削名以黜諸大夫才信史官皆信史也春秋皆實書也孔子從周之志非虛言而為下不倍生今反古皆聖人所必不為者也如此則孔子之心才可以暴白於萬世而不為諸傳所誣矣觀昭公娶同姓本不知禮然答陳司敗之問則寧以過自歸也而敢于黜君王乎陳恆弒君尚沐浴請討之矣况敢以弒為薨而有所諱乎惟其舊史原書弒者雖國君不敢諱原不書即位者雖國君不敢加故曰誰毁誰譽斯民也三代之所以直道而行也又何忍以倍上反古加聖人耶孟子厯敘羣聖統緒自舜禹文武周公而下直以孔子作春秋繼之且曰豫未得為孔子徒也豫私淑諸人也他日又曰禹抑洪水而天下􅊭周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼曰吾欲承三聖者所以願學孔子無如孟子則深知孔子之春秋亦莫踰於孟子矣况其相去時世甚近而説孔子成春秋之意為獨詳乎曰世衰道微而邪説暴行有作臣弒其君者有之子弒其父者有之孔子懼作春秋春秋天子之事也曰春秋無義戰彼善於此則有之矣曰王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣果真信得孔子之春秋為誅亂賊而成則凡謂孔子黜君王貶當時諸侯大夫而以亂賊之尤加諸孔子者不可信也真信得王者之迹熄而詩亡詩亡然後春秋作則知王迹莫大乎名分而春秋之作惟以尊王迹而已矣真信得魯之春秋與晉乘楚檮杌均之為史則從古史官書法必有一定之例而其所記者不過當時之事而已真信得其事則齊桓晉文其文則史而孔子未嘗增減一事一字則其所當注意講求存王迹之義而已矣自今觀之凡朝聘會盟侵伐戰取圍獲敗滅崩薨卒葬錫命賵賻郊雩搜狩執殺出奔之類孰非列國之事乎凡各國年月時日一以魯國為主諸侯朝聘會盟侵伐一以魯君為首爵號名字或書或不書各隨事之大小詳略而悉嚴其詞孰非史氏之文乎若夫據事直書而莫非綱常之所係因文核事而一皆名分之所關惟屬詞比事其義自見此則孔子所謂竊取之義也即所以繼詩亡而存王迹與晉乘楚檮杌其事文雖同義則殊也若曰事有不詳非傳不足以考其事之顛末是春秋為簡略之史矣文有不顯非傳不足以見其文之精深是春秋為晦昧之詞矣義雖至精如書國書爵書人書名字同一事也所書之文又書與不書各異故方用此字以為之賞即用此字以為之刑誅心誅意各有差别而深密刻核非傳則不能窺此方書之以為定例彼即不書以為變例一褒一貶各有微旨而倐忽變動非傳則不能測譬諸後世舞文弄法之吏詭譎百出各借律例以斷決人之生殺而春秋皆非義之義矣孔子竊取之義顧如是哉噫孟子之言信不虛也春秋大義惟在正名分存王迹事也文也一仍其舊而孔子未嘗增減一字以為之褒貶則春秋本自光明正大凡善惡刑賞昭然于簡編之中矣何以紛紛多説為哉春秋書法謂當時史官無褒貶豫奪不可也或者即謂書時月者貶也書日者褒也是以日月為褒貶矣果春秋之義乎信斯言也則當以日月為定例也姑舉諸儒之見言之彼徒見會盟卒葬有書日不書日不可一例拘故曲為之辭也是故盟不書日一也或以為渝信或以為危為美何不同乎葬以過時而日隱也當時而日危之也然過時而隱直指齊桓言之彼時公子爭國危之隱之可也衛穆宋無齊桓之賢無爭國之患亦過時而書日果何可隱而宋穆之日葬又何可危乎公子益師卒左氏謂公不與小斂明矣而皆書日公羊曰逺也然公子區亦逺矣而亦書日穀梁曰惡也季孫意如亦惡矣而亦書日何歟胡氏則又皆以為非而歸諸恩數之厚薄焉然得臣之於宣公非薄也意如之與昭公非厚也而皆得書日又何歟所以益師之卒不日四家各持一説不免互相矛盾矣惟程伊川先生曰其不日者古史簡略日月或不􅊀而春秋因之是也故以事係日以日係月以月係時此史家之通例也事成於日者書日事成於月者書月事成於時者書時或有宜月而不月宜日而不日者皆史失之也甲戌己丑中有遺其事者皆史闕文之意也日月之書不書於褒貶之義何關係哉雖然亦有因日月之前後而知其是非者則亦不可廢也如莊三十一年春築臺於郎夏築臺于薛秋築臺于秦三十二年春城小穀則見其才閲三時而大功屢興也宣十五年秋螽冬蝝生則見其連三時而災害薦作也莊八年師次于郎夏師及齊師圍郕秋師還則見其閲三時而兵勞於外也凡此之類不於書時見之乎如桓二年秋七月杞侯來朝九月入杞則見其來朝方閲一月而遽興兵以入之也昭七年三月公如楚九月公至自楚則見其朝夷狄之國閲七月之久而勞於行也僖二年冬十月不雨三年王正月不雨夏四月不雨則見其閲九月而後雨也凡此之類不於書月見之乎如癸酉大雨震電庚辰大雨雪則見八日之間再見天變也辛未取郜辛巳取防則見旬日之間取二邑也壬申御廩災乙亥嘗則見其災餘為不敬己丑葬敬嬴庚寅克葬則見其明日乃葬為無􅊀丙午及荀庚盟丁未及孫良夫盟則見魯人先晉而後衛己未同盟于雞澤戊寅及陳袁僑盟則見晉之先盟諸侯而後盟大夫凡此之類不於書日見之乎比而觀之年時月日其關係於史者如此而已若以日月係春秋書法之褒貶則皆諸家臆説也不可不察春秋書法於諸侯大夫爵號名稱所書各有不同諸傳每于書爵書字者便以為褒于書名者便以為貶似乎褒貶之法係乎爵號名稱之所書矣然有當書字原只書名當書名者原却書字當書爵者或止書國書人當書人者或又書爵則又各拘一見而曲為之詞其自相抵牾不可勝説矣是故於穀鄧書名則曰貶其朝弒逆之人矣紀侯獨非朝弒逆之人乎見其書爵則為之解曰志不朝桓也於宰咺書名則曰貶其賵諸侯之妾矣榮叔獨非賵諸侯之妾者乎見其書字則又曰罪在天王而無貶也於滕薛書爵則曰先朝隱而褒之矣滕朝桓則即降侯稱子謂其朝弒逆之人也何貶一人至于歷代子孫皆莫之宥乎見荆變而書楚楚變而稱子則曰進夷狄也夫中國而夷狄則夷狄之矣夷狄而中國則亦中國之乎見季札書名則曰為其辭國生亂也泰伯夷齊非辭國者乎何為以至德稱之得仁許之而札獨辭國見貶也胡氏又謂書晉侯以常情待晉襄也書秦人以王事責秦穆也紛紛不一要皆諸儒臆説各執一見以明經而經反因之以晦塞矣然則名稱爵號可盡廢而不講乎蓋時變有升降世道有盛衰善觀時世者亦可因是以會通也如楚一也始書荆繼書楚已而書子吳一也始書吳繼書吳人已而書吳子于以見夷狄之寖盛矣魯翬鄭宛詹始也大夫猶不氏其後則大夫無有不氏者鄭段陳他衛州吁始也皆名其後則雖弒君之賊亦有書氏者于以見大夫之漸強矣始也曺君無大夫其後則曺莒皆有大夫于以見小國之大夫皆為政矣始也吳楚之君皆書人其後則吳楚之臣亦書名于以見夷狄之大夫皆往來于中國矣諸侯在喪稱子有稱子而與會伐者于以見不用周爵而以國之大小為強弱矣會于曺蔡先衛伐鄭則衛先蔡于以見當時諸侯皆以目前之利害而不復用周班矣幽之盟男先伯淮之會男先侯戚之會子先伯蕭魚之會世子長于小國之君于以見伯者為政皆以私意為重輕而無復禮文矣垂隴之盟內之則公孫敖會諸侯召陵侵楚之師外之則齊國夏會伯主于以見大夫敵于諸侯而莫知其非矣此觀其會通凡爵號名字之異同或事有小大詞即因之以詳略或蒙上文而殺其詞者有之不可以一例拘也明矣春秋首書元年乃魯隱公紀國之元實周􅊭王四十九年也轉引乾元坤元以明人君之用且以體元調元歸乎君相豈知非天王不可以稱元魯隱特侯國耳何為僭天子之元乎使諸侯可以改元則國各一元不將千八百元乎説者曰孔子魯人也故以天子之權與魯然天子之權誰得而與誰得而受孔子特庶人也安能以天子之權與魯侯哉况以諸侯之元加諸春王正月之上是乎非乎苟謂一字一義悉出諸孔子所裁定則春秋之作本以正名分存王迹也何為顛倒王侯名義一至此乎以豫觀之諸説呶呶皆諸儒之陋説也何也天王諸侯之名分不可亂諸侯無改元之禮而以侯國之元冠于春王之上必非孔子所改定也要皆史氏舊文孔子不過據其事與文而直述之是也非也人心之公義昭然天地間自不可得而掩矣或謂諸侯稱元自魯隱公始以後十一君紀年皆係之魯者隱公啓之故係元於魯隱紀事之首所以深著其無王之罪也春秋始於魯隱之元年蓋謂此歟至謂仲尼為素王丘明為素臣故得専乎賞罰豫奪之權為此言以啓後世儒者僭妄之弊其害為尤甚也知孔子竊取之義者其慎辨之首書魯隱之元年而復書春王正月何也蓋魯國之史其所書者實列國之事也匪天王曷足以統之哉但論時論月厯代諸儒人各一説不以為改時則以為改月或又以為時月之俱改豫嘗據易書詩禮諸書以證其時月之未改矣兹復詳之彼以為改時者則以冬十一月為孟春二月為孟夏五月為孟秋八月為孟冬矣以為改月者則建子為正月建丑為二月建寅為三月以至建亥為十二月矣以為時月之俱改者則冬十一月為正月冬十二月為二月春正月為春三月春二月為夏四月焉以為改月不改時者則冬十一月為冬正月冬十二月為冬二月春正月為春三月焉又以夏時冠周月者則以周雖時月俱改而孔子欲行夏時故于周所建之月自子迄亥為一年乃以夏人所尚春夏秋冬之序加于建子起嵗之月矣殊不知三代雖異建而時月未嘗改也盍觀諸三百篇之詩乎以周之時訓證周之時令不亦可乎七月流火之詩諸儒皆以為周公訓告成王乃夏后氏之邠俗故其時月皆夏后氏之時月也且勿之論矣如詩云春日遲遲卉木萋萋倉庚喈喈采蘩祁祁云維暮之春亦又何求如何新畬於皇來牟將受厥明若以為時之改也則建丑月為仲春矣安得日之遲遲木之萋萋乎建寅月為暮春矣安得來牟之麥迄用康年乎信乎時未改也詩云二月初吉載離寒暑日月方除日月方奧云四月維夏六月徂暑秋日凄凄冬日烈烈若以為月之改也則建丑為二月矣寒暑安得兩分日月安得方除而方奧乎建卯為四月建巳為六月矣卯月可以為夏巳月安得暑之遽徂五六七月安得日之凄凄八九十月安得日之烈烈乎信乎月未改也若又以為時月之俱改焉是以逆天違時加武周矣何也時月一改則木屬子丑寅火屬卯辰巳金屬午未申水屬酉戌亥况武周縱能改時令月數而不能使萬物之發生各以其時何有于欽若昊天敬授人時哉若以為夏時冠周月也是以亂賊之尤加孔子矣何也在諸國雖紊會盟侵伐之典僭刑賞生殺之權猶未敢改周正朔孔子乃生今反古行夏之時使周王之時訓至此盡變易之矣孰謂孔子無忌憚一至此耶即此觀之時月未之改也昭昭矣然必書春王正月何哉蓋書春書月所以尊天時也凡所書如夏城中丘夏城郎冬浚洙冬築郿春新延廄春築臺于郎八月築鹿囿正月蒸夏五月蒸秋八月嘗春正月卜郊夏四月五卜郊秋八月大雩秋八月大閲春二月焚咸丘秋搜于比蒲春正月不雨夏四月不雨六月雨自十二月不雨至于秋七月春無冰之類各以天時而考其所行之事孰遵時也不待褒之貶之而其事之善與不善不可掩矣書王書天王所以尊周也凡其所書如天王狩于河陽公朝于王所天王使宰咺來歸惠公仲子之賵公及邾儀父盟于蔑公會戎于潛公如齊觀社丹桓宫楹刻桓宫桷初獻六羽初稅畝初作丘甲舍三軍盟于召陵會王世子于首止會于葵丘戰于城濮盟于踐土之類各以王度而考其所行之事孰尊王也孰悖王也不待褒之貶之而其事之善與不善自不可掩矣是故善學春秋者以天時觀人事而人事之得失何必刻意以誅求以王法治侯邦而侯邦之是非何待深文以極治此春秋所以為簡易也奈何諸儒各以己意揣摩聖訓一字之間彼以為褒此以為貶于天時王章咸莫之省也何怪乎春秋之旨愈傳而愈晦哉國君初立必書即位禮也春王正月之下必書即位者春秋之書法也然而有書有不書何哉觀魯隱不書即位三傳謂隱有讓桓之志不行即位之禮故不書似乎傳其事之實矣考之經傳隱實在位十有一年安有始焉不即位而可在位以秉其君國之政乎又安有不即位而可以改元者乎胡氏乃謂內無所承上不稟命則不書故春秋首以王法繩隱公也似乎得其義之正矣考之魯十二公均之不稟命也何獨於隱而責之深乎列國諸嗣君即位曾有一人請命天王者乎或曰隱公攝也故不書即位且以攝之義言凡國君必上告祖廟下臨百官禮居喪不祭以嗣王雖在廟而不敢自祭故冡宰攝而祭之耳苟無祭主為誰而攝其祭乎禮嗣君居喪三年不言百官總己以聽命於冡宰以嗣君雖朝羣臣而未有命戒故冡宰攝而命之耳苟無嗣君為誰而攝其朝乎伊尹之攝以有太甲在桐宫也周公之攝以有成王在襁褓也故伊周未敢居商周天子之位也明矣隱公在位告廟臨臣稱之邦人曰魯君稱之異邦曰魯侯書之史册曰魯公乃謂之居攝不書即位吾不知之矣或曰隱之攝將以讓桓之嫡也據古禮諸侯一娶九女茍元妃卒則次理內事惠公既有元妃孟子矣仲子不過因其手文而惠公自立為夫人耳仲子果可以為嫡乎仲非嫡母桓可以為嫡子乎如此則隱為庶長矣春秋果一字一義皆出聖筆則莫先於嫡庶之辨矣隱雖有讓桓之志安在其為攝乎况隱謂之攝矣莊閔僖俱不書者何也然在莊則以為君弒而子不忍行即位之禮在定則以昭公喪未至猶有説也而閔僖則止謂之不請命焉蓋在桓宣弒奪之人均之未請命而猶得書也何獨於閔僖而過責之乎宣公本為弒君者所立亦書即位乃曰書之以著其自立之罪則愈不通矣或者又曰舊史皆書而不書者孔子削之耳此尤不通之甚也何也弒逆如桓如宣皆莫之削而何獨求備於隱公數君也要皆求之不得其説又從而為之辭故諸傳各一其見也然則其義何居蓋一年不二君逾年始改元者禮也但國家事勢不一或有舊君薨而嗣君遽即位者未必人人即位於改元之正月也或即位於元年正月者則書之或即位於君薨之年者則不書亦一也觀定公已書元年至六月始書即位亦可證矣且書與不書皆舊史之文也孔子何所庸其意見而獨削夫隱閔僖三公哉經于列國書爵書人不一而足諸傳則以為書爵者褒之也尊之也宜乎同一尊崇褒美之義也然同一楚子伐鄭在宣四年則謂特書爵以豫之也宣九年冬便謂書爵見其暴陵中華宣十年冬則謂書爵乃直辭不以楚為罪焉書楚子入陳則謂楚子能討賊書楚子入徐則謂書爵非豫之也以不誅誅之也即一楚子之爵或以為褒或以為貶或以為無褒無貶他如桓十年冬書齊侯衛侯鄭伯來戰于郎乃謂稱爵以著其罪姑舉此一二以例其餘則書爵一欵何褒貶誅罪皆寓此一字之間如天淵之相懸乎經文書人諸傳皆以為貶也如齊人侵我西鄙楚人滅夔楚人圍宋其貶之也明矣然楚人殺夏徵舒則曰人衆也人人得而誅之也荆人來聘則曰嘉其慕義自通故進之也此又以書人為豫之之辭焉然其義尚多不可一端盡曰有寡而稱人者有衆而稱人者有微而稱人者有諱而稱人者有國亂無主而稱人者不惟貶黜諸侯大夫不足以該此人字之意而豫之亦無定論也只此書爵書人二者竟無定義而其他義例又不可勝數矣是故古者史官必有書法如諡法之類今皆不可考矣因其文核其事以論其世雖左氏未必盡當而他又何足據哉諸侯薨大夫卒禮也春秋于魯君皆書薨於列國君皆書卒列傳謂書薨尊魯君也書卒貶諸侯之失臣道也此皆舊文未暇悉論然魯君令終曰薨而被弒者亦書曰薨何哉傳者謂其諱國惡也且曰均之為薨而其文各不同如莊公正終則曰公薨于路寢曰葬我君莊公是薨必有其地葬必有其時也隱非正終則曰壬申公薨而葬亦不書閔公亦然似乎得其情矣然桓公弒也曰公薨于齊不有其地乎曰葬我君桓公不成其葬乎可見書地書葬亦不足為定例矣蓋春秋魯史也在魯國且然又何疑于列國之卒葬耶魯國臣子固當諱國惡矣而列國之諱獨非其臣子之真情乎况弒多出於嗣君權臣不以實赴故列國不以弒告而魯亦據其所赴告者書曰卒此必然之理也然則史以卒書孔子於二百年後獨能得其真情而改舊史乎知此則知列國或有雖弒而書卒者皆舊史也如趙盾許止書曰弒者亦舊史也信以傳信疑以傳疑孔子何所加損於其間哉弒逆大惡也春秋隨事立文誠有之矣無非紀其事之實以垂戒也若各隨各傳以觀其釋義果可一律齊乎蓋有公子公孫弒其君者不書公子公孫謂惡其大惡自絶於先君故去其屬籍以示討賊之義如衛州吁之類是也有稱公子公孫者謂人君寵任太過以致其亂故録其族屬以謹履霜之戒如鄭公子歸生之類是也有名其為子者謂見天性之恩曾犬豕不若矣如楚世子商臣之類是也有以國弒如莒弒庶其晉殺厲公者見其君無道國人共欲弒之示不敢肆然民上也他如趙盾在外而書弒謂欲以示天下無逃惡之地也許止不嘗藥而書弒謂欲以長天下親愛之心也諸如此類似乎得其義之精矣然皆以意見為之説也何也弒之時其人情事變各有不同故各因其赴告或略或詳而書之耳矧既曰弒矣又何必于弒之中一一窮其原情以定其罪而又有輕重於其間也雖然隱閔本弒而書薨豈特魯為然哉如楚子糜齊侯陽生鄭伯頑本皆被弒而不赴告故史皆因其赴告而書卒耳可見聖人無一字加損於其間也孰謂千載以下可各以意見出入人弒逆之大惡哉蓋亦枉用其心矣古者諸侯卿大夫士悉命于王朝有罪則請于王朝非諸侯所得専殺故五禁有無専殺大夫之條也春秋之時列國咸専命亦専殺之矣然春秋所書同一殺也有稱國以殺者有稱人以殺者而稱人稱國又有書名不書名之别傳謂稱國以殺者國君大夫與謀其事不請命天子而擅殺之也義係於殺則止書其官如曹殺其大夫宋人殺其大夫義係於人則兼書其名氏如楚殺其大夫得臣陳殺其大夫泄冶是也然又有稱人以殺不書其官而止書姓名如鄭人殺良霄者或曰書人以殺殺有罪也不書名非其罪也殺有罪而又非其罪是失有罪而誤及無罪也如此則不書官而止書名者是殺有罪也彼殺有罪而大夫不名則是殺無罪矣二説不合故或又以為大夫之下闕文或以為不書名者衆也果以為衆則晉殺三郤陳殺二慶矣何以書名以為闕文則史何闕文之多哉噫或稱國也或稱人也官之與名或書或不書而又有書及者或因弒君而及大夫或因殺大夫而及公子或因殺大夫而及大夫者止書其名而去官其説不一皆不足以盡其義也是故善讀經者固不可略其所有亦何必益其所無而深文以求之哉經文所書歸取二字諸傳因文立義其説多端大抵內取外邑曰取外取內邑曰取而內自取內邑亦曰取也外歸內邑曰歸外以人之邑與人亦曰歸外自入其邑亦曰歸也然其所取之義謂何蓋外歸內邑始取而終反之彼其願償我也故曰歸齊人歸我濟西田是也外以人之邑與人外之意也順其意而書之亦曰歸晉人來言汝陽之田歸于齊是也外以邑賂我而樂於賂也亦曰歸鄭伯使宛來歸防是也內取外邑強以力奪之也故曰取取郜防取訾婁是也外取內邑亦強以力而見奪則亦曰取齊人取歡及闡是也外侵內邑而內取之宜曰歸矣而亦書曰取謂強其所不欲償也取濟西取汶陽是也只此二字如此牽合初看亦有理原其經文謂史法果如是焉否乎况歸曰來歸取曰伐取種種不齊惡可各以己意務使經義之必我從也滕子來朝謂魯桓弒逆既不能討乃先鄰國而朝之故聖人削其侯爵而降之為子辨者有曰滕朝桓罪其身可也何為終春秋之世不復稱侯而以一人罰及後世哉又曰本時王所黜也然使時王能黜諸侯則春秋不必作矣果如其言豈獨滕乎薛本侯也至莊始書伯何也杞初稱侯至莊稱伯僖時稱子文時稱伯襄時復稱子又何也况杞之初本公爵耶殊不知當時大國不過公侯之爵在小國不敢與之抗且不敢與之等故咸自降損以朝會大國求免其侵伐之辱耳况爵尊則貢獻之儀隆稍自貶損則儀物亦減如子産爭成之意故其言曰昔者天子制貢輕重以列鄭男服也而使從甸服之貢所以懼其不共也滕薛杞之降得非自降以求其禮之殺耶若如胡氏黨惡之説不惟聖人不敢貶謫當時諸侯而諸國又將何詞以解之乎或問聖人述而不作之言亦只是如此説若春秋一字一義非聖人裁定安足以為萬世之經曰聖人信而好古子何為不信聖人之言蓋易書詩禮皆經也易自伏羲畫卦文周繫詞孔子不過贊之而已矣然猶曰皆聖人之文也詩書禮樂從古以來不知該幾千萬卷孔子刪書止存百篇刪詩止存三百篇定禮止存三禮而已未嘗於古人詩書禮樂加減一字也何獨於春秋而疑之蓋孔子之意只是刪繁就簡為天下萬世存其經常不易之道故於易書詩禮只是有減無增所以為萬世之經也知易書詩禮之所以為經則知春秋矣又問古之史官其褒貶書法果有所傳受乎曰古之天子國君各設有右史記言左史記動一言一動必書之史策曾謂周公經國獨於史官無書法耶且古人世為史官故世掌書法觀老聃為柱下史晉董狐楚倚相俱是何等人品其于國家政事反不能斟酌字義以書之何足以稱史乎特其所書者頗繁孔子不過因魯史以刪削之耳然則何為只據魯史筆削便能使亂臣賊子懼也曰聽子之言終是為舊時見聞纒縛故不能於孔子誰毁誰譽直道而行處見得端的未免有所疑也子知詩之風乎知風之有二南乎一部國風中間多少出於當時閭巷婦人女子之口然孔子亦只是刪其無關風教者却未嘗於婦人女子之詩增損一字如何能感發人之善心懲創人之逸志乎魯國史官曾婦人女子之不若乎信得孔子於各國之風雖出於婦人女子者不必增損一字自足以致人心之感創則於魯史書法未嘗增損一字而能使亂賊懼者不待辨矣自隱元年至末二百四十餘年魯之史官秉筆以書者不下數十人縱使書法有傳而數十人中所見各别則雖同一事例而所書者各徇其所見則其文亦不一也孔子生於三百年後以為我聖人也我即天也一一縱筆改之盡得其實是以司馬遷待孔子也且司馬遷從上古以來各徇其見聞意識以記之反在孔子上一等矣此等識見安足以明春秋經本易而傳反難之何也事迹之參錯與經文間有異同將信經乎而傳則各有來歷將信傳乎而經文原未詳書此所以愈覺其難也經本明而傳反晦之何也義理之精深於經文似有發明但欲合各家之傳以明之則人各一見既無所慿欲止據一傳之義以明之則字各一例彼又每每自有抵牾此所以祇見其晦也然則竊義于諸家各有所採何哉吾從其同而易者不敢肆力於其異且難也故事與經同雖欲不從不敢也苟事與經異吾知從經而已矣縱有不詳敢不遵夫子闕文之教乎吾從其簡而明者不敢勞心於其鑿且晦也故義不背經雖欲不從不敢也茍有未當吾將以俟後之君子而已矣敢不遵夫子闕疑之教乎所以吾惟即其易明者略述其事或直陳其義以請質於三代直道而行之人耳况易則易知簡則易從夫子之教也若云艱深難測則夫子何不止留各國之信史以垂世乃使後世徒費精神於謎語以遙忖聖人必不然之旨哉是故處千百年之下懸想千百年之上逞一人測度之臆見以穿鑿聖人筆削之真精則吾豈敢或曰事文皆述古矣竊取之義何謂哉曰記謂屬辭比事春秋之教也事即桓文之事辭則史之文也明矣是故屬其辭比其事而大義昭然何必深文核事以晦其義也即如趙東山因日月以明類謂以日為詳者則以不日為略以月為詳者則以不月為略其以日為恆者以不日為變以不日為恆者則以日為變甚則以月為異其以月為恆者以不月為變以不月為恆者則以月為變甚則以日為異而日月之法又相經緯似乎極精密矣但既曰凡桓文之盟不日雖公會不日矣又曰凡晉主夏盟桓日而晉又非主夏盟者乎既曰內離會不月外會公不月必參會後月矣又曰凡魯桓之會皆月而桓之會豈皆參會者乎既曰內外侵伐皆不月矣又曰凡魯桓會伐皆月果諸侯之惡獨魯桓為甚乎且曰桓之盟不日信之也莊一十三年十二月甲寅公會齊桓盟于扈何為而日之歟葵丘之會盟既曰書日以别之矣而首止􅑔毋何為而不日之歟以此觀之常變詳略莫非以己意為之如之何而可以為定例哉或問趙東山春秋屬辭子謂其止得比事之例而非屬辭之義何也曰彼於各國諸侯大夫卒葬會盟侵伐稱國稱氏稱名各為一類事固可以比而觀也豈辭之相屬哉然則屬辭何謂也即每嵗每時每月止書數事中間削去不知幾何如莊三十二年八月癸亥公薨于路寢冬十月己未子般卒公子慶父如齊閔二年秋八月辛丑公薨九月夫人薑氏孫于邾公子慶父出奔莒文十八年春王二月丁丑公薨於臺下秋公子遂叔孫得臣如齊冬十月子卒夫人薑氏歸于齊季孫行父如齊宣元年春王正月公即位公子遂如齊逆女三月遂以夫人婦薑至自齊夏季孫行父如齊公會齊侯於􅊭州公子遂如齊六月齊人取濟西田即其文辭聨屬其真情大義何至簡而至明乎又如敘齊桓之霸僖三年秋齊侯宋公江人黃人會于陽穀冬公子友如齊涖盟楚人伐鄭四年春王正月公會齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘夏楚屈完來盟于師盟于召陵齊人執陳轅濤塗秋及江人黃人伐陳冬十有二月公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳五年夏公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止秋八月諸侯盟于首止鄭伯逃歸不盟其中或間一事者有之而聨屬上下詞觀之其大義何待傳注後明也此所謂屬辭之義也以此求諸二百四十二年孔子竊取之義可默識矣夫以胡傳為是也孔子雖得遂其行夏時之志而實已冒夫生今反古之愆以陽明先生之説為是也孔子雖得逭乎擅改正朔之非而亂臣賊子知所懼然武王周公何有於欽若昊天敬授人時之道恐二説俱未當也何也時未改月未改以子為嵗首者止以新時周之命而使臣民之朝賀則以十一月為嵗首耳其所以順天道授民時商周與夏一也孔子修春秋其事則齊桓晉文其文則史據事直書一仍其舊特揭春王正月以大一統正所謂竊取之義也是故時令統於天書春所以奉天時也則凡奉天時違天時者俱不待辨矣紀法統於王書王所以尊王章也則凡遵王法倍王法者俱不待辨矣奈何於孔子簡易明白之書反以義理穿鑿之也况易曰兊正秋也書曰惟十有三年春會于孟津詩曰維暮之春亦又何求如何新畬於皇來牟將受厥明周禮中春令會男女論語莫春浴乎沂其時未改可證也易臨卦至于八月有凶書惟一月壬辰旁死魄詩四月惟夏六月徂暑周禮正月之吉始和禮記王制二月東巡狩五月南巡狩之類其月之未改可證也何為不證諸五經而止執雜記正月日至與諸漢儒之説不以悖天時誣武周即以變王法誣孔子也且前乎周為商之建丑矣伊訓惟元祀十有二月朔不可以證商之改歲未改月乎後乎周為秦之建亥矣月令十二月數將幾終嵗且更始不可以證秦之改嵗未改時與月乎至於諸儒又每以前漢厯律志為據嘗讀漢史文帝二月詔曰方春時和草木羣生之物皆有以自樂又二年春正月詔開藉田上親耕以率天下之民夫漢初承秦至武帝始改正朔茍以藉田耕于正月之春草木生於二月之和二詔為可信也則又何待武帝之改賈誼之請乎如此之類略舉其一二已耳諸儒何為不究其義且不考其詳也故孟子曰盡信書不如無書元年春王正月天有定時王有定法天時順則萬物理王法章則萬國寧此古今之大義也雖世代沿革不齊一治一亂而得此則治失此則亂又皆歷歷不爽毫髮孔子修春秋乃曰其義則丘竊取之而其義維何要惟奉天時尊王法也觀其首揭元年春王正月六字書法可知矣彼大哉乾元在天為春在人為王稱君為元首元后正此意也惟天子即位始得改元以統一萬邦春秋所書元年者魯隱之元年也周天命未改魯可得而改其元乎故書元年即書春書王書正月而魯之改元其是非褒貶一展卷可具見矣况春秋天子之事也其必書春者所以奉天時也使天下曉然知天時不可悖則其中所書或順天時或悖天時者不待辨而自眀如夏城郎夏城中丘八月壬午大閲冬十有二月隕霜不殺草李梅實之類其不時為何如也必書王者所以尊王也使天下曉然知天王不可違則其中所書或遵王法或悖王法者不待辨而自明如初稅畝作丘甲作三軍新作雉門及兩觀與夫大雩大搜丹楹刻桷之類其不法為何如也况書元年於春王之上可見元惟王者之所自出書正月于春王之下可見正朔非諸侯之所得専以元與正朔而不遵乎天王則其餘禮樂征伐之専擅者可知以秉禮之魯國而且改元則其餘諸侯之僭亂又可知矣此聖人筆削之義非徒不以豫奪之柄豫魯而魯之是也非也亦自不可逃也若曰孔子志欲行夏時故以夏時冠周月是本欲正天時尊王法以誅亂賊而先自犯之矣所謂知我罪我果在是哉夫衆言淆亂必折衷於聖經而易書詩禮其所載時月不一而足也且周特改嵗未改時與月又皆班班可考也奈何後之人徒信漢儒而其釋經如易之八月有凶書之惟一月壬辰詩之七月周禮正月之吉始和皆傅會舛謬豈特春王正月為然哉但釋經本以明天時也聖人筆削之大義炳然于卷首先已晦之矣則其中書法原簡易明白反為諸傳所晦貿貿千百餘載可勝慨也故于易書詩禮凡時月之可考者敢并録之以請證于尊經之君子云易證未改時月漢之興也適際書焚儒坑之後其文獻不足徴也已然易獨以卜筮存而文王孔子乃後儒之蓍龜欲考周之時與月幸有周易在也按四時十二月二十四氣七十二候見于周公時訓其説則本諸夏小正者夏后氏之書孔子得之杞者也夏建寅故其書始於寅周建子雖改嵗於十一月而授民時巡狩蒸享皆與夏時同故其書始于立春是説也不特有證于周公七月之詩而孔子贊易其有取於時訓亦可證也説卦傳云坎北方之卦也震東方之卦也離南方之卦也兊正秋也於三卦言方則知坎震離兊各主一方矣於兌言正秋者秋分也兌言秋分則震春分離夏至坎冬至為四正矣復大象曰先王以至日閉關所謂至日冬至也則復為冬至姤為夏至而十二月消息之卦可知矣豈惟孔子為然哉文王三分天下有二以服事殷其不改殷之正朔無疑也易卦辭作于殷末故繫辭謂易之興其當殷之末世乎然于臨卦辭曰至于八月有凶夫臨觀二卦本相反也十二月建丑為臨卦象二陽在下八月建酉為觀卦象二陽在上則是建丑為臨建酉為觀本一定不可移如此為臨如此為觀其序不可紊即使殷改十二月為正月則八月乃夏正之七月矣于卦為否既不得謂之觀抑謂之遁哉果信臨觀相反而八月有凶之説于十二月建為酉于卦為觀則殷時月令亦猶夫夏小正周時訓也三代未改時與月也彰彰著明矣何獨于春秋之春王正月必謂周之改時改月孔子揭夏時以冠春秋之首哉書證未改時月按周書泰誓首云惟十有三年春大會于孟津則孟津興師乃春時事也武成篇首云惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商厥四月哉生明王來自商丁未祀于周廟越三日庚戌柴望大告武成既生魄庶邦冡君暨百工受命于周又戊午師渡孟津癸亥陳師于商郊甲子昧爽受率其旅若林會于牧野所記月日當亦不差書傳以旁死魄為一月二日推之四月無丁未庚戌其誤認魄死姑置勿論蓋每月望時明全生則魄全死所謂旁死魄者其一月十七日乎如一月十七日為壬辰則戊午當在二月十四日癸亥為二月十九日甲子為二十而丁未庚戌在四月哉生明後既生魄前也以是并考之春大會于孟津惟戊午王次于河朔牧誓時甲子昧爽王朝至于商郊不在二月之中旬乎夫以二月中旬謂之春而周未改時與月無疑也夫何證周之改月者緣漢律厯志武王伐紂之嵗周正月辛卯朔戊午師渡孟津明日己未冬至書傳本諸此然周書云春而漢志云冬至既以悖謬自今言之月朔魄死其果然乎後人踵漢儒之誤莫知折衷聖經多此類也然證之書也豈特周未改時與月已哉欽若昊天厯象日月星辰敬授人時萬古帝王之要道也如日中星鳥以殷仲春日永星火以正仲夏宵中星虛以殷仲秋日短星昴以正仲冬堯典未改可證也如正月上日受終于文祖二月東巡狩至于岱宗五月南巡狩至于南嶽八月西巡狩至于西嶽十一月朔巡守至于北嶽舜典未改可證也夏正建寅不必論巳殷正建丑如伊訓惟元祀十有二月乙丑大甲中惟三祀十有二月朔即此觀之舉元祀三祀而止云十有二月固見殷以建丑為嵗首而其未改時與月也不從可證乎後人過信漢儒謂其改時改月者以殷之嵗首既在建丑之月即以建丑之月為春正月周之嵗首在建子之月即以建子之月為春正月均之以冬為春一以大雪節為立春一以小寒節為立春也謂改月不改時者以春夏秋冬之時令節候不可更置惟嵗首在丑則丑為正月嵗首在子則子為正月但殷則冬正月春二月三月四月周則冬正月二月春三月四月五月有不同耳謂孔子必欲行夏之時故于春秋以夏時冠周月者則以所書正月從乎周所書之春從乎夏雖曰春正月實則冬正月凡月朔皆魯史之舊文而時序乃孔子之微意是又改時不改月之説也要皆求其説而不得故從而為之辭耳欲證周之時月盍亦求之書乎詩證未改時月詩三百篇除商頌外皆周詩也居周之時凡發之為風雅頌賦比興者即咏歌乎周之時臣民之分也邠風七月之詩周公作以訓誥成王而七月流火九月授衣傳謂七月為夏正七月也其果然歟蓋火流於七月衣授於九月葽秀於四月蜩鳴于五月霜肅于九月場滌於十月稽諸天時人事以及物類之動植雖欲不謂為夏時焉不可也抑知周之時月其即夏之時月乎蓋周正建子為天統是特改乎嵗焉耳其與夏商有不同者謂其改嵗不同非謂改嵗即改乎時與月也奈何自改時改月之説興後之人徒知信漢儒不知考證于三百篇之周詩也久矣至訓周詩而以夏訓之其亦未知雅頌諸篇所用時月皆七月之類乎小雅出車章有曰春日遲遲卉木萋萋鶬鶊喈喈采蘩祁祁周頌臣工章有曰維暮之春亦又何求如何新畬於皇來牟將受厥明使周果改時則春日暮春必夏之正月也正月安得有遲遲萋萋喈喈祁祁之景而來牟安得有將熟之徴乎小雅六月章有曰六月棲棲戎車既飭四牡騤騤載是常服十月之交章有曰十月之交朔日辛卯日有食之亦孔之醜使周果改月則六月乃夏之四月十月乃夏之八月也四月既不可以興師而八月日食即為日月之吉凶乎小明章曰二月初吉載離寒暑曰昔我往矣日月方燠是日月方燠雖欲謂其非夏正建卯之二月亦不可至于四月維夏六月徂暑秋日淒淒百卉具腓冬日烈烈飄風發發其未改時與月也又不待訓釋而自明矣况唐風曰蟋蟀在堂嵗聿云莫七月第五章曰五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下穹窒熏鼠塞向墐戶嗟我婦子曰為改嵗入此室處即此細細玩之時至十月遂為改歲之圖與歲聿云莫蟋蟀在堂之咏無異也茍謂為夏正月也則其去改歲為尚逺何為遽有入此室處之嗟乎然則周正改歲于十一月而不改時與月也又不待取證雅頌而燦然悉見矣可知武王改嵗以新其命令而其欽若昊天敬授民時者如故也縱使武周能改乎時與月也凡日月星辰之度昆蟲草木之變武周必不能改也又何疑焉是故改時月之説後儒之謬也後之人膠固其説讀周詩不推類以考證于風雅頌之各篇也其繆妄又何如哉禮證未改時月周禮一書周家之憲章也孔子志在春秋而行事之實見諸春秋所以書天時書玉章其書法一本之周禮豈徒有見於六官之首必稱惟王體國經野使萬邦曉然知天王之當尊而著為春王正月之書法哉即如冬夏致日春秋致月以辨四時之敘如中春晝擊土鼓吹邠詩以逆暑中秋夜迎寒亦如之如禁仲冬斬陽木仲夏斬隂木如中春之月令會男女觀于此則周之時信未改也不然冬至當在九月夏至當在三月中春當在十二月矣周禮未改時而春秋所書之春非即周禮之春乎如冡宰司徒司馬司冦皆云正月之吉始和布治教政刑于邦國都鄙乃縣治教刑政之法于象魏使萬民觀象挾日而斂之觀于此則周之月信未改也不然則正月當在夏正建子之月謂之始和不可也若以和布為義以始和布治于邦國都鄙為句亦謂其和協而布之則和布與正月亦相需矣猶可以句義文釋之也天官冡宰篇凌人掌冰正嵗十有二月令斬冰三其凌春始治鑑若周果改月則十二月為夏正十月矣安得有冰可斬也若周果改時則建子之月即為春矣又何待春始治鑑也况質諸邠風二之日鑿冰沖沖三之日納于凌隂時月皆吻合耶周禮未改時月而春秋所書正月非即周禮之正月乎他如魯論記于春秋時也曽點言志云莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩咏而歸使時果不同于夏正則暮春為正月矣斯時也沂果可浴舞雩果可風耶孟子作于戰國時也云嵗十一月徒杠成十二月輿梁成使月果不同于夏正則為九月十月之時也農功未畢何暇于徒杠輿梁之舉耶至若月令作于秦吕不韋也季冬之月云日窮于次月窮于紀星回于天數將幾終嵗且更始専而農民無有所使天子乃與公卿大夫共飭國典論時令以待來嵗之宜設使時月非夏正則秦之嵗始在十月矣斯時也日果窮于次月果窮于紀乎可見孔子之春秋一遵乎周公之周禮也而改時改月之繆不容掩矣或曰先輩謂周改時月其所據者亦禮記也孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖七月而禘孟獻子為之也斯言出于雜記宜亦可徵而可信矣曰明堂位非禮記歟季夏六月以禘禮祀周公于太廟是六月謂之季夏則七月非仲夏日至不待辨也况七月而禘乃云孟獻子之所為則獻子之言又安足信哉此所以觀會通然後可以行典禮即禮記一書雜記與明堂位安所折衷而孟獻子一言與六經孰得孰失也噫知周禮六官一統之以惟王知周禮布政必始之以正月而春王正月之書法孰謂周孔有二道哉二霸譎正孔子曰晉文公譎而不正齊桓公正而不譎此聖人即春秋之旨以定二伯之優劣也昔者宣王中興伐玁狁威荆蠻使之竄伏荒陲屏氣息迹不敢內顧自平王東遷周道復衰時無宣王之盟無吉甫方叔之佐是以荆蠻醜類浸爾跳梁入蔡伐鄭侵陳圍宋讎狠狼戾所向披靡幸賴小白重耳相望而興或盟會以聲其威或克伐以折其氣是以虐焰不逞中原少寧則二伯之功亦云盛矣考之經筆其行事何終始相背馳也請備論之以伸孔子之説周惠王以惠后之愛欲廢太子鄭立王子帶而小白親率諸侯會世子于首止以定其位此正天下之功也至重耳敗楚未幾已致天王于踐土則與首止之盟異矣及惠王即世襄王以叔帶之難懼不得立使告於齊小白於是率諸侯以謀之此定王室之功也至重耳會溫未幾又盟王人于翟泉則與洮之盟又異矣小白以禮義柔中國故盟會諸侯八然後有陘之師則先禮義而後征伐者也重耳以兵革威中國故未嘗盟會諸侯遽有城濮之戰則先征伐而後禮義者也小白之服楚先侵蔡以示其威又次于陘以耀其衆及楚畏服遣師乞盟於是結盟而還未嘗接刃則志在於全師而已及重耳戰楚城濮則先侵曹伐衛及夫執曹伯畀宋人以怒之然後合四國之師一戰屠楚兵革之威疾若風雷則報楚之功與小白異矣小白盟楚之後楚雖不敢慿陵大國而滅弦圍許滅黃伐徐連嵗侵軼不少衰止至重耳既敗楚師不見經者七年雖徐許小國亦無楚患則服楚之功與小白又異矣小白之伯也諸侯未服固嘗侵伐之然不過伐其國之人臣使諸侯自懼而後已故莊十七年執鄭詹鄭伯遂同盟于幽僖四年執陳轅濤塗陳侯遂盟于首止此皆未嘗執諸侯也至重耳則執曹伯以畀宋人執衛侯以助元咺而曹衛兩國終不與其盟會則其所以服諸侯者異矣小白之伯也伐戎者三救諸侯者四城國者三雖不能盡成其功然驅攘夷狄救恤災患其於諸侯亦不可謂無功也至重耳則戰楚之外不復有攘救之功故三十年狄侵齊而晉侯不能救三十一年衛還帝丘而晉侯不城則其所以勤諸侯者又異矣夫二伯行事載在春秋其相戾如此竊嘗究其心矣方小白之伐楚非不欲戰也然當春秋時諸侯恣橫干戈相尋殘民暴骨不勝其患小白主伯方崇禮義去侵伐以救當時之弊故端委正笏雍容乎壇陛之間兵革不施而諸侯已諭其志又况當時楚雖浸強其患尚小不過侵擾鄰境若蔡鄭諸國而已及齊侯一出楚既畏服則召陵之師盟而不戰小白之心也然而夷狄之性易以威制難以信結故自齊伯而楚之驕暴甚於曩時至伐宋大國執天子上公脅制諸侯使束身從已齊魯之君俯首帖耳委命下吏無復慙色中國之風於是一變矣故重耳之興尚懷仁厚不奮兵威則何以折楚而懲艾諸侯哉然則晉之伯又不得不用征伐也雖然小白之會止致世子重耳之盟乃召天王其罪之輕重與其心之譎正固不待較而明矣雖然循流究源則小白之罪又加于重耳何則春秋之作為尊王也當周之衰諸侯跋扈忽傲天子君臣之禮掃地殆盡所賴於振興者二伯而已使小白主伯之後即帥諸侯朝天子以令天下則重耳雖不臣安敢致天王哉惟小白不朝京師致王世子是以晉文得侈其惡無所嚴憚論春秋之義則小白之罪誠過於重耳矣嗚呼賢如二伯且假尊周之名而忘其實况當世諸侯哉孟子謂三王之罪人諒矣春秋疑義孟子曰詩亡然後春秋作其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣所謂義者如一字之褒一字之貶皆由聖人之直筆故亂臣賊子懼也嘗引伸觸類觀之多有所未諭者果可執一論之哉如善惡必以實書而後知勸懲義也宋襄公執滕子而誣之以罪楚靈王弒郟敖而赴之以疾亡是春秋皆承告而書曾無筆削以垂勸戒其義果安在也左氏論春秋之義有云或求名而不得或欲蓋而名彰其果然歟即此而引伸之趙鞅以無辭伐國貶號為人杞伯以夷禮來朝降爵稱子虞班晉上惡貪賄而先書楚長晉盟譏無信而後列此論人倫臧否直道而行是也奚為齊鄭楚國有弒君各以疾赴皆書卒昭九年公子圍弒其君郟敖襄七年鄭子駟弒其君僖十一年齊人弒其君悼公而春秋但書楚子卒鄭伯髠頑卒齊侯陽生卒嫉惡之義果若是歟齊荼野幕之弒事起陽生楚靈乾溪之厄禍由常夀而春秋皆損其首惡捨其親弒反歸罪于乞比齊陳乞楚公子比如是則邾之閽者私憾射姑行欺激怒奚為不書弒歟春秋固多為賢者諱也狄實滅衛因威耻而不書河陽召王成文美而稱狩書法如是固以存中國尊天王而亂賊知懼又何在歟哀八年及十三年公子再與吳盟皆不書桓一年公及戎盟戎實豺狼非我族類非所諱而諱之何歟諸國臣子非卿不書必以地來奔則雖賤亦志如陽虎盜入于歡據陽關而外叛傳具其事經獨無聞何歟諸侯世嫡嗣業居喪既未成君不避所諱此春秋法也何為般野之沒皆以名而惡祝之殂直曰子卒而所書有不同歟君謂之弒卿士以上通謂之殺此春秋義也桓二年宋督弒其君與夷及其大夫孔父僖十年晉里克弒其君卓及其大夫荀息夫臣當書殺而稱及與君弒同科何歟定六年書鄭滅許以許男斯歸而哀元年書許男與楚圍蔡夫許男既滅矣而重列諸侯舉兵圍國又何歟蓋春秋記他國必慿來赴之辭而來者所言多非其實或兵敗而不以敗告或君弒而不以弒稱或秋葬而春赴或春崩而夏聞而史官之所記者已不能盡録其實矣况古者國有史官各具列其事觀汲墳所記皆與魯同如殺其大夫執我行人鄭棄其師隕石于宋其三事並出竹書紀年惟鄭棄其師出瑣語晉春秋是語多古史全文故曰其文則史孔子修春秋不過仍史文之舊也加以史策有缺文時月有失次如此之類孔子其敢以己意增損于其間哉孔子不敢以己意增損其間則讀春秋者亦不當以己意揣摩而文飾之惡可執一以論之哉齊人歸田春秋時國莫強于齊晉列國不服則興兵搆怨以侵其地服則相為好會盟誓以其地歸之而示之以恩無非攝服其心使其常聽命於我也定公十年春秋書曰公會齊侯于夾谷繼以齊人來歸鄆歡龜隂田左氏謂齊犁彌使萊人以兵劫魯侯孔子相魯公使士兵之齊侯將享公孔子辭故齊服義來歸田公羊則曰孔子行乎季孫三月不違齊人來歸田穀梁則曰兩君相揖齊人鼓譟欲執魯君孔子止之故齊歸田至司馬遷作史記乃曰齊請奏四方之樂旌旄羽祓矛戟劍撥鼓譟而至孔子以為夷狄之樂何為至此景公麾去之齊有司又請奏宫中之樂優倡侏儒為戲而前孔子使有司誅之景公歸而恐乃歸魯之所侵鄆汶陽龜隂之田以謝過後揚雄用其説曰齊人章章歸其侵疆胡氏則謂夫子以禮責齊而齊人歸地書曰來序績也自今觀之曰左氏則云犁彌言孔丘知禮而無勇若使萊人以兵劫魯侯必得志按春秋中國之會不知其幾未嘗有以兵劫人景公圍薑伯魯方請成若以兵劫何以示諸侯乎借使有之左氏以為萊人穀梁不言萊人但曰齊人公羊又都無此説但曰孔子行乎季孫司馬又不言劫公之事但曰奏夷狄之樂優倡侏儒為戲數者之説更相背戾將誰信乎且左氏謂齊人加于載書曰齊兵出竟不以甲車三百乘從我者如此盟孔子使兹無還對曰而不反我汶陽之田吾以共命者亦如之故司馬遷亦謂歸我汶陽龜隂之田據汶陽田與此所歸之田自别稽之地志鄆田屬廩丘縣經書公居于鄆是也歡在濟北蛇丘縣經書公會齊侯于濟是也龜隂古梁父縣詩奄有龜蒙是也此皆魯地乃若汶陽則齊田也成公藉晉之力取齊汶陽田未幾齊睦於晉晉侯復使韓穿來言汶陽之田歸之於齊自此歸齊之後魯不可得也而鄆田之失自昭公失國齊取此以居之昭二十五年書齊侯取鄆是矣六年又書季孫斯帥師圍鄆即此年齊伐我西鄙之時失之則不得以此田為汶陽之田明矣左氏何得以孔子請歸者為汶陽而司馬遷亦謂汶陽田歸我耶杜預注曰三邑皆汶陽田夫汶雖濟陽之道在魯西北境實汶上之陽盡屬齊也閔子騫曰如有復我者則吾必在汶上矣言欲北踰齊也齊人刺襄公曰汶水湯湯以此見適齊何疑若三邑果皆汶陽則經又何不直書曰齊人來歸汶陽田也是故胡氏襲諸説亦以來歸者齊人心服而歸之而謂夫子自序其績不知春秋之作正以明賞罰僭亂也方三家僭亂之極陪臣執國命近有寶玉大弓之盜逺有叔仲圍郈之變聖人果得大用於魯期月而可三年有成曽不能一振魯之頺綱乃區區自書其績以示後世乎説者意夫子嘗為大夫於魯必有其功孰知夫子雖暫為大夫遭定公孱懦三家専肆未幾齊歸女樂即致政而去矣歸田之事於聖人何與哉嗟夫論古人當論其世春秋之世何世也諸侯力爭喜怒無常與之隙則橫見侵奪與之好則侵地復歸非獨齊魯為然故曰無非攝服其心使其常聽命於我是也此年魯與齊有隙齊國伐我者再公亦兩加兵于齊逮是及齊平為夾谷之好會齊人謂魯服已故鄆歡龜隂之侵地復歸于我亦如宣公之時齊人嘗取我濟西田及宣公事齊經則書齊人歸我濟西田哀公之時齊嘗取我鄆及歡及魯睦於齊經則書齊歸歡及闡若以此歸田之功出自夫子則濟西之歸歡闡之歸為誰之力乎又以他處止書歸此書來歸雖夫子自書其績何嫌之有此又求之不得其説從而為之辭本以美聖人適以誣之矣噫夾谷之會雖魯與齊平孔子必具左右司馬以行所謂臨事而懼有􅊀無患於此具見之也此則不可不知孔子墮三都定公十二年春秋書曰夏叔孫州讎帥師入郈季孫斯仲孫何忌帥師墮費冬公圍成説者謂孔子為政于魯言於定公曰臣無藏甲大夫無百雉之城使仲由為季氏宰墮三都於是叔孫先墮郈季孫將墮費公山不狃以費叛將墮成公斂處父以成叛此蓋左氏倡之公羊附益之司馬遷遂從而記焉若果謂孔子用事三家信之如公羊之説則墮三都者乃三家之意也何用叔孫帥師而後墮費公又何為而自圍成乎三家必自帥師以墮私邑則非三家樂為之可知既非三家樂為之則非夫子之謀行乎三家也又可知矣豈有聖人見任于定公見信于三家欲墮私邑雖公自圍之而猶有不能墮者乎觀是年築蛇淵囿非所宜築也大搜于比蒲非所宜搜也聖人不能諫而止之徒書之春秋以譏之耶又何惡三家之舞八佾歌雍徹不能救正之徒形之於慨嘆耶况十年經已再書叔孫州讎仲孫何忌率師圍郈矣比年之墮郈墮費圍成謀出夫子則前年之再圍郈又誰為之謀而使之圍耶夫以三家之僭亂日久天子之禮樂征伐尚皆専為之彼其治兵積甲髙城浚池以張大其私邑夫子雖仕於魯安能一旦遽使之墮名城出藏甲乎考之論語曰公山弗擾以費叛召子欲往弗擾即不狃也誠如諸儒之説則三都之墮一出於孔子然弗擾以費叛而召之欲往何前後自相背馳耶此無他諸儒以前年齊人歸田之功由於孔子故三都之墮亦必由孔子也且左氏曰費人襲魯公入于季氏之宫登武子之臺費人攻之弗克入及側仲尼命申句須樂頎下伐之費人北又公斂處父同墮成則曰我將不墮公圍成弗克夫好謀有成孔子平日之言也今使費人得以自魯入及公側及公圍成而終不能下乃欲以此歸美孔子可乎哉殊不知此乃陪臣據私邑之始三家欲墮之而不能盡墮也借使此舉實由孔子亦不過借三家之甲討陪臣之罪因而復強公室而卒未之遂耳夫何功之有雖然夫子曰禮樂征伐自諸侯出十世希不失自大夫出五世希不失又曰祿去公室五世矣政逮大夫四世矣故夫三桓之子孫微矣此正夫子作春秋之旨也惟諸侯僭天子則大夫必僭諸侯惟大夫僭諸侯則陪臣必僭大夫惟祿去公室政逮大夫之日久則陪臣出而乘之三桓子孫不得不微也當斯之世正陪臣執國命三桓子孫微弱之時也是以內則有陽虎藏寶玉大弓外則有陪𨽻據私邑以叛侯犯臣叔孫者也而以郈叛是郈非叔孫之所有矣公山不狃臣季氏者也而以費叛是費非季氏之所有矣公斂處父臣孟氏者也而以成叛是成非孟氏之所有矣由三家之僭竊已極當希不失之時而見侮於家陪耳故前年已再圍郈弗克今乃帥師圍郈以墮之者病其強而毁之也叔孫既墮郈公山不狃懼將及己而又叛故三子挾公以圍之耳噫三家繕兵積粟求以富私邑弱公家及私邑既強公家既弱而陪臣又為之患亦若三家之禍魯也故春秋書之以為亂臣僭竊之戒傳春秋者不得聖人垂訓之意反欲以此歸美聖人則春秋又何以傳為哉桓不書王古者國必有史而史貴直筆謂凡事必據其實以直書之則其善惡自見未聞敢以己見私賞罰而褒貶之雖至于黜天王亦罔有顧忌而為直者是故春秋提綱揭領惟元年春王正月乃一書本義所關年必次以春所以明天道也春必次以王所以明王法也王必次之以正月所以明一統之正朔也惟天王正朔之義明則一書之中凡其尊天時奉王章守一統之正朔者不必同而同歸于聖人之所是凡其悖天時逆王章自外於一統之正朔者不必同而同歸於聖人之所非此春秋書法所以明白簡易不待考諸列傳所紀載而是是非非昭然于聖經之茟削也信乎春秋天子之事也然一書之中書王正月者九十三王二月者二十一王三月者一十九無事首時亦冠以王之一字而獨於桓公不書王穀梁以為桓無王其曰王何也謹始也胡傳曰桓無王而元年書春王正月以天道王法正桓公之罪也桓無王而二年書春王正月以天道王法正宋督之罪也三年以後不書王者見桓公無王與天王之失政而不王也是桓公無王而歸罪於天子矣信斯言也孔子操筆削之權天子失政亦可黜也已况春秋列國如桓公者不可勝記而天子皆不能討則自平王以後王盡失政而無一可書之王矣嗟乎縱使王無可書孔子以匹夫而操乎黜天王之權方欲修春秋警亂賊而躬犯黜天王之罪如是而可以為春秋乎如是而可以為孔子乎諸儒欲歸功孔子使孔子罪不可逭何其鄙悖至此也且不書王者謂王失政也然四時不具不足以成嵗觀二百四十二年之間有日無月者十四有月無時者二桓十七年五月無夏昭十年十二月無冬惟桓四年并秋冬月日皆不書亦將以天道不時而黜之乎不然何為不書王者所以罪王而不書秋冬者非所以罪天乎所以定公元年無正月穀梁謂先君無正終則後君無正始是又因先君并黜後君也已此皆不通之甚也或者又以王不頒厯故不書王而秋冬月日之不書者亦將以厯之未頒故天時亦不􅊀也耶僖公二十八年冬下無月而有壬申丁丑至於夏五郭公不惟公字差誤并五下月字亡之即此可類推矣何也或史文先闕而孔子未之改或孔子偹文而後又脫陋皆不可知故曰吾猶及史之闕文也使一一穿鑿為之詞焉不惟春秋之義不明而以擅黜天王誣孔子又執罪我春秋之語以證之其侮聖賊經何可勝言哉春秋總論甚哉説經之難也非説之難能明聖人之意則難矣非明聖人之意之難也能不牽于先儒之説則難矣彼以為聖人之意有異於人乎哉是是而非非善善而惡惡雖堯舜與塗人同而儒者之談經則曰此非聖人莫能修之自遊夏所不能贊一詞者也於是乎平也而詭求之易也而艱尋之其尊聖人彌甚其説彌長而作者之志益以漓矣嗟乎獨抱遺經之嘆豈非千古之所同哉今以春秋疑義言之夫説春秋者類古所稱大儒也愚何敢以末議干之雖然六經將與天地無終極而存非一人一世之私論也敢效其一得而試擇焉夫自秦人滅學六經缺如漢律既除孔壁始出諸儒掇拾煨燼各名其家源逺而流益分其間悖理亂真者固不少矣然易詩書之屬皆以理勝理悖矣吾以理絀之其誣可立而辨也春秋以詞勝事往矣吾從千載之下隃度之孰徴之而孰信之乎是故説經者宜莫難於春秋也自漢而下説春秋者亡慮數百家而獨公羊穀梁左氏最著胡氏最晚出亦最著至我昭代胡氏得顓立于學官而諸家之説幾盡廢矣夫左丘明與孔子共觀史記者也公羊穀梁皆受業子夏者也洙泗之淵源非逺筆削之微旨尚在然而口説流行事多失實如一盟也或以為蔑或以為昧一工築也而或以為郿或以為微一會也而或以為屈銀或以為厥憗一卒也而或以為君氏或以為尹氏蓋自名氏土壤已瞀亂不能盡原况乃雌黃出其唇吻去取慿諸胸臆如馬端臨以意增損之疑者又焉能元覽精詣劵合聖人之志乎至安國之作傳也總三家紛紜之説而録其似彚諸家後出之論而采其長義例炳然衮鉞斯備可謂素王之忠臣麟經之鼓吹矣雖然以為不詭於聖人之教則可以為盡得聖人之意則未也夫經之為言常也聖人之作經也簡易明白不以微曖難明之詞眩天下也不以操切繳繞之文誤後世也要以是是而非非善善而惡惡以昭人道以達王事如斯而已矣乃胡氏一時進御之言意存納約是故不免激焉而偏索聖人之精義於一字筆削之文是故不免核焉而深名其可通者曰常例而強名其不可通者曰變例是故不免窮焉而鑿如以春王正月為行夏之時是以周人而改周朔於義則不順以夏時而紀魯事於史則不倫非夫子之志也以王不稱天為貶夫事干宗國往往諱稱其過舉而尊為共主則以小故削奪之非夫子之志也以子滕侯為懲亂賊之黨夫躬為篡逆者無誅焉而斥天子之命侯且并其子孫而奪之抑何其慘礉而無謂也非夫子之志也以止不嘗藥而被之以大惡之名是以微文而致重辟於人申商之所不為也非夫子之志也卒楚麋也而曰扶中國信矣其扶中國也曷不重貶子圍之會而姑諱其殺是登叛也非夫子之志也書歸田也而曰以天自處夫其詞無褒烏在其為序績也據事而直書之而必曰以天自處是尊聖人之過而誣其實也非夫子之志也絶筆于獲麟而曰以天道終是以瑞應神其書也且麟之出經曷故焉蓋所謂感麟而作者近之而必曰文成而麟至非聖人之志也又有甚焉者以為夫子託二百四十二年南面之權以誅賞人也夫孔子雖聖周人也賤而自専災且及之苟無其位不作禮樂斯非孔子之炯戒乎夫子作春秋以尊周室而􅍀然攬夫天子之權以誅賞天下奪人之國貶入之爵去人之氏沒人之族操縱自我而無少顧忌焉則是干紀犯義已為戎首而顧以履忠效順責僭王之吳楚専魯之三家也豈不盩哉然則孟氏所謂天子之事者何曰天子之事者猶云周天子之法耳當是時姬轍雖東典刑猶在春秋而有所刺譏夫子曰非吾奪之也是文武之法之所誅也春秋而有所褒進夫子曰非吾豫之也是文武之法之所賞也知我者文武之法明謂我能尊周也罪我者僭亂之罪著則諸侯惡其害己也此亂賊所為懼也第令夫子以匹夫自為天子天下不軌之夫羣起而議其後之不暇而又誰能懼之是故學春秋者明于天子之事之一言則孔氏筆削之大義昭昭乎若揭日月而行而彼紛紛者之説可不辨而息矣繇斯以談漢儒之説經也専門名家抱殘守缺不相合而相存其失也固宋儒之説經也師心背古揣摩傳會有所合而不必盡合也其失也鑿彼固焉者信滯而不通矣然而是非錯陳若蒼素然不可淆而雜也鑿焉者雖辨而可喜矣然而慿私臆決若射覆然不可幸而中也是故三傳立而聖人之教分聖人之志則未失也胡氏之傳出而聖人之教尊其得者固多而失者亦不少矣愚竊考春秋之作實孔子口授弟子退而異言流傳失真其有無疑似之文蓋不特魯魚亥豕而已惟左丘明論本事而作傳於經文為近其餘百家之説未可定以為不刋之訓也學者誠超然逺覽本之以經翼之以左氏折衷之以諸家之論要以會夫子存人道達王事之意而不牽于一曲之議此亦所以恢宏聖緒而俟萬世于無窮矣若必強經以從己徇傳以蔑經即使左氏授簡公穀操牘愚猶未敢盡信也况其它乎噫此難與拘儒道也書尹氐卒經者常也萬世不易之常道也或經有難明賴傳以發明者有之若因傳疑經使人信經不如信傳何以傳為哉各經皆有傳雖其中識有不齊而理在人心可各緣心之所明以折衷之無難焉春秋則據事明義而事在古人匪後人可得而增減者四傳各發一義未免揣摩測度於一字之間此以為是彼以為非雖無疑者反因之以生疑縱自相抵牾亦弗之恤獨左氏尤為後學所宗信焉得非以其文簡而事核耶然世之信傳而疑經不曰左氏一本乎古人之信史事各有據則曰春秋止提其綱非左氏則事不可詳不曰聖筆如化工非後人可得而擬議則曰經多微其文隱其義惟傳或先經以始事後經以終義而傳與經相並矣故信傳不信經豈特尹氏卒而已哉即此一事言之左氏曰夏君氏卒稱子也不書姓為公故曰君氏公羊曰尹氏者天子之大夫也其稱尹氏何貶曷為貶譏世卿也穀梁大意與公羊同一以為婦人一以為男子左氏則并經文而改之矣處千百年之下斷千百世之上將何所據決其是與非也但信左傳者莫不曰左氏即論語左丘明耻之丘亦耻之其是非好惡本與孔子同且丘明親見魯史孔子不過于魯史中舉其要而筆削之耳故傳文所書之事無一字不可信者今惟以義決之君非姓也曾有為君之母即可以君為氏乎若以為小君之君則有經書小君者曷不書小君而以子改母之氏乎且夫人書薨未有書卒者惟姒氏孟子書卒蓋姒氏哀公妾母而卒之者定公薨哀未君也孟子乃昭公娶于吳為同姓有别嫌之義故不敢以小君之禮薨之耳隱公何為卒聲子哉或不稱氏如文四年夏逆婦薑于齊宣元年遂以婦薑至自齊莊元年夫人孫于齊僖元年夫人之喪至自齊雖不氏各有其義隱何為欲明自家之攝位使母本有氏而反無氏至以君為姓也若曰聲子本衆娣姪之倫不當書諸册史官以吾君之母不可不書又不可以夫人之禮書乃不得已變其文法曰君曰卒舛謬甚矣况可以為孔子特筆耶不知天子于臣或賜之姓而君氏之書果隱公以子而錫母抑史官孔子以臣而賜君母之姓乎或問公穀謂尹氏為周世卿曾有男可以氏稱歟曰小雅節南山篇云尹氏大師為周之砥秉國之鈞不平謂何國既卒斬故家父作此詩以譏之胡文定引以為證而有取於公穀之説也且尹氏卒于隱三年桓八年天王使家父來聘安知此尹氏非即家父之所刺者歟觀論語季氏舞于庭季氏旅於泰山孰謂男之必不氏耶且不必逺證書尹氏卒下文書武氏子來宣十年書齊崔氏出奔衛亦可以武氏崔氏為婦人乎昭二十三年秋書尹氏立王子朝二十六年書尹氏以王子朝奔楚兹非尹氏不書名之證乎至謂尹氏卒是舉尹氏一族卒之矣然則舉武氏子一族而來之舉崔氏一族而奔之又舉尹氏一族而立王子朝乎矧即一尹字之可改則凡書中字義難明者傳皆得而改之矣或問尹氏不過天子世卿耳于春秋何所關而卒則書之又何必書一世卿之卒而寓譏刺之意歟曰仕者世祿此王迹也以世祿者皆世爵而世執政焉官不擇人世家専擅國政即如前書尹氏卒後書尹氏立王子朝亦可以觀周政下移之漸矣雖尹氏専政非一世一人詩人于其生也詠以刺之而孔子不之刪史官于其卒也書以記之而孔子不之削凡此皆王迹世道之變而周室漸微悉于此乎寓之矣故孟子曰王者之迹熄而詩亡詩亡然後春秋作只此一端可推也讀詩與春秋豈徒瑣瑣于一譏刺褒貶間耶尹之於周也崔之於齊也正宜屬辭比事而觀之矣噫左氏所傳者事也改尹作君且傳其所以書君氏之實果左丘明耻之之人乎抑親見魯史而實書其事乎即一可例其餘矣是故傳經者毋擅改經文以從己意為天下萬世存經常之道以俟後聖斯善談經矣書納子糾春秋之義莫大乎正名定分而名分莫大乎父子君臣是故立嫡以長不以賢立子以貴不以長此先王立子之法萬世不易之禮也子路問桓公殺公子糾召忽死之管仲不死孔子推管仲一匡九合之功已有定論後學于糾白應立次第尚有疑義及讀春秋各傳謂經書公伐齊納子糾齊人取子糾殺之乃云所納應立雖未在位稱子蓋糾母魯女白母衛女則糾貴為當立也後人不過以才論則小白賢以黨論則小白以國髙為內主以事論則子糾見殺而小白成一匡天下之功殊不知糾貴之應立也果知糾白正不正之分則春秋于糾稱子實與嗣君未踰年稱子同一例書納者納所當納也書殺者殺所不當殺也故公穀以桓為篡伊川謂桓公終不免罪在王法所當黜皆因書子之義以推明之耳例觀忽與􅊳皆鄭莊子也二子爭立經書􅊳歸于鄭鄭忽出奔若無異辭又書鄭世子忽復歸于鄭則世子當立何待他辭而後明乎申生奚齊卓子皆晉獻子也經書殺其世子申生又書里克弒其君之子奚齊何歟奚齊以庶孽易嫡嗣未踰年見弒而曰君之子者明國人不以為嗣獨獻公意欲立之耳是君獨以為子者蓋以明世子無罪見殺而奚齊不過其君之子也雖云子之其實外之以此發揮似乎義至精而至密矣執此以明經文書子之義宜其無不協者然昭二十二年夏書單子劉子以王猛居于皇秋劉子單子以王猛入于王城冬十一月王子猛卒夫嗣君必踰年而後稱王禮也猛立未幾稱之曰王王不稱名禮也復名之曰猛既以尊居王位而卒乃稱子何哉蓋猛為次嫡兄終弟及實宜王也然未成君故不得不從夫未踰年稱子之例可見未踰年而稱王者權天下之大變君道也王稱名卒稱子者正天下之大綱子道也如此而發明子字意義猶可説也但猛與朝雖均為王之子也猛嫡朝庶宜不同稱既書王子猛又書尹氏立王子朝其意義將何以别之哉若曰王子朝非尹氏所當擅立者則書法又重在立字而子字非所重矣是王子猛王子朝嫡庶可以同稱又無變例之可解則子字之義至此亦説不去矣所以論春秋者不可執一字為定論而孔子竊取之義豈若後儒拘泥穿紐如法家串招之謂哉故舉書子一端可類推矣季札來聘後世評品古人賢否是非皆據其生平行實以定褒貶而春秋則皆當時史官據事直書是非自見非若後代紀録前代者比也今以司馬溫公作通鑑朱子作綱目合生平素履以定書法者謂春秋亦若是焉孔子竊取之義不愈晦耶即吳子使札來聘一事言可知矣左氏謂其出聘通嗣君也公羊則云賢季子也何賢乎季子讓國者也穀梁則云吳其稱子何也善使延陵季子故進之也身賢賢也使賢亦賢也皆豫辭也胡氏獨謂札者吳之公子何以不稱公子貶也辭國而生亂者札為之也故因其來聘而貶之示法焉然既云因其來聘而貶之則貶在史官矣蓋來聘在三十餘年之前辭國在三十餘年之後而史預貶之有是理乎又謂仲尼于季子望之深責之􅊀故不以讓國為賢而以因讓生亂致貶是據其終生行實以為當年書法刻亦甚矣然則豫之者當乎彼杜預謂通嗣君通餘祭嗣也蓋二十五年遏為巢牛所弒餘祭始立至此始使札通上國然歟公穀之賢皆謂仲尼因其能讓而賢之且以稱名為許夷狄以其名成尊于上也但協于此塞于彼豫皆莫逹其所謂義也已况三傳皆稱其賢雖胡氏亦謂責􅊀賢者然則後人悉賢季子果安在哉嘗從而考之經書閽弒吳子使札來聘如此則札之來也孰使之也豈夷末新即位當先君未葬嗣君即命臣往聘鄰國而謂其使賢亦賢歟人臣于君死之月出使請觀周樂謂之身賢賢歟必不然矣有謂書弒與使中間書士鞅來聘杞子來盟二條均在五月之下可知札去後吳始告喪故追書閽弒於札聘之上耳是札以五月遣六月至也此其使之者餘祭也札使在餘祭未死之前故至魯皆以吉禮行而歷觀周樂由其未聞喪耳果如此則傳稱通嗣君者非矣且傳謂季札遍觀周樂由此聘齊厯鄭適衛如晉宿戚聞鐘致譏刺孫文子是譏人聽樂而君尚在殯乃自請觀樂曾謂札之賢而宜有是事歟蓋札之讓國自古稱之矣當夀夢時弟不可以先兄無可受之理也當夷未卒而辭及光殺僚以位讓而又辭非可受之時也謂札之讓國非賢可乎特謂以此書札來聘而稱之貶之則舛矣或問季不受國因光謂季子雖至不吾廢也知其讓非真心後必有禍是矣獨不當伸大義以致辟于光乎又不當選宗中賢者立之乃汲汲於延陵之去乎生亂之貶宜不免矣曰觀札謂汝殺吾君吾受汝國則吾與汝篡也汝殺吾君吾又殺汝則父子兄弟相殺無已時也是亦度之審矣縱使札能殺光立賢而肯為此耶或問胡氏謂其辭國生亂者不在餘祭王僚之後蓋當夀夢時即宜法季厯以上承父命則吳之亂可早弭之矣是亂雖在昭二十七年致亂則在襄二十六年故析義極精非聖人莫之能修也曰王季當大王之沒也向使泰伯仲雍無荆蠻之逃在季只知以父命為尊而受其國歟且以此為仲尼責偹賢者何獨于夷齊乃稱其求仁而得仁歟或又問胡氏謂貶札者以春秋多變例聖筆有特書荆楚無大夫而屈完書族王朝下士以人通而子􅊳書字諸侯公子以名著而季友書子母弟之無列者不登其姓名而叔盻書氏皆賢而特書者也季札略以名記比于楚椒秦術之流非貶而何曰吳楚荆蠻之國秦介戎狄之間故使皆不氏然則書楚子使椒來聘貶楚并貶椒矣使薳罷來聘果罷賢于椒而褒楚並褒罷歟中國皆書官矣如衛寧俞晉荀罃韓起齊國佐宋向戌各國之良也來聘皆書名不書官皆從夷狄之變例而貶之歟如此則仲尼竊取之義何居曰吳楚皆變而夷者也楚文稱荆成王稱楚既而稱人稱子與中國諸侯並以爵稱于吳亦然要在見吳楚日漸強盛與中國抗衡也春秋之始聘問不通既而來聘者大夫公子稱名見其漸與中國通也各書其實其義自見烏可盡以後人作史書法例觀之哉楚子入陳亂臣賊子天下大惡也討亂誅賊天下大義也大義不明則臣弒君子弒父人類變為禽獸而天理澌滅盡矣憂世道者寧能忘情于扶植綱常之舉動哉是故陳恆弒君孔子沐浴請討正以亂賊人人得而誅之雖魯君臣不能倡大義以奉天誅逆然請討一舉聞者心寒至今如赤日當空迅霆奮地猶有生氣設能聲此大義舉于當時有不痛快人心者哉即孔子春秋之修即其請討之意所以誅亂賊明大義也二百四十餘年亂臣賊子交臂接踵靡國不有雖齊桓晉文不能以此仗義執言惟楚莊伐陳執夏徴舒聲其罪而戮之終春秋僅見此舉其視一匡天下九合諸侯者不其尤光烈哉奈何諸傳或以為楚子帥師而稱人者貶之也不與外討也或以為楚子伐陳而書入者不使夷狄為中國也雖實與而文不與也文定則云稱人者大惡人人之所得討也先書殺而後書入者討其賊為義取其國為貪一褒一貶義利判而豫奪公乃聖人傳心要典也即一事之書法華衮鈇鉞並存亦嚴矣哉雖然儒者每每論義理析秋毫似乎無容喙矣但似義非義毫釐千里不可不察盍即是年經文所書而會通以觀之乎春王正月夏楚子陳侯鄭伯盟于辰陵公孫歸父會齊人伐莒秋晉侯會狄于欑函冬十月楚人殺夏徴舒丁亥楚子入陳納公孫寧儀行父于陳一嵗間所書止此是先後皆楚之盟會侵伐中間書魯與齊晉所會所伐屬其辭而比其事孰得孰失不其昭然較著也哉何也當時不幸無王猶幸有伯以其能誅亂討賊能攘夷而安夏也齊晉襲伯主之餘烈魯國稱信義之是崇晉人所會者狄也齊魯所伐者莒也以欑函比之辰陵果孰為要乎以伐莒較之伐陳果孰為重乎引伸觸類春秋所書事文極簡而其大義實炳朗簡策中原不待傳而後明也矧既謂之義則義孰有大於討亂賊者諸家據左氏楚子為陳夏氏亂故伐陳謂陳人無動將討于少西氏遂入陳殺夏徴舒是傳謂楚子本先入而後殺也若先入後殺則楚子罪不可解矣聖人乃以討賊為天下大義不可以楚故而不明故改書先殺而後入惟與其討賊則罪從末減而經書入焉但入亦不順之辭納公孫寧儀行父皆入陳時事所以文定謂其假討賊以縣陳乃聖人誅心之筆法也文法先後間心迹功罪並著謂其析義不精不可矣嗟夫以今揣古安知非楚兵入殺在前楚子之入原在後乎安知先殺後入之文本皆魯史之舊而經未之改或左氏總書入為省文乎惟其不信經文反因傳以疑經之先後緣文生解猜度聖心使誰毁誰譽直道而行之公既不得大明於當時其文則史其義則丘竊取又不得暴白於後代使人皆得以逞私智侮聖經鰓鰓焉以洗垢索瘢為大義得毋有類於非義之義乎或問聖人未嘗顛倒魯史要在觀其世道升降扶植綱常是矣論迹誅心非聖人其誰能之曰五伯降假之豈獨楚莊為然若以心言齊桓責楚晉文信原豈真心哉説者謂楚莊果有討賊之心則當執徴舒于辰陵之盟不必興兵以入陳俘歸生于四年之伐不必降鄭于肉袒此皆以王道律之也然而彼善于此以是年齊晉魯之會伐反在楚之下風而莊王殺夏徴舒亦何必求􅊀以反掩其討亂賊之大義乎詩亡然後春秋作六經之教其要在于淑世道正人心也人心正世道淑此詩與春秋所以後先之一揆乎彼春秋有關于人心世道也人知其筆削豫奪義例謹嚴其權一歸之天王而欲考王者之迹悉于春秋乎見之天下無王而有王王者無史而有史故曰春秋天子之事也至于春秋之所以作也孔子因詩亡王迹熄故不得已而竊取其義但王者之迹尚存十一于千百乃所以繼詩之亡而存詩之教焉微孟氏其誰知之然則詩之亡也果黍離降為國風而雅於是乎亡歟風雅皆詩也雅亡而風存曷為而謂之詩亡也不知風雅頌皆王者迹也王迹熄則詩雖存而實亡矣何也古者天王巡狩列國使太師采民風焉諸侯朝之方嶽必陳詩而觀之以行黜陟之典逮周室東遷則天王不巡狩諸侯不會朝矣又何有于詩之陳而采也夫巡狩朝會之迹熄矣王迹熄而詩亡也非歟况關雎葛覃王者閨門之化也繼世雖無文王后妃之德而是詩樂作於房中則王者正家之迹尚于此乎存故師摯之始關雎之亂洋洋乎盈耳哉想自太師摯適齊而關雎之樂無聞矣雍詩王者祀宗廟之樂歌也繼世雖無天子穆穆之德而周之祖廟主祭者天子也助祭者辟公也聞其歌樂尚可以想見先王之迹及三家以雍徹而大夫僭用天王禮樂謂王迹尚存於祖廟可乎哉湛露彤弓故武子曰昔諸侯朝正于王王宴樂之于是賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王于是乎賜之彤弓一彤矢百旅弓矢千以覺報宴今陪臣繼舊好君辱貺之其敢干大典以自取戾觀武子之言王迹存乎否也曲此推之他如鹿鳴王者乞言之迹也四牡勞使臣也皇華遣使臣也采薇遣戍役也出車勞還卒也枤杜勞還役也魚麗嘉魚南山王者燕享所通用也蓼蕭桑扈魚藻王者燕諸侯也天子不乞言則鹿鳴不形之歌樂而王迹不既熄乎乞言之迹熄鹿鳴雖存而實亡矣即鹿鳴雅頌皆可類知不然三百篇至今存也謂之詩亡何哉孔子懼王迹熄也因詩亡而作春秋正以存王迹耳是故其事齊桓晉文其文則史其義則丘竊取之揭春王正月冠諸首而據事直書筆其有關於人心世道者削其無關於人心世道者自周王世卿以及列國諸侯大夫凡奉周正朔而禮樂征伐一遵乎王者之成憲則不待孔子褒之天下莫不以為是凡悖周正朔而禮樂征伐或違乎王者之憲章則不待孔子貶之天下莫不以為非是是非非燦如日星王政雖不大行於天下而猶存于春秋之筆削此所以亂臣賊子懼也猶之乎告朔之禮不行於魯廟而餼羊存焉尚可以循迹而求其實也已噫嘻知孔子愛禮存餼羊之心則作春秋存王迹之意知我罪我蓋深有不得已者在矣雖然懼亂賊即所以存王迹也即所以淑世道正人心也周道陵夷使天下尚知周王之當尊者固由於桓文之霸使桓文之徒尚知王者之大義不敢踰越凜然有所畏忌者孰非作春秋之功哉但王政不得大行于華夷而其迹僅存于春秋猶愈于詩亡而并亡其迹乎然則詩雖亡而未亡者以有春秋在也信乎詩也春秋也其教一而已矣要之王迹存則治熄則亂孔子刪詩作春秋不特存王迹于當時而萬世之下咸得以見先王之迹者皆其澤也遐想三百篇未刪之前其雜亂當何如也二百四十二年之行事未筆削之前其繁蕪當何如也雅頌各得其所孔子特刪其無關於王迹者耳豫奪一循乎史文孔子特削其無關於王迹者耳惟其一經聖人手筆遂為不刋之典奈何後之儒者既曰孔子降黍離為國風又曰孔子以夏時冠周月是居下悖上生今反古而反以悖亂王章加孔子也於心安乎哉今詩與春秋具在也安得知尊王之義者與之共論孔子之心圖書編卷十二
