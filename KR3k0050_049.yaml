body:
  text: 圖書編卷四十九明章潢撰廣東總鎮圖敘今天下言防禦之略者北固重而尤必急于南也蓋以北之情在目睫之前而其備常在千里之外南之形在萬里之外而其患乃在蕭墻之內也何者北人所居絶逺其欲入侵中國率行空虛之地數百千里然後乃抵塞下候望誠謹則可以知其聲響而為備故曰在千里之外當路塞去畿郡逺者數百里近乃一二日耳羽書可且夕逹也故屬者常得以天下之力而備禦故曰在目睫之前也夫兩粵者絶南裔夷之交也山海溪洞之蠻與諸郡形錯壤接並耕而爭食之其居懸逺深昧性禍賊喜殺保固恣睢不狎話言苟得而已不顧死亡自昔上仁之所不懷而強武之所不讋也獸集鳥散亭隧隔塞之所不得施甲楯劒矢之所不猝備也而粵之民無歲無夷寇之駴矣然而天下知北害而未睹南憂者北近而南逺故曰其形在萬里之外而患在蕭墻之內也夫粵之夷非能為中國害者也然夷不滅則粵無小康之期憲祖晣其然故開府建節宿重兵於蒼梧授大臣以不禦之柄而專進退之為萬世規深逺然後碩畫之老屢建誅討之勳薦紳大夫攄鈎深致逺之慮鷹揚爪牙之士效執訊獲醜之力士馬甲兵之盛燀赫乎逺方技擊蹶張之用便習於士伍志亦信矣以此致伐奚不克以此批亢搗虛奚不至餘孽不足殱而交南可坐制然且公顧以為憂者何也嗟乎是乃公之所以為憂者也先王之致武也固曰勤恤民隱而除其害夫粵之用兵亟矣粵人之力屈久矣侵盜之虞有迫而師旅之奉無緩斯坐敝之形也詩曰彼旟旐斯胡不斾斾憂心悄悄僕夫况瘁夫旗章之盛委屬之重可以為寵已而君子以為憂也憂故慮詳慮詳故事善事善則氓庶豫氓庶豫則武節奮此勝算也兩廣總圖兩廣古百粵地陶唐氏命羲叔宅南交時已通中國矣周宣王時召虎疆理淮濆遂至南海其詳不可考已周衰吳越更大及楚滅越其君長散處海上猶蒙故號以自殊有甌越駱越之屬甚蕃故曰百粵秦始皇帝利粵之犀象珠璣乃使尉屠睢統五軍監祿鑿渠以通糧道屠睢人姓名秦制以御史監郡故監祿一曰史祿殺西甌君譯吁宋西甌今廣西此蓋君長之名侏􅍣之語也越人皆入叢薄中與禽獸處莫肯為秦者陰置桀駿以為將夜攻秦人殺尉屠睢秦乃發適戍以備之後王翦滅楚乘勝略定其地為南海桂林象郡荔浦以南𨽻焉秦亡趙陀據兹土稱南越王漢孝武帝平南粵陀孫光降以其地為南海蒼梧鬱林合浦日南九真交趾儋耳珠崖九郡置交趾部刺史領之治蒼梧元帝時罷儋耳珠崖歷東漢末七郡如故吳仍漢制分領於荆交二州其後析合浦以北南海蒼梧鬱林三郡屬廣州治番禺餘乃屬交州治龍編尋又析置桂林今桂林府高涼今髙州髙興今化州寧浦今橫州四郡以附廣州而交州亦增新昌武平九德三郡晉初以荆之始興始安臨賀來屬尋復歸之省高興入高梁復析置廣之晉興今南陵府東官今東莞縣晉康今德慶州新寧今新興縣永平今梧州義安今潮州新會今縣七郡宋泰始中置越州與交廣並三刺史部治合浦今廉州析置宋夀今欽州南流臨漳等八郡屬之又析置宋康即高興綏建今四會縣海昌今電會縣宋熙今髙要縣樂昌始興南界今縣是屬廣州而珠崖亦稍收為郡至齊又增廣之有齊安今陽江縣永熙今瀧水縣齊康今海康縣齊樂今連州及廣西平樂齊熙今融縣越之定川抱定凡八郡梁因宋齊三刺史部增置廣衡今德英縣之西古舍涯縣東衡今南雄東楊即義安郡高即高涼郡瀧即廣熙郡羅今石城縣成今封川縣新即新寧郡越即合浦南合即齊康崖即珠崖安即宋夀等州以上俱在今廣東以督列郡又置都督府於廣使持節以總之及隋平陳并省州郡為番即廣避煬帝諱岡即新會循即龍州潮即東楊州瑞今肇慶府封即成州瀧新高賀今賀縣合即南合欽即安州羅崖諸州即東廣不能州者為縣置廣循桂三總管皆加使持節之號大業初復置郡罷州府亦尋廢唐興復改郡為州置嶺南道貞觀初置嶺南東道嶺南西道東道領韶廣連今州循朝康即晉康郡瀧端封髙春今陽春縣亷即越州羅即羅縣辨即化州雷即合州瓊即隋崖州振今崖州儋即儋耳地萬安析崖州置諸州西道領桂柳宜今慶逺昭今平樂梧潯雍諸州尋又開雍州以西諸蠻洞置羈縻州數十屬雍州光化後為楚馬氏所據五代時入于南漢時交址有丁部領者自領交址事稱萬勝王自是交址不通于中國矣宋平南漢分為廣南東路廣南西路自廣韶南梅今程鄉縣南雄英南恩惠以東傅海屬東道高亷欽化南抵瓊南縣寧今儋州萬安今萬州吉陽即唐振州與桂柳宜昭梧潯雍俱屬西路元置廣東道宣慰司于廣州海北海南道於雷州𨽻江西行中書省置廣西兩江道于靜𨽻湖廣行中書省至正末於靜亦置省焉明興以廣韶南雄惠潮肇慶高雷亷瓊十府統曰廣東桂林柳慶逺平樂梧潯南寧太平思恩田州思明鎮安十二府江泗城奉議思陵利龍向武都康八州上林隆安二長官司統曰廣西各置承宣布政使司於廣州桂林領之後降田州府升憑祥歸順洞各為州故今廣西凡十一府十一州云夫兩廣極南地也故其氣候常多暑少寒少寒故霜雪不降多暑故瘴毒間作梧以西則漸甚蓋由山勢局促層巒疊嶂茂林深箐居人如坐甑中熱鬱薰蒸故瘴瘧作焉炎荒之地大抵然也梧州府設立總府駐劄提督兩廣軍務兼理巡撫一節緣兩廣地方山川聮絡境界毗連二處賊徒頻年竊發廣東藉廣西之兵力廣西亦藉廣東之錢糧彼此相資利害相關廣西戍兵一查得先年間湖廣原有官軍一萬員名常在廣西守備以後分作兩班貴州原有官軍五千員名輪班在於廣西守備以後盡數掣回今廣西所屬二十八衛官員有官軍二萬餘員名湖廣輪班官軍五千員名除分有哨守各處城堡外廣西中軍止有官軍二千餘員名左右參將各有一千餘員名委實地方廣濶兵力寡少遇有盜賊出沒不能分布勦除及看得湖廣每年輪班官軍彼處都司衛所多將軟弱老幼不堪者補湊前來徒有虛數不得實用合無將湖廣官軍一萬員名仍舊常川在於廣西守備或于彼處都司一萬餘員名兩班輪守俱請敇湖廣巡按監察御史公同都布按三司委亷公堂上官員親詣各衛所官員將前項該官軍并把總指揮等官逐一揀選務將軟弱不堪者揀退守城就於本城見操演備禦數內照數撥補并另推選有謀有勇出世超羣之指揮二員領兵前來上班替換見今輪班都指揮薑潮翟政回司别用仍乞將貴州原掣回官軍五千員名照舊輪班調來廣西分哨地方并請敇湖廣等處總兵等官今後湖廣永州道州地方有事廣西官軍策應廣西全州興安地方有事湖廣官軍策應廣東廣西接境地方有事互相䇿應如此庶幾哨守不致缺人各軍聲勢相接遇警應援可以成事廣東水寨一定水寨照得廣東八府濱海而省城適居東西洋之中其在東洋稱最厄塞者極東曰柘林與福建玄鍾接壤正廣東迤東門户稍西曰碣石額設衛治存焉近省曰南頭即額設東莞所治先年設置備倭都司于此此三者廣省迤東海洋之要區也西洋之稱扼塞者極西南曰瓊州四面皆海姦宄易於出沒府治之白沙港後所地方可以設寨極西曰欽廉接壤交南珠池在焉惟海康所烏兔地方最為扼塞其中路遂溪吳川之間曰白鴿門者則海艘咽喉之地此三者廣省迤西海洋之要區也以上六處皆應立寨內南頭已經近設參將一員督兵三千足稱巨鎮柘林近亦請設守備兵糧之數尚應議增而已有専官皆可勿論矣今惟東路之碣石一處西路之白鴿門瓊州并海康三處各應設立一寨碣石海康每寨各兵一千二百名大小中船共四十隻白鴿門瓊州每寨各兵一千八百名大小中船共六十隻與南頭柘林通為六寨其柘林寨兵船仍合增如瓊州白鴿門之數董以將官定與信地無事會哨巡緝有警遞相追捕小賊則一寨任之大賊則分東分西三寨合任之再大則通東西六寨共任之皆以擊賊於外洋為上功近港次之若賊起此寨不擊而别寨擊之賊所起寨重治如見賊不擊或致令登岸虜掠者查照信地以失律論罪伏乞聖裁治藤峽府江論蓋自藤峽之役躬覽山川按圖諜詢父老而後稍稍知破賊之略云大抵藤峽府江相為表裏然治藤峽宜速而治府江宜緩速則賊無所逃緩則可窮要領蓋藤峽北起武宣西極龍山南阻潯江三靣雖迂猶可邏遏所慮者東奔耳然前紫荆後根薑各有間道可透林洞扼此一隅而腹背迫蹙譬之釡魚安可跳也故曰宜速至於府江北起陽朔南界蒼梧延袤三百餘里而江以東則恭城平樂賀縣通於連州江以西則荔浦修仁永安五屯抵力山羅運其間岡巒遼繞蹊蹬塞厄地曠人稀村落渙散逮乎沿江為盜則又倚林伏草倐忽往來一有濳藏莫知窟藪官軍逐捕無所因糧越壑騰岡益難輸挽未易破也愚以欲治府江則五屯永安荔浦平樂賀縣尤為要害皆宜以一歲之前屯兵積粟以能者主其稅以為常額又譸張為幻使不敢一控公門雖有向化之心無由自欵稍不慊欲即指摘其罪駕以浮言駭上官而督捕愈離其心或啓大釁此兩江通弊也昔人有言在外曰姦在內曰宄御姦以德御宄以刑治內詳而治外略弭盜之策斯其首端乎兩廣總鎮事宜廣西潯州之境萬山盤矗中有水曰潯江發源柳慶東繞至潯𢃄象州永安修仁荔浦平樂諸郡縣夾江諸山皆嶔岑嶻業其最險惡地為大藤峽今易為斷藤峽蓋有孤藤度峽澗如徒杠今斷之故名南截潯水為府江自藤峽至府江約三百餘里地惟藤峽最高登藤峽顛類百里皆歷歷目前軍旅之聚散往來可一盼盡也諸蠻以此為隩區藤峽則以桂平大宣鄉崇薑里為前庭象州東鄉武宣北鄉為後户藤縣五屯障其左貴縣龍山據其右若兩臂然峽北巖洞以百計如仙女關九層崖極險厄者亦數十處峽以南有牛腸大岵諸村皆沿江立寨藤峽府江之間為力山力山之險又倍藤峽又南則為府江周圍蓋六百里其中多冥巖隩谷懸磴絶壁入者手挽足移十步九折一失足則殞身數百仭下中産猺人藍胡侯盤四姓為渠魁力山又有僮人善待之資其鄉導探其險易擾其耕耘賊必且驚且怯各營巢穴距險為防然後以外兵諸道並入環而攻之庶可滅也若欲以旬月之間孤軍深入賊必漫走莫可窮搜故曰宜緩且征南蠻者莫利於結巢莫不利於漫走漫走則我軍不勝追逐而又有機械毒物濳發莽中畏縮逡巡曠日持久即有十萬之師未有能得志而返者也要知藤峽府江固難並舉若舉此而置彼亦非全功蓋猺獞親昵黨類即百里之外通為一家必使東破則西來者無所居停西殘則東鋌者無所寄食前後跋疐乃可禽爾故征蠻之略與禦邊殊科征蠻大舉不若遊擊之功一勦不若屢警之力也誠以精兵一萬以一謀將統之所在巡集擇其罪狀顯白者次第撲之朝擊其東暮突其西春擾其耕冬食其粟且戰且諭三年為期必惶恐乞降願還妻子然後因而撫之除其疾苦振乏扶衰比及五年馴可淳化或曰所在遊擊將無流劫之虞乎曰不然南蠻之倚山猶北人之倚馬也北人離馬不能為雄亦猶南蠻離山不能為力也若夫景泰中流劫郡邑者皆四方客寇竊名姓而起非真峽賊也雖然南蠻之俗鄙而難變戅而易欺是以衛所之豪世掌其土往往假借上官之法丁剝而户漁之而鄉老廂長歲入毒藥弩矢中人無不立斃者雖四姓諸徭亦憚之其言語侏􅍣重譯始解景泰中徭酋侯大狗等猖亂嘯聚萬人修仁荔浦力山平樂皆應之攻墮郡縣出沒山谷守臣不能制率以招撫縻之時朝廷正有邊警未遑問也天順中益縱恣發兵捕之詔有捕得大狗者賞千金爵一級竟不可得久之蔓延廣東高廉雷之境所至殘毁兩廣守臣皆得罪會憲宗初即位鋭意南討集廷臣議兵部尚書王竑言峽賊稱亂其始由守臣失䇿以招撫圖為茍安長其桀驁譬諸驕子愈惜愈啼非流血撻之啼不止為今之計當大發兵討之嶺南諸蠻有猺獠狑獞而猺類最多大抵言語侏􅍣服食詭穢巖壑林箐之與居狐狸豺狼之與羣本不可以中國之治治也致亂之由皆華人姦黠通山者誘之治法在簡其約束禁其招誘不失吾信義而已彼濳安窟穴則慎勿苛擾稍肆侵掠必早為撲滅諸蠻非有包藏不軌之謀騁武中原之志亦豈能為大患哉惟守臣平居不能禁戢撫定或姦人侵刻以激狼子野心之怒暨其倡亂則彌縫姑息徒幸茍安甘言重賄不敢忤拂使驕恣狂悖之氣日肆憑陵至令數千里之地被其荼毒然後奏調大兵禽獮草剃雖獲成功所損多矣幸雍材略可任朝廷委用亦專紀律嚴明方略素定故能使數十年深根固蒂之寇不旋踵而無孑遺功亦可述然舉十六萬之師暴露數千里之外供需轉餉府庫耗竭計其斬首將二萬級豈無崑岡玉石之慘邪雖然非雍不能辦此也其機要則在斬李英等四人將士用命蓋已得勝算已朝廷用兵可不重將權邪乃若趙充國不用辛武賢決征之策而屯田以困先零韓雍不用諸將久困之謀而深入以破藤峽此又地利夷情不同事而異形者不可執一論也諸猺雖姦桀驁悍難靖易亂然方其無事時亦皆水耕火種抱布貿絲非若遊民之不事生理者但諸衛所之臣貪縱者多却慮者少而官府及豪猾又多倚勢法為姦利得其賄則漏泄機事教誘凌掠而啓其侮不遂所求則訐發陰私誣譖垢釁以激其怒守臣瓜代無常率非久任一信其言或畏事而容姦縱慝或貪功而輕率寡謀瑕釁一開凶殘莫制中止則損威遂事則黷武而兵連禍結至無寧時况諸猺之性如禽獸然非有劑量輕重于死生利害之間也豢飬有方彼未嘗不為馴伏一拂其性則跳梁蹢躅羣死不悔而難可化誘招致其勢不至於草剃而禽獮之不已也是豈所謂王者之師好生之德哉故平居無事則當撫之以仁而必不可爽其恩信禍亂既作則當懲之以威而必不可狃于姑息制馭蠻夷之策豈復有過于此哉今觀嘉靖中二役在王守仁則因凱旋歸便而乘不備以襲之在蔡經則因首惡就擒而集大衆以征之皆可謂有功於嶺表矣然能保勦之必勝而不能保繼者之不擾能保征之必克而不能保撫者之不乖此所以暴師旅竭府庫不足以貽數十年之安也然則選將帥於亂作之後孰若慎守臣于無事之日哉至田汝成曰藤峽府江為寇雖同治之則異治藤峽宜速治府江宜緩蓋以藤峽可夾攻而賊無所奔潰府江地遐阻而人難得其要領也汝成親涉其地其説為有據此又用兵者所當知云嶺西所屬負山瀕海無地不有賊巢無處不被劫奪自府治南岸一百三十里至新興則有土名雲浮山王三坑鐵場洞官廳地黃沙徑竻行雲蕪黎洞良洞密洞料洞林洞等巢賊首某等約賊三千餘徒由新興入百里至陽春則有土名高洞雙洞崩石洞富林鴨鬬黃沙小卯白梅洞青水紅豆深掘雲青等巢賊首某等約賊二千餘徒自陽春迤東一百五十里至恩平則有土名牛牯突白靣石磨刀水關村洗馬潭十三村等巢賊首某等約賊二千餘徒自肇慶江行二百里至德慶以瀧水小江為界下曰東山有土名富祿洞柞洞上臺下臺石狗天所北涌水澗赤土歐塘柴坑東模大干火燒下甬封門大洞頭大臺尖底崩洞楊柳桐村茅坑茯芋塘邊苦竹根石背等巢賊首某等約賊六千餘徒上曰西山有土名羅旁大力石龜磊嶺甬百片大甬拱甬封門思律思遙風木甬強車教馬鞍野芊下城水口龍塘古逢等巢賊首某等約賊五千餘徒先年二山止有猺賊自嘉靖三十七年千長陳世紀招引陽春西山王德政等於儒林地靣耕種因而鳩合王德政張快馬等浪賊約計四千餘徒互相聮絡攻剽究而言之地分有水陸然東攻西竄南捕北奔其實通為一巢種性有猺浪然或倚為巢窟或資為羽翼其實通為一賊根連蔓引日熾月延破寨焚村凌鄉跨邑無論逺歲只自隆慶改元閲今四載焚掠村鎮何止數十百處劫奪商船何止數十百艘殺死民兵何止萬有餘命掠去男婦子女何止數千餘口且拘執見任職官敵傷防捕兵將凶窮惡極勢迫情危即今日南倭備極慘烈尚有疆圉之限來去之期未有入處封域為禍腹心如斯之甚者也夫肘腋之患不除倒懸之厄莫解門庭之侮不靖袵席之處難安將來疆土日以促民賦日以增陷溺淪胥咸思為變殆莫知所終矣竊以為事不一勞者不永逸計不百備者不十全今欲建非常之議而尚不免牽於稠人之算欲立無窮之業而又不能不嗇於銖兩之需此計所以多隳生靈寡幸而賊勢轉猖也故前乎此非不大征矣嘉靖三十七年專勦王三坑動兵僅及五萬隆慶三年專勦瀧陽等處動兵僅及二萬兵甫出勦賊旋嘯聚無補毫釐為禍轉酷後之視今豈不猶昔若非計處錢糧數十倍動調官兵十餘萬八道並進三月之後將舊兵掣散復以生力兵三萬維守窮巢則搜討之隙必莫能周凶逆之萌決無終殄無論善後只勦捕之初未便有觀成之理也竊照本道分守嶺西目擊地方猺浪之賊綿亘一十餘州縣盤據扼塞依阻林藪殺人越貨勒銀贖命占耕民田劫掠江道此勦之決不可一旦緩也夫亂不極則治不生勞不倍則逸不永自昔動衆入山一二月擒斬數千餘非不赫然稱盛舉矣然賊存而兵先退兵退而賊復聚此猶遺種于地無有不發者蓋始則欲求成功之速既乃不為善後之謀此嶺西之賊所以卒無底定之期今議者謂蕩平此賊非大舉不可欲大舉者非數十萬衆不可夫兵以計為本料敵者貴於得情行師者不苟動衆本道常按圖頗得其情狀矣前項山賊為窠不下三百餘大者千餘衆次者百餘衆少者數十衆總之萬餘衆止矣不相統屬無專號令其勢渙散大軍深入勢必奔潰誰與統之以攖吾前鋒昔趙充國伐先零羌虜五萬人充國所統步騎六萬人後罷騎兵留屯田僅精兵萬人不茍接戟坐挫虜謀卒之捕斬降附溺水餓死者殆盡此萬全之師也如議者必欲草剃禽獮無分玉石多上首功不計縻費不恤擾害殆非仁義之師為計之得也愚計欲圖蕩平無論先後欲動大衆必須調狼賊素畏狼狼善搜扒宜咸行廣西該道調歸順下雷東蘭那地等處狼兵以八千人自廣西貴縣登陸從信宜至電白獅子堡分路入陽春為一大哨以三萬二千人至德慶州入東山西山分四大哨合陽春為五大哨每哨另召興寧長樂南詔土兵四百人責成該道俱要素練者不得市傭充數統以參遊一員不可雜以浙兵浙兵欺狼攘奪其功反致壞事各用鄉民為鄉導四望以防遮伏進據要害相度地形設立排柵五哨結五大營每營各撥諳熟地利鄉導二十名勿輕接戰倣充國屯守之計合用枝兵俱於附近州縣土浙兵營內查取不必他調費糧復先於隘口悉以官兵鄉夫把截以八月未收成而入賊見大兵必逃竄山谷先令招主撫諭良猺不許窩藏聽其將纍重移寄州縣給白旗與插寨門大張旗榜有能投戈歸附者推還故地有能捕斬除前罪給賞亦與白旗毋殺彼勢竄食困苦于寄托將乞降恐後大營狼兵分哨窮搜不三月非擒獲即餒死矣此其不殺不辜不燔聚落不濫費糧萬全之䇿也事完之後土官弟男願留者比照左江九司事例授以世襲巡檢責以城守屬肇慶府管轄即許狼人耕種其地聽其自給數年升科免其差役化姦宄為善良變盜區為編户一勞永逸萬世之利也大率蜂房蟻穴根株之盤錯者十三州縣故其地里川原邊幅之延袤者一千餘里無論賊數之為萬為千兵鋒之為強為弱必欲盡賊則斷非十萬以上之調發不可也何者以足迹之搜捕者勢有不能周也彼為萬衆為數萬以下之議者非姑取目前之凱則素無經逺之規可以就功而非所以為地方千萬載深長計者也此兵説也層巒疊嶂澗水回溪大率猿猱之棲原非文物之土土官設置計委不踈但承調者既乏其人則經逺者可無别算倘舉曠衍之舊業槩以還民而酌邃逺之膏腴招徠佃種或十五里一屯焉或二十里一屯焉有城以守則衆情自固有産可植則生計可安兩參遊據其中兩守備峙其畔五年之後民之生息日繁盜之根株永絶即窮居之奧區皆可稱樂土也為之編圖甲改郡邑以文治之則將府俱可撤也此善後説也然此二者由前言之兵多則餉廣故非捐財至十萬以上不可舉也由後言之屯多則營築之費廣故非捐財至四五萬以上不可成也然要以振國威保民命廓輿圖復賦額非所以為浪費也費亦可無惜也一大征始事在搜勦終事亦善後經制稍疏蘖釁再萌即大征之勞費為虛費矣雖然亦未有搜勦原不淨而可以希善後者也今之論者大率謂嶺東賊強嶺西賊弱不知嶺東之為盜者即民也蓋數十年來始有之釁也其根淺嶺西之為盜者猺也實建國而來未闢之疆理也其患深故勦嶺東之賊與勦嶺西之賊為力均難而靖嶺西之寇較之靖嶺東之寇則難易霄壤矣兩山撮土普天之大誠不足云然據棲巖險之內阻以崇山護以深澗幾與世中逈一霄壤無論往代只我明極盛之朝薄海內外無思不服獨此蕞爾者旅拒王師自保區宇有丁不役有田不租有藤漆蜜蠟皮張不以上供天府蓋至於今二百餘年矣乃日阻截官商稽留命使破陷城池劫奪官帑甚至陵鄉跨邑盈野盈城戟搠嬰孩刳剔孕婦以資戲玩當事者習其如此至亦付之無可奈何以為此天成盜賊之藪也有此山川有此盜賊且其人非吾民也日復一日遂茍且因循以致斯極夫昔之幸功喜大務於闢土開疆者誠多事矣若此膚寸之區固非絶漠以北越海以南其四環盡赤縣之疆理也而乃令有異類不賔之種閲二百年冥梗如故即令都不侵軼雜處華夷不幾于族類無分動辛有之慨乎然則兹舉也豈特弭盜固所以為國家開未闢之疆土也豈獨闢土固所以為洪荒來了一段大公案也與其少發而曠持不若大舉而疾決此千古議征者不易之成䇿今兹所議之舉動誠似之矣惟是以此族為患如斯之久生民困苦如此之深大征決䇿閲二百年始就如此之難幸而兵舉賊淨所恃以剗根株杜萌蘖以保億萬載升平之福者宜如何為慮而尚可苟且因循曽幾何時又以來吾民之釁隙乎此善後之經制所以萬鈞關係更不可謂輕也今之議者有欲就調到土官查取官男統領兵目携𢃄妻小耕守者蓋以其山川促狹原不可以聲名文物治也此其見亦未盡然也且節經招取未聞有大府大州之官男肯來應募者矣其計固不可以株守有欲移守備於連灘掣營兵聽其經理於六都南鄉劄兵二營下城古蓬劄兵二營各委官提調此於守計近之矣但山川空曠日延月引萌蘖易生計亦未可經久即令盡如所云招復流民無城可據竊發之釁亦斷不能無矣至云欲就立本土之豪比照土官之例資與行糧招兵占種則又皆率易之談似難與酬迂逺之算反覆思惟在寇靖之始欲防蘖釁斷須樹兵為經逺之謀欲闢土地必須屯種然樹兵非久計也故大定之後計卒歸於建縣屯種不可以孤立也故招集之始其便合就築城查得二郡見有七大營兵除陽江電白吳川三縣海防合留三營難以議掣其四營之費以八錢為凖每月得銀二千一百兩瀧水營兵七百名南鄉營兵七百名新興四閘營兵三百名江道營船兵一千三百名以六錢為凖每月得銀一千八百兩二項共銀四千兩以四錢五分則可飬狼兵九千名以一錢九分給行糧可得狼兵二萬名歸師生厭勢必戀家留之非便伏乞就於調狼之始添調二萬名刻限正月發行二月到鎮及此收功之候適新兵到戍之期是戍兵一項之費可無資於外索矣高肇見有參遊就行遊擊督兵三千劄下城德慶守備督兵二千劄連灘以控制西山參將督兵三千劄六都恩平守備督兵二千劄南鄉或倉步以控制東山因為勦除殘孽相度地形經理屯營招到新民量兵夫護衛耕種或十五里內有曠衍膏腴之土立一屯焉或二十里內有曠衍膏腴之土立一屯焉大率兩山四哨每哨地靣約建十屯大者量住四五百家小者量住三四百家通融估算每屯土基磚砌約銀一千兩而又度地取中因形制勝以最廣適中之所為將來立縣之規制度稍宏預為儲峙蓋今之所以設將府即異日之所以開縣治者矣銀共四萬僅抵肇慶一郡之兵一歲之食計費甚少將督寇靖民安增賦撤兵其利何啻千倍是只此四萬之銀便以定嶺西千萬載太平之治假令更有加于此者亦所謂有利百姓無愛髮膚豈足以為靳乎至於招徠佃種先儘本處失業續召九江英德陽山以及江右之贑民與廣西之狼獞隨到安插每三屯委一文職一武職亷幹者撫綏經理初為茅舍以棲身繼以排柵以自固後築土圍復用磚砌山場田畝俱聽官府度地計口均給無容爭競度踰周歲之外處處俱已成屯二載之餘城城俱已鼎豎即深山窮谷之內經行所及雉堞到處嵯峨蛇虺虎狼之區風氣既開人文亦當漸著然後量地肥磽輕為科稅分圖立甲薄起徭差撤將府以鼎開縣治減武備以興起斯文即薄海內外無復有不賔之土而嶺西殘困遺黎飬安休息皥皥熙熙其地本來事簡民淳將來豈獨無盜其治安熙恬之景象必有更過於中土文物之區者矣要在斷而行之無惜小財致妨大計則盜賊斷可空疆理斷可闢田賦斷可增縣治斷可立武備斷可減兵費斷可舒而謂為天成盜賊之藪不可以聲名文物治者殆不信也德慶州上下江道與高要高明四會廣寧新興恩平瀧水各營堡及防送瀧水小江船隻原額食餉之兵共該五千七百七十七名後因地方殘破錢糧徵解不前處處減少見存之兵實止四千八百四十七名蓋缺額而不敢補者幾及千矣兵備日踈盜賊日熾盜賊日熾田里轉蕪以致錢糧轉益困乏武備轉益廢弛弊皆原於此也然以所供者營堡之兵所用者土著之輩故雖徵收或有短少給散或不依期尚幸免於噪呼求糧之患及又查得章程內一欵為預計兵食查計前欵嵗例止彀募兵周年之用其閏月照見計各兵一年應用銀二萬五千餘兩及各處原設營堡并德慶江道之兵約計每年合用工食餉銀五萬兩二項約共用銀七萬五千餘兩議勦瀧水羅旁按瀧水羅旁一𢃄乃郡縣內地距德慶州治僅隔一江去梧州總府不百里為兩廣往來咽喉奈何坐視其暴劫吾民阻截江靣為肘腋之患而不恤緣江南岸數百里山林蒙密不敢毀傷其一草一木朝廷設重鎮置兵衛果何用也霍韜嘗謂羅旁緑水之賊為害深矣而有司不肯議征非不能征不肯征也若調狼兵逹舍并官軍分為數道一自鬱林入一自高州入一自新會入一自德慶瀧水入四靣並進而梧州大兵上流振之且縱火盡赭其林木使無所蔽伏羅傍緑水之賊反掌可平也廣西土官廣西布政司領長官司三永安上林安隆右𨽻兵部武選司廣西土官一百九十七思恩田州思明鎮安知府四人思明結安下石西利州都結奉議思城上思龍英鎮逺江州結倫思同果化都康茗盈萬承全茗上下凍泗州太平向武南丹歸順安平萬承忠州思陵龍州歸德那地東蘭上隆知州三十三人左州同知一人羅白憑祥上林陀陵羅陽欣州知縣六人上林縣丞一人懷逺主簿一人桂平貴溪典史二人永平寨波羅里大洞三寨鎮安平鄉理源鎮高井寨尖山鎮周沖都樂壚古江口羅目鎮慈樂寨東鄉巡檢十三人木盤浦鏌鎁寨白石寨覃觀旺思隆鄉連城鄉武羅鄉武林鄉辛安寨東禪鎮那龍寨大約鎮寨下市界牌鎮安城鎮歸仁鎮古眉寨羣峰寨白靣寨遷隆寨西舍寨麗壁市桑江口古􅞫鎮三畔鎮三門灘大寧寨龍門寨靖寧鄉宜良鎮都博鎮新興鎮歸化鎮吉清鎮廖洞鎮江口鎮章駱鎮安湘鎮樂善鎮莫離鎮武陽中洞鎮通道鎮清流鎮思管鎮鵝頸隘保江鎮西洞鎮潯江鎮萬石鎮安永鎮縣郭鎮清水鎮李廣鎮思龍鎮東江鎮德勝鎮大曹鎮思農鎮北蘭鎮安化鎮普義鎮吉定鎮歸思鎮上保鎮金城鎮方村蒙村窮果兩江口峯門寨南源寨常安鎮龍平寨西嶺寨鎮峽寨白霞寨邉蓬寨信都鄉沙田寨樊家寨白花洞口渠樂寨金城寨八尺鎮那樓寨橫山寨南鄉南里鄉大宣鄉馱演寨鵝頸鎮都名鎮丹陽鎮周沖大宣鄉靖寧鄉大黃江口北山懷逺鎮湘山渡頭副巡檢一百二人嘉靖初年設武定州知州一人田州吏目一人臨時岩馬甲大田子甲子甲陽院思郎纍彩怕河武龍拱甲牀甲婪鳯下隆縣甲篆甲寨桑怕牙思幼候周思恩白興龍定羅定安古零那馬下旺都陽巡檢二十八人土官改流知州二人飬利上石知縣二人崇善求康右𨽻吏部驗封廣西夷總敘廣西夷嶺南右偏土瘠民獷視東道特異諸夷窟穴盤繞其間左黔右鬱荔浦東西殘破不可言大藤峽險深尤甚成化中誅鋤極慘近復跨江倚山出沒剽奪田寧梧孱諸竟卒不能扼刷桂林之北六洞為孽則北連武岡柳慶之西八寨尚存則東道懷逺府江上下半為夷巢寇竊無虛日右江岑氏猛賊雖誅餘蘖尚在三盧再叛思田更強姚鏌勦則續兵守仁撫則納侮恐數年之間復煩經略爾三江諸夷考三江諸夷其先盤瓠之裔今據廣西諸險其最驕驁者唐之西原宋之廣原今之田州大藤是也唐黃氏最強與韋氏儂氏寇據十餘州太和中經略使董昌齡遣子蘭討平洞冗夷其種落宋時儂氏世為廣原州首領後儂智高倡亂僭帝號宣撫使狄青討平之國朝成化間都御史韓雍討平侯大狗等嘉靖間新建伯撫田州破斷藤此其績之最著者也三江連亘千里半入猺夷而潯柳思田之地更為盜藪昔孔性善請擇良吏嗚呼制蠻上䇿無踰此矣黎人考黎今儋崖瓊萬州塢土蠻也塢之中有黎母山諸蠻環居四旁號黎人內為生黎外為熟黎山極高在霧靄中夕晴海氛清廓黎人時見翠尖如浮空中然其山水分流四州熟黎分𨽻諸州耕作其地供稅役生黎所居絶逺外人不能迹不供稅役至於山巔雖生黎亦不能至在唐為瓊管之地宋紹興中黎州王文滿連結西洞王承聞等攻破定南寨復犯省地廣西發兵燒燬巢穴生擒黎賊亂遂定乾道中屢招諭之生黎質直獷悍不服王化亦鮮出為患熟黎貪狡兩廣福建之姦人亡命逃居其間每鼓煽生亂我朝廖永忠既平廣東海南儋萬黎夷未附後耿天壁擊平之邇來生黎為之逋逃熟黎為之鄉導歲為州縣患不大創之四州生民無寧日也猺獞獠蠻諸夷種類考昔高辛氏有犬戎之寇下令有能得犬戎吳將軍者以女配之閲三日槃瓠含吳首至槃瓠帝畜狗也不得已配以女入南山止石室中經三年生六男六女槃瓠死後因自相夫婦織續木皮染以草實為衣服好五色裁制皆有尾形其母後歸以狀白帝於是始迎致諸子言語侏􅍣好登山壑不樂平曠帝順其意賜以名山廣澤其後種類滋蔓散處四方號曰蠻夷出後漢書其在廣西則有猺獞獠蠻之號曰猺者初靜江之興安義寧古田營州之融水懷逺界皆有之生深山重溪中多姓槃氏椎髻跣足不供徭役種禾豆山芋雜以為糧截竹筒而炊暇則獵取山獸以續食俗喜讐殺猜忌輕死又能忍飢行鬬履險若飛兒始能行燒鐵石烙其跟跖使頑木不仁故能履棘茨根枿而不傷出虞衡志曰獞者慶逺南丹溪洞之人呼為獞初未嘗至省地元至元間莫國麒獻圖納土命為慶逺等處軍民安撫使自是獞人方入省地今貴之荔浦修仁永福最多在宜山邉境及思恩者近日編入版籍謂之熟獞性略馴逺者謂之生獞梗化不可制服在欣城荔浦及天河南北西三鄉永順永定二長官司者尤為凶狠曰獠者左右兩江溪洞之外俗謂之山獠依山林而居無酋長版籍以射生為活一村中推有勇力者曰即火餘但稱火歲首以土杯十二貯水隨辰位布列火禱焉經夕集衆往觀若寅有水而卯涸則知正月雨而二月旱自以為不差舊傳其類有飛頭鑿齒花靣赤裩之屬凡二十一種出虞衡志今按飛頭鑿齒諸事陳剛中使交録亦嘗及之兹訪諸夷俱無其實姑存之以傳疑云曰蠻者有撫水蠻在宜州南康𨽻黔南其酋皆蒙姓以藥箭射生為活取鳥獸盡即徙他處有西原蠻居廣容之南雍桂之西有寧氏者相承為豪又有黃氏居黃澄洞其𨽻也有廣原蠻在雍州西南鬱江之源地峭絶深阻頗有邑居聚落出宋史今郡縣之外羈縻州洞多皆蠻地其南連雍州南江之外稍有稱名者羅殿自杞以國名羅在宜融之西雍州之西北唐會昌中封其帥為王世襲爵焉出虞衡志之數種者名雖不同其類一也今種類日蕃而各郡皆有之惟左右兩江之地居多人物獷悍風俗荒怪大率略同不可盡以中國教法繩治其氣候熱多寒少瘴癘時有蓋其居多依山故也然且有蠱毒之害焉議處猺獞夫狼兵亦猺獞也猺獞所在為賊而狼兵死不敢為賊者非狼兵之順而猺獞之逆其所措置之勢則然也狼兵地𨽻之土官而猺獞地𨽻之流官土官法嚴足以制狼兵流官勢輕不能制猺獞莫若割猺獞地分𨽻之旁近土官得古以夷治夷之䇿可使猺獞皆為狼兵矣或慮土官勢大則益難制土官富貴已極自以如天之福勢不敢有他望又耽戀巢穴非能為變即使為變及其萌芽圖之易也且夫土官之能用其衆者倚國家之力也不然肘腋姻黨皆勍敵矣國家之力足以制土官土官之力足以制猺獞臂指之勢成則兩廣永無盜賊之患矣議革通夷之弊猺獞之性本自愚直其桀驁貪狡者百中之一耳未亂先治已發計擒夫亦何難惟有罪軍民脫逃厮僕亡匿其中唆引劫奪以報私憤無藉土人鄙惡商藝遊息其中為之謀畫以分貨利是以各賊出沒不常橫行無忌緝事之設本為體探賊情一有軍機趣先走報撫安之設本為招撫猺獞寇賊生發返為掩飾是以有所倚賴敢于弄兵及其罪惡貫盈勦伐必加掾房軍牢獲其常例往往露泄使先為備狼兵進山受其私賄往往賣路縱其逃匿是以兵至則遁兵退復亂即今有事于地方先期拘集緝安撫土腳商藝禁于一室令其開報極惡村分若干亡命姦徒若干與夫地之險阻厄塞路之多少逺近或征或勦就以此輩為之鄉導有功之日免其前罪有漏泄以軍法處治其文移往來尤貴密速罔俾掾牢得以先漏調兵發兵亦然勿令自兵得以賣路則通夷之弊庶幾可革勦捕之功計日可成五屯要害按廣西五屯所居荔浦斷藤府江藤縣之中當斷藤峽右臂及白石寨十二磯濛江口之衝為諸猺要道其間山泉佳秀樹木豐麗田沙衍沃足以裕其居而遏其患洪武間立所近增置城堡集獞兵以守之借其力以為用亦一隅雄鎮也制馭大藤八寨諸巢議按粵西有曰大藤曰八寨曰連城曰六十三山曰七山等巢粵東有曰羅旁曰王母曰雲稍曰母雞等巢往歲督府重臣因粵東羅旁諸巢為地方害且數十年動衆數十萬一舉殱之兵威所振山谷為空乃粵西之六十三山等處逼近羅旁畏威悔罪乞憐求生編里輸差盡從撫處一時東西兩山并稱寧靖説者謂當時收兵大早經略事宜尚未萬全逃匿餘黨尚未搜捕乃不踰年舊日餘孽呼携濳出盤據舊巢劫掠水陸攻擾所域謂其藏匿者在六十三山等巢其紏合者為六十三山等獞欲東西夾勦滅此朝食時西之糧餉稱乏八寨濵近之民又數數請兵撫勦莫所適從而東西用兵當有先後然一省所急者在八寨兩省所急者在夾勦故當時論者謂且置八寨而先六十三山等巢則各寨悔罪如其不悛乘餘威殱之易矣其兵糧之定處兩廣用兵調粵西之兵食粵東之糧玉石之當辨則又别論也湖廣土官湖廣都司領宣慰司二宣撫司四安撫司九長官司二十蠻夷長官司五永順保靖為二宣慰施南散民忠建容美為四宣撫東鄉五路忠孝忠路金洞龍潭大旺忠洞高羅桑植為九安撫臘惹洞夌著黃洞驢遲洞施容施白崖洞思家洞五寨筸子坪搖抱洞上愛茶洞劔南木册鎮南崖椒山瑪瑙五峯石寶水盡源通塔平石梁下洞臻剖六洞橫坡洞等為二十長官鎮逺隆奉西坪東流臘壁洞為五蠻夷長官右𨽻兵部武選湖廣土官五南渭施溶上溪知州三石滑石江院場坪巡檢二人右𨽻吏部驗封湖廣夷湖廣土官皆據湖南古巫黔中地中錯辰常外連川貴溪洞深險難撫易亂彭氏富強雄脅諸司自宋逮今構結滋廣驕橫益堅國家稍有征誅輒議調發所過殘破慘於劇盜官司莫敢誰何嘉靖中王守仁討岑氏時湖臬僉事汪湊統馭嚴飭所過斂戢以故順靖之禍不獨襄楚永保之憂豈直苖夷也湖廣蠻夷實無能為但我軍姦黠之徒利其竊法可以邀功今但選精鋭常加隄防其患自息湖襄田地高下不齊農家無所蓄積斂穫未竟徵斂一空求免飢寒不可得矣乞選方靣守令大加存恤公以格物亷以律已端本澄源在朝廷而已郴桂寇與橫水桶岡事略同當時亦聲勢相倚此豈有深志逺圖特以封疆之臣因循姑息故得據險猖獗滋地方之蠧耳所幸秦金與王守仁同時舉事故諸賊不得相為應援而表裏受兵又無所逃遁藪匿故得以草剃而禽獮之不然即韓盧之搏狡兔恐未能窮三窟之誅也大抵平山寇與平中原流劫之寇不同中原流劫之寇無險固可憑無巢穴可據而勦之也當先摧其鋒鋭絶其糧餉所謂決機於兩陳之間將勇者勝也山寇則不然進未可為旦夕之患而退可以持歲月之久其克之也當先審於地利明於分合不可徒恃兵衆之強所謂多算者勝也又中原之寇患不能克既克而絶之也易山寇則王師一至斂衆深匿大衆甫還嘯聚如故蓋克之易而絶之難也廣東之斷藤峽湖貴之蠟耳山江西南贑諸山洞天討屢加而釁蘖屢萌者非以其不能絶之故邪蓋不但郴桂之患為然也鎮溪叛苖二十董朵董其亞糯噉冷噉勒亞酉十八箭紅崖卜稍小米沙流板登茅岡下水彪山小船場盤朵龍亭得洞束那等塞草子坪叛苖二十七洞頭中略留絞亞保谷恥大略琴圖盤營回寨大塘爆木岩口盤那孟瘦大唐池已鳥牌小五圖惡黨古藏板栗冷水排那廖鐡鳥巢老萊岩洞等寨貴州叛苖二十七黑潭乾溪罵勞呂喎罵沖地所塘寨蜈蚣地演平頭地恨老條龍塘茍腦山忩栗凹治古麥地抱木老見且逞普杓田坪烏牌平茶麻洞木坪等寨五溪諸蠻五溪諸蠻其先槃瓠氏之裔今湖廣廣西溪洞中諸夷皆其種類即漢光武時馬援所征服者在北魏有冉氏田氏向氏陬落尤盛唐末五代時寇無寧日宋太祖得蠻人秦冉雄以為辰州刺史諸蠻懾服蠻之最大者曰彭氏世有溪州至南宋以章惇為經略舒氏彭氏蘇氏楊氏相繼納土置沅州誠州後改誠州為靖州元雖置郡縣叛服不常國初命周德興討平五溪蠻正德間以都御史秦金討平郴桂土人龔福等嘉靖初有蠟爾山苖之亂又有筸子坪土官田興爵之亂命張嶽討平之各夷多取湖南古巫黔中地即今之辰常靖施永順保靖等處是也鄖陽流賊荆襄流逋自元已然山深土沃嵌湖廣四川陜西之間劉千斤野王剛藍鄢老人廖麻子何淮喻思俸徐學楊文政李胡子小王洪等擾黷無寧時自撫治鄖陽之設寂然樂土流逋不特為避逃計實所以利之自終南一帶東至荆襄其地饒肥間曠物産天然之利貧無育者亦合招安不得棄諸無用但恐雜以不逞之徒故日撫治其藩臬員日撫民蓋善撫則無事矣虔鎮事宜按圖考牒贑東南境蓋界閩汀漳廣韶潮惠慶諸府地重巒復嶺巖峻巉絶綿歷盤紆奚啻千里其人皆依負險阻剛獷頑悍矧今所稱大帽岑岡高沙下歷浰頭橫江諸巢穴唇齒車輔脈絡貫通兵之用本不易加以財利詘乏拘攣牽制顧益難矣全賴皇靈震疊臺憲修明牧宰威懷本強內實則先聲屈折馴擾彈壓寖寖革心矣故標本緩急內外療治醫國者必致詳焉南安在西贑州在東贑州東南為汀州汀州東南為漳州贑州南為惠界龍南縣山洞接惠州三浰寨安逺縣東過登頭嶺即汀州府武平縣安逺縣南過打鼓嶺皆惠州山洞南安縣二十五里過梅嶺為南雄南安西過橫水桶岡聶都山為桂陽州軬人溪洞連接郴州桂陽州以都御史總轄有以也南贑盜賊其在南安之橫水桶岡諸巢則接境於湖郴在贑州之浰頭岑岡諸巢則連界於閩廣接境於湖郴者賊衆而勢散恃山溪之險以為固連界於閩廣者賊狡而勢聚結黨與之助以相援桶岡後山陡絶崖壁結構飛梯自此直入范陽大山延袤千里自來人迹所不能到賊若奔入此中截斷飛梯雖有十萬之衆亦無所施記三省夾勦橫水桶岡江西南安府所屬大庾南康上猶三縣各有賊巢聨絡盤據有衆數千西接湖廣桂陽等縣南接廣東韶州府樂昌等縣三省夾攻必須湖廣自桂陽桂東等處進廣東自樂昌縣進在南安者必須三縣地方並進贑州府所屬惟龍南縣賊巢與廣東惠州府龍川縣浰頭接境浰頭係大賊池大鬢等巢冗有衆數千比之他賊勢尤猖獗前此二次來攻俱被漏網龍南雖有賊徒數夥除之稍易但其倚藉浰頭兵力以為聲援攻之則奔入浰頭兵退則復出為害必須廣東兵自龍川進贑州兵自龍南進庶可使無奔潰桶江橫水左溪諸賊荼毒三省其患雖同而事勢各異以湖廣言之則桶江諸巢為賊之咽喉而橫水左溪諸巢為之腹心以江西言之則橫水左溪諸巢為賊之腹心而桶岡諸巢為之羽翼今不先去橫水左溪腹心之患而欲與湖廣夾攻桶江進兵兩寇之間腹背受敵勢必不利乃決意先攻橫水左溪密切分布哨道使都指揮某率兵千餘自南康縣所溪入知府某兵自上猶縣石人坑入知縣某兵自上猶縣白靣入令其皆會橫水使守備某兵自大庾縣義安入知府某兵自大庾縣聶都入知縣某兵自大庾縣穩下入縣丞某兵自上猶縣金坑入令其皆會左溪知府某知縣某各兵齊集令其亦自上猶南康分入以遏奔衝親率兵千餘自南康進屯至坪期直搗橫水以與諸軍會次第勦平諸巢各營官兵請乘勢進攻桶岡復議得桶岡天險四靣青壁萬仭中盤百餘里連峯參天深林絶谷不斷中所産早榖薯蕷之類足餉凶歲往者亦嘗夾攻坐困一月不能俘其一卒竟以招撫為名而罷及詢訪鄉導其所由入惟鎖匙龍葫蘆洞茶坑十八磊新地五處然皆架棧梯壑攀緣絶壁而上賊使數人於崖巔坐發礧石可無執兵而禦我師惟上章一路稍平然深入湖廣迂回取道半月始至湖兵既從彼入而我師復往事皆非便於是移屯近地休兵飬鋭振揚威聲先使人諭以禍福乘其猶豫襲而擊之遣縣丞某率數百人屯鎖匙龍促使出降而使知府某入茶坑知府某入西山界知府某入十八磊知縣某入葫蘆洞諸賊巢亦次第勦平兩月之間俘斬六千有奇破巢八十有四虔鎮建置欽差巡撫南贑汀漳提督軍務都御史一駐贑州江西嶺北道兵備駐贑州廣東嶺東道駐長樂湖廣柳桂道駐柳州福建漳南道駐上元餘道駐各省守備五虔鎮轄布政司四府九州一縣六十有五衛七屬所二十有二通共官六百一十四員軍二萬八千七百二十三名寨隘共二百五十六處虔鎮總論按南贑汀漳等處惟贑當四省之交漳南象湖長富諸巢交于閩賊魁詹師富等據之其西橫水左溪桶岡諸巢交于楚賊魁謝志珊藍廷鳯等據之其東南三浰九連諸巢交于粵賊魁池中容等據之不時四出劫掠為患屢年三省撫臣往往相為觀望急則議請夾勦每踰時兵始集集則賊已竄匿徒糜餉費為居民患以此積至數十萬衆及王文成受命巡撫南贑躬率諸道進兵取上杭出其不意直搗象湖乘勝破長富及水行等四十餘巢漳南平十月成軍而出一鼓而破橫水左溪再鼓而滅桶岡三浰賊猶悍黠擬官僭號聞各巢破懼而佯欵陰增機險穽毒以虞王師文成故休士歸農明年正月計擒其渠魁遂舉兵擊其衆又一鼓而破三浰再鼓而下九連其分合先後算無遺策然其初兵乏第選民兵訓練而不征調狼逹土舍其餉第疏通鹽法處商稅足而未始加賦編民已開縣治置巡司移郵驛經略周而垂裕到今矣內夷總論按邊患之見于經者始于三苖今自巴蜀以東歷湖南北桂嶺雲貴數千里溪洞山箐之中曰犵曰狑曰獠曰猺曰獞之類凡十數種皆蠻也其間最輕捷者曰苗即三苖之後也依山以居其性習不常無有倫紀禮義國初于湖北川東立宣慰司者五曰永順曰保靖曰貴州曰思州曰播州又有宣撫司安撫司及招討司長官司之設外此所謂軍民府及軍民指揮使司者又兼設土官以轄其夷人隨其地而設其官因其俗而為之治善者授以職惡者分其勢是蓋得有虞分北之義夏禹丕敘之意也制馭內夷總論明興平定四海凡夷獠蠻僰猺獞之地西起巴蜀牂牁東抵襄楚北包絡湖嶺東折而南南盡海上又東跨百粵三江大者兼據連城細者保恃深箐雖稍奉約束要在羈縻而已然兵力稍健乍叛乍歸苟勤率過濫拊懷失策雄圖自縮狡窟益深况地廣官高擅利習兵生齒益繁財貨益充詐以謀成罪以功解種憂釀禍蔑玩中土未可謂無虞也嗟乎夏典要荒周官蕃鎮大抵因民順俗橫海伏波逾湟絶嶺輿地漸開化理終塞乃知天德無私王道有量闢國陋於綏人曲防窘于曠度苟醜類自獲飽暖中華不患荼毒吾又何求焉惟夫吏好蓄積政多懈弛或逺嫌自潔或求勝喜功於是侵警日聞師徒數起網漏綱頽夷夏並困兹欲收總長策用圖久安必畫正疆理則鄰族靡爭預陳嫡孽則宗庶自定世及之際以時核聞錢榖之輸一切報罷而又飭武事於節帥修文德於廟堂傾側之憂斯其鮮矣圖書編卷四十九
