body:
  text: 圖書編卷六十七明章潢撰廣東各郡諸名山廣東廣州府山曰越秀城內少北番禺城內東南白雲城北浮丘即羅山朱明之門戶先在水中若浮丘然四面篙痕宛然宋有陳崇義年百二十嵗自言兒時見山根有船數十今去海已四里矣金榜順德金牛東莞大溪海中有三十六嶼周回三百里羅浮增城博羅有璇房瑶臺七十二所三洲香山海中崖山新會海中延長八十餘里帝昺陸秀夫赴海處大羅清逺峽山崇山峻峙中通江流白鶴連陽巖陽山天梯連山金紫岡香山東南天際則雲霞輝映若紫金之色也景星巖增城巖洞中有臺閣寶蓋之狀韶州府山曰韶石府城東北山之石竒怪有三峯西接盤龍駱駝獅子虹霓鳳閣馬鞍等山而韶石雙峙如闕相傳舜南巡登此巖上奏樂因名昌山樂昌産石可為懸磬竹可管籥白星仁化雲門乳源靈池翁源頂有石池池中有泉八曰涌泉香泉甘泉溫泉震泉龍泉乳香玉泉乃翁溪之源有老人隱此因名翁水臯石英德通天巖與碧洛洞相去二里橫岡峻嶺石乳聳峙萬狀行二里有竅通晃涵暉谷鳴絃峯下谷有睎陽島飛雲嶺淩煙嶂夢弼巖及桃花桂雲潛雲三洞南雄府山曰青嶂城東南洪崖保昌白牛始興天柱峯峭秀竒拔無支峯贅阜屹然撑天桂山九齡故宅大庾嶺城北亦曰海嶺旁有白猿洞玲瓏巖平地石峯髙聳中有三石室惠州府山曰羅浮博羅詳見于後保障海豐梧桐河源紫雲龍川嵩螺長樂巨鎮神光興寧通天巖在羅浮山有穴見天故名和山麻石巖興寧潮州府山曰鳳凰城北海陽海陽龍首潮陽陳山與朝山相接上一巨石有七孔若北斗狀中一孔出水不盈不涸又有二峯曰雙旌石黃岐揭陽梅峯程鄉東巖西巖石室洞俱程鄉肇慶府山曰石室府城北山有石室自風生煙南有二門號為神仙下都旁有石聳立謂之松台又有七星巖連屬曲折為斗形中可坐數百人巖內築斗魁臺唐李雍作記鐫石香山德慶生生香草金岡四會新寧新興射木陽春海陵陽江望海岡登之可望海有二室內有懸泉金銀燭靈芝玉髓之異其石自然生樓臺柱棟石床石田石池制度皆如人巧東有王母岡天黃隴水豐壽封川忠讜開建三洲巖德慶東中有石室室中有石乳蒼緑色間數佛像鐘磬玉麟遊魚之屬崆洞巖陽春西南巖洞深廣生石乳又有石鍾鼓扣之有聲石洞府城東北天開巖穴空闊幽邃南北二門上虛通天洞與七星巖相去不逺獅子洞背負九峯路通雲頂面聯七松勢逼斗魁高州府山曰東山府城東北麗山化一名浮梁銅魚電白白馬信宜近信吳川謝建石城亷州府山曰大亷城東十萬欽白石石康緑盧靈山分茅嶺欽州西南漢馬援征交趾立銅柱其下與之分界山頂産茅草頭南北異向至今猶然三海巖詳後巖記雷州府山曰擎雷城南八里圍州遂溪石門徐聞湖光巖遂溪東南湖中有巖如屋英靈岡府治之主山相傳雷出此英靈顯異故名瓊州府山曰瓊山府城南有瓊山白石二村土石俱白似玉而潤蓋其石似瓊因以名蒼屹城西松林儋赤隴萬石版崖澄邁澄邁毗耶臨髙黎母定安玉陽文昌雷朴樂峻靈昌化文筆陵水息風感恩試劔峯崖州南海濵山有巨石髙二丈餘宋毛奎題小洞天三字刻石石上其南有石臨海題曰釣臺又入數步名大洞天有室題曰海山旁觀旁有石梯題曰仙梯迥風嶺崖以颶風不過此而名南山度庾嶺而南惟九韶之石為天下最巒阜秀拔接於滇陽而南山之致尤為殊絶孤峯擎天峭立千仭昔舜鳴絃於其上因以名之至今有二臣祠峯之下石壁萬疊唐之文人嘗搜覽勝槩名其景者非一如寒翠亭晞陽島淩煙嶂涵暉谷羽仙霞舉存煉丹之竈乳溜泓渟置煮茗之臺仙翁瞰沂風之事南岩對桃花之塢與夫象鼻澄光之磯潛靈碧落之洞連花之孤臺好靜之虛巖定光之幽室虎跑之飛泉拊擊寒石鐘吼磬響乳竇風穴千怪萬狀以至步飛霞嶺立棲雲洞攀緣危磴遂履平地下視千里如指掌間者薰風亭也紹聖元年夏莆陽方公出守是郡因暇日閲圖諜遍求南山之景由回龍石而上得寒翠亭故基拭拂苔鮮視唐人元固識名於壁自此則路勢斷絶不可躡而前也公乃緣崖築道袤及百丈始歷涵暉之谷得元傑留名自稱為谷客山有浮屠名曰聖壽梁之果業寺也嘗搆亭于谷島之兩間公即其基廣之名曰衆樂亭亭之前跨梁為臺高數仞名曰月臺凡歷昔人遊者遂因名而亭之玲瓏巖始興南去十里許有山屹立平地中草木皆從石縫中出髙可數十丈廣可數十畝峭拔竒怪巖洞虛明竒景不一莫能名狀世傳葛洪煉丹之所成化辛丑豫按部至邑政暇遊焉嘗取其最勝者五六巖因其形似各加以名東西壁立不可登陟路自南上初有二小巖相環外間而中通未有甚竒行數步有巖差大洞然而圓形如半月名半月照沿石磴而上數十級山半有大巖可容數百人日照月臨直上巖中名天光路左一巖差小石乳凝結成觀音象名觀音又攝而上復下一巖視觀音又小內有窪窪水竅當東向名沖虛此下山巖也自天光前沿石磴而上數十級將及山巔有巖如屋雖廣與天光等而竒勝過之上有石如懸杵下有窩如陷臼世傳洪搗藥之所石乳左溜如獅右如象行數步拾級而上又一巖竒怪尤絶上下有石如龍首前而上者勢欲飛舉泉自頷垂滴下有陂不盈不涸復而下者稍不及名玉龍折而左路稍晦火行數十步盡處直上一竅圓明通天此上三巖也三海巖山有聳竒秀麗者莫如池之九華歙之黃山括之仙都桂之千峯魯之泰衡之衡華之華洛之嵩定之恆是皆天下所同珍者而亷郡靈山諸巖峭壁懸巖洞天神符悉備亦可以追羅浮遐軌顧獨棄而不録唐宋李雍余靖陶壁嶽霖諸賢嘗履其地僅得三海巖於蓁莽間而地弗之及者蓋以亷為廣僻郡靈其最僻邑也人物希疏寂寥遐搜窮討者無幾且以南北倥􅘓弦歌未習斯民奉頭鼠竄不暇遑恤其他兹者兵備李公瑾高枕而居狼煙熖熄點出靈山仙境躡蹬追攀亹亹忘倦勝入蓬萊之島列會羣仙者矣城之西疊幛層巒謂之石六峯頂有一塘錦鯉旋繞周圍有石蓮子何首烏出焉峻絶虛通崆洞響應人欲立壇場以為佛寺未就而罷石六峯西有曰因勝巖者邑侯龔彛號也乃人迹不到而驟然見巖故名上有龍女獻珠觀音現世羅繖蔽旅苔痕疊座彩鳳朝陽蒼龍吐沫壽星騎鹿之象宛然如見自因勝而下又有三海巖者陶商翁諸賢遺刻存焉匹布懸巖非人力螺帶石磯蚌凝陡壁天柱撑空流源匝地石乳鍾松花老金獅玉象連綿地鼓石鍾相應觀音變化之象巍然在湧壁間平地突起尖峯深崖直通海島此又格物窮理之功所不可曉者李公題其巖曰下洞通地中洞通人上洞通天其名義已悉不載三巖洞志中矣但是巖之西有所謂吕君洞者以髙計丈十有竒闊半焉深倍之巖有髙閣聳立雲端含蓮垂蓋化其東瑞草靈芝凝其西而瓔珞之形千態難以言狀洞之右又有獨虎穴者外視僅一窩耳造其中則雙􅘟覆地獨樹插天上垂珠簾橫鋪玉座有白有紅有紫有緑錯綜間簉雖九仙樓閣不過是也昔時有一虎藏焉故以為名鄰有髙山屹立深洞三丈有餘內隱蛟龍不俟雲雨之興而泉源混混瑩徹無瑕窮晝夜而不息日暖風和魚躍鳶飛照應上下三龍滾洞之名良以此耳過此去城有七里許髙與諸巖並峙俗所謂山夾洞者今改為天堂巖未入其疆自以三海為至及臨之則巖巖壁立百仞岡巒緣天梯而上可以玩心悅目者有不待言而著仙人擁膝而吟彌勒涅槃而座石虎膺其門金獅粘其壁飛龍升雲仙鶴舞空神龜出水玉象朝天石耳風調珠簾日射之妙難以狀舉巖有南向者則四野樵歌孤村煙火有北向者則日星燦爛禽鳥喧鳴有西向者則石柱接空仙壇照壁有東向者則莓侵地鼓泉鑄石鍾名以天堂良為不苟再越五里又有下石龍者山勢險而竒林木修而茂洞中髙而嵌者謂之龍母宫深而回者謂之龍王潭坦而方者謂之龍眠床湧而圓者謂之龍蟠臺路深九曲謂之從龍路門髙數級謂之登龍門人欲玩之者皆攀木緣崖而登懸藤挽手而下有地府焉有地獄焉有刀山戟架焉閻王業鏡清明臨者自然膽喪神馳心寒而栗股亦可畏哉石室髙要郡北十五里有石室詭怪萬狀崖斷穴露呀然而闢斫嵌崆刳嶻嶭掀層嶺劃巨石頑青老碧將墮復屹交撑互搘如竦如立龍蛇盤蟄煙霞出沒中敞平地廣畝側環翠壁踰仞滴乳成柱凝嵐作蓋若非神驅鬼役鑿空架虛不棟不榱疇克其壯又不知列仙移來真宰鑿出吁其偉乎圖經謂帝觸百神之所亦九九小洞天之一也峽山峽山據廣清遠縣北上流三十里許脈連韶之漕溪諸山發源於庾嶺經古真陽而南流過峽二禺穹窿對峙如擘大華東溢江流故謂之峽山亦名湞水世傳黃帝二庶子曰太禺隱居兹山遺有讀書臺二聖祠因號二禺山漢時潮至此峽返五羊一宿而至又名中宿山枕山瞰水相雲飛甍倚空欲墮為飛來禪寺懸梁迄今聲振華夏寺後崆洞隱隱洞曰和光曰歸猿記傳可考西磐一大石于江滸為釣魚磯昔趙胡於二禺山下釣得金鯉重可百斤歸貢秦王即此臺也環寺有潭曰白泡曰犀牛水堆銀浪淵沈金鎖其深昧莫可測峽前形勢平聳為縹幡嶺唐大厯間平哥舒晃叛帥夢二神人語見幡即回逮凱旋渡江山如挂幡始悟為峽山神助翠浪拍崖玉虹掩映迤邐山隈為凝碧灣故東坡有地轉凝碧灣之句石之不一者曰達磨石以佛自西來禪坐巖下飛錫而去曰葛壇石髙數仭平丈餘翠積成圍稚川曽此修煉今覆以亭曰龍磨角石以巨石俯江春水漲消痕如龍角縱橫為獅子石者蓋去里許遇一聖僧于林樾不可即其幻形怪石蹲踞如獅穿巖越壑引入曲闌其泉之最冽者曰定心泉可坐數人為挹泉亭仍跨以傑搆屹然為全清閣山腰雲滃亭午不散為半雲亭自麓抵亭須援磴捫蘿亭中少憩方淩絶巘傴僂而升毛骨竦然上有仙屋數椽纎塵不到一睇盼間浮漚溟海坯土羅浮身世倣然與造物遊矣崖山嘗泛舟崖門行草市之墟觀藏舟之處距海劇峯形勢阻鬱信有天險云山髙四十餘丈周八十餘里延二十八里袤三十四里勢頗寬廣中有一港可以藏舟崖山在廣之西邑新會邑南八十里與竒石對峙如門故又名曰崖門山山有兩崖對峙其口如門羅浮者蓋總稱焉羅羅山也浮浮山也二山合體謂之羅浮在增城博羅二縣之境羅山頂有桂所謂賁隅之桂賁番通又有一池如鑑周可五里水應海潮曰曰神湖又名仰天湖浮山者本蓬萊之一峯堯時洪水泛海澌來傅於羅山崕巘皆合至今卉木不同皆海中類也又有平田七畝水旱不及禾稼異常陳伯袁彥伯東莞徐履道皆云蓬萊有二島此其一焉山巔飛雲頂又曰聚霞峯常有紫雲在於峯上夜半登之則見日出真誥呼為層城山之峯四百三十有二西出飛雲者有上界三峯峭絶頂立煙霞霏微如幕護之人莫能至與鐵橋相接當二山之交嶴曰泉源道經所謂第三十一福地仙子華子期治之者也一名分水回有泉遄飛迅急注于東西潭又合流成淵曰五龍潭上有五龍堂嵗旱禱之龍躍出即雲起而雨十大洞天兼有福地者惟朱明泉源與句曲地肺而已羅浮山羅浮者山總名也羅山在番禺東二百里其上有桂樹神浮湖山自海來傅之其上有平田嘉穀崖巘合為一臨於博羅之上北望增城南望東莞高三千六百丈巔曰飛雲頂帶岨起峯曰聚霞周回二十里夜半見日故其中麓曰朱明洞山海經桂林八樹在番禺東即羅浮山也南越志此山本名蓬萊山二峯在海中自會稽浮往與羅山合而為一今山上猶有東方草木乃浮山也道書名為朱明耀真洞天葛洪所居丹竈尚存其峯四百三十有二飛雲頂西日上界三峯高三十仭不可以上其下迤衍有滙水與潮汐應曰瑶池有神仙聚會壇當二山之嶴實惟泉源福地俗呼分水嶼其中有石如梁曰鐵橋湍水出焉分東西流注於潭又南流注於淵五龍蟠焉嵗旱禱之則躍出而雨其嶺十有五其石室長溪各七十有二瀑布九百八十其洞穴潛通句曲仙靈之所居也謝靈運賦言羅浮與三茅相通是多玉樹芝草珍禽竒獸神湖東三百里有升天橋其陽有谷夜聞鈞天之音是謂夜樂洞有鳥焉其狀如雞五采而文浴于谷口之水是曰鳳凰之谷其下石槽之水出焉有石臼洞八仙石中路有書堂坑黃勵修真之所其下東西龍潭滙焉鐵橋西曰大石樓其南有橋曰度仙相去五里曰小石樓有石門徑路十里可至上而巑岏至巔三百丈周回二百里下而斜矗至麓三千三百丈周回五百二十里羅山之陽有瑶石臺髙六百丈廣七十丈其上多竒石其下有峯曰華山其南曰香臺又南曰會真多木無草有五色雀又南有谷焉前望朱明洞後臨蝦蟇峯是曰青靈之谷蘇玄朗修煉之所又南有丹竈夜有光見于東北曰龍虎峯如霞有五色其峯多草其東北有桃源洞幽邃人迹少至其東南有會仙橋其隂有玉鵝峯神女居之葛洪妻鮑仙姑廬其下曰黍珠庵下有山穴出風雲而雨東北曰大獅峯又北九十里有連阜接於增城曰鵝嶺又東兩峯間出曰大旗曰小旗又東一峯曰致雲又南一峯秀麗特起曰仙女又西南一峯如貝而文曰賽寶又東南曰雙髻峯有仙壇符竹俗呼竹葉符羅水出焉釣魚臺東南為碧溪又西南流為羅陽水又東南有鶴峯又南有峯平而圓曰石鼓扣之有聲是謂神鉦水經注浮山東石樓下有圓石鼓扣之清越所謂神鉦者也又南為松徑口其東為龍尾岡又東南四十里龍江之水自龍穴出焉西北與羅陽水合南流注于海自松徑口至于白水山百里而近羅浮之東麓也浮山之陽有蓬萊峯其上多龍公竹有舄焉毛彩如孔雀而五距名曰碧雞其下有壇列仙之所集也其東南曰獅子峯多萬年松又南曰麻姑峯仙女之所集也有獸焉麕身狼尾馬足而黃色名曰麒麟或降于麻姑臺道書黃麟真人王逺乘之以陟降至則神祗迎請會宴聞靈簫之聲嘗集于麻姑臺人或見之其西有觀源洞王野人所居又西雲峯巖之下有蝴蝶洞四時出彩蝶世傳葛洪遺衣所化其西南水簾出焉是為水簾洞其南有菖蒲澗安期生服食處其西南有天漢橋又西南有孤青峯對石樓南仙奕石檻在焉其南金沙洞中有花首臺金沙洞南漢改為黃龍洞上建天華宫蓬萊峯之西曰錦繡峯是多異花草又西四峯疊出曰鉢盂曰玳瑁曰拋毬曰雞鳴其隂雲母峯之西北曰鳳凰岡神女居之雲母峯在西龍潭上轉泉源山界則增城縣也乃何仙姑之所居其山雲母之水出焉西北注於增城之西青山而成淵神龜潛焉是曰龜淵淵束石徑可以步躡而上又西南曰飛來峯其傍有梅花村又西南五里有鹿角嶺自東路之南平疇迤邐而西曰藍田又南曰賣酒田又西南曰泊頭其北為小羅浮岡其下有跳魚石又西北有牛嶺十里至增城又西有奉宸橋其南有七星松王維集云七曜洞仙靈之所息也羅陽之水西流與增江合其一南流與龍江合三十里波羅之水入焉又南流注于海自洎頭至于白雲山二百里而遙羅浮之西麓也獅子洞羅浮名山學道者萃焉寺觀各庭宇精嚴景物幽絶然猶涉人世之事其有人迹不到之處締草為庵翛然物外又不可以人間勝景論也山中之庵何啻百餘皆路入迂結勢隱崟嶔護以水石環以花果陶茅穴土鮮潔無塵飱谷茹芝清淡有味一到其間名利之心釋然矣豫丙戌冬攜家而往遊宿留浹辰靈迹勝地無間險易皆得遍及一日訪黃龍洞登七星壇有道人神定者延入其庵素壁茅簷柴扉竹榻雖不甓而可以鑑旁而睨之巖洞幽邃峯巒􅀈䗥背負九峯路通雲頂面聯七松勢逼斗魁左右巖石如翔如伏如揖如顧如樓閣棧道之勢花果隨分禽獸自得林影散而白日間風籟停而翠谷寂其諸甲于諸庵俯視塵俗迥然隔絶而不相聞顧問道人是庵何名道人曰此獅子洞也前此亦多欲為庵而苦于無水普通竅其地得水于榻之側其味甘冷視景秦之卓錫無異焉故前以洞名巖今改泉源矣廣西桂林府山曰桂山府治東北桂之千峯旁無因緣平地崛然特立玉笋瑶篸森立無際其怪且多如此誠為天下第一獨秀山孤獨聳約五百餘尺周回一千餘丈正靣端嚴秀整側視如卓筆校諸峯獨雄故名山上有巖巖下有洞伏波山府治東北又名巖突起千尺有懸如柱去地一線不合俗云伏波試劔石柱在洞中名環珠辰山府城東北山有三巖下巖初入昏黑行十餘步乃明豁岩左右石室穹然坐三百餘人巖扉西向下瞰平湖山川城廓瞭然在目中巖乳石竒怪可駭可愕上巖巔有小亭放目天際冥濛杳靄不可窮極書堂全州覆釜山有七十二峯髙險峻絶淩摩霄漢絶頂皆石其圖如釜因名龍蟠興安石洞有魚四足而角海陽興安靈巖靈川山下有巖南北相通若堂殿水貫其中色如藍山谷百源輻輳其下可通舟楫南溪山聳拔千尺煙霞臨空下臨南溪穿山山巔有穴通秀望之如輪月挂空中隱山中有三巖勝景不一而足陽朔陽朔西人山縣西七里有石如人東向而坐縣東南二十里又有東人山其形如人拱揖西向鵝翎荔浦下有巖明爽中有石如鵝狀宋甘叔異詩娥英恐是古所傳鳯巢永福修仁修仁天柱古田隱山府城西上有朝陽夕陽南華北牖嘉連白雀六洞灕山永城東南其山孤拔下有澄潭旁有洞穴南北直透上有怪石欹危藤蘿縈茂七星山府城東七峯别如北斗旁有小峯如輔星曽公巖七星山下水月洞洞門踞江形如滿月一統志云濱江三洞惟水月最佳是也乳洞洞有三上曰飛霞中曰駐雲下曰噴龍其下洞泉流石壁間田壠溝港如鑿中洞有三石柱其石室石床石盤至上洞行八十步得平地有五色石橫亘其上千態萬狀愈入愈竒栁州府山曰仙奕城南有穴穴有屏有室有宇始登者得石枰于其上黑肌而赤脈十有八道可奕因名屏山城南其形方正類屏象山象山白面山石壁屹立橫截大江中多白石古漏濱州有下泉水滴漏四時不竭鳳凰羅城烏蠻栁城武牢懷逺銅鼓融賈利來賓石羊武宣保積遷江古祿江林真仙巖靈夀溪貫串中嶽玲瓏清響如環佩聲中有白石如天尊象慶逺府山曰天門拜相山府城北二峯如笋崒嵂插天南山中有岩洞洞有石龍鱗甲宛然因名龍隱洞孟英南丹水巖荔皮北淩天河暗嶺思恩屏風河池龍塘欣城平樂府山曰縈山府城東山勢縈回曲折上有九峯險不可登銀殿恭城碧雲巖富川橘山賀有七十二峯仙巖洞口多桃花中則空闊上如覆蓋石芝懸結青黛點綴榕根半山開牖光明可坐數人旁有深潭瀉出洞口梧州府山曰大山城南臨大江梧之案山也山每夜大光如野火狀金石城東南山藤赤水峽兩崖壁立一水中流林木蔚然嵐氣朝夕不散容山容都嶠山山有八峯兩洞第二十洞天丁蘭岑溪齊嶽懷集銅石北流勾漏第二十二洞天信立鬱林隱仙巖內有石室大荒博白鳴石陸川北斗興業鐵城山石壁峭立其色如鐵四方有門內可避兵燕巖懷集四門巖石室四門內石乳凝結為柱者八為蓮花者一將軍洞其洞三重石室虛明中有泉流分溫涼出崖石上白沙洞勾漏甲天下此洞為勾漏第一玉虛洞在勾漏山普照巖山如覆釜登巖却顧則黃坡翠山與石峯相間其中仙壇佛塔低昂交錯靈幡寶幢獵獵飛動石寨在勾漏山隱然如城寨潯州府山曰白石城南第二十一洞天通勾漏洞上有會仙巖羅叢巖城西可容三百人又東曰碧虛洞西曰靈源洞燕石平南南山山有二十四峯峭拔甲于一郡暢巖南平西有石一卷聳峙平野有石門石床流泉濺石宛如跳珠南寧府山曰馬退府城北狀如馬退亘數十里其尾盤荒陬首浸大溪諸山來朝勢若星拱蒼翠詭狀綺繡錯雜出栁宗元記鳴石橫山海經長石之山洪水多出鳴石思鄰武緣龍章永淳望仙坡府城東與羅秀山相對五花嶺太平府山曰青連城北龍蟠太平隴馬思城帽山安平古嵩利養馬鞍萬城端坐全茗牛角龍英城門結安印山結都八峯上下洞淥涳陀淩淨瓶永康青龍羅陽白雲洞城南二里中有龍潭獨秀峯在郡治後為桂主山旁無坡阜突起千丈峯趾石屋有便房石榻石牖如環堵之室顔延年守郡時讀書其中伏波巖突然而起直千丈下有洞可容二十榻穿鑿通透户牖旁出有懸石如柱去地一線不合俗名馬伏波試劔石前浸江濱浪波洶湧日夜潄齧之華景洞高廣如十間屋洞門亦然隱山西出門里餘得小山山下得伏流顧曰石秀水清其韜怪物耶乃蹈履北上四十餘步得石門左右劔立矍然若神物持之自石門西行十步得此洞垣平如室室內清縹若繪積乳旁溜凝如壯士上負橫石奮怒若活乘髙西上有石忩櫺忩下望千山如指自石室東回三步得石巖巖下有水泓然疑虬螭之所宅水色墨緑其濬三丈載舟可坐數十人巖之南壁有石磴可列十六人其東若畎澮貫石流去不知所止北壁半穴如懸門徹外容小舟出門有潭袤三十步産芰荷潭北十步得溪溪橫五里徑二百步可以方舟泛鷁渺然有江湖趣魚龍瀺灂鷗鷺如豢潭溪之間有地丈餘其色正赤歷石門東南越小嶺石林危嶠夾聳左右自嶺下十步得東巖自巖口直下二十步有水闊三尺許淺沙若畫細草如織南望有結乳如薰籠其白擁雪自巖西南上陟飛梯四級有碧石盤二乳竇滴下可以酌飲又梯九級得白石盤色如玉中有自然水香甘可飲數人不竭自石盤東北上陟雲梯十二級得石堂足坐二十人乳穗駢垂擊之鏗然金玉聲堂間有石方如棋局即界之以奕翛然不知柯之爛矣自堂北出四步直西二筵南入小峽道峽得內洞東有石室妙如刻畫頂上方井弱翠輕緑如藻繡自洞南下仰矚東崖有凝乳如樓閣如人形如獸狀不知造物之所變化也自樓閣斗下七步次石渠深七十尺渠上為梁曲折繚繞三百步逺日月所不能燭矣左右列炬而後敢進自梁直南抵絶壁斗下為飛梯九級而後及水水北崖有石閣峭甚益以欄檻適可宴息水通魚盤東出朝陽西隔黝黑方谷如鑿投之石聞汲聲響寒氣薄人自石閣還上絶壁西十步又得小洞俯行三十步左右壁有鍾乳或垂或滴其極有石室如禪庵名曰蝙蝠出小洞北二十步又得外洞石色猶四岡東西壁下有石數十枚其面砥平中有兕樽琴薦厥狀甚怪遊人列坐肅若冰霰其東有便房桁櫨拱棁枝撑環合猶良工之椎琢也洞北七步臨西石門石門西三十九步得西岡洞深九十尺北崖有道可容一軌崖南有水水容如鏡纎鱗微甲可數東過小石門東俯行三十步詰屈寰邃道窮絶崖又寬明置水閣崖下閣勝九人閣下水濶三十尺伏流崖南亦達朝陽自西洞口南去一矢得南洞四壁可燕數十人其東有水輕風徐來微波蕩漾北上山頂盤曲五百步石狀如牛如馬如熊如羆劎者鼓者笙竽者塤箎者不可名狀石路四周而松蘿萃于西北夫兹山之始與天地並而無能知者揭於人寰淪於翳薈又將與天地終豈不以其內妍而外朴耶乃伐棘導泉目山曰隱山泉曰蒙泉溪曰蒙溪潭曰金龜洞曰北牖曰朝陽曰南華曰夕陽曰雲方曰白蝙蝠嘉蓮生曰嘉蓮白雀來曰白雀石渠寒深若蟠蛟唇特曰蛟渠或取其方或因其瑞幾焯乎一圖諜也桂林諸巖洞余閲宋范穆成大桂海虞衡志見其評桂山之竒稱為千峯崛然特立旁無延緣而玉笋瑶篸森列其怪且多若此當為天下第一私竊意其為過言乃今來遊桂林覩諸峯巒巉巖從平地削出數百千丈不假纎培而骨相嶄然玉立劔峙衆態畢呈或半空開竅冥搜叵測或挺拔天表登俯無階其竒怪奪目驚心殆不可具狀曽公巖元豐元年曽公自廣州移帥桂府民和嵗豐公率羣寮遊所謂風洞者縱步而東行得一崖於榛莽間巖之前有石門屈曲而入則流水橫其中碧乳垂其上周旋四視其狀如刻鏤出於鬼谷工而不類融結者也屏風巖自湘南樓下渡重北行五里有山如平峙于平原若環郡而主之其中卷然虛曠而邃深數十步上徹山之隂高明爽塏下視七星三巖導于前西顧洲渚邑城可以指數蓋龍隱棲霞之所藴蓄與夫轉魁傲雲之所鋪寫是蓋兼而有之備具衆美冠於天南使造物更復運意不可增損崇寧初程公始開是巖目之曰程公巖乳洞試士興安問土人山水之可遊者得乳洞出城西南十里路多蓁莽至洞口有清溪石梁洞有三下曰噴雷中曰駐雲上曰飛霞下洞有泉流石壁間滙而為溪觸石湍激有聲洞門軒敞其中虛明夏涼冬溫其下石如田隴溝塍如鑿左旋至中洞煙露冥濛有石柱三及石室石牀復左旋百步至上洞入門平曠水淺可涉石乳玲瓏有五色石橫亘其上秉炬深入石愈怪竒三洞蓋宋李邦彥名也升仙巖桂林諸山竒秀為嶺南最皆平地拔起望之亭亭玉立或森若劎戟而巖穴幽邃冥搜莫極至雕鏤萬狀窮極天巧雖繪事不能得倣佛其最近可朝夕遊者則有若七星巖水月洞惟劉仙白巖一巖尤號奇觀巖在城南七里今名升仙巖相傳仙人劉仲逺居此登道攀緣而上石室高寒旁有穿雲仙迹勾漏洞嘗遊谷州勾漏洞天四面石山圍繞中平野數里洞在平地不煩登陟外略豁敞中一暗溪穿入因同北流令結小桴秉燭坐其上命篙師撑入詰屈而行水清無底兩岸石如虎豹猱玃森然欲搏行一里許仰見一大星炯然細視乃石穿一孔透天光若星也溪不可窮乃返洞對面髙崖上夏間望見荷葉田田然峻絶不可到栁州山水古之州治在潯水南山石間今徙在水北直平四十里南北東西皆水滙北有雙山夾道嶄然曰背石山有石川東流入于潯水因是北而東盡大壁下其壁曰龍壁其下多秀石可硯南絶水有山無麓廣五尋高五丈下上若一曰甑山山之南皆大山多竒又南且西曰駕鶴山壯聳環立古為州治焉又有泉在坎下常盈而不流南有山正方而崇類屏者曰屏山其西曰四姥山皆獨立不倚北流潯水瀨下又西曰仙奕之山山之西可上其上有穴穴有屏有室有宇其宇下有流石成形如肺肝如茄旁或積於下如人如禽如器物甚衆東西九十尺南北少半東登入小穴長有四尺則廓然甚大無竅正黑燭之髙僅見其宇皆流石怪狀由屏南室中入小穴倍常而上始黑已而大明為上室由上室而上有穴北出之乃臨大野飛鳥皆視其背其始登者得石枰於上黑肌而赤脈十有八道可奕故以名其山多柳多櫧多篔簹之竹多槖吾其鳥多秭歸石魚之山全石無大草木山小而髙其形如立魚在多秭歸西有穴類仙人奕其穴東出其西北靈泉在東趾下有麓環之泉大類轂雷鳴西奔二十尺有洞在石間因洑無所見多緑青之魚及石鯽多鯈雷山兩崖東西雷水出焉蓄崖中曰雷塘能出雲氣作雷雨變見有光禱用爼魚豆彘修形糈􅀈酒殽虔則應在立魚南其間多美山無名而深峩山在野中無麓峩水出焉東流入于潯水大極洞放舟陽朔江上締觀之其峯石皆拔地而突立最高者四千仞有餘其次則足可三十仭又其次或百丈或五六十丈最次則三四十丈焉止矣其色如豆青深者如靚文如魚麟總記一百八十里排衙列戟目之令人神思飛越中流偶覽石壁竒瑰異常見伐鼓鳴鐃而前行者忽然而入崖忽然而遡波以故追蹤躡迹泛魚舟探之乃得一洞方可十餘丈小可數尺其遊鯈稍稍見也俄而赤腳沿岸以入又得一洞豁然當天而竅日光射人且穿上羅下焉方數畝水可十餘尺而魚人網魚而出者盡滿囊也桂山灕江嘗平桂山之竒宜為天下第一豫登覽太行常山衡嶽廬阜皆崇高渾厚雖有諸峯之名徒爾魁然大山峯云者蓋強名之其最好竒秀莫如池之九華歙之黃山括之仙都溫之雁蕩夔之巫峽此天下同珍之者然皆數峯而止耳又在芳絶僻逺之瀕非几杖間可得而又必因重岡復嶺之勢盤亘而來非若桂之千峯旁無延緣平地崛然特立玉笋瑶篸森列無際其怪且多如此桂林六硐天作南北星斗辨之地分方夏山川間之其土殊其鎮異故磅礴博厚隱嶙鬱律連岡走峯千里一息秦之山也發地干霄上為嶕嶢攢空交映積為崇山越之山也桂林千巖競秀世情賤目故兹山接城郭之間億萬斯年人未稱焉其為狀也前虛明而散祝融之火後清泚而壓玄武之水外孤峯而競秀中六洞而潛通諒仁智之所樂信靈仙之所宅登山自西舉趾維左首至於南華岡洞水中長十餘步闊不可踰深不可測澄為靈泉播為陽江水側平坦可坐數十人自南華洞西轉五十步至夕陽洞洞長數十丈其旁有水與洞終始在水之東高下有石如砥如礪十數人可憩洞窮有大石高可跋及廣不盈尺鑿穴而望復使下尋有潭東去莫究深廣又北轉而東八十步至於石門自石門又東北十五步至北牖洞洞虛潭幽其水潑墨中有巨魚可三四尺鏤鱗鏟甲朱鬚頳尾人或見者龍以敬之潭之左右怪石萬狀如鳥斯飛如虎斯蹲如衣裳發笥如龍蛇出奔乳竇懸玉石壁流雲潭之南有石洞有便房髙有石窗追琢不加清瑩可愛又東南轉山一十步至朝陽洞洞中有水旁浸潭側長可數十步三洞之水周圍相通乳於池入於江水中有石高可三尺其色白其容光圓如薰籠大如可至窈窕深邃羽人來塈却上南壁約六七尺有雙壁石盤懸如半壁容水數升其上尋有一白石盤常有水升餘酌之不竭味甘如醴色白凝乳煎以病愈飲以顔駐其側可坐五六人左右石壁皆光滑密緻有如磨礱不礙綿絮却下從洞口北轉路絶越險山屐不通搆梯架空得至雲户户內博敞容三十人旁透虛明洪纎可鑒有貞石榻勒為碁局對以手談局之左右可以偃仰賓從徒侣各有攸處出雲戶下視北牖蒙溪如指諸掌戶外有二徑其一直上至山頂之最高處也桂江屬望縈紆若帶越嶺遐眺點簇如黛寸眸千里周覽一息搆其上以俟登臨是嵗秋慶雲見於西方萬狀競變五色相鮮既而亭搆因目之為慶雲亭自亭下至南華洞口又一徑西去十餘步至白雀洞郡人有獲白雀來獻者雪毛霜羽頳觜紅趾且旌雀瑞因志洞名洞口狹隘側身稍通漸下十餘步有立石望之如人次有石堂光滑寬敞可容數十人從此更下有玄潭其深莫測潭東西巖上有石樓高低可二三尺自下而望如粧點成樓南有二石相去數尺被服如人若就樓而看者玄潭泓澄水色如墨見者神竦乃作閣道架潭瞬息疾過西南透于石穴中石穴路右復有乳垂亦如朝陽洞者視其周圍但微小耳洞內有穴通嘉蓮洞洞開而未得名會有獻同心蓮者遂紀事而名之從洞北出六十步西去有洞其深不測中路多白蝙蝠飛舞在空從東有穴棧閣盤回却透玄潭之北有兩穴東穴透明長可數丈人不可過莫能究之西穴出於洞口洞內平坦石榻縱橫湯茗在兹笙竽以間有石琴薦置以撫絃聲越金玉自洞西去至夕陽出西山復人寰六洞之能事畢矣自諸水隱山下池溢曰蒙泉派合成流水源有二其一源自夕陽注嘉蓮經白雀歷朝陽旁浸北牖出於南華流沚積為池其一源自蒙溪溪源在北牖洞東北里餘出於北山自山南流會于南華洞水合而成池池因山麓不資人力髙深向背繚繞縈回五六里蒼洱圖敘滇大理點蒼山像靈鷲西聯十九峯每峯溝溪東沛洱水發源罷谷滙四州山島九曲出天橋委漾流方城中屹兩關列環川畫井田石産屏玉內繁十景雪寰雲帶最為竒特圖猶未盡其妙躬歷覽者斯喻形勝按舜肇十有二州蒼洱古梁州域禹導葉榆黑水入南海即洱河周末綵雲見南方因名分野漢敷益州政教郡縣學校始此唐舉制科宋頒經籍元置諸路通載于志久矣逮我皇明初諭雲南氣厚風和建藩臬增置守疆域更新悉與中原同矣雲南府山曰五華地內碧雞東瞰滇澤蒼崖萬狀緑水千尋月印澄波雲橫絶頂雲南一佳景也漢宣帝遣王褒祀金馬碧雞指此顔師古謂金形如雞碧形如馬未知果否靈芝富民笮箐宜良秀嵩嵩盟敕雺三峯霧結蠻謂三為敕云竹雄楊林金沙晉寧三台呈貢岱晟安寧苴麼崱裒羅次蠻語繹語云子望母玉龍羅次姚陵祿豐長松昆陽白鶴三泊臨安府山曰判丈城南菜玉石屛鳥充阿迷萬松寧諸葛通海祿溪河西目則蒙自龜山嶍峨碧玉峯寧州登樓山髙可千丈袤八十餘里登之則逺近舉在目前雲龍山大小雲龍竒祕不在十丈洞天下三洞水雲萬象南明是為臨安山洞顔洞洞有三層盤旋四十餘里廣處可坐千人高不可紀火井在阿迷州水中常有煙氣投以竹木則火燃夜則有光澄江府山曰羅藏治西蟠坤江川夾浦陽宗盟石在城北大理府山曰點蒼府城西高千餘仞有峯十九蒼翠如玉盤亘三百餘里山頂有高河泉深不可測又有瀑布諸泉流注為錦浪等十八川又名靈鷲山石門山點蒼山背雞足山是山之形前出三支後出一支若雞足四趾然西望點蒼隱然與是山髙等三耳趙寶泉雲南龍興和山其山高大如扶風太乙之狀鬱然髙峻與雲氣結連固隂沍寒雖盛暑不熱廣志曰五月雪霜浩然卧牛鄧川寶應浪穹三峯雲龍九曲洱河東峯嶽攢簇狀若蓮花九盤而上又名九重岩上有石洞楚雄府山曰藢溪府城西高可千仞峯巒百餘溪箐如之每溪皆有泉分流三十里合流于卧龍江其溪箐有興雲雨之名會基定逺玉壁定逺縣東高可千仞望之色如玉壁其東有鳳羽山南有易者山北有絶頂峯皆丹崖壁立髙出羣山之表和茶通廣延亘三百里螺盤定邊黑初􅑇嘉石鼓鎮南表羅南安麗江府山曰雪山府西北一名玉龍山條岡百里巋巍十峯上插霄漢下臨麗水雪貫四時玉立萬仞千里望之若在咫尺而岩崖谷澗清泉飛流廣南府山曰蓮花城東北玉泉冨州西北山頂有泉飛流如素練下有石池青碧回旋溢流于西洋江廣西府山曰吉輸城東南高來師宗盤江維摩曲靖府山曰妙峯城東龍華霑益木容陸涼伯刻馬龍羅莊羅雄矣層亦佐有清泉夷語水為矣普賢洞深入三十五步再深石笋琳琅空巖難測闊如架屋姚安府山曰東山城東四竒大姚鶴慶府山曰峯頂城東方大山府城南巍然峻拔山半有洞中有池深不可測水滴巖下如方響音南詔名山凡十七此其一石寶山劍州上有石寶巖鐘鼓洞山頂聖泉從石孔涌山不溢不流中巖山名皆如蝦蟆狀而西澗之景尤勝永昌府山曰九隆城南山有九頂知場安撫司東和丘永平鳳溪鳳溪摩蒼施甸景東府山曰蒙樂蘭津橋西岸峭壁聳立高廣千仞方削雲屏平懸天鏡上插霄漢俯映蒼江而飛泉急峽復磴危峯森羅上下信徼外詭絶之觀也蜀人張肖甫題在焉此地南北隔絶無路可通以鐡鎖係南北為橋漢時明帝創造永樂初曽修不知當時空中何以著力疑是神運雲南山川玉案山在雲南府城西二十五里一名列和蒙山秀麗多泉石有碁盤山北平坡中有三泉如盆池郡人春日遊賞于此山中有玉案蘭若金馬山在東二十五里西到碧雞山中隔滇池山不甚髙而綿亘西南數十里上有長亭下有金馬關碧雞山在西南三十里東瞰滇澤蒼崖萬丈緑水千尋月印澄波雲橫絶頂雲南一佳景也漢宣帝時方士言益州有金馬碧雞可登祀而致遣王褒往祀至蜀而卒顔師古謂金形如雞碧形如馬未知果否大華山在碧雞山西北欶雺山在嵩盟州東四十里世傳蒙世隆征烏蒙得四女歸至此山四女遙望故鄉俯仰嘆息忽山巔霧結三峯蠻謂三為欶注為雺其山崷崒獨峻登眺則雲南悉在目中又名峻􅀈山滇池在府城南一名昆明池一名滇南澤周廣五百餘里合盤龍江黃龍溪諸水滙為此池中産衣鉢蓮花盤千葉蘂分三色下流為螳螂川中有大小卧納二山史記滇水源廣末狹有似倒流故曰滇漢武帝欲伐滇國于長安西南穿昆明池象之以習水戰瀑布泉在府城西二十里寶珠寺後崖高十餘丈泉自上注下噴珠濺沫清徹可愛點蒼山在大理府城西高千餘仞有峯十九蒼翠如玉盤亘三百餘里山頂有高河泉深不可測又有瀑布諸泉流注為錦浪等十八川蒙氏封為中嶽本朝洪武中上遣沭英征大理出點蒼後立旗幟以亂之遂克其城即此山也鳳羽山在浪穹縣西南三十里舊名羅浮山相傳蒙氏細奴邏興時有鳳翔于此故名鳳羽九曲山在洱河東百餘里峯嶽攢簇狀若蓮花九盤而上又名九重嵒上有石洞人莫能通西洱海在府城東古葉榆河也一名洱海又名西洱河源自鄧川合點蒼山之十八川而滙于此形如人耳周三百餘里中有羅筌濃禾赤崖三島及四州九曲之勝下流合于樣備江濃禾島形如几案故又名玉案山判丈山在臨安府城南二十里高千餘仞中有三峯削出如筆架昔大理段思平外舅爨判居其上因名有祠在焉碧玉峯在寧州北五十里巖石磷磷下瞰撫仙湖波光涵浸如碧玉上有碧玉神祠傍有石如懸鐘又名石鐘巖玉壁山在定逺縣東六十里高可千仞望之色如玉壁其東有鳳羽山南有易者山北有絶頂峯皆丹崖壁立高出羣山之表雪山在麗江府西北二十餘里一名玉龍山條岡百里巋巍十峯上插雲漢下臨麗水山巔積雪經春不消巖崖澗谷清泉飛流蒙氏異牟尋封為北嶽九隆山在司城南七里山有九嶺又名九坡嶺沙河源出于此相傳昔有一婦名沙壺浣絮水中觸沈木有感因孕産九男後沈木化為龍衆子驚走惟季子背龍而坐龍因舐其背蠻語謂背為九謂坐為龍故名九隆長而黠遂推為酋長山下又有一夫婦生九女九隆兄弟娶之種類遂蕃皆刻畫其身象龍文于衣皆著尾世居此山之下諸葛亮南征時鑿斷山脈以泄其氣有迹存焉哀牢山在司城東二十里本名安樂夷語訛為哀牢絶頂有石如人坐懷中有二穴名天井土人于春首視水之盈涸以卜歲之豐凶至者見水溢以為吉兆穴下相通取左穴水則右穴水涸取右亦然又山下有一石狀如鼻二泉出焉一溫一涼號為玉泉故又名玉泉山博南山永平縣西南四十里一名金浪巔山一名丁當丁山極為險隘乃蒲蠻出沒之所昔南詔遣將軍延緬回師多齎金寶經此山遇盜將軍死之後立祠曰金浪巔山神祠北麓有泉流為花橋河瀾滄江經司城東北八十五里羅岷山下漢明帝兵開博南行者愁怨作歌曰漢德廣開不賓度博南越瀾津渡瀾滄為他人渡處舊以竹索為橋後廢本朝洪武末鎮撫華嶽鑄三鐡柱于兩岸以維舟方丈山在鶴慶府城南一百里巍然峻拔山半有洞中有池深不可測水滴巖下如方響音昔蒙氏羅閣鳳琢觀音像于壁故又名觀音山南詔名山凡十七此其一也蒙樂山在景東府北九十里一名無量山高不可躋連亘三百餘里中有石洞深不可測一峯特出狀若崆洞蒙氏封為南嶽其南有泉為通華河其北有泉為清水河俱東入于大河烏蒙山在祿勸州東北三百里一名絳雲露山北臨金沙江山有十二峯聳秀為一州諸山之冠八九月間常有雪其頂有烏龍泉下流為烏龍河蒙氏封此山為東嶽髙黎共山在司城東北一百二十里一名昆崙岡夷語訛為高良公山極高峻介騰衝路江之間冬月路江無霜其山頂霜雪極為嚴沍蒙氏封為西嶽其頂上復有泉極清洌行者咸掬飲之卧獅山在法寶山之南五里以形名髙百丈餘寰二里其山俗名卧獅窩其下有洞曰芭蕉廣二尋髙稱之入深百五十步其中石乳燦爛有如蓮如鐘如傘之異故又名石花雲巖山在城北二十五里高二百丈餘盤回三里許雜木隂森巖石深百步中有石橫卧于下長丈餘好事者鑿而為佛建寺以覆之匾曰雲巖卧佛其左有洞洞門高三尺深十丈餘寺外築臺建門臺下有池東望泬漻足為佳麗羅岷在城北八十里即蘭滄江西岸髙千丈餘延袤四十里舊傳蒙氏時有僧自天竺來者名羅岷常作戲舞山石亦隨而舞後沒于此後人為之立祠祀之巖下時墜飛石過者驚趨俗謂之催行石按飛石本巖上野獸拋踏而下相傳有人于將曉時見石自江中飛上霧中甚多羅岷之南為險山勢極峻絶邇年循鳥道闢仄路以通往來行人便之易羅池在龍泉門外瞰九龍山麓泉由地噴者九竇滚滚沸出不舍晝夜郡人神之因名曰九龍池周回甃以磚石內有荷花夏月盛開西岸有二亭其一舊名觀瀾御史隂汝登重建題曰龍池春曉其一跨沸泉之上舊名偕樂副使郭春震重建題曰九龍清派泉石澄清遊人絡繹足為一方形勝花甸白鹿岡偕春江山行千里入萬花溪其卉秀葩名不可辨又五里至風吼門皆緣翠而行夷則騎欹則輿險則徒步至玄武池祠春江先登曰此山如龜此水如蛇盍少坐以息僕夫澗風灑衣頓覺涼冷乃起五六里折而北豁然夷曠平甸二十里淨緣如拭至此則騎者揚鞭而騁弧者擢矢而射步者躍舞倦者嘯歌如起塵世而登雲天人各朗然自異甸之東西皆連岡西岡層疊如雲梯東岡壁立如挂榜萬木隂森千里蒼翠竒花異萼綴繡垂纓廣甸之中水竹區别遊人來往度竹穿花既過一區復見一奧既廣一奧又見一區曠而奧奧而曠如此者四五乃達白鹿岡下岡以白國道人隆祐禧得名世傳禧在此岡修煉騎白鹿仙去即此地也岡東里許兩山如壁中夾一川袤十餘里廣僅百十步耳其間雜花異水丰茸葳㽔石色蒼然窈窕修迥若門其北谷遂與人境隔絶矣按野史謂此中古有四村曰黃熊窩曰狼香曰杉樹曰乳牛墩當時避世高蹈者居之在晉時為吐番略地遂無居人北行里許至銅屏山山下有高詔潭水如澄墨其深莫測岸有蒲草軟厚可坐方解鞍樹隂見子壽與一道士揭壺漿來僕夫吹笳與樵歌牧笛遙應互答諸人擊節相快頃之潭隂雲起一衆愀然乃子壽向白鹿岡下誅茅圍火而卧壬戌登岡頂東西岡而問焉其西岡之名曰望海曰香柏嶺曰石鼓巖曰分水嶺其東岡之迹曰羅漢堂曰禮拜石曰石鼓寺曰醮斗壇曰伏猿巖曰寶光石曰洞簫巖曰祈年石皆在指顧之下豫不能遍歷乃分遣從遊二三子往觀其槩頃之分遣者各逞竒勝而分水嶺則觀音大士輦巨石釃水西注鳳羽香灌田百餘頃改無益就有益誠神功也石門山石門山在點蒼山之背嘉靖甲寅春首豫約雪屏趙中丞史城楊江津遵洱海歷橋出宿漾濞村舍翌午至金牛屯飯當孔道有石如牛村因得名騎向石門亂石荆榛且行至則兩壁牆立青蒼萬仞有若門焉豫窺其中萬松參天高巖蔽日隂森窕窈深十餘里窄處如鐡峽廣地如桃園兩岸石苔不可著足南岸處峭石色蒼然北岸亦斗絶然石上負土松崿之際可亭可廬流泉穿石往往成渠靜默有頃但聞水聲淙淙如鳴琴佩玉林際鳥語素昔未聞令人起絶粒之想東望一峯尖削積雪未消正臨壑上時日亭午蒼翠之中植一玉笋與谷中水石相為照耀忽有驚颷從空飛墮聲如鍧雷凜乎不可留從者扶挽而出有野老來告曰谷底無人行須從高處俯瞰則壑中景物不能遁藏矣豫三人乃折東北緣坡坂而升數里至一寺汲泉瀹茗少憩又東一里所有大石四面如削村人搆亭其上今燬矣又東升三里至仙真閣閣之南有石洞洞前石檻可憑則見向之石門在其西下視數千尺壑底水石如窪如盆或方如槽黛蓄膏停不可名狀微風度壑如恐濤激撞乃知嚮之雷鍧處卑使然也二公曰使此景在淮揚吳越之間當塗金碧以飾之寸土之價可值千萬而棄于荒莽誠可惜哉又聞北山有名石巖侵曉騎行三十里遙見一物如白蓮傑出翠微中僕僮皆歡譁騎者加策輿者努挽至則有佛宫倚山而搆以地里計之當在點蒼悉達場之背四望空闊心自豁然便有御長風凌倒景之意雪屏曰昔者觀于大壑則思守獨乃今觀于綿渺則思逺遊二者將何取衷哉史城曰昔所見者奧故思深今所見者曠故志大勢使然也豫曰境變則體殊情生則智隔皆有乖于聖人之常者也雲龍山踰蒙自三十里而逺四山盤束如輳若蒼虬行天百靈景從蛇蜒飛舞可愕可愛前出數百里林木蒼鬱拔起如畫路人指曰是名石室中可坐千人又前數十里石巖欹上而削下有峯數萬營户其陽土人利其用旁有石洞一罅啓牖上其內平經行者夜宿其中足容百人云有虎豹蛇虬患其前石峯十數崒嵂雲表隱若城壁風松語天半可望不可即一徑逶迤側入使有百人守之虎士數萬未可傍也其中皆山箐廣數十弓袤數里兩峯石筍如束草木連蜷雲氣出其間如白練竒形詭勢鬼鑿神局不相連屬如覆盂如巨牖如虎噬如龍翔鳳翥如玉女靚妝勇夫卓旗千變萬狀不可殫記遙睇其中回峯盤固翠雲相蕩琅玕琪樹瑤草文鹿出眇入忽意者必有安期羡門往來其間非人世也不然則山精木客之窟宅殆有神物為之啓閉世有謝安靈運刋木通道竒祕當不在十丈洞天下日昃絶壑火光青熒疑為鬼磷策馬疾馳宿小雲龍山下馬牛肩摩尾繫無算兩山萬石林峙雕玉鏤雪白光摩夾甚怪土人鑿山為峽騎可通南即大雲龍從絶頂鳥道斗絶雲霧間踸踔數里不敢俯睨一峯東轉屹若屏幛可數千仞峭拔尤甚阿盧仙洞至大洞口有大虎石當門左旁有廊一連四隔頗露其竒行數步有小洞口止容一人匍匐而入亦有大虎石當門又數步路甚狹若人咽喉然行數步其路宏厰深邃不辨東西南北也又下雕欄一周行數步下有綵雲一段左旁有大傘蓋一柄又行旁有甑二女供炊行數步旁有寶塔一峯行數步旁有獅象猿三獸固無全形皆顯其首行數步懸石甚多鳴啞各異以石扣之其聲有如大鼓者有如洪鐘者鼕鼕隱隱足聳聽聞行數步水滴有燈盞圓深可愛行數步有擎天玉柱高三丈許身披錦繡挺然獨立直抵于山頂真天下竒觀也行數步有水田一段牛眠其內行數步有瑤床一張若施帳幔者行數步佛龕一座搆簷結棟雖工于畫者不能模倣其妙矣行數步右旁陡下有水其深莫測臨安三洞臨安古句町國治在滇之巽方勢最下達交廣界僅四百里氣蚤燠初春衣不能夾望皆童阜郡治博大而爽塏西北有水雲萬象南明三洞者傳竒久矣余友賓巖何君海峯朱君日謀與余往余先往畢試事遲之乃丁卯花朝也繼得二君書不果來厥明與壁山盧君出東門北渡瀘江橋徑南營哨煥文諸山從右起連峯競如秀環郡點黛行約兩舍至南明洞洞前亭三楹俯瞰羣峯足供杯酌與盧君攜手步洞門門僅容二人似卑賤從右小石門俯僂入稍進四顧高敞白石勝玉鍾乳懸注物象環詭巖畔若垂旒狀者不可殫述爰有天忩接啓不假炬光日射石室萬形可辨與盧君坐石上各數觥罷至洞底巖高四尋許上露大竅竒樹婆娑舞影落洞中又南明第一觀也出洞從左登降巖壑可二里至萬象洞口半規懸壁吐簷若廣厦與盧君倚騶奴肩下磴憩其門酌罷秉炬入百武許垂乳萬狀十倍南明中惟石輪藏特異即雕刻不能到旁一小池如芙渠容水數升余飲之甘清涼驚骨自是從者各牛飲其中不竭蓋天漿乎稍進一里攀磴上下亂石鈎衣前令數童子擊石鐘石磬余倚壁聽之聲戛戛繞萬竅此又南明所無再進一里許多支壑危石橫道深黑難測傳聞此洞杳不可極石路㟏岈躡屩甚艱乃出洞陟磴道踸踔深沙中命二吏從前後曳擁始就平遂席地坐與盧君相對張吻作鋸木聲少息復北行折而東沿山麓行十里道苦之更復下山從西澗沿瀘江入水聲傾澗澎巔雷轉約三里至水雲洞洞舊名巖洞殊蕭索不稱余易今名云洞門峻啓霞壁刺天石堂窔奧顯敞寡匹垂乳如林難以辭敘稍進則飛龕丹盤標舉旁發曲折其中如遵兩掖其石扉高雄吞束長津上垂石簾數丈若有天帝端居清虛之表令人正襟而立再進則秉炬望一竇乃江水奔流處不可徑矣余顧盧君謂茲洞明豁閎傑勝萬象南明逺甚真足樂也將理策返左右曰此前門若觀中洞更竒余與盧君撫掌曰有是哉遂由北行山徑羊腸舍輿而步可三里至中洞甫至洞口見飛巖截雲似墜復倚一石柱從右撑拄甚竒與盧君列席坐沙上仰對蒼壁下臨江水蓋瀘江從前門入者伏流至此素湍淥潭回青倒影特可稱心時指揮王盤石命漁者取魚數頭跳抨水中令庖丁擊之佐觴焉觴數行畢由左渡橋入時日射洞水巖懸萬數上下搖動最為佳境稍入深黑前列大炬松燈百餘枝驅鼓吹十餘人傳響前導攜從者暨逺近旄倪來觀者幾五百人稍進一里許顧四圍石形玉立上懸下踞左詭右竒不可窮極究詰又進數百步翠屏石柱瓏透藻麗文踰刻畫如是者百餘處遊人穿屏柱左右隨意雜踏此中敞曠不止容數萬人見空中四垂如蛟龍倒飲如幢幡標建凡宇宙水陸動植物象洪纎悉備兩壁間千門萬户不惟足迹難遍如昔人所謂目不周玩情不給賞者矣又沿水行一里部吏好事者用木塊上作梅花燈百餘浮水中點點星流參差相望復沿水行半里隱隱見一人立水中亟索長炬照之乃白石丈餘類大士像下有石鸚鵡似傍大士而鳴從者皆呼此水觀音合掌禮之又渡橋行二里許冥冥漠漠仰面環視四無界際碧潭澄渟寒煙縈罩間有腥風逆鼻神魄俱怖時從者各攜燈炬命盡燒之不下千餘火無光熖初甚疑悸旋思之乃傾倒深廣火力耗散仍命二三武吏取烽火數竿橫竪射之皆如行空中不可極乃知斯境高廣無量欲再探部吏皆作驚竦狀請罷一恐炬火難繼一恐大逺迷歸余忽回想距洞口誠寥邈矣遂返洞中皆平沙無援高降深險出洞口時真似脫胎天府偶落人間徘徊靈境悵焉如失顔洞臨安府去城數十里有洞曰顔洞嘉靖中蒙自縣丞顔宏所開也其地兩山夾峙水從洞入洞口白石一柱如玉垂水中暗然莫測顔放舟燃火而入窮其至極然後知洞有三層迤邐盤旋而上入深四十餘里廣處可坐千人高不知其幾何洞水出阿迷州下洞一龍仰附于洞前二足捧頭而下鱗角眼爪纖悉具備中洞獅象相峙于口內則飛走之禽器具之物不可枚數若白鷺青魚黃羅傘紅桌圍種種色相宛然而鐘鼓二石扣之聲切肖也入深觀音半身面如傅粉唇若點珠頭總一髻左有青石浮瓶右有白石鸚鵡盡則石床一張上下四柱菱花片壁即人間之拔步耳上洞一層一僧一道蹲踞相視若漁樵問答之狀極後洞門坐一老翁戴東坡巾但少生氣耳又普安進山四十里有玲瓏石樹二株一則緑幹紅花之桃一則青幹白花之李非若繪畫于壁者也瑛疑洞中肖形之物或前代好事者為之碧雞關去會城三十里而遙循關右箐斗折而南五里至髙墝舊有楊太史用修海莊至此遂俯視昆明池乃買舟泛焉一望五百里瀦西南隅俗號滇海下髙墝輕舟淺渚蘆葦颯沓長過人又稱草海海長二十餘里草中津港以千數往來繫罣䍡而漁余蕩漿其中知非山隂道上也草窮且挂席出水海值風狂泊焉易筍輿而登上數里及太華山門蕊宫琳宇熒煌金碧倚山隆起擬于紫霄碧雲之間廊右繞出縹眇樓觀海危􅀈一粟水勢粘天顔以一碧萬頃然哉質明緣崎岸積石而南逺見山頂空廬嵌空一如罨畫輿者云羅漢寺也盤辟而升計四五曲入寺問南北庵寺後樹金馬碧雞碣摩乃入南庵路回則轉北庵二庵者南踈朗北幽峭南庵橫截山麓而過金鋪緣房足稱近水樓臺北庵摶扶搖以上層層各十丈轉出椒斗大崖則憩一宇焉人側身而渡鳥道爾然北庵雖高僅見草海白蘋紅蓼楚楚有致若南庵面東南水海風帆雪浪日月出沒其中故大觀也點蒼山點蒼山一名靈鷲山其中峰積雪不消又名雪山釋迦文佛禪栖於此凡六年浮屠者流往往取靈鷲以名其寺蓋本諸此按鷲鳥飛則連翼今山凡十九峯如鳥之連翼而將翔也山正東面城郭之外碧瀾萬頃襟帶茲山是為洱河程子讀書録謂洱河即黑水􅐱道元水經曰葉榆水禹貢華陽黑水惟梁州謂華山在北黑水在南極兩端以侈兩域也洱水之源或伏或見蓋歷經三危歷班超城之西而南下靈鷲之麓滙為巨澤西流與蘭津江合而入南海滇蜀諸水皆入江獨此水皆入海故尚書稱禹導黑水入南海點蒼山自余所歷道塗萬有餘里齊魯楚越之間號稱名山水者無不遊已乃泛洞庭踰衡廬出夜即道碧雞而西也其於山水蓋飫聞而厭見矣及至楪榆之境一望點蒼不覺神爽飛越比入龍尾關且行且玩山則蒼龍疊翠海則半月拖藍城郭奠山海之間樓閣出煙雲之上香風滿道芳氣襲人余時如醉而醒如夢而覺如久卧而起坐然後知吾嚮者之未嘗見山水而見自今始二月辛酉自龍尾關窺天生橋夜宿珠海寺候龍關曉月兩山千仭中虛一峽如排闥然落月中懸其時天在地底中溪與豫各賦一詩詩成而月猶不移真竒觀也下山乘舟至海門閣小飲壬戌復行入關由混混亭而升覺真庵北折入谷口觀寶林寺山茶因叩圓海寺瀹茗煮泉坐于萬松之隂巳乃拄杖下北澗度口關至鶴頂寺松竹廕軒洱波在席相與趺坐酌清酒時夕陽已沈西山缺處猶露日影紅黃一線本細末寬自山而下直射洱波僧曰此即鴛浦夕陽也餘波皆碧獨此處日光湧金時有鴛鴦羣浴今則網罟太密此景時有時無不常然也豫曰但觀湧金流采已自勝耳癸亥北循山坂至金相寺廢址有唐碑為髙僧講經處盤山腳而西至松蘿崖石洞幽勝相與酌酒賦詩暮投感通寺樓篝燈夜坐聞寺僧誦等字中溪曰六書中轉注實非考老而宋人妄擬後世學者遂沿而不改此不可無述願公任之豫遂操筆書轉注之例約千餘字彚為一編中溪題其額曰寫韻樓寓此凡二旬日而後去兹寺有高皇詩十八章鐫碑山門院凡三十六今存者僅半耳三月乙酉北行五里有寺曰玉局內有昭文祠土人祀唐御史杜光庭之所西南有一溪疊崿承流水色瑩徹其中石子粼粼青碧璀璨宛如寶玉之麗其名曰青碧溪緣山麓北行二里至天臺有諸葛武侯畫卦石土人於石上建八塔以識侯之迹云東行一里至𢎞聖寺有浮圖髙二百尺規制嚴整考之野史為隋文帝時所建者或曰阿育王北行二里至點蒼神祠即唐書載史臣與南詔設盟處也翠微有巖異香酷烈豫二人不能上令人候之果然廟後有問俗亭俯瞰城池樓觀汲海萬頃澗松縈雲巖雪映日沽酒更酌村人薦米纜食而甘之既飽下山北行二里抵三塔寺宿寺有七樓八殿皆中溪重加修建者中溪有書樓在焉因留連纍日芒鞋藜杖相與入瀑布溪懸流百尺其承流處有石如盤盤中有一石為瀑流所激跳躍如馬聲如雷鍧石壁上有硃字詩為濺洙所塗逺不可辨憶當時題刻懸搆千仭之上非大力不能也壬辰登帝釋寺松蘿蒼翠因止宿焉夜中靜默聆丁東琳琅如琵琶笙簫又如琴瑟有頃而寂舊聞兹地夜聆天樂故名其峯曰應樂中溪曰豈山腹空洞萬竅遞響耶豫曰如此則不應有作止也僧曰世傳空中隕石上有帝釋像今所奉者是帝釋為天主中最尊故有天樂隨之豫曰六合之外聖人存而不言此亦世外事不可以臆見度其是非也癸巳北度兩澗乃至無為寺有汝南玉碑聲如玉磬清越可聽因以木擊之歌少陵春山相求之詩聞北岡有元世祖駐蹕臺後人屋之方至其處大雨忽至遂趨屋下避雨軒忩洞溪最堪遊目則見滿川烈日農人刈麥豫曰異哉何晴雨相兼也中溪曰此點蒼十景之一所謂晴川秧雨者是已每嵗五月溪上日日有雨田野時時放晴故刈麥插秧兩無所妨世傳觀音大士授記而然西上里許有寺曰救疫山泉甘冽疫則飲之可以已病寺因得名北去四里登鶴雲寺寺有仙女池沖舉石相與坐嘯久之又行北六里至石雲寺沿溪而西過獨木橋升寶華寺其地多花卉紅紫膠轕乃移枕簟以息中溪弟春叔期季和預煮樽酒於叢薄之中忽從滴乳巖傍出見不覺驚喜拍手大笑因引滿盡醉是夜卧草庵殊覺快適甲午同上悉達場遙見瓦屋懸構于蒼煙之上匾曰中溪小隱時已入夏猶圍火而卧晨起窺石洞猱緣細路下臨百仭比歸頗有垂堂之悔出山因以相規云丁酉至陽溪歷遺愛寺觀舍利塔入溪三里有一石門如圓月者羅剎洞也世傳觀音大士閉羅剎于其中云又西行八百里至出佛洞巖壑幽絶可以結廬又西六里為洞天山層巒疊嶂望之蔚然顧徑路崎仄且空山無人乃旋轡出谷宿遺恩寺中溪謂豫曰不見廬山真面目只因人在此山中必須東泛洱水卧數溪峯庶盡點蒼之變耳己亥由上關水月樓放舟遵島嶼而南至金榜寺搖落無僧又南觀青巔寺前巨人迹已乃南泛有崖飛出水面曰雞額山維舟山隒徒步而升石磴盤旋可三百武則見削壁卷阿正向點蒼十九溪峯盡在几席間山巔積雪山腰白雲天巧神工各呈其伎豫曰此非點蒼真面目乎微公幾失此竒觀矣洱海葉榆水一名西洱河出浪穹縣罷谷山下數處涌起如珠樹世傳黑水伏流别派也自大和縣西北滙於縣東為巨津形如月生五日繞縣西南由石穴中出盤回點蒼山後是為濞水與漾水合又會蘭滄江而入南海蘭滄即黑水也水經曰罷谷山洱水出焉又曰益州葉榆河出其縣北界注曰縣故滇葉榆之國也縣西北有鳥弔山每嵗八九月衆鳥千百為羣集於山下鳴呼啁唽俗言鳳凰死於此山故衆鳥來弔今在點蒼山之西北弔鳥羣集如期益信水經之不誣也左思蜀都賦曰諸葛亮之平南中也戰於是水之南即此水也水有三島一在青巔山之南二在羅筌山之南南島上有石刻硃字文如古篆父老云世傳是大士觀音買地券今莫辨也東岸有分水崖儼如斧劃漁人謂自崖下分水為兩界南為河北為海鹹淡不類河魚不入海海魚不入河魚遊至此則返魚族頗多視他水所出較美冬鯽甲於諸郡魏武帝四時食製曰滇池鯽魚至冬極美蓋謂池之在滇者美鯽也海首有石穴八九月産油魚人謂水鹹故肥河尾産細麟魚皆魚族之至美而河海鹹淡亦頗徵焉八月望夜河海正中有珊瑚樹出水面漁人往往見之世傳海龍獻寶內典云珊瑚撑月此世外事不可以意見度其無有也冬月海風水面起火高數丈莫知其故易象曰澤中有火革海賦云隂火潛然豈其事與水中有三島曰金梭曰赤文曰玉几水涯有四洲曰青步鼻曰大貫淜曰鴛鴦曰馬簾九曲曰蓮花曰大鸛曰磻磯曰鳳翼曰蘿蒔曰牛角曰坡􅀈曰高嵓皆可田可廬而大鸛洲隨水深沈如世稱鸚鵡洲然雞足山出賓州北門行一舍許見遙岑紫翠僕夫指點此雞足山也二十里至煉渡午餐五十里度洗心橋歷沙址村西折二里許至圓信庵丁香爛漫庭際似夭桃散步靜雲庵轉入僧寮盆蘭敷華皓潔如雪鐵線牡丹纒枝小屏羈人乍見以為竒此地乃恆有耳是夜宿庵中晨興由靜雲庵左行登山晴旭方升清霜塗草夾路青松細竹八九里越龍翔寺至聖峯寺登玉皇閣望煉渡河四山環碧白雲千里復行里許山坳奠海慧庵古樹虬曲摩霄飛蘿生飄垂絲結綺樹皆倚崖懸谷髙下為林大抵數百歲物也石壁有真武洞不可登憩迦葉殿出門北折樹益古石益竒路益峻輿人益勞兜率小庵綴于洞旁恆有落勢憩鐵瓦殿或以前進陟拔兩人奮決不顧猿攀石梯二十步輒一息計八九息至土主廟乃絶頂也兩人閉目坐一小室移時氣復山引派踈脈如雞信距故名或云西竺有雞足山兹形似之故藉以為重而以圓信庵為迦葉示寂之地改圓信為傳衣者誤也久之躡級而北甓塔半圯經捨生臺雪山露峯金沙橫帶點蒼洱海掩映流注聞北巖有二虎跳澗太子藏頭處險遠不宜登乃西折蟻附而下見二仙石枰徑甚險峻至曹溪庵仰望捨身臺青壁千仭巖畔細泉下注為八功德水太子藏頭曹溪八功德水皆托名耳雞足山峙賔川境內山面南卓立萬山之上前紓三距後伸一支若雞足然者佛弟子迦葉奉金縷衣入定待彌勒處也余由瀾滄渡金沙江南東支始入為石鍾寺西為西竺菴後為龍華寺寺與菴咸有傑閣龍華為大覺行穿萬松中又一里為寂光寺西百步為水月菴去而之聖峯寺由聖峯即走山中支攀迦葉殿謁尊者自此純石步步喘息過兜率庵袈裟石而後至洞佛殿西出側徑達華首門東乃走險上猢孫梯石齒齮齕利侔劒戟里許方至土主廟則山之巔也入廟西北指則見麗江靈山西指則點蒼十九峯雄據不肯為雞足下循後距則舍利塔北一里為文殊閣又二里經束身峽至伏虎澗半里至禮佛臺乃東跨逼昃三里渡曹溪又二里嘗八功德水又東二里謁華首門還入銅佛殿十里而下轉西南支入華嚴寺五里下圓信庵宿八角亭次日復下接待寺渡洗心橋至賓川貴州貴陽府山曰貴山府城北蜀道所經又名貴人峯郡之得名以此銅鼓山城東高百餘仞山半崆洞常有聲如銅鼓相傳為諸葛公所藏者貴陽景云銅鼓遺愛即此高連山城南山高而連屬唐史謂牂牁境內有高石門二石即山石門山絶頂二石對立人行其中儼如門焉棲霞山山腹有洞曰來仙石人山水西大道山頂羣石拱立如人木閣青山延袤百餘里林木蓊蔚中有道通水西畢節地方南望山城北崇峯大箐嵐氣晝冥人迹罕至為郡之鎮朝陽洞中可容數百人懸崖滴乳千態萬狀間有青緑傳於崖石殊為竒絶遊觀者多品題白龍洞崖石玲瓏巧于追琢深入數丈須假燭導半里許一水泠泠莫究出沒駕竹穚入可並行又深入有鍾乳數株大如楹扣之嗄然如鍾其他水花瑶草如珊瑚靈芝者又錯置雜陳使人接應不暇誠哉竒境也雲巖洞舊名唐山洞治城西北陽明洞在龍場驛宣慰司山曰瑪瑙山峯巒逶迤林木疊翠水西宣慰安氏宅居其山麓養龍坑兩山之間泓渟淵深靈物藏其下當春初和暢夷人立栁坑畔擇牝馬之貞者係之已而雲霧晦冥類有物蛇蜒與馬接其産必龍駒也思州府山曰龍唐山府城北産鐵粉松園屯山高大磅礴為郡之鎮江頭山傍有路坪土人遇節相聚笙歌於此思南府山曰萬勝山在府城前四面斗絶三台山山頂有三峯竒秀可愛峯上嘗有雲氣覆焉東勝山城東諸峯環峙如畫巖門山府城西兩山對峙巖壁險峻道官出其中左曰大巖門右曰小巖門永勝武勝二關依巖而立蓋郡之戶門也迎春洞藏春洞二洞去巖門山數里許洞不甚深廣而壁石竒濶樹林喬鬱妍花異卉盛産其中蓋一郡之佳境也大巖山婺川縣東巖屋深廣大聖登山印江縣東山澗深沈多魚鱉人不敢取相傳有神物在焉鎮逺府山曰石屏山石髙百丈端直蒼潤如屏府治在其下為府之鎮觀音崖崖髙數千丈屹立江上有石磊磊如佛像洞頂色碧石紋􅋣起如龍蛇然石崖山舊築崖門守禦西峽諸山自鎮逺勇溪西至偏橋西岸山多如樓臺如鼓角其崖黑白相間如銀牆如鐵壁其勢上下相承如神工鬼斧砌築而成有瀑數處挂巖石而下其狀如青綃如薄霧如撒珠璣其近瀑崖石如挂肝如懸芝怪竒特甚大洞鎮逺東分水嶺上俗呼七門屋蓋夷山名空此其最大者中有石乳滴地如罏斗石柱有雙白石臨江並立高數十丈屹然如柱一在偏橋西巴施山施東縣北圓聳插天巴邦山卭水司西漏日崖偏橋司東高數十丈有竅通明朝夕日出入俱漏光石阡府山曰知府山秀麗雄壯左右有山為之輔翼蓋郡之鎮府治在其下侯山知府山右擒龍山知府山左駱駝山石阡司西銅仁府山曰東山府城東山勢嶙峋雄壯秀拔迥出諸山為一方之巨鎮銅崖山屹立銅仁大小二江之中將軍石大江之側形如人披甲胄故名石梁山山石橫亘宛如棟梁黎平府山曰錦屛山在府城東竇帶山其形若帶環繞郡城銅鼓崖府城東有洞髙大如屋深遠可三里中有溪水橫流羅團洞洞門寬廣傍有石磴如牀可容二百餘人都勻府山曰筆架山商城西三峯喬聳其形宛如筆架二龍戲珠山二山形如二龍中有團山如珠六洞山平州司西獨山州治南其山尖團而峻無他山相連因名永陵州山曰紅崖山州治西北懸崖壁立萬仞惟東面可登山伴有洞寬廣若堂深數十丈中有杉木枋四片不知何時所貯其色如新中有石人石馬各一近山居民間聞洞中有鍾之聲或崖上紅花如火是年必有瘴癘世傳為諸葛武侯駐兵息鼓之所箭眉山項營司西勢極髙大周四十餘里河流縈紆其下巔有兩峯峯畔一谷甚寬平可耕鑿土氣多燠蔬果四時不乏然多煙瘴不可久處惟土者乃家居焉關索嶺項營司東勢極髙竣周回百餘里上有漢關索廟因名鎮寧州火烘披山石髙陡其氣燥燠雖隆冬登之亦汗出沾背安順州白石崖白石崖髙頂平可居且有泉水四時不竭普安州八部山九峯摩空一泉奔注八納山上有平頂旁連小石百餘尺頂有潭水極清木葉落其中鳥即銜去泉聲樹色常與煙嵐掩映興隆衛飛雲巖巖去地百餘尺中虛而下嵌乳液融結紛詭殊狀東坡山山下寺曰月潭飛巖倒懸巑岏巧怪垂珠滴乳盡態極竒若神蛟之駕秋雲靈鳳之騫晴漢又如千乘萬騎浮空以驅仙子靈姝御風而下雖五丁之力吳剛之技追而琢之不足以方其妙蓋天成也旁有崆洞邃不可入而一泉清泠自半巖奔流于野其佳勝殆無與比矣普定衛玄真山巔有二巨石對立上建玉皇閣匾曰玄真境清虛洞東巖山畔洞之前危峯削壁迤邐不斷其洞有二一明在山南深逺寬廣如堂宇然一暗在山北門僅通人內廣袤深不可測洞中有白石滴乳儼若人物雲龍獅象之狀龍潭洞山上危峯盤亘雄峙洞門廣十餘丈流水出焉深不可測安南衛白基山山勢巍峩傍有削壁清秀可愛朝陽洞石巖平入竹樹森列清蔭蒙密日出則光彩明媚中産異石竒形怪狀猶鳥獸傘蓋或如檯凳器物者又有清泉從石隙流出澄徹如練赤水衛東陵山水石清幽蒼翠如滴永陵衛海漫山延袤八十餘里如海水之汗漫金築安撫司天生橋在安撫司北三十里石壁千仞環繞如城水流其下人行其上坦然如橋貴州山川木閣青山在宣慰司城西四十里林木蓊蔚水西之境由此而入養龍坑在養龍坑長官司兩山之間泓渟淵深靈物藏其下當春初和暢夷人立栁坑畔擇牝馬之貞者繫之已而雲霧晦冥類有物蜿蜒與馬接其産必龍駒本朝洪武四年偽夏明升降獻良馬十其一白者乃得之於此首高九尺長丈餘不可控御詔祀馬祖然後敇典牧者囊沙四百斤壓而乘之行苑中久漸馴習後將行夕月之禮於清涼山乘之而躡雲一塵弗驚賜名飛越峰且命繪形藏焉翰林學士宋濓為之贊大巖山在務川縣東八十里山有一巖深邃可容百餘人時多遊玩于此蝸溪疊巖在府西一百二十里峻壁間有一石門泉從中出嵗旱禱之風雨驟作銅關鐵寨山在潭溪長官司西南其山高峻上頗平廣可容千人三面據險惟南可登銅鼓巖在黎平府城東北二十里有洞高大如屋深逺可三里中有溪水橫流羅漢洞在府城東北一十五里洞門寬大傍有石磴如牀可容二百餘人八部山在普安州城東三十里諸峯皆石矗然摩空羅磨塔山在州城北一百八十里四面峭壁上有寨惟一徑可達東北瞰盤江三一溪在州治東其源有三一出沙莊一出雲南坡一出目前山三流合一入于城南水洞洞外狹內曠其巔有通明處其中懸崖怪石狀若人獸清竒可玩關索嶺在項營長官司治東勢極高峻周回百餘里上有關索廟因名蔡苗山在新添衛城東北一十里上有泉懸崖飛下宛如玉虹名曰飛泉都勻洞在都勻長官司東一十里前門北向高廣一丈五尺後門南向髙廣四五尺洞中亂石狀如象鼻雜草叢生白水河在安莊衛城南三十里懸崖飛瀑直下數十仞為河湍激若雷平日雲霧塞其下東坡貴與楚鄰封當兩疆之界曰東坡由道左入躋攀林麓僅百武許有飛巖倒懸巑岏巧怪垂珠滴乳盡態極竒若神蛟之駕秋雲鳴鳳之騫晴漢又如千乘萬騎浮空以馳仙子靈姝御風而下雖以五丁之力吳剛之技追而琢之不足以方其妙雙明洞豫行抵洞蒼然兩山夾道下有寒泉注為澄潭怡然豫懷從者曰未也白石壁立半折崖側下有通徑劈竇圓如滿月竒哉斯之謂洞也從者曰未也緣門以入小徑夾崖前峯兀嵂蒼碧澄流穿石折而西回又一方渚磷磷有聲雲氣拂面靜觀日色山影澄沈如鏡東西風月相射南北繞繞石盤如蓋衍土一區可坐可話往來百步餘而興入風泉雲壑之外矣顧崖門石笋數尺形類粧點佛虛可容背旁婉曲侍童環立者可數人俯皆平石泠然徐子發浩歌童冠者摳衣而進歌湛露前溪橫小梁渡涉者莫子起以請曰未也渡此則雙明洞矣余臨衣却顧步小橋流水之潄穿石洞援壁而登六七步間恍然光厰堂壁四周前開一面以吐日月上圓下方竒偉一室環壁靈異莫窮變態中座四顧山水之竒足澄心目飛雲巖貴州省城之東有興隆衛去興隆二十里有月潭寺寺左為巖榜曰飛雲旁通一徑有石級可陟而上巖內石壁陡立髙約幾二十丈廣半之上覆如屋中虛而下嵌其質純白如粉間有紋理望之若白雲堆積然上有尖石下垂若懸筆者三下有圓石峙立若石柱者四巖之前松杉蔭翳若不知有洞者水雲洞貴州外衛曰普定者即古羅甸國也衛南十里有洞曰水雲焉崇山峻嶺環矗盤據逺而望之若無罅可入行漸近則見巨石橫立如屏似以障蔽洞口洞之內地平如底且曠可容千餘人旁有潭水下注淙淙有聲不舍晝夜水流山下三十里直入普州滙為巨津約行百步隂暗晦冥如入鬼域遂列炬前導未及里許則朗然如晝心目為之一豁仰觀之則西有一大竅其圓如鏡日光穿射閃鑠異常紅黃白黑諸色咸備居人稱之為四景蓋以紅為春黃為夏白者屬秋黑者屬冬也然以意測之日光正射故紅紅相對故黃近紅者光減而為白其幽邃者光阻而黑焉特隨日之斜正逺近而色因以變遷理或然也洞髙十餘丈廣半之其西南隅最髙處一石直立真若觀音佛手提籃器東西一白石甚小若鸚鵡延頸呻喙然者雖巧于裝塑亦莫之能過也東北有石蓮花形色種種西北特出一石柱龍鱗櫛比人稱為石龍要之石髓淋漓積久所致者下有石池溝塗封植宛若田制以其在石龍之下故又稱之為龍田云蟲斯塘九曲嵗乙亥孟春豫築河西螽斯塘引水灌田堤成豫往閲焉隱隱望西北岡下巨石嶙峋於是沿溪而上溪凡九曲東界大路水發路旁石壑中莫窮其源也折而西止溪北高阜突出二石左如龍昂其首右如虎蹲踞而伏心頗竒之約二石之址僅容亭即以草八日戊辰基其地二月辛未草搆方亭匾曰出潛義取見龍兆文明爾郊外荒僻亭不足居謀建草堂堂成匾曰收春豫自經始日出偕出日入偕入旁搜諸景半屬隔溪爰伐木得棕株為百節橋以度溪旁有石類鳳方春水涸形體全露西南一石孤髙壁立與鳳石對倣佛十洲三島所稱鰲嶼特大小殊爾環繞兩峯劒門戟戶雨榭雲窩層見疊出轉瞬應接不暇復循鼇峯而北有地一區平衍如掌與出潛亭相峙地脈從東北三台山降岡巒拱衛勢來形止堪輿家謂全氣之地庶幾焉惜多荆棘人迹罕至豫始芟刈周遭密察宜建八閣岑樓闔郡山川盡在目睫不特收春堤之勝已也大平之北西岡之麓俄聞水聲潺潺豫復令童子引手步入後洞洞隂而深泉水四出有正有隱有懸有仄爾雅記瀐濫沃氿是也澮而為一飲之味甘出洞遵古溝南行探水所委則衆壑攢簇絶類灩澦堆狀水灌其中豫逡巡躡之石竇生成宛陶冶所製自九月至三月其內可席而坐深僅五丈崖覆者三之一餘吐日吸月天尤掩映惟隂雨則巖溜浸滴上建亭可蔽之洞前石壁峽峙兩柱于雲旁左一池如硯四時不竭豫笑曰其殆張芝洗墨乎仰首則天乙文筆二峯若相拱揖因憶丁巳仲冬望前之夕曽夢二洞一正南一東南不數日有授産者豫貧莫能應為其強也翌午率諸豚往觀之與夢中景象不爽毫髮水出山腰逾洞頂東注洞如懸鍾揆日測景且向正南豫喜始售以值時乃據西北石屋有三石下垂姑名鼎洞以應厥夢庸知東南之洞實潛於此其上左右二石形如鼎圓則疇昔鍾鼎之題豈偶然耶夫以丁巳入夢乙亥成之二洞相去曽未二里洪荒迄今為草莽蔽翳不知幾千萬祀豫一夕而得之服闋北征金陵胡秋宇時在翰林繪圖鍾鼎并贈長句清平孫淮海己巳撫鄖臺寄壽有鍾鼎長樓小洞天之什可徵也剛出洞口則溪之四曲以至七曲一望草木蒙密亂石雜沓髙者類笏卑者各成形質八曲內一石髙廣方平可當抵柱往遊秣陵覩方印南屏不足多也遂鳩工合四曲大闊一池與舊池連接盛夏狂瀾藉斯石障之復砌閘為防以通舟楫水涸則閉水溢則啓兩湖相望三翼舟名遊翔王子安謂列岡巒之體勢窮島嶼之瀠回借彼喻此殆非假托而溢美矣方臺榭草創猶憾諸勝盡屬溪南一日坐草四顧荆榛漸闢迤西有大石壁乃捫蘿而下北望石澗中秀巖森列如笋謫仙詠青天削出玉芙蓉近之最北有天生橋稍狹澗水從橋下過則溪之鄰大路第一曲也橋南數步一石面南者甚竒其上可亭芙蓉石之左有泉自峽湧出流為方池圖書編卷六十七
