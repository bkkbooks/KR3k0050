body:
  text: 圖書編卷七十一明章潢撰脉總叙人一身骨節三百六十五與周天度數合其大穴數如之而毛竅則八萬四千雖智者未易以周知也然運旋于骨節毛髪竅穴間者不過氣與血而已氣為衞行脉外血為榮行脉中其所以𣲖行氣血於十二經十五絡者皆脉以為之主也而周身之脉又别之為八竒經焉古人知天地之化育識人身之隂陽握其樞于寸關尺三部以中沉浮九候之凡氣血盛衰表裏虚實所感風寒燥濕皆于此乎辨之夫人之臟腑包絡骨髓皮毛未易周知獨于脉乎察之何至簡而至易也予非深於醫而精于脉者特每旦初醒目時自診其脉覺寸口獨旺常舉以証諸明醫咸莫予答也至讀難經謂寸口者五臟六腑之所終始故法取于寸口稍有所悟猶未能洞徹其底一日有感于候脉者必取諸平旦雖云隂陽未動陽氣未㪚飲食未進經脉未盛脉絡調勻血氣未亂然此其梗概而習矣莫之察也其實脉行十二時中寅則注肺百脉㑹焉寸口肺經也每日從寅至申屬陽從申至寅屬隂人目動則行陽目合則行隂寅乃隂之盡陽之初也故百脉變見於寸口診法取决於寅時尤醫家最易簡者况一嵗十二月一日十二時經脉各有所注隂陽升降與天地應醫家者皆莫之究心而間有能療者其亦問病依方偶而中耳噫人生於寅孟子曰平旦之氣其好惡與人相近也者幾希雞鳴而起舜跖攸分豈特可以察脉理之盛衰已哉是故千古一脉至簡至易握其要而百脉朝宗形神渾化兹深有感於論脉之旨任督二脉呼為陽而應天呼出心與肺吸為隂而應地吸入腎與肝立相六千七百五十息是隂六千七百五十息是陽呼為陽吸為隂也榮衞相隨各行二十五度六千七百五十周於身漏水下百刻凡人晝夜一萬三千五百息扁鵲云人受天地之中以生所謂冲氣也且天五之氣始自中原播於諸脉然任督二脉尤為一身隂陽之海人身血氣往来循環于上下晝夜不停猶江河之水相似人但見江河之水東流至于海而不竭殊不知名山大川孔穴皆相通也豈不見廬山瀑布乎晝夜傾注不絶何也水由地中行盖循環相往来也日月之行亦然隨天之旋一出一入往来不窮人知吾身自有日月則往来不窮之妙只在吾身不必索之髙逺矣醫書云人身在任督二脉任脉者起於中極之下以上毛際循腹裏上關元至咽喉屬隂脉之海督脉者起於下極之腧並於脊裏上至風府入腦上巔循額至鼻柱屬陽脉之海所以謂之任脉者女子得之以姙養也謂之督脉者以其督領經脉之海也鹿運尾閭盖能通其督脉者也龜納鼻息盖能通其任脉者也人能通此二脉則百脉皆通黄庭經云皆在心内運天經晝夜存之自長生天經乃吾身之黄道呼吸往来於此即任督二脉是也衝脉者起于氣衝並足陽明之經俠臍上行至胸中而㪚帶脉者起于季脇囘身一周陽蹻脉者起于跟中循外踝上行入風池隂蹻脉者起于跟中循内踝上行至咽喉交貫衝脉陽維脉起于諸陽之㑹隂維脉起于諸隂之交并任督二脉謂之竒經八脉云按督脉起于下極循脊膂上風府泥丸下鼻梁至人中而止為陽脉之海任脉起于毛際由腹裏透咽喉縁口唇上下而止為隂脉之海二脉為前後氣往来之徑路故曰夾脊雙關透頂門修行路徑此為尊然皆為隂氣所守隔閡凝滯閉而不開養生者以積陽之氣衝開之開關之法其在下者莫要於陰蹻此竅乃逐日陽氣所至之關陽氣衝過此竅一動衆竅俱開其在上者莫要于泥丸陽氣將上即存念注于泥丸令其越關而升是名撥轉頂關棙子若得此竅一開則衆竅齊開無澁滯矣可見任督二脉在衆人不過交于唇之上下而養生者獨運此二脉交構於黄中脉有竒經八脉者不拘於十二經何謂也盖脉有陽維有隂維有陽蹻有隂蹻有衝有督有任有帶凡此八脉者皆不拘於經故曰竒經八脉也經有十二絡有十五凡二十七氣相隨上下何獨不拘于經也盖聖人圖設溝渠通利水道以備不雨然天雨降下溝渠溢滿當此之時霶霈妄行聖人不能復圖也此脉絡滿溢諸經不能復拘也其竒經八脉者既不拘于十二經皆何起何繼也然督脉者起於下極之腧並於脊裏至風府入屬於腦任脉者起於中極之下以上毛際循腹裏上關元至咽喉衝脉者起於氣衝並足陽明之經夾臍上行至胸而散帶脉者起於季脇廽身一周陽蹻脉者起於跟中循外踝上行入風池隂蹻脉者亦起於跟中循内踝上行至咽喉交貫衝脉陽維隂維者維絡於身藴蓄不能環流灌溉諸經者也故陽維起於諸陽㑹隂維起於諸隂㑹交也比於聖人圖設溝渠溝渠滿溢流於深湖故聖人不能拘通也人脉隆盛入於八脉而不環周故十二經亦不能拘之其受邪氣畜則腫熱砭射之也竒經八脉為病兩手脉浮之俱陽沉之俱有隂隂陽皆實盛者此為衝督之脉也衝督之脉者十二經之道路也衝督用事則十二經不復朝于寸口其人皆若恍惚狐疑不省必當猶豫而兩心也兩手陽脉浮而細㣲綿綿不可知俱有隂脉亦復細㣲綿綿此為隂蹻陽蹻之脉也此人曽有病鬼魅風死若恍惚亡人為禍也尺寸脉俱浮直上直下此為督脉腰皆强直不得俛仰大人顛病小兒風癎疾尺寸脉俱牢直上直下此為衝脉胸中有痰塞疝也二十九難曰竒經為病如何陽維維於陽隂維維於隂隂陽不能相維則悵然失志溶溶不能自収隂蹻為病陽緩而隂急陽蹻為病隂緩而陽急衝之為病逆氣而裏急督脉為病脊弱而决任之為病其内若男子為七疝女人為瘕聚帶之為病溶溶若生水中陽維為病苦寒熱隂維為病苦心痛此竒經八脉之為病也任脉隂海之經歩穴歌㑹隂正在兩隂間曲骨臍下毛際安中極臍下四寸取三寸關元二石門氣海臍下一寸半隂交臍下一寸論分明臍内號神闕水分一寸腹下列下腕建里中上腕各各一寸為君說巨闕上腕一寸半鳩尾蔽骨五分按中庭膻下寸六分膻中兩乳中間看玉堂紫宫及華盖相去各寸六分算華盖璣下一寸量璇璣穴下一寸當天突結下宛宛取亷泉頷下骨尖傍承䊢頥前唇棱下任脉之部宜審詳督脉陽海之經歩穴歌齗交唇内齗縫鄉兊端正在唇中央水溝鼻下溝内索素膠宜向鼻端詳頭形北髙面南下先以前後髪際量分為一尺有二寸髪上五分神庭當庭上五分上星位􅇟㑹星上一寸量上至前頂一寸半寸半百㑹居中央神聰百會四面取各開一寸風癎主後項强間腦戸三相去各是一寸五後髪五分定瘂門門上五分是風府上有大椎下尾骶分為二十有一椎古来自有折量法靈樞凜凜不可欺九寸八分二之七二十七節如是推第一節上是一椎節上陶道知身柱第三椎節下神道第五靈臺無足疑第六至陽七筋縮第九之下思脊中懸樞命門穴十一十三十四節陽關鎮柱十六椎二十一下腰俞窺其下長强跌地須詳取此穴針之去痔根醫之家訣脉三部九候莫知其所由從世謂宗叔和秦越人自以為發明内經而内經謂尺内兩傍則季脇也尺外以候腎尺裏以候腹中附上左外以候肝内以候鬲右外以候胃内以候脾上附上右外以候肺内以候中左外以候心内以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者小腹腰股膝頸足中事也以是詳諦之三部之相屬錯而背何歟又輕按得腑脉重按得臟脉且深疑焉以按之上下分隂陽於臟腑則九候之浮中沉乃不能施矣九候廢而診道荒何以製方劑哉然則古今名家能奏功紀籍皆倖而偶者夫脉者血之腑呴之為氣濡之為血氣運脉之外而血榮脉之中故十二經十五絡又八竒經維貯而官者為臟腑以見於脉若合系而獨持之則無所名於具矣故心包絡三焦不得為無伍而腎不得為自離而叔和異之并其可諦者人身血脉與天地同周流此理之必然者一嵗自春而冬一日自子而亥莫不相應故由前圖言之一月屬肝足厥隂經至於十月膀胱足太陽經由後圖言之每日自子時注膽至亥時注三焦則審脉者如一月之内宜以肝為主如毎日子時即宜以膽為主矣醫家止知審六脉虚實而當所旺所注之月與時其虚實莫之辨焉謂之善察脉理可乎經有十二手太隂肺少隂厥隂心包絡太陽小腸少陽三焦陽明大腸足太隂脾少隂腎厥隂肝太陽膀胱少陽膽陽明胃也絡有十五肺絡列缺心絡通里心包絡内關小腸絡支正三焦絡外關大腸絡徧歴脾絡公孫腎絡大鍾肝絡蠡清膀胱絡飛揚膽絡陽明胃絡豐隆隂蹻絡照海陽蹻絡申脉脾之大絡大包督脉絡長强任脉絡屏翳也隂陽者天之隂陽平旦至日中天之陽陽中之陽也日中至黄昏天之陽陽中之隂也合夜至雞鳴天之隂隂中之隂也雞鳴至平旦天之隂隂中之陽也故人亦應之夫言人之隂陽則外為陽内為隂言身之隂陽則背為陽腹為隂手足皆以赤白肉分之臟腑之隂陽則五臟為隂六腑為陽是以春夏之病在陽秋冬之病在隂又言背為陽陽中之陽心也陽中之隂肺也腹為隂隂中之隂腎也隂中之陽肝也隂中之至隂脾也此皆隂陽表裏内外雌雄相輸應也是以應天之隂陽學者茍不明此經絡隂陽升降左右不同之理如病陽明反攻厥隂奚可哉手太隂肺經歩穴歌太隂肺兮出中府雲門之下一寸許雲門氣戸傍二寸人迎之下二骨數天府腋下三寸求夾白肘下五寸主尺澤肘中約交論孔最腕中七寸取列缺腕中寸有半經渠寸口陷中取大淵掌後横紋頭魚際節後散脉舉少商大指側内尋此穴若針疾减愈流注脉起於中焦中焦在胃腕下絡大腸環循胃口胃口謂賁門也上膈屬肺從肺系横出脉下下循臑内天府穴行少隂心主之前下肘中尺澤穴循賁内上骨下亷直大指自上骨内側入寸白經渠穴上魚循魚際在大指本節後内側出大指之端少商在大指内側去爪甲角也其支者從腕後直出次指内亷出其端交手陽明經也流注歌肺脉中焦絡大腸環循胃口至肺關却從肺系横出肺下循臑内行心前下肘循臂上骨下寸口魚際大指連其支從腕下直出次指内亷寸其端分脉主治是經平脉輕虚以浮曰毛浮濇弱屬金亦主脉也謂之正邪病主本經以浮遲緩乗其部謂之虚邪病主不及以沉濡滑乗其部謂之㣲邪病主自愈以芤實洪乗其部謂之鬼賊邪病主不治遲至為寒數至為熱不及者補之太過者㵼之不實不虚以經取之寒者温之熱者凉之見證總候是經少血多氣是動則病肺脹滿彭彭而喘咳缺盆中痛甚則交兩手而瞀是為臂厥是主肺所生病者咳上氣喘渇煩心胸滿臂内前亷厥掌中熱氣甚有餘則肩背痛風寒汗出中風小便數而欠氣虚則肩背痛寒少氣不足以息弱色變不及見証病則令人喘呼吸少氣而咳上氣見血下聞病音太過見証病則令人逆氣而背痛愠温然難經見証假令得肺脉其外証面白善嚏悲愁不樂欲哭其内証臍右有痛氣按之牢苦痛其病喘欬洒淅寒熱有是者肺也無是者非也不治死証手太隂氣絶即皮毛焦太隂者肺也行氣温於皮毛者也氣弗榮則皮毛焦皮毛焦則津液去津液去則致皮節傷皮節傷則皮枯毛折皮枯毛折者則毛先死丙篤丁死火勝金也手陽明大腸經歩穴歌食指内側兮商陽手陽明經屬大腸本節前取二間定本節後取三間强岐谷陷中尋合谷陽谿腕中上側詳腕後三寸走偏歴五寸之中温溜當下亷上亷則一寸下亷此下一寸方屈肘曲中曲池得池下二寸三里塲肘髎大骨外亷陷五里肘上三寸量臂臑髃下一尺取肩髃肩端兩骨當巨骨肩端叉骨内天鼎缺盆之上針扶突曲頰下一寸禾髎五分水溝傍鼻孔兩傍各寸半左右二穴皆迎香流注脉起於大指次指之端外側商陽穴去爪甲角如韭葉是也循指上亷出合谷兩骨之間上入兩筋之中二間穴也循臂上亷陽谷也入肘外亷曲池穴上入臑外前亷上肩出髃骨之前亷肩髃骨乃肩端也上出於柱骨之㑹柱骨肩井二穴下入缺盆二穴在肩横骨陷中絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中環出夾口交人中水溝穴左之右右之左挾孔端交足陽明經也流注歌大腸脉起次指端循指合谷兩骨間上入兩筋循臂上入肘臑外直上肩柱骨之㑹下缺盆絡肺下膈屬大腸其支缺盆直上頸貫挾流入下齒中環出挾口人中穴人中只與水溝同左之右而右之左上挾鼻孔流無窮見証總候是經多血多氣是動則病齒痛䪼腫是主津液所生病者目黄口乾鼽衂喉痺肩前臑痛大指次指痛不用氣有餘則當脉所通者熱腫虚則寒慄不復不及見證病苦胸中喘腸鳴虚喝口乾目急善驚泄白大過見證病苦腹滿善喘欬面赤身熱咽喉中如核狀不治死証病人大腸絶不治何以知之泄利無度利絶則死足陽明胃經歩穴歌胃之經兮足陽明頭維本神寸五尋下關耳前動脉者頰車耳下八分針承泣目下七分取四白一寸不可深巨髎孔傍八分定地倉俠吻四分迎大迎曲領前寸二人迎結傍大脉真水突在頸火筋下直至氣舍上人迎氣舍迎下候天突缺盆横骨陷中親氣戸腧府傍二寸至乳六寸又四分庫房屋醫膺忩近乳中正對乳中心次有乳根出乳下各一寸六不相侵穴俠齒門一寸五是曰不容依髪數其下承滿至梁門關門太乙從頭舉節次續排滑肉門各各一寸為君數天樞安在俠臍傍外陵樞下一寸當二寸大巨五水道歸來七寸以尋將氣衝曲骨傍三寸來下氣上脉中央髀關兎後六寸分伏兎隂市三寸强隂市膝上三寸許梁丘二寸得共塲膝臏骭下尋犢鼻膝眼四穴是兩傍膝下三寸三里永里下三寸上亷地條口上亷下一寸下亷條下寸系二豊隆下亷外一寸上踝八寸分明記解谿衝陽後寸半衝陽陷中二寸係陷谷内庭後寸半内庭次指外間是厲兊大指次指端去爪如韭胃所起流注脉起於鼻交頞中在鼻中旁約太陽之脉下循鼻外入上齒中還出挾口環唇下交承漿在唇之下却循頥後下亷頥頷也出大迎在曲前一寸三分陷中迎脉是也循頰車在耳下後上耳前過客主人在耳前起骨開口有空者是穴循髪際至額顱其支者從大迎前下人迎在頸􅏒膝中循喉嚨入缺盆見手陽明下膈屬胃絡脾其直者從缺盆下乳内亷下挾臍入氣衝中其支者起胃口下口齒門也下循腹裏下至氣衝中而合以下髀關抵伏兎下膝臏中膝端也下循脛外亷下足跗入中指内間其支者下亷三寸而别三里穴也以下入中指外間其支者别跗上入大指間出其端交足太隂經也流注歌胃脉起於交額中傍約大陽之脉中下循鼻外入上齒環出挾口承漿宫循頥下亷出大迎頰車耳前客主人循其髪際主顱額支從二迎至喉嚨缺盆下膈屬脾胃直者缺盆下乳臍入于氣衝其支者胃口循腹氣衝歸下合髀關抵伏兎臏胻跗中厲兊宜見証總候是經多血多氣是動則病洒洒振寒善伸數欠顔色病至則惡人與火聞木聲則惕然而驚心欲動獨閉戸庭牖甚則欲上髙而歌棄衣而走賁響腹脹是骭厥是主血所生病者狂瘧温淫汗出􅍠衂口喎唇胗頸腫喉痺大腹水腫膝臏腫痛循􅈾乳氣衝股伏兎骭外亷足跗上皆痛中指不用氣盛則身以前皆熱其餘則於胃消穀善飢溺色黄氣不足則身以前皆寒慄胃中寒則脹滿不及見証病苦經寒不得臥惡寒洒洒目急腹中痛虚鳴雙臺作耳虚鳴時寒時熱唇口乾面目浮腫大過見証病苦腹中堅痛而熱舌金作病苦頭痛汗不出如温瘧唇口乾善噦乳癰缺盆腋下腫痛不治死証病人胃絶五日死何以知之脊痛腰中重不可反復一日排腸至五日死足太隂脾經流注歌拇指内側隠白位大都節後陷中起大白核骨下陷中公孫節後一寸至商丘有穴屬經金踝下㣲前陷中是内踝三寸三隂交漏谷六寸有次第膝下五寸為地機隂陵内側膝輔際血海分明膝臏上内亷内際二寸地箕門血海上六寸筋間動脉須詳諦衝門五寸大横下三寸三分尋府舍腹結横下寸三分大横俠臍非此假腹表寸半去日月直與食竇相連亞食竇天谿及胸鄉周榮各一寸六者天包淵腋下三寸出九肋間當記也流注脉起於大指之端隠白穴在指内側去爪甲角如韭葉是也循指内側白内際過竅骨後太白穴也上内踝前亷商丘穴也上踹内循脛骨後交出厥隂之前上循膝股内前亷隂陵穴也入腹屬脾絡胃上膈挾咽連舌本舌根系也散舌下亷泉水間也其支别者從胃别上膈注心中交手少隂經也流注歌太隂脾經隱白陳過核内踝及前亷胻骨交出厥隂前上循膝股内亷隂入腹屬脾絡於胃上膈挾咽連舌本其支别者復從胃别從上膈注於心分脉主治盖脾屬土脉灌四旁其和平不可得見衰乃見耳平人氣象論云然脾脉本和柔相離如雞踐地曰脾之平脉也㣲遲緩屬土亦謂之主脉是正邪也病主本經以芤實洪乗其部謂之虚邪病主不及以浮濇弱乗其部謂之實邪病主大過以沉濡滑乗其部謂之㣲邪病主自愈以弦急伏乗其部謂之鬼賊邪病主不治遲至為寒數至為熱不及者補之太過者㵼之不實不虚以經取之寒者温之熱者凉之見證總候是經少血多氣是動則病舌本强食則嘔胃脘痛腹脹善噫得後與氣則快然如愈身體皆重是主脾所生病者舌本痛體不能動揺食不下煩心心下急痛溏􅛎泄水閉黄疸不能臥强立股膝内腫厥足大指不用不及見証病苦泄注腹氣逆霍亂嘔吐黄疸心煩不得臥腸鳴太過見証病苦足寒脛熱腹脹滿煩擾不得臥難經見証假令得脾脉其外証面黄善噫善思善味其内証當臍有動氣按之若牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不収有是者脾也無是者非也不治死証足太隂氣絶者則脉不榮肌肉唇舌者肌肉之本也脉不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也手少隂心經歩穴歌少隂心起極泉中腋下筋間入脉胸青靈肘節上三寸少海肘内節後容靈道掌後一寸半通里腕後一寸同隂㕁五分助動脉神門掌後兊脉同少府節後勞宫直小指内側取少衝心流注脉起於心中出屬心系下脇絡小腸其支者從心系上挾咽繫目系一夲作循胷出穴其直者復從心系却上肺上出腋下下循臑内後亷行太隂心主之後下肘内亷少海穴也循臂内後亷抵掌後兊骨之端神門穴也入掌内後亷循小指之内出其端少衝穴也交手太陽經流注歌少隂之脉起心中下膈絡腸至喉嚨繫目其直從心系上肺横出腋下通循臑行心下肘亷循臂抵兊神門宫入堂後亷循小指更出其端是少衝分脉主治是經平脉來疾去遲曰鈞芤實洪屬火亦主脉也謂之正邪病主本經以弦𦂳伏乗其部謂之虚邪病主不及以㣲遲緩乗其部謂之實邪病主大過以浮濇弱乗其部謂之㣲邪病主自愈以沉濡滑乗其部謂之鬼賊邪病主不治遲至為寒數至為熱不及者補之太過者㵼之不實不虚以經取之寒者温之熱者凉之見証總候是經少血多氣是動則病嗌乾心痛渇而欲飲是為臂厥是主心所生病者目黄脇痛臑臂内後亷痛厥掌中熱痛不及見証病則令人煩心上見咳唾下為氣泄大過見証病則令人身熱而膚痛為急淫難經見証假令得心脉其外証面赤口乾喜笑其内証臍上有動氣按之牢苦痛其病煩心心痛掌中熱而啘有是者心也無是者非也不治死証手太隂氣絶則脉不通脉不通則血不流血不流則色澤去故其面黒如漆柴者血先死壬篤癸死水勝火也手厥隂心主經八穴中衝在手中指端去爪甲如韭葉陷者中勞宫在掌中央動脉大陵在掌後兩骨間内關在掌後二寸去腕手心間使在掌後二寸兩筋間郄門在掌後去腕五寸曲澤在肘内亷下陷者中屈得之天泉在腋下二寸舉腋取之手太陽小腸經歩穴歌手小指端為少澤前谷外側節前索節後陷中尋後谿腕骨陷前看外側腕中骨下陽谷討腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞骨下兩骨解臑俞大骨之下保天宗骨下有陷中乗風髎後舉有空曲垣肩中曲脾裏外俞脾後一寸從肩中二寸大杼傍天忩頰下動脉詳天容耳下曲頰後顴髎面頰兊端量聴宫耳端大如菽此一經為手太陽流注脉起於小指之端少澤穴也循手外側上腕脘骨穴也出踝中直上循臂骨下亷陽谷穴也出肘内側兩骨之間上循臑外後亷出肩解繞肩􅦅交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥却入耳中其支者别頰上䪼近鼻起骨也抵鼻至目内眥叙絡於顴外眥不斜趨起骨也注足太陽經流注歌小腸脉起小指端循手上脘踝中存上循臂骨出肘内臑外後亷來至肩缺盆向腋絡於心循咽下膈胃小腸支從缺盆貫頸頰至目銳眥耳中尋其支别頰循上䪼抵鼻至目落於顴見証總候是經多血少氣是動則病嗌痛頷腫不可囬顧肩似㧞臑似折是主液所生病者耳聾目黄頰腫頸頷肩臑肘臂外後亷痛不及見証病苦顱際偏頭痛耳頰痛太過見証病苦身熱熱來去汗出而煩心中滿身重口中生瘡不治死証病人小腸絶何以知之一日小腸絶六日死髪直如乾臑不得屈伸自汗不止足太陽膀胱經歩穴歌足太陽兮膀胱經目眥内角始睛明眉頭陷中攢竹名曲差二穴神庭伴五處挨排俠上星承光五處去寸半通天絡却亦停勻玉枕横俠於腦戸尺寸當凖銅人經天柱後處頂髪際大椎外亷陷中是夾脊相去寸五分第一大杼二風門肺俞三焦厥隂四心俞五椎之下論脊腧膈腧相梯級第六第七次第立第八椎下穴無有肝腧數椎當第九十椎膽腧脾十一十二椎下胃腧取三焦腎腧氣海腧十三十四十五究大腸關元腧怎量十六十七推兩傍十八椎下小腸腧十九椎下尋膀胱中膂内腧椎十二白環二十一椎當上髎次髎中與下一空二空侉腰胯並同俠脊四箇髎載下千金君勿討㑹隂陽尾相傍分尺寸須看督脉曉第二椎外附分俠脊相去古法二光除脊後量二寸不爾灸俠能傷筋魄戸三椎膏肓四四五三分分明取第五椎下索神堂第六譩譆外可覩膈關第八魂門九陽綱意舍依此數胃倉腎門屈指彈椎看十二與十三志室次之為十四胞育十九合詳㕘秩邉二十椎下詳承扶臀隂紋中央隂門承扶六寸直浮郄一寸上委陽委陽却與隂門並膕中外亷兩筋鄉委中膝膕約紋裏此下三寸尋合陽承筋腨陽中央是承山腨下分肉傍飛陽外踝上七寸付陽踝上三寸量金門正在外踝下崑崙踝後跟骨中僕㕘跟骨後陷是申脉分明踝下容京骨外側大骨下束骨本節後相通通骨本節前陷索至隂小指外側逢流注脉起於目内眥上額交巔其支者從巔巔頂也至耳上角其直者從巔入絡腦還出别下頂循臂膊内挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中委中穴也其支者從膊内左右别下貫胛一作􅀈挾脊内過脾樞環跣穴也循外從後亷下合膕中以下貫踹内承筋穴也出外踝之後崑崙穴也循京骨至小指外側至隂穴也交足少隂經流注歌大腸脉起内眥尖上額交巔耳角邉從巔絡腦别下頸循肩膊内脊腰膽循膂絡腎膀胱屬支者從腰㑹後隂貫臀入膕至從膊左右挾脊至脾樞循髀合骨貫踹内出踝循京至指邊見証總候是經多血少氣是動則病衝頭痛目似脫項似㧞脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痎瘧顛狂􅇟項痛目黄泪出鼽衂項背腰凥膕踹脚眥痛小指不用不及見證病苦脚中筋急腹中痛引腰背不可屈伸轉筋惡風偏枯頭腰痛外踝後痛大過見証病苦逆滿腰中痛不可俛仰勞也不治死証病人骨絶齒黄落十日死足少隂腎經歩穴歌湧泉屈足捲指取腎經少隂此處照然谷踝前大骨下踝後跟上大谿府谿下五分尋大鍾水泉鍾下一寸許照海踝下隂蹻生踝上二寸復溜名溜前筋骨取交信亦曰踝上二寸行築賔六寸踹分處隂谷膝内看骨輔横骨有陷如仰月大赫氣穴四滿據中注肓腧正挾臍六穴五寸各一數商曲石關上隂都通谷幽門一寸居幽門二寸挾巨闕歩即神封過靈墟神藏或中入俞府各一寸六不差殊欲知俞府君若問璇璣之傍各二寸腎流注脉起於小指之下斜趨足心湧泉穴也出然谷之下然谷在内踝前循内踝之後大谿穴也别入跟中大鍾穴也以上踹内出膕中内亷隂谷穴也上股内後亷貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本一本云從横骨中俠臍循腹裏上行而入肺其支者從肺出絡心注胷中交手厥隂經也流注歌少隂之脉小指邊斜趨足心即湧泉然谷内踝入跟中上踹内出膕内亷上股後亷貫脊腎膀胱直從腎上肝入肺循喉挾舌本其支從肺心中存分脉主治是經平脉沉濡而滑曰石沉濡滑屬水是主脉也謂之正邪病在本經以浮濇弱乗其部謂之虚邪病主不及以弦𦂳伏乗其部謂之實邪病主大過以芤實洪乗其部謂之㣲邪病主自愈以㣲遲緩乗其部謂之鬼賊邪病主不治遲至為寒數至為熱不及者補之太過者㵼之不實不虚以經取之寒者温之熱者凉之見証總候是經少血多氣是動則病飢不欲食面如漆柴咳唾則有血喝而喘坐而欲起目慌慌如無見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣噎乾及痛煩心心痛黄胆腸癖脊股内後亷痛不及見証病則令人心如懸病飢𦕈中清脊中痛小腹滿小便變太過見証病則令人解㑊脊脉痛而少氣不欲言難經見証假令得腎脉其外証面黒善恐欠其内証臍下有動氣按之牢苦痛其病逆氣小腹急痛如泄下重足脛寒而逆有是者腎也無是者非也不治死証足少隂氣絶則骨枯少隂者冬脉也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟却肉軟却故齒長垢髪無潤澤髪無潤澤者骨先死戊篤已死土勝水也手厥隂心包絡經歩穴歌厥隂心包何處得乳後一寸天池索天泉腋下二寸求曲澤内紋尋動脉郄門去腕五寸通間便腕後三寸逢内關去腕纔二寸大陵掌後兩筋中勞宫掌内屈指取中指之末取中衝流注脉起胸中出屬心包絡下膈歴絡三焦其支者循胸出脇下腋三寸上抵腋下循臑内行大隂少隂之間大隂在上少隂在下心在其中入肘中曲澤穴也下循臂行兩肋之間大陵穴也入掌中勞宫穴也循中指出其端中衝穴也其支者從掌中循小指次指出其端交手少陽經流注歌心包絡脉起胸中屬心下膈三焦通支者循胸中腋臑大隂少隂及肘中循臂兩筋大陵穴入掌勞宫至中衝其别掌中循小指次指之端少陽宫分脉主治是經者配成之臟也稱號心包屬命門主相火司暑經云左為腎右為命門命門者男子以藏精女子以繫胞其氣與腎通既云氣通其脉同也較此推之五邪分脉亦當同腎部斷焉庶不失經耳雖曰如是學宜員變體認豈在執泥而已本篇脉法不重復云見証總候是經多血少氣是動則病手心熱臂肘攣急腋腫甚則胸脇支滿心中憺憺大動面赤目黄喜笑不休是主脉所生病者煩心心痛掌中熱手少陽三焦經歩穴歌三焦名指外關衝小次指間名液門中渚次指本節後陽池表腕有穴存腕上二寸外關絡支滿腕上三寸約㑹宗三寸空中求消詳一寸毋令錯肘前五寸臂大脉此足三陽絡宅穴四瀆骨外並三陽天井肘上一寸側肘上二寸清冷淵浦濼臂外肘分索臑㑹肩頭三寸中肩髎肩端臑上通天髎盆上􅀢骨際天牖傍頸後天容翳風耳後尖角陷瘈脉耳後雞足逢顱􅇟耳後青絡脉角孫耳角開有空絲竹眉後陷中看和窌耳前兊髪同耳門耳殊當耳缺此穴禁灸分明說流注脉起於小指次指之端關衝穴也上出二指之門腋門穴也循手表腕陽池穴也出臂外兩骨之門支溝穴也上貫肘循臑外上肩出交足少陽之後入缺盆布顫中在兩耳中間散絡心包下膈循三焦其支者從顫中上出缺盆上頸繫耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人在耳前上亷起骨開口有空者是前交頸至目銳􅗃交足少陽經流注歌三焦脉起次指端上出兩指手表腕出臂骨間上貫肘出顫入缺推交顫心包下膈屬三焦支從顫中并項耳直上耳角下額䪼耳後入耳客主持交頰若至目銳眥膽經之脉起於斯見證總候是經多氣少血是動則病耳聾耳鳴嘈嘈嗌腫喉痺是主氣所生病者汗出目銳眥痛頰腫耳後肩臑肘臂外眥痛小指次指不用足少陽膽經歩穴歌少陽童髎起目外耳前陷中尋聴㑹上關耳前開有空懸釐耳空下亷揣懸顱正在曲角端頷厭腦空上亷看曲鬢掩耳正尖上率谷耳鬢半寸安本神耳上入鬢際四分卒横向前是曲差之傍名一寸陽白眉上一寸記臨泣有穴當兩目直入鬢際五分屬目忩正榮各一寸承靈靈後寸五録天衝耳上二寸居浮白鬢際一寸符竅隂枕下動有空完骨耳後四分通胸后正挾玉枕骨風池後髪際陷中肩井骨前看寸半淵腋脉下三寸按輒筋平前却一寸日月期門二寸半直下五分細求之京骨監骨腰間看帶脉季肋寸八分玉樞直下三寸間維道五寸三分得居窌八寸三分尋脇堂腋下看一肋環跳髀樞宛宛論兩手著腿云風市謀膝五寸中瀆搜陽關陽陵上三寸陽陵膝下一寸求陽交外踝針七寸正上七寸尋外丘光明除踝上五寸陽輔踝上四寸収懸鍾三寸看絶骨丘墟踝前陷中出臨泣寸半後俠谿五㑹一寸灸早卒俠谿小次岐骨間竅隂正在次端指流注脉起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者别目銳眥下大迎合手少陽抵於䪼一本云别銳眥上迎手少陽于頰下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脇裏出氣衝繞毛際横入髀厭中環跳穴也其直者從缺盆下腋循胸過季脇下合髀厭中以下循髀陽出膝外亷陽陵泉穴下外輔骨之前直下抵絶骨之端陽輔穴也下出外踝之前循足跗上出小指次指之端還貫爪甲出三毛中交足厥隂經也流注歌少陽脉起目眥内上衝頭角耳後通循頭行陽至肩上交出少陽缺盆宫支從耳後耳中出耳前至目銳眥容支别銳眥大迎過少陽抵頰車䪼從頸合缺盆循胸間季脇髀厭循脾膝輔骨直下陽輔穴出踝循跗大指間更循大指岐骨内還貫爪甲三毛邉見證總候是經多氣少血是動則病口苦善太息心脇痛不能轉側甚則面㣲有塵體無膏澤足外仄熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脇肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用不及見証病苦眩厥痿足指不能揺躄坐不能起僵仆目黄失精􅉩􅉩太過見証病苦腹中氣滿飲食不下咽乾頭重痛洒洒惡寒脇痛不治死証病人膽絶七日死何以知之眉為之傾足厥隂肝經歩穴歌大敦拇指看毛聚行間縫尖動脉處節後有絡亘五㑹大衝之脉承堪據中封正在内踝前蠡溝踝上五寸注中都正在復溜宫隂陵膝尖兩折中膝關犢鼻下二寸曲泉紋頭兩筋逄隂包四寸膝臏上内亷筋間索其當五里氣衝内寸半直下三寸隂股向羊矢兩裏三分下隂亷穴在横文胯羊矢氣衝旁一寸分明有穴君可問章門臍上二寸量横取八寸看兩傍期門耳傍各一寸直上二寸二肋詳肝流注脉起於大指聚毛之際大敦穴也上循足跗上亷大衝穴也去内踝一寸中封穴也上踝八寸曲泉穴也交出大隂之後上膕内亷循股隂入毛中過隂器抵小腹挾胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頑顙顙謂懸兩傍之肉也靈樞經云頑顙者分氣之洩連目系上出額與督脉㑹於巔其支者從目系下挾裏環唇内其支者别貫膈上注肺中復交於手太隂經也流注歌肝經大敦起於先循足内踝至曲泉交出大隂上膕内循股小腹挾胃肝絡膽膈脇喉嚨後上顙出額督脉巔支從目頰環唇内從肝貫膈肺中𫝊分脉主治是經平脉濡弱而長曰弦弦𦂳伏屬木亦主脉也謂之正邪病主本經以沉濡滑乗其部謂之虚邪病主不及以芤實洪乗其部謂之實邪病主大過以㣲遲緩乗其部謂之㣲邪病主自愈以浮濇弱乗其部謂之鬼賊邪病主不治遲至為寒數至為熱不及者補之大過者㵼之不實不虚以經取之寒者温之熱者凉之見證總候是經少氣多血是動則病腰痛不能俛仰丈夫㿉疝婦人小腹腫甚則嗌乾面塵脫色是肝所生病者胸滿嘔逆飱泄狐疝遺溺閉癃不及見証病則令人胸痛引眥下則兩脇脹滿太過見証病則令人善忘怱怱眩冐而巔疾難經見証假令得肝脉其外証善潔面赤善怒其内証臍左有動氣按之牢苦痛其病四肢滿閉淋溲便難轉筋有是病者肝也無是者非也不治死証足厥隂氣絶則筋絶厥隂者肝也肝者筋之合也筋者發於隂氣而脉絡於舌本也故脉弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也十變又言隂井木陽井金隂榮火陽榮水隂腧土陽腧木隂經金陽經火隂合水陽合土隂陽皆不同其意何也是剛柔之事也隂井乙木陽井庚金陽井庚者乙之剛也隂井乙者庚之柔也乙為木故言隂井木也庚為金故言陽井金也餘皆倣此隂陽者隂經陽經也井榮腧經各在陽經為剛在隂經為柔也隂井木隂井金庚金為剛乙木為柔乙與庚合隂榮火陽榮水壬水為剛丁火為柔壬與丁合陽腧木隂腧土甲木為剛巳土為柔甲與巳合隂經金陽經火丙火為剛辛金為柔丙與辛合隂合水陽合土戊土為剛癸水為柔戊與癸合故大言隂與陽小言夫與婦者十干配合是也十二經脉皆有原俞手足隂陽之交㑹血氣之流通外榮指節内連臟腑故經云手三陽之脉從手至頭手三隂之脉從手至胸足三陽之脉從足至頭足三隂之脉從足至胸是謂日夜循環隂陽㑹合凡孔穴流注所出為井所流為榮所注為腧所過為原所行為經所入為合十二經脉井營腧原經合所在肺出少商為井手太隂脉也流於魚際為榮注於大淵為腧過於列缺為原行於經渠為經入於天澤為合心出中冲為井手少隂脉也流於營宫為榮注於大陵為腧過於内關為原行於間使為經入於曲澤為合心包絡出于少冲為井手厥隂脉也流于少府為榮注于神門為腧過於通里為原行于靈道為經入于少海為合大腸出于商陽為井手陽明脉也流于二間為榮注于三間為腧過于合谷為原行于陽谿為經入于曲池為合三焦出于關冲為井手少陽脉也流于溢門為榮注于中渚為腧過于陽池為原行于支渠為經入于天井為合小腸出于少澤為井手太陽脉也流於流谷為榮注于後谿為腧過于腕骨為原行于陽谷為經入于少海為合已上俱手三陽三隂流注胃出厲兊為井足陽明脉也流于内庭為榮注於陷谷為腧過于冲陽為原行于解谿為經入于三里為合膽出竅隂為井足少陽脉也流于俠谿為榮注于臨江為腧過于丘墟為原行于陽輔為經入于陽陵泉為合膀胱出于至隂為井足太陽脉也流于通谷為榮注于束過為腧過于京骨為原行于崑崙為經入于委中為合脾出于隱白為井足太隂脉也流于大都為榮注于太白為腧過于公孫為原行于商丘為經入于隂陵泉為合肝出于大敦為井足厥隂脉也流于行間為榮注于太冲為腧過于中封為原行于中都為經入于曲泉為合腎出于湧泉為井足少隂脉也流于然谷為榮注于大谿為腧過于水泉為原行于復溜為經入于隂谷為合已上俱足三隂三陽流注春取諸榮所流夏取諸腧所注秋取諸合所入冬取諸井所出欬論云治臟者治腧治腑者治合圖書編卷七十一
