body:
  text: 圖書編卷六十八明章潢撰人道總叙大哉天乎統元氣也廣哉地乎統元形也人以𣺌然之身處覆載閒不啻太倉一稊米耳易乃以天地人並列為三才而謂易簡理得成位乎其中焉乾九五文言謂大人與天地合徳日可合明四時合序鬼神合吉凶先天弗違後天奉天時人之大也一至此哉非意之也立天立地立人其道一也道本大而人自小之耳大人特自盡其立人之道非於道有所加也不獨大人為然孔子謂人者天地之心夫心在人身形氣之中而耳目視聴手足持行百體各從其令一由心以為之宰也人在天地中而為之心焉豈徒五行之秀萬物之靈典禮文物之中焉已耶天即人之髙明也地即人之博厚也日月人之照臨也雨露人之潤澤也雷霆人之震動也風雲人之變態也隂陽人之卷舒也山嶽人之融結也江河人之流行也鬼神人之屈伸也古今人之晝夜也歴世帝王聖賢才智人之過影也舉宇宙間成象成形飛潛動植一人之生生化化而不息也故人以天地萬物為一體一物失所痛瘝切身其心自有大不忍者人道本如是也所以宇宙内事皆分内事凡裁成輔相範圍曲成劑量調燮參贊位育皆人之自盡其心以為天地心而人道庶乎其無愧耳盍稽之康節與横渠之言乎邵子謂其能以心代天意口代天言手代天工身代天事謂其能上識天時下盡地理中盡物情旁通人事又謂其能彌綸天地出入造化進退古今表裏人物張子謂其為天地立心為生民立命為往聖繼絶學為萬世開太平真見人道之大有不能自諉者歟但道不逺人人能𢎞道自一身以達之家國天下人倫物理及國朝典制禮樂何一非人道之所當究心者故為人道編人身心總叙人之所以為人者形與性而已矣天地之塞吾其體天地之帥吾其性形性豈二之哉孔子曰仁者人也孟子曰形色天性也所以大學一言以蔽之曰一是皆以修身為本則是身也本之為心意知而非有也達之家國天下而非無也具之為骨骸臟腑而非顯也宰之為精神魂魄而非隠也呼吸與天地相通氣脉與寒暑晝夜相運旋所以謂人身小天地而知修身為本即知之至也孔門無踰顔曽顔之四勿曽之三省舍視聴言動容貌辭氣性安在哉信乎養徳養身非二事良醫良相非二道奈何人人具此七尺之軀卑之則為衆欲所攻髙之又以四大為幻欲通天下國家為一身而于一身之骨骸血脉且莫之辨一身之寒暑燥濕且莫之調攝也又烏在其為不朽而與天地參乎禮運故人者其天地之徳隂陽之交鬼神之㑹五行之秀氣也故人者天地之心也五行之端也食味别聲被色而生者也故聖人作則必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜邵子曰天有四時地有四方人有四支是以指節可以觀天掌文可以察地天地之理具乎指掌矣可不貴之哉神統於心氣統於腎形統於首形以氣交而神主乎中三才之道也日為心月為膽星為脾辰為腎藏也石為肺土為肝火為胃水為膀胱府也何者謂之人邵子曰目耳鼻口心膽脾腎之氣全謂之人心之靈曰魄脾之靈曰魂腎之靈曰精心之神發乎目則謂之視腎之精發乎耳則謂之聴脾之魂發乎鼻則謂之臭膽之魂發乎口則謂之言八者具備然後謂之人夫人者天地萬物之秀氣也然而亦有不中者各求其類也若全得人類則謂之曰全人之人勉齋黄氏曰夫人之生惟精與氣為毛骨肉血者精也為呼吸冷熱者氣也然人為萬物之靈非木石故其精其氣莫不各有神焉精之神謂之魄氣之神謂之魂耳目之所以視聴者魄為之也此心之所以能思慮者魂為之也合魂與魄乃隂陽之神而理實具乎其中惟其魂魄之中有理具焉是以靜則為仁義禮智之性動則為惻隱羞惡恭敬是非之情胥此焉出也人須如此分作四節看方體認得著實或問朱文公但將理與氣對看今先生分作四節何也曰理與氣對是自天地生物而言今之說是自人稟受而言若但言氣大易何以謂精氣為物但言理横渠何以謂合性與知覺而名心耶此意玩味當自知之若以語人徒起紛紛也因論虚靈知覺曰人只有箇魂與魄人記事自然記得底是魄如㑹恁地搜索思量㡳這是魂魂日長一日魄是稟得来合下恁地如月之光彩是魂無光彩處是魄魄亦有光但是藏在裏面又曰氣之呼吸為魂耳目之精明是光藏在裏面如今人聴得事何嘗是去聴他乃是他自入耳裏面来因透諸心便記得此是魄魄主受納魂主經營故魄属隂魂属陽隂凝靜陽發散易云精氣為物精是精血氣是煖氣有這兩件方始成得箇好物出来如人在胞胎中即是這兩箇物骨肉肌體是精血一路做出㑹呼吸活動是煖氣一路做出然而精血煖氣則自有箇虚靈知覺在裏面精血之虚靈知覺便是魄煖氣之虚靈知覺便是魂這虚靈知覺又不是一箇虚浮㡳物裏面却又是許多道理故木神曰仁是虚靈知覺人受木之氣其虚靈知覺則具仁之理木便是氣血神便是魂仁便是箇道理如此看方是按人身即小天地也人之氣即天地之氣人之五臟六腑十二絡猶五岳四鎮十二州人之七竅猶天之七曜凡人之臟腑十二絡有病則面色異而變常猶岳鎮十二州有災則天象隨之而變異惟心臟之病面色易形故以養心為要孟子曰養心莫善於寡欲程張所謂心皆指其虚靈之氣而言氣本寓理為性理從氣發為情而心能主宰者亦氣也人之面偹耳目鼻口舌猶天之五行也腹偹肝肺脾腎心猶地之五行也耳鼻縱而孔竅凹靜而隂也目口横而睛凸動而陽也腎屬耳肺屬鼻反動而為陽肝屬目脾屬口反靜而為隂心舌居動靜之間而心聲形於舌舌音發於心是心舌者又一身之主也然項圓而頦方天地定位也鼻岳聳而口淵深山澤通氣也眼外耀而舌下津水火不相射也喉出響而耳収聲雷風相薄皆與天地造化相肖也養徳養生二而無全學也矧天大徳曰生今以養徳屬儒曰正道養生屬仙曰異端誤矣身亡而徳安在哉故孔子慎疾曰父母唯其疾之憂教人存仁致中和孟子曰養氣持志集義勿忘勿助是故立教以醫世酌人情而制方周末文靡則偽故存仁戰國氣暴則盭故集義存仁完心也志定而氣從集義順心也氣生而志固致中和也勿忘助也疾安由作故曰養徳養生一也無二術也夫地即血天即氣天包地氣載血今人骨肉臟腑皆血也魄也神靈運用皆氣也魂也人死乃魂去魄存氣散血尚聚也是以貴養氣世降氣轉耗也朱丹溪乃曰氣有餘血不足藥專補血夫氣有餘邪氣也正氣何嘗有餘岐伯曰人以胃氣為主甚矣貴養氣也人身之天為首而一身之氣自流行貫通脉絡相連如耳目口鼻為氣之出入皆在于首而其為氣必自下而上故目如日月而五臟皆屬之豈非自地而起乎天包地地之上下皆天天之氣循環轉旋無一息之停止如人身自腹以上為天腹之下為地人身之氣自足之湧泉而起至於頭頂又降而下循環不窮然謂之隂陽者亦以其上下言之耳天之氣在地下者為隂在地上者為陽其為形雖有隂陽之殊其為氣則一也宇宙不曽隔人人自限隔宇宙上是天下是地人居其間須是做得人方不枉人與天地同體四時以行百物以生若滯在一處豈能為萬化之主耶古之善學者常令此心在無物處便運用得轉耳學以自然為宗可以著意理㑹乎神理為天地萬物主長在不㓕人不知此虚生浪死與草木一耳我之所以為身豈五臟六腑四肢百骸之謂哉身非身也其所主者心也心非心也其所具者性也性非性也其所原者天也天之所以為天我之所以為身也然則我之身非人也天也道無形體萬象皆其形體道無顯晦人所見有顯晦以形體言天地一物也以顯晦言人心其機也所謂心即理者以其充塞氤氲謂之氣以其脉絡分明謂之理以其流行賦畀謂之命以其稟受一定謂之性以其物無不由謂之道以其妙用不測謂之神以其凝聚謂之精以其主宰謂之心以其無妄謂之誠以其無所倚著謂之中以其無物可加謂之極以其屈伸消息往来謂之易其實則一而已今夫茫茫堪輿蒼然隤然其氣之最麄者歟稍精則為日月星宿風雨山川又稍精則為雷電鬼怪草木之彚又精而為鳥獸魚鼈昆蟲之屬至精而為人至靈至明而為心故無萬象則無天地無吾心則無萬象矣故萬象者吾心之所為也天地者萬象之所為也天地萬象吾心之糟粕也要其極致乃見天地無心而人為之心心失其正則吾亦萬象而已心得其正乃謂之人此所以為天地立心為生民立命惟在于吾心此可見心外無理心外無物所謂心者非今一團血肉之具乃指其至靈至明能作能知此所謂良知也然而無聲無臭無方無體此所謂道心惟㣲也此大人之學所以與天地萬物一體也一物有外便是吾心未盡處不足謂之學夫人知四肢百體之為我也知浩浩天地為吾軀殻而天地間品物萬形之皆吾四肢百體也乎而知推而上六萬四千八百年推而下六萬四千八百年之為吾一息也乎而能因睹吾是心上覆皇天下載后土日月不足為明而宇宙不足為大也乎如其未也則是猶未睹于道也夫自一氣動靜而天地生焉天地交而萬物生焉萬物物也天地亦物也天地物之大者也自夫萬物之形質而觀之穹然而在上者吾謂之天塊然而在下者吾謂之地煥然而代明者吾謂之日月淵然而停浩然而流者吾謂之江河屹然而峙者吾謂之山岳蔚然而秀者吾謂之草木翼而飛鬛而馳者吾謂之禽獸是其體盖不能以不異也亦不容以强一也非惟吾不能一雖天地之大固不能使萬物之合而為一也嗚呼孰知萬物之不能相一者其形體也萬物之相通而無間者實混合而為一也歟今夫萬物備而成天地衆體備而成一身天地一身之大者也一身天地之小者也試以身喻之人之一身外則有耳目口鼻四肢毛髪焉内則有五臟六腑焉自其異而觀之視者吾謂之目聴者吾謂之耳食者吾謂之口嗅者吾謂之鼻持而行者吾謂之四肢雖耳目口鼻四肢固已不能相一也而况於不可勝窮者乎自其合者而觀之坱然太虚為耳目口鼻為四肢為毛髪為五臟為六腑耳目口鼻四肢毛髪之形雖異而其坱然太虚者實融乎其相通也五臟六腑之形雖異而其坱然太虚者實混乎其無間也故觀乎一身則知天地萬物之為一體矣觀乎天地則知吾身之備乎天地萬物矣是故仰觀乎天吾身之盖也俯察乎地吾身之載也日月吾之明江河吾之流山岳吾之峙草木禽獸吾之文推而大之一元之闔闢吾身之動靜也推而細之一晝一夜之運吾身之呼吸也範圍天地之化而不過範圍吾身之化也曲成萬物而不遺曲成吾身之萬物也嗚呼知此者可與論仁矣夫仁者以天地萬物為一體固也然不㡬於無分與夫既謂之一體則萬物之有親疎也猶夫吾身之有貴賤也吾耳目口鼻吾四肢毛髪吾五臟六腑其大小之分貴賤之等截乎其不容易也天地萬物固可混然而無别是故乾稱父坤稱母民曰同胞物曰吾與是故身修而後家齊家齊而後國治國治而後天下平是故盡己之性斯盡人之性盡人之性斯盡物之性是故親親而仁民仁民而愛物其合而一者仁也其不容混者人之分也嗚呼仁之為徳其大固如是哉故竊嘗論之吾身之與天地萬物物也吾心其則也失其心則物非其物矣儒者之論盖曰心者一身之主宰嗚呼豈獨為一身之主宰實天地萬物之樞紐歟故曰明明徳於天下致中和天地位而萬物育焉吾人與天地並立而為三才非形骸可間人只為形骸間隔便執著有我殊不知此心之靈通天徹地無有限際天只是積氣地只是積形中間為天地的靈明主宰只有此心伏羲立象上一畫以象天下一畫以象地中一畫是天地的靈竅强名曰人人即是天地之心若認著我少為私意所隔便是不與天地立心便是三極不立吾人與萬物混處於天地之中為天地萬物之宰者非吾身乎其能以宰乎天地萬物者非吾心乎心何以能宰天地萬物也天地萬物有聲矣而為之辨其聲者誰歟天地萬物有色矣而為之辨其色者誰歟天地萬物有味矣而為之辨其味者誰歟天地萬物有變化矣而神明其變化者誰歟天地萬物之聲非聲也由吾心聴斯有聲也天地萬物之色非色也由吾心視斯有色也天地萬物之味非味也由吾心嘗斯有味也天地萬物之變化非變化也由吾心神明之斯有變化也然則天地也萬物也非吾心則弗靈矣吾心之靈毁則聲色味變化不得而見矣聲色味變化不可見則天地萬物亦幾乎息矣故曰人者天地之心萬物之靈也所以主宰乎天地萬物者也吾心為天地萬物之靈者非吾能靈之也吾一人之視其色若是矣凡天下之有目者同其明也一人之聴其聲若是矣凡天下之有耳者同是聰也一人之嘗其味若是矣凡天下之有口者同是嗜也一人之思慮其變化若是矣凡天下之有心知者同是神明也匪徒天下為然也凡前乎千百世已上其耳目同其口同其心知同亦無弗同也然則明非吾之目也天視之也聰非吾之耳也天聴之也嗜非吾之口也天嘗之也變化非吾之心知也天神明之也故目以天視則盡乎明矣耳以天聴則竭乎聰矣口以天嘗則不爽乎嗜矣思慮以天動則通乎神明矣天作之天成之不參以人是之謂天能是之謂天地萬物之靈吾心為天地萬物之靈惟聖人為能全之非聖人能全之也夫人之所同也聖人之視色與吾目同矣而目能不引於色者率天視也聖人之聴聲與吾耳同矣而耳能不蔽於聲者率天聴也聖人之嗜味與吾口同矣而口能不爽於味者率天嘗也聖人之思慮與吾心同矣而心之不亂於思慮者通神明也吾目不引於色以全吾明焉與聖人同其視也吾耳不蔽於聲以全吾聴焉與聖人同其聰也吾口不爽於味以全吾嗜焉與聖人同其嘗也吾心知不亂於思慮以全吾神明焉與聖人同其變化也故曰聖人可學而至謂吾心之靈與聖人同也然則非聖學也能自率吾天也吾心之靈與聖人同聖人能全之學者求全焉然則何以為功耶有要焉不可以支求也吾目蔽於色矣而後求去焉非所以全明也吾耳蔽於聲矣而後求克焉非所以全聪也吾口爽於味矣而後求復焉非所以全嗜也吾心之知亂於思慮矣而後求止焉非所以全神明也靈也者心之本體也性之徳也百體之㑹也徹動靜通物我亘古今無時乎弗靈無時乎或間者也或生而知之或學而知之或困而知之皆自率是靈以通百物勿使間於欲焉已矣其功雖不同其靈未嘗不一也吾率吾靈而發之於目焉自辨乎色而不引乎色所以全明也發之於耳焉自辨乎聲而不蔽乎聲所以全聪也發之於口焉自辨乎味而不爽乎味所以全嗜也發之於思慮焉萬感萬應不動聲臭而其靈常寂大者立而百體通所以全神明也人一能之已百之人十能之已千之必率是靈而無間於欲焉是天作之人復之是之謂天成是之謂致知之學何謂天人之原曰古人說配天配命合徳合明以此合彼尚猶二之此皆為自小其心者説耳其實人與天地一也吾心靈明為天地主宰天地無吾心則地不見其博厚矣天不見其髙明矣古今不見其悠久矣而天地亦幾乎息矣故曰天視自我民視天聴自我民聴謂民視聴即天之視聴無有二也諸君自盡求誠之功絶去外馳収斂精神以歸于一必求此心無愧無怍是參天兩地成位於其中矣又何疑於配天配地乎目之視耳之聴心之思手足之持行者孰為之曰仁也不寧惟是爪之生髪之長筋之轉脉之揺者孰為之曰仁也然則通吾身無一而非仁也天地大矣於我相關接乎萬物夥矣於我相連屬乎曰不相為關接連屬者非仁也然則通天地萬物無一而非身也乃有隔形骸分爾我同氣同胞仇讐視之者彼獨何心歟曰忍也所謂不仁者也目之明也有瞽耳之聪也有聾手足之利便也有痿痺則病也所謂不仁者也曰昔之人有以愛言仁者有以公言仁者又有以覺言仁者孰為近曰皆用也覺其近之矣然亦非至也朱子曰仁者必覺而覺不可以名仁理最盡也嗟夫知仁之必覺也又知覺之不足以名仁也斯其可與言仁也已明道先生曰學者須先識仁此知本教也大學先知本程門先識仁一也知本焉斯識仁矣天地一隂陽也人身一隂陽也人身之隂陽不外乎天地之隂陽天地之隂陽亦豈外乎人身之隂陽哉天地一人也人身一天地也人身之動靜天地之動靜也分而言之動自動也靜自靜也合而言之動根於靜靜由乎動也一呼一吸一息也而天行八十餘里人一晝一夜三萬三千六百餘息天則行九十餘萬里人息與天行齊四體于是乎順百病于是乎消一有愆焉始為衆病之所襲矣是故君子貴修身以俟天也然則天之所以行人之所以息孰從而宰之曰太極太極隂陽之本也天地之心也動靜之主也嗚呼善事天者當洗心而密察焉總論人身隂陽合體吾人之生原隂陽兩端合體而成其一則父母精氣妙凝有質所謂精氣為物者也其一則宿世靈魂知識變化所謂游魂為變者也精氣之質涵靈魂而能運動是則吾人之身也顯現易見而屬之於陽游魂之靈依精氣而露知識是則吾人之心也晦藏難見而屬之於隂交媾之時一齊俱到胎完十月出生世間其赤子之初則陽盛而隂㣲心思雖不無而専以形用也故常欣笑而若陽和亦常開爽而同朝日又常活潑而類輕風此陽之一端見於有生之後者然也及年少長則隂盛而陽㣲雖形體如故而運用則專心思矣故愁慼而欣笑漸减迷蒙而䦕爽益稀滯泥而活潑非舊此隂之一端見於有生之後者然也人能以吾之形體而妙用其心知簡淡而詳明流動而中適則接應在於現前感通得諸當下生也而可望以入聖殁也而可望以還虚其人將與造化為徒焉已矣若人以己之心思而展轉於軀殻想度而遲疑曉了而虚泛則理每從於見得幾多渉于力為生也而難望以入聖殁也而難冀以還虚其人將與凡塵為徒焉已矣或曰如君之論是以身為陽而在所先以心為隂而在所後乃古聖賢則謂身止是形心乃是神形不可與神並况可以先之乎曰子惡知所謂神哉夫神也者妙萬物而為言者也亦超萬物而為言者也隂之與陽是曰兩端兩端即兩物也精氣載心而為身是身也固身也固耳目口鼻四肢百骸而具備焉者也靈知宰身而為心是心也亦身也亦耳目口鼻四肢百骸而具偹焉者也精氣之身顯于晝之所為心知之身形於夜之所夢然夢中之身即日中之身但以屬隂故其氣弱其象㣲雖弱且㣲而較之日中之舉止毫髪則無殊也日中之身即夢中之身但以屬陽故其氣健其體充雖健且充而較之夢中舉止毫髪亦無殊也是分之固隂陽互異合之則一神所為所以屬隂者則曰隂神屬陽者則曰陽神是神也者渾融乎隂陽之内交際乎身心之間而充溢瀰漫乎宇宙乾坤之外所謂無在而無不在者也惟聖人與之合徳故身不徒身而心以靈乎其身心不徒心而身以妙乎其心是謂隂陽不測而為聖不可知之神人矣或者憬然悟曰孔夫子之從心所欲不踰矩孟夫子之存心養性以事天是誠隂陽合徳而神之乎其為心也哉亦神之乎其為身也哉易曰乾為首坤為腹邵子曰神者人之主將寐在脾熟寐在腎將寤在肝又言在膽正寤在心又曰天之神棲于日人之神發于目寤則棲心寐則棲腎所以象晝夜之道也愚謂人之一身首乾腹坤而心居其中其位猶三才也氣統於腎形統於首一上一下本不相交所以使之者神交也神運乎中則上下渾融與天地同流此非三才之道歟夫神守於腎則靜而藏伏坤之道也守於首則動而運行乾之道也藏伏則妙合而凝之行則周流不息妙合而凝周流不息者乾坤合徳也以身外比大空以心腎比天地以氣液比隂陽以子午比冬夏子時乃曰坎卦腎中氣生午時乃曰離卦氣到心腎氣與心氣相合而太極生液所以生液者以氣自腎中来氣中有真水真水無形離卦到心氣則太極生液如此離卦心中液生坎卦液到腎液與腎水相合而太極復生于氣所以生氣者以液自心中来液中有真氣真氣無形坎卦到腎接著水則太極而生氣如此可以比隂陽升降至太極而相生所生盖陽中藏水隂中藏氣也易曰至哉坤元萬物資生乃順承天契云恒順地理承天布宣謂人之元氣藏于腹猶萬物于坤神入地中猶天氣降而至於地氣與神合猶地道之承天天地以此而生物吾身以此而運用太𤣥經云藏心于淵美厥靈根於此同㫖邵康節曰神統於心氣統於腎形統於首形氣交而神主乎其中三才之道也按素問曰丈夫八歳腎氣實髪長齒更二八腎氣盛天癸至精氣溢冩隂陽和故能有子三八腎氣平均筋骨致强故真牙生而長極四八筋骨隆盛肌肉滿壯五八腎氣衰髪墮齒槁六八陽氣衰竭於上面焦髪鬢頒白七八肝氣衰筋不能動天癸竭精少腎藏衰形體皆極八八則齒髪去又云上古之人其知道者法于隂陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其年度百嵗乃去今時之人不然也以酒為漿以妄為常用道得終謂之常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心溺於生樂起居無節故半百而衰也愚謂人至于老則多忘神昏故也動則疲倦氣衰故也養身之道以神氣為本神昏氣衰則以何者為本哉腦者髓之海諸髓皆屬於腦故上至腦下至尾骶髓則腎主之也由脊骨中相貫膻中名氣海在兩乳之間為氣之海也氣所居焉能分佈陰陽是氣者生之源乃命之主故為人父母不可損也隔膜在心肺之下與脊腸腹周囬相著如幕不漏以遮蔽濁氣使不上薫於心肺與脊係上貫于心下通于腎心腎水火相感而精氣溢泄乃化血取精之系也䦨門神闕津液滲入膀胱濁穢流入大腸總言藏之要害岐伯曰藏有要害不可不察肝生于左肺藏于右心部于表腎治于裏脾謂之使胃謂之市水穀所歸脾味皆入也鬲肓之中上有父母氣海為人之父母也七節之旁中有小心小心謂神靈之舍從之有福逆之有害五臟六腑喉嚨已下言六臟為手足三隂咽喉已下言六腑為手足三陽盖為諸臟屬隂為裏諸府屬陽為表以臟者藏也藏諸神而精神通流也腑者庫也府主出納水穀糟粕轉輸之謂也喉嚨自喉嚨已下六臟喉應天氣乃肺之系也以肺屬金乾為天乾金也故天氣通于肺而肺應天上運㑹厭㑹厭者五臟聲音之門戸肺屬金音聲應金石也九墟云咽喉喘息之道其中空長可以通氣息楊𤣥操云喉嚨與咽並行其實兩異而人多惑之盖喉中為息通咽中下水穀其喉嚨下接肺兩葉之間與今所繪者同若呉簡序宋景所畫希範喉中三竅者非果喉中具三竅則水穀與氣各從一竅而俱下肺中肺下無竅何由𫝊道水穀入於下焦肺手太隂經黄帝書云肺為諸藏之上盖藏真髙於肺以行榮衞隂陽也肺之形似人肩二大葉中有二十四空行列以分布諸臟清濁之氣而為氣管乃相輔之官也在喉嚨氣系之下心手少隂經黄帝書云心形如未敷蓮花中有九孔以道天真之氣神之宇也其藏真通于心心藏血脉之氣也而為身之君以肺為上盖故心在肺之下心包手厥隂經靈樞經曰手心主脉起于心中出屬心包下膈九樞云十二原以大陵為心之原即心包冗也明真心不受邪故手心主則心包也類纂曰手厥隂心包之經所謂一隂也一名手心主其經與手陽三焦為表裏今以藏象校之在心下横膈膜之上腎斜膈膜之下與横膜相粘其處黄脂漫包者心也其漫脂之外有細筋如絲與心肺相連者此包絡也脾足太隂經黄帝書云脾形似馬蹄内包胃脘象土形也經經之氣交歸於中以營連真靈之氣意之舍也又云脾為陰藏位處中焦主養四藏故呼吸以受穀氣以其上有心肺下有腎肝故曰在中而藏真濡於脾脾藏肌血之氣也為諫議大夫又曰倉廩之官肝足厥隂經黄帝書云肝有二大葉一小葉如木甲拆之象各有支絡血脉於中以宣發陽和之氣魄之官也故藏真散於肝肝藏筋膜之氣也為將軍之官其治在左然以今之藏象校之則肝在右脅右腎之前並胃而胃與小腸之右外腎足少隂經黄帝書云腎藏有二形如豇豆相並而曲附於膂筋其外有脂裹裏白外黒主藏精故藏真下於腎腎藏骨髓之氣也腎者作疆之官伎巧出焉其位下連於脇今以見圖藏象校之則在膈下粘脊膂脂膜中有系二道上則系心下則連二腎之系相通已上六臟也咽門自咽門已下六腑咽應地氣為胃之系也以胃屬土坤為地坤土也故應地咽之下者胃脘水穀之道凡咽門承受水穀自胃脘而入於胃中咽嚥也言可嚥物也又謂之嗌言扼要之處黄帝書曰地氣通于嗌嗌咽也以今藏象咽在喉之後合古書為是于歐本則非胃足陽明經黄帝書云胃者倉廩之官布養四藏故謂五藏皆稟氣于胃胃者五臟之本故食氣入胃散精于肝淫氣于筋食氣入胃濁氣歸心淫精于脉脉氣流經經氣歸肺肺朝百脉輸精于皮毛毛脉合精氣行於腑腑精神明留於四臟氣歸權衡以平氣口成寸以决死生又飲于胃遊溢精氣上輸于脾脾氣散精上歸于肺通諸水道下輸膀胱水精四布五經並行合于四時五藏陰陽揆度以為常也此水穀氣味奉生之理也膽足少陽經黄帝書云膽者中正之官决斷出焉而為清淨之府小腸手太陽經黄帝書云小腸者受盛之官化物出焉凡胃中腐熟水穀其滓穢自胃之下口傳入于小腸上口自小腸下口泌别而水入膀胱上口其滓穢傳入大腸上口與今所繪藏象同大腸手陽明經一名囬腸以其囬屈而受小腸之穀因以名之乃肺之府也黄帝書曰大腸者𫝊導之官變化出焉廣腸又曰肛門言其處似車􅤧形故曰肛門即廣腸也一名直腸一名魄門黄帝書曰䐈腸者廣腸也一名洞腸受大腸之穀而道出焉故魄門亦為五藏使水穀不得久藏膀胱足太陽經又名胞胞􅀈也􅀈虚空也以虚承水液焉而為津液之府類纂云膀胱者胞之室也黄帝書曰膀胱為州都之官津液藏焉氣化則能出焉位當孤府故膀胱不利為癃不約為遺溺又水泉不止膀胱不藏得守者生無守者死三焦手少陽扁鵲曰膲原也為水穀之道路氣之所終始也上膲者在心下下膈在胃上口主内而不出其始在膈中玉堂下一寸六分直兩乳間陷者是也中膲者在胃中脘不上不下主腐熟水穀下膲者在臍下當膀胱上口主分别清濁出而不内以𫝊道也故上膲主出陽氣温于脾胃分肉之間若霧露之溉焉中膲主變化水穀之味出血以榮五藏六腑及身體也又下膲主通利溲便以時𫝊下故曰出而不内凡藏府俱五者手心主非藏三膲非府也以藏府俱六者合手心主及三膲也又曰藏惟有五府獨有六者何也所以府有六者謂三膲也有原氣之所别焉主持諸氣有名而無形其經屬手少陽此外府也故言府有六焉黄帝書曰上膲如霧中膲如漚下膲如瀆而為决瀆之官水道出焉九墟云中膲亦並于胃口出上膲之後此所受氣泌别糟粕成津液化其精㣲主注于肺脉乃化而為血以奉生身故得獨行於經隧命曰榮氣故言中膲如漚也仲景曰下膲不和清溲重下大便數難臍腹築痛故三膲者寄於胸膈肺側肺已下右側可見心系系於脊髓下通於腎其心之系有二一則上與肺相通一則自心入於肺兩大葉之間曲折向後並脊膂經絡相連貫通脊髓而與腎系相通其下則見於第四圖中其系從肺兩大葉穿向後附脊處正當七節之間黄帝所謂七節之旁中有小心也心氣五臟系通於心心通五臟系心之系與五臟之系相連輸其血氣滲灌骨髓故五臟有病先于於心其系上系於肺其别者自肺兩葉之中向後通脊與腎自腎而之於膀胱與膀胱膜絡並行而之於溲溺處也肺之系者上通喉嚨其中與心相通脾之系者自膈正中微近左脇居胃之上並胃胞絡及胃脘相連貫膈與心肺相通膈膜相綴也肝之系者自膈下著右脇肋上貫膈入肺中與膈膜相連也腎之系者貼脊膂脂膜中兩腎二系相通而下行其上則與心系通為一氣海膈膜黄帝云膻中者神使之官喜樂出焉膻中在兩乳間為氣之海也以氣布隂陽氣和志達則喜樂由生又云膈膜之上中有父母膈膜之上者氣海居焉氣者生之原乃命之主故氣海為人之父母膈膜謂心肺之間也其膈膜自心肺之下與脊脇腹周囬相著如幕不漏以遮蔽濁氣不上薫於心肺也脾胃包絡黄帝云脾之藏其府胃也脾與胃膈相連而脾處胃之上又云胃之大絡名曰虚里貫膜絡肺出于左乳之下其動應衣宗氣也故胃為之市水穀所歸五味所入如市之雜也大素云胃者太倉也胃之五竅閭里門戸也咽胃大腸小腸膀胱為五竅脾之有大絡其系自膈下正中㣲左脇於胃之上與胃包絡相附矣其胃之包在脾之上與胃相並結絡周囬漫脂遍布上下有二系上者貫膈入肺中與肺系相並而在肺系之後其上即咽門也咽下胃脘也胃脘下即胃上口也其處謂之賁門者也水穀自此而入胃以胃出穀氣𫝊之於肺肺在膈上因曰賁門其門膈膜相貼之間亦漫脂相包也若胃中水穀腐熟則自幽門而傳入於小腸故言太倉之下口為幽門其門幽𨼆因名曰幽門大腸小腸㑹門扁鵲曰大腸小腸㑹門燕為䦨處隔言䦨約水穀從其泌别也其水穀自小腸承受於闌門以分别也其水則滲灌入於膀胱上口而為溲便若穀之滓穢則自闌門而𫝊道於大腸故曰下焦者在膀胱上口主分别有清濁也命門藏各有一腎獨有兩左者為腎屬水右者為命門屬火亦猶北方之蟲則有龜有蛇龜隂物者蛇㣲陽也所謂陽生於子火實藏之命門者原氣之所繫男子以藏精女子以繫胞其氣與腎通脉經云左手赤中為腎脉右手赤中為神門脉又曰右腎為命門其腑則胞門子戸女子胞者地氣之所生也藏於隂而象地名曰竒恒之府今視藏象則所謂男子藏精女子繫胞者其原始自心之下系貫七節之傍者其系曲屈下行接兩腎之系下尾閭附䐈腸之右通二陰之間前與膀胱下口於溲溺之處相並而出乃是精氣所泄之道也若女子則子戸胞門亦自䐈腸之右膀胱下口相並而受胎故精氣血脉腦皆五臟之真以是當知精血来有自矣大小腸膀胱系甲乙經凡手少陰心之經絡小腸手太陽小腸之經屬小腸手太陰肺之經下絡大腸手陽明大腸之經屬大腸足少陰之經絡膀胱足太陽經屬膀胱其大小腸之系則自膈之下與脊齊連心腎膀胱相系脂膜經絡散布包裹然各分紋理羅絡大小腸與膀胱其細脉之中氣血精液流走之道髓黄帝云諸髓皆屬於腦又云腎生髓髓生肝九墟云人有四海腦為髓之海足太陽經入絡於腦故五穀之精津和合而為膏者肉滲入於骨孔補益於腦髓今視藏象其脊骨中髓上至於腦下至於尾骶其兩傍附筋骨每接兩向皆有細絡一道内連腹中與心肺系及五臟相通總十二臟黄帝問曰願聞十二臟之相使貴賤如何岐伯對曰悉乎哉問也請遂言之心者君主之官也神明出焉肺者相傳之官治節出焉肝者將軍之官謀慮出焉膽者中正之官决斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者𫝊道之官變化出焉小腸者受盛之官化物出焉腎者作强之官伎巧出焉三膲者决瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出焉凡此十二官者不得相失也故主明則下安以此養生則夀殁世不殆以此為天下則大昌主不明則十二官危使道門塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之即此觀之信乎心為一身之主宰萬化之根本故曰欲修其身者先正其心形氣總論夫人之有生也稟天地之陰陽假父母之精血交感凝結以為胞胎也乾道成男坤道成女始自襁褓以至髫齔迨其成童與夫壯年豈易然哉故一月之孕有白露之稱二月之胚有桃花之譬及其三月先生右臂則為男隂包陽也先生左臂則為女陽包隂也其次腎生脾脾生肝肝生肺肺生心以生其勝己者腎屬水故五臟由是為隂其次心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱膀胱生三膲以生其己勝者小腸屬火六腑由是為陽其次三膲生八脉八脉生十二經十二經生十二絡十二絡生一百八十系絡系絡生一百八十纒絡纒絡生三萬四千孫絡孫絡生三百六十五骨節骨節生三百六十五大穴大穴生八萬四千毛竅則耳目口鼻四肢百骸之身皆備矣所謂四月形像具五月筋骨成六月毛髪生正謂此也至七月則遊其魂而能動左手八月遊其魄而能動右手九月三轉身十月滿足母子分解其中有過月生者必生貴子不足日月生者必主貧薄之人誕生之后有變蒸之熱長其精神壯其骨髓生其意智三十二日一變蒸生腎氣焉六十四日二變蒸生膀胱之氣焉腎與膀胱屬水其數一也九十六日三變蒸生心氣焉一百二十八日四變蒸生小腸之氣焉心與小腸屬火其數二也一百六十日五變蒸生肝氣焉一百九十二日六變蒸生膽氣焉肝與膽屬木其數三也二百二十四日七變蒸生肺氣焉二百五十六日八變蒸生大腸之氣焉肺與大腸屬金其數四也二百八十八日九變蒸生脾氣焉三百二十日十變蒸生胃氣焉脾與胃屬土其數五也變蒸已畢一期歳焉齒生髪長神智有異於前也八嵗腎氣實髪長齒更二八腎氣盛大天癸至精氣溢㵼隂陽和故能有子三八腎氣均平筋骨堅强故真牙生而長極四八筋骨隆肌肉滿壯五八䁂氣衰髪墮齒稿六八陽氣衰竭于上面焦髪頒白七八肝氣衰筋不能動精少腎藏衰形體皆極八八則齒髪去五臟皆衰筋骨解墮天癸盡矣故髪白身重行歩不正而無子故曰齒者骨之餘也髪者血之餘也爪者筋之餘也神者氣之餘也吁人身之難得也如此哉方其幼也有如水面之泡草頭之露氣血未定易寒易熱腸胃綿脆易飢易飽為母者調攝不得其宜必不能免乎吐㵼驚疳之病矣及其長也嗜欲既開不能修養是以六氣迭侵於其外七情交戰於其中百憂累其心萬事勞其形一蝸之氣安能無病焉小兒之瘡疹大人之傷寒尤其甚也是故聖人不治己病治未病不治己亂治未亂夫病已成而後藥之亂已成而後治之譬猶渇而穿井鬪而鑄兵不亦晚乎臟腑全圖說崇寧五年梁少保知大名府有羣盗起内一强冦楊宗以計擒之案首惡論死臨刑命醫官并畫工畫之適徐州歐希範作惡當刑三十人亦送来刑命畫工于法塲割開諸人胸腹詳視畫之見喉嚨中排三竅曰水曰食曰氣相推惟水食同一竅走胞中入胃上口一竅通肺循腹抵脊膂轉臍下兩腎與任衝督三脉㑹丹田者氣海也胃管下有肺両葉為華盖諸臟腑肺下有心外有黄脂裹之其色赤黄割開視之其心箇箇不同有竅無竅有毛無毛尖者長者心下有羅膈羅膈下有胃積曲可容一斗之物外有黄脂如旗燄左有肝一二三四五葉者亦各各不同内歐患眼肝有白黒子兩張氣喘而且𠻳其肺皺而且黒此所謂表裏相應也其肝短葉上有膽右胃左脾與胃同膜狀如馬肝赤紫下有小腸盤十六曲極瑩凈化物通行右有大腸亦十六曲内有所出糟粕之路外有黄脂粘作一塊下有膀胱居脬亦瑩凈外無所入穴全借施行津液入胞為尿此君子小人之體各異見成性氣緩急五臟六腑皆造化所成也圖書編卷六十八
