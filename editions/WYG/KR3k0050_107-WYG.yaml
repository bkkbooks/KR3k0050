body:
  text: 圖書編卷一百七明章潢撰教養國子考大司徒以本俗六安萬民四曰聫師儒五曰聫朋友師氏以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長居虎門之左以教國子弟凡國之貴遊子弟學焉保民養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五御五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰䘮紀之容五曰軍旅之容六曰車馬之容大司樂掌成均之法以治建國之學政而合國之子弟焉以樂徳教國子中和祇庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大磬大夏大濩大武大胥掌學士之版以待王諸子春入學舍菜合舞秋頒學合聲小胥掌學士之徵令而比之其不敬者巡舞列而撻其怠慢者王制天子命之教然後為學小學在公宫南之左大學在郊天子曰辟雍諸侯曰頖宫樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王太子王子羣后之太子卿大夫元士之適子國之俊選皆造焉凡入學以齒洪武二年冬十月辛巳上諭中書省臣曰學校之教至元其弊極矣使先王禮樂掃地以盡故學校之教名存實亡况兵變以來人習於戰鬬惟知兵戈莫識俎豆朕恒謂治國之要教化為先教化之學學校為先今京師雖有大學而天下學校未興宜令郡縣皆立學禮延師儒教授生徒以講論聖道使人日漸月化以復先王之舊革汚染之習此最急務當速行之條陳監規祭酒吕柟疏曰歳貢入監即古鄉舉里選六徳六行六藝之士故禮稱四十强仕道明而徳立近年有歳貢年二十上下者其徳行焉考甚且禮讓未閑遇事與名各提學官取詞章不顧行檢遂使質樸淪墜乞勅該部轉行提學官當歳貢期於食廪年深二三名内遵照祖宗卧碑參取徳行必注其平日某徳某行縱無完人庶幾近之所校文惟取其不悖經傳理明辭達而止不專於富麗有蹈襲六朝人語竒怪難讀者俱從黜落而遐荒鄙邑亦取士以充用昭聖明一視無外之心又舉人在監本以觀光皇極薰陶質性今查在監實數天下之廣僅止二三十人葢自㑹試之後輒稱他故駿奔原籍有志者固不廢學餘多交際郡邑開治産業侵陵鄉曲比及試期方攢監簿計水程用規撥歴未仕若此居官可知已敇該部稱巳未監告囘舉人移文行取違限作曠計月加曠不許㑹試之條庻士類知儆衆向于學矣納銀例監近奉欽依聴其伊親原籍與考科舉此以待志士可矣其無志者一旦還里抗揖縣官兼服商賈肆行鄉閭他日入官殃民非淺乞敕該部重刋儀禮并造前項禮樂諸器以便諸生游業准古大雅鼔鐘辟廱周禮樂語之意義云修明學政大學士桂萼疏畧曰臣聞先王之教民也因天地之性順人物之生分土授職統之於鄉州黨族閭里而導之以孝友睦婣任恤教不出于畎畆而行不出彛倫管敬仲曰農之子恒為農野處而不暱其秀民之能為士者必足頼此之謂也漢書餘子遣入序室所謂餘子父在則子餘兄在則弟餘故天下生員皆名子弟其職在入孝出弟而所以教之者莫切於出作入息之期後世岐教養之政而二之教者不知養養者不知教以致學校之弊考徳行不求之鄉黨談經之謬分司徒以屬之各官故一登講堂永恥民事有父兄荷簔笠而子弟衣輕裘見逹官貴人竦然起敬見胼手胝足雖至親赧然媿之是雖冠服士人言論道法而其孝友之實曾塗之人不若矣此風俗之所以日下也乞敕諭提督學校官敦本抑末進農民之秀重居鄉之行凡入學生徒必求子弟曾知稼穡有孝弟實行者取之每于考校後資訪篤實父老如古所謂孝弟力田者量賞犒以風之設稽行簿付之里老書其敬敏任恤者報其善行旌異之其鄉行玷缺者選人不許入序嵗貢舉不以應科而命府州縣教官集諸生為㑹五日一㑹先將所欲講求經傳手録之録畢即將本文諧協音聲圏㸃句讀㑹通章大㫖尋繹不得破碎擬題以壞經義茍有自得録册端商之所作字務莊楷次將身所處倫理間事未盡分若所遭不如意者務盡心商處如此將不出畎畆之中鄉庠之内而駸駸然有復古之漸矣且夫人者天地之心也人存其心則與天地為一一息不存則不與天地相似失久不復則其違禽獸不逺矣心何以有曰敬敬何以入曰畏昊天曰明及爾出王昊天曰旦及爾游衍敢不敬乎曾子曰十目所視十手所指畏也惟畏而後能敬敬而後心存朋友交切嚴諸此至舉業文字士子所頼以發身者固不待督責而自勸者矣然其業之也粗解章句輙决裂經傳擬題搆文競為浮華放誕之言以奪有司之目是則雖名士人其設心與壟斷之徒何異志茍進而已矣放心至此尚何望其讀書窮理以求見聖賢之心法也哉必申學官務戒諸生一洗此習先閉門静坐整齊嚴肅然後以先儒讀書法取聖賢經書誦讀而近思之體認深至程子曰如讀論孟將門人問處更作已問將聖賢荅處便作今日耳聞又云未讀時已曉文義大畧既讀後自家見得又别但覺意味深長今生徒知此味者或鮮矣近議者又以為讀書無益傳註為贅正縁其始未知讀書之法未深於讀之味後有所得懲之太過而不知此論一開必將至於尚清談滅禮教聾瞽一世使天下貿貿焉無所執持而後已非所聞也乃小學之教本古庠序以明教庠以行禮而視化春民畢出在野冬畢入邑邑餘子畢入序室學六甲五筭書計之事非獨教之將有以養之也非獨養其徳性亦將養其身體固其夀命而堅强其血脉也故聲音以養其耳采色以養其目降登疾徐以養其血脉今之教者嚴課程急記誦以傷其魂强所不能苦其思索以損其魄而教與養胥病矣臣治縣時闢義倉之右廢寺隙地南北數百歩有餘建為學舍左右相向設四堂前後為門左右為塾以篤實長老二人平旦坐左右塾序行道出入每食時至日夕亦如之次為習禮堂中繪陳祥道楊復所撰禮圖曰童子禮曰士相見禮曰婚禮曰子事父母禮曰婦事舅姑禮曰祀先禮曰鄉射禮立師掌之諸童子進學即率見先生習升降拜揖坐立之節隨授一圖指示壁畵令其通曉間令展習以辨雜服又次為句讀堂内榜管氏弟子職亦列數圖示之日講一圖次以孝經小學教之句讀令其粗熟仍為講說大義約之心身又次為書筭堂榜六書法每日止教一兩字即以四方上下自一至十若干支等名數授之又次為聽樂堂内置鼔鐘笙磬投壺詩章弓矢禮樂之噐或教以鼓節或教以歌詩或撃魯薛鼓之半以習投壺或擊魯薛鼓之全以習射儀四堂遍而日亦且晡矣自聽樂堂復之書筭以次至句讀至習禮皆畧復舊業復於門左右塾以次序出如此則家無子弟之憂而子弟亦得養其徳性血脉養其耳目心志而非僻之干無自而入于以端養正之本而復古興理幸甚選舉總叙古之用人徳行為首才能次之虞朝載采亦有九徳周家賓興考其徳行於才不屑屑也兩漢以來刺史守相得以専辟召之權魏晉而後九品中正得以司人物之柄皆考之以里閈之毁譽而試之以曹掾之職業然後俾之入備王官以階清顯葢其為法雖有愧於古人徳行之舉而猶可以得才能之士也至於隋而州郡僚屬皆命於銓曹縉紳發軔悉由於科目自以銓曹署官而所按者資格而已於是勘籍小吏得以司升沉之權自以科目取士而所試者詞章而已於是操觚末技得以取榮進之路夫其始進也試之以操觚末技而専主於詞章其既仕也付之於勘籍小吏而専校其資格於是選賢舉能之意無復存者矣然此二法者歴數百年而不可以復更一或更之則蕩無法度而僥濫者愈不可澄汰亦獨何哉又古人之取士葢將以官之三代之時法制雖簡而考核本明毁譽既公而賢愚自判往往當時士之被舉者未有不入官初非有二途也降及後世巧偽日甚而法令亦滋多遂以科目為取士之途銓選為舉官之途二者各自為防閑檢柅之法至唐則以試士屬之禮部試吏屬之吏部於是科目之法日新月異不相為謀葢有舉於禮部而不得官者不舉於禮部而得官者而士之所以進身之塗轍亦復不一不可比而同之也於是立舉士舉官兩門以該之而古之選舉不復聞矣賓興賢能考周禮大司徒以鄉三物教萬民而賓興之一曰六徳智仁聖義忠和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數鄉大夫三年則大比考其徳行道藝而興賢能鄉老及夫鄉大夫帥其吏與衆以禮禮賓之厥明鄉老及鄉大夫羣吏獻賢能之書于王王拜受之登於天府内史貳之王制命鄉大夫論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征于鄉升于學者不征於司徒曰造士大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後禄之按三代盛時仕進有二道有由鄉學而進者有由國學而進者郷學則掌於鄉大夫而用之在大司徒國學則掌於大樂正而用之在大司馬由選士而為造士是鄉學所進者則用之為鄉遂吏由俊士而為造士是國學所進者則進之于大樂正以三代鄉里選用之法而所謂進士者葢以其成材將進于朝以用之故耳後世取士不復此制而亦進士名其原葢出于此漢文帝十五年詔諸侯王公卿郡守舉賢良能直言極諫者賢良極諫科始此元光五年徴吏民有明當世之務習先聖之術者縣官給食令與計偕元朔五年詔補博士弟子漢制郡國舉士其目有三曰賢良方正也孝亷也博士弟子也孝宣本始元年地震詔舉郡國文學髙第各一人災異舉士之始漢召信臣以明經甲科為郎明經之科始于此後漢順帝時尚書令左雄議改察舉之法限年四十以上儒者試經學文吏試章奏限年之法始于此魏陳羣立九品官人之法州郡皆置中正以定其選隋始置進士科唐制取士之道大要有三由學館者曰生徒由州縣者曰鄉貢皆升於有司而進退之其科之目有秀才有明經有俊士有進士有明法有明字有明筭有一史有三史有開元禮有道舉有童子此嵗舉之常選也其天子自詔者曰制舉所以待非常之才焉武后天授元年䇿問貢士於洛陽後世臨軒䇿士之始𤣥宗開元中令諸州貢舉省試下第願入學者聽此下第舉人入學之始宋之科目有進士有明經諸科常選之外又有制科而進士得人為盛仁宗始罷諸科而分經義詩賦以取士神宗時王安石告其君曰古之取士皆本學校道徳一於上習俗成於下其人才皆足以有為於世今欲追復古制則患無漸宜除去聲律對偶之文使學者専意經術於是改法罷詩賦帖經墨義士各占易詩書周禮禮記兼論語孟子中書撰大義式頒行試義者須通經有文采乃為中格不但如明經墨義粗解章句而已此後世經義之始朱熹作貢舉私議曰古者學校選舉之法始于郷黨而逹於國都教之以徳行道藝而興其賢者能者葢其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定制而無他慕早夜孜孜惟懼徳業之不修而不憂爵禄之未至按朱熹之議雖未上聞而後世舉貢之法未有過焉者我太祖于開國之初即詔天下曰自洪武三年為始特設科舉以起懐才抱徳之士務在經明行修博古通今文質得中名實相稱至十七年又命禮部頒行科舉程式凡三年大比肆我太宗修五經四書大全易詩書如舊惟春秋則宗胡氏禮記則又加以陳澔集說焉本朝試士之制雖不盡用朱氏分年之義然士各専一經經必兼四書一惟主於濓洛關閩之說以端其本又必使之兼明子史百家之言古今政務之要而以論䇿試之考其識見本末兼該文質得中實得朱氏之意於數百年之後真可行之千萬年而無弊矣杜佑評曰夫人生有欲無君乃亂君不獨治故建庶官昔在唐虞皆訪於衆則舜舉八元八凱四岳之舉䕫龍稷契葢所用人之大略也降及三代擇於鄉庠然後受任其制漸備秦漢之道雖不師古閭塾所推猶本乎行而郡國佐吏並自奬擢備嘗試効乃登王朝内官有僚屬者亦得徵求俊乂暨於東漢初置選職推擇之制尚習前規左雄議以限年其時不敢謬舉所以二漢號為多士魏晉設九品置中正葢論閥閱罕考行能選曹之任益為崇重州郡之刺史大守内官之卿尹大夫咸吏部所署而辟召及郷里之舉舊式不替永嘉之後天下幅裂三百餘祀方遂混同中間各承正號凡有九姓大抵不變魏晉之法皆亂多治少諒無足可稱夫文質相矯有如循環教化所由興衰自魏三主俱好屬文晉宋齊梁風流彌扇體非典雅辭尚綺麗澆訛之弊極于隋世且三代以來憲章可舉惟稱漢室繼漢之盛莫若有唐惜乎當末造之初承文弊之極可謂遇其時矣羣公不議救弊以質而乃因習尚文風教未純慮由於此􅃡觀往昔論選舉者無代無之或云官繁人困要省吏員或云等級大多患在速進或云守宰之職所擇殊輕或云以言取人不如求行是皆能知其失莫究所失之由何者按秦法惟農與戰始得入官漢有孝悌力田賢良方正之科乃時令徴辟而常嵗郡國率二十萬口貢止一人約計當時推薦天下纔過百數則考精擇審必獲品能自茲厥後轉益煩門開元天寳之中一嵗貢凡有數千而門資武功藝術胥吏衆名雜目百户千途入為仕者不可勝計比於漢代且增數千百倍安得不重設吏職多置等級遽立選限以抑之乎常情進趨共慕榮逹升髙自下由邇陟遐固宜驟歴方至何暇淹留著績秦氏列郡四十兩漢郡國百餘太守入作公卿郎官出宰縣邑便宜從事闊畧其文無所可否責以成效寄委斯重酬奬亦崇今之剖符三百五十郡縣差降後為八九邑之俊乂不得有之事之利病不得専之八使十連舉動咨禀地卑禮薄勢下任輕誠曰徒勞難階超擢容易而授理固然也始後魏崔亮為吏部尚書無問愚賢以停解日月為斷時沉滯者皆稱其能魏之失才實從亮始洎隋文帝素非學術盗有天下不欲權分罷州郡之辟廢鄉里之舉内外一命悉歸吏曹纔厠班列皆由執政則執政參吏部之職吏部總州縣之權罔究體國推誠代天理物之本意是故銓綜失叙受仕多濫豈有萬里封域九流叢湊掄材授職仰成吏曹以俄傾之周旋定材行之優劣求其無失不亦繆歟爾後有司尊賢之道先於文華辨論之方擇於書判靡然趨向其流猥雜所以閱經號為倒拔徴詞同乎射覆置循資之格立選數之制壓倒示其定限平配絶其踰涯或糊名考覈或一銓分掌茍齊其末不澄其源則吏部専總是作程之弊者文詞取士是審才之末者判又文詞之末也凡為國之本資乎民氓民之利害繫乎官政欲求其政在久其任欲久其任在少等級欲少等級在精選擇欲精選擇在减名目俾士寡而農工商衆始可以省貟始可以安黎庶矣誠宜斟酌治亂詳覽古今推伏至公矯正前失或許辟召或令薦延舉有臧否論其誅賞課績以考之升黜以勵之拯斯刓弊其效甚速寔為大政可不務乎按杜氏所評大槩論後世吏治不古由選舉辟召之法廢于魏而文華書判之例重于唐也欲精選擇在减名目少等級而久其任是亦尚行不尚言之意則善矣豈知本之論哉或謂學校之設須重明經時藝宜尚典雅不専尚詞藻亦非本身之教也何也自古聖君賢相未有不身先徳行而能以徳化人者也觀孔子教弟子入孝出悌謹言行愛衆親仁行有餘力則以學文今之經義不過學文一節其學校固所當重茍不復成周鄉三物之教而欲賢能藹藹濟濟如三代隆盛也難矣哉噫人才政體非二事也急先務者不在吏曹之選舉而在學校之教養不在文體之淳雅而在行檢之修明其要則又在司教化者以身先之皇朝設科之制聖祖開國之初即詔大下曰自洪武三年為始特設科舉以起懐才抱徳之士務在經明行修通今博古文質得中名實相稱其中選者朕將親䇿于廷至十七年命禮部頒行科舉程式士各専一經經必兼四書一惟主于濂洛關閩之說凡三年大比子午卯酉為秋鄉試辰戌丑未為春會試其試士之制則先以經義以觀其窮理之學次之論表以觀其博古之學終之䇿問以觀其時務之學取其中式登之鄉書即鄉大夫之興禮也上之禮闈以俟廷對即大司馬之進士也王文恪制科議夫科目之設天下之士羣趨而奔向之上意所向風俗隨之人才之髙下士風之淳漓率由是出三代取士之法姑未暇論唐宋以來科目有明經有進士明經即今經義之謂也進士則兼以詩賦當時二科並行而進士得人為盛名臣將相皆是焉出則明經雖近實而士之拙朴者則為之謂之學究詩賦雖近于浮艷而士之髙明者多向之謂之進士葢詩賦雖浮豔然必博觀泛取出入經史百家葢非詩賦之得人而博古之益于治也至宋王安石為相黜詩賦崇經學科塲以經義論䇿取士以掃前代之陋然士専一經白首莫究其餘經史付之度外謂非己事其學誠専其識日陋其才日下葢不過當時明經一科耳後王安石言初意驅學究為進士不意驅進士為學究葢安石亦自悔之矣今科塲雖兼文論而主司所重惟在經義士子所習亦惟經義以為經義既通則䇿論可無竢乎習矣丘文莊亦謂士子于䇿塲所謂古今制度前代治蹟當時要務有不暇致力者甚至登科列亦或有不知史册名目朝代前後字書偏旁者真可歎也已近來頗尚論䇿而士習既成亦難倅變愚欲於進士之外别立一科如前代制科之類必兼通諸經博洽子史詞賦迺得預焉有官無官皆得應之其中者授翰林次科道次部屬而有官者則逓陞焉如此天下之士皆將奮爭於學雖有官者亦翹翹然有興起之心無復専經之陋矣或曰今士子一經俱不能精如餘經何曰制科以待非常之士也以科目收天下士以制科收非常之士如此天下無餘才矣章介菴科目議古今以科目取士謂其可以得人也然科目豈足以得人哉其得人者偶然耳夫朝廷懸爵禄以待天下之士謂其賢且才也而槩取之以科目科目之所憑凖以進退取舍乎人者非他也乃在乎經義論䇿詔誥表判工與不工之間而已使是文也必賢且才者而後工焉則科目信足以得人矣然賢且才者未必皆能而不賢且才者未必皆不能也譬之欲求貞烈之女而限之以剪製縷結之巧彼非貞烈者獨無是巧乎求千里之馬而限之以青黄赤白之色彼非千里者獨無是色乎故謂科目不足以得士其得士者偶然耳以此故也然則如之何而後可其必博考前代選舉之法减進士科所舉人數於是科外增置諸科不限多寡不拘年嵗或藩臬彚選或州縣保薦既舉之必試之試必各就其所屬以博學𢎞詞經史淹貫精通書冩明習占候舉者禮部試之以法比疏通聽讞詳慎判斷明决舉者刑部試之以心計優長精通筭法轉輸有法平凖泉貨舉者户部試之以熟知險易通習蕃語兵鈐精妙智勇兼全舉者兵部試之以性行端潔堪為師表素抱朴忠敢於直諫舉者吏部必授以儒官署職使之待詔翰林及五鳯樓前等處以試之試必限以二三年謬舉者重其罪如漢陳湯家貧貸無節不為州里所稱及元帝有詔舉茂才張榖舉湯湯代遷父死不奔䘮司𨽻奏湯無循行榖選舉故不以實坐削户二百㑹薨因賜謚曰繆侯如此庻乎人不妄舉矣或曰以射擇士其果愈於今之科目乎觀王制所載樂正周禮所載大司徒教士法至矣備矣而其閭胥族師黨正鄉大夫所以勸飭而風勵之者委曲嚴宻無少間隙可以容其竒衺淫放之行葢其養之深防之豫臨事而始以射觀之也夫豈全恃此以為得人之筌蹄哉若如康齋白沙人品殊絶自當從天順年間人齎敕幣徴聘事例不可言試也賓興總論按古今取士之道大槩有三漢以前之取士也専尚行誼如成周之鄉舉里選兩漢之辟舉孝廉諸科是也魏晉以下之取士也尚兼門地如中正九品之法是也隋唐以來之取士也惟以文辭如明經進士制科諸塗是也君子尚論其世而其得失之故可考而知矣我國家始初取士與中間後來亦有三截之不同洪武初年専用薦舉任人進士之科暫一行而復罷至洪武十七年始行今科舉法與薦舉並行不悖至永樂宣徳皆然成化而後乃専重進士之科而薦舉不復行矣註云考之國初令有司每嵗薦舉賢良方正孝廉秀才及山林隠逸之士洪武三年詔開科舉六年詔科舉暫且停罷别令有司察舉賢才必以徳行為本文藝次之十七年頒行科舉成式凡三年一大比是年又令各布政司直𨽻府州縣舉秀才人材必由鄉舉里選知州知縣等官㑹同境内耆宿長者訪求徳行聲名著于州里之人先從鄰里保舉有司再騐言貌書判方許進呈水樂初詔山林𨼆逸懷才抱徳之士有司詢訪以禮敦請赴京量才推用宣徳中詔各處有文學才行出衆賢良方正之士令所在有司保舉赴京選用景泰中詔各處有司學才行堪受職任之仕隠于民間者許在官四品以上官在巡撫巡按方靣并各府州縣正官指陳實跡薦舉赴京考用所舉之人設犯贓罪并坐舉主粤稽載籍成周以鄉三物教萬民而賓興之一曰智仁聖義中和取其徳也二曰孝友睦婣任恤取其行也三曰禮樂射御書數取其才藝也文辭弗與也兩漢取士則郡國有孝廉之察有賢良方正之舉公卿得自召補掾史州郡則得自辟用僚屬亦無非取其行義取其才能猶未以文辭為重也是以當時士修于家而聘召自至士不孜孜於求用而人之好徳自不能舍之布列在位濟濟多賢雖至於東漢桓靈之衰而一時人才風俗之美雖成周不過是也尚賢興行其效豈小小也哉魏晉而降中正九品之法雖未免兼尚門地然猶以徳行為目而察舉辟召之良法亦未嘗不行乎其間非如隋唐以來専尚文辭世道一變逐一日之長而易終身之富貴甚至以一辭之工而遂終身之官爵有如吕東莱葉水心之所議者而古者尚賢興行之意無復存矣嗚呼古之人修其天爵而人爵從之今之人乃修其空文以邀人爵而惟恐其不至漢晉之士皆席珍待舉於上至徴書踵門聘幣交至而猶有不至者後世乃投牒自舉躁競汲汲而惟恐人之或我遺何古今相懸如是耶嘗觀昔人之議矣唐刺史趙臣曰漢朝辟舉用人天下之士修身於家而辟書交至以此士務名節風俗用修本朝選舉用隋氏之制嵗月既久其法益訛進士詞賦務求巧麗所習非所用所用非所習爭第急切險薄成俗文獻通考劉曉疏曰今銓曹以書判為得人禮部取士以文章為甲乙使天下之士皆舍徳行而趨文藝有朝登甲科而夕陷刑辟者雖日誦萬言何關理體文成七歩未足化人通鑑綱目朱子曰今之為法教之之詳取之之審反覆澄汰至於再三而其具不越乎無用之空言如之何其可也性理大全項安世曰科舉之法此今日不可如何之法也自太平興國以来舉天下之人才一限之於科目之内入是科者雖檮杌饕餮必官之出是科者雖周公孔子必棄之習之既久上不以為疑下不以為怨一出其外而有所取舍則上趦縮而不安下睥睨而不服共知其弊而甘心守之不敢復議矣不論伊傅周召如何使諸葛亮王猛處此亦當自出意度則作爐鞲以陶鎔天下之人物以收拾天下之才智决不矻矻受此纒縛也嗚呼科舉之法之弊觀數子之言思過半矣我太祖起自淮濠定鼎金陵平一天下致太平凡所任用輔佐之臣無非薦舉辟召如宋濂劉基章溢葉琛則胡太海所薦也王禕王大錫則文忠所薦也其餘彬彬輩出卓為為開國名臣者不可枚舉縷數也洪武中治定功成然後始行今科舉法每科所取不過數十人而止與薦辟之士同登並用下至正統景泰間猶如故也以故楊文貞以白衣薦舉歴編修而入内閣吳思菴以儒醫薦歴御史以至都憲况鐘以吏才薦舉仕至蘇州知府並為一時名臣他可知矣自後進士之科日重薦舉之途漸湮至天順初吳康齋之一薦遂為朝陽鳴鳯舉世驚訝而康齋亦不敢安於其位薦舉之事自後絶響自是舉天下之人不一限於科目誠有如昔人之所議謂入科者雖檮杌饕餮必官出是科者雖周孔亦棄共知其弊而甘心守之茲言猶切中於今日矣嗚呼薦辟任人其為效如彼故科舉取士其為弊如此然後世乃不由彼而由此共知其弊而甘心守之者夫豈果古今之異宜而古之道不可復行於後世也哉使古之道不可復行於後世我聖祖不由之以平一天下身致太平夫今欲興化致治而用人不法聖祖是猶却行以求及前人也易曰正其本萬事理今每嵗按黜貪酷中外不下數百員每次考察所至動至數千員法網嚴矣然而貪墨之風竟不聞少止而民坐日見凋瘵者凡以致理之未得其本也致治以賢才為本求才以興廉舉孝為本而空言何益經曰居家理故治可移於官傳曰求忠臣孝子之門此探本之論也李克曰窮視其所不為貧視其所不取此察廉之方也修之于家而壞之于天子之庭理無是也虞書曰静言庸違孔子曰有言者不必有徳又曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行聖人之知言之不可以取人也是故發為此言以警世也或曰人世不古審欲舉行而畧文則恐教天下相率以矯行立名干譽如蘇軾所謂上以孝取人則勇者割股怯者廬墓上以廉取人則敝車羸馬惡衣菲食凡可以中上意者無所不至况於司薦舉者又或不能無狥私之弊乎此近世所以畧徳行而寧取其文舍薦辟而從事科舉也子寧不是之思耶曰是固然矣不曰求士於三代之下惟恐其不好名耶好名而矯强為善不愈於不好名而安肆為惡耶語曰上好者下必有甚焉者矣如使天下之人皆慕孝之名而相率矯行以為孝皆慕廉之美而相率矯行以趨廉斯固庶幾於比屋可封之俗而可少乎昔人有言人皆作之作之不止乃成君子名者有國者之所以厲世磨鈍立其的而示之趨也而何嫌于矯行而何嫌于好名而又何疑于干譽也哉其間萬一有偽行以欺人家修而庭獻與夫狥私而謬舉者則自當彰國法以當之嚴舉連坐之法以罪之孰敢不畏豈可因噎而廢食因蹶而廢走逆詐億不信而廢先王制致治之良法哉大抵薦辟取士與科舉取士究極而論之雖皆不能以無弊然薦辟之取士也擇而後用科舉之取士也用而後擇擇而後用縱使失之亦不過十之一二而得人已八九觀文獻通考所載孝廉與夫我國初所用薦舉之士類多名臣可徴矣葢尚賢好徳人之秉彛果能執此之政堅如金石行此之令信而四時則天下皆争自濯磨砥礪舉人者必求無負知之名舉於人者必求無負於舉主知百僚師師誰肯自甘私偽以干戾于明時取譏誚於君子也哉科舉之法宋太宗有言曰非敢望拔十得五止得一二亦足為致治之具矣此亦已知其不足以盡得人用而後擇庶幾致望於什一耳觀於今日則又有不然者今制進士舉人授職之後隨有三年五年之考察有科道撫按之糾劾考察糾劾數過而士無不以不職被譴黜者其間完名全節以禮歸休者寥寥僅見矣况敢望致治之具於什一乎其始也進之輕其終也退之輕孰若進行義而舉之擇孝廉而舉用之慎選之于未用之先信任之于既用之後而使宗社生靈蒙福也楊龜山氏曰三代兩漢人物之盛風俗之美後世莫能及者取士以行不専以言故也謂宜别立一科稍倣三代兩漢取士觀人之法舉經明行修之士至於投牒乞試糊名謄録之類非古制者一切罷之待遇恩數居詞科之士庶使學者尊經術敦行義人人篤于自修則人才不盛風俗不美者未之有也愚謂敦舉行義有四效善莫大焉民興于行而風俗美一也風俗美而賢衆而政事治二也政事治而民生安三也民生安而國家安四也信能行此三十年不變其效將至世變風移太平有象矣註云孔子舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣司馬温公論東漢風化謂自公卿大夫至于郡縣之吏咸選用經明行脩之人是以教立于上俗成于下其忠厚清修之士豈惟取重於縉紳亦見慕于衆庶愚庸汙穢之人豈惟不容于朝廷亦見惡於鄉里自三代既亡風化之美未有若東漢之盛者也此二者以謂世變風移太平有象之效所患者與今日世情竽瑟時勢難行耳歐陽永叔云不以為狂人則以為病子不怒則笑之矣舉士之典莫詳於周閭胥書其敬敏任恤者族師書其孝弟睦婣有學者州長攷其徳行道藝而勸之三嵗大比鄉大夫致其徳行道藝而興賢者能者獻其書於王至諸侯貢士有一適再適三適之賞不適有黜爵削地之罰誠若是後世虛譽浮文之士焉得誣哉自漢以來舉士之目益盛而閭族州鄉之察則疎矣若九品中正義當可據而弊亦隨之豈古今人俗之不相及耶選舉總論人材為世重顧其致殊道則其用殊應古鄉三物造士後世専倚於文故古聘而徵之而今投牒以自附其治效不古若不宜然哉項安世有謂科舉之法今日不可誰何之法也人才一限於科目入是科者雖檮杌饕餮必官出是科者雖周公孔子必棄習之久上不以為疑下不以為怨一出此為取舍則上臲􅀈而不安下睥睨而不服共知其弊而甘心守之不敢復議豈惟伊傅周召雖諸葛王猛必别作爐鞴以計陶鎔不矻矻受此纒縛嗟乎不濟用而為政圖寧窮而變顧勢之所使亦天理之不終冺其每不悟於治世何歟朱晦菴曰今取士之法教之之詳取之之審反覆澄汰至於再三而其具不越乎無用之空言如之何其可也國初薦舉賢良方正孝廉秀才及山林隠逸洪武六年開科六年罷復於府司必本徳行次文藝十七年頒行科舉成式又令各處舉秀才人材必由鄉舉里選訪求徳行聲名之人永樂初詔山林隠逸懷才抱徳之士有司教請赴京宣徳中詔各處有文學才行出衆賢良方正之士有司保舉赴京景泰中詔各處有文學才行堪受職任之士在京四品以上官在外撫按方靣并府州縣正官指陳實迹薦舉赴京後漸以士與舉皆不能無疑是以宿欵難易今疑未及士而先疑於舉者天下之私勝也故莫先於正俗以養士今日之士正則他日之舉可免於疑若天下競相疑無時而已予烏乎不深疑之按國初科貢未行一才一藝咸得収録雖老人税户亦得上覲天顔視其可用即授以官受官者亦莫敢負其職負職者不有重罰今科貢之法精掄覆試而後用之顧往往負其職何哉豈非虚辭無本之弊乎圖書編卷一百七
