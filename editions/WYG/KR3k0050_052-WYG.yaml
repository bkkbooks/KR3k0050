body:
  text: 圖書編卷五十二明章潢撰古北方總叙杜氏通典曰北人以畜牧為業逐水草遷徙無城郭常居耕田之業然亦各有分地無文書以言語為約束兒能騎羊引弓射鳥䑕少長則射狐兎肉食士力能彎弓盡為甲騎其俗寛則隨畜田獵禽獸為生業急則人習戰功以侵伐其天性也其長兵則弓矢短兵則刀鋋利則進不利則退不羞遁走茍利所在不知禮義自君王以下咸食畜肉衣其皮革被氊裘壯者食肥美老者飲食其餘貴壯徤賤老弱父死妻其母兄弟死者皆取其妻妻之其俗有名不諱而無字畜之所多則馬牛羊其竒畜則槖駝驢驘駃騠騊駼驒騱唐虞則山戎夏則獯鬻周則獫狁懿王時德衰侵暴乃及涇陽人被其苦至曽孫宣王乃命將討伐至大原稱為中興四夷賔服後山戎越燕伐齊後又伐燕齊桓公救燕敗走之襄王之時引兵至雒邑東至衛境侵盗尤甚晉文公乃興師攘却居于西河圁洛之間號曰赤翟白翟而晉北有林胡樓煩之戎燕北有烏桓山戎各分散谿谷自有君長徃徃而聚者百有餘戎然不相統一及晉悼公納魏絳之謀和諸戎戎服而晉强晉侯賞魏子金石之樂至安王之時趙襄子踰句注而破之洎于戰國趙武靈王變俗易服習騎射北破林胡樓煩築長城自代傍隂山下至髙闕為塞而置雲中鴈門代郡其後燕將秦開襲破東胡却千餘里燕亦築長城自造陽至襄平置上谷漁陽及右北平遼西遼東郡以距之匈奴先為夏氏之後殷伐奔北夷至七國時國漸强盛以為鄰敵及秦始皇平天下北却匈奴築長城渡河以隂山為塞及秦亂劉項相持之際未遑邉備單于頭曼稍稍渡河南復其故地至冐頓匈奴益强盛盡服北夷南與諸夏為敵國圍漢帝於白登帝因婁敬説妻以宗女公主吕后文帝復通和親其後復大入蕭關燒回中宫於是置細柳棘門霸上三軍以備焉納晁錯説召人實塞下終景帝時不為大患武帝因王恢議誘單于入塞衛青霍去病累歳窮討盡徙漠北矣漢置酒泉等郡隔絶羌人遂通西域成帝時單于又來朝賜以后宫王嬙單于喜甚上書願保塞上谷以西至燉煌請罷邉備塞吏卒以休天下人民郎中侯應習邉事陳十不可王莽輔政易單于璽曰章改號恭奴單于復大㓂盗莽又改號降奴服于發兵屯戍議滿三十萬十道窮追分裂為十五單于嚴尤諌陳五難至後漢建武二十年其國饑疫死耗分為南北單于欵塞願永為藩蔽扞邊入居雲中後又移居美稷臧宫等上書請滅北匈奴光武務居息人不許和帝時北單于為竇憲破滅安帝時南單于屢被鮮卑侵掠靈獻之際轉又挫傷魏武帝遂分為五部置于西河離石諸郡劉元海則左賢王之孫而南匈奴種㣲矣初烏桓漢武帝時霍去病擊匈奴左地因徙於上谷漁陽之間為漢偵察匈奴動静始置䕶烏桓校尉監統之至後漢漸強盛光武納班彪䇿又置校尉獻帝以後寇掠轉盛竟為曹公所滅自桓靈之際鮮卑又盛盡有漢北匈奴故地至光和中其帥爭立國亂而檀石槐之種魏文帝為小種鮮卑軻比能破之比能明帝以後國亂離散諸部大人慕容拓㧞宇文更盛並稱大號跨有中州焉蠕蠕自拓㧞初徙雲中即有種落後大武神應蕃盛盡有匈奴故地其主社崙始號可汗猶言皇帝以後與後魏為敵國明帝熈平以後其國主爭立大亂東西魏之時突厥既強蠕蠕主奔西魏悉被誅滅自蠕蠕衰弱突厥漸盛至西魏大統中大破蠕蠕又盡有匈奴故地其主土門號可汗猶古之單于也北齊後周爭結婚姻傾府藏事之至大羅便沙鉢畧分為二國大羅便之後為西突厥焉隋文帝開皇中本國荒亂其主染干朝隋并徙種落於朔州及夏勝二州之間煬帝親幸其部其後始畢可汗圍帝於鴈門因隋亂華人奔湊又更强盛控弦百萬勢陵中夏唐武德中宼原州貞觀初頡利又至渭橋四年李靖滅其國靈州總管張寶相擒頡利獻焉大宗納温彦博之議置其餘種于河南朔方之地其後滋繁分為六州至阿史那元珍叛還故地開元初本落亂又請降復處河南俄又叛去其西突厥自開皇中國亂各自為一國大業末西突厥被北突厥所滅北突厥武太后嗣聖初其主黙啜宼定州趙州大殺掠而去自三代以還北方盛衰可畧而記其小國時有侵掠不為大患者不暇録焉唯契丹武太后萬歳通天初其帥李盡忠孫萬榮陷管州自稱可汗司農卿麻仁節等二十八將敗於西峽石黄麞谷仁節死焉賊又陷冀州刺史陸寳積死之夏官尚書平章事王孝傑率兵十八萬又敗没於東峽石又令御史大夫婁師德率兵二十萬拒之萬榮為家奴所殺其黨遂潰北邊總論北狄居無城郭隨逐水草勢利則南侵勢失則北遁隂山足以自衛饑則捕獸飲乳寒則寢皮服裘奔走射獵以殺為務未可以詭道欺之未可以兵戎服之漢兵不可與戰其畧有三漢卒且耕且戰故疲而怯彼但牧獵故逸而勇以疲敵佚以怯敵勇不相闘也此其不可戰者一也漢長於歩日馳百里彼長于騎日乃倍之漢逐彼則齎糧負甲而隨之彼逐漢則驅疾騎而運之運負之勢已殊走逐之形不等此其不可戰者二也漢戰多歩彼戰多騎將爭奪地形之勢則騎疾於歩遲疾勢懸此其不可戰者三也不得已則莫若守邉守邉之道㨂良而任之訓鋭士以禦之廣營田而實之設烽堠而待之候其虛而乗之因其衰而取之則資不費而彼自除矣人不疲而彼自服矣古北邊考畧匈奴先夏后氏之裔曰敦維殷時奔北方至周末七國時與燕趙秦國鄰歳為邉患後趙燕秦屢破逐之而限以長城漢初最强盛武帝大興師逐北漠南無王庭宣帝後呼韓邪欵塞稱臣後漢分南北二庭曹魏分為五部至晉時劉元海及拓㧞氏據神器竊大號迭主中夏劉淵匈奴冐頓之後因晉惠帝失馭寇陷晉都僭稱帝國號漢曜改為趙三世而亡石勒羯人其先匈奴别部羌渠之胄滅曜僭即趙王位五傳而亡沮渠蒙遜臨松盧水人也據凉稱王凢二世為魏所滅赫連勃勃乃匈奴劉元海之族也滅秦稱帝國號大夏三傳為魏所滅烏桓本東人也據烏桓山因以為號自匈奴衰而烏桓盛後曹操大破蹋頓於桞城徙其部落於中國鮮卑亦烏桓之支也别依鮮卑山因號焉後至檀石槐盡據匈奴故地二傳因争國衆遂離散軻比能漢末頗强盛其後諸子争立衆離散乞伏國仁隴西鮮卑也晉時頗强盛凡四世而滅秃髪烏孤河西鮮卑也與後魏同祖盡有凉州河湟之地三世而亡宇文莫槐出於遼東塞外魏文帝時部衆強盛自稱單于後周宇文氏源出於此徒河叚日陸眷出於遼西厥後務勿塵有遼西之地慕容氏亦烏桓之後别部鮮卑也至渉歸長子廆自稱鮮卑大單于傳至皝自稱燕王雋暐即其子孫拓㧞氏亦烏桓之後别部鮮卑本名索頭人其先李陵苖裔晉時猗盧最强盛至什翼犍始建年號分置百官渉珪即後魏道武皇帝至文帝改姓元遷都洛陽衣冠文物悉比中國蠕蠕姓郁久閭六代孫杜崙地廣勢強自號丘豆伐可汗髙車髙車古赤狄之種稽胡突厥突厥之先平凉雜部也盖匈奴别種姓阿史那氏後魏末酋帥士門部落稍盛擊破蠕蠕遂自號伊利可汗周齊争結婚姻唐初頡利最強盛後頡利為太宗所擒突厥中衰至武后時黙啜復強盛天寳中滅其地盡入回紇然其族始分有國于西者曰西突厥西突厥國居烏孫故地西域諸國皆歸附之鐵勒匈奴苖裔種類最多自西海之東依據山谷徃徃不絶薛延佗鐵勒别部僕胥亦鐵勒别部同羅鐵勒别部在薛延佗北都波鐵勒别種去回紇十三日行分為三部自相統攝㧞野古亦鐵勒别部在僕骨東境多濫葛在薛延佗東斛薛亦鐵勒别部在多濫葛北境阿㧞亦鐵勒别部在多濫葛西北契苾契苾羽在焉耆西北鷹婆川多覧葛之南鞠國在㧞野古東北五百里俞􅀈在鞠國東十五日行大漠在鞠國北白霫在鮮卑故地與同羅僕骨接庫莫奚其先東部鮮卑宇文之别種俗甚不㓗善射獵好寇抄遼太祖平之盡有奚霫之地契丹契丹本烏桓種其先為匈奴所破保鮮卑山與庫莫奚異種而同類並為慕容氏所破俱竄於松漠之間唐末安巴堅始强盛侵滅諸國稱雄北方迨石敬瑭以幽州所屬十六州賂德光晋稱兒皇帝矣故宋有岐溝之敗澶淵之盟至爭獻納二字而女真寖強遼遂為金所滅自安巴堅至天祚凢九代室韋有五部並在靺鞨之北路出桞城諸部不相統一所謂南室韋北室韋鉢室韋深末怛室韋大室韋並無君長盖契丹之類也唐時所聞有九部並在柳城郡之東近者三千五百里逺者六千二百里地豆于圍在室韋西千餘里烏洛侯亦曰烏羅渾國在地豆于之北東與靺鞨南與契丹北與烏丸為鄰驅度寐在室韋之北其人甚長白霫匈奴别種與靺鞨為鄰理黄水北亦鮮卑故地㧞悉彌在北庭北海南結骨東南去燉煌九千餘里唐時盡歸回紇流鬼在北海之北北至夜义國餘三面皆扺大海南去莫設靺鞨船行十五日回紇回紇其先匈奴也其部落凡有十五種姓藥羅葛氏居薛延佗北唐貞觀時突厥衰唯回紇與薛延佗雄強後并薛延佗九姓盡得古匈奴地改號回鶻於唐時為最盛沙陀沙陀西突厥别部處月種也唐宣宗時賜姓李至克用子存朂滅梁為後唐莊宗骨利幹骨利幹處渤海北其地北距海去京師最逺又北渡海則晝長夜短日入烹羊脾熟東方已明盖近日入處也黠戞斯黠戞斯古堅昆國也地當伊吾之西焉耆之北白山之旁或曰居勿曰結骨其種雜丁零乃匈奴西鄙也匈奴封漢降將李陵為右賢王衛律為丁零王後郅支單于破堅昆于時東距單于庭七千里南車師五千里郅支留都之故後世得其地者訛為結骨稍號紇骨亦曰紇扢斯云其人黒瞳者必曰陵苖裔也僕骨僕骨亦曰僕固在多覧葛之東地最北葛羅祿葛羅禄本突厥在北庭西北金山之西跨僕固振水包多恒嶺與車鼻部接駮馬駮馬其地近北海去京萬四千里經突厥大部落五所乃至焉鬼國在駁國西六十日行其國人夜遊晝飲鹽漠念咄六闕俟斤部落又北八日行至可史擔部落蒙古蒙古居烏桓之北與畏羅奈曼九姓回鶻故城和林接壤世奉貢于遼金而總𨽻于達坦逮特黙津克諸蕃部滅金為元太祖呼必賚滅宋混一區夏為元世祖傳至順帝而國亡古北邊總論蘇氏曰北方之人其性超忽無常便於獵射而習於馳騁生於斥鹵之地長於霜雪之野飲水食肉風雨饑渴之所不能困上下山坡筋力百倍輕死而樂戰故常以勇勝中國至其擁䕶親戚休養生息畜牛羊長子孫安居逸樂而欲保首領者盖無以異於華人也而中國之士常憚其勇畏避而不敢犯氊裘之民亦以此恐喝中國而奪之利此當今之所謂大患也昔者漢武之世匈奴絶和親攻當路塞天下震恐其後二十年之間漢兵深入不憚死亾捐命絶漠之北以决勝負而匈奴孕重墮壊人畜疲敝不敢言戰何者勇士壯馬非中國之所無有而窮追逺逐雖匈奴之衆亦終有所不能安也故夫鄰國之盛非敵國之所深憂也要在休兵養士而集其勇氣使之不懾而已今天下之勢中國之民優游緩帶不識兵革之勞驕奢怠惰勇氣消耗而金繒之賂又以百萬為計轉輸天下甘言厚禮以滿其不足之意使天下之士耳熟所聞目習所見以為生民之命寄于其手故俯首柔伏莫敢抗拒凡中國勇健豪壯之氣索然無復存者矣夫戰勝之民勇氣百倍敗兵之卒没世不復盖所以戰者氣也所以不戰者氣之畜也戰而後守者氣之餘也古之不戰者養其氣而不傷今之士不戰而氣已盡矣此天下所大憂也昔者六國之際秦人出兵於山東小戰則殺大戰則割地兵之所至天下震慄然諸侯猶帥其罷敗之兵合縱以擊秦砥礪戰士激發其氣長平之敗趙卒死者四十萬人亷頗収合餘燼北摧栗腹西抗秦兵振刷磨淬不自屈服故其民觀其上之所為日進而不挫皆自奮怒以爭死敵其後秦人圍邯鄲梁王使將軍辛垣衍如趙欲遂帝秦而魯仲連慷慨發憤深以為不可盖天下之士所為奮不顧身以抗虎狼之秦者為非其君也而使諸侯從而帝之天下尚誰能出身以拒其君哉故魯仲連非徒惜夫帝秦之虚名而實惜天下之勢有所不可也北邊總叙北莫強於遼金元莫弱於我朝國初元裔半留中國遯還沙漠者無算永樂中四塞出逐益逺徙死者降者又半以故我塞上戍兵不及四十萬彼東得開平興和西據朔方東勝皆水草善地自永樂迄今未嘗一遭敗衂生聚既蕃侵噬漸近額森和碩之後益輕中國恃其長技徃徃深入風雨飄忽動輙數萬我軍禦之不過依險結營茍以防禦衝突僅不亂行即為全勝彼志日驕我氣日奪其零賊出没雖稍有俘斬亦已甚難盖衆寡之勢殊強弱之形異也幸其所欲易厭無有他志計日數程不能持久每一大舉曬肉晾馬頗有勞費若得失不讐則懊悔無已是以邉境得苟免焉近年濟農諳達屢入内郡飽掠而歸聚兵十萬莫敢發一矢而輙張㨗冐功上下相蔽甚至殺歸正人為首功寃酷已極今其國控弦之士餘二十萬益以中國逋迯竊知内地虚實一旦改慮外變内憂禍不細也圖書編卷五十二
