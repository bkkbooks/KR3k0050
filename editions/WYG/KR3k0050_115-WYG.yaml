body:
  text: 圖書編巻一百十五明章潢撰樂歌總叙樂之道主乎聲而聲必有取於天􅄜以其一出於自然而非强作也然則人之聲非天􅄜乎樂之聲有五不外乎宫商角徴羽五聲克諧斯謂之樂人之聲一出乎喉舌齒㗁唇而聲為律者即夫人自然之樂也故本之心宣之聲則為詩曰風雅曰頌皆可以被管弦協金石而謂之為樂章孔子自衛反魯然後樂正正此也雅頌各得其所而闗睢之亂洋洋盈耳於師摰之始曽謂樂而不以聲詩為之主乎嘗稽歴代自虞廷命夔典樂曰詩言志歌永言聲依永律和聲又曰戞擊鳴球搏拊琴瑟以詠此九德之歌所自始也殷周各有雅頌以祀郊廟周禮鄉飲酒禮及燕禮歌鹿鳴四牡皇皇者華等詩大射歌鹿鳴三終漢叔孫通定樂有降神納爼登歌薦祼等曲武帝定郊祀之歌十九章魏杜夔舊傳笙樂四曲皆古聲調晉武循魏制但改樂章梁武素善鍾律遂改雅樂歌十二以則天數唐初命祖孝孫制十二和之樂開元又制三和宋祖命竇儼改周樂十二順為十二安宋真仁髙各親撰樂章我朝樂亦各載之典籍是代歴聲歌乃樂之所必用者也樂以詩為本詩以聲為用凡金石絲竹匏土革木節奏鏗鏘克諧律吕不過用以依永和聲焉耳世之呶呶於律管短長分寸之辨而於聲詩廢之不講欲求雅樂之復古也有是理哉噫雅頌即古樂也人聲即天􅄜也真知樂以人聲為主而五音六律以和之則雅樂之復也亦易易耳歌法說天下之音聲變化何限乃其要則九者足以該之矣今繪為圗於右為太極以象聲氣之元又以九而三三之釐為三等自黄鍾至姑洗為一等而以下如隊統之自南吕至清黄鍾為一等而以上如抗統之如仲如林而以已漸二字統之至於聲之所發其墨理之下垂者為最低即黄鍾之聲也其斜而出者為次低聲合大簇其自傍而出者為漸達聲合仲吕其正而出者為己達聲合林鍾其平出而畧向上者為近抗聲合南吕其直指而上者即聲之最髙者也合平清黄鍾夫所謂合者意有在也須求協律雅簫相和以正是否如歌迎神章首句大字而以簫吹四應歌哉字吹工字應歌孔字吹尺字應歌聖字吹上字應以吾之聲與簫純然如出一口是之為律和聲也稍有不似則非歌矣歌雖小道不習則不能習則其法要亦不易必先明乎何者為聲中無字何者為字中有聲何者謂之周轉何者謂之宛轉何者謂之折轉其曰嵯峨而不揺漾者果何狀其曰纍纍如貫珠者果何狀數者之法非師指授其孰能之今兹擬其形容悉載前圖善學者當細心尋繹循循探討以精為能以驟為戒初只以首句頭一字偏旁所畫墨理卑髙圎直之形以律訂吾牙唇齒舌之分摩研咀嚼一吞一吐按律分明不協不已既得一字即得一句得一句即用以反三隅其機在我而後為倨為句為止為曲為槁為圎混混溶溶萬法入吾宗歌安足道哉其不善學者求之外而不求之内以遂非為聰以臘等為能羣而和之則似獨而歌之則不似若是者日習焉而日離矣其何比合之有故特摉遺響鈎匿跡而為之歌法以補未備學者其諦觀之無忽歌法述虞書言八音克諧而先之以詩歌樂記言比音干戚而始之以聲變則雅樂之用豈不以歌為主哉故歌之法亦未易言矣爰述三家之論為歌者凖焉孫氏如臯曰律吕之妙和聲最難故歌者上如抗下如隊曲如折枝止如槁木倨中矩句中鈎纍纍乎端如貫珠故歌之為言也長言之也恱之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也按抗舉也歌聲髙者如手舉物雖髙不離於手不至於大髙聲之下者如物之隊隨其淺深而去且無留滯也曲轉折也如折枝然必須轉得軟欵分明也止聲之定也欲其如槁木嵯峨不揺漾也倨歌之折轉者中短欲其方也句歌聲周轉者中鈎欲其圎也此言歌詩有髙有下有作有止有宛轉而曲者有折轉亷隅而中短者有折轉圎滑而中規者其永言中抑揚節奏如此且纍纍然如貫珠而不斷絶以依其永也歌聲之要已上數言形容殆盡毫無餘藴後學者不玩究其㫖如所謂宛轉折轉之義懵不能别而徒以長言之無所含蓄即是唸曲而已烏足以語永言之妙哉沈括筆談曰古之善歌者有語謂當使聲中無字字中有聲凡曲止是一聲髙下清濁如縈縷爾字則有喉唇齒舌等音使字字舉皆輕圓融入聲中令字轉换處無磊磈此謂聲中無字古人謂之如貫珠人謂之善過度是也如宫聲字而曲之腔合用商聲則能轉宫為商歌之此字中有聲也善歌者謂之内裏聲即俗所謂吞吐恬靜是也不善歌者聲無抑揚謂之唸曲聲無合韞謂之呌曲學者所當深儆也朱子曰古樂有唱有和有唱歎者發歌句也和者繼其聲也詩詞之外更有纍字散聲以發歎其趣是之謂和聲所謂曲也古樂府皆有聲有詞連屬書之如曰賀賀賀何何何之類皆和聲也今管絃中纒聲亦其遺法也樂歌考虞書帝曰夔命汝典樂教胄子直而温寛而栗剛而無虐簡而無傲詩言志歌永言聲依永律和八音克諧無相奪倫神人以和禹曰於帝念哉徳惟善政政在養民水火金木土榖惟修正徳利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壊帝曰予欲聞六律五聲八音在治忽以出納五言汝聴工以納言時而颺之帝庸作歌曰勅天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉皋陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉舜作五弦之琴以歌南風其詩曰南風之時兮可以阜吾民之財兮南風之薰兮可以解吾民之愠兮太康失道畋㳺十旬弗反其弟五人待於洛汭述大禹之戒作五子之歌右是為虞夏之時乃三百五篇以前者盖嘗以為詩之體有三曰風曰雅曰頌風雅頌雖有一國天下之不同然大概風者閭閻之間民庶之所吟咏所謂陳詩以觀民風是也雅者朝廷之上君臣之所咏歎所謂王政所由廢興是也其詩則施之於宴享頌者美盛徳告成功者也其詩則施之於祭祀然未有三百五篇之前如康衢如擊壤則風之祖也如九歌如喜起如南風則雅之祖也如五子之歌則又變雅之祖若頌者獨無所祖書曰八音克諧神人以和又曰搏拊琴瑟以詠祖考來格則祭祀亦必有詩歌而無可考者意者太古之時詩之體未備和氣所感和聲所播形為詩歌被之金石管弦施之燕享祭祀均此詩也未嘗不可通用初不必歌功頌徳極揄揚贊歎之盛而後謂之頌也至周之時風雅頌之别始載然周室既東而詩樂亦頗殘缺失次必孔子之聖周流四方參互考訂然後能知其說所謂吾自衛反魯然後樂正雅頌各得其所是也然肆夏䌓遏渠本頌也而叔孫穆子之時未經夫子釐正故簡編失次遂悞以頌為雅耶周禮大司樂掌成均之法以治建國之學政而合國之子弟焉以樂語教國子興道諷誦言語大師教六詩曰風曰賦曰比曰興曰雅曰頌以六徳為之本以六律為之音瞽矇掌九徳六詩之歌以役大師前漢禮樂志周詩既備而其器用張陳周官典焉典者自卿大夫師瞽以下皆選有道徳之人朝夕習業以教國子者卿大夫之子弟也皆學九徳誦六詩習六舞五聲八音之和然自雅頌之興而所承衰亂之音猶在是謂淫過凶嫚之聲為之設禁焉陳氏樂書曰周官大司樂言奏九徳之歌九磬之舞瞽矇掌九徳之歌以役大師大磬舜樂也謂之九磬之舞則大夏禹樂也謂之九徳之歌豈非九夏之樂乎樂師天子以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節及徹帥學士而歌徹儀禮鄉飲酒工歌鹿鳴四牡皇皇者華笙南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀乃合樂周南闗睢葛覃卷耳召南鵲巢采蘋采蘩工告於樂正曰正備樂燕禮工歌鹿鳴四牡皇皇者華笙奏南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀遂歌鄉樂周南闗睢葛覃卷耳召南鵲巢采蘩采蘋大師告于樂正曰正歌備陳氏樂書曰工歌則琴瑟以詠而已笙不與焉笙入則衆笙而已間歌不與焉間歌則歌吹間則未至於合樂也合樂則工歌笙入間歌並作而樂於是備矣大用之天下小用之一國其於移風易俗無自不可况用之鄉人乎風天下而正乎夫婦實本於此然則觀之者豈不知王道之易易也哉鄉飲酒義曰工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂備遂出一人揚觶乃立司正焉知其能和樂而不流也由是觀之工歌鹿鳴四牡皇華所以寓君臣之教則升歌三終也笙入堂下磬南北面立樂南陔白華華黍所以寓父子之教則笙入三終也間歌魚麗笙由􅆳歌南有嘉魚笙崇丘歌南山有臺笙由儀所以寓上下之教間歌三終也合樂周南闗睢葛覃巻耳召南鵲巢采蘩采蘋所以寓夫婦之教則合樂三終也三終雖主於詩篇亦樂成於三以反為文故也大射禮乃歌鹿鳴三終乃管新宫三終奏貍首以射射義曰天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節詩云曾孫侯氏四正具舉大夫君子凡以庶士大小莫處御於君所以燕以射則燕則譽春秋左氏傳曰文公四年衛寗武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功于王於是乎賜之彤弓一彤矢百玈弓一玈矢百以覺報宴今倍臣來繼舊好君辱貺之其敢干大禮以自取戾襄公四年穆叔如晉報聘晉侯享之奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細何也對曰三夏天子之所以享元俟也使臣不敢與聞文王两君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜襄公二十九年呉公子札來聘請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌􅆁鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之徳如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以徳輔此則眀主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令徳之后誰能若是為之歌陳曰國無主其能久乎自檜以下無譏焉為之歌小雅曰美哉思而不貳怨而不言其周徳之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之徳乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不偪逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不廢取而不貪處而不底行而不流五聲和八風平節有度守有序盛徳之所同也按太史公詩三百五篇孔子皆絃歌之以求合韶武雅頌之音今觀季子請觀周樂而魯人為之歌諸詩二南以下十五國風二雅三頌皆係焉則此三百五篇者皆被之絃歌掌之司樂工師以時肄習之所謂雅樂也盖非始於夫子而晦庵辨桑中詩序其說曰雅者二雅是也鄭者緇衣以下三十一篇是也衛者􅆁鄘三十九篇是也桑間衛之一篇桑中之詩是也二南雅頌祭祀朝享之所用也鄭衛桑濮里巷狹邪之所歌也今不察此乃欲為之諱其鄭衛桑濮之實而文之以雅樂之名又欲從而奏之宗廟之中朝廷之上則未知其將以薦之何等之鬼神用之何等之賓客乎盖鄭衛國風如桑中溱洧諸篇所言皆淫奔謔浪之辭序以為刺奔而晦庵盡斥序説以為淫奔之人所自賦之詩故疑其非雅樂也愚以為未然盖季子所觀樂者周樂也使鄭衛諸詩為里巷狹邪所用則周樂安得有之而魯之樂工亦安能歌異國淫邪之詩乎然嘗因是考之詩之被於絃歌也不過以為燕享賓客祭祀鬼神之用但求之三百五篇惟周頌三十一篇商頌五篇為祭祀之詩小雅鹿鳴以下彤弓以上諸篇為燕享之詩此皆其經文明白而復有序說可證者也至於周南以下國風小雅自六月而下大雅自文王以下至魯頌之四篇則序者以為美刺之詞盖但能言其文義之所主而不能明其聲樂之所用矣左傳所載列國諸侯大夫聘享賦詩大率多斷章取義以寓已意如秦穆公將納晉文公宴之而賦六月季武子譽韓宣子嘉樹宴之而賦甘棠盖借二詩以明贊誦之意又如荀林父送先蔑而為賦板之卒章叔孫豹食慶封而為賦相鼠盖借二詩以明箴規之意它若是者不一而足皆是因事寓意非曰此宴必合賦此詩也獨儀禮所載鄉飲酒禮燕禮射禮工歌間歌合樂之節及穆叔所言天子享元侯與两君相見之禮則樂有詩然考其歌詩合樂之意盖有不可曉者夫闗睢鵲巢閨門之事后妃夫人之詩也何預於鄉宴而鄉飲酒燕禮歌之采蘋采蘩夫人大夫妻能主祭之詩也何預於射而射禮用之肆夏繁遏渠宗廟配天之詩也何預於宴飲而天子享元侯用之文王大明繇文王興周之詩也何預於交鄰而兩君相見歌之以是觀之其歌詩之用與詩人作詩之本意盖有判然而不相合者不知其何說晉荀偃曰歌詩必類而今如儀禮及穆叔所言則類者少不類者多若必就其文詞之相類則鄉飲酒所歌必伐木行葦之屬射禮所歌騶虞而下必車攻吉日之屬天子享元侯所歌必蓼蕭湛露彤弓之屬方為合宜子貢見師乙而問焉曰賜聞聲歌各有宜也如賜者宜何歌也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉寛而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜亷而謙者宜歌風肆直而慈愛者宜歌商温良而能斷者宜歌齊夫歌者直已而陳徳也動已而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷明乎齊之音者見利而讓臨事而屢斷勇也見利而讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如槁木倨中矩句中鉤纍纍乎端如貫珠故歌之為言也長言之也說之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也夾漈鄭氏曰古之達禮三一曰燕二曰享三曰祀所謂吉凶軍賓嘉皆主此三者以成禮古之達樂三一曰風二曰雅三曰頌所謂金石絲竹匏土革木皆主此三者以成樂禮樂相須以為用禮非樂不行樂非禮不舉自后夔以來樂以詩為本詩以聲為用八音六律為之羽翼耳仲尼誦詩為燕享祭祀之時用以歌而非用以説義也古之詩今之詞曲也若不能歌之但能誦其文而説其義可乎不幸腐儒之説起齊魯韓毛四家各為序訓而以說相髙漢朝又立之學官以義理相受遂使聲歌之音湮没無聞然當漢之初去三代未逺雖經生學者不識詩而太樂氏以聲歌肄業往往仲尼三百篇瞽史之徒例能歌也奈義理之説日勝則聲歌之學日微東漢之末禮樂肅然雖東觀石渠議論紛紜無補於事曺孟徳平劉表而得漢雅樂即杜夔夔老久矣不肄習所得於三百篇者惟鹿鳴騶虞伐檀文王四篇而已餘聲不傳太和末又失其三左延年所得惟鹿鳴一篇每正旦大㑹太尉奉璧羣臣行禮東廂雅樂常作者是也古者歌鹿鳴必歌四牡皇皇者華三詩同節故曰工歌鹿鳴之三而用南陔白華黍三笙以贊之然後首尾相承節奏有屬今得一詩而如此用可乎應知古詩之聲為可貴也至晉室鹿鳴一篇又無傳矣自鹿鳴一篇絶後世不復聞詩矣詩者人心之樂也不以世之汚隆而存亡豈三代之時人有是心心有是樂三代之后人無是心心無是樂乎繼三代而作者樂府也樂府之作宛同風雅但其聲散佚無所紀系所以不得嗣續風雅而為流通也按三百篇在成周之時亦無所紀系有季札之賢而不别國風所在仲尼之聖而不知雅頌之分仲尼為此患故自衛返也問於太師氏然後取其正焉列十五國風以明風土之音不同分所以二雅以明朝廷之音有間陳周魯商三頌之音所以侑祭也定南陔白華華黍崇丘由庚由儀六笙之音所以叶歌也得詩而得聲者三百篇則系於風雅頌得詩而不得聲者則置之謂之逸詩如河水祈招之類無所系也今樂府之行於世者章句雖存聲樂無用崔豹之徒以義説名呉兢之徒以事解目盖聲失則義起其與齊魯韓毛言詩無以異也樂府之道或幾乎息矣按夾漈以為詩本歌曲也自齊魯韓毛各有序訓以説相髙義理之説既勝而聲歌之學日微矣愚嘗因其説而䆒論之易本卜筮之書也后之儒者知誦戴記而不能習儀禮豈義理為二物哉盖詩者有義理之歌曲也後世狹邪之樂府則無義理之歌曲也易者有義理之卜筮也後世俗師之占書則無義理之卜筮也禮者有義理之品節也秦漢而後之典章則無義理之品節也郊特牲曰禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也荀子曰不知義謹守其數不敢損益父子相傳以待王公是官人百吏所以取秩禄也盖春秋戰國之時先王之禮制不至淪喪故巫史卜祝小夫賤𨽻皆能知其數而其義則非聖賢不能推明之及其流傳既乆所謂義者布在方冊格言大訓炳如日星千載一日也而其數則湮没無聞久矣姑以漢事言之若詩若禮若易諸儒為之訓詁轉相授受所謂義也然制氏能言鏗鏘鼓舞之節徐生善為容京房費直善占所謂數也今訓詁則家傳人誦而制氏之鏗鏘徐生之容京費之占無有能知之者矣盖其始也則數可陳而義難知及其久也則義之難明者簡編可以紀述論説可以傳授而所謂數者一日而不肄習則亡之矣數既亡則義孤行於是疑儒者之道有體而無用而以為義理之説太勝夫義理之勝豈足以害事哉夾漈鄭氏曰三代既没漢魏嗣興禮樂之來陵夷有漸始則風雅不分次則雅頌無别次則頌亡次則禮亡按上之回聖人出君子之作也雅也艾如張雉子班野人之作也風也合而為鼓吹曲燕歌行其音本幽薊則列國之風也煌煌京洛行其音本京華則都人之雅也合而為相和歌風者鄉人之用雅者朝廷之用合而用之是為風雅不分然享大禮也燕私禮也享則上兼用下樂燕則下得用上樂是則風雅之音雖異燕享之用則通及明帝起四品一曰大予樂郊廟上陵用之二曰雅頌樂辟雍享射用之三曰黄門鼓吹樂天子宴羣臣用之四曰短簫鐃歌樂軍中用之古者雅用於人頌用於神武帝之立樂府采詩雖不辨風雅至於郊祀房中之樂未嘗用於人事以明神人不可以同事也今辟雍享射雅頌無分應用頌者而改用大予應用雅者而改用黄門不知黄門大予於古為何樂乎風雅通歌猶可以通也雅頌通歌不可以通也曺魏凖鹿鳴作於赫篇以祀武帝凖騶虞作巍巍篇以祀文帝凖文王作洋洋篇以祀明帝且清廟祀文王執競祀武王莫非頌聲今魏家三廟純用風雅此頌之所以亡也頌亡則樂亡矣是時樂雖亡禮猶存宗廟之禮不用之天明有尊親也鬼神之禮不用於人知有幽明也梁武帝作十二雅郊廟明堂三朝之禮展轉用之天地之事宗廟之事君臣之事同其事也樂之失也自漢武始其亡也自魏始禮之失也自漢明始其亡也自梁始禮樂淪亡之所由不可不知也國朝樂歌洪武四年六月吏部尚書詹同禮部尚書陶凱製宴享九奏樂章成其曲一曰本太初二曰仰大明三曰民初生四曰品物亨五曰御六龍六曰泰階平七曰君徳成八曰聖道成九曰樂泰寜先是太祖皇帝厭前代樂章率用䛕詞以為容悦甚者鄙陋不稱乃命凱等更制前詞至是上又命協音律者歌之謂侍臣曰禮以道敬樂以宣和不敬不和何以為治元時古樂俱廢惟淫詞豔曲更唱迭和又使粗厲之聲與正音相雜甚甚以古先帝王祀典神祗飾為舞隊諧戲殿庭殊非所以道中和崇治體也今所製樂章頗協音律有和平廣大之意自今一切流俗諠譊淫䙝之樂悉屏去之洪武十七年六月太祖皇帝諭禮部臣曰近命製大成樂器將以頒天下學校俾諸生習之以祀孔子朕思古人之樂所以防民欲後世之樂所以縱民欲其故何也古樂之詩章和而正後世之歌詞淫以奢古之律吕協天地自然之氣後世之律吕出人為智巧之私天時與地氣不審人聲與樂音不比故雖以古之詩章用古之器數亦乖戾而不合陵犯而不倫矣手擊之而不得於心口歌之而非出於志人與樂判然為二而欲以動天地感鬼神豈不難哉然其流已久救之甚難卿等宜䆒心於此庶幾可以復古人之意恭誦太祖聖諭真有以識樂律之心中間謂人與樂二又有以識後世作樂之弊然國朝之樂終不能使人與樂一復古人之意得非無古人胄子成均之教乎樂詩總論昔者先王之樂非徒戛金石鳴祝敔而已也彼有所由始也天之以息相吹也不能不發而為􅄜􅄜也者天地自然之音也人心之感物而動也不能不形之言而為詩詩也者各言其心之所之也是故天子列侯公卿大夫士庶人之異其位治世亂國之異其時明君碩輔忠臣孝子騷人羈旅之異其感而彼皆各以情之所至而抑揚諷詠於其間固有不得而相假借掩襲焉者故曰詩也者人心自然之音也音之所出則必有長短髙下之節非比之器數則不得相屬之以叶其至也於是乎被之鐘鼓管磬羽籥干戚之間綴其聲以成文焉而樂所由作矣故曰詩言志律和聲此言樂之非自外來而由人聲以為之也是故先王之世樂官以詩為職方其坐明堂而端委以臨天下也必命樂官以詩察政治攷人材之得失故曰工以納言時而颺之又曰聞六律五聲八音在治忽以出納五言其出而省方廵狩以朝諸侯也亦必命太師陳詩以觀民風民風者田夫野婦之所自歌咏閭里而為之言者也而天子猶命之樂官以播之金石絲竹之間由此觀之可見當世自王公大人以至中中兎置之士無一人之不能言而為之詩而其詩也由朝廷宗廟以至國都里巷之間無一言之不奏於樂官而為之樂是以其音之流行於天下而曲暢乎君臣父子夫婦朋友之間以及祭祀燕享軍旅㑹同入學獻馘投壺習射之際無非本乎人聲相為感癶中挑外引嗚咽噴吻以和鳴其至者爾何莫非詩何莫非樂也哉故世儒雖嘗恨五經無樂書殊不知樂有詩而無書詩存則樂與俱存詩亡則樂與俱亡詩樂固相闗也若瞽矇太師鍾師籥章之屬樂之庶司也而其所職則或以諷誦詩或以歌射節或以奏九夏或以鼓太和邠風以逆寒暑皆詩也徹樂燕樂祭樂射樂樂之異用也而其所歌則或雍之什或凱之什或昭夏肆夏之什或采蘋采蘩之什皆詩也季札觀周樂而為歌二南國風雅頌説者謂當時能辨存亡明小大徴得失此則季札之因詩而得乎樂也孔子自衛反魯以正樂而雅頌各得其所説者謂當時三百篇之詩相與弟子共習而絃歌之此則孔子之刪詩以定乎樂也然則其他所謂知韶濩之未亡與武商之已壊固皆幸其尚存之詩以知其未亡之樂焉耳然則先王之樂固未嘗不由聲諸詩者以為之本而能達先王之樂者又曷嘗不待於上聖大賢之獨智而能之乎奈何周自黍離以降王道不宣采詩之職不復設而樂官抱其樂器踰河蹈海遂祕而不見及秦燔詩書坑學士其道大壊幸而三百篇之遺不獨以竹帛固有出於學士大夫與其閭里所日誦者往往不絶漢興立博士申公轅固之徒相與聚而明之故古者雅頌之作雖已微響而世之所謂文學之能言與其遷臣怨女幽人處士或稍稍竊習其道各以其心之所至而舒冩憂愁羈憤忠孝隠約之情猶當列之秦齊􅆁鄘鄭衛之次似可與國風相表裏其詩謂未之盡亡亦可也而古者之樂卒不可考見當魏時雅樂即杜夔稍能肄業鹿鳴騶虞文王伐檀四篇大和以后尋亦就廢其在漢唐諸臣若李延年鮑業牛𢎞吕才之流亦間嘗欲倣古者聲詩之意播之管絃然古者之樂制既絶其所遺者不過變宫變徴之調大畧世之教坊所傳者近之而已而其詩所歌又並當時淫豔之曲驕侈之辭則又何從而復古昔先王之盛乎愚故嘗為之説曰三代而上天下之詩與樂出於一故其至者可以正得失動天地感鬼神三代而下天下之詩與樂出於二其微也俗流失世敗壊而天下之變猶江河之日趣而不可復返也已仰惟我太祖髙皇帝建極之初禮制大定即命禮部尚書陶凱講究古樂因製成九奏樂章以備燕享之用固已完太古之遺音而復太和之至治矣而先臣丘濬建議之説其大要猶欲請朝廷詔求天下精知音律之士按世之所謂正宫越調之稍近者以䆒古人清宫清商之槩然後本鍾律之法明候氣之術以制律吕律吕既定則以歌聲齊簫聲以簫聲定十六聲又以十六聲齊八器由是以復古者先王之盛此亦先臣獻忠之意或亦可為聖治萬分之助矣乎今欲舉古者三百篇之遺以鳴我國家之盛豈非欲攷詩樂之所自將舉天下於三代之隆與抑不知古之樂盖有出乎聲詩之外者而未之及也盖樂以和為本也使人心咸和而樂音與之相宣則雖舉今之詞而按之以今調而謂今之樂即古之樂可也否則雖舉古之詩而和之以古律而謂古之樂即今之樂可也盖惟有虞廷都俞吁咈之治而後有勅天卿雲之詩大韶之樂有周家文武成康之治而後有闗睢騶虞之詩大武之樂是故言詩樂之至其成功所奏固可以致百物禮天地而其流風藴義則又未始不本於和徳感召化行而俗美者為之也昔馬遷作律書反覆於黄帝之定大災顓頊之平水害以及武王吹律聴聲陳兵牧野之詳而於今人所爭尺度秬黍之間獨畧而不及此其音樂之微妙必明於道者然後可與言其至也樂以歌聲為主議樂可易言乎明之而疏天地幽之而速鬼神奥之而興性靈廣之而作動植自非聖哲孰能窺測何其洪鉅也樂終難言乎節之以三調合之以七始本乎造化順乎自然妙悟獨得存之一心何其易簡也其理洪鉅故必通天通地通人斯可以譚律吕其道簡明故誦之歌之絃之舞之皆足以成節奏而要之聲詩其本乎仲尼聞韶聞此者也季札觀樂觀此者也舍是而莩葭之輕重緹縵之疎密徑圍之廣狹雌雄之應違皆土梗焉耳矣嘗考之古之達樂有三曰風曰雅曰頌而金石絲竹匏土革木皆主此以成樂均者也信乎樂非有外於聲詩也虞帝命夔典樂教胄不過曰欲聞音律出納五言而周官大司樂所掌歌奏徴諸虞謨商頌較若畫一然則樂以詩為本詩以聲為用自古迄今其義未有改矣羲軒以降世代綿邈聲詩不存其義可考而知也黄帝何以為咸咸之為言皆也謂徳皆漸被也顓頊何以為莖莖之為言根也謂澤及根荄也堯何以為章章之為言明也謂帝徳顯暴也舜何以為韶韶之為言紹也謂繼紹唐堯也禹何以為夏夏之為大也謂能光大姚姒也湯何以為䕶䕶之為言救也謂除邪去虐能䕶民也知六代立樂之義則雖神農五奏葛天八闋此其推也而曰聲與詩不可縁義以起乎周武作大武公旦作大勺而和之以六律六吕五聲八音六舞樂云備矣大司徒以樂防民淫大司馬以樂舞教國子大司樂掌宿縣小胥正樂縣之位春官大司樂掌六律六同以合隂陽地官舞師掌教兵舞旄人掌四夷樂無一人而不知樂無一樂而不設官官云備矣官備而樂益備此後之誦聲詩者必以六典為宗也周衰雅微溺音騰沸瞽工歌工奔散四方樂官之缺從兹始矣孔子憫而正之列十五國風以辨風土之音分大小二雅以辨朝廷之音陳周魯商三頌以辨侑祭之音定南陔白華華黍崇丘由庚由儀六笙以辨協歌之音得詩而得聲者則序之三百篇是也得詩而不得聲者則置之河水祈招之類是也四始既别唱歎有譜渢渢洋洋六代其庻幾乎秦燔樂經漢襲秦陋詩官不采言樂官不被律而聲詩之學稱賤業焉故杜氏有曰漢制氏世業但能紀鏗鏘鼓舞而不能言其義言知聲詩而不知義也齊魯毛韓諸家以序説相雄長以義理相授受而經生學者始不識詩言知義而不知聲詩也夫徳為樂心聲為樂體義為樂精得詩則聲有所依得聲則詩有所被知聲詩而不知義尚可備登歌充庭舞彼知義而不知詩者窮極物情工則工矣而絲簧弗協將焉用之甚哉聲詩不可不講也曺孟徳平劉表得雅樂即杜夔問其所業三百篇惟知鹿鳴騶虞伐檀文王四什而餘皆不傳非無傳也當是時延年以曼聲協律朱馬以騷體作歌桂華麗而不經赤雁靡而非典聲詩俱鄭俗聴飛馳正樂之湮此實階之矣迨太和末而左延年所得者惟鹿鳴一篇浸淫至魏晉而鹿鳴亦復絶唱中和之韻闕焉不還盖鹿鳴亡而詩亡矣非詩之亡也詩在而聲譜散逸詩猶亡也所以繼鹿鳴之響者不在樂府乎樂府之體有行有曲有引有操有吟有弄而皆可列之樂部然而去三百篇風㫖則逺矣述通志者病之風頌不分二雅淆雜乃取而彚之君子之作如上之回聖人出者歸乎雅野人之作如艾如張雉子班者歸乎風音本幽薊如燕歌行者為列國之風音本中華如煌煌洛京行者為都人之雅品藻良亦當矣然上之回聖人出詞多取於誇耀燕歌行京洛行名惟混於國都大聖刪詩豈若是乎要之曰行曰曲主乎人聲引操吟主乎絲竹主乎人者有辭而必有聲主絲竹者有聲不必有辭則亦聲詩皆協而足備燕享之樂奏者也樂舞總叙詩序曰歌咏之不足不知手之舞之足之蹈之此舞之所由生也後代乃以舞為賤役棄之而不講焉何與嘗稽之文王世子及學士必時春夏學干戈秋冬學羽籥皆於束序即大學也以世子學士而於干戈羽籥以時學焉則舞亦學中一事也周禮司樂掌樂之政以教國子小舞大胥掌學士之版以待致諸子鄭司農云學士謂卿大夫諸子學舞者則舞之非賤役也明矣虞書帝乃誕敷文徳舞干羽於兩階而有苖來格亦可見舞之在古人也若不用之所以雲門大卷大咸大磬大夏大䕶大武周大司樂以六代之舞教國子者此也後世所用者惟韶武存焉雖歴代各有制作總不外文武二舞是已然國家用以饗天地格祖考而和神人所闗匪細務也凡綴兆疾徐之間文以揖遜武以擊刺善觀舞者覩其容而可以知治化焉豈徒觀美云乎哉至於各省郡文廟樂舞茍簡尤甚司教化者幸留意焉樂舞考陳氏樂書曰周官大胥以六樂之㑹正舞位小胥起舞列經曰行其綴兆行列得正焉盖位則酇也所以為綴列則佾也所以為行正之以辨其序起之以肅其慢故治民勞者酇逺而佾寡其徳殺故也治民逸者酇短而佾多其徳盛故也非故不同凡各稱徳而已天子之於諸侯生則旌以舞没則表以謚觀舞之行綴足以知臨民之徳聞諡之異同足以知為治之行然則為諸侯者孰不敏徳崇行以法天下後世為哉今之舞者不列於庭而列於堂下其退文進武不復有出入之序非古人所謂八佾舞於庭序出入舞者之意也至於進退疾徐之際又不復盡筋骨之力以要鍾鼔拊㑹之節非古人所謂文以揖遜武以擊刺之意也講而習之正今日急務也東萊吕氏曰萬舞文武二舞之總名也干舞武舞之别名也籥舞文舞之别名也文舞又謂之羽舞鄭康成據公羊傳以萬舞為干舞盖公羊傳釋經之悞也春秋書萬入聲籥言文武二舞俱入以仲遂之喪於二舞之中去其有聲者故去籥焉文舞舞羽吹籥公羊乃以萬舞為武舞與籥舞對言之失經意矣若萬舞止為武舞則簡兮與商頌何為獨言萬舞而不及於文舞耶左氏載考仲子之宫將萬焉婦人之廟亦不應獨用武舞也然則萬舞為二舞總名明矣周人教國子之舞有大司樂有小樂師又舞師下士二人胥四人舞徒四十人然則古之舞者非獨給繇役之賤者而已雖為國子爵為下士亦預焉漢太樂律卑者之子不得舞宗廟之酎除吏二千石至六百石闗内侯至五大夫之子取其適者五尺以上年十二至三十顔色和身體修治者以為舞人古國子下士之實也唐之郊廟舞工不合古制趙慎言奏議隋代猶以品子為之號二舞郎唐興遂變其制誠願復古道取品子年二十以下容質修正者備二舞之員令太常博士主之准國子學給料閒日得習六樂學五禮滿十嵗量文武授散官號雲門生其制亦可謂近古矣然不設課試之法勸沮之術未為備制也聖朝舞郎之制尚仍唐舊誠推慎言之法輔之以課試勸沮之方以之饗郊廟接神祗未有不降格而來饗矣今日不得不為之留意也正義曰大司樂所教雲門以下六舞是大舞舞師所教帗舞以下七者是小舞内則云十三舞勺成童武象是小舞又云二十舞大夏即此六舞也陳氏樂書曰執干揚而舞之兵舞也列五采繒為之帗舞也折衆鳥羽為之羽舞也以凰之羽為之皇舞也以旄牛之尾為之旄舞也鄭司農曰杜稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人鄭康成曰四方以羽宗廟以人山川以干旱暵以皇然古之於大祭祀有備樂必有備舞春秋書有事於太廟萬舍籥則宗廟用干與羽矣若夫敬而用之則有所不備故山川以干社稷以帗四方以羽旱暵以皇二鄭之論疎矣大司樂曰舞咸池以祭地祗則社稷不特帗舞也舞大夏以祭山川則山川不特兵舞也於咸池之類言其章不言其器於帗舞之類言其器不言其章互備也書言舞干羽於兩階樂記比音而樂之及干戚羽旄謂之樂郊特牲明堂位祭統皆言朱干玉戚以舞大武皮弁素積以舞大夏簡兮之詩言碩人俁俁公庭萬舞繼之左手執籥右手秉翟要皆先武后文者盖堯舜揖遜其舞先干後羽以苗民逆命故也湯武征伐其舞先武後文者以有武功為大故也按正義以雲門大巻大咸大夏大濩大武為大舞以帗舞羽舞皇舞旄舞干舞人舞為小舞然以愚觀之雲門以下舞之名也若帗若羽若皇若旄若干若人則舞之具也有此六者之具然後可以舞此六代之舞非於小舞之外别有所謂大舞也盖六代之舞其名雖異而所用之具則同然必謂之帗舞羽舞云者以其或施之社稷或施之山川旱暵之屬其用各有不同耳舞師所教是各指其所習而言故謂之帗舞羽舞大司樂所教是通指其集大成而言故謂之雲門大咸譬之為學帗羽皇旄干人則誦詩讀書是也雲門至大武則作文是也而誦詩讀書固所以作文也樂書互相備之説得之孟子曰樂斯二者樂則生矣生則惡可已也惡可已則不知足之蹈之手之舞之手足之舞蹈一皆其樂之生機所以周禮大司樂有樂徳樂容之教也若夫羽毛干戚綴兆疾徐則皆樂舞之儀文焉而佾乃樂舞之行列也天子八諸侯六大夫四士二此亦其行列言之而每佾八人其可得而増减之哉何也聲容一也八音克諧然後成樂而舞即所以節八音也故樂必以八人為列自天子至士殺降以兩减其兩列耳非兩列又减二人也如天子六十四人諸侯三十六人固云備矣若大夫八人已不足以備鍾鼓管絃之司而士止四人奚可哉觀春秋鄭伯賂晉悼公女樂二八晉以一八賜魏絳亦可證也噫周以樂舞教國子至漢於宗廟之祀猶用二千石及五大夫之適子五尺以上者為舞人而卑者之子不得與尚有周人用國子之意也今之歌舞者不過市井􅅵畆之人耳望其格神人移風俗也有是理哉樂歌樂舞總論天地間聲容二者盡之矣樂以洩人心之喜宣天地之和不越乎聲與容也聲非他也歌詠以養性情人皆曰樂必有聲渢渢乎可以悦人耳也不知因其性情之平和自然宣之口為歌詠為管絃鍾磬皆所以諧歌詠之聲者也容非他也舞蹈以養脈人皆曰樂必有容洋洋乎可以悦人目也不知因血脈之融暢自然形之身為舞蹈焉羽旄干戚皆所以飾舞蹈之容者也是有諸中斯假諸物以節宣之則樂非外爍而為我之所固有也古之雅樂所以與俗樂異故樂聲淡則聴心平樂容善則歌者慕非徒鏗鏘歌舞反以蕩人之精神而不免淫哇之害也然則知歌詠出於性情之和平舞蹈本乎血脈之融液而其聲容一根於心之悦懌有所不容己者則樂以悦人之耳目已非此心之真樂矣况使人代為歌詠必欲聲音之可聴使人代為舞蹈必欲儀容之可觀猶曰人之聲人之容也今乃舍人之聲容而止尚管絃鍾磬之鏗鏘羽旄干戚之起伏是豈聲容所自來乎何也田夫歌謡而擊壤以自快兒童跳躍而舞干以自娯非為人也鳥獸和鳴於林壙鳶魚飛躍於天淵豈為人之耳目覩聴然後和鳴而飛躍哉盖物惟和鳴飛躍一出於自然之天性則人之耳目自有與之俱適者在也物且然也况於人乎所以心和則氣和氣和則形和而太和滿宇宙間可以享上帝可以格祖考庶尹兆諧鳥獸率舞和氣相為感召一皆自然而然者也古先聖人有見於此因吾心之獨樂者推而與人同之推人心之同樂者擴而與天下之民物同之然非律度無以垂久逺故有五聲八音十二律之制作焉是推其樂之所廣被凡大而天地小而物類顯而臣鄰幽而鬼神皆樂之所感格也䆒其樂之所從來則聲由心生手舞足蹈一根於心之不容已䆒樂之原必欲天子建中和之極者此也可見樂必本乎自心之和樂而謂聲容當以人為主者已屬之第二義則夫舍人之歌聲舞容惟鰓鰓然於樂器是泥者不愈失而愈逺哉或疑歌舞一本乎自心之悦樂論樂制所自起信然也果何據哉曰帝庸作歌皋陶載賡書可據也卷阿游歌以矢其音詩可據也或疑喜歌游歌於五聲八音何有哉曰舜歌南風而鼓五絃之琴孔子取瑟而歌則依永和聲搏拊琴瑟以詠不獨后夔以此教胄子矣或又疑朝堂之上君臣亦可以自舞耶曰小雅伐木章蹲蹲舞我謂人代舞可也魯頌有駜章夙夜在公在公明明振振鷺鷺於下鼓淵淵醉言舞予胥樂兮非自舞而何歴代百寮朝賀於殿陛間山呼舞蹈其歡樂之意盖可想矣歡之朝堂且然則班爛戲舞以娯親聞雞起舞以自振者又不待言也噫鼓之舞之自一聲達之天下以養性情以和血脈以移易其風俗至與天地相應樂之道大矣果謂黄鍾竹管短長合律能至是哉此樂工之管測非神聖之通論也予亦非置樂器而不譚也特因世之譚樂者既合已求之人又舍人以求諸物不得不反其樂之所自始耳是故聲律身度必有樂徳為之本也大司樂合國子而教以樂語樂舞亦先之以徳焉此樂之教也至於笙磬翟籥不過假以節奏乎人之聲容而已故曰􅇼豆之事則有司存於樂器亦云然噫姑就後代音樂言之安得歌舞一遵乎樂章歌以宣暢其難狀之容而聲即容也舞以發越乎難洩之聲而容即聲也歌舞相協庶乎五色八風聲容之相協也不猶愈於歌自歌舞自舞兩不相應哉樂總論樂志論曰世號太常為雅樂而未嘗施於燕享豈以正聲為不美聴哉夫樂者樂也其道雖微妙難知至於奏之而使人悦豫和平此不待知音而後能也嘗竊觀於太常其樂縣鍾磬塤箎搏拊之器與夫舞綴羽籥干戚之制盖皆倣古矣逮振作之則聴者不知為樂而觀者厭焉豈所謂古樂其聲真若此哉孔子曰惡鄭聲恐其亂雅亂之云者似是而非也孟子亦曰今樂猶古樂然今太常獨與教坊樂音殊絶何哉昔者李照胡瑗阮逸改鑄鐘磬處士徐復笑之曰聖人寓器以聲不求其聲而更其器其可用乎照瑗逸制作久之卒無所成蜀人房庶亦深訂其非是因著書論古樂與今樂本末不違其大畧若謂上古世質器與聲朴後世變之為箏笛匏笙也攢之以斗塤土響絲竹琴簫也後世變之為箏笛匏笙也攢之以斗塤土也變而為甌革麻料也擊而鼓木柷敔也貫之為板此人音者於世甚便而不達者指廟樂鎛鐘鎛磬宫軒為正聲而槩謂胡部鹵部為淫聲殊不知大輅起於椎輪轉蓬始於落葉其變則然也古者以爼豆食後世易之以桮盂古者簟蓆以為安後世更之以榻按雖使聖人復生不能舍桮盂榻按而復爼豆簟蓆之質也然則八音之器豈異於此哉孔子曰放鄭聲鄭聲淫者豈以其器不若古哉亦疾其聲之變耳試使知樂者由今之器寄古之聲去其惉懘靡曼而歸之中和雅正則感人心導和氣不曰治世之音乎然則世所謂雅樂者未必如古而教坊所奏豈盡為淫聲哉當數子紛紛改制鍾磬而復庶之論指意獨如此綴其語存之以俟知音者焉按孔子云樂云樂云鐘鼓云乎哉孟子曰今之樂猶古之樂也先儒亦謂樂只是一個和由是觀之所謂樂者和其本也聲器其末也使其政和而世治則雖管絃皆教坊之新聲度曲皆任韎之雜樂母害其為安且樂也如其政乖而世亂則雖聲歌下管盡合簫韶金石柷敔一循雅奏母害其為怨而怒也房庶之言當矣然庶當李照阮逸制樂之時特為此論後來乃復創為古本漢書有一黍之起積千二百黍之廣之説欲改定律吕范蜀公力主其説别撰新樂上進則復效照逸之為而與素論背馳何耶黄鍾子位一陽生物本乎天人本乎祖取乎宫宫生徴徴生商商金氣主殺不用商生羽羽生角大吕太簇應鍾取律吕相合黄鍾之子應鍾之亥為生死之終始此致人鬼樂也至於祀樂祭先妣夷則小吕為己申之合祭先祖無射夾鍾為卯戌之合也圍鍾震位萬物生東天道好生取為宫宫生徴徴生商商金氣主殺不用商生羽羽生角而又黄鍾太簇姑洗取律吕之相生此致神之樂也至祀樂取三才之位自子而起子為天位丑為天位之合故奏黄鍾必歌大吕也亟鍾未坤位二隂生萬物載於坤取為宫宫生徴徴生商商主殺不用商生羽羽生角而又太簇姑洗南吕取律吕之相生此致神之樂也至於祀樂太簇為地之佐而屬乎寅應鍾居亥而寅亥為之合故奏太簇必歌應鍾也圜鍾為天宫而以黄鍾為角太簇為徴姑洗為羽此三者陽律之相繼也相繼者天之道故於祀天神用之函鍾為地宫而以太簇為角姑洗為徴南吕為羽是三者隂律之相生也相生者地之數故於祭地祗用之黄鍾為人宫而以大吕為角大簇為徴應鍾為羽是三者律吕之相合也相合者人之情故於祭人鬼用之圜鍾在卯由卯至申其數六故圜鍾之數盡於六則天神可降矣函鍾在未由未至寅其數八故函鍾之數盡於八則地祗可降矣大磬本以祀四望也而乃於宗廟用之者盖享先王用之以為薦神之樂尊宗廟是以備樂舞也天神地祗皆不用歌而獨於宗廟歌九徳者盖九徳六府三事之歌有以見積功累仁之盛尊宗廟是以備樂師也一變至六變不言律同非不用律同也始焉未别六變而樂成是以分律同也宫角徴羽而不及商非不用金聲也祭惟用柔聲五聲獨商堅剛是以用四聲也樂之用有不同也如此夫天地宗廟君臣之樂總論按有宗廟之樂有天地之樂有君臣之樂尊親異别不可以不分幽明異位不可以不别漢叔孫通始定廟樂有降神納爼登歌薦祼等曲武帝始定郊祀之樂有十九章之歌明帝始定黄門鼓吹之樂天子所以宴羣臣也嗚呼風雅頌三者不同聲天地宗廟君臣三者不同禮自漢之失合雅而風合頌而雅其樂已失而其禮猶存至梁武十二曲成則郊廟明堂三朝之禮展轉用之天地君臣宗廟之事同其事矣此禮樂之所以亡也周禮春官大司樂其祭祀之樂不用商聲朱子與蔡西山議論樂書俱不説出是不看陳暘樂書引荀卿大師審詩商之言盖周以木徳王天下商聲屬金也因金尅木故音樂之間不用商音及佩玉左徴角右宫羽亦去商聲即此觀之周去商聲義有在也後之作樂者以商聲肅殺悉去商聲謂之何哉周樂不用商聲先儒之言曰聞宫聲使人温良而寛大聞商聲使人方亷而好義聞角聲使人惻隠而愛人聞徴聲使人樂義而好施聞羽聲使人恭儉而好禮則知樂有五音闕一不可然周人祭祀何以用宫角徴羽而不用商乎圜鍾為宫黄鍾為角太簇為角姑洗為徴南吕為羽此禮地祗之樂而遺商也黄鍾為宫大吕為角大簇為徴應鍾為羽此禮人鬼之樂而遺商也故或以為人聲或以為殺聲或以為中聲不知天地鬼神非人孰享商果人聲何為不與於祭也黄鍾之大簇函鍾之南吕莫非殺聲是殺聲未嘗不用也宫生徴徴生商商生羽羽生角中聲闕則上下之音散是中聲尤為當用也吁三者之説皆非愚未敢以為信盖古樂以鍾磬為主無鍾磬則以管為主晉志所謂笛猶磬鍾是也今之笛即古之管古者之管但有四孔未聞有商音至漢京君明始加一孔於笛之後是為商聲然則周人祭祀用管為主奚嘗惡商哉此非愚之臆説實得之馬融之笛賦按周樂不用商聲或謂周以木徳王故不用商或謂周用管為主未嘗惡商之二説未為無據若曰商聲主殺故不用然肅殺之氣於四時屬秋於四方屬西於五行屬金天不能以無秋也地不能以無西也人不能以無金也何獨於祀天地祀人鬼而獨惡其聲哉且五音有一之不備不可以成樂乃於天神地祗人鬼之祀皆不宜用則樂之於商聲也又當於何而用之哉三宫論王者父事天母事地以合同神人細入氣微入聲因道取類統協太和三才可致而理也其道在樂則三宫最著天宫取相繼父道也地宫取相生母徳也人宫取相合人情也變夾鍾曰圜變林鍾曰函乾為圜坤含𢎞也黄鍾無變稱何也人主常也天宫中春之管也地宫中央之管也人宫中冬之管也本中聲也圜鍾生於大辰直天之明堂帝出乎震故事天因焉函鍾出於大社大社地神也致役乎坤土之甚盛徳也故事地因焉黄鍾生於虚危有家廟象又萬物以子始故事人鬼因焉其變有六八九何也曰卯律數六即隂得酉衝亦六也雲門之樂六變圜鍾以之又初歴羽之羽調數當六也未律數八即隂得丑衝亦八也咸池之樂八變林鍾以之又初歴徴之羽調數當八也子律數九陽得當位九也箾韶之樂九變黄鍾以之又初歴宫之羽調數當九也六變乃羽七之樂然其聲七其變六起奏羽水收宫又羽始終水也水為天根是為雲門焉八變乃徴九之樂然其聲九其變八起奏徴火收宫又徴始終火也火為地窟是咸池焉九變乃宫五之樂五五為十然其聲十其變九起奏宫羽終奏本宫始終土也人鬼歸於土隨音而動故簫韶九成祖考格焉六變十奏而羽水生角木冬而春也陽以生出也陽生而後有天雲者升天之物也門者陽氣所出也八變十二奏而徴克商羽生角夏而秋也隂以克入也隂生而後有地池者入地之物也咸者備也氣周十二辰故備也九變十三奏從本宫起羽清濁之間隂陽之㑹也人負隂而抱陽魂升魄降必交而後能享故人鬼之樂先用雲門後用咸池合天地以索享也且天神之樂紫薇垣在子角居之太薇垣在卯寅宫徴居之天市垣在辰羽居之天神宜可降矣地祗之樂火音變而木水音變而火金音變而水木火金水麗乎土為四象四象交而土徳中尊有坤道焉地祗宜可出矣人鬼之樂並用亥子丑幽隂之律而寅為鬼户亥有水音丑有水音寅有火音則水化木木化火從鬼户以出而萃於宫五人鬼宜可禮矣然則音止三聲止四何也曰三統五也省文也商非盡無盖去商調耳先儒曰祭尚柔近之然而未盡也夫商主殺天地神人共惡之樂之流南而不歸北也將是謂乎于寶曰謙神也沈括曰虚人也鑿矣陳暘以為周木徳忌商引珮玉以正近世韓氏亦云然信斯言也是夏無徴而商無宫也暘又曰天宫變六其合四地宫變八其合三人宫變九其合二巧以乾坤咸明之於王者昭格享親之義奚謂也吾無取焉爾嗟乎古樂淪滅漢儒多所傅㑹必欲執三宫以非旋宫即國語之四宫復何説哉且一太簇而再為徴也夾鍾律隂不可以祝天乃假無射起調即夾鍾何與焉又每曲數宫有辟有不用其説矛遁迂迴而難通凡八變九變皆此類也此隋志之所駁姜夔韓氏之所疑而愚之不可妄以為解者也乃有手周禮之文以定祀者吁太史公曰文帝時㑹天下新去湯火人民樂業因其欲然能不擾亂故百姓遂安自年六七十翁亦未嘗至市井游敖嬉戲如小兒狀孔子所稱有徳君子者耶書曰七政二十八舍律厯天所以通五行八正之氣天所以成熟萬物也舍者日月所舍舍者舒氣也不周風居西北主殺生東壁居不周風東主辟生氣而東之至於營室室主營胎陽氣而産之東至於危危垝也言陽氣之危垝故曰危十月也律中應鍾應鍾者陽氣之應不用事也其於十二子為亥亥者該也言陽氣藏於下故該也廣莫風居北方廣莫者言陽氣在下隂莫陽廣大也故曰廣莫冬至於危虚虚者能虚能實言陽氣冬則宛轉於虛日冬至則一隂下藏一陽上舒故曰虚東至于須女言萬物變動其所隂陽氣未相離尚相如胥也故曰胥女十一月也律中黄鍾黄鍾者陽氣踵黄泉而出也其於十二子為子子者滋也滋者言萬物滋於下也其於十母為壬癸壬之為言任也言陽氣任養萬物於下也癸之為言揆也言萬物可揆度故曰癸東至牽牛者言陽氣牽引萬物而出也牛者冐也言地雖冐能冐而生也牛者耕植種萬物也東至於建星建星也者建諸生也十二月律中大吕大吕者其於十二子為丑丑者紐也言陽氣在上未降萬物厄紐未敢出條風居東北主出萬物條之言條治萬物而出之也故曰條風南至於箕箕者言萬物根基故曰箕正月也律中太簇太簇者言萬物簇生也故曰太簇其於十二子為寅寅言萬物始生螾然也故曰寅南至於尾言萬物始生如尾也南至於心言萬物始生於華心也南至於房房者言萬物門户也至於門則出矣明庶風居東方明庶者明衆物盡出也二月也律中夾鍾夾鍾者言隂陽相夾厠也其於十二子為卯卯之為言茂也言萬物茂也其於十母為甲乙甲者言萬物剖符甲而出也乙者言萬物生軋軋也南至於氐氐者言萬物皆至也南至於亢元者言萬物亢見也南至於角角者言萬物皆有枝格如角也三月也律中姑洗姑洗者言萬物洗生於於十二子為辰辰者言萬物之蜄也清明風居東南維主風風吹物而西之軫軫者言萬物益大而軫軫然西至於翼翼者言萬物皆有羽翼也四月也律中仲吕仲吕者言萬物盡旅而西行也其於十二子為己巳者言陽氣之已盡也西至於七星七星陽數成於七故曰七星西至於張張者言萬物皆張也西至於注注者言萬物之始衰陽氣下注故曰注五月也律中蕤賓蕤賓者言陽氣幼少故曰蕤痿陽不用事故曰賓景風居南方景者言陽氣道竟故曰景風其於十二子為午午者隂陽交故曰午其於十母為丙丁丙者言陽道著明故曰丙丁者言萬物丁壯故曰丁狼風居西南維主地地者沈奪萬物氣也六月也律中林鍾言萬物就死氣林林然其於十二子為未未者萬物皆成有滋味也北至於罰罰者言萬物氣奪可伐也北至於參參者言萬物可參也故曰參七月也律中夷則夷則言隂氣之賊萬物也其於十二子為申申者言隂用事申賊萬物故曰申北至於濁濁者觸也言萬物皆觸死也故曰濁北至於留留者言陽氣之稽留也故曰留八月也律中南吕南吕者言陽氣之旅入藏也其於十二子為酉酉者萬物之老也故曰酉閶闔風居西方閶者倡也闔者藏也言陽氣道萬物闔黄泉也其於十母為庚辛庚者言隂氣庚萬物故曰庚辛者言萬物之辛生故曰辛北至於胃胃者言陽氣就藏皆胃胃也北至于婁婁者呼萬物且内之也北至於奎奎者主毒螫殺萬物也奎而藏之九月也律吕無射無射者隂氣盛用事陽氣無餘也故曰無射其於十二子為戍戍者言萬物盡滅故曰戍前漢書律厯叙虞書曰乃同律度量衡所以齊逺近立民信也自伏羲畫八卦由數起至黄帝堯舜而大備三代稽古法度章焉周衰官失孔子陳後王之法曰謹權量審法度修廢官舉逸民四方之政行矣漢興北平侯張倉首律厯事漢武帝時樂官考正至元始中王莽秉政欲燿名譽徴天下通知鍾律者百餘人使羲和劉歆等典領條奏言之最詳故刪其偽辭取正義著於篇一曰備數二曰和聲三曰審度四曰嘉量五曰權衡參五以變錯綜其數稽之於古今效之於器物和之於心耳考之於經傳咸得其實靡不協同數者一十百千萬也所以算數事物順性命之理也書曰先其算命本起於黄鍾之數始於一而三之三三積之歴十二辰之數十有七萬七千一百四十七而五數備矣其算法用竹徑一分長六寸二百七十一枚而成六觚為一握徑乾象律黄鍾之一而長象仲吕林鍾之長其數以易大衍之數五十其用四十九成陽六爻得周流六虚之象也夫推歴生律制器規圎矩方權重衡平凖繩嘉量探頥索隠鉤深致逺莫不用焉度長短者不失毫釐量多少者不失圭撮權輕重者不失黍絫紀於一協於十長於百大於千衍於萬其法在算術宣於天下小學是則職在太史羲和掌之聲者宫商角徴羽也所以作樂者諧八音蕩滌人之邪意全在正性移風易俗也八音土曰塤匏曰笙皮曰鼓竹曰管絲曰絃石曰磬金曰鍾木曰柷五聲和八音諧而樂成商之為言章也物成熟可章度也角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而䌓祉也羽宇也物聚藏宇覆之也夫聲者中於宫觸於角祉於徴章於商宇於羽故四聲為宫紀也協之五行則角為木五常為仁五事為貎商為金為義為言徴為火為禮為視羽為水為智為聴宫為土為信為思以君臣民事物言之則宫為君商為臣角為民徴為事羽為物唱和有象故言君臣位事之體也五聲之本生於黄鍾之律九寸為宫或損或益以定宫商角徴羽九六相生隂陽之應也律十有二陽六為律隂六為吕律以統氣類物一曰黄鍾二曰太簇三曰姑洗四曰蕤賓五曰夷則六曰無射吕以旅陽宣氣一曰林鍾二曰南吕三曰應鍾四曰大吕五曰夾鍾六曰仲吕有三統之義焉其傳曰黄帝之所作也黄帝使伶倫自大夏之西崑崙之隂取竹之解谷生其竅厚均者斷兩節間而吹之以為黄鍾之宫制十二筩以聴鳯之鳴其雄鳴為六䳄鳴亦六比黄鍾之宫而皆可以生之是為律本至治之世天地之氣合以生風天地之風氣正十二律定黄鍾黄者中之色君之明也鍾者鍾也天之中數五五為聲上宫五聲莫大焉地之中數六六為律有形有色色上黄五色莫盛焉故陽氣施種於黄泉孕萌萬物為氣元也以黄色名元氣律者著宫聲也宫以九唱六變動不居周流六虚始於子在十一月大吕吕旅也言隂大旅助黄鍾宣氣而牙物也位在丑在十二月太簇簇奏也言陽氣太奏地而達物也位於寅在正月夾鍾言隂夾助太簇宣四方之氣而出種物也位於卯在二月姑洗洗㓗也言陽氣洗物辜潔之也位於辰在三月中吕言微隂始起未成著於其中旅助姑洗宣氣齊物也位於巳在四月蕤賓蕤繼也賓導也言陽始導隂氣使繼物養也位於午在五月林鍾林君也言隂氣受任助蕤賓君主種物使長大林盛也位於未在六月夷則則法也言陽氣正法度而使隂氣夷當傷之物也位於申在七月南吕南任也言隂氣旅助夷則任成萬物也位於酉在八月亡射射厭也言陽氣䆒物而使隂氣畢剥落之終而復始亡厭已也位於戍在九月應鍾言隂氣應亡射該臧萬物而雜陽門種也位於亥在十月三統者天施地化人事之紀也十一月乾之初九陽氣伏於地下始著為一萬物萌動鍾於太隂故黄鍾為天統律長九寸九者所以䆒極中和為萬物元也易曰立天地之道曰隂與陽六月坤之初六隂氣受任於太陽繼養化柔萬物生長楙之於未令種剛彊大故林鍾為地統律長六寸六者所以含陽之施楙之於六合之内令剛柔有體也立地之道曰柔與剛乾知大始坤作成物正月乾之九三萬物棣通族出於寅人奉而成之仁以養之義以行之令事物各得其理寅木也為仁其聲商也為義故太簇為人統律長八寸象八卦宓羲之所以順天地通神明類萬物之情也立人之道曰仁與義在天成象在地成形后以裁成天地之道輔相天地之宜以左右民此三律之謂矣是為三統其餘三正也黄鍾子為天正林鍾未之衝丑為地正大簇寅為人正三正正始是以地正適其始紐於陽東北丑位易曰東北喪朋乃終有慶答應之道及黄鍾為宫則大簇姑洗林鍾南吕皆以正聲應無有忽徴復與它律為役者同心一統之義也非黄而它律雖當其月月自宫者則其和應之律有空積忽微不得其正此黄鍾至尊亡與並也易曰參天兩地而倚數天之數始於一終於二十有五其義紀之以三故置一得二又二十五分之六凡二十五置終天之數得八十一以天地五位之合終於十者乗之為八百一十分應歴一統千五百三十九嵗之章數黄鍾之實也繇此之義起十二律之周徑地之數始於二終於三其義紀之以兩故置得二凡三十置終地之數得六十以地中數六乗之為三百六十分當期之日林鍾之實也人者繼天順地序氣成物統八卦調八風理八政正八節諧八音舞八佾監八方被八荒以終天地之功故八八六十四其義極天地之變以天地五位之合終於十者乗之為六百四十分以應六十四卦太簇之實也書曰天功人其代之天兼地人則天故以五位之合乗焉唯天為大唯堯則之之象也地以中數乗者隂道理内在中餽之象也二統相通故黄鍾林鍾太簇律長皆全寸而亡餘分也天之中數五地之中數六而二者為合六為虚五為聲周流於六虚虚者爻律夫隂陽登降運行列為十二而律吕和矣太極元氣函三為一極中也元始也行於十二辰始動於子參之於丑得三又參之於寅得九又參之於卯得二十七又參之於辰得八十一又參之於已得二百四十三又參之於午得七百二十九又參之於未得二千一百八十七又參之於申得六千五百六十一又參之於酉得萬九千六百八十三又參之於戍得五萬九千四十九又參之於亥得十七萬七千一百四十七此隂陽合徳氣鍾於子化生萬物者也故孽萌於子紐牙於丑引達於寅冐昴于振美於辰巳盛於已巳咢布於午昧薆于未申堅於申留孰于酉畢入於戌該閡于亥出甲于甲奮軋於乙明炳于丙火盛於丁豐楙于戊理已於已歛更於庚悉新於辛懷任於壬陳揆於癸故隂陽之施化萬物之終始既類旅於律吕又經歴於日辰而變化之情可見矣玉衡杓建天之綱也日月初纒星之紀也綱紀之交以原始造設合樂用焉律吕唱和以育生成化歌奏用焉指顧取象然後隂陽萬物靡不條鬯該成故已成之數忖該之積如法為一寸則黄鍾之長也參分損一下生林鍾參分林鍾益一上生太簇參分太簇損一下生南吕參分南吕益一上生姑洗參分姑洗損一下生應鍾參分應鍾益一上生蕤賓參分蕤賓損一下生大吕參分大吕益一上生夷則參分夷則損一下生夾鍾三分夾鍾益一上生無射三分亡射損一下生中吕隂陽相生自黄鍾始而左旋八八為伍其法皆用銅職在太樂太常掌之度者分寸尺丈引也所以度長短也本起黄鍾之長以於榖柜黍中者一黍之廣度之九十分黄鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法用銅髙一寸廣二寸長一丈而分寸尺丈存焉用竹為引髙一分廣六分長十丈其方法矩髙廣之數隂陽之象也分者自三微而成著可分别也寸者忖也尺者隻也丈者張也引者信也夫度者别於分忖于寸隻於尺張於丈信於引引者信天下也職在内官廷尉掌之量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容以子榖秬黍中者千有二百實其度以井水凖其槩合龠為合十合為升十升為斗十斗為斛而五量加矣其法用銅方尺而圜其外傍有庣焉其上為斛其下為斗左耳為升右耳為合龠其狀似爵以縻爵禄上三下二參天兩地圜而函方左一右二隂陽之象也其象圜規其重二鈞備氣物之數合萬有一千五百二十聲中黄鍾始於黄鍾而反覆焉君制器之象也龠者黄鍾律之實也躍微動氣而生物也合者龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍于龠合於合登於升聚於斗角於斛也職在太倉大司農掌之衡權者衡平也權重也衡所以任權而均物平輕重也衡其道如底以見凖之正繩之直左旋見規右折見矩其在天也佐助旋機斟酌建指以齊七政故曰玉衡論語云立則見其參於前也在車則見其倚於衡也又曰齊之以禮此衡在前居南方之義也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黄鍾之重一龠容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十有八變之象也五權之制以立義之以物鈞之其餘小大之差以輕重為宜圜而環之令之肉倍好者周旋無端終而復始無窮已也銖者物絲忽微始於至成著可殊異也兩者兩黄鍾律之重也二十四銖兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻隂陽變動之象也十六兩成斤者四時乗四方之象也鈞者均也陽施其氣隂化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之象也四百八十兩者六旬行八節之象也三十斤成鈞者一月之象也石者大也權之大者也始於銖兩於兩明于斤均于鈞終于石物終石大也四鈞為石者四時之象也重百二十斤者十二月之象也終于十二辰而復于子黄鍾之象也千九百二十兩者隂陽之數也三百八十四爻五行之象四萬六千八百銖者萬一千五百二十物歴四時之象也而嵗功成就五權謹矣權與物鈞而生衡衡運生規規圜生矩矩方生繩繩直生凖凖正則平衡而鈞權矣是為五則規者所以規圜器械令得其類也矩者所以矩方器械令不失其形也規矩相須隂陽位序圜方乃成凖者所以揆平取正也繩者上下端直經緯四通也凖繩連體衡權合徳百工繇焉以定法式輔弼執法玉以翼天子詩云尹氏太師秉國之鈞四方是維天子是毗俾民不迷咸有五象其義一也以隂陽言之太隂者北方北伏也陽氣伏於下于時為冬冬終也物終藏乃可稱水潤下智者謀謀者重故為權也太陽者南方南任也陽氣任養物於時為夏大夏也物假大乃宣乎火炎上禮者齊齊者平故為衡也少隂者西方西遷也隂氣遷落物於時為秋秋􅒫也物􅒫歛乃成熟金從革改更也義者成成者方故為矩也少陽者東方東動也陽氣動物於時為春春蠢也物蠢止乃動運木曲直仁者生生者圜故為規也中央者隂陽之内四方之中經緯通達迺能端直於時為四季土稼穡蕃息信者成成者直故為繩也五則揆物有輕重圜方平直隂陽之義四方四時之體五常五行之象厥法有品各順其方而應其行職在大行鴻臚掌之書曰予欲聞六律五聲八音七始詠以出納五言女聴予者帝舜也言以律吕和五聲施之八音合之成樂七者天地四時人之始也順以歌詠五常之言聴之則順乎天地序乎四時應人倫本隂陽原性風之以徳感之以樂莫不同乎一唯聖人為能同天下之意故帝舜欲聞之也今廣延羣儒博謀講道修明舊典同律審度嘉量平衡鈞權平凖直繩立於五則備數和聲以利兆民貞天下於一同海内之歸凡律度量衡用銅者名自名也所以同天下齊風俗也銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行是以用銅也用竹為引者事之宜也厯律總議易革之象曰澤中有火革君子以治厯明時夫水性潤下火性炎上氣相息則天地革而四時成矣論者以為虚危坎位也𤣥枵之次也牛宿艮位也星紀之次也日月交㑹於此合壁曜靈是天地之元運也而亦元象之所斡旋也是故聖人觀其象而厯作焉然而欲測象以測運其説有三一曰觀五星以測三垣二曰觀三垣以測二十八宿三曰觀二十八宿以測中氣此又求元運者所當知也豫之象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考夫地氣上躋天氣下降雷奮則天地以順動而四時不忒矣論者以為雷雨作為解也而萬物皆甲拆也雷電至為豐也而五氣皆暢達也隂陽和合懽忻交通是天地之元聲也而亦元數之所統㑹也是故聖人觀其象而樂作焉然而欲稽數以協聲其説有三一曰稽五聲以審八音二曰稽八音以審十二律三曰稽十二律以審旋宫此又求元聲者所當知也夫元象可測也而斡旋元象以昭元運非聖人莫之能也其惟堯之欽若爾矣乎夫元數可求也而統㑹元數以協元聲非聖人莫之能也其惟舜之克諧爾矣乎圖書編巻一百十五
