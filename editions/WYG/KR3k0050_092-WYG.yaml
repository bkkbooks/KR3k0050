body:
  text: 圖書編卷九十二明章潢撰保甲鄉約社倉社學總序古人良法美意凡以為民也今之涖官行法者茍實心以為民則周官法度率不外是顧力行何如耳是故保甲之法人知足以弭盗也而不知比閭族黨之籍定則人自不敢以為非郷約之法人知其足以息争訟也而不知孝順忠敬之教行則民自相率以為善由是社倉興焉其所以厚民生者為益周由是社學興焉其所以振民徳者為有素可見四者之法實相須也使以此行之一郷則一郷之風俗同道徳一弦誦之聲遍於族黨禮讓之化達於閭閻民日遷善違罪而不自知而古道其再見於今矣郷郷皆然縣有不治乎縣縣皆然天下其有不太平乎所以孔子觀於郷而知王道之易易也噫我朝之洪武禮制教民榜文可謂盡美盡善矣志經濟者幸留意焉又夫法當便民事宜畫一惟一則民易從而法可久也即如舉行郷約則宜立郷約亭申明里社則宜立里社壇興起社學則宜増置社學勸立社倉則宜葢造社倉然四者並舉勢難遽行除里社壇不必别立止以五榖八蜡之神牌加入本村神廟奉祀更為省便且順民情因以正俗其餘三項亦止當合為一處各村宜擇空地一方周以墻垣中立一堂傍立二倉則郷約亭在此社學在此社倉在此矣工費既省且教讀訓䝉於中亦有看守之便况是舉也禮法兼資教養具備使盗息民安政平訟簡風移俗易其責自郷之賢士大夫始自郷之父老長者始一倡百和或合衆共造或倡義獨造則於各郷之賢達者有厚望焉里社洪武禮制凡各處郷村人民每里一百户立壇一所祀五土五榖之神専為祈禱雨暘時若五榖豐熟每嵗一户輪當㑹首常用㓗净壇場遇春秋二社預相率辦祭物至日約聚祭祀其祭用一羊一豕酒果香燭隨用祭畢就行㑹飲㑹中先令一人讀抑强扶弱之誓其詞曰凡我同里之人各遵守禮法毋恃力凌弱違者先共治之然後經官或貧無可靠周給其家三年不立不使與㑹其婚姻䘮𦵏有乏隨力相助如不從衆及犯姦盗詐偽一切非為之人不許入㑹讀誓詞畢長幼以次序坐盡歡而退務在恭敬神明和睦鄉里以厚風俗儀注前祭一日㑹首及預祭之人各齋戒一日㑹首先遣執事人掃除壇所為瘞坎於壇所之西北方深取足容物㑹首洗滌厨房鑊器以净室為饌所至晚宰牲執事者以碟取毛血與祭器俱寘於饌所祭器俱用甆瓦器祭日未明執事者於厨中烹牲設五土五榖神位於壇上五土俱東五榖俱西設讀所於壇上居中間設㑹首拜位於壇下俱南向設與祭人位於其後設引禮及諸執事人位又於其後執事者於饌所實祭物於碟内解牲體置於二爼置酒於樽書祝文於紙祭物既備執事者各捧設於神位前然香明燭自㑹首以下各服常服􅏕手入就拜位立定執事者執壺於樽中取酒立於五土神位之左引禮唱鞠躬拜興拜興平身㑹首以下各鞠躬拜興拜興平身執事者取毛血瘞於坎中引禮引㑹首詣五土神位之前唱跪㑹首詣五土神位前跪舉盃執壺者斟酒引禮唱三祭酒㑹首三祭酒訖引禮唱俯伏興平身執事者執壺詣五榖神位之左引禮引㑹首詣五榖神位前唱跪㑹首詣五榖神位前跪舉盃執壺者酌酒引禮唱三祭酒㑹首三祭酒訖引禮唱俯伏平身㑹首俯伏興平身引禮唱就讀祝位讀祝者取祝立於讀祝位之左㑹首詣讀祝所引禮唱跪㑹首跪唱讀祝讀祝者跪讀祝訖興置祝於案引禮唱俯伏興平身㑹首俯伏興平身引禮唱復位㑹首復位引禮唱鞠躬拜興拜興平身㑹首以下皆鞠躬拜興拜興平身執事者徹祭物讀祝者取祝文焚瘞於坎所禮畢行㑹飲讀誓文禮祝文維某年某月某日某州縣某鄉某里某人等謹致祭於五土之神五榖之神曰惟神參贊造化發育萬物凡我庶民悉頼生植時惟仲春東作方興秋嵗事有成謹具牲醴恭伸祈告報祭伏願雨暘時若五榖豐登官賦足供民食充裕神其鍳之尚享鄉厲凡各鄉村每里一百户内立壇一所祭無祀鬼神専祈禱民庶安康孳蓄蕃盛每嵗三祭春清明秋七月十五日冬十月一日祭物牲酒隨鄉俗置辦其輪流㑹首及祭畢㑹飲讀誓等儀與祭里社同鄉法洪武十五年詔凡我良民各守禮法若衆以暴寡強以凌弱巧以取愚詐以騙良按治得實斷沒其家遷徙逺方十九年頒行大誥續編申明五常臣民之家務要父子有親率土之民要知君臣之義務要夫婦有别鄉里親戚必然長幼有序朋友有信衆尊有徳不拘年之壯幼不序長幼之分此古人之大禮此誥也朕本非能不過申明先王之舊章而民從之家和户平吉哉倘有不如朕言者父子不親罔知君臣之義夫婦無别卑凌尊朋友失信郷里髙年并年壯豪傑者㑹議而誡訓之凡此三而至五加至七次不循教者髙年英豪壯者拿赴有司如律治之有司不受狀者具在律條慎之哉互知丁業先王之教其業有四曰士農工商昔民從教専守四業人民大安異四業而外乎其事未有不墮刑憲者也朕本無才申先王之教與民約告誥出凡民鄰里互相知丁互知務業具在里甲縣州府務必周知市村絶不許有逸夫若夫異四業而從釋道者户下除名凡有夫丁除公占外餘皆四業然必有效若或不遵朕教或頑民丁多及單丁不務生理揑巧於公私以構患民之禍許鄰里親戚諸人等拘拿赴京以凴罪責明孝冬温夏凊昏定晨省飲食㓗净節之父母有命善正速行毋怠命乖於禮法則哀告再三父母已成之業毋消父母運蹇家業未成則當竭力以為之事君以忠夫婦有别長幼有序朋友有信居處端莊涖官以敬戰陣勇敢不犯國法不損肌膚閒中不致人罵詈朝出則告徃某方暮歸則告事已成未成嗚呼孝子之節非止一端豈有但供飲食而已二十八年二月己丑太祖諭户部臣曰古者風俗淳厚民相親睦貧窮患難親戚相救婚姻死䘮鄰保相助近世教化不明風俗頺弊郷鄰親戚不能周恤甚者強凌弱衆暴寡富吞貧大失忠厚之道朕即位以來恒申明教化於今未臻其效豈習俗之固未易變耶朕置民百户為里一里之間有貧有富凡遇婚姻死䘮富者助財貧者助力民豈有窮苦急廹之憂又如春秋耕穫之時一家無力百家代之推此以徃百姓寕有不親睦者乎爾户部其申諭以此意使民知之三十一年頒示教民榜文一父母生身之㤙至大其鞠育劬勞詳載大誥今再申明民間有祖父母父母在堂者當隨家貧富奉養無闕已亡者依時祭祀展其孝敬為父母者教訓子孫為子弟者孝敬伯叔為妻者勸夫為善如此和睦宗族不犯刑憲父母妻子朝夕相守豈不安享太平一鄉里人民住居相近田土相鄰祖父以來非親即識其年老者有是父祖軰行有是伯叔軰行有是兄軰行者雖不是親也是同鄉朝夕相見與親一般年幼子弟皆須敬讓敢有輕薄侮慢不循教誨者許里甲老人量情責罰若年長者不以禮導後生以恃年老生事羅織者亦治以罪務要鄰里和睦長幼相愛如此則日乆自無争訟豈不優游田里安享太平一鄉里人民貧富不等婚姻死䘮吉凶等事誰家無之今後本里人户凡遇此等互相賙給且如某家子弟婚姻其家貧窮一時難辦一里人户每户或出鈔一貫人户一百便是百貫每户五百便是五十貫如此資助豈不成就日後某家婚姻亦依此法輪流賙給又如其家或父或母死䘮在地各家或出鈔若干或出米若干資助本家或棺槨或僧道脩設善縁等事皆可了濟日後某家倘有某事亦如前法互相賙給雖是貧家些小錢本亦可措辦如此則衆輕易舉行之日久郷里自然親愛一民間一里之中若有强刼盗賊逃軍逃徒及生事惡人一人不能緝捕里甲老人即須㑹集多人擒拏赴官違者以罪罪之一本郷本里有無藉潑皮平日刁頑為非作歹不受教訓動輙把持挟制此非善良之民衆老人嚴加懲治若仍前不改拿送有司解赴京來若有司徇情脫放者許老人奏聞國朝諸司執掌凡民間須要講讀大明律令敇諭老人手榜及見丁著業牌靣沿門輪遞務要通曉法意仍仰有司時加提督教民榜文民間子弟七嵗者十一二嵗者此時欲心未動良心未䘮早令講讀三編大誥誠以先入之言為主使之避凶趨吉日後皆成賢人君子為良善之民免貽父母憂慮不犯刑憲永保身家每郷每里各置木鐸一箇於本里内選年老殘疾不能生理之人或瞽目者令小兒牽引持鐸循行本里如本里内無此等之人於别里内選取俱令直言呌喚使衆聞知勸其為善毋犯刑憲其詞曰孝順父母尊敬長上和睦郷里教訓子孫各安生理毋作非為如此者每月六次其持鐸之人秋成之時本郷本里隨其多寡資助糧食如郷村人民住居四散窵逺每一甲内置木鐸一箇易為𫝊曉保甲總序保民非無法也無行法之人也得其人以行之豈古法之不善哉周禮五家為比使之相保積之五州為郷以比追胥凡徒役母過家一人惟田與追胥竭作孟子曰郷田同井守望相助近代保甲之法非此謂乎古兵農不分居則為比閭族黨州郷出則為伍兩卒旅師軍雖用之征伐皆耕稼之民也而况止於保察防禦乎後世以農養兵兵民為二然為農者不知兵且居常出粟以養兵一旦有警莫獲其保䕶之力矣循習既久町畦自便一行察禦頓苦追呼豈思保人所以自保圖危所以居安莫善於保甲之法乎保甲法宋程顥為晉城令立保伍法量郷里逺近為保伍使力役相助患難相恤奸偽無所容孤㷀老疾者責親黨使無失所行旅出於途者疾病皆有所養是謂善政王安石行之名曰保甲稍督責其操練亦循守望之意時賢輙斥以為非今之所行衆以為當行者則又安石之法也熈寕保甲法聫比其民以相保伍有大小保長有都副保正有隊法三人為一小隊三小隊為一中隊五中隊為一大隊引戰一人居前擁隊一人執刀居後二人居左右執旗一人居中凡五十人皆選士也隊中兵械或純用一色或雜用皆於結隊時商定教習保内如遇有賊盗當時告執大保長以下同保人户即時前去救應追捕如入别保即遞相擊鼓報應襲逐舊有舖屋及鼓處依舊仍輪保丁巡宿保甲規條一審編之法將各該地方挨門順户每十戸編為一甲共製一牌不拘親從人丁多寡逐一填冩軍民籍貫年貎生理每一門即為一户如係巳房即填註巳房如係賃房即填註某人房如本地止有十二三户亦編作一甲止有六七八户亦止編作一甲若獨家孤村即將鄰近孤村或四五六家編作一甲不必取盈於數俱填註牌靣送州縣官親筆標㸃不許遺漏一户一丁違者被人首出或查出定行重治一各保甲人户俱以各州縣衙門為主分别東西南北四至各照該闗郷村列為字號不分郷宦舉監生員軍民之家一體次第編號如魚鱗格式葢此係排門保甲必不遺漏一户一丁方可無事互相保守有事逐户挨查非如地方總小甲火夫等役有𫝊報接應差役之煩若仍前照例優免中間便生規避且火盗生發富貴者安居而欲以守望救助専責之貧者賤者理勢亦有所難行也各宜相體以靖地方一一甲末户即二甲𦂳鄰其於覺察救助尤為切要若火盗争鬭人命等項不得委之别甲不理每甲牌靣須將上甲尾户下甲首户姓名一併填註以便稽查一毎一甲即於十户内審編甲長一名毎十甲即於百户内審編保長一名每四街四闗及大村大鎮不拘甲數多少各編保正一名其小村小鎮或三四五處酌量人多少地里逺近共編保正一名俱聽各甲各保公舉到官以憑覆審裁定各填註牌靣凡里甲人等止於互相稽察出入不明之人嚴行舉首窩隠之條更無别項差遣亦不許巡捕官查㸃生擾保長保正俱擇殷實人户有行止才幹足以統率衆人者為之專一督率各甲人户嚴申條約保安地方更無别事亦不必迎送官府火夫雜差俱准優免或二三年一換或一年一換聽民自便不許濫受詞狀生事害人違者查究其有與約正屢舉善惡得實舉行有功定行優待奬賞以為諸保之勸一毎二牌之内保長精選報精壯能幹鄉勇一名註於牌靣免其火夫専司巡察一遇地方有警若小盗鄉村可捕者即率各甲併力捕之若大盗勢不易擒者即令郷勇數人飛報沿途地方保甲人等併力恊拿一靣馳馬飛報官司添兵捕剿不許時刻違悞擒賊有功定行給賞一各處寺廟菴堂多有停留逺方逰僧逰道齋化不明之人或倡行邪教惑衆圖財或盗賊隠名懐奸窺伺為害地方不小仰各照例與民家一體編入保甲隨行郷約以便稽查其樂户之家尤奸盗藏匿之所亦各就近附與甲牌之末聽郷保正長人等稽查毋令遺漏以滋他弊一毎月初一日為始各甲長將牌懸在一户門上初二日懸在二户門上週而復始月無三十即止仍照初一日懸掛如有出入存亡應増减姓名㑹上揭報於約正保正明註於牌靣以憑二季類報於官改正底冊一各保甲人等止於毎月初二日赴㑹所申明郷約保甲條規一次保正保長止於毎月十六日赴官遞有事無事結狀一紙此外再無别擾遞結之日即帶善惡簿聽掌印官查考酌量奬戒㑹多一日恐難遍查即以四至定限分作四日遞結亦可如或無善濫書有惡不舉訪出定行究治一保甲人等各隨地里逺近人户多寡酌量立為一㑹如居於城之四街四闗者即就閒曠公所寛廣寺觀各為一㑹居於各郷村者亦就附近寺觀社廟寛厰去處行之郷村大者各就同保中立為一㑹郷村小者或三四處或四五處共為一㑹毎月初二日保正率諸保甲同郷約正俱赴郷保㑹所行禮若實有事故或疾病不能赴者即先期告於約正但有無事或托故不赴㑹者即非良民也約正保正逐一掣牌查㸃量情罰榖公用秋成無事毎月十五日再行一次一保甲審編立㑹既定該州縣即移文該學共推請郷士大夫數位為約正以倡率士民無士大夫處則推髙年耆徳衆所尊信者為之又選生員五六人司賛禮鳴鼓講諭之事老人二人振鐸月輪五六人為直月置辦㑹事如郷村少生員處則以老成忠謹熟於禮儀者代之約正或係郷宦或有徳年髙有事不必赴官保正代之右保甲既定即此舉行郷約誦讀聖諭六言申明約規四條令其善相勸惡相規婚䘮相助貧窘相賙鬬争相救解火盗相援應彼此互相稽察窩隠互相覺舉有不如令者十家連坐庶家喻户曉不至犯法且同郷冠婚䘮祭悉依家禮舉行一切敝俗咸禁革之實為百姓親睦風俗淳厚之要法也古道其可復見矣乎郷約總叙周禮黨正州長族師咸以時屬民而讀邦法讀法之典廢後儒於是乎有郷約之舉藍田吕氏之言可徴也我太祖髙皇帝立里社郷厲之祭因以禮義法禁勸戒斯民即古屬民讀法之意而又頒聖訓六言以木鐸徇於天下雖深山窮谷咸使聞知大誥三編及教民榜文其於五常之訓養親祀先教子睦族勤生業厚閭里舉善懲惡之事言之不一而足而尤諄諄者同里之義孝子順孫義夫節婦則里甲老人奏聞士農工商各守本業毋許閒惰則賢者良者互相勸勉見丁著業用心生理則老人督併勸民為善細㣲事務互相含忍則本里人民懇切告戒五常不率則郷髙年并年壯豪傑者㑹議戒訓斯亦曷非鄉約之意哉歴嵗既久奉行廢忽而不知所存者諸鄉村春秋社稷而農巫告賽亦非欽降之文其在城郭方隅則社厲之禮守宰行之法戒雖明而環聽無㡬然則申聖代之明謨述前賢之彛訓以淑郷閭以厚風俗行之豈不以坊郭為首乎坊郭阜蕃當以禮義舊家衣冠長者倡之古族師月吉則行或恐太繁黨正以四孟吉時行之似可依也凡鄉約一遵太祖髙皇帝聖訓孝順父母尊敬長上和睦郷里教訓子孫各安生理毋作非為右六言各處訓釋非一言雖異述義則同歸毎㑹舉一處所釋者徐讀而申演之又依朱子増損藍田吕氏郷約四條徳業相勸過失相規禮俗相交患難相恤右四言各具條件定為約規毎百家或二三百家隨其逺近聫為一㑹衆推一人有齒徳者為約正有學行者二人副之一㑹共聖諭牌一靣立簿二扇一書同約姓名及舉約費用一記徳行一記過失牌與簿㑹首以次相𫝊㑹日擇公所預先陳牌案坐次通㑹皆深衣如期畢至三揖三讓升堂端肅班立賛者唱排班以次北靣各序立班齊鞠躬拜興拜興拜興拜興平身分班揖平身各就位坐定歌生進班依次序立庭前揖平身分班唱設講案鳴講鼓進講者宣演聖諭首二句畢揖平身皆坐唱歌詩司鼔鐘者依歌節奏送茶再進講次二句畢揖平身皆坐唱歌詩如前送茶三進講末二句畢揖平身皆坐唱歌詩如前送茶唱舉善行或舉有善行者約正副諗於衆無異詞遂書於徳行簿唱規過失或聞有過失者約正副戒之再次不改遂書於過失簿㑹首將本日費用書於費用簿畢皆興揖平身禮畢凡同㑹禮讓相先如進退升降立班坐次一以尊卑少長為序就坐各宜肅容端黙敬聽尊長教訓未達者宜虛心請教問答之間切戒神怪邪僻之語及私議朝廷州縣政事得失播揚他人過惡違者即當紏而書之毎㑹至晡乃退聖訓解孝順父母父母生身養身恩徳至大為人子者當孝順以報本平居則供奉衣食有疾則親嘗湯藥代其勞苦順其顔色務使父母身安神怡不至憂惱如父母偶行一事不合道理有違法度須要下氣再三勸諫如或不從則請父母素所交好之人婉辭勸諫務使不得罪於郷黨不䧟身於不義而後已此孝順父母之道也故聖祖教爾以此者欲爾盡事親之仁以為孝子順孫者也尊敬長上長上不一有本宗之長上若伯叔祖父母伯叔父母姑兄姊堂兄姊之類是也有外親之長上若外祖父母母舅母姨妻父母之類是也有郷黨之長上與祖同軰者與父同軰者與巳同軰而年稍長者皆是也本宗外親制服雖各不同皆當加意尊敬逺别則拜常㑹則揖行則隨行遞酒則跪命之起則起不命之坐不敢坐問則起而對食則後舉筯遇郷黨之先軰者則以伯叔稱呼同軰者則以兄長稱呼坐則讓席行則讓路此尊敬長上之道也故聖祖教爾以此者欲爾盡敬長之義以為賢人君子也和睦鄉里郷里之人居處相近田土相隣朝夕相見若能彼此和睦交相敬讓則喜慶相賀急難必相救患病必相扶持婚䘮必相資助有無必相借貸雖則異姓有若一家出入自無疑忌作事未有不成若不相和睦則爾為爾我為我孤立無助嫌疑易生作事難成豈能久處故聖祖教爾以和睦郷里者欲爾興仁興讓以成善俗也教訓子孫人家子孫自幼之時須教以忠信孝弟使知尊卑上下之分性資聰俊者擇明師教之務使徳器成就以為國用光顯門户若資性庸下不能讀書者亦要謹守禮法勤做生理切不可令其驕惰放肆自由自在則飲酒賭博無所不為家門必被其敗壊産業必被其浪費故聖祖教爾以教訓子孫者欲爾後昆賢達家門昌盛也各安生理耕種田地農之生理也造作器用工之生理也出外經營商之生理也坐家買賣賈之生理也至若無産無本不諳匠藝與人傭工挑脚亦是生理若能各安生理則衣食自足可以供義父母妻子可以持門户不為郷人所笑故聖祖教爾以各安生理者欲爾有衣有食不飢不寒也毋作非為若殺人放火姦盗詐偽搶奪掏摸恐嚇誆騙賭博撒潑教唆詞訟挟制官府欺壓良善暴横郷里凡一應不當為之事皆非為也人若為之大則身破小則吃打坐牢累及父母妻子若能安分守已不作非為自然安稳無禍故聖祖教爾以毋作非為者欲爾不犯刑憲保全身家也聖訓釋目孝順父母其一常禮凡子事親晨省昏定出告反靣飲食衣服不違其志奔走服役不敢辭勞毎事必禀命而行無或専制父或移於後母溺於妾媵偏於幼子亦當不見父之非委曲承順若婦事舅姑宜同子道一或有違子當以禮戒之甚者出之若父亡子事祖父母與嫡母繼母庶母如父存日方可為孝其二養疾父母有疾人子當常在左右扶持衣不解帶藥必先嘗尋訪名醫以求治療之方若俗尚祈禱設齋醮均係無益宜禁之若父母必欲則勉從以安其心其三諫過禮曰事父母幾諫父母行事偶有失道理違法度者須下氣柔聲諫之如不從則請父母素所交好之人婉辭諷諭所謂敬不違勞不怨必改方巳若過則稱親善則稱己不孝孰加焉其四䘮禮人子居䘮之禮只當哀痛不顧其他擇子弟知禮者一二人為䕶䘮悉遵文公家禮行之衣衾棺槨務極誠信修薦求福之事一切禁戒三年之内不得飲酒食肉混處家室尤可恨者俗拘年月不利遂不發哀不孝極矣深戒深戒其五𦵏禮𦵏者藏也藏者安也人子於親求以安之而已惟擇藏風聚氣水蟻不侵之所足矣慎勿拘泥風水禍福報應之說其有侵占他人山地者有冐認他人祖墳或利誘他人子孫遷𦵏竊買者有因無主舊墳棄屍竊𦵏者有連年暴露不知痛恤者甚至火化屍棺不以為慘所謂安其親者何在哉至於營造墳墓宜稱家有無富者吝財貧而厚𦵏均於不孝若俗以紙作金銀山錠獅象駝馬送䘮設酒席絹帛待客則悖禮當戒也其六祭禮孔子曰事死如事生孝之至也祭豈可忽自始䘮至追逺常祭務遵文公家禮其祭品在精不在豐在潔不在華稱家之有無行之必盡其誠可也尊敬長上其一處常事長之道當謙卑遜順常見則揖逺别則拜進酒則跪食則後長者不命之坐不敢坐問則起而對不問則不敢言或有事理當辨論有疑難當質問者必俟長者言畢乃陳巳意無得􅍴奪其稱呼並不許以名以字與父同軰者則稱呼以伯叔而父事之十年以長則稱呼以兄長而兄事之五年以長則肩隨之於道路則父之齒隨行兄之齒雁行若子弟謁外父母禮當侍坐舊有失者今宜改正其餘長幼徃来迎送之禮悉依居郷雜儀而行其二遇釁凡本宗外親尊長或遇之非禮或偶然起釁必反求諸已曲果在彼當婉辭謝之或理勢有不可已者當躬委曲陳其是非如不聽則告相知者諷諭之又不聽則告約正副斷之郷黨之長有争亦必婉辭請相知者諭以是非不聽告約正副斷之皆毋得厲聲抵觸以致詬詈訐訟有傷和氣和睦郷里其一禮讓郷里所以不睦者多因計較禮節責望施報今後凡事當存恕心古人謂人有不及可以情恕非意相干可以禮遣聞一好事恊力賛助見一過失盡言規諷毋謂我富而彼貧可欺毋謂我壯而彼老可侮毋占便宜毋尚詐偽毋靣是背非毋因飲食細故輙興鬬訟有一如此皆非居郷之誼悉宜省戒其二守望凡同約所以更相守望保禦地方無事則彼此獲安有變則同心恊力如盗賊所生發水火不測隣保務相應援救䕶此謂患難相扶持也如有臨事而坐視不赴者各保長告於約正副呈縣治罪仍量罰銀兩給被害之家為約中不義之戒乗機搶掠者計贓以竊盗論其三䘮病凡有父母兄弟妻子之䘮不能舉者有患病不能延醫措藥者約内議處措之或勸有力者濟之若借貸但令其償不責利息其四孤貧凡無子孫供養無父母兄弟可依者謂之孤飢無食寒無衣者謂之貧約内當恤之濟之若有反行欺侮凌害者此盗賊殘忍之性也約正等呈官治之教訓子孫其一養䝉人教子孫多姑息於嬰孩之時殊不知幼而不教養成驕惰長遂難改自其識人顔色知人喜怒之時便加教誨導以禮節防其欺誑使為則為使止則止有犯則嚴訓以禁之稍長入塾教以入事父兄出事長上而於孝弟忠信禮義㢘恥等語時常解講證以日用實事俾之易曉十五以上量其材質各守一藝以責其成其二隆師今人延師只求昜供應薄贄儀不知師道尊重則師徒嚴憚而教化易行反是則玩易而規矩不立故須擇端重誠慤剛明特達之士為師以教其子俾有所視效其人品卑汚舉止輕佻語言慢易及作文怪僻者雖有時名亦不足取庶㡬言動不涉於浮薄文辭不病於新竒而徳器之成就可望矣其各里大姓能剏建義塾延師教里中子弟有成效者約正副以聞於官加奬異焉其三冠禮禮曰冠者成人之道也三加一醮之禮亦簡易易行其延賓幣帛牲酒不必豐侈約正副時率子弟演習使觀感而興習以為常庻㡬古道可復中户以下力不及者亦不責偹其四婚禮婚禮之廢久矣女家責聘禮不充男家責籹奩不備遂至嫁娶愆期甚有淹溺子女者又有一等過簡便將聘禮折銀私自授受或止換庚帖舉族莫知遂至日後棄貧悔婚冐認强娶争訟之端實由此起自今婚定之後詳審良賤憑媒通知各從所願具一茶告報宗族凡諸儀節悉遵家禮行若仍有溺女悔婚冐認強娶及孀婦夫死未寒輙行聘定甚至聚衆攔搶者俱從法重治各安生理其一民生凡民各有生理且如為農而勤於耕種則稼穡有秋而農之生理安矣其間或有惰於農業耕耘不皆及時或地二熟只種一熟何以仰事俯育今後務宜勤力毋自怠惰至於商賈皆然農為衣食之本故特舉之其二士習士者民之望也進徳修業無欲速無見小斯無愧於為士邇来教道不明士習不善或謔浪歡狎取媚市童或詩酒豪放妄自髙大或縱談道徳不敦躬行或依托師友以文奸慝皆士之蠧也有則改之無則加勉如躬親駔驓之務手操吏胥之筆或囑託官府營殖巳私或凌鑠族閭不恤人言數者有一於此名教罪人豈可列於冠裳乎約正副從實告官以行止有虧論其三男務禮男不言内治外者男之生理也男子於士農工商各専一以奉公或售藝醫卜以濟物至於轉販以自食皆男之所有事也若不安生理而嬾惰飄蓬為家長者當諭以禮法檢束教導至必不可禁制然後以法治之其四女工禮女不言外治内者女之生理也苦操井臼勤紡織紉衣裳治酒漿謹祭祀皆女之所有事也其或内外混淆帷簿不謹抵觸公姑以及毁罵妯娌欺凌宗族傷敗風化者罪坐夫毋作非為其一毋窩盗賊地方不寜莫甚於盗賊盗賊滋蔓實由於窩隠窩隠無地盗何所容今後各保内或家長或子弟軰凡百里之外出不拘歸期久近俱要報於同保及約正副囘日如前報知其有外府縣投住者或親或有貨物商人不拘在家久近初到與起程之日亦一體如前報知同保仍察其來歴如有出沒無定形迹可疑者約正副共戒飭之盗情顯露明知窩隠者報官以法處之雖不知情難逃不檢之罪約正副率衆攻之其二毋受投獻今之奸民有將互争産業及混占他人田土投献勢豪之家或稱典當或稱轉賣或資酒食或得半價又有身為不善恐事敗露仗其庇覆以滋凶惡者勢豪知利而不知義公然掩為巳業收為爪牙不知一日勢去則此業此軰又將轉而為他人矣爾之子孫能保守乎約内凡有投献者約正副覈實勸諭召原主而歸之亦不許奸刁之徒乗此冐認輙行告争其三毋酗博訕訟酗謂縱酒無頼博謂賭博財物毎見市井五七成羣誘良家子弟賭博飲酒宿娼耗用無經傾敗立至訕謂毁謗善人以無為有以有為無顚倒是非其類不一訟謂欺壓良善誣人罪名教唆代告以訟為主是也凡此邑之大蠧宜痛加省改怙終不悛者約正副告官處之其四毋圖頼人命尚氣輕生世之薄俗有偶因争訟忿或負欠錢穀一家服毒圖頼一家亦服以相抵兩人俱死及或兄弟夫婦争利亦然又有或將老幼殘疾教令服毒或投水或自縊或將病故之人妄揑打死圖頼財物煩擾官司其禍甚􅃤其情可惡今後凡有此者約正副率同約騐實情輕責令自行埋𦵏仍重加責罰故殺情重者率被害人赴官告理其五毋拖欠稅糧先公後私庶民定分奸頑之民不肯及時完納稅糧負累里長杖併賠貱殊不知巳享租利之入使人剥膚椎髓是何心哉今後稅糧不許恃頑愆期亦不許糧里巧立名色逼竄貧民又有買田未經收糧貽累田主輸納者其惡尤甚於拖糧所當戒之其六毋鬬奪鬬有三今俗有忿集衆執持兇器相毆者有因忿以酒食相勝争覔異品盛設筵宴或出銀謝中多至數十兩其作中者利於得謝愈搬弄是非構成大釁報復相尋又有因時節賽㑹粧飾神船搬演戲文施張燈火鳴金放銃彼此相角亦謂之鬬是皆敗俗糜財有損無益奪亦有二有市井無頼白畫攔街奪人財物者有當客商要路邀截貨物牲口或假稱盤詰公然奪去者或賤價強買者凡此皆宜速改犯者約正等請官以法治之其七毋偽造近来一種奸貪之徒専一偽造低假之銀名為神仙包銅貫鉛鹽燒青花光鐵等項不一俱充白銀行使小民被其騙害至有夫婦自縊者此其為害足以殺人犯者約正送官懲治至於升斗等秤亦無得大小輕重以滋奸弊其八毋霸占水利水利闗係民用甚大官豪坡圳及民間公塘徃徃有恃强霸占者以至柔善之田荒旱無收自今務在均平凡陂塘之當䟽濬者當築隄者約正副率衆及時為之遇耕耘之日挨次車放灌救毋得阻占及穵壊陂圳利己損人其九毋違例取債凡借放錢債貧富均為有益富無貧者所干利息何由而生貧無富者相假患難何從而給若富而取盈謂之不仁貧而負騙謂之不義各宜省改今後放債利息不得過二分三分如有年月過期疊筭不休或故令殘疾老幼填門或捉鎖私家准折田畆而負債硬頼不償反為刁告者是皆自速其禍約正副告官從重治之其十毋侵占産業凡郷里中争競多起於田業買者或掯留價值不付或套典不與杜絶或其成片不與贖囘或恃强侵占那移年月假立契券賣者或盗賣重賣與强賣或多勒價錢又有强梁之徒賣田與人不由田主換佃者有耕人田土不肯依時輸租者有遇天年荒旱仍要佃户納租者有豪强欺凌貧弱占人田産者皆為可惡各宜省改其十一毋强主山林山林之利民用所資除用價所買及墳山管業久逺明白外其餘官山官地及隂注坡湖原無定主者聽人樵採瀦水若豪强冐認稱主樹立界牌阻人得利及放人故燒茅嶺松山沿燒人房屋并盗伐他人墳塋内樹木者約正副告官一體從重究治其十二毋縱牲食踐田禾畦菜豆麥皆民生衣食之資豪横之徒毎縱放牛馬猪羊鵝鴨踐食佃人告白反致嗔怒反而思之我之所種者他人縱牲畜食踐我能容乎已所不欲自當勿施於人其十三毋縱下侮上良賤上下不可不嚴近來豪右多養豢猾桀之徒為伴當義男以張威勢縱其强暴肆無忌憚雖屬親黨師友亦肆欺侮凌辱及告其主畧不加意殊不知豪奴悍僕惡不可縱今日欺其主之親屬他日安知不欺其主之子孫乎自今嚴加戒飭如有不悛罪歸其家長焉其十四毋傲惰奢侈俗有浮薄子弟倚勢自傲恃富自惰曽不思傲乃䘮徳惰乃䘮家害不在人又郷俗本來尚儉近日富家漸侈居室輿馬飲食衣服日見華靡犯分傷財弊不可長自今持巳當謙勤處家當節儉毋蹈前非自取傾覆其十五毋崇尚邢術民俗有等非僧非道之人倡北方白蓮之教徃徃全家齋素誘引婦女敗傷風化此左道亂政者也律有重刑毋貽後悔如有違教不悛仍在地方者約正副即便呈官治之其十六毋屠宰耕牛私宰耕牛法例嚴禁各該地方有等交通賊徒盗牛開剥病農肆姦及牧牛之家牛壯則用其力力盡則付之屠宰忍心至此其惡尤甚於盗者自今即行禁革敢有仍蹈前惡呈縣重治徳業相勸徳謂見善必行聞過必改能治其身能治其家能事父兄能教子弟能御僮僕能肅政教能事長上能睦親故能擇交逰能守廉介能廣施惠能受寄託能救患難能𨗳人為善能規人過失能為人謀事能為衆集事能解鬭争能决是非能興利除害能居官舉職業謂居家則事父兄教子弟待妻妾在外則事長上接朋友教後生御僮僕治生讀書治田營家濟物畏法令謹租賦好禮樂射御書數之類皆可為之非此之類皆為無益右件徳業同約之人各自進修互相勸勉㑹集之日相與推舉其能者書於籍以警其不能者過失相規過失謂犯義之過六犯約之過四不修之過五犯義之過一曰酗博鬬訟酗謂縱酒喧競愽謂賭愽財物鬬謂鬬毆罵詈訟謂訐人罪惡意在害人誣頼争訴得已不巳若事干負累為人侵損而訴之者非二曰行止踰違踰禮違法衆惡皆是三曰行不恭遜侮慢齒徳者持人長短者恃强凌人者知過不改聞諫愈甚者四曰言不忠信或為人謀事䧟人於惡或與人要約退即背之或妄說事端熒衆聽者五曰造言誣人誣人過惡以無為有以小為大靣是背非或作嘲咏匿名文書及發摘人之私隠無狀可求及妄談人之舊過者六曰營私太甚與人交易傷於掊克者專務進取不恤餘事者無故而好干求假貸者受人寄託而有所負者犯約之過一曰徳業不相勸二曰過失不相規三曰禮俗不相成四曰患難不相恤不修之過一曰交非其人所交不及士庶但凶惡及游惰無行衆所不齒者而已朝夕與之逰處則為交非其人若不行已而暫徃還者非二曰遊戲怠惰逰謂無故出入及謁見人士務閑適者戯謂逰笑無度及意在侵侮或馳馬擊􅀈及賭􅀶財物者怠惰謂不修事業及家事不治門庭不絜者三曰動作無儀謂進退太踈野不及恭者不當言而言者衣冠太華餙及全不完整者不衣冠而入街市者四曰臨事不恪主事廢忘期㑹後時臨事怠惰者五曰用度不節謂不計有無多為費用者不能安貧非道營求者右件過失同約之人各自省察互相規戒小則宻規之大則衆戒之不聽則㑹集之日直月以告於約正約正以義禮誨諭之謝過請改則書於籍以俟其争辨不服與終不能改者皆聽其出約禮俗相交禮俗之交一曰尊幼軰行二曰造請拜揖三曰請召送迎四曰慶弔贈遺尊幼軰行凡五等曰尊者謂長於已三十嵗以上在父行者曰長者謂長於已十嵗以上在兄行者曰敵者謂年上下不滿十嵗者長者謂稍長少者謂稍少曰少者謂少於已十嵗以下者曰幼者謂少於巳二十嵗以下者造請拜揖凡三條曰凡少者幼者於尊者長者嵗首冬至四孟月朔辭見賀謝皆為禮見皆具門狀用幞頭公服腰帶靴笏無官具名紙用幞頭襴衫腰𢃄繫鞋惟四孟通用㡌子皂衫腰𢃄凡當行禮而有他故皆先使人白之或遇雨雪則尊長先使人喻止來者此外候問起居質疑白事及赴請召皆為燕見深衣凉衫皆可尊長令免即去之尊者受謁不報嵗首冬至具已名榜子令子弟報之如其服長者嵗首冬至具榜子報之如其服餘令子弟以巳名榜子代行凡敵者嵗首冬至辭免賀謝相徃還名狀名紙同上惟此服㡌子凡尊者長者無事而至少者幼者之家惟所服深衣凉衣道服背子可也敵者燕見亦然凡見尊者長者門外下馬俟於外次乃通名凡徃見人入門必問主人食否有他客否有他幹否度無所妨乃命展刺有妨則少俟或且退皆倣此主人將命者先出迎客客趨入至廡間主人出䧏階客趨進主人揖之升堂禮見四拜而後坐燕見不拜旅見則旅拜少者幼者自為一列幼者拜則跪而扶之少者拜則跪而荅其半若尊者長者齒徳殊絶則少者幼者堅請兩拜尊者許則立而受之長者許則跪而扶之拜訖即揖退主人命之坐則致謝請揖而坐之退凡相見主人語終不更端則告退主人有倦色或方此幹事而有所俟者皆告退可也後倣則主人送於廡下若命之上馬則三辭許則揖而退出大門乃上馬不許則從其命凡見敵者門外下馬使人通名候於廡下或㕔側禮見則再拜稍少者先拜旅見則侍拜退則主人請就階上馬徒見則主人送於門外凡少者以下先遣人通名主人具衣冠以俟客入門下馬則趨出迎揖升堂來報禮則再拜謝客止之則止退則就階上馬客徒至則迎於門之外送亦如之仍隨其行數歩揖之則止望客去既逺然後入凡遇尊長於道皆徒行則趨進揖尊長與之言則對不則立於道側以俟尊長已過乃揖而行或皆乘馬於尊者則廻避之於長者則立馬道側揖之俟過乃揖而行若已徒行而尊長乘馬則廻避之凡徒行遇所識乘馬皆倣此若已乘馬而尊長徒行望見則下馬前揖已避亦然過既逺乃上馬若尊長令上馬則固辭遇敵者皆乘馬則分道相揖而過彼徒行而不及避則下馬揖之過則上馬遇少者以下皆乘馬彼不及避則揖之而過彼徒行不及避則下馬揖之於幼者則不必下可也請召迎送凡四條曰凡請尊長飲食親徃投書禮薄則不必書専召他客則不可兼召尊長既來赴明日親徃赴謝之召敵者以書簡明日交使相謝召少者用客目明日客親徃謝曰凡聚㑹皆郷人則坐以齒非士類則不若有親則别序若有他客有爵者則坐以爵不相妨者猶以齒若有異爵者雖郷人亦不以齒異爵謂命士大夫以上今陞朝官是若特請召或迎勞出餞皆以専召者為上客如婚禮則姻家為上客皆不以齒爵為序凡燕具初坐别設桌子於兩楹間置大盃於其上主人降席立於桌東西向上客亦降席立於桌西東向主人取盃親洗上客辭主人置盃桌子上親執酒斟之以器授執事者遂執盃以獻上客上客受之復置桌子上主人西向再拜上客東向再拜興取酒東向跪祭遂飲以盃授贊者遂拜主人答拜若少者以下為客飲畢而拜則主人跪受如常上客酢主人如前儀主人乃獻衆賔如前儀唯獻酒不拜若衆賔中有齒爵者則特獻如上客之儀不酢若婚㑹姻家為上客則雖少亦答其拜曰凡有逺出逺歸者則送迎之少者幼者不過五里敵者不過三里各期㑹於一處拜揖如禮有飲食則就飲食之少者以下俟其既歸又至其家省之慶弔贈遺凡四條曰凡同約有吉事則慶之冠子生子預薦登第進官之屬皆可賀婚禮雖曰不賀然禮有曰賀娶妻者葢但以物助其賔客之費而已有凶事則弔之䘮𦵏水火之類毎家只家長一人與同約者俱徃其家問之如家長有故或與所慶弔者不相接則其次者自當之曰凡慶禮如常儀有贈物用幣帛酒食果實之屬衆議量力定數多不過三五千少至一二百如情分厚薄不同則從其厚薄或其家力有不足則同約為之借助器用及為營幹曰凡弔禮聞其初䘮聞䘮同未易服則率同約者深衣而徃哭弔之凡弔尊者則為首者致辭而旅拜敵以下則不拜主人則答之少者以下則扶之不識生者則不弔不識死者則不哭且助其凡百經營之事主人既成服則相率素幞頭素襴衫素帶皆以白生紗絹為之具酒果食物而徃奠之死者是敵以上則拜而奠以下則奠而不拜主人不易服則亦不易服主人不哭則亦不哭情重則雖主人不變不哭亦變而哭之􅉠禮用錢帛衆議其數如慶禮塟又相率致賵俟發引則素服而送之賵如􅉠禮或以酒食犒其役夫及為之幹事及卒哭及小祥大祥皆常服弔之曰凡䘮家不可具酒食衣服以待弔客亦不可受曰凡聞所知之䘮或逺不能徃則遣使致奠就外次衣帛服再拜哭而送之惟至親篤友為然過朞年則不哭情重則哭其墓右禮俗相交之事直月主之有期日者為之期日當紏集者督其違慢凡不如約者以告於約正而詰之且書於籍患難相恤患難之事七一曰水火小則遣人救之甚則親徃多率人救且弔之二曰盗賊近者同力追捕有力者為告之官司其家貧則為之助出募賞三曰疾病小則遣人問之甚則為訪醫藥貧則助其養疾之費四曰死䘮乏人則助其幹辦乏財則賻贈借貸之五曰孤弱孤遺無依者若能自贍則為之區處稽其出入或聞於官司或擇人教之及為求婚姻貧者恊力濟之無令失所若有侵欺之者衆人為之辨理若稍長而放逸不檢亦防察約束之毋令䧟之於不義六曰誣枉有為人誣枉過惡不能自伸者勢可以白於官府則為言之有方畧可以救觧則為觧之或其家因而失所者衆共以財濟之七曰貧乏有安貧守分而生計大不足者衆共以財濟之為之假貸置産以嵗月償之右患難相恤之事凡有當救恤者其家告於約長急則同約之近者為之告約正命直月徧告之且為之紏集而程督之凡同約者財物器用車馬人僕皆有無相假若不急之用及有所妨者則不必借可借而不借及踰期不還及損壊借物者論如犯約之過書於籍隣里或有緩急雖非同約而先聞知亦當救助或不能救助則為之告於約同而謀之有能如此者則亦書其善於籍以告郷人社倉規條社倉之制乃古人良法積榖賑饑亦斯人之良心特患上之人不知所以倡之耳有父母斯民之責者果知民為邦本食為民天水旱之凶荒不時官倉之積榖有限思為備荒之善䇿須酌社倉之事宜乃計之最得也合於各保甲郷約中各創立社倉先捐俸金以為倡率或罰紙贖以便上納且誠心勸諭各村士民使咸知以義相尚不待督責而榖皆其情願徐因倉置簿登記其數凡出榖多者則破格旌奬民其有不以義相從者乎况因時制宜隨俗勸諭或禁止神廟賽㑹定為香錢或違犯郷保規條畧示懲罰由此日積月累則一村之榖自足以養一村之民毎年青黄不接之時令其出放息止加二小饑加一大饑免息成熟之年仍令各村量行添入此法若行之有常三數年間各村之榖殆將不可勝食但民之誠偽不一而官司之意向不同若非出納有經奸民或因之以滋侵漁負騙之私官司或移之以補官倉積貯之數是非惟無益於民而且有害於民也然使經官盤查則又重為民累合無免其查盤止於府縣給印文簿付約正副毎嵗稽查然各村管理收放即於本郷毎年輪一公直殷實者以司出納量與免其火夫丁差以示酬勸如此則奸民不得以負騙官司不得以那移即遇水旱凶災復有官榖以濟之自是貧者不患於阻饑富者可免於勸借而盗賊亦因以潜消地方之民永有頼矣一社倉之設本以為一鄉也榖以義名則當以義相先斯為善俗除捐俸發紙贖以為之倡及士民尚義出榖多至百十䂖者不可為例大凡當秋熟之時或毎畆量出榖半升或通郷各户富者以䂖計貧者以升斗計俱報數約正副登簿保長收入社倉毎春有闕食者量准借與就於保長處㑹同約正副批立合同登記簿籍候秋收之日加息二分納還但借榖者亦不得多至十石以外恐一人恃頑無耻催收稍難則將并一郷之義舉而壊之也一毎遇年荒大户例有勸借葢官榖有限各村又無義榖故也若使村村有榖則一郷之積自足以供一郷之人加以縣倉積有官榖勸借之事以後可免且尚義出榖而使本郷之人俱感其惠亦處富和郷之一道也不然富本衆所忌也積心慳吝因而阻壊義舉設遇凶荒寧能獨保其富哉一出榖雖非貧者之事而嵗時豐稔或一斗或二三斗亦可量力出辦凖與荒年揭借義榖亦有數倍之利若豐收之時斗榖不肯出者荒歉之年義榖官糧俱不准與一各郷舊有土神廟即有社祭之禮但俗尚奢侈因而迎神賽㑹花費不貲不特䙝凟神明幽有鬼責致怠事端且明有人非從今郷約舉行一切禁止或有情愿施捨兾神佑助即宜凖作香錢自家告諸神明登記郷約簿積為義榖以濟人貧難不其神人兩得之乎毎嵗春秋祈報買辦猪羊酒果香燭等項即於義榖内支用祭畢舉行社飲申明約法和睦鄉里庶彬彬然成禮讓之俗矣或有貧不能存䘮不能舉者亦於義榖内量給以助之皆須㑹衆公議而後動支各明白登簿以備稽查毋得徇私濫支冐破一各村納榖或社倉未備權借民間空房收貯待置倉後再行收入或郷村空曠苦於看守不願立倉者即公議積貯亦從其便一給借固貴均平亦慮䧟失榖本毎年支借之時須㑹衆公議量其可借方准托保借與敢有輕借游手無頼之人以致負騙及强梁奸貪之徒以示私恩俱於收管人名下追賠其收管人亦不得揑開花名私取規利者衆共呈官追罰若出入公明毎年亦宜量給以酬收管之勞社學規條竊聞古之教者教以人倫後世記誦詞章之習起而先王之教亡今教童子惟當以孝弟忠信禮義廉恥為専務其栽培涵養之方則宜誘之以歌詩以發志意𨗳之習禮以肅威儀諷之讀書以開知覺今人徃徃以歌詩習禮為不切時務此皆末俗庸鄙之見烏足以知古人立教之意哉大抵童子之情樂嬉逰而憚拘束如草木之始萌芽舒暢之則條達摧撓之則衰痿今教童子必使其趨向鼓舞中心喜悅則其進自不能已譬之時雨春風霑被卉木莫不萌動勃發自然日長月化若氷霜剥落則生意蕭瑟日就枯槁矣故凡誘之歌詩者非但發其志意而已亦所以洩其跳唬呼嘯於咏歌宣其幽抑結滯於音節也導之習禮者非但肅其威儀而已亦所以周旋揖讓而動蕩其血脉拜起曲伸而固束其筋骸也諷之讀書者非但開其知覺而已亦所以沉潛反復而存其心抑揚諷誦以宣其志也凡此皆所以順𨗳其志意調理其性情潛消其鄙吝黙化其粗頑日使之漸於禮義而不苦其難入於中和而不知其自是葢先王立教之微意也若近世之訓䝉穉者惟日督以句讀課程責其檢束而不知導之以禮求其聰明而不知養之以善鞭撻繩縳若待拘囚彼視學舎如囹圄而不肯入視師長如冦讐而不欲見規避掩覆以遂其嬉逰設詐飾詭以肆其頑鄙偷薄庸劣日趨下流是葢驅之於惡而求其為善也何可得乎此陽明先生訓䝉大意今復申明以諭各村教讀其教讀悉心體㑹遵行教諭郷之子弟其郷保條規及附刻律禮亦要隨方講說以勸諭子弟之父兄庶使子弟之䝉童者即知禮義而父兄之不學者亦知信從乃不負其責成之意一毎日清晨諸生㕘揖畢教讀以次遍詢諸生在家所以愛親敬長之心得無懈忽未能真切否温凊定省之儀得無虧闕未能實踐否徃來街衢歩趨禮節得無放蕩未能謹飭否一應言行心術得無欺妄非僻未能忠信篤敬否諸童子務要各以實對有則改之無則加勉教讀復隨時就事曲加誨諭開發然後各退就席肄業一凡歌詩須要整容定氣清朗其聲音均審其節調毋躁而急毋蕩而囂毋餒而懾久則精神宣暢心氣和平矣毎學量童生多少分為三班毎日輪一班歌詩其餘皆就席斂容肅聽一凡習禮須要澄心肅慮審其儀節度其容止毋忽而惰毋沮而怍毋徑而野從容而不失之迂緩修謹而不失之拘局久則禮貎習熟徳性堅定矣亦如前分為三班日輪一班習禮餘皆就席斂容肅觀一凡授書不在徒多但貴精熟量其資禀能二百字者止可授以一百字常使精神力量有餘則無厭苦之患而有自得之美諷誦之際務令専心一志口誦心惟字字句句紬繹反復抑揚其音節寛虛其心意久則義理浹洽聰明日開矣一毎日工夫先考徳行次背書誦書次習禮或作課次復誦書讀書次歌詩凡習禮歌詩之類皆所以常存童子之心使其樂習不倦而無暇安於邪僻教者如此則知所施矣雖然此其大畧也若夫隨方誨誘使知趨向則在各教讀以意而推廣焉保甲鄉約社倉社學總論經國莫先於立法法制既定則張而理之而紀綱振於上矣立法莫要於便民民情既順則驅而從之而禮教興於下矣何為而必於法之立也廣谷大川異制民生其間異俗剛柔遲速異齊使法有不立民將曷從何為而必於民之便也以定民志以厚民生以正民徳使情有不恊法將安用君子知上下本一體也情法本相維也惟法立而民便則民皆見其利而不見其害夫是之謂良法惟情順而法行則民將日遷於善而不罹於刑夫是之謂良民盡天下皆良民而相忘於法雖帝王之法何以加此是故法莫詳於周而考周之法莫詳於周禮地官司徒所以掌邦教而保王安擾邦國者也而其所以安擾之法不有足稽乎彼五家為比使之相保則比有長以帥之五比為閭使之相受則閭有胥以帥之四閭為族使之相塟則族有師以帥之五族為黨使之相救則黨有正以帥之五黨為州使之相賙則州有長以帥之五州為郷使之相賔則郷有大夫以帥之上之統斯民者何其肅也州長各掌其州之教治政令正月之吉各屬其州之民而讀法以考其徳行道藝而勸之以紏其過惡而戒之嵗時祭祀州社屬民讀法亦如之黨正四時之孟月吉日屬民而讀邦法以紏戒之族師月言屬民而讀邦法凡孝悌睦姻有學者則書之閭胥春秋之祭祀役政䘮紀之數聚衆庶既比則讀其法凡敬敏任恤者則書之上之教斯民者何其詳也夫比閭族黨所以因民情之樂生而安之也而後世保甲之法其肇於斯乎屬民讀法所以因民情之好善而導之也而後世郷約之法其肇於斯乎自周而下漢唐或廢之不行宋或行而未善此治化所以不能比隆成周矣雖程伯子曽舉保甲於晉城而止於一邑吕氏曽舉郷約於藍田而止於一郷何怪乎古道之日㣲耶洪惟我太祖髙皇帝作民君師而立之法紀夫固盡善而盡美矣十户為甲甲有首百户為里里有長是即比閭族黨之法也因里社郷厲之祭示以禮義禁令之詳是即屬民讀法之意也恭覩大誥三篇教民榜文及聖訓六言真可與周禮並𫝊矣但法久而弊滋時變而勢異里甲移徙不常而居或相逺得不因民情之便而聮屬之哉要必隨其城邑郷村無論貴賤貧富編定十家為甲立甲長十保為黨立黨正使其出入相友貧乏相助平居則互相覺察有警則互相救援如此而盗賊有不息者乎隨其居之逺近踈密舉里社鄉厲於以申明國朝之聖訓斟酌吕氏之規條使其道義相勉禮讓相先善則記之以示勸過則罰之以示懲如此而争訟有不息者乎然而成周之治化終不可復者何也葢成周因比閭族黨户居而即寓夫伍兩卒徒之衆因屬民讀法之禮而即行夫郷舉里選之規以其一本於井田學校而教養之兼備故民不必出粟以養兵而自養自衛盗何從而起也民皆欲敦行以待舉而有恒心訟何自而興也今也欲行井田之政固已難矣茍師其意不師其迹不尚有可潤色者在乎彼厚生正徳民之情也保甲固足以弭盗矣然富者得以保其財而貧乏何能以自給也莫若於一保之中共立社倉以待乎凶荒之賑則衣食有藉庶乎禮義其可興矣郷約固足以息争矣然長者得以讀其法而子弟不可以無教也莫若於一約之内共立社學以豫乎童䝉之訓則禮教相尚庶乎道徳其可一矣可見四者名雖殊而實相須也以此行之一郷則盗息民安政平訟理孔子所謂觀於鄉而知王道之易易也使各鄉皆如此焉郡縣其有不治乎各郡縣皆如此焉天下其有不太平乎以立法制以便民情要在握化理之權者加之意焉耳圖書編巻九十二
