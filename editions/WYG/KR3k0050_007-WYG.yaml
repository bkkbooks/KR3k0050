為脾胃在體為肉為腹在性為柔順慳吝在色為黄及黒在味為甘在聲為宫音歌唱在津為痰在官為將相公卿工部職司下則為農司掌財穀之官縣尹丞簿之列在事為衆聚合和順平易為遲緩在天干為戊巳之正屬在地支為未申之相乘在神為城隍土地等神在鬼為家親地主在六神為螣蛇在數為八六在物為絲帛布綿麻葛錢幣衣物在器為釡甑犁鉄陶冶農具車軸斧錫為大輿厚載土塹周方静重之具在疾為吐痢腫脹氣滿蠱腹虚黄脾胃不順之症在刑為遲緩徒流杖責在物又為潤厚軟美卓方之類在禽為鳯鵲鸚鵡鳩雀祥瑞在獸為子母牛牝馬駞麋虫螢等物在水族為蛟虬大魚在飲食為麵食糕粉餅腐輕潤温軟之物為大牢各食不等在時為夏末秋初在氣為温和濕蒸其象見金為子孫見木為官鬼見水為妻財見火為父母見土為兄弟生旺墓絶與艮離同此乃坤宫土象之占玩也兊正西象位也先天位乎東南效法象澤外乾象履内乾象夬外坎象節内坎象困外艮象損内艮象咸外震象歸妹内震象隨外㢲象中孚内㢲象大過外離象暌内離象革外坤象臨内坤象萃其象兊在上恱乎外在下恱乎内金火隂四月卦節秋分在天為霜露隂在地為郊山泉澗澤石池山溝石縫瀑泉剛鹵之地在人為少女為妾得令者為貞為烈失令者為邪為淫又為文學師友在臟為膀胱在體為口輔皮毛在性為多言機變文秀聰明在色為白瑩在味為辛在聲為商音為哭在津為淚在事為誘引為巫蠱口舌毁折附决在天干為庚辛夾拱在地支為正酉在官為兵刑將校推官為文學考校為司獄鞭笞之職在神為大白金神在鬼為血傷女鬼在六神為白虎在數為二四在器為金石之具為白磁碗盞刀劍為口向上之物在疾為跛𦕈咳𠻳痰飲肺痿之症在刑為奸偽徒黔之責在物為堅剛細巧悦澤奇玩之貨在時為秋在氣為涼在禽為雞鴈鷂鴿鷹鶻之類在獸為猫虎狐狸羊麂在水族為豚魚鱖鱑之列在飲食為牛羊鷄雉酒槳俎醖之味帶角尖角菱果之類其六親生尅旺墓與乾金一例用之此為兊宫金象之占玩也按八卦物象各以羣分類聚而天地萬物管是矣此所以即卦爻而盡萬物之數也善學易者虚盈消息與造化同流故吉凶悔吝知幾其神豈盡假䜟緯術數以推驗之哉圖書象數總論凡吾説圖之意所以明其為活數我數也天地之用水火二物而已造化太初水火同原其始也水胎火於正北火騰水於正南水火交而金木生以正物命其繼也木金反於水火火又反於水歸藏母胎以端化原於是乎有數傳稱物生而有數數而有滋滋而有象是也是數也者精氣洩含之故神明變化之則萬物萬事所由綱紀其終始者也自一至九樊然有矣而自有反之初又何其無焉一函而九已具九究而一不増精神往來不可方物夫是以生生而不窮而安可泥守耶蓋易活數也儒者謂圖象天地萬物始終之理觀圖以察天地始終之理信斯言也則吉凶大業何與于人不知圖以示中大初之原是也知此而後知數所由起知所由起而後可得而用故歸三八四九於二七歸二七於一六而一歸無朕則中可覩河圖之妙象也歸六十四卦於八卦歸八卦於乾坤而歸乾中於吾喜怒哀樂之未發則中在我羲文周孔之深意也夫喜怒哀樂愚夫愚婦所必有而圖之中在焉則天地萬物始終之理豈不在人哉是我數也然則喜怒哀樂亦有數歟曰數者節也斵輪徐則甘而不固疾則苦而不入不疾不徐得於心而應於手口不能言有數存焉吾人灑掃應對進退辭譲之間徐則固疾則不遜不疾不徐根於心施於四體不言而喻亦有數存焉如從一至十之不可遺不可紊也是所謂節也是以不凟不謟謂之知幾之神而或徐焉則多於數或疾焉則不足於數亂於威儀見乎四體是謂冒貢於非幾非幾凶悔吝隨之矣則喜怒哀樂不有數數不在我哉此吾所為説圖意也若夫考三九以稽理亂陳範數以稽福極抑末已非圖書之本㫖矣雖然豈易言哉象月者白為望黒為晦半為兩弦似矣至合璧則無所措其巧何者合璧黒白同也判之非合半之非璧則示意于黒白純半之表使人以意取於白黒純半之表得其所謂黒白同者抑良工苦心矣圖書亦然象陽以竒象隂以偶左乾右坤如月之弦亦似矣至坤復晦朔亥子呼吸之際則無所致吾意何者彼非竒偶非非竒偶非竒偶錯亦非非竒偶錯蓋竒偶同也竒偶之象止及於晦朔亥子呼吸而不及其際其際則非晦朔亥子呼吸而實晦朔亥子呼吸同故也君子將神明所歸得所謂晦朔亥子呼吸同者亦惟于竒偶純半之表深研所起意冥焉而得之心應之手可矣然世之見竒者竒見偶者偶見竒偶錯者則竒偶錯亦孰能反所自起㝠㑹其無晦朔亥子呼吸而實晦朔亥子呼吸同者以真握其全數于我哉無惑駢枝疊架之學盈乎天下心源為天下塞而斵輪者之所笑也甚且以為怪妄而棄之亦重可惜矣予少見村兒承蜻蜓者愛而握之掌不握且飛去握之固且死且棄之知罪蜻蜓之死而不自反其以死握之也夫非愛蜻蜓愛所以使蜻蜓者而使蜻蜓者則在離合疾徐之間讀圖書者亦惟無死握之而㝠之此心離合疾徐之間則羲文周孔之意得矣易繫辭曰天地絪緼萬物化醇男女構精萬物化生周子曰無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉周子曰水隂根陽火陽根隂五行隂陽隂陽太極四時運行萬物終始混兮闢兮其無窮兮邵子曰物之大者無若天地然而亦有所盡也天之大隂陽盡之矣地之大剛柔盡之矣隂陽盡而四時成焉剛柔盡而四維成焉夫四時四維者天地至大之謂也凡言大者無得而過之也亦未始以大為自得故能成其大豈不謂至神至偉歟天生于動者也地生干静者也一動一静交而天地之道盡之矣動之始則陽生焉動之極則隂生焉一隂一陽交而天之用盡之矣静之始則柔生焉静之極則剛生焉一剛一柔交而地之用盡之矣動之大者謂之太陽動之小者謂之少陽静之大者謂之太隂静之小者謂之少隂太陽為日太隂為月少陽為星少隂為辰日月星辰交而天之體盡之矣大柔為水大剛為火少柔為土少剛為石水火土石交而地之體盡之矣日為暑月為寒星為晝辰為夜暑寒晝夜交而天之變盡之矣水為雨火為風土為露石為雷雨風露雷交而地之化盡之矣暑變物之性寒變物之情晝變物之形夜變物之體性情形體交而動植之感盡之矣雨化物之走風化物之飛露化物之草雷化物之木走飛草木交而動植之感盡之矣走感暑而變者性之走也感寒而變者情之走也感晝而變者形之走也感夜而變者體之走也飛感暑而變者性之飛也感寒而變者情之飛也感晝而變者形之飛也感夜而變者體之飛也草感暑而變者性之草也感寒而變者情之草也感晝而變者形之草也感夜而變者體之草也木感暑而變者性之木也感寒而變者情之木也感晝而變者形之木也感夜而變者體之木也性應雨而化者走之性也應風而化者飛之性也應露而化者草之性也應雷而化者木之性也情應雨而化者走之情也應風而化者飛之情也應露而化者草之情也應雷而化者木之情也形應雨而化者走之形也應風而化者飛之形也應露而化者草之形也應雷而化者木之形也體應雨而化者走之體也應風而化者飛之體也應露而化者草之體也應雷而化者木之體也性之走善色情之走善聲形之走善氣體之走善味性之飛善色情之飛善聲形之飛善氣體之飛善味性之草善色情之草善聲形之草善氣體之草善味性之木善色情之木善聲形之木善氣體之木善味走之性善耳飛之性善目草之性善口木之性善鼻走之情善耳飛之情善目草之情善口木之情善鼻走之形善耳飛之形善目草之形善口木之形善鼻走之體善耳飛之體善目草之體善口木之體善鼻夫人也者暑寒晝夜無不變雨風露雷無不化性情形體無不感飛走草木無不應所以目善萬物之色耳善萬物之聲鼻善萬物之氣口善萬物之味靈于萬物不亦宜乎陽交于隂而生蹄角之類也剛交於柔而生根核之類也隂交于陽而生羽翼之類也柔交於剛而生枝幹之類也天交於地地交於天故有羽而走者足而騰者草中有木木中有草也各以類而推之則生物之類不逃乎數矣走者便於下飛者利於上從其類也陸中之物水中必具者猶影象也陸多走水多飛者交也是故巨于陸者必細于水巨于水者必細于陸也在水而鱗鬛飛之類也龜獺之類走之類也飛之走雞鳬之類是也走之飛龍馬之屬是也按天開于子地闢于丑開物于寅氣化而已遂各從其類而生也是以三才隂陽之道各因其氣而成化育故乾道成男坤道成女禽獸草木則無俯仰所以不能成造化也人得氣之正首向上而體直有智而靈于物走飛得氣之偏頭横而體横無智植物得氣尤偏頭向下生但知生意其理渾然故聖人畫八卦以盡開物成務之道以八卦重為六十四卦以盡天下之事以乾坤為隂陽之本則乾坤為大父母復姤為小父母也以乾坤為萬物之本坎離為小父母也按先天卦乾坤定上下之位崇尊卑也坎離列左右之門主萬物也凡在天成象在地成形者莫不由乎其門乾坤坎離無反卦故居四正有反卦者居四隅而萬事萬物莫不在焉又按後天卦乾坤退位坎離得位以代生育之功若物之類動植飛走而已感於坎離㢲震屬乎胎卵濕化之生故曰四生以兊㢲震艮有反卦以屬變化者故曰六道其生物之道天類屬陽地類屬隂陽為動隂為植陽之陽為飛隂之隂為走動而飛者喜風而便于飛上走而植者喜土而利于走下類使之然也所謂走之類牝牡交則生不交則不生坎之象初上得坤隂㑹陽也故胎生者如搆精孕育本乎地之隂氣重濁而成體則先毛而後育受隂氣也故利而走下反此不善走坎為水水曰潤下從其類也飛之類雌雄不交亦生卵但無雛耳何哉離之象初上得乾陽外殻隂中黄本然之象故也本乎天之陽氣輕清而成體伏出而後羽受陽氣也故便於飛上反此不善飛離為火火曰炎上從其類也嘗聞牝雞失雄而生卵或教曰候之即時將卵入存火性灰内藏片時伏皆出雛騐之果然可見卵屬陽之象感外陽而入於内故也濕生者蟲魚之類蟲者風之屬㢲之象隂應而成質感陽氣而生魚者水之族兊之象感陽而成體敷隂氣而生㢲兊二陽一隂似乎離之體故虫魚之子似卵非卵不伏而出重陽故也㢲兊相反隂之交也故有敷隂澤之氣印於地之化此無形而生者也化生者陽感於隂而變者震之氣隂印於陽而化者艮之象此因形而化不復本形者也震艮相反陽之交也故有敷陽明之氣應於天之變此因形移易反歸舊形者也是以一隂一陽之謂道以盡天下生育之功一感一應之謂變以盡天地化育之功物之類豈逃於離坎之中乎邵子曰草伏之獸毛如草之莖林棲之鳥羽如林之葉類使之然也是故善觀道者必以物善觀物者必以道以大道觀天地則天地亦物也以天地觀萬物則萬物亦理也謂得道而忘物則可也必欲逺物而求道不亦妄乎觀物理者惟邵子一人而已矣天地之初總是氣化今則氣化形化並行而不息天地之初人物無種純是氣化自人物有種之後則形化雖盛而氣化亦未嘗息自今觀之人與禽獸五穀之類凡有種者皆形化至若昆蟲草木之類無種而生者尚多試以一片白地驗之雖掘至泉壌暴晒焚燒其土俾草木之遺種根蘖皆盡然一得雨露滋澤風日吹暄則草木復生其處此非氣化而何又若腐草為螢朽木生蠧濕氣生蟲人氣生虱之類無非氣化也或謂形化盛而氣化消者竊以為不然夫造化者數而已矣五十者造化之體也四十有九者造化之用也四十九者萬物之體也四十有八者萬物之用也是故五十而去一維天之命於穆不已者也四十九而去一萬物各正性命者也用九用八之不同其神化之謂乎造化為神主萬物之化物之初生也氣之至也既生而象具焉是數為象先也象既有矣而數復因象而行焉是象又為數之先也故數之生象者先天也象之生數者後天也先天者生物之原也後天者成物之始也大矣哉數乎萬物之宗萬有之本也易大傳曰知幾其神乎幾者動之微吉之先見者也十月小雪節剥之上九一爻至此剥之已盡矣交小雪之日是純坤也而復之初爻一分之陽巳生於此時矣積三十分至十一月冬至乃復卦初爻是復之初爻生於十月交小雪之時非生於冬至之日也四月小滿節夬之上六一爻至此夬之無餘矣交小滿之日是純坤也而姤之初爻一分巳生於此時矣積三十分至五月夏至乃成姤卦初爻是姤之一隂生於四月交小滿之時非生於夏至之日也乾坤十二爻當十二月毎爻積三十分方成一日一分如小雪到冬至小滿到夏至亦三十日十二爻計三百六十分當三百六十日而當月之爻有十五分却在前月交中氣之日已生矣此造化之幾也可見幾之初生甚微在造化如此在人心亦然在一事一物亦然可畏哉此聖人所以致治於未亂保邦于未危而聖學必慎獨研幾為第一闗也人欲參天地以成三才盍于造化之幾而觀其微哉窮理盡性至命河圖天地生成天一生水地二生火天三生木地四生金天五生土於内地六天七地八天九地十成之於外人物之生成本如此有生之後水生木木生火火生土土生金金生水在人五行之順行亦如是也人物始生本於天一而人道之立則以天五為主按圖以考天五居中皆圓象中虚有太極之象在天為五行之本在人為五性之原中庸所謂未發之中渾然完具者也在下第一圈含天一之水即人性之智也在上第二圈含地二之火即人性之禮也在左第三圈含天三之木即人性之仁也在右第四圈含地四之金即人性之義也中一圈在中之中太極無極本然之妙即天五所以為土人性之所以為信也地六一之五是水之成具乎五行即人性智之智智之禮智之仁智之義智之信而智亦備乎五徳也天七二之五是火之成具乎五行即人性禮之智禮之禮禮之仁禮之義禮之信而禮亦備乎五徳也地八三之五是木之成具乎五行即人性仁之智仁之禮仁之仁仁之義仁之信而仁亦備乎五徳也天九四之五是金之成具乎五行即人性義之智義之禮義之仁義之義義之信而義備乎五徳也地十五之五是土之成又具乎五行即人性信之智信之禮信之仁信之義信之信而信亦備乎五徳者也中庸所謂小徳川流以時出之於外即情之徳發而皆中節者也合觀其圖圓統一太極析觀其象皆圓各具一太極雖竒偶虚實之不一而無極之妙則一也此天之命於人者本如是也自太極判而為兩儀兩儀分而為四象而五行各一其性故人氣之所禀不能無偏而五氣順行感物易動故慾動情盛水盛生木木盛生火火盛生土土盛生金金盛生水而情慾生生無窮日誘於外是以有吉有凶有少有老有始有終而人道亡矣惟由中以生造化參天兩地而參伍以變故老陽變為少隂老隂變為少陽隂陽合徳而太極渾然在中以天九為用焉九以五為中以一為始九中五合一生六逆用以次而生九位復生一相生相尅五性皆由中出五合一為六天五合一生六以土尅水則水不妄流吾性智之五徳藏於宻有以為時出之本矣合一六為七天五合七生二以水尅火則火不妄炎吾性禮之五徳反其初有以為時出之本矣天三合地八尅天五之土復生一天五居中含十則四象五行皆本於土原始要終吾性信之五徳不失其初以復未發之前而太極無極本然之妙在其中矣用是參天陽居中互生於四正所謂一三五生九九七五生一三九五生七七一五生三是已用是兩地隂居外互生於四隅所謂二六生八八四生二四二生六六八生四是已左旋生陽皆參天以生之自一而九自九而一右轉生隂皆兩地以生之自二而八自八而二所謂取之左右皆逢其原也參天兩地而參伍錯綜變化無窮參伍錯綜而參天兩地生生不息或順或逆或逆或順雖千變萬化以時措之皆得其宜此之謂和順道徳而理於義窮此之謂窮理盡此之謂盡性至此之謂至命太極先天後天大衍河圖洛書總論昔庖犧氏仰觀俯察觀鳥獸之文與地之宜近取逺取知天地萬物皆具太極兩儀四象八卦之理於是始作八卦以通神明之徳以類萬物之情有八卦横圖有八卦圓圖有六十四卦横圖有六十四卦方圓圖所謂先天之易也圓於外者為天方於内者為地天地交而萬物生乾生三男坤生三女反易互合六十四卦各變為六十四而後天之生生無窮焉天地之生生不可以象示於是幽贊於神明而生蓍則河圖洛書以作大衍河圖之數五十有五洛書之數四十有五天地生成五行順逆合之其數百然萬物之生皆本於太極兩儀四象必閏月定四時以成嵗而後天地相交萬物以生也故大衍之作象太極象兩儀象三才象四時象閏象再閏竒數象河圖生數策數象河圖成數一九二八三七四六象洛書之四象乾坤之䇿象期之日上下二篇之䇿象萬物之數皆參天兩地參伍以變錯綜其數是故四營而成易一有八變而成八卦小成六十四卦而大成用九用六老陽皆變為少隂老隂皆變為少陽一卦皆可變為六十四而四千九十六卦焉通其變極其數而天下之能事畢矣顯道以神徳行是故可與酬酢可與佑神和順道徳而理於義窮理盡性以至於命矣以此窮理觀於四營則知一變而太極兩儀四象具於斯矣觀於三變則知一爻而太極兩儀四象具於斯矣觀於一䇿則知一物而太極兩儀四象具於斯矣以此而窮八卦則知三爻此太極此兩儀此四象之變化也以此而窮六十四卦則知六爻此太極此兩儀此四象之變化也以此而窮四千九十六皆太極兩儀四象變化之妙用也順則自一而萬由太極而先天而後天生人生物者此也逆則自萬而一由後天而先天而太極盡性至命者此也此文王周易之所以作周公孔子觀象繫辭四聖相授受一道也太極三才諸圖總叙道一也在天地不見其為大在人心不見其為小在萬物不見其為繁所謂語大莫能載語小莫能破者此也柰何有見於造化之妙者則涉於天地之浩蕩有見於事迹之煩者則滯於人物之紛紜此易道所以不明於後世也觀是篇之所載者太極無象而不可以隂陽分萬物化生而不可以形迹滯有而未嘗有無而未嘗無也惟人也成位天地一體萬物而掌握乎造化殆有超於圖書卦象者在矣況天道地道人道俱於此掲其大端而詳列於後卷正以見其理一而分殊也不然前有所編皆圖書易卦之理後之所編者天文與地理人事之迹耳道之一也不幾裂乎聖人為斯道計所以竭心思以覺斯人也無所不用其至是故道本不可得而象也不得已而強圖此以象之欲人之㑹其原也本不可得而名也不得已而强以極名之欲人之識其大也極本非三也不得已而謂之三極欲人之全體太極參天而兩地也其實一而已矣自其氣之運行而髙明以覆幬也謂之天自其質之凝峙而博厚以持載也謂之地自其氣質之冲和靈秀而與天地並也謂之人自金木水火土而運之為五行自乾坎艮震㢲離坤兊而畫之為八卦自成象成形萬有不齊而森而列之為萬物莫非此也真識此者不必追原太極未判之先一元渾沌無聲無臭而只今形色具備神氣渾融凡宇宙間物物順其自然我無所與則所謂函三為一者即此在矣然則三才即太極也太極即此也統三才而不見其為大析萬類而不見其為小形色雜然而不可執之以為有覩聞寂然而不可冺之以為無本自萬物咸備本自一物不着一日子而已午而亥一嵗春而夏秋而冬一生少而壯衰而老孰非此之運用孰非吾人之心學哉噫人極立而天地位萬物育庶無負聖人設象立教之意右象天地人三才各一太極邵康節曰天開於子地闢於丑人生於寅夏以建寅之月為正月謂斗柄初昏建寅之月也謂之人統易曰連山以艮為首艮者人也周易艮卦六爻亦以人身取象商以建丑之月為正月謂之地統易曰歸藏以坤為首坤者地也周以建子之月為正月謂之天統易曰周易以乾為首乾者天也註疏家以山能出内雲氣地能歸藏萬物天能周布六合其言乾坤之義然矣於艮之義則未盡艮者萬物之所以成終而成始也人為萬物之靈故主人而言是知夏尚忠人之義也商尚質地之理也周尚文天之象也三代迭興三統異尚而聖人荅顔子為邦之問則曰行夏之時乘殷之輅服周之冕法天道行地利用人紀之義彰矣斯所謂百王不易之大法也故曰仲尼祖述尭舜憲章文武上律天時下襲水土此之謂也韓子曰形於上者謂之天形於下者謂之地命於其兩間者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩間飛潛禽獸皆人也程子曰天地交而萬物生於中然後三才備人為最靈故為萬物之首凡生天地之中者皆人道也夫三畫所以成卦者取天地自然竒偶之數也乾之三畫而分三位者為天之竒數三故畫三位也地之偶數三亦畫三位也餘六卦者皆乾坤之子其體則一故亦三位之設耳且夫天獨陽也地獨隂也在獨陽獨隂則不能生物暨天地之炁五行之數定始能生乎動植故經曰有天地然後萬物生焉豈一炁之中有藴三才之道耶所謂兼三才而兩之蓋聖人之義也非八純卦之謂也三才則天地人之謂也兩之則重之謂也上二畫為天中二畫為人下二畫為地以人合天地之炁生故分天地之炁而居中也所以九二稱在田明地道也九五稱飛龍在天明天道也斯則其理坦然而明白矣如曰不然敢質之於繫辭曰六爻之動三極之道也又曰有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也又曰昔者聖人之作易將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦斯則皆云六畫包三才之義則無三畫韞三才之説不其然乎若夫六爻皆有人事者為人倫則天法地之象故初上皆包人事之義耳易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也然則三才之道上中下之位三才之用舍五行則斯須無以濟矣至于人之生也外濟五行之利内具五行之性五行者木火水金土也木性仁火性禮土性信金性義水性智是故圓首方足最靈於天地之間者藴是性也人雖至愚其於外也日知由五行之用其於内也或蒙其性而不循五常之教者不可哀哉乾稱父坤稱母予兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也大君者吾父母宗子其大臣宗子之家相也尊髙年所以長其長慈孤弱所以幼其幼聖其合徳賢其秀也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟之顛連而無告者也于時保之子之翼也樂且不憂純乎孝者也違道悖徳害仁曰賊濟惡者不才其踐形惟肖者也知化則善述其事窮神則善繼其志不愧屋漏為無忝存心養性為匪懈惡㫖酒崇伯子之顧養育英才潁封人之錫類不弛勞而底豫舜其功也無所逃而待烹申生其恭也體其受而歸全者參乎勇於從而順令者伯竒也富貴福澤將厚吾之生也貧賤憂戚庸玉女於成也存吾順事沒吾寜也人之所以能靈於萬物者謂其目能收萬物之色耳能收萬物之聲鼻能收萬物之氣口能收萬物之味聲色氣味者萬物之體也目耳鼻口者萬物之用也體無定用惟變是用用無定體惟化是體體用交而人物之道于是乎備矣然則人亦物也聖亦人也有一物之物有十物之物有百物之物有千物之物有萬物之物有億物之物有兆物之物生一物之物當兆物之物者豈非人乎有一人之人有十人之人有百人之人有千人之人有萬人之人有億人之人有兆人之人生一人之人當兆人之人者豈非聖乎是知人也者物之至者也聖也者人之至者也物之至者始得謂之物之物也人之至者始得謂之人之人也夫物之物者至物之謂也人之人者至人之謂也以一至物而當一至人則非聖而何人謂之不聖則吾不信也何哉謂其能以一心觀萬心一身觀萬身一物觀萬物一世觀萬世者焉又謂其能以心代天意口代天言手代天工身代天事者焉又謂其能以上識天時下盡地理中盡物情通照人事者焉又謂其能以彌綸天地出入造化進退今古表裏人物者焉噫聖人者非世而効聖焉吾不得而目見之也雖然吾不得而目見之察其心觀其迹探其體潛其用雖億萬千年亦可以理知之也人或告我曰天地之外别有天地萬物異乎此天地萬物則吾不得而知之非惟吾不得而知之也聖人亦不得而知之也凡言知者謂其心得而知之也言言者謂其口得而言之也既心尚不得而知之口又惡得而言之乎以心不可得知而知之是謂妄知也以口不可得言而言之是謂妄言也吾又安能從妄人而行妄知妄言者乎易曰窮理盡性以至於命所以謂之理者物之理也所以謂之性者天之性也所以謂之命者處理性者也所以能處理性者非道而何是知道為天地之本天地為萬物之本以天地觀萬物則萬物為物以道觀天地則天地亦為萬物道之道盡之于天矣天之道盡之于地矣天地之道盡之于物矣天地萬物之道盡之于人矣人能知其天地萬物之道所以盡于人者然後能盡民也天之能盡物則謂之曰昊天人之能盡民則謂之曰聖人謂昊天能異乎萬物則非所以謂乎昊天也謂聖人能異乎萬民則非所以謂之聖人也萬民與萬物同則聖人固不異乎昊天者矣然則聖人與昊天為一道聖人與昊天為一道則萬民與萬物亦可以為一道也一世之萬民與一世之萬物既可以為一道則萬世之萬民與萬世之萬物亦可以為一道也明矣夫昊天之盡物聖人之盡民皆有四府焉昊天之四府者春夏秋冬之謂也隂陽升降于其間矣聖人之四府者易詩書春秋之謂也禮樂汚隆于其間矣春為生物之府夏為長物之府秋為收物之府冬為藏物之府號物之庶謂之萬雖曰萬之又萬其庶能出此昊天之四府者乎易為生民之府書為長民之府詩為收民之府春秋為藏民之府號民之庶謂之萬雖曰萬之又萬其庶能出此聖人之四府者乎昊天之四府者時也聖人之四府者經也昊天以時授人聖人以經法天天人之事當如何哉仁配天地謂之人唯仁者真可謂之人矣氣者神之宅也體者氣之宅也天六地四天以氣為質而以神為神地以質為質而以氣為神唯人兼乎萬物而為萬物之靈如禽獸之聲以其類而各能得其一無所不能者人也推之他事亦莫不然唯人得天地日月交之用他類則不能也人之生真可謂之貴矣天地與其貴而不自貴是悖天地之理不祥莫大焉太極三才問或問圖書之編雖賾隐具陳深逺畢舉本欲通神明類物情窮理盡性以至于命也前載古太極圖矣復載此圖寜有二太極哉抑祖周子圖説無極而太極太極本無極哉曰既謂之極安得有二而太極變通散殊莫知端倪茍專滯于有安得謂之太極但一着圖象則象非一圖之可窮一涉言辭則意非一言之可盡即如古太極圖凡兩儀四象八卦大業盡在其中而河圖洛書先天後天周易卦爻以及諸圖象不可勝窮也言不可勝紀也然皆太極圖中所本有者而人莫之識特假圖象言論以發其藴耳胡為滯一象者既為象所牿執一説者又為言所拘不知象本無象言本無言凡已上諸圖諸説自一而萬自萬而一固不可舉一以廢百亦不可逐流而迷源所以前古太極圖復列此圖而此圖即古太極圖也特此圖無象無言一無所著正中庸所謂經綸立本知天地之化育夫焉有所倚而一部中庸總歸諸無聲無臭至矣之意也或問古太極盡之矣莫若以無極名此圖何如曰凡圖象皆不得已而設也一物各具一極道外無器器外無道凡圖皆無極太極之源流變化本不各分别于其間也况既云無極則無方無體曷容而畫其圖哉周子圖説謂無極而太極太極本無極正欲合有無隐顯而一之觀者得意忘言得心忘象可也所以朱陸紛紛辯論于垂世立教各有深意存焉世儒不察二先生辯論之意又為之増其論辯故説愈繁理愈晦今又安得以名義别圖象而愈増後人之論辯哉噫此圖與古太極圖予不嫌重複而並載者固以二圖出自古人均不可廢亦欲觀其㑹通而洗心以退藏於宻焉耳或問合諸圖而㑹歸于此圏中見得一毫不可執泥是矣又列三才圖何歟曰天道地道人道列為三才易之教也正欲人竭才以順性命之理則人盡人道人極立而成位乎天地之中矣不惟不思以立人之道反求諸身或仰觀天文孰不謂天此太極也或俯察地理孰不謂地此太極也或玩古太極圖孰不謂兩儀四象八卦皆太極之散見也若與吾人不相闗者孰知太極備于天地載諸圖書實各在當人之身即所謂神明物情即所謂性命之理即所謂大本達道而生生不測民咸用之者也果真自信人者天地之心思自盡其才以求為天地立心窮理者窮此盡性者盡此至命者至此則以此經天以此緯地以此裁成輔相庶乎人之才無愧於天地之才人之道脗合乎天地之道而定之以中正仁義立人極者在斯人矣否則天之降才不殊而人以不才自待故用其才于身外者無足論已彼潜神虚寂之歸者又自塞其才焉才難不其然乎嗟夫以太極言不為尭存不為桀亡凡人之才不才固于太極無加損以三才言能盡其才則極自我立不盡其才則不可以為人而人能𢎞道將誰諉哉圖書編卷七
