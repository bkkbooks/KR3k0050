body:
  text: 圖書編卷七明章潢撰圖書象數總叙古今言圖書者或以象或以數象則以隂陽言數則以竒偶言也不亦分析之太甚耶豈有意以強合之哉一三五七九即陽即竒二四六八十即隂即偶是有象即有數有數即有象一出於造化之自然也方其未有物先無象無數渾然一太極已耳既有物後凡一草一木各有其象則發生衰謝各有其數或數肇於無象之先或數寓於有象之内要不可判而二之矣一隂一陽之謂道裂象數而二之天下寜有二道哉觀易曰成象之謂乾效法之謂坤若專以象言之矣而即曰極數知來之謂占曰大衍之數五十其用四十有九若專以數言矣而即曰分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏又曰極其數遂定天下之象可見象數不相離也曽謂言圖書者可各以象數而分裂之哉昔者聖人觀象以立卦見天地之間一本萬殊雖昆蟲草木之微自身而肢自木而枝莫不皆然是太極兩儀四象八卦未登方冊之先已布於萬物之上矣然呈象之顯者莫過于河圖之數即其圖而觀之冲漠無朕之際五十有五之數已具于十五之中矣蓋以五而言之下一㸃含天一而合地六上一㸃含地二而合天七左一㸃含天三而合地八右一㸃含地四而合天九中一㸃含天五而合地十以十而言之順序而數即天一地二天三地四天五地六天七地八天九地十之象也是所謂太極也及其五十有五之數分布互錯於十五之外於是隂陽之象燦然黒白之分明一三七九為陽二四六八為隂所謂兩儀也蓋兩儀太極之所生者也由是分之一九為太陽二八為少隂三七為少陽四六為太隂所謂四象也蓋太陽少隂陽儀之所生少陽太隂隂儀之所生者也由是分之一為乾九為兊二為離八為震三為巽七為坎四為艮六為坤蓋乾兊者太陽之所生一九乃太陽之數也離震者少隂之所生二八乃少隂之數也㢲坎者少陽之所生三七乃少陽之數也艮坤者太隂之所生四六乃太隂之數也其配合分支莫非自然之妙夫豈人為私智安排布置以成之哉今乃以一六為老隂二七為少陽三八為少隂四九為太陽六七八九是矣一二三四何為者哉夫一六二七三八四九乃五行生成之數非隂陽老少之數也至于乾兊一九老陽之數所生而係之二七㢲坎二七少陽之所生而係之一九乾何取義於九兊何取義於二㢲何取義於四坎何取義於九哉大抵昔者伏羲則圖以畫卦也見河圖之數隂陽俱備有太極之象焉分其竒偶以為兩儀又分之為四象又分之為八卦自本而末由幹而枝脉絡分明各有統屬也皆自然也若謂離震艮坤隂之老少主静而守其常乾兊巽坎陽之老少主動而通其變斯乃以卦義而配圖非則圖以畫卦也至於規横為圓不能合其本生之數易數以就位斯為後天之圖而豈聖人則圖畫卦之本然哉理氣象數初不相離如乾之徤理也其象天象也其所以為象者氣也氣之有次第節限者數也理氣象數果可岐而二之哉按天地之數生於一故一生一為二再生一為三再生一為四再生一為五其六其七其八其九其十皆以一而生之易所謂天一地二天三地四天五地六天七地八天九地十是以天數五地數五五位相得而各有合此河圖洛書之數之所由出故天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之此河圖之數也參天兩地而參伍錯綜其數天五居中太陽居一含九少隂居二含八少陽居三含七太隂居四含六此洛書之數也河圖之數五十有五洛書之數四十有五觀天數五十地數五十其數百蓍生應之大衍天之用數故用天數五十虚一分二掛三揲四歸期象閏再閏再扐是故四營成易十有八變成卦故乾坤之策凡百有六十二篇而又萬有一千五百二十引而伸之觸類而長之天下之能事畢矣圖之體在中而用在北故數起於北之一自北而南以生二自南而東以生三自東而西以生四自西而入於中以生五隨氣機之動極而變也自中而出於北以生六自北而南以生七自南而東以生八自東而西以生九自西而入於中以生十入必復出隨氣機之静極而變也入乘静機出乘動機動静有常而流行不息西北者數所出入之門乎隂陽相求而數生焉數始於一而極於九化於二而通於十自北至西則陽數極極則益深不得不入而歸諸十自二至十則隂數極隂極必返不得不出而復於一一以始之九以極之二以化之十以通之數之圓而神也如是夫洛書右轉相尅者其義也隨其右轉而相生者其數也何也中數五而四方各十總之凡四十有五人知五九之數莫不由中五以為之主也是以數起於一而中五合一為六故次六一六為七故次七五與七合為十二故次二七二為九故次九五與九合為十四故次四九四十三故次三五與三合為八故次八八與一合亦歸於九也孰謂其數之次序無義於其間哉况其數始於一終於九一居正北九居正南一三五成九而五則九之中也合一二三四生九七八六是九七八六皆生於九所以一九生九二九生八三九生七四九生六六九生四七九生三八九生二九九生一自一生九自九生一其變不可勝窮矣噫陽數極於九而極則變也洛書以陽統隂五九四十五數豈特與河圖大衍相貫通哉凡天地萬物之數莫非九數之變化也又何必專指九疇為洛書之數傳曰河出圖洛出書聖人則之則者法其象與數也數始於一小衍之而成乂大衍之而成十乂十者數之結括而圖書者倚數之大原卦畫之準則也此象縱横十有乂數正則河圖中宫天乂乘地十之象其中者易也即圖書中乂之中動而陽上同乎天其象為静而隂下同乎地其象為天下生為隂陽地上生為柔剛即圖書中乂之上下左右其數則陽一隂四剛三柔二衍而一六二七三八四九即圖書四維之東西南北分為八卦合為五行五行之生也各一其性此圖之象原其生而河圖之位據其旺洛書之位總其變大衍之周掲其實也河圖木東火南金西水正北也洛書金火易位金南火西變也夫以始生之序言之坎巽生於地之剛朱子所謂少陽少陽之位寅於時為春其數三小衍成五則有二大衍成十則有七二七為火故火生在寅旺於午稽之河圖則二七居南而乾兊得位乾居七兊居二乾兊生於天之陽朱子所謂太陽太陽之位己巳為六陽之極於時為夏其數一小衍成乂則有四大衍成十則有九四九為金故金生在巳旺於酉稽之河圖則四九居西而巽坎得其位巽居四坎居九乾交坎而坎交乾㢲易兊而兊易㢲也離震生於天之隂朱子所謂少隂少隂之位申於時為秋其數四小衍成乂則有一大衍成十則有六一六為水故水生在申旺於子稽之河圖則六一居北而坤艮得其位艮居一坤居六坤艮生於地之柔朱子所謂太隂太隂之位亥亥為六隂之極於時為冬其數二小衍成乂則有三大衍成十則有八三八為木故木生在亥旺於卯稽之河圖則三八居東而離震得其位震居三離居八坤交離而離交坤震易艮而艮易震也是知先天之象本之圖乾七兊二位剛離八震三位乎柔天之四象交乎地也坎六艮一位乎隂坎九㢲四位乎陽地之四象交乎天也後天之象本之圖乾兊生於天之陽乾一兊九而成十乾居一兊居九離艮生於天之隂震反為艮離七艮三而成十離居七艮居三坤震生於地之柔艮反為震坤二震八而成十坤居二震居八坎㢲生於地之剛坎六㢲四而成十坎居六㢲居四今圖後天㢲二而坤四者邵子所謂長女代母者也先後二天象數脗合則圖畫卦厥有㫖哉此圖雖亦㑹合圖書先後天四圖為之其實止發明㑹合之意于原圖俱未嘗分裂牽扯故存之以見善㑹通者當得其意無徒泥其迹云河圖者龍馬之文也負天地竒偶之數而洩鬼神之秘也圖之位一六居下二七居上三八居左四九居右五十居中一三五七九為陽為天數二四六八十為隂為地數天數二十有五地數三十凡天地之數五十有五以運行理氣以天數之九合天數之一則為地之十以天數之七合天數之一則為地之八以天數之五合天數之一則為地之六以天數之三合天數之一則為地之四以天數之一倍天數之一則為地之二總其本數與其合數亦為五十有五陽得其全隂得其半陽得兼隂隂不得兼陽也地數析之則亦成竒隂生於陽得陽之體也數之變化者一而二二而四四而八八而六十四六十四而四千九十六體陽而用隂無成而代終也陽數始於一而終於九隂數始於二而終於十一三陽之長數也至於五則數之終而陽之極矣七九則過極之陽消數也二四隂之長數也至於六則數之終而隂之極矣八十則過極之隂消數也圖生於數數生於太虚太虚生於元氣之一竅觀於竅而知天觀於天而知數觀於數而知圖然而數先圖而立者圖後數而成者引而伸之存乎神體而行之存乎聖圖之體在中而用在北故數起於北之一自北而南以生二自南而東以生三自東而西以生四自西而入於中以生五隨氣機之動極而變也自中而出於北以生六自北而南以生七自南而東以生八自東而西以生九自西而入於中以生十入必復出隨氣機之静極而變也入乘静機出乘動機動静有常而流行不息西北者數所出入之門乎隂陽相求而數生焉數始於一而極於九化於二而通於十自北至西則陽數極極則益深不得不入而歸諸十自二至十則隂數極隂極必返不得不出而復於一一以始之九以極之二以化之十以通之數之圓而神也如是夫此河圖之數也天地之間一氣而已分而為二則為隂陽五行四時造化萬物始終無不管于是焉故河圖之位一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中蓋其所以為數者不過一隂一陽一竒一偶以兩其五行而已所謂天者陽之輕清而位乎上者也所謂地者隂之重濁而位乎下者也陽數竒故一三五七九皆屬乎天所謂天數五也隂數偶故二四六八十皆屬乎地所謂地數五也相得謂一與二三與四五與六七與八九與十各與竒偶為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合二十有五者五竒之積也三十者五偶之積也變化謂一變生水而六化成之二化生火而七變成之三變生木而八化成之四化生金而九變成之五變生土而十化成之鬼神謂凡竒偶生成之屈伸往來者但既謂之變化則非圖象所能盡矣則河圖以作易其數之所由起乎數之起不過一隂一陽之道而已易道之所以一陽一隂者不過以竒偶之數互為分且合以生且成而已陽竒隂偶變而通之繩繩兮雜而不亂者不過大傳所謂天一地二以至天五地十而已易有太極極中也一也中自一也是生兩儀儀匹也二也匹而二也兩儀生四象一二三四分之以為四生數也四象生八卦則六七八九合之以為四成數也四竒為陽陽雖有四生數之異而合列於四方之正四偶為隂隂亦有四成數之異而同均於四維之偏由正生偏由偏成正也一與三為竒為陽之生數而必待於六與八之隂數以為成二與四為偶為隂之生數亦必賴於七與九之陽數以為成也自北而東一而三乃陽生之進數而其自八而六東而北隂成之退數者固已寓乎其中自西而南二而四乃隂生之進數而其自九而七南而西陽成之退數者亦兼具乎其中矣四方者各以其陽竒居於正四維者各以其隂偶附于偏然天數之有五地數之有十均合於隂陽之竒偶而同謂之生成乃獨無所見於四方之位何也四象無五八卦無十故也然易之所以範圍不過曲成不遺者正由假此天五與地十之虚數以行其實用於四象八卦而成河圖者特不當傚世習置五虚㸃於圖中心而附以十㸃謬云五十而不知其用也坎以一始於正北而一五為乾六於西北坤以二分於西南而二五為兊七於西震以三出於東而三五為艮八於東北㢲以四附於東南而四五為離九於正南故陽得五而隂偶得五而竒隂得五而陽竒得五而偶是生數之所以成成數之所以生者也生數少於五無所待以制中也故陽數之一與三自為中於乾六艮八成數之外隂衆而陽孤坎故為陷也成數多於五不能自適於中也故隂數之二與四取五於離九兊七成數之陽之内陽正而隂偏離故為麗也陷必止而求動故帝出乎震動所以取合由分而合也麗必順而相説故説言乎兊説所以致分由合而分也一二三四而五同為生數一至四其實體五其虚用也六七八九而十同為成數六至九其實體十其虚用也四象無五八卦無十坦然明白矣天地之理未始不有數行乎其中然或有餘於數不足於數唯有餘不足而為之中制故雖隂陽竒偶之數有分有合有虚有實有進有退有自然生成之中道焉一隂一陽之謂道者隂陽分一以為天地上下合一以為乾坤天地上下分為四方而中無以合乾坤隂陽合為四時而中有可分是同一道也天地以形言則南北為經上天下地而水火木金為之形者既可以圖而分故曰法象莫大乎天地廣大配天地隂陽以氣論則東西為緯乾陽坤隂而冬夏春秋之為氣者亦可以理而合故曰變通莫大於四時變通配四時也於斯二者無以異也四方有中中無定體而四象八卦以之立四時有五五無定著而四時八節以之行孔子著大傳不存河圖而特存天地之數者示其有得於數則圖在其中矣圖之數生以天一者成以地六生以地二者成以天七生以天三者成以地八生以地四者成以天九至謂天五地十之生成則何自而求真按圖索駿也故制五於八卦之虚中猶可容其數而制十於其中則無所容其數矣是知數之有生有成而不知其所以生且成者徒得其貌而無以得古聖人之所以為天地立心為生民立極者千載可為之長太息則古猶今也夫竒數皆天偶數皆地生以天者成以地生以地者成以天其為天若地特隂陽之進退出入竒偶之體用分合而已説卦曰參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻大傳曰參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變孰能與於此其曲盡乎至妙之用者河圖之法也數始於一而中於五而終於十中於五者分其四之偏終於十者合其八之正蓋一之始其全體無餘不足不可得而用而獨得於中既以其一寄生於五遂以其一寄成於十以終之故四象有五八卦有十皆有數而無所定其位以五生其偏以十成其正而所謂一者遂莫知所尋獨見於五見於十之為中者以止齊焉耳且太極而兩儀所以四象而八卦不過生數之一二三四成數之六七八九而已至於五與十雖有其數特存虚用未嘗列於卦象之實體者也蓋自一分一而二一二而三一三而四是四象立矣四象無五也天五特虚中而無體然一四而五二三亦五是兩伍矣且以本數之天五又參伍矣況一二三四自然總而十數中以天五參伍而十五也天數之一三五則九地數之二四則六而一五亦六也一六而七二五亦七也一七而八三五亦八也一八而九四五亦九也則八卦成列矣一九則十一二三四自然亦十也八卦則無自而十也十故無所容其體以一用其二三四則其十亦即九也十之為九乃所以復歸于一是十即一也河圖之數四方各十故坎一與離九相對而十中虚天五之用而十五坤二與艮八相對而十中虚天五之用而十五震三與兊七相對而十中虚天五之用而十五㢲四與乾六相對而十中虚天五之用而十五以是知天五與地十皆無其體與位之正特虚其數以相乂十而什伍也斯所以參伍也參伍所以參兩也故河圖之數正實四十而十天地十之虚數通用之以計凡天地之數五十有五者也七為少陽其合固成十五然其生數不備不能變九為老陽六為老隂其合亦雖只十五而生數之一三五而九二四而六故六之變則九九之變則六此通重易之爻不見七八而無非九六而參伍以變參天兩地莫非是也河洛二圖竒偶位數不同者何哉蓋一三五七九積二十五故竒乏二四六八十積三十故偶贏而竒之位五偶之位五此河圖所以竒與偶位合也洛書一三五七九積二十五則竒數多矣二四六八積二十而偶則少焉且竒之位五偶之位四竒多乎偶者如此然皆位與數之一定不可易也真悟其生尅之理則圖書不同者迹未始不同者理彼又欲於河圖減其五數於洛書増其五數以合夫大衍之數者不亦繆之甚哉然以前皆圖書定位定數以後分而言之正以見分隂分陽之所以然而循環無端又不可徒泥其一定之位數也噫分乎其所不得不分合乎其所不得不合造化自然之妙不可得而圖也神而明之不存其人哉原數總叙太極渾淪安有所謂數也然太極即一也有一即有二一神兩化不可測也是有太極即有隂陽有隂陽即有五行隂陽五行化生萬物其究可勝窮哉觀天一地二天三地四天五地六天七地八天九地十天地之變化無端萬物之生成不息可見萬物之生也成也不出乎五行之變化而五行非他即隂陽之大小也要之只是一隂一陽百千萬億皆從此出則數之終始雖不可測而即此可以窮其源矣信乎萬物一五行也五行一隂陽也隂陽一太極也果能于太極窮神知化于數學之精妙何有哉若夫隂陽五行變化循環之端則已下數圖備之矣此隂陽之總㑹居中包四方者也數之始一隂一陽而已陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一為一故三其一陽而為三圍四者以二為一故兩其一隂而為二是所謂參天兩地者也二三之合則為五矣此以五言之此隂陽之原也此十中除一為太陽之位餘九則為太陽之數除二為少隂之位餘八則為少隂之數除三為少陽之位餘七則為少陽之數除四為太隂之位餘六則為太隂之數蓋九者一之餘八者二之餘七者三之餘六者四之餘也四方之數皆括於此圖中此隂陽之合也以太陽之九合太隂之六十五以少陽之七合少隂之八十五亦包四方之數者也陽儀具矣上加一竒為太陽太陽先得之故居一上加一偶為少隂少隂次得之故得二隂儀具矣上加一竒為少陽少陽三得之故居三上加一偶為太隂太隂四得之故居四一二三四太陽少隂少陽太隂之位者以所得之先後為次耳數十而已五為衍母十為衍子以象太極一二三四又四象之位止有六七八九耳七九陽也陽主進自七進至九九為太陽七則少矣六八隂也隂主退自八退至六六為太隂八則少矣且一位太陽所餘則九二位少隂所餘則八三位少陽所餘則七四位太隂所餘則六蓋數之自然得所適之妙夫豈聖人以義而進退之哉水火金木土其猶父母乎一三五七九其猶男乎二四六八十其猶女乎生為父成為母厥初太極判而隂陽立水氣始生次火氣次木氣次金氣次土氣又次而水成又次而火又次而木又次而金又次而土此一二三四五六七八九十之數所由生數者造化之自然宜乎萬物不能逃也所謂以質而語其生之序者如此屈伸者進退知時之幾也往來者循環迭至之運也時乎春也木進則水退時乎夏也火進則木退時乎秋也金進則火退時乎冬也水進則金退而土則寄旺於四時此言五行之時進時退各司其事不容所先不容所後也水往而木來木往而火來火往而金來金往而水來水又往而木又來土則運行於四時之季此言進退之一往一來無有窮已莫知其始莫知其終也所謂以氣而語其行之序者如此萬物變化其氣與質皆不外乎五行又安能逃乎五行之數況數即理也非真明理一分殊者安足以語此萬物之數雖至於不可勝紀不過隂陽老少之積焉耳可見隂陽變化莫之能測而數之所在豈人之私智能強為之哉信乎其數一定雖三才萬物均之不能逃也盈虚順逆吉凶消長君子亦順之而已但用九用六闢乾闔坤必有所以主張其數者隂陽老少皆從此出非天人一貫者其孰能之萬物之化生于天地間者絪緼化醇成象成形髙下散殊不可紀極出有入無莫知端倪孰知盡由八卦以司其化哉非強合之也易説卦傳言萬物皆出乎震齊乎㢲相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮又言動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮可見乾坤覆載而萬物之化生者各有所司吾人不能窮極八卦之變化而欲以盡物之性以範圍曲成之也何可得哉噫知八卦之司化者斯可以知天地之化育也卦象物類乾先天正南象位也後天位乎西北重三畫為六爻謂之三才六畫迭用剛柔而名為純卦他卦在外象為重他卦在内象為交外坎象需内坎象訟外艮象大畜内艮象遯外震象大壯内震象无妄外㢲象小畜内㢲象姤外離象大有内離象同人外坤象泰内坤象否外兊象夬内兊象履乾在上則剛在外在下則剛在内四法不變屬金陽四月卦節立冬秋冬相繼其象在髙為天效法象圓為天上為廣大為包容在地為金玉在朝為君王為大臣為王覇在人為父為老人為烈士勇夫為誠實秀麗之人為強横權勢之輩在臟為肺腎之經在體為骨為頭為額為膝在性為剛烈正大端恪堅固在色為黒白交襟之褐為大赤在味為辛辣在聲為商音之律羽調之歌為嚇喝在事為戰爭躁徤在天干為庚辛壬癸朝拱在地支為戌亥相乘在官為將相公卿權憲臺察及為頭目之職失令為萬户之屬在神為天神嶽瀆雷霆將吏在鬼為真烈陣亡之祟忠臣烈士之等在六神曰龍虎相交在數為一為九在器為金寳錢珠為中堅員動之具在物為堅剛尖利硬實機闗之屬在刑為徒杖之責在病為頭痛手戰血傷之症在時為秋冬相繼在氣為寒為氷為冷裂在禽為鴟梟鵒鸚之屬黄頭鬬禽之類在飲食菓品為圓赤之物猪肉鴨彈外虚内堅𤓰栗等類在榖為豆栗在獸為龍麟老馬瘦馬良馬駁赤馬之等分四時㫁之在水族木為海馬蛟螭江豚牡蠣之類此象見金為兄弟六親見木為妻財見水為子孫見火為官鬼見土為父母之鄉生于巳旺于酉敗于午死于子墓于丑絶于寅此為乾宫金象卦體之變玩也坎正北象位也先天位乎正西外艮象䝉内艮象蹇外震象解内震象屯外㢲象渙内㢲象井外離象未濟内離象既濟外坤象師内坤象比外兊象困内兊象節外乾象訟内乾象需十月卦節冬至交法象水在天為月雨雪霜露分配四時在地為泉為江海澗潭洞湖瀦溝瀆一應有水之所分上下四時得失在人為中男為智巧之士豪傑之人在臟為腎膀胱小腸在性為聰明敏智在色為黒在味為醎在聲為羽音為喚在精為津為唾在事為勞碌加憂為隠伏在天干為壬癸在地支為子正炁在官為鹽酒河泊逓運水站營田水監之職在神為水府河泊之神六神名曰𤣥武在鬼為自溺瀉痢之祟在數為三一六在器為弓輪矯揉水具水桶泥履之等耳足全備之爐鼎在病為心痛血症耳痛寒熱濕相傳之症吐瀉滑痢之疾在刑為桎梏監囚之類在物為舟車温濕冷潤中滿之物在時為冬氣為寒在禽為鴛鴦水獺魚螺一切水鳥在獸為狐貉鹿豕之等在穀為麥在菓為菱芡水果有核之類在飲為酒醋羮湯醎物魚鰕之屬在六親見金為父母見木為子孫見水為兄弟見火為妻財見土為官鬼生于申旺于子敗于酉死于夘墓于辰絶于巳凡卦坎在上