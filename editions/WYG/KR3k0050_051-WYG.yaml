body:
  text: 圖書編卷五十一明章潢撰古南夷總叙杜氏通典邊防總叙曰南蠻其在唐虞與之要質故曰要服夏商之時漸為邊患暨于周代黨衆彌盛故詩曰蠢爾蠻荆大邦為讎至楚王時蠻與羅子共敗楚師殺其將屈瑕楚師復振遂屬於楚及呉起相悼王南并蠻越遂有洞庭蒼梧之地秦昭使將伐楚略取蠻夷置黔中郡漢興以後時有寇盗其西南諸夷夜郎之屬悉平定置郡縣公孫述時夜郎大姓為漢保釐後漢初從番禺江奉貢光武建武中武陵蠻帥單程大寇郡縣漢將劉向戰敗數嵗方平順帝時武陵太守増其租賦蠻又舉種反殺鄉吏東晉時沔中蠻因劉石亂後漸徙于陸渾以南徧滿山谷宋齊以後荆雍二郡各置校尉以撫寜之羣蠻之帥互受南北朝封爵至後魏末暴患滋甚僭稱侯王屯據峽路斷絶行旅周武帝遣陸騰大破之其獠初因蜀李勢亂後自蜀漢山谷出侵擾郡縣至梁時州郡每嵗伐獠以自利及後周平梁益自爾遂同華人矣以其黔中東謝自古不臣中國唐貞觀以後置羈縻州領之古南夷考畧盤瓠種昔帝嚳時患犬戎入寇乃訪募天下有能得犬戎之呉將軍頭者妻以少女時帝有畜狗名曰盤瓠遂衘其將軍首而至乃以女配之瓠得女負走入南山止石穴中生六男六女因自相夫妻其後滋蔓號曰蠻夷所居皆深山重阻人跡罕至長沙黔中五溪蠻皆是也徭本盤瓠之後其地介於巴蜀湖廣間綿亘數千里諸徭不可勝數廪君種不知何代初巴氏樊氏曋咅審氏相氏鄭氏五姓皆出於武落鍾離山其山有赤黒二穴巴氏之子生於赤穴四姓之子皆生黒穴未有君長共立巴氏子務相是為廪君巴梁間諸巴皆是也戰國時秦惠王并漢中以巴氏為蠻夷君長其後世散處巴郡南郡謂之巴郡南郡板楯蠻秦昭襄王時有一白虎於巴蜀漢之境傷害千餘人昭王乃募有能殺虎者賞邑萬家時有巴郡閬中夷廖仲等射殺白虎昭王以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不算傷人者論殺人得以賤錢贖死夷人安之南平蠻東距智州南屬渝州西接南州北涪州其王姓朱氏號劍荔王東謝渠帥姓謝氏南蠻别種在黔中之東地方千里唐貞觀中開其地為應州西趙蠻在東謝之南並南蠻别種其界東至夷子西至昆明南至西洱河山洞深阻莫知里數趙氏代為酋長牂牁渠帥姓謝氏昆明蠻一曰昆彌以西洱河為境即葉榆河也距京師九千里昆明九百里即國其後又封别帥為滇王皆牂牁蠻也東距辰州二千四百里其南千五百里即交州兖州牂牁别部與牂牁鄰境唐以其地為兖州牂牁兖州皆黔中屬州也獠蠻之别種徃代初出自梁益之間自漢中達于卭笮州川谷之間所在皆有依山林而居無酋長版籍蠻之荒忽無常者也舊傳獠有飛頭鑿齒鼻飲白衫花面赤裩之屬二十一種今右江西南一𢃄甚多殆百餘種常侵暴梁益狑人生幽厓奥谷中􅀈人生崛巄中獞人五嶺以南皆有之夜郎國播州犍為即其國也漢時西南夷君長以十數夜郎最大在蜀郡徼外東接交趾西鄰滇國其國鄰牂牁江江廣數里出番禺城下滇漢時在夜郎之西靡莫之屬滇最大始楚頃襄王使將軍莊蹻將兵循江上略巴黔以西蹻至滇池方三百里旁平地肥饒數千里以兵威定屬楚欲歸報會秦擊楚巴黔中郡道塞不通因而以其衆王滇變服從其俗以長之滇卽漢益州郡也蜀改益州郡為建寜分建寜永昌為雲南郡又分建寜牂牁為興古郡卽今之雲南地也卭都漢時自滇以北君長十數卭都最大其外西曰桐師以東北至葉榆名為嶲昆明地方數千里武帝開為卭都縣筰都漢時自越嶲以東北君長以十數徙筰都最大武帝開以為筰都縣冉䮾漢時自筰以北君長十數冉䮾最大即漢汶山郡之地附國隋唐通焉在蜀郡西北二千餘里卽漢之西夷也有嘉良夷即其東部薄縁夷在其南女國在其西其東北連山綿亘數千里接黨項及諸羌哀牢後漢時通焉其先有婦人名沙一居子牢山嘗捕魚水中觸沉木若有感因懐娠十月産男子後沉木化為龍出水因䑛其男之背其母鳥語謂背為九謂坐為隆因名曰九隆後漸相滋長四界去洛陽七千里即金齒衞地南中羅鬼悉祖之南詔或曰鶴柘曰龍尾曰苴咩曰陽劍本哀牢夷後烏蠻别種夷語王為詔其先渠帥有六詔號六詔曰蒙嶲詔越析詔浪穹詔邆睒詔施浪詔䝉舍詔兵埒不能相君長蜀諸葛亮討定之䝉舍詔在諸部南故曰南詔居永昌姚州之間鐡橋之東南距㸑東南屬交趾西摩伽佗西北與吐蕃接南女王西南驃北抵益州東北際黔巫王都羊苴咩别都曰善闡府大理即南詔國也本唐少夷邕州右江水與大理大槃水通自邕州道諸蠻獠至大理不過四五十里驃國東北距南詔咩苴城六千八百凡去上都萬四千里在永昌故郡南二千餘里其國境東西三千里徃來通聘者迦羅婆提等二十國役屬者道林王等九城食境土者羅道潜等二百里九十八部落東鄰真蠟國西接東天竺國南盡溟海北通南詔竺樂城界西原蠻居廣容之南邕桂之西有寗氏者相承為豪又有黄氏居黄橙洞其𨽻也其地西接南詔宋時儂氏世為廣源州首領州在邕州西南欝江之源地峭絶深阻故儂智髙資以暴横焦僥國後漢時通焉在永昌徼外其人長三尺穴居樿國後漢時通焉自言海西人海西即大秦也兩㸑蠻自曲州靖州西南昆州曲軛晉寜喻獻安寜距龍和城通謂之西㸑白蠻自彌鹿升麻二川南至歩謂之東㸑烏蠻晉時㨿南寜郡其地延袤二千餘里唐置青蛉弄棟為縣即今曲靖軍民府地松外諸蠻數十百部自夜郎滇池以西皆莊蹻之裔凡數十姓尾濮漢魏以後在興古郡即雲南郡地西南千五百徼外其人有尾長三四寸按木濮即尾濮也木棉濮土有木綿文面濮俗劖面以青畫之折腰濮俗生子皆折其腰赤口濮在永昌南其俗折其齒劖其唇使赤又露身無衣服黒僰濮在永昌西南山居爾雅曰南至於濮鉛周書王會卜人丹沙註云卜人西南之蠻丹沙所出按卜人葢濮人也按諸濮與哀牢地相接故附之交趾即倭南本漢初南越之地接漢九真日南諸郡及唐驩愛等州東南薄海接占城東海路通欽亷西出諸蠻西北通邕州在邕州東南隅去左江大平寨最近自寨正南行至桄榔花步渡富良白藤兩江四程可至又自寨東南行過舟特羅小江自諒州入六程可至自右江温潤寨則最逺由欽州渡海一日至厯代為郡縣宋朝遂在化外丁氏黎氏李氏擅其地南丹州蠻亦溪洞之種在宜州西境撫水蠻在宜州南唐𨽻黔南酋皆䝉姓黎洞唐故瓊管之地在大海南距雷州泛海一日而至其地有黎母山黎人居焉儋崖萬安皆與黎為境其服屬州者為熟黎其居山峒無征徭者為生黎蜑人儋崖海上水居蠻也已上南夷除交趾黎洞屬後海南夷類餘皆四川雲貴地領官職以時朝貢因叙四夷東南西北故列諸此其屬内夷欵者俱詳上卷云南蠻總論南蠻多種性不能教連合朋黨失意則相攻居洞依山或聚或散西至崑崙東至洋海産出奇貨故人貪而勇戰春夏多疾疫利在疾戰不可久師也古南海總叙海南諸國漢時通焉大抵在交州南及西南居大海中洲上相去或三五百里三五千里逺者二三萬里乘舶舉㠶道里不可詳知外國諸書雖言里數又非定實也其西與蕃國接元豐中遣伏波將軍路博徳開百越置日南郡其徼外國自武帝以來皆獻見後漢桓帝時大秦天竺皆由此道遣使貢獻及呉孫權遣宣化從事朱應中郎康泰使諸國其所經及傳聞則有百數十國因立記傳晉代通中國者葢尠及宋齊至者十餘國自梁武隋煬諸國使至踰於前代至唐貞觀以後聲教逺被自古未通者重譯而至又多于梁隋焉其無異聞亦不復更記古南海夷考畧黄支國漢時通焉去海日南之南三萬里俗畧與珠崖相􅁼哥羅國漢時開焉在槃槃東南海國有四十二州而無縣林邑圖秦象郡林邑縣地漢為象林縣屬日南郡古越裳之界也在交趾南海行三千里其地縱横可六百里去日南界四百餘里其南水步道二千餘里有西屠夷亦稱王焉馬援所植兩銅柱表漢界處也扶南國在日南郡之南海西大島中去日南可七千里在林邑西南三千餘里其境廣袤三千里頓遜國梁時開焉在海﨑山上地方千里王並羈屬扶南徼外諸國賈人多至其國市焉毗騫國梁時開焉在頓遜之外大海洲中去扶南八千里于陀利國在南海洲上其俗與林邑扶南畧狼牙修國在南海中其界東西三十日行南北二十日行北去廣州二萬四千里婆利國在廣州東南海中洲上去廣州二月行土氣熱如中國盛夏槃槃國梁時通焉在南海大洲中北與林邑隔小海自交州船行四十日至其國赤土國扶南之别種也在南海中水行百餘日而達所都地方數千里其王姓瞿曇氏真蠟國在林邑西南本扶南屬國去日南郡舟行六十日而至南接車渠國西有朱江國後分為二國羅刹國在婆利之東其人極陋朱髪黒身獸牙鷹爪時與林邑人作市投和國隋時開焉在南海大洲中真蠟之南自廣州西南水行百日至其國闍婆國在南海中阿羅陁阿羅單婆皇婆達丹丹邊斗都昆拘利比嵩杜薄薄剌㪍焚火山無論婆登烏篤訶陸多篾多摩長哥羅舍分已上諸國俱在南海占城國在中國之西南東至海西至雲南南至真蠟北至驩州北去廣州便風半月程東北至兩浙一月程北至交州兩日程陸行半月程其地東西七百里南北三千里三佛齊國南蠻别種與占城為鄰在真蠟闍婆之間所管十五州汎海便風二十日至廣州如泉州舟行順風月餘亦可到其國在海中扼諸畨舟車徃來之咽喉故諸國之舟輻輳焉勃泥國在京都之西南大海中去闍婆四十五日去三佛齊四十日程去占城與摩逸各三十日程皆計順風為則所統一十四州注輦國東距海五十里西至西天竺千五百里自古不通中國水行至廣州約四十一萬一千四百里宋始入貢州眉流國東至占臘五十程東北至廣州三十五程宋始入貢蒲甘宋崇寜始入貢南毗國在西南自三佛齊便風月餘可到層檀國在南海傍城距海二千里宋始入貢海道便風行百六十日經勿巡古林三佛齊國乃至廣州暹羅館暹羅國本暹與羅斛二國暹國土瘠不宜耕種羅斛土衍腴多獲暹人嵗仰給焉元元貞初暹人常遣使入貢至正暹降于羅斛合為一國本朝洪武初遣大理少卿聞良輔徃諭之暹羅斛國王參列昭昆牙遣使柰思俚儕剌識悉替奉金葉表朝貢還賜大統厯七年遣使沙里㧞來朝自言本國令陪臣祭思俚儕剌識悉替入貢去年八月舟次烏瀦遇風舟壊漂至海南收獲漂餘貢物上因無表狀可據疑為奸商詭言却之後其子參列寳昆牙立九年遣子昭禄羣膺奉金葉表貢象及諸方物上命禮部員外郎王恒中書省宣使蔡時敏徃賜詔及暹羅國主之印十六年給勘合文册令如期貢二十年又貢胡椒蘇木二十八年詔遣中使趙達宋福等祭其故王參列昭昆牙賜嗣王昭禄羣膺勅諭永樂元年遣使入賀始稱暹羅國二年遣使昆文現表貢方物四年復貢方物且乞量衡為式詔賜古今烈女傳給與量衡七年王遣使奉儀物祭仁孝皇后命中官以告几筵是嵗復遣坤文現貢方物先是南海民何入觀等流移海島遂入暹羅至是因其使歸傳諭國王遣入觀等還毋納流移以取罪戾八年貢馬及方物送中國流移人還賜勅勞之十年復貢十三年昭禄群膺卒其子三頼波磨札剌的嗣位以兵侵滿剌加國滿剌加訴于朝勅諭暹羅國王令與滿剌加平十五年來貢十八年又貢遣中官楊敏等䕶貢使歸國仍厚賚其王十九年王遣使柰懐等六十人入貢謝侵滿剌加國之罪賜紗幣有差二十一年又貢賜使臣及通事總管畨伴有差洪熙宣徳間至如常期正統景泰間貢或不常賜仍舊例成化十三年遣使群謝提素英必美亞二人來貢方物美亞本福建汀州士人謝文彬也昔因販鹽下海為風飄入暹羅遂仕其國嘗至南京其從子瓉偶遇識之為織殊色錦綺貿易畨貨事覺下吏始吐實焉十七年遣行人姚隆徃册封其王𢎞治中遣給事中林恒復徃行册封禮正徳十年遣使貢方物進金葉表嘉靖元年暹羅及占城等夷各載畨貨至廣東未行報稅上乃命贓物照舊入官三十二年國王遣使坤隨離等貢白象及方物三十七年又貢方物比舊稍不同萬厯三年九月暹羅王招華宋頃遣使握坤哪采思灣等奉金葉表貢方物六年十月該舍内閣大學士張闕等題㨿提督少卿蕭廪呈請於本館添設暹羅一館考選世業子弟馬應坤等十名送館教習其國東連大泥南臨東牛西接蘭塲北界大海由廣東香山縣登舟順風計約四十日可至其國彼國來貢必用五六月南風還則用十一二月北風過此不敢行矣其境内有大庫司凢九曰暹羅曰可刺細馬曰疋曹本曰皮細禄曰束骨胎曰果平疋曰倒腦細曰討歪曰六昆大庫司猶華言布政司也府十四曰采納曰老無曰北采曰束板普曰辣皮曰疋皮里曰采野曰多鐃曰千無里曰細辭滑曰采欲曰欵細灣曰沾奔曰魁山縣七十二俱分𨽻各府其土地東南平衍饒稻西北多大山𤓰哇𨽻回回館𤓰哇古闍婆國酋名冉家龍漢晉以前未聞唐為訶陵宋為闍婆元稱𤓰哇其國分東西二王所屬有蘇吉丹打板打網厎勿諸國洪武三年王昔里入達剌遣八的占必奉金葉表貢方物及黒奴三百人納元所授宣勅已而我使至三佛齊𤓰哇要而殺之十三年王八達那巴那務遣阿烈彛烈時奉金葉表朝貢上遣其使還詔諭責王遂絶其使永樂三年其國東王遣使朝貢請印與之五年西王都馬板與東王戰㓕東王時我舟過東王城西王殺我百七十人西王懼遣亞烈加恩謝罪詔勅詰責西王令償死者黄金六萬兩已而遣人貢萬兩禮官請索如數上曰朕利金耶令逺人知畏耳蠲其金賜鈔幣諭之十六年西王楊惟西沙遣人獻白鸚鵡正統八年令三年一貢其國四鄉初至社板僅千家二酋王之流寓多廣東漳泉人又東半日至厮村中國人客此成聚落遂名新村約千餘家村主廣東人畨舶至此互市金寳充溢人富饒又南行可半日至淡水港乘小艇行二十餘里至蘇魯馬益亦有千餘家半中國人港旁大洲林木蔚茂有長尾猱數萬又水行八千里至漳佑登岸西南陸行半日至王居滿者伯夷僅二三百家總領七八人王宫磚墉墉髙踰三丈方三十餘里真臘𨽻回回館真臘本扶南屬國一名占臘在東海中漢武帝時獻萬蛤夜光珠久未通至隋始通中國唐神龍中併扶南而國分為二其南近海多陂澤為水真臘北多山阜為陸真臘後復合為一宋宣和初封為真臘國王慶元中破占城立其國人為占城王占城遂為屬國又有參半真里登流眉蒲甘等國皆屬真臘聚落頗衆地亦廣洪武六年國王忽兒那遣柰亦告卽表獻方物賜大統厯文綺二十年正黎列保昆邪甘苦者遣使貢象及方物景泰二年貢賜王妃文綺朝貢至今不絶其俗尚華侈東向為上右手為㓗縣鎮風俗大類占城滿剌加𨽻回回館滿剌加永樂三年王西和入兒速剌遣使奉金葉表朝貢言願内附為屬郡效職貢七年太監鄭和充册封使賜印誥錦綺封為滿剌加國王九年嗣王拜里迷蘇刺率其妃及子姪五百四十人來朝上御奉天門宴王賜王𢃄羽儀鞍馬金銀錢鈔錦綺王妃冠服子姪傔從賞各有差十年遣使送還國十二年王母來朝貢厚賜之二十二年宣徳九年王復來朝貢賜亦厚天順三年王無答佛哪沙卒子舟茫速沙請封遣使册立為王成化末給事中林榮行人黄乾亨奉使溺海死廕子入監讀書其國舊名五嶼東南距海西北皆山地瘠鹵故未稱焉𨽻暹羅嵗輸金五千兩既奉我正朔始不𨽻暹羅占城𨽻回回館占城古越裳秦林邑漢象林漢末區連殺縣令自稱林邑王遂不入版圖唐元和初改號占城宋淳熙中襲破真臘慶元真臘復讎殍殺幾盡更立真臘人為主洪武二年遣呉用顔宗魯楊載等使占城𤓰哇日本等國賜玉璽書是年遣使蒲旦麻都朝貢言安南侵境上遣使諭安南罷兵是年國阿答阿者遣虎都蠻來朝貢虎象遣中書省管勾甘桓會同館副使路貢賢封阿答阿者為占城國王賜大統厯金綺四年阿答阿者遣答班𤓰卜農奉金葉表朝貢言安南數侵境乞賜兵器樂人俾安南知我乃聲敎所被輸貢之地不敢輙欺負上憐之命中書省咨王言交鄰有道事上以誠占城安南既皆臣事朝廷豈可擅兵相毒即咨安南令其罷兵兵器不爾吝但以安南故賜爾是助爾搆兵也樂器有聲律華夷方言本異中國人不可遣遣爾國人能習華音者來習四十六年遣子來賀聖節賜勘合文册二十四年使至以臣弑君故絶之永樂四年勅王占把的剌得黎賊父子及其黨惡即械送京尚書陳洽在南交軍中馳奏占城國王占把的頼奉命出兵討安南隂懐二心罪下季獷一等耳請發兵討之上以交趾初平不欲窮兵逺夷遣使諭王歸我侵地永樂後遣人朝貢令三年一貢正統六年國人請封其嗣王遣使册封成化中遣使册封正使卒海上副使論罪戍邊其國在大海南南距真臘西距交趾東北際海自閩長樂五虎門西南行順風可十日至東北百里海口立石塔為標舟至是繫焉俗獷悍果于戰鬭尚釋敎三佛齊即舊港又名浡淋在東南海中本南蠻别種初𨽻𤓰哇有地十五州東去𤓰哇東南距滿剌加南距大山西北濵海畨舶輻輳多廣東漳泉人土沃宜稼穡遇敵敢死隣國畏之水多土少將領得居陸民率架筏水中架木柱語言如𤓰哇市用錢布字用梵書其屬有箄馬令凌牙斯􅅾豐登牙儂細蘭諸國唐天祐貢方物米自建隆以至淳熙朝貢不絶我朝洪武初王恒麻沙那阿稱臣入貢四年遣玉的力馬罕亦里麻思奉金字表朝貢賜大統厯文幣六年使來貢八年使從我招諭拂菻十年恒麻沙那阿卒賜王子麻那者巫里三佛齊國王印印駝鈕銀質鍍金是時廣東有祖義者脱罪避居其國久之得為將領暴横掠過客永樂中太監鄭和統海船下西洋至三佛齊南蠻總論蘇潁濵曰古者九夷八蠻無大君長紛紛籍籍不相統制惟北方地廣常為大國以制中夏然蠻夷之俗種姓分别千人為部百家為黨見利則聚輕合易散族類不一其心終莫相愛故其兵利於疾戰而不利於遲久北狄之人綿地千里控弦百萬侯王君長通為一家人畜富庻蔓延山谷之間其心常有所愛重而不忍去故其兵利於遲久而不利於疾戰此二者其大小之勢各有所便宜乎中國之所以待之者各有道也今夫北狄之人伏於隂山之下養兵休士居而不戰此其志未嘗須㬰忘中國也然其心以為戰而勝人猶不若不戰而屈人之兵戰而不勝民之死者未可知也故常大言虛喝而不進以謀弊中國蓋其所愛者愈大故其謀之愈深發之愈緩以求其不失也若夫西戎南蠻西南夷之民悉其衆庻尚不能當狄人之半而其酋長毎為亂不能自禁此誠無愛于其心而僥倖於一戰以用其烏合之衆而已故夫蠻夷之人擾邊求利其中有大志者其類皆可以謀求也愚嘗觀於西南徼外以臨蠻夷之衆求其所以為變之始而遂至於攻城郭殺人民縱横放肆而不可救者其積之莫不有漸也夫蠻夷之民寜絶而不通今邊鄙之士利其貨財而納之於市使邊民凌侮欺謾而奪其利長吏又以為優民而不之禁窮志無聊莫可告訴故其勢必至於解仇結盟攻刼蹂踐殘之于鋒鏑之間而後其志得伸也嗟夫為吏如此又見其不知本矣通關緝吏民待之如中國之民彼尚誰所激怒而為此哉然事不患不知患乎人之不能用昔班超處西域數十年西破龜兹北伏匈奴及將東歸或以為必有奇謀方就問其計然其言止曰察見淵中魚不祥屯戍之士皆非忠臣孝子不可盡繩以法當是時莫不皆笑以為不足用然及西域之亂終亦如此故夫謀非必奇而後可用在乎當否而已古者四夷皆置校尉而益州有蠻夷騎都尉以治其事使其强者不能内侵而弱者不為中國之所侮葢為是也范氏曰嘗考春秋之世及戰國先秦以來未有得志於南蠻者也葢以瘴毒險阻不得天時地利所恃者人和而已而民從征役皆知必死如徃棄市則是三者皆亡矣秦發閭左戌五嶺而陳項起遂以亡秦漢初吕后欲誅趙佗士卒不能踰嶺武帝擊越發兵江淮因巴蜀罪人等放棄之葢不可以中國之師涉其地也遂滅南越以為九郡元帝卒罷珠崖光武遣馬援擊交趾最為有功然三年而後士卒死者十五六乃得一女子之首其難也如是是以聖王不重外而輕内不勤逺而忘邇恐征伐不息變生於内而摇其本也安南事實安南本古南交地秦象郡漢交趾九真日南三郡治羸婁呉改九徳武平新昌宋改宋平徙龍編梁安南鎮南都䕶五代之亂推丁部為帥宋封其子璉交趾郡王後黎桓李公藴陳日照相繼簒立又五世為黎季犛所簒永樂四年遣兵平之建交趾布政司領府十七州五屬州四十一縣一百五十七宣徳二年黎利復叛遣兵討之利懼奉表乞立陳氏後朝廷許之因罷郡縣已而利簒陳自立嘉靖六年其參督莫登庸乗黎之亂弑黎廬自立僣國號曰大越改元眀徳子方瀛嗣改元大正且侵内地十八年遣兵討之登庸表降請罪願歸侵地於是朝廷赦登庸罪署子方瀛安南都統使遂罷兵然其専擅自若也安南入路入交道三一由廣西一由廣東一由雲南由廣東則用水軍伏波以來皆行之廣西道宋行之雲南道元及我朝始聞廣西道亦分為三從憑祥州入者由州南闗隘一日至交之文淵州坡壘驛復經脱朗州北一日至諒山衙又一日至温州之北險徑半日至鬼門闗又一日經温州之南新䴡村經二十江一日至保禄縣半日渡昌江又一日至安越縣南市橋江下流北岸一道由思明府入過摩天嶺一日至鬼陵州過辦强隘一日至禄平州州西又路一日半至諒山府若從東南行過車里江此江永樂中黎李犛堰之以拒王師後傎知其堰處乃决之以濟師一日半至安博州又一日半至耗軍峒山路險惡又一日至鳳眼縣又分二道一道一日至保禄縣亦渡昌江一道入諒江府亦一日至安越縣之南市橋江北岸各與前道會其自龍州入者一日至平而隘又一日至七源州二日至文蘭平茄社又分為二道一道從文蘭州一日經右隴縣北山徑出鬼門闗平四十里渡長江上源經右隴之南沿江南岸而下一日至世安縣平地至安勇縣又一日至安越縣之中市橋江北岸一道從平茄社西一日半經武崖州山徑二日至司農縣平地又一日半亦進至安越縣之北市橋江上流北岸市橋江在安越縣境中昌江之南諸路總會之處隨處皆可濟師一日至慈山府又至東岸嘉林等縣渡富良江以入交州雲南亦有二道其一道由䝉自縣經蓮花灘入交州之石隴關下程瀾洞循洮江源左岸四日至水尾州又八日至文盤州又五日至鎮安縣又五日至夏華縣又三日至清波縣又三日至臨洮府洮水即富良江上流其北為宣光江南為沱江所謂三江者也臨洮二日至上圍縣又二日至興化府即古多邦城自興化一日至白鶴神廟三岐江又四日至白鶴縣渡富良江其一道自河陽隘循洮江左岸十日至平原州又五日至福安縣又一日至宣江府又二日至端雄府又五日亦至白鶴三岐江然皆山徑歌側難行其循洮江右岸入者地勢平夷乃大道也若廣東海道自亷州烏雷山發舟北風順利一二日可抵交之海東府若沿海岸以行則烏雷山一日至永安州白龍尾白龍尾二日至玉山門又一日至萬寜州萬寜一日至廟山廟山一日至屯卒巡司又二日至海東府海東二日至經熟社又石堤陳氏所築以禦元兵者又一日至白藤海口過天寮巡司南至安陽海口又南至塗山海口又南至多漁海口各有支港以入交州自白藤而入則經水棠東潮二縣至海陽府復經至靈縣過黄徑平灘等江由南䇿上洪之北境以入其自塗山而入則取古齋又取宜陽縣經安老縣之北至平河縣經南䇿上洪之南境以入其自多漁海口而入則由安老新明二縣至四岐遡洪江至快州經鹹子關以入多漁南為大平海口其路由大平新興二府亦經快州鹹子闗口由富良江以入此海道之大畧也交州之東有海陽荆門南䇿上洪下洪順安快府等府去海頗逺各有支港穿達迤邐數百大艦不能入故交人多平厎淺舟以便入港云安南總論按交趾本秦漢以來中國郡縣之地五代時為劉隱所併至宋初始封為郡王然猶授中國官爵勲階未始以國稱也其後封南平王奏章文移猶稱安南道孝宗時始封以王稱國而天下因以髙麗真臘視之不復知其為中國之郡縣矣李氏傳八世陳氏傳十二世至日焜為黎季犛所簒季犛上表竄姓名為胡一元子蒼易名奆詐稱陳氏絶嗣奆為甥為權署國事我太宗從其請逾年陳氏孫名添平者始遁至京愬其實季犛乃表請迎添平以還國朝廷不逆遣使送添平歸抵其境季犛伏兵殺之并及使者事聞太宗命張輔總兵討之生擒季犛詔求陳氏遺裔立之國人咸稱犛殺之盡無可繼承者僉請復古郡遂立交趾都布按三司及各府州縣衞所諸司一如内地其後有犛利者乃夷中之夷也中官庇之遂至猖肆上表請立陳氏後宣宗皇帝謂此皇祖意也祖訓不許後人伐其國遂聽之即棄其地俾復其國嗚呼自秦并百郡交趾之地秦為象郡已與南海廣東桂林廣西同入中國漢武立嶺南九郡而九真日南交趾與焉在唐中葉江南之人仕中國顯者猶少而愛州人姜公輔已仕中朝為學士宰相與中州之人相頡頏矣柰何世亘五代為土豪所據宋興不能討之遂使兹地淪於要荒之域而為侏㒧藍縷之俗一何不幸哉安南總論嘉靖間登庸歸順葢知中國厭兵一謝外貢使不復至而帝其國自如也久之登庸與子方瀛相繼死孫福海嗣位又死子㓜方六嵗大臣阮敬等専權國復亂矣安南總論自古治安南者莫善於周莫烈於漢莫弱於宋莫鄙於元何者成周之隆政敎洋溢九夷八蠻之長莫不稽首奉琛著在王會而越裳氏以白雉來獻周公為之謝而遣之曰徳澤不加君子不享其物㫖哉言乎足以辨華夷而昭義利恢恢乎王道之大體也不亦善乎漢武帝承嬴秦之畧侈五葉之豐騁其雄心開拓炎徼使五嶺以南重溟以北鼻飲儋耳之域三五不能臣妾者而為之宰割疆界張設官吏與内郡比隆斯亦振古無前之績也可不謂烈乎交州當五代之亂負險䟦扈䂓為龜兹兩漢經畧之迹蕩然湮泯宋興有西北之警不遑南顧以致易位者三姓而不能問也又復因其來貢而即以封之躋以崇階賜以寵命長其􅕝侮時時入寇邕欽殺掠民吏而不可報也可不謂弱乎元世祖以漠北之豪耽縱屠殺鳩數十萬兵統以愛子躪蹂海隅三駕而不服不過難之以入朝要之以珍玩而所遣長吏徃徃以章賂賣法賈怨外夷是貪冒之故習也可不謂鄙乎我朝應運開天再闢寰宇陳氏先納欵髙皇嘉之假以王號使之因俗而治作屏南隅不伐之言垂之祖訓柔逺能邇一周公之懿也文皇帝當陳氏之微黎氏之叛怵惕水火一戰而有之誅其君而弔其民龍編鳶壤再覿官儀赫乎漢武之烈也雖噢咻稍踈約束大驟為夷人所不堪而董以學校風以詩書䂓模亦宏逺矣迨乎季犛稱逆衰兇鞫頑士民淪溺者不可勝計章皇帝不忍黔元之塗炭捐其故宇以安反側百年以來塞徼寜謐無斥堠之警不可謂無大造於南土也惜乎當其時無有倡棄絶之義以少示貶謫而仍以王爵受其貢獻為稍靡爾頃者黎氏失國而莫氏代之其釁未之詳也在黎氏必滛慆敗度故衆叛親離在莫氏必隂施市恩故能潜移黙奪不然豈以一國之主累世之威忽然異姓而更無倡義於其間者哉桓叔之入晉也晉人啟之也於是乎有椒聊之詠田恒之代齊也齊人附之也於是乎有采芑之歌莫氏之於安南亦由是也其得民深矣其自衞固矣征之則失春秋詳内畧外之體因而與之又非天王正名定分之心故不若先之以責讓之辭詰其簒殺之由曉以君臣之義以觀其臣民向背之機而徐為之所如其㝠然矯䖍不可曉諭也為之申固闗隘卻擯貢獻絶不為臣則莫氏者必皇皇然曰天朝之棄我如是我何以取重於臣民也其臣民亦將曰莫氏為天朝所不赦而吾父子兄弟皆亂賊之黨也庻或有倡義而圖之者即不有以圖之則吾中國禮義綱常固凛然觀示於外域也吾故曰征之不若棄絶之為得䇿也古西夷總叙杜氏通典邊防叙畧曰西羌出自三苖葢姜姓也其國近衡山及舜徙之三危漢金城之西南羌地是也濵於賜支至於河首綿地千里南接蜀漢徼外蠻夷西北鄯善車師諸國所居無常依隨水草地少五榖産牧為業其俗氏族無定或以父名母姓為種號妻後母納嫠嫂如匈奴之俗故國無鰥寡種繁熾在古不立君臣無相長一强則分種為酋豪弱則為人附落更相抄掠以力為雄殺人償死無他禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥甚耐寒苦同之禽獸昔夏啟之子太康失國四夷皆叛及后相立乃征畎夷七年然後來賔至於后泄始加爵命由是服從后桀之亂畎夷入居邠岐之間成湯既興伐而攘之及殷室中衰諸戎皆叛至於武丁征西戎鬼方克之及武乙暴虐犬戎冦邊周古公踰梁山而避於岐下及王季遂伐西落鬼戎自是之後更伐始呼翳徙之戎皆克之及武王克啇羗髳率師會於牧野至穆王時戎狄不貢王乃西征犬戎獲其五王遂遷戎于太原夷王衰弱及宣王立召秦莊公興兵伐破之其後侵盗不已至幽王昏虐西戎冦周殺幽王於驪山周乃東遷洛邑及平王之末周遂陵遲戎逼諸夏自隴山以東及乎伊洛徃徃有戎於是渭水有狄貊邽冀之戎涇北有義渠之戎洛川有大荔之戎渭南有驪戎伊洛間有揚拒泉臯之戎潁洛以西有蠻氏之戎間在中國與諸夏盟會後晉㓕驪戎是時伊洛戎强東侵曹魯襄王時秦晉自𤓰州遷陸渾之戎于伊川允姓之戎遷于渭汭戎河南山北者號曰隂戎秦穆公得戎人由余遂霸西戎開地千里及晉悼公及使魏綘和諸戎復修霸業其後隂戎之種遂以滋廣與晉伐周後陸渾戎叛晉荀呉㓕之後楚執蠻氏而盡囚其人至周貞王八年秦厲公㓕大荔取其地趙亦㓕北戎韓魏後稍并伊洛隂戎㓕其脱遺者皆走西戎汧隴自是中國戎冦唯餘義渠之種最為强盛屢為人患及昭王起兵㓕之始置隴西北地上郡焉始皇兵務東向故得繁息秦平天下䝉恬西逐諸羌出塞漢初尚微弱景帝時汧種求徙於狄道安故武帝又西逐渡河湟初開河西置四郡其後先零種圍枹罕漢兵擊平之始置䕶羌校尉至宣帝代又冦金城趙克國立屯田且討且招降者三萬餘人置金城屬國以處之自後賔服後漢光武建中初冦金城馬援討破降之徙七千口于三輔和帝以後又反叛豪滇零稱天子南入益州東犯趙魏冦及雍城十餘年然後破散順帝永和中又叛漢將馬賢戰没後叚熲窮討及靈帝末方始平定自光武以後匈奴少事惟西羌屢梗魏晉二代關隴不至大傷害永嘉以後吐谷渾興焉本遼東鮮卑晉時數百戸西附于隂山屬晉亂遂併吞諸羌而有其地至其孫葉延遂為强國後魏宋其主夸吕自號可汗建官多效中國洎隋煬帝遣觀王雄大破之其王伏允逺遁收其地列置郡縣鎮戍後轉衰弱唐初吐蕃始興焉其帥後魏末自臨松郡丞故其主有贊之號髙宗時遂㓕吐谷渾盡有其地將軍薛仁貴等大敗于大非川儀鳯中工部尚書劉審理又率兵十八萬敗没於青海調露中中書令李敬𤣥又大敗于大非武太后如意初王孝傑方大破之復龜兹等鎮萬嵗通天初又寇梁州都督許欽明戰殁因贊普殺其名將論欽陵此後累破敗遂劣於曩時矣古西戎考畧皆羌屬多散處三河之聞羌無弋爰劒不知何戎之别也自秦亡入三河附落出析支河曲數千里其後子孫分别各自為種任隨所之或為氂牛種越嶲羌是也或為白馬種廣漢羌是也或為參狼種武都羌是也爰劍曽孫忍及弟舞獨留湟中忍生九子為九種舞生十七子為十七種羗人興盛從此始後分支凢百五十種如氂牛白馬羗在蜀漢其種别名號皆不可知姚弋仲南安赤亭羌人世為羌酋其饒富雄于洮罕之間後至萇襲弑苻堅僣帝國號秦傳三十二年而亡湟中月氏胡其先大月氏之别也在張掖酒泉地及漢取河西開湟中於是月氏來降與漢人錯居氐西戎之别種在冉䮾東北廣漢之西其種非一或號青氏或號白氏或稱蚺氏此蓋中國人即其服色而名之也後漢建安中氐酋楊勝始㨿仇池氏漸强盛苻氏世為西戎酋長又謂之蒲家後苻洪自稱大單于子健取長安稱帝國號秦傳生堅丕登五世而亡葱茈羌燉煌西西域之南山中從婼羌西至葱嶺數千里有月氏餘種葱茈羌白馬黄牛羌各有酋豪北與諸國接不知其道里廣狹吐谷渾本遼東鮮卑也西晉時酋帥徒河渉歸有二子長曰吐谷渾少曰若洛廆代統部落别為慕容氏渾庻長初西附隂山後度隴西止於枹罕而子孫㨿有甘松之南洮水之西南極于白蘭在交州西北其青海周迴千餘里自永嘉時有國至龍朔三年吐蕃取其地而封嗣絶乙弗敵後魏開焉在吐谷渾北西北又有可蘭國宕昌羌後魏時興焉亦三苖之𦙍與先零燒當罕开諸部姓别自立酋帥皆有地分不相統攝宕昌其一也其界自仇池以西東西千里席水以南南北八百里至周武帝時以其地為宕州鄧至羌之别種有像舒理者代為白水酋帥因地名為號党頂羌三苖之後在古析支之地漢西羌之别種其地東接臨洮西平隣西距葉䕶南北數千里白蘭羌之别種東北接吐谷渾西至叱利模徒南界郍卾吐蕃在吐谷渾西南唐時最為强國與唐約盟境上吐蕃守鎮蘭渭原會西臨洮東成州抵劍南西磨砦諸蠻大渡水之西南盡大河北自新泉軍抵大磧南極賀蘭槖駞嶺其間為閒田在宋時唃氐為最强幅􅊷萬里其地東與松茂嶲接大羊同東接吐蕃西接小羊同北直于闐東西千餘里悉立在吐蕃西南章求㧞西羗種也在悉立西南泥婆羅在吐蕃西大勃律直吐蕃西與小勃律接西隣北天竺烏萇地個失宻北距勃律五百里環地四千里骨咄廣長皆千里蘇毗本西羌族為吐蕃所并號孫波在諸部最大沙州本漢燉煌故地唐天寳末䧟于西戎西夏本姓拓䟦氏唐末拓䟦思恭鎮夏州統銀夏綏宥静五州地討黄巢有功賜姓李四傳至繼捧率族人歸宋賜姓趙氏更名保忠繼遷其族弟也㨿有夏州及子徳明孫元昊悉有夏銀宥綏静霛鹽會勝甘凉𤓰沙甘肅等州僭稱皇帝國號大夏世為宋邊患後為元所㓕夏之境土方二萬餘月河之内外州郡凡二十有二河南之州九曰霛曰洪曰宥曰銀曰夏曰石曰鹽曰南威曰會河西之州九曰興曰定曰懐曰永曰凉曰甘曰肅曰𤓰曰沙熙秦河外之州四曰西寜曰樂曰廓曰積石髙昌館髙昌即和卓以其地勢髙敞物産昌盛故名髙昌又山如火天氣常熱故亦名和卓乃西域諸國之一也本漢車師前後王地前王治交河城即唐交河縣去長安八千里後王治務塗谷即唐蒲類縣去長安九千里漢元帝時置戊己校尉屯田於前王庭後魏時其地為蠕蠕所併有闞伯周者始自稱髙昌王唐大宗平髙昌置西州及都督府後䧟於吐蕃其地有囬鶻雜居故又名囬鶻宋時屢遣使入貢元號輝和爾𨽻瑪哈穆特國朝號和卓在嘉峪關外西行可一月至和卓城方十餘里其東七十里有栁陳城西百里有土魯番永樂七年土酋遣人朝貢十二年吏部員外郎陳誠至其國還言其國風俗蕭條市里民居僧堂過半亦皆零落東有荒城故址云古髙昌國治漢西域長史戊己校尉並居焉宣徳五年和卓王哈克繖土魯畨萬户賽音特穆爾栁陳城萬戸斡齊爾俱遣人貢馬及玉璞正統間哈喇和卓等處入貢成化間都勒噶萬戸輝和爾等入貢𢎞治間喀什噶爾地面阿巴拜珠爾等入貢正徳間土魯畨等指揮格根鼐爾等入貢嘉靖以來髙昌歸化寺等處普覺静修國師巴延布拉克都督恰濟保喇指揮等官瑪哈穆特入貢至今或三年五年來貢不絶其地東至哈宻西連額爾巴拉南抵于闐北接衛喇特東南至肅州其山川靈山蒲類海交河為大地近髙昌本屬髙昌館譯審但其中多回回人入貢時亦用回回字者故又屬回回館此當臨時分别也哈宻哈宻本古伊吾廬地在燉煌北大磧外西北羌人徃來要路也漢明帝時收伊吾廬地以為屯田班超及班勇平西域龜兹等十七國皆來服唐貞觀擒頡利遂裂其地以為伊州為唐之郡縣矣元封烏納實哩為威武王已而改封肅王卒弟恩克特穆爾嗣國初置甘州五衞于張掖肅州衞于酒泉凉州衞于武威西寜衞于湟中又置山丹永昌鎮畨莊浪四衞髙臺鎮夷古浪三千戸所自陜西蘭州渡河千五百里至肅州肅州西七千里為嘉峪闗永樂初設闗外七衞曰哈宻曰安定曰鄂端曰齊勤䝉古曰察遜曰罕都左七衛皆在嘉峪關西哈宻又在六衛西東去肅州西去土魯畨各千五百里北至衛喇特數百里永樂二年改封恩克特穆爾為忠順王以頭目瑪哈穆特和卓為指揮等官分其衆居苦峪城三年忠順王卒兄子托克托嗣立賜金印詰命玉𢃄文綺四年賜王及其祖母綺幣有差六年托克托暨祖母各遣使朝貢九年托克托卒封埒克特穆爾為忠義王守哈宻卒從父子博囉特穆爾嗣封忠順王賜印誥十二年行在騐封員外郎陳誠使西域還言哈宻城在平川可三四里東北二門王稱蘇勒坦僅數百戸顧非一種多䝉古回回人習俗各異西域三十八國入貢經哈宻者相攔出入索道錢乃已洪熙元年貢硫黄正統四年貢玉天順四年又貢成化元年令嵗一貢貢不過三百人至京不過三十人八年酋哲林弑博囉特穆爾無子王母蘇勒坦理國事九年土魯畨蘇勒坦阿里欲以哈宻掠齊勤諸夷王母不從虜王母金印去遣髙陽伯李文通政劉文討阿里調罕都齊勤畨兵數千駐苦峪不敢進十四年阿里死子阿哈瑪特稱蘇勒坦未壯二十年守臣請乘間封哈尚嗣忠順王𢎞治元年阿哈瑪特至哈宻誘哈尚頂經結盟遂殺哈尚遣使入貢詭言哈尚病死國亂乞立為王居哈宻領西域職貢兵部尚書馬文升以為不可許且請諭令阿哈瑪特還王母及金印併還我哈宻四年遣哈宻頭目舍音和珊齎勅徃諭阿哈瑪特以金印城池來歸遣使朝貢厚賞之文升言哈宻有回回輝和爾哈喇輝三種共居一城種類不一貴賤不相下必得元遺孽嗣封庻可攝服諸畨乃立安定王族孫善巴為忠順王六年阿哈瑪特復入哈宻虜善巴及金印去遣兵部侍郎張海行視經畧海至河西修嘉峪闗捕哈宻奸回通阿哈瑪特者二十餘人戍廣西請絶西域貢時文升亦請閉嘉峪闗絶西域貢令諸夷歸怨阿哈瑪特乃西域諸夷怨朝廷宴賞大减又阻其由海道貢獅子反相率從阿哈瑪特阿哈瑪特遂復入哈宻自稱王汗大掠罕都諸夷已而阿哈瑪特西去令頭目伊蘭以二百餘人㨿哈宻乃用文升議效陳海故事遣副總兵彭清統精兵三千田南山馳至罕都即調罕都諸畨兵乗夜倍道襲伊蘭伊蘭詗知遁去我兵入哈宻得善巴妻女皆携歸住塞上師還亦多物故然西域自是知畏中國九年阿哈瑪特又襲破哈宻十年秋阿哈瑪特令人送善巴還哈宻是冬起王越為總制經畧土魯畨哈宻十一年越出河西取善巴至甘州復封為忠順王十二年春善巴至肅州畏畨虜不肯出闗守臣遣兵防䕶至哈宻是夏遣舎音和珊致賞賜於土魯畨遂與土魯畨諸夷使入京朝貢十三年阿哈瑪特及哈喇諸國皆令人朝貢十七年春善巴嗜酒掊尅國人頭目昭里克哈等迎阿哈瑪特次子津特穆爾守哈宻善巴棄城走沙州津特穆爾哈尚外孫也守臣令官舍董傑及恩克保喇徃哈宻撫諭衆夷迎善巴還頭目額布勒不聽必欲立津特穆爾為王恩克保喇與傑等擒殺額布勒等六人餘黨畏服守臣令都指揮朱瑄率兵送善巴入哈宻撫蒞送津特穆爾還土魯畨津特穆爾不肯還徙居甘州正徳元年善巴死其子拜雅喇嗣封㓜弱守臣恐津特穆爾還來侵哈宻留不遣三年莽蘇爾稱速檀遣人朝貢乞還津特穆爾七年冬令哈宻三都督送津特穆爾西還八月拜雅喇滛暴欲與恩克保喇叛中國徃土魯畨恩克保喇不從自哈宻奔肅州拜雅喇棄城走入土魯畨瑪喇勒令頭目和卓塔濟廸音與舍音和珊們拉阿繖入哈宻取金印九年莽蘇爾率衆分㨿喇木等城又日夜聚謀侵甘肅遣都御史彭澤總督軍務邊防十年春澤至甘州和卓塔濟廸音雅穆拉侵齊勤王子莊澤令通事與三都督送土魯畨土魯畨得賞物以金印與舎音和珊以哈宻付們拉阿繖是冬舎音和珊等入京朝貢十一年莽蘇爾令和卓塔濟迪音雅穆拉㨿哈宻又至沙州入嘉峪闗攻我肅州兵備副使陳九疇發憤捶死諸奸回及通賊都督實伯音徳爾馮城拒戰退賊又急調屬夷兵刼其老營遣人結衛喇特搗巢穴破其三城土魯畨大創時實伯音徳爾子穆爾瑪哈穆特入貢在京巧賄權倖澤九疇削籍三年莽蘇爾大舉兵冦甘州九疇忠勇先登力戰既解甘州圍又夜率衆間道兼行抵肅州内外夾擊敗畨兵殺和卓塔濟迪音虜退去闗中獻民用九疇議請遷發夷使閉闗絶貢四年雅穆拉復㨿哈宻侵肅州又入沙州五年起故輔臣楊一清提督軍務一清言解讐息兵未幾王憲代一清盡出平凉覊留夷使徃諭土魯畨令悔過復罪歸我哈宻七年莽蘇爾令雅穆拉㨿沙州索覊留貢使雅穆拉不肯棄菽麥數萬率老稚萬人帳房三千奔肅州乞白城山金塔寺住牧守臣議留肅州是春用廷臣張桂方霍議起王瓊代憲瓊至河西反澤所行事是秋天方賽瑪爾堪哈宻頭目各朝貢莽蘇爾亦乞通貢瓊為奏上乞還覊使朝貢夷未報土魯畨酋庫里訥咱爾糾衛喇特侵肅州八年土魯畨貢獅子夷人至乞歸哈宻通貢瓊又奏言土魯畨歸我哈宻乞令實伯音徳爾子穆爾瑪哈穆特守哈宻下兵部其時胡世寜為兵部尚書欲専守河西謝哈宻無煩憊中國議上諸臣不聽明年莽蘇爾遣使庫里孔及天方諸夷入貢方物又索雅穆拉兵部因請許其通貢著令三年或五年為期貢使雖多十二人入京餘留塞上是後哈宻十王魯畨所㨿北敵盤窟海西衛喇特結巢北山河西守臣防禦羌人不暇及西鄙事要之哈宻守與否固不足為中國利害也安定鄂端安定韃靼别部也地廣袤千里無城郭其俗馬乳釀酒氊帳為廬産馬駝玉石洪武七年薩里輝和爾安定王布延特穆爾或曰伊瑪丹遣使貢鎧甲刀劍賜金綺令分其酋長為鄂端阿克展察遜特哩四部賜布延特穆爾銀印仍稱安定王八年設安定鄂端二衞分統四部布延特穆爾卒遣使諭祭宣徳初其察遜叛討平之天順三年安定王遣使來貢自後朝貢不絶成化中為土魯畨殘破遂服屬土魯畨安定王苗裔無考察遜察遜古西戎部落永樂四年設察遜衞以土酋薩音蘇為指揮同知宣徳元年叛討平之論功加國師禪師秩已而遣人入貢正統二年頭目哈瑪爾昭遣指揮和坦貢方物嘉靖中衞人雅穆拉為土魯畨所刼雅穆拉驍勇土魯畨時時令率衆侵哈宻擾我甘肅已而與土魯畨疑貳擁帳來歸土魯畨請還哈宻易雅穆拉欲殺雅穆拉警動我屬夷兵部尚書胡世寜以為不可遂止大抵嘉峪闗西諸衞皆為土魯畨侵擾不復能為我藩蔽矣罕都罕都本西戎部落洪武二十五年侵塞凉國公討之土酋哈扎爾遁去三十年入貢立罕都罕都左二衞官其長索諾木竒爾濟蘇為指揮僉事永樂二年索諾木竒爾濟蘇與兄達爾吉等十六人貢馬陞索諾木竒爾濟蘇為指揮使以達爾吉為指揮同知頭目鈕鈕為指揮僉事賜冠帶鈔幣有差自是嵗貢不絶二罕都皆在沙州城沙州古燉煌地嘉峪闗外諸衞二罕都最弱成化後土魯畨送入哈宻二罕都不能支分散各城正徳中陳九疇擊退土魯畨沙州人稍得生聚耕牧比雅穆拉再入沙州益殘破其酋圗卜等叛附土魯畨嘉靖中瓊撫住白城山肅州月餉粟嵗萬石邊儲坐困魯陳魯陳一名栁城古柳中城縣地我朝宣徳五年魯陳萬戸斡齊爾遣人來貢其地去哈宻千里中經大川沙磧無水草馬牛過此輙死大風倐起人馬相失道傍多骸骨有鬼魅行人失侣白日迷亡夷謂之旱海出川西行至流沙河河上有小岡云風捲浮沙所積道北火熖山色赤如火城方二三里額爾巴拉額爾巴拉在沙漠間或曰焉耆或曰龜兹漢宣帝攻龜兹元康初龜兹王絳賔同主女入朝東漢仍朝貢晉武初遣子入侍唐大宗遣社爾伐之破城執其王後以其地為龜兹都督府宋祥符以後入貢凡九元時名巴實伯里瑪哈穆特封於此洪武二十四年國王哈迪爾和卓遣人貢馬永樂四年王沙木扎干遣人貢玉璞十二年陳吏部使其國十六年頭目蘓噶克拉們拉來朝言烏蘓弑其從兄王納克實扎哈自立為王徙其國西去更别額爾巴勒正統二年王額森布哈遣人貢玉璞駝馬景泰三年遣人朝貢天順以來入貢不絶其國無城郭宮室逐水草住牧夏秋畧煖深山大峪六月飛雪哈喇哈喇在嘉峪闗西近土魯畨世結好哈喇哈喇夷入貢從土魯畨入其地山水草木鳥獸皆黒婦女亦然宣徳七年始遣使朝貢喀什噶爾喀什噶爾宣徳間遣十四人來朝貢或曰即額爾巴拉實哈喇雅實哈喇雅在賽瑪爾堪東五百里城㨿小岡西北臨山河河名水站勢衝急有浮梁其地南近山三面皆平川人繁庻依崖谷而居園林廣茂西有大沙洲可二百餘里無水即有水人不可飲薩蘭薩蘭在達實哈東西去賽瑪爾堪千里城周三里四面平原草木長茂流水一繞五榖蕃殖秋夏間草生黒蜘蜘甚小毒甚嚙人嘉裕勒嘉裕勒西夷小種居人不及千家貧窶乏食常傭鄰國永樂中王拉里瑪們拉遣使必喇台布貢方物宣徳間朝貢黒葛達黒葛達國小民貧平川曠野俗尚佛畏刑市多牛羊交易俱用錢宣徳中國王遣十人來貢方物敏真誠敏真誠國亦大多髙山水流深縛木為度日中為市諸賈皆集永樂中國王遣四十人來朝貢巴達克山巴達克山永樂中遣四十人來朝貢方物其國山川明秀人俗朴實奉佛有浮屠數區壯麗如王宫西洋西域皆商販於此呼爾察呼爾察國微人弱物産凉薄四圍皆山山鮮草木水流曲折亦無魚鰕城僅里許皆土屋板屋王居亦陋永樂十四年常遣人朝貢鹽澤鹽澤在崖二城西南去土魯畨三千餘里在平川中廣不二里居民百家哈迪爾和卓稱王居鹽既死土酋強者統之哈里哈里一名赫嚕賽瑪爾堪西南去嘉峪闗萬三千里漢大宛魏洛郍隋蘇對沙那及石國皆其地自漢貳師屢征求汗血馬于大宛至隋唐朝貢不絶宋無聞焉元駙馬特穆爾之子薩哈勒居其地國人稱為蘓勒坦猶華言君王也東有按都呼巴喇勒哈諸城皆𨽻焉洪武二十五年遣使詔諭酋長賜金綺永樂七年頭目莽賚等朝貢十二年遣行在吏部員外郎陳誠使其國正統二年指揮哈濟等貢馬玉石城方十里居平川川廣百里四面大山王並東北山壘石為屋相見稍屈道薩里瑪勒一語握手或相抱為禮按都呼按都呼𨽻哈里西南去哈里千三百里東北去賽瑪爾堪亦如之城在大村中村廣百里城居十一平曠無峻險地沃人繁庻稱樂土巴喇勒哈巴喇勒哈一名巴哈在按都呼東北城居平川周十餘里南近山無險扼地平廣食物豐饒西南諸畨賈聚焉永樂中哈里薩哈勒又遣其子守之白松虎兒白松虎兒舊名蘓滿埒里國中無大山先時嘗有白虎出松林中遇獸不食遇人不傷旬月後竟不見國人稱為神虎父老又曰此西方白虎降精以是更其國為白松虎兒永樂中遣使十六人來貢達爾瑪逹爾瑪永樂間遣使十八人來朝貢方物賜大統厯文綺藥茶國在海中不滿百里人不滿千家有墻壘而無城郭刑專用箠朴服屬賽瑪爾堪阿蘇阿蘇在近海中為大國多賽瑪爾堪天方諸國人有城倚山面川川南流入海海有魚鹽之市野有耕牧之利敬佛鬼好布施惡争鬭永樂中遣百十二人來朝貢薩哈勒薩哈勒永樂間遣七十七人來朝貢國在阿蘇西南海島中人民淳直耻鬭好佛交易海中諸國西域賈胡來市海中奇物不惜髙價亦有價亷而得奇貨去者薩哈勒人不識也西洋剌泥國永樂元年西洋剌泥國回回哈只馬哈没奇等來朝貢方物因附載胡椒與民互市有司請徴其稅上曰商稅者國家以抑逐末之民豈以為利今夷人慕義逺來乃侵其利所得幾何而虧辱大體多矣不聽哈宻總論哈宻故唐伊州地東接甘肅西距土魯畨為西域諸國之咽喉而土魯畨者强畨也成化中土魯畨酋阿力以兵刼王母及金印歸自此經畧無寜日夫國家置哈宻欲以為外臣藩西陲耳卒之兵連禍結幾與相終始其害何如也即厭兵不能㓕土之畨棄哈宻閉闗絶朝貢置之度外可也兵不足威賞不足結柰何竭中國財力而填之竟取辱也西戎總論西戎之性勇悍好利或城居或野處米糧少金寳多故人勇戰鬭難敗自積石以西諸戎種繁地廣形險俗負强狠人多不馴當俟其外釁乗其内亂則可破矣西洋諸國古俚古俚大國西洋諸畨之會去中國十萬里西瀕海南距柯枝自柯枝海行可三日至永樂元年王馬那必加剌滿遣馬戍朝貢馬五年遣大監鄭和賜王誥幣陞賞其將領有差王好浮屠敬象牛老不傳子傳外孫否則傳弟無外孫弟傳善行人族類分五種如柯枝王南毘人不食犬將領回回人不食猪俗尚信義行者讓路道不拾遺海濵為市通諸畨刑無鞭笞輕斷手足重罰金誅戮没産夷其族有西洋布曰撦黎本出鄰國坎夷浡泥浡泥本闍婆屬國在西南大海中統十四州宋大平興國中始入貢元至元貢方物我朝洪武四年王馬沙漠遣亦思麻逸進金表銀箋貢方物賜金縞永樂三年遣使封其國王麻耶惹加那乃為浡泥國王賜印符誥幣六年王率其妃及子來朝遣使迎勞之福建至南京王上金表獻珍物妃箋獻東宫上宴王奉天門是年王卒于會同館謚恭順塟石子岡樹碑立祠有司春秋祀封其子遐旺嗣賜玉帯金銀綺幣器皿使送歸國遐旺請封其國後山賜名長寜鎮國上為文刻石十二年洪熙元年皆來朝貢黎伐黎伐小國南連大山北際海西距南泥里東南連那孤兒居民一二千家惟一人為首領𨽻蘇門答刺言語服用與蘇門答剌同德爾黙徳爾黙在賽瑪爾堪西南去哈里二千餘里新舊二城相去千餘里王居新城東距阿木河河廣非舟不可渡城内外居民僅數百家􅀈牧蕃息多魚河東地𨽻賽瑪爾堪克實克實在賽瑪爾堪西南二百六十里城㨿大村周十餘里四面水田東南近山中有園林故酋特穆爾駙馬居也䂓模極宏壯堂四隅白石柱如玉墻璧牕牖盡飾金碧綴琉璃西行十數里皆委曲山多奇樹又西去三百里大山屹立中有石峽兩壁懸崖宛如斧劈行二三里出峽口有門夷人曰此鐵門闗也揚徳揚徳在薩蘭賽瑪爾堪額爾巴拉䝉古諸部落間數相侵擾以故人無寜居惟戍卒數百人處孤城中城四面皆亂山東北有大溪西流長數百里達實哈達實哈在薩蘭西去賽瑪爾堪七百里城㨿平原甚狹小布哈爾布哈爾在賽瑪爾堪七百里城居平川周十餘里民物富庻市里繁華戸口萬計地平衍宜五糓六畜大類中國白葛達白葛達海中小國土瘠俗尚佛敎宣徳七年國王遣和者里一思等來朝貢阿哇阿哇永樂中王昌吉剌遣人來朝貢鎻里鎻里西海中小國物産甚微有撒哈剌諸異布洪武五年國王小納的遣馬牙茶嘉兒幹的亦剌丹八兒奉金字表朝貢圖上其土地山川賜大統厯金幣永樂元年復遣人朝貢西洋鎻里西洋鎻里近鎻里差大物産大類鎻里洪武三年使來以金葉表文貢方物上喜王敬中國涉海道甚逺賜甚厚永樂元年復遣人朝貢上曰海外逺夷附載畨貨勿征二十一年西洋十六國遣使千二百人貢方物彭亨彭亨東南海島中並山山傍多平原洪武十一年遣使奉金葉表朝貢賜綵幣永樂十二年遣蘇麻固的里來朝貢其俗上下親狎無冦盗百花百花在海中依山為國國中有奇花嘉樹民俗饒富尚釋教宋祥符中國主茶羅遣奉使侍郎婆里三文等奉表來貢我朝洪武十一年國王丁刺者望沙亦遣八智亞壇奉金葉表朝貢阿魯阿魯一名亞魯在西南海中土廣人稀物産亦薄永樂五年國王速魯唐忽先遣蒲剌哈三附古俚諸國來朝貢遣内臣至其國賜王文綺小葛蘭小葛蘭小國也東連大山西南北皆海永樂中太監鄭和至其國王𤨏里人遣人入貢俗尚浮屠巾服大類錫蘭山自錫蘭山别那里西北海行六書夜可至拂菻在嘉峪闗外萬餘里即漢大秦國也元封初大秦貢花蹄牛髙六尺晉太康唐貞觀開元宋元豐間來朝貢元時其國人多來中國者洪武四年遣其國故民揑古倫賫詔諭之尋遣人來朝貢其俗土屋無瓦貴臣如王服不尚戰鬭古里班卒古里班卒在海中永樂三年國王遣人馬的來朝貢其俗土瘠榖少登氣候不齊夏多雨雨即寒俗質樸物産甚薄吕宋吕宋在海中其國甚小顧産黄金以故富厚人頗質樸不喜争訟永樂三年國王隔察老來朝貢合猫里合猫里地小土瘠國中多山山外大海海饒魚蟲人亦知耕稼永樂三年國王遣回回道奴馬髙來朝貢碟里碟里在東南海中大洲上洲一諸港通江人淳少訟尚佛物産甚薄永樂三年國王遣使馬黒木來朝貢打回打回海外小國數為鄰國所苦已乃治兵器與鄰國戰戰勝稍得自立永樂三年遣麻勿來朝貢日羅夏治日羅夏治海中小國無他奇産崇佛教永樂三年國王遣文羅打時鎮來朝貢忽魯母恩忽魯母恩在東南海中或曰在西徼外國小土瘠物産薄永樂三年國王遣已即丁朝貢甘巴里甘巴里在南海中大島永樂十二年國王兠哇剌查遣得名公葛葛來朝貢麻林麻林未詳其國所在永樂十三年王遣人獻麒麟上喜厚賜之古麻剌古麻剌在東南海中永樂時哇來頓本率其臣來朝至福州卒賜謚康靖勑葬閩縣有司嵗時祭之其國有百餘州有城四重沼納樸兒沼納樸兒在印度之中古所謂佛國也永樂中遣使詔諭國王一不剌金玉遣人來朝貢討來思討來思在海中周徑不百里城近山山下有水赤色望之如火然古赤土國也隋大業三年通焉俗尚佛婦人主家事宣徳六年嘗遣人朝貢吃力麻兒吃力麻兒永樂中遣使十二人來朝貢方物惟獸皮鳥羽罽褐之類其俗不事耕農喜射獵有逵巷無市肆交易無期用錢鉄失剌思失刺思永樂間遣人來朝貢時遣内官以綺幣磁器市馬於迤西賽瑪爾堪失剌思諸國獻陵即位詔諸使至十日内就所在還京毋得托故稽留宣徳中遣使八人來朝貢納失者罕納失者罕東去失剌思數日程皆舟行海中馬有數種最小者髙不過三尺俗敬事僧僧所至必飲食之顧尚氣徤鬭鬭不勝者衆共􅅓之永樂中遣使十人來朝貢亦思把罕亦思把罕於東南海中為大國廣袤近千里四面皆海西北多山東南皆平沙國有城堅壯王居亦侈麗物産豐厚風俗朴尚佛畏刑十施惡奪亦有中國人寄寓者時時出賈賽瑪爾堪永樂時遣使四十四人來朝貢淡巴淡巴在西南海中古狼牙修國也梁時通焉我朝洪武十年國王遣使來貢賜之金幣其國風景秀贍土地廣衍泉甘而水清草木暢茂畜産甚夥城以石築屋以瓦覆王乗輿官跨馬頗有威儀國人勤生種藝織縷抱布男女咸稱常業市有交易野無冦盗稱樂土矣甘把里甘把里永樂中遣六人來朝貢自言其國小介於西南海中與諸鄰國不通交易人民艱窘然奉佛好善不求積聚無乞丐者賔童一其國與占域山地接連有淡澗水澄清佛書所云舍衞乞食即其地也目連所居遺址尚存人物風土草木氣候與占城大同小異惟䘮禮能持孝服設佛事以度死者擇僻地而葬之婚姻遇合情義不忘終乖人倫尸蠻頭者比占城之害尤甚酋長出入或象或馬一如占城霛山其處峻嶺而方石泉下𢃄民居星散結網為業田土肥耕種一嵗二收氣候之節男女之䂓與占城大同小異徃來販泊必于此汲水採薪以濟日用崑崙山其山􆀝然瀛海之中與占城及東西竺鼎峙相望山廣而方根盤曠逺海人名曰崑崙凡徃西洋商販必待順風七晝夜可過俗云上怕七洲下怕崑崙斜怕舵失人舡莫存交欄山其山髙而叢林藤竹柁桿桅檣蓬箬無所不備前元之時令將髙興史弼領兵萬衆駕巨舶征闍婆國遭風至交欄山其舡多損隨登此山造舡百號復征闍婆得勝擒其酋長四國是此知之至今民居有義中國人雜處沙哈魯古投和國也唐貞觀時奉貢永樂間來貢者七十七人其國民淳耻鬭答兒宻古丹眉流國也宋咸平初國主多須機以使九人來貢我朝永樂遣使十八人來朝貢九洲山其山與滿剌加國接境産沉香黄熱香水木叢生枝葉茂翠永樂七年正使太監鄭和等官差兵入山採香得徑有八九尺長八九丈者六㭑香味清逺蘇門答剌國古名須文達那與花面國相接即漢條支唐波斯大食皆其地也漢章帝時進異鳥唐貞觀貢水晶珠後為大食王所侵永徽初大食王遣使朝貢終宋世朝貢不絶村落傍海田瘠少收風俗頗淳民網魚為生朝駕獨木刳舟張帆而出海暮則回舟永樂十二年偽王蘇幹剌冦竊其國王遣使赴闕陳訴請救上命正使太監鄭和等統率官兵勦捕生擒偽王歸獻闕下諸畨震服花面國其處與蘇門答剌國接境即那孤兒國也迤邐山地田足稻禾氣候不常風俗淳厚强不奪弱上下自耕而食富不倚驕貧不為盗可謂一區之善也龍牙犀角其地内平而外凸民下蟻附而居之氣候常熱田禾勤熟俗尚淳厚龍涎嶼獨然南立海中此嶼浮艷海面波擊雲騰毎至春間羣龍來集於上交戱而遺涎畨人乃駕獨木舟登嶼採取而歸設遇風波則人俱下海一手附舟傍一手楫水而至岸其龍涎初若脂膠黒黄色頗有魚腥之氣久則成大塊或大魚腹中剖出若斗大圓珠亦覺魚腥間焚之發清香可愛貨於蘇門之市價亦匪輕翠藍嶼其山大小有七門中可過船傳聞釋迦佛經此山浴於水被竊其袈裟佛誓云後有穿衣者必爛其皮肉由此男女削髪無衣僅有樹木紉結而遮前後然徃來未得泊其山下宣徳七年偶至此山泊係三日夜山中之人獨木舟來貨栁人問舟人果如前言不謬錫蘭山國其國地廣人稠貨物各聚亞於𤓰哇國有髙山參天山頂産青美盤石黄鴉鶻石青紅寳石毎遇大雨衝流山下沙中尋拾得者其海傍有珠簾沙常以網收螺蚌傾入珠池内作爛陶珠為用而貨也海邊一石有足跡長三尺許常有水不乾稱先世釋迦佛從翠藍嶼來岸足踏其跡至今為聖跡也山下有石側卧尚存亦有舍利子在永樂七年上命太監鄭和等齎捧詔勅及建石碑以崇皇圖之治賞賜國王頭目其王亞烈若茶魁負固不恭謀害舟師鄭和等深機宻䇿使衆啣枚疾走夜半奮勇殺入生擒其王至永樂九年歸獻闕下尋䝉恩宥禆復歸國四夷悉欽天順三年朝貢小㖵喃國山連赤土地接下里日中為市西洋諸國之馬頭也永樂七年太監鄭和至其國本國流通使用金銀錢名倘伽地瘠榖少嵗藉榜葛剌米定食氣候常熱風俗淳美男少女多有南毘人柯枝國古槃槃國東連大山西南北皆大海宋梁隋遣使入貢國初來貢永樂中請封其國大山從之鄭和至其國國王𤨏里人也國人五種其處與錫蘭山國對峙氣候常熱田瘠少收村落傍海風俗少淳男女椎䯻穿短衫圍单布其人一種曰木𤓰無屋惟穴居樹巢臨海捕魚為業男女裸體紉結樹葉或草數莖遮其前後行遇路人則蹲宿於道傍伺行過也地產胡椒甚廣豪富俱置板倉貯之以售商敗古里國當巨海之要與僧家宻邇亦西畨諸洋之馬頭也山廣田瘠麥榖頗足風俗尚厚行者讓路道不拾遺法無刑杖惟以石灰書地乃為禁令其酋長富居深山傍通為市聚貨通商嬌美可觀其有一種祼身之人曰木𤓰與木𤓰同也其國能畜好馬多自西畨來忽魯謨斯國其國傍海而居聚民而市地無草木牛羊馬駝皆食海魚之乾風俗頗淳壘石為城酋長深居練兵畜馬田瘠麥廣榖米少收民不富饒山連五色皆是鹽也鑿之鏃為器皿盤碟之類食物就而不知鹽也推石為屋有三五層者永樂三年國王遣馬剌足來朝貢剌撒國倚海而居壘石為城永樂中鄭和至其國連山廣地草木不生牛羊馬駝皆食魚乾民俗頗淳氣候常熱田瘠少收數年無雨鑿井絞車羊皮袋水東西竺其山與龍牙門相望山形相對嵯峨若蓬萊方丈之幽田瘠不宜稼穡嵗藉隣邦淡洋米榖以為食氣候不齊煑海為鹽釀椰子為酒淡洋其處與山河魯山相連去滿剌加三日山逺周圍有港内通大浮汪洋二千餘里奔流出海一流清淡味甘舟人過徃汲水日用名曰淡洋田肥禾盛米粒小炊飲甚香龍牙門在三佛齊西北山門相對若龍角狀中通過船山塗田瘠米榖甚厚氣候常熱四五月間汹雨男女椎䯻擄掠為豪遇畨船則駕小舟百隻迎敵若得數日順風僥倖而脱否則被其截刼財貨泛海者宜防之彭坑國在暹羅西石崖周匝崎嶇逺如平塞田沃榖盛氣候常濕風俗尚慅刻香木為神殺人血祭禱煑海為鹽釀椰漿為酒三島國其地幽然山島花木常茂民倚邊而居田瘠少收網魚於海織布以葉俗朴質凡男子得附舶至中國罄資歸鄉稱為能事尊之有徳父兄皆讃焉煑海為鹽釀蔗漿為酒麻逸國在交欄山之西山勢峻地平廣夾溪聚居氣候稍熱男女椎髻田多膏腴倍於他國俗尚節義夫䘮則婦削髪碎面絶食七日與夫同寢多有並逝者七日不死則親戚勸以飲食或得生終身不嫁或至焚夫屍日赴火而死蓋其節義不改煑海為鹽釀蔗漿為酒假里馬丁國其地與交欄山相望海洋中山列翠屏溪田雖有米榖少收氣候常熱俗甚嚻薄重迦羅其地與𤓰哇相接髙山奇秀内有一石洞前後三門可容一二萬人田榖亞於𤓰哇氣候常暑俗淳無酋長以尊年有徳者主之煑海為鹽釀秫為酒其處山約去數日水程曰孫佗羅曰琵琶拖曰圓嶠曰彭里事耕種專尚寇掠與吉佗峙諸國相通商泊少能至也蘇禄國居東海之洋石崎堡障山塗田瘠種植稀薄民下捕魚鰕生啖螺蛤煑食俗尚鄙陋其國有三曰東王西王峒王永樂十六年其酋長挈妻携子涉海來朝進獻巨珠一顆重七兩五錢今古莫能有也大㖵南國洪武初國王遣使入貢地與都欄礁相近厥土黒壤亦宜榖麥民懶事耕作栽種烏麥之米供食商舶風信到遲則波濤激灘乃載貨不滿葢以不敢停泊也若風逆則遇烏里洋險阻之難矣及防髙即阜沉水之危風俗頗淳阿丹國倚海而居壘石為城砌羅股石為屋三四層厨室皆在用榖麥風俗頗淳民下富饒永樂九年遣太監鄭和諭之命互市其王拜詔待使禮甚恭地近古里佐法兒國臨海住居石城石屋壘起髙三四層者若塔田廣而少耕山地皆黄不生草木牛羊駝馬惟食魚乾男女拳髪穿長衫女以布兠頭面出見人也風俗頗淳竹步國村居寥落地僻西方城垣石壘屋砌髙堆風俗頗淳草木不生地産獅子金錢豹駝有五七尺髙者木骨都束國頻海居之堆石為城操兵習射俗尚嚻强壘石為屋髙四五層男女拳髪四垂山廣赤土不生草木田瘠少收數年無雨穿井絞車牛皮袋水小剌哇國傍海為國民居聚落地廣斥鹵有鹽池但投樹枝於池良久撈起結成白鹽無耕種之田捕魚為業啞魯國小邦自淡水港入風俗淳朴國語婚䘮與𤓰哇同其國王皆回回人山林有飛虎大如猫灰色有肉趐如蝙蝠肉趐生連後足能飛不逺人有獲者不服家食即死南浡里國其國邊海止千餘家皆回回人山産降真香名蓮花降此處最佳國之西北海内有一大平頂峻山半日可到名㡌山山之西大海正是西洋也西來過洋船俱投此山為准其山邊二丈上下海水内生海樹彼人撈取為寳物貨者即珊瑚也其樹大者髙三二尺根大如大拇指按星槎勝覽及瀛海勝覽所載西洋諸國本無闗中國利害雖各國所産之物有可寳玩者而先王不寳逺物亦何足為中國輕重哉于闐大國也去中國萬里張騫窮河源一出于闐是也光武末為莎車王所併後于闐將休莫霸者反莎車自立為王復㓕莎車服從者十三國與鄯善並焉晉太康遣使貢玉印北魏時朝獻不絶梁武天監始通江左隋時其王姓王氏唐時其王姓尉遲氏遣子弟入侍從擊吐蕃有功以其地為毗莎都督府至徳初進方圓二美玉宋建隆其王天聖遣使貢圭我朝永樂二年頭目達魯噶額布勒津遣使貢玉璞十二年吏部陳誠至其國富饒桑麻禾黍宛如中土土人機巧好歌舞紡績俗尚浮屠僧尼尤多溜山一名牒幹小國也洪武初國王遣人朝貢地無城郭倚山聚居風俗淳美尚佛業漁其西有天生石門如城闕然中有八溜各有所主廣三千里所謂弱水三千是也南巫里小國也洪武初遣使貢真香等物其地自蘇門答刺西風一日夜可至其國民千餘家皆回回人乞力麻兒永樂中遣使十二人朝貢其國山卑水淺西南傍海民不事耕稼喜射獵蘇文達那洪武十四年國王殊旦麻勒兀達朌遣使來貢或云即蘇門答剌非也婆羅門即古師子國在西海中延袤二千餘里天竺屬國也晉義熙初貢玉佛宋元嘉梁大通唐總章天寳間朝貢不絶我朝永樂中遣使貢方物其地負山面海念佛素食風俗土産大略與天竺同古西域總叙西域以漢孝武時始通本三十六國皆在匈奴之西烏孫之南南北有大山中央有河東西六千餘里東接漢扼以玉門陽闗西限以䓤嶺諸國大率土著有城郭田畜與烏孫異故皆役屬匈奴西邊日逐王領西域賦稅取足焉其南山東出金城與漢南山屬焉自玉門陽關出西域有兩道西踰葱嶺則出大宛康居奄蔡焉自張騫開西域其後霍去病擊破匈奴右地降渾邪休屠王遂空其地始築令居以西初置酒泉郡後稍發徙人充實之分置武威張掖燉煌酒泉四郡據兩闗焉自李廣利伐大宛之後西域震懼多遣使來貢獻於是東自燉煌西至鹽澤徃徃起亭障是時軍旅連出師行二三十年海内虛耗正和中貳師李廣利以軍降匈奴帝既悔逺征伐而捜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東接枝渠黎皆故國地廣饒水草有溉田五十頃以上處温和田美可益通溝渠種五榖與中國同時熟田一嵗有積榖募人壯健有累重敢徙者詣田所就蓄積為本業益墾溉田稍築列亭連城而西以威西國帝深陳既徃之悔乃不復出軍昭帝時乃用桑𢎞羊前議以給外國使者至宣帝時遣衞司馬使䕶鄯善以西數國及破姑師未盡殄分以為車師前後王及山北六國時漢獨䕶南道未能盡并北道也神雀三年匈奴日逐王來降䕶鄯善以西使者鄭吉迎之乃因使者吉并䕶北道故號曰都䕶都䕶之起自吉置矣由此匈奴益弱不能近西域於是徙屯田于北胥鞬枝莎車之地屯田校尉始屬都䕶都䕶督察烏孫康居諸外國都䕶治鳥壘城去陽闗二千七百四十里與渠黎田官相近土地肥饒於西域中故治焉至元帝復戊己二校尉屯田於軍師前王庭哀平間自相分割為五十五國凡國自譯長城長君監史大禄伯長千長都尉且渠當戸將相至王侯皆佩漢印綬凡三百七十六人而康居大月氏安息罽賔烏弋之屬皆以絶逺不在數中其來貢獻則相與報不督録總領也至王莽時四邊擾亂與中國遂絶並復役屬匈奴前徃西域有二道自元始以後有三道從玉門闗出西經婼羌轉西域䓤嶺經懸度入大月氏為南道從玉門闗出西發都䕶井逥三隴沙北頭經居廬倉從沙西北過龍堆到故樓蘭轉西詣龜兹至葱嶺為中道從玉門闗西北去經横坑辟三隴沙及龍堆出五船皆到車師戊己校尉所經髙昌轉西與中道合龜兹新道後漢永平中匈奴乃脅諸國共寇河西郡縣城門晝閉明帝乃命將北征匈奴取吾廬地置宜禾都尉以屯田遂通西域于闐諸國西域自絶六十五載乃復通焉明年始復置都䕶戊己校尉及明帝崩焉耆龜兹攻没都䕶陳睦匈奴車師圍戊己校尉章帝不欲疲敝中國以事夷狄乃迎還戊己校尉不復遣都䕶復罷屯田匈奴因遣兵守伊吾地時軍司馬班超留于闐綏集諸國和帝元光初竇憲大破匈奴因遣副使尉閻盤掩擊伊吾破之三年班超遂定西域因以超為都䕶居龜兹復置戊己校尉於是五十餘國悉納質内屬其條支安息諸國至於海濵四萬里外皆重譯貢獻九年班超遣掾甘英窮臨西海而還皆前代所未至莫不備其風土傳其珍怪焉及班超被徴以任尚為都䕶尚謂超曰猥承君後宜有以誨之超曰塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懐鳥獸之心難養易敗今君性嚴急水清無大魚苛政不得下和宜蕩佚簡易寛小過總大綱而已尚不能從數年至安帝西域背叛如超所言頻攻都䕶任尚段禧等朝廷以為險逺難相應赴詔罷都䕶自此遂棄西域北匈奴即復收屬諸國共為邊患十餘嵗燉煌太守曹崇諸出兵擊匈奴復欲進取西域鄧太后不許但令置䕶西域副校尉居燉煌羈縻而已其後匈奴連與車師入冦河西漢不能禁議者因欲遂閉玉門陽闗以絶其患尚書陳忠上疏曰臣聞八蠻之冦莫甚北敵髙祖窘平城之圍文帝屈奉供之耻故孝武憤怒深惟長久之計命遣武臣浮河絶漠窮破虜庭遂開西河四郡以隔絶南羌收三十六國斷匈奴右臂是以單于孤特竄跡遠藏由此觀之戎狄可以威服難以化狎西域内附日久區區東南叩闗者數矣此其不樂匈奴慕漢之效也今北敵已破車師勢必南攻鄯善棄而不救則諸國從矣若然則敵財貨日増膽勢益殖威臨髙羌與之交連如此河内四郡危矣不得不救則百倍之役興不貲之費發矣議者但念西國絶逺卹之煩費不見先苦心勤勞之意也臣以燉煌宜置校尉按舊増四郡屯兵以西撫諸國庻足以折衝萬里震怖四夷太后又召班超之子勇議曰昔者孝武皇帝患匈奴彊盛開通西域諸國論者以為奪匈奴府藏斷其右臂遭王莽簒盗徴求無厭西域忿毒遂以背叛光武中興未遑外事故匈奴負盛驅卒諸國及至永平再攻燉煌河西郡城門晝閉明帝命武臣出征西域故匈奴逺遁邊境得安及至永元莫不内屬會間者羌亂西域復絶匈奴遂遣諸國備其逋租髙其價值嚴其期會鄯善車師皆懐忿怒思樂事漢其路無叛前所以時有叛者皆由牧養失宜還為其害舊燉煌郡有營兵三百人宜復之復置䕶西域副校尉居於燉煌如永元故事又宜遣西域長史將五百人屯樓蘭西當焉耆龜兹徑南疆鄯善于闐心膽北扞匈奴東近燉煌如此誠便長樂衞尉譚顯等難曰朝廷前所以棄西域者以其無益于中國而費難供也今車師已屬匈奴鄯善不可保信一朝反覆班將軍能保北人不為邊害乎勇對曰今中國置州牧者以禁郡縣姦猾盗賊也若州牧能保盗賊不起者臣亦願以腰斬保匈奴之不為邊害也今通西域則敵勢必弱敵勢弱則為患微矣孰與歸其府藏續其右臂哉為置校尉以捍北撫西設長吏以招懐諸國若棄而不立則西域屈就北敵縁邊之郡將受困苦河西城門復有晝閉之景矣今不廓開朝廷之徳而拘屯戍之費若此敵遂熾豈安邊久長之䇿哉太尉屬毛軫難曰今若置校尉則西域絡繹遣使求索無厭與之則費難供不與則失其心一朝為匈奴所逼當復求救則為役大矣勇對曰今設以西域歸匈奴而使其因西域租入之饒兵馬之衆以擾動縁邊是為富仇讎之財増暴夷之勢也置校尉者宣威布徳以繫諸國内向之心以疑匈奴覬覦之情而無費財耗國之慮也且西域之人無他求索其來入者不過廪食而已今若拒絶勢必北屬强敵并力以寇掠則中國之費不止十億於是從勇議乃以勇為西域長史將五百人西屯栁中勇遂破平車師自建武至于延光西域三絶復通順帝永建二年勇復擊降焉耆于是龜兹疎勒于闐莎車等十七國皆來服從而烏孫葱嶺以西遂絶六年帝以伊吾舊膏腴之地傍近西域匈奴資之以為鈔暴復令開設屯田如永元時事置伊吾司馬一人自陽嘉以後朝威稍損諸國驕放轉相陵伐矣自魏及晉中原多故西域朝貢不過三數國焉至後魏太武帝使董琬使西域還且言其地為三域自葱嶺以東流沙以西為一域姑墨以南月氏以北為一域西毎之間水澤以南為一域三域之内諸小渠長蓋以百數其出西域更為四出自玉門流沙西行二千里至鄯善為一道自玉門渡流沙北行二千二百里至車師為一道從莎車西行一百里至葱領四千三百里至伽部為一道於是貢獻者十有六國孝文延興中尚書奏以燉煌一鎮界逺西北寇賊路衝慮或不固欲移就凉州羣官會議給事中韓秀曰此蹙境之事非闢土之宜燉煌之立其來久矣雖土連彊冦而兵人素習縱有姦竊不能為害循常置戍足以自全進斷强敵之覘途退塞四夷之闚路若徙就姑藏慮人懐異意或貪留重遷情不願徙脱引寇内侵深為國患且燉煌去凉州三千里捨逺就近防制有闕一朝廢置是啟戎心則彼此交搆互相來徃恐强徒協契竊侵掠土邊役煩興艱難方甚乃從秀議隋煬帝時遣侍御史韋節司𨽻從事杜行滿使於西畨諸國至罽賔得瑪瑙杯王舍城得佛經史國得十舞女獅子皮火鼠毛而還帝復令裴矩於武威張掖間徃來以引至之皆啖以厚利令轉相諷諭大業中相率而來朝者四十餘國帝因置西戎校尉以應接之自燉煌西出玉門陽闗涉鄯善北通伊吾千里自伊吾北通車師前部髙昌壁千二百里自髙昌壁北通車師後部金滿城五百里此其西域之門戸内地故漢戊己校尉更互屯焉伊吾地宜五榖桑麻葡萄其北又栁中皆膏腴之地故漢帝與匈奴争車師伊吾以制西域至隋有諸部雜居勝兵千餘人附於鐵勒人甚驍悍厥田良沃隋末内屬置伊吾郡屬天下亂又臣突厥唐貞觀四年以頡利破㓕遂舉其屬七城來降因列其地為西伊州同於編戸至武太后如意初武威軍總管王孝傑大破吐蕃復龜兹于闐踈勒碎葉四鎮自是諸國朝貢侔於前代矣神龍以後黒衣大食彊盛漸并諸國至於西海分兵戍守鎮焉今之所纂其小國無異聞者則不暇纂古西域考畧樓蘭即鄯善在婼羌西北漢時通焉去陽闗千六百里西北至車師千九百里漢武時列亭障至玉門羌戎盧南與婼羌接渠勒東與戎盧西與婼羌接且末北接尉梨丁零東與白提西接波斯精絶南至小宛可三日行其國西比有流沙數百里山國南與且末接婼羌西與且末接小宛東與婼羌接杆彌南與疎勒東北與龜兹西北與姑墨接西通于闐四百里後漢改其國曰拘彌鄯善本名樓蘭西北至車師千八百餘里卑陸南與車師接車師前後王即髙昌前王國一曰前部治交河去燉煌十三日行其地東西三百里南北五百里後王治務塗谷北與匈奴接郁立斯東與車師後城接龜兹都白山之南二百里南與精絶東南與且末西南與杆彌北與烏孫西與姑墨接漢由輪臺及渠梨地皆相連且彌在車師北本屬役車師尉頭南與疏勒接桃槐去長安萬一千八百里馬耆在白山之南七十里南去尉梨百里北與烏孫接東去交河城九百里西去龜兹九百里地皆沙磧單桓西與烏孫接于闐都䓤嶺之北二百餘里南與婼羌接北與姑墨接國有阿耨達山㨿漢書河源出焉疎勒南有河西帶䓤嶺在于闐國北千五百里烏孫西至康居蕃内地五千里姑墨屬龜兹温宿屬龜兹烏托與難兠接難兠屬罽賔大宛北與康居南與大月氏接子合北與莎車接蒲犁南與子合接莎車西至疎勒五百六十里西南至蒲犁七百四十里漢馮奉世擊斬莎車王威振西域無雷南至蒲犂五百四十里依耐東北至莎車五百餘里罽賔西北與大月氏西與烏弋山離接吐呼羅㧞豆謝䫻識匿烏弋山離條支乘水西行百餘日近日所入云安息西與條支接烏那遏即安息之地大夏在大宛西南二千餘里媯水南大月氏在大宛西可二三千里居媯水北小月氏在路波西南循休西至大月氏千六百里康居在大宛西北可二千里與粟弋伊鄰接其國左右如米國史國曹國何國安國小安國那色波國烏那曷國穆國皆同種奄在西與大秦東南二千里與康居接滑國車師别種白題在滑國東嚈噠在于闐之西都烏滸水南穆國與烏羅鄰鉢和在渇槃陀西波知在鉢和西南賖彌在波知之南烏萇在賖彌南北乾陀在烏萇西挹恒皮山南與天竺接天竺即漢時身毒國都臨恒河有靈鷲山佛出其國五印度各居其地摩掲它本中天竺屬國車離在天竺東南三千餘里大國也師子天竺旁國也在西海中延袤二千餘里髙附在大月氏西南亦大國大秦一名犁靬從條支西渡海曲萬里其地東西南北各數千里人類中國故謂之大秦焉耆北與烏孫接危須西至焉耆百里烏貪訾離西與烏孫接小人在大秦南軀纔三尺軒渠國多九色鳥三童在軒渠國西南千里澤散驢分俱屬大秦刧國治天山東丹渠國堅昆在康居西呼得在䓤嶺北丁令在康居北短人在康居西北男女皆長三尺蒲類治天山西疏餘谷去長安八千三百餘里移支居蒲類波斯在達曷水之西東南去穆國四千餘里西北至拂菻四千五百里悦般在烏孫西北伏盧尼在波斯國西北朱俱波去于闐國千餘里渇槃陀在朱俱波國西粟弋大國在葱嶺附庸小國四百餘城羌阿鈎羌在莎車西南副貨東至阿副使且國西至没誰國中間相去千里狐胡西至焉耆七百餘里疊伏羅去代三萬一千里石國本大宛北鄙之地東女因西海亦有女自王故稱東别之東與吐蕃党項茂州接撥汗都葱嶺西五百餘里西女在䓤嶺之四吐大羅都䓤嶺西五百里與挹怛雜居刼國在葱嶺中西與南俱與賖彌國接㧞豆去代五萬一千里陁羅伊羅在烏茶國北越底延南至婆羅門國三千里西北至賖彌國千里悉萬斤城迷宻西忸宻在悉萬斤西者至㧞在疏勒西迷宻都在者至㧞西大食大食其國波斯之西在泉州西北其國雄壯其地廣袤㨿諸畨衝要拂菻國東南至㓕力沙北至海皆四十程西至海二十程邈黎宋時與于闐國同入貢石國去𤓰州六千里奄在去陽闗八千餘里按西域近有龍堆逺則葱嶺身熱頭痛懸度之阨淮南杜欽揚雄之論皆以為此天地所以限列區域絶内外也自漢武帝圖制匈奴患其兼從西國結黨南羌乃表河西列四郡開玉門通西域以斷匈奴右臂隔絶南羌自是中國帝王當全盛時徃徃遣使逺通西域在漢則為大宛烏孫于闐龜兹月氏諸國在唐則為髙昌焉耆龜兹于闐天竺諸國在宋則為天竺髙昌大食于闐龜兹諸國入本朝則凡哈宻和卓額爾巴拉賽瑪爾堪哈里于闐諸處其名隨世更改不可一一識别而于闐乃其舊稱也今所謂哈宻齊勤蒙古罕都安定鄂端察遜者皆中國前代之邊境即所謂燉煌酒泉伊吾故地也洪武永樂因其土酋内附立以為衞其地處吾近邊薄于北敵不可槩以外國視之使為敵用是亦漢人斷匈奴右臂不使得以通羌之一䇿也今以羌人分西畨與西域為二其實均之為西夷而在海島中者列之為海夷則可矣西戎總論蘇潁濵曰戎狄之俗畏服大種而輕中國戎彊則臣狄狄强則臣戎戎狄皆强而後侵略之患不至於中國而一强而一弱中國之患也彼其弱者不敢以戰是以争赴彊國之餘威以趨利于中國而後無所懼彊者併將弱國之兵蕩然南下而無復反顧之憂然後乃敢專力于中國而不去此二者以勢相從而不可間是以中國之士常不解甲而息也昔者冒頓老上之盛惟西戎之無強國也故匈奴之人得以盡力而苦吾中國使西戎有武力戰勝之君則中國之禍將有所分而不専何者彼畏西戎之乘其後也故北狄强中國不得不厚西戎之君而西戎之君亦將自托於中國然而西戎非有强力自負之國其勢亦將折而入于匈奴惟其國大而好勇其君之意欲區區自立於一隅而不畏北狄之衆而後中國可得而用也然天下之人皆以北方有强捍不屈之匈奴而又重以西戎之大國則中國不勝其困此何其不思之甚也夫烽火之人惟其愚陋而多怨是故可與共憂也惟其强狠而好勝是故可以激而壯也使之自相攻擊而不相下則其勢必至于中國中國因而收之而其不服者乃可鬭也然天下之議又將以為戎狄之俗不喜自相攻鬬而喜擊中國之衆此其勢不可得而合也愚亦以為不然夫四夷之所以喜攻中國者謂夫吾兵之不能苦戰而錦繡金玉之所交會今使吾兵精而食足㨿險阻明􅇏燧吏士練習而不敢懈雖有壯騎無所施設則其利不在於攻中國堅坐而相守不出十年彼外無所掠虜將不忍而執中將反而求以相詬以為起兵之名彼兵交於匈奴而怨結於中國則何以自固故中國舉而收之必將得其歡心然天下之心常畏其强而莫或收之使為北狄之用此何其不識戎狄之情也囘回館囘囘在西域地與天方國鄰其先即黙徳那國王謨罕驀徳生而神靈臣服西域諸國諸國尊為别諳援爾華言天使也國中有佛經三十藏凡三千六百餘卷書兼篆草楷西洋諸國皆用之隋開皇中國人撒哈八撒阿的幹葛思始傳其教入中國本朝宣徳中國王遣人隨天方國朝貢由肅州入至今或三年五年一貢其地有城池宫室田園市肆大類江淮間寒暑應候民物蕃盛亦有隂陽星厯醫藥音樂諸技藝人俗重殺非同類殺不食不食豕肉其附近諸國如土魯畨天方賽瑪爾堪舊𨽻本館譯審此外如占城日本真臘𤓰哇滿剌加諸國皆習回回教遇有進貢畨文亦屬本館代譯賽瑪爾堪賽瑪爾堪漢罽賔也在哈里東北三千里東去嘉峪闗九千九百里東西相距千里地平山川鉄門峽阿木河最大風景偉麗土田膏腴宜五榖頗類中原獨勝諸國城依平原濠深險北有子城王居髙廣在城北隅西南畨賈多聚于此俗尚回回教有拜天屋青石雕鏤極精巧人物秀美多藝尤善作室國東有養夷實喇哈雅薩蘭達實哈西有克實徳爾黙諸城皆𨽻焉自漢之時闗都尉文忠謀殺罽賔王以漢印綬立隂末赴至元魏復通隋更名漕國唐武徳貞觀貢物顯慶三年以其地立都督府拜其王為都督宋時未通我朝洪武二十年國主特穆爾遣回回瑪拉噶富森貢駝馬二十二年貢馬二十四年貢海青二十七年特穆爾遣使德哷必實表貢馬二百匹二十八年遣兵科給事中傳安郭驥等使西域留賽瑪爾堪永樂五年頭目哈濟令呼約逹送安等還且貢方物厚賜之正統十二年又貢馬玉石四年又貢成化十九年阿哈瑪特王貢二獅子夷使請大臣出迎禮部尚書周洪謨以為不可二十三年廣東布政使司陳選言賽瑪爾堪使臣泊六灣貢獅子欲于廣南浮海從滿剌加更市獅子入貢不可貴異物開海道利賈畨貽笑安南諸夷𢎞治三年由南海貢獅子禮官倪岳言南海非西域貢道請郤之自後貢皆從嘉峪闗入嘉靖中其國稱王者五十三人皆遣人朝貢天方天方古筠冲地舊名天堂又名西城宣徳中其王遣沙瓛來朝貢俗用回回厯風景融和四時皆如春田沃榖饒居民樂業貢從嘉峪闗入土魯畨土魯畨一名土爾畨在和卓西百里古交河縣安樂城也城方一二里地平四面皆山氣候多煖少雨雪土宜麻麥有􅆶菓羊馬之利人皆屋居信佛法多僧寺城西二十里有崖兒城城僅二里居民百餘家相傳故交河縣治又云古車師國漢武時樓蘭擊破車師宣帝時分為車師前後王厯魏晉唐宋皆總屬髙昌元屬輝和爾部我朝永樂十二年行在驗封員外即陳誠闕至其國誠言城西北百里有靈山最大夷人言此十萬羅漢􅄺槃處也周行群山約二十餘里悉五色砂石光熖灼人四面峻壑窮崖天巧奇絶草木不生鳥獸鮮少云西夷諸種惟土魯畨最奸狡宣徳五年始遣使來貢正統以後亦嘗求貢成化𢎞治間畨酋阿里阿哈瑪特父子擾我西鄙虜我哈宻忠順王哈尚善巴拜雅喇是時専伺哈宻至正徳遂數犯我甘肅語在哈宻考中嘉靖十一年西域貢稱王者七十五人貢使至二百九十人禮部請國稱一人王内閣言西域稱王者多恐彼自封授或部落自稱先年入貢稱王亦三四十人者答勅並稱王今盡裁奪恐夷情觖望下禮兵部議禮部言西域稱王者惟土魯畨天方賽瑪爾堪三國類答王號人與一勅恐非所以尊中國而嚴外夷也自後各執賜勅率其部落貢不如期使不如數任意徃來勢難阻絶驛傳勞煩宴賜頻數竭我財力以役逺夷計亦左矣遂從禮部言當是時土魯畨强殘破我嘉峪闗外七衛及城郭諸國地大人衆非復陳驗封奉使時矣祖法兒漢大夏隋唐吐火羅是也漢張騫至大夏隋大業入貢唐初臣西突厥唐髙宗時獻大鳥髙七尺顯慶中以其阿緩城為月氏都督府授王阿史那為都督後遣子入侍乾元初與西域九國發兵為天子討賊肅宗詔𨽻朔方行營宋未聞我朝永樂宣徳中王亞里俱遣使朝貢國無城郭俗尚回回教覽邦漢踈勒國也耿恭拜井湧泉退匈奴即其處隋大業時入貢唐貞觀貢名馬儀鳳時吐蕃破其國開元冊其君安定為疎勒王天寳首領裴國良來朝授折衝都尉宋無聞我朝洪武九年國王錫喇穆爾哈喇章來貢宣徳間毎附鄰國貢方物西天館西天即天竺在葱嶺之南去月氏東數千里地方三萬餘里分中南西東北五印度國國各有王地各數千里東與扶南林邑鄰但隔小海耳南際大海西接罽賔波斯北距雪山四周皆山惟南通一谷為國門其中印度則㨿四印度之中也即漢身毒國世傳明帝夢金人遣使之天竺求佛於是佛教始通於中國唐宋以來貢使間有至者國朝永樂六年有榜葛蘭國王靄牙思丁遣人朝貢榜葛蘭者即西天東印度也九年其使至大倉命行人徃宴勞之十二年王蹇弗丁遣人奉金葉表獻麒麟至今貢使久不通其國自蘇門答剌海行過翠藍島至淅地港更舟行五百里至鎻納兒港登陸行三十五里至其國地廣人稠財物豐衍甲於諸鄰國有城郭王及諸國皆囬囬人賦十二刑有笞杖徙流官有印章行移軍有糧隂陽醫卜百工技藝大類中國厯有十二月無閠風俗朴厚人好耕殖一年二熟西畨館吐魯凡百餘種古曰西戎又曰西羌其先出自三苖由舜徙三苖于三危去肅州數百里南接蜀漢徼外蠻夷西北接髙昌諸國昔成湯伐畎夷季厯伐西洛武王時羌髳率師會于牧野宣王時戎殺秦仲幽王時申侯與戎攻殺王平王遷都洛邑避犬戎于是戎逼諸夏自隴山以東及乎伊洛徃徃戎夏雜居焉故有狄䝠戎邽戎冀戎義渠戎大荔戎驪戎陸渾戎隂戎蠻戎遍處内地故春秋戎與諸夏會盟伊洛戎侵曹魯入王城矣秦漢時燒當先零鍾羌參狼為最强至東漢則滇羌自稱天子北地晉時赤亭羌姚秦稱天王矣厥後西羌地為吐谷渾所併唐初吐蕃最大稱其君長曰普贊幅員萬里驅逐天子唐雖納幣結婚而敗盟寇患無寜日五代以後部落各分宋元乘其衰得以收復西北故元世祖始郡縣其地以吐蕃僧帕克斯巴為大寳法王帝師領之嗣世弟子有號司空司徒國公佩金玉印者明興洪武六年命諸酋舉故官授職以攝帝師納木喀巴勒蔵布為熾盛佛寳國師元國公納木喀斯達克巴勒嘉勒燦等為都指揮同知宣尉司元帥招討等官自是畨僧有封灌頂國師及贊善王闡化王正覺大乘法王如來大寳法王者俱賜印誥令比嵗或間嵗貢朝今其地為都指揮使司二曰烏思藏曰朶耳指揮使司一曰隴答宣尉使司三曰朶甘曰董卜韓胡曰長河西魚通靈逺招討司六曰朶甘思曰朶甘隴答曰朶甘丹曰朶甘滄溏曰朶甘川曰磨兒勘萬尸府四曰沙兒可曰乃竹曰羅思端曰那曰麻千戸所十七曰朶甘思曰剌宗曰孛里加曰長河西曰多八叅孫曰加八曰兆日曰納竹曰倫答曰果由曰沙里可哈思的曰孛里加思東曰撒里土兒干曰叅卜郎曰剌錯牙曰泄里壩曰闊則魯孫闡化闡教三王貢使自四川入贊化王自陜西入毎貢百人多不過百五十人大寳大乗二法王貢使毎貢僧徒十人凡諸王嗣封賜誥袈裟僧㡌數珠鈴杵以大慈恩寺喇嘛僧二人充正副使四川自黎州或天全陜西自洮州出洪武初置河州衞改河州衞軍民指揮使司七年置河州茶馬司必里衞二州七站西畨二十九簇嵗納馬七千七百五匹洪武十一年置岷州衞軍民指揮使司又置西寜衞西寜茶馬司嵗納馬三千五百疋市法上馬茶百二十斤中馬七十斤下馬五十斤五王諸僧畨簇在四川西寜洮岷河在陜西西寜在黄河北洮岷河在黄河南陜西諸畨畏宋將軍四川諸畨敬信丁大夫丁大夫玉國初為御史大夫出鎮四川最久威惠並行夷民安輯宋將軍晟洪武永樂中久鎮西垂積功封西寜侯丁宋皆充平羌將軍成化十九年西畨滿松反侵内地巡撫都御史馬文升討之正徳初北人徙居西海蠶食諸畨勢漸吞併正徳十年調朔方勁兵逐勦乃避走松潘旋歸故巢費以萬計竟無成功嘉靖元年西畨反鎮守都督鄭卿討之不克班師自是嵗入境殺擄人畜八年洮岷畨賊數至鞏昌隴右騷動尚書王瓊請賊入聽官軍襲至賊巢畨人畏之已而兵至塞防秋套衆畨賊遂乘虛深入臨洮鞏昌殺掠大慘尚書李承勛言西畨土地被西海君長額布勒侵占日益内徙將來彼此交通益肆猖獗宜悉令瓊從長區處上從之瓊曰欲撫罕必勦先零遣遊擊將軍彭椷鎮守都督劉文統兵自固原進至臨洮分㨿要害且撫且勦撫定六十五簇恃險拒戰者十六簇斬首三百七十西畨風俗大抵皆質直朴魯上下一心君臣為友吏治無文好狠鬭貴壯賤弱懐恩重利尊釋信詛其山川崑崙山可跋海黄河折支湟水為大峯外史氏曰西戎亦能為中國患從申侯逼遷西周附魏嚻族拒東漢唐連吐蕃直入長安宋失熙河併于西夏為禍不小我以官賞貢市羈縻之西鄙稍寜正徳以後邊戎大弛戎心遂啟瓊議欲於洮岷河蘭間繕城堡逺斥堠廣儲積謹備西海勿使得連西畨即有侵侮發請精兵駐臨洮鞏昌要害之地拒之斯良䇿也按吐蕃自肅州外西寜而南至雲南西北之境皆其地洪武初立為烏思藏都司衞所宣慰宣撫司凡三百三十以羈縻之嵗通朝貢有警遣西僧諭之即已其岷州洮州河州在陜西境者舊亦吐蕃地今久内屬惟差南近四川松蕃者地險尚數生梗而亦不刺竄居西海勢漸吞併猖獗尤可虞也順撫逆勦以處西夷題稱闗外通貢諸夷惟土魯畨為最惡自津特穆爾放歸未嘗一日忘情於甘肅倘此夷畏罪悔過輸誠入貢亦當厚其廪餼重其賞賚照例撫待其或天奪其魄自取䘮亡通貢之使未出入冦之虜復來先將通貢之夷處分然後整兵問罪北路新城譚家堡南路兔兒壩塔兒灣多設伏兵賊兵逺來利於速戰我則堅壁清野無當其鋒彼既野無所掠芻糧俱困志意消阻自當逸去我則盡出伏兵隨機應變或邀其前或擊其後我逸彼勞勝負懸絶務令匹馬不還以伸國威况土魯畨亦多榖食即今哈宻空虛􅆶沙無人馬豈有三千里之外裹糧徃返入寇者耶近見土魯畨索雅穆拉屢為邊患殺擄甘肅人民數多雖寸斬此夷不足以償地方之禍倘言其狡詐之辭放歸此夷特黙格乃其妻父也必被招誘沙州住牧海賊亦必連營同徃而芻糧人馬俱為土魯畨所有所謂借寇兵而賫盗糧者是已甘肅之禍不可勝言雅穆拉决不可放還况西域諸夷朝夕所不可無者茶與大黄麝香也如我閉闗絶貢則此物無由而出彼皆仰給於我尚敢自肆我獨不能控其咽喉使彼自服耶嘗聞北山哈宻衛喇特一族耳内伊埒孟克族類尚多我能以賞土魯畨者賞伊埒孟克許其通貢或賜以職名此夷必為我用則土魯畨不敢東過哈宻况敢逺窺嘉峪闗乎倘欲招撫此夷則肅州東闗夷人唐格察迪爾可使也如我處置得宜則土魯畨自不敢逞諸夷皆向化矣等因本部覆議查得先貢謝恩襲職事該總制尚書唐題該本部議得雅穆拉係我中國屬畨㓜時土魯畨搶去長為彼中頭領後因内變畏殺投降已經多官會議奏奉明㫖要置中土羈住但伊熟知我中國地里虛實假使因其請而復與之彼若不肆殘害則仍訛為心腹搆生釁隙撥置侵擾之情難保必無又該總制尚書王奏議本部覆議皆已有明㫖今總制尚書唐亦深贊其然可見大臣謀國意見相同臣等未敢别議况土魯畨二次犯順擄我人口不止千數今送還者纔三千餘人豈雅穆拉一人歸今羈住既久必欲得之我中國之待外國雖不必窮詰隠情亦不宜堕中詭計此斷不可從等因題奉欽依已經通行去後今本官具奉前因除雅穆拉已奉明㫖别難再議外為照西域諸夷惟土魯畨最為桀鷔随順隨叛朝廷念彼逺夷許其效順不復深罪但土魯畨為我邊患與北邊不同葢其國仰需於我者如茶與大黄麝香等物皆仰給中國若此物不出闗則彼人馬必生疾病死亡而耕種皆廢故其所畏忌者閉闗絶貢也雖其䟦扈内侵輙復要求入貢且其自國都至嘉峪闗三千餘里中間多無水草之處必須裹糧載水而行彼至我邊人馬已皆疲勞亦難深入為寇惟其入貢之時經過官軍或多勒掯索取致傷夷性抱恨而去一出闗門即思報復若在我處置得宜邊備修舉威信素著不傷其心不堕其計勢必畏服不敢不稱貢矣再照衛喇特之衆原與土魯畨世仇先年都御史許進加兵土魯畨曽得其力今其遺種伊埒孟克等若我少加招􅝘許其通貢使抗土魯畨是亦一䇿本官昔日曽任闕州兵備深知西夷情亊言皆有㨿但事體重大通合議處覆奉欽依行移總制及撫按等官嚴行兵守等官若遇土魯畨如例輸誠入貢即照例驗放安挿水草有餘處所許支廪餼不許縱容通畨人等生事擾害及羈留遷延掯勒土馬等貨有失柔逺之道宜諭朝廷至仁如天許爾效順容爾通貢資爾國用爾若輸誠納貢欵則貢可常通少有不恭則閉闗絶貢西畨嗜利我既有以服其心而又能制其死命豈敢復為邊患乎如果天奪其魄復如昔年入冦則一面堅壁勿戰以老其師一面結約北山􅆶沙諸夷使邀其後待其困憊歸遁而擊之使彼大遭挫衂以伸中國之威仍會同查勘伊埒孟克等夷如果可招容其通貢以制土畨從長議處經畫停當使計出萬全以無他變具奏定奪圖書編卷五十一
