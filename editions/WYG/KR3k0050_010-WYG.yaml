body:
  text: 圖書編卷十明章潢撰學書叙仲尼叙書止百篇何其簡也今所存者僅踰半爾然二帝三王敬天勤民總之不越乎一中不有以握其至簡之心傳乎矧生於心必發於政事凡以經綸布置禮樂政刑一一皆後世典則所自始以其先得人心之同然爾雖禪繼迹殊沿革損益代變而讀其典謨訓誥命誓則四代規模氣象亦各與世推移要之此中不改也雖然豈特五十八篇均此執中之傳哉譬諸木之曲直短長其形萬殊大匠斵之必以規矩凖繩以度其中而後能成其器也彼子史百家又孰能越此心大中之矩哉是故善學書者非求中于書也惟兢業以各全其帝降之𠂻則書即千古之心印也孔安國曰孔子討論墳典斷自唐虞以下及于周芟夷煩亂剪截浮詞舉其宏綱撮其機要足以垂世立教典謨訓誥誓命之文凡百篇所以恢宏至道示人主以軌範也帝王之制坦然明白可舉而行三千之徒並受其義孔穎達曰以其上古之書謂之尚書此文繼伏生之下則知尚字乃伏生所加也程頤曰看書須要見二帝三王之道如二典即求堯所以治民舜所以事君朱子曰欽之一字書中開卷第一義也一經之全體不外是矣又曰高宗舊學於甘盤六經至此方言學字又曰書有古文今文古文乃壁中之書今文乃伏生口傳又曰書有兩體有極易曉者有極難曉者如盤庚大誥多方多士之類恐是當時召來面命之詞至于湯誥微子之命君陳諸篇則修其詞命吕祖謙曰書者堯舜禹湯文武臯䕫稷契伊尹周公之精神心術盡寓其中觀書不求心之所在夫何益於求古人之心盡吾之心然後可以見古人之心蔡沈曰二帝三王之治本於道二帝三王之道本於心得其心則道與治固可得而言矣何者精一執中堯舜禹相授之心法也建中建極商湯周武相傳之心法也曰徳曰仁曰敬曰誠言雖殊而理則一無非所以明此心之妙至於言天則嚴其心之所自出言民則謹其心之所由施禮樂教化心之法也典章文物心之著也家齊國治而天下平心之推也心之徳其盛矣乎二帝三王存此心也夏桀商紂亡此心也太甲成王困而存此心者也存則治亡則亂真徳秀曰五十八篇之書無一語不及天無一語不主敬董鼎曰孔子斷自唐虞迄乎周者盖以前乎五帝為三皇世尚洪荒後乎三王為五霸習尚權譎故自唐迄今以定百篇之書一書之中其於明徳新民之綱修齊治平之目即堯典已盡其要而危微精一四言所以開知行之端主善協一四言所以示博約之義務學則說命其入道之門為治則洪範其經世之要也他如齊天運則有羲和之厯定地理則有禹貢之篇正官僚則有周官之制度修己任人則有無逸立政諸書煨燼壊亂之餘而宏綱實用尚如此又曰六經莫古于書易雖始于伏羲然有卦未有辭辭始于文王耳六經莫備于書五經各主一事而作耳易主􅁲筮洪範之稽疑也禮主節文虞書之五禮也詩主咏歌后䕫之樂教也周禮設官六卿率屬之事也春秋褒貶臯陶命徳討罪之權也五經各主帝王政事之一端書則備紀帝王政事之全體修齊治平之規模事業盡在此書書以道政事也後儒有指為二帝三王之心學何與本之為心法達之為治法聖人之實學也書云孝乎惟孝友于兄弟施於有政是亦為政可見政事不獨君相為然凡日用間何一非政何一非心學哉但善觀書者即政事而得其心學之精不善觀書者即心學而指為政事之迹試觀二典三謨非徒允執厥中危微精一堯以是傳之舜舜以是傳之禹也臯陶益稷所以都俞吁咈于朝堂者不過兢兢業業維㡬惟康之儆戒己耳是唐虞之際其君臣相與有成一如後代師友之諄諄勸勉故朝廷政事皆心學之精微也以至禹貢祗台徳先之言五子逸豫滅徳之歌𦙍征威克愛克之戒孰非大禹之心傳哉嗣是而湯誥維皇上帝降𠂻下民厥有恒性克綏厥猷維后泰誓維天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母是湯武誓誥于征伐莫非此學也然仲虺伊尹之于成湯太甲傅說之于高宗皆學焉後臣者也觀其制事制心立愛立敬遜志時敏終始典學之說後先如出一轍所以太甲克終厥徳高宗恭黙思道端有自焉推之如箕子之洪範所云皇建有極亦皆有商家學至于召之旅獒周之無逸其所告誡於君者一臯陶伊尹之心也所以成王之顧命謂思夫人自亂于威儀爾毋以釗冐貢于非㡬康王之誥謂雖爾身在外乃心罔不在王室君臣之間亦可謂咸有一徳矣若夫大誥以後諸篇皆成王周公所共事焉曰若渉春氷曰痌瘝乃身曰明作有功惇大成裕曰惟狂克念作聖惟聖罔念作狂立政若止於言政也曰克知三有宅心灼見三有俊心周官若止于建官也乃曰作徳心逸日休作偽心勞日拙其詳不能備舉傳至吕刑之徳威徳明秦誓之斷斷休休而政事之間孰非學也然則學也政事也一也况總其大㫖而敬天勤民不有以揭書之要乎夫何書之學不明于後世而學專務内不能見諸行事之實者固不免虚寂之是尚然功名富貴之士又皆以政事為口實而寥寥千百載凡君臣之圖維未聞論道經邦以帝王學術相儆戒焉何怪乎世道不唐虞三代若哉噫學之一字始于說命故曰學于古訓乃有獲讀二帝三王之書者其思之讀書大㫖朱子說書綱領後附先儒說古史之體可見者書春秋而已春秋編年通紀以見事之先後書則每事别記以見事之首尾意者當時史官既以編年紀事至于事之大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所紀載或更歲月或歴數年其間豈無異事盖必已具於編年之史而今不復見矣尚書初讀似於己不相干後來熟讀見堯舜禹湯文武之事皆切于己先生問尚書如何看答曰須考歴代之變曰世變難看唐虞三代事浩大闊逺何處測度不若求聖人之心如堯則考其所以治民舜則考其所以事君且如湯曰予畏上帝不敢不正熟讀豈不見湯之心大抵尚書有不必解者有須着意解者有須畧解者有不可解者如仲虺之誥太甲諸篇只是熟讀義理自明何俟于解如洪範則須着意解如典謨諸篇辭稍雅奥亦須畧解如盤庚諸篇已難解康誥諸篇則不可解矣某嘗患尚書難讀後來先將文義分曉者讀之聱牙者且未讀如二典三謨等篇義理明白句句是實理堯之所以為君舜之所以為臣臯陶稷契伊傅輩所言所行最好綢繆玩味體貼向自家身上來其味自别問尚書難讀亦無許大心胸他書亦須大心胸方讀得如何程子只説尚書曰他書却有次第且如大學自格物致知以至平天下有多少節次尚書只合下便大如堯典自􅂶明俊徳至黎民於變時雍展開是何等大命羲和定時成歲便是心中包一箇三百六十五度四分度之一底天方見得恁地若不得一箇大底心胸如何了得二典三謨其言雅奥學者未遽曉㑹盤庚等篇又難看如伊尹告太甲五篇說得極切其所以治心修身處雖為人主言然初無貴賤之别細讀極好書且看易曉處其不可曉者不安强說縱說得出恐未必是當時本意近世解書者往往皆是穿鑿如吕伯恭亦未免此看尚書漸漸覺得曉不得便是有長進若從頭到尾解得便是亂道讀尚書有一箇法半截曉得半截曉不得曉得底看曉不得底且闕之不可強通强通則穿鑿盤庚五誥之類實是難曉若要添减字硬說將去儘得然只是穿鑿終恐無益耳如微子篇且認微子與父師少師哀商之淪喪巳將如何若其文義知他當時言語如何自有不能曉矣書中易曉處直易曉其不可曉處且闕之如盤庚之類非特不可曉便曉得亦要何用如周誥等篇周公不過說周所以合代商之意是向當時說話其間多有不可解者亦且觀其大意所在而已書中不可曉處先儒既如此解且只得從他說但此一段如此訓詁說得通至别一段如此訓詁便說不通不知如何盤庚篇不可曉如古我先王將多於前功至嘉績于朕邦全無意義又當時遷都更不明說遷之為利不遷之為害何故說得都無頭緒且如要告諭民間一二事做得㡬句如此他曉得曉不得中篇又說神說鬼若使如今誥令如此好一塲大鶻突尋常讀尚書讀得伊訓太甲一徳便著鞔過盤庚却看說命要之讀尚書可通則通不可通姑置之周公不知其人如何其言聱牙難曉如書中周公之言便難讀立政君奭是也最好者無逸中用字亦有譸張為幻之語至若周官蔡仲等篇却是官様文字必當時有潤色之文尚書只是虚心平氣闕其所疑隨力量看教浹洽便自有得力處又曰其間大體義理固可推索但于不可曉處闕之而意義深逺處自當推究玩索之也某嘗欲作書說竟不曾成如制度之屬祗以疏文為本若其他未穏處更與挑剔令分明便得與仲黙帖云書說未有分付處尚書且須見得二帝三王之心而通其所可通毋強通其所難通諸說此間亦有之但蘇氏傷于簡林氏傷于繁王氏傷于鑿吕氏傷於巧然其間儘有好處荆公不解洛誥但云其間煞有不可强處今姑擇其可曉者釋之今人多說荆公穿鑿他却有此處若後來人解書則又却須要盡解東坡書解說著處直是好他看得文勢又筆力過人發明得分外精神問何以失之簡曰也有只消如此解者伯恭解書自洛誥始其文甚閙熱其問之云有難通處否初云亦無甚難通處後方云果有難通處今只是強解將去耳伯恭直是說得書好但說不通處却一向解去故有尖巧之病也是伯恭天資大高所以不肯闕疑後數年再㑹於衢伯恭始謂予曰書之文誠有不可解者甚悔前日之不能闕所疑也予謂伯恭所以告予者雖其徒亦未必知因具論之使讀者知求伯恭晚所欲闕者而闕之庻㡬得其所以解書矣林書解儘有好處但自洛誥以後非他所解鄱陽柴氏與尊巳程氏書曰唐虞三代聖帝明王與其良臣碩輔精神心術之妙推之天下以為大經大法者盡在于書嘗謂善言道者必有至不可易之論如詩之思無邪禮之無不敬皆可蔽以一言吾友深于書者必有至要不可易之論願蔽以一言以為讀書之指南程氏答曰讀書必有綱領而提之則其間世變之殊事為之異皆可㑹而通之一以貫之五十八篇之所載唐虞三代聖君賢相撫世酬物殊時殊事而可蔽以一言者其在于允執厥中乎是中也隨事而有聖賢之於是中也當事而存是故堯舜之禪受堯舜之執中也禹之傳子禹之執中也湯武之放伐湯武之執中也伊尹之相太甲周公之輔成王伊周之執中也親如瞽瞍而不克諧以孝則非為人子之中頑如有苗而不誕敷文徳則非格逺人之中君如紂而不去不囚不死則非微子箕子比干之中水土不平亳不遷洛不作則非拯民定業之中其他如訪箕子以傳道誅三監以安周董正治官居喪出誥訓夏贖刑攘戎悔過與凡修身任賢奉天畏民保治遵法納忠輔道因革廢置寛嚴乆速迹雖差殊理實一致無非隨時順理因事處宜各當其可各適其宜而已故堯之授舜舜之授禹自執中之外無他語而湯武諸君所以相與扶世立教大抵皆以此中相傳而易地皆然者也此所以上契天心下合民情百世以俟聖人而不惑者也然異乎子莫之執中者聖賢固有精一之功而非徒中之強執也堯舜性之雖不俟于精一而自然能合乎中湯武而下反之則必由此而後造于粹然之地焉以是觀之則知書之要而唐虞三代之宏綱要㫖雖不中不逺矣程氏又答友人問曰前輩謂讀書要識聖賢氣象某謂讀尚書亦當識唐虞三代氣象唐虞君臣交相儆戒夏商以後則多臣戒君耳禹臯戒君儆于未然辭亦不費夏商以後則事形而後正救之如太甲高宗肜日旅獒等篇且反覆詳至不憚辭費矣觀啓與有扈戰于甘野以天子之尊統六師與一强諸侯對敵前此未聞也湯之伐夏自湯誓湯誥外未嘗數桀之惡且有慙徳武王伐紂則有泰誓牧誓武成凡五篇歴歴陳布惟恐紂惡不白己心不明畧無回䕶意矣伊尹諫太甲不從而放之前此無是也使無尹之志則去鬻拳無㡬然太甲天資力量逺過成王太甲悔悟尹遂可以告歸周公則䜛疑交起雖風雷彰徳之餘宅中圖大之後不敢去國且切切挽召公以同心輔佐用力何其艱也堯以大物授舜舜以大物授禹此豈細事而天下帖然無異辭盤庚以圯于耿而遷國本欲安利萬民而臣民讙譁至勤三篇訓諭而僅濟然盤庚猶可也周之區處商民自大誥以後畢命以前藥石飲食之一為龍蛇一為赤子更三紀之乆君臣共以為至大至重之事幸而訖於無虞視堯舜區處苗頑又何甚暇而甚勞也精一執中無俟皇極之煩言欽恤明刑何至吕刑之滕口降是而魯秦二誓見取于經而王迹熄霸圖兆矣世變有隆汚風俗有厚薄固應如此引而伸之觸類而長之讀書者其毋茍乎哉婺源滕氏尚書大意序曰書之大意一中字而已允執厥中書所以始咸中有慶書所以終以此一字讀此一書迎刄而解矣學書大㫖萬物之生始乎天也萬物之成始乎人也故易謂乾元資始乾知大始凡坤之作成效法莫非天也人道經綸參贊於兩間雖因時以建事也向非聖人繼天立極盡倫盡制而開物成務冐天下之道焉曷能俾萬世永頼小大畢由之哉後人終身率由于先王制作中而莫知其始盖由學不稽古未嘗考諸虞夏商周云耳古昔羲黄啟運非不有墳典丘索之遺也然人文初開典制未備如結繩之政茹飲之俗時異世殊固難盡宜於後之人且洪荒之初其矩矱未必一一可得而詳紀焉故孔子删書斷自唐虞訖周末典謨訓誥誓命各以時叙而剔繁就簡揭其宏綱要領以垂世範今僅存者五十八篇凡大而綱常倫理小而法制禁令莫非二帝三王心法所流布此所以立百王之定矩肇萬世之太平也二典開卷即曰稽古說命曰事不師古非說攸聞曾謂後學而于帝王大經大法莫能原其所自始哉是故經天莫大乎厯象日月星辰緯地莫大乎敷土奠高山大川治人莫大乎建官立政如璿璣玉衡始諸羲和者不可易也則壌成賦始諸禹貢者不可易也知人安民教養始諸稷契禮樂始諸夷䕫刑罰始諸臯陶者不可易也以二帝三王其創始有本故也何也曰欽曰敬曰誠曰忱非徒在乎政事間也言心之始非危微之典乎言性之始非降𠂻之誥乎言學之始非學于古訓之說命乎克明峻徳非大學所自始乎精一執中非中庸所自始乎洪範皇極非無極太極與夫百家言五行者所自始乎不獨堯舜禹以一中相授受惟四海困窮之是憂而湯武建中建極以誓告萬方無非永殖永清以慰民徯后見休之意也不獨伊周于太甲成王惓惓乎顧諟明命所其無逸雖秦誓亦曰昧昧我思之惟以求夫斷斷休休之碩輔即此觀之書中一政一事其所由始皆可法可傳不可勝窮而修齊治平其根心以發者一而已矣果能以此論世尚友咸得其所自始而反求諸其身則始家邦終四海固不越乎立愛立敬之常而孝友于兄弟則施于有政是亦為政庻乎知始作成之道在我矣否則縱師其迹而不得其經始之原欲鑒成憲以無愆也難矣故于學書之暇輙記其所自始者命之曰原始云易為文字之祖信矣而文之備曾有備于書者乎彼庖羲畫卦不特洪範之稽疑于卜筮貞悔見易之用也九疇五行詳言天人之理隂陽剛柔吉凶休咎孰非易乎詩以言志不獨虞廷賡歌喜起已肇乎風雅之原五子之歌已肇乎風雅之變而皇極敷言其音響之協韻者孰非詩乎禮以肅儀度也自伯夷典禮作秩宗凡五典五惇五禮五庸以至廵狩㑹同柴望祭告同律度量衡莫非禮之教也樂以和神人也自后䕫典樂教胄子凡諧和八音出納五言以至祖考來格羣后徳譲鳥獸蹌蹌莫非樂之教也春秋以肅紀綱也自臯陶作士命徳討罪黜陟惟公然元祀十有二月之書法即史官以時記事之體莫非春秋教也周禮以定官職也自唐虞建官惟百夏商官倍周官公孤論道宏化六卿分職以倡九牧孰非周禮之教乎明徳固闡之於大學也然太甲康誥堯典之克明顧諟則己先之矣未發之中固闡之於中庸也然堯舜禹湯文武之執中建中則己先之矣學習一貫固闡之於論語也然遜志典學習與性成主善為師協于克一則己先之矣盡心知性固闡之於孟子也然上帝降衷厥有恒性雖收放心閑之惟艱則己先之矣以此觀之凡聖賢經書不已備于尚書之中乎且自古帝範相謨皆從此出學必稽古舍此末由志欲修己治人惟潛神於兹焉亦足矣卲堯夫以皇帝王霸之氣象譬諸春夏秋冬予讀虞夏商周之書覩其規模氣象沿襲變態亦何異四時之相禪乎是故虞之典謨渾然道徳性命之府也明良賡歌喜起千載一遘而百僚師師黎民時雍風動其殆春日暄妍萬類欣欣向榮之候乎太和在唐虞宇宙間固於典謨見之也夏書所紀凡九州山川之源委土田之膏澤物産之孶畜貢賦之等則文教武衛昭昭乎定為萬世章程得非赤日麗空品彚悉森然長養於長夏之時乎及讀商書則揖遜變為征誅典謨變為訓誥嗣君不惠于阿衡則放之桐而盤庚遷殷乃勤訓誠然後用命雖其發明性學皎如朗月寒潭然白露横江已為履霜之景矣若周書則歴數紂惡以告武成君臣相誚至感風雷頑民不靖屢煩詔諭終之文侯命而周轍東以訖於秦穆之悔皇王沕穆之風藐不可復挽矣斯時也閉塞成冬百物斂蔵雖冬日可愛豈無挾纊之温然亦曷勝夫觱發栗烈之威哉故借四時以状四代亦取其近似云耳且虞徳後世蔑加夏功萬世永頼商君臣賢聖更代迭興周謨烈耿光惟成康獨盛其書詞渾涵發揚文質亦各不齊後學發為文詞惡可混然無别也書首二典何取于典之義乎天秩有典自我五典五惇哉是典之所由名者一自天叙五倫言之乃萬世不易之常道也凡經典所記載者記載此彛倫之常道而後可以典名矣嘗謂堯舜二典其即乾坤二卦之首諸易乎乾統天坤乃順承乎天而堯即天也舜紹堯底績其即坤之承天而代有終也故孟子曰聖人人倫之至也欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣盖君道莫大於欽天尤莫要于為天下得人得人以代天工君道盡矣此堯典所以為君道之至也舜明目達聰孜孜於四岳九官十二牧而庻績咸熙得非無成有終而為臣道之至哉惟其君道之至也凡為君者必取法乎堯巍巍則天而後為君道之典則惟其臣道之至也凡為臣者必取法乎舜重華協帝而後為臣道之典則知此則知二典首尚書者卓乎典常之具在非徒以文章政事言也彼後世史官徒取一朝之法制禁令布之方策亦名為一代之典章者殆亦沿襲其名而莫知典之所以為典也已謨之義何謂也即臯陶曰允廸厥徳謨明弼諧是也盖舜禹臯陶益稷羣聖相聚一堂其所謨謀者惟徳而已此所以為嘉謨也惟日孜孜而九功之惟叙思日贊贊而九徳之咸事危微精一執中開道統之宗勅天時㡬克艱肇治統之要其相儆戒也不曰罔游于逸罔淫于樂則曰無若丹朱傲惟慢游是好傲虐是作不曰兢兢業業無曠庻官則曰予違汝弼汝無面從退有後言禹聞昌言則拜陶聞昌言則師此其嘉謨之在虞廷者信乎古今君臣謀猷之法則也後世諂諛成風無論巳雖有英君碩輔際㑹一時而帷幄之中不過運籌决勝之雄圖鋪張粉飾之偉績其視謨明弼諧惟允廸厥徳之是謀者寥寥罔聞己弟子受業于師必有言教以切磋成就其性行故有訓之名焉若臣之于君卑高懸隔似不可以訓名矣然而自古建官有師傅保之名盖師也者所以師其道義而訓誨與師弟同如易卦五爻君位也蒙六五童蒙吉彖曰童蒙求我匪我求童蒙也故伊訓篇曰伊尹乃明言烈祖之成徳以訓於王此訓之所由始乎謂今王嗣厥徳罔不在初乃先之以愛敬親長繼之以三風十愆終之以善降祥不善降殃無非訓之以徳而儆廸者至矣然太甲不惠則放之桐及處仁遷義則歸諸亳既復政告歸則陳戒於徳是以太甲三篇與咸有一徳雖不以訓名而均為訓體以至祖已之于高宗肜日召公之旅獒周公之無逸周官孰非訓廸之體乎盖惟太甲高宗武王成王能受訓戒於其師保故萬世而下稱賢聖之君者必歸焉叔季雖以師保名官而無其實君之體貌日尊既不肯甘受訓誨於其臣矣不特臣之禮度日卑雖有任師保之職者孰能如伊尹周召本諸身有之徳以陳善納誨而格乎君心之非哉是故三代以還或形諸論諫者有之若伊訓旅獒無逸諸篇則莫之覩矣又何怪乎君徳之不太甲成王若也誥者告也各隨其事以播告乎臣民反覆曉諭務欲其上下之通徹也以誥名篇者不待論矣商有湯誥仲虺之誥是也如盤庚遷殷誥也西伯戡黎篇祖伊恐奔告於王微子篇序謂微子作誥父師少師非誥歟周大誥康誥酒誥梓材召誥洛誥多士多方蘇子謂之八誥與康王之誥皆誥也他如君奭篇曰予不惠惟若兹誥立政篇告嗣天子王矣用咸戒於王吕刑篇曰荒度作刑以誥四方非誥與若夏𦙍征篇亦云告于衆則謂為誥體當亦無疑即已上諸篇潛心以紬繹之彼君欲遷都何患乎臣民之不我從者而盤庚乃反復三誥惟恐徳意不下達也頑民弗靖不殺戮之則遷徙之已爾亦奚用八誥之慇懃哉仲虺釋湯慙也至誥諭萬邦恐來世以台為口實周公留君奭亦胡為乎告語若此其諄複耶盖古人處君臣上下寮寀民庻本通為一體無有爾我間隔所以凡有一政一事必使上下人已之允孚而後得以行其志意盖修辭立其誠由此𠂻惻怛懇到不達不止此所以為王道也豈若後之人毎有示諭不過法制云耳不禁之以刑威則嚴之以誅伐者所可倫哉古者命官必有命辭如高宗之於傅說爰立作相故作說命雖上篇記其命相之語中篇記說之進戒下篇記說之論學而均謂之命者縁上篇故也嗣是如微子蔡仲君陳畢命君牙冏命以及成王之顧命亦均為命之體焉然誦其辭究其㫖不特說命中朝夕納誨祗若休命君臣皆非虚語歴觀微子崇徳象賢蔡仲率徳改行君陳之孝友畢公之保釐君牙之率祖冏命之匡不及君之責臣皆實意而臣之受命者亦皆實事豈若末世詞命一出於故套曾不論其才徳堪此命否也又安望其王命之有赫儼然受天明命哉若夫成王顧命不徒委寄得人允為萬世託孤標凖然其所謂亂威儀貢非㡬一皆攄其平生之所操存蹈履者以垂訓嗣王莫非實語實事何為世之豪臣又承君彌留之際假遺命以擅權也噫以君牙冏命之書尚有以翰林制誥格子視之者孔子删書之㫖益微矣誓也者所以一三軍之志而示之以紀律也雖純王之世兵且不設何有于誓哉然禹誓征苗之師在唐虞之際已然矣則是天生五材誰能去兵君行六師何能廢誓故夏有甘誓商有湯誓周有泰誓牧誓魯有費誓無非於臨陣之先發號令以約束衆心示之以奉天討罪之意肅之以止齊步伐之法作之以果毅進攻之勇云耳惟秦誓一篇乃穆公悔過以誓告羣臣亦因伐鄭敗諸殽而作也即八誓觀之雖仁義之師必有節制而威克厥愛無敢不恭用命也奈何世迨春秋列國兵争每每㰱血盟神以相誓而口血未乾率爾敗盟其視尚書所載之誓又天壌矣讀誓辭者寧不為世道慨耶書有六體而亦有不盡然者如禹貢洪範武成金縢與五子之歌是可盡以六體拘之乎但書之體雖不同要不越乎史氏所紀録也古者左史紀言右史紀事禹貢武成金縢得非右史之所紀乎洪範五子之歌得非左史之所紀乎然則書亦史也有謂書以載道史以紀事非歟盖天下無道外之事亦無道外之史不然則書以道政事亦不過政事而已矣何與於道也是故紀載以本乎道則史即書也事即道也六體雖分而又有不盡于六體者同歸于道謂虞夏商周之書即虞夏商周之史亦可也茍如後儒所論徒有取于史識史才史學三者具長而于道一無當焉則其文非不工事非不核筆力非不古健雄俊此亦謂三代以下之史也又何怪經史事道之攸分哉善觀尚書者雖謂古人經史載籍悉備於書焉亦可矣何必孜孜于六體之合不合哉天高地下萬物散殊天體高高在上欲卑㢲以入萬物也難矣易之大象曰隨風㢲君子以重㢲申命風其天之㢲乎盖撓萬物者莫疾乎風雖八風剛柔不齊而疾徐相隨吹嘘不斷此所以入物甚微而萬物之生生孰不由天之㢲入以立其命哉君之於民也亦然何也君之崇高者分也而㢲乎民者存乎命誥而已是命誥即君之所以風萬民者也故曰君子之徳風重㢲申命乃君子法天㢲民之道也義固得諸易矣乃讀尚書命誥諸體其于一政一事誥諭之間何諄諄乎不憚煩也不知此即重㢲申命之實事也如盤庚之遷殷洛誥之遷洛多方多士之遷殷頑民詞之重複固不一而足至曰予不敢動用非徳曰予豈汝威用奉畜汝衆曰今予其敷心腹腎腸歴告爾百姓于朕志曰非我小國敢弋殷命曰非我一人奉徳不康寧君之卑㢲若此豈假此以干百姓之譽哉要皆出於中心真誠惻怛自有不容己者故當時臣民莫不翕然風動矣易謂重㢲申命不於諸命誥益信之哉何世之君天下者徒知民惟草也不能知風之自又惡能重㢲以申命也欲知㢲風命誥者盍于易書觀之嘗謂禹貢奠高山大川凡九州山川如梁岐衡漳海岱淮濟固萬古不易然白壌黑墳赤埴青黎泥塗孰能易其土也上中下錯咸則三壌孰能易其田與賦也草木篠簜魚鳥羽毛金錫絲枲元纁孰能易其所出之物産也况觀其導山導水滌源陂澤不可以見水利所自來乎浮汶達濟浮淮泗達河不可以見漕運所自來乎所納銍秸粟米砮丹璣組不可以見貢賦所自來乎島夷皮服淮夷蠙珠不可以見四夷職貢所自來乎凡九州輿地所載靡不具于禹貢今猶古也奈何後儒于經中所載山川各以意見言之豈知郡縣雖與九州異名而區域率未之改即九江孔殷載諸荆可知言及揚州者誤矣三江底定載諸揚可知言及梁州者誤矣九河之跡其地今猶可考則知謂碣石并九河淪于海者誤矣陽鳥今尚攸居如故則知疑彭蠡於他郡者誤矣禹貢成于三苗即叙之後則知謂禹未嘗親至荆揚遣官亦畏三苗不敢入故荆揚有錯簡者誤矣噫後人每每以意見談經而不信經即禹貢一篇其餘不可以類推乎聖人之言雖徹上徹下然言亦各有攸當不可不知如臯陶五典五禮天工人代得非統論天人之合一哉然知人安民九徳咸事則對禹言也箕子五行五事彛倫攸叙得非統論天人之相通哉然九疇建極稽疑庻徵則對武王言也伊尹顧諟天之明命若人人同矣而慎乃儉徳習與性成所以藥太甲焉說命明哲實作則若人人同矣而事必師古學于古訓所以藥高宗焉周公所其無逸若人人同矣而先知稼穡之艱難乃逸所以藥成王焉是故後人誦讀經典諸如此類必得其告君之意纔協乎經㫖而反躬黙契又各有攸當者否則執泥言詮安能有益身心哉讀典謨訓誥固宜殫心思以繹其㫖趣如躬承列聖面命必欲㑹其精神心術之微而後已然歴代君相所值時勢不齊則其措置㡬宜各有攸當豈徒記誦其言論勲績已哉堯舜禹禪授一道益臯陶契列聖際㑹一時濟濟師師難乎其繼已然其時亦有最難處者如除四凶殄頑䜛平水土殺三苗設生當其時恐未易擔承特善類滿朝無阻隔之患耳湯武時當桀紂雖堯舜處此詎能遽格其非心乎億兆不堪其暴虐而解民倒懸望亟雲霓故獨夫授首㑹朝清明矧有元聖仁人一心一徳凡欲樹勲業于斯時者猶可勉也若伊周所處則有未易着力者矣何也商周皆創造之初基圖未固一逢顛覆之君一遇襁褓之主縱欲諉而置之將誰諉耶閱太甲篇遷桐三年卒聴師保之訓惟處置得宜故君心速化匪阿衡重寄其孰能之周公則又不同閱金縢篇初武王不豫請以身代此由我不由人也迨釁起三監流言肆布朝野靡不懐疑既不得不避居東土又不得不破斧東征雖罪人已殄羣疑莫解鴟鴞大鳴王心未釋未聞有一人為之暴白其心迹者向使風雷不動則狼䟦東山懼西歸且無日已是太甲之悟繫乎人成王之悟動以天周公不尤難哉彼傅說啟沃高宗召公輔弼成康皆太平宰相事也是故自臯陶益稷謨及伊訓說命旅獒無逸諸篇俱百代相謨之軌範要皆道徳淵邃出之有本而轉移化導難易尤不可不細心以體究之茍讀其書不論其世知其人不反求諸心身則亦章句己爾何益之有學書大㫖總論多識畜徳論世尚友孔孟所不廢也概杞宋之無徵傷周籍之已去豈為一代法制云然哉羲畫固為文字之祖鴻蒙初闢載籍未興故孔子删書斷自唐虞而下特存什一于千伯耳典謨訓誥誓命諸體不同同謂之書總五十八篇一言以蔽之不過敬天勤民爾已何也天生民有欲無主乃亂固必立之君以治而教之則大君乃天地宗子也惟天惠民惟辟奉天而命不于常曷從而稽天命哉天之聴視在民則天心去留一視乎民而已矣欲為君之肖子敢不敬天而勤民哉所以堯舜禪受非輕天下以授之匹夫也典徽揆叙地平天成載在典謨者莫詳焉故揖譲一天命也堯舜何心也讀典謨而三聖相授受一道可黙㑹也湯武革命非富天下而奪之君也慰民雲霓救民水火載在誓誥者莫詳焉故征誅一天討也湯武何心也讀誓誥而湯武之應天順人者可黙㑹也且嗣君如啟與太甲成康輔相如益稷伊傅周召啟沃弼承明良際㑹班班可考而茍有合乎斯道雖秦誓亦採而録之與子與賢宗子家相之說殆于虞夏商周之書獨觀其深矣故敢以敬天勤民一語蔽四代之書也非予之臆說也常讀魯論末篇叙堯舜禹之授受則記天之厯數在爾躬允執其中四海困窮天禄永終數語叙湯武之征誅則記萬方有罪罪在朕躬百姓有過在予一人數語孔子叙書之意茲可識矣况敬天勤民原非二事而一念兢業常懐匹夫勝予之儆其萬世君相之法程乎噫天人之際甚難言也臯陶謨曰天工人其代之箕子洪範曰惟天隂隲下民所以發明天人一致之理尤極懇切善降祥不善降殃又豈徒為君相告耶夫孔子上下二千年間録書止此篇章若甚簡矣然言言皆大經大法所昭垂也故開卷必先稽古而學古有獲學古入官悉有明徴信乎論世多識莫書若也世儒號稱稽古不求之書而求之史傳諸子百家上無關于天命下無補于民生其于尚友畜徳何有哉堯典嘗謂易大哉乾元萬物資始乃統天孔子以大而賛矣讀論語大哉堯之為君也巍巍乎惟天為大惟堯則之又以大而賛乎堯然堯之所以則天者雖中心信之猶未有所據也及讀堯典見其欽明之徳一天徳也時雍之化一天道也欽若昊天厯象日月星辰敬授人時而其則天者其欽天之謂乎至咨四岳舉舜㢲位然後乃知堯之所以成其則天之大巍乎煥乎蕩蕩難名者其在兹也何也乾資萬物之始坤資萬物之生惟乾能統天惟坤乃順承乎天故羣分類聚品物咸亨而致役乎坤一無成代有終者也則是乾知大始坤作成物雖乾坤合徳而乾之所以大者以其有坤道之代終也然則堯之所以大者不以舜乎及讀舜典見其重華協于帝者固本之以元徳也然詢四岳闢四門明四目達四聰咨十有二牧舉禹作司空棄為后稷契作司徒臯陶作士垂工益虞伯夷典禮后䕫典樂龍作納言以至流共工放驩兠竄三苗而殛鯀皆舜之為也所以九官十二牧各任厥職時亮天功奮庸熙帝之載而庻績咸熙雖舜亦無為而治也已堯之大不於此可想見耶是故坎離震㢲艮兊之流行莫非乾坤之運用而合徳則一歸之于坤禹益臯䕫稷契之勵翼莫非堯舜之允釐而協帝則一歸之于舜觀羣聖際㑹一時堯其乾乎舜其坤乎九官之濟濟師師其六子之迭運乎乾始能以美利利天下而不言所利民固莫能名乎夫堯不徧愛人而為天下得人以廣其愛民亦莫能名乎堯此天之所以大而堯之大所以則天也但大哉乾元至哉坤元夫固天地之自相闔闢者而堯舜明良相遇一皆法天之道也湯之於虺伊武之于周召孰不然哉况堯之試舜必曰欽哉舜咨二十有二人必曰欽哉所以昊天之欽若人時之敬授三謨之祗承祗敬夏書之祗台欽承商周之欽崇天道恭行天罰歴稽諸篇帝王相傳之法本諸此也故章首揭欽明二字不徒足以該四十八篇之大㫖而大哉帝堯蕩蕩巍巍所以則乎天而立萬世君道之極者舍此無餘藴矣噫終日乾乾夕惕正以崇效天也兹于書之欽明而益信人心道心人各自有其心而不自知非心之難知也滯聞見者惑多言昧反身者怠黙識故於危微存亡間莫之辯焉爾是故古今言心者曰虚靈知覺是也曰人之神明是也然而為善者此神明知覺也為不善者亦此神明知覺也豈有他哉楊龜山先生曰未言盡心先須理會心是何物未理㑹得心盡箇甚可見人皆有此虚靈知覺之神而不能反身理㑹所以真妄混淆自家立命之原終生懵然莫之醒覺此心學所以不容不講也雖然心不萌于不善者不足論縱使見孺子入井而怵惕惻隠此真心也知擴而充者誰與觀齊宣見牛觳􅑌而其心有所不忍乃曰反而求之不得吾心夫子言之于我心有戚戚焉心學寧容以不講乎彼舜禹大聖人也舜命禹曰人心惟危道心惟微訓釋不一大都謂道心天理人心人欲盖人之生也有是耳目口鼻之形即有是聲色臭味之欲此欲固未為不善而不識心者則心為形役虚靈知覺之神悉從乎耳目口鼻之用其流不至窮人欲滅天理不已也此人心所以危也道心豈離人而别有一心哉惟自識其心者為能先立乎大而非禮勿視聴言動則斯人即為有道之人而其心純乎道也凢耳目口體之用一本乎虚靈知覺之神淵淵乎退蔵宥宻固不可窺而不離聲色臭味實不着于聲色臭味所欲莫非天理之本然矣道心之微為何如是心一也自道而言則曰惟微自人而言則曰惟危顧其操舍何如耳孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與合而觀之操而存焉非道心乎舍而亡焉非人心乎危微係乎操舍而存亡原無二心當其存也虚靈知覺與道合真雖變通不拘實淵微無朕斯人也心以道為主則應用莫非道心之發見更何人心為聴用也當其亡也虚靈知覺盡雜人謀雖未甚悖乎道終亦危殆不安斯人也靈覺為精魄所拘知見隨形氣而動亦可執其應用不叛道者謂道心之聴用哉是以主與用分而二心之說于此乎倡矣至曰道心性也人心情也曰道心寂然不動人心感而遂通動静之分體用之别也又有謂凡言心者皆是巳發故書傳人心道心皆自己發言之遂使務心學者莫之適從舜孔之心傳終為千古不決之訟矣嗟夫心為人所同有之心道亦心所固有之道也但此心既曰虚靈曰神明而于斯道莫之知莫之覺焉其所謂神與靈者安在也以至神至靈之知覺而百年之思為盡徇乎七尺之軀殻則心在斯人何勞且若一至此哉然亦無足怪也何也此心神靈變化與生俱生倐無倐有斂之方寸若惺惺在中徧現兩間實杳杳莫測非智識可得而揆度非氣力可得而把持非伎倆可得而窮盡雖勇敵萬夫莫能自遏其一念雖威勢加乎海宇而蕞軀日為游魂攝制或纒縛荆榛或驅策機穽或甘心無悔焉故偶觸多露天真而晏安盡皆習氣舉天下滔滔皆是良可哀也間有聰頴之士又皆師心自用方其陽明稍勝恍若魍魎潛消不待閃電收光便已流注異象故大舜猶致謹乎人心道心之辨而孔子且喫𦂳于操舍存亡之諄諄者此也夫何近之論心學者莫不曰直指本心見道較之舜孔似為易簡及䆒其要領不過指見在之成心便為本來面目認眼前之覺智悉皆自性良知即心是道動念即􅆾敵體承當立躋聖位又有習静蒲團屛息思慮一旦靈慧内照驚詫本體見前且云得此欛柄入手四面八方一齊穿紐色色信其本來而勿助勿忘活潑潑地造化在其掌握中矣故當今之學非流連光景玩弄精魂便墮體出聰歸虚入寂夾雜二氏援聖經改立名義以自逞其神竒或有矯流弊者又以此心神明知覺皆不足據一切掃除别立宗㫖以標榜門户亦不免舉一而廢百也多說紛紛于何而折𠂻之哉噫予過矣予過矣既謂感寂兩心者悖虞廷孔門之本㫖又謂直指本心者畧精一操存之真功予何敢執己見論先輩耶嘗稽諸古訓矣文王之心本自順帝則也小心翼翼昭事上帝何為哉武王之心本自配帝命也上帝臨汝無二爾心何為哉孔子心外無矩顔子心外無仁也矩何事于不踰而不踰何待乎七十仁何事乎不違而不違何僅于三月哉只此可以識道心矣只此可以見精一操存之功雖大聖大賢未嘗瞬息懈矣以此反求諸心而求無負此心之神明亦將無負于先知先覺者雖狂言勿恤也要之人外無心心外無道道即立人之元人即凝道之具舍亡固衆人之通病操存實入道之真機所以孔子曰人能𢎞道非道𢎞人曰道不逺人人之為道而逺人不可以為道惟人道盡此心之神明知覺具在也安得先得我心之同然者以斯道覺斯人哉朔易天人生機本有定在也若徒明其理而不識天地生化之原欲反諸己養徳養身與天地合其化生之機也難矣是故生生之謂易而其所以生生者何哉一隂一陽是也日陽精也月隂精也易字本取日月相疊而相推明生萬物之所以化生不測者其原在兹也嘗有得于朔易之㫖焉虞書曰申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬盖日月交㑹于朔而冬至之朔一歲隂陽之始也傳註謂朔為蘇因月由晦復蘇取以釋朔之義可也惟不明朔之本來故謂朔為歲事更易而盡遺其本㫖天地生化之原聖人垂訓之意反因之而晦矣夫東作南訛西成皆言其方而冬獨謂之朔則朔即北矣舜典東廵狩至于岱宗南廵狩至于南岳西廵狩至于西岳朔廵狩至于北岳禹貢東漸于海西被于流沙朔南暨聲教訖于四海則朔為四方之北無疑也不然何取于幽都之義也在易卦離為日坎為月坎非正北方之卦乎日月交㑹于壬而壬非亥子之間兩日終始之際乎虚乃北方七宿之中而中星在昴則日不在虚宿之初度乎可見正北坎位壬子而虚宿所在謂之朔乃月之本位也毎月晦朔之間月到坎位而日來㑹之則日月交㑹名之為朔日魂月魄交相摩盪陽神隂精互為吐納此正天地之交搆也朔日之名本諸此晦即幽都而萬象幽暗自此復蘇與易之明入地中用晦而明其義同知朔則知易矣或曰朔固起義于日月交㑹之所矣易之義何取于日月乎哉曰坎位天地之中化機之根源也惟日月合璧于朔故相推明生萬古常新四時之温凉寒暑萬物之生長收蔵悉本乎此易之生生取諸日月之相疊也至顯明矣繫辭謂隂陽之義配日月懸象著明莫大乎日月孰非朔易之義乎則是朔也易也聖經不過即天地造化之自然以示人而東作南訛西成皆天地之自然者耳否則朔易止謂歲事更易何為獨曰平在而南訛亦于人為何與哉或曰天地生機本乎日月交搆者誠有定在也曾謂人之生機亦自相交搆而交搆之定在與朔易無異耶曰人心小天地也心蔵神離日象也腎蔵精坎月象也坎離互蔵天地且然况于人乎試自衆人觀之毎日念慮經營莫非精神之發洩及嚮晦入宴息而時方熟寐則耳目悉斂思慮盡􅁯神入于腎而交乎精魂亦隨神而攝于魄故血氣流貫百脉歸原及將寤則神寓于心既覺則神游于目此則人人皆然非養生家取坎填離之說也惟夜而寐也神入于坎故精得神而愈充斯晝而覺也精煥于離故神得精而愈旺此其故何也天一生水陽也成于地六則屬乎隂矣在人為精成于地而位在坎然其元則生于天一其性本陽謂之元精故其上與神交于離者乃天生之元㑹也地二生火隂也成于天七則屬乎陽矣在人為神是神成于天而位在離然其元則生于地二其性本隂謂之元神故其下與精交于坎者乃地生之元㑹也觀圖書之法象坎離之卦畫可證矣故水火不相射其體為坎離水上而火下其用為既濟神蔵精精蔵神其生生之本原謂非天人合一之道哉所以邵子曰冬至子之半天心無改移一陽初動處萬物未生時指㸃天地化原莫切于此白沙陳氏曰些兒欲問天根處亥子中間得最精指㸃人心樞機莫切于此但言天地而不合乎人則是為造化之元談言人而不本諸天地則視為修煉之别術言天地人而不實指其處不免揣摩臆度卒流為他技矣何不即易書本㫖而闡明之俾後學知所適從哉嗚呼世之人徒知天之神為日而日與月交于朔莫之知也徒知人之神為心而神與精交于坎莫之知也雖天地之造化未易悟而人身之精神試肯審察于寤寐間當即得之矣是以觀精神交于腎則天地交搆愈明觀日月交于朔則人心交㑹愈顯但在人一日之夜分即在天一月之晦朔一歲之冬至天地交而物自生精神交而體自暢者無二致也然則法天之學如之何曰見離勞坎其義雖均而坎獨為勞良有深義中庸喜怒哀樂未發謂之中發皆中節謂之和而下文止承之以時中焉果能戒懼于不覩不聞而極深蔵密以立大本則勞朔易之妙當自得之帝曰咨四岳有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首譲于䕫龍帝曰俞往欽哉三禮禮者理也天理之在人心一而已矣天下無二理宜乎禮亦無二也然古今之言禮者曰修五禮曰五禮五庸曰百禮既至曰經禮三百曲禮三千禮何若此其繁哉要不越乎吉凶軍賔嘉五者而已矣辟之水焉江河必有源也其流千支萬派皆江河之委也不知禮之散殊者日泳游于江河而昧乎水之流不知禮之一本謂其能窮水之源也奚可哉嘗讀虞書帝曰咨四岳有能典朕三禮或曰三即五之誤也或曰三者天地人也使于本文無所指謂三為五之誤可也謂三者天地人亦可也獨不見帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清之言乎然則寅也直也清也三者即伯夷之所典者也孰謂寅直清之非禮乎天高地下萬物散殊析其條理至纎至悉雖萬端不足以盡之人徒紐于舊見舊聞而有指寅直清為三禮者鮮不以謬妄訾之矣殊不知人之一身自獨居一室以至于大庭廣衆自刑于妻子以至對越天地神明自灑掃應對以至作止語黙周旋曲折何一非禮何一非天理之節文也使不寅則怠惰矣曾有怠惰而可以為禮乎不直則邪僻矣曽有邪僻而可以為禮乎不清則雜亂矣曾有雜亂而可以為禮乎果知天理在吾心而舉動之間一循乎天則自夙至夜不怠惰則寅寅即禮也不邪僻則直而直即禮也不雜亂則清而清即禮也試自一物觀之緩則未有條理不肅然者急則條理亂矣直則未有條理不截然者枉則條理混矣静則未有條理不秩然者躁則條理淆矣知此則寅直清為三禮可無疑也况合是三者乃人心固有之天則不待安排不待矯飾隨所感觸而森然發見大之而五典五禮析之而三百三千度雖雍容寅則一也儀雖曲折直則一也文雖煩縟清則一也何也人心本寅人心本直人心本清凡由𠂻達外條理不紊莫非自然之禮也或者又以吉凶軍賔嘉各有所宜禮儀威儀各有其等茍以寅直清為禮焉則儀文度數可盡廢也耶噫是則逐于儀文度數之末而不識其本矣孔子曰人而不仁如禮何曰禮云禮云玉帛云乎哉正以儆世之逐末者觀其大林放之問可知也易曰嘉㑹以合禮曰㑹通以行其典禮記曰無體之禮曰至禮不譲而嘉㑹㑹通無體不譲不有出于儀文度數之外者乎可見寅直清禮之本也吉凶軍賔嘉禮儀威儀禮之文也本與文不相離而五典五禮三百三千莫非寅直清之所如記曲禮必首之以毋不敬也嗚呼人茍知寅直清三者為禮則三即五之誤三指天地人皆疑所不必疑釋所不必釋彼區區于器數儀節之辨别者皆非所急而禮之本可識矣禹貢疑議仲尼删書止存百篇皆存其可信且可為後世法也禹貢載在聖經傳來舊矣信聖經者宜據古考今不宜因今之異同以疑古也何也地一也或以名而殊名一也或以時而改所以古今不盡同而其沿革不可盡考矣因其不可考也即致疑禹貢可乎禹貢曰彭蠡既豬陽鳥攸居三江既入震澤底定又曰嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東滙澤為彭蠡東為北江入于海又曰岷山導江東别為沱又東過於澧過九江至于東陵東迤北㑹于滙東為中江入于海又曰岷山之陽至于衡山過九江至于敷淺原是長江原委并禹之導江所載亦甚詳矣以禹貢之文考諸今日之地勢其能以盡同乎是故言九江則以今日之九江府當之盖江分為九既無間斷之殊江漢水滙為彭蠡亦無倒入湖口之勢有如朱子之所辯者且縁此遂謂大禹未嘗身履梁雍荆揚地止分遣官屬往視况洞庭彭蠡之間乃三苗氏所居當時水澤山林深昧不測方負其險阻頑不即工則官屬之往者未必遽敢深入其境是以但見彭蠡之為澤而不知其源之甚逺而且多但見洞庭下流之已為江而不知中流之常為澤而甚廣也以此致誤宜無足怪是因今日之地名疑禹貢之錯誤其果然與又引鄭樵謂東匯澤為彭蠡東為北江入于海十三字為衍文是又因後人之說疑禹貢之宜删也已試以九江郡與彭澤縣之有可考者言之山海經言廬江出三天子都入江彭澤西水經言廬江出三天子都北過彭澤縣西北入江己與禹貢不合漢之廬江郡即今廬州安慶地故不在江州潯陽本以蘄之潯水得名亦不屬柴桑縣漢九江郡本在江北而江州實武昌郡之柴桑縣後以江北之潯陽并柴桑立郡又自江北徙治江南晉安帝義熙八年始省潯陽入柴桑縣其後唐又改柴桑縣為潯陽縣然則今之九江郡且非漢晉時九江矣况禹貢之九江耶惡可據今之九江以潯水中洲渚之間隔而并疑經文也所謂三江既入震澤底定或指彭蠡為南江以足經文中江北江之數故與震澤不相關或謂三江宜求之上流如郭璞山海經註岷山大江所出也崍山南江水所自出也崌山北江水所自出也三江皆發源于蜀注于震澤故禹貢紀其原及其委耳若只據其地名求之周禮職方氏云揚州藪曰具區川曰三江則周禮距禹貢特千餘年而具區已異乎震澤之名矣矧今之太湖又異乎震澤具區之名耶或又指巴陵為東陵指洞庭為彭蠡要皆出于臆度之見以數千年之後求合數千年之前陵谷變遷安得一一悉如故也經文前云彭蠡既豬則其自豬為澤明矣後云東滙澤者今毎歲春夏江漢水漲則湖口倒流入彭蠡以上達豫章郡孰謂經文之果誤哉噫禹貢傳來舊矣繪畫天下山水田賦為萬世不刋之典九州山川各有分疆觀三江既入載之揚州則知求之上流者非也觀九江孔殷載之荆州則知郡名江州而求其跡于湖口者非也觀三危既宅三苗丕叙載之雍州則知洞庭彭蠡之間為三苗所阻不知作禹貢時三苗皆已懐服而遣官之說其非尤甚觀漢為北江江為中江則鄱湖為南江可不言而喻矣故曰信聖經者宜據古以考今不宜因今之異同以疑古也至云禹貢錯誤云十三字衍文當刪則吾豈敢嘗讀洪範見武王之所訪箕子之所陳俱在彛倫攸叙然疇雖有九而其㫖要則惟水火金木土五者而已矣何也彛倫攸斁而帝不畀鯀以洪範九疇者以其汨陳五行也天以洪範九疇錫禹而初一日五行則五行謂非九疇之大綱乎雖于初獨不言用下文八者俱以用言非五行獨無用也盖以下文所云用者皆用此五行也九疇只此五行夫固所以隂隲下民而為治天下之大經大法所謂彛倫之攸叙叙此焉耳是故惟五居中不以數言五事五紀庻徵五福則皆五也政雖八也食貨祀賔師統于三官而八政非五與徳雖三也正直一而剛柔之克各二三徳非五與稽疑雖七也卜兆五而其占則用二稽疑非五與至六極則皆五福之反也但五行在天地間凡萬事萬物莫非自然之運用而用之者則各有攸當耳所以敬用五事即五行之本諸身而罔弗欽也農用八政即五行之施諸民而農為先也協用五紀即五行之合乎天而罔敢悖也建用皇極即五行之一于中而端表則也乂用三徳即五行之矯其偏而從乎正也明用稽疑即五行之各兆而慎所擇也念用庻徵即五行之各有徵而可自省也嚮用五福威用六極即五行之禍福在人所自取也可見皇極居中固有以握乎九疇之樞五行在初實有以統乎九疇之用是五行不言用而天下萬世大經大法雖欲越此以為用焉不可得矣况箕子之所陳者乃千古聖學之傳故建極在上㑹歸在民王道蕩蕩平平本人人所當率由而天人貫通之理亦人人所當㑹歸焉者循此則彛倫叙悖此則彛倫斁矣可不慎哉至以此揆之洛書戴九履一左三右七二四為肩六八為足而五居中于義本無所取但其所同者五行也一六水二七火三八木四九金五十土是水火木金土在洛書謂之九數而天也萬物之數管是矣在洪範謂之九疇而天地萬物之用管是矣諸儒不知五行乃洛書洪範自然孚起之妙必欲以疇強合于數焉何哉且洛書自一至九其奇耦方位各有定在洪範自初一至次九不過九疇之綱耳果何以見其初一五行三八政之類皆為奇次二五事四五紀之類皆為耦初一五行方位當在下次九五福六極方位當在上八政當在左五紀當在右洛書之數九而洪範何為于初一即曰五行次二乃曰五事次三乃曰八政其數皆雜亂而不循其奇耦方位之叙也雖曰天乃錫禹洪範九疇原未指為洛龜何為即以洪範之九疇配洛書之九數以其言列其位且衍之八十一章焉果洛書也果洪範也止因其同一九字而必欲一一同之又何怪其愈傳而愈訛耶况禹既因洛書以叙疇矣或謂先天卦取則洛書又有謂後天卦取則九疇果天已錫之伏羲復錫之于禹果伏羲已先禹而為之書禹乃後伏羲而為之疇果禹先文王而叙之為九文王後禹而列之為八果禹先箕子而為之範箕子後禹而衍其說耶諸說紛紛皆劉歆之說誤之也要之道一而已矣得其意則殊塗而同歸否則道本一而見則二惡足以窺聖人之學貎恭肅水潤下時雨皇極言從义火炎上時暘視明哲木曲直時燠五福之建聴聰謀金從革時寒思睿聖土稼穡時風貎不恭狂水不潤下恒雨皇極言不從僭火不炎上恒暘視不明豫木不曲直恒燠六極不建聴不聰急金不從革恒寒思不睿蒙土不稼穡恒風五行在天五事在人天人一體而人之用五事即所以用五行也用一也敬則皇極建不敬則皇極不建而休徵咎徵隨之矣使于五事之用而五行配属不清于何而用之于何而驗之哉嘗考諸古反諸身因以詳究洪範之說焉木貎火言土視金聴水思此孔劉傳疏舊說又增咎以眊増罰以隂信未然也蘇允明乃謂木貎金言火視水聴而土思子由又謂土貎金言木視水聴而火思其信然乎至蔡傳出而其說始定然天人之際終有未易明者必先明乎天地之生成斯人道可識也天一生水地二生火天三生木地四生金天五生土雖其生理備具而天地不合則不成也故地以五合一而水成天以五合二而火成地以五合三而木成天以五合四而金成地以五合五而土成此五行之所以生且成者天地隂陽㑹合而渾闢無窮者也水生于天而行于地故其性潤下于易象取水在天上水行地中而浮游天地皆水也火生于地而運于天故其性炎上于易象取明入地中火在天上薫灼天地皆火也周易首乾坤終坎離既未濟天地定位水火不相射又謂雨以潤之日以暄之是也天三生木所以木皆發榮向上其性曲直資水以生其位東方而條達舒暢者其出機也地四生金所以金皆堅實沉下其性從革頼火以變其位西方而嚴凝肅殺者其入機也天五地十隂陽萃合為土萬物莫不資之以生以成而止曰土爰稼穡特舉人之養生最切者言之而土乃天地之冲氣也是天地開闢莫先乎水水濕生燥火燥生潤水滋木生木為火母火爍金變水為金子燥濕融結而土為水火木金所附五行生成變化不可窮詰其理則不可易也其在人也有形即有貎以貎属木者取其氣之生以貎属土者取其形之成不知生成之原在易曰男女搆精萬物化生太極圖曰無極之真二五之精妙合而凝而人生焉有生之初氣以水而聚形以水而結有生之後周身血氣之運莫非水也貌非人之水與甫生之際即有聲聲氣發露神之昭也天有震以著其陽之動人有言以宣其心之聲觸之即發出悖來違倐起倐滅亦無定象爝火燎原片言喪邦言非人之火與諸家每以心腎為神氣之㑹者亦有見于腎中水精氣所由生顔色之光澤係乎腎水之周流故腎為形色之本心固神明所舍而心主乎舌故聲音之發皆根于心也木于時為春其氣散在人為魂在目為視故以視属木金于時為秋其氣收在人為魄在耳為聴故以聴属金易謂精氣為物游魂為變木外榮視外見魂外游類也金内鑑聴内受魄内守類也彼謂金有聲而屬諸言者固未識内外出入之義抑知金以火而革聴以言而變與土爰稼穯屬之思者人頼五穀以養生内經曰脾胃者倉廩之官五味出焉又曰在地為土在臟為脾在味為甘在志為思思傷脾脾為一身之統思為五官之主也非與五行具于人即其運于天也明矣其用之人也又豈天人不相孚也耶水即雨而莫不潤者其徳也故貎之徳恭而作肅為水之用焉潤身生色謙退下人所謂抑抑威儀維徳之隅是也肅則時雨而休徵反此為狂則恒雨而咎徵矣火即暘而莫不炎上者其徳也故言之徳從而作乂為火之用焉發禁躁妄出逺鄙倍所謂出其言善千里之外應之是也乂則時暘而休徵反此為僭則恒暘而咎徵矣木氣燠而曲直四達仁徳也故視之徳明而作哲為木之用焉離明外施旁爥無疆四目明而無不照也哲則時燠而休徵反此為豫則恒燠而咎徵矣金氣寒而從革歛蔵義德也故聽之徳聰而作謀為金之用焉聲入心通訏謨逺猷聰四達而無不納也謀則時寒而休徵反此為急則恒寒而咎徵矣土氣宣播為風猶人之大而化焉之謂聖也故思之徳睿而作聖為土之用焉通微生于思至黄中通理神明昭融哲謀肅乂無所不用其極所以聖則時風而休徵反此為蒙則恒風而咎徵矣但其用有五其敬則一維敬則平康正直剛柔得中而皇極建斯為五事之得而休徵五福應之不敬則剛柔偏而皇極不建斯為五事之失而咎徵六極應之若曰某徵某福某極應某事焉拘滯穿鑿如劉向之說則非矣是故皇建其有極斂時五福用敷錫厥庻民究其實不外乎敬用五事之至也此固攸叙彛倫之要天人之大範也初一曰五行而八者之用皆用此耳五行寧無敬乎哉學于古訓學訓不明則邪說興詖行作而國家之政治日益頺壊學之所係亦甚鉅矣嘗讀學記曰博習親師曰離經辨志曰敬業樂羣是窮經博古得非自昔學術所重耶何近之談學者謂心性外一切詞章記誦皆聖學之榛蕪不知人心自有仲尼六經皆我註脚茍醉心糟粕惡足以語身心性命之淵微哉此言學而不究夫學之所自始故多言得以惑之耳書始唐虞而學之一言則始諸說命謂學于古訓乃有獲凡後之言學者悉本諸此且曰事不師古匪說攸聞曰監于先王成憲其永無愆莫非學古意也孔門以學立教論語二十篇雖各因人而施然學詩學禮學易學文孰非好古敏求之源流哉以孔門稽諸說命似亦後先一揆矣雖然說之言盖有為而發也須合三篇以㑹通之庻乎得其學之全焉何也恭黙思道非高宗之學乎舊學于甘盤非即黙思之謂乎說盖懼其專於思而廢夫學一於黙而畧乎事也啓心沃心闡徳輔徳高宗之望傅說者真不啻大旱之望霖雨而傅說弼直高宗惟在事事有備無患如甲胄起戎干戈省躬啟寵納侮爵徳任賢諄諄于政事間欲以暝眩之藥瘳厥疾焉故終始典學遜志時敏必如此而後道積厥躬徳修罔覺也不然則時惟建事而事不師古㡬何而不師心以自用哉然知行合一學之則也說又專于力行之艱何也知之曰明哲明哲實作則羣臣固已信王實有此知矣盖道咸得諸恭黙之思則不患其聰明之不啟識見之不徹也故曰知之非艱行之惟艱孰非豫防其偏而望其知行思學之合一乎信乎學不思則罔思不學則殆而恭黙以思道者不得不學古以稽其實必先明諸心以知所往然後力行以求其至而明哲實作則者不得不慎行以履其祥此所謂古人之全學也否則一于博古者不免渉于支離一于恭黙者不免流為虚寂故曰說之言盖有為而發也祖甲帝乙經以載道史以記事前人有定論矣然道外無事事外無道經史可以事與道分言之哉春秋魯史也其事齊桓晉文其文則史一經聖人筆削遂成性命之書此其事之所在即道之所在可傳可信為萬世紀事之宗也尚論三代以前經有殘缺考諸史史有誣雜折諸經可也兹于祖甲帝乙深病史之不可憑矣幸而有經存焉盖書乃聖經所以道政事者也無逸篇周公陳以訓導成王而歴舉商王之無逸者有曰其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庻民不敢侮鰥寡肆祖甲之享國三十有三年及讀少微通鑑曰祖甲嗣立為人淫亂殷衰在位凡三十有三年而崩將以為兩人也則名同享國厯數同及考邵子經世書凡世次厯年亦無不同者將以為一人也何以一治一亂一賢一不道其相懸一至此耶且無逸之書周公舉以告其君孔子取以筆諸經可信可傳無踰此者史遷尚以祖甲為淫亂而妄加詆毀向非無逸之篇則祖甲之誣將終于莫之白而至有疑祖甲為太甲者是史以記事其于事之是非真偽且不可憑則又何有于道哉又嘗誦易于泰之五爻曰帝乙歸妹以祉元吉歸妹五爻亦曰帝乙歸妹吉易三百八十四爻實舉其人者甚鮮而于帝乙則兩及之雖歸妹之禮或始于帝乙而元吉之占各因其卦爻然茍非賢君周公於易爻何為屢以名號稱也按書之多士篇曰自成湯至于帝乙罔不明徳恤祀左傳晉趙鞅救鄭筮遇泰之需曰微子啟帝乙之元子也春秋去古未逺且其言即為泰九五而發亦有可據何京房傳乃有湯歸妹之辭荀爽對策張說作銘皆因之程傳則以史謂湯為天乙厥後有帝祖乙皆賢王也後又有帝乙未知孰是夫書稱帝乙有明徳及考史鑑所載則云帝乙商道益衰將信載道之經乎抑信記事之史乎信經則書與易合信史誠不免程傳之疑矣夫易書所稱帝乙祖甲皆周公所表章也二王必為商之賢王無疑况商王多以十干為名取乙之名者五曰天曰祖曰小曰武曰帝其世次各異何為不直信易卦爻所稱本帝乙也而反以天乙祖乙之相混以甲名者五曰太曰小曰沃曰陽曰祖亦世以名殊何為不直信書無逸所稱本祖甲也而反以太甲之相淆雖然經史中或帝乙原無可考疑為天乙可也而載諸多士者至明顯矣傳易者不之信而祗信緯書與京氏之說或祖甲原無可考疑為太甲可也而載諸無逸者至明悉矣傳書者不之信而祗信帝紀與孔氏之說焉則是經且因傳而淆之矣又何怪史遷詆誣祖甲帝乙而後世莫之辯哉噫傳稱夏后孔甲擾于有帝且有盤盂之戒而史遷亦謂其淫亂不道今雖欲辯之其如文獻不足徵何康誥嘗讀大學首條三語已足以括其要矣然四引康誥以證之曰克明徳曰作新民曰如保赤子曰惟命不于常固足以盡大學之義而康誥一篇謂不盡于四語中乎可見古人善言書亦可見後人讀書不能窮其奥而揭其要也然考康誥所由作在書序則曰成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材書傳則曰武王封康叔于衛乃作康誥酒誥梓材以命之若果以為成王時作也然篇中所稱如朕其弟顯考文王乃寡兄朂遹乃文考既曰考曰兄曰弟其必非成王詞也明矣或謂誥作于周公而稱弟者周公弟之也豈有王若曰孟侯朕其弟而可為周公之稱乎此必武王命康叔之詞而序之誤也無疑矣或又為武王時康叔尚幼故未就封然篇中有曰朕心朕徳惟乃知曾謂知武王之心徳者尚可以幼言之乎但其文拳拳于明徳慎罰中有助王宅天命矧曰其尚顯聞于天無作殄等語不類封國之誥也嘗按春秋傳定公四年祝佗曰武王克商成王定之周公相王室以尹天下命伯禽封于少皥之墟分康叔命以康誥封以殷墟又曰周公為太宰康叔為司宼即此以意度之或者即康叔為司㓂而命之以是誥與以命司㓂之誥為封國之誥或者因康叔之國在殷地而後人誤傳之與但斯言也亦因康叔為司寇之言而言之耳雖左氏去周盛時未甚逺其言或亦有據而未敢必也噫若果信以為司冦之誥匪特與明徳慎罰之文不相悖而封國在司冦之後則書傳與祝佗之言皆可意㑹矣特外此别無可考則亦安敢信以為然哉洛誥君陳畢命粤稽古帝王其徳澤入人之深淪肌浹髓固結而不可解此豈刑驅勢廹威力刼制之哉抑豈沾沾之惠煦煦之恩能使人皆帖然服之易世而不變哉嘗于書而深有感夫殷周之際焉自讀泰誓牧誓武成諸篇見武王一戎衣有天下凡殷之子孫臣庻靡不臣服于周矣武王定鼎于洛志在都洛故并殷民遷之宜其感化之易易也迨成王命召公相宅于洛作召誥惟諴于小民顧畏民碞真知本哉周公往營洛邑使來告卜作洛誥乃命周公留洛固以東都重地不得不頼公之鎮定之亦以殷人不靖非周公不足以輯寧而化誨之也然于多士多方則又誥戒之不已曰昔朕來自奄予大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜曰爾曷不惠王熙天之命爾乃廸屢不静是殷人之不心服者何若此其難變哉繼命君陳懋昭周公之訓且曰爾無忿疾于頑可見殷頑尚未之改也至康王命畢公保釐東郊毖殷頑民猶以餘風未殄將由惡終為言必既歴三紀然後世變風移是其壮者老矣老者死矣故其民之頑者始咸若於周王之訓也夫民一也在周為頑在殷不謂之忠乎蓋由湯至武丁賢聖之君六七作天下歸殷乆矣乆則難變也况賢聖繼世迭興雖鳥獸昆蟲草木莫不浸潤於膏澤中矣斯民醉飽先王之徳豈遽忍于畔商哉特苦受毒逋不得不望周以解其倒懸耳及暴虐既除謳吟思商又何日忘之哉固非區區勢力所能脅又豈旦夕惠澤所能轉移而心服之哉殷先哲王其徳澤入人深也如此然周於頑民宜乎以刑威驅廹之無難矣乃由商舊政且表厥宅里樹之風聲舒徐以待其自新自化故曰惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同底于道俾太和在成周宇宙間豈一朝一夕之故哉是故觀于商而知民之沒世不忘以王澤之入人深也觀于周而知民之必世後仁以王澤之感人漸也惟其漸也此其所以深也志王道者盍于洛誥君陳畢命而玩味之始知後世君天下者逈與三代别矣穆王三書穆王周賢君也後儒信雜說而不信聖經乃誣之以耄荒何哉昔孔子定書自周成康之後獨存穆王作君牙伯冏吕刑三書用人訓刑俱不墜文武成康之風烈謂之為賢君也諒非溢辭矣及觀韓退之作徐偃王遺碑乃曰偃王凡君國子民待四方一出于仁義時周穆王無道意不在天下得八龍騎之西遊宴王母于瑤池歌謡忘歸四方諸侯之争辯者無所質正咸賔祭于徐執三帛二生之物于徐之庭者二十六國穆王方且復命造父御長驅而歸伐徐偃王北走嗚呼如退之之說則夫子所存三書皆可廢矣孰知是說也倡之者列子和之者左氏信雜說而不信聖經退之不得逭其責也夫乘八駿而宴王母列子之說也謂西極之化人請穆王同遊王執化人之袂騰上乎中天既而王悅不恤國事肆意逺遊乃至巨蒐氏之國又升崑崙之墟以至于瑶池此但列子假託謬妄之言以彰其神仙之術與黄帝不親政事夢想華胥之事同莊列寓言大段譎怪多類此厥後左傳不察乃因其說曰穆王欲肆其心周行天下皆將有車轍馬跡焉妄者又作穆天子傳以廣其孟浪之說此退之所為據也夫以列子謂穆王好神仙不恤國事為可信則黄帝不親政事亦可信耶以穆王宴瑤池為可信則黄帝至華胥國亦可信耶且列子謂西極化人既以變物之形又且移人之慮又為王問所從來左右曰王黙存耳化人亦曰吾與王神遊也形豈動哉夫既謂之黙存謂之神遊而遂謂其乗八駿宴王母不親政事信以為實雖荘列寓言之意亦弗之察矣但韓子亦因文見道者至謂偃王能行仁義穆王伐之不益謬哉夫有周王在上偃王乃敢斷諸侯之辯争受列國之玉帛恐知仁義者不為也况信怪誕之說而違夫子定書之㫖因徐偃之偽而使穆王受耄荒之誣是可以弗之辯哉其命君牙為大司徒則自謂守文武成康遺緒其心憂危若蹈虎尾渉春氷必頼股肱心膂為之翼也其命冏伯為太僕正則自謂怵惕惟厲中夜以興思免厥愆至有僕諛厥后自聖之言非惟見其所任尹牙伯冏為得人而惕躬畏咎亦甚切矣其命吕侯以刑也則歴告以謹刑罰恤非辜年雖老耄而一念哀矜欽恤之誠見于言表反謂其意不在天下何耶向使穆王三書所言皆無實所任之人皆不當在夫子必不取之以垂訓也夫子存其書則君牙伯冏吕侯必非妄人穆王必非不恤國事之主也明矣當是時君臣若此謂徐偃僭王已謬况又受諸侯之贄乎何後儒因伯冏為太僕正則曰穆王好馬故也因吕刑王享國百年耄荒則曰老而怠荒故好遊也所以書傳謂穆王廵狩無度財匱民勞至于末年為一切權宜之術以斂民財夫子録以示戒是惑之愈甚而愈失其真矣盍即書之本文而玩其㫖乎書曰王享國百年耄荒度作刑以誥四方盖荒度之義與禹貢荒度土工同言年雖老耄猶荒度作刑以誥四方正見其不敢怠也至謂宏敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中誦斯言也穆王之命誥與吾夫子垂訓之意昭然如日星也後人徒信雜說而不信聖經何哉秦誓昔者孔子刪書而終之以秦誓嘗竊怪焉或以為周衰而秦興孔子固已先見其微而于叙書特録之也噫聖人之心至公無我豈逆料于數百年之後而以事功成敗論哉及觀秦誓一篇則見穆公悔過遷善懇至惻怛若禹湯罪已有汲汲乎其不暇者至其昧思一介之臣以斷斷無技休休有容為賢而以斯人為子孫黎民之利其媢嫉者反之此尤可為千古之龜鑑春秋戰國諸君慮未有及此者也然則如繆公者聖人惡得而不與而秦誓一篇聖人惡得而不録聖人取舍予奪垂鑑萬世豈茍私一繆公而已哉故論五霸之功則大齊桓以其首能率衆尊周而攘夷也論五霸之徳則取繆公以其獨能自反悔過而遷善也知夫此則堯夫特稱秦繆為霸者之最盖論徳而不論功其家法有自來矣夫繆公誤用杞子之謀而違蹇叔以至有殽之敗因其三帥喪師辱國夫人而悔之矣惟其悔之而不責於孟明視西乞術白乙丙之流而深引咎自責增修其徳政三敗率用孟明而霸西戎此其難者故傳曰繆公之為君也舉人之周也與人之一也孟明之為臣也其不解也能懼思也由是觀之秦誓之詞夫豈茍為美而已耶予又觀繆公事其有出于桓文之上者三晉夷吾之入晉秦納之矣夷吾背河外列城與賂而不與秦而繆公不遽怒也丕豹奔秦勸之伐晉則不許及晉饑乞糴則又輸粟于晉自雍及絳相繼且曰吾怨其君而矜其民若此者可謂庻㡬于王者之量彼齊桓一怒蔡姬而遂興伐楚之師晉文之侵曹圍惡其出亡而無禮何偏也百里奚亡國之俘也繆公舉之牛口之下而登之上大夫之佐終其身倚任而不疑若蹇叔若由余若公孫子桑皆列國之儁也並相與周旋共國政焉若此者可謂庻㡬於王者之明彼晉有子犯從亡於外者十九年矣而其入國也猶投璧于河以為誓齊桓知任一管仲而終不免溺于䜿刁易牙開方之徒何明之足稱也楚人滅江秦伯為之降服出次不舉過數大夫諌公曰同盟滅雖不能救敢不矜乎吾自懼也若此者可謂庻㡬于王者之言彼齊魯之同盟舊矣而桓之入也首加師于魯衛晉之宗也衛侯一貳于楚晉文執之且使加酖焉其視繆公哀滅江之心不可同年而語明矣由是觀之繆公惟其能悔過遷善是以平生舉動亦多光明謂其為霸者之最良不誣也秦自繆公而後代有英君以至于始皇卒倂天下或謂繆公有遺澤于子孫也亦宜然其後世所由之道强猛恒有餘而仁恕多不足甚則變壊先王之法流毒四海為生民之一厄使孔子見之必所深痛安得以與穆公者而與之余故曰孔子之録秦誓也賢穆公以示訓也不計秦之後有始皇者也堯夫進穆公也嘉其徳之近于王也慨天下之純乎霸而入于夷者也武王始入殷訪于箕子受洪範踐阼三日召士大夫而問焉曰惡有藏之約行之得可以為子孫者乎諸大夫對曰未得聞也召師尚父而問焉曰黄帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣齊三日王端冕出師尚父亦端冕奉書入負屛而立王下堂北面立師尚父曰先王之道不北面至西行折而南東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝慾者從慾勝義者凶凡事不強則枉弗敬則不正枉者滅廢敬者萬世王聞書之言惕若恐懼於席四端於机於鑑於盥盤于楹于杖于帶於履屨於豆觴於户牖於劒弓矛皆為銘儆焉上古初無文字庖羲畫卦及先後天圖河洛圖書即文字也故後世雖有文字之傳而圖象不廢武王受洪範于箕子乃有九疇圖受丹書于太公世止傳其文耳圖則未之覩也近王欲立氏攜丹書圖示予謂關中舊傳此圖象一展閱之令人悚然懼欣然喜盖不待誦其全文觸目儆𠂻受益非淺淺矣夫圓天象也方地象也黑白晦明之象也人心體虚靈洞鑑圓融靡不統括故圓象天苞隨感裁決行止疾徐時措合冝故方象地矩與易繫圓神方知其理一也然此心在中敬則昭明澄徹怠則晦蒙窒塞故曰敬勝怠者吉怠勝敬者滅事物應感義則正明斷制欲則叢棘桎梏故曰義勝慾者從慾勝義者凶是方圓即中外體用寂感之分黑白即善惡邪正禍福之辨所謂蔵之約行之得可以為子孫恒者何簡明親切一至此也書曰人心惟危道心惟微又曰作徳心逸日休作偽心勞日拙先後一揆有自來矣但此心發與未發分象方圓豈判然不相合哉亦惟觀象天地斯得之矣彼天之圓包乎地外地之方奠於天中天體太虚而天之氣則充貫乎地凡萬類絪緼發生于地者皆天之氣也乾統天坤順承天乾坤一一即心之象也此心渾淪太極莫知端倪應㡬變化各止其所未應事非先既應事非後寂然不動非局于内感而遂通非滯于外顯仁蔵用常明常覺要在得心忘象聖訓躍然常在心目間矣易曰敬以直内義以方外敬義立而徳不孤孟季子問公都子曰何以謂義内也曰行吾敬故謂之内也觀其㑹通列聖豈欺我哉圖書編卷十
