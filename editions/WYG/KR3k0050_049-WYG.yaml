body:
  text: 圖書編卷四十九明章潢撰廣東總鎮圖敘今天下言防禦之畧者北固重而尤必急于南也盖以北之情在目睫之前而其備常在千里之外南之形在萬里之外而其患乃在蕭墻之内也何者北人所居絶逺其欲入侵中國率行空虚之地數百千里然後乃抵塞下候望誠謹則可以知其聲響而爲備故曰在千里之外當路塞去畿郡逺者數百里近乃一二日耳羽書可且夕逹也故属者常得以天下之力而備禦故曰在目睫之前也夫兩粤者絶南裔夷之交也山海谿峒之蠻與諸郡形錯壤接並耕而争食之其居懸逺深昧性禍賊喜殺保固恣睢不狎話言苟得而已不顧死亡自昔上仁之所不懐而彊武之所不讋也獸集鳥散亭隧隔塞之所不得施甲楯劒矢之所不猝備也而粤之民無歲無夷宼之駴矣然而天下知北害而未睹南憂者北近而南逺故曰其形在萬里之外而患在蕭墻之内也夫粤之夷非能爲中國害者也然夷不滅則粤無小康之期憲祖晣其然故開府建節宿重兵於蒼梧授大臣以不禦之柄而專進退之爲萬世規深逺然後碩畫之老屢建誅討之勲薦紳大夫攄鈎深致逺之慮鷹揚爪牙之士効執訊獲醜之力士馬甲兵之盛燀赫乎逺方技擊蹶張之用便習於士伍志亦信矣以此致伐奚不克以此批亢𢷬虚奚不至餘孽不足殱而交南可坐制然且公顧以爲憂者何也嗟乎是廼公之所以爲憂者也先王之致武也固曰勤恤民隐而除其害夫粤之用兵亟矣粤人之力屈久矣侵盗之虞有廹而師旅之奉無緩斯坐敝之形也詩曰彼旟旐斯胡不斾斾憂心悄悄僕夫况瘁夫旗章之盛委属之重可以爲寵已而君子以爲憂也憂故慮詳慮詳故事善事善則甿庶豫甿庶豫則武節奮此勝筭也兩廣總圖兩廣古百粤地陶唐氏命羲叔宅南交時已通中國矣周宣王時召虎疆理淮濆遂至南海其詳不可考已周衰呉越更大及楚滅越其君長散處海上猶蒙故號以自殊有甌越駱越之属甚蕃故曰百粤秦始皇帝利粤之犀象珠璣乃使尉屠睢統五軍監祿鑿渠以通糧道屠睢人姓名秦制以御史監郡故監祿一曰史祿殺西甌君譯吁宋西甌今廣西此盖君長之名侏􅍣之語也越人皆入叢薄中與禽獸處莫肯爲秦者陰置桀駿以爲將夜攻秦人殺尉屠睢秦乃發適戍以備之後王翦滅楚乘勝畧定其地爲南海桂林象郡荔浦以南𨽻焉秦亡趙陀據兹土稱南越王漢孝武帝平南粤陀孫光降以其地爲南海蒼梧鬰林合浦日南九真交趾儋耳珠崖九郡置交趾部刺史領之治蒼梧元帝時罷儋耳珠崖歴東漢末七郡如故呉仍漢制分領於荆交二州其後析合浦以北南海蒼梧鬰林三郡属廣州治番禺餘乃属交州治龍編尋又析置桂林今桂林府高凉今髙州髙興今化州寧浦今横州四郡以附廣州而交州亦増新昌武平九德三郡晉初以荆之始興始安臨賀來属尋復歸之省高興入高梁復析置廣之晉興今南陵府東官今東莞縣晉康今德慶州新寧今新興縣永平今梧州義安今潮州新㑹今縣七郡宋泰始中置越州與交廣並三刺史部治合浦今㢘州析置宋夀今欽州南流臨漳等八郡属之又析置宋康即高興綏建今四㑹縣海昌今電㑹縣宋熈今髙要縣樂昌始興南界今縣是屬廣州而珠崖亦稍收爲郡至齊又増廣之有齊安今陽江縣永熈今瀧水縣齊康今海康縣齊樂今連州及廣西平樂齊熈今融縣越之定川抱定凡八郡梁因宋齊三刺史部増置廣衡今德英縣之西古舎涯縣東衡今南雄東楊即義安郡高即高凉郡瀧即廣熈郡羅今石城縣成今封川縣新即新寧郡越即合浦南合即齊康厓即珠厓安即宋夀等州以上俱在今廣東以督列郡又置都督府於廣使持節以總之及隋平陳并省州郡爲番即廣避煬帝諱岡即新㑹循即龍州潮即東楊州瑞今肇慶府封即成州瀧新高賀今賀縣合即南合欽即安州羅厓諸州即東廣不能州者爲縣置廣循桂三總管皆加使持節之號大業初復置郡罷州府亦尋廢唐興復改郡爲州置嶺南道貞觀初置嶺南東道嶺南西道東道領韶廣連今州循朝康即晉康郡瀧端封髙春今陽春縣亷即越州羅即羅縣辯即化州雷即合州瓊即隋厓州振今厓州儋即儋耳地萬安析厓州置諸州西道領桂柳宜今慶逺昭今平樂梧潯邕諸州尋又開邕州以西諸蠻峒置羈縻州數十属邕州光化後爲楚馬氏所據五代時入于南漢時交阯有丁部領者自領交阯事稱萬勝王自是交阯不通于中國矣宋平南漢分爲廣南東路廣南西路自廣韶南梅今程鄉縣南雄英南恩惠以東傅海属東道高亷欽化南抵瓊南縣寧今儋州萬安今萬州吉陽即唐振州與桂柳宜昭梧潯邕俱属西路元置廣東道宣慰司于廣州海北海南道於雷州𨽻江西行中書省置廣西兩江道于静𨽻湖廣行中書省至正末於静亦置省焉明興以廣韶南雄惠潮肇慶高雷亷瓊十府統曰廣東桂林柳慶逺平樂梧潯南寕太平思恩田州思明鎮安十二府江泗城奉議思陵利龍向武都康八州上林隆安二長官司統曰廣西各置承宣布政使司於廣州桂林領之後降田州府陞憑祥歸順峝各爲州故今廣西凡十一府十一州云夫兩廣極南地也故其氣候常多暑少寒少寒故霜雪不降多暑故瘴毒間作梧以西則漸甚葢由山勢局促層巒疊嶂茂林深箐居人如坐甑中熱鬰薫蒸故瘴瘧作焉炎荒之地大抵然也梧州府設立總府駐劄提督兩廣軍務兼理巡撫一節緣兩廣地方山川聮絡境界毘連二處賊徒頻年竊發廣東藉廣西之兵力廣西亦藉廣東之錢糧彼此相資利害相關廣西戍兵一查得先年間湖廣原有官軍一萬員名常在廣西守備以後分作兩班貴州原有官軍五千員名輪班在於廣西守備以後盡數掣囘今廣西所属二十八衛官員有官軍二萬餘員名湖廣輪班官軍五千員名除分有哨守各處城堡外廣西中軍止有官軍二千餘員名左右㕘將各有一千餘員名委實地方廣濶兵力寡少遇有盗賊出没不能分布勦除及看得湖廣毎年輪班官軍彼處都司衛所多將軟弱老幼不堪者補凑前來徒有虚數不得實用合無將湖廣官軍一萬員名仍舊常川在於廣西守備或于彼處都司一萬餘員名兩班輪守俱請敇湖廣巡按監察御史公同都布按三司委亷公堂上官員親詣各衛所官員將前項該官軍并把總指揮等官逐一揀選務將軟弱不堪者揀退守城就於本城見操演備禦數内照數撥補并另推選有謀有勇出世超羣之指揮二員領兵前來上班替換見今輪班都指揮姜潮翟政囘司别用仍乞將貴州原掣囘官軍五千員名照舊輪班調來廣西分哨地方并請敇湖廣等處總兵等官今後湖廣永州道州地方有事廣西官軍策應廣西全州興安地方有事湖廣官軍策應廣東廣西接境地方有事互相䇿應如此庶㡬哨守不致缺人各軍聲勢相接遇警應援可以成事廣東水寨一定水寨照得廣東八府濱海而省城適居東西洋之中其在東洋稱最阨塞者極東曰柘林與福建𤣥鍾接壌正廣東迤東門户稍西曰碣石額設衛治存焉近省曰南頭即額設東莞所治先年設置備倭都司于此此三者廣省迤東海洋之要區也西洋之稱扼塞者極西南曰瓊州四面皆海奸宄易於出没府治之白沙港後所地方可以設寨極西曰欽㢘接壌交南珠池在焉惟海康所烏兎地方最爲扼塞其中路遂溪呉川之間曰白鴿門者則海艘咽喉之地此三者廣省迤西海洋之要區也以上六處皆應立寨内南頭已經近設㕘將一員督兵三千足稱巨鎮柘林近亦請設守備兵糧之數尚應議増而已有専官皆可勿論矣今惟東路之碣石一處西路之白鴿門瓊州并海康三處各應設立一寨碣石海康毎寨各兵一千二百名大小中船共四十􅃗白鴿門瓊州毎寨各兵一千八百名大小中船共六十􅃗與南頭柘林通爲六寨其柘林寨兵船仍合増如瓊州白鴿門之數董以將官定與信地無事㑹哨廵緝有警逓相追捕小賊則一寨任之大賊則分東分西三寨合任之再大則通東西六寨共任之皆以擊賊於外洋爲上功近港次之若賊起此寨不擊而别寨擊之賊所起寨重治如見賊不擊或致令登岸擄掠者查照信地以失律論罪伏乞聖裁治藤峽府江論葢自藤峽之役躬覧山川按圖諜詢父老而後稍稍知破賊之畧云大抵藤峽府江相爲表裏然治藤峽宜速而治府江宜緩速則賊無所逃緩則可窮要領葢藤峽北起武宣西極龍山南阻潯江三靣雖迂猶可邏遏所慮者東奔耳然前紫荆後根薑各有間道可透林峒扼此一隅而腹背廹蹙譬之釡魚安可跳也故曰宜速至於府江北起陽朔南界蒼梧延袤三百餘里而江以東則恭城平樂賀縣通於連州江以西則荔浦脩仁永安五屯抵力山羅運其間岡巒遼遶蹊蹬塞阨地曠人稀村落渙散迨乎沿江爲盗則又倚林伏草倐忽往來一有濳藏莫知窟藪官軍逐捕無所因糧越壑騰岡益難輸輓未易破也愚以欲治府江則五屯永安荔浦平樂賀縣尤爲要害皆宜以一歲之前屯兵積粟以能者主其稅以爲常額又譸張爲幻使不敢一控公門雖有向化之心無由自欵稍不慊欲即指摘其罪駕以浮言駭上官而督捕愈離其心或啓大釁此兩江通弊也昔人有言在外曰奸在内曰宄御奸以德御宄以刑治内詳而治外畧弭盗之策斯其首端乎兩廣總鎮事宜廣西潯州之境萬山盤矗中有水曰潯江發源柳慶東遶至潯𢃄象州永安脩仁荔浦平樂諸郡縣夾江諸山皆嶔岑嶻業其最險惡地爲大藤峽今易爲斷藤峽葢有孤藤度峽磵如徒杠今斷之故名南截潯水爲府江自藤峽至府江約三百餘里地惟藤峽最高登藤峽顛類百里皆歴歴目前軍旅之聚散往來可一盼盡也諸蠻以此爲隩區藤峽則以桂平大宣鄉崇姜里爲前庭象州東鄉武宣北鄉爲後户藤縣五屯障其左貴縣龍山據其右若兩臂然峽北巖峒以百計如僊女關九層厓極險阨者亦數十處峽以南有牛腸大岵諸村皆沿江立寨藤峽府江之間爲力山力山之險又倍藤峽又南則爲府江週圍葢六百里其中多㝠巖隩谷懸磴絶壁入者手挽足移十步九折一失足則殞身數百仭下中産猺人藍胡侯盤四姓爲渠魁力山又有僮人善待之資其鄉導探其險易擾其耕耘賊必且驚且怯各營巢穴距險爲防然後以外兵諸道並入環而攻之庶可滅也若欲以旬月之間孤軍深入賊必漫走莫可窮捜故曰宜緩且征南蠻者莫利於結巢莫不利於漫走漫走則我軍不勝追逐而又有機械毒物濳發莽中畏縮逡巡曠日持久即有十萬之師未有能得志而返者也要知藤峽府江固難並舉若舉此而置彼亦非全功葢猺獞親昵黨類即百里之外通爲一家必使東破則西來者無所居停西殘則東鋌者無所寄食前後䟦㚄乃可禽爾故征蠻之畧與禦邊殊科征蠻大舉不若遊擊之功一勦不若屢警之力也誠以精兵一萬以一謀將統之所在巡集擇其罪狀顯白者次第撲之朝擊其東暮突其西春擾其耕冬食其粟且戰且諭三年爲期必惶恐乞降願還妻子然後因而撫之除其疾苦振乏扶衰比及五年馴可淳化或曰所在遊擊將無流刼之虞乎曰不然南蠻之倚山猶北人之倚馬也北人離馬不能爲雄亦猶南蠻離山不能爲力也若夫景泰中流刼郡邑者皆四方客㓂竊名姓而起非真峽賊也雖然南蠻之俗鄙而難變戅而易欺是以衛所之豪世掌其土往往假借上官之法丁剥而户漁之而鄉老廂長歲入毒藥弩矢中人無不立斃者雖四姓諸徭亦憚之其言語侏􅍣重譯始解景泰中徭酋侯大狗等猖亂嘯聚萬人脩仁荔浦力山平樂皆應之攻墮郡縣出没山谷守臣不能制率以招撫縻之時朝廷正有邊警未遑問也天順中益縱恣發兵捕之詔有捕得大狗者賞千金爵一級竟不可得久之蔓延廣東高㢘雷之境所至殘毁兩廣守臣皆得罪㑹憲宗初即位鋭意南討集廷臣議兵部尚書王竑言峽賊稱亂其始由守臣失䇿以招撫圖爲茍安長其桀驁譬諸驕子愈惜愈啼非流血撻之啼不止爲今之計當大發兵討之嶺南諸蠻有猺獠狑獞而猺類最多大抵言語侏􅍣服食詭穢巖壑林箐之與居狐狸豺狼之與羣本不可以中國之治治也致亂之由皆華人姦黠通山者誘之治法在簡其約束禁其招誘不失吾信義而已彼濳安窟穴則慎勿苛擾稍肆侵掠必早爲撲滅諸蠻非有包藏不軌之謀騁武中原之志亦豈能爲大患哉惟守臣平居不能禁戢撫定或姦人侵刻以激狼子野心之怒暨其倡亂則彌縫姑息徒幸茍安甘言重賄不敢忤拂使驕恣狂悖之氣日肆憑陵至令數千里之地被其荼毒然後奏調大兵禽獮草薙雖獲成功所損多矣幸雍材畧可任朝廷委用亦專紀律嚴明方畧素定故能使數十年深根固蒂之㓂不旋踵而無孑遺功亦可述然舉十六萬之師暴露數千里之外供需轉餉府庫耗竭計其斬首將二萬級豈無崑岡玉石之慘邪雖然非雍不能辦此也其機要則在斬李英等四人將士用命葢已得勝筭已朝廷用兵可不重將權邪乃若趙充國不用辛武賢决征之策而屯田以困先零韓雍不用諸將久困之謀而深入以破藤峽此又地利夷情不同事而異形者不可執一論也諸猺雖姦桀驁悍難靖易亂然方其無事時亦皆水耕火種抱布貿絲非若游民之不事生理者但諸衛所之臣貪縱者多却慮者少而官府及豪猾又多倚勢法爲姦利得其賄則漏洩機事教誘凌掠而啓其侮不遂所求則訐發陰私誣譖垢釁以激其怒守臣瓜代無常率非久任一信其言或畏事而容奸縱慝或貪功而輕率寡謀瑕釁一開兇殘莫制中止則損威遂事則黷武而兵連禍結至無寕時况諸猺之性如禽獸然非有劑量輕重于死生利害之間也豢飬有方彼未嘗不爲馴伏一拂其性則跳梁蹢躅羣死不悔而難可化誘招致其勢不至於草薙而禽獮之不已也是豈所謂王者之師好生之德哉故平居無事則當撫之以仁而必不可爽其恩信禍亂既作則當懲之以威而必不可狃于姑息制馭蠻夷之策豈復有過于此哉今觀嘉靖中二役在王守仁則因凱旋歸便而乘不備以襲之在蔡經則因首惡就擒而集大衆以征之皆可謂有功於嶺表矣然能保勦之必勝而不能保繼者之不擾能保征之必克而不能保撫者之不􅆾此所以暴師旅竭府庫不足以貽數十年之安也然則選將帥於亂作之後孰若慎守臣于無事之日哉至田汝成曰藤峽府江爲㓂雖同治之則異治藤峽宜速治府江宜緩葢以藤峽可夾攻而賊無所奔潰府江地遐阻而人難得其要領也汝成親涉其地其説爲有據此又用兵者所當知云嶺西所属負山瀕海無地不有賊巢無處不被刼奪自府治南岸一百三十里至新興則有土名雲浮山王三坑鐵塲峝官㕔地黄沙逕簕行雲蕪黎峝良峝密峝料峝林峝等巢賊首某等約賊三千餘徒由新興入百里至陽春則有土名高峝雙峝崩石峝富林鴨鬬黄沙小卯白梅峝青水紅豆深掘雲青等巢賊首某等約賊二千餘徒自陽春迤東一百五十里至恩平則有土名牛牯突白靣石磨刀水關村洗馬潭十三村等巢賊首某等約賊二千餘徒自肇慶江行二百里至德慶以瀧水小江爲界下曰東山有土名富禄峝柞峝上臺下臺石狗天所北涌水澗赤土歐塘柴坑東模大干火焼下埇封門大峝頭大臺尖底崩峝楊柳桐村茅坑茯芋塘邊苦竹根石背等巢賊首某等約賊六千餘徒上曰西山有土名羅旁大力石龜磊嶺埇百片大埇拱埇封門思律思遥風木埇强車教馬鞍野芊下城水口龍塘古逢等巢賊首某等約賊五千餘徒先年二山止有猺賊自嘉靖三十七年千長陳世紀招引陽春西山王德政等於儒林地靣耕種因而鳩合王德政張快馬等浪賊約計四千餘徒互相聮絡攻剽究而言之地分有水陸然東攻西竄南捕北奔其實通爲一巢種性有猺浪然或倚爲巢窟或資爲羽翼其實通爲一賊根連蔓引日熾月延破寨焚村凌鄉跨邑無論逺歲只自隆慶改元閱今四載焚掠村鎮何止數十百處刼奪商船何止數十百艘殺死民兵何止萬有餘命掠去男婦子女何止數千餘口且拘執見任職官敵傷防捕兵將兇窮惡極勢廹情危即今日南倭備極慘烈尚有疆圉之限來去之期未有入處封域爲禍腹心如斯之甚者也夫肘腋之患不除倒懸之厄莫解門庭之侮不靖袵席之處難安將來疆土日以促民賦日以増䧟溺淪胥咸思爲變殆莫知所終矣竊以爲事不一勞者不永逸計不百備者不十全今欲建非常之議而尚不免牽於稠人之筭欲立無窮之業而又不能不嗇於銖兩之需此計所以多隳生靈寡幸而賊勢轉猖也故前乎此非不大征矣嘉靖三十七年專勦王三坑動兵僅及五萬隆慶三年專勦瀧陽等處動兵僅及二萬兵甫出勦賊旋嘯聚無補毫釐爲禍轉酷後之視今豈不猶昔若非計處錢糧數十倍動調官兵十餘萬八道並進三月之後將舊兵掣散復以生力兵三萬維守窮巢則捜討之隙必莫能周兇逆之萌决無終殄無論善後只勦捕之初未便有觀成之理也竊照本道分守嶺西目擊地方猺浪之賊綿亘一十餘州縣盤據扼塞依阻林藪殺人越貨勒銀贖命占耕民田刼掠江道此勦之决不可一旦緩也夫亂不極則治不生勞不倍則逸不永自昔動衆入山一二月擒斬數千餘非不赫然稱盛舉矣然賊存而兵先退兵退而賊復聚此猶遺種于地無有不發者葢始則欲求成功之速既乃不爲善後之謀此嶺西之賊所以卒無底定之期今議者謂蕩平此賊非大舉不可欲大舉者非數十萬衆不可夫兵以計爲本料敵者貴於得情行師者不苟動衆本道常按圖頗得其情狀矣前項山賊爲窠不下三百餘大者千餘衆次者百餘衆少者數十衆總之萬餘衆止矣不相統属無專號令其勢渙散大軍深入勢必奔潰誰與統之以攖吾前鋒昔趙充國伐先零羌虜五萬人充國所統歩騎六萬人後罷騎兵留屯田僅精兵萬人不茍接㦸坐挫虜謀卒之捕斬降附溺水餓死者殆盡此萬全之師也如議者必欲草薙禽獮無分玉石多上首功不計縻費不恤擾害殆非仁義之師爲計之得也愚計欲圖蕩平無論先後欲動大衆必須調狼賊素畏狼狼善捜扒宜咸行廣西該道調歸順下雷東蘭那地等處狼兵以八千人自廣西貴縣登陸從信宜至電白獅子堡分路入陽春爲一大哨以三萬二千人至德慶州入東山西山分四大哨合陽春爲五大哨毎哨另召興寕長樂南詔土兵四百人責成該道俱要素練者不得市傭充數統以㕘遊一員不可雜以浙兵浙兵欺狼攘奪其功反致壊事各用鄉民爲鄉導四望以防遮伏進據要害相度地形設立排栅五哨結五大營毎營各撥諳熟地利鄉導二十名勿輕接戰倣充國屯守之計合用枝兵俱於附近州縣土浙兵營内查取不必他調費糧復先於隘口悉以官兵鄉夫把截以八月未收成而入賊見大兵必逃竄山谷先令招主撫諭良猺不許窩藏聽其將累重移寄州縣給白旗與挿寨門大張旗榜有能投戈歸附者推還故地有能捕斬除前罪給賞亦與白旗毋殺彼勢竄食困苦于寄托將乞降恐後大營狼兵分哨窮捜不三月非擒獲即餒死矣此其不殺不辜不燔聚落不濫費糧萬全之䇿也事完之後土官弟男願留者比照左江九司事例授以世襲巡檢責以城守属肇慶府管轄即許狼人耕種其地聽其自給數年陞科免其差役化奸宄爲善良變盗區爲編户一勞永逸萬世之利也大率􅉕房蟻穴根株之盤錯者十三州縣故其地里川原邊幅之延袤者一千餘里無論賊數之爲萬爲千兵鋒之爲强爲弱必欲盡賊則斷非十萬以上之調發不可也何者以足跡之捜捕者勢有不能周也彼爲萬衆爲數萬以下之議者非姑取目前之凱則素無經逺之規可以就功而非所以爲地方千萬載深長計者也此兵説也層巒疊嶂澗水廻谿大率猿猱之棲原非文物之土土官設置計委不踈但承調者既乏其人則經逺者可無别筭倘舉曠衍之舊業槩以還民而酌邃逺之膏腴招徠佃種或十五里一屯焉或二十里一屯焉有城以守則衆情自固有産可植則生計可安兩㕘遊據其中兩守備峙其畔五年之後民之生息日繁盗之根株永絶即窮居之奥區皆可稱樂土也爲之編圖甲改郡邑以文治之則將府俱可撤也此善後説也然此二者由前言之兵多則餉廣故非捐財至十萬以上不可舉也由後言之屯多則營築之費廣故非捐財至四五萬以上不可成也然要以振國威保民命廓輿圖復賦額非所以爲浪費也費亦可無惜也一大征始事在捜勦終事亦善後經制稍疎蘖釁再萌即大征之勞費爲虚費矣雖然亦未有捜勦原不净而可以希善後者也今之論者大率謂嶺東賊强嶺西賊弱不知嶺東之爲盗者即民也葢數十年來始有之釁也其根淺嶺西之爲盗者猺也實建國而來未闢之疆理也其患深故勦嶺東之賊與勦嶺西之賊爲力均難而靖嶺西之㓂較之靖嶺東之㓂則難易霄壌矣兩山撮土普天之大誠不足云然據棲巖險之内阻以崇山䕶以深澗幾與世中逈一霄壌無論往代只我明極盛之朝薄海内外無思不服獨此蕞爾者旅拒王師自保區宇有丁不役有田不租有藤漆蜜蠟皮張不以上供天府葢至於今二百餘年矣乃日阻截官商稽留命使破䧟城池刼奪官帑甚至陵鄉跨邑盈野盈城㦸搠嬰孩刳剔孕婦以資戲玩當事者習其如此至亦付之無可奈何以爲此天成盗賊之藪也有此山川有此盗賊且其人非吾民也日復一日遂茍且因循以致斯極夫昔之幸功喜大務於闢土開疆者誠多事矣若此膚寸之區固非絶漠以北越海以南其四環盡赤縣之疆理也而乃令有異類不賔之種閲二百年㝠梗如故即令都不侵軼雜處華夷不㡬于族類無分動辛有之慨乎然則兹舉也豈特弭盗固所以爲國家開未闢之疆土也豈獨闢土固所以爲洪荒來了一段大公案也與其少發而曠持不若大舉而疾决此千古議征者不易之成䇿今兹所議之舉動誠似之矣惟是以此族爲患如斯之久生民困苦如此之深大征决䇿閲二百年始就如此之難幸而兵舉賊净所恃以剗根株杜萌蘖以保億萬載昇平之福者宜如何爲慮而尚可苟且因循曽㡬何時又以來吾民之釁隙乎此善後之經制所以萬鈞闗係更不可謂輕也今之議者有欲就調到土官查取官男統領兵目携𢃄妻小耕守者葢以其山川促狹原不可以聲名文物治也此其見亦未盡然也且節經招取未聞有大府大州之官男肯來應募者矣其計固不可以株守有欲移守備於連灘掣營兵聽其經理於六都南鄉劄兵二營下城古蓬劄兵二營各委官提調此於守計近之矣但山川空曠日延月引萌蘖易生計亦未可經久即令盡如所云招復流民無城可據竊發之釁亦斷不能無矣至云欲就立本土之豪比照土官之例資與行糧招兵占種則又皆率易之談似難與酬迂逺之筭反覆思惟在㓂靖之始欲防蘖釁斷須樹兵爲經逺之謀欲闢土地必須屯種然樹兵非久計也故大定之後計卒歸於建縣屯種不可以孤立也故招集之始其便合就築城查得二郡見有七大營兵除陽江電白呉川三縣海防合留三營難以議掣其四營之費以八錢爲凖毎月得銀二千一百兩瀧水營兵七百名南鄉營兵七百名新興四閘營兵三百名江道營船兵一千三百名以六錢爲凖毎月得銀一千八百兩二項共銀四千兩以四錢五分則可飬狼兵九千名以一錢九分給行糧可得狼兵二萬名歸師生厭勢必戀家留之非便伏乞就於調狼之始添調二萬名刻限正月發行二月到鎮及此收功之候適新兵到戍之期是戍兵一項之費可無資於外索矣高肇見有㕘遊就行遊擊督兵三千劄下城德慶守備督兵二千劄連灘以控制西山㕘將督兵三千劄六都恩平守備督兵二千劄南鄉或倉步以控制東山因爲勦除殘孽相度地形經理屯營招到新民量兵夫䕶衛耕種或十五里内有曠衍膏腴之土立一屯焉或二十里内有曠衍膏腴之土立一屯焉大率兩山四哨每哨地靣約建十屯大者量住四五百家小者量住三四百家通融估筭毎屯土基磚砌約銀一千兩而又度地取中因形制勝以最廣適中之所爲將來立縣之規制度稍宏預爲儲峙葢今之所以設將府即異日之所以開縣治者矣銀共四萬僅抵肇慶一郡之兵一歳之食計費甚少將督㓂靖民安増賦撤兵其利何啻千倍是只此四萬之銀便以定嶺西千萬載太平之治假令更有加于此者亦所謂有利百姓無愛髪膚豈足以爲靳乎至於招徠佃種先儘本處失業續召九江英德陽山以及江右之贑民與廣西之狼獞隨到安挿毎三屯委一文職一武職亷幹者撫綏經理初爲茅舍以棲身繼以排栅以自固後築土圍復用磚砌山塲田畆俱聽官府度地計口均給無容争競度踰週歲之外處處俱已成屯二載之餘城城俱已鼎䜿即深山窮谷之内經行所及雉堞到處嵯峨蛇虺虎狼之區風氣既開人文亦當漸著然後量地肥磽輕爲科税分圖立甲薄起徭差撤將府以鼎開縣治减武備以興起斯文即薄海内外無復有不賔之土而嶺西殘困遺黎飬安休息皥皥熈熈其地本來事簡民淳將來豈獨無盗其治安熈恬之景象必有更過於中土文物之區者矣要在斷而行之無惜小財致妨大計則盗賊斷可空疆理斷可闢田賦斷可増縣治斷可立武備斷可减兵費斷可舒而謂爲天成盗賊之藪不可以聲名文物治者殆不信也德慶州上下江道與高要高明四㑹廣寕新興恩平瀧水各營堡及防送瀧水小江船隻原額食餉之兵共該五千七百七十七名後因地方殘破錢糧徵解不前處處减少見存之兵實止四千八百四十七名葢缺額而不敢補者㡬及千矣兵備日踈盗賊日熾盗賊日熾田里轉蕪以致錢糧轉益困乏武備轉益廢弛弊皆原於此也然以所供者營堡之兵所用者土著之輩故雖徵收或有短少給散或不依期尚倖免於噪嘑求糧之患及又查得章程内一欵爲預計兵食查計前欵嵗例止彀募兵週年之用其閏月照見計各兵一年應用銀二萬五千餘兩及各處原設營堡并德慶江道之兵約計毎年合用工食餉銀五萬兩二項約共用銀七萬五千餘兩議勦瀧水羅旁按瀧水羅旁一𢃄乃郡縣内地距德慶州治僅隔一江去梧州總府不百里爲兩廣往來咽喉奈何坐視其暴刼吾民阻截江靣爲肘腋之患而不恤緣江南岸數百里山林䝉宻不敢毀傷其一草一木朝廷設重鎮置兵衛果何用也霍韜嘗謂羅旁綠水之賊爲害深矣而有司不肯議征非不能征不肯征也若調狼兵逹舎并官軍分爲數道一自鬰林入一自高州入一自新㑹入一自德慶瀧水入四靣並進而梧州大兵上流振之且縱火盡赭其林木使無所蔽伏羅傍緑水之賊反掌可平也廣西土官廣西布政司領長官司三永安上林安隆右𨽻兵部武選司廣西土官一百九十七思恩田州思明鎮安知府四人思明結安下石西利州都結奉議思城上思龍英鎮逺江州結倫思同果化都康茗盈萬承全茗上下凍泗州太平向武南丹歸順安平萬承忠州思陵龍州歸德那地東蘭上隆知州三十三人左州同知一人羅白憑祥上林陀陵羅陽忻州知縣六人上林縣丞一人懐逺主簿一人桂平貴溪典史二人永平寨波羅里大洞三寨鎮安平郷理源鎮高井寨尖山鎮周冲都樂壚古江口羅目鎮慈樂寨東鄉巡檢十三人木盤浦鏌鎁寨白石寨覃觀旺思隆鄉連城鄉武羅鄉武林鄉辛安寨東禪鎮那龍寨大約鎮寨下市界牌鎮安城鎮歸仁鎮古眉寨羣峰寨白靣寨遷隆寨西舎寨麗壁市桑江口古􅞫鎮三畔鎮三門灘大寧寨龍門寨靖寕鄉宜良鎮都博鎮新興鎮歸化鎮吉清鎮廖洞鎮江口鎮章駱鎮安湘鎮樂善鎮莫離鎮武陽中峒鎮通道鎮清流鎮思管鎮鵝頸隘保江鎮西峒鎮潯江鎮萬石鎮安永鎮縣郭鎮清水鎮李廣鎮思龍鎮東江鎮德勝鎮大曹鎮思農鎮北蘭鎮安化鎮普義鎮吉定鎮歸思鎮上保鎮金城鎮方村蒙村窮果兩江口􅄘門寨南源寨常安鎮龍平寨西嶺寨鎮峽寨白霞寨邉􅅾寨信都鄉沙田寨樊家寨白花洞口渠樂寨金城寨八尺鎮那樓寨横山寨南鄉南里鄉大宣鄉䭾演寨鵝頸鎮都名鎮丹陽鎮周冲大宣鄉靖寧鄉大黄江口北山懐逺鎮湘山渡頭副巡檢一百二人嘉靖初年設武定州知州一人田州吏目一人臨時岩馬甲大田子甲子甲陽院思郎累彩怕河武龍拱甲牀甲婪鳯下隆縣甲篆甲砦桑怕牙思㓜候周思恩白興龍定羅定安古零那馬下旺都陽巡檢二十八人土官改流知州二人飬利上石知縣二人崇善求康右𨽻吏部騐封廣西夷總叙廣西夷嶺南右偏土瘠民獷視東道特異諸夷窟穴盤繞其間左黔右鬰荔浦東西殘破不可言大藤峽險深尤甚成化中誅鋤極慘近復跨江倚山出没剽奪田寧梧孱諸竟卒不能扼刷桂林之北六峒爲孽則北連武岡柳慶之西八寨尚存則東道懐逺府江上下半爲夷巢㓂竊無虚日右江岑氏猛賊雖誅餘蘖尚在三盧再叛思田更强姚鏌勦則續兵守仁撫則納侮恐數年之間復煩經畧爾三江諸夷考三江諸夷其先盤瓠之裔今據廣西諸險其最驕驁者唐之西原宋之廣原今之田州大藤是也唐黄氏最彊與韋氏儂氏㓂據十餘州太和中經畧使董昌齡遣子蘭討平峒宂夷其種落宋時儂氏世爲廣原州首領後儂智高倡亂僭帝號宣撫使狄青討平之國朝成化間都御史韓雍討平侯大狗等嘉靖間新建伯撫田州破斷藤此其績之最著者也三江連亘千里半入猺夷而潯柳思田之地更爲盗藪昔孔性善請擇良吏嗚呼制蠻上䇿無踰此矣黎人考黎今儋崖瓊萬州隖土蠻也隖之中有黎母山諸蠻環居四旁號黎人内爲生黎外爲熟黎山極高在霧靄中夕晴海氛清廓黎人時見翠尖如浮空中然其山水分流四州熟黎分𨽻諸州耕作其地供稅役生黎所居絶逺外人不能跡不供稅役至於山巔雖生黎亦不能至在唐爲瓊管之地宋紹興中黎州王文滿連結西峒王承聞等攻破定南砦復犯省地廣西發兵焼燬巢穴生擒黎賊亂遂定乾道中屢招諭之生黎質直獷悍不服王化亦鮮出爲患熟黎貪狡兩廣福建之奸人亡命逃居其間每鼓煽生亂我朝廖永忠既平廣東海南儋萬黎夷未附後耿天壁擊平之邇來生黎爲之逋逃熟黎爲之鄉導歲爲州縣患不大創之四州生民無寧日也猺獞獠蠻諸夷種類考昔高辛氏有犬戎之㓂下令有能得犬戎呉將軍者以女配之閱三日槃瓠含呉首至槃瓠帝畜狗也不得已配以女入南山止石室中經三年生六男六女槃瓠死後因自相夫婦織續木皮染以草實爲衣服好五色裁制皆有尾形其母後歸以狀白帝於是始迎致諸子言語侏􅍣好登山壑不樂平曠帝順其意賜以名山廣澤其後種類滋蔓散處四方號曰蠻夷出後漢書其在廣西則有猺獞獠蠻之號曰猺者初静江之興安義寧古田營州之融水懐逺界皆有之生深山重溪中多姓槃氏椎髻跣足不供徭役種禾豆山芋雜以爲糧截竹筒而炊暇則獵取山獸以續食俗喜讐殺猜忌輕死又能忍饑行鬬履險若飛兒始能行焼鐵石烙其跟蹠使頑木不仁故能履棘茨根枿而不傷出虞衡志曰獞者慶逺南丹谿峒之人呼爲獞初未嘗至省地元至元間莫國麒獻圖納土命爲慶逺等處軍民安撫使自是獞人方入省地今貴之荔浦修仁永福最多在宜山邉境及思恩者近日編入版籍謂之熟獞性畧馴逺者謂之生獞梗化不可制服在忻城荔浦及天河南北西三鄉永順永定二長官司者尤爲兇狠曰獠者左右兩江谿峒之外俗謂之山獠依山林而居無酋長版籍以射生爲活一村中推有勇力者曰即火餘但稱火歲首以土杯十二貯水隨辰位布列火禱焉經夕集衆往觀若寅有水而卯涸則知正月雨而二月旱自以爲不差舊傳其類有飛頭鑿齒花靣赤裩之属凡二十一種出虞衡志今按飛頭鑿齒諸事陳剛中使交録亦嘗及之兹訪諸夷俱無其實姑存之以傳疑云曰蠻者有撫水蠻在宜州南康𨽻黔南其酋皆蒙姓以藥箭射生爲活取鳥獸盡即徙他處有西原蠻居廣容之南邕桂之西有寗氏者相承爲豪又有黄氏居黄澄洞其𨽻也有廣原蠻在邕州西南鬰江之源地峭絶深阻頗有邑居聚落出宋史今郡縣之外羈縻州峒多皆蠻地其南連邕州南江之外稍有稱名者羅殿自杞以國名羅在宜融之西邕州之西北唐㑹昌中封其帥爲王世襲爵焉出虞衡志之數種者名雖不同其類一也今種類日蕃而各郡皆有之惟左右兩江之地居多人物獷悍風俗荒恠大率畧同不可盡以中國教法䋲治其氣候熱多寒少瘴癘時有葢其居多依山故也然且有蠱毒之害焉議處猺獞夫狼兵亦猺獞也猺獞所在爲賊而狼兵死不敢爲賊者非狼兵之順而猺獞之逆其所措置之勢則然也狼兵地𨽻之土官而猺獞地𨽻之流官土官法嚴足以制狼兵流官勢輕不能制猺獞莫若割猺獞地分𨽻之旁近土官得古以夷治夷之䇿可使猺獞皆爲狼兵矣或慮土官勢大則益難制土官富貴已極自以如天之福勢不敢有他望又躭戀巢穴非能爲變即使爲變及其萌芽圖之易也且夫土官之能用其衆者倚國家之力也不然肘腋姻黨皆勍敵矣國家之力足以制土官土官之力足以制猺獞臂指之勢成則兩廣永無盗賊之患矣議革通夷之弊猺獞之性本自愚直其桀驁貪狡者百中之一耳未亂先治已發計擒夫亦何難惟有罪軍民脫逃厮僕亡匿其中唆引刼奪以報私憤無藉土人鄙惡商藝游息其中爲之謀畫以分貨利是以各賊出没不常横行無忌緝事之設本爲體探賊情一有軍機趣先走報撫安之設本爲招撫猺獞㓂賊生發返爲掩飾是以有所倚頼敢于弄兵及其罪惡貫盈勦伐必加掾房軍牢獲其常例往往露洩使先爲備狼兵進山受其私賄往往賣路縱其逃匿是以兵至則遁兵退復亂即今有事于地方先期拘集緝安撫土脚商藝禁于一室令其開報極惡村分若干亡命奸徒若干與夫地之險阻阨塞路之多少逺近或征或勦就以此輩爲之鄉導有功之日免其前罪有漏洩以軍法處治其文移往來尤貴宻速㒺俾掾牢得以先漏調兵發兵亦然勿令自兵得以賣路則通夷之弊庶㡬可革勦捕之功計日可成五屯要害按廣西五屯所居荔浦斷藤府江藤縣之中當斷藤峽右臂及白石寨十二磯濛江口之衝爲諸猺要道其間山泉佳秀樹木豐麗田沙衍沃足以裕其居而遏其患洪武間立所近増置城堡集獞兵以守之借其力以爲用亦一隅雄鎮也制馭大藤八寨諸巢議按粤西有曰大藤曰八寨曰連城曰六十三山曰七山等巢粤東有曰羅旁曰王母曰雲稍曰母鷄等巢往歲督府重臣因粤東羅旁諸巢爲地方害且數十年動衆數十萬一舉殱之兵威所振山谷爲空乃粤西之六十三山等處逼近羅旁畏威悔罪乞憐求生編里輸差盡從撫處一時東西兩山并稱寕靖説者謂當時收兵大早經畧事宜尚未萬全逃匿餘黨尚未捜捕乃不踰年舊日餘孽呼携濳出盤據舊巢刼掠水陸攻擾所域謂其藏匿者在六十三山等巢其紏合者爲六十三山等獞欲東西夾勦滅此朝食時西之糧餉稱乏八寨濵近之民又數數請兵撫勦莫所適從而東西用兵當有先後然一省所急者在八寨兩省所急者在夾勦故當時論者謂且置八寨而先六十三山等巢則各寨悔罪如其不悛乗餘威殱之易矣其兵糧之定處兩廣用兵調粤西之兵食粤東之糧玉石之當辯則又别論也湖廣土官湖廣都司領宣慰司二宣撫司四安撫司九長官司二十蠻夷長官司五永順保靖爲二宣慰施南散民忠建容美爲四宣撫東鄉五路忠孝忠路金峒龍潭大旺忠峒高羅桑植爲九安撫臘惹峒夌著黄峒驢遲峒施容施白厓峒思家峒五寨筸子坪摇抱峒上愛茶峒劔南木册鎮南崖椒山瑪瑙五峯石寳水盡源通㙮平石梁下峒臻剖六峒横坡峒等爲二十長官鎮逺隆奉西坪東流臘壁峒爲五蠻夷長官右𨽻兵部武選湖廣土官五南渭施溶上溪知州三石滑石江院塲坪巡檢二人右𨽻吏部騐封湖廣夷湖廣土官皆據湖南古巫黔中地中錯辰常外連川貴溪洞深險難撫易亂彭氏富强雄脅諸司自宋迨今構結滋廣驕横益堅國家稍有征誅輙議調發所過殘破慘於劇盗官司莫敢誰何嘉靖中王守仁討岑氏時湖臬僉事汪湊統馭嚴飭所過歛戢以故順靖之禍不獨㐮楚永保之憂豈直苖夷也湖廣蠻夷實無能爲但我軍姦黠之徒利其竊法可以邀功今但選精鋭常加隄防其患自息湖㐮田地高下不齊農家無所蓄積歛穫未竟徵歛一空求免饑寒不可得矣乞選方靣守令大加存恤公以格物亷以律已端本澄源在朝廷而已郴桂㓂與横水桶岡事畧同當時亦聲勢相倚此豈有深志逺圖特以封疆之臣因循姑息故得據險猖獗滋地方之蠧耳所幸秦金與王守仁同時舉事故諸賊不得相爲應援而表裏受兵又無所逃遁藪匿故得以草薙而禽獮之不然即韓盧之搏狡兎恐未能窮三窟之誅也大抵平山㓂與平中原流刼之㓂不同中原流刼之㓂無險固可憑無巢穴可據而勦之也當先摧其鋒鋭絶其糧餉所謂决機於兩陣之間將勇者勝也山㓂則不然進未可爲旦夕之患而退可以持歲月之久其克之也當先審於地利明於分合不可徒恃兵衆之彊所謂多筭者勝也又中原之㓂患不能克既克而絶之也易山㓂則王師一至歛衆深匿大衆甫還嘯聚如故葢克之易而絶之難也廣東之斷藤峽湖貴之蠟耳山江西南贑諸山峒天討屢加而釁蘖屢萌者非以其不能絶之故邪葢不但郴桂之患爲然也鎮溪叛苖二十董朶董其亞糯噉冷噉勒亞酉十八箭紅厓卜稍小米沙流板登茅岡下水彪山小船場盤朶龍亭得洞束那等塞草子坪叛苖二十七洞頭中畧留絞亞保谷恥大畧琴圖盤營回寨大塘爆木岩口盤那孟瘦大唐池已鳥牌小五圖惡黨古藏板栗冷水排那廖鐡鳥巢老萊岩洞等寨貴州叛苖二十七黒潭乾溪罵勞呂喎罵冲地所塘寨蜈蚣地演平頭地恨老條龍塘茍腦山忩栗凹治古麥地抱木老見且逞普杓田坪烏牌平茶麻洞木坪等寨五溪諸蠻五溪諸蠻其先槃瓠氏之裔今湖廣廣西溪峒中諸夷皆其種類即漢光武時馬援所征服者在北魏有冉氏田氏向氏陬落尤盛唐末五代時寇無寧日宋太祖得蠻人秦冉雄以為辰州刺史諸蠻懾服蠻之最大者曰彭氏世有溪州至南宋以章惇為經畧舒氏彭氏蘇氏楊氏相繼納土置沅州誠州後改誠州為靖州元雖置郡縣叛服不常國初命周德興討平五溪蠻正德間以都御史秦金討平郴桂土人龔福等嘉靖初有蜡爾山苖之亂又有筸子坪土官田興爵之亂命張岳討平之各夷多取湖南古巫黔中地即今之辰常靖施永順保靖等處是也鄖陽流賊荆襄流逋自元已然山深土沃嵌湖廣四川陜西之間劉千斤野王剛藍鄢老人廖麻子何淮喻思俸徐學楊文政李胡子小王洪等擾黷無寧時自撫治鄖陽之設寂然樂土流逋不特為避逃計實所以利之自終南一帶東至荆襄其地饒肥閒曠物産天然之利貧無育者亦合招安不得棄諸無用但恐雜以不逞之徒故日撫治其藩臬員日撫民盖善撫則無事矣䖍鎮事宜按圖考牒贑東南境葢界閩汀漳廣韶潮惠慶諸府地重巒複嶺巖峻巉絶綿歴盤紆奚啻千里其人皆依負險阻剛獷頑悍矧今所稱大㡌岑岡高沙下歴浰頭横江諸巢穴唇齒車輔脉絡貫通兵之用本不易加以財利詘乏拘攣牽制顧益難矣全頼皇靈震疊臺憲修明牧宰威懐本强内實則先聲屈折馴擾彈壓寖寖革心矣故標本緩急内外療治醫國者必致詳焉南安在西贑州在東贑州東南爲汀州汀州東南爲漳州贑州南爲惠界龍南縣山峒接惠州三浰寨安逺縣東過登頭嶺即汀州府武平縣安逺縣南過打鼓嶺皆惠州山峒南安縣二十五里過梅嶺爲南雄南安西過横水桶岡聶都山爲桂陽州軬人溪峒連接郴州桂陽州以都御史總轄有以也南贑盗賊其在南安之横水桶岡諸巢則接境於湖郴在贑州之浰頭岑崗諸巢則連界於閩廣接境於湖郴者賊衆而勢散恃山谿之險以爲固連界於閩廣者賊狡而勢聚結黨與之助以相援桶岡後山陡絶崖壁結構飛梯自此直入范陽大山延袤千里自來人跡所不能到賊若奔入此中截斷飛梯雖有十萬之衆亦無所施記三省夾勦横水桶岡江西南安府所属大庾南康上猶三縣各有賊巢聨絡盤據有衆數千西接湖廣桂陽等縣南接廣東韶州府樂昌等縣三省夾攻必須湖廣自桂陽桂東等處進廣東自樂昌縣進在南安者必須三縣地方並進贑州府所属惟龍南縣賊巢與廣東惠州府龍川縣浰頭接境浰頭係大賊池大鬢等巢冗有衆數千比之他賊勢尤猖獗前此二次來攻俱被漏網龍南雖有賊徒數夥除之稍易但其倚藉浰頭兵力以爲聲援攻之則奔入浰頭兵退則復出爲害必須廣東兵自龍川進贑州兵自龍南進庶可使無奔潰桶江横水左溪諸賊荼毒三省其患雖同而事勢各異以湖廣言之則桶江諸巢爲賊之咽喉而横水左溪諸巢爲之腹心以江西言之則横水左溪諸巢爲賊之腹心而桶岡諸巢爲之羽翼今不先去横水左溪腹心之患而欲與湖廣夾攻桶江進兵兩㓂之間腹背受敵勢必不利乃决意先攻横水左溪宻切分布哨道使都指揮某率兵千餘自南康縣所溪入知府某兵自上猶縣石人坑入知縣某兵自上猶縣白靣入令其皆㑹横水使守備某兵自大庾縣義安入知府某兵自大庾縣聶都入知縣某兵自大庾縣穩下入縣丞某兵自上猶縣金坑入令其皆㑹左溪知府某知縣某各兵齊集令其亦自上猶南康分入以遏奔衝親率兵千餘自南康進屯至坪期直𢷬横水以與諸軍㑹次第勦平諸巢各營官兵請乗勢進攻桶岡復議得桶岡天險四靣青壁萬仭中盤百餘里連峯參天深林絶谷不斷中所産早榖薯蕷之類足餉凶歲往者亦嘗夾攻坐困一月不能俘其一卒竟以招撫爲名而罷及詢訪鄉導其所由入惟鎻匙龍葫蘆洞茶坑十八磊新地五處然皆架棧梯壑攀緣絶壁而上賊使數人於崖巔坐發礧石可無執兵而禦我師惟上章一路稍平然深入湖廣迂囘取道半月始至湖兵既從彼入而我師復往事皆非便於是移屯近地休兵飬鋭振揚威聲先使人諭以禍福乗其猶豫襲而擊之遣縣丞某率數百人屯鎻匙龍促使出降而使知府某入茶坑知府某入西山界知府某入十八磊知縣某入葫蘆洞諸賊巢亦次第勦平兩月之間俘斬六千有奇破巢八十有四䖍鎮建置欽差巡撫南贑汀漳提督軍務都御史一駐贑州江西嶺北道兵備駐贑州廣東嶺東道駐長樂湖廣柳桂道駐柳州福建漳南道駐上元餘道駐各省守備五䖍鎮轄布政司四府九州一縣六十有五衛七屬所二十有二通共官六百一十四員軍二萬八千七百二十三名寨隘共二百五十六處䖍鎮總論按南贑汀漳等處惟贑當四省之交漳南象湖長富諸巢交于閩賊魁詹師富等據之其西横水左溪桶岡諸巢交于楚賊魁謝志珊藍廷鳯等據之其東南三浰九連諸巢交于粤賊魁池中容等據之不時四出刼掠爲患屢年三省撫臣往往相爲觀望急則議請夾勦每踰時兵始集集則賊已竄匿徒糜餉費爲居民患以此積至數十萬衆及王文成受命巡撫南贑躬率諸道進兵取上杭出其不意直搗象湖乗勝破長富及水行等四十餘巢漳南平十月成軍而出一鼓而破横水左溪再鼓而滅桶岡三浰賊猶悍黠擬官僭號聞各巢破懼而佯欵陰増機險穽毒以虞王師文成故休士歸農明年正月計擒其渠魁遂舉兵擊其衆又一鼓而破三浰再鼔而下九連其分合先後筭無遺策然其初兵乏第選民兵訓練而不征調狼逹土舎其餉第疏通鹽法處商税足而未始加賦編民已開縣治置巡司移郵驛經畧周而垂裕到今矣内夷總論按邊患之見于經者始于三苖今自巴蜀以東歴湖南北桂嶺雲貴數千里溪峝山箐之中曰犵曰狑曰獠曰猺曰獞之類凡十數種皆蠻也其間最輕㨗者曰苗即三苖之後也依山以居其性習不常無有倫紀禮義國初于湖北川東立宣慰司者五曰永順曰保靖曰貴州曰思州曰播州又有宣撫司安撫司及招討司長官司之設外此所謂軍民府及軍民指揮使司者又兼設土官以轄其夷人隨其地而設其官因其俗而爲之治善者授以職惡者分其勢是葢得有虞分北之義夏禹丕叙之意也制馭内夷總論明興平定四海凡夷獠蠻僰猺獞之地西起巴蜀牂牁東抵㐮楚北包絡湖嶺東折而南南盡海上又東跨百粤三江大者兼據連城細者保恃深箐雖稍奉約束要在羈縻而已然兵力稍健乍叛乍歸苟勤率過濫拊懐失策雄圖自縮狡窟益深况地廣官高擅利習兵生齒益繁財貨益充詐以謀成罪以功解種憂釀禍蔑玩中土未可謂無虞也嗟乎夏典要荒周官蕃鎮大抵因民順俗横海伏波逾湟絶嶺輿地漸開化理終塞乃知天德無私王道有量闢國陋於綏人曲防窘于曠度苟醜類自獲飽暖中華不患荼毒吾又何求焉惟夫吏好蓄積政多懈弛或逺嫌自潔或求勝喜功於是侵警日聞師徒數起網漏綱頽夷夏並困兹欲收總長策用圖久安必畫正疆理則鄰族靡争預陳嫡孽則宗庶自定世及之際以時覈聞錢榖之輸一切報罷而又飭武事於節帥修文德於廟堂傾側之憂斯其鮮矣圖書編卷四十九
