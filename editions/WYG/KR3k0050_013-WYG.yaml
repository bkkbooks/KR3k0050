body:
  text: 圖書編卷十三明章潢撰三禮總叙潛學稿曰曲禮古禮經篇名經先曲禮曲禮禮之本也禮天體也天體物不遺故物必有則自内心外貎思慮視聽飲食衣裳之有其節若語默進退取舍生死之有其介與凡親疎貴賤交際事使之有其體各品節之以立教盖􅄨不厭動不亂而㡬微畢察委旋時中也命之曰曲禮槩其目曰三千非實三千言微乎㣲耳盖徳性之精㣲中庸畢具而髙明廣大備焉時著時察之謂知隆此由此之謂行故致曲者知㣲也儀禮者先王訓齊天下之具經綸人義之大端也為之冠以重成人為之婚以合二姓為之鄉飲鄉射以教徳讓為之塈夕器服以哀死亡為之饋食饗奠以儐鬼神其親邦國之交秩上下之體又為聘覲焉以將之是儀法之大者譬天儀象乎則二十八舍以經天而治要在論官故周禮經官建冡宰之官以儀天建司徒之官以象地建宗伯春官以成仁建司馬夏官以成聖建司冦秋官以成義建司空冬官以幹事而六官三百六十屬上法乎天行盖周禮制而儀曲有官儀禮制而人義有紀曲禮制而人道有理三禮者周公明天道察民故以與人治之大順也仁者人也由禮則復於禮而仁全仁全而天全矣周衰禮廢迨春秋晉韓起適魯猶及見舊典禮經歎之曰吾乃今知周公之徳與周之所以王盖其感也孔子欲觀周道適周學禮焉歎之曰大哉聖人之道洋洋乎發育萬物峻極于天優優大哉禮儀三百威儀三千歎道盡於禮也又贊之曰郁郁乎文己夢寐志之世莫能遵明於是乎作春秋以維周禮如此至戰國諸侯惡其害己經用播絶自孟子未之及見斯亡久矣漢興河間獻王篤記古始博購得周禮五官而亡其冬官得考工記附經後備冬官之記髙堂生實始傳儀禮經僅十有七篇大小戴次曲禮僅上下二篇殘缺失次甚矣漢志曰帝王質文世有損益至周曲為之防事為之制故曰經禮三百威儀三千及周之衰諸侯將踰越法度惡其害己皆滅去其籍自孔子時而不具至秦大壞漢興髙堂生傳博士禮十七篇韓愈曰嘗苦儀禮難讀又其行之于今者盖寡沿襲不同復之無由考于今誠無所用之然文王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度耶真徳秀曰韓子可謂好古矣然以于今無所用則亦考之未詳也朱熹曰儀禮禮之本根而禮記乃其枝葉又曰儀禮經也禮記傳也朱熹子嘗跋其書曰儀禮之為今書也於竒詞奥㫖中有精義妙道焉於纎悉曲折中有明辯等級焉不惟欲人之善其生且欲人之善其死不惟致嚴于冠婚鄉射朝聘而尤嚴于喪祭後世徒以其推士禮而達之天子以為殘缺不可考之書徐而觀之一士也天子之士與諸侯之士不同上大夫與下大夫不同等而上之固可得而推矣按古禮之傳於世也有三儀禮禮記周禮也然儀禮止有士大夫禮而無天子禮必合彼二禮與他書有及于禮者然後成全禮焉朱子自輯家鄉邦國王朝禮其餘喪祭二禮以付其門人黄幹楊復僅以成書名曰經傳通解後之言禮者不至棄經而任傳違本而逐末而欲復古禮尚有攷于斯書以上論儀禮文中子曰先師孔子以王道立極是也如有用我則執此以往又曰吾視千載已上聖人在上者未有若周公焉其道則一而經制大備後之為政有所持循按周禮一書後世假而用之者王莽也輕而用之者蘇綽也誤而用之者王安石也未有能善用之者竊恐時異勢殊官政事體民情土俗不皆如古惟宜精擇其切要者而審行之必執其書而一按其制其流之弊安知不與三子同歸乎唐太宗曰周禮真聖作也首篇云惟王建國辨方正位體國經野設官分職以為民極誠哉言乎不井田不封建不肉刑而欲行周公之道不可得也唐書曰周禮者周公致太平之書先聖極由衷之典法天地而行教化辨方位而叙人倫其義可以幽贊神明其文可以經緯邦國備物致用其可忽乎程頤曰必有闗雎麟趾之意然後可以行周官之法度張載曰周禮是的當之書然其間必有末世増入者如盟詛之類必非周公之意朱熹曰周禮乃周家盛時聖賢制作之書又曰周禮一書周公立下許多條貫皆是從廣大心中流出又曰周官徧布精密乃周公運用天理爛熟之書又曰比閭族黨之法正周公建大平之基本如棊盤擺布定後棊子方有放處此書大綱是要人主正心修身齊家治國平天下使天下之民無不被其澤又推而至於鳥獸草木無一不得其所不如是不足謂之裁成輔相參贊天地又告其君曰周禮天官冡宰一篇乃周公輔導成王垂法後世用意最深切處欲三代人主正心誠意之學於此考之可見其實范祖禹曰天地有四時百官有六職天下萬事盡備於此如網之在綱裘之挈領雖百世不可易也人君如欲稽古以正名茍舎周官未見其可吕祖謙曰朝不混市野不踰國人不侵官后不敢以干天子之權諸侯不敢以僭天子之制公卿大夫不牟商賈之利九卿九牧相屬而聽命于三公彼皆民上也而尺寸法度不敢踰一毫分守不敢易所以習民于尊卑等差階級之中消其偪上無等之心而寓其道徳之意是以民服事其上而下無覬覦賤不亢貴卑不踰尊舉一世之人皆安於法度分守之内志慮不易視聽純一易直淳龎而從上之令父詔其子兄授其弟長率其屬何往而非五禮六樂三物十二教哉方位國野設官分職何往而非以為民極哉嘗讀晉國國語每嘆絳之冨商韋藩木楗過朝之事以為冨商之饒于財使之澤其車而華其服非不足也而必易車服于過朝之際不敢與士大夫混然無别焉民志之定而中道之存成王周公之遺化固隠然在此也按周禮一書或以為周公作或以為非或謂文王治岐之制或謂成周理財之書或謂戰國隂謀之書何休或謂漢儒附㑹之説或謂末世凟亂不經之書林存孝或作七論七難以排之朱熹曰後人皆以周禮非聖人書其間細碎處雖可疑其大體非聖人做不得又曰謂是周公親筆做成固不可然大綱却是周公意思由是觀之是非明矣古人有言周禮一書有闕文軍司馬之類有省文遂人匠人之類有互見九等品舉之類有兼官公孤不備數教官無府史胥徒有豫設凡千里封公四封侯八百十一之類有不常置夏采方相氏之類有舉其綱者四兩為卒之類有副相副貳者自卿至下士各隨才髙下同治此事有常行者垂象法衛之類有不常行者合民訽國遷之類今觀諸經其措置規模不徒於弼亮天地和洽神人而盟詛讐仇凡所以待衰世者無不備也不徒以檢柅君身防絶禍患而米鹽絲枲凡所以任賤役者無不及也使之維持一世則一世之人安維持百世則百世之人安維持千萬世則千萬世之人安貽謀燕翼後世豈無辟王皆頼前哲以免則周公之用心也所謂兼三王監二代盡在於是是書之作于周公與他經不類禮記就于漢儒則王制所謂朝聘為文襄時事月令所説官名為戰國時事曽未若周公禮之純乎周典也由此觀之則後儒疑周禮細碎者可以灑然矣呉澂曰周公相成王建六官分六職即其設位言之則曰周官即其制作言之則曰周禮周衰諸侯惡其害己滅去其籍秦孝公用商鞅正與周官背馳始皇又惡而焚之漢河間獻王好古學購得周官五篇武帝求遺書得之蔵于秘府哀帝時劉歆校理秘書始著于録畧然冬官已亡以考工記補之而五官亦復錯雜傳至于今莫敢是正今本尚書以考之周官一篇成王董正治官之全書也執此以考周禮之六官則不全者可坐而判也夫冡宰掌邦治統百官均四海執此以考天官之文則其所載非統百官均四海之事可以知其非冡宰之職也司徒掌邦教敷五典擾兆民執此以考地官之文則其所載非敷五典擾兆民之事可以知其非司徒之職也宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國執此以考春夏二官則掌邦禮邦政者皆其職也舍此則非其職司冦掌邦禁詰奸慝刑暴亂司空掌邦土居四民時地利執此以考秋冬二官則凡掌邦禁邦土者皆其職也舍此則非其職是故天官之文有雜在他官者如内史司士之類亦有他官之文雜在天官者如甸師世婦之類地官之文有雜在他官者如太司樂諸子之類亦有他官之文雜在地官者如閭師柞氏之類春官之文有雜在他官者如封人大小行人之類亦有他官之文雜在春官者如御史大小胥之類夏官之文有雜在他官者如銜枚氏司𨽻之類亦有他官之文雜在夏官者如職方氏弁師之類至如掌祭之類吾知其為秋官之文縣師㕓人之類吾知其為冬官之文縁文尋意以考之參諸經籍以證之何疑之有周禮有官聮以㑹官治不冝如此之區分按劉歆以考工記補冬官未始有異議者宋淳熈中俞廷椿始著復古篇謂司空篇實出於五官之屬且因司空之復而六官之譌誤亦可以類考嘉熈間王次㸃復作周官補遺元泰定中丘葵又參訂二家之説以為成書吳澂作三禮考註且謂冬官未嘗亡而地官之文實亡由是以觀則冬官實未嘗亡所亡者冬官首章爾以上論周禮程頥曰禮記雜出於漢儒然其間傳聖門緒餘及格言甚多如樂記學記之類無可議者檀弓表記之類亦甚有至理惟知言者擇之如王制禮運禮器亦多傳古意又曰禮記除中庸大學惟樂記為最近道表記其亦近道乎其言正朱熹曰禮記要兼儀禮讀如冠禮喪禮鄉飲酒禮之類皆載其事禮記只發明其理讀禮記而不讀儀禮則許多禮俱無安着處又曰或謂禮記乃漢儒説話恐不然漢儒最純者莫如董仲舒仲舒之文最純者莫如三策何曽有禮記中説話来如樂記所謂天髙地下六句仲舒安能到此必是古來傳流得此文字如此呉澂曰漢興得先儒所記禮書二百餘篇大戴氏删為八十五小戴氏又損益為四十六曲禮檀弓雜記分為上下馬氏増以月令明堂位樂記鄭氏從而為註總四十九篇秦火之餘區區掇拾存十一於千百雖不能以皆醇然先王之遺制聖賢之格言往往頼之而存周行己曰聖人制為冠婚喪祭朝聘鄉射之禮以行君臣父子兄弟夫婦朋友之義其形而下者見於飲食器服之用其形而上者極於無聲無臭之微衆人勉之賢人行之聖人由之故所以行其身與其家與其國與其天下者禮治則治禮亂則亂禮存則存禮亡則亡按禮記一書當以禮為主而分四科以類考之先儒謂四科禮也儀也樂也制度也以此四科讀此四十九篇思過半矣以上論禮記禮也者理也理也者性也性也者命也維天之命於穆不已而其在於人也謂之性其粲然而條理也謂之禮其純然而粹善也謂之仁其截然而裁制也謂之義其昭然而明覺也謂之知其渾然於其性也則理一而已矣故仁也者禮之體也義也者禮之宜也知也者禮之通也經禮三百曲禮三千無一而非仁也無一而非性也天叙天秩聖人何容心焉蓋無一而非命也故克己復禮則謂之仁窮理盡性以至於命盡性則動容周旋中禮矣後之言禮者吾惑焉紛紜器數之争而牽制刑名之末窮年矻矻弊精於祝史之糟粕而忘其所謂經綸天下之大經立天下之大本者禮云禮云玉帛云乎哉人之不仁也如禮何哉故老莊之徒外體以言性而謂禮為道徳之衰仁義之失既以墮於空虚漭蕩而世儒之説復外性以求禮遂謂禮止於器制度數之間而議擬倣像於影響形跡以為天下之禮盡在是矣故凡先王之禮烟蒙灰散而卒以煨燼於天下要亦未可專委罪於秦火者僭不自度嘗欲取禮記之所載掲其大經大本而疏其條理節目庶㡬器道本末之一致又懼其徳之弗任而時亦有所未及也間嘗為之説曰禮之於節文也猶規矩之於方圓也非方圓無以見規矩之用非節文則亦無從而睹所謂禮矣然方圓者規矩之所出而不可遂以方圓為規矩故執規矩以為方圓則方圓不可勝用舎規矩以為方圓而遂以方圓為規矩則規矩之用息矣故規矩者無一定之方圓而方圓者有一定之規矩此學禮之要盛徳者之所以動容周旋而中也宋儒朱仲晦氏慨禮經之蕪亂嘗欲考正而刪定之以儀禮為之經禮記為之傳而其志竟亦弗就其後呉幼清氏因而為纂言亦不數數於朱説而於先後輕重之間固已多所發明二子之見其條規指畫則既出於漢儒矣其所謂觀其㑹通以行其典禮之原則尚恨吾生之晚而未及與聞之也雖然後聖而有作則無所容言矣後聖而未有作也則如纂言者固學禮者之箕裘筌蹄而可以少之乎禮者理也即吾心之天理也吾人莫不受天地之中以有生而威儀定命孰能一日越斯禮哉論禮者必究其禮之原則周禮儀禮禮記可得而言之矣先儒謂周禮其綱也盖亦有見於六官之制辨方正位體國經野故謂之為綱耳又以冠禮婚禮士相見禮鄉飲酒禮鄉射禮大射禮備載於儀禮而禮記則有冠義婚義士相見義鄉飲酒義鄉射義大射義等篇故謂儀禮為經禮記為傳但論禮不失其原則不特六官之屬疑其各有所雜封建之制與王制殊雖各自一書言之或疑其為治岐理財隂謀附㑹之書或疑喪服皆講師問答語或疑曲禮作於曲臺月令記於吕不韋其中多漢儒所雜今且無論已然禮原於天而具之人心無古今無貴賤一也三禮雖同出於聖人而周禮詳六官之統屬儀禮嚴一朝之制度故各有司存惟禮記一書自曲禮而下多述古禮之遺與夫變禮之由大而朝聘享祀微而周旋曲折養生送死交神接人莫不由自然之品節焉自生民以来君君臣臣父父子子得以順其此心之條理節文而不淪於禽獸者頼有此理以匡正之耳或諸篇各有所指然聖賢相與發明斯禮之大本大原以承天道以治人情而一歸諸大中至正之矩乃禮記之所以立教也信哉禮記為經與五經並列而不可以綱目經傳分也明矣况禮莫大乎倫雖官制儀節皆所以品節乎五倫而人性自然之條理所以恭敬撙節退讓者一皆其性情不容自已者也善乎臯陶篇曰天叙有典勅我五典有敦哉天秩有禮自我五禮有庸哉自天子至庶人同此五典也其不同者五禮之等殺耳可見五禮之庸也雖至於經禮三百曲禮三千而要不出於五倫之外凡五服五章五刑五用皆此禮也皆所以敦此典也然典曰天叙禮曰天秩其等殺不齊豈作而致其情哉天理之節文人心所自有者也本吾心之天則而聲為律身為度周旋折旋率履不越由是行之君臣父子之間夫婦長幼朋友之際秩然各得其禮自其宏綱大要名之為經禮自其纎悉備具名之為曲禮自朝廷頒之即為萬邦之紀綱法度自一人行之即為一家之規矩凖繩雖尊卑上下進退升降以至朝聘祭享車旗服色之繁而其秩然不亂者一皆揆之天理而安即之人心而順所以謂之為天秩也晏子對齊侯亦曰禮之可以為國也久矣與天地並君命臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也誠哉是言也足以發明曲禮諸篇之㫖也若夫吉凶軍賓嘉則皆以此時措之耳是禮也匪特斯人為然試觀之乾坤定位卑髙以陳其間如日月星辰之布列山川土石之奠載飛潛動植之羣分類聚莫不有條理也此猶有形可覩有迹可觀者也晝夜寒暑之往來剛柔燥濕之消長孕鬻化生之乗除皆並育並行不害不悖孰主張是孰綱維是而天秩可默㑹矣本天秩以明禮則三禮中或雜或缺或為漢儒所錯亂者如尺度權衡孰得而淆之此所以論禮貴識其原而禮記不可以傳言也否則或逞己見或執舊聞徒致詳於儀文度數之末品物器用之微解名義定規制遂以為禮在是不知見禮知政與天地同節者果安在也是故求禮者無求禮於書而求諸吾心之天則渾然大中之道已在乎我雖至敬無文而繁文縟節實自此出也彼三禮所載皆吾心已試之節文而先王制禮不敢過不敢不及者不在兹乎然非謂制度文章可盡廢而不講也禮無本不立無文不行欲人反諸身心以達之五倫而求其所謂禮之本故于禮記尤有所當潛神者耳不然制度文為自漢儒以來議之亦詳矣孔子何以欲從先進而大林放之問讀古人之書者須識古人之心焉而後書中之精藴庶㡬可默㑹也然古人之書傳之已久不無錯亂殘闕欲見其全已不可得矣又徒執其儀文品節從而信之疑之亦末矣豈善讀古人之書者哉果能㑹其心師其意而不泥其文與迹雖謂儀禮至今存可也古者述朝饗聘祭之儀車旗服飾之制謂之儀禮亦先王經世之遺典也自秦焚禁以來至武帝表章六經此書尚未出况馬鄭叙述周禮而不及儀禮劉歆叙述儀文而不及儀禮喪服終篇無天子諸侯之文可見在漢時已不免殘闕錯亂非全經也明矣至宋又禁之不列學宫今欲求全經於千百年之下也難矣哉然韓愈嘗苦儀禮難讀以為文王周公之法制粗在於是班固藝文志以魯髙堂生所傳博士禮十七篇其篇數與儀禮同則此書固非全經亦必古人之所遺也所以信儀禮者則曰儀禮經也禮記傳也故儀禮有冠禮有昏禮禮記則有冠義昏義儀禮有士相見禮有鄉飲酒禮禮記則有士相見義鄉飲酒義儀禮有鄉射禮有大射禮禮記則有鄉射義大射義儀禮有燕禮有聘禮禮記則有燕義聘義禮必有義義以釋禮縁文義以考之禮記特儀禮之傳耳人知信傳而不知信經焉何歟然宋樂史謂儀禮有可疑者五豈無見而然哉以漢儒傳授曲臺雜記後馬融鄭衆始傳周官而儀禮未嘗以為教授一疑也周禮缺冬官求之千金不可得使有儀禮全書諸儒不獻之朝乎班固七畧劉歆九種並不著儀禮魏晉梁陳之間是書始行二疑也聘禮篇所記賓行饔餼之物禾米芻薪之數籩豆簠簋之實鉶壺鼎甕之列考之周官掌客之説不同三疑也其中喪服一篇盖講師設問難以相解釋之辭非周公書四疑也周官所載自王以下至公侯伯子男皆有其禮而儀禮所謂公食大夫禮及燕禮皆公與卿大夫之事不及於王其他篇所言曰主人曰賓而已似侯國之書使周公當大平時豈不設天子之禮五疑也今考其書猶有可疑者在焉吉凶軍賓嘉皆有禮也而軍禮獨闕自天子至士皆有冠禮而大夫獨無鄉飲酒禮有黨正以正齒位而今獨不載焉賓禮之别有八燕禮之别有四皆冠以士夫射之禮獨名曰儀朝遇之禮不録而獨存覲禮其他禮食不載而獨有公食大夫禮謂是書無殘闕雜亂也可乎哉但古之全經不可見而人心天理之品節猶之古也彼信之者止信其儀文必出自古人耳果自信於心而真知其為天秩之禮乎疑之者亦疑其非古之全禮云耳果反之吾心而真見其天則之相悖乎盖經雖不全亦頼漢晉諸儒補緝之力猶及見古禮之遺所以朱子與草廬呉氏惓惓於是書也我朝禮儀定式大明集禮是即今之儀禮也考禮儀者考之國典及文公家禮而用之於今焉則雖謂儀禮至今存也非謾語矣噫真㑹古人之心師古人之意則儀尚不足以盡禮也况於儀禮之遺經哉讀禮記叙嘗聞禮記非全經亦非醇乎經也壯年細心誦繹漸通大意盖古先聖王承天道治人情典制經曲雖不復覩其全然亦未嘗不因記載而獲覩其緒餘焉雖多雜於漢儒之補綴而聖賢之邃言奥㫖炳然如赤日行空豈皭火能淆其明哉或曰禮樂不可斯須離缺者補之雜者剔之不亦頼於後之人乎曰禮樂通乎造化作述頼乎聖明未易言也近於四十九篇各因其類以相屬分為八欵庶誦習者易為力耳若夫訂證遺經則自有精通禮樂者在禮記大㫖嘗玩易繫天尊地卑乾坤定矣卑髙以陳貴賤位矣此禮之所自來而先聖法天以制禮乎故臯陶謂五禮為天秩中庸謂親親尊賢之等殺禮所生也孔子所定禮樂莫可考矣世傳三禮如禮記一書得非古禮之遺乎當夏商之衰孔子尚嘆杞宋之文獻不足徴矣今於千百年後猶得見古人之遺禮亦何幸也想漢庭經師轉相與撰次所聞故髙堂生后蒼輩記述秦灰之後獲存什一於千百皆不可知然其初積二百餘篇至大戴刪為八十五篇小戴復刪為四十九篇今頼其傳述得以好古而敏求焉然其撰述於髙后者文辭意義果無所増損二戴所刪定果一無闕失錯雜乎但記者融滯淺深弗齊而純疵自不可掩然精義良法淵源所自要皆古先聖賢之緒餘決非漢儒所能創始以肇後世之宗也善學者得先聖遺意於掇拾煨燼之餘而此心無體之禮得徵之古禮以定凖則間有龎辭贅語畧之可矣禮一也周禮儀禮禮記既各一其編集則其作述志意各有攸當何必以經傳綱目分屬之也矧禮記自有綱目存焉析之雖三百三千不足盡其詳總之只一理而已矣何也天則藴之徳性典則著之訓謨統同之中固有散殊者在而散殊之内未嘗無統一者寓也予嘗病其篇章浩博未易㑹歸因各以其類别之為八曲禮内則少儀玉藻一也哀公問燕居閒居檀弓曽子問二也禮運禮器大傳緇衣表記坊記三也樂記四也冠義昏義鄉飲酒義射義聘義投壺五也喪大記喪小記服問間傳三年問問喪奔喪服四制雜記六也祭法祭義祭統郊特牲七也王制月令學記文王世子明堂位經解儒行深衣八也盖亦取其意義相近者統歸一類不特便於誦習檢閲而先聖制作本㫖亦易以領㑹且俾學者精神併歸一欵不至渙散已爾若夫原次篇目曷敢紊亂之哉禮猶體也體不備君子謂之不成人曲禮篇先儒取以冠禮記者豈徒記古人之虚文哉盖曲禮三千其體備於一身者委曲詳悉不如此不足以曲盡其必至之情也夫人徳性中森然天則畢具如心神之思慮經緯百端如耳目口體之視聽言動親疎貴賤之交際事使天人幽明之對越駿奔以及衣服飲食升降進退大而死生常變小而灑掃應對至纎至悉至廣至􅄨皆出乎天理人情之自然也只舉動稍越乎禮而曲折之未當則耳目無所加手足無所措赧然不可以為人矣何也此心自亂其天然之條理而行道間當其回旋轉折稍不循其塗轍則一步不可行也然致曲者豈徒取諸周身之儀度而安排布置於其間哉篇首曰無不敬儼若思安定辭安民哉此禮之所以自然曲盡而散殊中自有統同者在况以此求之四十九篇何一而匪一敬之曲成哉内則記閨門之軌範即曲禮行於家庭之間也少儀記小學之支流餘裔即曲禮行於儀節之小也玉藻記天子諸侯之服冕笏珮諸制即曲禮行於朝宁之表也故三篇統屬曲禮一類皆人身随時隨處所以曲致其自然之敬也人見曲禮若此乎嚴肅未免謂聖人有意以歛束乎天下之身心不知先聖亦因人心之敬有不容自已者故著之章程為萬世法耳學者誦習此類而有得焉不特古禮儀文節度一一可循即由此心之無不敬以發見於四體周旋折旋中規中矩自然與天則脗合詎止肌膚有㑹筋骸有束己哉人受天地之中以生以為動作禮儀威儀之則所謂命也即所謂禮也在天謂之天則在物謂之物則聖人承天道治人情不過乎物則而已雖禮之曲折千變萬化與時皆宜孰知物則自有不可過者在乎觀哀公問大禮如何又問人道誰為大故孔子曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大即首篇無不敬之意也中間雖由大昏以及仁人孝子不過乎事親如事天事天如事親而禮於是乎至矣燕居記孔子以禮教子張子貢子游然禮所以制中而禮有九大饗有四未易言也閒居記孔子以禮教子夏然必達禮樂之原以致五至而行三無未易窺也檀弓記大禮之曲而中也曽子問記夫禮之變而通也夫孔子雅言不越執禮而百王典禮頼以折衷此類六篇皆孔門問答之語其中㣲辭奥義淵乎莫測約言之不過乎物則焉耳茍學匪物格知至則不能神明其本原洞晰其變化拘拘乎儀節之末欲動容周旋中禮也難矣哉禮原於太一合天地四時隂陽日月五行萬物而渾乎一體惟人者天地之心鬼神之㑹萬物之所體也但本諸矢者謂之運備諸人者謂之器雖云道本運而無所積器則滯而有所拘然天道其運乎人道其器乎運非精器非粗天人合一器即運之有體者是也禮運記帝王禮樂之因革及隂陽造化之流通于以原夫禮之所由起禮器記學禮者成徳器之美行禮者明用器之制而一器二義不可泥也大傳言人道有三無非記祖宗人親之大義緇衣記在上之人為下民之則傚表記記君子之徳有表儀之著見坊記則謂禮禁亂之所由生猶坊止水之所自來盖取以禮坊民之義也此六篇大約統論天地帝王以及人之所以體備乎禮者謂非曲禮之大原哉學禮者必器以乗運而究竟乎人道之大始斯可以繫民好樹民表而禮之大坊于茲乎定矣隂陽之氣充塞乎天地和敬之徳貫徹乎人心宣之為聲樂其天地人之聲教乎凝之為象禮其天地人之象教乎然非禮自禮樂自樂也人心之和暢發之為徳音而樂之肅肅清明即禮也人心之莊敬發之為徳容而禮之雍雍温柔即樂也何也一隂一陽之謂道天地之隂陽不能離孰謂禮樂之可離哉樂記具載禮記中正禮樂不相離之意也但詳玩樂記自由人心生以至手舞足蹈不過樂聲樂舞音容節奏已爾其於聲氣之元制器之法俱未之及焉然於禮樂相須同節同和主盈主減諄諄乎皆古先聖人之遺意且謂人生而静天之性也樂主反情以歸性而精義具存文亦醇雅不雜惟於此潛神默㑹真識夫隂陽禮樂通一無間則聲律身度凡五音六律自合乎天地之中和庶古樂之全經在吾心矣于樂制乎何有先聖制禮各有義存焉然其數可陳其義難知茍徒習熟其儀文度數而不達其義則亦不過宗祝有司之事爾已是故冠者禮之始也聖王重冠所以明成人之道也昏禮者禮之本也將合二姓之好上以事宗廟下以繼後世也鄉飲酒禮明君子之相接尊讓潔敬所以使民知尊長養老以成教也射必行鄉飲酒之禮所以明長幼之序而各射己之鵠各繹己之志也燕禮者所以明君臣之義而旅行獻酬皆有差等不敢紊也聘禮所以明貴賤而聮邦交也投壺則又其射之細者耳此類以義名篇其禮文制度咸載諸儀禮兹各陳其義以釋之雖謂儀禮為經義為傳亦可矣惟射於儀禮不相涉然射侯者射為諸侯也此果射之義乎若鄭氏釋昏義以夫人嬪世婦御妻悉歸之後宫而為天子之昏且為之分夕誣經甚矣學禮者其慎辨諸子之於親無所不用其至孟子謂養生不足以當大事惟送死可以當大事故必誠必信凡棺槨衣衾之設擗踊哭泣之節親踈冠服之等皆喪禮當慎重者故周官以喪禮哀死亡也喪大記記曲禮行於大喪喪服小記固記喪事之小然釋喪服傳也喪服問記始喪及喪服之制間傳記喪服輕重之宜三年問記喪必三年之義問喪記悲哀歛袒免杖之節奔喪記在外聞喪而奔之禮喪服四制記喪服之制必有仁義禮智四者而後可以當送終之大事雜記雖以記喪為主然兼言三患五恥觀蜡取盜之事故謂之雜也要之此類十篇悉喪中之曲禮也夫聖人制禮文必稱情一本乎哀慟迫切之衷而為之品節云爾惟讀其文繹其義始見作者之意皆人子真情不容自已者其如行不著習不察何哉周禮大宗伯專職理幽故祭祀之典教著十倫禮重五經至云惟聖人為能饗帝惟孝子為能饗親祭典豈易言哉祭法記祭祀之法也凡禘郊祖宗廟祧壇墠靡不具列祭義記祭祀之義也凡疏數敬怠反始報魄靡不詳明雖法見於外義存於中而有其法必有其義故相次以名篇祭統記祭祀之本有法有義統之則本於心故曰外則盡物内則盡志此祭之心也郊特牲雖記祭天之禮而雜冠與昏當各以類附但即郊禮之雜他篇雜可例推矣郊社宗廟三才之道也非識天地之心洞性命之理欲饗帝饗親以接三才之奥也難矣惟於此類研窮古人記禮之精藴不徒舉其法且析其意㑹其統則不待對越在天而其心常若與神明交幽明感通理之必然矣易曰嘉㑹以合禮又曰觀其㑹通以行其典禮豈儀節云乎哉凡帝王之創設天地之時令學制經解何一非禮何一而非吾之所當㑹通者彼王制雖記於漢太常博士弟子未必盡合乎王者之制而歴代法制亦頼以流傳月令雖記於秦吕不韋未必真合乎古明堂之法而十二月所行之政令亦藉以記載學記雖無當於大學然古者建學造士之軌範亦得有所據文王世子雖中雜周公踐祚之語而文武為世子與周公教世子皆至教所在明堂位雖適以彰魯國之僭而君臣上下尊卑前後各有定位亦因以存焉經解中云霸王之器恐非孔子所道而六經之教實分别不爽儒行其條十有五㫖意重複必非孔子之言而古儒之重行是或一道也若深衣則純記其制焉此類八篇篇各一義果有志典禮須博識兼收萃衆美而觀㑹通焉古禮庶㡬其可以復矣問孔子謂人之生也直又謂斯民也三代直道而行者也孟子謂直養而無害且易云直方大書云寅直清詩云其直如矢均之乎以直為尚也禮獨有取於曲焉何哉曰子獨不聞直而無禮則絞乎彼子為父隠父為子隠曲亦甚矣孔子何為謂直在其中也真信得父子相隠直在其中則曲禮不待辨矣譬之梓匠輪輿必以規矩成其方圓然規無圓之形也茍為不曲安能成其圓乎矩無方之形也苟為不曲安能成其方乎子無局於方圓之器惟執規矩以運明巧斯曲成萬物而不遺矣問凡學禮記者莫不病其紕繆龎雜之太多也子析其類得不思以祛其雜歟曰他書之闕誤難識禮記之錯雜易知矧人皆知之矣何必決去之為快耶想秦法大嚴漢惠始弛其禁文景時諸儒尚只以口耳相為授受難必字句之不訛也然各篇匪出一人雖本聖人之意實皆漢儒之文見有淺深故理有通塞筆有工拙故辭有純疵况敷衍波瀾太多未免華而失實可盡律以聖門之記述哉雖然聖經久湮蝌蚪殘缺得似經者皆經也况其傳流各有自來也但師門各守章句或古禮中雜以時制而莫之察或古文㕘以今文而莫之辨傳久失真豈一朝一夕之故哉二戴雖明禮然匪深於聖人之學者或刪述間雜以己意亦不可知愚謂篇章皆漢儒之組織禮制必先聖之流傳依今文求古禮得意忘言何必訛舛之盡祛而後深於禮哉曲禮至哉禮之曲也人肌膚有㑹筋骸有束耳目手足以視聴行持有則也由衣服飲食由執事居處畢有軌有物也猗其曲也以有至也猗其至也以能曲也故不曲不足以為禮非禮而曲君子謂之辟若諂不謂曲也是故奉之當心也天子上之矣國君取其衡大夫綏之矣乃士則當帶而提何曲也性之直者靡然矣君之與尸也接武耳大夫繼武矣士間一武曰中武無徐趨皆然謂必接武也繼也中也其則也何其曲也性之直者靡然矣其疾趨欲發成其為趨也而手足無移以不失其莊圏豕行不舉足成其為圏豕也而齊如流襜如以不失其齊端行頥霤如矢直也乃弁行屨剡剡起矣執圭玉則舉前曳踵蹜如也諸布武有則也一何曲也性之直者靡然矣古席地而坐奉席如橋衡平也設席有鄉順隂陽乃其間函丈也若盡後也盡前也如有則不得過何曲也盖奉席一天授坐而坐以為恭也乃授立受立而坐勤之矣故立受立也不坐何曲也性之直之者靡然矣飲食之有祭也敬讓道也其飲之食之也欲其飲食之也乃客祭主人顧興辭曰疏食不足祭其飱興辭曰飱食不足為飱也何曲也品食有水土之品焉豈必備嘗不質問其嘗否曰子亟食於某乎嫌億其未嘗也道術有六官之分豈必兼通不質問其能否曰子習於某乎善於某乎嫌億其未學也何曲也性之直者靡然矣故曰一之於性情則兩失之矣一之於禮義則兩得之矣此之謂也禮義者性情之極也夫禮之有曲也由物之有則也引類而申之衆動交於身而動於前何非則也其曲何可得爽也畢公之命曰惟公懋徳克勤小物彼以小物為無當而忽之者窮大而失其歸者也惟毋不敬乃見天則曲禮禮也者所以約束人之身心使一循乎天理中正之則者也無本不立無文不行一敬焉盡之矣禮記四十九篇雖其中多孔門師弟問答語要皆古禮之遺或亦不免為漢儒雜亂而其不可易者自有在也然必首曲禮二篇豈無謂哉曲禮之為教也凡升降進退食息起居應對唯諾至纎至悉莫不有一定之規矩存焉自天子至庶人自幼學至期頥未有一人能越斯禮亦未有一息能越乎斯禮者也故曰道徳仁義非禮不成教訓正俗非禮不備分争辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊是以君子恭敬撙節退讓以明禮甚矣禮之切於人也後之人猶以此為儀文度數之末節何哉盍思人之所以為人自吾心之念慮以達諸一身隨所應接各有條理三千三百夫固天然自有之等殺也所以謂禮猶體也體不備君子謂之不成人詩曰相鼠有體人而無禮人而無禮胡不遄死極言人不可無禮也且學者習斯禮亦各不齊有見於禮可固人肌膚之㑹筋骸之束則謂致禮治躬檢束不可不嚴不免矯强拘迫之勞有見於至禮不讓至敬無文則謂禮以制心儀節非其所尚不免乎疏畧簡亢箕踞跛倚之病是皆不知正心修身直内方外其禮本一致也觀孔子嘗謂恭而無禮則勞慎而無禮則葸勇而無禮則亂直而無禮則絞是禮本自然而勞葸亂絞則非禮矣又謂非禮勿視非禮勿聽非禮勿言非禮勿動即四勿字其所以克己復禮何嘗無勉然之功哉况禮謂之復于以復還吾性之所固有匪由外鑠我者知此斯可與語禮也斯可與語禮記之全經也説者又謂孔子大林放之問以知本也曲禮謂非禮文不可而曲則儀節煩矣不知曲禮正儉戚之意也所以首云毋不敬儼若思安定辭安民哉孰謂敬非禮之本哉惟毋不敬則穆穆緝熈翼翼昭事而儼若思安定辭其模冩居敬様子可謂最親切矣凡修己安人安百姓一以貫之而程子謂一言可以蔽三千三百之全經者此也信斯言也將以禮為外乎視於無形聽於無聲其心之所以齊莊而中正者固純乎天則而不踰將以禮為内乎坐如尸立如齊其身之所以整齊而嚴肅者一安乎天則而不過是以動容周旋中禮非盛徳之至不能苟動不以禮雖知及仁守莊涖未善也尚可以為儀文末節而少之耶或又以為天理在人心原有大中至正之則率履之間自與禮合雖曲禮少儀内則諸篇亦不能於人心有加也是又不知規矩凖繩之制豈能於人心之明巧有所加乎世之欲為方員平直者不能不藉規矩凖繩以運其明巧於不已周旋曲折之禮豈能於人心之條理有所加乎而世之欲周旋中規折旋中矩者不能不由曲禮以達其條理於不窮但規矩非聖人之明巧不能制而曲禮非聖人之天理中正孰能定之使世之人莫不由之哉可見是禮也聖人不過先得我心之同然自曲禮以下諸篇要皆反覆以發明斯禮至曲之藴耳聖人制之庶民由之無貴賤無古今日用乎曲禮不見其繁且勞此所以為聖人易簡之學月令舉要中星孟春日在營室昏參中旦尾中日月㑹于陬訾斗建寅仲春日在奎昏弧中旦建星中日月㑹于降婁斗建夘季春日在胃昏七星中旦牽牛中日月㑹于大梁斗建辰孟夏日在畢昏翼中旦婺女中日月㑹于實沈斗建巳仲夏日在井昏亢中旦危中日月㑹于鶉首斗建午季夏日在栁昏火中旦奎中日月㑹于鶉火斗建未孟秋日在翼昏建中旦畢中日月㑹于鶉尾斗建申仲秋日在角昏牽牛中旦觜觿中日月㑹于壽星斗建酉季秋日在房昏虚中旦栁中日月㑹于大火斗建戌孟冬日在尾昏危中旦七星中日月㑹于析木之澤斗建亥仲冬日在斗昏東壁中旦軫中日月㑹于星紀斗建子季冬日在婺女昏婁中旦氐中日月㑹于𤣥枵斗建丑帝神春帝太皥神勾芒夏帝炎帝神祝融中央帝黄帝神后土秋帝少皥神蓐收冬帝顓頊神𤣥㝠日春甲乙夏丙丁中戊己秋庚辛冬壬癸數春八夏七中央五秋九冬六音春角夏徴中央宫秋商冬羽律孟春大蔟仲春夾鍾季春姑洗孟夏仲吕仲夏㽔賓季夏林鍾中央律中黄鍾之宫孟秋夷則仲秋南吕季秋無射孟冬應鍾仲冬黄鍾季冬大吕十二月聽朔之處孟春青陽左个仲春青陽太廟季春青陽右个孟夏明堂左个仲夏明堂太廟季夏明堂右个中央土太廟太室孟秋總章左个仲秋總章太廟季秋總章右个孟冬𤣥堂左个仲冬𤣥堂太廟季冬𤣥堂右个月令辨月令一書其所記時令之正政事之善雖傳之後世有不可得而廢者然以為周公作則自蔡伯喈始也以為吕不韋作則自陸徳明始也嘗以二氏之言質之將以為周公耶孟夏令大尉則大尉乃秦官非周人之司馬也季夏令百縣則郡縣為秦制非周人之鄉遂也季秋受來嵗之朔日則建亥為秦正非周人之建子也而蔡之説其果然歟將以為吕不韋耶則參木赭衣之世何取於孟春之布徳坑儒焚書之世何取於仲春之釋菜罷侯置守之世何取於季夏之封侯况始皇十二年不韋已死矣至十六年秦始兼併天下以十月為嵗首而陸之説其果然歟然則是書始於何代作於何人也曰補葺而訂證之者漢儒力也夷考其世大尉之職郡縣之制漢實因之布徳之詔釋菜之禮漢實有之嵗朔始於建亥諸子分王受封漢初實行之謂其出於漢儒之補葺者此也但其中有可訾議者不容不辨彼四時所主之帝所祀之處所祭之物天子所居之室所乗之車所駕之馬所載之旂與夫衣玉食穀牲器何其拘瑣鄙陋一至此也是故東方之帝必曰大昊者出於鄒衍五行之説後儒推其相生以徳始於木故大昊主春夏火也炎帝以火繼木故主夏中央土也黄帝以土繼火故主中央秋金也少昊以金繼土故主秋冬水也顓帝以水繼金故主冬古者盛徳之君亦多矣何特於此數君專主四時又安知木徳必始於太昊也且黄帝少昊父子也父子之間必主土金之相繼也耶徳莫備於堯舜又何四時之配祀乃不得與也曲禮之五祀曰户竈中霤門行是矣祭法加為七祀古無有也惟見於漢儒之記禮乃於春則祀戸夏則祀竈中央則祀霤秋祀門冬祀行又以隂陽出入盛衰言之而所祀各一其處何哉且肝木心火脾土肺金腎水此五臟屬五行不可易者也今乃春祭先脾夏祭先肺季夏祭先心秋祭先肝冬祭先腎鄭氏曰此以五臟之上下次之春為陽中於藏值脾故脾為尊據五臟肺最居上何為不尊肺而四時所祭之物果合其序否也王者南面聽天下向離而治自有常居何至春居青陽夏居明堂秋居總章冬居𤣥堂又列大廟左右以配十有二月而使其每月遷徙往來無定所哉天子所乗之車不過五輅或祀天或即位或田獵之事取其所宜則有之若車馬旂章衣玉必欲四時各一其色所食各一其味所用各一其器不亦失之太拘忌耶噫漢去古未逺故諸儒之得於傳聞者尚多古人善政但以己意證訂附㑹不免為見聞所局而可訾議者亦不少耳善觀月令者能别純訾而於古人順時之意實可㑹而通矣明堂位辨成王幼周公為冡宰攝政以王命賞罰天下何嘗去北面之禮而居非常之位哉明堂乃曰周公朝諸侯於明堂之位天子負斧依南面而立又曰周公踐天子位果如是則周公居尊矣曽謂周公如果有是乎金縢曰武王既喪管叔及其弟流言於國曰公將不利於孺子公乃為詩以貽王蔡仲之命曰惟周公位冡宰正百工羣叔流言繼以蔡仲克庸祇徳周公以為卿士乃命諸王邦之蔡書曰公作詩以貽王乃言命之王而後封仲於蔡周公曷嘗負斧依南面而立當時以為天子哉以周公為天子則成王何以處此周公特輔政耳羣叔且有不利之言使實踐祚而朝諸侯豈特羣叔流言已哉謬之甚也又曰以周公有勲勞於天下封周公於曲阜地方七百里命魯公世世祀以天子禮樂此又謬亂之甚者予嘗辨其不然矣魯昭公曰吾何僭哉子家駒曰設兩觀乗大輅朱干玉戚以舞大夏八佾以舞大武皆此天子之禮也觀春秋書初獻六羽書郊書望書新作南門新作雉門及兩觀無非惡魯人之僭天子所謂禮樂征伐自諸侯出也何得謂魯用天子禮樂兼虞夏商周之制也孟子以魯儉於百里彼乃以為七百里周書以唐虞官百夏商官倍彼則以有虞官五十夏后官百戾經違古莫此為甚至其大可怪者乃曰魯之君臣未嘗相弑也天下以為有道之國其果然乎夫春秋一書魯只十餘君隠為桓所弑子般閔公公子赤皆戕於亂臣昭公哀公皆見逐十二公之中相弑害己如此而謂未嘗相弑何也盖彼未嘗觀春秋故妄説至此後世不察乃據以為禮經其謬亂又何如哉王制論古帝王之制必有文獻可證斯可以信今而傳後也孔子欲言夏商之禮而杞宋不足徵正以文獻為不足耳孟子欲言周制而諸侯已去其籍其詳不可得而聞焉可見王制之書古無有也其作始於漢文帝令博士諸生采輯古典而附益之也何疑哉今觀其書言爵位則采孟子之文言官則采左氏之文言巡狩則采書之文其餘雜以公穀等説縱使於諸經傳一無所悖尚不可以語周之成書也况其雜亂牴牾不可勝言耶夫孟子以天子一位公一位侯一位伯一位子男同一位凡五等彼則分子男為二位而不及天子孟子以君一位卿一位大夫一位上士一位中士一位下士一位凡六等彼則不言君之位而惟五等此其等位既以異矣其餘則皆孟子之全文也又以大國次國小國無異制而皆有上士七十二人若諸侯上士七十二人則中士下士又當何如吾恐一國之内安足以禄養之也謂四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十州凡二百一十國并九州計之則為千七百七十三國周制諸侯已不可知矣其見於春秋者并附庸不過百八十國見於左氏傳不過倍加之耳借謂僻陋小國未嘗盡見於經而又或見侵於彊大恐亦未必如其所定之數也天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十有三國古者畿内不以封建諸侯雖有公卿采地而謂之百里七十里計九十有三國也有是事哉謂天子使其大夫為三監監於方伯之國國三人古亦何嘗有三監之名乎惟周封武庚於商慮其煽亂乃命管叔蔡叔霍叔監之安得謂國各有三監而謂其為古之制乎此亦因周禮有立其監之語而推演之亦安必其為天子立監之定命也又謂天子諸侯無事則嵗三田無事而不田曰不敬夫田狩之舉雖乗農隙以講武然天子一日二日有萬㡬勞民不暇果何時得無事也文王不敢荒於遊田至於日昃不遑暇食而謂之無事不田曰不敬而且以不敬歸之乾豆賓客君庖之需吾又不知蒐田獮狩之禮果何為而設此也謂諸侯祫則不禘禘則不嘗夫禘之為祭大祭也王者當禘其祖之所自出乃謂之禘春秋書皆譏其僭也何得為諸侯之祭乎若指虞夏之制固如是恐亦不至以天子之祭為諸侯之祭也已然則古制之善雖頼此以存者不少孰知皆孔子之無徵也孟子之不聞也則又安必為古之制哉况所記與諸經傳多相背馳而必欲執此為古制亦何以信其無也耶至雜之為禮經而謂為孔子所定之禮則謬實甚矣魯僭禮樂禮記曰成王以周公有大勲勞於天下故賜魯世祭以天子之禮樂或曰此魯惠公時周平王命史角賜以郊廟之禮故史角留於魯要之魯用天子禮樂謂其出於天子之賜者皆非也夫武王末受命至成王時周公制禮作樂而教典大明人咸知名分所在不敢僭踰乃公力也豈有周公方薨成王遽以天子禮樂賜魯即大壞周公之典禮乎誠如是則周公諡當何稱𦵏用何禮必王而後可也然廟謚曰公葬禮亦公天子禮樂何用哉成王非庸君伯禽非庸臣畢公召公非庸相必不為此悖禮亂常之事以啟後世僭竊而𨗳之以亂階也或疑非成王時是矣謂平王賜惠公也亦豈然哉其意以治朝賢君則典禮不紊而衰世庸主則賞賜濫行故疑在平王之世獨不思周轍雖東魯在當時不過為次國耳大國如齊楚晉宋敵國如鄭衛陳蔡設周平王以私意厚魯而各國豈肯嘿然而已乎又肯以上世無功徳而甘處弱魯後乎以晉文之霸襄王藉其功以反正至請隧則曰王章也未有代徳而有二王亦叔父之所惡也惠公於平王何有哉然則孰賜之也曰未嘗有賜之者魯自為之也孔子曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出盖十世希不失矣此聖人所以正名分懼亂賊而作春秋也惟名分一有不正禮樂征伐不出於天子故諸侯僭擬相仍冠履倒置而春秋書禘書郊正以見魯之僭用禮樂云爾厥後乗大輅載弓矢作丘甲設兩觀並用天子禮樂其勢乃至此極豈惟魯哉晉用六軍僭天子之軍也晉人曰以寡人之未禘祀僭天子之祭也甚者呉楚乃僭稱王而無所顧忌矣苟不明春秋書郊書禘之㫖而直以魯之禮樂有所賜為榮則晉之六軍禘祀亦有所賜乎此所以謂成王平王之賜二説皆非也或者又以魯頌有云龍旂承祀六轡耳耳春秋匪懈享祀不忒皇皇后帝皇祖后稷然則魯人之所以頌美僖公者亦非歟曰魯僭郊禘已非一日後人又皆安常習故莫覺其非以為君之功徳而頌美之矣借曰出於天子所賜其於僖公功徳何與也觀春秋書公㑹齊侯於淮以見僖公服楚之役而頌乃謂淮夷卒獲則詩人之頌果可盡信否乎噫孔子於詩之魯頌則存而不刪春秋於魯之郊禘咸筆而不削惟合詩與春秋並觀之則漢儒記禮之謬不待辨而見之矣諸侯專征天子握命討之權諸侯無專征之義諸侯專征大無道之世也謂諸侯賜弓矢得專征伐孰為此説耶毛萇釋詩孔安國釋書鄭康成釋禮杜預釋左氏皆有是説焉諸儒皆有是説宜必有所見矣孰知是説一倡適以啟僭亂之萌哉惟辟作福惟辟作威臣如有作福作威則害家亡國之道也凡人臣行一爵賞施一刑罰不由上命則有專作威福之罪况征伐大事天子重權諸侯方得弓矢之賜即可專之乎諸侯專之則非有道之天子矣天子有道則人不得而專也稽詩書之訓可辨矣仲康之世夏少衰矣如嗣侯之征羲和書謂之嗣征史官嫌其若嗣侯之專征必曰嗣后承王命徂征有周之盛玁狁猖獗矣周王為出車之詩命將以討玁狁而南仲之令衆也乃謂自天子所謂我來矣可見治世明主必不以征伐之權假人也迨東周無政日以凌遲諸侯始僭亂妄相侵伐不由王命至於叔季大夫執其權矣故聖人傷之曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出盖十世希不失矣自大夫出五世希不失矣深痛周之失政一至此也於是始作春秋初則述諸侯之僭中則議大夫之專也奈何謂諸侯可得而專乎彼諸儒之見或以弓矢為征伐之物弓矢賜於天子則征伐即可專矣不知古者諸侯有大功天子賜之弓矢及圭瓚盖殊禮也賜之圭瓚也使得為鬯以祭先也賜之弓矢也使得以待王命征不庭也故王制曰諸侯賜弓矢而後征伐謂之而後未嘗不本於王命也安得遽謂其得專乎哉晉文侯有攘戎之大功平王賜之弓矢作文侯之命未嘗有專征之語彤弓之詩亦以錫有功之諸侯未嘗有專征之命也盖諸儒不究詩書之㫖特因王制之語而失之故耳况春秋一經書征書伐書滅書取書入書戰書圍書討無非罪其無王命而擅興師也若有弓矢之賜即可出征則當時王室弱而諸侯彊欲弓矢之賜也何難哉得賜弓矢之國即可專征春秋之戰皆義戰而敵國亦可以相征矣此所以諸儒之説倡而後世恃彊跋扈皆得藉口實而啟僭亂之萌也豈小小哉或曰史記崇侯虎譖西伯於紂紂囚西伯於羑里後紂赦西伯賜之弓矢斧鉞得專征伐於是伐崇作豐何也曰崇固當伐而命之伐者必紂有是命也向使紂無是命文王一得弓矢之賜即敢擅伐崇密以修譖己之怨而紂豈能容之乎或曰左氏嘗載管仲之言曰昔召康公命太公且曰五侯九伯汝實征之此言又何也曰太公之賢使有王命得征伐五侯九伯可也何嘗使太公得以專之乎若晉文侯之子孫恃其先世得弓矢之賜齊太公之子孫恃有康公之言皆可以專征諸侯是乃周成王平王教之僭而導之亂孔子有道無道之言亦不足信也已通於帝王大綱紀者慎毋惑於諸儒之説五至三無嘗誦孔子閒居篇辭若與論語不類繹其㫖淵乎微矣可以神明未可以意識測可以默體未可以言説盡也及體㑹久之乃知聖訓雖浩無涯涘而流派脈絡實出一源是故志之所至詩亦至焉詩之所至而禮而樂而哀亦罔不至焉然則詩禮樂哀之皆至謂其一源于志也非歟樂主聲也而無聲禮主體也而無體喪主服也而無服可謂至矣究其所起無聲之樂氣志不違無體之禮威儀遲遲無服之喪内恕孔悲是五至悉起於氣志謂其源于志也非歟天無私覆地無私載日月無私照奉斯三者以勞天下可謂無之至矣然嗜欲將至有開必先天降時雨山川出雲而奉三無私一出於清明在躬志氣如神謂其徳參天地者一源于如神之志也非歟可見志根於心發言為詩履之為禮樂之為樂悲之為哀總之為性情之徳一也雖曰禮也樂也哀也皆以無為至而三無不越五至外也天地日月其覆載照臨至公無私而奉三無私之神志與天地日月同歸於無也明矣則是無也豈無無亦無之謂乎噫神本無方如春夏秋冬之運於天如神氣風霆之載於地瀰漫六合化生百物孰得而私議之哉氣志在人至於如神不可測識擬議非孔子從心所欲不踰矩無可無不可者其誰能之然揆厥所自一根乎志學於茲益信雖然匹夫不可奪志一念顓精且能貫金石通鬼神矧至聖於志之所至精神融結如鳥覆卵孚化翼飛不可窺測此所以謂之如神而聖不可知也故曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也雖志氣塞乎天地惟其無私所以謂之無惟其無也此所以謂之極至無以加也詎知是無也在孩提不學不慮在聖人不思不勉一毫人力不與哉非無樂也樂在其中不知手舞而足蹈也何聲之有非無禮也亡於禮者之於禮也無不中何體之有非無喪也墟墓興哀道墐死傷為我心惻何服之有要皆本於如神之志充塞天地不期至而自至也特患志之有未至耳惟志至焉則五志三無如鼓答桴如鍾應梃一出乎天性自然即喜怒哀樂未發之中發皆中節之和是也謂之未發不覩不聞而非有也故樂無聲禮無體喪無服也謂之發皆中節莫見莫顯而非無也故詩禮樂哀之相生不可得而覩聞也真志學者惟戒懼乎不覩不聞吾慎吾獨而中和位育乃其所自至者極之為天載無聲無臭而中庸贊其至也視彼專志以求虚無者奚啻天淵所以學莫先於辨志人者天地之心天髙地下庶物化生類聚羣分不可數計韓退之原人以鳥獸之㣲總歸人類人最靈秀不過庶類中之一耳雖參贊天地惟至誠能之禮運篇乃謂人者天地之心五行之端食味别聲被色而生者也是人人皆天地之心矣果天道隂陽專指氣言地道柔剛專指質言人道仁義專指心言乎哉盖太極兩儀分為五行五行滋為五味感為五聲形為五色而色聲臭味又區别萬殊人在天地間未有不食味别聲被色而生而别有所謂人也然其所以為天地之心者豈離色聲食味外别有所謂心乎何也心不在焉視不見聽不聞食不知味與草木鳥獸夫復何異是故人之為人莫不具腑臟肢體以成身具靈明知識以成心形色天性渾身皆心而其竅則發於耳目口也凡有血氣者同得萬物之味以為食而辨其味者非人乎五味不可勝窮苟匪人焉味亦莫知其甘㫖不過充腹之需已矣同得萬物之色以為視而辨其色者非人乎五色不可勝窮茍匪人焉色亦莫知其美惡不過娯目之具已矣同得萬物之聲以為聽而辨其聲者非人乎五聲不可勝窮茍匪人焉聲亦莫知其邪正不過悦耳之資已矣即此觀之人之為人而異於庶類者為其有是心也然亦止為人之心耳謂為天地之心何歟夫人之心非塊然血肉之謂也天地靈明之氣充滿宇宙惟人獨禀其精英寂然廓然浩無涯涘隨感隨應惟變所適方寸靈覺與六合神明渾淪無間故人之聽聲存乎耳所以能聽者天地之聰也視色存乎目所以能視者天地之明也食味存乎口所以能嗜而化為精神者天地之變化也是心之靈覺寓於形氣流通兩間卷舒隂陽往来今古巨囊寰宇㣲透毫芒廣博淵深莫測其底止一人如是人人皆然一世之人如是世世皆然此所以人為天地之心也宜乎人人皆為天地立心矣其如人本大而咸自小何哉五色令人目盲五聲令人耳聾五味令人口爽衆慾交攻令人馳騖奔軼不可救藥間有知自檢飭而操存之者收視返聽節食持齋未能自見本心洞晰天地雖坐忘坐馳彼善於此莫能究竟根源卒與草木同朽腐然則天地之心竟澌滅殆盡乎彼色聲臭味人縦欲絶之終有不能絶者詎知聲投乎耳耳本無聲惟不為聲所引焉則雖聽以人之心實天聽也色過乎目目本無色惟不為色所誘焉則雖視以人之心實天視也味入於口口本無味惟不為味所奪焉則雖嗜以人之心實天地為之變化而滋養之也斯人也浩氣充塞天地道心脗合乾坤列為三才參為三極天地且頼以位也非天地之心而何可見心不離乎色聲臭味實超然聲色臭味之外此心之所以為心也人雖産於天地靈於萬物實天地萬物之主宰此人之所以為人也人可因聲聞食色牿亡天地之心哉射義古人於射義必設侯以命中即詩猗嗟章所謂終日射侯賓筵章所謂大侯既抗是也漢儒記作射義乃曰射侯者射為諸侯也侯取諸侯之義已失之矣鄭康成因之註周官司裘曰謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯不亦愈失而愈逺哉夫天子之於諸侯其初皆其兄弟子姪其後繼世或祖父之列其在異姓必皆功徳之後而為甥舅之國故天子待之不曰伯父叔父則曰伯舅叔舅所以親之敬之賓之友之而後責之以臣順豈敢於大射禮取射諸侯之義而待以禽獸之類哉周萇宏嘗以諸侯不朝乃設貍首射之貍者不來也將以警不來者晉人怒殺萇宏而愈不服况無故而不以人道待諸侯耶且天子中之則能服諸侯盖天子固己服諸侯矣奚必射之中而後服也使萬一不中則不能服諸侯矣奚可哉天子建萬國親諸侯使之世世守而勿失乃謂諸侯以下中之則得為諸侯則雖無功徳而但於大射一中便得列土而封建乎鄭氏之説盖亦祖射義而不知其非者也射義曰射中則得為諸侯不中則不得為諸侯觀其下文猶以諸侯貢士於天子天子使射中者得與於祭則君有慶而益地不中者不得與於祭則君有讓而削地得為諸侯者以有慶也不得為諸侯者以有讓也即天子之賞罰諸侯惟在射之中否揆之書云五載一巡狩羣后肆朝敷奏以言明試以功車服以庸孟子云入其疆土地闢賢俊用則有慶土地荒蕪掊尅在位則有讓己不相合况鄭氏因其説諸侯以下射中則得為諸侯尤不可也昔晉侯齊侯相與投壺晉人謂寡君中此則為諸侯師齊人謂寡君中此則與君代興皆中之識者謂晉人失辭晉固為諸侯師矣何待中壺為雋耶自是齊人與晉干戈相尋投壺之語啟之耳以此知古人射侯必不取諸侯之義天子諸侯中之必不如鄭氏之説明矣射義一篇雖中多古典而其大義已乖何可以垂訓也况射特六藝之一耳稷契伊周未必其能射也羿逢蒙由基之徒皆射絶天下果得為諸侯者皆若人乎今而曰諸侯嵗貢士於天子天子試之其容體比於禮節奏比於樂中多得與於祭不然則不得與選士以祭殆其然者但禮樂不實有於内而徒行於弓矢之間恐古之選士有不然者惟周禮鄉大夫獻賢能之書退而以鄉射五物詢衆庶則有之何至如射義進爵絀地盖由於射也耶或曰古者不以射取士何謂侯以明之乎曰書謂欽四隣庶頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉盖以四鄰之臣若不在庶頑之重罪者則猶可㨵拭而勿棄之侯以明其藝撻以記其過書以識其非庶㡬與之並生可見試以射又撻其過侯與撻並施而據此為古之人選士之法也可乎哉漢儒據此以証二禮信哉愈失而愈逺也已昏義天子聽男教后聽女順天子理陽道后治隂徳天子聽外治后聽内職故天子之與后猶日之與月隂之與陽相須而成此不易之理也昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治天子立六官三公九卿二十七大夫八十一元士以聽天下之外治據本文亦無可疑但後儒謂夫人嬪世婦御妻即天子六宫中有名位之妾媵夫以天子之尊臣妾天下豈百二十人之足多哉但以理揆之一人御衆女為古帝王定制其不可疑甚明奈何鄭康成又註為當夕之説謂后當一夕三夫人當一夕九嬪當一夕二十七世婦當三夕八十一御妻當九夕每十五日而一周是説也何其鄙悖謬妄一至此極哉夫易之剥六五貫魚以宫人寵非謂天子自后以下所以備數宫中者必無其人但大昏之義載為定數非徒當夕之説甚悖於理而以一人御衆女古帝王必不以此立教也况内之夫人九嬪世婦御妻與外之公卿大夫元士其數一一相配雖以名義言之不應如此之舛而有名位者既定為百二十人則其餘服役又不知當有㡬千百人矣或以昏義本文既無可疑而世儒之説又不可信將以何者而折衷之哉盖天子統六官后統六宫特以隂陽内外而别言之耳苟真知世儒與康成所説之非則有三公必有三夫人有九卿必有九嬪有二十七大夫必有二十七世婦有八十一元士必有八十一御妻合一朝之外治不外乎六官而莫非天子之所統合廷臣之内職不外乎六宫而孰非后之所統哉即羣臣百僚皆天子之命臣其妻莫非天子之命婦合百官朝于天子所以輔天子明章天下之男教合百官之命婦朝于后宫亦以助后明章天下之婦順也使天下之百官悉敬承天子之男教則外和而國治矣使百官之命婦悉敬承后之婦順有不内和而家理者哉以此言之則又何必夫人嬪與世婦御妻必為天子宫中有名位之妾媵而後可也嘗讀書有不邇聲色之訓中庸有去讒逺色之言是聖人於色荒惟恐防之不早乃於昏義以此垂訓萬世吾不信也噫即此推其餘漢儒釋經而經亡可勝慨哉封建疑議古今論三代封建之制惟孟子曰公侯皆方百里伯七十里子男五十里其大畧可據者如此質之武城列爵惟五分土惟三之説相脗合天子地方千里質之商頌邦畿千里之説無間然也王制封建之法則一循乎孟子然曰四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國天子之縣内方百里之國九七十里之國二十有一五十里之國六十有二凡九十三國九州千七百七十三國天子之元士諸侯之附庸不與以應周千八百諸侯之數定為畫一之法斬然不易何拘泥不通至此也夫以九州之地容千八百諸侯猶有近似者若如周禮大司徒建國之制則諸公之地封疆方五百里諸侯四百里諸伯三百里諸子二百里諸男百里職方氏凡千里封公以方五百里則四公方四百里則六侯方三百里則十一伯方二百里則二十五子方百里則百男以周知天下夫以千里之地封公者四是四公各得二百五十里六侯各得一百六十六里十一伯各得八十九里二十五子各得四十里百男各得十里而男之國果止十里職方氏果與大司徒之説不相妨乎以職方言之雖海内之地止封六公九侯二十二伯五十子二百男地猶不足而周之諸侯果止於二百八十餘國而已乎若以大司徒之制言之春秋時有年表可考者止二十二國耳為公者三為侯者八為伯者五為子者五為男者一是二十二國已去七千三百里矣而周果二十餘國而已乎是皆不通之説也奈何後儒必欲以周禮大司徒職方氏所載與王制孟子之説强而合之有曰於天子言千里者兼軍賦而言之於諸侯言百里七十里五十里者獨舉軍制而言也於天子言萬乗者以賦法通率也於諸侯言千乗者兼軍賦而言也於諸公言五百里諸侯言四百里伯言三百里子言二百里者包山川土田附庸於疆理也於諸男言百里者獨舉出軍賦之封疆也似乎不相倍矣然公侯之封如此其廣則折海内九千里之地不足以容數十國而名山大川方數百里者果可以一國包之封疆之内焉否乎有曰周禮封疆方五百里徑只百二十五里方四百里者徑只百里方三百里徑只七十五里方二百里徑只五十里方百里者徑只二十五里似與王制孟子不相倍矣然侯伯子之地雖已脗合而公之地多二十五里男之地僅得五十里之半况二十五里果可以為國君乎有曰天子畿内方千里者開方實萬里也然則公侯方百里者開方則千里矣豈長則百里濶則一里之謂乎是皆求之不得其説故牽合傅㑹必欲强而通之而數説之齟齬不相合如故也噫以義揆之豈數説盡非耶蓋今之去古時已逺矣制已不可詳矣九州之地截東南以補西北萬里之幅􅊷猶相等也必曰公五百里侯伯三四百里則以今之地封三四十國而不足矣有是理哉惟孟子公侯皆方百里伯七十里子男五十里庶㡬近之是故封疆雖有定制而山川土田附庸之錫則不在定數之中如魯頌曰乃命魯公俾侯於東錫之山川土田附庸曰泰山巖巖魯邦所瞻奄有龜蒙遂荒大東如大雅曰王錫韓侯其追其貊奄受北國曰告于文人錫山土田可見山川土田附庸則又天子展親報功之特典而不可以定制拘之矣設使天子盡以九州之地封建諸侯而無餘則巡狩述職有當慶而益以地者果削彼國之地以益此國亦不論土地逺近為何如哉立國之初封建以定繼世而王者欲以分封子弟必須滅他國而後可哉觀周襄王以陽樊温原攢茅之田錫晉文原人不服乃至興師以伐之亦以世守其地不肯遽從他人而山川土田猶有不屬諸侯封疆之内者在也要之九州廣狹本有不齊山川阻隔勢亦靡定安得盡如周禮畫疆分界若此其整齊耶孟子論井田曰此其大畧也若夫潤澤之則在君與子矣予於封建亦云然惟善考古者無泥於舊説而後可周禮總叙周禮一也古今論者不一是之者固未必天下之真是而非之者抑豈天下之真非乎稽諸孔孟之言其是非可辯矣何也彼謂是書非周公制作也竊恐法制周密詳盡三代而下未有如此之盡美者孔子曰文武之政布在方策安知是書非其方䇿之遺乎若以為盡出於周公之手也不惟封國建官中多可疑孟子曰諸侯惡其害己而皆去其籍豈籍去戰國孟子止得聞其畧秦皇焚禁書籍漢儒反得其詳也耶可見是書也在春秋時尚有存者至戰國而後澌滅無餘也已不然孔子所謂方策果何所指孟子所謂去其籍者非周禮之類乎意者漢雖承秦焚禁之餘然去古未逺故諸儒猶得以習聞其説其體國經野大典宏綱未必非周家良法所僅存者而捃摭東遷以後如戰國時制以雜亂乎其中者豈盡無也耶况周歴八百餘載其禮制初雖定於周公而沿革潤色時異世殊安知非東周之方策典籍又安知非漢儒所補輯也耶噫讀周禮者于其是而真知其為前代之所流傳于其非而真知其為後代之所雜亂師其意不泥其迹周公之心法不即此而㑹通哉周禮原委賈氏正義云按書傳周公一年救亂二年伐商三年踐奄四年建侯衛五年營成周六年制禮作樂所制之禮即此周禮也漢興髙堂生傳十七篇自髙堂生蕭奮孟卿后蒼戴徳戴聖是為五傳弟子所謂十七篇即儀禮也若夫周禮其出特後者馬融傳云秦自孝公以下用商君之法其政酷烈與周官相反始皇禁挾書特疾惡欲絶滅之故焚燒之獨悉是以隠蔵百年孝惠除挾書之律開獻書之路時有李氏上周官五篇復入于秘府五家之儒莫得見焉孝成時劉向子歆校理秘書始得列序著于録畧然亡冬官一篇以考工記足之時衆儒並出共排以為非是唯歆年尚幼務在博覽乃知其為周公致太平之迹具在於此柰遭天下兵革並起疾疫喪荒弟子死喪彼有里人河南緱氏杜子春尚在永平之初年且九十能通其義頗識其説賈徽及子逵大中大夫鄭興及子大司農衆往傳其業又以經書傳記轉相證明為解其時議郎衛次仲侍中賈景伯南郡太守馬季良亦皆作周禮解詁然猶有參錯同事相違二鄭明理於典籍觕識周官之議存古字發㣲正讀鄭氏康成作周禮註多引杜子春鄭大夫司農之義以讚而釋之焉然則周禮起于劉歆而成于鄭𤣥然孝存以為末世瀆亂不經之書作十論八難以排棄之何休亦以為六國隂謀之書唯有鄭𤣥徧覽羣經故能荅林碩之難作為訓註使其義得條通焉其後唐太學博士賈公彦又撰周禮疏五十卷是為注疏云觕粗通周禮考鄭氏曰周公營洛邑於土中七年作六典謂之周禮致政成王以授之王文中子吾視千載而上聖人在上者未有若周公焉其道則一而經制大備後之為政者有所持循矣明道程子曰必有闗雎麟趾之意然後可以行周官之法度横渠張子曰天官之職須襟懷洪大方能包羅統貫規模至大若不得其心欲事事上窮究凑合使如是之大必不能也藍田吕氏曰周禮直欲使無一物不得其所故其書無一言而非仁朱子曰周禮一書皆是從容廣大心中流出又曰周官徧布精密乃周公運用天理爛熟之書崑山王氏曰六官治教禮政刑事上下四方覆蔵宥密如天地四方之六合缺一不可大如六鄉六遂六軍小如六牲皆六官合而後具如六出之花六瓣具而後花成缺一不可也一職修可以扶顛持危撥亂世而反之正六職修則天下大和萬物咸若矣又曰周官物各付物如天地之化大之日星垂教河嶽效靈小之草木之一華一實鳥獸之一羽一毛靡不相對成文非物物刻而雕之又曰周禮有必不可復者如后妃夫人與尸賓獻酬天子與邦君送迎揖讓是也至宫府為一體王后世子之動有式法寓兵於農取士以賢選用宦寺府史胥徒制馭諸侯四夷後世舍此無以為治又曰周官中有原兼官不别設官者有其官相聮不得不兼者有平日不設臨事設之事畢復罷者皆使人以其所能用人以其餘力故事治而功不妨官設而禄不費所以善也周禮本㫖古籍備載先代建置法紀獨周禮一書最為詳密是非存亡姑置無論然讀是書不可先有是非存亡之成心横于胸臆惟依周禮究竟周禮俾一官一職明其司掌總其統屬多之若増一贅疣少之若缺一成數此亦未可以己意裁決之也須從書外洞見作者本意於六官源委透徹底裏自度可與周公面相質疑問難周禮全書盡在我胸中經之緯之一無所眩然後度其時勢審其治體是非存亡灼然如燭黒白庶不為後人論議所撓亂矣不然徒逞意見是今非古移前補後祗見其妄也反以滋後生之惑也予甚闇陋于各經書不敢自衒小慧妄加刪補革易舊章或露管窺則直述所見以就正有道然欲于是書而提掲綱領晰其㑹歸尤為急務近世王明齋氏于周禮頗得肯綮鄙見多與之合又何必别自為説耶天官冡宰天統萬物天子立冡宰以統御百官曰天官冡宰取其調劑邦治協于中和也大宰之職掌建邦之六典以佐王治邦國小宰掌建邦之宫刑以治王宫之政令宰夫掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令其官屬凡六十皆王宫后宫之事冡宰無所不統宫正而下主宿衛及王之左右内宰而下主内政及后之左右膳夫主食酒正主飲宫人主宫室典婦功主女功内司服主衣服醫司主疾病罔有一事一物出於他門違於法式者俾王及后率由天道也其大府而下八職皆財賦之官而亦屬焉盖九貢九賦九式已見於大宰小宰之文八政以食貨為先欲均天下必自理財始萬物皆天物故宰致國用有大府掌出入之權百官府皆天職事皆天工故宰百官聽邦治而特司㑹一職總焉六十屬皆主在上之事天覆象也地官司徒地載養萬物安擾地道也天子立司徒以安萬民徒謂統徒衆也大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國小司徒掌建邦法鄉老各掌其所治鄉之教而聽其治其屬七十有五俱主教養萬民士農工商四民盡乎民矣六鄉多士故卿大夫之屬詳於教六遂多農故遂人而下詳於養市商也司市而下治商人之教工則見於冬官司保氏主輔王躬及教其左右司諫司救掌畿内之教也地之所生莫大於土載師任地也土均均人平土也封人守畿封之土虞衡主山林川澤之土門闗守土者也倉廪土地所出牧人畜養犧牲土所産也牛土畜六十屬皆邦本之事也春官宗伯春出生萬物宗尊伯長也天子立宗伯掌邦禮以事神為上報本反始亦反其所自生也大宗伯之職掌建邦之天神人鬼地示之禮以佐王保邦國小宗伯掌建邦之神位肆師掌立國祀之禮以佐大宗伯其屬六十九秩序皆天所命天府奉若天道也大卜筮占夢眂祲馮相保章聽命於天和同天人之際也典命典瑞司服巾車司常禮之秩序也鬱人司尊彞司几筵行禮之器也巫祝致禮之辭也諸史守禮之官也禮必有樂大司樂教王世子及國子以禮樂者也世婦内外宗教六宫以禮者也送死大事冡人職器專其禮都宗人治都惟宗禮家宗人治家惟宗禮鷄人春畜六十屬合敬合愛春生象也夏官司馬夏大也長萬物也天子立司馬掌邦政以平諸侯正天下大一統也官以馬名兵所重莫有急於馬者大司馬之職掌建邦之九法以佐王平邦國小司馬掌凡祭祀㑹同饗射師田喪紀掌其事如大司馬之法其屬六十有三大司馬主天下之大事量人邍師制畿封國也職方氏分職也都司馬家司馬簡稽鄉民也司勲司士諸子進賢興功也皆大政也大僕節服氏格王正事也司士正朝儀之位正朝廷百官也九伐正萬國也服不氏而下正禽獸也兵司馬之用器則有司甲司兵司弓矢馬司馬之乗畜則有馬質校人戰司馬之事戎僕主軍政之御司右主車之右環人挈壺皆有事于戰者也兵莫大於自衛守險虎賁旅賁備輦轂以衛王掌固司險掌疆設險以守國也兵莫大於防㣲杜漸懐方氏訓制治于未亂匡人撢人消息於未萌也它若司爟主火夏氣也小子羊人主供羊夏畜也弁師首服夏象也六十屬萬物相見品彚咸亨之象也乃司馬辨論官材進士之賢者於王詔爵詔禄詔事奠食司士掌其版王制記之矣秋官司冦象秋氣嚴肅收聚歛蔵乎萬物天子立司冦掌邦刑義以正萬民也大司冦之職掌建邦之三典以佐王刑邦國詰四方小司冦掌外朝之政以致萬民而詢焉士師掌國之五禁以佐右刑罰其屬凡六十有一司刑以定罪司刺以參伍赦宥掌囚以拘繫司厲以收孥掌戮司圜以收教皆刑官遂士縣士方士訝士朝士各掌其地之刑也司𨽻禁殺戮禁暴氏野廬氏蜡氏雍氏萍氏司寤司烜條狼脩閭銜枚主巡察布憲主警戒司約司盟主結信皆禁於未發刑期無刑也夫殺以止殺豈徒刑戮之是務乎司民掌民數屬若曰王刑者民之司命以生生為心期於治而已殺敢不慎乎大行人掌邦交之禮又主以刑詰四方朝大夫都則都士家士主以法則馭圻内諸侯㝠氏而下十二官刑及禽獸也職金五行秋屬金犬金畜也六十屬皆主裁物之過各正性命之象也冬官司空大宰事典曰以富邦國以生萬民冬者萬物之所終也萬物成終必歸其根亶空土也司空掌邦土天下之事所由成故命曰冬官空之言空也相天下之勢所空缺而修治補助之是冬官之義也冬官官屬其亡久矣漢孝惠除挾書律時李氏上周官五篇復入秘府五家之儒莫得見焉至孝成時劉歆校理秘書始得列序著于録畧亡冬官一篇以考工記足之夫工特司空之一耳冬官詎止考工已耶或謂各屬混於五官之中即欲於五官中摘其有闗冬官者以補其缺是謂冬官原未亡也或欲象天文有土司空土工二星擬其屬必有掌大均之事者有器府星擬其屬必有掌器府之事者諸如此類皆補於五官之外也二者皆有定説孰敢必其然哉考工記雖不足以盡冬官而工其屬也然則六官闕一如之何孔子嘗嘆吾猶及史闕文吾其闕之而已矣周禮是非周官書列於經㡬千百年矣戾於經而列於經此予所以不得不辨其非也予豈得已哉賈氏曰六經禍於秦惟周禮最後出也以始皇特惡之故禁絶加嚴也此理不然北宫錡問周室班爵禄之制孟子謂諸侯惡其害己而皆去其籍可聞其畧而不聞其詳方戰國時周室猶存諸侯彊大不禀周制已滅去其故籍也是周公所制之典夫子所正之經已不傳於世也故雖孟子博學大儒不得聞其詳何待秦之禍而後亡始皇禁絶之嚴故後出乎豈當時有周禮而孟子不見之乎孟子且不見周禮漢世焉得而有之有之則非周公之舊後儒為之章章矣然秦漢去周未逺使其洪儒碩學請聞周禮之舊作為一書使後知所本又何幸耶故雖非周公之親筆謂之周禮亦可也今乃不然所載之典大抵以衰世之制為盛世之典其背理傷教甚衆以理度之特出於漢儒之才髙而不深於道者歟所以不能使人盡信也夫成周之制語其最大者莫若建都也又莫若封國也又莫若設官也倣其言皆與他經不合言建都之制則戾書洛誥召誥之㫖言封國之制則戾書武成與孟子之説言設官之制則戾書周官之六典此其事之最大理之最明而皆與古書戾則其小者可知矣建都之制周人求地中以建國畿方千里故鄭氏曰周公居洛營邑於土中七年使成王居洛邑其説信矣然犬戎作難平王始遷居洛邑盖前此未以為都故也然則謂成王居之何哉若但測景求地中而不居顧謂之王畿王國寧有是理哉大司徒以土圭之法測土深正日景以求地中由是建王國制其畿方千里土圭之法不見於地經惟見於周禮大司徒及典瑞玉人之官以是測日景長短求與土圭等盖謂周公營洛邑之事鄭氏謂周公居洛營邑於土中七年使成王居洛邑夫周公營洛邑未嘗與成王居之也至犬戎之難西周已喪平王始遷居焉今指洛邑謂之王國王畿即謂成王居之豈不戾乎若但測景求地中而不居則不得謂之王畿王國也此其説失之明矣且王者之居必求地中何耶古之聖人定都建國特取其便於時爾堯都平陽舜都安邑文王居豐武王居鎬何必其地之中耶賈氏謂五帝以降惟湯亳得地中堯舜雖不得地中而政令均天下治者以並在五嶽之内周之岐鎬處五嶽之外故周公東居洛邑此因鄭氏而愈失之也堯舜文武之治若不施仁政於民則居地中何益徒居地中與五嶽之内即能令政教均天下治者陋儒之見也且先儒謂今潁川陽城為地中故置中表若然周公何不即都陽城乃營洛邑乎洛邑去陽城亦逺矣既求地中而不以為都何耶又曰日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂説者謂凡日景於地千里而差一寸南表千里景短一寸北表千里景長一寸有是理乎若千里即差一寸萬里乃差一尺也此已不可况謂東表去中表千里晝漏半中表景得正時東表日已昳矣是地於日為近近故得景夕西表去中表千里晝漏半中表景得正時西表日未中是地於日為近西仍得朝時之景此甚不可也日月麗天萬里同晷纔去千里之間地中得正時在東之景已夕在西之景方朝若然是夏日之至晝漏方半東去地中千里之人以西方之朝為夕西去地中千里之人以東方之夕為朝使相去數千里之外則當以晝為夜以夜為晝矣即雖蠻夷之地窮日際月窟之所居亦不至是昔堯命羲和宅嵎夷命羲叔宅南郊命和仲宅昧谷命和叔宅幽都皆以觀日景之出入短長隂陽氣候之偏正未嘗聞四方日景之異如此又曰天地之所合也四時之所交也風雨之所㑹也隂陽之所和也夫謂之中國居天地之中者以外有東夷南蠻西戎北狄之為中也其蠻夷之地或相蓓蓰或相什百在四夷之域廣狹自不同中國之内但止一洛正為天地之所合四時之所交其果然乎故營王邑者欲居天下之中使四方道理均此則可矣而謂天地必合於此四時必交於此恐無是理也况於風雨之㑹隂陽之和無亦在人君徳政應天心如何耳但居洛邑以求風雨之㑹隂陽之和空言也此無他盖見書召誥有王來紹上帝自服于土中之言故作周禮者衍其説也不知書所謂土中者但謂道里均耳使周公必以土圭測景求地中則書載營邑之事詳矣豈得不言今觀洛誥之書特云卜澗水東卜瀍水西何嘗如大司徒及諸儒之説學者苟知成王未嘗營居洛邑之説自可知其非也封國之制周禮封國之制先儒固有能言其非者俗學又為之委曲求通以誤後世亦不能無辯焉夫子以大國為千乗之國又曰安見方六七十如五六十而非邦也者至孟子荅北宫錡及慎子之言與武王列爵分土之制無少差異則大國不過百里次七十里次五十里周法固然也又曰今滕絶長補短將五十里也則孔孟非特聞武王周公之制盖親見當時之諸侯則然漢儒作王制亦同獨為周官書者以公五百里侯四百里伯三百里子二百里男百里與書論語孟子禮記之言並戾無有疑其為非者何也陋儒鄭氏釋王制方曰武王初定天下更以五等之爵増以子男而猶因殷之地以九州之界尚狹也周公致太平斥九州之界封有功諸侯大者五百里最小者百里盖據大司徒之文夫堯舜夏商周之地不過九州攷周職方掌天下之圖無以過於禹貢之域禹之疆域東漸於海西被於流沙朔南暨聲教夫既已窮於海至於流沙將何所斥廣哉借能斥大邊境取荒外之地亦不可増封於内此必不然也或曰諸侯之地當如孟子之言至開方之説則如司徒所記故其言封疆皆言方者開方之法也王制云方千里者為方百里者百若據實千里而言則不得有方百里者百亦開方法也此百里之國開方得百里之國者四公當為四百里此言五百里者錫之以附庸故也伯七十里開方得七十里之國者四則為二百八十里舉成數可為三百里子五十里開方得五十里之國者四故為二百里據此説亦非也以公侯之地開方已不得五百里之數又益之以附庸若公侯有附庸則自伯而下亦當有附庸合以公侯則又不合於伯子矣况子男同五十里今以子五十里開方得二百里而男開方止於百里何哉説者又强通以為男實有二十五里何所據而云然王制有曰古者以周尺八尺為步今以周尺六尺四寸為步古者百里當百二十一里六十歩四尺一寸三分然則孟子周官里數之不同抑尺之有短長耶借謂尺有短長其百里當後之百二十一里有竒周官祇但云諸公之地封疆方百二十里何至相去數倍遼逺之甚乎是又不可也不知為此異説者盖漢儒見周之衰諸侯相侵吞滅小國開疆拓地至於數百里之廣乃以為周制乎子産曰古者列國一同今大國數圻若無侵小何以至焉孟子曰周公之封於魯為方百里者五又曰今海内之地方千里者九齊集有其一觀此則春秋之大國非復一同也戰國時魯乃五百里齊乃千里此則周官書執以為據也又職方氏曰千里封公方五百里則四公方四百里則六侯方七百里則七伯方二百里則二十五子方百里則百男皆非古之制不可信也故曰舉衰世之典而為盛時之制此類是也建官之制周禮事之最大者莫如建都封國之制予既辨其非古矣然未為甚也至其言設官則甚矣據書周官稱唐虞官百夏商倍之繼之曰仰惟前代時若訓迪厥官立太師太傅太保茲惟三公少師少傅少保曰三孤而後及於六卿周之官制可據惟此成王仰惟前代則大率依唐虞夏商之制耳今觀周禮乃無三孤三公之官不誌其大而誌其小於理安乎為之説者乃曰三公之尊坐而論道故不列於官謬説也成王言六卿所治之職何嘗以配天地四時今以冡宰曰天官而天事反在春官乃曰天取兼總之義夫天之至尊惟萬乗可稱曰天王曰天子豈以人臣而得稱天乎司徒謂之地官尤無意義古者司徒掌教教以人倫今乃掌土地之事則是司空掌土地非司徒掌教也宗伯掌禮謂之春官春者物之生五行以象仁今謂之禮豈主教也哉司馬掌兵而謂之夏官夏方物之盛反用兵乎惟司冦掌刑謂之秋官猶可矣司空掌土謂之冬官又無理也使成王有職於天地四時則書言之矣書既不言所取又無義漢儒臆説可知也又小宰謂天官以下其屬各六十計為三百六十官説者謂象日月星辰之度今觀自太宰至履人官凡六十有三自大司徒至藁人官凡七十有九自大宗伯至宗人官凡七十有一自大司馬至家司馬官凡七十自大司冦至家士官凡六十有六計五官之屬已三百五十有二而冬官尚不與小宰之言自戾矣且其趨走之吏僕𨽻之職皆列於官内小臣内豎男巫女巫之類何為者耶甚者蟈氏去鼃黽壺涿氏除水蠱柞氏攻草木而方相氏蒙熊皮黄金四目為一官乎凟亂不經甚矣然此雖不可猶可强道也若乃鄉官之制五家為比有下士為比長五比為閭有中士為閭胥四閭為族有上士為族師五族為黨有下大夫為黨正五黨為州有中大夫為州長五州為鄉有卿一人謂之鄉大夫六鄉之民不過七萬五千家耳今毎鄉卿一人中大夫五人下大夫二十五人上士一百二十五人中士五百人下士二千五百人一鄉之中自卿至下士凡三千一百五十六官合六鄉計之則有萬八千九百三十六官不知七萬五千之家何似供之也雖盡土之所産賦之所入不足以給之至遂人言六遂之制又云五家為鄰有鄰長推而上之為里為酇為都為縣為遂為鄙於鄉之制併六家計之亦萬八千九百三十六官六遂又能供之耶合鄉遂之數則為三萬六千八百七十二官據孟子王制諸侯而下士比上農夫食九人使六鄉六遂之官皆食諸侯下士之禄則三萬七千八百七十二官盖食三十萬有餘人鄉遂之中耕者凡㡬萬人乃食三十萬不耕之人乎况又不止皆食諸侯下士之禄况又鄉遂之外他官至衆内而三公三孤之屬外而諸侯之臣不知其㡬借謂堯舜之世事簡而建官少周之世事煩而建官多夏商不過倍唐虞之制周人亦不過倍夏商之制何得與夏商相甚乃數萬倍耶盖彼但見成周建官之多而不計其數乃誕謾至此世儒酷信之不亦傷乎王氏曰王畿受天下財賦不當以財不足禄為疑不知官冗至此禄之當以何術世之陋學隨人東西未有如漢鄭氏近世王氏也作周禮者正以欺若人耳内宰之職周人以辯宫九嬪九御之教責之内宰然乎否乎夫以宫禁之密房帷之事非外官所治也女子未嫁教以婦言婦徳婦容婦功者女師之事也今内宰二人下大夫也其屬又有上士四人中士八人府史胥徒之衆而使之出入宫禁以隂禮教皇后及九嬪無是理况謂之婦織絍組紃之事内宰其果能教乎夫男女之别正家所先先王以宫掖使令掃除之事不可無人於是不得已而用奄官以為之防未聞使外官治内事也后夫人以下欲無驕偽無嫉妬無讒言無私謁在人君正身以率之耳不正身以率之而使内宰之徒教之非也舜以匹夫妻帝之女使執婦道於虞書曰嬪于虞盖以徳化之也文王能使太姒之有徳亦身率之耳詩曰刑于寡妻至于兄弟以御于家邦皆非使人教之也在易之家人曰男正位乎外女正位乎内男女正天地之大義六二之爻辭曰無攸遂在中饋言婦人凡事無所專持主饋食於中耳今天官之屬乃使九嬪世婦女御如女祝女史與焉春官之屬乃使世婦世吏内宗外宗與焉在世婦則每宫卿二人是禁幃之内男女雜列其職豈分别内外之理哉古者内外言不出入於梱今使宫嬪而屬六卿使朝臣而化九嬪周公必不為是也又曰凡賓客之祼獻瑶爵皆贊説者謂王同姓及三王之後來朝覲為賓客者行祼禮時后則亞王禮賓王享燕之后則亞王獻賓瑶爵后所以亞王酧賓也此又不可之甚者方宗廟之事后助王祭禮也賓客何得與后相酧即為王同姓三王後乎以在中饋正位乎内之婦人使之外接賓客雜與有司行祼獻之禮則易家人之道不足為訓也釋者又引陽侯來朝於穆侯穆侯享陽侯夫人助君子酧於賓陽侯見夫人色美遂殺穆侯而竊其夫人故自後廢享夫人之禮誠如是説則周禮制未足以經國家其弊乃至於使其臣竊君之夫人豈防亂之禮意乎予謂君有賓客必無后夫人祼獻之禮此果有之則陽侯竊夫人之亂亦宜至於此矣盖此特漢儒以后夫人有助祭祼獻之禮而謂賓客亦然世人惑其説不見其禮行於世故為陽侯竊夫人而廢夫享之説也又曰凡建國佐后立市設其次置其序正其肆陳其貨賄出其度量祭以隂禮此又不可也婦人無外事何得以立市乎説者謂后職主隂王立朝后立市隂陽相承之義若然凡事之屬於隂者皆后主之也祭天陽也祭地隂也祭日陽也祭月隂也祭祖陽也祭社隂也然則祭地祭社祭月等事何不歸之后乎吾聞神農教人日中為市者矣未聞后之立市也聞舜之巡狩同度量衡者矣未聞后之出其度量也王之事后不得與猶后之事王不得與也日昱乎晝月昱乎夜各不相侵而後得隂陽之義也是故牝雞之晨周王數其惡哲婦傾城詩人記其亂歴觀聖經之訓未有婦人與政者獨漢儒序詩以求賢審官知臣下之勤勞為后妃之事盖悖禮亂常之謬説不可以訓也作周官書者之説與序正同愚意所不可者三以隂禮教六宫教九嬪以婦職教九御一也凡賓客之祼獻瑶爵二也凡建國佐后立市三也以為誠如此則隂陽非以相成乃以相侵為亂之本秦漢以來女禍相仍盖不知道者之説有以啟之也可不戒哉惟王建國辨方正位體國經野設官分職以為民極四海之治歸於王畿王畿歸於王朝王朝歸於王躬而王建其有極故辨方正位則前王後宫内外不相凟前朝後市義利不相干而朝廷正矣體國經野則王國王畿各止其所而邦畿千里正矣設官分職則天下之治大綱小紀靡不畢舉矣所以大中至正為萬民之表極焉而治道不出於此故六官之首皆以此語冠之也周禮六官繹曰易首乾象天禮首天官建冡宰法天易坤承乾地配天禮天官掌邦治象覆幬司徒掌邦教象持載盖教以宣治而地守卿配天也君治教天之道也天地設位而易行易乾元亨利貞禮宰統百官禮政刑事物有其官上法乎天行是故法象莫大乎天地變通莫大乎四時憲天聰眀法時順布分職聮事為民極莫大乎六官曰天官卿於六官並列何也曰易乾坤於六子亦並列也天地四時一不具即覆載生成之徳詎有偏乎其並列象分異也其聮事象功同也譬則風雨露雷共而化工宣生長收蔵合而歳功成經脈竒絡相傳輸而百體清和咸理也然何獨事聮也天官者以治教禮政刑事為其治者也地官者以教治禮政刑事為其教者也春官者以禮治教政刑事為其禮者也夏官者以政治教禮刑事為其政者也秋官冬官者以刑事治教禮政為其刑事者也譬言天而五土四時統於天言地而五運四氣統於地春夏秋冬各以其時行而覆載生成之徳各正具備也播五行於四時而木火土金水嵗月日時干支子母迭而運也易先天圖天地定位而雷風水火山澤錯列以成體後天圖帝出震齊巽相見致役説戰勞坎終始乎變化成萬物也其道一也宗伯掌其禮曰春官何也曰乾元統天禮三千三百一天故禮者體仁長人之紀也記曰宗伯之官以成仁司馬掌邦政曰夏官何也曰政者正也司馬掌政張皇六師赫赫濯濯而後能以萬國寧大正人之道也譬則夏之日乎伊可畏而助長物也抑雷霆乎時雨乎殫迅動而震動優渥過化而不留也夏盛徳在火故兵猶火火烈具舉而民勿之有犯也故兵蔵於民大設不用而諸侯自為正夏官卿之道也記曰司馬之官以成司冦曰秋官司空曰冬官何也天地之氣收而肅肅漸以威而終之蔵以固也秋揫也司冦義刑義殺驅而納之善象之曰秋官冬固蔵司空居四民時地利蔵而固之富有生之其象也大哉乎冬官之事典三冨萬民而夏官之董兵曰政秋官之制刑曰禁也明兵設不用刑有禁欲無犯也達天徳矣易曰天地之大徳曰生後世極兵刑之用於水徳而世嗣竟殄則逆天用焉故也曰書周官有三公而禮經無列何也曰三公無官也天以紫宫樞極統萬象而居其所不動不自顯其光所以為神也帝以道揆法紀統六合而師保疑丞左右密勿不自勞于事所以為聖也周官論道而不及以六政以尊道也九經尊賢而不列之大臣惟貴徳也故三公無官也天地者道之本也隂陽者道之運也三公者洞幽明之故握元化之統備淵浩之徳神而明之默而成之不言而躬行之者也三孤者慎觀三師之徳行而審諭之於道者也公調而燮之孤審而亮之公微言而篤行之孤審象而弼丞之然後能襄於天道揆立焉是奥樞之任也孔子曰修身則道立尊賢則不惑曰前儒言之三公不備官也三公之有官皆六卿之上攝者也諒乎曰唯唯否否三公道揆之所出六卿法紀之首也議道揆者本天質道主格王心焉敷道治於民是故六卿老外倦勤於政内深喻於道則使之釋政而任道其任矣奥者明之根明者奥之符不求端於奥而求於理明者末也既握樞於奥而兼以理明者誖也以師保之尊而復尸宰司之事即胡以平政是明聖之所不處也任六卿之務而復議調燮之道則何以凝道是明聖之所不能也且王者之於道也訏謨密勿靡息而豫怠焉師保傅者時省微而輔危以一之於道者也盖昔者武王克殷甫下車訪箕子受洪範焉踐祚三日就師尚父齋宿三日折行西向再拜受丹書焉而壹不備其官將王徳無于此闕乎是明聖之所不為也其謂官不必備者難其人即不必其備可也而何可一無設也故三公不設而以為兼官若加官也周季世之事非公本所為建官意也曰周六服有羣辟經不具何也曰六服有分土矣羣辟有君道矣教不易政俗各因方王何敢知焉六卿分職列屬王朝王畿井井秩秩而九牧有倡也且建牧立監太宰主之正畿疆立社稷大司徒專之太史掌其典職方掌其籍大行人掌其禮盖邦國六典咸受成於六官於王治豈有外哉記曰天子三公合以執六官均五政齊五法倡九牧以御治此之謂也周禮六官存亡周禮之亡也非真亡也雜之者誣之也周禮之不果行也非不可行也泥之者累之也以周禮之僅存而亡於不善學者之襍廢於不善用者之泥也則聖王之法將遂至於壞亂而其心思之所繼於是乎益窮古先聖王治天下之大經大法其可見於今日者莫如周禮周公相成王明聖述作躋世太和一時生養斯民之道固已備矣然猶慮天下之大後世之逺無經制以維之則其勢必不能無敝於是兼三王施四事夜以繼日竭吾精神心術而為之舉其大綱則其建官以六典其兵農以井田其取民以什一其養士以學校其治天下以封建其威民以肉刑及其節目則八法八柄九貢九兩之序祭祀朝覲冠昏喪紀師田行役之詳内而王宫閽寺嬪御絲枲之事外而畿甸侯衛要荒蠻貊之宜繁而星躔卜筮醫巫工作之技細而昆蟲魚鱉鳥獸草木之微罔不具備彼其處心積慮上徹唐虞下垂萬世縱嗣有辟王而其法制猶可維持而未墜者頼有周禮在也孔子去周公未逺而曰文武之政布在方䇿當時周禮在魯所謂方䇿者豈即周禮耶孟子當戰國時始言諸侯去先王之籍豈周禮在戰國時諸侯即已去其籍耶遭秦焚書至籍散逸漢人得之煨燼之餘斷簡殘篇編帙散亂而冬官遂亡河間獻王購以千金不得劉徳輩乃以考工記補之夫使冬官而果亡也則其補之也固無不可鄭𤣥又從而註之夫使考工記而果可以補冬官也則其註之也亦宜今以周官考之自冡宰司徒宗伯司馬司冦而下曰司空掌邦土居四民時地利則掌邦土者司空職也又以六典考之自治典教典禮典政典刑典而下曰事典以冨邦國則冨邦國者司空事也夫所掌而曰邦土則凡任土度地封域之廣輪民物之衆寡井牧之所經畫焉者皆邦土之職也而所謂建邦土地之圖與其人民之數制其畿域設其壇壝與夫土㑹土圭之法井邑丘甸之制正冬官之所專掌也而何以襍於地官之職乎以至載師封人遂人里宰之類此任土之職也何以屬之邦教土方形方之類此封域之職也何以屬之邦政野廬蜡氏墓大夫之類此道路塋域之職也何以屬之邦禮邦禁其他如掌次掌舎幕人之類則皆以居舍供王之役者又何以屬之邦治乎觀此則其掌邦土之職散見於五官者可知矣邦國而曰冨則凡山林川澤百材所自生庶物所自出財用之所取給焉者皆富國之事也而所謂辨九土之名物制天下之地征教之樹藝歛其財賦與夫土冝土均之法鳥獸草木之繁正司空之所有事也而何以概之司徒之事乎以至虞衡獸􅈄塲圃司稼稻人之類則樹畜之事也何乃屬之安邦國山師川師之類則珍貢之事也何乃屬之服邦國雍氏萍氏柞氏薙氏之類則藪澤之事也何乃屬之詰邦國其他如巾車典路司裘司服追師染人之類則皆製車服以供王之用者又何乃屬之平邦國和邦國乎觀此則其富邦國之事襍出於五官者可知矣且以小宰所掌之六屬考之一曰天官其屬六十二曰地官其屬六十三曰春官其屬六十四曰夏官其屬六十五曰秋官其屬六十六曰冬官其屬六十六官屬合三百六十大事從長而小事專達未嘗有餘欠也今以周禮所載之五官觀之天官之屬六十而羨其三教官之屬六十而羨其十有九政官之屬六十而羨其九刑官之屬六十而羨其六冬官之屬乃獨全闕焉餘羨於彼而全闕於此獨不可取盈乎故冬官錯襍於五官而其職尚在是名雖為亡而實未嘗亡也漢儒補以考工記而其職遂亡是名雖為補而實則已亡也盖徒以司徒之為地官遂以土地物産之事盡歸地官職掌之中而不知司徒之掌邦教豈以度地居民之職皆為司徒教化之事乎矧以司空之官而槩之以飭化八材之事則其所以率屬者其止於百工之職已乎以冬官之典而盡之於審曲面勢之能則其所以佐王者其止於工事之式已乎或者因此遂指為漢儒附㑹之説不知其所附㑹者止於考工記一編而不可以病此書之全也或者又謂為文王治岐之書不知其所載者皆為天子之事而不可以言侯國之舊也或又因其九伐正邦四時教戰遂詆為戰國隂謀之書不知寓軍政明教化此先王仁義之師也豈可以隂謀毁哉或又因其九賦歛財九式均用遂指為成周理財之書不知倡九牧阜兆民此先王惠養之政也豈專為理財設哉井田世業萬世之良法也而王莽以之稔新都之亂則以土田刼奪既失民心而泉府市司擾害流於市里大非先王養民之本意矣况其以簒竊之奸而播毒痡之政其致亂豈特不善用周禮之失哉阜通貨賄九職之所任也而王安石以之釀靖康之禍則以均輸專利已非國體而青苗手實捜括徧於閭閻大非先王足國之常經矣况其以偏執之資而引凶邪之黨其釀禍豈特不善用周禮之失哉善學者誠能因其缺以求其全師其意而不泥其迹則先王之治法復明而聖人之心法可見矣嗚呼有闗雎麟趾之意然後可以行周官之法度周公之制禮其仁天下之心為之也欲求聖人之法者求之聖人之心而已矣我國家稽古建官六卿分職禮樂明備典則昭垂其於成周建都立極之意固已得之而損益盡善至於冬官之書則俞廷椿呉幼清諸先生相繼申明之而聖王仁天下之心可復覩其全矣雖然周公以内宰嬪婦宫正宫伯皆頒於天官而内府外府之出入服御庖膳之上供亦皆與焉其意㣲矣人君之寢處起居食息賜予冡宰莫不與聞而所以防微杜漸者得以預為之所至於師氏保氏之職所以詔王媺而諫王失者又諄諄焉其所以養君心而正朝廷以及天下者固大臣職也成王之為令主也有由然哉周禮總意善讀古人之書者在師其意而已矣苟得其大意而觀㑹通焉則參互變易而法制之周莫非美意之敷施也若徒泥其迹則或詳於此而畧於彼或行於古而不可行於今或原錯簡闕文或後人増竄雜亂俱莫之能辨矣曽謂讀周禮者可以局見拘泥之哉况先儒一是一非各有成説其書出自周公與否無論已彼體國經野設官分職後代法雖變更意多沿襲獨官府一體兵農一致教士于鄉而選舉之三事於治體所闗尤切乃後王皆莫之祖述焉則深可慨也嘗讀天官篇見其浩然廣博靡不併包森然詳密靡不貫徹真如天之含容徧覆無一物不在其生生中也非聖人既竭心思何其法之美善一至此哉盖惟王宫后宫莫非冡宰所統故宫正而下主宿衛及王之左右内宰而下主内政及后之左右無非欲王之贊襄使令罔非哲人常變守衛罔非吉士一匡王以正也所以王后世子動有式法寺人内豎悉有禁令王誰與為不善哉視後代宫中事宜雖宰相莫得預聞者相徑庭矣然此惟得其宫中府中相為一體之意而變通之可也不然古今時勢懸隔非特天子與邦君送迎揖讓后妃夫人與尸賓獻酧後世不可通行如宫閫之内豈府史胥徒所得與九嬪世婦豈内宰所教乎但宫府統攝内外聮比此則天下根本所繫真世世不刊之典也大司徒地官主土與民大綱在分土居民之法比閭族黨州鄉以施教化遂溝洫澮以正疆界通水利井邑丘甸縣都以稽民畜起徒役而伍兩卒旅軍師之法寓焉是民制起於比閭鄰里兵制起於伍兩卒徒居則相與荷耒耜以相耕耨出則相與荷戈盾以相戰守所以人服習而政便安上易事而下易使也以此較之後世民自為民出粟以養兵兵自為兵出身以衛民兵農兩病者大不侔矣何先儒之論止知王國六軍取足於六鄉是六鄉七萬五千家出六軍七萬五千人則六鄉人人盡用嵗無更休縣遂都鄙居然無事何勞逸不均也况王國止此六軍則公私之田孰與耕穫天子巡狩征討之類孰為之迭用哉不知比閭族黨州鄉惟以服役守禦猶後世京軍主居守王畿為國本也伍兩卒旅軍師實通王畿千里之内更休而迭調之猶後世郡國調遣更畨上直之兵也鄉言教而遂言農彼此正可互觀以民數起兵數鄉遂實非偏重此兵農合一周制所以為至善也得此意而變通之非治世良法而何王教莫先於鄉故以鄉三物教萬民嵗時讀法于以攷其徳行察其道藝凡有賢者能者則書之三年大比則興其賢者能者而賓之由是鄉老鄉大夫獻賢能之書於王王再拜受之豋之天府是教之於鄉莫非徳行道藝之術而賓禮於鄉莫非徳行道藝之人其視後世上之所教下之所學競習辭章獵取聲利不知六徳六行六藝為何事及舉賓興之典則糊名易書若將以奸竊待之而士一進用則盡棄向之所習以徼功利於宦途者胡可同日語哉世主不欲比隆成周則亦已矣如欲親覩聖主徳化則鄉舉里選之法舍周禮將安取衷哉但鄉遂一也遂亦有秀民之可教有賢能之當舉也何為徳教止行於六鄉而不被之於六遂乎若曰六鄉在國國多士故鄉大夫之屬主乎教六遂在野野多農故遂大夫之屬主乎事又曰遂之秀民悉升之鄉而教焉則遂之民何不幸而見棄於王教耶即此變而通之教之鄉舉之鄉者亦可行之遂則是法也雖萬世可無弊也可見三者之善亦當師其意不泥其迹周公良法美意迄今猶存周禮可行之古亦可行之今矣故程子曰必有闗雎麟趾之意然彼可以行周官之法度非周禮辨聖王治法自大徳而川流不俟更改而後定其禮經自神化而模冩非有思勉而後成欲窮之者如登太華即之而愈峻如涉滄溟測之而愈深故先儒讀經無疑至有疑有疑至無疑思而不得鬼神將通之然後為庶㡬耳豈若史書集文粗畧淺近一覽而盡得其㫖義乎非周禮者若林孝存何休輩不下數家指摘瑕釁無如胡仁仲之詳著書數十萬言辨析精㣲無如季徳明之苦移易周禮者若呉幼清余壽翁王次㸃輩亦不下數家參互演繹集成後出莫如舒國裳之備以愚觀之胡氏謂大宰六十屬無一官完善者其説淺陋未見其的然不可破才髙之人乍見而不領畧遂置不復思任意剖決雖欲自絶於經何損哉舒氏作序辨圖釋剔偽繼之定本夫先王之法本安也而人自不安聖人之書本明也而人自不明各以其意見為之更定初若快意以語不知似乎可觀回視作者精義其謬何啻千里王畿侯國地方里數先儒紛紛之説以為王畿中鄉遂都鄙輕重異制畿内外寛簡異法三等侯國亦有多寡不同大率不明里數以四面方里而計地少三倍夫孟子方里而井此方字為實故謂四面方一里為一井地方千里地方百里此方字為虚猶地面地土之云故以午貫一直而計四面各皆千里百里斯乃為實若以四面總計則方千里者止二百五十里方百里止二十五里而已又泥於同十為封封十為畿之説地又少數倍不知同十為封者言自此以上乃可以封國若上公當有四十封之地十同者極小之封耳封十為畿者諸侯封國大者食實封一百二十五里小者五十餘里故十倍之為畿耳苟封國止十同之地一直不過七十餘里齊魯諸國若費邑即墨皆原封疆也數百里之廣奚止於七十里十封之地為百同四面總一千里一直止二百五十里周都闗中沃野千里又兼成周之地豈若是小耶包咸何休謂一同百里即諸侯百里之地諸侯合有車千乗一同之地亦當出車千乗故謂一同出車十乗一通出車一乗夫一乗百人數不可缺也地有上中下約之為一井四家數不能増也以四十家而出百人二家内應出五人有是理哉其弊皆因指定四面為百里又限於諸侯千乗遂為此説以合之也季氏以方里為井為一里故謂公侯之國方百里提封萬井為里者萬大國三軍則每井當出三人七十里之伯國當積五十里是半於公侯次國二軍則每井當出四人子男方五十里為方里者二千五百里又半於伯也小國一軍每井亦當出四人此則計侯國原出車之數止計其三軍二軍一軍又謂每軍止萬人遂生出三四人之説獨不思一井有上中下受地止於四家而出四人止可以供軍將何以耕田而别有所為乎馬氏則據司馬法成方千里出革車一乗以百井而出一車百里之封為方十里者百僅出車百乗不及千乗之數因増為三百一十六里有竒以附於周禮封疆方四百里之説季氏亦據成方十里出車一乗同方百里提封萬井出車百乗同十為封十萬井出車千乗封十為畿畿方千里百萬井出車萬乗遂以謂成出車一乗積至百同為萬乗此畿内之制通出車一乗積至十同出車千乗此諸侯之制謂畿内地寛侯國地窄所以不同夫謂通出車一乘者固不足道若謂成出車一乘民亦不堪命謂天子之車止此萬乗亦限於以四面總計為千里故不知有更休之法且天下之民一也豈有内輕外重遂差十倍之逺哉愚之計地以午貫一直而論中間所包有數倍之多故天子之地四面一直千里上公一直五百里至男邦一直百里其地既廣名山大川不以封封内惟有小山川除其三分之一故以天子計之為田一千六百同每同出車百乗此乃備車之數猶今十排年人盡兵也通王畿一十六萬乗司馬法所陳是也有簡稽之數為更畨調遣而設即府兵之制猶今之該年每十乗而稽其一通王畿内一萬六千乗經傳所稱天子萬乗是也有用軍之數為大師大田征行而設即後世從征之士猶今里甲之當直者天子止於六軍為大司馬教閲之軍大雅棫樸云周王于邁六師及之是也其調遣之法於該年輪流而徧侯國之制亦每同出車百乗當有數千乗亦猶今之十排年也其簡稽之法十年一輪故止稱千乗至於所謂三軍二軍一軍者亦該之當直者耳是故王畿侯國鄉遂都鄙出車之數並無多寡不同斯民之役並無勞逸異制自王國以達於四海均平普徧所以為萬國咸寧之道也或疑禹㑹諸侯於塗山執玉帛者萬國武王伐殷諸侯不期而㑹者八百如周禮封侯之大安得有此國數耶盖公食者四之一侯伯食者三之一子男食者半則其餘皆為附庸且附庸之封必小不過一二同之地故寰内無害其為數千國矣諸侯封地實封食禄按書武成孟子王制所言畿封之制多有牴牾愚嘗以周禮為據而後得其説也凡封國有管轄之地有實封之地有所食之田周禮上公之地方五百里侯方四百里伯方三百里子方二百里男方百里即詩之錫之山川土田附庸司馬遷所謂周封伯禽康叔於魯衛地四百里太公於齊兼五諸侯地正與周禮制合此管轄之地也其言食者半三之一四之一此其實封之地今觀春秋齊魯等國封疆皆可驗也孟子所言君十卿禄者大國君田三萬二千畆次國君田二萬四千畆小國君田一萬六千畆此一嵗君所自食之禄也故以司馬法同封之制合職方氏封國之法而計之天子千里之地為田一千六百同出車一萬六千乗徒一百六十萬人諸公地方五百里為田四百除附庸之國其食者四之一實封田一百同出車一千乗徒十萬人故為王畿十分之一若如王制拘以百里止得天子百之一而已侯之地四百里為田二百五十六同除附庸之國其食者三之一實封田八十五同出車八百五十乗徒八萬四千人伯之地三百里為田一百一十四同除附庸之國其食者三之一實封田四十八同出車四百八十乗徒四萬八千人子之國二百里為田六十四同除附庸之國其食者半實封田三十二同出車三百二十乗徒三萬二千人男之地百里為四十六同其食者半實封田八同出車八十乗故以千里之地大約封公者四國其食者四之一封侯者六國封伯者十一國其食者三之一封子之國二十五封男之國百其食者半自所食皆為附庸之國矣若如王制之説州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國即如方百里之國為田十六同出車一百六十乗大國三軍合用三百七十五乗將安取辦乎此其説誠不可通矣畿田采地孟子云天子之卿受地視侯大夫受地視伯元士受地視子男王制云天子三公之田視公侯卿視伯大夫視子男元士視附庸周禮載師以家邑之田任稍地以小都之田任縣地以大都之田任畺地大約公處於大都孤卿處於小都大夫處於家邑夫天子畿内之地不過千里苟三公之田視公不㡬於半天子之疆乎是不然王畿之縣都不世量山川人民以為都邑而使掌其治教賦税非若諸侯之封國割其地以與之故天官九兩一曰牧以地得民二曰主則以利得民而已所謂受地者但可言其所食與出封耳且孟子王制所述視地有不同者嘗觀春秋所書王臣三公稱公卿稱伯中大夫稱子下大夫稱字元士中士稱名下士稱人列國惟命卿以名登於册大夫謂之㣲者稱人而已故周禮掌客云三公眡上公之禮卿眡侯伯之禮大夫眡子男之禮士眡諸侯之卿禮庶子一眡其大夫之禮典命云王之王公八命其卿六命其大夫四命及其出封各加一等故三公在朝則食大國君之祿出封則為上公之國六卿在朝則食次國君之祿出封則為侯伯之國中大夫在朝則食小國君之禄出封則為子男之國下大夫食大國孤之禄出封附庸之國元士之爵眡諸侯之卿中士之爵眡諸侯之大夫下士之爵視諸侯之上士而其禄則自下大夫而下並與諸侯之臣同何嘗如王制所云天子縣内凡九十三國耶盖惟畿内不以封也故大而縣都小而公邑皆可以治如召公之循行南國畢公允釐東郊銜命而往單車可代自無僭逼之嫌苟如孟子所言萬取千焉則非惟無是地而亦必至於簒弑之相尋矣苟如王制所封之地又何必設朝大夫都宗人都司馬都則都士等官而以八則馭之乎惟其禄視夫諸侯之所食是故公食三百二十井三公為田九百六十井孤卿食二百四十井三孤六卿為田二千一百六十井中大夫食一百六十井周禮五官共中大夫三十一人合冬官不過四十人之數為田六千四百井雖舉朝公卿中大夫之禄不過九井五百餘井尚不及十同公田故雖告老而猶食於家必有大故而後收其田里八柄所謂奪以馭其貧也及其身没而子孫猶得世其禄盖非世其公卿大夫之禄也記曰天下無生而貴者天子之元子士也是故無大夫冠禮而有其士禮盖但世其士之禄耳故仕者之子孫賢則命之爵不賢則禄足以代耕圭田足以祭祀所謂天子有田以處其子孫也故以畿外邦國言漸逺所尊者雖大如上公不過天子十分之一已執夫居重馭輕之勢小如子男亦出兵車百餘乗而足以守宗廟之典籍以畿内縣都言密邇所尊者子弟雖賢而不世自足以待無窮之賢縣都雖大而不有自不虞夫僭逼之患至其後世王畿則子弟襲封侯國則大夫世爵而有孟子大家弑奪之説諸侯則併吞附庸大夫則分裂公室而有孔子陪臣執國命之譏與夫王章一掃而空而封建遂為一大弊矣大抵孟子之説畧王制之説拘惟一據夫周禮以圖攷之然後知其立法之妙而可以盡見夫先王精意之全也或疑諸公方五百里其食者四之一為一百二十五里諸侯方四百里其食者三之一為一百三十三里則侯國地反多於公乎是不然經文於封疆定其里數而其食則就其中為之等而未嘗定其里數盖地大則中包廣而外之里數反少地小則有四邊而外之里數反多不可以里計也故公田四百同四之一為實封一百同侯田二百五十六同三之一則為實封八十五同此其多寡之數自有等級而不相混矣或又以諸男實封八同出車八十乗小國一軍合有一百二十五乗此則一軍而不足何以立國乎盖八十乗之車為三師而有餘故或益之地以足一軍之數或止於三師亦可以應敵其制不可得而詳矣畿内畿外班禄之制按司禄雖缺然以孟子春秋攷之則炳如也孟子曰大國地方百里君十卿禄卿禄四大夫次國地方七十里君十卿禄卿禄三大夫小國地方五十里君十卿禄卿禄二大夫自大夫而下則三等之國皆大夫倍上士上士倍中士中士倍下士下士與庶人在官者同禄禄足以代其耕而耕者之所獲則有食九人至五人之五等庶人在官者其禄以是為差夫國有實封之地大司徒其食者半三之一四之一是也有所食之禄君十卿禄而下是也自卿而上大臣與君同休戚故三等之國隨其大小下於君十倍自大夫而下少則無以為食故三等之國命雖不同而禄無隆殺自下士而下則取足以代耕而以耕者之所入為差畿外君臣之禄不過如此至於畿内臣庶之禄孟子所述卿大夫元士之禄與諸經不合攷之春秋三公之爵稱公則當同大國君之禄卿之爵稱伯則當同次國君之禄中大夫之爵則當同子男之祿下大夫稱字則其爵視附庸之君與大國之孤而禄之所入亦當視附庸之君盖半於小國之君也觀秋官掌客諸侯待王臣之禮三公視上公卿視侯伯大夫視子男亦與春秋合當以之為證可也其元士以下若依命數而賜禄歟則元士視列國之卿中士視其大夫下士視其上士若以人衆不可有加於侯國歟亦當視其三等之士惟此為不可攷耳夫公卿大夫士庶之禄皆給自公田官吏有更易而田賦無増減田為母而官吏為子苟給之以田永為常業亦已足矣必入於司祿而後給之者盖嵗有豐凶功有上下故必收於官而給之所謂家削之賦以待匪頒且以示君上養賢之意也其公卿大夫各有采地而其所以治夫采地者又各有官盖治王朝官府之事則食在朝家削之匪頒治甸稍縣都之地則又當食采地之常禄如宋朝之兼官則有兼禄亦優厚君子之道而其所統鄉遂都鄙之吏則各食於其地八則所謂禄位以馭其士大約一視其爵以為禄也然則司禄所掌亦不過此而周室班禄之制庶㡬無不可得聞者乎已上數段雖孟子之説不以為然其尊信周禮亦至矣且其説各有據故併録之亦以見攷古者不可執泥一説也周禮總論馬端臨氏曰經制至周而詳文物至周而備有一事必有一官毋足怪者如閹閽卜祝各設命官羞服泉貨俱有司屬自漢以來其規模之瑣碎經制之繁密亦復如此特官名不襲六典之舊耳固未見其為行周禮而亦未見其異於周禮也獨與百姓交涉之事古今異宜盖三代之時寰宇悉以封建上之人所以治其民者不啻如祖父之於其子孫田土則少而授老而收又從而視其田業之肥瘠食指之衆寡而為之斟酌區畫俾之均平貨財則盈而歛乏而散又從而補其不足助其不給或賒或貸而俾之足用所以養之者如此司徒之黨州縣鄉遂嵗時讀法攷其徳藝糾其過惡而加以勸懲司馬之鄉旅師軍四時大田行其禁令而加以誅賞所以教之者如此其事又似繁擾而不見其為法之弊者盖以私土予人痛癢相闗脈絡常相屬雖其時所謂諸侯卿大夫者未必皆賢然既世守其地世撫其民則自不容不視為一體既視為一體則姦弊無由生而良法可以世守矣自封建變而為郡縣國家之法制率以簡易為便慎無擾獄市之説治道去太甚之説遂為經國庇民之逺猷所以臨乎其民者未嘗有以養之也苟使之自無失其養斯可矣未嘗有以教之也苟使之自無失其教斯可矣盖壤土既廣則志慮有所不能周長吏數易則設施有所不及竟於是法立而姦生令下而詐起處以簡靖猶或庶㡬稍涉繁夥則不勝瀆亂矣則知周禮所載凡法制之瑣碎繁密者可行之於封建之時而不可行之於郡縣之後必知時適變者而後可語通經學古之説也周禮總論自漢惠除挾書之律孝武建蔵書之䇿齊魯諸儒執經競進傳儀禮者始於髙堂生傳大戴禮者始於瑕丘蕭奮周禮之書未出也河間獻王得諸李氏而因以上諸秘府維時學官博士顓門持業非其師説不稱而謷然求所以相勝一有異聞隨聲羣詆漢武帝以為瀆亂不經之書盖諸儒之説誤之也自劉歆好之賈鄭父子習而宗之其説遂稍傳於世至王仲淹氏曰周禮其敵於天命乎朱仲晦氏曰周官布濩周密乃姬公運用天理之書盖至於是而其論始定矣然六官之中惟冬官缺焉河間獻王補之以考工記取工匠器械之事與治教政刑躋而並列遂使其書不信於天下故世儒譏之曰累周禮者劉徳也非此之謂耶乃潛心是經者又網羅遺失探討尋繹各以意見而為之説宋葉時之補亡元吳澄之考註其最著者也時之言曰秋官有典瑞夏官有量人天官有染人地官有鼓人以至巾車司裘司弓矢之職秩然具在盖謂冬官實未嘗亡而散見於五官之中也澄之為書麗内史司士於天官麗大司樂諸子於地官麗封人收人於春官麗銜枚司𨽻於夏官麗司􅕝司稽於秋官而縣師㕓人等職則以為冬官之屬盖謂五官互見而冬官亦未嘗缺也主葉氏之説則冬官獨專而五官反淆主呉氏之説則詮次失倫而意義乖析矧俞廷椿之復古編王次㸃之訂義丘吉甫之全書紛紜錯綜莫知所適與之論議其不為聚訟者㡬希矣此愚之所未解也夫詩書六藝之教必折衷於孔氏矣孔氏之春秋也終於獲麟距隠桓之世未甚逺也甲戌己丑夏五紀子伯之訛皆因之而不改故其言曰多聞闕疑又曰盖有不知而作者我無是也六經自秦火以後書亡四十三篇二雅各亡其六篇於聖人之經則何嘗有所損哉孟子之言班爵禄曰其詳不可得而聞也班固之論禮經以為自孔子時而不具也諸儒生於數千載之下乃欲掇已去之籍輯煨燼之餘而以己意為之傅㑹是其智有加於孔孟然則聖人之經終不可明乎盖聖人之經聖人之心為之也嘗觀周禮一書纖悉具備自天官大宰以逮於薙氏柞氏自八典八則以逮於草木昆蟲品式條貫布濩流衍而淵然盎然者實充塞於其間膳饈至瑣也何與於天官鉅細一也内政至密也何與於大宰宫府一也馮相保章司天也何與於春官天人一也遂師司田野也何與於夏官兵農一也山澤倉庾民所需也何與於司徒富與教一也當姬公制作之日竭心思以通於三王其精神貫徹而無所壅閼其統紀相維而無所隔閡即五官之篇皆冠之曰體國經野設官分職以為民極極之為言中也洪範所謂建其有極者也建極之義宜專屬於教典而奚各冠於五官嗟乎此其義難言矣沉思於度數之外而冥㑹於義象之表則冬官雖缺無害也固不必强為之解亦不必更置而互易之也必欲櫛字比句以今人之法而配諸古人則其鉅者已析之而使二而矧其瑣瑣者也竊恐侵尋不已全書遂亂是昔之周禮亡其一而今之周禮亡其六聖經之不明吾不知其所終矣自是書之出習而用之者何限劉歆著録畧而六幹五均託名於泉府王介甫訓釋萬餘言而青苖市易藉口於國賦蘇綽用其五六而不足以治周蘇威用其八九而不足以治隋彼周與隋循迹用之猶曰無益於治耳劉歆王安石窮年矻矻敝其精神於訓詁而卒以其術禍天下窮經不明之害一至此極乃世之逞其説者猶紛紛而未已也可怪也夫今之言學術者必曰黜百家尊孔氏然莊周斵輪之喻至今學者稱焉顧沿襲口耳醊聖人之糟粕而又以己意亂之上之背闕疑之訓下之蹈斵輪之譏其惑也亦甚矣藉謂愚之言均之臆決然猶就古人之成書而論之也盖太史公論帝徳帝系二紀曰總之不離古文者近是而申公之授詩也疑者則闕而弗傅是孔氏信而好古之教也圖書編卷十三
