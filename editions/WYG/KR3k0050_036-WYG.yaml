body:
  text: 圖書編巻三十六明章潢撰南直隸圖叙南直隸古揚州地南京即六朝舊都也我祖宗創業實基於此然限南北古今恃為天險周時已有王氣秦始皇謂東南有天子氣諸葛亮謂龍蟠虎踞真帝王之都即此地也江北則徐潁二州鳯陽府所屬地跨中原𤓰連數省竝稱雄鎮故淮安特建兵府漕運衙門守以文武重職雖職司轉運亦示控扼之勢焉江南則安慶當長江委流西全楚江西湖廣俱楚地為江表門户沿海兵戍本以備倭而崇明常熟俱蘇州府屬縣之民間作弗靖與江洋一帶出没波濤四行摽刼者不可勝計故今江防海備其重一也若廬州則民習游惰地不盡利鳯陽習俗本同加以髙墻留守之冗費故皆易以告饑蘇蘇州松松江則田賦不均供億日困豐沛俱徐州屬縣之間濁河汎濫幾淪魚鼈轉餉既艱民亦凋瘵蓋水患莫甚於斯者也徽州多山少田民逐末利風俗用偷池州在山麓江滸軍民統理不一冦盗因以竄匿鎮江則當京口之衝鑿山圍水海潮出沒土田嵗易處謂山田多荒四圍田多坍江民勞甚矣沿革古金陵之地自周末時已有王氣秦始皇謂東南有天子氣諸葛亮謂龍蟠虎踞真帝王都即此地也吳晉宋齊梁陳及南唐雖嘗於此建都然無功徳以當之僅保一隅不能混一天下至我太祖髙皇帝隆盛奄有四海乃定鼎於此為京始足以當形勢之勝永樂中於北平肇建北京正統中以北京即為京師遂以此為南京實根本重地云南直隸府十四屬州一十三縣八十七又州四屬縣八總為里一萬三千七百四十三戶一百九十六萬二千八百一十八口九百九十六萬七千四百三十九夏秋二税共米麥五百九十九萬五千三十四石絲一十萬九千九百一十兩絹三萬八千四百五十二疋麻布二千七十七疋鈔八千七百七十錠馬草五百八萬四千二百一十七包兩淮海運司額辨小引鹽七十萬五千一百八十引鹽運一在揚州領鹽課司三十淮安九泰州十通州十一親軍衛一十六屬州一百一十二守禦千户所一在京屬府衛三十二屬所一百九十六守禦千戶所一在外直隸衛二十八屬所一百四十五守禦千户所十五中都留守司領衛八屬所四十守禦千户所一京營馬歩官軍舍餘共十二萬有奇在外衛所除中都留守司南京北直隸山東河南各二班京操外馬歩官軍舍餘共四萬四千八百南京太僕寺所屬應天等府種馬凡數萬疋欽差總理糧儲兼巡撫都御史四漕運駐淮軍務駐杭浙直巡撫鳯陽一應天一都御史操江一巡按御史三泗州一蘇太平一州一提學御史一巡鹽御史一印馬御史一巡倉御史一應天府其名楚金陵秦秣陵吳建業晉建康元集慶勲戚豪右舉動掣肘煩劇為最素號難治其屬縣八附郭上元二百二里冲煩一年一差江寧七十四里兩縣俱差多民困外句容二百五十一里冲煩好訟溧陽二百二十六里好訟頗煩溧水二百五十五里訟煩民饒江浦二十里冲煩六合十七里軍民雜治難髙淳十二里簡刁其形勝龍盤虎踞四方根本赤山為成臯長淮為伊洛鍾山為曲阜大江為黄河三吳為東門荆蜀為西户七閩二廣為南府其俗君子勤禮小人盡力風流人物冠映古今鳯陽府其名古濠梁鍾離陵寝重地差少糧少冲煩難治其屬州五縣十三附郭縣鳯陽三十九里冲煩軍民雜外臨淮四十里煩疲定逺三十三里煩虹十九里訟煩民疲懐定四十八里差重煩冲五河二十五里水陸冲煩夀州四十八里水陸冲煩好訟霍丘二十七里煩饒僻蒙城三十八里裁煩朴泗州五十里水陸冲煩多盗民淳旴􅇇三十七里多盗水陸冲煩天長十里簡多訟頗饒宿州七十里冲地荒民頑訟多靈璧四十一里煩冲潁州五十五里水陸冲煩頗饒潁上十三里冲煩太和三十里僻饒多訟亳州四十一里僻煩多盗其形勝連三吳引荆汝通江淮接中原其俗尚武勤農蘇州府其名古吳會姑蘇東漢吳郡宋平江地肥􅇤俗淳澆相半民冨秀而輕侈冲煩其屬州一縣七附郭吳縣五百二里冲煩差重訟刁崑山四百五十一里冲煩差重常熟六百四十一里冲煩民刁差重多盗吳江五百六十七里冲煩糧重民疲嘉定六百六十八里僻煩糧多太倉州二百三十里近海冲煩民刁有盗屬崇明二百二十里多盗民頑惡煩其形勝具區之藪五湖之浸海陸之饒水國之勝麗湖海吞大荒其俗士風清嘉習尚奢靡松江府其名晉雲間糧多差重煩劇旱則東鄉収潦則西鄉困好訟上海尤甚屬縣二附郭華亭八百四里糧多差重民刁外上海六百三十一里糧多訟煩其形勝負海枕江平疇沃野其俗淳秀之風興仁之尚魚鹽之利常州府其名古延陵漢毘陵晉晉陵百姓富冲煩俗悍糧欠訟多屬縣五附郭縣武進四百二十四里冲煩刁外無錫四百二里冲煩刁糧多差重江隂四百二十九里僻煩刁多盗冝興三百十里僻頑靖江五十五里事簡盗多其形勝三江雄潤五湖腴表山長水逺氣秀地靈其俗克遜尚義秀而多文鎮江府其名吳京口宋南徐唐丹陽沿江浩煩冲劇有盗屬縣三附郭丹徒二百七十里冲疲多盗外丹陽二百七十里冲煩金壇二百三十六里僻煩饒其形勝東通吳會南接江湖西接漢沔北拒淮泗内連天塹外蔽京畿其俗小人尚戰君子習禮揚州府其名古淮海維揚漢江都廣陵北齊江陽水陸冲煩防倭費處屬州三縣七附郭江都一百十八里冲煩兵費外儀真十四里煩疲多盗泰興一百一十二里刁僻防倭髙郵州八十里冲刁煩屬興化七十二里僻刁煩寳應三十里冲煩刁貧泰州一百七十八里僻煩有徒草冦屬如臯四十二里僻簡通州一百十五里近海多倭患海門三十九里邑小僻簡有倭患其形勝東南佳麗江淮都會其俗輕揚繁侈儒雅朴野淮安府其名古淮隂晉山陽四通八達兩京要路冲煩劇疲其屬州二縣九附郭山陽一百二十一里煩冲劇疲外鹽城八十五里僻有鹽盗清河四十六里冲煩有水災安東五十五里僻疲糧欠桃源四十八里貧冲有鹽盗沭陽八十一里簡僻有鹽盗海州一百十六里貧煩難治多鹽盗屬贑榆五十六里貧煩難治邳州四十七里冲疲煩悍屬宿遷五十九里貧冲睢寧二十六里僻簡糧欠其形勝南北襟喉江淮要衝其俗强悍習戰淳實尚義廬州府其名漢廬江合肥金斗西南山多路險民俗淳頑相半易治屬州二縣六附郭合肥六十里頗冲近淳外舒城四十五里俗薄刁廬江十四里刁無為州四十九里簡富横刁臨江有盗屬巢三十里僻饒濵江刁盗六安州七十里僻刁有盗屬英山二十七里山險民刁霍山十二里山險淳煩其形勝淮右襟喉江北唇齒其俗尚力習鬭多業農賈安慶府其名古皖城舒國晉熈隋同安冲煩民頗淳其屬縣六附郭懷寧四十六里冲煩而澆外桐城五十九里冲煩淳饒潛山五十八里冲煩民刁太湖六十五里山險水冲難治宿松四十六里衝煩民疲糧欠望江二十二里民貧悍衝煩其形勝淮服屛蔽江界要衝其俗尚淳好儉賤商務農太平府其名古姑熟晉當塗府當水陸衝煩屬縣三附郭當塗一百六十九里民淳朴外蕪湖三十八里商民雜衝煩繁昌十二里僻簡其形勝左天門右牛渚東鐵甕北石頭采石之險甲於東南其俗士質民儉人安物阜寧國府其名漢丹陽晉宣城事煩頗衝屬縣六附郭宣城二百十七里刁劇寧國六十里稍衝多盗涇六十四里衝多盗刁煩太平十九里僻淳南陵八十八里多盗刁疲旌徳四十一里僻在山中徤訟多盗其形勝作藩南夏據吳上游其俗和柔囂豪詭浮池州府其名古池陽隋秋浦沿江土肥衝煩其屬縣六附郭貴池二十七里衝煩頗饒外青陽十六里饒刁難治銅陵十六里瘠煩石埭十三里僻朴建徳九里民奸東流七里僻瘠稍淳其形勝山川清曠其俗民淳氣和徽州府其名吳新都晉新安僻山煩悍多訟民饒其屬縣六附郭歙三百十五里好訟刁民饒頗煩休寧二百五里刁訟煩民饒婺源一百六十四里訟煩悍近多礦賊祁門四十六里頗煩淳饒黟二十四里簡悍頗饒績溪二十五里簡稍疲其形勢山水幽竒其俗務竒喜鬭廣徳州其名桐汭二百五十三里煩衝民頑糧欠其屬縣一建平一百四里刁其形勝三峰拱前溪流枕後其俗力田尚鬼和州其名晉厯陽宋南豫四十一里軍民雜煩刁衝其屬縣一含山十八里頗淳其形勝江淮水陸之衝姑熟金陵之蔽其俗躁勁果决滁州其名滁陽東晉南譙唐永陽三十里刁衝頗煩多訟盗其屬縣二全椒十里刁煩來安七里淳簡其形勝山髙水清形勢深秀其俗簡訟尚儉徐州其名彭城南北咽喉軍民混雜好訟風氣强勁衝煩近罹水災多逃移逋糧其屬縣四蕭四十六里煩碭山二十五里刁煩豐一十九里刁煩沛二十七里刁煩其形勝汴泗交流岡嶺四合其俗朴直舒徐南京畿内之府十有四曰應天金陵秣陵建業建康集慶煩劇難治曰鳯陽濠梁鍾離衝煩難治曰蘇州吳會姑蘇吳都平江衝煩地􅇤俗淳澆相半民冨曰松江雲間饒煩曰常州延陵毗陵晉陵百姓富衝煩曰鎮江京口南徐丹陽衝曰揚州淮海維陽江都廣陵江陽䢴江水陸衝煩曰淮安淮隂山陽楚州漣水淮安軍四通八達兩京要路衝煩劇曰廬州廬江合肥金斗昭順保信軍西南山路險俗淳煩相半曰安慶皖城古舒晉熈同安徳慶安慶軍曰太平姑熟當塗新和曰寧國丹陽宣城衝曰池州池陽秋浦康化軍易治曰徽州新都新安僻山煩州有四曰廣徳桐汭石封大梁陳留郡衝煩曰和厯陽南豫軍民雜煩刁衝曰滁滁陽南譙永陽刁衝頗煩裁曰徐彭城武寧軍南北咽喉軍民混雑衝煩處置南都根本重地應天役重賦繁頗為難治蘇松常均稱繁劇蘇為最松次之常又次之至於嵗遭水患時增軍餉則郡之通患也鎮江太平寧國池州安慶民業差瘠吏事殊簡不甚難治徽俗鄙吝徤訟棄本逐末頃者有礦冦守令非亷而有威者不能安於其職江以北廬為善地揚衝而俗侈淮安南北轉漕衝繁特甚鳯陽地廣大荒與淮北一帶悉困賦而困役徐邳俗悍業鹽水陸孔道州邑疲弊一望蕭條不當以江北簡易例也江南北賦役交困江北徐沛邳淮濠揚滁泗苦當衝衢殊困于役江南蘇松賦額故重重以多事且有倭警則南北並多故矣一切科歛率從丁田而又不時穫財與力蓋兩詘焉勞來拊循全頼牧宰而或賢或否否又居多矯易化裁之機要有在矣金陵防守要害都金陵宜守淮以防外庭守武昌九江以蔽上游守淮之勢東固淮安泗州自丹陽而揚州而淮安而泗州乃金淮之右臂也西固鳯陽夀州自采石而和州而鳯陽而夀州乃金淮之左臂也東無淮安雖得泗州而不為用西無鳯陽雖得合肥而不為用上游之勢沅湘諸水合洞庭之波而輸之江則武昌為之都會故湖廣省所以蔽九江江西諸水與鄱陽之浸滙於湓口則九江為之都會故九江所以接武昌而蔽金陵若用於天下則徐邳臨清淮安之應也洛陽均鄭鳯陽之應也荆州武昌之應也而襄陽又荆州之應也固荆州可以開蜀道固襄陽可以控川陜固臨清可以通燕冀固洛陽可以制潼闗其西南守江西以運百粤其東南守浙江以治閩吳皆金陵之門庭帑藏云耳守淮以固金陵劉季裴曰自古守淮莫難于謝𤣥又莫難于楊行宻謝𤣥以八千人當苻堅九十萬之衆清口之役楊行宻以三萬人當朱全忠八州之師衆寡殊絶而卒以勝者扼淮以拒敵而不延敵以入淮也金陵山川岷嶓之山大勢皆自西南而趍東北朱文公謂岷山之脉東為衡山者盡於洞庭之西其一支南出而東度大庾嶺者則包彭蠡之源而北盡乎建康山之所趍水亦至焉故建康者東南之奥區而山水之都會前志叙之曰鍾山來自建業之東北而向乎西南大江來自建業之西南而朝於東北由鍾山而左自攝山臨沂雉亭衡陽諸山以達于東又東為白山大城雲穴武岡諸山以達于東南又南為土山張山青龍石砲天印彭城雁門行堂諸山以達于南又南為聚寳山戚家山梓桐山紫岩夏侯天闕諸山以達于西南又西南綿亘至三山而止于大江此諸葛亮所謂龍盤之勢也由鍾山而右近之為覆舟山為雞籠山皆在宫城之後又北為直瀆山大壮觀山四望山以達于西北又西北為幙府盧龍馬鞍諸山以達于西是為石頭城亦止于江此亮所謂虎踞之形也其左右羣山若散而實聚若斷而實續世傳秦所鑿斷之處雖山不聨而骨胍在地隠然相續猶可見也石頭在其西三山在其西南兩山可望而挹大江之水横其前秦淮自東而來出兩山之端而注于江此蓋建業之門户也覆山之南聚寳山之北中為寛平宏衍之區包藏王氣以容衆大以宅壮麗此建業之堂奥也自臨沂山以至三山圍繞於其左自直瀆山以至石頭沂江而上屏蔽於其右此建業之城郭也𤣥武湖注其北秦淮水遶其南青溪縈其東大江環其西此又建業天然之池也此論環城數十里之山川耳其居秦淮之源有東廬山華山臨丹陽湖之上者為絳岩山最竒特然為一州之鎮者又有茅山焉而岷山中江逕蕪湖溧陽以入于荆溪太湖則又禹貢所謂三江既入震澤底定者其他一丘一壑擅名紀勝咸有可徵金陵諸山圖考唐志稱東南名山衡廬茅蒋金陵有二焉蒋山故名鍾山實都邑之鎮武侯所謂鍾山龍盤是也宋周應合山川序云鍾山之左自攝山臨沂雉亭衡陽以達於東又東為白山大城雲穴武岡以達于東南又東南為土山張山青龍石砲天印彭城雁門行堂以達于南又南為聚寳戚家梓桐紫巖夏侯天闕以達于西南綿亘至三山而止於大江所謂龍蟠之勢也鍾山之右近之為覆舟雞籠在宫城之後又北為直瀆大壮觀四望以達于西北乂西北為幙府盧龍馬鞍以達于西是為石頭城亦止于江所謂虎踞之形也然考其山之逺近地之連脉亦少有不合者蓋東南之山闗城重抱山勢連屬不可一一次序言之且古之江水自三山東入沿隂山石子岡北流以注于石頭又自石頭沿馬鞍四望盧龍幕府東折至於觀音又由臨沂攝山直抵京口二百餘里山勢不絶浮江而觀之三山據于西南石頭據于西北秦淮中出乃天限之門户也今江水西流沙洲曠邈馬鞍鳯臺為民居日削而隂山則陶冶為澤漸不可尋矣此則圖其形勢之大者焉金陵北水圖考金陵在大江東南自慈姥山至下蜀渡古稱天塹巨浸此江之境者也秦鑿淮吳鑿清溪運瀆楊吳鑿城濠宋鑿䕶龍河元鑿新河國朝開御河城濠今諸水交錯互流支派靡辨據經考之自方山之岡壟兩涯北流西入通濟水門南經武定鎮淮飲虹三橋又西出三山水門沿石城以達於江者秦淮之故道也自大平城下由潮溝南流入大内又西出竹橋入濠而絶又自舊内旁周繞出淮清橋與秦淮合者青溪所存之一曲也自斗門橋西北經乾道大平諸橋東連内橋西連武衛橋者運瀆之故道也自北門橋東南至於大中橋截于通濟城内旁内秦淮又自通濟城外與秦淮分流繞南經長干橋至於三山水門外與秦淮復合者楊吳之城濠也自昇平橋達于上元縣從至虹橋接大市橋者䕶龍河之遺蹟也自三山門外達于草鞋夾經江東橋出大城港與隂山運道合者皆新開河也東出青龍橋西出白虎橋至柏川橋入濠者今大内之御河也若城外落馬澗諸水不能悉載焉金陵厯代互見圖考厯代城邑變置若不可悉辨然鍾山自東北而邐於西南大江自西南而環抱於東北覆舟阻其後聚寳當其前青龍石砲掖其左石頭三山踞其右秦淮横其中考諸漢以後郡城皆在淮水之南六朝宫城皆在淮水之北而近于覆舟楚秦隋唐之城皆在淮水西北而據於石頭楊吳以後之城皆跨淮水之南北而近於聚寳國朝因山距淮盡乎四極以是據方辨位庶幾可得矣按六朝宫城正門曰大司馬門南對都城之宣陽門二里宣陽門南對朱雀門五里臺省相望為御街朱雀門臨淮水上朱雀航北今考鎮淮橋東南桐樹灣處當是航所中正街府軍營内小橋當是宣陽門處直出北口西華門西大街當是大司馬門處國學成賢街南口當是宫後平昌門處珍珠河正在宫内也成賢街外號以東直抵西十八衛之後當為都之北城宋上元縣西細柳營直北當為東城武學以北當為西城其規模大畧可見南唐之宫前臨内橋東盡昇平橋西盡大市橋北盡小虹橋為子城之限宋行宫即此内橋南直抵鎮淮橋此則南唐之御街也志云鎮淮橋即朱雀橋者蓋蕭梁時移航於此遂名舊航之處唐所謂長樂渡也南渡長樂一里抵東城角内外皆丹陽郡城之基又東南近倪塘乃晉王含五城又南當是古揚州治清凉寺地以至石頭山脊為楚金陵邑城又北為唐韓滉五城少東南則隋蒋州城又東則治城今朝天宫處又西抵下街有西州橋即西州城池塘上元縣城亦是其處皆石頭之麓相去不逺南循三山水闗内浮橋北為賞心亭少西為折柳亭出水闗中街水環繞處當為白鷺洲洲上今普惠寺當是李白酒樓繞南城角髙處即昇元閣舊基少北髙阜皆鳯凰臺山少西即建初寺西即杏花村聚寳門外為長干向西為越城少南為秣陵城東南為國門轉東至通濟跨城處當為府城大中橋東畔為白下亭長安街西口當宋永安宫北抵竹橋之側當為金華宫六朝城後今國學處為𤣥圃小教塲西門内為上林苑将臺處當為樂遊苑蒋廟之西南當為商飈舘西北為親蠶宫此皆可因據而互見者也金陵闗要登石頭西望宣化渡及厯陽諸山真形勝之地若定都建康則石頭當仍為闗要或謂今都城徙而南石頭雖守無益盖未之思也惟城既南徙秦淮乃横貫城中六朝立柵斷航之類緩急不可復施然大江天險都城臨之金湯之勢比六朝之勝豈必依淮為固耶三吳水利東南財賦所出之地惟三吳為巨而三吳之田則水為最急也書曰三江既入震澤底定言震澤之水由三江入海故底定而不為害也孔安國云自彭蠡江分為三入震澤遂為北江而入海蓋泥於彭蠡既瀦之文而牽合之也然不知彭蠡震澤入海之道既殊而三江之名亦不得而强同矣虞氏林曰江自彭蠡分而為三又曰江自太湖入于海其猶孔氏之説歟桑欽水經所著與班固地理志相表裏也而乃謂南江自牛渚上桐水過安吉厯長瀆出松江入海者則又謬甚矣郭景純以岷淛松為三江韋昭以松淛浦陽為三江豈亦疑於安國之言而為之臆説者耶酈道元注水經則引之以為據何哉程大昌所進禹貢山川道里圖邊實所脩崑山續志類訛承而舛踵之耳惟張守節曰三江在蘇州自西南至太湖曰松江自東南入白蜆曰上江亦曰東江自東北下三百餘里入海曰下江亦曰婁江葢得之矣顧雍呉地記唐仲初吳都賦註朱長文吳郡續圖經其所言雖有詳畧蓋皆本諸守節者也以今攷之太湖自吳江長橋東北合龎山湖者松江也又東南分流出白蜆入急水澱山東而入海者東江也自龎山過大姚東北經崑山石浦安亭由清浦入海者婁江也但澱湖之東流既塞而安亭亦失其故道久矣此單鍔所謂開白蜆安亭通龍鎮以入海者也震澤之稱見於禹貢而周官爾雅則謂之具區在史記曰五湖在左氏傳曰笠澤在揚州記曰太湖其實一也故安國云餘州浸藪皆異而揚州同者蓋浸藪同處論其水謂之浸指其澤謂之藪者是也張勃吳録曰五湖者太湖之别名以其周行五百餘里故曰五湖虞翻曰太湖東而松江南而霅溪西而荆溪北而滆湖連乎韭溪故謂之五也韋昭以胥蠡洮滆并太湖而五者異矣郭璞則以具區洮滆彭蠡洞庭青草而五焉豈亦誤於禹貢之言故取足於楚之所謂洞庭青草者耶今震澤猶稱洞庭者其或昉於璞乎陸魯望曰大湖上禀咸池五車之氣故一水而五名斯穿鑿者矣烏足據哉夫太湖受三吳數郡之水浩渺不可涯涘其底定也則有灌溉之利其泛濫也則有浸滛之患故古人之治之者惟䟽其源使水之入者有所分導其流俾水之往者有所歸然後民得平土而居矣故置五堰於溧陽以殺宣歙九陽之水所以節其入也開百瀆於冝興置斗門於江隂建千橋於吳江所以宣其出也單鍔之論要不出乎此耳然嘗攷之往集詢之故老而知古人之成績者不獨鍔也太史公曰大禹通渠三江五湖其震澤底定之時乎夫差北通扶溝吳濞擅利山海富强之計不足言也若王濬之欲從武康紵溪穿渠直出海口功雖不竟志則可尚矣至於假節發三郡之民漕大瀆以㵼淛江者王奕也導太湖入海復嵗租六十萬斛者張綸也自市經以北赤門以南築堤起橋復田數千頃者張永和也上書宰臣具言水利者范仲淹也鑿盤龍滬瀆民頼其利者葉清臣也自封家渡至大通浦開淘七十餘里者徐確也郭亶言治田七事趙霖言治水三事李結獻治田三議要以去水患興民利也我朝夏尚書原吉周侍郎忱相繼治之昭有成績至今頌焉成化以來復設憲臣以董之於是乎事有專責而官無廢政矣夫治水以為田也治水而不治田則治水無全功治田以防水也治田而不治水則治田無全力是故治田之法有三曰築岸堘曰修壩堰曰分大圩蓋全吳之地古稱澤國而田多低下所藉以禦水者岸堘也岸堘不堅則雖有沃壤而棄之沮洳矣故令民修作田堘則有若王純臣韓正彦注意隄防則有若夏原吉周忱皆極其經畫之詳宻而可以守之者也後此者能繼而行之民不有餘利乎古人制田之法率因水道以正經界曰涇曰漊曰濵曰浦縱横曲直有井田之象焉其通也以泄水其塞也以禦水皆使不為田害而已後乃破壩堰以通江湖專小利而風濤之入獨倚於岸堘故民日勞而增築煩矣昔文正公曰江南圍田每方數十里内有河渠外有門閘不可復矣而修舉壩堰之䇿獨不可行耶圩田之制隨地形之廣狹水道之逺近而為之大小也圩之小者則岸堘易完民工易集時有浸澇則車戽之施可朝夕計功也圩之大者則岸堘既廣工力不及積水經月而稻成腐浥矣能度其勢而分之使民力易施不其有利乎夫堘岸譬則城郭也壩堰譬則闗隘也小圩譬則三里七里也闗隘固城郭堅則内有所恃而冦不能入三里之城七里之郭則小而易守備無不足可綽然應敵無虞矣治水之法有三曰决三江曰浚諸浦曰導涇港蓋太湖東入松江出吳以入海古未有隄障也宋築長橋以便漕運而江流始噎此單鍔所以欲鑿吳江岸為木橋以通之也代加浚治已有成效而或者猶欲决去長橋以决入海之道則亦難矣澱湖之西曰急水曰白水東曰小漕曰大瀝皆東江入海之故道也今諸港淺狹而東江遂塞惟澱湖支流北入吳松江耳因其舊迹而䟽之則松江之流其安乎吳松江即古婁江也通塞無定夏原吉嘗浚夏駕浦北貫吳塘通劉家港以入海矣周忱嘗浚顧浦以通吳松江入海矣然渾潮往來江流漸狹久而不治恐壅塞之害深而為力難矣古人於沿海之所浚三十六浦以分三江之勢則入海之途多而水之流不滯也今則未能盡復其舊而入海者惟茜經七鴉白茆楊林入江者惟福山許浦而已茍能於其未浚者而浚之於其已浚者而時導之以為經久之規則今日之急務也圩田四圍皆涇港環繞所以决田中之水以泄諸湖塘而達之海也必使修治闊而可以為容納之地則田之積水可蓄於溝港溝港通流則可以散灌於塘浦塘不遏則可以疾趨於江海而水之患息矣夫吳郡之水譬諸人身五堰則首也荆溪則咽喉也震澤則胸腹三江則腸胃也浦港涇瀆則脉絡衆竅也腸胃閉衆竅塞脉絡不貫而咽喉之入不節吾見胸滿腸脹而斃可待矣夫變通者智也經畫者法也若古人之所行與夫單鍔所著固法之善而智亦存乎其中矣然時異勢殊陵谷更易所以神變通之術以隨時冝民者則又存乎人焉耳愚嘗因是而悲吳郡之民其所患者不獨水也常賦之外供組繡之麗者取靡焉嗜耳目之玩者取異焉務摶埴之用者取精焉操囊篋之貪者取盈焉富商大賈侈美同流豪家富族吞併不饜故民之貧者男終嵗耕而不曾得託糠粃以飽也婦終嵗織而不曾得蔽繒絮以煖也然則害之溺於民者獨水也哉南畿海防江南東海之防守在崇明吳淞江口而要在蘇州故崇明吳淞江口設所而蘇州重鎮設三衛江北淮南海防守在泰州通州興化鹽城而要在揚州髙郵淮安故泰州通州興化鹽城各設所而惟揚州髙郵淮安設衛淮安當大瀆通海為重鎮設二衛淮北海防患在東海守在海州而要在邳州故東海海州設所而邳州設衛建康形勝建康東起天目山北接鍾山覆舟山雞籠山終于行堂又有巖山牛頭白特山堂陽寺山而大江横其後淮水流其中夾淮而為王都秦始皇見金陵有王氣東遊以壓之塹秦淮以斷其氣殊不知秦淮入于江而江水口再朝亦旺水也三吳風俗夫三吳者何神聖基圖之所創也詩書六藝之所漸也羣材之所鍾百貨之所聚而賢哲之林也盛有日矣其在禹貢則厥土赤埴塗泥厥賦中中下上然而夏狄蠙珠織文纎縞橘柚篠簜之珍貢於天府則物産亦非纎也其在職方則川以三江浸以五湖然金錫竹箭孔翠犀象列在方物則地利亦非鹻也顧其時氣化淳龎風俗朴茂天地之藏有所函而未闢山川之珍有所秘而未吐故號為九州之腴而不入列國之紀厥有由矣降是而春秋則闔閭以勾吳舊邦雄視上國越絶書志其城郭宫廷之制如所謂通門二八隔閡寒暑與夫澒地六尺玉鳬交流何其溢也降是而七國則春申以楚之上相裂土江東司馬史稱其城吳故墟自為都邑至於上客三千皆躡珠履何其汰也然其時淮南十二縣邊齊之南為楚下東國而泗上十二諸侯附麗故宋之旁以介於大國即今淮揚諸郡是已則吳越故壤已擅豐區而淮海舊堧猶稱曠土矣漢初吳楚淮南分王其地彊者即山煮海擅銅鹽之利下亦厚招娛遊以亢三尺則故吳益沃而淮南北亦漸衍矣唐承隋江都之舊天寳以後設鹽鐵租庸大使開府廣陵以籠諸道貢物達之長安而淮南北之盛畧與江南等矣夫地利有上下天時有盈虚而吳獨日盛何也蓋自晉之渡而東也收數十代之衣冠禮樂而生聚長養其中彼號為中原者方且淪於戎馬荆榛之域故相懸也其後宋又渡而南也舉數百年之皇圖帝籍以保有億萬之命彼號為二京者方且為蒐兵講武之塲故益逺也然則吳之盛久矣俗之𢎞侈亦匪今矣聖祖開基淮甸吳諸郡則左右輔也成祖定鼎燕京吳諸郡則内外府也豈非根本膏腴之地哉然以蕞爾之土而當天下財賦之半加以連年水潦之災民多懸耜野有奥草守閭之吏日夜責租民輾轉呼號莫所聊生蓋吳於今日又甚詘矣而執事猶談其盛無乃見其影而未察其形耶請實其状夫金陵五方之輻輳萬國之灌輸三服織作内給尚方衣履天下而器食之用自水衡少府半取給焉然而遊浮之民大都之風非有厚藏故其地物嗇而功侈自金陵而下控故吳之墟以跨引閩越則姑蘇一都會也其民利魚稻之饒居果布之凑造作精靡以綰轂四方其士也慕遊閒之名頌儁俠之義故其地實嗇而文侈自金陵而北按三楚之舊苞舉河淮則維揚一都會也其民呰窳輕訬無所積聚煮海之賈操鉅萬之貲以奔走其間故其地主嗇而客侈自金陵而上至於甌越則宣歙之間一都會也其民盡仰機利行賈四方唱櫂轉轂以遊萬貨之所都而握其竒嬴故其地内嗇而外侈今執事徒聞其侈而不知其嗇也欲以儉與禮裁之則過計矣然吳之嗇則生於侈者也欲使之無嗇可使之侈乎嗟夫侈則侈矣彼其珍竒溢目則頳丹明璣珠琲磊珂弗為異也其服御鮮華則蕉葛升越弱錫羅紈笥中之韜鯷人之獻弗為靡也其器用精良則桃笙象簟寳鋏文犀單費百縑取直萬户弗為訬也其遊藝嗜古則山甫之鼎考父之銘華山之愽畨吾之刻弗為邈也其宴居過從之盛則海錯陸珍剖纎列姬盤舞隨風悲歌入雲弗為適也其百賈之所聚則方舟結駟織陸鱗川飛塵絳天赭汗如雨弗為譁也衍平子之賦無以盡其華賡士衡之趨無以極其靡矣而豈知其力之嗇哉夫山林不給野火江海不實漏巵難其繼也是故識㣲之士見本而揣其末陳風之史覩盛而防其敝亦有説矣且夫吳者四方之所觀赴也吳有服而華四方慕而服之非是則以為弗文也吳有器而美四方慕而御之非是則以為弗珍也服之用彌博而吳益工於服器之用彌廣而吳益精於器是天下之俗皆以吳侈而天下之財皆以吳嗇也議糧兵太祖定鼎金陵建四十二衛皆散處江北屯田自養故賦有餘而用足永樂間遷都于燕建七十二衛嵗漕江南北粳粟四百餘萬石以給軍食而武官俸廩則仍就支于南京至正統始以南京倉米每石折銀二錢五分總計四百萬石納于京而存者尚二百餘萬石蓋兩京並建邊備漸增財用至是始困矣故為留都今日之計者宜汰冗兵去冗官修江北屯田之政减裏河進貢之船使兵少而精强賦省而用足北輔中原南控百粤江淮湖海環邦畿數千里之間民安盗息根本壮固斯見陪京之形勝矣淮揚利病一言淮安鳯陽以北地髙宜糓粟而少塘堰一遇亢旱則坐觀枯稿淮揚以東地下冝秈稻而少堰圩一遇水澇則任其湮沒故江北地利不盡乞勅徐潁兵備官督率所屬躬親相度隨其髙下開濬修築教民播種一如江南則無曠土無惰民而民食可足二言山陽寳應髙郵江都諸州縣地臨白馬甓社卲伯黄山諸湖延亘三四百里兼以天長西山諸水時為泛濫遂至衝决運道田地棄而不種税糧無所從出運船亦往往摧壊其中為患甚鉅乞勅治河諸臣乘時堅築運堤量度地勢建立平水石匣以為䟽洩之計山西圖叙山西古冀州地背臨朔易沙漠是也表裏河山蓋有俯挹中州之勢焉忻代二州皆太原府屬以北戎馬内侵故大同特設巡撫焉綏在大同西宣府在大同東南互為聲援雁門偏頭寧武三闗俱在太原北境竝置闗戍雖烽火之警不殊而套河套賊為急且保徳河曲保徳州河曲縣俱太原府屬之間與賊僅隔一河黄河稍或撤備則門庭皆勍敵矣蔚州大同府屬之鑛徒臨晉平陽府屬縣之屯卒藩府屯軍潞城潞州屬縣之逋民竝以山谷阻深乘時抄暴要亦不足屯結也然邊餉既廣宗室彌蕃一切供輸自嵗賦之外皆仰給河東之鹽課三晉之民勞瘁甚矣而邊卒方且呌呶待哺帥臣號令為之不行此則積習流弊非漸圖之不可也沿革古冀州地漢分冀州西境河東等郡屬司𨽻置并州部刺史察舉太原上黨雲中雁門等郡而不常所治東漢并州治晉陽唐貞觀初置河東道開元中置河東採訪處置使治蒲州後改採訪為觀察其治仍舊宋置河東路經略安撫使以太原守臣兼領元以冀寧諸路直𨽻省部置河東山西道宣慰使司于大同置河東山西道肅政亷訪司于冀寧本朝置山西等處承宣布政使司嘉靖中陞潞州為潞安府又置都指揮使司提刑按察司三司並治于太原而行都司則分治大同以控制邊境云山西等處承宣布政使司治太原左右布政使二左右㕘政三左右㕘議四糧儲兵備領府四屬州一十有六縣六十有四州四屬縣一十有一總為里四千四百四十里有零户五十八萬九千九百五十九口五百八萬四千一十五夏秋二税共米麥二百二十七萬四千二十二石絲五十斤絹四千七百七十七疋馬草三百五十四萬四千八百五十束山西都指揮使司指揮三内掌印一僉書二領衛九屬所四十所七本都司所屬馬歩官軍舍餘夷人等一萬九千五餘員名都司𨽻後軍都督府儀衛司三山西行都司分司大同𨽻後軍都督府領衛一十四屬所七十所三本司所屬馬歩軍四萬六十餘員名山西行太僕寺見在馬驢騾共三萬二千九百餘匹頭都轉運鹽使司一在河東嵗額辨鹽四十二萬引提刑按察司按察使一副使十二驛傳清軍一提學一兵衛易州口平定北岢嵐潞安雁門各一僉事六分道四冀寧冀北河東冀南欽差總督宣大都御史一駐陽和巡撫都御史二一太原或代州一大同巡按御史一太原巡鹽御史一河東王府三晉府髙三封太原郡王二十二代府髙十三封大同六千石郡王二十四瀋府髙二十一封潞安郡王二十大原府其名古晉陽晉太原元冀寧繁劇且近邉衝疲其屬州六縣二十二附郭陽曲九十八里繁劇難治太原九十八里僻繁頑榆次一百七里刁繁地肥大谷八十三里刁疲僻繁祁四十五里刁繁多盗徐溝十九里繁疲清源二十八里僻繁盗交城四十三里僻繁地肥文水七十九里僻繁地饒夀陽三十里衝繁俗嗇臨十五里僻簡盂二十三里僻簡有銕静樂三十八里繁疲多盗河曲七里僻疲平定州三十三里衝繁俗嗇屬樂平十里僻繁忻州六十三里民頑多虜患屬定襄二十五里僻簡代州四十一里近邉衝繁多虜患屬五臺十五里近邊僻繁繁峙十九里僻崞三十九里近邊難治岢嵐州二十二里近邊僻繁多虜患屬嵐二十二里貧僻興十一里淳僻貧石州四十里僻簡淳屬寧鄉十三里難治保徳州五里簡殘疲其形勝恒山之險大河之固句注險阻靈山角立其俗好樂無荒清簡質朴平陽府其名秦河東隋平河元晉寧繁難地廣民朴其屬州六縣二十九附郭臨汾五十一里繁衝外襄陵七十二里繁衝洪洞八十九里賦完事簡浮山十七里繁難貧趙城三十七里僻民苦太平五十四里衝繁難治岳陽十八里僻簡貧曲沃六十八里衝繁難治翼城八十四里衝繁難治汾西十五里刁貧蒲九里刁僻疲蒲州八十七里衝繁屬臨晉六十三里衝繁難治榮河三十八里僻繁貧猗氏五十一里衝繁難治民勤萬全四十里僻繁貧河津三十六里僻繁民勤解州三十一里僻繁疲安邑九十五里繁衝貧夏六十六里衝煩僻聞喜六十六里衝繁疲平陸五十二里山僻繁貧芮城四十四里僻繁貧難治絳州五十一里衝僻屬稷山七十三里繁衝民稍頑絳四十里僻好訟垣曲二十七里僻貧霍州二十里衝頑屬靈石二十五里衝淳吉州二十二里僻簡儉屬寧鄉十六里僻頑隰三十一里僻瘠民頑難治屬大寧十里僻貧石樓十三里貧苦山僻永和十一里僻貧其形勝負闗阻河接汾連華其俗崇禮讓多勇敢大同府其名戰國時雲中代郡漢定襄雁門馬邑近邊衝繁烽堠相接不常難治其屬州四縣七附郭大同三十六里兵馬屯聚難治外懐仁九里裁荒渾源州十四里繁衝貧應州二十里荒僻屬山隂七里衝疲蔚州二十六里繁衝近邉難治屬廣陵八里僻簡廣昌四里衝繁靈丘十里貧衝朔州八里僻疲有邉患屬馬邑五里僻疲其形勝平岥峻坂用武之地其俗質直淳厚潞安府其名秦上黨唐昭義宋隆徳衝繁民質易治其屬縣八附郭長治一百七十七里繁民淳頗饒長子九十二里繁頑屯留六十二里僻簡頗繁襄垣八十里頑簡刁潞城九十二里僻簡頑壺闗九十六里僻簡黎城四十九里繁僻平順三十一里僻貧頗繁其形勝肘京洛履蒲津倚大原跨河朔其俗民儉力農士節務學直隸沁州其名隋義寧唐陽城衝繁民疲貧其屬縣二沁源十六里僻盗武鄉四十九里頗衝繁貧其形勝前銅鞮後龜山其俗專力耕農少事商賈澤州其名北齊髙都隋長平繁劇難治屬縣四髙平一百六十一里繁僻民富陽城九十四里繁俗儉陵川九十三里繁僻簡沁水五十四里繁民刁疲其形勝大行險固山川環抱遼州其名樂平僻簡瘠儉其屬縣二榆杜三十二里僻簡和順二十一里簡􅇤嗇其形勝山川險峻其俗剛悍朴直汾州其名魏西河金汾陽州有二王府難治雖服裏亦衝其屬縣三孝義三十里衝簡饒平遥五十八里衝繁刁介休四十六里衝繁刁其形勝美哉山河之固其俗重厚尚義山西承宣布政使司領府四曰太原晉陽冀寧幷州唐北京五代唐西京武勇軍繁劇曰平陽河東平河晉寧晉州唐州繁曰大同雲中雁門代郡雲中西京大同路北恒州縣俱近邊衝繁難治曰潞安上黨昭義安義昭徳隆徳襄垣有王府衝繁州四曰澤上黨河東建興長平高都建州益州城内有宣寧隰川王府衝繁曰汾西河汾陽軍朔州介州浩州有慶城永和二王府難治雖服裡亦為衝繁曰沁義寧陽城威勝軍衝曰遼樂平上黨遼箕州儀州平定軍僻簡處置山西大同府逼臨敵境最苦侵暴太原府屬如興岢嵐保河一帶敵一大舉輙入其境斷煙宿莽蕭條甚矣汾州宗藩不畏國法頗為地方之害潞澤沁遼環列太行上下谷深林宻盗不時竊發往嵗青羊山之事可為鑒也平陽雖稱富庶其實止蒲絳臨汾太平襄陵曲沃翼城差有可觀地震之後則亦大不如昔矣是故休養内地之民使之裕於供邊廼一方保釐者之責否則割肉充腹立見其斃可歎也已解鹽利弊議夫解之有鹽池舊矣厯代之張弛沿革愚未暇悉也昔所稱為瑩㓗如玉甘美如榖亦宇内之所共喻也愚不暇論也祖宗時額僅十萬耳至嘉靖中始增至十九萬有竒全晉闗洛梁鄧之間皆其轉輸之所也二百年來公私俱足在商人未嘗以山徑巇嶮稱難在三省未嘗以解鹽苦惡為病何也法一而志定也自隆慶辛未雨决池防池水四溢鹽不結聚者謂國計不可負始為澆曬之術蓋以人力勝天時也然硝與鹽淆不能一一而析之也有奸商者出焉乘間營私沙礫雜和故色愈變味愈惡而解鹽於是乎不可食矣民日夕翹首以竢商之至而商之所貨乃如此則其不樂售者豈情也哉於是商人坐官肆終嵗不能銷引目所在長吏又從而代之歛散以取其值焉此不獨商困而民亦困矣是以民視商若贅疣而視解之産為棄物無不利於食私販者民利於食私販而販者適至是謂兩相求兩相求則事宻官卒緝捕惟賄是饜販者餌之是謂兩相利兩相利則防踈如是而淮蘆花馬之産紛紛四至勢惡得而禁之哉間嘗銷退引矣皆偽目也鹽儈肆市而得之者也亦嘗獲私販矣皆貧負也法所謂易米度日者也夫私販盛則商利薄商利薄則國税病此而不為之計将何所取盈哉所謂計者非必分地改額以滋聚訟也亦非必盡易其舊而創為之法也愚所謂在酌其宜而變通之耳其一曰慎採取之時夫解鹽池産也與浙淮齊閩殊而反穡事浙淮齊閩鬻海法也其利在地不在天其祛弊之法在有餘不在不足乃解池則異是矣穡事憂旱而池利旱且利南風古所稱阜財解愠者是已夫天能使之常旱且南風乎恒雨則結者融恒北風則升者下此其時為難鹽丁散處諸邑既難遽集竢其集而圖之則已解矣非預以待之不可也春夏届期此凝之候也羣各丁而聚諸池毋失其會暇則驅之採草以資蓋藏固未嘗虚其力矣矧若輩皆正役豈故淹之哉是採辨之所宜講也二曰廣召募之役池跨解安邑地近百里矣勢甚遼闊鹽丁僅二萬採取奚遍採之不遍地之所以有遺利也嘉靖丙午鹽嘗盛生矣募近民雜採之官取其七而以三充賞其利厚也競趨之因而與之可也柰何存其鹽不給以值又不以時於是召之不應矣夫民之潰手足裂肌膚而不憚者逐利也顧賞若是是督之逺也愚以為宜厚之也試令近地之民毋論千萬置之長貳而集其民於官則朝結而夕可集也民之趨利猶水也利則來不則去往有定令矣而自食之是上不信也今宜逮其報成而給以二仍朝驗而夕惠之毋令胥吏持簿書而肆為呵索民其有不樂於赴者哉赴益衆則採益時採益時則入益富一嵗而不獲數嵗之利者不然也此足以待凶年之額胡為較錙銖而遺逺慮乎三曰貴採取之精夫各丁募夫羣然竝集不憂其入之不厚矣在官司或急成科以希功在丁夫或急採取以充數寧無雜硝石而竝進者乎則分區畫地以程其工驗料計直以定其等屏惡存美以待夫商皆不可不為之慮也四曰别逺近之地夫曬鹽非惡也稍帶硝性試灼以火則騰越而上無異池鹽此法河東諳之而逺人未諳也今曬亦無幾矣請以待近之求而减其價以為耗逺征之商非池鹽不給則轉輸者皆飴鹽而商無不售之值民無境外之求矣五曰清支給之法夫所謂超支者非旋中旋支以勸商者乎商人中納次第掣攴例也往以池鹽未結曬鹽未充無以給商而責之入乃隨募小販給以澆曬而籍其貲萬不得已之計耳而商人之停支者迄今遂不可復夫商傾貲以入公家以恒産在池也乃其視生而不得支何以異於農之耕耨而不得獲者哉今池平而花漸結矣採以時則蓄且倍也請絶小販之招以優舊商之困可乎六曰均商民之惠夫商人經年守支國課取足人情之所當優者也然而此輩則無厭矣籍口曬鹽肆為挿和以恣壟斷之計是故所在居民棄官鹽而樂私販為官司者又從而强所不樂民之無告甚矣今宜徧榜諸司凡諸無様鹽即係飾偽様鹽非官記即是私封沒其貲而置之法一懲而百警矣則商安所售其術而民有不樂於商之至者乎七曰禁太汾之票何者二郡固全晉之半也地多斥鹵採而煎之轉相輸販已非正法頃從其便給販者以劵而嵗徵其入此票之所由名也彼皆自食其有矣解鹽入其境終嵗束閣竟莫能售夫二郡去河東纔數舍耳法已莫可詰彼逺者奚讓焉矧二郡之民動以一田兩税為口實正謂業已供邊儲而又以輸鹽課且并其所謂私販者而忘之矣此非當禁之一耶夫惟慎天時也廣召募也精採辨也則盡人之力者盡地之利所謂生之貴裕其源者此也惟辨逺近也循舊例也均商民也革煎販也則商無滯貨者民無艱食所謂救之貴通其變者此也此則不必分地而流布者自廣不必改額而壅滯者自行民亦何所為而顧食私販以博罪哉雖然此特自鹽之已生者計之也萬一事勢如昔當奈何嗚呼池之利在天不在人前已陳之矣夫鹽公課也鹽務公務也王者有分土無分民故以河東視三省誠難撓越若自國家統觀之則安可執一而論也拓存穡之淮蘆充有餘之花馬以寛不足之河東竢其生結而各還其舊奚不可者夫據時宜而談利害環池之人類能言之至問上不病國中不病民下不病法則鉅公大人謇謇不欲語者何者狃于法之故也三闗備兵議山西右屏畿輔外鄰沙漠所稱為并冀藩垣者北則大同大同之南則寧雁折而之西則有偏老大同之邊冦也近不一舍逺不二三舍偏老亦然夫大同彼固有專之者矣如偏老寧雁所謂三闗也三闗之形若鱗次然東稍南為雁門百八十里抵寧武又二百里抵偏闗絶懸西北與大同峙而雁門寧武者則猶有馬邑朔州之為外藩也往以大同不能為蔽故議與畫地而守之三闗節制以屬全晉之撫臣而移總戎之駐偏頭者駐寧武者為居中調度備東西䇿應也近籌邊者更議以為不便謂棄外即内或以外地委敵而撫臣距疆塲既逺病於請質之難偏禆孤居卒不得藉援於大将欲以撫鎮槩置偏老與大同相掎角并力要害脱冦自馬邑朔州入犯而吾猶得收弊於寧雁也噫是則然矣愚以為制冦之術在扼其勢審勢者人也專計於人相宜而圖之則建官責守有可更者有不必更者夫撫臣折衝之任也非有親冐矢石列陣行伍之事平居申約束明賞罸謹烽修隘備儲厲兵秋防駐代俾之不得隙入一旦有警當冦者走軍吏計事轅門而撫臣亦數馳赴之以便授䇿故在太原猶偏老也如必居偏老而後可是将親與抗也平居之所經畧宜何事耶假令其大舉南侵則彼必數月集我必數月備悉吾之精鋭視險易而慎守之彼必不濟若遊騎突入禦之一健将事耳何足以辱撫臣夫天下之事恒起於時之所趨而亂於數易偏闗之設也在洪武之三十三年而成化丁亥始創老營堡前乎此者未嘗命一卒守也亦未有大患乃今帥武臣力開府運籌而猶俱有丁卯之患焉即多多奚益哉彼之畏我以有實也非畏名也今之所以稱藩而市馬者利金繒也第必設撫臣以為名彼於畏何有議者曰設臣於偏老視延寧甘肅之例也夫事茍利固無庸例然而以陜例之者誤也延寧甘固實稱四鎮置三撫臣而固原一鎮以總督當之總督趨花馬池則以撫臣之在長安者移領鎮焉而固原西至於蘭靖西南至於洮岷蓋方數千里畨虜雜居烽燧時警然皆撫臣之在長安者兼制之陜西之撫内者何嘗不兼邊也山西幅􅊷不滿千里民又甚瘠而三闗固太原一郡地耳必以一郡建兩撫臣無論供億煩苛無益勝負之數而反以滋病即内有分地則外之召兵於内者難外有分地則内之轉饟於外者緩牽制沮格之患不可不虞也故曰建官惟其人不必備若乃總兵之移則有可言者總兵雖信大将與文吏異古者中軍在御援枹而鼔朱殷輪而不惰今猥以為持韜握鈐之臣虞偏闗多故或失之而以移之寧武無謂也夫重移鎮者蓋以武寧之衝燕水雕窩陽方盤道相望廣衍紆漫騎得成列萬一彼𢷬我虚直入将狼顧失㨿焉噫獨不虞偏闗之可達汾永乎馬邑朔州大同地也尚寄一帶之衛於寧雁而彼志俘掠則大同其饜足處耳饜足則不南望即南望吾且有備安得為虚耶偏闗逼近賊巢即已欵貢而板井叛人嵗時窺伺又夷人叩闗者月無虚日所不能髙枕也故大将不可以深居深居則偏禆觀效士氣且日懈夫寧武之赴偏闗猶偏闗之還而自救其地里獨雁稍逺也誠令總兵移偏闗仍恊之以㕘将而寧武則撤馬站遊擊居之偏頭加一大将與副将俱是鬬士倍也人情偷於習皷於新旌幟一耀其耳目號令一作其頹靡則重闗之固壮於戒嚴今之援寧武亦昔之援偏老矣夫何間也若雁門固有㕘備且近撫臣當必無害顧乃謂偏老逺不可居何歟總兵之設也始於宣徳既罷復於𢎞治當是時皆偏老居也寧武設於成化丙戌置守備耳而幸無事𢎞治間置守禦千户所耳而亦無事總兵居寜武之議果何見耶要之撫臣職在謀筭者也總兵職在征戰者也二者甚可相能而必竝處故因勢以命職因職以任人因人以度勢建官之要罔踰於此矣雖然三闗之地皆稱要也三闗之守皆宜嚴也故有禦邊之逺略則何地而非守有體國之實心則何守而不固區區一隅一隙之補所見者淺也而責守之事且或有未盡者邊墻綿亘數百里戍卒僅四五萬星羅棋布殊多中空彼聚而攻我驍騎軼突如決大河潰蟻壤此畫地而守之難故不如無與争鋒各令收聚入保堅壁以待彼縱掠無所得又懼深入必自遁矣是求地利於人也戎伍𨽻尺籍者虚耗以半而日餉數錢多浚剥於渠帥老弱無營者應募勇悍多俠者畏羈此無兵而守之難故莫如嚴覈軍實養一夫必得一夫之力而又優募府之用俾不取盈於下則備在我不在彼矣是求兵於将也往吾與彼防也邊氓懼為俘戮故死不敢即夷人自為守也今視同一家而愚夫無逺略或争趨之以避賦就逸後将何支焉盍亦拊循百姓輕其徭税俾居者固而去者思乎彼與吾市也馬皆異産不與中土習分發郡縣輒踣死而償之民也夫民無所得焉而樂于償固以免兵弭患彼亦與有利焉盍亦以此補營馬之墟而仍輪郡邑之值将不軍之惠而市無損乎嵗選内地丁壮修守邊隙顧募犒來之費全省以數萬計而丁壮至邊顧救死扶傷不暇安所禆於事哉盍亦徵募金於官委輸邊郡召土著而簡練之止則為民動則成旅而内地丁壮番休者則永以保障不調焉此其利固不獨貽國家盤石之固也山西藩禄屯田鹽課軍箱總議今晉之當亟議者有四而卒未有以應之自藩封之典盛而禄食于土者亦既衆矣矧生養益繁罄民之入不足以供宗藩之需加之師旅凶荒而三晉常患於無禄自兼併之計肆而屯田之沒於豪强者亦既盛矣矧依假册籍陽應其名而隂收其地加之招納亡命之徒而三晉常患於無屯自計羡之議起而課無積藏地之生不生不可必朝三暮四之術要惟足課此可為一二年計也加之屢年浸沒而三晉常患於無鹽自改户之風熾而軍無定籍軍之正與偽不足論而彼出此入要惟實伍此但可以充目前文具也加之窮邊改調而三晉常患於無軍今之議藩封者禄不支矣而民不可加賦則禄未可議之不足中也我祖宗以天下公諸藩蓋厚之也計環晉所賦已不足支必空匱而他營他營不稱而詘計種種非所以厚之也其後當必弛藩封之禁而歸其四業間有求自試者倣昔漢宋更生汝愚故事收而與天下共之禄優之選既及而散業者無禁則不增賦而宗藩皆備外府矣不然罄三晉不足以資目前而其生将不窮也今之議屯田者籍不可稽矣而地不可徧畫則屯田未可議之不足中也我國家計軍授田蓋畜之也晉疆子粒不支半軍不支必枵腹不任指使指使不任而譟呼繼之非所以稱其畜也其後必當惟稽其子粒間有侵奪者視地而補之軍倣漢塞下渭濱故事與軍共之分種之利既博而收利者惟取盈則不必清丈而軍皆土著矣不然分畫晉疆不能一朝辨而欺愚嬴縮不可計矣夫晉之鹽古稱曰海眼蓋以自生而易利也鹽之生不生視水之髙下中條之麓其山溜未易洩也鹽不花數年矣此不足之尤者也不惟輕販無頼之徒不可覊而撈放之編役且坐困頃者水漸落而鹵且生則水猶可鬻也或倣鬻海之計而以應目前之需則不必峻法取盈異日者冀一生則年計所積必倍不必拘計羡間矣夫晉兵古曰天下莫强蓋以習邊而輕敵也軍之籍不籍視貲之盈縮并薊之交其去留不易羈也軍之虚籍亦數年矣此不足之尤者也不惟隠避滑稽之徒不可窮而里胥之役益張熾頃者軍貲費而邊民困則軍猶可募也或倣招募之議以充塞下則不必窮勾盡類異日者冀其習利則邊民樂戰不必勾攝而塞下皆勝兵矣圖書編巻三十六
