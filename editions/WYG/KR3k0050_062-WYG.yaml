body:
  text: 圖書編卷六十二明章潢撰西嶽總叙華州圖經云蓮花峯上有三峯上接三光中有石池二十八所上應二十八宿青松緑竹叢生高岡白雲翠靄旋於幽草懐藴金玉蓄藏風雷為大帝之别宫迺神仙之窟宅也况是山多石四面皆壁立瀑布飛流誠為竒觀唐宋以來題詠甚多嘉靖乙夘地震悉皆傾覆僅以見存者録之其靈異形勝之狀葢取古本考證不得稍有損益也則夫是編所載豈特古今仙蹟靈異與夫竒碩之士窮探𡨕搜發舒其逸興藻思而已哉陜西西安府山曰終山乃關中南山西起隴鳳東踰商洛緜亘千里有餘其南北亦然隨地異名總言之則曰南山耳大乙五經要義終南一名太乙猶曰天下第一山也一名地肺山秦四皓隐地肺山即此龍首山一名龍首原長六百七十里起伏盤曲貫秦漢隋唐都在内其西北高處則為秦長樂漢未央稍東南城六坡則為隋城唐西内擬乾六爻之地其東則為唐南内興慶龍池之所其地則為唐東内大明宫含元宣政紫宸蓬萊金鑾諸殿之所南内之東南引滻水入城則為龍首渠入東苑則為龍首池龍首殿皆以是得名原之所經今城東南則狗脊嶺驪山臨潼東金沙洞在長生殿南三里按驪山東西長數十里其陽為藍田北山其隂為温泉其上為石魚巖又東南走馬嶺其東為東繡嶺為石瓮谷為鳳凰原為金釡山為新豐原為浮胏山皆驪山東麓其西為西繡嶺其山畔有峯石樓盩厔馬嵬坡興平嶢山藍田秦嶺入商洛漢中者必越嶺而後達遇雪則阻故韓文公至是困焉七盤山通典云七盤十二紆藍關之險路也嵯峨涇陽冡嶺商商洛山四皓隐此大華華隂南十里即西嶽以西有少華山故此曰大華山李白詩云石作蓮華雲作臺今觀山形外羅諸山如蓮瓣中芙蓉玉女明星三峯特出如蓮心其下為雲臺山高五千仭片石壁立如削成上有八卦池大乙池白蓮池細辛坪五粒松玉女洗頭盆老君洞仙碁臺菖蒲池蘆葦池二十八宿池及蒼龍嶺日月崖仙掌巖落鴈峯在華山唐李白登之曰此山最高呼吸之氣想通帝座矣恨不携謝眺驚人詩來以問青天耳毛女峯嶽西雲臺峯在嶽東北兩峯峥嶸四面陡絶上冠景雲下通地脉凝然獨秀有若雲臺焦公巗在嶽東南真人焦孝龍隐此王刁三洞在嶽東仙人王遥與刁自然俱于此登仙故名洞有三上洞人莫能到中洞有飛石遮洞門下洞隐居者多石僊洞在嶽北面半腹中深不可測時出異色雲氣洞口有丹青石似仙人之狀故名洞上有瀑布飛流直下三千餘丈又名水簾洞陳希夷菴菴前有睡洞壺公石室嶽西北孤峯上可容十餘人𤣥象山渭南金粟蒲城𤣥扈洛南黄帝時鳳銜圖磬石耀堯門三原中山富平鰲背同官龍門山韓城縣東北八十里禹貢導河至龍門吕氏春氏曰龍門未開河出孟門東大溢是謂洪水禹鑿龍門始南流按河水至此自山直下千仭濺沫如雨濤聲如雷地皆震撼其下湍瀾驚波如山如沸兩崖皆斷山絶壁相對如門惟神龍可越故曰龍門秦記大魚至是不能化龍者有暴腮之困錯開河口山此山在龍門山北其河口畧似龍門而未通葢鯀治水時所鑿九載績用弗成者也今跡存名錯開河口梁山乾即古公踰者明月永壽九嵕醴泉大白武功山高恒積雪望之皓然故名諺云武公大白去天三百武功大白相連惇物武功紫㣲邠石門淳化黒石巖三水縣東門山之西其山石色似漆壁立萬仭五丈原武功即諸葛亮屯兵處東西女學洞富平鳳翔府山曰雍山城西雍水所出山形四面不見四方故名岐山山有兩岐亦名天柱梁山岐山石鼓寳雞山麓有十石鼓監周宣時物今存國子陳倉寳雞茂陵扶風青蓮麟游隴山隴大白郿東南關中諸山莫高于此上有鐵鑄山神牌三有湫池雖三伏亦凝冰山巔常有積雪不消盛夏視之猶爛然故以大白名有鬼谷即鬼谷子授蘇秦押闔術處􅀈山隴汧水自出即禹貢所載泉龍汧陽馬鞍汧陽漢中府山曰天臺府城北有金石可作硯連城褒城斜谷舊有棧閣二千九百八十九間板閣二千八百九十二間土人云其間有一溪可行舟褒谷北口曰斜南口曰褒長四百七十里同為一谷兩谷高峻中間谷道褒水所出斗山城固山有五宂通崑崙長安武當青城隴山有肉芝食之延壽寒泉洋子午谷洋縣東北六十里舊子午谷在金州安康縣界篔簹谷舊志文與可作亭谷中金竹西郷南岐鳳嶓冡沔即禹貢嶓冡導漾大景沔穴出魚長八九寸即丙穴嘉魚洞寧羌州南七十里西流河崖畔秋冬水涸則魚藏春夏水漲則魚出味美似鰣詩所謂南有嘉魚傳謂出自沔南之丙穴即此聖水崖崖畔懸一石如龍頭滴水崖下過客飲而甘之故名七星洞州北百里崖畔有七孔如星金牛峽一名五丁峽滴水巖兩山峭拔中有飛瀑自石下至山根玉女畧陽山高千仭多雲霞映之不見其巔山半有白石如人羅漢洞一在縣南七十里嘉陵江上靈巖寺東南十餘丈闊數尋後有􅃉穴深不可測中有石柱承載巖崖左有藥水巖一在城北百四十里深數丈濶五尋洞前有大石由傍而入天柱金州青碌洞山州西有古石洞二十處心山在州西北藥婦平利十八盤石泉紫荆洵陽神僊洞縣西南内有生成石蓮花一十九朶石獅子一洞門鐫紫葢神仙洞天六字望夫石紫陽一婦以夫從戎朝夕登望後化為石平凉府山曰崆峒府城西上有問道宫黄帝問道廣成子葢在此山又有𤣥鶴洞廣成洞香爐峯在崆峒山自香爐臺望倒挿石上巨下鋭尤為竒怪五馬崇信樺嶺華亭見子巖華亭金佛硤土有金粧石佛像三在石崖内峽長二十里峭壁對峙不見天日當河西孔道東山鎮原六盤開成回中涇保巖靈臺隴山静寧盤龍莊浪美高隆徳鞏昌府山曰西山城西廣漢水自出西巖安定雪山㑹寧玉狼通渭西傾漳即禹貢所載石門寧逺朱圉伏羌即禹貢所載俗名白崖山祁山西和上有城險峻開山圖云漢陽郡西南有祁山乃九州之名阻天下之竒峻蜀志云諸葛亮率諸軍伐魏攻祁山以木牛流馬運餉即此仇池山成縣南四面壁立峭絶有自然樓櫓却敵狀上有平地方二十餘里自下而上有羊腸盤道三十六迴通靈山四山環合二水縈流有流水泉自巖竇飛落如玉繩亦勝境也雕窠谷州南麥積山北有隗囂避暑宫故基對面有瀑布㵼蒼崖間亦勝景也鐵堂峽峽有石筍青翠漢姜維居此銀樁崖州東北壁立萬仭崖畔石柱如銀色光映日傍有洞穴求之莫得入九龍秦安寳葢清水卧龍階五仙洞階州東白水江之南山半有洞穴深百餘里中有黄盧木橋又有鐵橋橋下皆有流水如佩環之聲渡鐵橋數里有大風不可入㣲聞有雞犬聲不知何境界也伶倫徽鸑鷟兩當縣東古鳳州取名此山腰有登真洞傍有列宿峯石鏡峯下有分水溪登真洞鸑鷟山唐張果老登真之所洞高一丈深百尺臨洮府山曰西傾府城西南鳥鼠渭南又名青雀鳥鼠同穴鳥名鵌鼠名鼷禹貢導渭自鳥鼠是也龕山金臯蘭蘭州南五里州之望山也高峻澤厚左右蜿蜒如張兩腋東西環拱州城延袤二十五里漢霍去病擊匈奴鏖戰臯蘭山下即此地因謂是山為關塞云牛山金鎻林峽洮水所經諸峯聳削兩崖縣絶林木森鬱宛似封固故名通谷其谷東西出入中可容千百人往來不踰數十歩上有大竅可見天日慶陽府山曰大白城北黒水發源子午合水黄帝塟衣冠處烏崙環撫琴真寧馬嶺安化山左右有川其間舊多居民有菓實猿烏巖洞幽䆳莫窮所止相傳漢之牧地延安府山曰嘉嶺城東南范仲淹大書嘉嶺山三字鐫石五龍敷施伏陸甘泉三塠安塞九吾保安孟門宜川青眉延川獨戰延長其山峻險一人獨戰可以當千錦屏屹然高聳四時花木蒼翠及槅寺廟樓閣青紅望之如錦屏然故名龜山鄜石空洞石洞深一丈五尺内鑿萬佛石像世傳魯般所鑿玉仲中部玉華宜君䟽屬綏徳州境筆架清澗龍眼神木五虎府谷潄玉巖延長其中可容百人泉出如練寧夏衛山曰賀蘭山城西盤㨿數百里倚以為固寧夏中衛山曰沙山城西洮州衛山曰東隴衛城西傾禹貢西傾因桓是來即此岷州衛山曰岷山城北山黒無樹木魯般崖衛南兩崖懸絶有二靈柯挿入巖隙間俗傳魯般鑿山引臨江水入白水江以去塗塞之患河州衛山曰積石城西北即禹貢所載雪山四時有雪靖虜衛山曰烏蘭城南素嶺守禦所其山高聳夏冬積雪因名黒水源出於此行都司各衛山曰合黎即禹貢導弱水至于合黎祁連本名大山焉支山舟後漢匃奴失此山歌失我焉支山使我婦女無顔色金山永昌城北麗水自出白嶺凉州馬蹄廿州巖石間有神􅂹足在焉又有林松青松丹峽三名崑崙肅州衛西南與甘州山連其巔峻絶經夏積雪不消世呼雪山蘇武鎮畨衛東相傳即蘇武牧羝處大松莊浪積石西寧三危沙州三山聳出雲表故名即舜竄三苗禹貢導黒水處三隴流沙磧玉門關外有三斷石極大鳴沙山沙州城南峯崿危峻沙如乾糖天氣清朗沙鳴聞於城内其沙或隨人足而墮經宿復還山上塞外山曰天山舊伊吾郡有天山高十五里廣六十里冬夏積雪不消一名雪山匈奴過之皆下馬拜漢遣貳師將軍李廣利將三萬騎出酒泉繫右賢王于天山得虜萬騎而還即此處關陜山川夫秦四塞之壤也雖偏鎮乎西隅而國之形勝實為天下雄固帝王之業也若夫盤互而秀於南者則終南太乙焉嶐乎䕃於西極而東望潼關者則華嶽焉東注咸陽則灃水之所導也其境有蘭池阿房之宫咸陽之南周之鎬京也茫茫四陵南北相望秦宫所營灃其鬱焉豈惟涇水之望陵哉西北臨乎豳國而奕奕者其梁山乎絪緼而蒼蒼内有離宫别館昆明西夾輦道紆曲而相屬者秦之上林也鬱然起于鄠之東南者有紫閣峯焉其周之靈臺廢也久矣横亘乎藍田者有秦嶺焉灞水之所出嶢關之所鎮也截于西域而嫖姚之所開者其玉門關乎環于漢陽而㣲茫者其鳥䑕乎限於北漠之郵匈奴倚垣而窺者秦之長城紫塞也扞蔽朔方而胡笳戰馬之所集者其賀蘭山乎聲下龍門景入太華而浩蕩者黄河也而瀑布之漭漾則大白焉荆山峙於河則大禹鑄鼎之墟也若夫太液曲江之池樂游細栁之原驪山之温泉新豐之枌社隴山之九坂長安之章臺又有博望西郊芙蓉未央長樂建章甘泉之宫不可勝數其近而羅列者皆鍾秀于雍州其逺而環帶者皆隐耀於關中也三山終南大白太華終南山在西安府南五十里東自藍田縣界西入咸寧縣界石鰲谷以谷水出與長安咸寧二縣分界西四十里禹貢終南惇物至于鳥鼠詩曰終南何有有條有梅毛註周之名山終南也左氏傳曰荆山終南九州之險也杜註曰終南在始平武功縣南漢書曰太乙山又為終南山五經要義曰太乙一名終南在扶風武功縣關中記曰終南一名中南言在天中居都之南也又曰終南太乙左右三十里内名福地三秦記曰太乙在驪山西去長安二百里一名地肺山東方朔傳曰終南山天下之大阻也其山多玉石金銀銅鐵豫樟檀柘異類之物太白山按三秦記曰大白山在武功縣南去長安二百里不知高幾許俗云武功大白去天三百里周地圖記大白山甚高上常積雪無草木半山有積雪如瀑布則澍雨人常以為候語曰南山瀑布非朝即暮水經注曰大白山南連武功諸山最為秀傑冬夏積雪望之皓然吉茂蘇則值亂隐於扶風南大白山中按大白武功二山在郿縣葢舊武功縣地也今武功縣無此山華山大華之山今在華隂縣西山海經云華山之首曰錢來山其形削成而四方其高五千仭廣十里命曰西嶽又西八十里曰小華山又西八十里曰符禺山又西六十里曰石脆山又西七十里曰英山又西五十二里曰竹山又西二百里曰浮山又西百五十里曰畤山又西百七十里曰南山又西百八十里曰大畤山又西三百二十里曰嶓冡山又西三百五十里曰天帝山西南三百八十里曰臯塗山又西百八十里曰黄山又西二百里曰翠山又西二百五十里曰騩山自錢來至於騩山二千九百五十七里按華山三峯中一東西各二鼎峙盤旋峻極不可窮覽何景明曰大華終南大白實一山延亘不絶大華在華隂終南在長安大白在郿各望其地異號爾其山首枕嵩芒尾貫羌蜀表裏秦關葢邦域大紀云雍大記終南山五經要義云終南山長安南山也一名大乙潘岳關中記云其山一名中南言在天之中居都之南故曰中南福地記云其山東按驪山大華西連大白至于隴山北去長安八十里南入楚塞連屬東西諸山周迴數百里名曰福地辛氏三秦記云其山從長安向西可二百里中有石室靈芝常有一道士不食五榖自言太乙之精齋潔乃得見之而所居地名曰地肺可避洪水相傳云上有水神人乘船行追之不及猶見有故漆船者秦時四皓亦隐此山初學記驪山驪山在西安之臨潼縣南半里即抵其麓經雷神殿東折門有綽楔榜曰温泉池過此有室三楹啟其扄即温泉也岐山鳳翔即岐周今在八府為地少然邑凑而無險阻土物亞於西安余至鳳縣觀鳳鳴之山曰南岐至成縣詢古西康州有鳳鳴處鳳縣今屬漢中成縣今屬鞏昌各去數百里間於羌戎則文王治岐地葢廣逺也褒斜谷褒谷在褒城縣北郡國志謂北口曰斜南口曰褒長四百七十里同為一谷兩谷高峻中間谷道褒水所流乃張良送高祖至褒中説燒棧道曹操出斜谷遮要以臨漢中諸葛亮由斜谷取郿皆此道也斜谷在府西北入路至鳳州界百五十里有棧閣二千九百八十九間板閣二千九百九十二間土人云其間有一溪可行舟龍門山去軍城五里官道之傍懸壁環合上透碧虚中敞大洞卞潄清泉宛然天造水簾懸夏冰柱凝冬真異境也文潞公詩壺中别有境天下更無竒宋景文趙清獻王素韓絳田况吕公弼吕大防諸公皆有留題行三里又有後洞蘇元老龍洞記自利至興行五百里幾半蜀道而巖洞之可喜者莫如龍洞重簷厦屋深不可窮唐沈雲卿詩長竇亘五里宛轉復嵌空伏湍照濳石瀑水生輪風仇池諸山在鞏昌府成縣西一百里寰宇記在成州上禄縣其山高峯萬仭自利州來其東西二門盤道可七里元和志載宋書氐胡傳云仇池方百頃四面陡絶高平地二十餘里羊腸盤道三十六回山上有豊水泉煮土成鹽范􅁮後漢書河池方百里左右皆曰白馬氐麥積山在鞏昌府來南八十里去舊天水縣東百里狀如麥積為秦地林泉之冠上有姚秦所建瑞應寺山之北曰雕巢谷有隗器避暑宫對面瀑布㵼出蒼崖間又有魏乞弗後墓鎻林峽在臨洮府城南六十里曰史家灣洮水所經㑹灣之右即南山麓路引一線穿麓入峽峽之阻諸峰聳峭兩崖懸絶故山道狹隘林木鬱森四封固蔽而無所通故曰鎖其桃源自番疊戍界與岷山分𣲖江東行者此經岷州穿鐵城旋入萬山間凌波盤渦倒山堙谷而來遂受吞此峽適一登臨則衝波騰浪激盪險壯突出峽口滔滔巨野逼府城而去龍門山在舊太安軍城五里去今沔縣南六十里官道之傍懸壁環合上透碧虚中敞大洞下潄清泉宛然天造水簾懸夏冰柱凝冬宋文潞公宋景文皆有留題行三里又有後洞蘇元老龍洞記自利至興行五百里幾半蜀道而巖洞之可喜首莫如龍洞重簷厦屋深不可測西嶽大華山經曰大華之山削成而四方其高五千仭其廣十里葢指華中削成而四方者爾四方之外宫之盡華也自縣南十里入谷逶迤上二十里抵削成北方壁下乃谷即西南出不可行行東北大霤中一峽纔容人左右穿受手如决吻人上出如自井中者千尺曰千尺峽北不至十歩復得一峽百尺人上出如前峽曰百尺峽則東南行厓往往如覆敦出人穿其穹中行穹中穿如仄輪牙也厓絶為橋者二所東北徑雲臺峯東南得大阪可千尺人從其罅中躡街上阪窮為棧五歩顧見罅中如一耦之􅎌新發諸耜矣罅中穿如峽中峽中衘如罅中峽中之繘垂罅中之繘倚皆自汲也棧北得厓徑丈人仄行於穿手在决吻中左右代相受踵二分垂在外足已茹則齧膝也足已吐是以趾任身也北不至十歩厓乃東折得路尺許如厓剡中人並厓南行耳如屬垣者二里剡窮復西出厓上行則積穿三丈有厓從北來踆此厓上復高三丈自踆首南行厓如前剡中屬耳甐耳矣三里而近為蒼龍嶺嶺廣尺有咫長五百丈厓東西深數千仭人莫敢睨視是酈生所稱搦領須騎行者矣雖今得十級行哉足欲置之置先嘗一足于級上置也然後更置一足其所置足猶若置入石中者猶人人不自固匍匐進也及窮得厓踆焉高二丈一隅西北出人從其隅上南一里得厓又盡磝不可以穿繘自汲也是皆所謂懸度矣不至百歩西北冒大石出厓下西南上二里得松林五樹稱五將軍厓上者不見杪厓下者不見本從縣中望見松如樹菼也西一里有大石如百斛囷不知何來客於此横道而處踰之為穿徑二十所西南百歩得巨靈掌掌在削成東北方壁上不盡壁五丈許人不得至掌二丈許掌形覆其拇北引如三尋之㦸從縣中望見掌即五指參差出壁上也又西百歩詣削成四方上矣西南望削成四方中東北望所從上削成道道從東北隅出二十里是錞于雲臺峯猶杓之在斗矣削成上四方顧其中汙也上宫在汙中西北玉井在上宫前五尺許水出於其上濳于其下東北淫大坎中凡二十八所北注壁下壁下注道中一穴北出水從上冪之也四壁之穴各在一摶上宫東南上三里許得明星玉女司含神霧稱明星玉女持玉漿乃祠在大石上長十丈許祠前輒拆拆下有穴穴有石如馬拆南五丈坎如盤者五所如白者一所水方澹澹也下從祠東南峽中行二里得池二所大如輪東西行三里望見衛叔卿之博臺在别巔為埓不盡厓尺中如砥可坐十人厓南北繘纚纚也欲度者先握繘自懸厓中乃跖厓自汰令就繘不得繘還跖厓自汰得而後釋所自懸繘也此即秦昭王使人施鈎梯處也西南上三里許得一峽如括曰天門門西出為棧而銅柱陿不能尺長二十丈棧窮穿井下三丈竅旁出復西行如棧而銅柱一池在石室中不可涸也天門旁有臺如叔卿之臺南望三公山三峯如食前之豆是白帝之所觴百神也從上望壁下大谿谿肆無景即日中窈窈爾久之一山出其末若鏇矢頃即失之矣是為南峯南峯前出南壁上東峯旁東峯出東南隅壁上西峯出西北隅從下望之五千仭一壁矣攀龍曰余既達削成四方中不復知天不可升矣余夫善載腐肉朽骨者乎及俯三峯望中原見黄河從塞外來下窺大壑精氣之所出入又未嘗不爽然自失也關陜山川仲夏在華隂縣將登西嶽竊意兹山日有登者遂與御史杜君㕘政胡君提學王君偕往先至雲臺觀又與行五里至玉泉院入南澗口泥徑仄逼荆棘偃仰五里至第一關歩行自此始三君者皆色阻不往予獨青鞋皮襪與校官一人僕夫數人以登以三君畏不前乃又竊意自有登者而已上行七里至希夷蜕骨巖巖傍有道院下有小池池之西有懸崖高丈五許遂揭水題名其上自是凡遇竒石輒題名又上行二十里蹈霧蹠雲﨑嶇輆􅀈而至于青坷坪俯視麓下已㝠㝠如烟雨之區仰望三峯巍巍屹屹高聳天際不知如何而上坪側有道院北有小洞洞中一辟榖者居之歸宿于觀至明攬衣直上至回心石石東南之路皆斜峭絶壁攀鐵鏁自此始游人至此皆疲而畏險輒還故曰回心予於此始謂歲有人登而已遂令從者二人先攀校官繼之余遂繼之攀之狀左右手逓接兩傍鐵鏁足逓踏松杙目眈眈心慄慄以上凡攀行八十歩其名曰千尺峽東北轉行一里許凡攀行百歩其名曰百尺峽又東北行幾二里許則面崖而兩手竝執崖上鐵鏁足踏木棧以漸東移横行百歩其名曰仙人橋又東北行一里許凡攀行六十歩其名曰胡孫愁又東北行二里許凡攀行十歩其名曰閻王匾又攀行三十歩其名曰閻王峽又行幾二里許攀行七八十歩其名曰老君犁溝又行四里許至雲臺峯折而南行三里許至日月巖其崖有紅白二景天成石上此有黄冠五六人依崖構屋居焉轉西南行二里許是為山脊兩傍皆萬仭絶壁脊廣三尺許列鐵柱閑鐵鏁于左右過則伸足于前坐于脊上兩手秉鎻以身漸移而前百歩許其名曰蒼龍嶺又上行一里許路又忽絶由深洞以入三十歩許轉而上其名曰鷂子翻身歴過諸險復得易行上觀五松其形怪詭不可狀又上至東峯絶頂洗頭盆在焉又折而西三里許是為玉井余挹而飲之甘冽異常再登西峯絶頂上有鎮嶽宫傍有石洞遂題詩壁上西峯之頂缺空丈許有大石葢覆于上此乃造化竒跡予入缺處命僕先我予後出缺口而下望晦晦幽幽淵然無際不覺神變股慄東南二峯若仙人掌賀老巖黒龍潭皆覽而盡西眺秦川北俯黄河如線如帶南則秦嶺以南東指潼關之外諸山不啻培塿丘阜六合睫下蹙乾聚坤大哉眺也至此輒敢謂代有人登而已非天收風歛雷又决不可上乃知其遊若山靈黙相之者初讀山海經謂大華之山削成而四方其高五千仭至謂鳥獸莫居未之信也今則果然又謂有蛇焉名曰肥􅖆六足四翼今聞山之奥處踞有鉅蛇葢即所謂肥􅖆者方益信此書之不誣遂題名于觀之石壁由舊路而下頗覺稍易還第一關天已瞑至玉泉院宿焉華山西峯聞游者及青柯坪仰瞻多自阻以故卒不敢往遣其僕慣登者二人導予翌日業行近山口泉聲琅然稍入殿角出灌木中僕曰此玉泉院也至院外觀希夷先生塑像熟睡如生立清樾中諸道士出迎前導傍山對開神意飛動于時宿雲在巔羣峭未出餘烟自旁山上褰朝陽射其端壁立之妙荏苒可得風觸壁鳴及澗其停滙處澄徹如鏡㣲漣動摇影上壁中多紅白礫余盥顙清寒透骨試嘗焉甚甘美勝吾郷陽闕泉幾十倍澗北絶徑處實如柚者下垂僮越險取食之蜇口棄去西轉至小石洞洞外平石如枰中可參坐坐其上書所賦詩而東巖方洞適與之對意靈詭内潜遂相率以入僕曰此希夷匣爾葢其𦵏也棘梗道不得近因疑匣為函恐昔所盛蜕者而俗謂之匣爾及上峯峯直立鐵鏁下垂望峯端漫不可辨但峯腰雜樹倒懸斜倚而幽意可人鏁兩崖多小坎從下達上深可二寸僅容履端葢登則縁鏁以託足者僕曰上有道士王友巖居惟玉泉一二道士時裹糧往食之鏁盡處及石隙號西𤣥門此峯葢唐𤣥宗妹金仙公主駕鶴升仙之地而門則𤣥宗覔金仙而鑿焉者也從門入盤折數峯頂始及友巖所居南望連山不知所止上無雜草惟細辛一方不多産余雖摇中而憚險弗敢進坐峯根娑羅樹下瞻悵者久之由峯根北折度狹徑外則壑谷類也余問青柯坪逺近不對惟放歌倡答而去出樹外大石突立中谿若斧劈然僕曰此第一關也郷人避亂時每入關壘石絶此予視關内尚亂石旁聚無數關右二里石虎踞因坐摹之忽不知四人所在厲聲呼不應跡半里所則皆坐澗邊澗外瀑布正懸南崖端下激樹􅆬飛沫成雨㸃因風容與久而後墜又百餘里歩則第二關也視第一關壯雖不逮而險則過之關内隂風勁甚不可留促歩出返顧所來則一青靄爾復登頓詰屈數百折見平緑藹然林端既至乃青柯坪山恰半從入山來悉﨑崟側塞夷者惟此草長過人岡之祠西南則始攀鏁處也置杖草間聞松聲飀然此以下皆雜木無松以上則純松矣蟬鳥遂絶詩人謂山深無鳥聲信然鏁洩危石上僕先進予亦攀過路縈紆並石根極隘瑟縮以行路斷接以木行則摇少進一峯前障不甚峻上大下小所謂巘也無草樹黒黄白相間上有赤白二圓形僕曰日月巖也復行二百餘歩直崖嶃立有短橛閣崖罅為級如梯鏁旁垂問之乃百大橦也級每腐或缺由級以上先輕躡試之然後寘足過此有類是而愈長者千尺橦也既上凡石之如嶠如扈如巋如巴山者眩視不可數抵前崖徑忽斷崖峻削無可為徑者即崖腹綴小木如彴當絶谷之上凡三接始及徑鏁亦横綴崖腹予目焉跡未及而先痿矣遣四人前度慮逼吾後以振也余趦趄握鏁寸進之閔聽一視歩歇半木伊軋鳴東野登閣尚稱脚脚踏墜魂吾今何稱哉曰自咎以親枝履此險半時許乃得過問諸僕僕曰老君離垢也信仙凡之隔如是復斗折道松林間翳不見日毛髮聳然沈生謁禱山神祠懼蒼龍嶺之迅風也既至老木赤立惟東南一枝僅存㣲有葉根亂布石上若萬小蛇攅綴蠕動余駭然貌其大較因思平日畫樹雖捜竒獵怪致巧寧得似此所謂畫不神于所倣而神于所遇也然而望蜿蜒入雲勢未知何以處此嘗聞登者言度嶺慎勿旁視視則惡風至危不可度嶺凡兩折中突旁殺如背色正黒鏁當背上並鏁皆小坎亦猶上方峯所託足二僕先示所以登因四布伏嶺背竊窺其旁則深不見底但見松頭濈濈出沒蒼烟中萬峯羅拱向背高低邪正起伏若翠浪洶湧相後先秀不可狀風颯爾有聲衆籟齊作杳蕩奔激逺近胥應憶登者言遂膽掉股栗不能動去上折無幾視若天淵然風稍止尋進而僕已過上折矣余勉强盡一折行上折覺稍便漸熟故也自嶺下仰觀將謂頂絶無復過此及嶺端則峯頭挿雲尚未知有幾里僕軰弗喻予以西峯尚逺勿稽遂作以行至此則少上皆徑於石鏁從横罕無鏁者又越五六險始及鎮嶽宫宫在西峯頂東諸神列坐不辨何神松罅間金碧參差與日争炫者嶽帝廟也及廟中見道士王老師欵坐廟之前則其居也窻在西壁隙有光開窻而其居則庋之懸崖之上俯瞰峻谷不知所極惟松頂麻萃叙距窻二丈許峯壁峻拔自峻谷直上霄外畧無突陷真所謂削成者壁上一松寄之􅪤間根直下如懸死蛇枝稍正拂窻手可接松實纍纍余提以斷甓弗中墜下觸石且墜且觸聲如從甕中來良久始息至是則頽陽尚㣲霧彩漸發倚窻望西北平田無際荒烟莽然中有渭水委蛇如龍日光射水中金爍不敢正視居之南乃大岡頗類龜背色墨而粗澁岡下羣峯如攅劔如束笋無一渾然者予將摹之而嵐靄迷漫弗果東望玉女峯殿在峯頂雪壁爍日殿旁有物似人非人往還松樹間逺不可辨岡稍南大跡一岡上深可三寸長四尺餘旁鐫巨靈足三字竊謂力能劈山其足跡僅如此得非不能載其形乎且東峯掌形自峯端達峯底假使所傳果然則如彼之大手而配以如此之小足有是理耶東峯玉女峯昆季相倚惟南峯嶻􅍦隂風怒號御裌猶冷視蒼龍嶺裸體其寒暑之異乃爾哉華山南峯拂旦起王道出華山記相示行二三里稍疲坐松根而四人已在石梁外高唱曰南峰至矣起而前僕曰此希夷避詔巖也目昏不敢留盼竟不知已達巖底因仰首怪狀可愕巖上覆以蜂窠然頗類太湖石或類波濤蕩潏所為淡黒津津焉余坐觀自謂不世竒逢西南角一罅明透可側身入命僮掖入之及半見罅外樹梢動搖日影流罅中明暗稍分上滴瀝如雨隂風挾罅風撲人巾服皆潤下濕不敢進睨石壁有鐫字四行不辨何字由是自巖底北旋嶢兀中度小𣙜又度架板代𣙜者三若波舟之所摇蕩古松一根拔卧壑上閼道勃窣踰松上過得真武祠從祠畔上登扶石䦨轉峯閣皆石版布道䦨外絶谷試㣲瞰怵然神􅋏閉目低頭倚壁始定峯南上下壁削亘東西皆䦨也異焉伏石版下覘葢鑱壁成􅀈以疊石置䦨面之中窽石以入則所謂朝元洞也深可四丈廣近之高又倍焉純白如雪中設三清像余問主者嶽師師曰昔賀老師營此四十年雖鑿焉而不敢碎石下墜墜則雷動龍潜故也自爾且鑿且運功未就而師亡繼以其徒甫就洞外數歩師又穴石版鏁以下達西轉則師之避静處也沈生等躍然往觀予待二時許還曰穴之下則鏁雙垂鏁盡則版道也穴相距不知幾十丈石代挿壁以當其中縋縫下至石杙少息復縋至版道又少息然後攀鏁西行數十歩漸高又數十歩始及避静處回視版道則載銅杙之上而銅杙則挿之峻壁之中外雖有䦨木久多腐以鏁是賴掩其振摇石杙一銅杙十七竟不知作何時於何所置足䦨之外下見松栢如灌莽在杳㝠中師去幾時其室其㸑所猶在然非憑土憑於塊石之突崖耳室之西則别巖也巖類俛首形遥覆室上上鐫全真巖三大字填之赤色然上下俱不可倚豈人履虚而作之也耶吾初履版道知有版道而已奚暇他及既至而得其所以始不知止於何地我軰壯年恃力不少怯今精奪於此矣去洞沿故路東行降八九折縁磴復升巨石錯峙石分處如甈下視類井底黯不見物然兩木倚石可下僕曰安真人肉身所沈生率三人下觀及還談真人坐石龕不壊其衣履如生人抑坐逝處邪躋石以望見峯頂羣松如沃峯背類覆盂麄皵如礪可縱歩四人争先若飛予至此已攰甚足不吾許殆及嶺憇龍潭旁潭旁水頮面潭有三深淺不等深者不過二三尺僕言雖大旱此弗枯志稱頂有池生千葉蓮覔之不見不知當騎茅龍天飛者其由此非歟最高處一松孑立余倚松望信乎諸峯羅列似兒孫矣雲適生從王友峯東峯兩間出倚風作嬾熊歘空突然北涌以巔崖狀既而復還漸幔于松巔不動如憇而山北所見皆漫漶不可識意彼或仰瞻吾固在雲表也玉女峯降而西二里許東折漸上至是無磴多倚木枝根石間代為級皮脱滑不可登五人相與推援以進凡二十餘處則玉女峯頂也嘗聞女冠楊氏名姝也少女入山食松皮八年始火食或枵腹即大雪七日不粒亦無恙竟日夜弗卧因訪之石室中尸坐如寐見予起相揖笑曰此中罕聞人聲君何來之異耶余告之故就問其入山時則三十有七歲今已七十有二歲矣自云一生無病觀其顔雖非丹而精神燦然歩甚健固知其有養也引余歩松間風適來激峯壁直下如箭尋穿松林度壑而去相與立隒端因指西峯東面窊隆如蓮花謂予曰此正西嶽蓮花峯也安有峯頭玉井之産予至玉女殿道玉女所由觀洗頭盆葢石上一圓坎爾水紺碧不乾集仙録稱有五舀不知何據之殿右觀韓姑姑遺蜕遣僮撤所障亂甓啟棺葢窺之殆如初沒者楊氏曰沒幾三十年矣雖槁不腐以杖摘其足亦不僵有道者乃如是葢楊氏師也大石如龜殿正坐龜上而楊氏石室則藉龜腹為之覆由殿前踰石梁北眺崇岡廓然然貍豸不能進岡半有大􅪤焉楊氏曰唐𤣥宗禱雨抛簡處也下通黄河恐或然耳復旋至石室前指以近觀仙掌所在余與四人循東峯北行斯須林斷豁然乃東峯之西北壁而玉女峯之東北崖也巖西砮如鳥喙距東峯不逺上豐下縮瞰即魄禠砮處小松一株附巖側不見根出巖上者三之二中無鱗而光僕曰此捨身樹也游者抱樹轉數匝則獲福予僮聞之即抱之轉不休峻遏迺止巖正當仙掌可察遂坐憶王涯仙掌辨謂峯有五北壑破崖而列自下逺望偶為掌形俗傳則曰巨靈擘剖掌跡猶存余因思涯之所辨似得於傳聞未嘗如吾之近觀也殊不知膏出於􅪤溜以漸淡黄㣲白間之黒壁中上則五岐下則片屬岐者如指屬者如掌復有細溜無數雜五岐間逺望之則惟見其大者故五岐如指耳寧有五崖北壑破崖而列哉大華仙掌辨西嶽大華山華之首峯有五崖北壑破厓而列自下逺而望之偶為掌形舊俗土記之傳者皆曰昔河自積石出而西流既越龍門遂弭南馳者十數百里折波左旋將走東溟連山塞之壅不得去有巨靈於此力擘而剖其中跖而北者為首陽絶而南者為大華河自此洩茫洋下馳故其掌跡猶存巨靈之跡也余聞惑之乃往觀曰誕哉此説乎夫所謂神者非人也其動無聲其行無跡若形而無象若氣而無色拔山剖澤而不見其作皷風奔水而不見其力視不可察名不能及故推而謂之神茍有聲形可聞見非神之所為則皆人力之能及也烏有神之作力而有人跡乎且夫高天厚地聳山流川者神之所為也所言開山導河亦神也神之所以神者有作而無悖一成而不易烏有始塞而復達之始連而復絶之始不知終是不為神矣且此靈之運為何古乎在太初開闢之始乎為陶唐洪水懐山襄陵之際乎以為開闢之始也宜當胚渾之先天地未位萬象茫昧尚無定歸當止一河之壅抑而一靈與其道借有其事自為而著悠悠乎年代之眇沒其誰也克傳以為陶唐洪水之際乎則禹奠百川宜在禹貢乃曰導河積石至于龍門至于華隂東至于底柱皆屬功之所致以達于海豈天地大異之若此典記不以為文哉天設四瀆宜有以通不當始遏其流滯撓其和氣及其汩亂而後理也且山谷之作此形何則不有嵲屼相搏高深相滴乃有鋭而出者為虎牙偶而背者為熊耳角而巘者為牛首冠而峭者為雞頭必以形之類形而必加説則雞牛熊虎之象其亦有作乎余嘗覽張平子賦西京至巨靈高掌厥跡猶存之辭以為駭聞精達常以是感使不語怪神之亡何所述明暨觀其形而咨之果謬悠而無據也吳山在今鳳翔府隴州南七十里隴州唐天寳改曰汧陽郡地志稱曰吳山山有五峯一曰鎮西二曰大賢三曰靈應四曰㑹仙五曰望輦書道岍及岐岍即此也周禮其山鎮曰嶽山水經云吳山之峯秀出雲霄山頂相捍望之常有落勢其位西方故曰西鎮自唐宋金元代加王公封號皇明洪武初悉革去之直稱曰西鎮吳山之神山西太原府山曰方山城東石室大原西南篆字人莫能識麓臺榆次灰泉大谷幘山和錦屏交城羊腸郡國志萬根谷石蹬縈委若羊腸然白虎文水渦山壽陽紫金臨白馬盂藏山程嬰公孫杵臼藏趙孤處天柱静樂蒙山平定少山樂平恒山佐命清漳水出此夏屋趙襄子北登夏屋誘殺代王遂有代地即此山側有西峩谷鴈門鴈出其門故名山西之關四十餘而聳拔雄壯則鴈門為最地險易守秦戲繁峙滹沱之水出焉五臺山五臺五峯高出雲表頂皆積土因謂之臺世傳文殊師利所居清源山即此仙人山石巖上有人坐跡山腹石有手跡山下石有脚跡皆西向立聖鍾山與五臺相接上有仙寺嶺三賢巖習觀巖聖僧巖青峯寳陀峯勝跡二十二處正陽崞程侯忻聖阜定襄岢嵐岢嵐高二千丈石樓興翠峯保徳吕梁石州禹貢治梁及岐春秋梁山即此屏風寧郷平陽府山曰姑射府西即莊子云三磴襄陵其山九十餘里其形三磴北有龍鬬谷内有龍澍神祠姑射自西北蜿蜒而來有泉自山下東流計百十餘穴東入河汾婁山洪峒浮山浮山羅雲趙城卧龍曲沃澮高翼城汾西汾西翠屏蒲中條蒲州山跨平陸苪城安邑夏縣解州之境中有桃花𤣥女二洞及谷口蒼龍等泉首陽即禹貢雷首山伯夷叔齊隐此五老臨晉孤山萬泉龍門河津西北即禹所鑿通黄河處背滹沱之巨浸右石徑之絶險羣山迤邐形勢甲于海内檀道解州玉鈎安邑湯山聞喜箕山平陸許由隐處九原綘州晉諸大夫塟處檀弓所載即此稷神稷山稷播榖于此大行絳縣西北諸箕支脉大隂崖壁峭絶陽景不到故名折腰恒曲霍山霍今為中鎮介山靈石介之推隐此壺口吉即禹貢所載蒲子隰堯師蒲子隐此妙樓山山有石巖高廣内有石室前有龍池水泉冬夏不竭翠㣲大寧龍窩洞石壁上有巖竇深窅石樓石樓蒲水出此北樓永和底柱峯平陸黄河中流其形如柱禹鑿底柱以通河三川既决謂之三門底柱之側有老君爐傅巖平陸傅説隐此噴雪巖解州巖泉噴出㓗白如雪天柱峯中條山有瀑泉自天柱峯東懸流百尺而下出王官谷入沙泉王官谷唐司空表聖隐地沿貽溪南至谷口石路巉巖上有白雲洞石泉洞藏雲洞又東有八仙洞紫團山由慈雲石至𤣥葢寺山勢巉屼諸峯挺峙西連王屋東俯林慮諸山南北相拱帶跨青蓮百泉之勝大同府山曰白登府城東七里即冒頓圍漢高處恒山渾源州南二十里即北嶽也水經謂之𤣥嶽其山高侵霄漢舜北巡狩至於恒山即此山有天風嶺大茂山安王石龍泉觀及通𤣥谷歩雲路望仙嶺碧峯障虎風口集仙洞白雲堂紫芝谷潜龍泉琴棋臺會仙府聚仙臺得一庵夕陽巖白虎峯古老嶺石脂圖白龍洞清凉懐仁黄花山隂龍門山隂亦名隘門燕京朔汾水出焉紫金馬邑高是蔚州千夫廣靈白石廣昌大白靈丘枚迴嶺滋水源自嶺懸流五丈湍激之聲震動山谷官山古豐州境山有九十九泉流為黒河三受降城古豐州西北八十里東西中三城唐張仁愿築潞州府山曰壼關城東發鳩長子紫雲與壼口接唐𤣥宗潜子潞重九日與郡官登壼關山時東北有紫雲現光彩射日故名三嵕屯留疑山屯留仙堂襄垣伏牛潞城東南大王壼關白巖黍城羊腸坡壼關東南一百六里漢地里志壼關有羊腸城長三里盤曲如羊腸十八盤隘壺關縣東南汾州山曰萬户城西山水記堯時洪水諸山皆沒獨此山不沒濟者萬户狐岐孝義勝水出焉介山介休麓臺平遥即山海經所載雀鼠谷介休遼州山曰遼陽城東箕山城東南七十里石壁中文字人莫識五指山城東北九十五里半山石壁有五手指文因名秀容榆社首陽和順古蹟孫臏坡西接馬陵關伏兵處沁州山曰龜山州南銅鞮州南緜山沁介子推自焚之所䕶甲一名候甲湼水出焉石盤山武郷聖鼓山州城東北上有大石擊之其聲如鼓下有流水入漳河俗名小河澤州山曰羊頭高平神農嘗五榖處王屋陽城南境有仙宫洞天廣三十里即禹貢所謂析城至于王屋是也析城陽城馬武陵川龍門山龍門在秦晉之間萬山之㑹禹治水極力之地形勢甲海内久懐游覽而未獲過辛封謁卜子夏入福聖寺加衣風滋甚衝風往神前村至山麓乃縁棧道歩屧而升既謁禹像風益焚輪起撼松栢騰砂礫上蔀天日下掩河汾若蛟鳴虎嘯若禹役使羣怪持雷斧秉神斤以闢龍門時也食既游觀四壁金碧丹青十三雕謝葢自六籍子史言禹事者無不開方絢織且筆精意達非時工可到殿記在元貞年間壁圖必當其時關中人稱岐山周公廟畫殆不過是也既乃北謁後寢見塗山氏像止二嬪侍側而冠裳樸質猶可想見古風出廟西南乃捫蘿縁磴以上望河樓即谷泉子所改吞吐雲雷樓也樓在龍門左闑之上葢梁山中斷而東峙者也其前懸臨中流上作石室旋枉其外以為轉廊室塑十閻羅像俗言至此絶險與死為隣也樓外俯黄流凌白雲孤山直對而雷首中條𣺌𣺌㝠㝠乍見乍沒皆入望眸蹴蹬而下會二公至流丹亭亭北倚石崖其南半懸中流栢柱斜庋其下上有板棚鑿板如井口以汲流即勺水於滄海也亭扁則白巖喬公小篆下亭就實齋子於河壖壖西即河也其東皆怪石層崖崒嵂﨑嶇不可以歩而内濵子飄裔如飛予力追不及至壖則而山東轉北遮河流不見來處停灘環望四面皆山中如院落其前則兩山拱峙自窟穴而出故曰龍門云紫團山東游紫團山自五龍信宿而至道路窈窕穿林木而上者幾十里及慈雲寺有僧數人邀予觀元人三十六景詩碣在墻根仳仳然散且缺矣由慈雲石磴硈屈攀巖而下復幾里則袤然復地為雲葢寺山勢四壁巉屼盤遶諸峯挺峙競秀而變形望之鬱然䓤䓤西連王屋東俯林慮諸山南北相拱帶跨青蓮百泉之勝斯為太行樞要也乃抵寺憇數日山僧導予游循石徑南渡溪由東峯入屏山遮地即為參園已墾為田久矣歴西筆峯縁石而出時藥物纍纍然幽香沓至復西轉觀瀑布淙淙成流即採藥坐石濯足飲泉而歸復數日山僧言西峯石局予忻然從之盤條覔歩陟兩峯間其地盤夷可屋予意宜置石室記刻於此忽飄風颯至西望大谷烟瞑蒼翠泉聲冷冷幽禽間作予􅕎然久之知即所謂瀑布者邊峯峙立此得徑觀焉王官谷王官谷者唐司空表聖隐居之地今少㕘許君徳徵重修而増飾之涇野子至解偕丘孟學往游焉馬至故市西折而南谷水北流入市問即貽溪也沿溪南行五里至谷口路多巉巖石礙馬丹柿赤棘夾路掛裳衣躑躅至先門伏馬而過道流引登高至門門下砌石百級夾扶之而後能上道流建閣以祀玉皇乃升閣㕘拜下閣北至三詔亭又北過休休亭謁表聖日已暮乃南過了了亭有侯叚兩生讀書白雲洞洞則元孤雲子李了了庵所居以學休休者也乃南臨石泉橋望天柱峯則見羣山環拱而此峯孤高挿天與故市街所望益不同葢以峯南北之崇山又逺也渡橋夜與孟學連榻石泉洞中洞在天柱峯根其前有清流自東瀑布泉引來而西匯為小池欄䕶焉晨興瞻玩表聖像飄然有出塵態讀休休記乃知其抱經濟材與時不合而隐甚可痛惜但末題耐辱居士則柟又病其隘也壁間多宋元人詩道流引登西山觀秦王硯硯大如碾盤無口下如尖底磑表聖山中記已有此名其秦敗晉師于王官時所遺者乎自硯旁不由故徑懸下蒼崖觀雙人石石在天柱峯西北倚峯而立上有圓石二枚恍若人面狀又似北望秦硯而欲濡毫者也道流又引西觀藏雲洞北至蘆葦泉言洞常出雲而泉更甘冽云為曹仙姑地未往直趨掛鶴臺瀑布自天柱直下而臺在其左旁鶴二月來五月生子去有懸草眠迹焉臺東與孟學四人各據一石而坐北瞰天柱益突兀有四瞻雲日俱無影止有一峯高接天之句欲東升以觀東瀑布道流難之遂北反坐聚仙堂東游豬耳山又東南至瀑布登懸崖以觀之聲如雷轟貌如雪舞瞻瞰更久乃下崖傍流而行北至柿林臨流偏坐磯上五臺山五臺山在五臺縣東北一百四十里環五百餘里山有五峯高出雲表頂皆積土故謂之臺佛經云北方有文殊師利所居之地曰清涼山即此也山中圓光不時呈現亦時有金蓮鉢囊熟緜花之瑞栁宗元曰雲代間有靈山焉與竺乾鷲嶺閣立相應王琮詩靈跡傳聞事不虚好山多是異人居雄臨絶塞風霜古寒逼新春草木踈百里行看層巘出五峯坐見彩雲舒四時利澤霑羣品誰識楊枝一灑餘中臺高四十里頂平廣周六里頂西北有太華池取水禱雨輒應正東左畔去臺五里有雨池前三十里有飯仙山即中臺案也東西有鷲峯西側有甘露池蔣瑄詩丹崖碧嶂聳竒觀天近星河壓衆巒雨少四時山自潤雪多九夏地偏寒平吞嶺海烟波濶逺接天池宇宙寛萬籟此間俱寂寂惟聞鐘磬出巖端東臺高三十八里頂平廣周三里頂東畔有那羅延洞僅容人身側入洞中風寒盛夏有冰五色光彩嘗從内出又東有樓觀谷内有習觀巖西北去臺十五里有華巖嶺仙人洞東南嶺畔二十里有明月池人傳以紗帛障目下覩或見月在水中西南有青峯一曰大羅頂南連望聖臺臺下有東谷池西南石上有羅侯顯跡又有善財庵又東去臺有温湯池温泉寺釋覺詩度險凌寒上翠巒東臺風景望中寛深藏佛境乾坤大逺鎮皇圖社稷安天雨飛花香冉冉海波浮日影團團幾回笑指蓬萊島三㸃青峯似髻蟠西臺高三十五里頂平周二里頂上有魏文帝人馬跡北有秘魔巖洞天隂中有聲如風西嶺畔有薩埵崖捐身崖去臺西北有八功徳水東北下有文殊洗缽池釋覺同詩西嶺嵬峩接逺蒼回瞻郷國白雲傍孤峯嶺翠連三晉八水分流潤四方晴日埜花鋪蜀錦秋風仙桂落天香當年獅子曽遺跡巖谷常浮五色光南臺高三十七里頂平廣周二里南去七十里麓畔有聖僧巖又名滴水巖西南二十里西崖畔有三賢巖又名七佛庵東三十里交口下有聖鍾山狀如覆鍾西北一十五里有清凉嶺嶺西北有清凉泉上有羅漢洞東北有竹嶺東南十里有金閣嶺蔣誠詩融融日午麗崇臺四面山光罨畫開清磬有聲常出樹古碑無字漫封苔安禪老衲忘生滅解蜕神仙任去來多少路傍經過客登臨不惜重徘徊北臺高三十八里頂平廣周三里名掖斗峰頂南畔有羅侯臺臺頂有黒龍池即天井南下二十里有白水池與天井連其水經繁特縣峩谷口入滹沱其麓有七佛池南又有飲牛池東北有寳峯又名寳山産銀石緑又産天花菜東北二臺麓有金剛窟又名金剛洞去二臺各二十里昔佛蛇波利入此不出霍山自趙城覽周穆王封造父之地以趨中鎮時適雨霽由峪口入十五里至鎮下其形勢可伯仲於諸嶽冢秀而崒翼拱而墮廟在山麓首陽山在蒲州南四十五里為伯夷叔齊隐處癸酉十月道過潼關去首陽僅里餘遂出關北渡黄河登岸即蒲州也至山中謁二賢祠門之外有古栢二其一大二十圍高二丈許形狀殊怪其次圍殺三之一二根相距數尺而榦上交若兄弟相倚者傳為二賢手植殆未必然其赤千年物歟祠之像為宋元祐中所塑其前復塑一白鹿道士云二賢食薇兼飲鹿乳故塑之此説不見傳記人鮮有知者祠下有歴代石刻其最舊者唐開元十三年梁昇卿碑也祠之右即二賢葬處高墳並峙上多古栢直墳之前為屋中樹山谷老人碑及刻首陽山古賢人墓六大字日暮乃還夫首陽之重於天下後世以二賢之故然考山之所以得名其説不一孔子稱伯夷叔齊餓於首陽之下考亭註首陽山名及其註詩首陽之巔則云首陽首山之南安成劉氏取春秋傳趙宣子田于首山謂汎名其山則曰首山以山南而言則曰首陽先儒謂首陽即古之雷首禹貢曰壺口雷首至於大嶽蔡仲黙云雷首在蒲坂縣南蒲坂即今之蒲州盡州之山無所謂雷首者今首陽北數里有中條山州志謂此即雷首曰中條者以界河曲之間延緜不絶故名又謂中條之下有水曰雷澤即舜所漁之地此又可見中條之為雷首矣姑射山孟夏十八日早發堯廟朱來二君曰姑射之山莊周所謂有神人居之者其下有龍祠亦勝可往觀焉按志云三磴山在襄陵縣西南一十五里其山九十餘里其形三磴其北有龍鬬峪内有龍㴻神祠姑射自西北蜿蜒而來平其支石孔其陽三磴其鈎帶故曰姑射耳飛駕至祠下祠面東巍宫謐奥塗丹飾堊其像冕旒而處者曰龍王有泉自山下東流經祠五老山五老山在臨晉縣西南七十里接中條山亦名靈峯其山有雷公洞上洞在歸雲巖下洞在北峯有東西錦屏峯峯之隂有張果老洞洞東西有所乘白驢行迹其韓君隐處號韓峯峯東西有韓君洞羅通㣲隐處號真人洞又有青成太乙玉峯蒼龍大白王母白沙𤣥武保徳諸洞洞之陽有棄瓢巖即嵩山羽士李皮囊棄酒瓢以奠山神處又號皮囊洞旁有龍井旱禱雨輒應唐𤣥宗勑玉真公主投金龍其中號玉真洞又有飲鹿金龜金沙玉女諸泉云烟莊山聞喜縣六十里至楊村舖入窄峪兩山夾列其中只容澗道傍無行徑水溢不通行踏亂石進二十里起一山突立澗畔堂局開綽四面岡巒逺近攅向是為姜嫄之墓厝封在頂廟在墓傍里人謂鳥飛度必翔集無輒去予驗之果然一名鳳凰山當鳳首兩翼翥展對案整布三山如帳外之羣峯秀聳又名定秋山山上諸植春甲齊茗可占年若發有先後則無年矣復蹈澗石十五里至横嶺關巡司歴留莊隘絶崖深谷數十峯駢肩而列如大牙互挽僅通澗流旁無行道緌委曲折盤水旋徑計十八度悉履亂石無稳歩也山罨兩壁新緑映空石勢兀嵲又種種作天然竒巧或巉碎如鋸或擁屏若布或突額前拜或若砌就或若繡刺或若盤㨿石皆青紫黒三者雜陳成錦玉泉瑶草鐵嶂丹巘鳥聲傳壑風力怒號宛在城藏中隔絶塵世獨清流鎮日與頑岷競僮循罅潜奔了無争沸大行諸山渡青河飯萬善驛自是始入大行亦不甚險要舁夫魚貫而上久之以為絶頂矣乃復有山障之愈上愈不窮至宛子城為豫并界兩山相對數十百丈巨壑陟絶無底中為嶺道石梁如玉雪又復數嶺回顧中原惝怳無盡平楚鬱鬱紛吐蒼翠日色與雲氣争長俄而雨潦數十里中亘其半狂風驟發萬壑怒號食頃雨亦隨黎明冒雨發道有祠刻石崖表曰孔子回車處按趙殺嗚犢孔子臨河而返此去河逺葢附㑹語也泥濘益甚未抵澤州午後飯長平驛即秦白起坑卒四十萬人處也問居人不能指其所第云傍村人鋤地尚得銅鏃如緑玉按自此而北為長子以至晉陽皆趙地趙既築甬道秦何以得絶之前後四十五萬人命馮亭始之而成之者平原君馬服君子耳過長平為丹嶺復上下險阻可三十里而稍平瞑復小雨抵長子縣趙襄子所不欲走地也北嶽恒山北嶽在渾源州之南紛綴典籍舜北巡狩之所為恒山水經著其高三千九百丈為𤣥嶽福地記著其周圍一百三十里為總𤣥之天予家大行白巖之傍距嶽五百餘里於是振衣絶頂而放覽焉東則漁陽上谷西則大同以南奔峯來趨北盡渾源雲中之景南目五臺隐隐在三百里外而翠屏五峯晝錦封龍諸山皆俛首伏脊于下大同府恒山在渾源州南二十里即北嶽也水經謂之𤣥嶽其山高侵霄漢舜北巡狩至於恒山即此其頂名天峯嶺嶺建北嶽觀觀側有飛石窟上建后山祠鎮之觀如風如虎吼名風虎口觀東南五十里有濳龍泉旱禱雨應能愈疾上建龍泉觀觀之東有夕陽巖巖下有通𤣥谷巖東面有碧峯嶂東南有古老嶺嶺下有白虎峯觀之北峯頂百餘歩有琴棋臺㑹仙府聚仙臺得一庵又東北有白雲堂初入山有道名歩雲路行數里有翠雲亭上高坡名望仙嶺東半崖有集仙洞東北有紫芝峪西南有石脂圖鴈門山鴈門山在代州北三十五里志云以鴈出其門故名一名鴈門塞關因山以立凡山西之關四十有餘皆踞隘保固而聳拔雄壯則鴈門為最故趙李牧漢郅都備邊於此匈奴不敢近塞固皆一時良將不可謂非地險也迨我皇朝特設武臣守禦熊羆之士雲屯於此而又專屬憲臺以提督之可謂要而重矣余出代州北行皆登陟盤繞之路溪水潺潺其民皆依山居高下置屋圖不可盡午上關折西躡高嶺絶頂四望則繁峙五臺聳其東寧武諸山帶其西正陽石鼓挺其南朔州馬邑臨邊之地在其北長坡峻阪茫然無際又見巍旌高旗飄飄雉堞之上寒林古塞依依斜陽之下頗動黄沙紫塞之思圖書編卷六十二
