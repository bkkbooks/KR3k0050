足以客兵耗之耳果使主兵之練有成則養兵之費有數食不求足而自足矣此萬世之利而濟世之逺䇿也抑愚又有説焉島夷之入寇也月港海滄之民嘯聚而附焉而諸峒不逞之徒又角起而為之翼是與閩為敵者半閩人也如之何閩兵之不弱以靡也頃者台臣有城邑建官之議不惟剪賊之羽翼而且厚吾之藩籬是誠制治保邦之要也由是以通沿海漁鹽之利以通諸蕃貿易之利逐末少者譏而不征逐末多者征而有數則不惟島夷之患可息而且軍需之利日興是又裕民足國之機也福建海寇廣東之地與閩相錯逋寇遞起竟有大創之者此豈直廣患閩亦患之矣古者各君其國猶相救恤以畏簡書况今一統之天下詎有漠然眡鄰境秦趙哉屢奉明㫖㑹剿特于南澳設重鎮以連兩省之聲援夫寇辟則鹿也閩人掎之廣人觕之相與踣之有何不克第詳廣海島嶼甚多故逋逃如搏景緩則鵰倉急則告撫廣亦明知其詐而姑羈維之幸無大縱非直我閩之師勢難越擊已也且自嘉隆來首難無慮數十皆連艘數百横行廣海而犯閩烽火者一焉夫入犯之衝首南澳次銅山次浯嶼次南日小埕烽火今塞遊舟師鱗次相比非復曩時之比扼其上游則閩海内地可無慮矣至于外島可略而言在漳曰南澳在泉曰彭湖在興曰湄州在福曰海壇夫南澳有重鎮矣海壇有遊兵矣湄州在目睫之間亦無所伏姦矣脱有侵軼而竊據者其彭湖乎夫彭湖逺在海外去泉州二千餘里其山迂迴有三十六嶼羅列如排衙然内澳可容千艘又周遭平山為障止一隘口進不得方舟令賊得先據所謂一人守險千人不能過者也矧山水多礁風信不常吾之戰艦難久泊矣而曰可以攻者否也往民居恃險為不軌乃徙而虚其地今不可以民實之明矣若分兵以守則兵分者於法為弱逺輸者於法為貧且絶島孤懸混芒萬影脱輸不足而援後時是委軍以予敵也而曰可以守者否也亦嘗測其水勢沈舟則不盡其深輸石則難扞其急而曰可以塞者亦非也夫地利我與賊共者也塞不可守不可攻又不可則將委之乎惟謹修内治而已法曰佚能勞之飽能饑之賊之所資者糧食所給者硝磺也惟峻接濟之防而敷陳整旅以需其至則賊既失其所恃而海上軍事又絶不相聞雖舳艫軋芴詎能為久頓謀哉以我之逸待賊之勞以我之飽待賊之饑稍逼内地則或給接濟以掩擒或假漁商而襲擊此營平致敵之術也法有不以兵勝而以計困者此之謂也於戱接濟勾引患非一日矣漳民航海商夷其本業也自先朝過禁遂致勾倭釀成禍府邇者假充餉之名寓弭盜之術請開海禁意誠善矣然亦以東南夷不為中國患故云不謂日本之狡黠也窮寇無聊又安知不出於勾引計乎大抵閩廣勢雖稍稍殊而通夷市海同骩法嗜利亦同廣禁而閩弛則閩為逋藪閩禁而廣弛則廣為逋藪安南私泊于閩蔡佛保流毒於廣其已事可鑒已夫蚊虻噆膚手不期而搏其痛一也同舟而遇風波雖夷貉之子同心而共濟者其患一也謂宜齊禁周防協和并力何憂乎姦氓何畏乎逋寇哉廣西圖敘廣西古百粤地當嶺南右偏三江府江左江右江襟帶提封甚廣然内給藩封外困邊圉而風壤氣習又視廣東特異如府江綿亘八百里則已半為苗夷所有阻兵江道肆為寇竊不但古田茘浦數縣俱桂林府屬苦其蠶食而已潯州則大藤峽跨在黔欝二江俱在潯州境内之間諸蠻巢穴在焉剽剠四出急則投竄雖有上隆州回寧府屬五屯所在梧州府藤縣境内扼其咽吭不足制也若興安桂林府屬縣西延六州在興安境内與武岡州湖廣屬州陽㟠接壤猺實據之是為桂林北境之患栁栁州慶慶逺以西則八寨在栁州境内號為盜區洛容懷逺俱栁州屬縣竝罹慘毒而賓州栁州府屬其襟喉矣然右江一帶惟岑氏今思恩田寧泗城各土官俱是最强思思恩田田寧既已殘破則泗城州猶嬰樊之虎計非削弱不可也且南寧控遏兩江坐躡交趾自南寧太平西南入約十餘程桂筦保障或者其在是乎沿革古百粤地漢領於荆交二州刺史唐以其地𨽻嶺南道後分為嶺南西道廣德初置桂管都防禦觀察等使宋屬廣南西路置經略安撫司以靖江守臣兼領又置提㸃刑獄司治象州元置廣西兩江道宣慰司及嶺南廣西道肅政廉訪司于靖江俱𨽻湖廣行省至正末治于靜江置廣西等處行中書省本朝置廣西等處承宣布政使司都指揮使司提刑按察司並治于桂林云廣西等處承宣布政使司治桂林左右布政使二左右㕘政三管糧一桂平一蒼梧一左右㕘議二栁州一潯州一領府十有一内羈縻四屬州四十有六内羈縻三十三縣五十有七内羈縻四長官司三總為里一千一百八十三里半户一十八萬六千九十口一百五萬四千七百六十七夏秋土税共米麥四十三萬一千三百五十九石鈔一百四錠廣西都指揮使司𨽻右軍都督府都指揮三内掌印一僉書二領衛十屬所五十五守禦千户所二十有一儀衛司一本都司所屬馬步官軍一萬二百餘員名提刑按察司按察使一副使五清軍一提學一分巡二府江一僉事四分巡四分道四桂平蒼梧左江右江欽差總督都御史一駐梧州鎮守太監一平蠻將軍總兵一駐梧州同廣東欽差副總兵一駐桂林巡按監察御史一或清軍一俱駐桂林王府一靖江府髙祖從孫封桂林一千石䕶衛一廣西各府州縣煩簡桂林府其名秦桂林呉始安唐為八桂靖江煩瘠其屬州一縣九附郭臨桂一百二十里無瘴煩外興安二十里簡靈川五十里煩無瘴陽朔十三里窄貧簡永福十二里簡瘴義寧十三里猺賊多簡古田十里簡理定五里煩淳全州八十九里煩屬灌陽八里僻簡永寧州其形勝五嶺之表兩越之郊被帶江山西南㑹府其俗習尚同中國氣候同江浙雨寒晴熱無分冬夏禮重檳榔以為恭先士知經民簡訟栁州府其名陳象郡唐