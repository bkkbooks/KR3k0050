食將無民矣是以官多降調惟事株求以致土官驕横民散猺盛越城刼庫戕害方面豈一朝一夕之故哉故邊方之官非才不足以戢亂非守不足以服人非久任不足以諳土俗而識物情斯乃謀國者任臣之貴也賦用兩難今海内稱瘠土當多事者則孰過粤西哉巖壑交錯水脉不生無可耕之地也谷箐孤險雞犬不聞無可耕之民也為郡者九不足當東南一二大郡也為邑者七十有七不足當東南一二大邑也為土州為土縣為土司者環四面以居公租不入法令不行一有事且嗷嗷望我以濟也是執事之所謂賦之必不可加者也萬山盤錯道路孤逺三江夾出舟楫艱難今日報刼路則道路塞明日報刼江則舟楫阻某處議鵰剿某處議夾剿日所需於軍餉者紛如也某州告饑且云將盡出為盜某縣告饑且云將坐以待斃捜之民間無可貸搜之倉庫無可發日所請於公帑者繹如也此執事之所謂用之必不可不足者也賦必不可加而又不可不加用必不可不足而又不能足為粤西籌者自古難之矣廣西猺獞粤西猺獞居萬山之中當三江之險深箐絶壑人跡有所不通也古木懸崖日月有所不照也層岡疊阜莫知其涯際也荒村逺落莫窮其終始也種類莫可識别巢穴莫可跟尋其所以為宫室者則巖巔也其所以相往來者則狼虎也其所以代耒耜者則鋒鏑也殆天驕之若犬羊豺狼然莫可以人理化也粤之西則有曰木藤曰八寨曰連城曰六十三山曰七山等巢諸若此類莫可枚舉也粤之東則有曰羅旁曰王母曰雲稍曰母雞等巢諸若此類莫可枚舉也濱于江者擾及舟楫濱于路者擾及行旅民財被刼虜且及公賦林落被剽掠且及城邑如是而猶曰兵不祥器也而吾諱言之是居者無以為居將棄編氓也行者無以為行將棄商賈也公賦無以為公賦將一不賦也城邑無以為城邑將棄城邑也此必不可者也其動大衆者不得不動也其興大役者不得不役也調兵幾十萬不得計其擾也費糧幾十萬不得計其費也何者誠計其大也誠不得不為士民請命也大兵一動風聲輒露其濱江濱路探知内地消息者寧無有潛避逺匿脱然於鋒鏑之外者耶其深山絶澗耕山而食結茅而居不識内地言語不通者寧無有莫知禍端駢首於鋒鏑之下者耶其所報功級者果皆慣盜劇惡耶其所報俘獻者果皆寇賊種類耶同生天地同稟血巢使其蠢然無知莫知所謂而受俘獲罹刀鋸也此又仁人之所酸而天地日月之恩有所不及也然則兵者將諱言之耶將樂言之耶往嵗督府重臣因粤東羅旁諸巢為地方害且數十年動衆二十萬一舉殱之兵威所震山谷為空計所得功級俘獻即萬萬勿計也乃西之六十三山等處逼近羅旁畏威悔罪哀告求生編里輸差盡從撫處一時東西兩山竝稱寧靖説者謂當時收兵太早經略事宜尚未停妥逃匿餘黨尚未搜捕乃不踰年舊日餘孽呼攜潛出盤據舊巢刼掠水陸攻擾所城謂其藏匿者在六十三山等巢然無實跡可考也謂其糾合者為六十三山等獞然無踪跡可據也即日將東西夾剿滅此朝食而西之糧餉稱乏八寨濱近之民又數數請兵將從撫耶將從剿耶較之八寨將孰先耶將孰後耶此執事者之所以私憂而過計之也竊以為撫剿有定議而恩信不可失也兵糧有定處而騷擾所當禁也行師有紀律而玉石所當辨也善後有長䇿而犬羊不可無主也地方有緩急而機宜不可失也此今日為粤西籌者誠無以過之也夫曰撫剿有定論而恩信不可失者何也葢六十三山連城等山與羅旁相去不逺其所藏匿其所糾合誠不知其有無夾剿之師欲杜禍根收全功誠不可已也然昔之受招安當編差者尚未有叛逆顯迹也一旦使之一槩受鋒鏑何以示往日之恩信開後日之悔悟也大兵一出願察其素受招處者許立旗插牌以保其生其怙惡不悛素未招撫者必誅無赦則畏威感恩忠信行于蠻貊矣此以剿行撫之道也夫曰兵糧有定處而騷擾所當禁者何也葢粤西司庫所入不支所出興師十萬支糧三月欲取辨粤西難矣兩廣用兵調粤西之兵食粤東之糧舊有定額無議也但近日右江一帶饑歉特甚狼兵一調勢必騷動窮山空谷乗時將起而為盜請出公帑之積預買糧食分布大兵所過州縣以備行糧饑荒處所大加賑恤以安反側兵一出境一切糧食取濟粤東則閭里安戢民得安生糧餉有藉不至告乏此動衆安民之道也夫曰行師有紀律而玉石所當别者何也葢東西猺獞其相濱大江州邑浪人糾合出沒作賊焚燒刼殺無嵗無之誠不可不誅乃其在逺地與華人絶不相聞一槩取而殺戮俘獲之以為功無乃傷天地之和虧好生之德也今之用兵誠不以殺戮為功而以安集為功不以俘獲為功而以制馭為功使兇惡醜類無所逃於天罰乃無辜羣生得保全於太和之世豈不恩威竝著哉此則神武不殺之道也夫曰善後有長䇿而犬羊不可無主者何也葢夷性獷悍難馴而惟自服其主今守内疆土與夷為界者不知幾千萬里也獨有土官者制服為易而其莫相君長自相種類者則摽掠出沒莫可制也大功既成請以猺獞所居之山川畫地分區擇其衆所推服者令其招出遺黨分地以居官給以名色不徵其租税行之三年地方無事立為土司等官令其約束地方聽調徵發仍増置哨堡廣添兵卒則地方永永無虞也此以夷治夷之道也夫曰地方有緩急而機且不可失者何也葢六十三山等山當粤西之一隅乃八寨患在腹心士民數數請兵緩急之辨亦既較然矣顧一省所急者在八寨兩省所急者在夾剿欲獨舉之則不可欲兼舉之則不能願且置八寨於不論兵威一振八寨諸獞果能悔罪輸誠分土立官自同齊民豈不能畧其既往許其將來如其怙罪不悛為害地方則乗此餘威以殱滅之特摧朽也此則酌量緩急之道也嗚呼兵者豈得已哉廣西沿革桂林為郡當春秋戰國之時皆楚之南裔秦屬長沙郡漢武帝滅趙建德以其地置象郡皆蒼梧欝林之境非今桂林也元鼎六年析長沙西境置零陵郡建國遂名始安皆屬荆州建安十四年蜀劉備詣權求都督荆州權借之後呉蜀爭零桂長沙三郡遂分荆州以湘水為界長沙江夏桂陽以東屬權南郡零陵武陵以西屬備二十四年闗侯死乃為呉所有甘露初呉分零陵南部置始安郡隸荆州後孫休為交州為廣州今桂林亦屬荆州太康二年置廣湘荆三州今桂林屬廣州統始安郡南宋永初二年置湘越交四州屬湘州統始建國南齊復改始建國為始安郡梁天監六年置桂州于蒼梧欝林之境大同六年移治于今臨桂陳因之隋平陳置總管府煬帝初廢府復置始安郡唐武德四年為桂州領始安郡十一縣𤣥宗至德間改始安郡曰建陵昭宗光化陞静江軍節度使五代自唐昭宗乾祐二年至後周廣順元年辛亥凡五十七年皆為楚王馬氏所據自壬子至宋太宗開寶四年辛未凡二十年皆為南漢劉氏所據大觀中陞為帥府領廣南西路兵馬鈐轄兼本路經略安撫使紹興三年以髙宗初潛陞為静江府元改為静江路本朝改為廣西道桂林府領州一曰全州領縣八曰臨桂附郭上靈川興安灌陽下陽朔永福義寧古田成化初年古田沒於獞蠻廣西山川桂林正禹貢要荒之服所謂荆楚之南百粤之西衡山之陽蒼梧之野九疑之塞皆是也五嶺西止於越嶠嶠去興安五十里去靈川九十里矣秦伐南越運道皆由於此非陸梁地也山自岷山之脉一支為衡山者從南而分東西一度大庾一度桂嶺水自九疑五入洞庭四落南海者皆出越嶠之東南域内靈之三源皆三山為主分其一海陽别為湘灕出於靈江口者人知之熟矣酈道元云湘灕之間謂之始安嶠自嶠之陽南流注灕名曰始安水又南與溈水合出西北邵陵縣界邵陵乃武崗新寧之境也有夫夷川源出廣西全州北至邵陽㑹澬水葢西延之山有岩如海陽然水分東西背流而别西北去新寧歴寶慶新化至於益陽㑹濱水入湘江達於洞庭東南為黄陌江為六洞江合灕江達於南海同為溈水之源此則世所未講者也又興靈之界有陽髙山東南發源為川江為小融江南為路江出為北偃下連南偃逕邑之東南小融出邑北二十五里與灕溈二水合故曰大融水經引漢書曰灕津者此際也大融而下歴千秋峽風水相搏如銀故曰銀江銀江而下有淦江出興安嚴闗從南而東㑹灕江之東南二里淦江而下有甘棠江自小融分為東西帶融歴龍岩合甘棠出白石湫同為灕江㑹桂郡之東南世傳湘灕一竅不知三源七派合助上流中有淦棠二水及堯山之三百源支分派落復歸於桂故自白石而下深潭廣浸與湘江埒然禹導九江澬湘二水與焉其源出海陽西延者世未之及葢導其流便之疏而山水之源入蠻服者所不暇究葢王者不治夷狄之意非言不事於攻取也不為治其井邑溝洫而亦不責其賦税貢貨葢勢有所不能盡焉者然匹夫匹婦得所之心而聖人亦未嘗忘焉至秦始皇其志與古人異窮兵黷武盡天下之利以為已有慕越之珍竒異物乃命史禄鑿渠僅十餘里而舟楫之利遂薄南海豈惟楚越之民獨賴焉是嵗丁亥自臨洮至遼東同築長城逮今足為藩障均可謂無聖人之心而有聖人之澤者矣何也始則厲民終則歸利于民非澤乎然天下後世頌神禹之功而不追祖龍之澤者原其心故也廣西風俗自唐宋時頗多不美如民之貧者歸罪墳墓不吉掘棺栖寄他處名曰出祖生子不舉溺之於水名淹兒臨喪破家供佛盛饌待客名曰齋筵病不延醫殺牛賽鬼名曰毛藥民多出外他人畧賣其妻曰捲伴見嶺表異録及張南軒静江諭俗文本朝德化所敷文風益振舊所汚染日以維新凡冠婚喪祭漸遵文公家禮城市士民亦多丕變惟窮鄉下邑家以巫邪而敗婚以歌唱而成葢猶有之可見因襲之弊久矣久則難變也廣西人文夷獠雜居古為藩服文物普徧今類中州葢由張栻吕祖謙之道化被於桂范祖禹鄒浩之正氣行乎昭今平樂栁宗元之文聲著乎栁馮京黄庭堅之德譽動乎宜今慶逺二陳陳欽陳元三士士賜士燮士壹之經學啓乎梧谷永之恩信陸續之儒業播乎潯古欝林馬援之約束布於邕今南寧蹈義泳仁月異而嵗不同甚至交趾之界猺獠之居棄弄服而襲冠裳挾詩書而延儒紳太平諸府材賢漸出由是觀之革俗由政為政在人不可誣也廣西調攝調攝之方缺而後瘴癘行邪巫之術盛而後醫藥廢李璆瘴瘧論曰嶺南炎方土薄故陽燠之氣常灌瀕海地卑故隂濕之氣常盛此寒熱之病所由作也病者多上熱下寒既覺胷中虚煩鬱悶便自以為有熱而醫又多用麻黄金沸草散青龍湯等藥發表得病之因正以陽氣不固毎寒發熱則身必大汗又復投以發表藥則旋踵受斃甚者又以胷中痞悶因轉下痢病人下體既冷得轉痢藥十無一生是瘴癘未必遽能害人皆醫殺之也予紹興間寓蒼梧見北客與士人感瘴不幸者不可勝數予詢其所服藥率用麻黄柴胡鱉甲及白虎湯等藥其年予染瘴病特甚繼而全家卧病悉用温中固下升降隂陽正氣藥及炙中脘氣海三里治十愈十不損一人議清理田賦粤西豪右踰制或不下他藩而豀峒土酋或蠶食齊民之業莫敢誰何或田稍犬牙其中輒以此輩為解而避租賦此清理視他藩尤難之難也初額田九萬六千三百有竒後失額一萬八千有竒今竣事田九萬六千五百有竒税糧稱是葢粤西之履畝屢矣皆奪於羣議迄無成功至是始復額有羨但猺獞有生熟二種今熟者已願就田賦而齒編氓亦宜與之輕科而重禁里魁毋得苛求使之安堵其生猺獞毎不利於熟者之來歸而為我用或行煽誘或肆讎殺或指其田為彼田而羣起與争則為設兵防禁其出沒重則兵之如是足矣不必求諸化之外也土酋在上世止責其悍衛藉其兵力故田無畝而聽其自輸糧為額今在左江者頗輸租而在右江者漸積逋負故督責宜加焉其有怙强而奪民田或受民詭託以滋隠避第按籍而清之重則罪及其酋必不能捍吾法矣桂林名稱桂故荆屬本南楚之境為郡為國皆以始安名與秦所置桂林雖土壤相接然楚自楚越自越名稱户分著在前史不可營亂失自唐起如通典風土志諸書本唐人所撰畧不披圖按求故地遂一切曰桂秦與魏晉桂林郡縣幾淪滅矣所以失者葢因梁置桂州刺史於始安刺史雖可假桂而置始安顧可循桂而并沒其稱耶圖書編卷四十
