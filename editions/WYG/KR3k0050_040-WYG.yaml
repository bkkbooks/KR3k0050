body:
  text: 圖書編卷四十明章潢撰四川圖敘四川古梁州地劍閣即劍門閣在保寧北境表雲棧之固瞿塘峽名在䕫州城東鎻巴峽之流界以番族西番阻以蠻部東川鳥門烏撒芒步是山水襟屬自相藩籬故奸雄割據則盜兵不敢西窺地饒而險阨備也然奸宄内作懸車束馬勢不相及有難猝定者矣况上列親藩重兵外戍諸所供饋咸取給焉且松潘以孤城介在番域而寄喉于龍州宣撫司千里轉運輒為番蠻所遮斯則巴西之隠禍也烏撒芒部即鎮雄府諸夷四軍民府雖犬牙形格仰我鼻息然内相黨結數生兵釁且於叙叙州瀘瀘州有唇齒之重要在因俗撫綏擕其私黨而已乃碉門地名天全六番招討司治此之臂視諸番播州宣慰司之富藏四省播州地方與湖廣雲南貴俱鄰接殆與蜀相為盛衰者焉建昌六衛僻處四徼自為奥區民夷安業非所憂矣沿革古梁州地漢置益州部刺史察舉蜀巴廣漢犍為牂牁越嶲等郡而不常所治東漢益州刺史治雅唐貞觀中於此置劍南道開元中置劍南并山南東西道採訪處置使而劍道治蜀宋為四川路後為東西兩路又分益梓利䕫四路安撫司俱以守臣兼領又置提㸃刑獄司於嘉定重慶潼川三府元置四川等處行中書省又置西蜀四川道廉訪司俱治成都本朝置四川等處承宣布政使司行都指揮使司提刑按察司而三司並治於成都則行都司分治建昌以控制邊境云嘉靖中改龍州宣撫司為龍安府設流官四川等處承宣布政使司左右布政使二左右㕘政三糧儲一分守一左右㕘議三雅州管糧一分守二領府八州二十縣一百有四軍民府三宣慰司一宣撫司二安撫司一長官司一總為里二千二百五十有零户一十六萬四千一百一十九口二百一十萬四千二百七十夏秋二税共米麥一百二十萬六千六百六十石絲六千三百三十三斤棉花七萬二千八百五十一斤鹽課提舉司一在成都領仙泉等鹽課司十五龍州等衞所額辦折色小引鹽一十萬九千一百七十七引成都建昌等府衛額辦課茶共四十八萬九千八百八十五斤有零四川都指揮使司𨽻右軍都督府都指揮三内掌印一僉書二領衛一十二屬所四十九宣撫司二安撫司七長官司二十一守禦千户所一十一屬長官司二招討司一又行都指揮使司𨽻右軍都督府領衛六屬所三十四長官司五守禦千户八本都司所屬馬步官軍九千六百餘員名提刑按察司按察使一副使七清軍一提學一兵備松潘一威武一建昌一重䕫一僉事九管屯一兵備安緯一叙瀘州分巡四分道四川西川北川東川南欽差巡撫都御史一巡按御史一駐成都欽差副總兵一駐松潘王府一蜀府髙十一封成都䕶衛一郡王十四四川各府州縣煩簡成都府其名秦蜀郡漢益都成都錦城煩冲其屬州五縣二十七附郭成都十四里煩淳平衍華陽十一里冲煩淳平衍外雙流五里温江七里新繁四里金堂八里淳簡僻仁夀十二里刁劇新都七里煩淳井研四里做郫八里簡二十一里半刁冲煩資十里冲煩灌六里淳彭六里頑簡僻安六里頑簡内江十六里煩淳冲崇寧二里石泉四里簡淳資陽二里煩淳簡崇慶州二十二里僻淳屬新津七里淳漢州九里淳簡屬什邡四里僻淳簡綿竹七里刁簡德陽六里淳簡綿州六里淳冲煩屬彰明三里淳簡羅江二里淳冲煩茂州四里僻簡雜夷屬汶州六十里威州六里雜夷里雜屬保四里僻其形勝西抗吐番南撫蠻獠二江雙流峩眉重阻沃野千里天府之上其俗畏鬼惡疾尚侈好文保寧府其名晉巴西唐閬中負山無瘴民刁其屬州一縣九附郭閬中十里淳煩外蒼溪十里淳煩冲南部九里簡廣元三里冲淳簡巴二十六里淳頑煩昭化二里淳簡通江六里淳劍州三里淳簡屬梓潼二里簡江油二里淳簡其形勝棧道千里通于蜀漢井絡坤垠界山為門其俗質直淳厚順慶府其名宕渠唐南充負山谷無瘴淳煩頑冲其屬州二縣八附郭南充十一里淳頑煩冲外西充八里淳頑煩冲蓬州十里屬營山四里淳煩儀隴八里淳煩廣安州二十一里淳煩屬渠十一里淳簡大竹十八里淳頑半岳池十五里淳頑煩隣水十七里淳煩簡其形勝山川竒秀隣渠水臨篆水枕大溪接通川其俗賨人剽勇民俗淳厚好義多儒親迎近古叙州府其名漢犍為唐南溪元叙南依山谷有瘴其屬縣九附郭宜賓二十八里淳頑煩冲外慶符六里淳簡富順十里有盜南溪十九里淳冲煩長寧十七里民夷簡髙十七里僻居萬山中筠連四里簡珙九里僻簡戎十一里僻居夷漢雜其形勝東瀘水西太峨南六詔北三榮其俗雜夏夷士靜民朴重慶府其名秦巴郡唐南平淳頑煩其屬州三縣十七附郭巴九十二里淳頑冲江津三十八里淳頑冲長夀二十七里大足三十七里刁煩冲永川二十五里刁煩冲榮昌二十七里僻淳簡綦江四里僻簡南川五里僻煩黔江一里半僻淳簡合州四十二里淳頑煩冲屬銅梁二十七里淳頑簡定逺十四里淳煩安居十三里僻壁山十二里僻頑煩忠州七里淳煩屬酆都四里冲墊江十二里頑涪州十二里頑簡屬武隆二十里彭水八里僻淳簡其形勝地勢剛險二江之㑹東魚腹西僰道北漢中南夜即其俗尚鬼信巫鋭氣善舞䕫州府其名漢永寧巴東蜀固陵唐雲安淳煩其屬州一縣十二附郭奉節四里淳簡外巫山三里淳煩簡大昌一里僻簡雲陽九里冲大寧三里僻淳萬四里刁煩淳開七里達州八里淳煩簡屬新寧七里淳簡頑煩梁山十里建始五里僻居萬山東鄉五里淳頑其形勝鎮以灧澦扼以瞿唐岷嶓之下三江之上其俗無醫信鬼勁勇少文燒地而耕踏跡而遊馬湖府二十里僻隸長官司四曰泥溪曰平夷曰蠻夷曰沐川其形勝南戎瀘北普資其俗夷夏雜居信鬼不藥散居山菁無縣邑鄉鎮潼川州其名梓潼昌城隋新城宋東川六里軍民淳頑煩其屬縣七射洪四里依山谷鹽亭三里冲煩中江五里遂寧十七里頑淳僻蓬溪六里依山淳頑僻安岳二十里樂至七里簡其形勝劍外都㑹水陸要衝其俗尚奢好樂士通經學古眉州其名齊通隋眉山唐通義二十一里濱江無瘴其屬縣三彭山五里淳簡丹稜五里淳簡青神四里淳冲其形勝岷峨之間秀氣所聚其俗名節相尚重文獻業詩書嘉定州其名漢犍為隋眉山濱江無瘴淳煩其屬縣五峨眉六里僻簡洪雅三里刁簡夾江十五里犍為九里榮七里其形勝負三峨帶二江其俗良朴人士俊乂卭州其名臨卭依山谷淳頑僻煩其屬縣三威逺四里僻淳大邑七里煩蒲江五里簡瀘州其名漢江陽唐瀘川十七里依山濱江淳頑冲煩其屬縣三納溪三里淳簡冲合江七里簡淳冲江安二十里漢夷雜淳頑冲其形勝南牂牁北廣漢肘江負山控制邊面其俗地少桑麻力耕火種雅州其名蒙山隋臨卭雅安唐盧山四里淳簡其屬縣三名山三里依濱江淳簡榮經二里民俚淳簡蘆山三里淳簡其形勝西碉門東蒲江西蜀襟帶南詔咽喉其俗朴少訟頗慕文學東川軍民府一里其形勝控東川澤金沙江雲㺯山其俗尚戰爭居多板屋夷有二種曰僰人曰羅羅烏蒙軍民府一里其形勝髙蜀一倍索橋之險雪山之髙龍洞環左凉山聳右其俗民有三種曰羅羅曰土獠蠻曰夷人烏撒軍民府其形勝山崖險扼襟帶一湖羊腸小徑十倍蜀道前臨可渡後倚烏門其俗婚姻不避親族芒部軍民府二里其形勝南苴斗河北勾食料溪左綽忸右繞硲砌其俗勁愚朴野播州宣慰司十七里其形勝西僰道南牂牁土地曠逺其俗敦龎悉慕華風領長官司六容山一里餘慶一里白泥一里播州四十三里直州四里重安一里安撫司二黄平二里草塘一里永寧宣撫司一田一領長官司一為九姓其名宋永寧其形勝北有馬口崖南有漁漕溪上通雲南北連川廣其俗鄙陋朴野事農桑無商賈龍州宣撫司十一里其地周時為氐羌其名後魏江油隋平武龍門其形勝山髙水峻其地四塞劍門石門峭壁雲棧其俗務農工獵岩居谷處椎髻披氊佩刀與武都同酉陽宣撫司十一里天全六番招討使司十里其域梁之南境其地古蠻獠之地其形勝東雅州西乾溪南榮經北靈關其俗男不習藝女不紡績惟耕種為業黎州安撫司一里其域梁西境其地古西南夷筰都其名漢沈黎唐漢源其形勝越嶲卭蜀之中南隣六紹西接吐番其俗混夷漢椎髻氊裘俗尚鬼平茶洞長官司三里其域荆梁二州之界其地戰國楚之黔中漢屬武陵其形勝酉陽藩籬石邪襟帶其俗言侏􅍣性好捕獵松潘等處軍民指揮使司一里領千户所一長官司十七曰占藏先結簇曰蠟匝簇曰白馬路簇曰班班簇曰阿昔洞簇曰北定簇曰山洞簇曰麥匝簇曰者多簇曰牟力結簇曰祈命簇曰勒都簇曰包簇曰阿昔簇以上洪武中置曰阿用簇正統初曰思曩兒簇洪武曰潘幹寨正統初安撫司四曰八即永樂曰麻匝兒永樂中曰阿角寨曰芒兒者正統初其名唐交川古松産甘松其形勝東南雪嶺西北洮河山川險峻雨雪多寒其俗曰耕野壑夜宿碉房刻木契以成交易炙羊髈以斷㓙吉人精悍善戰鬭疊溪守禦軍民千户所一里其域梁其地古氐羌領長官司二為疊溪一里為􅉱即一里其名唐臨翼其形勝犛牛峙左汶江環右排柵接前雲峯擁後四川行都指揮使司十三里領衛六為建昌為建昌前為寧番為越嶲為鹽井為㑹川為瀘州守禦千户所六建昌之屬為禮州二里為德昌為打冲冲四里為冕山橋為打冲河中左㑹川十八里之屬為迷易長官五建昌之屬為昌州三里為威龍一里為普濟一里越嶲一之屬為卭部鹽井二十三里之屬為馬剌二里其名古卭都漢越嶲隋西寧其形勝東鳥蒙西吐番南中慶北西蜀據西南咽喉山水清秀其俗僰人重儒敬佛四川等處承宣布政使司領府七曰成都蜀郡廣漢牧唐南京益州劍南西川成都路錦城一府各縣俱無瘴漢崇二州成華雙温新金郫灌崇彭什德十三縣俱于衍新津濵江錦茂威三州仁井資錦彰羅汶簡要煩衝曰保寧巴郡南梁州隆州盤龍閬州保寧德德安二軍巴西閬中閬蒼南昭江保寧俱負山而濱江廣通巴劍俱負山谷無瘴民刁曰順慶羅州巴子國果州宕渠南充充州永寧軍東川順慶路南蓬廣渠俱濱江營岳平衍西儀大鄰負山谷淳煩頑衝無瘴曰䕫州魚復庸國永寧郡奉巫雲萬四邑濱江大昌新凉平衍大寧開建建東大一州五邑依山谷無瘴淳煩曰重慶巴郡永寧巴都郡楚州渝州南平恭州合忠涪三州巴江長安定酆武彭俱濱大永榮綦南黔銅壁墊九邑俱依山谷無瘴淳頑煩曰叙州僰國戎州六同郡犍為南溪叙南宜南富順叙州路濱江慶符長髙筠民珙戍依山谷有瘴曰馬湖馬湖路二十里僻領長官司四州六曰潼川廣漢梓潼昌城新城梓州東川武德軍靜戍安靜軍潼川府民淳頑煩六里曰嘉定犍為眉山青州眉州平羌郡嘉定府嘉慶軍嘉定路濱江無瘴淳煩一十里曰瀘江隂瀘州江安州依山濱江濱煩衝七十里曰眉齊通眉山通義濱江無瘴一十一里曰雅蒙山臨卭雅安瀘山永平軍山蘆山淳簡四里曰卭臨卭卭州蒲原郡依山谷淳頑僻煩十里軍民府四曰東川曰烏蒙曰鎮雄曰芒部宣撫司二曰龍州曰永寧宣慰使司一曰播州安撫司一曰黎州長安司一曰平恭處置四川西南奥區上則松茂建昌番夷時肆侵暴下則播酉石柱土司互為刼掠控制消彌非一朝可圖者也成都素稱沃野賦重役繁供億彌詘叙州地饒而髙珙諸夷兵費不貲且大木多産其境採辦之擾商民殘疲重䕫土寇連結施州諸夷䖍劉未已而妖人内訌受患尤烈保順衝疲民朴務簡馬湖僻小民夷相安龍安新造全在經始大抵蜀地夷漢雜處氣習靡淳地理遼邈巡歴難遍加以大水之困大兵之殘民貧多盜勢使然也是在撫按廣于咨詢司道勤于躬歴率有司時廉省費愛養撫綏數年之後或者蜀其有瘳乎擇守令川雖僻阻然巴蜀沔益之饒或時仰給焉且蕃蔽呉楚東南上游表裏滇隴西南要地得其人則治以安否則亦易擾亂前代之往轍炯鑑具在也故漢第五珂張堪廉范李膺唐韋臯李德裕宋張詠趙抃馮京崔與之諸公此其人皆廉能將相之器而又俱久於其官故卓然各有稱述保兹西土而或以僻逺易之過也慎守要害四川馬湖叙州二府逼臨蠻獠華與夷雜處瀘州不雜夷實殷夷警成都以省藩重鎮控制西番而崇慶雅州亦難安堵重慶東接夜郎西通牂牁俗有夏邑蠻夷雜處順閬無外防保寧䕫州險據在我其地沃民殷諸府為然當是海内樂土而馬湖叙州葢畧次之矣防守松潘川之形勢北有劍門不足恃而慮在松潘以孤城介西番之域乃待食于龍州懸命千里之外設為羌戎所截則疊溪而南如建瓴而下直抵茂州無難是誠限外隠穽耳西有黎州不足恃而慮在維州維州在保縣外無百里乃為董卜韓胡所據是切近之災且復有靈闗一道可抵雅州草坡一道可抵汶州泄里壩一道可抵灌縣清溪口一道可抵崇慶州其門庭禍乎哉四川形勢防番羌蠻僰四川天下絶險龍州松潘振其北播州諸夷列其南天全黎州當其西翟塘守其東江山四塞闗峽孤開可守一當百吐番西控烏思藏等處風俗樸魯慈教大行法令飭嚴行人所行非若北達烏合之衆殘侵無紀况以重險臨之為力久易南鄰芒部東川烏蒙烏撒諸蠻獠要皆腹裏机上肉耳行都司六衛截制民夷可以安業而西之雅威茂灌南之崇慶瀘嘉馬叙之疊溪綿漢彭石重重遶䕶深藏三窟所慮姦宄内作地饒克備不能施速定之術耳本朝從汶入成都取明昇葢以計破之茍非精兵東守翟塘事未易成也入川四道三谷辨何仲黙三秦志曰自秦入蜀有三谷四道三谷者其西南曰褒谷南曰駱谷從洋入東南曰斜谷從郿入其所從皆殊舊志謂首尾一谷非是其棧道有四出從成和階文出者為沓中隂平道鄧艾伐蜀由之從兩當出者為故道漢髙帝攻陳倉由之從褒鳯出者為今連雲棧道漢王之南鄭由之從城固洋縣出者為斜谷道武侯屯渭上由之此四道三谷者闗之險阨攻取所從來固矣舊志云駱谷當谷同一谷褒谷斜谷同一谷川水辨宋劉裕遣朱齡石伐蜀寇譙縱衆軍悉從外水取成都臧熹從中水取廣漢老弱乘髙艦從内水取黄虎史炤通鑑釋文曰巴郡今之重慶正對土水口右則涪内水左則蜀外水自渝上合州至綿州曰内水自渝上戎瀘至蜀謂之外水按外水即岷江自重慶上敘州嘉定是也内水即涪江自重慶上合州遂寧潼綿是也中水即沱江自瀘州上富順資簡金堂漢州是曰四川者則取岷江沱江黑水白水四大川以為名爾沈約宋書資江為中水涪江為内水水利蠶桑蜀為天府之地諸葛亮為昭烈告之矣其言曰益州險塞沃野千里夫險塞則可以守沃野則可以出軍需亮葢得䇿矣是建邦啓土之始也乃今觀蜀自秦守李氷鑿離堆辟沫水之害穿二江成都之中此渠皆可行舟有餘則用溉浸百姓享其利今其堆在漢縣西一里許巋立水中可覩也葢始未鑿堆地勢下壅沫水奔突不可控揣為居民害而今則順流而東而水之利旱則藉以灌溉雨則不遏其流故其記曰水旱從人不知饑饉其謂是也二江則蜀志以為一汶江一流江葢經郡城南七里者即氷所穿耳宋郡縣志謂一由永康過新繁入成都謂之外江一由永康過陴入成都謂之内江者即今灌縣而所用灌溉則曰灌曰温曰郫曰雙流曰崇慶曰成都凡一州七縣皆利之天下謂之天府也葢昔魏襄王為羣臣祝而曰令吾臣皆西門豹之為人臣也史起進曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁而豹不知用是仁智未盡何足法也及起為鄴令乃引漳溉鄴以富魏之河内而民歌之亮之治豈少區區史起之見乎然亮初慕蜀之沃野而身自治之二水無恙也獨不聞其與羣下謀鑿引以溉旁近田畝何也葢沙河以南其原野雖廣平可田畝而地髙江下不可引水即鑿之亦不得利故亮置弗為坐此耳蜀志有之蜀古蠶叢之國若田地宜蠶也所從來逺矣乃張詠則蜀賢守也先是知鄂州時既以教民抜茶植桑矣而至為蜀宋史第稱其減鹽價以足軍餉督驕將以討叛賊吏不服牽出斬之民苦饑豫折米以待之而獨不聞其勸民植桑豈詠不知蜀地宜桑而不以鄂耶特以于時四郊多壘桑株悉膏釡爨不可復植或蠶桑故業民自利為之不煩督勸云爾乃今保寧諸縣則家植桑而人飼蠶其絲紬綾絹既用以自衣被而其餘且以貨諸他郡利云厚矣而錦官以南千里無一桑株何也是未必皆出于避税或者由惰農廢業又無所督勸之故至於今無復占是業耳若謂欲用史起智而鑿山引水灌溉沙河以南之田申張詠見而勸民植桑修復蠶叢以來之業意蒸蒸厚也愚則以為江水不可引也陂塘獨不可鑿乎民税可避也蠶桑獨可廢乎有如鑿塘一畝深一丈可灌田十畝鑿塘百畝深一丈可灌田千畝則自沙河以抵龍泉皆沃壤也如是行之數年而陂塘之利不與一州七縣相埒吾不信也植桑十株可供一女之蠶植桑百株可供十女之蠶則自錦官以及戎渝皆桑陌也如是行之數年而蠶桑之利不與保寧諸縣相等吾不信也時務四條蜀自李氷鑿離堆堰都江而水利自兹始矣涸脛泛肩之誓沉于洋浦深灘淺堰之諭紀于雞台洞開三泊江辨雙流我朝開濬之發夫固如是而已壘石以築堰範鍤以淘灘利水州縣如郫繁崇漢所出夫匠嵗不下千人而灌田亦幾萬計已而江之順怒不常人之機械百出其中黠者欲乘間以牟利乃為倡鐵龍之議鑄冶垂成而奔濤卒至蕩析已無餘矣又欲從而修之而不知利沒奸䛕勞歸庶姓而旱澇卒無補也是豈立法初意哉或者議曰昔之遺法固在也因而飭之其誰曰不可故隨内外以導沫江因淺深以通灌口力役則計田疇以為多寡僱役則度逺邇以為重輕而又相下澤以疏流慎司工以勸事其庶矣乎或又曰鐵龍之議特因一時之卒漲耳未可遽以為非也嗟乎禹之治水水之性也故深淘淺築正得其遺意而乃髙為隄堰故與水鬭幾何其不敷也昔文翁守成都開湔㳛溉灌繁田人獲其饒是亦不可為法乎自管子謹正鹽筴而鹽法由此興矣南鹽於海北鹽於池而蜀鹽於井自贍一方於大農國計與焉我朝開中之法行之久矣有提課以督成有鹽司以㑹要出鹽州縣如順義長寧大者不下數十萬小者亦不下數萬已而商之要𣙜不時竈之貼納無出其間黠者欲巧言以奪正乃倡為折納之議自此鹽額拾萬而今不及十千矣又欲從而議復其舊然不知舊井既枯新井或淡出課為𦕈招之不來而緩急卒無補也是豈立法初意哉議者曰昔之遺法固在也遵而行之其誰曰不可故復開中而先寛其科條清埋沒而不追其既往或棧開廢井以蘇窮困或竅出虚額以絶誅求而又稽井户之逃移禁户客之占佃其庶矣乎或又曰牢盆之法井户具盆而納筭商人具引而納筭則竈可免於追徵而商可免於開中矣是又一説也昔楊輔總計四川收引税井户稱便是又不可為法乎屯田之制國初專以養兵分田有限徵納有時或失則多或失則寡莫不有畫一之法存焉嵗月既久奸宄彌深遂使疊溪之屯徵于綿竹廣利之屯徵于龍安不知而妄議者尤欲為清屯之令吁户口不識占田官司不能履畝殆如漢之檢覆墾田然而河南南陽至不可問其失寢逺矣或者議曰夫紅牌之志賞罰固在也使能守其成法按魚鱗册籍以稽隠匿勾絶户田畝以授餘夫明主保下田之禁正屯官徵輸之條豪右侵奪有罰貧悴貸假有罰其孰曰非初意也或又曰有田之屯可知也無屯之田不可知也可不重加之意乎昔諸葛武侯營屯渭濱軍有宿儲無亦存乎其人耳國初茶法專以易馬與秦隴無異也嵗遣巡察一人凡私越境者刑無赦嗣是廢置不常奸萌寖起遂使建始之茶私越沉黎武岡之商擅抵蒙雅不知而妄議者猶欲利其餘課十而税一不知茶以引計不及引者則謂之由殆如宋人之長短引然而又可因以為利乎其失甚矣或者議曰金牌之制差發固在也使能師其遺意稽截引之目而繳報以限嚴互市之令而譏察以時碉門之茶馬有司可復也黑水之批驗有所可復也番僧盜鬻有罰漢人私遞有罰其誰曰非初意也或又曰無引之茶可知也無茶之引不可知也是可不加之意乎昔趙抃判成都減額以蘇園户輕價以惠行商民到于今稱之無亦存乎其人耳川屬邊防夫蜀古蠶叢國帶二江之雙流抗岷眉之重險緣以劍閣阻以石門所謂坤輿大都會是已固三面邊蠻獠羌蕃常為中土患今播藺卭笮酉陽石砫帖然受約束矣無論也獨北一隅當講求耳西北冉駹地也冉駹即金威茂之境其西為疊溪又其西為松潘吐蕃氐羌諸種落雜居崖嶂箐峒險阨相雄長漢武西逐諸羌渡河湟居塞外始為王土唐宋以來叛服葢靡常也我太祖髙皇帝既平蜀乃命平羌將軍丁玉攻取其地設州邑衛所棊布要害竊嘗譬之成都堂奥也灌口門户也威茂松疊藩籬也犬豕之性喜人怒獸伺隙蹂躪藩籬不宻則門户危門户不宻則堂奥危此西北邊防所以重於蜀也茶馬利病唐趙贊贍軍用張滂拯水旱皆取茶税未嘗以之易馬也宋乾德始置𣙜務至李杞入蜀經畫以茶易馬而法嚴矣諸方産茶蜀禁獨重國初嵗遣行人巡察邊隘茶以引計市以時開成化間罷差巡茶而勅專憲臣法益備故商無越貨邊境肅清近年以來弊日滋矣夫引分邊服嵗有定額也而規利者爭取乎邊商别資貫人有定數也而懷奸者弊如蝟集此所以議者有六條之法矣以冒濫當絶也故慎引目焉以展轉當虞也故時稱盤焉以路岐易越也故謹闗防焉以稱驗當擇也故重委官焉以利歸私門也故廣餘茶焉以番隙難杜也故嚴之互市焉葢欲救乎茶之不行焉之四政者有大綱以統細目有權變以濟經常所謂要之當執而中之宜用者也苟忽乎此吾未見其能濟也福建圖叙福建古閩越地以温處衢温州處州衢州俱浙江屬府信江西廣信府為北藩建昌南贛建昌南安贛州俱江西屬府為右壁惠潮惠州潮州俱廣東屬府為外户海為門封壤促甚為闗内險溪山秀美民用以和然處浙江處州府人輒用盜鑛流入政和夀寧俱建寧府屬縣之境大為患害古田福州府屬縣福寧一帶本竊魚鹽之利山谷邃深通寇毎憑之而嘯聚俱不常出也濱海上下外遏倭寇之流近通琉球之貢不為要害而海物互市妖孽荐興通蕃海賊不時出沒則漳浦龍溪之民居多且汀汀州漳漳州之山尤廣人跡罕到獨與贛州江西屬府聲勢相連提督兵備實交治之而永春安溪俱泉州府屬縣沙尤俱延平府屬縣之間則屬之捕盜官矣四縣交界地方山盜頗多葢簡僻莫若邵武嚚訟莫如漳州土沃民稠耕稼自給兵燹不加則郡一也沿革古閩越地漢則以揚州刺史領之東漢於此置㑹稽南部都尉唐初𨽻江南道復𨽻江南東道採訪處置使大厯中始置福建觀察使治福州宋置福建路安撫司使以福州守臣兼領元置福建等處行中書省于泉州尋徙福州置福建道宣慰使司都元帥府及福建寧海道肅政廉訪司于福州本朝置福建等處承宣布政使司都指揮使司行都指揮使司提刑按察司而三司並治于福州行都司分治于建寧云福建等處承宣布政使司治福州左右布政使二左右㕘政三左右㕘議三糧儲一領府八州一縣五十有三總為里三千七百九十七里有零户五十萬九千二百口二百八萬二千六百七十七夏秋二税共米麥八十八萬三千一百一十五石絲綿一百九十四兩絹六百疋苧六十五斤鈔一萬七百