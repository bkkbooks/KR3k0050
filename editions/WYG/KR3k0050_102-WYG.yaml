body:
  text: 圖書編卷一百二明章潢撰祀嶽鎭海瀆天下山川城隍總叙嶽鎮海瀆之祀虞舜以四仲月廵狩而祭四嶽東嶽曰泰山四嶽之所宗也故又曰岱宗南嶽曰衡山西嶽曰華山北嶽曰恒山而未言五嶽王制曰天子祭天下名山大川五嶽四凟始有五嶽之稱蓋以中嶽嵩山並列也又周小宗伯兆四望於四郊鄭𤣥謂四望為五嶽四鎮四瀆四瀆者江河淮濟四鎮者東曰沂山西曰岳山南曰會稽北曰醫無閭也詩序又曰廵狩而祀四嶽河海則又有四海之祭焉蓋天子方望之事無所不週而嶽鎮海瀆在諸侯封内者諸侯亦各以其方祀之秦罷封建嶽瀆皆領於祀官及漢復諸侯則侯國各自祀其封内山川而天子無所預焉武帝時諸侯或分或廢五嶽皆在天子之邦至宣帝時嶽始有使者持節侍祠之禮矣由魏及隋嶽鎮海瀆皆即其地立祠命有司致祭唐宋之制則有命本界刺史縣令之祠又有因郊祀而望祭之祠又有遣使之祠焉元遣使祀嶽鎮海瀆分東南西北中為五道其天下山川之祀則虞書曰望于山川偏于羣神周頌曰懐柔百神周官小宗伯兆山川丘陵墳衍各因其方王制凢山川之小者其祭秩視伯子男劉向謂山川能生物出雲雨施潤澤品類以百數故視伯子男也其在諸侯封内者諸侯又自祭之如楚祭睢漳晉祭惡池齊祭配林是已及秦罷封建則皆領於天子之祠官焉由漢唐以及宋元嶽鎮海瀆之外皆有其餘山川之祀若其城隍之事莫詳事始先儒謂既有社矣不應復有城隍故唐李陽氷縉雲城隍記謂祀典無之惟吳越有之爾然成都城隍祠太和中李徳裕所建張說有祭荆州城隍文杜牧有祭黄州城隍文不獨呉越為然又蕪湖城隍祠建於呉赤烏二年高齊慕容儼梁武陵王祀城隍皆書於史則又不獨唐而已宋以來其祀徧天下或錫廟額或頒封爵至或遷就附會各指一人以為神之姓名如鎮江慶元寧國太平華亭蕪湖等郡邑皆以為紀信隆興贑袁江吉建昌臨江南康皆以為灌嬰是也張說祭荆州城隍文曰致和産物助天育人張九齡祭洪州城隍文曰城池是保甿庶是依則前代崇祀之意有在矣國朝既於方丘以嶽鎮海瀆天下山川從祀復於春秋清明霜降日遣官専祀嶽鎮海瀆天下山川於國城之南而以京師及天下城隍附祭焉至於外郡山川亦列祀典若國有所祈禱則又遣使降香専祀於其本界之廟若夫山川之在王國城隍之在郡縣者則自以時致祭山川壇呉元年間壇址無可考今壇在洪武門外正南不知創自何年約地百餘畆周圈以墻四靣各立圈門一所内設壇崇三尺許壇覆以殿屋七門左右斜廊各三間轉角俱西兩廡房十間環接前殿五間歳以仲秋擇日祭太歳風雲雷雨五嶽曰鎮四海四瀆鍾山之神於殿内夏冬二月附京畿山川之神於東廡春秋二月附都城隍之神於西廡前殿之左稍南立具服殿三間又東而北立旗纛殿五間壇之西北皆神庫厨井之所當壇之西墠崇尺許為先農壇而壇之前籍田所也東圏門外又圍以墻北壇墻縱如横之差狹直東門外東圏門一座近門向南立祠祭署署之前皆平地時藝黍稷稻以供歳祀洪武三年建山川壇祭太歳風雲雷雨嶽鎮海瀆鍾山之神於殿内祭四月将京畿山川都城隍之神於東西廡二十一年後各役於南郊祔祭山川壇但舉秋祭永樂年京師祭亦如之嘉靖八年始特祭太歳月将而諸神别祭之十八年定月日如今禮祭神祗舊名山川事例洪武元年詔立春後丑日祭風師於東北郊立夏後甲日祭雨師雷師於西南郊祭風師雨師給米三石二年封京師及天下城隍神三年正岳鎮海瀆城隍諸神號又奏准自今遣官祭山川壇諸神春用驚蟄後三日秋用秋分後三日獻官及倍祀執事官皆前期齋戒三日七年令祭山川諸神於春秋仲月上旬擇日後又以孟春郊祀時諸神既預祭壇内一定以仲秋祭社稷後擇日祭十四年令祭山川諸神文職長官行事武官不得預軍民指揮使司自祭之二十一年令歳仲秋中旬擇日祭山川壇二十九年令陪祭未入流官用祭服嘉靖十一年釐正祀典改山川壇為天神地祗壇改叙雲雨風雷祭期歳仲春秋上旬擇日行事今定上巳日獻官同社稷齋戒同社稷省牲同社稷儀注正祭日將行禮起皷初嚴遍燃􅒉燎香燭皷再嚴執事者各序立於兩堦皷三嚴贊引引各獻官立竢行禮通贊唱執事者各司其事陪祭官各就位獻官就位迎神鞠躬拜興拜興拜興拜興平身奠帛行禮獻禮贊引唱詣􅏕洗所搢笏出笏詣酒罇所司罇者舉羃酌酒詣雲雨風雷神位前跪搢笏奠帛獻爵出笏俯伏興平身詣境内山川神位前跪搢笏奠帛獻爵出笏俯伏興平身詣城隍神位前跪搢笏奠帛獻爵出笏俯伏興平身詣讀祝位跪通贊唱衆官皆跪贊引唱讀祝通引同唱俯伏興平身贊引唱復位通贊唱行亞獻禮贊引唱詣酒罇所司罇者舉羃酌酒詣雲雨風雷神位前跪搢笏獻爵出笏俯伏興平身詣境山川神位前跪搢笏獻爵出笏俯伏興平身詣城隍神位前跪搢笏獻爵出笏俯伏興平身復位通贊唱行終獻禮贊引唱詣酒罇所司罇者舉羃酌酒詣雲雨風雷神位前跪搢笏獻爵出笏俯伏興平身詣境内山川神位前跪搢笏獻爵出笏俯伏興平身詣城隍神位前跪搢笏獻爵出笏俯伏興平身復位通贊唱飲福受胙贊引唱詣飲福位搢笏跪飲福酒受胙出笏俯伏興平身復位通贊唱鞠躬拜興拜興平身徹饌送神鞠躬拜興拜興拜興拜興平身讀祝者捧祝進帛者捧帛各詣療所望燎贊引唱詣望燎位通贊唱焚帛者一段至七段皆唱禮畢祝文維年歳次月朔日某申某衙門某官某等敢昭告于雲雨風雷之神境内山川之神城隍之神曰惟神主司民物叅贊天地化機發育有功考於古今歴代有春告之禮今當一歳之初農事將興謹以牲醴庶品用伸告祭所冀風雨以時年歳豐稔民物咸遂軍旅府縣用四境皆安尚饗又秋報惟神主司民物㕘贊天地化機發育有功歴代相承有秋報之禮今農事告成謹以牲帛醴齊粢盛庶品用伸報祭尚饗按周禮以槱燎祀風師雨師東漢令郡邑皆以丙戌日祀風師於戍地以己丑日祀雨師於丑地牲用羊豕王制諸侯祭名山大川之在其地者唐制諸郡風伯壇在社壇之東雨師壇在社壇之西用羊一籩豆八簠簋六天寳五載詔祝雨師宜以雷師同壇宋風師一壝二十五歩雨師雷師二壇同壝政和中有司言社稷五祀先薦爓次薦熟風師雨師止薦熟從之元以立春後丑日祭風師立夏後甲日祭雨師雷師國朝加祀雲以雨所繇興也山川歴代惟四望未有壇城隍自三國以來因事而祭代有其文其立祠則見於唐李德裕之在成都宋以來天下通祀高祖洪武元年令郡縣各立山川壇制與社稷同嘉靖九年奉制更神之序曰風雲雷雨行乎天山川麗乎地其氣則相感相成以育萬物成歳功而阜民用報祀之典咸不可畧也城隍民之衛也為民舉祀故雖有廟復列於壇蓋國朝祀典視前代益周矣歴代山川黃帝祭山川為多虞氏秩於山川徧於羣神周制四坎壇祭四方以血祭五嶽以埋沉祭山林川澤一歳凡四祭一者謂迎氣時二者郊天時三者大雩時四者大䄍時皆因以祭之秦并天下令祠官所常奉名山大川鬼神可得而序於是自崤以東名山大川祠山曰大室恒山泰山㑹稽湘山水曰淮濟春以脯酒為歳禱因冸凍秋涸凍冬塞其牲用牛犢各一牢且圭幣各異自華以西名山七曰華山薄山岳山岐山呉山鴻冡瀆山蜀之岷山也名川四曰河祠臨晉沔祠漢中湫淵祠朝那江水祠蜀亦春秋冸涸禱塞如東方山川而牲亦牛犢圭幣各異而四大冡鴻岐吳岳皆有嘗禾其河皆有嘗醪此皆在雍州之域近天子都故加車一乗駵駒四㶚滻灃澇涇渭長水皆不在大川數以近咸陽盡得比山川祠而無車乗駵駒之加漢孝文十二年五榖不登詔增修山川羣祀武帝因廵狩禮其名山大川用駒者悉以木偶馬代行過親祠者乃用駒後漢章帝元和二年詔祀山川百神應禮者魏文帝黄初三年禮五岳四瀆咸秩羣祀瘞沉圭璋宋孝武帝大明七年六月有司奏奠祭霍山殿中郎丘景先議宜使大常持節牲以大牢之具羞用酒脯時榖禮以赤璋纁幣器用陶匏藉用茆席梁令郡國有五岳者置宰祀三人及有四瀆者若海應祀者皆以孟春仲冬祀之後魏明元帝立五岳四瀆廟於桑乾水之隂春秋遣有司祭其餘山川諸神三百二十四所每歳十月遣祠官詣州鎮徧祀有水旱災厲則牧守各隨其界内而祈謁王畿内諸山川有水旱則禱之又武帝南征造恒山祀以大牢浮河濟祀以少牢過岱宗祀以大牢遂臨江登􅆶歩而還後周大將出征遣大祝以羊一祭所過名山大川隋制東鎮沂山西鎮呉山南鎮㑹稽山北鎮醫無閭山冀州鎮霍山並就山立祠祀四海東海於會稽縣界南海於南海鎮南並近海立祠及四瀆並取側近巫一人主其灑掃並令多植松栢唐武徳貞觀之制五嶽四鎮四海四瀆年别一祭各以五郊迎氣日祭之東嶽岱山祭於兖州東鎮沂山祭於沂州東海祭於萊州東瀆大淮祭於唐州南嶽衡山祭於衡州南鎮㑹稽山於越州南海於廣州南瀆大江於益州中岳嵩山於洛州西岳華山於華州西鎮呉山於隴州西海及西瀆大河於同州北岳恒山於定州北鎮醫無閭山於營州北海及北瀆大濟於洛州其牲皆用大牢祀官以當界都督刺史充先天二年封華岳神為金天王開元十三年封泰山神為天齊王天寳五載封中岳神為中天王南岳神為司天王北岳神為安天王六載河瀆封為靈源公濟瀆封為清源公江瀆封為廣源公淮瀆封為長源公㑹稽山為永興公岳山為成徳公霍山為應聖公醫無閭山為廣寧公八載閏六月封大白山為神應公其九川鎮山除大諸岱外並宜封公十載正月以東海為廣德王南海為廣利王西海為廣潤王北海為廣澤王分命卿監詣嶽瀆及山取三月十七日一時備禮兼册祭其祭儀具開元禮宋初縁舊制祭東岳泰山於兖州西岳華山於華州北岳恒山於定州中岳嵩山於河南府乾德六年有司言祠官所奉止四岳令案祭典請祭南嶽於衡州東鎮沂山於沂州南鎮㑹稽山於越州西鎮呉山於隴州中鎮霍山於晋州東海於萊州南海於廣州西海河瀆並於河中府北海濟瀆並於孟州淮瀆於唐州其江瀆凖顯德五年敕祭於揚州揚子江口今請復祭於成都府北鎮醫無閭山在營州界未行祭享從之此後望祭北鎮於定州北岳祠政和三年太常寺言大中祥符中封五岳為帝四海為王獨五鎮封爵尚仍􅃇唐元豐八年始封西鎮呉山為成德王而未及四鎮詔並從之封王然封帝封王各奉玉册置立廟殿儼然人形貌垂旒端冕衣裳而坐又各立后殿於其後祭山川統論按舜嵗周方嶽所至柴望秩於山川而傳曰天子祭天下名山大川五嶽東泰南霍西華北恒中嵩山也視三公四瀆江河淮濟視諸侯山川視子男秩之謂也蓋望之以祀而秩其牲幣祝號之次第其禮亦不茍矣曷故哉劉向說苑嘗言之五嶽能大布雲雨焉能大歛雲雨焉雲觸石而出膚寸而合不崇朝而雨天下施德博大故視三公也四瀆能蕩滌垢濁焉能通百川於海焉能出雲雨千里焉為施甚大故視諸侯也山川能出物焉能潤澤物焉能生雲雨焉為恩雖多而品以百數故視子男也鄭康成注周禮四望之說與此頗合若鄭司農杜預許損之則甚戾矣然則四望之祭其可已乎自秦㓕學禮典廢墜所祠祭山川皆因其㳺觀所至與封禪求仙則及之而其領之祠官以歳時致祭且雜以滛祠者大率多秦中山川也至漢則名山大川之在侯國者不領於天子之祠官必俟齊淮南常山之國廢及濟北地而後舉五嶽之祭非古義也陵祀每嵗聖旦元旦清明中元霜降冬至分遣勲戚大臣祭長獻景裕茂泰康永陵於天壽山清明霜降則百官陪拜愍忌專遣祭章皇后景皇后孝懿皇后陵亦如之此天壽山祀典也基運翔聖神烈純德諸陵祀典載南太常志及天人誌中嘉靖十年有建議遷顯陵天壽山者廷臣極論其不可遂斥之十五年以憲宗母孝肅周皇后孝宗母孝穆紀皇后獻皇帝母孝恵邵皇后不得祔廟宜祔陵殿乃奉孝肅於裕陵孝穆孝惠於茂陵合享之罷三后奉慈殿之祭十七年南祔獻皇后於顯陵累朝春秋陵祀皇帝間率后妃親詣行禮凡親王來京及之國則有謁辭之祭按春雨秋霜之感列聖並降而世宗躬修陵祀尤數故陟降興思曠儀具舉觀於三后之祔陵殿蓋深體三宗之心而曲遂之也至如陵山松栢一枝一柯戒勿擅動聖心所寓周且逺矣豈特享薦之勤爾哉墓祭總論按五經無墓祭之文而上陵之禮三代以前雖不經見然自漢以後歴代相承率不敢廢非不敢也蓋不忍也光武凡三幸長安皆有事於十一陵蔡邕曰聞古不墓祭朝廷有上陵之禮始為可損今見其儀察其本意乃知孝明帝至孝惻隐不可易唐開元禮有天子上陵儀注又歳有清明設祭朔望時節之祀又行於春秋歳以為常我朝上陵之禮歳凡三舉清明也中元也冬至也每遇行禮文武諸司各遣官一員而以親王或駙馬主祀事天下無事天子於清明日亦或一行其藩或來朝者亦許謁孝陵在南京内外臣僚有事經過者必先拜謁否則有罪國朝五祀附周禮五祀春祀万夏祀竈秋祀門冬祀行六月祀中􅋼歳一徧祀以順五行為其有居處出入飲食之用祭之所以報德也而祭法又以司命泰厲併為七祀鄭𤣥註禮記月令曰凡祭五祀於廟漢初祭族人炊於宫中而謂之竈後漢立五祀万􅍳門井中霤有司掌之禮頗簡於社稷唐初唯祭中霤開元祀祭七祀各因時享祭之於廟庭司命万以春􅍳以夏門厲以秋行以冬中霤以季夏時享之日太廟令布神席於廟庭西門之内道南東向北上設酒尊於東南罍洗又於東南一獻而止宋制七祀為小祀用羊一豕一不行飲福元豐四年詳定禮文所言近祭七祀皆非禮制請立春祭万於廟室万外之西祭司命於廟門之西立夏祭􅍳於廟門之東季夏土旺日祭中霤於廟門之中立秋祭門及厲於廟門外之西立冬祭行於廟之西皆用特牲更不隨時享分有事司攝事以太廟令攝禮官服必𤣥冕獻必薦熟親祠及臘享依舊禮徧祭從之設位於殿下横街之北道東西向北上元制附祭七祀神位於廟庭中街之東西向其分為四時之祭並與宋同唯中霤則附於七月之祭特祭則徧設之每位籩豆各二簠簋各一尊二爼二國朝用周制惟祭五祀於歳中臘享通祭於廟門外其籩豆各四簠簋各一尊二共羊一豕一祭厲事例按祭法王祭泰厲諸侯祭公厲大夫祭族厲泰厲謂古帝王無後者此鬼無所依歸好為民作禍故祀之也公厲謂古諸侯無後者諸侯稱公其鬼為厲故曰公厲族厲古諸大夫無後者鬼也族衆也大夫衆多其鬼無後者衆故曰族厲又士喪禮疾病禱於厲鄭氏謂漢時民家皆秋祠厲則此祀又逹於民也春秋傳曰鬼有所歸乃不為厲然則鬼乏祭享而無所歸則其為害也必矣古者七祀於前代帝王諸侯􅀸大夫之無後者皆致其祭豈無所為而然哉後世以為渉於滛謟非禮之正遂不舉行而此等無依之厲乃或依附土木為民禍福以邀祀享者蓋無足怪國朝於京都則祭泰厲於王國則祭國厲於各府州縣則祭郡邑厲於里社則祭鄉厲而於天下之滛祀一切屏除使之無所歸依者不失祭享其為民除害之意可謂至矣祭期郡邑厲皆一年二祭春以三月清明日冬以十月初一日鄉厲則一年三祭春以清明後三日秋以十月十五日冬以十月三日祭物凢祭用少牢羊三豕三米三石儀注先期三日主祭官齋沐更衣用常服備香燭酒果詣本處城隍發告文通贊唱鞠躬拜興拜興平身詣神位前跪進爵獻爵奠爵俯伏興平身復位鞠躬拜興拜興平身焚告文禮畢至日設城隍位於壇上設無祀鬼神牌於壇下左右如府則曰本府境内無祀鬼神解牲體置於器同羮飯等鋪設各鬼神位前執事者陳設畢通贊唱執事者各就位主祭官就位鞠躬拜興拜興拜興拜興平身詣神位前跪三獻酒俯伏興平身復位讀祭文訖鞠躬拜興拜興拜興拜興平身以祭文同紙錢焚訖唱禮畢祭郡厲州縣倣此維某年某月某日某府官某遵奉禮部符又為祭祀本府闔境無祀鬼神等衆事該欽奉皇帝聖㫖普天之下后土之上無不有人無不有鬼神人之道幽明雖殊其理則一故天下之廣兆民之衆必立君以主之君總其大又設官分職於府州縣又於每一百户内設一里長以統領之上下之職紀綱不紊此治人之法如此天子祭天地神祗及天下山川王各府各縣祭境内山川及祀典神祗庶民祭其祖先及里社土榖之神上下之禮各有等第此事神之道如此尚念㝠㝠之中無祀神鬼昔為生民未知何故而殁其間有遭兵刃而横傷者有死於水火盗賊者有被人取財而逼死者有被人強奪妻妾而死者有遭刑禍而負屈死者有天災流行而疫死者有為猛獸毒蟲所害者有為饑餓凍死者有因戰闘而殞身者有因危急而自縊者有因墻屋傾頺而壓死者有死後無子孫者此等鬼魂或終於前代或殁於近世或兵戈擾攘流移於他鄉或人烟斷絶久缺其祭祀姓名冺没於一時祀典無聞而不載此等孤魂死無所依精魄未散結為隂靈或倚草附木或作為妖怪悲號於星月之下呻吟於風雨之時凡遇人間節令心思陽世魂杳杳以無歸身墮沉淪意懸懸而望祭興言及此憐其慘悽故勅天下有司依時享祭在京都有泰厲之祭在王國有國厲之祭在各府州有郡厲之祭在各縣有邑厲之祭在一里又各有鄉厲之祭期於神依人而血食人敬神而知禮仍命本處城隍以主此祭欽奉如此今某等不敢有違謹設於城北以三月清明日十月初一日置備牲醴羮飯專祭本府闔境無祀神鬼等衆靈其不昧來享此祭凡我一府境内人民倘有忤逆不孝不敬六親者有姦盗詐偽不畏公法者有抝曲作直欺壓良善者有躱避差徭靠損貧户者似此頑惡奸邪不良之徒神必報於城隍發露其事使遭官府輕則笞杖决斷不得號為良民重則徒流絞罪不得生還鄉里若事未發露必遭隂譴使舉家並染瘟疫六畜田蠶不利如有孝順父母和睦親族畏懼官府遵守禮法不作非為良善正直之人神必逹之城隍隂加䕶佑使其家道安和農事順序父母妻子保守鄉里我等闔府官吏人等如有上欺朝廷下枉良善貪財作弊蠧政害民者靈必無私一體昭報如此則鬼神有鍳察之明官府非謟諛之祭尚饗祭告城隍文某府遵奉禮部符文為祭祀本府無祀神鬼事該欽奉聖㫖普天之下后土之上無不有人無不有鬼神人鬼之道幽㝠雖殊其理則一今國家治民事神已有定治尚念㝠㝠之中無祀神鬼昔為生民未知何故而殁其間有遭兵刅而横傷有死於水火盗賊者有被人取財而逼死者有被人強奪妻妾而死者有遭刑禍而負屈死者有天災流行而疫死者有為猛獸毒蟲所害者有為饑餓凍死者有因戰闘而殞身者有因危急而自縊者有因墻屋傾頺而壓死者有死後無子孫者此等鬼魂或終於前代或殁於近世或兵戈擾攘流移於他鄉或人烟斷絶久缺其祀祭姓名泯没於一時祀典無聞而不載此等孤魂死無所依精魄未散結為隂靈或倚草附木或作為妖怪悲號於星月之下呻吟於風雨之中凡遇人間節令心思陽世魂杳杳以無歸身墮沉淪意懸懸而望祭興言及此憐其慘悽故勅天下有司依時享祭命本處城隍以主此祭鎮控壇塲鍳察諸鬼等類其中果有生為良善誤遭刑禍死於無辜神當逹於所司使之還生中國來享太平之福如有素為兇頑身死刑憲雖獲善終亦出僥倖者神當逹於所司屏之四裔善惡之報神必無私欽奉如此今某等不敢有違謹於某年某月某日於城北設壇置備牲酒羮飯享祭本府無祀神鬼等衆然幽明異境人力難為必資神力庶得感通今時移文於神先期分遣諸將召集本府闔境鬼靈等衆至日悉赴壇所普享一祭神當欽承勅命鎮控壇塲鍳察善惡無私昭報為此合行移牒請照驗欽依施行按祭法王及諸侯大夫皆有厲祭王曰泰厲諸侯曰公厲大夫曰族厲國朝洪武三年令郡邑及鄉都皆立厲壇嘗考之傳曰鬼有所歸乃不為厲為壇以祭祀之有所歸不為民厲也王政恤民則逹於無告恤祀則逹於無歸非所為仁之至義之盡乎祭旗纛守禦官主祭文官不預凡各處守禦官俱於公􅇬後築壇立旗纛廟設軍牙大纛神位春祭用驚蟄日秋祭霜降日祭物用羊一豕一帛一白色祝一香燭酒菓先期各官齋戒一日至日守禦長官武服行獻禮若出師則取旗纛以祭班師則仍置於廟儀注與社稷同仍望燎瘞毛血與風雲雷雨等神同祝文某年某月朔日某官某敢昭告於旗纛之神惟神之靈實壯威武某等欽承上命守禦兹土惟仲春季秋謹以牲醴庶品用伸常祭尚饗諸祀總論書曰先王顧諟天之明命以承上下神祗洪範八政三曰祀大宗伯之職以吉禮祀邦國之鬼神祗故祭天曰燔柴祭地曰瘞埋祭山林川澤曰貍沉祭風師雨師曰槱燎祭四方百物曰疈辜是類是禡師祭也既伯既禱馬祭也除惡之祭為祓㑹福之祭為㑹告事求福曰禱絜意以享為禋禱雨為雩禱晴為禜是以聖王為之典禮民之精爽不貳齊肅聰明者神或降之乃有神明之宫各司其序不相亂也歴代仁君罔不徧走羣望咸秩無文故神農播種始諸飲食致恭鬼神顓帝亦潔誠以祭祀其後成湯至於帝乙罔不明德恤祀所以隂陽和而萬物遂也以今攷之在古有雩祭之禮有朝日夕月之禮有祀山川之禮有六宗之禮有七祀之禮有司寒之祭有蜡臘之祭夫雩者何也月令仲夏之月命有司祀祈山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈榖實若國大旱則師巫帥巫而舞雩漢承秦雩壇禮廢後漢自立春而至於立秋郡國上雨澤若少則公卿官長以次行雩禮以求雨東晉穆帝制雩壇梁天監中停柴燎而用坎也唐武德初孟夏雩祀昊天上帝于圜丘貞觀雩祀于南郊開元旱則大雩此雩祭之禮也夫日月之禮何也周制以柴祀日月星辰日壇曰王宫月壇曰夜明王搢大圭執鎮圭繅藉五采五就以朝日凡祭日月歳有四焉迎氣之時祭日於東郊祭月於西郊一也二分祭日月一也郊之祭天配天而主日配以月三也月令十月祭天宗各祭日月四也漢武始郊天一朝日夕月攷周法其後常於以郊太畤質明出行宫東向揖月魏文帝以為非尊天之道明帝春始朝日于東郊秋夕月于西郊始得古禮唐二分朝日夕月於國城東西柳子厚為御史主祀事將朝日其寮問曰古人夕朝日而已今而曰祀朝日何也柳曰古者旦見曰朝暮曰夕故詩曰邦君諸侯莫肯朝夕左傳曰百官承事朝而不夕禮記曰日入而夕趙文子礱其椽張老夕智襄子為室美士茁夕皆暮見也漢儀夕則兩郎向𤨏闥拜謂之夕即亦出是名也故曰大采朝日少采夕月義曰春朝日秋夕月此朝日夕月之禮也夫祀山川之禮何也周制以血祭祭五嶽之神以貍沉祭山林川澤一歳凡四祭迎氣一也郊天二也大雩三也大蜡四也禮神之玉兩珪有邸五寸牲用少牢各隨方色酌用五獻秦并天下令祠官所當奉名山大川鬼神可得而序者自崤以東名山大川六曰太室嵩高也常山泰山㑹稽湘山水曰濟曰淮自華以西名山七曰華山薄山嶽山岐山呉山鴻􅂪瀆山名川四曰河祠臨晉沔祠漢中湫泉祠朝那江水祠蜀漢孝文増修山川羣祀武帝因廵狩其禮名山大川後漢章帝詔祀山川百神應禮者唐武德貞觀之制五嶽四鎮四海四瀆年别一祭各以五郊迎氣日祭之此禮山川之禮也夫六宗者何也通典曰周制祀昊天上帝則服大裘而冕祀五帝亦如之又云以禋祀祀昊天上帝漢興於甘泉汾隂立壇禋六宗孔光劉歆等以乾坤六子為六宗後漢安帝立六宗祀時歐陽說謂六宗者在天地四方之中為上下四方之宗鄭𤣥以星辰司中司命風師雨師為六宗馬融曰萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏孔安國按孔叢子孔子之說謂埋少牢於大昭祭時也相近於坎壇祭寒暑也王宫祭日夜明祭月幽宗祭星雩宗祭水旱是為六宗賈逵以為天宗三日月星也地宗三河海岱也魏明帝立六宗祀祀六子之神晉罷其祀劉邵以為太極冲和之氣為六氣之宗後魏立六宗祀孝文詔祀天皇大帝及五帝之神通典謂張廸以六代帝王張髦以宗廟三昭三穆三等並不堪録後魏孝文以天皇大帝五帝為六宗於義為當崔靈恩三禮釋義宗謂六宗之神諸儒所釋義各不同義雖不同亦各有通月令孟冬祈於天宗盧植注云天宗六宗之神李邰謂六宗上不及天下不及地旁不及四方在六合之中晉虞喜别論曰地有五色大社象之總五為一則成六六為地數劉昭稱孔叢子之言若果如夫子所說則後儒無復紛然正謂未必然耳至昭以六宗為祭祀則穿鑿甚矣惟晉司馬彪曰周禮無六宗之兆祭法無六宗之文不宜特立祀也此六宗之說也夫七祀者何也商制天子祭五祀周制王為羣姓立七祀曰司命曰中􅋼曰國門曰國行曰泰厲曰戸竈諸侯為國立五祀大夫立三祀士立二祀庶人一祀兩漢魏晉立五祀井皆與焉白虎通云戸竈門井中霤唐開元制禮祭七祀各因時享祭之於廟庭司命戸以春竈以夏門厲以秋行以冬中霤以季夏夫五祀見於周禮禮記儀禮雜出於史傳多矣特祭法以司命泰厲為七祀而左傳家語則以為重該脩熈黎勾龍之五官月令以五祀為門行戸竈中霤白虎通劉昭范􅁮高堂隆之輩以五祀為門井戸竈中霤鄭氏釋大宗伯之五祀則用左傳家語之說釋小祝之五祀則用月令之說釋王制之五祀則用祭法之說隋唐參用月令祭法之說五祀祭行及李林甫之徒復修月令冬亦祀井而不祀行此七祀之禮也夫司寒者何也月令仲春之月天子乃鮮羔開氷先薦寢廟鄭注云祭司寒而出氷春秋傳昭四年曰古者日在北陸而藏氷西陸朝覿而出之其藏之也深山窮谷凅隂冱寒於是乎取之其出之也朝之祿位賔食喪祭於是乎用之其藏也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之禄氷皆與焉唐制先立春三日用黑牡秬黍祭司寒之神於氷室鑿井而藏之仲春開氷此司寒之禮也司寒𤣥㝠北方之神故物皆用黒大蜡臘者何也郊特牲云天子大蜡八先嗇也司嗇也農也郵表畷也猫虎也坊也水庸也昆蟲也伊耆氏始為蜡蜡也者索也歳十二月合聚萬物而索饗之也蜡之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也迎猫為其食田䑕也迎虎為其食田豕也祭坊與水庸事也黄衣黄冠而祭息田夫也八蜡以記四方四方年不順成八蜡不通以謹民財也順成之方其蜡乃通以移民也既蜡而收民息已故既蜡君子不興功鄭氏曰息民與蜡異則黄衣黄冠而祭為臘必矣正義曰先蜡後息民是息民為臘與蜡異也夏曰嘉平商曰清祀周曰太蜡蔡邕月令章句曰總謂之臘籥章國祭蜡則歌豳頌擊土皷以息老物羅氏蜡則作羅襦秦漢曰臘季冬之月星囘歳終隂陽以交勞農太享臘唐貞觀季冬寅日蜡祭百神於南郊宋朝建隆初有司言以火德王請以戍日為臘元豐六年蜡祭日郊各為一壇以祀其方之神而息民祭在蜡祭之後此蜡臘之禮也其他在秦則有陳寳祠有伏祠有八神祠漢則有蚩尤祠靈星祠髙媒祠太室祠宋朝承唐制又祀九宫貴神於東郊用太祠禮東南曰招揺正東曰權星東北曰太隂正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍景祐二年章得象詳定江淵之說隨每年貴神飛棊之方旋定祭位從之然所謂太乙者又有十神太乙之名如曰五福天乙之號君基神基民基之號此皆雜祭之類也雖然古人先恤民而後致力於神蓋以民為神之主也文帝切於爱民而謂禬禳之事足以佑民也廣壇塲増圭幣除秘祝之官以為祈福其為事也舛矣宣室之問未遑他事而急於鬼神之問豈以鬼神之福能有以隂助斯民乎迨至武帝又甚焉而其心則為已不為民矣廵海而求神人築宫而封太一祝吏祠官相望於名山大川之上一切妄祭滛祠以徼福於已百姓困而國用竭福何有於已哉終漢之末一歳凡三萬七千祠胡廣謂班固郊祀志宜去鬼神仙道之語置韋賢宗廟迭毁議於其中則其祀事庶得以類相從矣夫孟堅合宗廟之議而專主於郊祀固未為得至於漢武之滛祀以為後世戒其㫖深矣安得以去為哉三祀因革三祀有昔嘗舉行而今罷者曰大禘曰大享曰祈榖曰雩曰帝社稷曰神祗曰先聖先師曰先蠶曰金海大禘蓋行於嘉靖十五年于時羣臣皆禘德祖上不從或曰禘顓頊上亦不從曰可稱皇初祖帝神勿主名五歳一禘於太廟而奉太祖配焉先一日令中書官書皇初祖帝神牌位於太廟至日設太廟殿中祭畢燎牌位尋罷大享蓋始於嘉靖十七年世宗皇帝欲宗祀皇考以配上帝乃撤南郊大祀殿建大享殿是秋殿未成乃大享於宫右乾隅𤣥極寳殿祈榖亦於𤣥極寳殿其始也行大享殿則孟春上辛日也後改於𤣥極寳殿以驚蟄日也大雩先是世宗皇帝欲於奉天殿中行秋報禮丹陛上行大雩禮後用禮官言建崇雩壇于圜丘之東如雨澤愆期則禱焉帝社稷歳以仲春秋次戊日祈報於帝社帝稷嘉靖十年上命墾西苑空地藝五榖建恒裕倉儲以供粢盛遂建帝社帝稷壇於豳風亭西以祀焉神祗蓋嘉靖十一年定雲師雨師風伯雷師為天神嶽鎮海瀆基運翔聖神烈天壽純德五山京畿并天下名山大川為地祗建二壇於先農之壇歳祭以仲秋中旬其在國初建山川壇祭太歳風雲雷雨嶽鎮海瀆及神烈鍾山配以京畿山川四季月將及都城隍永樂京師建壇成位如進祀天壽於鍾山之下嘉靖則别祀大歳月將城隍特建二壇以祀神祗以上俱隆慶元年罷先聖先師蓋祀於文華殿皇師伏羲氏神農氏軒轅氏帝師陶唐氏有虞氏王師夏禹王商湯王周文王武王俱南向先聖周公先師孔子東西向以歳仲春秋開講先一日祀起於嘉靖初年尋罷先蠶蓋嘉靖九年建壇於北郊皇后祀先蠶十年改築壇於内苑以仲春吉巳日祀二十七年罷金海則司海水府司舟三神遣本寺卿行禮嘉靖十四年建金海祠於湧泉亭以祀隆慶元年罷不行之禮亦載者聖制不敢遺也又大雩祈榖先王勤民豐國之念也大禘先王報本追遠之意也古之制也故存之以表昭代信古崇祀云圖書編卷一百二
