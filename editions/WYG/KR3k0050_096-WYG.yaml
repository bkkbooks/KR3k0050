body:
  text: 圖書編卷九十六明章潢撰朝日壇嘉靖九年罷從祀建壇朝陽門外二里許為制一成壇面紅磂􅲚東西南北階九級俱白石内櫺星門四面門外為燎爐瘞池西南為具服殿東北為神庫神厨宰牲亭燈庫鐘樓北為遣官房外建天門二北天門外西北為禮神街坊西天門外迤南北官齋宿房䕶壇地一百畝歳春分祭大明之神於朝日壇西向甲丙戊庚壬年上祭服親祀餘年遣文大臣攝之先十五日委恊律郎率樂舞生演禮樂先十日題請上行禮先三日奏致齋進銅人齋牌示長安門是日詣太和殿觀禮樂犧牲所看牲先二日同光禄寺奏省牲次日具本復命博士捧祝版候塡御名捧安於香帛亭厨役舁至神庫奉安樂舞生燒香陳設樂器鋪排洗祭器夜半奉安神牌陳設籩豆祭品大明赤璋一禮神帛一紅色玉爵三磁酒盞三十騂犢一羊一豕一豋一鉶一簠簋各二籩豆各十嘉靖九年欽依赤玉無切物可改而就禮禮不可改而就物日以赤玉月以白玉此不易之理見無赤玉合暫以次玉瑪瑙之類代之明旦上以出祭朝日告内殿卿詣皇極門候請聖駕上由東長安門出至壇北門入至具服殿具祭服出導引官導由左門入典儀唱樂舞生就位執事官各司其事内贊奏就位位設於上成典儀唱迎神奏樂樂止奏四拜傳贊百官同典儀唱奠玉帛奏樂内贊奏陞壇導上至香案前奏跪奏搢圭奏上香奏獻玉帛奏出圭奏復位樂止典儀唱行初獻禮奏樂内贊奏陞壇導上至神位前奏搢圭奏獻爵奏出圭奏復位樂暫止奏跪傳贊百官同贊讀祝訖樂復作奏俯伏興平身傳贊同樂止典儀唱行亞獻禮奏樂儀同初獻惟不讀祝樂止典儀唱行終獻禮奏樂儀同亞獻樂止卿立於壇之左唱賜福胙光禄卿捧福酒胙跪進於右内贊奏跪奏搢圭奏飲酒奏受胙奏出圭俯伏興平身奏再拜傳贊百官同典儀唱徹饌奏樂樂止典儀唱送神奏樂奏四拜傳贊百官同典儀唱讀祝官捧祝進帛官捧帛掌祭官捧祭饌各詣燎位奏樂上退拜位南立捧祝帛饌官下陞奏禮畢内贊導上出左門導引官導至具服殿上囘參内殿遣官之年先期題欽定大臣一員攝祭位於壇下由北級升降不飲福受胙餘儀同祝文紅版硃書嗣天子御名謹昭告於大明之神惟神陽精之宗列神之首神光下照四極無遺功垂今昔率土仰賴茲當仲春式遵古典以玉帛牲醴之儀恭祀於神伏惟鑒歆錫福黎庶尚饗樂章樂七奏樂生七十二人舞八佾文生六十四人武生六十四人迎神熈和仰瞻兮大明位尊兮王宫時當仲春兮氣融爰遵祀禮兮報功微誠兮祈神昭鑒願来享兮迓神聰奠玉帛凝和神靈壇兮肅其恭有帛在篚兮赤琮奉神兮祈享以納予躬奠兮忻以顒初獻夀和玉帛方獻兮神歆酒行初獻兮舞呈齊芳馨兮犧色騂神容恱兮鑒予情亞獻時和二齊升兮氣芬芳神顔怡和兮喜將予令樂舞兮具張願垂普照兮民康終獻保和慇懃三獻兮告成羣職在列兮周盈神錫休兮福民生萬世永賴兮神功明徹饌安和一誠盡兮予心懌五福降兮民獲禧仰九光兮誠已伸終三獻兮徹敢遲送神昭和祀禮既周兮樂舞揚神享以納兮還青鄉予當拜首兮奉送願恩光兮普萬方永耀熹明兮攸賴蒸民咸仰兮恩光覩六龍兮御駕神變化兮鳳翥鸞翔束帛餚饈兮詣燎方佑我皇明兮基緒隆長夕月壇嘉靖九年罷從祀建壇阜城門外之南二里許為制一成壇面白磂􅲚東西南北階六級俱白石内櫺星門四東門外為瘞池東北為具服殿南門外為神庫西南爲宰牲亭神厨祭器庫北門外為鐘樓遣官房外天門二東門外北為禮神街坊䕶壇地三十六畆七分十年欽依夕月壇以鐵爐置於坎上焚燎不必造燎壇以稱祭月於坎之義歳秋分祭夜明之神於夕月壇東向從祀木火土金水星二十八宿周天星辰南向丑辰未戌年上皮弁服親祀餘年遣武大臣攝之先十五日委恊律郎率樂舞生演禮樂先十日題請上行禮并題欽遣大臣分獻先二日奏致齋進銅人齋牌示長安門詣太和殿觀禮樂犧牲所看牲先一日光禄寺奏省牲次早具本復命上以出祭夜明告内殿傅士捧祝版候塡御名捧安於香帛亭厨役舁至神庫奉安樂舞生燒香陳設樂器鋪排洗器是日午後本寺官奉安神座神牌陳設籩豆祭器夜明白琥一禮神帛一白色金爵三磁酒盞三十騂犢羊豕各一豋一鉶二簠簋各二籩豆各十星辰配位禮神帛十青紅𤣥黄各一白六磁爵三餘同申刻上由西長安門出至壇北門入至具服殿具皮弁服出導引官導上由中門入儀同朝日惟行再拜禮改賜福胙為答福胙分獻官於唱初獻讀祝時聽贊朝上跪至俯伏興平身贊引由北級上至神位前贊搢笏上香獻帛獻爵訖其亞終獻俱候上復位然後行禮遣官年先期題欽遣大臣一員攝祭一員分獻攝官位於壇下由南級升降不答福胙餘儀同祝文白版黒書嗣天子御名敢昭告於夜明之神惟神鍾隂之精配陽之德繼明於夕有生共頼暨惟五星列宿咸司下土各有攸分𦕈予之資仰承帝命君此生民茲者時惟秋分爰遵典禮以玉帛牲醴之儀用修常祭於神惟神歆鑒福我邦民尚享樂章樂六奏樂生七十二人舞八佾文生六十四人武生六十四人迎神凝和隂曰配合兮承陽宗式循古典兮齋以恭覩太隂来格兮星辰羅從予拜首兮迓神容初獻夀和神其来止有嚴其誠玉帛在篚清酤方􅄹奉而奠之願鑒微情夫祀兮云何祈佑兮羣民亞獻豫和二觴載斟樂舞雍雍神歆且樂百職惟供願順軌兮五行祈民福兮神必從終獻康和一誠以申三舉金觥鐘鼔鍧鍧環珮琤琤鑒予之情願永保我民生徹饌安和禮樂肅具精意用申位坎居歆納茲藻蘋徹之弗遲儀典肅陳神其鑒之佑我生民送神保和禮備告終兮神喜旋穹碧澄輝兮素華鮮星辰從兮返神鄉露氣清兮霓裳蹁躚餚饈兮束帛薦之於瘞兮罔敢愆予拜首兮奉送願永貺兮民樂豐年按日月於祀天時已從祀矣而又建壇東西各専祭之者何哉蓋日月為天之用照臨四方固其所司也是以在禮王宫祭日夜明祭月又曰春朝朝日秋莫夕月所以明有敬也歴代朝日夕月周制以柴祀日月星辰日壇曰王宫月壇曰夜明牲幣俱赤樂與祭五帝同禮神之玉以珪璧王搢大圭繅藉五采五就以朝日王服𤣥冕所以尚質自朝至暮行祭之禮先以牲幣於柴上而燔之升煙於天以同五帝之義凡􅀕日月歳有四焉迎氣之時祭日於東郊祭月於西郊一也二分祭日月二也祭義云郊之祭大報天而主日配以月三也月令十月祭天宗合祭日月四也覲禮禮日於南門之外禮月於北門之外漢武帝立二十八年始郊太一朝日夕月改周法不俟二分於東西常以郊泰畤質明出行竹宫東向揖日其夕西向揖月魏文帝以其煩䙝似家人之禮乃以黄初二年正月乙亥朝日於東門之外前史又以正月非二分之義秘書監薛靖論云按周禮朝夕無常日鄭𤣥云用二分秋分之時月多東升西向拜之背實逺矣朝日宜用仲春之朔夕月宜用仲秋之朔淳于睿駁之引禮記云祭日於東祭月於西以端其位周禮秋分夕月並行於上代西向拜月雖如背實亦猶月在天而祭之於坎不復言背也猶如天子東西遊幸拜宫猶北向朝拜寕得以背實為疑明帝太和元年二月丁亥朔朝日於東郊八月乙丑夕月於西郊始得爲禮晉因之武帝太康二年有司春分朝日寒温未適不可親出詔曰頃方難未平故每從所奏今戎事已息此禮為大遂親朝曰後周以春分朝日於東門外為壇如其郊用特牲青幣青珪有邸皇帝乗青輅及祀官俱青冕執事者青弁司徒亞獻宗伯終獻燔燎如圜丘秋分夕月於國西門外為壇於坎中方四丈深四尺燔燎如朝日隋因之開皇中於國東春明門為壇如其郊每以春分朝日又以國西開逺門外為坎深三尺廣四丈為壇於坎中髙一尺廣四尺每以秋分夕月牲幣與周同唐二分朝日夕月於國城東西各用方色犢宋制春分朝日秋分夕月爲大祀用羊豕各二籩豆十二簠簋爼二髙宗紹興三年司封員外郎鄭士彦言春分朝日秋分夕月祀典未舉望詔禮官講求從之後於城外惠照院望祭位版日書曰大明月書曰夜明玉用圭璧大明幣用赤夜明幣用白禮如祀感生帝朝日夕月總論按古禮祭日月杜氏通典云歳有四陳氏禮書云歳有六今以楊氏復之說為凖大畧以為典瑞朝日註云天子當春分朝日秋分夕月玉藻朝日於東門之外馬融鄭康成皆同此說賈誼亦曰三代之禮春朝朝日秋暮夕月所以明有敬也蓋冬至祭天夏至祭地此祭天地之正禮也春分朝日秋分夕月此祭日月之正禮也陳氏云天地至尊故用其始而祭以二至日月次天地故祭以二分此言是也所謂兆日於東郊兆月於西郊祭日於壇祭月於坎祭日於東祭月於西王宫祭日夜明祭月祭日之壇曰王宫王有日之象宫其居也故以名壇祭月之坎曰夜明即春分朝日秋分夕月之事也此外則大報天而主日配以月此因郊而祭者也禮日於南門外禮月於北門外此因覲而行者也祈來年於天宗天宗者日月星辰之類此因蜡而祈者也雪霜風雨之不時於是乎禜之此因禜而舉者也我朝初有朝日夕月之祭洪武罷嘉靖九年復朝日壇在東郊西向春分祭大明之神夕月壇在西郊東向秋分祭夜明之神歴代風師雨師及衆星祀禮祀儀詳後周制大宗伯以實柴祀日月星辰以槱燎祀司中司命風師雨師月今立春後丑日祭風師於國城東北立夏後申日祀雨師於國城西南秋分日享夀星於南郊立冬後亥日祠司中司命司民司禄於國城西北後漢於丙戌日祀風師於戌地以己丑日祀雨師於丑地牲用羊豕又於國都南郊立老人星廟常以仲秋祀之立心星於城南常以季秋祀之晉以仲春月祀於國都逺郊老人星廟季秋祀心星於南郊壇心星廟東晉以來配享南郊不復特立隋令太史局常以二月八日於署庭中以太牢祀老人星兼祀天皇大帝天一太一日月五星勾陳北極北斗三台二十八宿丈人星孫星都四十六座凡應合祀享官示大醫給除穢氣散藥先齋一日服之以自潔唐開元二十四年七月敕所司特置夀星壇常以千秋節日修其祀典又敕夀星壇宜祭老人星及角亢七宿著之常式其儀具開元禮天寳四載敕風伯雨師並宜升入中祠仍令諸郡各宜置一壇因春秋祭社之日同申享祀至九月敕諸郡風伯壇置在壇之東雨師壇之西各稍北三數十歩其制卑小於社壇其祭官凖祭社例取太守下充之宋制二仲祀九宫貴神為大祀立春後丑日祀風師立夏後申日祭雨師為中祀立秋後辰日祀靈星秋分享夀星立冬後亥日祀司中司命司人司禄為小祀都城壇壝之制風師在城之西雨師在城之北雷師從雨師之位爲二壇同壝州縣風師在社壇之東雨師在雷師之西非所謂各依其方類求神者請倣都城方位之制仍以雷師從雨師之位為二壇同壝歴代祭星辰風師雨師總論按周禮以實柴祀日月星辰以槱燎祀司中司命風師雨師小司冦孟冬祀司民司禄而獻民數榖數周制仲秋祭靈星於國之東南月令立春後丑日祭風師於國城東北立夏後申日祀雨師於國城西南秋分日享夀星於南郊立冬後亥日祀司中司命司民司禄於國城西北又祭法曰幽宗祭星也此皆見於經傳者如此然史遷蓋難乎其言之也若經傳所言風師雨師司中司命司民司禄彼固謂各有神主之而􅀕焉已非夏商以前簡畧忠質之事矣而彼世註家顧各以星當之何耶蓋星宿之名多出於緯書而先後鄭之說又自相牴牾固未可據以為信也此楊氏所以一歸於天與氣數謂四司之神如司春司夏之類不無見矣彼信繆忌之奏而祠㤗一以畫靈旗漢武帝信嘉慶之言而置九壇以祭貴神唐𤣥宗至有請隨貴神飛棊之方以定祭位者吾不知何說也雖然爲民請福無文咸秩寜有過立非執一隅推數於囘復候神於恍惚因方弭沴隨氣考祥則亦國家所不廢也由斯以言則非以民故而以徼福若所謂天子心獨喜其事秘者誠矯誣也哉本朝祀星辰風師雨師總論按本朝郊祀既設星辰二壇於上又有風雲雷雨之壇則亦不以風雨為星也周禮有風師雨師漢以丙戌日祀風師於戍地以己丑日祀雨師於丑地宋人兆風師於西郊祠以立春後丑日兆雨師於北郊祠以立夏後申日兆司中司命司禄於南郊祠以立秋後亥日以雷師從雨師之位以司民從司中司命司禄之位皆各壇為祭未嘗合而為一本朝於風雨雷之外又加以雲合為一壇以從獻於郊祀又為壇於郊壇之西每歳仲秋天子又躬祀焉其與並祀者太歳及五岳五積四海四瀆之神而以京畿山川四季月將京都城隍從享所謂太歳城隍月將與雲皆前代所未祀也夫雲興而雨霈既祀夫雨而獨遺雲可乎峙形於兩間者皆已享祀而流行於四時以司民耕作興作之候者而無其祭祀可乎名山大川遼絶於千萬里之外者既皆入於望祀而宸居所涖六宫百司三軍百姓之所居止者反遺之可乎此皆我聖祖之獨斷神見其視前代所祠九宫貴神之屬蓋有間矣祭寒暑􅀕法相近於坎壇祭寒暑也周禮籥章中春晝擊土鼓龡邠詩以逆暑中秋夜迎寒亦如之其禮逆暑以晝求諸陽也迎寒以夜求諸隂也此何以祭疏謂寒暑大甚祭以禳之寒暑頓以祈之理或然也然則茲祭也亦王者輔相調燮之一事歟祭六宗四方舜典類於上帝之下繼以禋於六宗曲禮言天子祭天地之下繼以祭四方則古帝王祭六宗四方之禮亞於天非小祀也但經傳不明言其神名目而先儒訓釋互有異同歐陽大小夏侯說尚書言六者在天地四方之間助隂陽變化實一而名六宗也孔光劉歆以爲乾坤六子水火雷風山澤也賈逵以為天宗三日月星也地宗三河海岱也馬融以爲天地四時也鄭𤣥以爲皆天之神祗星辰司中司命風師雨師也張髦以爲祖考所尊者六三昭三穆是也司馬彪歴難諸家自言已意則又雜合天地四方所宗諸神言之恐當從孔安國取祭法四時寒暑日月星水旱為凖况朱子書說非茍從也祭法有四方一祭此尚可疑楊氏有言舜典禋六宗在上帝之後山川之前其禮亦甚重因諸家之說不同而遂廢惜哉四方之祭註疏曲禮一條謂五官之神祭法一條謂山林川澤丘陵之神舞師一條謂四望之神大宗伯一條謂蜡祭四方百物之神月令一條謂四方五行之神諸說惟舞師帥而舞四方之祭祀謂四望也其說為近然又自有不同蓋四望者郊祀之後合四方名山大川之神而望祭之如左氏曰望郊之屬是也四方者四時各望祭於其方如天子祭四方歳徧諸侯方祀歳徧是也通而言之則皆可以爲望故曰其說為近又有謂昊天上帝合春夏秋冬為五天帝并地􅅘爲六宗者並存之以備考國朝郊祀總論蓋傳稱帝王之事莫大乎承天之序承天之序莫重於郊祀而孝經云孝莫大於嚴父嚴父莫大於配天斯二體者所以接天人之奥極仁孝之情非聖神莫能與也故曰毋輕議而况昭代之制裁成於太祖紹遵於列聖而飭新於世宗尤未易措論其間者也徃者皇上御極肇舉郊禋維時輔臣考據彜章列為圗說以獻曠然欲復合祀並配之舊折衷至當莫之能易矣而猶欲愽研經義參酌古今以佐大議之末斯豈管闚所能及哉請先述郊丘分合所繇而後論配享之同異焉蓋虞書言類上帝禋六宗望徧山川羣神而獨不及地祗類者萃合之名也祀上帝則地祗必在焉不稱地祗者所以尊上帝也此後言合祀者所繇昉與周禮大司樂冬日至地上圜丘之制曰禮天神夏日至澤中方丘之制曰禮地祗此言分祀者所繇昉與夫周頌昊天有成命小序以為郊祀天地周禮大宗伯以禋祀祀昊天上帝而不及地祗則周家固亦合祀矣若乃蒼璧黄琮四圭兩圭之類特其禮神之器數施於天地者不同而未可據爲分祀之證也後世所稱引者僅大司樂數語而胡宏吳澂已謂其刺謬非知禮之言矣又可深泥之哉漢氏而降大都主合祀者什六七而主分祀者什二三漢髙増秦畤爲五祀五帝自武帝以來並郊見泰畤於甘泉武帝又因幸汾隂立后土祠脽上然甘泉脽並在逺非都邑之郊也祀泰畤以正月后土以三月非二至之期也成帝建始中罷甘泉汾隂定南北郊於長安劉向深以為不可至光武竟採元始故事合祀天地於南郊漢志稱為圓壇八陛中又爲重壇天地位其上皆南鄉西上是也唐開元禮皇地祗於南郊合祭宋自建隆以来皆合祭元豐一議元祐再議紹聖三議訖主於合蓋分而不合者惟魏太和周建徳隋開皇唐先天宋元豐六年凡五見耳愚嘗究覧禮家聚訟之談主合祀者曰天包乎地地不可與天抗也曰天地如父母同牢而食不可以異位也主分祀者曰順隂陽辨時位各依象類以求之其指各有攸當愚以爲禮非從天降非從地出由人心生者也易不云乎乾稱乎父坤稱乎母王者君天下而爲之子崇母以抗父而判列為二非人道之經也使父母隔室而處邈焉南北非人情之順也揆之禮義合祀其正矣烏可局守類求之說猥云黷亂龎雜非事天地明察之道而訾之哉洪惟我太祖髙皇帝誕膺寳命爲神靈主有天下之初即建圜丘於鍾山之陽方丘於鍾山之隂每歳分祀天地行之數年雨暘未若洪應愆休乃斷自宸衷定爲合祀之制以十二年肇行於大祀殿其夕天宇澄霽星緯昭煥祥飈慶雲光彩􅂱煌若有蠁答於是親製樂歌以著明貺焉夫天地並祀有合食之親無分抗之迹得其順矣首春上辛先庻事而舉又三陽之月地天交泰得其時矣六宗山川羣神各爲壇以從祀合乎有虞肆類之典矣立兆國陽為屋而祭於卓哉精當明備丕天之大律也列聖祗循行之百六十餘年上帝鑒歆萬靈嘉饗休徴具歛祉福叢臻有由然哉迨我世宗肅皇帝中興建極擅百王禮樂之宗於時諸臣爭言新易制度以順上指遂改建南北郊分祀天地圜丘方丘之制掃地露拜之儀冬夏二至之期一遵周禮典章文物燦然改觀焉然周家以建子月為歳首祀天至午月乃祀地尚云適先後之宜我朝用夏正自夏徂冬則地先天祭越次而食矣且郊者祀天之名地不得而干也故兆於南郊禮文載之北郊之名乃匡衡軰縁飾緯書以對南郊非周禮所有也豈得盡為符合也哉蓋建議之臣泥司樂之隻辭而不察虞周之備典信建始之曲學而不考歴代之通行知聖祖初制當遵而不知分而復合是神謨淵識所裁為定禮而不可改也知存心錄備載儀章為可據而不知大祀文之訓明白嚴正不可忽也蓋世宗雖建立二郊而中世以後第行祈榖大饗於内殿圜方之祭竟不親舉豈非聖心亦有所未安俟後聖之更定者耶至於尊祖配天之禮古有以始祖配者周之后稷是也有以受命之君配者漢之髙祖是也夫配天以功徳而功徳孰大於開剏者則周之祀稷固明徳光靈之逺也而漢之祀髙祖非以崛起在位為帝者首乎有天帝各配者周以稷配郊又以文王配明堂漢以髙祖配郊又以光武配明堂是也有祖宗並配者唐垂拱開元以髙祖太宗配昊天宋至道以太祖太宗配圜丘是也夫廟壓於祖昭穆對向非嫌也郊壓於天祖宗序列非嫌也然則天帝各配者固章别之道也而祖宗並配亦何可以連袵接席議其非禮乎我太祖之始建郊仁祖配是周祀后稷遡本探源意也而成祖以太祖配則如漢奉髙祖崇功徳之特起矣仁宗以二祖配是唐宋所已行稱情而合禮者也世宗乃獨奉太祖配南北郊其祈榖之祭以成祖同配尋亦不行蓋始猶稍采郊祀宗祀之遺而終竟以父子相並為嫌矣夫成祖再造區夏奠鼎燕京駿徳豐功實同肇剏而推舉未至非褒前烈之禮也配享百餘年一朝而罷之非孔安是若之義也且今祈榖之祭釐正已乆而郊丘配位未復真甚闕典哉善乎輔臣之獻議曰歳一舉合祀奉二祖以並配遵太祖更定之制率列聖世守之規體世宗未安之情恊時宜順人心合禮典應經義上固已虚懐嘉納乆矣惟沛然下明詔諭中外博參之輿論而昭告之靈祗不過一潤色恢定間而可以迓睠顧之休隆繼述之績闡帝王之緒垂宇宙之模甚大美也何疑而不為乎圖書編卷九十六
