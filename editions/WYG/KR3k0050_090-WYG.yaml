石二升按洪武初天下田土八百四十九萬六千頃𢎞治十五年存額四百二十二萬八千頃有竒失額四百二十二萬八千頃有竒是宇内額田存者已失其半矣洪武十三布政司并直𨽻府縣人戸總計一千六十五萬二千八百七十戸人口總計六千五十四萬五千八百二十一口至嘉靖間戸總計九百九十七萬有零是昇平日久而人戸反縮於國初司國計者盍思其故哉古今戸口總數禹平水土為九州人口千三百五十五萬三千九百二十三周公相成王致理刑措人口千三百七十萬四千九百二十三周極盛之數西漢至孝平元始間民戸千二百二十三萬三千六十二西漢極盛之數光武中興至末年戸數僅及西都孝平時四分之一至桓靈永夀間更浮于孝平之世東漢極盛之數隋承周後戸三百六十萬平陳又收戸五十萬大業十八載至八百九十萬唐𤣥宗天寳十八載戸九百六萬三千憲宗元和時戸二百四十七萬三較天寳初十失其三宋祖開寳中天下主客戸三百九萬五百四仁宗嘉祐間主客戸一千二百四十六萬二千三百一十七國初洪武三年令中書省臣凡行郊祀禮以天下戸口錢糧之籍陳于䑓下祭畢收入内府蔵之十三布政司并直𨽻府州人口總計一千六十五萬二千八百七十戸人戸總計六千五十四萬五千八百二十一口戸口總論説者謂三代而上戸口盛於西北三代而下戸口盛於東南是矣然民數之多寡係於賦役之重輕而聖人之於民恒予之以休養生息之恩以致民生蕃阜之盛有以也後世乃多為之法以征其身庸調口賦日增月益又虐用其民而為鄉長里正者不勝誅求之苦各萌逃避之意於是版圖脱漏人如鳥獸飛走莫測而家以之乏國以之貧矣故胡寅論隋氏之耗不咎楊李而咎獨孤后天寳之耗不罪安史而罪楊大真李林甫元和之耗則又歸其獄於程異皇甫鎛之聚歛焉大扺田畆賦重則人争隠漏以逃賦欲蕃民生者惟薄賦可也李翺有言人知重賦之可以得財而不知輕賦之得財愈多可謂知本矣丁口之徭重則人争隠漏以避役欲增戸口者惟輕徭可也馬端臨有言庸調之征愈增則戸口之數愈减可謂通論矣州縣果得人以均其賦役戸口有不蕃盛者哉賦役版籍總論賦役稽版籍一歳㑹實徴十年攅造黃冊冊有丁有田丁有役田有租田曰官田曰民田凡二等租曰夏税曰秋糧凡二等丁曰成丁曰未成丁凡二等役曰甲役曰徭役曰雜役凡三等皆有力役有僱役計其丁糧為差國初天下田土總計八百四十九萬六千五百二十三頃零征科之數制為兩次夏税則納米麥四百七十一萬二千九百石外此復輸錢三萬九千八百錠絹三十八萬八千七百秋糧則納米二千四百七十三萬四百石外此復輸錢五千七百三十錠絹五千九百夫以田而責之以是賦以漢唐凖之似有過於重者殊不知漢唐之田賦雖輕而他賦則重我朝自兩徴之外而他無雜征况于茶課鹽雖前代所倚以侵漁者亦且從而罷之矣其後撥給親王功臣及土地肥瘠開墾災傷等項或增或减歳無常賦則是法雖有一定之則而斟酌之權未嘗不行乎其間也蘇州府一州七縣額田九萬頃歳徴糧二百七十萬帶耗其税糧三百五十萬淮安府兩州七縣額田十八萬頃歳徴糧三十六萬較農田之廣狭淮安加蘇州一倍較歳糧之徴輸蘇州加淮安十倍又松江府惟兩縣歳輸税糧一百二十萬北直𨽻八府一十八州一百一十七縣歳輸税糧亦一百二十萬以松江兩縣税糧視一百一十七縣税糧重輕懸絶如此彼蘇州之民何辜而受其苦哉因求其故蓋以賊虜張士誠伏誅其將帥叛臣亦從殱㓕田皆沒官故凡租税之重皆官田也今頑民埋隠官田以為巳業轉將瘠田詭為官税甚則詭曰水􅔐沙壓田去税存里甲賠累害愈不可言今已不早圖切恐民病霍韜曰天下農民之病自江而南由糧役輕重不得適均自淮而北税糧雖輕雜役則重夫雜役之重非其有益于國也如其有益于國不得已而重猶之可也今則縣有司人自為政髙下任情輕重在手大為民害如徐州雜役歳出班夫伍萬八千有竒歳出洪夫一千五百有竒復有淺夫閘夫泉夫馬夫等役洪夫一役銀十二兩統而計之洪夫之役歳費銀一萬八千有竒其餘各役不可究言也巳徐州之民僅二萬戸雜役如此民何以堪故徐州民年年拘役無一丁免者雖窮坊僻里僅育一人自隨亦歳辨役銀一兩是民病已極矣何不寛一分使民受一分澤乎浙江闔省糧役重輕之籍嘗為一櫝曰糧役冊將一省丁田糧先掲大綱後列條目年有定額櫝有定式民有定役官有定守賍汚官吏雖欲低昻其手以漁取于民不可得也豈非良法乎丁糧隠漏總論淮以北土無定畆以一望為頃欺隠田糧律條未之能行也江以南戸無實丁以系産為戸脱漏戸丁律條未之能守也洪武初年甫脱戰争人民凋殘戸一千六百五萬有竒口六千五十四萬有竒𢎞治四年承平久矣戸口宜蕃且息矣乃戸僅九百一十一萬視初年减一百五十四萬口僅五千三百三十八萬視初年减七百一十六萬此其故何也宜司國計者知所以處之矣周忱戸口論曰或投倚於勢豪之門而自㓜至長無復糧差或招誘於僧道之途而化縁財物遍逰四方冐名為匠則在南京者應天府不知其名在北京者順天府亦無其籍挈家于舟則四水土洋莫知踪跡冐隠買賣陶然無憂役法總叙役民者官也役於官者民也郡有守縣有令鄉有長里有正其位不同而皆役民者也在軍旅則執干戈興土木則親畚鍤調征行則負羈絏以至追胥力作之任其事不同而皆役於官者也役民者逸役於官者勞其理則然然則鄉長里正非役也後世乃虐用其民為鄉長里正者不勝誅求之苛各萌避免之意而始命之曰戸役夫宋唐而後下之任戸役者其費日重上之議戸役者其制日詳於是曰差曰雇曰義紛紜雜襲而法出奸生莫能禁止噫成周之里宰黨長皆有禄秩之命官兩漢之三老嗇夫皆有譽望之名士蓋後世之任戸役者也曷嘗凌暴之至極乎諸司職掌凡各處戸口毎歳取勘明白分豁舊管新收開除實在總數縣報於州州類總報之於府府類總報之於布政司布政司類總呈達本部立案以慿稽考仍每十年本部具奏行移各布政司府州縣攅造黄冊編排里甲分豁上中下三等人戸遇有差役以慿㸃差若有逃移者所在有司必須窮究所逃去處移文勾耿赴官依律問罪仍令復業洪武十四年詔天下府州縣編賦役黄冊以一百一十戸為里推丁多者十人為長餘百戸為十甲甲凡十人歳役里長一人管攝一里之事城中曰坊近城曰廂鄉都曰里凡十年一周先後則各以丁數多寡為次毎里編為一冊冊首總為一圖鰥寡孤獨不任役者則帶管於百一十戸之外而列於圖後名曰畸零冊成一本進戸部布政司及府州縣各存一本至二十四年奏准攅造黃冊格式有司先將一戸定式謄刻印板給與坊長廂長里長并各甲首令人戸自將本戸人丁事産依式開寫付該管甲首其甲首將本戸并十戸造到文冊送各該坊廂里長各將甲首所造文冊攅造一處赴本縣本縣官吏將冊比照先次原造黃冊查筭如人口有增即為作數其田地等項買者從其增添賣者准令過割務不失原額所㨿排年里長仍照黃冊内原定人戸應當設有消乏許於一百戸内選丁糧近上者補充圖内有事故戸絶者於畸零内補輳如無畸零方許於鄰圖人戸内撥補其上中下三等人戸亦照原定編排不許更改果有消乏事故有司驗其丁産從公定奪仍於各文冊前面本縣照依式様類總填圖所在有司官吏里甲敢有團局造冊科斂害民或將各䖏冩到如式無差文冊故行改抹刁蹬不收者許老人指實連冊綁縛害民吏典赴京具奏犯人處斬若頑民粧誣排陷者扺罪若官吏里甲通同人戸隠瞞作弊及將原報在官田地不行明白推收過割一槩影射减除糧額者一體處死隠瞞人戸家長處死人口遷發化外凡編排里甲務不出本都且如一都有六百戸將五百五十戸編為五里剰下五十戸分𣲖本都附各里長帶管當差不許將别都人口補輳其畸零人戸許將年老殘疾并㓜小十歳以下及寡婦外郡寄莊人戸編排若十歳以上者編入正管且如編在先次十歳者今已該二十歳其十歳以上者各將年分逺近編排候長一體充當甲首其有全種官田人戸亦編入圖内輪當凡冊式内定到田地山塘房屋車船各項欵目所在有司有者依式開冩無者不許虛開若類縣總都總收除項下止除開冩人丁事産總數不必備開花戸其州縣將各里文冊類總填圖完備仍依定式將各里人丁事産攅造一處另造類冊一本於内分豁各鄉都人丁事産總數正官首領官吏躬親磨算查對相同於各里并本州縣總冊後書名畫字用印解赴本府其提調正官首領官吏於各州縣造到文冊躬親檢閲磨筭相同本府依定式另造總冊一本於内分豁各州縣人丁事産總數并州縣造到各項冊後一體開冩年月書名畫字用印直府州本府委官一員率各州縣提調造冊官吏親齎其布政司所轄府州仍申解布政司本司官吏躬親檢閲磨筭相同依式類造總冊一本於内分豁各府州人丁事産總數於各府州造到總冊後填冩年月書名畫字用印委官一員率各府州縣官吏親齎俱限年終進呈凡菴觀寺院已給度牒僧道如有田種者編入黃冊與里甲納糧當差於戸下開冩一戸某寺院菴觀某僧道當幾年里長甲首無田糧者編入帶管畸零下作數凡黃冊字様細書大小行欵髙低照坐去様式面上鄉都保分等項照式刋刻印不許用紙浮貼其各州縣毎里造一冊本進呈冊用黃紙面布政司府州縣冊用青紙面又令各處布政司及直𨽻府州縣并各土官衙門所造黃冊俱送戸部轉送後湖收架委監察御史二員戸科給事中一員戸部主事四員監生一千二百名以舊冊比對清查如有戸口田糧埋沒差錯等項造冊徑奏取㫖授時任民附一嘉靖九年十月内戸部題該吏部尚書武英殿大學士桂奏為授時任民事臣聞大聖人御極九功之徳皆可歌者以有實政與時偕行耳今考之夏小正月令時則諸書可槩見矣至於分地任民所以體國經野使民業生業均平如一則古法雖廢而州縣域民尚有鄉都村鄙之圖其經界俱可修復是均平任民之意固未冺也然學士大夫不講久矣漢晉以來諸儒雖有其説輒不遇聦明睿智首出庶物之君以行之於是金木水火土榖正徳利用厚生之功千有餘年幾墜地矣兹者適當貞元㑹合之期陛下以天縱之徳入繼大統宵衣旰食凡事不蹈故常必上律天時下襲水土聿新一代之制比隆於堯舜矣乃即位之九年親率百官躬耕帝籍大修九功之徳崇萬化之源務為實政而不徒為儀觀也天下信之矣臣待罪輔臣何幸躬逢其盛顧以足痿不能與分百執事一日之勞而贊襄之心不能自己謹力疾思索實得二事一曰授時考妄意編之蓋以便百官下僚之檢閲豈能不為知言者誚乎竊自以為之猶賢乎巳之類也若夫法天地之道允執厥中以立甄陶萬化之本則在陛下所自得於敬一之功有以直造天徳而臣下實不能賛襄者也今所編授時任民二書各裝成二冊一留御覧一乞下之該部以備采擇等因清圖一嘉靖九年十月内戸部題該學士桂奏為授時任民事臣考圖者今之黃圖故謂之板亦謂之方儀禮注云百名書於方以方板濶大可以曲折畫圖周禮地訟正以圖即謂是也與籍大叚不可合故古人止用圖以證地訟所謂地訟地之無民照對者乃奸人飛詭之源也我祖宗朝屢頒下田不出圖戸不出鄉之禁以防飛詭然州縣村落有大小人戸聚散無定居故硃紅流水魚鱗等冊雖詳而該圖之中大則山川道路小則人戸里巷之總凡經界大政因以反畧即終不能合于籍冊所以不久隨廢蓋不知古人立圖與籍實是兩事林勲本政書作圖之法以田為母以管業人戸為子蓋不照籍冊所登地方以為慿㨿人戸雖有逃亡土地只在本處是正地訟切要法也故今欲清圖惟在以各縣地方通融紐筭分為幾圖其散漫山坂人少地荒去處又以近分属各圖東西相准南北相照立為封界記定四至約其頃畆總數實寫管業辦糧係某處人戸于上因以立保甲比追胥别為一圖不必强同籍冊等因該本部㸔得圖者地圖也所以圖其地畆坐落之形委與黃冊不同洪武二十年覈實天下地土其兩浙等處富民多畏避差役詭寄田産遣監生徃丈之畫圖編號悉書名為魚鱗圖冊以備查考今本官奏欲清圖合行各該撫按官酌處施行清籍一嘉靖九年十月内戸部題該學士桂奏為授時任民事臣考籍者今謂之黃冊古謂之冊冊者策也以行簡編此以殺青書謂之冊儀禮注云不及百名于冊為其條小止可計數周禮民訟正以地比即為是也與板圖大叚不可合故古人止用地比以正民訟是民與地之有照對者不能作飛詭之弊者也我祖宗當時方欲寛鄉徙田窄鄉徙民又因為與前圖畫不合所以均平里甲之政反為之妨蓋不知均里甲正在通融各鄉村落不當為地圖限定者也等因該本部看得籍者冊籍也所以籍其丁産多寡之數委與地圖不同我朝十年攅造一次名為黃冊前列里甲格眼後開人戸丁産税糧分别舊管新收開除實在巳是定規本官奏稱今欲清籍不過照見冊追究逐年所以飛失田土人戸之故則寄居揑荒田土盡出投首深為有補合行各該巡撫官查照施行攅造一嘉靖九年十月内戸部題該學士桂奏為授時任民事内稱地圖既清里甲差役毫釐不均無所逃矣乃毎十歳攅造之時通將該州該縣有若干圖分限田限丁而均𣲖之十年之後消長不一則下之凡一里甲有比衆田不及一頃以上人不及十丁以上則以有餘者附益有比衆田增至一頃以上人增至十丁以上則聴不足者收補今止為造定格冊内前遂妄指為版圖不可更易只以舊管新收開除實在以括之反因是毎十年為奸猾飛詭一次嘉靖元年臣治成安時正改造黃冊未定臣即不拘舊定屯社之圖不拘軍五不分戸之例一以均里長之丁産甲首之多寡為事即一時之地土廣畆小畆人人願均而有司舊日之偽增戸口人人願改去其詭揑名字一十一屯社事定而人心大悦乃於黃冊之外别作一圖名曰人戸歸圖冊與黃冊判而為二其今之黃冊則名曰地土歸戸冊以相㕘對甫成臣又妄意以為圖籍既正里甲既均遂旋可以查舉世業田以牽聨族属者别處口分田以廣惠困窮矣臣思今之族大者就其家抽出世業田隠然有宗于收放之意無難舉者若口分田則當别為一制不必依倣唐法只將自後沒官田土分給州縣無田窮困之民毎十年一計口分之田或有流移死絶復入於官等因該本部㸔得各該州縣毎里額設里長十名甲首各十名輪年應役但毎里各甲丁田多寡不一十年之間人戸消長不齊必須攅造之年通融審𣲖然後賦役得均而無偏重之患合行各該撫按官查照施行軍匠開戸一嘉靖九年十月内戸部題該學士桂奏為授時任民事臣考近來有上匠不許開戸之例蓋為軍匠逃亡事故而設邇來軍戸有原不同戸而求告合戸者又有串令近軍同姓之人投告而合戸者匠籍亦然於是軍匠有人及數千丁地及數千頃輙假例不分戸為辭於是里長甲首人丁事産不及軍匠人戸百分之一其法止當不分軍民匠􅍳等籍限田限丁將州縣人戸事産通融總筭一體分戸等因該本部查得大明㑹典内一欵凡軍戸子孫畏懼軍役另開戸籍或於别府州縣入贅寄籍等項及至原衞發冊清勾買嘱原籍官吏里書人等揑作丁盡戸絶回申者俱問罪正犯發烟瘴地面里書人等揑作丁盡戸絶發附近衞所俱充軍官吏㕘䆒治罪今本官奏要將州縣人戸通融總筭一體分戸蓋欲同籍則承軍伍之役分戸則應里甲之差今如湖廣之垜籍山東之分開審差是矣合行各該撫按官查照施行新增田地一嘉靖九年十月内戸部題該學士桂奏為授時任民事臣按禹貢有作十有三載乃同之規周官有一易再易之令今師其意而施之於新增田土即勸民開墾資給事故田産之大法也大扺兩山之間必有深川濵海之土必有高岸故深川為陵谷滄海化桑田自古已然所以新增之産所得率不能補所亡也合無今後新增事産通查照𢎞治年間凡新漲洲田别立一冊謂之白冊陞科事例當法周禮之制則以二畆或三畆視一畆當法禹貢之制則計成熟之久者與不易之産同科等因該本部查得毎年㑹計夏税秋糧俱照原額分𣲖各省府徴納若有新增續認一體查照徴收遵行已久但各處臨湖邉江濵海田地東灘西漲彼長此消名曰新增實非舊額昔尚書王恕曾巡撫蘇常等將此等錢糧不入黃冊另作白冊以補小民包賠之數意蓋如此等因覆奉欽依合行各該撫按官查照施行寺觀田土一嘉靖九年十月内戸部題該學士桂奏為授時任民事内稱見今荒廢寺觀俱無僧行住持田産多為人侵占逐年失陷税糧賠累里甲官府清查又無人照對合無出榜召人報勘納價改正登冊等因該本部查得賦役黃冊事例一菴觀寺院已給度牒僧道俱要遵舊例有田糧者俱要編入黃冊同里甲納糧當差無糧者編入帶管畸零今本官乞要出榜召人報勘納價改正登冊承納税糧相應查處等因覆奉欽依合行各該撫按官通行所属查勘寺觀田土但有荒廢寺觀無僧行住持及遺下田産無人管業逐一清查見數各照彼中時價召人承買改名入冊辦納糧差不許勢豪用强侵占及因而减價承買違者從重㕘究治罪編審徭役一嘉靖九年十月内戸部題該學士桂奏為授時任民事内稱黃冊既均毎州縣必以人丁事産通融分為十分一年一分輕重均施而不照黃冊𣲖定年分又各通造一冊總於各府各府又以各州縣丁産計差畫一均施之以令州縣編𣲖又各府以申布按二司二司又㑹同以一省所属合起徭役通融如府之視州縣則一省通無不均之嘆矣且優免等則又重擬定而一例行之等因該本部㸔得各處編審徭役各驗冊内丁口田糧定立等第科差遵行已久但各甲丁糧多寡不一者得以衆輕易舉少者不免增益取盈委有不均之嘆合將十甲丁糧總於一里各里丁糧總於一州一縣各州縣丁糧總於一府各府丁糧總於一布政司布政司通將一省丁糧均𣲖一省徭役内量除優免之數毎糧一石編銀若干毎丁審銀若干勘酌繁簡通融科𣲖造定冊籍行令各府州縣永為遵行其外官吏監生生員之家例應優免雜泛差役查得大明㑹典洪武十三年令六部都察院應天府兩縣判録司儀司行人司隨朝官員除本戸合納税糧外其餘一應雜泛差役盡免正統元年令在京文武官員之家除里甲正役外其餘一應雜泛差役俱免又查得先為優免事該錦衣衞百戸趙鏜告該本部議擬將錦衣衞隨朝官員比照優免内臣事俱量其官職品級將各戸下雜泛差役指揮三丁千戸衞鎮撫免二丁百戸所鎮撫免一丁著為定例等因嘉靖四年三月二十六日具題奉聖㫖内官内使戸内照文職例優免錦衣衞指揮免七丁千戸五丁鎮撫百戸三丁欽此以上事例建議紛紜委無定則其京官不拘品秩崇卑一槩全戸優免此乃祖宗優待常朝官員極為隆厚延今一百六十餘年官属衆盛差役浩繁科𣲖益頻民力日困加以鄉里親戚詭寄夤縁里書畏勢奉承有司莫敢窮詰致將濫免之數一槩加𣲖小民且京官品級本有崇卑而事産人丁自有多寡必須立為限制庶可允塞弊源合無除錦衣衞指揮千戸鎮撫百戸奉有前項欽依外京官一品免糧二十石丁二十丁二品免糧十八石人丁十八丁三品免糧十六石人丁十六丁四品免糧十四石人丁十四丁五品免糧十二石人丁十二丁六品免糧十石人丁十丁七品免糧八石人丁八丁八品免糧六石人丁六丁九品免糧四石人丁四丁内官内使亦如之外官各减一半教官監生舉人生員各免糧二石人丁二丁雜職省祭官承差知印與吏典各免田糧一石人丁一丁其丁多而糧少者則以丁凖糧丁少而糧多者則以糧凖丁戸内丁糧不及數者止免實在之數俱以本戸自己丁糧照數優免但有分門各戸疎逺房族不得一概混免以啟詭寄之端覆奉欽依通行各省所属一體遵守違者從重各治以罪朱熹井田類説一嘉靖九年十月内戸部題該學士桂奏為授時任民事内稱朱熹井田類説夫天地土者天下之大本也春秋之義諸侯不得專封大夫不得專地今豪民占田或至數千百頃富過王侯是自專封也買賣由巳是自專地也孝武時董仲舒嘗言宜限民田至哀帝時乃限民占田不得過三十頃雖有其制率不能施然三十頃已不平矣且夫井田之制宜於民衆之時地廣民稀勿為可也然廢之於寡立之於衆占地既富列在豪强者率而歸之並起怨心則生紛亂而制度難行由是觀之則髙帝初定天下及光武中興之後人民稀少立之易矣就下悉備井田之法宜以口數占田為立科限民得耕種商得買賣以贍貧弱以防兼併且為制度張本不亦宜乎雖古今異制損益隨時然綱紀大畧其制一也書曰天秩有禮天罰有罪故古聖人因天秩而制五禮因天罰而制五刑建司馬之官設六軍之衆因井田而制軍賦於是有司馬之法車徒干戈素具春振旅以蒐夏拔舍以苖秋治兵以獮冬大閲以狩於農隙講武事焉此一王於任民而立賦足兵之大畧也臣家食時常作周禮師田圖亦頗講求大意竊謂農兵學校只是一事古之帝王深知之所以陞官有統而條目不致纎瑣等因該本部查得先該本官奏要分豁災傷田租里甲官銀及稱北方之土有廣畆小畆之異南方之糧有輕則重則之殊何者如今江西湖廣等處州縣以村分里甲也直𨽻河南等處州縣以社分里甲也祖宗朝以北方民少地多乃遷山陕等處無田之民分屯其地故又以屯分里甲當時社民占地頃畆甚廣屯民後至頃畆甚狭故屯地謂之小畆社地謂之廣畆北方之民所甚怨於不均者大壊成則而禹貢不同故也然厯朝因革不常乃有土地雖同而科則甚異者矣然於抄沒之産當時追收籍冊即因民間所收客租之糧謂之官糧及轉賣多年無復辨驗以致糧重人戸逃亡負累里甲賠納此南方之民所甚怨不均者也夫親民事者貴得其情舉古法者在師其意臣治湖州府武康縣時嘗查成化年間節該奏行田糧事例官為一則民為一則申府而該府七州縣行之屢年民甚稱便今蘇松常鎮杭嘉等府州縣莫不欲如湖州府者臣治廣平府成安縣時嘗查奏行事例將屯社之地地糧頃畆一其科差行之縣民亦稱便而該府八縣莫不效之至今北直𨽻河南山東附近各州縣又莫不欲如廣平府者然南北分郡皆有官豪之家阻之故也夫北方官豪之家欲獨享廣畆之利不肯為屯民分糧南方官豪之家欲獨出輕則之糧不肯為里甲均苦等因奏奉聖㫖覧卿所奏皆恤民周治之意分豁里甲災傷二事戸部斟酌可否議處了來説務要經久利便分南北糧土一事版籍已定罷欽此欽遵隨該本部將分豁災傷里甲二事斟酌議擬題奉欽依備行漕運衙門及各該巡撫御史議處具奏定奪去後今本官條陳以上清圖等七事而復申以宋儒朱熹均井田之説一皆古人良法美意致治保民之道但已有前㫖本部擅難别議等因民數總論徐偉長中論曰夫治平在庶功興庶功興在事役均事役均在民數周民數周為國之本也先王周知萬民衆寡之數乃分九職焉九職既分則劬勞者可見勤惰者可聞也然而事役不均者未之有也事役既均故上盡其心而人竭其力焉然而庶功不興者未之有也庶功既興故國家殷富大小不匱百姓休和下無怨疾然而治不平者未之有也故泉有源治有本道者審本而已矣故周禮孟冬司冦獻民數于王王拜受之登于天府内史司㑹冡宰貳之其重之也一是今之為政者未之知恤已也譬猶無田而欲樹藝雖有農夫安能措其强力乎是以先王制六鄉六遂之法所以維持其民而為之綱目也使其隣比相保愛賞罰逓延及故出入存亡臧否順逆可得而知也及亂君之為政也戸口漏于國版夫家脱于聨伍避役逋逃者有之於是奸心競生而偽端並作小則濫竊大則攻刦嚴刑峻令不能救也民數者庶事之所自出也莫不取正焉以分田里以令貢賦以造器用以制禄食以起田役以作軍旅國以興典家以立度五禮用修九刑用措其惟審人數乎丁糧總論戸口稽于版籍毎十年而覈其盈縮登其數于留守付其冊于戸部制非不宻矣然飛詭虚懸致丁匿糧耗富者享無糧之田貧者納無糧之税甚則流移倒絶攤及他里將并其所存而逼之使逃矣故丘文莊有配丁田之法并取李渤攤逃之議也但貧富異齊而必以丁配田則强人以不能而禁人以必致賦役有額而漫無補則丁在而偽逋戸存而偽絶不可不慮也故不若質劵以稽産富而田多者准丁上其則貧而丁多者准糧下其等按籍以察逃産存則責里甲以代輸産亡則覈業主以入甲又嚴處寄洒之奸豪曲招流移之窮餒庶其有實數乎不然均審之檄徒勤查造之冊徒浩無益也役法總議役民者官也役於官者民也郡有守縣有令鄉有長里有正其位不同而皆役民者也在軍旅則執干戈興土木則親畚鍤調征行則負羈絏以至追胥力作之任其事不同而皆役於官者也役民者逸役於官者勞其理則然然則鄉長里正非役也後世乃虐用其民為鄉長里正者不勝誅求之苛各萌避免之意而始命之曰戸役矣宋唐而後下之任戸役者其費日重上之議戸役者其制日詳於是曰差曰雇曰義紛紜雜襲而法出奸生莫能禁止噫成周之里宰黨長皆有禄秩之命官兩漢之三老嗇夫皆有譽望之名士蓋後世之任戸役者也曷嘗凌暴之至此極乎一條鞭法一條鞭法者通府州縣十歳中夏税秋糧存留起運額若干均徭里甲土貢顧募加銀額若干通為一條總徴而均支之也其徴收不輸甲通一縣丁糧均𣲖之而下帖于民備載十歳中所應納之數于帖而歳分六限納之官其起運完輸若給募皆縣官自支撥蓋輸甲則逓年十甲充一歳之役條鞭則合一邑之丁糧充一歳之役也輸甲則十年一差出驟多易困條鞭令毎年出辨所出少易輸譬則千石之重有力人弗勝分十人而運之力輕易舉也諸役錢分給主之官承募人勢不得復取嬴于民而民如限輸錢訖閉戸卧可無復追呼之擾夫十年之輸一兩固不若一年一錢之為輕且易也人安目前孰能歳積一錢以待十歳後用者又均徭之法通州縣徭銀數不可得减而各甲丁糧多寡勢不能皆齊丁糧多則其年𣲖數加輕丁糧少則其年𣲖數加重固已不均而所當之差有編銀一兩而止納一兩者有加二加三加四五六者有倍納四五倍七八倍者甚且相什伯則名為均徭實不均之大者今合民間加納之銀俱入官正𣲖之數均輕重通苦樂于一縣十甲之中役人不損直而徭戸不苦難固便如金銀庫革定名徭編之舊照司府例納銀為募人工食費止令巡守不與支收其支收委之吏則毫末承禀于官需索者不得行而誅求者自斂又以時得代不久苦查盤吏有身役固不得竊庫銀而逃倉中斗給于舊有募充親充償所耗固當而募人為㸔守其耗折亦徭戸自償彼守而此償適教之使盗也今募吏充歳加脚費而折耗責之勢不敢自盗又年終而更無歳久浥爛之憂又甚便諸逓運夫馬俱官吏支應勢不得多取即用之不敢溢諸利弊不可悉道其大都徴附秋糧不雜出名目吏無所措手人知帖所載毎歳並輸可省糧長收頭諸費利固不可勝矣通計里甲均徭驛傳民兵計合用銀𣲖之名四差皆視戸丁糧為差次久之民相安而享其利也江西差役事宜附按惟均徭之法十年一役計丁驗糧戸分等則行之已久誠為均平無累然法久弊生名為均徭實有不均之患毎歳徭銀原有定額而各甲丁糧多寡懸外其年丁糧多則𣲖銀少而役輕丁糧少則𣲖銀數多而役重其弊一也所編之差有正銀一兩而止納一兩者此必勢豪夤縁者得之有加至一二倍者以至數十倍者此必平民下戸無勢力者當之此患在不均其弊二也北方則門丁事産四者兼論南方則偏論田糧糧多差重則棄本逐末以致田日賤而民日貧其弊三也糧多殷富之家平日則花分詭寄以圖輕差及至審編則營求賄嘱以脱重差其弊四也歳歳審編公門如市官吏開賄賂之門里胥恣索騙之計其弊五也丁糧編剰利歸於官小民不蒙輕减之恵其弊六也有此六弊小民困累巳甚且應直之年役重費繁力不能勝大抵人情皆安於目前既不能預積十年之費以待一年之輸是以一年當差即九年未得蘇息而傾家蕩産者相比也及查均徭規則原分銀力二差銀差内如各官柴薪馬丁儒學齋膳夫先年俱坐員審編以致貪婪有司故將殷實人戸自行坐占困而加倍徴收漁獵無厭如兩京㑹同館并山東保定等處馬價則以地方隔起有司不肯一體追徴以致經年逋負不得以時起解濟用此銀差之弊也力差内如府州縣斗庫及各騙廪給庫子則賠費不貲門皁防夫禁子弓兵等役皆編徭戸姓名募人代當則抑勒需索水馬機兵等役則又編頭戸貼戸以數十戸朋為一役募役則給由帖取討工食窮鄉下邑之民不能抗城市積年之勢力戸被擾鷄犬不寜其害尤甚此力差之弊也弊多而法疎則民害滋甚愚擬將各項差役逐一較量如力差則計其代當工食之費因勞逸而量為增减如銀差則計其折解交納之費因難易而加以贈耗通計一歳用銀若干止照丁糧編𣲖開載各戸由帖立限徴收如徃年編某為某役某為頭戸某為貼戸今一切革之其有丁無糧者必係下戸止納丁銀有丁有糧者必係中戸及糧多丁少與丁糧俱多者必係上戸俱照丁糧併納審如是則貧富不待審編而自定徭差不得避重而就輕其銀一完則終歳無追呼之擾而四民各安其業使輕重通融於一縣苦樂適均於十甲是亦調停之一術也一革坊里惟州縣設有坊里輸年應差乃庶民徃役之義自勾攝公事催辦錢糧之外無他事也柰何有司不加體恤凡祭祀宴饗造作供帳饋遺夫馬百爾費用皆令坊里直日管辦坊里又坐𣲖於甲首費出無經以一科十閭里騷然日見凋敝如病嬴之人不少休息將無囘生之望愚以為今日所急在於革坊里在於定經費凡歳用所需舊係坊里自行出辦者今皆𣲖徴銀兩貯之官庫如鋪陳傘轎幕次器用等項應預先置造者祭祀鄉飲賔興上司支應等項應臨時買備者修理衙門工料應臨時估計者接逓夫馬應預先雇募臨時撥發者莫非有司之事掌印官為之經紀扣筭實用數目責令該吏照所司分管隨下給銀登記支銷其買辨役使之人即於𨽻兵内輪𣲖應用與坊里絶無干涉自規則之外不許妄用自歳徴之外不許加𣲖其前項經費仍置立稽查格冊毎季赴撫按院道衙門查覈如果支用有餘作正支銷如果事出不經支用不敷亦聴各該州縣於原編備補銀内支銷如此一州一縣咸有經常之用既不失之苦節廢禮而妨事而坊里輪年應役亦可無額外誅求之累矣一定𣲖則查得本省各項差徭自嘉靖二十八年該前任巡撫都御史張酌定賦役總㑹文冊内開南北京庫漕運本折米銀起運存留宗藩司府倉米皆出於糧戸口食鹽起存錢鈔則出於丁惟里甲均徭丁糧兼𣲖里甲一丁折米一石均徭二丁折米一石及查各該州縣有以粮獨編驛􅁟有以丁糧配編民兵有以丁折米獨編民兵全不編驛傳者各因丁糧之輕重而為調停以免偏累民已相安相應查照舊規通融兼𣲖其戸口食鹽起存錢鈔近年奉例隨糧帶徴但查鹽鈔二項係是丁差若仍前隨糧帶徴則畸零小戸不無煩擾合行改正仍照丁口徴納及照田糧有沙陷人丁有逃絶若不為之查處則糧差無從徴納里遞不免包賠議將沙逃田糧除舊額并沙陷無蹤原經奏准免𣲖起運止𣲖存留司庫者里遞均攤輸納外其有舊雖沙荒今已開墾久已迷沒今曾清出或本管里長并各勢豪包占影射者即於得業人戸名下追收花利以扺糧差不得槩及通圖如妄揑沙逃無㨿者與實糧一例包差至於逃絶人丁原額註於實徴冊内有㨿者照舊免編外其新開逃絶遽難槩免合照不成丁則例比實丁减半編差各州縣四差人丁原額折筭多寡悉從其舊若有投托勢要隠避差役及脱漏戸口者許諸人首告將本犯名下罪銀充賞凡有清出丁口并逃戸復業一面增入逐年格冊一例𣲖徴仍候造冊之年將徴黃二冊改正如此庶丁糧𣲖則既定而妄揑欺隠之弊悉除小民永無偏累矣一僉糧解照得夏秋税糧有起運存留有本色折色收解之役名為糧長各該州縣有一年一審編者有三年五年間一審編者止是僉報殷實人戸原不輪年分甲毎遇審編之期勢豪大戸夤縁規避坊里僉報索騙百端身未應役而所費已不貲矣官府不得已而為一切茍且之計或以數人而一充一名或令一身而包管合戸閭里騷然息肩無日包攬者得肆侵欺貧難者苦於賠貱一充此役鮮不破家此皆民間至苦極累事也查得大明㑹典洪武二年令天下有司度民田以萬石為率設糧長一名專督其鄉賦税十五年革罷糧長徴收令里長催辦十八年復設糧長是糧長之設或編殷實或輪里甲皆我祖宗舊制合無將各里排年管催本里人戸税糧聴其自行輸納米入官倉以管糧官典收銀入官庫以掌印典收查照舊規應用領解糧役幾名就於經催中審其丁糧近上家道殷實者僉定名數責令管解糧米有搬運脚耗之費折銀有秤收火耗之費俱於𣲖則内酌量加徴當官給發以資其用免其獨力賠補是十年之中不過輪役一年縱有一年之勞得享九年之逸况以本管里長催徴本里人戸事勢尤為順便庶幾祖制里甲催辨之意而審編之弊可杜矣一處解運查得兑軍兑淮南京各本色糧米及各項折銀俱係府州縣管糧官押經收人役交納縱有掛欠侵欺其弊立見追賠易完以有官統之稽查便也其歳𣲖南京本色棉苧布疋舊規原係糧役經解以致棍猾攬泊侵欺動以萬計且將麄疎布疋扺數解納驗不中式大半駁囘節經該部開催竟無完報其起解南京各項折色如新例及江濟二衛水夫馬舡工料銀兩㑹同館馬價各衙門柴薪皂𨽻等銀毎差解戸逐項轉解以致中途花費侵欺或掛欠而囘經年批單不獲上為國用所關下為各役身家所係豈可襲循舊弊而不為之處合無將南京布疋順委部運南糧官帶解北京布疋各府類總委官押解南京各項銀兩務照北京事例凡係原差解戸自解者俱解布政司收貯委官類解嚴限掣批囘銷庶可杜侵欺掛欠之弊周禮鄉師遂師州長黨正族師里宰鄙師旅師閭胥比長主徴六鄉賦貢之税秦漢之制十里一亭亭有長十亭一鄉鄉有三老有嗇夫有游徼三老掌教化嗇夫聴訟獄收賦税游徼循禁盗賊唐五百家為鄉設鄉正一人百家為里設里長一人掌戸口課植農桑檢察非為在邑居者為坊正掌坊門管籥督察奸非在田野者為村正責與坊同宋以里正戸長鄉書手課督租賦以耆長壯丁逐捕盗賊其後乃有三等衙前及承符人力手力散從祇候之役惟鄉戸衙前之役為最重或主典倉庫或輦運倉物徃徃至於破産故皇祐中禁役鄉戸為衙前令募人為之至熈寜又有保甲之法至寳慶又有義役之法元坊設坊正里設里正都設主首専以催輸税糧追會公事國朝洪武十四年創編賦役黄冊以一百一十戸為一圖選其糧多者十戸為里長餘百戸為甲首十年輪役催辨錢糧追攝公事亦猶秦漢之里魁亭長唐宋元之坊正里正也選坊里中年高有徳者為老人給以教民榜文主風俗詞訟猶所謂三老也設糧長以追收二税猶所謂嗇夫也故總甲小甲覺察非常猶所謂游徼也是十年之正役也今諸上供公費出於田賦之外者皆目之曰里甲蓋言闔縣里甲所當任也而又有十年之雜役焉曰力差曰銀差皆里甲丁田之自出也而又有民兵焉有夫馬焉夫馬以代本色之郵􅁟而他衝繁水陸之驛又有恊濟之𣲖焉一以里長丁糧均攤取給夫邦國之用固不可已也而歳增一歳如丁田之有限何征役考小司徒之職乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役無過家一人以其餘為羡饒也鄉大夫以歳時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以歳時入其書作文書入于司徒遂大夫以歳時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者均人掌均人民牛馬車輦之力政讀為征凡均力政之歳上下豊年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉司民掌登萬民之數自生齒以上皆書于版章氏曰三代役法莫詳于周周禮伍兩軍師之法此兵役也師田追胥之法此徒役也府史胥徒之有其人此胥役也比閭族黨之相保此鄉役也有司徒焉則因地之美惡而均役有族師焉則校民之衆寡以起役有鄉大夫焉則辨民之老少以從役有均人焉則論歳之豊凶以行復役之法按所謂書于版者即前代之黃冊今世之黃冊也我朝毎十年一大造黃冊凡例有四曰舊管曰新收曰開除曰實在今日之舊管即前造之實在也毎里一百一十戸一戸一甲十甲一里里有長轄民戸十輪年應役十年而周周則更大造民以此定其籍貫官按此以為科差誠有如徐幹所謂庶事所從出而取止者也然民偽日滋吏弊多端茍非攅造之初立法詳盡委任得人則不能禁其脱漏詭寄飛走那移之弊矣秦用商鞅之法月為更卒謂給郡縣一月而更卒已復為正正卒謂給申都官者一歳屯戍一歳力役三十倍于古漢興循而未改漢髙祖初為筭賦賦錢人百二十為一筭馬端臨曰古者有田則税之有身則役之未有税其身者漢法民年十五而筭出口賦至五十六歳而除二十而傳給繇役亦五十六而除是税之且役之也唐制凡天下戸口其資産升降定為九等三年一造戸籍凡三本一留縣一留州一送戸部用人之力歳二十日閠加二日不役者日為絹三尺謂之庸有事而加役二十五日者免調三十日者租調皆免通正役不過五十日宋以衙前主官物即今庫子斗級納戸解戸以里正戸長鄉書手課督賦税即今里長甲首老人以耆老弓手壯丁追捕盗賊即今弓兵民土以承符人力手力散從官給使令即今皂𨽻禁子縣曹司至押録州曹司至孔目官下至雜職虞候揀搯等人即今稱子舖户各以鄉户等第定差此宋初役法也凡當役人戸以等第出錢名免役錢其舊無色役而出錢者名助役錢用足又率其數增取二分以備水土欠闕謂之免剰錢此寕熈免役法也其議始於韓降成於王安石司馬光言免役之法其害有五請罷之邵伯温曰吳蜀之民以顧役為便秦晉之民以差役為便吕中曰司馬光主差役王安石主顧役二者利害相半因其利而去其害皆可行也按二法實相資以為用也夫自古力役之征貧者出力富者出財各因其有餘而用之不足者不强也各隨其所能而任之不能者不强也彼有力者而無財吾則俾之出力財不足者人助之彼有財者而無力吾則俾之出財力不能者人代之若夫事鉅而物重費多而道遠則必集衆力裒衆財使之運用而不至於頓躓資給而不至於困乏則民無或病事無不舉矣且農夫遂耕穫之願官府得使令之給而亦可以收市井㳺手之徒一舉三得也自三代至宋末役法總論按差役古法也其弊也差役不公漁取無藝故轉而為雇雇役熈寜之法也其弊也庸錢白輸苦役如故故轉而為差差役中興以來江浙諸郡民戸自相與講䆒之法也其弊也豪强専制寡弱受凌故復反而為義蓋以事體之便者觀之雇便於差義便於雇至於義而復有弊則末如之何也已竊嘗論之古之所謂役者或以起軍旅則執干戈冐鋒鏑而後謂之役或以營土木則親畚鍤疲筋力而後謂之役夫子所謂使民以時王制所謂歳不過三日皆此役也至於鄉有長里有正則非役也柳子厚言有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子然則天子之與里胥其貴賤雖不同而其任長人之責則一也其在成周則五家設比長二十五家設里宰皆下士也等而上之則為閭胥曰鄼長皆中士也曰旅師曰鄙師皆上士也曰黨正曰縣正皆下大夫也曰州則中大夫也周時鄰里鄉黨之事皆以命官主之至漢時鄉亭之任則毎鄉有三老孝弟力田掌勸道鄉里助成風俗毎亭有亭長嗇夫掌聴獄訟收賦税又有游徼掌巡禁盗賊亦皆有禄秩而三老孝弟力田為尤尊可與縣令丞尉以事相教復勿繇戍嘗以歳十月賜酒肉或賜民爵一級則三老孝弟力田必一級賜民帛一疋則三老孝弟力田必三疋或五疋其尊之也至矣故戾太子得罪而壺關三老得以言其寃王導為郡而東郡三老得以奏其治狀至於張敞朱博鮑宣仇香之徒為顯宦有聲名然其猷為才望亦皆見於為亭長嗇夫之時蓋上之人愛之重之未嘗有誅求無藝迫脅不堪之舉下之人亦自愛自重未嘗有頑鈍無恥畏避茍免之事故自漢以來雖叔季昏亂之世亦未聞有以任鄉亭之職為苦者也隋時蘇威奏置五百家鄉正令理人間詞訟而李徳林以為本廢鄉官判事為其閭里親識部㫁不平今令鄉正專理五百家恐為害更甚詔集議而衆多是徳林遂廢不置然則矯時鄉職或設或廢未無關於理亂之故而其所以廢者蓋上之人重其事而不輕置非下之人畏其事而不當充也至唐睿宗時觀監察御史韓琬之疏然後知鄉職不願為故有避免之人唐宣宗時觀大中九年之詔然後知鄉職之不易為故有輪差之舉自是以後所謂鄉亭之職至困至賤貪官汚吏非理徴求極意凌蔑固雖足跡不離里閭之間奉行不過文書之事而期會追呼笞箠比較其困踣無聊之狀則與以身任軍旅土木之繇役者無以異而至於破家蕩産不能自保則繇役之禍反不至此也然則差役之名蓋後世以其困苦卑賤同於徭役而稱之而非古人所以置比閭族黨之官之本意也王荆公謂免役之法合於周官所謂府史胥徒王制所謂庶人在官者然不知周官之府史胥徒蓋服役於比閭族黨之官者也蘇文忠公謂自楊炎定兩稅之後租調與庸兩稅既兼之矣今兩稅如故奈何復欲取庸錢然不知唐之所謂庸乃征徭之身役而非鄉職之謂也二公蓋亦習聞當時差役之名但見當時差役之賤故立論如此然實則誤舉以為比也上之人既賤其職故叱之如奴𨽻待之如罪囚下之人復自賤其身故或倚法以為奸或匿賦以規免皆非古義也成周之事逺矣漢之所以待三老嗇夫亭長者亦難以望於後世如近代則役法愈弊差役愈詳元祐間講明差雇二法為一大議論然大槩役之所以不可為者費重破家其蘇黄門言市井之人應募充役家力既非富厚生長習見官司官吏雖欲侵漁無所措手耕稼之民性如麋鹿一入州縣已自懾怖而况家有田業求無不應自非亷吏誰不動心凡百侵擾當復如故以是言之則其所以必行雇役者蓋雖不能使充役之無費然官嘗任雇募之責則其役與民不同而横費可以省雖不能使官吏之不貪然民既出雇募之費則其身與官無預而貪毒無所施此其相與防閑之術雖去古差逺甚然救時之良䇿亦不容不如此然熈豊間言其不便者則謂差役有休歇之時而雇役則年年出費差役有不及之戸而雇役則戸戸徴錢至有不願輸錢而情願執復者蓋當時破家者皆愚懦畏事之人而桀黠之役自能支吾而費用少者反以出雇役錢為不便又當時各州縣所徴雇役錢除募人應役之外又以其餘者充典吏俸給之用又有寬剰錢可備凶旱賑救可見當時充役之費本不甚重故雇役之錢可以備此三項支用也若夫一承職役羈身官府則左支右吾盡所取辨傾囷倒廪不足賠償役未滿而家已罄事體如此則雇役之法豈復可行雇役之金豈復能了然則此法所以行之熈豊而民便之元祐諸君子皆以為善者亦以當時執役之費本少故也禮義消亡貪饕成俗為吏者以狐兎視其民睥睨朶頥惟恐墮穽之不早為民者以㓂戎視其吏潜形匿影日虞懐璧之為殃上下徂伺巧相計度州縣專以役戸之貧富為宦况之豊殺百姓専以役籍之係否驗家道之興衰於是民間視鄉亭之職役如蹈湯火官又以復除之説要市於民以取其貲其在復除之科者茍延歳月而在職役之列者立見虚耗雖有智者不能為謀矣所謂正本澄源之論必也朝廷以四維勵士大夫餼廪稱事無俾有多蔵之惡士大夫以四維自勵力行好事稍能以澤物存心然後鋤奸貪之胥吏以去其蠧害削非泛之支備以食其事力賦歛之簿書必覈無使代逋欠之輸勾呼之期會必明毋使受稽慢之法夫然故役人者如父母之令其子弟恩愛素孚役於人者如臂指之護其腹心劬勞不憚既無困苦之憂不作避免之念則按籍召而役之可矣奚必曰雇曰差之紛紛哉不然舉三代以來比族閭黨之法所以聨属其民上下相維者反藉為厲民之一大事愚不知其説矣今時上賦條編二法總論徃時天下賦役率用國朝初法畫一里甲十年而一事民得畨休又隨民數之盈縮以賦于民民咸便之行之既久而弊滋焉民患苦之於是有司或為總賦之法或為條編之法總賦者通歳計其所入而總賦之戸頒之以所賦之數而人人之所宜入當數而止約法畫一吏牘大損豪猾不得規避輕重而公家催征易起人稱便矣其言不便者諸供億悉在官官率取之市人或給之直不當又百姓已罷歸官有私役之者此見於兩浙一䇿對者然也條鞭者計口受傭縁畆定直悉籍其一歳之費而輸之于官官為召募民不擾焉人亦稱便矣其言不便者謂初議法𨽻省之郡輕重苦樂既以不均而或又取成額而日裁之故費益繁而用愈不給則有那移有預徴那移而官困矣預徴而民困矣且差銀之入日削而募役枵腹于公庭有司坐困莫敢誰何矣此見于江右之䇿對者然也即此推之其兩畿諸省賦役之弊可勝數哉若其飛詭以亂籍匿産以迯租上戸或髙枕而素封窮丁受箠楚而莫措則又天下之通弊而憂民之士所仰屋而竊嘆者也圖書編卷九十
