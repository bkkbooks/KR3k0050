body:
  text: 圖書編巻九十明章潢撰歴代民數總考禹平水土為九州人口千三百五十五萬三千九百二十三地之定墾者九百一十萬八千二十頃禹貢冀州厥􅁟惟白壤厥賦惟上上錯厥田惟中中兖州厥􅁟黒墳厥田惟中下厥賦貞青州厥􅁟白墳厥田上下厥賦中上徐州厥􅁟赤埴厥田惟上中厥賦中中揚州厥􅁟惟塗泥厥田惟下下厥賦下上上錯荆州厥􅁟惟塗泥厥田惟下中厥賦上下豫州厥􅁟惟壤下􅁟墳壚厥田惟中上厥賦錯上中梁州厥􅁟青黎厥田惟下上厥賦下中三錯雍州厥􅁟惟黄壤厥田惟上上厥賦中下塗山之㑹諸侯執玉帛者萬國周武王定天下列五等之封凡千七百七十二國周公相成王制理刑措人口千三百七十萬四千九百二十三此周之極盛也周禮小司㓂及大比三年比較民之衆寡登民數自生齒以上登于天府内府司㑹冡宰貳之以制邦用司民主民數者掌登萬民之數自生齒以上皆書於版籍辯也其國中王國之内與其都鄙及其郊野異其男女嵗登上也下除也其死生毎嵗有生者登而載之死者下而除之及三年大比以萬民之數詔司㓂司㓂及孟冬祀司民之日祀司民之神一其數于王王拜受之登于天府内史司㑹冡宰貳之以賛王治秦孝公十二年初為賦納商鞅説開阡陌制貢賦之法漢自髙祖訖於孝平民戸千二百二十三萬三千餘口五千九百五十九萬四千餘墾田八百二十七萬五百三十六頃漢極盛矣此西漢戸口田賦極盛之數東漢桓帝永壽二年戸千六百七萬九百口五千六萬六千八百五十六墾田六百九十三萬一百二十三頃三十八畆田畆㨿質帝本初元年數之此乃東漢户口田賦極盛之數又按三國鼎時之時合其户數不能滿百五十萬昔人以為纔及盛漢時南陽汝南兩郡之數藎戰争分裂户口虚耗十不存一理固然也晉平吴之後九州攸同大扺編戸一百四十五萬九千八百四口千一百一十六萬三千八百六十三此晉之極盛也晉之後南北分裂運祚短促者皆難稽據今以其極盛者計之宋文帝嘉以後户九十萬六千八百有竒魏孝文遷洛之後户五百餘萬則混南北言之纔六百萬而已隋混一之後至大業二年户八百九十萬七拾有竒墾田五千五百八十五萬四千四十頃此隋極盛之數唐制凡丁附於籍帳者春附則課役並徴夏附則免課從役秋附則課役倛免制毎嵗一造帳三年一造籍州縣留五比尚書省留三比天寳十三載户九百六萬九千一百五十四應受田一千四百三十萬三千八百六十二頃十三畆此唐户口田賦極盛之數馬氏曰隋唐土地不殊兩漢而户口極盛之時纔及其三之一何也蓋兩漢時户賦輕故當時郡國所上户口版籍其數必實自魏晉以來户口之賦煩重則版籍容有隠漏不實固其勢也又曰均此宇宙也田日加于前户日削於舊何也蓋一定而不可易者田也是以亂離之後容有荒蕪而頃畆猶在可損可益者户也是以虛耗之餘並縁為弊而版籍難慿杜佑以為唐自武徳初至天寳末凡百三十八年可以比崇漢室而人户纔比於隋氏蓋有司不以經國馭逺為意法令不行所在隠漏之甚其説是矣宋至道元年詔復造天下郡國户口版籍自唐宋四方兵起版籍亡失故户口税賦莫得周知至是始命復造焉元豐間天下總四京一十八路田四百六十一萬六千五百五十六頃此元豐間天下墾田之數比治平時所增者二十餘萬頃宋之土宇北不得幽薊西不得靈夏南不得交趾然三方之在版圖亦半為邊隣屯戍之地墾田未必多未應倍於中州之地然則其故何也按治平㑹計録謂田數特計其賦租以知其頃畆而賦租所不加者十居其七率而計之則天下墾田無慮三千餘萬頃蓋祖宗重擾民未嘗窮按其數莫考其實耳崇寜元年户三十萬三千四百九十五口四十萬九千一百六十三此宋户口極盛之數按此則古今户口無如崇寜大觀之盛然觀政和間詳定九十一志而蔡假何志同言天下户口之數類多不實志同言本所取㑹天下户口數類多不實且以河北二州言之徳州主客户五萬二千五百九十九而口纔六萬九千三百八十五霸州主客户二萬二千四百七十七而口纔三萬四千七百一十七通二州之數率三户肆口則户版欺隠不待校而知之矣乞勅有司申嚴法令務從覈實徐閎中乞㕘考户口閎中言九州志在元豐間主客户共一千六百餘萬大觀初已二千九十一萬乞照諸天應奏户口嵗終再令提舉司㕘考同保則當時版籍殊欠覈實所紀不足憑矣國朝民數總叙黄冊所載至為浩繁其大要則天下之人丁事産而已人丁即前代之户口事産即前代之田賦然不稽諸古無以見今日之盛也故竊採經𫝊所録者輯為此篇而今之人丁事産則詳備其數而别為二條焉葢見于古者其辭畧故合而為一行乎今者其事悉故分而為二理固然也𢎞治十五年兩京十三省進冊衙門總計一千七百三十一府一百四十二州二百三十四縣一千一百三十八軍民府一十一宣慰司一十二宣撫司一十一安撫司二十招討司一長官司一百六十嘉靖二十一兩京十三省進冊衙門總計一千六百八十二府一百四十州二百三十縣一千一百三十九軍民府一十三宣慰司四宣撫司五安撫司八招討司一各衛軍民揮使司一十七長官司一百八十八鹽運司一鹽課提舉二上林苑鹽一巡檢司二國朝黄冊民數事産考詳考天下黄冊之數國初至今增减不一今特據洪武初年本庫見在之數與𢎞治十五年嘉靖十一年奏繳之數録之以備考云國初直𨽻府州縣并十三布政司户總計一千六十五萬二千七百八十九口總計六千五十四萬五千八百一十二直𨽻府州縣戸一百九十一萬一千八百三十三口一千七十五萬五千九百三十八浙江布政司户二百一十三萬八千二百二十五口