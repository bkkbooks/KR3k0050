風禽鳥冲霄漢狂風時下見面頰熱如紅有雲天即風占風雨日出夘遇雲無雨天必隂日出紅雲暗東風雨即見日暮若暗紅無雨必生風日暮黒雲接風雨不可説朝暮起海雲東風與當晨東風黒雲急但犯雨傾滴雲暗遇東風霶􅑛雨下傾雲隨東風起風定雨方止雲布滿三低東風雨亂飛雨過東風至晩來越添巨午後遇雲遮東風夜雨泄雲從龍門起􅄓風連急雨但犯起東風雨下必相從黒雲暮生西半夜雨風催春夏遇隂凉雨下把風防秋後遇隂熱雲雷風雨烈西北黒雲生雷雨必聲訇東南北海響風雨漸漸長蝃蝀出自東無雨必生風斷虹當晩見不明天必變電光若亂明大雨隨風傾汛頭風不長汛後風雨狂滿海起荒浪潮隨風雨漲鳥鱗㺯忽波風雨急如梭占雨門魁罡潤雲氣必定雨垂地朝霞如黒洒細雨紛紛下電光西北起定然連夜雨朝日光燭地細雨必然至虹見被雲吃當時雨傾滴蝃蝀出自西明日應雨垂中後日晒耳明日定有雨霧露夜不起來朝必細雨海運總論海運之法自秦有之唐人亦轉東吳粳􅀈給幽燕然亦給逺方之用而已用以足國則始於元焉初巴延平宋命張瑄等以宋圖籍自崇明由海道入京師至元十九年始見海運之策命羅壁等造平底海船運糧從海道抵直沽是時猶有巾灤之運不専於海道也二十八年立都漕運萬石府以督嵗運至大中以江淮浙財賦府每歳所辦糧充運以至末年専仰海運夫海運之道其初也自平江劉家港入海至海門縣界開洋月餘始抵成山計其水程自上海至楊村馬頭凢一萬三千三百五十里最後千户殷明畧者又開新道從劉家港至崇明州三沙放洋向東行入黒水大洋入界河當舟行風汛有時自浙西至京師不過旬日而已說者謂其雖有風濤漂溺之虞然視河漕之費所得蓋多故終元之世不費我朝洪武三十年會通河通始罷海運考元史食貨志論海運有云民無輓輸之勞國有蓄儲之富以為一代良法又云河運視河漕之數所得蓋多作元史者皆國初史臣其人皆生長勝國時習見海運之利所言非無徴者竊以為自古漕運之道有三曰陸曰河曰海陸運以車水運以舟而皆資乎人力所運有多寡所費有繁省河漕視陸道之費省十四海運視河運費省十七八河漕雖免陸行而人輓如故海運雖有漂溺之患而省牽率之勞較其利害蓋亦相當今漕河通利嵗運充積固無資于海運也然善謀國者恒于未事之先為意外之慮今國家都幽蓋極北之地而財賦皆是東南而來會通一河譬則人身之咽喉也一日食不下咽立有死亡之禍况自古皆是轉搬而以鹽為傭直今則専用軍夫長運而加兑支之耗嵗嵗常運儲積之糧而征戍之卒日少食固足矣如兵之不足何迂儒逺慮請于無事之秋尋元人海運之故道别通海運一路與河漕並行江西湖廣江東之粟照舊河運而以浙西東瀕海一𢃄由海通運使人習知海道一旦漕渠少有滯塞此不可來而彼來是亦思患預防之先計也家居海隅頗知海舟之便舟行海洋不畏深而畏淺不慮風而慮磕故製海舟者必為尖底首尾必俱置柁卒遇暴風轉㠶為難亟以尾為首縱其所如且暴風之作多在盛夏今後率以正月已後開船置長槁以料角定盤針以取向一如畨船之制夫海運之利也以其放洋而其險也亦以放洋今欲免放洋之害宜預遣習知海道者起自蘇州劉家港訪問傍海居民捕魚漁戸煎塩竈丁次第踏視海崖有無行舟潢道泊舟港汊沙石多寡洲渚逺近親行試騐委曲為之設法圖畵具本以為傍海通運之法若夫占視風候見于沈氏筆談每日五鼔初起視星月明潔四際至地皆無雲氣便可行舟至于已時則止斯不遇暴風矣中途忽見雲起即便易柁回舟仍泊舊處如此可保萬全永無沉溺之患萬一言有可採乞先行下閩廣二藩訪尋舊曽通畨航船之人及行廣東鹽課提舉司歸徳等塲趣取慣駕海舟竈丁令其優給驛遣既至訪詢其中知海道曲折者以海道事宜許以事成加以官賞俾其監工照依舶式様造為運船及一應合用器物就行委官督領其人起自蘇州歴揚淮清登等府直抵直沽濵海處處踏看可行與否先成運舟十數艘付與駕使給以月糧俾其沿海按試經行停泊去處所至以山島港汊樹標幟詢看是何州縣地方一一紀録造成圖䇿縱其徃來十數次既以通習保其决然可行無疑然後於昆山大倉起蓋船厰將工部原𣲖船料差官于此收貯照依現式造為海運尖底船隻量定軍夫若干装載若干大抵海舟與河舟不同河舟畏淺故宜輕海舟畏風故宜重假如每艘載八百石則造為一千石每舟許以百石載私貨三年之後軍夫自載者三十稅一客商附載者照依稅課常例就于直沽立一宣課司收貯為嵗造船科之費其糧既從海運脚費比漕河為省其兑支之加耗宜量為减殺大約每舟載千石則可當河舟所載之三河舟用卒十人海舟加五或倍之則漕卒一比舊省矣此又非徒可足國用自此京城百貨駢集而公私俱足矣若謂海道險逺恐其損人費財請以元質之其海運自至元二十年至天歴二年止備載逐年所至之數以見其所失不無意也竊恐今日河運之糧每年所失不止此數而其支兑加耗每石須有所减恐亦浮於所失之數矣河運海運總論嘗觀之主河運者則絀海道曰風檣浪楫漂溺叵測未可也主海運者則絀河道曰黄流為梗嵗費億萬不可也噫誠虚談乎愚請一切捐棄之直以臆對夫會通既成海運告罷民甚便之矣而洪閘停留則苦搬運河流衝塞則苦推移會通獨無害乎遮洋初試民甚苦之矣而糧無剥損可省耗石舟無停次可免輓卒海運獨無利乎彼韓非子曰法立而有難推其難而事成則立之事成而有害而功多則為之如此則天下皆無難之法皆無害之功世之受笑者無亦較利害計難易孰少與多耳彼秦攻匃奴餽運繁苛飛芻輓粟起自黄腄古東萊地則東省為轉轂之門户直自秦始而秦運蓋未廣也漢都長安初不過漕山東粟數十萬石已自足用後引渭穿渠又通褒斜道非好勞民勢不得不然也唐亦都長安初不過漕關東粟十萬亦自足用迨後劉晏漕於汴淮李泌増運百萬非好侈費勢不得不然也宋之漕也東南自汴入陕西自黄河入陳蔡自惠民河入京東自廣濟河入盖分為四路矣元之漕也始而河繼而陸已而海盖分為三道矣海漕通而運至三百萬石豈得已哉秦漢以上事寡而簡秦漢以下官冗而兵繁輻輳並進且猶不給勢則然也故管子曰七十二代之君俱王天下必富國而粟多㫖哉言之矣國都定鼎背控長邊平衡以臨四面經費不出倚辦東南漕輓之道僅僅一線邇復梗塞嵗事講求甲可乙否遄興倐罷卒未有能建萬世之長䇿以紓吾君相之隱憂者何盖說有擇利而曠于實者言有樸訥而適于用者見其難而釋其業覩其害而相其利則四海之無成勞也噫沐者尚有棄髪瘍者且無完膚况謀及大事乎今之談河運者不曰黄淮失道乎不曰徐邳高涸乎不曰崔鎮諸口未塞高寳諸堰未固乎不曰泇河可疏徐南故道可通乎夫高墉固防塞決補潰淮揚之役不日告成前後大臣經畧無遺筴矣泇口若濬可逺河患而崇岡漫泊厥功難施姑勿論也若彭城西境達乎夏邑黄河故址儼然在焉疏而復之以濟洪流以殺河勢南不妨鳯泗國陵北不逼兖冀運道此其利害彰彰著也何也徐吕二洪資河之利亦受河之害設如河臣之議修復有三利焉河改而南北漸細扶溝留城之間可免衝塞利一也南流既下建瓴直達勢無紓折湍悍其徐南壅沙漸流漸去利二也四野泛濫舉歸故道蕭碭曹單永有寕居利三也則雖違衆論斷之可也任心膂之能臣假便宜之重寄俟積貯之少紓舉必成之碩畫而漕流安矣乃歐陽氏曰河流已棄之故道自古難復信斯言也則以不易辦之鉅費圖不必成之大功非今所當緩焉者耶此治河漕之大略也今日之談海道者不曰閩越長樂港乎不曰秣陵龍江關乎不曰太倉劉家港乎不曰自􅀈口以入海乎不曰由成山以達直沽乎夫浙直大海横亘千里兵艘販舶晝夜相續朱清張瑄所經略無遺慮矣鶯遊而上逺歴成山風濤險􅁖礁石林立誠可畏也若膠口以北海倉以南元運舊河儼然在焉修而復之以近易逺以夷易險南北商販可使阜通東省本色可使復舊此其利害亦彰彰著也說者謂分水嶺焉壕難於開鑿大沽河小沽河易于壅沙復欲自黄埠嶺雲河口諸所剏開一道以接之愚則以為理舊業有三易焉夫馬家壕両岸阻石舟不可觸近經削治海舶大行不煩人力一易也二沽衝沙為害良不能免然河越二百年積沙近以尺計冬春水涸嵗加撈刷何能為患二易也分水嶺地勢誠高然河底泉水可瀦河旁支流可引更為増置閘埧蓄洩有備何憂淺閣三易也夫治之果有易也則排衆議而舉之可也捐東省數萬之存留募沿河郡縣之丁壮督率則責之二三能吏部署則假之方面重臣膠河辦矣乃歐陽氏曰智者之於事有所不能必則較利害之輕重信斯言也則海運之有利于國膠河尤有利于海運非今日所宜䆒心者耶此治海運之大略也大抵今昔異勢新故異備達者不期修古哲士務於知新夫何故勢易乎時備因乎事也則又當以今日之事勢籌之矣彼元世都燕嵗省邉供而今則百萬仰哺矣宋處中土四靣入饋而今止東南一綫矣故修河宜亟而海運不可忽也海運當圖而沁衞不可忘也何也専主河運便矣而潢池㺯鎧咽喉為梗能無慮乎専主海運當矣而溟渤揚氛煙波阻絶獨無慮乎漕海並治沁衞兼通無事則循守故轍有警則増置篙夫此阻彼通鳬趨鱗貫使國賦日贏食貨日充以通四塞之要以助軍國之盛非水利歟抑更有疑焉或謂治漕者當以𨗳泉濬淤治洪建閘為上而引河次之治海者當以龍關劉港開洋為上而淮安次之此何説也萬里黄流建領直下湍悍則决㪚緩則淤徙突不常自古為然既欲資之濟邉而病其妨運誠有神禹不能慮其後者然禹之九道元之四道流漸雖斷故蹟豈盡冺耶誠能按蹟求索分遣屬邑預為蓄備稍俟嵗豐人和徧加䟽瀹勿逼而南令其由舊入海而别引沁水從魏博折而東之資漕艘是亦一竒也江南之運幾三百萬𤓰儀以北河流如𢃄萬一有阻京庾何恃誠有如丘文莊所慮者說者欲令浙直之運自太倉發三椘之運自龍江發俱由大洋以入膠河每嵗計輸三十萬石俾其習熟海道永備不虞雖有小挫勿遽停止是又一竒也四海附四海之邉中國者在山東為東海在廣南為南海人人得而見聞不待證説矣若夫禹跡所及西境流沙而極不言西海東北甞至碣石而北海之名不著于經則謂外薄四海訖于四海者如之何而四也漢武帝事逺有効使命方行四表故西北二海遂有身歴而目撃之者矣非道聴塗説比于是條支之西有海先漢使者固嘗見之而入諸史矣後漢班超又嘗遣甘英軰親至其地也至西海之西又有大秦卽波斯國夷人與商人皆嘗徃來若北海則又甚逺如霍去病之封狼居胥山也其山實臨瀚海即北海也蘇武郭吉皆為匈奴所幽寘諸北海之上唐史曰突厥部北海之北更有骨利幹國在海北岸也然則詩書稱四海者實環夷夏而四之矣若西北二邊有西海栢海青海蒲類海居延海此類雖與海並稱實衆水為大澤故以海為名耳班固叙張掖之水曰羌水出羌中東北至居延入海則直以居延為海矣渤海附夫海者百谷之王萬水之宗也山東三面瀕海登萊二府島嶼環抱其在青濟則樂安日照濵州利津霑化海豊諸境皆抵海為界稱渤海云説文曰東海之别有渤海故東海稱渤海列子曰渤海之東有大壑曰歸塘歸塘者即莊生所謂尾閭也初學記曰北海之别有瀚海瀚海之南有渤鞮海則北海亦通稱渤海矣夫東方之極自碣石通朝鮮諸國直抵扶桑一望汪洋浩瀚溟涬無際外控邊落内衞中夏則山東形勝實稱險絶昔人謂齊得十二又豈直為兵車卒乗之富邪博物志曰海中有蓬萊方丈金銀宫闕仙人所集十洲記謂東海中五百里有不死草返魂樹此固秦皇漢武所以縱其侈心求之而不得也顧其說荒唐不經然觀登萊海市樓䑓城郭人物旌旗之状成于瞬息千態萬像不可摹冩則海中靈欝之氣洩而為竒怪瑰瑋之物固亦理之所宜有也至於禽鳥木石之産金錫鹽鐡之利珠璣鱗甲之珍民實資之則海于東土其利固甚博哉渤海辦海岱惟青州所謂東北跨海西南距岱跨小海也本名渤海亦謂之渤澥海别枝名也盖大行恒嶽大徼之山循塞東入朝鮮今高䴡海限塞山有此一曲北自平州碣石南至登川沙門島是謂渤海之口闊五百里西入直沽㡬千里焉漢王横乃謂九河之地㵸為小海然則唐虞之時青州跨海者跨何海耶且海溢出浸數百里河自秦漢以來青兖營平郡縣不聞有漂沒者足證横失海溢者有之横言之過也近世蔡氏書傳金履祥通鑑前編皆祖横説又謂小海所淪青兖北境悉非全壌豈二州北境有荒漠棄地海所漸而歴代信史不之書耶盖因委九河于海中指碣石在海外遂有此論今青境無缺茲不必辯古兖之地自濟南以西北包濵棣滄瀛𢃄雄鄚西襟深冀南遶曹濮東括魯鄆四至亦不狹矣在春秋戰國其地𤓰分從後世小之未詳考也金氏又云碣石二在髙麗者曰左碣石在平州者禹貢之右碣石也乃金沙門島對岸之鐡山正當渤海之口果為右碣石則唐虞之時青兖東北直岸大海無渤海矣此又可信耶今齊境東南則日照即墨膠州正東則寕海登州皆岸大海東北則萊濰昌邑正北則博興夀光西北則濵棣二州皆岸渤海云南海附廣東三面皆瀕海地也禹貢三江皆從會稽入於南海􅀈會稽地綿亘四千餘里南五嶺復有三江又從廣城一百里合流入于南海分東西二道焉東道八十里出斗古村南自此浩淼無際又東南二百里抵東莞南海衛又南六十里出虎頭門又南一百五十里抵南頭城下海可抵甌越自嶺東惠州府海豊縣八十里出甲子又東至潮州府城南一百五十里出朝陽東北可抵閩越又東則抵青齊以至登萊島嶼環抱爰有蜃樓鮫室是為東海其别則渤澥故東海又名渤海云海運自金陵之龍江為通路東徃海門而南行可以至廣州古斗海晋劉裕滅南燕還建康遣孫處襲盧循至東衝即此道也西道七十里出上弓灣見西海壖又西南二百里抵新會縣出城南八十里為崕門又南七十里廣海衛扼其要衝官軍每征海㓂必集于此又西蜆岡至南陵有夜郎豚水出牂牁江可通巴蜀漢武帝發夜郎兵會番禺即此道也其西南由慿祥海路可抵駱越交趾又自嶺西陽江縣西南抵電白縣東一百里而徃西南出限門則川流皆放於海爰有海􅖃水犀龍鯉是多文魮珠鱉有海人焉見之則風有魚焉腹有兩洞皮可餙刀劍其名曰䱜中有軒轅之丘鸞自歌鳳自舞是為天樂其外有灾洲洲上有獸焉如狸而青鐡椎撃之輒死張口向風而活其名曰風生可以已疾洲之下鮫人蜃氣或蒸為海市去海康縣東十里對面即為瓊海郡邑則居島上又南則通島夷畨服之國以千百數自巴蜀而抵于滇之西則水皆西流注于西海海一而已自青齊北至滄州為北海亦曰瀛海其别至于極北為瀚海南與渤海合自碣石通朝鮮諸國直抵扶桑一望汪洋溟涬三神山在焉其西海則通西域樓蘭姑師邑有城郭臨鹽澤至條支則臨大海惟南海居東南委輸之極為萬水所宗故出虎頭甲子二門則東西二洋隨舶所之東可以至倭國西可以通西畨故曰海為百谷之王以其下也翕受自此而東西迤演夾乎左右故南海獨𢎞且逺稱天池焉海潮附余安道圖叙曰古之言潮者多矣或言如槖籥翕張或言如人氣呼吸或云海鰌出處皆無經據唐世盧肇著海潮賦以為日入海而潮生月離日而潮大自謂極天人之論世莫敢非予嘗東至海門南至武山旦夕候潮之進退弦望視潮之消息乃知盧氏之談出於胸臆所謂不知而作者也夫陽燧取火於日隂鑑取水於月從其類也潮之漲退海非増减盖月之所臨則水徃從之日月右轉而天左旋一日一周臨於四極故月臨卯酉則水漲乎東西月臨子午則潮平乎南北彼竭此盈徃來不絶皆繋於月不繋於日何以知其不然乎夫晝夜之運日東行一度月行十三度有竒故太隂西沒之期常緩於日三刻有竒潮之日緩其期率亦如是自朔至望常緩於夜潮自望至晦每復緩于晝潮若因日之入海激而為潮則何故緩不及期常三刻有竒乎肇又謂月去日逺其潮乃大合朔之際潮始㣲絶此故不知潮之凖也夫朔望前後月行差疾故晦前三日潮勢長朔後三日潮勢極大望亦如之非謂逺于日也月弦之際其行稍遲故潮之來亦合而不盡非謂近於日盈虚消息一之于月隂陽之所以分也夫春夏晝潮常大秋冬夜潮常大盖春為陽中秋為隂中歳之有春秋猶月之有朔望也故潮之極漲常在春秋之中潮之極大常在朔望之後此又天地之常数也昔竇氏為記謂潮虚于午此候于東海者也近燕公著論謂生于午此則于南海者也又嘗問于商賈云潮生東南乗舟候潮而進退者耳古今之説以為地闕東南水歸之海賈云潮生東南亦近之矣今通一海之盈縮以誌其期西北二海所未嘗見故闕而不紀云嘗候于海門月加卯而潮平者日月合朔則旦而平緩三刻有竒上弦則午而平望已前則為晝潮望已後則為夜潮此皆臨海之候也逺海之處則各有逺近之期月加酉而潮平者日月合朔則日入而潮平上弦則夜半而平望則明日之日而平望已前則為夜潮望已後則為晝潮此東海之潮候也又嘗候于武山廣州月加午而潮平者日月合朔則午而潮平上弦則日入而平望則夜半而平上弦已前為晝潮上弦已後為夜潮月加子而潮平者日月合朔則夜半而潮平上弦則則日出而平望則午而平上弦已前為晝潮上弦已後為夜潮此南海之潮候也高麗圖經云潮汐徃來應期不爽為天地之至信古人嘗論之在山海經以為海鰌出入之度浮屠書以為神龍之變化竇叔䝉海嶠志以為水隨月之盈虧盧肇海潮賦以為日出于海衝撃而成王充論衡以為水者地之血脉隨氣進退率未之盡大抵天包水承地而一元之氣升降于大空之中地承水力以自持且與元氣升降互為抑揚而人不覺亦猶坐于船中而不知船之自運也方其氣升而地浮則海水溢上而為潮及其氣降而地沉則海水縮而為汐計日十二辰由子至已其氣為陽而陽之氣又自有升降以運乎晝由午至亥其氣為隂而隂之氣又自有升降以運乎夜一晝一夜合隂陽之氣凢再升再降故一日之間凢潮汐皆再焉然晝夜之攻擊乗日升降而應乎月日臨于子則陽氣始升月臨于午則隂氣始升故也夕潮之期日皆臨子晝潮之期月皆臨午焉又日行遲月行速以速應遲每二十九度過半而月行及之日月之㑹謂之合朔故月朔之夜潮日亦臨子月朔晝潮日亦臨午焉即天上而言之天體西轉日月東行自朔而徃月速漸東至入于夜此所以一日午時二日午末三日未時四日未末五日申時六日申末七日酉時八日酉末也至夜即海下而言之天體東轉日月西行自朔而徃月速漸西至於漸遲而潮亦應之以遲於夜故夜潮自朔後迭復而入于晝此所以一日子時二日子末三日丑時四日丑末五日寅時六日寅末七日卯時八日卯末也以時有交變氣有盛衰而潮所至亦因之為大小當卯酉之月則隂陽之交也氣以交而盛故潮之大也獨異於餘月當朔望之後則天地之變也氣以變而盛故潮之大也獨異於餘日今海中有魚獸殺皮而乾之至潮時則毛皆起豈非氣感而類應之自然歟臨安志潮考卲子曰潮汐者地之喘息也所以應月者從其類也朱子曰潮汐之説余襄公言之尤詳大抵天地之間東西為緯南北為經故子午卯酉為四方之正位而潮之進退以月至此位為節耳以氣之消息言之則子者隂之極而陽之始午者陽之極而隂之始卯為陽中酉為隂中也寰宇記云瓊州潮候不同凡江浙欽亷之潮皆有定候瓊海之潮半月東流半月西流潮之大小隨長短星不係月之盛衰此又不可曉也又廣西桂林府志載聖水岩子時潮起午時潮落三五十年有一大潮則尤有不可知者故備録之見造化之大不可執一説以盡其神理云萬理海防總叙海為衆水所會而環中國皆海也東北起遼東東南抵瓊州其地之遥㡬萬里而海中夷島小大不一而其叛服亦不常雖其叛也不足為中國大患而疥癬亦足為病洪惟我大祖髙皇帝于沿海要害設為衛所水旱之寨星列棊布其防亦既宻矣然宻于防海而今之為海濵患者豈特舊法廢弛為然哉如漳泉濵海之民以海上爲家以夷島為商販之地固有所利于夷而各夷島之貨皆欲求售其所利於中國之貨物者亦不少其中且有名雖入貢實為貿易財貨故利之所在皆争趨之而忘其風波之險也一或禁其舟楫其初亦若海烽之稍息矣然而奸頑惡黨鈎引潜匿為害滋甚近日倭奴之患可覩也已今欲防之豈有他哉亦惟舉國初之制而潤色之俾威嚴在我而懐柔有道海㓂惡為大害云圖書編卷五十六
