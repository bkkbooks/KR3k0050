body:
  text: 圖書編卷五十六明章潢撰河運海運總敘王者宅中圖治必輓天下財賦以給經費我朝河運海運繼由陸運凡三變乃改今河運然地勢高南北迤邐就下乏水以濟濟水伏流齊魯隨地溢出為泉泉在東郡凡二百八十有竒各以近入汶泗洸沂諸水東流赴海文皇帝命工尚書宋公禮修復會通河伐石起堰東遏諸水西注漕渠南北分流北流者會漳會衛上接白河南流者會河會淮下接寳應髙郵諸湖漕渠遂亘南北濟泉以廣其源建閘以節其流築堤堰以防其潰决列舖舍以通其淤淺闢湖瀦水以時其蓄洩引水灌注以平其險阻備夫以供其役銓官以司其事董之以主事八各有専職臨之以郎中三各有分地監司守令亦有責焉又以事廣地劇役衆費繁統宗不可以無人乃勅差大臣一人總理於上爰集衆思以舉羣䇿嵗輓東南四百萬石萬艘鱗次而進時當盛夏維揚迤北乗風揚帆南旺迤北順流放舟既脱海運之險又免陸輓之勞四方萬國五材百貨罔不畢集民命永頼國計斯裕文皇帝開濟之功同於天地諸臣弼成之績要亦不可冺也或曰漕河之立制以帝都之在燕也前代都平陽都關中都洛陽都大梁並以黄河為運道寕有此勞費哉曰是不然夫東南以海為險西北以山為險遡海肆逆為難而乗髙犯順為易故西北世有憑陵之患自遼左至甘凉六鎮皆守山外去中原千有餘里惟幽薊一鎮獨守山内中原内外僅隔一山而山復中缺易于窺伺安史之亂唐契丹之制晉金元之取宋率由此首難自昔有天下而以此地屬人未有能乆寕者竊謂扼強兵而障中原據上㳺而制六合孔子復生必從文皇帝之見矣曰都燕之地則既聞命矣海運由浙西不旬日可達都下較之河運費省而功倍丘文莊衍義補言之詳矣近年言者亦多厭河運之勞而欲舉文莊之策子顧極言河運之利而欲侈諸臣之功示諸久逺何也曰海運之法作俑於秦效尤於元祖宗已棄之䇿三代以前未聞也文莊計漂溺之米而不計漂溺之人故以海運為便不知米漂而載米之舟駕舟之卒管卒之官能獨免乎考之元史至元二十八年海運漂米二十四萬五千六百有竒至大二年漂米二十萬九千六百有竒即如文莊言每舟載米千石用卒二十人則嵗溺而死者殆五六千人此虐吏之所忍於斯人也奈何文莊亦忍於斯人哉河運之費費於人所謂人亡人得者損上益下王者以天下為家又奚恤哉曰海運誠不可復矣今之河運築堤建閘並以人勝時不常泰人不皆良能保無意外之變乎曰變不可保也海胡可蹈哉今之黄河經行河南之祥符者去衛河僅七十里鑿而通之萬夫一月之力也議者徒以衝决為難竊以為黄河之難不難於海也二道並設而各從其便常可也變亦可也是則可為也曰此尤不可之大者先朝河决張秋運道梗塞罄數省之力捐不貲之費再歴寒暑乃克底寕衆方幸其南子欲引之北如子之言且將為運道憂矣曰今之黄河固古之運道也昔固北行而今始南遷也民間舟楫徃來如織未嘗一日廢在古則宜在今則否在南則利在北則否在民則可在公則否在海則易在河則難吾不知其何説也海運考朱清張瑄者海上亡命也久為盗魁出沒險阻若風與鬼刼掠商販人甚苦之至元二十一年巴延建議海運乃招二人授以金符千户押運糧三萬五千石仍立海道萬戶府三以清瑄與羅壁為萬户轄千户百户所領虎符金牌素銀牌船大者不過千石小者三百石自劉家港出楊子江盤轉黄連沙嘴月餘始至淮口過膠州牢山一路至延真島望北行轉成山西行到九臯島劉公島沙門島於萊州大洋收界河兩月餘抵直沽實為繁重至元二十六年增糧八十萬石二月大洋四月直沽交郵五月還復運夏糧至八月回一嵗兩運是時船小人恐懼至元二十七年宋萬戶請長興李福四押運自楊子江開洋落朝東北行離長灘至白水緣水經黒水大洋北望延真島轉成山西行入沙門開萊州大洋進界河不過一月或半月至直沽漕運利便是嵗加朱為浙江􅄁政張為浙江鹽運司都運如是者二十餘年大徳七年招兩浙上戶自造船與脚價十一兩五錢分撥春夏二運延祐以來各造海船大者八九千小者二千餘石嵗運三百六十萬石篙師稱便迤南畨貢亦通蓋自上海至直沽内楊材馬頭凡一萬三千三百五十里不出月餘可以達省費不貲若長樂港出福州經崇明以北又自古未有之利也我朝洪武三十年猶放其制嵗運七十萬石以給遼東至永樂間會通河成始不復講議者恒有意外之慮以為人生一日食不下咽則死亡立至會通河固南北之咽也訪求故道擇賢才而任之且重其權抑亦可為先事之防即使有如清與瑄者亦且消其驍獷而誘以自效有博采王憲使獻膠萊河之説因其垂成之功督以畫一之法使表裏兼資㕘酌利害以甦漕卒之困而求無疆之利憂世君子豈無是心哉海道福建布政司水波門船厰船要水手船䕶送其神仙壁碧水屋山島有賦開洋至三分山河口一二日至古山寺送香燭防東南􅄓作潮過平息至望錤港娘娘廟前泊一日至長樂港口一日至民逺鎮巡檢司一日至總埠頭港一日至福州左衛要水手送一日至五虎廟燒總福一日至五虎門開洋望東北行正東便是裏衣山正北是定海千戸所東南是福清縣鹽塲一日至王家峪海島泊一日至北髙山巡檢司西洋山口泊一日福寜縣幇娘娘廟前泊一日至滿門千戸防露晚收􅀈艚巡檢海口一日至金鄉要水手送一日松門衛一日至温州平陽縣平陽巡檢司海口至鳯凰山銅盆山防東南􅄓作晚收中界山泊一日至盤石衛見霧在中界山正北島泊待南風行至晚收北門千戸所要捕魚小列船送待南風北行過利洋雞籠山候潮至松門港松門衛東港泊候潮至台州海門衛東洋山泊離温州望北行到桃青千户所聖門口泊開洋至大佛頭山屏風山至徤跳千户所長亭巡檢司要水手漁船送又至羅漢堂山到石浦千户所東關泊要水手送至定海衛始換金鄉盤石水手離石浦港后門過銅瓦山后沙洋半邊山党公爵溪千户所望北行至青門山亂后礁洋至前倉千户所䨇臍港騎頭廵檢司過至大松千户所家門山招寳山進定海港定海衛南門要稍水船送繞總福開洋望北行至遮口山黄公洋列港千户所海寕衛東山如山望北行若至茶山低了至金山衛東海灘松江府上海縣海套水淺望東南行晚泊船候潮過羊山大七山小七山大倉寳㙮望東北行兩日夜見黒水洋南風一日見緑水瞭見海内懸山一座便是延真島靖海衛口淺灘避之一劉家港出楊子江南岸候潮長迤西行半日到白茒港潮平𢃄篷櫓摇過撑脚沙尖轉家明沙正東行南有朱八沙婆婆沙三脚沙須避之楊子江内北有䨇㙮南范家港灘東南有張家沙江口有陸家沙可避口外有暗沙一𢃄連至崇明江北有瞭角嘴開洋或正西西南北風潮落正東或𢃄北一字行半日可過長灘是白水洋東北行見官緑水一日見黒緑水循黒緑水正北行好風兩日一夜到黒水洋又兩日夜見北洋緑水又一日夜正北望顯神山半日見成山自轉瞭角嘴未過長灘正北行靠桃花班水邉北有長灘沙響沙半洋沙隂沙溟沙切避之如黒水洋正北𢃄東一字行量日期不見成山黒水多必低了可見升羅嶼海中島西有璣而筆架即復回望北𢃄西一字行一日夜便見成山若過黒水洋官緑水或延真島望西北由便是九峯山向北去有赤山牢山皆有島嶼可泊若牢山北有北茶山白􅅾頭石礁百餘里潡浪如雪即便開或復回望東北行北有馬鞍山竹山島北有旱門漫灘皆可泊若東南風大不可泊北向便是成山如在北洋官緑水内望見顕神仙挑西一字行多必是了即便回復望東北行過成山正西行前雞鳴嶼内有浮礁避有夫人嶼不可行須到劉島正西行到芝界島東北有門可入西北離百餘里有黒礁三四畝避之八角島東南有門可入自芝界島好風半日過抹直口有金嘴石衝出洋内潮落可見避之新河海口到沙島東南有淺挨深行南門可入東可門有暗礁西北有門可泊沙門島開洋北過砣磯山欽島沒島南洋北半洋鐵山洋東收旅順口黄津川西南有礁黄洋川東收平島口内北南岸外洋成兒嶺盡東望三山正中入内有南北沙相連可泊三山西有南山收青泥窪西有松樹島北有孤山東北望鳳凰山和尚島墩西有礁石外有亂礁避之三山玘青島一路望海島收黄島使島若鐵山西收羊頭窪䨇島東北看蓋州西看寳㙮台便是梁房口入三岔河收牛壮馬頭泊直沽開洋望東挑南一字行一日夜見半邉沙門島挑南字多必見萊州三山挑東北行半日便見沙門島若挑北多見砣磯山南收登州衛沙門島開􅊑東南山島有淺挨中東行好風一日夜見緑水一日夜見黒水又一日夜見南洋緑水又兩日一夜見白水望南挑西一字行一日挑㸃竿戳二丈漸减一丈五尺水下有亂泥二尺深便是長灘漸挑西收洪如截硬沙即便復回望東行見緑水到白水尋長沙收三沙洪如不着洪望東南行日看黄緑色浪花如茶末夜看浪撥而大星多即是茶山若􅊑坐茶山徃西南一字半朝北見崇民沙南見青浦墩岸劉家港如見黒水洋正南挑西多是高了前有隂沙半洋沙響沙攔頭沙即是瞭角嘴便復回徃正東行看水色風汛收三沙洪如風不便即挑東南行看水色收寳山如在黒水大洋挑東多必是低了見隔界大山一座便望正西南一字行一日夜便見茶山而不見隔界山又不見茶山見黒水多便望正西行必見石龍山孤礁山復回望正西南行見茶山收洪遼河口開洋順風一日夜至鐵山𢃄東二字望南行經成山入南津望正南行三日夜經桃花班水望東行見白水𢃄西二字動戳㸃竿尋長灘一丈八尺漸减至一丈五尺望西行戳楊子江洪如不見望下使必見茶山􅊑稍南面坐茶山望西行半朝便見崇明洲如風順一朝至劉家港内海運夫自平江伯開濬會通河以來海運之不講已久其后科道之條陳鄉會之䇿試名臣之著書舉行者不一而足然卒莫之能用也近臣備員山東甞條斯議適廵撫都御史梁夢龍經濟抱才忠誠體國毅然以未試行底績無壅事獲上聞恭遇陛下聖明英斷輔臣恢張廟謨遂出帑銀委督漕司慕載而四方始知海道之可通行矣然議立於剏見之時則羣心未信而法復於久廢之後則不免更張故今縉紳之慮不過云海上風波爾風波在海三尺童子知之矣然其事有可言者古語云天不滿西北地不滿東南故東南之海天下之水之委也𣺌茫無山則廻避靡地近南水煖則蛇龍窟居是以風波足畏傳聞可駭昔元人海運之有損壞以其起自太倉嘉定而北也若自淮安而東引登萊以泊天津則原名北海中多島嶼可以避風又其地髙而多石蛟龍有徃来而無窟宅故登州有海市以石氣與水氣相搏映日而成石氣能逹於水面以石去水近故也北海之淺是其明騐即以舟與米行於登莱因其曠逹以取其速而摽記島嶼以避其患則名雖同於元人而利實專其便易佐河運之缺計無便於此者然此猶舉時宜之緒論非臣條議之初圖若語其全則有稍進於是者而其説有三一曰天下大勢二曰都燕專勢三曰目前急勢請以唐宋之事明之唐人都秦右據岷凉而左通陕渭是有險可依而無水通利也有險則天寳興元乗其便無水則會昌大中受其貧宋人都梁背負大河而面接淮汴是以水通利而無險可依也有水則景徳元佑享其全無險則重和宣和受其病若今國家都燕北有居庸巫閭以為城而南通大海以為池金湯之固天造地設以拱衞神京誠聖子神孫萬年之全利也而乃使塞不通焉豈非太平之遺慮乎此臣所謂天下大勢也夫三門之險天下所謂峻絶也然唐人裴耀卿劉晏軰百計為之經營者以彼都在關中故也粟不能飛則途有必由是三門者秦都之専路也若夫都燕則靣受河與海矣一河自安山渉汶濟即今之會通河一河自淮入汴入衛而俱會於天津然終元之世未甞事河而専于海者彼以時方紛攘終嵗用兵固無暇於事河也彼又以為河亦間有不如海者入閘則兩舟難並是不可速也魚貫逆遡一舟壞則連觸數十舟同時俱靡若火則又甚也是不可避也一夫大呼則萬櫓皆停此腰脊咽喉之譬先臣丘濬載在衍義補者是不可㪚也若我朝太平重熈累洽主於河而恊以海自可萬萬無慮故都燕之受海猶慿左臂從腋下取物也元人用之百餘年矣梁秦用之所不得望也此臣所謂都燕専勢也黄河西来禹之故道雖不可考然不過自三門而東出天津入海是腹雖稍南而首尾則東西相衡也至宋時直獵大名則已稍南矣我朝𢎞治二年决張秋奪汶入海是其首猶北向也乃今則直南入淮而去嵗之决閻家口支出小河近符離靈壁則又㡬正南西北而直東南途益逺而合諸水益多則其勢大而决未可量也故以漢武之雄才尚自臨决塞王安石之精愽且開局講求河之為立國病詎直今日然哉且如去年之漂大臣之與國同休及小臣之有志於世者聞之有不變色於河之梗而又不能無難色於海之通則計將安出歟富人之造宅則旁啟門焉防中堂有客而肴核自旁入也此臣所謂目前急勢也臣誠愚淺如該科條議慮之應熟豈其肯誤聖明乃風波係天數臣亦不能逆覩其必無然臣以為趨避占候使其不爽當不足以妨大計故敢緣科臣建議而詳布其愚有所請銀造舟張官改額皆係更􅒰統乞聖明采擇一計程限第一程自淮安府開船至八套口共計三百餘里係河道為一程第二程自八套口開船至鶯遊山共約二百四十里用東南風一日為一大程如風不便九十里可投五丈河又西北一百二十餘里可投狹口灣泊容船伍百餘隻第三程自鶯逰山起東北逺望瑯玡山前投齋堂島灣泊約四百里用西南順風一日可到為一大程島西面泥灘三里可容船百餘隻如船多島東北三十里有龍灣口可泊船二百餘隻中間所過水面東北濤落口約一百九十里可容船十餘隻又至夾倉口二十里可容二十隻廻避望海石又東至石臼海口三十里可容船六七隻廻避石臼攔胡家攔曲伏桃花攔又東至龍王口四十里可容船三十隻廻避黄石攔又東至龍潭二十里可容船百餘隻木𤓰島又東至二十餘里廻避胡家山以上堪灣泊海口五處應廻避七處俱用西南風廻避西北風其餘滴水口沙灣口二處係西南徑過避路如遇𦂳急亦可灣泊第四程自齋堂島處開船正東由膠州靈山島東北望逺勞山前投福島灣泊共約二百餘里用西南順風半日可到為一大程此島方圓二十里南有泥灘二里半可灣船六七十隻如船多島迤西五十里董家灣濶大堪灣船三百餘隻中間所過水靣東四十里回古鎮海口可容船三百餘隻廻避海子嘴又東至靈山島五十里島西南嘴可容船二十隻廻避東北正東風島東北鼓樓圈容船十餘隻廻避正北西北風此處雖可容船不宜乆住有東北至唐島六十里可灣二百餘隻避東北正東北風廻避露明石又東至小青島五十里可容船三十隻避正北東北風又至董家灣六十里廻避捉馬嘴以上堪灣泊海口五處應廻避三處俱用西南風避西北正北東北風第五程自福島開船東二里廻避老君石逺望田横島約一百五十里用西南順風為一大程半日可到此島方圓三十里可容船二百餘隻如船多島東北十里有濶落灣容船二百餘隻中間所過水面東北由小管島六十里可容船二十隻又東大管島十里可容船可十餘隻又東至田横島七十里以上堪灣泊二處廻避一處餘有淮口可容船十餘隻係背路遇𦂳急亦可灣泊第六程自田横島由青黄島逺望槎山前投𤣥真島灣泊共約四百餘里用西南順風一日可到為一大程島東西長五里遇北風灣南面遇東風灣北圈可容船百餘隻東北岸下水底三孤石旁多隐石該廻避遇船多島迤西五里朱家圈可容船百餘隻又西五里宋家圈與草島前可容船五六十隻中間所過水面東十二里濶落灣容船二百餘隻又東至楊家溝三十里可容船三十餘隻又東至十里廻避劉家嶺又東至草島嘴三十里可容船五六十隻又東至青島三十里西圈可容船十餘隻又東至黄島三十里西南灘可容船十餘隻又東北至宫家島三十里可容船三四十隻又東徑過蘇島王至𤣥真島朱家等圈一百五十里廻避朱家圈西栁溝與沙嘴𤣥真島西嘴與島東岸三孤石以上灣泊六處廻避五處其餘行村寨馬公島與何家馬頭乳山寨上港口及靖海衛北張濛島皆是背路去處如遇𦂳急亦灣泊廻避靖海排义石裏島娘娘廟嘴第七程自𤣥真島開􅊑稍放洋行東轉杵島嘴北過城山頭西北望威海山前投劉公島灣泊二百四十餘里用南風為順風一日可到為一大程容船六七十隻如船多島迤西十里威海東門口教塲頭塢口可容船三四百隻中間所過水面東至鏌鎁島西頭季家圈三十餘里可容船二三十隻避東北東南風南三里廻避􅈨石又東三里鹿島可容船一二十隻避北風與東風又東七八里廻避凹屋港又東十五里廻避黒石島又北十餘里廻避楊家墳又北二里廻避餓狼鴟石又西北四十餘里飬魚池可容船二百餘隻避東風與東北風又東北二十餘里黄埠嘴可容船二百餘隻避東北與北風又東南一里廻避成山頭又東七八里廻避殿東頭此二處稍險須放洋逺廻避過此轉西三十餘里駱駝口圈裏東岸下可容船七八十隻避東北風又西三里李叢嘴可容船二三十隻避西北風又西十五里栁夼海口可容船五六十隻避西北東北風