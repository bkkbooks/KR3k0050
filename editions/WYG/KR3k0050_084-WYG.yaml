body:
  text: 圖書編卷八十四明章潢撰皇朝爵禄沿革厯代總考封建沿革曰黄帝分州畫野得百里之國萬區唐虞列為五等此封建之始也禮含文嘉曰殷爵三等周五等或謂黄帝立五等也品秩自太昊以龍紀官唐虞建官惟百未分品秩周官以九儀正邦國自一命至九命漢自中二千石止二百石魏陳羣立九品官人之法北齊九品本分正從國朝正一品太師太傅太保從一品少師少傅少保太子太師太傅太保正二品太子少師少傅少保正三品太子賔客不專授但為大臣加官兼官及贈官其餘官品見官制入流通典曰隋制九品自太師始焉謂之流内國朝正從一品至九品謂之入流即流内也未入流通典曰唐有流外勲品自諸録事及五省内史始焉國朝九品之外雜職官員未入流即流外也文散官漢諸侯有功徳優盛朝廷所敬異者賜位特進三公下隋文帝以為散官今正一品初授進榮禄大夫至從九品登仕佐郎止見官制盖初授散官俱於三年之後照例陞授其加贈考騐本人生前功績合得加授者照例給與武散官周禮天子六軍其將皆命卿盖在國稱大夫在軍稱將軍自晉獻公作三軍而公將上軍故有將軍之名今為散官正從一品同文官正二品初授驃騎將軍至從六品校尉止見官制文勲周禮王功曰勲齊梁始有勲品本酬將士其後漸及朝流楚寵官有上柱國唐以為勲官今自正一品左右柱國至從五品庶尹止見官制武勲後魏有柱國大將軍今正從一品同文勲秦有䕶軍都尉唐上大將軍為上䕶軍大將軍為䕶軍至從六品騎都尉止見官制封贈武王克商追王太王王季故後代有追諡追封之典兩漢逮今人臣亦有追贈之制漢宣帝思張賀掖庭収養封恩徳侯此追封之始也國朝文官贈一品贈三代二品三品二代四品至七品一代各照見授職事依例封贈國家以爵三等酬武功以官九品熈庶績各有號開國武功曰開國輔運推誠宣力功臣文曰開國輔運推誠守正文臣靖難武功曰奉天靖難推誠宣力功臣文曰奉天靖難推誠守正文臣宣徳後征討功曰奉天翊運推誠宣力功臣文曰奉天翊運推誠守正文臣有品俱上有階文官正一品初授特進榮禄大夫陞授特進光禄大夫從一品初授榮禄大夫陞授光禄大夫正二初授資善大夫陞授資政大夫加授資徳大夫從二初授中奉大夫陞授通奉大夫加授正奉大夫正三初授嘉讓大夫陞通議大夫加正議大夫從三初授亞中大夫陞中大夫加大中大夫正四初中順大夫陞中憲大夫加中議大夫從四初朝列大夫陞朝議大夫加朝請大夫正五初奉議大夫陞奉政大夫從五初奉訓大夫陞奉直大夫正六初承直郎陞承徳郎從六初承務郎陞儒林郎以吏入銓者授宣徳郎正七初承事郎陞文林郎吏宣義郎從七初從仕郎陞徴仕郎吏同正八初廸功郎陞脩職郎從八初廸功郎陞修職郎正九初將仕郎陞登仕郎從九初將仕佐郎陞登仕佐郎其有官無階曰未入流武正一從一階同文正二初授驃騎將軍陞授金吾將軍加授龍虎將軍從二初授鎮國將軍陞授定國將軍加授奉國將軍正三初昭勇將軍陞昭毅將軍加昭武將軍從三初懐逺將軍陞定逺將軍加安逺將軍正四初明威將軍陞宣威將軍加廣威將軍從四初宣武將軍陞顯武將軍加信武將軍正五初武徳將軍陞武節將軍從五初武畧將軍陞武毅將軍正六初昭信校尉陞承信校尉階止此凡初入官初改官不授階初考曰初授再考稱職曰再授三考曰加授有勲文武正一左柱國右柱國從一皆柱國文正二正治上卿從二正治卿正三資治尹從三資治少尹正四贊治尹從四贊治少尹正五修正庶尹從五恊正庶尹下無文官再考乃授勲武正二上䕶軍從二䕶軍正三上輕車尉從三輕車尉正四上騎都尉從四騎都尉正五驍騎尉從五飛騎尉正六雲騎尉以下俱無有禄俸武功公侯伯嵗支禄米多者五千石少至七百石文武正一品月支米八十七石從一月支米七十四石正二月支米六十一石從二四十八石正三三十五石從三二十一石正四二十四石從四二十石正五一十六石從五十四石正六十石從六八石正七七石五斗從七七石正八六石五斗從八六石正九五石五斗從九五石盖嵗五十石未入流者月支三石而勲階惟空名惟給俸視品乃職司若所𨽻屬獨視官為權重即品無論矣俸自正一品嵗千石逓而降至從九品嵗五十石而止品髙者給豐尋定制在京一品至五品實支十之三六品至九品實支十之四餘給鈔俸約者支稍從實以權之從鈔折閱不行而留都官抄鈔十之八入愈薄難供矣外實支視各省府額無常亦有職田然甚少頗不足給焉皇朝官制沿革歴代總考聖祖鑒秦人弄權之禍而罷丞相懲元人稱亂之轍而革中書吏部列於六部所以防其自專之漸五府參乎兵部所以昭其相制之權都察院與六卿為伍振風紀也大理寺與刑部持衡重民命也御史不屬于大宰六科不列于它官使得自達而作其敢言之風也至於尉院寺監並列於内都布按司錯置于外府州縣衛分𨽻其間文武相參上下交制盖遵周官之法而酌其宜取漢唐宋之善而去其弊可為萬世法矣宗人府周禮少宗伯掌三族之别以别其親疎漢因秦制置宗正以叙九族以皇族為之唐龍朔改為司宗光宅改為司屬後竟復舊宋有知大宗正以皇兄皇侄為之又有睦親廣親宅都大管勾三人以内侍充元豐中詔宗正貳長不專用國姓盖自有大宗正司以統皇族也有玉牒所設局置官始于淳化中倣唐制也故事以首相領之自後相府有闕則以首參兼領仍帯權字宰相在位而執政權領寶訓玉厯則自仲至始也皇朝宗人令一人掌皇九族六親之屬籍以時修其玉牒書宗室子女適庶名封生卒婚嫁諡𦵏凡宗室陳情為聞上逹材能録罪過左右宗正各一人為之貳經厯一人典出納文移按自漢而下列宗正於九寺之中非堯典首叙睦親之意我聖祖特立宗人府居六部之上其秩一品得此道矣初置大宗正院後改為宗人府以秦王為宗人令晉王燕王為左右宗正周王楚王為左右宗人已而用勲戚大臣攝府事不備官公孤尚書大𫝊曰古者天子必有四鄰前曰凝後曰丞左曰輔右曰弼天子有問無以對責之凝可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視次國之君記曰虞夏商周有師保有疑丞設四輔及三公不必備惟其人語使能也周官曰立太師太傅太保茲惟三公論道經邦爕理隂陽官不必備惟其人少師少傅少保曰三孤孤特也言卑于公尊于卿特置此三人貳公𢎞化寅亮天地弼予一人保者保其身體傅者傅之德義師者道之教訓漢初惟有太傅太尉而所謂三公者丞相太尉御史大夫也後加置太師太保大司徒大司空哀帝時議以漢舊無司徒故定三公之號曰大司馬大司徒大司空按史記曰公孫𢎞以春秋白衣為天子三公漢初因秦置丞相而𢎞為之則丞相為三公矣通考曰成帝拜曲陽侯王根為大司馬而何武自御史大夫改為大司空皆金印紫綬比丞相則三公俱為宰相矣後漢惟有太傅一人謂之上公及有太尉即司馬司空司徒為三公而無師保漢制朝臣見三公皆拜天子御座即起在輿為下至安帝時三府任薄選舉誅賞一由尚書其災𤯝變咎則責免公台獻帝時罷三公官晉八公同時並置太宰太𫝊太保太尉司徒司空大司馬大將軍所謂八公同辰攀雲附翼者也按太尉司徒司空自漢歴魏皆為三公及晉迄於江左相承不改太傅為上公亦不改自是南北朝或專有太傅陳或並為贈官陳開黄閣聽事置鴟尾有三師太師太傅太保二大大司馬大將軍三公太尉司徒司空之名有三公三孤四輔之别至隋則廢三師官矣唐復置三師三公並無其人凡三師官雖有其位而無其人亦不置官屬五代時多以畀藩鎮及贈官宋承唐制以太師太傅太保為三師太尉司徒司空為三公為宰相親王使相加官而太師則為異數自趙普以開國元勲文彦博以累朝耆德方特拜焉雖太傅王旦司徒吕夷簡各任宰相二十年止以太尉致仕政和中徽宗詔以太師太傅太保古三公之官今為三師古無此稱今依三代為真相之任司徒司空周六卿之官太尉秦主兵之官皆非三公並宜罷之仍考周制立三孤少師少傅少保亦稱三少為次相之任至是蔡京始以三公任真相按政和至於宣和所授三公之官不獨非人名體亦未正如鄆王肅王為之則以子為師傅矣童貫為之則以厮役為師傅矣朱文公嘗言公孤之職舊惟文臣有勲德者除後世或以王子或以武臣如張韓劉岳是已既曰天子之子曰武臣豈可任師傅之責耶嗚呼以童貫猶為之則武臣無論已宋輕師傅之官弊一至此哉皇朝初置三公府而李善長徐逹以丞相兼太師太傅常遇春以上公贈太保三孤無兼領者成祖罷三孤官仁宗復設太師太傅太保曰三公少師少傅少保曰三孤侍上左右備顧問咨機務無定員無專授為勲戚文武大臣兼官加官贈官文官惟贈得三公嘉靖初楊廷和加太傅辭不授其太子太師太子太傅太子太保太子少師太子少傅太子少保太子賔客已上皆東宫官亦不專授但為大臣兼官加官或贈官耳丘氏濬曰昔大舜命伯禹總百揆髙宗爰立傅說作相未有公孤之名成周之世則特設公孤之職而乃無揆相之名意者立公孤而以六卿兼之是即揆相之任歟我朝稽古定制革去前代中書省倣六典立六部而公孤之職間以六卿兼之其亦成周之意也中書省及宰相殿閣學士我朝實合三者為一按前代有中書之官通考以為周官内史之職盖自漢武帝游宴後庭始以宦者典事尚書謂之中書謁者置令僕射成帝時更以士人為之魏晉以來中書監令掌贊詔命記會時事典作文書以其地在樞近多承寵任是以人固其位謂之鳯凰池荀朂久在中書例遷尚書令人有賀者朂怒曰奪我鳯凰池諸公何賀焉唐初遂為三省長官居真宰相之任龍朔改中書令為右相入宋其位益尊叙班至在太師之上然只以為親王及使相兼官無專授者見任宰相侍中者惟范魯公質以下五人而已宰相之名自黄虞以來曰六相曰十六相成湯相伊尹仲虺武丁相傅說周時召公為保周公為師皆其任也相國丞相之名始自嬴秦而漢亦有左右丞相至哀帝而廢獻帝時始復置而以曹操為之魏晉以來或有相國或有丞相省置無恒而中書監令常管機要多為丞相之任由是丞相反不為宰相之任而常為禮代之階矣唐初始定制以三省為宰相之司存以三省長官為宰相之職任然省分為三各有所掌而其官亦不復一相職既尊無所不統則不容拘以一職於是始有同中書門下三品同平章事參知機務參預政事之名然所謂同平章事者唐初乃以處資淺之人中世以後乃獨為真宰相之名至宋元豐以前皆然然宰相者總百官弼天子既不當儕之他官而其上又不當復有貴官自唐開元以來郭元振李光弼相繼以平章事為節度使謂之使相而宰相之職儕於他官自此始自宋元祐以後文潞公吕申公相繼以平章軍國重事序宰臣上而宰相之上復有貴官自此始然李郭以勲臣名將為之宜也自此例一開於是田承嗣李希烈之徒以節鎮帶同平章事者非一人極而至於王建馬殷錢鏐之軰蠭起盗地者皆欲效之矣文吕以碩德老臣為之宜也自此例一開于是蔡京王黼相繼以太師總知三省事三日一朝赴都堂治事以至於韓􅇑胄賈似道擅權專政之久者皆欲效之矣盖平章之始立名也本非甚尊之官及其久也則強藩權臣皆為之而居之者多非其人矣若唐以前亂賊逓相承襲以為竊取大物之漸又其甚者由是言之則我聖祖之見豈不誠𢎞逺哉殿閣學士者唐始設集賢殿學士後改為麗政殿學士雖繫中書省然特掌刋輯經籍而已其後多不置至後唐明宗即位之初命樞密使安重誨進讀懵于文義孔循獻議始置端明殿學士命馮道趙鳯俱以翰林院學士充班在翰林學士上後又轉改止于翰林學内選仕始尊矣宋因設觀文殿大學士資政殿大學士端明殿大學士資望極峻無吏守無典掌惟出入侍從備顧問而已觀文殿大學士非曽為宰相不除與資政殿學士並以寵輔臣之去位者端明殿學士惟學士久次者始除其後以待簽樞云中書省正一品初設左右相國洪武元年改左右丞相有丞屬而中書舎人為多是年始置六部分理國事而總之中書十一年禁六部奏事不得關白中書省十三年誅右丞相胡惟庸詔罷中書省存中書舍人六部分領中書之政二十八年上座奉天門勅文武羣臣自古三公論道六卿分職自秦置丞相而亾漢唐宋因之雖有賢相然多小人專權亂政我朝罷丞相設五府六部都察院通政司分理天下庶務彼此頡頏不敢相壓事皆朝廷總之所以穩當以後嗣君並不許立丞相臣下敢有奏請設立者文武羣臣核奏處以重刑先是洪武十五年倣宋制置殿閣學士吏部尚書邵質華盖殿翰林學士宋訥侍左右備顧問未與機務至成祖首用翰林解縉編修黄淮修撰胡靖編修楊榮楊士竒檢討胡儼金㓜孜七人入内閣名直文淵閣始預機務仁宗又設謹身殿大學士于是大學士有華盖謹身武英三殿及文淵閣東閣皆在内閣曰辨事避丞相稱而本官上又加以卿佐師保之名焉若東閣文淵閣大學士不得入内閣亦不得預機務也嘉靖壬戌新建三殿成詔改奉天殿為皇極殿華盖殿為中極殿謹身殿為建極殿而大學士之稱隨之凡直文淵閣入内閣預機務出納帝命奉陳規誨獻告謀猷㸃檢題奏擬議批答以備顧問平庶政不得專制九卿事九卿奏事亦不得相關白凡上所下一曰詔二曰誥三曰制四曰勅五曰册六曰諭七曰書八曰符九曰令十曰檄皆審署申覆而調劑焉平允乃行之凡下所上一曰題二曰奏啟三曰表箋四曰講章五曰書狀六曰文册七曰掲帖八曰制對九曰露布十曰譯皆審署申覆而修畫焉平允乃行之凡國家大典禮大政令大事機皆得以預聞謨謀既定然後付所司行之盖不與之以相之名而與以相之實也夫不與之以名則下無作福作威之柄予之以實則上頼詢謀咨訪之益聖祖之貽謀逺矣吏部周官冢宰掌邦治統百官均四海周禮天官太宰掌建邦之六典以佐王治邦國按六典者五官與太宰各司其一大宰專於治典而已然教禮政刑事五官實聽焉盖雖各列其目而實統之也漢成帝罷中書置尚書五人一人為僕射有常侍曹主公卿事後漢改為吏曹後又為選部唐龍朔中改吏部尚書為司列太常後又改吏部為天官又改為文部盖自魏晉以來凡吏部屬官悉髙于諸曹其選舉皆尚書主之自隋置侍郎二尚書之事則六品以下銓補多以歸之矣宋初典選之職分為四而元豐又更定制度尚書侍郎左右選授勲封考課之政令凡各十五案選法宻矣聖朝設尚書一人掌官吏選授勲考課之政令左右侍郎各一人為之貳其屬有文選驗封稽勲考功四清吏司文選郎中一人員外郎一人主事一人掌官吏選陞改調之事驗封郎中一人員外郎一人主事一人掌封爵襲䕃褒贈吏筭之事吏筭謂以功撥差其筭也稽勲郎中一人員外郎一人主事一人掌勲級名籍䘮制之事考功郎中一人員外郎一人主事一人掌官吏考課黜陟之事司務二人省署抄目受發文移五日一奏上三月引監勤奏登選諸部司務皆如之本部銓選凡二萬四千六百八十三人京師一千四百一十六人南京五百五十八人外二萬二千七百九人户部周官司徒掌邦教敷五典擾兆民蔡沉曰地官卿主國教化敷君臣父子夫婦朋友五者之教以訓擾兆民之不順者而使之順也周禮地官大司徒之職掌建邦之土地之圖與其人民之數漢成帝初置尚書四人其一人主財帛委輸按通典通考所言如此嘗考東漢百官志尚書四人分為四曹常侍曹主公卿事二千石曹主國郡二千石事民曹主凡吏部尚書事客曹主外國夷狄事光武分二千石曹又分客曹凡六曹無所謂主財帛委輸者盖當時錢榖貨幣皆掌于大司農也至魏文帝始置度支尚書事專掌軍國支計呉有戸部而晉有度支皆主筭也隋改度支為民部唐以民部為户部又改為度支又改為司元大常伯為地官復為户部宋為户部判部事一人以兩制以上充凡户口田産錢榖食貨之政皆歸於三司謂鹽鐵户部度支也本曹但受天下之土貢元㑹陳於庭而已至元豐官制罷三司而其事始歸户部左右曹云皇朝尚書一人掌户口田賦貢役經費之政令左右侍郎各一人為之貳永樂後添設提督倉塲侍郎或尚書一人其屬浙江以下十三清吏司各掌其分省兼領京師直𨽻之事各郎中一人員外郎一人主事一人添設浙江湖廣廣東福建河南四川廣西貴州司各主事三人山東司郎中一人主事三人陜西司郎中二人主事三人山西司郎中三人主事四人雲南司主事四人條為四科曰民曰度支曰金曰倉司務二人照磨所照磨一人檢校一人所屬衙門寳鈔提舉司抄紙局廣積庫承運庫廣盈庫大庫銀庫節慎庫印鈔局寳盈局御馬倉張家灣檢校批驗所寳鈔廣惠庫賦罰庫甲乙丙丁戊字庫外承運庫行用庫軍儲倉提舉倉庫局所大副使各程其出納簿錄其行績聽户部凡本部所掌賦役稽勾版籍歲㑹實徴十歲攢黄册册有丁有田丁有役田有租田曰官田曰民田凡二等租曰夏稅曰秋糧凡二等丁有力役有僱役計其丁田為差凡鹽存積十二常股十八召商輸芻粟左邉十八次支十二凡頒祿俸糧廩兼本折色本色母過十六折色母過十五凡漕運曰支兊曰改兊支兊十八改兊十二凡貯粟曰京倉曰通倉京倉十八通倉十二凡藏銀曰内帑曰大倉内帑十二大倉十八凡兵農曰屯田曰營民屯田十八營田十二凡邉儲曰田賦曰鹽賦田賦十六鹽賦十四邉有行郎中曰邉郎掌出納邉儲禮部虞夏之時秩宗典三禮周官宗伯掌邦禮治神人和上下蔡沉曰春於四時之序為長故其官謂之宗伯成周合樂於禮官謂之和者以樂而言也周禮春官大宗伯掌建邦之天神人鬼地祗之禮後漢尚書吏曹兼掌齋祀亦其職也魏晉以下多稱祀部至隋因後周禮部之名而兼前代祠部儀曹之職唐龍朔中改禮部尚書為司禮大常伯後又改為春官尋復舊宋禮部判部事二人以兩制及帶職朝官以上充凡禮儀之事貢舉之政各有所歸及官制行始正其職凡關於禮樂者皆掌之皇朝尚書一人掌禮樂貢舉封建朝貢祭祀宴饗術藝道佛之政令左右侍郎各一人其屬儀制祠祭主客精膳四清吏司各郎中一人主事二人提督四夷館主客主事一人司務二人所屬衙門鴻臚寺司儀署司賔署行人司鑄印局教坊司本部所掌凡一切大朝賀大册封儀節及百官位次章奏凡監學規條歲貢鄉試㑹試及廷試賜進士及第出身有差凡宴禮三曰大宴中宴小宴郊宴最大凡射禮二曰大射曰宴射凡祭三曰天神曰地祗曰人鬼辨其大祀中祀小祀之異凡喪禮五曰斬衰曰齊衰曰大功曰小功曰緦麻辨其同姓九族異姓親疏之等凡樂曰中和詔樂曰堂下樂曰陛樂曰侑食樂曰大雅樂雅樂領之大常而俗樂則領之奉鑾凡番夷辨其五年三年二年比年再至之貢以均賜賞凡膳羞領之光祿而㑹其數程其出納及番夷土官下程之等凡欽天厯象廟寢饗薦葬祭謚贈卜筮醫藥道佛之事四司各率其職以贊尚書兵部周官司馬掌邦政統六師平邦國蔡沉曰軍政莫急於馬故以司馬名官何莫非政獨戎政謂之政者用以征伐而正彼之不正王政之大者也平謂强不得凌弱衆不得暴寡而人皆得其平也周禮夏官大司馬之職以九伐之法正邦國按九伐之法馮弱犯寡則𤯝之賊賢害民則伐之暴内凌外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令凌政則杜之外内亂鳥獸行則滅之是已則司馬之職乃掌兵以討亂者也故吳澄謂制畿封國設儀辨位進賢興功建牧立監等事以為非司馬之職釐而正之亦一見歟漢置五曹未有主兵之任盖有太尉掌之也魏始置五兵尚書謂中兵外兵騎兵别兵都兵也若周禮五兵則戈殳㦸酋矛夷矛也魏晉尚書有駕部郎後周為大司馬隋為兵部尚書唐龍朔中改為司戎太常伯又改為夏官又改為武部選舉亦為三銓制如吏部宋兵部判部事一人凡兵籍武官軍師卒戎之政令悉歸於樞宻院其選授小者又歸三班本曹但掌三駕儀仗鹵簿等儀及歲終以義勇兵箭手塞兵之數上于朝而已元豐更制惟民兵馬政權𨽻樞宻院武官銓選并歸吏部矣皇朝尚書一人掌武衛官軍選授簡練鎮戍廐牧傳郵輿皂之政令左右侍郎各一人為之貳其屬武選車駕職方武庫四清吏司各郎中一人員外郎一人主事一人添設武選郎中一人主事四人車駕郎中一人主事二人職方郎中一人主事四人武庫主事二人守山海關職方主事一人司務二人所屬衙門京衛武學典牧所㑹同館大通關本部所掌凡世武官曰指揮使同知僉事正副千户衛鎮撫實授試百户所鎮撫凡流官都督三等不得世即有世者出特㤙凡歲六銓官二等曰舊官曰新官皆有流有世凡首功四等曰北敵曰遼東女直曰西畨苖蠻曰内地反賊凡戰功二等曰竒功曰首功凡賞三等曰加賞曰給賞曰量賞凡土官六等曰宣慰宣撫招討安撫長官千夫長凡馬政三曰民牧曰衛牧曰京府寄牧凡傳郵二曰驛曰逓運所在京師曰㑹同館凡設官都督府五都指揮使司二十一留守司二衛四百九十一守禦屯田羣牧千户所三百十一儀衛司三十二宣撫招討宣慰安撫長官司九十五畨夷都司衛所四百七凡將校五等曰鎮守曰恊守曰分守曰守備曰備倭其官稱曰總兵曰副總兵曰參將曰遊擊將軍曰都指揮曰行指揮事凡六等監以都御史曰贊理軍務凡簡練三營曰五軍練五軍將士曰神樞司旗纛曰習火器統以文武大臣曰總督京營戎政曰協理京營戎政嘉靖間添設本部協理戎政侍郎或尚書一人凡有征討命將出師請命文武大臣曰提督曰總制丘氏濬曰宋以樞宻府專掌兵政與中書省謂之兩府令制設兵部以掌兵政所以統軍旅而專征伐則歸之五軍都督府焉兵部有出兵之令而無征伐之權五軍有統兵之權而無出兵之令彼此相維内外相制盡善極矣刑部舜典帝曰臯陶蠻猾夏㓂賊奸宄汝作士周官司㓂掌邦禁詰姦慝刑暴亂周禮秋官大司㓂掌建邦之三典以佐王刑邦國按鄭𤣥註曰㓂者害也司冦掌刑而屬於秋官秋者天氣肅殺而刑以義為主也三典者一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典盖辟地立君之國其民未習於教宜以柔克治之承平守成之國其民已熟于教宜以正直治之簒弑叛逆之國其民不率於教宜以剛克治之使不敢為惡所謂惟敬五刑以成三德者非耶漢成帝時尚書増置三公曹主斷獄光武改二千石曹為賊曹掌中都水火盗賊詞訟罪法重于諸曹魏晉而下多置都官尚書後周為秋官大司㓂隋初為都官尚書唐龍朔改為司刑太常伯又改為秋官又為憲部宋刑部判部事二人又有審刑院元豐中官制行刑部始專其官皇朝尚書一人掌刑名徒𨽻勾覆關禁之政令左右侍郎各一人為之貳其屬浙江以下十三清吏司如户部之制各掌其分省及兼領京府直𨽻之事仍各分為憲比司門都官四科各郎中一人員外郎一人主事二人漕運理刑主事一人司務二人照磨一人檢校一人司獄六人本部所掌律凡六百有六條例凡三百七十有六條律例所不及者比而議請焉凡象刑之名五曰笞杖徒流死二等流三等徒杖笞並五等熟惡之戮十曰謀反謀大逆謀叛惡逆不道大不敬不孝不睦不義内亂凡原宥之議八曰親故功賢能勤貴賔凡貪墨之贓六曰監守盜常人盜竊盜枉法不枉法坐賍凡獄具七曰笞杖訊枷扭索鐐凡秋决並三覆奏凡獄成移大理寺讞而平焉工部舜典帝曰疇若予工僉曰垂哉帝曰俞咨垂汝共工帝曰疇若予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞周官掌邦土居四民時地利按虞時垂為治百工之官益為掌山澤之官故各咨而命之至周司空掌營國邑而山虞林衡川衡澤虞之官皆屬之盖各為一官東漢以後莫不然故並紀之見後世冬官所自起云周禮冬官屬有考工掌百工之事曰國有六職百工其一焉漢成帝初置尚書有民曹主凡民吏上書光武改民曹主繕修功作鹽地園苑魏置左民尚書亦領其職晉宋以來有起部尚書而不常置後周為冬官大司空隋為工部尚書改為司平大常伯又改為冬官宋置工部判部事一人事皆𨽻三司本曹無所掌元豐官制行尚書始掌工部之政今皇朝尚書一人掌工役農田山川澤藪河渠之政令左右侍郎各一人為之貳易州厰侍郎一人其屬營繕虞衡都水屯田四清吏司各郎中一人員外郎一人主事二人添設郎中虞衡二人都水四人屯田一人員外郎營繕二人虞衡二人主事營繕四人都水八人司務二人所屬營繕所文思院軍器局皮作局寳源局鞍轡局廣積通積通州白河抽分竹木局織染所雜造局蘆溝橋抽分竹木局大通關本部所掌凡工匠二等曰輕班曰住坐凡工囚二等曰雜工凡採捕禽獸及骨革毛羽水課禽十八獸十二陸課獸十八禽十二凡軍器軍裝歲一造或三歲一造凡火器曰火車曰火傘曰神鎗曰將軍四等曰銃六等曰箭三等曰砲十二等凢水利曰漕運曰灌田凡橋梁曰舟梁曰石梁凡舟七等曰黄船曰馬快船曰海運船曰鮮船曰備倭船曰戰船曰糧船凡車三等曰大車曰小車曰戰車四司各分領其職以贊尚書六部在洪武初俱正三品衙門仍屬中書省十三年中書省革始陞六部尚書為正二品按秦少府遣吏在殿中主發書謂之尚書漢光武始分尚書為六曹秦以郎為内侍故曰侍郎隋煬帝于六曹各置侍郎一人秦以郎侍尉居中故曰郎中隋文帝于尚書二十四司各置員外郎一人謂本員之外復置郎也後魏於尚書諸司置主事令史隋焬帝但曰主事皆吏長之名也六部總論曰有虞九官成周六卿其實一也或析為二兵刑是也或合而為一禮樂工虞是也然虞官百周三倍之每卿三十屬六卿三百六十屬卿雖寡而副之者多也則周之六當虞之九豈遂畧於古哉總之也要而屬之也詳無繁無曠固無害其為善法已後世繁之弊則如杜佑之言曰官名職務遷易不同空存虚稱皆無事實故有二臯陶二垂二契二伯夷二伯䕫之說曠之弊則如陸長源之言曰兵部無戎帳户部無版圖虞水不管山川金倉不管錢榖光祿不供酒衛帟不供幕秘書不校勘著作不修撰官朝虛設俸祿枉請要之其為繁者乃其所以為曠也我朝六部統各司各司分掌天下之務如網之有綱如絲之有紀上下相承巨細畢舉其官屬雖無三百六十之多其間脉絡相通體統不紊於周官所謂六卿分職各率其屬以倡九牧阜成兆民者誠得其遺意矣且其事一歸於朝廷而不專任於一人是以二百年來上無紛更之弊而久安其政下無專擅之禍而各安其位如一日者豈偶然之故哉都察院周禮御史掌邦國都鄙及萬民之政令以贊冡宰凡治者受法令焉掌贊書凡數從政者按鄭注太宰以六典治邦國八則治都鄙八統治萬民治出於令而贊之以書者御史也盖内史出王命外史書外令御史為之屬則贊二官之書以百官班籍繫焉故亦以書數之此注似不誤即其數而數從政則察其不職者而使之各修其職亦贊書也此似因後世御史傳㑹其說或遂因書事而以之察官也戰國時亦有御史秦趙澠池之㑹各命書其事又淳于髠謂齊王曰御史在前則皆記事之職也至秦漢始為紏察之任所居之署漢謂之御史府亦謂之御史大夫寺亦謂之憲臺後漢以來謂之御史臺亦謂之蘭臺寺梁及後魏北齊或謂之南臺唐龍朔改御史臺曰憲臺咸亨復舊門北闕主隂殺也御史為風霜之任初漢故事選郡守相髙第為御史大夫任職者為丞相唐制御史大夫一人中丞二人其屬有三院一曰臺院侍御史𨽻焉二曰殿閣殿中侍御史𨽻焉三曰察院監察御史𨽻焉大事奏裁小事逹凡有彈劾御史以白大夫大事以方幅小事署名而已宋初沿唐制大平興國中以張㢲為監察御史正名舉職自此始元豐中以御史專領六察其後以中丞為臺長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史大夫無正員止為兼官而已皇朝元年設御史臺洪武十三年改都察院十七年始定設都御史即古御史大夫之職副都御史僉都御史即古中丞之職左右各一人職掌紏劾百司辯明寃枉提督各道凡事之不公不法者皆在所理凡勅差在外都御史或副僉都御史各奏勅行事大抵内地專職撫循邉鎮軍務為重其因事暫設者事畢而罷即遣尚書侍郎必兼都御史衘其屬浙江以下十三道監察御史有分道而無專官一人常兼數道河南道獨掌内外官考察之事河南浙江江西山東各十人福建廣東廣西四川貴州各七人陜西湖廣山西各十八人雲南十一人總之十三道職在紏劾百司照刷文卷問擬刑名廵按郡縣若經歴都事各一人典出入文移叙差御史司務二人典參謁受事照磨檢校各一人典磨勘卷宗司獄六人皆其屬也巡撫永樂間遣尚書侍郎少卿等官鎮守景㤗因與巡按不相統屬難以行事定為都御史巡撫兼軍務者加總督贊理掌糧餉者加總督兼理他如整飭邉備提督邉關及撫治流民等項皆隨事異名若邉境有事又有總督提督參贊贊理及經畧巡視之名總督陜西軍務一人總督宣大一人總督遼薊一人總督漕運兼巡撫江北一人總督糧儲兼巡撫江南一人總督南京糧儲一人提督兩廣軍務兼巡撫一人提保督南贑汀漳軍務兼巡撫一人提督紫荆三闗巡撫定一人提督鴈門三關巡撫山西一人總理河道又一贊理軍務兼巡撫陜西一人提督軍務兼巡撫浙江人提督軍務兼巡撫福建一人甘肅寧夏大同宣府遼東湖廣四川雲南貴州各一人整飭薊州兵備巡撫順天等府一人撫治鄖陽等處一人巡撫河南一人山東一人江西一人鹽法屯田督餉採木討賊禦敵總制經畧各巡視無常員近例或尚書侍郎治事於外者兼都御史以便行事事畢而罷御史差委國朝宣德二年差御史各處清軍天順二年奏准三年更替正統元年差御史提督南北直𨽻學校三年差御史巡視鹽課十三年差御史巡視京城成化三年差御史于陜西巡茶一年更代凡差委御史出巡追問審理刷卷等事都御史具事目請㫖㸃差在内則京畿道刷卷及巡視京營提督巡倉巡庫巡視光祿清恤監課在外則巡按清軍刷卷巡鹽巡河巡關巡茶印馬屯田捕盜盤糧勘事而遇有征行則有監軍紀功之差通政使司舜典帝曰龍朕塈讒說殄行震驚朕師命汝作納言夙夜出納朕命惟允朱子曰納言之官命令政教必使審之既允而後出則讒說不得行而矯偽無所託矣敷奏復逆必使審之既允而後入則邪僻無自進而功績有所稽矣周之内史漢之尚書魏晉以來所謂中書門下者皆此職也按朱子所謂納言之官即内史尚書中書門下之職者盖内史周禮掌叙事之法受納訪以詔王聽内治韋昭釋尚書曰尚猶奉也百官奉事當省按平處奏之故曰尚書通典言秦官在殿中主發書故謂之尚書尚猶主也漢初有六尚其一曰尚書此二職與納言相似惟所謂中書門下者則多掌機宻詔命所職㣲不同而宋門下省所掌者乃近納言之職宜詳之皇朝通政使一人掌出納帝命通逹下情關防諸司出入移狀奏報四方臣民實封及軍情聲息災異皆審署㕘覆而上下焉通政㕘議各一人左右㕘議各一人為之貳其屬經歴司經歴一人知事一人大理寺虞之士周之司㓂秦之廷尉皆掌刑之官漢初因秦稱景帝始更名大理武帝復為廷尉宣帝置左右廷尉然時尚未置刑曹尚書廷尉即主刑非特為評刑置也至本始中宣帝詔曰間者吏用法巧文寖深决獄不當其為置廷尉平於是選于定國為廷尉求明察寛恕黄霸等以為廷平後世以大理寺平允法司刑獄盖如此皇朝卿一人掌審讞允反刑獄之政令左右少卿各一人左右寺丞各一人其屬左右寺正各一人寺副一人評事四人凡刑部都察院十三道所問罪獄必俟平允然後法司定罪若不當罪駁回再訊必服乃决太常寺太常者亦唐虞伯夷秩宗兼䕫典樂及周宗伯之任也秦改曰奉常典宗廟禮儀漢初曰太常太常者王之旌也畫日月焉王者有大事則建以行禮官主奉持之故日奉常一說欲令國家盛大常存故曰太常以列侯忠敬孝慎者居之唐因隋曰太常龍朔為奉常光宅改為司禮尋復舊制屬太祝奉禮協律等官統大樂鼓吹太醫太卜諸祠等署宋初太常寺皆以禁林之長主判而禮院自有判院同判中興併省寺監獨存太常又命太常兼宗正皇朝卿一人掌祭祀禮樂之事總其官屬籍其政令以聽禮部少卿一人提督四夷館少卿一人掌譯書之事以聽於翰林寺丞二人首領官典簿二人屬官博士二人神樂觀提㸃知觀協律郎贊禮郎司樂天壇祠祭署地壇祠祭署祖陵皇陵孝陵長陵獻陵景陵裕陵茂陵大陵康陵十一祠祭署各有奉祀祀丞楊王徐王墳各有奉祀犧牲所有吏目皆屬焉光祿寺周禮天官膳夫為食官之長自膳夫以下有庖人内饔外饔烹人等官皆以上士中士下士為之屬於冡宰以掌王之食飲膳羞以養王及后世子即今光祿寺官之職然南北朝以來官則是而所職則非盖秦有郎中令掌宫殿掖門漢初因之至武帝始更名光祿勲後漢令所職同典三署郎更直執㦸宿衛居禁中郊祀之事掌三獻自魏晉以後無復三署郎而光祿不復居禁中梁除勲字謂之光祿卿北齊稱光祿寺置卿少卿兼掌膳食自此始矣唐改為司宰寺又改為司膳掌終獻行事領大官等四署宋仍為光祿寺判寺事一人其屬大官四局分𨽻御厨法酒庫中興後廢光祿併入禮部皇朝卿一人掌祭享宴勞酒醴膳羞之事辨其名數㑹其出入量其豐約以聽於禮部少卿二人寺丞二人其屬典簿二人錄事一人大官珍羞良醖掌醢各署正一人監事四人又有司牲局司牧局各設大使𨽻焉太僕寺周禮大司馬之屬有大僕下大夫也掌正王之服位王朝則前正位而退亦如之又掌路鼓之政而御僕御庻子皆其所受事者若戎僕齊僕道僕田僕則皆馭車之職也然周王命伯冏作大僕正訓之曰正於羣僕侍御之臣懋乃后德交修不怠盖侍御僕從最為親近亦有旦夕承弼之責焉漢大僕亦掌輿馬天子每出奏駕上鹵簿用大駕則執馭晉宋不常置唐改大僕為司馭又改為司僕宋大僕寺判寺事一人中興後廢大僕併入兵部皇朝卿一人掌牧馬之政令而聽於兵部少卿三人一人佐寺事一人督營馬一人督畿馬寺丞八人分理京衛畿府及山東河南六郡孶牧寄牧其屬主簿一人勾省文移常盈庫大使一人掌貯金馬鴻臚寺鴻臚之名應劭曰郊廟行禮贊導九賔鴻聲也臚傳也所以傳聲贊導也始自於漢盖因周官大行人掌大賔客之禮秦典客之職而改為之也建中時改大鴻臚為大行令其後竟復之而為屬官唐改為司文又改為司賔後復舊宋鴻臚寺判寺一人元豐始置卿丞所𨽻官屬十有二如太乙宫建隆觀之類中興後廢鴻臚入禮部皇朝初為侍儀司三十年始改為鴻臚寺外夷通事𨽻焉卿一人掌朝㑹賔客吉凶禮儀之事左右少卿寺丞各一人為之貳其屬主簿一人司賔司儀署各署丞一人鳴贊八人序班五十四人詹事府左右春坊司經局凡三王教世子審父子君臣之道以示之少傅奉世子以觀太傅之德行而審諭之師也者教之以事而諭諸德者也保也者慎其身以輔翼之而歸諸道者也所謂教太子者如是焉正矣秦漢以下始加置詹事應劭曰詹省也給也中庶子按此亦因周禮諸子之官盖周時國子屬太子為國之貴游諸子之官則職國子之倅掌其戒令與其教治國有大事則率國子而致于太子惟所用之然實非太子官屬也及諸府寺等官亦有以他官而監䕶者自魏以後久曠東宫制度缺廢官司不具至隋分東宫置門下坊典書坊以分統諸局唐始置詹事府左右二春坊而庶子中允諭德贊善舎人錄事之官備矣宋仍唐制東宫有六傅下至率更令僕然官存而無職司至道中建儲闈始置職司而並以他官兼充及太子登極則省春坊司累朝皆然皇朝東宫大臣曰太子太師太子太傅太子太保太子少師太子少傅太子少保太子賔客然不列於詹事府無定員無專授為大臣兼官加官或贈官而已若以輔導東宫為職而實東宫官者則詹事府詹事一人少詹事二人為之貳凡侍東宫講讀暨坊局翰林院畨直凡講讀畢上所處分府部軍政要務及撫諭四夷恩義率其僚屬暨坊局陳設于東宫府院官得互兼凡試士修書皆與焉坊局亦如之主簿一人典勾㑹文移檢稽脫失錄事一人佐之通事舍人二人典東朝參謁辭見之禮及承令問勞之事左右春坊大學士各一人典東宫上奏請及下啟箋講讀之事審慎而監省之左右庶子諭德中允贊善各一人凡東宫監國撫軍出狩及朝㑹出入覆啟畫諾審署移詹事凡諸詳𤯝若伶僕改變新聲導逢非禮者必陳古義申典制紏正而請斥之凡内外庶政可為規諷者隨事贊諭焉左右司郎各一人掌彈劾宫僚紏舉職事左右清紀郎各一人㕘佐之左右司諫各一人掌箴誨監戒之事參司經局洗馬一人掌經史子集制典圖書刋緝之事立正本副本貯本以備進覧凡天下圖册上東宫者皆受而藏之校書正字各一人掌繕冩裝演經史子集典制圖書正其誤繆調其音切以佐洗馬國子監周禮師氏以三德三行教國子凡國之貴游子弟學焉保氏養國子以道教之以六藝六儀漢制博士至東京凡十四人而聰明有威重者一人為祭酒謂之博士祭酒胡廣註曰凡官名祭酒皆一位之元長古者賔得主人饌則老人舉酒以祭此國子祭酒名之所自始也晉初立國子監又立大學齊梁改祭酒為國師凡國學官自漢以下並屬太常至隋始革之又改寺為學初北齊號國子寺焬帝改為國子監唐龍朔中改為司成館祭酒為大司成光宅改為成均監宋國子監有判監事有勾管監事崇寧立辟雍置大司成總辟雍太學之政令國初為國子學陞博士許存仁為祭酒洪武六年増廣監子生諭禮部祭酒乏人其詢天下名士通今博古才德堪為人師者以名聞十五年始改國子學為國監十六年宋訥為祭酒命曹國公文忠領國子監事車駕時時臨視以故國官不得中㕔而坐中門而行已上皆國子監本原監制若彛倫堂若左右繩愆㕔若率性修道誠心正義崇志廣業六堂則兩畿同焉祭酒一人掌國學舉人貢生官生恩功生例生夷生㓜勲臣教訓之事司業一人為之貳其屬監丞一人坐繩愆㕔領監事博士五人坐博士㕔分經訓教助教十五人學正十人學錄七人坐六堂專職教誨其典簿典籍掌饌各一人翰林院漢制尚書郎主作文書起草五日一美食下天子一等雖無代言之名其端巳見於此矣唐制乗輿所在必有文詞經學之士自太宗時名儒學士時時召以草制然猶未有名號乾封以後始召文士元萬頃等草諸文詞常于北門候進止時人謂之北門學士𤣥宗初制翰林待詔掌四方表疏批答應和文章既而又以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制誥文勅然猶未有專院後又改供奉為學士别置學士院專掌内命凡拜免將相號令征伐皆用白麻其選用益重而禮遇益親至號為内相天子私人内宴則居宰相之下一品之上宋朝初命為學士皆遣使就第宣詔㫖召入院故事學士院常在金鑾殿側號為深嚴不預外司事宋太祖以來藉其才用始令判三銓及知大常禮院事矣又按學士之職本以文學言語備顧問出入侍從因得㕘謀議納諫諍其禮猶寵而翰林院者待詔之所也然唐所謂學士只取文學之人隨其官之崇卑入院者皆為學士延覲之際則各隨其元官立班而所謂學士未嘗有一定之品秩也故其所親遇者號為内相可以朝夕召對參議朝政或一遷而為宰相而其孤逺新進者或起自初階或元無出身至試令草麻制甚者或試以詩賦如試進士之法其人皆呼學士自唐至五代皆然至宋則始定制資淺者為直院暫行者為權直於是真為翰林學士者職始顯貴可以比肩台長舉武政路矣皇朝吳元年初置翰林國史院洪武十四年令翰林編修檢討典籍春坊司直郎正字贊讀考駁諸司奏啟平允則列名封上署曰翰林院兼平駁諸司文章某官某十八年革所置秘書監𢎞文館及起居注等定翰林官制學士一人掌詞翰禮文章詔勅備顧問正圖書考議制度凡經筵日講修書之士皆承受而統領焉侍讀學士侍講學士各一人職專講讀經史五經博士五人專講經義以佐學士講讀典籍二人勾輯圖書以時什襲而藏之侍書二人以字書侍上待詔二人應對孔目一人典文移出入史官修撰三人編修三人檢討四人掌修國史凡諸大政上所下詔勅書檄批答王言皆謹籍而記之以備實錄庶吉士者初稱中書六科庶吉士洪武十八年又有翰林院承勅監庶吉士永樂二年始定為翰林院庶吉士進士善文詞者就試謂之館選盖選進士教養之無定員其留者二甲授編修三甲授檢討為給事中御史主事丘氏濬曰翰林之職以備顧問參議論侍講讀謂之侍從可也而博士典籍舎人等官亦係之侍從者盖以今制皆屬於翰林故也中書舎人之職雖有專科然所書者學士所草之詔况今内閣亦有别書詔勅云中書科秦始置中書謁者漢元帝去謁者字魏文帝改秘書省為中書省令為中書令置通事郎後改為中書侍郎隋文時中書令與侍中知政事為宰相舎人本周官掌平宫中之政唐初置中書舎人國初中書省設置省舎人後革省為科定中書舎人二十人無正貳印屬資深者掌書誥勅册符鐵劵凡草請翰林院寳請諸内府左劵寳籍歸諸古今通集庫凡誥勅勘合籍以給就章為號凡誥勅之號四尚寳司周官有典瑞掌節二官掌瑞節之事瑞節信也典瑞屬春官掌節屬地官秦漢有符節令丞領符璽郎文帝時與郡守有銅虎符竹使符之制皆屬焉符與郡守各分其半右留京師左以與之隋有符璽局屬門下省唐稱符寳郎掌天子之八寳及國之符節並納於宫中有行從則請之雜著有符節令箴曰防不可不審制不可無常其職所係如此皇朝初稱符璽郎後置尚寳司卿一人少卿一人司丞三人恩印寄祿無常員卿職在禁庭守寳璽符牌印章而辨其所用有事請于内既事而藏之凡寳十四曰奉天之寳以鎮萬國祀天地曰皇帝之寳以册封賜勞曰皇帝信寳以徴召軍旅曰天子之寳以祭享鬼神曰天子行寳以封賜夷蠻曰天子信寳以調發畨兵曰制誥之寳以識誥命曰勅命之寳以識勅命曰廣運之寳以識黄選勘籍曰御前之寳以進御座從軍駕曰皇帝尊親之寳以答賜宗人曰敬天勤民之寳以訓廸有司凡奉寳用寳從寳洗寳與印綬監俱凡扈守侍衛令牌之號六以警夜巡金牌之號五以嚴守衛凡半字銅符之號四以稽巡守凡銅牌之號一以稽卒凡牙牌之號五以察朝參凡祭牌之號三以謹祀事凡雙魚銅牌之號以肅直衛以潔祀壇凡符騐之號五以給傳郵通制命六科周禮有保氏掌諫王惡而後世因之設諫諍之員如諫議大夫秦漢皆設左右補闕拾遺唐設宋亦有補闕司諫正言宋設皆諫官也而給事中則為秦加官漢因之所加或大夫博士議郎掌顧問答應位次中常侍侍中黄門居禁中在黄門之内給事無定員諸給事中日上朝謁平尚書奏事分為左右曹以有事殿中故曰給事中漢省魏復置唐屬之門下省開元改曰黄門省給事中掌侍左右分判省事察𢎞文館繕冩校讎之課凡百司奏抄侍中既審而駁正違失宋太宗置封駁司嘉祐中何郯以待制領此職詔令有不便者輙封去之仁宗嘉其振職皆從之自此遂為故事元豐中始正除為職事官已前皆為加官凡四人治六房掌讀中外出納及判後省之事政令失當除授非人則奏駁之皇朝初統設給事中洪武六年始分為六科二十二年改給事魏敏卓敬等八十一人為士源先是上以給事中數符元士改為元士至是曰六科政事本源又改為士源未幾復為給事中都給事則二十四年所増也吏户禮兵刑工科各都給事中一人左右給事各一人給事吏科四人户科八人禮科六人兵科十人工科四人盖隨事煩簡而設員也凡章奏出入咸必經由有所遺失牴牾更易紊亂駁封凡朝政之得失百官之賢佞皆許聨署以聞實兼前代諫議補闕拾遺之職也祖宗設官不以諫諍名官欲人人皆得以盡其言也而又專寓其責於科道設官之意深矣求言之意切矣行人司周禮有大行人掌大賔之禮及大客之儀大賔要服以内諸侯也大客其孤卿也小行人掌邦國之禮籍以待四方之使者禮籍名位尊卑之書也秦之典客漢之鴻臚皆其職也漢文有大行為鴻臚屬官顔師古曰事之尊重者遣大鴻臚而輕賤者遣大行人是已武帝時更名行人為大行令其後事歸鴻臚唐之典客司儀二署名宋之懷逺驛名其名不一然皆鴻臚之事無復有行人之名矣皇朝建文中并行人司于鴻臚寺靖難後復故司正一人司副二人行人二十六人職專奉使之事凡頒行詔勅册封宗藩撫諭畨夷徴聘才賢及賞賜慰問賑濟軍旅祭祀叙差焉凡法司謫戍囚徒送五府者填精㣲􅌳内府欽天監天文之掌所從來逺矣自少皥以鳯鳥氏為為厯正顓頊命重黎司天地唐虞之羲和周之馮相保章一掌天文之次序一掌天文之變動皆其職也然周官又因夏殷設大史鄭氏以為史官之長又曰長官也故正歲年以序事頒告朔于邦國閏月詔王居門終月咸所掌焉當周宣王時大史官失其序守而為司馬氏司馬氏世典周史惠襄之間司馬氏適晉有子頽叔帶之難故犇晉又入梁漢武置太史公以司馬談為之位在丞相上天下計書先上太史副上丞相談卒子遷嗣之後宣帝以其官為令太史行文章而已秦漢以來盖併周之太史馮相保章三職唐改太史局為秘書閣改令為郎中又改為渾儀監其後又改為太史監宋有司天監天文院鐘鼓院官有攸司至元豐正官制則以太史局𨽻秘書省而官有令有正而春官夏官中官秋官冬官之屬備矣皇朝欽天監初名大史監洪武元年改為司天監又置回回監三年始改為欽天監二十一年革回回監回回厯法𨽻焉監正一人掌察天文厯數監副二人為之貳其屬主簿一人春夏中秋冬官各一人五官靈䑓郎四人五官保章正一人五官挈壺正一人五官監候二人五官司厯二人五官司晨二人刻漏博士二人凡𤣥象圖書宻疏上非其職不得預凡習業者分為四科曰天文曰漏刻曰回回厯厯自五官正至天文生隂陽人各專科肄焉厯有四曰大統厯曰御覧月令厯曰七政躔度厯曰六壬遁甲厯註上厯三十二事壬遁厯六十七事太醫院周禮天官有醫師掌醫之政令以共醫其屬曰疾醫以養内疾曰痬醫以攻外然曰凡邦之有疾病者曰養萬民之疾病則其所治者不特王宫以内而已秦漢有太醫令丞唐因隋制太醫署令主醫藥凡領醫針炙按摩呪禁各有博士宋因五代制設翰林醫官院掌供奉醫藥及承詔視療衆疾之事崇寧中詔醫官有勞轉皇城使實及五年又七年又十年依次許除遥郡刺史團練防禦使醫官則有和安成和成安全大夫之名而醫正以下皆官以翰林其名猥多且無所稽據甚矣政和初始易其名然猶十有四階至紹興後員始大省國初設醫學提舉司改為太醫監二十二年始定今制内府有御藥房嘉靖中改為聖濟殿院使一人掌醫療之法院判二人為之貳其屬吏目一人御醫十八人所屬門惠民藥局生藥庫凡醫術十三科醫官醫士醫生科習業曰大方脉曰婦人曰鍼灸曰眼曰口齒曰接骨曰傷寒曰咽喉曰金鏇曰按摩曰祝由末二科不傳上林苑監上林之設自漢始盖漢武帝元鼎中初置水衡都尉本于虞周山澤之官然實以掌上林苑主上林離宫燕休之處後漢省之併其職于少府一云後漢上林苑有令丞主苑中禽獸頗有人居皆主之唐因隋屬司農亦有令丞掌諸苑囿池沼種蔬菓藏氷之事宋四園苑東曰冝眷南曰玉津西曰瓊林北曰瑞聖提舉官無常員元豐後四園苑屬司農聖祖洪武二十五年議開上林苑比圖上上曰妨民業不可遂止永樂五年始設今上林苑其屬良牧等凡十署宣德十年定四署左右監正各一人掌苑囿園池牧畜種樹之事左右監副各一人左右監丞各一人為之貳凡禽獸草木蔬菓率其屬督其養户以時經理其養地栽地而蓄植之以供祭祀賔客官府之膳羞其屬典簿一人良牧蕃育林衡嘉蔬四署各典署一人署丞二人録事二人京府今順天應天所謂京府也府有尹實秦漢内史之職此内史本因周官之名而所掌則非掌治京師漢景帝分置左右内史武帝更名右内史為京兆尹左内史為右馮翊絶髙曰京千億曰兆大衆所聚故曰京兆馮輔也翊佐也又更所謂都尉者名曰右扶風取扶助風教也共為三輔治長安城中三輔黄圖曰長安以東為京兆長陵以北為左馮翊渭城以西為右扶風耳趙廣漢常嘆曰亂吾治者三輔也誠得兼之直差異後漢都洛陽置河南尹以三輔陵廟所在不改其號但减其秩與太守同唐京兆府本為雍州置牧一人以親王為之而以長史理人開元中改雍州為京兆府置牧如故或以親王居閤而遥領焉五代都汴置開封尹宋朝牧尹不常置太宗真宗皆甞尹京後親王無繼者權知府一人以待制以上充典司轂下為要劇之任焉崇寧中羅權知府牧以皇子領尹以文臣充中興乾道中皇子領臨安府就東宫為廨置少尹後皇太子辭免復置通簽以下官皇朝順天府即北平府洪武二年置北平行省于北平府已而改行省為布政司北平為㑹府稱府尹如應天府應天府初設知府洪武四年改知府為府尹順天府府尹一人府丞一人治中二人通判六人推官一人其屬經歴司經歴一人知事一人照磨所照磨一人檢校一人庫大使一人府尹掌京府事所屬衙門府學教授一人訓導六人隂陽學正術一人醫學正科一人司獄司司獄一人都稅司大副使各一人宣課司四各大使一人或副使一人稅課司二各大使一人分司二各副使一人巡檢司四各巡檢一人逓運所大使一人批騐茶引所大使一人鐵冶大使一人閘官三人倉草塲大副使五十人京縣北京大興宛平二縣知縣一人縣丞二人主簿二人典史一人五城兵馬司宋以四廂都指揮巡警京城神宗置勾當左右廂公事民間謂之都廂今中東南西北兵馬指揮司各指揮一人掌巡捕盜賊街道溝渠囚犯火禁之事各副指揮五人為之貳各衛經歴司經歴各一人糧多衛添設一人知事各一人倉大使副使各一人京衛武學洪武十年禮部請立武學開武舉不許曰是岐文武為二道也建文四年始置學靖難後革正統中復設教授一人訓導六人掌教京衛㓜官及應襲舎人以備科舉武舉㑹舉而聽於兵部南京成祖初改北平為北京洪熈初命㐮城伯鎮守南京宣德中改鎮守為守備正統初命少保南户部尚書黄福㕘贊機務後稱總督或時吏部都御史專兵部尚書定稱㕘贊而南京百官守備㕘贊機務為要重治所在中府掌皇城京城畿甸留守之事以時巡視陵廟凡大小教場練將士新江口肄水軍神機營習火器皆時督察之官軍騎歲一報地圖文册三歲一報諸江關浦口歲督行行視之事軍器歲制貢舟均差遣而嚴輯之武學課業旗役併鎗監視焉盜賊歲更官行緝屯田請專官巡視凡便冝事㑹九卿五府議上請操江都御史二人專江防六部諸司具設官而稍省其員役官衘加南京二字南京宗人府經歴司經歴一人務吏部尚書一人侍郎一人郎中四人主事四人司一人户部尚書一人侍郎一人郎中十三人員外郎十人主事十七人司務一人照磨一人禮部尚書一人侍郎一人郎中四人主事二人司務一人主兵部尚書一人侍郎一人郎中四人員外郎二人事五人司務一人刑部尚書一人侍郎一人郎中十三人員外郎五人主事十四人司務一人照磨一人司獄一人工部尚書一人侍郎一人郎中四人員外郎二人主事八人司務一人都察院右都御史一人右副都御史一人右僉都御史一人監察御史三十二人經歴一人都事一人司務一人照磨一人司獄二人通政司右通政一人右參議一人經歴一人右大理寺卿一人右寺丞一人左右寺正各一人左評事各三人司務一人律太常寺卿一人少卿一人典簿一人博士一人恊郎二人贊禮郎七人司樂二人奉祀三人寺丞三人光祿寺卿一人少卿一人典簿一人署正四人署丞四人太僕寺卿一人少卿二人寺丞三人主簿一人寺在滁州監詹事府主簿一