馬都尉葢以王姬之重庶姓之輕故假之以位加之以給使可伉儷王女也唐宋因之不改皇朝駙馬都尉次于侯凡尚公主皇長公主皇姊妹大長公主皇姑並稱駙馬都尉尚郡主親王女縣主郡王女郡君郡王孫女縣君郡王曽孫女鄉君郡王𤣥孫女並稱儀賔食禄有差皆不得預政事國初駙馬或典兵鎮守自李堅副總兵封欒城侯多署宗人府事嘉靖初崔元以迎駕封京侯五軍都督府後漢建武初權置督軍御史未有都督之名曹魏始置都督諸州軍事至有加大都督持節假黄鉞專戮者江左以來都督中外尤重如王導權重者乃居之然未置府後魏多事置京畿大都督總軍人始立府置佐後周改都督諸軍事為總管為都督之任至隋以都督為散官用以酬勤勞而加使持節悉罷矣唐諸州復有總管武徳中改總管為都督府景雲中置都督二十四人隨其地有大中小都督之稱以察御史以紏善惡後以權重罷之惟揚益并荆四大都督如故自唐以後不置宋紹興中秦檜欲奪吕元直相權議元直以左僕射都督諸軍事自是委宰相兼都督矣開禧中有列士之議遂不復除都督矣皇朝初置統軍大元帥府後改樞宻院又改為大都督府設今官洪武十三年始分中左右前後五軍都督府永樂初置行都督府宣德中革府稱行在者正統中除凡公侯伯及三等真署都督並得充總兵副總兵其名掛印將軍稱鎮守者雲南征南將軍兩廣征蠻將軍湖廣平蠻將軍遼東征北大將軍宣府鎮朔將軍大同征西前將軍延綏鎮西將軍寧夏征西將軍丼肅平羌將軍蘇州淮安鎮守漕運總兵以畿内故不得掛印稱將軍有大征討遣總兵則掛平賊將軍平湖將軍平北將軍平北將軍征北將軍討賊將軍或大將軍前將軍副將軍印事已納印中左右前後五軍都督府左右都督各二人都督同知二人都督僉事二人恩功寄祿無常員都督掌軍旅公侯伯次三等都督領之各領其都司衛所以逹于兵部凡在京錦衣等上十二衛金吾左等上十衛凡二十二衛名親軍指揮使司騰驤左等四衛亦曰親軍指揮使司武功中等六衛長陵等七衛並不𨽻督府亦不稱將軍其餘留守左瀋陽右等三十五衛分𨽻五府其在外南北直𨽻十三省都尉所亦各分屬得節制焉内留守五衛本國初都鎮府司總領禁衛改為留守五衛專廵察守衛五府首領各經歴一人都事一人錦衣衛附在京諸衛本朝十二衛即唐人十六衛之遺制凡諸衛親軍皆以畨直宿衛執戈㦸嚴廵警監門禁而錦衣所掌者乃鹵簿儀仗之事旗手所司者乃旗纛金鼓之物諸衛皆綂軍卒而錦衣獨領校尉力士即周之虎賁旅賁也諸軍皆世卒而府軍獨簽㓜軍即漢之六郡良家子也諸衛正倅一惟其世獨錦衣之任則不以世而以能盖御座則夾陛而立御輦則扶轅以行出警而入蹕承㫖而傳宣皆在所司而詔獄所寄則又重矣又按錦衣衛本國初儀鑾司後定為親軍都督府而司𨽻焉十五年罷府及司置錦衣親軍指揮使司鎮撫司理衛中刑名如列衛而兼簡軍匠所謂南鎮撫司也北鎮撫司本添設專理詔獄成化十四年始給印分司得直逹上下法司覆提領衛事者恒以都指揮都督或恩功或寄祿掌侍衛之事凡將軍力士校尉分畨䕶駕直宿廵察凡大朝長駕出入督設鹵簿儀仗凡皇城四門日夜畨直廵鼜之凡盗賊奸宄街塗溝渠宻緝而時省之凡奉㫖鞠獄錄囚勘事與三司從事凡比試監焉其屬經歴一人留守司留守始於後漢和帝南廵張禹以大尉兼衛留守自是唐宋以來凡車駕不在京都則置留守我朝中都鳯之有留守司者以聖祖龍興之地如周之岐豐漢之豐沛也洪武三年建為中都尋定鼎金陵乃設留守司于此其興都留守司則置於嘉靖間盖世宗發祥之地故亦設焉正留守一人掌中都興都守䕶防禦之事副留守一人指揮同知二人為之貳中都領皇陵衛即英陵城内留守中等七衛洪塘千户所興都領顯陵衛及䕶衛三百七十五守禦屯田羣牧千户所三百七十儀衛司三十二其屬經歴司經歴一人都事一人斷事司斷事正副各一人吏目一人司獄一人各都指揮使司行都指揮使司各在衛指揮使司都指揮使本唐方鎮軍校之名唐兵志曰僖宗幸蜀以神䇿大將軍為都指使其職始重宋初都指揮使以節度為之而副都指揮使以刺史以上充中興後遂不除矣皇朝都指揮使司初為翼元帥府又改為行都督府省城稱都衛都鎮撫司八年改為都指揮使司今都指揮使司十六曰浙江江西福建廣東廣西湖廣河南山東山西陜西四川貴州雲南大寧萬全遼東行都指揮使司五四川陜西湖廣福建山西都指揮使二人都指揮同知二人都指揮僉事四人掌官軍之政令各率其衛所以歴于五府而聽於兵部凡都司並流官或世官其屬經厯一人都事一人斷事一人副斷事一人吏目一人司獄一人統司事者曰軍政掌印練兵屯田者曰軍政僉事廵捕漕運京操備禦諸雜務並選充之事曰見任管事否曰帶俸凡備倭守備行都指揮事者不得升牙公座凡朝廷吉凶之禮視布政司其屬都司同各外衛漢武初置衛將軍今一衛𨽻軍五千六百名指揮使一人指揮同知二人指揮僉事二人鎮撫二人掌軍旅防禦之事使同知僉事考選掌管衛事陞授改調増置無定員凡世流襲替優給優養報都指揮使司逹所𨽻都督府移兵部每歲藩臬撫按考察其賢否五歲一考選軍政廢置之鎮撫則掌刑獄其屬經厯知事各一人軍民指揮使司事體同千户所𨽻軍一千一百二十名正千户一人鎮撫所二人副千户二人百户所𨽻軍一百一十名百户十人陞授改調無常員凡治軍之改必聽於衛衛下千户所千户督百户百户所下總旗小旗率其伍卒以聽守禦千户所軍民千户所事體與千户所同每所設總旗二人小旗十人已上武官俱世襲惟首領屬官吏部銓除衛學國朝軍衛無學宣德十年從兵部尚書徐河之請令天下軍衛獨一城者皆立學正統以來天下軍衛延至邉徼各建學設教授訓導品秩俸祿如府學之制鎮戍唐制縁邉戎㓂之地則加以旌節謂之節度使武德初邉要之地亦置總管以統軍國朝凡天下要害處所必專設官統兵鎮戍總鎮一方者曰鎮守獨守一路者曰分守獨守一城一堡者曰守備有與主將同處一城者曰恊守又有備倭提督提調廵視等官其官稱掛印專制者曰總兵曰副總兵曰參將曰遊擊將軍俱于公侯伯都督指揮等官内推舉充任内官周禮天官有宫正宫伯内宰内小臣閽人寺人内監之屬各掌王宫王門之事鄭氏註獨于内小臣曰以奄人為之奄謂精氣閉藏也于内監曰奄人未冠之稱則諸掌宫及門者非皆奄人也故漢景帝置大長秋皇后官名或用中人閹人或用士人其侍中中常侍各一人省尚書事黄門侍郎一人傳發書奏皆用姓族後漢中常侍贊導内事顧問應對永平中始定員中常侍四人小黄門十人明帝以後員數稍増改以金鐺左貂秦中常侍官參用士人皆銀鐺左貂兼領卿署之職自和熹太后稱制不接公卿乃以閹人為常侍小黄門通命兩宫自此以來悉用閹人不調它士自安迄桓權任尤重單超等以謀誅梁冀功同日封侯及袁紹大誅宦官後永巷掖庭復用士人閫闈出入莫有禁矣隋置内侍省又改為長秋監唐省臺監改置不常初太宗制不任以事惟内閣守禦庭内掃除廩食而已開元天寳中始拜三品將軍列㦸於門監軍柄政俱在宦人宋初有内班院淳化中改為黄門又改為内侍省有知都押班等名而都知為内臣之極品政和中又盡易國初内客省使等名而黄門之名如故其屬勾當等官員數猥多大用事矣髙宗深懲其弊嚴禁併省至孝宗時定以二百人為額蓋宋馭宦官比漢之末季唐之中世實過之也皇朝初置内史監奉御凡六十人洪武十七年更定内臣諸監局庫品職二十三年改中使司二十八年頒皇明祖訓遂定今制内官監門司局庫分職振庭凡監十一曰神宫監尚寳監陵神宫監尚膳監尚衣監司殿監内官監司禮御馬監印綬監直殿監監各有大監少監監丞典簿長隨奉御凡門四曰奉天門午門端門承天門各有門正門副凡司六曰鐘鼓司惜薪司云各有司正司副凡局六曰兵仗局内織染局針工局巾㡌局司苑局酒醋麯局各有大使副使凡庫三曰内承運庫司鑰庫内府供應庫各有大使副使東宫典璽局典樂局典膳局典服局典兵局典乗局各有局郎局丞王府有承奉司典寳所典膳所典服所各有正副内使司冠司衣司珮司履司樂司弓矢凡十人各門官亦有正副公主府中使司亦有正副三十年内府又置都知監銀作局女官洪武四年上令定女職禮部具奏周制後宫設内官以贊内治如女御掌叙御以防專妬女史掌禮職以詔后治内女祝掌王后内祀事漢設内官一十四等凡數百人唐設六局二十四司官凡一百十九人女使五十餘人皆選良家女子充上曰古者所設過多宜防女寵垂法將來命重加裁定遂立局六曰尚宫尚儀尚服尚食尚寢尚功司一曰宫正二十九年重定官秩職掌如故土官蠻夷居近徼為守者世官曰土官始于洪武七年西南諸蠻夷來朝貢者各授之以官稍與約束定糧徭差發自唐以藩方不靖遣重臣宣諭安慰之故有宣慰使之名今宣慰司十有一宣慰使從三同知正四副使從五僉事正六首領經歴都事唐有宣撫使宋不常置今宣撫司九使從四同知正五副使從五僉事正六首領經厯照磨唐有招討使每用兵權置今招討司二使從五副使正六首領吏目隋有安撫大使唐以節度兼之今安撫司二十使從五副使正六僉事正七首領吏目長官司百七十有三長官正六副從六首領吏目蠻夷長官司長官正七副從七及府州縣正貳幕屬凡世官者皆謂土官主附輯諸蠻謹守疆􅁟修其職貢而供其調發無敢携貳有相讐者疏上聽朝命有流官者銓于吏部兵部又有蠻夷官苖民官千夫長副千夫長百夫長軍民萬户府首領經厯知事並聽銓司有儒學制如府建官總論上古之治莫唐虞成周若也其風朴其政醇其庶績咸熈其萬物咸若乃其設官也教養工虞禮樂刑厯分命而不以攝也百揆四岳州牧侯伯並建而不以兼也公孤論燮卿牧率倡相聨若此其宻也設參傅伍置輔陳殷相經若此其周也則亦若甚詳矣乃稽其數則惟曰唐虞百官而已周官三百六十而已周視唐虞雖稍増廣然有不必備者又多兼者又冡宰歲終詔廢置司士歲登下損益之數則猶有廢而損者非多也且勿論上世即如漢髙帝時海内不混一乎然以三公統九卿以丞相史分刺郡國决獄或責廷尉衛屯或至詔罷官之省可知其後加設漸多司農之外復有水衡中尉之外復有校尉諸如羽林期門繡衣直指之類盖視昔幾倍之焉而治則不逮又如唐太宗時海内不治平乎然以六部繼三省以九寺繼六部臺有御史獨司紏察監有八監互以相繼官之省可知也後乃加設漸多水陸有使矣而租庸又置使度支有使矣而鹽鐵又置使諸如木炭青苖戸口羣牧之類盖視昔倍之焉而治則不逮夫官皆前寡而後多治皆前隆而後替此其故何也盖以前之事務减而後之事務増减者益務所以减而増者益務所以増故也夫人恒自淳而趨偽物恒自朴而趨華禮恒自簡而趨繁俗恒自厚而趨薄匪直近代為然即周視唐虞亦有間矣盖其勢則然也勢有所必至治有所必妨是故聖人恒反偽以還淳斂華以復朴約繁以就簡挽薄以從厚有其損之而莫以益也雖或益之而反以損也故其民易從而官亦可無多設非不欲設自無用此贅疣為也乃後不識此意而以偽治偽以華治華以薄治薄天下遂紛如矣不務反本而多官以維持之欲以聚財財益耗欲以強兵兵益疲欲以釐奸奸益滋欲以清刑刑益濫求治愈急而去治則愈逺矣何者吏議雜而自相亂也載重者恐軸之折則加轅軸其上以為備不知轅軸之加重而趨軸折也佩玦而虞其破則佩兩玦以為預不知兩觸而破愈疾也然則多事因以多官多官益以多事相交敝者也而多事則其源也誠欲省官莫若省事其理明甚而陳彭年乃謂省事不如省官不亦左乎此不必論也我朝廷官斟酌今古宻而不煩疏而不漏誠宜世守而不可損益者也然承平久而虛文盛加設則亦有矣邇者悉皆罷去又汰郡邑吏數百人官少民安事無不舉公私饒樂海内晏清久矣顧上務减官而下不務减事則革於今者未必不復於後汰於此者未必不添於彼何也官與事相儷者也不可以獨省也且天之事本無若是多也惟不當而無實是故多焉何也鈎校薄牒徃復支辭非軫瘼之切也藻繢文飾務為容美非靖共之忱也虚増聲數邀求官賞非明試之真也廋惡容奸掇求曲細非詰慝之要也則無乃為塵飯塗羮者與是故曰無實也夫事當則一可以當百不當則百不可以當一實則一為而一成不實則百為而百不成徒使文例叢興姦蠧浩積而莫可繩檢乃如是糜沸紛挐顛頓倉皇以為可以救弊而不知弊之所起實乃由之此正所謂非徒無益而又害焉者也百年積習淪胥至斯及今不亟反之恐日甚一日有不可勝救者矣圖書編卷八十四
