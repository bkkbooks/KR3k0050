body:
  text: 圖書編卷六明章潢撰大衍總叙大衍者程子謂數始於一備於五小衍之為十大衍之為五十信然也其用四十有九而一不用得非以一為數之所由始乎其法則如楊誠齋以其數五十而分二掛一象三揲四歸餘為數之用以天數五地數五為數之本以乾坤二卦之策為數之終信然也十有八變而八卦小成則引伸類長而六十四卦萬有一千五百二十得非數之所以為大衍乎易云天生神物聖人則之彼蓍草一本百莖而兩用之則各得五十為大衍之數是蓍乃天生之神物而聖人則之以為大衍信乎變化之道神之所為也然曰幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻又曰蓍之徳圓而神卦之徳方以知六爻之義易以貢可見蓍數卦爻本不可以象分矣但顯道神徳行以此洗心退藏於宻和順於道徳而理於義窮理盡性以至於命恐又不可專以卜筮言也是篇所編乃揲蓍之法後又因古人所用占法而微有不同其所以為大衍者一也故併録之云易繫辭曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五所以成變化而行鬼神也此河圖之數也古今言數學者葢始於此天地只有一十數衍而為百千萬億之無筭者此十之積也十數又只始於一數自二至十皆此一之積也一之上更有何物此所謂易有太極是也太極雖超乎數之外而實行乎數之中也自天一至地十細積之已自具天地五十有五之數一與二為三三與三為六六與四為十十與五為十五十五與六為二十一二十一與七為二十八二十八與八為三十六三十六與九為四十五四十五與十為五十五數備矣其下文不過申明此十數而已天地人物古往今來萬事萬變與夫鬼神之情狀皆在此數包羅中矣天數五地數五天地之數五十有五夫既已曰數矣即河圖之數也後儒有謂此特數焉耳非理也豈知天下無理外之數又豈有數外之理哉是故專於數學者非也視理數為二致者亦安足以成變化行鬼神黙契乎河圖之藴況河圖自一至十為數五十五洛書自一至九為數四十五合之為數者百蓍草叢生其數亦百可當大衍之數者二故圖書位數與易卦合而揲蓍掛扐之數所以定卦爻過揲之數所以定乾坤之策而當朞之日合二篇之策而當萬物之數可見圖書數之原蓍䇿數之衍要皆出於天而聖人無所造作為於其閒也惡可以為數而忽之大衍之數五十其用四十有九五十者蓍之神用也顯隂陽之數定乾坤之䇿成六十四卦三百八十四爻也四十九者虚天一而不用象乎太極而神功不測也五十五者天地之極數所以神變化而行鬼神也然則大衍之數先哲之論多矣馬季長鄭康成之徒各存一説義理昭然謹按繫辭曰天數五五竒也地數五五耦也五位相得而各有合以成金木水火土也天數一三五七九也地數二四六八十也此乃五十五之數也天一與地六合於北而生水地二與天七合於南而生火天三與地八合於東而生木地四與天九合於西而生金天五與地十合於中而生土朱漢上謂一三五七九竒數所謂天數二十五二四六八十偶數所謂地數三十凡五十有五成變化行鬼神者此也天一下降與地六合而生水於北地二上駕與天七合而生火於南天三左旋與地八合而生木於東地四右轉與天九合而生金於西天五㝠運與地十合而生土於中以竒生者成而耦以耦生者成而竒天陽也故其數竒地隂也故其數耦竒耦相合而五十有五之數備大衍之數減其五者五行之用也虚其一者元氣之本也葢天五為變化之始散在五行之位故中無定象天始生一肇其有數也而後生四象五行之數今焉虚而不用是明元氣為造化之宗居尊不動也河圖積數五十五其五十者皆因五而後得獨五為五十所因而自無所因故虚之則但為五十又五十五之中其四十者分為隂陽老少之數而其五與十者無所為則又以五乘十以十乘五而亦皆為五十矣洛書積數四十五而其四十者散布於外而分隂陽老少之數唯五居中而無所為則亦自含五數并為五十矣一二三四五天地之生數也五中數故不用六七八九十天地之成數也十全數故不用而河圖洛書之四象亦無所當於五與十焉故四象之畫成而以一二三四紀其次九八七六積其實揲蓍之法具而掛扐之五與四以一其四而為竒九與八以兩其四而為耦竒以象圓而徑一者其圍三故凡竒者其數三偶以象方而徑一者其圍四而用半故凡偶者其數二所謂參天兩地者也及其揲之三變則凡三竒者三其三而為九三偶者參其兩而為六此九六之所以得數之實也至於兩竒一偶則亦參其兩竒以為六兩其一偶以為二而合之為八兩偶一竒則亦兩其兩耦以為四參其一竒以為三而合之為七此七八所以得數之實也是老少雖有不同然其成象之所自得數之所由則皆有從來而不可誣矣若專以一三五為九二四為六則雖合於積數之一端而於七八則有不可得而通者矣説卦傳曰昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道徳而理於義窮理盡性以至於命繫辭傳曰大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閠五嵗再閠故再扐而後掛又曰四營而成易十有八變而成卦此教人所以揲蓍之法也大衍數五十虚一不用取四十九蓍為一握信手中分置几左右次以左手取左䇿執之而以右手取右一䇿掛左手小指間次以右手四揲左䇿觀其所餘或一或二或三或四扐之左手無名指間次以右手反過揲之䇿於左上遂取几右䇿執之而以左手四揲之觀所餘䇿如前扐之左手中指間次以右手反過揲䇿於几右合兩手一掛二扐之䇿置几之西邊是謂一變再以兩手取几左右見存之䇿合之復四營如第一變之儀而置掛扐之策於第一變掛扐之側是謂二變再以兩手取几左右見存之䇿合之復四營如前二變之儀而置掛扐之策於第二變掛扐之側是謂三變乃觀三變所得掛扐多少以畫第一爻如是每三變成爻十八變成卦是其老少之變與不變以占事之吉凶焉之而乾坤坎離震巽艮兑八純卦已備凡六十四卦三百八十四爻不過由八純卦而重之也即蓍䇿竒耦而成卦而無方無體之妙已見于蓍故曰蓍之徳圓而神即竒耦六爻以為變而吉凶悔吝之占已寓於卦故曰卦之徳方以知可見圓而神者自無而成有方以知者因有而知無神以知來知以藏往一而已矣所謂興神物以前民用豈專指蓍草而言之哉按四象老少之由原於河圖之數一二三四五圖之生數也六七八九十圖之成數也四象九八七六之數皆就成數内見然九者一三五之積六者二四之積七者二五之積八者三五之積言九八七六則生數已在其中必以九六為老七八為少者以成數論之陽主進由七之進至九而極為陽之老隂主退由八之退至六而極為隂之老九退而為七則七為少六進而為八則八為少也進極而退所以七為少陽退極而進所以八為少隂也䇿者蓍之莖數曲禮所謂䇿為筮者是也大傳所謂乾坤二篇之䇿者正以其掛扐之外見存蓍數為言耳葢揲蓍之法凡三揲掛扐通十三䇿而見存三十六䇿則為老陽之爻三揲掛扐通十七䇿而見存三十二䇿則為少隂之爻三揲掛扐通二十一䇿而見存二十八䇿則為少陽之爻三揲掛扐通二十五䇿而見存二十四䇿則為老隂之爻大傳專以六爻乘老陽老隂而言故曰乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十其實六爻之為隂陽者老少錯雜其積而為乾者未必皆老陽其積而為坤者未必皆老隂其為六子諸卦者或陽或隂亦互有老少焉葢老少之别本所以生爻而非所以名卦今但以乾有老陽之象坤有老隂之象六子有少隂陽之象且均其䇿數又偶合焉而因假此以明彼則可若便以乾六爻皆為老陽坤六爻皆為老隂六子皆為少陽少隂則恐其未妥也但三百六十者隂陽之合其數必齊於此若乾坤之爻而皆得於少隂陽也則乾之䇿六其二十八而為百六十八坤之䇿六其三十二而為百九十二其合六為三百六十此則不可易也按五十之蓍虚一用四十九營之後又除初掛一只以四十八䇿分掛扐過揲而為此圖掛扐過揲進退各以四由老陽掛扐十二進一四為少隂掛扐十六少隂掛扐十六進一四為少陽掛扐二十少陽掛扐二十進一四為老隂掛扐二十四其進也至四十八䇿之中焉止矣又由老陽過揲三十六退一四為少隂過揲三十二少隂過揲三十二退一四為少陽過揲二十八少陽過揲二十八退一四為老隂過揲二十四其退也亦至四十八䇿之中焉止矣進退皆不過乎中也四十九者蓍之全數也以其全而揲之則其前為掛扐其後為過揲以四乘掛扐之數必得過揲之䇿以四除過揲之策必得掛扐之數其自然之妙如牝牡之相御如符契之相合可以相勝而不可以相無且其前後相因固有次第而掛扐之數所以為七八九六又有非偶然者皆不可以不察也二老過揲當期物數圖繫辭傳曰乾之䇿二百一十六乾六爻老陽過揲數坤之䇿百四十四坤六爻老隂過揲數凡三百六十當期之日萬有一千五百二十合乾坤與六子三百八十四爻二老過揲之數當萬物之數也此以二老過揲數論若以二少過揲數論總數亦同或曰何以不論掛扐曰掛扐以生爻過揲以明數而或者乃捨掛扐并以過揲生爻誤矣六爻皆不變占本卦彖辭一爻變則占本卦變爻二爻變則以本卦二變爻占仍以上爻為主三爻變則占本卦及之卦之彖辭四爻變則以之卦二不變占仍以下爻為主五爻變則以之卦不變占六爻變則占之卦彖辭乾坤則占二用四象之數乃天地之間自然之理其在河圖洛書各有定位故聖人畫卦自兩儀而生有畫以見其象有位以定其次有數以積其實其為四象者久矣至於揲蓍然後掛扐之竒耦方圓有以兆之於前過揲之三十六三十二二十八二十四有以乘之於後而九六七八之數隠然於其中九七天數也三十六二十八凡老陽少陽之䇿數也六八地數也三十二二十四凡老隂少隂之䇿數也今專以九六為天地之數乾坤之䇿謂七八非天地之數而為六子之䇿則誤矣大衍之數五十其用四十有九天數二十有五一三五七九共二十五也地數三十二四六八十共三十也凡天地之數五十有五以五行氣通凡五行減五大衍又減一故四十九也姚信云天地之數五十有五其六以象六畫之數兼虚一之數共為六畫此説尤非故減之而用四十九也王弼云演天地之數所賴者五十也其用四十九其一不用也不用而用以之通非數而數以之成斯易之太極也四十有九數之極也云演天地之數是云數之極非嘗因諸家之説而攷之易係之文首言乎大衍之數之用次及乎分二掛一揲四歸竒之法又其次始言天地之數五十有五以成變化而行鬼神又其次則言乾坤之䇿當期之日與萬物之數故其末總提上文云是故四營而成易十有八變而成卦引而伸之觸類而長之天下之能事畢矣顯道神徳行是故可與酧酢可與佑神矣觀聖人立言之意不先言天地之數五十有五而先言大衍五十者明所主在大衍也明大衍包天地之數而非天地之數生大衍也何者天之數可名以一三五七九地之數可名以二四六八十也大衍虚一不用則不可以名求無名為有名之宗故大衍足演天地之數也其用四十有九以生天地之數而為天地樞故五竒五偶推而至於五十有五此天地之數自大衍而生也陽爻隂爻推而至於當期之日與萬物之數此乾坤之䇿亦自大衍而生也論占以貞悔為體用古之言占者皆以貞悔貞言其正悔言其變猶言體用云爾伏羲始畫三爻之卦八乾南坤北離東坎西震東北巽西南兊東南艮西北此隂陽對待之定體所謂貞也因而重之每卦之上又各變為三爻之卦八是為六十四卦所謂悔也既重而為六十四卦卦備六爻又於六爻卦六各變為六十四是為四千九十六卦則又以所重之六十四為貞而所變之六十四卦為悔矣卦之有變盖自伏羲時已然故箕子叙禹所傳之洪範以占二為貞悔則其來已久但其義則自文王發之故八卦乾坎艮震巽離坤兊之序六十四卦自乾坤屯䝉以至既未濟之序皆以為文王後天之卦其實不過闡明伏羲之意耳後天八卦雖取出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮之義六十四卦雖取反對正對往來順逆之義然不過舉此以例見耳其實錯綜摩盪可以互為先後也故隂陽定立之位已寓妙萬物之神定位之中隂陽交互即其變之所從也故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也震得乾初爻坎得乾中爻艮得乾上爻巽得坤初爻離得坤中爻兊得坤上爻皆言其變也則乾坤為正不待言矣凡占卦者皆以貞為體以悔為用悔雖所以盡天下之變而體常在貞必以貞為主焉故自八卦之變而言則本卦為貞之卦為悔所占之事在體則重於貞所占之事在用則重於悔而占例可知矣夫文王未演易之前未有辭也而先已有筮古之聖人何以為占邪葢君子所居而安者易之序也所樂而玩者爻之辭也是故居則觀其象而玩其辭動則觀其變而玩其占象與變皆吾心體心體之象即其辭也心體之變即其占也因其動静而觀之吉凶見焉何待假辭以為占哉且易之為卦各言一象如屯難之象也故所言皆艱危之意蒙昧之象也故所言皆開通之意需待之象也故所言皆安舒之意訟争之象也故所言皆窒惕之意其餘六十四卦皆然止各發明一義而已不相兼也以此待天下之變非屯之時而得屯非蒙之時而得䝉非需之時而得需非訟之時而得訟與他卦亦皆非其時而得其事與文王所繫之辭不相直也然而後世占者常用其辭則假其辭以明變耳如占動而示以静辭則不當動矣如占晦而示以顯辭則不終晦矣但從剛柔進退究極其情則又推本於畫前之易未動之㡬則意固在辭外也非天下之至精至變至神其孰能與於此哉朱子考變之例見於易學啟䝉者比附之占止從意凑貞悔之取亦雜支離而況倚於㫁辭不能盡意以是言蓍失其圓神之徳矣右蓍四十九䇿縚作一束法太極全體之象其數之所以然葢總八卦生生爻之實也陽儀之畫七儀一畫象二畫卦四畫也隂儀之畫七儀一畫象二畫卦四畫也因而七之七七四十有九傳曰蓍之徳圓而神圓者其數竒以七圓聚而簇之則有自然之圓矣卦之徳方以知者其數偶以八方比而疊之則有自然之方矣神者妙用不測知者變通不拘蓍陽卦隂蓍動卦静大易之體用至矣右蓍四十有九䇿分而為二以象兩儀而掛置一䇿於中以象人左右䇿四十有八葢總卦爻之實也八卦經畫二十有四重之則為四十有八又毎卦各八變其爻亦四十有八也其揲法先以左手取左半之䇿握之而以右手取右半一䇿掛置於中而不復動以象人居天地之中其隂陽寒暑晝夜變化一聽于天而無與焉一雖無與而常與四十有八者並用參為三才者也次以右手四揲左手之䇿而歸其竒或一或二或三或四於小指次指之間謂之扐象三年一閏又以右手取中半之䇿取三餘三取一餘二取六餘四取四歸於次指中指之間謂之再扐象五年再閠而後掛者謂總所歸二竒置於掛一之所如掛之法韻㑹曰合而置之是也其歸竒之數不四則八無所謂不五即九得四為竒一個四也於是復合過揲之䇿或四十四或四十分揲歸掛如前法為第二變又合所餘過揲之䇿或四十或三十六或三十二分揲歸掛亦如前法為第三變三變之後然後視其所掛之䇿得三竒為老陽三偶為老隂兩偶一竒以竒為主為少陽兩竒一偶以偶為主為少隂每三變而成一爻十有八變而成一卦一卦可變而為六十四卦而四千九十六卦在其中矣朱子曰竒之象圓圓者徑一而圍三陽用其全老陽三竒三三為九過揲之數亦四九三十有六偶之象方方者徑一而圍四隂用其半老隂三偶三二為六過揲之數亦四六二十有四少陽一竒二偶一竒三偶二積一二二為七過揲之數亦四七二十有八少隂一偶二竒一偶二二竒三積一二二二為八過揲之數亦四八三十有二此蓍數卦畫自然之妙也右每三變而成一爻三變皆得竒有類於乾其畫為口識其以陽變隂也三變皆得偶有類於坤其畫為乂識其以隂變陽也三變得兩竒一偶以偶為主即其偶之在初在二在三有類於巽離兊其畫為􅄲而不變三變得兩偶一竒以竒為主即其竒之在初在二在三有類於震坎艮其畫為一而不變凡有是八體亦八卦之體象也為一者二十四體為一者亦二十四體為口者八體為乂者六體共六十四圖説如後右兩偶一竒以竒為主為少陽艮坎震凡二十有四以三變方得竒為艮之䇿八再變得竒為坎之䇿八初變得竒為震之䇿八歸扐得二十䇿過揲得二十八䇿以四約之歸扐得五五箇五過揲得七七箇四為陽之正而不變右兩竒一偶以偶為主為少隂巽離兊之䇿凡二十有四以初變即得偶為巽之䇿八再變得偶為離之䇿八三變得偶為兌之䇿八歸扐得十六䇿過揲得三十二䇿以四約之歸扐得四四箇四過揲得八八箇四為隂之正而不變右三變皆竒為老陽乾之䇿者八歸扐得十二䇿過揲得三十六䇿以四約之歸扐得三三箇四過揲得九九箇四九者陽之極變而為隂易以變為占凡陽爻之變者通謂之九右三變皆偶為老隂坤之䇿者八歸扐得二十四䇿過揲亦得二十四䇿以四約之歸扐得六六箇四過揲得六六箇四六者隂之極變而為陽易以變為占凡隂之變者通謂之六右八卦之體各八合而為六十四象焉其揲法從程子張子云再變三變不掛而得之蓋初變既掛一以象人置而不用復二變乃蒙上不復掛者為是也揲右不揲左從唐張轅莊綽二家葢天動地静陽變隂合地承天而行於義為當左餘一而右承之以三餘三而乘之以二者成其為竒之陽也左餘二而右承之以六餘四而乘之以四者成其為偶之隂也隂陽太少均齊平正若如近世三變皆折左右並揲之法則為老陽者十二少隂二十八少陽二十老隂四參差多寡不齊如前一變掛後二變不掛而亦左右並揲之法則為太陽者二十七少隂二十七少陽九太隂一雖皆六十有四然太極之體極少葢有終嵗揲蓍而不得遇純坤之變乾者矣明變之士幸研㡬焉論所占吉凶悔吝乃心上知來之㡬易之有占所以知來也故曰極數知來之謂占又曰占事知來知來之占全在㡬上而幾之可驗者吉凶悔吝而已為善則吉吉者心之安處也為不善則凶凶者心之不安處也自凶而趨吉則悔悔者心有所悟而必欲改也自吉而向凶則吝吝者心有所羞而不欲為也此皆天命之本然而良知之所不容自己者故四者在心皆謂之徳聖人以神道設教特借此以示人欲其知本心之明不從外得也禍福無門惟人自召葢謂幾在我也故禍福將至善必先知之不善必先知之善不善非吉凶所先見之幾乎舍此而求未至之禍福則有假於䜟緯術數而命自外來人謀不能與亦何益矣故周之興也卜世三十卜年七百而卒不如其言葢徳有厚薄則運之長短因之而推測之術豈足以盡天下之變乎借使欲以推測盡變則亦當因其植根以觀枝葉耳誠能即止而有知正可趨吉避凶以為安身之地而徒事口談則亦足以招禍矣乾之䇿以老陽之數三十六乘以六爻之數則為二百一十有六坤之䇿以老隂之數二十四乘以六爻之數則為百四十有四合之凡三百有六十當期之日者周十二月為一期以朔言之則三百五十有四以氣言之則三百六十五日四分日之一舉氣盈朔虚之中數言之故曰三百有六十也然少陽之䇿二十有八積乾六爻之䇿則百六十有八少隂之䇿三十有二積坤六爻之䇿則百九十有二合之亦三百有六十而大傳不言者以易用九六而不用七八也二篇者上下經六十四卦也陽爻百九十二以老陽三十六乘之積六千九百十有二隂爻百九十二以老隂二十四乘之積四千六百有八合之則為萬有一千五百二十當萬物之數然以少陽二十八乘陽爻百九十二積六千一百四十有四合之一萬一千五百二十是知少隂少陽之數隠於老隂老陽之中七九皆為陽而竒六八皆為隂而偶也此乾坤九六之㫖皆如是也哉乾卦用九見羣龍无首吉坤卦用六利永貞右明六十四卦九六變占之通例朱子曰凡卦六爻皆不變則占本卦彖辭而以内卦為貞外卦為悔按左氏傳孔成子筮立衛公子元遇屯震下坎上曰利建侯秦伯伐晉筮之遇蠱巽下艮上曰蠱之貞風也其悔山也此卦六爻皆不變占本卦彖辭卦象之例也一爻變則以本卦變爻辭占晉畢萬遇屯震下坎上之比坤下坎上初爻九也蔡墨遇乾乾下乾上之同人離下乾上二爻九也晉文公遇大有乾下離上之暌兑下離上三爻九也陳敬仲遇觀坤下巽上之否坤下乾上四爻六也南蒯遇坤坤下坤上之比坤下坎上五爻六也晉獻公遇歸妹兊下震上之暌兊下離上上爻六也此一爻變占本卦爻辭之例也二爻變則以本卦二爻變辭占仍以上爻為主傳無例二爻變則占本卦及之卦彖辭而以本卦為貞之卦為悔公子重耳筮得國遇貞屯震下坎上悔豫坤下震上皆八葢初五爻得九四爻得六凡三爻變二爻二爻上爻在兩卦皆八而司空季子占之曰皆利建侯此三爻變例也又變在前十卦主貞後十卦主悔見啟蒙六十四卦變圖四爻變則以之卦二不變爻占仍以下爻為主傳無例五爻變則以之卦不變爻占穆姜往東宫遇艮之八艮下艮上史曰是謂艮之隨震下兊上葢初四五三爻得六三上爻得九凡五爻皆變惟二爻得八不變法宜用隨卦六二係小子失丈夫為占而史乃妄引隨之彖辭以為對非也六爻變惟乾坤占二用餘卦占之卦彖辭蔡墨曰乾之坤曰見羣龍無首吉此其例也於是一卦可變六十四卦而四千九十六卦在其中矣引而伸之觸類而長之天下之能事畢矣大衍總論大衍之數本之河圖其説舊矣因天地之數五十有五一叚在大衍之後彼謂減五行本數為大衍亦若有所㨿也至謂卦本六畫減五行并虚一之數為六爻故止用四十有九則穿鑿附㑹失愈逺矣殊不知蓍草一本百莖可當大衍之數者二故揲蓍取五十莖為一握以衍其數所謂天生神物聖人則之者此也況參天兩地三陽二隂變化錯綜以五乘十以十乘五其數皆五是五本數之祖也聖人用蓍以大衍其五十之數何必謂其取河圖洛書中之五數而大衍之哉天數五地數五五乃蓍之小衍故五十為大衍即八之為小成六十四為大成也惟其謂大衍之數皆從河洛五數而大衍之所以於河圖必去其五於洛書必増其五而後與大衍合恐聖人不如是安排布置也要之五數在天地間五行五倫五徳五方無往不然自大衍之數則為五十自河圖之數則為五十五自洛書之數則為四十五理本一致何必一一牽合而後謂之同哉或謂河圖數原在大衍後而減五以合五十之數既有所據矣然而不免於疑何也葢疑者疑五十與五十五數不免有所増損以強合之故也況天數五以下原在大衍後而今則在乎大衍之前矣天一地二以下原在第十章之首而今則在乎天數五之首矣豈不以舊文錯簡故從而更易之也又安知大衍與河圖數不有所混而不必合之為一章邪後學於聖經當信以傳信疑以傳疑愚於河圖大衍之數姑存其疑以請正云大衍河圖洛書先天後天總論昔聖人幽贊神明而生蓍則河圖洛書以作大衍參天兩地而倚數觀變於隂陽發揮於剛柔用九用六立卦生爻和順道徳而理於義窮理盡性以至於命故曰昔者聖人之作易也將以順性命之理在天曰隂與陽在地曰柔與剛在人曰仁與義此性命之原也故易有天道焉有人道焉有地道焉兼三才而兩之故六易六位以成章六十四皆變為六十四也三變十有八變成爻成卦八卦小成六十四卦而大成卦得先天則天地山澤雷風水火相錯順逆先天八卦六十四卦可窮也卦得後天則震巽離坤兊乾坎艮互易反對後天八卦六十四卦可窮也由先天後天始乾坤蒙終坎離既濟未濟而四千九十六卦生焉天地萬物之理盡在是也以之和順道徳而理於義以之窮理盡性則至於命矣卜筮總論先儒以易為卜筮而作未為非是但所謂卜筮者主於開物成務以前民用而非若後世之論利害也聖人以百姓迷於吉凶之故雖父兄臨之師保誨之官司治之亦不知畏也所畏者惟在鬼神且如蠻夷氐羌雖無君臣之序亦有决疑之卜或以金石或以草木國不同俗然各信其神以知來事而況於百姓乎故聖人因其明通之以卜筮使先齋戒以神明其徳徳既神明則機易發觸而後卜筮之師以言告之則無不聽焉趨吉避凶安身利用此聖人所以為神道設教也後世不知易之為教欲開人心而執其象占立為㫁例則不過一卜筮推測利害之粗迹耳先師有言筮固是易龜亦是易可謂知筮龜矣外易理而説蓍龜則其言豈不贅乎春秋以後卜筮别有繇辭如陳懿氏卜妻敬仲則曰鳳凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京晉獻公卜立􅌐姬則曰專之渝攘公之羭一薫一蕕十年尚猶有臭卜徒父筮秦伯伐晉遇蠱則曰千乘三去三去之餘獲其雄狐史蘇筮晉伯姬嫁秦穆公遇歸妹之暌則曰為雷為火為嬴敗姬車脱其輻火焚其旂不利行師敗于崇丘歸妺暌孤冦張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死于髙梁之墟如此類者甚多皆不以易理㫁也葢後人自為繇辭如漢焦貢易林京房火珠林之類耳或謂易中亦有此理不以其説為非則固後世之見也夫伏羲作易有畫無辭而因象觀變辭在其中豈易外之理别有一説哉及文王繫辭正以發明伏羲之意而已周公孔子復申爻傳四聖一心亦無他意乃復别繋之辭則易外又添一説矣雖于利害時或測知然瑣碎煩難理非一貫何足以開人心哉其在洪範言卜筮于卜則曰雨霽䝉驛克于筮則曰貞悔雨霽䝉驛克者是以五氣占也貞悔者是以二體占也然其辭則皆本於易矣雖筮法僅存卜法無考必不若後世于易理之外各以私見立説也不然卜筮亦小術耳何足以定天下之吉凶成天下之亹亹哉龜長筮短之辨大禹謨舜命禹曰朕志先定詢謀僉同鬼神其俞洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮既謀及于心又謀及于卿士庶人志乃先定而謀又僉同則何待于卜筮哉此見聖人之心至虚無物不敢以人謀自私也若謂卜以决疑不疑何卜則將有執其私見而不聽命于天者矣舜又曰龜筮協從卜不習吉是不再卜也而金縢則言乃卜三龜一習吉其所謂卜三龜者非立三人以相參考也正如洛誥有謂我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食此豈再三之凟哉葢即一事而分條異其命辭耳在舜卜禹而得吉則不必再卜此則卜澗水東瀍水西之外又卜瀍水東以覆騐洛之吉否不嫌于相襲也故曲禮曰卜筮不過三謂卜筮皆可以三為節亦豈謂必期于三哉然又曰卜筮不相襲者葢以卜人筮人各有專職故惟卜與卜襲筮與筮襲而以卜襲筮以筮襲卜則其法不相通焉若卜筮互相為占則禮之所有也禮先筮而後卜洪範亦有龜從筮從或龜從筮逆之説筮龜固並用矣但古大事決于卜故曰大事卜小事筮而左傳因謂之筮短龜長則二者並占以從龜為長耳卜筮互相推決故各立官蓍為枯株不若龜有靈性故尤以龜為長而小事則止以卜可也易以蓍龜並稱其徳本無髙下蓍短龜長之説葢自俗傳而蓍龜遂分輕重豈惟以龜有血氣之靈蓍為枯槁之物哉夫蓍龜所占皆本于易但龜主于象蓍主于數象則窮于五行數則觀于二體其所推極亦係于人之精神耳聖人不生龜亦不出而龜難蓍易業亦易傳意必當時卜師之術逺而深筮師之術近而淺推測各窮其術事之小大因亦殊焉故大事卜小事筮禮家遂著為兩用而不知龜筮之徳豈有二哉龜筮之法不知起于何時觀舜言龜筮協從則唐虞之前二法已皆有之或謂伏羲始造龜卜神農始以蓍筮亦臆説耳觀大傳聖人探賾索隠鈎深致逺莫大乎蓍龜之説則卜筮已備於伏羲之世矣圖書編卷六
