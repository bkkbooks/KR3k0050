body:
  text: 圖書編卷四十五明章潢撰三鎮總圖三鎮形勢總説惟國家並列三鎮雄峙北門嶽並星連相為犄角而先後諸臣又皆抒猷相勢嵗増時益以弭其缺無復遺慮是以二百年來雖以鉅鹿之都邑止限一山而虎豹闗嚴重扃復障實為萬仞此固我朝之所以跨軼歴代而屏蔽無疆者也然三鎮雖與九邊平列而三鎮為尤重至齊三鎮而論之則其事勢又有不得同者故欲處置三鎮而不先辯其所以異恐亦未能中竅而當機也抵掌談邊書生故態然形影疑似終非實際今以親歴全徼迴還幾三千里悉覩其險夷逺近强弱之狀然後能粗曉其槩竊惟國家受款六年于今而臣之閲視也則為再遣矣據今日之形以追思嘉靖之末而當時諸臣之處分亦或萬有一失而其説未易輒盡顧今日所以易轍更新者誠千載一時不可不深為之慮也請就即今大計論之部落渙散强逼邀求厚往薄来久飽優賜志望無厭而又姻連土蠻意窺遼左平居敵情之難處則宣府為上大同次之山西又次之止隔一牆烟火在望鐵騎騁頃刻即至况諳達聚牧各部皈嚮敵情所根呼吸異態則大同為最山西次之宣府又次之山川磽瘠士民貧困拜甡降人親戚潛通撫臣既逺人心易摇况太原河東久所垂涎萬一有變内外合發則山西為先大同次之宣府又次之古今處邊冦無出於戰撫守三者今日皆用之故撫賞市易所以為撫也修牆築臺所以為守也利器練兵所以為戰也已撫覩利各欲自全但有屈意無敢乖忤則各鎮於怒敵起釁諒無有敢居其先者牆臺修築各有年限形估尺度可按而求則将官於修築程工亦無有敢處其後者是撫之與守不足復煩朝廷之慮然竊謂今日之撫特以覊縻之爾固旦夕不可保也撫以戰而後可久守以戰而後可恃撫守有形而戰兵難試有形者可稽難試者易掩且不特此也撫久而不用則将與士皆鈍而不鋭工多而力竭則将與士皆困而日斃是今之撫與守且又以妨戰也察撫守戰三事之輕重而又較量三鎮不同之形勢則在宣府撫七而戰三處黄巴車史之夷安絶其險絶之山川稍可恃也大同守一而戰九牆但據其零犯而不能阻其大舉自非重兵無以防其四突而拒其奄至也山西撫三而守七葢以敵之市馬在山西為寡然偏老孤危西河乗氷春冬皆防也此其大都而要之皆不可忘戰若我兵素不敢言戰而以牆塹為守然悠悠二千里處處可拆而入姑以大同一鎮言之九萬之額則老弱疲癃悉在其中其有馬勝戈者約可四萬而堪責以戰者僅一萬餘人以此欲守六百里長邊則誰能辦之舉此一鎮則山西宣府可推故為今之計必每鎮挑其庸弱可以修工雜差者屬之守備而别聚其驍勇以教之戰而免其工與差庸将修工與戰将不相涉老弱工差與戰兵不相涉而工之不甚急者一切停罷無為敵所嗤工有完時而差終難免規模既定後自可修則庶乎兵有可恃而不以撫與守妨之此則今日之所當急講者也六闗總敘居庸𨽻薊州紫荆倒馬𨽻保定鴈門偏頭寧武𨽻山西巡撫居庸等闗本大行山與鴈門諸山相斷數百里鴈門亘南北大行絶東西表裏縱横左右縈帶閡狄藩華險由天造山西自井陘西北數百里崇岡複嶂扼為居庸迤邐東折玉帶神嶺諸山若拱若抱八陵在焉外拒四海沿潮河川古北口去敵不逺故居庸為京師北門居庸左轉蓋漁陽盧龍當山海之際古渝闗也控約遼東西右循太行西南以往包絡數十城皆平原沃野北倚上谷雲中皆宿重兵居庸東去舊有松林數百里中有間道騎可一人即巴咱爾導元兵趨南口者紫荆倒馬二闗隘口既多守備不能専内連真定保定大名古燕趙之郊平夷曠衍無髙山大陵為之限隔騎兵便馳逐南並井陘出山西路險隘士馬不能成列東更順徳廣平遂入齊魯下江淮鴈門三闗山東起代郡外斷雲中内略太原北境西盡雍河之濵鴈門稱絶險敵入大同川二邊不能守則鴈門當其衝寧武諸營堡不甚險隘敵往往由蕎麥川野猪口入婦女畜産驅逐已出塞而遊兵百里赴援難矣偏頭地平可馳馬故多邊患西北冬備河曲東北時備大同川往時諸險塞設闗夫環戍卒荷戈守吏辨符行者脅肩曳踵左右森立正徳以後商者入賂逋者奸閘廢鍪缺斤左右環立不敢誰何况覈符券嘉靖以來奸細出入至居京師習兵器而禁物羣來旅往如履康塗防哉防哉直𨽻三闗居庸闗𨽻薊州所轄撞道等口墩寨七十有三城二堡三屬馬步官軍一萬三千七百六十二員名子粒米二千六十二石新増餘地折色銀三百五十兩餘丁承稔米三百三十石馬四百二十二匹東路撞道等口一十三俱無住城横石牆一道共馬步官軍一百七十八員名中路雙泉等口三十六俱無住城横石牆一道共馬步官軍七百七十員名白羊口堡小石城一座馬步官軍五百八十一員名馬六十匹迤西六墩軍四十名西路柏峪等口三十七俱無住城横石牆一道有鎮邊城一座内除長峪城共馬步官軍五百三十三員名長峪城一座馬步官軍二百七十二員名紫荆闗𨽻保定提督所轄沿河等口七十六屬春秋輪班并備禦常守馬步官軍共五千八百八十六員名子粒米一千七十四石馬四百一十二匹䭾鎗馬八十匹外一層自東而西沿河等口五十二内除浮圖峪口共馬步官軍一千三十七員名浮圖峪口馬步官軍四十三員名馬八十匹内一層自西而東白石等口二十四共馬步官軍二百七十三員名倒馬闗𨽻保定提督所轄周家堡等口一百一十有五闗二屬常守備冬馬步官軍共五千八百一十三員名子粒米一千六十石備冬騎操馬一百三十匹東北路周家等口六十六内除插箭嶺口共馬步官軍四百九十七員名插箭嶺口常守官軍三百員名西南路龍泉等口五十一共馬步官軍一千四百四十一員名三闗處置居庸諸闗本太行山與鴈門諸山相斷數百里鴈門亘南北大行絶東西表裏縱横左右縈帶閡狄藩華時用大矣夫重險由乎天造掌固存乎人謀自古在昔隆壞多矣得道乎哉失道乎哉居庸號北門山形左轉盡漁陽盧龍當山海之際為榆闗控約遼東西右循大行西南以往包絡數十城皆平原沃野北連上谷雲中皆宿重兵表裏維固真天險哉西山自井陘西地數百里崇岡複嶂扼為居庸迤邐東折玉帶神嶺諸山若拱若抱七陵在焉外拒四海沿潮河川古北口去邊不逺備守其可忽諸居庸東去舊有松林數百里中有間道騎行可一人即巴咱爾導元兵趨南口者今以供薪炭翦伐條枚林木日疎薄樹渠藩塞豈無謂邪紫荆倒馬二闗隘口既多守備不能専内連中山保塞澶淵古燕趙之郊平夷曠衍無髙山大陵為之限隔騎兵便馳逐南並井陘接山西路險隘士馬不能成列東更鉅鹿邢洺遂入齊魯已巳之難敵有謀奪紫荆窺臨清者不有節庵司馬殆矣而謂國不以人重哉内三闗事宜夫三闗堂奥之區也宣大門户之地也入堂奥者必自門户以發軔今不固守於門户之外而徒過防於堂奥之間則吾之戍衆兵分而調布日見其不足矣焉得而缺兵之慮耶為今之計莫若増大邊之築以固藩籬併三闗之兵以守宣大補逃亡之軍以復故數汰老幼之卒以易精健一遇行伍缺人即於邊地選補葢其長生邊陲通曉地利習經戰陣夙知敵情非若内地之兵但可以為聲援而不可驅以克敵者比一遇黠冦内侵即能捐軀捍患務使我之門户肅嚴而堂奥鎮定則執樞據險戍守不分於堡寨之多健卒精兵軍威益張於萃合之後而又嚴清勾之法申鬻放之律罷貪鄙之将重賞罰之科則兵不求足而自足諸鎮之兵可不必調而遊食之民可不必招也况自古守封疆者必據險阻然不守其險之險而必守乎險之外是以古人之守江也必守淮而唐人之禦突厥也始以河為界其後張仁愿建三城於河外以扼其吭而折其脅自是突厥不敢踰山牧馬而朔方益以無虞嵗省費億計減鎮兵數萬此守在外而不在内之明驗也若即險而守則險與敵共矣然則守大邊而三闗之防益固夫孰以為非策之完也哉宣府總敘宣府秦漢時上谷郡也古冀州之域秦為上谷郡漢以下或為縣或為州五代石晉時入金遼為宣徳宣化州元改名宣寧尋為宣徳府淪没於逺方異域者葢四百餘年我太祖髙皇帝驅前元混一天下盡徙其民于闗内號其地為宣府洪武二十六年始置萬全都司于鎮城統衛一十九外分五路東路所統永寧城懐安城隆慶州城保安城南路所統順聖州西城東城蔚州城廣昌城西路所統萬全左右衛懷安洗馬林北路所統獨石馬營赤城雲州龍門衛城長安鎮中路所統葛峪大小白羊常峪清邊趙州六堡成化初増羊房堡俱鎮城耕牧之所設兵戍守五路各設㕘将一員營堡𦂳要處各設守備一員以嚴邊防宿以强兵統以主将監以内外重臣遂為朔方一巨鎮焉其地東距黑山南距紫荆闗西距枳兒嶺北據西髙山東南距居庸闗西南盡順聖川西北跨徳勝口距野狐嶺東北據獨石廣四百七十里袤八百六十五里國初常忠武王遇春破敵于漠北即元之上都設開平衛守之置八驛東則凉亭沈河賽峯黄厓四驛接太寧古北口西桓州威敵明安隰寧四驛接獨石太宗文皇帝三犂北庭皆自開元興和萬全出入嘗曰滅此殘敵惟守開平興和太寧遼東甘肅寧夏則邊境可永無事矣後太寧既以與敵興和亦廢而開平失援難守宣徳中迺徙衛於獨石棄地葢三百里土木之變獨石八城皆破雖旋收復而宣府特重矣宣府山川糾紛地險而狹分屯建将倍於他鎮是以氣勢完固號稱易守然去京師不四百里鎖鑰所寄要害可知北路獨石馬營一帶地雖懸逺然長阻長安嶺敵難徑下中路之葛峪白羊清邊諸堡西路之柴溝洗馬林萬全諸城南路之東西順聖皆稱要衝警屢至焉東路永寧四海沿及龍門所則三衛窺伺之地而四海沿上通開平大路下連横嶺兒又要地矣易曰王公設險以守其國今考塞垣所據險亦幾盡第時異勢殊有不可不為之經畫者若曰補長峪城鎮邊城之募軍重浮圖峪插箭嶺之防守留茂山衛京操之士以益紫荆築李信屯交界之堡以固兩鎮此豈容已乎且宣府軍士素稱敢戰乃近年㕘将都勲出境燒荒遇敵二十騎而潰闗山王經前後陷没此猶可諉也若滴水厓郭舉之叛及諸軍告糧而譟此則漸不可長况伊邇大同耳目習染可不慮哉是故有撫綏之将而後有節制之兵有節制之兵而後有疆圉之固籌宣府者此其大計矣至於邊儲一節則員外楊守謙所論葢得權宜之術附見於後以備一時㕘考云守謙曰嘗聞𢎞治中宣府各城粟茭之積多至有六七年者少亦不下三四年今則止數月耳倉厫儲蓄瓦礫場地鞠為茂草或勢家佃以為業然則飽歌騰槽之勢安得而復見哉邊鎮敝壞乃至此極賴國威靈僥倖無事使遇額森和碩之變将何以待之司國計者不可不深長思也宣府至京師僅三百餘里有必不得已之事則穵運之策可行也此葢先朝所已試者亦一時拯溺救焚之方云又按邊軍月餉法曰折色者六月本色者六月在邊者折銀七錢在内者折銀六錢又曰本折間支此諸邊之通例也然春夏之月禾稼未登粟價騰踊邊臣苦於蓄積之未多也則固與之折銀秋冬之月粟價稍平倉廩稍積則始與之本色當其騰踊也銀一錢或止易粟六七升或四五升是一月折銀猶不及半月之粟如之何其不饑而疲且至死也欲責其死綏之節不亦難哉説者謂亦於嵗例之外每鎮發銀十餘萬兩遇大熟之嵗則於嵗例招買之外糴粟六七萬兩中熟亦糴三四萬兩俱别儲之每春夏粟價騰踊如嵗例之粟尚足支持者借支二三月秋熟之後即於嵗例内招買者補償仍别儲之如此則士得實惠而所省亦且數倍即有重大敵患徵發旁午緩急亦有所濟矣此誠今日之急務而司國計者所當講求云宣府鎮領衛一十有五屬所六十六城三馬步官軍一十二萬六千三百九十二員名通鎮馬六萬六千九百八十匹屯糧六萬二千三百零二石地糧三萬九千一百五十三石有零圑種糧一十一萬五千八百八十六石有零公務驛傳糧一萬四千三百三十三石稻田徵米一千一百七十九石有零草二十二萬六千九百七十一束宣府鎮城元為宣徳府洪武二十五年始置左右前三衛二十六年命谷王治之尋廢展其制為方二十四里正統庚申都御史羅亨信奏以磚石甃之髙三丈五尺制稱宏偉設萬全都司以領之内撫鎮巡察糧儲總戎守巡二道暨副總兵一遊擊二皆居其中以為控馭之備官軍葢萬二千有奇倉庫主客糧料一十萬一千八百石有奇草一十八萬一千六百束有奇庫儲銀六十四萬三千九百五十一兩有竒東至雞鳴山堡南至深井堡西至萬全左衛俱六十里北至張家口七十里通一鎮之幅􅊷計之則二十二衛所咸𨽻屬之殆方千里志稱壤土沃衍四山明秀洋河經其南栁川出其北去京都三百五十里隔一闗之險葢西北第一鎮云其傍有寧逺站上花園堡皆以切近於鎮城故不特著宣府總説聞建國者必視其所都道里之極際以設邊而邊之緩急則以其際之逺近秦斥朔方漢略洮岷唐置蕃衛凡都之所在而蔽在背腋之間重也我朝都燕則以宣府為背故九邊莫如宣府重然竊謂不明二祖所以建都之逺慮則亦未能深知宣府之所以為重而籌之或有遺策也嘗竊窺之太祖起於淮右将與元人除殘則當引兵北向而乃南渡江者以元人未可與争鋒而以淮泗之兵取江南則易也既據金陵十六年截江而守之則江南之財賦分毫不得北渡而元人匱困及渡河北指彼但有遯而無戰故嘗恭為之説曰太祖之渡江而南也以强取弱及其渡河而北也以飽取饑太祖之定都於金陵也則以新享財賦之便故也成祖始封於燕至靖難之時以燕薊寧谷之兵内向遂成再造不據已成之金陵而更都旋構之燕京夫豈好為勞哉夫亦覩敵勢之尚强而慮相傳數百年之後處於金陵則逺且忘備故舍見基而就新構既都之後又勤三駕示掃除也故嘗恭為之説曰成祖之移北兵而南也本守成而實兼創業及其移南都而北也本創業而實計守成成祖之都燕也以親享兵馬之利故也太祖據財賦而未嘗忘兵馬則初年燕遼代谷之封割肌膚之愛以膺捍禦之寄而中山岐陽攻取經略最久且備夫亦以都在逺而尤勅其防乎成祖據兵馬而未嘗忘財賦則平江之經運河濟之轉漕殫竭羣策悉賦江南以雲集神都夫亦以有兵而尤急其食乎顧山後叢崖澗谷限隔操戈之技非乏而輸運之途難繼當時開平之棄太寧之移雖聖算淵逺有不可測而餽餉艱阻倘亦上疚宸衷然未足以妨萬年卜鼎之至計也定都之後再啓長陵兩朝全略獨雄百代是以二百年來謀臣猛将所以為宣府之謀者有所憑藉而况蒙三駕之餘靈恃天險之絶壁故巳己不戒雖敵入居庸而終恐兩鎮之擬其後則所以消其久駐之念而速其出者於山後之兵力亦有賴焉而庚戍再肆則别由薊鎮而不敢復窺上谷矣若使當時嚴蹕不離於江左親征不勤於再動則一山之限萬全之慮未必有如今日之備者而宣府其或有飲馬之擾乎故臣竊謂覩宣鎮之完而知二祖建都之逺慮者此也諸所營修皆切機宜而獨石孤懸尤為最要葢宣府者京師之蔽而獨石者又宣府之蔽自撫臣余子俊王儀以來更有増益然中路之竇未塞則葛峪之敗可懲於是督臣萬達疏曰長城之役西路張家口洗馬林西陽河諸處宣府最急者也中路葛峪常峪青邊羊房趙川東路别寧四海沿諸處宣府次急者也最急者宜督軍夫舉役次急者以待乗塞之兵審財量力期於有成而已中路既城然自四海沿而西至永寧自滴水崖而東南至龍門不扼其塞則京後尚孤於是萬達又疏曰自永寧墩歴鵰鶚長安嶺龍門衛至六臺子墩别為創修内垣一道與北路新牆連而為一北路原額官軍不輕内調内垣乗守永措兵馬葢不止備金湯之設崇虎豹在山之威亦且成首尾之形收率然相應之利也東路既成而龍門黑峪之路不通則應援之徑未便於是督臣逢時撫臣兑合疏曰北路東南外山起龍門所之盤道墩以迄靖胡保之大衙口延亘一百餘里山勢髙峻誠為天險若遂為修牆斬崖則滴水靖胡既有柞口之内邊又設盤道之重險敵騎自難入犯有警自龍門之黑峪以達寧逺邊内經行止三十里北路之兵由此以入衛南山東路之兵由此以出援獨石皆可朝發而暮至獨石孤懸勢相聯絡先是嘉靖二十九年敵騎自薊入犯諸臣始議掣宣大之兵馬以衛南山督撫移鎮懷來老師廢財而敵終以險絶不至於是督臣崇古疏曰諸臣原議每年春秋盡掣宣大山西之兵併守南山在山西則往返千里士馬疲勞致疎本境之防宣大則内顧外疎供飽耗費坐失各路之守是掣門戸之兵以守堂奥棄其所必攻而守其所不攻以衛京陵則忠矣以籌邊則非策矣宣大各守其境雖未能阻敵之不入而猶可邀於境上南山畿輔可保無虞宣大掣兵内防則敵可直至山後而藩籬愈壞是守宣大乃所以奠南山守南山乃将以棄宣大也自是罷宣大援南山而督臣不至懷來嵗所省不貲也凡是皆由先帝之獨決機謨陛下之聖神繼體而輔弼抒忠本兵飭備故敵款方洽風塵不驚用以快二祖世廟未畢之志而邊臣因得以其隙詳為修攘之慮築牆臺約兵食北門之守於今為壮矣或曰開平之轉運難繼則當徙三衛以入太寧之巢穴不除則當通宣遼以為絶塞謂社稷無疆之慶天所啟佑而事機偶值之會自需其時前總説所謂敵情之不可知者或将有待其至耶而非今日之所敢及也陽和事宜陽和當宣大兩鎮之交總督從中節制則逺近之勢既均緩急之應亦便即有𦂳報星馳未晩今乃擁聚兵馬久住懷來虚費嵗月坐耗軍儲敵未及乗而力已匱矣其見不亦左乎南山在宣府近京之地精兵宜守邊隅則對壘之戒日嚴長駕之威亦壯俟有信檄響應何難今乃外遺上谷單守南山消薄藩籬近防堂奥效未及收而短先見矣其計不亦後乎山西邊圖太原省城古虞之并州夏商省入冀周成王封弟叔虞曰唐其子燮更號晉國朝置太原府為會省晉藩封焉駐兩院三司領州六縣二十二置太原左右前三衛甎城方計三十六里髙四丈東抵直𨽻真定府界三百五十里西抵陜西延安府界五百里南抵沁州界二百一十里北抵大同府界三百五十里内馬步官軍二千八百八十九員名設㕘将一員統之撫院標兵六百八十一名禦冬二司官軍五百七十員名委把總官各一員分𨽻焉額徵夏税一十六萬七百石有奇秋糧三十七萬四千五百石有奇馬草七十四萬九千二百束有奇内充王府并官吏廩禄十三供宣大山西三闗軍餉十七郡治距邊不逺虜潰偏老則保河汾永被其掠入寧鴈則由代崞南下平原一望惟其所之故必東拒之于岢嵐西拒之于寧鴈而始可無恐云山西總説頃行閲山西自代而入雲中按地形而察治宜然後知山西之事勢與宣大又為迥異宣大全理邊務而山西則半撫綏宣大之撫臣守在邊而山西之撫臣駐於腹裏此其所以異也山西之守疆與大同相為聯絡本一省事也自寧鴈既以為闗而大同又或不足為蔽敵一闖入責相牽連於是始有分守之議邊計之誤莫謬於是然計當時敵患正據主議者以為重門待暴王政所不廢而再設寧鴈其後更増平型居常視之誠兩門戸也然使山西退守寧鴈而遂萃其責於大同可也敵越大同而後至寧鴈至寧鴈則責山西是矣而偏老之失守山西其容無罪乎是大同撫臣一其責而山西乃二其責矣此撫臣之所獨難者也悉寧鴈見在之衆而一偏老以為資則無守而不固今既分其力而退守則見分者以寡而成弱退守者合狹而就廣是守偏成或萬有一之能固而守寧鴈則惟敵之不入已矣則山西失守之責可坐而策也况民疲於設闗之多則修守與征輸俱困官分於顧盼之廣則應援與坐守俱艱偏守之将吏有緩其憂於既入寧鴈之将吏有冀其倖於未來若是者非計之失乎今自款貢以來合守之議已定無庸更論然合守之中有欲盡撤寧鴈之防者有欲兩存之者謂山西今日之所當講者失在於建官責守之非宜此百餘年相沿之誤其勢非有以更之則不免於病而固非特在於分守合守盡撤與兩存之間已也請詳言之乞陛下試垂聴焉夫沿邊之撫臣與中原異邊方之守無時可疎辰舉烽而敵午至矣而中原撫臣之兼兵權者謂萬有一失之防也今偏老孤懸與敵為一牆之限呼吸變態旦暮横出而欲以遥制之撫臣兼邊防即使出居鴈門猶恐突然突至之報比其達也則已入而掠掠且殘矣而况於省城乎秋居於代則河東冀南官員之㕘謁勞費無紀春還於省則偏老河曲邊計之請質懸斷難詳平居則使之奔走於道塗而為兩顧之守失事則且與宣大均其責而専駐之科夫乃無以服其心乎此撫臣之所不得言也且山西之三邊與陜西之三邊一也寧夏延綏甘肅之撫臣則分自陜西而同開府於陜西之境者也有延寧甘固四鎮則不當復有陜西撫臣然而終不能罷者良以撫臣之不可兼邊計也而山西撫臣獨使其春在省而秋在邊然則陜西撫臣於延綏甘肅逺矣而於寧夏為近獨不可使春還長安而秋駐寧夏乎而寧夏之撫臣亦終未嘗罷不設也偏老之孤危本不可與寧鴈之腹裏並列為封守而卒以並列者以責之一人故也寧鴈之設闗故也而以責之一人非也偏老之有寧鴈猶宣府之有居庸大同之有紫荆居庸不屬宣府而責之順天紫荆不𨽻大同而責之保定此所以為重門也而今山西乃責之一人若以為其足以辦偏老則凡平居之所以増兵設将為寧鴈之計者舉為冗濫無益之費若以為防其不能而姑設之也則何以異夫今之縣令責其輯牧里户矣而又許其别派於民以備逃亡之額也敵入偏老繩之以邊臣失守之法且曰朝廷先已許我退守寧鴈矣里户逃亡繩之以有司失牧之法彼且曰監司先已許我别派備逃亡矣可不可也今山西之民嵗輸之三闗與大同者以萬厯元年新收考之在大同者八十七萬五百有餘在三闗者四十一萬四千七百有餘而此外無名之費不與焉山西之民所以俯首而輸者以其足蔽我以生也而辛丑之驚澤潞壬子之犯太原丁夘之攻石州殘破之慘有不忍聞者即今保定之民僅供紫荆得大同之蔽而無大同之輸山西以全晉之力仰給三闗乃猶不免於被虜也兹豈非設官分守之有未詳乎故愚乞陛下割偏老以南寧鴈以北特設一巡撫而専委之以邊計而宣大而開封府於偏闗以總兵駐老營以副總兵駐河曲自平型北樓鴈門寧武而北悉以𨽻之移寧武道於偏闗以為分守而岢嵐保徳等州縣専屬偏闗巡撫如朔應之於大同山西都御史罷其軍務但専巡撫畫闗南而守之使得其整暇與監司冀南河東守令共圖所以輕徭均賦以休吾民者而供三闗萬一有警則親提太原汾州二營之兵以守鴈門而甚急則更調各州縣之兵以遏衝突偏闗㕘将換駐寧武其鴈門以北巡按事宜亦或以并於宣大而山西一應派額應輸三闗者俱仍其舊此非臆説也設巡撫於偏老而不涉省城所以視延寧甘肅之例也割闗南以屬山西而不使其與闗北之邊防所以視保定順天之例也如此截地而守之在邊臣専其責於沿邊也則尺寸在睫固為近而易圖在山西専其責於闗南也則撫守俱舉不以逺而或誤今撫臣逺在省城而總兵逸處寧武以六百里之邊付之副使與副将敵人方款貢已矣萬一兵端忽逞烽火再燔東之宣大西之延寧皆以撫臣専膺其責而獨山西一省疎其中空而誤於遥制是使全晉之背開一謾藏之竇而以太原河東誨盜餌敵也是時雖罪百撫臣将何救乎竊計必如此而後九邊皆密而無隙必如此而後三闗重設為非虚且自添撫臣一員之外不増一卒不加一将而坐收全守即増一巡撫不免於廩餼吏書紙劄之供計亦三五百金但取之山西巡撫每嵗移駐兩司府州縣往來㕘謁之費而足使山西得並於陜西保定以下為治而壯京師之右臂是将大有利於社稷又非獨利於山西與邊防巳也惟陛下俯擇焉山西外三闗鴈門闗所轄水峪等堡一十九馬步官軍一萬一千四百六十一員名子粒米三千八百三十石馬七千五百匹草四月至十月不支草料軍自行放牧寧武闗所轄羊房等堡十一馬步官軍一萬八百二十二員名子粒米二百七石馬六千一百九十九匹草十一月至三月支每匹每月支草三十束料九斗偏頭闗所轄羅漢等堡二十八馬步官軍一萬一千二百二十八員名子粒米二千一百九十石馬六千七十五匹草同上三闗險隘鴈門稱絶險敵入大同川二邊不能守則鴈門當其衝矣幽燕之兵出紫荆縈其左延寧之兵渡黄河拂其右敵可邀也昔李牧守鴈門誘匈奴入帳左右翼擊之大捷寧武諸營堡不堪險隘敵往往由蕎麥川野猪口等處入婦女畜産驅逐已出塞而老營遊兵方百里赴援難矣偏頭地平可馳馬故多冦患西北東備河西東北時時備大同川鴈門三闗之山東起代郡外斷雲中内略太原此境西盡雍河之濵東受降城在廢東勝州東北八里中受降城在大同府城西北五百里秦漢九原縣地西受降城在古豐州西北八十里相距各數百里鴈門闗迺冀之北境舜巡狩至恒山始啓鴈門趙孝成王使李牧備匈奴國初設闗于此以嚴鎖鑰古今盖重之也城用磚包延袤二里三百五十步髙連女牆三丈五尺東抵水峪口十里西抵白草溝十里南抵代州四十里北抵廣武站二十里内軍四百七十六名鴈門所統之廣濟倉積貯主客餉銀六千有奇糧料一千七百四十石有竒年來敵騎跳梁未敢由此一逞誌曰兩山相翼如鴈又曰鴈至此不北盖莫非状其險云寧武處三闗之中當華夷之要衝為東西之援應實陽方温嶺神池義井之門戸外接八角堡内惟岢嵐以一守備一千戸居之自偏頭徂鴈門似落寞矣寧武闗故屬鴈門成化二年都御史李侃請設官置守備𢎞治間置守禦千户所嘉靖二十年北部入寧武撫臣議移偏闗鎮守總兵官于此居中調度其城方計一千二百五十餘丈髙連女牆四丈二尺舊係土築近用磚包經始於隆慶四年完工萬厯三年巍然壯麗稱雄鎮矣内設正兵營官軍七百六十餘員名寧武所守城官軍七百一十五員名本城中盈庫萬億倉積貯主客餉銀八千九百兩有奇糧料一萬三千七百石有奇草八萬六千九百束有奇城固兵集保障無難且北有黄花梁之險南有陽武峪之固敵縱窺伺終難深入偏闗城洪武三十三年始設闗置守備宣徳四年置鎮守總兵官成化十八年罷總兵官置分守㕘将置協守副總兵正徳八年置遊擊将軍嘉靖二十二年復改鎮守總兵官時撫臣以内突日驚虞失大将乃請移總兵于寧武移遊擊于馬站以便應援於是以岢嵐道駐居而止設㕘将所部官軍三千七十有奇守備一員所部官軍七百六十有奇置偏頭所所轄守城官軍三百八十有竒舊係土城方計一千一百七十四丈七尺髙連女牆三丈五尺今議磚包足稱金湯之固内西盈庫保徳倉積貯主客餉銀二萬三百二十兩有奇糧料一萬五千二百八十石有奇草七萬九百束有奇但逼鄰敵巢板升叛人嵗時窺伺乃使總兵移去逸地而此則空虚最為失策而今亟當改圖者也圖書編卷四十五
