body:
  text: 圖書編卷一百二十四明章潢撰工曹總叙禹作司空平水土見諸書乃召司空俾立室家見諸詩周禮冬官亡漢時補以考工記此後世工曹所由設然平水土立室家工之意可見矣夫冬官之職既不可考亦豈待考工記補之而後為冬官之全乎大宰事典以富邦國以任百官以生萬民小宰事職以富邦國以養萬民以生萬物則事官之意在周禮可覩也周官亦曰司空掌邦土居四民時地利則司空之意在周官可推也況冬之為言終也萬物成終畢歸其根亶空土而已命之曰司空豈無意義而云然哉惟藏而固之富而生之此所以為冬之象也任其官而職司其藏斯無負于冬官司空之名也漢唐以來民曹左民起部工部設官分職名各不同其掌百工之事則一而已矣我朝工部之設即周冬官大小司空以營繕虞衡都水營田分司其職掌固有在焉然孔子九經來百工財用足周禮周官富邦國養萬民生萬物時地利視今之工曹同乎異乎建國分野工匪細務况浚兩河之漕渠固九邊之城堡通東南之水利開西北之營屯禁四方居室器用毋作滛巧踰制傷財而敗俗今日足國富民宜莫切於此者若夫悦以使民民忘其勞龍見戒事火見畢工在論語使民以時盡之矣噫司空執度度地居民無曠土無游民食節事時民咸安其居樂事勸工尊君親上然後興學想王制非無稽之言也㑹而通之考工記曽足以補之哉空之為言空也相天下之大勢擇其空缺之處而修治補助之故天文室壁之未有土司空一星土公二星主知水土殃咎周官之職曰司空掌邦土居四民時地利記曰司空度地居民使地邑居民必參相得無曠土無遊民司空之職莫大于此蓋司徒掌其圖數而司空治其工程司空建其始而司徒守其成此其聨事若此而後人遂欲以相併也然則冬官之屬當其掌大均之事如地官之徙民宗伯之聨衆又當有善景相觀卜以經營疆理于四方如詩稱召伯之世執其工燕師所完者且天垂象聖人則之室壁閣道星宿燦然皆天之垂象也如百工之事惟土木為大故蓋屋二星土工吏二星列象于營室之下又百工居肆以成其事故土司空四星列象軫翼器府之下以冬官而言當有工師以統造諸工又當有梓人以統制器百工是考工記之事虞書所謂共工也夫共工者誠冬官之事但其一屬耳故取之以入冬官則可用之以補冬官則不可兹以天象之有闗于冬官者而參互之亦可見其大端矣五聖制器尚象圖離下離上離包羲氏罔罟取諸離震下巽上益神農氏耒耜取諸益震下噬離上嗑市取諸噬嗑乾上乾下乾黄帝堯舜衣坤下坤上坤裳取諸乾坤坎下巽上涣舟楫取諸涣震下兌上隨服牛乘馬取諸隨坤下震上豫門柝取諸豫艮下小震上過杵臼取諸小過兌下離上暌弧矢取諸暌乾下大震上壯棟宇取諸大壯巽下大兌上過棺椁取諸大過乾下兌上夬書契取諸夬楊誠齋曰自斯人之饑而未知佃漁也聖人於是乎作網罟自斯人之肉食而未知粒食也聖人於是乎作耒耜自斯人之食貨或有餘或不足之偏匱也聖人於是乎作市易自斯人之寒而衣皮未知織絍之製也聖人於是乎作衣裳自斯人之出入尼於川隔而道斷也聖人於是乎作舟楫自斯人之疲於負擔而艱於逺塗也聖人於是乎作輪轡自斯人之虞於冦攘而懈於守禦也聖人於是乎作關柝自斯人之知有耕耨而未知舂榆也聖人於是乎作杵臼自斯人之無爪牙以自衛而憂於搏噬也聖人於是乎作弧矢自斯人之穴處而病於濕蟄也聖人於是乎作宫室自斯人之死而戚於虆梩之掩也聖人於是乎作棺椁自斯人之窮於結繩而相欺無籍也聖人於是乎作書契然非聖人之私智也取諸十三卦之象而後為亦非一聖人之能為也厯乎五聖人而後備易繫辭曰以制器者尚其象又曰見乃謂之象形乃謂之器右十三卦聖人制器尚象之事也器無窮卦象亦無窮豈特十三卦為然哉夫子特舉此以發其例耳觀此則聖人之用易也豈盡假卜筮以用之而卜筮一端亦豈足以盡易也嗚呼形而上者謂之道形而下者謂之器道器非二也吾人日用間何徃非象何徃非器果能象事知器乎抑亦得心忘象而與道俱乎善用易者可以自省矣定北方之宿營室星也此星昏而正中夏正十月也建亥月小雪中氣之時於是時可以營制宫室故謂之營室衛為狄所滅文公徙居楚丘營立宫室樹八尺臬而度其日出入之景以定東西又參日中之景以正南北也厯代立八尺之表以量日景故表短而晷景短尺寸易以差元朝立四丈之表於二丈折中開竅以量日景故表長而晷景長尺寸縱有毫秒之差則少矣元朝立簡儀為圓室一間平置地盤二十四位於其下屋背中開一圓竅以漏日光可以不出户而知天運矣古法以五表求地中以今思之惟用一表其表與人齊高當午日中畫其短景於地以為指北凖繩置窺筒於表首隨凖繩以窺北極若見北極當筒心則其處為得東西之正或窺見北極之東則其地偏東窺見北極之西則其地偏西矣既得東西之正乃於二分之前十日内就其處置壺漏定十二時以兩日午中短景求與時參合於春分前二日或秋分後二日日正當赤道之際於卯酉中刻視其表景畫地以定東西準繩若卯酉兩景相直而不偏平衡成一字則南北正中矣兩景或曲而向南則其地偏南或曲而向北則其地向北矣此法蓋以午景與北極定東西之偏正又以東西之景定南北之偏正測驗之最精者也凡地偏於南多暑偏於北多寒偏於東多風偏於西多隂唯中得天地之正隂陽之和大司徒以土圭之法測土深正日景以求地中日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之按洛誥所謂自服于土中蓋以自三代以前則洛為中國之中以今天下觀之則南北袤而東西蹙則其所謂中者蓋在荆襄之間也朱子曰豈非天旋地轉閩浙反居天地之中閩浙乃東南海盡處難以為中朱子蓋以聲明文物通論天下非論地勢也土圭法自伏羲造蓋天而土圭之制已寓至周公稽日景而土圭之名始立迨虞氏用九尺表而土圭之用始驗其所謂土圭者所以求土地之中而稽日景之永短也是故掌以司徒崇地官也縣以陽城辨中域也立表於夏至之日示相等也置圭於晝漏之半取中正也然則天地之所合四時之所交風雨之所㑹隂陽之所和不以土圭驗之其可哉要必置中圭而後可以測日之中置南圭而後可以測日之南置北圭而後可以測日之北置東圭而後可以測日之東置西圭而後可以測日之西否則不足以辨千里之景也必於平地立南表而後可以測南土之深望北極立北表而後可以測北土之深於東方立東表而後可以測東土之深於西地立西表而後可以測西土之深於南表影末立中表而後可以測中土之深否則不足以辨五方之正也由是而推證之於天則為春為夏為秋為冬驗之於地則或東或西或南或北質之於人則多暑多寒多風多隂舉造化之大皆不外於尺有五寸之制又奚必候氣於緹室占象於渾天定晦朔於蓂莢哉蓋天地之升降不過三萬里自地以至日不過一萬五千里圭之景茍差一寸則地差千里宜矣故古人置五土圭而皆以千里為證是必有高天下之見今之地中與古已不同漢時陽城是地之中宋朝岳臺是地之中岳臺在浚儀屬開封府已自差許多周禮匠人置臬以度日影辨方正位之法水地以垂謂先以水平也高下四方皆平乃于營造處四角立四柱于四柱用垂繩以正柱柱正然後以水平之法遥視柱高下高下定則知地之高下然後平高就下則地乃平也置臬以垂眡以景臬柱也于所平之地中央樹八尺之木以為表表界其四面之中又四稜垂八繩以等之繩皆附表則正然後視表之景表必八尺者日從上向下八萬里故以八尺為法厯代立八尺之表以量日景表短而晷景短尺寸易以差元朝立四丈之表于二丈折中開竅以量日景故表長而晷景長尺寸縱有毫秒之差則少矣元朝立簡儀為圓室一間平置地盤二十四位于其下屋背中開一圓竅以漏日光可以不出户而知天運矣工總考舜典帝曰疇若予工僉曰垂哉帝曰予咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞徃哉汝諧帝曰疇若予上下草木鳥獸僉曰益哉帝曰咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞徃哉汝諧按工之官缺則民用不周虞之官缺則物生不遂故舜視百工萬物皆予一體故皆曰予而虞工列于九官自古重之矣周禮屬虞衡于夏官今則幷山澤虞衡統屬之于工部益垂猶且讓之任是職者可輕視之哉周禮冬官其屬有考工掌百工之事曰國有六職百工是其一焉漢成帝初置尚書有民曹主凢民上書後漢光武改民曹主繕修工作鹽地園囿魏置左民尚書亦領其職晉宋以來有起部尚書而不常置每營宗廟宫室則權置之事畢則省以其事分屬都官左民二尚書北齊起郎亦掌工造屬祠部尚書後周有冬官大司空卿掌五材九範之法其屬工部中大夫承司之事百工之籍而理其禁令至隋乃有工部尚書統工部屯田二曹蓋因後周工部之名兼前代起部之職唐龍朔二年改工部尚書為司平太常伯咸亨元年復舊宋則工部判部事一人以兩制已上充凢城池土木工役皆𨽻三司修造案本曹無所掌元豐官制行尚書工部掌天下城池宫室舟車器械符印錢寳之事與山澤溝洫屯田之政令焉按營國每旁三門城郭各十二門城内縱横大道各二界為井字中之州有九其餘道塗九經九緯各有區城中為王宫前朝後市左祖右社凢制禮大物不過十二賈氏之説得之匠人云九里蓋有闕誤不足為據然所謂十二里者必以道計四面皆如其數然後可以容百官府之次舍賔客之旅寓工商之㕓肆茍以方計之則每面止三里尚足為王者之都乎都邑制度古者建國必先于辨方正位是以匠人置􅈏眂景必正地中以天地之所合四時之所交風雨之所㑹隂陽之所和然後建王國也匠人營國方九里旁三門國中九經九緯南北之道為經東西之道為緯經凃九軌左祖右社前朝後市市一夫百畆之地方足以容之其制大畧如此然必有土方氏掌土圭之法而大司徒又掌其凢蓋重其事也而建都之本則更有在焉周禮曰惟王建國辨方正位體國經野設官分職以為民極蓋王基立而後根本定方位設而後等級明國野分而後疆理正官職舉而後綱目張凢以為民立極也昔人有言曰京都為四方之極猶紫辰為周天之極然京都固為四方之極而帝王又以建惟皇之極也則宅中圖大以定四海之民者固自有本矣爾雅釋宫曰西南隅謂之奥西北隅謂之屋漏東北隅謂之䆠東南隅謂之窔邢昺曰室中四隅之異名也賈公彦曰室中謂四壁之内朱子曰廟室之制皆如此按朱子殿屋説殿屋五間前皆為堂中間後為室又釋宫文曰堂之室南北五架北兩架之間為室則室止一間而當兩架之中其地甚窄意者朱子舉此以見例耳其實古之為所謂巨室者東西不止一間而南北不止兩間也爾雅曰室有東西曰廟無東西廂有室曰寢西南隅謂之奥西北隅謂之屋漏東北隅謂之䆠盈之反東南隅謂之窔一弔反東西墻謂之序牖户之間謂之扆宫中之門謂之闈門側之堂謂之塾廟中路謂之唐堂塗謂之陳唐與陳皆堂下至門之徑特廟堂異其名耳又曰柣于結反謂之閾棖謂之楔革鎋反又先結反橛謂之闑魚列反蓋界于門者柣也亦謂之閾旁于門者棖也亦謂之楔中于門者橛也橛巨月反亦謂之闑士䘮疏云房户之外由半以南謂之堂士昏疏云其内由半以北亦謂之堂堂中北牆謂之牖士昏尊于室中北牖下是也堂下之牆曰壁士虞饎爨在東壁是也坫有東坫西坫士䘮疏云堂隅有坫以土為之是也塾有内外士冠註云西塾門外西堂是也月令曰其祀中霤燕禮設篚當東霤此言諸侯四注屋之東霤又有門内霤燕禮賔執脯以賜鍾人於門内霤是也邊方堡制議堡制者非無制之難也能全其制之難也夫善守者因天之財就地之利故敵有不攻藏於九地之下古人曰收其伍全逺其五敗又曰濶與上倍高與下倍今之民堡豈知是哉故三約堡制其目有四一圍垣地置既得則圍垣宜講也大小不限曲直無拘但取内容丁衆外逺俯逼而已然大不如小小則堅直不若曲曲則易守故宋藝祖筆塗趙韓王城圖不使端直金粘没喝一覩汴城便謂易攻也又古人垣制多以高五丈下濶二丈五尺上濶一丈二尺五寸為式今時民堡則大率高一丈五尺加陴􅯜為二丈下濶丈餘上濶五六尺而已垣太低則矢石易及陴􅯜難保近敵攻堡多飛石墜其陴則人不敢垣立而後蟻附以登今制以垣高二丈加陴􅯜五尺共二丈五尺視古制為半下上收闊亦如之庶中道也二敵臺圍垣既立則敵臺宜講也夫垣之棄守全在敵臺垣雖方直有臺則守垣雖委曲無臺亦棄然敵臺宜多多則䕶垣為易宜高則四擊不礙古制謂敵臺高與垣等者以垣高五丈也今垣僅及其半則臺宜加高先年肅敏公論塞垣敵臺曰每一里一臺以為火器所擊不下三百步夫火力縱及豈能一一盡中中空過寛來徃鮮力矣則又宜加多今時民堡敵臺全不如制受病甚多如角臺本宜平直即以東北角論之則循北垣而東築臺若干丈尺亦當循東垣而北築臺若干丈尺若欲以垣相附以省工費則附東垣矣不得更附北垣附北垣矣不得附東垣縱使兩垣俱附亦須為臺三四附墻者半專面者倍如以磬直向外磬折向内然者今皆不循垣直出又不以磬直向外但叠土兩垣之間斜附而上地置既繆矢道皆斜臺以塞垣而矢石不及何以為守又一面止築一臺夫臺之多寡以堡之大小為之堡大則多堡小則少大抵兩空不得過五十步又堡有垂角而出縮腹而入者亦須量勢為臺必使相及今一面止築一臺不論逺近出入矢石縱及亦弱而無力倐忽之間為敵乗矣又高與垣等而收頂不及一丈夫垣陴恒為敵墜者垣低石可及也今臺高與垣等則臺陴亦不易呈收頂止一丈所容寧幾人發矢發火器何以展布又臺陴不五六敵以兩弓注一陴則臺人不敢伸首出望與無臺等矣此皆害人之大者今制臺高三丈高于垣一丈収頂方二丈皆東南直出陴墻至三尺而止順立柱木二尺餘上加横木復為墻尺許中空遍置木牌外為附眉内加轉撥或開或閉惟吾所欲彼注矢于此吾則啟牌于彼夫陴畏注矢以陴無一定也牌啓無常斯不畏注矢矣此專為發火箭與矢若夫礟石則踰墻四出不必凝望忖度也三陴􅯜敵臺既就則陴􅯜宜講也夫垣既不高陴復削薄遇攻則不支其衝竿飛石之徃來自守又無以久縣石縣木之上下一有損墜即將以赤身之人立于孤垣之上聲弦可顛矣邊人曰敵飛石墜陴則以竿裹裘為人形加革㡌高掲之以惑人衆見喧曰敵登矣争先自投敵徐蟻登此陴之害也今民間率用土坯殖土以成曰土坯又率立植其易墜故宜近有議用磚者磚質狹小亦與立植與坯何異但多費耳今制必用泥坯水和土模成者曰泥坯横卧為陴外以茅泥多入泥以草或麥藁曰茅泥固之庶堅厚可頼也四甕城陴􅯜既成則甕城宜講也夫民堡之破半咎于門何者鐵裹以禦火也今鐵葉至薄不禁薫灼鐵熱木焚為力不難而門上無懸樓以逺擊無漏槽以下水嘗計人力擲草幾至十歩千人齊擲草且成丘發火以焚無不鎔壊門壊則雖有人乎垣無及矣故必有甕城高厚與堡同内外俱為陴􅯜旁開一門亦用鐵扇已併廢堡之門取以為用可也夫甕城高厚與垣等内外皆陴則雖洞其外門亦無敵敢入者而况為重門邪甕城門亦備漏槽下水民堡説昔晁錯為文帝畫備戒之䇿曰逺方之卒守塞一歲而更不知北人之能不如選常居者家室田作具以備之以便為之高城深塹具藺石布渠答又曰要害之處通川之道調立城邑毋下千家夫錯通變審機權漢智囊也其所圖畫城垣而已則所謂實勝不為誇辭者與夫自井田之制廢而地險盡夷封建之典隳而兵力大弱塞鄙之地密邇異國吞噬日聞必待烽火徹于甘泉六軍屯于細栁然後徐興問罪執言田禽則塞地赤矣故曰百戰百勝不若先為不可勝以待之先為不可勝則城其首務也嗟夫錯之為文帝畫也時值其難姑舉其大乃今而用錯畫則時易而當致其詳事半而功倍之者也何者楚漢兵爭燕代反復漢其時塞口至絶少夫錯首言更踐之無功次陳謫戍之賈怨立拜爵之科開贖罪之路多方以求懼無人也調立城邑毋下千家慮不守也乃若今時則生養既久户田大滋由塞垣以達畿輔林林總總不憂無人也郡邑碁布不憂不守也所慮者村落之民耕作之輩耳徙之城市則奪我農時任其便安則遭罹敵患故必鄉為之堡而家敎之守鄉為之堡險在地也家教之守險在人也在地者宜固在人者宜周蓋嘗尤諸前圖事者矣宣徳之間邊警絶少塞宜城也而不城成化𢎞治之間塞田屢减郷宜堡也而不堡𢎞治正徳之間戎馬擾矣民亦漸為堡矣官宜為之制也而不制塞宜城而不城則疆塲伸縮之間形勢之憾生矣郷宜為堡而不堡則牧馬數警之後奔命之疲急矣官宜為之制而不制則力徒勞財徒費堡而不實矣凡民圖其近而忘其逺安于常而不知變者也官不為制則仭餘崇雉數丈以為廣剥落以為堅危逼以為安又富者侈其慾貧者玩其期狡者舞其智武斷者逞其僭是故塞下堡無一可式者也道里不干相去之逺近也形勢不干首尾之應援也丁口不干集聚之衆寡也智勇不干夙昔之遴别也古人曰有生地有死地謂其可以生人可以死人也然則近日之堡固非生人者與今之言禦敵者曰選精鋭以衝其中虚是之謂戰城塞垣以遏之境上是之謂守而必終之曰堅壁清野夫言戰曰養士矣言守曰城塞矣至言堅壁清野則惟付之虚文可乎夫民堡不固是壁不堅也敵入有獲是野不清也知戰而不知固民堡不植其根而長其枝葉者也知城塞而不知固民堡不去其餌而欲止魚者也烏可得乎嗟夫欲戰必先擇官欲守必先清野清野必先堅壁一定之畫也城民堡而約之制團丁壯而教之戰以民堡之固不固稽守令保障之功以團丁之精不精察守令佚使之績必使彼至塞不能入也入無所掠也不能入則勞費無所掠則饑疲衝其中虚邀其惰歸此其時也或問民堡之制如何曰載在郷約長城説長城之築起臨洮至遼東延袤萬餘里非獨秦始皇築也昭王時已于隴西北地上􅇿築長城以備邊矣亦非盡秦築也起自代並隂山下至髙闕為塞燕自造至襄平亦皆築長城矣秦之後若魏若北齊若隋亦皆築焉蓋天以山川險隘限南北有所不足増而補之亦不為過且有為民之意存焉使後之人懲秦人起閭左之失慮蒙恬絶地脉之禍而廢其已成之功非計也但内政不修而區區于外侮之禦乃至于竭天下之財以興無己之功則不知所務耳圖書編卷一百二十四
