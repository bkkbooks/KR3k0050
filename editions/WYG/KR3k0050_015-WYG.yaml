body:
  text: 圖書編卷十五明章潢撰學中庸叙中一而已矣世之言中者何不同乎曰無過不及中也此自有形體者言也曰不偏不倚中也此自有方所者言也惟未發之中則方所形體俱冺而不偏不倚無過不及悉渾涵于其内也故在天謂之命曰於穆不已曰無聲無臭者此也在人謂之性曰不覩不聞曰至隱至㣲者此也不其淪於無矣乎蓋雖不覩不聞其實莫見莫顯無而未嘗無有而未嘗有所以謂之獨也是獨也喜怒哀樂未發謂之中發皆中節謂之和可見雖云未發而其所以為喜怒哀樂者自有在矣豈若世之求中于未生身已前者淪于虚而隨時處中于過不及之間者失之滯耶學者果於喜怒哀樂未發識其所謂中則戒謹恐懼之功自有其不敢須臾離者庶幾乎君子中庸矣否則中且未識又何怪乎中庸之不可能哉噫知此則知擇乎中庸信不容己矣噫世之論時中者悉後儒之中庸也子思子未發之㫖竟莫之省惜哉子程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理此篇乃孔門傳授心法子思恐其久而差也故筆之於書以授孟子其書始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於宻其味無窮皆實學也善讀者玩索而有得焉則終身用之有不能盡者矣中庸章句序曰中庸何為而作也子思子憂道學之失其傳而作也蓋自上古聖神繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也人心惟危道心惟㣲惟精惟一允執厥中者舜之所以授禹也堯之一言至矣盡矣而舜復益之以三言者則所以明夫堯之一言必如是而後可庶幾也葢嘗論之心之虚靈知覺一而已矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或㣲妙而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危㣲者愈㣲而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安㣲者著而動静云為自無過不及之差矣夫堯舜禹天下之大聖也以天下相傳天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有以加於此哉自是以來聖聖相承若成湯文武之為君臯陶伊傅周召之為臣既皆以此而接夫道統之傳若吾夫子則雖不得其位而所以繼往聖開來學其功反有賢於堯舜者然當是時見而知之者惟顔氏曾氏之傳獨得其宗及曾氏再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈久而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者蓋其憂之也深故其言之也切其慮之也逺故其說之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也世之相後千有餘年而其言之不異如合符節歴選前聖之書所以提挈綱維開示藴奥未有若是之明且盡者也自是而又再傳得孟氏為能推明是書以承先聖之統及其没而遂失其傳焉則吾道之所寄不越乎言語文字之間而異端之說日新月盛以至於老佛之徒出則彌近理而大亂真矣然而尚幸此書之不冺故程夫子兄弟者出得有所考以續夫千載不傳之緒得有所據以斥夫二家似是之非蓋子思之功于是為大而㣲程夫子則亦莫能因其語而得其心也惜乎其所以為説者不傳而凡石氏之所輯録僅出於其門人之所記是以大義雖明而㣲言未析至其門人所自為說則雖頗詳盡而多所發明然倍其師說而淫於老佛者亦有之矣熹自蚤歳即嘗受讀而竊疑之沉潛反復蓋亦有年一旦恍然似有以得其要領者然後乃敢會衆說而折其衷既為定著章句一篇以俟後之君子一二同志復取石氏書刪其繁亂名以輯畧且記所嘗論辨取舍之意别為或問以附其後然後此書之㫖支分節解脉絡貫通詳畧相因巨細畢舉而凡諸說之同異得失亦得以曲暢旁通而各極其趣雖於道統之傳不敢妄議然初學之士或有取焉則亦庶乎行逺升高之一助云爾中庸修道說曰率性之謂道誠者也修道之謂教誠之者也故曰自誠明謂之性自明誠謂之教中庸為誠之者而作修道之事也道也者性也不可須臾離也而過焉不及焉離也是故君子有修道之功戒慎乎其所不睹恐懼乎其所不聞㣲之顯誠之不可掩也修道之功若是其無間誠之也夫然後喜怒哀樂之未發謂之中發而皆中節謂之和道修而性復矣致中和則大本立而達道行知天地之化育矣非至誠盡性其孰能與於此哉是修道之極功也而世之言修道者離矣故特著其說中庸二字乃形容吾道之情状也命於天為性率乎性為道修乎道為教其道之本體曰中曰和其本體之所該貫曰天地萬物其本體之至無而至有曰費隠其本體至無至有之靈妙曰鬼神其本體之實備於人為達徳為達道為九經為三重為三千為三百其實體是道者為舜之知為回之仁為子路之勇為舜之大孝為文之無憂為武周之達孝其一以貫之者為孔子之祖述憲章上律下襲其效之至曰參賛曰配天曰篤恭而天下平其統括於一則謂之誠其行之自然勉然則有誠者誠之者之别其誠之者之事則在擇善固執其事則在學問思辨行其學問思辨行之要領則在尊徳性道問學其實落下手工夫則曰慎獨而已知幾者慎獨也為己者實落做慎獨工夫也知慎獨者可以言中庸矣天命之謂性言性即命也率性之謂道言道即性也修道之謂教言教即道也一物也此其所以不可須臾離也可離非道也然世人類說修道卒不近者何故則以認不真在暏聞形氣上著工夫也不睹不聞是畫出個天命的様子也戒慎恐懼要於此著力何也以一切睹聞者皆從是出也至隠至㣲矣而實則莫見莫顯也此君子之所以必戒慎恐懼而致謹於斯也獨者何所謂與物無對者是也蓋本無聲無臭者也亦是畫出個天命的様子也雖然亦畢竟非冥寞逺於性情之間者也有喜怒必有所以為喜怒有哀樂必有所以為哀樂則未發者為之也天命也故未發非時也本無睹聞本自未發也中者亦不得已而名之也循是而發之未有不中其節者即渾然一天命用事也發而未發也所謂率性者也此其所以為達道也然又非有我之所私也致中和則天地以位焉萬物以育焉蓋本同一體者也實理實事言天而不為誇此正所謂真性作用非用爾手勞脚攘也篤恭而平垂衣而治正是此消息屑屑於事為以為位育之作用者亦淺之乎言位育淺之乎知性命矣堯曰咨爾舜天之厯數在汝躬允執其中人皆受天地之中以有生而中其原于天乎子思子作為中庸其諸本家學以發明執中之㫖乎不然何以首曰天命終曰天載言中庸之道而諄諄于天也然則孔子天縱之聖也猶曰中庸其至矣乎是中果為天道而非人之所能乎殊不知天也人也其中一也自誠明謂之性天道也誠則明矣明則誠矣天人一也所以首言戒懼終言敬信非人道乎戒慎不覩恐懼不聞不動而敬不言而信非天道乎但思知人不可不知天也惟天之命於穆不已在人即為喜怒哀樂未發之中中即性也天下之大本也然而又謂之率性之道何道哉君臣也父子也夫婦也昆弟也朋友之交也五者原之天焉為天秩具之人焉為人倫凢同此性者同此道焉隨其倫之所接而率吾之天性以行之則發皆中節之和是即天下之達道矣若修道之教正所以教之使復其固有之性全其未發之中而五者之間不敢以一毫己私戕吾之天命也可見是中也洋洋優優淵淵浩浩視之不見聽之不聞無為而成夫焉有所倚也凡所謂獨也一也誠也隠與㣲也神與化也皆此中之别名也故不徒謂之中而謂之中庸庸者日用之常也君子之中庸也君子而時中時時此未發之中未嘗須臾離乎道也試自日用觀之擇中用中豈徒飲食之味為然哉自一身以達諸五倫體之為庸徳宣之為庸言布之為三重九經極之為參贊位育顯之為鳶魚之飛躍幽之為鬼神之屈伸統之為發育峻極之大散之為三千三百之精近之為愚夫愚婦所可與知與能逺之為聖人天地之所不能盡莫不由此以逹之則亦何莫而非率性之道哉夫何小人之反中庸者行險僥倖無所忌憚是以災及其身無足怪也然智者知人之所不必知賢者行人之所不必行而其不明乎道不行乎道賢也智也愚不肖也一也此民之所以鮮能此中庸也君子欲明善以誠吾之身道問學以尊吾徳性而時時允執乎中也寧能己於學問思辨篤行之功人一巳百人十巳千之勇哉但行逺自邇登高自卑致曲者必欲積累而致此固入徳之事也其必本吾之所以慎獨者造端夫婦於以達諸子臣弟友之倫言事行道之際上下窮達之交富貴貧賤夷狄患難之遇雖日用之應感於外者不能皆齊而内省不疚一皆在於不言不動不覩不聞之隠㣲焉庶乎獨之慎也時時此未發之中即時時發皆此中節之和而至誠無息篤恭不顯凡其徵之為博厚髙明悠久者其有以盡人性盡物性參贊化育以至於配天一皆庸常之達道也一皆至誠之能事而闇然日章誠之不可揜也然則大經大本敦化川流不其會之於一中乎舍中以言中庸者不有以失其命名之㫖乎雖然執中一脉肇自帝堯而舜之受命文之無憂武周之繼述固皆纉承之勿替惟祖述憲章上律下襲凡有血氣者莫不尊親而仲尼一天也子思子發家學於中庸首末言天首末咸歸之仲尼意亦微矣噫世之求中庸者將以天道為高逺乎達之人倫不可須臾離也將以人道為近易乎原之天命無聲臭也信乎中庸不可能也惟聖者能之茍不固聰明聖智達天徳者其孰能之中庸大㫖人受天地之中以生所謂命也中庸以中名篇遡其中之源流謂天命即性也此天道也率此天命自有之性見諸日用常行即道也但仁知各執一見百姓日用不知則未必皆中矣惟隨日用之道而修之即教也非人道而何是道也不可須臾離也雖性道不可覩聞而修道君子則戒慎不覩恐懼不聞須臾不離乎道也覩聞不著若至隠而至㣲實莫見而莫顯所謂獨也惟君子為能戒懼慎此獨也獨一而已矣然而有中和之名焉喜怒哀樂乃性之所固有者自其未發謂之中自發而中節謂之和是中也不徒謂之本而為天下之大本是和也不徒謂之道而為天下之達道果能慎獨中極其中和極其和則天地此位萬物此育蓋天地萬物原吾一體一人中和天地萬物都中和雖修道之極功實盡性之能事而盡人合天教自我立此章之㫖即一書之大㫖也問命非命令即維天之命於穆不已可証矣道即逹道不出人倫日用之常行矣乃謂教之不待乎章程設施而修道只在慎獨何歟曰自明誠謂之教何須禮樂刑政以布其欵式哉獨即不覩不聞莫見莫顯之隠㣲也于此常存戒懼之心又何一時不自修乎雖修之之功在遷善改過之類萬有不齊却總在戒懼一念既能慎獨又何道之不修也問獨固貞一無對而中和即獨之别名何歟曰人生未有無喜怒哀樂者發與未發即易繫云寂然不動感而遂通天下之故常寂常感發常未發雖中和在凡民亦皆有之而大本達道非慎獨君子不能也况未發在本文原頂喜怒哀樂言而世之談未發者必自思慮未起并知且無之却非本㫖問子謂戒慎不覩恐懼不聞外别無慎獨之功慎獨外别無致中和之法慎獨致中和外别無修道之教是矣如何便能位天地育萬物曰依本文天地位萬物育凡慎獨君子皆能之若要位天地育萬物雖堯舜仲尼其猶病諸問君子時中子謂此中字須承未發之中言何歟曰中庸本以中字名書本文則云喜怒哀樂未發之謂中中也者天下之大本也若云隨時處中謂隨時處夫無過不及之中可也謂隨時以處夫未發之中可乎引仲尼之言即異未發之㫖何為以中庸名此書乎蓋君子中庸正謂其時時戒懼不睹不聞故時時是未發之體而發皆中節時時各當天則又不待言此所以須臾不離道一依乎天命之性也小人惟無忌憚故反中庸而君子時時戒懼益明矣學者惟體認此中字親切則下文中庸其至矣乎用其中於民擇乎中庸中庸不可能也中立不倚君子依乎中庸俱不外乎未發之㫖而于天命天載靡不脗合矣否則以中名書之大㫖且不明豈特自離夫率性之道已哉民鮮中庸俾道不明不行于日用間指㸃飲食不知味便是日用不知便是終身由之而不知道可見道之不可須臾離者不外飲食間也飲食即道何事他求此所以中庸不可能歟問費隠一致也隠不可索矣費乃費用之意何以見之曰泛觀天地之時物行生反觀人身之精神知慮何日不費用哉故夫婦可與知能聖人天地有不能盡鳶魚飛躍以察于上下造端夫婦至察乎天地子臣弟友之倫富貴貧賤夷狄患難之遇明而妻孥兄弟父母幽而鬼神體物不遺他如舜之大孝文之無憂武周之繼述孔子對君之達道達徳九經何一而非道之費哉亦何一非道之隠㣲不可窺測者此道之所以藏諸用君子不敢須臾離乎道也可見君子時中中也和也中節也天下之達道也彼謂發皆中節外别有未發者寧不謂費之外别有隠者存乎費隠之道通天徹地至語大莫載語小莫破亦已極矣子思子于天淵中只借詩指出個鳶魚之飛躍便活潑潑地滿前盡是性道之流通從来形容莫有過于此者下𦂳承以造端夫婦道不逺人更覺親切鬼神即隂陽隂陽即道世之談鬼神信其有者便索其形像之儼然信其無者便以為無此理也中庸論其為徳之盛却云視不見聽不聞體物不遺又驗諸祭祀只是個誠不可掩道之費而隠也雖鬼神曾得而離之哉噫真信得神之格思不可度思矧可射思此君子所以戒懼不覩不聞至誠如神問思知人不可不知天是知天乃知人之原也又云誠者天之道也誠之者人之道下文乃分言天道人道何也曰天人一道也盡人道所以合天道故云誠者天道誠之則存乎人也明善外别無誠身之功博學審問慎思明辨篤行一皆明善以誠其身下文自誠明謂之性即天命之性天之道也自明誠謂之教即修道之教人之道也天如是而生人人如是而承天誠則明明則誠天人一也惟至誠盡性可以參天而純亦不已浩浩其天人亦天矣中庸一書無非欲人盡人道以合天道若判天人而二之則非道矣故曰待其人而後行問性雖原于天而盡性不過自盡其一已之性耳如何便能盡人物參天地也曰學以盡性為極則是性也天得之為天地得之為地人與物得之為人為物性本合天地人物而一之非一人可得而私也故致中和便天地位萬物育經綸立本知天地之化育造端夫婦至察乎天地必如此而後謂之能盡其性若曰吾盡吾一己之性耳不能盡人盡物賛化育參天地且未免窒塞其性真矣何有于性之盡耶問盡性何必歸諸至誠也曰誠者自成性之實體也故又曰誠者物之終始誠者非自成己而已也所以成物也可見不能成物則不誠無物又何可以語自成哉又何有于成己之仁成物之知全外内以全其性之徳哉信乎誠本合己與物而兼成性本合天地人物而兼盡此所以惟至誠為能盡性而君子誠之為貴問至誠之功業何以見其覆載成物也曰此即上文至誠盡性則能盡人物之性于盡人物之性處即其所包含便見高明之覆即其所承藉便見博厚之載即其所永頼便見悠久之成其實配天地即是賛化育與天地參也要之為物不貳一言可以盡天地亦可以盡聖人之道矣所以大學推其功之所先只在格物問生物則不測矣學聖之功只當格乎不貳之物何歟曰觀下文自昭昭撮土以及無窮總只是個於穆不已之命噫為物不貳於穆不已未發之中不顯維徳合而觀之中庸有餘藴耶問尊徳性而道問學分存心致知固未盡妥謂道問學乃尊徳性之功何如曰天地間匪一不神匪兩不化天人一也中庸一書原是發明理之一也中間每每對舉言之如不覩不聞莫見莫顯未發之中發皆中節之和道不明由賢不肖不行由知愚和而不流中立不倚愚不肖與知與能聖人有所不知不能語大莫載語小莫破造端夫婦察乎天地庸徳之行庸言之謹視而不見聽而不聞體物而不可遺善繼其志善述其事親親之殺尊賢之等逹道達徳生知安行誠者天之道誠之者人之道自誠明謂之性自明誠謂之教誠者自成而道自道成己仁也成物知也為物不貳生物不測洋洋優優自用自專知天知人並行並育敦化川流如天如淵大經大本闇然的然不動而敬不言而信凡費隠顯㣲如此等類辭常對待並舉理實一致流通一本萬殊非人力所能為也學者自心融通透徹分處還他分不必强為之合而失之于儱侗合處還他合不必强為之分而失之于支離不然都是從人意見以惑亂人耳信此則凡精一愽約知行體用俱不必多為分辨以增添學問之贅疣問中庸論道多自不覩不聞不言不動處說人多懼其廣大莫窮精㣲莫測反身難以致力何歟曰形色天性而渾身皆天性之流行故曰率性之謂道不可須臾離也所以造端夫婦達諸子臣弟友庸言庸行之間素位而行只在反諸身達道達徳九經只在修身獲上治民信友悅親只在明善誠身尊徳性道問學只是明哲保身三重建天地質鬼神考三王俟後聖只是本諸身茍自用自專生今反古則災及其身矣是論道莫有切于此者但慎獨之功其惟人之所不見乎此中庸所以民鮮能也問至聖至誠分敦化川流如何曰若説中庸原是此意却不可知然將本文潛心涵泳如何在至聖則散見若此其精詳在至誠則包羅若此其廣大且如天如淵其天其淵原有分别雖以川流敦化分貼亦可或謂惟天下至誠能盡其性五章俱自至誠言大哉聖人之道三章俱自至聖言不免太分析矣問子謂經綸立本至于知化育則一無所倚肫肫淵淵浩浩矣茍不固聰明聖知達天徳者其孰能知之是化育信難知也豈終不可知哉下文知逺之近知風之自知㣲之顯一直說下果能知㣲則可以入徳矣夫知字承上說來可也若徳即承上天徳説不反與下相悖耶曰下文人所不見不言不動不賞不怒不顯篤恭正所謂㣲也天載無聲無臭㣲之至矣非天徳而何到頭處即入手處也况觀其會通即首篇未發之中天命之性是矣但前云修道此云入徳至徳凝道夫何疑哉問中庸始終言天果勉人之希天乎曰程伯子謂吾儒之學本天誠哉是言也首言天命本人性之所自來終言天載謂至徳淵㣲與天合徳盡性至命人一天也中間知天配天如天其天無非勉人法天之意雖云無聲無臭言天載也而不覩不聞非即人性之天命乎盡人道以復天道固為最難而時時存吾未發之中非即維天於穆不已之命乎然則欲存吾未發之體亦惟戒懼乎不覩不聞敬信于不言不動隨其時出時措發皆中節吾惟須臾不離慎吾之獨而已矣易曰效天書曰欽天詩曰敬天不備載於中庸之一書乎問中庸一書言天命天載未發不顯以至位育參贊要不離乎喜怒哀樂子臣弟友之外謂為日用之常是矣如鬼神之㣲顯武王之纘緒仲尼之祖憲律襲何可謂為常道哉曰性道不離須臾本通幽明貫常變合天地帝王而一之者也中庸原不分章人于家庭間明而妻孥兄弟幽而祭祀鬼神皆日用不能離者故言順父母即言鬼神祭祀正是幽明合一處武王一戎衣有天下人特知其處變而達權耳觀孔子欲言武王纘緒而先言文王之無憂由于父作子述所以下文善繼善述正是文王之無憂也如此則知武周之孝達之以至禘嘗郊社何一而非天下之達道哉若帝王之道法天地之時宜未有一人能須臾離之者人皆日用之不知惟仲尼為能祖述憲章上律下襲所以為大也噫此中庸所以不可能歟問中庸發明性學中間頭緒甚多望指其切近者而約言之可乎曰悟得徹信得篤横言䜿言只一性字盡之矣但不詳不足以盡其藴也姑即首末二章言之中節之和即是未發之中未發之中即是獨獨即是隠微隠微即是莫見莫顯莫見莫顯即是不覩不聞不覩不聞即是須臾不可離者須臾不可離即是性命性命即是道道即是教修道之教即是戒懼不覩不聞戒懼不覩不聞即是慎獨慎獨即是致中和致中和即是率性之道道即是天命之性末章尚絅即闇然闇然即淡簡温淡簡温即近自㣲㣲即潛伏不可見不可見即屋漏不言不動即無言無爭不賞不怒不賞不怒即不顯篤恭不顯篤恭即無聲無臭無聲無臭即是闇然天載即是天命之性故曰吾道一以貫之中庸首篇中庸首大意欲人知所以修道只在慎獨以致中和曰天命之謂性性即命也率性之謂道道即性也修道之謂教教即道也性命于天為天道教修於人為人道道曰率性合天人而為言者也人之道莫非天之道不可須㬰離也可離非道也是故君子脩之戒慎乎其所不覩敬天之命不敢慢也恐懼乎其所不聞畏天之命不敢肆也此何以然也誠以不睹不聞隠矣而見則隠之見也莫見乎隠不睹不聞㣲矣而顯則㣲之顯也莫顯乎㣲隠之見夫固㣲之顯也是獨之不可不慎也故君子必慎其獨而戒懼所以不能已也慎獨則合隠見貫顯㣲無須㬰之離道矣言乎其隠也㣲也為喜怒哀樂之未發未發則天命之性一毫不著於物而何偏倚之有故謂之中言乎見也顯也為發而皆中節中節則天性之則一毫不與以已而何􅆾戻之有故謂之和中為和之所自生淵淵浩浩天下之大本也吾與天地萬物為一本和為中之發用蕩蕩平平天下之達道也吾與天地萬物為一道者也人惟不致中和斯天地萬物皆不屬己君子慎獨為能致中致中所以致和也致之而至于天地天地有不位焉者乎致之而至于萬物萬物有不育焉者乎蓋天地設位而吾成位乎其中萬物並育乎其間皆一性之充塞無間而天命之流行不已也此修道之教所以為至教而聖人之能事畢矣修道即修身以道也脩道以仁則愼獨以致中和是也後之言修道者謂修為品節不求諸己而徒取必於人物其謬也奚啻千里性道教天人一道也天道固人道所自來而盡人正以全其天也茍天道不明徒欲致其邁往之力譬之幼離鄉井長欲返之使不知父母居止所在遑遑然日奔走長途無益也雖道之原於天者或偶得於窺測而人道不盡譬之祖父生身之所或稍得於傳聞乃䟦涉憚勞坐謀所適則伯叔兄弟之親庭闈田園之景徒付之夢想焉耳欲祖業之復得乎是故不知天命之性是不明天之道也不知修道之教是不盡人之道也中庸言道必原諸性固欲人真知祖鄉所在毋安於逆旅言道必示諸教正欲人裹糧擇侣促駕馳驅毋廢於半途雖曰天道未易明人道未易盡也但語人以家鄉之樂而一動其思家之心彼雖欲辭力不可得矣路亦多岐雖欲不問不可得矣况安宅廣居曠之已久雖欲不輯而理之其心能自己耶此中庸所以首揭性道教以指示迷途孰非訓天下萬世盡人道復天道哉故篇中有曰誠者天之道誠之者人之道也曰自誠明謂之性自明誠謂之教曰誠者自成而道自道或以知天知人分言之或以知人知天合言之其㫖義總括於首三句也明矣是故一隂一陽之道在天為五行在人為五常而教即五倫之教是也但範圍曲成道亦廣矣大矣獨歸之五教何也人莫切於身身莫切於倫而和者天下之達道自喜怒哀樂發皆中節言之也五者天下之達道自君臣父子夫婦昆弟朋友之交言之也道察天地不越乎造端夫婦道不遠人不離乎子臣弟友九經之道必先之以脩身三重之道必始之以本身凡學問思辨篤行無非明善誠身尊徳性道問學無非明哲保身富貴貧賤夷狄患難無入不自得孰非反求諸身哉此皆性所固有而修道者修此也聖人之教莫此為切以至盡人盡物參賛位育其所以教萬世無窮者孰非修道之極功哉或者又以道而曰修惟以盡吾人一巳百人十巳千之功耳何必原諸天命而名之以中庸殊不知修之云者雖不無學利困勉之力實無所作為無所矯拂而戒懼於不覩不聞莫非天也盍觀孔子之言修身乎曰修身以道修道以仁仁者人也親親為大曰修身則道立齊明盛服非禮不動所以修身也即修道也果可以人為參之乎故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天曽謂修道之教而不本諸天乎或曰窮理盡性以至於命若徒求諸彛倫之間何以返祖鄉耶曰孩提愛敬之良不慮不學百姓日用之常與知與能聖人人倫之至不思不勉乾坤易簡之學可久可大知此則知盡性至命之教矣胡為乎厭中華之祖里而求諸無何有之鄉然後為快也是故維天之命於穆不已上天之載無聲無臭天之道也性也戒慎不覩恐懼不聞不動而敬不言而信人之道也教也至聖立人極一本之天秩天叙人亦天也故曰中庸不可能也惟君子無時不中而學貫乎天人教教之繫於世也重矣國之治亂家之盛衰人之賢不肖皆於此乎繫而主世教者不可不慎也彼功利辭章之教非不足為世道害然卑陋淺近特害乎凡流爾不足論也自春秋以還聖教不明於上於是乎祖虛無尚空寂而髙明頴慧之士羣趨而宗之二氏之教興聖道幾熄矣何也聖人謂之性彼亦謂之性焉聖人謂之教彼亦謂之教焉毫釐霄壤其分不在性命在乎教也蓋天命之謂性凡具此性者孰不同此天命乎哉率性之謂道凡具此道者孰不同此率性乎哉但道所同也行不著習不察終身由之而不知彛倫之間情性稍偏離道逺矣故聖人示以修道之教也則是聖人之教主於修道豈曰道可道非常道曰大道無難惟嫌揀擇而無與天下之達道又豈曰性命雙修頓悟頓修而無庸於戒謹恐懼之功哉不知喜怒哀樂乃吾性固有之情君臣父子夫婦長㓜朋友乃吾性固有之倫雖欲須㬰離之自有不能離者凡愚夫愚婦皆可與知能而庸言庸行雖聖人且有不敢不勉者在矣修道之教教其修此焉爾學知知此也篤行行此也君盡君道臣盡臣道父盡父道子盡子道夫婦昆弟朋友各盡其道要皆本吾之所以慎獨者以見諸日用或抑其過引其不及於以自易其惡自至其中一皆全夫性所固有者不能一毫加損於其間也此修道之教所以大中至正凡以盡人性盡物性參賛天地之化育而中和位育皆性分内事耳人之所以為人而異乎禽獸中國之所以為中國而異乎外域者不深有頼於聖人之教乎觀契敷五教凡禮樂刑政要在弼教可徴矣彼二氏教尚虛寂滅情絕倫自以為留神性命之微而道其所道何有於達道也旣離乎達道又何有於率性何有於天命哉非性命之異也教異之也是以修道之教不離乎日用之常此教之所以中庸也其究也盡性至命克完其天道之精二氏之教脱離乎事物之累此教之所以𤣥虛也其究也斷滅種性自棄乎人道之大可見以言性命無不同以言教大懸絕矣况中庸言教必推原天命無非推本其道所自來而盡人道正以復天道耳非馳神天道乃以人道為幻境者比也噫二氏之害亦儒者所自致也何也禮樂刑政固聖教所不廢而實非修道之㫖也蓋由秦漢而下凡號為儒者匪徒執聖門典籍為性命珍藏不知反躬以立人極又徒恃禮樂刑政之具以為籠絡粉飾之規故修道之教久已絶響彼二氏之徒乃得乘其弊以倡其說也則凡世之髙明争奔趨𤣥寂甘心異教者孰使之然哉修道之教不興則虛寂之教不熄可見教之辨於聖學異端也如此其明教之繫於人心世道也如此其重欲維持世教者尚其慎之未發天一也性一也未發之中即天之命人之性也喜怒哀樂孰非性乎發與未發所以名之為中和者若不同而性果有異乎但謂之未發即所謂天載之無聲臭也天命之於穆不已也人性之淵淵浩浩不覩不聞也欲從而形容之是欲描畫虚空而虛空何色象乎雖然虛空不可描畫矣而虚空萬物之有無不可以形容其近似乎彼由太虛有天之名則太虛即天也雷風雨雪亦莫非天也雷風之未動雨雪之未零寂然杳然一太虛而已矣時乎雷之震風之噓雨之潤雪之寒隂陽各以其時不其冲然太和已乎自雷風雨雪之藏諸寂謂之為太虚也太虛本含乎太和之氣謂其本此雷風雨雪不可也何也及其有也由太虛而出非自太虛之外來也自雷風雨雪之動以時謂之為太和也太和即寓於太虛之中謂其始有此雷風雨雪不可也何也方其無也未嘗不太和特不可以太和名也是太虛之中本自有太和者在而太和之外未嘗别有太虛者存當雷風雨雪之寂若無焉斯謂之太虛固太和之所自出當雷風雨雪之動以時焉斯謂之太和而太虛自若也太虛太和名有不同天則一而已矣孰知太虛太和之即天也而太虛太和亦一而已矣可見喜怒哀樂亦人性之雷風雨雪也喜怒哀樂之未發而謂之中非人之太虛乎發皆中節非人之太和乎太虛之中朕兆莫窺而無一不包無一非天未發之中冲漠無朕而何一不備何一非性乎雖未之發則不可測識而假太虛以形容之亦有可得其彷彿者矣然則性一也謂之中又謂之和者因喜怒哀樂之發與未發異其名未發非無也時不可以有言也雖由己之所獨知也然黙而識之無形之可睹無聲之可聞亦廓然太虛而已矣及一有所感遇可喜而喜遇可怒而怒遇可哀而哀遇可樂而樂發雖在我而一無所與禮記曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也則是發非有也特不可以言無也盎然太和而已矣是發與未發皆自喜怒哀樂言雖謂未發即性之未發發即性之發焉亦可也若舎此而别求未發之體則惑矣噫凡言性而或偏於有偏於無偏於動偏於静皆惑也知性不偏於有無動静則知發與未發中與和大本與達道不覩不聞與莫顯莫見一也戒慎恐懼與慎獨所謂工夫亦一也天命不可二性不可二道不可二則修道之教其可二之哉觀之文義於慎獨之後即承以發與未發可知矣若曰如何以養其未發又何如以養其所發慎獨之外又有功焉且不可謂之獨矣曽謂中庸有是教哉試自養物者觀之如鳥獸之臟不可見也可見者其羽毛耳臟與羽毛雖有内外之分而由臟以達羽毛一也茍如何以養其臟又如何以養其羽毛有是理乎曽有欲其羽毛之鮮澤而不實其臟亦有徒實其臟不顧其羽毛乎草木之不可見者根也可見者枝葉也根與枝葉雖有本末之分而由根以達之枝葉一也茍如何以養其根又如何以養其枝葉有是理乎曽有欲其枝葉之蕃茂而不沃其根亦有徒沃其根不顧其枝葉者乎物之自養與人之養物且不以内外本末二其功何獨於性學必欲人分裂支離之而自以為是也後儒所論工夫各有不齊要皆平生所得力者至謂㸔未發以前氣象則其論為尤精然亦止可謂之方便法門也謂其為中庸之㫖可乎哉是故統而觀諸天㪚殊而觀之物而性學可㑹通矣時中道不可須㬰離何也率性之謂道性可須㬰離之哉性之發也時喜則離乎怒時哀則離乎樂矣而喜怒哀樂未發謂之中中可須臾離之哉惟未發之中不可須㬰離此君子所以時中也惟君子時時未發之中此君子所以中庸也故謂之中庸者日用間時時惟此中是用不可須㬰離焉所謂用中用此也擇乎中庸擇此也依乎中庸依此也人受天地之中以生雖欲外中以為之用也其可得乎或曰中庸不偏不倚無過不及平常之理即註云随時處中是也若云時時此未發之中得非有體而無用乎蓋未發之中天下之大本也時時此中則發皆中節天下之達道管是矣未有有體而無用者况子思子以中庸名書即自釋乎中之名義此乃引仲尼君子中庸之言而時中之㫖與未發之中不相合焉果子思子前後自相悖乎抑後儒悖其釋中之㫖乎今即中之義而推廣之程子曰中字最難識須是黙識心通且試言一㕔則中央為中一家則㕔非中而堂為中一國則堂非中而國之中為中推此類可見矣又曰中不可執也識得則事事物物皆有自然之中不可安排安排著則非中矣所謂不偏不倚無過不及隨時處中莫此為切又必不待安排而後有以盡乎隨時處中之義合程朱之言觀之發揮中義殆盡矣不知事事物物之中不偏不倚無過不及而隨時處之此乃中節之和時喜而喜時怒而怒時哀而哀時樂而樂一一中其自然之節千變萬化何可名狀要皆統括於未發之中也人無二性性無二中有自體而言者有自用而言者用其可少哉必自體以達之用而後無安排也子也過信子思子則然其於程朱之言何敢致纎毫疑耶特程朱之言後學孰不尊信而反致疑未發之㫖抑以子思之意先後果不同乎必於君子中庸先補出心字而後能隨時以處中乎况時字即時習時敏無時不然不離須臾之意而時措時出亦惟時中者能之此中庸所以為至也此中庸所以不可能也非孔子聖之時上律天時其孰能之哉抑維皇上帝降衷下民厥有恒性人與天本同此中也天運三百六十五度一晝一夜無時或已其於穆如故也人性與天同運三百六十日用不離須㬰其未發如故也故中庸通篇曰不睹不聞不言不動不見不顯闇然日章無為而成又曰微曰隠莫非闡明未發之藴也人惟不肯反身黙識以求其所謂未發者祗欲襲取而强為之圓融活變委婉流通自以為無著無礙活潑潑地而認此為時中焉其與小人之中庸何異哉噫執中之㫖傳自堯舜惟微未發得非先後之一揆乎合而觀之始得道不明不行道之大原出於天而明道者何即天性之知也行道者何即天性之能也率天性之知以為知則知即性之實體道於是乎行矣率天性之能以為能則能即性之真機道於是乎明矣此所以率性之謂道也夫知能一性也明行一道也知能無二性而分吾性以為知能明行無二道而分吾道以為明行是二其性也二其道也何怪乎道之不行不明也所以夫子謂道不行者由知之過不及可見道之行也正以行乎性之所知而知外無行矣道不明者由行有過不及可見道之明也正以明乎性之所行而行外無知矣智愚不免外行以為知賢不肖不免外知以為行雖所知所行有過有不及而道之不明不行則智愚賢不肖無等差也故又云人莫不飲食也鮮能知味也即能知二字觀之能非行乎知非明乎柰何夫子本欲合知行而一之後儒必欲裂知行而二之又謂能知之知在知行之先道於是乎愈晦而愈塞矣且道莫切於日用而飲食乃日用最切者也飲食能知味者即吾性之知能也聖人本欲指近易者以教人後儒反以繁難惑人而以飲食正味譬道之中此道之所以愈逺愈支也試以飲食言之愚則昏昧不知味矣智者研窮物理而於味亦莫之知焉不肖放肆不知味矣賢者謹守儀度而於味亦莫之知焉以人品言之智賢若愈於愚不肖而不能知味則一也茍由此而知其味焉愚者能知性也智者夫豈於性有所加乎賢者能知性也不肖者夫豈於性有所損乎人品雖殊知味則一殆不可以過不及論矣况心不在焉則食不知味而知味則心在無疑矣曽謂心在而道有不明不行飲食知味之外又别有道在所當明行者乎可見道不離乎飲食之常何其近也明道行道不出飲食知味之外何其易也雖道之大原出於天而知能之良各足於天命之性信乎率性之謂道不可須㬰離也已然則欲求中庸之道者惡可裂知行而二之舎日用飲食而求之哉噫愚不肖無足責也人顧甘心求為賢智亦可以自省矣造端夫婦天下之達道五夫婦特其一也自天地開闢以來有夫婦然後有父子有父子然後有君臣上下易歸妹彖傳曰歸妹天地之大義也天地不交而萬物不成歸妹人道之終始也此中庸所以謂君子之道造端乎夫婦及其至也察乎天地道至察天地而功乃始於夫婦之間曽謂中庸果不可能乎哉或曰道率於性原於天語大莫載語小莫破故舉其全體則天地聖人不能盡舉其一端則夫婦之愚不肖可與知能所謂造端夫婦其理則然而君子以參賛位育為極功於居室何與焉抑知明道行道豈逺人以為之哉道不逺人自夫婦達之子臣弟友之倫富貴貧賤夷狄患難之遇莫非用功之地也况道不離乎須㬰而居室之近乃常情最易泄狎君子無所不致其謹於此尤加謹焉故戒慎不覩恐懼不聞不動而敬不言而信矣而視聽言動其見于夫婦間者何敢忽也喜怒哀樂未發謂之中發皆中節謂之和矣而喜怒哀樂其發于夫婦間者何敢忽也惟夫婦乃人情所易忽者且不敢忽則子臣弟友乃人所共勉者敢不孝弟忠信乎哉自衽席以達之大庭廣衆自宴昵情慾以達之禮節揖讓無一不慎而造端則有自耳是故觀厥刑于二女非舜之造端乎而四方從欲以治刑于寡妻非文之造端乎而御于兄弟家邦二聖固已有明徴矣易家人彖傳曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣孰謂察天地不始于夫婦哉嘗聞千里之應係乎居室萬化之原起于閨門造端托始其功信不可誣也但身不行道不行于妻子端本澄源誰其尸之誦大學深有警于毋自欺誦中庸深有警于造端夫婦合而言之敢不朂諸達孝性一也未發之中發皆中節之和中和即性也所以率性之謂道而和為天下之達道不可須臾離也然達道有五不越乎君臣父子夫婦昆弟朋友之間此達道所以為中庸之道而盡性者盡此焉耳但均之為道而中庸諄諄于大舜武周之孝何哉觀孩提不學不慮而知能之良獨于愛敬為最切可見人子孝親之念一根諸天性不假强為者也故宜兄弟樂妻孥而父母順焉其性然也事君不忠非孝也交友不信非孝也獲上信友必本之順親而孝為五常之本百行之原者此也則其由愛親之念達之天下何莫非孝何莫非率性之道哉然謂之達孝者果天下之通稱之謂哉盖一書之中所云達道達徳不一而足上文斯禮也達乎諸侯大夫及士庶人則達之義可識矣所以武周于親之志事不徒曰繼曰述而曰善繼善述此孝之所以達也是故春秋修祖廟陳宗器設裳衣薦時食至于序昭穆焉即其繼述者達之于祖考也序爵則達于貴矣序事則達于賢矣旅酬則達于賤矣燕毛則達于老矣合宗廟之内凡子孫臣庶死生存亡無一不貫徹焉孰非其孝之達乎猶未也郊社以事上帝則大而天地此其達之禘嘗以事其先則逺而祖考所自出此其達之治國如視諸掌則合萬國之臣民衆庶莫非其所達矣繼述親之志事至天地祖先國人無不達孔子稱武周達孝豈溢美哉孝經曰孝弟之道通乎神明光乎四海無所不通正謂此也雖然武周之達孝不過自盡其性云耳得此之謂徳即天下之達徳行此之謂道即天下之達道布之為三重九經極之為參賛位育莫非孝之所達亦孰非自盡其性哉此所以知達孝為盡性則知達道為中庸不必求之于𤣥虚也或又曰中庸之道無聲無臭不覩不聞雖費而實隠也達孝特性道之一端耳惡足以窺隠㣲之秘乎此中庸所以不明于世也視于無形聽于無聲非孝子之所以事其親乎仁人事天如事親孝子事親如事天無二性也無二道也此中庸所以不可能而徒求之虛寂者自賊其孝親之性自異乎中庸之道也中庸諄諄于大舜武周之孝正以見隠不外乎費而為索隠行怪者發也世之溺心虚寂之教者殆亦未知執中之道一本之堯舜乎故曰堯舜之道孝弟而已矣力行近仁古人言仁亦多矣曰公曰愛曰知覺曰生理曰不忍人之心皆仁也然而未備也獨孔子對哀公曰仁者人也尤為明備何也天生斯人生理完具有此人即有此知覺而公也愛也不忍也足于斯人之身而與俱生者也統一人觀之七尺之軀㣲而神氣顯而骨骸内而臟腑血脉外而爪髪皮膚活潑潑地渾然盎然形色一天性也性即仁也觀孩提之童言笑嘻嘻手足舞蹈渾身有惻怛之流通如向陽花木自根株以達枝葉莫非春意之暢達也是生意充塞乎天地而亦充滿乎人身茍為不仁則不可以為人也明矣孔門言為仁之功亦多矣曰克復曰敬恕曰訒言曰先難後獲曰事賢友仁曰恭寛信敏惠曰居處恭執事敬與人忠皆為仁也然皆因人而施也獨孔子對哀公曰力行近乎仁尤為直截何也力行云者雖百行具備而要在以達徳行達道也好學學此也知耻耻此也行之力不力則存乎其人耳所謂克復訒言之類莫非實用其力以行之也果能明物察倫修徳凝道精神心思凝聚融結自戒懼不覩不聞而覩聞一涉于非禮即勿視勿聴焉自敬信不言不動而言動一涉于非禮即勿言勿動焉人一巳百人十巳千五倫百行無所不用其至如獅之擒虎鷹之搏俱用全力無分于小與大也斯人也耳目口體莫非神氣之貫通食息起居一皆精誠之懇到故志仁即無惡也欲仁即仁至也有能一日用其力于仁矣乎我未見力不足者力行近仁不信然哉或曰仁即人也何事力行而力行即仁何止于近耶不知孔顔為人尚發憤竭才他可推矣蓋仁以言其渾然之體力行言其勉然之功行之雖力而天理之極至不免參之以人為其必優而游之厭而飫之俟血氣渾化骨肉都融自然與仁合真矣是故方其用力已所不欲勿施于人所謂行仁是也及力到功深自然得力己欲立而立人己欲達而達人由仁而行斯一毫力不可著也或曰修身以道修道以仁矣何事于親親也不知仁固斯人生生不息之機而生身之所自曷能已于親乎故曰思修身不可以不事親果能竭力以事其親則事親之孝子即事天之仁人矣故又曰思知人不可以不知天噫仁天道也行健即天也乾元資始乃統天也力行人道也自强不息近乎仁即幾乎天也孰謂仁不在乎力行之人哉人道文武之政繫其人之存亡人何為存乎存以人道之盡也人何為亡乎亡以人道之不盡也前云人道敏政後云果能此道雖愚必明雖柔必强强且明焉文武之人雖亡而實存乎人特患其不果不果故不敏耳果則愚柔且不足以限之也况未必盡愚未必盡柔乎然前云思知人不可不知天後云誠者天之道也誠之者人之道也豈專以天道屬生知安行之聖而人道不過以困勉擇執自勵云乎哉故自此以下天道人道分屬性教判然為兩途矣不知孔子本以人道望哀公而盡人正以合天故思知人不可不知天也且仁也誠也一也皆天也取人以身修身以道修道以仁仁者人也正以人之一身莫非天理之流行而形色即天性也天下之達道五凡君臣父子夫婦昆弟朋友之交莫非人道所當盡者然亦莫非仁心貫徹于其間典本天秩等殺本天之所生故云知仁勇天下之達徳也所以行之者一也若曰好學近知力行近仁知耻近勇祗以盡人道而何與于天道哉此又以天人安勉分作兩途乃後儒之見非聖門宗㫖也蓋學問思辨篤行之功人一已百人十己千之鋭也以此擬諸從容中道若有不可企而及者觀發憤竭才死而後已諸聖賢未有不以人道自勵他可知矣况竭目力者正以盡天明竭耳力者正以盡天聰而竭心思者孰非盡吾天性之分量哉故中庸一書為人道發也人道盡則天道在我而天道一毫未合是即人道之有虧所以言致中和即曰位天地言造端夫婦即曰察乎天地言盡性即曰參賛天地言經綸立本即曰知天地化育末言闇然而終之以天載無聲臭孰非孔子望哀公盡人合天之意乎是故下學上達知我其天孔子自道固如是也天行健君子以自强不息凡學聖人之學者皆如是也于此乎益信雖然學問之道有自造詣言者有自功夫言者品評往古較量人材論其造詣可也考古證今因人反已則當循其用功節次以求進益於無窮焉是以造詣各殊凡聖賢安勉其等級自有不可紊者若自用功言之由勉正以求進于安而天道無窮人道亦無窮其人存者存以此耳否則自暴自棄人雖存而實亡寧無懼哉信乎志中庸之道當以人道自勉慎不可以天道自諉為物不貳易曰一隂一陽之謂道又曰乾陽物也坤隂物也㑹而通之天地一隂陽也隂陽一物也物一道也所以言大學之道至物有本末事有終始知所先後則近道矣而推其所先惟在格物物格則知至矣知至則知止至善而大學之道備是矣中庸曰天地之道可一言而盡也其為物不貳之一言即可以盡天地之道物也道也一乎二乎夫何世之言道者莫不曰無聲無臭而已矣而見道于無不徒佛學為然言物者莫不曰成象成形而已矣而見物于有不徒俗學為然茍有謂物即道道即物者不鄙之為贅疣則嗤之為粗淺牿於見聞口耳無足怪也孰知宇宙間成象成形無聲無臭原不貳也所以盈耳充目洋洋優優莫非至物莫非妙道同歸于不著不察已耳盍觀之鳶飛戾天魚躍于淵而察于上下者物也何與于費隠之道視之不見聽之不聞乃鬼神之道也何為體物而不遺周禮六徳六行六藝皆道也何以為三物之教耶故又曰誠者自成也而道自道也誠者物之終始不成無物不貳即誠嗚呼盡之矣惟其物本不貳所以戒慎乎不聞不覩而中和極位育之能敬信於不動不言而篤恭冺威勸之迹者乃吾儒格物之實學也或曰言物即所以言道信然矣然天陽物也地隂物也形氣虚實方圓動靜判然二之矣而謂之不貳不過天得一以清地得一以寧其理固如此也為物不貳豈實論哉曰天地清寧各得其一猶二之也何以生物不測耶蓋天下至精至㣲之藴奥不越粗鄙淺近之間吾誠即淺近者言之書泰誓曰紂有臣億萬惟億萬心予有臣三千惟一心不貳即一心之謂也此猶可以意見解也又以至粗鄙者言之一男一女兩人也易曰男女構精萬物化生則其所謂構精者非不貳乎所謂化生者非不測乎知男女之構精化生則天地絪緼萬物化醇宜無俟於言矣易曰乾道成男坤道成女吾且即乾坤言之乾元資始坤元資生乾固盡坤之所生者以始之坤即盡乾之所始者而生之也一也乾知大始坤作成物乾之知始固寓乎作成之中坤之作成不出乎知始之外也一也所以乾健坤順乾君坤藏乾成象坤效法乾元統天坤順承天而乾坤同一元也不然天地二物也何為泰則天地交而萬物通否則天地不交而萬物不通也為物不貳生物不測于茲可黙識矣不止此也仰觀于上日月之為物各有質也其所以合朔而明生者何也不貳也俯察于下山澤之為物各有形也其所以通氣而廣生者何也不貳也推而至於昆蟲之小蜉蝣蠛蠓各安類聚羣分之理而螟蛉有子蜾􅀈負之惟其不貳所以能變化也推而至於草木之㣲枯枝腐葉尚有氣化之妙而移花接木連理同枝惟其不貳所以能發榮也数百十人同謀一事而事可集者智不貳也人非我也語言訓誨可以變化氣質人我果有貳乎物非人也飲食入口可以滋榮血氣人物果有二乎故凡為天下國家有九經所以行之者一也天下之達道五所以行之者一也生知安行學利困勉及其知之成功一也雖欲二之不可得也要之此皆自其散殊者言之耳交則不貳不交則貳非所以探其原也其實天地萬類同為一物渾淪太極敦化川流其原本如是也孰得而貳之噫真知此者正所謂知天地之化育也化育豈易知哉雖然人人同此天命之性也同此率性之道也發與未發中和一原溥博淵泉時出不匱只此不貳之物也天地大夫婦也賢智皆能測度夫婦小天地也愚不肖可與知能然反而求諸身心所以為天地之絪緼者何在也所以為夫婦之構精者何謂也所以通天地萬物為一體者何所從事也皆茫茫然莫之省焉又何有于天地為物不貳生物不測信乎為物不貳之一言足以盡天地之道致知格物一言足以盡聖人之學至徳凝道中庸言道曰天下之達道也言徳曰天下之達徳也無古今無聖愚無人我一也大哉聖人之道乃曰待其人而後行茍不至徳至道不凝焉是道不自凝必以德而凝也不其岐道與徳而二之乎蓋有是徳則有是道無其徳則無其道此道徳所以一也發育峻極三百三千天道雖人所共有而獨歸之聖人者正以聖人之徳足以凝此大道云爾故君子尊徳性而道問學致廣大而盡精㣲極髙明而道中庸温故而知新敦厚以崇禮必如此而後徳可修道可凝乎夫道在天下聖人不能為之加衆人不能為之損乃人人所共由者在徳則人之所自得也其小大厚薄淺深多寡人人殊焉父不能以道傳諸子非不愛其子也臣不能以道獻諸君非不忠乎君也父雖至愛不能必子徳之必修臣雖極忠不能必君徳之必至所以凡為人子者孰不愛其親乎孝之道人人同也良知良能不待學且慮也必實愛其親者有此孝之徳而孝之道為能實有諸己焉凡為人弟者孰不敬其兄乎弟之道人人同也良知良能不待學且慮也必實敬其兄者有此弟之徳而弟之道為能實有諸己焉孝弟雖同其徳則異顧其人何如耳即父子兄弟而君臣夫婦朋友皆然故曰天下之達道五所以行之者三徳以行道道以徳凝人能𢎞道非道𢎞人易謂神而明之存乎其人黙而成之不言而信存乎徳行此之謂也譬之水焉江海無窮汲之在器器有小大水即因之彼器之敝漏者不足言而天下雖有完器其如器之褊狹何以有限之器汲無窮之水多見其不知量也江海惟大故為衆水之會聖人徳猶江海故為斯道之宗仁知皆美徳而道無分仁知也惟其各局于見此所以鮮君子之道也清任和皆至徳而道無分于清任和也惟其各有所偏此所以異乎大成之聖也若曰道本自然不由勉强徳行固有無俟修為此以本體言也非所以言修徳凝道也或偶開一竅自謂真悟譬鼠飲江河自以為充量也或稍涉多聞自謂實得譬僕𨽻入覩武庫自以為巨富也故孔孟慨知徳者鮮不知道者衆皆此類也然道無形也謂之凝道何哉可欲之謂善有諸己之謂信充實之謂美凝即充實有諸中也猶水之凍焉天氣栗烈大地皆氷故水之與器凝結為一不知水之為器器之為水堅固而不可解人之凝道猶是也但履霜馴至堅氷非一朝一夕之故其所由來者漸矣望洋興嘆不知備其器者無志于水者也能自潔其器者每每以勺水自多又何有于水器之俱凝哉是故無極之真二五之精妙合而凝而人生焉天固凝而生之也擇善固執徳至道凝盡性至命踐形惟肖人亦凝而歸之也其初也與形俱形其終也無形與有形者相為凝成其斯以為天下之完人也所謂盛徳形容有道氣象又皆真積力久根心生色之必然者尚何上下否泰之不宜而參賛位育不合天地人而一之哉或曰志道據徳至徳凝道信無二也然尊徳性道問學未免各有所重何哉蓋道問學正所以尊徳性如廣大高明精㣲中庸新故厚禮皆徳性所固有者非致盡極道温知敦崇以盡其問學之功則徳性何由而尊也于此見或一偏本體功夫稍有偏重失則均矣又何有于道之凝也耶奈何世之論學者又止論其道不論其凝道之功不曰見在之良知則曰當下之本體不曰人人具足箇箇圓成則曰大道無難惟嫌揀擇反身修徳之學弗之講焉是以談道者滿天下凝道者未見一人見之豈不明談之豈不足以快人之聴而身無實徳則虚見虚談何與於大哉聖人之道知化育道曰中庸乃日用所常行者與知與能無間乎夫婦庸言庸行不出乎彛倫其于天地化育何與哉蓋人惟不知道也言中庸則以為近易言化育則以為髙逺孰知日用飲食以至應接倫物凡喜怒哀樂視聽言動莫非天地之化育而人自不察也所以中庸一書言知天如天配天不一而足豈無見而云然哉首章言性乃人所同具也維天之命於穆不已人之性非天性乎末章言徳亦人所同得也上天之載無聲無臭人之徳非天徳乎化育萬類生生不測者天也性本之天徳同乎天參賛位育皆徳性所固有者而中庸之道孰非天地之化育耶嘗觀之易焉太極動而生陽靜而生隂隂陽翕闢摩盪絪緼鼓之以雷霆潤之以風雨日月運行一寒一暑此所以乾元資始品物流形乾道變化性命各正萬物羣分類聚于天地間燥濕燻蒸變化孕育不可窺測其實昭然化育不可掩也故中庸曰其為物不貳則其生物不測曰發育萬物峻極于天萬物並育而不相害道並行而不相悖小徳川流大徳敦化活潑乎鳶魚飛躍徹上徹下費而隠㣲而顯無往而非化育之所在也欲求中庸之道而不知天地之化育也可乎哉蓋化育乃大經大本所從出也論斯道之體則由天賦之人故云天命之謂性率性之謂道修道之謂教論體道之極則由人以合乎天故云經綸天下之大經立天下之大本知天地之化育果于化育有真知焉大經一天叙也酬酢萬變我無與也大本一天君也貞靜有常我無為也夫焉有所倚而肫肫淵淵浩浩乎天地之化育至誠一天也然其知也豈見聞智識所能測度而探索之哉神明黙契至誠則然茍不固聰明聖知達天徳者其孰能知之不然中庸乃日用所常行者何為一則曰中庸其至矣乎民鮮能久矣一則曰中庸不可能也正以化育未易知不能時時此未發之中與天地合徳也故從事于作用而不知大經者非矣經綸大經而大本未立焉可乎從事于本體而不知大本者非矣經綸立本而不知化育焉可乎惟化育之不知所以經綸不免於造作立本終涉於矜持經世出世各恃所長可大可久終非易簡既不能知性而知天又安能盡性以至命無怪乎中庸不可能也已雖然化育豈逺於人哉參賛總歸於盡性位育不出乎中和即一飲食而知味焉則道明道行化育之知其庶幾矣柰何喜怒哀樂易知也喜怒哀樂之未發未易知焉視聽言動易知也戒慎於不覩不聞敬信於不言不動未易知焉鳶魚之飛躍易知也察于上下未易知焉故云人莫不飲食也鮮能知味也即日用間一飲食之味且莫之知又何有于天地之化育又何有于中庸之道信乎中庸即天地之化育也特患其不誠耳誠者天之道誠之者人之道是故思知人不可不知天闇然中庸之道率性之道也人知君子小人其品頓殊不知闇然的然其學本異惟其闇然則為君子中庸惟其的然則為小人反中庸也是小人也豈勢利之徒哉逺人為道務外徇名所以的然日亡自戕其天性也闇然者何君子之所不可及者其惟人之所不見乎極而至于不顯惟徳天載無聲無臭焉皆人所不見也龍飛九五本乎淵潛雷聲大壯起於坤復而篤恭天下平于闇然處無加損也的然者闇然之反也小人之學不識性命之原每從人所共見者大其聲色以自炫事求可功求成殫竭精神盡為世界營絆其初亦若可觀而無源之水涸可立待久之且將自厭自倦不勝其消沮矣是闇然者不期章而自章的然者本欲求章終乃日亡而不覺耳夫闇然皆已所獨知也其幾可不慎哉誠自中庸一書會通觀之中與和也費與隠也㣲與顯也誠與化也大本與達道成已與成物也敦化與川流經綸與立本溥愽淵泉與時出也中和與位育盡性與參贊本諸身與徴諸民為物不貳與生物不測也合外内之道也性之徳也二之則不是矣但言莫見必本乎隠言莫顯必本乎㣲言發皆中節必先之以未發言達道必先之以大本言不可掩必先之以誠言道問學必先之以尊徳性言成物必先之以成己言治天下國家必先之以修身言參贊位育必先之以中和盡性言形著動變化必先之以致曲言天地必先之以造端夫婦言愽厚髙明悠久必先之以至誠焉其始也知逺之近知風之自知㣲之顯固寂然不可窺其究也不見而章不動而變無為而成亦淵然不可測闇然日章其幾斷可識矣是以君子功惟慎獨須臾此未發須臾此闇然也戒慎乎不覩不聞敬信乎不言不動子臣弟友之倫惟在反已而三重九經其所以徴諸民者莫不本諸身焉此君子為己之學以至徳凝至道而中庸之道必待君子之人而後行也有以哉小人惟其的然一切求諸外一切為乎人縱有建明一皆身外之事而性道澌滅盡矣故曰小人之中庸也小人而無忌憚也君子小人係乎獨之慎與不慎有如此雖然君子豈有意以闇然哉天命於穆性即命也君子知性知天敢自違乎於穆之體哉所以中庸不可能者不能此闇然也惟其不能闇然故曰君子依乎中庸遯世不見知而不悔惟聖者能之然則欲希聖希天以求中庸之道敢不闇然乎哉學孟子七篇叙孟氏七篇無非崇王道以黜霸術明正學以熄異端尚仁義以消功利而道性善與指㸃惻隠之心尤為喫𦂳此所以功不下禹也茍非善養浩然之氣如泰山壁立安能巖巖於戰國勢利中揭日月以行中天哉要其所以大有功於斯道者却只是願學孔子而已矣何也孔子萬世學之的也性本至善人人自有孔子在也亦在乎為之而已矣又於夜氣幾希之際立片言以决之如此則為人不如此則為禽獸如此則為舜之徒不如此則為蹠之徒凡王道霸術正學異端仁義功利悉取决於茲而間不容髪俾萬世之下眞信得人性本善堯舜人皆可為而孔子可願學也然則善學孟子者取足于自性之善而韓子所謂堯舜禹湯文武周孔之傳當自得之文獻通考曰晁氏曰趙岐謂軻以儒術干諸侯不用退與萬章公孫丑之徒難疑荅問著書七篇按韓愈以此書為弟子所㑹集與岐之言不同今考其書載孟子所見諸侯皆稱諡如齊宣王梁惠王襄王滕定公滕文公魯平公是也夫必死然後有諡軻無恙時所見諸侯不應皆前死且惠王元年至平公之卒凡七十七年軻見惠王目之曰叟必已老矣决不見平公之卒也後人追為之明矣則岐之言非也諸諡亦恐為後人所加史記列傳曰孟軻騶人也受業子思之門人道既通游事齊宣王不能用適梁梁惠王不果所言則見以為迂逺而濶於事情當是之時秦用商鞅楚魏用吳起齊用孫子田忌天下方務於合從連衡以攻伐為賢而孟軻乃述唐虞三代之徳是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇趙氏曰凡二百六十一章三萬四千六百八十五字韓子曰孟軻之書非軻自著軻既没其徒萬章公孫丑相與記軻所言焉耳愚按三説不同史記近是韓子曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與揚也擇焉而不精語焉而不詳又曰孟氏醇乎醇者也荀與揚大醇而小疵又曰孔子之道大而能博門弟子不能徧觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以其所能授弟子源逺而末益分惟孟子師子思子思之學出於曾子自孔子没獨孟軻氏之傳得其宗故求觀聖人之道者必自孟子始又曰揚子雲曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢孟子雖賢聖不得位空言無施雖切何補然頼其言而今之學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡㓕而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左袵而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也或問於程子曰孟子還可謂聖人否程子曰未敢便道他是聖人然學已到至處程子又曰孟子有功於聖門不可勝言仲尼只説一箇仁字孟子開口便説仁義仲尼只説一箇志孟子便説許多養氣出來只此二字其功甚多又曰孟子有大功於世以其言性善也又曰孟子性善養氣之論皆前聖所未發又曰學者全要識時若不識時不足以言學顔子陋巷自樂以有孔子在焉若孟子之時世旣無聖人安可不以道自任又曰孟子有些英氣才有英氣便有圭角英氣甚害事如顔子便渾厚不同顔子去聖人只毫髪間孟子大賢亞聖之次也或曰英氣見於甚處曰但以孔子之言比之便可見且如冰與水晶非不光比之玉自是有温潤含蓄氣象無許多光耀也楊氏曰孟子一書只是教人存心養性收其放心論仁義禮智則以惻隠羞惡辭讓是非之心為之端論邪説之害則曰生於其心害於其政論事君則曰格君心之非一正君而國定千變萬化只説從心上來人能正心則事無足為者矣大學之脩身齊家治國平天下其本只是正心誠意而已心得其正然後知性之善故孟子遇人便道性善歐陽永叔却言聖人之教人性非所先可謂誤矣人性上不可添一物堯舜所以為萬世法亦是率性而已所謂率性循天理是也外邉用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔孟子七篇總其大意觀之無非崇王道黜霸功闡聖學闢異端其開巻義利之辨殆有以挽戰國之頽波而清其源也然其中之尤要者學惟宗孔而直指本心以先立乎其大孔子之後一人而已何也伯功有似於王道而誠偽不判則王道反不如霸功之顯赫異端有似於聖學而邪正不分則聖學反不如異端之信從仲尼之門所以羞稱五霸深惡鄉原蓋以此也時逮戰國惟勢利是趨惟權力是逞國君歆慕皆管晏之餘風處士橫議悉楊墨之邪説人心陷溺良有甚於洪水猛獸之災夷狄簒弑之禍矣向非孟子剖析義利之幾㣲使誠偽邪正判若黒白而存十一於千百則王道聖學不幾於澌滅無遺燼哉是以孟子之好辨為不得已非徒以口舌爭也人心本良人性本善人皆有所不忍人皆有所不為而仁義之根於中者本不容泯特無孔子救焚拯溺之心以啟其火燃泉逹之勢耳孟子大有功於世教不過直從本心之善以開導之故因孺子入井而指其惻隠之端因嘑蹴不屑而指其羞惡之實因孩提愛親而指其知能之良因妻妾相泣而指其愧恥之情因平旦好惡而指其幾希之發因夷子厚塟而指其泚顙之真因齊宣不忍牛之觳觫而動其保民之念以至好樂好勇好貨好色而欲其公諸民焉無非自其所固有者指㸃開發使其由不忍以逹之於其所忍由不為以逹之於其所為也以論道德必稱堯舜論征伐必稱湯武總之曰以不忍人之心行不忍人之政陋五霸之驩虞比楊墨於禽獸而總之曰生於其心害於其政以至格君心之非同民心之好惡而㓜學壯行自謂王齊由反手者孰非是心以運量之哉然究其學術所宗一則曰乃所願則學孔子也一則曰予未得為孔子徒也予私淑諸人也知言養氣盡心知性其學旣有所宗雖以清任和而聖者且曰不同道真有取日虞淵潛消魍魎凡管晏儀衍淳于髠之事功楊墨許行之邪説皆不足以惑世而誣民不然告子杞桞湍水與夫性無善無不善之説且出於同時談道之士其禍仁義可勝言哉是故王道之所以明聖道之所以顯萬世而下不惑於霸術異端者一皆其宗孔之功也卒章由堯舜湯文孔子而慨見知之無人意可識矣雖然喻利喻義君子小人所由分正孔門學術之大閑也孟子終身必有事焉惟在集義而析義之精至充無穿窬之心雖由此行一不義殺一不辜而得天下不為此所以與孔子同一源流也故曰無為其所不為無欲其所不欲如此而已矣曰學問之道無他求其放心而已矣何必曰利孟子大㫖問子謂孟子貴王賤霸崇正學闢異端七篇實以尊孔子為主意可得聞歟曰孔子繫易謂立人之道曰仁與義七篇首言去利崇仁義實本諸孔子之教末篇自堯舜禹臯湯文直以孔子繼之謂之尊孔子非歟中間論天下一治一亂由堯舜武周以及孔子則曰楊墨之道不息孔子之道不著非所以尊孔子乎謂舜明物察倫由禹湯文武周公以及孔子則曰予未得為孔子徒也予私淑諸人也非所以尊孔子乎戰國而前未聞論道統直以孔子接帝王者發之始自孟氏惟信之專傳之正故其學一出於孔子凡伯夷伊尹桞下惠皆非所願學者曰孔子之謂集大成孰有尊崇若此其至者乎若夫崇王道則曰以德服人者中心悦而誠服也如七十子之服孔子也賤霸功則曰仲尼之徒無道桓文之事者至闢異端不特推明孔子之仁義使楊墨之邪説不得作也千古而下倡老氏無爲之説自許行為神農之言始孟子乃力排之發明孔子之皜皜不可尚者以樹之的倡佛氏無相之説自告子性無善無不善始孟子則力辨之乃取證孔子故有物必有則民之秉彛故好是懿德以為之凖倡為譏刺狂狷之説自鄉愿閹然媚世者始孟氏則力拒之取證孔子惡似而非之言以示之經謂非尊孔子不可矣他如辭受取予不見諸侯一一取法從獵較為委吏乗田拜陽貨此類未可悉舉至謂君子所為衆人固不識而其尊信無以加焉是故當時親炙孔子三千七十身發聖藴如顔曽且不可多得曠世之逺發之如此其詳衛之如此其切挽赤日以中天俾萬世人人知有孔子而異道異學不得以眩惑人心者非孟氏而誰噫孔子之學固不待孟氏而後尊孟氏之傳實得孔子以為正問浩然之氣乃孟氏發前聖所未發也亦可謂之尊孔歟曰孟氏善養浩然之氣實有事于集義義集則能直養而塞乎天地之間義襲則失養不慊于心而餒矣即前段曽子聞大勇于夫子自反而縮不縮之㫖也故曰孟施舍之守氣又不如曽子之守約也淵源所自非尊孔而何若後人所謂養氣雖祖勿忘勿助以調停火候要皆養生之術耳至夜氣之説則即日夜所息以見仁義之良心未盡泯觀所引孔子操存之言亦自可見問孟子功不在禹下以其闢楊墨也何當時非毁仁義者皆莫之闢所闢專在學仁學義之人哉曰仁義之道天下之達道非一人之獨行也彼一人之獨行若為一世之所難而有害乎天下之達道焉適足為詖行邪説之異端矣此正楊墨學仁學義其流弊至無君無父舉一廢百何以為天下之達道哉故欲衞仁義之全不得不闢乎仁義之偏欲閑乎君父之大倫不得不拒乎仁義之獨行與陳仲子矜小亷而離母與兄者類也故曰所惡執一者為其賊道也噫後學反尊無君父之教以為宗較之非毁仁義不尤甚哉問五霸假仁假義不猶愈于當時之諸侯耶曰仁義乃人性所固有不待假借而人人各足故曰堯舜性之也湯武身之也無所利而為之也所以論道德必稱堯舜論征伐必稱湯武發明性善直指人心無非尚仁義不尚利之意至五霸則假之以立事功未免有所利而為之矣迨久假不歸自失其身中所固有之性而惡知其非有焉此正五霸真假之辨也故以五霸視戰國之諸侯似為差勝較之純王之心何啻天淵然其流弊至于普天率土惟知有桓文管晏之功利不復知有純王之仁義三代而下不獲沐純王之德澤者謂不由霸道以雜之哉所以孟子在當時遇人便談性善直言利之為害拔本塞源盡于首篇仁義利三字其大有功于世道者以此于齊梁之君竽瑟不相投者亦以此孟子於齊梁之君隨機開導不執一説因其觀臺池鳥獸則啟之以與民偕樂因其移民移粟則啟之以養民因其恥敗秦楚則啟之以省刑薄斂因其問天下之定則啟之以不嗜殺人因其欲聞齊桓晉文則啟之以是心足王因其慚好俗樂則啟之以與百姓同樂因其問囿小大則啟之以與百姓同利因其交鄰好勇則啟之以一怒安民因其侈樂雪宫則啟之以無流連荒亡因其好貨則啟之以乃積乃倉因其好色則啟之以内外無怨無非引動其不忍人之心以行乎不忍人之仁政正以君心為萬化之原也惟大人為能格君心之非一正君而國定耳然則讀孟氏七篇者推廣此心引君當道之法不為當今活孟子耶孟子以齊王猶反手固謂其時勢易而德行速也蓋亦真信得人性本善人心本同在握其機而運人人親親長長天下平所以一則曰天下可運于掌一則曰治天下可運之掌上試觀滕文蕞爾小國也一行三年之喪四方弔者大悦一明井地之法楚宋之民踵門而來雖終阻于許行陳相而其易王之機可識矣故曰王如用予則豈徒齊民安天下之民舉安信哉孟子提出真心示人如乍見孺子入井怵惕惻隠見親于壑其顙有泚見富貴利達者羞泣中庭見嘑蹴之食不屑不受見牛觳􅑌而以羊易之從古以來孰有指㸃如此親切著明者乎學以心性為大本大原固難知亦難言也然心為人之主也人皆有不忍人之心無惻隠羞惡辭讓是非之心非人也雖存乎人者豈無仁義之心哉則言自孟氏始政本因心而出也聖人既竭心思焉繼之以不忍人之政而仁覆天下矣先王有不忍人之心斯有不忍人之政治天下可運之掌上凡有四端于我者知皆擴而充之足以保四海則言自孟氏始聖賢與人同此心也心之所同然者何也謂理也義也聖人先得我心之同然耳非獨賢者有是心也人皆有之賢者能勿喪耳則言自孟氏始學莫要於心之存也君子之所以異於人者以其存心也君子以仁存心以禮存心學問之道無他求其放心而已矣則言自孟氏始惟心為能思也心之官則思思則得之不思則不得也此天之所以與我者先立乎其大者則其小者不能奪也此為大人而已矣則言自孟氏始人性為本善也人無有不善乃若其情則可以為善矣乃所謂善也不自孟氏始乎知能皆性之流行也發明良知良能本不慮不學而徴諸孩提之愛親敬長不自孟氏始乎堯舜性之也每道性善必稱堯舜人皆可為堯舜不自孟氏始乎形性不相離也形色天性惟聖人然後可以踐形不自孟氏始乎心性本一致也盡其心者知其性也存心養性動心忍性亦自孟氏始焉心性當存養也仁義禮知非由外鑠我也我固有之也君子所性仁義禮知根於心亦自孟氏始焉夫性與心闡揚如此詳明如此後人不漓而二之則混而一之且曰善惡皆性曰本來無善無惡寧不大悖孟氏七篇之教乎論性雖諸説不同皆易辨也惟告子無善無不善却為後世所宗謂其與佛相似嘗聞佛家指不思善不思惡恁麽時是本來面目是彼以無著無象為宗亦非無善不善之㫖也何近世儒家反祖其説以相髙雖云蠢動含靈都是此性不知人之所以異於禽獸者幾希以性本善也本含此仁義禮知之精靈人與禽獸同而異者此也生之謂性未免混人與犬牛無分别矣不將率天下之人為禽獸哉然而彼却以無為善以有為不善則當下已自悖其宗㫖而不自覺矣惟孟子真知得人性本善故隨處指㸃無非即故之利以驗其本然耳舍此則人與犬牛奚擇耶若必以仁義為矯强而無之又何怪其無君父之尊親斷滅其種性哉人性渾然一理總名之為善雖具仁義禮知之德固非四德角立于中雖隨感而動有惻隠羞惡恭敬是非之情亦非四端分列于外故總名之為心而本之于天謂之命也凡命也性也情也才也知也能也統具于心其名雖殊其實一也自其事親謂之孝事長謂之弟事君謂之忠交友謂之信隨處異名其理萬殊而㑹歸一本渾然一善盡之矣但自其統同而莫測其朕兆便謂之無自其散見而偶得其影響便執之為有二者皆非也惟盡心知性者得意而忘言立人之道曰仁與義性中仁義固無定在發為惻隠羞惡亦無定形自其明覺則為不慮之良知自其運用則為不學之良能這個知能見親則能知愛見兄則能知敬愛親謂之孝敬兄謂之弟愛親之孝即是原頭的仁敬兄之弟即是原頭的義這孝弟之辭讓處即是禮明白處即是知果能反身而誠便謂之天德施諸政事便謂之王道學者學此也問者問此也却只是求放心奈何人人具此良心乃甘于自暴自棄放其心而不知求故孟子謂之自賊性中仁義亦非兩者並立也仁乃萬善之長四德之元故總謂之不忍人之心孟子以仁為人之安宅義為人之正路正以路即安宅之路而由正路乃所以居安宅又謂仁人心也義人路也舍其路而不由便放其心而不知求矣何也義者心之宜也人能時時事事常合乎心之所宜則心不放矣心不放非仁而何又謂人皆有所不忍有所不為者即不為其所不忍也充無穿窬即所以充無欲害人之心也充無受汝爾無以言不言餂人而充類至義之盡非即仁之至乎所以必有事焉而勿正心勿忘勿助長孟子只是集義故心不動也曽謂集義而心不動更有仁之所當求乎是集義乃求仁要訣也後儒遂謂孔子專提求仁孟子專提集義非惟不識孔孟之㫖且不識自家之良心矣心性亦非判然二之心即性之神明性即心之生理一而二二而一者也雖盡心知性存心養性動心忍性嘗對舉言之然仁義禮知性也曰仁人心也以仁存心曰仁義禮知根於心只此可以識心性為物不貳矣孟子以善養浩然之氣發明不動心然心與氣豈截然分為二物哉葢形色天性也自其充周布濩謂之氣自其神明主宰謂之心自其所向專一謂之志自其日用常行謂之道自其時出合宜謂之義名雖不同而道義即其所志志即是心心即氣之最清明而神靈者是也故浩然剛大充塞天地豈一身之血氣云乎哉可見直養無害即是持志配道義即是集義必有事而心不動否則義襲而行有不慊于心則餒矣然則直養浩然而養性又何待言哉孟子全副精神只願學孔子一語盡之但只是學得活而人莫能測孰謂其専得易之用也何也孔子聖人之時也則又誰信得集義即所以學孔子哉禹功萬世永賴周公百姓咸寜孔子修一部春秋功與禹周並孟子闢楊墨亦與三聖同真信此者纔知得厚民生正民徳一也纔知得見知聞知不専在黙識道體已也細玩七篇孟子雖是闢楊墨而當年與頡頏者實在告子論性而辨之尤惓惓焉大勢只在内外兩端觀我故曰告子未嘗知義以其外之也猶彼白而我白之從其白於外也凡所謂生之謂性食色性也性無善無不善也意以性本無善而為善皆從外入性猶杞栁以人性為仁義猶以杞栁為桮棬猶湍水決之東方則東流決之西方則西流為也決也皆外也又不得于言勿求於心不得於心勿求於氣何莫而非外之之意乎故孟子曰仁義禮知非由外鑠我也我固有之也行吾敬故謂之内也惟其内也乃若其情則可以為善矣若夫為不善非才之罪也故者以利為本而惻隠羞惡恭敬是非皆從内出也所以闢之曰然則嗜炙亦有外與然則飲食亦在外也内外辯而性善了然矣王天下如許大事業孟子只從齊宣心上指㸃箇不忍觳􅑌便是王的根本而其做法只要識得民物先後而已堯舜如許大聖人孟子從曹交性中提揭個孝弟出來便是人皆可為堯舜的根基而其做法不外乎行歩疾徐而已至易簡至久大此外更無秘訣後人不欲為聖人行王道則己苟有志于聖學王道恐不能越孟子之家法仁義利讀孟子之書雖言論汪洋浩蕩若長江倒海莫之能禦無非發明性善之藴也嘗總以二語括之其大㫖要不出此即何必曰利亦有仁義而已是矣程子謂孟子言仁義而不言利所以拔本塞源而救其弊朱子謂孟子之書所以造端托始之深意皆指此也蓋仁義性也利即戕吾之性者也人心邪正國家治亂悉于此乎判其源蓋出于危微之訓也試即其散見于各篇者舉一二以證之君臣父子兄弟去利懐仁義以相接然而不王者未之有也去仁義懐利以相接然而不亡未之有也是利義一分興亡頓異乃如此然其幾豈相去之逺哉耳目口鼻四肢之欲性也有命焉君子不謂性也仁義禮智天道之精命也有性焉君子不謂命也所以孳孳于雞鳴而舜蹠之分只在利與善之間也觀其道性善言必稱堯舜矣其論湯武則曰非富天下非敵百姓肫肫乎以德行仁故王民皥皥忘帝力于何有若霸者驩虞之治非不假仁假義而久假不歸不免有所利而為之也其所願學必孔子矣而論夷尹則曰行一不義殺一不辜而得天下不為所以皆為古聖人若楊朱墨翟拔一毛利天下不為磨頂放踵利天下為之非不學仁學義而流弊至無父無君以其偏于利己利人故也可見純乎仁義則為王道為聖學雜乎利則為霸功為異端究其極乃曰由仁義行非行仁義其辨亦何嚴哉然又直從人性指㸃根源謂仁義非由外鑠我者愛親敬長一皆孩提不慮不學之良及長而喪其良心者利汩之也聲色貨利功名富貴雖不同莫非利也苟有所利而為之雖行仁義亦利也世之人不汩没利途者鮮矣而其仁義之性未盡喪也是故乍見孺子入井而怵惕惻隠仁也一或為納交要譽惡其聲則利矣不屑嘑蹴之食義也一或為宫室妻妾窮乏得我則利矣可見理欲之介其幾甚微茍能充之則不忍觳􅑌者可以保四海一介不取與者可以覺斯民茍不能充之則夷子厚葬其親己陷于二本而辟兄離母之亷士適與蚓同其操矣故曰人皆有所不忍達之於其所忍仁也人皆有所不為達之於其所為義也惜乎學術不明人咸甘心于枉尺直尋之利方其一念餂人已同穿窬而不自知終為乞墦之齊人尚施施自驕而見羞于妻妾所以一則曰曠安宅而弗居舍正路而不由哀哉一則曰舍其路而不由放其心而不知求哀哉自今觀之孟子豈直為戰國之人心哀慟之已哉信乎孟子功不在禹下所謂拔本塞源造端托始皆統於首章仁義利之二語真有以識孟子惓惓正人心之大㫖矣浩然之氣天地間一氣而已矣靜翕而動闢陽舒而隂慘屈伸往來絪緼摩盪迎之無首尾之無後變化周流莫知端倪仰觀於天凡日月之照臨星辰之布列雷霆之鼓動風雨雪霜之潤澤而凜烈倐晴倐隂一寒一暑燦然萬象昭于上孰使之然哉一氣之運于天也俯察于地凡山嶽之雄峙河海之深廣土石之堅厚草木鳥獸之夭喬而飛走方生方死或起或滅森然萬物化于下孰使之然哉一氣之運于地也人生天地中不過大倉一粒耳少而壯壯而老有是形也即有與形俱形者凡目之視耳之聽手之持足之行五臟百骸一爪一髪生生化化喜怒哀樂異其情語黙起居異其用以至子臣弟友隨其人以應接之而不亂是孰使之然哉一氣之運于人也夫天以是氣而覆幬地以是氣而持載人物以是氣而運動若判然不相合矣然天地之氣和暢則人物莫不展舒天地之氣肅殺則人物靡不收斂人一呼也此身中之氣固散之于天地人一吸也天地之氣即貫徹于人身曽謂天地人物有二氣乎哉天地人物同此氣也可見太和之氣充塞乎天地人物本至大而至剛也充塞吾身者即天地之氣而充塞天地者孰非吾身之氣哉然人之氣有餒而不充者何也不能直養之故也其所以不能直養者何也不能配道與義故也豈氣之外别有道與義哉易曰一隂一陽之謂道而義即渾淪升降有節次是也配之云者豈兩物之相合哉易于隂陽初生名為姤復而配即如姤復不相離是也試自吾人最切近者言之人身之呼吸相息者氣也人所知也人心之流行斷制者道義也人所知也李延平謂配義與道即是心息相依而人莫之知焉何歟葢心與道相依即此心不以一息放焉之謂也人心常存不以一息而或放則志足以帥氣動容周旋不涉暴慢而氣常充滿于吾身者皆道義之運行焉身心渾融内外俱徹吸即天地之入機也呼即天地之出機也故靜而闔焉與隂陽同其收斂而卷之則退藏于密動而闢焉與隂陽同其發散而放之則彌六合至中至和天地萬物位育在茲也存神過化上下天地同流在茲也明道所謂勿忘勿助無纎毫人力白沙所謂滚作一片都無分别無盡藏是也可見俯仰無愧怍而充塞兩間不過即其至剛大者直養無害耳豈能于氣之本然加毫末哉故曰持其志無暴其氣曰是集義所生者曰必有事焉惟心氣合一盡之矣此孟子所以善養浩然之氣也此孟子所以當大任不動心遡之曽子守約孔子自反常直皆是道也不其至簡而至易哉若夫卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辯此特氣之最豪强耳謂之壯氣俠氣皆此類耳在告子孟施舍皆足以當之安足語孟子之浩然也何也平居未嘗有道義以培養之終歸義襲之流也不然天下之人莫不有氣而稍自振拔者一或有所觸發則忿不顧身亦足以犯人主之怒奪三軍之帥當其時不知天地之大禍患之可畏也及其事勢少寧一念計其利害不勝其消沮而困屈矣以行不慊于心則餒也雖然豈獨人歟日月薄蝕彗孛飛流山崩川竭獸怪木妖雨暘寒燠愆其期蓋由天地之氣偶不循道義以致隂陽失其節度云耳况和氣致祥則德星聚乖氣致戾則彗長竟天三才一氣相貫通也謂非道義以樞紐之哉説者又謂心息相依不幾於老氏之説歟蓋老氏以天地為爐鼎以日月為藥物性命雙脩神氣各煉其志在養生也故其説以耳目口三寳閉塞勿發通執此為𤣥牝煉氣之要豈知心不在焉則視不見聽不聞食不知味故韓持國問道家三住之説程子謂其要只在收放心信乎心不以一息而或放則先立乎其大者而其小者不能奪矣是故人知孟子之長在養氣不知其要在於養心願學孔子聖人人之至也聖人之學學之至也學聖人之學者學為聖人而已矣伯夷伊尹皆聖人也宜其皆可學也孟子于伯夷伊尹曰不同道而其願學則在孔子然則聖人之學得無有不同歟試即其同者言之而其異者必有在也世之論學者孰不曰學必經濟乎天下而後其才猷壯然得百里之地而君之皆能朝諸侯有天下其有為為何如也况聖人之才猷一出於真誠凡鰓鰓然以勲業自樹者失其為才矣孰不曰學必砥礪乎天下而後其節行髙然行一不義殺一不辜而得天下不為此其不為為何如也况聖人之節行一出于純正凡皎皎然以亷隅自矜者失其為節矣此其精神心術之廣大光明昭揭天地其在夷尹與孔子同也然才猷足以王天下節行足以師天下而同者無論己曰不同道所謂孔子之道果何道孔子之學果何學歟蓋言有為者必待時勢權位而後顯言不為者猶假事跡景象而後彰謂之非道不可而道非其至也若夫為而未嘗為不為未嘗不為用舍行藏我無所與盈虚消息上下同流其惟孔子乎是以欲知孟氏之願學孔子亦惟求諸孔子而已矣孔子嘗自叙曰吾十有五而志于學是自十五以至七十從心所欲不踰矩皆是學也而求其所以謂之學者大學一書備之矣大道在乎明明德親民止至善乃孔門求仁之宗㫖也自欲明明德於天下而由國家以推原心意知物總約之以修身為本可見格致誠正固所以修身也齊治均平孰有出于修身為本之外者乎是學也萬物一體之學也不待君相之位而此身之所以覺斯民風萬世者已無毫髪之歉而天下國家殆有不出户庭而齊治均平之無難矣何也自古明明德於天下者由堯舜以至周公非天下君即天下相也孔子不過一匹夫也以匹夫而明明德於萬世之天下與天地同其覆載悠久雖天地且賴以㕘贊之萬古之聖君賢相且賴以表章之至今斯道如日中天凡一切異端雜學不得以亂聖人之道以有孔子之大學在也所以宰我謂其賢堯舜子貢謂其盛百王有若謂其獨盛於生民孰非所以稱贊其大學之道乎惟其學之大也則夷尹惡足與孔子班也明矣是故孟子叙古今之治亂由禹周孔子而繼之曰我亦欲承三聖者叙舜禹湯文武周孔子而曰予未得為孔子徒也予私淑諸人也叙堯舜湯文孔子而曰由孔子以來至於今百有餘嵗去聖人之世若此其未逺近聖人之居若此其甚也惓惓然致其願學之意豈徒在於刪述之功已哉况孟子亦以匹夫正人心熄邪説尊王道賤伯功示聖學闢異端而使孔子之道益明益著亦以其能推尊孔子之學故萬世之願學孔子者咸知所宗也要之不同道亦非孟子之言也孔子之於逸民其自言曰我則異於是無可無不可則其所謂聖之時者有自來矣而又謂之集大成者得非大學之道異乎三聖之道歟所以智譬則巧聖譬則力而聖由乎智在夷尹猶以其智之有不足也觀大學統論明明徳親民止至善而約之以知止詳論格致誠正修齊治平而約之以知本孟子之願學亦深信三賢之智足以知聖人爾噫聖人人之至也孔子尤為聖之至聖人之學學之至也孔子之學尤為聖之宗自孟子願學孔子而萬世之下思以宗聖學者于此乎定則凡世之尚才猷矜節行者視孟子之願學為何如皜皜不可尚聖不可知也其終于莫知乎知之以言行氣象者知以迹也因其迹而窺其中之所存則孔子神聖雖心服如七十子自有不能知者在矣夫孔子之道包含藴蓄浩然無方本至大也淨潔精微純然不雜本至一也大易見一難窺故曰人莫我知也徒見其大者得其外而終莫測其端倪茍遇近似者一淆亂之未免二三其見矣惟于至一者反諸吾心有真知焉則凡文章之著見儀度之雍容與與肅肅變化莫測而何莫非一心以貫徹之哉昔賜參共遊于聖門非一日矣觀其平日之用功賜也多學近于博參也反身近于約故一貫之傳以之語參則唯以之語賜則疑及孔子没門人執喪三年治任將歸子貢乃獨留焉信之何其深慕之何其切也聖門諸賢自顔淵死穎悟莫若子貢宜其真知孔子莫子貢若也他日同門以有若似聖人欲以所事孔子事之獨曽子以為不可而其知孔子者乃獨歸之參焉此參之所以守約此參之所以唯一貫也若賜之於孔子也宗廟百官之喻豈不真知其富與美乎天階日月之喻豈不真知其不可及不可踰乎泰山滄海之喻豈不真知一撮于泰山無加損一勺于滄海無減増乎綏來動和禮政樂德温良恭儉讓之稱皆形容其儀度設施而知其道之大焉耳欲真知其所以大而一也曷若皜皜不可尚一語足以入膏髓而揭底藴乎然其所以不可尚者乃濯以江漢暴以秋陽而聖人終身好學敏求發憤忘食之心亦惟此足以發之矣况至堅至白磨不磷湼不緇乃孔子所自道者非參其孰知之諒哉參之言不特足以破同門近似之惑而萬世欲知孔子神聖者亦莫要此矣今即二賢所稱述者合而觀之同此一貫也參也唯賜也疑不可以窺其微耶雖然皜皜不可尚即人之心體即人心至一之道而至大無外者也凡人之言行氣象以至事物萬變矣非人心至一之所貫也孔子其能于此心有所加乎人惟有所拘蔽不肯加以暴濯之功耳間有暴之濯之又不肯濯之以江漢暴之以秋陽故不免為外物所尚而皜皜者之難復耳孔子曰十室之邑必有忠信如丘者焉不如丘之好學也又曰我非生而知之者好古敏以求之者也愈信曽子不我欺也噫欲知孔子之大不出乎吾心之一故曰曽子獨得其宗閑先聖之道先聖之道何道哉君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也自生民以來未之有改而五倫缺一不盡非道矣非道則非人矣所以入孝出弟守先王之道以待後學孟子自任之重如此可知其繼往聖為此道而繼之也開來學為此道而開之也其有壊人心術戕賊斯道者不得不大為之防而閑之矣故又曰吾為此懼閑先聖之道距楊墨放淫辭至謂能言距楊墨者聖人之徒也孟子豈得已哉昔二帝三王時上無異教下無異學雖氣運不齊中有猛獸洪水之災而人心未壊迨春秋寖淫凌遲上之教化不行亂臣賊子國多有之然猶未有倡異學率天下羣然爭趨之者下至戰國人人得為異説以相煽惑故辯士抵掌横議諸侯倒跣出迎不敢少怠如儀衍申韓孫吳鄧晢慎到淳于髠之徒各鼓唇談舌以聳動當時翕翕訿訿如鬼如蝎孟子皆弗之闢獨于楊墨之學仁學義者不少貸焉何哉彼習于縱横捭闔者不過權謀智術戰陣法律與夫怪誕譎誑之論非不足以傾陷世主簧鼓遊士然其學淺陋易見或有稍自樹立者早已識其邪而逺之矣惟其原不祖襲聖道非特不足闢亦無待於闢也若夫仁義立人之道乃孔子之道古先聖之道也楊氏學夫義而為我幾于無君墨氏學夫仁而兼愛幾于無父學仁義至無君父之大倫此其害道為何如者使其志行汚濁如儀衍輩則信之未必衆亦未必如此其堅也然其孑然特立為衆所羨慕又各身為仁義以倡率之故天下之言不歸楊則歸墨楊墨之道不熄孔子之道不著欲閑先聖之道也寧不思嚴拒而痛絶之耶説者曰無父無君誠害夫人倫之道也孟氏乃欲正人心何歟况惻隠之心仁之端也羞惡之心義之端也楊氏取為我拔一毛而利天下不為亦自羞惡之端充之惟恐有傷于我也墨子兼愛摩頂放踵利天下為之焉亦自惻隠之端充之惟恐無利于人也孟子謂之異端何歟蓋此正聖學異端之大閑不得不嚴為之辯也人有四端猶其有是四體四體不備不可以成人四端不備其人心之全體乎為我害仁亦自此心一念之偏知有義不知有仁兼愛害義亦自此心一念之偏知有仁不知有義故曰所惡執一者為其賊道也舉一而廢百也且愛身者昧致身之義忘身者昧一本之仁其流必至無君父始焉各執仁義之一端終焉至無君父之大害端雖同而實異此所以人心不可不正也差毫釐繆千里不直指其詖行邪説而闢之奚可哉雖然學仁學義猶出乎人心之同無父無君亦推其將來之弊佛老祖尚虚寂其言多指摘人心之覺空竅妙以駭動夫聰慧隠僻之士使皆沈迷其中莫之返焉固有非俗士所能知者然離絶君臣父子夫婦之倫此則不待將來而後見也世之髙明者咸溺於其説既不信執一足以賊道反效其單提直指標榜宗門隂假佛老之祕密以闡明先聖之道想孟子生值斯世其不得已之心又當如之何也噫邪説誣民充塞仁義孟子豈特辭而闢之已也入孝出弟守先王之道以待後學此所以其身正而天下歸之也今欲闢佛老以閑先聖之道者必有孟子反身之學又必如孟子歸斯受之而後可性故七篇之書孟子故非好辯而辯之不置約其要不過道性善焉盡之矣天下之言性也則故而已矣故者以利為本正以道性善也非性之外别有故也其所謂故者如故吾故人故物故事皆因其舊所有者言之也温故知新革故鼎新以新對故而言其義可知矣彼認故為新者無論也但以故言性天下之所同以利言故則孟子之所獨曰君子所性大行不加焉窮居不損焉分定故也君子所性仁義禮知根於心曰仁義禮知非由外鑠我也我固有之也皆以故言性也而故者以利為本何謂哉仁乃性之故也乍見孺子入井怵惕惻隠見親于壑其顙有泚而惻隠即故之利也義乃性之故也行道乞人寧死不受嘑蹴齊人妻妾相泣中庭而羞惡即故也利也孩提之童知能不待學慮乃其性之故莫不知愛敬其親長即其故之利也雖旦晝牿亡仁義之良而夜氣清明好惡與人相近亦莫非其故之利也惟其故之利所以又曰乃若其情則可以為善矣乃所謂善也若夫為不善非才之罪也情善才亦善故之所以利也歟是利之云者自然而然不容一毫矯强作為于其間耳順性而動則利强性而動則不利而鑿矣故曰所惡於知者為其鑿也禹之行水行其所無事者一循乎水行之故道而道之也千嵗之日至可坐而致者一循乎日行之故道而求之也又何於人性之故而鑿之哉或曰言性求諸故猶論水求其源信有然矣故以利為本不有似于水之源以順流為本哉葢源流一水也水不以源流分也人性之善也猶水之就下也人無有不善水無有不下源泉混混不舍晝夜盈科後進放乎四海有本者加是知水之本則知性矣或者又曰知故之利則知性之善無疑也彼謂性猶杞栁性猶湍水生之謂性食色性也有性善有性不善性可以為善可以為不善諸説紛紛皆不知故之利皆不免于鑿矣彼謂性無善無不善也不有似于故之利乎蓋謂性無善無不善猶云水無下無不下以無為宗謂其源本無也水無下無不下是故鑿山以求知于水之源矣得非鑿空以言性之源乎此告子所以為禪而虚寂之教所自來也世之禪者方以不思善不思惡為本來面目故以無相為本以無念為宗以父子君臣為假合求水于無水之始求性于無性之初自認以為不可思議為止至善均之乎以故言性實未免以鑿而言故也已是以言知能之良者既以愛敬為偶然之感觸而言性之故者又以知能為情才之流行不曰良知良能本不慮不學乃曰天命之性本無知無能一切歸諸無為無著然即其詆訾認昭昭靈靈為性體者似為近之而自處于寂寂的的取證于無聲無臭之天不自知其穿鑿愈甚也故曰天下之言性也則故而已矣故者以利為本正所以為雕鏤虛空者發也戕賊杞栁為杯棬搏激乎水使之過顙在山此其鑿也人易知也性無善無不善并情才知能悉以為流行發用而掃除之孰知其穿鑿一至于此哉况以故言性利也鑿也其辨至微不可不審蓋不慮而知非無知也不學而能非無能也無欲其所不欲如無欲害人之類是也并欲立欲達而無之可乎無為其所不為如無為穿窬之類是也并見義而不為焉可乎行所無事特無事智巧以作為之云耳并必有事焉而無之可乎假禪家之似是標聖學之嫡傳毫髪差譌天地懸隔孟子豈好辯哉不得已也向使生今之世其好辯又當何如伊尹樂堯舜之道堯舜之道何道哉堯以天下傳之舜舜以天下傳之禹即揖遜間而觀其深焉斯深于其道矣蓋以天下與人非輕天下而喜塵勞之我去也天下如彼其大謂其輕天下非也受人之天下而安享之非重天下而喜富貴之我得也天下于我何與謂其重天下亦非也揖讓之間即道也授之者為天下得人受之者代天以理民物天命人心之所在不得而輕重之也豈必曰允執厥中然後為道統之傳哉伊尹耕莘而樂其道宜其不相侔矣然道一也本不以堯舜君天下者有所加不以伊尹耕夫而有損也耕莘之外更别無道故律以道義或輕于一介或重于千駟皆弗之論也試自尹之應迹觀之湯之幣聘後先一也囂然於三顧之前幡然於三顧之後非有輕重於其間也無非堯舜之道也即其囂然之時視天下民物與我漠然不相闗一介之輕不是過矣及其幡然視匹夫匹婦之失所皆引為己辜其重豈特千駟已哉人或見其窮達不齊而堯舜之道何窮達也知堯舜未讓之前既讓之後其道則一故堯以天下與諸舜矣三年之喪百姓如喪考妣四海遏密八音可見堯雖殂落其道如故也舜雖欲逃堯之讓而天下之朝覲訟獄謳歌者歸焉道在重華惡得而逃諸在堯舜如此則伊尹之樂其道者可知矣然究所以惟道之樂者先知先覺焉故也况推而覺乎天下之後知後覺焉使匹夫匹婦有不覺乎堯舜之道尹之心不但已也舉天下皆覺乎堯舜之道又有不信伊尹之心者乎所以五就湯而湯樂其道咸有一德然也五就桀而桀亦不疑其去就之靡常尹之心苟足以堯舜其君民湯可也桀亦可也雖去湯就桀人固不疑悖乎湯而舍桀就湯至有南巢之放人亦不疑其以臣而放君信其堯舜君民之道為有素耳及相太甲則以重臣輔少主人心最所疑忌者此其時也始焉太甲顛覆典刑而放之桐太甲固惟自怨自艾以聽伊尹之訓已既而處遷仁義復歸于亳太甲亦惟賴其匡救之德而終始弗之疑若其放之而民大悦反之而民大悦不特無所疑畏而民且悦焉尹果何以得此于民哉堯舜之道尹先天下而覺之先天下而樂之者此也故使是君為堯舜之君矣使是民為堯舜之民矣上而君下而民所以後天下而覺之即後天下而共樂之矣盡天下而覺此道也樂此道也又孰疑乎尹之所為哉信乎即其達之所行而其隠居所求益可驗矣孔子曰隠居以求其志行義以達其道尹之謂也是故從古以來未有天下相揖讓者行之自堯舜始也未有得天下以征誅者行之自尹相成湯始也未有以臣放復其君者行之自尹相太甲始也道一也堯舜處其順而急于親賢所以憂其民也伊尹處其逆至于放伐其君亦所以弔其民也迹異道同堯舜非有餘伊尹非不足也知此者即為天下之先知覺此者即為天下之先覺任先知先覺之責者安得不以斯道而覺斯民孔子聖之時大哉時乎元氣流行天地間萬古不息一時焉而已矣時乎春也時乎夏也時乎秋也時乎冬也循環無端終始不窮凡隂陽之升降日月寒暑之往來昆蟲草木之變化久而元㑹運世暫而一瞬息間未有一之能違乎時故時之所在一或違之在天為災在地為怪在物為妖而况于人乎然夏葛而冬裘早作而夜息人之趨時若易易焉者孟氏于孔子獨稱之曰聖之時其所以謂之時者不過可以速而速可以久而久可以處而處可以仕而仕孔子自道亦曰我則異於是無可無不可夫當其可之謂時也雖夷尹惠均之為聖也其于清任和一有所倚則其去時也逺矣時何若是乎難哉嘗玩易而得時之義焉隂陽剛柔盈虛消息其所以生生不測者惟其時耳故曰易之為道也屢遷周流六虚變動不居上下無常剛柔相易惟變所適不可為典要以此觀孔子孔子其即易矣乎然孔子曰五十以學易可以無大過矣子思稱頌仲尼曰上律天時惟其上律此所以天行健君子以自强不息而與天並運與時偕行不自足也惟其學易此所以洗心退密而從心所欲不踰乎矩先天不違後天奉時不自知也是故不厭不倦莫非天道之運行發憤忘食一毫人力之不著意必固我絶無纎塵用舍行藏渾無轍迹由孟子觀之曰孔子聖之時而孔子自觀不過學而時習不敢不勉云爾噫惟其學而時習故下學上達知我其天而為聖之時者也中庸曰君子之中庸也君子而時中惟時時未發之中故發皆中節時出不匱孔子一中庸之道也可見孔子豈能為乎時哉能不失時而已矣孟子自述己志惟願學孔子凡辭受取予一裁以義彼一時也此一時也變易惟時我無與也故曰知易者莫如孟子然則後之人願學孔子抑亦學其時哉始條理者智之事也終條理者聖之事也而知大始者乾也終而聖之時固難始而知其時為尤難果能知至知終乾乾因其時而惕焉其庶幾矣夜氣兩間一氣無古今無晝夜而運行不息者也孟子論夜氣乃曰日夜之所息何歟葢一呼一吸為一息而吸呼交接之微乃氣之所由息焉邵子謂一動一靜其天地至妙者果指此息言也是氣也浩然塞乎天地來而伸為陽往而屈為隂隂陽升降莫不有息此所以運化不測流行不窮而息其生生之機也且以天地言之由去嵗冬至初刻至今嵗大寒盡時天與日月運旋一周而坤復之交是為一嵗之息惟其有一嵗之息所以來嵗化生無盡藏也每月三十日與月運旋一周而晦朔之交是為一月之息惟其有一月之息所以後月化生無盡藏也每日十二時日運一周而亥子之交是為一日之息惟其有一日之息所以來日化生無盡藏也翕聚為發散之源凝固為暢達之本觀冬之肅月之晦夜之寂百物悉斂萬化畢藏故貞元之氣終而復始日月相推而明生寒暑相推而嵗成其機故如此人之氣呼通於天吸通於地而日夜所息者與天地同但人咸昧而不察自旦及暮思慮營為憧憧逐逐以勞役其形體氣既擾攘不寧而良心反為氣蔽如鏡為塵迷水為風盪而本體不明職此之故也幸而一日一夜百脉一周固有自然生長之機而得以復還胎中之息矣且内焉百慮未萌外焉百物未接故仁義良心隨現于夜氣清明之際而好惡與人相近者日夜之所息為之也其如旦晝牿亡反復使夜氣不足以存焉何哉噫欲觀虚明氣象非晝夜之息固不足以見其端欲存幾希良心非夜氣之存亦無以致其力故曰茍得其養無物不長茍失其養無物不消養氣正以養心也可不慎哉或曰養氣一端孟子誠發前聖所未發也于此又直指良心于日夜之息其有功聖學亦甚𢎞矣然夜氣與浩然之氣豈無辨歟曰浩然之氣本天地大生之全體集義所生乃君子直養之真功平旦之氣則自衆人之失其浩然者指㸃其萌孽使人知所培養充擴之耳是浩然論其全夜氣舉其端而聖人無夜氣者以其息息皆浩然剛大之氣而天地之氣且賴之以調燮也氣一也繫乎人之養不養也有如此或曰氣必資乎日夜之所息矣心則通乎晝夜之道而知也良心夜氣果無辨歟曰盈天地間莫非氣也人即此氣之凝結心即此氣之靈明故曰志氣之帥氣體之充又曰志一則動氣氣一則動志志至氣次實相須而不相離也所以自心為息息即此心生生不測之機冬至為天地一嵗之息易謂復其見天地之心邵子曰冬至子之半天心無改移者此也亥子為吾人一日之息陳白沙謂其些兒欲問天根處亥子中間得最真者此也先儒又謂配義與道只是心息相依豈虚語哉或曰佛氏有反息觀息之言老氏有踵息胎息之説日夜所息與二氏何異也曰息為天地根本造化闔闢之𤣥樞也豈必一一如二氏數息調息之為者哉嚮晦入宴息易且有明訓矣尺蠖屈以求伸龍蛇蟄以存身學者果懼牿亡之害思以存此幾希之良則乗其日夜之所息者戒慎不覩恐懼不聞于以養吾氣而存吾心使元神元氣之相守而息息歸根不為旦晝所牿焉則夜氣常存浩氣全復而至誠無息者可幾也己求放心神矣哉人之心乎虚靈洞徹一真自如合天地通鬼神貫古今聯隠顯無所不知無所不能迎之無前隨之無後窺之不見其象執之莫測其端變化無方心體本如此其神也天生烝民若各一其心也其實萬古常存包涵無際聖人不能為之加衆人不能為之損也然而存之則為聖為賢失之則乃禽乃獸其幾如此可不慎哉孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂歟此孟子所以有求放心之教也然操存舍亡求也苟不識心未易言也何也放非隨感變通之謂也苟當乎理雖萬感萬應圓神莫測放之則彌六合而非放也求非守中存想之謂也雖當乎理而一滯於有所則心不在焉視不見聽不聞食不知味守靈明於一掬而非求也然不求則放非特物交則引如逐臭蠅蟻終日營絆莫知所為雖獨坐一室神馳萬里自生機械自添桎梏耳目手足且不自由心不在身形魂兩脱如此而可以為人乎否也矧此心神明莫測豈常在腔子裏而偶有所放亦豈自知其放而故縱之耶葢鄉為身死不受嘑蹴今為宫室妻妾窮乏得我而受萬鍾此所以失其本心而且不自覺也孟子之哀豈得已哉但不識其心而欲不放也難矣然人自有心人不自識又何也非不能識也人特不肯反求諸身以黙識之耳盍觀孟子之論心乎人皆有不忍人之心所謂人皆有不忍人之心者今人乍見孺子入井皆有怵惕惻隠之心無惻隠之心非人也惻隠之心仁之端也即其端以窺其全滿腔子皆惻隠之心也故此章曰仁人心也但倐忽之間轉念而納交要譽亦此心也非特馳逐諸欲謂之放即一轉念而納交要譽匍匐為拯救之圖亦放也此心之所以難識而難求也故世之有志身心之學者無可奈何于是閉闗習靜收視返聽絶念息幾謹守一竅或認氣定不思善惡以為本來面目或認見在一切作用是即自性現在故絶人避世以縁識為情累而欲斷之以君臣父子為假合而欲離之無足怪也葢亦未知仁人心也仁本廣居何必甕牖以自拘仁本安宅何必蔀屋以自障果能以仁存心無我無人渾然與物同體非人心之所以為仁乎然孟子此章却以由義為居仁之功也何也仁固人人所固有義即人人所共由仁人心義即此心之宜耳茍心不合宜得非其心之放乎故既曰仁人心即曰義人路而其所哀雖在放其心而不知求却在舍其路而不由也指㸃本體仁即是心指㸃功夫義即是路一事合宜即此心之運用也一時合宜即此心之流行也然則事事合宜非即事事心在而為仁之體事不遺乎時時合宜非即時時心在而為仁與時偕行乎信乎充無穿窬之心以至無受汝爾不以言黙餂人非即充無欲害人之心乎學以聚之聚此也問以辨之辨此也否則世之求心者止欲守其黙照之體存其圓虛之神好靜惡動而日用間親疎厚薄是非可否一切失其宰制化裁之宜縱使恩怨平等而于親親仁民愛物混然無别謂之為仁可乎謂之為心不放可乎可見由義正以居仁充類至義之盡即所以為仁之至而聖學經世與佛學出世正學術所由辨也噫人孰無心而真知其體用一原仁義合德之本心者誰也故一則曰放其心而不知求一則曰有放心而不知求日用不知有仁心者寧能以無哀哉五霸君臣天下之大分也内外天下之大防也大分嚴則臣不得以凌君而天王不至下同於列國大防峻則外不得以侵内而兵戈不致變易乎禮樂此其澤被生民功在社稷雖以義律之聖人亦在所必取也夫皇降而帝帝降而王至王降而霸焉天地一大變也觀世道者不能不為之重慨歎矣聖人于霸猶有取也豈得已哉分已亂矣防已潰矣有能嚴而峻之存大分大防于萬一則帝王遺績猶未至盡泯征伐㑹盟之權尚統于一愈於散而無所歸也以此尚論春秋之世五霸殆不可少矣然世之品評五霸者謂齊桓自北杏之㑹國不受兵者三十八年晉文自伐原之後國不受兵者至于身没是霸業之成也宋襄為鹿上之盟以求諸侯于盂之㑹遂為楚子所執秦穆三十六年報晉始霸西戎前此未得志也楚莊三年猶為戎濮所侮既而滅庸六年侵陳及宋八年伐陸渾之戎觀兵問鼎始有欲霸之志然與晉爭鄭兵連禍結師無寧日皆霸業未成者也故曰其事則齊桓晉文舉其成者言之耳果如斯言止以成敗論也此即蘇子由所謂桓文之兵不得已不戰所以全師保國無敵於諸侯至宋襄則雖竊霸者之名而實非秦穆則雖悔過自誓列于周書而不能東征諸夏楚莊雖號為服宋君子以為不假道之師以此品論五霸亦僅似矣然霸者見取于春秋之世也果如斯而已哉試觀當時綱常禮義蕩然幾盡能尊周室正君臣之大分者誰也能攘夷狄峻夷夏之大防者誰也使小國有所恃强國有所懾大夫陪臣各守其分而不敢踰越者誰也蓋自有葵丘之㑹踐土之盟然後天下始知周室之當尊自有召陵之師城濮之戰然後强楚始不敢憑陵乎上國霸者有功名義莫此為大而霸之優劣亦于此乎定故不特宋襄國小德薄以求諸侯不自量而取敗雖穆莊亦見不及此何足以望桓文也耶但管仲臨終勸桓公以齊托之宋在襄公亦必有可托者穆公用孟明不以一𤯝掩大德莊王討夏徴舒侵鄭及宋皆服之而不取其國殆無忝於霸也已若止以威力言則吳夫差越勾踐皆一時之雄而列國畏服不減齊晉胡為乎不得與宋襄齒耶使全以王道律之則五霸三王之罪人功之首罪之魁固已有定論矣雖尊周攘夷之烈何足數哉雖然以霸視王何啻霄壤而維持王迹存大分大防于萬一不無取于霸之力也况列國卿大夫尚知有名分禮義而不敢犯故事君行已間有三代遺風存焉逮孟子謂今之諸侯五霸之罪人也今之大夫今之諸侯之罪人也田常篡齊六卿分晉紀綱蕩盡思見霸功不可得矣所以聖人之論人也公而恕功過不相掩也管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髪左衽聖人稱仲如此其稱桓公可知今以二霸並稱如齊桓翼王室定世子晉文殺叔帶復王位桓服楚退舍而盟文服楚退舍而戰桓忘仇而相管仲文釋怨見寺人披均之乎不可及也孟子乃曰五霸桓公為盛豈獨有取于五禁為然哉晉文初則恃樊陽之績而請隧終則為河陽之㑹以召君若桓公則雖王人致胙命無下拜乃曰天威不違顔咫尺即此可以槩其生而救邢存衛庶幾王迹故孔子有譎正之分而春秋獨書齊桓公之績此亦可見矣是故論世而及乎春秋則稱五霸論霸而定以尊攘則稱桓文論功而别其譎正則稱齊桓公要皆彼善于此也至論道而辨乎王霸則聖門童子羞稱之矣于五霸乎何有立命天與命果一乎莫之為而為者天也莫之致而至者命也一之則混矣然則二之乎維天之命於穆不已惡得而二之也命與性果一乎命也有性焉性也有命焉一之則混矣然則二之乎天命之謂性惡得而二之也性與心果一乎存心養性一之則混矣然則二之乎盡其心者知其性惡得而二之也一之不可二之不可然則如之何理一也天之主宰謂之命命之流行謂之性性之統體謂之心理雖一而分則殊也不然匪特天與命性與心分之合之各一其見彼天即理也蒼蒼非天乎一定不易命也窮通壽殀之不齊非命乎純粹至善性也五行各一其性非性乎道心惟微心也人心惟危非心乎知其敦化又知其川流則其言雖殊而至一者無増減也於此洞然不惑則孟子知天事天立命之説一以貫之矣雖然諸儒紛紛亦未嘗有定論也但論學當反求諸身以黙識其立言之意斯近之矣故學不知止則功無所施用力雖勤猶未能實見得是也果盡心知性而知天則知之真而用功有實地矣存心養性以事天正以實用其功猶之乎見的既審矢無虚發也用功至殀壽不貳脩身以俟庶心存性養而命自我立焉天人合一之道自然日進無疆矣是知也事也立也皆學問之真功夫也然豈知天之外别有事天之學事天之外别有立命之效乎惟知天而事天則其所知者為實知非頓悟之謂也惟事天而立命則其所事者為實事非頓脩之謂也否則方其天之未知也豈無所用其功乎雖强探力索要皆誠心以求之耳及其命之能立也功豈止于此而已乎日新又新一息尚存罔敢懈耳但學至立命斯心性之原於天者實有諸己本無壽殀而一之也又何窮通得喪所能移而貳之哉然則自一人言之謂造理履事仁智各造其極是以知天為初學立命為聖真而立命之後可安享其成矣自三人言之謂生知安行學知利行困知勉行各有不同又以知天為至聖立命為下學則立命不過勉强把持其于天命尚未之知而命亦止于氣數云爾孰知是命也天之所以為天而盈虚消息本不貳者此也人之所以為人而死生壽殀本不貳者此也果命我立則心性之原於天者不為身外變故所摇奪方知我命由我不由天也天地我立萬化我出而宇宙在我矣若遽以立命責之初學之士可乎哉况孔子五十始知天命至從心所欲不踰矩斯盡性以至命也則其忘食忘憂不知老之將至果一無所庸其功耶易曰窮理盡性以至於命合孟子之言觀之心性者學問用功之實地天命者心性從出之淵源進有漸次而學無等級功日純熟而理無終窮聖學之脉絡此可謂諄且悉矣執一賊道大道無方體也于無方體中而凡有方體者莫非道大道無窮盡也于無窮盡中而凡有窮盡者亦莫非道蓋道也者大無不包小無不入髙不可抗卑不可貶其本體之真不可以思為不可以名狀也于此執其無方體無窮盡者以言道而凡有方體有窮盡者便以為非道焉固非真知道者况執其有方體有窮盡者自以為是未免隘焉而不𢎞拘焉而不達使其言行又為世所信崇足以樹風聲建標的其害道豈淺淺哉孟子惡執一賊道正有見於斯也何也言道至于仁義執中宜無容議也然楊子執義之一而害乎仁墨子執仁之一而害乎義子莫執仁義之中而害時中故其説為邪説行為詖行辭為淫辭惡之若此其嚴者豈惡其學仁學義學執中哉惡其各執一偏之見于以戕賊乎斯道之全也故夷尹惠聖人也一于任一于和猶謂之不同道况楊墨子莫之流哉可見清任和也仁義中也皆道也不執則皆是執之則皆非孔子所以為聖之時孟子所以願學孔子也况世之學者髙之為異學之𤣥虚卑之為俗學之桎梏間有覩聖學之一臠者各執一語分門樹幟詆訾先輩自任以真宗嫡派苟人有片言不契即從而排之其亦未聞孟子舉一廢百之教乎或曰執一不可也孔門一貫何謂哉蓋㑹道之全者則當舉其要見道之偏者則當體其全孔子所謂一為博而寡要者發也孟子所謂一為偏之為害者防也况貫則無所不通執則局而不貫言若相反實互相發也或曰偏執之害道也如此而允執固執何謂哉蓋孟子病其執者病其執中無權非擇善而執也譬之欲航海者置巨舟焉帆檣篙櫓無一不具苟舵有不善雖巨舟不足以任風波之險使執舵無活法焉難乎道岸之先登矣故孔子示之以一貫也若徒恃一葉之舟而百凡無備又欲堅執一舵以衝風冒險必不免胥溺之患焉孟子安得不為後之航海者示以萬全之術哉可見吾道一貫乃聖學之要執一賊道即為異端之偏擇善固執乃入道之功舉一廢百即為偏執之害自行不著習不察者苟能于斯道管窺一班亦足為進道之機而仁者見之謂之仁知者見之謂之知且又居之不疑是即執一者流也即此㑹通觀之吾人於無方體無窮盡中徒執一自賊又以賊人何為哉仁知急先務心之理一也固不可混焉而無别亦不可好為分裂而失之于支離也嘗即孟子言仁知觀之自其心之知謂之知自其心之愛謂之仁知此心也愛亦此心也仁知分言其心則一雖分而實未之分也堯舜智不徧物而當務之為急仁不徧愛而急親賢之為務使所先在乎厯象授時平水土所急在乎舉禹臯稷契則仁知各一其務終判然不相合矣仁者見之謂之仁知者見之謂之智豈堯舜之仁智也耶且即其文義言之智言當務之為急仁言急親賢之為務是急親賢之為務正以當務之為急也又智言先務仁言急親賢則先務之急不急在于親賢乎蓋智雖無所不知仁雖無所不愛而知其愛之所最當先者莫先於親賢是之為善用其愛而愛無不徧是之為善用其知而知無不周智仁本無二心知愛亦非二務也故下文總以不知務承之非專言智也即莫之禦而不仁是不智之意也然非孟子之言也樊遲問仁問智孔子教以知人愛人向非子夏善發其藴則樊遲終莫達乎舉直化枉之㫖也何為孟子言之百世之下皆樊遲也耶雖然樊遲疑而問此所以終明于聖門後儒不問不疑又從而為之辭此仁智合一之理愈晦於孟氏之後也亦非孔門之言也臯陶曰在知人在安人禹曰知人則哲能官人安民則惠黎民懐之蓋惟哲以官人此所以民懐其惠也觀堯舉舜舜舉禹臯陶而黎民於變時雍謂知人安人各一其事也可乎哉况無所不知無所不愛仁智之全體也當務為急急務親賢仁智之大用也如此而分之合之皆可也若曰智仁之德不同既欲如何以全其知又欲如何以全其愛是自分裂其體矣知愛之務亦不同既欲如何以急先務又欲如何以急親賢是自瑣屑其事務矣聖賢本欲去煩難以歸諸易簡後儒必欲黜易簡以求之煩難學術為天下裂可勝慨耶或又以聖賢于仁智分言之者亦多矣何為於仁智而必欲合之也葢智仁本一也有意而合之與有意而分之皆非也但古人既合言之後人必欲分何哉學者果能真知存諸中也仁智無二心達諸用也知愛無二務則為學不厭智教不倦仁可也謂成己仁成物智亦可也性之德也合外内之道也仁且智則聖矣茍不能反身而黙識之分之非也合之亦非也故曰仁智合一存乎聖反經孟氏闢異端而異端之害熄豈有他術哉亦曰反經而已矣譬之治病者必培養其元氣惟真元一固則百邪不侵故曰經正則庶民興庶民興斯無邪慝矣自孟氏没異端之害莫甚于佛老韓氏闢之著原道歐氏闢之著本論亦似乎能反經也已何為二氏之學愈昌熾哉近讀史纂前引其論二氏頗足以發其微隠論寂以通天下之感靜以貞天下之動微以效天下之顯虚以御天下之實覺以神天下之應是謂千聖經綸無所倚之學後儒昧于自反徒以訓詁為學掇取古聖賢已行之迹著為典要使人循而習之相守以為世法彼佛老者窺吾學術之弊竊取吾聖學精義據之為己有而為吾儒者拘滯形器之中語及虚寂則曰此異端之教也避之惟恐不及嘗考後儒闢佛之説大畧數端有謂不耕而食不蠶而衣以為民害者有謂毁形廢倫以為身害者有謂瓊宫瑶宇耗財蠧物以為國家害者此特病其迹耳請言其精有謂吾儒之學主於經世佛氏之學主於出世以為公私之辨者矣有謂躭悦禪味偏于虚静者矣有謂絶情去念流于斷滅者矣有謂經是言詮直指單傳不立文字者矣凡此皆不足以病佛氏也蓋吾儒之學以見性為宗佛氏之學亦以見性為宗性為生理吾儒以萬物各得其所為盡性有無相生此為方員之至也佛氏之教名無不周徧實則自外于倫理欲萬物同歸寂滅并其方員之迹而棄之要之不可以治天下國家佛之異于吾儒者固如此自古論性命者必歸老氏其曰常無欲以觀其妙無中之有性宗也常有欲以觀其竅有中之無命宗也致虚守靜以觀其復有無交入性命合一之宗也復曰常常曰明是謂長生久視之道要其所歸不出身心兩字性以心言神之宅也命以身言氣之門也神氣人之所資以生者也道之紀也吾儒之學則中和是己未發之中正心邊事所謂觀妙也中節之和脩身邊事所謂觀竅也情歸于性是謂還丹所謂觀初也致中和則天地此位萬物此育所謂宇宙在乎手萬化歸於身得一而萬事畢矣後之養生者雖皆本于老氏未免似是而非并老氏之㫖而失之其論老氏者又如此即其言精則精矣吾聖學與佛老之學不幾于無辨矣乎蓋老氏謂之無吾儒何嘗一于有也佛氏謂之寂吾儒何嘗偏于實也然同一性命也彼以錬養為宗不過制錬魂魄云爾非所以盡性而至命同一虚靜寂覺也彼以寂滅滅已為大湼槃與寂然不動感而遂通天下之故實毫釐千里惡可因其近似不思大為之防哉蓋孟子所謂反經非專精隠微言也時行物生無聲臭也手持足行何思為也人性之常雖至隠而至微實莫見而莫顯經綸大經謂君臣父子夫婦昆弟朋友之五常也故大學明明德親民止至善不外乎仁敬孝慈信中庸率性之道必造端夫婦以及乎子臣弟友知止者止此也盡性者盡此也孟子道性善言必稱堯舜故曰堯舜之道孝弟而已矣又曰聖人人倫之至也况鳥獸不可同羣吾非斯人之徒與而誰與故倫物之外無道盡倫之外無學也觀諸孩提知能之良不學不慮非即老氏之無佛氏之寂乎知愛知敬雖有而何損於無雖感而何害於寂也彼老氏固以攝生為旁門實以超生為拔宅佛氏固以斷滅為外道實以無生為大常故謂父子兄弟俱假合相凡一切孩提種性必絶而去之以求乎父母未生已前而四大皆幻也是二氏欲不著相離父兄絶夫婦祗自全其所謂性之寂性之無而反著乎父子兄弟夫婦之相則不免為斯世斯人所苦矣其視聖人愛親敬長刑于寡妻凡二氏之苦海皆吾儒之坦途不惟不著相而即此盡性命立人極也其邪正難易為何如哉是言吾性之至隠微者莫過乎知能之良言吾性之切近者莫踰乎愛敬之實君子反經反乎此佛老異端異乎此何必求諸性覺真空應感俱寂窈㝠恍惚天地悉歸然後為吾性經常之道耶噫今之儒學特聖學中之一端且無論也然今之禪門且非佛氏之學也今之𤣥門且非老氏之學也今之號稱聖學者乃雜乎今之禪今之𤣥其去老佛之學已相倍蓰又何怪其視吾聖人盡性盡倫之學皆為粗迹必求之虚無寂靜以為同也故曰規矩方員之至也聖人人倫之至也安得真志聖學者一以大經為規矩而為天下立人極哉道通天下大無窮也知本仁心明不息也惟人能𢎞道本其所自明者以大明於天下則道統在斯人矣柰何日用不知者牿於耳目見聞之中𡨕然罔覺與草木鳥獸同其生殖運動已爾間有能反身默識潛神於性命之學者又欲超脫見聞以求乎自性無知之真焉而道之晦也伊誰之責乎夫人孰不曰斯道也人孰不具此知也自孩提時知愛知敬即仁義之道也特患不能逹之天下耳大人與天地合德日月合明豈有他哉不失良知之性也或見而知之焉非獨見己也本其所獨見者與天下之人共見之此之謂真見也或聞而知焉非獨聞己也本其所獨聞者與天下之人共聞之此之謂真聞也但知一也其時同其道同故謂之見知其時異其道同故謂之聞知道不以古今異知不以見聞殊所知即道也惟以先知覺後知以先覺覺後覺使斯道大明浩浩乎天地之包涵萬象不自以為德昭昭乎日月之普照萬方不自以為功此孟氏願學孔子意也故以見知聞知叙羣聖賢道統於七篇之末與論語末篇執中之㫖一而已矣蓋孟子道性善言必稱堯舜孔子叙書斷自唐虞正以二帝大明斯道於天下乃後人耳目見聞所及故堯舜禹湯武同一執中之學也曰四海困窮天禄永終曰萬方有罪罪在朕躬曰百姓有過在予一人何謂哉執中而無與於四海萬方非執中之學也大學言明明德於天下中庸言盡性即言盡人物之性參賛天地皆此意也知論語執中之傳則見知聞知之統可得而言矣是故無窮者性道之藴致其無窮之知而大明乎斯道者聖人性之之學堯舜性道之宗也湯文孔子其聞而知者知此也禹臯尹朱望散其見而知者知此也茍於斯道匪不息之明焉則唐虞之際其得見堯舜者不可勝記何為見而知者獨在乎禹臯三代得聞堯舜者亦不可勝記何為聞而知者獨歸之湯文孔子也茍真知斯道而不能大明於天下以擴其無窮之量則堯舜湯文為天下君也禹臯尹朱望散為天下相也固能布德澤於四海建勲業於萬方孔子不過一匹夫耳何為而得纉乎堯舜湯文之緒顔曾子思皆親見夫孔子何為孟子皆不許之以見知也韓退之曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉亦有以識此矣世之人非盡無志於學也滅知歸寂性覺真空欲誘天下後世盡歸諸黙照之宗似是實非賊道莫此為甚而聰明澄徹稍開一隙之明者又自認為知止知性不能善與人同使斯世斯民共明此道由知非大始之乾知故行非至健之乾體自小其知即自小其道無怪乎見知聞知之鮮其人也孟子曰然而無有乎爾則亦無有乎爾信乎千百世之下無有乎見知聞知之學也韓退之曰軻之死不得其傳信乎後之所傳皆非韓氏所謂堯舜湯文孔子之傳也是故傳其自性不覩不聞之知者内也傳其多見多聞之知者外也傳其無窮之知與天下之人共知共聞以大明乎斯道而滿其分量者無有乎爾也故曰人能𢎞道本其所自明者以大明於天下則道統在斯人也春秋諸大夫隠士古今人品不出隠見二途隠則儉德潔已以自高見則行道立業以自表聖人未嘗不隠未嘗不見也用舍行藏與時消息而我無與耳彼一於見者不知晦以藏其用一于隠者不知逹以顯諸行道不同故不相為謀也天下寧有二道哉聖學不明大抵弊於兩途異端不與也嘗讀論語凡春秋諸大夫隠士多所記録此雖聖人採善之公心而聖學亦因此可窺矣是故魯父母之邦也如季文季桓季康孟懿孟莊孟武伯孟公綽子服景伯臧文仲武仲卞莊孟之反孟敬子衛則蘧伯玉公叔文子寗武子史魚公子荆孔文子王孫賈棘子成齊則管仲陳文子晏平仲鄭則子産子羽禆諶世叔楚則令尹子文子西皆當時名大夫而葉公太宰亦其流也其中管仲之功子産之惠子文之忠陳文子之清孟莊之孝卞莊之勇武仲之知史魚之直寗武之愚公綽之不欲公叔文子與孔文子之文公子荆善居室晏平仲善與人交季文子三思而行想聖人惓惓焉表而出之必有非人所易及者若君子之許則獨在蘧伯玉焉隠于當時則晨門荷蕢楚狂丈人長沮桀溺除㣲生畆外逃世且逃名矣逸民如伯夷叔齊夷逸朱張柳下惠少連隠于下位如儀封人而又有逹巷黨人之類跡有不齊孰非隠士之流乎即晨門荷蕢之言謂其不知孔子不可也然知其人不知其道謂之真知可乎哉惟儀封逹巷黨人庶幾近之至如夷惠與聖人時有後先聖人所稱許者亦自有在但我則異于是要非聖人時中之道矣可見諸大夫皆一于道之行也諸隠者皆一于道之藏也二之則非道也所以用舍行藏獨許顔氏之子雖伯玉有道則仕無道則可卷而懐者猶未足與于斯也何也道一也用則行行此也舍則藏藏此也觀之聖人雖曰用則行矣綏來動和期月而可而女樂一受明日遂行矣即其接淅不脱冕焉何其速也雖曰舍則藏矣然不欲潔身亂倫而必以有道易無道者其素志也故佛肸公山弗擾召即欲徃又何汲汲皇皇如是哉可以識孔子老安少懐之心可以識孔子無可無不可時中之道矣故曰隠居以求其志行義以逹其道吾聞其語矣未見其人也信乎隠見一道之難也奈何以此立教世之以仕為通者莫非富貴利逹之心斗筲器量何敢望管仲子産之後塵也而以隠為高者又皆放浪詩酒逍遙方外而深厲淺掲果哉避世于耕耘者吾見亦罕矣此聖賢學術所以愈晦愈湮也噫人品必以聖賢為極則也出非富天下處非忘天下斯道必有所在也學可以不講哉㣲生高陳仲子鄉愿與人為善而不求備于人者聖賢之公心衆惡必察衆好必察不肯輕以一善與人者尤聖賢衛道之深意也惟其察於衆所好惡一斷以是非之公也故人皆以為直人皆以為亷人皆以為謹厚而聖賢獨不之許反從而責備救正之深惡嚴闢之焉豈得已哉㣲生高以直名于世也孔子乃曰孰謂㣲生高直或乞醯焉乞諸其隣而與之陳仲子以亷名于世也孟子乃曰仲子惡能亷充仲子之操則蚓而後可者也鄉原非之無舉刺之無刺以謹厚名于一鄉也孔子乃曰鄉愿德之賊孟子曰不可與入堯舜之道夫衆皆以為直為亷為謹厚矣孔孟于衆所交好而獨非之不幾於苛察過詰失隠惡之道哉是不然斯民也三代直道而行者也㣲生高素以直沽名而乞醯于隣僕僕焉求以自保其直名耳想平日所為莫非矯强乞醯一節偶露真情孔子所以為沽直名者戒也若謂其曲意徇物掠美市思不得為直是有取于證父攘羊之直矣胡為乎父子相隠直在其中乎陳仲子素以亷沽名雖避居於陵至食井上螬食之李不恤也孟子因其避兄離母恐人咸以其小者信其大者耳若謂其無求于世為非亷則非其道義一介不以取諸人而孑然不食周粟者何為哉蓋二子好名良亦苦矣而二子之名乃為世所羡慕故孔孟不得不斥其非懼世人復效二子而蹈其弊也鄉原則又不然同乎流俗合乎汚世閹然媚于世蓋惟欲人之悅己不擇理義之是非故衆皆悦之亦惟悅其無忤于衆焉耳此其處心積慮尤深且勞也孔孟安得不惡之哉惡其似德非德有害于德雖其善名在一鄉而惡之尤甚無非衛道之心也可見㣲生仲子鄉原不過于矯則過于徇皆為名起念者也惟其為名起念不在已也枉用心力以欺世人耳目孶孶焉惟恐破缺失其所貪而其終至于喪已且名高一時起人效慕之心其終不免于害人好名之弊可勝言哉蓋其勞心苦行以求身外之名自君子視之如見其肺肝矣則亦何益之有但好名雖同㣲生仲子必其質之近于剛者故矯世絶俗而不顧鄉愿必其質之近于柔者也故同流合汚不自知其非其名心一動皆殫竭生平精力以為之䕶持而毫芒霄壤雖以廉直謹厚之德反為中道之害有如此故孔孟于衆好之中直斥其非焉亦可以見聖賢之用心矣雖然一善成名亦顧人何如耳夷齊餓死首陽幾于絶俗柳下惠袒裸與偕似乎同流孔子于清之中又表其不念舊惡孟子于和之中又表其不以三公易其介孔孟何心哉茍有益于斯人推揚之惟恐不盡茍有害於世道拒絶之惟恐不深君子立身行已可不慎哉大中本言自叙天之生物也使之一本試觀一物一物固然逹觀衆物衆物皆然合觀天地人與萬類無物不然允矣為物之不二也二之則不是矣惟于此不二之物真信不惑則知大學莫先格物物有本末而本亂則末不治矣故曰此謂知本此謂知之至也中庸莫先時中喜怒哀樂未發謂之中中也者天下之大本也時時只此未發之中斯為君子中庸故曰立天下之大本是天下無二物無二中也寧有二本哉夫知本者格物也立本者時中也學庸同此本也誦習大學不能洞晰乎天下國家身心意知原為一物則不知其本矣几所謂明明德親民止至善所謂致知誠意正心修身齊家治國平天下所謂仁敬孝慈信好好惡惡絜矩之道皆無所著曷能知止至善耶誦習中庸不能洞晰乎未發之中為天下之大本則凡所謂性道教也明與誠費與隠也與夫不聞不覩無聲無臭洋洋優優敦化川流皆何所指也所謂發皆中節之和逹道逹德庸行庸言鳶魚之飛躍鬼神之顯㣲三重九經知天知人至誠至聖參賛位育乎天地皆何所自出也曾謂中庸而不本乎未發之中耶予于學庸之本未能實有諸己然玩味體貼乆之則獨有契焉故記述大㫖統名為本言者非强名之也亦惟闡明其本然者與同志共究之耳或曰修身為本以身對家國天下觀之其本甚顯若未發之中則甚隠矣安得謂其本之不貳耶曰此謂修身在正其心是身之修由心之正而心之所以得其正者以忿􅓰恐懼好樂憂患不滯于有所也心無方所非喜怒哀樂未發之中而何或又曰心性一也學庸各有所專而不兼言之何耶曰大學言正心矣至善非性乎中庸言率性矣戒懼敬信非心乎矧心性之隠㣲欺慊總名之曰獨獨寧有二乎無二獨則無二本益信矣噫大則無外中則不倚安得真知本立本者與之同證乎慎獨之功論孟約言自叙志學集千古之大成願學立百代之定矩一祖一宗前無古後無今此學譜所由來也世之學者疇不讀習論孟之書疇不談說孔孟之道而究竟愽約之學脉者每鮮其人蓋由經生學士視為常談童而習之逹即棄若弁髦無論已學究汩没于訓詁至皓首莫識其指歸猶可說也惟高明特逹者反鄙之為糟粕灰燼溺心佛藏不思生長覆載間既自忘其罔極之恩乃欲脫然宇宙外正由論孟至約之學脉未之明耳夫道雖愽約一致而一本萬殊約尤愽之所歸宿也如萬物發生兩間者不可勝窮茍不能見天地之心曷知其生生化化原自至簡易哉是故論孟記載言言皆身心性命之發洩自朝廷逹之閭巷君君臣臣父父子子兄兄弟弟夫夫婦婦以至朋友之交凡一言一動未有斯須能越其範圍者乃曰吾道一以貫之曰夫道一而已矣雖未易神明其所指要之不可以泛求也嘗細繹其篇章如愽學于文約之以禮亦可以弗畔矣夫如愽學而詳說之將以反說約也是約之一言魯鄒一轍故以約失之者鮮矣而守約施愽乃所以為善道也儻能于論孟中黙識其至一者以為深造之梯航雖絲縷紏紛皆由簆出枝葉繁夥悉自根生不出乎彛倫日用而樹萬世不易之綱常不越布帛菽粟而一日不衣則寒不食則餒俾海宇生靈咸蒙其飽煖之賜幸有此二書存也所以謂夫子之道忠恕而已矣堯舜之道孝弟而已矣學問之道求其放心而已矣堯舜人皆可為文武之道未墜於地亦在乎為之而已矣觀孔門惟顔曾得其傳然顔之竭才惟在愽約之循循孟子淵源所自獨宗皜皜不可尚而嘆其不如曾之守約者正謂此耳否則多學而識失則泛舉一廢百失則僻不曰孔專求仁孟專集義則曰孔子言性兼夫氣質孟子專道性善未免岐孔孟而二之矣潢也不自揣量于焉記述論孟㫖意乃統以約言該之亦欲循其博約一致者以自滿其志願匪徒曰于無隠之中獨契其無言之秘于不慮不學之内獨得夫不為不欲之真也蓋非禮勿視聽言動正所謂約之以禮而反約之機凡行有不得皆反求諸己無餘藴矣若夫濳神虛寂正與孔孟相背馳也約言乎哉四書總意國朝以經義開科學庸論孟童子時即習其句讀稍長即能解釋字義想其意謂發為文辭咸􅂱然可觀其問多言而中或亦有能闡明聖賢㫖趣者况以此課之學校舉之鄉進之朝堂彬彬乎英才輩出宜乎孔曽思孟之學大明當時矣抑知程子謂讀論語後又只是此等人便是不曽讀而今之士得無有讀書不識字者乎即如論語開卷便提掲學之一字以覺羣蒙所以孔子十五志學不如丘之好學喫𦂳教人莫有切于學焉者學果何所學歟大學在明明德親民止至善而莫要於知止中庸天命之性孟子知性知天其義一也茍不能知止知性㑹四書而歸之一焉謂之為聖學可乎哉但今之時說有談性學於舉業之旁者鮮不嗤笑而詆訾之而經義秪為取青紫之芻狗耳又孰肯以盡性為己責也學字且未明何有於四書之誦習哉或曰孔門之學惟在求仁大學之止庸孟之性本各一其學也必欲强而同之何歟葢孔曾思孟同一源流謂其有二學焉不可也孔門惟在求仁信矣論語二十篇其言仁能幾不知隨其問荅雖各有不同而同歸之仁也所謂學習志學好學曾有外于大學者乎知止者止乎性之至善也求仁者求乎性之至善也仁者人也孔孟之所同學所以學為人也舍仁又何所學㑹通學庸而要其歸宿皆示人以求仁之方也茍執泥言詮則孔子固言言殊矣一以貫之豈虛語哉或又曰明德親民總歸之止至善中和位育總歸之盡性謂其同歸於仁焉可也然孔曰求仁孟曰集義何歟葢仁即性之善義即仁之宜天地以生物為心而各得其宜聖人以求仁為學而惟義所在况義之與比義以為質孔子未嘗專言仁親親仁也仁人心也孟子未嘗專言乎義謂孔子言仁於春秋孟子倡義於戰國各因其時亦未足為定論也知此則知大學專言乎心非遺性也中庸專言乎性非遺心也心性仁義一也統言之非泛專言之非偏惟合學庸論孟而約其歸則黙識心通庶幾乎聖賢一本之學不徒為口耳之贅疣矣否則以隋珠彈鳥鵲固可惜也而以書博我買櫝還珠寧無悔乎圖書編卷十五
