  text: 圖書編巻二十明章潢撰嵗星總叙嵗星一曰攝提又曰重華曰應星曰紀星東方青帝靈威仰之神蒼龍之精木海之宿嵗行一次十二年一周天與嵗相應故謂之嵗星人主之象主道術五常為仁五事為貎仁虧貎失逆春令傷木氣則罰嵗星主春其日甲乙其辰寅卯其卦震巽其音角其數八其帝大皥其神勾芒嵗星所在其國有福逆之則怒為殃尤甚嵗星主司人君過失主齊呉以東之國又為農官主五榖所居之宿五榖蕃昌其對為衛嵗乃有殃嵗星所在之國不可伐可以伐人所留之埜吉去之埜㓙嵗星吟東方嵗星名曰木精蒼帝之子光大而明所在之分莫之與京人君布德不可加刑君若不仁禍滿寰瀛下謀其主弟凌其兄赤黄多蟲旱白黒為水兵合金分野君喪犯土后妃將傾入太㣲君憂有赦犯東井將相出征守雙魚魏國用斧繞虚危齊地交兵守房五榖豐穰留心天下安寧逆行為㐫為賊晝見主弱臣强在角忠臣進用留尾儲副相承歴氐内多有喜犯亢豐稔和平經箕中宫口舌入斗爵禄豐盈乘虚魚行人道犯女宫娠歡盈環斗棟死瘧害繞危祠祀不馨在室后宫安㤗犯璧賢士稱情入奎有道者進經婁教令不行守胃大官囹圄在昴王者嚴刑犯畢守婁灾見入牛乗觜入井獄訟兵憂繞天屍鬼中積屍氣也死過半犯栁五榖結稠留張君臣和順八翼五榖少成留軫乃為喪病侵房將相皆愁朂哉有土君子慎獨撫􅑏増崇景福神祐其居懲惡窒慾奉三無私降為戩榖正二三四五六七八九十十一十二閏一女虚虚危危危危危危危危危危危室室二室室璧璧奎奎奎奎奎奎璧璧奎奎三奎奎婁婁婁婁婁胃昴畢畢參胃胃胃四胃胃胃昴昴畢畢畢畢參參參參參參畢五畢畢參參參井井井井井井井井井六井井井井井鬼栁栁栁星星張張張張張七張張張張張張張張翼翼翼翼軫軫八軫翼翼翼翼翼翼軫軫軫軫角角角角亢九亢亢角角角角角角角亢亢氐氐氐氐房房十心心心房氐氐氐氐房房心心尾尾尾尾箕十一箕箕斗斗箕箕箕箕尾尾箕箕箕斗牛斗十二斗斗牛女女女女牛牛牛牛牛牛女女虚十三虚危危危室室室室室危危危危危室室十四室室璧璧奎奎奎奎奎奎奎奎奎十五奎奎婁婁婁胃胃胃胃昴昴闕胃胃胃十六胃昴昴畢畢畢畢參參參井井井參參參十七參參參參井井井井井井鬼栁栁栁栁鬼井十八井井井井井鬼栁栁星星張張張張張十九張張張張張張翼翼翼翼翼軫軫軫二十軫軫軫翼翼翼翼軫軫軫軫角角角亢亢亢二十一亢亢亢角角角角亢亢氐氐氐氐房房心二十二心心心心房房房房心心尾尾尾尾箕二十三箕箕斗斗斗斗箕箕箕箕斗斗斗二十四牛女女女女女女斗牛女女虚二十五虚危危室室室室室室危室室二十六室室璧奎奎奎婁婁奎奎奎奎奎二十七奎奎婁胃胃昴昴昴昴昴昴昴胃二十八胃昴昴畢畢觜參井井井井參二十九參參井井井井井井鬼栁栁栁栁栁三十鬼井井鬼栁栁星張張張翼翼三十一張張張張張翼翼翼翼軫軫軫三十二軫角角角角軫軫軫軫軫角角角亢亢氐三十三氐氐亢亢亢亢亢亢亢氐氐氐氐房房心三十四心尾尾尾尾心心心心心尾尾尾箕三十五斗斗斗斗斗斗箕箕斗斗斗斗斗牛三十六牛女女女虚虚虚虚女女女女女虚虚三十七危危危室室室室室室室室室室三十八奎婁婁婁胃胃昴昴畢畢畢畢昴昴昴昴三十九昴昴畢畢畢參參井井井井井井井四十室璧璧奎奎奎婁婁婁婁婁奎奎奎奎四十一井井井井井井井鬼栁栁栁栁栁四十二栁栁桞栁栁栁星星張張張張翼翼翼四十三翼張張張張張翼翼翼翼軫軫軫軫四十四軫軫軫軫軫軫軫軫角角角亢亢亢氐四十五氐氐氐氐亢亢亢亢亢氐氐氐氐房心心尾四十六尾尾尾尾尾心心心尾尾尾尾箕箕斗四十七斗斗斗斗斗斗斗斗斗斗斗斗牛牛女四十八女女虚虚虚虚虚虚女女女女虚虚危危四十九危危室室室室璧璧璧室室室室室五十室璧璧奎奎奎奎婁婁婁婁婁婁婁婁婁五十一婁婁胃胃胃昴昴氐畢畢畢畢畢畢昴昴五十二昴畢畢畢參參參井井井井井井井五十三井井井井井井井鬼栁栁栁栁星星星星栁五十四栁栁栁栁栁星星張張張張翼翼翼翼五十五翼翼翼張張翼翼翼翼翼軫軫軫軫軫五十六角角軫軫軫軫軫軫軫角角角亢亢氐五十七氐氐氐氐亢亢氐氐氐氐氐房心尾尾五十八尾尾尾尾尾尾尾尾尾尾尾箕箕斗斗五十九斗斗斗斗斗斗斗斗斗斗斗牛牛女六十女女虚虚危危危危危室虚虚虚虚危危六十一危危室室室璧璧璧璧璧室室室室六十二璧奎奎奎婁婁婁胃胃胃胃胃胃婁婁婁婁六十三婁胃胃胃胃昴昴畢畢畢畢畢畢畢畢六十四畢畢畢畢參參參井井井井井井井六十五井井井井井井鬼栁栁栁星星星張張星星六十六星栁栁栁栁星星張張張翼翼翼翼六十七翼翼翼翼翼翼翼軫軫軫角角六十八角角角軫軫軫軫角角角亢氐氐氐六十九氐氐氐氐氐氐氐氐氐房房心心尾尾尾七十尾尾尾尾尾尾尾尾尾箕箕斗斗七十一斗斗斗牛牛斗斗斗斗斗斗斗斗牛牛七十二女虚虚虚危危危危危危危虚虚危危七十三室室室璧璧璧奎奎璧璧璧璧璧璧七十四璧奎奎奎婁婁婁胃胃胃胃胃婁婁婁七十五胃胃胃昴畢畢畢觜參參畢畢畢畢七十六畢畢畢參參參井井井井井井井井井七十七井井井井井栁栁星星張張張張張七十八張星星星星張張張張翼翼翼翼翼七十九翼翼翼翼翼翼翼軫軫軫軫角角角角八十角角角角角角角角亢氐氐氐氐房八十一房房房氐氐氐氐氐氐房心心尾尾尾八十二尾箕箕箕箕箕尾尾尾尾尾箕箕箕斗斗斗八十三斗斗牛牛牛牛牛斗斗斗斗斗牛斗女女星乃木之精五日行一度亦不及天數也其行十二年一周天太嵗在四仲則行三宿在四孟四季則行二宿嵗行一舍故謂之嵗星比日較遲故合伏已後日在前距日十三度而晨見晨見則在東方初疾漸遲距日一百九度而初留留後距日一百三十一度而退初遲漸疾退行最疾之時必與日對衝退止而留則背距日初退之度留久而順行則背距日如初留之度初遲漸疾而漸迫日距如神見之度則伏而不著矣最疾約四日行一度其加减最多處約七度日未對衝之前夜半後可望謂之晨段與日既對衝之後夜半前可望謂之夕段八十三年而七週天與日合度者七十六合期約三百九十九日取上古甲子四分為八十三號每號分為十二日而置閏於其下閏在號前那前一月閏在號後那後一月張衡云嵗星在四仲則行三宿在四季則行二宿孟季之年四四一十六四仲之年三四一十二而行二十八宿十三年一週天木星所在國不可伐而可以伐人趨舍為盈退舍為縮出入不常其次必有天妖凡六日行一度或三日五日行一度十二月移一宫十二年一小週天八十三年一大週天天原發㣲太嵗為隂左行在寅太嵗為陽右轉在丑太嵗在邜則嵗居子在辰則嵗居亥又謂太嵗在寅則嵗星正月出東方在邜則二月辰出東方以此而推餘皆可見史記察日月之行以揆之嵗星順逆曰東方木主春日甲乙義失者罰出嵗星嵗星盈縮以其列國所在國不可伐可以伐人其趨舍而前曰盈退舍日縮盈其國有兵不復縮其國有憂將亡國傾敗其所在五星皆從而聚於一舍其下之國可以義致天下以攝提格嵗嵗星左行在寅嵗星右轉居丑正月與斗牽牛晨出東方名曰監德色蒼蒼有光其失次有應見栁嵗早水晚旱嵗星出東行十二度百日而止反逆行逆行八度百日復東行嵗三十度十六分度之七率日行十二分度之一十二嵗而周天常出東方以晨入於西方用晨單閼嵗嵗在邜星居子以二月與婺女虚危晨出曰降入大有光其失次有應見張名曰降入其嵗大水執徐嵗嵗隂在辰星居亥以三月居與營室東壁晨出曰青章青青甚章其失次有應見軫曰青章嵗早旱晚水天荒駱嵗嵗隂在已星居戍以四月與奎婁胃􅄧晨出曰跰踵熊熊赤色有光其失次有應見亢敦牂嵗嵗隂在午星居酉以五月與胃昴畢晨出曰開明炎炎有光偃兵唯利公玉不利治兵其失次有應見房嵗早旱晩水叶洽嵗嵗隂在未星居申以六月與觜觹參晨出日長列昭昭有光利行兵其失次有應箕涒灘嵗嵗隂在申星居申以七月與東井輿鬼晨出曰白音昭昭白其失次有應見牽牛作鄂嵗隂在酉星居午以八月與栁七星星張晨出曰為長王作作有芒國其昌熟榖其失次有應見危曰大章有旱而昌有女喪民疾閹伐嵗嵗隂在戌星居巳以九月與翼軫晨出曰天睢白色大明其失次有應見東璧嵗水女喪大淵獻嵗嵗隂在亥星居辰以十月與角亢晨出曰大章蒼蒼然若躍而隂出旦是謂正平起師旅其率必武其國有德將有四海其失次有應見婁困敦嵗嵗隂在子星居邜以十一月與氐房心晨出曰天泉𤣥色甚明江池其昌不利起兵其失次有應在􅄧赤奮若嵗嵗隂在丑星居寅以十二月與尾箕晨出曰天皓黫然黒色甚明其失次有應見參當居不居居之又左右摇未當去去之與他星㑹其國㓙所居久國有德厚其角動乍小乍大若色數變主有憂其失次下舍以下進而東北三月生天棓長四丈未兑進而東南三月生慧星長二丈類慧星退而西北三月生天欃長四丈末兑退而西南三月生天槍長數丈兩頭兑謹視其所見之國不可舉事用兵其出如浮如沉其國有土如沉如浮其野亡色赤而有角其所居國昌迎角而戰者不勝星色赤黄而沈所居野大穰色青白而赤灰所居野有憂嵗星入月其野有逐相與大白鬬其野有破軍嵗星一曰攝提曰重華曰應星曰紀星營室為清廟嵗星廟也萬厯五年十二月朔日木星軫十四度順行見熒惑總叙熒惑一曰赤星一曰罰星曰執法曰天候南方赤帝燥怒之神朱雀之宿火之精也天原發㣲云火星激烈主執法其行無常出則有兵入則兵散熒惑居東方為懸息西方為天珏南方為熒惑進退無常躁急促狹故曰熒惑五常為禮五事為視禮虧視失逆夏令傷火氣罰見熒惑主夏其日丙丁其辰巳午其卦離其音徴其數七其帝炎帝其神祝融熒惑主死喪主司天下羣臣之過司驕奢亡亂妖孽主嵗成敗明照四方察過失以遣告人主者也口天越以南國主憂患過惡禍福之所由生其國有道則疾行而東無道則留而降罰為亂為賊為疾為喪為饑為兵所居之國受殃環繞鈎已芒角動摇變色乍前乍後乍左乍右其殃彌甚周旋止息則為死喪冦亂其野亡地熒惑失行而速兵聚其下順之戰勝又曰熒惑不動兵不戰有誅戮又曰熒惑為天子之禮内則明故謂則禮興從之者吉逆之者㓙故曰雖有明天子必視熒惑之所在熒惑吟南方之精名曰罰星赤帝之子巡行不停入大㣲而受制國有道而不經如無道之國又出入何常勾已為禍環遶為殃或進或退大小不常為水為旱豐儉迭興每晨見而行疾亦昏出而漸升出處失度乍存乍亡若依常道其色青黄有怒有悖或角或芒入大㣲魏文列落犯紫㣲野死之王守天罡河肆泛濫在胃宿天下空倉繞羽林禁兵火起留張宿嵗美大康入南箕其城絶嗣犯東井水大不祥守少㣲處士受戮遶天囷萬姓饑荒乗鬼兵戈倐起入􅄧戎狄消亡居心主王大惡侵軒轅后妃憂惶犯室米貴比玉乗危起兵南方在尾大臣不順入角賢相多傷勾已漂流城邑犯鬼死者相望留奎父不親子犯天駟臣叛王凌虛萬物小稔守畢邊星有降入畢賢士被戮留心兵遶四方近女布帛湧貴守女六畜尸强入栁不遵王命犯角禍起蕭墻入軫人皆徭役犯婁見必出彊逆行于氐環繞于房股肱失位父子分張經天時海内鼎沸犯翼宿嵗美人康有土君