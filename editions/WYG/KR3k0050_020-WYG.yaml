虚無得也行勝色色勝位有位勝無位有色勝無色行色盡勝之出而留桑榆間疾其下國上而疾未盡其曰過參天疾其對國上復下下復上有反將其入月將僇金木星合光其下戰不合兵雖起而不闘合相毁野有破軍在西方乘昏而出隂隂兵强暮食出小弱夜半出中弱鷄鳴出大弱是隂陷於陽其在東方乘明而出陽陽兵强鷄鳴出小弱夜半出中弱昏出大弱是謂陽陷於隂太白伏也以出兵兵有殃其出邜南南勝北方出邜北北勝南方正在邜東國利出酉北北勝南出酉南南勝北方正在酉西國勝其與列星相犯小戰五星大戰其相犯太白出其南南國敗出其北北國敗行疾武不行文色白五芒出早為月蝕晩為天矢及彗星將發國出東為德舉事左之迎之吉出西為刑舉事右之背之吉反之皆㐫太白光見景戰勝晝見而經天是謂爭明强國弱小國强女主昌亢為䟽廟太白廟也太白大臣也其號上公其他名殷星大正營星觀星宫星明星大衰大澤終星大相天浩序星月緯大司馬位謹候此太白史或書晝見或書周天葢巳時當丙位則為經天以其當君禍尤大也其餘方位則止書晝見也萬厯五年十二月朔日金星箕二度順行見錢若水曰邊將用兵惟視太白與月為進退者誠以太白者將軍也辰星者廷尉也合則有戰不合則無戰合於東則主勝合於西則客勝辰星總叙辰星北方土氣所結水之精也一曰勾星一曰㸑星一曰伺星晨候之東方夕候之西方一嵗一周天五常為智五事為聽智虧聽失逆冬令傷水氣罰見辰星主冬其日壬癸其辰亥子其卦坎其音羽其數六其帝顓帝其神𤣥㝠辰星見則主刑主廷尉主燕趙幽翼以北之國為宰相之象亦為殺伐之氣戰鬭之象又軍于野辰星為偏將之象無軍為刑事和隂陽應効不効其時不和出入失其時寒暑失其節邦當大饑當出不出是謂擊卒兵大起在于房心間地動亦曰辰星出入躁疾常主夷狄又曰蠻夷之星也天原發㣲曰水性平淡主刑法之得失是正四時色黄而小地大動􅊍明與月相逮其國大水辰星吟北方之星名曰水精黒帝之子偏將之名所主在聽國君之情所在之國憂而不寧君若遵守法度明其教令違其䜛邪提其惠政無縱無慾邦家大慶君若不脩德政不任賢人縱舍由巳昵比小人上天垂戒災及其鄰五榖不熟風雨不均隂陽錯亂饑荒薦臻與火合而干戈起被土犯而元戎厄觀芒角知大小災祥審伏現察君臣譴責暴水漲而青色大喪發而虚白其順也春晨見而秋夕其逆也冬作澇而夏寒逼太陽而掩映接太隂而交懽守角水旱並興留亢米榖騰湧在心為水為火守房作動作靜入尾江漢横流環箕大人多恐犯虚丁壯盡行乘斗牛百川决壅凌女宿布帛湧貴留危畢禍亂繼踵入奎臣被困獄守胃起兵中州凌畢邊防𦂳急在􅄧執政刑流勾觜水火為孽入井氷霜未休乗參水泉决湧繞鬼痰病多憂留星貴臣當罪入栁水損田疇守翼人民饑饉在軫百榖難收大㣲羣臣相殺犯君座將相相尤守軒轅後宫不樂乘輿鬼秦地多憂􅃡惟有土固守其宜兢兢慄慄居安慮危勤脩令德福禄斯綏星乃水之精一日行一度餘亦不及天數也其行一嵗一周天以四仲之日春見奎婁夏見東井秋見角亢冬見牽牛出以辰戌入以丑未二旬而入其出入也不違其時故為辰星比日較速故伏合以後過日而前距日十六日而夕見夕見則在西方初疾漸遲距日二十一度半而初留留後距日十九度半而初退初遲漸疾與日相近如夕見之度則伏而不著退行最疾之時必與日同度退而晨見於東方如夕見之度初疾退漸遲退退止而留則距日如退之度留久而順則距日如初留之度初遲漸疾而漸近日距日如退伏之度則又伏而不著矣甚逺不過一十四度最疾不過一度半故加减最多不過六度餘與日未退合之先昏後可望謂之夕段與日既退合之後晚前可望謂之晨段四十六年之間合於日者一百四十五退合亦然約一百一十六日而順逆二合取上古甲子而分為四十六號每號分為十二月而置閏於其下閏在號前那前一月閏在號後那後一月張衡云春見奎婁夏見冬井秋見角亢冬見牽牛出以辰戍入以丑未晨見候於東夕見候於西出早為日蝕出晚為彗星四時不出天下大饑出於房間主地動一日行一度半一月過一宫則六十九日始過一宫疾則二十日或十七日過一宫一年一小週天六十五年一大週天史記察日辰之㑹以治辰星之㑹曰北方水大隂之精主冬日壬癸刑失者罰出辰星以其宿命國是正四時仲春春分夕出郊奎婁胃東五舍為齊仲夏夏至夕出郊東井與鬼栁東七舍為楚仲秋秋分夕出郊角亢氐房東四舍為漢仲冬冬至晨出郊東方與尾箕斗牽牛俱西為中國其出入常以辰戌丑未其蚤為月蝕晚為彗星及天天其時宜效不效為失次追兵在外不戰一時不出其時不和四時不出天下大饑其當效而出也色白為旱黄為五榖熟赤為兵黒為水出東方大而白有兵於外解常在東方其赤中國勝其西而赤外國利無兵於外而赤兵起其與大白俱出東方皆赤而角外國大敗中國勝其與太白俱出西方皆赤而角外國利五星分天之中積于東方中國利積于西方外國用者利五星皆從辰星而聚于其舍其所舍之國可以法致天下辰星不出太白為客其出太白為主出而從太白不相從野雖有軍不戰出東方太白出西方若出西方大白出東方為格野雖有兵不戰失其時而出為當寒反温當温反寒當出不出是謂擊卒兵大起其入太白中而上出破軍殺將客軍勝下出客亡地辰星來抵太白太白不從將死正旗上出破軍殺將客勝下出客亡地視旗所指以命破軍其繞環太白若與鬭大戰客勝免過大白間可椷劒小戰客勝免居太白前軍罷出太白左小戰磨太白有數萬人戰主人吏死出太白右去三尺軍急約戰青角兵黒角水赤行窮兵之所終免七命曰小正辰星天􅍴安周星細爽能星鈎星其色黄而小出而易處天下之文變而不善矣免五青圜憂白圜喪赤圜中不平黒圜吉赤角犯我城黄角地之爭白角號泣之聲其出東方行四舍四十八日其數二十日而反入于東方其出西方行四舍四十八日其數二十日而反入于西方其一候之營室角畢箕栁出房心間地動辰星之色春青黄夏赤白秋青白而嵗熟冬黄而不明即變其色其時不昌春不見秋則不實夏不見有六十日之旱月蝕秋不見有兵春則不生冬不見隂雨六十日有流邑夏則不長萬厯五年十二月朔日水星斗十八度伏不見五星總考凡五星所聚其國王天下從嵗以義從熒惑以禮從鎮以重從太白以兵從辰以法各以其事致天下也三星若合是謂驚立絶行其國外内有兵天喪人民改立侯王四星若合是謂太陽其國兵喪並起君子憂小人流五星若合是謂易行有德受慶改立王者奄有四方子孫蕃昌亡德受殃離其國家滅其宗廟百姓離去被滿四方五星皆大其事亦大皆小事亦小凡五星色其圜白為喪為旱赤中不平為兵為憂青為水黒為疾疫為多死黄為吉皆角赤犯我城黄地之爭白哭泣聲青有兵憂黒有水五星同失天下偃兵百姓安寧歌儛以行不見災疾五榖蕃昌凡五星為政緩則不同急則過分逆則占熒惑緩則不入急則不出違道則占鎮星緩則不還急則過舍逆則占太白緩則不入逆則占辰星緩則不出急則不入非時不占五星不失行則年榖豐昌凡五星分天之中積于東方中國積于西方外國用兵者利辰星不出太白為客其出太白為主出而與太白不相從及各出方為格野有軍不戰五星為五德之主其行或入黄道裏或出黄道表猶月行出有隂陽也然出入無常不可以算數求也其東行曰順西行曰逆順則疾逆則遲通而率之終為東行矣不東不西曰留與日相近而不見曰伏伏與日同度曰合其留行逆順掩合犯凌變色芒角凡其所主皆以時政五常五官五事之得失而見其變木火土三星行遲夜半經天其初皆與日合度而後行漸遲追日不及晨見東方行去日稍遲朝時近中則留留經旦過中則逆行逆行至夕時近中則又留留而又順先違漸速以至于夕伏西方乃更與日合金水二星行速而不經天自始與日合之後行速而先日夕見西方去日前稍逺夕時欲近南方則漸遲遲極則留留而近日則逆行而合日在于日後晨見東方逆極則留留而後遲遲極去日稍逺旦時欲近南方則速以追日晨伏於東方復與日合此五星合見遲速逆順流行之大經也昏旦者隂陽之大分也南方者太陽之位而天地之經也七曜行至陽位當天之經則虧晨留逆而不居焉此天之常道也三星經天二星不經天三天兩地之道也凡五星見伏留行逆順遲速應厯度者為得其行政合于常違厯錯度而失路盈縮者為亂行亂行則為天矢彗悖而有亡國革政兵饑喪亂之禍云古厯五星並順行秦厯始有金火之逆又甘氏並時自有差異漢初測候乃知五星皆有逆行其後相承罕能察至後魏末清河張子信學藝博通尤精厯數因避葛榮亂隠于海島中積三十許年專以渾儀測候日月五星差變之數以算歩之始悟日月交道有表裏遲速五星見伏有感召向背言日行在春分後則遲秋分後則速合朔月在日道裏則日食若在日道外雖交不虧月望值交則虧不問表裏又月行遇木火土金四星向之則速背之則遲五星行四方列宿各有所好惡所居遇其好者則留多行遲見早遇其惡者則留少行速見遲與常數並差少者差至五度多者差至三十許度其辰星之行見伏尤異晨應見在雨水後立夏前或見在處暑後霜降前並不見驚蟄立夏立秋霜降四氣之内晨夕去日前後三十六度内二十八度外有木火土金一星有者見無者不見後張胃𤣥劉孝孫劉焯等依此差度為定入交食分及五日定見定行與天密㑹皆古人所未得者也中興天文志夫二曜二氣之精也五緯五行之精也二曜俱順行五緯獨有退逆何也班氏謂三代盛時天下五緯順軌無逆行者周之末造人紀不脩師旅數起故五緯始失常度而有逆行然則降姬而後世道趨末星軌遁常亦失其初歟易曰觀乎人文以察時變故星紀之逆順可以􅋏然懼矣又曰古法周天之數如數星謂十二年一周天乃約數耳前穪嵗星在四仲則行三宿在四孟四季則在二宿二八十六三四十二故十二年而行周二十八宿其説非是夫二十八宿度有廣狹而嵗星之行有盈縮豈得以十二年一周無差忒乎唐一行始言嵗星自商周迄春秋季年率百二十餘年而超一次因以為常以春秋亂世則其行遲其説猶迂既乃為後率前率之術以求之則其説益自相悖按劉歆三統厯推嵗星一百四十四年行天一百四十五次一千七百二十年剩行一周此古人所未䆒也又左氏䟽以厯法推之周天凡十二次每次别為百四十四分嵗星每行一百四十五分是每年行一次之外尚餘一分積一百四十四年剰一次矣殆據是乎餘四星之行固有順逆中間亦豈無差忒一行不復詳言葢亦知之矣後之考厯者當能辨之然嘗考五星之行率循黄道惟金火二星㳺行不測土水嵗星為變希則凡黄道所經順軌則不占惟陵犯留守則㐫咎知熒惑每入太㣲出端門星家謂受制而出始則黄道所經也而月與五星相遇亦多渉黄道内外之徑黄道邪界列宿各有尺數如房宿又有上中下三道焉此其所以易於陵犯是以青臺每言五星行次黄道所經諸星占家多不驗凡以此故要之天人之際何其有兆於此即感於彼其出没顯晦飛流升降疾遲盈縮進退㑹散動移轉徙非邈無與於人如此也是故精䘲之交明君謹之能遇災而加懼見祥而滋敬思其咎謝不敢怠寧王事之當然也善乎太史公之言曰太上脩德其次脩政其次脩禳畏天者擇焉又曰按五星之變有合有散有守有陵有厯有鬭有盈有縮有食同舍日合變為妖星日散寸以内灮芒相及曰犯韋昭謂自下而往觸之為犯也居其宿曰守相冐而過曰陵韋昭謂突掩為陵也經之曰厯相出曰鬭又曰離復合合復離為鬭早出曰嬴晩出曰縮又失次上二三宿曰嬴失次下二三宿曰縮星月相陵曰食吉㐫各以類應不可誣已然有或不盡如所占何也曰日月五行俱行黄道不能無侵犯也惟迫近則殃大逺則無傷寸以内芒角相反則其占始應漢志曰近者殃大逺者則毋傷後之人又不此之察猥見其差近遂譸張以為變此所以繁䙝不驗圖書編巻二十
