body:
  text: 圖書編卷九十五明章潢撰祭地總敘三代祭地之禮見於經傳者夏以五月商以六月周人以夏至日禮之於澤中方丘蓋王者事天明事地察故冬至報天夏至報地所以順陰陽之義也祭天于南郊之圜丘祭地于北郊之方澤所以順陰陽之位也然先王親地有社存焉禮曰享帝於郊祀社於國又曰郊所以明天道社所以神地道又曰郊社所以事上帝又曰明乎郊社之禮或以社對帝或以社對郊則祭社乃所以親地也書曰敢昭告于皇天后土左氏曰戴皇天履后土則古者亦命地祗為土后矣曰地祗曰后土曰社皆祭地也此三代之正禮而釋經之正說自鄭𤣥惑於緯書而謂夏至於方丘之上祭崑崙之祗七月於泰折之壇祭神州之祗析一事為二事後世宗之一歳二祭自漢武用祠官寛舒議立后土祠於汾隂脽上禮如祀天而後世又宗之於北郊之外仍祠后土元始間王莽奏罷甘泉泰畤復長安南北郊以正月上辛若丁天子親合祀天地於南郊而後世又因之多合祭焉皆非禮經之正義矣由漢歴唐千餘年間祀北郊者唯魏文帝之太和周武帝之建德隋髙祖之開皇唐𤣥宗之開元四祭而已宋元豐中議專祀北郊故政和中專祭者凡四南渡以後則惟行攝祀而已元皇慶間議夏至專祭地未及施行國朝以夏至日親祀皇地祗于方丘祭地壝壇祭法曰瘞埋于泰折封土祭地之處折曲也言方丘之形四方曲折象地秦祀后土於高山之下命曰畤漢武於澤中方丘立后土五壇壇方五丈高六尺又於脽上立后土宫宫曲入河名曰太一旦丘東漢北郊在洛陽城北四里為方壇四陛中營外營隋方丘於宫城北十四里丘再成成高五尺下成方十丈上成方五丈唐夏至祭皇地祗於方丘其長安壇在宫城北十四里洛陽壇在徽安門外道東一里其壇在城下成方十丈上成方五丈八陛立冬後祭神州地祗于郊其壇長安在光化門外黑帝壇之西洛陽在徽安門外道東一里高五尺周四十八步宋熙寧祀儀祭皇地祗壇八角三成每等高四尺上闊十六步設八陛上等陛廣八尺中等陛廣一丈下陛廣一丈二尺三壝每壝各二十五步神州地祗壇廣四十八步高五尺兩壝每二十五步元方丘之制未及施行國朝方丘壇制第一層壇面門六丈高六尺四出陛南面陛闊一丈八級東面北面西面陛俱闊八尺八級第二層壇面四圍皆闊二丈四尺髙六尺四出陛南面正陛闊一丈二尺八級東北西陛俱一丈八級壝去壇一十五丈高六尺正南靈星門三正東西北靈星門各一周圍以牆面各六十四丈正南又靈星門三正東北西又靈星門各一庫房五間在外牆北靈星門外以藏龍椅等物厨房五間宰牲房三間天池一所在外牆西靈星門外西南隅齋次一所在外靈星門外之東三間在外靈星門外之西浴室在東齋次之中瘞坎爾雅祭地曰瘞埋瘞埋謂瘞繒埋牲也蓋陰祀自血始故瘞血以致神不可不在先及致神矣方有事焉至於禮畢則以牲幣之屬而瘞之然後為禮之終也後齊為瘞坎於壇之壬地中壝之外廣深一丈二尺唐瘞坎在内壝之外壬地方深取足容物南出陛宋開瘞坎於子階之北壬地國朝瘞坎在外壝壬地其瘞牲體周人瘞血漢用首及左髀國朝用周制先瘞血其祭畢奉牲幣祝饌而埋之配位配地之神周禮無文鄭𤣥以孝經緯云后稷為天地主則后稷配天南郊亦當配地北郊矣其說無據至漢平帝用王莽之說以吕太后配光武時改薄太后為高皇后以配後魏道武以神元竇后配則愈不經矣隋始改用太祖武元皇帝配唐高祖時以景皇帝配貞觀中以高祖配宋初以四祖迭配皇地祇太宗時以宣祖太祖更配其後惟以太祖配國朝洪武三年五月二十日親祀北郊奉皇考仁祖淳皇帝配從祀春秋公羊傳曰天子祭天地有方望之事無所不通方望者謂因郊祀望祭四方之山川也漢元始中用王莽議祭地地理山川皆從光武祀北郊地理羣神從祀皆在壇下其目之詳見郊天從祀中隋以神州迎州冀州戎州拾州柱州宫州咸州揚州及九州山川林澤丘陵墳衍原隰皆從祀唐從祀以神州五方嶽鎮海瀆山林川澤丘陵墳衍原隰宋以神州地祗五嶽五官五行之神祀於壇之第一等四海四瀆五鎮於壇之第二等崑崙五山五林五川五澤於壇之第三等五陵五墳五衍五原五隰於内壝之内元合祭天地于圜丘亦不及嶽瀆山川之從祀國朝惟以五嶽五鎮四海四瀆四位從祀方丘圜丘方澤帝神位向歲冬至大祀天于圜丘皇天上帝南向太祖配神西向從祀四壇東西相向東大明次東二十八宿木火土金水星周天星辰西夜明次西雲雨風雷凡國有大事則祭告歲夏至大祭地于方澤皇帝祇北向太祖配神西向從祀東西相向東中嶽東嶽南嶽西嶽北嶽基運山翊聖山神烈山次東東海南海西海北海西中鎮東鎮南鎮北鎮天夀山純德山次西大江大淮大河大濟凡國有大事則祭告按自古祀天地分合不一國初太祖高皇帝固分祀其主分祀之議者則以禮有冬至祀天于圜丘夏至祭地于方澤之文然考之禮曰器用陶匏以象天地之性似又不分祀也其在周之詩厥初生民與思文后稷二章只言天而不及地豈以專言天則統于所尊耶不然何不見祭地之樂章又曰社即祭地也如此則郊社之禮所以祀上帝也或非省文也昔太祖高皇帝分祀之時每當齋期必有風雨臨祭方斂每以為憂及合祀當齋期風和日暖及夜陞壇山川草木不揺江海息波輕雲縹緲于昊穹獨見太陰于中天纎塵不動銀燭舒光香煙裊繞高皇帝心甚悅以為必神之臨從是觀之豈以天覆地載原不相離耶高皇御製合祭天地于奉天殿祝文曰曩者建國之初遵依古制祀以南北之郊御名周旋九年以來見古人之意固成於禮未為然也且人君者父天母地其仰瞻覆載無不思也及其祀也則有南北之壇終不㑹祀以人事度之為子之道致父異處安為孝乎今也大壇鼎建未完朝堂新造已備時當冬至謹告祀於殿庭自今以後每歲合祀于春時永為定禮以皇考仁祖淳皇帝配神惟上帝皇祇鑒之尚享高皇在昔分祀合祀樂章俱載者何也高皇御製也至誠感神基萬年之命者在于斯也又高皇嘗命儒臣撰囘鑾樂歌真聖人修己以敬祈天永命之聖心也洪武六年上以祭祀還宫宜用樂舞生前導命翰林儒臣撰樂章以致敬慎鑒戒之意後世樂章惟聞頌美無古意矣嘗謂諷諫則使人惕然有警若頌美之詞使人聞之意怠而自恃之心生蓋自恃者日驕自警者日强朕意乃此卿等其撰述毋有所避於是儒臣承㫖撰神降祥神祝酣酒色荒禽荒諸曲凡三十九章曰囘鑾樂歌舞其詞皆存規戒其樂舞分為八隊皆八人禮部因其制以上命工肄習之莊誦高皇諭儒臣之言直與緝熙兢業者同符也孔子曰修己以安百姓高皇有焉齋牌創自高皇也洪武二年有旨教胡太常做個牌子漆得如法將圜丘方澤社稷宗廟先農風雨雷師馬祖凡一應祭祀時月日期明白開寫於牌上掛在這東耳房前我時常看都要知道欽此又銅人制亦創自高皇也洪武十二年上命禮部尚書陶凱等曰經言鬼神無常享享于克誠人謹方寸於此而能格神明於彼由至誠也然人心操舍無常必有所警而後無所放耳乃命禮部鑄銅人高一尺有五寸手執簡書曰齋戒三日凡致齋之期則致朕前庶朕心有所警省而不敢放也由此觀之高皇誠敬之心無所不用其極也易曰聖人齋戒以神明其德此之謂也郊祀總論記曰王者事父孝故事天明事母敬故事地察郊祀之禮所以因天事天因地事地大報本而反始也祭法有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀殷人禘嚳而郊㝠所從來逺矣周公成文武之德而郊祀大禮至為明備冬至祀天于圜丘大司樂用圜鐘於震宫舞雲門而禮蒼璧所以順陽位而象天也夏至祭地祗于方澤大司樂用函鐘于坤宫舞咸池而禮黄琮所以順陰位而象地也牲用騂尚赤也用犢貴誠也掃地而祭於其質也器用陶匏以象天地之性也天垂象聖人則之是郊祀之義也此其通天地之故究神明之藴仁人孝子之極淵乎穆穆而未易窺者也三代而下若秦置四畤於咸陽四仲舉祀祀每用駒三年一郊郊則尚白蓋惑於文王獲龍之妖而欲以水德厭之是東海巡遊之餘誕也安在其能享帝漢建五廟於渭陽郊見五帝神氣若人冠冕尚赤火光燭天蓋惑於新垣平望氣之詐而欲以火德王之是宣室受釐之陋習也安在其能事天武德之分郊分配似矣而五行六天其說何盈庭耶乾封之祈榖祀天似矣而上帝五帝其禮可錯舉耶卜禘先事於類宫魯行之矣乃天寶之後先朝大清宫而後享廟享天並不卜日稽何日也卜郊受命於祖廟周記之矣乃天聖以來先舉南郊禮而後告景靈宫謂之宫謝遵何說也凡此皆為不經勿論已其間英君誼辟與夫儒臣碩輔講求異同之故而考證分合之典者不啻備也大都漢唐主合而宋主分其間合而復分者如建武采元始中故事合祀雒陽復命營北郊是也分而復合者泰始中定郊祀北郊後復親祀南郊方澤不别立是也逮至元祐紹聖間集百官議禮卒亦未聞有確然定見可以上契制作之精夫帝王之事天地也昭格遲遲陟降不違至於視無形而聽無聲於是為之崇報薦享者其精神素與對越也而後世討論不過儀文度數之間趨蹌將事之節亦何以潛通重𤣥而仰答靈貺哉其大者既未足以通神明之德則分祀合祀並配特配亦文具焉耳洪惟我太祖高皇帝受命之初首命陶安考正祀典酌諸古訓斷自聖𠂻始制為分祀之禮建圜丘於鍾山之陽建方丘於鍾山之陰以冬至祀天夏至祀地而奉仁祖配焉後因雨暘未若洪休衍應於是感父母之義剛柔之配卒定為合祀之禮一祀於奉天殿再祀於大祀殿舉以歲首卜以上辛而仍奉仁祖配焉宸慮淵微所以凝孚沖漠之精獨觀典禮之奥化裁變通而靈承祇順契周公之制作於數千載之上而立聖子神孫千萬世之極者至章章也列聖相承肅將無替成祖合祀則以太祖特配仁宗合祀則以二祖並配百六十餘年未之存改豈非以睿謨𤣥逺所當世守而不可易者乎至我世宗肅皇帝稽古定禮從國初之制南為圓丘祀天於冬至北為方澤祀地於夏至配以太祖特崇隆報至孟夏又有祈穀之祀季秋又有大享之典歲凡四舉大抵皆周公之舊也後復行祈榖大享於大内而圜方二祀中世以後多弗親行肆我皇上誕膺𤣥祐光纘洪圖淵𠂻所達天地為昭矣邇者肇舉禋祀大典輔臣因進祀禮圖考首敘分合沿革之由壇壝陳設之畧次立儀註樂章之繁繪之圖畫繕寫成册所以議復合祭之舊兼隆並配之典者蔚乎詳已愚竊謂制作如周公議禮制度如我高皇帝至神極聖萬世莫能加焉國朝郊祀分合總考吳元年建圜丘於鍾山之陽以冬至祀昊天上帝建方丘於鍾山之陰以夏至祀皇地祗於洪武元年二月壬寅太祖敕禮官翰林太常曰昔聖帝明王嚴於祭祀内致誠敬外致儀文朕膺天命首崇祀事顧草創之初典禮未備何以交神明致靈則其博考郊禮來聞丞相善長學士安太常卿惟庸等議上請祀天圜丘以大明夜明星辰太歲諸神從祀地方丘以嶽鎮海瀆諸神從祀上從之撰二丘樂章二年奉仁祖配天地位西向時中都亦有南北丘五年著令皇帝郊祀太子留宫居守親王戎服七年上以大祀獻終分獻未安諭學士詹同宋濓議請初獻奠玉帛將已分獻官即初獻亞獻終獻亦如之上曰善祀於奉天殿親製祝文八年奏上所撰樂章大祀登壇脫舄禮九年定郊社之禮雖有三年䘮不廢十年春上感齊居陰雨覽京房災異之說始定合祀禮上更撰樂章八月作大祀殿於南郊未成十一月丁亥合祀於奉天殿十二年正月合祀於大祀殿昊天上帝后土皇地祗南向仁祖配位如故從祀丹墀四壇曰大明曰夜明曰星辰又曰星辰内壝外二十四壇曰五嶽壇五曰五鎮壇五曰四海壇四曰四瀆壇四曰風雲雷雨曰山川曰太歲曰天下神祗曰歴代帝王各壇一凡二十四壇大臣分獻禮成上大喜作大祀文并歌九章其辭曰朕聞太極之化也天生於子地闢於丑位極既定虚其中而為寰宇是時人生於寅樂居兩間人生既多非聖莫馭天生君主為民立命然鴻荒之時莫知誰始今載於書始自伏羲相繼而至唐虞以及夏商周斯數君者開天立極首興彞倫者乃前伏羲神農黄帝是也法三皇而守行者少昊顓頊高辛唐虞其益損禮樂文飾其事者獨夏商周也下至秦漢以及宋元亦然嗚呼天惟自然而常者三綱五常是也昔聖人度人情而措彞倫特不逆其性務從其善未嘗有異此道而為人君者也每聞昔君欽若昊天莫敢有怠朕即位以來命儒臣徧考羣書自周以至宋元皆著祀典守而行之然當行祀之時惟宗廟頗合人情南北二郊以及社稷為五穀之神土主發生五穀用之以生而乃一圍之中各壇而祭是土穀不合於生生之意也行禮之時先社固宜而又先奠社配乃行稷神之禮此果合人情乎況朕自即位以來祀天享地奉宗廟社稷每當齋期必有風雨臨祭方斂每以為憂京房有云郊祭鬼神必天道雍和神乃答矣若有飄風驟雨是為未善於是自洪武十年更祀社稷於闕右去繁就簡一壇合祀以奉二神神乃我答人情懽悅後洪武十一年命三公率工部役梓人于京城之南創大祀殿合祀皇天后土是年冬十月三公奏告工成朕命禮部去前代之祭期歲止一祀朕度古人之祀南北郊彼以義起故曰南郊祭天以其陽生之月北郊祭地以其陰生之月殊不知至陽祭之於至陰之月至陰祭之於至陽之月於禮可疑且掃地而祭其來甚逺言祀天地尚質不尚華固執古不變至今天地之享與人大異朕以斯禮執古不變則人之享亦執古而不變乎若人執古則汙尊抔飲茹毛飲血巢居穴處今可行乎斯必不然因命太常卿每歲祭天地於首春三陽交泰之時遂於洪武十二年正月十有一日合祀天地前期致齋五日内二日以告仁祖三日正齋風和日暖及夜陞壇山川草木不揺江海息波輕雲縹緲於昊穹獨見太陰於中天纎塵不動銀燭舒光香煙裊繞斯必神祗臨降合祀宜也朕雖失學無文特述其事而歌咏之歌曰第一歌陳樂而奏金石絲竹之㑹陳兮必五音以諧同命舉枹拊鼓而撫琴兮加寶瑟及以笙鐘磬聲嘹喨而韻窮兮吹塤箎以管從度干羽而周旋兮文武之樂隆百辟奔走而供獻兮期上下以來通第二歌駕出天門遥瞻閶闔之開闢兮飛龍前導而翺翔蹁躚鶴舞鳯揚兮鑾輿冉冉而上方侍從景從周匝兮天香馥郁而旌幢張帝衣𤣥雲之衣兮綵霞赤霓而為裳稽首仰瞻遥迓兮耳聽金玉之鑑鏘常臨世而閱民兮蒙臻百福而海康第三歌駕升地户洪龎之户闢兮擁地祗之旌幢麒麟丹鳯之挾車兮角端前驅以騰驤衛䕶森嚴而凛凛兮於昭穆穆而皇皇稽首鞠躬而駕來兮惟恪勤以趨蹌為母之慈而為民兮合造化於乾陽予率百職以俟臨兮惟菲禮而願享第四歌七曜從駕天星不息而周章兮擁旌旄而運銀潢旛􅓚繚繞於太虚兮䕶從鑾輿而至下方惟五星日月照耀兮邇帝左右而龍斾傍引領以欣覩兮威威而衛帝行第五歌嶽鎮從駕覩旂旛之四繼兮列神威而倍張嶽鎮海瀆之㑹兮欽欣地祗之來降陪神迓聖而相從兮擁山鬼於幽篁飛蒼龍而倐然兮清塵導道而妖魅藏矯首以候來兮聖皇為民而錫康第六歌瞻天望聖民知天地之臨祭兮老幼相將而迎昊蒼日吉而時貞兮慶雲縹緲於天堂柴燎煙焰而福洽兮盡寰宇以芬芳民歌且舞而跳躍兮俯仰乾坤以荷聖皇第七歌兆民之福皇天后土之既臨兮享殽饈而美椒漿思陰陽之㑹合兮如臨已而穆穆洋洋躬竭𠂻以趨蹌兮周旋三獻而奉觴皇皇二聖之優游兮眷予牧民而為王惟天地之恩無極兮獨父母之育相當雖欲報之何以兮但法常經而頥臧第八歌鑾駕囘旋氣氤氲而馥郁兮樂聖駕之旋幢喜雲衢而耿冉兮天廓落而地洪龎因遥送而俯仰兮鑾輿降而達元黄慕神降上之盤桓兮於心􅂱􅂱而耿光願民之多福兮每以歲首而奠筐第九歌升降殽饈升沉燎瘞而幼化兮殽饈備納而供勤昌以之而祈穀兮民謳歌而福愈良想天門地户之茫茫兮欲假之來享而難望樂之既成兮必時若而雨暘迎神歌薰風蕩蕩兮解炎備朝神兮惟恐弗專夜沉沉兮星辰團圞皓月輝輝兮馳天頓首稽首兮遥瞻孰知后土兮何然昊天昊天鑒蒼生兮來筵迎神歌諸侯趨蹌兮肅齋列郊壇兮次第金石絲竹兮方攜皇兮彷彿兮鳯凰來儀俄冉冉兮慶雲飛恭遥瞻兮俯首低靖沉沉兮后土降臨時地祗兮欣喜吾民今歳兮樂雍熙臣率百職兮羅拜壇壝感恩兮無已惟父天兮母地二十一年増修壇壝大祀殿丹墀中疊石為臺東西相向為壇四内壝外二十壇亦東西相向文武大臣及近侍官一十四人分獻罷朝日夕月禜星之祭并罷太歲風雲雷雨嶽鎮海瀆山川月將城隍歴代帝王春秋祭惟歲八月中旬擇日於山川壇及帝王廟祭之建文元年撤仁祖配配太祖高皇帝文皇即位亦如之永樂八年後上巡北京命皇太子攝遣禮部尚書至北京復命十八年壇成上歲親祀南京郊壇有事則遣官祭告洪熙元年春奉文皇配位太祖下西向嘉靖九年上從言官夏言言欲分祀天地下廷議主分祭者左都御史王鋐中允廖道南編修程文德等八十二人主分祭而以成憲及時未可為言者大學士張璁等八十四人主分祭而以山川壇為方丘者尚書李瓚等二十六人主合祭而不以分祭為非者尚書方獻夫李勛詹事霍韜魏校編修徐階郎中李黙王導等二百六人無可否者英國公張崙等一百九十八人上曰分祀禮也遂作圜丘于天地壇南稍北為皇穹宇先名泰和殿作方丘於北郊稍南為皇祗室從祀圜丘日月星辰雲雨風雷方丘嶽鎮海瀆丘陵山川是年三月上從言議南北二郊奉太祖配孟春祈穀祀上帝於大祀殿奉文皇配下廷議羣臣以為不可疏留中言又疏請上怒羣臣違君叛禮令祈穀二祖並配二郊專奉太祖配已而罷祈榖之配毁大祀殿改建大享殿殿後為皇乾殿十七年薦大號於天改昊天上帝稱皇天上帝郊社丘澤辨祭法虞夏殷周皆以禘郊祖宗為四重祭周人禘嚳而郊稷祖文王而宗武王禘祭天地以嚳配即圓丘方澤是也郊祀上帝以后稷配建寅之月南郊祀感生帝以祈穀也四時配五天帝於四郊以迎氣也祖禘嚳以后稷配尊始祖之所出也宗祀文王於明堂以配上帝總配五天帝也其後則祖文王於明堂以配五帝凡此皆鄭氏義也故周禮大司樂註以圓丘方澤宗廟為三禘蓋天神地祗并始祖之所自出為三大祭皆五年之禘也郊次圓丘社次方澤宗次祖皆常歲所舉之祭也東遷地蹙財匱大禮遂廢所修惟郊社二祭故圓丘方澤二禘傳記亦罕言之非淺聞所及矣周禮有祀天旅上帝祀地旅四望之文天地主於一故稱祀上帝四望非一神故稱旅肅欲以圓丘為郊可乎司服王祀昊天上帝服大裘而冕祀五帝亦如之既曰亦如之則五帝之祀與昊天上帝非一祭矣肅欲混之可乎孝經稱嚴父配天又稱郊祀后稷以配天宗祀文王于明堂以配上帝易豫卦曰先王以作樂崇德殷薦之上帝以配祖考上帝亦天神也肅欲廢五天帝而以五人帝當之可乎崑崙者地之頂神州者地之中皆天地之所交也地祗主崑崙神州非是設此二祭乃求于二處天地神靈莫測不知神之在彼乎在此乎故求之于此也康成以方澤以主崑崙北郊主神州不見于經誤分為二王氏由此并崑崙神州為一祭而遂謂北郊為方澤可乎若鄭氏知樂九變為禘而不言及嚳又以為禘小于祫此則其失也故斷之曰鄭氏深而未完王肅明而實淺晉武帝肅外孫也故用其說并方圓二丘而郊南郊歴代無所因襲而周禮天神地祗人鬼極盛之祭遂為古今不决之疑矣其辨感生帝之說曰姜嫄履帝武敏歆而生后稷周人特為立廟而祭謂之閟宫五帝感生之祀上世流傳既久非緯書創為之說也且河圖洛書蓍策之數皆緯文也可盡廢乎其辨明甚又以社為祭地曰二社以享水土穀之神而配以勾龍非祭地也禮天子諸侯羣臣百姓大夫及庶民皆立社故有王社大社國社置社之名其義名高下不同如此而謂之大祗之祭可乎殷革夏周革殷皆屋其社是辱之也旱乾水溢則變置社稷是責之也王者父事天母事地而可責可辱乎周禮王祭社稷五祀則絺冕以社稷下同五祀而用第五等之服不得與先王先公四望山川比則社非祭地明矣傳曰戴皇天履后土是后土即地也周禮大祝大封先告后土大師旅大㑹同宜于社又建國先告后土則后土非社矣舜典類于上帝禋于六宗望于山川六宗者上下四方之神即五天帝及地也故其祀在上帝之次山川之前周禮四望與五帝同祀于郊又與祀地同玉又與山川同祭服則四望者祭地之四方也又有分樂所祭五土之祗祭地之禮不止于方澤矣而欲以社當之可乎周禮以圓丘方澤以天神對地祗以蒼璧禮天對黄琮禮地以祀天旅上帝對祀地旅四望禮記乃多以郊對社蓋郊祀上帝社祭水土之神其禮專圓丘方澤徧祭天神地祗其意分觀此為四祀明矣天地之道高深元逺大神大祗不可煩瀆故歲祀上帝于郊而水土之變則責之于社此古人立祀深意也蓋圓丘所祭者全體圓轉之天總南北極黄赤道日月星辰所麗者而言故主北辰而曰天神皆降是總祀天神也上帝者高高在上之天以其在上而為主宰故曰上帝分主五方故曰五帝合四方上下而言則曰六宗皆天神之分祀者也方澤所祭者全體承天地總山陵川澤極天所覆者而言故主崑崙而曰地祗所出是總祀地祗也地有四方望其方而祀曰四望五嶽四瀆之祀曰山川川澤山林丘陵墳衍原隰之祀曰五土水土之祀曰社皆地祗之分祀者也所謂自然之序蓋如此郊祀分合私議祭天地分合之義孰為是曰合為是合為是者非合天地而並祭也祭天而以地配之耳天尊地卑地特天中之一大物豈得與天並若天地分祭地可與天並矣或曰天地猶父母也焉得不並曰天地神理也父母人道也人道之與神理未可槩言然祀父而以母配之未聞特立一廟以祀母也觀古禮父衰與母衰不同其微意亦自可識禮曰燔柴於泰壇祭天也瘞埋於泰折祭地也其義何居曰此亦自合祭陳設言之祭雖並舉而儀各自不同耳燔瘞皆云泰是同一處也特有壇折之異要知祭時先燔而繼之以瘞但燔則於壇瘞則於折折在壇之偏非判然為二處也又觀埋少牢於泰昭時祭也則是古人祭祀之所皆相去不逺以一地而分南北以一地而制方圓曷為不可今泥於南北方圓之說而時亦從而分焉蓋後儒不詳考於周禮而妄以已意斷之也若必欲分方丘以祭地其享又何所配乎因祭天而以地配理之順也因祭地而配以天理則逆矣以天配則不敢以他配則不稱吾固曰合祀者是分祀者非也天陽也地陰也陽全陰半乾健也坤順也故曰坤順天而時行又曰乃順承天此可以定祀天享地之禮矣分祀之說吾太祖高皇帝聖諭足破其惑聖諭曰南郊祭天以其陽生之月北郊祭地以其陰生之月殊不知至陽祭之於至陰之月至陰祭之於至陽之月於禮可疑因命太常卿每歲祭天地於首春三陽交泰之時聖祖之見真天聰明之至者也郊社分合辨冬至祭天夏至祭地之說出于周禮然其為說自有異同其在大宗伯則曰以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師以血祭祭社稷五祀五嶽以貍沉祭山林川澤以疈辜祭四方百物以肆獻祼饗先王春祠夏禴秋嘗冬烝而吉禮終矣未嘗有祀地之文也冬官司裘掌為大裘以供王祀天之服司服掌王之吉服祀昊天上帝服大裘而冕亦無祀地之冕服至大司樂分樂以祭以享以祀然後云奏黃鍾歌大吕舞雲門以祀天神奏大簇歌應鍾舞咸池以祭地祗而未分二至至下文論樂之變迺云圜鍾為宫黄鍾為角大簇為徵姑洗為羽雷鼓雷鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣函鍾為宫大簇為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地祗皆出可得而禮矣至家宗人掌家祭祀之禮國有大故則令祈禱以冬至日致天神人鬼以夏至日致地祗物鬽以禬國之凶荒民之札䘮竊案周禮在大宗伯大享之禮則只言祀昊天上帝而無祭地之文夫祭地大典也豈得畧而不言在大司樂分樂始言天地神祗而未及二日及論樂之變而後有二至方圓丘之說意蓋謂分樂律以屬陰陽故于是日奏之始合樂也故曰若樂六變若樂八變則天神可降地祗可出然後天地可得而禮曰若曰可得疑而不敢必之詞也是合樂而非大享也在家宗人以二至日致人鬼物鬽則為祈禬而行非大享之禮明矣至漢時天子以二至御前殿㑹八能之士陳八音聽樂均度則猶大司樂之遺意今乃斷以二至日為分祀天地蓋未嘗詳考周官禮樂之文而輒以已意附㑹之耳雖使周禮行之然繼周而王者必有損益我太祖高皇帝定合祀之禮而明示二至之非聖諭極陰之月不宜祭天極陽之月不宜祭地此萬世不易之論也況冬至沍寒夏至溽暑露立于郊豈能終禮仲春卜吉而祭則寒暑無侵身心俱適升降不倦誠敬有終然後式禮莫愆天神可格矣當時耆儒汪克寛謂祭天必及地尊可以統卑也正如人子奉養饋食于父必及其母豈可分别哉此亦可證也郊社合祀議國之大在祀而祀之大在郊自古禮殘缺後儒穿鑿而五帝六天合祀之說迄無定論則以不深考于經折衷于聖以凖之也書曰肆類于上帝禋于六宗望于山川徧于羣神又曰柴望秩于山川又曰柴望大告武成曰類曰柴皆祀天之禮也然必及于六宗山川羣神而不及后土則郊必兼社之謂也易曰先王作樂崇德殷薦之上帝以配祖考又曰聖人烹以享上帝周禮以禋祀祀昊天上帝記曰郊社之禮所以事上帝也皆舉郊以見社也家語孔子曰天子卜郊則受命于祖廟而作龜于禰宫尊君親考之義也卜之日王親立于澤宫以聽誓命受教諫之義也既卜獻命庠門之内所以戒百官也言郊之必卜也而不及社兼社也此唐虞三代之制也儒者但見周禮有冬至祭圓丘夏至祭方澤之文遂主分祀之說不知周禮一歲之間祭天凡幾正月祈穀孟月大雩季秋明堂至日圜丘此外有四時之祭則固合祭者矣前期十日大宰帥執事而卜掌百官之誓戒大史與執事卜日戒大宗伯詔相王之大禮祭之日大宗伯奉玉大宰贊玉幣爵之事詩歌昊天有成命之章此其證也惟是周朔建子冬至圜丘適當獻歲不妨迎陽報天而後命及於地故其禮比合祭稍加崇重此惟行周之時則可耳乃其合祀之禮則未嘗廢散見諸經及孔子之言可據也使祭而必冬至也則何用卜之為故曰至敬不壇埽地而祭則又不必于圜丘方澤也以是而知周之未嘗不合祭也我太祖高皇帝初即位倣周禮圜丘方澤祀者數年但見氣序失軌年穀不登每臨齋戒風雨時作至洪武十年始悟分祀之非爰定合祀之典自是每臨祭祀景雲風和年歲豐登屢昭靈貺載在御製歌可考也迨世宗肅皇帝入繼大統肇建斯議過信大學士張璁等八十四人之言而不用尚書方獻夫等四百餘人之說遂使皇祖之深意不明而帝王之大禮幾墜天分地析天後地先天子以頻數之故歲不得一親行事祀既不專神無常享豐年常少凶年常多揆之天意豈逺人情且夫人君之于天地猶人子之于父母豈有終歲而不一見者按禮天子親耕帝后親蠶以供天地社稷宗廟之祀凡䘮三年不祭惟祭天地社稷越紼而行事高皇帝之更定而逺符於古帝王之制作孟春卜日合祀南郊每歲親行著為令甲蓋今日之第一議也然則今南北郊之制可廢歟曰何可廢也冬至迎氣之說可以兼而行也然則圜丘宜改作歟曰何必改作也太祖之合祀也即圜丘舊址為之禮所謂埽地不壇者是也然則郊之日必有神從祀歟曰禮郊之祭也大報天而主日配以月日月天之明也非必百神悉從祀也舜類上帝而後及于六宗山川百神非必一時盡舉也今南北郊之祭諸神各以類從朝日夕月之祭又行于春秋分至於社稷山川古今帝王賢聖諸神又各有祭天子或親行或遣官其禮去古未逺也斯亦可以無議也崇雩壇在圜丘之旁仲夏禱雨皇天之帝前四日太常官公服奏齋戒進銅人牌于文華殿前一日太常博士捧安于香帛亭内供奉陳設儀同祈榖去玉是夜三更太常寺卿奉安神御位上乗輿至昭亨門西降輿過門東乗輿至崇雩壇門西降輿導引官導上至帷幙内具祭服出導引官導至壇門内内贊對引導官上行典儀唱樂舞生就位執事官各司其事内贊對引官導上至拜位贊奏就位典儀唱迎帝神奏樂内贊奏陞壇導上至香案前奏跪奏搢圭奏上香訖出圭復位樂止奏四拜傳贊百官同典儀唱奠帛奏樂内贊奏陞壇導上至御案前奏搢圭上受帛奏獻帛訖奏出圭復位樂止典儀唱進俎奏樂内贊奏陞壇導上至俎匣前奏搢圭奏進俎奏出圭復位樂止典儀唱行初獻禮奏樂贊奏陞壇導上至御案前奏搢圭上受爵獻爵訖奏出圭奏讀祝位奏跪傳贊百官皆跪贊讀祝訖奏俯伏興平身傳贊百官同奏復位樂止典儀唱行亞獻禮終獻禮儀同初惟不讀祝樂止太常卿西向立唱賜福胙内贊奏詣飲福位導上飲福位光禄官捧福酒胙跪于上右内贊奏跪搢圭奏飲福酒訖奏受胙訖奏出圭俯伏興平身復位奏四拜傳贊百官同典儀唱徹饌奏樂樂止典儀唱送帝神奏樂奏四拜傳贊百官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各恭詣泰壇上退拜位之東典儀唱望燎奏樂捧祝帛饌官下壇内贊奏詣望燎位内贊對引官導上至燎所燎奏禮畢引官導上至帷幙易服出上囘至殿㕘拜樂章迎帝神中和於穆上帝愛處瑶宫咨爾黎庶覆憫曷窮旂幢戾止委蛇雲龍霖澤斯溥萬寶有終奠帛肅和神之格思奠兹文纁盛樂斯舉香氣氤氲精禋孔熯徹于紫㝠懇祈膏澤渥我嘉生進俎咸和百川委潤名山出雲愆暘孔熾膏澤斯屯祈年於天載牲於俎神之格思報以甘雨初獻夀和有嚴榮祀日吉辰良酌彼罍洗馨苾馥香元功溥濟時雨時暘惟神是聽綏以多穰亞獻景和皇皇禋祀孔惠孔明瞻仰來歆拜首欽承有醴惟醹有酒惟清雲韶侑獻肅雝和鳴聖靈有赫鑒享精誠終獻永和靈承無斁駿奔有容嘉玉以陳酌鬯以供禮三再稱誠一以從備物致志申薦彌恭神昭景貺佑我耕農徹饌凝和有赫旱暵民勞瘁斯于牲于醴載舞載禮詩成三獻敬徹不遲神之聽之雨我公私送帝神清和爰迪寅清昭事顯穹仰祈甘雨惠我三農既歆既格言歸太空式霑下土萬方其同望燎太和赤龍旋馭禮洽樂成燔柴既舉昭假精禋維帝降康雨施雲行登我黍稌溥受厥明嘉靖九年上欲於奉先殿丹陛行大雩禮夏言言大學士丘濬嘗欲於郊兆傍擇地為雩壇歲孟夏行雩祭禮上以孟春上辛祈穀于上帝自二月至於四月雨暘時若則大雩之祭可遣官攝如雨澤愆期上親禱焉高禖設木臺於震方皇城東永安門之北祭品上帝儀同祈穀皇考儀同高禖大羮一和羮二簠簋各二籩豆各六牛一羊一豕一帛用紅上拜位設于壇下北向后妃位七設于壇南數十丈外北向用帷待贊行禮行欽天監擇吉具奏前三日太常卿奏齋戒於宫中上吉皇后以下齋三日執事内外官齋一日前二日太常寺卿光禄卿奏省牲如儀昊天上帝正位皇考獻皇帝配位西向高禖設于壇下西向弓韣弓矢妃嬪之數祭品質明上祭服后禮服妃嬪各服其服上率后以下乗輅車至壇所降導駕官導上至拜位女官導后以下各至拜位内侍擁帷幢敞典儀唱執事官各司其事内贊奏就位上就位傳贊同后以下帷中就位典儀唱迎神内贊奏陞壇上陞至上帝前奏跪奏搢圭奏上香司香官捧香跪進于左上三上香訖奏出圭導至皇考前儀同分獻官詣高禖神位前上香訖退立于東奏復位奏四拜典儀唱奠帛内贊奏陞壇上陞至上帝前跪奏搢圭奏奠帛捧帛官以帛跪進于右上受帛訖導至皇考前儀同奏復位典儀唱行初獻禮亞終獻儀同太常卿進立于壇前向東立唱賜福胙内贊奏詣飲福位奏飲福酒上飲訖光禄寺卿捧福胙跪于左内贊奏受胙上受訖奏出圭俯伏興平身奏復位奏四拜平身傳贊同典儀唱徹饌唱送神内贊奏四拜平身傳贊同典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各詣燎位典儀唱望燎内贊奏詣望燎位上詣望燎位燎畢内贊奏禮畢分獻太常官俱退女官導皇后以下至高禖神位前贊跪皇后以下皆跪贊受弓矢女官跪詣神位取弓矢以次授皇后以下受訖納韣贊俯伏興再拜禮畢退執事捧禖神位帛饌詣燎所焚之上率后以下乗輅車還宫祈糓祀典歲驚蟄上行祈穀禮於南郊大饗殿祭皇天上帝前五日太常卿于皇極門奏請省牲駕詣犧牲所行禮畢囘至殿致辭㕘拜還宫前四日太常卿公服奏齋戒進銅人齋牌于文華殿前一日太常博士捧祝版于文華殿上填御名訖博士捧安于香帛亭厨役舁至神庫供奉三更初太常官請神主奉安陳設如儀祭品皇天上帝爵三大羮黍稷稻粱籩豆各十二玉帛犢一昧爽上帝服乘輿至内西天門外神樂觀二知觀叩頭起執提爐導至神路錦衣衛官跪奏落輦上降輿導引官導上至大次具祭服出導引官導上由左門入至陛下典儀唱樂舞生就位執事官各司其事内贊對引官導上至拜位内贊奏就位典儀唱迎帝奏樂内贊奏陞壇導上至香案前跪奏搢圭奏上香訖奏出圭復位樂止奏四拜傳贊百官同典儀唱獻玉帛奏樂内贊奏陞壇導上至御案前奏搢圭上受玉帛奏獻玉帛訖奏出圭復位樂止典儀唱進俎奏樂内贊奏陞壇導上至俎匣前奏搢圭奏進俎奏出圭復位樂止典儀唱行初獻禮奏樂内贊奏陞壇導上至御案前奏搢圭上受爵奏獻爵訖奏出圭奏詣讀祝位奏跪傳贊百官皆跪樂暫止贊讀祝訖樂復作奏俯伏興平身傳贊百官同奏復位樂止典儀唱行亞獻禮行終獻禮奏樂儀同初獻惟不讀祝樂止太常卿于殿西東立唱賜福胙内贊詣飲福位導上至飲福位光禄卿捧福酒胙跪進於上左内贊奏跪奏搢圭奏飲福酒訖奏受胙訖奏出圭俯伏興平身復位奏四拜傳贊百官同典儀唱徹饌奏樂樂止典儀唱送帝神奏樂奏四拜傳贊百官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各恭詣泰壇上退拜位之東典儀唱至燎奏樂捧祝捧帛饌官出殿門内贊奏詣望燎位内贊引導上至燎所燎半奏禮畢導引官導上至大次易祭服出樂止上囘至殿㕘拜祝文維曰候維啓蟄農事將舉爰以兹辰敬祈洪造謹率臣僚以玉帛犧牲粢盛庶品備斯明潔恭祀上帝于大享殿仰垂希鑒賜福烝民俾五糓以皆登普萬方之咸賴尚饗樂章迎神中和臣惟穹昊兮民物之初為民請命兮祀禮昭諸備筵率職兮祈洪庥臣衷微眇兮悃􅈤誠攄遥瞻駕降兮齋色輝歡迎鼓舞兮迓龍輿臣愧菲才兮后斯民願福斯民兮聖恩渠奠玉帛肅和烝民勤職兮農事專蠶工亦慎兮固桑阡玉帛祇奏兮暨豆籩仰祈大化兮錫㠯豐年進俎感和鼎烹兮氣馨香羞兮㫖􅌬帝垂享兮以歆烝民蒙福兮以寧初獻夀和禮嚴兮初獻行百職趨蹌兮珮琤鳴臣謹進兮玉觥帝心兮鑒歆歲豐亨亞獻景和二觴舉兮致䖍清醴斟兮奉前仰帝容兮忻穆臣感聖恩兮實拳拳終獻永和三獻兮一誠微禋禮告成兮帝鑒是依烝民沐德兮歲豐禨臣拜首兮竭誠祈徹饌凝和三獻週兮肅乃儀俎豆敬徹兮弗敢遲願留福兮丕而曰雨曰暘兮若時送帝神清和祀禮告備兮帝鑒彰精神上達兮感昊蒼雲程肅駕兮返帝鄉臣荷恩眷兮何以忘祥風瑞靄兮彌壇壝烝民率土兮悉獲豐康望燎太和遥覩兮天衢長邈彼寥廓兮去上方束帛薦火兮希升聞悃愊已通兮沛澤長樂終九奏兮神人已和臣同率土兮感荷恩光圖書編卷九十五
