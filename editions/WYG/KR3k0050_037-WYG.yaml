body:
  text: 圖書編卷三十七明章潢撰山東圖叙山東古青兖州地外引江淮内包遼海西面以臨中原而川陸則悉㑹于徳州濟南府屬自海道既廢遂以其西境為餽運通衢南盡邳徐俱南直隸州北泝天津嵗有河運河患築塞挑濬之勞舟車牽挽之役所在不免而兖州水潦為虐則民之疾苦莫甚焉矧京儲邊餉之外王禄是供六郡徵輸於斯為急而青青州濟濟南之間號多鑛賊禁戢猶難公私蓋交病之若遼陽遼東自為區域地本膏腴舊皆郡縣民用安土設衛以來生齒稍稀惟遷徙謫戍之人多歸焉雖漸規恢復可也登登州萊萊州本海運故道然勢險難圖成山沙門一帶多海磧運船至此輒壊稽之往磧則平度州萊州府屬東南有南北新河水源出髙宻縣至膠州分流為南北新河自膠州入新河西行二百四十里即至萊之滄海復入北海以其自膠抵萊故又名膠萊元時所濬以避迤東海道數千里之險者蓋嘗治閘故磧在迤北新河店海潮所通自此至海止八十里以達安東衛門在青州東南境則避闗津之險亦宜有可講者沿革古青兖二州地漢置青州部刺史領北海濟南瑯琊東萊五郡髙宻膠東淄川城陽四國又置兖州部刺史領東泰山濟隂平原清河渤海千乘七郡東平一國後漢刺史如故兖治昌邑青治臨淄唐置河南河北二道採訪處置使而河南治汴河北治魏以青兖諸郡分隸焉宋置京東東路京東西路河北東路三安撫司並以守臣兼領元以山東直隸省部置山東東西道宣慰司治益都又置山東東西道肅政亷訪司治濟南本朝置山東等處承宣布政使司都指揮使司按察司布按二司俱治濟南都司初治青州後亦遷治濟南云山東等處承宣布政使司治濟南左右布政使二左右㕘政二粮儲一分守一左右㕘議二分守二領府六屬州一十有五縣八十九總為里六千四百户七十七萬五百五十五口六百七十五萬九千六百七十五夏秋二税共米麥二百八十五萬一千一百一十九石絲二千一百一十一斤絹五萬四千九百九十疋綿花五萬二千四百四十九斤馬草三百八十一萬四千二百九十束山東都轉運鹽使司一在濟南領鹽課司十九膠萊七濵十二嵗額辨鹽一十四萬五千六百一十四引山東都指揮使司隸左軍都督府都指揮三内掌印一僉書二領衛一十有七屬所七十五守禦千户所一十有二本都司所屬除二班京操外馬歩官軍六萬三千八百餘員名儀衛司三提刑按察司按察使一副使十四清軍一曹濮一驛傳一大名一提學一青州一兵備臨清一巡海一徐州一覇州一宻雲一大倉一天津一遼海一僉事五分巡東兖一南武定一右一沂州一濟一海分道三濟南東兖海右欽差巡撫都御史一巡按御史一俱駐濟南王府三魯府髙十州郡十四封兖徳府英四南郡七封濟衡府憲六州郡十一封青濟南府其名渤海濟南衝繁詞訟動連諸郡難治其屬州四縣二十六附郭厯城九十八里繁衝疲外章丘百三里繁衝多富豪鄒平五十七里繁衝淄川八十里冗盗長山六十五里冗新城四十五里僻簡齊河二十七里繁衝齊東五十五里冗民沃悍濟陽五十八里繁頗衝禹城五十六里繁衝淳臨邑三十二里繁僻長青四十四里繁衝肥城三十二里衝好訟刁青城三十三里冗陵三十二里冗僻泰安州九十七里繁屬新泰二十八里簡萊蕪四十二里簡徳州三十四里繁衝疲滑屬徳平四十里繁衝平原四十六里冗地饒武定州一百十四里繁疲屬信陽一百一里僻簡海豐四十三里簡樂陵五十六里僻冗商河六十八里僻冗濱州七十八里繁屬利津四十簡近海霑化四十一里賦重民疲蒲臺六十九里賦重民疲繁其形勝慿負山海其俗尚織作士務功名兖州府其名古東魯北齊任城隋魯郡宋泰寧衝繁地荒糧欠好訟難治其屬州四縣二十三附郭滋陽六十八里繁衝疲外曲阜十六里僻疲寧陽三十五里頗衝差重蘭陵十里鄒二十九里俗澆繁衝泗水二十五里簡疲滕八十七里頗衝嶧四十五里民淳差重魚臺二十七里淳簡單五十二里河患刁繁武城二十三里黄河患簡曹州六十八里衝頗饒曹四十八里河患淳定陶十八里僻淳濟寧五十六里民貧差重屬嘉祥二十四里簡多盗鉅野三十五里簡刁鄆城二十二里淳僻東平州三十三里衝繁地薄屬汶上四十八里淳繁疲東阿二十四里淳繁貧平隂十九里簡陽榖三十九里僻繁差重夀張十五里頑刁盗沂州一百三十八里繁民疲郯城十八里僻頑疲費八十一里頑差重其形勝奄有龜蒙遂荒大東東瑯琊西鉅野北厥固南互鄉通徐泗控江淮其俗聖人之教化桑麻之業東昌府其名唐博平繁衝地饒多盗其屬州三縣十五附郭聊城二十二里衝疲外堂邑十七里僻簡博平十六里僻冗荏平三十六里衝繁民頑清平十六里僻繁莘十八里僻繁民頑冠二十七里淳簡僻臨清州三十五里衝繁淳侈屬丘二十八里僻頑館陶二十八里簡刁饒髙唐州三十九里衝繁民貧屬恩三十七里衝繁刁夏津三十一里貧衝繁武城二十一里貧簡濮州二十八里僻淳簡屬范十三里僻簡淳觀城十里僻簡頑朝城二十九里僻簡饒其形勝南接濟兖北連徳景其俗稼穡蠶織敦厚知禮青州府其名齊郡漢北海頑繁間有礦賊其屬州一縣十三附郭益都二百十六里繁衝疲外臨淄六十六里繁衝博興七十六里頑繁髙宛三十八里淳頑樂安九十九里頑繁夀光一百三十三里頑繁昌樂九十八里衝繁臨朐一百十四里衝繁疲安丘一百七十四里衝繁頑諸城一百八十里衝繁蒙隂五十里僻簡莒州二百七十里衝繁刁疲屬沂水一百四十三里衝繁日照一百八十三里僻繁其形勝瑯琊濁河海岱都㑹其俗務農崇學文物彬彬登州府其名後魏東牟地薄賦重民頑其屬州一縣七附郭蓬萊六十六里衝繁疲外黄五十里衝繁淳福山二十九里簡僻棲霞五十二里簡淳招逺五十四里簡僻萊陽一百四十一里繁疲寧海州八十四里繁疲屬文登七十四里簡其形勝髙山阻前距海環後其俗朴野獷直文章禮樂萊州府其名漢東萊地僻賦重民頑其屬州二縣五附郭掖八十三里地瘠民悍多盗平度州二百二十五里民貧賦重繁僻屬濰九十三里衝繁難民淳昌邑九十五里繁難膠州九十三里地瘠民悍多盗屬髙宻八十八里頗繁即墨八十五里冗僻其形勝羅山亘東濰水阻西神山距南渤海枕北土踈水闊山髙海深其俗朴魯少文遼東都司其名秦遼東遼東平金遼陽領衛二十五州二附郭衛定遼中定遼左定遼右定遼前定遼後東寧外衛海州蓋州復州金州東寧又東寧左東寧右東寧中義州廣寧左屯廣寧右屯廣寧中屯廣寧前屯廣寧後屯寧逺瀋陽中鐵嶺三萬遼海州則樂安州領新附夷人自在州所十一闗二堡一百其形勢負山阻河控制東土其俗淳習文禮箕子之化遼東從山海闗一線之路内通自為區域蓋其地本膏腴舊皆郡縣民用樂土自設衛以來生齒稍稀止以處遷徙謫戍歸順之人耳欲為重鎮之訏謨要在撫牧之有道曾有民富庶而兵倉不足者哉山東承宣布政使司領府六曰濟南臨淄齊州徳興軍濟南路有徳府軍衛繁衝曰兖州東魯任城魯郡泰寧龍慶府有魯府儀衛衝繁曰東興南冀州博州博平郡繁衝曰青州齊郡北海郡平魯鎮海軍益都路新建王府添設兵備頑繁曰登州東牟郡牟州近海備倭都司地薄賦重民繁曰萊州東萊光州定海軍近海地僻賦重民頑處置山東齊魯舊域海岱奥區濟兖東患在役重其民頑輕於流移青萊登患在賦煩其民悍敢於武斷濟南雖稱沃壤而武濱霑蒲一帶即古廣斥之地一望白茅兖州水路之衝且宗藩河工勞費不貲至於沂費郯滕則荒落甚矣東昌青州差有可觀登萊地本瘠鹵舟車未通雖值富嵗猶多逋負大率濟青依山多礦盗萊登瀕海多鹽徒臨淄之間多奸俠單曹之境多妖民保釐大臣實心撫綏輯寧之外又不可不鋭意於防練矣馭豪猾山東古來多豪傑士然大盗亦時有焉蓋其人往往善騎射習弓矢頗與趙魏燕薊之人争雄長此其人亦不馴擾矣第昔稱御得其道則狙詐可使否則舟艦蕭墻之中可虞也故撫釐藩翰牧宰之臣貴在慎考相哉墾隙地山東青登萊三府隙地甚多皆可耕之所人事不修溝澮不立一雨成漫而旱則赤地千里雖古河額俱堙塞沃壤無所用可惜也元虞集之議至今可行䟽通水道山東水道㑹通受派於黄河支流合泉於汶泗滛澇久而魚臺曹單之防必潰衛河漲而館陶清源之害孔殷環二郡千里之間成奔突四出之勢且大清之入海肇平隂而㑹諸清小清之入海自趵突而沿諸漯特其河流久塞故道悉湮決鄒長清滸之泊漫浮苑博滙麻姑諸水之衝漸圮齊城斯時也得其人而䟽築之防其所害而導其所歸一經畫之間而水之危者安矣昔先儒謂禹之治水只從低處下手下面之水既殺則上面之水必洩又謂禹不惜數百里之地而䟽之為九河以殺其勢是即所謂行其所無事也今會通清河遡源九曲皆神禹平成䟽鑿遺矩者而乃鯨波漲天墊溺奚禦龜拆遍野焚暵曷援得毋治農者所當豫其䇿乎蓋不必别有所謂輸運因其性之本下順其勢之必趨功求其必濟利求其必興兖郡之屬㑹通之上流也黄河之怒濤震撼而非人力可遏若灉沮雷夏之䟽而漸殺其威焉可也濟東之屬㑹通之下流也衛之湍溢迅發而非人謀可加循故河枯河之址而益捍其决焉可也小清之淤既所當濬則全漯之水必不能容也分其半而俾隄之髙且固焉則孝婦岔烏之諸河有所受而為地中之行有所洩而無旁潰之患矣齊東之城既在必移雖分漯之水亦無所妨也導其流而俾溝之深且廣焉則由柳塘陳愷而下直抵于大清而無有滯隔㑹歸于大海而無有泛濫矣夫明于支派而達自然之宜㕘于舊址而察已然之故時于濬築而豫未然之防凡可以審其勢者罔不周矣如是則旱澇無虞居食胥頼也議墾田畆夫土黑墳田中下賦貞作十有三載乃同者非兖州耶土白墳海濱廣斥田上下賦中上者非青州耶周公封魯太公封齊大都用助貢法田固未嘗不墾也齊世中衰管仲相桓公創覇而其書曰積於不涸之倉藏於不竭之府府與倉即五榖桑麻六畜田亦未嘗不墾也逮夫近世而地有遺利民窳不耕者何也説者謂東兖瀕河沮洳鹻薄之患往往如是而青萊三郡濱大海潟鹵倍之田卒汙萊天之荒也非人之咎也國朝令甲凡山東空閒地聴民開種永不起科其便民計至熟也嘉靖間當事之臣嘗一議墾矣世廟俞允特令使者行部核其事嵗報若干殿最諸長吏立法至嚴也民投墾者官給牛種復二年越三年始税其撫循意至厚也然而二十餘年汙萊如故嵗終覈報竟屬虚文者則有故焉夫沃田必不荒而荒者必瘠也沃則事半而功倍瘠則事倍而功半以事之倍企功之半費至鉅也即寛其二年之租寧足償乎勞費未償徴歛隨至里胥索逋而富室責劵譁無已時矣語曰天下攘攘皆為利往天下熈熈皆為利來今未睹墾荒之利而輒罹其害民甘之乎邇者令丈地乃魚鱗踏丈首以清額報者山東也乘丈地之後而行墾荒之政其勢甚易顧百姓懼於輸租如嘉靖故事則雖募流民占種鮮有應者近當事諮得其故又即一二已試之效而建為之議凡額外荒地聴民開墾每畆嵗輸榖三升永不科賦䟽入得俞㫖不數月間土著流寓之民咸詣有司投牒受田肩摩而袵接矣夫嘉靖寛賦於二年之後而地荒如故今輸榖於初墾之年而民樂從則民情可想也復民二年三年則税之是紓死於昏而遲之旦也所謂利一害倍而民齟齬不從也輸榖三升税永蠲矣挈千金與人而不責其直民不懽乎所謂利興而害亡而不從者十無一也率是著為令愚切以為計之便議防盗賊山東盗巢必稱梁山即前代巨冦宋江盤據之處雖大瀦已成平陸而周環八百里之内猶多遺風平時習技藝重游俠自為黨與以相侵制至死不改按古史稱蚩尤葬夀張豈其有以致之乎安平鎮即張秋乃東阿陽榖夀張三縣交地四民輻輳不止萬家三十七年陽榖灾異流言日傳人心恟恟臨清兵備道於張秋選集市民七百餘丁編為行伍教以武藝至今各精兵地方幸以寧戢前撫按謂張秋宜北援神鎮例增捕盗通判一員以彈壓之增以弓快附以市丁即隠然虎豹在山之勢矣議處登萊登萊一方不過數百里地瘠鹵禾苗少熟而淄清綰轂其口榖有餘不能出給他郡以轉資不足不能求糴他郡祗以自給故小熟則驟饒小凶則坐困無間嵗之積者乃其恒也山東總論夫古今之勢不同强弱之形亦異今之山東視古東泰拓地無慮數千里長城巨防穆陵無棣昔之所謂闗隘者今皆為甸服矣然而潢池少警望風瓦解雖有險固莫之或支豈形勢之在今者果不足恃耶蓋嘗考之春秋戰國之時承太公修政之餘繼以桓公主威定覇民頼休息行伍充盈故齊地不下七十餘城而臨淄一邑帶甲已至二十餘萬蘇秦所謂連袵成帷揮汗成雨者是已國勢如之何其弗强哉楚漢之際齊猶稱覇自王莽之亂山東盗起青徐首難既而黄巾煽禍海岱騷然民塗兵革重以石勒慕容超之殺戮金元之末亂齊地荒凉削弱泊焉不振固其宜也國家承平百餘年休養生息濟南東兖頗稱殷庶而登萊二郡沂濟以南土曠人稀一望尚多荒凉萬一有如正徳年間流賊之警豈非有國家者之深慮哉昔人有言土地軀幹也人民精魂也精魂完而後軀幹固此地利所以不如人和也雖然談形勢者必稱要害山東要害之地凡五臨清南北之咽喉也武定燕薊之門庭也曹濮魯衛之藩蔽也沂州徐淮之鎖鑰也登萊邊衛海東之保鄣也守咽喉則齊右安固門庭則渤海靖謹藩蔽則河東固嚴鎖鑰則南顧無憂慎保障則倭奴殄患五要守而山東可安枕也山川險絶又烏足道哉河南圖叙河南古豫州地閫閾中夏四方輳進蓋彰徳則控河北今北直隸是嵩洛以蔽山南今陜西南境是南陽汝寧直走襄黄襄陽黄州俱湖廣屬府之郊而開封則其都㑹也由開封以泝衛河可以漕山東沿汴泗可以漕淮故言形勝者次闗陜焉然分建宗親班禄無藝以今計之嵗賦幾至百萬民亦勞矣且歸睢陳州三州俱開封府屬一帶地兼數省統轄非一姦人常藉以首難剿捕則潰逸四出禍延他境彰徳道出趙魏之間軍民左右屬盗雖歛蹟而牽制之患實與歸徳同若考七郡之地山水環互民物茂實則汝寧為優鑄山獵野依慿險固强弓利弩出乎其間則河洛河南為著然土地未闢教令未馴非課農宣化加意拊循則冦盗刼奪之禍嵗不免矣沿革古豫州地漢置豫州刺史察舉潁川河南等郡而不常所治東漢置司隸校尉治洛陽而别置豫州於譙郡唐於此置河南道開元中置都畿河南河北三道採訪處置使而都畿道治東都河南道治陳留河北道治漢郡宋都於汴置京東西二路安撫使以開封河南守臣兼領元於此置河南江北等處行中書省河南江北道肅政亷訪司本朝置河南等處承宣布政使司都指揮使司提刑按察司並治于開封云河南等處承宣布政使司治開封左右布政使二左右㕘政三左右㕘議三京師管糧一領府八屬州一十二縣九十有七總為里三千八百八十里半户五十八萬九千二百九十六口五百一十萬六千一百七十夏秋二税共米麥二百四十一萬四千四百七十七石内除起運外止該存留麥米并棗子棗株米共八十六萬八千八百六石有零每嵗禄米該用粟麥一百四萬六千二百有零除王府并合省文武官吏師生旗校官軍俸糧六十九萬三千餘石不計外絲三十五萬三千六百四十三兩絹九千九百五十九疋綿花三百四十二觔馬草二百二十八萬八千七百五十四束衛河提舉司一河南都指揮使司隸中軍都督府都指揮三内掌印一僉書二領衛一十有四屬所四十九守禦千户所七本都司所屬除二班京操外馬歩官軍一萬五千九百餘員名備用馬疋數具在直隸軍馬項下儀衛司八提刑按察司按察使一副使六僉事七分道四大梁汝南河南河北欽差巡撫都御史一巡按御史一或清軍一俱駐開封王府八周府髙五原封杭州改開封䕶衛二郡王五十四唐府髙二十三封南陽禄五千石有䕶衛郡王一十四伊府髙二十五封河南一千石䕶衛一郡王七趙府成三封彰徳郡王十二鄭府仁二封鳯翔改懐慶郡王九崇府英六封汝寧郡王三徽府英九封鈞州今除郡王十六汝府憲十封衛輝今絶潞府穆二開封府其名古大梁漢陳留元汴梁繁劇其屬州六縣三十附郭祥符一百七十五里繁衝外陳留四十八里僻繁杞一百二十二里繁冗通許二十四里太康三十五里僻冗尉氏二十五里僻衝洧川二十八里簡鄢陵十九里僻簡扶溝十九里中牟三十七里冗陽武五十一里僻繁原武二十一里僻簡封丘四十三里僻冗延津二十七里衝兄蘭陽三十八里簡僻儀封二十一里陳州二十六里僻冗屬商水十四里簡西華二十六里僻簡項城十七里僻簡沈丘十五里僻簡許州四十八里衝繁屬臨潁二十二里衝繁襄城三十二里繁衝偃城二十五里衝繁長葛三十五里僻簡鈞州七十六里衝繁屬新鄭二十八里衝宻二十七里僻簡鄭州三十六里繁屬滎陽十五里頗繁滎澤十六里河隂十一里簡僻汜水十四里裁其形勝天下要衝水陸都㑹岡阜繚轉龍盤虎伏其俗人禀中和俊髦儒雅勤耕紝有忠義習淳尚質歸徳府其名古商丘亳邑漢睢陽簡其屬州一縣八附郭商丘二十七里外寧陵七里僻簡其形勝同上其俗有先王之遺風重厚多君子彰徳府其名漢晉魏郡唐鄴郡繁其屬