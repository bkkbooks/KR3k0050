咽日逐姦利滛靡之塲民窮而風流隨以蕩矣洛陽生有言地雖小而田舍廬廡之數曾無所芻牧以為富庶不知牽牛而蹊人之田蹊則有罪矣人亦可憫也古者地有一易再易嵗更畨而食今盡不易之地矣然且力盡求地不已曰地利之無養也有是哉故無尺地非養是以不得養豫人率媮惰不知經始一力作則見以為苦楚遇大祲有束手枵腹而已矣豫之南有召信臣之溉北有西門豹史起鄴下之溉中有孫叔敖汝墳之溉後有創起者未可更僕數天澤何常不流在人瀦畜之耳一雨則潰出四溢汒乎靡所收拾曾不踰旬又復延頸而跂之天天固如是家給人足哉毋論中土即達天下安往不嵗值凶荒哉然匪自今矣戰國時七雄列侯並驟而起争自淬礪整頓以日夜冀己土宇之辟加於他國己人民恨不厝之袵席上休噢呵呴之摩其足如保赤子不相流離魏王移民移粟河内河東之間財殫力疲既而卒無以加故自侈之曰盡心焉耳矣盡己之心盡民之力而不能盡天之道長孺謁者河内失火屋比延燒以為是不足煩天子之使河内水旱千餘里父子相食萬餘家不相保矯詔發倉以賑困窮民用存活水旱饑饉之災周之末漢之季被之矣民窮盗起自古為然矧乎地大物衆有不為盗賊藪者乎北枕燕趙馳驅鳴鏑而行者未始無也山東故多盗吳楚兵連故皆窺伺我睢陽潁宛界多間諜不止楚人呰窳而媮生豫未必裕也秦之强六國時苦魏久矣晉之富河坂之險又日夜東出而飲我河上試編豫人户有不半為秦晉賈者乎下大行而南牧羊腸道介然用之成路巧者有餘拙者不足地重難動摇勇於任俠怯於赴公故曰多刼人者大國之風也豫亦有之漢時潁川郡故多盗黄覇聰明强識吏民不敢欺姦人以去盗賊入他境而潁治武帝時南陽盗有梅免白政大或剽城邑宥罪罟窘辱郡縣守尉趣具食饗士卒自是繡衣直指使始王庭史自廣平守河内河内故多豪猾俠廷史為方畧具私馬傳爰書多論報不三日而達長安至今其風猶在晉太康汲郡人不凖掘得魏襄王塜出銅劍一枚竹史十車漆書文科斗多剥落尋命中書監荀朂令和嶠詮次為十五部八十七巻自是汲塜書始出而傳者以為美談是盗之掘也有自矣戕人之親暴寒人之骸骼至不可收拾和氣傷而災祲為沴者未必非是也時務利病五季及宋都汴梁汴梁宅中南北衝道水陸後世議都者舍金陵其庶幾乎其地平曠無險三代前封建諸侯則王畿無恃故不可都春秋以後葵丘之㑹踐土之盟敗師于邲于鄢陵及劉項畫界鴻溝已各留意夫重屯之勢利於用武又得扼控屏蔽以制於外是誠勝地如固燕薊固絳澤則漳徳衛輝無北憂固山南則嵩洛無西憂固襄黄則南汝無南憂固臨濟則歸陳無東憂由是而運於四方漕貢朝㑹之便永無所滯執事之言曰陜洛西隣秦晉多深山絶巘嵩盧新澠之間礦徒動輒呼聚而葉裕内鄉亦時發焉是願聞治礦之策也愚則曰礦徒固良民也其初首事者二三角腦而已矣山川之寳有以歆其見利之心接引之徒有以便其往來之跡前此有犯者夫既或治之矣何害之敢生即有生焉鄰里有互察之令村落嚴禁爐之條河梁絶津渡之黨則勢将自阻散其徒而詰其首一告諭之間渙然離耳此不必有意督過之也執事之言曰歸徳南連鳯潁北接蕭碭徐沛巨盗乘間為梗而光羅鄧州亦時有焉是願聞弭盗之方也愚則曰盗賊亦吾民也其間怙惡者幾處積窩之家而已矣持刀劍忘牛犢之思脅貨財充衣食之業前此有屢犯者夫既或殱之矣何事之足虞即有虞焉鄉邑修保甲之法閭里重藏匿之科官司謹詰捕之實則其風自消擒真犯而戒株連一展布之間帖然定耳此不必用意深治之也雖然此道其常耳非所以語於義之精也齊其末焉非所以語於治之本也明問所及而豈徒哉無恒産而無恒心者凡民之夙習也饑寒切於肌膚慈母且不能保其子者人情之大凡河南地居中土供應多方徵輸百出年豐無終嵗之飽時平無一日之安驅迫如此之甚欲其不為礦且盗不可得也古之君子不有裕民止盗者乎夫國額不可减也而額外之徵如商税魚課陂塘水堰民兵買馬日支紙劄火耗車牛之費獨不可量為未减乎嵗例不可缺也而例外之徭如河夫稍草堡夫火夫青衣甲首之類獨不可量為節省乎寛一分受一分之賜則民安一分之心孔子曰茍子之不欲雖賞之不竊周官曰以公㓕私民其允懐如得其道則礦徒可得消也盗賊可得弭也不然迫之愈至生之愈窮治之愈深犯之愈衆豈特河南之民能為礦且盗乎所可憂者尚多也執事曰大河西來自砥柱析城王屋東過孟津入開封之境地平土䟽蕩囓為災嵗費埽捲以萬計民膏竭矣河患依然誠哉是言也夫知其非計而猶為之智者不為也請以己試之明驗質之可乎漢時河决内黄河决金隄河决酸棗河决黎陽屢决屢塞殆無虚嵗東漢以後棄不復築而河之帖然安流者垂數百年治與不治之效盖彰彰矣今之治河者以一丸之土遏漲天之流以踈柳之條禆排雲之岸農功有盡巨浪無窮不幾㸃雪於洪爐乎或者曰然則廢埽捲與曰何可廢也相其勢而順導之則其所省者嵗當不下數千亦何憚而不為乎執事曰宗室生齒日繁即如周府宗禄原額止四萬有竒而嵗給當三十三萬加徵則勢不行設處則謀無措奏計則又不得請誠哉是言也夫知其困迫而不為之所仁者不為也請以己窮之事勢論之可乎今時一府為郡王者六十焉為将軍者以千焉為中尉者郡縣君者數千焉其財愈匱其生愈繁數年以後且将盈萬勢方窮蹙自當變通識與不識之人皆知之矣今之當事者明例有嚴既不敢議坐需其迫又為不可袖手旁觀掩目長嘆不幾刻劍於行舟乎或者曰然則變條例與曰何敢變也酌其宜而取裁之則其所省者嵗當不下萬金亦何憚而不為乎雖然相勢以治河而相之之實策将安出酌宜以制禄而酌之之方義又何居明問所及而豈徒哉達節而不拘者上智之事也善世而博化者聖人之𢎞也河南嵗苦治河而民之脂膏已竭人苦宗禄而時之經營無良畜縮如此之甚欲必循常調不可得也古之君子不有更化善治者乎夫河薄城市量與埽捲而大瀦之野廣漢之墟去城遥逺原無民居縱有衝蕩害亦未甚聴其自流可也柳稍大户報擾紛紜而儀封以下考城以西沿隄官柳百里成林嵗伐餘條還充官用柳性耐折無傷本根量為取之亦可也如此則所省豈止倍蓰哉此則可省而人不能省也例闗大體或難更改而縣主以下止給冠服儀賓䟽逺許賜衣巾其俸資不可省乎法有厲禁或碍施行而王官冗秩盡革副員中尉各宗聴從生理其廪餼不可汰乎如此則所省豈止千萬哉此則可行而今未之行也法窮則變惟變然後可通法通則久惟久然後相守易曰益之損之與時宜之記曰協諸義而恊則禮雖先王未之有可以義起也善用則治河之䇿未嘗無也制禄之糧未嘗乏也不然裹足而計程膠柱而調瑟豈特河南之民迫於河患與宗禄乎其所可慮者尚多也斯四者皆救時之急務善治之宏綱也議田賦河南之田賦在國初時當民力饒裕未嘗患其不均也今合八郡而統論之則彼此大懸絶矣故重者計畆踰斗而輕者畆不踰升以不踰升者而較之踰斗者其相去蓋十倍此或謀始者之未審與而豪右之兼併姦宄之隠漏又多有之民如之何而不病也故議者亟欲均之夫均之誠是也然以人情觀之則可行于一邑不可行于一郡而一省則尤難矣况又制額誠不可變也而救弊之術可得而議者有數端焉一曰殊正派謂實徵折布之類以糧之重輕定數之多寡也二曰均兑軍謂汝南二郡之税均輸水次與諸郡等也三曰别糧價謂重糧得輕價輕糧得重價也四曰酌嵗辨謂非常之雜供嵗不常有令糧重者常得脱也五曰覈徭役謂移其糧重者之徭而加諸糧之輕者或十之二三可也之五者跡似循仍而意實釐正百姓亦隂受其惠矣且又無丈量之煩而表公平之體奚為而不可也圖書編巻三十七
