body:
  text: 圖書編卷一百二十一明章潢撰馬政總敘陣馬之勇勢比風檣甚言馬之有益於國也但馬政自周而下其弊漸極周則官民通牧其牧諸民者不過取諸丘甸使供其賦未始為民累焉漢之牧苑分布西北二邊乃牧于官也而牧于民者令其有車騎馬一疋者復卒三人閒居則免三人之算有事則當三人之卒唐初當給馬者官與直市之周歳不任戰者許鬻而以錢交市後以所得隋與突厥馬置監于隴右官自牧焉是漢唐之制猶為近古至宋始市之于邊者曰茶馬賦之于民者曰户馬保馬盖賦牧地于農民歛其租課散國馬于編户責其孳息自此法一行天下不勝其弊矣我國家内地則民牧以給京師之用外地則官牧以給邊方之用又立茶馬司以易蕃戎之馬盖兼用之制焉今官牧者豪强兼併而草場為之消沒官司占役而恩軍為之缺乏招易之法自金牌之制廢給畨之茶偽所得多駑下故今日邊方不得夫馬之用軄此故也然未害其民焉至于民牧是即宋新法之遺緒但宋之户馬乃散官馬于民今則民自買馬宋乃賦牧地與民今則民自以地所出養之宋保甲養馬自願者聽今則計丁養馬不問其願否也宋免其科賦徵役非一端也而又郡邑加設以官里社别立羣長所以遺民害者視宋益甚矣况生必報數死必責償一馬之斃未償而一馬又斃飼養俵觧之費皆無虚嵗㸃視印烙之費亦無虛歳且所養者非所俵所俵者非所養是徒一虚名無益之政而遺生民傾家之害甚無謂焉為今之計莫若増廣官牧清理牧地查補恩軍㕘酌古今冝馬之地如隴右金城平凉天水之類設置監署盡取民間種馬分布廐閑攅槽飼秣悉徵諸處養馬丁田之直以為圉人養馬之費而以所牧盛衰為賞罰黜陟之興如此庶官得馬用民亦免其害矣不然但令民間輸直買馬俵解不必責其種馬庶免賠償飼養㸃視印烙之費則亦官民兩便其利何如哉馬政考周書司馬掌邦政蔡沉曰軍政莫緊于馬故以司馬名官周人因井田而制軍賦四井為邑四邑為丘十六井也有馬一匹四丘為甸甸六十四井也有戎馬四匹兵車一乗一同百里提封萬井定出賦六千四百井戎馬四百匹一封三百十六里提封十萬井定出賦六萬四千井戎馬四千匹天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹詩􅅠風定之方中美衛文公也卒章曰秉心塞淵騋牝三千周禮馬質掌質馬平其價馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈綱惡馬凡受馬于有司者書其齒毛與其價馬死則旬之内更旬之外入馬耳以其物更其外否馬及行則以任齊其行若有馬訟則聽之禁原蠶者一年不許兩次養蠶校人掌王馬之政辯六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物凡頒良馬而養乗之乗馬四匹曰乗一師四圉三乗為皁皁一趣馬三皁為繫繫一馭夫六繫為廐廐一僕夫六廐成校校有左右駑馬三良馬之數天子有十二閑馬六種邦國六閑馬四種家四閑馬二種凡馬特牡馬居四之一春祀馬祖執駒夏祭先牧頒馬攻特攻特為其蹄齧秋祭官社臧僕臧僕為善馭者冬祭馬歩獻馬馬歩神之害馬者講馭夫趣馬掌賛正良馬而齊其飲食簡其六節掌駕説之頒辨四時之居治以聽馭夫巫馬掌養疾馬而乗治之相醫而藥攻馬疾受財于校人牧師掌牧地皆有厲禁而頒之孟春焚牧陳除生新草仲春通淫掌其政令廋人掌十有二閑之政教以阜馬佚特教駣三歳曰駣攻駒二嵗曰駒及祭馬祖祭閑之先牧及執駒散馬耳圉馬正校人員選馬八尺以上為龍七尺以上為騋六尺為馬圉師掌教圉人養馬春除蓐釁廐始牧夏庌馬冬獻馬吳起曰夫馬必安其處所適其水草節其饑飽冬則温廐夏則㣲凉廡刻剔毛鬛謹烙四下戢其耳目無令驚駭習其馳逐閑其進止人馬相親然後可使車騎之具鞍勒銜轡必令完堅凡馬不傷于末必傷于始不傷于饑必傷于飽日暮道逺必數上下寧勞于人慎無勞馬常令有餘備敵覆我能明此者横行天下秦之先有非子居汧渭好馬及畜善養息之周孝王召使主馬于汧渭之間馬大蕃息孝王分土為附庸邑之秦林駉曰漢初稍復古制勸民養馬有一匹者復卒三人盖居閑則免三人之算有事則當三人之卒此内郡之制也至于邊塞則縱民畜牧而官不禁烏氏居塞則致馬數千羣橋姚居塞則致馬千匹于時内郡之盛則衆庶有馬阡陌成羣邊郡之盛則三十六苑景帝分置西北武帝初年單于入塞見馬布野而無人牧者征伐四夷武帝而馬徃來食長安者數萬匹既數出師馬大耗乏乃行一切之令自封君以下至三百石吏以次出馬則内郡庶民之有馬者欲望復卒難矣又令民得畜邊者從官假牝馬而歸期息什一則邊郡之欲畜牧者難矣又匿馬者有罪有以匿馬而腰斬者有以民或匿馬馬不具而長安令㡬坐死者故内郡不足則籍民馬以補車騎邊郡不足則發酒泉橐駝負出玉門闗輪臺之悔始修馬令此漢牧于民而用于官之制也林駉曰唐府兵之制當給馬者官與其直市之每匹錢二萬五千刺史折衝果毅嵗周不任戰者鬻之以錢更市不足則府供之此給錢以市也至府兵漸壞兵窮難致乃給以監牧之馬此給馬以用也大抵唐之馬政皆給于官民無與焉始唐繼周隋亂離之後承天下征伐之餘鳩括殘馬僅得牝牡二千匹于赤澤徙于隴右始命太僕張萬歳葺其政肇自貞觀訖于麟德四十年間至七十萬餘匹于時天下以一縑易一馬秦漢之盛未始聞也垂拱以後馬耗太半開元始命王毛仲為内外閑廐使牧養有法雲錦成羣此唐牧馬于官而給于民之制也唐林駉曰宋朝馬政畜於監牧者曰官馬散于編户者曰户馬市于邊郡者曰戎馬宋李覺言于太宗曰今所市戎馬直之少者匹不下二千往來資給賜予復在數外是貴市於外夷而賤棄于中國非理之得者也宜减市馬之半直賜為我利亦濟用之良䇿也按古今馬政漢人牧于民而用于官唐人牧于官而給于民至宋始則牧之在官後則畜之于民又其後則市之于戎狄我朝兼用前代之制在内地則散于民即宋户馬之令也在邊地則牧于官即唐監牧之制也于川陜有茶馬之設非宋人之市于夷者乎以今日國馬之政言之在内者有御馬監掌天子十二閑之政以供乘輿之用凡立仗而駕輅者皆于是而畜之其牧放之地則有鄭村等草塲其飼䬴之卒則有驕驤等四衛國初都金陵設太僕于滁州後定都于北又設太僕寺于京師凡兩淮及江南馬政則屬於南順天等府暨山東河南馬政則屬于北其後又用言者每府州縣添設佐貳官一員専管馬政在外設行太僕寺於山西陜西遼東凡三處苑馬司亦三處陜西甘肅各轄六苑為二十四苑遼東僅一監二苑内地則民牧以給京師之用外地則官牧以給邊方之用又于川陜立茶馬司五以茶易畨戎之馬亦用以為邊也本朝國馬之制大畧如此承平百年祖宗之良法善政故得也乞命本兵大臣講求故事以濟今日之所不及遣知馬政者勘實牧地其有舊有而為人所侵欺埋沒者咸復其舊或有山林原隰可開墾以為牧地者開墾之或附近州縣有空閒地可以増置監苑者増置之士卒有迯亡者則為之勾補廐廡有未備者則為之修葺所畜之馬若牡多而牝少則為之添牝孽生之牝其種有不良則為之求良游牝去特必順其時騰放調養各有其法表散闗渙咸定其規皆一一講求如此則邊圉得馬之用也雖然昔人有言帝王之師以萬全取勝中國之所以取勝於外國者以人不以馬以智不以力以守不以戰或者若謂馬者兵之大用兵非馬决不能制勝吁此論戰兵非所以論兵之守也所謂守者我静而彼動我逸而彼勞我大而彼小我衆而彼寡用我所長捨我所短以制之則彼進不得戰而退可以囘自然屈服於我矣馬政總論昔周盛時因井田以制軍賦井邑丘甸出戎馬四匹積而至於畿方千里則天子馬四萬諸侯邦國大夫采地由此其數可考已四時有祭祭各有義春馬祖言天駟也夏先牧言始飼者秋馬社言始乗者冬馬歩懼為災也校人廋人圉師圉牧趣馬巫馬皆所以攻熟閑習以調其性而蕃其生也由此其故可考已栢翳諧鳥獸之情而畜馬息故帝堯氏之以嬴得世其官非子牧汧渭之間而大有功故周孝王邑之以秦不廢其業漢初自天子不能具純駟傳至武帝冨庶阡陌成羣及匈奴入塞征伐四出衛青擊匈奴李廣利擊大宛其後乃發酒泉槖駝負食出玉門輪臺之詔始令郡國二千石各上畜馬方畧馬一匹復卒三人貞觀時張萬嵗總領羣牧鳩括殘騎徙之隴右至麟德垂四十年而疋縑可易自是而毛仲牧之雲錦成羣突厥欵塞長興時范延光奏陳方患官馬太多靡費國力至清泰曽㡬何年即令牝牡但勝衣甲並行印記後唐之業日以不振夫畜牧繁而邦家實内治寧而外攘舉不然銳志四夷者乃罷中國之人勤心逺畧者多忽目前之虞馬政所係豈其㣲㢤惟皇祖革故鼎新削平僭亂首命劉惟謙申明馬政嚴督所司盡心芻牧務底蕃息有不如令者罪之今内之天子十二閑外之南北太僕直𨽻河南山東所轄之地或計丁稅而使之牧或進餉而備用或㸃驗而俵散其陜西山西遼東甘肅四川或設苑監而牧之于官或以茶縑而市之於夷皆酌古用中而為裕用禦侮之道者也然法久則弊滋時極則政更夫官散馬於編氓計力度􅀈立之羣長歳課所出之駒生則籍記死則償直分日而飼需次而輸間或駑駘末品不適於用轉徙流易必足其數未俵則愛之如子既俵則置之若棄民之牧之若秦人為越人牧羊然給軍騎操官出芻秣豪家私門假以驅馳瘠損羸弱坐視其斃况望其亭亭蕃且孶㢤深春牧放及秋乃歸今假是以削其芻秣名存實亡則軍士重為馬困也縱嚴捕亡之禁將何禆㢤議者謂營軍騎操故有苑監今半以湮沒冝亟為清理復古行之九闗豐曠之野官備芻飼列廐大鑽攢槽合食羣長時為之添牝求良教駣攻駒將領以葺其政士卒為之分直仍敇憲臣董其事以待亷視嚴班政之數重侵冐之禁一卒一騎用則駕鞍閒則休息人與馬而俱利者也雖欲私其用不可得也牧之民者其害也甚矣内郡有司莫若約其丁稅所出而歸之于官官為之擇地立羣長以牧之則責其専職而久其成功欲馬之無蕃不可得也逺郡水旱則牧變縁納以貯大盈或每歳銀馬中少此固人情所樂從者官與民而益者也否則視宋之保馬為甚保馬則憂諸役今諸役猶在也民何以堪邊地苑監可耕則屯不可耕則水旱草軟申其厲禁廣其掌息塞上有警自足以取用為防禦而况茶馬鹽馬又所以備重振而充監牧法至宻矣徃孝廟採納廷議専設風憲衆臣督理馬政而一時馬富國强敵人不敢南顧而侵軼邇年邊臣每每告乏戎部時為之給直分市此其故何㢤昔僕臣世其業今皆為養望遷秩之地其與栢翳非子之職逺矣夫利不償十則不可以除害㡬不蚤辨則不可以圗大物不素具則不可以應卒治不更始則不可以樂成詩曰秉心塞淵騋牝三千又曰思無疆思馬斯臧夫僖文馬云庶矣而詩人歌詠其美則本於心其知道乎太僕監苑總敘洪武初設十四監後廢而牧馬歸于民户當是時十四監廢而天下尚有苑馬苑馬自永樂四年始其後北京遼東山西陜西甘肅並置苑馬令諸苑猶頗存惟北京苑馬獨廢牧馬亦歸于民户太僕寺所領馬户如南京之制然當時所謂北京苑馬六監者正冀北之地今之牧馬草塲猶是其故地也故與洪武十四監並存其名而諸苑馬若茶馬司故馬之大務而南太僕寺俵馬必歸于北諸行寺事體皆同然乏馬皆仰給于内大司馬以邊重無不與者其職之相聨如此夫大司馬都天下馬政宜知其制獨稱監苑者重牧地也北京苑馬寺六監二十四苑永樂四年設十六年廢遼東苑馬寺六監二十四苑永樂四年設今存一監二苑甘肅苑馬寺六監二十四苑永樂年間設後廢省入陜西陜西苑馬寺六監二十四苑永樂四年設今存二監六苑正統三年并甘肅苑馬司入為四監凡苑視其地里廣狹為上中下三等上苑牧馬萬匹中苑七千匹下苑四千匹各苑皆有圉長一圉長率五十夫毎夫牧馬十匹京營少卿歳春秋巡馬迤邊自宣府歴薊州古北口東抵山海闗遼陽之境後不復行今奏少卿新領勅如舊制行邊云予昔保安安置猶見少卿來也不知廢自何時邊馬乏督府移文大司馬大司馬奏下太僕太僕度地便近集諸馬以調發寺典籍無存惟存調馬㸃馬圖調馬圖者寄牧郡縣也㸃馬圗皆卿所渉邊塞也太僕庫藏説太僕寺掌馬政而庫藏特為寺之大務故有易銀變馬草塲餘地之租凡賄之入皆以馬也馬不足則令市之民常以地宜與年之豐㓙而權之而貨賄之出入上其計于司馬如勞軍繕城府營之製造咸取給于寺而大司農乏亦時假諸寺若御馬監邊屯馬不足來告寺輙與之或與馬或賄與馬一也故寺之積特饒焉而其出亦倍夫苑馬之政不舉則邊馬不足太僕不領内廐則内馬有限故予于秦漢官制每有感焉漢母將隆言武庫兵器天下公用國家武備繕治造化皆度大司農錢大司農錢自乗輿不以給共養勞賜一出少府盖不以本藏給末用不以民力供浮費别公私存正路也太僕寺専為國馬其入又非大司農比若為他給及貸用非挈瓶之守矣繫軍國大計故特書焉余考祖宗時不置司庫盖時寺顓主馬而積金少也𢎞治初始置官吏豈非金溢于前耶金日羡而馬羸矣議者又言金便如是不已㡬無馬矣夫謂積金以市百萬之騎可立致則内帑之金猶外廐之馬也是不然往者嘗捐金以購馬當時猶謂擾民而不可行一旦倉卒括民間馬可得耶如倉庾無積谷而黄金珠玉不可食也冀北之馬稱天下今歳俵馬往往市之他郡所謂外廐者果安在㢤而邊兵之求索無厭㳙㳙不足以盈尾閭之洩是不可不為之長慮也國朝茶馬考河州茶馬司在榆林衛治東南洮州茶馬司在固原衛西西寧茶馬司在西寧衛西近畨黄河南有洪河二州北有西寧皆漢郡唐末䧟于吐蕃宋為夏元昊所據洪武初洮州河州西寧各設茶馬司二年一遣齎金牌信符招畨糾驗納馬洮州火把藏思等族牌六納馬二千五十匹河州必里衛二州七站西畨二十九族牌二十一納馬七千七百五匹西寧曲先阿端罕東安定四衛包哇申藏等族牌一十六納馬三千五十匹每匹上馬給茶一百二十斤中馬七十斤下馬五十斥後茶馬不行時入侵擾成化十九年西畨潘松等族反巡撫都御史馬文昇調兵征𠞰斬首八十三級嘉靖元年西畨反鎮守都督鄭卿領兵討之不克以後每嵗入境殺虜嘉靖八年西畨數至鞏昌冦掠殺軍焚盧舍隴右之民深被其毒總制尚書王瓊破若籠板爾二族撫定宋舍等七十族西畨始寧丘文莊公云自唐以來中國馬不足往往與西北互市然多費財用而實無益於國宋南渡以後失中原宜馬之地而所資以為戰騎者求於西南夷盖有不得已焉今世全得中原之地凡西北髙寒之所冝馬之地皆為吾所有茍制置得宜牧養有道典掌得人又何患無馬乎患無其人耳宋李覺言于太宗其說亦如此然今馬常患不壯以無善種當必取之戎夷而楊文襄公乃謂得西寧洮河等衛茶易畨馬以之給軍騎操周濟邊用以之作種則土風異宜孳牧多損余恐不然唐初得突厥馬而開元之馬以突厥種而益壯陜之風氣與畨近豈有不宜者若丘公之論施於中國馬盛之時則不可易矣夫馬必有種世稱青海驄馬日行千里盖有得於波斯馬種云保馬説擐堅執銳騎不如歩逐利追鋒歩不如騎山林積石經川丘阜車騎二不當一平原廣野曼衍相屬歩兵十不當一古人有是較矣然歩易集騎難集歩易養騎難養人盡兵也故歩易集騎非廣字而素畜之百金不可得一故難集一夫所食終歳數鍾故歩易養一馬所秣十車不能載也故馬難養然今所與戰者北敵也敵恃馬力我不可不用騎所與戰之平原也敵便馳突又不可不用騎是故馬宜保也夫國家注意馬政久矣日孳牧日解俵日給兊日補買而馬日不足者飼秣之實不盡耗失之科不明地産之宜不辨生養之原不開也一兵授馬舉家乗之甚至有供迎送者矣芻菽之不備水飲之不時不稽之矣甚至無芻菽而給之金曰兵自易也金入兵手孰不妄用有傾囊易芻菽者乎徵調之不時馳驟之不法不稽之矣甚至暗伏之所無芻菽而分之商賈曰與商賈自為交予也商賈析利秋毫兵見小利有不私他貨者乎凡皆芻秣之實不盡也家市之馬失者不深罪官市之馬失者不深罪闗兊之馬失者又不深罪是不明馬所從來也從戰六七歳失者又不深罪三四歳失者又不深罪一二歳者又不深罪是不明馬所服役也瘟疫斃者駟尼喘汗斃者馳疾癬疥斃者櫪穢羸瘠斃者失䬴一皆不之問也至若從征有期或行役半道稱馬斃者奸人戕之以避戰陣歸伍全身不重傷稱馬斃者懦將棄之以餌敵又皆不之問焉是不明馬所困踣也凡此皆耗失之科不明也北種閑馳實正人之所將時屬勢家中産畏霜雪闗南之所觧多給絶塞又中産逢冬不厚其䬴遇雨不惜其險蹄距損傷痾病且作死者相繼伍為之空凡此皆地産之宜不便也西北馬鄉也有買補無資養東南風氣弱也有給養復有字息出盗藉乗于敵也厲禁以禁之通貢遺我以利也戮使以絶之凡此皆生養之源不開也欲盡䬴芻之實在以肥瘠課將校欲明耗失之科在以倍償懲行伍欲辨地産之宜在以逺近科給配欲開生息之源在以稅糧為保馬也是數者立法行之至易獨保馬之法宋人以為擾民今時衆咻旁指不敢主議者也愚則曰國有至計民有至神政有大機時有大順引而伸之一轉移之間耳夫塞下田不少也自軍隨身官屯種之外皆有租於上者也州縣曰稅糧衛所曰地畆糧數亦廣矣然不過禄藩府廪兵而已夫禄藩府廪兵所需者金與粟也金至易得粟次之不與馬班也今中州之費可以裁而得金者何限又邊塞不通舟楫稔而和糴得粟何限移所得之金以禄藩府出所糴之粟以廪兵不必取足于租也而合郡縣之稅糧衛所之地畆糧行保馬之法斯定馬矣嚴其科十石保一馬可也寛其力二十石保一馬亦可也其嚴其寛視租為較而復准種馬之例以一資養之實自春徂夏為芻菽若干自秋徂冬為芻菽若干兵民可自收授也又准驛馬之例以一資補之直從征歳久者民全科歳淺者民半科有故夫者兵全科兵民宜均任其責也然則官養不費官直不損可自足馬矣僉軍丁之義勇以代歩兵之雜役出雜役之歩兵而配之馬所謂不他求而歩騎咸足也歩以乗塞扼要伏之堡為衝虛騎以據塞追襲絶之後為邀擊無不可也養馬説竊惟古之馬唯養於官而其養之於民者官初無所與司馬法甸出長轂牛馬及所謂萬乗千乗百乗此皆寓兵於農有事則賦調而官不與知也惟其養於官者如周禮校人牧圉之屬與月令所載其養之之法備盡此則官之所自養也夫周之時既養馬矣而民之馬官府不與是以民各自以其力養己之馬而無所不盡其心故有事徵發而車與馬無不辨也漢之苑馬即校人之王馬而民間私牧官無所與而皆得以自孳息故街巷有馬而橋姚以致馬千匹逮武帝北伐馬少而始有假母歸息之令亦兵興一切之制非久用也秦漢以來唐馬最盛皆天子所自置監牧其擾不及於民而馬之盛如我國家苑馬之設即其遺意然又於兩京畿河南山東編户養馬乃又兼宋人保甲之法盖不獨養於官而又養於民也今監牧之馬未見蕃息民間牧養又日以耗且以今畿郡之養馬言之天馬既繋於官而民以為非民之所有官既委於民而官以為非官之所專馬烏得而不弊自其立法之初已知其弊必至於今日也且天下有治人無治法茍能如其舊而得人以求實効亦未嘗不可以藉其用也今保馬既不可變而於其間又不能守其舊往往數為紛更循其末流而不究其本始愈弊必至於不可復為而後已此今日天下之事皆然而非獨馬政也嘗考洪武初制今有司提調孳牧江南十一户共養馬一匹江北五户共養馬一匹以丁多之家為馬頭専養一馬餘令津貼以備倒失買補每二歳納駒一匹又立羣頭羣長設官鑄印與守令分民而治有牧馬草塲又免其糧草之半每加優䘏使有司能責實而行之常使民得養之利則馬亦何憂於不蕃也今頋不能修其舊而徒以法之弊而亟變之則天下安得有善法夫令民養馬國家之意本欲得馬而已而有所謂本色折色何為也責民以養馬而又責其輸銀如此則取其銀可矣而又何以馬為於是民不以養馬為意而以輸銀為急矣牧地本與民養馬也而徵其子粒又有加増子粒如此則遂併之田稅可矣而又何以責之馬户於是民不以養馬為意而以輸子粒為急矣養馬者課其駒可也不用其駒而使之買俵於是民不以養馬為意而以買俵為急矣夫折色之議本因江南應天太平等處非産馬之地變而通之雖易銀可也遂移之於河北今又變賣種馬而徵其草料原今變者之意専欲責民之輸銀而非責民之養馬也官既無事於養馬而獨規目前之利民復恣意為姦偽而各為利己之圖有駒不報而工於欺隠不肯以駒備用而獨願以銀買俵至或戕其孕字絶其游牝上下交征利以相欺而已衛文秉心塞淵致騋牝之三千魯僖以思無邪致馬之斯徂夫官民一於為利以相欺何望於馬之蕃息乎今之議者又方日出新意以變賣馬之半為未盡因欲盡賣種馬而惟以折色徵觧畧不思祖宗立法之深意可為太息也夫河北之人驍健良馬冀之所産昔人所以謂此地王不得無以王覇不得無以覇者也今舉冀之良産盡棄之一旦國家有事西邊之馬可得以為畿内用乎古語曰變而不如前易而多所敗者亦不可不復也今欲講明馬政必盡復洪武永樂之舊江南折色可也畿輔河南山東之折色不可也草塲之舊額可清也子粒不可徵也官吏之侵漁可黜可懲而管馬羣長獸醫不可省也行馬復之令使民得寛其力民知養馬之利則雖官馬亦以為己馬矣又修金牌之制通闗互市益得好馬别賦之民以為種馬而有司加督視之洪武永樂之舊猶可復也盖修茶馬而渥洼之産至矣弛草地而埛牧之息繁矣䘏編户恣芻牧而烏倮橋姚之富臻矣故曰車騎天下之武備也其所以壯神京防後患者豈淺淺哉抑古之相衛邢洺皆有馬監即皆今之畿輔地也如使盡覈官民所耕佃牧馬草塲盡出之與夫羣不墾者皆立􅳕堆以為監牧之地而盡歸於苑馬宋人户馬保馬之法雖罷之可也何必規規然沿其末流而日事紛更乎馬政緫說國初官馬養於各苑馬寺各監苑而已永樂初始以官茶易和等處馬養之民間謂之茶馬正統末京師有警乃選取以備軍資養於順天府及近京屬縣謂寄馬騎操馬及京師寄養之馬不復散去至今遂為故事每歳孳養賠補之法悉與各處茶馬無異養馬之家雖云量免糧差而賠補受累尤深地方民力疲斃此其大畧也南北馬舊例養馬在順天府所屬論地派養此外别無别科種馬在應天府所屬論丁派種此外更無别役如有倒失雖赦不蠲此祖宗制也頃者有司玩慢漫不檢覈或地歸豪右而養馬累于細民或丁多逃移而種馬至于漸耗馬政之廢實由於此宜令順天府屬覈地應天府屬覈種有地亡而馬存者即以其馬責之佃主其種昔有而今亡者俟秋成之日以漸買補則數年之後馬可蕃息矣圖書編卷一百二十一
