body:
  text: 圖書編卷十四明章潢撰學論語叙論語二十篇雜記聖門師弟子問答語何博哉談聖學者有云一貫爾己似無以博為也然孔子嘗欲無言因賜疑何述乃曰天何言哉四時行焉百物生焉是聲臭俱無而時行物生此天之所以於穆不已也不厭不倦而無行不與此孔子所以無隱也與言終日而無言不悦此囘之所以如愚也如此則知隨其問仁問知問政問孝而語之孰非因材而篤之意哉茍不能于並育並行窺其敦化川流之藴而止求一於於穆之㣲其何以識天何以識孔子也噫時刻皆天行也纎物皆天生也一作止語黙皆聖徳之著也雖謂論語二十篇一以貫之可矣合二十篇而蔽以一言曰學而時習之亦可矣若夫發憤竭才下學上達則存乎其人子罕第九子張第十九不與齊魯語同鄉黨第十堯曰第二十程子曰論語之書成於有子曾子之門故其書獨二子以子稱程子曰讀論語有讀了全無事者有讀了後其中得一兩句喜者有讀了後知好之者有讀了後直有不知手之舞之足之蹈之者程子曰今人不㑹讀書如讀論語未讀時是此等人讀了後又只是此等人便是不曾讀程子曰頥自十七八讀論語當時已曉文義之美愈久但覺意味深長嘗讀魯論而求吾孔氏之所以為學者矣蓋夫孔氏之教其徒也一則曰仁二則曰仁當時學者之學於孔氏也一則曰求仁二則曰求仁是故立而立人達而達人者語其體一克己復禮主敬行恕参前而倚衡者語其方也博學審問慎思明辯篤行者語其功也一貫者語其約也天下歸仁者語其大也擇善者擇乎此也固執者固執乎此也造次於是顛沛於是者語其不息乎此也曾子之一日三省志乎此而省也子路之樂與物共志乎此而共也顔子之無伐善施勞志乎此而無伐施也嗚呼聖門之相授受者如此然則聖人之學其至易而至簡者果在是耶抑不在是耶故夫子嘗曰仁逺乎哉我欲仁斯仁至矣又曰茍志於仁矣無惡也今之為聖人者其果求諸聖人矣乎孔子以一人纘緒干聖立極萬世豈有他術哉惟其學焉而已矣一則曰我學不厭一則曰下學上達而且以好學自許也所以論語二十篇首揭學而時習一語以開萬世作聖之䝉而學之一字得非孔門之至要者哉試由論語以求孔子蓋自十五以至七十從心不踰矩雖以仰鑽瞻忽之囘尚欲從末由而究其所以惟發憤忘食樂以忘憂不知老之將至於以滿其志學之分量云耳然其學也果多學而識之歟一以貫之仁而已矣即大學所謂明明徳親民止至善是也今之頌大成贊天縱者咸謂其祖述憲章上律下襲問官問禮好古敏求夫子焉不學也孰知孔子不以忠信自足不以生知自居惟躬行未得以自歉徳不修學不講以為憂毎云我未能焉何有於我所以亹亹然終日不食終夜不寢而不敢不勉惟時習此學焉已矣古今之勤學孰有如孔子者哉然己欲立而立人己欲達而達人老者安朋友信少者懐乃其仁愛天下之心也終身汲汲皇皇欲滿其志學之分量者滿此欲立欲達老安少懐之心也使得邦家而理之朞月而可三年有成綏來動和之化可以計歲月而責成效矣奈何鳯鳥不至河圖不出天下莫我知也雖問津轍環若求亡子於道路而畏於匡要於宋絶糧於陳蔡至叔孫毁於朝微生譏其佞而楚狂接輿且有鳯衰之嘆矣斯時也若可以已也猶然南子可以見陽貸可與言公山弗擾與佛肸召可以徃此其心豈徒以至堅至白者在我欲自試於磨湼而不為匏𤓰繫焉者哉鳥獸不可與同群吾非斯人之徒與而誰與故仕以行義欲以有道易無道者自不容己也知其不可而為之雖晨門亦諒其心矣但仁愛天下之心固無窮也然衛靈齊景季桓子一有不合明日遂行仕止久速則惟其時而已矣所以用行舍藏我無所與疏食水飲樂在其中凡陋巷之囘舞雩之㸃皆可與共此學也故在陳之歎惟屬於吾黨之小子觀其進互鄉戒闕黨孺悲有教無類孰非仁愛斯人之心乎雖然孔子果因道既不行然後有四教之陳四科之設乎蓋諸賢相從未嘗一日離也車不停驂固欲行義以達道而聨屬天下之英才以大明此學啟憤發悱實未嘗一日廢是以誾誾侃侃樂於洙泗之濵不特四勿一貫各得其心學之傳也隨羣弟子問仁問孝問政莫不因才造就而被之以時雨之化此其立達之心雖不能盡遂而心學一脉亦賴諸賢以傳之於無窮文未喪天道不墜地萬世其永賴矣可見堯舜禹湯文武以是學而作之君臯陶益稷伊傅周召以是學而作之相孔子以是學而作之師而春秋以下凡為君為相者得其學則治失其學則亂孔子以匹夫而師萬世者非學而何哉要之仁一也學在斯教即在于斯也夫子不可及固猶天不可階而升然四時行百物生莫非天也天雖不言而即時與物以觀天斯可以黙識其於穆不已之藴學不厭教不倦夫子一天也夫子雖不可及而即學與教以求夫子亦可以黙識其與天並運之心後人特患無作聖之志耳有能一日用其力于仁矣乎我未見力不足者况魯論所記載其無行不與循循善誘具在也否則人人讀此論語程子謂讀了後又只是此等人便是不曾讀反觀寧無愧哉論語大㫖問子謂學習為論語二十篇要㫖信然矣謂學不盡于一字之訓釋何歟曰讀論語且不必證他經書即二十篇中反覆紬繹亦見非一字可訓何也學之為言效也皆是也未足以盡其義也孔子自十五志學觀其終身進步而立不惑知天命耳順不踰矩何一而非學哉未易窺也然曰汝以予為多學而識與予一以貫之學識貴乎約矣多聞擇善多見而識亦未嘗不博也吾嘗終日不食終夜不寢以思無益固為之不厭矣君子有九思學而不思則罔亦未嘗不思也行有餘力則以學文若不專于行矣文莫猶人躬行未得謂不重夫行也可乎天何言哉予欲無言言若可廢矣有徳者必有言吾與囘言終日謂不重夫言也可乎好仁好知好信好直剛勇茍不好學則有蔽矣使徳之不修徒曰學之不講是吾憂也可乎學詩學禮學易學韶咸有益于得矣使博學于文不能約之以禮欲其弗畔于道也得乎君子病無能焉固天縱之將聖又多能矣何為又云君子多乎哉不多也生而知之者上也蓋有不知而作我無是矣何為又云吾有知乎哉無知也黙而識之下學上達謂學非覺也可乎敏事慎言就正有道即以好學許之恐不専在于覺矣好古敏求見賢思齊謂學非效也可乎囘也不遷怒不貳過則以好學許之恐不専事夫效矣故子貢曰夫子焉不學而亦何嘗師之有是學也果可以一字一義訓釋之否耶是故欲學孔子之學必真知孔子之大學而後可或曰夫子之學信大學矣學者即欲學孔子之學多見其不知量也噫後學各因其資之所近才力之所及于以自成其學可也若願學孔子欲執一廢百反曰孔子不可學謂之叛孔非歟問聖學必有宗也觀諸賢皆問仁果聖門必以求仁為宗乎曰玩其篇章次第首云學習即次以孝弟為仁之本又次以巧言令色鮮仁則謂仁為聖門學脉此亦可徵况真知為仁之本在孝弟鮮仁之害在巧言令色而仁亦過半矣問聖門髙弟無踰顔子固夫子獨以克復傳之其餘諸子不過各以資之所近者語之耳後學為仁安敢遽希克復之乾道乎曰仁一而已矣聖門如顔淵仲弓司馬牛樊遲子貢子張皆問仁而夫子教之謂非因人而施不可也後儒遂因各賢之造詣疑聖教有偏全小大之殊使果有偏全小大之殊則仁亦參差不齊矣如克己復禮信乎全而大也非顔子不能也出門如見大賔使民如承大祭己所不欲勿施於人時時處處是此一㸃如見如祭勿施之心尚與克復者異乎顔淵仲弓信能請事斯語牛也疑訒言不足以盡仁視囘雍霄壤矣向使因訒言一語而能以三隅反則非禮勿視勿聽勿動者不已涵畜於訒言之中乎樊遲三問夫子三答之如以其言而已矣則將以何者為終身之依㨿也然在居處則為恭在執事則為敬在與人則為忠非即愛人之仁乎夷狄不可棄非即先難後獲之功乎謂諸子領畧聖教各有不齊則可謂聖人教諸子有偏全大小則不可以語仁矣仁人也人而不仁不可以為人也何近儒談萬物一體之仁者不假修證色色具在徵之聖門祗見其不足據也是故將以仁為難歟一日克己復禮天下歸仁有能一日用力于仁未見力不足者將以為易歟何為罕言仁而謂若聖與仁則吾豈敢將以為近也仁以為己任不亦重乎死而後已不亦逺乎將以為逺也仁逺乎哉我欲仁斯仁至矣茍志于仁無惡也將以為人心之固有而不待求歟君子無終食之違造次顛沛必于是雖之夷狄不可棄也將以為求之方寸而足歟凡視聽言動居處執事與人交以及出門使民能行五者于天下皆是也將謂取足於己而已乎君子以友輔仁事其大夫之賢者友其士之仁者皆仁之資也將謂其必藉于人乎當仁不讓於師己欲立而立人己欲達而達人己所不欲勿施於人為人由己而由人乎哉將謂如伯夷叔齊欲仁即得仁乎然諸賢如由求赤雍與憲之克伐怨欲不行者何為皆未知其仁將謂此心潔淨即是仁體如微箕比干同一仁乎令尹子文陳文子止得稱為忠清皆未知焉得仁也且三月不違囘之外無聞焉其餘日月至焉已矣而堂堂乎張也且難與並為仁也于此會而通之神而明之仁其庶幾矣聖人仁愛天下老安少懐之心無日不貫徹流通於斯民曰吾非斯人之徒與而誰與天下有道丘不與易也所以周流轍環棲棲于魯衛宋陳齊蔡荆楚不遑寧處如晨門荷蕢楚狂沮溺莫不識其心不曰有心哉擊磬乎則曰是知其不可而為之者與不曰是知津矣則曰鳯兮鳯兮何徳之衰故請討正名欲徃公山佛肸之召此其心蓋可識矣其如當時君相不獲一遇何乃于魯于齊于衛皆明日遂行逮絶糧于陳遭桓魋于衛叔孫武叔毁于朝俾綏來動和之化雖三月而可朞年有成者卒不得一試於邦家乃欲居夷浮海道大莫容一至此極故不得已有歸與之嘆誾誾侃侃囘琴㸃瑟日侍其側洙泗之濵卒以衍道脉于無窮孰非仁天下之心哉噫求仁者跡夫子之素履可以識仁矣何也夫子渾身一仁體故以天下為一家中國為一人萬世萬物為一體也大學曰古之欲明明徳於天下非孔子而誰茍有志于仁而不求仁于孔子之身以為學習之準乃守一見一説以談仁之理抑末矣問學以淑己教以淑人其理一也學以求仁為宗而教之所施何以見其仁愛之心曰不厭不倦無行不與非仁而何特因人異施莫覺其立達之無方耳如賜因論學悟詩商因論詩悟禮均許其可與言詩是與其進者仁之也求也退故進之由也兼人故退之一進一退非仁之乎師也過商也不及而均約之以中非仁之乎冉子之與過于惠原憲之辭過于亷而均裁之以義非仁之乎不忮不求由也終身誦之則曰是道也何足以臧未嘗不進由也而求也無乃爾是過與何嘗不退求哉子貢方人曰夫我則不暇亦退之也狂者進取乃曰吾與㸃也又因其進而進之矣他如小樊遲之稼圃矣又示之以大人之學忍宰予之短喪矣又啟之以三年之懐警晝寢攻聚歛戒闕黨進互鄉瑟曉孺悲杖叩原壤無非此意推而廣之凡問仁問孝問政同而答則人人殊在當時若各因一時之事機在後世實為不易之典則無非其仁愛所寄也又問囘之約參之一得非其一定之教乎曰聖人變動不居不可為典要蓋參也省身實踐懼其滯於有也故示之以一貫而一唯之外渾然内外之都忘囘也仰鑽瞻忽懼其淪於無也故誘之以博約而卓爾之餘脱然隱顯之俱化聖教造就人才如化工陶鎔品彚莫測其所自而仁愛實無窮焉豈如後人單提片言以立教便謂之一謂之約者所可倫哉夫子學不厭處即是教不倦處故無行而不與二三子者是丘也謂夫子有文行忠信之四教則可謂其止此四教則不可謂羣賢所造有徳行言語政事文學之四科則可謂夫子設此四科以造就羣賢則不可所以語上語下雖不同有教無類則一也雖然主忠信一言則尤為聖門所喫𦂳孔門以顔子為最故稱賢稱好學祗歸諸顔子及其死曰天喪予後人遂謂顔子絶徳非人所可幾及迨稽其素仁曰不違樂曰不改怒曰不遷豈無怒哉過曰不貳豈無過哉空曰庶乎屢空豈空空哉犯曰不校未嘗無犯也善曰無伐勞曰無施亦自願其如此也豈顔子必不可學哉且曰顔子死聖人之學不傳及究其所以不傳者則謂其墮體黜聰心齋坐忘人莫能窺其窈㝠恍惚之秘宻也然亦曷為不載諸二十篇哉嘗觀曾子稱其虛止云實若虛非致虛極之謂也稱其無止云有若無非宗無相之謂也博文約禮欲罷而不能克己復禮請事于視聽言動何有于虛室生白之謂哉雖孔子予欲無言特以儆子貢耳于囘則曰語之不惰曰與言終日曰於吾言無所不悦何為諄諄循循而囘也拳拳服膺勿失哉然則謂顔子絶徳不傳者不求之論語此聖學所以絶而不傳哉孔門惟曾子獨得其宗謂其唯一貫之傳也但既得其宗宜如後人日逐語言惟敷衍一貫可矣所云三省吾身或在未唯之先然臨終啓手啓足又惟三貴之叮嚀何也聽執燭童子之言而易簀何異三省之宻乎且當時方唯于一呼之頃未幾出答門人即曰夫子之道忠恕而已矣又何為便異於一貫之語乎然參竟以魯得之註云魯鈍也故以椎魯視曾子矣考史記孔子没時曾子年方二十七耳則其唯一貫必在數載之前謂之遲鈍可乎蓋參本篤實之人觀其平日自治誠切如十目所視十手所指無時無處而非慎獨之功所以任重道逺死而後已無徃非忠恕誠實之所在又何徃而非慎獨一貫之㫖哉又豈如後之傳宗㫖者言言必一貫云乎哉仲尼發憤顔子竭才曾子死而後已此正是聖門學脉所繫後人不能希聖希賢病正坐此聖學之全固揭之首章矣併玩志道據徳依仁游藝修徳講學徙義改過共學適道與立與權知及仁守莊蒞動禮知之好之樂之可見學有全功不可闕功有漸次不可紊也欲惡人之情也富貴貧賤人之遇也聖人與衆人同而為學之機實决于此故懐居不可以為士恥惡衣食不可與議道而不求安飽能敏慎就正便謂之好學又曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好曰不義而富且貴于我如浮雲至以喻義喻利判决君子小人亦甚切矣噫仲尼大聖也疏食曲肱樂在其中顔淵大賢也簞瓢陋巷不改其樂然則志孔顔之學尚可以温飽累其心哉夫子盛徳固難形容只温良恭儉讓五字描寫聖真令萬世如見併觀燕居申申夭夭鄉黨恂恂似不能言宗廟朝廷便便惟謹之類可見渾身是道也奚必言言博約語語一貫然後為傳道哉聖人之學性學也人只見論語言性者一便以為性非上智不足與語又謂性相近此兼氣質言故有美惡不齊而性善之㫖幾不明于孔門矣觀孔子繫易謂繼善成性後人却云與論語不同姑置勿論如人之生也直斯民也三代直道而行者也曾謂直亦美惡不齊乎仁義禮知性也孔門以仁立教曰茍志于仁矣無惡也曾謂仁亦有美惡不齊乎若謂仁同性善則性不可以美惡言也彰彰矣是故觀仁可以知性觀孔子教人之求仁則知孔門教人之盡性也論語中所記多是面相授受忠告善道辭簡意盡蓋平日聖徳既已服其心當時誠意柔顔温辭和氣又足以啟其信要皆以無厚入有間而不覺其入之深焉真是法言不容不從而改巽言不容不悦而繹雖羣賢之辭亦自與他書所記載者迥别曰遊於聖人之門難為言他書義理雖邃宻尚有可以著精神思慮處惟論語一書初讀之似覺日用平常布帛菽粟人人不可缺者潛心久之纔見得如天地包含徧覆聲色象貌充塞太虛成大成小各正性命意似化育之神卒莫得而形容之矣然玩味愈久其意味愈覺雋永一草一蟲莫非造化之全功一字一語莫非聖門之全學導翕河涉長江者尚可遡流窮源而假舟航以泛溟渤終莫覩其涯涘淵淵浩浩何所容其測識哉論語孔子其天乎論語二十篇其諸天之時行物生所散見乎何也聖神功化若未易窺測而不出乎庸言庸行之間故曰吾無隱乎爾吾無行而不與二三子者是丘也即其首揭學習一語啟迪萬世要亦夫子自道也蓋自志學以至從心終生發憤不厭不倦無非求滿此志學之分量耳但學之宗㫖不越求仁何論語記載若此其不齊乎自今觀之孔子非多學而識也信然矣學詩學禮學易學文好古敏求乃諄諄以此為訓而子貢亦謂其焉不學者非欺我也故教一也曰有教無類足矣然博文約禮啟憤發悱教固多術而進求退由且因人異施焉政一也曰為政以徳足矣然節用愛人尊美屏惡政固多端而賜達求藝且因人異用焉同一問孝也如無違疾憂敬養色難孝可一端盡乎同一問政也如先勞無倦兵食民信政可一端盡乎至同一問仁克復一語若足以盡為仁之要矣然不特敬恕訒言問答異即樊遲一人三問三答不可為典要有如此况己欲立也即欲立人己欲達也即欲達人既直指仁者之心體己不欲也即勿施於人又詳示學者之真功此無他言教若人人殊隨物曲成人則一也如一火散為千燈異照同明一水流灌百川殊𣲖共海所以賜也滯于守一承其教即悟詩意之無窮商也拘于見一承其教即悟執禮之有本囘也仰鑽涉於無誘之以博約而卓然有真見參也省身泥於有啟之以一貫而唯然無方體悦開與㸃化雨及時老安少懐物各得所無行不與兹可槩見矣豈獨言教為然哉試從孔子所自躬行者觀之仕以行義固欲以有道易無道至轍環問津畏匡要宋絶糧陳蔡叔孫毁于朝接輿沮溺譏刺于田野斯時也若可以已也猶南子可見陽貨可與言公山弗擾佛肸召可徃此其心何心也鳥獸不可同羣非斯人之徒與而誰與此其仁愛天下之心浩浩乎一天之時行不息物生不窮也然衛靈齊景季桓子一有不合明日遂行猶之乾道變化孰得而測之哉可見周流列國固期明良之一遇而樂得英才以教育之洙泗之濵誾誾侃侃俾千古道脉迄今不墜雖未得綏動乎春秋之邦家然宗廟百官之富美萬代如見者以有論語在也所以四科並列四教錯陳道固不越乎日用常行而人皆可為堯舜亹亹乎聨屬四海九州為一體會通百千萬載為一時孰非孔子求仁一脉以詔誥于無窮哉是故天不可窺也即其運行時物者固可測其無言之藴孔子不可作矣即其散見論語者亦可窺其無隱之精然則學孔子之學者一宗乎論語之所記載不特下學上達之法程有可依據雖各舉一言以服膺亦可入道庶不至躭空寂泥詞章舉一廢百如異端之流弊也雖然他書縱隱㣲秘宻凡頴慧之士尚可以智見測度自謂妙悟神解獨論語一書真所謂淡而不厭簡而文温而理徹上徹下縱于聖學有深造者終不能一一與之相當此論語所以難學也噫人人讀此論語程子謂讀了後又只是此等人便是不曾讀反觀以為何如學習論語二十篇具載孔子誨門弟子及對當時國君大夫何循循善誘哉今讀其書欲會通其指歸如入孝出弟詩書執禮文行忠信無一非教蕩蕩乎莫得而名之矣後人欲執泥一説標為聖門宗㫖何異于日星露雷各指一以名天道哉但聖道大不可窺其因材而篤之教又不可測譬盧扁之門諸病者羣聚乞醫鍼砭所施動中膏肓片咀所投頓愈痿痺凡起死囘生靡不藥之為全人焉雖聖神功巧不可名狀幸而穴法良方與脉决並存乃活人心之所寄也論語所載孰非孔子之方脉哉醫必有活人心始可語良醫而學之一字乃孔子頂門針法也故首揭示人只在學習得非一書大㫖之所關乎茍讀其書遵其教而學之㫖意且未了徹則與聖學異趨者有之矣不知論語所寄乃聖門全學特不可各執一説以訓釋之也何也學者肇于説命大發明於孔門後儒訓釋祖學于古訓者則曰學之為言效也然稱顔囘好學乃在不遷怒不貳過效豈足以盡之乎因諧聲轉註者則曰學之為言覺也然言君子好學乃在敏事慎言覺豈足以盡之乎據為之不厭者則曰學即躬行是也然夫子焉不學而博學於文好古敏求為豈足以盡之乎至謂離經辯志以博文强記為學者取證于何必讀書然後為學之語是謂誦讀非學不可也學易學詩學禮學道又豈誦讀云乎哉可見學之所包者廣未可專以一字一義偏言之也學之義不明况好學乎所好不在乎學則雖仁知信直勇剛俱各有蔽况所學一偏效則模做格式覺則寂照圓通為則砥礪行檢記誦則訓詁辭章各就所見以求進益使聖學之全不見於後世者職此故也欲學聖人之全學者惡可于論語開卷第一義而忽之哉然亦不必他求也本諸身心性命合前諸義而㑹通之大義可黙識矣習之義云何嘗讀易六十四卦文王獨于坎曰習坎周爻孔彖皆因之盖水之習于坎也自古迄今逝者如斯盈科放海不舍晝夜是他物之習也尚有息時惟水之習也無一時息觀之習坎時習之義了然矣大象曰君子以常徳行習教事常習時習意也兌之大象曰君子以朋友講習是習亦澤水取象兌說也觀之水淫溢浹洽活潑動盪無時不習即無時不悦學習而悦亦可得意于象外矣何待習熟然後悦乎况兑悦在乎朋友之講習則朋來而樂不待言矣可見如此而學即如此而習體天行健自强不息故悦樂在我又何待於人之知不知為欣戚哉此其所以為君子也百川學海而至于海者惟在時習之不已君子之學猶是也或曰時之義果無間斷如禹之惜隂抑善變通如巽以行權耶曰皆是也天之運也積十二時以成日積四時以成歲惟其無間斷是以常變通也君子之時中也惟時時此未發之中而不離須㬰則喜怒哀樂皆中節而時措時出在其中矣盍于孔子觀之自十五志學以至七十從心曰發憤忘食曰學而不厭無非及時進脩之意則是學而時習乃其所自道焉所以與時偕行而為聖之時者此也然則學豈無其要哉詳玩論語二十篇殆不越乎求仁而已矣人心生生之機本無一時間斷學者學此習者習此悦者悦此故其篇章次以孝弟為仁之本又次以巧言令色鮮仁皆有深意存焉則凡各篇散見固皆聖神功巧之玅用而欲立欲達老安少懐實不外乎活人心之真脉訣也信乎論語一書惟在學習説三字而孔門學脉不外求仁一言志學孔子萬世師也志聖學者必師孔子而孔子之學何學乎觀其由十五以至七十自述志學而立不惑知命耳順不踰矩若後世年譜然其終身忘食忘憂不厭不倦亦若可想見矣但其散見於論語所記録者曾未見有希竒越常可喜可愕為古今之絶徳何哉然不如丘之好學乃其所自道焉不過曰好古敏求躬行未得且以脩徳講學徙義改過未能為己憂自言所志亦不過曰老安少懐朋友信而已矣其在鄉也不過恂恂似不能言其在宗廟朝廷也不過便便惟謹其接人也不過無衆寡無小大無敢慢見衰冕與瞽者雖少必作過之必趨其日用常行不過食不語寢不言食不厭精膾不厭細紅紫不以為䙝服而已矣至事公卿父兄喪事不敢不勉不為酒困則曰何有於我仁不憂智不惑勇不懼則曰丘未之能然則聖人之學所以師萬世者果安在乎况以此而為之不厭即以此而誨人不倦其教不過文行忠信而已其雅言不過詩書執禮而已其訓弟子不過孝弟謹信愛衆親仁而已問孝不過曰色難敬養問政不過曰足食足兵若仁則聖學所宗也曰志即無惡曰欲仁即仁至曰有能一日用其力于仁矣乎未見力不足者所以羣弟子問仁不曰訒言則曰居處恭執事敬與人忠而已後人乃云此特其淺淺者然出門如見大賔使民如承大祭亦何嘗離邦家也猶云此非其至者然一日克已復禮天下歸仁亦何嘗離乎視聽言動也自今觀之將謂其家庭有異聞乎聞詩聞禮已矣故孝友即為政也將謂其及門有異教乎啟憤發悱本有教無類也是故雖曰無知未嘗不叩竭兩端雖曰君子不多未嘗不多聞多見雖曰無可無不可未嘗不用行舍藏雖曰知我其天未嘗不下學上達信乎無行不與人人可以與知而與能也然此自後學揣度聖人或不足以窺其㣲乎觀其稱君子好學不出乎敏事慎言稱顔囘好學以告其國君大夫亦惟在不遷怒貳過實實可信矣况及門三千速肖者七十徳行言語政事文學縱如閔冉之儔尚無與於聖學之傳焉至稱天喪予獨歸顔囘囘之竭才卓爾初不越乎博文約禮而樂雖超乎簞瓢之外然無所不悦未嘗不由於終日之與言也囘之亞參獨得其宗以其有一貫之唯也又只曰夫子之道忠恕而已矣則未悟之前功勤三省何啟手啟足之時尚惓惓于三貴乎哉其他如商之起予不離乎詩禮㸃之可與不離乎春風詠歌雖語師以參前倚衡之見不離乎忠信篤敬雖語賜以無言之天不離乎時行物生故賜稱夫子無常師亦未嘗不自識大識小之賢者而學之也然則聖人之學果安在乎論語二十篇果皆聖人粗迹而未足以記其藴奥乎何為聖學皆不離倫物言行之顯卒無希竒越常者如異教浸淫人心而莫之解也噫夫子嘗自言之矣索隱行怪後世有述焉吾弗為之矣君子遵道而行半途而廢吾弗能已矣君子依乎中庸遯世不見知而不悔惟聖者能之于此真信不疑聖人志學宗譜昭然盡發洩于論語各篇章者當不待辯説矣雖然世之習舉子業者莫不曰志學即志乎不踰矩之學也誠哉是言也聖人一言一動載在論語者孰非其心矩之顯示乎然則志聖人之學者必師孔子又有出于心矩之外者乎奈何聰頴之士悦怪貪竒忽邇慕逺效異教單提直指標一說以為秘藏捷徑不可以能智求不可以思議盡不可以修證得不可以權貴顯自讚無上妙道世所希有雖舉一廢百勿恤焉又何怪其視論語記録悉學究之常談哉噫士真矢志聖學而矩在吾心且幸而論語具存也異教惡得而惑之周監二代四海風俗美惡一朝政治汚隆係大君所尚何如而創業之君尤一代好尚之根源也好尚不齊大畧不過文質兩端已爾雖曰文猶質也質猶文也二者不可偏廢也但無文之質不失其為質無質之文則不可以為文故與其文有餘質不足莫若文不足而質有餘也况質則渾樸非人情所喜故人君欲敦篤儉約為天下先猶日見其不足也若文則侈靡華麗乃人情所爭好不待倡導祗日見其有餘矣盍自天地開闢以來觀其變態之漸乎洪荒之世純乎質也帝王代興風氣日開耕稼興而飲茹毛血者不復見矣簠簋興而汙樽坏飲者不復見矣書契興而結䋲紀事者不復見矣由羲黄而唐虞而夏商而成周吾見質之日趨于文猶江河之日趨于海雖欲挽而止之不可得也何後儒因孔子謂周監二代郁郁乎文哉遂有周尚文之説因孔子謂殷因夏禮周因殷禮遂以所因謂三綱五常所損益謂忠質文三統即如夏建寅商建子周建丑改時改月已于春王正月詳辨之矣若夏尚忠商尚質周尚文其果然哉自後世品題三代猶可説也謂禹湯文武有心以尚之則非矣何也粉飾日增謂能修上世之不足而務求前人之所未完以為成功而不知其不若使上世之質未散而前人之樸常在也况世道愈趨愈下雖後代創業之主未有不欲挽侈靡之習以還之渾厚者厥後毎毎以文而滅質也三代君相皆聖人也獨見不及此以各審所尚乎桀為瓊宫瑶臺紂作竒技淫巧俱以文彩靡麗竭民脂膏自取滅亡乃謂忠之敝愚質之敝野何指而云然也書曰纘禹舊服曰反商政政由舊亦未聞其救忠以質救質以文也即如武王勝殷未及下車封黄帝堯舜後下車封王子墓釋箕子囚表商容閭凡此莫非崇尚忠厚質朴豈假此潤色太平而濟其質之不及哉可見忠質文迭尚雖載在禮經不過因孔子贊周文郁郁故牽合傅會之耳不然孔子從周從其文也先進之後反欲從夏商野人之陋與武周尚文之辨只此可以决之矣一貫古今言道統者堯以執中傳之舜孔以一貫傳之曾先聖後聖無間然也欲求一貫之㫖盍求諸執中之傳乎子思子本家學作為中庸曰喜怒哀樂未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也又曰君子之中庸也君子而時中惟時時此未發之中而大本立焉則溥博淵泉時措時出莫非太和之流行莫非此率性之道而達之天下沛如矣一即中也中即未發也虞廷孔門豈二道哉且大學乃曾子傳自孔門者也明徳親民止至善而要在知止知止則定靜安慮得凡天下國家身心意知物一以貫之矣知止非即一貫執中之㫖乎所以戒慎于不覩不聞斯目善天下之色耳善天下之聲天聰天明所自出也敬信于不言不動斯言而世為天下法行而世為天下則聲律身度所自來也君子多乎哉不多也無能而無不能也吾有知乎哉無知也無知而無不知也易無思無為也寂然不動感而遂通天下之故也為物不貳則其生物不測天地此一貫也故曰維天之命於穆不已此天之所以為天也不識不知順帝之則聖人此一貫也故曰於乎不顯文王之徳之純此文王之所以為文也天何言哉四時行焉百物生焉天何言哉其所以時行物生者亦何言之所能盡哉天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮其所以同歸一致者亦何所容其思慮哉故曰天地之常以其心普萬物而無心聖人之常以其情順萬事而無情也廣引博証所謂一貫所謂執中不可以會通而黙識之哉或曰參唯一貫矣乃以忠恕盡夫子之道果以近易者曉門人歟盖道無逺近難易而雜以有我之私者二之也中心為忠如心為恕惟中心無為渾然未發之體一切如心以行之即所謂己所不欲勿施于人則直下人我一體己私盡融推之天下何徃不達而道豈有餘藴哉或又曰舜于執中之外益之以危㣲精一曾子一貫之外易之以忠恕何歟盖道本中也本一也然而無定在無定名也舜曾恐人求之幽深𤣥逺故危㣲精一忠恕之言無非欲人反求諸身心而近裏着已有所持循以為功也若執言詮則人人殊矣孔之一即異乎堯之中矣孰知盤隨山移而針則有定舟隨水轉而舵則常操使操舵用針者無活法焉則執中無權執一賊道弊可勝言哉雖然堯以執中傳之舜舜傳之禹孔以一貫語乎參又語乎賜道固得人而後傳也不知其語舜禹語曾賜正所以教萬世無窮也但自生民以來前而唐虞羣聖人都俞吁咈協恭和衷相與警惕于朝堂之上此一時也君臣即師友也繼而春秋羣聖賢考徳問業義重聚樂相與切琢于洙泗之濵此一時也師友即君臣也其間如湯尹文武周召翕然唐虞之休風如周程張邵朱陸宛乎孔氏之家法不如此而望其徳業之相成聖學之大昌未之有也是故有志聖學而執中一貫其道脉如故也在天在田聖作物覩聲應氣求雲龍風虎不有曠世相傳者在乎發憤自吾人之視聖人也從容中道渾然純一而不已自聖人自視則常若不及歉然望道未見之心也惟聖不自聖常若望道而未之見此所以純一不已而為天下之至聖乎何也道無窮學無窮聖人之心與之俱無窮也盍觀諸天乎天行一晝夜周三百六十五度自混沌初闢以來運行無一息停惟健故也聖人體天行健所以自强不息發憤忘食樂以忘憂不知老之將至也聖人其天乎憤非他也即人心勃然之生機也樂非他也即生機之欣欣暢達不能自已也人人有此憤機特不能自開發爾不然何為以不善名之即艴然變色也或偶一發動而真機不露不能常發常憤中心不樂反自遏其生生之機矣聖人之為人也惟恐一日不能自盡其分惟恐一息不能自全其天以自遏其生機故其憤常發雖食且忘焉自他人觀之若或不堪聖人則孜孜汲汲油然豁然若有必如是而後能自快于心者外此又何憂乎所謂樂則生生則惡可已則不知手舞而足蹈矣盖惟常憤自爾忘食夫我則不暇也惟其常樂自爾忘憂憂亦無自而行也惟其常發憤而忘食所以常樂而忘憂即所謂我樂此不為疲也常憤常樂一出于天機自然之發生而不㕘之以一毫人力且不自知其憤不自知其樂不知老之將至如草木自萌蘖初發至合抱㕘天一段生機欣欣向榮無一息間也或曰夫子天縱將聖生知安行何事憤發不過謙己誨人耳不知聖人言皆實言而發憤之言乃所以自狀其為人之實故曰為之不厭曰學而不厭曰好古敏求曰不敢不勉曰一日用力于仁曰吾弗能已曰學如不及猶恐失之曰吾嘗終日不食終夜不寢曰不如丘之好學皆發憤之意也不憤不啟教人且然何獨于其所自學者而疑之囘也欲罷不能參乎死而後已其家法固如此也或曰始而憤終而樂惟其道有得與未得故一憤一樂相需而不窮耳安能一憤即樂耶殊不知勇士不忘喪元且有視刀鋸鼎鑊甘如飴者顔子簞瓢不改其樂豈始猶不樂必待久之而後樂耶况發憤忘食茍非真樂在中舉天下無以尚之雖一日且難之矣安能由之以終身也或曰日用飲食在凡人且安其常使聖人非自謙之意則憤發遽至忘食何有于動容周旋之中禮乎不知安于飲食宴樂之常者此所以為凡人也若好學君子且不求安飽而敏事慎言雍容自有所在矣觀舜之羮墻見堯引慝號泣禹過門不入三飯三哺文日昃不遑暇食周終夜仰思坐以待旦孰非發憤忘食罔敢暇逸之舉動乎或曰樂本吾性真體也發憤忘食正以求此忘憂之真樂耳不知憤樂之先後一分則以憤為發心之初樂為得道之效似亦有見如此則憤以求樂既樂即無所事憤矣故近世之學有學宗自然頓悟樂體則樂即是學流連光景玩㺯意趣調停于勿忘勿助間自以為鳶飛魚躍春風沂水而超然其自得焉所以終生悠游自在以小成自安不復更求進益間有憤機生發反謂障碍性體而遏絶之矣貿貿然千載無真儒者其弊正坐此也非謂樂不宜也憤樂一機原無間隔而况以意趣為樂者非自性之真樂乎試觀豪傑之士卓然自樹且不肯陶情適興虛度光隂又肯以宴安為超脱也耶可見憤之外無樂憤非强作樂之外無憤樂非意興雖憤樂在聖心者淵浩莫窺而其生機活潑亹亹忘倦或亦有可想像焉者十五志學至七十從心其進修固為有漸而憤樂諒無一息間斷是亦天行之徤矣雖然望道未見日進無疆固孔子聖不自聖之心亦孔子自道其實也若自吾人視之謂其不思不勉從容中道者此也謂其與天並運純一不已者此也外此而謂孔子别有一道為聖不可知則非吾之所知也已噫自生民以來未有孔子孰有如孔子發憤者哉願學孔子者信其發憤一語而運身轉動不自安焉則知恥近勇聖學其庶幾矣絶四聖人與人同以其心本同也而其所以異者由人皆自失其本心惟聖人為能盡之也聖人所以能盡其心者豈能于其本同之心有所加乎去其所以累吾心者而已矣蓋人心本廓然太虛洞然澄徹雖無所不包無所不貫而物感即應事過不留如止水無波或隨風變態亦與風俱恬如赤日麗空雖普物畢照亦與物俱寂故靈明常烱無有一毫能為之累者其本體也而其所以累之者豈有他哉曰意曰必曰固曰我是也人惟不識其本心故隨念遷轉逐境支離外之所感萬有不齊中之所萌紛雜靡定或有所為而動或無所為而亦動坐馳卧游生東滅西倐起倐止千態萬狀莫可窮詰皆意也由是而事求可功求成斷斷乎期于必遂而後已而必則意有定在矣由是執之彌堅持之愈確硜硜然膠滯不通而固則意必莫之返焉由是而一事之行一物之得自一念以至萬念惟知有我而已凡自是自足自私自利皆我之為病也匪特不善之念不可有茍有意為善必欲如此以為之至于固守其善私之為一己之善也是亦有我之病也使四者有一焉則心之本體已為之錮蔽窒塞况四者相為牽引循環無窮而人之所以自失本心不能同流天地孰非意必固我之為累哉此在常人則皆然也間有豪傑之士謂四者皆吾心所不可有而竭吾力以遏之于以禁止其意禁止其必禁止其固禁止其我凡所以堅忍克制使不得萌于中形于外也無所不用其至視常人輾轉牽纒於意必固我者大相逕庭矣但毋之一言用力不為不專不為不苦亦可以為難矣然縱能拔去病根無復潛藏隱伏之累而尚假人力以㕘之非天性之自然也聖人絶無此四者非但無意必固我也如毋意毋必毋固毋我皆聖人所絶無也何也意必固我常人之通病也毋意毋必毋固毋我賢者之用功也聖人并禁止遏絶之功而亦無之到此地位一毫力不可着大而化聖而不可知也豈聖人之心與人異哉夫人之心周流變動本無方體無知而無不知無為而無不為無思而無不通無可而無不可是心也謂其有意必固我而有之未免自蔽其心也謂其無意必固我而毋之亦豈善事其心者乎即如有意不可也欲其無意而禁止之非意乎有必不可也欲其無必而禁止之非必乎有固有我不可也欲無固無我而禁之非固與我乎蓋水本動也因風以成文固不可執波以為水而必欲水之無波焉非真知水者矣日本明也隨物以普照固不可執照以為日而必欲日之無照焉非真知日者矣是以聖人無心以制其意而必誠其意不可以意名之也無心以制其必而好謀有成不可以必名之也無心以制其固而確乎不可拔不可以固名之也無心以制其我己欲立而立人己欲達而達人不可以我名之也何思何慮同歸殊途不逆不億抑亦先覺從心所欲而不踰乎矩欲即矩也何四者足累其心又何患四者之為心累而役吾心以為之防耶此聖人所以適得乎心體之常生生不息化化無窮不可以起滅論不可以有無言矣否則謂聖人何用禁止者不為無見而改毋作無豈知既云絶矣又曰無焉於文義果相安乎不識吾人之本心者不足與語聖人之心不識聖人之心者惡可與語絶四之㫖聞韶甚矣樂之難知也非聞聲知音聞音知樂之難也難乎聞其樂即知其徳焉耳至聞樂知徳千載儼然神交為尤難也是故孔子在齊聞韶豈三月之間日聞其搏拊戛擊遂至肉味不知哉蓋耳與韶樂俱融心與重華俱釋精神凝結想自韶樂外舉不足以尚之記者特指飲食一端以見聖人用志不分云耳若徒聆音察理知其蓋天載地盛徳蔑加則季札一覩聞間悉已洞澈之矣何待三月亦何有于忘食味耶或曰聞韶至忘肉味孔子亦不過知韶之美善已爾子之意乃謂舜孔相孚若有可想像不可以語言形容焉者子于何而見之哉曰神不一不足以達化思不沈不足以通㣲惟誠精之極則鬼神與通故孔子雖聰明天縱而好古敏求無所不用其極也昔嘗學琴于師襄十日不進襄子曰可以益矣孔子曰未得其數也有間曰可以益矣曰未得其志也有間曰可以益矣曰未得其人也有間曰有所穆然深思焉有怡然高望而逺志焉曰丘得其為人黯然而黒頎然而長眼如望洋非文王誰能為此也襄子避席再拜曰師蓋云文王操也此雖學琴一事亦可見潛神之至矣揚子雲曰潛天而天潛地而地天地神明而不測者也心之潛也猶將測之况于人乎况于事倫乎又曰昔仲尼潛心于文王達之然則忘味于齊也得非潛心于舜乎是即學琴而聞韶者可知也即潛心于韶而學易韋編三絶又可知也嘗自述其人曰發憤忘食樂以忘憂不知老之將至可見終生發憤則終生食且忘之又何有于肉味哉信乎不如丘之好學也或曰先孔子而聖者非一人也未聞神不兩用如此專切何歟曰見堯羮墻非舜乎舜之潛神于堯蓋可想也禹思天下之溺由已至八年三過不入不知有家矣手足胼胝不知有身矣文王無逸至日昃不遑暇食周公思兼至坐以待旦不知有飲食寢興之節矣何獨于孔子而疑之或曰寂然不動感而遂通心體之常也若有所好樂則心不正而食不知味在他人則謂之心不在矣曾謂聖心亦有所歟曰三月不知肉味門人記之矣不圖為樂至斯孔子自嘆之矣正嘆為韶樂之深不圖一至于此非嘆韶音之善美也即其哭顔淵不自知其慟何以異此蓋情所當慟雖慟且不知而哀不失其節心有當思雖味且不知而思不出其位此未易言也盍觀諸天乎日月朗明萬象畢照此太虛也雷雨滿盈萬象絪緼此太虛也是日月雷雨皆天之用也萬象畢照于日月之明而非著于空萬象絪緼于雷雨之屯而非蔽于物聖心一天也使以衆人意見揣度聖心且不知此心體量必如之何而後盡也而欲盡其心者又躭戀虛明之景象執滯圓覺之言詮安足以窺聖人聞韶之心哉至徳道雖人所共由徳乃人所自得聖人與人為善人茍有一徳鮮不亟稱之焉然未嘗輕以至徳許人也獨于周室既以至徳許㤗伯矣又以至徳稱文王嘗讀易而紬繹至徳之義于乾曰大哉于坤曰至哉蓋坤元順承天道是以徳合無疆而坤之至徳以此文王三分天下有二以服事殷恪共臣職此所以合徳于坤也稱為至徳為其讓天下于紂也予知之矣其在㤗伯也果謂其當商周之際其徳足以朝諸侯有天下乃棄而不取又泯其迹為荆蠻之逃此徳之所以為至極歟如此則㤗伯為至徳在太王為不臣矣然則翦商之説非歟魯頌居岐之陽實始翦商自後人觀之太王遷岐之日實周室代商之始謂其肇基王迹非謂其志欲取商也且太王時商祚方隆其不得已而遷岐求避狄難且不暇安得遽懐不臣之心欲翦商之祚哉己之土地且捐以與狄而不顧乃欲取商之土地以自王焉吾知太王斷不然也觀文王值紂方稔雖三分有二事殷如故猶不免羑里之難太王之時何時也不敢蓄無君之心也明矣若㤗伯當太丁帝乙之世安能朝諸侯有天下哉縱使足以王時勢在我而嗣位後祗守臣節以終身亦不失為讓商矣乃逺逃以成父翦商之志謂之固讓吾不知也然則㤗伯不嗣周統孔子謂其三以天下讓何哉蓋㤗伯仲雍季歴皆太王子也太王因季歴生文王知有聖徳而欲傳之故㤗伯順承父志與仲雍同竄荆蠻方其逃也以國讓之王季也厥後文王三分有二武王克商遂有天下知㤗伯以國讓耳孰知以天下讓哉故曰三以天下讓民無徳而稱焉詩大雅曰帝作邦作對自㤗伯王季維此王季因心則友則友其兄則篤其慶載錫之光受禄無喪奄有四方伯之讓季之友正謂此也若謂其不從太王翦商故為逃荆採藥之舉即以天下讓之商也人皆知之矣胡為乎民無得而稱也耶可見坤順承天臣道也子道也㤗伯文王所以均之為至徳也若曰父欲翦商而子不從即為至徳則周家自太王王季文王世世有圖商之志至武王始克遂也周之世徳安在哉噫史傳記載豈特太王受誣已哉以文王事殷之至徳乃曰西伯隂行善以武王順天應人之師乃曰武王至紂死所三射之躬斬其首懸於太白之旗其敢於誣聖人一至此哉是皆君臣大義所關不容不辯故併及之無知天地間凡有血氣之屬必有知故大學莫先於致知也聖人乃云無知果謙己以誨人乎抑統言人心之虛體乎玩味上下語意皆是也亦皆非也何也人皆有此徳性之知雖若烱然在中昭明有融實無形象可覩無方體可求故謂之為虛靈謂之如神明而知本無也人或守己之智識以盡天下之見聞或能反觀黙照得常惺惺法固自以為有知爾非所以論聖人也兹以凡人擬度至聖將以為謙己歟然玩下文叩兩端而竭焉何自任也將以為統論心體之本然玩上文吾有知乎哉則又自道其實焉此必當時因聖人誨人不倦叩竭兩端或以有知稱之故云無知語意渾涵徹上徹下雖謙而實自任雖若統論知體而實自道也不然誨由以知之為知之不知為不知只此是知也易曰乾知知至知終孟曰良知知愛知敬安得直謂之無哉况知體之在人也泥于識見則不通扭于方所則不盡又何敢自以為有知耶是故惟寂為能通天下之感惟虛為能待天下之動惟無為能納天下之有天地且然况於人乎嘗觀諸天時物皆在其包涵徧覆中也然萬物異類矣並育不相害四時異候矣並行不相悖孰主張是哉易曰乾知大始乾以易知宜乎有知莫天若也而天之類族辨物其于卑高小大之等是非善惡之别犂然不爽雅云監觀四方頌云日監在兹孔子亦云知我其天而天之知終莫之窺焉天命本於穆也天載無聲臭也是天有知乎哉無知也而知始則悉歸諸天焉人獨異於天乎故知一也在耳為聰在目為明在心為思為睿智也聲未接于耳聰與聲俱寂也然聽五聲者聰也雖既竭耳力隨其音響悉聽容之不淆焉似乎聰有定在矣即此以反聽之聰則畢竟無可執也茍自以為聰執之以辯天下之聲則先已自塞其聰何以達四聰乎色未交于目明與色俱冺也然見五色者明也雖既竭目力隨其形貌悉詳覩之不紊焉似乎明之有定方矣即此以反觀之明則畢竟無可象也茍自以為明執之以察天下之色則先已自蔽其明何以明四目乎思慮未萌睿智與事物而俱歛矣然神通萬變者思之睿也雖竭心思隨其事物以酬酢之而盡入幾㣲似乎睿智有所定矣即此以自反焉睿則畢竟無可窺也若自以為睿執之以盡天下之變則先已自窒其思何以無思無不通乎易曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮此之謂也夫逺而觀諸天之知大始近而觀諸衆人何思何慮聖人無知之訓豈欺我哉可見無知云者如無適無莫一以義為適莫也無可無不可不以我為可不可也無知無不知一隨鄙夫之問而叩竭兩端以為知其空空者自如也豈并徳性良知而無之之謂哉噫惟其無知所以無不知也所以學必致知而為知之至者無之極也古今稱大智者必歸諸舜也好問好察執兩端而用中于民舜有知乎哉諒哉知本無也聖人天聰明之盡不能于知之本體加毫末矣奈何執見聞知識自以為有知者無論已或欲并徳性良知掃之以歸諸無是又不可以無辯博文約禮談聖學者莫不曰顔子没而聖人之道亡談顔子之學者莫不曰顔子深潛純粹終日如愚善發聖人之藴爾已然稽諸論語孔子因其問仁而教之以克己復禮囘之自叙亦曰博文約禮夫何言禮者又只以天理歸諸此心之虛寂而視節文儀度皆粗迹焉則在聖人之學信亡于顔子之後矣樂記曰天高地下萬物散殊而禮制行焉臯陶篇曰天秩五禮自我五禮五庸哉中庸曰親親之殺尊賢之等禮所生也謂禮非天理不可也然經禮三百曲禮三千其等殺之森列品節之詳明謂非聖人之制不可然一皆原之天秩而其條理自不可紊也所謂復者復此也約者約此也顔子請事竭才卓然如有所立卓者莫非禮也或曰克己復禮子以禮為秩序等列之天則焉可矣使文禮亦以此言之何以謂之約哉曰且以文字先發明之可乎彼以博文為先約禮為後截然分屬信不可也專以文為外以禮為内而判然以多寡分之可乎不可乎世儒只認詩書六藝為文者必欲多其見聞廣其訓詁一切歸諸典章史冊固失之記誦之末矣而必於視聽言動作止進退之際以為文止在乎一身則文猶人矣何躬行之未得而孝弟謹信又何必行有餘力然後學文哉彼四教有文行之殊四科有徳行文學之異則文不可專指動容也明矣易曰觀乎天文以察時變觀乎人文以化成天下所以伏羲仰天俯地近身逺物其博為何如哉若夫禮儀三百威儀三千似不可以約言矣而不知三百三千一皆此心天理之等列不可以一毫人力㕘也即如目之所視形色錯覩何其文也然五色不可淆而目中之條理孰非自然之禮乎耳之所聽聲響錯陳何其文也然五聲不可亂而耳中之條理孰非自然之禮乎口之所言言論錯出何其文也然五音不可混而口中之條理孰非自然之禮乎身之所動事為錯行何其文也然五事不可紊而身中之條理孰非自然之禮乎以倫叙之酬酢用敬用愛何文如之而尊卑親疎當隆當殺莫非禮也經史之記載或言或行何文如之而賢否治亂當勸當懲莫非禮也天地萬物成象成形何文如之而高下散殊洪纎森列孰非禮乎自文言之嘉美㑹通是即文之禮也自禮言之儀度品節是即禮之文也文乃禮之章施禮為文之條理由一心以達之兩間其文不可勝窮非博而何其禮不可踰越非約而何從心所欲而矩自不踰動容周旋而禮無不中博約一致所以為盛徳之至也盍觀諸水乎波瀾瀠囘其文渙然而千支萬𣲖一皆其自然之川流也盍觀諸木乎華實暢茂其文森然而千枝萬葉一皆其自然之木理也可見水之源源木之生生條理分明莫非天也不然道之以徳可謂約矣何為而齊之以禮知及仁守莊蒞可謂約矣又何為動之不以禮者猶未善乎噫三千三百一天秩也萬事萬物一天則也此之為天理此之謂禮之約善求顔子之學者甚毋認天理于虛寂之歸而博約一致其庶矣乎先進後進嘗誦孔子曰吾觀於鄉而知王道之易易也因觀蜡語子貢曰百日之蜡一日之澤非爾所知也一張一弛文武之道也又畢蜡出遊觀上而嘆語言偃有曰大道之行也與三代之英丘未之逮也而有志焉夫鄉飲酒禮與蜡祭之禮皆禮行于鄉者也孔子何為而有取于鄉之禮乎因有感而嘆曰此孔子所以從先進也此所以禮失求之野猶有古人遺意在也不然孔子嘆魯之郊禘非禮至不欲觀曰我觀周道幽厲傷之又曰周公其衰矣夫國家之禮莫大乎郊禘乃哀周道之衰蜡與鄉飲酒禮乃志三代之英而嘆王道之易易此其意蓋可識矣夫禮樂一也無分于古今無分于上下無分于鄉國者也此可論於三代盛時而敝流叔世則有大不然者故論語曰先進之於禮樂野人也後進之於禮樂君子也如用之則吾從先進自今觀之先進後進以時言也如註中前輩後輩是也野人君子以分言也即愛人易使之君子小人是也不曰小人而曰野人以地言也野人散居都鄙鄉井其于禮也樂也不免粗鄙朴陋之習而古先餘風猶有存焉者此其前輩之所尚乎君子聨聚于朝宁城邑其于禮樂也華麗便習燦然可觀乃今時之所尚者此非後輩之所行乎由今日較之春秋固時異世殊而以今日習俗言之或與春秋時亦不大相懸絶凡今之有識者莫不嘆後輩之澆漓思先輩之質朴孔子先進之從想亦同此意歟蓋郊野之人耕而食鑿而飲晝于茅夜索綯胼胝手足勞苦其筋力凡侈靡之習非惟不能且不暇亦且耳目見聞有不及也故衣冠飲食之間語言揖讓未免質直儉嗇過于簡畧然禮以節民而節之之意未盡壊樂以和民而和之之意未盡流司世教者有能舉而用之則一變可至于道矣况野則野矣大朴未散本真尚存忠信之人可以學禮所以先進之禮樂為可用也若夫城邑固聲名勢利之塲縉紳士大夫又皆文物相競之會裼襲升降濟濟蹌蹌承順應對唯唯諾諾聲音笑貌之間莫不可觀而可聽也後進之於禮樂若此孰不以為彬彬郁郁舍君子而誰此所以不有祝鮀之佞而有宋朝之美難乎免於今之世也然巧言令色足恭左丘明恥之矣脅肩諂笑病於夏畦曾子傷之矣文華大勝本實先撥至求之玉帛鐘鼓不愈失而愈逺哉如或用之自一身以及一家一鄉一邑一國至四海之廣雖欲不從乎先進不可得矣所以孔子論禮樂之本則曰禮與其奢也寧儉喪與其易也寧戚論奢儉則曰與其不孫也寧固孰非從先進之意歟可見先進本質樸也後進本華美也何必添今人反謂之為野人反謂之為君子哉或曰周尚文故孔子一則曰郁郁乎文哉吾從周一則曰吾學周禮今用之吾從周此固為下不悖之義亦周監二代之得宜也于此乃曰如用之則吾從先進夫野則不文矣從周顧如是乎蓋先進於禮樂乃文武成康之舊野人尚未失其初也後進乃周末文勝之流弊君子競趨之靡固至此耳先進是從豈變禮易樂哉今之禮猶古之禮今之樂猶古之樂特今之人非古之人也前輩後輩用禮樂不同耳孔子從先進正以從周之盛時也噫傷今思古聖人欲挽風會之流而不可得至斟酌四代禮樂又曰放鄭聲逺佞人亦將以救後進之流弊歟克己由己執中虞庭之宗㫖也既曰人心惟危矣又曰道心惟微是果有二心乎求仁孔門之宗㫖也既曰克己復禮為仁又曰為仁由己是果有二已乎哉心一也而有人心道心之分已一也而有克己由己之辯差毫釐繆千里不可不慎也譬之同一刃也本以防盗而以之刼掠斯為盗矣取盗之刃以防盗即非盗矣是故人受天地之中以生而幾微即道心也但有是人之形即有是形骸之欲茍心為形役則危矣惟不從乎人心之危是即道心之微而精一執中在是也仁者人也本無己之可克也但有是人之形即易狥乎一己之私茍己私一勝不容以不克矣惟能克乎軀殻之己是即天性之真己而已克禮復仁在是也可見仁即人也即所謂人受天地之中以生純乎天理而無一毫人欲之私者也天理非禮乎人欲非己乎克己即復禮復禮即為仁此所謂為仁由己也一也仁則可以為人不仁則不可以為人故已一也克己即復禮而為仁己不克則禮不復不可以為仁矣又何疑哉嘗謂克己斯能由己由己斯為真克己幾微之間不可不早辯也或曰克己斯為由己是矣亦必克去淨盡而後處處皆真己運用乃為由己此亦未易能者殊不知我欲仁斯仁至矣曾有欲仁而仁不即至者乎有能一日用其力於仁矣乎我未見力不足者曾有一日用力于仁而力不足于一日者乎若曰姑待明日便非善用力者矣便非真克己矣是故人孰無欲凡欲食欲色皆欲也一刻轉念而欲乎仁則此即純乎天理而仁與欲俱至矣然則欲仁之欲與欲食色之欲一乎二乎特視所欲何如耳人孰無力凡用力于貨利皆力也一刻反己而用力于仁則渾身純乎天理而仁與力俱足矣然則用力于貨利與用力于仁之力一乎二乎特視所力何如耳况食色貨利皆外物也求之不以為難而何獨難于克復之功哉或曰一日克復固由乎已而天下歸仁則存乎人其能必之於一日耶殊不知天下同此人也同此純乎天理之仁也本自天下一家本自中國一人本自萬物一體人人具足不由外鑠不容一毫人力以增損之者惟一日克己復禮則已不逞乎血氣已不牿于形骸一日之間即能天下為一家中國為一人萬物為一體八荒皆我閨闥四海皆我度内而天下不其歸仁矣乎是故仁即無我之謂無我則自有條理而親親仁民愛物取之吾心裕如也不仁有我之謂也有我則為軀殻視至親如路人矣去其有我之私即為無我之體消其一己之欲即同天下之心正所謂仁者己欲立而立人己欲達而達人而天下人之立達皆由己以立達之則歸仁之機可識矣或曰非禮即己也必於視聽言動上克之何歟蓋人之一身除却耳目口體則無所謂已矣而不知形色天性也視所當視聽所當聽言所當言動所當動何一非禮也但其視也必欲快己之目其聽也必欲快己之耳其言動也必欲快己之口體而己之耳目口體反為外物所奪矣謂之由己可乎以己之耳目口體不得自由是可以為人乎人之不仁職此故也所以為仁之功不必逺求惟于耳目口體之間凡有一毫之非禮者勿視勿聽勿言動焉則心不為形骸所牿而廓然無我矣非仁而何信乎克己斯為由己而已即仁也不䧟于人心之危即為道心之微而道心即中也一翻覆手而隂陽分也識仁者其慎辯之下學上達孔子自十五志學以至七十從心所欲不踰矩無一日而不盡其下學之功亦無一日不得夫上達之妙也所謂下學者何自其致力處言也所謂上達者何自其得力處言也未有能自致力而終不得力者又豈有得力而不由于致力者乎雖工夫之初進或用力多而得力尚少惟工夫進進不已則日見其熟致力即已得力而未敢自懈其力焉嘗自日用觀之時其飲食猶之下學也飲食之變化以滋養血氣猶之上達也飲食之變化滋養雖非人之所能與亦非人之所能强者而節宣飲食之多寡惡可以一日而忽之哉孔子十五志學即志此下學上達之學也從心所欲不踰矩雖其上達非常情所能窺測而其下學之功則未嘗一日少懈故其言曰其為人也發憤忘食樂以忘憂不知老之將至斯言也孔子豈欺我哉或者又以孔子聖由天縱生而知安而行自上達乎神化性命之臭而學知何足以盡孔子之神明也是皆常人觀聖人也若孔子則曰聖則吾不能我學不厭教不倦也豈特不以聖自居且曰君子之道丘未能焉惟言有餘不敢盡行不足不敢不勉而其下學也有如此故其上達肫肫而言行相顧者即此乎在也然則聖人果下學人事上達天理乎蓋天下無理外之事亦無事外之理也猶夫農之于五穀焉耕耘収穫皆人事也苖秀花實皆天理也吾惟盡吾耕耘収穫之事而自具夫苗秀花實之理即此下學即此上達無時無處而不下學亦無時無處而不上達如此而分人事天理無不可者若人事天理分為兩截或以人事已畢然後上達皆不可也要非聖人有意以合之也道一而已矣精粗一致上下一原道之自然而然者也聖人一循其自然而不敢㕘之以一毫智識意見此所以下學自然上達吾惟節吾之飲食而血氣自充吾惟勤吾之耕播而苗生自盛由少至老不敢一息懈此所以不怨不尤而聖益聖也况堯舜以上善無窮則是上達者無窮而下學者又豈有窮盡哉雖然下學上達道本合一而知我其天則天人合一者不即此可以窺之哉今夫天行健自開闢以來未嘗一日息也惟其行健而不息所以資始資生絪緼化醇之無窮者自在其中也然則孔子之下學一天之行健而不息乎孔子之上達一天之絪緼化醇而生物之不測乎信乎知我其天而莫我知也但孔子于莫知無言之嘆每援天以曉子貢想亦因其庶幾性與天道而以是語之乎觀天階之喻則其智足以知聖人也端有自矣請討名分莫大乎君臣罪惡莫大於弑逆思以有道易無道而天下有大逆不道者不思倡大義以討而誅之仁人之心能一日安乎哉惟仁人之心不忍天下無道之甚至于無君故討賊以明天下大分其于賊之能討與否卒阨于時勢之不齊焉非所論也况弑逆之賊人人得而誅之不論其鄰與不鄰在位不在位茍有能興義旅以討之者雖出自匹夫賤役而其大義已伸于天下矣又豈必真能執其賊而誅之哉人臣無將將則必誅凡普天率土有能正其名定其罪聲言以倡義舉則天理在人心激之即動倡之必和雖奸邪跋扈中藏不軌者一聞斯言亦將禠其魄而落其膽矣所以忠臣義士其動舉若不過一節之微而其義有關于宗廟社稷綱常之重者每每使天常人紀既墜復振雖百世之下聞之且凛凛有生氣焉正以名義足以肅人心也觀唐肅宗播遷在草萊中悍將背闕而坐及李勉一彈劾之乃嘆曰吾有李勉一言足以尊朝廷而倡言討弑逆者其義關綱常當何如哉陳恒弑君天下之大變也孔子沐浴請討扶植綱常之大義也大凡仁人處無道之世其心已有大不忍者弑君之賊又法所必誅也孔子時在魯也雖欲不請討于魯其中端有不容己者矣左氏記孔子之言曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也謂此非孔子語由其以力不以義是也胡氏曰仲尼此語先發後聞可也蘇子瞻曰哀公患三桓之偪嘗欲以越伐魯而去之以越伐魯豈若從孔子伐之既克田氏則魯室自張三桓將不治而自服此孔子之志也子由曰齊桓雖中主然其所以任管仲者世無有也然後九合之功可得而成今哀公之懦非可以望桓公也使孔子誠克田氏而返將誰與保其功程子曰若孔子之志必將正名其罪上告天子下告方伯而率與國以討之即數子之言程子近之矣要皆以智謀測度聖人之作為也何也哀公之懦三桓之强不足與有立也孔子知之素矣知其不可與有立而不之請聖人不忍也好謀有成以戰則克孔子餘事耳而事求成一一如蘇胡諸家之計畫聖人有不為也不知孔子聖之時也天下無道思以易之此其仁天下之心未嘗一日忘而女樂一受雖魯國幾治弗顧也時乎天下有大逆不道如陳恒者沐浴請討乃其大義之不容己者矣若或義師一動由此可以勝齊可以强魯可以興周其神妙固非後人所能窺測而計功之心諒聖人所必無也已是故孔子請討陳恒只此一舉倡之魯庭當時君臣之大義已明載之魯論萬世君臣之大分已肅不必擬議其神筭為何如成功為何如而天理在人心者已覺而醒矣真若天地生萬物而天下雷行物與無妄化工之妙孰得而思議之哉雖然天地之造化固非人所能擬而無妄之在物者又未嘗因雷霆有所加聖人之化工固非衆人所能窺而大義之在人者亦未嘗因聖人有所益然雷霆之震驚聖人之舉動其神功自有在也故曰孔子修春秋而亂臣賊子懼為東周孔子夢寐周公志欲行周公之道也周公之道何道哉文武之道也二帝三王得以其道君天下周公不過相天下耳然大君天地之宗子大臣宗子之家相君相握天下之權總天下之政行其道以澤民利物致太平也一而已矣西周之盛周公親致之身親見之二帝三王之行于昔者行于西周之盛時思兼之心想無遺憾矣自今觀之監二代之典章頒一王之制度體國經野設官分職文謨武烈之精遍乎寰宇關睢麟趾之意浹洽民心薄海内外罔不率從俾皥皥乎天地太和之氣盎溢于西周宇宙間也此即堯舜禹湯文武之心堯舜禹湯文武之道而周公行之矣不特成康之世治隆化洽刑措不用自幽厲以前天下同文同軌而周公之澤尚流被無窮迨平王東遷周道凌夷禮樂征伐之權不自天子出至下堂見諸侯矣雖賴周公僅存之烈而列國尚知宗周未敢改物易姓然問鼎請隧射王中肩者莫敢誰何天子亦徒擁虚器于上耳囘視西周盛際曷能已于黍離之憂下泉之愾歎哉故詩曰誰將西歸懐之好音曰彼美人兮西方之人兮以意逆志其哀東周衰弱亦至矣此孔子所以志欲行周公之道而夢寐不忘欲挽其衰以還其盛也觀其終身煖席不暇皇皇焉若求亡子于道路豈得已哉此其心直欲以老安少懐之志見諸行事之實朞月而可三年有成庶幾海宇黎庶復覩西周衣冠文物之盛焉則周公之道于是乎行孔子之心于是乎少慰也奈何天下莫宗而卒老于行及公山弗擾以費叛召之欲徃其徃與不徃不可測但欲赴叛人之召其大不得已之心蓋可想矣子路不悦乃曰吾其為東周乎夫東周之規模氣象為何如者乃屑為乎此耶今即其辭氣以會其意正言其不為東周耳不為東周則必為西周之盛可知也孔子一出而用于世即可使天下復如西周則周公之道既以復行斯世斯民得悉被乎唐虞三代之澤又如之何必欲潔身山林不思一出以為之兆乎且召則能加之以禮即其良心亦真知聖人而能授之以政矣所以孔子知天下無不可化之人亦無不可為之時而語皆實語也觀他日欲徃佛肸之召不甘為匏𤓰之繫亦此意也深厲淺揭安足以識孔子之心哉至如東周君弱臣强以下凌上公山畔費正坐此弊即其不為東周其不徃公山亦自可見而其心亦戚矣嗟夫讀孔子之書當觀孔子之心也但欲以有道易無道孔子之心未嘗一日忘天下然當時如沮溺楚狂丈人之流且不足以語此後儒又謂孔子欲為東周是孔子之心其終于不白矣乎孔子之心不白于當時又不白于後世志孔子之道者惡容已於言哉或曰孔子非助畔之人彼豈不知而敢于來召者必有道存焉蓋費乃季氏私邑三家分據魯國故陪臣欲張公室畔季氏將以强魯也所以謂之召我豈徒哉此亦一説也執中民受天地之中以生是中也天之所以為天即民之所以為民也聖人代天子民舍中奚以哉是故執中之傳不徒徃聖絶學此其繼之實為天地立心生民立命而萬世太平一脉于此乎繫也夫天高高在上民生其間若不足為重輕况自天子視之其分又若此乎卑且賤矣孟子謂民為貴君為輕豈輕君而貴民哉得乎丘民為天子正以民心即天心也得民得天揭其要不過曰中而已矣論語末篇歴叙二帝三王本之典謨誓誥觀堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天禄永終夫天子膺上天厯數以統攝四海之民執中亦足以合天矣然民受天地之中以生茍四海困窮民皆不獲遂生復性謂之允執中也可乎哉此所以天禄永終謂不能安養上天所生之民即不克負荷上天之厯數而中之有關于天民也如此堯以此命舜舜以此命禹三聖相授受儆戒叮嚀若是其諄切者中之外無餘藴也所以湯執中而惟上帝之祗也曰萬方有罪罪在朕躬武建中而畏上帝之臨也曰百姓有過在予一人惓惓乎以罪過反諸己匹夫匹婦時切勝予之念惟恐辜上天厯數而此心有不容自己者在也故仲虺之誥曰惟天生民有欲無主乃亂惟天生聰明時乂泰誓曰惟天惠民惟辟奉天真有見乎天人一體而湯武善承堯舜禹執中之傳者此也順天應人易豈虛語哉不然揖遜放伐傳賢傳子若是乎不齊而允執厥中胡為乎後先一揆也後之君天下者莫不希名禪讓比迹征誅求如二帝三王以天地生物之心為心而用中于民者誰歟中也者天下之大本也人君不能濟美帝王非其揖遜放伐不相似也不能體天心立民命則大本不立惡足以望唐虞三代之盛哉或曰上帝作之君師而學必執中于以家四海子萬民何與哉蓋人之生也受中天地自天子至庶人一也故曰仁者天地之心茍不能視萬物為一體天下為一家中國為一人未免隔藩籬分汝我視至親猶路人且不可以語人也况生民以來未有之孔子耶觀其皇皇然必欲以有道易無道以求遂老安少懐之心是心也即堯舜禹惟恐四海困窮之心也即湯武萬方百姓罪在一人之心也即大學欲明明徳于天下中庸盡性參贊天地之化育也論語以此終篇意亦微矣孟子叙聞知見知以堯舜湯文孔子並列韓退之叙堯舜禹湯文武周公孔孟之相傳皆此意也奈何此學不明遂指中為寂體止觀収視返聽黙照圓通以為秘宻自私自利四大之外漠然不相關舉天下溺虚寂之見何怪乎聖學之不昌耶雖然道本一而二之非道也學本一而二之非學也明徳親民中和位育一以貫之者也古之學出于一貴賤一也治教一也窮達一也人我一也内外體用費隱寂感一也此人心所以正世道所以隆也後之學出于二貴與賤殊治與教殊窮與達殊人與我殊内外體用費隱寂感一切岐而二之此人心所以邪正道所以汚也何也人受天地之中以有生無二中也二之自絶于天自戕其命也志執中之學者惟潛神堯曰篇久久當自得之學大學叙嘗讀易見孔子以大贊乾知大始故也然乾之所以知大始者非即在人之明徳乎易知則有親非即明徳之必親民乎由此有親有功可久可大易簡而天下之理得矣非即知止而自然定靜安慮得乎此學之所以為大也然欲明明徳於天下而推其功之所先必先乎致知格物何哉乾陽物也坤隂物也真信得乾坤無形體而亦謂之物則格物之義明矣是故易九卦有曰復徳之本也復以自知復小而辨於物㑹而通之物有本末物格而後知至此謂知本此謂知之至也又何待辯哉噫物即至善之止復見天地之心而壹是皆以修身為本但止即止其所復修即修其所止此之謂先天之學子程子曰大學孔氏之遺書而初學入徳之門也於今可見古人為學次第者獨賴此篇之存而論孟次之學者必由是而學焉則庶乎其不差矣大學章句序曰大學之書古之大學所以教人之法也蓋自天降生民則既莫不與之以仁義禮智之性矣然其氣質之禀或不能齊是以不能皆有以知其性之所有而全之也一有聰明睿智能盡其性者出於其間則天必命之以為億兆之君師使之治而教之以復其性此伏羲神農黄帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法寢備然後王宫國都以及閭巷莫不有學人生八歲則自王公以下至於庶人之子弟皆入小學而教之以灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修己治人之道此又學校之教大小之節所以分也夫以學校之設其廣如此教之之術其次第節目之詳又如此而其所以為教則又皆本之人君躬行心徳之餘不待求之民生日用彛倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俛焉以盡其力此古昔盛時所以治隆於上俗美於下而非後世之所能及也及周之衰賢聖之君不作學校之政不修教化陵夷風俗頹敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀内則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規模之大而内有以盡其節目之詳者也三千之徒蓋莫不聞其説而曾氏之傳獨得其宗於是作為傳義以發其意及孟子没而其傳泯焉則其書雖存而知者鮮矣自是以來俗儒記誦詞章之習其功倍於小學而無用異端虛無寂滅之教其高過於大學而無實其他權謀術數一切以就功名之説與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出乎其間使其君子不幸而不得聞大道之要其小人不幸而不得蒙至治之澤晦盲否塞反覆沈痼以及五季之衰而壊亂極矣天運循環無徃不復宋徳隆盛治教休明於是河南程氏兩夫子出而有以接乎孟氏之傳實始尊信此篇而表章之旣又為之次其簡編發其歸趣然後古者大學教人之法聖經賢傳之㫖粲然復明於世雖以熹之不敏亦幸私淑而與有聞焉顧其為書猶頗放失是以忘其固陋采而輯之間亦竊附己意補其闕畧以俟後之君子極知僭踰無所逃罪然于國家化民成俗之意學者修己治人之方則未必無小補云右傳之十章釋治國平天下凡傳十章前四章統論綱領指趣後六章細論條目工夫其第五章乃明善之要第六章乃誠身之本在初學尤為當務之急讀者不可以其近忽之也大學古本序曰大學之要誠意而已矣誠意之功格物而已矣誠意之極止至善而已矣止至善之則致知而已矣正心復其體也修身著其用也以言乎己謂之明徳以言乎人謂之親民以言乎天地之間則備矣是故至善也者心之本體也動而後有不善而本體之知未嘗不知也意者其動也物者其事也致其本體之知而動無不善然非即其事而格之則亦無以致其知故致知者誠意之本也格物者致知之實也物格則知致而有復其本體是之謂止至善聖人懼人之求之於外也而反覆其辭舊本折而聖人之意亡矣是故不務於誠意而徒以格物者謂之支不事格物而徒以誠意者謂之虛不本於致知而徒以格物誠意者謂之妄支與虛與妄其於至善也逺矣合之以敬而益綴補之以傳而益離吾懼學之日逺于至善也去分章而復舊本傍為之什一以引其義庶幾復見聖人之心而求之者有其要噫乃若致知則存乎心悟致知焉盡矣大學問曰大學者昔儒以為大人之學矣敢問大人之學何以在于明明徳乎陽明子曰大人者以天地萬物為一體者也其視天下猶一家中國猶一人焉若夫間形骸而分爾我者小人也大人之能以天地萬物為一體也其心之仁本若是其與天地萬物而為一也豈惟大人雖小人之心亦莫不然彼顧自小之耳是故見孺子之入井而必有怵惕惻隱之心焉是其仁之與孺子而為一體也孺子猶同類者也見鳥獸之哀鳴觳觫而必有不忍之心焉是其仁之與鳥獸而為一體也鳥獸猶有知覺者也見草木之摧折而必有憫恤之心焉是其仁之與草木而為一體也草木猶有生意者也見瓦石之毁壊而必有顧惜之心焉是其仁之與瓦石而為一體者是其一體之仁也雖小人之心亦必有之是乃根于天命之性而自然靈昭不昧者是也故謂之明徳小人之心旣已分隔隘陋矣而其一體之仁猶能不昧若此者是其未動于欲而未蔽于私之時也及其動於欲蔽於私而利害相攻忿怒相激則將戕物圮類無所不為其甚至有骨肉相殘者而一體之仁亡矣是故茍無私欲之蔽則雖小人之心而其一體之仁猶大人也一有私欲之蔽則雖大人之心而其分隔隘陋猶小人矣故夫為大人之學者亦惟去其私欲之蔽而自明其明徳復其天地萬物一體之本然而已矣非能於本體之外而有所增益之也曰然則何以在親民乎曰明明徳者立其天地萬物一體之體也親民者建其天地萬物一體之用也故明明徳必在於親民親民即所以明其明徳也是故親吾之父以及天下之父而後吾之仁實與吾之父人之父與天下人之父而為一體也實與之為一體而後孝之明徳始明矣親吾之兄以及人之兄以及天下人之兄而後吾之仁實與吾之兄人之兄與天下人之兄而為一體矣實與之為一體而後弟之明徳始明矣君臣也夫婦也朋友也以至為山川鬼神鳥獸草木也莫不實有以親之以達吾一體之仁然後吾之明徳始無不明而真能以天地萬物為一體矣夫是之謂明明徳於天下是之謂家齊國治而天下平是之謂盡性曰然則又烏在其為止至善乎曰至善者明徳親民之極則也天命之性粹然至善其靈明不昧者皆其至善之發見是而是焉非而非焉輕重厚薄隨感隨地變動不居而亦莫不自有天然之中是乃民彛物則之極而不容少有議擬增損於其間也少有議擬增損於其間則是私意小智而非至善之謂矣自非慎獨之至惟精惟一者其孰能與于此乎後之人惟其不知至善之在吾心而用其私智以揣摸測度於其外以為事事物物各有定理也是以昧其是非之則支離决裂人欲肆而天理亡明徳親民之學遂大亂于天下蓋昔之人固有欲明其明徳者矣然惟不知止于至善而騁其私心於過高是以失之虛罔空寂而無有乎家國天下之施則二氏之流是矣有欲親其民者矣然惟不知止於至善而溺其私心於卑𤨏是以失之權謀智術而無有乎仁愛惻怛之誠五霸功利之徒是矣是不知止於至善之過也故止至善之於明徳親民也猶之規矩之於方圓也尺度之於長短也權衡之于輕重也故方圓而不止於規矩爽其則矣長短而不止于尺度乖其劑矣輕重而不止于權衡失其準矣明明徳親民而不止于至善亡其本矣故止於至善以親民而明其明徳是之謂大人之學大學原只是一章書無所謂經無所謂傳也亦無所從缺無所從補也蓋其書從頭至尾只是反覆詳明以顯大人之學其初説明明徳親民當止諸至善如一破題相似却即接連説但能知至善所當止則其意自定其心自靜其身自安以慮家國天下而自得其平矣此與箇承題相似却亦只是反説以見明親當止至善也於是又申明如何是當止之至善蓋明親這箇物事其末終貫徹天下而其本始却根諸身心此是一定格則先知得停當然後做得停當惟古之欲明明徳於天下者能如是焉所以身心家國無不停當而為明親之善之至也又决言自上至下既皆以修身為本而後停當若本亂且薄則决無停當之理所以必知本乃謂知至善也此却如小講相似亦不過將明親止至善衍説一遍至所謂誠其意者以下則如一大講逐件物事詳細條陳一段格則而格則最停當處則俱指示以淇澳等詩帝典等書又即是以古之明明徳於天下者為至善也推之如所謂正心修身所謂齊家治國平天下直至此謂國不以利為利而以義為利也總是每件物事與他一箇至善格子而學者所當知者也則一章書首尾原自相應亦自完全何容補凑天地之大非徒大以形也欲窺天地之所以大者當窺其大生之心聖學之大必有大之實也欲求聖人之所以大者當求其大學之道大學一書既曰孔氏之遺書而孔門之學脉果何在乎亦曰仁而已矣天地之大生非仁乎曾謂大學之宗㫖而有外于天地萬物一體之仁乎讀其書究其㫖當自得之矣是故揭大學之道固在明明徳親民止至善而約之以知止矣則知止其要也定靜安慮得自將馴致于涵養中也而至善之當止豈出於事物之外哉物有本末事有終始知所先後則近道矣盍於古之人而求之學主於明明徳而親民正所以明其明徳也故欲明明徳于天下必先于治國齊家修身正心誠意致知格物如此而知所先格物而後知至意誠心正身修家齊國治天下平如此而知所後而一是皆以修身為本又約之以知本斯為知之至矣知本知止知所先後也學豈有二宗乎夫知即明徳致知即明明徳也既曰知止又曰知本何也至善者至人固有之天則雖萬物之咸備實一物不可加是物原至善也但有本末存焉真知本之所在則物格而知止矣即修身為本一語觀之謂身為本則國家天下為末明矣身為本家國天下為末則所謂物者即身家國天下同為一物明矣身為物本家國天下為物末則所謂知本為知之至者即知身為家國天下之本乃所謂知之至也又明矣况有是天下國家身心意知之物即有是格致誠正修齊治平之事而本末終始先後又何待言哉然則身之為物也存之為心意知達之為家國天下浩浩乎天地同流民物胞與本無窮盡本無間隔孔孟所謂仁者人也形色天性也皆是物也其本末厚薄雖各有等殺而一皆天生蒸民之物則也何如其至善哉夫人同是物而必欲格之何也非於物有所加也是以陽明先生謂良知祗用安排得此物由來自渾成茍欲致吾至善之知全吾明徳之體惟工夫即本體本體即工夫不敢以一已智識亂其知本之明而一順乎帝則是也既知身即公好公惡之本由是隨所應感一惟毋自欺以慎其獨焉斯已矣所以曾子傳大學深致嚴于斯也誠意之君子惟能如好好色如惡惡臭而徳潤身焉則自心身以達之家國天下忿懥恐懼好樂憂患不滯於有所親愛賤惡畏敬哀矜傲惰不溺於一偏有諸己而後求諸人無諸己而後非諸人而仁讓興於國民之所好好之民之所惡惡之而絜矩于天下要皆此物格而止至善也故曰惟仁人能好人能惡人夫前言慎獨而獨即矩也後言絜矩而矩即獨也皆此至善之物而異其名焉耳徵諸詩書如堯湯文武武公之學夫豈有二道哉然親民以明其明徳而約之於知止格物以致其知而約之於知本信乎學無二道矣所以修身為本而自明自修若不過一人之身耳謂之為大學之道者正以人皆有不忍人之心而原非形骸之所能隔則此身豈小物哉故明徳非一於内也即天下國家統㑹於吾身之心意知而自不容間者也親民非一於外也即吾身之心意知貫徹乎天下國家而自不容己者也知有一毫之不至意一毫之不誠心一毫之不正固不可以言身之修而天下國家漠然與我不相關且視天親猶途人也可以言修身乎是故知吾身之非小則知聖學之本大彼徒事於格致誠正而不知親民者是二氏之自私其身也徒事於齊治均平而不知明明徳者是五霸之自遺其身也皆不可以語仁也大學之宗㫖不明於後世也有由然矣夫知修身為本而天子與庶人一者何哉位有崇卑學無小大堯天子也堯明峻徳以漸致親睦平章協和之化其仁固如天矣孔子庶人也己欲立而立人己欲達而達人老安少懐不厭不倦亦何異於堯也後之人皆知宗孔子之學而惡可以庶人自諉耶雖然孔子十五志學即所謂欲明明徳于天下是也人孰無所欲哉果有志於大學之道我欲仁斯仁至矣天之生人有物焉完具於其身至善也至善無物也而有本末不得不謂之物無物而萬物備也知其靈覺也意其生意也意原於知而其端甚微道心惟微也吾身之所以為本也天下國家皆末也本始皆統原于一本而其實一物也屬之於為故謂之事格致誠正修齊治平是也明明徳于天下事之終也而欲明明徳即為始事致吾之知在止于至善之一物者事之始也而知至知終同為一知有終始而其實一事也事不離物物不離事知所先後學之道也是以下者自天子以至庶人壹是皆以修身為本先本而後末厚本而薄末未有外其身而為天下國家者也必以修身為本謂之知本非茍知之實能至之是謂知之至也至斯止矣不至則不止不慎則不至知之至其為慎獨乎獨即本也本即至善也天之命也藏之至寂而發之至微微之顯誠之不可掩也其動而後有不善者不慎故也慎則何不善之有大學大㫖問大學古本悉遵王文成公表章是矣然前云明明徳親民止至善而當知所止矣復云事物之先後何也曰前三在舉其槩後六先推其詳蓋天下國家身心意知總是明明徳親民然雜施不遜獵等無序可乎故自欲明明徳於天下歴推其所先莫先致知矣致知在格物正所謂知止至善也問明徳與知明明徳與致知果不同乎曰姑即明與知之字義分别之明其知之全體知其明之發竅雖謂明為體知為用亦可也明之則無所不通致則隨所發竅推而廣之以要其極也問文成謂親民正以明明徳也或問中發揮仁者以萬物為一體至精切矣然明徳知也一體之親仁也曾謂知即仁乎曰明徳一也知仁皆明徳之别名耳蓋人心明覺未有不知痛癢者醫家以手足痿痺為不仁謂不自知其痛癢也孰謂明覺親愛有二乎哉試觀孩提之良知未有不知愛其親者大人特不失乎赤子之心耳問明明徳親民固體用一原然必親民而後謂之自明歟曰非有意以致其親也記云凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類况有血氣之屬者莫知於人乾父坤母民胞物與原來國家之民皆是一體之親亦因其本親而親之耳問明親無二孔子於知人愛人發之矣他亦有所證乎曰易繫謂乾知大始乾以易知易知則有親有親則可久孰謂人道非天道乎問明徳外無至善又謂學有知止為急務而止至善外復有定靜安慮何也曰至善即明徳之本體所謂天然自有之則不待人力安排即朱子所謂盡乎天理之極而無一毫人欲之私是也果能知止乎天理之極則漸漸定靜安慮實有諸己而能得矣問物猶事乎致知在格物與知止至善一乎二乎曰天下國家身心意知一物也有是物即有是格致誠正修齊治平之事是物也有物必有則本至善也世有致知而不止乎至善之物則故凡致力于國家天下者有似于親民而昧乎物之本致力于身心意知者有似于明明徳而不可以治天下國家要皆出乎智見之安排而不能格乎物耳問物格則知至知至則止至善矣又謂之知本何也曰物有本末而身為物本茍徒明義理建事功而身不足法亦末矣故云自天子以至於庶人壹是皆以修身為本其本亂而末治者否矣真能知修身為本者此謂知之至也非即物格知至之謂乎問既云知止又云知本知至何也曰至善原于天修身存乎人知本而不知止固失其本然之天則知止而不知本又失其當然之人功惟知止至善而一本之修身焉盡之矣問欲明明徳於天下果欲使天下之人皆有以明其徳乎曰真信得體用一原人我無間如此説亦是蓋己欲立而立人己欲達而達人即欲仁是也况可欲之謂善茍不欲明明徳於天下又何以止至善乎問孔子十五志學直至七十始從心所欲不踰矩何可遽責之初學耶曰格物正以滿乎此欲之量耳子以物之大而格之難乎夫所惡于上即明徳中所同有者毋以使下即親民也推之上下左右前後莫不皆然始焉己所不欲勿施于人終焉從心所欲不踰矩而止至善矣問文成謂大學之要致知焉盡矣而格物之㫖在格其不正以歸于正然歟曰窮至事物之理固懼其偏于外矣意之所在為物如意在事親則事親為一物意在忠君則忠君為一物得無懼其偏于内乎夫是物也原不可以有無内外精粗截然二之也但二先生雖各有定説然知性格物之謂非朱子之言乎良知抵用安排得此物由來自渾成非王文成之言乎合二先生之言觀其會通格物之㫖了然矣問談名理止至善極矣下文乃舉事物言之果恐人之涉虛見乎曰人莫不云這物事不過舉有形象者謂之物舉逐日幹辦者謂之事而天下國家身心意知總謂之物格致誠正修齊治平總謂之事誰則知之物事自有本末終始先後要在重本始急先務誰則知之若終生只此一事一物而物格止至善尤難知也所以謂之大學本在修身先在格物問修身為本之本果不對末言乎曰天之生物使之一本安得有二本也惟不信格物之物即物有本末之物故有二物即有二本矣試觀一篇之内物有本末致知在格物物格而後知至一是皆以修身為本其本亂而末治者否矣此謂知本此謂知之至也無二物也無二本也無二知也二之則不是問文成表章大學古本原只一篇不必分章不必補傳是矣旁註雖云歸重致知序則云大學之道誠意而已矣似亦以前為經因提所謂誠其意者起頭故重誠意則又以下為傳其果然歟曰既信原是一篇而所謂又似起頭則二篇矣獨不思此謂知本此謂知之至也此謂二字得非承上文物有本末物格而後知至言之乎真信得物格知本為知之至矣則所謂誠其意者𦂳頂知本知至言也然則謂誠其意者毋自欺也非即上文欲誠其意者先致其知乎何也毋自欺者毋自欺其所獨知也致知即誠意實用功處不過㸃出意之好惡使人于此實致其知而已矣故慎獨二字包誠意致知言也獨即此一物也安得以上文為經此為傳分作兩截耶問誠中形外在小人亦可謂之誠乎曰聖人指㸃誠偽之分莫有切于此者如閒居為不善見君子則揜不善而著其善此是偽處人之視己如見其肺肝然在小人却知得自家不善故這㸃真心都發露在外謂非誠之不可掩乎惟其誠中形外幾不可掩所以君子必慎其獨而曾子平日謂其嚴如十目所視十手所指也問近時提揭大學或致知或誠意或修身而子必欲依本文先在格物何也曰非予欲先之也依經文耳提修身者得其本矣不推其所先則不格乎物此本從何而出提誠意與致知則知所先矣而不知所在則物有不格此知何由而至故物格則知所先後知本知至而知止矣謂予有意先之則惡乎敢問誠意而下歴引詩書孔子之言皆所以廣誠意也誠意為大學之要非歟曰格致誠正以修其身原只一事聖人于其中逐一細細剖析使人惟精惟一不可紊不可雜耳蓋上文此謂知本知至己包修正誠致在其内雖天下國家不過舉此以措之耳故雜引詩書不獨身心意知明明徳親民止至善渾作一團如盛德至善民不能忘雖没世不能忘而齊治均平莫不含蓄在内故總以知本収之豈專為誠意發也問康誥太甲堯典皆自明其明徳也盤銘康誥周詩得非釋親民乎何為謂親當作新者非也曰古文原是親字文成謂其不必改耳况日新承上文自明不已則日日新作新民以至新天命無所不用其極若不觀其會通惟拘執字義則日新新命可以謂之釋新民乎問止至善乃在仁敬孝慈信得非專言至善之散殊耶曰緝熈敬止見諸君臣父子與國人交統體散殊已兼之矣是故人倫明于上小民親于下此正是聖人明親之實學也豈教專空寂外人倫以求至善者可同語哉問修身𦂳承上文知本是矣此復舉身心並言之何歟曰形色天性也有是身即有是忿懥恐懼好樂憂患之感只一著于有所便是心不正不正便是心不在一身之間凡視聽飲食亦不自知矣可見心中好惡之意或有發得是處謂之不誠亦不可惟稍有沾滯便非此心常寂常感之正體也此所以修身必先正心身不專于形骸之末心不專于方寸之間忿懥恐懼好樂憂患總屬之心而見諸身者一落于有所則心即不得其正可見渾身都是心也如上天生物之心盎然太虛之内日月星辰風雨露雷何一非天故萬象森然無一能為太虛障碍者可見身不可有所固不專指方寸亦不專指形體而形神渾融為最難問修身齊家專自好惡言好惡果足以盡修齊之道乎曰人心所發不越好惡兩端公好惡則通之家國天下而各當作好作惡則行之一身一家而不通如親愛賤惡畏敬哀矜傲惰乃人人所必有者有所且不得其正况之其所而僻焉可乎蓋人心公溥則明通偏邪則暗塞此所以好而不知其惡惡而不知其美也况溺愛不明貪得無厭此尤人之所同患者只此兩語凡有身家者可以諺而忽之哉人以一身應接乎家國天下雖有尊卑老幼親踈逺邇之殊而此心之明徳則無弗同者事親謂之孝事君謂之忠事兄謂之弟事長謂之敬恤㓜謂之慈使衆謂之仁雖曰其為父子兄弟足法而後民法之要在先慎乎徳不慮而知不學而能一出于天性固有之良觀諸慈㓜一端未有學養子而後嫁者可知也彼母之于子一體而分真誠惻怛皆其本性凡拊摩鞠育呼吸相關撫恤百端自中肯綮蓋由情真則機自通心誠固法自善也欲明明徳于天下國家一體流貫心誠求之有不與民同好惡也哉故曰如保赤子民之父母孰非其親親不容自己者哉所以興仁興讓興孝興弟殆猶赤子之慕慈母自有不容己者在矣噫真信此者始可與語明明徳親民之學問大學言止至善矣復言格物言知至矣復言知本言慎獨矣復言絜矩何歟曰大學之道一也明親必止乎至善者盡性也格物即至善之天則本即此物至善之本諸身獨即此物至善之原于一矩即此物至善四達不悖也問學貴自悟乃歴引詩書以證之何歟曰學必師古此説命言學所自始也故歴引詩書見堯舜湯文以及衛武乃後學之模範也所以古之欲明明徳于天下國家者必本于修身而先于正心誠意致知惟在格物都是如此豈後世單提直指不立文字者可倫哉問中庸言教必原之天命大學言學只歸之至善何歟曰至善即是天命之性而止至善即是明明徳之極處所以古人欲明明徳于天下推其所先只在致知格物正以物原統天下國家身心意知無不包無不貫也故下文證諸康誥太甲堯典湯銘自明不已則日新以至于新民新命無所不用其極這纔是至善所當止如君臣父子與人交必止乎仁敬孝慈信而何所不用其極哉後言峻命不易惟命不于常無非教人盡性以至于命也豈特顧諟天之明命為大學之真功耶明親止學與道非二也道以言其體學以言其功惟本體明徹則功夫庶乎不差而學固所以學此道也故大學必首揭學與道而串言之不徒曰明徳必曰明明徳不徒曰民必曰親民不徒曰至善必曰止至善本體工夫一齊呈露道之外無學矣否則學其所學非所以為大學道其所道豈大學之道哉然徳本明也必欲明之何也是徳也即人之性也即徳性良知之通明是也在天為明命在人為明徳吾惟因其本明者而明之所以為學也方其未明或有氣拘欲蔽固必加夫磨礪之功及其既明恐復有拘蔽亦不忘夫緝熈之力未失者常保其明而不息既失者必復其明而後已此所以功夫即本體也然民而必欲親之何也是明徳也本與天地萬物渾然同體本與天下國家之人一體而分者也即孩提知愛知敬之良原與斯人無所間隔是也吾惟即其本親者而親之而親民正所以明吾之明徳耳雖曰吾于天下國家之人未嘗無厚薄之等然天下一家中國一人非强合之也即如一身未嘗無手足腹心爪髪之殊而無故拔一髪傷一爪焉其心有不忍耳所以愛親者不敢惡于人敬親者不敢慢于人而無故斷一樹殺一獸非孝也人皆有不忍人之心而明明徳者其能忍于一體之親乎然明明徳親民而又止至善者何也至善者即明明徳之本體也即孩提之愛親敬長原自不學而能不慮而知者是也止之者明明徳親民一循乎繼善成性之天則不容有一毫作為增損于其間即書之安汝止欽汝止也不學而能不慮而知固不以孩提而有所減不思而得不勉而中亦不以聖人而有所加詩云不識不知順帝之則上帝所以懐文王之明徳者不在是哉奈何世之人語以聖人之不思不勉則畏之而不敢為語以孩提之不學不慮又忽之以為不足為此曷故哉不知大學之道云爾大人者不失赤子之心以言其學則學之大也以言其道則道之大也何為捨大學而趨小道畏聖人而忽赤子哉然明親止固足以括大學矣又有八條目云者何也天下之道博之雖千萬語而不足約之則一言而有餘故總三語即繼之以知止何其約也析三語而謂格致誠正修身為明徳齊治平為親民自所謂誠意以下為各條之傳亦無不可者何其博也况身心意知非明徳之專于内也即所以為齊治均平之主宰家國天下非親民之專于外也即所以為致誠正修之流行則是本末非二物終始非二事自明明徳于天下直推至格物所謂合天下國家身心意知為一物也不信然哉一物有本末之分壹是皆以修身為本此謂知本此謂知之至也知至則知止矣是故明明徳親民總歸之至善而約之以知止天下國家身心意知總歸之格物而約之以知本曾謂聖人有二學而學有二道哉本體功夫原不相離而學與道又豈有二乎哉知止宇宙間凡人與物莫不有歸宿之地而後能遂其生也否則食息起居行藏進退貿貿焉莫知所之求一日安定不可得矣此歸宿之地乃人與物之所必有者而學可知矣大學所謂知止指歸宿言也易艮止詩敬止書欽止安止皆此意也然則止之云者果歸寂之謂乎蓋於穆之體運而不息天之止也宥宻之衷應而無方人之止也寂而未嘗不感感而未嘗不寂顯宻渾淪淵浩無際故易以動靜不失其時發明止之義也何可專以寂言耶然則以至善為歸宿果有方體可指歟人性本善至動而神至感而寂虛融恢廓本無内外顯微之間而一有方所非至善也然則知止云者果知識至此止息而復其無知之體歟蓋真知之體虛明洞涵固不可以分别是非為了徹亦不可以智識見聞為證解而性體瑩然灼見天則况知其所止原有聖訓物格知止且有明徴惟詳玩大學本文其義具備何必巧為之説也是故邦畿千里惟民所止民各有所止曾謂學而無所止乎綿蠻黄鳥止於丘隅鳥尚知所止也曾謂人而莫之知乎仁敬孝慈信文王所以緝熈敬止也曾謂大學之止豈出倫理之外而别有虛寂所當歸宿者乎可見日用倫物皆性也至善之性即止也在己之心身意知而言謂之明徳謂之仁敬孝慈信在天下國家而言謂之親民謂之為人君臣父子與人交所謂明明徳親民止至善即為君止仁為臣止敬為子止孝為父止慈與人交止信雖至善乃天理之渾融不可名狀而性善隨人倫以散見不待安排殆隨其萬感萬應各當天則而一真凝然無聚散無隱顯自爾安所止也所以大學之道雖只提止至善一語亦足矣必自明明徳親民説來者豈無意而云然哉正恐離親民以明明徳者斷情慾以證圓覺亦近似矣何與於君臣父子之倫離明徳以新民者肅法制以致小康亦其止念息機之談以為宻秘寳藏肆言以傅會聖經陋亦甚矣胡不即大學上下全文以會通其立言之㫖哉或曰人之性本善即人之知本良也是知即止至善矣何必知其所止而後得耶曰人性莫不有知也好智不好學者其失蕩性善莫不自止也日用不知者其失迷故知其所止正復以自知開發有覺之靈即止乎至善之體内外瑩徹微顯昭融所謂致知在格物物格而後知至是也何必寂然觀空離出入息以為止耶或又曰知一也既云知止又云知本何也曰知為此身之神靈身即此神之宅舍是良知具足于身中惟本諸身以求之則根苗著土自爾生意條達將來合抱參天此其本也故止即此身之止於善本即性善之本諸身止外無本本外無止一以貫之耳但言知止不言知本恐人以頓悟超脱為究竟終涉𤣥虛言知本不言知止恐人以檢飭制行為真修終歸强作于此會而通之學必以性善為歸宿也不信然哉格物大學之道道本大而學亦大也在明明徳親民止至善而約之以知止矣下文乃詳言之即揭此事物之本末終始使知所先後故自明明徳於天下探本窮源曰致知在格物物格而後知至可見格物其大學之統括而道之所以為大乎物亦大無窮際而未易窺測者乎古今格物之論亦多矣茍能身體力行各就所入以為功皆可謂之學特非大學之道也今之辯者不過指傳註與傳習録中數語以相角耳謂在物之理有未窮故吾心之知有未盡是欲先外以及内也謂致吾心之良知於事事物物是欲先内以及外也知與物均之有内外之别也豈大學之㫖與大學本㫖謂何物有本末壹是皆以修身為本其本亂而末治者否矣此謂知本此謂知之至也凡言物與此不相契者非大學之所謂物矣然則格物之義云何知修身為本其與知止之㫖尚二之焉非知之至也知之至者真知身為物本而止乎是物天然之則安安於吾性至善之歸也嘗誦大雅蒸民之詩曰天生蒸民有物有則民之秉彛好是懿徳孔子曰為此詩者其知道乎故有物必有則是物則也即天命之性渾然至善通天地徹古今無内外無人物合天下國家身心意知一物也天下之平國之治家之齊身之修心之正意之誠知之致與夫本末終始先後厚薄皆是物自然不易之天則也明明徳親民止至善者止于斯耳知止于斯故為君止仁為臣止敬為子止孝為父止慈與人交止信隨其所止各當其則而止至善也特本在乎身其為父子兄弟足法而絜矩於天下矣可見物格則知至知本則知至身即物之本而知止至善也但此學不明世之提格致者以修身為格致之條件而不知其本提知本者以格致為修身之事功而莫知所先不思知至一也若知本格物判然兩途且與知止各一其㫖是大學有二道作聖有二功矣二其功者可以語大學之道乎天地間物一而已矣吾人知一而已矣大學前云知止後云知本知果有二乎哉前云物有本末後云致知在格物物果有二乎哉前既云本末矣後云壹是皆以修身為本其本亂而末治者否矣本果有二乎哉前云物格而後知至後云此謂知本此謂知之至知至果有二乎哉可見一篇無二物也無二本也無二知也此所謂大學之道也何也天下國家身心意知一物也就一物之中而指其本則修身為本也知修身為本斯為知本斯為知至即所謂知止即所謂物格而知至也大學之道豈不明白而易簡哉夫本不難知矣何知本之難其人也蓋自聖學不明世之人既無明明徳於天下之欲欲則不肯先之以致知格物之功其欲也不過功利之私其知也不過聞見之知孰知是物也即所謂仁者人也即所謂形色天性也吾性之仁渾然萬物一體中國一人敦化川流顯微無間不離乎形色之人也心不正意不誠知不致不可以語修身矣家不齊國不治天下不平可以語身之修哉故統一物言之雖有本末之分而其本則在乎身以身之所處不於家則於國不於國則於天下不能舍斯人而獨立也是以心意知之完具于身者非淪於無也實與家國天下之人相為貫徹家國天下之體備于身者非滯于有也實由心意知以為之經綸知修身為本者非徒解釋乎義理已也真知本者必能格物以致其知誠其意正其心精神凝聚融結而肫肫其仁焉則誠諸中形諸外有諸己求諸人盛徳至善民不能忘家于此乎齊國于此乎治天下于此乎平浩浩乎直以一身通于天地萬物上下同流明明徳親民而止至善矣此所以總結曰自天子以至於庶人壹是皆以修身為本噫惟仁者為能與物為體大學一書即孔門求仁之方豈非修身固不足以立天下之大本非知本豈足以語聖人之大學格物天高地下萬物散殊雖一物不知乃其所耻俗學執而不化所以滯于有也萬物生于有有生于無吾有一物無頭尾背面名字異學蕩而無歸所以淪于無也蓋由見之偏而未會其全故有無分而二其物矣豈特二其物焉已哉且以虛實論知如致知則致為虛知為實知即明徳也所謂不虚之良知是也如知止知本知所先後則止本先後為實知為虛所謂知性知天是也不思知一也明徳為體明明徳止一明字即用如康誥明徳是體克即用帝典峻徳是體克明即用論語知之為知之不知為不知是知也何有于虚實體用之分哉可見體用原不相離徳性之知即知覺之知知覺之知即徳性之用猶之乎一人之身對祖父則稱為子若孫對子孫則稱為父若祖雖隨其異稱不因人之稱而改移其面目也不識其面目而止隨稱名以增擬議所以覿面不相識者多矣蓋縁二其物故二其知則其分知與物而二之者又不待言也試以物言之萬物皆備於我今之談者必曰萬物之理皆備我之性談致知格物必曰致吾心之知窮在物之理不識聖賢著述何為吝一理字必待後人增之而後能明其説也易謂乾陽物坤隂物中庸謂不誠無物亦將加一理字而後明乎理一分殊言各有攸當也自物之本末言之天下國家身心意知物之分殊何如也自事之終始言之格致誠正修齊治平事之分殊何如也然合天下國家身心意知而統之為一物合格致誠正修齊治平統之為一事而事之先惟在格物事物之理一為何如也且大學之道探本窮源惟在格物而身為物本一是皆以修身為本聖賢垂訓何其詳切簡明一至此哉諒哉物一而已矣無而未嘗無有而未嘗有一實而萬殊萬分而一本故中庸一言以盡天地之道曰其為物不貳則其生物不測易繫曰乾知大始坤作成物又曰復以自知復小而辨於物合而觀之知果一乎否也物果一乎否也知之與物一乎否也真信其體之一則用自不容以不一皆不待辯而自明矣否則各執其見各是其説而不相通故人為萬物之靈茍昧格致而淪於無自以為靈明常惺惺矣何以使物各得其所也泥格物而滯于有自以為百物皆通矣何以通天地萬物為一體也然則欲通天地萬物為一體便物各得其所以充滿乎至善之分量者又可於天生蒸民之物則而莫之省乎或曰傳註與傳習録果不相通歟曰學者欲觀其會通須合二先生之書以會其全焉晦翁先生辯蘇黄門老子解有云道兵器之名雖異其實一物也故曰吾道一以貫之陽明先生詩云良知祗用安排得此物由來自渾成于此得意忘言二先生潛孚黙契蓋可想矣或曰格物之㫖合内外虛實有無隱顯而一之然矣然必以脩身為本未他有所證歟曰哀公問何謂成身孔子對曰不過乎物又曰仁人不過乎物孝子不過乎物是故仁人之事親也如事天孝子之事天也如事親是故孝子成身夫成身在不過乎物非孔子從心所欲不踰矩其孰能之雖然求物于散殊者其失也支離滯固物而不化人易識也異教則單提虛寂為宗云恍兮惚兮其中有物云有物先天地無形本寂寥祖其説者反援聖經無聲無臭寂然不動諸説以證之使高明超脱之士咸溺志于無物之歸俾大學之道愈晦而塞格故不得不於大學格物詳辯之也噫乾知坤作不貳不測萬物皆備有物有則致知格物辯物自知天人性教一以貫之顧人之自信何如耳修身為本嘗讀程子全書謂人於外物奉身者事事要好只自家一身與心却不要好以此泛觀世間其人人之通病乎夫以一身處覆載中不啻滄溟一浮漚耳倐起倐滅于滄溟無增損也其自待之小甘為外物驅役困苦豈上天厥付不均而分各有限制耶及讀大學謂自天子至庶人壹是皆以修身為本乃知吾人原合天下國家身心意知為一物就物之本末觀之乃知身為物本天子庶人分為崇卑身無大小真知修身為本者此謂知本此謂知之至也人可自小其身哉學有大小而人之小大因之耳然大學之道其㫖意若未易窮詰而揭其要修身為本一語足以括之矣何也兩間萬類渾然一氣雖名象各别而物則本同何獨于吾身而疑之所以天下國家即身之統體而大無外也心意知即身之藴蓄而小無内也若止認塊然骨骸為吾身而不能致知格物以直窺天地萬物一本之原則砥礪名節整飭行檢亦有似于身之修矣内焉豐蔀屋以自蔽藏而徳有不明外焉樹藩籬以分汝我而民有不親則天然至善之性吾自桎梏之而莫之覺矣豈大學修身為本之教哉惟此學不明故有從事于身以外者亦若可以治天下國家矣然法制森羅事功炫赫非不足以表暴此身之設施而刻花鏤葉其如本實先撥何有從事于身以内者亦知自淨其心意知矣然止觀定慧了悟圓通非不足以解脱此身之拘縛祗亦拳局其本根以求活于盆盎堦砌間耳此所以學必求乎大學知止知本之道而後可以通天地萬物為一身合天下國家為一體也且形色天性原無精粗無内外也學大學者果知修身為本則知吾身即天地也原自為物不貳原自生物不測原自一物不著原自萬物皆備知即根本之通明其于家國天下洞然無疑而此身常著察焉致知者致此也意即根本之發生其于家國天下盎然同春而此身常活潑焉誠意者誠此也心即根本之真宰其于家國天下廓然無碍而此身常清寧焉正心者正此也凡視聽言動之間喜怒哀樂之際大而綱常倫理微而食息起居朝乾夕惕毋自欺其至善之物則焉雖萬感俱寂此身非無事也天下國家之經綸已于此乎藏諸宻而靜非無也雖萬感紛紜此身非始有事也心意知之所主宰隨其酬酢澄然不撓而動非有也為君止仁為臣止敬為子止孝為父止慈與人交止信惟其身之所接而物則周流我無所與故己欲立而立人己欲達而達人安人安百姓胥此乎存焉信乎格致誠正齊治均平只修身為本一語足以括之矣或曰易復之初九不逺之復以修身也言内也家人上九威如之吉及身之謂也言外也大學正心誠意致知不專於内乎曰物無内外故身心皆合内外言也何也人知忿懥恐懼好樂憂患存諸心也何為原又有所只自身言人知視聽飲食形諸身也何為不見不聞不知味皆由於心不在耶此所以心不正則身不修身不修則家不齊國不治天下不平如好人之所惡惡人之所好是謂拂人之性災及其身矣孰謂身心可專以内外分言之哉或曰如子之意則身有所忿懥不當改身為心歟曰觀人之忿懥者必有怒容恐懼者必有戰色好樂者必有笑顔憂患者必有愁態則其所謂有所果屬之心而非身乎不然何掩不善而著善者乃肺肝之如見也此所以身心相貫人已相通身不行道則不行于妻子而其身一正天下歸之矣修身為天下國家之本也又何待他釋哉或又曰子前取證成身不過在物則本即物有本末之本矣有謂此本不對末言者非歟曰天之生物也使之一本正言無二本也况本亂則末不治聖經已有明訓何必取證天上天下惟我獨尊必欲脱離四大之幻身求所謂法身化身報身而身外有身始為真知本來面目哉噫不求明格物而及竊禪宗止義以深言其本也抑末矣毋自欺昔嘗誦大學誠意章得毋自欺語不覺豁然醒欣然喜此中若有所持循追惟陽明先生曰大學之道誠意而已矣信哉斯言也誠意工夫只此一語足以蔽之毎謂此三字符終身誦之可也蓋自誠明謂之性自明誠謂之教非分兩等人言也天之生人也其渾然樸實處明自生焉此天命之性也聖人之教人也由了然明白處而誠斯存焉此修道之教也所以誠則明明則誠非判然不相合者大學曰欲誠其意者先致其知而由教以入也得非自誠明哉夫自欲明明徳於天下追其功之所先至致知焉止矣致知在格物則無先後之分矣可見致知即誠意之實功也即古本觀之此謂知本此謂知之至也所謂誠其意毋自欺也既云知之至也稍渉自欺則知不致矣意何自而誠耶是格物致知誠意只毋自欺足以括之若曰如之何以致其意又如之何以誠其意明誠各一其功也奚其可難者曰温公語劉元城終身所行只在乎誠而行之自不妄語始元城力行七年而後成此非無自欺者乎不知用功真切如元城亦可以為難矣謂此即大學毋自欺之功則未也何也元城原非知本之學也若謂元城為能誠焉則趙清獻晝之所為夜必焚香告天司馬温公平生所為無一不可對人言者皆至誠之聖人矣吳草廬何為乃云未免行不著習不察也惟其原未知本原不可以語知之至則不可以語聖之誠也明矣蓋自天子至於庶人壹是皆以修身為本真知修身為本者必真知天下國家身心意知為一物而反之此身凡立本之道悉洞徹不疑即前云知止即孟子云知性知天此所以為知之至也斯人也一毫不敢自欺而知止至善矣又何意之不誠哉且欺之云者非徒欺瞞己也即世云欺侮是也悍僕之欺主强臣之欺君原不知君位主翁之至尊故敢恣其凌侮無所顧忌而人之自欺其天君主宰殆有甚焉信乎毋自欺其知本之知則知至意誠管是矣然人毎自欺其知豈有他哉好惡偏而邪暗塞也夫好惡乃人心天機所本有者非去思絶念不起意之謂也如惡惡臭無作惡焉如好好色無作好焉此之謂自謙而能慎其獨知矣雖好惡萬有不齊獨知常止于至善雖謂之無好無惡可也故曰欲誠其意者先致其知知至而後意誠也可見好好惡惡知之原于天性者不待見聞探索而知無一息之不明如惡惡臭好好色意之發于天機者無所將迎畱滯而意無一毫之不誠惟時時毋自欺則心身家國天下一以貫之何也人未有内不欺己而外欺人者也故意發于身心而好惡不着于有所我自知也我自不欺此物則也斯心正身修而徳明于身心矣意動于身家而好惡不至于少僻我自知也我自不欺此物則也斯身修家齊而明徳于身家矣意動于家國而本恕心以好惡我自知也我自不欺此物則也斯家齊國治而徳明于家國矣意動于天下而同民心以好惡我自知也我自不欺此物則也斯國治天下平而明徳于天下矣是明明徳于天下而功惟在乎毋自欺匪特民不能忘且没世不能忘而能民無訟焉則合家國天下之民皆毋自欺矣孰謂毋自欺非大學之要訣乎要之章首欲明明徳于天下而其始在於格物物一格而其終至于天下平末章以絜矩為平天下之道豈格物之外别有絜矩云乎哉絜矩即格物之義毋自欺即格物絜矩之實也一毋自欺而格致誠正修齊治平無餘藴焉何其簡而易也但毋自欺三字以之語市井販夫莫不警醒若論其功夫雖久於問學者未必能實踐也惡可以其近易而忽諸孝弟慈天下國家本諸身學誠大矣究其本㫖身之所以通乎家國天下者不出孝弟慈也學者昧之反求至善于虛寂而不求止于仁敬孝慈信焉大學之道安在哉嘗與同志論此因記其畧有謂古之學者為己志學之初即欲明明徳于天下不幾于為人乎蓋己非軀殻之謂也仁者人也形色天性也天性之仁本合天地萬物為一體而非强合之也家乃身之積也國乃家之積也天下國之積也其初也盎焉太虛吾身與天地萬物皆一體而分混乎其無間也是家國天下莫非己也觀己之好惡出于太虛未嘗不通之人人之好惡出于太虛亦未嘗不通之己可見也所以仁者與物同體己欲立而立人己欲達而達人仁本如是也誠者非自成己而已也所以成物也性之徳也性本如是也欲全天性之仁而必欲明明徳于天下國家雖曰初學之發心也抑知學必如此而後可以為大學哉又謂君子之於物也愛之而弗仁於民也仁之而弗親大學明明徳即欲親民不幾于仁愛親之無辯矣乎蓋親非無等殺之謂也近觀一身凡腹心爪髮莫不愛也未嘗無内外輕重之别逺觀六合凡天下國家莫非親也又豈無疏戚厚薄之殊但人之常情惟知有己而已矣隔形骸而分汝我樹藩籬而異比鄰且將視天親猶途人不明亦甚矣記曰凡生天地之間者血氣之屬莫不有知有知之屬莫不知愛其類毎誦至此未嘗不掩卷嘆息而悲人之不鳥獸燕雀若也此所以大學之道在明明徳在親民家國天下悉在其民胞物與中正以擴充不忍人之量而復還天性之仁體耳壹是皆以修身為本尚何二本之患哉是故欲明明徳于天下者即欲仁也親民正以明明徳者擴吾性一體之仁日見諸家國天下隨所應接之實事也觀孩提知愛知敬一本諸不學不慮之良而天性之仁兹可見矣所以齊家治國平天下若有不同然一則曰孝者所以事君也弟者所以事長也慈者所以使衆也一則曰上老老而民興孝上長長而民興弟上恤孤而民不倍喫𦂳又只在修身為本其為父子兄弟足法而民法之由此民不能忘以至没世不能忘要皆取諸身之孝弟慈而足矣可見天性之仁一也隨所接而異乎孝弟慈之名焉惟此心真誠惻怛融液貫通始于親長達于閭里族黨以及四海九州施有漸次心無間隔故孝弟慈即明徳也止孝止弟止慈即止至善也身法一端人極攸立民皆興孝興弟不倍焉即所謂親民所謂明明徳於天下國家即所謂天地萬物為一體也大學之道何簡易如之噫有天地萬物一體之志願斯有天地萬物一體之學術然非真知天地萬物本吾一體而其要只在孝弟慈焉安能志此學哉是故信此者斯可以信孔子之志學斯可以信孔子從心所欲不踰矩絜矩物有體必有用也泥定體者其用有限體雖存而無形故隨感而用不窮也夫人孰不曰天下之用萬有不齊我之所以待其感而應之者以有定體故也體不先定何以待其不測之用哉然隨其所感而體不易謂之定焉何也執我之定體以應天下事物則膠滯而不通者多矣盍觀大匠之運矩乎矩所以為方之器無方之形也無方之形而天下之方皆從此出凡欲為方者運此矩以度之或斵或削是尋是尺而後能成其器之方焉否則天下之器小大厚薄不可勝計方亦如之欲先執一定之方以强其同也得乎哉大學曰君子有絜矩之道至論矩之所以絜則不外乎民之所好好之民之所惡惡之同民心以為好惡而我無好惡于其間此天下所以截然方正一歸于平也以天下之大平之若此易易焉者平以此心之矩耳非執此心之矩强天下之我從故又以能好能惡歸之仁人也可見是心也將以為棼然其靡定乎烱然在中萬化攸基應感紛紜確乎不拔故一人之公是一家是之一國是之天下莫不以為是也一人之公非一家非之一國非之天下莫不以為非也謂之靡定不可也將以為一定而不易乎神明周流圓虛不測隨感而應惟變所適故唐虞揖讓不可為商周之征誅臯䕫襄贊不可為關比之直諫執為一定亦不可也何也大匠有定規而矩無定方也君子之心有定理而理無定好惡也此心之矩在絜之者何如耳能絜則以我之心同天下人之心凡用人理財莫不與人同其好惡故得衆得國得天命焉不絜則强天下人之心以同乎我好惡拂人之性斯菑及其身矣毫釐千里幾之不可不慎也如此故求人非人藏身不恕則所令反其所好非所以絜齊治之矩也親愛賤惡畏敬哀矜敖惰之其所而僻焉非所以絜修齊之矩也忿懥恐懼好樂憂患一或有所則矩且失其所以為矩矣故約之至于致知誠意惟在知本毋自欺其好惡而常自慊焉非慎獨之君子其孰能之則是矩也即前之所謂獨也所謂物也絜矩則慎獨格物言殊而義則一也是故孔子自十五志學至七十從心所欲不踰矩老安少懐綏來動和無非與民同好惡而明明徳于天下云耳故曰規矩方圓之至聖人人倫之至也雖然矩所以為方也孟子謂孔子聖之時時則圓神不滯無方無體矩與時不相悖乎蓋惟其不踰矩此所為聖之時而與時偕行此矩之所以無徃不絜也若世所謂矩特執方以絶俗而舉足便有礙耳豈無定方之矩乎世所謂時不免毁方從俗圓滑輀熟以投衆好耳豈不踰矩之時乎觀匠之為圓必自方始蓋可見也况志大學之道其于格物絜矩之義可弗究心乎哉圖書編卷十四
