body:
  text: 圖書編卷七十四明章潢撰心象圖叙人之一身内而五臟六腑外而四肢百骸逹之事爲而五常百行皆有象也皆可得而圖也然而主之者心也惟心則淵淵浩浩深廣無際操存舍亡出入無時神明變化不可得而測也果可得而象之乎易曰復其見天地之心乎天地之心可於復而見之而人心獨不可見乎文王獨于坎卦曰習坎有孚惟心亨故于坎取心之象焉人心惟危道心惟微于此可黙識矣人湏是該其眞心識此一陽爲主於内者是也凢一身之五臟六腑四肢百骸以及五常百行皆于此乎統之也豈惟是哉一身之中自其主宰謂之心其靈覺謂之性其不測謂之神其専一謂之志其發動謂之意其感觸謂之情其紬繹謂之思其運用謂之才其名雖殊其實一也識其心而性也情也神也志也意與才也皆舉之矣况引而伸之凢道德中和仁義禮智孝弟忠信喜怒哀樂視聼言動舉宇宙内事何一而非心乎不能真識此心欲其操而存之也難矣故孟子一言以蔽之曰學問之道無他求其放心而已矣有志立人之道者盍亦自識其心乎形屬隂神屬陽一陽寓於二隂之中坎之象也元神寓於形骸之中心之象也即坎之卦象以反求於身而心爲一身之主故欲脩其身者先正其心否則一陽爲二隂所陷寧無懼哉易曰習坎有孚維心亨行有尚大哉心乎其通天地人而一之者乎惟人能全此心則位天地育萬物沗三才而一之矣但人生天地間雖同具此心而不免淪於禽獸與草木同腐朽者不識心故也嘗讀易見文王於六十四卦獨於坎卦以心爲言乃悟坎之卦象其即人心之象矣乎何也人之所以負隂抱陽而德合天地者以其有此心也乾純陽坤純隂震艮雖陽而偏於上下惟則一陽在中也以此反觀於身凢耳目口鼻四肢百骸非即坎卦之乎心之主宰於中至虛至靈非即坎卦之一乎人能存此心焉使一陽爲主於内則天君泰然百體從令非即道心惟微之謂乎茍爲郡隂所陷而狥耳目口體之慾非即人心惟危之謂乎可見陽固不離乎隂而有以宰乎隂心固不離乎形而有以宰乎形心爲形役則道心即人心矣先立乎其大者則其小者不能奪人心不亦䋃乎道哉噫覩坎卦心象而隂陽危微之介良可懼也是故心不可象也而以坎卦象之所以自省而自儆也惟善悟者得心而忘象古今説心考書曰天之厯數在汝躬汝終陟元后人心惟危道心惟微惟精惟一允執厥中孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與大學所謂修身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聼而不聞食而不知其味此謂修身在正其心孟子曰人皆有不忍人之心先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上所以謂人皆有不忍人之心者今人乍見孺子將入于井皆有􅇶惕惻隠之心非所以内交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也由是觀之無惻隠之心非人也無羞􅁖之心非人也無辭讓之心非人也無是非之心非人也惻隠之心仁之端也羞惡之心義之端也辭譲之心禮之端也是非之心智之端也人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂其君不能者賊其君者也凢有四端於我者知皆擴而充之矣若火之始然泉之始達茍能充之足以保四海茍不充之不足以事父母孟子曰魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也生亦我所欲所欲有甚於生者故不爲茍得也死亦我所惡所惡有甚於死者故患有所不避也如使人之所欲莫甚於生則凡可以得生者何不用也使人之所惡莫甚於死者則凢可以辟患者何不爲也由是則生而有不用者由是則死可以辟患而有不爲也是故所欲有甚於生者所惡有甚於死者非獨賢者有是心也人皆有之賢者能勿䘮耳一簟食一豆􅅅得之則生弗得則死嘑爾而與之行道之人弗受蹴爾而與之乞人不屑也萬鍾則不辨禮義而受之萬鍾於我何加焉爲宮室之羙妻妾之奉所識窮乏者得我與鄉爲身死而不受今爲宮室之羙爲之鄉爲身死而不受今爲妻妾之奉爲之鄉爲身死而不受今為所識窮乏者得我而爲之是亦不可以已乎此之謂失其本心孟子曰仁人心也義人路也舍其路而不由放其心而不知求哀哉人有鷄犬放則知求之有放心而不知求學問之道無他求其放心而已矣公都子問曰鈞是人也或爲大人或爲小人何也孟子曰從其大體爲大人從其小體爲小人曰鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先立乎其大者則其小者不能奪也此爲大人而已矣周子曰養心莫善於寡欲云云雖有不存焉者寡矣予謂養心不止於寡焉而存耳葢寡焉以至於無無則誠立明通誠立賢也明通聖也是聖賢非性生必養心而至之養心之善有大焉如此存乎其人而已邵子曰心爲太極卲子曰天地之本其起於中乎是以乾坤交變而不離乎中人居天地之中心居人之中日中則盛月中則盈故君子貴中也先天學心學也故圖皆自中起萬化萬事生乎心者也程伯子曰滿腔子是惻隠之心心要在腔子裏人心縁境出入無時人亦不覺人有四百四病皆不由自家只是心湏由自家人心常要活則周流無窮而不滯於一隅耳目能視聼而不能逺者氣有限耳心則無逺近人心作主不定正如一箇翻車流轉動揺無湏臾停所感萬端又如懸鏡空中無物不入其中有甚定形不學則却都不察及有所學便覺察得是爲害着一箇意思則與人成就得箇甚好見識心若不做一箇主怎生柰何張天棋昔常言自約數年自上着牀便不得思量事不思量事後湏强把他這心來制縳亦湏寄寓在一箇形像皆非自然君術自謂吾得術矣只管念箇中字此則又爲中係縳且中字亦何形像若愚夫不思慮𡨕然無知此又過與不及之分也有入􅎍中常若有兩入焉欲爲善如有惡以爲之間欲爲不善又若有羞惡之心者本無二人此正交戰之騐也待其志使氣不能亂此大可騐要之聖賢必不害心疾其他疾却术可知他臟腑只爲原不曾養養之却在修養家程叔子曰聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也程叔子曰學者先務固在心志有謂欲屛去聞見知思則是絶聖棄智有欲屏去思慮惡其紛亂則是湏坐禪入定如明鑑在此萬物畢照是鑑之常難爲使之不照人心不能不交感萬物亦難爲使之不思慮若欲勉此唯是心有主如何爲主敬而已矣有主則虛謂邪不能入無主則實謂物來奪之今夫瓶􅑥有水實内則雖江海之浸無所能入安得不虛無水於内則停注之水不可勝注安得不實大凡人心不可二用用於一事則他事更不能入者事爲之主也事爲之主尚無思慮紛擾之患若主於敬又焉有此患乎所謂敬者主一之謂敬所謂一者無適之謂一且欲涵泳主一之義一則無二三矣言敬無如聖人之言易所謂敬以直内義以方外須是直内乃是主一之義至於不敢欺不敢慢尚不愧於屋漏皆是敬之事也但存此涵養久之自然天理明程叔子曰心之燥者不熱而煩不寒而慄無所惡而怒無所恱而喜無所取而起君子莫大於正其氣欲正其氣莫若正其志其志既正則雖熱不煩雖寒不慄無所怒無所喜無所取去就猶是死生猶是夫是之謂不動心張子曰大其心則能體天下之物物有未體則心爲有外世人之心正於見聞牿小聖人盡性不以見聞牿其心其視天下無一物非我孟子謂盡心則知性知天以此天大無外故有外之心不足以合天心龜山楊氏曰正心到寂然不動處方是極致以此感而遂通天下之故其於平天下也何有語仲素曰未言盡心須先理㑹心是何物又問曰心之爲物明白洞達廣大静一若體㑹得了然分眀然後可以言盡未理㑹得心盡箇甚能盡其心自然知性不用問人大抵須先理㑹仁之爲道知仁則知心知心則知性是三者初無異也横渠作西銘亦只是要學者求仁而已有心以感物則其應必狹惟忘心而待物之感故能無所不應明道見謝子紀問甚博曰賢却記得許多可謂玩物䘮志謝子被他折難身汗靣赤先生曰只此便是惻隠之心惻然有隠之心上蔡謝氏曰人須識其真心見孺子將入井時是真心非思而得也非勉而中也延平李氏曰學問之道不在多言但黙坐澄心體認天理若見雖一毫私欲之發亦自退聼矣久久用力於此庶㡬漸明講學始有力耳朱子曰大抵心體通有無該動静故工夫亦通有無該動静方無渗漏若必待其發而後察察而後存則工夫之所不至多矣惟涵養於未發之前則其發處自然中節者多不中節者少體察之際亦甚明審易爲着力與異時無本可㩀之説大不同矣學者喫緊是理㑹這一箇心那紙上說底全靠不得此心操存舍亡只在反掌之間心若不存一身便無主宰心在羣妄自然退聽如中庸說天命之謂性即此心也率性之謂道亦此心也修道之謂敎亦此心也以至於致中和贊化育亦只此心也致知即心知也格物即心格也克己即心克也非禮勿視聽言動勿與不勿只爭毫髮地耳所以明道説聖賢千言萬語只是欲人將已放之心收拾入身來自能尋向上去人心常烱烱在此則四體不待覊束而自入規矩只爲人心有散緩時故立許多規矩來維持之心之爲物至虚至靈神妙不測常爲一身之主以提萬事之綱而不可有頃刻之不覺者也不自覺而馳鶩飛揚以狥物欲於軀殻之外則一身無主萬事無綱雖其俯仰顧盻之間葢已不自覺其身之所在心要活天理存則活人欲用則死陸象山先生自三四歲時思天地何所窮際不得至於不食宣敎公呵之遂姑置而胸中之疑終在後十餘歲因讀古書至宇宙二字解者曰四方上下曰宇徃古來今曰宙忽大省曰元來無窮人與天地萬物皆在無窮之中者也乃接筆書曰宇宙内事乃己分内事己分内事乃宇宙内事又曰宇宙便是吾心吾心即是宇宙東海有聖人出焉此心同也此理同也西海有聖人出焉此心同也此理同也南海北海有聖人岀焉此心同也此理同也千百世之上至千百世之下有聖人出焉此心此理亦莫不同也四明楊敬仲時主富陽簿攝事臨安府中始承敎於先生及反富陽先生過之問如何是本心先生曰惻隠仁之端也羞惡義之端也辭讓禮之端也是非智之端也此即是本心對曰簡兒時已曉得畢竟如何是本心凢數問先生終不易其説敬仲亦未省偶有鬻扇者訟至於庭敬仲斷其曲直訖又問如初先生曰間適來斷扇訟是者知其爲是非者知其為非此即敬仲本心敬仲大覺忽省此心之無始末忽省此心之無所不通陸子曰心不可泊一事只在立心人心本來無事胡亂被事物牽將去若是有精神即是便出便好若一向去便壞了小心翼翼昭事上帝上帝臨汝無二爾心此理塞宇宙如何人杜撰得文王敬忌若不知此敬忌箇甚麽萬物森然於方寸之間滿心而發充塞宇宙無非此理孟子就四端上指示人豈是人心只有這四端而已又就乍見孺子入井皆有怵惕惻隠之心一端指示人人得此心昭然但能充此心足矣陸子曰心在我者既盡亦自不能掩今之學者只用心於枝葉不求實處孟子云盡其心者知其性也知其性則知天矣心只是一箇心某之心吾友之心上而千百載聖賢之心下而千百載復有一聖賢其心亦只如此心之體甚大若能盡我之心便與天同爲學只是理㑹此其他體盡有形惟心無形然何故能攝制人如此之甚小心翼翼昭事上帝上帝臨汝無二爾心戰戰兢兢那有管閒時候人心只愛去泊着事敎他棄事時如鶻孫失了樹更無住處人心惟危道心惟微解者多指人心爲人欲道心爲天理此説非是心一也人安有二心自人而言則曰惟危自道而言則曰惟微罔念作狂克念作聖非危乎無聲無臭無形無體非微乎薛文清公曰心本寛大無邉一有己私則不勝其小矣人心有一息之怠便與天地之化不相似康齋吳先生曰心是活物涵養不熟不免揺動白沙先生曰舍彼之䌓求吾之約惟在静坐久之然後見吾此心之體隠然呈露常若有物日用間種種應酬隨吾所欲如馬之御銜勒也體認物理稽諸聖訓各有頭緒來歴如水之有源委也於是渙然自信曰作聖之功其在兹乎人具七尺之軀除此心此理之外無可貴矣渾是一包膿血裹一大塊骨頭耳饑能食渴能飲能着衣服能行滛欲貧賤而思冨貴富貴而貪權勢忿而争憂而悲窮則濫樂則滛凡百所爲一信血氣老死而後已則命之曰禽獸可矣敬齋先生曰心有主則在閙中亦静故程子以爲金革百萬與飲水曲肱一也然必知之深養之厚心方不動陽明先生曰良知者心之本體無起無不起雖妄念之發而良知未甞不在但人不知存則有時而或放耳雖昏塞之極而良知未嘗不明但人不知察則有時而或蔽耳雖有時而或放其體實未甞不在也存之而已耳雖有時而或蔽其體實未嘗不明也察之而已耳心無動静者也其静也者以言其體也其動也者以言其用也故君子之學無間於動静其静也常覺而未嘗無也故常其應動也常定而未嘗有也故常寂常應常寂動静皆有事焉是之謂集義固能無祗悔所謂動亦定静亦定者也心一而已静其體也而復求静根焉是撓其體也動其用也而懼其易動焉是廢其用也故求静之心即動也惡動之心非静也是之謂動亦動静亦動將迎起伏相尋於無窮矣故循理之謂静從欲之謂動欲也者非必聲色貨利外誘也有心之私皆欲也故循理焉雖酧酢萬變皆静也濓溪所謂集義者也欲從焉雖心齋坐忘亦動也告子之雖强制正助之謂也是外義者也心之良知是謂聖聖人之學惟是致此良知而已自然而致之者聖人也勉然而致之者賢人也自蔽自昧而不肯致之者愚不肖者也持志而心痛一心在痛上豈有工夫説閒話管閒事問心要逐物如何則可先生曰人君端拱清穆六卿分職天下乃治心統五官亦要如此今眼要視時心便逐在色上耳要聼時心便逐在聲上如人要選官時便自去坐在吏部要調軍時便自去坐在兵部如此豈惟失却君體六卿亦皆不得其職心之本體原自不動心之本體即是性性即是理性元不動理元不動集義是復其心之本體問如何是心之本體先生曰知是理之靈處就其主宰處説便謂之心就其禀賦處説便謂之性孩提之童無不知愛其親無不知敬其兄只是這箇靈能不爲私欲遮隔充拓得盡便完完是他本體便與天地合德自聖人以下不能無蔽故須格物以致其知須至善者心之本體本體上湏過當些子便是惡了不是有一箇善却又有一箇惡來相對也靜上用工固是好但終自有弊人心自是不息底雖在睡夢此心亦是流動如天地之化本無一息之停然其化生萬物各得其所却亦自静也此心雖是流行不息然其一循天理却亦自静也若專來静上用工恐有喜静惡動之弊動静只是一箇心不是一塊血肉凢知覺處便是心如耳目之知視聼手足之知痛癢此知覺便是心也夫物理不外乎吾心外吾心而求物理無物理也遺物理而求吾心吾心又何物耶心之體性也性即理也故有孝親之心即有孝之理無孝親之心即無孝之理矣有忠君之心即有忠之理無忠君之心即無忠之理矣理豈外於吾心耶晦庵謂人之所以爲學者心與理而已心雖主乎一身而實管乎天下之理理雖散在萬事而實不外乎一人之心是其一分一合之間未免以啟學者心理之爲二之弊此後世所以有專求本心遂遺物理之患也夫士貴乎有天下國家之志有天下國家之志夫然後能有天下國家之憂而其視非義也雖一介若將凂焉其視民之饑寒愁苦與其厄於貪殘猛悍汲汲焉救之也如赤子之在膏火而同室在虎狼之口其身之毁譽禍福又奚暇乎計也此之謂天下第一流人品孟子所謂無待文王而興者也果何爲其然也混宇宙一氣也天地萬物一體也身家國天下一物也心也者天聰明也譬諸日月皜皜乎無不照臨也太山不能虧日月之光而藐茲軀殻能限吾天聰明也乎是故仰焉而星辰俯而草木皆氣也皆道也即皆我也况於人乎是心也自堯舜謂之道心謂之中自孔子謂之仁謂之至善戒懼恐懼則所以擇乎此固執乎此耳上揆之唐虞三代聖君賢相下觀之魯鄒濓洛諸大儒其所以揖讓所以放伐所以相授受其誰非斯義也乎人之心體一也指名曰善可也曰至善無􅁖亦可也曰無善無惡亦可也曰善曰至善人皆信而無疑矣又爲無善無惡之說者何也至善之體惡固非其所有善亦不得而有也至善之體虛靈也猶目之明耳之聰也虛靈之體不可先有乎善猶明之不可先有乎色聰之不可先有乎聲也目無一色故能盡萬物之色耳無一聲故能盡萬物之聲心無一善故能盡萬物之善今之論至善者乃索之事事物物之中先求其所謂定理者以爲應事宰物之則是虗靈之内先有乎善也虗靈之内先有乎善是耳未聼而先有乎聲目未視而先有乎色也塞其聰明之用而窒其虗靈之體非至善之謂矣今人乍見孺子入井皆有怵惕惻隠是謂善矣然未見孺子之前先加講求之功預有此善以爲之則耶抑虚靈之中偶因感以觸發其機自不容己耶目患不能明不患有色不能辨耳患不能聰不患有聲不能聞心患不能虗不患有感不能應虗則靈靈則因應無方萬感萬應萬應俱寂是無應非善而實未甞有善也其感也無常形其應也無定跡來無所迎去無所將不識不知一順帝則者虗靈之極也赤子匍匐將入井自聖人與塗人並而視之其所謂怵惕惻隠者聖人不能加而塗人未嘗减也但塗入未免於乍見之後洊入於納交要譽之私矣然則乍見之發豈非生於不識不知之中而洊入之私豈非蔽於擬議之後耶然塗人之學聖人也果憂怵惕惻隠之不足耶抑去其蔽以還其乍見之初心也凢人心之有皆私也程子曰君子之學莫若廓然而大公物來而順應夫所謂廓然者不蔽其虗靈之謂也虗靈之蔽不但邪思惡念雖至羙之念先横於中積而不化已落將迎意必之私而非時止時行之用矣故自惻隠以保四海自孩提以達天下自赤子以至大人實無俟取足於外而本來真體渾然全具學心之功雖自人一已百人十已千亦不過反其初焉已矣真體之上固未嘗許有所増益也後之學聖人者不思反覆其初但恐吾心之聰明不足以盡聖人之知見倀倀焉求索於外假借影響測億之似自信以爲吾心之真得是朦其目以擬天下之色塞其耳以億天下之聲影響測億之似拘滯固執之迹適足以塞吾虗靈之真體礙吾順應之玅用其去至善益逺矣太虗之中日月星辰風雨露雷曀霾絪緼何物不有而未嘗一物爲太虗之有故日一闔一闢謂之變徃來不窮謂之通日徃則月來月徃則日來而明自生寒徃則暑來暑徃則寒來而歲自成徃者屈也來者伸也屈伸相感而利自生人心虗靈之體亦復如是故曰天下何思何慮天下殊途而同歸一致而百慮夫既曰百慮則所謂何思何慮者非絶去思慮之謂也千思萬慮而一順乎不識不知之則無逆吾明覺自然之體是千思萬慮雖謂之何思何慮亦可也此心不可先有乎一善是至善之極雖謂之無善亦可也五十九條心總論心學傳自虞廷流𣲖逺矣韓退之云孟子死不得其傳陸象山自述其學得之孟子嘗誦其言曰宇宙便是吾心吾心便是宇宙東海有聖人出焉此心同也此理同也西海有聖人出焉此心同也此理同也南海北海有聖人出焉此心同也此理同也千百世之上至千百世之下有聖人出焉此心此理亦無不同也甚喜吾之心與聖人同而作聖之功亦易爲力也且悔昔日矜持大勞未免博焉而寡要矣於是舉日用之功惟從心所欲果爾此心本虗此心本靈此心本自知覺凢事之應與物之接果油然天機之順適若决網羅出藩籠逍遥天壤間也然榖不種而祗恃其畎畆之必産金未陶而祗恃其沙礫之中藏既而成心存焉亦以爲本體之見在既而機心發焉亦以爲妙用之時宜未幾覺之愈自悚惕皇皇焉夙夕黙識隨處體察始自悟師心之非也始悟孔子之從心所欲有矩在焉發憤五十五年而始不踰也始悟陸子所謂聖無不同者不徒曰心而曰理且指盡心之聖人言也惟其聖域之優入是以心理之大同吾且未識其真心何敢遽同乎徃聖雖陸子立大而其功愈宻於人情事變非徒守虗凈之本體恣瀟洒之情况已也嘗以此求諸聖賢之典籍焉舜大聖人也乃曰人心惟危湯大聖人也乃曰以禮制心孔子有舍則亡之訓孟子有求放心之言大學云正心易云洗心易其心諄諄若此者正敎人辨危微存亡之機而求明此理之同然者以自盡焉耳然而未易辨也何也心之廣大舉六合而無所不包心之精微析萬殊而無所不入心之神明徹千變萬化而無所不用惟其廣大無不包也虎豹豺狼莫非生意而慈悲普度雖摩頂放踵在所必爲皆心之廣大也未易辨也惟其精微無不入也垢穢瓦礫莫非妙道而探索隠僻雖鈎𤣥鏤塵剖析鄰虗皆心之精微也未易辨也惟其神明無不周也縱衡翕張莫非圓機而與世推移雖神通妙解倐忽流轉皆心之靈變也未易辨也天理人欲同行異情焦火凝氷變幻靡定將以爲遠也自生之日至於死之時凢寒思衣饑思食經營聲色計筭貨財愛敬親友莫非此心爲之運用雖終身不自著察而夫婦悉與知能孰得而離之哉將以爲近也天理當機忸怩泚顙已私一動骨肉仇讎形坐神馳魂㳺魄制一睫之間恍然在几席之前忽然在千里之外孰得而執之者也是故自聖人以至塗人作德日休作僞日拙心之勞逸不齊莫非心也顧用之何如耳雖曰觀諸孩提之愛敬則人生之初其心本無不善觀之行人乞人不受嘑蹴雖牿亡之後本心猶有未盡冺者不知此乃聖賢多方引誘或指㸃於未䘮之先或指㸃於既䘮之後克念罔念聖狂攸分無非欲人自識其真心以自存也不然人莫不爲孩提也曾有漸長不爲物引習移者乎乞人不受嘑蹴曾有永保此心而勿䘮者乎譬之種榖不種不生譬之真金不陶不淨近之論心學者如之何兢指衆人見在之心即與聖人同也然則世之人豈盡失其同然之眞乎噫難言也果真心之盡失則有志者猶得而辨之也惟其真妄混淆能决死生於危廹不免計豐約於晏安天飛淵潛星流電閃而日用不知無論已間有志於心學而自宻其功者非不欲鼔其氣以拓充其量而􅌩括空虗若幾於廣且大矣然心不離乎氣而氣不足以盡心一任其氣即非無方無體之本然也非不欲鋭其見以鑽研其宻而窺測竅妙若幾於精且微矣然心不離乎見而見不足以盡心一用其見即非不識不知之本然也非不欲殫思爲以擬議其神妙而變化錯綜若幾於靈且眀矣然心不離思爲而思爲不足以盡心一渉於思爲即非無聲無臭之本然也葢太虗萬象惟心所現心識一冺空象皆無是宇宙本自無窮人心未免有着此盡心之所以難而常與宇宙相隔越也然則聖人之同然者終不可得而識之哉葢與其求同於聖人莫若觀同於赤子聖人水之海赤子水之源海難窮源易見也何也赤子之心何學何慮而其虗靈知覺廣大精微渾渾乎一宇宙之無邉際無間隔故也大人雖無所不學無所不能其所以不學而能者未之失焉雖無所不慮無所不知其所以不慮而知者未之失焉故大人不失赤子之心而合德於天地也可見赤子即未汚染之衆人而衆人乃已汚染之赤子聖賢即已暴濯之衆人而衆人皆未暴濯之賢聖者也此則在人反而觀之果未汚染否乎果已暴濯否乎果道心也良心也拳拳乎守而勿失可也一有汚染不得不加暴濯之功而日新又新庶可復其天然之故若徒曰前念迷即凢後念悟即聖而此心之堅白即可日試於磨湼曷不思曾子之贊其師曰江漢以濯之秋陽以暴之皜皜乎不可尚已以孔子之皜皜不可尚者濯之必江漢暴之必秋陽也使遽以衆人見在之習心而未嘗暴濯者強同乎聖心且曰立躋聖位非吾所知也噫此大學所以言正心必先之以誠意致知格物無善無惡者心之體心學肇自虞廷大闡明於孔門而心體則人人所同有也以人人所同有者而人人不自知焉故言心者曰心本善而無惡也曰心雖本善而其用流入於惡者亦心也曰心之體本無善而無惡也夫謂之本心良心仁義之心皆自善而言也何以謂之無善無惡哉盖人心之體本自虗靈而以善惡對言之惡固非所有善亦不可得而有也况善本無方體無窮盡無先後内外窺之莫得其藴求之莫測其端遂謂之無善無惡不知此即至善之全體也然心體虗靈人莫不信之矣太虗之中果何所有乎猶目之明耳之聰以其虗也目虗無所不見耳虗無所不聞何其靈也虗靈之中不可先有乎善猶明之本無色聰之本無聲也目無一色固能盡萬物之色耳無一聲固能盡萬物之聲心無一善固能盡萬物之善者乃探索於事事物物之間先求其所謂定理者以爲應事宰物之則是虗靈之内先有乎善也虗靈之内先有乎善是自窒其虗靈之體非止至善之謂矣于此欲矯其其弊何不直指太虗之體以端中正之趨謂靈扃中藏淵淵浩浩未易測識此乃天命之性爲人心同有之至善而一毫人力不與者也故不曰至善而曰無善無惡焉寧知目不可先有妍􅎀之色未嘗無明也特其天明不可得而覩焉爾耳不可先有邪正之聲未嘗無聰也特其天聰不可得而聽焉爾心不可先有善惡之念未嘗無靈明也特其虗靈不可得而執持焉爾夫聰明即耳目之善靈明發竅爲耳目之聰明即心之善也因明之不可覩即謂之無明因聰之不可聼即謂之無聰因虗靈不可執持即謂之無善可乎哉試即愛心之一端言之人之於親莫不知愛凢温凊定省一出於此心之愛也即此愛親之心以反觀焉正明目而視之不可得而見也傾耳而聽之不可得而聞也謂之無可也然孝子有深愛者視於無形聽於無聲恝恝乎不可解於𠂻者謂之有也非歟此正明明德新民之實體而爲人心本然之至善也故君子戒慎不覩恐懼不聞永保此心而止至善焉非先求一善以安排於中之謂也然則即愛親一端以推之萬善何莫不然而至善之心體可識矣或曰大學前云至善後云正心則心體不可以無善言也明矣而子又不專以有善言之何也曰至善者人心自有之天則應用萬變不齊真體一定不易固通寂感有無而一之者也俗儒執名物故滯於有楊墨眈空寂故墮於無孰謂心而可以有無偏言之哉觀大學言有所則心不正而無所則心正可知矣不正則不善而心正則止至善可知矣是心本至善何必言有心本無所安得謂之無善哉予不欲以有無偏言之者謂心體包涵有無原自至善特不可以有所自窒其心耳何也道心惟微雖通微生於思也然無思本也思通用也心則無思無不通焉人心有覺雖常覺存乎知也然知之爲知之不知爲不知心則無知無不知焉或有以氣定認心者然氣有呼吸心無喘息其殆御氣而不滯於氣者乎或有以凝神見心者然神本不測心則不貳其殆不神之所以爲神乎惻隠羞惡辭讓是非心固有感即通也然無感非先感非後當其感時其無感者安在也忿懥恐懼好樂憂患心同發之各當也然未發非内發非外當其發時其未發者何存也無時不然非心乎然時有晝夜心則通晝夜而一之雖與時偕行而心非時也無物不有非心乎然物有彼我心則合彼我而通之雖因物以付而心非物也以空狀心者謂見無所見得無所得必欲息念以歸空認理爲心者謂即事即理即理即心必欲殫精以析理且不思真空妙理何異同也即此觀之可見是心也非内也非外也亦非内外中間也非生也非滅也亦非生滅接續也非顯也非宻也亦非顯密貫通也雖廓然寂然萬象本自森然雖萬感萬應一真渾無增减此心原自至善何可以有無偏言之哉諒哉心不得而形容也惟其不可形容此心之所以爲至善而不可專以無字象之也若不曰至善而曰無善無惡者其體也不曰止至善而曰不修善不造惡者其功也則五經四書所云元善繼善主善明善擇善之説皆可廢矣立言垂訓者尚其慎之大人不失赤子之心天地至大也與天地合德者大人也夫天地覆載其大無垠而世未有能窮其際者人以渺然形軀䖏覆載間謂其德合天地已不勝其惑矣孟子乃曰大人者不失其赤子之心也凢民之生孰非赤子則凢爲赤子孰非大人乎哉無怪乎人之惑滋甚矣然其所以惑之甚者豈有他哉聖學不明世乏豪傑之士耳故語之以合德天地莫不驚且駭既以爲不敢爲語之以赤子之心靡不忽而易之又以爲不足爲此大人所以不恆有也然天地大矣非大之以覆載之形體也乾知大始坤作成物乾以易知坤以簡能曾謂乾坤之廣大有外於知能之易簡乎赤子誠小矣然不學而能者其良能也不慮而知者其良知也觀其甫離母懷即能啼號其所以能啼而號者曾學焉否乎哺之以乳即知含咽其所以知含而咽者曾慮焉否乎是赤子之知能即乾坤易簡之知能也若大人則無所不知無所不能参贊位育皆其能事豈知能獨異於人哉其知也不思而得此知之所以爲天眀而無知無不知也其能也不勉而中此能之所以爲天能而無爲無不爲也故曰易簡理得而成位乎其中也可見知能一也在乾坤曰至簡至易在大人曰不思不勉在赤子曰不學不慮一乎二乎欲自解其惑者反而思之當自得之矣然此至易至簡不學不慮者莫得而名狀之謂之純一無僞可也謂之真誠不雜可也謂之純粹至善可也謂之元精不貳謂之渾沌未開謂之太璞未琢皆可也孟子即人之所自有者指爲赤子之心是心也知能所從出也柰何清竇稍開則知誘物化百誘皆攻機械熟而醇龎漓矣而此心在人終有不可得而冺者試觀一切常人日爲智識營絆以自蔽其本然之良知此心若牿亡之殆盡也一或有所感觸未甞無惻隠羞惡之發果待學之慮之然後惻隱之羞惡之乎泛觀一言一動間之即應感之即通起居食息皆不待學慮而當其則者果何物也人特不肯反躬黙識以擴而充之所以行不著習不察終身由之而不知耳大人則不失此心也謂之不失或减之絲毫失也或加之絲毫亦失也何也此心天然自有無將迎無留滯無内外隠顯圓融透徹流動變化雖絲毫不可得加損者已悉具於赤子之時也故大人與亦子異者自少而壯而老其形體容貌有不同也德行言辭政事文學有不同也冨貴貧賤窮通得䘮有不同也而其心即赤子之心未之失耳抑豈大人一無所學無所慮乎雖慮以滿其良知之量其不慮者如故焉不慮而知即不思而得而與易知合德者此也學以滿其良能之量其不學如故焉不學而能即不勉而中而與簡能合德者此也信乎大人與乾坤同其大要在不失赤子之心而已矣或曰易簡而天地之理得矣中庸乃云聖人有所不知不能何歟曰心量無窮盡心之學亦無窮孟子止發明赤子大人若不同而其心一而已矣是心也愚夫愚婦可以與知與能者此也昭昭之天也聖人有所不知不能者亦此也無窮之天也故云堯舜其猶病諸天地之大人猶有所憾也或又曰赤子之心本已包含無窮之生理而未之露也天地之大德曰生而大人與之合者只在不失赤子之心而足矣天地果何心哉曰天地毎嵗冬至一陽初生曰復故易謂復見天地之心而萬物資始矣由此時有春夏秋冬不同而時行物生出震齊巽見離役坤說兊戰乾勞坎成艮亦以時異要不失乎一陽來復之初也是天地之心即一陽來復處見之一歳如此歲歲皆然前而徃古後而將來靡嵗不然然則天地之大生孰非一陽來復之心乎噫是元陽也其端雖甚微而無窮之生意皆從此出但自造化言則云乾知大始云復見天地之心自生民言則云不慮而知云赤子之心自學者言則云復以自知云湏是識其真心其實一也惟大人爲能不失所以與天地合也譬之穀種生意已完具於中一得水土而萌芽露焉赤子其穀之萌芽乎大人其穀之秀而實乎心即穀種是也方其甲柝萌芽而苖秀華實已無一不備及暢茂條達而蕃碩焉却於萌芽未常有所加也雖農功耕耘收穫必以其時而結實之後其穀種則依然如故矣可見收成之穀種固不異乎萌芽之穀種大人之心豈異乎赤子之心哉雖然從其大體爲大人聖學易簡有如此其如心本大而人自小之何少陽木之性仁寬裕温柔有容少隂木之應也三六逢元坎離歸極仁至而義達矣乎震金之化少隂火之性禮齊莊中正有敬少陽火之應也三七逢元艮兊歸極禮備而仁行矣乎離木之化太隂金之性義發强剛毅有執太陽金之應也四九逢元震巽歸極義盡而禮貞矣乎兊火之化太陽水之性智文理宻察有别太隂水之應也一六逢元乾坤歸極智哲而仁立矣乎坎水之化水生雲木生風火生暑金生寒水之木生雷木之火生日火之金生露金之水生月雲雷生怒風日生喜暑露生哀寒月生樂水木生仁木火生禮火金生義金水生智怒合仁水木升而太隂金化達矣喜合禮木火明而少陽木化彰矣哀合義火金和而少隂火化貞矣樂合智金水融而少陽木化流矣水木父子之仁也火金君臣之義也木火賔主之禮也金水賢否之智也仁至義盡禮恭智哲太和元氣流行於四時者聖人之天道也朱子曰仁義禮智分屬五行四時此是先儒舊説未可輕詆葢天地之間一氣而已分隂分陽便是兩物故陽為仁而隂為義然隂陽又各分而為二故陽之初為木為春為仁陽之盛為火為夏為禮隂之初為金為秋為義隂之極為水為冬為智仁之惻隠方自中出而禮之恭敬則已盡發於外義之羞惡方自外入而智之是非則已盡伏於中故其象類如此非是假合𫝊㑹若能黙㑹於心便自可見元亨利貞其理亦然性是太極渾然之體本不可以名字言但其中涵具萬理而綱之大者有四故命之曰仁義禮智孔門未嘗備言至孟子而始備言之者盖孔子時性善之説素明雖不詳著其條而説自具至孟子時異端蠭起往往以性為不善孟子懼是理之不明而思有以明之茍但曰渾然全體則恐其如無星之秤無寸之尺終不足以曉天下于是别而言之界為四破而四端之説于是而立盖四端之未發也雖寂然不動而其中自有條理自有間架不是侗儱都無一物所以外邊纔感中間便應如赤子入井之事感則仁之理便應而惻隠之心于是乎形如過廟過朝之事感則禮之理便應而恭敬之心于是乎形盖由其中間衆理渾具各各分明故外邊所遇隨感而應所以四端各有面貌之不同是以孟子析而為四以未學者使知渾然全體之中而燦然有條若此則性之善可知四端配合總説此圖出吕巾石公數段即其說以朱子後二段觀之自覺渾融葢性不可形容孟子指出四端正見仁義禮智我所固有寂然不動感而遂通天下之故即中庸莫見乎隠莫顯乎微之意也若以四端截然畫為界限一一配以卦數方位茍不善體㑹而執泥名象未免分裂拘滯之病性學愈晦愈支矣噫天下之言性也則故而已矣故者以利為本所惡於智者為其鑿也後之論性者得無失之鑿乎夫心也性也圖而示之難矣况可穿鑿而支離其説也見自本心夫學貴自見不自見非學也然見之難矣見者見自本心見所不可見也未發之中是也故心無形而常善形局形則視理惟形昧矣心無事而常善事狥事則滿心皆事牿矣昧以牿其能見乎雖見見彼非自見也見彼者自見之障也是以又貴自及也語稱心外無事事外無心者非心事對也正言心之無事也昔有以水波喻者近之心水也事波也非水無波非心無事則唯水唯心而已寧有波有事乎彼昧者見波遂至迷水見事遂至迷心以波怵于目事顯于形故也故即形可以明理不能開局形者之始觀即事可以著心不啓狥事者之深扃非自見之難自反之難矣於是聖人象靈機于坤復之際又反躬直指喜怒哀樂之未發於平旦之息焉使人反觀自心波靜之時庶無事之本體可識也反之竅也曰衆人既怵目迷波則與物刄靡將行盡如馳而莫之能止又寧有波靜之時乎曰平旦之息非人也天也天定民之則也天根未發氣往必歸故生必息息必極而後生中夜者息之極也羣品托命靈樞冲氣造和之大始則定于天萬古不易雖彊陽之壯人心之危其容或過乎故平旦人人有之也平旦之心之清明亦人人有之也善觀自心者觀之此而已故曰反之竅也觀之惟何曰固自反也若曰心一也平旦之波靜事清好惡靜而幾希著息也旦晝則迷波狥事凶悔吝而弗自覺不息也息不息之效明矣然則使吾常息何旦晝不若平旦哉盖今而後知天人之中之一致不可過也今而後知且晝之為之非吾本心不可狥也又今而後知波之即水又知波之必為水之靜非有二也不然平旦晝之一故吾也而幾希何從至耶故吾睹聞也即所睹聞若有無睹聞者御吾之耳目焉惟睹聞發而不知反聲色始牿矣必反所無睹聞者而慎之吾思慮也即所思慮若有無思慮者端吾之銜勒焉惟思慮發而不知反物始牿矣必反所無思慮者而精之吾喜怒哀樂也即所喜怒哀樂若有無喜怒哀樂者居無事而節是焉惟四者發而不知反情始牿矣必反所無喜怒哀樂者而致之曰得無異平旦矣乎夫無睹聞思慮無喜怒哀樂非别無也感所不能害故寂知所不能誘故靜所謂未發心之所也即睹聞思慮喜怒哀樂之所以然者也是之謂天故天非彼也平旦非時也自心也是以君子日嚴酬酢若朔之晦子之亥遜志下氣退然止其所焉不敢有毫髪作為於其間也雖化誘塗衆起滅根深懲深窒必澄危以入微淵然還吾生而靜以上之天雖意念無從可得斯庶幾吾息之本然斯其自見也已曰君子有天下國家之責有經綸宰割之司早作夜思猶懼弗給故乾曰惕曰忠信坤曰慎曰敬今奈何息為哉曰此所以為誠敬也深源有雨露不憂無潤也靈根有萌蘖不憂無良也萬古此天地萬古此生生何哉惟其常息故也大傳有言天下何思何慮天下同歸而殊途一致而百慮途雖殊而慮有百亦何由同且一哉為無思慮故也故心寂則感自神慮靜則應自妙目無色牿明矣孰逃吾視耳無聲牿聰矣孰逃吾聼思慮無物牿一矣孰逃吾睿喜樂也天下萬世公好存也哀怒也天下萬世公惡存也形天下而我無形事天下而我無事此乾所以知始坤所以作成也存此為忠信主此為敬聖人不離此宇宙在乎手存吾眉睫今古不能違體中正仁義之全而參三才以立極者其惟此道哉而今曰奈何息為也是憂天無雨露思以憧憧一百慮也是怵於波而汨於湛也危亦甚矣嗟夫古人闇之今人的之古人復之今人作之不的不亡不作不凶千里毫釐是宜治亂殊規而古今學術邈乎不相及也胡不亦自反其乎旦而深思之也然則復見天地心謂何耶曰復而後天地之心可見也雖然君子必欲見所不可見而後可見者可得復也傳曰不見之中獨見曉焉是謂坤復之際圖書編卷七十四
