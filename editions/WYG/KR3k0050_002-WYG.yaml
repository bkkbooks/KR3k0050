body:
  text: 圖書編卷二明章潢撰易總論易者道也天地人三才之道若稽古聖神繼天立極肇脩人紀懼後世之弗覺弗悟而始示其道於人也是道也迎之莫探其始隂陽無始循之莫測其終循環無窮其小無内貫通么㣲其大無垠包括天地天得之掲日月而常運地得之載河嶽而不傾聖人仰觀其象之𤣥故畫一一而擬之於天俯察其順之勢故畫一􅄲而擬之於地易圖之上竒下偶即所謂太極生兩儀周子謂太極動而生陽静而生隂者也天有隂陽地有柔剛故竒偶各生竒偶而四象備天象下垂地氣上躋易圖之隂陽剛柔即所謂兩儀生四象周子謂陽變隂合而生水火木金土也天有四時春夏秋冬地有四隅東西南北故四象各生竒偶而八卦彰乾兊離震生於上仰而反觀者天之象也坤艮坎㢲生於下俯而順察者地之形也即所謂四象生八卦周子謂無極之真二五之精妙合而凝乾道成男坤道成女者也陽而純者乾之健隂之順者坤之元陽而外明者離為火隂而内昭者坎為川陽而隆者艮之象隂而窪者兊之元鼓舞而震動者震雷之屬嘘吸而披拂者㢲風之宣八象相交而易道著惟人也乃特立乎其中而克肖焉記曰人者天地之徳隂陽之交鬼神之㑹五行之秀氣也顛而圓者乾為首皤而垂者坤為腹震肱居上動於手㢲肱居下隨於足艮鼻而兊口坎耳而離目渇而飲饑而食朝而作暮而息紛紛汨汩亦何以異於物不物於物是以稱有聖人者出百姓日用而不知惟聖人則出乎其類㧞乎其萃者也聖人者徳合天地明並日月掌握宇宙調御隂陽仁智周覆乎天下徳澤垂裕乎後昆致中和而天地位萬物育致誠而神祗格鳥獸馴聖人之道如是而後謂之為能踐形孟子曰鈞是人從其大體為大人從其小體為小人萬物皆備於我亦曰反身而誠仁義禮智我固有之仁智效天之隂陽義禮法地之柔剛分而言之仁隂而智陽禮柔而義剛天行健吾則體之而自強不息地勢坤吾則順之而厚徳載物繼離而明照習坎而常徳止乎艮而思不出位動乎震而恐懼脩省重㢲以申命行事麗兊而朋友講習乾至震六卦反諸已㢲與兊二卦喻諸人當其泰則財成輔相泰之象曰天地交泰后以裁成天地之道輔相天地之宜以左右民當其否則儉徳辭榮否之象曰天地不交否君子以儉徳辭難不可榮以禄於益而遷善改過益之象風雷益君子以見善則遷有過則改損而窒慾懲忿損之象曰山下有澤損君子以懲忿窒慾大而揖讓放伐小而動静語黙其道皆備於易明之為禮樂幽之為鬼神三綱五常百世相因傳曰天地設位而易行乎其中矣成性存存道義之門夫易聖人所以崇徳而廣業也懼後世之不明是故作易而以其道覺諸人愚末小子敢曰希賢希聖希天觀象述圖而次第之曰大易卦畫之原日月為易神易無方體也易從日從月于義何居蓋易者象也所以像此者也隂陽不可象也庖犧畫一竒一偶以象之矣乾坤不可象也三竒三偶名曰乾坤又曰乾為天坤為地則天地亦可象乾坤矣日陽精也月隂精也日月合體隂陽變化所謂變易交易互易不可象物宜而擬諸其形容哉然天地大徳曰生而生生之謂易也日月何以見其生歟蓋純陽純隂為乾坤惟坎離得隂陽之中也法象莫大乎天地懸象著明莫大乎日月故天地設位易行其中者日月也晝夜運行變遷相為吞吐摩盪俾二氣絪緼于六合五行交錯于四時所以日漸南而晝長多暑萬物靡不敷榮日漸北而晝短多寒萬物靡不收歛皆日新之功也月從日隂順陽也三五而明生漸滿則為望三五而魄生漸消則為晦二十九日有竒日月交㑹于壬子之間則為朔一嵗十二交而㑹于冬至故書曰平在朔易然則易之明義得非本于日月之交朔乎繫辭謂日月相推而明生者此也寒暑相推而嵗成者此也故又謂日月運行一寒一暑可見天地之所以生生不測無方無體至賾至隐皆日月斡旋之矣是故諸卦咸始于乾坤而乾坤為易之首二氣互藏于離坎而坎離既未濟為易之終總只一隂一陽之謂道也而隂陽之義配日月凡闔闢往來變通法象形器神化惟一易字統括無餘藴矣日月合而為易不信然哉按圖有太極兩儀四象八卦合而為一分而為二陽儀在左隂儀在右二分為四右上太陽下少隂下太隂四分于八乾南坤北離東坎西震㢲兊艮居於四隅皆自然而然不假一毫人力者也此圖人謂蔡元定得之蜀隠者秘而不傳指此為河圖此亦不可考吾惟騐諸造化而已矣按圖太極兩儀四象八卦合而為一分而為八周子所謂太極動而生陽動極而静静而生隂静極復動陽長隂消隂長陽消隂陽互藏其精循環無端皆自然而然伏羲則之以畫卦動極純陽静極純隂故畫乾坤於上下陽生隂生故畫震畫㢲陽長隂長故畫兊畫艮陽中隂隂中陽故列坎離於左右皆造化自然之妙不假一毫人力者也或謂舊圖隂陽自内而生蓋本圖皆中起之義不知此所謂中者即邵子所謂冬至子中夏至午中者是已自二至觀之冬至一陽生果生於中乎生於下乎夏至一隂生果生於中乎生於上乎吾惟騐諸造化而已矣易大傳曰古者庖羲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情此伏羲始畫八卦也八卦為小成之卦三畫之卦乾一兊二離三震四㢲五坎六艮七坤八伏羲不是逐卦如此畫只是自太極生兩儀為第一畫者二陽儀一隂儀二一􅄲兩儀生四象為第二畫者四四象者陽儀之上生一陽為太陽一生一隂為少陽二隂儀之上生一陽為少陽三生一隂為太隂四太陽少隂少陽太隂即所謂四象也四象生八卦為第三畫者八太陽之上生一陽為乾生一隂為兊少隂之上生一陽為離生一隂為震少陽之上生一陽為㢲生一隂為坎太隂之上生一陽為艮生一隂為坤所謂始畫八卦者此也未有天地萬物而天地萬物之理已具于沖漠無朕之中未有兩儀四象八卦而兩儀四象八卦已具於太極之内乃所謂體用一原也圖自下而上由中而外太極中分為兩儀右為陽左為隂兩儀中分為四象右皆陽左皆隂四象中分為八卦陽皆右隂皆左亦如之横觀自乾至坤皆先陽後隂一分為八自坤至乾皆先隂後陽八合為一由是中分為六十四卦隂陽左右先後皆如之此圖皆中起之説先天方圖所由畫也天尊地卑隂陽固有自然尊卑之象然於易上欲見其尊卑處何者最為親切曰自太極生儀象卦最可見太極動而生一陽然後静而生一隂則陽已居先矣至於陽儀之上生一陽一隂先陽固宜也隂儀之上當以隂為主矣其生一陽一隂亦以陽居先焉又至於四而八八而十六十六而三十二三十二而六十四其生一陽一隂莫不先陽而後隂於是首乾終坤乾不期尊而自尊坤不期卑而自卑於此見尊陽卑隂非聖人之私意卦畫自然之象而亦造化自然之位也按伏羲之畫因陽隂消長之位而不可易者也然畫必以三者以三則具三才之道耳葢易始於隂陽對待而相交剛柔立本變動趨時以左右言則以往來為交以上下言則以消長為交皆此一隂一陽之交易也陽上加隂陽之退也陽上加陽陽之進也隂上加隂隂之進也隂上加陽隂之退也隨其所交之爻進退皆如是焉故曰乾一至坤八之序皆如是也説卦曰天地定位山澤通氣雷風相薄水火不相射八卦相錯右伏羲八卦方位圓圖不過以前八卦横圖掲陽儀中乾兊離震居東南揭隂儀中巽坎艮坤居西北圖既成後乾南坤北離東坎西以四正卦乾坤離坎反覆只是一卦八卦中以此四卦為四正卦居四方之正位震東北㢲西南艮西北兊東南以四反卦震反為艮㢲反為兊本只震㢲二卦反而成四卦八卦中以此四卦為震㢲之變卦居四隅不正之位合而言之天位乎上地位乎下日生於東月生於西山鎮西北澤注東南風起西南雷動東北自然與天地大造化合先天八卦對待以立體如此其位則乾一坤八兊二艮七離三坎六震四㢲五各各相對而合成九數其畫則乾三坤六兊四艮五離四坎五震四㢲五亦各各相對而合成九數九老陽之數乾之象而無所不包也造化隠然尊乾之意可見方八卦之在横圖也則首乾次兊次離次震次㢲次坎次艮終坤是為生出之序及八卦之在圓圖也則首震一陽次離兊二陽次乾三陽接㢲一隂次坎艮二隂終坤三隂是為運行之序生者卦畫之成而行者卦氣之運也乾坤父母也震㢲長男女也坎離中男女也艮兊少男女也乾統三女坤統三男本其所由生也伏羲始畫八卦因而重之為六十四卦然在學者要看得伏羲如何畫卦起蓋伏羲非獨則河圖以畫卦盈天地間莫非隂陽之妙伏羲仰觀俯察見隂陽有竒耦之數故畫一竒以象陽一耦以象隂見一陽一隂有各生一隂一陽之象故自下而上再倍而三以成八卦三畫已具八卦已成則又三倍其畫以成六畫而於八卦之上各加八卦以成六十四卦此即畫卦之所由起也看得畫卦本原分曉又要見得卦畫裏便自有吉凶有不待辭而著者方得伏羲畫卦示人之初意蓋上古聖人極是心細觀一物便可畫卦觀卦畫便自起義便自知吉凶後之人既繫之以辭而求之又未得其理何歟先天八卦方位圖説易本不可以方所求也況卦而謂之先天則于天且先之沖漠無朕不可得而窺矣乃謂其有定方有定位何歟蓋畫卦已成則有象矣有象則可以方位言矣是圖也果因説卦而為之乎抑亦説卦因是圖而説之乎今不可知矣若云兩不相闗何圖説脗合之至於斯乎夫天地定位乾南坤北也山澤通氣艮西北兊東南也雷風相薄震東北㢲西南也水火不相射離東坎西也此伏羲八卦之位先天之易也觀是象玩是辭焉乾上坤下天髙地卑之位法象莫大乎天地離東坎西日月往來之位懸象著明莫大乎日月也震艮㢲兊列于四隅山鎮西北澤注東南雷出東北風盛西南亦山澤風雷之定位也且以畫象言之乾坤隂陽之純非天地而何坎離隂陽之中非日月而何惟四卦隂陽中正所以居四正之位者此也山聳而陽見於上澤潤而隂見于上雷則一陽動於重隂之下風則一隂鼓於二陽之下四卦皆隂陽之偏所以居四隅之位者此也然卦雖八也天地山澤雷風水火紛然交錯摩盪變化而造化之妙生生不息故邪正吉凶悔吝憂虞進退得失之情不可勝窮矣至於數往知來之義見于後之逆數圖下或曰定位通氣相薄皆隂陽之交也何獨水火不相射耶曰坎離畫象隂麗乎陽陽陷于隂即隂陽互藏之象也水内明外暗火内暗外明即隂陽互藏之義也毎月晦朔之交日月相㑹于壬乃隂陽交合之道也心火腎水相濟於腹中乃人身隂陽既濟之實也不相射正所以言其互藏交濟不相害耳即後言水火相逮是也何必於他証哉李息齋云真水藏於真火真火藏於真水真真不壊以其能相容也其亦有見於斯夫或有謂先天圖創自邵康節者不知説卦所論八卦方位不同初無先後之分而分之自康節始非謂其創始諸卦圖也有謂始于陳希夷又謂出於麻氏心悟者予請質以説卦諸條則諸説可無辨也但康節以先後天圖分屬羲文予則不敢直信為然六十四卦横圖叙伏羲畫卦有次序卦畫自下而上初畫一竒一耦則陽一隂一而為兩儀兩儀之上各生一竒一耦則太陽一少隂二少陽三太隂四而為四象四象之上各生一竒一耦則乾一兊二離三震四㢲五坎六艮七坤八而為八卦八而十六則兩儀之上各加八卦又八卦之上各加兩儀也十六而三十二則四象之上各加八卦又八卦之上各加四象也三十二而六十四則八卦之上各加八卦下三畫則八乾八兊八離八震八㢲八坎八艮八坤上三畫則乾一兊二離三震四㢲五坎六艮七坤八各居八卦之上皆自然不容己者豈待文王而後重也周禮三易經卦皆八其别皆六十四周禮至劉歆時方出子雲不見周禮故以重易為文王不知十三卦制器皆取已重之卦矣文王易即伏羲已重之卦而謂其改變位序也曷據哉易大傳曰八卦成列象在其中矣因而重之爻在其中矣此伏羲於前八卦上因而重之為六十四卦大成之易也伏羲重卦亦不是連將三畫安頓在上只是因八卦既成又自八卦上逐卦各生一陽一隂則八分為十六卦十六卦上又各生一陽一隂則十六分為三十二卦三十二卦上又各生一陽一隂則三十二分為六十四卦而六畫卦成矣以六十四卦横圖觀之其卦亦首乾終坤重乾居一重兊居二重離居三重震居四重㢲居五重坎居六重艮居七重坤居八乾一坤八之序亦不易焉且前三十二卦一畫陽便對後三十二卦一畫隂前三十二卦一畫隂便對後三十二卦一畫陽隂陽兩邉各各相對莫非自然之序此伏羲先天之易邵子謂一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四是也朱子曰某看康節易了都看别人的不得他説箇太極生兩儀兩儀生四象又都無甚𤣥妙只是從來更無人識矧即以此反身求之可見六十四卦横圖復姤居中此隂陽之幾也一陽積而成乾其人心一念之天理與一隂積而成坤其人心一念之人欲與其始甚㣲其究甚逺聖門慎獨周子研幾之學蓋本諸此歟六十四卦横圖論夫易何為而作也昔伏羲氏仰觀俯察見天地之間萬事萬物無不出於隂陽之變而其理則本於太極者也故由太極而兩儀由兩儀而四象由四象而八卦由八卦而六十四卦則時有消息位有當否而吉凶生焉於是制為卜筮以開物成務而天地間無獨必有對所謂獨者何也易有太極是也蓋太極動而生陽静而生隂故畫一竒以象陽畫一偶以象隂所謂太極生兩儀也由是陽與隂交則生太陽少隂故於陽儀之上加以一竒一偶而為太陽少隂之象隂與陽交則生少陽太隂故於隂儀之上加以一竒一偶而為少陽太隂之象所謂兩儀生四象也又太陽與少隂交則生乾兊離震故於太陽少隂之上各加一竒一偶而為乾兊離震之卦少陽與太隂交則生㢲坎艮坤故於少陽太隂之上各加一竒一偶而為㢲坎艮坤之卦所謂四象生八卦而剛柔相摩者也此乾一兊二離三震四㢲五坎六艮七坤八之位所由以定而易卦小成矣位既定矣則以乾兊離震為主於内而以乾一至坤八等卦次第加之於外則自乾至復而為三十有二之陽卦成矣以㢲坎艮坤為主於内而以乾一至坤八等卦次第加之於外則自姤至坤而為三十有二之隂卦成矣所謂八卦相盪因而重之者也首為乾而終於坤而易卦大成矣此横圖生生之序也邵子所謂猶根之有幹幹之有枝愈大則愈小愈小則愈繁也若自一隂一陽相對待者觀之自乾至坤而復姤在其交際之間玩其畫象不徒乾之六陽與坤之六隂對復一陽五隂與姤一隂五陽對由中間復姤分之兩邉各三十二卦隂陽竒偶之畫未有不相對也可見剛柔善惡盈虚進退乃理之必然雖各卦各爻自有變易然六十四卦厯三十二位隂陽卦爻于此一大變焉其幾則在復姤之間而初甚㣲也所以乾純陽也其初起復之一陽自少而多以極于乾則變之為姤矣坤純隂也其初起姤之一隂自少而多以至于坤則變之為復矣坤而復乾而姤縱横錯綜循環無端孰非天地之化育哉此先天之圖象也雖然天地隂陽之幾即人心理欲之分也一陽積而成乾其人心一念之天理一隂積而成坤其人心一念之人欲歟其始甚㣲其究甚逺聖門慎獨研幾蓋本諸此于此識其幾而謹其㣲則有幾先之哲無後事之悔故曰介于石不終日貞吉乃先天之學也所以君子貴學易而易有太極其乾坤姤復之統㑹歟伏羲六十四卦圓圖亦就前六十四卦横圖中掲陽儀中前三十二卦自乾至復居圖左方東邊乾在南之半復在北之半掲隂儀中後三十二卦自姤至坤居圖右方西邊姤在南之半接乾坤在北之半接復先自震復而却行以至於乾乃自㢲姤而順行以至於坤圖既成後坤復之間為冬至子中同人臨間為春分卯中乾姤間為夏至午中師遯間為秋分酉中自合四時運行之序天陽也其氣渾然無間故其數竒􅅀以象之地隂也其形中虚而開故其數偶􅄲以象之六十四卦雖其竒偶升降不齊其實只是天地隂陽之升降焉耳故曰一隂一陽之謂道觀先天六十四卦圓圖之象天地定位乾南坤北天尊乎上地卑乎下山澤通氣山鎮西北澤注東南雷風相薄雷出東北風盛西南水火不相射離降而東大明日生於東坎升而西小明月生於西此以内象言主乎静而鎮位者也八卦相錯錯者交而互之一左一右之謂乾互巽而巽互乾坎互兌而兌互坎離互艮而艮互離坤互震而震互坤乾兊離震陽儀之卦本在左方今互居右方隂儀之上坤艮坎㢲隂儀之卦本在右方今互居左方陽儀之上由是剛柔相摩八卦相盪而變化無窮焉申説詳見下文此以外象言主乎動而趣時者也圜轉推盪而成六十四卦環周於八方亦如二十八宿分布於十二辰是故右行而數之則乾兊離震坤艮坎㢲八卦由内及外如環之無端也數往者順往謂已往過後之卦順者順其八卦之叙如自今日而追數前日自冬至而數回立冬秋分則自坤而艮而坎而㢲乾皆順其叙而數之也知來者逆來謂方來在前之卦逆者逆其八卦之叙如自今日逆計來日自冬至而數向立春春分則自坤而震而離而兊乾皆逆其叙而知也然凡易之數皆由逆而推生爻自下而上數卦自右而左故曰易逆數也或問易有先天何也曰先天不可説也有説非先天也然則伏羲何以有圖曰凡圖皆後天也伏羲之圖何以稱先天曰先天不可圖也不可圖而不圖伏羲懼無以示天下故以其不可圖者寓于圖以示之意使天下即圖而求其所以然之故則是不可圖者庶乎縁圖而並傳圖之所畫隂陽而已矣由震厯兊至乾為陽由㢲厯艮至坤為隂震之初陽畫也漸長而純乎乾㢲之初隂畫也漸反而純乎坤一動一静一順一逆昭然隂陽之象是可得而圖者也至乎坤則静之極逆之至氣機歛於無而造化幾乎息矣一陽之氣又來復而為震是孰使之然哉是不可得圖而假圖示之意者也生生之謂易先天者生生之本也陽不胎於隂則彊彊則竭動不根於静則妄妄則凶故無者有之原反者道之柄乾反乎坤則至隂之際實至陽之精凝焉造化之根柢天地之大始而易於是乎不窮矣故聖人示之欲人於此觀象有黙契焉而先天有可覩也然則先天之學柰何曰其在人也為未發之中世之人蕩于耳目思慮之發而不知反也乆矣必也歛耳目之華而省於志洗神知之原而藏於宻研未形之幾而極其深庶其慮凝氣静淵然存未發之中浩浩純純天下之大本立矣此之謂幾先之吉夫彊陽非用也妄動非常也天地日月四時且不能違而況於人乎是以君子戰戰兢兢戒慎恐懼必先之乎大本易焉嗚呼圖所示之意深矣先天六十四卦方位圖説圖有一義而重列者謂一圖不足以盡其義也如先天六十四卦方位圖即前六十四卦圓圖是矣所以重列者何歟前隨隂陽之分列而人莫識其爻象之森然此詳隂陽之定位而人又昧乎造化之自然故不得不合二圖而並載之也然其方位豈出八卦方位外耶乾南坤北離東坎西震東北兊東南㢲西南艮西北此八卦定位也乾一兊二離三震四㢲五坎六艮七坤八此八卦定叙也孔子曰生生之謂易隂陽生生不測皆本諸乾坤乾一坤八有終始之義也雖乾坤定上下之位而乾以始之非父之道乎坤以終之非母之道乎兊離震㢲坎艮皆在其統括之中六子即乾父坤母之所生也可見乾坤交而六子生八卦交而六十四卦生所以六十四卦方位析而觀之一卦一爻變動不常合而觀之一竒一偶對待不亂然亦只依八卦方位隨乾兊離震㢲坎艮坤之叙而各加八卦焉耳其所列方位一皆隂陽錯綜自然而成雖聖人亦無所與其力也要之乾坤之位定而六十二卦一皆統括於其中此造化之所以妙歟雖然神易本無方體如之何而可以方位限之也蓋八卦六十四卦皆自爻位之已成者言之而用九用六乃神易之道也九六之用周流六虚生生不測且無定爻定卦之可言又何有於卦爻之方位耶學易者知卦之方位所由定而又知二用無爻位焉或方或圓動静不失其時可與語易矣全圖統觀一太極也由内而外一分為二為第一畫左第一畫三十二陽右第一畫三十二隂由此二分為四則為第二畫矣左十六陽交于右右一十六隂交于左由此四分為八則第三畫矣左八陽交于右右八隂交于左由此八分為十六則第四畫矣左四陽交于右右四隂交于左由此十六分為三十二則第五畫矣左二陽交于右右二隂交于左由此三十二分為六十四則第六畫矣左一陽交于右右一隂交于左故曰一隂一陽之謂道説卦傳曰雷以動之風以散之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之方圖震㢲自圖之中起雨以潤之則坎次㢲日以烜之則離次震艮以止之則艮次坎兊以説之則兊次離乾以君之則乾次兊坤以藏之則坤次艮亦起圖之中而達乎西北東南也故曰皆從中起萬化萬事生于心也其論最為的當且使説卦此一節亦有歸着實發啟䝉之所未發然而此圖不過以前大横圖分為八節自下叠上而成第一層即横圖自乾至泰八卦第二層即横圖自履至臨八卦以至第八層即横圖自否至坤八卦圖既成後乾本在圓圖之南今轉而居西北内乾八卦居北外乾八卦居西坤本在圓圖之北今轉而居東南内坤八卦居南外坤八卦居東艮兊坎離震㢲皆易其位子至亥十二辰正月至十二月四時卦氣皆右轉以應地之方秦在寅為正月乾在亥為四月否在申為七月坤在己為十月此明先天六十四卦方圖之象邵子曰圖皆從中起今按雷以動之風以散之正居此圖之中央及四維之中雨以潤之日以烜之則坎次㢲離次震艮以止之兊以説之則艮次坎兊次離乾以君之坤以藏之則乾次兊坤次艮皆由乎中而達乎外是故左右上下縱横相因六十四卦方位所由定矣東南陽方而乾居之乾四月之卦也故位乎巳西北隂方而坤居之坤十月之卦也故位乎亥泰正月之卦而位乎寅否七月之卦而位乎申此寅申巳亥四隅之位也冬至子中一陽生而復卦直之復十一月之卦也夏至午中一隂生而姤卦直之姤五月之卦也春分卯中而大壯應二月之卦也秋分酉中而觀應八月之卦也此子午卯酉四正之位也辰戌丑未之月卦偏居而附於四隅臨十二月卦與泰伍故後天丑寅納艮而位乎東北夬三月卦與乾親故後天辰巳納㢲而位乎東南遯六月卦與否近故後天未申納坤而位乎西南剥九月卦與坤隣故後天戌亥納坤而位西北以應地之方也又若以乾上坤下觀之則八卦為經而五十六卦左右為緯傳所謂天地設位而易行乎其中者也若以否上泰下觀之則八卦成列而五十六卦上下相交傳所謂乾坤成列而易立乎其中者也周維二十八卦上應天之二十八宿自乾之大畜凡七卦上應東方蒼龍七宿角起於乾則辰當亢金龍而卯當房日兎自泰至謙凡七卦應北方𤣥武七宿丑當牛金牛而子當虚日鼠自坤至萃凡七卦應西方白虎七宿戌當婁金狗而酉當昴日鷄自否至履凡七卦應南方朱鳥七宿未當鬼金羊而午當星日馬故曰在天成象在地成形而賁之彖曰觀乎天文以察時變觀乎人文以化成天下者也六十四卦方圖聖人愛人之心無窮故垂象立教亦無窮即其俯仰逺近而畫為八卦已足以通神明類物情矣又重之為六十四卦即六十四卦横圖已足以見太極兩儀四象八卦所由生矣又有圓圖方圖與夫内方外圓圖何其教人無窮之心一至此哉夫有一圖之象必有一圖之義是圖也何為而方之也自下而上不過即横圖卦序而八叠之縱横各八自然成四方之象矣究其義則自邵子據説卦雷動風散雨潤日烜艮止兊説乾君坤藏以發明之謂震㢲在一圖之中由震一陽次離次兊之二陽以至乾之純陽由㢲一隂次坎次艮之二隂以至坤之純隂皆由中以達乎外也此圖皆由中起一語真足以盡其義矣然而觀象玩辭其義殆無窮焉圓圖乾本在南今居西北自乾直上至否而居其西者皆乾之外八卦自乾横過至泰而居其北者皆乾之内八卦也圓圖坤本在北今居東南自坤直下至泰而居其東者皆坤之外八卦自坤横過至否而居其南者皆坤之内八卦也是乾坤一定其位而兊離震㢲坎艮咸在其内六十四卦悉由乾坤以為包羅矣所謂乾君坤藏之義不于兹而識之乎可見乾君者六十四卦所由君也坤藏者六十四卦所由藏也惟其君而藏也故雷動風散雨潤日烜艮止兊説六子縱横于其間皆君藏之用也但震之動動以陽也復即震之一陽也横達于東乃在坤泰之中㢲之散散以隂也姤即㢲之一隂也横達于西乃在乾否之中則是乾而一隂姤焉即為否矣坤而一陽復焉即為泰矣乾坤否泰皆始于姤復其機可不慎哉若夫自西北至東南乾一兊二離三震四㢲五坎六艮七坤八皆生卦之交也自西南至東北則否泰損咸恒益既濟未濟皆三隂三陽之交也由復臨泰大壯夬以至于乾由姤遯否觀剥以至坤則又四時十二月卦氣之運旋也即其圖而玩之其義何窮盡哉雖然邵子謂圖從中起萬事萬化生于心玩是圖也由在中一陽之震積而至于純陽之乾故乾為君而藏之者坤也人惟天君泰然則百體從令矣否則迷復反君道焉則以其國君凶亦由坤之不善藏也是故君子莫急于洗心退藏之學先天方圓圖義夫易有可圖有不可圖可圖者即象而知不可圖者神明其意而已圓圖之義曰對待之迹曰流行之序曰化生之機曰先天之用復至乾為卦三十二竒爻一百一十二象陽動居左姤至坤為卦三十二偶爻一百一十二象隂静居右對待之迹也四時之布萬物之偶尊卑貴賤之列興衰治亂之分辨此矣坤復相禪乾姤相遇終則有始流行之序也日月之代明四時之錯行元㑹運世皇帝王伯之繼緒辨此矣凡此即象而知者也生生之謂易易生道也而姤反乾歸坤凜然肅殺宜非生道矣而震從生焉何也凡物華液不凝則果實不堅果實不堅則精氣不胎而形化息造化霜降不涸則彊陽不歛彊陽不歛則靈根不固而化機竭故反者物之命也静者動之原也所以乾必反坤而後震可復也生化之機也雖然一屈一伸而感通孰通之必有淵然退藏者在也猶之槖籥然一翕一闢而風生孰生之必有虚而不屈者在也則先天之用也斯所謂不可得圖而神明其意者也圖示用易之道也得其象者或寡矣況於意乎不得其意易何可用哉吾不知機將安執矣方圖之義何居曰風雷天地之神也水火天地之精氣也山澤天地之形也神者變變者動動者躁躁則欲其藏以宻也故震㢲恒益居最中精氣在動静之間神所依也故坎離既未次之形則恒恒故不變精氣所舍也故山澤咸損又次之易曰乾以君之坤以藏之方圖者其坤藏之義乎凡物之躁動者未有不藏於坤者也故人之思機藏于腹形氣固藏於外風雷濳動乎中静無而動有用器之道存焉耳此圖圓布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生於子中極於午中隂生於午中極於子中其陽在南其隂在北方布者乾始於西北坤盡於東南其陽在北其隂在南此二者隂陽對待之數圓於外者為陽方於中者為隂圓者動而為天隂者静而為地者也先天四圖相傳皆出自邵尭夫邵得之李挺之挺之得之穆伯長穆伯長得之陳圖南者所謂先天之學也殊不知吾夫子作繫辭大傳言易有太極是生兩儀兩儀生四象四象生八卦及言八卦成列因而重之即便是八卦次序圖與六十四卦次序圖也説卦傳言天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆即便是八卦方位圖與六十四卦方位圖也伏羲四圖當吾夫子時尚存迨秦漢間或為方士所秘藏至陳希夷先生始得之耳今觀四圖當作五節看要見聖人作易自然之次第八卦圓圖與六十四卦圓圖作一節看要見大易與天地造化者合六十四卦圓圖與六十四卦方圖又作一節看要見方圖圓圖之所以異先儒謂説卦言天地定位以下圓圖之從中起也雷以動之以下此方圖之從中起也此三節看得分曉了然復以二圓圖與二横圖又作一節看要見圓圖即横圖所列之卦規而圖之耳又以方圖與大横圖更作一節看要見方圖卦位不過以大横圖分為八節自下叠上而成耳若乃圖之精奥則當於易無體處求之先天諸卦圖先天諸圖傳自邵尭夫今以其圖而考諸易如繫辭大傳云易有太極是生兩儀兩儀生四象四象生八卦及言八卦成列因而重之以此而証乎八卦次序圖與六十四卦次序圖無異也説卦傳云天地定位山澤通氣雷風相薄水火不相射八卦相錯以此而證乎八卦方位圖與六十四卦方位圖無異也又云雷以動之風以散之雨以潤之日以暄之艮以止之兊以説之乾以君之坤以藏之以此而證乎六十四卦方圖亦無異也夫圖與易既不相悖雖謂諸圖畫自伏羲亦可也或者是圖傳至秦漢時為諸家所秘迨尭夫始得之陳希夷亦未可知嘗以諸圖㑹通而玩味之六十四卦圓圖非即八卦圓圖推而衍之者乎二圓圖非即大横圖所列之卦規而環向者乎方圖非即横圖卦位分作八節自下叠上而成之者乎圓圖方圖皆從中起而其竒偶對待流行乃造化自然之文天地日月四時一皆圖之法象固其圖若不同而方圓縱横無二致也但圖曰先天則于天且先之矣又何方體之可指也其所謂定位通氣相薄不相射與夫雷動風散乾君坤藏雖有法象實無定在而太極隂陽流通貫徹本不可圖而象之也在前聖不過假圖以示之意耳後人觀圖玩象得意忘言斯可以㑹其生生之藴也乃云乾南坤北離東坎西兊東南震東北㢲西南艮西北確然以方位而排定之是豈先天之㫖哉噫不為之圖則意無所寄而難以洩其造化之秘一為之圖則又將執名泥象反以昧乎聖人之精學之難言一至此也但前聖立圖垂訓亦惟待有志者自悟之耳否則日月雖明其如天下之瞽者何先天圖總論陽生於坤復之交子中也自一陽之復漸生八分而十六為二陽之臨由臨漸生十六分而為三十二至六陽之乾乾位午中陽極矣是為陽卦三十二也隂生於乾姤之交午中也自一隂之姤漸生八分而十六為二隂之遯由遯漸生十六分而為三十二至六隂之坤坤位子中隂極矣是為隂卦三十二也卦有六爻爻當一日乾坤天地坎離日月六十卦圜旋周流氣運時行周天一朞之數也復為陽始坤生震也姤為隂始乾生㢲也陽氣自地而升於天隂氣自天而降於地乾坤交剛柔易也八卦之圖右旋老生乎少也右陽而左隂離女坎男之象也六十四卦之圖左旋少積而老也左陽而右隂離日坎月之象也此外圓圖六十四卦相生之序也若内方圖則以八卦之次因而重之者也乾一乾重兊為夬重離為大有重震為大壯重㢲為小畜重坎為需重艮為大畜重坤為泰也兊二兊重乾為履重離為暌重震為歸妹重㢲為中孚重坎為節重艮為損重坤為臨也離三離重乾為同人重兊為革重震為豐重㢲為家人重坎為既濟重艮為賁重坤為明夷也震四震重乾為无妄重兊為隨重離為噬嗑重㢲為益重坎為屯重艮為頤重坤為復也㢲五㢲重乾為姤重兊為大過重離為鼎重震為恒重坎為井重艮為蠱重坤為升也坎六坎重乾為訟重兊為困重離為未濟重震為解重㢲為渙重艮為蒙重坤為師也艮七艮重乾為遯重兊為咸重離為旅重震為小過重㢲為漸重坎為蹇重坤為謙也坤八坤重乾為否重兊為萃重離為晉重震為豫重㢲為觀重坎為比重艮為剥也乾始於西北坤盡於東南乾為重卦之始坤為重卦之終也圓圖圜轉於外圓而動象天天包乎地也方圖定位於内方而静象地地包於天也圓圖其陽在南其隂在北方圖其陽在北其隂在南南者陽之極隂之始也陽極則隂生也北者隂之極陽之始也隂極則陽生也一圖之對待隂陽老少各以類偶圓圖乾坤坎離位於四正震㢲艮兊位於四隅即八卦之位也方圖乾位西北而兊而離而震自西北而之東南坤位東南而艮而坎而㢲自東南而之西北天地髙卑而位列山澤異體而氣通水火隔物以相濟雷風交動而相薄老少之類偶對待之逺近皆造化自然之妙也邵子曰圖雖無文吾終日言之不離乎是神哉神哉先天六十四卦内方外圓圖説先天八卦方圓二圖説卦已悉其義矣此圖則合六十四卦方圓而一之焉蓋圓則其象動而圜轉于外者天包乎地也方則其象静而定位於内者地包乎天也自圓圖觀之雖乾坤定上下之位實姤復肇隂陽之初所以陽生於坤復之交子中也由一陽之復漸積至六陽之乾乾位午中陽極矣隂生於乾姤之交午中也由一隂之姤漸積至六隂之坤坤位子中隂極矣隂陽各三十二卦規而環之故成六十四卦之圓圖天雖位乎上而復為陽始坤生震也陽氣自地而升於天也地雖位乎下而姤為隂始乾生㢲也隂氣自天而降於地也乾坤交剛柔易循環不停此圓圖所以象天之包乎地也自方圖觀之不過即八卦方位因而重之横直各八其象自方故四隅之卦為乾坤否泰若各有定位其實只乾坤二卦以範圍之耳所以乾本位乎上也今列方圖之下者不獨乾之一卦為然自乾至泰横數在下八卦莫非乾宫之卦也坤本位乎下也今列方圖之上者不獨坤之一卦為然自坤至否横數在上莫非坤宫之卦也可見坤上乾下泰之義也陽内隂外地之象也雷動風散皆從中起而隂陽之氣行乎地中地之道也謂方圖象地之包於天也非歟且二圖之對待隂陽老少各以類偶圓圖乾坤坎離位於四正震㢲艮兊位於四隅而八卦周旋生生不測固於乾一兊二離三震四㢲五坎六艮七坤八未嘗一毫亂也方圖乾位西北而兊而離而震自西北而之東南坤位東南而艮而坎而㢲自西南而之西北其横也直也斜也孰非乾一坤八之定序乎噫圓而神方以知本蓍與卦之徳而知來藏往人各有神知在也但以此洗心藏宻存乎其人而圓外方内不過圖象焉耳若使真知方圓象義天地且然況于人乎乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男㢲一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女乾三男坤三女男女即指卦中一隂一陽而言其實震即乾之初爻坎即二爻艮即三爻㢲即坤之初爻離即二爻兊即三爻是六子即乾坤之變化也要之六十四卦三百八十四爻皆八純卦之變八純卦皆乾坤之變乾坤二卦而坤即乾之變耳可見有乾即有坤有乾坤即有震巽坎離艮兊有八卦即有六十四卦爻易之變無窮孰非自然而然者哉朱子曰此圖若以卦畫言之震一陽居下兊一隂居上故相對坎一陽離一隂居中故相對乾純陽坤純隂故相對亦是一説説卦傳曰帝出乎震齊乎㢲相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎㢲㢲東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治葢取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所説也故曰説言乎兊戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所以成終而成始也故曰成言乎艮後天八卦又自取東南西北四方之位及春夏秋冬四時運行之序震位東天三生木陽之穉也於時為春㢲東南春夏之交地八之位木生火也離位南地二生火陽之盛也於時為夏坤西南夏秋之交天七之位土生金也兌位西北地四生金隂之穉也於時為秋乾西北秋冬之交天九之位金生水也坎位北天一生水隂之盛也於時為冬艮東北冬春之交地六之位土孕木也四象生八卦八卦四時也兩儀生四象四時二氣也土為沖氣故位於隂陽之交也四時相推八卦流行循環無窮生生不已後天八卦流行以致用又如此天地之間有對待之體必有流行之用坤彖有曰西南得朋東北䘮朋正合此圖之方位也離為日大明生於東故在先天居東日正照於午日中時也故在後天居南坎為月月生於西故在先天居西月正照於子夜分時也故在後天居北在先天則居生之地在後天則居旺之地不特坎離後天卦位皆以生旺為序正南午位離火旺焉正北子位坎水旺焉震木旺於卯故震居東兊金旺於酉故兊居西土旺中央故坤位金火之間艮位水木之間兊隂金乾陽金故乾次兊居西北震陽木㢲隂木故㢲次震居東南皆以五行生旺為序此所謂易之用也若夫乾綂三男於東北坤綂三女於西南是入用之際男皆從父女皆從母各從其類也後天卦圖後天八卦坎離震兊居四方之正乾坤艮㢲居四隅之偏此其方所由定也説卦傳曰帝出乎震齊乎㢲相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮以此而證乎後天之方位亦無異也由今考古無徵不信今以後天圖考之説卦傳固可以徴而信之矣又何必推原其始畫于何時何人而後為得其真哉況觀象玩辭要在窮理盡性以至於命耳理一也體用本一原先後本一致也有體必有用有先天必有後天也揆諸理亦可無疑彼謂先天圖畫於伏羲後天圖改於文王進六子退乾坤易因文王而後為有流行之用皆臆説也何也天本不可以先後分而以之名卦圖則可若謂聖人于天地之造化為能進退之則非也使必拘泥舊説則伏羲未畫之前豈隂陽八卦本無是體文王未改之前豈隂陽八卦悉滯于對待之體而無流行之用哉伏羲俯仰觀察徒知先天而不知後天流傳數千載未嘗無易何為不知流行變動直待文王而後改哉且伏羲之時帝不出乎震而文王之時天地定位曽得而改易之哉即如先天且非一圖之可盡又安知二圖非一人之畫也觀易云一隂一陽即云隂陽不測云一闔一闢即云往來不窮云天地定位即云帝出乎震其意葢可識矣噫謂後天既改于文王矣而乾坤屯蒙需訟不自仍其改定之圖以序易又何也葢六子必非聖人所能進乾坤必非聖人所能退也惟㑹意於二圖之外庶乎先後無二天者在吾心矣後天八卦方位圖説易變易也有先天必有後天不可執一圖以象易也天地定位章所以發明先天圖象而後天圖當依乾坎艮震之序言之也帝出乎震乃云發明後天圖象何歟葢圖以卦之序次言出震齊㢲以四時之運行四方之定位言此易之所以不可一定拘也震位東天三生木陽之穉也于時為春㢲東南春夏之交地八之位木生火也木氣極盛則風木相感而火徳于是乎彰矣離位南地二生火陽之盛也于時為夏坤西南夏秋之交天七之位土生金也火生土者火盛則土氣沖而土生金者土結則金氣堅而潤澤矣兊位西地四生金隂之穉也于時為秋乾西北秋冬之交天九之位金生水也坎位北天一生水隂之盛也于時為冬艮東北冬春之交地六之位土孕木也金為水母故乾坎之間水氣自旺木為水子十一月律應黄鍾萬物孳萌于子而孕于丑即四時之始終而其八卦之用神妙萬物有如此項氏曰木金土各二者以形王也水火各一者以氣王也坤隂土故在隂地艮陽土故在陽地震陽水故正東㢲隂木故近南而接乎隂兊隂金故正西乾陽金故近北而接乎陽坤之季夏義在中央故言地而不言方兊以物成為説故言秋而不言西是亦足以闡四時四方八卦之義矣可見四象生八卦八卦四時也兩儀生四象四時二氣也土為冲氣故位於隂陽之交也四時相推八卦流行所以萬物生長収藏而嵗功成焉乃後天之易也然則八卦之用謂之後天者得非以其終始萬物而成嵗功歟坤彖曰西南得朋東北䘮朋合此圖之方位觀之亦見矣雖然八卦之所以致用者在乎帝與神也但既曰帝又曰神豈二之哉帝以主宰言神以流行言神即帝也八卦不同帝神一也欲用後天之八卦者盍反身而求其所以主宰流行者果何物哉後天方位本先天反易為六十四卦圓圖之用而方圖八卦之用交皆在於此互易反對震初爻陽對兊上爻隂中爻隂對中爻陽上爻隂對初爻陽左右横觀無不對也艮上爻陽對㢲初爻隂中爻隂對中爻陽初爻隂對上爻陽上下縱觀無不對也乾坤坎離爻爻皆然合八卦互易以觀中有水火雷風山澤反對之體以成先天之功天地之否泰聖人之損益人道之咸恒萬物之既濟未濟周易所以作也或問後天方圖有所考乎曰邵子謂震兊横六卦縱易之用也即易所謂神妙萬物水火不相逮雷風不相悖山澤通氣是已夫震兊横六卦縱非方圖而何元儒張仲純氏始言之而未顯也自方圖觀之震反觀為艮兊反觀為㢲震兊反易互觀而隂陽左右無不對矣艮反觀為震㢲反觀為兊艮㢲反易互觀而隂陽上下無不對矣以至坎離也乾坤也互觀反對爻爻皆然真有不容一毫人力者吾所謂方圖出於造化自然者此也自兩卦反易互觀之乾坤正觀為地天泰反觀為天地否則是乾坤交而神妙乎萬物者也坎離正觀為火水未濟反觀為水火既濟此之謂水火不相逮也艮㢲正觀為澤山咸反觀為雷風恒此之謂雷風不相悖也震兊左觀為雷風益右觀為山澤損此之謂山澤通氣也此八卦先天方圖相交之用周易之反對本此此後天所以為方圖也周易序卦圖上經以乾坤坎離為主以震巽艮兊為客主卦中乾坤為君坎離為臣乾統坤坎先離周易序卦圖總論伏羲畫卦之序首乾終坤至文王繫辭定位上經三十卦首乾坤終坎離下經三十四卦首咸恒終既濟未濟夫子序卦雜卦傳引其端而未竟其説者也蓋先天乾坤坎離為四正之卦兊艮震㢲為四隅之卦上經首乾坤而終坎離者葢以乾坤天地之象諸卦所從出也故為上經之首由是以序卦反對而厯屯䝉需訟師比小畜履凡八卦而為泰否乃乾坤之交不交消息之㑹先泰而後否者自息而消也自此厯同人大有謙豫隨蠱臨觀噬嗑賁凡十卦而為剥復蓋剥盡則為坤而一陽生於復陽自消而息之機也此二卦者乃乾坤之所由成而見於此者以見乾坤之道無時而窮也又厯无妄大畜頤大過而為坎離蓋乾坤天地之道隂陽之正者也坎離水火之象天地之大用也故以水火之正終之然乾坤者隂陽之老坎離者隂陽之中葢舉天地之道而歸於中也況坎一陽盡則為坤離一隂盡則為乾而乾坤固自在其用數不過乎中也下經首咸恒而終既濟未濟葢以咸恒者夫婦之象而人倫所自始也故咸者少男少女之合夫婦之始也恒者長男長女之合夫婦之常也由是厯遯大壯晉明夷家人暌蹇解而為損益夬姤蓋澤山之咸一變而為損雷風之恒一變為益先損而後益者自消而息消息之㑹猶上經之有泰否也由是夬盡為乾而一隂生於姤隂自消而息之機猶上經之有剥復也又厯萃升困井革鼎而為震艮蓋一陽生於震而極於艮陽之終也又厯漸歸妹豐旅為㢲兊蓋一隂生於㢲而極於兊隂之終也震艮㢲兊咸恒二卦所由成也而見於此者以見咸恒之道無時而窮也又厯渙節中孚小過為既濟未濟蓋咸恒夫婦之交隂陽之雜者也故以水火之交終之然咸恒者少男少女長男長女之合而既濟未濟者則中男中女之合蓋舉人倫之道歸於中也況以坎離之中盡升而上之則為兌艮降而下之則為震㢲而兊艮震㢲猶自在也其用數亦不過乎中也蓋乾坤造化之本咸恒人道之本其消息之理固造化人道之常而守中之戒則聖人所以維持造化綱紀人道者也合先天卦位而觀之則上經首乾坤者天地定位也下經首咸恒者山澤通氣雷風相薄也上經終坎離下經終既濟未濟者則又水火不相射之義亦用中之道所謂後天不出先天範圍者也以雜卦之義觀之上經以十八卦反對而成惟乾坤大過頤坎離六卦有對無反凡五十二陽爻五十六隂爻下經亦以十八卦反對而成惟中孚小過二卦有對無反凡五十六陽爻五十二隂爻然上經自乾坤而下内雜以下經十二卦下經自咸恒而下内雜以上經十二卦者以見易卦彼此交互上下經非判然為二者也自大過而下卦不反對者蓋易不可為典要故反對者易之常而不盡以反對拘者所以通易之變也況孔子不欲以姤與夬相對故於姤不言君子道憂小人道長獨於夬而言君子道長小人道憂者所以扶陽抑隂而為天地立心也朱子所謂未知何義者蓋深致其謙而不盡發其藴也又合三聖之易而觀之伏羲之易首乾終坤而姤復居其中以乾坤為諸卦之所藏一陽復則為乾一隂姤則為坤隂陽消息之機先天自然之體也文王之易首乾坤而終未濟者以乾坤為諸卦所出然天地間萬物無常濟之理惟其未濟則皇皇求理盡人事以回造化而乾坤不毁矣綱紀維持之道後天常然之用也孔子之易首乾坤而終夬者蓋天地間事之未濟以小人間之也夬者以陽决隂隂消陽息之機也未濟而求濟者乘其機而一决焉則君子道長小人道消而乾坤定矣蓋於先天後天體用之間而决其機也此三聖為世道慮同一心者也蓋聖人之作易所以範圍天地進退古今故易之為道瀰漫天地流行古今而其用則皆不外於中焉此之謂易之道也玩易象辭總論夫辭以明象象以明理學易者貴由辭得象由象得理也然玩辭易玩象難玩象易玩於象先尤難知玩於象先而易可幾矣凡易之辭曰乾坤曰坎離曰元亨利貞曰隂陽曰剛柔曰中正吉无咎曰凶悔吝名卦列事析爻辨時其稽類撰徳亦詳矣君子由辭之所之玩占之所得雖信非黙成亦或明以㫁焉葢知言于近逆志於己形猶易從而入也若象者辭所由生也上古聖人非不能為之辭以辭不盡意故象以示象像也似也謂意不終盡示其似而已是以象至於變而不窮中古聖人非不欲止於象以象無文而變至賾百姓用之酬酢㫁疑也難故辭以告然象變辭有方終不足盡象告其一隅而已是以辭有所之而不能皆圓故雖象由辭明而後世君子多執辭昧象久則反辭枝而象隠矣且所謂象者何也如竒乾偶坤離虚坎實之類八卦定象也如雷雲為屯山水為䝉澤山為咸風雷為恒水火為既未濟之類八卦變象也乾交坤為坎坤交乾為離互而兊㢲異互而震艮生又定中變象也屯雷動乎險中則震初為卦主大有柔得尊位大中而上下應之則離五為卦主豫主九四咸主九三之類又變中定象也辭吉凶之㫁也象吉凶之兆也辭非特設因兆為之辭如天在山中徳日新而多吉風行天上婦貞厲而多憂一陽反羣隂之下則慶其來一隂遇羣陽之㑹則危其壯頤動以止止吉而動吝井㢲木上水水外吉而内無功推此類則觀文王之辭而卦之吉凶有可言矣艮三與上一也上吉而三危震初與四一也四泥而初吉漸之歸吉六爻之當位也歸妺征凶六爻之不當位也推此類則觀周公之辭而爻之得失有可言矣凡此皆易之象也得辭而明者也然象虚以廣辭約以質玩之若有可據然世之君子多執方泥變三隅不反其類旁引曲附累世不殫其文雖有從而入而得其味者或寡矣況象之情遷局變有毫釐千里之差響傅影附在倐忽疑似之頃如定中變象變中定象神明出入不可方物者乎故曰玩辭易玩象難雖然象尤非聖人所特設也天地水火雷風山澤造化自然之象所謂見乃謂之象也乾坤坎離震㢲艮兌卦畫自然之象所謂象者像此者也試循其本水火雷風山澤天地之變化也地又天之分也是天其本已則所謂天者地水火雷風山澤無所不在其蒼然上穹之謂乎天非蒼然上穹之謂天果何象耶彼坎離震㢲艮兌乾坤之交也坤又乾之􅄲也是乾其本也則所謂乾者坤坎離震㢲艮兌無畫不是其徒三畫之謂乎乾非徒三畫之謂乾果何象耶蓋至是不惟辭無所繫而象之示亦窮矣詩曰維天之命於穆不已謂之於穆則是地水火雷風山澤與蒼然上穹者果不足以盡天而天固有命也大傳曰聖人以此洗心退藏於宻謂之宻則觀象於坤坎離震㢲艮兌與三畫之乾果不足以盡乾而乾固心之宻也蓋必如是而後為窮理盡性以至命也然非闇然君子遯世無悶知天命人心之所止極深研幾以齋戒神明為己功者固未有不枝於辭於象者矣故曰玩象易玩于象先尤難嗚呼知玩易于象先則謂幾先之吉在我又何凶悔吝之足言乎此謂黙成之信葢至於黙成之信而後君子之所以盡心於此者始無遺憾矣先天天地位乎上下日出于東月生于西雷起于地中風行于天上西北多山東南多水此聖人仰觀俯察以取象也有象必有義也乾坤以坎離為用離為日坎為月故易字從日從月合日月而言之惟日月相和寒暑往來以成嵗也故曰天地設位而易行其中玩圖象而義自見矣即圓圖而方圖已寓所以六十四卦有圓圖又有方圖而八卦可圓又亦可方也天地定位六子分列左右交相為用不愈見造化之神妙哉按此二圖總名先天以圓涵方豈圓之外又别有方耶玩方圖乾坤定位六子横列雖乾坤坎離較之圓圖俱未之變而震兌艮㢲實相易矣蓋六十四卦乾坤坎離本不變而各為一宫者也艮震兊㢲則兩卦合為一宫者也惟艮震以一卦反易為二故曰鼓之以雷霆惟兌㢲亦以一卦反易為二故曰潤之以風雨邵子所謂不易者四反易者二以六卦變而成八者此也由是重之六十四卦出焉此伏羲先天為作易之本歟但即其圓象已涵有方義天地造化自不相悖而縱横闔闢何往不然亦可見上天下地而雷風水火山澤變動充滿于其間矣況方圓本自相涵人身造化本同天地玩圖象者又可徒諉之為天地之法象造化之變通云乎哉後天以方為體以圓為用方中涵圓用未嘗離乎體也嘗觀邵子曰易者一隂一陽之謂也震兊始交者也故當朝夕之位坎離交之極者也故當子午之位㢲艮隂陽猶雜故當用之位乾坤純陽純隂故當不用之位吾故曰圓本方布故帝出震齊㢲流行于中而神妙萬物者也然先天之反易為後天之方位後天之流行本先天之圓圖後天之體即先天之用後天之用即先天之體所謂體即用用即體圓即方方即圓先天即後天後天即先天也按此二圖方圖即圓圖之用因其象方故曰後天隂陽卦爻自相對待初無一毫人為安排其間然謂之以方涵圓豈方之外又别有圓乎哉蓋自方圖順數之曰帝出乎震是圖本方布故帝出震齊㢲流行于中而神妙乎萬物者也由乾坤交而三男三女生六子之用皆天地之用也故曰水火不相逮雷風不相悖山澤通氣有是對待之體然後能變化既成萬物也觀其曰帝曰神則是後天皆先天之妙用何疑哉即形與氣言之形體之中皆神氣之運冬至一陽之氣亦自地中而起後天以方涵圓兹可黙㑹矣況潜玩圖象神理昭然正所謂象也者像此者也善學易者宜㑹通而觀之此圖即先天圓圖次序六十四卦三百八十四爻秩然於一圖之中陽在左而上下皆陽包乎隂隂在右而上下皆隂包乎陽雖卦位稍參差不齊實於卦爻未嘗與之以己意而有一毫増損于其間也即其圖而玩之卦雖畫於聖人其隂陽消長之漸姤復之機孰非天地自然之造化哉陳剰夫曽以此圖上之獻宗朝原圖下有一心字以圖當中心一㸃未免視圖與心為二也今止存其圖云夫卦止六爻六爻即六位也此圖參差錯綜雖曰連其虚位不免七其數矣似與舊圖不合然以七日來復之義揆之亦與易道不相妨也是故乾純陽也坤純隂也而隂陽皆由㣲至著其機實始于姤復之間自一陽以漸至純陽自一隂以漸至純隂非一朝一夕之故也試自陽儀觀之復本一陽在下頤則二陽而陽尚上屯之二陽進而在五益雖三陽五上相連震則陽進而六四矣由此漸進為大壯為夬為純陽之乾而隂儀由姤漸進至坤亦如之是造化罔不由積累而成而詳玩此圖謂其無漸次不可也觀天地之化機而人心其即天地乎哉是可以識心學矣噫以此洗心宻藏何往不然此圖亦以天地定位山澤通氣雷風相薄水火不相射一章觀之乾以三陽成卦天者陽氣之積處乎上者也故取象於天坤以三隂成卦地者隂氣之積居乎下者也故取象於地以天髙地下不可易也故曰定位艮以一陽二隂陽上而隂下陽㣲而隂盛也故取象於山兊以二陽一隂隂上而陽下隂㣲而陽盛也故象於澤以山行生氣澤止生氣故曰通氣震以一陽在下二隂在上隂包陽也故取象於雷㢲以一隂在下二陽居上陽嘘隂也故取象於風以柔得剛而為雷隂得陽而為風故曰相薄坎以陽内而隂外内實而外虚也故取象于水離以隂内而陽外内暗而外明也故取象于火水生于有火生于無水者火之地火者水之氣故曰不相射伏羲仰觀俯察逺求近取畫卦定位以乾上坤下法天地也離東坎西象日月也山起西北澤鍾東南故艮兌居之雷震東北風發西南故震㢲居之此天地鬼神變化之情狀也易大傳曰天尊地卑乾坤定矣曰崇效天卑法地曰天地定位是其所謂位者謂其定於上下卑髙而非乾南坤北一定之謂也惟乾坤定上下之位坎離列左右之門山澤通氣於其間雷風相薄於其内此所以八卦相錯而太極兩儀四象八卦在目中矣況此圖不過即先天横圖豎起觀之初無所作為于其間也果能即横圖圓圖方圖豎圖合之而得其所以同析之而得其所以異則善於易矣彼拘拘然執乾南坤北之説執乾坤退位之説者試即是圖并天地法象而詳玩之先天後天總説伏羲之畫卦也蓋有圖而無書有占而無文也至文王而後有書有文爾大傳曰易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶又曰數往者順知來者逆是故易逆數也此謂先天圖也乾一兌二離三震四㢲五坎六艮七坤八中㫁横圖左右回環是謂圓圖八叠横圖是為方圖法象自然之數人力不可加毫末於此矣其位乾南陽也坤北隂也離東大明生於東也坎西月生於西日入於西也震東北隂盛於北而一陽生也㢲西南陽盛於南而一隂生也西北多山陵艮居之東南多川澤兌居之此地理自然之形也自震四一陽之復為冬至厯離三兊二之交為卯中則由一陽二陽三陽四陽五陽至六陽為乾一之乾而姤生自㢲五一隂之姤為夏至厯坎六艮七之交為酉中則由一隂二隂三隂四隂五隂至六隂為坤八之坤而復生此天運循環之序也方圖乾始於西北坤盡於東南則乾一兌二離三震四㢲五坎六艮七坤八皆生卦之交也自西南至東北則否泰損咸恒益既濟未濟皆三陽三隂之交也圓者象天大而天地古今元㑹運世小而嵗月日時皆不離乎是方者象地而凡天地人鬼事物消長氣數推移皆出乎是以伏羲之時未有文字此六十四卦者即六十四大字也字書不過象形㑹意指事轉注而六十四卦備之是六十四字者天地人事時義物理之常變悉管乎是矣而又加縱横差互對待相為意義邵子所謂圖雖無文吾終日言未嘗離乎是蓋天地萬物之理盡在其中者是也至其占辭傳夏厯商又有連山歸藏之屬而世不傳學者多謂邵氏互體既濟卦諸圖即連山法也後世納甲歸魂之法即歸藏之遺法也然其辭不復可考或有吉凶而無教戒與文王蒙難羑里樂天憂世以己及物慮天下後世無以處於吉凶悔吝之塗也於是乎演而為易其為易也意若曰伏羲之圖蓋法象自然一定之體而未盡著其用伏羲之卦雖加互成文自然之㫖而未各錯諸辭民用弗彰大道易隠於是移先天之體為後天入用之位翻六十四卦變易之象而繫吉凶利否之辭焉其位則探河圖生成之位為後天日用之位以先天方圖乾居西北西北亥位也室壁天門也亥者子之父子者亥之子乾居父位動為天一以生氷則坎子居北水生木則天三之震居東木生火則地二之離居南火生土坤者土之體也則間火金之間而居西南土生金則地四兊金居西至於金又生水焉土本居中分王四方故河圖天五地十居中而四隅空後天則太極虚中而四隅實蓋土分王四方也土既分王則乾坤艮㢲皆土位也乾者土之牡為父居西北坤者土之體也火金本相尅坤在其間則相生此坤之所以西南也艮山土之積㢲木土之官也故居二隅焉水雖生木然木之生必合水土之氣故艮輔坎水以生木艮者木之根也又其性止也止而後能動説卦所謂終萬物始萬物也故艮居東北震者木之生㢲者木之氣也木不能以自生火必有所入而後木氣發而為火焉故㢲居東南天地之造莫大於生成木生物之氣也金成物之氣也震木也㢲亦木也震居天三之木發生萬物㢲木居東南以成之則生意益全而物生皆齊矣兌金也乾亦金也兌居地四之金肅成萬物乾居西北以收之則成物無遺而物成反本矣此後天自然之用也天地運乎四時胎育萬物之用盡在其中矣若夫乾坤父母居不用之位而六子代用事則邵子固言之矣然乾坤固天地也易於乾坤譬諸言仁有專言者焉有偏言者焉専言乾坤則包六子而該六十四卦偏言則八卦配八方而乾坤六子均為入用之位耳凡圖意所該有言蓋淺至於卦則兩兩反對以見對待消長上下升降之變其體别雜卦言之而邵子三十六宫之名所從出也其序則本主於反對而序卦以次序言之雖非精義亦其一意也而凡易圖加叠對並之義亦發例於此矣其辭則或取之二體或取之二象或取之二中或取之主爻或取之卦變或取之成卦之義丁寜告戒以前民用聖人之憂患後世於是為至或曰卦體竒偶竒七而偶八彖辭者卦體七八之常也象辭者毎爻九六之變也文王之辭彖而不象則是揲蓍求卦者將常得七八而不遇九六乎或遇九六而無其占則文王之為民立占者蓋未備也曰是誠未備也所以周公繼之以附爻辭以盡九六之變而占辭始備爾然方六十四卦始有彖辭筮者而遇九六則亦兼占變卦之彖而已且以一卦為例言之乾之初變則為姤雖未有勿用之辭而姤之勿用可占也乾之二變則為同人雖無在田之象而同人于野之意可知也乾之三變則為履雖未有乾乾惕厲之戒而履之履虎不咥可卜也至於四變而小畜則不雨之辭不待躍淵而可喻五變而大有則元亨之時不待飛龍而可想六變而夬則物極當决又不待亢之為言而可知矣雖然終未盡乎事物之變也故周公因之遂著九六之辭焉凡言九六者皆謂毎爻之變也然又安知文王之時不已有象辭而周公特脩補之耶故河洛第九篇曰周文増通八八之節轉序三百八十四爻而揚雄亦有文王附以六爻之説參同契亦謂文王帝之宗結體演爻辭也道之晦明蓋闗世運伏羲先天自孔子説卦以後儒者無傳焉而方外之士傳之如魏伯陽闗子明可槩見矣至宋文明之世則希夷先生陳圖南始出以示人三傳而至邵子始大發明於當世然易道至此亦大備矣邵子象數程子義理朱子兼之而主筮占邵子觀象推數而知法象自然之妙故曰畫前元有易程子玩辭求意以為理無形也易假象以顯義爾故曰至㣲者理也至著者象也體用一原顯㣲無間朱子深究二家之説上泝四聖之心謂易為卜筮而作卦本象數而畫理因卦爻而著故曰理定既實事來尚虚用應始有體該本無嗚呼易道是謂大備是以朱子贊之曰邵傳羲畫程演周經象陳數列言盡理得彌億萬年永著常式又曰惟斯未啟以俟後人蓋語占也今撮其大要著于篇以俟學者共攷焉先天後天總論一乾九五文言曰先天而天弗違後天而奉天時夫子初未嘗以八卦分先後天也至邵子乃以名卦圖亦未為不可蓋其意謂先天者如六十四卦天本未嘗作為而伏羲畫之故謂之先乎天也及天地間已有六十四卦文王就六十四卦内更定其卦位從而序之繫之故謂之後乎天也但既分先後天而又以先天屬之伏羲後天屬之文王不知何所據哉況其詩云若問先天一事無後天還始着工夫所謂一事無者只順其自然如太極生兩儀兩儀生四象四象生八卦由八而十六由十六而三十二由三十二而六十四只是加一倍法未嘗有工夫以作為之也所謂着工夫者進六子退乾坤與夫序卦繫卦之類皆非先天無一事之自然矣果如此區别則文王與伏羲豈特各一其易而已哉且一隂一陽之謂道隂陽不測之謂神自有隂陽以來即隂陽不測也是故有先天之體即有後天之用體用本非二也自二圖言之有指體而言者天地定位一章是也有指用而言者帝出乎震一章是也但既云天地定位矣又曰八卦相錯既云帝出乎震撓萬物者莫疾乎風矣又云水火相逮雷風不相悖山澤通氣然後能變化既成萬物也然則八卦相錯神妙萬物且不可以先天後天分也明矣何必曰進六子退乾坤為文王所更定焉乾坎艮震㢲離坤兊乃後天卦位也今所傳之易乃文王之易何為始乾即繼之以坤又繼以屯䝉需訟師比而不依乎後天圖之次序耶此皆自先天圖後天圖之辨異言耳然説愈繁愈支又有以二圖而一一強合之者如董盤澗謂天地以中相易為坎離水火以上下相易為震兌澤雷以上下相易為㢲艮風山以上下交易為乾坤六子並以一爻變惟乾坤變其交隂陽之純故也其説似精其實皆取諸對宫也殊不知八卦只是隂陽竒偶先天卦位陽爻多者俱從乾隂爻多者俱從坤後天卦位乾綂三子於東北坤綂三女於西南在先天圖雖曰立其對待之體而八卦相錯未嘗不遇乎流行之機在後天圖雖曰達其流行之用而水火相逮未嘗不寓乎對待之妙此所以周流六虚變動不居何必一一強同之也信乎一隂一陽之謂道隂陽不測之謂神神也道也一也求先天後天之説者求諸此而已矣先天後天總論二道不可以言求也而立言本諸聖吾惟求言於聖則諸凡言説不能淆矣道不可以象示也而垂象本諸天吾惟觀象於天則諸凡圖象不能惑矣況聖人之道天道也後人欲希聖希天孰能外造化自然之運以為之教哉是故太極分隂分陽生天生地人物一皆天地隂陽生生不已也然上天之載無聲無臭天命之性不覩不聞自未發而謂之中天下之大本也自發皆中節謂之和天下之達道也性果可以發與未發分言之哉性不可見而可見者喜怒哀樂相生其不可覩聞如故也滯於喜怒哀樂謂其無未發不可也因其不可覩聞而謂其一於中也可乎哉先天後天即發與未發之謂也易曰先天而天不違後天而奉天時一也後先時耳取之以名圖象奚不可者又豈先天一於對待之體而專於圓後天一於流行之用而局於方也耶天地定位山澤通氣雷風相薄水火不相射先天圖若對待不可易矣而八卦相錯未嘗不流行也繫辭首章尊卑貴賤動静剛柔羣分類聚俱以對待言也鼓之以雷霆潤之以風雨日月運行一寒一暑亦未嘗不流行矣後天帝出震齊㢲見離役坤説兊戰乾勞坎成艮而神妙萬物矣然乾坤交而有水火風雷山澤反易而有震㢲艮兌其對待自在也上下經六十四卦莫非後天之用而反對三十六果一于流行乎哉且先天圖一也順則右轉由純陽反之一陽由純隂反之一隂故數往也逆則左轉由一陽以至純陽由一隂以至純隂故知來也其流行不已而先天即後天也後天圖一也乾綂三男於東北而物由以生坤統三女於西南而物由以成此其對待不易後天豈外於先天哉約而言之六十四卦本之乾坤乾元資始陽也而變化乃利貞未嘗一於乾矣坤元資生隂也然永貞以大終坤亦何嘗非乾乎此造化自然之運雖天地不能違也況於人乎雖然乾曰統天坤曰乃順承天則周易首乾次坤匪特六十四卦由乾坤變化之已也言道而至于綂天則無聲無臭不覩不聞發與未發先天後天舉在其中矣然則因聖人之言以探其無言之祕因天地之象以求其無象之真盍㑹觀先天後天圖而融通之造化不在吾掌握中乎内一層即先天圓圖八卦生六十四卦是也中一層即方圖六十四卦八八皆從下而上者是也外一層即周易所次卦序是也讀易者知有先天後天而中天未之知也豈深於易者乎易曰太極生兩儀兩儀生四象四象生八卦是太極者造化之根柢也未有天地由此生天生地故曰先天既有天地由此生人生物故曰後天先天圓圖也圓者象天者也後天方圖也方者象地者也先天以圓為體以方為用圓中涵方天包乎地也後天以方為體以圓為用方中涵圓地承乎天也是非先天之外又一後天也天不離乎地先天之體即後天之用也如先天正對天地定位以立其體然陽中隂生隂中陽生即後天流行之用也非後天之外又有一先天也地不離乎天後天之體即先天之用也如後天反對震兌横以立其體然震反為艮兌反為㢲即先天反易之用也體不離乎用用不離乎體體即用用即體也先天正對中有反易後天反易中有正對是非太極之外又有先天後天也天地之體用即太極之體用後天之生生即先天之生生先天之生生即太極之生生後天也先天也渾然一太極也此方圖從震兌横六卦縱言之前圖先後天皆圓此圖先天圓後天方且兼太極言也三圖總論伏羲心法妙在太極一圖以此洗心退藏於宻以此齋戒神明其徳謂非有非無無方無體先天後天由此而出也先天動而生陽静而生隂順則三陽三隂自外而内化育之真機也逆則三陽三隂自内而外聖神之妙用也一陽初動坤變為震艮變為離此易為逆天地人之至妙者也後天帝出乎震神妙萬物乾綂三男而上交三女萬物之所以生也坤統三女而下交三男萬物之所以成也六子成功長少反易陽隂合體皆變為乾三十六宫都是春也自無而有自有而無一順一逆曰神明曰神妙曰帝曰乾無聲無臭至矣三圖總論太極先天後天圖則三意則一也自太極觀先天太極為體先天為用自先天觀後天先天為體後天為用先天體也而流行之用未嘗不存也後天用也而對待之體未嘗不在也是先天體圓而用方者也後天體方而用圓者也是後天出於先天也先天本於太極也一造化自然之妙也或祕焉不以傳或傳矣而未顯體用分方圓異由是穿鑿附㑹而圖之意隠矣先天八卦乾兌生於老陽之四九離震生於少隂之三八㢲坎生於少陽之二七艮坤生於老隂之一六其卦未嘗不與洛書之位數合即其説以洛書屬先天河圖屬後天其穿鑿附㑹自見後天八卦坎一六水離二七火震巽三八木乾兌四九金坤艮五十土其卦未嘗不與河圖之位數合此圖書相為經緯而先後天亦相為表裏但即其説似精㣲究其實則舛謬四圖總説是編所録皆不易之常道也復録兹四圖者何懼其易以惑人也然易匪取則河圖範匪取則洛書何以証之繫辭謂河出圖洛出書聖人則之是則龍馬身中旋文五十五數以為圖則靈龜甲上直文四十五數以為書也又謂庖犧仰俯近遠于是始作八卦曷嘗則之于河圖洪範謂禹治洪水彛倫攸敘故天錫以九疇曷嘗語其則之洛書耶至以易卦分先天後天可也寧知大哉乾元乃統天至哉坤元乃順承天雖以乾坤分先後天無不可者乃云先天八卦合洛書數後天八卦合河圖數未免以圖書之數分先後天矣矧統天之乾徹上徹下無有隐顯靡不囊括貫通凡帝謨聖訓何往不合此正孟子所惡於智者為其鑿也噫是道也周流六虚變動不居不可以象數盡不可以思議言説窮古人垂訓立教或各有所指後人每每牽扯比擬合之而愈混析之而愈支詎四圖為然哉河圖洛書先天後天總論河圖洛書二圖専于數先天後天二圖専于卦數有奇偶之分卦位有體用之别先儒論之詳矣繫辭天一地二云云所以明河圖數也說卦天地定位云云所以明先天卦也帝出乎震云云所以明後天卦也易于洛書雖未詳言而河出圖洛出書聖人並舉焉要皆所以發明乎易之道也然參天兩地而倚數觀變於隂陽而立卦總之和順道徳而理於義窮理盡性以至於命則是數也卦也乃聖人道徳性命之學而實本諸天地隂陽之變化也其可徒拘于奇偶體用而疑其合不合哉是故數肇於天地卦象乎隂陽使於天地隂陽之造化未能洞徹淵微欲其參兩而觀變也難矣使河圖其數偶其位亦偶隂陽同處其方固其數之偶而静以立其體洛書其數奇其位亦奇隂陽各居其所是為數之奇而動以達其用若此其不相侔也然圖雖數之偶也以一合六二合七三合八四合九五合十何嘗不奇書雖數之奇而五處其中一九二八三七四六環向配合亦自有十數在焉何嘗不偶也先天卦位乾坤縱而六子横固為易之體後天卦位震兌横而六子縱則為易之用亦若此其不合也然天地定位若専以對待言之矣又云八卦相錯未嘗有體而無用帝出乎震齊乎㢲若専以流行言之矣亦云水火相逮雷風不相悖山澤通氣何嘗有用而無體哉蓋四象生八卦九六為隂陽之老七八為隂陽之少皆舉成數而言而五方不過東南西北中五行不過金木水火土而已今謂先天卦位乾兌生於老陽之四九離震生於少隂之三八㢲坎生於少陽之二七坤艮生於老隂之一六未嘗不與洛書之位數合後天卦位坎一六水離二七火震㢲三八木乾兌四九金亦未嘗不與河圖之數合即其所論若真得乎聖人則圖書以畫卦之意矣宜其數與位皆不可易也然在圖一艮二兌三震四㢲六坤七乾八離九坎在書則一坎二㢲三離四兌六艮七坤八震九乾何也且先天取則於洛書則謂四十九數為河圖者未可盡非矣不然洛書畫於禹何為先天八卦已出伏羲也後天取則於河圖謂五十五數為洛書者未可盡非矣不然河圖畫於伏羲何為後天八卦至文王而始則之也先儒自相矛盾嘗求之不得其說焉雖衆言淆亂折諸聖易繫辭曰河出圖洛出書聖人則之易有四象所以示也是聖人本則龍馬旋文以為圖則洛龜坼文以為書先天後天不過取則四象以畫卦葢於天地變化黙契脗合故隨其畫圖畫卦縱横錯綜其隂陽奇偶自與造化相孚生克循環體用貫徹因各為圖以示之象耳但可謂其因數畫卦而謂其裂數以就卦也奚可哉知此則圖非専于偶書非專于奇先天非専于體後天非専于用而乾用九坤用六則圖書非専于數先天後天非専于卦也彰彰矣況河圖數五十有五相生則盈洛書數四十有五相克則不足造化未有生而不克未有克而不生而克之正以生之也先天之卦體雖對待不易後天之用常流行不窮可見有是對待不易之體必有是流行不窮之用而惟其流行之不窮所以恒久而不已也此皆天地隂陽自然之運聖人因畫象圖以示人耳所以于數曰成變化而行鬼神于卦曰然後成變化既成萬物也茍執卦數而疑之則奇與偶别體與用殊豈所以論變化之道哉要之自兩儀四象八卦之象數言之即如一書中匪特圖書奇偶不相侔而大衍之數且與圖書異匪特先天後天體用不相合而序卦又與先後天之方位殊矣是皆執名泥象非所論於道徳性命之學也噫易有太極不可以方所拘而變化摩盪夫固卦數圖象所自出者也欲參兩觀變而窮理盡性以致命者惟於太極潜神焉庶幾一以貫之圖書編卷二
