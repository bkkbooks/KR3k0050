body:
  text: 圖書編卷一百十三明章潢撰諸家樂律圖說總叙聞樂固可以知徳有徳斯可以作樂是徳為樂之本也前已述其概矣器數亦樂之所必用者惟有樂徳之人心和氣和考古證今自能盡其制也但古人於器數之間亦嘗殫心思以䆒竟之雖所見不同而所尚短長亦因以異故於黄鍾九寸及三寸九分之說各有所據然以理裁之管之長者則其氣沉其聲必徐而婉管之短者其氣浮其聲必急而剽求元聲元氣者此亦可以得其義也若以聲之清濁論則短長之管皆有清有濁如人之碩大者豈其聲皆重而濁癯痩者豈其聲皆輕而清乎知清濁不在短長之管則一元之氣為黄鍾元聲者豈可盡以管之短長論哉雖然樂器亦未易言盍稽諸詩乎如鼓瑟吹笙非徒取其笙瑟之並奏也葢瑟聲不可自和必以笙而和之也如吹笙鼓簧云者他竹音皆按其孔則無聲放其孔則有聲惟笙放其孔則無聲按其孔則有聲故謂之鼓葢吹笙必鼓簧也即一笙管而他可知矣今採其無害於義者並存於後以俟正樂之君子云司馬遷律書黄鍾八寸七分一宫八寸十分一林鍾五寸七分四角五寸十分四太簇七寸七分二角七寸十分二南吕四寸七分八徵四寸十分八姑洗六寸七分四羽六寸十分四應鍾四寸二分三分二羽四寸二分二分二􅅋賔五寸六分三分一五寸六分三分二强四百八十六大吕七寸五分三分一七寸五分三分二强四百五夷則五寸四分三分二商五寸口口三分二弱二百一十六夾鍾六寸一分三分一六寸七分三分一強一百九十八無射四寸四分三分二四寸四分三分二强六百二仲吕五寸九分三分二徴五寸九分三分二強五百八十一按律書此章所記分寸之法與他説不同以難曉故多誤葢取黄鍾之律九寸一寸九分凡八十一分而又以十約之為寸故云八寸十分一本作七分一者誤也今以相生次序列而正之其應鍾以下則有小分小分以三為法如厯家大少餘分強弱耳其法未宻也今以二千一百八十七為全分七百二十九為三分一一千四百五十八為三分二餘分之多者為強少者為弱列於逐律之下其誤字悉正之隋志引此章中黄鍾林鍾太簇應鍾四律寸分以為與班固司馬彪鄭氏蔡邕杜䕫荀朂所論雖尺有増減而十二律之寸數並同則是時律書尚未誤也及司馬貞索隠始以舊本作七分一為誤其誤亦未久也沈括亦曰此章七字皆當作十字誤屈中畫耳大要律書用相生分數相生之法以黄鍾為八十一分今以十為寸法故有八寸一分漢前後志及諸家用審度分數審度之法以黄鍾之長為九十分亦以十為寸法故有九十分法雖不同其長短則一故隋志云寸數並同也永嘉陳氏曰律吕之法起於黄帝氏律吕之說定於太史氏知黄帝氏之法而不知太史公之說則難於制律知太史公之說而未知黄帝氏之法則雖未能制律而不害其為律矣何者黄帝使伶倫取嶰谷之竹制十二管吹陽律以候鳳吹隂律以擬凰而十二律之法由是而定信乎起於黄帝氏者也黄帝之法雖存而太史公之說未出則天下之人雖知律之不可闕於樂而不知所以制律之本雖知律之不可廢於度量衡而不逹所以制律之意本不知而意不逹則雖㫁竹鑄鍾定形實竅區區用上黨之黍分其長短而較其合否窮日夜之力以為之未見其能定也然則太史公之説果安在哉葢太史公之為律書也其始不言律而言兵不言兵之用而言兵之偃及言兵之偃而於漢之文帝尤加詳焉既曰陳武請伐朝鮮而文帝謂願且堅邉設候結和通使由是而天下富庶雞鳴狗吠煙火萬里可謂和樂者矣又曰文帝之時能不擾亂由是而百姓遂安耆老之人不至市廛遊遨嬉戲如小兒狀嗚呼若太史公者可謂知律吕之時而逹制律之意者也當文帝時􅅯兵息民結和通使而天下安樂則民氣歡洽隂陽協和而天地之氣亦隨以正茍制器以候之其氣之相應自然知吾律之為是其氣之不合自然知吾律之為非因天地之正氣以定一代之正律律有不可定者乎古人所謂天地之氣合以生風天地之風氣正而十二律定殆謂是歟然則律吕之説豈非定於太史公者歟漢律志京房六十律黄鍾子黄鍾生林鍾未林鍾生太簇寅太簇生南吕酉南吕生姑洗辰姑洗生應鍾亥應鍾生􅅋賔午􅅋賔生大吕丑大吕生夷則申夷則生夾鍾卯夾鍾生無射戌無射生仲吕巳仲吕生執始子執始生去㓕未去㓕生時息寅時息生結躬酉結躬生變虞辰變虞生遲内亥遲内生盛變午盛變生分否丑分否生解形申解形生開時卯開時生閉掩戌閉掩生南中巳南中生丙盛子丙盛生安度未安度生屈齊寅屈齊生歸期酉歸期生路時辰路時生未育亥未育生離宫午離宫生凌隂丑凌隂生去南申去南生族嘉卯族嘉生凌齊戌凌齊生内負巳内負生分動子分動生歸嘉未歸嘉生隨時寅隨時生未卯酉未卯生形始辰形始生遲時亥遲時生制時午制時生少出丑少出生分積申分積生争南卯争南生期保戌期保生物應巳物應生質未子質未生否與未否與生形晉寅形晉生惟汗酉惟汗生依行辰依行生包育亥包育生謙待未謙待生未知寅未知生白吕酉白吕生南授辰南授生分烏亥分烏生南事午按世之論律者皆以十二律為循環相生不知三分損益之數徃而不返仲吕再生黄鍾止得八寸七分有竒不成黄鍾正聲京房覺其如此故仲吕再生别名執始轉生四十八律其三分損益不盡之筭或棄或増夫仲吕上生不成黄鍾京房之見則是矣至於轉生四十八律則是不知變律之數止於六者出於自然不可復加雖強加之而亦無所用也况律學㣲妙其生數律法正在毫釐秒忽之間今乃以不盡之筭不容損益遂或棄之或增之則其畸贏贅虧之積亦不得為此律矣又依行在辰上生包育編於黄鍾之次乃是隔九其黄鍾林鍾太簇南吕姑洗毎律統五律􅅋賔應鍾每律統四律大吕夾鍾仲吕夷則無射毎律統三律三五不周多寡不利其與反生黄鍾相去五十百歩之間耳意者房之所傳出於焦氏焦氏卦氣之學亦去四而為六十故其推律亦必求合卦氣之數不知數之自然在律者不可增而於卦者不可減也何承天劉焯議房之病葢得其一二然承天與焯皆欲增林鍾已下十一律之分使至仲吕反生黄鍾還得十七萬七千一百四十七之數如此則是惟黄鍾一律成律他十一律皆不應三分損益之數其失尤甚於房矣可謂目察秋毫而不見其睫也蔡氏律吕本原黄鍾長九寸空圍九分積八百一十分按天地之數始於一終於十其一三五七九為陽九者陽之成也其二四六八十為隂十者隂之成也黄鍾者陽聲之始陽氣之動也故其數九分寸之數具於聲氣之元不可得而見及㫁竹為管吹之而聲和候之而氣應而後數始形焉均其長得九寸審其圍得九分此章凢言分者此十分寸之一積其實得八百一十分長九寸圍九分積八百一十分是謂律本度量衡權於是而受法十一律由是而損益焉蔡氏以此為樂本是樂之本特在於管之分寸焉耳但既云黄鍾者陽聲之始陽氣之動也故其數九分寸之數具於聲氣之元不可得而見是管竹未㫁之先無所謂數也又云及㫁竹為管吹之而聲和候之而氣應而後數始形是數乃在於聲和氣應之後矣然則方其㫁竹為管之時果有分寸之數歟亦多截之取其聲和氣應者以定其分寸而後有所謂長九寸空圍九分積八百一十分之數歟况即一管至破一寸為一萬九十餘分又析分為釐析釐為毫析毫為絲析絲為忽而其數整然之不差歟即一黄鍾其長九寸其實至一十七萬七千一百四十七而三分損益以生十一律歟雖黄鍾之實信乎一十七萬七千一百四十七矣不知從古造律者曾有如其數而實之者歟雖黄鍾之長信乎其為九寸矣不知以何代之尺定其分寸而後九九之數為盡合歟若其所云分寸毫釐絲忽記之書册為可觀而施之樂器無實用則又奚取於數之詳歟即其所定樂本且如此而他又何待辯也後漢鄭康成曰陽管為律隂管為吕布十二辰子為黄鍾管圎九分而長九寸同位娶妻隔八生子下生者三分去一上生者三分益一黄鍾乾之初九也隔八而下生林鍾坤之初六林鍾又隔八而上生太簇之九二太簇又上生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生􅅋賔之九四􅅋賔又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生仲吕之上六五下六上乃一終矣前漢司馬遷鍾術曰以下生者倍其實三其法如黄鍾九寸倍之則為十八三其法則十八為三六故下生林鍾長六寸以上生者四其實三其法如林鍾六寸四之則為二十四三其法則二十四為三八故上生太簇長八寸上九商八羽七角六宫五徴九此十二字恐傳冩之悮當作宫九徴六商八羽五角七十字置一而三之以為法如法得長九寸凡得九寸命曰黄鍾之宫置子之一而九三之至酉則得一萬九千六百八十八算為子之寸法矣置子之實十七萬七千一百四十七筭而以寸法約則一萬九千六百八十有三筭為三寸而通其實之全數得九寸矣故曰音始於宫窮於角數始於一終於十成於三氣始於冬至周而復生此諸儒無異說也其論之不同者具譜於左覽者可以考其得失焉今按鄭氏與太史說不同太史二説又自為異而今皆取之且以鄭先於馬者鄭氏之言分寸審度之正法也太史之言欲其便於損益而為假借之權制也葢律管之長以九為本上下相生以三為法而鄭氏所用正法破一寸以為十分而其下破分為釐破釐為毫破毫為絲破絲為忽皆必以十為數則其數中損益之際皆有餘分雖有巧厯終不能盡是以自分而下遂不可析而以九相乗歴十二管至破一寸以為一萬九千餘分而後畧可得而記焉然亦苦於難記而易差終不若太史公之法為得其要而易考也葢其以子為一而十一三之以至於亥則得十七萬七千一百四十七筭而子為全律之實可知矣以寅為子之寸數而酉為寸法則其律有九寸可知矣以辰為子之分數而未為分法則其寸有九分可知矣以午為子之釐數而已為釐法則其分有九釐可知矣以申為子之毫數而卯為毫法則其釐有九毫可知矣以戌為子之絲數而丑為絲法則其毫有九絲可知矣下而為忽亦因絲而九之雖出權宜而不害其得乎自然之數以之損益則三分之數整齊簡直易記而不差也其曰黄鍾八寸十分一者亦倣此意但以正法之數合其權法之分故不同耳其實不異也五聲相生損益先後之次宫十一八徴十四五商十二七羽十八四角十四六下生徴上生商下生羽上生角下生變宫史記聲數曰九九八十一以為宫三分去一五十四以為徴三七益一七十二以為商三分去一四十八以為羽三分益一六十四以為角唐杜佑通典曰宫生徴三分宫數八十一分各二十七下生去一去二十七餘五十四以為徴故徴數五十四也徴生商三分徴數五十四各十八上生者加一加十八於五十四得七十二以為啇故商數七十二也商生羽三分商數七十二分各二十四下生者去一去二十四餘四十八以為羽故羽數四十八也羽生角三分羽數四十八分各十六上生者益一加十六於四十八得六十四以為角故角數六十四也此五聲大小之次也是黄鍾為君均用五聲之法以下十一辰辰各有五聲其為宫商之法亦如之故辰各有五聲合為六十聲是十二律之正聲也沈括疑史記此說止是黄鍾一均之數非衆律之通法今詳通典云十一辰宫商之法亦如之若以十一律為宫亦用此數以乗之本律之分數以損益之林鍾為均則以八十一為五十四二十七為十八之類是也二變相生之法杜氏通典註曰按應為變宫􅅋賔為變徴自殷以前但有五音自周以來加文也武二聲謂之七聲五聲為正二聲為變變者和變宫變徴四十二餘九分分之六五十四餘九分分之八羽前宫後角後徴前上生變徴國語周景王問於伶州鳩曰七律者何韋昭註曰周言七音黄鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽應鍾為變宫􅅋賔為變徴後漢志説與此同此說葢以黄鍾為宫法餘並凖此淮南子曰姑洗生應鍾比於正音故為和應鍾生􅅋賔不比於正音故為繆今按五聲相生至於角位則其數六十有四隔八下生當得宫前一位以為變宫然其數三分損一毎分各得二十有一分不可損益故五聲之正至此而窮若欲生之則須更以所餘一分析而為九損其三分之一分乃得四十二分餘九分分之六而後得成變宫之數又自變宫陽八上生當得徴前一位其數五十有六餘九分分之八以為變徵正合相生之法自此又當下生則又餘一分不可損益而其數又窮故立均之法於是而終焉然而二變自為和繆已不得為正聲矣通典曰以子聲比正聲則正聲為倍以正聲比子聲則子聲為半如黄鍾之管正聲九寸子聲則四寸半也十二正聲各有一定之聲而旋相為宫則五聲初無定位髙者或下當下者或髙則宫商失序而聲不和諧故取其半律以為子聲當上生而所生者短則下取以為用然以三分損益之法計之則亦適合下生之數而自此律又以正律下生則復得其本法而於半律又合上生之數此惟杜氏言之而他書不及黄鍾以四寸半為半律而圖以為無者以九分之寸折至絲杪終無可記之數林南應不用者相生之不及也此又杜氏所未言故詳著之又上下相生之法者以中宫之管其六寸一萬九千六百八十三分寸之萬二千九百七十四上生黄鍾三分益一不及正律九寸之數但得八寸五萬九千四十九分寸之五萬一千八百九十六以為黄鍾之變律半之得四寸五萬九千四十九分寸之二萬五千九百四十八以為黄鍾變律之子聲此依本文稍加詳潤其不及至數但九字以為至之變律七字變律之子聲五字皆今所增入本數猶用十分之寸計之尚為繁冗以九分之寸更定於圗内而於此詳其本文又上下相生以至仲吕皆以相生所得之律寸數半之以為子聲之律今按􅅋賔以下仲吕上生之所不及故無變律而惟黄大姑林南應有之正變通十八律各有半聲為三十六聲其間又有八聲雖有而無所用實計二十八聲而以杜氏又言變律上下相生以至仲吕則是又當増十二聲而合為四十八聲似大過無所用也今雅樂俗樂皆有四清聲其原葢出於此然欠八聲且無變律則其法又大疎畧而用有不周矣覧者詳之漢志曰黄鍾不復與他律為役者黄鍾至尊無與並也此言黄鍾惟於本宫用正律若他律為宫則黄鍾之為商角徴羽二變者此但用其變律而正律不復與之為役也此與通典變律之説相發明而本志所言有未盡者故别其大要附於此云施宫四十八聲之圖宫下生徴上生商下生羽上生角下生變宫上生變徴第一宫黄正林正大正南正姑正應正􅅋正第二宫林正大正半南正姑正半應正􅅋正大正半第三宫大正南正姑正應正􅅋正大正半夷正第四宫南正姑正半應正㽔正半大正半夷正半夾正半第五宫姑正應正㽔正大正半夷正夾正半無正第六宫應正㽔正半大正半夷正半夾正半無正半中正半第七宫㽔正大正半夷正夾正半無正仲正半黄變半第八宫大正夷正夾正無正仲正黄變半林變第九宫夷正夾正半無正仲正半黄變半林變半大變半第十宫夾正無正仲正黄變半林變大變半南第十一宫無正仲正半黄變半林變半大變半南變半姑變半第十二宫仲正黄變半林變大半半南變姑變半應變禮運曰五聲六律十二管還相為君孔氏曰十二辰各自為宫各有五聲十二管相生之次至仲吕而變凡六十聲今按孔氏以本文但云五聲十二管故不及二變而止為六十聲今増入二變二十四聲合為八十四聲自唐以來法皆如此云六十調之圖六十調即十二律也十二律即一黄鍾也黄鍾生十二律十二律生五聲二變各為紀綱以成六十調六十調皆黄鍾損益之變也宫商角三十六調者老陽也其徴羽二十四調者老隂也調成而隂陽備也宫商角徴羽十二管自本律之外為他律之四聲者合其律為調黄本律無夷仲夾以上黄宫五調各用本宫土聲而以黄鍾起調黄鍾畢曲餘律倣此大本律應南㽔姑大本律黄無林仲夾本律大應夷㽔姑本律大黄南林仲本律夾大無夷㽔本律姑大應南林本律仲夾黄無夷本律㽔姑大應南本律林仲大黄無本律夷㽔夾大應本律南林姑大按文獻通考所載已上數圗一本諸蔡氏律吕新書而約之者也王朴有云樂作於人心成聲於物聲氣既和反感於人心者也所假之物大小有數九者成數也是以黄帝吹九寸之管得黄鍾之聲為樂之端也半之清聲也倍之緩聲也三分其一以損益之相生之聲也十二變而復黄鍾聲之總數也乃命之曰十二律旋相為均均有七調合八十四調播之於八音則凡上下損益相生變半只此數語括之矣律止於十二變律止於六按律止於十二者葢十二律之實約以寸法則黄鍾林鍾太簇得全寸約以分法則南吕姑洗得全分約以釐法則應鍾㽔賔得全釐約以毫法則大吕夷則得全毫約以絲法則夾鍾無射得全絲至仲吕之實十三萬一千七十二以三分之不盡二筭其數不行此律之所以止於十二也又按律管之長以九為本而上下相生以三為法如破一寸以為十分而其下破分為釐破釐為毫破毫為絲破絲為忽皆必以十為數則其數中損益之際皆有餘分雖有巧厯終不能盡故鄭氏自分而下遂不可析而直以九相乗始畧可得而記焉固不若太史公以子為一而十一三之以至於亥尺寸分釐毫絲忽皆以九破筭之以損益而三分之數為整齊簡直也然此特一時便益之權制若鄭氏則乃分寸審度之正法不可忽也律有變而變律止於六者葢十二律各自為宫以生五聲二變如黄鍾為宫則林鍾為徴太簇為商姑洗為羽應鍾為角㽔賔為變徴林鍾為宫則太簇為徴南吕為商姑洗為羽應鍾為角㽔賔為變宫大吕為變徴十二律中五聲二變自能具足至㽔賔宫未免反取黄鍾為變徴大吕為宫未免反取黄鍾林鍾為變宫變徴少下不和故有變律也變律者其聲近正而少髙於正律也樂聲之和在於三分損益㽔賔下六律各自為宫取黄鍾上六律足五聲六變未免或長或短或全或半皆不合三分損益之聲由是適也其聲上下不和故必變其上六律使少短而與下六律然仲吕之實一十三萬一千七十二以三分之不盡二筭既不可行當有以通之厯法得全寸全分全毫者為正律有包抄者為不盡筭不盡二筭者以三分之餘二分也其一筭為一分可推也律當變者有六故置子之一而六至午以三歴之得七百二十九因仲吕之實得九千五百五十五萬一千四百八十八又以七百二十九歸之以從十二律之數紀其餘分以為忽抄然後洪纎髙下不相奪倫至應鍾之實六千七百一十萬八千八百六十四以三分之又不盡一算又不可行此變律之所以止於六也變律非正律故不為宫也律吕新書蔡氏曰律吕散亡其器不可復見然古人所以制作之意則猶可考也太史公曰細若氣微若聲聖人因神而存之雖妙必效言黄鍾始於聲氣之元也班固所謂黄帝使伶倫取竹斷兩節間吹之以為黄鍾之宫又曰天地之風氣正而十二律定劉昭所謂伏羲紀陽氣之初以為律法又曰吹以考聲列以候氣皆以聲之清濁氣之先後求黄鍾者也是古人制作之意也夫律長則聲濁而氣先至極長則不成聲而氣不應律短則聲清而氣後至極短則不成聲而氣不應此其大凡也今欲求聲氣之中而莫適為凖則莫若且多截竹以擬黄鍾之管或極其短或極其長長短之内毎差一分以為一管皆即以其長權為九寸而度其圍徑如黄鍾之法焉如是而更迭以吹則中聲可得淺深以列則中氣可驗茍聲和氣應則黄鍾之為黄鍾者信則十一律與度量衡權者得矣後世不知出此而惟尺之求晉氏而下則多求之金石梁隋以來又㕘之秬黍下至王朴剛果自用遂専恃累黍而金石亦不復考矣夫金石真偽固難盡信若秬黍則嵗有凶豐地有肥瘠種有長短小大圎妥不同猶不可恃况古人謂子榖秬黍中者實其龠則是先得黄鍾而後度之以黍不足則易之以大有餘則易之以小約九十黍之長中容千二百黍之實以見周徑之廣以生度量衡權之數而已非律生於黍也百世之下欲求百世以前之律者其亦求之於聲氣之元而毋必之於秬黍則得之矣蔡九峰律吕新書總是和峴房庶所襲聞峴庶匡郭總是王朴所襲聞古法相傳不甚異同漢唐之後旋宫之義不伸有所謂啞鍾者縱令聲有十二均均有七調亦為噐數之末杜䕫荀朂阮咸張文收信都芳裴知古衛道弼曹紹䕫若有神瞽法天籟真機不著倚傍然於徳學無謂孔門一絃歌便曰君子學道則愛人小人學道則易使也要知如何絃歌便是道又如何便愛人易使律吕相生辯甚哉諸儒之論律吕何其紛紛耶謂隂陽相生自黄鍾始而左旋八八為五管以九寸為法者班固之説也下生倍實上生四實皆三其法而管又不専以九寸為法者司馬遷之説也持隔相生之説以中吕上生黄鍾不滿九寸謂之執始下生去滅上下相生終於南事十二律之外更增六八為六十律者京房之說也本吕覽淮南王安蔡邕之説建㽔賔重上生之議至於大吕夾鍾仲吕之律所生分等又皆倍焉者鄭康成之説也隔七為上生隔八為下生至於仲吕則孤而不偶㽔賔則踰次無凖者劉向之説也演京房南事之餘而伸之為三百六十律日當一管各以次從者宋錢樂之之説斥京房之説而以新舊法分度㕘録之者何承天沈約之説也校定黄鍾毎律減三分而以七寸為法者隋劉焯之論也析毫釐之疆弱為算者梁武帝之法也由此觀之諸儒之論角立蜂起要之最為精宻者班固之志而已今夫隂陽之聲上生者三分之外益一下生者三分之内損一葢古人簡易之法猶古厯周天三百六十五度四分度之一也若夫律同之聲適多寡之數長短之度小大之量清濁之音一要宿乎中聲而止則動黄鍾而林鍾應動無射而仲吕應和樂未有不興者矣朱子叙律吕新書成法一黄鍾圍徑之數則漢斛之積分可考按漢斛銘文曰律嘉量方尺圜其外循四角規而圜之其徑當四寸有竒庣師古曰不滿之處也旁九釐五毫徑尺四寸有竒之數猶未足也􅇈方尺之靣也百寸十二寸深尺積一千六百二十寸容十斗今黄鍾律管有周有徑有靣有空圍内積如所長九寸空圍九分積八百一十分者實起於漢斛積分之數也一寸以九分為法則淮南太史小司馬之説可推淮南子曰黄鍾九寸而宫音調因而九之九九八十一故黄鍾之數立太史公律書曰置一而九三之以為法實如法得長九寸凡得九寸命曰黄鍾之宫小司馬貞史記索隠註曰律九九八十一欲言黄鍾長八寸十分一而漢書之言黄鍾長九寸者九分之寸也今蔡元定之書曰黄鍾九寸以二分為損益故以三歴十二辰得一十七萬七千一百四十七為黄鍾之實皆用九數實本諸此一五聲二變之數變律半聲之例杜氏之通典具焉通典曰宫生徴徴生商商生羽羽生角此五音大小之次也是黄鍾為均用五聲之法以下十二辰辰各有五聲其為宫法之法亦如之故辰各有五聲合為六十聲是十二律之正聲也又通典註曰按應鍾為變宫㽔賔為變徴自殷以前但有五音自周以來加文武二聲謂之七聲五聲為正二聲為變變者和也元定謂黄鍾一均五聲之數宫聲八十一商聲七十二角聲六十四徴聲五十四羽聲四十八論黄鍾之角生二變之法皆不出於是也又曰鳬氏為鐘以律計其倍半以子聲比正聲則正聲為倍以正聲比子聲則子聲為半葢黄鍾生十一律有十二子聲所謂正聲正半律也又有仲吕生黄鍾又生十一律亦有十二子聲所謂變律變半律也正變又半凡四十八聲上下相生最得漢志所謂黄鍾不復為他律役之意此元定之論大率杜氏正聲子聲之例也一變宫變徴之不得為調則孔氏之禮疏因亦可見孔頴逹禮疏曰五聲自周以來加文武二聲五聲為正二聲為變變者和也元聲言五聲者正聲故以起調畢曲為諸聲之綱至二變聲則宫不成宫徴不為徴但可以濟五聲之不及而已此於孔氏變者和也之説亦有所自來一先求聲氣之元而因律以生尺則猶所謂卓然者而亦雜見於兩漢之志蔡邕之説與夫國朝㑹典以及程子張子之言前漢志曰至治之世天地之氣合以生風天地之風正而十律定後漢志曰伏羲作易紀陽氣之初以為律法蔡邕月令章句有曰律亦以寸分長短為度程子曰律管定尺乃是以天地之氣為凖非秬黍之比也張子曰聲音之道與天地通國朝㑹典曰帝雖勤勞於制作而未當者有司失之於以尺而生律也元定求聲氣之元而因律以生尺雖其卓然之見亦不能不㕘考諸説故朱子云然蔡元定律吕總論律吕新書其上巻以漢志斛銘文定長九寸空圍九分積八百一十分為黄鍾第一以淮南子漢志定本黄鍾之律以三歴十二辰積之得一十七萬七千一百四十七為黄鍾之實第二以黄鍾三分為損益定生十一律第三次十二律之實四次變律五次律生五聲圖六次變聲七次八十四聲圗八次六十調圗九於是候氣宿度嘉量權衡次為十三篇其下卷述前史書志經傳疏註吕氏春秋淮南子下至歴代籥尺欵式角以明造律和聲均調候氣制噐之事為律吕證辯者甚具其説曰天地之數始於一終於十一三五七九為陽九者陽之成也二四六八十為隂十者隂之成也黄鍾者陽聲之始陽氣之動是聲氣之元也聲氣之元不可得而見及截竹為管吹之聲和候之氣應而後數始形焉均其長得九寸審其圍得九分積其實得八百一十分是為律本度量權衡於是而受法以三分損益歴十二辰而十一律由是生焉其實函焉黄鍾九寸以三歴十二辰在子寅辰午申戌六陽辰為寸分釐絲之數在亥酉未巳卯丑六隂辰為寸分釐毫絲之法法皆用九故九絲為毫九毫為釐九釐為分九分為寸為黄鍾其實為一十七萬七千一百四十七以三約之為絲者五萬九千四十九以二十七約之為釐者六千五百六十一以二百四十三約之為釐者七百二十九以二千一百八十七約之為分者八十一以一萬九千六百八十三約之為寸者九由是三分損益以生十一律焉六陽辰皆下生六隂皆上生其上生歴十二辰者皆黄鍾之全數其下隂數隂數以倍者三分本律而損其一也陽數以四者三分本律而増其一也六陽辰當位六隂辰則居其衝林鍾南吕應鍾其三吕在隂則無所増損大吕夾鍾仲吕三吕在陽則倍其數方與十二月之氣應隂不當陽自然之理也而黄鍾之數九九八十一為五聲之本三分損一以下生徴徴三分益一以上生商商三分損一以下生羽羽三分益一以上生角角聲之數六十四以三分之不盡一算而數不可行故五聲宫商與角徴與羽相去各一律而音節和角與徴羽與宫相去乃二律而音節逺故角徴之間近徴收一聲比徴少下曰變徴羽宫之間近宫收一聲少髙於宫曰變宫古謂之和繆故變聲非正不為調如是而後和夫律吕之數徃而不返者也故黄鍾不復為他律役所用也聲皆正律無空積忽㣲自林鍾而下則有半聲自㽔賔而下則有變律皆有空積忽㣲而不得其正故黄鍾一均所謂純粹中之純粹者也其十二律則旋相為宫各具有七聲合之為八十四聲宫商角徴羽聲各十二凡六十聲為正調其變宫變徴二十四聲不為調故六十調即十二律也十二律一黄鍾也黄鍾生十二律十二律生五聲二變聲各為綱紀以成六十調皆黄鍾損益之變也宫商角三十六調老陽也其徴羽二十四調老隂也調成而隂陽備也故日辰之數由天五地六錯綜而生律吕之數由黄鍾九寸損益而成二者不同而日有六甲辰有五子為六十日樂有六律五聲為六十調若合符節隂陽對待理數之自然豈顧强哉夫陽生於復隂生於姤如環無端而律吕之數三分損益終不復始何也易以道隂陽而律不書隂故也易者盡天下之變善與惡無不備律者致中和之用止於至善者也以聲言之大而雷霆細至蠛蠓無非聲也易備之矣樂雖有十二律六十調實惟寫黄鍾之一聲其聲中聲其氣中氣其在人則喜怒哀樂未發之中也發而中節者也故樂者聖人所以一天人贊化育之道也其大都本太史公細若氣㣲若聲聖人因神而存之雖妙必效之言以黄鍾為聲氣之元班固所謂吹以考聲列以候氣天地之風正而十二律定者也夫律長則聲濁而氣先至律短則聲清而氣後至極長極短則不成聲而氣不時至今欲求聲之中而莫適為凖則莫若多截竹以擬黄鍾之管或極其短或極其長長短之内毎差一分以為一管皆即以長權為九寸而度其圍徑如黄鍾之法而更迭以吹則中聲可得淺深其列則中氣可騐茍聲和氣應則黄鍾之為黄鍾者信矣黄鍾者信則十一律與度量權衡可從而定也朱文公喜讀其書以為明白而淵深慎宻而通暢鑿鑿可見之行也其後文公考正禮書定鍾律詩樂樂制樂舞等篇而鍾律篇大率本元定所著而互衍之稱邃眀矣黄鍾長三寸九分空圍九分為聲氣之元其時子半其數極少其聲極清音屬正宫一陽方動其卦為復日南至而始反北也㽔賔長九寸空圍九分為聲氣之極其時午半其數極多其聲極濁音屬正羽六陽既亢其卦為姤日北至而始反南也十二律紀陽也陽升起於子半極於午半隂降起於午半極於子半極則循環不窮矣三十九分者黄鍾之律陽之始也由是四十五分為大吕又五十四分為太簇又六十三分為夾鍾又七十二分為姑洗又八十一分為仲吕九十分為㽔賔㽔賔之律陽之極也由是八十四分為林鍾又七十五分為夷則又六十六分為南吕又五十七分為無射又四十八分為應鍾此太陽行氣之數律以順氣樂以宣和道之本也黄鍾三寸九分嘗求之諸書於通鑑外紀得劉恕之言焉曰黄帝命伶倫造律吕自大夏之西阮隃之隂取竹於嶰溪之谷斷兩節間長三寸九分而吹之以為黄鍾之宫於隋志得長孫無忌之言焉曰傳稱黄帝命伶倫㫁竹長三寸九分而吹之以為黄鍾之宫近世儒家因取是説以為元聲而以次推之升陽漸益至於㽔賔得九寸歸陽漸損至於黄鍾得三寸九分所謂三分損益者以左右對待言之隔八相生者以正徴言之雖未必果有得於天地之元聲然其措意已勤用心已宻矣今姑就劉恕長孫無忌所謂三寸九分者算之由黄鍾至大吕增六分由大吕至太簇由太簇至夾鍾由夾鍾至姑洗由姑洗至仲吕由仲吕至㽔賔並増九分由㽔賔至林鍾減六分由林鍾至夷則由夷則至南吕由南吕至無射由無射至應鍾由應鍾復至黄鍾並減九分葢大吕當五隂之盛一陽始生則陽雖進而尚弱林鍾當五陽之盛一隂始生則陽雖退而尚强固宜其增減僅得三分之二也驗之清濁焉則黄鍾極清者也太簇以下以漸而濁至㽔賔而極大吕次清者也夾鍾以下以漸而濁至林鍾而極極則以漸而清轉為黄鍾斯不亦清者貴而濁者賤乎驗之多少焉則宫聲極清者也黄鍾為正宫其數極少以為君臣數多於君故商為臣民數多於臣故角為民事數多於民故徴為事物數多於事故羽為物不亦少者貴而多者賤乎是故通於清濁多少之辯眀於貴賤尊卑之義而黄鍾之律可得而言矣按李氏以黄鍾長三寸九分空圍九分為聲氣之元因而推之升陽漸益至於㽔賔得九寸歸陽漸損至於黄鍾仍得三寸九分子午卯酉辰戌丑未寅申巳亥相對俱得一百二十九數所謂三分損益者以左右對待言隔八相生者以正徴言循環無窮案圖可定又以黄鍾極清太簇以下以漸而濁至㽔賔而極大吕次清夾鍾以下以漸而濁至林鍾而極極則以漸而清復轉而為黄鍾又以喉㗁舌齒唇之五聲證宫商角徴羽之清濁以宫商角徴羽之清濁配君臣民事物之貴賤按圖與書俱自成一家言但以三寸九分為元氣元聲元數所自出特有見於聲之清耳以理言之清為黄鍾似也而以十二辰言之子為一輕清聲丑為二輕清聲亥為三清聲寅為四清聲戌為五清聲卯為六清重間聲酉為七重間聲辰為八重聲申為九重聲已為十重濁聲羽為十一濁聲午為十二濁聲是在一日則夜為清晝為濁在一嵗則秋冬為清春夏為濁豈盡合於理乎黄鍾為宫宫為君信然矣而有取於極短之管其聲清揚徑截畧無涵容則其在琴必以第五絃為宫以頭一絃為羽而和絃即以第五絃為主矣否則頭一絃其聲洪大有似於濁而絲聲獨無取於輕清之絃乎且其在候氣章有云後世律法參差但候氣亦有應者可見管之長短皆可候氣是元氣不在長短之管矣而元聲元數獨在三寸九分與夫九寸之較量乎其在十二月律吕卦氣圗以黄鍾十一月為復為乾初九至仲吕四月為純乾㽔賔五月為姤為坤初六至應鍾十月為純坤觀圖若甚明矣但以乾初九復為極清而乾反重濁坤初六為極濁坤反次清謂之合卦氣也可乎其在五聲生數次第章以宫為土然矣然土聲為輕清也可乎其在律吕清濁章以角前二聲為輕清角後二聲為重濁則黄鍾極清大吕次清必以此為宫音矣陽自太簇以下隂自夾鍾以下俱以漸而濁為商角徴羽不徒四音不細分配而即其所説謂羽之極濁者漸反黄鍾可乎茍謂其圖對待整齊使以蔡氏之説即其圖而反之黄鍾九寸㽔賔三寸九分左益三分右損三分亦無不可者是亦紙上之律吕也至於律吕之清濁髙下只在乎樂噐之小大短長吾不得而知之矣楊亷論元聲書曰李公律吕書即其黄鍾三寸九分算之由十一月之黄鍾至十二月之大吕増六分由大吕至正月之太簇増九分由太簇至二月之夾鍾增九分由夾鍾至三月之姑洗增九分由姑洗至四月之仲吕増九分由仲吕至五月之㽔賔增九分由㽔賔至六月之林鍾減六分由林鍾至七月之夷則減九分由夷則至八月之南吕減九分由南吕至九月之無射減九分由無射至十月之應鍾减九分由應鍾復回十一月之黄鍾减九分其所增皆以九分而所减亦皆以九分惟黄鍾之於大吕㽔賔之於林鍾其所增减比之他律不同然實各有至理葢大吕當五隂之盛一陽始生則是陽雖進而尚弱林鍾當五陽之盛一隂始生則是陽雖退而尚強大吕林鍾固宜其增减僅得三分之二也律管長短一本隂陽升降之氣所謂律厯同道於此乃見執事書序髙文所謂黄鍾三寸九分升陽漸益至㽔賔而得九寸歸陽漸損至黄鍾仍得三寸九分所謂三分損益者以對待言隔八相生者以正徴言與夫所謂喉腭舌齒唇之聲證宫商角徴羽之音此書之要一一拈出以示人可謂透其闗鍵而得其三昧矣今以司馬遷黄鍾九寸上下相生損益算之黄鍾至大吕減六分竒大吕至太簇减二分竒太簇至夾鍾减五分竒夾鍾至姑洗减三分竒姑洗至仲吕减五分竒仲吕至㽔賔至林鍾增二分竒林鍾至夷則增四分竒夷則至南吕增二分竒南吕至無射增四分竒無射至應鍾至黄鍾所增四寸三分竒厯家二十四氣毎氣算之不差毫忽若一氣短二分竒又一氣短三分竒又一氣短四分竒又一氣短五分竒又一氣短六分竒又一氣短四寸三分竒則月之大者過於三十日月之小者不及二十九日不惟無以成嵗而律管候氣亦不可用矣且陽氣自冬至後以漸而升而律反减則氣有餘而管不足隂氣自夏至後以漸而降而律反增則氣不足而管有餘其亦背馳之甚哉謂司馬遷之差處正在於此謂李書之得處正在於此至於從前宫羽之舛此清濁之逆施正由黄鍾一差諸謬所必至者而不俟於言也亷嘗見歙人鮑泰希止著天心復要書以明厯大概氣朔八十年一齊厯家毎嵗二十四氣於時之八刻中徃來無定鮑書所排節氣之交皆有定刻中氣之交亦有定刻如冬至乃十一月之中氣定在十二時之五刻嵗嵗如此餘氣之定在某刻者亦然諸子謂律有一定之法而如是哉知厯者得之則亦可以推算矣嘗以今厯氣朔校之相去特五六時却是亘古至今如此一實萬實也鮑書謂郭守敬之法未是守敬法即今厯法我朝仍勝國之舊未嘗改也自漢以來亦皆不得其傳審如李書則鍾律自漢以來亦皆不得其傳而此二人者之獨見如此謂非天授不可也方今聖人在上必有軒轅命伶倫放勲命羲和之盛舉惜無以二書獻之闕下者其所係豈細故哉亷於西山蔡氏書嘗為律吕算例於郭守敬法亦嘗為之綴算舉例然不過為二家之註脚亦終於聚鐵鑄錯耳亷於李書窺見一班半㸃安敢肆然輒加語於其上哉自漢以來凡論律吕謂黄鍾長九寸者總㑹之律吕新書謂黄鍾長三寸九分者總㑹之律吕元聲今倂録之以備考李氏律吕元聲總論李氏祖吕氏春秋三寸九分為黄鍾曰含少之文辯黄鍾九寸之誤以太極隂陽五行由一生二由少及多見黄鍾數少為極清辯宫聲極濁之誤以左右對待各得百二十九分辯三分損益上下相生至仲吕而窮之誤其法由十一月黄鍾三寸九分至十二月大吕則增六分由大吕至太簇夾鍾姑洗㽔賔各増九分由五月㽔賔至六月林鍾亦减六分由林鍾至夷則南吕無射應鍾以復於黄鍾皆各减九分而適合三寸九分之數由此而循環無端焉以相生其説曰陽數始於一成於三終於九故律之為數三九盡之矣黄鍾一陽初升氣㣲數少故其管三寸九分三寸乃陽數之少九分乃陽數之老以三涵九故黄鍾之宫命之曰涵少此其證也十一律皆從以生而增减亦皆以九分惟黄鍾之於大吕㽔賔之於林鍾其增减視他律特異者大吕當五隂之盛一陽始生則陽雖進尚弱林鍾當五陽之盛一隂始生則陽雖退而尚強其增减宜僅得三分之二也律管長短一本隂陽升降之氣所謂律厯同道者也作律吕元聲書二篇范副使輅等信其説從受學楊學士亷愛其書以為天授而王尚書廷相韓尚書邦竒皆大儒通解音律皆不謂然以為樂律音調之義傳在中原依徃古而來非他方乃知非可以臆見卜度决也廷相駁之書言古人制為五音非徒焉無所本者宫本喉商本齒角本牙徴本舌羽本唇故凡人呼而出聲不論歌唱言説必自宫而徴而角而商而羽角者氣平之聲音之中也故宫音始而濁羽音極而清落而收於角清濁平焉此聲氣自然之妙非人力强而能者今曰黄鍾宫為清越之音不知其音出於喉乎出於唇乎惟其宫為清則黄鍾之管九寸重濁而不合故有黄鍾三寸九分之説嗚呼大謬矣夫上古鍾律之調簡矣而不求備也故周禮三鍾十二律可足考擊若必欲盡五音之調非加以十二子聲不可何也清之分數少也故古之編鍾編磬有一架二十四枚之設葢通正聲子聲並擊之也晉宋以來十二律之外止加四清聲以補其不及故作徴調終不能成何也清之分數少也清之道順而易逆而難者也故濁之役清也常有餘清之役濁也常不足故偹清濁之調非子律不可今曰取聲不用半律是不用子律矣即徴羽之調終不可成今平公欲聽清商雖師曠何自而擊之謂子律可廢乎哉夫正變二十四律則五音各正之調畧備必如京房六十調之説則清律相短其聲焦殺而不成調雖有其名初無實用蔡氏不深致思亦信其説而衍之况後學哉或曰然則十二律還相為宫果何謂乎曰此非六十調之謂也凡調以一律為主其餘律皆比而和之終始出入不離首音故曰還相為宫言各律還各自為首也如黄鍾為主律則必以林鍾為徴太簇為商南吕為羽姑洗為角其音以次而平若以他律雜之原非相次之管必至清濁陵犯而後已由是言之一律主一調合生與子而二十四調生焉雖缺其一音而調亦足考矣故自周至漢至唐至宋雅俗樂流傳於世者大抵宫調獨多而商角次之其徴羽二調止三之一此足以見聲音之道濁者常有餘清者常不足而京房氏所謂六十調者論説雖美而無所實用也後學不察而衍之謬矣且以為李氏之説既不逹五音之清濁又不及作樂之節度其論律吕樂職樂器聲容之考證皆長樂陳氏樂書之緒餘豈閩人無喉中之音故遂以唇舌不正之音而杜撰定之歟其詆之如此大都黄鍾冲氣無所不在而十二律之損益皆從出其中如君無不統天無不覆也故九寸為之宫諸少涵焉豈極清哉故君子慎變古也韓司馬精研律吕之學韓司馬邦竒愽極羣書研律吕之學至瘍發背瘉劇不知也苦心精思悟若天啟於是作志樂以為律生聲鍾生律馬遷著之而律經聲緯之逓變體十用九之明示未及也圍九分積八百一十分班固著之而管圎方分旋宫環轉乘除規圎之圗未及也六十調八十四聲蔡元定著之而起調則例及正變全半子倍之交用調均首末長短相生之互見未及也六變八變九變之用周禮載之而以黄鍾祀天神㽔賔祀地祇太簇享人鬼一造化之自然矣而黄鍾一均於朝廷宫闈宴饗偹布焉又周禮之所未載者葢其精也久之楊忠愍繼盛為郎時從受樂三月而得其數則請曰樂體於理而用於聲有氣而後有聲有聲而後理可從寄也理而無器如聲何乃構桐竹絲漆手掣管吹之而和掣琴瑟簫笙塤箎奏之而又和合奏之若一復於韓曰技有進於是者乎韓喜曰居吾語爾吾欲製十律之管管各備五音七聲而成調也子豈有意乎繼盛退凝思廢食寢者三日夜夢大舜坐堂上以金鍾使考之曰此黄鍾也醒而汗流浹背恍若有悟起篝燈取制管迨明而成者六已皆成韓撫膺髙蹈喜曰得之矣始吾制樂成九鶴飛舞於庭者久之應在子耶然太常肄常習舊朝議未遑復古禮變今樂之事無及之者樂律總論樂之用不外乎聲音律吕通典云以子聲比正聲則正聲為倍以正聲比子聲則子聲為半如仲吕之管長六寸五分有竒上生黄鍾三分益一不及正律九寸之數但得八寸七分有竒為子聲此聲有倍半之畧也淮南子云姑洗生應鍾比於正音故為和應鍾生㽔賔不比於正音故為繆葢五音相生至於角位則其數六十有四隔八下生當得宫前一位以為變宫又自變宫隔八上生當得徴前一位其數五十有六以為變徴變者與正比則為和變者與正不比則為繆此音有和繆之畧也漢書厯律志天地人及四時為七始此合而言之也又以黄鍾為天始林鍾為地始太簇為人始此分而言之也葢黄鍾居子為天統林鍾居未衝丑為地統太簇居寅為人統故為三始姑洗為春㽔賔為夏南吕為秋應鍾為冬以三合四是為七始此三始七始之畧也以七音因十二律為八十四調除二變聲不調則冬夏聲缺四時不備蔡子之説非而鄭譯之議是也此六十調與八十四調之畧也以徑象言之黄鍾長九寸為乾林鍾長六寸為坤乃邵子皇極經世聲起於多乾之甲也音起於古乾之子也此理之可通於易者也以娶妻生子言之黄鍾為陽大吕為隂猶甲子之娶乙丑皆同位者也黄鍾之生林鍾林鍾之生太簇猶甲子金之生庚辰金皆隔八者也乃沈黄鍾律議用京房之術求之得三百六十律當一期之日隨日建律依次運行當日者以次為宫而商徴以次從焉此義之有符於厯者也樂必用五音然周禮三大祭皆無商音説者謂周徳木也故祭鬼神之樂去金開元諸臣建言亦謂唐土徳王請加商調去角調是即周禮之意云耳我朝以土徳王太祖髙皇帝初作洪武正韻聲起於東從角也後見禮部韻㑹而遵用之不起於東而起於公此則從宫矣豈非深達造化者哉律止於十二者律之本聲而四者應聲也本聲重大為君為父應聲輕清為臣為子故四聲曰清聲即夾鍾大吕黄鍾太簇之應也茍不用四清聲是有本而無應矣我朝冷謙建議用四清聲故編鍾編磬皆為十六豈非洞達音律者哉詩稱定之方中謂測日影以辨方也土圭之法祖沖之之論備矣然候氣者使按日影之子午以布律則氣必不應何也天氣㣲偏於左地氣㣲偏於右所謂不參差則不能生物者也故土圭測日景常在子午之中此天之正位也以鍼定南北常在丙午壬子之中此地之正位也故冬至置黄鍾之律於壬子之中夏至置林鍾之律於丙午之中然後灰飛應律今元定乃欲一室之中多截管以候黄鍾夫差毫釐氣即不應而顧欲多埋律管豈非臆説哉黄鍾起於子之一以三倍之歴十二辰而終於亥之一十七萬七千一百四十七漢志葢借十二辰以列三因之算位耳故有寸分釐毫絲之法有寸分釐毫絲之數至章眀也蔡子不知其假借立法而以為真有十二辰之數張皇鋪衍而去真益逺矣自黄鍾之管陽皆下生隂皆上生自㽔賔之管陽反上生隂反下生此非空言也從子至巳陽生隂退故律生吕言下生吕生律言上生從午至亥隂生陽退故律生吕言上生吕生律言下生葢班志隔八相生一下一上則終於仲吕其長止三寸三分有竒京房之法至㽔賔重上生凡五下六上終於仲吕其長六寸六分有竒若仲吕止三寸三分有竒雖三分益一不能復生黄鍾之律故用六寸六分則三分益一可以復生黄鍾耳蔡子乃譏其隂陽錯亂毋亦未之思乎雖然此猶可也近世儒者乃又倡為之説曰黄鍾非九寸之管而引外紀吕氏春秋所載含少之說為證曰黄鍾音始也象則君也其律宜短其氣宜㣲其聲宜清是知其一不知其二者也夫黄鍾以八十一分為管而吹三寸九分以為聲故謂之含少乃遂以三寸九分為黄鍾之律而執含少以為清管焉是其言本非誤而所以信其言者誤矣此律一差大吕以下十一律者將無由取正矣何其好為異論而不師古哉葢太史公之言曰細若氣㣲若聲聖人神而眀之雖妙必效彼氣之贏縮聲之清濁固有不在於器數之末者使誠在於器數之末也烏用是聖人神眀為哉雖然審律之道神解為上得數者次之不求律於心而求律於器最下矣毋論黍之縱横尺之長短愚直謂俗樂與雅樂亦不甚絶者夫金石鍾磬也後世易之為方響絲竹琴簫也後世易之為筝笛此雅樂之變為俗樂者也黄鍾用合字大吕太簇用四字夾鍾姑洗用一字夷則南吕用二字此俗樂之可通於雅樂者也㣲獨此也古以爼豆今以盃盂古以莞席今以案榻雖聖人復生不能舍盃盂而復爼豆棄案榻而用莞席也是古今音樂之說也雖然此之謂樂噐耳數耳非所以論於器與數之外也夫有器而無官與無器同知聲而不知音知音而不知樂與無官同舎其本而圖其末沾沾焉鍾律是較非樂之完也本立矣末具矣天造未寧而極音以逞非樂之至也葢聲如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速髙下出入同流以相濟也是樂之噐也記所謂聴其鏗鏘者也子野歌而南北之風殊伯牙鼓琴而峩峩洋洋之聲著后䕫氏典樂八音諧神人和焉是樂之官也記所謂審音以知樂者也嗣是而後荀朂之識牛鍾阮咸之較玉尺張文收得玉磬而知黄鍾之缺楊收見古鍾而定姑洗之角之數子者是亦樂之官也記所謂審聲以知音者也昔者呉公子札聘魯請觀周樂工為舞武曰美哉周之盛也為之舞濩曰是聖人之宏也猶有慚徳為之舞夏曰美哉勤而不徳者也為之舞韶曰徳至矣哉如天之幬如地之載雖甚盛徳蔑以加矣此數聖人者如察秋毫如較累黍不少爽焉豈樂固有本耶何按遺音於數千載後而歴歴如覩也此樂之完也嘗考其時敷徳舞干羽有苗格而韶作歸馬放牛示弗復用垂拱無為而武作葢聖人治定制禮功成作樂自六代而已然矣故曰樂安徳義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福禄來逺人所謂樂也此樂之至也黄鍾律論古樂失傳雅樂之不恊久矣豈樂終不可知乎子語魯大師樂曰樂其可知也不過翕純皦繹而樂成矣樂豈不可知乎後之言知樂者異於是夫樂有本有末樂之本在徳不聞性與天道不可與語合同而化之妙矣然聲音必假器以宣之器雖末也樂之所必資也而正五音者必以六律自制器審音言之謂律為樂之本亦可但律不定則音不恊固不能舍律以正音然律定矣而音或不諧則又因音聲而知其律之不精也不得不改律以恊其音可見議律雖精終亦器數爾矣非樂之本也嘗因世之論樂者考其制焉自司馬遷京房以及蔡氏律吕新書曰黄鍾九寸自長孫無忌劉恕以及李氏律吕元聲曰黄鍾三寸九分短長相懸各有成説而三分損益隔八相生則又二説所必資焉如黄鍾生林鍾林鍾生太簇雖李氏皆以正徴言而陽下生隂隂上生陽其位之隔八者一也舊説即執此為三分損益之法謂下生者倍其實三其法如林鍾六寸四之則為二十四三其法則二十四為三八故上生太簇太簇長八寸此其數在黄鍾林鍾太簇皆得全寸之分故為三統其餘九管皆有㣲分之數亦自然所致似非强合之者李氏則即黄鍾三寸九分漸次益之由黄鍾至大吕增六分由大吕至太簇夾鍾姑洗仲吕以及㽔賔至林鍾减六分由林鍾至夷則南吕無射應鍾以還黄鍾各减九分乃歸陽而漸損也隂陽之氣始生甚㣲損益皆六而繼焉損益皆九不惟合易象九六二用之義而其所謂三分損益者止以左右對待之頗覺其法簡易且有合於五音十二律旋相為宫之㫖非徃而不返者比也嘗合二家而折衷之取蔡氏黄鍾九寸之管用李氏左右對待旋次損益之法抑豈姑為是調停以和同之哉葢十二律紀陽也陽升起於子中極於午中陽降起於午中極於子中極則生生則循環不窮義之不可易者也但以黄鍾三寸九分其聲極清音屬正宫以㽔賔九寸其聲極濁音屬正羽顛倒宫羽之清濁不審聲氣之斂舒前已辯之矣然則據九寸之黄鍾而用其六九漸生之法者豈必更易其子黄鍾於㽔賔之位次耶不過易黄鍾以九寸而漸短於丑寅卯辰巳午易㽔賔以三寸九分而漸長於未申酉戌亥子生生不窮循環無端者悉如故也何也律者法之一定不易者也截管短長各有一定之法而後聲氣悉律於中和也特李氏所論者専於律管予之所謂陽升隂降者律管内之氣也氣中則聲中氣和則聲和故管長則其含容厚重而其聲舒以徐有濁中之清焉管短則其氣發揚輕浮而其聲急以疾有清中之濁焉此理之必然者雖陽氣升降天地間不可見也而所可見者不有易之卦象乎姑借卦象以形容之一陽之氣始萌於十一月冬至而於卦為復夫復五隂而一陽也一陽之氣萌於五隂之中故以九寸之管象之若徒知律者記陽不記隂也即以三寸九分之宫為陽則其所謂黄鍾聲氣之元者徒有取於聲氣之發散已爾何以謂之元乎况由此其管漸長不免以四月之純陽為重濁反以十月純隂之短管為輕清矣雖彼於黄鍾之管亦取象復卦為聲氣之元㽔賔之管取象姤卦為聲氣之極不將以發散為元含蓄為極乎夫以短管為陽不能記乎管中之陽氣以聲音之發散為元陽而不論夫宫音之含宏皆非予所知也况天地冬至一陽藏於地中其氣甚㣲而其管長則陽氣尚含蓄未散由此以至大吕止减六分所謂大吕當五隂之盛一陽始生則是陽氣雖進而尚弱者此也由大吕以後各管漸减九分管漸减則聲氣漸逹而發越於外此所以氣有餘則管不足耳然則升陽漸益乃以升管中之聲氣而何取於管之益而長乎夏至雖隂生陽退而陽氣極盛故其管短則陽氣尚旁逹未收由此以至林鍾止增六分所謂林鍾當五陽之盛一隂始生則是陽氣雖退而尚强者此也由林鍾以後各管漸增九分管漸増則聲氣漸藏而含蓄於中此所以氣不足則管有餘耳然則歸陽漸損乃所以歸管中之聲氣而何取於管之損而短乎即於候氣之法冬至氣藏地下故以長管候之夏至氣在地上故以短管候之其道一也况五音不過宫商角徴羽也以配乎木火土金水而黄鍾宫屬土凡木火金水之生皆本乎土者也乃謂土聲輕清羽聲重濁可乎以配乎齒㗁喉舌唇而黄鍾宫屬喉凡齒㗁舌唇之聲皆起於喉者也乃以唇音為宫喉音為羽可乎以配乎君臣民事物而黄鍾宫屬君凡臣民事物之衆皆統於君者也乃以輕浮為君重濁為物可乎試稽諸律吕名義宫者宏也容也以其宏也而有容故曰宫黄鍾者黄土色鍾聚也律宣陽氣於黄泉以蘖萌萬物也且謂之元氣元聲元者始也大也萬善之長也此亦可以意㑹之矣律以記陽當因律管之參差以審管中之陽氣可無疑也所以欲取蔡氏黄鍾九寸之管用李氏左右對待漸次損益之法庶乎律定聲恊而翕純皦繹之樂或由此其可知矣乎雖然黄鍾九寸之管自李照劉㡬范鎮房庶司馬光黍尺之辯方紛然不已故樂愈不可知也已是葢不以律度之短長求聲氣之諧和且以黍谷之縱横求短長之律度惟其泥於器數之末所以各執意見迄無定説安得竭耳力於聲音之表者然後繼之以六律使樂工無所容其喙也噫作樂崇徳取諸豫聖人不獨因天地之法象示人以音樂之和而黄鍾之律度亦於卦象有可知者在矣志聲律者慎毋忽諸圖書編巻一百十三
