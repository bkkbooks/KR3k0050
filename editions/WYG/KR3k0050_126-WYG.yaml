而拇趾噬嗑初滅趾于賁初賁其趾顛大壯初壯于趾夬初壯前趾鼎初趾艮初艮其趾膚噬嗑二噬膚夬剥四剥牀以膚暌五噬膚四姤三无膚血坤上其血𤣥黄猶未離其類也故稱血焉四血去歸妹上无血需四需于血坎小畜涣上涣其血為血汗涣汗其大號膏屯五屯其膏鼎三雉膏思慮繫辭咸四天下何思何慮思咸四朋從爾思涣四匪夷所思艮大象思不出其位意蠱初意承考意明夷四象獲心也憂樂天知命故不憂坎為加憂疑豫四勿疑以豐三往得疑疾繫辭斷天下之疑愁晉二晉如愁如愠夬三有愠怨困以寡怨樂乾初樂則行之悶乾遯世无悶不見是而无悶大過大象喜否上後喜无妄五勿藥冇喜四損四使遄有喜兑介疾有喜惕乾三夕惕二小畜四惕出夬惕號勿恤泰三勿恤其孚恤晉五失得勿恤无家人五勿恤吉人夬二有戎勿萃初勿恤往咎升用見大勿恤恐懼脩省震大象懲忿窒欲損大象遷善改過益大象見乾二見利見大人見蒙三見金夫利暌初見惡人三輿曳上豕負塗蹇見大人上同姤初見凶其萃利見大人見升困見大人困三不見妻豐二四斗三見沫覿困初豐上俱三嵗不覿視履三𦕈能視上視履能震上視矍矍歸妹二𦕈視盱豫三盱豫闚觀二闚觀闚豐上其户聞夬四聞言不信也旅上終莫之間𦕈履三歸妹二涕離五出涕沱若萃上洟萃上齎咨涕洟泣屯上泣血漣如中孚三或泣言語頤大象慎言語言需二小有言訟初小有言三明夷初主人有言艮夬四聞言不信革三革言就震初笑言五言有序漸初小子厲有言盡困彖有言不信而繫辭以言者尚其詞繫辭以其言其言曲中言出乎身加乎民告益三告公用圭四告公從問益五勿問元吉言繫辭問焉而以號萃初若號鳴謙二上鳴謙豫初鳴豫笑言震彖笑言啞啞號咷同人五先號咷旅上後號咷笑萃初一握為笑後震初笑言啞啞同人五笑旅上先笑嗟離三大耋之嗟則萃三嗟如節三嗟若歌離三不鼔缶而歌中孚三或歌戚嗟離五戚嗟若齎咨萃上宴息隨大象嚮晦入宴息獨立大過大象獨立不懼恒大象立不易方􅏕觀􅏕而不薦執師五利執言咸二執其隨遯二執之用黄牛之革擊蒙上擊蒙之益上或擊禦蒙上利禦冦係否五係于包桑子无妄三或係之牛係姤初係于金柅徽隨二係小三係丈夫上拘之坎上係用纆係遯三遯握萃初一握為笑履履初素履二履道三跛能履履四履虎尾愬愬五夬履上視往坤君子有攸往攸屯勿用有攸往有賁小利有攸往剥不利有往无妄匪正𤯝不利有攸往攸復有往大過往恒四解吉損蒙益往夬萃巽俱利屯三吝往初吝履初往无咎吉大有二有攸往无咎往蠱四往无咎用无妄初往二利有攸往咸三吝遯初勿有攸往遇晉五往吉蹇明夷初有攸往蹇暌五往何咎上往雨則吉初三四上皆往損初遄往无咎上利有攸往无夬初往不勝為咎見凶萃初三往咎豐初往有尚姤初有攸往大畜三利有攸往征升南征吉彚歸妺征吉二小畜上君子征凶凶泰初以其征吉頤征凶大壯初征吉困二征凶上征吉三革三征凶貞厲上征凶居貞震上征凶漸夫征不復歸妹初征吉未濟初征凶行乾彖君子行此四徳者小坤彖君子攸行行蒙彖以亨行時中也畜彖剛中而志應同人彖乾行彖大有彖應乎大而時行得豫彖剛而志行蠱終則始天行頤彖柔中而上行天剥彖君子尚消息盈虚天行也哉復彖七日來復行也无妄彖天命不祐行矣大過彖巽而説行時行也坎行有尚彖行險而不失其信同遯彖與晉彖柔進而上行暌彖二女居其志不同行乃損彖其道上行損益盈虛與時偕行而益彖木道行凡益之道與時偕行鼎彖柔進上行説艮彖時行則行彖巽彖巽乎中正而志行履節彖以行險小過過以利貞與時行也四中行獨復一无妄三行人之得上行有𤯝四損三三人行則損人夬三獨行遇雨益三中行夬四其行次且三夬五中行无咎行姤三其行次且鼎其行塞震三无𤯝徒賁初舎車而徒跛履三歸妹初患訟二象患至掇也與既濟大象思患預防吉凶民同患疾復出入无疾損豫五貞疾四損其疾无妄五无妄之疾我遯三有疾厲豐二疑疾鼎二仇有疾兑四介疾有喜耋離三大耋死離四焚如死如棄如且豫五恒不死係辭困三既辱危死期將至喪小過大象喪過乎哀古人類伏羲繫辭包羲氏始作八卦作網罟神農繫辭神農氏教耒耜黄帝黄帝堯舜氏變通宜民堯舜黄帝堯舜垂衣裳而天下治文王明夷彖内文明而外柔順以蒙大難文王以之之繫辭易之興也其當殷之末世周盛徳耶當文王與紂之事耶湯武革彖湯武革命順乎天而應乎人髙宗既濟三髙宗伐鬼方三年克之帝乙泰五歸妺五帝乙歸妹紂繫辭下見上箕子明夷彖内難而能正其志箕子以之五箕子之明夷利貞宗廟邑國類宗廟震彖出可以為宗廟社稷主社稷見上廟萃涣王假有廟立廟涣大象立廟邑國謙上征邑國邑夬告自邑維井改邑命晉上用伐邑泰上自邑告升三升虚邑邑人訟二邑人三百户邑比五邑人不戒无妄三人之災國師上開國觀四觀國之光有賞于大國依益四利用為遷國萬國乾彖萬國咸寧比大象建萬國四國明夷上象曰照四國也守國坎彖設險以守其國邦否彖天下无邦萬邦師二王三錫命懐萬邦也正邦蹇彖當位貞吉以正邦也漸彖進以正可以正邦也亂邦師上象小人勿用必亂邦也宫室棟宇上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨葢取諸大壯家蒙二子克家家師上承家其家人四富家五王假有豐上蔀家損上得臣無家宅剥大象厚下安宅庭艮行其庭夬揚于王庭屋豐上豐其屋廬剥上小人剥廬宫困三入于其宫户庭節初不出户庭門庭明夷于出門庭節二不出門庭棟大過棟橈三棟橈四棟隆桷漸四得其桷牖坎四納約自牖户豐上窺其户户繫辭闔户之謂坤闢之謂乾門同人初同人于門易隨初出門交有功門繫辭之門又道義之堦升五升堦由繫辭節初亂之所生也則言語以為堦墉同人四乗其墉解上髙墉藩大壯三上觸藩四藩决鄰小畜五富其鄰濟泰四謙五不富以其鄰其既五東鄰西鄰震上于鄰市日中為市市説卦巽為近利三倍關復大象至日閉關門闕閽寺説卦艮為門闕為閽寺重門擊柝重門擊柝以待暴客葢取諸豫巷睽二遇主于巷井井卦不改井彖井養而不窮也初井泥二井谷三井渫四井甃五井冽上井收城隍㤗上城復于隍即次旅二即次三旅焚其次丘園賁五賁于丘園大塗震為大塗徑路艮為徑路鬼神享祀類帝益二王用享于帝吉上帝鼎烹以享上帝薦上帝豫大象殷薦之上帝祖考豫大象以配祖考假廟萃王假有廟渙王假有廟神道觀天之神道鬼神乾文言大人者與鬼神合其吉凶乎謙彖鬼神害盈而福謙豐彖而況于鬼神係辭知鬼神之情狀神繫辭隂陽不測之謂神知變化之道知神之所為酬酢祐神説卦神也者妙萬物而為言鬼暌上載鬼一車繫辭人謀鬼謀精氣精氣為物游魂游魂為變祭主震彖盥薦觀盥而不薦有孚顒若享隨上益俱用享損二簋可用享禴萃二升二皆利用禴禴祭既濟五不如西鄰之禴祭享祀困三利用享祀祭祀困五利用祭祀孝享萃彖王假有廟致孝享也匕鬯震五喪匕鬯大牲萃用大牲吉爵命類天命无妄彖大亨以正天之命也天命不祐行矣哉休命大有大象以順天休命命師上大君有命有命否四有命无咎天祐大有上自天祐之錫命師二王三錫命凝命鼎大象正位凝命改命革四有孚改命譽命旅五終以譽命申命巽大象申命行事命誥姤大象后以施命誥四方告命泰上自邑告命命亂泰上象其命亂也祉泰五以祉元吉祉否四疇離慶坤彖乃終有慶大畜五象有慶益彖中正有慶晉五往有慶也豐五兑四慶也慶頤上大有慶也困二中有也豐有慶也譽坤四无譽譽蠱五用譽豐五有二多譽嘉隨五孚于嘉有遯五嘉遯離上嘉章坤三含章姤噬嗑彖雷電合而章五含章豐五來章大號涣五涣汗大號號夬孚號四惕號上无號誡比五邑人不誡繫辭小懲而大誡祥困三不祥也吉事有祥美乾始能以美利利天下在坤三隂雖有美含之五美其中天位需彖位乎天位尊位大有彖柔得尊位位繫辭卑髙以陳貴賤位矣列貴賤者存乎位曰位天地設位而易行乎其中矣艮大象君子以思不出其位聖人之大寶乾三文言居上位而不驕在下位而不憂畜同人柔得位遯剛當位乾彖六位時成當小家人正位蹇位位漸進得位其位剛得中當節當位以節小過剛失而不中既濟正而位未濟雖不當位剛柔應也爻象正需上雖不當位未大失也位比五孚五巽五俱位中渙五正位節五居正履五兑五中孚五俱位正當三臨三位當萃否三豫三噬嗑三大壯五明夷四暌解四夬五四震三豐三兑三中孚小過四未濟三俱位不當困家人四順在位蹇四當位實旅四未得位四雖不當位有與也名乾初文言不易乎世不成乎名繫辭困三非所困而困焉名必辱善不積不足以成名富小畜五富以其鄰象曰不獨富也家人四富家大吉貴乾上貴而无位頤初亦不足貴也蹇上以從貴也鼎上以從貴也歸妹五以貴行也福困五象受福也井三受福也震初恐致福也實既濟五受其福爵中孚二我有好爵禄否大象不可榮以禄夬大象施禄及下介福晉二受茲介福榮辱繫辭樞機之發榮辱之主也賞未濟四三年有賞錫晉用錫馬蕃庶禠訟上終朝三禠之休否五復二傾否上傾否威大有五威如吉吉家人上威如終悖頤三道大悖也解上以解悖也治乾五上治治繫辭黄帝堯舜垂衣裳而天下説卦聖人南面而聽天下向明而治亂既濟初吉終亂亂彖中止則亂之萃初乃亂乃萃其志也繫辭亂所由生也則言語以為階勸懲繫辭噬嗑初不見利不勸不威不懲建國親侯比大象遏惡揚善大冇大象勞民勸相井大象觀民設教觀大象振民育徳蠱大象教思容保臨大象裁成輔相左右泰大象兵刑類訟訟彖險而健訟終凶訟不可成也二四不克訟五訟元吉初象曰不永所事訟不可長也上象曰以訟受服亦不足敬也獄噬嗑利用獄刑罰豫彖刑罰清而萬民服刑人蒙初利用刑人桎梏蒙初用説桎梏校噬嗑初屨校上何校劓暌四其人天且劓刖困五劓刖徽纒坎上係用徽纆正法蒙初象曰利用刑人以正法也明罰勅法噬嗑大象庶政無敢折獄賁大象赦過宥罪解大象折獄致刑豐大象明慎用刑而不留獄旅大象議獄緩死中孚大象師師貞吉彖師衆也師二在師中吉師三師或輿尸凶豫五長子帥弟子輿尸凶行師戎同人伏戎于莽二夬不利即戎暮夜有戎師律師出以律否臧凶失律師初象曰師出以律失律凶也左次師四師左次大師同人五大師克相遇行師謙上利用行師用師泰上勿用師戰坤上文言隂疑于陽必戰説卦戰乎乾征謙上征邑國征復上十年不克伐晉上維用伐邑既濟三未濟四伐鬼方侵伐謙五利用侵伐狩明夷三明夷于南狩田師五田有禽恒四田无禽解二田獲三狐巽四田獲三品三驅比五王用三驅失前禽容民畜衆師大象除戎器戒不虞萃大象飲食類飲食需大象君子以飲食宴樂需頤大象節飲食漸二飲食衎衎序卦者飲食之道酒食需五需于酒食困二困于酒食飲酒未濟上飲酒濡首食訟三食舊徳福㤗三于食有雜井五寒泉食卦噬嗑食也家食大畜五家食吉不食剥上碩果不食明夷初三日不食不井井渫食井泥不食不三鼎三雉膏食樽酒簋坎四樽酒簋二饋家人二在中饋餗鼎四覆公餗烹飪鼎彖以木巽火烹飪腊肉噬嗑三噬腊肉遇毒乾胏噬嗑四噬乾胏乾肉噬嗑五噬乾肉噬嗑卦象頤中有物曰噬嗑車服金寶類車賁初舎車而徒暌上載鬼一車金車困四困于金車大車大有二大車以載輿剥上君子得輿曳暌三見輿輪既濟初其未二俱曵輪輻小畜輿脱輻輹大壯四壯于大輿之輹脱大畜三輿輹衛大畜三日閑輿衛金泥姤初係于金柅茀既濟婦喪其茀簪豫四朋盍簪衣裳繫辭堯舜垂衣裳而天下治葢取諸乾坤黄裳坤五黄裳元吉繻有衣袽既濟四繻有衣袽朱紱困二困于朱紱赤紱困五困于赤紱袂歸妹五不如其娣之袂良鞶帶訟上或錫之鞶帶屨噬嗑初屨校滅趾囊坤四括囊束帛賁五束帛戔戔布坤為布經綸屯大象乗乾彖時乗六龍以御天屯三乗剛載小畜上徳積載大有二大車以載金蒙三見金夫姤初金柅噬嗑四金矢困五黄金鼎五金鉉四金車其繫辭同人五二人同心利㫁金説卦乾為金玉説卦乾為玉圭益三告公用圭貝震二億喪貝資旅二懐其資喪四得其資巽五其資財節彖不傷財曰繫辭何以聚人財貨聚天下之貨書契器用類書契上古結繩而治後世聖人易之以書契百官以治萬民以察葢取諸夬圖書繫辭河出圖洛出書聖人則之書繋辭易之為書也廣大悉備書不盡言文繫辭物相雜故曰文説卦坤為文數度節大象制數度鼎鼎彖鼎象也七震匕鬯簋損二簋可用享樽坎四樽酒金鉉鼎五鼎黄耳金鉉玉鉉鼎上鼎玉鉉釡説卦坤為釡牀剥初剥牀以足二剥牀以辨四剥牀以膚巽二上巽在牀下枕坎二險且枕筐歸妹上女承筐缶比初有孚盈缶坎用缶缶離三不鼔而歌甕井二甕敝漏瓶井羸其瓶繘井亦未繘井幕井上井收勿幕鼓中孚三或鼔或罷繩説卦巽為繩直弧暌上先張之弧後説之弧矢噬嗑四得金矢解二得黄矢亡旅五一矢弧矢弦木為弧剡木為矢弧矢之之利以威天下盖取諸暌解上繫辭弓矢者器也斧旅四得資斧巽上喪資斧網罟係辭包羲氏作結繩而為網罟以佃以漁葢取諸離耜耒神農氏斵木為耜揉木為耒耒耨之利以教天下葢取諸益舟楫刳木為舟剡木為楫舟楫之利以濟不通葢取諸涣舟中孚彖利涉大川乗木舟虚也杵臼斷木為杵掘地為臼臼杵之利萬民以濟葢取諸小過樞機言行君子之樞機權巽以行權柄謙徳之柄也坤為柄均説卦坤為均柝擊柝甲胄戈兵説卦離為甲胄為戈兵棺槨古之塟者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺槨葢取諸大過禽獸鱗介類禽師五田有禽繫比五失前禽禽井初舊井无禽辭解上隼者也飛鳥小過飛鳥彖有飛鳥之象焉初飛鳥以凶上飛鳥離之鳥旅上鳥焚其巢鶴中孚二鳴鶴在隂其子和之鶴鳴子和見上翰音中孚上翰音登于天雉鼎三雉膏不食為旅五射雉説卦離雉鴻漸初鴻漸于干二于磐三于陸四于木五于陵上于陸隼解上公用射隼鷄説卦巽為鷄羽漸上其羽可用為儀翼明夷初明夷于飛垂其翼黔喙艮為黔喙之屬馬晉錫馬蕃庶屯二四上乗馬班如賁四白馬翰如明夷用拯馬壯暌初喪馬勿逐大畜良馬逐涣初用拯馬壯馬中孚四匹亡牝馬坤利牝馬之貞坤彖牝馬地類良馬老馬瘠馬駁馬説卦俱乾象牛无妄或係之牛既暌三其牛掣牛旅上喪牛于易濟五東鄰殺子母牛説卦坤象黄牛遯二執之用黄牛之革革初鞏用黄牛之革牝牛離畜牝牛童牛大畜四童牛之牿羊大壯五喪羊于易亡歸妹上刲羊夬四牽羊悔兌為羊羝羊大壯三上羝羊觸藩虎履虎尾不咥人頤四虎視眈眈革五大人虎變豹革上君子豹變鹿屯三即鹿无虞豕暌上見豕負塗坎姤初嬴豕孚蹢躅為豕豕牙大畜五豶豕之牙狗説卦艮為狗馬善鳴馵足作足的顙説卦震象馬美脊亟心下首薄蹄説卦坎象狐解三田獲三狐小狐未濟小狐汔濟濡其首角壯三羸其角晉上晉其角角姤上姤其尾履三四履虎尾初遯初遯尾既濟初未濟濡其尾革遯二執之用黄牛之革龍乾初潛龍二見龍四躍龍五飛龍上亢龍坤上龍戰于野説卦震為龍龜頤初舎爾靈龜朋損五益二或益之十之龜豚魚中孚豚魚吉彖信及豚魚魚剥五貫魚姤二包有魚四无魚鮒井二井谷射鮒鼠艮為鼠鼫鼠晉四晉如鼫鼠龍蛇繫辭龍蛇之蟄以存身也尺蠖繫辭尺蠖之屈以求伸也鼈蠏蠃蚌説卦離象服牛乗馬繫辭服牛乗馬引重致逺以利天下葢取諸隨雲龍風虎乾五文言雲從龍風從虎虎變豹變文炳文蔚革五象大人虎變其文炳也上象君子豹變其文蔚也草木類草木坤文言曰天地變化草木蕃離彖解彖木益彖木道乃行漸四鴻漸于木蘭繫辭同人五同心之言其臭如蘭包桑否五繫于包桑茅泰初㧞茅茹以其彚否初㧞茅茹以其彚用大過初藉白茅茹彚見上莧陸夬五莧陸藥无妄五勿藥有喜蔀豐二四豐其蔀上蔀其家枯楊大過二枯楊生梯五枯楊生華把姤五以把包𤓰株木困初臀困于株木杌渙二奔其机蒼筤竹震為蒼筤竹蒺藜困三據于蒺藜葛藟困上困于葛藟叢棘坎上寘于叢棘萑葦震為萑葦薪繫辭厚衣之以薪碩果剥上碩果不食𤓰姤五以杞包𤓰果蓏艮為果蓏木果乾為木果稼震其於稼也為反生百谷離彖百谷草木麗乎土百果百果草木皆甲拆解彖甲拆俱同上堅多心坎其于木也為堅多心科上稿離其于木也為科上稿節艮其於木也為堅多節數目類一繫辭上天一二地二三天三四地四五天五六地六七天七八地八九天九十地十二十五天數三十地數五十有五天地之數五十大衍之數四十九揲蓍之數二百一十有六乾之䇿百四十有四坤之數三百有六十當期之日萬有一千五百二十萬物之數一君繫辭陽一君而二民一民陽一人損三一朝一夕坤初非一朝一夕之故一握萃初一致繫辭咸四二君繫辭隂二君而一民二民隂二簋損二人繫辭二人同心其利斷金兩儀易有太極是生兩儀再三蒙再三凟三日明夷初三日不食三人損三三禠訟上三接晉三就革三三年既三未四三嵗同上坎上困初漸五三驅比五三錫師二三品巽四三狐解二三才繫辭兼三才而兩之故六説卦兼三才而兩之三極六爻之動三極之道也四象兩儀生四象易有四象所以示也四時變通莫大乎四時揲之以四以象四時四營四營而成易五嵗五嵗再閏五位五位相得而各有合用六坤用六利永貞六畫説卦易六畫而成卦六龍乾時乗六龍以御天六位乾彖六位時成章説卦易六位而成六虛繫辭周流六虛七日復卦震三既濟三八月臨八卦四象生八卦八卦而小成用九乾用九見羣龍无首九陵震二十年屯二復上頤三十朋損五益二十八十有八變而成卦百慮一致而百慮百里震三百户訟二千里繫辭中孚二千里之外應之萬物以類萬物之情象形色音類象剥彖觀象也辭鼎彖鼎象也以小過彖有飛鳥之象焉繫在天成象制器者尚其象形乾彖品物流形者鼎四其形渥下係辭在地成形形而上謂之道形而者謂之氣氣咸彖二氣感應以相與山乾初象陽氣潛蔵澤通氣𤣥黄坤上天𤣥而地黄説卦震為𤣥黄黄坤五黄裳離噬嗑五黄金二黄離朱困二朱紱赤困五赤紱乾為大赤黒坤為黒白賁四白馬白茅上白賁為大過初巽為白白眼聲氣乾五文言同聲相應同氣相求音小過飛鳥遺之音圜乾為圜臭巽為臭道徳性命類太極繫辭易有太極性命乾彖各正性命説卦聖人之作易也將以順性命之理理坤五文言黄中通理得易簡而天下之理理性命説卦窮理盡性以至於命性情乾文言利貞者性情也性繫辭成之者性也情乾文言六爻發揮旁通情也恒彖觀其所恒而天地萬物之情可見矣吉大壯彖正大而天下之情可見矣繫辭凶以情遷爻彖以情言道乾彖乾道變化恒坤彖先迷失道人復卦反復其道下恒天地之道久而不已也聖久於其道而天化成艮動靜不失其時其道光明道乾象終日乾乾反覆道也坤二不習无不利地光也隨四有孚在道明功也行復四中行獨復以從道也大畜上何天之衢道大也頤三道大悖也繫辭一隂一陽之謂道徳繫辭天地之大徳曰生信乾初君子以成徳為行二徳博而化三忠進徳四進徳及時五與天地合其徳用九天徳不可為首疆大畜剛健篤實光輝日新其徳坤彖徳合无訟三舊徳恒不恒其徳基益五惠我徳也小畜上徳積載也之繫辭履徳之也謙徳之柄復徳之本也恒徳固也損徳之脩也益徳之裕也困徳之辨也井徳之地也巽徳之制也蓍之徳圓而神卦之徳方以知齋戒以神明其徳夫仁乾文言君子體仁足以長人二仁以行之復二休復之吉以下仁也繫辭安土敦乎仁義利物足以和義子家人彖男女正天地之大義也恒五夫制義井以辨義繫辭精義入神以致用也禮大壯大象君子以非禮弗履以繫辭禮言恭謙以制禮嘉㑹足合禮知坤三知光大也彖知周乎萬物而道濟天下故不過知者觀其辭則思過半矣蹇彖見險而能止知矣哉仁義繫辭小人不恥不仁不畏不義説卦立人之道曰仁與義仁知繫辭仁者見之謂之仁知者見之謂之知道義繫辭道義之門敬義坤二文言君子敬以直内義以方外敬義立而徳不孤知禮繫辭知崇禮卑神知蓍之徳圓而神卦之徳方以知神以知來知以蔵往幾乾三文言可與幾也者屯三君子幾不如舎繫辭知幾其神乎幾動之微吉之先見者也君子見幾而作不俟終日能夫易聖人之所以極深而研幾也惟幾也故成天下之務誠乾二文言閑邪存其誠恭小過大象行過乎恭敬需上敬之終吉上三象敬慎不敗也需象亦不足敬也善乾文言元者善之長也有坤初積善之家必有餘慶積不善之家必餘殃繫辭繼之者善也孚夬孚號姤革巳日乃孚解四初萃二五泰三四大有五俱升二兑二五曰孚有孚需訟觀坎損俱曰有孚三比初人小畜四五隨四大壯初豐家上解五五益三五五萃初濟井上革三四中孚未五上俱有孚中中孚卦中蒙彖時中剛訟有孚窒惕中吉剛來而得中也師剛中而應得比以剛中也小畜剛中而志行同人柔得位中大有柔得尊位大中剛噬嗑柔得中而上行乎大過剛過而中坎乃以中也暌得中而應剛蹇往得中也以解乃得中也乃萃剛中而應鼎升剛中而應困剛中也井以剛中也得中而應乎剛得中乎外漸其位剛得中也涣豐宜日中兑剛中而柔外乃在中也旅柔節剛柔分而剛得中不中孚柔在内而剛得中濟小過柔得中剛失位而中既濟柔得中未柔得中也坤五文言美在其中象文在中也也需三衍在中師二在師中吉師五象以中行泰二得尚于中行五中以行願也中同人五以中直也未大有二積中不敗也謙二心得也豫五中亡也自蠱二得中道也中臨五行中之謂也出復五中以考也大畜二无尤也坎二未中也五中未大也也離二得中道也也恒二能久中也也大壯二以中蹇五以中節解二得中道損二中以為志也二夬二得中道也二夬五中行无咎中未光也萃中未變也困中有慶也五以中直也歸鼎五中以為實也貴震五其事在中大无喪也妹五其位在中以行也巽五得中也願節五居位中也中孚二中心也既濟二以中道也正无妄其匪正有𤯝乾彖各正性命也蒙以養正正師彖貞正也能以衆正同人君子正大畜大也頤養正則吉也離重明以麗乎正男大壯大者正也邦明夷内難而能正其志大家人女正蹇以正也萃聚以正也革亨以正位當也漸進以正可以正邦也初既濟剛柔正而屯初象志行正也蒙以正法也師上以正功也邦隨初往以正吉也也臨初志行正也離上以正也遯二以正志晉初獨行正也否艮初未失正也孚涣五正位也也履五五兑五中五俱位正當中正訟彖利見大人尚中正也正履剛中正以同人中正而應剛臨剛而應大享以觀中正觀天下无妄中而應大享以正離柔麗中正節益中正有慶乾姤剛遇中正巽剛巽乎中正中正以通文言大哉乾乎剛健中正純粹精也也坤五文言黄中通理正位居體需五象以中正訟五以中正也豫二以中正也艮晉二以中正也五姤五中正也井五中正也五中正也巽位中正也未濟二中以行正也正中需彖位乎天位以正中也正乾二文言龍徳而正中比五位中也隨五位正中也志履大象定民志困大象君子以致命遂志繫辭惟深也故能通天下之志蒙彖志應豫泰其志同也志剛應而志行同人惟君子為能通天下之暌男女暌而其志通也巽剛巽乎中正而志行志爻象屯初志行正也初小畜三上合志也履三剛也四志行也泰志在外也志也否初志在君也四志行也窮大有五信以發謙上志未得也豫初志凶也四志大行也也隨三志含下也觀蠱上志可則也賁臨初志行正上志在内也上志未平也上上得志也外无妄初得志也遯大畜三上合志也志咸初志在也五志末也二固志也五以正也晉三衆乆之志上行也家人初志未變也明夷三南狩之志乃大得也暌三志行蹇上志在内也四損初上合志也二中以為志也上大得志也以益志也五大得志也姤五志不舎命也益萃初其志亂也五志未光也升初上合志也五大得志也困四志在下也五志未得也革四信志也豐二信以發志也信旅初志窮災也在巽初志疑也三志窮也兑二志也渙三志外也中孚初志未變也也未濟四志行事暌小事吉往小過可小事不可大事蠱彖有事暌天地暌而其事同也萬物暌而其事類也乾文言貞者事之幹也貞固足以幹事爻象乾三終日乾乾行事也坤三或從王事事訟初不永所事厚蠱上不事王侯事遯三不可大也益初下不事也三益用凶固有之也大震五其事在中大无喪也申豐三不可大事也訟象以作事謀始巽大象以命行事繫辭通變之謂事功彖蒙以養正聖功也未需坎蹇解漸俱往有功井汔至亦繘井未有功涣乗木有功有爻象師三大无功也上以正功也也隨初出門交功恒上大无功也巽四有功而繫辭謙三勞謙君子有終吉子曰勞而不徳有功不伐厚之至也語以其功下人者也三與四同功三與五同功五多功學問乾二文言君子學以聚之問以辨之教觀彖聖人以神道設教而天下服觀臨大象教思无窮習觀大象民設教坎大象教事知乾三文言知至至之可與幾也知終終之可與存義也夜乾知大始復以自知通乎晝之道而知行乾文言君子行此四徳者坤文言承天而時行所乾初日可見之行也坤二則不疑其行也旁行而不流知能繫辭乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之徳可大則賢人之業易簡而天下之理得矣知行繫辭顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也言行乾二文言庸言之信庸行之謹恒家人大象君子以言有物而行有繫辭中孚二言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎徳業乾三文言君子進徳脩業忠信所以進徳也脩辭立其誠所以居業也四君子進徳脩業欲及時也謂繫辭盛徳大業至矣哉富有之謂大業日新之盛徳夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣徳行坎大象以常徳行言節大象議徳行夫繫辭顯道神徳行黙而成之不而信存乎徳行乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻典禮觀㑹通以行其典禮作樂豫大象典要易不可為典要典常明徳晉大象自昭明徳文徳小畜大象以懿文徳順徳升大象順徳積小以髙大育徳蒙大象以果行育徳脩徳蹇大象以反身脩徳畜徳大畜大象多識前言往行以畜其徳儉徳否大象儉徳以避難神化繫辭天生神物聖人則之天地變化聖人效之神而化之使民宜之窮神知化徳之盛也聰明睿知神武繫辭聰明睿知神武而不殺者乎剛健中正純粹精乾含𢎞光大坤剛健篤實輝光大畜筮卜吉凶類蓍繫辭蓍之徳圓而神説卦幽贊于神明而生蓍蓍龜繋辭以定天下之吉凶成天下之亹亹者莫大乎蓍龜筮蒙初筮告原筮比原筮占革五未占有孚占繫辭極數知來之謂以卜筮者尚其占元亨利貞乾卦元亨利貞㑹文言元者善之長也亨者嘉之也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞同坤屯隨无妄臨革元亨大有元亨利涉大川蠱元亨南征吉升元吉亨鼎元吉可貞利有攸往損元吉坤五黄裳元吉以祉元吉訟五訟元吉元履上其旋元吉牛泰五復初无祗悔吉大畜四童之牿元吉勿離二黄離元吉有損五元吉益初元吉无咎五問元吉井上孚元吉涣四渙其羣元吉元永貞萃五元吉元永貞悔亡亨小畜履謙坎豐震俱亨何否二大人否亨大畜上天之衢亨亨節四安節亨利噬嗑亨利用獄復亨利有攸往賁亨小利有攸往亨利貞蒙同人亨利涉大川利君子貞貞恒亨利貞利有攸往兑亨利貞涣亨利涉利遯亨小利貞亨利貞吉咸亨利貞取女吉萃亨利貞用大牲古小過亨利貞不宜上宜下大吉亨小利貞吉既濟亨小利貞初吉終亂亨貞吉利需光亨貞吉利渉大川亨貞吉无咎困亨貞大人吉无咎小亨利巽小亨利有攸往小亨貞吉旅小亨旅貞吉亨无攸利未濟亨小狐汔濟濡其尾无攸利亨不可貞節亨苦節不可貞利乾二五利見大人有屯初利建侯大豫利建侯行師益利攸往利涉川用亨大過利貞攸往亨利貞大壯利貞鼎明夷五損二五利貞吉大畜不家食吉利涉大川蹇利西南不利東北利見大人貞吉利貞亨吉離利貞亨畜牝牛吉利永貞坤用六艮初利居貞屯初隨二利艱貞明夷五噬嗑四利吉解利西南有攸往夙吉利女貞家人觀二利禦冦蒙上漸二利執言師五利有攸往无妄二大畜三損上利涉大川頤上三未濟利用恒需初利用侵伐謙五利用行師謙上利用賓于王觀四利用為大作益初利出否鼎初利幽人之貞歸妹二利武人之貞巽初利于不息之貞升上利用刑人蒙初利用為依遷國益四利用祭祀困五利用亨祀困二利用禴萃二升二无不利坤二二屯四五大有上二謙四五臨剥大過遯上上晉五五解巽不利剥不利有攸往不利貞否不利君子貞不利為冦蒙上不利賓姤二不利涉大川訟无攸利蒙上上臨二三无妄頤恒初三大壯上萃歸妹上貞吉師貞丈人吉无咎五頤貞吉四屯五小貞吉需比二四履二五否初五謙二壯豫二恒遯大二四隨初二臨初人咸晉初家二五解二五損上濟姤初五升巽未二四貞吉亨否初可貞坤三四无妄女子貞屯二恒其徳貞恒五得童僕貞旅二安貞吉訟四居貞吉頤上革上永貞吉賁三益二艱貞泰三不可貞蠱二不可疾貞夷三貞厲訟三壯小畜上四履五噬嗑五大三晉革三旅三貞吝泰上晉恒三上三解貞凶屯五大貞凶凶師五弟子輿尸貞凶恒隨四隨有獲貞頤三拂頤貞凶初浚恒貞凶苦節貞凶巽上喪其資斧貞凶貞節上中孚上翰音登于天凶吉元永貞比吉原筮元永貞吉亨㤗小往大來吉亨吉利貞漸女歸吉利貞涉中孚豚魚吉利大川利貞吉凶繫辭聖人設卦觀象繫辭焉而明吉凶得吉凶者得失之象也吉凶言乎其失也辨吉凶者存乎辭吉蒙五人四屯五五小畜二大有謙初否二五臨同隨五五復二四大畜五遯三夷二頤四五大過四益離五革恒五家人暌上二四鼎四四五震初巽五艮土二漸二五兑初涣初歸妹五未豐二節五濟五大吉家人四鼎革四升初上居吉咸二往吉屯四晉无妄初五征吉泰初二困上妺革歸初中吉師二終吉需二上謙三訟初五賁履四蠱初五家人上鼎三小事吉暌艱則吉大壯上有它吉比五中吉終凶訟凶比後夫凶凶无攸利臨有凶師初三井贏其瓶凶比上履三歸妹貞豫初噬嗑上咸剥四恒復上頤三二五上頤初大過三益上姤四坎初上鼎困二四三漸三豐上過旅上上兑節上小初三有凶夬三見凶姤初起凶姤四征凶小畜上三頤二三大壯初上損二困革上震蔑貞凶剥初二終有凶夬上无咎師比隨恒困艮俱无咎􅌩乾三厲无咎四或躍在淵无咎坤四括无咎需初利用恒无咎之師上吉无咎四左次无咎五執言无咎素比初比无咎小畜四血去惕出无咎履初履往无咎于泰三艱貞无咎初否四有命无咎則同人初同人門无咎大有无交害匪咎艱无咎二有攸往无咎四匪其彭无咎大豫上有渝无咎蠱初有子考无咎三小有悔无咎臨三既憂之无咎四上吉无咎咎觀初小人无咎五上君子无咎噬嗑初滅趾无二滅鼻无咎小吝无咎五貞厲无咎厲无咎賁上白賁无咎咎剥上剥之无咎逐復三无妄四可貞无頤四其欲逐无咎凶大過初籍用白茅无咎五老婦士夫无咎上滅頂无咎坎四終无咎五既平无咎離初敬之无咎上獲匪醜无咎遇晉初裕无咎上厲吉无咎六暌初見惡人无咎二主无咎四厲无咎解初无咎吉損遄往无咎四有喜无咎上益之无咎咎益初元无咎三益用凶事无咎夬三有愠无五中行无咎往姤二包有魚无咎上吝无咎咎萃二引吉无咎三无咎四大吉无咎五有位无上涕洟无咎上升二用禴无咎四吉无咎无困二貞凶无咎于其隣无咎豐初雖旬咎三折肱无咎震巽吉无咎不渙五涣王居无咎上逖出无咎節初不出无咎三節嗟无咎中孚四馬匹亡无咎五有孚攣如无咎无小過二遇臣无咎九四无咎辭既濟初濡輪濡尾咎未濟上飲酒无咎繫无咎者善補過者也何咎隨四明何咎何暌五厥宗噬膚咎為咎夬初往不勝為咎匪咎大有初无交害匪咎无大咎蠱三小有悔无大咎悔豫三困上存繫辭震无咎者乎悔有悔乾上困豫三上小有悔蠱三虧悔鼎三无悔同人上咸五復五大壯五夬涣三五无祗悔復初悔亡咸四恒二壯四晉三五家人初二暌初五夬四萃五艮五巽四五兑二渙二悔厲吉家人三吝蒙四困四同人二未觀初巽三濟初小吝噬嗑三萃三終吝家人三往吝屯三咸䝉初二往見吝蠱四有它吝大過四貞吝泰三晉上恒三解三吝終吉賁五厲乾三復蠱初三遯初三既濟上往厲小過四有厲夬大畜初貞厲見賁類厲吉頤上晉上厲終吉蠱初災眚小過上有災眚復上有眚无妄其匪正有𤯝无妄上災无妄三之旅初妄上窮災也剥四切近災也也无大畜初不犯災无眚訟二震三雜類動靜坤文言至柔而動也剛至靜而徳方乾艮彖動靜不失其時係辭動靜有常夫其靜也專其動也直是以大生焉廣夫坤其靜也翕其動也闢是以生焉寂感夫易无思也无為也寂然不動感而遂通天下之故小大泰小往大來可否大往小來小小過可小事不大事屯五貞吉大貞凶卦否二小人吉大人否亨小繫辭齊小大大者存乎卦有小大其稱名也其取類也大大有卦大畜卦大過卦萃大壯卦俱需同人蠱益涣中孚俱利涉大川訟蹇升困巽利見大人乾彖大哉豫隨頤大過坎暌蹇解姤革俱大矣哉亨坤光大也屯隨大亨貞大有大中臨无妄大以正壯觀大觀正大畜大正大過大者過也升大壯大者也大者也晉大明萃用大牲大亨豐大也尚大也大鼎大亨大兊説之大五乾二五大人坤二直方否五人同人大大有二大車離豫四大有得四臨五大君復五大敗五上大川三大大壯大輿明夷三大首蹇五大蹇五大人益初大作國革未濟四大小小畜卦遯小過卦暌賁小利小貞小事狐旅小亨小小過可小事小過彖者過而亨也既濟亨小者未濟小既濟亨小亨也需二訟初俱小有言子師上小人勿用初大有三小人弗克隨二係小三失小子觀小人无咎小剥上小人剥廬人坎二求小得小遯四人否革上小革面漸初子厲往來泰小往大來吉否大往小來復有攸往夙吉復七日來復井往來井井解无所往其來咸四憧憧往來蹇蹇初往蹇來譽來三往蹇來反四往蹇來連上往來碩震五往厲繫辭寒往則暑來暑往則寒來往者屈也來者伸也卦夫易彰往而察來逆神以知來知以蔵往説數往者順知來者上下小過不宜上宜下下乾文言三居上位而不驕在下位而不憂四上無常又三四俱上不在天下不在田上訟彖上剛下險下比上下應也交小畜柔得位而下應之泰上交否上下不謙天道下濟而光明地道卑而上行上蠱剛上而柔下上觀大觀在上下觀而化咸柔而剛下恒剛而柔下益暌火動而上澤動而下敵損損下益上逆益損上下自上下下良上下應小過上而下順也以爻象蒙上上下順也不剥四失上下也下履大象辨上下繫辭上交謟下交不凟上無常上大畜彖剛上而尚賢訟晉柔進而上行上文言乾五上治也爻象三上吉比五使中小畜上合志志隨上上窮也光賁三上與上上得志大畜上合頤四上施五從上晉地上上行合損五自上祐上志旅五上逮萃三上巽也上未安上絶升初節四承上道中孚四類上五小過已上下比彖下順從象文言乾初下也三乾初陽在下也屯初以貴下賤隨志舎下乎剥初我下所復二下仁初大過初柔在下四不撓下咸三執下益下不厚事困初志舎下井初下先後坤先迷後得人蠱先甲後甲後爻否上先否後喜同五先號咷而笑旅上先笑後號咷後暌上先張之弛後説之弧巽五先庚庚繫辭損先難而後易初終既濟初吉終亂擬睽三无初有終初辭之卒成之終始乾彖萬物資始元屯剛柔始交文言乾者始而亨者也隂始凝乾始能以美利利天干作坤初爻象恒初始求深訟大象事謀始終訟終凶三謙有終坤坤彖乃終有慶需未濟彖不續終比乾終日三无成有終三訟初三初吉履四終謙三坎三无咎蠱二有賁五復家人三上俱終困四終上終有大敗夬上終有凶無坤象三大終用六以大終三需三以吉終比上所終剥五終无尤坎終无功艮恒五從一而終二夬上終不可長終鼎二終无尤上以厚終旅終无尤旅五以譽命歸妹大象永終知敝始終乾彖大明終始妹人之終始也蠱終則有始終歸繫辭原始反原始要終以為質也懼以終始出入復出入无疾辭需四出自穴上入于穴繫利用出入民咸用之謂之神其出入以度本末大過彖本末弱也本繫辭其初難知其上易知未也虛實升四虛邑失鼎二有實妹蒙四獨逺實也泰四皆實也歸上承虛筐也左右師四左次三明夷二左股象四入左腹豐右肱泰大以左右民内外比二比之自内四外比之貞吉小人㤗彖内陽而外隂内健而外順内君子而外否彖内隂而外陽内柔而外剛内小人而外君子柔无妄剛自外來而為主于内位明夷内文明而外順家人女正位乎内男正乎外繫辭爻象動乎内吉凶見乎外外内使知懼内比三比之自内不自失也内蹇三内喜之也上志在也外爻象需三災在外也外泰初志在外也涣咸初志在内也益二自來上自外來三志在外也進退乾四文言進退无恒退觀五觀我生進退巽初進退巽為進繫辭變化者進退之象得失晉五失得勿恤者坤彖先迷失道後順得常繫辭吉凶失得之象因貳以濟民行以明失得之報進退存亡得喪乾上文言亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎消長泰君子道長小人道消君否小人道長子道消盈虛損益盈虛與時偕行消息盈虛剥彖君子尚消息盈虛天行也時豐天地盈虛與消息長臨彖剛浸而長而剥小人長長復剛長遯浸長夬剛乃終與姤不可長消臨彖消不久也升上消不富也盈爻象乾上盈不可久虛咸大象以虚受人方員蓍之徳員而神卦之徳方以知爾我頤初舎爾靈龜觀我朶頤中孚二我有好爵吾與爾靡之甘苦臨上甘臨節五甘節上苦節利害損以逺害益以興利情偽相感而利害生逺邇震彖驚逺而懼邇而繫辭以言乎逺則不禦以言乎邇則靜正行發乎邇見乎逺竒耦陽畫竒隂畫耦多寡謙大象裒多益寡貴賤屯初以貴下賤賤繫辭卑髙以陳貴位矣善惡頻復三頻復巽三頻巽𡨕豫上􅁳豫升上􅁳升迷復上迷復亢乾上亢龍有悔小過上已亢也窮需彖不困窮道比後夫凶其道窮所蹇不利東北其窮夬不利即戎尚乃窮道窮困有言不信尚口乃窮既濟終止則亂其道窮節苦節不可貞其乾上窮之災坤上屯三豫初隨上无妄上大壯初姤上旅初巽三上節上皆云窮包蒙二包蒙否泰二包荒二包承三包羞五包桑包姤二包有魚四包无魚五𤓰敦臨上敦臨復五敦復艮上敦艮牽小畜二牽復牽夬四牽羊牽姤初柔道也四行未也攣小畜五中孚五俱有孚攣如它比初有它吉中大過四有它吝孚初有他不燕擬議係辭擬議以成其變化出處語黙繫辭君子之道或出處或語黙安危存亡治亂繫辭否五危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也類聚羣分顯仁藏用仰觀俯察觀象繋辭雜物撰徳成象效法探賾索隠鈎深致逺微顯闡幽居觀動玩極深研幾崇效卑法易知簡能利用安身開物成務參伍錯綜化裁變通範圍曲成洗心退藏神明黙成盛徳大業圖書編卷一百二十六
