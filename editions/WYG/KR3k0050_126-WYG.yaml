body:
  text: 圖書編卷一百二十六明章潢撰易象類編易之為書也廣大悉備其為道也屢遷不可為典要非齋戒以神明其徳者固不足以㑹其無方無體之真然聖人立象盡意其於卦畫之竒耦乃即天地人物擬諸其形容而觀象繫辭是居觀動玩茍不得其象又何有于辭與變與占也因即其象羣分類聚而輯之庶引伸觸類不徒得其取象之意而文周孔子於卦彖爻象所謂小大往來剛柔中正乾初陽在下坤初隂始凝皆可㑹而通焉則其屬辭之㫖亦炳然具陳矣象類云乎哉易象總類易繋辭易與天地凖斯生生之謂易坤夫易開物成務冒天下之道如而已者也乾其易之藴耶乾坤成列而易行乎其中矣之易之興也其于中古乎作易者其有憂患乎易為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要惟變所適天地人物仰則觀象于天俯則觀法于地觀鳥獸之文近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情天地絪緼萬物化醇男女構精萬物化生天地設位聖人成能人謀鬼謀百姓與能天地人易之為書也廣大悉備有天道焉有地道焉有人道焉人兼三才而兩之故六六者非他也三才之道也昔者聖之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章天地乾五與天地合其徳坤四天地變化草木蕃天地閉賢人隠地坤上夫𤣥黄者天地之雜也天𤣥而地黄㤗天交否天地不交感豫天地以順動恒頤彖天地養萬物不咸彖天地而萬物化生天地之道恒久而已也大壯彖正大而天地之情可見作暌彖天地暌而其事同也解彖天地解而雷雨益彖天施地生姤彖天地相遇品物咸章義革彖天地革而四時成家人歸妹彖天地之大節彖天地節而四時成地繋辭天尊地卑地在天成象在地成形天凖故能彌綸天之道與天地相似易與廣大配天地法天地設位而易行其中變天地之數五十有五象莫大乎天地天地化聖人效之天地之道貞觀者也天地之大徳曰生地天地絪緼天地設位天地定位序卦有天然後有萬物隂陽剛柔乾坤其易之門耶乾陽物也坤隂物也隂陽合徳剛柔有體以體天地之撰以通神明之徳觀變於隂陽而立卦發揮於剛柔而生爻隂陽泰彖曰内陽而外隂否彖曰内隂而外陽多乾初象曰陽在下也也坤初象曰隂始凝也陽卦隂隂卦多陽其故何陽卦竒隂卦耦剛柔乾剛健中正陷坤柔順利貞應屯剛柔始交小需剛健而不師剛中而比剛中畜柔得位應履柔履剛有否内柔外剛中同人柔得位得中而乎乾大柔得尊位大豫剛應而志行浸而長隨剛來而下柔賁蠱剛上而柔下剥臨剛噬嗑剛柔分柔來而文剛柔變剛健復剛反光无妄剛自外來而為主於内乎大畜剛篤實輝大過剛過而中離柔麗中正應咸柔上而剛下大壯剛以動恒剛上而柔下晉柔進而上行遯剛當位而明夷内文明而外柔順暌柔進而上行得中而應乎剛應損損剛益柔夬剛决柔姤柔遇剛萃剛而升柔以時升乎鼎柔進而上行得中而應剛剛漸剛得中旅得中外而順乎剛巽柔皆巽乎兌剛中而柔外而渙剛來而不窮柔得位乎外而上同小節剛柔分剛得中中孚柔在内而剛得中過剛失位而不中當位剛柔應也既濟剛柔正而位當二未濟雖不爻象屯二豫五噬嗑困二震二皆曰乗剛柔履三志剛二同人三敵剛大過初柔在下姤初道牽䝉剛柔接坎四剛柔際鼎上剛柔節六十四大象乾天行健坤地勢坤雲雷屯山下出泉蒙雷上於天需天與水違行訟地中有水師地上有水比風行天上小畜上天下澤履天地交泰天地不交否天與火同人火在天上大有地中有山謙雷出地奮豫澤中有雷隨山下有風蠱澤上有地臨風行地上觀雷電噬嗑山下有火賁山附於地剥雷在地中復天下雷行物與无妄天在山中大畜山下有雷頤澤滅木大過水洊至習坎明兩作離山上有澤咸雷風恒天下有山遯雷在天上大壯明出地上晉明入地中明夷風自火出家人上火下澤暌山上有水蹇雷雨作解山下有澤損風雷益澤上於天夬天下有風姤澤上於地萃地中生木升澤無水困木上有水井澤中有火革木上有火鼎洊雷震兼山艮山上有木漸澤中有雷歸妹雷電皆至豐山上有火旅隨風巽麗澤兑風行水上涣澤上有水節澤上有風中孚山上有雷小過水在火上既濟火在水中未濟天道類天乾彖乃統天天坤彖乃順承天上乾三四上不在天五飛龍在本乎天者親天且弗違大象天行健音明夷上初登於天助姤五有隕自天中孚上翰登于天天之所者順也乾天也天乾為天道謙天道下濟而光明正天道虧盈而益謙臨大亨以天之道也天命无妄大亨以正天之命也天命不佑行矣哉天行蠱終則有始天行也天剥君子尚消息盈虛行也天復七日來復行也天徳乾五乃位乎天徳也用九天徳不可為首天位需彖位乎天位天則乾元用九乃見天則天時乾五奉天時天造屯天造草昩天文賁彖觀乎天文以察時變天祐大有上自天祐之天衢大畜上何天之衢天險坎天險不可升也御天乾彖乗六龍以御天先天乾五先天而天不違後天乾五後天而奉天時承天坤文言承天而時行應天大有彖應乎天而時行中孚以利貞乃應乎天也日乾三終日乾乾晉晝日三接豐宜日中豐日中則昃日中見斗離三日昃之離説卦日以暝之離為日日月乾五與日月合其明離日月麗乎天日恒日月得天而能久照繫辭隂陽之義配月日月之道貞明者也日新大畜彖日新其徳日進益彖日進無疆月小畜上月幾望歸妹五月幾望食中孚四月幾望豐月盈則説卦坎為月明乾彖大明終始乎離彖重明以麗正其晉彖明出地上而麗乎大明明明入地中明夷晦明也明兩作離大人以繼照於四方晉自昭明徳月明夷用晦而明著明莫大乎日日月相推而明生光未濟五君子之光雲雨乾雲行雨施天下平也小畜宻雲不兩雷雨屯雷雨之動滿盈作解彖天地解而雷雨雷霆繫辭鼔之以雷霆風雨繋辭潤之以風雨雲小畜密雲不雨雨小畜上既雨既處暌上遇雨則吉盈夫三獨行遇雨若濡鼎三方雨虧説卦雨以潤之雷説卦雷以動之動萬物者莫疾乎雷震為雷雷風説卦雷風相薄雷風不相悖雷電噬嗑雷電合而章電説卦離為電霜坤初履霜斗豐二四見斗沬豐三見沬沛豐其沛寒暑繫辭日月運行一寒一暑地道類地乾五本乎地者親下坤地勢坤宜明夷後入於地繋辭俯則觀法於地與地之説卦坤為地者坤也地也地道坤三地道无成而代有終也地理繋辭俯以察於地理土離百榖草木麗乎土繋辭安土敦乎仁東説卦震東方也西小畜自我西郊小過五南巽南征吉離南方之卦也北坎正北方之卦也東南巽東南也東北坤東北喪朋蹇不利東北艮東北之卦也西南坤西南得朋西蹇利西南解利南西北乾西北之卦也水乾文言五水流濕乎坎者水也潤萬物者莫潤水坎為水火乾五文言火就燥火燥萬物者莫熯乎為離火水火水火不相射水火相逮山艮為山西山隨上用享于西山岐山升四用享于岐山澤説萬物者莫説乎澤兑為澤山澤山澤通氣野坤上龍戰于野同人于野田乾二見龍在田三四下不在田郊需初需于郊郊同人上同人于隂中孚鳴鶴在隂大川需利涉大川涣訟不利渉大川大同人謙蠱頤大畜益中孚俱利涉川初上徃未濟三俱利涉大川同頤五不利涉大川事彖需有功訟入于淵人乾行蠱往有大畜應乎天渙乘木有功益木道乃行虛中孚乗木舟濡夬三若濡上既未濟初濡尾濡首浚恒初浚恒丘涣四涣有丘頤三丘頤林屯三入于林中陵同人三奔其髙陵震二躋于九陵陵漸五鴻漸于艮為陵石豫二介于石三繫辭介如石焉困困于石谷困初入于幽谷井二井谷磐漸二鴻漸于磐陸漸三上鴻漸于陸遐泰二不遐遺道履二履道坦坦沙需二需于沙泥需三需于泥井初井有泥塗睽上見豕負塗穴需四出自穴上入于穴窞坎初三俱入于坎窞干鴻漸于干漸初河洛繫辭河出圖洛出書河泰二用馮河淵乾四或躍于淵訟彖入于淵也泉井冽寒泉氷坤初履霜堅氷至荒泰二包荒小石艮為小石方坤二直方大大象觀省方復后不省方四方離大象繼明照于四方姤大象誥四方百里震驚百里山川丘陵坎彖剛鹵兑為剛鹵溝瀆坎為溝瀆鬼方既濟三未濟四伐鬼方時日類嵗繋辭寒暑相推而嵗成三嵗同人三嵗不興覿坎上三嵗不得困初三嵗不漸五三嵗不孕豐上三嵗不覿三年既濟三年克之大未濟四三年有賞于國十年屯二十年乃字復上十年不克征頤三十年勿用期繫辭凡三百有六十當期之日閠歸竒于扐以象閏五嵗再閠故再扐而後掛四時豫彖四時不忒能觀彖四時不忒地恒彖四時變化而久成革彖天革而四時成時節彖天地節四成厯革大象治厯八月臨至于八月有凶月望小畜上四歸妹五幾中孚俱云月望至日復大象先王以至日閉關終日乾三終日乾乾豫二不終日戒既濟四終日三日蠱先甲三日後甲三日日明夷三日不食巽五先庚三後庚三日七日復七日來復二震二七日得既濟七日得甲日蠱先甲三日後甲三日己日革己日乃孚之革二己日乃革庚日巽五先庚三日後庚三日旬豐雖旬无咎象過旬災也晝日晉晝日三接終朝訟上終朝三禠之夕乾三夕惕晝夜繫辭通乎晝夜而知暮夜夬三暮夜有戎嚮晦隨大象君子以嚮晦宴息時乾彖六位時成時乗六龍損益與時蒙時中靜大有應天時行與賁察時變升柔以時升艮動不失其時豐時消息小過與時行大豫隨遯姤旅皆言時義哉坎暌蹇皆言時用頤過解革皆言時皆以大贊之无妄大象對時時極革大象明時節失時東乾二時舎三時惕上坤三時發既濟五鄰殺牛不如西鄰之時也之類人道類人乾彖體仁足以長人彖乾四中不在人謙同人于野艮不見其人謙人道惡盈而益革兊應乎人行歸妹人之終始繫需上三人來曰損三人行一人豐上無人辭何以守位人神而明之存乎其人行茍非其人道不虚大人乾二五利見大人合文言曰大人者與天地其徳與日月合其明與四時合其序與鬼神合其吉凶否五大人吉蹇上利見大人革五大人虎變卦自訟蹇萃困巽俱利見大人于升用見大人離大象大人以繼明照四方聖人乾五文言聖人作萬物覩彖乾上文言其惟聖人乎彖豫彖聖人以順動觀聖人以神道設教頤聖人養賢以及萬民其咸彖聖人感人心而天下和平以恒彖聖人久于道而天下化成鼎彖聖人亨享上帝大烹以養聖賢王坤三或從王事師訟三或從王事比師彖可以王矣三王三錫命五王用三驅用隨王用享于西山假觀四利用賓于王離上王出征家人五王有家益二王用享於帝萃夬揚于王庭豐升四王用享于岐山廟井四王明王假有廟王假之渙王假有涣渙王居帝位履彖履帝位而不疚天子大有三公用享于天子君否初象志在君也小過不及其君之説卦乾以君君徳乾二文言君道復上象反君道也大君師大君有命五履三為于大君臨知臨大君之宜王母晉二受兹介福于王母國君復上以其國君凶后泰大象后以裁成輔相左右命復大象后不省方姤大象后施誥上剥大象上以厚下安宅先王大象稱光王者七比豫觀噬嗑復无妄涣主暌二遇主於巷豐初遇其配主夷四遇其主王公坎彖王公設險以守其國公大有三公用享三解上公用射隼益四告公鼎四覆公餗小過五公弋王侯蠱上不事王侯侯屯利建侯屯初康豫利建侯晉侯王臣蹇二王臣蹇蹇臣坤三臣道也二遯三畜臣妾小過遇其臣君臣小過二不及其君