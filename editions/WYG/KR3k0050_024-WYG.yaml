body:
  text: 圖書編卷二十四明章潢撰厯總叙厯之名始於黄帝厯之算定於容成上稽天象下正人時厯可以無作乎故有起之以律而纍實於黄鍾者矣有積之以數而較算於分毫者矣又有驗之以象而作儀於渾天者矣此皆厯法所不可少者然由古迄今言天者幾而造厯者尤非一家終不能保其厯之不變何哉厯法不容以不變也是故黄帝起辛邜顓帝用乙邜夏用丙寅殷用甲寅周用丁巳魯用庚子此厯元之可驗者也夏四百三十二年日差五度商六百二十八年日差八度周訖春秋日差八度戰國及秦日差三度此厯差之可證者也斗分未易考也古厯謂在建星賈逵謂在牽牛中星范􅁮謂在斗十一度則言斗分者有不同焉日度未易稽也秦晉以孟春在營室五度三統以孟春在危斗六度元嘉以正月中在室一度則言日度者有不同焉雖數千百年推厯之至精至密如漢大初唐大衍厥後亦未嘗不差他又可知也葢以厯取更厯之義故世代更厯羣言不厭其紛諸家不惡其異否則治厯明時之訓聖人何以特取諸革哉知治厯明時取諸革則知天時盈虛消息變動不居必觀㑹通以求其故斯可以律天時也兹編備採經書所載與諸家之説若不相協孰知諸在當時揆諸天與日未盡暌也特以今視昔見其舛焉耳然則以後視今其舛不猶是哉信乎嵗不容以不差厯不容以不革也然則厯家之論差法果委諸天與日之行度有不齊乎抑亦治厯者不能悉依天日之行度以明其時故有差也夫天日本皆活物其錯行密移必有毫忽之差實無時不然今特莫之覺耳豈必待三五十年後始有所差也耶是天與日之行度必有差者乃其自然之運治厯者果如元厯多方揆測日影以為之準而嵗月日時一依乎天與日之行度則差法不待辨矣雖然以元人測日之法求諸今之日度可也執今之日度以議元人測日之法則又差失安得真知厯理知厯數者與之論哉古今惟厯家未嘗有定法也非無定法也法雖定於一時定於一人而未久即差謂其有定法也可乎漢大初厯以鍾律起唐大衍厯以蓍䇿起元授時厯以晷影測洛下閎僧一行郭守敬皆推極驗之精而用之三五十年即有嵗差故或以為百年差一度或以為五十年差一度或以為七十五年或以為八十三年或以為六十六年久而驗之均之弗合也雖以時分刻刻分分分分秒非不至精至悉惟差之半秒積以嵗月則躔離朓朒皆不合原算矣精厯者何若此其難乎先儒謂三代而下造厯者紛紛莫有定議愈精愈密而愈多差由不得古人一定之法也又謂康節厯十二萬九千六百分太周密今厯家所用只是萬分厯萬分厯已自是多了他如何肯用十二萬分吾恐用十二萬分亦安必其不差乎何也欲為一定之法以律乎難定之天吾固知其不可也况天與日月星辰乃隂陽積氣皆活物也其行度遲速或過或不及自是不齊安可為一定之法以齊之乎嘗讀易至革之象曰澤中有火革君子以治厯明時于是知聖人教人治厯明時取諸革也而非取其一定之法也時序寒暑之變遷離兑夏秋之更易其象本至著也觀火在澤中革之則生息不革則滅息其象之不容不革也亦昭昭矣所以卦辭曰革巳日乃孚爻辭曰六二日乃革之彖𫝊曰天地革而四時成由離中原有巳土故火生土土生金離革而夏兑革而秋此所以四時各順其序者天地自然之革也君子觀革之象乃知天運之不息日月星辰行度之不齊而順天地以治厯數則四時之序無不明而人之作事一順乎天時而不失矣何先儒乃曰澤中有火自與治厯明時不甚相干聖人取象處只是依稀地説不曽確定指殺是豈聖人設象立教之意哉葢六十四卦獨于此卦示以治厯明時之象曽謂只是依稀地説也耶惟其不信治厯明時取諸革所以必欲為一定之法使天與日月星辰之行度必依乎我之厯數及其有差則又謂數之未精統之未大而紛紛於人力之探索也亦勞矣哉噫古今厯更六十餘家而法不定必有其故也且厯象日月星辰敬授人時茍授時不差則厯之無定法者乃其一定之理也治厯者果能洞明革卦之象確信聖人垂教之㫖但當順天時自然之運以治乎厯而不為一定之厯以必乎天則時可明而嵗不差矣嵗之所以不差者厯之革也此聖人之深意也否則天地不革則四時不成厯家欲不革以明時焉無是理也故謂古今厯家無定法也虚齋蔡氏曰本是癸亥年但明年氣候始於此故云嵗亦甲子也甲子月甲子日甲子時是也嵗月日時皆甲子亦時有但要占古甲子年月日時方為厯元耳孟子曰天之髙也星辰之逺也茍求其故千嵗之日至可坐而致也朱子曰造厯者以上古十一月甲子朔夜半冬至為厯元也歩厯之始謂之上元必以日月全數為始於前更無餘分以此為端首由漢以來以厯數名家者惟大初厯以四千六百一十七嵗為一元以八十一為分嵗已盡都無絲髮之餘重新起厯是時定十一月甲子朔旦夜半冬至日月合璧五星如連珠乃新厯之第一日故謂之厯元漢元封七年適當其時故改秦厯用漢厯改秦正用夏正非謂夏亦然也後漢志曰天之動也一晝一夜而運逾周星從天而西日違天而東日之所行與天同運在天成度在厯成日居以列宿終于四七受以甲乙終于六旬日月相推日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體伏謂之晦晦朔合離斗建移辰謂之日月之行則有冬有夏冬夏之間則有春有秋是故日行北陸謂之冬西陸謂之春南陸謂之夏東陸謂之秋日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道斂北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋分焉日周于天一寒一暑四時備成萬物畢改攝提遷次青龍移辰謂之嵗嵗首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀嵗朔又復謂之元是故日以實之月以閏之時以分之嵗以周之章以明之蔀以部之紀以記之元以原之然後雖有變化萬殊贏朒無方莫不結係于此而禀正焉按自古造厯者必先立厯元自黄帝調厯起辛夘顓頊用乙夘虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子秦用乙夘漢太初用丁丑三統用庚戌四分用庚辰史謂四分厯元上得庚申有近于緯則或不得于天厯之廢興以疏密課固不主于元也孟子謂茍求其故可坐而致也朱子必謂言日至者造厯者以上古十一月甲子朔夜半冬至為厯元也歐陽氏亦謂厯家之説雖世多不同而未始不本于此史謂厯之廢興以疏密課葢以厯之終言也若推原其始不本于元何所造端乎是以黄帝以來立元雖若不同而皆準度于甲子也然則厯烏可無元乎但其假托以同于䜟緯則不可耳先儒有言厯元只據目前考驗無証其術失之淺上推開闢以測鴻濛其術近乎迂必也用太史公三紀大備之法范史紀元之目推上元甲子四千五百餘年則其時不逺不近矣唐志曰漢厯始以八十一分為統母其數起于黄鍾之龠葢其法一本于律矣其後劉歆作三統又以春秋易象推合其數葢傅㑹之説也至唐一行始専用大衍之䇿也則厯述又本於易矣葢厯起于數數者自然之用也其用無窮而無所不通以之于律于易皆可合也然其要在于候天地之氣以知四時寒暑而仰察天日月星之行運以相參合而已然四時寒暑無形而運于下日月星有象而見于上二者常動而不息一有一無出入升降或遲或疾不相為謀其久而不能無差忒者勢使之然也故為厯者其始未嘗不精密而其後多疎而不合亦理之必然也不合則屢變其法以求之自堯舜三代以來厯未嘗同也唐自太初至麟德厯二十三家推天雖近而未密也至一行密矣其倚數立法固無以易也宋志曰厯者嵗之積嵗者月之積月者日之積日者分之積又推餘分置閏以定四時非博學妙思弗能考也夫天體之運星辰之動未始有窮而度以一法是以久則差差則蔽而不可用厯之所以數改造也物銖銖而較之至石必差况于無形之數哉按自古帝王必先正厯象將以前民用授人時也夫聖人之治其于天地之理陰陽五行之運日月星辰之紀考驗推測無有不盡立法倚數固宜立萬世而無忒往往𫝊之稍久其應輒差何哉葢天地之數其妙有不可測者常在于秒忽毫釐之際而其象與氣推移盈縮亦有時而不齊故雖聖智不能盡窮焉積之嵗月則厯之不能無差理固然也聖人不能使厯之無差然嘗因其差而正之先儒程氏有言厯數之法大抵主于日月一事正則其他皆可推洛下閎之作厯言數百年後當差一日何承天以其差遂立嵗差法其差後亦不定獨邵堯夫立差法冠絶古今却于嵗月交感之際以陰陽虧盈求之遂不差朱子曰厯不能無差今之學厯者但知厯法不知厯理能布算者洛下閎也能推歩者甘公石公也洛下閎等但知厯法揚雄知厯法又知厯理元至元三年平宋詔許衡王恂郭守敬改治新厯乃與南北日官參考累代厯法復測候日月星辰消息運行之變參别同異酌取中數以為厯本十七年厯成賜名曰授時厯按古今厯法至于元郭守敬可謂度越千古矣參以古制創立新法所謂類其同而知其中辨其異而知其變授其時厯雖漢大初唐大衍皆莫有過焉者也葢以今厯與古厯相較比而其疏密自見也其説曰上能合於數百載之前則下可以行之永久此前人定説古稱善治厯者若宋何承天隋劉焯唐傅仁均僧一行之流最為傑出今以其厯與至元庚辰冬至氣應相較未有不舛戾者而以新厯上推往古無不脗合又曰自春秋獻公以來几二千一百六十餘年用大衍宣明紀元統天大明授時六厯推算冬至凡四十九事大衍厯合者三十二不合者十七宣明厯合者二十六不合者三十二紀元厯合者三十八不合者十一大明厯合者三十四不合者十五授時厯合者三十九不合者十事以前代諸厯較之授時為密嗟乎數往所以知來考古所以驗今今授時厯上而求之千載之前既無不合則下而推之千載之下其必不忒可知矣雖然天時不齊不齊則不能以皆同不同而更元立法隨時考驗以合于天不能無望于今日之許平仲郭守敬焉然則更元立法隨時考驗果何從而致力耶杜預曰治厯者當順天以求合非為合以驗天蔡邕曰以籌算為本以天文為驗算之既精驗之皆合則在人之天審而在天之天定矣按洪武中刻漏博士元統言一代之興必有一代之厯隨時脩改以合天道我朝承運以來厯雖以大統為名而積分猶授時之數授時厯法以元至元辛巳為厯元至今洪武甲子積一百四年以厯法推之得三億七千六百一十九萬九千七百七十五分經云大約七十年而差一度每嵗差一分五十抄辛巳至今年逺數盈漸差天度擬合脩改矧今又厯一甲子而過其半其年愈逺其數愈多其所差者當益甚也臣愚以為厯者國家之大事所以膺在躬之數承上天之托以敬天道以授人事者端有在于此臣請詔求天下通星厯之學如郭守敬者以任考驗之責明天人之理如許衡者以任講䆒之方失今不為後愈差舛一陽生於子節交冬至已屬次年亦猶夜半以後即屬次日然人事一日始於寅時一年始於建寅之月為正子丑二月雖屬次年而紀厯則猶在舊嵗如月食於夜半後雖屬曉猶以夜言之也三統謂夏正建寅商正建丑周正建子商周雖以子丑為頒朔授時之首而月朔未嘗改也至於厯法則因氣朔有差必隨時而改革周衰之末司天失職漢大初厯初為可取固未密也唐大衍厯當時以為密矣自今觀之尚為甚疏自古及今凡更六十餘厯葢嵗必有差久而積差漸多故為厯者必隨時測驗以求天數之真不得不改也古今善治厯者三家一曰漢太初厯以鍾律起二曰唐大衍厯以蓍䇿起三曰元授時厯以晷影測就日體測之毫忽㣲𦕈不可得而遁者元史所謂自古及今推驗之精葢未有出於此自昔帝王承天御極必以治厯明時為先乾坤奠位之後四時七政隨天而運寒暑代謝為嵗虧盈互易為月晝夜還轉為日經緯錯列為星辰歩算周審為厯數天子燮理陰陽時以作事事以厚生撫世治時茍不明晦朔弦望失其節分至啟閉乖其期則無以該洽生靈而世亂矣夫厯之來由黄帝訖秦末凡六改由宋太祖訖宋末凡十八改由金熈宗而訖元末凡三改一厯之改廣集衆見思無遺智法無遺術宜其永久不變然厯代長於厯者不數嵗而輒差杜預曰陰陽之運隨動而差差而不已遂與厯錯歐陽修曰事在天下其易差者莫如厯夫所以差者由天周有餘日周不足也天周有餘則天常平運而舒日周不足則日常内轉而縮天日之差於中星驗之焉堯之冬至初昏昴中而日在虚七度虚者北方之宿則日行北陸纒於𤣥枵之子也今之冬至初昏室中而在箕三度箕者東方之宿則日行東陸纒於析木之寅也計今去堯未四千年而差五十度矣再以赤道考之勝國至元辛巳改厯天正冬至赤道嵗差一度五十秒今退天三度五十二分五十秒也黄道嵗差九十二分九十八秒今退天三度二十五分七十四秒也故洪武中漏刻博士元統上言我朝承運以來厯雖以大統為名而積分猶授時之數年逺數盈漸差天度以元辛巳至元統上言時嵗在洪武甲子僅一百四十年迄今則二百四十二年授時厯法每嵗差一分秒約七十年差一度今合差三度餘矣年逾逺而數逾盈然則治厯者豈可不隨時脩改以求合於天哉夫不隨時脩改求合於天則厯必差是以正德戊寅日食庚辰月食時刻分秒起復方位多與欽天監推算不合天行最健日次之月又次之以月㑹日以日㑹天天運常舒日月常縮厯家以其舒者縮者之中氣置閏以定分至然後以三百六十五日四分日之一之日乗除之積三嵗而得三十二日五十九刻者其法常活以三百六十五度四分度之一天分南北二極日行中道冬至行極南至牽牛得四十刻為日短夏至行極北至東井為日長春秋分則行南北中東至角西至婁為晝夜均古者以厯名家必以其變者立差法以權衡之則變者常通而差者得其所矣按十有九嵗七閏則氣朔分齊是為一章但章法雖云氣朔齊然猶有分秒之餘至二十七章為㑹三㑹為統三統為元積四千六百一十七年則日月皆無餘分却得十一月甲子朔子時半冬至則又為厯元矣若甲子年月何有哉厯代厯古厯有六家黄帝顓帝夏殷周魯是也秦用顓帝厯漢初因之或云用殷厯故通鑑編年數目兩存之也自武帝更造大初厯前厯與天不合迄東漢之末厯凡四改成帝三統厯平帝四分厯因大初三統疎闕靈帝乾象厯晉書志言四分計分大祖而改作此厯乃劉洪蔡邕共為之八代多仍此法自魏至隋厯凡十三改魏文帝有黄初厯韓翊以乾象滅斗分大過而更造此校議未定帝崩明帝有景初厯楊鋒造晉武帝有正厯劉志造即景初舊法也以五景疎闕故元帝渡江更以乾象法推五星穆帝有通厯王朔之造元是後秦姚興時羗岌亦從三統厯秦姚興當晉武帝太元九年羗岌造三記甲子元厯専授劉歆三統宋元嘉中何承天造甲子元厯迄宋末相仍用梁武帝改行宋祖冲之甲子元厯其子祖睢奏請行之以何承天厯絶差設也陳氏因之北齊文宣髙氏用宋景業天寳厯妄引元命包言齊受厯之期董峻鄭元偉非之乃上甲寅元厯鄭元偉董峻又上甲寅元厯時又有劉季孫張孟賔同知厯事孟賔受業於張子信與宋景業爭論未定屬國亡西魏入闗行李興業正光厯于時宇文周明帝使庾秀彦等造周厯宇文周武帝時甄鸞造天和厯以甲寅為元周天象初馬士顯又上丙寅元厯迄于隋開皇四年始更用張賔厯隋開皇行張賔厯張賔盛稱髙祖非人臣相自陳代謝之證帝乃下詔頒行賓厯厯本之何承天而劉孝孫劉焯改其本賓方有寵孝孫焯議竟不行十七年後用張胃元厯胃元因言日景長之事帝大悦令與劉暉秀才等相駮難㑹顔敏上書言太初厯八嵗之事帝欲視其事下詔褒美頒行胃元厯胃元與袁充更相引重先是劉焯與胃元進乃更名劉孝孫厯法曰十曜厯主之冑元唐之遂罷焯又増修其書曰皇極厯駮正胃元之短袁充左右胄元共排前厯更不行焯皇極厯厯法見隋志唐厯凡八改髙祖戊寅元厯道士𫝊仁均所造髙祖麟德甲子元厯李淳風造元宗開元大衍厯僧一行造以前厯日蝕不驗此下皆因其法肅宗至德厯韓穎益大衍相代宗寳應五記厯以前厯不與天合鄭獻之造寫大衍舊法德宗建中正元厯徐氶嗣等造因前厯氣朔稽後也又雜麟德大衍術憲宗元和觀象厯穆宗長慶宣明厯以前厯測驗不合也皆因大術舊術昭宗景福崇元厯以元厯數差五代初用唐厯幷閏國厯凡有八家晉髙帝調元厯馬重鎮因厯上薦符天小厯不復推古上元起唐天寳十四年乙未為主元以正月雨水為氣首行之五年輒差復用崇元厯周有明元厯王處訥私譔又有萬分厯蜀有永昌厯正象厯南唐有齊政厯周世宗有欽天厯王朴造宋朝一祖十宗厯凡十一改太祖造應天厯後置閏差乃王處訥所造太宗乾元厯王素造後以朔望有差真宗儀天厯厯家造朱帛為之序後以星矅有差仁宗崇天厯厯家造晏殊序並見要㑹英宗改為明天厯以日蝕差神宗改為奉元厯因日蝕有差哲宗改為觀天厯因冬至差徽宗改為紀元厯以時氣之差髙宗改為紀天厯以定臘有差孝宗造乾道厯以統元日食有差又改淳熈厯曽子固嘗云王處訥見王朴造欽天厯謂之同此厯可且行久則差矣已而果然宋朝命王處訥正之於是有應天厯久之又差苖守信等氶詔論定於是嘉元厯淳化至道間王濬鄭安之徒校其疎密日官韓顯符晦定渾儀之器楊交遂増用甲子之數皆施行焉天之髙也日月星辰之逺也寒燠雨暘氣數之不齊章蔀紀元餘分之所積以千百計之有可運之掌上及其久也有非智巧之所能計者此厯久則必差勢所必至也治厯明時之君子因其差之未逺革而正之無難也其或盡更前人之法而更復疎逺其或増損前人之舊而更加詆毁則非矣自昔黄帝以來厯凡五十餘家皆由氣朔躔度或先天或後天㣲有不應厯象則厯法從而變也夫黄帝始調厯顓帝為厯宗至漢則不能無疎密漢人課之詳矣由漢以來太初厯法為第一三統四分乾象或因革焉而復有疎密之間葢三統則甚疎而乾象則甚密也乾象之厯為推歩之師表韓翊楊偉成遵其舊法而不及深妙翊又復據其術而背其言唐自開元大衍之厯行算數備悉其後雖屢有變更皆不外於一行之數改厯者又從而指其疎謬不特此也北齊文宣悦宋景業䜟緯之佞而改行天寳厯隋髙祖喜張賔陳代謝之證而改行開皇厯上之人所以改厯者悦喜諛耳不為敬天愛民而設也劉孝孫厯法甚精輒為劉暉所抑劉焯推占至詳常不為張胄元所容下之人所以造厯者冒寵嗜利初不揆其法之是非也操是心以往其何以議厯為哉是以知天道逺厯法推測不能每事中程其曰日食不效更考日度可也其曰斗分有差更定密率可也其曰五星疎逺更驗星躔可也其或一事不中程乃盡更前人之法大抵因其實而易其名異其所入之門而同其所歸之極如宋何承天厯法齊用之則為齊厯隋張賔用之則為隋厯也如劉孝孫厯法劉焯更名七曜厯其後又更為皇極厯也一法而異用一厯而數名大抵然也然則自古迄今五十餘厯其立法之異者大初厯本於律大衍厯本於易是也其餘皆襲舊法而増損焉耳總論諸厯大初厯為張夀王所詆清臺課疎密而是非乃定徐禹治太初第一夀王下吏大衍厯為瞿曇撰南宫所非靈臺校簿而當否始决大衍厯頒行説等伏罪侍御史李麟之等校之也東漢厯元為馮晃馮光所駁熹平校議得失遂分詔作蔡邕議邕等議光晃之罪此厯之方行而迭相詆刺者如是也大初厯是非既定而朱浮以為後天四分儀式既備劉洪以為與天疎濶班固謂三統最密而杜預以為疎一行獨指杜預之謬鄭𤣥謂乾象窮幽深妙而韓翊指其失此厯行既久而逓相詆刺者又如是也其餘如祖睢之非何承天劉孝孫劉焯之駁張賔王孝通李淳風之譏傅仁均逓逓相非無窮己也要之兩漢之厯太初乾象其最也隋唐之厯皇極大衍其冠也雖更相是非而是非自有定論矣然則太初乾象皇極大衍之厯果能窮盡千萬年之數未及百年咸悉更變何哉杜預之言曰天行不息日月星辰各運其舍皆動物也物動則不一雖行大量可得而限累日為月不得無毫毛之差厯差始於毫毛積而弦望晦朔不得不改憲從之書欽天象易治厯明時言當順天以求合非求合以驗天者也唐志曰四時寒暑無形而運於下日月星辰有象而見於上二者常動而不息一有一無出入升降或遲或速不相為謀其久而不能無差忒者勢使之然也故為厯者其始未嘗不精而其後多疎而不合亦理所當然不合則屢變其法以求之自堯迄于唐此厯所以未嘗同也杜預唐志言異世而一事也是知立推歩之法者求之千萬年之上以為上元自謂無毫釐之差行之未十百年而乖違己見葢數往者無所辨而推來者有所證也一行是非諸厯之得失其論甚備而唐志亦稱其立法之密一行之言乃曰乾度盈虚與時消息告譴於經數之表變常於潛遯之中則聖人且猶不知非籌䇿所能及矣厯代厯元東漢志曰黄帝造厯元起辛夘顓帝用乙夘虞用戊午夏用丙寅商用甲寅周用丁巳魯用庚子漢承秦初用乙夘秦用顓帝厯也武帝元豐七年作太初厯元以丁丑章帝四分厯元以庚申太初以上諸厯所謂六厯也六厯之書前漢藝文志載之詳矣其起厯之元必於此乎見之自太初以來厯起皆有元諸志所載厯法必先推其元之所起以為積算之紀綱故太初元法四千六百一十七年范􅁮以四千五百六十為元與古不同太初併閏嵗之月總計之也三紀大備之意三統上元十四萬三千嵗見漢志乾象元法七千三百七十八年正厯元法九萬七千一年晉武帝太始中劉智逺通厯甲子元法推開闢之始亦九萬七十年晉王朔之三紀甲子元法八萬三千八百四十一年蔡邕張賔甲子元法積四百萬餘算劉焯甲子元法積一百萬餘算一行厯本議積算至千萬億嵗夫數往所以知來也攷古所以驗今也積算之多於以見密率之詳推歩之審焉耳自三皇五帝至於漢方數千年而漢世厯家以三紀之數推之亦已多矣王朔之復以九萬餘年為開闢之始張賔劉焯一行又以數百萬億為積算豈開闢之上復有開闢耶按後漢順帝漢安二年宗訢等議建厯之本必先正元元正然後定日法日法定然後度周天以定分至也又按靈帝馮光言盗賊之起由厯元不正蔡邕力辨其非以為咎不在此范曄作東漢志亦曰厯之興廢以疎密課固不在乎元二子之論或以為厯必正元或以為厯不主於元何者為是嘗觀唐傅仁均作戊寅厯所以武德元年為厯始髙祖以戊寅嵗甲月登極而嵗朔遲疾交㑹及五星皆有加減至九年復用上元積算五代晉髙祖時馬重績作調元厯不復推占上元止以唐天寳十四載為元行之輒差遂復用唐末崇元厯揆此二事則推厯起元止據目前考驗無証則其術失之淺上推開闢㝠測鴻濛則其術近乎迂必也用太史公三紀大備之法范􅁮紀元之日推上元甲子四千五萬餘年以時考之不近不逺以術言之不淺不迂矣四分厯仲紀之元起孝文帝後元三年自劉歆作三紀厯推易以合春秋然後知作厯不可無所本自杜預序長厯以為天運必有差而後知用厯之不可有所拘計秦漢以來古厯不𫝊所存者自黄帝至魯凡七家其用於漢初惟顓帝厯耳然度數之失服色之乖議者已非之豈非法久則弊必變而通通而久固有所待耶且太初之厯非不密也然可行於武帝之時至章帝則復失矣四分之厯非不精也然可用於章帝之時至百年而復差矣唐髙祖始用夫衍厯至髙宗之麟德則變至中宗之景龍則又變迨明皇時大衍用而景龍又廢矣大衍之精密宜可𫝊逺也未幾而復差則為五紀為正元唐觀象為崇元又何其紛紛耶葢隨時變通正大易革象之義宋朝之厯率二十年一差又復訂正其以是歟惟元厯測景法黙孚易象至我朝用之有差又當隨時變革厯家不可執一法以為定算也明矣辨甲子厯元厯元之説以嵗月日時皆起於甲子為造厯之元考之甲子作於大撓而已有甲子之後曽有是厯元否歟或者其在洪濛開闢之初歟夫十二月建子則甲子年當為丙子月矣説者謂古厯家例以子月為首本是癸亥年但明年氣候始于此故云嵗亦甲子是甲子年月猶可解也厯家謂漢武帝元封七年適當其時故改秦厯用漢厯改秦正為夏正而太初厯肇于兹矣考史記用書載武帝改太初厯之詔曰十一月甲子朔夜半冬至其更以元封七年為太初元年年名焉逢攝提格月名畢聚日得甲子夜半冬至為元夫焉逢者甲也攝提格者寅也是以太初元年為甲寅年矣安得有甲子年月也况考之通鑑編年髙祖即位之年以乙未文帝後元三年以庚辰武帝太初元年以丁丑則甲寅且非實矣唐一行日度議引洪範𫝊曰厯始于顓帝上元太始閼逢攝提格之嵗畢取之月朔日乙巳立春七曜俱在營室五度葢顓帝厯以甲寅為元故漢厯亦以甲寅為元而甲子年月謂為上古厯元猶可解也然冬至乃仲冬中氣中氣即當在望日乃為得正若朔日冬至則冬至反差前十五日季冬望日即立春矣欲求中氣歸中當在一嵗以外是反以不中之氣為厯元奚可哉雖前十月為閏月六甲月朔皆無餘分故以之為元則甲子或在望日而冬至無餘分者曷為其非元乎孟子所謂茍求其故千嵗之日至可坐而致不知其果指上古之厯元如朔日冬至之説否也蔡虚齋乃曰嵗月日時皆甲子亦時有但要上古年月日時皆甲子方為厯元果如此説又何止千嵗也耶雖然古豈無徴者哉黄帝造厯元起辛夘顓帝用乙夘虞用戊午夏用丙寅商用甲寅周用丁巳魯用庚子漢承秦用乙夘武帝用丁丑所謂上古厯元者不知何據故王朔之以九萬餘年為開闢之始張賔劉焯一行又以數百萬億為積算豈開闢之上復有開闢也耶况用元之説尚有可疑者漢順帝二年宗訢等議建厯之本必先正厯元元正然後定日法日法定然後度周天以定分至又靈帝時馮光言盗賊之起由厯元不正蔡邕力辨其非以為咎不在此范曄東漢志亦曰厯之興廢以疎密課固不在乎元是二家之説一以為厯必正元一以為厯不主於元至於用元者或以為只用目前不必推占上古或以為紀元之日必以上元甲子為定諸説紛紛如聚訟然何可執一論也嗚呼漢厯凡四變唐厯凡十三變宋厯亦十餘變而厯果可拘以一定不變之法哉堯典乃命羲和欽若昊天厯象日月星辰敬授人時註曰厯所以紀數之書象所以觀天之器如下篇璣衡之屬是也日陽精一日而繞地一周月隂精一月而與日一㑹星二十八宿衆星為經金木水火土五星為緯皆是也辰以日月所㑹分周天之度為十二次也人時謂耕穫之候凡民事早晩之所闗也周禮馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位呉澂曰嵗謂嵗星所在寅曰攝提夘曰單閼辰曰執徐巳曰大荒落午曰敦牂未曰協洽申曰涒灘酉曰作噩戌曰掩茂亥曰大淵子曰困敦丑曰赤奮若嵗星在行于地凡厯十二舍而為一紀則有十二嵗之位月謂斗柄所建自正月建寅至十二月建丑凡厯十二朔而為一嵗則有十二月之位辰謂日月所㑹子曰𤣥枵亥曰娵訾戌曰降婁酉曰大梁申曰實沈未曰鶉首午曰鶉火巳曰鶉尾辰曰夀星夘曰大火寅曰析木丑曰星紀為十二辰之位自甲乙丙丁戊己庚辛壬癸為十日之位東方角亢氐房心尾箕南方井鬼栁星張軫翼西方奎婁胃昴畢觜參北方斗牛女虚危室壁為二十八宿之位葢天象有定位則人事有定序辨其序事而㑹之者如仲春之月平秩東作厥民析則知其月之建夘日月㑹于降婁而為奎婁之次仲夏之月平秩南訛厥民因則知其月之建午日月㑹于鶉首而為井鬼之次仲秋之月平秩西成厥民夷則知其月之建酉日月㑹于夀星而為角亢之次仲冬之月平秩朔易厥民隩則知其月之建子日月㑹于星紀而為斗牛之次以至十二嵗十二月所㑹天位皆倣乎此保章氏掌天星以志日月星辰之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二嵗之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之䘲象以十有二風察天地之和命乖别之妖祥凡此五物者以詔救政訪序事呉澂曰天星天文星度也歩占之法以星為主故曰天星十有二辰經天左旋常度不移不足以見吉凶惟日月五星行乎十二辰之次緯天左旋而日有薄蝕暈珥之變月有盈虧朓朒之變五星有盈縮圜角之變故總言日月星辰之變動變動即所謂遷也順則為吉逆則為凶二者相參變之矣星土十二土也合而言之曰九州星土之書雖亡可考然十二國之分載諸𫝊記災祥所應亦皆可証若昭十年有星出於婺女鄭裨竈曰今兹嵗在顓頊之墟姜氏任氏實守其地此𤣥枵為齊之分星而青州之星也昭三十二年呉伐越晉史墨曰越得嵗而呉伐之必受其凶釋者曰嵗在星紀此星紀為越之分星而揚州之星土也昭元年鄭子産曰成王滅唐而封叔虞焉故參為晉星實沈為參神此實沈為晉之分星而并州之星土也襄九年晉士弱曰陶唐氏之火正閼伯居商丘相土因之故商主大火此大火為宋之分星而豫州之星土也昭十七年星孛及漢申須曰漢水祥也衛顓頊之墟故為帝丘其星為大水此娵訾為衛之分星而冀州之星土也鄭語周史曰楚重黎之後也黎為髙辛氏火正此鶉尾為楚之分星而荆州之星土也爾雅曰析木為津釋者謂天漢之津梁為燕此析木為燕之分星而幽州之星土也以至周之鶉火秦之鶉首趙之大梁魯之降婁無非以其州之星土而為其國之分星以星土而占災祥其應有可徴矣嵗星在木則水為相之類五星順度為祥流逆失度為妖襄二十八年嵗在星紀而滛於𤣥枵是謂蛇乗龍梓慎以為宋鄭必饑則言其所屬以為周楚所惡則言其所衝其嵗星乖次之應乎嵗在星紀而呉伐越史墨謂不及四十年越其有呉乎以嵗星十二年一周存亡之數不過三紀非嵗星順次之應乎以類求之則嵗星太嵗皆可參决妖祥之事物色也視日旁雲氣之色左氏所謂凡分至啟閉必書雲物占法青為蟲赤為兵荒白為喪荒黄為豐黒為水既言辨吉㓙水旱又言降豐荒之䘲象葢水旱之降為荒年荒年之降為豐年其序如此十二風者艮為條風從大吕大蔟之律離為景風從蕤賔之律坤為涼風從林鍾夷則之律兑為閶闔風從南吕之律乾為不周風從無射應鍾之律坎為廣莫風從黄鍾之律所謂八風從律是也又法于緹室之中因逐月管入律地之淺深月氣至則葭灰飛以此察天地之和氣然左氏載師曠歌北風又歌南風而知晉楚之勝負妖祥之應可决于此乖則異别則離此天地之不和而為妖祥也故命之使知所趨避上文五事即救政叙事之所從出也政者國之本詔救政于上則人君知脩省之道事者有司之常職訪叙事于下則人臣知警戒之意君臣交脩而天降祥矣堯舜相授受曰天之厯數在爾躬允執其中四海困窮天禄永終是厯數乃帝王所重而膺厯數者要在執中使四海不困窮也故其命羲和厯象日月星辰首之以欽若昊天此固其作厯之本㫖也所謂授民時者謂某時行某政令民興某事凡東作南訛西成朔易各以其時夏小正與夫月令所載是也後之精于厯法者何代無之區區于算數之末以求天之行度必不我違而欽天授時之意未之聞焉故雖明知嵗差猶確守其法而不求變通之道則其授時作事之差不待言矣此豈聖王作厯之意哉無益於七政之齊民時之授厯亦可無作矣易治厯明時書厯象授時聖訓昭然茍不順天之變革以治厯而拘於律法以求不差使一行郭守敬復生能正之於一時而積之三五十年則亦難必其悉合矣噫天本無窮也厯本無形也執有窮以盡數執有形以求天嵗之差有由然也不曰厯差而曰嵗差果欽若之道歟厯象日月星辰厯不可以執一論也曰象曰氣曰數均之不可缺也嘗讀堯典知古今之厯法定於斯而善厯者宜取法於斯焉可也何也所謂象者日月星辰之軌度是也所謂氣者春夏秋冬之寒暑是也所謂數者時刻分秒俱有定算是也夫象本有迹之可據氣則有序而可推二者皆動物也因其象與氣之運動推遷而為之數以算其分至啟閉之節候則嵗月日時無易章蔀紀元不差而厯無不善者矣盍自堯典觀之所謂厯象日月星辰日中星鳥日永星火宵中星虚日短星昴非其星象之可見者乎所謂以殷仲春以正仲夏以殷仲秋以正仲冬非氣序之可推者乎所謂三百有六旬有六日以閏月定四時成嵗非其數之可積者乎且其宅嵎夷宅南交宅西宅朔方所以觀星象審氣序者又必求之東西南北之四隅而未嘗執一定之數以為厯也明矣凡為厯者果能占天象順時序一晷度之差吾志焉一星辰之動吾志焉夕夕而觀之旦旦而求之因其已往推其將來而毫髮無遺算者一皆順其象與氣而明之所謂因天以求合不執一定之數以必天之我驗也夫何後來厯家其初未始不驗而久之必差豈其數不精算不審哉由其不順天象之運動不察氣序之變遷徒欲執其定數以求之故耳可見堯典乃萬世厯法之祖也至舜典又在璿璣玉衡以齊七政所以觀天象察時序者為愈密矣故後世渾天儀亦祖璿璣之制而隨時以變通也又何也厯象日月星辰不可變也執堯時之中星以驗於今則非也因其不驗于今并廢其厯象日月星辰之法也奚可哉在璿璣玉衡以七政不可變也執舜時玉衡所指以驗於今則非也因其不驗於今并廢在璿璣玉衡之法也奚可哉但後之人非不觀天象要非象之以治厯也惟象有不合則委罪於數之不精者有之而不能順乎天之象也非不在璿璣要非察之以授時也惟察之有不合則委罪於制之不巧者有之而不能順天象以立衡也此所以嵗愈差厯愈不驗也知欽若敬授之道者顧如是哉要之七政之遲速四時之循環久而必差者天道之常也立差以追其已往之變因象以改夫見在之差而隨時變通者厯法之常也故曰厯不可執一論也星厯總論夫天以輕清之氣而運乎上一晝一夜而過一周其道在行日月五星亦以輕清之氣而麗乎天日不及一度月不及十三度隨天而左轉日有中道月有九行日月相推嵗凡十二㑹方㑹則月光盡滅而為晦已㑹則月光復蘓而為朔舒遲先後近一逺三則月斜倚而為弦相與為對當天之中則月光滿而為望晦朔而日月之行東西同道南北同度則月掩日而日為之食至望而日月之對同度同道則月亢日而月為之食日至角牛之方月行青赤之道則為春為夏日至婁井之方月行白黒之道則為秋為冬日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道斂北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋乃分焉日月之光聚而為星中元為北極上元為太㣲宫下元為天市垣二十八宿衆星者言乎其經也金木水火土五星者言乎其緯也其曰㑹者言乎日月星辰之所㑹也其曰客者言乎星辰之不出大白也其曰主者言乎星辰之出乎太白也金水附日一嵗而周天火二嵗而周天木十二嵗而周天土二十八嵗而周天故曰有遲有速北極則出地上三十六度常見而不隠南極則入地下三十六度常隠而不見故曰有伏有見朝出曰贏夕出曰縮西行曰迷日月同度曰陵不順不逆曰留芒及曰犯妖變曰孛含譽之射示其喜也格澤之生示其怒也執法郎官象其官也明堂靈臺象其物也此其理之精深而存乎物感者也後世之言天者吾惑焉葢天之説有其術而無其驗宣夜之言有其名而無其𫝊而况謂斷鰲煉石尤為不經日月蟻行晉志之妄燭龍啣火天問之誣也而况謂揮戈棄挾尤為不稽蟾蜍玉斧未知借光地影之理也支石天槎未知天演地紀之義也草木生落談風之謬也石牛黒蜧論雨之誕也仙火金門言雷者未確也堯璧漢鼎言雲者無徴也銅駞玉馬言雪者非真也以十二邦係十二次鄭𤣥之分星失之拘受封之日嵗星屬之賈氏之分星失之罔月令作於不韋而所舉中星異於堯典圖籍精於馬績而所論星數異於張衡大角一星也兩朝志以為屬亢而中興志則屬角庫樓十星也丹元子以為屬角而兩朝志則屬軫星官之書迄無定論此無他泥於數而遺其理執其迹而弗通以心又何足以上達天載之神也哉馬融有言上天之理不可測知天之事者惟有璇衡一事則求夫得天之實者惟渾天儀近之矣葢璇衡之制起於髙辛氏而虞舜察之以璿為璣而用以轉動是之謂璣以玉為管而横置其中是之謂衡璣以定天體衡以齊七耀即今之所謂渾天儀也是故黄帝得之厯起辛夘顓帝得之厯起乙夘厯之所作非渾天不可也青道二出黄道東朱道二出黄道南道之所出非渾天不可也錢􅍨則以朱黒白而别二家星葛衡則以青白黄而别三家星以考星宿非渾天不可也自軫十二度至氐四度則知為夀星自氐五度至尾九度則知為大火而其餘莫不皆然是考躔度非渾天不可也秦火之後其法蕩然漢洛下閎始經營之鮮于妄人又度量之至耿夀昌始鑄而為之象轉而望之以知日月星辰之所在也唐李淳風因之而為三重儀在外曰六合其内曰三辰其最内曰四游而一行復益之以黄道儀焉其為論亦密矣靖康之亂儀象歸於金元人襲之而䂓環不協難復施用於是郭守敬乃創為簡儀仰儀及諸儀表其説以為昔人以管窺天宿度餘分未得其的乃用二線推測於餘分纎㣲皆有可考又當時四方測景之所凡二十有七東極髙麗西極滇池南踰朱崖北盡鐵勒古人所未為者其法具載元史而儀表至今用之豈天啟中國文明之治而預生是人以創為一代之器乎堯典曰朞三百有六旬有六日以閏月定四時成嵗按律厯諸書與周髀皆云日行一度月行十三度十九度之七周天三百六十五度四分度之一故日一周天為嵗嵗十二月而無整數故以閏月定四時三嵗一閏五嵗再閏及十九年而餘一百九十日一萬五千七百十三分以日法除之共得二百六日六百七十二分為七閏之數是謂一章然必以十九嵗而無餘分者葢天數終於九地數終於十十九者天地二終之數積八十一章則其盈虚之餘盡而復始推此以定四時嵗功其有不成乎定嵗之法以冬至為第一日逐日記之第三百六十六日中晝景復最長是為次年冬至記夏至亦然故曰三百六旬有六日二至初未可以時定以午景驗之似皆在午矣雖曰三百六十六日為一期然第一日午數至第三百六十六日午實滿三百六十五日積二期滿七百三十日積三期滿一千零一十五日積四期滿一千四百六十日第一日為第一冬至第三百六十六日為第二冬至第七百三十一日為第三冬至第一千九十六日為第四冬至第一千四百六十一日為第五冬至五次冬至實得四期滿一千四百六十日當一千四百六十一日測午景尚未極長第一千四百六十二日始為冬至如是則四期之日實滿一千四百六十一每年三百六十五日有餘積四年之餘餘一日一日十二時四分之則毎年有三時為餘數故曰三百六十五日四分之一葢以一日分與四年為餘數每年各得四分之一也夫既以一目分加於四年斯每年二至當定其時而二至之時最所難准要亦約量以定之耳積日之法每年餘三時一時得八刻有餘三時總二十五刻故一年為三百六十五日二十五日葢月一次不及三十日實二十九日有餘十九年積六千九百三十九日七十五刻數内月圓二百三十五次均為二百三十五朔每朔計二十九日五十三刻有竒而其餘數均分不盡若以百刻變為二百三十五畫如總朔之數則每朔則得二十九日百二十四畫每朔該二十九日四百九十九畫矣所以四其二百三十五者葢每年有餘數四之一其四之一細為二百三十五畫而如總朔之數則一日該九百四十畫方可均而無餘故以九百四十名為日法每年三百六十五日餘二百三十五畫乃九百四十之二百三十五此即每年餘數四之一每朔二十九日有餘亦云九百四十之四百九十九茍以整數二十九日亦分細畫則每朔該二萬七千七百五十九畫矣每年三百六十五日有餘均分二十四氣每氣十五日餘二百五畫六十二秒半此又復以一畫細為百秒也兩氣計三十日四百一十一畫餘二十五秒為一節若一朔以之相較八百五十二畫二十五秒名曰一月之閏數葢一節三十已有餘數四百一十一畫二十五秒名曰氣盈一朔不及三十日是三十日内有虧乃虧四百四十一畫名曰朔虚併氣盈朔虚之數得八百五十二畫二十五秒即一月之閏數也每年十二月總計閏數十九萬四千三百一十三畫若二萬七千七百五十九畫除為一朔則該得七閏無餘矣夫月􅊍晦而復蘇為朔朔在本日四百四十一畫以前者則第三十日為後朔朔在四百四十一畫以後者則第三十一日為後朔葢畫少是本日早時雖加一朔之朔後朔止是第二十日内書多是本日晩時既加一朔之數則後朔在第三十一日矣後朔在第三十日本朔止領二十九日謂之月小後朔在第三十一日本演乃領三十日謂之月大月大則干名與後月同月小則不同也月朔之時刻非可真知亦約量而定於本日之刻畫耳一年二十四氣為節氣者十二為中氣者十二十九年之内為中氣二百二十八名若一朔之後置一中氣則七朔無中氣有正月中氣者為正月有二月中氣者為二月他月皆然月無中氣者必為閏月是故三年一閏五年再閏十九年必七閏矣凡十九年為一章初年甲子日子時朔旦冬至謂嵗次甲子謂之至朔同日第二十年為第二章首復得至朔同日然非甲子之日先期夜半乃癸夘日酉時第三十九年為第三章首復得至朔同日乃是癸未日午時第五十八年為第四章首復得至朔同日乃是癸亥日夘時第七十七年至朔又復同日乃癸邜日子時因其至朔同在夜半與第一章初年同遂以七十六年名一蔀日法九百四十故九百四十朔為蔀一蔀為四章蔀者以至朔同在夜半蔀蔽暗昧之時也第七十七年為第二蔀首亦曰第一章首每章甲子差三十九日九時一蔀總差一蔀百五十九日於内甲子整數兩周除一百二十日每蔀止差三十九日總二十蔀名一紀通差七百八十日計甲子十三周整數無餘乃無差矣一紀凡一千五百二十年至朔必同於甲子日之先期夜半然猶非甲子嵗首也總三紀積四千五百六十年至朔乃同於甲子日之先期夜半又在甲子嵗首總㑹如初是名一元一元之内嵗次甲子者七十六與蔀年同積一百六十六萬五千五百四十九日日為甲子者二萬七千七百五十九其數與毎朔之積畫相同蔀之内積日亦同此數葢一元為六十蔀矣觀衆星之昏旦出沒知天體日運一周又觀中星四時所在不同知日之所躔漸異嵗終中星復舊知日亦復舊而行年一周矣葢每年三百六十五日餘四之一故亦以周天分為三百六十五度餘四之一嵗數與天數相合故曰天周嵗終也天日一日行天一度分寸尺丈弓名曰五度分天為度者后亦度量之義若以日為尺其一度即日圓之經數也於日行之道定二十八宿之名宿之星數多寡不等於其數内定一星距者隔越之義二十八距星既定其界各宿度數由此而分如斗星從柄起以第三星為距前二星及為距之半星未離於箕而尚屬於箕餘三星半乃在本宿之度内然本宿星數少而占度多者葢斗牛之間又有建星等不在𤣥武七宿之數而附於斗故斗雖星少而占度多他宿亦猶是也若夫月之所躔昏旦漸異見其行六七度遂知一日之内行十三度有竒月與日同躔之時謂之合朔月與日同躔相對兩輪相望而光滿謂之望近一逺三月體黒白各半似弓張弦謂之弦月行及日光盡體伏謂之晦此晦朔弦望之義也一章之内日在天一十九周月在天二百五十四周於月周之内減去日周則為二百三十五朔十九日之内日行十九度月行二百五十四度與十九年周天之度數相同以二百五十四均為十九則知月行每日十三度餘十九之七每年行十三周十九之七每日逺日十二度十九之七每年多日十二周餘十九之七故每年之日月合十二朔餘十九之七為閏積十九年為七閏也舊云天道左旋日月右轉葢謂日月附著於天體天則一晝夜而周日於天止移一度月則移十三度有竒其後推測知日月與天相逺而未嘗附著故日每日周天為三百六十五度餘四之一而每年亦總為三百六十五周餘四之一天體則每日周地三百六十六度餘四之一而每亦三百六十六周餘四之一多過于日之周則是日每日不及天運一度月每日與日相多十二度餘十九之七日速而月遲也故日月右旋之説乃厯家用逆推之術取其省籌耳且日速月遲譬之二馬日駿而月駑以一度比一里每里分為十九段分為百小刻日月行天一周猶馬循環封疆一周駿馬一日行一次計行三百六十五里四段七十五尺駑馬每日不及一周止行三百五十二里十六段七十五尺較之遲十二里七段即所謂不及十二度十九之七也以段計之每日漸多二百三十五段以天計之每日漸多二萬三千五百尺二馬一處同時並發乍分先後不甚相逺厯十四日七百四十九畫半駿駑相距半周又厯此數至二十九日四百九十九畫駑不及駿一周而復同一處矣此即一朔之喻然一朔之内日行二十九度餘九百四十之四百九十九而月行一周外餘數與日同止該二十七日餘三百二畫有竒至次朔復相㑹但不㑹於元所㑹九百四十次方與元所相㑹則一蔀之數也若夫天與日㑹天體每日繞地一周三百六十六度餘四之一而日每日一周三百六十五度餘四之一天體不可知驗之經星天速而日遲每日不及一度一年則不及一周而日復舊躔故曰天與日㑹要之亦可以二馬為喻也至十九年天與日㑹而月亦㑹是謂一章之數但相㑹近非子時四章為一蔀則日月與天皆相㑹於夜半又皆在地下於是日月與天地四者俱相㑹也夫謂二馬九百四十㑹乃㑹元所者以九百四十㑹比蔀之朔㑹於元所比日月與地㑹而不及天㑹故不踰及一章之數堯典朞三百六旬有六日夫日之餘盈也六則月之餘縮也亦六若去日月之餘十二則有三百五十四乃日行之數以十二除之則得二十九日元城劉氏與馬永卿論厯法曰古今厯法各不同其閏法亦從而異秦用顓帝之厯水德王天下以十月為嵗首故遇閏年即閏九月而謂之後九月葢取左氏歸餘於終之意至於漢初因而不改永卿曰書云以閏月定四時成嵗謂之定四時則是四時之間有閏也曰非也葢謂無閏月以春為夏以夏為秋矣故曰定四時非謂四時之間有閏月也朱子曰問厯所以數差古人豈無人考得精者曰便是無人考得精細而不易所以數差若考得精密有個定數永不㑹差伊川説康節厯不㑹差或問康節何以不造厯曰他安肯為此古人厯法疎闊而差少今厯愈密而愈差因以兩手量桌邊云且如這許多濶分作四段被他界限濶便有差不過只在一段界限之内縱使極差出第二三段亦只在此四界之内所以容易推測便有差容易見今之厯法於這四界内分作八界内又分作十六界界限愈密則差數愈逺何故以界限愈密而愈越多也其差則一而古今厯法疎密不同故爾看來都只是不曽推得定只是移來凑合天之運行所以當年合得不差明後年便差元不曽推得天運定只是旋將厯去合那天之行不及則添些過則減些以合之所以一二年又差如唐一行大衍厯當時最為精密只一二年後便差只有李通説得好當初造厯便合并天運所差之度都算在裏幾年後差幾分幾年後差幾度將這差數都算做正數直推到盡頭如此庶幾厯可以正而不差今人都不曽得個大統正只管説天之運行有差造厯以求合乎天而厯愈差元不知天如何㑹有差自是天之運行合當如此説得極是不知當初因甚不曽算在裡但堯舜以來厯至漢都喪失了不可考縁如三百四十八通計得三百五十四日九百四十分日之三百四十八是一嵗月行之數也嵗有十二月月有三十日三百六十者一嵗之常數也嵗有十二月與天㑹而多五日二百三十五分者為氣盈月與日㑹而少五日五百九十二分者為朔虛合氣盈朔虚而閏生焉故一嵗閏率十日九百四十分日之八百二十七三嵗一閏則三十二日九百四十分日之六百一十五嵗再閏則五十四日九百四十分日之二百七十五五十九嵗七閏則氣朔分齊是為一章也愚謂天體圓如彈丸半覆地上半在地下以二十八宿分周天之度共為三百六十五度四分度之一朱子云天無體只二十八宿便是體是也四分度之一者天行每一度計九百四十分分為四分則計四個三百三十五分而得其四分之一也天行過一度者天行健一日一夜周天三百六十五度四分度之一而又過一度也朱子曰日月皆從角起則一日運一周依舊只到那角上天則周了又過那角些子日日累將去到一年便與日㑹又云而今若就天裏看時只是行得三百六十五度四分度之一若把天外來説則是一日過了一度李通嘗論日月則在天裏論天則在太虚空裏若去那太虚空裏觀天自是日日滚得不在舊時處所謂日之二百三十五者在天為度在嵗為日天有三百六十五度四分度之一嵗亦有三百六十五日四分日之一也天一度有九百四十分嵗亦有九百四十分均之四分分之每分計二百三十五分是天與日所行之餘分也所謂二百三十五者即四分度之一耳日與天㑹者一朞内二十四氣必有三百六十六日雖遇置閏年亦同如自今年冬至至來年冬至前一日必三百六十六日也日與天在來年冬至三百六十六日上㑹而成一嵗也十九分度之七者以九百四十分分為十九分内中取七分總為三百四十六分三釐一毫五忽七絲六秒此月行一日不及與日常度之餘分也如是則月行一日不及日十二度三百四十六分坐毎月積至二十九日四百九十九分上其不及日者三百六十五度二百三十五分則日所進過之度恰周得本數而月所不及之度亦退盡本數恰恰與日㑹而成一月合十二個二十九日計全日三百四十八十二個四百九十九分積五千九百八十八以日法九百四十分除之得六日零三百四十八通計三百五十四日三百四十八分此一嵗月行之常數也月與日㑹處係於每月二十九日四百九十九分上㑹如正月斗柄指寅寅與亥合日月則㑹於亥其辰為娵訾二月斗柄指夘夘與戌合日月則㑹於戌其辰為降婁積十二㑹皆於斗柄所指之宫合宫上㑹也三百六十為一嵗之常數者以五行之氣言之各旺七十二日則五其七十二為三百六十以六甲之數言之每甲六十六其六十亦三百六十以乾坤二篇之䇿言之乾二百一十六坤百四十四亦合三百六十所謂一嵗之常數也氣則二十四氣自今年冬至前一日計三百六十五日二百三十五分是於三百六十日外多五日二百三十五分者為氣盈朔則十二月朔自今年十一月初一至來年十一月初一前一日計三百五十四日三百四十八分是於三百六十日内少五日五百九十二分者為朔虚合氣盈朔虛而閏生者一嵗閏積氣朔之後計十日八百二十七分三嵗一閏積氣朔之數三個十日八百二十七分計三十二日六百單一分五嵗再閏積氣朔之數五個十日八百二十七分計五十四日二百七十五分但五嵗内無再閏而易係乃有五嵗再閏之文者葢以氣盈六日朔虛六日而再閏在五嵗内者舉成數也氣盈五日者二百三十五分朔虚五日五百九十二分而再閏在六嵗内者舉本數也十九嵗七閏為一章者葢九為天數之終十為地數之終十九嵗而天地之數俱終故當七閏也自一嵗餘十日零八百二十七分積十九年得全日一百九十日零分積一萬五千七百一十三分以日法九百四十分除之計成日一十六日零六百七十三分通前所得全日總計二百單六日零六百七十三分將此計於十九年内分作七個閏月計三七二百一十日内少三日二百六十七分七閏月之中合除此三日二百六十七分均作三個月小盡正恰好故氣朔分齊定星冬至在十一月朔是為至朔同日而為一章之嵗也嘗論一日月皆麗乎天者也日之行比天只不及一度月之行乃不及日十二度何哉葢天秉陽而在上日為陽之精月為陰之精也造化之間陽大陰少陽饒陰乏陽得兼陰陰不兼陽此日行所以常過月行所以常不及也且一嵗朔虚五日五百九十二分固月之所不及行者矣氣盈五日二百三十五分亦月之所不及行者也使日之運常有餘月之運常不足不置閏以齊之積之三年春之一月入于夏子之一月入于丑矣又至于三失閏則春季皆入于夏十二失閏子年皆入于丑矣何以成造化之功哉故聖人作厯必歸餘于閏以補月行不及於日之數則月之行也始可與一嵗日與天㑹之數相參為一至十九年而氣朔分齊無毫髮之差矣聖人裁成輔相之功豈淺淺哉或云厯家之説則以為日行遲一日行一度月行速一日行十二度十九分度之七何也曰陳安卿嘗問天道左旋自東而西日月右行則如何朱子云横渠説日月皆是左旋説得好葢天行甚健一日一夜周天三百六十五度四分度之一而又過一度日行速健次於天一日一夜周天三百六十五度四分度之一正恰好被天進一度則日却成每日退了一度積至三日六十五日四分日之一則天所進過之度又恰周得本數而日所不及之度亦恰退盡本數遂與天㑹而成一年月行遲一日一夜三百六十五度四分度之一行不盡此之天却成退了十三度有竒進數為退天而左退數為逆天而右厯家以進數難算只以退數算之故謂之右行且曰日行遲月行速也然則日行即得其正愚謂欲知日速月遲其迹有易見者且日月㑹於晦朔之間初一晚最好看起日纔西墜㣲茫之月亦欲隨之而墜矣至初二便相隔㣲濶初三生明以後相去漸逺一日逺似一日直至十五日月對望則是日行速進而逺至半天月行遲退而不及亦逺半天矣日十六至月晦日行全逺盡一天月行全不及亦盡一天即所謂日進盡本數月退盡半數而復相㑹也嵗月與天㑹法也月日與月㑹法也日日與度㑹法也時日與辰㑹法也故時與日二日有三十月有十二嵗有三百六十嵗日與天㑹之法也以節氣為定年月與日㑹之法也以朔望為定故年必以元旦嵗則有後先也交於立春嵗必三百六十五日零三時而交春月必三十日五時二刻而交節此天道常行之數也日與天㑹法也求閏餘分要法超法一十萬零八千七百五十三分八十四抄講曰置閏餘分一十萬零八千七百五十三分八十四秒在位用流年乗之得數加準一十四萬八千四百四十一分八十六秒如滿朔䇿二十九萬五千三百零五分九十三抄累減不及者便是當年閏餘分也閏餘分在一十八萬六千六百五十二分零九秒已上者有閏月也若在已下無閏月也閏月訣每月算閏月休將本月論雨水定閏丑春分却在寅榖雨閏二月小滿閏三辰夏至多四月大暑五月真處暑多六月秋分七月申霜降八月酉小雪九月均冬至閏十月大寒子月逢月内無中氣便是閏月經經朔有閏加二十三萬八千九百七十七分零九秒秒經朔無閏加五十四萬三千六百七十一分一千六雨水定閏丑者如萬厯三年乙亥嵗正月初一日雨水節則去年閏十二月也凡月内無雨水定閏丑月也月無春分定閏寅月也故曰月内無中氣便是閏月一年之間朔虚五萬六千三百二十八分四十秒氣盈五萬二千四百二十五分合之得閏餘八十分故曰積盈虚而成閏也以朔虛氣盈置閏者天不用之而用之者人也人用之者使農桑之候不失其序也何謂朔虚一年十二個月有六小共少六日此朔虚之虧數也何謂氣盈二氣為一月正月立春雨水之類必有三十日零五時二刻二十四氣共該三百六十五日零二十五刻毎年十二個月六大六小只有三百五十四日三十六刻是多十日八十九刻約計三年之中共多三十二日六十七刻合節氣之有餘與月小之不足因此有餘不足而置閏其間三年之一閏五年之再閏與十九年之七閏而為一章皆此法也二十七章為一㑹該五百十三年三㑹為一統該一千五百三十九年三統為一元該四千六百十七章章也統也元也運于無窮也圖書編卷二十四
