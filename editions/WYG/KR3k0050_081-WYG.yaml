body:
  text: 圖書編卷八十一明章潢撰吏曹總敘人君代天子民故曰天子冡宰不過天子家相耳名曰天官豈尊之以空名哉盖冡宰百官之長百政所從出也雖太宰少宰内宰宰夫各有攸司凡外而王朝中而王宫上而九重之闕失下而庶僚之臧否皆其所統也夫無所不統者天也天官之職得而司之無非奉若天道佐天子以統理天下之治也書曰亮天功曰代天功皆此義也天運三百六十五度而七曜列宿莫不旋繞萬物資以生殖故天為羣物之祖天官統三百六十屬而百司庶府莫不厲翼萬民頼以康阜故天官為百寮之長然則官以天名豈他官可得而並哉虞九官其長使宅百揆周六官太宰掌建邦六典任大職重有如此秦漢建置失尚未逺柰何宫中府中本一體也厥後内外分而宫中之事非冡宰所得聞矣治軍治民本一事也厥後兵農分而武職之仕非冡宰所得與矣其所掌者特銓選官職考課殿最以黜陟之耳然其職雖分天官之名唐宋以來如故也我朝改為吏部尚書即周大官卿也侍郎周少宰也所屬四司文選驗封稽勲考功雖未必如周冡宰所統之全然官司職掌乃天下民命所係其銓選考課皆掌之天官故自代天子民之意觀之孰非天乎果循天官之名體上天仁愛元元之心不執一已意見以品秩天下之賢才不徇一已愛憎與人之毁譽以進退天下之能否為民擇官因材授職資格祗以限凡品要地必以處仁賢久任超遷並行不悖汲引一天之公也甄别一天之明也勲爵頒之生前贈諡錫之身後一天之所以彰有德也庶乎天官名稱其實否則天之視聴在民而下負生民其䙝天負天為何如哉前古官制或紀之以鳥或紀之以雲非後代之所沿襲無論已而後之所凖以為法者非虞廷之制乎九官治内十二牧治外其屬不詳而大畧不出此何其簡而要也然古人稱無為而治者必曰有虞豈虞廷官制獨與後代異哉各代因革不盡同揆之九官十二牧不甚相逺而其居九官者果如禹稷契臯陶伯益其人乎夫禹稷契臯陶伯益聖人也其才各有所長故稽之虞書禹長於平水土而官司空稷長於播百穀而官后稷契長於敷五教而官司徒臯陶長於明五刑而官士以至垂之工益之虞夷之禮䕫之樂龍之納言其官之所職者孰非其所長者况禹長於水土之平不恥其不善明刑設舉禹明刑恐未必如臯陶而以治水責之臯陶想未必愈於禹也稷長於百穀之播不恥其不善敷教設舉稷敷教恐未必如契而以播穀責之契想未必優於稷也是以羣聖人之徳而其長不相兼且終身未聞其兼官亦未聞其改官也故徳懋懋官舉能其職終身不更其所長如史遷之終於史韓柳之終於文李杜之終於詩各以一長名家此所以地平天成五穀熟而五教敷禮樂刑政莫不底績虞廷百寮師師熙帝載亮天工用是道也况設官本以為民也故臯陶謨曰在知人在安民又曰知人則哲能官人安民則恵黎民懷之仁知並行此乃帝王設官為民之本意也是故孔子因樊遲問知曰知人問仁曰愛人舉直錯諸枉能使枉者直知人即所以愛人也觀舜有天下選於衆而不仁者逺可見矣孟子謂知者無不知也當務之為急仁者無不愛也急親賢之為務而急務即在親賢也觀堯舜之知不徧物仁不徧愛人而先務急親賢可見矣後代不明仁知合一之學故學之平日者非所用也用之他日者非所長也貢舉視浮言為品題銓選循資格為遷轉今日握銓衡明日司錢穀今日掌禮樂明日司刑獄舉羣聖人不能兼者責備於一人即平日未嘗問學者取辦於一旦上之人不問其能與不能而任之官下之人不自知其能與不能而當其事上下蒙昧茍且塞責知人者誰乎安民者誰乎鰓鰓然祇詳於官職煩簡之論抑末矣又安望虞廷之盛治乎嗚呼讀尚書而考官制深於虞之九官十二牧周之三公三孤有深慨焉志虞周之治化者幸無視此為儒生之常談云太師太傅太保惟兹三公論道經邦燮理隂陽官不必備惟其人少師少傅少保曰三孤貳公𢎞化寅亮天地弼予一人冡宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司冦掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利六卿分職各率其屬以倡九牧阜成兆民胡安國曰古者三公無其人則以六卿之有道者上兼師保之任冡宰或缺亦以三公下行端揆之職禹自司空進宅百揆又曰作朕股肱耳目是以宰臣上兼師保之任也周公為師又曰位冡宰正百工是以三公下行端揆之職也所以然者三公與王坐而論道故惟其人而冡宰統百官均四海亦不易處也吕祖謙曰三公無職而六卿有職者也三公論道而六卿行道者也以三公兼六卿合本末精粗於一原也周官總論設官所以為民也盖天本為民而立君所以君亦為民而設官周官一篇自後世觀之不過設官之制云爾然一則曰綏厥兆民一則曰永康兆民故公孤燮理隂陽寅亮天地孰非為民計耶周禮一言纖悉具備其中雜錯且未暇論然於公孤論道𢎞化罔及焉是詳其目而未揭其綱故愚謂論周之官制當以周官為凖但其所載者特設官之制度已耳乃云學古入官云不學墻面而惓惓於學焉何哉云功崇惟志業廣惟勤惟克果斷乃罔後艱云恭儉惟德毋載爾偽作德心逸日休作偽心勞日拙其所以辨析學術者何其詳哉盖公孤惟其學也所以論道經邦貳公𢎞化弼予一人者為有自也六卿惟其學也所以各率其屬以倡九牧阜成兆民者為有自也周官法度之中本寓夫闗睢麟趾之意此可見矣秦漢以來官制固多與周官不合然於弼君綏民之學鮮不視為迂談又何怪其治之不古若也是故古人視政與學為一本之學以逹之政此治之所以日隆後人視政與學為二詳於政而畧於學此治之所以日替惟我朝官制公孤六卿大畧與周相似不惟廊廟以六典建官而内外各官亦莫不以六典視事漢唐宋殆不侔矣特成周以鄉三物立教則其所謂學者端有出於舉業之外也今士君子其學之平居與設施於民上者視成周為何如噫真知天之所以立君君之所以設官之意而後可以語周官綏康兆民之㫖按公孤之職夏商以前未有也其名始於此者舜命禹總百揆髙宗爰立傳說作相則周前未聞有是名矣噫立公孤而以六卿兼之是即揆相之任歟我朝稽古定制革去前中書省倣六典立六部而公孤之職間以六卿兼之亦成周意也噫近時祗為武職兼官死後贈典果盡得周官之意歟公孤六卿總論潛學稿曰唐虞稽古建官惟百夏商而下稍繁矣亦職用倍周三百六十屬上法乎天行極矣盖官貴簡冗病治也立太師太傅太保何也論道也王道揆之所出也道之大原出於天貫三才而一之不通乎道而能以經政者否也故三公論焉日啓沃乎王心俾王格知天命如面稽然弼化原之道也王心王躬思慮聰明應節法天宥密平康得天地泰冲陰和陽動靜順軌好惡以常發歛消息與時偕行省嵗在天毋失其當秉道握符以中為常是燮理之精也故師嚴傅宻保親而後王以道寧也立少師少傅少保何也貳公也公尊重矣王不可以凟公有貳而後道可以意盡也公論道於上孤弼而相之公燮理於上孤敬而明之故雖天子必有師也以有尊也必有弼也以有輔也主於道不及以政然後志凝於神而專之於道通神易之原調精祲之㣲是治安之本也今保傅不立而求治是窒源而求流之長濁源而求流之清不可得已論官者先諸此冡宰掌邦治何也冡宰政之綱也百官輻輳並進宰握樞曰統則六典八法八柄之為也萬國碁布星列宰平畫曰均則六典八則八統九兩之為也相道也司徒掌邦教何也治莫重於教也五典者民待以生敦典降德俾兆民適於道而和綏猷生民之道也宗伯掌邦禮何也教莫大於禮也掌天神地祗人鬼之三禮幽明治矣掌吉凶軍賓嘉之五禮上下和矣故禮以體國也司馬掌邦政邦戎政也司冦掌邦禁邦刑禁也大刑用兵兵豈必用克詰張皇赫赫濯濯天下思戢而後能以邦國寧小刑用刑則何可弛於國也姦應有詰折之始萌暴亂有刑罪用其當盖天之道有揫歛而凛溧下霜也大哉乎司馬之置兵曰政司冦之制刑曰禁也明兵設不用刑有禁欲毋犯也王德之至也司空掌邦土何也空也者冬也萬物歸藏復命亶空土而已居四民藏之以為安時地利農用以為利土之道也故六卿猶天地四時然一不可缺自教無列而大官急政賦也窮民於兵刑而各官專工也是六職所以失官也六卿分職率屬倡九牧何也卿各專其職如視聴持行各專其一而政可舉也卿各率其屬如榱椽檐楹共奏其功而室可成也内者外之綱近者逺之望卿分職率屬王朝邦畿濟濟翼翼而後九牧有倡也故六卿治之綱也九牧不著何也牧伯君道也且列爵五分土三武成前定之矣周禮六官原易首乾象天禮首天官建冡宰法天易坤承乾地配天禮天官掌邦治象覆燾司徒掌邦教象持載盖教以宣治而地官卿配天也君治師教天之道也天地設位而易行易乾元亨利貞禮宰統百官禮政刑事物有其官上法乎天行是故法象莫大乎天地變通莫大乎四時憲天聰明法時順布分職聯事為民極莫大乎六官曰天官卿於六官並列何也曰易乾坤於六子亦並列也天地四時一不具即覆載生成之德詎有偏乎其並列象分異也其聯事象功同也譬則風雨露雷具而化工宣生長收藏合而嵗功成經絡血胍相轉輸而百體清和咸理也然何獨事聯也天官者以治教禮政刑事為其治者也地官者以教治禮政刑事為其教者也春官者以禮治教政刑事為其禮者也夏官者以政治教禮刑事為其政者也秋官冬官者以治教禮政刑事為其刑為其事者也譬言天而五行四時統於天言地而五運六氣統於地春夏秋冬各以其時行而覆載生成之德各正具備也播五行於四時而木火土金水嵗月日時干支子母迭而運也易先天圖天地定位而雷風山澤水火錯列以成體後天圖帝出震齊㢲相見致役說兊勞坎始終乎變化成萬物也其道一也宗伯掌邦禮曰春官何也曰易乾元統天禮三千三百一天故禮者體仁長人之紀也記曰宗伯之官以成仁司馬掌邦政曰夏官何也曰政者正也司馬掌政張皇六師赫赫濯濯而後能以萬國寧大正人之道也譬則夏之日乎伊可畏而助長物也抑雷霆乎時雨乎殫迅疾而震動優渥過化而不留也夏盛德在火故兵猶火火烈具舉而民勿之有犯也故兵藏於民大設不用而諸侯自為正夏官卿之道也記曰司馬之官以成聖司冦曰秋官司空曰冬官何也天地之氣收而肅肅漸以嚴而終之藏以固也秋揫歛司冦義刑義殺驅而納之善象之曰秋官冬固藏司空居四民時地利藏而固之富而生之其象也大哉乎冬官之事典主富萬民而夏官之董兵曰政秋官之制刑曰禁也明兵設不用刑有禁欲無犯也逹天徳矣易曰天地之大德曰生後世極兵刑之用於水德而世嗣竟殄則逆天用焉故也曰書周官有三公而禮經無列何也曰三公無官也天以紫宫樞極統萬象而居其所不動不自顯其光所以為神也帝以道揆法紀統六合而師保凝丞左右宻勿不自勞於事所以為聖也周官論道而不及以六政以尊道也九經尊賢而不列之大臣惟貴德也故三公無官也天地者道之本也隂陽者道之運也三公者洞幽明之故握元化之統備淵浩之德神而明之默而成之不言而躬行之者也三孤者慎觀三師之德行而審諭之於道者也公調而燮之孤寅而亮之公微言而篤行之孤審象而弼承之然後能襄王於天而道揆立焉是奥樞之任也孔子曰修身則道立尊賢則不惑曰前儒言之三公不備官也三公之有官皆六卿之上攝者也諒乎曰唯唯否否三公道揆之所出六卿法紀之所守也議道揆者本天質道主格王心焉握治樞於奥尸法紀者憲天𢎞道主宣王政焉敷道治於明是故六卿者外倦勤於政内深喻於道則使之釋政而任道奥樞其任矣奥者明之根明者奥之符不求端於奥而求以理明者末也既握樞於奥而兼以理明者誖也以師保之尊而復尸宰司之事則胡以平政是明聖之所不處也任六卿之務而復議調燮之道則何以凝道是明聖之所不能也且王者之于道也訏謨密勿靡息而豫怠焉師保傅者時省㣲而輔範以一之於道者也盖昔者武王克殷甫下車訪箕子受洪範焉踐阼三日就師尚父齋宿三鼎行西面再拜受丹書焉而一不備其官將王徳無于此闕乎是明聖之所不為也其謂官不必備者難其人即不必具備可也而何可一無設也故三公不設而以為兼官若加官也周季世之事非公本所為建官意也曰周六服有羣辟而經不具何也曰六服有分土矣羣辟有君道矣教不易俗政各因方王何敢知焉六卿分職列屬王朝王畿井井秩秩而九牧有倡也且建牧立監太宰主之正畿疆立社稷大司徒專之太史掌其典職方掌其籍大行人掌其禮盖邦國六典咸受成於六官於王治豈有外哉記曰天子三公合以執六官均五教齊五法倡九牧以御治此之謂也小宰掌官刑以貳太宰宰夫掌朝法以貳小宰皆通内外之官也故太僕𫝊言於宰夫宰夫傳言於小宰小宰傳言於太宰又有内宰雖掌治王内之政令亦屬於太宰以此見周之宫中府中實合于一理也太宰以八法治官府小宰掌建邦之宫刑以治王宫之政凡宫之糾禁正嵗以宫刑憲禁於王宫宰夫掌治朝之法以正王及三公六卿大夫羣吏之位宫正掌王宫之戒令糾禁内宰掌治王内之政令自内之王宫言之小宰既建邦之宫刑治宫之政令舉宫之糾禁憲禁宰夫又以法制羣吏之警戒令宫中之職事書宫中之良能其於治内之法無不致其嚴也總論太宰兼行六官通理王内二篇或問六卿分職各率其屬見於周官之篇以官府之六屬舉邦治以官府之六職辨邦治見於小宰之職自治典至事典截然分畫宜若一定而不可易今太宰之職顧曰掌邦之六典何也曰此太宰兼行六卿之事也自其分職而言之凡朝廷之事固屬之太宰國中之逺郊近郊大都小都公邑家邑凡郊畿之事固屬之司徒職方氏土方氏以至撢人凡邦國之事固屬之司馬禮屬宗伯刑屬司冦工屬司空自太宰兼行六卿言之則六典八法八則八柄八統九職九賦九式九貢九兩凡此十條皆經國之大綱政事之條目而散見于三百六十官之中太宰實舉其綱而攝其要焉又非獨曰格物窮理克勤小物而已也盖唐虞三代建官之制職事分于下而權綱合于上非泛然而無統也四岳通内外之官羲和之長也羲和則實聴于四岳百揆宰相之職百官之長也九官則實聴於百揆百揆統九官四岳四岳統羲和四子比附聯絡天下之治雖非一二人為之而實一二人能使之成周之制亦然三百六十屬聴命於六卿而六卿聴命於冡宰冡宰實三公兼之渙散分析之中而有比附聯屬之勢自今職而考之太史内史掌六典八法八則八柄之事春官之屬也而典法之正則在於太宰太僕掌諸侯之復逆小臣掌三公及孤卿之覆逆御僕掌羣吏之逆及庻民之復夏官之屬也而臣民之總則掌於宰夫司士掌朝儀之位秋官之屬也而治朝之位宰夫掌之泉府廩人倉人掌財用地官之屬也而貨賄之出入太府掌之内外朝之冗食地官藁人之職也而宫正内宰則又均其稍食王朝之服飾春官司服之職也而内司服至屨人則又掌其服飾之用自宰夫之下夏官之上六十官之内三百六十官之職錯綜而互見焉並建六典兼行六卿天下萬事凡有闗於理亂安危之大者則無不翕然在其掌握之中也盖古者三公無官惟與天子坐而論道故設六卿以分主六典而三公實統之三公既兼冡宰則六卿之大典非冡宰而誰建耶此事權之所以合於一而國家所以無多門之政自漢以來則失之矣有三公又有九卿而丞相御史未嘗行九卿事觀武帝時桑𢎞羊等致利王温舒之屬峻法倪寛等推文學九卿更進用事不闗决於丞相而大臣之權盡去矣嗚呼人君之為天下如欲稽古正名而使事權之合於一茍舎周官未有不涣然無統者矣或問小宰宰夫推廣太宰之法而聳動警飭百官府之治其於事則為宜而於勢則為順矣至於王宫之政令則自有宫正宫伯以掌之王内之政令則又有内宰以治之而復預内事何也曰先王之制事權欲合於一而内外庭之勢本不容於分也宫中府中俱為一體余嘗於冡宰屬官論之矣若夫此二官之佐冡宰其所以通内外而合事權者則猶有可論焉夫宫正宫伯雖曰掌王宫然不過宫中徒役之事子弟宿衛之職與夫諸官府之在内者耳其於後宫則初無所預内宰雖曰掌王内又不過以禮儀教王后夫人與夫九嬪世婦凡女寵近習之在左右者耳其於王宫之徒役宿衛則又畧不相闗各掌其一而遺其二既不能以相統而權亦不能以相臨統而臨之則惟太宰焉故宫正宫伯内宰皆𨽻於太宰而小宰宰夫皆佐太宰而兼掌其事職雖列於外而通於内權雖分於二而總於一自今考之曰建邦之宫刑曰制王宫之政令曰憲禁於王宫曰令修宫中之職事此王宫也凡宫之糾禁則王宫后宫無不在所掌也自其掌王宫也則兵衛即衛凡宿衛之人皆領之飲膳衣服洒掃啓閉次舎幄帟凡供奉之人皆領之宫禁之秘藏王后世子之好用凡財用之司存皆領之其間多寡豐約用舎去取天子始不得以自私而小臣始不得以自便矣自其掌後宫也則六宫六寢無王内之限九御無女官之别詔其禮樂正其服位禁其奇衺稽其功績其間損益增减採擇進御始有宴私玩狎之節而無侵竊惑侈之患矣盖世未有家不齊而國可治者未有國不治而天下可平者太宰之治所以兼統内外而以小宰為始小宰之宫刑既以齊其家宰夫之朝法又已治其國然後太宰之邦典始可以治天下矣文王道化之後近至於汝墳逺至於江漢反而求之不過於后妃夫婦之際侍御僕從之間盖其事存乎二南之風而載於穆王之命所謂刑于寡妻以御於家邦旦夕承弼厥辟出入起居罔有不欽而下民祗若者其道盖如此也幽王不道二雅交譏而並刺之然皇父作相而内宰膳夫内史師氏猶得其人向使幽王之不淫其色夫豈不能遏􅃩妻之煽哉巷伯之雅所謂萋菲成貝錦哆侈成南箕乃寺人之賢者傷於讒而為世德下傳家法猶未盡壞若内若外若小若大猶遴其選而擇其賢乃如成玉周公親繼文武之志其事固可知也是以論太宰之兼統内外當自小宰宰夫始齊家治國又自文王之家法始周官品命數周官有九儀之命正邦國之位九命作伯上公有功徳者加命為二伯得專征伐五侯九伯也盖長諸侯為方伯八命作牧侯伯有功徳者加命得專征伐于諸侯又云一州之牧也王之三公亦八命七命賜國王之卿六命出封加一等者鄭司農云出就侯伯國六命賜官鄭司農云子男入為卿治一官也鄭云此王六命之卿賜官者得自置其臣治邑如諸侯五命賜則則者地未成國之名也王之下大夫四命出封加一等五命賜之以方百里二百里之地者三百里以上為成國王莽時以二十五成為則方五十里合今子男之地四命受器受祭器為上大夫也鄭𤣥謂此公之孤始得有祭器者也三命受位受下大夫之位也鄭𤣥謂此列國之卿始有列位于王為王臣再命受服受祭衣服為上士也鄭𤣥謂此受𤣥冕之服列國之大夫再命一命受職始命為王吏謂列國公侯伯之士也于子男為大夫一云受職事右内外官六萬三千六百七十五人内二千六百四十三人外諸侯國六萬一千三十二人職掌府史胥徒賈人工人庶子罪閩蠻夷貉等五𨽻醫人圉人虎士視膝力召反及奚漿籩醯醢鹽羃酒桃春枕饎等枕音肉饎音熾熟食也爾雅云酒食也女職一萬五千九百五十人都記内外官及内職掌人七萬九千六百二十五人其旄人舞者及大祝巫覡閽人每門及囿世婦每官等官職并冬官人數及外職掌人等並闕按帝王世譜云湯受命有三千餘國又按王制云殷時天下諸侯國千七百七十三當是殷時政衰諸侯相併季末之時所存之國大國二百四十九次國五百一小國一千二十三大國次國則皆三卿五下大夫二十七上士惟小國二卿其大夫與士如大國次國之數凡列國卿大夫士有六萬一千三十三人及周初有千八百國列國卿大夫士約與殷不異罷侯置守郡縣官吏百姓之所奉豈非勤乎圖書編卷八十一
