body:
  text: 圖書編卷三明章潢撰六十四卦反對圗總叙自乾坤至小畜履六卦層叠亦如一卦統三十六卦言之上經由乾坤至小畜履初畫也由泰否至噬嗑賁二畫也由剥復至離三畫也内卦備矣由咸恒至損益四畫也由夬姤至漸歸妹五畫也由豐旅至既未濟六畫也而外卦成焉可見六六四九總只如一卦也徒知八八六十四皆以六畫而成卦不知六六三十六乃先聖無言之易也豈深于易者哉况上經首乾坤而屯蒙需訟師比皆坎用事坎得陽之中乃陽中之陽也至泰否則乾坤既交而同人大有謙豫皆離用事矣然隂猶得中其陽中之隂乎下經兌巽震艮則皆偏隂偏陽而乾坤坎離咸在其包括之中尚為陰中之陽也至夬姤萃升之後不復見有乾坤非隂中之隂而何然咸體艮居内未濟坎居内震艮二純卦居巽兌之先其尊陽抑隂之意又自寓于中也惟細玩反對層叠圗象其義皆不言而喻矣上經正卦六反卦二十四共用十八卦成三十卦下經正卦二反卦三十二亦十八卦成三十四卦天地者陰陽之統㑹水火者陰陽之流行雷風山澤者陰陽之節宣是以乾坤坎離為經之終始而艮兌震巽交于下經之首也上經乾坤定天地之位固有否泰之異下經咸恒成夫婦之交乃有豐旅之殊然剥而復者坤陰剥乎陽而乾之一陽為始復也夬而姤者乾陽决乎陰而坤之一陰為始姤也剥復以艮震而相反夬姤以兊巽而相反六叠之中陰陽消息之機卦位錯綜之妙真可樂而玩也上經首乾坤陰陽各分故終之以坎離亦陰陽之分也下經首咸恒陰陽交合故終之以既濟未濟亦陰陽之交合也惟其各分而否泰亦分惟其相合而豐旅亦交合大畧上經多陽故剥者剥乎陽復者復乎陽下經多陰夬以陰而夬姤以陰而姤上經二陽在外則為頥四陽在内則為大過下經二陰在内則為中孚四陰在外為小過雖曰八純卦乾坤坎離俱不變震艮巽兑則有相反焉然艮上震下為頥震上艮下為小過巽上兑下為中孚兑上巽下為大過是震艮巽兑亦四卦不變總之變者八卦不變者六十四卦雖曰上經止三十卦下經則三十四焉然上經對者六卦乾與坤頥與大過坎與離俱相對其餘相反者則十有二下經對者二卦中孚與小過對其餘相反者則十有六以六合十二以二合十六各以十八卦而分上下經焉至于坎離得乾坤陰陽之中故居上下經之終兑艮巽震得陰陽之偏而四卦交合于下經之首散見于剥復夬姤豐旅六變之間則亦不可以輕重言也况總上下經始終之義論之乾坤陰陽之正也坎離水火之正也造化之自然者立其一定之體咸恒夫婦之交也既未濟水火之交也人事之當然者盡其變通之用此三才之道也上經乾坤六變而有泰否乃天地之泰否也泰否六變而有剥復復乃乾之一陽方剥于上即復于下矣下經咸恒六變而有夬姤姤即坤之一陰方決于上即姤于下焉夬姤六變而豐旅則又人事之泰否也觀乾坤之于咸恒剥復之于夬姤泰否之于豐旅其消息盈虚皆造化人事之自然而然者聖人特因而畫卦以示人也于此黙識心通則六十四卦可以精義入神矣易序卦反對象義乾乾上乾下天者萬象之原也天命於穆聲臭俱無知天豈易易哉然天垂象聖人因而畫象示人而於穆不已之精藴於兹見矣即天之象也即所以順承乎天而六十四卦三百八十四爻皆乾之藴也知乾則知易矣是以彖傳謂乾元資始繋辭曰乾知大始乾以易知九三文言曰知至至之知終終之知此則無象之乾可以黙識而伏羲畫卦為文王謂之元亨利貞周公謂之用九見羣龍無首孔子謂之天行健君子以自强不息皆不言而喻也然人能象天即天之肖子惟復以自强而知崇效天則乾道在我可以先天後天矣不為合徳之大人乎但易成于四聖而四聖之徳皆天徳也伏羲猶仰觀俯察文王猶望道未見周公猶夜以繼日孔子猶發憤忘食不敢不勉何也乾道無窮體乾之健不容自己此所以善體乾此所以善用易也噫是乾也變動不居上下無常時乗六龍乃見天則本無象也聖人畫之象焉觀其象可以得其無象之意本無言也聖人繋之辭焉玩其辭可以得其無言之精雖曰茍不固聰眀聖知達天徳者其孰能知之然神明存乎其人顧其自强何如耳坤坤上坤下坤非自為坤而異乎乾也盖天陽地陰即天地之象即古天地字也一竒一偶象本一定而不移乾健坤順徳亦並行而不悖彖傳大哉至哉資始資生元亨利貞皆所同具坤為乾之對無疑也然乾坤竒偶一而二二而一者也其誰知之哉何也偶即竒之分順即順乎健乾大無外坤亦至乎其大乾資物始坤即因其所始而為之發生所以乾元亨利貞坤元亨同而利牝馬之貞則有深意存也然則坤配乾猶牝馬柔順足為健剛之配而馬之資生雖出于牝其資始者不有指乎故文王于坤又設牝馬之象向使柔順而非牝馬則不可以言正亦非柔順之所利也明矣况玩彖傳爻象文言之辭曰乃順承天曰合徳無疆曰含章可貞或從王事曰用六永貞以大終也曰後得主有常曰承天而時行曰地道無成而代有終也即一卦之辭㑹而通焉坤順乎乾健一言以蔽之矣知此始可以論乾坤始可用六利永貞也知此則繋辭所謂乾知大始坤作成物乾以易知坤以簡能與知崇效天禮卑法地辭若並舉而相承之意可黙識矣學易者反諸身真悟乾坤易簡而效法之則用九用六上下與天地同流屯震下坎上蒙坎下艮上渾沌既開而天地位萬物並育而屯蒙生曰屯曰蒙萬象初開有屯塞蒙昧之象然即屯蒙二卦相反而震坎艮三陽皆用事矣故自觀之為雲雷屯在天之象也自觀之為山下出泉蒙在地之象也析之雖有屯蒙之分合之原無竒偶之别惟即其象以上下之而屯蒙異也聖人有見于斯乃象屯以建侯而君道立象蒙以養正而師道行君以亨屯則經綸以立政一皆正人之不正也故有取於初剛之動師以開蒙而果育以立教一皆中以養不中也故有取于二剛之中君師之道以剛為主故屯主初蒙主二而以貴下賤可以得民剛行時中可以作聖皆于此乎寓也况震為長男而建侯坎為中男而克家艮為少男而童蒙吉三子並列于乾坤之後則君師之位正治教之道彰此所以屯亨蒙開而萬世為永頼矣卦中爻義不一如屯二女子貞不字蒙二子克家而有男女之分屯四求婚媾往吉蒙三忽用取女而有利不利之别相闗互發諸如此例不能備述惟在得其大意云爾需乾下坎上訟坎下乾上屯蒙之後繼以需訟乾始與坎遇也屯蒙以二陽四陰成體需訟以二陰四陽成體且屯險在上必有事于相需蒙險在下毎相争以成訟人之情也觀雲上于天需天與水違行訟訟即需之反也如此則需如此則訟其機在乎反覆間耳所以剛健不陷而爲需險而又健則為訟也况觀其象而玩其辭二卦俱以坎之中實為主需之坎在上則為孚為光訟之坎在下則為窒為惕需之乾在坎下則利涉大川訟之乾在坎上則不利涉大川可見乾健坎險一也相待則胡越同舟以共濟而往有功相持則骨肉讐仇以傾䧟而入於淵故曰需不進也訟不親也君子法其象于日用之間惟需乎飲食宴樂之常而作事謀始則敬慎不敗復命安貞有需之利而吉無訟之不利而終凶矣師坎下坤上比坤下坎上需訟之後繼以師比乾與坎相上下為需訟坤與坎相上下則為師比且訟則師興而需則君比亦理之必然者然地中有水師于此得井田之象焉故容民畜衆而兵農之有法地上有水比于此得封建之象焉故建國親侯而君臣之相聫况觀之卦體比以一陽在上為衆陰之主君之象也師以一陽在下為衆陰之統師帥之象也可見陽一也在上則為君在下則為帥在上則顯比而王用三驅在下則師中而王三錫命合而玩之可以得其設象命辭之意矣噫得比九五之賢君而建國親侯則封建足以聫上下之交得師九二之丈人而容民畜衆則井田足以合兵農之制三代長久之治率由是道也然師之初六即比之上六也在師則曰否臧凶在比上則曰比之無首凶同此一陰也謹始慮終其嚴也哉小畜乾下巽上履兊下乾上師比之後繼以小畜履巽兑始與乾合長少二女始用事也且師比二卦俱以一陽統五隂小畜履皆以一隂五陽一隂在上則風行天上故為小畜于此可以觀其文焉一陰在下則上天下澤故為履于此可以觀其禮懿文徳即陽剛之中而有運旋者存郁郁乎其美自不可掩陰含其美也辨上下以定民志即陽剛之内而有節制者寓秩秩乎其等自不可踰禮由陰制也可見陰一也在小畜則曰柔得位而上下應之在履則曰柔履剛説而應乎乾彖傳大象雖不同而㑹通于意言之表則剛應柔而其文著柔履剛而其禮嚴非二義也要之陽中有陰剛中有柔特因爻之六三六四異其名義其實文禮同出一原而博文約禮非强合也至于隂在六四而初九則履自道陰在六三而上九則視履考祥善于畜履者盍反而求諸身泰乾下坤上否坤下乾上小畜履之後繼以泰否乾坤自相遇也夫師比畜履不獨一陰一陽其交已並自乾坤至此隂陽各三十畫而泰否分焉皆一定之不亂者是故小往大來則天地交而為泰大往小來則天地不交而為否泰係乎交與不交其實本乎君子小人之消長也但乾坤十變為泰何其難自泰一變即否何其易所以泰雖由君子之道長而九三即示以平陂往復之戒否雖由小人之道長而初六未甞不望以㧞茅連茹之貞以否即泰之反而上九傾否之道即在九三艱貞之時故泰之三必艱貞無咎而後于食有福否之四必有命無咎而後疇離祉此聖人保泰傾否之深意也能傾則先否後喜不保則城復于隍一治一亂其機如此然大象以泰由于君乃以裁成輔相歸之后否由于匪人乃以儉徳避難歸之君子何也使君子之避難者小人也任小人以致否者君也君能左右斯民以保泰則否其永休而君子又何難之可辟哉雖然陰陽不交世道之否也人本天地之心而危微之機否泰之原也于以去欲存理轉否為泰位天地育萬物其責将誰諉哉同人離下乾上大有乾下離上泰否之後繼以同人大有盖泰否陰陽既交而同人大有則以一隂同有于五陽之中焉欲傾否為泰非同人而大有不可也且自泰以前坎之見于各卦者凡六自否以後而離始見也離中之陰虚而眀也一隂居二而上下五陽皆欲同之故曰同人一陰居五而上下五陽皆其所有故曰大有二卦皆以離中一陰為主特因二五而異其象耳但離眀在二窮而在下其道眀也故以類以辯而後可以為于野之亨離眀在五逹而在上其道行也故以遏以掦而後可以順天時之應在同人則曰柔得位得中而應乎乾在大有則曰柔得尊位大中而上下應之觀彖傳之辭亦自有别所以雜卦傳曰大有衆也同人親也此皆卦位之象也以卦徳而推廣之大眀以健得非自明而誠之謂乎剛健而文眀得非自誠而眀之謂乎觀象玩辭皆可意㑹謙艮下坤上豫坤下震上同人大有之後繼以謙豫盖前以一陰而成同人大有此以一陽而成謙豫且于人既同所有既大則謙卑和豫乃其所當然者故一陽静止于坤陰之下則為謙一陽動出于坤陰之上則為豫可見陽一也一動一静而謙豫殊也禮由隂制樂由陽作觀之爻象勞謙萬民服由豫大有得動靜無不宜矣此其故何哉一陽處於坤順之中是以謙則其禮卑豫則其樂和也否則為上六之鳴謙而志未得為初六之鳴豫而志窮凶矣至於大象若各一其㫖然味而玩之惟其裒多益寡稱物平施而物各得其理故作樂崇徳殷薦之上帝以配祖考而神人協其和周子曰萬物得其理而後和此之謂也且裒益平施政之善也殷薦配亨徳之盛也故曰見其禮而知其政聞其樂而知其徳要之謙豫本相須而不離者葢惟謙而能豫則其謙也自然中禮而不涉之於矜持惟豫本於謙則其豫也怡然自得而不流之於怠肆此皆具於卦象之中有實體非寓言也隨震下兑上蠱㢲下艮上謙豫之後繼以隨蠱葢謙豫本艮震與坤合體隨則震下于兌蠱則艮上于㢲但謙而豫則善隨而蠱則有未善也何也常豫則動説過謙則㢲止其相因則有然者觀之卦象長男少女動而説所以成隨隨之徳果善乎惟得乎隨時之道則善矣長女少男㢲而止所以成蠱蠱之徳果善乎惟求其飭蠱之道則善矣是故彖傳重乎隨時而大象嚮晦宴息亦以隨乎時也蠱彖重于飭蠱而大象振民育徳正以飭其蠱也至若動以時者宜正中以孚嘉往有事者貴承徳而用譽爻則又以中為尚也所以易道變通有不可執一言者動而説之時在所當隨隨乎動也茍時當嚮晦宴息則息之于其静矣㢲而止之事既以成蠱蠱以静也茍有事于振民育徳則振之于其動矣况合而言之隨之初九非即蠱之上九乎在初九則官有渝在上九則不事王侯要之皆是也噫道不離乎時與事也惟時時必有事焉則猶善之善者臨兌下坤上觀坤下㢲上隨蠱之後繼以臨觀隨蠱兑㢲交以震艮而臨則兑下于坤觀則㢲上于坤也但隨蠱莫大乎時與事而已矣惟時與事寧有大于政教者哉是故二陽在下則為臨臨之以徳不以位而教思容保凡君子之有一命者皆得而行之也二陽在上則為觀而省方觀民設教非先王之大觀在上可得而行之乎是同此二陽也在上在下而臨觀分也彖于臨則曰剛浸而長長則自下而上如澤上有地其居也一定而不易非在下職守之象乎彖于觀則曰大觀在上如風行地上其行也周徧而無方非在上巡狩之象乎何也風行而澤有定在皆于卦位得之也至于爻中臨曰知臨乃出以臨乎人觀曰觀我生乃入以觀乎已于此融㑹貫通則人已上下有不可執一論者不然在臨則至于八月有凶而觀天之神通四時不忒可見吉凶皆係人之自取也試考之八月有凶豈由臨至遯之謂哉臨觀相反如此為臨十二月建丑是也如此為觀八月建酉是也臨卦二陽在下陽剛浸長至八月則觀卦二陽在上陽又将消陰陽消長之機若循環然觀象玩辭何事于他求也然文王演易正當殷之末世而臨觀相反之卦乃云至于八月則三正不改月也又何疑哉噬嗑震下離上賁離下艮上臨觀之後繼以噬嗑賁盖臨觀二陽四隂自相上下噬嗑賁則離合震艮雖三隂三陽而一陽實間其中矣以義揆之即教飬以先之刑罰以繼之明刑以弼教也夫噬嗑與賁俱以離為主離眀在上則歸之于先王明罰敕法所以定輕重之典而立其章程者非在上不能也離眀在下則歸之于君子眀庶政無敢折獄乃在下位者之常分耳卦辭噬嗑亨利用獄賁亨小利有攸往不亦有明辨乎况離上而震下則明以用其動才本長于治獄離下而艮上則艮以止其眀而文章政事乃其所優為者辭意各有所歸亦因其眀之上下動止為之别也至若九四九三雖同以一陽居卦爻之中然在噬嗑之上卦則為梗故利用獄在賁之下卦則有文故為人文而用獄則貴乎柔曰貞厲無咎文眀則貴乎止曰白賁無咎所以懼人嚴刑繁文之意又自可想也剥坤下艮上復震下坤上噬嗑賁後繼以剥復艮止離上震動離下為噬嗑賁艮止坤上震動坤下則為剥復離之一陰其坤之機乎夫陽一也初九之不逺復即上九之碩果不食者是也特因上下而有剥復之異耳但即其陰陽消長之理故彖于剥復皆曰天行然于剥則曰順而止之于復則曰動而以順行剥以順而止復以順而行君子于陰陽消長之間未嘗一毫不以順也所以剥之厚下固欲以安夫上之陽復之閉闗亦将以飬夫下之陽皆順道也但剥不利往小人長也復利攸往剛長也此則在所當辯也否則剥固小人之道也剥而不已適以自剥其廬矣復固君子之道也頻復不已寜免于迷復之凶乎學易者以此反求諸身觀剥之象可見夫人之真心雖已復萌而羣陰未易以頓消也特陰氣不盡則陽氣不萌不剥則不復而其機間不容髪然一毫隂氣未融不可以為純乾之體惡容已于自强不息之功哉故曰復徳之本也无妄震下乾上大畜乾下艮上剥復之後繼以无妄大畜剥復艮震交以坤无妄大畜艮震交以乾且由剥而復則无妄而大畜矣然震動于天之下動以天也剛中而應大亨以正行天道也艮止于天之上畜以天也剛健篤實光輝日新其徳存天徳也彖傳一則曰天之命一則曰應乎天同一天而震艮殊也惟其行天道也則無一時一物非其所􅌗育雖由中以達外實有以彌綸乎天地惟其存天徳也則無一言一行非其所多識雖由外以飬中而亦可以進退乎古今况无妄之初九即大畜之上九故在初九則无妄往吉在上九則何天之衢亨惟一循乎天所以其動其止莫不吉而亨矣不然何以无妄大畜而猶有事于利貞也如此則无妄之病无妄之災聴之而已矣而童牛之牿豕牙之豶其可以少懈乎頥震下艮上无妄大畜之後繼之以頥不徒震動艮止于乾之上下者至此始合盖自噬賁剥復歴六卦而始歸于一也然由六卦之徳觀之震善于艮大抵震為初分之陽而艮其陽之終乎震艮既合上下二陽中含四隂一動一止有以得乎隂陽動静之宜故天地以之飬萬物聖人以之飬賢及萬民夫人得之以自飬飬人飬徳飬生莫非此道信乎頥之時為大也故曰頥飬正也但頥飬一也朶頥丘頥皆所不宜而拂頥顛頥此凶彼吉飬其大體為大人飬其小體為小人殆有不容以不辯者大象之慎言語節飲食果足以盡其道乎即如序卦傳曰物畜然後可飬茍言語不慎則大畜之多識徒為口耳之贅飲食不節則大畜之不家食適為饕餮之資矣果能于日用之常節之慎之無為靈龜之舍必如虎視之躭則其所以飬賢飬民飬萬物者皆斯人之能事也故中庸曰道不逺人孟子曰道在邇而求諸逺大過㢲下兊上頥之後繼以大過故惟有所飬而後可動動則有過也然觀之卦象頥以艮震成體故上下皆陽中含四陰大過以兑㢲成體故上下皆陰而中含四陽體固不同其實則相對也且夫大過之卦本謂陽剛大過彖傳謂陽過而中㢲而説行是也然而有謂大過者不過于事而過于理也豈知理外無事事外無理當大過之時理宜如此事欲不如此也得乎有謂大過之事如堯舜之揖遜湯武之征伐始足以當之豈知當唐虞之際夏商之末事固有不得不然者自堯舜湯武視之亦皆中庸之道乎又有謂聖人有小過無大過者是又不知時當大過則大過時當小過則小過故孟子謂周公之過不亦宜乎即如獨立不懼遯世無悶自常情視之謂非大過人之行不可也然君子值斯時也剛過而中亦理之必然者耳夫豈希髙慕外務為峻絶之行以駭俗乎噫寧為白茅之藉以過于慎無為滅頂之凶以過于髙非有大過人之識者惡足以語此坎坎下坎上大過之後繼之以坎二陰中含四陽陽剛以大過矣惟坎則陽剛得乎中也陽中則不過矣但坎本陽體乾交乎坤而陽陷于陰之中焉文王獨于坎卦指出心象以開示後人中實而外虚故卦辭曰習坎有孚中陽而外陰故彖傳曰乃以剛中無非發明維心亨之意也是陽雖陷于陰之中維心則超乎險之外至誠可以貫金石蹈水火尚何患難之足驚忠信足以行蠻貊通鬼神曾何顛沛之可懼水固行險不失其信心則遇險適得其平所謂行有尚往有功本此心以行而往也所謂常徳行習教事本此心以常而習也可見心雖寓于形骸之内實非形骸所能囿也善事其心者使一陽為主于内而先立乎其大則其小者不能奪矣否則剛如九二猶曰未出中剛如九五猶曰中未大欲此心常存而不至于陷者胡不由坎象以反觀之哉離離下離上坎後繼之以離坎為陽之中離則陰之中也其實坎離非二陽也陽中之隂隂中之陽即乾坤交而各得乎陰陽之中耳上經首之以乾坤終之以坎離正謂此也然習坎中孚固以其陽實而能施而離畜牝牛得非以其隂虚為能受乎可見離以牝牛配坎坤以牝馬配乾必如此而後謂之利貞亨坤離其一揆矣况隂麗乎陽虚眀畢照吾人眀徳之體本如是也必學有緝熈于光眀而後可以復其眀之體必眀眀徳于天下而後可以滿其眀之量否則以察為眀者遺其内回光反照者遺其外皆非離之明矣觀之彖傳曰重眀麗乎正乃化成天下大象曰明兩作離大人以繼眀照于四方可見眀無内外聖人示人之􅈲極其精詳而爻有取于黄離者此也茍見之不審既蹈乎履錯之咎寜免乎日昃之凶咸艮下兊上恒㢲下震上上經首乾坤天地開萬化之原下經首咸恒夫婦肇人道之始且咸乃天地之交也恒乃天地之久也人不交不久故咸恒人道之統實天地之功也是以咸則柔上剛下而二少之相交乃夫婦之感通也固所以成婚姻之禮恒則剛上柔下而二長之相承乃夫婦之定位也實有以正居室之倫然咸一也彖傳主乎感故云聖人感人心大象主于受乃云君子以虚受人果二乎哉惟其寂而感斯可以大受也惟其虚而受斯可以感通也感以通乎人受以取諸已人已貫通之無間此所以為咸也恒一也彖傳主于變通故云恒久不已大象主于定立乃云立不易方果二乎哉惟其終始變化而不已斯可以常定也惟其方所一定而不易斯可以永終也不易可與立不已可與權經權運用之不窮此所以為恒也且惟咸則恒本相須也君子虚以受人立不易方亦並行而不相悖者玩咸恒者于卦辭彖象㑹而通之斯可以得咸恒之正故二卦皆重利貞皆云天地之情可見惟正則其情之相感為可常也茍為不貞非咸拇則咸輔非浚恒則振恒矣可不慎歟遯艮下乾上大壮乾下震上咸恒之後繼之以遯大壮咸恒艮震之陽與兊㢲之陰相交成卦遯與大壮則艮震之陽與乾陽相上下焉艮之一陽本在乎上而又有三陽在上可謂盛矣然二陰浸長于下夫固不容以不遯也震之一陽本在乎下而亦有三陽處其下陽若與遯同矣四陽並進于下此所以為大壮焉可見陽以下為進以上為退震則動之始艮則止之機四陽雖同而上下之間進退異矣然觀之彖辭遯小利貞小者利于貞也勉二陰也大壮利貞大者利于貞也指四陽也得無有不同乎不知陰進以正則小人不至凌君子陽進以正則君子自能勝小人皆所以扶陽也雖然係遯用壮又君子所當辨者是故遯有取于九五之嘉遯上九之肥遯而遯則去之為當逺壮有取于九二之貞吉九四之貞吉而壮則剛宜濟之以柔也至于大象遯謂逺小人不惡而嚴其處人有以得逺惡之道大壮謂非禮弗履其處已也有以端去惡之原如此則時乎遯也時乎大壮也莫不盡善矣晉坤下離上明夷離下坤上遯大壮之後繼以晉明夷艮震與乾相為上下固有進退之義離明于坤時有出入斯有明晦之分而大壮則晉遯則明夷亦其機之相因而馴至者是故日之明一也出于地上則為晉大眀在上固亦獲乎晝接之榮入于地中則為明夷真眀在下必有事于艱貞之利况爻辭于晉之六五猶曰失得勿恤于眀夷之六二猶曰用拯馬壮其兢業之意可以一時而或懈乎然同一晉也以之承眀君則為晝接以之修眀徳則為自昭同一眀夷也以之蒙難則晦其明以之蒞衆則晦而明道何若此其殊也變動不居易之道也要之日有出入眀無加損地中所以用其晦地上所以昭其明雖有晝夜之象而實有常眀者在也然則眀之在人心也或用錫也或蒙難也不以常變而有改或涖衆也或自昭也不以體用而少偏所以繋辭曰通乎晝夜之道而知故神無方而易無體家人離下㢲上暌兑下離上晉明夷之後繼以家人暌離坤上下而晉與明夷異矣然離下㢲則為家人離上于兊則為暌晉則相親夷則相暌亦其義也但離一也下于㢲而為家人者長女中女咸得位而利乎貞上于兊而為暌者中女少女雖同居而志不同行矣何也家人離之陰在二㢲之陰在四女正也暌則兊陰在三離隂在五女不正矣女正則家正女不正則家暌也然觀之爻辭家人有正家之道而處家尚乎嚴雖嗃嗃未失也暌有合暌之道而處暌貴乎遇雖巷遇未失也然家固當正矣彖謂正家而天下定象謂言有物而行有恒者豈二道哉治天下觀于家治家觀于身端本善則固如此也所以上九威如之吉反身之謂也暌固當合矣彖謂男女暌而其志通象謂君子以同而異者豈二道哉志同不害其迹之異辨異斯能統乎物之同理一分殊固如此也所以上九遇雨之吉羣疑亡也知此則知二卦之利貞者雖同歸于道實各有所重也故闗朗子曰明乎外者物自暌明乎内者家自齊蹇艮下坎上解坎下震上家人暌後繼以蹇解家人暌二卦成以離蹇解皆以坎而成體也惟家人至于暌是以有蹇之當解矣然坎上于艮則止乎險中而為蹇坎下于震則動而出乎險中故為解雖在險出險不同其利西南一也何也坎以一陽居乎坤中坤屬西南坎艮震則皆属于東北也故蹇以五為得中解以二為得中况蹇雖遇險而止解雖遇險而動而其利西南者則一耳所以皆云往有功也否則終于蹇而莫之解矣可見二卦皆以坎陽得中為主既有五之剛中主于外矣而九三之陽非時止則止乎既有二之剛中主于内矣而九四之陽非時行則行乎蹇解皆吉者此也至若彖謂見險知止象謂反身修徳蹇皆求諸已彖謂往得衆象謂赦過宥罪解皆及乎人豈君子故為是以處蹇解之時乎蹇解原同一體解即解乎蹇而蹇即其所未解者也是故君子惟有解而大蹇朋來何往不利損兊下艮上益震下㢲上蹇解之後繼以損益蹇解本一艮一震與坎成體損益則艮兊震㢲相合而成而損益即咸恒之反也然損下益上則謂之損由咸既變盡而艮上兊下陽變而為陰也損上益下則謂之益由恒既變盡而㢲上震下陰變而為陽也非有意以損益之也有餘則損所當損不足則益所當益况損卦不損二與初而損三益卦不益三與二而益初正所以損其盈而益其本也向使隂陽適宜則無所用其損益矣故彖傳皆曰與時偕行况損下以益上在君子則為自損損上以益下在君子則為自益然則二卦雖有損益之分其實損所當損即益所當益特以上下殊其名義耳觀之爻辭益之六二即損之六五以柔居剛則曰元吉以柔居柔則曰永貞吉即此便可以窺損益之大㫖也至于大象懲忿窒慾是損其不善以歸于善而益固寓于損之中然遷善改過則善之益也何甞不損其過哉如是則以之修己即為克己復禮以之治人即為節用愛人是道也不可須㬰離也夬乾下兊上姤㢲下乾上損益之後繼以夬姤損益皆所以損兊㢲也此則兊上于乾而為夬㢲下于乾而為姤夬也者以五陽决一陰也姤也者以一陰遇五陽也陰陽消息循環無端一陰方决于上一陰已寓于下然則姤之初六即夬之上六也眀矣但陰陽消息固其自然之理聖人見五陽决一隂若此其易然必曰揚于王庭孚號有厲于上六則曰無號終有凶見一陰上遇五陽若是其微然必曰女壮勿用取女于初六即曰係于金柅所以申戒五陽毋輕視一陰之意何深哉但决之貴和而壮于頄則凶遇之貴豫而姤其角則吝矣然亦不可謂陰宜盡無而執一以論之也觀大象一陰上于乾則為澤上于天夬一陰下于乾則為天下有風姤施禄者果如澤之决于上而天禄之與共施命者果如風之遇于下而文命之誕敷用之得宜陰亦何可廢也噫施禄施命所以能施者皆有賴于乾剛也故于夬則曰剛决柔曰剛長乃終于姤則曰柔遇剛曰剛遇中正聖人之重陽也如是夫萃坤下兊上升㢲下坤上夬姤之後繼以萃升夬姤二卦兊㢲與乾合體萃升兊㢲與坤合體聖人于五陽一陰且儆戒極其諄切而與坤合體則四隂二陽聖人得無意哉觀卦辭一則曰利見大人一則曰用見大人彖傳則皆曰剛中而應夫萃之剛中本在乎上而為衆所萃升之剛中則在乎下而勢亦必升故萃以五為大人升以二為大人大人在上而衆心樂聚故曰利見大人在下而上進則非柔君所欲乃曰用見而勿恤焉可見剛中之大人一也特因在上在下而有利見用見之分要皆聖人重陽之微意也豈有意以重之哉己在上者固有快覩之願而在下方進未艾則勢亦不容不屈己以枉見也至于大象簡兵以萃衆積小以升徳若此其不同矣然體用一致惟有順徳者斯可以萃乎衆也否則九五之萃有位者猶曰志未光而初九之允升者即曰上合志矣然則萃以正而升以時孰有外于徳哉困坎下兊上井㢲下坎上萃升之後繼以困井盖萃升二卦兊㢲與坤相為上下困井則兊㢲與坎相上下焉萃而升于上者勢必反于下而困入乎井中矣然坎一也澤本無源而坎在其下適以涸其澤矣安得而不困㢲本能入而坎在其上則愈入而愈深焉非井而何此兑澤之無水而困者兑不宜上于坎也㢲木之有水而井者㢲能處乎坎之下也本同一體而困與井之分特在上下間耳况澤雖無水為能困而不失其所則有亨之道焉井飬固不窮茍羸其瓶則凶矣觀象于困井者果能動悔有悔而元吉大成之學可造也何也澤無水而困也命也井有水而無得䘮者性也致命遂志既以立命于己勞民勸相且以盡性于人而困井之象皆有資于學矣所以繋辭曰困徳之辨也井徳之地也何徃而非性之教哉革離下兊上鼎㢲下離上困井之後繼以革鼎困井兊㢲與坎合體革鼎則兊㢲與離合盖既以困而入于井矣則不得不革而鼎新之也夫離下于兑為革澤火本相息而革當其時離上于㢲為鼎木火本相資而鼎有實用所以雜卦傳曰革去故也鼎取新也惟革而當乎巳日之時則順天應人可以革其命矣惟鼎而烹乎雉膏之食則上帝聖賢皆賴之以飬也革鼎之義亦何大哉况革也者變革之靡定鼎也者一定而不移未革之先固宜于孚信而虎變豹變之攸宜定鼎之後莫要于安凝而金鉉玉鉉之各正否則知變而不知守則鼎足折而公餗覆莫若鞏用黄牛之革之為愈矣是故觀革之象則以治厯明時惟時斯可革也觀鼎之象則以正位凝命在徳不在鼎也時與命實相須也順天時以凝鼎命非天下之至徳其孰能之艮艮下艮上震震下震上革鼎之後繼以艮震革有動義鼎有止義革鼎由離合㢲兊皆隂而震艮則皆陽也一索而得震三索而得艮孰非乾之陽乎但陽一也在下則動在上則止如此則動如此則止特在一反一覆焉耳震得其初故動而為雷艮得其三故止而為山雷惟動也雖二隂在其上而其氣則必逹夫天山惟止也雖二陰處其下而其形則終峙于地此乃一陽自然上下于天地間者是故君子于震來虩虩若與之而俱動矣然後笑言啞啞震驚百里不䘮匕鬯何甞一于動而莫之静乎于艮止其所若與之而俱止矣果能時止則止時行則行動静不失其機何甞一于止而莫之動乎所以恐懼修省思不出位非二致也何也知所恐懼則必思其所以修省之道思不出位則時時自修自省而無䘮有事矣如是而在震之初則恐致福而後有則在艮之上則敦艮以後終卦象殊而學則一矣否則陽一也在四則震遂泥在三則艮其限學者欲慎動而知止則可不早辨哉漸艮下㢲上歸妹兊下震上震艮之後繼以漸歸妹震艮二卦自相反而漸則艮下于㢲歸妹則震上于兊也艮下于㢲三以陽居陽四以陰居隂陰陽各得其正故卦辭漸女歸吉利貞彖傳亦謂進得位剛得中也震上于兊三以陰居陽四以陽居隂陰陽俱不得位故卦辭歸妹貞凶無攸利彖傳亦謂位不當柔乗剛也可見三四反覆之間而二卦之吉凶係之矣且止而㢲者進以止也説以動者合以説也所以易有取于漸而深戒夫歸妹者無非定陰陽之大義也至于大象山上有木則居得其正故君子以居賢徳善俗能正乎已者且以正乎人而風俗為之轉移澤上有雷則相感以情故君子以永終知敝不善其始者必不善其終而倫紀為之攸斁士君子立身必為漸女無以歸妹待其身焉可也嗟夫止而㢲動不窮也㢲而止則蠱矣説以動所歸妹也動以説則隨矣反覆毫釐之際辨之不可不審豐離下震上旅艮下離上漸歸妹之後繼以豐旅漸歸妹由艮震與㢲兊合而豐旅乃艮震與離合也至此則震艮與三隂交合為已徧矣然離一也震而上夫離則動而明故為豐豐有富盛之象矣所以云豐亨王假之尚大也艮而下夫離則眀而止故為旅旅乃窮困之象也所以云旅小亨瑣瑣窮災而已矣豈豐之大而旅之小乎離明上下有動則大止則小之義人之或豐或旅亦若上經之泰否也但豐不可以自恃旅亦不可以自困也茍不宜日中之照則豐蔀豐斾見斗見沬雖屋翔于天際而閴然無人良可憂也茍得夫柔中之道即次懐資則終以譽命而旅貞吉矣至若大象于豐則有取乎在天之雷電而折獄致刑固凛乎肅殺之義于旅則有取于在地之山火而明慎不留又藹乎寛恤之仁離明動止顧人用之何如耳㢲㢲下㢲上兊兊下兊上豐旅之後繼以㢲兊盖豐旅由離之中隂與震艮合體㢲則一隂在下兊則一隂在上自相反也然初與四為㢲之主㢲本以陰在下為能㢲也彖傳乃謂剛㢲乎中正而志行柔皆順乎剛三與上為兊之主兊本以隂在乎上為能説也彖傳則謂剛中而柔外説以利貞可見㢲者順也陰能順乎二五之剛中故利往而進退利武人之貞良有以也否則不免㢲在牀下之凶矣兊者説也説夫二五之剛中故利貞然商兊未寧介疾有喜猶有取焉否則不免來兊之凶矣卦雖陰柔實以陽剛為尚若徒知一陰在下為㢲之體一陰在上為兊之體不知所㢲所説之實豈聖人設象命辭之意哉至大象㢲風則有取于申命行事兊澤則有取于朋友講習是行義則㢲以順民而政事為日敷隐居則説以取友而問學為日廣此猶㢲兊之最大者也善用陰柔者又當以時措之渙坎下㢲上節兊下坎上㢲兑之後繼以渙節㢲兊一陰自相反而渙節則㢲兊與坎相上下盖一于㢲説則必至于渙而在所當節矣㢲上于坎為渙兊下于坎為節雖卦辭曰渙亨曰節亨而渙則當聚節亦不可過也何也二卦之相反在渙為六四爻辭乃曰渙其羣元吉在節為六三爻辭乃曰不節若則嗟若是渙固當渙節亦當節此所以亨也然渙彖則曰王假有廟王乃在中也謂非渙之當聚乎節彖則曰苦節不可貞其道窮也謂非節之不可過乎要之天下之道中正而已矣所以渙九五渙汗其大號渙王居無咎象曰正位也節九五甘節吉往有尚象曰居位中也惟本之以中正當渙則渙而既渙則不可不聚當節則節而過節則苦矣至于大象享帝立廟而天親之允協制數度議徳行而人已之皆宜此乃舉渙節之尤要者言之必如此而後永協于中正也且渙則節節則渙其相須之義惡可以説辭盡之哉中孚兊下㢲上渙節之後繼以中孚渙節兊㢲交以坎中孚則兊㢲自相交而或渙或節之偏不得不孚之以中也然㢲本以一陰在下成體兊本以一陰在上成體㢲上兊下則二陰在中四陽在外故為中虚然以二體分之二五陽得中又為中實且下説以應上上㢲以入下皆相孚之象也即如澤上有風豚魚澤物風性木舟順風涉水鶴鳴在陰子和其中孚之象可謂明矣然彖傳曰中孚以利貞乃應乎天也何也中孚者誠也誠者天之道也中孚純乎其天不容以一毫人力㕘也觀風之動水豚魚之信風虚舟之渉險鶴鳴而子和孰非天道之自然而然哉此中孚所以為正也然則知應天斯可以知利貞矣知利貞斯可以言中孚矣初九虞吉乃教人無改初念不可不反已虞度以純乎天也噫以無妄中孚猶曰利貞聖學豈易言哉若大象所謂議獄緩死則猶不忍人之心發之最親切者所謂乍見孺子入井皆有怵惕惻隐之心而無納交要譽即中孚應天之謂也發于孺子入井用于議獄緩死其中孚一而已矣小過艮下震上中孚之後繼以小過中孚之體以兊㢲二隂在中而成小過則以震艮二陽在中而四隂過乎陽也且咸恒由艮兊震㢲陰陽互交中孚小過則陰陽各以類從矣自卦體觀之震之一陽本在乎下艮之一陽本在乎上兹震上艮下則二陽在内四陰在外陽大陰小所以為小過也然既云小過亨矣又云可小事不可大事何歟柔得中是以小事吉也剛失位而不中是以不可大事也行過恭䘮過哀用過儉皆吉道也故君子以之然彖傳云過以利貞與時行也時則正不時則不正即如三者之過亦時乎可過而過之耳茍非其時而必欲過焉豈君子之道哉雖然事須小也道無往而不在道雖大也事無微而可忽是道本與時而偕行君子亦隨時以處事此君子之學也時之當然即道之本然君子之應事也其庸以不然哉過與不過未可豫定必如彖之與時行也小過大過莫非道矣既濟離下坎上未濟坎下離上小過之後繼之以既濟未濟即上經大過繼之以坎離盖既未濟以坎離成體皆以救其陰陽之過也况自小過以前陰陽錯綜惟坎離得陰陽之中故上經首乾坤終坎離而坎離至此始交故下經以既未終焉雖曰坎離陰陽得自相為對其實乾坤之後屯始以坎此亦終之以坎卦名既濟未濟亦因坎取義盖天地間險難最多非剛中未易以濟殆有深意存也至若以一卦言之三陽得位則既濟三陽失位則未濟以二體言之水上火下則既濟火上水下則未濟此其隂陽消息循環無端天道人事終則有始所以大象于既濟則勉人思患豫防未濟則勉人慎辨物居方而居方之慎是即豫防之思觀六爻寜曳輪濡尾於其初無濡首于其終既未濟其詞同其意同也嗚呼豈獨世道為然哉推之萬古治亂相為倚伏反之一念理欲相為勝負與治同道罔不興與亂同道罔不亡惟狂克念作聖惟聖罔念作狂既濟未濟判于㡬微之際也盡人承天易之道待其人而後行易道不過一陰一陽雖曰太極生兩儀兩儀即隂陽也兩儀生四象四象即陰陽之老少也四象生八卦八卦即隂陽之生生也八卦重而為六十四卦六十四卦即隂陽之生生不窮也是圗也一體不變者八一陽五隂一隂五陽反對者各六二陽四隂二隂四陽反對者各十二而三隂三陽反對各十自卦象觀之雖有變與不變之殊相對相反之别不過隂陽竒耦升降錯綜而已天地自然之造化固如此圗象之布列非有意以安排也人惟即其象之可見以求其不可見則形上形下一以貫之而隂陽生生不測者流通充滿觸處皆然矣六十四卦八卦之重也天四卦各重八卦乾八卦為太陽兊八卦為少隂離八卦為少陽震八卦為太陰地四卦各重八卦坤八卦為太陰艮八卦為少陽坎八卦為少陰㢲八卦為太陽八卦各變天地陰陽太少變者七不變者一天太陽八卦不變者乾少陰八卦不變者中孚少陽八卦不變者離太陰八卦不變者頥地太隂八卦不變者坤少陽不變者小過少陰八卦不變者坎太陽八卦不變者大過天地陰陽太少各一卦不變八宫各變七卦通計五十六卦乾坤易之門户與乾坤毀則無以見易是故卦有陰陽一畫為陽乾之道也以其直而施也曰闢一畫為陰坤之道也以其翕而受也曰闔一闢一闔道之變也卦有内外初變上二變五三變四自内而外曰往四變三五變二上變初自外而内曰來一往一來道之通也闔闢往來之交曰㡬同條共貫曰理不知易非能知㡬不知㡬非能知理學不見理而曰我能通變也者妄也繋辭傳曰易之為道也屢遷變動不拘周流六虚上下無常剛柔相易不可為典要唯變所適闔闢往來之謂也八卦不變圗例卦凡八宫宫凡八卦變者七卦不變者一卦凡八卦不變以統五十六卦之變天太陽其變天太陽故乾之乾乾不變地太陰故坤之坤坤不變天少隂其變地太陽故兊之㢲中孚不變地太陽其變天少隂故㢲之兊大過不變天少陽其變天少陽故離之離離不變地少隂其變地少隂故坎之坎坎不變天少隂其變地少陽故艮之震頥不變地少陽其變天太陰故震之艮小過不變八卦變例重乾天太陽之極而地太隂生焉乾不變其變也坤重坤地太隂之極而天太陽生焉坤不變其變也乾中孚天少陰之極而地少陽生焉中孚不變其變也小過小過地少陽之極而天少隂生焉小過不變其變也中孚重離天少陽之極而地少陰生焉離不變其變也坎重坎地少陰之極而天少陽生焉坎不變其變也離頥天太陰之極而地太陽生焉頥不變其變也大過大過地太陽之極而天太隂生焉大過不變其變也頥五十六卦以八卦變例為率一闔一闢一往一來凡為天太陽之卦者七其變皆天太陽地太陰之卦者七其變皆地太隂天少陰之卦者七其變皆地太陽地太陽之卦者七其變皆天少隂天少陽之卦者七其變皆天少陽地少隂之卦者七其變皆地少隂天太隂之卦者七其變皆地少陽地少陽之卦者七其變皆天太隂乾坤坎離中孚小過頥大過八卦自相為變陰變陽陽變陰一闔一闢之謂也八卦變五十六卦陽變陽隂變隂往來不窮之謂也八卦雖以陰陽相變為闔闢然初變上二變五三變四四變三五變二上變初一往一來通在其中也五十六卦雖以陰陽自變為往來然初三五為陽二四上為陰一闔一闢變在其中也化而裁之推而行之範圍天地之化而不過曲成萬物而不遺其惟文王乎闔户謂之坤闢户謂之乾乾變坤坤變乾一闔一闢之謂也坎離中孚小過頥大過六卦一畫為乾一畫為坤以卦畫陰陽為闔闢也屯蒙以下五十六卦初三五陽位為乾二四上隂位為坤以卦位陰陽為闔闢也是故乾坤者易之門户也一闔一闢一往一來而易之時義備矣乾順進一得姤姤乾之一世自姤進二得遯遯乾之二世自遯進四得否否乾之三世自否進八得觀觀乾之四世自觀進十六而得剥剥乾之五世也上爻不變故三十二數不用彼三十隂三十二陽皆六十四卦上爻耳卦有遊魂歸魂亦以八與十六為法乾遊魂自剥退八而得晉歸魂自乾進十六而得大有此自然之理也坤逆進亦以此凖焉震退一得豫自豫進二得解自解進四得恒退八得升自升進十六得井而五世備遊魂則自井進八而得大過歸魂則自本卦進十六而得隨焉坎右進一節退二屯自屯進四既濟進八革自革退十六得豐而五世備矣遊魂則自豐退八而得明夷歸魂則自本卦退十六而得師焉離亦如之艮右退一賁自賁退二大畜退四損自暌退十六履而五世備遊魂則自履進八而得中孚歸魂則自本卦退十六得漸兊亦如之八卦相推何也天與地雷與風水與火山與澤彼此相推之謂也觀乾為天則天為主矣天風姤天山遯天地否皆天在上也然天地既合之後則風地觀山地剥火地晉而地之在下者亦極焉是以天為主而三世之後則以地承天使不反本還原而歸之天也可乎况一世為天風姤四世乃為風地觀二世為天山遯五世乃為山地剥彼此相推猶不相離至火地晉則愈推而愈逺矣所以為遊魂也然火天大有卒由火以合乎天而謂之歸魂不以此哉觀乾之一卦八卦可類通也然始而相承既而相逺終而相合者何以言之變化不測生生不息之謂也乾純陽也姤則一隂遯則二隂觀則四隂剥則五隂而晉則一隂麗于二陽之中非遊魂而何且火尚與地相合至火與天合則四陽矣此魂之所以歸也以此觀坤坤猶乾也震坎艮主乎陽㢲離兊主乎隂隂陽變化不測而易之生生可窺矣邵子曰乾四十八而四分之一分為所尅之隂也盖乾至泰乾夬大有大壮小畜需大畜泰凡八卦共四十八爻分作四分每分十二及其三分三十六陽爻其一分十二隂爻也又曰坤四十八而四分之一分為所尅之陽也盖自坤至否坤剥比觀豫晉萃否凡八卦共四十八爻分作四分毎分十二爻其三分三十六隂爻其一分十二陽爻也即二卦而餘卦可類通矣是圗也八卦之上各加八卦而成六十四卦即前之横圗是也但乾一兊二離三震四巽五坎六艮七坤八卦之與數豈安排而强合之哉一為乾固于本卦一位上之見二為兊即于本卦二位上見之三為離四為震五為巽六為坎七為艮八為坤莫不然也况即乾之一宫其八卦次序固依一二三四五六七八整然不亂而各宫皆然可見六十四卦聖人無一毫増損于其間矣八卦成列象爻變動圖傳曰八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繋辭焉而命之動在其中矣吉凶悔吝生乎動者也此發明先天六十四卦方圗之義八卦成列者乾兊離震㢲坎艮坤成行列也此自上而數向下自左而數向右若自中而數向外則震離兊乾㢲坎艮坤亦成列也以至横斜曲直左右前後莫不皆然而天地水火雷風山澤之象在其中矣因而重之者八卦之上各加八卦分隂分陽迭用柔剛而初二三四五上之六爻在其中矣剛柔相推者剛生于復之初九自一而二三四五以次推上而至于乾之六柔生于姤之初六自一而二三四五以次推下而至于坤之六則卦爻之變在其中矣聖人因卦爻之變繋之以吉㓙悔吝之辭則舉天下之動在其中矣傳曰剛柔者立本者也變通者趨時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也右傳盖發明後天六十四卦變通之義剛柔者變通之本體變通者剛柔之時用以圗推之乾剛坤柔位乎上下乃不易之定體故曰剛柔者立本者也坤初爻柔變而趨于剛為復為臨為泰為大壮為夬進之極而為乾自冬而夏也乾初爻剛化而趋于柔為姤為遯為否為觀為剥退之極而為坤自夏而冬也故曰變通者趨時者也故夫乾坤以初爻變而一隂一陽之卦各六皆自復姤而推之二爻變而二隂二陽之卦各十有五皆自臨遯而推之三爻變而三隂三陽之卦各二十皆自泰否而推之四爻變而四隂四陽之卦各十有五皆自大壮觀而推之五爻變而五隂五陽之卦各六皆自夬剥而推之縱横上下反復相推無所不可在識其通變則無所拘泥而無不通傳所謂變通不拘周流六虚上下無常剛柔相易不可為典要唯變所適然陽主進自復而左升隂主退自姤而右降泰否則隂陽中分自寅至申皆晝也而乾實冐之自酉至丑皆夜也而坤實承之故上繋言變化者進退之象剛柔者晝夜之象也或剛或柔有失有得而吉凶之理常相勝也乾上坤下定體不易天地之道貞觀者也離南坎北日麗乎晝月顯乎夜日月之道貞明者也天下之動其變無窮順理則吉逆理則凶則其所正而常者有恒以一之是亦一理而已矣按朱子謂參同契以乾坤為鼎器坎離為藥物餘六十卦為火候今以此圗推之盖以人身形合之天地隂陽者也乾為首而居上坤為腹而居下離為心坎為腎心火也腎水也故離上而坎下陽起于復自左而升由人之督脉陽脉也起自尻循脊背而上走于首隂起于姤自右而降由人之任脉隂脉也至自咽循膺胸而下起于腹也上二十卦法天天者陽之輕清故皆四陽五陽之卦下二十卦法地地者陰之重濁故皆四隂五陰之卦中二十卦象人人者天地之徳隂陽之交故皆三隂三陽之卦亦如人之經脉手足各有三隂三陽也又人上部法天中部法人下部法地亦其義也由是言之則參同之義不誣矣若夫恒卦居中則書所謂若有恒性傳所謂恒以一徳孟子所謂恒心而恒之彖曰日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恒而天地萬物之情可見矣乾起于西北者天傾西北之義乾既位西北則坤當位東南以地不滿東南故㢲長女代居其位㢲亦先天兊之反也是以坤退居西南三爻皆變而之乾乾三爻皆變而之坤互相反對而乾坤之位縱矣離火炎上而居南坎水潤下而居北坎三爻皆變而之離離三爻皆變而之坎亦互相反對而坎離之位縱矣艮反先天震而位乎東北㢲反先天兊而位乎東南艮三爻皆變而之兊反而觀之則為㢲㢲三爻皆變而之震反而觀之則為艮亦互相反對而艮㢲之位縱矣電激而雷故震居正東先天離位離火炎上故以上爻亦震三爻皆變而之艮反而觀之則為震故震兊左右相反對而其位横矣邵子曰震兊横而六卦縱易之用也至哉言乎惟其如此故今時所傳卜筮宫卦亦乾坤相反坎離相反震兊相反艮㢲相反乾宫之姤自坤而反觀之則為夬乾之遯反坤之大壮乾之否反坤之泰乾之觀反坤之臨乾之剥反坤之復也坎宫之節自離而反觀之則為渙坎之屯反離之蒙坎之既濟反離之未濟坎之革反離之鼎坎之豐反離之旅也艮宫之賁自㢲而反觀之則為噬嗑艮之大畜反㢲之无妄艮之損反㢲之益艮之暌反㢲之家人艮之履反㢲之小畜也震宫之豫自兊而反觀之則為謙震之解反兊之蹇震之恒反兊之咸震之升反兊之萃震之井反兊之困也其遊魂歸魂二卦謂其不在八宫正變之列以本宫第五爻變而得外體之内三爻皆變則為遊魂曰遊者自内而之外也第五爻變而内三爻不變則為歸魂曰歸者自外而反内也周旋左右升降上下王者之禮法盡于是矣此圗以先天圗一仰一覆下體八卦静而守位上體八卦動而右轉由是剛柔相摩八卦相盪一貞而入悔八八六十四卦左右相交震宫八卦交于坤起于復次震次噬嗑次隨次无妄益屯至頥而得貞悔反對之象震下艮上二象反對離宫八卦離交于艮起于賁次明夷次豐次離革同人家人至既濟而得隂陽交中之卦離下坎上三陽三隂晝夜平分兊宫八卦兊交于坎起于節次損次臨次歸妹暌兊履至中孚而得貞悔反對之象兊下㢲上二象相對乾宫八卦乾交于㢲起于小畜次需次大畜次泰大有大壮夬至乾而得六陽純體之卦極焉此圗之左方也㢲宫八卦交于乾起于姤次㢲次井次蠱升恒鼎至大過而得貞悔反對之象㢲下兌上二象反對坎宫八卦坎交于兊起于困次訟次渙次坎蒙師解至未濟而得剛柔中分之卦坎下離上三剛三柔晝夜平分艮宫八卦艮交于離起于旅次咸次遯次漸蹇艮謙至小過而得貞悔反對之象艮下震上二象反對坤宫八卦坤交于震起于豫次晉次萃否觀比剥至坤而得六隂純體之卦周焉此圗之右方也環而觀之則乾坤泰否坎離既未濟隨蠱漸歸妹頥大過中孚小過凡一十六卦交易反對三位相間累累若貫珠若網在綱有條而不紊察其自然之妙非人力之所能為也是故以一嵗之節論之震始交坤一陽生冬至之卦變坤為復是以乾起于復之初九而盡于午中㢲始消乾一隂生夏至之卦變乾為姤是以坤起于姤之初六盡于子中乾坤定上下之位冬至變坤隂多多寒晝極短而夜極長夏至變乾陽多多熱晝極長而夜極短冬夏二至陰陽合也乾坤交中而為坎離坎離交而為既未濟既未交南北兩間之中春分變既濟而為節是以坎起于節之九二而盡于酉中秋分變未濟而為旅是以離起于旅之六二而盡于卯中三陽三陰温凉適宜晝夜平等春秋二分隂陽離也立春變頥為賁頥卦二陽外而四陰内立夏變中孚而為小畜中孚四陽外而二隂内此春夏陽在外而陰在内聖人春夏飬陽之時立秋變大過而為困大過二陰外而四陽内立冬變小過而為豫小過四隂外而二陽内此秋冬陽在内而隂在外聖人秋冬飬隂之時是則一嵗周天之節備于圗而邵子所謂春夏秋冬晝夜長短由乎此者也又以一月之度推之則重坤之時乃晦朔之間以次而生明小過之震反對二震三日昏時出庚之西也大過之兌反對二兊八日上弦在丁之南也至十五則乾體就望而盛滿出于東方甲地以漸而生魄中孚之㢲反對二㢲十八日平眀見辛之西也頥卦之艮反對二艮二十三日下弦直丙之南也此一月太陰之行度備于圗而邵子所謂晦朔望行度盈縮由乎此者也至若艮東北之卦萬物之所成終所成始故冬至之卦盡于艮山雷頥卦而立春之節起于艮山火賁卦自然之數也故曰易與天地凖邵子曰圗雖無文吾終日言而未甞離乎是盖天地萬物之理盡在其中矣朱子曰先天圗今以一嵗之運言之若大而古今十二萬九千六百年亦只這圈子小而一日十二時亦只這圈子都從復上推起去圗書編卷三
