body:
  text: 圖書編卷七十三明章潢撰人身同天地叙七尺之軀何可與天地論小大百年之身何可與天地論修短况此身特軀殻耳于此身之骨骸臟腑經絡血脈縱能精究而深研之不過醫之小道也何必一一凖諸天地哉吁此皆自小其身者也惟自小其身故經營七尺之内與螻蟻同嗜欲醉夢百年之間與蜉蝣共旦暮可哀孰甚也不知天地非大人身非小也萬古非長百年非短也所以上下同流者自有在也盖隂陽五行在天地人一也觀一歲十二月一日十二時人身之呼吸與天地通者果何物乎孟子謂夭夀不貳修身以俟之所以立命也自此身之外更何命可立何心性可存而養也彼世之愚不肖者無論已間有賢哲之士計其生平慮非不周知非不溥言非不詳行非不鋭日夕殫精耗神遊魂夢景獨於此身漫不加之意焉其於本末内外輕重緩急且莫之辦又安望其贊化育參天地浩然塞兩間炯然照百代哉試覽此編人身與天地相同果强合之抑亦造化自然也懲七年之病者必求三年之艾當勿忽於此矣經十二絡十五凡二十七氣血相貫無有休息故一歲隂陽升降㑹于立春一日隂陽曉昏㑹于寅時榮衞循環上應天之度數下應地之分野天有宿度地有經水人有經脈宿謂二十八宿度謂天之三百六十五度也經水者謂海水清水渭水湖水沔水江水淮漯水河水漳水濟水也以其内外經脈故名之曰經水焉經脈者謂手足三隂三陽之脈所以然者以内外參合人氣應之故言及也内足陽明外合海水内足大腸外合清水内足少隂外合汝水内手陽明外合江水内手太陽外合淮水内手少陽外合漯水内手太隂外合河水内手心主外合漳水内手少隂外合濟水内外輸應氣衞于外以充皮膚血榮于中以營經絡周一體而無間應漏水百刻而不違一日一夜一萬三千五百息乃平人之常也察於隂陽决死生雖經絡流注如環之無端豈能逃于脈之三部耶至於草木昆蟲盡皆得氣之先所以雖乾枯陳朽亦可以調臟腑而治疾病其氣同也觀人身氣血與天地氣候相應若此則人與天地萬物本同一體不信然哉足三隂三陽膽申相火足少陽胃酉燥金足陽明膀胱戍寒水足太陽肝亥風木足厥隂腎子君火足少隂脾丑濕土足太隂足太陽與少隂為表裏少陽與厥隂為表裏陽明與太隂為表裏是為足之隂陽也手太陽與少隂為表裏少陽與心為表裏陽明與太隂為表裏是為手之隂陽也帝曰願聞三隂三陽之離合各為一位謂之離配為表裏謂之合岐伯曰聖人南面而立前曰廣明後曰大衝此正位也心臟在南故前曰廣明衝脈在北故後曰大衝大衝之地名曰少隂少隂之上名曰太陽此為一合之經氣也後倣此太陽根起於至隂結於命門名曰隂中之陽至隂穴名命門目也中身而上名曰廣明廣明之下名曰太隂太隂之前名曰陽明胃為陽明脈行在脾脈之前脾為太隂脈行在胃脈之後陽明根起於厲兊名曰隂申之陽厲兊穴名厥隂之表名曰少陽膽少陽脈行在肝脈之外肝厥隂脈行在膽脈之内少陽根起於竅隂名曰隂中之少陽竅隂穴名是以三陽之離合也太陽為開陽明為闔少陽為樞開者所以司化生之基闔者所以執禁固之權樞者所以主動靜之微三經者不得相失也搏而勿浮名曰一陽滑云一齊一也脈浮而不至於虚所以摶者胃氣也故曰一陽願聞三隂岐伯曰外者為陽内者為隂然則中為隂其衝在下名曰太隂太隂根起於隱白名曰隂中之隂隱白穴名太隂之後名曰少隂脾藏之下近後則腎之位也少隂根起於湧泉名曰隂中之少隂湧泉穴名少隂之前名曰厥隂腎藏之前近上則肝之位也厥隂根起於大敦名曰隂中之絶隂大敦穴名是故三者之離合也太隂為開厥隂為闔少隂為樞三經者不得相失也搏而勿沈名曰一隂滑云脈沈而不至於溺所以搏者胃氣也故曰一隂黃帝曰隂陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也治病必求其本隂陽與萬類生殺變化猶然在人身同相參合故治病之道必先求之故積陽為天積隂為地隂靜陽燥陽生隂長陽殺隂藏神農曰天以陽生隂長地以陽殺隂藏陽化氣隂成形天地者萬物之上下也隂陽者血氣之男女也左右者隂陽之道路也水火者隂陽之徴兆也隂陽者萬物之能始也故曰隂在内陽之守也陽在外隂之使也隂靜故為陽之鎮守陽動故為隂之役使清陽為天濁隂為地地氣上為雲天氣下為雨雨出地氣雲出天氣故清陽出上竅濁隂出下竅上竅謂耳目口鼻下竅謂前阥後阥也清陽發腠理濁隂走五藏此有質者也清陽實四肢濁隂歸六府水為隂火為陽陽為氣隂為味滑云陽為氣隂為味此氣味二字以天地隂陽之之化而言也陽在天成象氣之謂也隂在地成形味謂也味歸形形歸氣氣歸精精歸化精食氣形食味氣化則精生味和則形長化生精氣生形氣飬形也精微之液惟血化而成形質之有資氣行而立故斯二者各奉乎生身味傷形氣傷精遇其節也精化為氣氣傷於味滑云五味入口藏於胃以飬五藏氣過則傷之氣傷於味也隂味出下竅陽氣出上竅味厚者為隂薄為隂之陽氣厚者為陽薄為陽之隂味厚則泄薄則通氣薄則發泄厚則發熱隂氣潤下故厚味則泄利陽氣炎上故氣厚則發熱味薄為隂少故通泄氣薄為陽少故汗出壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣氣生壯火故云壯火食氣少火滋氣故云氣食少火以壯火食氣故氣得壯火則耗散以少火益氣故氣得少火則生長人之陽氣少壯亦然滑云少而壯壯而衰理則然也氣味辛甘發散為陽酸苦涌泄為隂陽氣者若天與日失其所則折夀而不彰故天運當日以光明是故陽因而上衞外者也欲如運樞起居如驚神氣乃浮欲如運樞謂内動也起居如驚謂暴卒也陽氣一日而主外晝則陽氣在外平旦人氣生日中而陽氣隆日西而陽氣已虚氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄旦暮陽氣衰内行陽分故宜收斂以拒虚邪隂中有隂陽中有陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之隂也合夜至雞鳴天之隂隂中之隂也雞鳴至平旦天之隂隂中之陽也故人亦應之夫言人之隂陽外為陽内為隂言人身之隂陽則背為陽腹為隂言人身中藏府之隂陽則藏者為隂府者為陽肝心脾肺腎五藏皆為隂膽胃大腸小腸膀胱三焦六府皆為陽所以欲知隂中之隂陽中之陽者何也為冬病在隂夏病在陽春病在隂秋病在陽皆視其所在為施鍼石也背為陽陽中之陽心也背為陽陽中之隂肺也腹為隂隂中之隂腎也腹為隂隂中之陽肝也腹為隂隂中之至隂脾也此皆隂陽表裏内外雌雄相輸也故以應天之隂陽也天氣通於肺位髙而氣清也地通於隘隘在首為下且有隂受之義風氣通於肝風生木也雷氣通於心雷象火之有聲糓氣通於脾土爰稼穡脾屬土故􅂖氣通於脾雨氣通於腎兩腎皆水六經為川流注不息也腸胃為海皆受納也九竅為水注之氣滑云九竅之氣流通不滯猶水之流注也以天地為之隂陽以人事配象之陽之汗以天地之雨名之陽之氣以天地之疾風名之暴氣象隂逆氣象陽寒極生熱熱極生寒寒氣生濁熱氣生清言正氣也清氣在下則生餐泄熱在下則糓不化也濁氣在上則生䐜脹寒氣痞塞不能和暢此隂陽反作病之逆從也天不足西北故西北方隂也而人右耳目不如左明也在上法天地不滿東南故東南方陽也而人左手足不如右强也在下法地曰何以然曰東方陽也陽者其精并於上并於上則上明而下虚故使耳目聰明而手足不便也西方隂也隂者其精并於下并於下則下盛而上虚故其耳目不聰明而手足便也故俱感於邪其在上則右甚在下則左甚此天地隂陽所不能全也故邪居之凡隂陽之要陽宻乃固兩者不和若春無秋冬無夏因而和之是謂聖度故陽强不能宻隂氣乃絶隂平陽秘精神乃治隂陽離决精氣乃絶帝曰藏象何如象謂所見於外可閱者也岐伯曰心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣心主於夏氣合太陽謂太陽居於夏火之中也肺者氣之本魄之處也其華在毛其充在皮為陽中之太隂通於秋氣肺主於秋謂太隂居於陽分也腎者主蟄封藏之本精之處也其華在髪腎者水也在髙源宜其華在髪也抑髪者血之餘血者水之類又其色黒其充在骨謂隂中之少隂通於冬氣謂盛隂居冬隂之分也肝者罷音皮之本謂肺主筋屬乎木又肝者幹也人之運動由於筋力象木之動也動則多勞故云罷極魂之居也其華在爪其充在筋為陽中之少陽通於春氣謂少陽居於陽位而王於春也脾胃大腸小腸三焦膀胱者倉廩之官營之居也營謂營運居猶處也盖脾為輸轉之官故也名曰器能化糟粕轉味而入出者也其華在唇四白謂唇四際白色肉也其充在肌此至隂之類通於土氣以脾屬土土為至隂凡十一藏取决於膽也膽者中正剛斷而無偏私故也滑云脾胃大腸云云至通於土氣此處疑有誤今訂証云脾者倉廩之本營之居也其華在唇四白其充在肌此至隂之類通於土氣胃大腸小腸三焦膀胱名曰器能化糟粕轉味而入出者也帝曰五藏應去聲四時各有收受乎岐伯曰有東方青色入通於肝開竅於目藏精於肝精謂精氣陽升之方以目為用故開竅於目其病發驚駭肝藏魂病則魂不安也其味酸其類草木其畜雞易曰巽為雞其榖麥麥色蒼其應四時上為歲星木之精也餘四星准此是以春氣在頭也萬物發榮於上其音角其數八木生數三成八數其臭臊是以知病之在筋也其在聲為呼謂呌呼在變動為握把握屬筋在志為怒怒傷肝甚則自傷也悲勝怒悲則肺金尅肝風傷筋風勝則經絡拘急酸傷氣風酸皆自傷也辛勝金南方赤色入通於心開竅於耳手少隂之絡㑹於耳藏精於心故病在五藏心主五藏其味苦其類火其畜羊離為羊其糓黍􅁰色赤其應四時上為熒惑星是以知病之在脈也其音徴其數七火生數二成數七其臭焦火變則為焦其在聲為笑在變動為憂在志為喜喜傷心恐勝喜恐則腎水尅心火熱傷氣寒勝熱苦傷氣熱苦皆傷己所勝也鹹勝苦鹹水味中央黄入通於脾開竅於口藏精於脾脾為化榖口上逆稂故開竅於口故病在舌本脾脈上連於舌本其味甘其類土其畜牛坤為牛其穀稷色黃而味甘其應四時上為鎮星是以知病之在肉也其音宫其數五其臭香其在聲為歌在變動為噦謂噦噫在志為思思傷脾怒勝思怒則不思濕傷肉風勝濕甘傷肉甘濕皆自傷也酸勝甘西方白色入通於肺開竅於鼻藏精於肺故病在背肺在胸中背為胸為府其味辛其類金其畜馬乾為馬其糓稲稲白色其應四時上為大白星是以知病之在皮毛也其音商其數九金生數四成數九其臭腥其在聲為哭在變動為欬在志為憂憂傷肺喜勝憂喜則心火尅肺金熱傷皮毛是被勝傷己也寒勝熱辛傷皮毛是自傷也苦勝辛苦火味北方黑色入通於腎開竅於二隂藏精於腎腎藏精隂泄注故開竅於二隂故病在谿谿謂肉之小㑹冬氣居内故病在深處其味鹹其類水其畜彘亥為豕其糓豆豆黑色其應四時上為辰星是以知病之在骨也其音羽其數六水生數一成數六其臭腐其在聲為呻在變動為慄謂戰慄在志為恐恐傷腎思勝恐寒傷血燥勝寒鹹傷血食鹹而渇傷血可知寒鹹皆傷己所勝也大素血作骨下同帝又問曰願聞十二藏之相使並去聲貴賤何如岐伯曰心者君主之官神明出焉肺者相傳之官治節出焉肺附於心故曰相𫝊主行營衞故曰治節肝者將軍之官謀慮出焉勇而能斷故曰將軍膽者中正之官决㫁出焉膻中者臣使之官喜樂出焉膻中在胸中兩乳間為氣之海氣和志通則喜樂由生脾者倉廩之官五位出焉大膓者傳道之官變化出焉小腸者受盛之官化物出焉腎者作强之官伎巧出焉强於作用故曰作强造化形容故曰伎巧三焦者决凟之官水道出焉引道隂陽開通閉塞不通膀胱者州都之官津液出焉氣化則能出矣位當孔府故為都官若得氣海之氣施化則溲便注泄氣海之氣不及則閉塞不通矣凡此十二官不相失也故主明則下安以此飬生則夀没世不殆以為天下則大昌主即心也心者君主之官神明出焉故心既明以攝生則夀以處世則安以治天下則昌皆實理也主不明則十二官危使道閉塞而不通形乃大傷以此飬生則殃以為天下者其宗大危戒之戒之心之合脈也其榮色也發見於面之色皆心之榮其主腎也隨其所畏則德命焉火畏水故心聼命於腎藏義皆同肺之合皮也其榮毛也毛附皮其主心也肝之合筋也其榮爪爪者筋之餘其主肺也脾之合肉也其榮唇也其主肺也腎之合骨也其榮髮也其主脾也帝曰余聞方士或以腦髓為藏或以腸胃為藏或以為府願聞其說岐伯曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於隂而象於地故藏而不冩去聲名曰奇恒之府奇異也恒常也此六者異於下文六府故云胃大腸小腸三焦膀胱此六者天氣之所生也其氣象天天氣地氣以動靜言故冩而不藏此受五藏濁氣名曰傳化之府此不能久留輸冩者也魄門亦為五藏使水糓不得久藏魄門肛門也内通於肺故云五藏者藏精氣而不㵼也故滿而不能實精氣為滿水穀為實六府者傳化物而不藏故實而不能滿也所以然者水榖入口則胃實而腸虚食下則腸實而胃虚故曰實而不滿滿而不實也帝曰氣口何以獨為五藏主岐伯曰胃者水榖之海六府之大源也五味入口藏於胃以飬五藏之氣氣口亦太隂也五藏之氣輸於肺肺為太隂氣由出入故曰氣口亦太隂也是以五藏六府之氣味皆出於胃變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也滑云五氣入鼻以下與上文義不相發豈因五味入口而遂及於五氣入鼻耶心藏神靈樞經曰兩精相薄謂之神肺藏魄並精而出入者謂之魄肝藏魂隨神而往來謂之魂脾藏意心有所意謂之意腎藏志意之所存謂之志故神藏五形藏四合為九藏也神藏心藏神五者是也以其皆神氣居之故云形藏一頭角二耳目三口齒四胸中也天非純陽亦有三隂天以陽生隂長而為春夏寅手少陽三焦經已手厥隂心包絡經春卯手陽明大腸經生夏午手少隂心之經長手之經絡應天辰手太陽小腸經未手太隂肺之經天時十二月人身十二經地支十二位申足少陽膽之經亥足厥隂肝之經秋酉足陽明胃之經殺冬子足少隂腎之經藏足之經絡應地戌足太隂膀胱經丑足太隂脾之經地非純隂亦有三陽地以陽殺隂藏而為秋冬五方氣味東方甲風乙木其氣温其味甘在人以肝膽應之南方丙熱丁火其氣熱其味辛在人以心小腸三焦包絡應之中央戊濕其本氣平其兼氣温凉寒熱在人以胃應之中央已土其本味鹹其兼味辛甘酸苦在人以脾應之西方庚燥辛金其氣凉其味酸在人以肺大腸應之北方壬寒癸水其氣寒其味苦在人以腎膀胱應之按人乃萬物中之一也獨陽不生獨隂不長湏稟兩儀之氣而化生也然輕清成象重濁成形本乎天者親上本乎地者親下則各從其類也輕中清者清肺以助天真清中濁者榮華腠理濁中清者榮飬於神濁中濁者堅强骨髓故至真要大論云五味隂陽之用辛甘發散為陽酸苦涌泄為隂淡味滲泄為陽鹹味涌泄為隂六者或收或散或緩或急或燥或潤或耎或堅各以所利而行之調其氣使之平也按五行五色五味五走五藏所禁東方之木其色青其味酸其藏肝肝主筋木曰曲直曲直作酸酸走肝筋病肝者毋多食酸南方之火其色赤其味苦其藏心心主血火曰炎上炎上作苦苦走心病在心者毋多食苦西方之金其色白其味辛其藏肺肺主氣金曰從革從革作辛辛走肺病肺者毋多食辛北方之水其色黑其味鹹其藏腎腎主骨水曰潤下潤下作鹹鹹走腎骨腎病者毋多食鹹中央之土其色黄其味甘其藏脾脾主肉土曰稼穡稼穡作甘甘走肉人病脾者毋多食甘按人生日用不離氣味補㵼在味隨時異氣凡氣薄為陽中之隂氣厚者為陽中之陽味薄為隂中之陽味厚者為隂中之隂辛甘淡之熱者為陽中之陽辛甘淡之寒者為陽中之隂酸苦鹹之寒者為隂中之隂酸苦鹹之熱者為隂中之陽夫辛甘淡鹹苦酸乃味之隂陽又為地之隂陽也温凉寒熱乃氣之隂陽又為天之隂陽也氣味生成而隂陽造化之機存焉日用飲食與夫病疾藥物審其氣味酌而量之調攝之道備是矣五臟有五色皆見於面關與寸口尺内相應假令色青其脈當弦而急色亦其脈浮大而散色黄其脈中緩而大色白其脈浮濇而短色黑其脈沉濡而滑此所謂五色之與脈當參相應也岐伯曰天度者所以制日月之行也氣數者所以紀化生之用也天為陽地為隂日為陽月為隂行有分紀周有道理日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積氣餘而盈閠矣天體周圍三百六十五度故三百六十五日而後成歲然一歲十二月一月三十日三百六十日一歲之常數也故日與天㑹一歲而多五日為氣盈月與天㑹而少五日為朔虚合氣盈朔盈而閠於是生焉立端於始表正於中推餘於終而天度畢矣端首也始初也表彰信也正斗建也中月半也推退位也言立其首氣初節之日示斗建於月半之辰退餘閠於相望之後是以閠之前則氣不及月閏之後則月不及氣也故厯元云其候閏某月節閠某月中也推中之義斷可知乎故曰立端於始表正於中推餘於終也由斯推日成閠故能令天度畢焉天有十日由六竟而周甲甲六復而終歲三百六十日法也帝曰夫子之言積氣盈閠願聞何謂氣岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉五運相襲而皆治之終期之日周而復始時立氣布如環無端候亦同法故曰不知年之所加氣之盛衰虚實之所起不可以為工矣時立氣布氣即脈氣謂時至脈亦至也曰五運之始如環無端其太過不及何如曰五氣更立各有所勝盛虚之變此其常也曰平氣何如曰無過者也曰太過不及柰何曰在經有也曰何謂所勝曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得五行時之勝各以氣命其藏以氣命藏如春之木内合肝之類是也命名也曰何以知其勝曰求其至也當歸始春謂立春之前曰大寒之氣也未至而至此謂太過則薄所不勝而乘所勝也命曰氣淫至而不至此謂不及則所勝妄行而所生受病所不勝薄之也命曰氣迫所謂求其至者氣至之時也凡氣之至皆謂立春前五日乃候之初也也未至而至謂所直之氣未應至而先期至先期而至是氣有餘故曰太過至而不至謂所直之氣應至不至而後期至後期而至是不足故曰不及凡五行之氣我尅者為所勝尅我者為所不勝生我者為所生五藏之氣内相淫并為病故命氣淫餘太過例同又如木氣不平土金交薄相迫為疾故曰氣迫也餘不及例皆同謹候其時氣可與期失時反候五治不分邪辟内生工不能禁也曰有不襲乎曰蒼天之氣不得無常也氣之不襲是謂非常非常則變矣曰非常而變柰何曰變至則病所勝則微所不勝則甚因而重感於邪則死矣故非其時則微當其時則甚也厥隂之至其脈弦少隂之至其脈鈎太隂之至其脈沈少陽之至大而浮陽明之至短而濇太陽之至大而長至而和則平至而甚則病至而反則病至而不至者病未至而至者病隂陽易者危一朞之中主運以位而相次于下客運以氣而周流於上客氣加於主運之上主氣臨于客氣之下天時所以不齊民病所由生也然運氣之所以有變者氣相得則和不相得則病又有相得而病者以下臨上不當位也五行相生者為相得相尅者為不相得上臨下為順下臨上為逆大要陽年先天時化則已强而以氣勝實故不勝者受邪隂年後天時化則已弱而以氣休衰故勝己者來尅被尅之後必待時而復也行復于所勝則已不可前故待得時則子當旺然後子為母復讎也經曰先立其年以明其氣毎年先立運氣審其太過不及然後以地之主氣為本天之客氣加臨于上為標以求六化之變如氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨氣安其屈伏以平為期餘詳天道運氣編五運主病諸風掉眩皆屬肝木掉揺也眩昏亂旋運也風主動故也所謂風氣甚而頭目眩運也由風木旺必是金衰不能制木而木復生火風火皆屬陽多為兼化陽主乎動兩動相搏則為之旋轉故火本動也㷔得風則自然旋轉如春分至小滿為二之氣乃君火之位自大寒至春分七十三日為初之氣乃風木之位故春分之後風火相搏則多起飄俗謂之旋風是也四時皆有之由五運六氣千變萬化衝盪擊搏推之無窮安得失時而便謂之無也但有微甚而已人或乘車躍馬登舟環舞而眩運者其動不正如左右紆曲故經曰曲直動揺風之用也眩運而嘔吐者風熱甚故也諸痛痒瘡痬皆屬心火人近火氣者微熱則痒熱甚則痛附近則灼而為瘡皆火之用也或痒痛如針輕刺者猶飛迸火星灼之然也痒者美疾也故火旺于夏而萬物蕃鮮美榮也炙之以火漬之以湯而痒轉甚者微熱之所使也因而痒去者熱冷皮膚縱緩腠理開通陽氣得泄熱散而去故也或夏熱皮膚痒而以冷水沃之不去者寒能收歛腠理閉宻陽氣鬱結不能散越拂熱内作故也痒得爬而解者爬為火化微則亦能令痒甚則痒去者爬令皮膚辛辣而屬金化辛能散故金化見則火力分而解矣或云痛為實痒為虚者非謂虚而寒也正謂熱之微甚也或疑瘡痒皆屬火熱而反腐出膿水者何也猶榖肉果菜熱極則腐爛而潰為汙水也潰而腐爛者水之化也所謂五行之理過極則勝己者反來制之故火熱過極則反兼於水化又如鹽能固物令不腐爛者鹹寒水化制其火熱使不過極故得久固也萬物皆然諸濕腫痛皆屬脾土土地之體也土濕極盛則否塞腫滿天時亦然故長夏屬土則庶物隆盛也諸氣膹鬱病痿皆居肺金膹謂膹滿也鬱謂奔迫也痿謂手足痿弱無力以運動也大抵肺主氣氣為陽陽主輕清而升故肺居上部病則其氣膹滿奔迫不能上升至於手足痿弱不能收持由肺金本燥燥之為病血液衰少不能榮飬百骸故也經曰手指得血而能攝掌得血而能握足得血而能步故秋金旺則霧氣濛鬱而草木萎落病之象也萎猶痿也諸寒收引皆屬腎水收歛引急寒之用也故冬寒則拘縮矣周天三百六十五度太陽一日行一度從房至胃十四宿為陽主晝正人身血氣行陽二十五度也從昴至氐十四宿為隂主夜正人身氣血行隂二十五度也盖人身經絡共長一十六丈手三陽之脈從手至頭長五尺五六合三丈手三隂之脈從手至胷中長三尺五寸三六一丈八尺五六三尺合二丈一尺足三陽之脈從足至頭長八尺六八四丈八尺足三隂之脈從足至胷中長六尺五寸六六三丈六尺五六三尺合三丈九尺人兩足蹻脈從足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各長四尺五寸二四八尺二五一尺合九尺凡脈長一十六丈二尺也人一呼脈行三寸一吸脈行三寸呼吸定息脈六寸十息脈行六尺百息脈行六丈二百七十息脈行一十六丈二尺氣血周身一度也漏水下二刻焉至明日寅時周身五十度脈行八百一十丈該一萬三千五百息漏水下百刻焉日行一十八舍也其始從巾焦注手太隂陽明陽明注足陽明太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手厥隂少陽少陽注足少陽厥隂厥隂循還注手太隂周而復始循環無端氣主呴之血主濡之脈在其中為之樞紐也春秋分晝夜兩停脈行五十度合乎正數也若冬至之後晝四十刻夜六十刻隂多陽少氣血凝澁而脈道遲止行四十度也夏至之後晝六十刻夜四十刻陽多隂少氣血滑利而脈道疾反行六十度也若天氣暴熱脈行亦疾天氣暴寒脈行亦遲故人不能調飬以順造化之氣則病生而脈變矣周身血氣晝夜循環歌人身血氣無暫息動靜周流在呼吸呼行三寸吸亦然一息定行六寸的二百七十息數來脈行十六丈二尺積此周身一度過補㵼分明知滑澁試問一時息幾多千百二十五無一脈行六十七丈五四度周身尚餘刻更將餘刻為君明四十五息二丈七晝夜循環息幾何一萬三千兼五百脈行八百一十丈度行五十週身畢此是平人脈氣歌遲冷數熱為難測人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸一日一夜凡一萬三千五百息脈行五十度周於身漏水下百刻榮衞行陽二十五度行隂亦二十五度為一周也故五十度復㑹於手太隂寸口者五臟六腑之所終始故法取於寸口也人平人也人身之脈貫串於經中呼行三寸吸行三寸呼吸畢而謂定息也一息之間脈行六寸人身脈度手足三隂三陽兩蹻脈并督任脈共計一十六丈二尺黃帝曰蹻脈有隂陽何脈當其數岐伯曰男子數其陽女子數其隂水下一刻計一百三十五息脈行八丈一尺二刻計二百七十息脈行一十六丈二尺為一周一時八刻有奇脈行四周有奇也自寅時注肺初行一時呼吸氣計一千一百二十五息脈行計六十七丈五尺至卯時計二千二百五十息脈行一百四十四丈以次相傳至丑時計一萬三千五百息脈行八百一十丈已畢自平旦寅時起於手太隂脈經水初不漏至丑時終於厥隂肝經下漏百刻盡矣二刻一周共五十度周月榮者血也衞者氣也血為氣之配氣升血亦升氣降血亦降二者不得相離但晝則行陽氣得令於血夜則行隂血得令于氣内經曰平旦盡隂陽氣出于目目張則氣上行于頭循項下足太陽循背下至小指之端其散者别於目銃背下手太陽下至手小指之間外側其散者别於目銃背下足少陽注小指次指之間以上循乎少陽之分側下至小指之間别者以上至耳前合於額脈注足陽明以下至跗上入五指之間其散者背下下手陽明入大指之間入掌中其至於足也入足心出内踝下行隂分復合於目故為一周晝則行陽二十五度至此陽盡於隂隂受氣矣其始入於隂常從足少隂注腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為一周行隂亦二十五度而復合於目營周不休分為晝夜日中而陽隆為重陽夜半而隆隂為重隂夜後而隂衰平且隂盡而陽受氣矣日西而陽衰日入陽盡而隂受氣矣目動則行陽目合則行隂即太極動而生陽靜而生隂之理也行陽從寅而至申行隂從申而至寅也行陽行隂度數亦二刻而一周氣血流通俱可謂脈又更言榮衞而不言脈者盖因榮衞行陽止行周於諸腑行隂止行周於諸臟隂陽各二十五度行陽而行隂隂盡而復陽始為一周身脈則出入臟腑循環無已者也脈之度毎度周於身故云五十度周於身脈與榮衞俱始㑹於寅終於丑也其始㑹脈則從太隂𫝊注餘經榮衞則從太隂上目復行陽而抵隂肺朝百脈寸口肺經也故百脈變見於寸口診脈决斷之法舎此其何以取之哉經脈十二絡脈十五何始何窮也然經脈者行血氣通隂陽以榮於身者也其始從中焦注手太隂陽明陽明注足陽明太隂太隂注手少隂太陽太陽注足太陽少隂少隂注手心主少陽少陽注足少陽厥隂厥隂復還注手太隂别絡十五皆因其原如環無端轉相灌溉朝於寸口人迎以處百病而决死生也直行者謂之經旁行者謂之絡窮即終也其注始於太隂而終於厥隂終而又復始也易曰水洊至習坎愚按靈樞經云日行二十八宿人經脈上下左右前後二十八宿周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通壬中一周于身下水二刻日行二十五分五百四十息氣再周于身下水四刻日行四十分二千七百息氣行十周于身下水二十刻日行五宿二十分一萬三千五百息氣行五十營于身水下百刻日行二十八宿漏水皆盡脈絡矣凡行八百一十丈也又云氣之行如水之流如日月之行不休故隂脈營其蔵陽脈營其府如環之無端莫知其紀終而復始愚謂人身氣血常常流通則安一有壅滯則病養身之道息息相繼如水之洊至而其流相續則真氣上下灌注亦如水之流通也天之隂陽左升而右降上浮而下沉所以為四時之序也人之氣血春升而秋降夏浮而冬沉所以為四時之脈也四時之序謂生長化收藏也四時之脈謂弦鈎緩毛石也春三月天氣温和萬物發生肝經木旺脈來輕虚而滑端直以長故曰弦夏三月天氣暑熱萬物盛長心經火旺脈來盛去衰前屈後居故曰鈎秋三月天氣清凉萬物凋零肺經金旺脉來輕虚以浮故曰毛冬三月天氣凛冽萬物閉藏腎經水旺脈來沈濡而滑故曰石經曰春日浮如魚之在波夏日在膚泛泛乎萬餘秋日下膚蟄蟲將去冬日在骨蟄蟲周宻君子居室以其脈應天地之運所以有規矩權衡之譬也應時而見曰平太過曰病不及曰病反時而見曰死謂春得秋脈秋得夏脈夏得冬脈冬得長夏脈長夏春脈五行相尅鬼賊之脈見也脈有胃氣曰平故曰微弦微鈎微毛微石五臟胃氣而見也脈無胃氣曰死故真肝脈至中外急如循刀刄責責然如按琴瑟絃色青白不澤毛曰乃死真心脈至堅如搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而浮如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石劈劈然色黒黄不澤毛折乃死真脾脈至如屋漏雀啄色黄青不澤毛折乃死是不兼胃氣也故人以脈氣為宗以胃氣為本也四時脈考帝曰春脈如何而弦岐伯曰春肝也東方木也萬木之所以始生也故其氣來耎弱輕虛而滑端直以長故曰弦反此者病曰如何而反曰其氣來實而强此謂太過病在外其氣來不實而微此謂不及病在中太過則令人喜怒忽忽眩冐而顛疾其不及則令人胸痛引背下則兩脅滿曰夏脈如何而鈎曰夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鈎反此者病曰如何而反曰其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱而痛膚為浸淫其不及則令人煩心上見咳唾下氣泄曰秋脈如何而浮曰秋脈肺也西方金也萬物之所以收成也故其氣輕虚以浮來急去散故曰浮反此者病曰如何而反曰其氣來毛而中堅兩傍虚此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛愠愠然其不及則令人喘呼少氣而欬上氣見血下聞病音曰冬脈如何而營曰冬脈腎也北方水也萬物之所以合藏也故其氣來沈以搏故曰營反此者病曰何如而反曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解㑊困弱貌脊脈痛而少氣不欲言其不及則令人心懸如病饑𦕈中青脊中痛小腹滿小便變𦕈者俠腎兩傍空軟處也清凉也曰脾脈獨何主曰脾脈土也孤藏以灌四傍者也以不正主四時故謂之孤藏善者不可見惡者可見其來如水之流者此謂太過病在外如鳥之啄者此謂不及病在中太過則令人四肢不舉中氣不和其不及則令人九竅不通平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死逆者反常也春胃微弦曰平言微似弦不謂微而弦也鈎及軟弱耎毛石義並同弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病從秋盛也毛病曰今病木受金邪故今病也藏真散於肝肝藏平聲下同筋膜之氣也藏真藏之真氣胃氣是也凡人胃中有元氣謂真液所以生五藏者也又曰平肝脈來耎弱招招如掲長竿末稍曰平言長耎也春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病長而不耎死肝脈來急益勁如新張弓弦曰肝死勁强急之甚也又曰真肝脈來中外急如循刀刄責責然如按琴瑟絃色青白不澤毛折而死無餘物和雜故曰真五藏之氣皆胃氣和之不得獨用獨用則死餘四藏凖此夏胃微鈎曰平鈎多胃少曰心病但鈎無胃曰死胃而有石曰冬病石甚曰今病藏真通於心心藏血脈之氣也又曰平心脈來累累如連珠如循琅玕曰心平夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鈎曰心死居不動也又曰真心至堅而搏如循薏苡子累累然也色赤黑不澤毛折乃死累累喘喘皆連續成串児長夏胃微耎弱曰平弱多胃少曰脾病但代無胃曰死耎弱有石曰冬病土令見水脈虚邪也以其土衰水乘之金令見木脈木令見火脈皆然弱甚曰今病藏真濡於脾脾臟肌肉之氣也又曰平脾脈來和柔相離如雞踐地曰脾平動數相離緩急和調長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病越人以為心病也死脾脈來鋭堅如烏之啄如鳥之距如屋之漏如水之流曰脾死烏啄鳥距者言鋭而堅水流者平至不鼓屋漏者時動復住又曰真脾脈至弱而乍數乍疎色黄青不澤毛析乃死秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病藏真髙於肺以行榮衞隂陽也又曰平肺來厭厭聶聶如落榆莢曰肺平莢葉同言浮薄而虛也秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病死肺來如物之浮如風吹毛曰肺死又曰真肺脈至大而虚如以羽毛中人膚色白赤不澤毛折乃死冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鈎曰夏病鈎甚曰今病水受火土之邪藏真下於腎腎藏骨髓之氣也又曰平腎脈來喘喘累累如鈎按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈平聲石曰死奪索彈石言硬也奪索如兩人搶奪䋲索各執一頭中硬可知又曰真腎脈至搏而絶如指彈石辟辟然黑色色黄不澤毛折而死人以水榖為本故人絶水榖則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也順時節宣春月順時節宣内經曰春月陽氣閉藏於冬者漸發於外故宜發散以暢陽氣故有曰春三月此謂發陳天地俱生萬物以榮夜卧早起廣步於庭被髪緩形以使志生生而勿殺予而勿奪賞而勿罰此春氣之應飬生之道也逆之則傷肝東垣曰木在時為春在人為肝在天為風風者無形之清氣也素問云春傷於風夏生飱泄潛谿論曰慎起居忍嗜慾薄滋味行隂隲可以却病延年益夀云夏月順時節宣内經曰夏月人身陽氣發外伏隂在内是脱精神之時特忌下利以泄隂氣故又曰夏三月此謂蕃秀天地氣交萬物華實夜卧早起無厭於日使志無怒使英華成秀使氣得洩若所愛在外此夏氣之應飬長之道也逆之則傷心經曰夏傷於暑秋必痎瘧潛谿論曰夏至一隂生當節嗜欲也秋月順時節宣内經曰秋月當使陽氣收歛不宜吐及發汗犯之令人臟腑消鑠故又曰秋三月此謂容平天氣以急地氣以明夜卧早起與雞俱興便志安寧以緩秋形收歛神氣使秋氣平無外其志使肺氣清此秋氣之應飬收之道也逆之則傷肺素問云秋傷於濕冬生咳嗽潛谿論曰飬氣完形寡慾嗇精肺金司秋之正令也冬月順時節宣内經曰冬月天地閉血氣藏伏陽在内心膈多熱切忌發汗以洩陽氣故又曰冬三月謂之閉藏水氷地圻無擾乎陽早卧晚起必待日光使志若伏若匿若有私意若已有得去寒就温無泄皮膚使氣亟奪此冬氣之應飬藏之道也逆之則傷腎故曰冬傷於寒春必温病故先王於是月閉關俾寒熱適中此為至要潛谿論曰人能為善行方便好事為一生之大藥何病之有脾潛谿曰夫脾脈中宫之土也每季各旺十八日其脈論寬而緩得旺相之本也人有寬懷情意若六月診之寬緩乃脾之正旺相之脈也是有喜之脈若撞指來往不足者此人為事有情渠不可猜也若見大小沈浮而緩者此為旺相之脈也男子以氣為主故貴右手脈盛女子以血為主故貴左手脈盛然人之身氣為衞血為榮無分男女皆以胃氣為主故得榖者昌絶榖者亡又曰胃氣者中氣也慎言語則中氣不散而上越節飲食則中氣不滯而下洩故易頥象曰君子慎言語節飲食頥者飬也飬生飬德其可舎諸東垣李果專主脾胃制補中益氣湯且作箴自警知本哉脾以飬氣肺以通氣腎以泄氣心以役氣肝則氣常生心虛氣入為蕩肺虛氣入為喘肝虛氣入目昏腎虚氣入腰疼脾獨不與受食不化氣將日微安能有餘以入虚曰脾之繫於生人大矣思則傷脾多食則胃塞而脾不能運亦受傷是以飬脾者飬氣也飬氣者飬生之要也曰心火不炎則無瘡痬諸疾戒暴怒則無中氣諸疾夏至隂生絶慾至春分則無傷寒瘟疫諸疾此謂順天時法隂陽以自固求子則子夀飬生則生怡内經曰喜怒傷氣寒暑傷形曰慎喜戒怒氣調矣禦寒避暑形固矣心主之也茍能雖喜忘喜不累於喜雖怒忘怒不累于怒雖寒忘寒不累於寒雖暑忘暑不累于暑形氣豫全何傷之有非至人曷足語此數者所以順性命之理也一為水而腎其德智也二為火而心其德禮也三為木而肝其德仁也四為金而肺其德義也五為土而脾其德信也宣明五氣附五味所入酸入肝辛入肺苦入心鹹入腎甘入脾是謂五入五氣所病心為噫肺為欬肝為語脾為吞腎為火為嚏胃為氣逆為噦為恐大腸小腸為泄下焦溢為水膀胱不利為􅜡不約為遺溺膽為怒是謂五病五精所并精氣并於心則喜并於肺則悲并於肝則憂并於脾則畏并於腎則恐是謂五并虚而相并者也五藏所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是謂五惡五藏化液心為汗肺為涕肝為涙脾為涎腎為唾是謂五液五味所禁心走氣氣病無多食辛鹹走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁無令多食五病所發隂病發於骨陽病發於血隂病發於肉陽病發於冬隂病發於夏是謂五發五邪所亂邪入於陽則狂邪入於隂則痺搏陽則為巔疾搏隂則為病陽入之隂則靜隂之陽則怒是謂五亂五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰隂出之陽病善怒不治是謂五邪皆同命死不治五藏所藏心藏神肺藏魄肝藏魂脾藏意是謂五藏所藏五藏所主心主脈肺主皮肝主筋脾主肉腎主骨是謂五主五勞所傷久視傷血久卧傷氣久坐傷肉久立傷骨久行傷筋是謂五勞所傷五脈應象肝脈弦心脈鈎脾脈代肺脈毛腎脈石是謂五藏之脈以誠感人者人亦以誠應以詐御人者人亦以詐應木火土金水之質在我為肝心脾肺腎木火土金水之神在我為仁義禮智信之德萬物備於我舉此亦可見人身總論學問之道崇德安身其要也然氣和則身安神存則德邃似乎二之矣孰知氣充乎體頼神以宰之飬其氣正以存其神而身之安也其德之所由崇乎但先儒謂人以外物奉身事事要好只自家一箇身與心却不要好以愚觀之豈特不要好而已哉凡人于身外之物莫不知之詳處之當自以為智自以為能也及反諸一身其精神血氣骨骸脈理茫然莫之省焉尚可以為智且能乎夫人生長夀止百年耳百年之外骨骸且莫之保也况外物乎胡為乎百年之中晝焉憧憧于營為夜焉擾擾于夢寐身心不獲一息自安而形神兩脫不自覺也試肯反而思之寧不自哀乎哉盖人身之造化即天地之造化也天地之大不外隂陽五行焉耳而人之為人亦同此隂陽同此五行也果能安身以崇德則人與天地可並立而為三矣試自人之形體言之外而四肢百骸内而五臟六腑豈判然不相關乎心火腎水肝木肺金脾土此人身之五行也故五臟雖在内也然肺飬皮毛心飬血脈脾飬肌肉肝飬筋膜腎飬骨髓内外本相貫也亦非五行各一其屬而不相涉也肺主聲也入心為言入肝為呼入脾為歌入腎為呻吟自入則為泣矣肝主色也入肺為白入心為赤入脾為黄入腎為黒自入則為青矣心主臭也入肝為臊臭入肺為腥臭入脾為香臭入腎為腐臭自入則為焦臭矣脾主味也入心為苦入肝為酸入肺為辛入腎為鹹自入則為甘矣腎主液也入心為汗入肝為涙入肺為涕入脾為涎自入則為唾矣惟其自相貫通是以内外自無間隔肝竅于目而辨五色肺竅于鼻而别五香心竅於舌而知五味脾竅於口而納五榖腎竅于耳而通五聲故一歲之間肝主春而其脈弦象甲乙木也心主夏而其脈鈎象丙丁火也肺主秋而其脈毛象庚辛金也腎主冬而其脈石象壬癸水也脾雖旺于長夏而主乎四季弦鈎毛石一以脾胃為本象戊巳土也五行相生循環無端在天時為十二月在地支為十二位在人身為十二經曽何間乎非特一歲為然即一晝夜日經二十八宿周天三百六十五度而人身經脈與之相運旋而不停焉如子注膽丑注肝寅注肺夘注大腸辰注胃已注脾午注心未注小腸申注膀胱酉注腎戌注心􅊶亥注三焦周而復始候脈者候此而已一歲春以肝為主乙日子以膽為主天地人身一氣周流合此為平太過則數不及則遲惟人身違天地之中和而百病生焉者又豈特一日為然呼吸何其速也呼出心與肺吸入腎與肝呼為陽而應乎天吸為隂而應乎地一呼一吸與天地隂陽相貫徹也是故五行相生相尅要不出乎隂陽二者而已自頂至踵凡骨節皮毛臟腑經絡其所以相流通者不過精津涕唾血液而其所以運行之者非氣乎彼以氣血分隂陽者謂氣為衞衞行脈外血為營營行脈中氣血盛則脈盛氣血衰則脈衰氣血和則脈平氣血亂則脈病氣血熱則脈數氣血寒則脈遲是亦不知脈與氣血一也不然任督二脈為一身隂陽之海元氣之㑹雖欲二之不可得也又有以魂魄分隂陽者氣之呼吸為魂耳目精明為魄魄主受納魂主經營故魄屬隂魂屬陽也然精氣為物㳺魂為變亦自有不可得而離者離之則非人矣或又以臟為神氣所藏肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志而謂之七神者然神豈有七乎盖人心之神乘氣機以出入雖曰神統於心氣統於腎其實神藏氣中猶天氣下降于地氣載乎神猶地道順承乎天故乾統天坤順承天乾坤合斯萬物由之以化生神氣合斯萬化由之以運用而坤道無成以代有終則又總歸之乾也氣載乎神而人身非神以為之主乎所以謂五行一隂陽隂陽一太極夫固三才合一之道韓持國問精住氣住神住之説明道總歸之求于心者此也故曰飬德飬生非二事而安身正所以崇其德也否則神不足以宰氣喜怒哀樂失其節而戕於中寒暑燥濕失其調而攻于外五色適以害吾目五聲適以害吾耳五香五味適以害吾口與鼻而百凡思慮適亂吾之心矣心亂則神疲神昏則氣衰精血枯竭神氣兩離形且不能保矣又何德之足云即是觀之人之元神完具而和氣冲融于一身常與隂陽五行相為貫徹則天地合德殆有不以生死為存亡者矣非謂德盛則身可長生不死也神本生生不息即朝聞道可以夕死即三不朽而太上立德之謂也嗚呼世之人孰不欲其身之安使百病不相侵乎然未有不致中和以飬其德而能安其身者有志之士孰不欲其德之修使百行之皆全乎然未有不能燮理隂陽以飬其身而能修其德者信乎飬德飬生安身崇德非二事也但飬其小者為小人飬其大者為大人志學者其明辨之圖書編卷七十三
