body:
  text: 圖書編卷六十三明章潢撰南嶽總叙衡嶽分值軫宿為南方諸山之宗全楚之鎮髙極萬丈根盤千里七十二峰獻竒呈秀東距洞庭西隣永寳南接九嶷北控三湘朱子地里論云岷山之脈其一支為衡山者已盡於九江之西九峰蔡氏曰江漢南之山則岷山之脈其北一支為衡山而盡於洞庭之西若夫七十二峰之勝巖壑泉石之幽亭館池臺之雅麗懸崖絶壁篆刻之竒古名賢寄寓之芳躅與方外之士可怪可愕之跡及佳木異草珍禽竒獸之錯産大畧具在志中而又有古今之雄文玅什足以闡幽彰微也故不敢復為之說湖廣武昌府山曰黄鵠城西南鐘山興國武昌武昌回山在西塞山之右上有飛雲三洞上洞出雲中洞出水下洞出風乃唐元結讀書之所山後有異泉鐘臺咸寧龜湖嘉魚白石蒲圻荆泉洞中有石臺旁列石如鐘鼓果實形狀不一又有石田溝堘悉具梧桐通城觀音巖廣十餘丈磬榻森列東方大冶龍泉崇陽漢陽府山曰大别城東北即禹貢所載九真堪輿紀勝云即五藏山陽臺漢川小别漢陽石鏡漢川其山有巨石一圓淨如鏡故名關公洞大别山之右其洞乃一巖穴蜀將關公嘗憇於此黄州府山曰赤壁屹立江濵截然如壁而有赤色因名宋蘇軾游此作赤壁二賦孔子山城東百里相傳孔子自衞適楚嘗登此山有坐石草木不侵有石硯雨下墨水浸出龜峰麻城觀音巖龜峰山上巖虚如屋中有石觀音巖東有棋盤石魯臺黄陂石柱羅田玉堂蘄水鳯凰蘄黄梅黄梅五祖山即五祖大滿禪師道塲山頂有池生白蓮花名蓮峰四祖山即四祖大醫禪師道塲上有香爐峰及慈雲塔眀水廣濟積布山臨大江疊石壁立形如積布天門山古稱梁山狀如香爐有十六峰環列最髙者為天門空虚透徹上貫山頂承天府山曰樠木治東京凉京山仙女洞嵓谷競秀泉脉交流峭壁挿天水紋紆石如篆洞有三門中有石床石枕石鏡䑓黄城城南五華景陵徳安府山曰章山陪尾城東即禹貢所載白兆城西上有桃花巖仙人洞又有寫經臺及李白讀書堂大洪随州其山崛起一方巉然雲間四面陡絶頂有大湖湖旁有龍鬬崖又有明聖泉硫黄池仙女洞弗兒嶺鸛子山㫁足巖皆此山之景也葛藤雲夣五家應感九崚孝感其環阜叠嶂林麓深沓上有八境寳陀羅漢三巖范雍詩山竒號九崚名與雍州同洞庭應山荆州府山曰龍山城西北孟嘉九日落帽處龍蓋石首九岡松滋楊林監利内方荆門靈鷲有穴曰龍洞深五里石臺甚髙春月水聲如鐘鼓管籥聼者忘倦蒙山荆門兩巒對起如峩眉山麓二泉即蒙恵泉上有澄源閣有信美浴沂浮香澄玉潄玉五亭皆游憇之所紫蓋當陽二十三洞天南北二山頂上四垂若繖狀林石皆紺色下出綵水甘馨異常黄牛夷陵石鼻髙五百餘仞下臨江流中有巨石横六七十丈如簰􅀢三游洞夷陵荆門宜都方山長陽四面俱方有風穴口大如甕夏則風出冬則風入春秋分則静龍門洞洞前兩崖劍立巖穴幽􅃉泉瀑飛注楚臺歸州玉虚洞有洞可容千人石壁異文成龍草木之狀有石乳結成物象皆温潤如玉故名石門巴東龍影洞平江􅃉三千餘尺周三十里石蹟瑩然上有龍影屈伸蜿蜒鱗甲如繪岳州府山曰巴丘城南羿屠巴蛇於洞庭積骨為丘名君山洞庭湖中有峰如十二螺䯻山海經云洞庭之山帝之二女居之葢堯女湘君嘗居故名道書以此為十二福地望城臨湘禹山華容禹濬川登此幕阜平江一名天嶽山髙一千八百丈周廻五百里石巖有篆云禹治水嘗至此又二十五洞龍影洞􅃉三千餘尺周三十里石壁瑩然上有龍影屈伸蜿蜒鱗甲如繪大浮澧州谷中有石室户牖自然虚明又白鹿池十八洞黄石石門騎龍慈利燕子洞巖洞深廣可坐數千人後有穴四圍石乳融結中有石燕子故名古田安鄉古蹟岳陽樓鄖陽府山曰龍門鄖永南山房方城竹山有城十里黄龍上津寳蓋鄖又名西山上有石蝦蟇卒視之與真無異山北有崖旁視之一宂甚明號星牖襄陽府山曰峴山城南即羊祜墮淚碑孟浩然詩云羊公碑尚在讀罷一霑巾鹿門城東南漢龎徳公唐龎藴孟浩然皮日休俱隠于此太嶽太和鈞州南即武當謂非𤣥武不足以當之山有七十二峰三十六巖二十四澗五臺五井二泉二潭石階山在太和山一名華嶽地肺牛頭鈞州五車直城龎居士棄金之處荆山南漳即山海經云多鐵隂多赤金上有卞和室抱玉巖棗椒棗陽榖山榖城薤山山有孤竹三莖三年生一笋笋就竹死代謝不已馬窟光化中有石窟相傳漢時三國呉皆有馬出九十九岡棗陽縣東有詩云岐路劇羊腸童岡九十九辰州府山曰大酉城北道書二十六洞天上有龍湫禱雨即應小酉城西北下有石穴梁湘東王繹賦云訪酉陽之逸興謂此也武山盧溪五城辰溪大溆溆浦楠木洞溆浦髙明沅髙峻冠諸山羅公黔陽齊天麻陽苞茅麻陽上有三脊茅可以縮酒寰宇記云即楚入貢之茅明月洞溆浦洞在䓵上穴水一泓其狀如月常徳府山曰梁山城北淳于武陵緑蘿桃源四十二福地桃源即大元漁人所云滄山浪山龍陽滄浪之水自出白馬洞桃元三十五洞天衡州府山曰衡山衡山縣西五嶽之一寰宇記宿當軫翼度應璣衡故名即周職方荆州之鎮其山盤繞八百里有七十三峰十洞十五巖三十八泉二十五溪九池九潭九井而最大者五峯為祝融紫葢雲宻石廪天柱伊山城西桓伊讀書處龍渡桂陽馬阜來陽逍遥常寧熊耳安雲秋􅌕舜峰陵武九疑藍山石柱山藍山北亦名天柱下有巖洞石乳融結其怪萬狀色如碧玉岣嶁峰府城北上有禹碑科斗文回鴈峯城南鴈至衡陽不過遇春而回祝融峰衡山第二十四福地朱陵洞衡山第三洞天金粟巖臨武石壁峭㧞下有流溪巖上石璀璨如垂珠珞永州府山曰西山府城西瀟江之外柳宗元游宴記云過湘江縁染溪斫榛莾焚茅筏窮山之髙則凢數州之土壌皆在祍席之下群玉在府城西巨竹清􅁱古木樛曲怪石萬狀地勝景清一郡之竒觀也朝陽巖府城西瀟江之滸巖有洞澗自中流出入湘江後阜前江呀焉淵邃地高東向旭日始旦華采先及故名朝陽小亭立于右崖澹山崖府城南依山而上縁穴而下巖有二門壁立萬仞東南石穴仰望洞然火星巖城西祁山祁黄華東安九龍巖縣北百里山形斗起竒石錯立物象古怪營道道州穿巖形如圓廩中可容萬斛東西兩門通道其問望之若城門又如偃月巖前有石如走猊伏犀其狀不一九疑寧逺郭璞云其山九谿皆相似或云九峰參差互相掩映望而疑之故名峯各一水四水流灌於南海五北注於洞庭九峯曰朱明石城石樓娥皇舜源女英蕭韶桂林杞林有沙樹十二株在舜廟之前玉琯巖舜祠側髙士巖舜祠西白鵝永明月巖永明縣南二山環繞中間一穴如劵初進如新月一灣至山之中則如既望滿月矣葢四圍山髙蔽天惟無山處始見月故名月巖呉望江華暖谷江華雖當盛寒入此谷中其氣温然雖挾纊熾炭不若也含暉洞道州有石室穹然如厦屋紫虚洞寧逺治南古木蒼烟石田棊布巖竇中深必炬而入濂溪道州周子世家于此小丘在鈷鉧潭西有栁子厚記長沙府山曰智渡城北嶽麓善化即衡山七十二峰鵝羊山府城北山多竒石或踞或立狀若鵝羊故名又名石寳即七十二福地之一洞陽劉陽山有洞向陽即二十四洞天古風巖巖深數十里中有佛􅇃鐘鼓棊枰橋梁皆白石生成有溪水内出灌田百餘畝與毛公巖白石巖相連東臺湘鄉草衣巖巖似月輪司空攸左右有三十六峰大峰安化有七十二峰五溪益陽黄陵湘陰舜二妃墓在隠山湘潭小溈醴陵衆山環繞湍水中流即十三洞天章仙山即七十二福地之一雲陽茶陵上有七峰日偃霞紫微石柱白蓮隠形正陽石耳又有百靈闕真仙洞玉華洞亦松壇般若巖之類石鼓寧鄉琵琶峰湘潭縣南與南嶽祝融相望乃七十二峰之一石人峰茶陵北有巨石對峙髙二十餘丈儼然人立其下巖穴深窈篬筤谷在嶽麓山下十房洞安化縣北洞門廣丈餘門内若㕔入穴中有天窻左右列十房各有門鐘鼓備具後有石田石池秦人洞茶陵上洞有石門不可入但時聞有鐘磬聲世傳秦人曽遯跡于此錦灣湘潭縣西南有石屹立當上流之衝色赤如錦相傳陶侃逰釣于此舊有望嶽釣魚二亭皆侃遺跡寳慶府山曰髙霞城南扶陽邵陽梅山新化武岡武岡寳方有巖洞八所曰棲真上屏大保朝陽迎陽芙蓉隠仙花乳其中龍甲神象皆滴乳所成雲山武岡有七十一峰第六十九福地中有日華山月華山杏花塢投龍峒猿藤水侯公洞橦水新寧桃花洞城南傍多桃花洞口髙丈餘入山過小溪有石巖如屋内有石凳石牀石竈上有員竅通明清山洞新化縣北蒼石環起呀若洞府鸞騫虎踞竒怪萬狀郴州山曰文明城南坦山城西有萬華巖内有石田石倉石鍾之類澗水自巖而出仙母永興石角石刻有天下竒觀字義通石舎桂陽桄榔宜章石囷興寧上有仙亭鐵瓦石壁石牛山興寧靖州山曰寳溪城東北白社㑹同風門綏寧福湖通道古城巖州城西洞穴深廣可六七里鑚字巖綏寧有詩云仰面半窺山月小回頭十里洞雲低施州衞山曰客星城西天樓山勢聳㧞如危樓倚天朝霞嶺大田所峻嶺巍峩曙色將分每有霞彩武昌諸山子曕遷於齊安廬於江上齊安無名山而江之南武昌諸山坡陁蔓延澗谷深密中有浮圖精舎西曰西山東曰寒谿依山臨壑隠蔽松櫟蕭然絶俗車馬之跡不至每風止日出江水伏息子瞻杖策載乘漁舟亂流而南山中有二三子好客而喜游聞子瞻至幅巾迎笑相擕倘佯而上窮山之深力極而息掃葉席草酌酒相勞意適忘返往往留宿於山間以此居齊安三年不知其久也然將適西山行於竹栢之間羊腸九曲而獲少年游者至此必息倚怪石䕃茂樹俯視大江曕仰靈阜旁矚溪谷風雲變化林麓向背皆效於左右有廢亭焉其遺趾甚狹不足以席衆客其旁古木數十皆大百圍千尺不可加以斧斤子瞻每至其下輒睥睨終日一旦大風雷雨㧞去其一斥其所據亭得以廣子瞻與客入山視之笑曰兹欲以成吾亭耶遂相與營之亭成而西山之勝始具子瞻于是最樂昔余少年從子瞻游有山可登有水可浮子瞻未始不褰裳先之有不得至為之悵然移日翩然獨往逍遥泉石之上擷林卉拾澗實酌水而飲之見者以為仙也蓋天下之樂無窮而以適意為悦方其得意以易之及其既厭未有不灑然自笑者也九真山山在漢沔其最著者曰大别蓋禹跡所及嶓源所窮紀于虞書人皆知之予初授漢陽也仰之與龍門砥柱等以為其必有異者也既見之乃平岡横亘江漢之滸猶堵然予每過焉必心羨之曰是猶及見夫菲衣惡食之盛徳歩武於雲根水崖茫乎數千年矣既而侍御朱别山授予郡志考之又有所謂九真山者實惟一郡之鎮去縣百里能作雲雨禱􅂺應予曰安得一往其間乎是年入夏不雨畝田告災民以雩事白爰吉蠲齋宿以五月既望乙丑有事於真舟行蔡店乘月明肩輿登陸行過半從者戒虎乃益鳴金吹角持炬報呼以進又二十餘里至麓夜色微茫樹影參差盤錯攀援扶掖良久至絶頂得古祠焉即九仙之殿如郡志所載云者雞且鳴假寐以旦俯首四顧羣峰羅列乃進典祠之老詢之曰此為襲山此為朝冠山此為走馬山此為黄鶯山此為陳湖山此為稽功山此為崇陽山此為同山皆瘦削其雕刻蜿蜒如蛇龍逺若趨拱迫若侍衞而九真居所安然受之葢體有崇卑則勢因俯仰可以觀物理得人情矣石皷山泊衡州謁石鼔書院實州學也始諸郡未命教時天下有書院四徂徠金山岳麓石鼓石鼓山名也州北行岡隴將盡忽山石一峰起如大磯浸江中蒸水自邵陽來繞其左瀟湘自零陵來繞其右而皆㑹於合江亭之前併為一水以東去石鼓雄據要會大畧如春秋覇主令諸侯勤王蒸湘如兄弟國奔命來㑹稟命載書乃同軌以朝宗蓋其形勝如此合江亭見韓文公詩今名緑净閣亦取文公詩中緑凈不可唾之句退貶潮陽時蓋自此横絶取路以入廣東故衡陽之南皆無詩焉西廊外石磴縁山謂之西溪有窪尊及唐李吉甫齊暎諸刻書院之前有諸葛武侯新廟君山夫洞庭為長江巨浸而君山則洞庭孤絶處也雖三苗據以為險而舜實以昭文告蛟蜃雜以為窟而禹實以是降我凶德民到于今受其賜秦皇㡬以不渡楊么祗以自剪且聞是山不受穢赤沙湖在洞庭湖西夏秋水泛與洞庭為一洞時惟見赤沙舊志云洞庭南連青草西旦赤沙七百里又謂之三湖一統志雲夣湖在郡治西與洞庭青草二湖相連洞庭在北青草在南雲夣在西合為一湖孟浩然詩氣蒸雲夣澤波撼岳陽城郡志金沙洲在洞庭湖中與鹿角對一名龍堆延袤數里杜甫詩龍堆擁白沙即此宋張孝祥有賦葛長庚詩惟有金沙堆下水東西南北任風吹一統志君山在府城西一十五里洞庭湖中一名洞庭山又名湘山狀如十二螺髻山海經云洞厯之山帝之二女居之蓋堯女湘君始居于此故名大酉山楚之西洞庭之北有武陵桃花源即昔人避秦處也踰桃花源水行三驛程即辰陽郡西北踰盧溪浦口四舍許為大酉山即道書所謂第二十六大酉華妙洞天古傳所謂穆天子藏書於大酉山小酉山之中者是已山多石洞谽谺深􅃉不類人世其濱江者特壁立倒出江側上有懸溜成石乳二一擊之作鐘鳴作鼓鳴舊名之曰鐘鼓洞其在内者曰華妙洞洞門甚狹隘幽暗必揚燎仄行乃可入既入里許即曠然平沙可游可卧再進則有石室相傳為秦人藏書室即穆天子藏書處也父老相傳先世有樵夫入洞中即石室取書出見風皆應手滅成灰塵今則無可見矣山之巔有九峰嶺蓋宋道宗時嘗封禪天下名山福地兹山亦以名勝得與洞庭巴陵之勝惟在洞庭一湖按禹貢九江孔殷即此湖水沅漸元辰溆酉澧資湘皆匯流洋溢互潴周迴八百餘里浩浩蕩蕩一碧萬頃月印之而著象風遭之而成文殆與芝城之鼓蠡姑蘇之震澤金斗之巢焦武林之西湖同一注瀾也夫洞庭固極三楚之勝岳陽樓枕巴丘瞰洞庭延庚悒辛縹緲峥嶸巍乎大觀不特君山咫尺擁浮湖面南有祝融北有内方東有黄鵠西有大龍環列拱屹皆在指顧間殆與豫章之滕閣宣城之疊嶂武昌之黄鵠黄岡之竹樓同一壯麗也夫岳陽固據洞庭之勝建始莫詳宋顔延年隂鏗詩尚可考峴山峴山臨漢上望之隠然蓋諸山之小者而其名特著於荆州者豈非以其人哉其人謂誰羊祜叔子杜預元凱是已秀巖臨武縣南十有五里有巖焉在官道之右石崖嶄然峭㧞巖居其高之半巖下左右兩穴水出於左穴為溪廣十尋經巖前流二百歩有竒復入於右穴巖之髙八九仞廣亦如之其中若大厦然中髙而平豁然平曠可坐數百人其奥則轉而又逺􅃉而黒燭之以入宇卑而稍下屬于湍流揭水以往不可窮也巖之東北隅攀緣而上漸髙而漸黒已而大明有穴通於天其餘嵌空如便房側室者甚衆巖之石温潤如璞其形如鐘磬如鳥之企獸之蹲其流石如芙蕖之倒垂雲氣之屯聚下屬于地者如几如格竒怪變態殆不可狀夫黄山谷謂淡巖天下桸兹巖之怪竒無以異也而爽塏過之至於大溪出於穴而復入于穴非特淡巖無之天下之所無也澹山巖山故避秦之地壁水附入于瀟潺潺幽響循山而出水上石壁玉削望之蒼蒼秀直可擬圭璋旁竇作戶戶入可三十歩許乃即佳境大畧中宏下夷折㢘仰外仰上開圓竇髣髴中霤白晝午夜日月往來星斗羅列略無纎翳塵喧既逺萬籟閴寂灝氣升降如觀混沌分儀之初俯仰周旋勢絶􅌄窱席地宴坐可容萬人列榻分房可覆寒士深居習静可制頺齡故昔之避世者恒樂居之遂與世遺􅉨􅉨有獨立忘返之意今觀之巖中遺蹤宛然東曕壁影觀音結跏北睨列圖雷公倒掛定床蟄燕石田繡苔丹井泉香藥爐雲竈逡巡三匝如奉威儀於虖古聖人所謂洞天福地者非謂是歟朝陽巖巖在治城南出城西門舟行二里而近登岸以上不百武至山頂前人即平曠處為堂以憇客南稍轉而東石磴緣崖拾級以降面東而出者巖也巖有上下上巖石聳直濶僅數楹際兩凹相坎如仰蓮辦一石下垂去地二三尺許隠如游雲飄如凝煙疊如蜂房矯如龍首騫如鳯翼而適當其右中兩崖石皆堅潤好者往往留題其間右側一亭額曰觀瀾則江流在其下也過此再厯石磴數十級乃至下巖其巖亦不甚濶然空虚明朗洞然無物一水自中出淙淙有聲大江汩汩循其前可以列席可以布武可以曠目元次山之所得即此也流香洞永城之右大江之西愚溪之南有所謂朝陽巖者郡之形勝最佳處也巖下風磴盤空轉折而不下路盡洞見洞口虚敞泉出㝠中扁曰流香寒徹清芬味冽可酌循泉沿澗而入深探乃得其源泉自石竇噴出合流觸石湍激成聲錚錚鏦鏦雲璈下空忽抑復揚仙佩鑑鏘迴旋委曲由中達外勢欲盡處則瀑飛如練尋丈下懸注於瀟水本天成曲水流觴之地不假疏𨗳引而然游者往往于此席地泛觴縱飲為樂自成佳趣觀音巖縣之西南群峰秀異聳然直逼霄漢曰雨山云山多泉石龍神所都霖雨時行多自此起故名焉予家居者十年凢通之山水厯覽殆遍然未知有觀音巖也罷政復尋舊日工課明年有人向予言巖勝不輟口予聽之宛然巖之在目也是年十月望予往先大夫方伯公里韓九山朱赤厓郭西溪偶在焉是日宿滑溪明日指顧山形問訊小源南山乃發跡處路入羅城轉黄田皆予平昔所未跡山川初識瞻眺一新相逢村老悉古樸有前軰風令人有逺相焉至福夀寺寺無佳處一味幽僻耳明日行十餘里雨山漸近平日所望西南羣峰今在面前矣入山口渡石橋登山僧披衣倉皇下山迎穿林旁石隠現無定時從者先登至山半驚咤驩呼若有追而獲者乃知巖所在須臾至巖予等羨曰昔者所聞詎能盡此巖哉竒觀竒觀兹來不徒矣巖高十餘丈異石纍纍珠聨星附無慮萬狀其獨出而下垂本𦕈而末巨狀如錦囊孤懸虚空者視他石為最異中露一孔其深隠隠金光一㸃灼然而外射觀音像也造化委形自然之巧有如此者世所雕刻普陀巖何可及此巖端古木斜出如蓋其根抱石盤曲如蛇虺又不知其年數以所游諸山此為第一獅子巖在縣南二里瀟湘水石之富名於天下繇唐迄宋酷嗜而篤好之者宜莫如元以山次山刺舂陵最久其所得皆可鉤考在岐陽則謂其出曰峿山謂其溪曰峿溪言吾所愛也在江華則謂其巖曰華陽而已故其銘曰下可家焉是豈不謂天下之羙究于是歟惜乎所謂獅子巖者極瑰竒怪異之觀意元未始窮其深也不然何逺慕而近遺哉豈地寳發伏亦有時耶抑有待而然耶熙寧四年張師聖自佐著作郎是邑以髙才徤力制一郡動能撥劇以為簡得是境於間宴之頃始命僧契合閣于崖陽未㡬而龍泉金繩精嚴而湧現矣觀夫距縣三里所臨驛路有山巉巉据逺而抵呀然吻張如狻猊矯首而將興者巖之表也窮然如蓋竁然如隧四通八達嚢槖天地者巖之奥也神剜鼇負壁起溜垂波舞浪旋圭横帽欹者巖之容也乍晦乍明春滋秋爽隂陽相反冬燠夏凉者巖之候也或煙雲迷濛日月飛控􅐓洞滅沒千態萬變不可得而狀也每月白秋霄則注膏烈火星分碁布嶔崟下上一澈四澈四照無有纎毫杪忽能遯匿其情狀者穿巖巖在州西四十里形如圓廪中可容數萬斛東西兩門通道其間望之若城門又儼月巖髙三十丈盛夏不知暑石壁仰視欲壓塊石著壁如走猊相逐者伏􅙈俯顧者鳯翺翔者龍蛇蟠者龜蹣跚者嵗久石液注而凝者若垂衣􅅂若菡蓞花有竇石筍矗立如入定僧在龕又一竇深黒不可窺行人之聲蜚鳥之音經其中如聞笙簧有石突壁如鞋俗謂龍母靴以近龍母廟故名兠率巖寓舎不逺有兠率巖者神工鬼跡莫之與並乃拉三弟為世外游但江天久隂阻於寒冽日望霽雲以定行李信宿間欵延慶寺固割松膏數百臠為炬火用蓋聞巖中晝晦故也是晚重霄開爽氣候可人遂戒僕吏暨雞聲欲窮林色將瑩各携九節啜粥而行自市尾呼小舟絶漾輕波已達平地凢十五里至鐵坑遥望巖穴不隔尋丈由山脚百歩抵僧德明所居庵舎雖小具含灋界皆疊林莾面列溪澗幽禽巧囀人聲􅗥絶迤􅆔登山磴道盤折雲根鳥徑陟降之間勢若霄壤初得一洞容數十人為竅穴甚細過是㡬半里巖扄恍然天降地湧驚異滋至挺身入巖已覺温鬱衆禠去層緜衣裌然炬以進地勢稍下西行一食頃回視金剛力士形若雕刻夾路祥雲作陣不容履舄薄而視之咸乳石也又西得老君像一軀巖東屑累之上有崪堵坡直截巖頂望不可極西邁覩帳幄髙百丈如猛風所吹聚皺成疊其中一疊扣之清鳴非鼓可比傍則玉池瑩澈甘冷倍常路盡始出間道尋之數桂矗立端正可愛地廣石平廣于甃砌云灋筵四開無有褊陜回而北趨嶙峋細碎若荔枝者若楊梅者若􅌲蕈者若餅餌者若搭架衣服者若飛簷氷雪者物象于品心目俱疑自北而樓臺參錯人鬼髣髴帷中之菩薩雲際之如來蓮花爛熳龍蛇蜿蜒瓔珞盆盂百千萬億竒花異木所至森然凢五易炬返從東際復欲東游同游告以險削湏露頂裸袒乃可深入時筋力匱乏乃益明燭幽之且匍匐傴僂至子扶携出俟日晷已轉午矣大抵自巖口以至深逺群石縱横曲折四維上下皆鍾乳滴瀝凝結而成不留纎隙玲瓏穿虚左右逢源洞口耀暎入之迷人或乘空下垂或從地突起飛走生植屋宇雲霧器皿世之所有無一闕者色多黄白罕有青碧比倣人工加以竒麗乳新體潤則畫臺堆蠟合光散射則火出微鑚珠幡舎利種種莊嚴與親兠率緜界等祁陽諸山祁陽縣北十五里為祁山其形髙峻縣居此山之南故名六十里為烏符山上有紫霄觀有白玉蟾符𤣥妙淳古莫測其運筆起止之跡吕仙洞賔訪邑人蔣暉於此題壁詩曰讌罷髙歌海上山月瓢承露浴金丹夜凉鶴透秋雲碧萬里西風一劒寒東六十里為祁山山瀕大江兩山夾峙百里為排山今建排山驛於此為苦竹山山多苦竹東北三十里為白鶴山一名白鶴嶺數峰髙聳齊雲幽壑水際有石青緑花紋如畫背楚白山出奔避於此其孫改姓屈名處静者煉丹於絶頂乗白鶴上昇有仙壇丹竈存焉東西二百里為白水山山下有水白如練西百里為排城山勢相聯絡故山百四十里為包山山昔有包姓者居其下西北九十里為石燕山一名石燕岡以産石燕石色紺而狀似燕每雷風相薄則併飛頡頏風雨恬霽飛還為石西南一百二十里為四望山勢最髙聳登巔望之衡邵永道皆在目矣南嶽衡山南嶽廟在縣治西三十里至嶽廟風日開霽旅愁豁然廟在衡麓下清泉繞除古松夾路換肩輿趨上封寺寺在祝融峰頂去廟三十里山路陡絶飛瀑争流行十五里憇半山亭下瞰潭嶽衡湘河山如繡過此石磴愈峻輿人皆肩扶魚貫牽纜前驅路旁多髙松怪木珍草竒花香馥穠郁莫可名物上半山亭五里即雲霧𡨕晦咫尺莫辨隂風凍雨令人毛髮灑浙又十里始入上封寺又三里登祝融絶頂謁四大開山祖師像觀捨身崖坐㑹仙橋飛崖絶壁下臨無地而虹梁跨其上信非人境也轉望日臺俯視一氣溟濛了無所覩望中可辨者紫蓋芙蓉天注三高峰而已至衡山縣宿于安寳觀晨興詣岳廟及午蒞牲祭告于南嶽之神止宿于開雲堂壬寅經廟而西北出於廟後右過胡文定公書院入門瞻像儼然二子致堂五峰配焉再拜而出興卜築之思觀其左有山一枝垂下如龍伏然道士曰此前衡嶽廢觀址也鞠為莾草久矣遂定卜為書堂為終老計遂退行就大路躋嶺而上而北右傍石泉冷冷出於兩山之間道士曰此所謂絡絲潭也此祝融峰之泉來達廟下者也其上有峯髙出于右方曰赤帝峯左方曰香爐峯赤帝之上右為紫蓋峯予曰名峰也盍登焉道士曰此峰直立無路可階可望不可即也問其西一峰曰石廪峰也又行而上度一石橋曰玉板橋也又扶而上路稍平風大作吹人欲躓而竊曰此豈祝融君以試我耶雖排山㧞木吾往矣又前至所謂半雲亭小憇焉有小橋曰此迎仙橋也浮雲薄散日光布煖又前而上道士曰此祝髙峰也予曰此上回鴈峰也人以衡州之山士大夫之東西過者便於登覽故謂回鴈峰道士曰祝高高與紫蓋等矣道左之坡有大石臥焉長可丈餘又挾而上篠竹蕭蕭竒花的的至一小寺焉問之則半山亭也又曰舊紫蓋寺也霧雨霏霏復作饌既須臾復霽日光下漏雲靄漸開則又從右而北過兩山一坂如橋然或曰此非仙橋乎即又北行而上山右一石如鼓為小木之根所破予曰以柔破剛氣之力也又前而上則又霧雨霏霏役者曰此雲霧也非雨也高山之常也即又前至三乂路曰此湘南寺近􅁱復之又從佛殿之左棧道而上方丈小憇焉時已在雲霧之表剛風作寒曰往矣即引至方丈之右觀貫道泉泉出於大石之下傍有竒草葉如紫鳯之形問之曰山紫蘇也與世所産逈别下至乂路由又而上有大樹宻林上蔽于天升降㡬十里僧曰此入祝融可四五里上過獅子石石下有泉流出則又有三乂路焉一至祝融峰一至𤣥明洞洞僧饋茶于乂路雲霧暫開午至祝融峰上封寺及暮宿焉𤣥明洞僧楚石來見予曰𤣥明洞何如駱君舉曰為其前無蔽障耳雞鳴上頂見日浴癸卯晨興從寺從小徑夾蓧竹雜黄白野菊行不能七里至望月臺題名於石道士又指其西一峰此芙蓉峰也下由乂路至𤣥明洞大書二詩留刻石壁下祝先兠率二詩小憇遥望二峰挿天曰此天柱峰也又五里至南臺寺宿焉時則大霽與上方頓異是夜風鼓松杉聲如大海之波濤然甲辰下南臺過飛來石下退道坡坡一百二十一級皆一石為之右傍觀金牛跡是夕還嶽廟乙巳視沈都憲所為白沙先生築書院未成之址武當山大嶽大和山之勝相傳𤣥帝之先淨樂國王治䴢今均即䴢地宫因以名宫右折有紫雲亭亦傳𤣥帝生時有雲彌故也按紀穪𤣥帝生於神農氏末年按春秋傳文公九年楚子伐䴢治有䴢名世之相去甚逺而謂淨樂治䴢則其國在當時孰為統哉明日予自淨樂過石板灘經迎恩宫又十五里至遇真宫宫左右山遶如城橋名㑹仙入山初道有治世𤣥嶽方巍巍乎與山齊乃嘉靖年新建是夕次宫中明發入仙闗别一境界由元和迴龍二觀而土崖雲嶺樹谷音野色應接不暇踰太子坡即復真觀階下有聖母滴淚池龍泉觀對天津橋九渡澗流於下諸澗之水㑹此入梅溪洞出為淄河紫霄宮倚展旗峰下千仭如削宛然皂纛形三分五老峰在前日池月池在于左由宫後右轉陟山之椒根石壁龕云太子巗為蓬萊第一宫又轉而南乃福地殿天下七十二福地此其一也殿前擁寳珠峯後倚􅗄火巖萬松亭下瞰禹蹟池池上有亭謂神禹𨗳山曽寓此威烈觀在宫北二百武唐太守姚簡有功於均民祀之自此山更峻極路更盤折躋攀直上至南巖宫景益繁觀益竒泉曰百花井曰甘露橋曰天乙池曰大乙其尤絶賞者從殿左折而東陟崖而西為南薰亭外有石枰相傳為純陽故物復折而下過紫霄巗巗前一石挺出䦨外狀如龍首其傍崛起灌莾中者為禮斗臺又東為風月雙清亭西望捨身崖若垂天之翼其上為飛昇臺下為試心石極天下最險絶者歩梯雲橋過榔梅祠𤣥帝嘗折梅寄榔誓曰道成當結實後果然異哉自是松杉夾道藤蘿擁橋谷轉峰迴壑鳴泉注躋雲躡霧至朝天宫不可輿乗杖履而上厯數十級為一天門度摘星橋下臨深谷遥瞻前峰人行而在天上又數十百級為二天門四顧皆削儼若虎豹之闗虬龍之隘仰望三天門飛鳥不過乃奮登數十百級始造其門葢三門之升皆石䦨委折為倚玉鐵繩盤錯如長虹亦竒矣哉由朝聖門就致齋所憇焉是夕月明如書星觀可摘金風裊裊玉露翛翛樹杪秋聲室虚夜氣神恍若在蓬萊方丈坐以待旦由南天門直登極頂昔𤣥帝自此冲昇巍巍金像禮覲之餘瑞日在東祥光繞殿殿左右益以飛棧棧外為檻檻外為紫金城闕四門以象天闕南有九卿玉荀西有太明白雲北有顯定皇崖東有竈門萬丈諸峰近擁天柱而厥峯石脊有金銀色松盤如龍虬形儼上界五樓十二城也仰觀俯察惟此大嶽者其來也乾兌之發其應也翼軫之拱跨均房環襄荆擁列者七十二峯三十六巖二十四澗袤延者八百餘里此天下名山非𤣥武不足以當之故曰武當信哉從故道而下復由南巖紫霄分路北行三十里至五龍宫宫門為道九曲十八折殿九重百六十三級殿前二池水從石龍口出宫西自然庵陳希夷居此感五􅉋龍君授以睡灋随登龍頂下有龍湫而北有巨杉鶴常巢棲隠仙巗乃尹軌枰彈之所夜籟澄寂嘗聞歩虚玉磬聲又四十里至玉虚宫宫殿廊檻視諸宫更壯麗内有仙衣亭望仙樓八仙臺仙桃觀皆竒勝原張三丰所寓余留宫中屬提㸃宋衍慶軰修焚以申祝釐之誠又明日清曉度東山橋仍出仙闗誠哉清都紫府琳區𤣥圃甲于天下太和山我國家尊太嶽為帝畤帝𤣥君昔帝降于䴢今治故宫曰凈樂其東當始降之室治紫雲亭去州五十里入西南表峽口曰𤣥嶽環中山四合流出入無端負坎抱離可當吉土文皇帝跡異人所在為之築遇真宫異人遺杖笠悉留中命尚方鑄金像之歸守者八仙闗為元和觀西入馳道其南為玉虚宫山水脩廣倍遇真舊為武當縣南山如負扆信非𤣥武不足以當之宫制視漢未央即祁年勿論已其西池亭洞闥亦異人所棲西上望仙樓惝然若將有遇也馳道西為仙桃觀通八仙臺又西為華陽亭跨石橋臨芙蓉沼西出則田廬鷄犬亦為一區去玉虚躡西南進次迴龍觀太𤣥觀入紅門通房陵道道傍有太上巖巖鑱石象太清其左二龍蜿蜒巗石下又南則八仙觀中堪輿右入七里溝脩木干章如宎夏縁岡為開山故道遺巨石在焉賓大上為羅公巗髙出絶壁往年屋之居羅太史凢七檻舉目望西南諸峰盡在目眦反紅門入官道進次太子坡陂陁中分扼其吭為復真觀周垣跨道逶迤髙下因之出垣下來行乗天津橋九渡澗澗道幽絶其陽則淵黙亭沿澗東入玉虚巗石嶂夾流若千里嶂若歩障雜樹繪之深入石磴浸髙若自明河趨閣道磴窮則棧棧窮則巖巖上視有龍虎文其石雷文故中奉帝居右奉雷部西南望則天柱當峽中循故道還由淵黙西南上除道曲折望行者如登閬風紫霄附展旗峰石嶂崇廣皆數十百丈三公五老前侍亦一隩區宫制髙倍玉虚脩當其半奉祠者無慮數千指其廬率髙下居宫前為禹跡池築小亭出池上池右福地其陽為賜劍臺其隂則萬松亭出木末太子巗出宫後亦有亭由禹跡右旋古道甚治乃今多徑者廢勿行古道西上當南巖之南舎南巖西厯黒虎巖泉石相望于道昔有巢居者遺搆猶存進次杉木林分二道其右下行渉澗遵宿莾容單車峽中轉入西南出峽為清風􅼍葢故韓糧道也左上行躡萬丈峯下登朝天宫其東由鳥道出三公巖則上巖也路險絶不容足學仙者劉媪居之其下亦為三公巖相距三舎巖南鄉爽塏可居然必取道玉虚巖多厯險阻始得至朝天西上拾級八百五十有五當天門三天門皆竇石峽中有巨靈斧跡初入門降數等稍平衍依三公峰為文昌祠過祠則摘星橋橋下澗水如神瀵縁絙由天梯上梯如竿掲雲瑞距躍五百達重門足力竭矣倚試劍石箕坐坐更百歩達三天門由此折旋而升垣行數百歩厯階南下又折而東上為太和宫宫面南香爐蠟燭三峯當席宫前則先朝神室陡置于兹由南天門入紫金城丹梯九轉出天柱峯絶頂範金為黄屋承以瑶臺帝位中央羣神列侍精羙奪目儼若化人之居即今之國工宜不及此正位東鄉髙出七十二峰如羣弟子侍先師莫不齋立近則金童玉女峰二當膝承之左三公右九卿帶七星揖五老仙人隠士順風而翔白雲出沒衆壑間如觀陸海諸峰或如碣石或如蓬萊距如斷鰲幻如結蜃細如漚鳥脩如北溟之鯤雜出如珊瑚枝浮如萍實纍纍乎如鞭驅石汜乎如漢使者之乗槎逺而望之方城一耜漢水一瓴掩楚蜀畧周秦即嵩華衡霍匡廬峨嵋悉辟易無何有之鄉矣乗磴西下為清微宫僻宫深谷中其制不廣然以幽勝妙華巖著焉南巖當大和之陽宫北面據五龍之奥宫右石延覆於道其上有巨人跡若倒懸宫後即南巖脩數十丈髙數丈巖下峭壁數十丈東西脩數百丈如髙墉巖中列祠亊三亭二即神仙多倬詭此為壇塲其下有禮斗臺徑絶罕至西出如乗墉右上躡飛昇臺其傍露臺臺當志心石臺端有蛇徑通一室當其杪以居宫東北􅗄火巖亭附巖畔距展旗峰近下視紫霄展旗為尹喜巗今居北丘修不二灋由南巖宫下為滴水巖仙侣巖度行笆橋入青羊澗青羊巖當澗之曲虚無廬渡青羊橋躋五龍千歩而峻門垣九曲始達應門宫制九重前列階八十有一後七十有二至髙矣左髙殿奉玉像五相傳掘土得之其制不異庸工好事者神之耳宫前有五井天地池日月池後宫當五龍峰其上有五龍池則其窟宅也凌虚巖去宫五百歩一黄冠居之毎飯必有餘以待衆狙衆狙皆喜否則破釜甑去莫之誰何巖前則希夷誦經臺今尚盛臺出臨澗當其上為亭去宫五十歩為自然庵故有鍊丹池今始復出五龍渡磨鍼澗過隠仙巗巗虚明視北道諸巗為勝次繫馬峰為仁威觀繚垣方廣數十丈石渠衡之就中為石梁當門以度出茅阜峰下為五龍行宫地始平脩廣楚楚過此則玉虚道也九疑濂溪月巗三勝圖總叙舂陵古零陵郡星野翼軫分屬其隂陽之精上達於天者則然矣而山川之形勝有曰九疑曰濂溪曰月巗九疑舜帝所過化也濂溪元公所毓秀也而月巗又元公所悟太極之至玅至玅者也夫舜為有虞之大聖元公為有宋之真儒一聖一賢實得乎九疑濂溪月巗之形勝則斯九疑也斯濂溪也斯月巖也其造化英華寧非先舜帝元公以開聖賢之兆者乎誠楚南之竒觀號天下之無厹者也九疑山方二千餘里四州各近一隅世穪九峰相似望而疑之謂之九疑亦云舜登九峰疑禹而悲從臣自作九悲之歌因謂之九疑九峰殊極髙大逺望皆可見也彼如嵩華之峻峙衡岱之方廣在九峯之下磊磊然如布棋石者可以百數中峯之下水無魚鼈林無鳥獸如蟬蠅之類聽之亦無往往見大谷長川平田深淵杉松百圍榕栝並之青莎白沙洞穴丹崖寒澗飛流異竹雜華回暎之處似藏人家實有九水出於其山四水流灌于南海五水北注合為洞庭若度其髙平北洞庭南海之岸直上可二三百里不知海内之山如九疑者㡬焉九疑山圖說九疑去治六十里山有九峰曰朱明曰石城曰石樓曰娥皇曰舜源曰女英曰蕭韶曰桂林曰杞林九峰之彷彿難辨是謂疑世呼之為九疑山疆遵嶽南雄控百粤萬谷濞㑹林木蒙翳望則㟰􅔌尊巍上冠星精下頴地絡蜿蟺駢起若游龍之上附于天曵𤣥淵而闢坤維㧞露真秀謂武夷天姥赤城鴈蕩莫能是過洞天窅曲其亦明劃日月混混沄沄諸源迭出其下有曰舂水舜源水湍瀑成川溉澤原野寔山川泄其不息匯湘楚之竒觀者也洞豁深渉九渡咸濟利以橋有柱石懸挿垂千仭許前則麓床石鑑重磬龜臼皆劖刓其象古傳舜帝之陵在兹焉有娥皇女英峰寰宇記云峰之樵採有禁傳者葢徵之史記謂舜南巡狩崩于蒼梧之野太史氏復識之塟於靈陵之九疑原諸載籍西漢郡為長沙武帝元鼎六年改置為零陵郡向太史之識即兹九疑也濂溪圖說山在州西一十五里有砦鄉人所築以避冦亂者俗呼為鞍心砦其麓周氏家焉左龍山右豸嶺岡壠丘阜拱揖環合世傳有五墩繞宅若五星焉世久為鄉人所夷今僅存其一濂溪先生實生於此山之西石壁上有古刻二大字曰道山下有石竇深廣不可窮有泉溢竇而出者濂溪也清冷瑩徹如飛霜噴玉大旱不涸積雨不溢莫知其來之所自知州萬進刻其上曰聖脉故人呼為聖脉泉泉之上為有本亭迤東為風月亭沿流而東為濯纓亭又東為故居家廟在焉先生子孫居之又東為大富橋先生㓜釣游其上濯纓而樂之即其地也月巖圖說右月巖在故里西八里許有山巍聳中為巗洞東西兩門可通往來望之若城闕當洞之中而虚其頂自東望之如月上弦西而望之如月下弦就中望之則又如月之望随行進退盈虧異狀俗以其形象月故呼為月巖好事者竒之以為太極呈象若河之圖洛之書㑹謂先生之道未必因月巖而得但此山不生於他而生於先生之故里則謂之太極洞也亦宜因磨崖刻之曰太極洞云洞高可四五十丈寛可容數千人中有濂溪書堂盛夏無暑竒石峭壁如走猊相逐如伏犀俯顧如龜蹣跚如鳳翺翔如龍蛇蜿蜒而右液凝注望之如滴西壁有竇石筍矗立如入定僧在龕又一竇深黒不可入蜚鳥之音行人之聲經其中如奏笙簧誠天造竒觀也圖書編卷六十三
