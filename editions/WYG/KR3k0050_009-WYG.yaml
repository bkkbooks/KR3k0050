body:
  text: 圗書編卷九明章潢撰五經四書各圖總叙易畫自庖犧其卦象皆可以圖而考也詩書春秋三禮四書雖其圖之見於大全與諸集傳者亦多矣要皆後儒因其中所訓而圖以記之原非易卦圖象比也兹亦類集圖書編者何哉盖河洛卦爻皆天地造化之秘聖人或規而圎之或矩而方之或縱横錯綜而變通之無非假象以洩乎化機之隠示人性命之精也五經四書孰非圖書之藴奥哉矧如書九疇詩六義春秋四傳之類其穿鑿附㑹如圖書之混淆者不少也故間亦掲􅀴書大綱以辨詰一二俾稽今博古者無徒習見聞所障亦如圖書經緯表裏之說而莫之辨也噫五經四書即圖書卦象或以言顯或以象昭原無二也人能心誠求之如陽明先生發明大學古本於聖學豈曰小補之哉五經易書詩春秋禮記經解孔子曰入其國其教可知也其為人也温柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔净精㣲易教也恭儉荘敬禮教也屬詞比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂荀子曰書者政事之紀也詩者中聲之所止也禮者法之大分類之綱紀也故學至乎禮而止矣夫是之謂道徳之極禮之敬文也樂之中和也詩書之博也春秋之㣲也在天地間者畢矣又曰禮樂法而不說詩書故而不切春秋約而不速荘子曰詩以道志書以道事樂以道和易以道隂陽春秋以道名分荀之言重乎禮荘之言遺乎禮可見儒學所以異於老荘者其辨在乎禮而已矣揚子曰說天者莫辨乎易說事者莫辨乎書說體者莫辨乎禮說志者莫辨乎詩說理者莫辨乎春秋班固曰六藝之文樂以和神仁之表也詩以正言義之用也禮以明體明者著見於無訓也書以廣聴智之術也春秋以斷事信之符也五者盡五常之道相須而備故易為之原真西山曰六經於五常之道無不包者今以五常分屬於六藝是樂有仁而無義詩有義而無仁也大率漢儒鮮得論經指要反不若荘生當理也六經皆心學也心中之理無不具故六經之言無不該六經所以筆吾心之理者也是故說天莫辨乎易由吾心即太極也說事莫辨乎書由吾心政之府也說志莫辨乎詩由吾心統性情也說理莫辨乎春秋由吾心分善惡也說體莫辨乎禮由吾心有天叙也導民莫過乎樂由吾心備太和也人無二心六經無二理因心有是理故經有是言心譬則形而經譬則影也無是形則無是影無是心則無是經其道不亦較然歟然而聖人一心皆理也衆人理雖本具而欲則害之盖有不得全其正者故聖人復因其心之所有而以六經教之其人之温柔敦厚則有得於詩之教焉疏通知逺則有得於書之教焉廣博易良則有得於樂之教焉㓗净精㣲則有得於易之教焉恭儉荘敬則有得於禮之教焉屬詞比事則有得於春秋之教焉雖然有是六者之不同無非教之以復其本心之正也嗚呼聖人之道唯在於治心心一正則衆事無不正猶将百萬之卒在於一帥帥正則靡不從令不正則奔潰角逐無所不至矣尚何望其能却敵哉大哉心乎正則治邪則亂不可不慎也秦漢以來心學不傳往往馳騖於外不知六經實本於吾之心所以髙明騖於虚逺而不返卑近安於淺陋而不辭上下相習如出一轍可勝嘆哉然此亦皆吾儒之過也京房溺於名數世豈復有易孔鄭專於訓詁世豈復有書詩董仲舒流於災異世豈復有春秋樂固亡矣至於小大戴氏之所記亦多未醇世又豈復有全禮哉經既不明心則不正心既不正則鄉閭安得有善俗國家安得有善治乎惟善學者脫畧諸說獨抱遺經而體驗之一言一辭皆使與心相涵始焉則戛乎其難入中焉則浸漬而漸有所得終焉則經與心一不知心之為經經之為心也何也六經者所以筆吾心中所具之理故也周孔之所以聖顔曾之所以賢初豈能加毫末於心哉不過能盡之而已今之人不可謂不學經也卒不及古人者無他以心與經如冰炭之不相入也察其所圖不過割裂文義以資進取之計然固不知經之為何物也經而至此可不謂一厄矣乎雖然經有顯晦心無古今天下豈無豪傑之士以心感心於千載之上者哉經常道也其在於天謂之命其賦於人謂之性其主於身謂之心心也性也命也一也通人物達四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也是常道也其應乎感也則為惻隠為羞惡為辭讓為是非其見於事也則為父子之親為君臣之義為夫婦之别為長㓜之序為朋友之信是惻隠也羞惡也辭讓也是非也是親也是義也序也别也信也一也皆所謂心也性也命也通人物達四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也是常道也是常道以言其隂陽消息之行焉則謂之易以言其紀綱政事之施焉則謂之書以言其歌詠性情之發焉則謂之詩以言其條理節文之著焉則謂之禮以言其歡喜和平之生焉則謂之樂以言其誠偽邪正之辨焉則謂之春秋是隂陽消息之行也以至於誠偽邪正之辨也一也皆所謂心也性也命也通人物達四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也夫是之為六經六經者非他吾心之常道也故易也者志吾心之隂陽消息者也書也者志吾心之紀綱政事者也詩也者志吾心之歌詠性情者也禮也者志吾心之條理節文者也樂也者志吾心之歡喜和平者也春秋也者志吾心之誠偽邪正者也君子之於六經也求之吾心之隂陽消息而時行焉所以尊易也求之吾心之紀綱政事而時施焉所以尊書也求之吾心之歌詠性情而時發焉所以尊詩也求之吾心之條理節文而時著焉所以尊禮也求之吾心之歡喜和平而時生焉所以尊樂也求之吾心之誠偽邪正而時辨焉所以尊春秋也盖昔者聖人之扶人極憂後世而述六經也猶之富家者之父祖慮其産業庫藏之積其子者或至於遺忘散失卒困窮而無以自全也而記籍其家之所有以貽之積之世守其産業庫藏之積而享用焉以免於困窮之患故六經者吾心之記籍也而六經之實則具於吾心産業庫藏之實積種種色色具存於其家其記籍者特名狀數目而已而世之學者不知求六經之實於吾心而徒考索於影響之間牽制於文義之末硜硜然以是為六經矣是猶富家之子孫不務守視享用其産業庫藏之實積日遺散忘失至為窶人丐夫而猶囂囂然指其記籍曰斯吾産業庫藏之積也何以異於是嗚呼六經之學其不明於世非一朝一夕之故矣尚功利崇邪說是謂亂經習訓詁傳記誦沒溺於淺聞小見以塗天下之耳目是謂侮經侈淫辭競詭辨飾奸心盗行逐世壟斷而猶自以為通經是為賊經若是者是並其所謂記籍者而割裂棄毁之矣寧復知所以為尊經也乎總論聖學不明不行豈有他哉亂之於二氏虚寂之見者其弊雖隠而易見亂之於諸家支離之說者其弊愈雜而難明欲其大明而大行也亦豈有他哉聖門經典當一以孔子為宗而諸家之訓詁止存以備􅄁考焉可也彼孔子之上續列聖之緒下啟諸賢之傳其道萬世無弊王通謂其於夫子受罔極之恩者此也今雖去孔子千數百載而其道如中天之日照耀今古以六經四書尚為世所尊信茍有志孔子之學者以吾人之本心質之經典其中正之軌度為可循也况刪詩書定禮樂賛周易修春秋皆出自孔子手筆或篇章稍紊於秦灰而各經之可信者不如故哉奈何自漢以來諸儒不知反諸身心以求乎聖門一貫之真乃各執意見著為訓詁且以斯文未䘮於天者盡在兹也故佛老之徒得乘其弊直指本心以倡其虚寂之說反訾聖門典籍為糟粕亦自取之耳然二氏之書夫固各一其說而未相淆也宋儒宗五經斥佛老其有功孔門也大矣何今之學不溺於二氏之虚寂則雜於諸儒之支離弊雖不同同歸於聖道之榛蕪人心之荆棘其責將誰諉也雖然聖人之五經具在也易以道人心之中正書以道人心之祗敬詩以道人心之和平禮以道人心之品節春秋以道人心之是非則是人心為五經之本而謂經為人心之註脚者非謾語也雖其中之所載廣大精㣲未可以一端盡而大㫖則各有攸存觀聖人各取一篇以冠乎經之首則首篇即一書之要也易首乾坤書首帝典詩首闗睢禮首曲禮春秋首春王正月謂非一書之㫖要奚可哉是故提其綱則目自舉掲其緒則縷自清惟乾坤明而六十四卦中正之藴可推矣帝典明而五十八篇祗敬之忱可推矣闗睢明而三百篇和平之情可推矣春王正月明而二百四十五年是非之公可推矣以至論語之學習大學之格物中庸之未發孟子之義利皆其提揭最要者也惜乎諸家之留心經書也非不竭精思殫嵗月章分句析極其繭絲牛毛之精然而於各經首篇大要所闗反支離沉晦又何怪髙明者甘心虚寂之說而自以為𤣥解也然則舎五榖以求飽於百菓之異品者固昧乎飲食之正而彼之執稊稗為稻粱者恐亦以五十步笑百步耳聖學不明不行豈可専罪夫異端之徒哉要之各執己見以自售不能一以孔子為之宗焉故也志聖學者固宜就正於聖經而志窮經者必於孔子首經之㫖精義入神焉其庶幾矣五經肇自伏羲以及周叔世雖聖賢述作不齊而一皆定之孔子以垂教萬世者也易以象教書以身教詩以聲教禮以理教春秋以名分教若各一其義也然道一也自天地言之為乾坤自朝廷言之為君臣自一家言之為夫婦自一人言之為身心自一時言之一以天王為統紀此五經之要領也各經大義俱寓於篇首而讀五經者宜究心焉何也易首乾坤之變動周流雖坤亦代乾以有終而乾尤易之主也書首堯典舜典朝廷之乾坤也堯以欽明帝於唐而舉舜以敷治故舜徳重華協帝不過舉九官十二牧而紹堯以致治耳雖傳之三王率是道也詩首闗睢即一家之乾坤也文王刑于寡妻而太姒窈窕之徳足為好逑故葛覃而下風化漸被南國而成周家一統之治俾雅頌各得其實肇於兹焉禮首曲禮一人之乾坤也毋不敬儼若思所以正心修身莫非天理之節文凡檀弓曾子問諸篇俱不過發其經曲之極其詳盡者耳春秋首春王盖一嵗四時始於春而天道正萬邦臣民統於王而人紀明其諸侯大夫或遵或悖褒貶自見而春秋之乾坤不其定矣乎可見諸聖賢述作之㫖意不能盡同其定於孔子道則一以貫之耳况經也者萬世不易之常道也猶五行之在天地五徳之在人心要皆太極之闔闢變化隨在易其名也是故月一也隨江湖池沼盆盂之水而全體具見雖水有小大月無増减道在五經猶是也以此玩味五經雖一語一字莫非斯道之著見矣又可於五經之大㫖而分析之哉五經總意經者古今常行常明隨變所適而不失其常者也是故言萬古不息者孰不歸之性乎然天地間萬象萬化林林秩秩皆從性天中流出即其支流派别若變動不居而從性天中時出者亘萬古而不易焉可見性即經也故曰天生烝民有物有則民之秉彞好是懿徳彞者常也經之謂也生民常秉之物則雖欲變之不可得而變也不以堯増不以桀損不以孔存不以蹠亡不以綦隆興不以衰亂㓕人人各正時時運行者也蹈此之謂道得此之謂徳道徳有於身者則世不常有焉愚者既無所見而智者各執一偏經之所以不明不行得非自戕其性天之大經乎夫經一也然而有五經焉何也五經一性也聖人各從其性天中所流出者定之以立萬世不易之教故各一其名耳是故性天之盈虚消息神妙萬物不可得而形容之也聖人特假竒偶之象以明之所以六十四卦生生不測者皆可得意於象辭之表而乾知坤作萬古不變孰非此性之生生乎性天之經綸綱紀一日萬幾不可得而形容之也聖人特因厯代之文以紀之所以典謨訓誥維持世教者皆可㑹元於政事之著而帝王執中萬古不變孰非此性之降衷乎性天之靈機竅妙有感則鳴不可得而形容之也聖人特因咏歌之聲以别之所以國風雅頌各得其所者皆可逆志於聲歌之末而感物成聲萬古不變孰非此性之思無邪乎性天之是非毁譽直道而行不可得而形容之也聖人特假筆削之義以明之所以二百四十二年行事之實皆可考核於義例之中而天王一統萬古不變孰非此性之名分乎性天之儀文度數髙下散殊不可得而形容之也聖人特因退讓之節以明之所以三百三千經曲各當皆可究竟於節文之間而性天之秩叙萬古不變孰非此性之無不敬乎信乎易書詩春秋三禮皆吾性固有之物也後之窮經者只於疏訓解釋以沉潜其精神而不反求諸身焉不知隂陽竒偶皆天地萬化變動之象也政事號令皆帝王一時可見之迹也咏嘆歌謡皆人心一事感觸之聲也褒貶予奪皆國史隨事直書之筆也升降裼襲皆三禮制度文為之詳也其本不在是也然則本安在哉即所謂經也即所謂吾人固有之性是也果能本諸身以求其端則乾坤易簡之理即吾性之易帝王一中之傳即吾性之書天機感觸之聲即吾性之詩天王一統之義即吾性之春秋上天秩叙之原即吾性之禮一盡性而五經之大本大原備是矣若舎原而求之流舎表而求之影使聖人刪述之本㫖反支離於經師傳襲之見聞何怪乎萬古之道不常明常行於天下哉然則窮經者自窮其性天之真凡今古典籍皆從此中出也故孟子曰君子之道反經而已矣漢儒専經名家源派考議周禮太史以至小行人皆掌官府之典籍外史掌三皇五帝之書及觀列國之所陳魯史之所具左史倚相之所讀煩矣備矣孔子觀載籍之紛紜懼覽者之不一遂乃定禮樂明舊章刪詩為三百篇約史記而修春秋讃易道以黜八索述職方以除九丘討論典墳斷自唐虞以訖於周故知由孔子而前學術非寡自有六經以後趨於約也身通六藝之士雖有三千發明章句始於子夏於易有傳於詩有序於禮有儀䘮服一篇於春秋以授公羊髙穀梁赤定撰論語此子夏所以居文學之科也或易以商瞿云然猶春秋分為五左氏公羊穀梁鄒氏夾氏詩分為四毛氏齊魯韓易有數家之傳諸子紛紜以召焚坑至漢而始出易自魯商瞿子木受於孔子以授魯橋庇子庸子庸授江東馯臂子弓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子装而為漢興言易之祖何授丁寛授田王孫王孫所授為三門曰沛人施讐東海孟喜瑯琊梁丘賀由是有施孟梁丘之學又有東郡京房為京氏學又有東萊費直傳古文易為費氏學沛人髙相為髙氏學施孟梁丘京氏四家皆立博士而費髙二氏未得立後漢陳元鄭衆皆得費氏之學馬融鄭元荀爽並為之傳註自是費氏大興京氏遂衰施孟梁丘髙氏俱亡今所得者皆費氏也至晉王肅又為費氏註梁陳鄭元王弼二註列於國學齊代推傳鄭義至隋王註盛行鄭學寢㣲矣尚書漢濟南伏生遭秦亡其書口授二十八篇又河内女子得秦誓一篇獻之伏生作尚書四十一篇以授同郡張生張生千乘歐陽生世傳至歐陽髙為歐陽氏之學夏侯都尉受業於張生世傳至夏侯勝為大夏侯之學勝傳於建為小夏侯之學故三家並立至東京相傳不絶而歐陽為盛孔安國得壁中書考定為五十九篇作傳而私傳於都尉朝為尚書古文之學未得立傳者中絶遂有張覇偽書二十四篇後漢杜林傳之賈逵作訓馬融作傳鄭𤣥亦為之註非孔氏舊本也至晉永嘉而歐陽大小夏侯之學並亡東晉及齊始行安國舊本列之國學隋以後孔氏行而鄭氏㣲矣詩漢初魯申公受於浮丘伯作訓詁是為魯詩齊轅固生亦傳詩是為齊詩燕韓嬰亦傳詩是為韓詩三家皆立於學官又有趙毛萇善詩自云子夏所傳作古訓傳是為毛詩河間獻王好之未得立東京謝曼卿為之訓衛敬仲又加潤色鄭衆賈逵馬融並作傳鄭𤣥作箋而至今獨立齊詩亡於衛魯詩亡於晉韓詩㣲禮漢初有髙堂生傳十七篇又有古經出於􅀈中河間獻王上之合五十六篇至宣帝時後蒼最明其業乃為曲䑓記以授梁人戴徳及徳兄子聖沛人慶普古禮合二百四篇戴徳刪其煩重為八十五篇為大戴禮戴聖又刪定為六十四篇為小戴記大小戴慶氏三家並立後漢惟曹氏傳慶學漢末鄭𤣥傳小戴之學後以古經校之取其義長者作註為鄭氏學立於國學餘多散亡又無師說矣春秋夫子作春秋有所褒諱貶損不可書見口授弟子弟子退而異言丘明恐弟子各安其意以失其真故論本事而作傳也口說流行故有公羊榖梁鄒夾之傳漢初四家並行鄒氏無師夾氏未有書齊人胡母子都傳公羊春秋授東海嬴公以至東海嚴彭祖魯人顔安樂故後漢公羊有嚴氏顔子之學與穀梁三家並立左氏漢初出於張蒼之家本無傳者賈誼為訓詁以授貫公後劉歆欲立於學而不得至建武中韓歆陳元欲立之於是以魏郡李封為左氏博士而諸儒攻之及封卒而罷然私相傳者甚衆賈逵服䖍並為之訓晉杜預又為經傳集解穀梁范寗註公羊何休註左氏服䖍杜預註後皆立國學至今而公穀無私說議曰漢之言易者六家而費氏最後出言書者四家而孔氏後出言詩者四家而毛氏後出言春秋者五家而左氏後出禮雖同出後蒼而小戴最後出然至於今而惟後出者為衆所宗將掇拾遺灰考覈未精朱紫適炫而正始未先表見邪厯正而後名山石室之藏往往精出而諸儒又得以所誦習參互考定以證是非而後先王之迹著是未可知也然余不能無感矣孔氏出壁中之藏有天幸矣而未得立至使憸夫售其贋又更四百餘載而緝熈於殘缺之後何運之餘厄也詩四家之傳渙如參辰不相屬焉獨毛詩適與經傳合而後儒信之似矣公穀左氏之違戾盖不特亥豕魯魚偶誤一二也豈有夫子口授而及門之徒已自殊畛域耶世儒擇其差可信者猶曰左氏而近誣之譏尚何辭焉此三經猶可言也禮樂不可一日缺而漢之言禮者後蒼而外無異同奈之何踳駁至今不可校閱說者謂衰周諸侯已去其籍然使漢興君臣加意於斯未必不可收拾百一而卒以澌滅是可慨也迨夫大易之義彌難言之矣聖人設象以明教而理自存非獨以明理也借令聖人將以理教天下㣲易誰不可明者而何必以枯黙無朕之畫精妙簡寂之辭為哉而世儒罕知其故遂畧象數專治文義以飾鄙陋以此治易不若已之為愈而猶互詆京焦黨嗤孟喜彼京焦孟喜雖未必入羲周之室而不猶愈於隔籓籬者乎愈趨而下以至王鄭鄭則多參天象王乃全釋人事易之道豈偏滯於天人哉而天象難尋人事易習折楊黄華學徒多從之至宋極矣雖然非實有其道通神明之徳者不足以與於斯千載而後知其解者旦暮遇之不知其解者雖耳提焉猶是也易故未易言也由是言之吾疑聖人之學已絶而其所傳者不啻影響也吾安知後出者之是而前廢者之非邪區區欲以數千年之後論數千年不可知之前聖人不能而况其凡乎然則將遂已而已乎是烏可已也嘗一臠之肉知一鼎之烹矣見瓶水之氷知天下之寒矣凡有㣲言無論訛正宜並存習以俟融者天不隕絶斯文或生聖人起而折衷之不爾則問禮問官之安從刪正賛修之異取而聖人亦末如之何矣昔漢之君臣詳延廣厲功至偉矣而吾於是有深尤者石渠白虎之議也據天子之勢而侵聖人之官舉一廢百破壊圖書不知妄作莫斯為甚曽不若衆建郡學博徵明儒之為益而顧不出此悲夫馬鄭二子多所考定時稱大儒溺其教矣今言出而舊文廢一家行而衆言息遂使將來學者日趨簡易不焚而滅職是之由世儒祖之更相著述至使其智彌寡者其取彌多馳騖汎濫以示其博而纇瑕屢見是何為者也彼囂囂者之載筆也猶將簧鼔耳目而况以儒命世者冒為之學徒專師轉相讃揚若是而後出者不驩然相率騖之如馳乎夫以儒命世者言惟作訓不可不慎也一言而掃百世顓門自昔師儒之學可滅跡絶也而茍所定者不皆是所去者不皆非焚者其誰也昔孔子以至聖之徳去羣聖不逺也載籍尚完學術未龎識大識小者其人不寡也兼斯五者猶謙讓於六籍之事曰吾述而不作信而好古葢載之末年從心不踰而後乃敢撰定然猶三絶韋編而曰庶幾假我數年以卒學易可以無大過矣後代儒者㣲孔子至聖之徳而有千載曠不相屬之勢載籍爛滅異端烽慂獨聞獨見無所傳業借有一二師友並持不下甲是乙非師心自是僴然授墨謂吾既以知言矣是也非與學易叙易之為道屢遷羲文周孔之易一而已矣非强一之也各隨其周流六虚者惟變所適四聖不以一毫巳意參於其間也譬諸傳神者庖犧氏既肖其象而題其姓名矣文王則合六十年以賛之周公於十年各為之賛孔子十翼乃釋文周之辭且發其未盡之藴也是象雖不足以盡神而敬求斯人之神則不出乎四聖象辭外矣葢四聖親炙斯人徳容既描冩其真後人安得不依其象以求其辭而可參之以意見哉是故造化之法象見諸畫聖人之精藴洩諸辭變即其象之不拘占即其辭之響應也矧居觀動玩洗心宻藏六十四卦三百八十四爻孰非己之象辭變占哉顧人之神明黙成何如耳易天生神物蓍龜聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之古者庖犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情天地定位山澤通氣雷風相薄水火不相射八卦相錯邵子曰此伏羲八卦之位乾南坤北離東坎西兊居東南震居東北巽居西南艮居西北於是八卦相成六十四卦所謂先天之學也帝出乎震齊乎巽相見乎離致役乎坤說言乎兑戰乎乾勞乎坎成言乎艮邵子曰此卦位乃文王所定所謂後天之學也子曰假我數年五十以學易可以無大過矣周子曰聖人之精畫卦以示聖人之藴因卦以發卦不畫聖人之精不可得而見㣲卦聖人之藴殆不可悉得而聞易何止五經之原其天地鬼神之奥乎程顥曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神程頥曰易變易也隨時變易以從道也其為書也廣大悉備將以順性命之理通幽明之故盡事物之情而示開物成務之道也至㣲者理也至著者象也體用一原顯㣲無間觀㑹通以行其典禮則詞無所不備故善學者求言必自近者易於近者非知言者也看易且要知時凡六爻人人有用聖人自有聖人用賢人自有賢人用衆人自有衆人用學者自有學者用君有君用臣有臣用無所不通張載曰易為君子謀不為小人謀邵雍曰君子於易玩象玩數玩辭玩意夫易者聖人長君子消小人之具也及其長也闢之於未然及其消也闔之於未然一消一長一闔一闢渾渾無迹非天下之至神其孰能與於此朱熹曰易之為書文字之祖義理之宗又曰易有兩義一是變易是流行者一是交易是對待者易中之辭大抵陽吉而隂凶亦有陽凶而隂吉者盖有當為而不為不當為而為之雖陽亦凶易中多言利貞貞吉利永貞之類皆是要人守正又曰易大概欲人恐懼修省看易者須識理象數辭四者伏羲六十四卦即易也其所畫竒偶即象也即文字也横圗圓圖方圖與古太極圖或皆出於伏羲不可知所分先天圖後天圖改定於何時亦不可知謂其因河圖而畫八卦則於易無所考也夏連山首艮商歸藏首坤周易首乾雖所尚不同而六十四卦則無不同焉夫易本周流六虚變動不居不可為典要而伏羲示之以畫畫即易也文王縂一卦而繫之為卦辭周公分六爻而繫之為爻辭孔子之賛易也述而不作縂為十翼大象傳所以釋卦辭也小象傳所以釋爻辭也可見文周宗伏羲而孔子宗文周所以宗伏羲也然則學周易者即當以周易為主學孔子者即當以孔子之十翼為宗由孔子以求之文周由文周以求之伏羲易學其庶幾乎果能心解神悟謂之畫前原有易可也或别有發明以羽翼乎周易亦可也學周易於有畫之後宗文周孔子於有言之餘而以己意參和分裂之是悖孔子侮聖經也奚可哉觀象玩辭觀變玩占孔子教人以學易之法不可偏廢而後儒最精於易者揚雄之太元邵子之經世皆所以發明羲畫程子之易傳朱子之本義皆所以訓釋周易謂其或主理或主數或主象或主占其說何紛紛也夫以言者尚其辭謂羲畫無辭而文周各一其辭誠有然矣謂文王周公早已不是伏羲之易謂後人但見孔子說義理而不復推本文周之意謂不可便以孔子之說為文王之說是文周之辭有出於羲畫之外孔子大象傳不足以釋卦小象傳不足以釋爻辭吾不知也謂文周以來未嘗說出太極推本於孔子始有仁義禮智性命性情道徳道義忠信誠敬中正之教誠有然矣不知伏羲之畫文周之辭果非理乎文周孔子果於羲畫之外而别一理乎况後人解釋卦之辭自發一種義理非不豁然動人而於本卦爻辭之象多不相涉或於文周孔子各發一義以此為明乎周易之理吾不知也謂河圖自一至十為數五十五洛書自一至九為數四十五故揲其掛扐之數取諸圖書誠有然矣不知用九用六果非數乎况後人之術數或取諸八八或取諸九九以推衍之非不顯然可信而於用九見羣龍无首用六利永貞全不相干以此為周易之數吾不知也諸先天圖象隂陽升降竒耦對待一出於天地自然之運又如乾卦中雲行雨施即坎之升降大明終始即離之往來誠有然矣然便謂伏羲象在卦中文王於坤則取象牝馬周公於乾則取象乎龍孔子於乾坤則取象天行健地勢坤之類是四聖各一其象矣後人即擬之節候配之五行列之元㑹運世類之為日月星辰水火土石與乾天坤地離火坎水之象絶不相類如此而為周易之象吾不知也謂易為卜筮之書取證於極數知來之占誠有然矣然謂卜筮時或以彖辭占或以爻辭占如以潜龍為象勿用為占不知無辭之前果無占乎論語不恒其徳或承之羞由於不占果揲蓍占卦便人人可以有恒乎吾亦不得而知也至於卦變之說自畫卦言之六十四卦一時俱成固非以此而變彼以揲蓍言之一卦可以為六十四卦其變亦無定在凡曰往曰來曰上曰下之類不過觀於成卦之後似有往來升降之象耳非真自内而之外自此而之彼也茍必求其說則卦皆起於一竒一偶謂六十四卦皆變自乾坤為近之若謂一隂一陽之卦各六皆自復姤而來五隂五陽之卦各六皆自夬剥而來今觀五陽五隂之卦即一隂一陽之卦也果既自復姤來又自夬剥來乎諸如此類皆求之不知其說此易學所以愈支而愈晦也是非謂諸儒不宗易也謂其不肯宗孔以明乎易或各自為一易焉可也謂其發明周易則非也又何必曲為之說孔子與文王並行不悖也邪試自孔子觀之韋編三絶果以其辭之繫而記誦之難乎抑以卜筮未精而勤勵之不息乎五十學易可無大過其自叙則然也而其所以無大過者果日月卜筮有得於吉凶之占乎黙識乎此則孔子之學易當必有在矣噫學不宗孔非聖學也學孔子之學以上追羲文周公而不宗乎孔子之十翼則吾豈敢易名義易一而已矣雖或以理言或以書言似有不同其實書即所以載此理也繫辭曰易之為書也原始要終以為質曰易之為書也廣大悉備所載六十四卦三百八十四爻與夫文王卦辭周公爻辭孔子十翼皆所謂書是也曰易與天地凖故能彌綸天地之道此則以理言也易書之所載孰非此理所具存乎故曰易之為書也不可逺為道也屢遷不可以書與理而截然分之也彰彰矣然先儒論易大率謂其義有三或取諸變易或取諸交易或取諸剛柔相易必統是三者而後易之義始備如隂變而陽陽變而隂老隂變少陽老陽變少隂此變易之易也如乾坤坎離八卦自相對相交陽交於隂隂交於陽此交易之易也如一卦隂陽自相上下往來變成一卦此所謂上下無常剛柔相易也而取之日月之篆文者則又以字文言之矣若夫變易以從道之說則尤後人所獨信從者焉殊不知生生之謂易孔子訓釋易之名義不亦親切而著明乎惟隂陽生生則其消息盈虚自然無所不包無所不貫凡所謂變易交易上下相易咸在其中矣若變易從道匪特一出於人為而既以變易為易又欲從乎道焉則易也道也未免岐而二之矣孰若生生謂易之渾成哉嘗合易與中庸觀之不能不於聖學有深慨何也中庸之言道自人而言也曰天命之謂性率性之謂道修道之謂教曰喜怒哀樂之未發謂之中此所以為天下之大本也言中庸之中者則當從中庸之本文矣乃云不偏不倚之為中訓君子時中則謂隨時以處中果隨時以處夫喜怒哀樂之未發焉否乎易之言道合天地人而言也一隂一陽之謂道隂陽不測之謂神曰生生之謂易此所以神易無方體也言周易之易者則當從周易之本文也乃云變易交易相易之謂易總序易傳則謂變易以從道果變易以從夫無方無體而生生焉否乎非謂不偏不倚與夫隨時處中之盡非也以其非中庸未發之中也非謂變易交易相易與夫變易從道之盡非也以其非周易生生之易也余斯言也極知狂妄之罪不可逃也然欲從夫周易中庸之本文又安能逃其罪哉學者之於易也豈徒學夫伏羲之畫與文周孔子之辭哉盖天地人物總只一隂一陽流行變化陽竒隂偶故羲畫竒偶各三名曰乾坤六十四卦俱從此變化為物不貳故生物不測也文王叙卦獨首乾次坤於乾曰元亨利貞於坤曰元亨利牝馬之貞周公曰用九見羣龍无首用六利永貞孔子繫辭曰乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從惟其易從所以簡也所以利永貞利牝馬之貞而先迷後得主也可見知能即人之乾坤也學易者須遵四聖之訓以乾坤反諸身心崇效卑法心即統天之乾身即承天時行之坤則成性存存可乆可大諸卦爻之辭變象占皆斯人生生之易矣噫聖人易簡之學具載簡篇其如易道不明不行何易分上下篇卦上篇三十卦卦下篇三十四上篇乾坤屯蒙需訟師比小畜履泰否同人大有謙豫隨蠱臨觀噬嗑賁剥復无妄大畜頥大過坎離下篇咸恒遯大壯晉明夷家人暌蹇解損益夬姤萃升困井革鼎震艮漸歸妹豐旅巽兊渙節中孚小過既濟未濟易統六十四卦分上下二篇上篇三十卦下篇三十四卦果因簡帙重大而分之無意義哉盖卦畫竒偶錯綜有以相對言者有以相反言者故上篇如乾與坤頥與大過坎與離相對者六如屯與蒙需與訟相反者二十四以二十四顛倒觀之止一十二卦加相對者六卦縂十八卦也下篇如咸恒遯大壯相反者三十二以三十二顛倒觀之止十六卦矣加中孚小過相對者二卦亦縂十八卦也泛觀上下篇卦數三十與三十四各有多寡若詳玩其意義則各以十八卦成篇隂陽上下各以類分如復在上姤在下大過在上小過在下之類一出於天然而聖人未嘗安排布置於其間焉故謂易為造化之書也非歟且乾坤隂陽之純也坎離隂陽之中也乾坤定覆載之地坎離藏晝夜之精所以居上篇之始終也震艮巽兊則皆隂陽之偏也其本卦皆在下篇咸恒乃艮兊巽震相合成體而男女成人道之始既濟未濟乃坎離顛倒而成而水火為日用之常所以居下篇之始終也則凡統括於上下篇者皆可知矣噫一隂一陽之謂道生生之謂易上下篇孰非隂陽之義哉其餘則伊川先生發揮盡之矣易上篇首乾坤終坎離易下篇首咸恒終未濟既濟易上下篇義乾坤天地之道隂陽之本故為上篇之首坎離隂陽之成質故為上篇之終咸恒夫婦之道生育之本故為下篇之首未濟坎離之合既濟坎離之交合而交生物隂陽之成功也故為下篇之終二篇之卦既分而後推其義以為之次序卦是也卦之分則以隂陽陽盛者居上隂盛者居下所謂盛者或以卦或以爻卦與爻取義有不同如剥以卦言則隂長陽剥也以爻言則陽極於上又一陽為衆隂主也如大壯以卦言則陽長而壯以爻言則隂盛於上用各有所不相害也乾父也莫亢焉坤母也非乾無以為敵也故卦有乾者居上篇有坤者居下篇而復陽生臨陽長觀陽盛剥陽極則雖有坤而居上姤隂生遯隂長大壯隂盛夬隂極則雖有乾而居下其餘有乾者皆在上篇泰否需訟小畜履同人大有无妄大畜也有坤而在上篇者皆一陽之卦也卦五隂而一陽則一陽為之主故一陽之卦皆在上篇師謙豫比復剥其餘有坤者皆在下篇晉明夷萃升也卦一隂五陽者皆有乾也又陽衆而盛也雖衆陽說於一隂說之而已非如一陽為衆隂主也王弼云一隂為之主非也故一隂之卦皆在上篇小畜履同人大有也卦二陽者有坤則居下篇小過雖無坤隂過之卦也亦在下篇其餘二陽之卦皆一陽生於下而達於上又二體皆陽陽之盛也皆在上篇屯蒙頥習坎也陽生於下謂震坎在下震生於下也坎始於中也達於上謂一陽至上或得正位也生於下而上達陽暢之盛也陽生於下而不達於上又隂衆而陽寡復失正位陽之弱也震也解也上有陽而下無陽無本也艮也蹇也震坎艮以卦言則陽也以爻言則皆始變㣲也而震之上艮之下無陽坎則陽陷皆非盛也惟習坎則陽上達矣故為盛卦二隂者有乾則陽盛可知需訟大畜无妄也無乾而為盛者大過也離也大過陽盛於中上下之隂弱矣陽居上下則綱紀於隂頥是也隂居上下不能主制於陽而反弱也必上下各二隂中惟兩陽然後為勝小過是也大過小過之名可見也離則二體上下皆陽隂實麗焉陽之盛也其餘二隂之卦二體俱隂隂盛也皆在下篇家人暌革鼎巽兊中孚也卦三隂三陽者敵也則以義為勝隂陽尊卑之義男女少長之序天地之大經陽少於隂而居上則為勝蠱少陽居長隂上賁少男在中女上皆陽盛也坎雖陽卦而陽為隂所陷溺也又與隂卦重隂盛也故隂陽敵也有坎者皆在下篇困并渙節既濟未濟也或曰一體有坎尚為陽陷二體皆坎反為陽盛何也曰一體有坎陽為隂所陷又重於隂也二體皆坎陽生於下而達於上又二體皆陽可謂盛矣男在女上乃理之常未為盛也若失正位而隂反居尊則弱也故恒損歸妹豐皆在下篇女在男上隂之勝也凡女居上乃皆在下篇咸益漸旅困渙未濟也惟隨與噬嗑則男下女非女勝男也故隨之彖曰剛來而下柔噬嗑彖曰柔得中而上行長陽非隂少可敵以長男下中女少女故為下之若長少敵勢力侔則隂在上為陵陽在下為弱咸益之類是也咸亦有下女之象非以長下少也乃二少相感以相與所致陵也故有利貞之戒困雖女少於男乃陽陷而為隂揜無相下之義也小過二陽居四隂之中則為隂盛中孚二隂居四陽之中而不為陽盛何也曰陽體實中孚中虚也然則頥中四隂不為虚乎曰頥二體皆陽卦而本末皆陽盛之至也中孚二體皆隂卦上下各二陽不成本末之象以其中虚故為中孚隂之勝也一陽象易之象􅄲隂象學易大㫖附孔子曰生生之謂易又曰一隂一陽之謂道隂陽不測之謂神象若不足以盡易也然易也道也神也一也不可得而見也惟神明於衷者真見形上形下道器渾融則知象即隂陽不測生生不窮之易矣何謂象一竒一偶是也􅅀者竒也陽之象也􅄲者偶也隂之象也天垂象見吉㓙聖人象之象此者也是故盈天地間莫非隂陽之變化伏羲俯仰逺近通神明類物情見隂陽有竒偶之數故畫􅅀以象陽畫􅄲以象隂名之曰乾坤見一隂一陽生生不已故自下而上各倍而三名之曰坎艮震巽離兊又於八卦錯綜而重之為六十四卦焉然六十四卦則又皆反對次第而成之者也其對者八如乾與坤頥與大過坎與離中孚與小過其餘屯蒙既未濟則皆相反是也合之三十六析之上下經各取十八卦而易之書備是然亦孰非天地隂陽自然之象乎故因象異名即伏羲之易也羲易雖無文辭而六十四卦郁郁乎天下之至文矣文王總一卦而繫之彖周公分六爻而繫之辭孔子彖傳所以釋彖辭也象傳所以釋爻辭也繫辭文言說卦諸篇所以統論卦爻之㫖也可見伏羲六十四卦之畫畫以象也文周孔子之辭辭以象也象雖至隠至􅄨至雜至動其變化不齊而元亨利貞吉㓙悔吝厲无咎占亦不一要亦因其象之變而異其占耳故曰易者象也象也者像也又曰聖人設卦觀象繫辭焉而明吉㐫信乎三百八十四爻莫非一竒一偶之變化而偶又竒之變也聖人懼其義有難明間又取諸物以象之其所取物亦皆卦畫原有此象非聖人故為此以發其義也是故文王於各卦舉牝馬牝牛豚魚飛鳥之類以見其例周公於各卦亦舉六龍飛躍履霜堅冰之類以極其􅄨孔子又於文周辭外設天行健地勢坤之類以廣其義且曰吉㓙者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也雖辭之吉㐫悔吝亦孰非象乎其設象繫辭或不同孰非發明伏羲所畫之卦象乎然則由孔子之大彖傳小彖傳以求文周由文周之卦辭爻辭以求伏羲而易象其庶幾矣噫非求之羲文周孔也吾心固有未畫之象無言之辭即所謂易與道與神之謂也以此洗心宻藏得其所謂生生不測焉者則居觀動玩無一非變無往非占而天地之法象無一非教吾亦無往非法天之學矣乾坤易之源學之宗也源一則流清宗淆則泒亂曾謂學易可以不明四聖首乾坤之㫖哉彼統天承天易知易從道本一也各卦爻皆乾坤九六之用爾故曰乾坤毁無以見易潢觀玩象辭變㒺敢雜以意見祗述本㫖以究竟一源之大宗云繫辭曰八卦成列象在其中矣因而重之爻在其中矣然卦必有象雖曰乾象天坤象地其實即乾之象即坤之象龍亦所以象牝馬亦所以象其餘震雷巽風坎水離火艮山兊澤可類推焉謂象有三様不可也卦必有畫氣之消息自下而上畫竒畫偶雖各不齊而畫卦必自下始以氣從下而升上於六位觀一年十二月一日十二時自子至巳自午至亥隂陽各六乃其定數所謂兼三才而兩之故易六畫而成卦是也卦必有爻初三五為陽位二四上為隂位得位則正失位則不正且於中要知何爻為成卦之主如屯初九蒙九二履六三小畜九四比九五頥上九是也卦必有名純陽故名之曰乾純隂故名之曰坤上坎下震故名之曰屯是也卦必有義如屯當濟屯蒙當開蒙需當不輕進訟當不成訟泰則通泰蠱則飾蠱各有其義是也卦亦有兩卦相因以為名義如乾之與坤坎之與離蹇之必解豐之必旅剥復夬姤否泰損益其名義每相因或相反者是也卦必有徳如乾健坤順震動巽入坎陷離麗艮止兊說是也彖傳以釋卦象傳以釋爻卦爻當一以彖象為主中間或發文周所未發者有之謂其各發一義則非矣然則學易者務得四聖畫象繫辭之意而後可烏可以己意㕘之哉繋辭曰爻也者傚天下之動者也又曰道有變動故曰爻然爻分六位故以初二三四五上為隂陽之定位矣然九六為爻之隂陽或以陽爻居陽位或以陽爻居隂位或以隂爻居隂位或以隂爻居陽位其變動則無常焉須以位為主以九六所值之爻為客所謂周流六虚是也爻分三才故以下爻為地中爻為人上爻為天矣然合六畫又以初二為地三四為人五上為天所謂六爻之動三極之道是也爻分中正故以二五為中隂陽得位為正矣然中正之道亦有不可執一論者茍當其時則如復之六四益之六三六四本未得中而曰中行坤之六三无妄之六四皆非正位而曰可貞不當其時則屯履之九五皆得中皆當位而曰貞㓙貞厲且其正中中正各有指也爻取相應故以初四二五三上為應位矣然隂陽相得乃為正應如恒彖剛柔皆應是也艮則曰上下敵應不相與也未濟則曰雖不當位剛柔應也所以有六爻皆應者如泰否是也有不皆應者如乾坤八純卦是也有以剛中相應者如師臨升萃是也有以一爻而五爻應者如比與小畜是也六爻隂陽以少者為主如師比謙豫同人大有固不待言如屯蒙俱二陽屯初動而利五陷而㓙蒙二中則為包上則為繫看其所居之位何如也至於隂陽雖居相應之位有不相應者有以應而吉亦有以應而㓙者有以無應而㓙亦有以無應而吉者又當看其本爻應爻為何如也爻取承乘故取下承上上乘下矣然必以隂承陽陽乘隂為順以陽承隂隂乘陽為逆承乘宻比要當以時而措焉所謂凡易之情近而不相得則㓙或害之悔且吝也至若逐爻取象或取之本爻或取之上下近爻或取之應爻或如乾龍漸鴻之一物或咸艮之取諸一身或如井之統六爻以取義或如坤之分爻以取義或有巳正而他爻取之以為邪者或如巳㓙而他爻得之以為吉者如屯之初非不正也二近之則以為冦旅之上非不㓙也五承之以得譽焉以是類推之爻可通矣繫辭曰列貴賤者存乎位爻有君臣謂九五為君位夫固不可易者此惟論其位則可若毎卦必以五為君二為大臣三為逺臣四為近臣初為民上為隠逸寧不失之大拘泥乎易道變通斷不然也即如乾飛龍在天比顯比王用三驅臨知臨大君之宜萃萃有位革大人虎變渙渙汗其大號誠哉其為君也如明夷箕子之明夷大過老婦得其士夫恒婦人吉夫子㐫漸婦三嵗不孕小過公弋取彼在穴姑舉此數爻最明顯者果君道否乎初為民如訟不永所事小有言噬嗑屨校滅趾旅瑣瑣誠為民也如屯之利建侯象曰以貴下賤大得民也何為而謂其非君也至於復之不逺復无妄之无妄往吉益之利用為大作震之震來虩虩笑言啞啞吉數爻在一卦之中俱為最善或不可以初而少之也二爻如乾見龍在田師王三錫命晉受兹介福于其王母蹇王臣蹇蹇困朱紱方來謂之為大臣然也如蒙之克家泰之包荒離之黄離謂為君道不可乎三爻如坤之或從王事大有公用享于天子益告公用圭謂之為逺臣然也既濟髙宗伐鬼方三年克之明夷明夷于南狩得其大首謂為君道不可乎四爻如比外比之貞吉觀國之光利用賓于王坎納約自牖謂之為親臣可也如豫由豫大有得升王用亨于岐山謂為君道不可乎上爻如蠱不事王侯髙尚其事遯肥遯无不利謂之為隠逸然也師大君有命開國承家小人弗用大有自天佑之吉无不利離王用出征有嘉折首獲匪其醜恐謂之為君道亦可矣餘不能詳姑舉每爻君道之不可拘滯者以見易之為易人人可用不可執泥而不通也况君之所以為君者以其足以為之主也故大君為天下主國君為一國之主嚴君為一家之主天君為一身之主而卦之君爻而匪君義者或有在他位而得君道者臣民窮達不齊在各人居觀動玩神明黙識之云耳况觀諸彖傳需曰位乎天位履曰履帝位取剛中也然小畜曰柔得位同人曰柔得中大有曰柔得尊位大中渙曰柔得位乎外而上同是剛是柔且無定位也在君道者臣民窮達不齊在各人居觀動玩神明黙識之云耳既濟曰剛柔正而位當矣未濟曰雖不當位剛柔應也噬嗑曰雖不當位利用獄也是位且非所論矣然則六爻其何以觀之繫辭曰其初難知其上易知本末也初辭擬之卒成之終又曰二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要旡咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪以此觀玩六爻孰云無據而必拘拘於君臣之定位哉雖然乾彖曰六位時成時乘六龍繫辭曰周流六虛惟變所適惟果知所謂虛所謂時而爻位洞然矣隂陽卦爻中正者易之楨幹也小大徃來上下終始剛柔浸長當位時行易之血脈也元亨利貞吉凶悔吝无咎厲易之斷案也繫辭曰以卜筮者尚其占又曰極數知來之謂占是謂占非易不可也然居則觀象玩辭以明夫吉凶消長之理動則觀變玩占以協夫進退存亡之宜而占特易中之一耳但晦庵謂易為卜筮之書易只為卜筮而作謂畫一卦如擲珓爻辭如籖辭故以占為本義至曰伏羲之易只是要作卜筮用文王周公早已不是伏羲之意已是文王周公自説出一般理道了然猶是就人占處説及孔子繫易又非文王之易矣曰後人但見孔子説義理而不復推本文周之意又曰到夫子方始純以理言雖未必是羲文本意而事上説理亦是如此但不可便以夫子之説為文王之説也然則四聖之易果不同而伏羲文周果不為義理作歟嘗求之不得其説也况天地間變化莫測一以義理為主惟占之義理而協焉則綱常所係死生以之茍以卜筮為主第恐忠孝卜筮不吉而君親之難果可避歟亂賊卜筮大吉而凶逆之謀果可試歟雖理有不協則神必不從而古之元凶巨惡假此以惑亂天下者不少也唐敬宗時卜者蘇元明與染工張韶同謀不軌而卜筮誤之可鑒矣若謂事之吉凶兩岐道理處置不得所以用占然則天下果有不可道理處置之事而占不常用則易亦為可離歟以易中之一端謂其足以盡易則小道可觀而京房郭璞之流得非邃於羲文之心法歟且如不恒其徳或承之羞子曰不占而已矣果以無恒之人未卜筮歟是可以識占之義矣要之學以孔子為宗也孔子謂加我數年五十以學易可無大過其所謂學者果卜筮歟晚年韋編三絶抑以卜筮之妙無窮而必欲精通其占歟後儒不得其説乃謂三聖主卜筮孔子主理義晦翁正以上宗三聖與孔子十翼並行不悖是亦欲主占而不知占之所以為占歟繫辭曰易者象也豈聖人以己意為之象哉盖天垂象見吉㐫聖人象之乃聖人法天之學一皆因其自然以通神明類物情故六十四卦三百八十四爻皆象數也曰八卦以象告豈法象莫大乎天地懸象著明莫大乎日月而已哉夫象聖人有以見天下之􅄨而擬諸其形容象其物宜是故謂之象所以八卦成列象在其中凡天地雷風山澤水火變化云為百物不廢莫非象也曰鼔天下之動存乎辭觀其辭思過半矣觀象玩辭豈無别哉盖聖人設卦觀象繫辭焉而明吉㓙所以彖者言乎其象而辭亦象也曰天地之數五十有五此所以成變化而行鬼神也象豈足以該其數哉盖參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象而數亦象也曰以制器者尚乎象象不滯於器乎盖形而上者謂之道形而下者謂之器道器本不相離而備物致用立成器以為天下利孰謂象非道也曰以卜筮者尚乎占故占事知來而吉㓙悔吝亦可謂之象乎盖吉㓙者得失之象也悔吝者憂虞之象也變化者進退之象也所以爻象動乎内吉㓙見乎外孰謂吉㓙悔吝專屬之占而非象也曰易之為道也屢遷變動不居周流六虚不可為典要何定象之可見乎盖闔闢變通見乃謂之象所以聖人立象以盡意設卦以盡情偽否則易不可見則乾坤幾毀矣周流變動孰非可見之象也曰乾以易知坤以簡能易簡而天下之理得矣無往非象無往非易可以為易簡乎盖生生之謂易成象之謂乾效法之謂坤知乾之所以成象而坤亦效法乎乾則極數知來變通不測以此齋戒退宻而易簡配至徳矣可見居則觀象玩辭即彖者言乎象者也動則觀變玩占即爻者言乎變者也卦不變則占彖變則占爻非爻専於占而彖専於辭也是故㑹通繋辭而得其㫖斯可以語周易之象義矣若曰乾為圜為金為玉坤為布為釜則又引伸推廣易象之類而據此明易不可也玩象者慎之易雖廣大悉備其實只是乾坤竒偶二畫而已乾坤竒偶之畫隂陽之象也故繫辭曰乾陽物也坤隂物也乾坤小象傳曰潜龍勿用陽在下也履霜堅冰隂始凝也往來上下變化周流盈天地間皆隂陽也皆易也故乾坤為易之緼也觀易字即日月二字所謂隂陽之義配日月是也然乾坤大矣至矣人特隂陽之秀而精氣為物㳺魂為變乃萬物中之最靈者耳何以體備乾坤之徳邪一隂一陽之謂道而繼善成性則性道莫非隂陽况乾以易知坤以簡能而知能易簡非吾性之乾坤乎所以知崇禮卑崇效天卑法地而成性存存道義之門則日新富有之徳業備是矣噫乾坤非二物知能無二體也闔戸之謂坤闢戸之謂乾一闔一闢之謂變也乾知大始坤作成物即作成其所知始者也呈象之謂乾效法之謂坤即效法其所呈象者也於此果能知至至之知終終之則不習無不利而生生不窮可以成位乎天地之中矣是故真知易者始可與言乾坤易簡之學易以畫為主畫即象也有畫斯有卦有卦斯有辭畫本於伏羲辭本於文周而孔子賛易皆所以發明伏羲文周之卦與辭耳後之學易者其可不以孔子為之主乎史稱孔子讀易而為之傳則傳即孔子所以釋卦爻者也由孔子以推原周文伏羲之心畫而易道可明庶不惑於諸家之臆說矣若云周爻已不盡同於文王孔翼亦豈盡同於文王周公如是則四聖各一其易矣不知易無窮四聖之卦爻象辭亦無窮而其義一也彼周之不盡同於文者文王統明乎一卦周公詳發於各爻孔子述而不作各因卦爻之辭而賛之也惟大象則推一卦二體之義以盡其􅄨故不同耳茍謂孔子不同於文周是釋其辭而異其義也豈知孔子者哉嗚呼惟其不以孔子為主所以諄諄於古易今易之說象數義理占筮之分果何益也但三聖古易為鄭康成王輔嗣錯亂信乎其不可也然推原其意尚知所以宗孔而尤有未可盡非者在至謂執孔子之傳以為定說則易之為用反有所局不足以通天下之故信斯言也不幾於叛孔子乎是故志在宗孔雖多言取咎弗恤也易之要止在中正二字中固足以該正然中易識正難明也何也陽貴隂賤初三五陽二四上隂或中或正皆以此為凖也然乾九二曰龍徳而正中坤六五曰黄中通理正位居體豫六二曰不終日貞吉以中正也艮六五曰艮其輔以中正也謂之中固然也亦何為而謂之正乎坤六三无妄九四皆曰可貞矣然屯九五大貞㐫夬九五貞厲革九三旅九三皆貞厲者又何謂也咸九二大壯九二九四晉初六解九二升六五未濟九二六五皆謂之貞吉矣巽上九節上六乃謂之貞焉蠱九二不可貞矣隨六三乃謂之利居貞頥六五乃謂之居貞吉艮初六乃謂之利永貞焉歸妹九二利幽人之貞矣巽初六利武人之貞升上九利不息之貞焉盖一卦一爻各有攸當使一毫未妥不可以語貞也所以乾元亨利貞坤元亨利牝馬之貞同人利君子貞否不利君子貞隨元亨利貞无咎无妄元亨利貞匪正有眚貞可以一定拘之哉信乎中有定位故易識正無定在故難明果能於易而得其所謂貞斯可以用易斯可以語學矣問乾以易知坤以簡能知屬之乾能屬之坤然也乾元亨利貞坤元亨利牝馬之貞乾元資始乃統天坤元資生乃順承天是坤即順乎乾矣謂能即順承乎知也可乎哉知行合一之說求之乾坤當必有不待辨者在也曰乾坤知能本一而二二而一者也本不待合而亦何可以偏言哉但自一極觀之有天必有地言天則有以該夫地自一朝觀之有君必有臣言君必有以該夫臣自一家觀之有夫必有婦言夫則有以該夫婦自一人觀之有知必有能而言知則有以該乎能故乾坤知能雖若並舉夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻則又專夫知矣孰知知至知終者知也至之終之非能乎不習無不利者能也不疑其所能非知乎孔子謂道之不明不行若並陳矣人莫不飲食也鮮能知味也何為而偏於知也孟子謂良知良能若並舉矣孩提無不知愛親知敬長也何為而偏於知也盖乾足以包坤乃天尊地卑之定位也彼必欲析知行而二之者是析天地君臣夫婦而二之矣又有欲偏重夫行者其亦不知地道妻道臣道無成而代終乎噫乾坤大義不明何怪知行合一之辨紛紛於後世也聖人之學心學也聖人之易心畫也心無動静無隠顯是心本無象聖人特畫卦以象心凡天地間成象成形百千萬類無一非心無一非易無一非學矣然則六十四卦三百八十四爻孰非心乎孰非聖人之心學乎世之論易者以易求易不知求易於心或謂易無方體而寂心於虚無或謂易止象數而滯心於名物又惡知一卦一爻皆吾心之學天地萬事萬物之變化皆吾心之象哉噫此易之所以不明也易不明而謂其明聖學也吾不知之矣占以决疑易之主乎占也尚矣或内焉卜筮於一巳或外焉卜筮於衆人或幽焉卜筮於神明皆占也如即占之象乾元亨利貞即所占卦之辭或初爻動則一即占之變潜龍即所占象中之象潜龍勿用即所占爻之辭所謂象辭變占豈判然不相謀哉夫易以象明則觀象足矣乃云象義何也盖義以釋象亦有不盡於象者需彖曰需須也險在前也剛健而不陷其義不困窮也以象言之本上陷下健乃云剛健不陷盖由其能需則不困窮所以剛健不陷者需之義也隨九四象本有獲而又云貞㓙其義㓙也復六三象本頻復厲而又云无咎者義无咎也以此推之義有出於象之外者易可執一說論之哉問學易雖從孔子十翼以求周文伏羲信之矣然卦爻亦云博矣吾道一貫安在邪曰乾知大始知此則知一貫未達曰五十六卦即八純卦之錯綜六子即乾坤之變化坤即順成乾健者也兩間化育孰非乾道統括之哉問易道大矣然而有無極焉近儒謂佛超聖學之外然歟曰佛學且置大凡泥象者不識象也溺無者不知無也形上形下何有何無矧天載無聲臭至矣故云用九見羣龍无首彼獨不聞乾統天乎天且統之更何無極之可名乎末二段舊載學易剳記篇中今摘附於此以明學易之要學易總括問子以象義明易謂乾坤兩卦未透則六十二卦諸爻俱無着落何歟曰易乃隂陽造化之生生不可名象伏羲畫一竒一偶以象乾坤後人遂止從隂陽竒偶求易不知乾坤之藴即此攸寓文周孔子不得已又將天地龍馬等物繇辭以發其意後人又泥辭解釋不知隂陽剛柔竒偶牝牡實不相離觀乾元亨利貞坤元亨利牝馬之貞彖曰大哉至哉資始資生統天順天皆發明合一之㫖是乾坤健順雖欲離之不可得也茍不合兩卦㑹通觀之則乾坤且未明安能透徹諸卦問子謂三百八十四爻須先明乾坤初九初六其義何居曰九六雖乾坤初畫然各卦爻象悉從兹始雖有潜龍勿用履霜堅冰至之象其實只是陽在下隂始凝兩語括其義也凡三百八十四爻莫非隂陽之往來莫非乾坤之上下爻位之乘承比應吉㐫悔吝悉於此乎判焉茍於從無生有之初未能洞晰其底裏則於各卦爻象至隠至􅄨曷能無疑問諸家於用九用六皆連上九上六言之何歟曰竒偶象也九六數也乾用九坤用六純陽純隂故也凡六十二卦之九六皆乾坤也特於兩卦發明其凡例耳正所謂二用無爻位周流六虚不可為典要惟變所適也惟於乾坤用九用六得其剛柔合徳之義則從源達流如指諸掌矣噫九六二用夫人日用之常也學易者且昧焉罔覺又何怪百姓日用不知邪問子謂性體不明安能學易茍不學易安能盡性何謂也曰聖人作易將以順性命之理性生理也一隂一陽之謂道繼之者善成之者性孰非生生之易乎但人知以生理論性而乾道變化各正性命故曰性相近也其孰知之繫辭又謂天地設位易行其中成性存存道義之門使易有未明欲求窮理盡性以至命也難矣問子謂聖學晦塞由易學不明何歟曰伏羲畫為六十四卦既示之象矣文周孔子又各繋之辭聖學有餘藴哉况繫辭首章提揭乾坤易簡以為乆大徳業之準謂乾知坤作易知簡能易則易知簡則易從合前乾坤兩卦象辭玩之凡天地之化育聖人之徳業發揮至矣盡矣奈何究心章句者徒求乾坤於天地不信身心即乾坤辨論知行者咸以意見標指訣不知取證於經典先之後之分之合之各一其說而聖學愈晦矣即此反身求之所謂乾知坤能非斯人不慮之知不學之能乎以人之身心合諸乾坤果能崇效卑法不足成位其中乎舎此不學而求諸繁難失彌逺矣問乾坤易簡子即指為格物之學何歟曰人知有形之謂物不知無形亦物也何也乾陽物也坤隂物也易言之矣形上形下道器攸分果二物乎天下國家身心意知一物也身家國天下固有形矣心意知抑有形之可見乎然身家國天下悉由心意知以宰之得非無形統有形乎坤作一從夫乾知則有親有功可乆可大悉從此出故中庸曰其為物不貳則其生物不測此謂格物之學信乎易簡而天下之理得矣問子謂六十四卦總只八卦八卦總只乾坤坤即乾之變體乾六畫只初一畫盡之矣然太極生兩儀四象八卦而乾坤不在太極中乎曰非也以隂陽竒偶言天地猶有對待若乾則統乎天也統天外寧有太極無極哉彼統天之乾原無形體如人之神雖寓於形骸實統乎形骸即太極先天所謂無聲無臭之天載無思無為之易是也謂易之卦爻悉統於乾之一竒非歟昔者庖犧畫為竒偶正欲人由有象以識無象而統天者更何畫象可拘是故心竒象也乾也身偶象也坤也身可見心不可見特畫竒偶以為法象善學者知所效法則天地人一以貫之矣夏后氏之易曰連山連山者以重艮為首商人之易曰歸藏以重坤為首周人之易曰周易以重乾為首周禮大卜之官曰其經卦皆八其别皆六十有四則卦之重乆矣先儒謂文王重之非也孔子之時歸藏之易猶存故曰之宋而得坤乾焉於戯至哉合三易而觀之而後八卦之妙大易之用混然一貫之道昭昭於天下矣而諸儒言易率以乾為大坤次之震坎艮巽離兊又次之噫嘻末矣􅅀者易之􅅀也􅄲者易之􅄲也其純􅄲者名之曰乾其純􅄲者名之曰坤其􅅀􅄲雜者名之曰震坎艮巽離兊其實皆易之異名初無本末精粗大小之殊也故孔子曰吾道一以貫之子思亦曰天地之道其為物不貳八卦者易道之變也而六十四卦者又變化中之變化也物有小大道無小大徳有優劣道無優劣其心通者洞見天地人物盡在吾性量之中而天地人物之變化皆吾性之變化尚何本末精粗大小之間雖說卦有父母六子之稱其道未嘗不一大傳曰百姓日用而不知君子小人之所日用者亦一也惟有知不知之分易有以理言者有以書言者以理言即太極是也以書言即兩儀四象八卦六十四卦三百八十四爻與夫文王之卦辭周公之爻辭皆以書名者也曰易有太極此易字以書言謂易書之中原其始具此太極之理所以能生儀象卦也曰易與天地準此易字不専以書言矣謂易之道與天地準所以能彌天地之道也要之十翼中稱易字以書言者為多文王周公之辭無易字夫子於文王及上繫第二章方稱易之名周公爻辭不言易字而於周禮却有三易之名馮厚齋謂夏曰連山商曰歸藏周曰周易則易乃周家之書名文王之所命也曰三易者夏商蒙周易之稱爾意恐未然說卦謂昔者聖人之作易非指伏羲乎繫辭謂易之興也當殷之末世周之盛徳詳其名義易之稱其來舊矣非必自文王而始也况以後蒙前可也以前蒙後可乎巳易附易者已也非有他也以易為書不以易為己不可也以易為天地之變化不以易為己之變化不可也天地我之天地變化我之變化非他物也私者裂之私者自小也庖犧氏欲形容易是巳不可得畫而為一於戲是可以形容吾體之似矣又謂是雖足以形容吾體而吾體之中又有變化之殊焉又無以形容之畫而為􅄲􅅀者吾之􅄲也􅄲者吾之􅄲也可畫而不可言也可以黙識而不可知也􅅀者吾之全也􅄲者吾之分也全即分也分即全也自生民以來未有能識吾之全者惟覩夫蒼蒼而清明而在上者始名之曰天又覩夫隤然而博厚而在下者又名之曰地清明者吾之清明博厚者吾之博厚而人不自知也人不自知而相與指名曰彼天也彼地也如不自知其為我之手足而曰彼手也彼足也如不自知其為已之耳目鼻口而曰彼耳目也彼鼻口也是無惑乎自生民以來面墻者比比而不如是昏之甚者見謂聰明也夫所以為我者毋曰血氣形貎而已吾性澄然清明而非物吾性洞然無際而非量天者吾性中之象地者吾性中之形故曰在天成象在地成形皆我之所為也渾融無内外貫通無異殊觀一畫其㫖昭昭矣厥後又繫之辭曰乾乾健也言乎千變萬化不可紀極往古來今無所終窮而吾體之剛健未始有改也言乎可指之象則所謂天者是也天即乾健者也天即一畫之所似者也天即巳也天即易也地者天中之有形者也吾之血氣形骸乃清濁隂陽之氣合而成之者也吾未見夫天與地與人之有三也三者形也一者性也亦曰道也又曰易也名言之不同而其實一體也故夫乾彖之言舉萬物之流形變化皆在其中而六十四卦之義盡備於乾之一卦矣自清濁分人物生男女形萬物之在天下未嘗不兩曰天與地曰晝與夜曰夫與婦曰君與臣曰尊與卑曰大與小曰貴與賤曰剛與柔曰動與静曰善與惡曰進與退曰實與虚博觀縱觀何者非兩􅄲者所以象此者也又繫之辭曰坤坤順也明乎地與妻與臣與柔之類也然非有二道也坤者兩畫之乾乾者一畫之坤也故曰天地之道其為物不貳則其生物不測又曰明此以南面堯之所以為君也明此而北面舜之所以為臣也又曰吾道一以貫之則夫乾坤之象雖有大哉至哉之辨以明君臣上下之分而無二元也坤爻又曰直方大又曰以大終也又以明大與至之無二㫖乾與坤之無二道也乾何以三􅅀也天此物也地此物也人此物也無二􅅀也無二巳也皆我之為也坤何以三􅄲也天有隂陽日月明晦也地有剛柔髙下流止也人有君臣夫婦貴賤善惡也天下固有如此者也聖人繫之辭曰震明乎如此陽為主自下而動且起也此我之變態也天下固有如此者也聖人繫之辭曰巽明乎如此者隂為主隂入於下柔隨之類也此又我之變態也天下又有如此者也聖人繫之辭曰坎言陽陷乎兩隂之中内陽而外隂水之類也此我之坎也天下又有如此者也聖人繫之辭曰離言隂柔不能以自立麗乎兩剛又外陽而中虚為火之類也此我之離也天下又有者陽剛止截乎其上故繫之辭曰艮艮止也明乎我之止也天下又有者隂柔發散乎其外故繫之辭曰兊兊說也明乎我之說也舉天地萬物萬化萬理皆一而已矣舉天地萬物萬化萬理皆乾而已矣坤者乾之兩非乾之外又有坤也震巽坎離艮兊又乾之交錯散殊非乾之外復有此六物也皆吾之變化也不以天地萬物萬化萬理為己而惟執耳目鼻口四肢為己是割吾之全體而裂取分寸之膚也是梏於血氣而自私也自小也非吾之軀止於六尺七尺而已也坐井而觀天不知天之大也坐血氣而觀己不知己之廣也元亨利貞吾之四徳也吾本無此四者之殊人之言之者自爾殊言吾之始名之曰元又曰仁言吾之通名之曰亨又曰禮言吾之利名之曰利又曰義言吾之正名之曰貞又曰固指吾之剛為九指吾之柔為六指吾之清濁為天地指吾之震巽為雷風指吾之坎離為水火指吾之艮兊為山澤又指吾之變而化之錯而通之者為六十四卦三百八十四爻以吾之照臨為日月以吾之變通為四時以吾之散殊於清濁之兩間者為萬物以吾之視為目以吾之聴為耳以吾之噬為口以吾之握為手行為足以吾之思慮為心言吾之變化云為不可測謂之曰神言吾心之本曰性言性之妙不可致詰不可以人為加焉曰命得此謂之徳由此謂之道其覺謂之仁其宜謂之義其履謂之禮其明謂之智其昏謂之愚其不實謂之偽其得謂之吉其失謂之㓙其補過謂之无咎其欣謂之喜其慘謂之憂悔其非謂之悔嗇其小謂之吝其不偏不過謂之中其非邪謂之正其盡焉謂之聖其未盡焉謂之賢言乎其變謂之易言乎其無所不通謂之道言乎無二謂之一今謂之巳謂之巳者亦非離乎六尺而復有妙已也一也二之者私也梏也安得無私與梏者而告之姑即六尺而細究之目能視所以能視者何物耳能聴所以能聴者何物口能噬所以能噬者何物鼻能嗅所以能嗅者何物手能運用屈信所以能運用屈信者何物足能步趨所以能歩趨者何物血氣能周流所以能周流者何物心能思慮所以能思慮者何物目可見也其視不可見耳可見也其聴不可見口可見噬者不可見鼻可見嗅者不可見手足可見其運動步趨者不可見血氣可見其使之周流者不可見心之為臟可見其能思慮者不可見其可見者有大有小有彼有此有縱有横有髙有下不可得而一其不可見者不大不小不彼不此不縱不横不髙不下不可得而二視與聴若不一其不可見則一噬與嗅若不一其不可見則一運用步趨周流思慮若不一其不可見則一是不可見者在視非視在聴非聴在嗜非嗜在嗅非嗅在運用屈信非運用屈信在步趨非步趨在周流非周流在思慮非思慮視如此聴如此嗜如此嗅如此運用如此步趨如此周流如此思慮如此不思慮亦如此晝如此夜如此寐如此寤如此生如此死如此天如此地如此日月如此四時如此鬼神如此行如此止如此古如此今如此前如此後如此彼如此此如此萬如此一如此聖人如此衆人如此自有而不自察也終身由之而不知其道也為聖者不加為愚者不减也易卦畫於伏羲更卦辭作於文王四爻辭作於周公聖十翼作於孔子圖四聖一易也四之者後儒各以己見為之非四聖之本意也盖自伏羲時仰觀俯察近述逺稽始畫八卦卦即象也聖人之心學難以語人乃以天地自然之象畫為卦爻使其因象以自得於心耳六十四卦三百八十四爻不過因八卦而重之亦示人以變動不居無體無方之象也象即文字即易也萬世心學肇端於兹矣文王統一卦而為之辭是謂彖辭周公分各爻而為之辭是為爻辭文周之辭皆發明伏羲卦爻本意初非自為一易也孔子除大象外如彖傳所以發明文王彖辭象傳所以發明周公爻辭其於繋辭說卦文言諸篇無非反復發明三聖之易耳謂四聖各一其易也可乎哉非四聖有意以强同也心一也二之不可以語心道一也二之不可以語道易即心也道也合天地人物舉不能二之而謂四聖之易有不同哉但易本生生不息不可為典要而必欲一之也若疑於滯矣是不然四聖畫象繋辭本示人以簡易而後人反從而煩難之也豈知易則易知簡則易從易簡而天下之理得矣天下殊途同歸一致百慮者此也不可得而二也如乾變而坤乾坤變而屯蒙需訟以至六十四卦乾初爻變而為姤坤初爻變而為復以至各爻變為三百八十四爻其變不可勝窮是皆不可為典要者也若易之為書則合四聖而成之者伏羲卦爻固無所不統矣如文王於乾卦則曰元亨利貞周公於乾初爻則曰初九潜龍勿用謂文周早已不是伏羲之意可乎孔子之彖傳象傳謂其只是說道體非文王周公之本意可乎裂此書之義而四之謂聖人之心學大明於世吾不知也噫易學流布天下數十百年而舉世莫覺其謬良可慨哉若後儒或専於理或専於占或専於象數要皆得於己見所及而為之說焉則可耳遂謂四聖之易本自不同某主羲文某主孔子一倡百和羣然宗之萬世心學之祖曷庸此臆說横於其間耶雖然四聖之易具在也學者齋戒神明洗心紬繹勿以一毫巳意舊說參於其中由孔子以求之周文由周文以求之伏羲易果一乎果四乎吾亦不能一之四之也善易者其自得之乾坤栽木者必培其根濬水者必窮其源學易不窮其根源孰能暢其枝達其流窺其生生不測之藴哉易卦未畫以前未暇論也畫卦之始謂不起於乾坤之竒偶乎然則乾坤二卦非六十四卦三百八十四爻之根源乎全經卦爻未能備舉然乾坤未明何有於八卦八純卦未明何有於六十四卦試以乾坤言之乾竒坤偶乾陽坤隂乾天坤地固相配也然伏羲畫一陽象也畫一隂象也一之虚其中非所以為受一之象乎文王於乾則曰元亨利貞於坤則曰元亨利牝馬之貞坤而取象牝馬則乾固馬也坤之牝馬非即所以為受乾之象乎乾坤元亨同而坤利牝馬之貞茍非牝馬不足以順乾而謂之利貞可乎下文先迷後得主西南得朋東北䘮朋安貞皆此意也孔子於乾彖曰大哉乾元萬物資始乃統天於坤彖曰至哉坤元萬物資生乃順承天謂乾元固大也而至於其大者非坤乎乾資物始也因其始而資生者非坤乎乾統乎天而順承天者非坤乎乾之與坤一而二二而一猶之夫婦雖若不同其實隂陽相合始能生育生雖在婦始則由夫下文後得主而有常承天而時行皆此意也以孔子之彖傳而求之文王之彖辭以文王牝馬之象而求之伏羲􅅀􅄲之畫其果同乎異乎恐不可謂之各一其意也然知乾坤則知坎之陽實而取心象離之隂虚而取牝牛之象非即利牝馬之貞乎知乾坤坎離則知艮震之陽猶之乾坎而巽兊之隂一則曰剛巽乎中正而志行柔皆順乎剛一則曰剛中而柔外說以利貞以隂卦而皆有取於剛中非即坤順乾之意乎知八純卦而其餘重卦可類推矣三百八十四爻亦不能舉而試以數爻言之初九潜龍勿用孔子象曰陽在下也又曰陽氣潜藏曰下也恐與周公之意無異也於潜龍勿用而不明其樂行憂違成徳為行之意可乎九五飛龍在天象曰大人造也依孔子文法恐下句即所以明上句也况在九二云利見九五而九五之聖作物睹非即天地合徳之大人乎坤六三含章可貞即利牝馬之意也地道無成而代乾以有終果始雖無成後必有終之謂乎以此類觀三百八十四爻而謂四聖各一易者要皆不能宗孔以求乎卦爻之象義云爾世之學易者果能不泥於舊說齋戒退宻一以孔子為宗真知乾坤合徳坎離互藏則不特剥復夬姤否泰既未可黙㑹也繫辭所謂乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能所謂知崇禮卑崇效天卑法地所謂一隂一陽之謂道隂陽不測之謂神所謂闔戶之謂坤闢戸之謂乾一闔一闢之謂變往來不窮之謂通象傳所謂用九天徳不可為首用六永貞以大終也皆可神明黙成而易在吾人矣一氣運而生天生地生人物焉隂陽於此乎分生生之機渾闢而不可窮也非一氣之外别有一隂陽也一氣屈伸動即陽静即隂天即陽氣之運地即隂氣之凝人物即隂陽之消息盈虚生生化化於天地間者也觀古太極圖先天圖而造化之妙性命之原無餘藴矣易六十四卦本之乾坤乾元用九坤元用六豈隂陽之外又别有九六之用乎純陽為乾九即老陽數也純隂為坤六即老隂數也陽數竒由一三五七九而七為少陽九為老陽者陽主進故也隂數偶由二四六八而八為少隂六為老隂者隂主退故也其所以用老不用少者老變而少不變故老陽變少隂老隂變少陽八卦變六十四六十四各變六十四天地萬物之化生莫不畢具是故九為乾之用初九九二九三九四九五上九皆乾也凡各卦之九皆乾之用也六為坤之用初六六二六三六四六五上六皆坤也凡各卦之六皆坤之用也故乾初象曰潜龍勿用陽在下也坤初象曰履霜堅冰隂始凝也夫乾坤之初爻乃諸卦爻之凡例也觀此二爻則三百八十四爻凡所謂九六孰非隂陽之變乎信乎九六即隂陽也繫辭曰變動不居周流六虚上下無常剛柔相易不可為典要惟變所適其即二用之謂乎所以用九見羣龍无首吉羣龍即初九九二九三九四九五上九是也潜見惕躍飛亢變化莫測曽何首之可見乎然二用本無爻位而九六之用惟其時矣乾元坤元果二元乎乾陽也坤隂即乾陽之變化而剛者柔伸者屈也陽竒隂偶而偶即竒之中虚能受者也所以卦辭乾元亨利貞坤元亨利牝馬之貞牝馬從陽此其所以正也彖曰大哉乾元萬物資始至哉坤元萬物資生乾本無始而萬物資之以始也坤之資生得非因乾之所始而生之乎在乾曰乃統天在坤曰乃順承天以天而統於乾元其所以知大始者果何物也坤之所以作成物者不過順承乎天耳統天承天一乎二乎乾元坤元一而二二而一者也故用九見羣龍無首用六利永貞即利牝馬貞之意也象曰用九天徳不可為首也用六永貞以大終也夫陽大隂小而六以陽終為正則坤代乾終雖欲二之不可得矣此所以知乾坤之元則知九六之用為物不二生物不測不於此可黙識乎然則二用在人何居乾以易知坤以簡能神明寓於形氣之中形色莫非天性之妙果能知至知終陽明通乎晝夜則屈伸變化利用安身自不疑其所行也知行合一形神渾涵人之所以生生而成位於天地中者不以此哉否則乾元有悔坤先則迷或宜勿用而自試或宜時發而括囊雖人間事不出乎九六而總歸於日用不知也已噫欲窮理盡性以至命者九六之用其可忽諸乾知大學曰致知孟子曰良知陽明先生合而言之既以啟人之惑矣予復掲言乾知則人之惑也不滋甚哉盖儒學本天先儒巳有格言乾知大始易繋確有聖訓兹掲而言之不過縁人以遡之天耳匪為致良知之說觧紛争也昔有詰予者曰乾知之知主也子遂認為徳性之知何歟曰果如所言乾主大始乾以易主即易則易主乎抑知之義尚未能悉其藴乎詰者笑而解此縁近世競良知之辨者以别白是非為真明以曉了現在為大悟且摭釋氏靈明圓覺以為印證盖罪在致知之失真匪良知之罪也安得大有力者示以乾知之全體乎全體未得現前未免各從邉見致力此聖學之所以不明耳嘗讀論語曰天何言哉四時行焉百物生焉天何言哉時行物生天未嘗諄諄焉命之固人咸囿於知始之中而莫之覺也何也太極化生淵淵浩浩凡有知之類莫不資之以為始故百物洪纎髙下類聚羣分四時寒暑晝夜錯行代運孰有明辨如乾知乎即如人身一毛一髮之不亂即如草木一枝一葉之不淆孰有分析如乾知者乎特乾知大始廓然無涯人之聰慧竅隙有限非人知之與乾知異也所以乾卦三爻孔子有知至知終之訓乾知坤作坤之三爻孔子亦有知光大之言乾知果可専以主義釋之乎雖然得意忘言不以詞害意謂之主亦無不可者即如以知府知縣名官亦主之義也曾有主而不能曉了别白一府一縣之民物者乎是故維天於穆所以為萬象之主而照臨鑒觀即此於穆之天也天子穆穆所以為四海九州之主而彰癉慶讓即此穆穆之天子也道心惟㣲所以為萬事萬化之主而辨析通達即此淵㣲之道心也可見曉了别白不足以盡主之義而知體亦然彼即事物以窮理者既牿於見聞之末徒求之惺惺烱烱而於渾渾淪淪莫可名狀者未之信焉則亦不足以語徳性之真矣或曰既謂之性則天下無二性也鬼神幽矣猶知感通鳥獸蠢矣猶知運動木石之頑亦可以知言乎曰生長於春夏收斂於秋冬謂其不知春秋可乎雨之而即潤暴之而即乾謂其不知燥濕可乎然則文王不識不知孔子無知非歟曰虚明貫通乎天地真靈透徹乎古今此乾知也雖有知者咸資之以為始而莫測其朕兆莫窺其端倪此所以謂之知大始也若世之所謂有知者不過任意見以揣度假知識以研窮何可與論知大始哉或曰不識不知知之體也常明常覺知之用也因有無以分體用庶足以盡知之藴乎曰乾為天盍觀諸天乎於穆體也於昭用也於穆不在於昭之先於昭不在於穆之後非常明常覺之外别有不識不知者存非不識不知之中更有常明常覺者在也茍體用一分則明暗異象後先既判則有無各時故落頑空者謂之無記尚黙照者謂之鬼聚彼釋氏且呵之矣孰謂聖學可以有知無知分顯隠邪且大學知止自然定静何必不知然後為至善也孩提良知原自不慮何必不知然後為徳性也知之為知之不知為不知是知也孔子豈欺我哉今之從事致知之學者正由不能沉潜聖經反躬黙㑹未免各執意識或信了徹為性􅂕而喜任圓機或認顓蒙為自性而貪守虚寂聖學一貫之㫖愈乆愈晦職此故耳或曰乾以易知而有親何歟曰大哉乾元萬物資始是資始即一本之親也知資始作成所以乾坤為大父母也乾道變化各正性命保合太和何親如之所以乾始含融洞澈與天地萬物瑩然一體無所間隔不期親而自親者此也可見人之肖貌禀氣方其幼也孩提之童莫不知愛其親此易知有親者無所减也及其長也大人之學在明明徳親民此易知有親者無所増也乾知大始不信然哉然則乾知本易知至知終修天徳也良知不慮知愛知敬率天性也苟失此天然之全知者其何以全之曰乾陽坤隂陽明隂暗一陽復於坤隂之下曰復其見天地之心又曰復以自知是自知之一竅即復見天心之一機也否則坤先則迷復上坤隂則迷復㓙矣噫知崇效天而能自知焉人言孰得而惑之坤貞君子貞而不諒學者多以諒為貞貞諒之辨也難矣然天下之道貞夫一乾元亨利貞坤元亨利牝馬之貞二乎哉故貞之在易尤難辨也六十四卦悉本之乾坤若坤之貞與乾異則各爻其何以一之不知卦象起於一畫中寔為竒中虚為偶乾坤竒偶一而二二而一者也何也乾陽坤隂陽竒隂偶隂之虚中即所以受夫陽坤雖欲二乎乾不可得矣坤象牝馬牡非乾乎牝以從牡為正坤不以從乾為貞乎學易者觀玩坤之爻卦彖象當以乾為主則坤道方有着落而諸卦爻始得其綱領也是故乾健坤順因其健而順之也乾君坤藏因其君而藏之也乾垂象坤效法效法其所垂象者也乾知始坤作成作成其所知始者也大哉乾元至哉坤元隨其大而至之耳乾資物始坤資物生因其始而生之耳乾統天坤順承天順其所統而承之耳三爻無成代有終代乾之終而不敢居成功也此六三所以為可貞乎用六利永貞以大終陽大隂小而坤之用六終以乾陽之大也此坤之所利永貞乎先迷後得主坤先乎乾則迷而失道後乎乾則得主而有常也此坤之所以安貞吉乎以爻象及文言觀之六二之動直以方而動直即乾也六三隂雖有美含之以從王事而王事指乾也六五文在中美之至文美本乾也上六龍戰於野戰乎乾也爻之貞在從乾可知矣以卦彖及文言觀之乃順承天承乾也柔順利貞順乎乾也坤道其順乎承天而時行行乎乾也卦之貞在從陽可知矣所謂利牝馬之貞者不信然哉不止此也坤至三畫始為全體乃以妻道臣道地道明之地之生物一歸之天臣之建功一歸之君妻之孕子一歸之夫此固至明至顯不待解釋者而又何疑於坤之貞邪雖然乾坤一也非特坤必從乾而乾亦不能離乎坤也乾元資始品物流行而各正性命保合太和則必由乎乾道之變化是以純陽為乾自一變為姤為遯為否為觀為剥至於坤則乾盡變而化矣乾道必變而化焉乃利貞可見乾之貞且不離乎坤而坤之貞又何疑也此所以坤之卦爻彖象文言當一以乾為主故曰一隂一陽之謂道也否則言貞一之道而止以隂陽爻位言之未有不以諒而為貞者如乾二何以謂之龍徳正中坤五何以謂之正位居體屯一履之五何以貞㓙貞厲大壯二四何以皆貞吉也姑舉此數爻觀之凡六十四卦三百八十四爻不可觸類而㑹通之乎噫坤以順乾為貞無疑也然以乾坤反求諸已所謂心也神也知也非吾人之乾乎所謂身也氣也能也非吾人之坤乎學易者必得吾身之乾坤合徳始可以言貞一之道坎離天下之道中而已矣隂陽升降斯道之流行也隂陽得中斯道之樞紐也是故中立不倚無過也無不及也不偏於剛且柔以濟其剛不偏於柔且剛以濟其柔天地絪緼適萃乎中和之氣人物化生各稟乎冲和之質吾人以之立身行己應接事物莫非平夷正直之行此道之所以貴乎中也中何象乎聖人畫八卦示以坎離之象焉乾坤隂陽之純震兊艮巽隂陽之偏惟坎離卦象適得其中每卦六畫上卦五為中下卦二為中此以位之中言也坎離於卦體不獨居二五之位坎本隂也陽實寓乎二隂之中焉離本陽也隂實寓乎二陽之中焉其象如此其意實㣲得意忘象天地人物殆有不能瞬息離之者在也是中也無内外無隠顯無精粗無小大無乆暫無逺邇在天為日月在地為水火在人之身為精與神坎水也逺之為月近之為精也離火也逺之為日近之為神也人知水之隂也抑知其根於陽乎人知火之陽也抑知其根於隂乎水在火中水必涸火在水中火必㓕人祗見乎形質之粗也試觀極燥之後木石俱潤而水氣溢大濕之後木石俱燥而火氣炎水根於火大根於水水火相息兹可想矣人身冒寒而熱生燥中而汗生亦此義也不然五臟腎水也何為而有命門之火心火也何為而有心中之液尺寸間水火寒熱何為而並存乎繫辭云水火不相射云水火相逮盖謂此也然懸象著明莫大乎日月日本陽精而隂在其中月本隂精而陽在其中此其大明中天並行不相悖矣孰知自日而夜而搆精於地下自朔而晦而交㑹於天門隂陽摩盪其所以萬古貞明不息為有自也在天如此在人可知神陽日也匪精以攝之則飛揚而不凝精隂月也匪神以運之則沉滯而不化奈何養生者認此為竅妙縱情者聞此為迂疎静言思之坎上離下既濟人於百事莫不願有既濟之益也其於身心獨無既濟之願乎離上坎下未濟人於百事莫不懼有未濟之害也其於身心獨無未濟之憂乎懲忿則火不炎而神自存窒慾則水不漏而精自固怒忘慾寡火降水升養徳養身果二事乎大學傳曰心不在焉視而不見聴而不聞食而不知其味孟子曰耳目之官不思而蔽於物物交物則引之而已矣離坎失位故至此耳君子所以貴用中之學也雖然坎離隂陽得中果無異於虞廷執中之㫖乎中無定象亦無定在坎離之中一隂一陽之謂也允執之中隂陽不測之謂也惟精惟一坎離互藏中一而已矣噫八卦惟坎離剛柔得中六十四卦惟既濟上下得中此中行之所以少偏駁之所以多而剛克柔克顧人之精神何如耳隂陽本一致也乾陽坤隂坎中之陽即乾初藏之坤也離中之隂即坤初藏之乾也雖坤亦乾陽之偶而虚也離隂中虚惟虚則明坎陽中實惟實則誠勿泥其象勿滯其辭誠明一致坎離合體則與天地合徳日月合明而時中之學在我矣坎中書曰惟皇上帝降衷下民厥有恒性是人之性即上帝之降衷矣自昔聖帝明王相授受曰執中曰建中其殆千古盡性之學脉乎何也性乃此心生生之理凡天地間萬象萬化皆從此出渾然天下之大本而為吾人之心體也至子思述家學而作中庸曰天命之謂性曰喜怒哀樂之未發謂之中曰君子而時中後之言中者曰不偏不倚曰無過不及一本諸此耳嘗觀易六十四卦惟坎得陽之中故彖曰乃以剛中也易卦爻以中正為尚而人無二心性無二中謂坎之剛中非帝降之中可乎但坎卦畫象一陽陷於二隂之中似指人陷溺之後言也文王卦辭亦曰習坎有孚維心亨又似乎有心性之别矣不知人受天地之中以生所謂命也心也性也中也命名雖殊帝降一也昔堯以執中授舜而舜之授禹則曰人心惟危道心惟㣲惟精惟一允執厥中茍不善觀心則心亦可以二言之矣然心無象也一而二二而一者未易識也惟於坎之畫象觀其深焉一陽在二隂之中神明在形骸之中謂其非陷非險不可也此所以人心惟危也然一陽為二隂之主神明為形骸之樞非所謂惟心亨乎非所謂道心惟㣲乎果能精一乎道心之㣲即所謂允執厥中而中為天下之大本矣此所以觀坎之畫象而心之象可黙識也嘗合中庸之語而並觀之維天之命於穆不已而在人則謂之性人孰無耳目也謂之不覩不聞人孰無口體也謂之不言不動人孰無喜怒哀樂也謂之未發記曰哀樂相生正明目而視之不可得而見也傾耳而聴之不可得而聞也信乎不可恃而睹聞者即未發之中即於穆之命心雖寓乎形體不為形體之所拘性雖具於氣質不為氣質之所累乃易卦示人剛中之意也所以不離乎人之耳目而惟戒懼於不覩不聞不離乎人之口體而惟敬信於不言不動不離乎人之喜怒哀樂而時時此未發之中不離乎坤作成物而乾知大始不離乎明物察倫而由仁義行不離乎家國天下而止至善人心之主宰一性體之淵㣲人性之流行一天命之於穆是中也坎得而陷之否耶不然九二中矣象曰求小得未出中也九五中矣象曰坎不盈中未大也坎誠可畏哉或曰未發之中本無朕兆而可以有畫者象之乎曰易無象也假有象之卦以顯其真中無形也假有形之畫以闡其秘未畫之前原有易不可窺也即所謂先天也有畫之後即謂之後天矣曾謂後天之外别有先天者在乎試觀中當未發寂然淵然及發皆中節隨其應感之生生不窮者各循其天則焉剛中之體曾以感與未感有一毫之移易邪奈何受中以生人人同也而有生之後不為形氣陷溺者吾見亦罕矣雖然坎陷固多中未盡冺也宗廟知敬墟墓知哀因嘑蹴而羞惡見孺子入井而惻隠孰謂其剛中之盡陷乎惟行險不失其信履變不失其常顧人之存心何如耳慎毋失道守中以自陷於取坎填離之術離明知本明也原之天曰明命具之人曰明徳註云明徳者人之所得乎天而虚􅂕不昧是也書說命篇曰知之曰明哲明哲實作則是知即明徳而不知則不明無疑矣闕用不知者此也是故一陽一隂生生不測一動一静繩繩互根晝雖覺而多思其神光飛揚人固莫之知也夜雖寐而多夢其神光浮蕩人果知之否乎晝雖坐馳一覺即􅂕其神明具在人固莫之知也夜雖熟寐一呼即應其神明不息人果知之否乎夜隨嚮晦入宴息不待知識安排自然形神混合黙順帝則人固莫之知也晝則耳自聴目自視手自持足自行遇親自愛遇長自敬遇賔客自揖讓與夫一切飲食起居未嘗盡用知識為之布置而天則自脗合也人果知之否乎特患夫人無志於學自增機械桎梏以戕賊之耳志一立而覺性如故何難明之有或曰明徳乃人心虚􅂕之體人自明之耳必欲明明徳於天下何歟曰日月有明容光必照日月貞明之體本如是也所以曰大人繼明照於四方曰重明麗乎正乃化成天下明明徳者必如是而後能與日月合其明也可見充實而有光輝暢於四肢發揮於事業以至光被四表孰得而掩之或曰本明之體或為旦晝牿者如之何曰日入地中搆精之象也清明之氣見於平旦之好惡得非日夜之所息乎所以在易之離卦曰繼明曰重明在大學曰皆自明也湯之盤銘曰茍日新日日新又日新何一而非示人以明明徳之功乎若執泥無知為真知無明為真明則吾不知之矣震懼乾坤大父母也其男女各三而震為長男是震即天之長子也主器莫若長子則其出守宗廟社稷奉匕鬯為祭主非震而誰所以說卦傳曰帝出乎震夫以八卦運行四時而獨首乎震其義可識矣但男一也何獨於震見其可以主宗廟社稷之祭乎葢執鬯主祭負荷宗社責有攸歸而敬勝則吉震動不寧象亦可見何也一陽動於二隂之下者震之象也惟震則一敬自守百邪俱消敬天勤民㒺不祗懼而對越神明又敢乘之以一毫慢易之心乎故其卦辭曰震亨震來虩虩笑言啞啞震驚百里不䘮匕鬯彖傳曰震亨震來虩􅂒恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也夫震為雷陽氣為隂氣所軋乃奮擊上出而為震故豫大象亦云雷出地奮出非誤也明矣初陽一爻為卦主玩其畫象一竒在初不失本位即祭祀時雖雷霆震驚而匕鬯不失之象也其可守宗社為祭主也明矣觀初爻象辭即卦辭彖辭亦自可見若謂出下遺不䘮匕鬯不亦泥其辭而未㑹其意乎然六二億䘮貝六五億无䘮有事何也易六十四卦三百八十四爻皆所以發明此學發明此心而卦爻象彖之辭皆所以發明其畫象云爾二去初甚邇既以隂乘剛且初震之來也甚迅而二又純乎隂也故危厲不覺此心有所䘮焉五去初已逺而四之震震於隂也初已往矣四復來焉故五雖危厲無所䘮失且陽大隂小五乃陽位所以象曰其事在中大无䘮也二䘮五不䘮莫非此心之實象而卦中不䘮匕鬯之象不益明矣乎虩虩蘓蘓索索矍矍亦莫非形容震懼之意然震則敬心生而一敬自持豈獨天子為然哉大象曰洊雷震君子以恐懼修省盖出王游衍莫非天也敬天之怒無敢戲豫敬天之渝無敢馳驅我其夙夜敬天之威無一時一息而非聞雷之心也豈待天怒雷震為然哉君子戒慎不覩恐懼不聞是不覩不聞且戒懼焉君子慎獨之功淵黙雷聲曾以一時一息而離乎恐懼修省之學哉噫震動也震來虩虩動也笑言啞啞動亦静也震驚百里動也不䘮匕鬯動亦静也雖動而實静雖恐而實定萬變紛紜一真以為之感應此君子之心學也此震之所以亨也嘗謂善學者有悟於雷焉天下雷行无妄雷在地中不逺復雷出地奮以作樂崇徳雷在天上以非禮弗履何往非恐懼修省之學何往而非天之至教哉艮止大學之道在明明徳親民止至善惟知止則定静安慮得因之矣至善之止果何以方所拘之哉觀有所忿􅓰恐懼好樂憂患則心不在是心本無方所也有所之止豈止至善之道哉易艮其背不獲其身行其庭不見其人无咎彖傳艮止也艮其止止其所也後儒論止必引艮止為証是不免以有所之止為至善矣且曰不獲其身則内不見己不見其人則外不見人曰不獲身則無我不見人則無人是認上下敵應不見人我為至善也所以閉闗守静者離一切塵勞收視返聴者習止觀法門其視人我山髙者似或過之然潔身亂倫未免以虚寂為宗而於人我兩無與耳盡性盡人物之性者顧如是而已哉此無他狃於舊見舊聞固不肯反身以體貼艮背之象又不知崇信孔子彖傳以紬繹立言之㫖乃以艮背止所敵應為極則焉無恠也試以彖傳詳玩味之曰艮止也釋艮之義也時止則止時行則行動静不失其時其道光明此何謂也盖卦本言止而又曰行本言静而又曰動行止動静合乎時斯其道光明必如是而後合乎止之道也必如是而後能止至善也以下方釋艮背之義故云艮其止止其所也指六爻隂陽各止其所故隂與隂敵陽與陽敵雖當相應之位而實相敵上下敵應不相與也是以不獲其身行其庭不見其人无咎也茍不明時止時行而只以敵應不相與者當之則禪宗其至矣觀爻辭艮趾艮腓艮身艮限艮輔俱不云吉而上九獨云敦艮吉者下五爻皆有所而上獨無所故也不然止諸躬者亦至矣豈獨背為然哉大象曰兼山艮君子以思不出其位若泥於艮背不見人我之說則稿灰其心真有得夫不可思議者矣又何取於不出位之思哉程伯子定性篇有曰今以惡外物之心求照無物之地是反鑑而索照也易曰艮其背不獲其身行其庭不見其人孟子亦曰所惡於智者為其鑿也即程子之言亦可以想艮背之義矣况論學當求其至玩辭當㑹其意神易無方體也其思憧憧其欲逐逐艮背可無咎也時止則止時行則行非止至善其孰能之以此㑹通艮之卦爻彖象必有得意於言外者巽命大君居九五之位其尊天也其威雷霆也其命令風之巽入而莫不鼔舞之也惟其命令巽入乎民心故分雖尊而能下威雖震而能和萬民咸樂其鼔舞之善殆隨其更革變化惟命之是聴也易巽之大象也重巽申命夫巽為風觀其卦畫一隂變於二陽之下說卦傳曰巽入也惟巽而善入此即風之象即申命之義也蘇子瞻謂至於風悠然布於天地之間來不知其所自去不知其所入嘘而炎吹而冷大而鼔乎泰山喬嶽之上細而入乎窽室蔀屋之下發達萬物而天下不以為徳摧㧞草木而天下不以為怒故曰天下之化育有不可求而得者此聖人之所法以令於天下之術也即風以形容重巽申命之象殆盡之矣然人君䖏億兆臣民之上誠心以巽下果如是而已哉讀爻辭九五貞吉悔亡无不利无初有終先庚三日後庚三日吉然後知君之巽乎臣民固自有道此所以貞吉悔亡无不利歟何也巽者徳之制也位居九五本大中而至正也或有更革為天下興利除害非不可以至尊至威臨之使海宇翕然從風而向化也然上之巽以待下豈徒以法制禁令把持之哉法乆則變變則通而善變者無始故其初也與民商確其更化之宜凡利害可否惟民是便不敢先執己見以自信其終也民皆以為可更即從而更之執之信而且堅不以浮議而或搖觀之十干以甲為初癸為終也先庚三日丁戊己固無初矣後庚三日辛壬癸不有終乎更革事宜莫善乎巽必无初有終斯得乎中正之道而吉无不利在兹矣試觀巽卦一隂初變乎陽有庚之義隂下而陽上即无初有終之象也君道必如是而後重巽申命㒺不善歟是故堯舜之為君也都俞吁咈懽然論辨於朝堂之上何其巽也湯武征誅定天下若可以威令刼制之矣觀湯誓湯誥泰誓牧誓其所以諄諄於友邦冡君萬方衆庶者不既詳矣乎盤庚遷都民弗恱乃登進厥民曰明聽朕言毋荒失朕命至稱先后髙后以迪之稱乃祖乃父乃斷棄不救乃死以動之及其既遷奠厥攸居乃正厥位胥爰有衆曰無戲怠懋建大命今予其敷心腹腎腸歴告爾百姓于朕志何其諄切一至此也君之巽下克盡无初有終之道不於盤庚而覩其深哉非君之故為是卑遜也得乎邱民為天子有不容不巽者在耳臯陶謨曰天聰明自我民聰明天明畏自我民明威必民心恱而後天意得則巽固君道之必然矣况天之尊如故也雷霆之威如故也欲深入民心於以披拂宣暢而煦育之者非巽以風之何能然耶噫乾上坤下不可易也必乾下於坤而為泰火炎上水潤下不可易也必火下於水為既濟人君孰不欲其治道既濟而為泰乎巽九五爻辭端有不可忽焉者兊說君子之心乎道也内外人已似有體用之分其說諸心則一而己矣夫為己而說心之有道誠善於為己矣未有徒說諸中而無與於人者為人而民說之無疆誠善於為人矣曾有說諸人而無闗於己者乎兊說也彖傳曰順乎天而應乎人說以先民民忘其勞說以犯難民忘其死何以得此於民哉說以我之協天人也大象曰麗澤兊君子以朋友講習是我之說也說以講習之得朋義重聚樂人己其交暢矣所以卦辭曰兊亨利貞必如此而後得其正何也兊本以一隂在上成卦柔順外見說之義也二陽一隂剛中柔外說之正也兩澤相麗浸灌滋潤說之象也孔子言學而時習之不亦說乎有朋自逺方來乃理之必然者但友亦損益不齊直諒多聞必剛中也善柔便辟便佞或偏於柔巽者難必盡無矣孟子言佚道使民雖勞不怨生道殺民雖死不怨殺者觀覇者之民驩虞如也王者之民皥皥如也茍不審剛柔中正則說一也何為有王覇之分歟故爻辭二五皆曰孚孚以剛而中也五且孚剥有厲若三來兊上引兊則未免隂柔之外見矣所以說不以道不說也君子也說不以道說也小人也說之正與不正於此乎辨果中而正也又何内外人已之不臧耶抑是道也天之道也四聖卦爻彖象無非因天道以教人耳天豈有心於萬物之說乎兊正秋也萬物之所說也故曰說言乎兊盖萬物根蟄於冬發生於春長飬於夏至秋則萬寳告成焉惟其成熟於秋澤被萬物而化生畢歛美利具備此天道自然之說也九四商兊爻云有喜象云有慶正此意也是故君子非不說諸己也必深造自得而根心生色順天機也非不說諸人也必乆道成化而耕食鑿飲忘帝力也至此則光風化日魚躍鳶飛活潑乎上下同流與萬類相忘於不識不知夫亦自然而然者耳奈何說道不明於世也乆矣人乏剛中學鮮貞固玩物適情隨地皆性天之灑落違道干譽盈耳咸頌政之民謠聖學失真正道絶響明天道之說者曷勝慨嘆哉坤復易有坤復之際何歟曰一陽為復六隂為坤隂窮而陽未生為坤復之際此先天圓圖也然則圖奚象哉曰象心易稱洗心退藏於宻是也曰心奚藏宻而復奚由坤耶曰予讀書亦嘗疑所謂歸根復命云者以為易生生耳矣奚事於歸復然以天地日月徵之坤復者在嵗為冬春之際在月為晦朔之際在日為亥子之際夫彼豈不欲常春而閉以冬不欲常盈而𡨕以晦不欲常中而沈以亥哉不得不然矣何者盖天地萬物皆自心生心其根也未有不反其根得其生理者也心體退藏不動者也則天地萬物亦未有不冬不晦不亥而能反其根者也坤反之極也復生之始也非坤能生復然必坤乃復根在故也故淵寂者天地所託體也清和者羣生所造始也􅂕根深而後至精化游氣息而後淑氣生不深則不化不息則不生乾坤不幾於毁乎此心所以必藏而生理必由於歸復也是謂先天也然則動静無端隂陽無始夫亦有端始乎曰心生物而實無物不可象也往則天地萬物出而有來則天地萬物入而無其生機之可象者也而心未嘗來往也有來往則物矣惟無物故宻宻故藏恒藏恒宻安所測其端始哉顧機當徃必先來當屈乃有伸而來之往屈之伸皆從中起夫物來之不能往屈之不能伸與來往屈伸之可窮其中窽也今既斷復續萬古常然則神有由生明有由出聖人志深歸復静觀其間得其窽而窺其所以然曰天心其在兹乎盖感㝠於寂涵萬有於一原是謂坤復之際不可得象而示之意者也三極之大中也知此則即喜怒哀樂所未發有可得言矣曰人心未嘗一刻無喜怒哀樂也安所得未發歟曰未發非發之外也即發者之所以也試反之夫人喜怒哀樂四者不自能也又不更相能也然而恒喜怒恒哀樂也則伊誰為之乎四者不自節也又不更相節也然而過焉不及焉未嘗不作焉慊焉若或節之也則又伊誰使之乎殆必有其根而後能生生之若此也則人亦未有不反其根而能得其生生之中節若此也盖在天為天在人為人天所以生萬物人所以生萬事一也是以君子則圖反躬黙觀坤復之際而深研藏宻之幾焉庶有以善所發矣曰人之盪於發而迷所未發亦乆矣又安所知坤復之際而反之耶曰論易之中莫精於子思論求中之㫖莫要於孟子觀其言曰牛山之木嘗美矣以其交於大國也旦旦伐之可以為美乎其日夜所息雨露之潤非無萌蘖之生焉存乎人者豈無仁義之心亦猶斧斤於木旦旦伐之可以為美乎其日夜所息平旦之氣好惡與人相近者幾希旦晝所為有牿亡之牿之反覆則夜氣不足以存天地無一刻不生山木奚為而萌於夜良心萬古不容冺幾希奚為待夜氣而後存心源坤復之際其端可覩矣盖莫善於息莫不善於為為則牿而息則存夜氣者息之候也所謂未有不晦不亥而能深反其根者也先天之學也无妄徳不修學不講孔子尚以為憂而講學以修其徳不過妄復无妄已矣中庸曰天命之謂性率性之謂道又曰誠者天之道也誠之者人之道也至誠盡性豈能於性體之外增毫髮哉性本无妄純乎天也誠之者必有事乎修道之教要亦由有妄復无妄修其不正以歸於正而盡人以合天耳此所以不得不擇乎善也夫繼善成性一而已矣仁義禮智皆性中所固有而匪由外至者也然由仁義行者雖不無學知勉行之功而本吾性所固有者以行之則不期正而自無不正也若以仁義為美而勉强行之是善自外至之善可以為固有之性乎可以為天命之正乎故孟子謂由仁義行非行仁義又謂集義所生非義襲而取幾㣲之際不可不辨也修徳者必資夫講學之功誠身者必本乎擇善之審乃聖人惓惓垂訓深意也易无妄元亨利貞卦體上乾下震本動以天也所謂大亨以正天之命也然而又謂匪正有眚不利攸往何哉盖初爻陽剛不二以二不參以三此所以為无妄也但自畫象之初陽雖正而二三皆隂未免與乾體相間既有不正之可懼矣彖傳曰剛自外來為主於内是初陽主之於内者乃來之自外則匪正亦卦體所自致也且九四可貞象曰固有之也夫以陽居隂似匪正也而陽以在上為得正非四陽之可貞乎乾體純陽上卦三陽無所間雜非九四固有之徳乎在一卦之初九曰匪正曰外來在九四之一爻曰可貞曰固有何聖訓之親切著明一至此也盖恐人止知以无妄自信而不察夫邪正之幾耳不然乾體九二龍徳正中何為又欲閑邪以存其誠也是故元亨利貞者无妄一卦之本體外來匪正者震陽初動之㣲幾况性體無往來也震乃動體動則欲往既已來矣又欲往焉悖天命矣故彖傳又曰无妄之往何之矣天命不佑行矣哉由仁義行非行仁義兹可觀矣雖然難言也卦辭彖傳不利攸往而初爻則曰往吉且乾震皆陽无妄所以成卦在陽不在隂也五陽居陽位乃曰无妄之疾疾以應隂情繋而致也六二純乎隂矣乃曰不耕穫不菑畬則利有攸往何為六爻言之獨於二爻皆善辭乎此易學之所以難也或曰學易在人則動多涉於不正故聖人以有眚訓戒之耳乾天震雷卦象即造化自然之法象也曾謂造化亦匪正乎曰雷以動為體未有雷既震動常滯於一䖏而不往者惟動於春夏正也動於正秋收聲之後則亦不可以語正也明矣所以尾生孝己謂之无妄亦可謂天命之正可乎哉信乎學必講之明而後徳之修也斯為天下之至徳善必擇之精而後身之誠也斯為天下之至誠否則徳至无妄且恐匪正有眚惟知性知天者能自得之先甲後甲先庚後庚支干出於大撓止二十二字耳天地之否泰隂陽之姤復日月五星之躔次萬類之生生化化從宇宙開闢以來循環不息終始無端曾有一時一物不統括其中者乎以二十二字統括萬古之造化惡可視為厯家小技而鄙棄之也卦爻支干均之乎天地化育之消息也文周繫易於其卦爻欲闡明精義如蠱巽特取甲庚以為之象耳蠱奚取於甲乎上艮下巽為蠱自後天卦位與天干之位言之甲正東也艮東北巽東南艮巽之中有甲存焉萬物莫不終於癸始於甲故數日必以甲為初物必甲拆方露生意而甲固萬事萬物之始也然事之所在上既止之不能為下又巽之不肯為則事已蠱而壊矣欲以飭事非甲以始之何能大有為哉文王於此取先甲後甲之象先甲三日辛壬癸也不有終乎後甲三日乙丙丁也不有始乎故孔子彖傳曰終則有始天行也天行必始甲終癸人欲飭蠱而觀於甲得始事之道焉則振民育徳幹蠱用譽一策勵之百事就其緒矣蠱元亨利涉者以此巽五有取於庚也何言庚者變更之謂也一隂變於二陽之下於卦為巽觀於卦畫巽有庚之象也一嵗春夏為陽秋冬為隂天地革而四時成則庚雖用事於秋而一隂始變於巽是巽取庚象義亦㣲矣哉周公懼為人上者徒以法制禁令强民從已不知巽於民也故於九五一爻取先庚後庚之象夫君臣上下其分截然以君下民其道在巽巽於天為風於君為命令善入萬物者莫過於風善入民心者莫要於重巽申命况天之立君不過為民興利除害使之各遂其生耳君欲變通以宜民興其利除其害當惟民是便故未更之先必有命令以播告之集衆思廣忠益虚巳延納博採輿論不敢執一毫成心以盡其更始之道及其終也民皆以為可更即與民更之而既更之後則信如四時堅如金石不以浮議衆詘而或摇奪无初有終固如是也然自十干言之先庚三日丁戊己無甲固无初也後庚三日辛壬癸不有終乎君能體先庚後庚以申命行事其巽於民也至矣貞吉悔亡利有攸往夫何疑况甲陽庚隂甲拆庚變其義亦然若先甲後甲不遵孔子終則有始之彖傳先庚後庚不遵周公无初有終之爻辭止曰辛尚新也丁叮嚀也癸揆度也不特纎巧無當於蠱巽其背三聖亦多矣况文王於蠱曰先甲後甲周公於巽曰先庚後庚周公以先庚後庚為无初有終之象孔子以終則有始釋先甲後甲之義三聖如出一轍胡為乎謂其各一意也善學易者㑹而通之四聖一易當無待於辨矣已日乃孚聖人未施信於民而民莫不信未施敬於民而民莫不敬豈有他術哉孚於未言動之先故也惟未言未動之先而孚契於心則言而信動而敬殆有㨗於影響者矣夫民至愚亦至柔也然而不可以智術籠不可以威力刼撫則后虐則仇歴覧前代得衆得國失衆失國靡不然也所以古人上畏天威下畏民碞視匹夫匹婦猶或勝予而天之視聴在斯民焉欲得天心非素孚於民心也可乎哉惟民心之我孚則隨其變革設施莫不欣然從帖然服我不勞而功自成矣茍非心孚於平日則一言一動出悖來違雖以唐虞之揖讓恐朝覲訟獄謳歌者難必其無他也况湯武仗鉞興師以放桀伐紂改天命變國祚而東征西怨南征北怨盻盻然如大旱之望雲霓哉正以見堯舜湯武之革者為有素矣然是孚信之道也在天干曰戊己在五行曰土在八卦曰艮卦在人之五常曰信戊己也艮坤也土與信也一也孔子一則曰自古皆有死民無信不立一則曰人而無信不知其可也非孚信則居常且不可况於變革乎哉易革卦辭曰革已日乃孚元亨利貞悔亡彖傳曰已日乃孚革而信之是豈已革之日乃孚之謂哉果如其說則六二已日乃革之又何為其相悖也盖已乃十干之已即孚信之義也此卦上兊下離離火兊澤火澤上下不容不變革矣火變為澤其能遽變革之哉由離宫納有己土此離兊之所以革而孚也以四時言之離為夏兊為秋夏之所以革而為秋者由土旺長夏之内庚金伏於土中而火不爍金故五行兊為金金曰從革此所以天地革而四時成也即如後天卦位坤屬己土本居離兊之間十干次序由己而庚亦取更革之義可見由離而兊由夏而秋由火而澤由己而庚莫不然也四時革而成嵗天地且然又何疑於湯武革命順天應人非民心孚信之有素也其能然哉在湯武之革命且然則凡人之一言一動變化無窮一由誠信以為之主也又可知矣是故玩己日之辭者得意於象外則己土之在天地孚信之在人心殆有不可一日缺者不特六二爻辭與卦辭相合而三之革言三就有孚四之有孚改命五之大人虎變未占有孚皆可黙㑹矣况六爻動於二取象己日正以離中為己土之藏故此下三爻皆革而孚也若曰納甲特厯家小術也然十干四時五行八卦皆不能遺土此乃天地自然之變化也何為因納甲有離己之說遂棄己土之象而非之耶噫坤即土也己即土也離本納土信本配土土旺長夏兊金從革皆非予之臆說也人茍不以聞見自牿而於此一思維之始諒予言之不謬按此圖即前先天卦圖此則自逆數言也夫數往者順知來者逆先儒謂自震至乾為順自巽至坤為逆是以陽為往隂為來乾兊離震専為數往而易逆數專屬巽坎艮坤之知來矣殊不知隂陽往來雖有時可以陽順隂逆言而此段數往知來則不可以順逆偏屬也惟即圖象與卦位觀之自見矣試以順逆二字之義言之即如時當夜半自今亥時數至昨日午時自昨午時數至昨夜子時雖十二時六為陽六為隂要之皆數往也順也所謂茍求其故千嵗之日至可坐而致是也自今子時推至明日之己自明日午時推至明夜之亥亦有六隂六陽之分要之皆知來也逆也所謂成敗利鈍非臣之明所能逆覩是也然則自乾之純陽歴兊離以至震之一陽自坤之純隂歴艮坎以至巽之一隂非數往之順乎由震之一陽歴離兊以漸至純陽之乾而陽極隂又将姤由巽之一隂歴坎艮以漸至純隂之坤而隂極又将復矣非知來之逆乎可見易數皆未來生生不窮者也故曰生生之謂易子曰知幾其神乎幾者動之㣲吉之先見者也中庸曰至誠之道可以前知善必先知之不善必先知之故至誠如神知來即知幾前知之謂也此易之道也故縂以易逆數言之况數其已往知其將來理本一致而隂陽順逆之數無端惡可以一圖八卦截然分半邉為數往半邉為知來哉問易賛神明生􅆱何如曰神明幽而難測聖人贊其妙以蓍生數而闡之故參天兩地而倚數天地以日月為用古人制字以日上月下為易日東月西為明神也者合天神地祗而言之者也河圖天地相交故陽生於下自下而上隂生於上自上而下洛書日月相交故陽升於東而消於西隂生於西而望於東九六者天地相交之度參伍者日月相交之數故乾用九四其九三十有六坤用六四其六二十有四六其九四其六故乾坤之策三百有六十夏至日行天度二百一十有六陽極隂生老陽變為少隂冬至日行天度一百四十有四隂極陽生老隂變為少陽月朔以六變七一陽生參伍至朢而陽極月朢以九變八一隂生參伍至晦而隂極日月往來以生明而寒暑往來以成嵗天地交而萬物生皆日月著明之功也故神妙萬物百姓日用而不知聖人則河圖洛書作大衍以生蓍數參兩參伍用九用六隂陽往來變化無窮以此幽贊神明以此齋戒神明此易之作顯道以神徳行而利用出入民咸用之謂之神也蓍圓而神卦方以知非方圓神知岐蓍卦而二之也盖蓍之數七七四十九象陽圓其為用也變通不定因之以知來物自卦未成言也卦之數八八六十四象隂方其為用也爻位有分因之以藏往事自蓍既揲言也以蓍之神得卦之知故爻之義可推吉㓙之告可獻矣夫吉㓙乃民之所患也聖人為民患之而教之以蓍卦焉蓍之神知未至之吉㓙於先卦之知藏已定之吉㐫於内俾民趨吉而避㐫此聖人作易之意也况聖人以此洗心而洞照天人之理以此齋戒而益尊蓍卦之徳此所以退宻神明自然之易已在吾心故托神物以施之於民通天下之志定天下之業斷天下之疑而開物成務冒天下之道也明道先生嘗舉聖人以此洗心退藏於宻令人深思自得又謂易要玩索齋戒以神明其徳夫其示人可謂最切要矣然知來藏往明天察地未可以强通也而神知乃人人所固有者洗心齋戒得非學易之要法哉帝神易也者天地造化之書也說卦傳謂帝出震齊巽又謂神妙萬物先儒指此為文王後天卦次然既曰帝又曰神豈帝神有二哉帝即神之主宰神即帝之運旋帝也神也一天也或曰天神天帝信無二矣然謂神無方謂神不疾而速不行而至皆自帝天造化言也於人何與哉曰神無分於天人想無疑也世所疑者不過謂人與天帝不相及耳然而象帝之先難言也無足恠也嘗莊誦大雅之詩而深有信於天人合一之學非徒明明在下赫赫在上相感通己也盖惟天人之合一也其生也神與天俱其亡也神與天游無生死存亡無古今終始也何也大雅稱述文王皆周公作也以子述父以聖誦聖周公豈欺我哉皇矣篇一則曰帝謂文王無然畔援一則曰帝謂文王予懐明徳孰不知天無言也而屢云帝謂其所以聴於無聲者予信周公不我欺也文王篇一則曰文王在上於昭于天一則曰文王陟降在帝左右孰不知天無形也且文王死矣而云於昭陟降左右所以視於無形者予信周公不我欺也然其所以不我欺者由文王生平之事天順帝周公習於見聞也乆矣盖其生也小心翼翼昭事上帝肅肅雝雝自刑寡妻以至迓家邦而亦臨亦保之匪懈無往而非昭事之時也不識不知順帝之則故亹亹穆穆緝熈敬止自求厥寧以至觀厥成而夏革聲色之俱忘無一而非黙順之事也所以嘉止定祥大邦有子一天作之合也王赫斯怒詢爾仇方一天討之行也商之孫子侯服于周一天命之新也可見文王之與天也昭事黙順存天神合天徳巳非一朝一夕之故則其亡也於昭陟降神即天之神也徳即天之徳也又何生死存亡之間哉觀武王陳師牧野三千人惟一心矣猶曰上帝臨汝無貳爾心天人合一兹益明矣或曰文王天人合一誠哉無死生無終始也若云以此為學亦可以望之衆人哉曰天生烝民有物有則故心天君典天秩禮天叙人人同也天之牖民如壎如篪故思天啟知天明行天能人人同也昊天曰明及爾出王昊天曰旦及爾游衍凡動静語黙間未有一人能逃乎天之所監臨也若衆人果信此學知神之格也不可度不可射而屋漏且不愧則睿聖當不獨在衛武公也夫何天生蒸民靡不有初而鮮克終焉不知所以敬天怒畏天渝憲憲泄泄靡明靡晦及至不可救藥乃呼天而訴之曰瞻仰昊天則不我惠曰我生不辰逢天僤怒亦無及矣然則天可學乎曰天載固無聲臭而詩曰無念爾祖聿修厥徳永言配命即所以法天也善乎張子曰神而明之存乎其人不知上天之載當存文王黙而成之存乎徳行存文王則知天載之神噫神明黙成易道也果能小心昭事黙順帝則即乾元用九天則乃見矣雖天無聲臭而文王可師於昭陟降皆實事皆實學也天人合一觀於詩不益信夫學易之㫖哉學易易之道天道也學易者其學天乎天地大徳曰生而生生之謂易信乎易即天也然天之所以生生者未易窺也隂陽剛柔之迭運盈虚消息之惟時凡宇宙間成象成形羣分類聚莫非天道之生生而變化莫測於何而學之哉繫辭曰易之為道也屢遷變動不居周流六虚上下無常剛柔相易不可為典要惟其不得為典要此學之所以難也將欲沉潜思慮以學之乎易本無思也何所庸其思也將欲勉强作為以學之乎易本無為也何所庸其為也將欲由方體以學之乎神易本無方體而一毫力不可着方體非易學也况孔子天縱至聖其知生知其行安行得以不思不思之得即易也中以不勉不勉之中即易也無可無不可夫焉有所倚也况易以道時孔子聖之時也乃曰五十學易何哉抑以易本天道學易所以學夫天也然五十知天命矣下學上達知我其天而仲尼即天也已何事於易之學哉且其學也韋編至於三絶則簡編未嘗釋手可知也果謂立象盡意卦畫有難明歟伏羲畫而重之不過六十四卦三百八十四爻已耳畫象能幾何也果謂繫辭以盡言易書廣大悉備而辭未易窮歟除十翼如文之卦彖周之爻象易辭能幾何也以此擬度至聖亦陋矣至云學易可無大過抑又以吉㓙悔吝生乎動惟蓍卦藏往知來故欲精其占而學之歟此皆以常情忖度聖人尤淺之淺者安足以窺孔子學易之心哉噫易以順性命之理而和順道徳參兩天地非齋戒神明洗心退宻未易窺也今以常人之聰明觀玩辭象占變其於紙編未能一絶何能窺聖人學易之萬一也然則易之所以生生仲尼所以終身潜神易學卒不可得而測度矣盖自吾人觀聖人其知能皆性生也孔子則曰我非生而知之者好古敏以求之者也自吾人觀聖人本立於無過之地也孔子則曰丘也幸茍有過人必知之自吾人觀聖人吉㐫消長進退存亡莫非天也莫非易也何待學哉孔子則曰其為人也發憤忘食樂以忘憂不知老之將至云爾周天三百六十五度天無一息不運此所以萬古生生而不窮仲尼與天並運知通晝夜無一息不學夫易此所以為萬世之天也所謂不如丘之好學學此也學而時習習此也乾大象曰天行健君子以自强不息其殆仲尼之自道歟但聖如仲尼猶曰學易可免大過而願學仲尼者果潜心易道窮神知化求所以先天而天不違後天而奉天時焉否乎是可以言易矣圖書編卷九
