body:
  text: 圖書編卷五十九明章潢撰山總叙天在山中易取大畜之象夫山雖廣矣大矣畜天能幾何哉而聖人因象教人則曰君子多識前言徃行以畜其徳殊有得意于山天之外也余于山而類編之得無大畜之意歟嘗閲載籍古人于一山一水各有圖經余深病載籍弗廣見聞淺鮮于殊方圖經未獲全覩類編輿地圖書凡九州之沿革畿省郡縣之夷險九邊之阨塞四夷之疆域悉圖而述之蓋為國計攸關也然水與山一也海且圖焉以萬里海防與海運所關最重河且圖焉以河漕為當今急務江且圖焉以江防亦匪細故乃獨畧於山者得非謂嶽鎮祀典之外山於國計無與哉近偶遐想古今英傑挺生悉鍾山嶽之靈秀非可以一方一事比也山獨可略耶但山志散漫遍詢藏書之家亦視為贅肬弗之畜焉今所得而録者不過千百中之一二耳且巖谷勝境多仙翁禪客假之以棲真騷人逸士託之以寄興而記山遊者又似縱好異之談故其中所可圖而書者愈鮮也雖然斯道在天地間何顯何藏何常何異而多識以大畜者必不為山所局也是故峯巒之嶙峋聳抜天際巖洞之邃杳深入地中竒竒怪怪詭異萬狀非鬼神之工巧何造物之不可常情測一至此耶噫醯甕井天拘方曲見覩山類之圖編亦當為之長一格云故孟子曰孔子登東山而小魯登泰山而小天下崑崙墟在西北三成為崑崙丘崑崙説曰崑崙之山三級下曰樊桐一名板松二曰𤣥圃一名閬風上曰層城一名天庭是謂大帝之居去嵩髙五萬里地之中也禹本紀與此同髙誘稱河出崑崙伏流地中萬三千里禹導而通之出積石山按山海經自崑崙至積石一千七百四十里自積石出隴西郡至洛準地志可五千餘里又按穆天子傳天子自崑山入于宗周萬里西土之數自宗周瀍水以西北至于河宗之邦陽紆之山三千四百里自陽紆西至河首四千里合七千四百里外國圖又云從大晉國正西七萬里得崑崙之墟諸仙居之數説不同道阻且長逕既綿褫水陸路殊徑復不同淺見末聞非所詳䆒不能不聊述聞見以誌差違也其髙萬一千里山海經稱方八百里髙萬仞郭景純稱直上有二千五百餘里淮南子稱髙萬一千一百里一十四步二尺六寸按言崑崙最妄者云去嵩髙五萬里閬風𤣥圃瑶池華蓋為仙人所居云臨川吳氏曰天下之山脉起於崑崙山脉之所起即水源之所發也崑崙為諸山之祖按性理大全臨川吳氏曰天下之山脉起於崑崙蔡牧堂發㣲論曰凢山皆祖崑崙陶公捉脉賦云大智察脉起自崑崙明山寳鑑云山脉之起本於崑崙是皆言天下之山始於崑崙也然觀山之所始必究其水之所起觀龍之所終必察其水之所界今以輿圖攷之天下諸水皆原於西北是可見山之起於西北矣蔡文正公曰山水皆原於西北故禹叙山叙水皆自西北而東南是也或云崑崙在西海戌地北海亥地東南接積石圃西北接北户之室東北臨大活之井西南至城南之谷亦荒逺莫稽而楊公又云須彌山生四龍崑崙特其南肢葛谿氏述其説曰須彌山是天地骨中鎮天心為巨物四肢分作四世界惟有南龍入中國南龍入自崑崙山龍子龍孫皆可别雖據佛經人所罕見闕之可也今但以中國山川之可攷者論之則崑崙誠諸山之祖在中國之西北九峯蔡氏云中國山勢岡脊大抵皆自西北而來蓋可見矣崑崙天下山之頂也廼天下山之至髙處山之起勢處其東面中原也所以江淮河濟水皆東流其三面西域諸國也故自流沙以西水皆西流南自吐蕃兩廣水皆南趨北即沙漠又天下岡脊至髙之處直北虎林至海都木鉢子田地地勢又逐漸而低水皆北流南視陰山之地反為極南之境矣以此觀之地形如一亭子中髙而四方下崑崙乃其結頂處四下之簷乃四方之國土考其流水可見必皆㑹同於四海楊筠松曰須彌山即崑崙也是天地骨中鎮天心為鉅物四支分作四世界惟有南龍入中國此言殆有傳授若果分四支則崑崙山有四條分水黄河發自崑崙是一條分水入中國自陜汴至廬鳯淮揚是一條山自蜀岷山至寧紹台是一條山筠松所言南龍者也黄河北邊一支經雲中太行至幽冀作北京東北去朶顔三衛等處東去遼東由此南渡鴨緑江作朝鮮國分而北行者入沙漠其極合有分水與黄河界合此龍而莫考其詳流沙一派殆是此龍北邊分水配黄河者也由此觀之則崑崙支派入中國者不但一南龍而已五嶽諸名山總叙吕東萊先生晩嵗卧家深居一室若與世相忘而其周覽山川收拾人物之意未能已也嘗有感於宗少文卧遊之語每遇昔人記載人境之勝輙命門人隨手筆之目之曰卧遊録非直為怡神適志之具而已矧海宇巨嶽名山足跡弗能遍幸有先哲圖記具在時時覽之雖不出户而神之所遊不廣且大乎因而第之彼天壽之山龍翔鳯舞自天而下其旁諸山則玉帶軍都連亘環抱銀山神嶺羅列拱䕶勢雄氣固以奠皇圖鍾山龍蟠石城虎踞渢渢乎大江之險汪汪然彭蠡之湖地控三山洲分白鷺惟兹形勝實南北之兩都者次則太華少華芙蓉明星鴻門之坂長平之坡漆水沮水涇河渭河四塞之國關中奥區太室少室嶕嶢之瀆左伊右瀍背河泝洛嶔崟崤函天壇王屋偉哉周南中華之域大白之山大明之湖三觀岱宗二門天啟石閭梁父云云亭亭慿山負海臨濟枕汶太公用之而富管氏資之以興䝉羽東峙鉅野西馳尼阜鍾靈泗源萃氣乃𤣥聖之所生實速肖之闕里及夫祝融紫蓋之蜿蜒君山洞庭之吞吐金焦京口之竒天目吳越之秘青城玉壘雲烟之外匡廬傅陽星辰之裏五羊之羅浮八閩之武夷若斯者皆韞乾坤之精英萃萬有之神竒是誠宇内大觀也幾欲長遊逺睇南窮滄溟北抵紫塞東折若水之枝西奄䝉汜之谷頂摩太清轍環八埏縱游以大吾觀而不吾遂也東萊卧遊之意詎能忘哉噫壼丘子謂務外遊不如務内觀務外遊者求補於物務内觀者取足於身兹録也若以之博覽多識外也以之怡神適志亦外也惟内觀者惟善於卧遊云五嶽叙粤若太極剖判非三才無以孕百神之靈一氣周流非五行不能儲萬物之秀是則五行三才百神一氣萬物無所不在矣故在天為五星在地為五嶽在人為五臟在物為五色至於聲教亦無所不備矣有逆順生殺消息盈虛之理得其道者聖功生焉神明出焉百姓日用而不知故君子之道鮮矣夫五嶽者自融結之始與五行之氣并生故其神也命五帝以封之其祭也秩三公以視之其靈也惟聰明正直以司之天子嵗以四立之日各於主方而祭之常禮也故以我朝敇祀五嶽五鎮之禮首是編云皇明詔書奉天承運皇帝詔曰自有元失馭羣雄鼎沸土宇分裂聲敎不同朕奮起布衣以安民為念訓將練兵平定華夷大統以正永惟為治必本於禮考諸祀典知五嶽五鎮四海四瀆之封起自唐世崇名美號厯代有加在朕思之則有不然夫岳鎮海瀆皆髙山廣水自天地開闢以至於今英靈之氣萃而為神必皆受命於上帝幽微莫測豈國家封號之所可加瀆禮不經莫此為甚至於忠臣烈士雖可加以封號亦惟當時為宜夫禮所以明神人正名分不可僭差今命依古定制凢岳鎮海瀆並去前代所封名號正以山水本名稱其神以及城隍神號一體改正厯代忠臣烈士亦依當時初封以為實號後世溢美之稱皆與革去其孔子善明先王之要道為天下師以濟後世非有功於一方一時者可比所以封爵宜仍其舊庶幾神人之際名正言順於理為當用稱朕以禮祀神之意所有神號各開列於後一五嶽稱東嶽泰山之神南嶽衡山之神中嶽嵩山之神西嶽華山之神北嶽恒山之神一五鎮稱東鎮沂山之神南鎮㑹稽山之神中鎮霍山之神西鎮吳山之神北鎮醫無閭山之神一四海稱東海之神南海之神西海之神北海之神一四瀆稱東瀆大淮之神南瀆大江之神西瀆大河之神北瀆大濟之神天下山分四條分主二十八宿曰岍岐荆山壺口雷首大岳底柱東方宿也其次曰降婁𤣥枵以負東海神主岱山曰嵗星曰析城王屋太行恒山碣石西傾朱圉北方宿也其次曰大梁析木以負北海神主恒山曰辰星曰鳥鼠大華熊耳外方桐柏嶓冡陪尾西方宿也其次曰鶉首實沈以負西海神主華山曰太白曰荆山内方大别岷山衡山九江敷淺原南方宿也其次曰星紀鶉尾以負南海神主衡山曰熒惑中州居天下中其次曰鶉火大火壽星豕韋神主嵩山曰鎮星論周嶽與虞夏商不同漢嶽與虞周不同王制有恒山衡山而不言泰華嵩山舜典有四嶽而不言中嶽蓋王制南北以山為至東西以水為至故五嶽言其二舜典言四方廵狩所至地故五嶽言其四泰山為東嶽華山為西嶽恒山為北嶽衡山為南嶽嵩山為中嶽嵩山崈山縣之崈髙山即禹貢之外方也初無嵩山之名職方山鎮有恒有岱有華有衡不言嵩髙而有嶽山蓋周都在五嶽之外故以雍之吳山為嶽山此周嶽與虞夏商不同也舜典南嶽孔安國以為衡山職方山鎮亦曰衡山是衡為南嶽明矣而爾雅有二説河南衡山為南嶽又曰霍山為南嶽蓋漢武帝廵南郡禮天柱山號曰南嶽是以衡山遼逺而移其神于霍山也説者謂一山兩名失之矣此漢嶽與虞周不同也九州藪澤在職方為九在爾雅為十蓋職方以州言爾雅以國言也爾雅藪澤之名如吳越之具區即此揚也楚之雲夢即此荆也大抵不殊獨晉之大陸齊之海嵎周之焦穫與職方不同五嶽真形未析其秘彼圖此者各殊其象必有意義存焉或亦據五行而象其畫歟且各奠一方而類聚為一圖因取其簡便以冠嶽鎮諸名山之首云北直𨽻順天府山鎮曰天壽山在府北一十八里山自西山一𢃄東折而至此羣峯聳㧞若龍翔鳯舞自天而下其旁諸山則玉帯軍都連亘環抱銀山神嶺羅列拱䕶氣勢雄固以奠諸陵本名燕山今改名天壽曰香山在府西北三十里上冇二大石狀如香爐蝦蟆有泉自腹下注溪谷亦號曰小西天云曰仰山在府西七十里峯巒拱秀中有平頂如蓮花心旁有五峯曰獨秀翠㣲紫蓋妙髙紫㣲中多禪刹曰西山在府西三十里舊記太行山首始河内北至幽州陘在燕强形鉅勢争竒擁翠雲從星拱于皇都之右每大雪初霽千峯萬壑積素凝華若圖畫然京師八景之一曰西山霽雪山勢與天夀山相為聨絡曰玉帯昌平曰幽都昌平曰龍山順義曰黍谷懷柔鄒衍吹律生黍即此曰密雲曰白檀密雲曹操破烏丸于此曰孤山通州曰靈山三河曰獨鹿涿州曰大房曰石經山房山縣西南五十里峯巒秀㧞若天竺山故稱曰小西天下冇雲居寺曰雲應山在豐潤縣西北四十里其山懸崖壁立巖畔有一湧泉濆流而下上有二石穴一名攻書室一名靈應洞曰莫金霸州曰崆峒薊州曰南龍遵化曰妙峯平谷曰徐無玉曰山出不灰木生火石曰燕山玉田彈琴峽在居庸開水流石罅聲若彈琴古蹟黄金臺在府東南十六里又一曰小金臺在府東南十五里燕昭王于易水東南築黄金臺延天下士後人慕其好賢之名亦築臺于此為京師八景之一曰金臺夕照孔水洞大房山東北上有懸崖千尺餘下有石窟潤二丈許泉水從中湧出深不可測時有白龍出現輙化為魚又嘗聞音樂之聲唐胡詹記嘗冇人篝火探之行五六日莫䆒其源但見仙鼠晝飛頳鱗時見保定府山曰即曰松曰伊祁完縣堯母所居曰馬耳完縣西三十里二峯髙聳插天若馬耳之狀其間有桃花洞曰唐嵓唐縣曰抱陽滿城曰班妃安肅曰大雄曰龍跡易曰石龜漆水曰束鹿巖東鹿縣北外隘内廣可容千餘人又名三丘古洞河間府山曰西山青丘曰天胎東灮白馬峰任樂壽巖巘盧師谷景州真定府山曰雲鳯井陘曰抱犢獲鹿曰交龍洞在抱犢山洞内一石盤紋如二龍相交之狀故名曰石溜元氏曰黄元氏曰廬平山曰文靈夀曰大派阜平曰嘉定曰少容曲陽曰箕許由隱處有棄瓢岩洗耳溪巢父碑曰紫微冀曰鼓城晉曰武强武强曰鈎盤臨城韓信敗陳餘于此曰檀贊皇周穆駐䠋于此髙百餘文曰紫金深熊耳峯在龍封山與龍首峯相對白雲洞在龍首熊耳二峰間方廣文許順徳府山曰風門曰石門邢臺曰黑沙河曰堯唐縣堯始封于此石皆五色錦章曰蓬鵲内丘扁鵲採藥于此曰湯山沙河縣山下湯泉岩上石室絶無塵穢俗號為聖人室廣平府山曰聰明曰紫荆廣平曰天臺肥鄉曰紫邯鄲曰雞澤雞澤大名府山曰沙鹿府城東春秋沙鹿崩即此曰洪洋開川曰愜大名曰大伾濬縣禹貢導河至于大伾即此曰白馬滑曰秋帝嚳葬此曰善化濬縣山有三峯如鼎峙南北相跨巨岡左右溪澗不趐百餘西南峯近西有黒龍潭上有龍祠又有仰泉如盆者七十二春夏水常不減崖紫斑石又名枉人山相傳紂殺北干于此故名居人為其能興雲致雨目曰善化永平府山曰陽府城有李廣射虎石曰黄臺遷安曰􅇠耳撫寧曰横山灤州曰碣石昌黎禹貢注北平驪城縣枕海有石如甬道數十里山頂有大石如柱韋昭以為舊在河口海濵世乆漸淪入海已去岸百里今平州東離海三十里逺望其穹窿似塚有石頂如柱即此也曰古蹟天橋柱漢武登碣石望海處隆慶州山曰東岩保安州山曰磨笄山趙襄子姊遺跡曰涿鹿黄帝破􅃖尢于此萬全都司曰大松山在龍門衛上有古松一株盤曲森聳故名曰翠屏右衛曰野狐嶺勢極峻風力猛烈鴈飛遇輙墜地曰獨石開平一石矻起平地上可搆數椽故有廟燕山在太行滄海間形勝雄據天下即今京師也以燕然山脉盡于此故曰燕山昔燕昭王築黄金臺以招賢者故又稱金臺朱子謂冀都是正天地中間好箇大風水山脉從雲中發來蘇秦謂天府百二之國杜牧謂王不得不可為王之地楊文敏謂西接太行東臨碣石鉅野亘其南居庸控其北勢㧞地以峥嶸氣摩空而崱屴真萬世帝王一都㑹也自石晉氏割燕雲十六州以畀契丹兹土不沾中國聲教者蓋饒四百年於兹矣雖以宋之全盛不能一日有况金元二氏豈足以當之哉乃今闡華立極屹為天府一代衣冠文物之盛光前邁後遂為我明聖子神孫億十萬載之業豈非天秘地藏固有待於其間乎金臺諸山都畿山川之勝其北崇山大嶺緜亘重叠東環大海西挾大行其南百里則軒轅之舊都俯視江淮如在階圻之下壯哉京師天之所啟也西山凡都㑹多勝槩若陜之終南洛之龍門建康之牛首臨安之吳山皆為古今登眺遊觀之地今留都之勝雄峙江南北都惟西山為最其崢嶸壯偉雖不逮陜洛諸山而竒峯怪石幽泉邃壑茂林澄湖與夫琳宫仙梵輝映金碧真天府之佳麗一方之竒觀矣甕山西山自太行聨亘起伏數百里東入于海而都城中受其朝靈秀之所㑹屹為層峰滙為西湖湖方十餘里有山趾其涯曰甕山其寺曰圓靜寺左田右湖近山之境於是始勝又三里為功徳寺洪波衍其東幽林出其南路盡叢薄始逹于野乃有玉泉出于山噴薄轉激散為谿池池上有亭乃宣宗廵幸所駐蹕之處也又一里為華嚴寺有洞三其南為吕公洞一竅深黒投之石有水聲數步不可下竟莫有窮之者又二十里為香山樓宇臺殿與石髙下其絶頂勝甕山其泉勝玉泉又二十里為平坡寺俗所謂大小青龍居之逈絶孤僻其勝始極而山之大觀備矣玉泉山玉泉山在都城西三十里最號竒勝徃遊西出阜城門望西山如屏幛層列翠出天半馳十餘里至豆腐閘上髙柳數株可蔭小憇其下周視野次平衍如席麥畦榖壠相間麥苗方生長寸許頃之造山下崇真觀觀外小澗環流澗橋壞循岸西得清淺之處以渡道士王希言引入山門遍觀殿廡依巖壁為之不甚𢎞敞從東廡轉入小方丈頗髙爽其前纍石為臺臺甃方池水黝然黑色冬夏不登耗池上小室掲其楣曰靈淵厨後一小池深尺餘泉涓然流溢其中㳂澗詣金山寺澗道欹側僅可步水清見底其中白石磷磷既至寺出抵一笑庵觀龍洞洞方廣無尋丈旁有石穴深窅莫可測庵中老僧髙頂龎眉長身竦瘦如野鶴希言云自朝鮮浮海而來常晏坐洞中夜有異物現􅊍恬不怖畏蓋澹然忘世者欲入華嚴寺觀泉支流不果徑至泉所泉上有亭宣宗命搆以備臨幸亭下甃石為池泉側出石罅中鑿石為龍吻吐之池前為石橋水從橋下出為長溪曲折流三百步許瀦為西湖秋髙氣清泓澂渟滀水􅊍浮天浩然一白亭後三頂址皆石無大樹相傳上有昔人遺跡寛可坐數十人俗傳洞賔嘗宿于此名吕公洞小西天余以事至范陽之懷玉鄉友人告余曰鄉西北山水秀異有石經洞為學佛者所居名曰小西天盍徃遊焉越明日從一僕出獨樹村北行四里許兩山對峙外隘内豁小溪中出石峯參差如犬牙水觸石流潨然有聲㳂溪前行十餘里有巨石數十横布水中躡之以渡登平岡而望四山多離絶之勢峰巒峙立如書空之筆者不可勝數其中一山若火燄而草樹獨茂問諸牧童知為白帶山而小西天之境在焉迤邐至山麓壁立似不可登徐望之有磴道循山之偏脊直上行者前後頂踵相接几三憇息始及山之半有石室題曰義飯㕔碑志云唐乾符中僧臧賁所建欲俾遊者至此不必齎糧也由㕔前折而東鑿石為道廣不滿尺横于山腹者一里許將折而北則條石為階凡九十九級上至平處行百餘步復有階如前級差少自其上折平而南有石堂東向方廣五丈許名曰石經堂堂有几案鑪瓶之屬以祀三寳皆石為之其上天然如帳頂下則甃石以平其地三向之壁皆嵌以石刻佛經字體類趙松雪意必元人所刻其中有四石柱柱之上各雕佛像數百皆為小圓􅊍而飾以金碧堂之前向為石扉八扇可以啟閉外有露臺縱僅八尺横與堂稱三面皆石䦨設石几石床以為遊人之所凭倚傍有禪房庖湢之所皆因岩為之不假人力堂之左有石洞二其右有石洞三復有二洞在堂之下方石經版分貯其中蓋隋沙門靜琬始以經刻未成而奄化唐貞觀後其徒道公等繼續成之至遼統和及金明昌之際有沙門留公順公亦増刻之前後納于洞中者通千餘卷石凡七百餘條有石幢記其目甚悉每洞皆以石為窗櫺用鐵固之縱廣不可知而石本之近窗者可以窺見觀其字畫則遼金所刻與隋唐自異其左洞有靜琬貞觀八年碑記嵌于門上大意謂未來世佛法有難故刻此藏之以為經本若世有經願毋撒開其用心亦可謂勤矣石洞之北有石池石井池廣七尺而深半之井深淺不可測則皆瑩然涵虛可鑑毛髮井之北十餘步有泉自竇中出涓涓不絶又有石為龍王像民禱雨則祀之古木蒼藤樛錯其上然陰翳慘澹不可久居由泉竇之南復攀縁小徑盤屈數十折至山頂有五石臺臺之上皆有白石小浮圖其南二者乃唐金仙公主所建刻字如新餘無題識不可考頂有巨石後廣而前鋭平出于虛空者數尺相傳謂之曝經臺余至其上回視四山則向之特立若書空之筆者皆隱然在履舄之下似可垂手撫摩稍臨石之鋭處而俯視之則陡絶萬仞無有底止但見横雲平凝其下悚然心悸魄禠急趨還石旁以坐忽有青衣童子類禮佛從師至為予佛歌道舞羣童隨之擊鼗鼓􅃻檀板品洞簫以和音響嘹喨上徹霄漢予不覺心神飄然若慿虛御風而出塵襟之表黄金臺余過易州客指黄金臺偕徃視之土阜漫漶不可辨疑焉據史記昭王為隗改築宫而師事之新序通鑑皆言築宫無臺字後漢孔文舉謂昭築臺以延隗梁任昉謂臺在幽州燕王故城中土人呼賢士臺亦為招賢臺始有臺名而無黄金字李善引上谷郡圖經曰黄金臺在易水東南十八里昭王置千金其上以延天下士水經注云固安縣有黄金臺遺址沿久或訛而此地亦據圖經得名耳孤竹山㓜侍先君謂在昌黎嘗與燕趙少年走馬古長城下縱觀竒阨險阻敵出没徃來之境徘徊慨歎欲問元順帝北遁之道而當時故老皆無在者蓋天下之治乆矣北覩大漠平沙漫草浩浩無人行跡令人有封狼胥繫單于之感當先帝休養華夷夷人不敢少有問塞上何如事邊吏日持名籍軍門報諾歸卧無他事軍士徃徃抱稚子牧雞豚或挾弓矢獵狐􅇠為樂南有孤竹山擕椒漿㵼石上歌西山之章思起竹君二子者與之游而不可得涕泗交頤竟悵然而返時走碣石最髙峯西望連巖􅃉谷大麓多虎豹熊羆所伏游東則大海浩渺與天無際隱隱數鳬鷗泛泊洪濤巨浸中兹其飡沆瀣挾日月跨虬螭招之倘來相與共遊八極之表者乎殳山史山禦兒地四平無山其東北六十里有小山曰殳山山由殳道人得名殳山之東曰史山予由大溪北折而東度陌越阡至殳山之趾居人四五家皆棘樊荆扉雞犬相應仿彿桃源中雲氣相盪不啻魚游波濤中山回路盡有石嶄然壁立者即殳道人尸解處其巔有小石突怒土中類迸筍者有盤亘類木走長根者三關諸山余履魏之三日東北走九百餘里謁易州受筴制真定之龍泉故諸關常以九月迫傳羽行隘歸先龍泉以下日暮抵曲陽五鼓起有寒色道謁北嶽廟廟幾割城之半古樹遮雲蟠鬱以百數門有卧石白而潤曰嶽所飛石據以祀者余猶記孝廟時馬端肅公上言嶽故在渾源州則當從渾源以祀而倪文毅公在禮部不能從説者以為恨且謂石晉棄兹嶽于契丹宋不能復而托辭於飛石以文其陋然真定在漢為常山郡即恒山也讀壁問李克用題石其廟貌著於唐固不自宋始姑闕之以俟考出城稍西北行望層山欝浡矗不知其幾千百最逺若銀城一𢃄土人云五臺山雪也豈夜所謂寒色者其時雪耶山距邑三百里而遥他山不為雪五臺獨為雪可想矣又數里得大溪幾半里流水淙淙第淺可掲云此所謂龍泉從五臺而下者也又數里稍入山山皆合中坼而為前大溪行左傍溪而右阻山溪囓山之足半武則左擔而過囓之既則就掲如是者百二十里大抵山稍避溪則為廬舍又稍避溪則一二見田疇最後避稍寛遂為縣曰阜平阜平四塞南門外可二百餘家城中僅二十家耳十二日早發阜平復渡前大溪循溪而行五里許轉山之别徑與溪别復得泉近諸山所滙也泉時錯道而流嗚咽多悽聲道益以上益險峻時時見人家石田瘠薄然亦可耕踰三十里得嶺曰鞍子過嶺山始舒而濶其下泉縱横流不復辨南北然别取道山背而下歸大溪耳龍泉諸峯蒼翠始若滴五臺雪近則若玉几已又得一嶺縈紆而進兩山旋愜其蒼翠色欲交石嶺峯怒起岝鍔刺天左嶺微寛竒石為槖駝為狻猊為人若鳥者間突出若搏栗紅楸黄雜以緑樹綴壁皆綺繡俄復得所謂龍泉激石間淙琤異聲石純白大小如玉蓋自鞍子嶺又四十里始得關度關而下十餘里曰長城嶺城之蓋塞五臺所入道也歸取月行峻關間顛踣者數二鼓絶抵縣困甚十三日早發阜平將之平山復渡前大溪始得寛疇不五里復入山山不能當龍泉險然時蛇行上數百步忽然墜空而下為深谷則頗寛如是者再三若曲項匏也泉處處有之時拂石流則最勞以故人食之病癭始余過曲陽人癭十而三抵阜平癭十而五上龍泉癭十而六七至是十不能不一癭矣三十五里得温泉左室為一湯右一湯稍熱清瑩可鑑毛髮不作硫黄息石無礜故也寂寂空山中令蓮花湯笑人宿查頭集集靈壽界也十四日辰發大霧顧山左右闢若决吾眥而朗者輿足下捷久之復得一山傍據大溪流極駛山自是坦陀不甚峻八十里抵平山宿未至八里為滹沱河晉之材順流而下至真定乃𣙜十五日發平山十餘里渡一河山足白雲四起若鋪綿稍逼之則蓬浡霧散自是雖上下山道不知險將抵井陘循大溪而行巨石如砥午遂踰井陘入故關關所繇入山西大道也兩山夾之皆陂陀漸上三十餘里乃抵關山近關而峻亦時得竒石渡關右折與道異蓋余所按厯者拒寇闌入境耳循墻上益峻不可輿至其巔則中外諸山皆在目蒼嶺千疊時與雲相浮沉銀浪風湧惝怳無際乆之乃下馬足騀駊時自思天以淮陰侯授成安君而不取為千古趙氏恨然淮陰好用秘能以木罌渡而虜豹山背逶迤徑千里安知其不能為陰平縋也復至故關異道折而左二十里取娘子關道崎嶇甚中一嶺為劍􅆃壑兩其輔目眩心悸將抵關廬舍顧稍密流泉淙琤行齊㕑間有水碓水磨之屬意甚樂之關傍為巨澗其北滙可容萬人水東入崕左崕峭壁數百仭右崕崩岸若劈中巨石為象馬槖駝者不可勝計奮與泉鬬磳硡鏗􅗟間入鼓節還縣復可三十里皆傍泉泉極冬不冰云此温泉也可以和餌凡十餘涉盖泉在兩山間山左盡則涉右右盡則涉左泉得山則怒而山益險山險而泉益怒則益勝吾足與目類若妬者足少緩覺目無竒而足若枳矣石壁中為竇為奥為囷廩為若舟水之聲為筝笙為鉦為松風為歌為市人喧百千狀故非故關擬也余時憊强自勵稱快乃還井陘夫此三關所受為趙守耳龍泉稍近寇則最險故次險則又逺彼勢必不入也彼入晉則掠晉安為舍晉事此不毛志必不入也彼掠晉而飽其裝重馬則已疲矣力必不入也彼不入而魏虚為之守是趙以虚名予魏也彼不入而趙復得魏使者兩主矣何所受指揮兩應則疲兩諉則廢是趙貫延魏敝也寇卒入而魏以虚名主之無一卒自隨且東西隔三百里顧魏則失趙顧趙則失魏是魏為趙代禍也故曰三關勿屬魏便銀山鐵壁南沙謂予曰銀山鐡壁去此不逺盍折北而去遂策馬亟馳行六十里至鄧隱峯道塲登八角亭東北有鐵崖壁立石色瑩然頃之月出爛如銀界洗盞更酌夜分不寐南沙曰隱峯傳中言鬼使不見隱峰何也予曰大脩行人具六通鬼神但具五通故人能見鬼而鬼不見人也南沙又曰鬼常見人而人不見鬼何也予曰常人有障而鬼神無障也明日將拄杖登頂寺僧曰頂由閻王鼻行僧住此十餘年亦不敢度予二人笑而不聴徑趨鼻側山脊如刀皆僅容一足長約十餘步兩旁如削下臨萬仭不可凝視罡風吹衣足不能立予曰列子履萬仭之險足二分垂外何如乃去鞾鞋趺坐徘徊取棋枰對奕南沙忽推棋東行比予回顧渠已度鼻矣予亦側身起立逐其武而東遂相與同登山頂予曰君無擬議予無思量乃能至此向使擬議思量東瞻西顧則私意起而反惑安能至此哉南沙曰士之立朝能以無擬議思量之心行之何事不辦坐未有頃寺僧憑樵者送茶飯各一琖樵者指長城外曰此為黄花鎮此為居庸闗又西為某闗又東為某鎮皆在烟光微茫中萬里龍沙風霾無際令人氣吞四表眼隘寰宇矣罡風稍定挺身度鼻而回初無難者回入僧院崔都尉京山侯自外來曰聞二公在此願得同遊遂舉觴薦山簌坐月下説長城險易都尉問曰邊儲奈何南沙曰材力雄富則士馬精妍今九邊蕭條軍士羸弱無怪敵來即跪而受刃也余曰若鬻官及鹽法皆令輸粟實邊三年斯富强矣都尉曰予忝宗臣如盲如聾願極言其詳庻斯游不空耳子曰齎銀易於運米運米易於輓粟人所知也而必欲貴粟者以其有九利也夫輓粟則車輛多徃過來續常有百萬輛在邊緩急可以聨作車城以禦侮一利也車輛多則騾畜多可以糞屯田益邊農變斥鹵為沃壤二利也人畜多則邊人得賣芻草賃房舍易沙埸為闤闠三利也車輛多則人多人多則貿易多孳貨填委不見邊愁四利也粟價既貴則邊農日富屯田日闢五利也輸粟者衆主客雜居一遇有警各出智謀以為我用六利也商賈既聚婚媾相卹各愛其身各䕶其家斯有固志七利也邊人既安土樂生則百工所萃器械不期利而自利城壘不期修而自修八利也百金易懐斗粟難掩侵漁之患不杜而自絶九利也在漢文景之富强用此道也京山撫然曰不圖山游而得國謀也龍山是邦惟龍山為絶勝自治城西南行十餘里抵山下無麓乍入谷未有竒㳂溪曲折行數里草木漸秀潤竦出嶄然露芒角水聲鏘然鳴兩峰間心始異之又盤山行十餘里四山忽合若拱而提環而衛者佳木竒卉被之䓤蒨穠郁風自木杪起紛披震蕩山與木若相顧而墜者使人神駭目眩又行數里得泉之泓澄渟溜者焉洑出石罅激而為迅流者焉陰木蔭其巔幽草繚其趾賔欲休咸曰莫此地為宜即下馬披草踞石列坐又行十里許大抵一峯一盤一溪一曲山勢益竒峭樹林益多杉檜栝栢而無他凢木也溪花種種金間玉錯芬香入鼻幽意可愛木蘿松鬛􅇢人衣袖又縈紆行數里得岡之髙遽陟而上馬力殆不能勝行茂林下又五里兩嶺若岐中得浮屠氏之居曰大雲寺有僧數軰來迎延入館於寺之東軒林巒樹石櫛比楯立皆在几席之下憇過謁主僧英公相與陟西嶺過文殊巖巖前長杉數本挺立有磴懸焉下瞰無底之壑危峯怪石巑岏巧鬬試一臨之毛骨森豎南望五臺諸峯若相聨絡無間斷西北而望峰豁而川明村墟井邑隱約微茫如奕棋局然徜徉者久之廻乃徑北嶺登萱草坡蓋龍山絶頂也嶺秀峻絶無路可躋步草而徃深弱且滑甚攀條捫蘿疲極乃得登四望羣木皆翠杉蒼檜凌雲千尺與山無窮此龍山勝槩之大全也偏凉汀太行西來數千里環帝都而東又數百里散一支南出為平灤諸山灤河自塞外迤邐東南行入平灤境始益大去灤州城北三里許横渡山下是為偏凉汀汀處衆山間據川流之滙山之列其旁者若魯若岩若紫金瓦嶺之屬㕘差連亘狻猊踞而龍蛇走其間林壑幽勝草木䓤蒨水之經其下者若漆若沮若清水肥河之類下流胥㑹膏黛渟而綺縠張其間鳬鴈翔集鱗族潛泳是誠一郡之竒觀也黄榆馬嶺余厯三關返邢之内丘宿晨由内丘出南門異道而行可四十里得陂陀土山又數里轉山足為黄寺使者當屯所也署踞寺門而廬割寺三之一前伏泉如濟滙為池中有亭亭折而右度嶺得大澗兩山夾之中流泉鏗然鳴巨石如象而黑者累累若下飲循澗可二十里得村曰米花度米花村數里得一嶺始與泉左嶺益髙忽下墜為谷若井然山類多土亡竒稍可以田忽蒼翠而聳出其背為障數闕可以架筆問之土人曰此所謂龍霄山也又穿一二嶺久之山益束而愜兩壁陡上數百仞竒石拏攫争奮為下輿猿接縈紆乃上步數躓又可十餘里山忽兩却而闢成巨壑可屯數萬人旁稍髙阜居民廬之百餘家突起而壘者二其一寺據之其一曰宋家莊堡亦使者當屯所也堡距黄寺可六十里許其西北距黄榆嶺七十里而遥西距馬嶺五十里而遥西稍北距錦繡堂嶺四十里而遥堡綰之蓋走大路要道也余宿堡四鼓乘月起擬之黄榆行五十餘里類多大澗雜石低昻土山余甚厭之以其勝不能當龍泉半而亡何度一嶺稍下山四却而闢其圓若規道欲絶者徐睨前旌旗如左元放破壁而入迫之得一間道僅容一馬崖造天石色秀削太古水聲淙淙不斷蹙沸泡起中石輒韻旋轉十餘折仰視天亦隨而迂迴者色或青或蒼或赤以山映之故泉益雄石益爭勝中有偃石從數丈許衡半之其潤可以碑過半里許始出峽崖復稍稍闢矣遥望右崖際天直走而西上為連城自然睥晲樓櫓懸壁千仞中忽有泉注而下為柱得日若瓊得空若琉璃所得若白銀下飛瀑絶陘左崖鳥道千折而上為天井關石竒秀萬狀余足數踣氣拂逆然時時心語龍泉勝乃不能當此半幾欲奪彼記語子之既抵關肩峻壁而脇大壑不知幾百千仞關口一横澗澗以橋而度已度折右上里許得山頂以為山盡是矣既登而西北望髙倍屣者十者百者不可窮至目境盡而止信乎稱太行天下脊又云上黨者天與黨也歸宿宋家莊堡以當祀纛還順徳暫還大名又旬日復屯黄寺再之宋家莊乃上馬嶺馬嶺道近黄榆十之三險半之饒水泉雜石為足枳夕宿於關大風起轟殷若席捲三晉而東擲之海予卧石室中惴惴不能寐五鼓風息起閲西城關兩山中斷若劈巨靈斧者下視寥閴不見底為橋道之其西不可以旋馬蓋天險也已山海經云北海幽都黑水出焉其上有𤣥鳥𤣥蛇𤣥豹𤣥虎𤣥狐是為太𤣥之山有𤣥丘之民圖書編卷五十九
