body:
  text: 圖書編卷一百十二明章潢撰樂總叙古之作樂尚乎徳今之論樂尚乎律尚徳者未嘗廢律而惟律之是尚則徳非所論矣此今樂所以不古樂若也何為徳心和則氣和氣和則聲和聲和則天地之和應之是也何為律取候氣之管定隂陽各六陽上生隂下生起黄鐘以為律本是也考之經書之訓虞書胄子國子之教咸先以樂之徳焉使樂教有素而咸有樂徳則合奏樂之人莫非有徳之士節奏間有不聲依永律和聲者哉况周頌肅雝和鳴論語翕純皦繹心誠求之樂尚可知所謂今樂猶古樂者以此若律焉已耳且曰不以六律不能正五音孰得而訾之不知樂器一一合乎律吕而奏以今之樂工吾不知於古樂何如也况古者以律管起尺度由母生子也後世以尺度定律管以子證母也差之毫釐失之千里如五季王朴聲與器俱失其係豈小小哉太史公言黄鐘起於聲氣之元班固謂至治之世天地之氣合以生風風氣正而十二之律定後世乃欲求律於黍於尺於斛於錢於鬴其可乎甚至於時君之指節謬益甚矣諸儒紛紛之説且未暇辨今之言鐘律者不曰八寸一分則曰三寸九分一彼一此莫之適從何止累黍縱横之訛而已哉吾恐中氣中聲萬事根本必非器數可拘而神解如阮咸張文收必有超於黍尺者在也是故觀象於雷地豫天地有自然之聲也取法於虞書周禮聖人有巳然之教也反觀於喉舌唇齒㗁五聲在人今猶古也且聖天子建中和之極詔求精通樂律如咸如文收者四海未必無人徳以本之律以諧之大雅其庶幾矣雖然聖門成樂之教尤有頃刻不可離者心定則氣清而聲和心躁則氣浮而聲厲樂在人身何俟比竹欲求聲律在我敢曰知音鮮人哉粤稽古論樂皆本於律因律管短長而度數量衡皆由此生正變倍半皆由此定若有不可易者孔子於易大象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考而不及夫律何哉蓋震之一陽天地之元氣也天地之大徳曰生而元陽者其生生之本焉方其天地閉藏一陽來復而伏於地之下萬物已資始矣及帝出乎震而奮於地之上萬物莫不資以發生此天地之大和也天地自然之樂也可見元陽藏伏地中斯元聲自為之震動天地開泰萬物莫不欣欣向榮乃豫之所以為豫故先王作樂崇徳正以象天地自然之豫而律吕即此以定之耳樂記曰天地訢合隂陽相得煦嫗覆育萬物然後草木茂區萌逹羽翼奮角觡生蟄蟲昭蘇羽者嫗伏毛者孕育胎生者不殰而卵生者不殈則樂之道歸焉耳正謂此也又曰樂者非謂黄鐘大吕絃歌干揚也樂之末節也知其所謂末節則其所謂本者可知也然則生物之心非吾人之元陽乎惟大生之徳充積於中斯發之聲音自恊乎律吕何也以耳齊其聲非以聲而齊其耳以心定其律非以律而定其心因律以生乎尺非以尺而生乎律茍區區於律管短長之辯如黄鐘九寸一分則其所謂寸與分又以何為凖而定其分寸之則也又何怪乎雅樂不作而聲音之和不與天地應也是非謂古人所定之鐘律可盡廢也要有樂徳以為之本耳噫真知雷出地奮豫為天地大和之樂則古人郊祭廟祀不用商音亦有自來矣人之氣即天地之氣人之聲即天地之聲然必有是氣斯有是聲氣必以和為尚也是故孔子於六十四卦獨於豫卦示人以作樂崇徳之象觀其象思其名義而樂之道偹是矣何為象震上坤下為一陽寓於五隂之中即此可以制器可以恊律而中氣中聲可黙會也何為名義雷出地奮為豫陽氣發洩於地上即此可以作樂崇徳薦上帝配祖考而大和與天地通者可黙㑹也何為象之以樂葢樂以聲音為主而雷乃天聲之出於自然者也人之作樂當效法天地自然之聲而同歸於大和焉耳何為又象之以徳葢聞樂可以知徳而一陽乃天徳之發生萬物者也人之作樂當效法天地元陽之徳而發之聲音焉耳然則徳即五隂中之一陽所謂元氣所謂元聲合天地人而一之者也天地有是徳故雷出地奮而萬物發生人心有是徳故作樂崇徳殷薦上帝以配祖考總名之豫者此也夫孔子以樂歸之豫先儒悉以黄鐘歸之復得無有不同乎葢陽一也復則在乎地之下豫則在乎地之上雷一也在乎地之下聲尚隠於無在乎地之上聲始見於有是以雷聲一動則天地太和之氣盈滿兩間而百蟄悉啟萬類俱生矣樂主乎聲孔子獨象於豫有深意也噫一陽之徳在天徳謂之元在天心謂之仁本與天地神人相為貫通人惟有是徳則心和而氣和氣和而聲和又何律吕之不和也若曰黄鍾取諸復此上以卦氣言則於十一月之律謂之黄鍾於正月之律謂之太簇其名義亦可想矣彼不知樂以崇徳而徒泥於律管之分寸何哉雖然人心果有是中和之徳則其心固與天地合徳矣由此被之管絃而聲必和候之管灰而氣必應斯人也聲為律身為度者也又何患分寸毫釐之不恊也此所以論律吕者湏涵養樂徳以為之本古樂經傳虞書曰協時月正日同律度量衡帝曰䕫命爾典樂教胄子直而寛温而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和䕫曰於予擊石拊石百獸率舞禹曰九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾弗壞帝乃誕敷文徳舞干羽於兩階七旬有苖格予欲聞六律五聲八音在治忽以出納五言汝聽䕫曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賓在位羣后徳讓下管鼗鼓合止柷敔笙鏞以間鳥獸􅀈􅀈簫韶九成鳳凰來儀䕫曰於予擊石拊石百獸率舞庶尹允諧商頌曰􅀈鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕我有嘉客亦不夷懌周頌曰有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼓鞉磬柷圉既偹乃奏簫管備舉喤喤厥聲肅雝和鳴先祖是聴我客戾止永觀厥成周禮春官大師掌六律六同以合隂陽之聲陽聲黄鐘太簇姑洗𬎼賔夷則無射隂聲大吕夾鍾仲吕林鍾南吕應鍾皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹大司樂掌成均之法以治建國之學政而合國之子弟焉凡有道有徳者使教焉死則以為樂祖祭於瞽宗以樂徳教國子中和祇庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以就逺人以作動物禮運曰五行之動迭相竭也五行四時十二月還相為本也五聲六律十二管還相為宫也樂記曰凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以亷其愛心感者其聲和以柔六者非性也感於物而後動是故先王慎所以感之者故禮以道其志樂以和其聲正以一其行刑以防其姦禮樂刑政其極一也所以同民心而出治道也凡音者生人心者也情動於中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣宫為君商為臣角為民徴為事羽為物五者不亂則無􅀢懘之音矣宫亂則荒其君驕商亂則陂其臣壞角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣鄭衞之音亂世之音也比於慢矣桑間濮上之音亡國之音其政散其民流誣上行私而不可止也凡音者生於人心者也樂者通倫理者也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂是故審聲以知音審音以知樂審樂以知政而治道偹矣是故不知聲者不可與言音不知音者不可與言樂知樂則㡬於禮矣樂也者聖人之所樂也而可以善民心其感人深其移風易俗故先王著其教焉夫民有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉是故志㣲噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅亷直勁正莊誠之音作而民肅敬寛裕静好順成和動之音作而民慈愛流僻邪散狄成滌濫之音作而民淫亂是故先王本之情性稽之度數制之禮義合生氣之和道五常之行使陽而不散隂而不宻剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪也然後立之學等廣其節奏省其文采以䋲徳厚律小大之稱比終始之序以象事行使親疏貴賤長㓜男女之理皆形見於樂故曰樂觀其深矣土敝則草木不長水煩則魚鱉不大氣衰則生物不遂世亂則禮慝而樂淫是故其聲哀而不莊樂而不安慢易以犯節流湎以忘本廣則容姦狹則思欲減條暢之氣㓕平和之徳是以君子賤之也凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應回邪曲直各歸其分而萬物之理各以類相動也是故君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至徳之光動四氣之和以著萬物之理是故清明象天廣大象地始終象四時周還象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生倡和清濁迭相為經故樂行而倫清耳目聰明血氣和平移風昜俗天下皆寧故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀徳矣古者天地順而四時當民有徳而五榖昌疾疢不作而無妖祥此之謂大當然後聖人作為君臣父子以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂徳音鐘聲鏗鏗以立號號以立横横以立武君子聴鐘聲則思武臣石聲磬磬以立辨辨以致死君子聴磬聲則思死封疆之臣絲聲哀哀以立亷亷以立志君子聴琴瑟之聲則思志義之臣竹聲濫濫以立㑹㑹以聚衆君子聽竽笙簫管之聲則思畜聚之臣鼓鼙之聲讙讙以立動動以進衆君子聽鼔鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而已也彼亦有所合之也論語子在齊聞韶三月不知肉味曰不圖為樂之至於斯也子謂韶盡美矣又盡善也謂武盡美矣未盡善也樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆惡鄭聲之亂雅樂也子語魯大師樂曰樂其可知也始作翕如也從之純如也皦如也繹如也以成子曰吾自衞反魯然後樂正雅頌各得其所子曰師摯之始闗睢之亂洋洋乎盈耳哉人而不仁如樂何樂云樂云鐘鼓云乎哉子貢曰聞其樂而知其徳孟子曰王之好樂甚則齊其庶幾乎今之樂猶古之樂也曰獨樂樂與人樂樂孰樂曰不若與人曰與少樂樂與衆樂樂孰樂曰不若與衆師曠之聰不以六律不能正五音聖人既竭耳力焉繼之以六律正五音不可勝用也樂之實樂斯二者是也樂則生矣生則惡可已也惡可已則不知足之蹈之手之舞之集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也周子曰隂陽理而後和君君臣臣父父子子夫夫婦婦萬物各得其理然後和故禮先而樂後故樂聲淡而不傷和而不淫入其耳感其心莫不淡且和焉淡則欲心平和則躁心釋優柔平中徳之盛也天下化中治之至也是謂道配天地古之極也後世禮法不修政刑苛紊縱欲敗度下民困苦謂古樂不足聴也代變新聲淫蕩愁怨𨗳欲增悲不能自止故有賊君棄父輕生敗倫不可禁者矣樂者本乎政也政善民安則天下之心和聖人作樂以宣暢其和心逹於天地天地之氣感而大和焉天地和則萬物順故神祇格鳥獸馴樂聲淡則聴心平樂辭善則歌者慕故風移而俗易矣妖聲艷辭之化也亦然嗚呼樂者古以平心今以助欲古以宣化今以長怨程子曰禮樂大矣然以進退之間則已得性情之正樂隨風氣至韶則極備若堯之洪水方割四凶方去和有未至也至舜以聖繼聖治之極和之至故韶為備張子曰古樂不可見葢為今人求古樂太深如以古樂為不可知只以虞書詩言志歌永言聲依永律和聲求之得樂之意葢書於是詩只是言志歌只是永其言而已只要轉其聲令人可聽今日歌者亦以轉聲而不變字為善歌長言後却要入於律律則知音者知之知此聲入得何律古樂所以養人徳性中和之氣後之言樂者止以求哀故晋平公曰哀無哀於此乎哀則正以感人不善之心歌亦不可以太髙亦不可以太下太髙則入於噍殺太下則入於嘽緩葢窮本知變樂之情也聲音之道與天地同和與政通蠶吐絲而商絃絶故與天地相應方蠶吐絲木之氣極盛之時商金之氣衰如言律中太簇律中林鐘於此盛則彼衰方春木當盛却金氣不衰此便是不和不與天地之氣相似五峯胡氏曰等級至嚴也失禮樂則不威山河至險也失禮樂則不守禮乎樂乎天下所日用不可以造次顛沛廢焉者乎朱子曰古者教法禮樂射御書數不可缺一就中樂之教尤親切䕫敎胄子只用樂大司徒之職也是用樂蓋是教人朝夕從事於此拘得心長在這上靣葢為節奏學他底急也不得慢也不得久之都换了他一副當情性樂律自黄鐘至中宫皆屬陽自𬎼賔至應鐘皆屬隂此是一個大隂陽黄鐘為陽大吕為隂太簇為陽夾鍾為隂毎一陽間一隂又是一個小隂陽古樂考總論樂記曰凡音之起由心生也此樂之本也論樂者一凖諸此樂之道可得而明矣何也記中又曰鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆疾徐樂之文也曰論倫無患樂之情也欣喜歡愛樂之官也凡器也文也情也官也皆作樂者所必有而孰不起於心乎後世言樂者則皆器而已矣情與官且弗之及况於樂之本者也耶舍本求末欲其與政相通奮至徳之光動四氣之和以著萬物之理也不可得矣孔子曰人而不仁如樂何曰樂云樂云鐘鼓云乎哉觀其以善美論韶武以翕純皦繹語魯大師以雅頌各得其所為樂之正其崇本之意可識矣且以虞周之樂言之舜命后䕫典樂以教胄子固有在於直温寛栗剛簡之徳然益稷篇有曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后徳讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳凰來儀同此器也其所以和神人格鳥獸者何也周禮大司樂掌成均之法固有取於樂徳樂語樂容之教然周頌有曰設業設虡崇牙樹羽應田縣鼓鼗磬柷圉既備乃奏簫管備舉喤喤厥聲肅雝和鳴先祖是聴我客戾止永觀厥成亦同此器也其所以格祖考悅嘉客者何也胄子成均之教有素也以之昭徳故徳溥而神人和以之象功故功成而神人悦也若云後代樂不古若以音律之不傳焉是不知鄭師文總四絃而翔慶雲晉師曠歌南風而知楚弱阮咸聽晋樂而識國運信都芳造輪扇而合律氣李嗣真振鐸於地而黄鐘自應張文收㫁竹為律而啞鐘自鳴彼數人者不過聞音知樂者耳樂律且由己而定也奈何若而人也世亦不恒有焉後之人不求音樂之本於吾心而紛紛於器數之末遂擬議㕘酌於京房之凖梁武之通鄭津之七調王朴之律凖和峴之表尺劉幾之主人聲范鎮之用真黍魏漢津之則人指而蔡元定著之為律吕新書近有所謂律吕元聲焉是皆求諸器數者也雖其所論黄鐘之小大長短較之度量權衡亦似脗合然施之候氣則不應付之音樂則不調亦徒詳於簡册已耳所謂流而不息合同而化聲音與天地相應者不㡬於虚語哉且樂記所謂鐘磬絲石鼓鼙之聲乃萬世循聲正樂之凖也不此之信而惟器數之較或專尚編鐘或専尚石磬亦未必無見若止謂伶倫截嶰谷之竹聴鳳凰鳴為律吕之元然后夔一則曰於予擊石拊石百獸率舞二則曰於予擊石拊石百獸率舞庶尹允諧獨不可以石為之凖哉即如黄鐘為聲氣之元而元氣元聲果起於心耶果起於竹管之短長也太史公曰黄鐘者陽氣踵黄泉而出也是亦可以觀其義矣惟黄鐘不恊乎聲氣之中則失其所以為君也故五聲八音十二律髙則過乎君而失之亢卑則不及乎君而失之慢皆起於中心之不定耳然則欲求中聲當如之何書謂詩言志歌永言聲依永律和聲八音克諧無相奪倫即詩歌之間而抑揚節奏各協乎宫商角徴羽焉律在其中矣所謂變宫變徴亦只於永言之間轉聲而不變字使其上下接續不㫁樂在其中矣如此則聲即為律黄鐘律吕在吾身中矣夫豈易言哉必如虞書之教胄子周禮之敎成均所以涵濡於樂徳樂舞樂容之教者亦既有年矣身具夫直温寛栗剛簡之徳則其發之聲音自合律吕播之樂器自爾肅雝即此可識元氣元聲之所自而管之短長皆自我定之矣何必拘拘於竹管之較量哉否則不求樂本於吾心縱使分寸毫釐之不爽人而不仁如樂何總論古樂以徳為本聞樂可以知徳有徳斯可以作樂是徳為樂之本也前已述其概矣然器數亦樂之所必用者惟有樂徳之人心和氣和考古證今自能盡其制也但古人於器數之間亦嘗殫心思以䆒竟之雖所見不同而所尚短長亦因以異故於黄鐘九寸及三寸九分之說各有所據然以理裁之管之長者則其氣沉其聲必徐而婉管之短者其氣浮其聲必急而剽求元聲元氣者此亦可以得其義也若以聲之清濁論則短長之管皆有清有濁如人之碩大者豈其聲皆重而濁癯痩者豈其聲皆輕而清乎知清濁不在短長之管則一陽之氣為黄鍾之元聲者豈可盡以管之短長論哉今採其無害於義者並存於後以俟正樂之君子云樂徳中和祗庸孝友樂語興道諷誦言語樂舞雲門大卷大夏大咸大濩大磬大武孔子論詩禮樂之教孟子論仁義知禮樂之實俱終之以樂樂之闗於人也大矣虞廷命后䕫典樂教胄子周禮大樂正掌成均之法以敎合國之子弟樂之敷於敎也專矣惟其闗於人也大則其敷之敎也不容以不専不専則教不行教不行則人心無所養躁言妄動而人之成也難矣嘗考國子之教有三曰樂徳曰樂語曰樂舞所謂徳者何中和祗庸孝友是也所謂語者何興道諷誦言語是也所謂舞者何雲門大卷大咸大磬大夏大濩大武是也以此三者立教又使有道有徳者掌乎教則合國之子弟孰不涵養薰陶於樂教之中乎自今觀之雖三者並重必以樂徳為之本也舜命后䕫典樂教胄子所謂直温寛栗剛無虐簡無傲亦自徳言而詩歌聲律皆於此乎洩之也何也中和祗庸孝友之徳皆心之徳也教之由外以養其中也歌詠以養性情舞蹈以養血脉隨其所語隨其所舞莫非養徳之助也久之則吾心之邪穢為之蕩滌吾心之查滓為之消融辭氣之出也自無鄙悖容貌之動也自無暴慢而樂徳庶㡬可成矣故由中以逹乎外也凡音之起由心而生渢渢乎皆徳音也根心生色四體不言而喻雍雍乎皆徳容也耳目聰明心氣和平雖不言不動此心固自有樂徳在矣由是率是子弟以搏拊琴瑟考擊鐘鼓而舞動乎羽毛干戚有不合律吕之節中疾徐之度而大奮其至徳之光者哉否則斯須不和不樂鄙詐之心入之矣徒欲五色成文八風從律不可得也此所以樂徳尤為樂語樂舞之本也是故虞周之教皆以徳為先虞周之樂皆以徳為本而二代之樂所以不可及也先王作樂崇徳崇此焉耳後人聞樂知徳知此焉耳孔子曰成於樂孟子曰樂則生矣生則惡可已也則不知足之蹈之手之舞之皆是道也樂教之有益於人也如是哉奈何樂之不明也久矣後代雖有國子之設而樂教無聞也間有談樂者止詳於竹管之短長積黍之多寡以為黄鐘萬事之根夲在兹也審聲知音審音知樂當有出乎此者若談樂徳於其前鮮不嗤其迂而鄙其陋矣故嘗為之說曰設取大韶大武之樂噐付之今日大常之樂工一節奏之即得盡善盡美俾先祖是聽庶尹允諧吾不信也設取今日樂器付之后䕫所教之胄子與周大樂正所教合國子弟而使之戛擊詠歌舞蹈其間焉祗以宣其姦聲逆氣𨗳欲長悲吾亦不之信也况普天率土固自有精宻樂器之人也有志古樂者必先之以樂教夲之以樂徳而後可樂主乎聲而亦本諸太極圖書何哉葢太極圖書萬化之原也是故聲夲諸氣太極隂陽之完氣也天轉地之元氣自東方而左行水始生木木生火而土生金及水河圗是也地運天之元氣自西方而右行水始克火火克金而木克土及水洛書是也聖人則之以調五音行八風音非生不和風非克不動其自為宫也左行以應斗其應聲也右行以應日十二宫各周十二律凡百四十四聲應坤之䇿宫商皆相克羽徴角商宫其流行也皆相生角徴宫商羽而始終之序宫徴商羽角還相為宫一太極之全體也聲氣和而萬物暢大樂與天地同和矣五聲總考太史公曰音樂者所以動盪血脉通流精神而和正心也故宫動脾而和正聖商動肺而和正義角動肝而和正仁徴動心而和正禮羽動腎而和正智故聞宫音使人温舒而廣大聞商音使人方正而好義聞角音使人惻隠而愛人聞徴音使人樂善而好施聞羽音使人整齊而好禮漢志曰商之為言章也物成熟可章度也角觸也物觸地而出戴芒角宫中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而繁祉也羽宇也物聚藏覆宇下也夫聲者中於宫觸於角祉於徴章於商宇於羽故四聲為宫紀也恊之五行則角為木五常為仁五事為貌商為金為義為言徴為火為禮為視羽為水為智為聽宫為土為信為思以君臣民事物言之則宫為君商為臣角為民徴為事羽為物唱和有象故言君臣位事之體也五聲之本生於黄鐘之律九寸為宫或損或益以定商角徴羽九六相生隂陽之應也八音總考陳氏樂書曰金生於土而别於土其卦則兊其方則西其時則秋其風閶闔其聲尚羽其音則鏗立秋之氣也先王作樂用之以為金奏焉周官鍾師掌金奏鎛師掌金奏之鼓鼓人掌四金之聲音孟子曰金聲是也金奏之樂未嘗不用鼓時謂之金者以金為主故也禮曰内金示和也又曰入門而金作示情也國語曰金奏肆夏莊子曰金石有聲不考不鳴則奏金而鳴之内以示情外以示和也音之實也石之為物堅實而不動其卦則乾其時則秋冬之交其方則西北之維其風不周其聲尚角其音則辯立冬之氣也先王作樂擊之以為磬之屬焉葢金石之樂其聲未嘗不相應莊子曰金石有聲不考不鳴國語曰金石以動之唐李真以車鐸而得徴音之石則其相應可知三代之樂既壞於秦漢漢至成帝尚未有金石之樂及晉武破苻堅之後而四廂金石始備焉後世復以泗濵石其聲下而不和以華原所出者易之信乎審一以定和難哉絲飾物而成聲其卦則離其方則南其時則夏其聲尚宫其律𬎼賔其風景其音哀夏至之氣也先王作樂絃之以為琴瑟之屬焉葢琴瑟之樂君子所常御其大小雖不同而其聲應一也故均列之堂上焉竹之為物其節直而有制其心虛而能通而利制之音所由出也其卦則震其方則東其時則春其聲尚義其律姑洗其風明庶其音濫春分之氣也先王作樂竅之以為簫管之屬焉匏之為物其性輕而浮其中虛而通笙則以匏為毋象植物之生焉其卦則艮其方東北之維其時春冬之交其聲尚義其律大吕太簇其風融其音啾立春之氣也先王作樂以之為笙竽之屬焉記曰歌者在上匏竹在下國語曰匏竹利制葢匏竹相合而成聲得清濁之適故也土則埏埴以成器而冲氣出焉其卦則坤其方則西南之維其時則秋夏之交其風則凉其聲尚宫其音則濁立秋之氣也先王作樂用之以為塤之屬焉葢塤箎之樂未嘗不相應詩曰伯氏吹塤仲氏吹箎又曰如塤如箎樂記以塤箎為徳音之音周官笙師並掌而教之則其聲相應信之矣革去故以為器而羣音首焉其卦則坎其方則北其時則冬其風廣莫其律黄鐘其聲一其音讙冬至之氣也先王作樂用之以為鼓之屬焉葢鞉所以兆奏鼓者也二者以同聲相應故祀天神以雷鼓雷鼗祭地祇以靈鼓靈鼗享人鬼以路鼓路鼗樂記亦以鼗鼓合而為徳音周官少師亦以鞉鼓并而鼓之也木者所以合止樂之器其卦則巽其方東南之維其時春夏之交其風清明其律夾鐘其聲一其音直立夏之氣也先王作樂斵之以為柷敔之屬焉樂記曰作為椌楬徳音之音柷敔以椌楬為用椌楬以柷敔為體二者之聲一合一止未嘗不相待也律吕名義律法也度也又述也宣也其數一合升陽之度其聲則宣陽氣之聲也吕侣也配也又助也與律為侣而助之宣氣其功與律配也五音名義宫者宏也容也以其音宏而有容故曰宫商者剛也方也以其音剛而成方故曰商角者確也作也以其音作而堅確故曰角徴夲作澂静也凝也以其音靜而凝止故曰徴羽者遽也舉也以其音遽而輕舉故曰羽十二律名義黄鐘黄土色鍾聚也律宣陽氣於黄泉以孳萌萬物而翕聚者發散也位於子大吕與陽為侣而助之宣氣此其首而大者故曰大吕位於丑太簇太大也簇奏也進也大進陽氣而發逹萬物也位於寅夾鍾夾輔也輔太簇進陽氣以發散乎萬物之聚而未逹者也位於卯姑洗姑始也洗鮮㓗也宣陽生物而形色始露鮮㓗可觀也位於辰仲吕助姑洗宣陽而居大吕夾鍾二吕之後故曰仲吕位於己𬎼賔𬎼柔弱也一隂始生其氣柔弱不得用事如為賔然故曰𬎼賔位於午林鍾林盛也大也助𬎼賔宣陽生物萬物之生至六月而成大叢聚也位於未夷則夷平也皆也則法也陽氣生物遇秋而止皆有法則不至於過也位於申南吕南任也助夷則宣陽任成萬物也位於酉無射射厭也宣陽生物之功至於九月猶不厭射也位於戌應鍾應和也應和陽功收萬物而聚之也位於亥書曰六律五聲孟子曰不以六律不能正五音是五音必依六律以節宣之而後和也茍不知律吕五音十二律之名義而徒以管之長短定律可乎夫律吕之數隂陽竒偶之情也陽六為律律以統氣類物隂六為吕吕以旅陽宣氣凡十二管而黄鍾之長獨得九寸大吕而下律吕相間以次而短至應鍾而極焉葢黄鍾陽聲之始故其數九而度量權衡由是而出十一律由是而損益則黄鍾萬事根本之說也十一月乾之初九陽氣始動而鍾於物故黄鍾為天統六月坤之初六隂氣始動而楙於物故林鍾為地統正月乾之九三萬物凑進人奉而承之故太簇為人統黄鍾子為天正陽之始也林鍾未之衝丑為地正隂之始也太簇寅為人正隂陽得而人物生之候也此則三統三正之義也然天兼乎地而地無踰天之理人法乎天而天有始物之功林鍾太簇之律雖與黄鍾相配而不敢以相役則君有常尊而位定矣故明於三統之義而隂陽之情得然後損益之分定而律吕之位可求也何也陽以圎為形其性動故其數三隂以方為節其性靜故其數二以陽生隂三分本律而損其一是曰下生以隂生陽三分本律而增其一是曰上生上生不得過黄鍾之清濁下生不得及黄鍾之數實故曰黄鍾為律日之首而生十一律者也自黄鍾而至應鍾陽皆下生隂皆上生葢從子至巳陽生而隂退也自𬎼賔以至仲吕隂反下生陽反上生葢從午至亥隂升而陽退也凡此莫非順隂陽之消長以為損益而豈能以私意㕘於其間哉至於變律之説所以補正律之不足者葢十二律各自為宫每一律則役六律以生五聲二變自黄鍾以至應鍾則各足其相役之數故不用變律而以本律當之自𬎼賔以至仲吕未免上役黄鍾太簇故不用正律而以變律應之此所以相和而不至於相凌也變聲所以濟五聲之不及者自殷以前惟五音而已至周則加二變謂之七聲葢角徴之間近徴收一聲謂之變徴羽宫之間近宫收一聲謂之變宫邇而不偪逺而不携此所以克諧而無相奪倫也然變律止於六者以數至應鍾而窮至此則十二律七聲循環相役固不俟強加而自足也變聲止於二者以音節相去太逺而設若宫與商商與角徴與羽相去皆一律固不待變聲而自和也京房不知此義自仲吕而下再生執始以至南事四十八律其於三分損益不盡之筭或增破壞自然之數尚得謂之律乎萬實常用禮運旋宫之法以五正二變衍之而為八十四調沈重凖易之䇿當期之日而為三百六十律牽合傅㑹繁雜而無統紀尚得謂之樂乎夫不能審聲故無以正律而得其周徑羃積之數不能正律故無以定器而辯其髙下清濁之宜何怪乎議者之紛紛而莫一也他如漢人作凖以代竹而其法罔效晉人制尺以定律而其聲過髙梁隋以來或求之金石而音韻鮮諧或㕘之秬黍而肥瘠難定古器散亡音聲㣲𣺌樂果何時而興乎近世儒者乃倡為之說曰黄鍾非九寸之管而引通鑑外紀吕氏春秋所載含少之說為徴殊不知黄鍾以八十一分之管吹三十九分以為聲故謂之含少今遂以三十九分為黄鍾之律而執含少以為清管使十一律無從取正是詆毁先儒之言而增異説之蹊徑何足取信於後哉如欲見諸施行莫若截竹為筒以擬黄鍾之管築室布灰以為候氣之法如宋儒蔡元定之所論近世丘文莊之所議庶幾黄鍾之律可得而十一律可因之以損益矣聲律辯五聲之序宫最大而沉濁羽最細而輕清商之大次宫徴之細次羽而角居四者之中焉然世之論中聲者不以角而以宫何也曰凡聲陽也自下而上未及其半則屬於隂而未暢故不可用上而及半然後屬於陽而始和故即其始而用之以為宫因其毎變而益上則為商為角為變徴為徴為羽為變宫而皆以為宫之用焉是以宫之一聲在五行為土在五常為信在五事為思葢其正當衆聲和與未和用與未用隂陽際會之中所以為盛若角則惟當五聲之中而非衆聲之㑹且以七均輪之又有變徴以居焉亦非五聲之所取正也然自其聲之始和者推而上之亦至於變宫而止耳自是以上則又過乎輕清而不可以為宫於是就其兩間而細分之則其别又十有二以其最大而沉濁者為黄鍾以其極細而輕清者為應鍾及其旋相為宫而上下相生以盡五聲二變之用則宫聲常不越乎十二之中而四聲者或時出於其外以取諸律半聲之管然後七均備而一調成也黄鍾之與餘律其所以為貴賤者亦然若諸半律以上則又過乎輕清之甚而不可以為樂矣葢黄鍾之宫始之始中之中也十律之宫始之次而中少過也應鍾之宫始之終而中已盡也諸律半聲過乎輕清始之外而中之上也半聲之外過乎輕清之甚則又外之外上之上也不可為樂者也正如子時初四刻屬前日正四刻屬後日其兩日之間即所謂始之始中之中也然則聲四屬隂以下亦當黙有十二正變半律之地以為中聲之前叚如子初四刻之為者但無聲氣之可紀耳由是論之則審音之難不在於聲而在於律不在於宫而在於黄鍾葢不以十二律節之則無以著夫五聲之實不得黄鍾之正則十一律又無所受以為本律之宫也今又極論宫聲之妙而無曰黄鍾云者則恐其於聲音法制之間猶有所未盡也夫以聲音法制之粗而猶有未盡則雖有黄帝大舜之君伶倫后䕫之任亦如之何徒手而可以議大樂之和哉又有為宫當配仁之說者恐亦非是迹其所以葢以仁當四徳之元而有包四者之義耳夫仁木行而角聲者也以之配宫則仁既不安而信亦失據然以為可包四者則不害其有是理也夫五行之序木為之始水為之終而土為之中以河圖洛書之數言之則水一木三而土五皆陽之生數而不可易者也故得以更迭為主而為五行之綱以徳言之則木為發生之性水為貞静之體而土又包育之母也故木之包五行也以其流通貫徹而無不在也水之包五行也以其歸根反本而藏於此也若夫土則水火之所寄金木之所資居中而應四方一體而載萬類者也故孔子贊乾之四徳而以貞元舉其終始孟子論人之四端而不敢以信列序於其間葢以為無適而非此也是則宫之統五聲仁之包五常葢有並行而不悖者矣何必奪彼以予此然後快於其心哉昔黄帝使伶倫自大夏之西崑崙之東取嶰谷之竹以其竅厚而均者㫁兩節之間而吹之為黄鍾清宫之管管最長者制十二筩以聴鳳凰之鳴其雄鳴六雌鳴六自清宫皆可以生之是黄鍾為律本故乾之初九律之首陽之變也因而六之以九為法得林鍾以六乗黄鍾之九得五十四也大吕故坤之初六吕之首隂之變也皆參天兩地之法也九六隂陽夫婦子母之道也異類為子母謂黄鍾生林鍾須得大吕而生同類為夫婦謂大吕須嫁於黄鍾是為夫婦而能生六月葢天地之情也且夫陽氣始歸戊巳清宫是其黄鍾之母也纔得五月𬎼賔之交其律已付長子候冬至而用也黄鍾自十一月陽氣始生而用事是為律本也然五月一隂生後得清宫還付而收之方生仲吕耳按晉書云漢京房知六律五音之數六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於仲吕而十二管異矣仲吕上生執始執始下生去㓕上下相生終於南事六十律畢矣夫十二律之變至於六十猶八卦之為六十四也陽下生隂隂上生陽法黄鍾娶大吕生林鍾太簇娶仲吕生南吕林鍾妃𬎼賔生太簇南吕妃夷則生姑洗無射交應鍾生夾鍾夾鍾妃太簇生夷則夷則娶南吕生大吕大吕生𬎼賔𬎼賔交與戊巳清宫清宫却付長子也黄鍾九寸律之本也三分損一下生林鍾互相生至五月㽔賔交戊巳却付黄鍾遂生清宫最長之管一尺二寸三分損九寸餘三寸三分生仲吕大吕三寸七分乃三分益一上生𬎼賔太簇八寸遂三分損一下生南吕夾鍾四寸二分乃三分益一上生夷則姑洗七寸一分乃三分損一生應鍾仲吕交得夫大簇管長三寸三分乃三分益一生執始𬎼賔四寸九分始作少陽終為後夫乃三分損一交與戊巳清宫林鍾六寸乃三分益一下生太簇夷則五寸六分乃三分損一上生大吕南吕五寸二分乃三分益一下生姑洗無射交得妻應鍾管長六寸三分乃三分損一生夾鍾應鍾四寸七分乃三分益一交與夫無射為首唱執始在黄鍾部下仲吕之生也今却下生去㓕在林鍾林鍾之下不敢不交與南事至此而周畢矣南事生𬎼賔之旁律吕損益之數漢書所載律吕生皆一上一下起黄鍾九寸為首展轉生之脩於仲吕得十二律所云下生者謂長管生短管也所謂上生者謂短管生長管也皆云三分其管而損益之應下生者損其一分應上生者益其一分各得其所生之管長短之數是則損常為短益常為長也假如黄鍾九寸之管分作三分毎分各有三寸計九寸除其三分自然合成六寸即得六月林鍾之管謂之下生也如以林鍾六寸之管分作三分即三分合有二寸即此之數加於六寸之上自然合成八寸即得正月太簇之管謂之上生也盡十二管其例一同陽下生隂隂上生陽然則准黄鍾林鍾太簇三管各得全寸之分餘外九管則有徴分之數中三分損益自然之所致也五聲六律十二管還相為宫禮運曰五聲六律十二管還相為宫也鄭元注云宫數八十一黄鍾長九寸九九八十一也三分宫損一生徵徴數五十四林鍾長六寸六九五十四也三分徴益一生商商數七十二太簇長八寸八九七十二也三分商損一生羽羽數四十八南吕長六寸六八四十八也三分羽益一生角角數六十四姑洗長八寸八八六十四也圖書編巻一百十二
