body:
  text: 圖書編卷四十四明章潢撰遼東總敘遼東禹貢青冀二州之域舜分冀東北毉無閭之地為幽州即今廣寧以西之地青東北為營州即廣寧以東之地即遼陽東至鴨渌江西至山海闗一千四百六十里南至旅順海口北至開元城一千七十里三面瀕邊一面阻海特山海闗一線之路可以内通亦形勝之區也歴代以來地皆郡縣元季時為平章劉益髙家奴分據洪武初奉表來歸四年置定遼衛八年改為遼東都司十年革所屬州縣設衛二十五永樂七年復設安樂自在二州我朝盡改置衛而獨於遼陽開元設安樂自在二州以處内附諸部其外附者則朶顏福餘泰寧等衛分地世官互市通貢事雖覊縻勢成藩蔽是以疆場無迤北之患顧東北諸夷屋居耕食不専射獵警備差緩而西北則俗仍迤北竊發頗多要在隨勢安輯處置得宜先事申嚴防守不墮俾恩威並立足制其心斯計之上也開元廣寧並據襟吭金復海蓋頗稱沃野海上自劉江之捷倭冦絶跡如革馬市之姦欺糾驗放之抑勒塞請開之貢路禁驛傳之騷繹増臺軍之月給教百姓之儲蓄専制一方者不得不任其責矣遼東鎮屬衛二十五所十一闗二營堡一百馬步官軍九萬九千八百七十五員名馬九百零九匹子粒二十六萬一千四百六十七石嵗運銀一十八萬五千二十四兩米一十二萬四千六十六石嵗辦草二百四十萬五千二百一十一束豆七萬五千二百二十九石六斗遼東處置遼東三岔河一帶亘數百里北自遼陽舊城至南三岔河闗俱棄以與多延三衛住牧隔絶東西増費堡戍其地且多草木魚鮮之利宜自宋家堡直西添設營堡截守不亦快乎遼東東杓子河西六州河相距一千五百七十五里南旅順海口北開原相距一千七十里而都司城處其東北稍偏是為東一大鎮廣寧處都司城至山海闗之中是為西一大鎮金州為南鎮而旅順當其衝開原為北鎮而三萬鐵嶺瀋陽中接於南蒙州廣寧中屯輔於右巡撫及兵備駐劄廣寧巡按分守駐劄遼陽遼東地皆沃壤舊為郡縣自置衛之後人多僑居生庶稍減今置自在安樂兩州以處徙徒要之未足以盡規議遼東西遼東青分營州遼西冀分幽州渤碣之外一都會也西南起山海歴醫無閭長白諸山經絡北東南走海上海薄葢金以西接盧龍可渡登萊泛吳浙金州旅海運陸順口州梁房口房口路葢海舟入遼魚鹽穀馬馬給吏士或市之保塞奚夷彼遂挾以邀我我亦以官市縻之而奸闌出入亦不能盡禁寧逺東西兩屯頗安給錦義地瘠寡生理廣寧無屯營之利率仰給轉粟與遼陽隔河河兩濟防禦遼陽以北益聚兵兵食益窘開原三城中固汎河三面受敵六堡雖復而出入于青陽鎮夷間者往往使我失魚樵之利又掠我男女易畜産於長城之外否即縶之耕織日夜無休時西馬市廢浦河市懿路殘破不可言撫順通百夷貢市内外皆山多伏莽我難於斥望瀋陽雖有闗相其形勢外雖險而内實平不能扼據以為東陲之保障西境並海四州恃得勝之捷無海冦然遼水南駐海溢不能洩患苦沮洳矣始河東十四衛皆自登州海運給之有海舟十餘隻直抵遼陽鎮嶺以達開元城西老米灣然世久法行至今遼陽之匱安得至此極也明聖造邦良有深意乎遼東保障楊文襄一清論遼東保障曰北隣朔漠而遼東三萬瀋陽鐵嶺四衛之統于開原者足遏其衝南枕滄溟而金復海葢旅順諸軍聯屬海濵者足嚴守望東西倚湯站長城為固而廣寧遼陽各屯重兵以鎮壓之復以錦義寧逺前屯五衛西翼東寧増遼陽山東諸堡以扼其要第遼之保障困于地之迂逺今三岔河南北數百里遼陽舊城在焉木葉白雲之間即遼之北京中京地也自守禦不得其人致東西限隔道路迂逺制置有方則城堡士馬芻糧可省十之三四遼東海道遼東古青州之域自周以下遼東屬燕青州屬齊疆域雖分海道無異至於漢伐朝鮮遣楊僕從齊泛渤海荀彘出遼東即隋唐東征亦分師航海豈非循習其舊哉國初置遼東即發兵數萬戍遼命鎮海侯吳禎總舟師萬人由登萊轉運嵗以為常至永樂四年平江伯陳暄猶督至遼其後設有屯田糧運始廢止令山東嵗運布花以給軍士皆由登州發運至金州旅順止卸當時倭冦偶犯而總兵劉江遂有望海窩之捷其患亦絶嵗運至𢎞治十八年船壞暫止山東乃征以輕賫灌輸嵗豐充用不暇講求嘉靖七年巡按王重賢先為即墨知縣言有司苦于布花折色乃請通海道復舊制金州劉訓導明言家世登州自海運不通生理蕭條然則在山東亦自有利害矣三十七年遼東荒歉乃欲求通先是邊備劉九容查議曰海運之廢已非一年若以打造船隻裝運布花為名則價值苦征求之難造作縻人工之費萬無可通之時為今之計暫疏海禁隨民間有力者各置船隻從先年故道自相貿易登金兩岸設法稽查其嵗運布花仍從原議征收折色照舊從闗起解巡按周斯盛奏曰國家建置之初以之𨽻山東者止以海道耳自旅順口以望登萊可即泛舟而往一日可至以山東之人適山東之地通舟楫自有之道因天地自然之利更何所顧忌也哉巡撫侯汝諒奏請一開天津海道一通山東糴買與總督王忬科道先後所言同山東當事者雖多設事變而户部猶執前議舟通數月逮前巡按路可由設言島人一聞調船必棄業哨聚急請停止部遂據以却諸議而不虞其為越吟也夫遼東既以山海為闗亦宜以海防為津先年通運之時寧無稽查之法且倭國與閩浙相對去遼本逺先固未嘗以望海一咽而遂推虀於後也十七年巡撫孫檜差都指揮閔忠齎咨赴催然為馮驩責債得致無幾近積欠至七十餘萬即是則海禁之意不在所言之害而恐通後吾執左券以責備耳矣其運船本南京龍江闗成造正徳初以湖廣災傷暫議停止今並編列金州旅順口達登州水闗岸水程海島於左方使得料逺近考廢興備成法焉右金州旅順闗口南達登州新河水闗岸徑五百五十里水程適中海島名曰羊堝有碣上鐫南岸達北岸共五百五十里兩日内風力順可到先一日辰時自登州新河發舤至晚抵旅順泊岸次日辰時自旅順發舤至晚北抵三汊河泊岸蓋自旅順口起抵海中羊堝黄城二島約三百里自黄城南抵欽島鼉磯島約三十里欽鼉島抵井島約七十里井島抵沙門等島一百三十里沙門島抵新河水闗僅二十里總括其數亦五百五十里各島相接如驛遞而島之住尸俱屬納水利銀兩於金州遼鎮保守要務余歴北平幾十年薊遼二鎮邊事備稔之矣守薊鎮易守遼鎮難何者薊鎮将庸而兵弱所恃者山險火藥耳邊牆雖未髙堅尚可修也火藥雖未全備尚可補也以嵗計之朞月而可三年有成矣若夫遼鎮軍雖猛而寡馬雖壯而少自山海抵寧前三百餘里邊牆未築藩垣無恃火藥未備克敵無策雖有猛士不足以當如雲之衆雖有利矢不足以敵如雨之鏃一遇有警聴其擄掠百里一空不得不歸耳吁嗟惜哉不汲汲為之備邊患何日而止乎其要莫如先築邊牆備火藥目今遼東欲覔人修築無銀欲令軍士助工無人将奈之何哉為燃眉之計先将邊界一路每年令軍士居民鑿深溝一道濶三丈餘即以其土敷我溝裏築為堤岸如長嶺然待伏雨實堅上築髙牆一丈基濶五尺平身去處留以牆孔以便快鎗砲打每二里或三里嶺上仍建燉臺一處周以垜口蓋以敵樓草創之時土牆草屋以蔽風雨可也其牆則一里一舖置以火藥快鎗每敵臺一座多備火藥火砲并砲架數十來攻則以快鎗擊之填壕則以火砲拒之彼不能近吾壕安能填吾溝耶既不能填吾溝安能踰吾牆耶此目前之急務也備此著三年可完若夫築土牆創土城須得一半官銀一半助六年而後可至於修磚牆建城池九年而後成遼鎮之事大率九年完固矣誠如此雖有十萬之衆莫敢犯也可保百年無亊矣至若寧前一帶數百里居民鮮少地土荒凉又奈之何哉蓋人之所以不居遼地者以地當兵衝而度日至苦也誠将荒廢之地盡數查出除遼人耕種外先儘充發之軍每軍一名多則給以百畝少則五七十畝許其耕種不許變賣一切錢糧永為蠲免有闗西情愿應役者投充一名亦照此例給種每一二里或十餘里令築小墩城垣一處以備外患則貧窮之家無故而得百畝之地既不費財又不徴賦彼将視為樂土攜其父母妻子而願歸之矣軍之逃者能幾何哉十年之間民聚日衆生齒日繁外無邊患内無重擾遼鎮之民可以息肩而享太平之樂矣遼鎮既全薊鎮可保京畿有泰山之安矣不然唇亡齒寒之勢不可不寒心也遼東區畫嘗玩分野圖象知郡國之屬於天也各有宿度界限之殊因知古聖帝之分州也各因其分野而聯屬之道寓焉何也遼東西在十二國屬燕在九州屬冀與青在分野今廣寧以西屬箕度廣寧以東屬尾度自虞舜分天下為十二州東遼為營西遼為幽然山東與遼中跨東海形勢懸絶舜時營與青其相統屬否不可知也青州則在今山東青登萊三郡然遼之東亦分屬於青是其中雖隔乎大海而疆域界限既均之為青州焉則其貢賦之轉輸官屬之朝聘其往來通道舍海安之乎可見古人聯東海之兩隅為一州以海為通衢無疑也自遼入我朝除北自遼陽舊城南抵三岔河闗棄與諾延三衛無論已然東西相距千五百餘里南北相距千七百餘里雖三面臨邊一面距海據其形勝而安輯之有道亦足為東北之保障也國初河東十四衛皆自登州海運給之海州直抵遼陽鎮嶺以達開元城西老米灣故遼兵頗忠勇亦以饋餉充實故也自海運革而遼之兵食多匱乏矣雖東北土畨多屋居火食較之正北達其勢稍易制然殷鑒不逺遼也金也元也皆起跡東北實有不可忽者且我朝建都燕地不徒宣大與邊為鄰患在肘腋而諾延三衛反在遼之内地所恃薊鎮耳山海闗一線之路萬一中阻則咽喉既塞彼遼陽一鎮不特不足為京師之障而束手無拯援之䇿矣嘗閲輿地圖金葢一帶西接盧龍本可以渡登萊泛吳浙昔日之運道乃今日之急務也較利害者又以風波之險海冦之防為可虞獨不思哲士長慮却顧為國家計安久逺雖有小害當勿恤矣縱使海運未可遽復而沿海擇要害之區許通市舶使商旅貨販由海往來則魚鹽穀粟一通而一鎮軍民財用自足設有緩急亦可恃以無恐得非富强之一策乎聞成祖皇帝欲建總鎮于開元而經營未及就緒正今日所當講求焉雖勢所最難未免以餽餉為憂然欲建訏謨逺猷則不惜小費近利况通海舶復海運使遼鎮食足兵强吾知三衛雖强腹背受制必不敢自生異心而京師永奠磐石之固殆有不戰屈人兵者在也非徒熟海道可以援遼陽習海運可以餉各鎮實京師矣是故遐想往古山東遼東合為一州先王計慮何深逺也故國初由登萊以餽遼陽我聖祖之睿算不有以紹往聖聯屬之道乎忠臣謀國者其深圖之山海闗説山海禹貢冀州之域書曰夾右碣石此其方也國朝洪武創建城池闗隘命名曰山海闗永樂中建都燕京列為畿輔相厥山川山自居庸而東其勢漸南海自直沽而東其勢漸北至我臨渝山麓海濵不盈一視扼而塞之其為力甚易其功甚鉅也諾延散處舊大寧地乃山海諸邊之北也自居庸抵山海依山阻險設闗寨墩煌營壘數十百所遏厥出没可謂盡覊縻之術極備禦之策矣近者閉闗戒嚴邊氓日遭兵警石塘之役至厪王師者何哉法弊之繇也今觀沿邊險隘可以列騎聯伍而下者亡幾餘皆捫藤穿竇潛形詭跡焉耳司闗計者茍嚴翼共服飭厥烽燧入必知知必并力據險遏之營遇警必報報至即率所部為聲援犄角之勢彼雖黠悍亦何能為乃今不然官惟黷貨是務軍士買閒落鄉供役使者過半墩煌曠瞭卒行伍乏壯捷伺間而乗之亡所誰何及被掠官懼加罪譴輒贖之牛酒鹽布賄失者家以鉗其口每致縛所掠男婦勒諸城下以為恒或度不可秘遂誘而掩捕之以捷聞冀獲免也間所掠非所捕所捕非所掠而邊郄日結矣夫啖之利者以啟其無厭之心挑之怨者以速其必逞之勢是何異自決其堤又從搏擊之水不溢且洪乎為今日計在於懲誅求放免之弊實行伍以自固禁私交掩捕以塞末流則庶乎其可也遼西區畫古遼西郡即舊設大寧都司内轄錦州全寧及大寧和衆富庶金源惠和武平龍山等縣是也契丹號為中原是故大同在西燕在南遼陽在東大寧則在其中其東南四十里為松林松林水出是為廣河大山深谷幅􅊷千里岡嶺崇隆迤逶亘京師之西山内有長泊周圍二百里大鹽泊周圍三百里小鹽泊周圍百里山髙而長水濶而聚且其地東傍福餘若招漳潮吳浙水商逺通日本新羅則自新羅可以通沃沮由日本可以通濊貊濊貊古為渤海東京龍源府沃沮古為渤海南京南海府既通二府則漳潮水商或經唐恩浦口或經濊貊沃沮直抵扶餘而西入大寧矣契丹曽置通吳軍其道由此我太祖平定前元于古會州之地設大寧都司及所屬營州等衛以為外藩籬復命魏國公修山海闗喜峯口古北口黄花鎮潮河川一帶以為内藩籬永樂中搬回大寧以其地委諾延三衛而以内藩籬為界大寧既棄則開元興和不容不失宣徳中移守獨石龍門勢固然也土木之變獨石八城俱陷所恃者一長安嶺横阻其衝耳今計其歸復之界大軍出喜峯直𢷬錦川全寧而夾以開平中屯興州右屯及松亭永寧之師遼海出偏師以綴福餘繼以義州廣寧之衆步騎出於牛山舟師進於小陵此其成計不可易者然非十年生聚十年教訓未易言矣薊州總敘薊京師左輔也拱衛京師密邇陵寢比之他邊尤重三屯營居中為本邊重鎮東至山海闗三百五十里西至黄花鎮四百五十里我太祖既承元統迺即古會州之地設大寧都司營州等衛而封寧王與遼東宣府東西並列以為外邊又命魏國公徐達起古北口至山海闗増修闗隘以為内邊神謀逖哉逺矣太宗文皇帝靖難後烏梁海部落内附迺改封寧王於江西徙大寧都司於保定散置營州等衛於順天之境而以太寧全地與之授官置衛今止守内邊邊人謂外邊山勢連亘千里山外撤江環遶誠自然之險也北部不敢内侵山衛者以此今棄此而守内邊失地險矣令其每年朝貢二次每次衛各百人往來互市永為藩籬即諾延泰寧福餘三衛是也遼東宣府自此隔涉聲援絶矣正統以前敵心畏服地方寧謐但令都指揮或都督於喜峯口密雲等處鎮守驗放别無多官土木之變頗聞三衛為額森嚮道乃命都御史鄒來學經略之此後因而添設太監㕘将等官而敵情亦變詐不同然尚未敢顯言為冦也𢎞治中守臣楊友張瓊因燒荒掩殺無辜邊釁遂起正徳以來部落既蕃諾延獨盛陽順隂逆累肆侵噬和坦則脅求添貢巴爾斯深入虜掠動稱結親迤北恐嚇中國㕘将陳乾魏祥俱以重兵前後陷没他可知矣故三衛夷情難與往日例論禍機所伏不待知者而知黄花擁䕶陵寢京師後門今本兵逃亡止餘二百河間等衛之戍空名無實此其單弱極矣議者為更當増戍而闗外閒田可募為兵此亦一策也古北口潮河川俱稱要害而潮河川殘元避暑故道尤為兵衝作橋則浮沙難立為塹則漲水易淤都御史洪鍾雖設有闗城勢孤難守今雖塞川大建石墩四十令其錯綜宛轉不礙水路庶幾可以久乎喜峯口三衛入貢之路撫賞諸費久累軍丁近取諸馬場子粒似矣建昌營自裁革内臣之後以其兵多於燕河營乃復添設遊擊甚為差謬夫遊擊之名謂居中乗便四面馳擊也今偏在東隅其謂之何矧東去燕河營㕘将止五十里西至太平寨㕘将止六十里不為贅員且掣肘乎愚嘗謂薊鎮在今當重其事權總兵須與掛印同巡撫駐薊其遊擊駐三屯營若燕河馬蘭密雲三㕘将則仍舊而以太平寨併入建昌為一㕘将則庶乎體統正而緩急有濟矣且設闗於外所以防守立營于内所以應援國初東至山海闗西至黄花鎮為闗寨者二百一十二為營堡者四十四為衛二十二為守禦所三設分守㕘将五于燕河營太平寨馬林谷密雲縣黄花鎮以管攝營堡謂之闗設守備都指揮五于永平山海遵化薊州山河以管攝衛所謂之營設總兵官一員于三屯營以總鎮焉后惟闗獨當其害營但肆為官望而已嘉靖十八年巡撫都御史戴金題准復而舊制更相防守今闗營提調既分為二則闗獨當其害營但肆為觀望耳假令營之提調即司所直之闗責有攸歸復将誰諉又本鎮額兵原少隘口甚多除分戍之外消耗之餘所在單弱言之寒心是故存留京操之士益募土著之兵設險修闗嚴烽逺諜選将練兵足食明法曲突徙薪之計不可一日不講也薊鎮建置欽差總督薊遼都御史一駐薊州欽差巡撫順天等處都御史一駐遵化巡按山海闗御史一今順天巡按兼兵部主事一駐山海闗兵備密雲副使一駐薊州總兵官一駐密雲㕘将五遊擊将軍一薊州鎮屬闗一百一十三寨七十二營四十三堡六十一城一十一馬步官軍七萬八千六百二十一員名糧四十六萬八百餘石料豆六萬七千五百餘石子粒米麥一萬三千七百七十八石六斗布絹折鈔銀二萬兩綿布一十二萬一千六百餘匹綿花絨六萬六千三百餘斤草四十萬三千餘束山東河南北直𨽻司府起運夏税秋糧麥豆三萬四千五百八十八石二斗零布一十三萬三千九百匹綿花八萬一千五百斤絹二千餘匹海運兊軍本折米共二十四萬石軍民屯折色草共銀二十一萬六千九百六十兩有零夏秋二税本色折絹米一千一百四萬九千二百餘石草九萬七千六百八十四束薊州處置薊州諸山闗無慮數百西接居庸北折而東南抵海上盡漁陽盧龍塞皆其管内􅀈泛登萊路走趙魏肩肘奚達襟帶原澤馮翊京師號稱雄鎮又地壤深厚樹畜魚鹽黍稷之利甲於圻内天夀山七陵在焉予嘗謁長陵登山北望邊闗可順風而呼也己巳之變祠官不能至昌平陵衛吏卒如僑寓増埤繕障於斯為急喜峯稍深峻山海肩鑰遼東西燕河太平寨馬闌峪密雲四營聲勢相接敵即入中兩營當有衝燕河密雲相犄角遵化三屯建昌固其内防永平梁城間無敵患亦無海冦薊州轉布粟遮洋猶海運也興營諸衛初𨽻北平行都列守太寧太寧在諸闗山外西北接宣府東北抵遼陽千里山盩水深可廬而居既挈其地畀山戎我遂失外險山戎故保塞北結媚大種闞我東鄙慎哉慎哉薊州遵化平谷之馬蘭谷将軍石大喜峯口熊兒谷三屯營羅文谷寛佃等谷俱北邊𦂳要闗營豐潤之南即臨大海海運道其西接永平東北當密雲之路誠京輔要地喜峯口朶顔三衛出入之門尤𦂳要古今鎮東自山海闗起西迄居庸白洋若鞏華城東西延袤千有餘里往鎮三衛為外藩兵衛寡薄近増益漸多又分為十區區有守備若㕘将将以總兵居中都䕶而永平密雲昌平隆懷諸處又増置兵備道監焉密矣顧屬夷渝慮戎索懈弛門庭肘腋可為戒心則夫伐其謀以攜其交修吾備而固吾圉折衝決勝其必有道乎薊鎮遷徙撫巡議每聞邊警不曰山海則曰義院不曰界嶺則曰桃林此皆建昌以東地方也所以然者以密雲有總督軍門三屯營有總兵将官而永平一帶邊方無重臣以鎮壓之夫是以常犯而肆侵也合無将遵化巡撫衙門遷移永平府駐劄将永平道兵備移在山海衛居守重臣所在重兵隨之防守密邇查閲亦嚴敵人将不戰而自服矣义寧有復肆跳梁如往昔者哉薊鎮開渠以防禦晉劉清以嘉平二年于髙宗河開車廂渠灌田嵗二千頃景元辛酉更置水門水流乗車廂渠自薊西北逕昌平盡漁陽潞縣凡所灌田萬餘頃又玉海山川考曰薊州漁陽有平定渠傍海穿漕以避海難又於其北漲水為溝以拒契丹皆魏神龍中滄州刺史姜師度所開也夫車渠平定之迹誠不知其何在然據今日現在之水開今日可耕之地以距今日跳梁之衆則在能者圖之而已薊鎮各闗口要津京城北九十里昌平州州東北九十里黄花鎮自鎮歴白馬陳家弔馬等峪闗口四十八口而古北口又一十四闗口至峩眉寨中歴黄松峪将軍石凡五口而薊州東岸峪自闗以東歴寛峪等闗凡十口而遵化縣之馬蘭峪乃歴沙皮羅文松青龍井兒潘家口團亭寨闗口三十一而喜峯口又七十口而遷安縣之青山口又十二口而冷口又三口而劉家口又四口而盧龍縣之桃林口又四口而昌黎縣之界嶺箭桿等六口而撫寧縣之義院口又石門等五口而董家口歴大毛山小青山等十口而山海闗北畿東北古北口喜峯口潮河川相密邇直北黄花鎮白羊口去天夀陵尤咫尺惟薊州重屯山後諸蕃漫突而宣府鎮且繞出其外可為應援薊鎮闗繫京師天下根本論天下形勝當推本京師我朝都燕居外馭内自中國視之其形勝可謂壯矣然惟其居外而馭内也京師實密邇北邊北抵居庸東北抵古北口西南抵紫荆闗近者百里逺者不過二三百里雖宣大薊遼保定俱為近輔宣大最急尚為外蔽而薊鎮獨處京師之背其闗係不尤重乎惟薊鎮宿重兵積糗糧聲勢與京都相犄角縱敵或深入必不敢肆攻城掠野之志也且薊與多延三衛屬夷接壤扼喜峯之貢道防古北青山之闌入稽賞賚犒勞之名數又東連山海與遼左相援茍防禦稍疎其患有不可勝言者矣昔憂兵衛寡弱嘉靖中以邊警而假邊卒於延寧嗣又募浙兵為捍禦董以督府而事權稍専訓練漸熟在今日宜無慮也但募兵弭亂猶因病而暫藥之也病且已而藥之不已必生他疾則南兵之喻也盍漸消之以其餼餼六郡良家子乎客兵入衛猶不給而暫為稱貸假人而忘之人誰與我則延寧入衛之喻也頃寧夏既罷戍矣盍令延綏之衆一體盡撤乎又其甚者今並邊卒以修築為事塼埴甃甓伐山轉途日夜不得休婦子營田老稚合作糧資不時給大半入為助役而供将領之溪壑死則已矣如棄鳥獸附於藪澤也頃者寧夏之變搏主帥如仇讐彼憤積鬱烈而一旦發之若焚有由然矣不旦夕跋冦來為吾重乎而况能為國家捍禦敵乎且朝廷軫念邊氓若在痌瘝飛輓相望惟恐後時而窮餓困踣至於此極賔僚遊士曳錦履珠一言籝金頂踵相接而荷戈負㦸之士乃至不能朝夕可泄泄秦越人視耶説者曰客兵撤矣募兵消矣萬一敵渝盟而飲馬長城之下薊鎮所恃之重安在也不知燕趙之地士馬强悍漁陽戰卒自古稱雄且兵皆土著不特與敵相習而顧戀家室鬭志自倍從古未聞假南兵捍北敵者南兵之北譬舟之陸也今反令南兵倍食於北而北兵枵腹以養不相比助之夫南驕北憤敗道也司國計者寧不思亟圖之哉薊遼移兵要地石晉所賂契丹十六州地幽薊易漠涿檀順七州在山前新溈儒武雲應寰朔蔚九州在山後合山前後併契丹所自取營平二州通計之葢十有八州也自是以來非但失其土地人民乃併其闗隘而失之晉人自捐其險阻與人既無以自守其國宋人承其後而不能復中國之舊遂以白溝河為界故二國所受侵陵之禍略同夫自晉天福元年以賂契丹此地為敵所得者首尾四百五十餘年我太祖始逐出元人而復為中國葢拔之泥塗之中也太宗又於此建都則躋之天日之上矣夫以百二山河而有天然之地險重城萬雉屯百萬貔貅於此以鎮壓之是誠萬萬不拔之基也今山前山後皆吾中國之地太行西來連岡叠障環而繞之東極乎醫巫閭之境以為内之藩籬山後諸州自永寧四海冶以西歴雲代重闗叠城為外藩籬茍委任得人守禦有法可保無外患也惟昌平以東遵化永平一帶往者有大寧都司與營義會等衛以為外障後移入内地故京師東北藩籬單薄異時有患未必不出於此夫天下之患往往出於意外然能謀畫於未亊之先而預有以防備之則所患者消泯於無迹也請下大臣議居庸以東歴黄花鎮古北口直抵山海闗山之後皆荒漠無人之境非如居庸以西大小邊鎮兩層可以防備若何以善其後使之永無外患必有逺謀宏略出於其間必不得已請将洪武中大寧都司後移保定者立於永平或遵化或薊州以為重鎮凡舊所屬衛所移於沿山要害相為聲勢仍於山之後去山五十里或三四十里量其地勢因其地形便築其墩基就其空缺之處接連以為邊牆就於其間擇一要地設為闗鎮屯軍守備以為烏梁海入貢之道一以衛都城一以衛陵寢此誠千萬年之逺謀也不然國家養鋭儲材俟吾力有餘而機可乗仍復洪武中山後闗鎮之舊俾與宣府大同列為三鎮直達遼東之境則是國家之險要既失復得藩籬厚而無可乗之隙根本固而無意外之患矣薊鎮撫賞長策昔中行説教匈奴勿貴漢財物得羅綺錦繡皆棄之草中以示不如氊裘之便利故匈奴日强今則不然嗜漢物如蠅之慕膻飛去復來得丈帛尺綿爭相誇耀中國執此以覊縻之乃賈生三表五餌之餘意故今日邊鄙惟撫賞一事為馭夷之長策誠主之得其人行之中其窽可不戰而馴擾之矣大弊有五請頌言之夫宣主上之徳意達蠻貊之隠情全在通事之口我祖宗知其然也特設四夷館以翰林重臣提督之又擇大臣子弟之端謹者為譯字生習四夷之言語文字習之而通也然後授以官而分遣之以主各邊撫賞之事今四夷館如故也授以官而出邊行賞亦如故也然而其人則非矣夷語夷文一毫不達惟日需索供給每處動至千金而其與夷人通話者則全憑夜不收之屬各路提調之撫賞皆視其口以為低昂而此輩無良哄誘夷人教之争競教之需索教之侵凌教之挾詐所以䙝中國之體而使夷人不尊不信者皆此輩為之也今縱不能復祖宗之舊制重四夷館之選然各路夜不收尖兒手之屬凡通夷語者獨不可遴選而勸徴乎謂宜選若干人擇其端謹者使司通事之職三年之内夷賞不増夷情不變即為稱職授以百戸又三年而無事也陞千户又三年而無事也陞指揮倘有能調停大事採探隠情者不次陞賞不然即以軍法從事此目前至急之務所當亟圖者一也邊計莫重於撫賞而薊鎮撫賞之責惟寄之路提官既卑微人復瑣猥外不能壓鎮敵情内不知愛惜國體任其需索莫之樽裁甚至有私賂敵人求免目前如潘一正者夫薊鎮撫賞凡十一處而㕘将凡十二人今㕘将在内而使提調在外主賞非計也愚請各邊之賞皆令㕘将主之如石塘路屬夷五枝皆是白馬闗撫賞即移㕘将駐闗而革本路提調古北口屬一十四枝皆在古北口撫賞即移㕘将駐本口而革提調曹家路之㕘将移駐漢兒嶺牆子路撫賞則㕘将暫革馬蘭路㕘将移駐正闗松棚路㕘将移駐羅文谷喜峯口則駐本口太平路則駐擦崖子闗惟燕河路有二處撫賞宜将桃林屬夷并入冷口一處聴賞即移㕘将駐冷口石門路㕘将移駐義院口山海闗無撫賞又題準不援遼東則㕘将亦宜革矣如此各路㕘将皆復舊額又省提調十人且以撫賞之權屬之㕘将至期仍令三道往來提督庶體統尊而夷情可撫所當亟圖者二也按三衛之設每衛置都督二人泰寧衛之祖其左都督曰烏訥特穆爾再傳而絶右都督曰噶黙勒特穆爾今襲者曰濟爾噶福餘都督二今無止都指揮曰達都惟諾延最盛其左都督為旺特穆爾五傳為和坦生十一男又再傳而格爾台襲職生九男長為伊克實克守之法有三有脩百里之外險者有修近邊山水之險者有修境内地險者何謂修數百里之外險舊制冬月燒荒必在四五百里之外使草根盡絶敵騎難馳先臣郭登守大同於要害之處毒其水草敵不敢侵今誠於境外擇其要路潛置毒藥人飲水即死馬食草即斃尚安有一人一騎能内侵者乎如山海闗外大古路口南行則犯遼之前屯北行則犯石門諸處乃總路也於此置毒則遼及石門皆可安枕矣又如石門寨外大梯子嶺離邊四十餘里東西寛漫有横山一道舊置柞木攔寨於此置毒則義院口地方可通大舉者敵不能至矣按古兵法軍行則防毒凡入敵境則先審其水草蓋行軍者慮毒之難防故設五術以審之即使北人精通兵法識毒而不來亦為上策何乃置之不講乎但口外之水多流入内地毒其上流須分輕重所用毒藥有經七日流三四百里而解者有經半月流千里而解者有經月餘流數千里而解者此皆用草狼毒之屬隨煉之生熟而分毒之輕重南人有素習之者水入中國近則用輕藥逺則用重藥不入中國者雖用砒磠可也何謂修近邊山水之險薊鎮一帶重山叠障處處有險凡軍馬行兩山之間兵家謂之圍地敵入其中吾斷其前後盡成擒矣敵人所以敢於犯難而不顧者欺吾無人也向嘗薄遊薊門見口外諸山兩頭狹而中間濶如孔明之葫蘆谷者甚衆即兩頭不狹者修而隘之為力甚易中間之山低則増之坦則劚修成險隘積滚木礌石於上使敵知而不來可也來則雖有武騎千羣盡為網中之禽穽中之獸矣如古北口外地方平衍無山可恃則當引潮河之水周圍設險往來之處明則架木為橋暗則設坑鋪板使敵知而不來可也來則送死無疑矣昔李存孝力敵萬人李克用掘塹守之塹成飛走不能越存孝遂技窮而請降此已事之明驗也何謂修境内地險嘉靖二十九年兵從古北口由黄榆溝入歴白羊口横嶺原從古北口出三十四年自馬蘭谷由龍鬬谷入由鮎魚口出三十六年自燕河路由雞鳴山入由冷口出三十七年犯臺頭路由界嶺口入由青山出夫山川在我險隘在我敵每大舉往來出入皆得其宜若素習者惟其嚮道明而地里熟也我則險隘扼塞茫然不知甚至敗而奔北亦不知去向今須将諸路可入可出之處一一勘明如從某山入料其必於某處劄營某處搶掠某處奔回吾軍當於何處堵截何處夾攻某水可以灌某河可以阻有未備者開渠設險務使戎馬難馳又略倣古井田之意有溝有洫無事則教軍耕作敵至則藉水成圍此禦敵萬全之計也圖書編卷四十四
