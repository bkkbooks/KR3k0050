body:
  text: 圖書編卷四十七明章潢撰陜西三邊四鎮總敘陜西三邊列鎮曰延綏寧夏甘肅固原延綏黃甫川至定邊營千二百里西接寧夏花馬池出花馬池至橫城三百二十里東至黃甫川千五百二十里皆在河內邊墻外悉為河套套長幾二千里橫自墻距河逺八九百里近二百里惟黃甫川八九里爾川南焦家坪兩岸夾山水先合後泮娘娘灘羊圈子渡口冬水涸敵每二三年或四五年大衆自坪或灘或渡口入套每遣零騎伏林逐草往來不絶是以套中無嵗無敵由橫地渡河而西為寧夏鎮城鎮城至鎮逺關二百四十里中衛四百里在河外賀蘭山後敵時住牧警報屢至由鎮城渡河東入靈州至韋州三百四十里韋州南接固原預望城至固原鎮城三百里由固原出靖虜之蘭州七百三十里河州九百三十里洮州九百二十里皆在河內套衆秋由花馬池潰墻入山後及冬由靖虜衛踏氷入則臨鞏涼慶諸郡皆驛騷矣由蘭州渡河西出莊浪至甘州鎮城一千二百里至嘉峪關六百里皆在河外西海有敵土魯畨天方西域有西夷西寧莊浪革咂章咂等族有畨落酒泉浩亹之間環而居者皆其部也延綏鎮一千二百里寧夏鎮一千二百二十里固原鎮一千三百里甘肅一千八百里通共五千六百餘里陜西邊鎮事宜陜西三邊榆林最為要害甘肅可以堅壁清野而坐困套衆寧夏可以恃山阻河而守禦叛羌惟榆林河套山澤之利足以資敵又兼入境抄掠常獲厚利是以侵犯我邊曽無虛歲及我出兵彼輒遁去徒費糧芻為今之計誠莫有過於選將練兵豐財足食者三受降城唐所築禦敵於河外中城南直朔方西城南直靈武東城南直榆林三疊相距各四百里又于牛頭朝邦北山置𤇺堠千八百所自是突厥不敢度山獵牧減鎮兵數萬陜西三邊四鎮漕運關陜所需者皆山西河南所給而三方之地俱近黃河其間雖有三門析津龍門之險然昔漢唐糧餉由此而通今監船木筏往來無滯且以戶部所計山西米豆必令運貯榆林及保德州縣諸倉河南米豆必令運貯潼關衛及陜州諸倉夫諸州衛地皆瀕河可通舟楫踵往古故迹而行免當今陸運之害公私之利奚啻萬萬也况今河運潼關之北數十里接運漕河可通陜西及鳳翔鞏昌渭河西流數十里接連洛河可通延安及北上源可通邊堡渭河西流三百餘里接連涇河可通慶陽又龍門之上舊有小河徑通延綏倘加修濬必可行舟此宜簡命水部之臣示以必行之意相度地形按求古迹某處無險可以水運某處避險可以陸運某處可立倉以備倒運某處可造船以備裝運淤塞悉加導滌漕河務在疏通無憚一時之勞而失永久之利如是則不但三方之困可紓雖四方之物亦無不致矣巡撫延綏都御史盧祥等言營堡兵少而延安慶陽府州縣邊民多驍勇習見外夷敢與戰鬬若選作土兵練習調用必能奮力各護其家有不待驅使者兵部覆奏請敇御史往會官點選於是延安之綏德州葭州慶陽之寧州環縣皆選民丁之壯者編成十五號為土兵每名量免戶租時得丁壯五千餘名委官訓練聽調由是土兵強盛而毛里孩連年入寇皆退却矣按此土兵之法不但可行於延綏若九邊行之則邊民不困於賦役而心皆內向無復北走之人敵雖欲入誰為嚮導此實久安長治之至計竟無有申明此意者雖延綏此法亦就廢弛而各邊多事兵力財賦日不暇給矣安得如盧祥者當事而力主此議也整飭邊備兵書王復奏臣奉命整飭延綏寧夏甘涼邊備東自黃河岸府谷堡西止定邊營接寧夏花馬池東西縈紆二千餘里內多險隘境外臨邊無有屏障止藉墩臺城堡為守備舊城堡二十五處參差不齊道路不均逺至百餘里近或五六十里兵馬屯操反居其內人民耕牧多在其外遇賊入境傳報倉卒調兵䇿應事已無及不過虛聲應援及西南直抵慶陽等處相離五六百里烽火不接北靣沿邊一帶墩臺稀疏空濶難以瞭望臣與鎮守延綏慶陽等處總撫等官計議府谷等十九堡俱係極邊要地必增置那移庶幾可守趁今聲息稍寧先行摘撥軍餘採辦木石候春暖土開併力興工府谷堡移出芭州舊城東村堡移出髙漢嶺嚮水堡移出黑河山土門堡移出十頃坪大免猾堡移出嚮鈴塔白落城堡移出甑營兒塞門堡移出務栁莊不惟東西對直捷徑而水草亦各利便內髙家堡至雙山堡榆林城寧塞營安邊營定邊營相去隔逺合於各該交地界名崖寺子三眼泉栁樹澗瓦劄梁各添哨堡一座就於鄰近營梁堡摘官軍哨守又於安邊營起每二十里築墩臺一座通共二十四座接連慶陽定邊營起每二十里築墩臺一座共十座接連環縣俱於附近官軍量撥守瞭北靣沿邊一帶空逺者各添墩臺一座共三十四座隨其形勢以為溝墻必須髙深足以阻賊來路因其舊堡廣其規制必頁寬大足以積芻粟容客兵庶幾墩臺稠密營堡聨絡而緩急易於䇿應可以搖振軍威矣從之按嘗巡歷斯地營堡墩臺僅有遺址率多廢弛敵人出入如履平地自傳塘馳報收斂人畜之外一籌不展縱有請纓繫頸之心而委任權力則實有限年之例言之督撫漫不為意求如王復者且不可得矣延綏總兵張傑上安邊方略其一謂延綏慶陽等境廣袤千里甚宜耕牧但須增立營堡以時啓閉且轄東西二十五營每堡兵不過一二百人難以應敵府谷縣境極于東偏西距諸營八百餘里猝難應援可選諸營精兵九千分為六哨屯府谷神木二縣龍州榆林二城髙家安邊二堡無事則巡歷邊境遇警則彼此應合又延安地臨極邊鄜州定邊慶陽俱在腹裏遇警猝難馳報况彼入寇必經邊堡過延安膚施甘泉等縣方到鄜州慶陽所屯防秋軍士二千乞分布沿邊要害以備調用見今邊軍追補虧損官馬無力倍償類多逃竄致戰守缺人乞令所司調停免買陪補庶不使軍馬兩失餘六事亦多行陳攻守之䇿迄今未盡舉行曽總督延綏邊墻疏一曰固邊圉自古禦邊設險以為坊頃自大寧棄而東北撤其藩籬河套失而西北損其形勢中原之險漸失所恃矣往年調發之兵多增壘非無設險之謀也要之處之未盡其道與無險同邇者臣任山西巡撫提督鴈門等關修築偏關老營等處邊墻數百餘里總督右侍郎翁萬逹督同總兵官周尚文等修築各該要害邊墻仰賴朝廷處置得宜傳聞彼處不敢侵犯易曰王公設險以守其國險之時用大矣哉今延綏一鎮外聨沙漠內蔽全陜山川形勝世稱雄鎮誠經制而守之豈復憂此一方耶臣於六月巡歷該鎮邊垣一千五百餘里見其舊墻創于成化年間業已低薄八十年來日就傾圮曽無一人增壞土者一遇有警我軍難以慿藉此所以敵冦之來如履無人之境其弊正坐此也臣嘗計之延綏邊墻東自黃甫川起至榆林雙山堡計五百九十六里自雙山堡起至龍州堡計四百九十八里自龍州堡起西抵定邊營計四百四十里實計應築邊墻一千五百三十四里有零臣願以千五百里之地分為一十五段該每段墻百里每里築墻髙一丈九尺底厚二丈二尺收頂一丈五尺外女墻髙四尺五寸內女墻髙三尺每里築一敵臺臺下濶五丈收頂四丈厚如之高并垜墻共三丈上蓋平房一間即以官軍四十名守此一里之地有險有人矣自一里以至於百里皆然也但於百里適中去處除有舊堡外如無堡者相機築堡建營房三千間官廳三座各五間官軍三千人統之者副參或遊擊將軍也副參遊擊之外仍設把總坐堡官二員以守之於百里之中量築小堡以居守邊之兵蓋邊臺窵逺或大堡不足以容故此堡亦不可少亦各設把總坐堡官一員以守之又於其間相度便開暗門者二重門疊塹扄鑰完固通哨探出竒伏皆於此門凡一百里之間其軍馬臺堡攻擊防禦之事皆副參遊擊統之而各把總坐堡分任之此第一段邊圉之略也自第二段以至第十五段可類推矣大率百里之間為偏將者一為把總坐堡者各三為哨總中軍者五為管隊者六十自偏將以至管隊官所管共三千人皆給馬以備應援加以守墻步兵四千人共七千餘人通千五百里而計之自偏將以下官軍共該一十萬六千八百餘人內馬軍四萬六千餘人步軍六萬餘人而總攝之以撫鎮大臣則馬步相兼逺近聨絡有邊墻敵臺以為慿據有墩煌烽燧以為瞭望有堡寨營房以為居處有軍火器械以為攻擊又除墾田以修屯政以資衣食墻外一里復鑿一濠濠之深濶皆期二丈所取之土即以築墻墻髙池深零賊毋敢近邊脫有信息必大舉之賊乎夫賊之大舉也動稱十數萬衆傳報營勢橫長五六十里縱使併力而來一擁而至我之一將所守之邊髙城深池百里之間既有七千餘人又調墻左右者五十里內馬兵援之可得官軍各三千員名其調遣也俱於墻邊往來如嶄崖陡峻處亦必架鑿通道以便應援夫以應援之官軍合本處分守之官軍大約可得一萬三千員名以數十里之墻計其垜口不過數千殆二三人而守一垜口其火器弓弩長短相雜更休迭應聲勢自爾百倍我軍居髙而有據敵人仰靣而受兵其何能飛度乎由是大將居中聞報䇿應更調鄰堡之兵或助勢以堅守或設伏以出竒為兩翼之勢出暗門之外敵不知其所攻矣蓋敵之所恃者馬我之髙墻深池限隔之外衆人廣器制馭逺邇彼之強馬弗能突矣賊之所恃者弓箭其發不過四五十步我之神鎗飛炮連珠佛郎自髙臨下發踈擊逺彼之弓箭弗能抵矣又以逸而待勞無送往迎來之誚以主而待客免東徵西調之擾備是數者必固之道也或曰此墻一段受攻而左右五十里內守墻官軍俱來應援其勢順其應速固稱便矣若左右鄰之墻缺少官軍又誰補乎臣曰左墻守兵須移矣凡居右者不可移補乎蓋須補動移千里之衆而官軍之奔馳者皆鱗次而行不過百里且俱墻上往來一時即合一時即離非有山川險阻之限越也若曰邊墻僅支零賊難禦大敵臣曰難禦大敵者先日之邊墻也果實加髙厚之工人致死守之力則金湯之形克壯而制禦之功自收今沿邊一帶小小村堡有人守之尚保無患而况於大邊塞乎二曰議財用臣按邊圉一固其利溥矣然不一勞者不永逸今計修墻一段約地百里剷削板築工程浩繁除堡城舊有并新設者另行勘估外其敵臺百座每座連房繞以月墻各約該工料銀一百五十兩暗門二座連房并重門疊塹各銀一百兩以上墩臺暗門共銀一萬五千二百兩每里邊墻計長三百六十步折算一百八十丈每十二丈作為一工每工連女墻折算約髙二丈零四寸底厚二丈二尺收頂一丈五尺每工除火頭夫一十名淨用夫一百名每名每日計築髙廣皆一尺二寸墻髙二尺四寸應築一十七日每日每夫行糧一升五合折銀一分五釐外加鹽菜銀一分共二分五釐連火頭一百一十名共算行糧鹽菜銀二兩七錢五分計一十七日該銀四十六兩七錢五分是為一工每里通計一十五工該銀七百一兩二錢五分通百里計之共該銀七萬一百二十五兩其承委管土官員人役并各匠役廪給賞犒等費不下一千餘兩并墩臺平房暗門等項工料之費通共八萬六千三百二十五兩東西邊墻延長一千五百餘里內除天溝險陷并挑壕外實該一千四百四十餘里通計工料糧賞大約用銀一百二十四萬三千八十兩加以架梁官軍一萬二千員名馬三千匹糧料草費大約三工須銀一十四萬兩通前共計銀一百三十八萬三千八十兩則金城湯池之險可永賴矣此其大略也通前工程中間舊址可因險阻當依者其費宜省土雜沙鹻工涉逺難者其費宜增又在承委官員臨時盈縮其數也如蒙乞敕該部通查議處先濟第一段工程之費其餘陸續發付該鎮給濟工完查勘造册奏􅌳若曰財用不敷難興大役臣以為三秦因無此邊歲遭兵患延安慶環之間民物雕殘情實可憫以此較彼所費孰多况墻成而有人以守坐見久安長治之效否則邊境之患不息上下俱困其慮長矣榆林總敘榆林舊治綏德而棄米脂魚河等處於外幾三百里敵輕騎入掠興鎮兵出禦之每不及而返敵得投隙焉成化九年都御史余子俊建議徙鎮榆林堡襟吭既據內地遂安但其地逼近河套雖有邊墻敵多充斥東自清水營西至定邊營一帶更為充劇邊墻東起黃甫川西至定邊營長亘九千二百餘里連墩勾堡橫截河套之口內復塹山湮谷是曰夾道地利亦得矣東起黃甫川西至定邊營城堡三十四墩臺一百七十墩堡勾連橫截河套之口舊以陜西左前後右護衛延安綏德慶陽三衛并河南南陽衛潁上千戶所直𨽻潼關寧山二衛官軍輪班哨守成化初開設榆林一衛操守鎮守總兵官一副總兵一遊擊將軍二俱駐劄榆林城東路設分守左參將一西路設分守右參將一守備都指揮一復設巡撫都御史提督兵多敢勇四方征戰所向有功更多將材有節氣視他鎮為最焉彼時敵少過河軍士得耕牧套內亦以樵採圍獵之地方豐庶稱雄鎮焉自敵據套以來邊禁漸嚴我軍不敢擅入諸利皆失而鎮城四望黃沙不産五榖不通貨賂於是一切芻糧始仰給腹裏矣𢎞治中布政文貴奏改西延慶三府本鎮之稅為拋荒折色者二萬餘石正德中侍郎馮清又改三府本色盡為折色自是軍用始窘遂有米珠草桂之謡况有節募新軍而糧未增尚在額內支給又邊邑凋敝災傷所免及拖欠者復百有餘萬焉得不窮困至於今日之極也嘉靖七年鎮城餓莩幾萬言之痛心嗚呼此鎮將士懷忠畏法死無怨言敢勇善戰虜所毒憚乃令年年枵腹不得一飽傷哉傷哉脫敵人窺知虛實以重兵壓境及客兵既集日費益廣更以一軍駐河運之地則糧道阻絶不雨三月而榆林坐困矣今之司訃者不憂積薪之火猶待燃眉之救豈知此鎮迫於寇門糧道險逺急即束手臨時雖豫金如山不可食也况今鹽法已壞飛挽之計失在官糴買一費數倍戊子之歲束草價至二錢有餘他可知矣愚故以為論榆林者急在芻糧他非所慮又本色不復則榆林未可知也至於募軍之糧及災傷所免戶部處補自是當然何今邊臣乞哀之不巳乎夫事有改作而後善者不可執一論也今三邊芻糧至難處矣愚謂黃河自陜州而上至綏德近境春初時皆可舟行若計沿河郡縣改徵本色水陸接運而上則榆林其少蘇乎再於延寧甘固適中之地另設倉場各以戶部官一員主之每年豫鹽銀十餘萬令其糴買儲蓄專備客兵之用出入稽考一歸戶部邊官無得那移借貸倘客兵一年不至則有一年之積如是數年或可少裕也視今日各邊有事而後徵兵請糧及內帑至則糧價正踊錙為銖用所省又當萬萬矣套地長幾二千里橫至數百里亦漢武朔方地也唐猶內屬韓公築三城於河外史稱其功夫拒河為守尚不能固乃能遏敵於河外其置烽堠千八百所所須萬人而史云減戍此皆不可曉者近有復套之議謂當循唐舊又謂當復守東勝則榆林東路可以無虞審時度力愚不知計所出矣西路最稱要害而安邊定邊連接花馬池更為衝劇築墻設險事有不容己者若沿邊困悴之邑脣齒相依當擇賢令旌以異等令其撫綏招來庶幾可以保全乎夫榆林地險而防嚴將士敢勇戰不貫胄敵呼為駱駝城人馬見則畏之四方征調所向有功更多將材有節氣視他鎮為最焉第鎮城逺處乎不毛軍衆待哺於腹裏生理既難糧道又逺倘人事不修則六邊之廢其首在兹乎愚故云榆林者患其芻糧他非所計也榆林鎮屬營六堡二十有八馬步官軍四萬九千二百五十員名馬二萬四千四百四十六匹糧料一十八萬九千七百二十八石有零民糧三千九百有零草八十八萬一千二百六十束榆林事宜天順中延綏用兵日久戶書楊鼎上疏曰敖拉出住牧河套日入寇掠殆今三年請師古人自黃河轉運為便倉法且言三門之上有小河可通延綏如以所運糧草各貯水次泝流儹運庶幾不乏且可順帶解鹽數十萬以充淮課則國利大有增益詔悉從之然以衆議竟沮不行榆林地乏耕牧藉於河套為多河套失自𢎞治正德間數千里膏膄之地盡為敵人出沒榆林由是失所養榆林之守無險可據而左右援大同寧夏甚遼雖設迤左烽墩五六十迤右烽墩九十二而軍食兩缺連年告急然諸邊鎮獨榆林軍忠義無搖志且負勇常懷復套之憤其惟苦於無糧彼識者謂得百萬金可充恢復之用矣榆林總論按嘗視師延綏其遺民故老咸曰鎮城舊在綏德余公遷出榆林軍民役死不下萬計窮簷荒廢千里丘墟孤兒寡婦衰麻扶杖日哭于軍門而浮沙築墻終難就緒向使其移鎮河湟逼逐套衆興此大役猶可言也顧僅僅止此至今榆林孤城懸於荒漠勞師戍守歲費萬千綏德藩籬竟失鎖鑰敵騎長驅直闖內地其貽謀蓋不審矣由此觀之則宣大之役臺諫交章非無自也榆林鎮總圖説榆林逺際龍沙四無襟帶一望穹幕勢極衝險國初為榆林莊本綏德衛屯所巳巳之變東勝失守始築榆林城成化間套衆寇邊撫臣余子俊移延綏鎮於榆林莊置榆林衛當時建議若王翶楊琚諸人首以築墻垣濬溝塹建堡置墩為關隘藩籬計子俊因之起黃甫川抵定邊營千五百里之間堡三十有四墩八百餘所分東中西三路為守邊警藉以少寧及𢎞治中火篩竊渡內訌吉囊猖獗日甚而延綏之患滋不惟戰鬭之役歲無寧月而增戍供餉力將不支使天未悔禍順義不王何止蹂躪疆場虔劉黎庶而延慶涇汾之區悉干戈戰鬭之場矣况由黃甫川而東永寧汾晉以及澤潞聲勢殊駭異哉顧欵市二十年餘一時肩事諸臣所為修築簡練之圖猶未能悉如前人之議以古凖今何不逮之逺也慨自成化間程萬里之言不行嘉靖間曽維楊之計弗竟自是無復敢為復套之議矣捐千里可耕之地貽極邊多事之虞而徒屑屑于沿邊修築之務計莫下於此者愚以為乘此欵順責成當事無復因循若延慶之民多驍勇習見敵人敢與戰鬬選作土兵則盧祥之䇿可用也其土著中年髙有識者宣布恩德諭以禍福使之各率其屬無自疑二且罷一切苛政則當時朝寧之議可行也修築屯堡烽燧珠連簡戍卒置糧餉邊用充足使人樂于戰守則王忠肅之言可循也修此三者庶幾哉栁營烽靖榆塞馬間河套其可圖乎是在謀國者考焉榆林三路榆林東路屬堡有九以一參將領之駐神木東抵黃河西接鎮之髙家堡適當河套之東南一墻之隔以限中外無處非敵亦無地非寇路也舉其槩則黃甫川當大川墩之隘而清水營置鎮川墩之衝木瓜園之劉家梁孤山堡之守口俱以平川馳騁稱便鎮羌堡則龍王廟永興堡則丘家梁皆所必由之道也神木之入由安川等墩而柏油相林一自窯兒濶一自髙樹梁無險可慿直入境內邊墻雖築浮沙易傾然則今日之計莫若選將練兵豐財足食倣昔日馬端肅榆林之議以為自完之計若恃欵而忘備恐一墻之限與敵共之是胡越起於轂下而羌夷接軫也豈不殆哉榆林中路屬之鎮城領堡一十又一在鎮之東者有髙家建安雙山常樂四堡鎮之西有嚮水波羅懷逺威武清平五堡而歸德魚河則在鎮之南然實當河套之正中舊鎮在綏德余肅敏遷出榆林一時物議沸騰謂肅敏此舉窮簷荒廢千里丘墟浮沙築墻終難就緒至今榆林城孤懸於荒漠勞師戍守歲費萬千綏德藩籬竟失鎖鑰敵騎長驅直闖內地貽謀蓋不審矣但榆林之人輕生敢戰相恃無恐顧兹二十年邊境暗然無乃狃於忘戰也乎哉夫䇿榆林者無論修築惟剷削設險之法差可行耳别當逺圖則復套之議毋目為迂也榆林久宿重兵人飽豐餉材官騎士簡練有年茍得任事之將益務精強益修戰具俟彼寒盟即為復套之舉則摩囉歡有可敗者三程萬里之言不有明徵也哉奈之何不復天限中外之險而僅以一墻平分漢界欲強敵之不為它日患恐未可坐而䇿也榆林西路計十四堡自龍州城至鹽場堡中間若鎮靖靖邊寧塞巴圖永濟新舊安邊新興石勞池饒陽水以及定邊五百餘里俱係平川處處可掏墻而入最為要害誠莫險于榆林方肅敏之築榆林也置堡建墩稱為雄鎮邊氓藉庇者三十餘年後之議者遽謂其迫邊庭焉遂至棄花馬築新花馬矣棄安邊築新安邊矣又入而築下馬關矣鎮以西巍然重屏乃頓頽棄致寇逼於門庭得無失䇿歟沿邊墩臺如昔人所議遺址猶存耿烈可續顧當事者自傳塘馳報收斂人畜之外一籌莫展縱有請纓繫頸之心委任權力則實有限致使封疆漸委并邊多故其為隱憂可勝言哉噫嘻自肅敏有安邊營平曠難守宜退守中山坡之議當時若李敏非之後人疵之無惑矣使今任事者乘今日之欵併力以復榆邊之舊他日有不共花馬池連勢稱雄哉寧夏總敘寧夏亦朔方地也朔方河西之地即古夏州南北僅百里東西二百餘里南北朝晉時赫連夏及拓跋魏皆都於此至唐宋胡裔李繼遷趙元昊相繼居夏纍世據朔方之險為中國患今三邊既為中國所有而寧夏居中適當襟喉之地國初立寧夏府洪武五年廢之徙其民于陜西九年復設寧夏等五衛于上郡蓋四塞之地內有漢唐二渠引水灌田足稱富庶亦陜之樂土也鎮城所據賀蘭山環其西北黃河在東南險固可守漢唐舊渠皆在厥田上上人易為生成化以前敵患多在河西自虜據套以來而河東三百里間更為敵衝是故窺平固則犯花馬池掠環慶則由花馬池之東入靈州等處則清水營一帶是其道矣所𨽻賀蘭山後敵人出沒無時而花馬池鹽川東西三百里地勢平漫興武營靈州一帶又套賊侵犯腹裏必由之路築墻畫守始自巡撫徐廷璋此千古卓然之見而總制楊一清王荆唐龍皆常增築更益敵臺足禦竊發矣顧兵寡勢分難當大舉之寇豈人謀地利有未盡邪今之論者以固原為堂奧響石溝至花兒岔為二門花馬池一帶為三門謂有重險矣不知賊已入大門則堂奧無用風雨飄忽之所及內地村聚之民急欲收保而無由也嘗聞𢎞治以前敵住套不常間有連歲不入者我邊每歲於河凍時決其出入入則嚴戒出則解嚴至氷泮後則不能復出入矣今敵渾脫飛渡數萬立濟經年住套安為住牧逋逃教誘盡知我內地虛實此可與往日論哉而花馬池一帶適其利涉之境遊騎出沒無日無之宜乎延寧固終歲不得少息也試嘗籌之若擇花馬池便利之地大建城堡添設參遊移總制居之分屯重兵清水武興等營令三百里之間旌幟相望刁斗相聞其鐵柱泉等處水草大路盡建墩堡北人住牧套內非昔往來不時者可比也其保障惟以邊墻為主彼國依水草為居花馬池東南一帶惟鐵柱泉有水又東南至梁家泉有水又東南至甘泉紅桞榆樹等巴圖韓家長流等處有水總制劉天和題于鐵柱泉築城梁家泉築堡甜水泉史巴圖等處築墻一時水源俱各據守賊無飲馬之處誠百世之利也此不惟得扼吭先制之計東援榆林西接寧夏亦常山蛇勢也又洪武以來敵出入河套往來甘涼皆自賀蘭山後取道自總兵杭雄敗後山前遂為通衢趙瑛周尚文禦之皆敗由此不已愚不知寧夏所終也或曰舊墩瞭望直出山外有警即聞易於遏絶今皆廢矣或又曰赤木黃峽等口舊皆疊石固塞防守今亦不然是以莫之禦敵也夫敗軍法背水陳也嘗聞先襄毅云成化中敗軍法重無茍免者是以邊臣知畏地方少事𢎞治中太平濫觴稍弛至正德則一故事耳今寧夏失機屢矣而舊將晏然無事求之各邊無不然者此不可為邊民痛哭哉鎮城南北僅百里東西止二百餘里耳王瓊廢鎮逺關而城平虜棄地蓋八十里一何易也今敵患愈近而民利益窘善謀者一至是乎若山南作塹以遏西來之寇則得之矣中衛偏在西隅雖地狹易守顧山後之衆窺靖虜者數數有之尋論故事云自賀蘭山直西至鎮蕃內皆漢武舊地今棄之矣果如所論而城守之則莊浪靖固中衛俱安枕矣先年套內零賊不時進至石溝鹽池及靖固各堡搶掠花馬池一帶全無耕牧自築外大邊以後零賊絶無數百里間荒地盡耕孽牧遍野糧價亦平但內有鹻濕墻七十餘里寧夏又不肯協心防守數萬大勢套賊卒至猶不能禦內固原小邊每年修理二次亦各完備但青沙峴八十餘里俱走沙磊石隨風剝落隨形壞工力不㻣節年套賊從此深入腹裏搶掠新紅等堡直北稍東總制劉天和新築橫墻二道以圍梁家泉直北稍西舊有深險大溝一道受迤東磊山之水流于黃河長一百二十五里總制劉天和塹崖築堤一百八里五分築墻堡一十六里八分自大邊至此重險有四道矣其寧夏北賀蘭山黃河之北外有舊邊一道嘉靖十年總制王瓊于內復築邊墻一道官軍遂棄外邊不守以致邊內地田荒蕪十五年總制劉天和復修外邊防守黃河東與外邊對岸處修築長堤一道順河直抵橫城大邊墻以截套衆自東過河以入寧夏之路寧夏西倚賀蘭山天險為固山口一十二處寬狹不等共止量長一十五里舊每口各有關墻三道今盡圮廢不修以致套衆時入搶掠寧夏古夏州也阻山帶河四塞之地據全陜上遊國初立寧夏府尋改衛以其地廣而民庶又增左屯右屯中屯前屯等衛外轄後中二衛并平敵靈州興武韋州四所巍然巨鎮與八塞並列而環慶開城諸內地藉以藩籬未欵之先議者患其株保於橫城而花馬池之備屹然巨防也欵市以來修築漸固而靈韋鳴沙之間若堂奧故經制在所綏焉平虜單弱中衛孤懸長顧者慮之稔矣邇者次第修築若中衛之觀音口歷鎮關墩抵黃河百八十里蓋已築有邊墻匪直捍中衛所以固廣武玉泉大壩之外扄者計靡弗周而孤懸者有所藉平虜自賀蘭抵沙湖築墻置墩而打磑歸德諸口創建謹密則單弱者少有所恃矣唯是黑山鎮逺本我中原土宇棄為邊馬住牧之場茍不思所以復之恐平虜之守固非所以戢寧鎮城惠綏河東也善謀國者當必有出格之見顧時詘而舉贏矣莫若乘今日之欵增兵以固平虜徐以窺黑山鎮逺之復使平虜絶騷動之患鎮城免軼宕之憂亦開疆展土之畫歟籌邊者相勢以揆䇿毋玩時焉可也平虜城在寧鎮之北百二十里蓋鎮城之屏蔽也北當鎮逺打磑諸關口之衝東當套衆浮河之擾西當汝箕大風小風歸德鎮北宿嵬黃硤諸口之警三靣受敵要害稱最邇自賀蘭沙湖之邊築設戍置墩而打磑歸德之隘修明烽逺堠居民視昔頗稱泰寧唯是逼臨套衆僅限一墻茍非修戰具作鋭氣恐終無以自保也昔人䇿疲乏之人當新羈之馬然猶斬將搴旗追奔逐北者亦蓄鋭於平日而賈勇於臨時耳矧與套為鄰之地素所習見誠能善鼓舞之即變起倉卒輿不及還轅人不及施巧亦足以張空拳冒白刃彼榆林之輕生靖虜之驍健鎮畨之敢戰獨何人哉守平虜者盍深長思之若夫黑山營鎮逺關固所宜復議者又謂廢棄已久復于一旦恐為力不易愚以為不患二處之不復而患平虜之不強平衆之兵強二處之復當自有漸矣寧夏鎮屬衛二所四營四堡一十有八備禦馬步官軍三萬七百八十七員名馬四千一百八十匹糧料二十萬七千五百五十七石有零民糧四千六百九十石有零草一百三十六萬一千五百餘束固原鎮屬衛三所四營一堡一十五馬步官軍二萬八千八百三十員名馬一千六百七十三匹糧料一十三萬九千九百一十五石折色糧并折草銀一十四萬九千五百八十兩年例銀五萬兩草三十二萬八千一百三十七束布五萬七千九百零四匹棉花二萬六千七百三十四斤京運年例銀五萬兩寧夏事宜愚嘗因張鎣巡撫寧夏導河溉田之事考古驗今而有慨焉霍公韜奏議謂自陜西築為邊墻窪為溝渠尋秦漢故迹修復焉邊城外固溝渠內深內資灌溉外禦戎兵全陜之利也大學士楊一清云陜西沃壤若得人力盡闢耕之三邊軍餉不煩餽運自然饒裕愚謂今謀國者何不按其迹行之而徒令邊士終歲脫巾枵腹致歎於米珠草桂也又按九邊圖論謂黃河自陜州而上至綏德近境春初秋末皆可行舟若沿河州縣改徵本色水陸接運而上榆林其少蘇乎又按唐書唐髙祖時突厥歲盜邊帝會羣臣問所以備邊者將作大匠于筠請于五原靈武置舟師于河扼其入路中書侍郎溫彥博曰魏為長塹遏胸奴今可用帝乃使桑顯和塹邊大道召江南船工大發卒治戰艦愚按北土之有長河猶南方之有大江所宜裁成輔相以致其用考閲古今訏謨遺迹而黃河不惟可資溉耕且可以轉漕可以置舟師扼敵方册昭然奈何徒能行於昔而不能行於今徒付之話言而不能見諸行事令志士徒抱歎於千載之言寧夏等衛圖説寧夏等衛係鎮城東南去黃河三十里北至賀蘭百二十里背名山而靣洪流左河津而右重塞所藉河山之力居多自今觀之夏秋之間河流洶湧天限東西且溝渠繞旋埂􅀈壁立邊馬馳騁之難自不能為地方患固也曽不知冬防則塞外之兵梯山斬關賀蘭之險與共之矣河套之敵踏氷四馳黃河之險與共之矣險未可恃而先時預防之䇿可不講與莫若乘此欵順責成任事之臣益務修守備沿河以防冬而烽燧明樹山木以塞隘而禁人伐通賊路口悉作斥堠務成鞏固之𫝑又於鎮城所宿重兵夙稱驍健時加簡練使之足以當敵則地險可恃而人險尤可恃異日可無亡矢遺鏃之費可以坐制強敵矣中衛左聨寧夏右通莊浪在先年為河西重地憶自套衆入冦盤據松山而東西瞭望遂致懸絶靖蘭之間始多故矣衛城孤懸寡援所恃者大河環繞夏秋可保無虞議者每喫緊于邊墻之築蓋謂與強敵為鄰能自完則足矣近自觀音口歷鎮關墩直抵黃河工久告竣在本鎮可以捍廣武玉泉大壩之墟在鄰鎮可以衛西安州紅古城海剌都之警守中衛者益留意於培壘而守望不怠焉則長城䇄立是所大造於兹土也豈淺鮮哉第聞衛之西北雙水泉墩至蘆溝兒墩五六十里之地邊用石砌包沙恐一挖即傾易築土邊庶于地方有實效也守中衛者盍勉為之靈州在黃河之南六十里北抵橫城紅山清水南抵萌城東抵磁窯寨興武營西南抵半箇城幅􅊷千里先時舊邊頽敝敵牧東山不無侵擾及新邊既築界限森嚴防禦縝密行者息於途耕者宿於野矣唯是年來清宴而東山一帶若鐵柱泉月臺等處孳畜繁殷恐有以動敵人伺取之念則先時備禦之圖不容緩也且其所屬諸堡逼臨敵幕散處河東山河之險既無慿藉敵之入冦亦無定所即使斥堠望烽燧不得卧將吏被介胄而睡猶恐蹈因循之夙弊而時或懈防然則今日之備靈州者可恃欵而不嚴為之所乎人又有言靈州之憂不在靈州而在諸堡不在諸堡而在橫城何也橫城失守則諸堡不可得而按堵矣然則畫靈州之䇿者當先于橫城籌之興武本漢朔方郡地與敵為鄰東至安定堡六十里至花馬池倍之西至茂巴拉三十里地惟沙磧城頗髙廣未欵之先盤據河套者每以貔貅之衆合力同心窺伺侵擾而我軍嚴防固圉一收斂之外野無所掠矣即欲深入恐分兵防禦勢有所阻况沿邊一帶自橫城至花馬池三百里間東有花馬池之兵西有靈州之兵俱是禦敵而興武居中近設遊擊使從此而簡戍卒修戰守專務富強豈惟資二處犄角之勢塞垣藉以寧謐矣噫嘻安得守國扞敵之臣與之共城郭封疆之寄也哉花馬池漢朔方郡地在寧夏鎮黃河東南三百里許當河套之衝每歲秋防督臣之所駐劄設寧夏後衛焉西南去鐵柱泉九十里東與榆林定邊營接壤北臨沙漠之墟城孤懸而寡援地荒僻而廣闊駿馬踰邊長驅內地昔所恃者定邊迤西橫城迤東長城為之障蔽也年來入欵惟事修築髙其培壘雉堞稱雄即使背約寒盟茍能嚴明烽火逺為瞭望守之不有餘乎乃議者謂秦築長城今且平漫而謂浮沙築墻可恃鞏固哉慨自白圭搜套之議阻于王越而余子俊修築邊垣之説先後相踵竟至邊墻虛費歲事秋防勞師戍守猶恐不及幸今套衆歸盟亟宜責實任事如定邊花馬池橫城之邊所最重也而乾溝乾澗之墻不可輕也修矣而擇人守之則良將徑弩用守要害豈惟寧夏荷障鑰之固而固原亦藉扄蔽之嚴矣固原固原開城縣地也成化以前套衆未熾平固安會之間得以休息所備者靖虜一靣耳以陜西巡撫總兵提鎮此邊與三關事體相同自𢎞治十四年和碩入掠之後遂為虜衝于是始改立州衛以固靖甘蘭四衛𨽻之設總制參遊等官屹然一巨鎮矣固原所轄則有黑水鎮戍平虜紅鼓板井彭陽等城西安州哈喇圖等營環慶則有走馬川青平山城甜水等城堡靖虜蘭州則有甘鹽池逹喇齊一條城十字川西古城積積灘等堡處處可以通賊𢎞治十五年兵部議設總制于固原後總制皆駐劄此城于是始改立州衛以固靖甘四衛𨽻之嘉靖十八年以總制移鎮花馬池仍以陜西巡撫總兵提鎮總兵鎮與寧夏為唇齒花馬池一帶邊人謂之大門若併力堅守花馬池則固原自可無虞而響石溝至靖虜一帶修築又在所緩蓋力窄𫝑弱寇已入門主人束手故愚以為總制不駐花馬池則固原未可息肩也靖虜一帶每歲黃河氷合一望千里皆如平地若賀蘭山後之敵踏氷馳踔則蘭靖安會之間便為禍階調兵防守候在氷凍而西鳳臨鞏之卒多未經戰豈能捍禦然則不添沿河之堡不屯常戍之兵則固原又未可息肩也徵調客兵他鎮有事則然無事則已若固原防守之戍每歲凡四閲月而芻糧不為之處尚在本兵額內支給如之何其不告乏乎小鹽池批驗舊在固原蓋來商旅納貨賄期以填實此地而王瓊移置下馬房其見偏矣夫固原中制之地總督所在戎務攸關此特一隅之論耳若夫任將任官足食足兵之計孰不能言之所以體權盡變存乎其人焉耳固原在寧夏之南實沿邊要害之地𢎞治間總制秦紘築內邊一條自饒陽界起至西徐斌水三百餘里自徐斌水起西至靖虜花兒岔止長六百餘里至今每歲于二八月各修築之屹然為關中重險東向可以顧榆林西向可以顧甘肅總兵遊擊守備皆駐劄于此猶室家之有堂奧也東之于套也以花馬池一帶為門戶西之于畨也以西蘭一帶為門戶門庭故有總督運籌于中總兵參遊提兵各鎮折衝于外處置得宜全陜可恃以無憂矣固原邊政總説固原邊鎮本羌戎故地秦闢壤為隴西郡國朝混一寰宇建寧鞏二府并置衛所者十二以司戎務州縣二十有三以綏吏治然其邊自寧夏中衛而西而北而南宛轉二千六百餘里蓋分陜之適中控制之上遊也然黃河積石環於後嶓冡嘉陵距於前控畨在岷而有洮陽疊川之隔禦敵在原而有金城烏蘭之壯偉哉山河之固經制之備已顧兹羌戎一則以招中羈其心一則以土著致其命胥戴中華傾心效順者固無間於彼此矣然蘭靖緊鄰敵穴百步之內率皆強敵且當三秦門戶衝險為最而河洮近邊舊無外患自璸都襲居莽賚川漸逼內地窺我藩籬則門庭肘掖之間生一敵國邊防多故視昔有加蘭河之兵雖強而失額頗多洮岷之兵漸增而半皆未練且軍民逃亡以屯田則未墾歲時災侵以徵輸則為艱此俱時勢之未易調停而足食足兵之計設險扼塞之防亟宜蚤圖而不容少緩者也夫蘭靖衝矣北部稱藩則疆場寧謐國家間暇惟此時為然惟是枹罕西和之陬以及隂平武都之壤連帶蜀漢環拱諸羌極目故封則冉駹白馬唐宋之吐畨在焉虜誠豪舉傑黠遮要而服屬之虔劉騷動豈直關隴而越嶲松潘之間又當備邊無已時矣若其絶禍萌銷永患惟驅璸都於原巢以斷右臂萬全之䇿焉靖虜古會寧地國初設巡司統攝戍兵以防河東正統二年始置衛列乾鹽池等四堡為安會藩籬東接寧夏西界金城北抵沙漠地形逼臨敵境衝險甚矣所恃者黃河天塹我易為防夏秋之間河水通流洪濤為障惟冬春之交氷凍河結遂成坦途馳踔而來無論一葦可航矣沿邊五百餘里隘口甚多畫地保疆兵分力弱如敵在正德間由梁家泉分水嶺四犯臨鞏嘉靖間由氷溝雪山隘兩寇扇馬等原橫行劫掠為患匪輕顧永安堡近設守備一員逺戍北塞以張犄角之勢外援內應巨患其少弭焉或云塞梁家等口之路則河套之敵不能入扼雪山氷溝之險則山後之敵不能侵似亦保障之䇿毋以欵和為得計也蘭州古金城郡也國初為蘭縣併置衛洪武三十一年肅藩移封而中護衛從焉成化間改縣為州外通邊庭內屏臨鞏乃甘肅之咽喉秦隴之門戶也分屯列戍置塞周防襟山帶河險要可據唯是冬春氷結則中流天塹與敵共之一渡洪津便為內境機宜戰守豈與諸邊一律哉往者三冬沍寒逺借開城之戍轉輸跋涉亦稱勞費矣欵和以來阻敵北山之外烽燧晏間疆場肅謐供需踣頓減於往時此非欵和之明效乎顧州城逼近河流北城一帶常苦衝圮礦徒鱗集境內逐利為姦外通邊謀中匿亡命今雖解散然利孔猶張覬覦未巳而名挂罪籍則永作流人羣聚荒徼迄為敵用安內攘外此非一漸乎經制者不可不思預圖之也河州漢枹罕縣地國初置衛成化間附衛為州洮水繞于東積石峙于西二十四關屏蔽內外城寨相聨聲援易逹獨歸德孤懸一隅道路阻隔又七百里而遙然招畨易馬制定羈縻藩籬既多跳梁無恐惟近年沙磧璸都諸酋渡河而南住牧近郊蠶食畨族環河山畜産之裔剽掠殆盡侵陵逼近漸至剝膚修守之計有不容緩者唯是積石之西隴龍溝口乃諸關之門戶實通城之要衝于此建堡築臺以扼險要添兵置將以固關防併團聚畨兵共圖保障聨絡歸德用成犄角庶幾河湟有安枕之時乎至若近議移鎮掣兵以防衝突固為思患預防之道然勞民費餉關係匪輕似又不可不慎重也歸德本西羌地也先漢擴疆為貴德州國朝建守禦千戶所設畨站者七屯寨者十蓋為河州藩垣計也土沃壤肥堪以屯戍崇山疊巘足以拒守形勝則有餘焉顧以彈丸之區星懸境外既與諸畨為伍密邇莽賚復與強敵為鄰駕馭撫處較昔甚艱矣且距河州七百餘里鳥道攀緣驛程險厄北望湟中既阻洪河南去洮陽逺隔異域兩地絶徼豈能捍禦故隴龍溝口議添守備扼險塞衝地利既得聲聨勢接輔車可成且招撫諸畨自樹屏翰安邊保境莫此為先豈直歸德藉有比鄰而河洮之保障亦固矣綢繆門戶堂奧自逸非經時之急務乎洮州古諸戎地後周置洮陽國家因設洮州衛軍民指揮使司塞堡聨絡俱有官軍守禦焉境內西畨九十餘族頒降金牌為符易馬以示羈縻雖叛服靡常而輯寧亦易敵患則未之及也自萬厯辛巳間將吏弛防疆圉失守以致套衆擁衆搶畨直抵城下殺我官軍大掠而去比時過執和欵竟未一懲敵遂慿陵封固巢穴莽賚川一帶乃成甌脫二百年藩籬之限於我啓疆年來徵兵益戌較昔頗密而敵居河內近在門庭况境內地方川原平曠守禦為難而生畨中阻傳不及聞西垂重地孤危孰甚焉且海賊入犯自歸德而來計程甚捷今之偵探乃自河州而入歸德為道不特倍之敵疾馳飛渡速於風雨如往事者則寇在郊關我猶坐待為患豈細故哉新築邊垣業已限隔中外慿城禦侮卒難侵暴然招撫生畨餌以開中借彼耳目為我聲聞誠一舉兩得之效也噫生畨之招徠在楊咱二土官土官之駕馭在本部之將領擇廉將以專彈壓非治洮之急務哉岷州古隴西郡之屬邑西魏置岷州國初置岷州衛軍民指揮使司編戶一十七里屯寨百五十有二散處於本境及靜寧泰安清水寧逺西和五州縣之間其西畨五十餘族輪年貢進以為羈縻之術天順間設守備成化以來復設邊備副使控制撫防之機日益嚴密生熟畨夷率多賔服無跳梁之虞第海賊渡河門庭致寇有不可一日而忘備者昔璸都入犯洮州境內震恐居民有荷擔之危今雖退住莽賚相距千有餘里然無限可恃倐忽慿陵即正德間海賊越洮州而東犯坐視殺掠莫能堵禦不可為殷監哉及查永寧鎮平二堡地當險要增兵戍守亦足扼塞我防既備兵患可弭此亦目前之計也西固守禦千戶所亦羌戎故地國初置所𨽻岷州境內西畨七十三族耕食屋居與中國類扼險設堡以為屏蔽如南峪楊家等寨者十有七城南白水江由徽岷而入川城東兩河口由階文而逹陜此形勢大較也第畨漢錯居中外不别貿易來往數起爭釁惟當事者持之以廉平撫之以恩信姦狡不悛則以兵威壓之外屈其力內服其心來侵之患不禁而自輯矣今查本城官軍止一千三百有竒既屬單弱而召募之衆半皆新附未必遽肯為我所用恐無事則披堅執鋭甘餽餉之需有事則返斾倒戈無攻戰之勇亦勢所必至也徒虛名而鮮實用其邊防之大忌矣乎階州周秦時氐羌所居漢置武都郡唐置階州國初改階縣旋復為州西有白水江江之西南有西畨二十四族扼險屯戍黃鹿壩等堡則一十有三焉藩屏亦既周密矣再設分守參將兼轄西固文縣二千戶所經制不稱備哉在諸畨則畏威慕義效順之誠無間逺邇供賦趨役如熟夷王挑牙者甚衆即生畨祁尚等數千人咸輸誠納欵爭赴畨厰以聽約束駸駸乎用夏變夷之道矣况長江天險扼塞有餘而兵馬強衆緩急可恃得人而守非久安長治之術耶文縣古隂平道元置文州國初改縣設守禦千戶所編戶三里塞堡有十諸畨環聚大小三十八族耕牧為業文臣武將並列於一城之間馬步官軍分守於要害之地經制亦甚當矣以故諸畨賔順罔敢携二封疆不擾上下晏然但僻居西秦之末民俗半雜於羌氐執拗椎魯化導為難隴蜀分界之區亡命礦盜濳聚不逞思患預防之計竊勿以內地易治忽藪澤之姦萌焉總論按蘭州重地行都司八鎮自此出宋張叔夜以天都山為守界我朝守在定火城今亦棄去止就河外作金城關關外即倚山較前易守榆林地乏耕種所藉河套自套失於𢎞治正德間數千里膏腴盡非所有榆林由是失所養榆林無險可據左右大同寧夏勢非所及雖設迤左𤇺燉五十六迤右𤇺燉九十二而軍食兩艱諸邊鎮惟榆林最忠義每懷復套之憤志以時移漸委無事延綏邊西抵三山饒陽界與固原相接榆林鎮成而延綏警備緩矣甘肅鎮自蘭州起至嘉峪關幾二千里一線綿延戍邊縻費止欲隔絶羌人以息其爭其謂斷胸奴右臂非説之盡乃是宇宙一體之心而今無有知者莊浪衛屬堡一十一漢土馬步并召募官軍共一萬八百五十六員名馬共三千四百六十七匹糧料二萬三千九百一十三石民運糧銀三萬一千九百九十一兩二錢兼支銀四千四百四兩四錢鹽糧一萬四千四百四十九石三斗鹽糧銀四千六百五十兩草二十八萬六千一百九十四束布一萬一千一百八匹棉花四千一百六十五斤西寧衛屬所一堡五馬步并召募官軍八千五百員名馬并新買共四千七十二匹糧料三萬三千四百一石有零鹽糧五千三十八石四斗草三十七萬二千七百九十一束年例銀二萬五千四百五十兩七錢布一萬九千六百五十四匹棉花七千四百六十四斤涼州衛屬所一堡八馬步官軍一萬八百五十八員名馬二千五百二匹糧料四萬五千五百二十三石七斗四升民運本折色糧銀四萬一千三百九兩三錢八分鹽糧一萬六千四百八十三石九斗二升草四十一萬五千一百八十六束年例銀二萬兩兼支銀三十三兩三錢七分布一萬九千九百六十四匹棉花八千四十五斤鎮畨衛屬堡二馬步官軍四千九員名馬一千四百七匹糧料七千四百三十八石有零民運本折色糧銀五千二百一十二兩鹽糧一萬三千四百二十一石一斗草一十八萬九千九十七束布九千八百一十六匹棉花三千七百一十五斤永昌衛屬堡五馬步官軍八百三十二員名馬一千三百三十九匹糧料一萬四千八百三十九石民運本折色糧銀一萬三千二百二十九兩四錢五分鹽糧一萬三千六百一石三斗草一十三萬五千八百一十七束布八千四百零四匹棉花三千一百五十一斤五涼沿革附晉時張軌據河西今甘州為前涼吕光繼之為後涼李皓遷酒泉今之肅州又遷沙州去肅州八百里今沒于狄號西涼沮渠蒙遜據張掖今鎮畨衛號北涼秃髮烏孤據姑臧今之西寧號南涼唐吕溫詩樓髙望五涼杜氏通典論涼州云地勢之險可以自保于一隅財賦之殷可以無求於中國故五涼相繼與五胡角立中州人士避難者多往依之蓋其風土之可樂如此唐韋蟾詩曰賀蘭山下果園成塞北江南舊有名稱其為塞北之江南以此按涼州各衛即五涼故地在漢為武威郡及甘肅一帶即漢張掖酒泉燉煌數郡形勝峻險風氣強徑且多産良馬而土之所宜自足供贍一方不必取辦中國故五涼與時會相終始元昊亦與宋相頡頏何嘗假給中土之餉餽哉自唐末失之吐畨至我朝始復其故地置各衛以相聨屬獨燉煌在嘉峪關外棄與西畨已失䇿矣議者且謂甘肅僻逺餽運殊艱宜併棄之以保近塞豈特失險阻蹙疆土以羌與虜續胸奴之右臂哉曽不思五涼與元昊其所以足國強兵者必有在也即洮河金蘭內地率多遺羌雜居果得良牧專責撫循庶乎生聚漸繁畜牧漸盛藉其人足以捍邊廣其屯種足以實邊時其牧畜亦足資軍用也何也昔趙充國之屯田王毛仲之廄牧迄今猶頌之茍曰不然地獨非五涼元昊之舊而充國毛仲何人哉或曰榆林固原花馬池當盡屬之總督莫若移陜西撫院於臨洮并撫綏河西各衛是亦一䇿也莊浪要害紅城當莊浪西寧之中可使䇿應而苦水黑山是其外護鎮畨為涼州永昌門戶六埧紅沙又鎮畨要害而長草湖一帶尤為入寇之衝其地雖有險可據但在涼州數百里之外四靣受敵尤極孤危洮州鎮屬衛一關五寨二堡二十四馬步官軍六千一百七十五員名新舊召選舍人土兵民夫八百名馬三千七百一十六匹各處民運糧三萬五千九百六石有零草八千七百五十九束民屯糧三千九百四十九石有零布八千四百匹棉花三千三百斤岷州鎮屬衛一所三寨七十堡八馬步官軍一萬四千九百三十八員名召募民壯四百四十五名馬二千一百九十二匹各處民運糧折銀二萬九千五百八十七兩三錢三分額徵民屯糧二萬八千五百九十四石有零布三萬七千七百五十一匹棉花一千三百二十二斤草二萬三千一百九十束河州鎮屬衛一所一關二十四堡三馬步官軍九千二百一十七員名新舊召募壯丁二千二百九十二名馬二千三百六十四匹各處民運糧一萬八千六百八十石草六萬一千九百六十束本處民屯糧二萬九千八百七十五石屯草折糧一千六百七十七石本色鹽糧三千三百六十石折色鹽銀二千一十二兩五錢經略河西河西地方寒苦人不樂居新舊軍人率多逃亡除莊浪西寧路多難防其甘州涼鎮山丹肅州高臺鎮夷古浪各衛所逃軍不由古路浪關不能東出自來惟用武職千百戶等官把截凡有逃亡盡被賣放此後或添設委廉謹文職一員給與巡撫衙門半印號簿不拘公私商旅行人查對號單相同方許過關如有賣放即令抵罪其西寧莊浪逃軍行令金城關河州地方經該官員嚴加巡邏通行潼關以西巡司衙門加意盤詰等因本部議得甘肅地方孤懸河外委的極邊苦寒軍士逃亡數多相應議處覆奉欽依移咨真定甘肅各巡撫都御史嚴行潼關金城關河州等處地方經該官員嚴加把守盤詰審係逃軍即便取供解回仍行總制撫按等官查勘古浪關應否添設文職官員守關盤詰如果有益地方别無窒礙徑自會議停當具奏施行若於事體人情有礙宜從寢閣河西地方荒落居民鮮少牛羊不多畨虜往來虜掠不便近聞屯田人畜遍野若非烽火嚴明城堡近便則耕牧人畜徒爾資寇當於要害處所設立墩臺每處撥立壯軍五名給與器械雞犬遇賊入冦先令放炮即令放火賊少則單炮單火賊衆則雙火雙炮大舉入冦則火炮不絶如此則未入境人畜已收耕牧無虞人自安生仍查莊浪東北岡子坂井廢墩應否復立以瞭望賊出沒又當量地逺近多寡築城蓋房以居屯軍給與火炮器械馬匹以便防守其沿途鋪舍墩堡務要增修完固以便商旅再查涼州扒沙山口地方應否立城差官防守以廣屯田等因本部覆議查得先該總制尚書唐題該本部會議得甘肅地方東西相去二千餘里若因地肥饒所在五里或十里築堡一座堡制規模可容居人二三百家每堡近門築墩以便瞭望每堡四靣離堡三尺餘外築攔馬墻髙一丈中挑墩堡深一丈濶五尺內築子母墻髙五尺厚三尺以避賊勢自西而東肅州起工堡大路兩旁中設井一眼或近水去處其築打堡墩事宜當模倣充國遺意合用稍把繩木一應器具為之備堡內居止造房木植聽本處巡撫官會同屯政官勘酌地方賊情緩急量撥官軍架梁防護摘撥官軍雪山採辦查撥屯軍拽送一堡完成一堡起工若人力有餘器具完偹聽其數堡並舉亦無妨礙要在因地逺近以築堡因堡大小以召人不必拘定某處築幾堡三五年間屯堡充實兵食皆足然後買馬給丁等因已經通行欽遵去後本官具奏前因查與前議大略相同其稱莊浪東北岡子坂井廢墩應否復立涼州扒沙山口地方應否立城差官防守但事在彼中合行總制及撫按等將築墩堡事宜各督屬謀慮盡心舉行務臻實效仍查勘岡子坂井廢墩即今設立扒沙山口地方應否立城防守務要同心協力查出如果有益地方便於屯政從長會議徑自具奏甘肅甘肅即漢之河西四郡武帝所開以斷胸奴右臂者蓋自蘭州為金城郡過河而西歷紅城子莊浪鎮羌古浪六百餘里至涼州為漢武威郡涼州之西歷永昌山丹四百餘里至甘州為漢張掖郡甘州之西歷髙臺鎮夷四百餘里至肅州為漢酒泉郡肅州西七十里出嘉峪關為沙瓜赤斤苦峪以至哈密等處則皆漢燉煌郡地也與前四郡皆𨽻甘肅洪武五年宋國公馮勝下河西乃以嘉峪關為限遂棄燉煌焉自莊浪岐而南三百餘里為西寧衛古曰湟中自涼州岐而北三百餘里為鎮畨衛古曰姑臧此河西地形之大略也夫以一線之路孤懸幾二千里西控西域南隔羌戎北遮沙漠經制長䇿自古已難山勢曠逺中間可以設險之處固有而難以設險之處居多洪武九年設甘州等五衛于張掖設肅州衛于酒泉設西寧衛于湟中又設鎮畨莊浪二衛又于金城設蘭州衛皆置將屯兵拒守嘗考之漢宣帝命趙充國將兵討羌充國奏曰願留步士萬人屯田部曲相保為塹壘木樵校聨不絶便兵戍飭鬬具謹烽火通勢併力以逸待勞兵之利者也今日守甘肅之臣惟以充國為師法得矣木樵髙樓也况兹凋敝之餘非豪傑任事之臣其孰能為之且哈密甘肅藩籬諸畨領袖成化以來至于土魯畨恢復之議至勤纍朝顧在今日有難者二有當緩者四不可例以往日何也哈密纍敗之餘敗亡略盡縱令復國豈能固守此一難也恢復之計曉諭不從必煩聲討虛喝謾恐難以震動試言今日可復能為深入之事乎此二難也往建哈密以其能制諸夷為藩蔽也今不能矣立之何益是故哈密昔為要區今為散地盛衰之會殊強弱之形異當緩一也哈密轉徙之衆已長子孫身事讐國遺我以難是彼無共天之義我有同舟之急此何為乎當緩二也纍朝以哈密之故勞費萬狀議論無已是以夷人視之為竒貨以為中國一日不可無哈密也今日索金幣明日求進貢今日送金印明日還城池假令自今不復言哈密恢復事彼當何為乎以為將遂有哈密也則豈待中國棄之而後取之以為不能則哈密猶舊也况閉關絶貢可以制諸夷之命乎當緩三也齊勤蒙古安定察遜等衛亦皆中國藩蔽齊勤等衛破于土畨安定等衛破于海賊何不聞為彼恢復而切切于哈密乎當緩四也審于六者之間則哈密可復不可復宜復不宜復圖機之士必當破衆説而建長䇿矣至于亦不刺者迤北逋寇盤據西海吞并屬畨為西南患往歲已許內附尋因其敗弱而棄之頗為失計何也甘肅之患北兵倐去倐來南畨坐守之夷耳惟土魯畨自兩犯甘肅以來纍肆荼毒漸不可長若收海上之兵置之哈密近境結以恩德西制土畨北衛喇特此千載一時也倘有成績即令職西域之貢何所不可議者祗恐别起事端而不思逺地無患祗云人心叵測而不知邉兵易用視今日自據西海散處河岷何如邪矧以虛縻得實用借虜地為平城得失利害不較可知又今河西屯田敝矣二千里內計丁一萬七千耳防守不設耕種難也纍遭殘破生聚難也朘削無已休養難也是故人益貧口益耗食益歉兵益弱而屯田益不興矣近日差官添築新堡廣招佃種似矣豈有舊堡未充而便能實新堡者乎豈有不為防守而敢逺耕者乎豈有將不休養而人得生聚者乎又譬之家政農桑薪水賔客祭祀之類動必相連豈有餘事皆廢而一事獨舉者乎是故有將而後有兵有兵而後有人有人而後有土有土而後有財而後兵益振屯益舉矣他如李淮之議曰欲將見堡量給以馬無事令其瞭望而耕耘有事得以聨絡而馳逐拯溺救焚此其近䇿矣蘭州舊有管糧郎中而不司支放與宣大事體少異已失事宜或又令其歷在催徵不免逺涉若以省參一官專駐蘭州以督邊課如近時山東河南經運事例而移即中於甘州如宣大例則稽察歸于户部催科便於本省是或一道也西寧控十三畨族四堡六千戶所近又益以海寇之擾亦要地矣不令屬莊浪而令設參將易瓚之議是也若我太宗以夷治夷建寺立僧之法蓋有深意今有講其故者乎西域之貢畨文動數百紙詐冒相仍騷擾無益若給以年限勒以名數庶可久可繼之道也嗚呼病于塞而始僨傷于困而思起今日之甘肅豈一事邪舉其大者就所見緩急而已甘州衛屬堡八馬步官軍三萬三千八百九十四員名馬八千七百五十一匹糧料六萬五千七百九十七石有零民運本折糧布銀一十萬七千三百九十五兩一錢二分鹽糧二萬六千八百一十四石八斗草一百一十萬一千四百八十九束例銀四萬兩山丹衛屬所一堡八馬步官軍八千五百八十二員名馬二千七百七十八匹糧料一萬七千五百一十三石六斗民運本折糧布銀一萬二千五百三十二兩五錢鹽糧四千九百三十二石草三十六萬四千一百七十束肅州衛屬所一關一堡四馬步官軍一萬一千二百六十七員名馬四千六百五十四匹屯糧料二萬七千五百九十六石有零鹽糧一萬六千九百四十石有零民運銀一萬三千二百二十一兩草五十三萬四千七百八十七束折色草銀一百七十九兩五錢布二萬一千三百二十二匹棉花八千四百八十八斤毛襖五百六十二領甘肅事宜甘州古張掖郡肅州古酒泉郡極西北重鎮北倚合黎山山丹界甘肅之中焉支山在山丹東南五十里祁連山在酒泉張掖南連亘一帶古胸奴失此地嘗歌曰亡我祁連使我六畜不蕃亡我焉支使我婦女無姿故本朝設行都司於甘州而以肅州為都司門庭肅州城西六十里為嘉峪闕乃羌人要塗關外即沙州衛古三危山在焉有羈縻六鎮古燉煌地土官居之西北有鎮夷所尤孤危其地雖險可據但溥於鹽利華夷賴之恐為必爭之地甘肅鎮自蘭州城起至嘉峪關幾二千里一線綿延孤立西控吐蕃北隔沙漠南蔽羌戎歲縻邊費警栗日持茍非宇宙一體之心自認為王者不容巳之事必輒委棄而弗之理也往時恃畨為藩彼猶有忌今大被殘戮率為所收臂指益多牙爪加利矣重以逋回寄寓所在成聚一線厄途譬諸喉咽有物為梗喘息弗繼矣故核實政以屯田修農事以積榖相泉脈而鑿井不可一夕弗講也桂文襄奏議曰甘肅之地比之他邊不同極為孤懸自蘭州過河至肅州一千四百里中間止有一線之路北為沙漠南為畨子聲息時時有之其近城堡之地乃敢耕種離城堡逺者則棄之恐北部猝至搶虜人畜雖云春種秋收之時有人馬護之亦虛文耳其地專倚水利近時甚微不能澆溉説者以為勢豪占奪雖不占奪其利亦微不可全歸咎於此也自正德初年至今雨㿩不調通不收成十室九空人人飢色又加以西夷北敵劫殺數次客兵土兵不時劄駐此地方所以日削月弱以至今日也甘肅邊政總説甘肅一鎮乃漢武所開河西四郡地隔絶羌人屏翰秦隴亦甚重矣國家略地西陲止取武威張掖酒泉而燉煌外捐髙昌北割其土宇廣狹已非漢唐之舊雖姑臧湟中岐分南北而鎮羌硤石路僅一線咽喉易梗襟帶為踈其機宜不艱巨哉國初置將屯兵稍次諸鎮而哈密安定諸衛環拱西南生熟諸羌布滿山谷其藩籬亦厚矣且涼永之北地多不毛故兵患稍稀自亦不刺竄居海上吞食羌戎始為厲階當時經畫既詳敵旋收復蓋自嘉靖辛酉以後幾復晏然矣貢欵以來中外熙如寰區樂業誠疆場息肩之時也顧老酋羶恱諸羌規圖兼併遂駕言迎佛狡焉啓疆彼既遺其種類我復樹其巢穴以致居者虎負行者梟張通套諸敵錯居四郡之間無復中外之隔守禦勞費撫犒紛出居恆已為不支唯是狼子野心終叵測也一旦寒盟患生肘腋藩籬既盡勢在剝膚譬之厝火未炎而燎原可待經營制禦豈得與諸邊同軌哉及查該鎮額兵七萬有竒今止四萬餘耳説者欲補實逃亡增益戍卒而不知糧餉不繼戰守何禆無已則簡練在伍之兵聨束諸羌之部虛聲洞喝隂移海上之王庭多指羈縻明遏西行之溪徑然須責成任事之臣寬省拘聨之法鼓舞驍健培養黔黎所謂未雨綢繆無溺衣𥜗庶思患預防之畫與甘肅各衛莊浪漢允吾舊地南接金城北抵安逺邊之東則為黑山西北則黃羊等川為唐交河故壤璸都諸部自欵貢始駐牧焉唯是強敵鱗集諸畨蟻聚中通一線之途是為內徑乃四郡襟喉要地也風土寒涼五榖不産鎮羌沙井之間水草俱限於邊外樵採為難惟連城大通等堡比鄰湟中平原沃野宛然屯田之鄉然皆魯氏部落所居堡寨未修平多營窟茍責成而整飭之亦可以資犄角之勢本衛屯稅僅八千增以鹽糧民運并發內帑量入為出止可供無事之費然官軍二千六百近增三百加之土軍一千則恃以待敵者兵可稱足糧餉其艱矣乎噫紅城之南逼臨古鄯敵潰邊而入馳不崇朝氷凍河堅無論湟中三川而蘭河內地為必窺之境幸而守盟則此地獨安蓋土宇無幾耳敵人生心則塞咽喉以困甘肅出精騎以掠金城莊浪其先被兵焉未事先防之慮不可不深長思也西寧古湟中地以湟水經焉其境四山環帶中阻三峽亦形勝之區也衛城建當三川之間勢取控制而西北地形漫衍守望寥濶生熟諸畨布滿山谷無事為我藩籬有警亦能捍禦顧貪狠嗜利昧於逺圖自虜牧海上往往竊掠生事起釁無異盜邊之害西南當青海門戶為敵必窺歲時問遺互市調遣實孔道焉供應繁費士馬疲羸且當路要衝兵力寡弱濳消覬覦顯示周防非今日之急務乎碾伯當二峽之間四山峻列西北一線之路與莊浪通山徑厄阻勢難飛度敵不出湟塞之北循山而東則碾伯可髙枕而卧矣獨北山諸羌為先零故種控弦飲馬頗肆慿陵近歲以來往往敗弱分地保疆業已懾服此外無他虞焉古鄯披山帶河川谷平錯土漢雜居村落相望蓋别一疆域也往時敵自黑山而馳穿莊浪北塞逾紅城渡河則山川為必窺之地欵貢以來此衝遂塞諸羌羈縻成俗逺邇晏然但土族繁衍不通禮教且路逺城市統攝難周強者蔑紀操戈弱者含寃受僇事經官府則轉相疑畏吏胥為姦厮徒考索一聞符牒如赴市曹往往自經溝瀆殆無虛日事關重大則逸入林莽莫可誰何以一城守武臣欲分理僻逺雜夷之衆必不能矣設官分職移易夷風今日之所最急焉但時詘舉贏時論所忌然殊方絶壤政教疏濶以千萬為羣貪戾之性恣其獷悍隱憂且深赤子弄兵不可不長慮之也蓋嘗考河湟之故墟遡海陬之多事古今殊迹略亦可陳國家經略河西四郡未復髙昌北壘與敵共之則肩背既踈門庭漸逼獨敵患未甚我境亦安湟中一陲無異內地此一時也正德初額布勒以得罪酋長扣關請降倉卒失圖遂致闌入安定諸衛破亡一空青海之間始為敵有此首禍也又一時也唯時謀臣䇿士不遺餘力遣將出兵共圖殄滅敵兵倐忽往來我亦師徒踣頓巳己以後迤北數侵雖疆場擾攘而海上甌脫漸徙歸巢蓋自已未諳達之犯餘種落且盡矣此又一時也老酋悔禍奉貢稱藩玉門以東悉偃兵革溪壑無厭狡焉啓疆本以併吞之謀駕言徼佛之利擁衆西牧再據海陬我稍疑其非誠彼詭託於衛喇特上下相信墮彼術中建寺請額遂為敵創一不拔之基吁計亦左矣即今種類已繁巢穴又固來者日衆去者無期無論湟中剝膚而關隴蜀漢之間自是又生一敵國經制者似不得以夷狄相吞長委之誠使後之論今無遺恨於額布勒之役西陲其有瘳乎古浪唐和戎縣地也正統三年設守禦千戶所蓋為全涼門戶耳西南則石頭等溝諸畨羅列東北則黃羊諸川衆敵環窺彼出此沒交相為患最難控制然惟本地夾之柏林之山沮以古浪之水有險可據且黑松安逺各該遊擊都司一員道路非遙兵馬齊集一聞警報刻期應援亦足自守顧孤城斗絶敵犯武威實稱孔道扼吭拊背平時不可不先為之備然風土磽寒人性剛勇以騎射為能以孳牧為業野處岩居有前元之故俗鼓舞敵愾蓋不患無兵焉涼州本漢武威郡地廣民衆村寨壤接良田沃野生植殷繁溫萃之景不輟於四時有內地之風焉故四郡稱巨者涼州為最額設副總兵一員統兵以守黑松則設遊擊居中調度應援於兩路之間安逺則駐都司依限更畨防禦於一線之地且西北有鎮畨永昌為之屏蔽東南有古浪西寧為之障隘蓋重鎮腹心也敵難卒入我亦易守往自成化間防禦少踈連遭劫掠居民逃匿始稱多事且內設營伍委而不守如暖泉紅水扒沙盡為棄地東連莊浪速罕等堡守望隔絶則賀蘭以西鎮畨以北漢武故地悉甌脫焉而中固蘭靖莊涼之間始無安枕之時良可恨也尋討故事總督彭澤建議恢復誠安邊至計竟未舉行豈非以棄地不可卒復復之更難為守乎惟經國者考焉鎮番古姑臧縣地岐出武威二百里極臨窮塞蓋涼永之藩籬也始設守備一員領之繼改參將以壯彈壓列堡屯戍防禦亦嚴但其地沙漠平漫無山溪之隔馳驟易逞完壁為難東接寧夏賀蘭之王庭南鄰氷溝雪山之敵界前接山丹後通甘鎮要害孤懸西鎮為最且本城之北地多黃沙一遇狂風吹擁髙於雉堞軍士負插挖運月無虛日殆不減於征戍之苦近挑壕築墻雖為障蔽而力役不息終為地方之纍但欵貢以來虜志多在山南往來青海則莊浪永昌近為孔道而鎮番一隅烽燧晏然疆場寧謐不無今昔之異勢焉永昌漢鸞烏縣也國初建衛設守備控制畨夷成化間始為遊擊以備應援萬厯初罷遊擊為參將官秩愈崇則聲勢愈重然此地東西控帶南北犄角悉為重地而原隰之廣不啻千里蓋武威之上遊焉顧地形平衍無險可恃北有石門西有者撤口乃海套必經之路山南黃城兒則又前元遺址水甘草茂牧養畨息久為諸處孳牧之所寧逺孑立塞外與敵為鄰且自和欵以來海上多故敵馬交馳殆無虛日拒之則懼啓釁端容之則慮生他變其在今日伐謀之䇿備預為先制馭之機練兵為上懷永圖者不可不加意焉山丹周秦為月氐地漢置刪丹縣國初置衛設守備以控制之其地川原平衍守衛既屬難周尺籍半空兵馬尤為單弱但西去鎮城百里而近重兵相鄰聲援自易東去石硤八十餘里宛然天險形勢可恃誠重鎮之襟喉也惜地里髙寒又多沙磧市無土著野無田疇故設都司二員更番備禦而所統官軍皆西鳯平漢之民素非慣戰雖充行伍徒具虛名上班則驅之雲屯下班則分之星散將視客舍多不樂居兵憚蕭條亦無固志平時守禦尚難臨敵折衝安望議者欲以班軍糧餉另募壯丁再設顓官時加訓練則人即為家家易為守官專其地地可輯寧治邊先圖或有在於是歟甘州漢張掖郡地山川盤固形勝交合河西中會之區也國初開邊置伍設行都司為之總轄兼命文武重臣為之鎮撫與夫屯田馬政諸執事皆備焉所以制馭番虜屏翰秦隴者計甚周已然山川廣濶邊多要衝考之額兵二萬五千今存者止十四耳守望不稱勞費哉年來置將屯兵分扼形勝故洪水之設遊擊坐制南山平川之立守備專防北塞則敵之出入去來蓋前後俱防首尾相應且東築險隘西創邊垣區畫詳明備禦嚴密巍然重鎮不啻虎豹在山矣顧士卒驕惰積於因循操練稍勤怨讐恣起操戈反刃甘蹈無將此不特疾視其長上已也駕馭拊循銷弭孚格以隂釋其隱憂而必折其姦宄非今日之急務乎髙臺漢樂涫縣地南畨北敵防禦頗艱萬厯間易守備而設遊擊可知時勢之難矣然白城之山顧於前黑河之水繞於後川原平曠屯田用武莫善於斯顧自回夷殘破於嘉靖三年之後徑敵猾畨暴掠無厭遂致沿山紅崖等堡一望蕭然幾失所守自欵和以來邊境少寧人民占籍漸開可耕之田坐收稼穡之利地方繁富頓異往昔矣然當兩處之衝者則六壩朱家灣尤甚焉水塘湖係我內地而敵每盤竊往者一創套衆業已奪其方張之氣微杜漸固我腹心非後事者所當兢兢乎鎮夷漢酒泉地隋唐五代而宋未有建置止沙磧而已自國家收復之後開設鎮夷守禦所建城池置屯戍以遏兩處之衝天順間河水浸決城廓半已改易舊基創立新制經營肇造屹然稱干城矣但地里平衍控列黑河之外極當敵衝始設操守繼設守備兹立遊擊防禦亦漸嚴矣而兵僅千餘單弱如故且上之髙臺百有餘里猶可聲援下之肅州則二百里而遙雖在封內緩急不繼孤懸重地懷安攘者不可不留意焉肅州漢酒泉郡地幅􅊷之廣不啻千里東接張掖五百里僅通一線之路西抵嘉峪七十里則燉煌棄地在焉海衆在南衛喇特土魯畨在西北諸夷環聚腹背肘掖悉皆敵國孤懸重地莫此為甚往時經略專在哈密蓋恐其撤我藩阻絶貢道耳今時異勢殊西事業已寧謐獨欵敵往來兹地無異甌脫非窺截貢夷則剽掠畨族久而不已所謂隔越西域蹂躪封疆其憂豈在土魯畨下哉且徼塞之間近有流牧之衆别無部長數數盜邊似宜議剿以杜蠶食嗟嗟西望嘉峪則故壘猶存北眺西州而輿圖已逺疆場既促控制為難流聚已繁羣謀不逞豺狼同室能伏爪牙齒嘻馮陵勢所必至實武備以壯干城固邊垣以分內外却流人以開貢道扼要害以樹聲援此四郡共憂酒泉其尤急乎慮方隅者奈何不早圖之總論甘肅以西畨戎相界比額布勒阿勒古斯竄居西海乃西寧西境西寧衛地方畨帳凡千餘一十三大族畨人漸以南徙中國茶馬之利大為減矣西事畫餘竊見甘肅一鎮星懸河外三靣瀕邊守望勞費兼以糧餉不充士馬單弱如怯薄之人家鮮富厚外剝風霜內嬰痞塞此扁鵲倉公望而返走者也嘗揆時度勢考古證今有四失焉一曰形勢之未全也考之甘肅即漢武所開河西四郡洪武五年宋國公馮勝將兵至驅逐前元遂以次設甘州等衛所今按圖牒自金城渡河西歷紅城子莊浪鎮六百里為武威郡地涼州之西歷永昌山丹四百里至甘州為張掖郡地甘州之西歷髙臺鎮夷四百里至肅州為酒泉郡地肅州西出嘉峪為沙瓜齊勤苦峪至哈密皆燉煌郡地也今以嘉峪為限外立齊勤等四衛取藩屏焉自莊浪岐而南三百餘里為西寧涼州岐而北二百餘里為鎮畨古湟中姑臧地而西寧西北又即西戎蒙古别種因地授官為罕都等四衛此河西形勢之大較也按漢書張騫謂烏孫本與月氐共在燉煌欲招令東居故地以斷胸奴右臂烏孫以地逺不欲從始置燉煌郡史稱隔絶南羌月氐單于失援即此是也武帝征和中桑𢎞羊與丞相御史奏輪臺以東接枝渠黎皆故國地溫和有溉田募壯健詣田所為本業稍築列亭連城以威西國竟不果行至昭帝始用前議元帝復戊巳二校尉屯田於車師前王庭唐遂置西州及交河等縣按其地今賀蘭西北直抵鎮畨又西北跨伊吾故境有漢武髙昌舊壘在焉鎮羌西北有黃羊川口內為扒沙地多礦利美水草虜住牧往來其間以透西海即棄壤也夫古稱河西之盛控制羌胡今按方輿什得五六耳其遮絶環固業與敵共之誠由嘉峪之外馳騁而南已非我兵力所及况鎮羌硤口南疆北塞逺不數武近才跬步攻當塞反扼我吭又安能制御南牧之敵哉所謂形勢之弱一失也二曰啓疆之失圖也國初置內屬畨夷為罕都察遜安定鄂端等衛北連哈密南隔諸羌河首鹽池大稱藩翰自正德四年額布勒以獲罪酋長逃遁而西乞地內附我倉卒無以為應遂潰邊掠內地入西海破安定等衛諸畨散亡因據其地南牧之漸此實厲階當時經略諸臣如彭澤金獻民楊一清王憲王瓊趙載唐龍等為剿為撫不遺餘畫然竟不得其要領議者至欲收哈密結以恩德西制土畨北制衛拉特不知豺狼同室能保不嚙嘻藩籬坐守之人乎然亦不得已之䇿也幸逋冦為故主收復所遺無幾尋討故事嘉靖四年套衆自涼永大掠而入初收海冦也六年北敵阿勒古斯渡河由賀蘭山外入莊浪近境住牧八年入冦遂由鎮羌入西海與額布勒結親而回二十年諳達入嘉峪由鎮夷髙臺犯甘州西門再收海冦也二十三年二月套衆襲髙臺八埧十一月自西海歸套三收海冦也二十五年犯涼州殺遊擊王勳四收海冦也是浚海冦漸弱乞降悔罪我亦因其敗弱而棄之北敵别部亦無在海上住牧者三十八年諳達復由鎮羌入西海一犯涼永一犯西寧遂欲久住至四十年以中濕腫足而歸此未欵之先北敵據海往來剽掠之擾但我扼其前畨伺其隙而當事諸臣重以腹心憂之是以彼誠不能安居無恐即海冦所遺且悉收之而東矣及和欵以來諳逹自為迎佛之舉時論以為厭兵及戀住不歸又架言復讐衛喇特我信而不疑彼乃建寺請額始遺置種類封植巢穴我曽不得以故壤别藩籬焉是昔也驅之今也餌之昔也慮門庭之冦今也忘肘腋之虞所謂啓疆之失又一失也三曰藩籬之漸撤也國家列鎮河西止防北敵為重其南番族部以茶馬羈縻之二百年來等於編戶且嘉峪之外涼永之北數百里無水草虜雖渡河踏氷而來不過倐忽出沒不能持久及諳達有四海之行彼以新受國恩約束惟謹臨邊畨漢居民真無犬吠之驚我既信其無他彼因遺置種類巢穴已定驅逐為難狼子野心漸生吞噬今日以盜馬名掠某畨明日以垂馬名掠某族方虜掠而即講和既講和而即徵求已徵求而又虜掠生畨不勝蠶食遂及熟畨熟畨不勝慿陵因擾內地此不數十年諸畨破亡略盡不特失我歲額中馬絶塞孤垂將誰為之保疆乎所謂藩籬漸撤此又一失也四曰兼併之可虞也方諳達假道而西此彼往年經由舊轍今復為我受命之臣蓋難為拒絶矣及建寺請額遷延海上有謂老酋衰年厭兵崇信佛教者既失之其託言衛喇特往年擊殺諸酋長將規圖而報復焉此亦不知諳達者也海上水甘草茂漢初為胸奴故壤武帝始拓地置郡胸奴每懷思之至有祁連焉支之歌千古之下安知彼無興復故物之志乎但老酋新受封貢又當垂死之年勢不能據此他圖遂遺置部落及子姪而去平居則為三穴之固有事則總諸部之雄西南蠻夷自滇蜀外徼及武都金城地方數千里氐羌君長悉可役屬近有傳羌中語曰指南來山川此我家舊疆原非漢土其搶虜畨族誘之曰爾不勝其擾不如拔帳歸我諸畨感戴國恩不忍棄去有言之泣下者可以知其謀矣今甘肅西寧之畨其附屬敵部者十之三其貧窮無聊依敵畜牧在扒沙等川可數千餘人其歲應徵求竭畜産而獻方物者十之九獨河以南隔於迫脅殘破服從尚少今漸圖渡河矣敵情豈遂已乎倘有隂山雄傑之鮮卑安知不為強國耶吐畨欽陵欲唐拔去十姓四鎮至要郭元振曰烏江黃河關源阻奧多厲毒唐必不能入我欲得之非窺諸部也甘涼距積石道二千里其廣不過數百里我若出張掖玉門使大國春不耕秋不穫不五六年可斷其右臂今疆宇廣狹有近至數步者視唐逺甚敵進據腹心駸有吐蕃之勢尤易梗塞此不可為殷鑒乎數年之後敵若生心無論諸蕃關隴蜀漢且剝膚矣所謂兼併可虞此又一失也河西有此四失視諸邊利害豈止徑庭即欲振厲因循改易轍迹誠不知計之所出也然於難處之中不得已為曲處之術其得亦有四焉一曰分地之宜嚴也敵雖牧畜逐水草然亦各有定居今既稱藩保塞立有互市之所乃令其聚衆西牧如羈縻何流人歸去之後必明示約束各守境土倘鄰國有征伐師旅之事必行由敵地不得匹馬踐我內土如云迎送佛僧焚修香火則數十騎足矣授餐紹介我任其勞無用多人何生得失茍襲故智我必併力堵截革其市賞虜果渝盟不妨破格議處調集兵食責成同心任事之臣不惑訛傳蜚語之誤使仗義執言伸其撻伐然名王酋長受國恩且三世矣豈為一二支部而反靣耶必不然矣首禍者終亦曲膝請命如往年宣府獨石之役互有殺傷岱青竟不助一臂之力念兹同氣我因得罰服而竣事蓋明鑒也庶幾一䇿也二曰共事之宜力也查得流來諸部有東部有套部東部屬宣大山西套部屬榆林寧夏總之則兩督府也如各部回巢再有舉動或執拗恃衆而盤據不歸必共宣德意張弛操縱如馴擾虎豹服我穽檻或事機未諧勢必用威尤當異地同心不遺餘畫在本鎮則詰戎伐暴以張皇無赦之猷在别鎮則執訊獲醜以牽繫反顧之念進退狼狽彼亦不敢狂逞茍以起釁自慮首鼠兩端不關同室之爭逺迹解紛之舉使狡焉恣其無忌憚之心似非河西一鎮之所能圖也是在廟堂之上一申明而聨束之是又一䇿也三曰伐謀之宜預也夫諸部西來俱言仇殺衛喇特且云候套部濟農及東部順義王齊至方大舉而西自去冬以來聞齊哩克急於襲封事完則以送佛僧為名即來西海近聞虜使傳説春深草發刻期起行此雖道路流言而情形近的問之土人渡河西南為松荗諸畨向稱殷富虜垂涎非一日矣先來諸酋日以渡河為事率遷延不果如歹酋者又嗷嗷待哺之衆誠不知彼計所出今聞齊哩克使傳諭海上諸酋不得先行過河搶掠蓋約之既來同舉耳信若此則河西寧有安枕時乎無論已來者驕橫難制而方來者其憂益叵測也齊哩克偕酋婦寵受封爵方藉鈐束部落以安邊境豈可信其稱兵逺出伐我外藩具宣布國恩阻其狡計又在宣大督撫專主之耳彼誠寢其西來之念則先事諸酋亦難戀戀住海上我因幹旋携二之是又一䇿也四曰夷兵之宜倡也頃自諳達迎佛之後據海諸部日以侵擾諸番為事及流人再來暴掠益甚諸畨救死扶傷無所控訴其間豈無黠傑豪舉之長與虜一相當者緣敵以中國為恃番遂不敢挑釁以犯漢法其積憤深怨非一日矣頃敵犯肅州偶建募畨之議五種之夷超距而從戎者至二千人其西寧南北諸畨數倍肅州歲首聞警諸畨頭目方來朝會時以保守屯聚掩襲歸途為諭一時歡聲若雷無不願效死力者據諸畨所稱各族控弦荷戈之兵衆可萬人即敵來無為也敵果不來此語亦傳聞彼中敵猜疑遲回者久之誠以諸畨委敵我為懸示賞格且聨束附近族部使互相聲援總聽指顧又隂傳諭敵中畨且羣謀不逞我收恫喝相持之功泯其首事倡率之迹以夷禦夷是又一䇿也是四䇿者人人能言之非決勝萬全之畫但非此則他無所施矣况方堅欵貢我不能張膽而起厲階彼讐比鄰我難以稱兵而衛外畨補偏救敝如此而已矣然非蚤為之圖終難善後如疾已在血脈腸胃間即針石酒醪所可及過此恐深將不能理惟經制者留意焉延綏所屬并馬市部落數目一枝濟農布色圖等兄弟四人一枝明安台吉三千有餘一枝濟農叔父東哨章圗哩台吉二千七百餘一枝本巴實勒台吉二千餘一枝尼鼎台吉兄弟三人一千六百餘一枝達爾罕台吉六百餘寧夏所屬賣馬部落一枝切近黃台吉大男等兄弟七人四千餘一枝切近黃台吉姪男莽蘇爾台吉二千餘一枝松山璸都台吉五千餘一枝西實喇克圖台吉四千餘久在西海住牧一枝巴爾圗台吉五千餘一枝巴圖爾台吉同弟一千五百餘一枝呼雅克圗卜台一千五百餘一枝沙津達爾罕二千餘已上四枝未聞過河一枝克酬同男五百餘一枝珍戩台吉同弟五千餘一枝和爾齊同男三千餘一枝阿巴台吉同弟二千五百餘已上四枝過河套衆移住西海一枝布色圖同弟一千餘一枝塔哩雅齊三千餘一枝察罕達哈塔布岱二千餘一枝章圖哩同弟一千五百餘一枝達沁又名宰桑同姪四千餘一枝黃台吉妻首領薩哈勒塔瑪噶恰一千餘東海移住西海一枝順義王同伊克黃台吉二千餘已上共各部約有三萬五千五百餘騎九邊統論古今禦戎之䇿無過攻守二端守藉地形攻資兵力二者常相為重不可偏也我國家建都燕京三靣鄰邊防邊大計視古加詳自東至西綿亘萬里曰遼東曰薊鎮曰宣府曰大同曰三關曰延綏曰寧夏曰甘肅此九邊形勝大略也每邊各設重兵統以大將副以偏禆監以憲臣鎮以開府聨以總督無事則畫地防守有事則犄角為援地形兵力可謂備且周矣但承平日久舊制漸渝不無可議者自大寧都司之內徙而左臂單寒自遼陽舊城之外棄而守望勞費開平移而上谷之烽火益逼東勝廢而三關之設備愈嚴今且不守偏頭而守寧武矣河套住牧鎮逺決防而朔方之形勢虧矣哈密折入土魯畨而河西之孤懸益甚矣大抵形勝日縮敵患日近猶撤藩籬而退守門庭居室者其能晏然髙枕乎又調入衛之兵以為常則踐更疲命是自耗之術也設擺邊之卒以為固則力分推諉是自弱之道也募南兵暫為技擊之倡可矣還當練土著為久逺之需築墩臺用壯厄塞之觀可矣還當繕城堡為清野之計丁壯則困于修築隱于占役而取數於荷戈矣糧餉則尅于樁頭苦于折支而難望其宿飽矣方今內厲威嚴諸邊效順外寧內安此一時矣但貢市利歸酋長而部落尚挾狼心馬價暗償脂膏已竭金繒日索溪壑何厭拜甡聚毒慮有潰決之虞土蠻垂涎恐有紏合之舉宋時初患西昊竟苦金元氣運盛衰東西何常之有未雨而懷桑土之謀既濟而謹衣袽之戒今日所宜亟講而善圖焉此春秋意也圖書編卷四十七
