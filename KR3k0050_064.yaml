body:
  text: 圖書編卷六十四明章潢撰兩浙山川總敘兩浙山川不可勝數余嘗巡厯旁觀會其大都維浙中流隨山圻土積岨盤岡瀦為大澤環以巨海維浙西山導冡自天目西北折于下山南逹于富春峰巒起伏雲矗霄馳越垂霤踰百丈萃于餘杭之徑山錢塘之龍山又東北逹于金牛以入于澉浦諸山維浙東山導冡月江郎泉山浮蓋至于翠光岑山至于爛柯東北折于勳山九際臺湖至于縉雲大陽至于金華覆釡大盆至于東白勾乘玉京至于秦望會稽東過嵊山天姥逹于天台華頂北至四明大白東折於蛟門虎蹲峙為海門西逹于括蒼少微至于大梁南田至於大羅天臺底于鴈蕩橫為海嶠維淅源西南導濲水合東白大盆之源出為婺水至於蘭溪東南導烏傷東白大盆之陽東流為浣浦又西絡于漁浦皆北流以入于江開化壽昌導歙西來流入于江導新安水自遂昌逹淳安絶分水下于桐溪紫溪導天目之南過新城下富陽皆東南流以入于江天目導苕滙為霅溪入于具區括蒼導洄溪出于青田東南至永嘉滙為蜃江過飛雲橫陽而入子海導􅗄溪合東小江踰東江為曹娥之水逹于海四明導姚江東帶慈溪亂于鄞江傳于大浹入于海維浙江潮汐江流海下蛟門胥山相去數百里龕赭二山相去五里而近鱉子山橫門如濫潮生海上橫奔兩岸射激東西不得其門及至龕赭遏于江流限如伏檻潮始生怒潮勢蓋髙橫海入海浙之山川茲其大都云浙江杭州府山曰吳山府治東南左臨大江右瞰西湖為一郡勝槩瑞石山府治西北接吳山下有紫雲洞寶山府治南吳山之西鳯凰山府治南山俯大江南望海門勢若鳯凰欲飛之狀南屏山府治西怪石聳秀中穿一洞其上石壁若屏孤山西湖上獨立一峯為湖山勝絶處秦望山秦始皇東遊登此欲渡會稽故名山東南有羅剎石橫截江濤五雲山上有際院有井大旱不竭桐扣山府城東北五十里下有石鼓晉武帝時用崩出一石鼓扣之無聲張華取蜀桐木刻魚形扣之聲聞𢾗里故名安樂山餘杭大滌山中有日月分精金堂玉室人謂此山清幽可喜滌塵心故名大滌其中峯曰白鹿山上有許邁升天壇丹竈遺迹及大滌棲真石室白茆歸雲鳴鈴龍蛻諸洞有來仙巖下有九鎖山縈紆凡九折曰天闕藏雲飛鸞凌虛通真龍吟洞微雲璈朝元又有舞掌翠蛟桃花飛瀑諸泉今洞霄宫在焉天柱山四隅陡絶聳翠參天衣錦山臨安治南本名石鏡山東峯有圓石徑二尺七寸其光如鏡九仙山臨安天目山臨安縣西五十里髙三千九百丈周八百里亘杭宣湖徵四州道書為三十四洞元和志云天日有兩峯峯頂各一池左右相對如目左屬臨安右屬于潛東西二瀑布漬注為池名蛟龍池又有上中下三池池上有潭如仰箕曰箕潭徑山天目之東北峯有路可通五峯周抱竒勝特異岝崿山于潛縣西峭聳清絶下浸碧溪旁環翠岫遙映天目為醒心豁目傑特之觀青牛新城千頃山昌化西北上廣千頃有龍湫魚背金銀色大鵠頭山山勢上凌霄漢上有龍池闊三百畝南髙峰府治西上有古塔下有石屋杭都賦南北髙峯獨秀羣嶺之表北髙峯府治西北天竺峰葛仙得道之所飛來峯晉西天僧慧理登此山歎曰此是天竺國靈鷲山之小嶺嶺不知何年飛來因號其峯曰飛來一曰鷲萬松嶺在府城南夾道栽松西湖周回三十里其源出于武林泉山川秀發景物華麗舊稱有西湖十景嘉興府山曰五臺府治西北有石刻法華經胥山子胥廟出秦住海鹽秦皇登此金粟有石篆書三十八字陳山崇德龍湫平湖甑山桐鄉獨山海鹽不與諸山相接上置烽􅀈以防海寇石帆山海中石帆之東有鷹窠頂上穿山洞在長墻山下臨海有巖如洞湖州府山曰峴山城南浮玉山玉壺中巨石如積坡陀磈礧不以水盈縮為髙卑故名此山之南兩小峯參差曰上下釣魚山道場山汪藻云遊道場者如入王侯之家過何山者如造髙人隱士之居卞山髙六千丈非晴天爽月不見其頂西塞山張志和詩西塞山邊白鷺飛桃花流水鱖魚肥包山烏程即夫椒夫差所棲烏瞻長興計籌武康越大夫計然嘗籌箕于此天泉武康封山古防風氏封守之地梅溪山安吉山根聳一石髙百餘丈色清而形圓四面陡絶不可登陟上復有盤石圓如車蓋遇大風雨則旋轉號為石磨轉疾則年豐遲則嵗歉亦多驗嚴州府山曰烏龍嶺有三灣六曲南山淳安東泉淳安東北有紫瑞峯如青芙蓉出泉三𣲖並東注蔗山山分八面水注十𣲖有平田二傾仙居洞淳安東南接連十數洞皆有一竅往來最艱外一洞有石如龍蟠又有石座上作盆池龍口水注其中乳洞淳安洞門廣三丈許仰視五六十丈青石如斷中有泉大旱不涸又有獅子洞其門差小中有白石蹲踞若獅形洞之旁有幞頭石屹然臨水髙十餘丈廣八十尺漾井泉出其下又有石柱聳立山足髙數丈圍丈餘又有石船長四丈髙丈餘屹然水中如船之尾懸一石如舵然閬仙洞桐廬相傳昔有仙人居此中有石床臥之甚溫石鼓擊之則鳴又有石龍石橋巨蟾碧雞之類富春山子陵隱處釣臺東西二臺各髙數百丈子陵垂釣處石英山遂安産白石英巖山洞夀昌山有五峯曰華蓋帽玉露慶雲景星慶雲山分水金華府山曰金華府城北黃初平叱羊於此蘭隂蘭溪洞巖山髙百餘丈山石瀉巖鬱紆靈洞凡六著名者三曰白雲擁雪紫霞三洞相環如貫珠東北怪石屹立稱為小飛來峯峯下有泉曰天池泉清可鑑毫髮東白東陽稍巖山髙四十五丈上有石巖巖中有石室深廣各十餘丈巖巒叢互故名雲橫山義烏上有峭壁髙百丈廣三十五丈俯臨華溪又有穿身巖餧虎岩如來峯七佛峯行道塔方巖山永康四面如削駕飛橋石梯而登絶頂兩巖相峙為關上有亭曰透關亭自亭而入地平衍約數百畝中有一池池側有硯井井後有髙巖數仞巖下石深二丈廣數丈僧因搆石居之又有山曰桃花巖巖赤白相間狀類桃花有洞可容千人絶頂小洞可容二三十人華釡山永康四圍頗髙其狀如釡又有五指巖白睂巖山腰有白石如眉又有石倉巖髙一百五十丈石室山永康髙百餘丈緣崖而上南北二穴相通可容數百人中有石柱又有石形似龜仙華山浦江髙一百五十丈東溪之源出焉峯有五內有石室寶掌山與仙華相近浦江山水惟此與仙華為最勝白陽山武義石城山永康鮑令巖東陳金華洞其洞有三曰朝真氷壺雙龍朝真居山頂巨石如龜橫當其穴穴中數石如人名群仙洞衢州府山曰崢嶸城治後爛柯道書所謂青霞第八洞天爛柯福地是也烏石山延袤十里髙二百五十仭周匝如城又有石門俗號寨門東華龍遊三衢峭峯竒石玲瓏紺碧夭矯槎牙不可名狀上巖洞名曰碧玉中有石室旁通二門榜曰玉龍江郎山江山縣南一名金純山有三峯悉數百尺色丹奪目不可仰視頂有池産碧蓮金鯽山半有巖危石空懸中有結廬蟠桃開化浮蓋仙山江山縣南中有仙洞石壇石屏石鍾石筍諸勝仙霞嶺江山白石山龍遊山有圓石聳二十餘丈其色純白故名龍丘山山有九石特秀林表色丹白逺望之狀肖芙蓉漢龍丘長隱此與嚴子陵友善山際有巖穴唐徐安真讀書處處州府山曰南明城南有米芾書南明山字又有葛仙𨽻靈崇二字天王山城西又三巖中巖有飛瀑㵼落石僧山山腹有石狀如仙石半山山形如羊小蓬萊山縉雲仙都山縉雲石門山在石蓋山之西兩峯相對如門瀑布山縉雲背有飛泉􅎈落三十餘丈萬松縉雲吏隱李陽氷退居于此百仭松陽唐山遂昌大樓巖山有飛瀑春夏不竭冬凝結猶玉乳巖下為龍泓者三十有六龍安洞對大樓巖鳯凰山龍泉百丈慶元牛頭雲和白馬宣平敕木景寧紹興府山曰卧龍城內葛山城東句踐採葛作絲處會稽山城東南陽州鎮山史記注禹到大越上苗山爵有德封有功更名會稽上有陽明洞即三十六洞天之第十一石帆山遙望如張帆臨水秦望為衆峯之傑五泄山諸暨境兩山夾溪壁立雲漢雙瀑奔流沿歷五級下注溪壑淙激如雷震撼巖谷飛沫如雪溟濛數里俗名小鴈蕩山白水山餘姚山壁峭立有瀑布嶺上有泉四十二道素練垂而下嶺有三台峯有屏風巖下有龍湫有屏風潭有洗藥溪别有巖曰寒草巖又有石屋雲根蓋絶勝也四明山髙一萬八千丈周二百一十里峯二百八十有二道書為丹山赤水之天山心右有石窗四面玲瓏如户牖通冒星辰之光故名東山上虞謝安石所居靈運讀書于此丹池山嵊沃州山新昌晉支道所居天姥山李白詩天姥連天向天橫勢拔五嶽掩赤城石傘峰清風嶺嵊寧波府山曰四明城西阿育王山壁立千仭其中石室虛明薑山有石洞三後洞上有小穴形圓如月蘆山慈溪雪竇山奉化中有雪竇寺千丈巖瀑布泉藤龕錦地池隱潭形勝非一石樓山有石如屋兩崖夾澗飛瀑亂瀉丹小山奉化梓蔭定海招寶山定海蛟門山出此即大海洋古人稱蛟門虎蹲天設之險即此地伏龍山跨東西兩海門狀如卧龍內有千丈巖海眼泉石壇乳井普陀落迦山往時髙麗日本暹羅諸國皆由此取道以候風信一名梅岑山象山象山縣灌門海定海東北故昌國縣海中有砥柱屹立中流望之如人拱立水湧于此旋漏旋沸舟行必投以物殺其勢而後過風雨將作有聲如雷台州府山曰大固城內蓋竹山城南上有飛霞石有香爐天門二峯最為逰覽之所天門山髙數千仭傍有香岩石井釣臺白竹岡西麓有閬風臺金鰲山府城東南委羽山黃巖劉奉林控鶴墜翮道書第二洞天赤城山天台山赤狀如雲霞望之如雉堞瀑布山陸羽記云天下第十七水與福聖國清二瀑為三石橋山晉孫綽賦跨穹窿之懸崖臨萬丈之絶溟即此天台山道書上應台星八重視之如一帆髙一萬八千丈周廽八百里去天不逺路由福溪水險而清前有石橋廣不盈尺長數十丈下有絶澗惟志其身始能濟必梯嵓壁援藤蘿方得平路上有瓊樓玉闕天堂碧林醴酒仙物畢具司馬悔山子微隱此被徴出而悔故名獅子山太平東南有百丈巖羅漢洞智者泉華頂峯髙萬丈絶頂東望滄海玉霄峯重崖疊障松竹蔥蒨前有雙石夾徑玉京洞在赤城山桃源洞一名劉阮洞括蒼洞仙居東南劉光詩古洞藏真不記年即此韋羌山仙居上有石刻字如科斗尾閭東海中與海門馬筋相值溫州府山曰華蓋府城東下有容成洞道書十八洞天上有石龜池青牛谷井老松泉蒙泉天臺山山形如甑旁有十三峯環列先後中有傳巖瀑布泉蟾蜍石龍聽洞石柱諸勝仙巗瑞安大羅山之陽道書二十六福地上有三皇井巖頂有黃帝池廣五百餘畝水分八𣲖下有玉函潭龍鬚潭雷潭梅雨潭三姑潭西際山西南北三面蒼崖峭立環若翠屏惟東一面軒豁如門大海在前潮生日出蓋偉觀也鴈蕩山樂清髙四十里頂有湖方可十里水常不涸春鴈歸時多宿于此故名東外谷峯五內谷峯四十有八西內外谷峯各二十有四建寺一十八林亭山在新羅山之南有大石瞰海登之可望海中日出玉蒼平陽南鴈蕩山平陽縣西南北自穹嶺南自施巖皆名鴈蕩上有明玉峯峯頂有池相連曰白雲山髙插雲漢龍湫在鴈蕩東范宗尹詩龍湫信竒絶飛泉落雲間大石巖府城北第十二福地上有石室可容千人容成洞在華蓋山下相傳黃帝時容成子修道之地天目山天目之山雄視兩浙髙可三千八百丈橫亘八百餘里故洞玄集第為三十四洞天云隆慶嵗辛未三月自餘杭啓行行七十里日暮始宿大坂厥明行三十里至滿嶺南北兩山皆盤旋曲折似漸入佳境矣再行三里許山之北石骨林立中忽開一洞曽有道人經過問之樵人曰此洞髙若干許答以髙六尺有竒道人以手杖度之果符其數當有金銀二物以厭其勝覽之數日果得二山一名金嶅塢一名銀山總督軍門立牌嚴禁搜挖有可稽者申刻始駐雙清莊入浮玉禪林瞻梁昭明太子遺像以昭明曽讀書于此偶目疾痛甚洗而復明故以雙清名莊也山僧道其源委甚悉次早西行入山初至仰止山亭以倚翠亭旁有巨石髙而且方石名倚翠因以名亭也三至如斯亭泉橫澗道衝出勢不可屬作石梁以渡之曰半山橋左有響水巖泉水從右奔注側耳聽之其琤琤之聲若自石中出者傳言巗石虛空以故聲應如響理不可曉再上有觀音石平正如坻自牛眠亭少折而上見古杉一株大可九圍其枝皆下向復昻勢如虬龍殊為可玩遂至真際亭兩山夾道流泉瀑布之勝且謂此亭扼一山之吭澗泉從此下注雙清約十里有竒中有一道分流左右不知所歸遂入髙峰塔院髙峰者寺之開山祖師有定性子題其居曰真空洞飛雲閣皆偙獅子巗而立內有髙峯肉身以缸覆之塗以灰葬于獅子口中其形唇掀而上昂毫髮不爽頃之僧乃出髙麗銅鉢盂撫摩久之制極精巧啓視窗外則臨崖千丈不測中有一石直起為象鼻峰獨立獅座之表亦山中一佳境也入山初尚雨霽少頃雲霧沉霾不辨咫尺風急復霽遂命肩輿北上而東路南有玉柱峯形方而微黑僅有皺紋可數不及鴈蕩逺甚北有一石突出而平曰望江臺久不經人迹草樹已森然矣至普同塔院又見一大樹減前一圍特中分二幹直起尤為竒絶坐中峯塔院出髙麗所製袈裟長計一丈有五復下藏雲塔怡道亭又東入斷崖塔院當門有一樹其髙大不減普同又東往正殿入幻住庵又南望立玉亭乃中峯修真處也于山麓特申一股其地甚平計一畝許其崖深幾萬丈下瞷無底殊不可措足東西竒峰千仭壁立亭則誅茅為之且覆以三松一松獨偃卧其上亭隱然若匿豫側身俯首而出仰視俯臨令人心悸目眩深邃幽寂竒麗六者兼之古稱蓬萊仙島真為不忝此天目第一竒絶處也東坡忠觀碑記所謂龍飛鳳舞鳳舞即此山之麓而龍飛則山之枕中峰塔北者時隂風怒號凛洌如冬從者皆以兩手附耳古稱山深六月寒信哉昔日中峰迷昧不通自誓獨立七日不悟當墜崖而死越七日明心見性因名其亭以立玉後中峰乃東入幻住庵遂轉西南下坐著衣亭亭前山茶海棠僅爾半殘氣候寒暖遂與下界頓異若此亭之上有望雲菴惟一老僧坐石補衲少頃八真空洞一飯飯畢暫卧僧房未幾家人報余曰天霽甚已非初入山景象矣促豫起起坐洞中南望新城嚴州以及桐廬冨陽群山近者尚有形可指再逺者望之則如藍玉萬片又再逺者則淡雲一抹竟不知其為山也雖使王維執筆能寫此變態虛空色相耶僧聽泉復語豫以北有張公洞昔張真人曽煉丹于此同僧掃石以坐視之則石之突出而帡幪者計二十丈軒豁可愛西有石壁四五丈橫鎖洞口泉皆石中流出名曰石骨水如梅雨絲絲而下較之他水氣味甘重逈絶又一小洞天也天色愈霽日始升僧云如此晴霽十不及見二三故轉為雲霧山導豫直登山頂最髙處復從斷崖塔後進歷二臺涉其頂恍若置身青雲之上傍有石如鐡板狀似斷而屬俗傳乃仙人所鋸者中有一石獨聳上薄雲漢坐而凝目視之則東之臨安北之孝豐安吉東之金陵北之寧國諸山歷歷如指掌而前之所見南山愈小愈下又悉如蟻封矣西湖諸山錢塘孤山屹立西湖中有金沙井有六一泉有林逋放鶴亭逋墓在其南巨石山一名寶石山在西湖北髙六十三丈周廽一十三里傍有石甑山上有七層古塔今稱為保叔塔山麓有纜船石相傳秦始皇東遊泛海艤舟于此舊制西湖本通海東至沙河塘南向大江也故始皇纜舟于此宋宣和中鐫此石為佛遂名為大石佛北有落星石二一在山北址一在山崖後巾子峰在落星石後西有參寥泉詳見通志西為寶雲山又西為葛嶺相傳為葛洪煉丹之所嶺上有葛仙翁墓又西有虎頭巖山形突出若虎頭然吳越納土後望氣者云杭州有王氣宋藝祖命鑿之巖下有儀王墓葛嶺之西為履泰山有棲霞嶺下有嶽武穆王墓有翊忠祠又有牛臯墓在劔門關畔嶺有掃帚塢黃龍洞履泰之右為仙姑山有張憲墓仙姑山西為青芝塢青芝塢西南為慶化山水竹塢宋置部司前軍寨旁有周杞墓兄弟忠信名震一時云又西南為駝巘嶺過行春橋入九里松唐刺史表仁敬守杭植松以逹靈竺凡九里前有小方池曰玉泉旱潦不竭舊志為流出山外溉田三千餘頃折而南為仙芝嶺西為集慶山又西南過合澗為武林山俗稱西山在錢塘縣西一十五里髙九十二丈周一十二里其峰之北起者曰北髙峯山前有飛來峯晉咸和間西僧慧理登而歎曰此乃天竺國靈鷲山之小嶺不知何日飛來仙靈窟今復爾否因名山曰靈隱建靈隱寺命其峯曰飛來支分而回拱者又有石筍靈鷲稽留月桂蓮花諸峰有龍泓青林玉乳射旭呼猿諸洞有三生石有煉丹井有冷泉亭又有蕭公茯苓白沙金沙諸泉有下天竺寺上天竺寺西有嚴將軍墓南屏山刻家人卦中庸樂記篇乃唐人八分書後人誤刻為司馬溫公書其凌空而中峙者為慧日峰今以淨悲寺後卷石刻慧日峰亦誤也又南曰煙霞嶺洞壑虛窈泉味清甘聲如金石名曰水樂洞陟蹬屈折而上曰南髙峯在南北諸山之界玉岑山在南屏西南其對曰赤山山之隂有筲箕泉赤山之北曰三台山有于肅愍公墓三台山而北曰小麥嶺又西曰大麥嶺其旁為花家山西北為靈石山又西為南籠山風篁嶺下宋陳剛中墓上有龍井龍井之匯為九溪其西為十八澗栗山在錢塘縣西十七里髙二十二丈周十八里有石人嶺玉女巗過嶺為西溪有趙襄格公墓大慈山在縣西南十里有虎跑泉南曰筆架山有忠節祠又南曰包家山有冷泉峪多桃花號小桃源又南曰梯雲嶺慈雲嶺之南曰龍山一名卧龍山有登雲臺珍珠泉宋籍田郊壇髙禖壇遺址在焉稍南曰妙因山有吳越國文穆王忠獻王墓宋建表忠觀月輪山在龍山南形圓如月甚髙聳者為月輪峰有六和塔五雲山在龍山西南髙百丈周十五里有井大旱不涸秦望山在錢塘縣南一十二里髙一百六十丈輿地志秦始皇欲度會稽登此南望因名有羅利石定山在錢塘江上髙七十五丈周廽九里有竒江濤至是輒抑過則濆怒若雷浮山在縣東南四十里海濤入錢塘江勢若雷霆而浮山峙于江中與漁浦諸山相望潮乃廽伏激射若神慿焉廟山在浮山南十里潮勢至此方殺西湖故名聖湖繞三十里漢時金牛見湖中人言明聖之瑞遂稱明聖湖介于錢塘又稱錢塘湖負郭而西故又稱西湖云西湖西湖故明聖湖也周繞三十里三面環山溪谷縷注下有淵泉百道瀦為湖漢時金牛見湖中人言明聖之瑞遂稱明聖湖以其介于錢塘也又稱錢塘湖以其輸委于下湖也又稱上湖以其負郭而西也故稱西湖云西湖諸山之脈皆宗天目天目西去府治一百七十里髙三千九百丈周廣五百五十里蜿蟺東來凌深拔峭舒岡布麓若翔若舞萃于錢塘而崷崒于天竺從此而南而東則為龍井為大慈為玉岑為積慶為南屏為龍為鳳為吳皆謂之南山從此而北而東則為靈隱為仙姑為履泰為寶雲為巨石皆謂之北山南山之脈分為數道貫于城中則巡臺藩垣帥閫府治運司黌舍諸署清河文錦夀安弼教東里鹽橋禇塘諸市在宋則為大內德夀宋陽祐聖諸官隱隱賑賑皆王氣所鍾而其外邏則自龍山沿江而東環沙河而包括露骨于茅山艮山皆其護沙也北山之脈分為四道貫于城中則臬臺分司諸署觀橋純禮諸市在家則為開元景靈大乙龍翔諸宫隱隱賑賑皆王氣所鍾而其外邏則自霍山繞湖市半道紅衝武林門露骨于武林山皆其護沙也聨絡周匝釣綿秀絶鬱䓤扶輿之氣盤結鞏厚濬發光華體魄閎矣潮擊海門而上者晝夜再至夫以山奔水導而逆以海潮則氣脈不解故東南雄藩形勢浩偉生殖繁茂未有若錢塘者也南北諸山崢嶸廽繞滙為西湖泄惡停深皎潔圓瑩雖水經有明聖之號天竺有靈運之亭飛來有慧理之塔孤山有天嘉之檜然華艷之迹題詠之篇寥落莫睹逮于中唐而經理漸著矣會稽山會稽山在縣東南一十二里古防山也經史地志曰防山曰苗山曰茅山曰衡山曰釜山曰覆釜曰棟山曰南山其實皆一山也周禮掦州之鎮山山海經曰會稽山上多金玉下多砆石勺水出焉史記禹會江南計功而崩因葬焉命曰會稽會稽者會計也山之東有隴隱若劍脊西嚮而下有窆石窆石之右是為禹廟背湖而南嚮舊經禹廟之梅梁張僧繇畫龍于其上風雨夜飛入鏡湖人見梁上萍藻始駭異之乃以鐡維于柱此亦近誕而自宋以來蓋傳其説云禹廟之西曰中峰下有禹寺寺之後相傳為禹陵陵有禹井有菲泉以禹菲飲食故名山之東北接官嶺其上有盤石屹立曰降仙臺下有茗塢淘沙徑山南曰茅現一名玉笥其别峯曰石傘曰香爐西北五里與宛委山相接宛委山有石匱壁立中有孔穴號陽明洞即舊經所謂三十六洞天之十一洞也夏禹發之得赤圭如日碧圭如月又中得金簡玉字之書悟百川之理賀知章纂山記曰黃帝號宛委穴為赤帝陽明之府于此藏書大禹始于此穴得書復于此穴藏書因謂之禹穴越句踐自夫椒之敗棲于會稽之石室服犢鼻著樵頭斫銼飬馬蓋此處也史記秦始皇上會稽祭大禹望于南海刻頌秦德金山下傳有始皇坐石並無刻石唯縣西南七十里有刻石山一名鵝鼻山自諸暨入會稽此山為最髙越絶云始皇以三十七年來遊會稽正月甲戌到越留舍都亭取錢塘浙江岑石長四丈四尺南北面廣一尺東西面廣一尺六寸刻文於大越東山上水經云秦始皇登會稽山刻石紀功尚在山側孫暢之述征記云丞相李斯所篆也梁書竟陵王子良為會稽太守范雲為主薄雲以山上有始皇刻石三句一韻多作兩句讀之並不得韻又字皆大篆人多不詳雲夜取史記讀之明日登山讀之如流張守節云李斯書會稽山刻其字四寸畫如小指圓刻今文字整頓是小篆字宋姚寬言嘗上會稽東山自秦望山之巔並黃茅無樹木其山側有三石笋中有水一泓别無他石石笋並無字復自小徑别至一山俗名鵝鼻山又云越王棲于會稽宫娥避于此本名娥避山俗所名音誤也山頂有巨屋如石中開插一碑于其中文皆為風雨所剝隱約可見缺畫如禹廟沒字碑之類不知此石果岑石否但此山險絶罕有至者若非始皇之力不能插碑于石中或云大篆或云小篆此則不可考及司馬遷自敘上會稽探禹穴然舊經諸書皆以禹穴繫會稽山之宛委山今里人以陽明洞外飛來石下為禹穴諸凡此類皆流傳失真矣天台山天台山以髙大之故稱台嶽又上應天之三台星故自昔以靈異聞豫每過其地輒欲往逰人曰遊非踰月不足以盡其竒豫頗難之會豫官歸得故人新城黃尹速豫逰至則舍于國清要梅壑潘子與俱而五峰雙澗之勝已得之行住坐卧間潘子曰遊天台必自赤城始此山之南門也自是而北則循佛隴訪石橋由石橋東行則為天封華頂西行則為萬年桃源兩巖則為洞天桐柏于是遂結束自赤城始赤城山純石霞色望之壁立如城具雉堞絶頂有浮屠七級西北有玉京洞金錢池寺廢無僧已復由故道尋九里松月色在地人行松影中翌日遂北行踰金地嶺與察嶺相連其下為漢隱士髙察讀書堂又五里踰銀地嶺至大慈寺前觀佛隴二大字寺僧曰此知顗師之初修地也又北行則山水漸益幽雅日昃抵石橋先上曇華亭倚檻觀之見兩崖門立而石橋橫亘其上廣不盈咫琥上人掉臂行之無怖山北左右肩有雙泉飛出合流而來至橋乃伏出其下瀉為瀑可百餘丈挂崖石間既愜所聞復由亭右麓下至新亭接其端而坐則見石橋似在半天而隤雪之溜自空中下擊潭水作疾雷聲震動林谷於是乃大詫以為竒觀是夜宿琥上人海會庵天明復往觀之兩日乃從山西行尋萬年寺由鐵船峽渡羅漢嶺山縈水回每數里輒一曲及至上方地則砥平如仰盂登妙蓮閣四眺則八峯回抱而直南諸阜纍纍如列戟排衙兩澗水至寺門乃合流瀠回南出前林松杉成列東澗古松數株皆大十圍有五六鸛鶴巢其上每休坐樹隂則聞鸛鼓牙及唳鶴之音與風泉相雜翛然非復人世留信乃去抵護國寺出訪泉天師墓從者曰由此東北行至劉阮洞頗近會蔡舉人中甫陳監元敏之適至遂合䇿尋劉阮洞洞去護國二里而去洞口如門有古木神祠沿澗而上兩山繡壁參差夾水立水隨山曲折時潄石有聲曰鳴玉澗水壖草樹芊綿東崦特蔥蒨可喜曰桃花塢又折而北上路漸艱澀及水窮而路盡有巨潭渟徹如鏡中有洞門潛通山底其深莫測陳子曰此所謂金橋潭也即劉晨阮肇遇真處潭之南有盤石可列坐以飯于是取酒會飲其上仰望三峯倚天而東峙特秀上有石如綰髻鬟曰雙女峰昔人見雙環戲水或曰乃精靈所適日晡出山憩白即寺觀巗石亦竒怪是日循董家廟小田鋪涉三四溪至廣嚴寺閲貧婆鍾謁榮師肉身像師宋淳化間人習禪定多異迹時呼為榮羅漢死而不腐是夕投宿寧國寺在平原後隴靡迤多古松前浸巨塘紫凝峰在數里外寂厯可數又明日遂問道訪寒明兩巗明巗大略如鴈蕩寒巗但差小耳巗西面有唐帽乘馬䀶相見為閭丘大寺像旁有大石筍如天柱峰正北洞寬平可列席旅會南有小塘外有八寸關寒巗後洞北明巗尤邃且廣可容百駟而梵宇亦宏敞正寒山子所居兩巗凡兩宿還憩國清黃君又先遣遊徼除華頂山路再越日乃偕潘子由顧儒嶺涉歡溪訪齊處士髙歡讀書堂于普慶寺及抵天封烏已投林寺舊號靈墟實智大師注解涅槃經處佛像極壯麗有盤石智者嶺卓錫泉北望一峰摩雲即華頂也詰旦戒輿人緩行上華頂即遇險則下輿步行以亭午至其上中峰孤峭如華蓋諸輿拱羅寺燬僅餘數廊衆木扶踈多檜杉檡櫧其旁近地有王羲之墨池李太白讀書堂又迤從北上可三四里有望海尖登其絶頂則錢塘煙樹括蒼峰巒皆隱約可見東向觀海上雲濤如環壁繚肪豫乃撫掌大呌以為竒觀薄暮移宿天峰老瞿曇謂豫曰華頂絶髙處舊有僧寮可觀日出處後以四風毒不可居故其寮亦廢又曰若自此南行至文殊寺上髙由山脊行則諸山皆在指顧豫頷其言詰朝遂南行至文殊寺上髙由山脊行則凡邑內諸山皆若翔舞奔躍在輿馬左右如老瞿曇言輿人曰直南為桐柏岡若欲尋洞天宫當東從橫路于是遂東洞天宫已廢獨玉霄峰重崖疊嶂岑蔚如故稍南有石門山兩巗對峙如門各髙數十丈將至澗底乃有石橫亘如閾奔湍來激閾如翻玉練擂鼉鼓豫踞石注視久之乃復循故道行桐柏岡過元明廢宫又五里抵桐柏宫其地有卧龍玉女紫霄筧笥翠微蓮華玉泉華琳香琳凡九峯而宫當其心平原曠衍有村落溪流橋梁水碓道書稱為金庭洞天吳赤烏初年葛玄于此修真至唐司馬子微遂捧敕建為桐柏觀宋改為崇道觀今復為桐柏宫云西北有瓊臺雙闕去宫可六七里羽士曰遊瓊臺當先休足力即至其處又必去鞋用縢裹足攀援蘿葛乃得登是夕止宿於黃雲堂次日早飯已乃偕潘子攀登如其法瓊臺三面皆翠壁萬仭峭堅相向如城郭周繞而臺則南嚮懸居其中折而東南可二里許為雙闕翠壁山至此忽中斷對峙如闕門路出其下而澗水從之然巖石皆陡絶不可下觀于是還坐瓊臺而四壁之華葉曜日含風綺繡紛錯飶香蓊鬱俯瞷百丈潭在臺左麓紆繞雙闕流入雲溪屏息無譁其聽益逺真天台山之第一竒觀也還宿黃雲明日出洞門盤折而下行數里至福聖庒觀瀑布又迤而北至翠屏山觀三井皆竒初豫自元明宫來謂桐柏已在平地及觀瀑布三井始覺其地乃在衆山之上復驚詫以為大竒天姥山天姥山在新昌縣東南二十里東接天台華頂峯西北聫沃州山桐柏山桐柏山在天台縣西北三十里周圍九峯曰紫霄曰翠微曰玉泉曰卧龍曰蓮花曰華琳曰玉女曰玉霄曰華頂矗立霄漢逺近相向晉王羲之與支道林嘗往來此山至唐則司馬承禎居焉大平山川太平古東甌地為南紀山河之終南紀之山首自岷嶓蜿蜒迤邐緣江南北其北為湖北襄鄧江黃舒廬廣陵諸山其南自荆山荆南逾江漢至于衡門乃東循嶺徼逹于閩中稍折而北逹于東甌星傳所謂南為越門是已越門之山雖以會稽為望然括蒼山最巨自括蒼而東行北為天台南為鴈蕩折而東北至盤山東行五里所分而為二其一稍折而北為大唐嶺東至于白塔山東北至于靈湫聖水山又東至于白楓山而盡其一稍折而南為王城山東至于樓旗山亦曰海峰山東至于嶠山東至于海嶺鶴鳴山又分而為二其一南行為石盤大靁諸山其一東行為亭嶺五龍山東至于茶葉寮山東至于紫髙長嶼又東北至于盤馬山而盡兩山之間沃野彌望自西徂東以盡于海金華山金華漢長山邑也連山環抱郡城其西中斷如玦浙水出焉浙源發東白山繇烏傷西下經郡城南合華溪水為雙溪又北折東鶩而入于江其山則北走嚴陵南極閩嶠東逾天台委羽以逹海上之諸峰焉故自六朝以來號為山水名郡冨春山冨春山在桐廬縣西三十五里一名嚴陵山清麗竒絶號錦峰繡嶺前臨大江乃漢嚴子陵釣處也人稱為嚴陵瀨有東西二釣臺各髙數百丈有嚴先生祠雙龍洞戊申夏六月策西北行二十里至婺女鄉復行出人家沿山麓溪澗澗水即洞中所出者二里許漸髙山路崛曲馬不可行豫乃下步獨先至一澗石壁削峭巉巗古木盤拏垂垂下風搖其巔聲動崖谷澗中石苔蒲緑蘇清冷逼人復上行里許則洞前居民數十家聚成委巷由巷而出則逺見洞門復由小路里許則所謂雙龍洞即道家所稱三十六洞天也洞門軒豁如大厦可容胡床百數髙可三五尺石蓋如底錯有石乳下垂若白龍升降狀洞中右傍有一石嶄然壁立如笋與洞殆齊笋之頂有小泉瀉石上洞北平地一竅廣三尺髙半之水湧其中風迅如扇冷冽侵肌骨從者皆執炬揭跣傴僂而進水深齊膝上時湧泉正盛其底皆大石竟不浚而止乃相與坐水傍玩之其水由小澗西南行數十步澗底一穴若井口以杖探之皆亂石雜列不得入水大半傾注其中若擊鼙之聲其小半由澗至洞門伏流門外二丈餘復見由西南長瀉而下坐久風急覺甚冷據地坐仰觀朝真洞求路不可得睇眄久之乃從洞口而下至民居後登嶺巔復平處乃命肩輿西行二里許轉北望見紫微巗講堂洞即梁劉孝標隱居講學之地山峭峻不可輿相隨而步曲折數百里至洞口從髙而下中復坦然視雙龍為敞髙倍之皆石乳下垂如雲如山其旁壁乳結如佛像五采絢然豫取禋褥布地上仰卧觀之其石乳皆垂溜滴泥沙如氷雪洞東北隅壁立而上復闒一龕可列坐五六人方巗山從東北行十餘里登一嶺又折而南行十餘里即經方巖山之東北望其山如削壁從天而下髙數百丈山趾東南有村落數家越村則轉而繞山西北行其上皆石四面皆如東北山之南一山對峙而長繞之如護衛狀中一石徑則峻而不可輿由徑步行而上二里許南山之半有小石洞洞中舊有羅漢堂堂之前有軒曰嵳峩軒今皆廢惟存基址旁有一石如斗曰上馬石至是望山椒為近然皆峭峭無磴道舊時好事者架為飛梁石梯護以石欄各慿梁攀欄逶迤曲折而上將至絶頂有兩巗相峙為關關有門門上有樓曰透關自關而上平曠約數百畝中有一池方畝餘水清瑩大旱不竭池之側有井曰硯井池上有佛廬曰廣慈寺寺後有巗髙數仞巗下有石洞深二丈廣倍之僧搆為屋以供佛像仙華山洞縣治之地北蓋有仙華山寶章洞髙數百丈周二十五里一名仙姑山亦曰少女峰古仙人修真處東皆巨石林立其最髙峭者五峯如指狀聳削插天第五峰至第三峰俱淨石巉巗峻削幾千尺不可上第二峰視數峰又髙則壁立而平土負其背蔡尉從山椒石峰之北鑱削小道附石東行至二峰後從南向治小道登峯頂平處又設舍于其處仰視第一峯東南北俱壁立起自山椒數百丈惟西南附第二峯尚髙數百尺計視不能復上使人緣崖鑿磴道幾百日不可磴則繼長梯為一梯據橫石斜撑之梯盡處皆巉巗亂石猶可捫援而上既具則歸而報命治肩輿擊帶曳之上里許則山形斗起蒙籠曲道尤難登各棄輿馬而步曲折數里至山腰席舍各息促足酸取茶至爭啜之遙望峰頂丹光閃閃如芙蓉初開氣定復折東行又轉西北俱陡峻山蹊豫左負騶奴右倚杖行數里至山椒夾岫處即仙壇遺址仰觀巗石插起峰巔危傾欲飛墮乃北循其罅上踰石嶠如戶限兩傍皆坑塹折而東至第五峰之下峰飛削若欲西倒又東第四峰第三峯聳亂石巔峰之北則新削小道附石凸凹屋曲間有石室可容坐道僅容足外即深塹不可測各相繼循石逶迤曲折而東里許即第二峰北地稍寬復有大石聚成一峰乃從小道上第二峰頂則方平五六丈有席舍其處左右已治具矣各據地上俯視原隰聚落如碁布因仰視第一峯相謂曰上當更竒但險不可測豫遂解衣脫履攀援磴道幾百尺磴道絶當梯則削壁斷峽復梯足出飛鳥背梯窮處乃攀緣亂石直至絶頂回顧諸客不能從矣其頂方三五丈無大樹木皆大盤石青緑間雜岈然窪然乾鮮交封間有草樹出石隙髙二三丈又有異草如絲縷狀生峭壁上舊傳為仙姑苧麻之遺土人每攀為績紡之資箕踞而坐凡數邑土壤皆在袵席之下縈青繚白外與天際若會稽嚴陵江山吞吐海門壁立霄漢之勢皆依約而盡之俯慿危石見山椒白羊如豆大從者出入山腰席舍如傀儡在臺中余酌微醺仰捫石援梯而下至磴則伏石上懸捫躡鑿道間有不能處僕夫從下扶豫足安蹬道乃漸第二峰則危亦甚哉乃至山椒夾岫處則復倚杖伏騶奴而下至山腰席舍之間復從東行數里許過一澗復折而北沿澗百餘步即望見寶掌山山即寶掌大禪師處山前雙峰列峙凛然若健士守關狀澗旁竒石列植若獸若鐘鼎若刀戟旗鼓絶可愛玩復百步許有巖最髙巗巔有巨石玲瓏若斫削所成遙望翩躚如欲飛舞俗傳為師宴坐時兩股臂俱酸戰矣忽聞雷霆交作逮霽而石湧出因號飛峰峰下有泉極井冽雖盛夏潄之令齒擊又折而上有石離立藤葛中曰五通遊戲峰志云師誦般若若五通來聽故名其下有洞三各深二三丈廣半之俱竒絶可玩東山會稽南則晉太傅文靖謝公安石東山也巍然出衆峯間如鸞飛鳳舞至山下于千峯掩抱間得微徑循石路而上今為國慶禪院即文靖故居也絶頂有謝公調馬路至此山川始軒豁呈露萬峰林立下視煙海渺然天水相接蓋萬里雲景也文靖樂居其在兹乎山半有薔薇洞相傳文靖携妓處葛立之詩話云會稽臨安金陵皆有東山俱傳以為謝安携妓之所按謝安本傳初安石居會稽與王羲之許詢支遁遊處被召不起遂棲遲東土唐裴晃與吕渭等鑑湖聨句有云興衰還尋戴東山更問安此會稽之東山也本傳又云安石嘗往臨安山中坐石室臨溪悠然嘆曰此與伯夷何逺今餘杭縣有東山蘇子瞻有遊餘杭東西巖詩曰即謝安東山所謂獨携縹眇人來上東西山是也此臨安之東山也本傳又謂登台輔于上山營墅棲館林竹甚盛每携中外子姪遊集今土山山建康上元縣崇禮鄉建安事迹云安石于此擬會稽之東山亦號東山此金陵之東山也李白有憶東山二絶不到東山久薔薇幾度花白雲還自散明月落誰家又我今携謝妓長嘯絶人群欲報東山客開關掃白雲不知何處之東山陳軒乃録此詩于金陵集中將别有所據耶南史載宋劉勔經始鍾嶺以為棲息亦號東山金陵遂有兩東山矣五泄山五泄山在婺杭越三州境上北距富春南據勾吳東接蒲陽其山水最號竒峭齊謝玄卿嘗以採藥探入其中而宋刁景純吳處厚亦頻遊焉自西坑嶺入過遇龍橋北行二十步始入西潭前橫一溪水甚寒履之如氷曲溪而前徑小潭有憔石突起類大甕倒履乃捫門而登一失足輒墜又二里所地稍夷曠怪石四瞰峰巒環列獻狀其紋縈縈然類神工鬼斧所雕刻者山多猴或恐之撒石亂下如雨又前行半里所泉自石竇中出瀏瀏作聲若琴若笙竽泉二流滙為小窪瑩徹泓澄毫髮不隱鯈魚數尾洋洋往來如行琉璃瓶中見人至潛去窪左大樹離立極怪偉倒影入水中如畫又前行五十步大石閼道相傳有巗角肖鷹喙忽夜大雷雨喙崩下聲聞二十里又行三十步榛篠成林翠光浮映衣袂成碧色山蠱崖虺奔繞後先瞬目失所在至此則氣象隂幽絶不類人世如升蓬嶠坐水晶宫生平煙火氣消盡又自山腰緣葛而前竹籜覆地厚動足輒撲又過十步許抵小潭小潭上曰西潭流水傾沫成白簾濶可七八尺冉冉下注滑而無聲兩傍石崖峭立苔蝕蘇暈時有水珠毿毿滴下嵗旱鄉民禱龍于此遇禱或湧取􅔼蜴入瓶盂中持以歸多驗自遇龍橋至此約可六里皆蛇盤罄折路行若窮又復軒敞其中勝致難以具言潭上有石河從石河至三臺塔人迹罕至莫詳也尋路而出斜迤而東過香爐峰峭拔上有石類香爐故名香爐峰北有峯圓而童者名鉢盂峰或曰肖東甌鴈蕩又名鴈蕩峯鴈蕩而南時有白雲覆于谷者曰雪峰屹然人立者曰玉女峯嶄嶄勢欲柱天者名天柱峰其他諸峰星聫肺附登名圖籍者蓋七十有二焉復尋崖東折度略彴橋趨三學士院院堂靈默禪師道場師嘗降龍于此遺迹尚有由院北深入又百餘步至東潭潭上飛瀑可二十丈瀑怒瀑倒激崖竅中若運萬斛雪從天擲下白光閃閃奪人目睛至潭底輒復逆上有聲如輥雷人笑語咫尺不能辨猶聞甕中聲居人云每天風一號四山林木震撼欲折黑雲下罩杳不知分曉嵗多魃龍者其多驗如西潭復北折而西沂潭之源登響鐡嶺度紫門山村人多舍篁􅓗間有平臯數百畝可耕溉旁沿石河又行一里所地名石鼓足頓之鼕鼕鳴越十步至第一潭潭如井睨之正黑投以小石鏘若珮環又越十餘步第二潭圎如錡釡面廣而底敞大水驅石聚其內逮滿復泄去潭下石壁百餘尺險不可置足從其右懸藤墜下至第三潭潭甚深以線縋之下不可底其形方狹而長天向隂尚有雲氣從中起疑有蛟龍潛其下恆以幽悄為病第四潭咸不敢往或以綯圍腰擊巨筏俯崖而瞰潭左右皆楓木其形大槩如第二潭而廣袤倍之側有晉劉龍子墓相傳龍子嘗釣于潭得驪珠吞之化龍飛去後人為疊石作塜或云龍子之母葬焉世逺不可辨又其下至第五潭即東潭其水五級故名之為泄云噫造物之委形山水者其竒峭有是哉南松巖南松巖在太平縣玉城之南去黃巖縣北松巖五十里而近以其南北望髙又相埒故名南松巖云始由玉城山行二里許抵薜支巖路險舍輿步里許則聞澗水激石四山風撼木聲若萬軍屯關愕立久之復行數步見兩巗對峙如門入門行夾壁間可十步許皆峭削嶄空中類頷齶相呀下曲折如龍遊狀是為石門門之內為石壇可坐數十人其下為小潭潭之水自上龍潭來􅀈􅀈行墜潭繞石門出遇峻險則旋而為瀨路漫水底離列石樁行瀨上由石壇而上有獅子山路右折揭水以進路建為龍潭其上有瀑布水懸數十尺下擊潭作殷雷聲俗傳石門始由龍潰巗以出故其崖有蜿蜒形理或然也左折為石天梯繞獅山前址行逹背上上有平石負土出下臨絶澗澗北有石壁當面立修廣數百尺自此循澗行路頗平又二里抵松巗巗西北二面皆上下四列石坐而庥焉風雨不能及西有石龕北為龍鼻巗巗色獨黃異他石鱗角獵獵欲飛動常有灑瀑如霤雨墮其前即大年不絶由龍鼻巗而上有二道其一西北行百許步水月禪院在焉其一東行五十步為羅漢洞陟而上為伏獅􅑐登巗東向望見海上諸山逺近浮波濤中煙雲杳渺無際折而西北為燕子峰為九閬峰此巗中最髙處也對望北松巗勢正相埒一都山至姑婦巖翹望崔巍若玉女坐立名曰玉女巖溪之右二石參嚴者仙釋巗也又一山危削巔成石握者插劔峰也轉列一山如帳山之腰土落而石出其平如札橫數百丈下臨清溪仙人榜也或以小赤壁名之末至初晹谷徑路杳曲有石倚山若甑者徐氏山居也南唐時客之祖則常八仙都山不出傳聞之去事見唐史初㿩洞二竇圓邃日出時巧當其竇洞下為櫻桃洞踰響巗人語則盎然有聲左注池湖石龍中峙者侍御先隴也下梯回望五石巉巉若老者攢倚五老巗也侍御依山築臺鳴群玉過練溪上平岡阜莾蕩緑疇千畝秀峰前列碧崖後擁真隂陽之會山水之奧區也四顧之竟忘歸矣溪外左山為忘歸洞謂李陽氷嘗宿于此有石如天柱突兀于前人指為鼎湖髙數百丈四面面度五十步石巔有木蓬菘久雨則水溢下人故疑其中為池景泰時雷火焚其柏根墮下如二龍自柏綘盤爪角宛宛侍御獲而寶之其木龍文石特起若仙官真宰獨步天闕而羣從擁之後為步虛山山之巔空洞而缺其前若立視像升解者揭其靈蓋而出石笋森雜如積笏如疊玉類皆琢成如人披衣趨朝狀側一徑入玉虛宫宫傾頺不可居陟其巔有石凌空像跨鶴而飛者有田數十畝左會入為妙庭觀觀後山中峯微髙如屏自中而前突起一峯圓秀水分左右湖水澄深肱腕環抱客謂此為鼎湖也山勢髙簇然自沖天火星而來去塵世若幾萬里矣遊覽四外千峰擁峙溪山盤鬱風氣清肅自成洞府所謂成德隱玄之天其在此也左右有金龍洞雙龍洞天堂洞隱真洞深邃幽祕莫測山側有水仙洞泉出罅中下有石池大旱不竭旁有獨峯一名玉柱峯髙三百丈三靣臨水周一百六十丈朱文公至此愛其山水清絶似武夷有碧澗修筠似故山之句遡坡為芙蓉帳帳列石崖甚竒次第之有若人立者獸蹲者鳥躍者花繡者木植者龜遊者龍舞者千形萬狀山川之勝極矣劉阮洞劉阮洞其傳久矣豫竊邑於此訪于故老往往不知其所在比按圖得之以詢護國寺僧介豐乃曰洞居寺之東北二里斜行山谷隱于榛莾間人迹罕及景祐中先師明照大師嘗採藥見金橋跨水光彩眩目二女未笄戲于水上如劉阮所見此水仙之洞府也元祐二年春廽鑿山開道立亭于其上環亭夾道植桃數本越明年三月寺僧報桃花盛開并以其景物之盛求名焉余率縣尉相與幅巾杖藜徜徉行歌沿澗而上觀緑波之漣漪聽寒音之潺湲微風過之餘音清逺飄飄然猶鏘佩環而朝玉闕也遂名之曰鳴玉澗澗之東有塢植桃數畦花光射日落英繽紛點綴芳草流紅縹眇隨水而下此昔人食桃輕舉之地也遂名之曰桃花塢自塢以北數百步攢峰疊翠左右廽擁中有澗流隨山曲折而遊人之道從及水窮而道盡則有隙清徹淵澄可鑑毫髮羣山倒影浮碧搖蕩中有洞門潛通山底其深不可測雖淫霖暴注而不盈大旱焦山而不涸此寺僧建金橋之地也遂名之曰金橋潭潭之南瀦水淺見沙中有盤石三不沒者數寸可坐以飲自上流杯盤隨流蕩漾必經三石間俯而掇之如在几案此羣仙會飲之地也遂名之曰會仙石據石之端仰而視之三峰鼎峙峻極雲漢寒光襲人虗碧相映危崖落花紅雨散亂其東峯則孤危峭拔儀狀竒偉上有雙石如綰鬟髻遂名之曰雙女峰其西峰則壁立千尋上通巨嶽陽方升先得清照遂名之曰迎陽峰其中峰則居中處焉以雙女迎陽為之輔翼羣山之翠合而有之遂名之曰合翠峰三峰之間林麓踈廣草石瑰異左連瓊臺雙闕之山左接石橋合澗之水採芝茹术擷翠佩芳杖履輕而白雲隨笑語髙而山谷應翛然而往直欲跨雙鳬御清風逍遙乎不死之鄉而不知塵境之卑蹙涉世之有纍也遂名之曰迷仙塢自塢以出至于迎暘峰之下有石偃于山腹廣袤數丈寺僧因石趾結亭于其上畫桷雕楹翬飛鳥革前臨清泚瓦影浮動魚跳圓波光㺯樽爼浮杯之迹顧指具在目遂名之曰浮杯亭鴈蕩山鴈蕩山在縣東九十里髙四十里東聫溫嶺西接白巗南跨玉環北控蒼山頂上有湖方可十里水嘗不涸春鴈歸時多宿于此故名山有東西內外谷之峰五東內谷之峰四十有八西內外谷之峰各二十有四建寺一十有八各有殊名皆宋以來好事者所命也又有大小龍湫大龍湫在西谷自石壁絶頂瀉下高五千丈隨風旋轉變態百出小龍湫在東谷從巗溜中飛流而下髙三千丈又有上龍湫在大龍湫上數里飛懸懸瀉亦數百丈山巗壁立中有穴可居人迹罕至其始由筋竹澗曰若嶺而來因皆謝康樂所從入鴈山處也今為官道此行則出嶺店至水際見西山對峙中帶溪流曰石門潭循潭而南越數里已漸覺可攬結山之麓有僧抱石石方整似經函望之儼然僧人面壁也緣山而行抵石梁洞梁亘洞前兩垂罄折如門洞亦瀟灑末甚竒絶舊有寺今圯下度溪踰嶺嶺故康樂蠟屐所曽至因名謝公嶺稍前見所謂靈峰寺者廢不存有一僧迎拜途次遂導行指點諸勝兩山夾溪俱壁立聳矗有仙權秀靈芝沉船翔鸞諸峰環匝左右種種逼真不獨形肖其中有洞拔起山巔如笋逺視洞口僅一線至則可並肩以入躡級直上數十仭有平砥設諸佛羅漢像僧穴石以居洞前五石屹立名五老峰出而循山繞溪迤邐曲折過響巗巖圓突如塜兩傍皆石山峭峙若隧開障列每遊人鼓樂其間輒鏗鍧鞺鞳傳聲互應試之果然山頂有將軍抱石巍然介胄士倚柱箕踞焉俄僧一人持香迎導如前抵靈巗寺寺有殿數楹欹頺莫蔽風日山側為小龍湫潺湲有聲周視諸勝不減靈峰而景尤叢聚峰則鉢盂展旗雙鸞蟾蜍天柱障則石屏平霞石則僧栱含珠若帆斯揚名堵斯堊如舞如削如鏤如蹲髙下倚杖爭相鬪妍妬巧呈秀效靈令人應接不暇由殿後登崔巍觀龍鼻水洞亦峭拔石罅中一道鱗鱗起色碧緑異常外視之穹窿如脊相傳為龍身攀階行洞內陟龕窮處見一爪獰狰下踞地前鼻如懸壺狀鼻分二小孔有水時滴瀝清冽可滌目翳內有小亭坐而外眺三女峰當其胸出而下瞷獨秀卓筆二峯承其足導僧更指安禪谷天聰洞數數稱其竒特幽窈欲豫觀因行倦不克赴時日已停午矣因命輿歷馬鞍嶺嶺為鴈山東西二谷岐界數僧拱伺迎導復如前沿長岡躋峻坂遙睇常雲峰觀音巗樹巗方巗道松洞憑軾可挹皆不暇登趣指大龍湫憩焉所從入境有剪刀峰突兀平地髙數十百丈形如剪之一折轉而近視之則若柱故亦名天柱峰山旋繞如障名圍屏障深遂杳冥方至湫處煙霏霧隕變態恍惚詢知上有湖是為鴈蕩寬濶廣五六十畝堤岸葑草蒙葺鴈所栖集流五里許入龍潭潭廣方丈為湫口即瀑所從注其東崖有菴為諾詎那尊者觀瀑坐化之所今祀其中盡申而返宿仁能寺寺亦頺廢僅存什百之一二明日介行觀火焰峯經行春橋馳四十九盤嶺未午入芙蓉驛暮止樂清公署追思勝遊如夢如失行次窑奧驛從容獨發方里許遙見層峯崒嵂詢郵吏對曰此鴈蕩第一山山行盡日可抵嶺店驛遂策馬登麓鳥道折轉即四十九盤嶺延佇嶺巔廽瞻東甌海外有山山外海煙斂旭升天宇澄廓竒哉觀乎越嶺溪抵能仁寺凌空屹峙炎光上騰名曰火焰峯萬疊峥嶸羣簇絢艷名曰芙蓉峰削壁百仞泉流石竇間千淙萬澌噴􅎈潏瀰名曰梅雨巖昭回于上冒覆于下名常雲峯瑞鹿寺前獨石巃嵸盤矗仰視之峻極于天轉視之中分參倚人皆曰剪刀峯亭觀大龍湫蒼崖翠壁巉巉巗巗飛泉從空而下麗若煙霞奏若絲竹溜若垂珠渙若鑠金激以鼓聲則轟驚震撞忽隨風飄出谷口數里外草木潤浥如雨蓋崖下有潭潭中有龍淵深莫測故曰龍湫湫之絶頂有蕩湖鴻鴈爭集濯于中曰鴈蕩登靈巗寺左峰如獅右峰如虎虎峰中有洞洞前有泉對泉石壁嶙峋名曰屏二嶂即如空中樓閣萬象森羅嶂左展旗峰如大將出師牙纛排列嚴翼凛凛嶂後天柱峯如端人正色立于朝寧確乎其不可拔峰之半有天聰洞虛明通逹無所壅蔽有舍珠巗平盒巗羣峰競秀莫能擬諸形容故曰鴈蕩之山靈巗為最緣澗而北淨明寺有瀑布峰峰下有照膽潭潭清徹底瀑聲正直去潭又里許即靈峯洞兩峰千仭合掌直立廣十丈深倍之可坐百十人內則混沌藏斂外則剛健砥振懸石如磬扣之大鳴夏不暑冬不寒豈水簾石梁所可及哉圖書編卷六十四
