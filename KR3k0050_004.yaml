front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0050_WYG_004-1a, image: WYG0968/WYG0968-0120a.png}
body:
  text: 圗書編卷四明章潢撰天地設位諸圗總叙乾坤列而兩儀之位定隂陽交而五行之氣固于是剛柔相摩八卦相盪而盈天地間皆易也是卷之所載者雖未列于經傳然前輩據易卦為之布列亦自有深意存焉故天地之風寒燥濕人身之形骸臟腑帝王之禮樂刑政莫非八卦之所定也惟于易卦得意忘象而所見無非易者則是萹亦易道之一端也故併採之以為引伸觸類之一助云太極判而氣之輕清者上浮為天氣之重濁者下凝為地聖人仰觀俯察因河圗而畫卦則天以畫一則地以畫􅄲名一曰竒為陽名􅄲曰偶為隂此上竒下偶者天地之定位中乂者天地氣交四象八卦萬物化生之本樂記所謂一動一静者天地之間也周子曰太極動而生陽動極而静静而生陰静極復動一動一静互為其根分陰分陽兩儀立焉細玩此圗可以得意而忘言矣天地之數中乎乂圗書之象著乎乂皇極之位建乎乂乂者中也中也者四方之交㑹也東木西金南火北水其行之序則曰木火土金水木火為陽金水為隂土居中央亦隂亦陽其生之序則曰水火木金土水木為陽火金為隂天以一生水而地以六成之故河圗一六居北而為水地以二生火而天以七成之故河圗二七居南而為火天以三生木而地以八成之故河圗三八居東而為木地以四生金而天以九成之故河圗四九居西而為金天以乂生土而地以十成之故河圗乂十居中而為土交貫四氣而作其樞紐也是故五行之象見乎天五行之質具乎地人肖天地以有生具五氣以成形稟五性以成徳故語性道者無一不夲于是得其氣之正且通者為聖為賢得其氣之偏且窒者為愚為不肖然五方之習俗又各隨其所見而局于一偏其嗜欲好尚亦有所不同者矣東方生地曰之所出故習見其生而老氏有長生之説西方收地日之所入習見其死而佛氏有寂滅之説南方明盛陽之伸而神靈著焉北方幽翳陰之屈而鬼怪見焉惟聖人中天下而立定四海之民嚮明而治無思也無為也寂然不動感而遂通天下之故天下之至神也周子曰聖人定之以中正仁義而主静立人極焉朱子曰陽儀生竒為太陽生偶為少隂隂儀生竒為少陽生偶為太陰舊圗四象平布生生不息今圗陽儀下生一竒一偶為陰陽隂儀上生一竒一偶為剛柔四象圜轉循環不窮剛交于陰陰交于剛陽交于柔柔交于陽上下左右相交而萬物生焉周子曰陽變陰合而生水火木金土五氣順布四時行焉傳曰立天之道曰陰與陽立地之道曰柔與剛此之謂也右兩儀生四象隂儀上生一竒為少陽少陽者陰中之陽東方陽氣生物于時為春春蠢也物蠢生乃能運動故中規在天為風在地為水上為嵗星在徳為元元者善之長也在體為筋在臟為肝通于目在志為怒其聲呼其色蒼其味酸其音角其畜雞其榖麥其數三木之生數陽儀下生一竒為太陽太陽者陽中之陽南方陽氣養物于時為夏夏假也物假大乃宣平故中衡在天為熱在地為火上為熒惑星在徳為亨亨者嘉之㑹也在體為脉在臟為心通于舌在志為喜其聲笑其色赤其味苦其音徴其畜羊其榖黍其數七火之成數陽儀下生一偶為少陰少陰者陽中之隂西方隂氣歛物于時為秋秋也物揫歛乃能成熟故中矩在天為燥在地為金上為太白星在徳為利利者義之和也在體為皮毛在臟為肺通于鼻在志為憂其聲哭其色白其味辛其音商其畜馬其榖稻其數四金之生數隂儀上生一偶為太陰太陰者隂中之隂北方隂氣藏物于時為冬冬終也物終藏乃可稱故中權在天為寒在地為水上為辰星在徳為貞貞者事之幹也在體為骨在臟為腎通于耳在志為恐其聲呻其色黒其味鹹其音羽其畜彘其榖豆其數六水之成數中央者陰陽之中四方之内經緯交通乃能端直故中䋲于時為四季在天為濕在地為土上為鎮星在徳為誠周子曰元亨誠之通利貞誠之復在體為肉在臟為脾通于口其志為思其聲歌其色黄其味甘其音宫其畜牛其榖稷其數五土之生數右本前四象生八卦圗陽儀上者交于左隂儀下者交于右而成此圗康節先生云坤北乾南離東坎西震東北兊東南㢲西南艮西北者指此而言其中者太極也者二儀也前象竒偶定上下之位由天地四象八卦總之而㑹于中所謂歛之不盈一握萬殊而一本也此圗陰陽列左右之門由動静四時八方推之而逹于外所謂放之則彌六合一本而萬殊也古者包羲氏之王天下也仰則觀象于天俯則觀法于地觀鳥獸之文與地之宜近取諸身逺取諸物于是始作八卦以通神眀之徳以類萬物之情與地之間一本有天字易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業右四象陽下交于柔柔上交于陽而成乾坤天地定位艮兊山澤通氣剛上交于隂陰下交于剛而成震㢲雷風相薄坎離水火不相射天秉陽垂日星離為日兊為星在天者仰而反觀故乾兌離震天之四象自上而下生地秉陰竅山川艮為山坎為川在地者俯而順察故坤艮坎㢲地之四象自上而下生八卦相錯上者交左下者交右則乾南坤北離東坎西而先天八卦圎圗之象著矣震艮互觀反震為艮反艮為震則乾坤艮㢲居隅坎離震兌居中而後天八卦方圗之象著矣由是動静相資先後互體圎方變用而天地造化之義不可勝既矣邵子曰乾坤為大父母見四象圗復姤為小父母見八卦圗夫易根于乾坤而生于復姤盖剛交柔而為復柔交剛而為姤自兹而無窮矣又曰八卦之象不易者四乾坤坎離反易者二震反為艮兌反為㢲以六變而成八也八卦本象諸圗總叙易雖不可為典要然六十四卦三百八十四爻聖人逐卦逐爻既有象以示之又有辭以訓之自有不易者在也但滯于象者非知變者也泥于辭者非窮神者也本卦爻已有象矣而其象為至賾本卦爻已有辭矣而其辭為不窮故是萹之所編者如八卦本象乾坤六子六十四卦對待循環與夫八宫闔闢往來終始變與不變在先儒各以所見為之圗焉要之莫非易中無窮之象不盡之辭也于此體咸之虚受大畜之多識而潛神以㑹通之則易之所以不可為典要者即此可識其微也已豈曰凡圗與言茍非聖人之手筆而可以盡削之哉右本前四象生八卦圗陽儀上者交于左陰儀下者交于右而成此圗康節先生云坤北乾南離東坎西震東北兌東南㢲西南艮西北指此而言其中者太極也者二儀也前象竒耦定上下之位由天地四象八卦總之而㑹于中所謂歛之不盈一握萬殊而一本也此圗隂陽列左右之門由動静四時八方推之而達于外所謂放之則彌六合一本而萬殊也六十四卦生自兩儀圗是圖也六十四卦始乾終坤其實只是隂陽迭為消長循環無端雖爻至三百八十四亦只是陰陽二者而已故曰一隂一陽之謂道六十四卦隂陽倍乘之圗皆自然而然况自復至乾皆上生自姤至坤皆下生要亦隂陽倍乗焉耳觀象自見乾三畫而為天者以一函三也坤六畫而為地者耦二而為六也天一地二之本數天竒地耦之本畫不待較而可知然妙理在乎一函三二函六耳乾一函三故索為三男而皆竒坤二函六故索為三女而皆耦此天地生成之理豈不妙哉震為雷雷出于地下故一陽在下坎為水水畜于地中故一陽在中艮為山山形于地上故一陽在上然陽動隂静以動為基者故動震是也以静為基者故止艮是也動者在中非内非外故或流或止或動或静焉此坎所以為水巽為木木發生于地下故一陰亦在下離為火火出于木中故一隂在中兊為澤澤鍾于地上故一隂在上然隂柔陽剛故木也始弱而終强陽在末也陽明而陰晦故火也外明而内晦陽在外也陽燥而隂潤故澤也外潤而内燥陽在内也或問澤内燥何也内燥則能生金外潤則能鍾水金所以能生水土所以能生金者即澤而知之也聖人豈茍示哉邵子曰太極既分兩儀立矣陽下交于陰陰上交于陽四象生矣陽交于陰陰交于陽而生天之四象剛交于柔柔交于剛而生地之四象于是八卦成矣八卦相錯然後萬物生焉是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四故曰分陰分陽迭用柔剛易六位而成章也十分為百百分為千千分為萬猶根之有幹幹之有枝枝之有葉愈大則愈小愈細則愈繁合之斯為一衍之斯為萬是故乾以分之坤以翕之震以長之㢲以消之長則分分則消消則翕也圗書編卷四
