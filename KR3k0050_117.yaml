body:
  text: 圖書編卷一百十七明章潢撰國朝兵制國朝設都督府五都指揮使司二十一留守司二衛百九十一守禦屯田羣牧千戶所二百十有一宣慰招慰安撫長官九十五番夷都司衛所百有七各綂其軍及部落聽巡捕軍器漕運京操守備征調朝貢保塞之政令大都五千六百人為衛千一百二十人為所百十有二人為百戶所所設總旗二名小旗十名大小聯比以成軍國大師則詔文大臣總督提督參贊軍務而總兵官佩將印領之既旋上所佩印於朝將歸第軍囬衛所聽調而武官不得輙下符行軍其京師簡練三營軍曰五軍營五軍將兵曰神樞營司旗纛曰神機營習火器神樞馬隊神機歩隊五軍兼之而綂以文武大臣十二衛番上宿衛衛皇城四門領銅符分信地以為守宵夜鼕警禁衛兵卒日給食家無丁中有父母若單夫隻妻者諸存恤優厚而嚴上直折五頂替之律錦衣衛主禁庭鹵簿儀仗之事旗手司主旗纛金鼓之令諸衛皆綂軍卒而錦衣衛獨領校尉力士葢周之虎賁也諸軍皆正卒而府軍獨僉㓜軍即漢之六郡良家子也諸衛官皆世獨錦衣不世以使能時兼刑獄而以嚴禁衛為要官大都京師約宿軍三十餘萬畿内約二十餘萬盡諸邉之兵不過此括諸省之兵不當此也故戰則國威犂邊庭守則國固居重馭輕之制凛如也國朝兩京十三省都司衛所馬歩官軍員名北直𨽻親軍衛三十九属所二百五十守禦千戶所一在京属府衛三十八属所三百三守禦千戶所二在外直𨽻衛三十九属所一百三十二守禦千户所九大寧都司領衛十属所五十四守禦千戶所一萬全都司領衛十属所七十六守禦千戶所七京營見操并外衛馬歩軍共一十一萬七千三百餘員名巡捕官軍五千六百餘員名薊州保定宣府三鎮馬歩官軍共十萬五千八百餘員名南直𨽻親軍衛一十六属所一百一十二守禦千戶所一在京属府衛三十三属所一百九十六守禦千戶所一在外直𨽻衛二十八属所一百四十五守禦千戶所十五中都留守所領衛八属所四十守禦千戶所一京營馬歩官軍舍餘夷人共二萬八千九百餘員名在外衛所除中都留守司二班京操外馬歩官軍舍餘共四萬四千八百餘員名山東都司領衛一十九属所七十五守禦千戶所一千二本都司所属除二班京操外馬歩官軍六萬三千八百餘員名儀衛司三遼東鎭領衛二十五所十一關二營堡一百馬歩官軍九萬八千八百七十五員名山西都司領衛九属所四十又所七本都司所属馬歩官軍舍餘夷人一萬九千五百餘員名行都司領衛一十四属所七十又所七本都司所属馬歩官軍四萬六千餘員名儀衛司三陜西都司衛二十六属所一百三十四守禦千戶所一十二行都司領衛一十三属所五十六守禦千戶所四總延綏寕夏甘肅三鎮共馬歩官軍舍餘土逹一十三萬九百餘員名儀衛司四河南都司鎮衛一十四属所四十九守衛千戶所七本都司所属除二班京操外馬歩官軍一萬五千九百餘員名儀衛司八浙江都司領衛一十六属所一百二守禦千戶所三十五本都司所属馬歩官軍三萬九千九百餘員名江西都司領衛三属所十五守禦千戶所十二百戶所一本都司所屬馬步官軍一萬二千七百餘員名儀衛司二後併入南昌衛湖廣都司領衛二十六属所一百三十宣撫司安撫司九長官十四蠻夷官司五守禦千戶所二十六宣慰司二属長官司八鄖陽行都司領衛七属所三十守禦千戶所八本都司所属馬歩官軍舍餘七萬一千六百餘員名興都留守司一儀衛司十一四川都司領衛一十二属所四十九宣撫司二安撫司七長官司二十二守禦千戶所一十一長官司二招討司一行都司領衛六属所三十五長官司五守禦千戶所八本都司所属馬歩官軍九千六百餘員名儀衛司一福建都司領衛一十一属所五十六所一十七建寧行都司領衛五属所三十守禦千戶所四所属馬歩官軍共四萬八千二百餘員名廣東都司領衛十五属所六十八守禦千戶所四十五本都司所属馬歩官軍三萬九千四百餘員名廣西都司領衛十五属所五十五守禦千戶所二十一本都司所属馬歩官軍一萬二百餘員名儀衛司一雲南都司領衛一十七属所百六一安撫司三長官司三守禦千戶所一十二本都司所属漢土逹馬歩官軍八萬一千四百餘員名貴州都司領衛一十八属所九十三長官司一十三本都司所属馬歩官軍三萬七千四百一十七員名皇朝兵制沿革國初設太平等翼元帥府以綂諸道兵設總制親兵都指揮使司及都鎮撫以總禁衛後改諸翼為親軍立大都督府設内外衛所及各處都指揮使司後又分大都督府為五府外衛綂於都司而都司及内衛各以其方𨽻五軍都督府惟親軍不属其都司衛自永樂以來添革改調前後不一各處土官衙門有属都司衛所綂轄與都司職掌所載互有異同總天下都司一十七留守司一内外衛三百二十九守禦千戶所六十五總天下鎮守二十一分三十三守備百國朝京衛在京上二十二衛曰錦衣曰旗手曰金吾前曰金吾後曰羽林左曰羽林右曰府軍左曰府軍右曰府軍前曰府軍後曰虎賁左是為上十二衛其金吾左金吾右羽林前三衛本北平三䕶衛所改者曰燕山左曰燕山右曰燕山前曰大興左曰濟川曰通州本北平都司衛是為上十衛几二十二衛名親軍指揮使司曰騰驤左曰騰驤右曰武驤左曰武驤右是為四衛亦名親軍指揮使司曰武功中曰武功左曰武功右以匠故𨽻工部曰永清左曰永清右曰彭城三衛長陵景陵獻陵裕陵茂陵泰陵康陵七衛為陵衛並不𨽻都督亦不稱親軍曰留守左瀋陽左瀋陽右驍騎右鎮南龍虎六衛𨽻左府留守右虎賁右武德三衛𨽻右府留守中神䇿和陽應天四衛牧馬千戶所𨽻中府留守前龍驤豹韜三衛𨽻前府留守後武成中神䇿後忠義左忠義右忠義後忠義前義勇後義勇右大寧前大寧中蔚州左㑹州富峪寛河興武鷹揚神武左十九衛𨽻後府留守五衛者本國初都鎮撫司總領禁衛改為留守五衛專巡察守衛京衛𨽻都督府者上府移兵部親軍衛直逹兵部凡入營者聽營文武大臣督理國朝京營之制主訓練在京官軍永樂遷都於北又於中都大寧山東河南附近衛所摘撥官軍輪班上操以内衛京師備四方征伐云邇年以來兵制漸更大都有曰更卒如中都河南山東班操軍是也曰繇戍如延綏寧夏入衛軍是也曰役荑如遼左抽添軍是也曰召募勇敢常川操練及臨時調遣之軍是也國朝軍營五軍營大明會典云五軍營中軍左右掖左右哨管操練京衛及中都留守司山東河南大寧二都司各衛輪班馬歩官軍長語云國初止有五軍營三千營大明㑹典云三千營五司管寳纛令旗長語云永樂初始以旗寳纛下三千小弓手立三千營神機營長語云永樂中征交趾得神機火箭之法因立是營大明㑹典云神機營中軍左右掖左右哨管撡演神銃神礟神鎗火器是營與五軍三千為三大營團營總三大營大明會典云景泰初選大營精銳官軍分立十一營每營官軍六萬員名團操以備警急調用成化間分為十二營奮武耀武練武顯武敢勇效勇果勇鼔勇立威伸威揚威振威十二營内各分五軍五營管内外馬歩官軍三千管管内外馬隊官軍神機營管内外歩隊官軍將軍營大明㑹典云錦衣衛侍衛將軍自為一營下班之日照例操練從管領侍衛官提督四衛營大明㑹典云騰驤左等四衛勇士軍人餘下别為一營從御馬監官提督操練其坐營等官並於四衛指揮等官推選營官大明㑹典云三大營各營管操官曰提督各哨分管官曰坐營曰坐司俱兵部奏請於公侯伯都督都指揮内推選永樂間始兼用内官而神機火噐特命内臣監之曰監鎗又有掌號把總把司把牌等官俱於都指揮内推選團營提督及坐營掌號把總等内外官員畧如三大營之制而命兵部尚書或都御史一同提督國朝京營沿革京營操練之法洪武時止為五軍營分大小教塲與城内城外操練永樂初分為三大營曰五軍營有歩隊馬隊専教陣法曰神機營皆歩肄習火噐曰三千營背為馬隊専扈從出入管車輦寳纛等事每營以公侯伯二人充提督某營總兵官景㤗三年兵部尚書于謙建議立團營揀三大營中壯士團練就於三營六提督中揀二人充提督團營總兵官即於五府中涖事文臣提督以兵部尚書是年團營總兵武清侯石亨遂請故都察院改為帥府天順元年罷團營成化元年復立團營尋罷成化三年又復團營團營之兵名為頭撥初團營分為十營後增為十二營一營以侯伯都督等官一人為坐營官有事出征不必揀選但撥某營出征則某營將領其士卒啓行承平日久團營非復操練之舊又立東西官㕔名為聽征葢三營變為團營團營變為東西㕔也祖宗㣲意不欲武臣權重在内營操官止管操練者無間設衙門亦無印信在内五府有衙門印信理常行政務至於營操非特命不得干預葢五府三營十二營職不相侵也至於出征亦不止大將一人必選二三人位相侔勇相等者㕘用之出師之日賜平賊討賊平敵平西征夷征北等印或將軍或副將軍或大將軍隨時酌議必由兵部題請五府亦不得干預事平之日將歸於府軍歸於營印歸於朝其意深矣至嘉靖庚戌罷團營仍為五軍營内分十二小營改三千營為神樞營神機營仍舊三營共設總督京營戎政公侯伯一人協理侍郎一人五軍營副將二人練勇㕘將四人㕘將四人遊擊將軍四人神樞神機營各副將一人練勇㕘將二人佐擊將軍六人以昌國公故宅為戎政㕔給戎政之印柳葉篆文虎紐如將軍所掛印通記京操凡大營三内分為小營三十副將以下三十人人坐一營副將用眞署都督㕘遊佐擊用眞署都指揮或都督大抵綂軍不専於一人練軍不専於一人皆有意焉京營兵制考國家兵制初葢視漢代云漢有南北軍衛尉主南軍中尉主北軍其後南軍增期門羽林北軍增八校秩與執金吾皆二千石說者曰分其權也我國家所設錦衣等十二衛以衛宫禁擬南軍留守等四十八衛以衛京師擬北軍而分𨽻五府與八校意同有事則將握兵兵隨將事已則兵歸於府府歸於朝卒有意外之虞生於一軍而四軍足以制其死命葢髙皇帝以神武久處行間洞悉戎機雖當櫜弓輯矢之時而所為善藏利噐强幹固本執長筴而御宇内者淵乎㣲矣成祖祚燕仍立五府增七十二衛而設五軍神機三千三大營五軍營有歩兵有騎兵教陣法神機營皆歩兵習火噐三千營皆騎兵専扈從而歲令河南山東中都大寧四都司軍畨上練閱於京師營各用勲臣二人為提督自是因而不改而承平日久兵政弛廢迨己巳之變國綂幾危景㤗初于肅愍公始剏議於三大營中簡厥驍銳分為十營還其老弱謂之老家營即於故三營提督六人中推舉其二為總兵而以本兵董之營各行以都督一人有如遇警檄其營則都督以所部出名為頭撥葢三大營至團營一變巳天順初年罷之八年復置成化初年罷之三年復置當是時團營凡有十二行之既久操練寖怠兵多闒葺於是乃立東西官㕔號曰聽征又一變也嘉靖庚戌罷團營復三大營而改三千之名為神樞督總則勲臣協理則少司馬彈壓則臺省而五軍營之為副將者二左右前後㕘將者四遊擊將軍者四樞機二營之為副將者一參將者二佐擊將軍者六自嘉隆至於今間㣲有增損而制固不變今三大營將領副參佐游坐營號頭中軍千把總見為官者五百二十有竒而為軍者十二萬為備兵者十萬有竒一大營中有戰兵有車兵有城守有備兵葢分為二十小營合為三大營又合為戎政府云國初制兵患其聚而難制故主於分既分之後患其散而無紀故主於合分合之間失在政不在制也夫兵猶水也滙為巨浸溢為洪流則且有潰决衝齧不可捍禦之患䟽之别之以殺其勢則汨然赴海而趨老子有言魚不可脫於淵國之利噐不可假人葢高皇之慮逺矣夫收太阿之權役臂指之勢其惟初制哉作京營兵制考京衛與錦衣衛相維之制本朝兵制以親軍二十一衛衛宫禁以五府四十二衛衛京城又以錦衣一衛假任權以制親軍以衆勢制錦衣合親軍錦衣與五府兵又適相當葢彼此羈維之局視周官衛尉中尉所主漢南北軍南北衙宋殿前侍衛司皆無異而錦衣之任獨與唐元從禁軍合其外郡邑之兵各隨地省要以為繁間疎密亦内外援應之局山東河南萬全大寧輪操不三輔而意存管營别設司馬不樞密而鈐攬有事由本兵請符定帥不開折衝府而勢張平時籍歸五府廪經本衛練劄營場隊無離土法甚得矣但無名虚耗而有演弗精奈何問周禮宫正宫伯𨽻冡宰而今錦衣衛無所制何也此後世之冝法也冡宰御宫從古法嫌於既重已不可行於今矣曰周宫正宫伯掌居衛虎賁氏掌行衛司𨽻掌環衛諸門而今錦衣實兼其任夫乃攬乎曰此後世之竒法也錦衣以任權制親軍二十一衛府軍等二十一衛以衆勢制錦衣合親軍二十一衛并武功永清彭城七陵衛與五府兵適相當為彼此相維之局祖宗㣲權非人所能易識也曰周掌居衛者𨽻冡宰掌行衛者𨽻大司馬掌環衛諸門者𨽻司㓂而今錦衣雖通籍兵部然止以文属則大専之委可乎曰此後世之任法也天子有環列心腹之臣也曰古環列心腹之臣非兵衛在内而不出虎士八百人王不出亦不行四翟之𨽻王出而後有事而令錦衣職内直外直司宫門城門緝捕城内城外至守季通州張家灣何也曰此後世之任法也所以通内外幾奸宄之萌開壅閡之蔽也本朝兵制問本朝兵制之善請詳言之曰畿兵今七十一衛不𨽻五府者三十九輕重之勢彼此相當漢衛尉主南軍以䕶宫三署即期門羽林在焉所以親之也中尉主北軍以䕶京城八屯八校在焉所以周之也今制如之時去古未逺兵用畨上南軍調諸郡國北軍調諸三輔今固不可行止以山東河南萬全大寧軍輪操京師亦不忘内外出入之意然漢諸吕之亂周勃可令南軍毋納産先是計除衛尉足為南軍以應巳此南北軍相制漢初設兵之善如此者一壞於武宣大壞於東漢中官統領内省則漢之末政然也但合𨽻三公非三代而下事更替氓𨽻天子而無親軍不可耳唐置十六衛左右千牛四則直侍之衛也驍武威領金吾監門十二則警固之衛也業職各分低昻無别復立元從禁軍為北衙而以十六衛為南衙太宗百騎七營今制錦衣如之益以神武神䇿為天子私人則非所以為制矣且今有禁掖之幾衛而無四方之調發唐又不得而擬之徳宗後宦官握神䇿廢立如取乃有王叔文之變卒之神䇿廢而朱李之禍成其所由來者逺矣宋懲方鎮收天下兵權萃於輦轂有二司三衙四廂統於樞宻院選諸道之勇者以備周廬其尤銳以充班直退癃憊剰員以分州郡且禁旅畨更戍邉及令就糧於外大都専强幹弱枝而甸衛之勢可相使而不相維可相勝而不相應設失一樞密而武道荒矣故自景徳罷試龍衛已不能披甲高球以恩得用兵遂以弱建炎後雖極意經武兵愈衆而宋祚日傾由其始偏重之為弊耳今制以精選為十二團營以老家還三大營握以五府調以兵部練以營長主以敇帥將無常署士無離土隊無出畨較前代為獨得焉軍籍抽餘丁議抽丁者伍耗而籍兵餘之丁以為兵也葢國初之為兵也取之亦多途矣有從征有歸附有謫發有籍選從征者諸將素將之兵也平定其地有留戍者矣歸附者元之故兵與諸僣偽者之兵也舉部來歸有仍其伍號者矣調發則以罪人籍選㧞之編戶途不一也夫取之多途則人無定貫人無定貫則額難乆盈積之百九十年而欲伍不耗不可也雖然一夫一婦異世為族積之百九十年而謂下無餘不足更籍以為兵亦不可也今之言足兵者有三曰清勾也召募也徴調也清勾責辦於歲年效緩而功倍召募責辦於時月費侈而弊滋徴調責辦於旦夕廪困而力老嗟夫非其所樂勞之猶逸數往數來伍無常丁矣清勾不足恃也見利則趨遇害則避以逃以匿費無實效召募不足恃也介胃蟣虱於道塗戈鋋朽敗於寓羈士憊而疫馬瘠而仆徴調不足恃也故議者有抽丁之說焉然抽丁事大懦者憚於賈怨溺者惑於守常夫莫非王臣天地之大分也以籍為定國家之永制也今閭閻之民有一不服庸調者乎甚至藩府之護衛功臣之佃丁有一不供藩府之用功臣之役者乎國初以至於今百九十餘年矣始而一軍繼而餘繼而屯丁繼而復餘理勢必有者也始而一軍繼而絶繼為又不絶又繼乃絶亦理勢必有者也絶者以理勢之必有則罷其勾空其伍餘者不以理勢之必有抽其丁籍為兵是其乗除之道哉取之於民則曰籍定矣民不可以為兵取之於兵之餘復以賈怨守常己之則亦幸絶者十一也即不幸而十二三焉十四五焉將不披堅荷戈矣乎是冝日紛紛於清勾召募而日不足也夫為清勾之善也者不過曰謹單籍之造慎里甲之挨嚴觧補之限而已然亦及於戶在丁存者也丁戶盡者吾末如之何矣為召募之善者不過曰厚募直以鼓其籍速月廪以樂其駐處墾田以永其業而已然亦及於身在長子孫者也身死無子孫者吾末如之何也已夫戶丁單弱者其血食如綫民之無告者也今執縛之拘繫之曰補爾祖伍冝爾也而期功林立族大且茂者則以賈怨守常而不及召募應募者其家徒壁立民之逰惰者也今優厚之責望之曰籍其死力冝爾也而業産丘峙丁廣且閒者則以賈禍守常而不及安在其為絜矩也故嘗曰以費計則召募不如清勾以措用計則清勾不如召募兩計之則清勾召募皆不及抽丁也然有欲行之者矣擬議而心駭指措而頰謗主者未竟其書而隠匿欺漏之弊作賄賂公行矣抽者未至其伍而告訐爭奪之風熾訟獄無已時矣故嘗為之䇿曰衛所之丁與州縣之丁一也州縣之丁有庸衛所之丁有雜役一也州縣丁之庸也有則衛所丁之雜役也無則政之不一也州縣之丁有籍衛所之丁無籍政之大不一而於理大不通者也夫十年編籍制也州縣行之衛所則否三年均徭亦制也州縣行之衛所則否夫不編籍則名姓不登於版圖自天子不得以知其數不均徭則業産不較其盈歉其長又烏得而差别之故曰政之大不一而於理大不通者也夫軍戶族滿十丁者曰其一兵也二三或屯田也其餘則以供是兵也而族滿百丁者亦然胡以供之夥耶官戶族滿十丁者曰品官有優典也是不冝强之也而族滿百丁者亦然胡以優之厚耶是又所謂政之大不一而於理大不通者也欲其一則十年之編衛所冝與州縣同也欲其通則三年之徭衛所亦冝與州縣同也夫州縣之十年有編也合丁以為家合家以為甲合甲以為里役諸公者有定也衛所亦十年有編則三十㧞其一五十㧞其一百㧞其一其所以為兵者不有定乎州縣之三年有徭也一金役民壮二金役快手為武備者不少也衛所亦三年有徭則准民壯以為歩兵准快手以為騎兵其所以為兵者不既多乎是二者以十年編行之尚難以三年徭行之至易今衛所之丁若於無徭以差則其雜役望其長者不少也上之人誠能即是而𨗳之曰三年一審編如民也有不懽然樂從者乎是編也不必付其長也而取諸兩鎮若山西州縣吏之良逺而取諸北直𨽻若山東河南州縣吏之良合二鎮不十餘人人不二三衙所集其丁而公審之有不有謂有無謂無衆曰衆寡曰寡者乎身罔論也而仍給之供視其歩騎三四五六人焉官身罔論也而仍給之優視其禄秩八九十數人焉餘籍之以為庸有産籍之以為調總之以為徭調以為銀差衛所之雜用辦矣單丁以為力差衛所之雜役辦矣壮丁茂族以為兵兵之耗伍充矣兵不曰兵别立之目以實曰僉丁以識曰義勇或以一金為歩二金為騎或以二金為歩三四金為騎皆可也若騎為難則盡以為歩亦可也其無事時耕於野秋集之以乗塞可也秋免乗塞春役之以城塞亦可也今固虞乗塞者寡矣使即守腹裏之墩而以墩卒乗塞亦可也今固虞民堡不守矣即具噐械守附近之民堡亦可也夫無事耕不妨其業有乗城則餽之行糧守民堡保其親故守墩則餽之墩糧有不願從者乎行之二三年則令曰有不願歸農恒於伍者歲給全糧如歩兵其從者當過半也更二三年則令曰有願因乗塞即家塞者給全糧且給墾田則從之者又過半也是非合一政體轉移民心足補軍伍之一大機哉然其始則固冝秘之初曰均雜役次曰僉義勇所謂秘之也議隨里甲以編民兵國初衛軍籍充垜集大縣至數千名分發天下衛所多至百餘衛數千里之逺者近來東南充軍亦多發西北西北充軍亦多發東南然四方風土不同南人病北方之苦寒北人病南方之暑濕逃亡故絶莫不由斯道里既逺勾觧遂難謂冝更制各歸土著除國初編發子孫已數世慣彼風土不願囘原籍者聽中間有願囘者官司給文發囘原籍衛所補伍以後充軍俱即編本省附近衛所庶鮮逃亡易為勾觧雖然此法雖善要不過補偏救弊一時權冝之政而已終不若隨圖里編民兵之為經久無弊何也葢軍隨土著秪省清理勾觧之煩小利而已他弊固自若也若兵隨里甲則可省飬兵之費可省募兵之害可無逃亡缺伍之虞可無孱弱充數與夫驕兵悍肆之患凡昔之所謂弊者一掃而空之而所謂利者悉兼而有之矣不井田不府兵而自得寓兵於農之利嘉靖初楊一清䟽曰太祖設五府四十八衛太宗建都燕京仍立五府增七十二衛設五軍神機三千大營都城之外設大教塲操演武備又以河南山東大寧中都四都司官軍輪聚京師歲教月練無事足以壯國威有警足以禦外侮真得居重馭輕之冝矣厥後天下承平兵務漸弛至正統己巳之秋邊塵不靖幾危宗社景泰初兵部尚書于謙乃於三大營中挑選精銳者分立十營團操是為團營體統尊嚴條教明肅四方有警或用一營二營三營以次挨撥而行不用臨期挑選其選剰不堪者退囘原營謂之老家天順初年罷之成化初年復置後增為十二團營布分益嚴我武益張於時一有警報大軍一出四方懾服嗣後因陋就簡垂四十年而戎馬日耗士卒之殷實者出錢包班而其名徒存貧難者饑寒困苦而其形徒在衣裳襤褸氣息奄奄平居且不能自存安能為國以捍禦百戰之師哉每遇有警欲撥一二萬之兵未免各營通行挑選再欲選撥一二萬恒以不足數為慮是團營與老家無異矣夫軍以衛民民以飬軍今各營官軍月支米八萬一千五百有餘石以一歲計之該食米九十七萬八千餘石是皆百姓膏血之餘也及選用戰兵求一二萬而不足當事者豈不為之寒心哉至於綂兵將軍亦皆臨期選用將不知兵兵不知將遲緩日月旋置軍裝將官已至闗口士卒尚在京城都人相傳為笑曰是不堪用徒費芻糧也中外皆知京軍為不足用正德年間山東北直𨽻羣盗縱横乃調宣大陜西遼東邉軍征之踰年始得平定是豈强榦弱枝之意耶幸而其時三邉無警假使烽火内侵邉兵不可掣調則内盗將置之不問乎啓邉人輕視中原之心不可聞於四方不可訓於後世矣失今不為後益難圖乞敇提督官申教練之法漙優恤之恩禁侵削之害嚴役占之條痛革宿弊修復舊規使耳目一新精彩一變所以壯國家之元氣而延生民之命脉者庶其在此也按此䟽言一代京營沿革利病曉然歲費百萬糧芻而緩急一無所用言京營而天下可知矣愚嘗謂有兵若此不如無之兵而無用曷若己之而議者猶憂軍伍之不充每司府州縣各置清軍官而歲差御史督之亦弗思甚矣觀近時事益可徴近浙西㓂作朝廷徴七省兵討之而置中外數十萬衛兵於不齒惟議調湖廣之苖兵廣西之狼兵與夫召募山東之鎗手河南廣東之新兵而已嗚呼衛軍無用曷若去之奈何猶朘民膏血以飬此無用之物為耶故愚以為不若罷軍勿清停清軍官勿置勿差任其消耗而從事於隨圖里編民壯之制以倣寓兵於農斯為更化善治可久可繼夫治國猶治家也治家者必畜猫以捕鼠畜犬以吠盗常也今人家苟畜猫不捕鼠犬不吠盗則汲汲然思易之矣嗚呼謀國者察此思過半矣昔漢之制有踐更之卒而無營田之兵雖皆出於農夫而方其為兵也不知農夫之事是故郡縣無常屯之兵而京師亦不過有南北軍期門羽林而已有事皆以虎符調發郡國之兵至於事已而休兵則渙然各復其故是以其兵雖不知農而天下不至於弊者未嘗聚也唐置十六衛府兵天下之府八百餘所而屯於闗中者至有五百然皆無事則力耕而積榖不惟以自贍飬而又足以廣縣官之儲是以兵聚京師而天下亦不至於弊者未嘗無事而食也今天下之兵不耕而聚於畿輔者以數十萬計皆仰給於縣官有漢唐之患而無漢唐之利天下之財近自淮甸而逺至吳楚莫不盡取以歸於京師而三司之用猶恐其不給其弊皆起於不耕之兵聚於内非特如此而已又有循環往來屯戍於郡縣者皆出自禁兵由是觀之則天下之地一尺一寸皆天下自為守也官軍户說官軍戶者無是稱也葢自後世始武階之家嫡嗣職孽受庇於是稱官戶兵役之家一補伍餘供裝於是稱軍戶夫古者兵民之合也謂有事荷戈則為兵無事秉耜則為民兼役以為省也後世兵民之分也謂兵出力以衛民民出資以養兵相濟以為便也夫相濟兵民之分也而其本未嘗不一也自兵視之則委身於國而藉飬於家自民視之則家役一人而齎送也迨後官軍戶者出則法制始不同不惟失古封建井田之遺而并秦人所以罷侯置守分土不分民之意亦乖矣揆厥所由葢自制衛始也非自制衛始也置衛而不慮其後始也夫置衛以衛民也衛必資兵於是有旗甲有伍隊有司營羣萬千百人而恒役之是曰軍必𨽻帥於是有百夫長千夫長萬夫長聨萬千百人而恒主之是曰軍官軍有子以補伍餘子歸之州縣以待伍缺有所清也官有子以嗣職餘子亦歸之州縣以待職缺有所嗣也補伍嗣職者役其身而合之於衛所待清待嗣者責之供而統之以州縣所謂其本一也今㧞軍於州縣矣補伍以其子矣而餘子不歸之州縣曰軍戶州縣之繇罔繇也累階於伍矣嗣職以其子也而餘子不歸之州縣曰官戶州縣之繇罔繇也一軍役伍而俟而補者五六十人焉一官嗣職而俟而嗣者百餘人焉議官戶之罔繇也則曰國家以酬功議軍戶之罔繇也則曰軍不與民同由是民繇莫共而衛所無名之繇百出於軍之身矣夫授田而責之耕曰屯田以授民可也授軍餘亦可也今授軍餘而督課收受必以衛所官藉之以營其家者人人也不得已而有鳴曰訟以赴於監司可也於州縣吏亦可也今赴訟者必於衛所官藉之以逞其私者人人也古謂屯田即役兵也故可統之將校今以役伍外之丁而必曰將校非古法矣律曰約㑹謂民與軍訟也故可質之衛所官今軍餘自相訟而必曰衛所官非律意矣甚至民憤軍戶之罔役也則舖夫役必與之較曰軍民各半也州縣吏憤衛所官之營家逞私也則供應廪餼之類必與之較曰州縣衛所各半也夫衛以衛斯民也其軍之勇悍者當為騎兵以出戰無戰則習其技擊老樵不任者當為歩兵以城守無警則日修其睥睨伍缺而取之州縣清解補伍者州縣吏職也既補則授之約束訓練簡閱者衛所官責也衛所官不思其訓練簡閱之道而倥傯於簿書期㑹之間諸軍不習其技擊城守之方而困斃於鞭朴奔走之下百戶長百人罔百人敵千戶長千人罔千人敵指揮長萬人罔萬人敵而日計其何以督課何以剖析以求營家逞私於屯田訟獄之間旗甲罔旗甲實伍隊罔伍隊實司營罔司營實而日計其何以輸作何以賂賄以求免戾於屯田訟獄之間安望其將良而兵精也凡此者軍戶之弊也國家之酬功也章之以物采優之以禄給申之以世𦙍厚矣而必曰其子姓咸復焉則前代未聞也夫古之戍邉也丞相子皆在遣中其曰世世無與者褒佐命元功也品官封君則有給親丁占佃戶崇卑内外有差矣今不問其功之輕重階之崇卑子姓之賢不肖貧富衆寡悉舉而復之非古也國家之置武階也百戶以三級千戶以五級指揮以七八九級非佐命元功也而世世無與以比元功不可也國家之制世禄也百戶歲不過二三金千戶歲不過四五金指揮歲不過五六金非古諸侯比也而世世無與以比諸侯不可也國家之酬戰士也一級畀四金二級畀八金三級畀十金止矣今以三級得百戶不三世優數十人以至十百千世是無殺敵之勲而坐費守功之賞也國家之厲武功也重傷者給其飬死事者字其孤以鼔勇責報也今已畀之官而復復其所出以至十百千世是無重傷死亡之慘而亂鼓勇責報之典也官之富者官之貪者之子孫也不重其禁而縱之貪又賞其貪而復之後既非所以昭徳而塞違其子姓之蒙復者始而朞功降而緦冄降而路人矣挾優占之私逞蠶食之計抑勒其族以取益往復有之又非所以崇讓而敦薄也宗人之爵自其親王之子姓咸有逓降而顧於武臣之後不為之規軍官之禄往往以不賂之故即於其躬有所裭奪而顧於其子姓不為之勒非所以一政體也凡此者官戶之弊也欲軍戶之弊除則軍餘必歸之州縣欲官戶之弊除則官餘必置之差繇軍有理裝則歸州縣者輸之可也捐數丁専之輸如儒生吏胥之供亦可也官有優占則限一世二世可也捐十餘丁専之復如封君戶之給亦可也故曰法不立不行行不變不繼或曰國初置衛也胡不歸除於州縣曰始也但恤其無兵繼也但恤其無繼夫婦二人三世成族國初未之及思也今州縣民籍固有㧞丁為軍世輸之裝而繇民繇如故者謂非國初之制乎國初之武階也胡不計其給復曰始也但旌其戰功繼也復藉其死力數世之下世系踈逺國初未之及思也今隔調衛軍官固有身任征戰而原籍族属繇民繇如故者謂非國初之制乎合兵民以一其本稽丁中以齊其繇是在與權者也是所謂戰兵也以選兵充之凡六枝每枝軍三千人每將家丁三百人歩騎參錯互用陣法悉仍舊貫然不敢以獨騁必恃車兵以為營衛如賊勢輕則以家丁居先騎兵馳之歩兵支譟而從之賊勢重則収入車兵營分部伍協力而守候其懈散復整隊出而戰勢重復入而守此乃奇兵以戰也有時而守焉則正在其中矣議得禦賊之法有備為先必能札營不動而後能守近於城外札營但驅空身之人擺列行伍亦無憑籍賊騎衝突雖賁育安能保其不動哉今必列車為營前施挨牌利器中蔵火器軍士環䕶於中挨牌利辨則賊不得衝營軍士居中則我恃以無恐又火器次第連發賊不敢近則軍心安軍心安則軍營定若連十數營於城外賊欲衝營則屹然難動賊欲逼城則紛然火攻是為計之得者是所謂車兵也以選兵充之凢十營每營軍三千人車一百六十輛每輛軍千人火器弓矢雜出互施陣法一仍舊貫然不敢以株守必恃戰兵以為牙爪如賊輕則以火器居先弓矢雜伎次之助戰兵鼓譟而從之賊勢重則收入戰兵設濠塹協力而守候其懈散復仍前出而戰勢重復入而守此乃正兵以守也有時而戰焉則竒在其中矣此近奉欽依分練弓矢法也大約一營分其半以習弓矢懸銀牌十有二於鐡竿之上初習亦五十歩中多以漸而逺亦以六把總官分領之其法一如火噐圖但不得數數打箭致行伍混亂喧嘩每一人四矢畢即退班而坐積一隊俱畢方令鼓手總打一隊之箭散入隊中令其自相認識其餘悉照火器法施行葢無事更畨迭練有事更畨迭戰又法外意也此近奉欽依分練火噐法也大約一營三千人分其半以習火器設銀牌十有二於木把之上初習約五十歩中多以漸而逺以六把總官分領之五人為一伍皆照隊而坐共向一木把頭一層立以次序發三銃而止中牌把者即時補之以示速賞十二司頭一層打遍却移入第二層而坐第二層即立頭一層位打遍却又移入第三層而坐第三層即立頭一層位打遍却又移入第四層而坐以至向後各層俱打過即練遍事完矣其前一層立者以便放火噐其各層皆坐不得起者以禁攙越代替撒懶之弊一覧各隊盡在目中一人不到一人不打不可得矣其坐欲縱横各去五尺師範查十人管隊查五十人把總官查二百五十人中軍千總官各查一千人將領總查三千人不時巡行歴隊把總官以下及大小闕近制三大營中曰五軍東曰神樞西曰神機以武大臣一人為總督文大臣一人為協理五軍營又析為營者十有六神樞營析為營者十神機營析為營者五總之為三十一營而五軍營設號頭營一神樞神機各一皆領於總協大臣而奉行其命令焉每營將領一人中軍官一人千總官二人把總官十有二人管隊官六十人每軍五十人為隊管隊領之二十五隊為司把總官領之十二司分𨽻於一中軍二千總各得把總官四人軍千人共卒三千人為一營故分之則三十一營聨之則三大營又聨之則總曰京營共得卒九萬三千人而備兵營不與焉分合變化錯綜彌縫是欽定京營之制也國朝操軍之制其寛嚴得中乎每年二三四月為春操八九十月為秋操而又為操三歇五之法以年計之每年止得六月是為年空以操三計之每月止得十日是為月空以寅入操辰散操計之仍放閒半日是為日空通計實操占役一年止當三十日耳是恩法並行而不悖也京營練兵事冝議得營中開操之日總協大臣入營閱視謂之合操其餘各將分日輪操謂之分操規制已定無容議矣以合操言之總協大臣閱操既畢止調集各營騎兵羣聚射打則騎兵之外各營軍有勇怯業有生踈數有多寡亦何從得而周知之也以分操言之每日平明入營分投操演不過揺旗舉礟率循故事而已甚至礟聲甫畢各營尚有較藝未周營陣未竟者固已紛然四散莫可禁止如是操演即日在營中亦何補於事哉巡視科道李等則謂嚴訓練都給事中張等則謂革虚飾誠為有見而至於分别教師加意戰兵嚴振軍紀則尤訓練之急務也合候命下臣等移文戎政大臣督同各將官三大營内先擇武藝熟閑者不拘弓箭鎗刀牌釵火器等藝分發各營立為教師上等者每月量加糧六斗次等每月量加糧三斗以示優厚諸凡金鼓之節進退之度射打之法悉與分管軍兵一一著實講練務求精熟一可當百但有無故誤操與恃頑不習學不用心者聽教師具禀本營將官依法綑打若各軍習學有成堪充教師者但遇各師營教師名缺挨次頂補每年終總協巡視官將各教師逐一稽覈若有教成全隊者給與冠𢃄遇把總員缺許充名色把總教得一半者給賞銀牌花紅教止十名者姑准附過全無教練者除重責外革去教師名糧隨伍操備把總官管領二百五十人中軍官各領五千人一司一哨教練有成即當優薦聽補中軍號頭員缺十分之五者從厚犒賞十分之三者亦准附過全無教練者即行住俸以責後功竢教得十分之五方與開俸各營將領但有全營教練者加以都督僉事若係副將加以都督同知俱准實授若止教得一半者從厚獎賞三分之一者照常供職十分之二者重加罰治全無教練者於祖職上降一級革囘原衛永不敘用號頭坐營則以全營論其賞罰中軍等官則視該營將領以為低昻此後三年之内三營補練著有成效聽本部議請將總協大臣請敇獎諭仍加恩録以酬其勞如無功績聽巡視科道官參論本部酌量教練分數并議黜罰今後總協大臣每遇合操之時照舊各入一營靣加操演操畢掣留一二枝照常放礟令各營先囘止留所掣之兵在營射打馬歩兼試務盡一日之長至分操之日聽各將自掣本營數隊一體竟日校閱仍將見操各項把式增高七尺濶三尺比較賞罰悉如巡視科道所擬施行此外舞鎗舞刀等項旋轉得法者一體加賞夫各營先囘則逸者多而勞者少把式增大則中者多而賞者厚人心自是樂從再難别議犒賞至於長鎗圓牌火噐弓箭悉依兵科所擬不得各為一隊務要長短相參刺衛相雜如五行循環合於古制使彼此得以相成緩急便於攻擊其各營有馬軍士仍令披戴盔甲馳馬演習此不惟身與甲胄相為周旋而人與馬匹亦相兼習熟矣此後各營必須校藝已完營陣已畢各號頭方令抱牌員役赴大將臺處具禀放礟散操若各號頭不查的確輒先具禀者巡視科道將各號頭重加參治庶幾事體歸一議得營中軍士國初不下三十餘萬自景泰而後日漸消减沿至今日數僅八萬單弱之甚深為可憂然所以消耗至此一以冐名頂替之輩更代不常二以各省清軍之官勾補不力三以補軍積習之弊未盡改除坐是日消月耗原額漸損以冐名頂替言之京師之民逰食者衆其始也用賄買補不過希圖食糧其既也畏避艱苦遂至棄伍逃遯且其中或為市棍包當或係虚名在册今值清明之世稽查稍嚴虚數難隱而又操必盡法偷惰難容此開迯者之所以日衆也以勾補言之各衛申報到部未嘗不逐名行勾然各省清軍之官遷轉靡定督責欠嚴雖有解補曽不十分之一何濟於事如此而欲望軍數之足葢亦難矣近該本部題議今後清軍副使等官各省御史差滿之日除必不可勾者不計外俱以十分為率少五分者照例住俸少八分者參奏降用全無勾解者參劾罷斥完至八分以上者奏薦優敘仍備造文册開報解過某省若干一行各省知㑹一送本院查考已經覆奉欽依通行欽遵去訖若使人皆振作軍伍自可漸充臣等仍再咨都察院著落各該御史務要著實舉行若漫不經心囘道之日聽都察院徑自查處以補軍言之舊例凡軍士病故具告到部查册有名方准衛勘實該衛具結到部方給准令送府各府轉送驗軍主事處驗發營操中間更歴數畨既滋衛所之誅求苦吏書之需索在有力者猶能勉强以營辦而窮乏者不免曠役以脫迯雖臣等禁戒頗詳曉諭諄切而積弊在人牢固莫解各該應補之人未入公門先計私費其誰信之哉先年巡視科道官准營中選退老弱摘牌替役本為便益而各該把總官員又復彼此通同以張作李甚至私相盗賣朋分月糧是以食糧則有名在營則無軍營衛之册兩不相對雖春秋歇操之日將摘替之人造册送部大段茫無足據且其未送册之前按月支糧皆未經更正之名也管支官員將何所據以查覈之哉臣等竊謂合無今後各軍告補查册有名照常行衛該衛查覈無異隨具印結呈部本部仍行各府知㑹一送騐軍主事處騐發營操不必兩畨三次致開騙局之門營中每遇春秋開操之時戎政總協大臣㑹同巡視科道通將各營軍士一如薊鎮過堂事例行令本管將官𢃄領過堂中間若有老幼即便革退隨審有無壯丁總協大臣親筆填註另日公同靣騐所報之丁如果精壯照例摘牌替役備將年貌填計牌上隨查某營若干某營若干不必再候將官造册亦不必更候歇操之時總開手本先行送部本部查册有名即准收補查册無名行衛取結但係親族俱准更名食糧若係異姓將妄報之軍行拘責䆒每年止許春秋二次不許零星更替致滋奸弊其尋常迯故軍士各該把總每月朔望開數報部行衛查補如果丁盡戶絶發册清勾此則因時變通舊日之條既不敢廢而告補軍役與摘牌替役亦並行而不相悖矣及照迯軍之法不嚴則補軍之令徒設臣等查得大明律例開載輪操官軍迯在京城内外潜住者初犯打七十再犯打一百送操事例發落官旗無力納鈔者就在原問衙門决打若迯囬原籍原衛者以越闗論其再迯三次者不分革前革後各免决打納鈔京衛調外衛外衛調邉衛俱𢃄俸食糧差操欽此但條例所載止嚴官軍在迯之刑未嘗示以自新之路本部出給簡明告示張掛通衢曉諭節年在迯員役限一月以裏自首歸營免其責罰一月之外仍不出首者許諸人首告於本犯名下追銀二兩充賞其有親鄰容隱者一體治罪此不惟在迯者有招集之機而見操者亦不敢萌棄伍之念矣再照補軍之法固當議處而役占之弊尤當嚴禁是役占者亦消耗之一端也訪得該營將領既領軍伴銀兩仍又額外役占至有差遣迎送倩人役使者亦有賣放偷閒供辦煤水者甚至公侯伯應襲亦送跟十數名者將領且然其於中軍千把總勢烏得而禁之者合候命下本部備行總協巡視查照條例事理跟隨軍伴總督不得過二十四名書筭二名副將不得過二十名參遊不得過十入名號頭不得過十名以上各書筭一名中軍千總不得過五名把總不得過四名此外務要嚴加查訪但有仍踵前弊者即便指實參奏請㫖拿問照例五名降一級六名以上降二級十名以上降三級二十名以上者罷職發邉衛充軍賣放包納者悉准前例其各勲臣應襲既未受有官爵難同見任一體通行查革體訪得出與者受者並行參治總督大臣尤冝正已澄源以端表率若有非分多占亦聽科道㕘䆒庶清役占即以重補練也一諸將分委虚實營盤便是信地𦂳急即行分守周遭挑穵濠塹連環兵車可高一丈如遇賊騎衝突切不可開營只用戰兵以家丁居前京軍次之俟彼開營我車兵堅壁戰兵乗隙勦之彼若結營我車兵對壘戰兵多方擾之相持既久京軍耳目既熟心志自定是練膽之術也候其惰歸方以車兵戰兵互相為用或邀其前或綴其後或衝其左右彼若列營出戰我又連結車營收入戰兵又與相持何者彼深入利在速戰不利持久也今論議者每見少而搶掠便欲速驅素未見敵之兵僥倖於一戰强敵充斥於其外論議沸騰於其中遂置外憂且妨内禍不有定慮安能出謀兵凶戰危何得草草以是知事前論事善敗難䇿非若事後論事功罪易明也譬之孩童能坐而後教立能立而後教行能行而後教馳雖强之坐彼且馳矣膽足故也今論事者已知勘破此闗諸將當事者亦須勘破此闗議得治兵之法有合操有分練合操而不分練無以熟其技藝之能分練而不合操無以盡其營陣之變二者並行方克有濟即令下操之法列行而立舉礟而行主將入營諸軍環立中軍者進曰禀事件主案者進曰行文書常套既畢方始開操曠日廢時以致將疲士怠未執弓矢未持火噐而精力已先竭矣僅舉合操惟日不足又何暇及於分練哉合無以後合操之日不必分練分練之日不必合操每月以初一初八十五二十三四日為期戎政二臣五鼓入營總閱一次軍士先期至教塲列隊而坐相去五尺一礟起立二礟列營三礟開操照依舊規操畢方演技藝不拘火噐弓矢俱懸銀牌為的中者即以銀牌賞之不中者酌量懲治科道不時巡視聽從其便其餘二十六日戎政二臣至營中軍止舉礟三聲礟畢官軍分入各營聽本管將官自行操練大率弓矢火噐亦俱以銀牌為的中者給之將官下若干人射打中軍千總把總管隊下若干人射打預先分定各另演放務盡以一教十以十教百以百教千之義戎政二臣與巡視科道官不必同在一處隨意各入一營親為較閱除中者亦賞銀牌外不中者亦酌量懲營二技每枝實營盤一處虚營盤一處畧如布棋之勢去城雖逺不過一里二里其戰兵大枝副將四員城東城北城西城南各屯一枝聨絡劄營不必太逺𦂳在闗廂之外聽臣等相度賊勢専備城内城外調遣應援餘下參佐二枝俱隨臣等戎政二臣同駐適中去處一應軍中事冝臣等得以靣相計議外壯車營聲勢内助都城防守庶為兩便將兵練練習教之戰而惜其死也夫民而荷之以戈曰兵生而驅之就死地曰戰不有以教之棄其民矣昔晁錯為漢畫禦戎之䇿而歸之於卒服習懼以卒與敵也然所謂教者有體有用有常有變又有教兵之法教將校之法不可不察也夫金鼓以一其耳旗幟以一其目賞罰以一其心兹三者黄帝以來未之或異也有所聞見而坐有所聞見而作有所聞見而進有所聞見而退是所謂教之體也而未必其致諸用也九九之技不足以盡周天之數倉于之案不足以應尫羸之求不逹其用之弊也可以坐而俾之有聞見則坐可以作而俾之有聞見則作可以進而俾之有聞見則進可以退而俾之有聞見則退是所謂教之用也然皆常也未必逹諸變也刳腹洗腸扁鵲之所任衆醫則懼廽檣倒帆舟師之所習衆人則恐不逹諸變之弊也是故金鼓一其耳不金鼓而耳亦一旗幟一其目不旗幟而目亦一其惟心之一乎心之一者賞罰之一也無濫亦無倖免則賞罰一賞罰一則心一心一則常變一夫是之謂練習乎君以是繩其將校教將校之法也將校以是繩其兵教兵之法也今之所謂練習者吾知之矣寅而集辰而罷已而集未而罷其金鼓震也旗幟翩翩也右此而左彼賞罰錯然也問之兵兵不知其故也此歲武埸金鼓旗幟賞罰爾也來歲武埸旗幟賞罰爾也又歲武場金鼓旗幟賞罰爾也問之兵兵不知其故也此將登壇校吏以是應之曰練習也彼將登壇校吏以是應之曰練習也大將登壇校吏以是應之曰練習也問之兵兵不知其故也金鼓以令之南進而北退施之於東西則否旗幟以令之東坐而西作施之於南北則否教閱之金鼓金鼓卒然有警也而金鼓之耳有不聞者矣教閱之旗幟旗幟卒然有警也而旗幟之目有不見者矣是可以為練習乎舉一將而叩之曰子之持㦸之士某也勇某也懦不知也彀弩之士某也藝某也未習不知也舉一將而私之曰子部曲有善得上意巧為剥下者則盡知之也吁是教兵法耶始下令曰某守某失入敵者以軍法繼下令曰某邀某失出敵者以軍法事已矣失入失出矣則將以委之上曰有大監也大監以告於朝曰請逮治也朝以下之理曰㑹律文也於是曰某也奪禄某也贖金則與始下繼下者左矣其令不足信矣是教將校法耶故嘗曰將授一兵則練習之政冝任其將期之曰耳目心一焉已耳金鼓旗幟坐作進退一焉已耳賞罰一焉已耳不必日暴之日中饑疲之也不必羣集之武塲觀視之也不必寅而至辰而罷火噐千人焉必千人精也弓弩千人焉必千人精也勇力挺手千人焉亦千人精也將一人而與火器者數十人適諸野習試之精熟之善者賞拙者厲度不可教者更代之至暮乃歸旬日而火器者遍矣一日而與其弓弩者數十人適諸野習試之精熟之善者賞拙者厲度不可教者更代之亦暮而歸旬日而弓弩者遍矣又旬日而與勇力者俱勇力者亦遍矣由是某也勇某也藝某也遲巧某也疾拙將無不心其之也某之器大良某之器良某之器稍良將無不心具之也問之一則舉其十責之用則呼其名夫是之謂練習也兵以是為式是之謂教兵將以是為殿最是之為教將校始下令必慮其可繼繼下令必慮其可終終稽功罪必徇其所始夫軍法者杖百馘劓斬首也庶刑者笞杖徒流贖也始之以軍法而曰杖百馘劓斬首終之以庶刑而曰笞杖徒流贖又何怪其心之不一也又古人之言曰賞善不崇朝欲民速得為善之利也夫善善長者人君之度也威克愛者大將之體也賞善欲民速得其利而軍法可使不速伏其辜乎是皆所謂教兵教將校之法也各省府州縣練兵議東南之有倭患垂一紀於兹矣謀臣畫士抒思振藻談兵事者言人人殊葢更僕未易數也然總其大較往往以團練郷兵謂為保障第一義一時名公鉅卿咸韙其說斷然力行之然而明㫖屢厪責成極備而夷考諸鎮卒鮮郷兵之實效者豈官之曠怠吏之愆違致然哉無亦講之未明名之未審故奉行者多至掣肘而囬報者每屬空文耶夫兵有主有客有郷三者不同召募土著與之工食而責之常川操備者此主兵也調自他省厚之輸將而資其遇敵截殺者此客兵也暫時起倩不給工食而令其自相保障者此郷兵也客兵可暫而不可常而每失於不練若郷兵則可團而不可練何也葢所貴乎郷兵者謂其聨属郷之材官豪傑使其無事則自相結納於平時而有警則相與守禦於一旦官無飬兵之費而郷多敵愾之夫人自為戰家自為守斯之謂保障之要術也然若此者必也未事之先籍其姓名而團之盡放歸農有警按其姓籍而召之使自堵截近不出其郷閭逺不越其縣鄙有功則賞㓂退則散不查㸃不他調事不煩而民不擾夫然比閭利於自衛父子切於相守彼始懽然競役羣然趨命雖勞而不辭之死而靡怨此之謂可團若加一練字則必將董之以官師聚之於城市朝督而夕課多聚而少散妨其生業費其輸將小民之情夫既所不堪矣况一經戰勝調發紛然近者越郡逺者越省居常則有饔飱怨曠之嗟接戰則切鋒鏑死亡之慮此與驅之從軍等耳即有郷之材官豪傑將相與疾首蹙額争自隱避葢惟懼其影嚮之不幽也欲招􅝘之俾籍其力得乎夫名實既紊既不足以致郷兵之材賢而明詔有嚴又不容已於郷兵之團練於是督撫責之監司監司責之郡縣或限大縣五百小縣三百之數或授以五人為伍十人教百之法督責諄切猛於烽火其奉行之者轉急而民之避匿者轉深為有司者始出其不得已之䇿責令里甲照圖出兵暗行僱募謂非是無以稱塞明命以自逭罪責而地方遊手無頼之軰遂相率攘臂應役以饕飱里甲而甘心焉比有警急彼遊食無頼者率望風潰奔而地方之無兵如故廼羣而訾之曰此郷兵之不足恃也不亦惑哉無已其練主兵乎夫地方未嘗無兵患所以招來之者無術誠得其術以招致之又厚其餼以優飬之擇其長使相統攝順其好使相什伍董之以亷明仁威之帥教之以坐作擊刺之法其平時則務使小卒之情能通於什長什長之情能通於百長百長之情能通於哨官以上逹於主將官臨敵則務使主將之法能行於哨官哨官之法能行於百長百長之法能行於什長而下及於小卒居相比也樂相丼也患相苦也將相愛也卒相畏也如是雖赴湯火可也以此而攻則無堅城以此而戰則無强敵何倭之不殱何㓂之不殄哉曰然則郷兵可廢歟曰胡可廢也夫練主兵所以戰團郷兵所以守既團郷兵又練主兵是隨地皆兵大小可戰也夫是之為不可勝夫是之謂强國兵法總論夫兵也者兩設而互敵者也必知之然後能待之必待之而後能勝之法曰知彼知已百戰不殆言貴知也以近待逺以佚待勞以飽待饑言貴待也避實而擊虚變主而為客言貴勝也然則逺近者何言地里也高壘深溝據險而守是之謂以近待逺勞佚者何言士馬也敵來挑戰堅壁不出是之謂以佚待勞饑飽者何言芻餉也轉輸多蓄積富是之謂以飽待饑虚實者何處乎近得其佚遂其飽則實否則虚主客者何處乎近得其佚遂其飽則主否則客虚實主客有常行乎曰水無常勢兵無常形敵而有智者出攻我要害不得不徙則逺近易矣應救煩擾則勞佚易矣絶我餉道則饑飽易矣故不為敵撓則我為主而實敵能撓我則反為客而虚善戰者避實而擊虚則實者亦虚變主而為客則客反為主實者亦虚未有弗敗者也客而為主未有弗勝者也夫兵皆喜勝而卒或弗勝皆悪敗而竟底於敗者弗知彼也又弗知已也時勝時敗者或知彼而不知已或知已而不知彼也誠知彼又知已則何敗乎將明其說必徴事焉其證在李牧之制匃奴趙充國之平西羌此兩將者明彼已審主客計虚實通於法術合乎勝道當時稱之傳於後世昔日匃奴侵趙而李牧守鴈門匃奴數入㓂牧誡士卒勿出戰第日椎牛與士卒共食士卒日賞賜而不用皆願一戰曰吾主何怯也李牧若弗聞匃奴玩之復大入牧勒兵大破之終牧之身匃奴不復來夫牧豈怯敵者哉以為吾卒弱而敵縱以弱卒當縱敵如以卵投石必無幸矣故且待之待之數年一舉而破之若口中虱焉假令牧揺於唇吻怵於邪說則䘮其本謀趙之亭障卒不觧甲鼓不停桴永無安枕之期矣昔者漢伐先零以充國往充國引兵至先零見先零或降或叛度其必壊上書請罷騎兵留屯田為坐勝之䇿書三上乃得報分兵為九校校各萬人因田致榖亂羌衆不得處肥饒之地居數年先零果大困殺其首惡楊王以降充國書曰臣豈不知引兵逺攻自避嫌疑此人臣不忠之利非社稷之福也嗟乎至言哉假令充國不力争輒以天子詔討之先零兵强而自據善地軍士困於寒苦之域罹於疲餒皸瘃之患變且不測况望縣首藁街哉法曰善戰者致人而不致於人李趙二子誠有之矣頃歲以來北人穿塞為㓂大入大利小入小利我軍遇之輒靡屯之輒解此無他故彼兵與法合我兵乖所謂也彼合法云何彼雖千里趨戰於法為逺然絶澗踰垣遂有其險則奪我之近經渉川谷日夜而奔於法為勞然既入塞結營如堵晝掠夜歸我軍捄東則擊西捄甲則擊乙則奪我之佚不持糧不載芻於法為饑然一入其地即食其有困圍我軍餉道轉絶則奪我之飽我乖法云何頺垣壞壁延敵而入不可謂待逺戍卒候望力孤勢弱又不畨休不可謂待勞月廪冬衣踰時不給不可謂待饑且欲為待之云何多邉且勿論論其至切者今國家建都於燕西北以宣大為蔽東北以薊州為藩彼宣大邉垣既已底績而薊州一路顧有遺謀雖稱峻嶺絶攀巉石拒口然地形延袤通外之孔道尚衆自今作之西接宣化東連山海為邉千二百里誠使幹濟之臣戮力經營令睥睨繦属亭障星聨敵騎望見無可柰何患可少止乃所謂近待逺也戍卒所備者多故力孤力孤故勢弱今可徴募新軍填實空缺以今邉千二百里為准每百里為一軍每軍五千人析為十二區每區置一將領之寛則練習急則拒守分畨乗障飬其精銳乃所謂佚待勞也司計大臣㑹計内帑若干外儲若干月廪冬衣應時給發賞賜犒予不期而至内帑不足取之外儲又不足令民買爵贖罪務益蓄積敵若臨邉明以宣示以折其氣而伐其謀乃所謂飽待饑也然彼計狡獪閃忽且欲知之云何邉法故有逺哨近探之卒惟逺哨者未至敵營返而紿我近探者敵兵已廹懼為所得張設危言不符情實以故不能知彼既不知彼遂昧所待亦不知已勝歸彼敗歸我獨坐此耳今之邉將各飬死士數十人親信既深豈忍負主若驅之哨探令與逺近偵卒偕往偕來偽口不至真情可獲乃所謂知之也且欲勝之云何敵凡大掠必悉衆而行搗其巢穴以牽制之則内顧而憚逺渉多設疑事離其上下之心令謀臣不用驍將惰體乃所謂避實而擊虚變主而為客制勝之術也法令久弛人心不肅且將為所欲為云何曰嚴法董閼於行石邑山中見澗深峭百仭問之傍人癡兒牛馬無有入者董乃嘆曰使吾法之無赦猶入澗之必死也則人莫之敢犯也夫人不敢犯則臂揮頷招隨所東西何功不可立何事不可與也法太嚴則厲又欲令人親我云何曰厚賞越王欲伐吳而未知人心乃自焚宫室下令曰捄火者比勝敵之賞趨而赴火者六千人因遂伐呉㓕之夫利之所在人忘其害皆為孟賁婦人拾蠶漁者握鱣所利在此也設我欲為之而人固撓之云何曰堅其志而已始李牧之壁軍也趙王用人言誚讓之已又奪之既代者弗利王是牧計聽焉言者自失充國奏事時廷臣非議者十七人中十五人後計定上詰前非議者皆頓首謝吹竽滿庭孰辨其美一一聽之乃識其竒夫難與慮始可與享成自古記之觀於二事則吾志决矣志决則功可就矣雖然士而有志於天下者豈少哉至成功則未焉何也機有所難窺變有所難矯勢有所難移或以敢任而坐鬻權或以周謀而目炫智或以革蠧而誣亂法或以振惰而誚苛衆流言三至慈母不親况君臣之際乎此有志之士欲為而懼其撓也彼李趙二子其志誠堅然亦遇主今者聖人御世畢照羣情志士奮袂而作投軀而往其誰撓哉其誰懼哉西北兵食詳見户曹邉餉國家財賦倚於東南轉漕山東入於惠通歲輸大司農者四百萬石其開立各邉即如宣鎮一歲銀九萬兩而民賦居十之七他鎮可知正統間又發内帑濟邉正徳間王文恪建議謂國家邉費最大歲用銀四五十萬葢欲以省之也至嘉靖間則折變於荒歉之歲而饋給於邉用之窘世宗乃欲責成計部全輸舊徴後敵侵軼厚輯廣募三鎮歲餉且增此時猶為促辦計也今乃為額葢天下之力困於九邉尤困於此三鎮矣故論者謂北人且欵諸鎮之入衛南兵之寄寓可漸議撤也諸召募修邉等皆可議覆也又講屯田之法通鹽商之利復本邑之徴洪武永樂間内郡之饋邉者惟芻粟自折易之法行而待哺之卒困矣自召買之令下而瞞宫之弊滋矣以預其儲焉如是則兵無所慮其冗而財將益贍財無所慮其窘而兵將益强雖成周兵農為一以順治威嚴於天下者不是過矣東南兵食東南之地自島夷内訌以來當事者計無所措始為召募民兵之議為徴調客兵之議及兵衆雲集餉給不敷於是為增𣲖餉額之議為借括冨民之議民之告匱者乆矣方今海徼幸已晏恬而歲灾相仍十室九空論者謂兵衛民而飬兵之費乃至病民使兵食仍舊是冦來無期而已先坐受其弊矣散兵减賦似所當講第常時多警之地若閩廣呉越之區盗賊出没兩海肘腋倉卒何以支之則兵食兩端不得不圖所以為善後之䇿也葢兵不能遽聚於有事之時則决不可遽散於無事之日食不可遽徴於有事之日則不可遽減於無事之時故欲散之也而有事不憂其難聚欲減之也而有事不憂其無措亦惟行保甲屯田之法而已夫保甲即先王寓兵於農之遺也誠講求而申飭焉三時務農一時講武器械所備犒賞所需取諸兵餉之半以給之責成有司以此課其殿最行之漸乆而數萬之衆可號召也况人皆土著自相聨属其於守望捍禦之力視諸客兵尤勝乎屯田即先王伍兩之遺也以起軍旅作田役以比追胥令貢賦此伍兩之制也誠規畫而舉行焉擇地就農因農自食耕具所冝牛種所頼取諸餉之贏以給之責成總管以此稽其勤惰行之漸乆而數萬之衆可安飽也况人有其業勢自相安其於顧戀保護之情視諸客兵尤切乎保甲不惟可以省兵而且可以省試屯田不惟可以足食而且可以足兵二者雖常談而實探本之論也或者謂屯田無可種之地是不然母論他郡試即海虞一邑言之蓁蕪積荒之田棄為閒地及有為民所包占者湖塘漲塞之壖民所占藝且有為官所量科者盖不下千計推之一郡一省可知又若海甸之沃區山麓之曠土亦豈少哉此皆開屯之助也誠建議奏請俾貧民就佃即籍為兵予為世業保甲之法無間於貧富而屯田之法可獨行於貧民其經營之始有司為設法給本而官以統之為畫其疆界築其圍埂導其溝洫使數年之後漸成腴壤㓂去且守且耕㓂來且耕且守庻乎召募之兵可盡撤而加徴之賦可盡蠲矣然實心經理毋為文具則惟在有司之得人而已兵政時弊總論國初奠極雄據勝勢鳩天下重師宿屯京師以强幹弱枝而列郡縁邉各有紀率居京者未嘗越臨邉郡自撤其鈎陳居邉郡者畨休直士校聨不絶以固微垣之衛亦或調郡戍邉邉各相戍如繦属如碁置使軍壘常明而不亂邇年以來軍制漸更大都有司曰更卒曰繇戍曰役羡曰召募亦中古之遺也漢南北軍調自郡國一歲一更以秋日都試今中都河南山東班操軍是已往往苦於力作始暫借役縣官後浸淫至巨室雜供役手資課大繁奚以堪此本所謂兩限赴操者將使荷殳角刄也而顧以畚鍤為哉漢卒直戍邉者各為更律今延綏寧夏入衛軍是已此非令甲也往時内地被敵以薊兵未練假以張掎角之勢乃於役靡遑及期莫代連行囬逺犇命為疲此一時權冝也胡久而不復哉在遼左有抽添者亦漢悉老弱未傳者詣軍之意顧其地歲大侵存罹鋒衂耗者過半而欲括其餘夫旁及客戶彼所稱羡卒者修閭氏尚與之國粥矣而忍為此乎在廣有招集者亦漢選募曰勇敢曰伉健之類無頼子未知尺籍伍符賄通兵尉竄入幕府而相辜𣙜為奸即欲議徹無不嘯聚發遽犇救所在騷然此以禦㓂也而反為㓂乎若此四者遡之初制本善而壞於後人因其有變少假而沿為故事夫墻之崩潰必因其隟劔之毁折舉由於璺今見干戈朽鈍斧鉞混貸却走馬以糞遂指為不祥而莫之講也幾微於隟璺害大於墻劔可不畏歟上軫恤班軍詔罷力役盡歸營伍是矣乃郡國伍籍半析丁壯阻消物力方虚杼軸困竭則當傚周禮比居之法詳覈所部悉清勾之而又官助其資斧給其兵械乃若免役而收其直謂之更賦是殆不可復矣即故直有所逋者令得一切蠲貸可乎入衛者近已議省或三而省一或二而省一稍稍紓已但延綏逺走朔方彫窶既甚寧夏屯牧河曲困憊未甦且牽馬逺渉行者踣於道至者羸於野而復責之使償吾見人馬俱斃主客胥窘矣今薊鎮已宿重兵而延寧為西陲重地脫有緩急胡以應之愚以為盡免焉可也古者國有游倅軍有單所以副其正也今不得已而抽添之無已當厚餉給葢羡卒既搜則糗糧㫖蓄疇為之副冝於常賦之外稍加優厚而猶未給也當廣屯種遼地延袤殆千餘里界山依水可徴常居者室家田作復其繇稅使流移漸集生聚日繁而又嚴逋逃之禁重督邏司候徼支繚以譏䦨出逸海及以賄脫伍者庶幾行伍實而丁可無抽也古者藏兵於民藏食於兵未嘗外索也今不得已而用募曷若召土著高肇恵潮類多矯健籍之行間使家與家相疇人與人相疇即食其地習其將而將不得人不可也當選將領汰其朘削而貪者張疑竊冐而詐者誠得亷勇不二心之士使提鼓揮枹焉而又嚴憲罰之令毋令倖㨗而掩功玩㓂而薄譴能討軍實者與首功同賞削軍以逞者與無功同罰以此制募兵兵亦足恃矣若是者皆小補其罅隙者也而未盡也夫兵能安制矜節而為國家用者有數善焉曰制馭之有方也不然拊恤之愛及人深也又不然則簡習而訓練之也語曰䧟行亂陣千人盡罰覆軍殺將萬人齊勇則必肅其營部結其團伍與之安與之危可以行可以止所謂用天下之用為用制天下之制為制而奚恤乎軍寡語曰畜恩不倦以十取萬必使懼者得歡貪者得豐欲者得使歸者得招庻多同心之衆必死之士可合不可離可用不可疲而又奚恤乎軍寡語曰習而後用一以當百則圓而方之生而死之左而右之聚則成卒散則成列延則若阿刄嬰之者斷兊則若鎁銛當之者碎而又奚恤乎軍寡古之人將少而能辨將弱而能兢惟綏御得冝而卒乗服習故雖匱乏困憊一呼而起無不扶傷渉血而擒敵破軍矣然此所以籌邉郡之軍也而内軍尤有可議焉軍之利害在國之名實今三營之軍名在官而實在家在家者間役私門在官者或朘於衛尉貧不能操一有錢食不能人三鬴而牽露骨馬環立轅門負半石弓載韜櫜鞬弛檐而赴營陳一苃舍則負趨出市絶不談兵在籍則名選鋒一簡稽則羸弱相參曷稱全勇夫經制百萬之衆使依吾衣食而懸虚名罕實用奚以備循鼕之警堅壼欜之守嚴營衛而固本根乎愚謂影射當稽占役當革武胄之侵牟當治文吏之漁獵當懲督理者按籍以徴登耗閱視者决乗以别惰銳若周畿兵若漢中壘蒐田視先王之禮軍國飾對揚之容使内以制外若意使臂臂運指而脉絡融通外以衛内若星隨斗斗運杓而法象森列即畿以外各郡國畨上兵不憂擾也雖有邊隅之警不憂其疽食也而又奚患焉倣井田封建之法為寓兵禦夷之道嘗論寓兵禦夷之道深有取於封建井田之制焉何也即周室觀之幽厲而後周之削弱甚矣雖犬戎内侵中國未聞建閫樹兵如今日者以秦趙燕代各守其地人自為戰此封建之制有踰於長城而土人屯聚賢於百萬師也井田之設不特寓兵於農使國無飬兵之費然無事則盡力耕稼有急則併力戰守室家相保出入相友守望相助其視民出粟以飬兵兵出身以衛民果孰善哉可見封建井田民各自為其家君各自為其國不必樹兵而兵自强不必禦夷而各國自為之禦者不遺餘力此三代乆安長治之道也或曰自秦郡縣天下而阡陌已廢封建井田之制不可復行矣今欲寓兵以為禦夷之䇿必如之何而可以長久無虞哉曰善師古者師其意非師其迹也為今之計豈必易天下郡縣而封建之奪天下民産而井田之哉嘗考井田之制溝洫川澮各有定限南東其畆縱横其疆馬不得並轡車不得方軌即均田制禄之中寓設險守固之意也今各邉曠野一望千里誠使提督大臣得以便冝行事召民開墾畧倣井田之制每一里共濬一溝深廣可畜水泉以為灌溉即此可阻敵騎之衝突矣然必定其法令凡有力者聽其墾種三五年後稍𣲖科則以為軍儲又相其形勢立堡以居集之或因邉民屯聚立邉縣以統禦之可也况邉屯之廢多矣即循舊屯之制令各屯而井之不亦可以寓兵於農乎或曰邉地沃衍因井以設地網誠善䇿也其如牛種之不備何曰趨利避害人情也識時務者擇其利多害少者為之耳欲以興利使人皆不趨利也有是理哉成化𢎞治間各邉屯卒嘗因貧乏假貸本衛所官至秋成加息上納雖有害乎上下之體然彼此兩利亦其所願也正徳間巡察使臣惡其専利而禁之屯田遂廢夫因禁衛官之利至廢各邉之屯果孰輕孰重哉知其所由廢則其所由興者可知矣盍令各衛所官凡有才能者聽其招集流民各為保聚者能墾千畆萬畆者隨其力之所至即給為已業仍許薦揚其才能而陞遷之或又設為條例一切官民有能開墾百千萬畆而百畆詳報一人以為其属如什伍之制因其田畆多寡畧倣封建遺意封為百千萬夫之長世守其土世襲其官與論首給封為指揮千百戶總旗之類是闢本有之曠地與開疆拓地者同功使彼各自領其衆自守其疆又何惜為封建之賞哉夫人皆出萬死一生立尺寸功為榮身肥家計目今止費其財力可以獲官爵之榮享封土之利何樂而不為也要在信其命令收效於十年之間則邉方曠野皆井田封建之設較之請朝廷之羡餘以給牛種招鹽商之納粟以資屯費猶有彼善於此者在也况此法豈特可行於邉哉陜西山西北直𨽻與夫河南山東其地本肥饒水可灌溉而棄為荆榛者不可勝紀曷若以此法行之則西北無不耕之地荒土皆財賦之區而軍儲亦無待専仰給於東南矣是故不必盡奪天下之民産以井田之各邉與各省不亦有可以井田之法行之者乎不必盡變天下之郡縣以封建之各邉與各省不亦有可以封建之法行之者乎且人各自出其財以墾其田人各自出其力以守其土國家不過示以井田之法給以封建之賞耳開屯之費守邉之勞不可以少紓也耶噫粟積於邉則價不期賤而自賤民聚於邉則兵不期集而自集欲寓兵於農藏富於民是或一道也而禦夷之䇿冝無善於此者何為吝曠土惜虚銜與斯民較小利而忘國家之大計乎圖書編巻一百十七
