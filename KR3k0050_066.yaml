body:
  text: 圖書編卷六十六明章潢撰四川各郡諸名山四川成都府山曰武擔治北鐵爐城南宜城雙流麗元新都平地特起髙三丈有雙鏡廣五尺金臺金堂石矩仁壽磨玉井研玉女簡逍遙山北有層崖崖有東西二石室玉京資峭險壁立插天連雲儼然在目華萼內江鏵影有二泉竇更流迭止與晦朔之盈縮相應青城灌岷山第一峯有七十二小洞八大洞道書第五洞天乃神仙都會之府丹景彭九隴彭金馬崇寧石紐石泉龍安安多融崇慶石磬彰明岷山茂江水自出直上六十里龍池羅江七盤汝川庚際綿竹雪山威山有九峯積雪盛夏不消浣花溪府城西南錦官城萬里橋西支磯石府城東張華博物志載有人居海上乘槎到天河得一支磯石歸以問嚴君平今蜀人相傳即此石也保寧府山曰天目府城東山有二洞一曰天目一曰天溪大劍山劍一名梁山即山海經云禹迹南部離堆山蜀有三離堆此其一也思依山山有二觀東觀有峻山洞搗藥臺浴丹井煉丹井西觀有平仙洞搗藥臼卓劍穴圍棋局雲臺蒼溪髙四百丈峯峻削插天一名天柱有巖洞玉望巴秋錦通江龍門昭化石燕廣元漫天嶺山極髙聳有大漫天又小漫天大華江油長卿梓潼司馬嘗此讀書五婦梓潼龍巖劍州洞可坐百人蜿蜒如龍盤之狀靈雲洞南部外邃中廣冬暖夏涼順慶府山曰大方城西金泉城西青居城南南岷西充上有九井十三峯鳯凰蓬衮山營山儀隴儀隴白鶴廣安岩渠渠陵山大竹石龜嶽池羊山峯巒秀異山下有洞曰角竹東巖營山縣東又有西巖俯瞰大溪為一郡登臨之勝畫卦石南充其石平如坁上畫八卦文相傳周柱下史李耳于此以足畫之足迹尚存敘州山曰朱提城西石城城西石門慶符多蘭有春蘭秋蘭鳯尾蘭石蘭竹蘭春蘭花生葉下素蘭花生葉上黃庭堅云蘭一幹兩三花蕙十花香不足凌雲富順大江前橫一峯突兀瑪瑙上有羅漢洞內有石佛五百洞前有水簾廳聖燈山山之西有石峯峭拔髙數文如佛像俗呼為聖佛旁有二石如侍者蓋天成也龍騰南溪平蓋有三山九隴惟此山一峯特出頂圓而平故名上有石洞石穴桂輪南溪石壁有黃庭堅大桂輪山四字寶屏長寧閣梯連珠高亭臺筠連芙蓉珙摩旗戎水簾洞府城北瀑布如簾下垂數尺黃庭堅嘗置竒觀亭于旁重慶府山曰塗山府城東岷江南岸山址有石中分名曰龍門其下水與江通左右石壁有鯉魚飛躍之狀山之麓舊有夏禹祠塗后廟瀛山城南崖壁峭拔周四十八里四時常青翠大類蓬瀛長壽長夀固城江津三華大足龍洞永川葛仙榮昌蕞高南川酉陽黔江銅梁合純陽合青石合巴嶽銅梁武勝定逺倚天忠望州涪平都酆都七十二福地之一有唐碑登青武摩圍彭水洞天福地蠻人呼天為圍云洪崖洞府城西棲真洞大茒峽內魚鹿峽府城西明月峽巴縣境匱崖南川夔州府山曰白帝城東赤甲白鹽城東陽臺巫山石桂太寧一峯削成如巫峽北望剪刀峯與道士峯相連皆竒觀也鳯山有月窟雲巖釣雪玉環浮玉寶華之勝二仙洞大寧金頭大昌漢城雲陽都歷萬西山上有絶塵龕盛山開翠屏逹神龍新寧髙梁梁山蟠龍下有二洞洞有二石狀如龍首尾相蟠金鳯梁山石乳始建瞿唐峽三峽之門兩崖對峙中貫一江灧澦惟當其口巫峽即巫山也與西陵峽歸峽並稱三峽連山七百里略無斷絶自非亭午夜分不見日月灧澦堆瞿唐峽口江心突兀而出寶芝洞鳯凰山頂噴霧崖蟠龍山崖岑公洞萬縣馬湖山曰赤崖雷畨府城大鹿蠻夷夷都沭川潼川州山曰牛頭州南金華射洪髙山鹽亭銅官中江玉堂遂寧蓬萊蓬溪雲居安嶽嘉定州山曰髙幖州西巍然高峙萬象在前白崖山有清風白雲朝露三洞龍門山峩眉兩崖峭峙中露一罅峩眉周回千里有石龕百十二大小洞四十又分大峩中峩小峩為三南北有臺重岩復澗莫測逺近平羌夾化山天下二十四化此其一也金粟捷為榮德榮縣其高插天石室二十四所爛柯洞州治對江第一洞天州治西可坐三四十人方響洞州學前洞中有水眉州山曰泠然如環佩聲蟇頤山州治東龍鵠山丹稜上巖青神瀘州山曰寶山城西安樂合江三峯竒秀上有八洞漢陽江安卭州山曰銅官卭卓氏及鄧通鑄錢處九仙蒲江雅州山曰蒙山名山曬經山榮經南壁上筆鋒長短數千下有深崖懸石數百皆五彩燦爛奪目至此精神為之恍惚也瓦屋山滎經西北青城山青城山本縣三十二里玉匱經黃帝封為五嶽丈人乃嶽瀆之上司真仙之崇秩一月之內羣嶽再朝一名赤城一名青城都亦為第五大洞寶仙九室之天上有流泉懸澍一曰三時灑落謂之潮泉天倉諸峯屹然三十有六前有十八謂之陽峯後有十八謂之陰峯杜光庭青城山記岷山連峯接岫千里不絶青城乃第一峯也此山前號青城後曰大面山其實此山有七十二小洞應七十二候有八大洞應八節安樂山安樂山在合江西五里三峯俱秀有竒溪乃延真觀有石匱為仙人藏經之所岐而左有爛柯迹後有仙人影隱隱在石壁中岐而右歷木楠臺仙人屋十二盤至剪盡庇循山有八洞通南巖有石曰許由瓢又有芙蓉城滴水崖白猿洞此三峯之景也山有天符葉一夕大風雨拔去後得於容子山如荔枝葉而長上有紋如蟲蝕宛如蟲篆或以為劉真人仙迹鏡子山在江安縣南五里又名照山一峯中峙兩峯旁翼二溪交流峯巒蔥倩庵廬梵室金碧交輝旁有二潭為龍所居禱旱輒應山有眠雲石襲淵橋玎璫巖磨鐮溪為一邑勝遊之地豆遄山綿州昌明縣豆遄山真人豆子明修道之所也西接長岡猶通車馬乘東臨峭壁陡絶一隔自西壁至東峯石笋如圖兩崖中斷相去百餘丈躋攀險絶人所不到其頂有天尊古宫不知所製年月古仙曽笮繩橋以通登覽而絙笮杇絶已久里中有言欲知修續者腳下自生毛相傳如此咸通中山下有毛意歡者幼而為道常持誦五千言著敝布褐於市乞酒醉而登山攀緣峭險以絶道為橋山頂多白松樹繫之繩橫亘中頂板布椽繩上善男女隨而度焉數年繩杇橋壞無復輯者溫陽洞開州後倚盛山東枕清江泝江而北三十餘里至溫陽井井有湯泉北上麟德年震雷摧裂山腳洞山自開當門有天然石鐘如數千斤重空懸去地二尺許而中實叩之無聲門兩壁有石如金剛力士之形者數輩鐘旁有小徑高六尺以來行二三丈稍濶有石碑巨龜負之自然而成但中無文字碑側有巨屏上與鼎相連下一穴側身入可一二尺許自是廣濶中路徑平坦與常無異路左右滴乳為石羅列衆形龍麟鸞鶴頽雲巍山如林如柱似動似躍乍飛乍顧千形萬態不可殫紀僅一里許旁竦蓮臺周回數步高三四丈層綴重疊皆可攀躋旋生乳石如臂如指者以燭照之通秀瑩徹隨折脆斷及出洞門外得風皆為白石矣自臺側三四十步有蓮花羅布於地傍有甘泉水色清白遊洞者汲之烹茗前自有橫溪湍波甚急其聲喧洶流出洞外溪上有橋長二三丈濶一丈許非石非土功甚宏壯過橋得黃土坡高四五丈道徑險滑行者纍息方至其頂坡上有巨堂四壁平靜中高數丈壁上多遊人題記年月堂之極處曲角有一穴髙四五丈廣三四尺去下丈餘躋攀莫及相傳云昔有遊人扳緣而入纍月之後出於巫山洞中自後無復敢入者大渡河大渡河自吐蕃界經雅州諸部落至黎州東界流入通望界於黎州為南邊要害之地唐時大渡之戍一不守則黎稚卭嘉成都皆擾建隆三年王全斌平蜀以圖來上議者欲因兵威復越巂藝祖皇帝以玉斧畫此河曰外此吾不有也於是為黎之極邉曩時河道平廣可通漕船自玉斧畫河之後河之中流忽陷下五六十尺河流至此澎湃如瀑從空如落舂撞號怒波濤洶湧船筏不通名為噎口殆天設險以限中外也蜀道諸峽豫奉命之蜀道夷陵歸州巴東巫山以抵于夔歷驛棲鳯黃牛屈溪建平巴山萬流高塘逶迤四百餘里挽舟上者日不一舍下者頃刻數程中間若十二背夜義背兩崖俱滑石而浪尤洶湧不可楫以繂匪篙即人背之故曰背也又曰與舟相背也有曰峽者狹也又曰山夾水曰峽蓋水行山間隨山以曲折在古統謂之西峽黃牛巫峽而已今則岐之為荆棺石碑馬肝兵書門扇彈穿扁擔黑石風箱黃牽鐵鎖之類仰視之懸崖絶壁萬仭千尋如覆屋如峻峭斷截如連繹如半甕凹如駝峯凸如粲粲如色斯黝如土斯練如草木蔥蔥如鹿豕濯濯如猿猱之聲慘如藤蘿侵倒齧竇飛泉左環右抱如出無門間有鳥道繂者萬盤日午方見而天之多斯昭昭然孰曰杜宇所鑿是皆成於混沌俯視之深潭莫極瀦潦流沙溶溶滚滚如釡之水如冶之金如珠之濺如花之蕊小而洄波大而盤渦如洞窈然如谷砑然如風之旋油然隨闢隨闔舟遭之者鮮有出焉俗謂荆棺兵書風箱皆古人遺迹豫不敢信其他即物以狀因數以稱者固有謂也又有曰灘灘從水從難蓋水之難行者深淺不一轉徙無方岩岩怪石鋒利牙交平者鋪彈險者截江竒者可愛惡者可憎所謂鐵積劔排狼頭鹿角纍纍牛馬飲于河者不足以模倣萬一水波摩激日夜不停潨潨雷吼涓涓金鳴花噴若雪沙滚若奔瞻之近岸而多敗船曰喜曰登曰青曰葉曰偏潦豬圈馬鞍無義大小蛇􅺀棟通靈鋸齒石門牛口青溪蓮花三灘茲其大者也豫過之舟行則畏途步無從乃嘆曰蜀道之難信矣若南沱過龍沱平善烏稍壩山斗坪柟水源流稍緩而可泊南肆香溪口東西瀼口勢空濶而可遊碑石稍公石蝦蟆石灧澦天公之妙不假人為十二峯孤峭拔空尤為竒絶秭歸則屈原所生白帝則子美所戀魚復浦孔明之圖攸在黃陵廟大禹之功未磨乃若高唐觀陽雲臺之雄據上流凡山之蛇蜒峻􅜤杈丫崒嵂幔張笋茁蓋倚圭橫者憑闌間一目可盡固楚襄之所流連而宋玉之所賦者也何景不可賞何古不可弔而以悶為哉三峽盛𢎞之荆州記三峽七百里中兩岸連山略無闕處重巖疊嶂隱天蔽日自非亭午及夜分不見日月修可曰峽程記云三峽謂月峽巫山峽廣澤峽大峩山郭門行三十里至蘇稽渡行十餘里憩德山寺望三峩插天雲氣如赤珠如白鵠如行人鱗鱗不可名狀讀宋英宗御製别山碑至楠木坪樹如寶蓋蔥菁十餘里見溪下一石類舟人云此普賢船也至大峩石上有陳圖南福夀二字石前有流杯池余為神水贊而去去登歌鳯臺即楚狂隱處也憩中峯寺玩孫思邈藥鼎丹竈其形甚古憩牛心寺寺下為雙頭橋兩水分流石梁跨之蓋天成云過梁渡溪憩後牛心寺玩唐三藏取經時所遺卓錫非人間物國初高僧寶曇圓寂于此或言高皇帝同時僧廣濟避居峩山後宫中聞龍躍聲詔易前杖莫可考耳由四會亭經南戒名宗坊投白水寺宿焉訪唐濬師彈琴處堙也有鎮南沙門與之語合言師别傳言七十遊南海三十年前種樹千百今鬱鬱蔭此山矣出內江學士趙孟靜衣契讀之謂充其心則宰衡吐握一代人材可種也洙泗指迷千載人材可種也余味其言書短歌寄焉越二日鎮南隨余登頂心坡坐筍輿用布懸引而上經息心所大小深坑有長老坪差覺平坦喬木千章千雲摩蒼交錯糾紛古蘿蔓延下垂人云此普賢線也行至鷟店飛岑巑岏過木皮殿上胡孫梯敲霧漨浡咫尺莫辨過梅子坡至雷洞坪有禁人語鐵碑恐風雷忽震由此轉折八十七盤最上娑羅坪蓋有娑羅花云捫石穿林黷黲不見天日岩下磈磈多千年積雪冰氣皚皚射人已入天門石度天仙橋投光相寺宿焉老僧取水炊飯為言頂有池水無泉胍可給千人炊米數沸中食過百沸則心結粉粒反不可食臥必纍褥坐必執爐其寒栗異常云舊有銅鐵錫三殿今存鐵瓦殿云有通天沙門年八十剃草開株表一小剎不下山五十年自言此山無豺虎草木皆香西域寶掌千歲僧也名此震旦國第一山西顧遙指其近而倚者曰瓦屋羅回其逺而望者曰青城玉壘其最見者曰雪山曬經而火熖蔥嶺與諸番之界俱在縹眇其餘萬山真如培塿青衣洋瀆三江縈然如匹練使余應接不暇少頃靉靆雲布兩人復歸禪房有披髮道人衣樹皮不言姓名長揖别云余就枕越四日再登浮雲忽開大陽吐扶桑和如艷陽步覩佛臺有小鳥如鸜鵒依人而來鳴曰佛現佛現視之閃閃成暈青黃紅緑之色圍繞數重初見若車輪既而圓徑漸廣跨過山足觀者如對鏡惟見已身雖並立者不見人云此普賢身也有鼯鼠亦來親人或云山有雲霞氣日映之則顯鳥鼠亦忘機者通天飯余禪榻授余養生之祕坐更餘一僧報曰聖燈現矣疾走現光臺始見其一如火漸至數百時隱時現僧云往吹入殿中信手掇之一木葉耳理或有焉余就枕越五日又登絶頂日大明如昨一僧携放光石如水晶大者徑三四分就日照之成五色如虹霓望七寶臺在深崖與通天别從故道下山崇峯懸磴白雲護之渾如銀色世界樹間啼猿小者如拳暮宿白水寺越六日至黑水寺訪八音池每乘夏有水人鼓掌則羣蛙鳴其起止俱先一蛙如金聲玉振有白玉環探之光潤異常乃千年物暮宿老寶樓鑑登指龍門二峩三峩諸勝莫能窮也大都廣圍千里髙百三十里余得其槩大小劔門山總敘劔門山蜀地之險甲於天下而劔閣之險尤甲於蜀蓋以羣峯劔插兩山如門信有所謂一夫當關萬夫莫敵者自晉唐以迄于今巨卿逸士登遊唱和篇牘纍積有説有銘有詞有詩非止一家而所以形容其險者殆盡披閲諸公著述益增弔古探幽之想遂為考訂復以廣其傳庶幾四方之士談劔門之險一覽之餘則竒峯絶嶂宛乎在目矣雖然險固可稱而有天下國家者初不恃此以為重蓋在德不在險也福建福州府山曰鳥石治西南越玉城北鼓山城東大姨大海中每風色晴定日未出之先于山上東望見一山如空青微出海面乃琉球國也其下水深碧色東流鐘山嶼在海壇里形如鐘沒於嶼旁潮退蒲牢猶隱隱可見故名海壇山四圍水盡鹹滷獨此水清淡中有老媪石形婦人高二丈石之前有石天井方廣二十丈中有石眼深不可測與海潮通焉香爐連江四明長樂高蓋永福六洞仙山山極高而秀舊有仙居之風雨晦明不可測又有時音樂出岩洞外鄉人有沿崖而至其地者遇二人對奕越明再造不復見焉衆以為異遂刻六洞仙像于上方廣石縣東七都峙拔千仭上有石室可容千人室之內搆閣三重上雨旁風皆石室庇之不假片瓦也山中景有十竒玉泉洞瑞松塢鐘磬石聼泉崖瀑布泉懸崖千丈散若瓊瑶響如琴築龍澍岩靈洋谷龍尾泉有石如龍貫石崖中潑潑然僅見尾有泉緣其尾而下注于石盂不盈不涸望仙臺清音洞已上即十竒也星岩仙掌仙樹觀音影亦皆山中竒觀岩之路口有井其泉清冽而甘以瀹茗號為第一泉玉融福清黃蘗林巒重復有瀑布龍潭又有佛座香爐數峯雙髻峯在旗山三峯峭秀崖谷幽逺繚繞環抱水西之勝處也泉州府山曰泉山一名北山一名齊雲山周環四十里為郡之主山龜岩在泉山之半巨石如龜中空可居唐林藻林藴歐陽詹皆嘗讀書于此有石硯現存又有秀崇塢醉月岩石獅岩在龜岩之畔有石巉然如獅子狀後清泉洞在泉山有上下二洞上洞名紏陽在山巔有白室下洞名紫澤上有百丈石嶮峯疊巘寓目登眺如在天上間杖黎泉在清源洞側清源泉在清源上下二洞紫帽山峯凡十有二常有紫雲覆其巔金粟洞在山之陰西有石鼓丹竈仙掌諸峯高蓋晉江梅花南安九日連跨晉江縣界重九日邑人多登高于此無等岩高丈許石佛岩在上高峯之側其翻經石梁普通中僧拘那羅陀嘗翻譯金剛經于中一眺石在蓮花峯之巔高廣皆丈餘登其上則四方萬境舉在目中故名小清涼石方廣丈餘古木數株掩映其上登者必先憩於此石竈石盆石碾石硯四石皆秦君亭側峽自然磉石員如彈丸周圍丈餘出于天成碧玉二石相並如玉之立有放生池在寺前花白雲井泉味甘冽井西高士峯北有蓮峯皆竒境也髙鎮峯一名雞髻山又有翠峯屏大成洞五峯巖上有石室色如銀中可容三百餘人三秀同安浯洲嶼上有海印岩岩有十二竒曰大武岩玉几峯蘸月池眠雲石偃蓋松跨鰲石石門關古石室蟹眼泉倒影塔千丈壁一覽亭臥龍惠安小岞山之陽多怪石中穿一洞洞之中豁然明朗可容四五百人旁有小石門僅可單人而入門內丈許折而右轉有巨石如屏風以蔽內外一人持戟守之雖千百人莫敢犯永樂間海倭入寇民多匿洞中倭寇百計攻之不克舍而去天開巖惠安髙鎮永春閬山安溪五華德化蓮花峯南安其山聳峙上開八石皆蓮花然朱文公詩云八石天開勢絶攀彭湖嶼自城東出海舟行三日抵彭湖嶼在巨浸中環島三十六建寧府山曰黃華治東白鶴城東梨嶺天下之水皆東梨嶺之水獨北流入廣信辰山建安靈鷲甌寧東山建陽武夷崇安峯巒大者三十六周回百里道書第十六洞天詳見于後大同浦城洞宫政和籌坑有天柱峯獅子岩羅漢岩將軍岩屏風石葫蘆石石室龍井又有嶺亦名籌坑又有員照庵前有聖水凡三石井中一井外狹內寬深不可測湛盧松溪香婆巖松溪白塔山建陽山巔有石特立如塔狀相傳夜有火明其上故又名天燈山下有龍岩洞洞口有試心石下有碁盤石相傳唐時有三女煉丹于此仙去今龍濟所祀即此三女也又有飛來石在龍濟院前石橋洞府城北高峯環抱內有石潭其外則石壁峭立相傳潭有龍浮石洞建安在響山之前蓋溪中小嶼遇水泛則與之俱浮人未見其沒汀州府山曰臥龍城北翠華寧化南寶上杭靈洞武平山有大洞三十六小洞二十八蓮峯連城司馬周卿取山中竒勝𨽻書刻石蒼玉峽雲棧天梯冠豸桃源清如許芙蓉波金宇泉白雲深處天光咫尺蒼谷虛靈小崆洞滴水巖岩壁陡絶洞有三門中而豎者名為天柱靈隱洞寧化洞前重岡疊巘森列左右小洞橫絶煙雲縹眇有聖水桃竹又有一石拔地而起上有窪樽乳泉滴瀝滿而不溢象洞武平其中廣濶號九十九洞延平府山曰九峯城南龜山將樂靈源洞山巒秀絶由石徑而上一里許蒼崖陡絶泉響如雷一石室廣可六七丈旁一竇俯傴而入其深邃微明多小石竒潤鳯凰涉幼山孤峯上聳約三十里周回三百里中有三魅形似人長丈餘上有普照寺宴坐峯鐵砧石聚星忘憂石降魔石天威石藏雲塢歸雲洞又有風洞廣徑尺餘風生洞中清爽可愛山之下有龍峽栟櫚永安多産栟櫚故名峯巒岩岫不可勝數神刻鬼劃高下相屬煙雲出沒無時草木蒙茸四時一色李綱目為武夷岩天柱峯與獅子岩並聳百餘如削射垜峯觀音在野雲洞側石壁萬仞集仙岩他頭岩步雲臺野雲洞其中日夕雲霧吐吞走馬埒山絶頂寬廣而砥平降仙臺銅􅌉澗接仙橋寶天池在山之上廣一里許水澄徹不淆有金剛石蓋石試石已上俱為栟櫚山之竒勝也甘乳巖下有甘乳洞廣袤約五十餘丈洞口怪石森列洞之中一石突出如蓮花泉自石中迸出滴巨石上如甘乳旁一石穴風自穴出昔嘗有人秉燭入越三日乃返至深處聞溪聲澎湃可怖即出因以石塞之洞右有石鏬深不可測洞後又有一洞名透天金樓尤溪賴巖其上怪石萬數巨者如屋綿亘可三里宛然一洞府也洞口緣梯而上石室聨屬皆有竇如户俯而入其中流泉可愛石鏬如窗户者數百所七臺順昌高峯峭壁幾至千丈山門峯將樂高聳雲霄下有兩石相峙如中徑可通往來七峯沙縣山皆石壁峭立由水底峻層而出百花巖府治東北石室峭立春時百花鮮麗故名靈龜洞順昌洞有靈龜紫色如金有石如鐘磬魚鼓之狀叩之其聲清越興化府山曰烏石城中壺公城南山皆四面獨此山有八面高聳千餘仞郡治正對之山形方鋭如龜首峙立如屏郡之鎮山也朱文公經莆望見壺山南一面獨秀曰莆人物之盛皆此山之秀所鍾真蟹井在山頂泉在石穴中其胍通海視潮盈縮淨岩在山絶頂莆中風物之勝一覽可盡竒勝靈雲岩在山之陽上有桃花洞蘸月池泉石虎丘岩衆景俱備􅌉陀石法流泉濯纓沼石壁峯號壺公山五竒昔有隱者遇一老翁于絶山頂忽見宫闕殿臺似非人間翁曰此壺中日月也後人因以壺公名山囊山形如懸囊亦名土囊小辟支岩其中可容數榻旁有八石負之玲瓏明徹如窗櫺然上有文殊岩佛曰山石竹山須瀰臺降龍澗於莬窟半月池伏虎石諸勝棋山仙掌峯有石髙三十餘丈巉然特立如掌人文筆峯與朝天馬兩峯相對香爐峯仙臺兩石對立中有蟠石如碁枰號出風穴大石上有穴大如斗深不可測風自穴出曰棋山五竒龍山亦在棋山岩如圓屏瀑水高三十尺流下瀦為小潭又有石如室深廣一二丈中有棋山寺旁有西臺百丈山山有石室又有大岩曰華蓋客廳石傘石樓重玄又有丈嶺城山與壺公山對峙山有石岩嶺又有呼月臺興雲洞仙臺峯上有石碁枰馬蹄迹前有石鏬又有仙臺石瑞雲峯峯頂雲起即雨二飛仙遊尋陽有大山自西北來峙為三峯曰大雪仙臺香爐又有雞髻岩雲頂岩紅袍山笏山筆架山烽火山大象山燕峯蓮花峯列峙左右又有石龜岩龍鬚岩銀頂峯西澗發源銀頂即地蓮花峯下有龍潭雲頂岩岩旁有化蟒岩釣月灣聞猿洞眼雲閣又有無際坑九座重巒疊嶂之中巍然高峙凡九峯故名人有盤髻峯棲真岩錫杖泉徹雲澗龍潭透龍石紫睿巖府城北上有迎福院琉璃峽天台洞石鼓石門仙人橋仙人冢湄洲嶼府城東南海中與琉球國相望出黑白石可為碁子上有天妃廟邵武府山曰登高城西七臺跨汀延邵三郡上有七臺曰台星文殊普賢會仙獅子雲與月又有庵前白花洞洞畔有石穴雲巖光澤烏君山高二千一百餘丈頂有兩石峯各高二十丈人謂之雙石笋又名珓環山爐峯泰寧甘露巖石門天成一徑僅通單騎飛瀑垂岩而下內有石乳滴水甘甚因名東山建寧金鐃山山之絶頂有聖觜石常有雲氣又有石燕岩石鏬盤折至正岩中有石屏右天窗石凳石床石廨位置向背皆天成漳州府山曰岐山城東與鶴鳴山聨峙三峯秀聳龍江之上有石禪床題詩石桃源口虛白岩一人泉潛翁岩石棊枰千人洞天生岩謙師岩石室岩諸勝可玩梁山漳浦山有大峯十二龍巖龍岩三平南靖良岡長泰天柱石山頂有一石柱高二丈餘又有巨石如屏高九丈濶五尺又有東西南北四石門又有石室石庫百丈岩勢至岩象鼻岩海湛岩應潮岩一線泉忘歸石盤陀石香爐石大帽山仙人亭劔脊橋超凡閣為十二竒福寧州山曰大姥州東洪山其絶山頂勢凌青蒼蓋州南第一山也登高眺逺溫台之境如在目中山有洞洞內有石屏石􅕇棊局皆渾然天成洞口又有石竅石罩石泓泉通海眼深不可測西有天鄆山石馬峯臥龍潭釣魚石桃坑橘洞丹泉霍童山神仙霍童所居洞天記謂霍林洞天是也其中幽岩邃􅊤人迹所不到者不能悉數每天晴月皎居人往往聞空中有樂聲山之西有支提山那羅延岩西有神僧石窟葛公仙岩南有蘇溪鶴嶺北有菩薩紫帽二峯又有大童峯小童峯左右弼仙峯寶劍崖霍林赤泉洞泉湖都尉甘泉坑蓮花石石仙臺壇海鰌井又石廊長三十餘步又有石室室東有石橋橫跨澗上有搗藥石臼石盆石盂皆天成也高蓋山山之别峯也洞天正其上常有紫雲覆之三山鳥石辛酉秋余乃偕傅子丁戊二謝子天湖梧溪往丁戊道余自南澗石塔神光三寺流觀至勉齋書院訊勉齋舊修三禮處已莫辨矣余乃入書院內見上有古大梁將墮因迤書院東而去過葫蘆城丁戊指王氏所填金蟒穴還憩靈鷲庵佇睇去復迤東石砧上石級斗絶稍頃乃至華岩岩畔觀唐李陽冰所書般若臺篆刻于崖石上世稱此刻與處州新驛記縉雲城隍記忘歸堂銘天下為四絶覽罷又循崖側石磴上轉西至通祠少憩見前石巒間有岩幄小祠燈火熒熒丁戊曰此神女祠也稍頃折祠上覽舊所見人面竹蓊然森立如人者今無一存矣迤竹坪下瞰石觀音像嵬立岩側世傳唐天寶八載五月日山中雷雨大震湧出者遙見東峯石頂山傳有金剛巨迹存焉頃下石坡亭臨懸崖下視海渚渺渺蒼蒼錯雜煙樹瓊河縈婉出檻下可里許為小頂峯下視殿閣巋然可撫也又里許為大頂峯旋覽四隅杳出塵世東北萬山重疊海門縹眇無復崖涘南面山蹲川繞阡陌坦漫高者若阜流者若練飛鳥殘雲栩栩然蝴蝶耳因念高明宅心則俯視百物皆眇小若此也峯北為浴鳯池池旁石坡有天風海濤四字亦晦翁書刻時日逮暮紫靄翠嵐歘然開合蓋剛風披拂其變態不常陳靈言秋霽時可睇琉球云須臾黑雲起海島似有雨意遂亟還以索聨輿倒懸迤東瞰老佛庵故址搆其下有霹靂岩天擘石室尚存又東下南望見石帽山在前中有宿猿洞復東下遙觀海雲自天際來余與二謝子攀雲上觀杜庠石壁所鑱天地一聲鐘句歡然去又稍西迤兩石門進行不數十步見岩竅中亂崖齦立􅝉石扇斗開丁戊曰此薛老峯也崖上有倒書薛老峯三字或謂薛老古仙不知何代人或曰乃唐侯官薛令逄與神光僧靈觀遊創亭于此稍頃又越小客寮下至浴鴉池池在石壇上可一掬池中水泠泠徹人心骨下有石床余倦甚因倒臥其上丁戊云此海佳處復旋西上至一小庵丁戊曰此唐周朴剛顯祠也復招二謝子過寒翠亭覽石上題詠旋瞥至鄰霄臺宇曠然新醒人目東望海上漁舟牧笛聲隱隱又西下平沙逶岸狹遄應接不暇余劃然嘆曰此三山竒觀也乃自臺畔迤石砧環觀中有大石屏面東峙不數步轉石梯西折登烏石絶頂丁戊四顧蒼莽指無諸城郭與余劇談直見越王臺起城背北下九仙之觀東翥于此烏石對蹲儼如龍虎相盤踞環三山真若瀛海中浮青羅然旗鼓二峯左右鼎列咸環拱內向丁戊復指西大王山下曰此五代王審知郊天處也由大王山上蓮華峯一帶挺挺起民居鱗萃荒莽中䀛又有石槃斜出名曰橫山樓樓下覆仁王寺循樓西上至大石坪又有宋社稷遺壇在石崖背鐫三大字余覽古今王圖霸業瞬息目睫可為一慨俯晞臺側有蔣之竒穎叔所刻石壁頂古松枝幹扶踈半頽落曰此何人所樹滿山童然猶不意有此老龍骨者存丁戊述舊有訛言烏石青起刀兵之故余輾然而下沿山麓去見石巒上有晦菴題名在焉已復指南澗寺旁有晦翁大書石室清隱竒偉甚邃又迤東見一大石塊橫峭懸崖石雲幄蓋其上其中有謝冝相所書石天二字旁由小曲徑出至東峯遙望前神女祠直西上有秀巒嶄嵲兩崖壁夾聳內微露一線天嵥嵥在煙靄中可吸直若飛鸞舞于穹抄更西下有厯代所封惠安王祠又東去至一岩閣曰天章臺復迤初陽頂北望與丁戊欲唐閻濟美貌稼之所邈不知何處而昔時所謂崔公井謝公浴堂古跨鰲亭與蔡端明所題幽幽境俱落落埋沒荒荆中雖欲探而無所考也乃過瞷曽鞏所記道山亭書謂蓬萊洞天者余猶欲尋昔仙翁任於煉丹井并頭陀巖莽蔓中凡前所瞰不危亭睡遙石回視俱冥冥半空煙際矣又東下轉小徑上見兩大石騰齶如二墻堵然中儻敞可臺榭以遊烏名石除鄰霄此為最兩石東西相去不盈數丈前東面海門遙睇五虎山自海上奔馳南來勢若六鰲在掌上然江潮島溆汀煙嵐紫日夕不知幾千萬狀又循石棧下行數十步見有石梁橫介于絶壑若天台石橋狀巉巉倒跨空畔橋側有沖天臺昔傳此崔公子放鶴處沖天臺昔有蟠桃塢石盤陀𥑋磈石者何所云余曰烏石舊傳三十六竒盡之矣鼓山福為八閩都會上四郡皆山地勢局促不能廓以舒下皆瀕海風氣疏蕩不能隩以周惟是州處其中不蕩不局得二者之宜環州之山惟東石鼓為最高皆興雲雨蓋州之望也百丈山登百丈山二里許右俯絶壑左控垂崖疊石為磴十餘級乃得度之勝蓋自此循磴而東即得小澗石梁駕于其上皆蒼藤古木雖盛夏亭午無暑氣水清徹自淙下其聲濺濺然渡石梁循兩崖曲折而上得山間小屋三間不能容十許人然前瞰澗水後臨石池風水兩峽間終日不絶門內跨池又為石梁度而北躡石梯數級入菴菴卑庳迫隘無足觀獨其西閣為勝水自西谷中循石鏬奔射出閣下南與東谷水並注池中自池而出乃為前所謂小澗者閣據其上流當水石峻激相搏處最為可玩乃壁其後無所睹獨夜臥其上則枕席之下終夜潺久而益悲為可愛耳出山門而東十許步得石臺下臨峭岸深昧險絶於林薄東南望見瀑布自前岩穴瀵湧而出投空下數十尺其沫如散珠噴霧日光燭之璀璨奪目不可正視臺當山西南缺前揖蘆山一峰獨秀出而數百里間峯巒高下亦皆厯厯在眼日薄西山餘光橫照紫翠重疊亘起下視白雲滿川如海波起伏而逺近諸山出其中者皆若飛浮來往或湧或沒頃刻萬變臺東徑斷鄉人鑿石容磴以度而作神祠于其東水旱禱焉畏險或不敢度然山之可觀者至是則亦窮矣其可觀者石磴小澗山門石臺西閣瀑布也雲谷雲谷在建陽縣西北七十里廬山之巔處地最高而羣峯上蟠中阜下踞內寬外密自為一區雖當晴晝白雲坌入則咫尺不可辨眩忽變化則又廓然莫知其所如往乾道庚寅豫始得之因作草堂數間榜曰晦庵谷中水西南流七里許至安將院東茂樹交陰澗中巨石相倚水行其間奔迫澎湃聲震山谷自外來者至此則已神觀蕭爽覺與人境隔異故榜之曰南澗以識遊者之所始循澗北上山益深樹益老澗多石底高下陡絶曲折互回水皆自高㵼下長者一二丈短亦不下數尺或詭匿側出層纍相承數級而下時有支澗自兩旁山谷橫注其中亦皆噴薄濺灑可觀行里餘俯入薈翳百餘步巨石臨水可跂而息澗西危石側立蘚封蔓絡佳木異草上偃旁綴水出其下淙散激射於洞中特為幽麗下流曲折十數騰蹙沸湧西抵橫石如齦齶者乃曵而長演迤徐去可臨以小亭自此北去厯懸水三四處高者至五六丈聚散廣狹各有姿態皆可亭以賞其趣又北搶澗循山折而東行腳底草樹膠葛不可測但聞水聲如雷計應猶在故處行數百步得石壁高廣皆百餘尺瀑布當中㵼逺望如垂練視澗中諸懸水為最長徑當其委揭而度回視所厯羣山皆撫其頂獨西北望半山立石叢木名豺子巖者槎牙突兀如在天表然石瀑窮源北入雲谷則又已俯而視之矣谷口距狹為關以限內外堂後結草為廬稍上山頂北望俯見武夷諸峯南循岡脊不得橫徑南即谷口小山其上小平田畔即以祈年因命之曰雲社徑東屬松徑西入西崦有數十畝道流結茅以耕其間曰西寮其西山之脊蟠繞東下與南峯西垂相齧而谷口小山介居其間如巨人垂手拱玩珠壁兩原之水合于其前出為南澗東寮北有桃溪竹塢漆園度北嶺有茶東北行攀危石履側徑行東峯之巔下而復上乃至絶頂平處劣丈餘四潰皆巉峭下數百丈使人眩視悸不自保然俯而四瞰面各數百里連峯有無逺近環合彩翠雲濤昏旦萬狀亦非人世所嘗見也豫嘗名湘西嶽麓之頂曰赫曦臺張伯和父為大書狀甚偉又下為北澗有巨石二對立澗旁嶙峋崷崒古木彌覆藤卉蒙絡最為山北竒處自是東北去有瀑布出岫幢峯下石崖隊下水㵼空中數十丈勢尤竒狀東南别谷有石室三皆可居其一尤勝玉華洞又名蹬屶崱高若升天相傳赤松子採藥處洞有二石門相去一二里許中分二路會於後門南行度三華橋七里為藤嶺有亭在焉冒雨行二三里見天階山隆然衆譁曰洞至矣洞口洞低狹側窺之窈而黑秉炬者先余輩俯躬從之神恍目眙履舄與土石升降足不謀而捷泉自石罅流兩涯有聲潺潺已或橫亘得􅀈每十數步山之老人輒指點陳説亹亹時從者數十人歡呼動地煙氣人聲助合蓊鬱燠如盎如背汗沾衣不知外之晴雨也頃之起見石刻至元間人題名磨滅不可讀洞高處滲液凝結冰雪崚􅜤蓋水之久而成石者迤邐入途欲迷旋又開廓稍縱焉忽閟不開微茫叵測繚曲復往力探旁摉怪石林羅撑突崩騰頑怒齦錯窮狀極態牛飲水者犬蹲地者佛跌坐者人倒垂下瞰者仙耦而據枰奕者蓋未張者户闔叩之應者田丘畫畛分者扆可負柱可倚屋而竅可左右窺者瑰詭傑特牢籠供獻一石立嶔嵌之巔無上綴旁附至孤危而巉峭不可狎注目久之徐君云有鐘鼓石趨往視之鐘微鏗鼓逢逢然幾不可辨觸數行往觀龍潭深黑似有物云旱歲乞靈處路折而空闊仰視不見所極時度日垂晡乃攀緣斗絶前牽後纍左右翼而進至所謂七層樓者足無餘地擇而後敢投若踐虎尾摩龍角戰汗震掉不知所如中有雷公溪源楊梅果子藏禾黃泥六洞又有靈泉龍井合為澗而怪石竒偉萬狀聞有石棺雪山尤竒異不及往亟尋洞後遙見天光皆大喜至此特平曠又一境坐定稍聞洞外人聲益覺幽敻石壁光倒映雲氣浮動崖缺樹色交之若從窗牖中觀焉然望洞口猶在天半唐君曰樂將無及耶遂攝衣上步不任承以梯既出距地猶數十仞俯可視飛鳥之背洞背洞之外蒼藤古木鳥韻蟬聲清人心目遊者忘歸洞之西寶華洞其中僅容周旋一石穴泉寒而冽不涸不盈其陽曰南華洞石室方平景物尤勝昔人稱為三華惜其暗且僻故無昭耀于世云滴水巖余讀汀州記歸化東北五里蓋有滴水巖云往徐君日與余談茲石大竒也戊午五月余督兵西征馳之歸化而揭君謁余曰君將出師紫雲乎則請于滴水駐餐焉於是明日以數騎東行踰嶺稍折而北已又折而東凡三折至岩岩壁陡絶外墜徑而上揭君遲之徑既上有字故曰迎仙余曰遲仙不逾迎仙哉堂後有亭亭題余怪其腐語而因與揭君解于其中遂易之曰振衣已乃聞垂垂而雨則滴水岩在焉其水有三一出垂石如蓮者二從石隙中下盛之石盂其石乃蜒而曲猶龍足戲雲中而若隱若見者余怪焉稍前斗石下垂類蓮花者因名之垂蓮又俯睇其右隅僧在焉其爐煙陰陰上也洞凡三門其中而竪者類柱遂名之曰天柱柱有三則又名之曰中天柱左天柱右天柱云右天柱有石類獅其上更有石如斗外懸中繫甚微若帶焉故名峯窩又眺而左有三門左者徑右者乃橋斷石橫其上而又虛其下如黿焉遂名之曰黿梁黿梁之左而上纍纍若珠又若垂楊之裊裊條條仰睇其右片石突而下久之嘆曰此墮猿也其左右五色為祥雲雲之下為虛明二洞篲擊輒應虛谷則鳴也又一洞峽嶮旁曰天鼓篲擊之彭彭鼓聲焉又有冷然磬而幽者揭君曰所謂石磬者也在右洞洞又有床若履禪室焉余益駭有巨石整而偉名為冕石其洞最邃名曰鴻濛又起而環視鯉石鷹石龜石鰲石翔躍肘腋矣變化總萃幻譸緯錯則槩名之曰小崆洞云石所山巖之側有山曰石所舊經縣云中北為坦途山皆石也故名又有滴水岩麥斜岩極樂岩雲霄岩林際岩南湖巖名山巖樂應岩凡此八岩者肝聨肺腑變化融結奪盡天巧又高望塔皆錯峙於石所之間山之下有平埔十餘里一望如砥宋黃魯齋愛山水之勝因建書堂於其麓林先朝劉夙時至其所嘗曰天下佳山水未有如鯉湖石所之極者何嶺鯉湖山自永福嶙峋起伏而來至此聳為一峯石上湧飛泉泉白味甘世傳漢時有何氏兄弟九人飲此泉因而上升故名俗呼何岩上有古何城城之東有石洞可坐百人下為何嶺宋陳讜書何嶺二大字刻于石俱以何氏九仙得名路旁有仙泉井宋陳照度仙水第一源記東有仙迹石南有候坂唐平山唐陳嶠世居之又云何氏兄弟九人煉丹於此丹成各乘一鯉仙去故名後人號其湖曰仙湖嶺曰何嶺水曰仙水縣曰仙遊湖之右有九仙宫西有仙閣凡禱夢於此山者必通姓名籍貫於候長者祭必以白雞之雄者宫之前左右兩山盤踞環抱於湖紫翠如滴中一泉沿石澗由宫之左而下滙於湖澄泓停蓄深不可測其水之由澗而下於湖者因澗口石皆巉峭層疊如級水勢奔騰石為衝激水皆噴薄如飛雪舞空號為捲亷泉真竒觀也澗口有一巨石方正如屋橫亘其上雄跨東西絶無根據若以人力置之殊不可曉夜臨道士房濤聲如雷不能安枕宫之前有大石平曠下瞰於湖石上有穴如煙穴其中水深莫測蓋下通於湖者泉山山在棠陰里一名齊雲山袤廣以四十里許乃郡之鎮山也顔師古漢書注謂越王所保之泉山即此山有三十六洞其龜岩在泉山之半巨石如龜中空且曠可容百人唐林藻林藴歐陽詹嘗讀書于此其所染翰石硯尚存而崇秀塢適當其奧林木森然竒石挺立望之青翠滿前殊為豁目有醉月石則橫亘于前其平如砥獅子巖者在龜岩之畔石骨聳立狀如狻貌而青原洞尤最大最竒者洞有二上洞名純陽在山之巔東甌於此逺避漢兵處也後有石室則宋道人仙蛻之所故又號蛻骨巖下洞一名紫澤去上洞僅半里許真人蔡如金祠及丹竈在焉上有巨石方廣百餘丈有梵剎四區適當其陰而峻峰疊巘寓目登眺若置身青雲之上外則大海環繞一望茫然天氣清明則所謂日本琉球皆可指見真天下竒觀也杖藜泉則在清原洞之側若坎井然傳為蔡如玉手握藜杖卦地而泉出故名清源泉適當上下二洞之間深不過五六尺味甘而潔湛然澄清山之以泉名者此也有老君洞則老君像如塑高可五十丈餘面目四肢皆為苔蘚翳樾而鬚眉皓然其白如雪者千古不磨亦云怪哉三瑞岩則文殊普賢觀世音三菩薩像也像皆天成不假斧鑿即其竒瑰詭譎當與武夷爭雄哉閩中形勝閩故𨽻周者七至秦盡其地列於中國始并為閩中郡自粵之太末與吳之豫章為其通路其路在閩者陸出則阢于兩山之間山相屬纍數驛乃一得平地小為縣大為州然其四顧亦山也其途或逆坂如緣絙或乖崖如一髮或側徑懸出於不測之溪上皆石芒峭發擇然後可投步負戴者雖其土人猶側足然後能進非其土人罕不躓也其溪行則水皆自高㵼下石錯出其間如林立如士騎滿野千里下上不見首尾水行其隙間或衡縮蟉糅或逆走旁射其狀若蚓結若蠱鏤其旋若輪其激若矢舟泝沿者投便利失毫分輒破溺雖其土長川居之人非生而習水事者不敢以舟自任也其水陸之險如此漢嘗處其衆江淮之間而虛其地蓋以其狹多阻豈虛也哉福州治侯官于閩為土中所謂閩中也其地於閩為最平以廣四出之山皆逺而長江在其南大海在其東武夷山敘武夷之山當閩北境其山自大嶺南支奔馳數百里至崇安縣南三十里而止東為建大溪而九曲之溪西出與大溪合其峯巒崒嵂溪水靚深糾結縈回翕張變化淵入虛無橫出異狀有鬼神莫能施其巧者蓋南嶺之靈氣於是鍾焉自漢著祀典厯代崇奉有加咸稱靈應而武夷之名亘天下然皆以仙道顯者所謂籛鏗魏張十三仙之徒理或有之至所稱彩幔虹橋遺蛻架船之事極其神異余之懵則未能測其理之誠然也宋興山靈藴蓄育為名賢若遊胡劉蔡忠勳道術庇國興文皆不越四五十里間龜山道南諸公亦只相望一二百里之外而武夷益重視若小泰岱然者朱子文公初於五曲搆精舍講學其中九峯蔡氏亦築堂於虎嘯峯下自是書院繼興與道宫並處其勝士之宗儒之學者仰朱蔡之風得無於是山而興仰止之思耶武夷山豫至山下道人導豫自洞天門至方丈一飯飯畢復出方關躊躇四望始知是宫北枕太王峯高可五千餘仞絶頂有投龍洞天鑑池有仙鶴岩者舊所繪鶴翎朱頂歲久不磨東有升真洞石壁中特開一堂廣數丈而深倍之最北有幔亭峯其形如幄宋李綱所謂猿鳥夜呼千嶂月松篁間鎖一溪雲者是也豫三人步行數武百折而西忽驚九曲在望乃命一舟載童子六五人奏樂先導豫三人以舟尾行道士首指點曰此一曲水中虎鼻岩也其石上題曰智動仁靜溪石為大小觀音石獅子岩則巍然獨立比衆峯尤為聳拔嘗自延平至建寧十里外望之蹲踞昂首真如狻猊今親覿之始見其真石上刻九曲溪三字者水光石也右有鐵板嶂其色純黑壁立鑱削如砥轉至二曲有玉女峯如美姝麗人之態稍低則粧鏡臺仙冠石以次並峙若為玉女曉粧而有事者其側峯巒森秀中峯尤峻而聳者為三峯石後名升仙峯者張真君之飛升處也試劍石則控鶴仙人劍成而試之石分為二故以試劍名也下有小九曲遊舟可入尤為竒絶仙船岩即小藏岩之峭壁間忽開一穴小船駕于懸崖橫木之上所謂絶壑駕船亦三曲之仙蹤仙學堂則石壁環繞中有石屋几案具存蓋仙家翰墨之館又名曰翰墨岩其他曰水樂曰車錢肝聨肺腑不可勝數曰仙機者于峭壁上谺開一洞木板橫亘如機杼狀也又最勝者則大藏岩峻拔壁立下際深淵上接星斗人迹所不到猿猱所不能升乃有楛槎于石鏬間以度舟船棺柩之屬外列陶器至今不朽或以羣仙各逞技巧理或有之金雞洞在四曲稍斜朱晦庵所謂金雞呌罷無人識月滿空山水滿潭者此也晦庵精舍後有大隱屏背倚大王峯懸崖瀑布俯瞰清溪碧流萬頃又其最也且水之東流凡九曲而五曲為最深蓋山之自北而南者至此而盡傳有蛟龍居之豫在舟中仰視峭壁兼之水勢滉漾令人心悸目眩蓋以南之天柱獨聳金石為一峯拔地千尺玉光燦然與水相映下有更衣石平正如几可以佇足昔魏王於此更衣以登天柱者道人謂天遊一峯獨號多景高深玄奧羣峯之鼻祖也其勝出一線天之右可忽略乎于是仍從一二曲經龍門灣數折而逹於六曲舍舟遊仙掌峯入兩崖插天中門龍湫一道恍疑銀河落自九天天遊一庵隱隱瀑布林薄間捫蘿拾級數經鳥道始得上達磨崖絶壁多前人題識躡其巔前有萬峯亭亭後精廬數間道人修煉其中復循故道倚棹溪頭將窮七八九曲之勝而煙雲布空復作雨狀乃止大王峯夏五月汪東麓張東沙江午坡三公送豫至武夷午坡曰大王峯有張仙巖案志漢人張垓得辟榖之術於此仙去遺蛻儼存盍往觀之東麓東沙皆欣然道士曰捫天之難非雲梯不可升也乃命縛梯再宿而成東麓東沙與豫先至仰見縋梯百丈二公色阻曰誠捫天之難似此豈可升乎乃命𨽻卒便捷者二人先躡至梯之四一遽下神色無主語不出口乃促孫都司升孫畏縮色變豫曰𨽻卒不知以心為主耳手有攀足有緣安得有失乎豫遂躡梯而升梯盡見岩阿中仙蛻儼然相去五步之內崖欹若不容著足凝視有頃即飛步而至並其蛻而坐頃之午坡亦至梯盡處問豫曰此欹崖何由得度耶豫曰不知其然也午坡悟亦飛步而至相與拜張仙像像兩手據髀卷其一足如真武坐首略右顧非土非肉非漆癯然有威豫聞得道之士真氣不散蛻殼之時斤骸自固雖厯千百祀與初逝不殊豈其然乎頃之山下雷雨大作下視兩腳甚長岩前不見雨絲乃知身出雲上環望八閩諸山不啻培塿接笋峯嘗兩遊武夷時以簿書羈絆不及信宿而返雖知接笋之勝未嘗一登覽焉蓋是峯在五曲之粵其峯由下而上凡十三砧始逹于頂砧為一層自開闢以來未有能升而至之者四十年前有江西貴溪人汪姓號癡頤自幼不娶棄家遍遊名山相度峯頂人迹不到可以修真煉形且曰此吾歸根復命之所也乃層置一梯每梯之高計十丈有餘于石坎處鑿二孔置梯尤慮動搖又于石旁兩腋鑿孔用鐵錬以纒束之使固且砧皆盤旋曲折非可一躡而直上者至轉折空處不可措足亦以鐵鎖聨屬於左右站而漸升將至頂泉水橫流苦於路滑乃鑿石如龜背形以分水勢于路之上又砌石級之短者三方至絶頂頂有石臺如砥約二三畝二道人結小茅庵以居之天遊峯秋買舟抵山下訪幔亭探虹橋徘徊沖祐觀中乃偕牧叟往沿九曲入至玉女蹊麓曶見斷崖懸壑千尺天光白雲在水四壁闐然石激凌寒邈與人寓隔稍前取道金雞洞遙睇天遊直在雲巔莫可躡微旁向洞竅中曶青紅色色有光余訝之牧叟曰此仙蛻也鼓柁向臥龍潭遂登陸覽石上鑱刻路巇仄不能步延久始獲至晦庵祠展謁坐寒寥仁智堂尋跖隱屏髙處側望回溪懸嶂層岫聨嵐旋抱而書院屹其間又西行路稍下至伏羲洞洞黮不可入余染石書牧叟曰子亦好竒甚也此洞數十年無人到矣豫乃沿洞旁出路益巇窄莫能步乃闖笋岩隨樵者魚貫石上欹滑余困極牧叟直驅之俄側立天遊峯半頂松蘿間稍久循石棧東下倐一道中開而崖壁嵭嵣峻削松篁夾路水􅪋􅪋鳴且流水石蛙數種眺立尋至天遊庵萬峯亭中與牧叟斂襟坐神耗倦甚頃稍舒乃起西覯則又見羣峯衒竒鬻采於前千態萬狀而九曲溪瀾則灣環足下庵側仙掌峯一覽臺夾天遊西腋而峙雨雪瀑從腋中直㵼下天遊峯中巋矗不動余瞪視久之撫然曰此滄海金鰲何年移置到此前有小石臺可俯瞰稍前面隱屏岩罅間又有小徑直層上石齒齒斧鑿痕宛在牧叟謂此昔人傳避秦處稍頃牧叟又導余摩鰲背西摺不數仞越石泓窺一覽堂遙挂絶壑仰睎之見橋樹霜銀鐵幹骨立臨危巔不省為何代物徐還至庵中月在松間矣余乃展胡牀小憩俄又聞鸞鶴聲自山右石壁上隱隱起旋弄穹中余駭之訊旁有道者曰此李仙鐵笛聲也九曲間岩西去數丈許舊有鐵笛亭水簾洞安成東郭鄒師同劉獅泉諸子自懷天真至自武夷次天遊有詩懷余又折簡約郡公吾南獅泉偕會洎余至郭翁自天逰逰衍已出憩沖祐宫矣次晨與諸子相傍徨九曲溪上又次晨同遊水簾水簾在武夷西乃沿武夷逆溪而上數十折始達其麓過小石澗入自水簾山口迤邐與石􅀈􅀈上下兩崖間局促不可步有石板嶂百餘仞側立天畔余措屨其下則見天光隱隱一線頃又西折循石棧石級而上曶岩嵐斗裂旋如兩墻堵然余乃搬挲青松頂東望遙睇岩外隔雲煙火數家恍然若武陵桃源咫尺至則見郭翁與獅泉吾南諸子談欵久之迤夢臺過飲唐曜洞天泉光野色環列百億狀曶凛如化國神皋自夢中而下坐久仰睎俯眺不能悉但見懸崖萬仞瀑水自天飛墮日光倒射錯閃如散珠然簾揭于前旁有題曰龍湫飛來處岩背霧濛濛然起飛流噴沫數十里朝昏莫辨余且駭且盼郭公顧問豫曰有本者如是人之學也亦然圖書編卷六十六
