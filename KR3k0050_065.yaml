body:
  text: 圖書編卷六十五明章潢撰廬山總敘廬山者古南鄣山也亦謂之天子都天子鄣又謂之靖廬山又謂之輔山又謂之康山山據江湖之會其脈來自高梁白藤迤邐走東北三靣阻水其西乃大陸羣山所奔湊也其支南行三數十里盡乎鄱湖之泛南康郡之所負也西南行者盡乎吳城其東北行三數十里盡乎南湖觜其折而西則盡乎湓浦九江郡之所居也蜿蜒蟬連指列條敷綿亘垂五百里實湓城星渚之奧區洪州諸郡下流之屏鄣崇巖峻壁竒標殊狀亞於五嶽上有靈境仙真之所治也號稱洞天福地其秩祀始於元封幽勝著於大元祠廟盛於開元竟兩漢及晉山皆隸柴桑縣隋隸湓城縣唐隸潯陽縣五代吳時隸德化縣而以山南為星子鎮宋太平興國中折星子鎮為縣屬南康府而廬山始隸二境國朝因之其東界吳章山其西界康王坂其南為星子其北為德化以分治之云江西南昌府山曰西山府城西大江之外綿亘數百里為府城西北鄣一最幽絶處有香城蘭若又梅嶺桃花嶺洪崖葛仙峯大小蕭仙峯翔鸞洞天寶洞秦人洞諸勝山勢與匡廬等而餘山皆支附耳罕王嶺府城西六十里白孤嶺府城南六十里鶴仙峯竒峯傑然獨聳龍門山豐城旁有龍湫堯峯上有堯祠因名羅山豐城棲賢壇石進賢藥主山奉新百丈山吳源水倒出飛下千尺故名唐宣宗遁迹方外至此題詩日月每從肩上過山河長向掌中看乂有柳公權所書法正禪師碑石門山靖安玉枕武陵南山寧州隔溪跨橋穿石竇而入懸崖峭壁下瞰修水有釣磯玉溜石積雪石宋黃庭堅題字洪崖左右石壁陡起峭絶飛湍奔注下有洪井乃洪崖先生得道之處因名秦人洞西山李八百洞奉新古迹滕王閣俯臨章江龍沙蜲婉髙峻其形如龍饒州府山曰芝山城北馬迹山城東北青峯浮梁王師山縣東洞靈巖縣東有洞四曰慶雲蓮花含虛張公云藏山餘干趙汝愚讀書處理宗為書梅巖二字石虹石室旁石鄣有古篆八十三字難辨石城樂平嵗寒德興有周冕嵗寒二字紫雲安仁仙巖巖中有穴二十四人不能到下有溪流漁舟人仰視穴中各有杵臼織機紡車牀具水桶板倉之類每占倉板開則嵗豐閉則歉云廣信府山曰靈山府城西北有七十二峯郡之鎮山也道書三十三福地上有龍池多珍木竒卉東北峯挺立孤石髙百餘丈西峯絶頂有葛仙壇遺址石橋山山半有巖洞望之如月上平坦如橋水南王山龜峯弋陽有三十二峯象山貴溪詳後陸象山與朱文公書鬼谷道書十五洞天有蘇秦臺張儀井鬼谷子嘗居此龍虎山兩石對峙如龍昻虎踞三十二福地漢道陵遺址鵝湖山鉛山山上有湖龔氏畜鵝于此靈鷲永豐仙巖貴溪有二十四巖鬼谷洞鬼谷山周回四里容千人懷玉三清懷玉相並洞巖巖石竒秀林壑尤美結鬚巖在三清山龍口巖峭石壁立龍泉二道㵼下如龍口噴涎南康府山曰廬山古名南鄣周武王時匡俗兄弟七人結廬隱居故名其山疊嶂九層崇巖萬仞周圍五百餘里南方巨鎮也道書苐八洞天五老峯廬山紫霄峯廬山有禹刻石在石室中鐵鉛峯香爐峯錦繡谷廬山鞋山府城北獨立湖水中其形如鞋石壁山都昌旁臨大江有石如壁大磯山都昌元辰山都昌左蠡山彭蠡湖東雲居山建昌山常出雲故名古迹白鹿書院五老峯下九江府山曰大孤山府城南彭二湖中四面洪濤屹然獨聳柴桑山寰宇記柴桑近栗里陶潛此中人馬當山彭蠡陸魯望銘天下之險在山曰大行在水曰吕梁合二險而為一吾又聞乎馬當石壁山一名玉壼洞博陽德安即敷淺原根盤三十里一邑之重鎮赤顔瑞昌赤松子遊石鼓山德安每天隂輒聞鼓聲因名石鍾山湖口有二水石相傳聲如洪中上鍾尤竒小孤山劉阮詩擎天有八柱此一柱猶存石聳千尋勢波流四面痕上霄峯廬山上有石室石梁瀑布始皇嘗登此謂與霄漢相接故名玉華洞瑞昌天池峯嘗有神燈之異康王谷王禹稱序康王谷為天下第一水簾髙三百五十丈為水簾洞虎溪府城南建昌府山曰鳯凰城北郡之主山從姑上有玉泉玉洞天梯天柱等竒麻姑周回四十里第三十六洞天有五老萬壽等峯有桃花源瀑布泉丹霞小洞天旁有水簾巖碧蓮池仙都觀廪山南豐東巖新城疊嶂排空與日山相望軍山南豐上有王母池西趾有山茶洞桃花源屏嶂山中華廣昌望軍峯突兀萬仞俯視軍峯于其下有石􅑐石佛石獅石龜石錫杖石布袋石棋盤石水簾之類像皆天然秦人峯在麻姑山丹霞洞在麻姑山仙人巖與五藏巖相近臨溪峭壁數百仞天氣晴明巖中光彩動搖隱隱若一童子出沒其問壺公巖南豐巖極髙峻人迹罕至撫州府山曰龍會城西英巨山巖內有石人坐磐石上體有塵穢則興風潤則致雨晴日遍體瑩如玉靈谷中有石室靈像臨川記懸崖半岫有瀑飛流分于木杪映日望之如製練金石臺山有山如臺者五華蓋崇仁形如華蓋又號江南絶頂昔王郭二仙超升于此上有仙祠下有紫玄洞旁有雷洞天將雨雲氣如爐煙直上須臾雷聲隱隱而出雲林金溪崒嵂數百仞焉縣巨鎮上有三十六峯踈山金溪曹山宜黃豐材樂安茍伯子記登之者望廬陵彭蠡在其下云五峯臨川志城中有五峯三市或謂青雲嶺逍遙嶺鹽嶺蕭家嶺與慶嶺而五古迹石䂬宜黃縣南石梁橫空長數十丈南北相接平廣可容數百人臨江府山曰皂閣城東形如閣色如皂故名道書三十三福地山有凌雲峯潄玉泉投龍潭九龍塘磨劍池會仙橋著衣臺煉丹壇仙人石諸勝迹小廬山新淦周回百里上有石池泓澄如鏡又有石泉分四飛瀑玉笥新淦第十七洞天第八福地有三十三峯六洞二十五壇十一亭壇其餘諸勝尤多蒙山新喻仰天岡髙聳數千仞境界清絶一縣之景瞭然在望雲谷山山在府西南上有觀曰玉虛又有靈茅丹井蜻蚨塘蟾蜍谷黃岡葛峯筯竹嶺真君泉聖水亭諸遺迹吉安府山曰螺山府城北山南臨贑江宛委如螺神岡山螺山對峙青原山中有駱駝峯鷓鴣嶺勢甚喬聳王山峻拔如筆架旁一峯尤尖聳上有三壇下有定光巖又有十二境武山泰和朝元吉水山有數方石亂點如金名黃金臺南山山阿數石屹如人立號石人峯龍華永豐鴿湖山安福上有鴈峯白鶴峯石人峯三渡橋桃花澗景物幽絶武功山根盤八百餘里跨袁吉二郡玉泉龍泉芙蓉萬安秋山永新有七十二峯顔真卿龍溪二字迎岡永寧禪和洞永豐中如暗室以火燭之石殿鐘鼓畢備寶仙聖洞永新石廊洞安福石蓮洞吉水金竹峯兩峯對峙如竹瑞州府山曰鳳凰山府治後大愚山府治東華林府城西北鏡山上髙山有三端圓如鏡相對而峙中有徑可通人行九峯山其峯有九曰雲來飛雲香爐翠霞蒼玉芙蓉清流蛾眉天竺名小九華黃蘖山新昌唐宣宗微時遊方至此與黃蘖僧同觀瀑有聮詩慈光洞緣梯而下始有門可入蒙山洞有兩洞惟下洞可遊深不可究又有石立巖間上下無所附謂之無根石袁州府山曰袁山城東北髙士袁京居此蟠龍自大路至山頂凡三十六曲上有寺四面皆峭壁湍瀑飛㵼前有龍門閣平挹雲峯蓋勝境也王雲詩云經夏地無暑未寒水有氷鍾山分宜九嶷山萍鄉連戴九山因名金雞萬載化成巖下瞰秀江仙遊巖萬載有石鐘扣之清越又有石如道士狀龍成巖萬載巖深九房有石如列仙者以萬數有石鐘扣之有聲有石硯巖溜注之墨橫硯上筆在硯旁皆石也石乳洞深一里許滴乳堅凝成觀音羅漢像或遊宴其中殽核狼藉經宿如掃宋教授鄭王賔記其事鐫于石洪陽洞相傳葛仙及婁陽所居洞中深邃嘗有人至其邃處聞昌山渡篙聲胡二詩云天窗通月影地穴透江津贑州府山曰天竺山在府城東儲潭山山俯清潭崆洞山章貢二水夾以北馳為羣案山金精寧都為三十五福地太平雩都陳石瑞金榖山信豐山腰有石室山頂有池舊傳池有五色鯉欣山安遠中有石室石牀産丹橘異竹上洛興國有石墨可書有木客能詩東龕巖興國前後有讀書巖試劒石靈湖石舫石笋峯筆架山索泉銅環鯉瀑布泉僧寺十景唐鐘紹京讀書處松梓龍南上有石松石柏又有石笋三十率髙三十餘丈樓蓋石城梅嶺寧都漢閩越反武帝令諸校屯梅嶺即此需巖雩都通天巖有二一在府城西有穴透山嶺一在龍南縣有二洞一髙廣通明一深不可測南安府山曰聶都城西南山海經云聶都之山諸水出焉石君山南康三石形甚似人龍鳯山上猶有龍飛鳯舞之狀大庾嶺府西南磅礴髙聳南接南雄猶石嶂上猶聳拔中峙羣山拱揖其嶺有池深不可測又有月巖穴圓如月經數十尺表裏不隔巾子石南康縣北有巖可容五十餘人泉出􅑐畔四時不竭笋石上猶縣西有大笋小笋二石特立如笋然西山西山在縣西四十里巖岫四出千峯北來嵐光染空連屬三十里按郡圖初濟江十里有磐石名石頭津亦曰投渚又並江北行有銅山即吳王鑄錢之所山有夜光遠望如火以為銅之精自石頭西行二十里得梅嶺即梅福學仙之處嶺峻折羊腸而上十里有壇曰梅仙壇壇側有觀曰梅仙觀自梅嶺紆徐南行六七里得葛仙壇在山之東北面尖之側耆舊云是葛仙朝禮之壇山下有村又側有川為葛仙源自葛仙羊腸之下十里又平行十五里捫藤蘿而上五里得洪崖山枕壑有洪崖先生煉丹井自井南繞溪五里有鸞岡洪崖乘鸞所憩之處由岡西折行五里有一峯最髙得顧嶺云是王子喬控鶴所過之地壇在鶴嶺之北又有二崖號大蕭小蕭蓋蕭史遨遊之所崖側有蕭仙壇又蛇行十里得天寶洞又南行三十里得許旌陽及諶母宅又自梅嶺而北上下五里得安母壇邦人水旱則祈之又北行四十里得吾之源水髙下十堰每堰灌田千餘頃其極源至山之椒得風雨池風雨池者能出雲氣作雷雨西山之勢髙與廬阜等而不與之接餘山則枝附耳或謂隂山多浮屠陽山多仙迹云麻姑山旴江山水最勝而名天下惟麻姑直城西十里緣山麓而上百餘步有尋真亭又數百步有雲關嶺極峻山皆纍然􅙪貯益上斗折數百步至山半勢益髙俯視諸山如龍首峯如赤面石如從姑石皆帖然出履下山下有澗齧石南奔十餘里其流如平布石者如織組其擁而下者如驅潮捲海前者未去後者湧至暴悍竒怪莫可名狀其聲細者如響環一如鳴球其大者震撼林谷如轟雷直上數十仞俄有水垂峽如懸河蓋所謂瀑布者其雄壯瓌異尤為麻姑竒觀龍虎山余嘗經道信州愛其山水竒秀趣行帳不遂結纜登延又思此山有龍虎山世居張天師自漢迄今播靈承秩數千年勿替引之與兖孔氏對意其間滋多融結未繇躡蹻一臨賞暇則搜帙得李仁龍虎山志為之擇列于篇時覽觀之以當卧遊云山東距信二百里西距饒三百里繇建寧山發脈而導水自卲武為天下福地祖天師於此煉丹青龍白虎盤左右因以名山即上清宫也而信州圖志云山在上清宫二十里仙巖之上則古今易地也象山此山極髙其勢南來折而東又折而南巨陵特起豗然如象故名象山山間自為原塢良田清池無異平野比來結廬相從者甚衆但有耕治之田特少精舍前兩山回合環如肘臂臂間田亦不下百畝兩腋間有二池東曰濯纓西曰浸月一家結廬於東塢之上比精舍地為少髙兹山常在雲雲常在其髙處出故名以儲雲一家結廬於前山之右石澗飛瀑縈帶其側因名以佩玉其蕙林瓊芳愈髙披荆則皆因山中之佳美地勢之髙下以名之相繼而來結廬者未己未及名也精舍簷間層巒疊嶂奔騰飛動近者數十里遠者數百里爭競竒秀一峯特出天表端聳于前鋭秀如筆為諸峯之領袖者則雲臺也朝陽麗景明若圖畫暮燒聯光爛若綺繡雨暘雲煙出沒之變不可名模東山之崖有翻經石西山之崖有歇石皆蒼松蟠覆其上其下壁立萬仞山之隂者有塵湖山其巔天成一池泓然如鑑可以結廬北峯之髙如蓋可以登望南望羣山益遠溪谷原野畢露東望靈山特起凌霄端方廉利吳越所未有也下見龜峯昻首穹背形狀逼真玉山之水蓋四百里出於龜峯之下略貴溪以經兹山之崖西望藐姑石鼓琵琶諸峯􅍶崒逼人從天而下溪之原於光澤者縈紆泓澄間見山麓如青玉版北視龍虎仙巖臺山僅如培塿東西二溪窈窕如帶然地勢夷曠非甚晴徹目不能辨常沒於蒼茫煙靄中矣又曰兹山之勝尤在瀑流東有磜潭西有半山磜潭不下玉淵半山可亞卧龍前兩山回合之處又自為一澗垂注數里激射噴薄飛灑映帶於茂林之間春夏流壯勢如奔雷其瀑因石賦形一曰風練二曰噴玉三曰翻濤四曰潄珠五曰水簾六曰雙練七曰流銀八曰飛雪木石自為階梯可沿以觀日崖有蟠松怪石却略偃蹇隱見於林杪玉山玉山與天際勢聯北斗又名玉斗山循山之麓升降凡十有五里至大洋坂地寬曠約數百畝而竒峯秀嶺怪石深池環列于前後左右真仙靈之窟宅也山有龍潭一十八磜又有二十四竒曰玉瑘峯銀尖峯七盤峯獅子峯石牛峯雲蓋峯蟠龍峯金雞墩洗墨池望香墩九蓮池天門峯飛泉峯屏風峯誓坡石浴佛池彩霞巖過雲洞連理木天聖松金剛嶺石鼓山羅漢峯志初巖真諸邑勝槩之尤者也故縣亦由此名紫巖在東佳泉之上巖石峻聳平正如壁望之紫色瑩潤泉出其下飛白㵼碧猿猴往來其上恬不畏人亦竒觀也又按紫巖泉水天晴則西流雨復注之東東流則西水遂絶西流亦如之若雨晴未定則西有小水或遇旱人欲塞其竇決之於東亦不能也其中流名馬尾泉傍流則人開以灌禾者其下有龍潭旱則馬尾之水微而潭水多但不能及遠嵗豐則潭水少而東西流大此其大致云自泉西行數步至石洞深不可記洞口有仙人迹仙人馬蹄遇大雨濁水噴湧出至流杉篙船板黑魚諸物旱則建昌武陵瑞昌諸邑之禱雨者畢至至必秉炬以入或火滅則昏不知所出進四十里許有大湖昔求雨有善泅者泅過其湖見小山小田或繫桃符用狗首觸龍聞土雷之聲即得雨相傳陳友諒之反也人多於此洞逃匿焉自洞西半里至白鳥洞厥地恆乾雖大雨不入洞有三重其一光亮寬厰可容百餘人石壁上有梅有松如畫夏百鳥飛來不常冬多宿於松梅孔竅上其二可容七八十人進三重極寒上有小池倒垂尖峯水滴滴不絶峯上生龍鬚虎耳諸草三重後必用火光照入見巖閣然難窮其所止自洞西行半里有小泉蔭注軍田旱暵不竭又半里至石菖蒲墩多居屋可容萬人又一里至長溪山乃下焉石洞東行二里至赤壁崖其石色紫方圓有三五十丈髙有二十餘丈壁光間有微竅猿猴多扳藏其上下崖一里至觀音洞有石門方圓七丈餘中有石觀音香爐生成自然洞一里下山水之東西不常洞之三五各異竒而又竒者潮山潮山者唐武德中浮屠氏四祖某禪師嘗居之夜間山下有聲如潮故名乃前入山徑有石嶺穹然左轉而壁立其右有方石若屏風然余由左峯之麓緣微徑側行數百步忽平陸中開溪水交注潮山此其山口也乃循溪稍折而北其西崖諸峯皆石骨凝黑如積鐵斷而復連其圓而宛曲者為如意巖竦而虛嵌者為通天巖巖中刳為小洞可容一人坐其項中泐而下墮有泉上出若撤萬珠濺巖腹而下錚錚有聲又轉為圓峯髙踰百尋石乳鱗綴若懸鐘焉旁出石筍髙與峯等若劈而欲離者下有石室設四祖像其中俗傳巖畔有手植松今不存矣其東崖諸峯多土而少石水潺潺徑且圓者為豬頭蹲而踞者又若日與狻猊兩崖之間皆平田沃壤余躡石攀緣上出叢薄一忽得山門翼然循階以入前有石甓浮屠相傳為唐則天時舍利塔方趾而七層有古藤罥絡其又入為法堂有鐘懸木虡間視其識文乃宋淳化五年所鑄其寺則云潮山寶肇舍利護國禪寺時潮尚隸龍泉之和蜀鄉不知何時并入西昌也寺後絶頂有觀音石其中峯髙且圓者名大佛座其西有小峯秀出而上夷者名小佛座舊傳巖下有石穴日出鹽少許僅足充供無有餘者或訝其少加鑿之鹽遂不復出寺右有小徑可通後山日晏不能復進矣百丈山豫讀五燈會元慕百丈之宗風又讀百丈清規今諸叢林所守者知兹山為昔唐宣宗禪棲之地嵗甲子豫尹新吳問山去縣百六十里大半皆髙山廣谷溪澗重阻蓋自昔宦遊好事者終鮮至焉時三月豫以公事至其半途遂詣山至嶺皆田瀵四散滿其上畦及于下畦無慮雨暘其不可田者盡樹大竹從風靡如流雲亭午始至寺在山谷窅無民居少憩至塔院尋柳公權石刻天下師表大書云久失所在緣崖而上有宣宗流觴曲水鑿石所成曲折重旋形方而巧上有巨字刻二字石盡泐不可辨西有石壁􅋂巇榛莽不可窺意不止命痛芟之亦無所見命衆盡力刮苔蘚報有字迹盡除之上刻漢篆大二尺許剝蝕過半下刻天下清規字大近二尺真柳公書也梅田洞出水東二十里望西南上有連峯截天若陳馬屏幛者義山也山下平田中有石峯駢出纍然若囷廪狀者異之曰此梅田洞也中虛而多石乃循行水滸出柳隂遇射魚者因緣田陌間乃徑石橋縈折深窈由山麓以渡見石峯隱隱朝霧中髙下出沒若近忽遠又前涉小澗數百步則石峯矗然若躍而忽起于前由山右折而西以訪所謂前洞者其山絶浮壤由頂及趾皆黑石叢朵植者若屏覆者若舟倚者若几稜利若攢劍橫偃若墮槨又若牛卧虎蹲鰲擲而蜃戴起伏先後雜遝百千有縢蔓樛灌羅生罅隙間紅碧蒙幕莫可名狀巖趾有小澗水流如線出門之右以達於溪門髙可丈餘廣八九尺中寬足受數百人而莽晃幽􅞅率入益眩不可辨久之仰見竅竇宛然天光下注巖中石色隂白兩壁皆甕腹若陶而虛者若刳而空者中有立石最髙大名觀音石前左有石柱附壁蹲植于地連蜷夭嬌耳角交峙筋絡怒漲時有隂泉滲漉而下或以為龍首鄉人嘗禱而雨焉龍首之隂有石方廣一尺餘頗類棊局有乳頭迸出石面若布子然可捫而數也復有仰天盆石泉下滴其窪琤琤有聲其上皆懸石綴列若肺肝若蜂房蓮花嵌巖玲瓏系微而末巨仰視之有悸心焉或投小石擊之其鍧然者若鼓鏗然者若鐘而亦莫之辨也其旁左暨洞後有隧穴極深窈不可入聞好事者嘗挽綆篝火魚貫蛇行循小澗之空以達然不可行也乃出洞門循故道折而南以入髙如前洞而廣倍之深復十餘丈因石勢髙下宛曲限為三區其頂覆有巨竅深若圜井偃若華蓋上弇下呿光景注射中刳為池有泉畜焉清泠砭骨夏不溢冬不涸或曰即前洞之泉源也洪陽洞在分宜縣西一十五里袁嶺三峯之麓世傳葛洪及婁陽所居洞口有巖巉岏如蓋由洞門入石室東向去地髙數十丈初入一間其平夷明爽可容百人由西竇而入始幽暗舊有屋七十二間聞昌山渡篙聲今遊者可至第十二間餘則隘而不可行矣其中有白沙如鹽傍有鹽翁有石涼繖又有石如帆如鼓如田土邱陵仙佛之像狀態不一洞有水春溢冬涸上有雲霞氤氲之狀內有穴可通絶頂仰見天日俗云六心又有石燕至春或能飛翔古今遊者留題石壁甚衆有曰天窗通月影地穴透江津石乳洞洞在縣東三十五里洞之前有石亭衡二十五步廣三步有竒崇五十尺坦而明無翳礙亭之中有門自門而入密不容光若廣宫大厦閴然如夜半也執炬循行歷歷可數曲而深度百尋其廣有三步其崇有五十尺而殺之環蓋維石門入而履之初則平土也可驟可馳已而降登旋折所觸惟石素乳盤結下垂旁出異狀爭進人物可名若觀音若波羅若鐘者若田者若井者觀音之狀下覆上承羅漢之狀森列不一鐘無形而有聲附壁莫辨叩之乃應田宿井有邱塍卑髙廣狹為之制井分三級水清而甘滿不溢酌不減田之上有小洞方廣二十餘尺峻不可入號石倉井之旁深入可數尋裂兩岐終合而一號南北市洞之略如此梅巖洞自樂平之德興也道出某地遠見一山髙十丈餘狀特異問之曰梅巖也行數里巖漸近縣令鄒泰請往觀之遂至山下數竒石離立輿從石中上入洞門門闊十餘丈釋輿而步秉炬前導稍曲而左窿然如入室焉當承宇處石有如笋者如􅙪者如珊瑚琅玕者纍纍下懸如將墮然下近壁處有石鱗􅀈區分級列如或疆之號仙人田又石而行又如一室室之頂垂石折盤如龍蛟之耳中一竅水滴注處石承之圓如井欄崇如柱礎中一穹與上穹對水滿則溢又右折而行地漸髙有石如舟者在左如棋者在右地漸寬平如階以升其上蓋揭鍾懸益宏而虛如亭之狀左右穴各一天光照焉出之則山巔也紫霄三巖南豐縣西南八十里有紫霄觀相傳仙者壺公於此得道壺公者後漢費長房師事者也宋嘉定五年來遊紫霄所謂三巖者蓋下巖中巖皆乾戶而上巖兑戶也下巖在山半屋三分一在巖中屋顯石壁峻立有竇橫袤尋丈許中有仙牀丹匣及蛻骨或者壺公之遺耶觀旁老松一株大三抱夭矯騰上如蒼龍拏雲恐漢時物矣從旁得路數百武為中巖橫袤不十尋然益怪竒清遠疑壺公得道處也又從旁得路數百武為上巖則山之巔矣山益髙勢益峻不可得棲止及山之巔肆望遠焉則軍峯插天如玉笋出其右旴江㵼漢如玉繩維其左金嶂鷹石朋從友列如屏帟遮其前而其後則山驅羊而隨之水束帶而歸之首不知來尾不知去遡遊二三里許兩崖皆峭壁巖竇峙列上頭露青天一線下皆澄潭百丈巖上仙館棋局歷歷可辨數然四壁峻絶梯凳綆梁無所於施人迹不可登到大江以南一勝處也三清山遊三清山出門遇雨宿大乘寺明日晴過芹源又明日至金砂靈濟廟叩水玉洞道緣石布草其上有水溢出行里許大石斜覆若屋曰龍門匍匐而過又數十步至洞口洞前有石與洞口平立其上石壁如削寒氣逼人飛瀑直㵼入洞底深不可測是日宿廟中又明日登山步長路峻五六里至馬鞍灣路忽下裊如入井以手按前行人肩後行人挽其裾懼其翻于前也稍平有林自此路直如登梯以帛繫前人腰兩手曵帛前行人步亦步既至以為絶頂也路又下凡二升降至銀屏石下仰望石與雲齊度風門又二升降至結鬚巖上有巨石橫亘路在其下相傳李尚書結鬚而度故名又二升降至神仙洞有石可登登其上望怪石羅列如二人奕如一人試坐如鎗如旗如蓮花者三如浴盤如僧如道士如將軍如人所疊橫五縱四如人飯到碗于前過此又二升降至羅漢洞如普陀巖觀音中坐如龜如龍如磨如燭檠如人以手指天又二升降三石齊立若排又一石若屏始至山頂凡二十五里稍下得平地寬可八九畝有老屋其上作三清觀有石刻三清石仙君葛仙翁李尚書金童玉女及潘元帥像明日謁神刻姓名香爐石上白霧下山再三乞晴于神須臾霧捲日出登香爐石望丫巖山見石仙君仙人橋鐵爐如石上生成尚書所鑄也卓旗石有竅圓深旗竿所立也雷公石判官石幞頭石刁刀石帽石西望彭蠡饒信東望衢巖隱隱在雲霧中萬山具在腳下髙低重疊不知其限自此而上又二十五里始及其巔峻絶而不可登者李公丹爐在觀上六七里山之下水西出則入于江東出則入於浙蓋江浙山水宗也宜其髙峻竒峭為仙靈之窟宅哉大華山大華山蓋屬撫州崇仁縣南距二百里西接樂安東連宜黃周匝百餘里髙二十餘里支分脈絡演據衡廬之間所謂江南第一峯乃洪都之祖龍也三峯品卓其上中隱紫玄洞天浮邱王郭三真駐迹修真遺靈之所山巔秀聳清麗狀如華蓋故以名焉靈蹤異迹載于李思聰詩巖洞之竒景物之勝則具載其志云顔真卿記曰粵惟江南之地佳麗垂名山嶽之間宛有仙洞豫抵膺聖澤廉察臨川一日按地圖得屬邑崇仁縣華蓋山有王郭二真君壇存焉欣覩異事未原其始他日公餘因令軍將往山下訪求碑銘果得一石記乃隋開皇五年焚修道士李子真于壞碑上再録其文則知王郭二真君仙不顯名王則方平之從姪郭仙王之親弟也始於金華山修道以圖軒舉尋遊洞府自玉笥將之麻姑洞道經一山問鄉故老曰此為何山對曰巴陵華蓋山也二真君相與言曰此山福地名亦異焉因求卜止煉神丹山下父老詣而再拜曰敢問真人之名字曰吾等修志於虛無不欲述焉後有一道來謁敢問真人之師曰吾師浮邱先生先生則上界天仙也頃於金華山遇焉二真君能走石飛符興雲致雨或人有疾苦暴患往而告者即飛符以救之嵗值大旱致霖雨以濟之至晉元康二年二月一日綵雲連晝仙樂喧空二真君乃騰鸞跨鶴冉冉上升今上升之壇及浮邱先生之壇存焉龜峯山龜峯山在弋水之陽髙廣延袤不知其幾百里南北而望之則羣峯叢映朗然如一東西而觀之則二山對峙百步而遙南聳鋭而碣樹北憑陵而臂引睨其背則橫亘硝碏如堅壁固壘冠首有堞面其前則巑巒復崿蟬聯星錯矗矗嶷嶷更相朝捧石之異形厥有千萬或牙或爪或屬或倚呀然而怒俯然而踞獸視欲搏鳥斂將翥營星隕墜不周折落海怪間見戎怪叢置可得而睨不可得而形且髙有石橋卑有石牀竇谷之雲歘變異色杉松之風脫無俗聲一日之內一山之中而景物相勝應接不暇居山之人為豫説此山之峯幾百其數得其名者三十有二或得之往記取之狀類皆筍植笏立極於峻拔猱雖善援無得而至也金精山金精山在寧都西郊十五里未至縣一舍外望陳石截雲丹崖翠壁煙靄明滅知為神仙區宅出北門渡拱辰橋折而西入至蒼山篔簹谷石峯已漸獻竒昻首尻坐作伏獅狀項湊圓石如懸鈴是為獅子峯入青牛峽青澗出嵌壁下諸石魁崖擁道山氣清肅愈前愈竒不一名狀拏雲而驟馬囷立而屏張截者玉削跂者鵬飛鋭者圭列展者旗揚界立者如劍剖鋸分擘峙者如鐵城環闥穴聚者蜂巢燕壘石脂搖光者膏凝液流髙岫出雲者炊氣鬱蒸千竒萬異駭目怵心石之著名昔十有二峯獅子其一焉微圓而長承以盤砥如菡蓞出檠蓋中者蓮花峯也雙峯合峙中泐至麓如僧作禮梵㖵者合掌峯也雙石顆頓中出孤木枝葉扶踈如帶果飣者仙桃峯也削壁堊色石紋墨縷拂布石面者披髮峯也怒踞當道耽耽俯視者伏虎峯也林木蔥蔚蒼翠輝明者翠微峯也闞洞前立與靈泉仙龕對者望仙峯也瓏玉疊瓊臠石叢珍者三巘峯也萬條叢生根柯特異者瑞玉峯也千仞峭聳中通洞天者凌霄峯也豐首低尾色如渥丹狀如腰鼓者石鼓峯也回峯有竇出半壁中裂修縫垂椽藤樵牧黠勇者扳藤猿升窺洞中極廣敞宛然廳堂房闥舊傳有金牀玉几是名碧虛洞焉有石遠睇如鋸近則團立直上有金縷者黃竹峯也峯麓﨑嶮路絶梯登兩石傾軋中僅線通匍匐登其巔廣平可容千家兩泉湧出甚洌極旱不涸中更寇亂辟而寒居者多得免焉兹十二峯亦隨見指名要未盡兹山竒也陽靈觀在羣石間最竒處自仙桃閣入石為甕石啓戶穿行曲棧環石自一區可巖覆之仰視天空如規像真仙其間層殿復閣屋無陶瓦雨不能浸巖頂絶木鶴四時轉指巖面飛泉潺湲日夕如雨自殿沿崖曲折下石益蹙氣益肅靈泉自石罅迸㵼龍池山張渚鎮二十里陟平岡入平庵坐山阿圍峯整列更上四里許至龍池為中庵轉陟里許越分賔巔歷磴而下石畔石壁峻聳約數百仞從巔落十數仞許嵌葺一徑闊不半武左懸深壑右屏嶙峋雄麗巉簇歷步四五百武橫亘不斷乃因突兀置小閣前楹在空從閣側戶俯而出又百武一石屋深丈許闊倍之為避暑窟石壁連歷尚遠無路可陟閣上推牖松嵐矗矗竹壑森森外岫三疊逈出如接雲表天髙地下曠然中處與塵界隔絶更陟極巔處有圜臺凌風久佇震澤滆湖洮湖及應天蘇常鎮湖寧廣諸山長發縷縷皆入望中廬山山在江州潯陽南南濱宫亭北對九江九江之南為小江山去小江山三十里餘左挾彭蠡右傍通川引三江之流而據其會山海經云廬江出三天子都入江彭澤西一曰天子障彭澤也山在其西故舊語以所濱為彭蠡有匡續一作俗先生者出自殷周之際遁世隱時潛居其下或云俗受道於仙人而適遊其巖遂託空巖岫即巖成館故時人感其所止為神仙之廬而名焉其山大嶺凡有七重圓基周回垂五百里風雨之所攄江山之所帶高巖仄宇峭壁萬尋幽岫穹崖人獸兩絶天將雨則有白氣先摶而纓絡於山嶺下及至觸石吐雲則倐忽而集或大風振巖逸響動谷羣籟競奏其聲駭人此其化不可測者矣衆嶺中第三嶺極高峻人所罕經太史公東遊登其峰而遐觀南眺五湖北望九江東西肆目若登天庭焉其嶺下半里許有重巖上有懸崖古仙之所居也其後有岩漢董奉復館於巖下常為人治病法多神驗病愈者令栽杏五株數年之間蔚然成林計奉在人間近三百年容狀常如三十時俄而升仙絶迹於杏林其北嶺西巖之間常懸流遙霑激勢相趣百餘仞中雲氣映天望之若山有雲霧焉其南嶺臨宫亭湖下有神廟即以宫亭為號其神安侯也亭有所謂感化闕七嶺同會於東共成峰崿其巖窮絶莫有升之者匡廬山東南有高山惟匡廬南康在山之陽九江在山之隂實二州之鎮盤據三百餘里左距彭蠡後阻江漢右厄全楚前俯豫章諸州有崇峰峻嶺飛泉絶壑良田嘉木古之託於禪鍊棲遁者接踵其幽蹊隱迹不可得而窮焉丁亥春余使楚經九江舟上望之峻極雲際行二百里猶在目歎不能至也戊子冬以出參省按南康乃從郡西北循湖之嶼至於山麓入曲阿五里淺水入徑有長松如堵陟巘復降不斷行列底開先寺寺宇經燬惟鐘樓偉麗僧廬倚鳴鶴峰髙下為搆旁有臺相傳梁昭明讀書處實南唐元宗在潛邸嘗讀書於此後節度馮延已改為寺臺後崖半劖宋黃庭堅七佛偈跋字二寸許臺下多宋題刻剝蝕不可讀兩崖闢處入一深谷泉數疊而下注於潭曰龍池乃厯重巘上望之見隱隱從雲中直下如匹練所謂瀑布泉也香爐雙劍二峰出其右潭上絶壁劖龍虎二大篆相對龍為南康守季亦虎為丞相喇巴哈池上卧石數丈劖廬山二字大約四尺第一山三字可二尺喬大宰宇竒題瀑布泉三篆宋嘉定間劖刻布滿石上不能盡辨龍池水支流石間有鑿渠長丈承以石柱連接數十損者以竹筧代引池水入僧厨注大石槽中溢則散流山下皆宋物也出寺北行緣諸峰下數里一徑而入曰萬杉寺志云古僧大超植杉萬本宋仁宗有御書金仙寶殿南宋有國泰清淨大書蘇子由詩云萬本青杉一手栽朱文公詩云門前杉色深屋後杉色竒今空山荒徑罔有存者頽垣敗瓦一大卧門而已從五老峰前巘東行十餘里南出一徑環山帶溪溪石磊砢泉鳴石門鑑然若琴初至釣臺亭洞學諸生咸集導至洞學謁先聖先賢升文會堂出由貫道橋渡溪而陟至髙美亭降至大意亭緣南崖微徑渡濯纓橋從回流山盤折而上及巔坐六合亭觀五老諸峰時夕陽下山煙嵐漸合乃返宿文會堂東軒明日東過獨對亭涉枕流橋從峽觀文公敕白鹿洞書院六字劖於峽石自潔二字劖於南崖枕流二字劖於端中考自唐李渤與兄涉俱隱兹山養一白鹿因名南唐升元中建學館以李善道為洞主號廬山國學宋知江州事周述學徒數千乞賜九經從之洞學益顯名石鼓嶽麓諸學不能及也豫就峽之壁因題曰瞻彼白鹿文猶在兹山髙仰止川逝如斯字不盈尺劖之石過洞學從舊路循五老而西有良田數頃桑竹掩映廬舍負山者多樓居從西北行兩山夾澗緣澗而上田髙下因之不絶凡數里轉大谷間奔崖墮石森若碁布奔濤亂流羣轟若雷跨石梁長數十丈所謂三峽橋也從橋俯視泉石㵼石面震撼林壑一石數丈橫亘泉上往觀之毛髮直竦瞿塘灔澦不踰是險飯千僧菴即古楞伽院已而循澗北行遙見山南崖壁間白光搖動方數十丈佇久怪問輿夫云此簾泉也水態之竒世不再見又二里至澗絶處一淵不可測渟泓如壁其源蓋自五老峰三疊而下隱伏於草莽叢石間注之淵中淵側巨石平廣劖宋張安國玉淵二大篆畫廣四寸字徑五六尺許旁一石劖嘉定庚辰秋九月甲申知南康軍史文卿蒞事之時躬謁白鹿洞學先聖先師釋菜禮成同軍判官天台張萃軍學教授四明任下三字不辨書甚遒美余亦紀歲月尋棲賢即李公擇藏書處也凋落僅存在五老峰之半有廬屋數家因求徑陟厯樵人告不可往仰視巃嵸如黛既壯且秀若排雲然故於諸峰之名獨顯時從行者衆頗不便登乃返惟康王谷陸羽泉右軍鵝池淵明栗里白鶴觀岐路漫失不及往然匡廬之在南康者亦略盡之矣己丑夏豫按九江復道出南康從郡北城觀五老峰若去咫尺觀瀑流更密邇及所厯陂陀髙下愈行愈遠凡十五里始入别巘初見雲氣蔽山行近漸無回望復合又五里至白鹿洞口乃志云羅漢寺一徑入也自此峰巒澗谷縈回陟降不計凡幾其間田廬雞犬林木掩映自成隱居行四十里皆闞彭蠡路漸西折經丘數重陟茶山嶺峻絶及巔長江巨湖蓋在指顧下數里拜周元公墓又十里從石塘鋪度橋與山漸逺五里經濓溪書院又五里至九江府明日還省復從石塘鋪渡橋分路西南入匡廬之麓厯重巘凡三十里經太平橋橋側有太平宫即唐九天使者祠玄宗自言見使者降於殿庭因立祠今宫宇塔院具存西行二里廬山之隂有山相峙曰上方亦廬之别巘也下有東林寺寺始於晉慧遠法師與慧永居精舍其徒日衆别居於林之泉因曰西林東林並建上剎謝靈運為鑿池種蓮因謂之蓮社又與隱者十八人居同修淨土社緇素咸在逺師送客至虎溪而止常與淵明修靜談不覺過溪共笑而返今山門內屋於橋上水湮塞云即虎溪旁稻田中有蓮數本即蓮池也寺堂閣廓舍古雅堂後有泉池味甚甘冽山脊有上方塔云逺師取佛舍利五粒建此左有唐李雍柳公權元虞集碑出寺有大溪渡石橋或云此為虎溪前有講經臺右即西林寺寺宇荒落石浮圖尚存路稍東折見一嶺帶平岡東接羣峰叢篁灌木直入幽窅鐘磬隱隱時發云大林寺不詳何時白樂天稱匡廬第一境入巖處為竹林寺惟劖八分書三字從南望之有峰蔚秀為天池峰徑紆仄不能方軌數里一僧菴為解衣息鞍之處諸騎從皆止於此豫微服折巾小肩輿而進躡級二里至錦澗上一亭水從山夾中奔騰直下至澗數十疊觸石怒號澎湃入大溪而去有石梁數丈跨溪入大峰口緣崖行皆石磴夾磴羣木蓊鬱十五里不絶竒根古幹與石交生隂樾庇覆如行帷中磴甃盤折甚陟峻肩輿數人牽挽於前衆推擁於後氣促息若不能續隔林聞人聲咫尺不見數下輿行僅數步兩膝莫舉計磴數百折為一亭曰綿繡半雲甘露可憩自甘露亭去半道有巨崖鐫歐陽永叔廬山髙篇當徑有石華表王陽明題廬山髙於顔又百折復降至披霞亭從溪徑陟降敬觀髙皇御製周顛碑碑言顛語無次其事怪異種種後居天池故鐫石於此山復出至亭行從大竹問皆尺圍初謝籜色瑩如玉修枝茂林緑蔭踰里道旁見一石劖稱物平施四大書不可考何時又數十步夾道皆朱槿翠柏乃至天池寺寺前羣峰環抱中一峰橫出其下曰鐵船峰白雲青藹聚散無時飛泉競流清響互答入寺殿前一方池即天池也少息從僧廓右登聚仙亭亭之前為文殊臺臺臨萬仞之上俯視其下則德化德安瑞昌建昌之諸山厯厯從橫地上若聚米然西北長江巨湖散若溝瀆忽雲風四合雷聲隱隱云大雨山下余方以日色甚烈移榻於松隂其山之髙可知也又從小園及徑陟右峰頂凡數十仞浮圖七級皆石甃上漸傾毁蓋凌虛多烈風寺皆鐡瓦亦墮輪座下橫臨皆巨石乃宋咸淳時所刻是夜宿方丈明日下山稍易至僧菴諸騎從復聚更衣乃行三十里飯於圓通寺寺甚古在石耳峰下石耳山之西南盡處匡廬之在九江者亦略盡矣惟所未至者樂天草堂三蘇臺錦繡谷飛雲洞白雲亭耳庚寅春從南康按德安復從開先寺西南行去香爐峰十里有峰更竒秀曰紫霄下有歸宗寺得觀右軍墨池出寺約五里經栗里橋下馬詢之鄉人實淵明所居役役於公事其所未到者世移地改漫不可識且微徑險仄役夫艱於行雖知亦紿之也開先瀑布廬山南北瀑布以十數獨開先寺最勝開先瀑布有二其一曰馬尾泉其一在馬尾泉東出自雙劍香爐兩峰間為尤勝或曰瀑水之源昔人未有窮之者或曰水出山絶頂衝激入深洞西入康王谷為水簾東出香爐峰則為瀑布也行十數里至開先僧作丈室未成邀坐茅屋乃訪潄玉亭却至龍潭石峽口由寺至亭可二百步由亭至峽口僅數十步蓋自逺觀之瀑布出自兩峰間如瀉自天半由近而觀則二瀑下注滙為重潭潭水出石峽乃為溪循山足東流以入於彭蠡當峽口仰望但見從潭中出巖谷回互二瀑所從來不可復見矣峽石上刻青玉峽及第一山字大二尺米芾書也棲賢三峽五老峰於廬山為西面即郡治北望峰如屏障蔽其後過郡治北行二十里轉五老東入巖谷中棲賢寺在焉余舊讀蘇次公棲賢寺僧堂記云棲賢谷中多大石岌巖相向水行石間其聲如雷霆如千乘車行者振掉不能自持雖三峽之險不過也故其橋曰三峽度橋而東依山循水水平如白練橫觸巨石滙為大車輪流轉洶湧窮水之變寺據其上遊右倚石壁左俯流水石壁之趾僧堂在焉狂峰怪石翔舞於簷上每大風雨至堂中之人疑將壓焉三疊泉余既以未登文殊臺迫視瀑布泉為病而三疊之勝寢興志之五日劉公夜至開先寺宿報者至晨起亟披衣往從之遊公謂余龍池勝易境業不能待豫與子登文殊臺入黃巖寺可乎余即慫涌而登劉公時已謝諸迎者獨請以南康守盧君從而劉公擕少子偕來併為四人遊出寺行田間里許易兜輿而上屢陟隘口舍輿而徒見清泉豐草輒就憩焉迤邐再上至昔人避兵寨意即所謂黃巖寨者寨漸近香爐龜背犀牛諸峰俯視姊妹石姢姢不作危墮勢蛇行轉上里許路稍寬得文殊塔出焉塔據一峰峰拔地峭立數千百尺下臨不測即所謂布水臺也丹葉翠蓧蒙崖翳谷可愛循崖東行數十步至塔所以石甃其四周風髙防敗也然亦漸廢不治矣塔前一石橫出數武險絶難上惟寺僧習而登焉山疏謂之定心石或謂四望石云一名險一名景也其南望正與瀑布泉對遙涯萬尺轟轟下㵼墜珠飄練澎湃百狀當泉所注石都作異筯理蛇蛇蜿蜒龍爪拏攫洗削萬古如新真茲山勝絶處云時秋潦方收從山下望僅如一線不登茲山烏覩所謂瀑布竒哉復返故道從南上入黃岩寺寺據雙劍峰下四面皆峰巒林木拱護中有邱田泉出其旁亦一奧壤也僧廬湫隘無當勝處乃循澗而上求所謂黃石岩者岩石大可二楹下空洞可屋昔有道者廬焉緯蕭甃壁居然坐卧處也已下而就澗石選勝班荆復設酒脯兩劍峰峥嶸競出嶄嶄來逼人即所謂老龍洗潭處逺不得至而瀑布泉水已潺潺在吾杖底矣逡巡不欲歸下方久之始下飯寺中顧日尚有餘晷因復促行至萬杉寺觀刻石而還次日復從公為白鹿棲賢之遊上含翻嶺遇雨宿擲筆峯下晨至上大林寺婆娑二寶樹迫先忌别公而歸歸可十五日由九江通道度中館鋪五里許别入觀山下望五老峰近可摳衣已稍背而北從榛莽中至一民舍憩焉易筍輿行行百步即並澗澗水建下入草間已作潺湲聲山依澗而上漸髙若設屏障傾倚愈竒意即所謂屏風雲錦也已渡澗而北稍上更折而南巨石縱橫澗中水勢瀰漫鋪㵼石盤懸注旁灑已覺接應不暇乃下蔸輿立石間賞歎久之自此經仄石礙漸不可輿矣蛇行數百步澗皆巨石前拒水不得下回流怒擊淜湃欲倒而澗旁故道前視亦盡障塞疑便與人世隔絶稍進迫視一鏬天啓中洞可容數人劉世揚所題玉川門李夢陽所謂白鹿洞也人皆傴僂而輿不能從過是又作别境矣兩崖鐵色壁立數百十丈峽水森束轉急仰視不寒而慓徑皆蒙葺細草或滑磴但容一趾徑窮輒渡澗澗石亂插水中猱接騰踊上下僅免濡屨惴吁相屬幾不自支前覺有異衆譁謂三疊泉也乃稍定氣徐陟至則山崖四面陟削樵徑絶焉澗隨三止而三疊泉從山南最髙處冉冉盤空而降初級如雲如絮噴薄吞吐流注大磐石上水石衝激乃始瀠洄作態珠併玉碎復注二級石上滙為巨流懸崖直下龍潭飄者如雪斷者如霧綴者如琉挂者如簾散入山足森然四垂湧若沸湯奔若跳鷺其聲則藴隆之候風掀電馳震霆四擊轟轟不絶又如昆陽巨鹿之戰萬人鳴鼓瓦缶相應真天下第一偉觀也潭中流崎一巨石屹然砥柱好事者嘗勒名其上俯視目眩大都兹山以泉勝而泉之勝以從峰頂四下與他山泉出山下者異未登文殊臺青蓮諸詠便謂溢辭况三疊泉瓌偉竒麗僻在鳥道太白子瞻元晦所未探之竒其邦縉紳士衆老死所未識之境一旦豫以守吏賈勇而登覽之獨非幸歟豫懼夫入開先而遽返者薄廬山為常觀而妄肆譏彈故記其大略為茲山一吐氣焉小孤山八月一日過烽火磯南朝自武昌至京口列置烽燧此山當是其一也自舟中望山突兀而已及拋江過其下嵌巖竇穴怪竒萬狀色澤瑩潤亦與它石逈異又有一石不附山傑然特起髙百餘尺丹藤翠蔓羅絡其上如寶裝屏風是日風靜舟行頗遲又秋深潦縮故得盡見杜老所謂幸有舟楫遲得盡所厯妙也過澎浪磯小孤山二山東西相望小孤屬舒川宿松縣有戍兵凡江中獨山如金山焦山落星之類皆名天下然峭拔秀麗皆不可與小孤比數十里外望之碧峰巉然孤起上千雲霄已非它山可擬愈近愈秀冬夏晴雨姿態萬變信造化之尤物也但祠宇荒殘若稍飾以樓觀亭榭與江山相發揮自當髙出金山之上矣石鍾山九江湖口縣有石鍾山酈道元以為下臨深潭微風鼓浪水石相摶響若洪鍾因受其稱唐李渤始訪其遺迹得雙石於潭上扣之南音含糊北音清越宋蘇文忠公陋其言嘗因夜月乘舟造絶壁上下聞有大音發於水上噲􅀈如鍾鼓不絶舟人不恐回至港口有大石當中流空中而多竅與風水相吞吐有竅坎鏜鎝之聲與向之會􅀈者相應周文忠公亦嘗造其處而其所録上下鍾山之景為頗詳嘗疑其論之不一今年秋七月既望因督學至其邑偕老人髙嵩等詣北鍾山山皆大石側立於江濵髙可千餘丈左有觀音閣閣有小軒適臨鍾石之上老人與寺僧宗鋐指豫曰此北鍾山也山以是名乃由閣後履嶄巖觸荆榛蛇行而上有亭曰白雲蓋絶頂也僅可容三二人憑欄一望小孤五老香爐二祖五祖諸峰如拱如抱皆屏列於左右江水南來而消湖水西出而濁咸滙於此而後朝宗於海灝溔汪洋無涯際遠涵天碧近漾嵐光悠然之景可以遊覽得而不可以筆舌狀返而登舟徑造鍾石之下俯而觀之石皆穴鏬水落風息不能鍾鳴九江復回與進士梅君愈及老人乘舟至其處風怒浪急舟不能艤乃上向之小軒聆之誠噲􅀈如洪鍾然餘石無此聲酈元之紀蘇公之辨良足以破千古之疑矣次日詣南鍾山山下亦有觀音閣臨大江左右石壁如北鍾山其景則不如右石中缺十餘丈老人寺僧曰此南鍾石也蘇公有記刻其上正統十四年己巳石裂而仆於水形迹尚新詳察南北諸石下俱穴竅風水摶之皆能有聲何獨此石以鍾名蓋諸石負土而側立下虛而背實故其音濁惟此石突然特出於水中中空而下虛故其音如洪鍾焉李渤乃欲以斧斤考擊而辨其清濁則踈矣然疑蘇公當時所遊乃港口稍南之景方有石如猛獸竒嵬森然欲摶人者楊次公所謂真山從作假山看者正此謂也且遇恐即回南北鍾山恐未到也故其景不見稱於文白鹿洞形勝大江之西豫章為一大都會夙稱文獻其山自五嶺大庾武功而來會於匡廬其水自章貢旴汝而來會於彭蠡匡廬彭蠡甲西江而白鹿書院又匡廬彭蠡之最勝也書院之脈來自五老峰蒼顔翠面壁立萬仭中一峰坡陀南下如頃萬馬行數十里突起一山而四面環之是為後屏山山之陽即今白鹿書院也院負突而臨溪溪前一山自五老峰來過白鶴觀逆上流至書院前若玉几然從前則稱振起是名卓爾山三峰透出几外如列三台原與書院橋門相對溪會二水由西北來一自犀牛塘一自聖澤源道經鹿眠嗽石釣臺貫道溪包絡書院迎橋左小澗合流出峽峽壁峻削盛有先賢遺迹左翼山亦自老人峰來翺翔至書院前與卓爾山兩相交織當峽中飛瀑陡絶跨澗為橋是名枕流至溪水一發噴雪奔雷吽吽直下里許循左翼山而出其山髙厰軒豁群峰輻輳溪水潺湲諦聽之涓涓有聲聞泉亭作焉卓爾山外寬平可數畝有小嶼自右來蜿蜒橫抱一山自左來迤邐雄壯溪觸之折而南是名回流山其上四面岑巉頂夷曠一望無際六合亭作焉下跨溪為流芳橋橋先後二枋夾溪相欹映山前亦寬綽可數十畝隔溪前山髙數十尋曰羅漢嶺為書院外案三峰相連狀如筆架與後屏山相對峙去回流山二里許為書院石枋渡溪口接官路為館鋪溪由鋪東南曲折至梅溪湖入彭蠡大江兩山夾送直至湖濱有曜星扼其水口而都昌陽儲七峰排闥相映此鹿洞山水之全勝也由洞前舊路踰羅漢嶺可十里抵顔家山文公以魯公故居建立憩館修復橋梁以便往來由顔家山再五里則郡治也由洞右登李家山是為北路復東出會官路亦有書院石枋今仆于地扁石尚存行數步為寒泉亭又一里許即鬪牛岡也自此過吳章山六十里抵九江府治五老峰下有二洞由石澗而上有水簾三級泉去書院十里所懸崖而下甚為竒絶文公所謂新瀑是也又去書院五里有棲賢橋水自五老峰下大小支流九十九沠皆入三峽澗中文公嘗遊寓焉過棲賢橋抵卧龍岡為文公所卜隱地山水佳麗莫可名狀皆洞學周回之勝槩云武功山大江西南三巨鎮衡廬武功也武功以僻逺不見經傳不得與衡廬並顯然究竟脊胍則實首衡尾廬而屹然髙聳雄據荆吳之間謂之三巨鎮亦宜其最尊白鶴峰白鶴仙人所止望之隱隱中天雲雨皆在其下東南則空洞諸山西北則長沙之水一髮空際蒼茫無極峰頂有崖㟏岈洞嵌可容數百人或窺觸之則震雷隨至岩之下竒石萬狀石牀丹室列奠雜峙乳香靈藥雪竹龍草黃精仙茅居人皆扳援梯繫以入然不可褻蓋龍湫風穴環衛出沒晦明變化在倐歘頃菴址舊曰小桃源前有金燈塔生成石剎七成稍上為棋盤石又上有元煉丹竈或曰爐底尚存也後有大小箕峰峰隱約仙翁大士像有石若盤三伏有水則其歲不旱側有投籙簡者從之若授受然使得如孫興公蘇子瞻一過從之獨不與天台羅浮並邪其𨽻袁者有石笋匡洲崖亦竒勝水西出為廬下六十里為秀江盧蕭其山自萍鄉諸山蜿蜒而來特起為二峰曰盧曰蕭武功當二峰之間二峰髙聳而員鋭武功慱大而頂平號為三竒然二峰之水皆出其麓蕭水南流入於洞庭盧水東流滙為彭蠡此吳楚所由分也獨武功之水出於其巔濆激瀑瀑出池面如芙蕖聞人語則愈出池旁右石臼仙人迹相傳為葛仙煉丹池云顔真卿記曰粵惟江南之地佳麗垂名山嶽之間宛有仙洞豫抵膺聖澤廉察臨川一日桉地圖得屬邑崇仁縣華蓋山有王郭二真君壇存焉欣覩異事未原其始他日公餘因令軍將訪求碑銘果得一石記乃隋開皇五年焚修道士李子真于壞碑上再録其文則知王郭二真君仙不顯名王則方平從姪郭仙王之親弟也始于金華山修道以圖軒舉尋遊洞府自玉笥將之麻姑洞道經一方問鄉故老曰此為何山對曰巴陵華蓋山也二真君相與言曰此山福地名亦異焉因求卜止煉神丹山下父老詣而再拜曰敢問真人之名字曰吾等修志於虛無不欲述焉再有一道來謁敢問真人之師曰吾師浮丘先生先生則上界天仙也頃於金華山遇焉二真君能走石飛符興雲致雨或人有疾苦暴患往而告者即飛符以救之嵗值大旱致霖雨以濟之至晉元康二年二月一日綵雲連晝仙樂喧空二真君乃騰鸞跨鶴冉冉上升今上升之壇及浮丘先生之壇存焉圖書編卷六十五
