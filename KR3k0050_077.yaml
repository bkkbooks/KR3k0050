body:
  text: 圖書編卷七十七明章潢撰三綱五常總敘三綱二紀人之大倫也五常之道也君為臣之綱其有分者義也父為子之綱其有親者仁也夫為妻之綱其有别者智也長幼之紀其序為禮朋友之紀其任為信之二紀者亦不出乎三綱之外何也因有父子也而有兄弟以至於宗族其先後以齒者一家之長幼也因有君臣也而有上下以至於儔侣其尊卑以等者一國之長幼也因有兄弟也而自同室以至於宗族其互相助益者同姓之朋友也因有上下也而自同僚以至於儔侣其互相規正者異姓之朋友也舉三綱而二紀在其中故總謂之綱常人之所以為人而異於物者以其有此綱常之道雖然提其綱則紀自理振其綱紀則天經賴以清地義賴以寧萬彚賴以成自混元開闢以來孰能一日離此常道哉是故陳此常道於時夏凡變此道者不待辨哉五常之道五常之道人之所以為人而異於禽獸者惟此焉耳兹其所以為萬世不易之常道歟三綱即五常之中而揭其綱使人反求諸身也是五常也其在天地則為木火土金水之五行其在人心則為仁義禮智信之五德臯陶所謂五典中庸所謂五達道者是也聖人人倫之至豈能於父子親君臣義夫婦别長幼序朋友信之外而有所加乎蓋其以一身負荷綱常具之為常性行之為常道聲律身度仁至義盡而俯仰無愧於天地所以倬然人極之攸樹者特以盡其人道之常耳但聖人亦人也聖人自盡其常道惟於立人之道無虧欠也吾人並生斯世戴天履地共負此綱常之重使於五者有一之或缺斯失其所以為人也已况於三綱五常而莫之盡心乎哉三綱五常考大學為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信晏子曰君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也孟子曰人之有道也飽食暖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信漢白虎通義三綱者何謂也謂君臣父子夫婦也六紀者何謂也謂諸父兄弟族人諸舅師長朋友也故君為臣綱父為子綱夫為妻綱何謂綱紀綱者張也紀者理也大者為綱小者為紀所以張理上下整齊人道也人皆懷五常之性有親愛之心是以綱紀萬化若羅網之有綱紀而萬目自張也按三綱之名始見於此非漢儒之言古之遺言也以上論天理人倫之正兼言五者大倫孝經愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而德教加於百姓此天子之孝子曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎故得萬國之歡心以事其先王治國者不敢侮於鰥寡而况於士民乎故得百姓之歡心以事其先君治家者不敢失於臣妾而况於妻子乎故得家人之歡心以事其親夫然故生則親安之祭則鬼享之是以天下和平災害不生禍亂不作故明王之以孝治天下也如此詩曰有覺德行四國順之子曰昔者明王事父孝故事天明事母孝故事地察長幼順故上下治天地明察神明彰矣故雖天子必有尊也言有父也必有先也言有兄也宗廟致敬不忘親也修身慎行恐辱先也宗廟致敬鬼神著矣孝弟之至通於神明光於四海無所不通以上專言天子之孝蠱卦初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也九二幹母之蠱不可貞象曰幹母之蠱得中道也孟􅀈子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮孟武伯問孝子曰父母唯其疾之憂子遊問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎禮記為人子者聽於無聲視於無形孝子之有深愛者必有和氣有和氣者必有愈色有愈色者必有婉容嚴威儼恪非所以事親也仁人之事親也如事天事天如事親公明儀問於曽子曰夫子可以為孝乎曽子曰君子之所謂孝也者先意承志諭父母於道參直養者也安能為孝乎父母有過下氣怡色柔聲以諫諫若不入起敬起孝恱則復諫不説與其得罪於鄉黨寧熟諫父母怒撻之流血不敢疾怨起敬起孝親有疾飲藥子先嘗之醫不三世不服其藥子曰孝子之喪親也哭不偯禮無容言不文服美不安聞樂不樂食旨不甘此哀戚之情也三日而食教民無以死傷生毁不滅性此聖人之政也喪不過三年示民有終也為之棺槨衣衾而舉之陳其簠簋而哀戚之劈踊哭泣哀以送之卜其宅兆而安厝之為之宗廟以鬼享之春秋祭祀以時思之生民之本盡矣死生之義備矣孝子之事親終矣子曰子生三年然後免於父母之懷夫三年之喪天下之通喪也中庸曰期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也滕定公薨世子謂然友曰昔者孟子嘗與我言於宋於心終不忘今也不幸至於大故吾欲使子問於孟子然後行事然友之鄒問於孟子孟子曰不亦善乎親喪固所自盡也曽子曰生事之以禮死葬之以禮祭之以禮可謂孝矣諸侯之禮吾未之學也雖然吾嘗聞之矣三年之喪齊疏之服飦粥之食自天子達於庶人三代共之然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也至於子之身而反之不可且志曰喪祭從先祖曰吾有所受之也謂然友曰吾他日未嘗學問好馳馬試劍今也父兄百官不我足也恐其不能盡於大事子為我問孟子然友復之鄒問孟子孟子曰然不可以他求者也孔子曰君薨聽於冡宰啜粥面深墨即位而哭百官有司莫敢不哀先之也上有好者下必有甚焉者矣君子之德風也小人之德草也草上之風必偃是在世子然友反命世子曰然是誠在我五月居廬未有命戒百官族人可謂曰知及至葬四方來觀之顔色之戚哭泣之哀弔者大恱子曰父在觀其志父歿觀其行三年無改於父之道可謂孝矣曽子曰慎終追逺民德歸厚矣禮記曰霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡必有怵惕之心如將見之致齊于內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者祭之日入室僾然必有見乎其位周還出戶肅然必有聞乎其容聲出戶而聽愾然必有聞乎其歎息之聲是故先王之孝也色不忘乎目聲不絶乎耳心志嗜欲不忘乎心致愛則存致慤則著著存不忘乎心夫安得不敬乎君子生則敬養死則敬享思終身弗辱也文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也君子有終身之喪忌日之謂也故忌日不樂父母之所愛亦愛之父母之所敬亦敬之犬馬盡然而况於人乎孔子曰身也者親之枝也敢不敬與不能敬其身是傷其親曽子曰身也者父母之遺體也行父母之遺體敢不敬乎禮記曰孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之孟子曰事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親吾未之聞也事親事之本也守身守之本也曽子曰樹木以時伐焉禽獸以時殺焉夫子曰斷一樹殺一獸不以其時非孝也以上敘天理人倫之正一通言人子之孝堯典曰有鰥在下曰虞舜父頑母嚚象傲克諧以孝蒸蒸乂不格姦帝初于歷山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔夔齊栗瞽瞍亦允若孟子曰天下大恱而將歸已視天下恱而歸已猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定此之謂大孝萬章問曰舜往于田號泣于旻天何為其號泣也孟子曰怨慕也萬章問曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎曰長息問於公明髙曰舜往于田則吾既得聞命矣號泣于旻天于父母則吾不知也公明髙曰是非爾所知也夫公明髙以孝子之心為不若是恝我竭力耕田共為子職而已矣父母之不我愛於我何哉帝使其子九男事之二女女焉百官牛羊倉廩備以事舜於畎畝之中天下之士多就之者帝將胥天下而遷之焉為不順於父母如窮人無所歸天下之士恱之人之所欲也而不足以解憂好色人之所欲妻帝之二女而不足以解憂冨人之所欲冨有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人恱之好色冨貴無足以解憂者惟順於父母可以解憂人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者豫於大舜見之矣禮記子曰舜其大孝也與德為聖人尊為天子冨有四海之內宗廟享之子孫保之故大德必得其位必得其祿必得其名必得其夀故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令德宜民宜人受祿于天保佑命之自天申之故大德者必受命子曰武王纘大王王季文王之緒一戎衣而有天下尊為天子冨有四海之內宗廟享之子孫保之武王末受命周公成文武之德追王大王王季上祀先公以天子之禮子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也春秋修其祖廟陳其宗器設其裳衣薦其時食踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問內竪之御者曰今日安否何如內竪曰安文王乃喜及日中又至亦如之及莫又至亦如之其有不安節則內竪以告文王色憂行不能正履王季復膳然後亦復初食上必在視寒暖之節食下問所膳命膳宰曰末有原應曰諾然後退武王帥而行之不敢有加焉文王有疾武王不説冠帶而養文王一飯亦一飯文王再飯亦再飯旬有二日乃間漢髙帝詔曰人至親莫親於父子故父有天下傳歸於子子有天下尊歸於父此人道之極也前日天下大亂兵革並起萬民苦殃朕親披堅執鋭平暴亂立諸侯偃兵息民天下大安此皆太公之教訓王侯卿大夫已尊朕為皇帝而太公未有號今上尊太公為太上皇九年淮南王梁王趙王楚王朝未央宫置酒前殿上奉玉巵為太上皇夀曰始大人常以臣無賴不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆稱萬嵗大笑為樂唐太宗貞觀二年頡利可汗入朝上謂侍臣曰往者太上皇以百姓之故稱臣於突厥朕常痛心今單于稽顙庶幾可雪恥四年李靖擒頡利可汗以獻上皇聞之歎曰漢髙祖困白登不能報今我子能滅突厥吾託付得人復何憂哉上皇命置酒凌煙閣酒酣上起舞公卿迭起為夀太宗嘗謂近臣曰吾今日生日世俗皆為樂在朕翻成傷感今君臨天下富有四海而欲承顔膝下永不可得此子路有負米之恨也詩云哀哀父母生我劬勞奈何更以劬勞之日更為宴樂乎因泣數行下左右皆悲明皇開元中以生日宴百官於花萼樓每嵗八月五日為千秋節布於天下咸令宴樂尋又移社就千秋節以上論天理人倫之正二帝王事親之孝孟子萬章曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而掩之象曰謨蓋都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象往入舜宫舜在牀琴象曰鬱陶思君爾忸怩舜曰惟兹臣庶汝其于豫治不識舜不知象之將殺已與曰奚而不知也象憂亦憂象喜亦喜曰然則舜偽喜者與曰否彼以愛兄之道來故誠信而喜之奚偽焉萬章問曰象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉萬章曰舜流共工于幽州放歡兜于崇山殺三苖於三危殛鯀于羽山四罪而天下咸服誅不仁也象至不仁封之有庳有庳之人奚罪焉仁人固如是乎在他人則誅之在弟則封之曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣親之欲其貴也愛之欲其富也封之有庳富貴之也身為天子弟為匹夫可為親愛之乎敢問或曰放者何也曰象不得有為於其國天子使吏治其國而納其貢稅焉故謂之放豈得暴彼民哉雖然欲常常而見之故源源而來不及貢以政接於有庳此之謂也詩皇矣之二章維此王季因心則友則友其兄則篤其慶載錫之灮受祿無喪奄有四方棠棣燕兄弟也閔管蔡之失道故作常棣焉其一章曰棠棣之華鄂不韡韡凡今之人莫如兄弟二章曰死喪之威兄弟孔懷三章曰脊令在原兄弟急難四章曰兄弟鬩于墻外禦其侮行葦忠厚也其一章曰敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫逺具爾角弓父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩騂騂角弓翩其反矣兄弟婚姻無胥遠矣爾之逺矣民胥然矣爾之教矣民胥效矣此令兄弟綽綽有裕不令兄弟交相為愈民之無良相怨一方受爵不讓至于巳斯亡葛藟王族刺平王也周室道衰棄其九族焉其一章曰綿綿葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧二章曰終逺兄弟謂他人母謂他人母亦莫我有三章曰終逺兄弟謂他人昆謂他人昆亦莫我聞杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾有杖之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉二章曰豈無他人不如我同姓按角弓葛藟杖杜三詩正棠棣行葦之反也春秋傳隱元年初鄭武公娶于申曰武薑生莊公及共叔段莊公寤生驚薑氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑惟命請京使居之謂之京城太叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰薑氏欲之焉避害對曰薑氏何厭之有不如早為之所無使兹蔓蔓難圖也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於巳公子吕曰國不堪二君將若之何欲與太叔臣請事之若弗與則請除之無生民心公曰無庸將自及太叔又收二以為己邑至于廩延子封曰可矣厚將得衆公曰不義不昵厚將崩太叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢太叔出奔共書曰鄭伯克段于鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也榖梁傳曰段弟也而弗謂弟公子也而弗謂公子貶之也段失弟子之道矣賤段而甚鄭伯也何甚乎鄭伯也甚鄭伯之處心積慮成於殺也春秋推見至隱首誅其意漢孝文初即位淮南王長自以為最親驕蹇數不奉法上寬赦之三年入朝甚橫從上入苑獵與上同輦常謂上大兄歸國益恣不用漢法六年謀反事覺乃使使召長至長安丞相張蒼等雜奏長所犯不軌當棄市臣請論如法制曰朕不忍置法于王其與列侯吏二千石議列侯吏二千石臣嬰等議皆曰宜論如法制曰其赦長死罪廢勿王有司奏請處蜀嚴道卭郵於是盡誅所與謀者乃遣長載以緇車令縣傳袁盎諫曰上素驕淮南王不能置嚴相傅以故至此且淮南王為人剛今暴摧折之臣恐其逢霧露道死而陛下有殺弟之名奈何上曰吾特苦之耳今復之長謂侍者曰吾以驕不聞過故至此乃不食而死縣傳者不敢發車封至雍雍令發之以死聞上悲哭謂袁盎曰吾不從公言卒亡淮南王盎曰陛下遷淮南王欲以苦其志使改過有司宿衛不謹故病死於是上乃解曰將奈何曰斬丞相御史以謝天下乃可上即令丞相御史逮諸縣不發封餽侍者皆棄市以列侯葬淮南王於雍置守冡三十家後封長子四人為侯民有作歌淮南王曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容上聞之曰昔堯舜放逐骨肉周公殺管蔡天下稱聖不以私害公天下豈以為貪淮南南地耶乃追諡為厲王置園如諸侯儀十六年上臨淮南憐王廢法不軌自使失國早夭立王三子王淮南故地帝於待淮南則不得為無過唐太宗貞觀十年諸王荆王元景等之藩上與之别曰兄弟之情豈不欲常相共處邪但以天下之重不得不爾諸子尚可復有兄弟不可復得因流涕嗚咽不能已按太宗此言其殆有感於隱巢之事乎唐明皇帝素友愛初即位為長枕大被與兄弟同寢聽朝之暇多從諸王遊在禁中拜跪如家人禮飲食起居相與同之於殿中設五幄與諸王更處其中謂之五王帳宋王成器尤恭謹未嘗議及時政與人交結帝愈信重之故讒間之言無自而入寢以上論天理人倫之正三長幼之序禮記孔子侍坐於哀公哀公曰敢問人道孰為大對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親捨敬是遺親也弗愛不親弗敬不正愛與敬其政之本與公曰冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎天地不合萬物不生大昏萬世之嗣也君何謂已重乎天地合而後萬物興焉夫昏禮萬世之始也取於異姓所以附逺後别也易曰正其本萬物理失之毫釐繆以千里故君子慎始也春秋之元詩之關睢禮之冠婚易之乾坤皆慎始敬終云爾易坤文言曰隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也小畜九三輿説輻夫妻反目象曰夫妻反目不能正室也歸妹彖曰歸妹天地之大義也天地不交則萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也昏義婦人從夫者也幼從父兄嫁從夫夫死從子夫也者夫也夫也者以知帥人者也家語曰女子者順男子之教而長其理者也是故無專制之義而有三從之道以上論天理人倫之正四夫婦之别大禹謨曰后克艱厥后臣克艱厥臣政乃乂黎民敏德定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君唯其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎孔子告定公之言其與大禹若出一揆萬世君臣之藥石益稷帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事隳哉自克艱以下皆言君臣之道洪範惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用則頗辟民用僣忒此箕子為武王陳萬世君臣之大法詩蘀兮刺忽也君弱臣強不倡而和也籜兮籜兮風其吹女叔兮伯兮倡豫和女籜兮籜兮風其漂女叔兮伯兮倡豫要女狡童刺忽也不能與賢人圖事權臣擅命也彼狡童兮不與我言兮維子之故使我不能餐兮彼狡童兮不與我食兮維子之故使我不能息兮孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庶人不議孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣定公問君使臣臣事君如之何子曰君使臣以禮臣事君以忠以上言君臣之名分雖嚴而上下之交不可無禮故以君使臣之禮告之孟子告齊宣王曰君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人君之視臣如草芥則臣視君如寇讎王曰禮為舊君有服何如斯可為服矣曰諫行言聽膏澤下於民有故而去則君使人導之出疆又先於其所往去三年不反然後收其田里此之謂三有禮焉如此則為之服矣今也為臣諫則不行言則不聽膏澤不下於民有故而去則君搏執之又極之於其所往去之日遂收其田里此之謂寇讎寇讎何服之有以上總言君臣交際之禮鹿鳴燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣其一章曰呦呦鹿鳴食野之蘋我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行禮記曰君子式黃髮下卿位國君不名卿老世婦五官之長曰伯其擯於天子曰天子之吏天子同姓謂之伯父異姓謂之伯舅九州之長入天子之國曰牧天子同姓謂之叔父異姓謂之叔舅禮記卿大夫疾君問之無算士一問之君於卿大夫比葬不食肉比卒哭不舉樂為士比擯不舉樂儀禮坐撫當心安節如踊春秋傳晉荀盈卒未葬晉侯飲酒樂膳宰屠蒯趨入曰君之卿佐是謂股肱股肱或虧何痛如之漢文帝時賈誼上疏曰人主之尊譬如堂羣臣如陛衆庶如地故陛九級上廉遠地則堂髙陛亡級廉近地則堂卑髙者難攀卑者易陵理勢然也故古者聖王制為等列內有公卿大夫士外有公侯伯子男然後有官師小吏延及庶民等級分明而天子加焉故其尊不可及也里諺曰欲投鼠而忌器此善諭也鼠近器尚憚不投恐傷其器况於貴臣之近主乎廉恥節禮以治君子故有賜死而無戮辱是以黥劓之辜不及大夫以其離主上不逺也禮不敢齒君之路馬蹴其芻者有罰見君之几杖則起遭君之乘車則下入正門則趨君之寵臣雖或有過刑戮之罪不加其身者尊君之故此所以為主上豫逺不敬也所以體貌大臣而厲其節也今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也而令與衆庶同黥劓髠刖笞罵棄市之法然則堂不無陛乎廉恥不行大臣無乃握重權大官而有徒𨽻無恥之心乎又曰主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也頑頓無恥􅀢詬無節廉恥不立且不自好茍若不可故見利則逝見便則奪主上有敗則因而挻之矣主上有患則吾茍免而已立而觀之耳有便吾身者則欺賣而利之耳人主將何便於此又曰古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾坐汙穢淫亂男女無别者不曰汙穢曰帷薄不修坐罷軟不勝任者不謂軟罷曰下官不職故貴大臣定有罪矣猶未斥然正以呼之也尚遷就而為之諱也遇之有禮故羣臣自喜嬰以廉恥故人矜節行上設廉恥禮義以遇其臣而臣不以節行報其上者非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不茍就害不茍去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圉扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存彼將為我危故吾得與之皆安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲廉恥行禮誼之所致也以上論天理人倫之正四君使臣之禮子曰君子之事君也進思盡忠退思補過將順其美匡救其惡故上下能相親子路問事君子曰勿欺也而犯之子曰所謂大臣者以道事君不可則止孟子將朝王王使人來曰寡人如就見者也有寒疾不可以風朝將視朝不識可使寡人得見乎對曰不幸而有疾不能造朝明日出弔於東郭氏公孫丑曰昔者辭以疾今日弔或者不可乎曰昔者疾今日愈如之何不弔王使人問疾醫來孟仲子對曰昔者有王命有采薪之憂不能造朝今病小愈趨造於朝我不識能至否乎使數人要於路曰請必無歸而造於朝不得已而之景丑氏宿焉景子曰內則父子外則君臣人之大倫也父子主恩君臣主敬丑見王之敬子也未見所以敬王也曰惡是何言也齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是我非堯舜之道不敢陳於王前故齊人莫如我敬王也孟子曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊孟子曰人不足與適也政不足間也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣孟子曰君子之事君也務引其君以當道志於仁而已春秋傳曰齊景公至自田晏子侍子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒且平鬷假無言時靡有爭今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是漢汲黯為主爵都尉列於九卿其諫犯主之顔色上方招文學儒者上曰吾欲云云黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上怒變色而罷朝公卿皆為黯懼上退謂人曰甚矣汲黯之戅也羣臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎且已在其位縱愛身奈辱朝廷何黯病嚴助為請告上曰汲黯何如人哉曰使黯任職居官無以踰人然至其輔少主守成雖自謂賁育弗能奪也上曰然古有社稷之臣如汲黯近之矣按人臣之義以忠直為本故上取孔孟之言下迄汲黯之事以上論天理人倫之正四臣事君之忠伐木燕朋友故舊也自天子至於庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民德歸厚矣其一章曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平萬章問曰敢問友孟子曰不挾長不挾貴不挾兄弟而友友也者友其德也不可以有挾也孟獻子百乘之家也有友五人焉樂正裘牧仲其三人則豫忘之矣獻子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣非惟百乘之家為然也雖小國之君亦有之費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也非惟小國之君為然也雖大國之君亦有之晉平公之於亥唐也入云則入坐云則坐食云則食雖疏食菜羮未嘗不飽蓋不敢不飽也然終於此而已矣弗與共天位也弗與治天職也弗與食天祿也士之尊賢者也非王公之尊賢也舜尚見帝帝館甥于二室亦饗舜迭為賔主是天子而友匹夫也用下敬上謂之貴貴用上敬下謂之尊賢貴貴尊賢其義一也按孟子謂自天子至大夫皆有友賢之義然知友賢未知用賢則猶未也萬章問曰庶人召之役則往役君欲見之召之則不往見之何也曰往役義也往見不義也且君之欲見之也何為也哉為其多聞也為其賢也曰為其多聞也則天子不召師而况諸侯乎為其賢也吾未聞欲見賢而召之也繆公亟見於子思曰古千乘之國以友士何如子思不恱曰古之人有言曰事之云乎豈曰友之云乎子思之不恱也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之君求與之友而不可得也而况可召與按孟子此章又明賢者以道自重諸侯不得而友之義天下有達尊三爵一齒一德一朝廷莫如爵鄉黨莫如齒輔世長民莫如德惡得有其一以慢其二哉故將大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是不足與有為也故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸今天下地醜德齊莫能相尚無他好臣其所教而不好臣其所受教湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召而况不為管仲者乎學記君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔天子無北面所以尊師也按此二條又明王者有師臣之義不特友之而已以上論天理人倫之正五朋友之交共九十六條統論五倫問盡其道謂之孝弟夫以一身推之則身者資父母之血氣以生者也盡其道者則能敬其身能敬其身者則能敬其父母矣不盡其道則不敬其身不敬其身則不敬父母其斯之謂歟程子曰今士大夫受職於君期盡其職受身於父母安可不盡其道問第五倫視其子之疾與兄子之疾不同自謂之私如何曰不特安寢與不安寢只不起與十起便是私也父子之愛本是公才著此心做便是私也又問視己子與兄子有間否曰聖人立法曰兄弟之子猶子也是欲視之猶子也又問天性自有輕重疑若無間然曰只為今人以私心看了孔子曰父子之道天性此只就孝上説故言父子天性若君臣兄弟賔主朋友之類亦豈不是天性只為今人小看却不推其本所由來故爾己之子與兄之子所爭幾何是同出於人者也只為兄弟異形故以兄弟為手足人多以異形故親己之子異於兄弟之子甚不是也君臣朋友之際其合不正未有久而不離者故賢者順理而安行知者知幾而固守問妻可出乎曰妻不賢出之何害如子思亦嘗出妻今世俗乃以出妻為醜行遂不敢為古人不如此妻有不善便當出也又問古人出妻有以對姑叱狗藜蒸不熟者亦無甚惡而遽出之何也曰此古人忠厚之道也古人交絶不出惡聲君子不忍以大惡出其妻而以微罪去之以此見其忠厚之至問妻再娶皆不合禮否曰大夫以上無再娶禮凡人為夫婦時豈有一人先死一人再娶一人再嫁之約只約終身夫婦也但自大夫以下有不得已再娶者蓋緣奉公姑或主內事爾如大夫以上至諸侯天子自有嬪妃可以供祀禮所以不許再娶也世人多慎於擇壻而忽於擇婦其實壻易見婦難知所係甚重可忽哉問事兄盡禮不得兄之歡心奈何曰但當起敬起孝盡至誠不求伸巳可也問接弟之道如何曰盡友愛之道而已周公之于兄舜之于弟皆一類觀其用心為何如哉推此心以待人亦如此然有差等耳豫章羅氏曰君明君之福臣忠臣之福君明臣忠則朝廷治安得不謂之福乎父慈父之福子孝子之福父慈子孝則家道隆盛得不謂之福乎俗人以富貴為福陋哉朱子曰聖人之於天地猶子之於父母父子欲其親君臣欲其敬非是欲其如此蓋有父子則便自然有親有君臣則便自然有敬問父母之於子有無窮憐愛欲其聰明欲其成立此之謂誠心耶曰父母愛其子正也愛之無窮而必欲其如此則邪矣此天理人欲之間正當審決問人不幸處繼母異兄弟不相容當如何曰從古來自有這樣子只看舜如何後來此樣事多有只是為人子止於孝問妻有七出此却是正當道理非權也曰然問與朋友交後知其不善欲絶則傷恩不與之絶則又似匿怨而友其人曰此非匿怨之謂也心有怨于人而外與之交則為匿怨若朋友之不善情意自是當疏但疏之以漸若無大故則不必峻絶之所謂親者毋失其為親故者毋失其為故者也勉齋黃氏曰朋友者人類之中志同而道合者也故曰天秩有典豈人力也哉君臣父子夫婦長幼一失其序則天典不立人道化為禽獸矣朋友道絶則此四者雖欲各居其分不可得也善而莫豫告也過而莫子規也觀感廢而怠心生講習疏而實理晦五常百行顛倒錯繆而不可勝救矣然則朋友者列於人倫而又所以綱紀人倫者也所可重者若此而世莫之重焉可不為之屢歎也耶周子曰道義者身有之則尊且貴人生而蒙長無師友則愚是道義由師友有之而得尊且貴其義不亦重乎其聚不亦樂乎陸子曰揚子雲謂務學不如務求師師者人之模範也模不模範不範為不少矣韓退之謂古之學者必有師師者所以傳道授業解惑人非生而知之孰能無惑惑而不求師其為惑也終不解矣近世諸儒反不及此然後知二公之識不易及也吾亦謂論學不如論師得師而不虛心委巳則又不可以罪師五常總論天命之性何性也維皇降𠂻厥有恆性仁之於父子也義之於君臣也禮之於賔主也知之於賢者也聖人之於天道也命也有性焉恆性即吾人五常之性是也率性之道何道也天下之達道五君臣也父子也夫婦也昆弟也朋友之交也即吾性五常之道是也修道之教何教也飽食暖衣逸居無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信即吾性之常道而教之各盡其性是也然則大學明明德親民止至善何謂哉欲明明德於天下國家自天子至於庶人一是皆以修身為本格致誠正所以修身也為君止仁為臣止敬為子止孝為父止慈與國人交止信而至善曽出五常之外耶可見五常之外無所謂性與道也無所謂教與學也言學而非止至善之學此學之所以不大皆異學矣言教而非修道之教此教之所以不中皆異教矣聖人庸言之信庸行之謹故聲律身度可法可傳卓然為天下萬世立人極者豈有他哉其為父子兄弟足法而後民法之故曰聖人人倫之至也信乎五常之外無聖人也雖然豈特五常之外無聖人哉外五常不可為人矣觀烏鵲之反哺蜂蟻之尊王關睢之有别鶺鴒之急難嚶鳴之求友在鳥獸昆蟲且然况於人乎人特不肯以此五常自責自修耳君臣父子夫婦昆弟朋友皆人生本有之倫親義序别信皆人生自有之性人各自盡其倫自率其性本不待外求而自足者至於溫凊定省責難陳善隨其時勢之順逆而為之委曲周旋又顧人之自力何如耳豈曰五常之道人或有不能哉嘗以此考諸唐虞三代上之所以教下之所以學皆所以明人倫也故人倫明于上小民親于下非偶然也奈何聖學不明世教日衰民之習俗愈趨愈陋凡訓詁詞章功利智術種種陷溺人心已不可救藥故二氏之徒倡為玄寂之説以瞽惑聾晦世之人其號曰髙明俊拔者又羣起而爭赴之今不必究其説為何如即其去父母兄弟妻子恝然不顧則其所謂性果五常之性乎所謂道果五常之道乎所謂教果修道之教所謂學果仁敬孝慈信而為止至善之學乎其異乎聖人中正立人極者至顯明也彼縉紳士大夫反溺於其説冥然罔覺閉關習靜逃人間世自以為超越塵凡脫離生死本習止觀禪定乃名曰艮止本習守中調息乃名曰執中假聖明宗旨以為之掩覆雖未嘗出家雲遊離父兄絶妻子其實并聖學禪宗而兩失之昔楊墨學仁學義孟子尚懼其無君父焉而顯然異端反尊之為聖學為世教慮者寧不動心也耶是故欲明聖學莫要於敷五教也五教陳而常道明所以盡性盡人物之性參贊天地在兹矣否則詞章功利既以陷溺凡庸懸解頓悟又以鼓簧聰俊舉綱常而盡廢之如此而欲挽世道以返之唐虞三代未之有也噫綱常倫物至重也慎不可以為日用之近而忽之一説父族四謂本族之內一也父之女昆弟適人者及其子二也巳之女昆弟適人者及其子三也巳之女子適人者及其子四也母族三母之父姓一也母之母姓二也母之女昆弟適人者及其子三也妻族二妻之父姓一也妻之母姓二也堯典曰克明峻德以親九族九族既睦蔡傳曰九族髙祖至玄孫之親舉近以該遠五服異姓之親亦在其中也睦親而和也人之一身上而髙曽祖考下而子孫曽玄皆吾人一本之親也帝典親睦九族而必先之以克明峻德何哉蓋言九族之衆凡同姓異姓藹然和睦一本於克明峻德以親之而百姓而萬邦皆九族之推也所以大學曰自天子以至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也使九族不睦則薄其所厚矣不先修身明明德以立其本焉欲以親睦九族也何可得哉信乎九族未睦何以言一本之親身有未修何以言敦本之教家人利女貞彖曰家人女正位乎內男子正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣象曰風自火出家人君子以言有物而行有恆初九間有家悔亡象曰間有家志未變也六二無攸遂在中饋貞吉象曰六二之吉順以巽也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也六四富家大吉象曰富家大吉順在位也九五王假有家勿恤吉象曰王假有家交相愛也上九有孚威如終吉象曰威如之吉反身之謂也卦以家人名何也此卦上巽下離二隂四陽長女中女各得其位故卦辭曰利女貞大率一家之中女正則家正矣一卦下五爻隂陽俱各得位故彖傳曰女正位乎內男正位乎外又曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣然大象則曰風自火出家人君子以言有物行有恆上爻小象曰威如之吉反身之謂也是女正必本於男正家正必本於身正觀象玩辭當自得之且彖傳曰家人有嚴君焉父母之謂也上爻曰有孚威如終吉曰嚴曰威固可以為正家之道九三家人嗃嗃悔厲吉婦子嘻嘻終吝可見治家雖過於嚴焉終不失為吉也噫合一卦六爻彖象觀之齊家之道又豈有餘藴哉正家考大學所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣故諺有之曰人莫知其子之惡莫知其苗之碩此謂身不修不可以齊其家所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸巳而后求諸人無諸巳而后非諸人所藏乎身不恕而能喻諸人者未之有也故治國在齊其家詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而後可以教國人詩云宜兄宜弟宜兄宜弟而后可以教國人詩云其儀不忒正是四國其為父子兄弟足法而後民法之也此謂治國在齊其家中庸君子之道辟如行遠必自邇辟如登髙必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂而妻孥子曰父母其順矣乎孟子曰身不行道不行於妻子使人不以道不能行於妻子治天下有本身之謂也治天下有則家之謂也本必端端本誠心而已矣則必善善則和親而已矣家難而天下易家親而天下疏也家人離必起於婦人故暌次家人以二女同居而志不同行也堯所以釐降二女于媯汭舜可禪乎吾兹試矣是治天下觀于家治家觀于身而已矣身端心誠之謂也誠心復其不動而已矣不善之動妄也妄復則無妄矣無妄則誠矣故無妄次復而曰先王以茂對時育萬物深哉家有夫婦焉家有父子焉家有兄弟焉人之大倫五而家有其三必先有以厚夫婦之倫而後父能慈子能孝兄能友弟能恭此學周南召南之功也夫天之生物也一本故近而家遠而天下莫非同體古之聖人其於天下也則有養老慈幼恤孤獨之政焉其為法也詳於其家也則有愛親敬長之道焉其為義也密夫愛親敬長與養老慈幼恤孤獨以其事則固異矣然而其心豈二哉為天下養老慈幼恤孤獨之心即居其家愛親敬長之心故凡為天下而天下之老之幼之孤獨漠然視之者則固以居其家其親其長有移其天性而天性之愛幾於泯者矣是故君子篤其恩於家也匪以其近私之也篤其恩於家所以普其仁於天下者固在是矣其以愛親敬長教其子弟與其族人也匪以其為吾子弟為吾族人故私之耳也仁人一體之公中人希聖之學本如是同其風於家所以同天下之風者在是矣正家總論五常之道家有其三而夫婦乃家庭人合之倫也中庸論道察天地斯其至矣然造端則在乎夫婦之近焉何哉蓋一隂一陽鼓天地之大化一夫一婦肇人紀之太初易序卦傳曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故易首乾坤乾坤即夫婦之大也夫婦即乾坤之小也乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能孰不曰乾坤易簡之道無餘藴矣然夫婦之愚可以與知與能非即乾坤易知簡能之道哉觀家人卦彖曰家人女正位乎內男正位乎外男女正天地之大義也信乎道察天地而其造端在夫婦也又曰家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正矣正家而天下定矣玩其卦畫隂陽各得其正而五之王假有家上之有孚威如其象蓋可覩也巳是以書首堯典堯釐降二女於媯汭舜可禪乎吾兹試矣堯之所以為天下得人舜之所以無為天下治其端為有自也詩首關睢窈窕淑女君子好逑文王所以刑寡妻至兄弟而迓家邦者率是道也故大學曰宜其家人而後可以教國人其為父子兄弟足法而後民法之也可見一正家而天下定居室雖至近參贊位育之道管是也然易大象風自火出家人君子以言有物而行有恆大學于親愛賤惡畏敬哀矜傲惰而辟焉者則云身不修不可以齊其家又何也蓋家之本在身而一身之間凡言行好惡乃一家觀法所係茍好惡偏而言行不臧則身不行道且將不行於妻子况一家尊卑長幼欲其一循乎修道之教而莫我違也難矣哉此所以上九象曰威如之吉反身之謂也然則治天下觀於家治家觀於身周子豈無見而云然哉雖然人情最易狎褻者莫居室若也于此慎言行公好惡修身之功無斯須間焉則行逺自邇登髙自卑所以迓家邦察天地者又何事他求也是故君子於家人一卦六爻觀象玩辭并大學齊家中庸造端孟子周子之言會而通之體而行之反身正家之道其庶幾矣朱子教規白鹿書院父子有親君臣有義夫婦有别長幼有序朋友有信此五教之目舜使契為司徒敬敷五教即此是也學者學此而已而其所以學之之序亦有五焉其别如左博學之審問之慎思之明辨之篤行之此為學之序學問思辨四者皆所以窮理若夫篤行之事則自修身以至于接物亦各有要其别如左言忠信行篤敬懲忿窒欲遷善改過右修身之要正其誼不謀其利明其道不計其功右處事之要己所不欲勿施於人行有不得反求諸已右接物之要熹竊觀古昔聖賢所以教人為學之意莫非使之講明義理以修其身然後推以及人非徒欲其務記覽為詞章以釣聲名資利祿而已今之為學者則又反是矣然聖賢所以教人之法具存於經有志之士固當熟讀精思而問辨之茍知其理之當然而責其身以必然則夫規矩禁防之具豈待他人設之而後有所持循哉近世於學有規其待學者為巳淺矣而其為法又未必古之意也故今不復施於此堂而特取凡聖賢所以教人為學之大端條列如右而揭之楣間諸君其相與講明遵守而責之於身焉則夫思慮云為之際其所以戒謹恐懼者必有嚴於彼者矣其有不然而或出於禁防之外言之所棄則彼所謂規者必將取之固不得而略也諸君其念之哉訓規圖義曰訓規然觀其圖象實決于此心一念敬肆之幾耳故類附于此湛甘泉先生著讀書觀山水不失已遊息收攝博六經開知見作文發所得教僮僕鈐束理家君子二業合併九條附內外混合讀書調心合一隨心力附作字敬自然附考業用心精遇長謙讓求益同門久敬凡九條附期約以信去成心讀書虛心較虛心自考講書虛心聽受言動由中出求禮義務敬謹不怨尤遷怒事父兄誠切族黨慈敬自得師傳習實功心幾敬義志道體認天理進修時體認煎消習心尋樂賔求道於人倫間篤實立誠二肆利不志道肆欲失本領習心虛樂外倫求道先文藝不立誠二巧令滋偽暴怒事父兄不誠切族黨不慈敬不求師傳而不習悠悠過日遇長抗拒同門積嫌期約不信師成心徒舉業以干祿支離讀書主敬兩途作字欲好用心粗讀書觀山水牿亡泛濫仙佛壞心術作文欲勝人縱家僮棄家事小人夫規何為者也夫學心而已焉者也何莫非心也心得其職則敬敬為義心失其職則肆肆為利利義之判其間焉者也義為志道為體天理為尋樂賔為求道於人倫之間為篤實為言動由中出為不怨尤遷怒為事父兄也誠切為自得師為傳習為遇長者謙讓為處同門久敬為約信為去成心為二業併為內外混合為讀書調心合一為作字也敬為考業用心也精為觀山水不失已為博六經以開知見為作文也發揮所得為教束家僮充其類焉及其成也為君子利為志為肆欲為虛樂為外倫求道為先文藝為巧令以滋偽為暴怒為事父兄也不誠切為不求師為傳而不習為抗倨為同門積嫌為期約不信為師成心為徒事舉業以干祿為支離為讀書主敬兩途為作字欲好為粗心為牿亡為泛濫仙佛以壞心術為欲勝人為縱放家僮充其類焉及其成也為小人是故古之人有終日乾乾為君子而不息者矣今之人有終身弊弊為小人而不知者矣豈其智不若歟其術使然也是故學莫先於辨術矣學者觀其圖焉斯過半矣吳草廬氏學基君子終日乾乾夕惕若君子以自強不息君子無終食之間違仁造次必於是顛沛必於是非禮勿視非禮勿聽非禮勿言非禮勿動出門如見大賔使民如承大祭居處恭執事敬與人忠言忠信行篤敬立則見其參於前在輿則見其倚於衡道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子必慎其獨也毋不敬儼若思安定辭坐如尸立如齊莊敬自強安肆日偷致禮以治躬則莊敬莊敬則威嚴外貌斯須不莊不敬而慢易之心入之矣姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義也禮也者所以固人肌膚之會筋骸之束也清明在躬志氣如神持其志無暴其氣養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣茍得其養無物不長操則存舍則亡出入無時莫知其鄉惟心之謂與學問之道無他求其放心而已矣耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所以與我者先立乎其大者則其小者不能奪也右前二十則易二禮論語五子中庸一七孟五一者無欲也無欲則靜虛動直動而無動靜而無靜定之以中正仁義而主靜定性者動亦定靜亦定靜後見萬物自然皆有春意敬則自虛靜有主則虛敬勝百邪有主則實外物不接內欲不萌若要作得心主定惟是止於事心要在腔子裏一整齊嚴肅則心便一主一之謂敬無適之謂一一於恭敬則天地有位而萬物有育此體信達順之道聰明睿知皆由此出定然後始有光明心清時視明聽聰四體不待羈束而自然恭謹常惺惺其心收斂不容一物正其衣冠尊其瞻視潛心以居對越上帝足容必重手容必恭擇地而蹈折旋蟻封出門如賔承事如祭戰戰兢兢罔敢或易守口如瓶防意如城洞洞屬屬罔敢或輕不東以西不南以北當事而存靡他其適弗二以二弗叄以三惟精惟一萬變是監從事於斯是曰持敬動靜無違表裏交正須臾有間私欲萬端不火而熱不氷而寒毫釐有差天壤易處三綱既淪九法亦斁於乎小子念哉敬哉右後二十則周子二二程子十張子二一尹先生謝先生一朱先生一學術吳草廬尊德性道問學齋記天之所以生人人之所以為人以此德性也然自孟氏以來聖學不嗣士學靡宗誰復知有此哉漢唐千餘年間儒者各矜所長奮迅馳騖而不自知其缺董韓二氏依稀數語近之而原本竟昧昧也則亦漢唐之儒而已矣宋初如胡如孫首明聖經以立師教一時號為有體有用之學卓行異材之士多出其門不為無補於人心世道然稽其所極度越董韓者無幾是何也於所謂德性未嘗知所以用其力也逮夫周程張卲興始能上通孟氏而為一程氏四傳而至朱文義至精密又孟氏以來所未有者而其學徒往往滯於此而溺其心夫既以世儒記誦詞章為俗學矣而其學亦未離乎言語文字之末甚至專守一藝而不復旁通他書掇拾腐説而不能自遣一辭反俾記誦之徒嗤其陋詞章之徒􅏺其拙此則嘉定以後朱門末學之弊而未有能究之者也夫所貴乎聖人之學以能全天之所以與我者爾天之與我德性是也是為仁義禮知之根株是形質血氣之主宰舍此而他求所學果何學哉假使行如司馬文正公才如諸葛忠武侯亦不免為行不著習不察亦不過為資器之超於人而謂有得於聖學則未也况止於訓詁之精講説之密如北溪之陳雙峯之饒則與彼記誦詞章之俗學相去何能以寸哉澄也鑽研於文義毫分縷析每以陳為未精饒為未密也墮此科臼之中垂四十年而始覺其非自今以往一日之內子而亥一月之內朔而晦一嵗之內春而冬常見吾德性之昭昭如天之還轉如日月之往來不使有須臾之間斷則於尊之之道其庶幾乎於此有未能則問於人學於己而必欲其至若其用力之方非言之可喻亦味於中庸首章訂頑終篇而自悟可也夫如是齊於賢躋於聖如種之有獲可必其然也因前論性道因類附以教規學基以辨學術餘詳大學圖學術辨一夫聖人之學心學也學以求盡其心而已矣堯舜禹之相授受曰人心惟危道心惟微惟精惟一允執厥中道心者率性之謂而未雜於人無聲無臭至微而顯誠之源也人心則雜於人而危矣偽之端矣見孺子入井而惻隱率性之道也從而納交于其父母焉要譽於鄉黨焉則人心矣飢而食渴而飲率性之道也從而極滋味之美焉恣口腹之叨焉則人心矣惟一者一於道心也惟精者慮道心之不一而或二之以人心也道無不中一於道心而不息是謂允執厥中矣一於道心則存之無不中而發之無不和是故率是道心而發之於父子也無不親發之於君臣也無不義發之於夫婦長幼朋友也無不别無不序無不信是謂中節之和天下之達道也放四海而皆凖亘古今而不窮天下之人同此心同此性同此達道也舜使契為司徒而教以人倫教之以此達道也當是之時人皆君子而比屋可封蓋教者惟以是為教而學者惟以是為學也聖人既沒心學晦而人偽行功利訓詁記誦辭章之徒紛沓而起支離決裂嵗盛月新相沿相襲各是其非人心日熾而不復知有道心之微間有覺其紕繆而略知反本求源者則又閧然指為禪學而羣訾之嗚呼心學何由而復明乎夫禪之學與聖人之學皆求盡其心也亦相去毫釐耳聖人之求盡其心也以天地萬物為一體也吾之父子親矣而天下有未親者焉吾心未盡也吾之君臣義矣而天下有未義者焉吾心未盡也吾之夫婦别矣長幼序矣朋友信矣而天下有未别未序未信者焉吾心未盡也吾之一家飽暖逸樂矣而天下有未飽暖逸樂者焉其能以親乎義乎别序信乎吾心未盡也故于是有紀綱政事之設焉有禮樂教化之施焉凡以裁成輔相成已成物而求盡吾心焉耳心盡而家以齊國以治天下以平故聖人之學不出於盡心禪之學非不以心為説然其以為是達道也者固吾之心也吾惟不昧吾心於其中則亦已矣而亦豈必屑屑於其外其外有未當也則亦豈必屑屑於中斯亦其所謂盡心者矣而不知已陷於自私自利之偏是以外人倫遺事物以之獨善或能之而要之不可以治家國天下蓋聖人之學無人己無內外一天地萬物以為心而禪之學起於自私自利而未免於內外之分斯其所以為異也今之為心性之學者而果外人倫遺事物則誠所謂禪矣使其未嘗外人倫遺事物而專以存心養性為事則固聖門精一之學也而可謂之禪乎哉世之學者承沿其舉業詞章之習以荒穢戕伐其心既與聖人盡心之學相背而馳日騖日逺莫知其所抵極矣有以心性之説而招之來歸者則顧駭以為禪而反仇讎視之不亦大可哀乎學記學術辨二夫拔本塞源之論不明於天下則天下之學聖人者將日繁月難斯人入於禽獸之歸而猶自以為聖人之學吾之説雖或明於一時終將凍解於西氷堅於東霧釋於前雲滃於後呶呶焉危困以死而卒無救於天下之分毫也夫聖人之心以天地萬物為一體其視天下之人無內外逺近凡有血氣皆其昆弟赤子之親莫不欲安全而教養之以遂其萬物一體之念天下之人心其始亦非有異於聖人也特其間於有我之私隔於物欲之蔽大者以小通者以塞人各有心至有視其父子兄弟如仇讐者聖人有憂之是以推其天地萬物一體之仁以教天下使之皆有以克其私去其蔽以復其心體之同然其教之大端則堯舜禹之相授受所謂道心惟微惟精惟一允執厥中而其節目則舜之命契所謂父子親君臣義夫婦别長幼序朋友信五者而已唐虞三代之世教者惟以此為教學者亦惟以此為學當是之時人無異見家無異習安此者謂之聖勉此者謂之賢而背此者雖其啓明如朱亦謂之不肖下至閭井田野農工商賈之賤莫不皆有是學而惟以成其德行為務何者無有聞見之習記誦之煩詞章之靡濫功利之馳逐但使之義序别以復其心體之同然是蓋性分之所固有而非有假於外者則人亦孰不能之乎學校之中惟以成德為事而才能之異者或長於禮樂長於政教長於水土播植者則就其成德而因使益精其能於學校之中逮夫舉德而任則使之終身居其職而不易用之者惟知同心一德以共安天下之民視才之稱否而初不以崇卑勞逸為美惡效用者亦惟知同心一德以共安天下之民茍當其能則終身處於煩劇而不以為勞安於卑瑣而不以為賤當是時天下之人熙熙皥皥皆相視如一家之親其才質之下者則安於農工商賈之分各勤其業以相生相養而無有乎希髙慕外之心其才能之異若臯夔稷契者則出而各效其能若一家之務或營其衣食或通有無或備其器用集謀并力以求遂其仰事俯育之願惟恐當其事者之或怠而重巳之纍也故稷勤其稼而不恥其不知教視契之善教即巳之善教也夔司其樂而不恥於不明禮視臯之通禮即巳之通禮也蓋其心學純明而有以全其萬物一體之仁故其精神流貫志氣通逹而無有乎人己之分物我之間譬之一身目視耳聽手持足行以濟一身之用目不恥其無聰而耳之所涉目必營焉足不恥其無執而手之所探足必前焉蓋其元氣充周血脈條暢是以癢疴呼吸感觸神應有不言而喻之妙此聖人之學所以至易至簡易知易從學易能而才易成者正以大端惟在復心體之同然而知識技能非所論也三代之衰王道熄而霸術倡孔孟既沒聖學晦而異説橫教者不復以此為教而學者不復以此為學霸者之徒竊取先王之近似者假之於外以內濟其私巳之欲天下靡然宗之聖人之道遂以蕪塞相倣相俲日求富強之説傾詐之謀攻代之計一切欺天罔人茍一時之得以獵取聲利之術若管商蘇張之屬者至不可名數既其久也鬪爭劫奪不勝其禍斯人淪於禽獸之歸而霸術亦有所不能行矣世之儒者慨然恐惕搜獵先聖之典章法制而掇拾修補於煨燼之餘蓋其為心良亦欲以挽回先王之道聖學既逺霸術之傳積漬已深雖以賢知皆不免於習染其所以講明修飾以求宣暢光復於世者僅可以增霸者之藩籬而聖學之門墻遂不復可覩於是乎有訓詁之學而傳之以為名有記誦之學而言之以為博有詞章之學而侈之以為麗若是者紛紛籍籍羣起角立於天下又不知其幾家萬徑千蹊莫知所適世之學者如入百戲之場歡謔跳踉騁竒鬭巧獻笑爭妍者四面而競出前瞻後盼應接不遑而耳目眩瞀精神恍惑日夜遨遊淹息其間如病狂喪心之人莫自知其家業之所歸時君世主亦皆昏迷顛倒於其説而終身從事于無用之虛文莫自知其所謂間有覺其空疏謬妄支離牽滯而卓然自奮欲以見諸行事之實極其所抵亦不過為富強功利五霸事業而止聖人之學日逺日晦而功利之習愈趨愈下其間雖嘗瞽惑於佛老而佛老之説卒亦未能有以勝其功利之心雖又嘗折衷於羣儒而羣儒之論終亦未能有以破其功利之見蓋至于今功利之毒淪浹於人之心髓而習以成性也幾千年矣相矜以知相軋以勢相爭以利相髙以技能相取以聲譽其出而仕也理錢榖者則欲蒹夫兵刑典禮樂者又欲與夫銓軸處郡縣則思藩臬之髙居臺諌則望宰執之要故不能其事則不得以兼其官不通其説則不可以要其譽記誦之廣適以長其敖也知識之多適以行其惡也聞見之博適以肆其辨也詞章之富適以飾其偽也是以臯夔稷契所不能兼之事今之初學小子皆欲通其説究其術其稱名借號未嘗不曰吾欲以共成天下之務而其誠心實意之所在以為不如是别無以濟其私滿其欲也嗚呼以若是之積染以若是之心志而又講之以若是之學術宜其聞吾聖人之教視之以為贅瘤枘鑿則其以良知為未足而謂聖人之學為無所用亦其勢所必至矣嗚呼士生斯世尚何以求聖人之學乎尚何以論聖人之學乎士生斯世欲以為學者不亦勞苦而煩難乎不亦拘滯而險艱乎嗚呼亦可悲也所幸天理之在人心終不可泯而良知之明萬古一日則其聞吾拔本塞源之論必有惻然而悲戚然而痛憤然而起沛然若決江河而有所不可禦者矣非夫豪傑之士無所待而興者吾誰與望乎陽明集心學辨總敘體道存乎學悟道存乎心惟真心為能得乎天下之理也然則天之生人本心有不真乎非不真也識心不真則其所學或偏或邪凡所言行生心害事而反悖乎理者多矣孰知人無理外之心亦無心外之理名雖二實則一也三代而上學出於一人心世道如出一轍時至春秋學術多岐聖人有憂之乃萃古人典籍剔繁就簡刪之讃之會為六經俾道出於一約人心歸諸易簡中正之矩也蓋亦灼見後日之弊而豫防之也奈何聖逺道湮邪説暴行人所易辨姑置弗論而異教言心雖若愈精愈邃其實愈支愈離使髙明頴異之士羣趨而和之外倫理以求心不特為彼樹赤幟窒塞聖途反托聖典奧密為之緣飾以引誘後進充其心不至變中國為西畨不已也率獸食人莫此為甚吁可慟哉所以今日為世道慮者又倡為理學心學之辨用心亦甚殷矣將以此説為是乎心之所同然者理也義也舍理何有于心之同也將以此説為非乎堯以執中傳舜舜子一心又有人道之分必精之一之以執中者何説也嘗讀易至習坎有孚惟心亨乃知文王卦詞正以闡明三聖危微精一之旨也何也坎陷也一陽在二隂之中即此心陷于人身血氣之象也以二隂包一陽非人心惟危之象乎以一陽統二隂非道心惟微之象乎此所以謂操則存舍則亡求則得舍則失雖收放心間之惟艱也其如人皆不著不察何其如志學者不精不一何噫聖人描畫這個心之象貌示人至明顯矣而學者猶莫之醒悟得非自失其本心哉但學不稽古無徴不信聖人言大學之道曰古之欲明明德於天下國家者其先至於身修正心足矣又有誠意致知以先之且曰致知在格物以此為教胡為乎於物有本末俱莫之識故不以意為心則以知為心而單提直指又欲去意去知専以心之虛靈知覺為尚何可勝數此皆不肯明物察倫由仁義行各以知見為超悟也盍不觀之成湯以禮制心仲尼從心不踰矩顔子其心不違仁孟子仁義禮知根於心何後先一揆均之此心此道此學哉所以豫謂象山不可以禪學病之者謂其少時已悟四海千古上下有聖人出焉此心此理同也何為闢其專於心之精神而不窮其理耶是故陳氏學蔀通辨辨近日儒佛渾淆可也言心雖各有據析理或有未精今取其圖存其説于每條之後不敢加一語抑揚其間庶使專心學者知所警耳噫此心同也此理同也寧無先得我心之同然者以同證此理學心學之辨乎近世儒佛混淆正以其論心之無辨也此圖則是説雖不精姑併存之虞書曰人心惟危道心惟微張子曰合性與知覺有心之名朱子曰人心是有知覺嗜欲者道心則是義理之心可以為人心之主宰而人心據以為凖者也又曰如喜怒人心也喜其所當喜怒其所當怒乃道心也飢飲食渴飲漿者人心也得飲食之正者道心也又曰人心是箇無揀擇底心道心是箇有揀擇底心觀此數言人心道心之辨明矣朱子曰吾儒所養者仁義禮智禪家所養者只是視聽言動只認得那人心無所謂道心又曰釋氏棄了道心却取人心之危者而作用之遺其精者取其粗者以為道儒佛不同樞要只此愚嘗究而論之聖賢之學心學也禪學陸學亦皆自謂心學也殊不知心之名同而所以言心則異也心圖具而同異之辨明矣是故孔孟皆以義理言心至禪學則以知覺言心孔子曰其心三月不違仁孟子曰仁義禮智根於心曰豈無仁義之心曰不忍人之心曰仁人心也皆是以義理言心也並不聞説知説覺也禪學出而後精神知覺之説興曰知之一字衆妙之門曰覺則無所不了曰識心見性曰淨智妙圓曰神通妙用曰光明寂照皆是以精神知覺言心也孔叢子曰心之精神是謂聖張子韶曰覺之一字衆妙之門陸象山曰收拾精神萬物皆備楊慈湖曰鑑中萬象陳白沙曰一片虛靈萬象存王陽明曰心之良知是謂聖皆是以精神知覺言心也儒釋所以雖皆言心而不同以此也近世不知此而徒譊譊曰彼心學也此亦心學也陸氏之學是即孔孟之學也嗚呼惑也久矣儒以義理為主佛以知覺為主學術真似同異是非邪正皆判以此孔子曰非禮勿視非禮勿聽非禮勿言非禮勿動孟子曰非仁無為也非禮無行也周子曰仁義禮智四者動靜言貌視聽無為之謂純此以義理為主也傳燈録曰作用是性在目曰見在耳曰聞在鼻嗅香在口談論在手執捉在足運奔陸象山曰吾目能視耳能聽鼻能知香臭口能知味心能思手足能運動更要甚存誠持敬楊慈湖曰吾目視耳聽鼻嗅口嘗手執足運無非大道之用王陽明曰那能視聽言動底便是性便是天理此以知覺為主也愚謂義理於人所繫甚重全義理則為聖為賢失義理則為愚為不肖知覺則夫人有之雖桀紂盜跖亦有之豈可謂視聽言動底便是天理無非大道之用邪此理甚明豈容誣也仁義禮智理之精也所以主正乎知覺而使之不差者也虛靈知覺氣之妙也所以引翼乎仁義而為之運用者也二者相為用也義理所以主宰乎知覺知覺所以運行乎仁義朱子曰人心如卒徒道心如將帥仁義禮智心之德虛靈知覺心之才傳曰才者德之資德者才之帥或曰誠若子言則胸中不如有二物相對耶曰不然也二者相為用也雖謂之一亦可也然非初學者所遽及也夫惟聖人其始一之者乎何也聖人者性焉安焉其所知覺者無非義理理與知覺渾融為一所謂從心所欲不踰矩矣所謂動容周旋中禮矣若夫學者不能無氣稟之拘而虛靈為之所纍義理因之以蔽其所知覺者未免多從於形氣之私而未能中禮而不踰矩故必格物致知窮乎義理以為虛靈知覺之主務使心之所欲必不至踰於矩也動容周旋必欲其中於禮也所謂道心為主而人心每聽命也故夫學者其始未能一而欲求一之者也聖人者自然而一之者也是故不能合其二以為一者非至學也周子太極圖説謂人得其秀而最靈形既生矣神發知矣正是指虛靈知覺而言至聖人定之以中正仁義便是以義理為知覺之主平時已致窮理之功臨事又復加審慎然後發此是吾儒之道若禪學則只完養一個精神知覺便了任渠自流出去以為無不是道矣學問思辨窮其理於平時也非禮勿視聽言動審發於臨事也皆是以義理為知覺之主吾儒惟恐義理不明不能為知覺之主故必欲格物窮理以致其知禪家惟恐事理紛擾為精誠知覺之纍故不欲心汨一事思一理朱子曰儒者以理為不生不滅釋氏以神識謂不生不滅胡敬齋曰儒者養得一個道理釋老只養得一個精神此言剖判極直截分明自孔孟老莊以來只是二道迭為盛衰如隂陽治亂相對相乘不知何時定於一道也者不可須臾離道即仁義禮智也君子尊德性而道問學德性亦仁義禮智也若禪學則以精神靈覺為德性為道為不可須臾離矣禪學所爭只此朱子謂人心猶船道心猶柁譬喻極親切若禪學則以人心靈覺為柁矣商書以義制事以禮制心孟子非仁無為非禮無行等語皆是以道心為人心之主人與天不同論天地之化氣為主而理在其中論聖賢之學理為主而氣聽其命盈天地間皆一元之氣不相離二之則不是在人精神作用皆氣也所以主宰其間而使之不差者理也是理氣在人不能無二欲混之有不可何也蓋天地無心而人有欲故也北溪陳氏曰心含理與氣理固全是善氣尚含兩頭在未便全是善底才動便易從不善上去心含理與氣正與張子謂合性與知覺同或曰人心虛靈知覺何得言無揀擇也曰此即告子生之謂性未分善惡也如目能視耳能聽心能思手足能運動固虛靈知覺也知趨利避害者亦虛靈知覺也善權謀術數機械變詐者亦虛靈知覺也為善為惡皆虛靈知覺也此正揚雄所謂善惡混也故朱子以為無揀擇的心而陳北溪以為氣尚含兩頭在以此或曰仁義禮智性也而子屬於心何也曰仁義禮智人心所具之理也非混然一物也非判然二物也孟子曰仁人心也非判然二物也孔子曰其心三月不違仁非混然一物也大抵心也性也一而二二而一者也朱子語類説心性元不可相離捨心則無以見性捨性則無以見心故孟子言心性每相隨説愚謂不獨吾儒言心性每相隨説如釋氏説識心見性亦是相隨説也但其所指以為心性者不同而遂為儒佛之異耳析而言之則仁義禮智為性虛靈知覺為心統而言之則二者皆心也亦皆性也然雖皆心而有道心人心之别雖皆性而有義理之性氣質之性之殊君子以統同辨異須析之極其精而不亂或曰精神靈覺自老莊禪陸皆以為至妙之理而朱子語類乃謂神只是形而下者文集釋氏論曰其所指為識心見性者實在精神魂魄之聚而吾儒所謂形而下者抑何耶曰以其屬於氣也精神靈覺皆氣之妙用也氣則猶有形迹也故陸學曰鏡中觀花曰鑑中萬象形迹顯矣影象著矣其為形而下也宜矣蓋形而上謂之道道即仁義禮智如何有形影若以精神知覺為形而上則仁義禮智謂何其為形而下無疑矣孟子一書言心皆是以義理之心為主不使為利欲陷溺而喪失其良心如説四端之心同然之心放其良心失其本心等語皆一意仁人心也放其心而不知求蓋言失其仁而不知求故學問之道無他求其所失之仁而已求仁者去人欲存天理而已若陸氏乃以靜坐收拾精神不令散逸為求放心失之逺矣奈何無惑學問求放心大全注中有一説謂仁人心也是指義理之心而言若將求放心做收攝精神不令皆放則只説從知覺上去與仁人心也不相接了蓋求放心即是求仁學問即是求仁之方道統總敘大哉聖人之道洋洋乎發育萬物峻極於天優優大哉禮儀三百威儀三千道之大也如此然則道統在人不亦大哉其難勝乎夫發育峻極浩乎其難知三百三千微乎其難體而法象莫大乎天地易曰知崇禮卑崇效天卑法地乃聖門之學脈也真信學脈之易簡則道統之傳可考而知矣粵自天開地闢而肇道統以位乎上者非伏羲乎俯仰近遠靡所不學仲尼首稱述之諒不誣也然通神明之德類萬物之情惟其有如此之大學故能統此大道為斯文始祖也嗣是而神農軒轅堯舜禹湯文武之為君岐伯臯益伊周之為相均是學也均是道也周室漸衰王道絶響則道統移而在下位矣中庸稱仲尼祖憲律襲非即伏羲之學乎敦化川流非即伏羲之道乎顔曽思孟相為羽翼闡揚其道非即伊周之儔乎故曰此天地之所以為大也知天地之大則羲孔列聖之大不言而喻矣信乎乾坤統天承天易知簡能為學道之大成也秦漢以來非不世有英君賢相然以羲孔之學道求之則邈乎無聞而董王諸葛特於聖門窺一班耳逮濂洛關閩金溪相繼而興闡明聖學真有取曰虞淵之功但與羲孔齊肩或難乎其概擬也在東萊南軒又可知矣若元吳許我明薛胡陳王又七大儒之流亞也何也學也道也不能如天地之大也洪惟我太祖高皇帝統一聖道大明大行直纘羲堯之統匪末學小知所能窺測擬議之也豈徒功髙千古已哉天地之大豈大以形氣哉易曰天地大德曰生是也凡日月寒暑之往來雨風露雷之動蕩潤澤山川之流峙混合絪緼皆天地也然自昔聖人在天子之位固能參贊天地化育而參贊聖君不有聖人為之輔弼哉惟聖人在上此天地所以位萬物所以育道必待人而行也雖欲委之不可得已信乎道無為也惟人能𢎞之且道統之傳必作之君師厯厯可考鴻濛初開繼天立極始自庖犧氏而神農軒轅堯舜禹湯文武位天位也德天德也神化與天地上下同流而斯道大一統也當時雲龍風虎如風后力牧伯岐臯益伊周於以輔翊厯代綱維斯道雖人道之克盡孰非天道之篤生耶况道統之所以傳者咸有可證如二論堯曰章所以發揮二帝三王先後一脈相承可謂簡而詳矣至孟子七篇末章乃以聞知終之孔子而在下位者未嘗不均有道統之責也噫善觀道統者亦可以觀世道矣自周而前任道統者咸在君相之位故治教出於一縱有異説不得而淆之故人倫明而下氏親也周道漸衰紀綱陵替雖文未喪於天道未墜於地而孔子特庶人也何以見斯文之在兹乎蓋三綱五常乃人之所以為人而異於禽獸之歸者惟此而已天將以夫子為木鐸儀封人久已識之不獨七十三千崇為斯文宗主設教洙泗轍環列侯無非以此人道誥詔寰宇雖綏來動和未獲親覿於當時然刪述六經立萬代人極赫濯如赤日中天秦漢而下明君顯相得以坐致升平者誰之力也故宰豫子貢有若孟子咸謂生民以來未有孔子正以道統攸歸雖前古帝王不得與比隆也向非六經之昭明人心賴此不泯雖大無道之世不敢公然率獸食人孰不蒙其罔極之德乎然而顔曾子思以後復以此統歸諸孟氏何歟蓋七篇尊王賤霸闢楊墨為異端獨尊孔子正學所以間先王之道者功真不在禹下雖韓歐尚得以挹餘波闢佛教也韓退之謂堯以是傳之舜禹湯文武周公孔子至孟子不傳豈溢美耶嗣是董仲舒王文中亦嘗闡明萬一然斯道晦塞亦不絶如線已故宋儒繼孟氏復興何道之顯晦亦有時歟儒學與聖學亦有辨非謂儒學之小也通天地人曰儒儒小乎哉蓋學止求心使性有未徹匪直微危莫察不能允執厥中或師心自用未免以小見小成自足縱在宫墻內而富美終莫之窺也觀孔子從心不踰矩顔子其心不違仁孟子仁義禮智根於心惡可虛寂其心以自足耶且尚有進於此者中庸於經綸立本必知天地化育才無所倚否則雖遊聖門終日言性與天道猶莫之聞矣若宋七大儒涵養雖各别要非漢唐諸儒能窺測其底裏或亦所見所造有不同乎雖遺言具在後學曷能窺其籓籬矧敢輕議其異同哉而心性天人却不可以無辨也矧今之求心者匪特不明性與天道而咸以寂靜虛無為止至善焉不知心本合體用動靜寂感有無而一之也彼専尚虛無寂靜外若未離倫物內實専因果甚至高佛卑孔肆然無忌行將率中華盡行其異教為快也目之為禪豈過情哉志儒學者其慎辨之朱陸之辨由二先生原有尊德性道問學之分且有太極圖往復辨論故爾蓋學問之道有疑必辨自有不容己者嘗聞吕涇野公曰晦庵象山同法堯舜同師孔孟雖入門路徑微有不同而究竟本原其致一也何害其為同哉學者不肯力行而膠於聞見以資口耳竟於身心何益斯語甚明後學反增論辨何也在善學者固不可以混然無别胡不反異求同哉我明如薛胡陳王既從祀矣然吳康齋身任師道興起一代斯文功實懋焉奈何白沙之靜虛陽明之良知本同此尊德性之學也而後人論辨不置又何歟觀中庸論道不明行固因賢知與愚不肖矣易論君子道鮮亦以仁知各見與日用不知等也以此律之莫之能遁矣是故生知上也恐未易得學知次也實為下學之凖繩况速悟誠為捷徑茍加踐履未有夙知而暮成者彼主持世教則又以易知簡能為凖繩要在豪傑之士自反自修毋以先輩為口實而置身道外斯善矣易更四聖或曰三聖謂伏羲文王周公孔子世厯三古謂伏羲為上古文周為中古孔子為下古而商瞿者孔門七十弟子列也授經為真其傳自魯燕東武以至於齊田何何故齊王族也漢初例徙關中於是易入中朝自何以上源出於一自何以下流分為四而施孟梁京之學立矣房或云楊何弟子或云受易焦延夀或云京門人為梁丘賀然房之學大抵從焦延夀焦嘗從孟喜孟氏四家之外又有高費二家之學髙相授母將永費直授王璜皆無師傳専言災異相自言出於丁寬石渠之議梁丘賀立博士光武初始立四家博士戴賔劉昆為施氏窪丹安任觟陽鴻為孟氏范升楊武張興為梁丘氏戴隗滿孫期為京氏劉向以中文易校施孟梁丘經或脫去無咎悔亡惟費氏經與古文同其後又有馬融荀爽鄭玄劉表虞翻陸續王弼之屬漢志易有十三家唐七十六家宋一百四十家皆周易也連山易已亡周劉炫作偽易十卷歸藏十三篇隋時始出僅存三篇皆無師傳皇明惟朱子本義列於學宫成祖命儒臣纂修易經大全行於世書纂自孔子上斷於堯下訖於秦秦燔書禁學濟南伏生獨壁藏之漢興亡失求得二十九篇以教齊魯之間訖孝宣世有歐陽大小夏侯氏立於學宫然歐陽八世傳業至光武時歙學大行門生千人又為司徒封侯牟融張訓為大夏侯氏王良為小夏侯氏其後三家俱亡於永嘉之亂而古文之書始行於六朝伏書二十八篇孔書五十八篇朱子曰熹嘗疑孔書是假漢志尚書九家唐志二十五家宋志四十三家皇明惟尚書蔡沈列於學宫成祖命儒臣纂修書經大全行於世古文尚書出孔子宅壁中漢武帝末魯共王壞孔子宅以廣其宫而得古文尚書及禮記論語凡數十篇皆古字也共王往入其宅聞鼓瑟鐘磬之音於是懼乃止孔安國得其書獻之劉向以中古文校之歐陽大小夏侯三家經文酒誥脫簡一召誥脫簡二文字異者七百餘脫字數十惜其晚出不獲列於學宫東京杜林最好之賈逵馬融鄭玄之屬為之作訓然石經卒從伏氏晉鄭沖又好之以授蘇愈愈授梁柳柳授減曹曹授梅頤為豫章內史上其書而有缺典至隋始備蔡大寶劉炫之屬皆宗之而孔學大行然姚方興所上舜典多二十八字識者終不能無疑焉西漢又有東萊書百二篇黜為偽書平當周敞皆經師共勸留之不能得二子之留豈非以中書所校者乃伏氏之書不可盡據歟然其篇目有九共典寶原命肆命與書序相照豈亦有可留者不得以樊並之而廢之宋元豐中唐州民家得三墳書朝氏武云亦偽書古有采詩之官王者所以觀風俗知得失自考正也孔子刪詩存三百篇遭秦而全者以其諷誦不獨在竹帛間也漢時言詩者四家齊轅固生傳伏恭任末為齊詩魯申公傳包咸高詡魏應為魯詩燕韓嬰傳薛漢召馴淡臺敬伯為韓詩荀卿授魯國毛亨毛萇傳謝曼卿衛宏賈逵鄭衆馬融鄭玄為毛詩宏作小序時人謂亨為大毛公萇為小毛公齊魯韓三家並立於學官毛詩至漢平始得立齊詩亡於曹魏魯詩亡於西晉韓詩內傳亡於隋三詩既亡而毛詩獨行蓋大毛公之詩得之申公申公傳之子夏其説多合於金縢儀禮國語孟子諸書自漢晉至唐宋皆用其語至於他經所引詩皆本其意解之朱子集注乃多主鄭玄鄭玄有詩譜歐陽公有詩圖皆為十四國世次而作漢志詩六家唐志詩二十五家宋志五十三家皇明設學造士専主朱子集傳而諸家之學止備參考成祖命儒臣纂詩經大全行於世古之王者世有史官君舉必書所以慎言行昭法戒也左史記言右史記事事為春秋言為尚書周室既微載籍殘缺仲尼因魯史以成春秋厥後則有左氏公羊榖梁三家之傳三家惟公榖列於學官余讀子夏喪服傳乃知公榖之文有所本焉三傳之行公羊獨盛蓋董仲舒公孫𢎞以春秋顯其後顔嚴二氏之學益廣武帝為之立顔嚴二博士唐玄宗所謂學開五傳者也榖梁之傳甚寡惟戾太子好之宣帝為立博士亦挂劍之意也卒不著東漢謝詠頴容為左氏張玄為顔氏丁恭周澤為嚴氏又有李育何休盛稱公羊為墨守而榖梁寖微矣厯漢魏西晉至南渡始得范武子漢志春秋二十三家唐志六十六家宋志一百二十九家皇明惟春秋胡安國列於學官至成祖命儒臣纂修春秋大全行於世帝王質文世有損益至于曲為之防事為之制周衰諸侯將踰法度惡其害巳滅去其籍漢興魯髙堂生傳士禮十二篇訖於孝宣之世后蒼最明戴德戴聖慶普皆其弟子三家立於學宫禮古經出於魯淹中髙堂生蕭奮孟卿后蒼二戴所傳儀禮也戴德傳記八十五篇大戴禮也戴聖傳禮四十九篇今禮記也西漢慶氏與二戴並傳東漢止立二戴博士後惟曹褒父子宗慶氏學漢末惟鄭玄宗小戴記為之注通儀禮周禮為三禮漢志禮十三家唐志六十九家宋志六十四家樂志雜於禮記中凡六家漢惟制氏以推樂聲律志在樂官頗能記其鏗鏘鼓舞而不能言其義武帝時河澗獻王好儒與毛生等共采周官及諸子言樂事者以作樂記與制氏不相遠皇明惟陳澔禮記注列於學官成祖命儒臣纂修禮記大全行於世秦用苛政與周官相反故禁焚獨慘至漢孝武是書始入祕府五家之儒莫得而見故不立博士成帝詔劉向校録經傳子歆繼之知周禮為周公致太平之迹始得列敘著於録略而里人河南杜子春年且九十能通其説鄭興與子衆及賈逵往受業焉由是議郎衛敬仲南郡太守馬季良皆注周禮解詁林孝存曰武帝知周官末世瀆亂不驗之書故作十論七難以排棄之何休亦以為六國隂謀之書惟鄭玄遍覽羣經以為經世大法具載周禮故能答林碩之論網羅衆家為之條注陸德明為之釋文唐賈公彥為之疏而後周禮大行於世按孝經自魯共王得之孔壁皆蝌蚪書人無識者孔安國以今文考定書之竹簡唐玄宗自注詔元淡為疏始立於學宫有顔經十八章孔安國傳二十二章劉向從顔氏按王充云武帝得論語於孔壁中皆名曰傳孔安國以古論教晉人扶卿始曰論語漢安昌侯授魯論於夏侯建又從王吉授齊論擇善而從號曰張侯論禹以授成後漢包咸周氏並為章列於學宫古論惟孔安國為之訓解而世不傳漢末鄭玄以張侯論為本參考齊論古論為之注魏何晏又為輯解梁陳時惟鄭何立於國學皇明惟朱氏論語列於學宫而成祖命儒臣纂修論語大全行於世學庸二書漢小戴輯禮記四十九篇之中孝宣立小戴禮而二書已並列於學宫漢鄭玄注唐孔頴達疏至宋二程氏又表章之宋孝宗淳熙中朱熹集注論孟取大學中庸為之章句或問通稱為四章寧宗嘉定四年國子司業劉爚奏刻朱子四書於太學由是四書之傳大行於世皇明亦惟朱子學庸章句列於學宫成祖命儒臣纂修大學中庸大全並行孟陸善經注七篇趙岐注十四篇孫奭疏子丁公著音釋孟子前史皆在儒家趙岐陸善經為之注張鎰丁公著為之音釋至宋始列於經而孫奭為之疏孟子有外書四篇性善辨又説孝經為政趙岐云偽書也漢文嘗置孟子博士王充馮休李遘司馬公林慎思鄭原叔之徒與孟子異者凡六家故世儒又有翼孟尊孟書皇明惟朱子所注孟子列於學宫成祖命儒臣纂修孟子大全行於世爾雅舊附孝經六書為小學之書隋經藉志以附論語類至唐陸德明始為周公之書列於經趙岐云孝文嘗立爾雅博士然史漢無徵焉嘗考之前代小學一書古者八嵗入小學故保氏掌教國子教之六書謂象形指事會意諧聲轉注假借造字之本也漢興蕭何草律亦著其法曰大史試學以六體試之六體者古文竒字篆書𨽻書繆篆蟲書皆所以知古今文字摹印章書幡字也古例書必同文不知則闕問諸故老至於衰世是非無證人用其私皇明太祖纂洪武正韻一書行天下令科試行移一以是書為凖漢儒傳經統派總敘經匪道也道本無言經則有文辭可據俾誦習典籍者反諸身心極深紬繹探究而有所觸發則斯道漸與身心融徹此經之所以不可一日無也譬之文劵非事産而事産賴以稽查子孫且得世守之勿失耳可知經籍所係匪輕則漢儒之傳經者可使湮沒弗傳乎况當秦皇焚坑後散滅一盡乃得諸儒口授心維之守一于千百而師門淵源各有派敘故隨各經記之重道故重經亦因以重其人也魏晉以下如王肅杜預范平文立徐邈劉炫房暉輩亦俱纂述其緒唐又因其注而疏之其陸元朗顔師古孔頴達禇無量諸人各守師聞不至棄絶至宋儒大有發明得以集其注疏啓迪後人皆其力也可見經乃斯道之寄可盡委為古人所咀糟粕而輕視之哉觀渡江河必藉舟楫以誕登適長安必資輿馬以至逺今誦其詩讀其書不知其人惡乎可嘗聞古人受一字之益至終身師之而得遺經一言輒洞徹自家性命之奧不與日用飲食以養生者同功哉此則在好古敏求者受益何如耳圖書編卷七十七
