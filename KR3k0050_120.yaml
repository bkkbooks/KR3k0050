body:
  text: 圖書編卷一百二十明章潢撰百戰竒法總叙百戰竒法多出孫武子五經七書盖以孫子為經百法若傳每法既具所以復引古将帥所行有合者證之可謂極用兵之妙在兵家視之若無餘法矣竊嘗聞之漢武帝欲教霍去病兵法去病辭曰顧方畧何如耳予謂去病真能用兵者古今之勢不同山川風氣亦異而敵之制勝伺隙者又紛然雜出而無窮茍不能應之以變通之術而拘於古之成法其不挫衂而覆敗也難矣哉兹書百法雖倣於古而其間方畧亦未始不冝於今握兵權者平時能熟於心若將有事而精神籌度之及夫臨敵又能相機而應之以變通之術則所謂周悉萬全者吾誠有焉上者必勝其次亦能全師而歸未有失利者矣百戰竒法計戰凢用兵之道以計為首未戰之時先料将之賢愚敵之强弱兵之衆寡地之險易糧之虚實計料已審然後出兵無有不勝法曰料敵致勝險阨逺近上将之道也漢末劉先主在襄陽三往求計於諸葛亮曰自董卓以來豪傑並起跨州連郡者不可勝計曹操比於袁紹則名徵而衆寡然操遂能兔紹以弱為强者非惟天時抑亦人謀也今操已擁百萬之衆挾天子以令諸侯此誠不可與争鋒孫權據有江東已歴三世國險而民附賢能為之輔此可以為援而不可圖也荆州北據漢沔利盡南海東連吴會西通巴蜀此用武之國而主不能守此殆天所以資将軍豈有意乎益州險塞沃野千里天府之國髙祖因之以成帝業劉璋誾弱張魯在北民阜國冨不知存恤知能之士思得明君将軍既帝室之曺信義著於四海總覧英雄思賢如渇若跨有荆益保其巖阻西和諸戎南撫夷越外結好孫權内脩政治天下有變則命一上將将荆州之軍以向宛洛將軍身帥益州之衆出於秦川百姓孰敢不簞食以迎将軍者乎誠如是覇業可圖漢室可興矣先主曰善後果如其計謀戰凢敵始有謀我從而攻之使彼計衰而屈服法曰上兵伐謀春秋晉平公欲伐齊使范昭往觀齊國之政齊景公觴之酒酣范昭請君之罇酌公曰寡人之罇進客范昭已飲晏子徹罇更為酌范昭佯醉不悦而起舞謂太師曰能為我奏成周公之樂乎吾為舞之大師曰膑臣不習范昭出景公曰晉大國也來觀吾政今子怒大國之使者将奈何晏子曰觀范昭非陋於禮者且欲慙吾國臣故不從也太師曰夫周公之樂天子之樂也惟人主舞之今范昭人臣而欲舞天子樂臣故不為也范昭歸報晉平公齊未可伐臣欲辱其君晏子知之臣欲犯其禮太師識之仲尼曰不越罇俎之間而折衝千里之外晏子之謂也間戰凢欲征伐先用間諜覘敵之衆寡虛實動静然後興師則大功可立戰無不勝法曰無所不用間也周将韋叔裕字孝寛以字行守鎮玉壁孝寛善於撫御能得人心所遣間諜入齊者皆為盡力亦有齊人得孝寛金貨還逕通書信故齊動静朝廷皆知之齊相斛律光字明月賢而有勇孝寛深忌之參軍曲嚴頗知卜筮謂孝寛曰來年東朝必大相殺戮因令嚴作謡歌曰百升飛上天明月照長安百升斛也又曰高山不推自隤槲木不扶自立諜人多賫此文遺之於鄴祖孝徴輿光有隙既聞更潤色之明月卒以此誅周武帝聞光死赦其境内後大舉兵遂㓕齊選戰凢與敵戰須要選選勇将鋭卒使為先鋒一則壮兵志一則挫敵威法曰兵無選鋒曰北建安十二年袁尚熈奔上谷郡鳥桓數入塞為害曹操征之夏五月至無終秋七月大水傍海道不通田疇請為鄉導公從之率兵從盧龍塞外道絶不通乃塹山堙谷五百餘里經白檀歴平岡涉鮮卑庭東指栁城未至二百里虜方知之尚熙與蹋頓遼西單于樓班北平單于能臣抵之等將數後萬騎逆軍八月登白狼山卒與虜遇衆甚盛公輜重在被甲者少左右皆懼操登髙望虜陣不整乃縱兵撃之使張遼為先鋒虜衆大潰斬蹋頓及名王已下胡降漢者二十餘萬口步戰凢步兵與車騎戰者必依丘陵險阻林木而戰則勝若遇平陽之道須拒馬鎗為方陣步軍在内馬軍在外中分為駐隊戰隊駐隊守陣戰隊出戰戰隊守陣駐隊出戰敵攻我一靣則我兩哨出兵從傍以掩之敵攻我两靣則我分兵前後以擣之敵攻我四靣我為員陣分兵四出以奮撃之敵若敗走以騎兵追之步兵隨其後乃必勝方法曰步兵與車騎戰者必依丘陵險阻如無險阻令我士卒為行馬蒺藜五代史晉将周徳威為盧龍節度使恃勇不脩邉備遂失榆關之險契丹毎芻牧於營平之間䧟新州徳威復取不克奔歸幽州契丹圍之二百日城中危困李嗣源聞之約李存朂步騎七萬會於易州以救之乃自易州北行踰大房嶺循澗而束嗣源以百騎先進免冑揚鞭胡語謂契丹曰汝無故犯我疆埸晉王命我将百萬騎衆直抵西樓㓕爾種類矣因躍馬奮撾三入其陣斬契丹酋長一人後軍齊進契丹兵却晉兵始得出李存朂命步兵伐木為鹿角陣人持一枝以成寨契丹環寨而過寨中發萬弩射之流矢蔽日契丹人馬死傷塞路将至幽州契丹列陣待之存最命歩兵陣於後戒勿先動令贏兵曵柴燃草而進烟塵蔽天契丹莫測其多少因鼓大戰存最乃趨後陳起而乗之契丹大敗席卷其衆自北山口遁去俘斬萬計遂解幽州之圍騎戰凢騎兵與步兵戰者若遇山林險阻陂澤之地疾行急去是必敗之地勿得與戰欲戰者須得平陽之地進退無礙戰則必勝法曰易地則用騎五代史唐荘宗救趙與梁軍相距於柏鄉五里營於野河北晉兵少梁将王景仁所将兵雖多而精鋭者亦少晉軍望之色動周徳威勉其衆曰此汴宋販傭耳退而告之荘宗曰吾提孤兵出千里利在速戰今斯不乗勢而急擊之使敵知我衆寡則計無施矣徳威曰不然趙人皆守城而不能野戰吾之取勝利在騎兵平原曠野騎兵之所長也今吾軍於河上迫近營門非吾用長之地也荘宗不恱退卧帳中諸将無敢請見者徳威乃謂監軍張承業曰王怒老将不速戰者非法也且吾兵少而臨賊營門所恃者一水隔耳使梁得舟栰渡河吾無類矣不如退軍鄗邑誘敵出營擾而勞之可以策勝也承業言曰徳威老将知兵願無忽其言荘宗遽起曰吾方思之耳已而徳威獲梁游兵問景仁何為曰治舟數百将以為浮梁徳威乃與俱見荘宗笑曰果如公所料乃退軍鄗邑徳威選騎三百拒梁營挑戰自以勁兵三千繼之景仁怒悉以其兵出與徳威轉鬬數十里至於鄗南两軍皆陣梁軍横亘六七里荘宗䇿馬登高望而喜曰平原淺草可前可却真吾制勝之地也乃使人告徳威曰吾當急擊徳威諫曰梁軍輕出而逺來與吾轉戰其來既速必不暇賫糧糗縱其能賫有不暇食不及日午人馬饑渇其軍必退退而擊之必獲勝焉至未申時梁軍中塵起徳威鼓譟而進梁軍大敗舟戰凢與敵戰於江湖之間必有舟檝須居上風上流上風者順風用火以焚之上流者随勢使戰艦以衝之則戰無不勝法曰欲戰者無迎水流春秋呉子伐楚楚令尹卜戰不吉司馬子魚曰我得上流何故不吉遂戰吳師敗績車戰凢與步卒戰於平原曠野必須用偏箱鹿角車為方陣以戰則勝所謂一則治力一則前拒一則整部伍也法曰廣地則用軍車晉凉州刺史楊欣失荒戎之利為虜所没河西斷絶帝毎懐西顧之憂臨朝而歎曰誰能為我通凉州討此虜者乎朝臣莫對司馬督馬隆進曰陛下若能任臣臣能平之帝曰若能㓕賊何為不任顧卿方畧如何耳隆曰陛下若能任臣當聽臣自任帝曰云何臣請募勇士三千人無問所從來率之鼔行而西禀陛下威徳醜類何足㓕者帝許之乃以隆為武威太守隆募腰開弩三十六鈞立標揀試自旦至日中得三千五百人隆於是率其衆西渡温水虜樹機能等以衆萬騎或乗險以遏隆前或設伏以截隆後隆依八陣圖作偏箱車地廣用鹿角車路狭則為木屋施於車上且戰且前弓矢所及應弦而倒轉戰千里殺傷以千數隆到武威虜夷人祽䟦韓且萬能等率萬餘衆歸隆前後誅殺及降附數萬又率善戎没骨能等與樹機能等戰斬之凉州遂平信戰凢與敵戰士卒蹈萬死一生之地而無悔懼之心者皆信令使然也上好信以任誠則下用情而無疑故戰無不勝法曰信則不欺三國魏明帝歸長安遣司馬懿督張郃諸軍雍凉勁卒二十萬潜軍宻進窺伺劍閣蜀相諸葛亮時在祈山旌旗利器守在險要十二萬更代者八萬時魏軍始陣代兵過交參佐咸以賊衆强盛非力所制宜權停下兵一月以併聲勢亮曰吾統武行師以大信為本得原失信古人所惜代者促裝待期妻子鵠立而恱計日雖臨征難義所不廢皆發催令去於是去者皆願留一戰征者奮勇思致死命相謂曰諸葛公之恩死猶未報也臨戰之日莫不㧞劍争先以一當十殺張郃却司馬懿一戰大克信之由也敎戰凢興師必先教戰三軍之士素習離合聚散之法備諳坐作進退之令使之遇敵視旌麾以應變聴金鼓而進退之如此則戰無不勝法曰以不教民戰是謂棄之春秋時魏将吳起曰夫人常死其所不能敗其所不使故用兵之法教成為先一人學戰教成十人十人學戰敎成百人百人學戰教成千人千人學戰教成萬人萬人學戰教成三軍以近待逺以逸待勞以飽侍饑圓而方之坐而進之行而止之左而右之前而後之分而合之結而觧之毎變教習乃授其兵是謂将軍衆戰凢戰若我衆敵寡不可戰於險阻之間湏要平陽寛廣之地聞鼓則進聞金則止無有不勝法曰用衆務廣晉武時秦苻堅進屯夀陽列陣臨淝水與晉将謝𤣥相距𤣥使謂苻堅融曰君逺渉吾境而臨水為陣是不欲速戰諸君稍却令将士得周旋僕與諸君緩轡而觀之不亦樂乎堅衆皆曰宜阻淝水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過而我以鉄騎數十萬向水而逼之融亦以為然遂麾軍使却衆因亂而不能止於是𤣥與謝琰桓伊等以精銳八千渡淝水右軍距張蚝小退𤣥琰仍進兵大戰淝水南堅衆大潰寡戰凢戰若以寡敵衆必以日暮或伏於深草或邀於隘路戰則必勝法曰用少務隘北史西魏大統三年東魏将高歡渡河逼華州刺史王覇嚴守乃涉洛軍於許原西西魏遣将宇文泰拒之泰至渭南集諸將來㑹諸将以衆寡不敵請且待歡更西以觀之泰曰歡若至咸陽人皆轉騷擾今其新至可擊之即造浮橋於渭南軍士齎三日糧輕騎渡渭輜重自渭南夾渭而西十月士辰至沙苑距齊六十里高歡率兵來㑹候騎告齊兵至泰召諸将謂李弼曰彼衆我寡不可争也冝至陳曲北十里有渭曲可據以待之遂進至渭曲背水東西為陣李弼為右拒趙貴為左拒命将士皆偃干戈亍設盧之中聞鼓聲而起日䀯齊軍士望見軍少争進卒亂而不成列兵将交泰鳴鼔士卒皆起于謹等以大軍與之合戰李弼等率鉄騎擊之絶其軍為二遂大破之馬愛戰凢與敵戰士卒寜進死而不肯退生者皆將恩恵使然也三軍知在上之人愛我如子之至則我愛上也如父之極故䧟危亡之地而無不願死以報上之徳法曰視民如愛子故可與俱死春秋魏将吴起為西河守與士卒最下者同衣食卧不設席行不乗騎親裹贏粮與士卒分勞苦卒有病疽者起為吮之卒母聞而哭之或曰子卒也而将軍自吮其疽何哭為母曰非然也往年吴公吮其父其父戰不旋踵遂死於敵吴公今又吮其子妾不知其死所矣是以哭之文侯以呉起用兵亷平得士卒心使守西河與諸侯大戰七十六全勝六十四威戰凢與敵戰士卒進前而不敢退後是畏我而不畏敵也若不敢進者是畏敵而不畏我也将使士卒赴湯蹈火而不違者是威嚴使然也法曰威克厥愛允濟春秋齊景公時晉伐阿鄄而燕侵河上齊師敗績晏嬰乃薦田穰苴穰苴雖田氏庶孽然其人文能附衆武能威敵願君試之景公乃召穰苴與語兵事大說之以為將軍使扦燕晉之師禳苴曰臣素卑賤今擢之閭伍之中加之大夫之上士卒未附百姓不親人㣲權輊願得君之寵臣國之所尊以監軍乃可於是景公許之使荘賈往穰苴既辭與荘賈約旦日中會軍門穰苴先馳至軍中立表下漏待賈賈素驕貴以為将己之軍而已為監不甚急親戚左右送之㽞飲日中而賈不至苴則仆表决漏入行軍勒兵申明約束既定夕時賈乃至苴曰何為後期賈對曰不佞大夫親戚送之故㽞苴曰將受命之口則忘其家臨陳約束則忘其親援桴鼓之急則忘其身今敵國深侵邦内騷動士卒暴露於境君寢不安席食不甘味百姓之命皆垂於君何謂相送乎召軍正問曰軍法期而後至者云何對曰當斬荘賈懼使人馳報景公請救既往未及返於是遂斬荘賈以徇三軍三軍皆振慄久之景公遣使者持節赦賈馳入軍中苴曰将在軍君命有不受問軍正曰軍中不馳今使者云何對曰當斬使者大懼苴曰君之使不可殺之乃殺其僕車之左駙馬之左驂以徇三軍遣使者還報然後行軍士卒次舍井竈飲食問疾醫藥身自撫循之日取将軍之資粮以享士卒卒分粮食比其羸弱者三日而後勒兵病者皆求行争奮出為之赴戰晉師聞之渡河而解於是苴乃率衆追擊之遂取所亡邦内故境率兵而歸賞戰凢高城深池矢石繁下士卒争先登白刄當前士卒争先赴者必誘之以重賞則敵無不克焉法曰重賞之下必有勇夫漢末大将軍曹操毎攻城破邑得羙麗之物則悉以賞有功者若勲勞冝賞則不吝千金無功妄施分毫不與故能毎戰必勝罰戰凢戰使士卒遇敵敢進而不敢退一寸者必懲之以重刑故可以取勝也法曰罰不遷列隋大将楊素御戎嚴整有犯軍令者立斬之無所寛貸毎将對敵輙求人過失而斬之多者百餘人少不下十數人流血盈前言笑自若及其對陣先令三百人赴敵䧟陣則已如不能䧟陣而還者無問多少悉斬之又令二三百人復進還如向者将士股慄有必死之心由是戰無不勝主戰凢敵若彼為客我為主不可輕戰為吾兵安士卒顧家當集人聚財保城備險絶其粮道彼挑戰不得轉輸不至候其困敝擊之必勝法曰自戰其地為散地北史後魏太武帝親征後燕慕容徳於鄴前軍大敗績徳又欲攻之别駕韓􅒲進曰古人先决勝廟堂然後攻戰今魏不冝擊者四燕不冝動者三徳曰何故􅒲曰魏垂軍逺入利于野戰一不可擊也深入近畿致其死地二不可擊也前鋒既敗後軍必固三不可擊也彼衆我寡四不可擊也官軍自戰其地一不冝動動而不勝衆心難固二不冝動城隍不脩敵來無備三不冝動此皆兵家所忌不如深溝高壘以逸待勞彼千里饋粮野無所掠久則三軍靡攻則士卒多斃師老釁生起而圖之可以㨗也徳曰韓别駕之言真良平䇿也客戰凢戰若彼為主我為客惟務深入深入則為主者不能勝也謂客在重地主在輕地故爾法曰深入則専漢韓信張耳以兵數萬欲東下井陘擊趙趙王及成安君陳餘聚兵井陘口衆號二十萬廣武君李左車說成安君曰聞漢韓信涉西河搪魏豹擒夏説新㖼血閼與今乃輔以張耳議欲下趙此乗勝而去國逺鬬其鋒不可當臣聞千里饋粮士有饑色樵蘇後㸑師不宿飽今井陘之道車不得方軌騎不能成列其勢粮食必在其後願足下假臣竒兵三萬人從間道絶其輜重足下深溝高壘勿與戰彼前不得進退不得還野無所掠不十日两将軍之頭可懸麾下願君留意否必為所擒成安自以為義兵不聽果被殺强戰凢與敵戰若我衆强可偽示怯弱以誘之敵必輕來與我戰吾以銳卒擊之其軍必敗法曰能而示之不能戰國趙将李牧常居代鴈門備匃奴以便宜置下租皆輸入幕府為士卒費日擊數牛享士習騎射謹烽火多間諜後與将士約曰匈奴入盗急入収保有敢捕擄者斬匃奴毎入盗輙入収保不與戰如是數嵗無所亡失然匃奴以李牧為怯雖趙邉兵亦以為吾将怯趙王謂李牧如故趙王召之使人代牧将嵗餘匃奴來毎出戰數不利失亡多邉不得田畜於是復清牧牧稱疾杜門不出趙王乃復强使将兵牧曰若用臣臣如前乃敢奉命王許之李牧遂往至如故約匃奴來無所得終以為怯邉士日得賞賜不用皆願一戰於是乃具選軍得一千三百乗騎得一萬三千疋百金之士五萬人控弦者十萬人悉勒兵習戰大縱畜牧人民滿野匃奴來佯敗不勝以數千人委之單于聞之大率衆來入李牧多為竒陣張左右翼以擊之乃大破殺匈奴十餘萬騎單于奔走其後十餘嵗匃奴不能犯趙邉弱戰凢戰若敵衆我寡敵强我弱須多設旌旗倍増大竈示强於敵使彼莫能測我衆寡强弱之勢則敵必不輕與我戰我可速去全軍逺害法曰强弱形也後漢羌胡反㓂武都鄧太后以虞詡有将帥之畧遷武都太守羌乃率衆數千進詡於陳倉崤谷詡即停車不進而宣言上書請兵須到當發羌聞之乃分抄旁縣詡因其兵散日夜進道兼行日行百餘里令吏士各作两竈日増倍之羌不敢逼或曰孫臏减竈而君増之兵法曰行不過三十里而今日且百里何也詡曰虜衆多吾兵少虜見吾竈日增必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示强勢有不同故也驕戰凢敵人强盛未能必取須當卑詞厚禮以驕其志候其有釁隙可乗一舉可破法曰卑而驕之蜀将關侯北伐擒魏將于禁圍曹仁于樊城吳將吕蒙在陸口稱疾詣建業陸遜徃見之謂曰關侯接境如何逺下後不當可憂也蒙曰誠如來言然我病篤遜曰侯矜其驍氣凌轢于人始有大功意驕志逸得務北進未嫌於我有相聞病必益無備今出其不意自可擒制見至尊冝好為計䝉曰侯素勇猛既難與敵且已據荆州思信大布兼始有功膽氣益壯未易圍也蒙至都權問卿病誰可代者䝉對曰陸遜意思深長才堪負重觀其規畫終可大任而未有逺名非敵所忌無復是過若用之當今外自韜隠内察形便然後可克權召遜拜偏將軍都督代蒙遜至陸口書與關侯曰前承觀釁而聞動以律行師小舉大克一何巍巍敵國敗績利在同盟慶撫節想遂席捲共奨王綱某不敏受命來西延慕光塵思禀良規又曰于禁等見獲遐邇欣歡以為将軍之勲足以長世雖晉文城濮之師淮隂㧞趙之畧蔑以尚兹聞徐晃等步騎駐旌窺望麾葆操猾虜也忿不思難潜増衆以逞其心雖云師老猶有驍悍且戰㨗之後常苦輕敵古術軍勝彌警願将軍廣為方計以全獨克僕書生踈遲忝所不堪喜鄰徳威樂自傾盡雖未合䇿猶可懐也侯覽書有謙下自托之意遂大安無復所嫌遜具啟状陳其可擒之要權乃潜軍而上使遜與吕䝉為前部至即克公安南郡交戰凢與敵戰傍與鄰國當卑詞厚賂結之以為已援若我敵人之前後彼可倚則敵人必敗法曰衢地則合交三國蜀将關侯圍魏曹仁于樊魏遣左将軍于禁等救之會漢水暴起侯以舟兵虜禁等歩騎三萬入江陵是時漢帝都許昌魏武以為近賊欲徙河北以避其鋒司馬懿諫曰禁等為水所没非戰守之所失于國家之大計未有所損而便遷都既示敵以弱又淮沔之人俱不安矣孫權劉備内親而外踈蜀今得意權必不願也可諭權令擬其後則樊圍自解魏武從之遣使結權遂遣吕䝉西襲公安㧞之侯果棄樊而去形戰凢與敵戰若彼衆多則設虚形以分其勢彼不敢不分兵以備我敵勢既分其兵必寡我専為一其卒自衆以衆擊寡無有不勝法曰形人而我無形漢末曹操與袁紹相拒於官渡紹遣郭圖淳于瓊顔良攻曹将東郡大守劉延於白馬紹率至黎陽將渡河夏四月曹操北救荀攸說操曰今兵少不可敵若分其勢乃可公到延津若将渡河向其後紹必西應之然後輕兵襲白馬掩其不備顔良可擒也操從之紹聞兵渡即分兵西應之操乃率輕兵趨白馬未至十餘里良大驚來迎戰操使張遼關侯前登擊破之斬良遂解白馬之圍勢戰凢所謂勢者乗勢也因敵有破㓕之勢則我從而迫之其軍必潰法曰因勢破之晉武帝宻有㓕吳之計而朝議多違惟羊祜杜預張華與帝意合祜病舉預自代及祜卒拜預鎮南大将軍督荆州諸軍事既至鎮繕兵甲耀威武遂揀精銳襲破吳西陵都督張政乃啟伐吳之期帝報待明年方欲大舉預上表曰凢事當以利害相較今此舉十有八九利而其害一二止于無功耳朝臣言破敗之形亦不可得直是計不出己功不在身各恥其前言之失故守之耳昔漢宣帝議趙充國所上事較之後貴諸議者皆叩頭而謝以塞異端也自秋以來討賊之形頗顯露今若中止孫皓懼而生計或徙都武昌更添脩江南諸城逺其居人城不可攻野無所掠積大船于夏口則明年之計或無所及矣時帝與張華圍棋而預表適至華推棋歛子曰陛下聖明神武國冨兵强吳主淫虐誅殺賢能當今討之可不勞而定帝許之預陳兵秣陵遣周㫖伍巢等率竒兵泛舟夜渡以襲樂鄉多張旗幟起火巴山出于要害之地以奪賊心遂虜吳都督孫歆既平上流于是湘江之南至于交廣吳之州郡望風歸附預仗節宣詔而撫綏之時諸将會議或曰百年之㓂未能專克今暑水潦方降疾疫将起冝向來冬更為大舉預曰昔樂毅藉濟西一戰以併强齊今兵威已振譬如破竹數節之後皆迎刄而觧無復著手處也遂指授羣帥逕造秼陵所過城邑莫不束手遂平孫皓晝戰凢與敵晝戰須多設旌旗以為疑兵使敵莫能測其衆寡法曰晝戰多旌旗春秋晉侯伐齊齊侯登山以望晉師晉人使斥山澤之險雖所不至必斾而䟽陳之使乗者左實右偽以斾先輿曵柴而從之齊侯見之畏其衆也逃歸夜戰凡與敵夜戰須多用火鼓所以變亂敵之耳目使其不知所以備我之計則勝法曰夜戰多火鼔春秋越伐吴吴人禦之䇺澤夾水而陣越為左右中軍使夜或左右鼓譟而進吴分兵禦之越為中軍潜渉當吳中軍而鼓之吴師亂遂大敗備戰凢出師征討行則備其邀截止則禦其掩襲營則防其偷盗風則恐其火攻若此設備有勝而無敗法曰有備不敗三國魏文帝大軍南征兵到精湖魏将滿寵率諸軍在前與敵夾水相對寵謂諸将曰今夕風甚猛敵必來燒營冝為之備諸軍皆儆夜半敵果十部來燒寵掩殺擊破之糧戰凢與敵壘相對持兵勝負未决有糧則勝若我之糧道必須加守䕶恐為敵人所抄若敵人餉道可分遣銳兵絶之敵既無糧其兵必走法曰軍無糧食則亡漢末曹操與袁紹相持于官渡遣運粮使淳于瓊等五人将兵萬餘人送之宿紹營北四十里紹謀臣許攸貪財紹不能足奔歸操因說操曰今袁紹有輜重萬餘乗而無嚴備今以輕兵襲之燔其積聚不過三日袁氏自敗矣賈詡茍攸勸操乃留曹洪守自将步騎五千人皆用袁軍旗幟銜枚縳馬口夜從間道出人負束薪所歴道有問者語之曰袁公恐曹操抄掠後軍遣兵以備聞者信以為然既至圍屯大放火營中驚亂大敗之紹棄甲而遁𨗳戰凢與敵戰山川之夷險道路之曲直必用鄉人引而導之乃知其利而戰則勝法曰不用鄉導者不能知地利漢武帝時匈奴比嵗入㓂所殺掠甚衆元翔五年春令衛青将三萬騎出塞匈奴右賢王以為漢兵不能至此醉卧帳中漢兵夜至圍右賢王虜驚輕讋獨與其愛妾一人騎兵數百潰圍夜逃北去漢遣騎校尉郭成等追四百里弗及擄得稗將十人男女五千餘口畜數十百萬於是青帥兵而還至塞天子使使者持大将軍即即軍中拜青為大将軍皆以兵屬立號而歸皆用校騫以嘗使大夏留匈奴人導軍知善水草處軍得以無饑渇知戰凢興兵伐敵所戰之地必豫知之師至之日必使敵人如期而來與戰則勝知戰地知戰日則所備者専所守者固法曰知戰之地知戰之日則可千里而會戰戰國魏與趙攻韓告急于齊用田忌将而往直走大梁魏将龎涓聞之去韓而歸魏孫臏謂田忌彼三晉之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趨利者蹶上将五十里而趨利者軍半至使齊軍入魏地為十萬竈明日五萬竈又明日為二萬竈涓退三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃棄其步軍與精銳竒兵倍道兼行逐之孫臏度其行暮當至馬陵道狹而旁多阻隘可伏兵乃斫大木白而書之曰龎涓死此樹下於是令齊軍善射者萬弩夾道而伏至斫木下見白書乃鑚火燭之讀其書未畢齊軍萬弩發魏軍大亂涓自知智窮兵敗乃自刎斥戰凢行兵之法斥候為先平易用騎險阻用步毎五人為甲人持一白旗逺則軍前後接續候望若見賊馬以次近轉告白主将令衆豫為之備法曰以虞待不虞者勝漢宣帝時先零諸羌叛犯邉塞玫城邑殺長吏時後将軍趙充國年七十餘上老之使問誰可将者充國曰百聞不如一見兵難遥度臣願馳至金城圖上方畧然羌戎小夷逆天背叛减亡不久願陛下以屬老臣勿以為憂上笑曰諾充國至金城須兵滿萬騎欲渡河恐為虜所遮即夜遣三校銜枚先渡渡輙營陣㑹明遂以次盡渡虜數十百騎來出入軍傍充國曰吾士馬新至困惓不可騎逐此皆驍騎難制又恐其為誘兵也擊虜以殄㓕為期小利不足貪令軍中勿擊遣騎候四望陿中無虜夜引兵至落都召諸校司馬謂曰吾知羌虜不能為兵矣充國常以遠斥侯為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂平先零澤戰凢出軍行師或遇沛澤圮毁之地冝倍道兼行速過不可稽留也若不得已與不能出其地道逺日暮宿師於中必就地形之環龜都中高四下為圓營四面受敵一則防水潦之厄一則備四圍之㓂法曰厯沛圯環龜都堅唐甘露元年突厥阿思徳濕傳反詔吏部尚書右衛大将軍裴行儉為定襄道行軍大總管討之軍次單于界比日將暮已立營塹壕既周行儉吏命徙營高岡吏曰吏士安堵不可擾不聴徙之比暮風雨暴至前設營所水深丈餘衆莫不駭歎因問曰何以知風雨也行儉笑曰自今但依我節制毋問我所由知也爭戰凢與敵戰若有形勢便利之處冝争先據之以戰則勝若敵人先至我不可攻候其有變則擊之乃利法曰争地勿攻三國魏青龍二年蜀将諸葛亮出斜谷並田于蘭坑是時魏将司馬懿屯渭南郭淮䇿亮必争北原塹先擾之議者多不謂然淮曰若亮跨渭原連兵北山隔絶隴道揺蕩民心此非國之利也懿善之淮遂屯北原塹壘未立蜀兵大至淮遂衝擊之後數日亮盛兵西行淮将皆以為欲攻西圍淮獨以亮見形于西欲使衆重應之必攻陽遂耳其夜果攻陽遂有備不敗地戰勝法曰絶山依谷後漢将馬援為隴西太守三降羌與塞外諸種為㓂殺長史援将四千餘人擊之至氐道縣羌在山上援軍據便地奪其水草不與羌遂窮困豪帥數十萬户出塞外諸将萬户人悉降羌不知依山谷之利而取敗焉攻戰凢戰所謂攻者知彼者也知彼有可破之理則出兵以攻之無有不勝法曰可勝者攻也三國魏曹公遣朱光為廬江太守屯唲大開稻田人令間人招誘鄱陽賊帥使作内應吴将吕䝉曰皖田肥美若一収熟彼衆必増如是數嵗難制矣冝早除之乃具陳其状于是孫權親征一朝夜至問諸将計策諸将皆勸作高壘䝉曰治壘必歴月乃成彼城備已脩外救王不可圖也且乗雨水以入若淹苗經曰水必向盡還道艱難蒙竊危之觀此城不甚同以三軍銳氣四面攻之不移時可㧞及水未漲而歸全勝之術也權從之乃薦甘寧為升城都督率軍攻其前䝉以精銳繼之侵晨進攻䝉手執抱鼔士卒皆騰踴自升食時砓之既而張遼至夾石間城已㧞乃退權嘉䝉功即拜廬江太守守戰凢戰所謂守者知己者也知己有未可勝之理則我且固守待敵可勝則出兵攻之無有不勝法曰知不可勝則守漢景帝吴楚七國反以周亞夫為太尉東擊吴楚七國因自請於上曰楚兵剽輊難與争鋒願以梁委之絶其食道乃可制也上許之亞夫至會兵榮陽兵方攻梁梁急請救于亞夫率兵東北走昌邑堅壁而守梁王使使請亞夫夫守便冝不往救梁王上書于景帝帝詔亞夫救梁亞夫不奉詔堅壁不出而使高侯等将輕騎絶吳楚兵後食道吳楚兵乏粮饑欲退數挑戰終不出夜亞夫軍中驚亂自相攻擊至于帳下亞夫堅卧不起頃之自定吴奔壁東南陬亞夫使備西北已而吴兵果奔西北不得入吴楚兵饑乃引兵退亞夫岀精兵追擊大破之吴王濞棄其軍與壮士數千人亡走保于江南丹徒漢兵因乗勝追擊盡虜之降其郡縣亞夫下令曰有得吴王者賞千金月餘越人斬首以告凡相攻守七月而吴楚悉平後漢凉州賊王國圍陳倉左将軍皇甫嵩督前軍董卓救之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留次速救則城全全㓕之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我不勝在彼彼守不足我攻有餘有餘者動于九天之上不足者䧟於九地之下今陳倉雖小城守固備非九地之䧟也王國雖强而攻我之所不救非九天之勢也夫勢非九天之攻者受害䧟非九地之守者不㧞國今已䧟受害之地而陳倉保不㧞之城我可不煩兵動衆而取全勝之功将何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能㧞賊衆疲弊果自觧去敵戰凡與敵戰三軍必要得其地利則可以寡敵衆以弱勝强所謂知敵之可擊知吾卒之可以擊而不知地利之半也此言既知彼又知己但不得地利之助則亦不全勝法曰天時不如地利晉劉裕討南燕暮容超詔拒晉師公孫五樓曰晉師勁果所利在連戰初鋒勇鋭不可擊也冝據大峴使不得入曠日延時沮其銳氣可徐㨂精兵二千騎循山而南絶其粮道别遣段暉率諸州之軍縁山東下腹背擊之此上䇿也各命守宰依險自固較其資儲之外餘悉焚蕩芟除粟苖使敵来無所資堅壁清野以待其釁中䇿也縱賊入峴出城迎戰下䇿也超曰京都冨盛户口衆多非可以一時入手青苗布野非可卒芟芟苖守城以全性命朕所不能據五州之强帯山河之同戰車萬乗鉄馬萬羣縱令過峴至於平地徐以精兵蹂之必成擒也慕容鎮曰若如聖㫖必須平原十里而軍軍壘成用馬為便冝出峴逆戰而不勝猶可退守縱敵入峴自貽窘廹昔成安君不守井陘之險終屈於韓信諸葛瞻不守劎閣之險卒擒于鄧艾臣以為天時不如地利也阻守大峴䇿之上也超又不從為攝莒梁父二戎脩城隍捒士馬蓄鋭以待之其夏晉師已束克超遣其左軍段暉等将步騎五萬進據臨衢俄而晉師渡峴慕容超懼率兵四萬就段暉等於臨衢戰敗超奔廣固數日而㧞燕地悉平山戰凢與敵戰或居山林居平陸須居高阜恃於形勝順於擊刺便於奔衝以戰則勝法曰山上之戰不仰高戰國秦攻韓圍閼與趙王召亷頗而問曰可救否曰道遠路狭難救又召樂乗而問曰可救否乘對如頗言又召趙奢問奢曰道逺險狹譬如两鼠鬬於穴中将勇者勝王乃令奢將救之去趙國都三十里壘不進而令軍士曰有以軍事諫者死奏軍武安有一人諫奢立斬之堅壁二十八日不行復益増壘秦間來入趙奢善食而遣之間以報秦将秦将大喜曰夫去國三十里與軍不行乃増壘非趙地也趙奢既遣秦間乃卷甲而趨之一晝夜至秦聞之悉甲而至軍士許歴諫趙奢納之秦人不意趙師至此其來氣盛將軍必厚集其陣以待之不然必敗奢曰請受教歴曰請受刑奢曰須後令至邯鄲歴復曰先據北山者勝後至者敗奢曰諾即發萬人趨之秦兵後至争山不得上奢縱兵擊之大破秦軍遂解其圍谷戰凢行軍越過山險而陣必依負山谷一則利水草一則附險固以戰則勝先戰凢與戰若敵人初來陣勢未定行列未整先兵以急擊之則勝法曰先人有奪人之心春秋宋襄公及楚人戰於泓宋人既濟司馬子魚曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陣而後擊之宋師敗績國人皆咎公公曰君子不重傷不擒二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼔不成列子魚曰君未知戰勍敵之人隘而不成列天賛我也阻而鼓之不亦可乎猶有懼焉且今勍者皆敵也雖及胡耆穫則取之何有於二毛後戰凢戰若敵人行陣整而且銳未可與戰冝堅壁待之候其陣久氣衰起而擊之無有不勝法曰後於人以待其衰唐武徳中太宗圍王世充於東都竇建徳悉横衆來救太宗守武牢以拒之建徳陣泥水束亘數里諸将皆有懼色太宗将數騎登高以觀之謂諸將曰賊起山東未見大敵今渡險而囂是軍無政令逼城而陣者有輕我之心也我按兵不動彼氣衰陣久卒饑必将自退退而擊之何往不克建徳列自卯至午時卒饑倦皆列坐又争飲水太宗令宇文士及率三百騎經賊陣之西馳而南賊若不動正冝退歸如覺其動冝率東出士及繞過賊衆果動太宗曰可擊矣乃命騎将建旗列陣自武牢循高入南山循谷而東以掩賊背建徳遽率其陣却止東原未及整列太宗輕騎攻之所向披靡程齩金等衆騎纒幡而入直突出賊陣後齊張旗幟表裏俱奮賊衆大責生擒建徳竒戰凢戰所謂竒者攻其無備出其不意也交戰之際驚前掩後衝東擊西使敵莫知所備如此則勝法曰敵虛則我必為竒三國魏景元四年詔諸軍征蜀大将軍司馬文王指授節度使鄧艾與蜀將姜維相綴連雍州刺史諸葛緒邀維令不得歸艾遣天水太守王頎等直攻維營隴西守牽𢎞邀其前金城太守楊欣詣甘松維聞鍾會諸軍已入漢中退橋還頎等躡于强川口大戰維敗走聞雍州已塞道屯頭從孔函谷入北道欲出雍州後諸葛緒聞之却還三十里維入北道三十里聞緒軍却還從橋頭過緒趣截維較一日不及維遂束還守劍閔鍾㑹攻維未能克艾上言今賊摧折宜遂乘之從隂平由邪徑經漢徳陽亭趣涪去劔閣西百里去成都三百里竒兵衝其腹心劔閣之守必還赴涪則㑹方軌而進劍閣之軍不還羽應涪之兵寡矣軍志曰攻其無備出其不意今掩其空盧破之必矣艾自隂平道行無人之地七百餘里鑿山通道造作橋閣山高谷深行甚艱難粮運将匱頻至危殆艾以氊自裹推轉而下将士皆攀木縁崖魚而進先登至江油蜀守将馬邈降蜀衛将軍諸葛瞻自涪還綿竹列陣待艾艾遣唐亭侯忠等出其右司馬師纂出其左忠纂戰不利並退還曰賊未可勝艾怒曰存亡之分在此一舉何不利之有叱忠纂等将斬之忠纂馳還更戰大破斬瞻進軍漢中劉禪遣使請降遂烕蜀宋髙宗建炎四年金人與劉豫合兵分道入侵帝子札命韓世忠飭守備圖進取詞㫖懇切世忠受詔感泣曰主憂如此臣子何以生為遂自鎮江濟師統制解元守高郵候金歩卒親提騎兵駐大儀當敵騎伐木為柵自三歸路會遣良臣使金世忠徹炊㸑紿良臣有詔移屯守江良臣疾馳去世忠度良臣已出境即上馬令軍中曰胝吾鞭所嚮於是引軍次大儀勒五陣設伏二十餘所約聞鼔即起擊良臣至金軍中問王師動息具以所見對鼐爾貝勒聞世忠退喜甚引兵至江口距大儀五里别将托卜嘉擁鐡騎遇五陣東世忠傳小麾鳴鼔伏兵四起旗色與金人旗雜出金亂我軍迭進背嵬軍各持長斧上斫人胷下斫馬足敵被甲䧟泥淖世忠麾勁騎蹂躪人馬俱弊遂擒托卜嘉等二百餘人所遣董􅌈亦擊金人於天長縣之鵶口擒敵將四十餘人解元至高郵敵陳設水軍夾河陣曰合戰十三相拒未决世忠遣成閔将騎士往援復大戰俘沙津及奇沁等世忠復親追至淮金人驚潰相蹈藉溺死甚衆㨗奏羣臣入賀帝曰世忠忠勇朕知其必能成功論者以此舉為中興功第一正戰凢與敵戰若道路不能通糧餉不能進謀計不能誘利害不能惑須用正兵正兵者揀士卒利器械明賞罰信號令且前則勝矣法曰非正兵安能致逺三國蜀諸葛亮将攻魏與羣下謀之亟相司馬魏延曰聞夏侯楙少主之婿也怯而無謀今殷延精兵五十負粮五千且從褒中出循秦嶺而束當子午而北不過十日可到長安楙聞延奄至必棄城逃走長安中惟御史京兆太守耳横門邸閣與散民之穀足周食也比東方相合聚尚二十許日而公從斜谷來亦足以逹如此則一舉而咸陽以西可定矣亮以為此危計不如安從坦道可以西取隴右十全必克而無虞故不用延計亮楊聲由斜谷道取郿使将軍趙雲鄧芝為疑軍據箕谷魏遣曹真督關左諸軍守郿亮身率大軍攻祁山戎陣整齊號令明齋始魏以漢昭烈既死數嵗寂然無聞是以畧無豫備而卒聞亮出朝野恐懼於是天水南安安定皆叛應亮關中響震羣臣未知計所出虛戰凢與敵若我勢虛當偽示以實形使敵莫能測其虛實所在必不敢輕與我戰則我可以全師保軍法曰敵不敢與我戰者乗其所之也三國蜀将諸葛亮在陽平道魏延諸将并兵東下亮惟留萬餘守城魏司馬懿率二十萬拒亮與延軍錯道徑前當亮軍相去六十里候還白亮城中兵少力弱亮亦知懿軍出却恐與已相逼欲赴延軍相去又逺勢不能及将士失色莫知其計亮意氣自若敕軍中皆偃旗卧鼔不得妄出又令大開四門掃地却洒懿嘗謂亮持重而復見以弱勢疑其有伏兵於是率衆北趣山明日食時亮與㕘佐拊手而笑曰司馬必謂吾却将有强伏循山走矣候還白如亮所言懿後知之深以為恨實戰凢與敵戰若敵人勢實我當嚴兵以備之則敵必不輕動法曰實而備之三國蜀先主為漢中王拜關侯為前軍假節鉞屯江陵是嵗侯留兵屯公安南郡以備吴而率兵攻魏将曹仁於樊曹公遣于禁等救仁秋大雨漢水汎濫禁所督七軍皆没禁降侯龎徳被誅梁郏凌渾羣盗咸遥受侯印號為支黨侯威振華夏輕戰凢與敵戰必須詳審量敵而後出兵若不計而進不謀而戰則必為敵所敗法曰勇者必輕合輕合而不知利晉文公與楚戰知楚将子玉剛忿𥚹急文公遂執其使宛春以撓之子玉怒遂乗晉軍楚師大敗重戰凢與敵戰須兼持重見利則動不見利則止慎不可舉也若此則必不䧟於死地法曰不動如山宋岳飛師毎休舍課将士注坡跳濠皆重鎧習之子雲嘗召注坡馬躓怒而殺之卒有取民麻一縷以束芻者立斬以徇卒夜宿民開門願納無敢入者軍號凍死不拆屋餓死不鹵掠卒有疾躬為調藥諸将逺戍遣妻問勞其家死事者哭之而肓其孤或以子娶其女凢有頒犒均給軍吏秋毫不私善以少擊衆欲有所舉盡召諸統制以謀謀定而後戰故勝無敗倅遇敵不動故敵為之語曰撼山易撼岳家軍難害戰凢與敵各守疆界若敵人㓂抄我境以撓邉民可於要害處立伏兵或築陣塞以邀之敵必不敢輕來法曰能使敵人不得至者害之也唐時朔方總管沙吒利忠義為突厥所敗詔張仁愿攝御史大夫代之既至賊已出率兵躡擊夜掩其營破之始朔方軍與突厥以河為界北岸有拂雲祠突厥每犯邉必先謁祠禱祀然後引兵渡河而南時黙啜引兵而去敌地張仁愿請乗虚取漢河南地築三受降城絶虜南㓂路唐休璟以為西漢以來皆北守河今築城虜腹中終為所有仁愿固請中宗許之表留嵗滿以助刀咸陽人二百逃歸仁愿擒之盡斬城下軍中股慄役者盡力六旬而三城就以拂雲為中城南直朔方西城直靈武東城南直榆林三壘相拒各四百餘里其北皆大磧也斥地三百里逺又于牛頭朝那山北置烽堠千百所自是突厥不敢踰山牧馬朔方益無冦嵗省費億計减鎮兵數萬安戰凢敵人逺來氣銳利於速戰我深溝高壘安守勿應以待其敝若彼以事撓我求戰亦不動法曰安則静三國蜀将諸葛亮帥衆十餘萬出斜谷壘於渭水之南魏遣大将司馬懿拒之諸将欲往渭北以待之懿曰百姓積聚皆在渭南此必争之地也遂率軍而濟背水為壘因謂諸将曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上五丈原㑹有長星墜亮之壘懿知其必敗時朝廷以亮率軍逺入利在急戰毎命懿持重以俟其變亮數挑戰懿不出因遺懿巾幗婦人之飾懿終不出懿弟孚書問軍事懿復曰亮志大而不見機多謀少决好兵而無權雖持兵十萬已墮吾晝中破之必矣與之對壘百餘日㑹亮病卒諸将燒營遁走百姓奔告懿出兵追之亮長史楊儀反旗鳴鼔若将向懿者懿以歸師不之迫于是楊儀結陣而去懿經行其營壘觀其遺事獲其圖書粮食輜重懿審其必死曰天下竒才也辛毗以為尚未可知懿曰軍家所重軍書宻計兵馬粮食今皆棄之豈有人損其五臟而可以生乎宜急退之關中多蒺藜懿使軍士三千人著軟材平底木履前後蒺藜著履然後馬俱進追到赤岸乃知亮已死時百姓為之諺曰死諸葛亮走生仲達懿笑曰吾能料生不能料死故也危戰凢與敵戰若䧟在危亡之地當激勵将士决死而戰不可懐生則勝法曰兵士甚䧟則不懼後漢将吳漢討公孫述進入犍為界諸縣皆城守漢攻廣都㧞之遣輕騎繞成都市橋武陽以東諸小城皆降帝戒漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與争鋒若不敢来公須轉營迫之須其力疲乃可擊也漢不聴乗利遂自将步騎二萬餘人進逼成都去城十餘里阻江北為營作浮梁使別将劉尚将十萬餘人屯于江南相去二十餘里帝大驚責漢曰比敕公千條萬端何意臨事悖亂既輕敵深入又輿尚别營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即破矣幸無他者急率兵還廣都詔書未到述果追其将謝豐袁吉将兵十萬餘出攻漢使别将萬餘人刼劉尚令不得相救漢與大戰一日兵敗走入壁豐圍之漢召諸将厲之曰吾與諸将踰越險阻轉戰千里所在斬獲遂深入敵地今至其城下而與尚二處受圍勢既不接其禍難量欲潜師就尚于江南禦之若能同心恊力人自為戰大功可立如其不然敗必無疑成敗之機在此一舉諸将皆曰諾于是饗士秣馬閉營三日不出乃多立幡旗使烟火不絶夜衘枚引兵與尚合軍豐等不覺明日乃兵拒水北自将兵攻江南漢悉兵迎戰自旦至晡遂大勝之斬謝豐袁吉于是率兵還廣都留劉尚拒述具以状聞而深自譴先責帝曰還廣都甚得其冝述必不敢畧尚而撃公若攻尚公從廣都五十里悉步騎赴之適當值其危困破之必矣于是漢與述戰於廣都成都之間八戰八克遂軍於郭中述自将數萬人出城大戰漢使䕶軍高午唐邯将銳卒數萬擊之述兵敗走高午奔陣刺述殺之成都降斬述首傳送洛陽死戰凢敵人强盛吾士卒疑惑未肯用命須置之死地告令三軍示不獲已殺牛燔車以享戰士燒棄粮食填夷井竈焚舟破釜絶去其生慮則必勝法曰必死則生秦将章邯已破楚将項梁軍以為楚地兵不足憂乃渡河擊趙大破之當此時趙歇為王陳餘為将張耳為相兵敗皆走入鉅鹿城章邯令王離渉間圍鉅鹿章邯軍其南築甬道而輸之粟楚懐王以宋義為上将項羽為次将范増為末将救趙諸别将皆屬焉宋義行至安陽留四十餘日不進遣其子宋襄相齊自送之無鹽飲酒高會項羽曰今國新破王坐不安席掃境内而屬將軍國家安危在此一舉今不恤士卒而徇其私非社稷之臣項羽晨朝宋義即其帳中斬之下令軍中曰宋義與齊謀反楚王隂令羽誅之是時諸将皆慴服莫敢支吾皆曰首立楚者将軍家也今将軍誅叛亂即共立羽為假上将軍使人追宋義子襄及之齊殺之且使報命于楚懐王因命項羽為上将軍當陽君蒲将軍皆屬焉項羽已殺宋義威震楚國名聞諸侯乃遣當陽君蒲将軍率二萬衆渡河救鉅鹿戰少利陳餘復請兵項羽乃悉兵渡河沉舟破釜甑燒廬舍持三日粮以示士卒必死無還心即國王離與秦軍遇九戰絶其甬道大破之殺蘓角虜王離當是時楚兵及諸侯軍救鉅鹿者十餘壁一當莫敢縱兵楚擊秦軍諸将皆從壁上觀楚戰士無不十楚兵呼聲動天地諸侯人人惴恐於是大破秦軍漢將韓信張耳以兵數萬欲東下井陘擊趙趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車説成安君深溝高壘勿與戰願假竒兵二萬從間道絶其輜重成安君不聽信使人間視知其不用乃引兵遂下未至井陘口三十里止舍夜半傳發選輕騎二千人人持一赤幟從間道草山而望趙軍戒曰趙見我走必空壁逐我若疾入㧞趙幟立漢幟令其禆将傳餐曰今日破趙會食諸将皆莫信詳曰諾信會軍吏曰趙已先據便地為壁且彼未見大将旗鼓未肯擊前行恐吾至險阻而還乃使萬人先行出背水陣趙兵望見大笑平旦信建大将旗鼓鼔行出井陘口趙開壁擊之大戰良久于是信耳棄旗鼓走水上軍復疾戰趙空壁争漢旗鼔逐信耳信耳已入水上軍軍皆殊死戰不可敗信所出竒兵三千騎者候趙空壁逐利即馳入壁皆㧞趙旗幟二千趙軍已不能得信耳等欲還壁壁皆漢赤幟大驚以為漢皆已得趙王将矣遂亂遁去趙将雖斬之弗能禁于是漢兵夹擊破虜趙軍斬成安君泜水上擒趙王歇信乃令軍毋殺廣武君有生得之者購千金頃之有縛而至戲下者信解其縳東鄉坐西鄉對師事乏諸校効首虜休畢賀因問信曰兵法右背山陵前左水澤今者將軍令臣等反背水陣曰破趙會食臣等不服然竟以勝此何術也信曰信非得素拊循士大夫此所謂驅市人而戰之其勢非置之死地人人自為戰今予之生地皆走寧得而用之乎諸將皆服曰非所及也生戰凡與敵戰若地利已得士卒己陣法令己行竒兵已設要當割棄性命而戰則勝若為将臨陣畏怯欲要生必反所為殺法曰幸生則死春秋時楚子伐鄭晉師救之與戰於敖鄗之間晉中軍趙嬰齊使其徒先具舟於河欲敗而先濟故将士懈心生而卒不可勝饑戰凢興兵征討深入敵地芻糧之闕必湏分兵抄掠據其倉廪奪其蓄積以繼軍餉則勝法曰因糧於敵故軍食可足也北史後周将賀若敦率兵渡江取湘州陳将侯瑱禦之秋水汎濫江路遂斷粮援既絶人懷危懼敦于是分兵抄掠以充資費恐瑱等知其粮少乃于營内多聚土覆之以米召側近村人佯有訪問随即遣之瑱等聞之以粮為實敦又増脩營壘造廬舍示之以持久湘羅之間遂廢農業瑱等無如之何初土人船載米粟及籠雞鴨以餉瑱餉軍敦患之乃偽為土人船伏兵于中瑱軍望見謂船至逆水争取敦甲士遂擒之又敦軍數有叛者乗馬投瑱瑱輙納之敦乃取一馬率以趣船令船中人以鞭鞭之如是者舟馬畏船不敢上後伏兵於江岸使人乗前馬詐投瑱營瑱即遣兵迎接争來牽馬既畏船不上伏兵盡發殺之後實有饋餉及亡奔瑱者猶恐敦設詐兵不敢受相持嵗餘瑱不能制飽戰凢敵人逺來糧食不繼敵饑我飽可堅壁不戰持久以敝之絶其糧道彼退走宻遣騎兵邀其歸路縱兵追擊破之必矣法曰以飽待饑唐武徳初劉武周據太原使其将宋金剛屯於河東太宗往征之謂諸將曰金剛懸軍深入精兵猛將皆在於是武用自據太原專寄金剛以為捍蔽金剛雖衆内實空虛擄掠為資意在速戰我閉營待其饑未冝速戰於是遣劉宏基等絶其糧道其衆遂援金剛乃遁營戰凢與敵戰若便利之地敵先結陣而據之我後去趨戰則我勞而為敵所勝法曰後處戰地而趨利者勞晉司空劉琨遣将軍姬澹率兵十餘萬討石勒勒将拒之或諌曰澹馬精盛其鋒不可當且深溝高壘以挫其鋭攻守異勢必𫉬萬全勒曰澹軍逺來體疲力竭犬馬烏合號令不齊一戰可擒也何强之有援又垂至胡可捨去大軍不冝易逺且都督令三軍後出者斬設疑兵於山上分為二伏勒率兵與澹戰偽収衆而北澹麾兵追之伏發夾擊澹大敗而退佚戰凢與敵戰不可恃已勝而放佚當益加嚴勵以待敵佚而猶勞法曰有備無患梁司州刺史柳仲禮留長史司岫守安陸曰率步騎一萬㓂襄陽西魏将楊忠率衆南伐攻梁隋州克之進圍安陸仲禮聞隋郡䧟恐安陸不守遂歸赴援諸将恐仲禮至則安陸難下請急攻之忠曰攻守勢殊未可卒㧞若引日勞師表裏受敵非計也南人多習水軍不閑野戰仲禮囘師已在近路今我出其不意以竒兵襲之彼息我奮一舉必尅則安陸不攻自㧞諸城可傳檄而定也于是選精騎二千銜枚夜進遇仲禮於濚忠親自䧟陣悉得仲禮之衆安陸及竟陵郡如忠所䇿勝戰凢與敵戰若我勝彼負不可驕怠當日夜嚴備以待之敵人雖來有備無害法曰既勝若否秦二世時項梁使沛公項羽别攻城陽屠之西破秦軍濮陽東春收兵入濮陽沛公與項羽攻定陶因西畧地至雍丘大破秦軍斬李由還攻外黄項梁益輕秦有驕色宋義進諫于梁曰戰勝而将驕卒惰者敗今兵少隋矣秦兵日益臣為君畏之梁不聴而使宋義於齊道遇齊使者髙陵君顯曰公將見武信君乎曰然義曰武信君必敗公徐行免死疾行則及禍秦果悉兵益章邯擊楚軍大敗之項梁死敗戰凢與敵戰若彼勝我負未可畏怯須思害中之利當整利器械激揚士氣候彼怠懈而擊之則勝法曰因害而奮可解也晉末河間王顒在闕中遣張方討長沙王方率衆自函谷入屯河南恵帝遣左将軍皇甫商拒之方潜軍破商遂入洛陽商奉帝討方于城四方軍望見乗輿于是少却方止之不可得衆遂大敗殺傷滿衢巷方退壁于三十里人皆挫衂無復固志多勸降方曰兵之利鈍是常事貴因敗以為成耳我更前作壘出其不意此用兵之竒也乃夜潜進逼洛陽城七里商既新㨗不以為意忽聞方壘成乃出戰遂大敗而還進戰凢與敵若審知敵人有可勝之理則冝速進兵以擣之無有不勝法曰見可則進唐李靖為定襄道行軍總管擊破突厥頡利可汗使保鉄山遣使入朝謝罪請舉國歸附以請往迎之頡利雖外請朝謁而内懐遲疑靖揣知其意時詔遣鴻臚御唐儉等慰諭之靖謂副将軍張公謹曰詔使到彼虜必自安若萬騎賫三日糧自白道襲之必得所欲公謹曰上已與約降行人在彼奈何靖曰機不可失韓信所以破齊也如唐儉軰何足惜哉督兵疾進行至隂山遇其白候千餘皆俘以随軍頡利見使者大恱不虞官兵靖前鋒乗霧而行去其牙帳七里虜始覺列兵未及陣靖率兵擊之斬首萬餘級俘男女十餘萬擒其子蠱羅施殺義成公主頡利亡去乃為大通道行軍總管張寶相擒以獻于是斥地自隂山北至大漠矣退戰凢與敵戰若敵衆我寡地形不利力不可争當急退避之可以全軍法曰知難而退三國魏将曹真伐蜀司馬懿同行出駱谷次興元蜀将王琳乗夜襲擊懿令堅卧不動琳退懿謂諸将曰費禕據險守拒進不獲戰攻之不可宜急旋軍以為後圖琳等果馳兵趣三嶺争險真等潜師越險行得退挑戰凢與敵戰營壘相逺勢力相均可輕騎挑攻之伏軍以待之其軍可破若敵用此謀我不可以全氣擊之法曰逺而挑戰欲人之進也十六國姚襄據黄洛苻生遣将黄眉鄧羌等率歩騎討襄襄深溝高壘守不肯戰鄧羌曰襄性剛愎易以撓動若長驅一行直􅐦其壘襄必奮而出戰可一戰而擒也黄眉從之遣羌步騎三千軍於壘門襄怒盡鋭出戰羌偽不勝率騎而退進之於三原羌回拒襄而黄眉至大戰斬之俘其衆宋建炎十年劉錡充東京副留守節制諸軍所部八字軍纔三萬七千人将發益殿司三千人皆携其孥将駐于汴家留順昌錡自臨安泝江絶淮凢二千二百里至渦口方食暴風吹㧞坐旗錡曰此兵兆也主暴兵即下令兼程而進未至順昌三百里金人果敗盟來侵錡與将佐舎舟陸行先趨城中庚寅謀報金人入東京知府事陳規見錡獻計錡曰城中有粮則能與君共守規曰有米數萬斛錡曰可矣時所部選鋒遊奕两軍及老稚輜重相去尚逺遣騎趣之四鼔乃至及旦得報金騎已入陣錡與規議歛兵入城為守禦計人心乃安召諸将計事惟部将許清議與錡合錡大喜鑿舟沉之示無去意時守備一無可恃撤民門扉周匝蔽城凢六日粗畢而游騎已渉潁河至城下壬寅金人圍順昌錡豫於城下設伏擒千户阿哈等二人詰之曰韓将軍營白沙渦距城三十里錡夜遣千餘人擊之連戰殺獲頗衆既而三路都統葛王褒以兵三萬與龍虎大王合兵薄城錡令開諸門金人疑不敢近時順昌已圍四日金兵益盛乃移砦于東村距二十里錡遣驍将閻充募将士五百人夜研其營是夕天欲雨電光四起見披甲者輙殱之金兵退十五里錡復募百人以往或請銜枚錡笑曰無以枚也令折竹為嘂如市兒以為戲者人持一以為號直犯金營電所燭則皆奮擊電止則匿不動敵衆大亂百人者聞吹聲即聚金人益不能測終夜自戰積屍盈野退軍老婆灣烏珠在汴聞之即索靴上馬不十七日至順昌責諸将䘮師皆曰南朝用兵非昔之比元帥臨城自見錡遣耿訓以書約戰獻浮橋五所錡遣人毒水上流時天大暑敵逺來疲敝錡士氣閒暇敵戰晝夜不解甲錡軍皆翻休更食養馬垣下敵人馬饑渇食水草者輒病往往困乏方暑氣清凉錡按甲不動逮未申時敵力疲氣索忽遣數百人出西門挑戰俄以數千人出南門戒令勿喊但以銳斧犯之統制官趙蹲韓直身中數矢不肯已士殊死鬬入其陣刀斧亂下敵大敗是夕大雨平地水深尺餘乙夘烏珠㧞營北去平日恃拐子馬以為强亦十損七八金人震恐䘮魄致戰凢致敵來戰則彼勢常虛不能赴戰則我勢常實多方以致敵人之來我據便地而待之無有不勝法曰致人而不致於人後漢建武四年光武詔耿弇悉收集降附結部曲置将吏弇率騎都尉劉歆㤗山太守陳俊将兵而東張步聞之使其将費邑軍歴下又令兵屯祝阿别于泰山鍾城列營數十以待之弇渡河先擊祝阿㧞之故開營一壁角令其衆得奔歸鍾城人聞祝阿已潰大恐遂空亡費邑分兵遣其弟費敢守巨里弇進先脅巨里嚴令軍中趣修攻具後三日悉力攻巨里城隂緩生口亡歸以弇期告邑邑至日果自将精兵來救弇謂諸將曰吾所以脩攻具者欲誘致之耳野兵不撃何以城為即分兵守巨里自率精銳上岡坂乗高合戰大破之斬邑既而取首級以示巨里城中懼費敢亡歸張步弇悉收其積聚縱兵攻諸未下者平四十餘營遂定濟南逺戰凢與敵阻水相拒我欲逺渡可多設舟楫示之若近濟則敵必并衆應之我出其空虛以濟如無舟楫可用竹木蒲葦甖瓶瓮囊槍杆之屬綴為排筏皆可濟渡法曰逺而示之近漢初魏王豹初降漢復以親疾請歸至國即絶其河關反與楚約和漢王遣酈生往說豹不聽漢以韓信為左丞相擊豹盛兵蒲坂塞臨晉信乃益為疑兵陳船欲渡臨晉而引兵從夏陽以水甖渡軍襲安邑魏王豹驚率兵迎戰信遂虜豹定魏近戰凢與敵夾水為陣我欲攻近示之以逺須多設疑兵上下逺渡敵必分兵來應我可以潜師近襲之其軍可破法曰近而示之以逺春秋越人伐吴吳人御之笠澤夾水而陣越人為左右陣夜譟鼔而進吴分兵應之吳軍大敗遂至㓕亡水戰凢與敵戰或岸邉為陣或水泊舟皆謂之水戰若近水為戰須去水稍逺一則誘敵使渡一則示敵無疑我欲必戰勿近水迎敵恐其不得渡我欲不戰則拒水阻之使敵不得濟若敵率兵渡水來戰可於水邉伺其半濟而擊之則利法曰涉水半渡可擊漢酈生說齊下之齊王日與生縱酒為樂而罷守備蒯通說信遂渡河襲齊齊王以酈生為賣已烹之而走高宻請救於楚楚遣龍且将兵救齊或曰漢兵逺來其鋒難當楚自居其地兵易敗散不如深壁令齊王使其信臣招其城城聞王在楚來救必反漢漢兵客居其勢無所食可不戰而擒也龍且曰吾知韓信易與耳今君命救齊不戰而降之有何功若戰而勝齊可平也遂進兵與漢兵夾濰水而陣信夜使人壅水上流引軍半渡佯不勝還走龍且喜曰吾故知信怯遂追之因擊殺且水東軍散走遂平齊宋高宗時以隋郢唐鄧信陽並為襄陽府路𨽻岳飛命飛招捕楊么飛所部皆西北人不習水戰飛曰兵何常顧用之何如耳先遣使誠心善遇其将黄佐遂降飛表授左武義大夫單騎按其部撫佐背曰子知順逆者果能立功封侯豈不滎哉吾欲復遣子至湖中視其可乗者擒之可勸者招之如何佐感泣誓以死報會召張浚還防秋飛䄂小圖示浚浚欲待來年議之飛曰已有定畫都督能留八日可殷賊浚曰何言之易飛曰王四廂以王師攻水冦則難飛以水冦攻水冦則易以短攻所長則難若因将用敵以奪其手足之助離其腹心之託使之孤立而後以王師乗之八日之内當俘諸賊浚許之飛遂如鼎州黄佐招楊欽來降飛喜曰楊欽驍勇來降賊腹心潰矣表授武義大夫禮遇甚厚乃復遣歸湖中两日欽說余端劉詵等降飛詭罵曰賊不盡降何來也杖之復令入湖是夜掩賊營降其衆數萬么固不服方浮舟湖中以輸激水其行如飛旁置撞竿官舟迎之輙碎飛伐君山木為巨筏塞諸港汊又以腐木亂革浮上流而下擇水淺處遣善罵者挑之且行且罵賊怒來追則草木壅積舟輪碍不得行飛亟遣兵擊之賊奔港中為筏所拒官軍乗筏張牛革以蔽矢石舉巨木撞其舟盡壊么投水牛臯擒斬之飛入賊壘餘酋驚曰何神也俱降飛親行諸砦撫循之縱老弱歸田籍少壮為軍果八日而賊平浚歎曰岳侯神算也初賊恃其險曰欲犯我者除是飛來至是人以其言為䜟獲賊舟千餘鄂渚水軍為沿江諸軍之冠火戰凢戰若敵人居近草莽營舍茅竹積芻聚糧天時燥旱因風縱火以焚之選精兵以擊之其軍可破法曰行火必有因漢将李陵征匃奴戰敗班師為單于所逐及于大澤匈奴于上風縱火陵亦先放火燒㫁葭葦用絶火勢後漢末漢將皇甫嵩討黄巾賊因朱雋與賊波才戰賊遂圍嵩於長社賊依革結營㑹大風嵩出軍士東苣乘城使銳卒問出營外縱火大呼城上舉燎應之嵩鼓而奔其陣賊驚亂犇走㑹曹操將兵適至合戰大敗之斬數萬後漢末劉表死曹操克荆州得劉琮水軍㳂流東下吴主孫權遣周瑜領兵逆曹操遇於赤壁初一交戰曹軍敗退别兵次江北瑜等在南岸瑜部帥黄葢曰今冦衆我寡難與持久然觀曹軍方連船艦首尾相接可燒而走也乃取䝉衝數千艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公欺以欲降又先備走舸各係大船之後因引次俱前曹公軍吏士皆延頸遥觀指言盖降葢諸船同時發火時風盛猛悉燒岸營落頃之烟熖漲天人馬燒溺死者甚衆軍遂敗北緩戰凢攻城之法最為下䇿不得已而為之所謂三月脩器械三月成距堙者六月也謂戒為已也忿躁不待攻具而令士卒蟻附恐傷人之多故也若彼城高池深多人而少糧外無救援可覊縻取之則利法曰其徐如林十六國前燕将慕容恪擊段龕於廣固圍之諸将請恪急攻恪曰有冝緩者若彼我勢均外有强援恐有腹背之患則攻之不得不速若我强彼弱外無救援當覊縻守之以待其敝兵法十圍五攻正謂此也龕等尚衆未有離心今凴阻堅城士不戮力盡銳攻之數旬可㧞然殺吾士卒必多矣要在取耳乃為堅壘以守之終克廣固速戰凢攻城圍邑若敵糧多人少外有救援可以速攻則勝法曰兵貴神速三國蜀将孟達降魏遂領新城太守未幾復連吳附蜀以叛魏司馬懿潜軍進討諸将言逹與蜀交結冝觀望而後可懿曰達無信義此其相疑之時當及其未定促而决之乃倍道兼行至新城下吳蜀各遣将救逹懿乃分兵拒之初達與諸葛亮書曰宛去洛陽八百里去吳一百二十里間吾舉事表上天子比相反在一月間也則吾城已固諸将足辦吾所在深險司馬公必不自来諸将来吾無患矣及兵到達又告亮曰吾舉事八日而兵至城下何其神速也上庸城三靣阻水達於外為木柵以自固懿渡水破其柵直造城下申儀等斬逹首開門以降陳将吳明徹進逼夀陽北齊将王琳拒守又遣大将皮景和率兵數十萬來援去夀陽三十里頓軍不進諸将咸曰堅城未拔大援在近不審明公計将安出明徹曰兵貴神速而彼營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄疾攻一鼓而克夀陽整戰凢與敵戰若敵人行陣整齊士卒安静未可輕戰伺其變動撃之則利法曰無邀正正之旗三國魏司馬懿征公孫淵懿泛舟潜濟遼水作圍棄城而向襄平諸将曰不攻城而作圍非所以示衆懿曰賊堅營高壘欲以老吾軍也攻之正堕其計賊大衆在此其巢穴虚矣我直襄平必人懷内懼懼而求戰破之必矣遂整陣而過賊見兵出其後果邀之乃縱兵逆擊大破之亂戰凢與敵戰若敵人行陣不整士卒諠譁冝急出兵以撃之則勝法曰亂而取之春秋時齊師次於郎魯侯禦之公子偃曰宋師不整可敗也宋敗齊必還請撃之公弗許自雩門竊出囊臯比先犯之從之大敗宋師于乗丘齊師乃還分戰凢與敵戰若我衆敵寡當擇平易寛廣之地以勝之若五倍於敵則三術為正三術為竒三倍於敵三術為正一術為竒所謂一以當其前一以攻其後法曰分不分為縻軍梁将陳覇先王僧辨討侯景於張公洲高旗巨艦截江蔽空乗潮順流景登石頭望之不恱曰彼軍士有如是之氣不可易也帥鐵騎萬人鳴鼔而前覇先謂僧辨曰善用兵者如常山之蛇首尾相應賊今送死欲為一戰我衆彼寡宜分其勢僧辨從之以勁弩當其前輕鋭䟿其後大陣衝其中景遂大潰棄城而走合戰凢兵散則勢弱聚則勢强兵家之常情也若我分兵屯數處敵若以衆攻我當聚以撃之法曰聚不聚為孤旅漢五年十月漢王追項羽至陽夏南止軍與齊王信魏相國越期會撃楚至固陵不會楚撃漢軍大破之漢王復入壁深塹而守謂張良曰諸侯不從奈何對曰楚兵且破未有分地其不至固冝君王能共天下可立致也齊王信之立非君王意信亦不自堅彭越本定梁地始君王以魏豹故拜越為相國今豹死越亦望王而君王不早定今能取睢陽以北至穀城皆以王彭越自陳以東傅海與齊王信信家在楚其意欲復得故邑能出捐此地以許两人使各自為戰則楚易敗也於是漢王發使使韓信彭越至皆引兵來十一月劉賈入楚地圍夀春亦遣人誘楚大司馬周殷叛楚以舒屠六舉九江兵迎黥布並行屠城父隨劉賈皆會十二月圍羽垓下羽夜聞四面皆楚歌知盡得楚地羽以數百騎走是以兵大敗自刎楚地悉定晋武帝欲㓕吳羊祜疏請合梁益荆楚徐楊青兖巴蜀之兵以臨之以一隅之吳當天下之衆其勢危形散帝納之竟以此平吳怒戰凢與敵戰須激勵士卒使忿怒而後戰法曰殺敵者怒也漢光武詔將軍王霸馬武討周建於垂惠蘇茂將兵四千餘救建遣精騎遮擊武軍糧馬武救之建於城中出兵夹擊武武恃霸援戰不甚力為茂建所敗過霸營大呼求救霸曰賊兵勢盛出必两敗努力而已乃閉營堅守將吏皆争之覇曰茂兵精銳其衆又多吾吏士心恐而與吾相持兩軍不一敗道也今閉營堅守勢不相援彼必乗輕進武知無救則其戰當自力如此茂衆疲勞吾乗其弊乃可克也茂建果悉兵出攻武合戰良久霸軍中壮士一千人㫁髪請戰覇乃開營後大出精騎襲其背茂建前後受敵遂大敗之氣戰凢將之所以戰者兵也兵之所以戰者氣也氣之所以盛者鼔也能作士卒之氣則不可大頻大頻則氣易衰不可大逺大逺則力易竭須度敵人之至六七十步之内乃可以鼓令士卒進戰彼衰我勝敗之必矣法曰氣實則鬬氣奪則走春秋齊師伐魯荘公将戰曹劌請從公與之同乗戰于長勺公将鼔之劌曰未可三鼔齊師敗績公問其故劌對曰夫戰勇氣也一鼔作氣冄而衰三而竭彼竭我盈是以敗之逐戰凢追奔逐北須審真偽若旗齊鼔應號令如一紛紛紜紜雖退走非敗也必有竒也當須應之若旗參差而不齊鼓大小而不應號令諠囂而不一此真敗却也可以逐法曰凢從勿怠敵人或止於路則慮之唐太宗征薛仁杲其将宗羅㬋拒之大破於淺水原太宗帥騎追之直取折墌圍之仁杲将多臨陣來降復還太宗縱令不追須史各乗馬至太宗具知仁杲虛實乃進兵合圍使辯士喻以禍福仁杲遂降諸将皆賀因問曰大王破敵乃捨步兵又無攻具徑薄城下咸疑不克而卒下何也太宗曰此礶道也且羅㬋所将隴外人吾雖破之然斬獲不多若縱之則皆入城仁杲收而撫之未易充也迫之則兵散隴外折墌自虚仁杲破膽不暇為謀所以懼而降也歸戰凢與敵相攻若敵無故退歸必須審察果力疲糧竭可選輕銳躡之若是歸師則不可遏也法曰歸師勿遏漢獻帝建安三年曹操圍張繡于穰劉表遣兵救之繡屯安衆守險以絶軍後操軍不得進前後受敵夜乃鑿險偽遁伏兵以待繡悉兵來追操縱竒兵夾攻大敗之謂荀彧曰虜遏吾歸師而與吾死地吾是以勝不戰凢戰若敵衆我寡敵强我弱兵勢不利彼或遠來糧餉不絶皆不可與戰冝堅壁持久以敝之則敵可破法曰不戰在我唐武徳中太宗帥兵渡河東討劉武周江夏王李道宗時年十七從軍與太宗登玉壁城觀賊陣顧謂道宗曰賊恃其衆來邀我戰汝謂如何對曰羣賊鋒不可當易以計屈難以力争今深溝高壘以挫其鋒烏合之徒莫能持久粮運将竭必當離散可不戰而擒也太宗曰汝見識與我合後果食盡夜遁追入介州一戰敗之必戰凢興師深入敵境若彼堅壁不與我戰欲老我師當攻其主君擣其巢穴截其歸路斷其糧草彼必不得已而須戰我以銳卒撃之可敗法曰我欲戰敵雖深溝高壘不得不與我戰者攻其所必救也魏明帝召司馬懿于長安使将兵往遼東討公孫淵帝曰四千里征伐雖云用騎亦當任力不當計後費也度淵以何計得策懿曰棄城預走上計也拒大軍其次也坐守襄平此乃成擒耳曰三者何出懿曰惟明君能度彼我預有所棄此非淵所及也曰往還幾日對曰往百日還百日攻百日以六十日為休息一年足矣遂進兵淵遣将率步騎數萬屯遼圍塹二十餘里諸将欲擊之懿曰此欲以老吾兵攻之正墮其計此王邑所以敗績昆陽也彼大衆在此巢穴空虛直抵襄平出其不意破之必矣乃多張旗職欲出其南賊盡鋭趨之懿潛濟已出其地乃棄賊直趨襄平賊将戰敗懿圍襄平諸将請攻之懿不聽陳珪曰昔攻上庸旬日之半破堅城斬孟逹今日逺來而更安緩愚竊惑之懿曰逹衆少而粟支一年淵軍四倍于逹而粮不淹月以一月較一年安事速為以四撃一正今失半而克猶當為之是以不計死傷而計粮也况賊衆我寡賊饑我飽而兩乃爾攻具不設促之何為自發京師不憂賊攻但憂賊走今賊粮垂盡而圍落未合掠其牛馬抄其樵采此故驅之走也夫兵者詭道善因事變賊恃其衆故雖饑用不肯束手當示無能以安之若求小利而驚之非計也既而雨霽造攻具攻之矢石如雨粮盡窘急人相食乃使其将王建栁請解圍當君臣面縛懿皆斬之淵突圍而走懿復追及泜水上殺之遼地悉平隋王世充與李宻相持於東都充夜渡陣於洛水之北其時宻亦渡洛水陣兵與充相對東接月城南至石窟宻兵多馬騎長槍宜寛平放縱充兵多戈矛矟䂎冝險狭然南逼洛水北限大山地形褊促騎不成列充縱歩兵撃之宻軍失利宻與數子登船南濟自餘兵馬皆東走月城充乗勝長驅直至月城下宻既渡南岸即乗馬西上直向充本營左右麾旌相繼而至充營内見宻兵來逼即連舉六烽充乃舍月城之圍收兵西退自洛北逹于黒石中間四十餘里奔北顛沛大䘮師走宻此行東北之圍不救而自解西南之冦不戰而成功充伏其權竒不復輕出避戰凢戰若敵强我弱初來氣銳且當避之伺其疲敝而撃之則勝法曰避其銳氣撃其惰歸漢靈帝中平年凉州賊王國圍陳倉以皇甫嵩討之董卓請速進嵩曰百戰百勝不如不戰而屈之是以善用兵者先為不可勝以待敵之可勝陳倉雖小城固備未易拔王國雖强攻陳倉不下其衆必疲疲而撃之全勝之道也國攻之終不㧞其衆疲敝解去嵩進兵追擊之卓曰窮寇勿追歸師勿遏嵩曰不然乃獨追撃破之卓有慙色唐上元元年加李光弼太尉進圍懐州史思明來救光弼再逐北思明陳兵清河聲言渡河絶餉路光弼壁野水渡既夕還軍留牙将崔希顥守曰賊将高暉李日月萬人敵也賊必使刼我汝留此賊至勿與戰若降與偕來左右竊怪語無倫是日思明果召日月曰光弼野次爾以鉄騎五百夜取之不然無歸日月至壘使人問曰太尉在乎曰去矣兵幾何曰千人将為誰曰崔希顥日月謂其伴曰我受命云何今顧獲希顥歸不免死遂請降希顥與俱至光弼厚待之降表授特進兼右金吾大将軍高暉聞亦降或問公二将何易也光弼曰思明再敗恨不得野戰聞我野次彼固易之命将來襲必許以死希顥無名不足以為功日月懼死不降何待高暉材出日月之右降者見遇貳者得不思奮乎諸軍决丹水灌懷州李光弼令廷玉由地道入得其軍號登陴大呼王師乗城擒太清楊希仲送之京師獻大廟圍戰凢圍戰之道圍其四靣須開一角以示生路使戰不堅則城可㧞軍可破法曰圍師必缺漢末曹操圍壺關攻之不㧞操曰城㧞皆坑之連日不下曹仁言於曹操曰圍師必示活門所以開其生路也今公告之必坑使人人自為守且城固而粮多攻之則士卒傷守之則延日久今頓兵堅城下攻必死之虜非良計也操從仁言乃㧞其城聲戰凢戰所謂聲者張虚聲也聲東而撃西聲彼而撃此使敵人不知其所備則我所攻者乃敵人所不守也法曰善攻者敵不知其所守後漢建武五年耿弇與張步相拒使其弟監将精兵二萬守西安諸郡太守合萬餘人守臨淄相去四十里弇進兵書中居二城之間弇視西安城小而堅且藍兵又精臨淄雖大而易攻乃與諸将㑹俟五日攻西安藍聞之日夜為備至期弇敕諸将夜半蓐食會明至臨淄䕶軍荀梁等争之以為冝速攻西安弇曰西安聞吾欲攻之日夜備守臨淄出其不意至必驚擾攻之則一日可㧞㧞臨淄則西安孤張藍與歩隔絶必復亡去所謂撃一而得二者也若攻西安卒不下頓兵堅城必多日縱能㧞之藍率兵奔還臨淄併兵合勢觀人虚實吾深入敵地後無所輸句月之間不戰而困諸君之言未見其冝遂攻臨淄半日㧞之入據其城張藍聞之果将兵亡去和戰凢與敵戰必先遣使約和敵許諾言語不一因其懈怠選銳卒撃之其軍可敗法曰無約而請和者謀也秦末天下兵起沛公西入武關欲以二萬兵擊嶢關張良曰秦兵尚强未可輕敵臣聞其将多屠賈子易以利動願且堅壁使人約和且日張旗幟為疑兵而使酈生陸賈㗖以利秦将多欲連和說沛公曰此特其将欲叛恐士卒不從不如因其懈怠撃之沛公乃引兵擊秦軍大破之受戰凢戰若敵衆我寡暴來圍我須詳察衆寡虛實之形不可輕易遁去恐為尾撃當圓陣外向受敵之圍雖有缺虛我自塞之以堅士卒心四靣奮撃必獲其利法曰敵若衆則利衆而受敵北史魏高歡建議信都将討尒朱兆等孝武帝永熈元年春㧞鄴尒朱兆自長安兆自晉陽度律自洛陽仲逺自東郡同會于鄴衆二十萬夾洹水而軍歡出頓紫陌馬不滿三千步不滿三萬乃于韓陵為員陣連牛驢以塞歸路将士皆謂必死選精銳步騎從中出四靣擊之大破兆等降戰凢戰若敵人來降必要察其真偽逺明斥堠日夜設備不可怠忽嚴令偏禆整兵以待之則勝不然必敗法曰受降如受敵曹操討張繡于宛降之既而懐恨復叛襲擊曹軍殺曹操長史及子昂操中流矢師還舞隂繡将騎來操擊破之繡奔穰與劉表合操謂将佐曰吾强繡弱失在不便取質以至於此諸卿觀之自今以後不復敗矣天戰凢欲興師動衆伐罪弔民必在天時非孤虚向背也乃若君暗政亂兵驕民困放逐賢人誅殺無辜旱蝗敵國有此舉兵攻之無有不勝法曰順天時而制征討東齊後主緯隆化元年擢用邪佞陸令萱和士開高阿那肱穆提婆韓長鸞等宰制天下陳徳言鄧長顒何洪玠㕘預機權各領親黨陞擢非次法官由財進獄以賂成亂政宫人使旱蝗水潦冦盗並起又猜嫌諸王皆無罪而受誅丞相斛律光及弟荆山䝉並無罪受誅漸見土崩之勢周武帝乗亂一舉而㓕之人戰凢戰所謂占天事推人事而破妖祥也行軍之際或梟集牙旗或杯酒變血或麾竿毁折惟主将決之若以順討逆以直伐曲以賢撃愚皆無疑也法曰禁邪去疑至死無所之唐武徳六年輔公祏反詔趙郡王李孝恭等討之将發與将士宴集命取水水變為血在坐皆失色孝恭自若曰無疑此乃公祏授首之徴也飲而盡之衆心為安先是賊将拒險邀戰孝恭不出以竒兵絶其粮道賊饑夜薄孝恭堅卧不動日以羸兵扣賊營挑戰選精騎陣以待羸兵却賊追北而囂遇祖尚薄戰遂敗趙郡王乗勝破其别陣公祏窮走追騎生擒之難戰凢為将之道要在甘苦共衆如遇危險之地不可捨衆而自全不可臨難而茍免䕶衛周旋同其生死如此則三軍之士豈忘已哉法曰見危難毋忘其衆魏曹操征孫權還張遼樂進李典将七千餘人屯合肥操征張魯教與䕶軍薛悌書題其函曰敵至乃發俄而權率衆圍合肥乃發來敎曰若孫權至著張李二将軍出戰樂将軍守城䕶軍勿與戰諸将皆疑遼曰公逺征在外敵謂破我必矣是以教指及其未合逆擊之挫其盛氣以安衆心然後可守也勝負之機在此一舉諸君何疑李典意與遼于是遼募勇敢得八百人椎牛享士明日大戰平旦遼披甲出戰先登䧟陣殺數十人斬二大将呼自名衝陣矢至權麾下權大驚衆莫知所以走登高權以長㦸自守遼叱權不敢動乃聚兵圍遼數重遼左右麾圍直前急擊圍解遼将麾下數十人得出餘衆呼號曰将軍其舍我也遼復還入圍㧞出餘衆權軍無敢當者自旦至日中吳人奪氣遼脩守備衆乃安心恱孫權守合肥旬日城不得㧞乃退遼率諸将追擊幾復獲權易戰凢攻戰之法從易者始敵若屯備數處必有强弱衆寡我可逺其强而攻其弱避其衆而撃其寡則無不勝法曰善戰者勝於易勝也北史周武帝伐齊之河陽宇文䕶曰河陽要衝精兵所聚盡力攻圍恐難得志彼汾之曲城小山平攻之易㧞武帝不納終無成功離戰凢與敵戰可宻候鄰國君臣交接有隙乃遣諜者以間之彼若猜貳我以精兵乗之必得所欲法曰親而離之燕上将樂毅併将秦魏韓趙之師伐齊破之湣王出奔于莒燕将聞齊王在莒合攻之楚将淖齒将兵救齊因與齊惡欲與燕将分齊地乃執湣王數其罪而誅之復堅守莒城即墨以拒燕兵數攻不下樂毅并圍之即墨大夫戰死城中推田單為将軍頃之昭王薨忠王之為太子時與毅有隙田單聞之乃縱反間曰樂毅與燕新王有隙畏誅欲王齊齊人未附故且緩攻即墨以怠其事齊人惟懼他将來即墨殘矣燕王以為然乃使騎刼代毅毅遂奔趙燕将士由是不和單乃詐以卒為神師而事之列火牛陣大破燕軍復齊七十餘城迎襄王自莒入臨菑餌戰凢敵所謂餌者非謂置毒於飲食但以利誘之皆為餌兵也如交鋒際或棄牛馬或委財物或捨輜重切不可取取之必敗法曰餌兵漢末袁紹遣兵攻白馬操擊破之斬其将顔良遂解曰馬之圍徙其民而西紹渡河追之軍至延津南操勒兵駐營南坡下令騎解鞍放馬是時白馬輜重就道諸将以為敵騎多不如還保營茍攸曰此所謂餌兵如之何去之紹騎将文醜與劉備将五六千騎前後至諸将曰可上馬操曰未也有頃騎至稍多或分趣輜重操曰可矣乃皆上馬縱擊之破之疑戰凢與敵對壘我欲襲敵須叢草木多張旗幟以為人屯使敵備東而我擊之西則必勝或我欲退偽虛陣設留而屯敵必不敢追我法曰衆草多陣者疑也北史周武帝東討以宇文憲為前鋒守雀鼠谷帝親永圍晉州齊主亦自来援時陳王純頓千里陘大將軍昌公椿屯雞栖原大将軍宇文盛守分水關並受憲節度宻謂椿曰兵者詭道汝今為營不須張幕可伐柏為庵示有所處兵去之後賊猶致疑時齊主分軍向千里陘又遣衆出汾水關自率大軍與椿對椿告齊兵急憲自徃救之會被敇追還率兵夜返齊人果謂柏庵為帳幕不疑軍退翌日始悟窮戰凢戰知我衆敵寡彼必畏我軍勢不戰而遁切勿追之盖物極則返也冝整兵緩追則勝法曰窮冦勿追漢趙充國討先零羌羌見充國兵至羌乆屯懈弛望見大軍棄輜重渡湟水道隘狹充國徐行驅之或曰逐利行遲充國曰此窮冦也不可追緩之則彼不顧急之則還死諸校曰善羌赴水溺死者數百餘人皆奔潰風戰凢與敵戰若遇風順致勢而撃之或遇風逆出不意而擣之則無有不勝法曰風順致勢而從之風逆堅陣以待之五代史晉都排陣招討使符彦卿等與契丹戰于陽城為敵所圍而軍中無水穽井輙崩又東北風大起敵順風縱火揚塵以助其勢軍士皆憤怒大呼曰都招討何不用兵令士卒枉死諸将請戰杜威曰伺風少緩徐觀可否李守貞曰風沙之内彼衆我寡莫測多少但力戰者勝此風力助我也即呼曰諸軍齊撃賊符彦卿召諸将問計或曰敵得風勢冝待風囘彦卿亦以為然右廂副使藥元福謂曰今軍饑渇已甚待風廻吾屬為俘矣但敵謂我不能逆風以戰冝出其不意急撃之此詭道也符彦卿等乃率精騎擊之逐北二十餘里契丹主奚車走十餘里追兵撃之得一橐駞乗之遁去晉軍乃定雪戰凢與敵人相攻若雨雪不止覘敵無備可潜兵擊之其勢可破法曰攻其所不戒唐遣唐鄧節度使李愬討吳元濟先是愬遣将将千餘騎巡邏遇賊将丁士良戰獲之士良元濟驍将常為東邉患衆請刳其心愬許之士良無懼色遂命解其縛士良請盡死以報其徳愬署為投生将士良謂愬曰吳秀琳據文城為賊左臂官軍不可近者有陳光洽為之主謀也然光洽勇而輕好自出戰請為擒之則秀琳自降矣從之及光洽被執秀琳果降愬延陳光洽問計荅曰将軍必欲破賊非得李祐不可祐賊健将也有勇畧守興橋柵毎戰常輕官軍時祐率衆割麥于野愬遣史用誠以壮士三百伏林中秀琳擒之以歸将士争請殺之愬獨待以客禮時復與語諸将不恱愬力不能獨完乃械祐之京師先宻表曰若殺祐則無成功詔以祐還愬愬見祐大喜署為兵馬使令佩刀出入帳中始定破蔡之計令祐以突将三千為前鋒李忠義副之愬以監軍三千為中軍李進誠以三千殿為後軍令曰但東行六十里夜至張柴村盡殺其戍卒敇士少休令士卒食乾粮整覊靮䯃鎧弓刄時大雪旗幟拆裂人馬凍死者相望人人自謂必死諸将請所之愬曰入蔡州取吳元濟衆皆失色相泣曰果落李祐奸計然畏愬莫敢違夜半雪愈盛分輕兵㫁賊朗山之援又㫁洄曲及諸道橋梁行七十里至懸瓠城城旁皆鵞鴨池愬擊之以亂聲初蔡人拒命官軍凢五十年不能至其城下故蔡皆不為備祐等攻城先登衆從之殺守門者而留擊柝者納其衆城中鷄鳴雪止遂執元濟檻送京師淮西悉平養戰凢與敵戰若我軍曽經挫衂須審察士卒之氣盛則激勵進戰氣衰則且養銳待可用而使之法曰謹養勿勞併氣積力秦始皇問李信曰吾欲取荆度幾何人對曰不過二十萬人及問王翦曰非六十萬人不可王曰王将軍老矣何怯也乃命信及蒙恬将二十萬人伐荆翦因不用遂謝病頻陽信與䝉恬攻楚大破之乃引兵西與䝉恬會城荆人因隨之三日不頓舎大破信軍入兩壁殺七都尉信奔還王怒至頻陽見王翦强起之對曰老臣悖亂大王必不得已用臣非六十萬人不可王從之翦遂将軍王送之㶚上荆人聞之悉兵以禦翦翦堅壁不戰日休士卒洗沐而善飲食撫循之與士卒同甘苦久之問軍中戲乎曰方投石超距翦曰可用矣荆數挑戰不出乃引而東翦追擊大破之至蘄南殺其将軍項燕荆兵遂敗走翦乗勢畧定城邑畏戰凢與敵戰軍中有畏怯者鼓之不進未聞金先退須擇而殺之以戒其衆若三軍之士人人皆懼則不可加誅戮重損軍威須假之以顔色示以不畏說以利害喻以不死則衆心自安法曰執戮禁畏大畏則勿殺戮示之以顔色告之以所生陳武帝討王僧辨先召文帝與謀時僧辨婿杜龕據吳興兵甚衆武帝宻令文帝速還長城立柵偹之龕遣将杜秦乗虚掩至将士相視失色帝言笑自若部分益明於是衆心乃定書戰凡與敵對壘不可令軍士通家書親戚往來恐言語不一衆心疑惑法曰信問通則心有所恐親戚來則心有所戀漢将關侯屯江陵呉以吕䝉代魯肅屯陸口䝉初至屯倍脩恩徳與侯厚結好後襲侯收公安南郡而蜀将皆降于䝉䝉入據城得侯将士家屬皆撫諭令軍卒不得千歴人家有所求䝉麾下士與蒙同汝南人取民一笠以覆官鎧雖公蒙猶以為犯軍令不可以郷里故廢法乃泣而斬之於是軍中震慄道不拾遺蒙旦暮使親近存䘏耆老問所不足疾病給醫藥饑寒者與衣粮侯還在道路每遣人相聞䝉輙厚遇之周遊城中家家致問侯人還私相參問咸聞家門無恙相待過於平時故士卒皆無鬬志會權又至侯西走章鄉衆皆降侯被殺好戰夫兵者㓙器也戰者逆徳也實不獲已而用之不可以國之大民之衆盡銳征伐争討不止終至敗亡悔無所追然兵猶火也弗戢将有自焚之灾黷武窮兵禍不旋踵法曰國雖大好戰必亡隋煬帝國非不大民非不衆嗜武好戰日尋干戈征伐不休及事變兵敗遼城禍起蕭墻豈不為後世笑吁慎哉變戰夫兵家之法要在應變好古知兵舉動必先料敵敵無變動則待乗其有變隨而應之乃利法曰能因敵變化而取勝者謂之神五代梁末魏博亂賀得倫降唐荘宗入魏博梁将劉鄯拒唐軍于莘野増壘浚池自莘及河築甬道以運餉帝詔鄩出戰鄩曰晉兵未易擊俟彼進取茍得機便豈敢坐貽患害帝又遣使問鄩以决勝之䇿對曰臣無竒謀但人給十斛粮盡乃可破敵帝怒曰将軍留米将療饑耶又遣中使督戰鄩謂諸将専征君命有所不受臨機制變安可預謀今彼軍氣盛難可輕克諸君以為何如衆皆欲戰鄩黙然及復召諸将列坐軍門人給河水一杯因令飲之衆未測其意或飲或辭鄩曰一杯之難若滔滔河流可勝旣乎衆皆失色時荘宗以兵壓鄩營亦不出帝又數遣人促之鄩以萬人薄其營俘甚衆少頃晉兵繼至鄩退復戰于故元城荘宗與符彦卿李嗣源夾擊鄩兵大敗忘戰凢安不妄危治不忘亂聖人之深戒也天下無事不可廢武慮有弗庭無以捍禦必須内脩文徳外嚴武備懐柔逺人戒不虞也四時講武之禮所以示國不忘戰不忘戰教民不離乎習兵也法曰天下雖平忘戰必傾唐𤣥宗時承平日久毀戈放馬罷鎮将國不知兵民不知戰反安史之亂倉卒變生不圖文士不足以為将市人不足以為戰而神器幾危吁戰其可忘哉戰法總論夫上兵伐謀其次伐交其次伐兵伐謀者攻敵之心使不能謀也伐交者絶敵之援使不能合也伐兵者合刄於立尸之塲不得已而用之也然則善制戰者必先審於己一得地利二卒習服三器用利然後察彼之形勢不明敵人之政者不加兵不明敵人之情者不誓約不明敵人之將者不先軍不明敵人之士者不先陣知彼知此則先定計於内出於境是謂以理撃亂以教卒練士撃白徒敺衆無不克也故兵法曰善用兵者脩道而保法一曰度二曰量三曰教四曰稱五曰勝地生度度生量量生數數生稱稱生勝是故勝兵先勝而後求勝其或知吾卒之可以擊而不知敵之不可以擊勝之半也知敵之可以擊而不知吾卒之不可以擊勝之半也知敵與吾卒之可以擊而不知地形不可戰勝之半也夫戰兵先欲團一團一則一千人同心則有千人之力萬人異心則無一人之用心齊心均故古之稱如率然如率然者常山蛇也擊其首則尾至擊其尾則首至擊其中則首尾皆至或問可使如率然乎曰可矣吳人與越人相惡及同舟而濟則其相救也如左右手又曰軍身也卒股也伍拇指也謂將之役士士之從將如一身之與四肢拇指也夫伍兵五當也長以衛短短以救長兵不雜則不相長兵以衛短兵以守大長則犯大短則不及大輕則銳銳則易亂大犯則鈍鈍則不濟故給兵配仗咸有率分夫兵以詐立以利動以分合為變者也其疾如風其徐如林侵掠如火難知如隂陽動如雷霆掠鄉分衆闢地分利懸權而動動不可久久則銳兵費則挫威詘力縱敵生變失利後時故善用兵者見敵之虛乗而勿假追而勿舍迫而勿去始如處女敵人開户後如脫兎敵不及拒敵之開闔當亟入之故曰兵之情貴速乗人之不及也雖然猶湏以治待亂以静待譁以逸待勞以近待遠以飽待饑故曰見利冝疾未利則止趨利乗時間不容息先之一刻則大過後之一刻則失時也夫善戰者能易寡為衆易衆為寡何為哉當出其不意衝其所虚形人而我無形使我常専敵常分我専為一敵分為十則此衆彼寡我所與戰者約矣我之戰地常使之不可知則敵所備者多敵所備多則我所戰者又寡矣故曰心疑者北力分者弱能分人之兵疑人之心則錙銖有餘不能分人之兵疑人之心則數倍不足夫戰固有當擊當避當縱者撃其微静避其彊静撃其倦勞避其閒窕無擊堂堂之陣無邀正正之旗至若朝氣銳晝氣惰暮氣歸必避其銳氣擊其惰歸又曰歸師勿遏圍師必闕窮冦勿迫如此類者皆敵人方乗氣銳而來不可亟争故避而殺其鋒閒而誘其潰也或問敵衆而整將來待之若何曰先其所愛則聽矣敵所愛而恃者便地饒野糧道也先之奪敵人之心也夫戰兵貴勢勢可以先戰而震敵於其乗利則疾奮敵不暇支則譬如破竹數節之後迎刄自解不復攖手然則兵之所以能為勢者有三一氣勢二地勢三因勢若將勇輕敵士卒樂戰三軍之衆氣如飄風此所謂氣勢也據其險阻絶其餉道分其應援襲其歸路此所謂地勢也因敵怠惰疲勞饑渇前營未舍後軍未涉此所謂因勢也有此三者若兵非齊志非敢决非必死非蓄怒亦能為勢也故曰善戰者其節短其勢險勢如張弩節如發機又曰戰人之勢如轉圓石於千仭之山决積水於千仭之溪至於漂石者皆勢由然也可不務乎夫戰兵常持有餘以待不足故無犯進止之節無失飲食之適無絶人馬之力若進止不度飲食不繼馬疾人倦而不解舍則兵不堪命則不任其上令上令既廢以居則亂以戰則北矣夫衆以寡則為追裏而開之或分而迭擊或三分而乗之彼衆則以方從之又曰敵若衆衆則受圍兵士甚䧟我而不懼故知以固存以為勝又曰使人如坐漏船之中伏燒屋之下則智者不得不謀勇者不得不决也夫重用兵者强輕用兵者弱猶為不可故黷武而圖利兵久而不危者未之有也善用兵役不載籍糧不三載因糧於敵以足兵食是謂兵聞拙速未睹巧之久也法曰天下以戰為國者五勝者亡四勝者禍三勝者覇二勝者王一勝者帝此謂兵黷戰人殘人屈財之如此也故古之明主知将以言乎戰者莫之敢易也兵法曰凢戰晝以旌旗旄幡為麾夜以金鐸鼓菰荻為菰荻蘆葉為管吹為號令麾左而左麾右而右麾鼓之則進金之則止一吹而行冄吹而聚三軍服威肅命如此則前無堅敵若聞鼓不起聞金不止雖有百萬之衆何益於用哉故戰之道等藝立卒伍定行列正從容固言居實位欲栗力欲窕氣欲閒欲一陣行惟踈戰為宻逺者示之則不畏近者勿示則散示之以所生兩鋒相值有將未知敵則用寡而觀其變進退而觀其固危而觀其懼静而觀其怠動而觀其疑襲而觀其治設而觀其治皆候敵家先動變生其間我得其形則以計應常擊其亂不攻其治故善戰者應形於無窮其理未可見且以數相持敵若執數我先動則就隂以虚應實必為之擒譬夫虎豹不動不入檻穽麋鹿不窮不罹網羅凢物未有不以先動而受制於人也或待衆之作則遁而勿鼓故曰稱衆因地因戰陣令心雖然若後動不能觀敵而制計則禍愈于先動故曰先則蔽後則懾又曰先人有奪人之心後人有畏人之心待其衰也其或敵攻則屯而伺之敵謀老我師堅陣不動則譟以先之擊其疑駕其卒致其屈襲其虧上下同欲敵莫之禦戰勝則與衆分善若将復戰則重賞罰誓以居前無復先術夫先處戰地而待敵者逸後處戰地而趨敵者勞故善戰致人而不致於人能使敵人自至者利之也能使敵人不得生者害之也若擅利則釋旗迎而反之夫我以猶豫為凶以隠微為勇事莫善於必果莫成於勇决譬夫一盗荷戈於市則萬夫辟易非一盗獨勇萬人皆怯必死與必生非對也故曰居國忠以信在軍廣以武刄上果以敏夫戰用寡固用衆治寡利煩衆利正以輕行輕危以重行重無功進則相為重輕也夫必勝之兵必隠謂先用弱於敵而後戰也譬夫搏攖牧噬之戰其用牙角爪牙也託於卑微隠蔽所以能為暴故曰亂生於治怯生於勇弱生於强善動者形之形之敵必後之予之敵必取之以利動之以本待之故事省而功倍也所以佯北勿從餌兵勿食皆謂此也亦復因敵之謀以為己事審因求勝不可窮也夫竒兵者正兵之變也伏兵者竒兵之别也竒非正則無所恃正非竒則不能取勝故不虞以擊則謂之竒兵匿形而發則謂之伏兵其實則一也歴觀前志建百萬之師兩敵相向列陣以戰而不用竒者未有不敗亡也故兵不竒則兵不勝凡陣者以為兵出入之計而制勝者常在竒也韓信破趙竒而有正也苻堅敗於晉正而無竒也項籍善用兵者也烏江所存惟二十八騎猶分竒正况其衆多者乎兵法曰凢布大陣常以十分之三為竒伏設有萬人則一千五百為兩竒一千五百為兩伏竒兵如手伏兵如足正陣如身三者合為一體迭相救援戰則互為進退循環而無已故兵法曰兵以正合以竒勝善出竒者無窮如天地不竭如江河竒正相生如循環之無端此言竒亦為正正亦為竒處則合而為正出則散而為竒衆敵之不意以擊之之謂也至其出入詭道馳騁詐力則勢有萬變故兵法曰能而示之不能用而示之不用近而示之逺逺而示之近利而誘之亂而取之實而備之强而避之怒而撓之卑而驕之佚而勞之親而離之飽而饑之安而動之攻其所不備出其所不意此兵法之所以神也所謂能而示之不能者匈奴羸以誘漢祖圍於白登是也所謂用而示之不用者李牧按兵雲中大敗林胡是也逺而示之近者韓信陳船臨晉而渡夏陽是也近而示之逺者晉侯伐虢假道於虞是也利而誘之者赤眉委輜重以餌鄧洪是也亂而取之者李靖乘輕舟而破蕭銑是也實而備之者關侯討樊多留兵備公安南郡是也彊而避之者隨季梁無與楚軍遇是也怒而撓之者漢兵擊曹無咎于汜水是也卑而驕之者石勒奉戴王浚是也佚而勞之者吳子亟肄以疲楚衆是也親而離之者陳平慢楚使而疑范增是也安而動之者晉人以不虞而滅南燕是也出其不意者鄧艾由邪徑而趨劍閣是也此十有六者皆前世已然之效也亦有因地形以為變者法曰師行已近敵境者大將必謹視山川原隰之形心預計之為伏兵之地大率豀谷險阻者所以止禦車騎也隘寨深林者所以用少擊衆也坳澤窈𡨕者所以匿其形也暴疾如流矢擊之若發機者所以破精微也詭伏逺引者所以擒敵將也四分五裂者所以擊圓破也因其驚駭者所以用一擊倍也因其恐懼疲倦者所以用十撃百也隘途深草者所以藏伏也假竒伎者所以濟江河大水也大風甚雨者所以搏前擊後也偽稱敵使者所以絶糧食謬號令也山林翳薈者所以黙行往來也兵以詐立以利動使敵人前後不相及上下不相收將卒不相救衆寡不相持譬如蜂蠆出於懐䄂烈火發於廬舎雖壯夫猛士無不驚撓我得乗而制之之謂也圖書編卷一百二十
