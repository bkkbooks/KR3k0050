body:
  text: 圖書編卷八十六明章潢撰户曹總敘地官一也周官敷五典擾兆民司徒之所掌者統於一後代厚民生正民徳户禮之所職者分為二豈官職可分亦可合歟考之虞典司徒主五典教百姓親睦稷教稼穡虞若上下草木鳥獸周始合于司徒是虞廷三官而周合為一則後代即周司徒一官而分之為户禮也奚不可哉但地之道大矣任地官者其職未易稱也大司徒佐王安擾邦國必邦國安擾斯有以盡乎地之道也是故九畿九服九賦九貢莫非其所掌然盡鄉遂都鄙之民而統之即盡鄉遂都鄙之民而教之三代之民衣食足禮義生皆司徒安擾得其道也自厯代有户部民部度支金部倉部其名異其職掌亦殊要皆為富國計耳我朝户部尚書即周地官卿也侍郎即周少司徒也其屬十三司各掌一布政司與直𨽻郡縣而天下户口錢糧皆總於户部視周司徒掌邦教者亦已異矣然有恒産者有恒心民事其可緩哉布縷粟米力役之征均之不可廢者藏富於民不容並重而用一緩二豈徒為乎民耶天地生財止有此數不在官則在民誠哉是言也地官一也果損上益下酌盈劑虚意在是民而殖地財焉則百姓足君孰與不足此古治所以隆也若宼攘剖尅朘民膏血意在足國而殫地力焉則百姓不足君孰與足此後世所以不古若歟國不以利為利以義為利自童家誦習之矣寛一分民受一分之賜寧不於掌地治司民命者有厚望哉或曰古今天下廣狹一也禹貢五服四距五千里而周制九服自王畿以外每方自為五千里何也或謂尺有長短則周尺不應半禹之尺或謂禹五服之外外薄四海不在其數周則盡外薄所至而經畫之此説為近然亦不應外薄之地與五服之地相半攷之經文甸服方千里而曰五百里則凡所謂五百里者舉一面計之也若周官則曰規方千里曰王畿又其外方五百里曰某服則舉兩面通計之也是則禹貢所謂五百里甸服者乃千里而周官所謂外方五百里者乃二百五十里也至漢地志又言東西九千餘里南北一萬三千餘里則漢東西視禹貢㡬一倍南北視禹貢㡬二倍然攷其所載山川又不盡出禹跡何也古者聖人制數周宻其制方田之數以御田疇廣狹制勾股之數以御逺近髙深方田之制行則自井畝徑遂之直積而為道路川澮截然直方無有迂曲故中邦之地雖廣而里數則徑自秦漢開阡陌於是道里始遷逺矣此古今里數多少之不同一也周髀之經曰數之法始出扵圓圓出於方方出於矩矩出於九九故折矩以為勾勾廣三股修四徑隅五禹之所以治天下者此矩之所由生也是則勾股算法自禹制之蓋積矩以為方田而勾股以測髙下淺深逺近此禹之所以疆理天下而弼成五服者也勾股之數宻則於山川迂回之處與道里曲折之間以勾股之多計弦之直而得逺近之實大率勾三股四弦直五以正五斜七取之自秦漢以來誇多務廣固盡外薄之逺其計道里又但以人迹為數不復論勾股弦直故漢之九千里大約凖古六千五百里漢三千里凖古一千九百七十一里而尺步長短之異制又不在此數此古今里數多少之不同二也至於禹貢外薄之地在五服之外而後世斥堠所到盡在里數之内此其多少之不同又不在言者或者又曰冀在九州為北堯都冀州則自甸服之外北短南長五服之地北無所展而南有所展則如之何曰隆古都冀政教四達則冀北之野生聚教訓必不如後世之為窮漠所以冀賦為九州第一而水平之後分為幽并其廣可知兼堯都平陽雖曰在冀自平陽以南渡河至陜於今地里三百七十五里正五斜七於古盖二百六十餘里再則是甸服之地自跨冀豫冀山而豫平緬想當時甸服之地當亦如周室王畿之制盖成周之制雖規方千里以為王畿然西自邠岐豐鎬為方八百里東則洛陽四達方六百里總為千里爾五服之制其間絶長補短計亦如此何則周都豐鎬西至犬戎約餘千里而犬戎之地自為荒服先王之制賔服者享荒服者王自穆王以犬戎地近責其従賔服之享自是荒服者不至則是五服之制計古亦有因地而為長短者盖因諸侯之分情以為朝貢之限制亦有在近而視逺雖逺而視近者大率地有廣狹俗有夷夏未必四面截然如此正方聖人立為限制之經固必有通變之義讀書者不可拘於一說而不知聖人體用之大也據禹貢五服之制九州之内止方五千里而先儒較以有漢廣輪之制全不相侔以謂西漢盛時東西九千三百里南北萬五千里而山川所屆不出禹貢之域何道里之殊絶也遂至孔穎達之徒有鳥道之說謂禹貢之制據虚空鳥飛徑過而言兩漢之制以人跡所通逶迤曲屈動有倍加此先儒一定之論切以為不然夫鳥道信為徑通而人跡安能有及抑嘗攷之王制古者百里當今百有二十一里今謂漢也是禹貢五千里之制即漢之六千里也況五服之制據萬里而言合以東西四正為據當時堯都平陽正東至東萊之海方二千八百里正西至張掖之流沙方三千三百里是僅可以滿五服之制也兩漢九千里之制則以遼東之海與燉煌之流沙而言也而遼東在東北隅燉煌在西南隅非其正也夫正方一尺者袤之而度其兩隅則為尺有四寸而贏則五服之制舉其隅而度之宜其九千里也漢制南北萬五千里者舉朔方日南而言也而禹貢所届正南止及衡山之陽而日南又在衡山之南八千餘里非禹迹所及也至平陽不盈千里已為沙漠之地是王服之制唯東西南三方為然北方僅滿二服而已尚何鳥道之云乎則先儒巧傅之説失其據矣嗟乎昔先哲王為天下後世之慮何其審也夫九州之地四正雖近四隅實遥非不知舉其四隅計其道里之逺足為大也五服之制乃舉其近而畧其逺何哉盖不欲以一時廣大之名起後世無厭之欲所以貽孫謀以正也惜乎秦漢以還好大之君以廣斥土宇為功而記録之臣又從而恢張之是豈知堯禹之用心乎嗚呼戒哉周禮大司馬乃以九畿之法施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衞畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿職方氏乃辯九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衞服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰蕃服大行人邦畿方千里其外方五百里謂之侯服嵗見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衞服五嵗一見其貢財物又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之蕃國各以其所貴寶物為贄國語周語祭公謀父諫穆王先王之制邦内甸服邦外侯服侯衛賔服蠻夷要服戎􅀈荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享嵗貢終王九畿九服論一大司馬曰以九畿之籍施邦國之政職王畿千里自其外方五百里曰侯畿自其外方五百里曰蕃畿畿者以限制畿疆言之也職方氏曰辨九服之邦國王畿千里自其外方五百里曰侯服至其外方五百里曰蕃服服者以服事天子而言也王畿千里之外九畿有四千五百里似與尚書五服五千之制不同然細考之堯之五服本二千五百里一服各弼以五百里凡二千五百里故曰弼成五服至於五千至周人分為九服堯之百里男邦今為男服百里采今為采服二百里武衞今為衞服百里蠻今為蠻服百里夷今為夷服其名雖存其制則異故九服合王畿而言之與尚書特差五百里爾以此見地域廣狹自唐虞以來未有大異漢儒謂周公斥大土宇之言不足信矣夫四海之内方千里者九州方千里一州三百一十國八州八千里凡千六百八十國合王畿千里之内九千三國而言共一千七百七十三國而附庸之國不與焉廣行人則曰邦畿千里自其外五百里侯服至要服乃在九州之内變蠻曰要是此一服特要束之耳夷鎮蕃一服謂之蕃國乃在九州之外若是則九州之内只容六服通王畿僅四千里尚書之五服何以謂之五千王制之九州何以謂之九千盖尚書比周禮以直計之按安國釋五千之説以為兩面相距此乃漢儒之説王制漢儒所以作一州之地言之九州之地合九千里若以相距言之則四千五百里爾以王畿九服直計之凡五千五百里則六服在内三服在外矣三服在外非是純不屬九州以其在外地故曰九州之外不可以中國之法繩之書曰六服羣辟罔不承徳又曰六年五服一朝言五服則要服亦不常是以武成叙諸侯之助祭洛誥稱諸侯之㑹和康王之誥陳諸侯之聽命止言五服爾然此特言九州九服之制而成周封國之制可得聞歟按王制孟子皆言公侯百里伯七十里子男五十里與武成列爵惟五分土惟三之制同今考之周禮大司徒曰公五百里侯四百里伯三百里子二百里男百里職方氏曰封公以方五百里則四公方四百里則六侯三百里則七伯二百里則二十五子百里則百男凡五等也與王制孟子武成不同漢儒紛紛或以為附庸或以為斥大土宇或以為開方里數或以為夏商周異制儒者常辨之矣然此在王制孟子武成周禮自有明文第説者不察爾王制曰公侯皆方百里孟子曰公侯地方百里伯子男皆以是差等盖王制言王者之制爵禄故以分田制禄言孟子言周室之班爵禄故以分地制禄言武成以分土對列爵言之是亦以分土制禄言之也周禮則不然諸公之地以封疆言則五百里至諸男之地以封疆言則百里是以封疆所至之地言之故有五等也公之封疆雖五百里而受田食禄則百里而已侯伯封疆雖四百里三百里而受田食禄則七十里而已子男封疆雖二百里百里而受田食祿則五十里而已如今之郡縣大小各有差而俸秩乃其禄也又如今之食邑多寡各有數而實封乃其所食之祿也以封疆言則五等以食祿言則三等此其所以不同歟曰封疆者合山林川澤宫室除巷所占之地言之也曰食者此合封疆所出之稅而王食其貢如九貢致邦國之用山師川師致山林川澤珍異之物是也公之地王與公各食其半侯伯之地自食其二王食其一子男之地自食其三王食其一鄭氏曰大國貢重正之也小國貢輕字之也如司勲凡頒賞地三之一食鄭氏謂王食其一二入扵臣亦此例也以其食者觀之曰食者半曰食者三之一曰食者四之一是則合封疆之所食者亦有三等也且如大司馬曰大國三軍次國二軍小國一軍則是制軍亦三等與命曰上公九命侯伯七命子男五命則受命亦三等司服有公之服侯伯之服子男之服則作服亦三等司儀擯相之禮亦曰公居上等矦伯中等子男下等豈扵食禄之制不然乎司馬言九畿其外曰蠻夷蕃鎮是天下封疆極四夷也職方言九服其外亦足蠻夷蕃鎮是四夷皆服事天子夷鎮藩服在行人總謂之蕃國蠻服在行變謂之要服是其要荒無常也且以職方地圖觀之言邦國都鄙而不及扵四夷八蠻七閩九貉五戎六狄之人民如此則周家疆理通乎蠻夷閩貉戎狄矣行人何以謂之九州之外乎按王制謂西不盡流沙東不盡東海南不盡衡山北不盡恒山凡四海之内截長補短凡三千里説者謂言九州之實地也今職方九州之地荆州曰衡山并州曰恒山則是盡東西南北言之矣而行人謂蕃國在九州之外者以其在六服外而非九州内地爾九畿九服論二王者效天法地以建民極王畿千里其天之紫微垣乎斗樞握衡于其中近而太㣲天市逺而二十八宿旋繞于其外自天言之經星凡星莫非天也自斗極言之其于垣宿若有内外逺近之分而三百六十五度何一不拱向于天樞乎故曰北辰居其所而衆星共之知天則知王畿九服之制矣夫四海之内方千里者九統言萬里者亦大畧計九州之廣輪焉耳邦畿千里維民所止亦大畧計王畿之廣輪焉耳後人遂謂古人尺步長短異制古今里數多寡不齊勾股算法鳥道徑通紛紛沓起皆執一之論也禹貢謂東漸于海西被于流沙朔南暨聲教訖于四海王制謂西不盡流沙東不盡東海南不盡衡山北不盡恒山今古地輿截南補北其勢不甚遼絶而漢制萬里亦自曰南以及漠北言之耳周制王畿千里今考其地西自邠岐豐鎬為方八百里東則洛陽四達為方六百里亦總以千里言耳果可執方以求之四隅相距整齊無參錯耶詩云商邑翼翼四方之極言京邑居中而九畿九服莫不朝宗于京師而究其實焉周都豐鎬西去犬戎不過千里云耳果可截然謂四面各二千五百里耶司徒建國必求地中謂以土圭測日景而揆中焉鄭氏遂謂陽城天地之中故周公營洛然洛去陽城亦甚逺矣曷不遂都陽城而都洛耶周禮體國經野辨方正位故圖因其文畫王畿千里王宫鄉遂都鄙甸稍縣畺為九畿之制諸侯分封大小矦甸邦采衛蠻夷鎮蕃九服逺近亦不同即大司馬以九畿之籍施邦國之政職方氏服之邦國是也易比之象曰地上有水比先王以建萬國親諸侯萬國亦舉成數言耳王者疆理天下封建邦國以藩衛王室親諸侯所以比天下也惟封建所以親比天下故九服逺近既殊則朝貢疏數亦因以異豈以其逺而絶之哉觀穆王責犬戎以賔服之享自是荒服者不至則犬戎距周都止千里而即為荒服可見五服又不専以逺近論也茍拘泥一説不特夷鎮蕃服在行人總謂蕃國在九州之外而淮徐距洛汴㡬何亦謂之徐夷淮夷耶内華外夷大防必峻而夷夏參錯封疆何能以必齊乎封建之制孟子謂公侯地方百里伯七十里子男五十里武成亦曰分土維三想夏殷之制同而成周因之乃謂周公相成王斥大九州増封有功諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地一百里不能百里而附扵諸侯者為附庸王制云二百一十國八州千六百八十國故後儒因周禮王制皆與孟子異而諸説牽合繆甚獨葉氏謂王制言王者之制爵禄故以分田制禄言孟子言周室之班爵禄故以分地制禄言周禮所謂公五百里以及四百里三百里二百里百里皆以封疆言如公之封疆言五百里受田食禄則百里而已侯伯子男皆以是為差似乎近之然亦附㑹之説也孟子言周公大公封扵齊魯非地不足而儉扵百里又云今魯方百里者五豈魯本四百里今五百里在所損耶滕侯國也至文公時絶長補短將五十里其所以壤地褊小必為齊楚所侵奪矣果于原封侵其三百五十里故謂之為小國耶孔子亦謂安見六七十如五六十而非邦也者與孟子同即如天子地方千里耳卿受地視侯大夫受地視伯元士受地視子男王畿都鄙盡為卿大夫士之采邑公五百里其國已半乎王畿天子六卿采邑之地已當乎六侯而又嘉以大夫士焉是富有四海反不足敵一國耶名山大川每周迴數百里九畿九服諒難畫一姑即徐雍二州其廣狹相懸在九州可知謂九州州二百一十國也果地無廣狹封國無多寡其整齊有如是哉且曰使小國事大國大國比小國此謂春秋戰國時可也若天王大一統使小國事天子矣又事大國焉在小國恐不勝其事也抑豈比大國比小國而天子封建獨比大國如此而象乎水地之比歟想諸侯惡其害已故去其籍今所𫝊周禮必戰國時制典籍而漢儒増損之者是故論三代以前當一依五經孔孟之言以為準庶衆言不得以淆之況王者之制莫大乎封建乃執膠固已見以齊乎各國之封疆是論天文必欲各垣各宿之星多寡不爽也有是理哉虞周五服九服之制或謂堯之五服本二千五百里禹于五服各弼以五百里故曰弼成五服至于五千又謂堯之五服五千里周制九畿每畿五百里而王畿又不在其中四方相距為萬里葢倍禹服之數也愚獨以為一耳堯制通王畿為五服曰侯甸綏要荒各服内各分三百里二百里是一靣五百四靣相距為一千里故五千里周制除王畿千里之外曰其外方五百里曰甸服則是兩靣相距五百里九服皆然是止四千五百里通王畿為五千二百里大行人夷鎮蕃三服通謂之九州之外但以貴寳為䞇禹于九州之外謂之外薄四海而咸建五長則其治之詳畧又無不同也讀者自殊之而謂周公斥大土宇不亦繆哉自今考之如舜封象于有痺羲仲側日于嵎夷禹南廵于㑹稽導弱水至于流沙此四裔之地皆古人足跡所及者周之斥大安在也至于土貢北皮服南象齒則朔南盡乎朔方南海亦可知矣信乎天下輿地古猶今也其不同者特畿服之限制云爾商頌曰邦畿千里惟民所止前乎商而為夏後乎商而為周葢莫不然禹貢曰五百里甸服百里賦納總二百里納秷三百里納秸四百里粟五百里米周禮載師以㕓里任國中之地以塲圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以家邑之地任稍地以小都之田任縣地以大都之田任疆地即此合前圖觀之王畿之制自古無異炳然矣王畿考載師掌任土之法以物地事授地職而待其政令物如物土方之物區别也别土所宜而定制以待其賦税之式也以㕓里任國中之地㕓里市宅分域限也居室相比乃國中所宜以場圃任國地種草木果蓏屬曰圃季秋或有收者乃即築為場詩九月築場圃是也乃園地所宜樊圃謂之園以宅田士田賈田任近郊之地宅田凡民居中者庶人在官者皆是也士田賈田所謂士工商家受田五口乃當農夫一人葢士居學而賈居市也三者在國於近郊五十里之地為宜以官田牛田賞田牧田任逺郊之地官田藉田類牛田供牲牢喪奠兵車之牛賞田賞賜之田即匪頒之式也牧田即芻秣之式也故於逺郊百里之地為宜百里之内以供官以公邑之田供甸田公邑之田地天子使吏治之供差服類所謂千里之内以為御以家邑之田任稍地家邑大夫采地而有宰也稍地三百里於小邑為宜以小都之田任縣地小都卿之采地成都者七十里視伯於縣地四十里為宜以大都之田任畺地大都公之采地王子弟所食邑也百里視侯於畺地五百里為宜郡五畿界也凡任地國宅無征國宅凡官所有宫室吏所治也園廛二十而一指國中近郊二十而三甸稍縣都皆無過十二皆指園廛近輕而逺重也唯其漆林之征二十而五不分逺近而特重者以獲利之多也凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征以時徴其賦毛桑麻也布帛也宅地不種桑麻出一里之布鄭𤣥云廛城邑之居孟子所云五畝樹之以桑麻者也王莽時城郭中宅不樹者為不毛者出三夫之布市也田地不耕墾者出一屋之粟夫三為屋亦長一里也征一布也夫家之征一夫受田成家口稅也如家三人二家五人家六口五口之三等而皆受田百畆為夫也以屋粟證之百畆而出三百畝之粟則令出上地家三人之稅與小司徒所謂餘夫屋孟子曰廛無夫里之布是也各因其類而重罰之所以警戒驅之也先儒分夫家為二非也閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徴其賦凡任民任農以耕事貢九榖即太宰以九職任萬民一曰三農生九榖任圃以樹事貢草木即二曰園圃疏草木任貢以飭材事貢噐物即五曰百工飭庀八材任商以市事貢貨賄即六曰商賈阜通貨賄任牧以畜事貢鳥獸即四曰藪牧養蕃鳥獸任嬪以女事貢布帛即七曰嬪婦化治絲枲任衡以山事貢其物任虞以澤事貢其物即三曰虞衡作山澤之材但九職又有八曰臣妾聚歛疏材此不言者山澤足以該之註疏材百草根實可食者凡無職者出夫布凡曰閒民無常職轉移職事此云出夫布凡不執事者耳凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰衰布也所此皆罰其無以勸其業按載師掌任地事則地無曠地閭師掌任民力則民無游民先王所以治國中野外不過如此而已載師掌任土之法以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以宫田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地右言畿内鄉遂都鄙之制王畿之内地方千里中置國城四面至畺各五百里百里為一節五十里為近郊百里之内為逺郊郊地四同中置六鄉七萬五千家其餘地以任九等之田郊地四同周有萬井三萬家四同當有十二萬家今以七萬五千家為六鄉其餘則四萬五千家任九等之田逺郊之外為甸甸地十二同中置六遂七萬五千家其餘地以任公邑之田田有溝洫遂人掌之甸地十二同當有三十六萬今以七萬五千家為六遂其餘則二十八萬五千家任公邑之田甸外為稍稍地二十同以任家邑之田稍外為縣縣地二十八同以任小都之田縣外為畺畺地三十六同以任大都之田田有井牧小司徒經之司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都按鄭氏汪引司馬法為王國百里為郊二百里為州三百里為野四百里為縣五百里為都其名不同其制又異又杜子春云五十里為近郊百里為逺郊其説亦非王幾千里有國中郊野鄉遂都鄙之别今只㨿載師所任之地約而為圖畧以見王畿千里之制爾自國中而郊野為六鄉遂十五萬家所受之田其餘則為載師所任之田矣大司徒五比為閭使之相受閭胥每閭中士一人閭之為言五比二十五家同巷而居胥旁有閭門故以閭名平旦閭及鄰長坐于左右塾以帥民者鄉大夫國有大故令民守其閭修閭氏令守其閭互也師每族上四閭為族使之相𦵏族士一人族之為言以其相𦵏埋有同宗合族之義也族師互家為比十家為聮五家相與對門為尤切近也四閭為族八閭為聮二百家圍聚而居者相通與族同也大司徒五族為黨使之相救黨患正每黨下大夫一人黨者以其難相救互相黨與之義也五黨為州使之相賙州長每州中大夫一人州之為言周也五州為鄉使之相賓鄉大夫每鄉郷一人鄉老二鄉則公一人按六鄉六遂近郊逺郊四面各百里為田六十四同每同為二萬五千餘家合有一百六十萬餘家今觀六鄉六遂序官之數比隣之長共三萬人所統止于十五萬家是一家而兼十家每一比長所統五十家矣盖凡比與其長之員有定而其民則十倍而有餘嵗以五家為正以其餘為輔十家一周名則五家而所統實五十家故公私之事嵗無缺禄不見其多民不知其擾也所以周禮正月吉懸教象之法邦國都鄙令五家為比使之相保平居相親愛也五比為閭使之相受有故相容忍也四閭為族使之相𦵏死相助也五族為黨使之相救災相恤也五黨為州使之相賙貧相周也五州為鄉使之相賔賢能則相與賔興之也合比閭族黨州鄉相聫絡以成其仁此聖王所以能使天下為一家非無意而為此道也六鄉考五家為比使之相保謂比舍而保其行不為非也保猶在也比長五家下士一人各掌其比之治五家相受相和親有辠竒衺則相及竒者常之及衺者正之反有辠竒袤則相及則使之相率而趍於相受相和親之養徙于國中及郊則從而授之鄭氏曰徙而不用其居也或國中之民出徙郊或郊民入徙國中皆從而付所處之吏明無罪惡若徙於他則為之旌節而行之徙于他謂出居異鄉也授之者有節乃達若無授無節惟圜土納之鄉中無授出鄉無節過所則呵問擊之圜土者獄城也獄必圜者規主仁以仁心求其情古之治獄閔於出之故獄城圜也五比為閭使之相受謂宅含有故相受寄託也閭里門也說文侣也二十五家相羣侣也閭胥毎閭中士一人各掌其閭之徴令以嵗時各數其閭之衆寡辨其施舎施同弛按大司徒云舎禁弛力則弛暫時優免舎常例應免舎有常而施無常鄭氏謂應復免不給繇役是也凢春秋之祭祀役政喪紀之數聚衆庶既比則讀法書其敬敏任恤者祭祀謂禜州社黨禜族酺也役田役也政若州射黨飲酒也喪紀大喪之事也四者及比皆㑹聚衆民因以讀法以勑戒之凢事掌其比觵撻罰之事觵逹者失禮之罰也觵用酒其爵以兕角為之撻朴也四閭為族使之相塟謂百家相𦵏埋如同族然族類居也族師每族上士一人各掌其族之戒令政事月吉月朔一月之始也則屬民而讀邦法書其孝弟睦婣有學者春秋祭脯亦如之族長無飲酒之禮因祭脯而與其民以長㓜相獻酬焉以邦比之法帥四閭之吏以時屬民而挍登其族之夫家衆寡辨其貴賤老㓜廢疾可任者及其六畜車輦登成也定也五家為比十家為聨五人為伍十人為聨四閭為族八閭為聨使之相保相受刑罰慶賞相及相共以受邦職以役國事以相塟埋若作民而師田行役則合其卒伍簡其兵噐以鼓鐸旗物帥而至掌其治令戒禁刑罰亦於軍囚為卒長歳終則㑹政致事五族為黨使之相救謂五百家守望相助也黨類族也黨正每黨下大夫一人各掌其黨之政令教治及四時之孟月吉日一時之始則屬民而讀邦法以紏戒之春秋祭禜亦如之國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位一命齒於鄉里再命齒於父族三命而不齒按國索鬼神建亥之月大蜡也齒於鄉里以位尊非鄉里則不相序也齒于父族位猶尊雖鄉里亦不相序也不齒則位極尊雖父族亦不相序而特入為尊矣雖序齒而又有序位之義也凢其黨之祭祀喪紀昏冠飲酒教其禮事掌其禁戒凡作民而師田行役則以其法治其政事亦以軍因為旅帥歳終則㑹其黨正帥其吏而致事歳終周建亥之月也正歳屬民讀法而書其徳行道藝舊註正歳謂夏之正月得四時之正以出教令者審也凌人云正歳十二月令斬人以歳時涖校比及大夫人亦如之五黨為州使之相賙謂二千五百家周給也説文州重州周統其旁國語羣聚而州處註周聚也風俗通州疇也州有長使相周足也州長每州中大夫一人各掌其州之教治政令之法正月之吉周正月朔日也一年之始各屬其州之民而讀法以考其徳行道藝而勸之以紏其過惡而戒之若以歳時祭祀州社則屬其民而讀法亦如之春秋以禮㑹民而射于州序凢州之大祭祀大祭皆涖其事大祭社謂州社稷也大喪鄉老大夫於是卒者也若國作民而師田行役之事則帥而致之掌其戒令與其賞罰致之致於司徒也掌其戒令賞罰則是於軍因為師帥歳終則㑹其州之政令正歳則讀教法如初三年大比則大攷州禮以賛鄉大夫廢興五州為鄉使之相賓謂二千五百家賓興之鄉衆所向也鄉大夫之職每鄉卿一人各掌其鄉之政教禁令正月之吉受教法于司徒退而頒之于其鄉吏州長以下使各以教其所治以攷其徳行察其道藝以歳時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以歳時入其書謂年三十六十謂言年十五國中晚税而早免之以其所居復多役少野早税而晚免之以其復少役多鄭司農云征之者給公上事也舍者謂有復除舍不收役事也貴者謂若今宗室及闗内諸侯皆復也服事者謂若今吏有復也老者謂若今八十九十復羡卒也疾者謂若今癃不可使者復之三年則大比攷其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮賓之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貳之天府掌祖廟之寳藏者内史副寫其書者當詔王爵禄之時退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞詳見後此謂使民興賢出使長之使民興能入使治之言是所謂使民自舉者因出之而使之長民教以徳行道藝於外也使民自舉能者因入之而使治民之貫賦田役之事於内也言為政以順民為本也歳終則令六鄉之吏皆會政致事正歳令羣吏攷法於司徒以退各憲之於其所治之國大詢於衆庶則各帥其鄉之衆寡而致於朝國有大故則令民各守其閭以待政令以旌節輔令則撻之民雖以徵令行其將之者無節則不得通六遂考五家為鄰居左右鄰次贊相也鄰長五家則一人註不命之士掌相紀相受凡邑中之政相贊徙于他邑則從而授之按鄰長同比長餘倣此五鄰為里謂二十五家行其秩敘使居條理也里宰每里下士一人掌比其邑之衆寡與其六畜兵噐治其政令以歳時合耦于耡以治稼穡趨其耕耨行其秩叙以待有司之政令而徴歛其財賦考工記曰耜廣五寸二耜為耦此言兩人相助耦而耕也𤣥謂耡者里宰治處也若今街彈之室於此合耦使相佐助因倣而為名季秋之月令命農師計耦耕事修耒耜具田噐是其歳時與合人耦則牛耦亦可知也秩叙受耦相佐助之次第四里為鄼鄼作管及聚也百家則成聚矣鄼長每鄼中士一人各掌其鄼之政令以時挍登其夫家比其衆寡以治其喪紀祭祀之事若作其民而用之則以旗鼓兵革帥而至若歳時簡器與有司數之簡噐簡稼噐也兵噐亦存焉有司遂大夫凡歳時之戒令皆聽之趨其耕耨稽其女功聽之受而行之也女功絲枲之事五鄼為鄙如鄙我周邦之鄙五百家則成邑積而不散也鄙師每鄙上士一人各掌其鄙之政令祭祀凡作民則掌其戒令以時數其衆庶而察其媺惡而誅賞嵗終則㑹其鄙之政而致事五鄙為縣懸也二千五百家既衆則懸於上随其移不定也縣正每縣下大夫一人各掌其縣之政令徴比以頒條理以分職事徴召也此案比掌其治訟趨其稼事而賞罰之若將用野民師田行役移執事則帥而至治其政令既役則稽功㑹事而誅賞五縣為遂直逹也萬二千五百家可以四達無阻矣遂大夫每遂中大夫一人各掌其遂之政令以嵗時稽其夫家之衆寡六畜田野辨其可任者與其可施舎者以教稼穡以稽功事掌其政令戒禁聽其治訟令為邑者歳終則㑹政致事正歳簡稼噐修稼政簡猶閲也稼噐耒耜鎡基之屬稼政孟春之月令所云皆修封疆審端徑術善相丘陵阪險原隰土地所宜五穀所殖以教道民必躬親之三歳大比則帥其吏而興甿明其有功者屬其地治者興甿舉民賢者能者如六鄉之為也興猶舉也屬猶聚也又因舉吏治有功者聚勑其餘以執事凡為邑者以四逹戒其功事而誅賞廢興之按為邑即遂人造縣鄙形體之法也以四逹凡道路皆通也猶言川上有路以逹于畿畿舊註非按鄉師正歳稽其鄉噐比共吉凶二服閭共祭噐族共喪噐黨共射噐州共賓噐鄉共吉凶禮樂之噐遂師不言者鄉近而遂逺也故大司徒大喪帥六鄉之衆庶屬其六引而治其政令遂人大喪帥六遂之役而制之掌其政令及塟率而屬六綍及窆陳役類是也遂人之次有遂師猶小司徒之下有鄉師也按周制内有六鄉外有六遂鄉之所置比長閭胥族師黨正遂之所置鄰長里宰鄼長鄙師是即漢之亭長三老嗇夫唐之里正坊正宋之保長耆長之任也我朝稽古定制于天下州縣在城謂之坊長廂長在外謂之里長社保長十年而一役之役周而更造其籍又於每里推一年老有徳者為老人一切小事付之聽決又制為木鐸使貧而老者振之以警衆其詞曰孝順父母尊敬長上和睦鄉里教訓子孫各安生理毋作非為其制視古為詳我聖祖又製為教民㮄文昭示天下一編之中良法美意盖與周官所載殆相符合噫九重之髙而慮周閭閻之下萬幾之繁而思及田里之㣲而又委曲詳悉如此其為天下萬世計也深且逺矣唐栁宗元有言有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子然則天子之與里胥貴賤雖懸絶而其任長人之責則一也伏願明勅有司慎重其選申明祖宗榜示之意將見禮教大行恩澤下究則雖四方嘉靖之休萬國咸寧之化其基本端在於此也成周鄉遂土田居民之數人動物也非役役於善即役役於不善吉人為善勤勞而不知凶人為不善勤勞亦不知為之皆出於其中心以志帥氣故也民可使由之聖王之政不過率之以勤勞于善而已勤勞則淫僻無自生變故不能怵偷惰則善心無自生變故不能支故周禮設官居家則有比閭族黨州鄉鄰里鄼鄙縣遂以施教化在野則為井邑丘甸縣都通成終同以相什伯大司馬所握之六軍内以役于王都更休而不竭外以制于四方調遣而有餘是故月朔孟月習之于爼豆禮樂使其優游于儀文度數之間而密消其粗悍暴厲之氣三時靡不力田趨其耕耨行其秩敘使無有無事而食之人歳時簡其兵噐以為備四仲教之師田以為用而常食則率之以朝覲㑹同征伐追胥使之常閑于行役而不以為難安于勞苦而不以為病是故姦慝禍亂而不作刑罰兵革而不用也雖然鼂錯有言人情莫不欲逸三王節其力而不盡豈周之民終歳勤動而不得息者耶愚常合周制土田居民之數而得其説矣故以王畿千里居民之數計之為田一千六百同每同餘山澤邑居溝渠道路等三分之一為六千四百井以上中下三等不易一易再易計之一夫耕二夫之地實止四家以可任者三人至二人計之每井十人故每同二萬五千餘家可任者六萬四千人出車百乘徒萬人每五家而出二人可任者六人而用其一也是千里之地合有四千萬家為車十六萬乘矣然自古稱天子曰萬乘則十六倍而用其一四十家用其一人而已又以鄉遂居民之數計之近郊逺郊四面各地方二百里為田六十四同每同二萬五千家合有一百六十萬家矣及觀鄉遂序官之比鄰之長共三萬人所統止于十五萬家是一家而兼十家每一比長所統五十餘家矣夫丘甸之法兵皆設而不用比閭之法户皆有餘而不籍何也葢有居民可任之數用以力田治水獵追胥每同可任者十萬餘人是也有丘甸出車之數每同出車百乘徒萬人是也有簡稽之數苟盡簡閲之則民不勝其疲故如載師之法自十一至于二十而三每五分而稽其一必十餘載而一周推此二法即如今之設里者計一而藏九休九而用一其法不得不然也至以調遣言則行者有暑寒鋒鏑之苦居者有離索怨曠之思是豈可輕發而多用者故大司馬不過六軍為車七百五十乘為徒七萬五千人于千里之内均畨而調遣之其優裕而不迫均遍而不頗類如此是故天子出必有六軍君行師從卿行旅從徴發而不至于空虚役役而不以為勞苦居足以守而無虞出足以戰而無敵田足以耕而不乏食老㓜廢疾有養而無失所此周制所以為善也且夫車馬噐械皆平日之簡稽委積蒭薪隨道里而貯儲吉行五十里軍行三十里勞中而有逸將必知兵兵必順民行險而不危故易曰毒天下而民從之也後世之民其佚者歟則漫然無教驕奢淫慾不遺餘力遇有警急則束手無䇿延頸待斃其勞者歟則征伐四出戍役無節死亾相繼至發閭左千里蕭條天下騷然其不至於敗亾者幾希司馬法同十為封封十為畿侯封其等不同凡大國之封十乃為王畿此圖每一目當一同直二十五里四面千里為田一千六百同是為天子畿内之地每同出車十乗共出車一萬六千乗徒一百六十萬人左傳子産有言天子之地一圻列國一同諸公之地四百同無乃非古制乎據司馬法同十為封謂自十同已上可以封諸侯非謂止于十同也若謂列國一同者此但可行扵前古玉帛萬國之時後皆為附庸之國豈可以議周之定制且其下云今大國多數圻矣圻方千里數圻將分天下大半春秋亦安得此大國乎故此不過一時應對語治經者不可以執一論也按天子諸侯地方里數皆以一直論先儒俱以開方計之馬氏守成方十里出車一乗之説遂據周禮封疆方四百里以當千乗之數包氏守孟子諸侯儉于百里之説則以為十井出一車以足千乗之數季氏兼存之而分為天子諸侯不同之説然以愚觀之皆限于開方之法而失之者也百里之地為田十六同每同出車百乗為一千六百乗每嵗簡稽其十之一為一百六十乗凡一軍之車一百二十五乗此正可以當一軍之車數而已茍無十年更休之法雖以百井供一車民不堪命況欲十井供一車耶封國疆制考周禮大司徒凡建邦國以土圭測其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者三之一諸伯之地封疆方三百里其食者三之一諸子之地封疆方二百里其食者四之一諸男之地封彊方百里其食者四之一職方氏凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則十一伯方二百里則二十五子方百里則百里以周知天下尚書武成列爵惟五分土惟三孟子萬章篇北宫錡問周室班爵禄孟子曰公侯皆方百里伯七十里子男五十里不能五十里者不達扵天子附于諸侯曰附庸左傳子産曰天子之地一圻列國一同唐氏曰學者見司徒建邦國封疆與武成分土之等孟子班爵之制不合因謂周禮非周公之制為周禮者又强為之説曰周九州之界方七千里周公變商湯之制雖小國地皆方百里是皆未深考之耳費誓曰魯人三郊三遂左氏曰成國不過半天子之軍諸侯之大者三軍可也然則大國三軍出于三郊三遂副之周制然矣牧誓曰武王戎車三百兩虎賁三千人御事司徒司馬司空然則大國三軍三卿為之師一軍之戎車百二十五乗商制然矣商周之軍制諸侯既同分土之制安得而異周之九服即禹之五服烏覩所謂七千里者周公相武王滅國者五十而所立七十一國分土之制遂過于商大者二十四倍小者猶三倍何所容之後儒不能通謂兼附庸誠是也抑不思百里之提封萬井三分去一為六萬夫之地悉以家一人率之為兵六萬尚不足三郊三遂七萬五千人之數為車六百乗亦不足千乗之數所為園㕓宅田士田賈田官田賞田牛田牧田與卿大夫公子弟之采邑扵何容之家既役其一人百畆又征其什一他無餘地車輦馬牛干戈之屬扵何容之百畆之分以中農計之足食七人什取其一則十夫而食七人古庶人在官次等之禄也六萬夫之税足當中農夫六千人而已三鄉之吏九千四百六十人于何給之尚未食三遂之吏與其百官之衆府史胥徒之禄宗廟朝廷之禮王國之朝貢四隣之邦交扵何取用也百里之地不足為公侯之國明甚況七十里止二萬九千四百夫之地五十里止一萬五千夫之地其不能為諸侯之國抑又明矣然則子産孟子之言非歟曰二子何可非也抑古人之為言省文而互見詳而考之未有不合者古之為國有軍有賦王六軍大軍三軍次國二軍小國一軍此軍也出扵國之郊者也天子萬乗諸侯千乗此賦也出于成國者也自軍言之則方百里而具三軍方七十里而具二軍方五十里而具一軍推而上之方二百而且具六軍自賦言之則方千里而具萬乗二百一十里而具千乗通軍與賦而言之則方千里者為兵車萬九百乗推而下之方百里者為方五十里者四五十里具一軍又五十里為一逐合為兵車二百五十乗餘方五十里者一定出賦五十乗合三百乗男之國也由是推而上之七十里而具二軍又七十里而具二遂畧當一同合為兵車五百乗加一同定出賦百乗軍賦合六百乗伯之國也百里而具三軍又百里而具三遂合為兵車七百五十乗加二同有半出賦二百五十乗軍賦合千乗公之國也伯二同則方百四十一里公四同有半則方二百一十里子下同于男侯上同扵公是謂分土惟三自是而外則附庸也山川也土田也雖未必皆其所有皆在封疆之内矣今夫顓㬰昔者先王以為東蒙主且在邦域之中矣此附庸在封疆之證也居常與許復周公之宇此土田在封疆之證也奄有龜蒙遂荒大東奄有鳬繹遂荒徐宅此山川在封疆之證也封疆之内附庸山川土田皆在焉然皆非出軍制賦之壤故地方七百里而止扵革車千乗則舉封疆而言雖七百里猶可而況五百里四百三百里二百里百里乎故于天子言千里者兼軍賦而言之于諸侯言百里七十里五十里者獨舉軍制而言也于天子言萬乗者以賦法通率也于諸侯言千乗者兼軍賦而言也于諸公言五百里諸侯言四百里伯言三百里子言二百里者包山川土田附庸于封疆也于諸男言百里者獨舉其出軍賦之封彊也凡此者皆省文而互見若異而相通何嘗纎毫牴牾哉且先王之于諸侯豈其封疆一定而遂無所勸懲哉公之地錫之山川土田附庸合五百里而止侯伯子亦然男之百里所自有有慶而益以地則豈以百里為拘哉存男之百里以見自有之封疆耳公侯伯子慶而益責而削皆在封疆之中矣此周公之定制而成王廣魯以七百里則慶周公云耳非周公之制所得而拘也于齊有錫履焉于衛有畛封土畧焉扵衛侯奄受北國焉山川土田附庸或得其全或得其偏皆封疆之數也與武成孟子之言盖相表裏矣然則其食者半三之一四之一諸儒之説孰是乎曰皆非也鄭司農謂所食租税之數男適五十里是大國貢輕小國貢重也鄭康成謂公以一易侯伯以再易子男以三易是大國土沃小國土瘠九等自不易至再易而止未有三易者豈諸侯之地皆無不易者哉康成之説既不通司農之説又倒置輕大而重小是侮弱而畏强也豈所謂裒多益寡稱物平施周道如砥其直如矢者哉子産曰先王班貢輕重以列列尊卑重甸服也甸非侯甸之甸乃祭公所謂邦内甸服也畿外諸侯則列尊卑重矣公半侯伯三之一子男四之一不亦尊重而卑輕乎康成曰大國貢重正之也小國貢輕字之也其意是矣柰何以一易再易三易為説也授之沃壤而貢重子之瘠土而貢輕是乃適當然烏在其為正之字之哉嘗以王食其半三之一四之一為正然王食豈盡取其所税哉諸侯以什一取民王又以什一取諸侯則四之一者是乃四十之二耳甸稍縣都皆無過什二于其什一之中概取其二焉此甸服之所以列卑貢重歟陳氏禮書曰夫列爵惟五所以稱其徳分土惟三所以等其功徳異而功有所同故公侯之地同于百里子男之地同于五十里地同而附庸有所異故諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地方一百里盖三等之地正封也五等之附庸廣封也正封則尺地莫非其土一民莫非其臣尊者嫌于盛而無所屈卑者嫌于削而無所伸故公之地必下而從侯男之地必上而從子至于廣封則欲上之政令有所統而不煩下之職貢有所附而不費又非諸侯得以擅之也而尊者不嫌于太多卑者不嫌于太寡故公之地必五百里而異于侯男之地止百里而異于子也朱氏語録曰向来君舉進制度説周禮封疆方五百里是周圍五百里徑只百二十五里方四百里者徑只百里方三百里徑只七十五里方二百里徑只五十里方百里者徑只二十五里自竒其説與王制等語相合然本文方千里之地以封公則四公以封侯則六侯以封伯則七伯以封子則二十五子以封男則百男其地已有定數此説何如可通況男國二十五里之小則國君即今之一耆長耳何以為國君馬端臨曰按諸侯分封受地之多寡周禮大司徒職方氏所載與王制及子産孟子所言不合鄭注以為山川附庸而言先儒遂欲融㑹二説而一之如陳祥道唐仲友之論特為明暢故備録之若止齊徑圍之説則侯伯子之地僅可脗合而公之地多二十五里男之地僅得五十里之半其與王制孟子所言均之為齟齬不合耳封國疆制總論論國家制度固當考古以證今而縁今亦可以考古盖古聖王之制度盡善盡美可法可𫝊凡後世法制雖未必盡循其轍跡然亦多監視前代以為之潤色古制或不可考而後之制未必不出于古也是故論三代之封建周禮大司徒職方氏其典制若具存也然參之尚書武成篇則多齟齬不相脗合自鄭康成而下論者紛如必欲合而一之如止齊徑圍之説朱子非之是矣陳祥道唐仲友若庶㡬近之要皆測度之見傅㑹之詞也盖武成分土為三止言其概孟子當戰國時正所謂諸侯惡其害已而皆去其籍其詳不可得聞也公侯百里伯七十里子男五十里亦皆其所聞之畧耳豈周禮一書𫝊在當時孟子北宫錡偶未之見至漢而始出乎況周禮既信為周公定制然本文明言方千里之地以封公則四公以封侯則六侯以封伯則十一伯以封子則二十五子以封男則百男矣安得謂公侯之地同扵百里伯子男之地同于五十里而孟子與周禮不容强合也明矣謂天子言千里者兼軍賦諸侯言百里七十里五十里者獨舉軍制也天子言萬乗者以賦法通率諸侯言千乗者兼軍賦也諸公言五百里諸侯言四百里諸伯言三百里諸子言二百里者包山川土田附庸于封疆諸男言百里者獨舉其出軍賦之封疆也夫公之封疆五百里者包山川土田附庸在其中其實食者半若與千里之地封四公各得二百五十里者合其餘二百五十里以為附庸之地者果何在也即公而侯伯子可知矣然千里之地封百男其食四之一止二十五里而男無附庸其餘七十五里又何為也是皆自相矛盾不可據以為信然也然則孟子謂百里七十里五十里者其畧亦不可信乎詩云邦畿千里惟民所止以千里之王畿萃止四海之民庶是里本以地言也以地之里言則周之步尺有定制邑井有定規矣不知里以地言亦有以人言者何也有人此有土有土此有財由人聚則土闢而財豐人散則土曠而財乏恐封國不可専以地之里數計也茍専計以地之里數則其人聚者雖地方六七十里財賦僅足以供軍國之需矣彼地廣而民則稀雖數百里不免為荒蕪荆榛之塲而國君縦撫有廣土其軍賦將何所措也是故觀于後世之州縣因里之多寡以為大小豈専以地之里言哉我朝州縣之制大者數百里中者數十里小縣不過數里者有之而里則以人户計也十户為甲百户為里百里則萬户矣是以大縣五六百里而計其地不過二三百里云耳甚有小縣止一二里者其地何止數百里哉且即周制觀之因民以授田而八家一井四井為邑四邑為丘四丘為甸四甸為縣四縣為都四都為同而井田之數在其中矣因民以為聮五家為比二十五家為閭百家為族五百家為黨二千五百家為州萬二千五百家為鄉而閭黨之數在其中矣五家為隣鄰有長二十五家為里里宰下士一人與今十户為甲甲有首十甲為里里有長雖古今鄉遂不同而里以人言者一也使封建里制専主于地即今數百里之小縣以為諸侯封國民有不足将移他國民户以授其田足其軍賦聮其鄉遂恐不能矣至于名山大川延袤數百里率以封疆之數也可乎哉可見里以地言則凡所謂百里七十里五十里不過言其大較如論語所謂方六七十如五六十云耳里以人言則凡所謂大國三軍次國二軍小國一軍不必拘拘算其有餘不足之數矣況山川阨塞各有不齊土田荒墾肥瘠亦有不等安得整然齊一無餘無欠如紙上之規畫也然則今之十甲為里不過即周禮五隣為里之制以損益又安知周禮封國之里數不與今日州縣之里數有相沿襲者乎予謂縁今亦可以證古者此也然非必欲里以人而言也特因諸儒拘泥古人之制牽扯凑合反以滋惑莫若或以地言或以人言合今古而㑹通之斯可為通儒也秦三十六郡始皇益闢地南越置桂林南海象郡閩中又收匈奴河南地為縣四十三川河南南陽南郡九江鄣郡㑹稽潁川碭郡泗水薜郡東郡瑯琊齊郡上谷漁陽右北平遼西遼東代郡鉅鹿邯鄲上黨太原雲中九原鴈門上郡隴西北地漢中巴郡蜀郡黔中長沙内史漢十三郡武帝分天下為十三郡復益為十七郡曰揵為蒼海朔方酒泉武威牂牁雋鴈門沈黎汶山武都張腋燉煌益州樂浪臨屯𤣥萸真蕃各置刺史揚荆豫兖梁幽冀青并徐益朔方交趾唐十道闗内河南河東河北山南隴右淮南江南劒南嶺南後増為十五道京畿都畿黔東山南分為東西江南分東西餘仍前宋四京二十四路東京西京南京北京浙西路浙東路福建路江南東路江南西路淮南東路淮南西路湖南路湖北路成都府路利州路梓州路䕫州路廣南東路廣南西路京西北路京東東路京東西路秦鳯路永興軍路河北東路河北西路河東路元立中書省一行省十有一古今郡國沿革昔黄帝作舟車以濟不通旁行天下方制萬里畫野分州得百里之國萬區故易稱先王建萬國親諸侯顓帝之所建帝嚳受之創制九州雍荆豫梁冀青徐兖揚日月所照莫不砥屬砥平也屬服也堯遭洪水而天下分絶使禹平水土還為九州列五服甸矦綏要荒舜攝位肇十有二州分冀為幽并析青為營封十有二山以為十二州之鎮夏氏革命又為九州㑹羣臣于塗山執玉帛者萬國四百年間逓相兼併商周受命其能存者統三千餘國亦為九州分統天下載祀六百周之初有千八百國而分天下為九畿至成王時仍曰九州屬職方氏其後諸侯相并有千二百國及平王東遷迄獲麟之末二百四十二年間諸侯征伐互相吞滅不可勝數而見于春秋經𫝊者百有七十國焉逮乎下分地里上配天象所躔定次總標十二鄭宋晉吴衛秦齊陳楚蔡祀燕陵夷至于戰國天下分而為七秦韓魏趙燕齊楚比周之亡七城而已秦皇初并天下懲㣻戰國削罷分侯分天下為三十六郡後平南越又置四郡郡置守焉漢因秦制加置郡國其後武帝攘吴開越四履彌廣分天下為十三州部置刺史至哀平之際又新置郡國斯漢之極盛矣光武中興以官多役繁乃併省郡國其後亦為十三州郡漸復加置郡國至于靈獻凡百有五四履之盛亦如前漢既而三國鼎峙魏氏據有中原有州十二司履荆豫兖青徐梁秦晉幽揚蠻蜀全制巴蜀益梁二州吴北據江南盡海置交廣荆郢揚五州然疆境之守纔得遽失多不常者晉大康武帝之後冠帶之國盡秦漢之土及永嘉元帝南渡境宇殊狹義熙以後又復青兖未幾南北分列劉宋蕭齊僻陋江左符姚劉石竊據中原梁陳宇彌促周氏削平東夏多有廢省逮隋始復合為一乃改州為郡依漢置守土地號稱極盛矣唐興武徳之初改郡為州太守為刺史權置州郡頗多至貞觀併省又因山川形便分天下為十道開元中分為十五盖南北如前漢之盛東則不及西過之梁初天下别為十一所有七十八州若後唐五國石晉七國劉漢六國郭周七國宋祖始削平偏據而大平興國中亦多所表獻于是至明末分天下為十五路其後又増三路宣和中増至二十四路地東南皆至于海西盡巴僰北際中山亦云盛矣然冀之幽朔雍之銀夏粤之交趾未入職方而契丹西夏之禍卒相尋焉元以受天明命主中華内立中書省一以領腹裏諸路外立行中書省十以領天下諸路然其地雖過于前東南島夷則未盡附惟我皇明統一華夷尊親無外輻􅊷之廣東盡遼左西極流沙南越海表北抵沙漠四極八荒靡不来庭而疆理之制則以畿京府州直𨽻六部天下則分為十三布政司以統諸府州縣都司衛所錯置于其間以為防禦總之為府一百四十九為州一百八十二為縣一千一百五而邊陲之地都司衛所及宣慰招討宣撫安撫等司亦參設焉盖地理與人和並懋廣地並昌矣問封建可行否程子曰封建之法本出于不得已栁子厚有論亦窺測得分數秦法固不善亦有不可變者罷侯置守是也栁子厚論曰天地果無初乎吾不得而知之也生人果有初乎吾不得而知之也然則孰為近曰有初為近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之盖非不欲去之也勢不可也勢之来其生人之初乎不初無以有封建封建非聖人意也彼其初與萬物皆生草木榛榛鹿豕狉狉人不能搏噬而且無毛羽莫克自奉自衛荀卿有言必欲假物以為用者也夫假物者必争争而不已必就其能斷曲直者而聽命焉其智而明者所服必衆告之以直而不改必痛懲之而後畏由是君長刑政生焉故近者聚而為羣羣之分其争必大大而後有兵有德又有大者衆羣之長又就而聴命焉以安其屬于是有諸侯之列則其争又有大者焉徳又有大者諸侯之列又就而聴命焉以安其封于是有方伯連帥之類則其争又有大者焉徳又有大者方伯連帥又就而聴命以安其人然後天下㑹于一是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子自天子至于里胥其徳在人者死必求其嗣而奉之故封建非聖人意也勢也夫堯舜禹湯之事逺矣及有周而甚詳周有天下列土田而瓜分之設五等邦羣后布履星羅四周于天下輪運而輻集合為朝覲㑹同離為守臣捍城然而降于夷王害禮傷尊下堂而迎覲者厯于宣王挾天子復古之徳雄南征北伐之威卒不能定魯侯之嗣陵夷迄于幽厲王室東徙而自列為諸侯厥後問鼎之輕重者有之射王中肩者有之代九伯誅萇𢎞者有之天下乖盭無君之心余以為周之喪乆矣徒建空名于公侯之上耳得非諸侯之盛强尾大不掉之咎歟遂判為十二合為七國威分于陪臣之邦國殄之于後封之秦則周之敗端其在于此矣秦有天下裂都㑹而為郡邑廢侯衛而為守宰據天下之雄圖都六合之上游攝制四海運于掌握之内此其所以為得也不數載而天下大壊其有由矣亟役萬人暴其威刑竭其貨賄負鋤挺謫戍之徒圜視而合從大呼而成羣時則有叛人而無叛吏人怨于下吏畏于上天下相合殺守刼令而並起咎在人怨非郡邑之制失也漢有天下矯秦之枉狥周之制剖海内而立宗子封功臣數年之間奔走扶傷而不暇困平城病流矢陵遲不救者三代後乃謀臣獻畫而離削自守矣然而封建之始郡國居半時則有叛國而無叛郡秦制之得亦以明矣繼漢而帝者雖百代可知也唐興制州邑立守宰此其所以為宜也然猶桀猾時起虐害方域失不在于州而在于兵時則有叛将而無叛州州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者茍其心思遷其秩而已何能理乎余又非之周之事迹㫁可見矣列侯驕盈黷貨事戎大凡亂國多理國寡侯伯不得亂其政天子不得變其君私土子人者百不有一失在于制不在于政周事然也秦之事迹亦斷可見矣有理人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡邑不得正其制守宰不得行其理酷刑苦役而萬人側目失在于政不在于制秦事然也漢興天子之政行于郡不行于國制其守宰不能制其侯王矦王雖亂不可變也國人雖病不可除也及夫大逆不道然後掩捕而遷之勒兵而夷之耳大逆未彰奸利浚財怙勢作威大刻于民者無如之何及夫郡邑可謂理可安矣何以言之且漢知孟舒于田叔得魏尚于馮唐聞黄霸之明審覩汲黯之簡静拜之可也復其位可也臥而委之以輯一方可也有罪得以黜有能得以賞朝拜而不道夕斥之矣夕受而不法朝黜之矣設使漢室盡城邑而矦王之縦令其亂人戚之而已孟舒魏尚之術莫得而施黄霸汲黯之化莫得而行眀譴而導之拜受而退矣違矣下令而削之締交合従之謀周于同列則相顧裂䀝勃然而起幸而不起則削其邑削其民猶瘁矣曷若舉而移之以全其人乎漢事然也令國家盡制郡邑連置守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏商周漢封建而延秦郡邑而促尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循不革而二姓凌替不聞延祚今矯而變之垂二百祀大業彌固何係于諸矦哉或者又以為殷周聖王也而不革其制固不當復議也又大不然夫殷周之不革者是不得已也盖以諸侯歸殷者三千焉資以黜夏商不得而廢歸周者八百焉資以勝殷武王不得而易狥之以為安仍之以為俗湯武之所以不得已也夫不得已非公之大者也私其力于已也私其衛于子孫也秦之所以革之者其為制公之大者也其情私也私其一已之威也私其盡臣畜于我也然而公天下之端自秦始夫天下之道理安斯得人也使賢者居上不肖者居下而後可以理安今夫封建者繼世而已繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也将欲利其社稷以一其人之視聴則又有世大夫世食爵禄邑以盡其封畧聖賢生于其時亦無以立于天下封建者為之也豈聖人之制使至于是乎吾固曰非聖人之意也勢也五峯胡氏曰封建之法始于黄帝成于堯舜夏禹因之至桀而亂成湯興而修之天下以安至紂而又亂文王武王興而修之天下亦以安至幽王而又亂齊桓晉文不能修而益壞之故天下紛紛不能定及秦始皇而掃滅之故天下大亂争起而亡秦猶反覆手于須臾間也黄帝堯舜安天下非封建一事也然封建其大法也夏禹成湯安天下亦非封建一事也然封建其大法也文武安天下亦非封建一事也然封建其大法也齊桓晉文之不王非一事也然不能封建其大失也秦二世而亡非一事也然掃滅封建其大謬也故封建也者帝王之所以奉天理承天心公天下之大端大本也聖人制四海之命法天而不私已盡制而不曲防分天下之地以為萬國而與英才共焉誠知天下之無常不可以私守之也故農夫受田百畆諸侯百里天子千里農夫食其力諸矦報其功天子享其徳此天之分也郡縣天下可以持承平而不可以支變故封建諸侯可以持承平亦可以支變故朱子曰栁子厚以封建為非胡明仲輩破其説則専以封建為是要之天下制度無全利而無害底道理但看利害分數如此封建則根本較固國家可恃郡縣則截然易制然来來去去無長乆之意不可恃以為固也封建實是不可行若論三代之世則封建好處便是君民之情相親可以久安而無患不似後世郡縣一二年輒易雖有賢者善政争做得成封建只是歴代循襲不容已栁子厚亦説得是賈生謂樹國必相疑之勢甚然封建後來自然尾大不掉之勢成周盛時能得幾時到春秋列國强盛周之勢亦浸㣲矣後來到戰國東西周分治赧王但寄于西周公耳雖是聖人法豈有無弊問後世封建郡縣何者為得曰論治亂畢竟不在此以道理觀之封建之意是聖人不以天下為已私分與親賢共理但其制不過大此所以為得賈誼于漢言衆建諸侯而少其力其後主父偃竊其説用之于武帝或論郡縣封建之弊曰大抵立法必有弊未有無弊之法其要只在得人若是箇人則法雖不善亦占分數多了若非其人則有善法亦何益于事且如説郡縣不如封建若封建非其人且是世世相繼不能得他去如郡縣非其人却只三兩年任滿便去忽然換得好底来亦無定范祖禹唐鑑議論大率歸于得人某初嫌他恁地説後来思之只得如此得或問胡五峯論封建井田數事以質疑曰封建井田乃聖人之制公天下之法豈敢以為不然但在今日恐難下手假使强做得成亦恐意外别生弊病反不如前則難收拾耳馬端臨曰秦既并天下丞相綰請分王諸侯大尉斯請罷封建置郡縣始皇從之自是諸儒之論封建郡縣者歴千百年而未有定説其論之最精者李斯王綰曽元首則主綰者也李百藥栁宗元則主斯者也二説互相排詆而其所發明者不過公與私而已曽元首之説曰唐虞三代公天下以封建諸侯故享祚長秦私天下以為郡縣故𫝊世促栁則反之曰秦公天下者也眉山蘇氏又従而助之曰封建者争之端亂之始篡弑之禍莫不由之李斯之論當為萬世法而世之醇儒力詆之以為二氏迺反理之評詭道之辨而妄議聖人然則後之立論者宜何從以封建為非也是帝王之法所以禍天下後世也以封建為是也則栁蘇二子之論其剖析利害指陳得失莫不切當不可廢也愚嘗因諸家公私之論而折衷之曰封建郡縣皆所以分土治人未容遽曰此公而彼私也然必有公天下之心然後能行封建否則莫如郡縣無公天下之心而欲行封建是授之以作亂之具也嗚呼封建之難行久矣盖其弊不特見于周秦之際而已見于三代之初何也昔者唐虞之世建國至衆也天子巡狩而諸侯述職然後敷納以言明試以功車服以庸書之所載如此而已不聞其争土地以相侵伐奸王畧以勤六師也舜之時蠻夷嘗猾夏矣而命皋陶以修五刑五流之法有苗嘗弗率矣雖命禹以徂征卒之以舞干羽而格則是亦不戰而屈之也夫蠻夷有苗皆要荒之外而王政所不加者也而士師足以治之不戰足以屈之則當時四岳十二牧所統之國其謹侯度以奉其上而不勤征討也審矣又得如柳氏所謂郡縣之分其争必大大而後有兵如蘇氏所謂争之端而亂之始乎所以然者何也則堯舜公天下之禪受有以服之也盖堯在位七十載詢于衆庶以帝位授之舜舜在位三十有三載詢于衆庶以帝位授之禹而當時之衆建諸侯也有徳者爵之功加于民者爵之堯舜無容心居天下之上而與天下之賢且能者分治之逮其倦勤則必求天下之有聖徳者而禪受夫惟天子不以天下自私而後諸侯不敢以其國自私是以雖有土地之廣人民之衆甲兵之强其勢足以為亂而莫不帖服于其下如臂指之相使以為當然是則唐虞以公天下之心行封建而當時封建所以無弊也盖家天下自夏始夫封同姓而命之曰藩屏王室自周始二者皆聖人隨時制變以綱維斯世未嘗以私議之也然上視堯舜則少褊矣故封建始于夏而成于周是以禹一𫝊而啟有有扈氏之征再𫝊而仲康有羲和之征夫以天子而征諸侯諸侯弗率而上干天子之征禹之前無有也而始于有扈夫有扈之罪曰威侮五行怠棄三正而已羲和之罪曰沈湎于酒畔宫離次而已二罪者以法議之則誅止其身而二人生于漢世則一廷尉足以定其罪矣而啟與仲康必命六師以征之者則必恃其土地甲兵不即引咎而悍然以抗其上矣書紀其事曰大戰曰徂征而觀其誓師之詞有不用命之戮焉有愛克厥威之戒焉殱渠魁釋脅従之令焉則兵師之間所傷衆矣夫治一人之罪而至于興師使無辜之人受用兵之禍則封建之敝也故曰已見于三代之初此之謂也夫有扈羲和之罪雖王政所必討而比之猾夏則有間矣舜之時士師眀刑足以正蠻夷猾夏之罪而啟少康之時非天子總六師不足以治諸侯怠慢沈湎之過則可以見當時諸侯擅其富强非文誥禁刑之所能詰也自是而後天子私其天位而世守之諸侯亦私其國之土地甲兵而擅用之幸而遇賢聖之君徳足以懐威足以制則猶可懾服而其中衰之際人心未離而諸侯先叛之至于周列五等邦郡後雖曰親賢並建而終不以異姓先諸姬文昭武穆之封遍于天下封建之法益詳經制益宻而示人益𥚹矣是以夏商有國數百年茍未至桀紂之暴猶足以制宇内而朝諸侯而周數𫝊而後即有末大不掉之憂故景王之責晉曰文武成康之建母弟以藩屏王室亦其廢墜是謂棄如弁髦而因以敝之而李斯之説亦曰周文武所封子弟同姓甚衆然後屬疏逺相攻擊如仇讐周天子弗能禁也然則其效可覩矣盖時不唐虞君不堯舜終不可復行封建謂郡縣之法出于秦而必欲易之者則書生不識變之論也夫置千人于聚貨之區授之以挺與刃而欲其不為攘奪矯䖍則為王者必有伯夷之亷伊尹之義使之靡然潛消其不肖之心而後可茍非其人則不若蔵挺與刃嚴其檢制而使之不得逞此後世封建之所以不可行而郡縣之所以為良法也王綰淳于生之徒乃欲以三代不能無敝之法使始皇行之是教盜跖假其徒以利器而與之共處也則亦不終曰而刃劘四起矣或曰禹之𫝊子周之封同姓皆聖人之經制也而子顧妄議其私天下而以為劣于唐虞何哉曰世之不古久矣聖人不能違時不容復以古之法治之也而世固不能知聖人之心也記曰有虞氏未施信于民而民信之夏后氏未施敬于民而民敬之殷人作誓而民始畔周人作㑹而民始疑然則殷周其果變于虞夏乎而或畔或疑起于誓㑹者以時人之不皆聖人也禮運載夫子言大道之行天下為公選賢舉能講信修睦而終之以謀閉而不興盜竊亂賊而不作以為大通大道既隠天下為家各親其親各子其子而繼之以謀用是作而兵由此起禹湯文武成王周公由此其選是為小康然則官天下與家天下者其規模之廣隘治效之優劣雖聖人不能比而同之矣萬章曰人有言至于禹而徳衰不𫝊於賢而𫝊于子而孟子累數百言辨之以為皆天也然則知禹之𫝊子非私者千載而下一孟子而已豈可復望之當時諸侯乎世本稱有扈氏以堯舜𫝊賢而禹𫝊啟故啟立而不服遂征之然則非愚之臆說也按文中子後序言太宗嘗讀周官辨方正位體國經野設官分職以為民極之言嘅然嘆曰不井田不封建不足法三代之治然則詔羣臣議封建必是時事也後之儒者往往追恨當時諸臣不能将眀英之美意使生民復見三代之治以為遺憾愚嘗論之以為必能備究古今之事情然後可以㫁其議論之是非法制之得失盖封建一事漢以来未嘗廢也然行之輒利少而害多其故有二一則不能存三代之公心二則不能存三代之良法公心者何昔文武成康之衆建諸侯也有徳有功者則畀之初未嘗専以私其宗親雖曰兄弟甥舅之邦然所封皆極一時之選若其果賢則㣲子尹東夏蔡仲君蔡邦雖仇讐不廢也若其不賢則管蔡為戮五叔無官雖同氣不恕也至漢則且私且忌故始則勦滅異代所建國而盡以畀其功繼則勦滅異姓王而盡以畀其同宗又繼則勦滅疎屬劉氏王而盡以畀其近親而其所建置若濞若長之徒初無功徳足以君國子民特以其近親而王之故不旋踵而犯上作亂墟其國殞其身矣葢有先王之公心則其弊不至于此良法者何昔先王之建邦也上有方伯連率下有公矦伯子男小大相維尊卑相制如公侯受封之地雖多而制禄不過十倍其卿成國不過半天子之軍名山大澤不以封必賜弓矢然後征必賜圭瓉然後鬯有巡狩有述職有慶有讓綱紀未嘗一日隳也若漢初諸侯王則界以大城名都連數千里未嘗為之分限山澤蓄積在其國者不領于天子之大農五嶽四瀆在其國者不領于天子之祠官故為諸侯者一受封之後即自負其富强摘山煑海招納亡命擅爵人赦死罪天子不能訶謀臣不敢議所以縦恣之者如此及景武之後則作佐官之律嚴附益之法吹毛求疵積毁銷骨所以猜防之者復如此盖方其縦恣也則畏之有同乎敵國及其猜防也則抑之不啻如謫徙矣盖有先王之良法則其弊不至于此由漢而来有天下者未嘗不王其昆弟子姓而名之曰封建然其得失與漢無以大相逺盖其初也惟務私其宗親未嘗擇有徳而授之意故有徳者不皆可使南面之人徳復不能固結以恩義繩律之以法度故仁恕者則流于縦恣西晉是也尅核者則過于猜防曹魏是也而晉魏皆縁是以亡是豈封建誤之哉先王之意之法不存而强慕美名則適足為禍亂之階且唐太宗亦好名之主然審時量已固自不能存帝王之心而行帝王之事矣故刺史世襲之詔不久而遂停而當時諸臣雖以魏鄭公之賢亦以為事雖至善時即未遑而有五不可之説盖其度之審矣如顔師古之議欲封建與郡縣並行王侯與守令錯處則漢初已嘗如此至景帝令諸侯王不得治民補吏而漢置内史以治其地則封建之名悉為郡縣矣盖古之所謂諸侯即後之所謂守令然自漢中葉以後王侯之與守令始判然為二承流宣化而實有治人之責者守令也食租衣税而但襲茅土之封者王侯也今欲並建則凡王侯受封之地必盡廢内史之官即付之兵民之任而後可但恐恣縱専擅犯上作亂復如漢初之事容之則廢法而貽子孫之深憂誅之則傷恩而失封建之初意矣又況魏晉以後王侯多是虛封有三分食一四分食一五分食一者又有非其境内之地而遥封者如元魏之以㑹稽蒼梧建鄴丹陽等郡封其臣為公侯之類是也盖户封既為虛名則受封者之俸禄必仰給于縣官而出納之吝有所不能免于是遂有虛食真食之異今欲盡復舊制則王侯受封之地既瓜分賦隨之京師府蔵頓鮮無以供軍國之用非君上之利也又王侯于所受封之郡邑既無撫字之責而徒利租賦之入于是一意侵漁不顧怨讟為封户者甚于征𣙜非百姓之利也又所謂王侯者非子弟即勛臣素號名貴人華屋玉食之奉于京師為宜今使之塊處外郡朝不坐宴不與憂䜛畏譏此綘侯之所以恐懼長孫司空之所以怨望然則又非受封者之利也夫封建者古帝王所以建萬世之長䇿今其公心良法一不復存而顧强希其美名以行之上則不利君中則不利臣下則不利民而方追咎其不能行此書生之論所以不能通古今之變也封建郡縣總論天生斯民而樹之君使師牧之人君代天子民所以治安之者其大要有二曰封建曰郡縣是已古今論者不一或謂封建公天下之大端大本或謂郡縣公天下之法或以周秦公私定國祚之短長或又委諸不得已之時勢焉是故由今論古封建出自聖人公天下之心無疑也然禹之興也玉帛者萬國湯之興也来歸者三千武王之興也不期而㑹者八百當其時即欲禹湯武變易封建以為郡縣勢不可也且即萬國三千八百言之侯國漸減封彊漸廣非一日之積矣𫝊至春秋大并小强吞弱戰國兵争磨滅殆盡始皇悉兼併為一統是時争奪成風若又封之國土授之兵甲羣雄角立戰争之禍何時已哉是秦之罷侯置守亦勢也今之論者且無謂封建出自聖王郡縣出自李斯須即二者較其利害多寡為萬世計長久可也嘗論古今經國之大勢重封建則權在諸侯王而郡邑悉統于侯封之中重郡縣則權在監司守令而侯封悉寓于郡邑之内惟郡邑統于侯封則守宰廢置悉聴命于諸侯王而政令悍猛世代一轍雖聖人復生無所用之雖虐用其民民無敢誰何且結隣植黨聲勢相倚雖天子命令輒阻格不行矣惟侯封悉寓于郡縣則侯王守令一皆聴命于天子而截然易制所以由三代迄今凡悖上作亂荼毒生靈悉出扵侯邦而未見有梗化之守宰概可考而知也況此二者法本相須行之厯代非判然不相闗也今果謂封建行于夏商周而止于秦郡縣行于漢唐宋而起于秦乎彼秦廢古聖王善政不獨封建一端而封建其大者遂至孤立而亡無足言也然則大封同姓王三庶孽分天下半卒乃釁萌七國㡬亡漢祚西晉諸王擅兵搆亂畧與漢同唐宋宗藩雖各封公封王亦止食租衣税于京師謂其法制未善則可實未嘗盡廢之不講也可見漢晉唐宋専任守令雖侯王之尊不得領師牧之責所以謂重郡縣則侯封寓于郡縣内者此耳然封建之善莫過于三代其所以享祚長者豈盡由封建之制乎觀禹一𫝊而啟有有扈氏之征再𫝊而仲康有羲和之征廢大康者后羿也弑帝相者寒浞也韋顧昆吾黨桀肆虐而亡夏之天下者非夏之諸侯乎崇黎有奄助紂為暴而亡商之天下者非商之諸侯乎周武分封未幾挾武庚以叛周者管蔡霍也非姬姓之諸侯乎王室陵夷至下堂見諸侯甚則射中王肩問鼎輕重周鄭交質繻葛倒置弑奪篡逆無國無之其中土廣兵强者反圖霸僭王陵逼天子互相吞噬肝腦塗地斯民惴惴然不聊生者數百年皆諸侯為之亂階也正由甲兵田賦盡在其掌握其敝必至尾大不掉之勢使之耳孰云法制出于聖人盡有利而無弊耶然則三代封建耳矣乃云郡邑寓于封建之内何耶盖撫有一國之民者諸侯也分理一國之郡縣而最為親民者郡邑宰也周公營洛因西土為千里分置百縣左傳曰上大夫受郡周禮曰四甸為縣縣正下大夫一人縣與邑不同而四井為邑州與郡不同而五黨為州呉起為西河守黔夫為徐州守郡守也季氏使閔子騫為費宰子㳺為武城宰縣邑宰也自千里之王畿及五等之封國莫不有州有縣此皆周室井邑之制而謂縣邑寓于侯封中者非耶始皇大其郡制以領縣邑而封建雖已廢矣然東㳺海上稱頌功徳有列侯在焉如徹侯闗内侯特無實封之彊土耳是藩屏不固斯基本易摧秦之亡也固未必不闗乎封建之廢而其所以亡者實于郡縣無與也但論者又謂諸侯各有封土則思永保其土各有分民則思永保其民民亦世服其統轄而有固志所以各國小大相維夾輔王室惟封建則然彼守宰遷徙靡常未免視郡邑如𫝊舎雖有賢人美政不獲俟其徳化之成此所以秦而下其政教不三代若也孰知諸侯王有功徳者多在始封之君繼世率皆膏粱子弟凡卿大夫亦皆世官故世禄之家鮮知民瘼曷若守令出于選舉而考課亦宻一或不肖不數載輒易者為尤愈也茍不審其利害分數概以運祚短長教化美惡一歸諸封建郡縣之制是不揣其本而齊其末也夫本者何天之立君與君之承天皆為民也封建郡縣之制賢哲俊乂之求宗社靈長之䇿皆所以為民也為民乃為君也豈徒為周之姬秦之嬴子孫世世享有富貴福澤云乎哉孔子曰其或繼周者雖百世可知也世代有興必有亡法制有因必有革理勢之必然也是故人君心乎為民則必求賢才與之共理凡經綸顯設皆為生民計則民安而享祚長也禹湯文武所以為聖君三代所以有道之長者此也心不在乎民而止為身家子孫計慮則日與籌畫者皆富貴之徒掊尅彊禦靡届靡究故民危而運祚促也始皇所以為暴虐之主秦所以二世而亡者此也以公私論者亦準諸此耳不然湯非富天下武非敵百姓𫝊賢𫝊子孟子何以總歸之天也所以封建之設帝王公天下以為民也又豈必官天下者然後可以行封建哉始皇失在虐民不能體天心以愛養元元不可為上天之宗子失不在郡縣之法也世儒因郡縣出自始皇而詆訾之何異木綿頒自前元必使天下盡廢木綿之利盡仍先王蠶絲麻枲而後可也噫今天下普木綿之恵矣蠶絲麻枲未之廢也今天下安郡縣之制矣侯王封爵未之廢也猗歟休哉保我子孫黎民尚益有利哉圖書編卷八十六
