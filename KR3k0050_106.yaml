body:
  text: 圖書編卷一百六明章潢撰鄉飲酒禮總敘鄉飲酒之禮夏殷之世無所考周制五禮之目是為禮之一凡禮之所紀冠婚喪祭皆自士以上乃得行之而鄉飲酒之禮逹於庶民因其聚會之際與之揖讓升降使知尚賢尊長而興敬讓之道焉考之經傳其説有三鄉大夫三年大比獻賢者能者於其君以禮禮賔之而與之飲酒一也黨正國索鬼神而祭祀則以禮屬民飲酒而正齒位二也州長春秋習射於序先行鄉飲酒禮三也夫用之州黨而亦謂之鄉者先儒以為州黨鄉之屬也或鄉大夫而觀禮或鄉大夫居此黨內故亦以名之也其正齒位之説見於周官者一命齒於鄉里再命齒於父族三命而不齒見於禮記者六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆而儀禮鄉飲酒之篇不著其文故先儒以為今之存者乃鄉大夫之事而黨正之禮亡矣漢制郡國十月行鄉飲酒禮蓋用正齒位之説魏晉以下間或行之其詳不可得而聞李唐兼采二説賔興賢能則以刺史或上佐為主其制皆倣於古而小損之有主賔介而無僎其樂則歌笙間合各一作而不備正齒位則行於冬季主用縣令復降殺其禮無僎賔介賔不設折爼易脯醢為葅醢其作樂如上趙宋淳化三年詔有司講其禮命學士蘇易簡倣古樂章作鹿鳴南陔嘉魚崇丘關睢鵲巢之詩凡三十四章後不果行正和中有司參奏酌古制於州軍貢士之月以禮飲酒用知州軍事或本州佐官為主提舉學事司所在則提舉為主上舍生當貢者與州之羣老為衆賔其登降之節與舉酒作樂器用之類並參照辟雍宴貢士之儀紹興十三年禮部奏修定儀制頒下郡國於科舉之嵗行於學校是日賔主先舍菜於先聖先師然後行禮並不作樂蓋本用賔興賢之説而已仕未仕者以齒序位於兩廊則亦兼取黨正之文至其登降之容獻酬之節較於唐尤簡略焉十七年左迪功郎陳介乞言郡國所行鄉飲嵗數乃命諸州三嵗科舉之年行之其願每嵗一行者亦從其便二十六年又命願行於里社者聽官不得預其可考者如此國朝受命戡定海內即詔有司稽古考文定為一代之制於是取儀禮及唐宋所行參酌損益為鄉飲酒禮又參周官屬民讀法之旨於行禮之中一人升讀律令縣邑則嵗一行之於學校里社則季一行之里中蓋本於正齒位之説而賔興賢能春秋習射亦可通用焉鄉飲酒義曰賓主象天地也介僎象隂陽也三賔象三光也讓之三也象月之三日而成魄也四靣之坐象四時也六十者坐五十者立侍以聽政役所以明尊卑也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也周禮圖説曰鄉飲酒之禮失禮經之旨者二其一賓僎介主之義不明也其一設席之不正也夫所謂鄉飲者以養老為義也天子養老於大學諸侯養老於國學是故卿大夫養其鄉之老者於鄉學也故所謂主者即鄉大夫也所謂賓者乃一鄉中齒德之至尊者也所謂介者齒德亞於賓所以輔賓者古人每事必有介以輔其不及也所謂僎者何也衆賓中之貴者也儀禮曰賓若有尊者諸公大夫則既一人舉觶乃入席於賓東是也所謂諸公大夫者謂天子之三公卿大夫致政而在鄉者也茍序爵而躐居賓之位則屈夫齒而失養老之義序齒而降居賓之下則屈其爵而非貴貴之禮故别設位於賓之東居之周禮黨正飲酒於序以正齒位三命而不齒即此位也三賓介僎之儀既明而後其位可得而正矣夫堂上之位莫尊於南靣之正中以其有尊故坐賓於西北謂在北靣南靣稍西也僎則席於賓之東尊與賓並也介則賓於西北謂在北靣南靣稍西也僎則席於賓之東尊與賓並也今則賓階上東靣以受生氣亦尊者所居也主則阼階上西靣其位為卑自卑而尊人也故所謂南北者謂在北而稍西東北者在北而稍東西南者在南記言僎以介主人而誤也其坐位則四隅相向古未嘗有此坐向語云席不正不坐茍於此尚得為正乎觀於儀禮賓升席自一方介主人升席自北方降自南方蓋設必正方故升亦正方且記亦曰賓必南向介必東向今人設四隅之向者因記言四隅之位而誤也按禮記鄉飲酒義發明切當但亦有純駁班如者不能不啓後人之惑如云介僎象日月復云立三賓以象三光是三賓俱為日月矣且大賓主於一唯主人獻衆賓則衆賓之長升拜受者三人耳何嘗有所謂三賓乎其曰僎以輔主人贊乃主人之輔僎亦賓也何得言坐僎於東北以輔主人乎夫堂上之位以向明為尊其次則東靣以受生氣為尊賓與僎既南向則介自當東靣主人居南而西靣亦必然之理何必以溫和之氣配僎與主嚴凝之氣配介與賓而反失僎賓介立之大義乎古人制禮哭踊揖讓必成於三其曰讓之三也象月之三日而成魄則哭踊豈亦象月而為之即羞出自東房烹狗於堂東北皆出自主人之意而曰祖陽氣之發於東方皆不免於傅會也皇朝大誥鄉飲酒禮鄉飲酒禮朕本不才不過申明古先哲王教令而已所以鄉飲酒禮敘長幼論賢良别姦頑異罪人其坐席間年髙有德者居於上髙年淳篤者並之以次序齒而列其有曾違條犯法之人列於外坐同類者成席不許干善良之席主者若不分别致使貴賤混淆察知或坐中人發覺主者坐以違制姦頑不由其主紊亂正席全家移出化外的不虛示嗚呼斯禮始古先哲王之制安良民於宇內亘古至今興者鄉里安鄰里和長幼序無窮之樂又何言哉今特申之從者昌否者亡鄉飲酒禮律儀一鄉飲酒禮每嵗正月十五十月初一日二次舉行一各處府州縣於儒學行鄉飲酒禮一應酒殽俱係官錢糧內從實酌量支辦務要豐儉得宜一凡府州縣行鄉飲酒禮除僎賓外衆賓序齒列坐其僚屬則序爵一鄉飲之設所以尊髙年尚有德興禮讓敢有喧譁失禮者許揚觶者以禮責之其間因而失禮者主席之人會衆罪之主府知府州知州縣知縣如無正官以佐二官代位於東南大僎以致仕官為之位於東北大賓擇鄉里年髙有德之人位於西北介以次長位於西南三賓以賓之次者為之位於賓主介僎之後司正以教職為之主揚觶以罰之贊鄉飲酒儀洪武十六年頒行鄉飲酒禮圖式一各處府州縣每嵗正月十五日十月初一日於儒學行鄉飲酒禮酒殽於官錢約量支辦務要豐儉得宜除僎賓外衆賓序齒列坐其僚屬則序爵前一日執事者於儒學之講堂依圖陳設坐次司正率執事習禮至日黎明執事者宰牲具饌主席及僚屬司正先詣學遣人速僎賓以下比至執事者先報曰賓至主席率僚屬出迎於庠門之外以入主居東賓居西三讓報揖而後升堂東西相向立贊兩拜賓坐執事又報曰僎至主席又率僚屬出迎揖讓升堂拜坐如前僎賓介至既就位執事者唱司正揚觶執事者引司正由西階升諸堂中北靣立執事者唱僎賓以下皆報揖執事者以觶賓以下皆報揖執事者以觶酌酒授司正司正舉酒曰恭惟朝廷率由舊章敦崇禮教舉行鄉飲非為飲食凡我長幼各相勸勉為臣盡忠為子盡孝長幼有序兄友弟恭內睦宗族外和鄉里無或廢墜以忝所生讀畢執事者唱司正飲酒飲畢以觶授執事唱揖司正揖僎賓以下皆報揖司正復位僎賓以下皆坐唱讀律令執事者舉律令案于堂南向引禮引讀律令者詣案前北向立唱僎賓以下皆拱立行揖讓如觶儀然後讀律令有過之人俱赴正席立聽讀畢復位執事者唱供饌案執事者舉饌案至賓前次僎次介次主三賓以下各以次舉訖執事者唱獻賓主席起北靣立執事斟酌酒以授主主受爵詣賓前置于席稍退贊兩拜賓答拜訖執事者又斟酒以授主主受爵詣僎前置于席交拜如前儀畢主退復位執事者唱賓酬酒賓起僎從之執事者斟酒授賓賓受酒詣主前置于席稍退贊兩拜賓僎主交拜訖各就位坐執事者分左右立介三賓衆賓以下以次斟酒於席訖執事者唱徹饌侯徹饌案訖唱僎賔以下皆行禮僎主僚屬居東賓介三賓衆賓居西贊兩拜訖唱送賓以次下堂分東西行仍三揖出庠門而退鄉飲酒禮考附禮記鄉飲酒之義主人拜迎賓于庠門之外入三揖而後至階三讓而後升所以致尊讓也盥洗揚觶所以致潔也拜至拜洗拜受拜送拜既所以致敬也尊讓潔敬也者君子之所以相接也君子尊讓則不爭潔敬則不慢不慢不爭則逺於鬬辨矣不鬬辨則無暴亂之禍矣周禮鄉大夫之職三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位射義曰卿大夫士之射也必先行鄉飲酒之禮孔子曰吾觀于鄉而知王道之易易也按先儒謂鄉飲有四一則三年賓興賢能二則鄉大夫飲國中賢者三則州長習射四則黨正蠟祭今世所行惟存一鄉大夫飲國中賢者耳夫鄉飲之名始于成周漢唐以來亦間行之然無定制我太祖御製大誥有云鄉飲酒禮不過申明古先哲王教令而已所以鄉飲酒禮敘長幼論賢良别姦頑異罪人其坐席間年髙有德者居于上年髙淳篤者並之以次序齒而列其有曾違條犯法之人列于外坐同類者成席不許于良善之席主者若不分别致使貴賤混淆察知或坐中人發覺主者坐以違制姦頑不由其主紊亂正席全家移出化外大哉王言其垂世警俗之意深矣射飲鄭玄鄉射禮目録云州長春秋以禮會民而射於州序之禮謂之鄉者州乃鄉之屬鄉大夫在焉故不改其禮周禮鄉老及鄉大夫三年正月獻賢能之書于王退而以鄉射之禮五物詢衆庶諸侯之鄉大夫既貢士于其君亦用此禮射而詢衆庶也按疏曰禮若緩而實急若輕而實重者射也先王患人不知其急而緩之不知其重而輕之故於鄉射以習禮樂於燕射以致安譽於賓射以通好於大射以擇士故古者諸侯之射必先行燕禮卿大夫之射必先行鄉飲酒之禮故燕禮所以明君臣之禮鄉飲酒之禮所以明長幼之序者蓋燕於鄉飲則有恩明君臣與長幼則有義有恩有義然後以射而觀其德行此人所以樂為之也又按儀禮燕禮與大射儀相屬鄉飲酒禮與鄉射禮相屬即敖繼公所謂士與其鄉之士大夫會聚於學宫鄉飲酒而習射者也今制所定止鄉射禮故曰飲射射禮考周禮鄉大夫退而以鄉射之禮五物詢衆庶問求其人一曰和發而中節二曰容動皆合行三曰主皮不失正鵠四曰和容容比于禮五曰興舞節比于樂州長春秋以禮會民射于州序按儀禮射有三大射賓射燕射天子諸侯卿大夫皆有之士無大射而有賓射燕射後世禮廢之後而所謂射者惟用之于戰陳用之以為禮節者蓋微矣我聖祖欲以之取士以復古人擇士澤宫之制而不果既而頒其圖式儀注于天下非但以是教士子而必俾學官與有司習射焉按藍田吕氏曰射義言射者男子之所有事者也天下無事則用之於禮義故有大射鄉射之禮所以習容習藝觀德而選士天下有事則用之於戰勝故主皮程力所以禦侮克敵也吕氏曰諸侯之射大射也卿大夫士之射鄉射也射者男子之事必飭之以禮樂者所以養人之德使之周旋中禮也蓋燕與鄉飲因燕以娛賓不可以無禮故有大射鄉射之禮禮不可以無義故明君臣之義與長幼之序焉大射總敘古之射禮有五一曰大射二曰賓射三曰燕射四曰鄉射五曰主皮之射大射者天子將祭於郊廟與助祭之諸侯羣臣射于射宫而擇其賢者使與於祭是也諸侯孤卿大夫將祀其先祖亦以是禮而擇士均謂之大射賓射者諸侯朝於天子而天子與之射于路門之外者是也列國之君相與朝聘及卿大夫士私與其賓客行其射禮亦均謂之賓射燕射者天子勞使臣及與其羣臣飲酒而射于寢者是也諸侯與其臣下卿大夫士其家人之屬燕飲而射者亦均謂之燕射鄉射者州長春秋以禮屬其民而習射于序者是也卿大夫以鄉射之五物詢衆庶而射于庠亦均謂之鄉射然天子以六耦射三侯五正樂以騶虞九節諸侯以四耦射二侯三正樂以貍首七節孤卿大夫以三耦射一侯二正樂以采蘋五節士以三耦射犴侯二正樂以采蘩三節則其上下之辨未嘗不明也是四射者以禮樂將之謂之禮樂射故曰其容體比于禮其節奏比于樂而中多者乃得預于祭又曰進退周旋必中於禮內志正外體直然後持弓矢審固持弓矢審固而後可以言中此可以觀德行矣是故聖王務焉主皮之射者庶人之事田獵分禽之射也張獸皮而射之無正鵠之制主獲而尚力無禮樂之飾故曰禮射不主皮明非君子之所貴而四射尚矣秦滅先王之籍古禮殘缺幸存而可知者諸侯大射與州長鄉射二篇而已其天子之禮見於周官者略不備兩漢以下有天下國家者因仍簡陋以為政至其君臣遊燕之際從事于弧矢者未嘗無之大抵皆主皮尚力之陋而古法泯墜莫知講求惟唐開元中頗嘗論著儀式其一曰皇帝射于射宫其一曰皇帝觀射於射宫粗采古禮而損益之雖具于禮官而舉行希濶至宋太宗淳化五年詔定其禮有司遂取唐制為大射圖并畫其冠冕儀式表著之位以進而太宗曰俟弭兵之日與卿等行之蓋亦未嘗用也及乾道間命討論燕射之義而宰執以為舊制煩苛難以遵行更定新式奏之其説槩可考見而亦末矣元制自天子公卿至郡國將佐皆有射垜翦柳之法大槩循用國俗無足采取焉國朝混一區宇修明治具考求三代之政次第行之詔成均博士弟子及郡縣庠序之士皆使習射以俟貢舉而凡郊廟之祭先期輒命文武百執事行大射之禮其儀注斟酌古今煩簡適中蔚然為一代之典焉大射義古者諸侯之射也必先行燕禮卿大夫之射也必先行鄉飲酒之禮故燕禮者所以明君臣之義也鄉飲酒之禮者所以明長幼之序也故射者進退周旋必中禮內志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德矣其節天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節騶虞者樂官備也貍首者樂會時也采蘋者樂循法也采蘩者樂不失職也故天子以備官為節諸侯以時會天子為節卿大夫以循法為節士以不失職為節故明乎其節之志以不失其事則功成而德行立德行立則無暴亂之禍矣功成而國安故曰射者所以觀盛德貍首逸下云曽孫侯氏是也樂官備者謂騶虞曰一發五􅀈喻得賢者多也吁嗟乎騶虞歎仁人也樂會時者謂貍首曰大小莫處御於君所樂循法者謂采蘋曰于以采蘋南澗之濱以采蘋喻循法度以成君事也樂不失職者謂采蘩曰被之僮僮夙夜在公射者男子之事也因而飾之以禮樂也故事之盡禮樂而可數為以立德行者莫若射故聖王務焉士者先德之行後決之於射男子主而有射事學禮樂以飾之古者天子之制諸侯嵗貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與于祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地是以諸侯君臣盡志於射以習禮樂夫君臣習禮樂而以流亡者未之有也故詩曰曽孫侯氏四正具舉大夫君子凡以庶事小大莫處御於君所以燕以射則燕則譽言君臣相與盡志於射以習禮樂則安則譽也是以天子制之而諸侯務焉此天子所以養諸侯而兵不用諸侯自為正之具也此曽孫之詩諸侯之射節也四正四爵四行也四行者獻賓獻公獻卿獻大夫乃後樂作而射也莫處無安居其無官次者也御猶侍也以燕以射先行燕禮乃射也則燕則譽言國安則有名譽譽或為與天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於宫射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地進爵絀地是也澤宫名也士謂諸侯朝者諸臣及所貢士也皆先令習射於澤已乃射於射宫課中否也諸侯有慶者先進爵有讓者先削地按射義一篇古禮賴以存者固多而大義不明不容以無辨也射義曰射者射為諸侯也是以侯為諸侯果於義為可通乎鄭康即因之故其注周官司裘曰謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯不亦愈失而愈逺乎蓋射中則得為諸侯不中則不得為諸侯要亦信射義大過而不能折之以理焉耳然其中有曰射之為言者繹也繹者各繹己之志也故曰內志正持弓矢審固持弓矢審固則射中矣故曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射己之鵠鄭氏不從此義發明乃諄諄於射諸侯之説而是非黑白且不辨矣噫即此觀之書可盡信哉御射周制天子禮周官太僕職曰王射則贊王弓矢繕人職曰掌詔王射贊弓矢之事服不氏職曰掌以旌居之大獲射人職曰王射則令去侯立于後以矢行告卒令取矢司服王饗射則鷩冕疏曰燕射在寢則朝服賓射在朝則皮辨服唐制皇帝親射儀司馬奉弓自西階升當西楹前南靣揮弓命獲者去侯獲者去侯至乏止司馬降西階復位千牛郎將一人奉決拾以笥千牛將軍奉弓千牛郎將奉矢進立於御榻東少南西靣即將跪尊笥於御榻前少東拂以中少決興贊設決訖千牛郎將又跪取拾興贊設訖以笥退奠于坫上復位千牛將軍北靣張弓以袂拭弓左右靣左執弣右執簫以進御訖退立于御榻東少後千牛郎將以巾拂矢逐一供御御將射協律郎攀麾先作鼓吹及奏騶虞之樂九節至第六節御乃發一矢奏第七節又發一矢皆與樂聲相應千牛將軍以矢行奏中曰獲下曰留上曰揚左曰左方右曰右方至九節發四矢畢協律郎偃麾樂止千牛將軍將御坐東西靣受弓決拾退奠於坫上復位宋制天子燕射儀皇帝臨軒有司進弓箭教坊樂作皇帝乃射若中的招箭班奏訖應左右侍立并祗應臣僚階上下就位並再拜皇帝射畢復坐元制缺國朝見儀注以後皆公及賓諸公卿大夫射周制天子禮闕諸侯禮儀禮三耦升射畢降降取弓矢於堂西諸公卿則適次公將射則司馬師命負侯皆執其旌以負其侯而侯𨽻僕人掃侯道司射告射于公公許適西階東告于賓遂搢朴反位小射正一人取公之決拾于東坫一小射正授弓拂弓皆以俟於東堂一小射正明有二人賓降升堂西垣決遂執弓搢三挾一介升自西階升待於物北北一笴東西立不敢與君並立退一笴三尺之地司正執弓升自西階立於物間南向揚弓命去侯負侯者許諾趨至乏止司射命設中小臣師執中坐設之執中南當福西當西序太師實八算于中橫委其餘于中西公就物小射正奉決拾以笥大射正執弓皆以從小射正坐奠笥于物南遂拂以巾取決與贊設決朱極三公祖朱𥜗設決拾大射正執弓以袂順左右隈上再下一左執弣右執簫以授公小臣師以巾內拂矢以授公大射正立于公後以矢行告下曰留上曰揚左右曰方十發以將乘矢公卒射賓降釋公于堂卿大夫繼射諸公卿取弓矢升射如二耦若中則釋獲者每一箇釋一算上射于右下射于左唐制皇帝親射儀侍射者進升射席北靣立左旋東靣張弓南靣挾矢協律即舉麾樂作不鼓吹奏貍首之樂七節樂至第四節乃發第一矢奏第五節發第二矢皆與樂聲相應至至七節發四矢畢協律郎偃麾樂止射者右旋東靣弛弓北靣立乃退復西階下釋弓于位其射人多少臨時聽進止皇帝觀射儀典謁以公從首六人自東西階升如司射之儀至射席前北靣進升射席立定左者右旋西靣張弓右者左旋東靣張弓俱南靣挾一箇所司奏請以射樂樂王公以下侍中前承制曰可通事舍人曰承傳西靣告太常卿太常卿於西懸內東靣命樂正奏樂協律郎舉麾作貍首之樂七節至第四節右右乃俱一發與樂相應又奏第五節左右又一發與樂相應以至七節四發訖協律郎偃麾樂止左廂射者左旋西靣弛弓右廂射者右旋東靣弛弓俱北靣立少退從東西階降立於階下相向北上立定乃退次取六人升射如初四品以下射於殿下射畢三品以上及近侍官與四品以下皆釋弓復會位坐其未射者立繼射如初宋制天子燕射儀以宣臣僚射當射官執弓箭階下再拜訖升階射元制缺國朝見儀注州長春秋以禮會民而射於州序之禮謂之鄉者州鄉之屬鄉大夫或在焉不改其禮疏曰周禮五州為鄉是州屬鄉也云不改其禮者雖鄉大夫在其禮仍依州長射禮也然此經鄉大夫射於庠云堂則由楹外又云堂則物當楣又云大夫用兕中其禮與士射於序别而云不改者大判鄉大夫士射先行鄉飲酒禮及未旅而射為不改耳其實亦有少異也賓主介僎儀禮主就先生而謀賓介注曰主謂諸侯之鄉大夫也先生鄉中之致仕者介處士之賢者諸公大夫入而觀禮者為僎諸公者大國有孤四命謂之公戒賓介儀禮主戒賓賓拜辱主答拜乃請賓賓禮辭許主再拜賓答拜主退賓拜辱戒介亦如之設席位次儀禮乃席賓主介衆賓之席皆不屬焉注曰賓席牖前南靣主席阼階上西靣介席西階上東靣席衆賓席之西不屬者下相續也皆獨坐明其德各特也又曰立者東靣北上若有北靣者則東上主之贊者西靣北上陳器儀禮尊兩壺于房户間斯禁有玄酒在西設篚于禁南東肆加二勺于兩禁承尊之器也名禁者因為酒戒也禁斯禁切地無足者玄酒新水也篚承爵觶之篚也設洗于阼階東南南北以堂深謂如堂二丈則洗去堂下亦二丈東西當東榮榮屋翼也水在洗西南肆迎賓儀禮主一相迎于門外再拜賓賓答拜拜介介答拜揖衆賓主人揖先入賓厭介入門左介厭衆賓皆入門左北上厭一涉切推手曰揖引手曰厭序賓儀禮主與賓三揖將曲揖當階揖當碑揖至于階三讓主升賓升主阼階上當楣北靣答拜獻賓儀禮主坐上爵于篚降盥洗已盥然後洗爵升賓爵賓之席前西靣獻賓賓西階上拜主少退賓受爵以復位主階上拜送爵賓少退薦脯醢賓升席自西方乃設折俎主於阼階上立賓坐左執爵祭脯醢奠爵于薦西興右手取肺郤左手執本坐弗繚右絶末以祭尚左手嚌之興加于俎坐脫手遂祭酒興席末坐啐酒降席坐奠爵拜告旨執爵興主阼階上答拜賓西階上北靣坐卒爵興賓酢主儀禮賓降洗實爵酢主皆如主獻賓之儀主卒爵坐奠爵於序端序端東序之端也東西牆謂之序主酬賓儀禮主實觶阼階上北靣坐祭遂飲卒觶興降洗實觶賓之席前北靣賓西階上拜主少退卒拜進坐奠觶于薦西賓至取觶北靣坐奠觶於薦東酬酒不舉主揖降賓降立于階西主人將與介為禮賓謙不敢居堂上主獻介儀禮主以介揖讓升拜如賓禮主乃坐取爵于東序端降洗實爵介之席前西南靣獻介介西階上北靣拜主少退介進北靣受爵復位主介右北靣拜爵爵介少退主立祭於西東薦脯醢介升席自北方設折俎祭如賓禮不嚌肺不啐酒不告旨自南方降席坐卒爵興獻主賓儀禮主西南靣三拜衆賓衆賓皆答一拜主揖升坐取爵于西楹下降洗升實爵于西階上獻衆賓衆賓之長升受者三人主拜送坐祭立飲以爵授主降復位每一人獻則薦諸其席獻衆賓儀禮衆賓獻則不拜受爵坐祭立飲衆賓遍有脯醢主以爵降奠于篚升位儀禮揖讓升賓厭介升介厭衆賓序升即席僎入儀禮賓若有僎者諸公大夫則既一人舉觶乃入主降賓階介及衆賓皆降主迎于門內揖讓升公升如賓禮大夫則如介禮席於賓東主獻薦脯醢設折俎皆如賓禮樂賓儀禮工歌鹿鳴四牡皇皇者華卒歌笙入堂下磬南北而立樂南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀乃合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋司正揚觶儀禮主降階阼相為司正主升復席司正洗觶升自西階實觶降自西階階北靣坐奠觶退共少立坐取觶不祭遂飲執觶興盥北靣坐奠觶于其所退立于觶南旅酬儀禮賓坐取俎西之觶先一人舉觶奠于俎西阼階上北靣酬主主降席立于賓東賓坐奠觶遂拜執觶興主答拜不祭立飲不洗實觶授主主西階上酬介如賓酬主之禮介酬衆賓拜興飲皆如上儀卒受者以觶降坐奠于篚無算爵儀禮衆賓皆降説屨揖讓如初升坐乃羞注曰狗胾醢也無算爵無算樂賓出儀禮賓出泰陔注曰陔陔夏也三送于門外再拜里社鄉飲酒儀附大明會典一里社每嵗春秋社祭會飲畢行鄉飲酒禮所用酒殽於一百家內供辦母致奢靡百家內除乞丐外其餘但係年老者雖至貧亦在上坐少者雖至富必序齒下坐不許攙越違者以違制論其有過犯之人雖年長財富須坐於衆賓席末聽讀律受戒諭供飲酒畢同退不許在衆賓上坐如有過犯之人不行赴飲及強坐衆賓之上者即係頑民主席及諸人首告遷徙邊逺住坐其主席者及衆推讓有犯人在上坐同罪其各里社以百家為一會百家之內以里長主席其餘百人選年最髙有德人所推服者一人為賓其次一人為介其餘各依年齒序坐如有鄉人為官致仕者主席請以為僎擇通文學者一人為讀律二人為贊禮前期一日三詣賓介門介賓迎出大門之外肅主以入至中堂主賓相揖訖主稍前曰某日行鄉飲酒禮吾子年髙德劭敢請為賓賓曰某固陋恐辱命敢辭主曰詢諸衆莫若吾子賢敢固請賓曰夫子申命之某不敢辭主再拜賓答拜介亦如之但改請吾子為介執事者設賓席于堂中稍西南向設主席於堂東南西向賓六十以上者席於堂中上兩序東西相向如賓多年幼者席于堂下階阼之南北靣是日清晨賓及衆賓皆至門下主出迎西向揖賓東向答揖主先入門而右賓入門而左至階賓揖主先升自東階賓升自西階至中堂主西向立賓東向立贊禮唱拜興拜興主賓皆兩拜主肅賓各就位贊禮唱揚觶揚觶者舉觶酌酒詣中堂北向立贊禮唱在坐皆起賓主以下皆起拱主揚觶者乃揚觶而揚言曰同前言畢唱揖揚觶者揖主賓以下皆揖揚觶遂飲酒訖復揖主賓以下皆揖以爵授執事者復位賓主以下皆坐贊禮唱讀律執事者設案於堂中次引讀律者詣案前贊禮唱在坐者皆起唱揖讀律者揖賓主以下皆揖遂展律于案詳緩讀之訖復以申明戒諭讀之畢贊禮唱揖讀律者揖賓主以下皆揖讀律者復位贊禮唱衆皆坐賓主以下皆坐執事者供饌案行酒贊唱唱飲酒衆賓皆飲或五行或七行禮同前食畢徹案贊禮唱禮畢主先行而西向立贊禮引賓以下東向立唱拜興拜興主賓皆兩拜主送賓於門外東西相揖乃退明日賓介僎衆賓詣主家拜謝鄉飲之賜主出門外謂辱屈昨日之來一鄉飲之設所以尊髙年尚有德興禮讓敢有喧譁失禮者許揚觶者以禮責之其或因而致爭競者主席者會衆罪之二十二年再定鄉飲酒禮圖式凡良民中年髙有德無私公過犯者自為一席坐於上等有因戶役差稅遲誤及曾犯公杖私笞招犯在官者又為一席坐中門之外其曾犯姦盜詐偽説事過錢起滅詞訟蠧政害民排陷官長及一應私杖徒流重罪者序坐於東門之內執壺供事各用本等之家子弟務要分别三等坐次善惡不許混淆其所行儀注並依原頒定式如有不遵圖序坐及有過之人公行赴飲者以違制論教民榜文鄉飲酒禮本以序長幼别賢否乃厚風俗之良法已令民間遵行今再申明務要依頒降法式行之長幼序坐賢否異席如此日久豈不人皆向善避惡風俗淳厚各為太平之良民射禮總論嘗考之周禮以六藝教萬民而賓興之有所謂禮樂射御書數焉夫射而居六藝之一則射固有關於世道矣記曰射者男子之事也又曰射者射己之鵠也又考之詩曰序賓以賢序賓以不侮夫有事則時習之不可忘為鵠則自反之不可失以賢則可以象功以不侮則可以觀德射之有關於德性如此故以言乎射禮禮之制其大射也則張布侯而設具其賓射也則張布侯而設鵠其燕射也則張糜侯而設中制固若是其不同矣以言乎弓矢之度則天子之弓合九以為規諸侯之弓合七以為規士大夫之弓合五以為規周禮國弓矢注體多體多則合少天子之弓王弓弧弓也其體不甚曲故合九弓而成一規諸侯之弓唐弓大弓也其體稍曲故合七而成一規士之弓才小也其體極曲故合三弓而成五規度固如是其有異矣以言乎詩歌之説則天子之射歌以騶虞周禮射人以射法治射儀王以六耦射三侯三獲三容樂以騶虞歌詩以為發矢之節度也九節五正非以樂備官乎諸侯之射歌以貍首諸侯以耦射三侯二獲二容樂以貍首七節三正非樂時會乎鄉大夫之射歌以采蘋孤卿大夫以三偶射一侯一獲一容樂以采蘋五節二正非以樂循法乎士之射歌以采蘩士以三耦射犴侯一獲一容樂采蘩五節二正非以樂不失職乎是射詩之立又各因名而取義矣是故行之朝會以尊王也行之燕享以尚賢也行之澤宫以選士也行之燕禮鄉飲禮以明倫也行之春搜夏苗秋獮冬狩以講武也內志正外體直內外之俱融者射之所以運其精也容比禮節比樂禮樂之俱協者射之所以立其極也否則徇其數之可陳而不究其義之難知幾何能得聖人之制而善復於千百世之下耶若夫後世儒者之言射吾惑焉杜佑所謂侯國相攻士故習射則已失先王觀德之意而鄭玄天子以能射服諸侯其説尤陋馬融賈逵正鵠內外之辨亦末也矣後世之君之行射者吾鄙焉漢明帝行於辟雍唐高祖行於殿廷太宗有武德之射玄宗有景福之射或偶以為美觀或暫以教武士而已又何足以追先王制射之意哉我朝稽古定制射圃之立遍於天下聖祖得天下即令天下府州二學訓誨生員每日讀經書罷於學後設一圃習射命禮部定圖式儀注凡八則一射式二樹射鵠三住射位四主射五賞酒六司射七射器八射職九射位儀注所謂射器者凡九射職者凡七今天下有司朔望謁先師及聽諸生講後詣圃行射禮是即州長會民射于州序之意也此即成周設鄉射賓興賢能之意也是故聖人修之以立教而崇賢象德之所由興者此也君子復之以維風而訓俗成能之所由舉者此也夫射固一藝之微而禮之制於聖人也抑有可稽焉弧矢之利創於黃帝則前古已肇其原而見之於虞書者則曰侯以明之是虞人用之以設教也歷夏商而成周其制已大備矣是故有大射天子將祭與羣臣諸侯習禮之射也有賓射天子因諸侯來朝而與之同射也有燕射天子與羣臣燕息之射也上下貴賤相與周旋于觀德之習而所以盡制曲防之者周旋升降之節與古同矣武舉之所較試則將家子弟以才能而自奮者選舉振揚之法與古同矣然聖人之制射也于其德不于其藝君子之習射也于其藝不于其文今日射禮之復亦惟於先王而究其精意焉耳圖書編卷一百六
