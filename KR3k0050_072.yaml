body:
  text: 圖書編卷七十二明章潢撰脈總論叙脈者何也莫非氣乎氣為衞衞行脈外莫非血乎血為榮榮行脈中然則脈之一字果何物乎嘗試原之必有説矣葢人之眇軀渾然中處吾身之氣血即天地之陰陽也天地之陰陽所以一升一降者必有主宰者焉人身之氣血所以一周一轉者必有統御者焉知此則知脈矣古之衇字從血從􅏨所以使氣血各依分派而行經絡也今之脉字從月從永所以使肌肉以之長久而保天年也脉者有三一曰命之本二曰氣之神三曰形之道經所謂天和是矣至於折一肢瞽一目亦不能害生而脈不可須㬰失矣失則絶命害生也春之生也吾之脈與天地之氣同升夏之長也吾之脈與天地之氣同浮秋之殺也吾之脈與天地之氣同隆冬之藏也吾之脈與天地之氣同流分而言之曰氣曰血曰脈總而言之唯脈運行氣血而已是氣血盛則脈盛氣血衰則脈衰氣血和則脈平氣血亂則脈病氣血壯則脈大氣血微則脈小氣血熱則脈數氣血寒則脈遲長人則脈長短人則脈短性𦂳則脈𦂳性緩則脈緩室女尼則脈濡嬰兒稚子則脈急脈為氣血之體氣血乃脈之用也然則氣血能使脈之盛衰而氣血之盛衰則又以糓致焉盖糓入於胃脈道乃行糓氣多則氣血榮昌脈亦盛矣糓氣少則氣血微弱脈亦衰矣故經曰四時以胃氣為本脈無胃氣則死矣論而至此脈之一字豈非太乙天真之元氣乎心脈歌心脈芤陽氣作聲或時血痢吐交橫溢關骨痛心煩燥更兼頭面赤騂騂大實由來面赤風燥痛面色與心同微寒虚惕心寒熱急則腸中痛不通實大相兼并有滑舌滑心驚語話難單滑心熱别無病濇無心力不多言沉𦂳心中逆冷痛弦時心急又心懸心脈見於三部歌三部俱數心家熱舌上生瘡唇破裂狂言滿目見鬼神飲水百杯終不歇肝脈歌肝輭并弦本没邪𦂳因筋急有些些細看浮大更兼實赤痛昏昏似物遮溢關過寸口相應目眩頭重與筋疼芤時眼暗或吐血四肢癱緩不能行濇則縁虚血散之肋脹脇滿自應知滑因肝熱連頭目𦂳實弦沉痃癖基微弱浮散氣作難目暗生花不耐看甚浮筋弱身無力遇此還須四體癱肝脈見於三部歌三部俱弦肝有餘目中疼痛苦痃虚怒氣滿胸常欲呌翳蒙童子涙如珠腎脈歌腎散腰間氣尿多澁滑并其中有聚散聚散且無憑實滑小便澁淋痛濇騂騂脈濇精頻漏恍惚夢魂多小腸疝氣遂夢裏涉江河實大膀胱熱小便難不通滑弦腰骨重沉𦂳痛還同單勻無憊病浮𦂳耳應聾腎脈見於三部歌三部俱遲腎臟寒皮膚燥濇髪毛乾夢見鬼神時入水覺來情思即無歡肺脈歌肺脈浮兼實咽門燥又傷大便難且澁鼻内乏馨香實大相兼滑毛焦涕唾粘更和咽有燥秋盛夏宜砭沉𦂳相兼滑仍聞咳𠻳聲微浮兼有散肺脈本家形溢出胸中湍氣泄大腸鳴弦冷腸中結芤暴痛無成沉細仍兼滑因知是骨蒸皮毛皆總澁寒熱兩相并肺脈見於三部歌三部俱浮肺臟風鼻中多水唾稠濃壯熱惡寒皮肉痛顙乾雙目淚酸疼脾脈歌脾脈實兼浮消中脾胃虚口乾饒飲水多食亦饑虚單滑脾家熱口内氣多麄濇即非多食食不作肌膚微浮傷客熱來去乍微疎有𦂳脾家痛仍兼筋急拘欲吐却不吐冲冲未得蘇若弦肝氣盛妨食被譏謀大實心中痛如邪勿帶符溢關涎出口風中見羈孤脾脈見於三部歌三部俱緩脾家熱口臭胃翻長嘔逆齒脾齗宣注氣纒寒熱時時少心力神門命門人迎辯脈經别論篇曰食入於胃濁氣歸心淫精于脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於府府府精神明留於四藏氣歸於權衡權衡以平氣口成寸以决死生又曰氣口者亦大隂也是以五臟六腑之氣味出於胃變見於氣口葢以氣口包括五臟六腑之總名也此氣之所以為寸口而人迎命門神門之脈又各有其經也氣口成寸之位烏可以容三脈之紊而三脈自有本位豈可以容牽合也哉脈要精微篇有尺而附上上附上之分自是三部寸關尺之議本於此也脈經謂左手關前一分為人迎誤也愚嘗考之内經人迎診候乃是陽明胃脈位在結喉兩傍動脈是也靈樞五色篇曰人迎堅盛者傷於寒氣口堅盛者傷于食綱目釋謂氣口脈在兩手掌後手太隂之脈也人迎脈在結喉兩傍足陽明之脈也盖謂胃為六腑之源故與氣口配診以知疾病之端龎安常論之詳矣兹不復贅考神門脈内經有曰神門絶死不治神門為手少隂心經之動脈穴在掌後側寸之分與大淵相對脈經謂兩手尺前為神門誤也又以䂖尺為命門抑嘗考之命門在督脈十四椎下陷中而腎之間與臍相對固為真元之根本性命之所關腎雖屬水而實有相火寓于其中太極所謂動者靜之基則是靜而生水者本也動而挾火者標也虞天氏謂命門象門中棖闑司關闔性其靜而闔㴠養乎一隂之真水而鼓舞乎雷龍之相火水為常而火為變也可謂深得命門相火之㫖者脈有尺寸何謂也尺寸者脈之大要也從關至尺是尺内隂之所治也從關至魚際是寸口内陽之所治也故分寸為尺分尺為寸故隂得尺中一寸陽得寸内九分尺寸始終一寸九分故曰尺寸也手太隂陽明金也足少隂太陽水也金生水水流下行而不能上故在下部也足厥隂少陽木也生手太陽少隂火火炎上行而不能下故為上部手心主少陽火生足太隂陽明土土主中宫故在中部此五行子母更相生養者也三部者寸關尺也九候者浮中沉也寸應天為上部關應人為中部尺應地為下部一部之中各有浮中沉三候浮以象天中以象人沉以象地三三如九故曰三部九候也然則寸關尺之名何以言之盖人手腕後髙骨為關從關至魚際為周身一寸故名曰寸部從關至尺澤冗得周身之一尺故名曰尺部寸部屬陽實得寸内九分陽數九也尺部屬隂實得尺内一寸隂數十也陽出隂入以關為界故名曰關部然則浮中沉之名何以取之盖三部之中六府之脈常浮府屬陽也五臟之脈常沉藏屬隂也胃氣之脈常在沉浮之中胃為五藏六府之本也輕手診之為浮候重手診之為沉候不重不輕診之為中候故診法常以平旦隂氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂乃可診之先令病人端身黙坐為醫者當澄心息慮初以中指端按髙骨關位次下前後二指輕按消息之中按消息之重按消息之沉然他醉莫與診眎自醉莫診他人或有病人逺來曾乘車而坐舟或騎驢而跨馬必待憇息久之方與診視終不及平旦為凖也然寸部以應上焦心肺居上也關部以應中焦肝脾居中也尺部以應下焦腎命居下也左寸心與小腸動脈之位君火也右寸肺與大腸動脈之位燥金也左關肝與膽動脈之位風木也右關脾與胃動脈之位濕土也左尺腎與膀胱動脈之位寒水也右尺命門與三焦動脈之位相火也然以循環之序言之則左尺水生左關木左關木生左寸火左寸火接右尺火右尺火生右關土右關土生右寸金右寸金生左尺水生生之意不絶有子母之親也然以對待之位言之則左寸火尅右寸金左關木尅右關土左尺水尅右尺火左剛右柔有夫婦之别也然左手屬陽右手屬隂左寸君火以尊而在上石尺相火以卑而在下有君臣之道也三部之中有此自然之理學醫者可不盡心乎雖然此其大畧也訣在師𫝊巧由心悟非深通造化其孰知之診脈方位不同醫家之訣脈三部九候莫知其所由從世謂宗叔和秦越人自以為發明内經而内經謂尺内兩傍則季脇也尺外以候腎尺裏以候腹中附上以左外以候肝内以候鬲右外以候胃内以候脾上附上右外以候肺内以候中左外以候心内以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者小腹腰股膝頸足中事也以是詳諦之三部之相屬錯而背何歟又輕按得腑脈重按得臟脈且深疑焉以按之上下分隂陽於腑臟則九候之浮中沉乃不能施矣九候廢而診道荒何以製方劑哉然則古今名家能奏功紀籍皆倖而偶者夫脈者血之腑呴之為氣濡之為血氣運脈之外而血榮脈之中故十二經十五絡又八奇經惟貯而官者為臟腑以見於脈若合系而獨持之則無所名於具矣故心包絡三焦不得為無位兩腎不得為自離而叔和異之并其可諦者診脈當依時月人身血脈與天地同周流此理之必然者一歲自春而冬一日自子而亥莫不相應故由前圖言之一月屬肝足厥隂經至於十月膀胱足太陽經由後圖言之毎日自子時注膽至亥時注三焦則審脈者如一月之内宜以肝為主如毎日子時即宜以膽為主矣醫家止知審六脈虛實而當所旺所注之月與時其虛實莫之辨焉謂之善察脈理可乎况脈有浮中沉之不同藥有表裏和之不一察其在氣在血定其行隂行陽一循天時以調治之吾亦罕見其人矣脈分三部五臟脈有三部曰寸曰關曰尺寸部法天關部法人尺部法地寸部候上自胸隔心肺咽喉頭目之有疾也關部候中自胸已下小腹之有疾也脾膽肝皆在中也尺部候下自小腹腰腎膝胻足也大腸小腸皆在下也皆内經所謂上以候上下以候下是也此與十二經配合不同亦存之以俟有定見者一一浮者陽也指下尋之不足舉之有餘再再尋之如大過曰浮主咳𠻳氣促冷汗自出背膊勞倦夜卧不安歌曰按之不足舉有餘再再尋之指下浮臟中積冷榮中熱欲得生精用補虚又歌曰寸浮中風頭熱痛關浮腹脹胃虚空尺部見之風入肺大腸乾澁故難通二芤者陽也指下尋之兩頭即有中間全無曰芤主淋瀝氣入小腸歌曰指下尋之中且虚邪風透入小腸居病時淋瀝兼頭痛大作湯圓必自除又歌曰寸芤積血在胷中關内逢芤腸裏癰尺部見之虚在腎小便遺瀝血凝濃三滑者陽也指下尋之三關如珠動按之即伏不進不退曰滑四肢困弊脚手酸疼小便赤澁歌曰滑脈如珠號曰陽腰間生氣透前腸脛酸只為生寒熱大㵼三焦必得康又歌曰滑脈居寸多嘔逆關滑胃寒不下食尺部見之臍似水飲水下焦聲瀝瀝一四實者陽也指下尋之不絶舉之有餘曰實主伏陽在内脾虚不食四體勞倦歌曰實脈尋之舉有餘伏陽蒸内致脾虚食少只縁生胃壅溫和湯藥乃痊除又歌曰實脈關前胷熱甚當關切痛中焦恁尺部如繩應指來腹脹小便應不禁一五弦者陽也指下尋之不足舉之有餘狀若箏弦時時帶數曰弦主勞風乏力盗汗多生手足酸疼皮毛枯稿歌曰弦脈為陽狀若弦四肢更被氣相煎三度解勞方始退常須固臍下丹田又歌曰寸部脈𦂳一條弦骨中急痛狀䋲牽關中有弦寒在胃下焦停水滿丹田一六𦂳者陽也指下尋之二關通度按之有餘舉指甚數狀若洪弦曰𦂳主風氣伏陽上衝化為狂病歌曰𦂳脈三關數又弦上來風是正根源忽然狂語人驚怕不遇良醫不得痊又歌曰𦂳脈關前頭裏痛到關切痛無能動隱指寥寥入胗來激結繞臍常手捧一七洪者陽也指下尋之極大舉之有餘曰洪主頭痛四肢浮熱大腸不通燥糞結澁口乾遍身疼痛歌曰洪脈根源本是陽遇其季夏自然昌若逢秋季及冬季發汗通腸始得凉又歌曰洪脈關前熱在胸到關翻胃幾千重更向尺中還若是小便赤澁脚酸疼已上七表之脈左三部也雖皆屬陽然陽中有隂有宜用熱藥者不可執一不通以致誤也總七表形候歌浮如指下捻葱葉芤則中虚有兩頭滑似流珠來往利實向浮取次第求弦若弓弦時帶數𦂳浮琴弦促軫留洪舉往來皆極大七陽為表定其由一一微者隂也指下尋之往來極微再再尋之若有若無曰微主敗血不止面色無光歌曰指下尋之有若無漩之敗血小腸居崩中日久為白帶漏下多時骨未枯又歌曰微脈關前氣上侵當關鬱結氣排心尺脈見之臍下積身寒飲水即呻吟一二沈者隂也指下尋之似有舉之全無緩度三關狀如爛綿曰沉主氣脹兩脇手足時冷歌曰按之似有舉還無氣滿三焦臟腑虚冷氣不調三部壅通腸健胃始能除又歌曰寸脈沉兮胷有痰當關氣短痛難堪若在尺中腰脚重小便稠數色如泔三緩者隂也指下尋之往來遲緩小于遲曰緩主四肢煩滿氣捉不安歌曰來往尋之狀若遲腎間生氣耳鳴時邪風積氣來衝背腦後三鍼痛即移又歌曰緩脈關前搐項筋當關氣結腹難伸尺上若逢癥冷結夜間常夢鬼隨人四濇者隂也指下尋之似有舉之全無前虚後實無復次第曰濇主遍身疼痛女子有孕胎痛無孕敗血為病歌曰濇脈如刀刮竹形丈夫有此號傷精婦人有孕胎中病無孕還須敗血成又歌曰濇脈關前胃氣并當關血散不能停尺部如斯逢逆冷體寒臍下作雷鳴五遲者隂也指下尋之重手乃得隱隱曰遲主腎虚不安歌曰遲脈人逢狀且難遇其夏季不能痊神工診得知時候道是脾來水必乾又歌曰寸口脈遲心上寒當關腹裏飲漿難流入尺中腰脚重厚衣重覆也嫌單一六伏者隂也指下尋之似有呼吸定息全無再再尋之不離三關曰伏主毒氣閉塞三關四肢沉重手足時冷歌曰隂毒伏氣切三焦不動榮家氣不調不問春秋與冬夏時時發汗始能消又歌曰積氣胸中寸勝伏當關腸癖常瞑目尺部見之食不消坐卧非安還破腹七濡者隂也指下尋之似有再再還來按之依前却去曰濡主少力五心煩熱腦轉耳鳴下元極冷歌曰按之似有舉之無精髓丹田定已枯四體骨蒸勞熱甚臟腑終傳命必殂又歌曰濡脈關前人足汗當關氣少精神散尺部綿綿即惡寒骨與肉疎都不管八弱者隂也指下尋之如爛綿相似輕手乃得重手稍無怏怏不前曰弱主氣居於表生産後客風面腫歌曰三關怏怏不能前只為風邪與氣連少年得此須憂重老弱逢之病即痊又歌曰關前弱關陽道虚關中有此氣多疎若在尺中隂氣絶酸疼引變上皮膚已上八裏脈者乃右手三部寸關尺受邪者也總八裏形候歌沉若爛綿尋至骨微于指下細如絲緩小于遲來往慢濇則如刀削竹枝遲欲尋來隱隱至伏潛骨裏似來時濡凑指邊還怯怯弱按輕綿重不知八裏為藏分明記但依此訣不須疑七表八裏脈總論七表者浮芤滑實弦𦂳洪也八裏者微沉緩濇遲伏濡弱也七表陽也八裏隂也表脈多見於左而客隨主變裏脈多見於右而主隨客變左手三部所主温風寒也温風寒病得於外右手三部所主燥實暑也燥實暑病生於内此脈法之大槩及其互相變見或表脈見之於右或裏脈見之於左或隂陽更相乘或隂陽更相伏或一脈為十變脈理精微非一言可盡然其要不越乎隂陽五行而已表脈有七裏脈有八共十五脈也五行分之各得三脈三五一十五也浮濇弱屬金弦𦂳伏屬木滑沉濡屬水芤實洪屬火微緩遲屬土每三部俱有輕重之分至於五行當更相平一有不平病即見焉或曰謂内傷則善矣謂外感或莫之當耶不知天地之間六氣依于五運人身即小天地外邪所感莫不從其類而見焉假令外感風濕則木火有餘而土金不足水不能制乎火矣外感乃外邪所感致五行不平也先明金木水火土之理次察虚實賊微正之邪更復辨其部分之浮中沉而當詳其主脈客脈之相合何為主弦洪濇緩沉是也何為客本部不應得之脈皆客也能如是然後内傷外感主客標本之病是者是非者非夫何差錯之有九道脈一一長者陽也指下尋之三關如持竿之狀舉之有餘曰長過於本位亦曰長主渾身壯熱夜卧不安歌曰長脈迢迢度三關指下將來又却還陽毒在臟三焦熱徐徐發汗始能安一二短者隂也指下尋之不及本位曰短主四肢惡汗腹中生氣宿食不消歌曰脈短隂中有伏陽氣壅三焦不得昌臟中寒食主寒氣大㵼通腸必得康三虚者隂也指下尋之不足舉之亦然曰虚主少力多驚心中恍惚小兒驚風歌曰恍惚心中多悸驚三關定息脈難成血虚臟腑生煩熱補益三焦便得寧四促者陽也指下尋之極數併居寸口曰促漸加即死漸退即生歌曰促脈前來已出關常居寸口血成斑忽然漸退大生也若或加時命在天五結者隂也指下尋之或來或往聚而却還曰結主四肢氣悶連痛時來歌曰積氣生於脾臟傍大腸疼痛陣難當只宜稍㵼三焦火莫謾多方立紀綱六代者隂也指下尋之動而復起再按不能自還曰代主形容羸痩口不能言歌曰代脈時時動若浮再而復起似還無三元正氣隨風去魂魄㝠㝠何所拘七牢者隂也指下尋之即無按之却有曰牢主骨間疼痛氣居于表歌曰脈入皮膚辨息難時時氣促在胷前只縁水火相刑尅欲待痊除更問天八動者隂也指下尋之似有舉之還無再再尋之不離其處下往不來曰動主四體虚勞崩中血痢歌曰動脈根源氣主隂三關指下礙沉沉血山一倒經年月志士名醫只可尋一九細者隂也指下尋之細細似綿來往極微曰細主腰酸髓冷乏力泄精歌曰乏力無精脛裏酸形容憔悴髪毛乾如逢冬季經霜月不療其痾必自痊九道脈法總論雲岐子曰九道者從天地九數之理説也經曰善言天者必有應於人是以天有九星地有九州人有九藏亦有九野故立九道脈以應天地隂陽之法也以長為乾清陽發凑理以短為坤濁隂歸六府以虚為離心中驚則血衰以促為坎脈進則死退則生以結為兊臍傍所發以代為中土正上中下三元正氣以牢為震前後有水火相乘之氣以動為艮主血山衰以細為㢲主秋金有餘此九道脈以應九宫藏之法也七表八裏九道脈形狀總訣析而言之七表八裏又有九道其名乃備浮而無力是名芤脈有力無洪形狀可識沉而有力其脈為實無力微弱伏則沉極脈遲有力滑而流利無力緩濇慢同一例數而有力脈名為𦂳小𦂳為弦疑似須審合則為四離七八天機之秘神授之訣促結代脈辯仲景云脈來緩緩當作遲時一止復來者名曰結又脈來動而中止更來小數中有還者及動名曰結隂也脈來動而中止不能自還此動而中止復來代也得此脈者必難治自還者此動而中止復來如前動同而不數也故有結脈者促脈者代脈者結者隂也隂盛則結脈來緩時一動止復來曰主胸滿煩燥促者陽也陽盛則促脈來數時一止復來曰促主積聚氣痞憂思所乘大抵結促之脈雖時止為病脈非死也往來緩動中止不能自還周而復動名曰代也代者死也脈有隂陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受榖味也其脈在中浮者陽也沉者隂也故曰隂陽也心肺俱浮何以别之然浮而大散者心也腎肝俱沉何以别之然牢而長者肝也按之濡舉指來實者督也脾者中州故其脈在中是隂陽之法也岐伯曰陽為氣隂為味味歸形形歸氣氣歸精精歸化化生精精生氣氣生神黄帝曰予知百病皆生于氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不動何病之生曰養生貴養氣養氣貴養心養心貴寡慾寡慾以保元氣生形强而神不罷若形壞則神不存神離則形不固形譬燈缸盛油神譬燈油燃火揺翻燈缸則燈油㵼炙乾燈油則燈缸裂必形與神俱即魂魄足榮衞調夫榮血也衞氣也氣以衞血血以榮氣岐伯曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶曰神氣之㫖妙哉在心悟之而已冬至之後為呼夏至之後為吸此天地一歲之呼吸也朱紫陽曰天地間只是一氣自今年冬至到明年冬至只是一個呼吸呼是陽吸是隂何也冬至後自復而乾屬陽故以為呼夏至後自姤而坤屬隂故以為吸呼乃氣之出故屬冬至之後吸乃氣之入故屬夏至之後大則為天地一歲之呼吸小則為人身一息之呼吸仙家千經萬論譬喻紛紛不過呼吸二字而已又云一動一靜之間天地人之至妙至妙者歟無極之前隂含陽也有象之後陽分隂也脈隂陽類成浮不沉也按之不足輕舉有餘滿指浮上曰浮為風虚動之候為脹為風為痞為滿不食為表熱為喘浮大傷風鼻塞浮滑疾為宿食浮滑為飲左寸浮主傷風發熱頭疼目眩及風痰浮而虚遲心氣不足心神不安浮散心氣耗虚煩浮而滿數心經熱關浮腹脹浮而數風熱入肝經浮而促怒氣傷肝心胸逆滿浮大胸脇脹滿尺浮膀胱風熱小便赤澁浮大而芤男子小便血婦人崩帶浮而遲冷疝臍下痛右寸浮肺感風寒咳喘清涕自汗體倦浮而洪肺熱而咳浮而遲肺寒喘嗽關浮脾虚中滿不食浮大而瀝為宿食浮而遲脾胃虚尺浮風邪客下焦大便秘浮而虚元氣不足浮而數下焦風熱大便秘沈不浮也輕手不見重手乃得為隂遂陽鬱之候為實為寒為氣為水為停飲為癥瘕為脇脹為厥逆為洞泄沈為少氣沈遲為痼冷沈滑為宿食沈伏為霍亂沉而數内熱沉而遲内寒沉而弦心腹冷痛左寸沉心内寒邪為痛胸中寒飲脇疼關沈伏寒在經兩脇刺痛沉弦痃癖内痛尺沈腎臟感寒腰背冷痛小便濁而頻男為精冷女為血結沈而細腫疫隂痒溺有餘瀝右寸沈肺冷寒痰停蓄虚喘少氣沈而𦂳滑咳𠻳沈細而滑骨蒸寒熱皮毛焦乾關沈胃中寒積中滿吞酸沈𦂳懸飲尺沈病水腰脚疼沈細下利又為小便滑臍下冷痛遲不及也以至數言之呼吸之間脈僅三至减於平脈一至也為隂盛陽虧之候為寒為不足浮而遲表有寒沈而遲裏有寒居寸為氣不足居尺為血不足氣寒則縮血寒則凝也左寸遲心上寒精神多慘關遲筋寒急手足冷脇下痛尺遲腎虚便濁女人不月右寸遲肺感寒冷痰氣短關遲中焦寒及脾胃傷冷物不食沉遲為積尺遲為藏寒泄㵼小腹冷痛腰脚重數大過也一息六至過平脈兩至也為煩滿上為頭疼上熱中為脾熱口臭胃煩嘔逆右為頰熱目赤左下為小便黃赤大便秘澀浮數表有熱沉數裏有熱虚不實也散大而軟舉按豁然不能自固氣血俱虚之診也為暑為虚煩多汗為恍惚多驚為小兒驚風實不虚也按舉不絶逼逼而長動而有力不疾不遲為三焦氣滿之候為嘔為痛為氣塞為食積為氣聚為痢為伏陽在内左寸實心中積熱口舌瘡咽痛實大頭面熱風煩燥體疼面赤關實腹脇痛滿實而浮大肝盛目暗赤痛尺實小腹痛小便澀實而滑淋瀝莖痛溺赤實大膀胱熱溺難實而𦂳腰痛若寸實胸中熱痰𠻳煩滿實而浮肺熱咽躁痛喘咳氣壅關實伏陽蒸内脾虚食少胃氣滯實而浮脾熱消中善饑口乾勞倦尺實臍下痛便難或時下痢洪大而實也舉按有餘來至大而云且長騰上滿指為榮絡大熱血氣燔灼之候為表裏皆熱為煩為咽乾為大小便不通左寸洪心經積熱眼赤口瘡頭痛内煩關洪肝熱及身痛四肢浮熱尺洪膀胱熱小便赤澁右寸洪肺熱毛焦唾粘咽乾洪而𦂳喘急關洪胃熱反胃嘔吐口乾洪而𦂳為脹尺洪腹滿大便難或下血微不顯也依稀輕細若有若無為血氣俱虚之候為虚弱為泄為虚汗為崩漏敗血不止為少氣浮而微者陽不足必身惡寒沉而微者隂不足主臟寒下利左寸微心虚憂惕榮血不足關微四肢惡寒狗急尺微敗血不止男為傷精尿血女為崩帶右寸微上焦寒痞冷痰不化中寒少氣關微胃寒氣脹食不化脾虚噫氣心腹冷痛尺微臟寒泄㵼臍下冷痛弦按之不移舉之應手端直如絲弦為血氣收歛為陽中伏隂或經絡間為寒所入為痛為瘧為拘急為寒熱為血虚盗汗為寒凝氣結為冷痺為疝為飲為勞倦弦數為勞瘧雙弦脇急痛弦長為積左寸弦頭痃心惕勞傷盗汗乏力關弦脇肋痛痃癖弦𦂳為疝瘕為淤血弦小寒癖尺弦小腹痛弦滑腰脚痛右寸弦肺受寒咳𠻳胸中有寒痰關弦脾胃傷冷宿食不化心腹冷痛又為飲尺弦臍下急痛不安下焦停水緩不逮也往來迂緩呼吸徐徐以氣血向衰故脈體為之徐緩爾為風為虛為痺為弱為痛在上為項强在下為脚弱浮緩為風沉緩血氣虚左寸緩心氣不足怔忡多㤀亦主項背急痛關緩風虚眩暈腹脇氣結尺緩腎虚冷小便數女人月事多右寸緩肺氣浮言語氣短關緩胃弱氣浮虚緩脾氣虚弱不沈不浮從容和緩乃脾家本脈也尺緩下寒脚弱風氣秘滯浮緩腸風泄㵼沈緩小腹感冷滑不澁也往來流利如珠走盤不進不退為血實氣壅之候盖血不勝于氣也為嘔吐為痰逆為宿食為經閉滑而不斷經不閉其斷者經閉上為吐逆下為氣結滑數為結熱左寸滑心熱滑而實大心驚舌强關滑汗熱頭目為患尺滑小便淋瀝尿赤莖中痛右寸滑痰飲嘔逆滑而實脈熱毛髮焦膈壅咽乾痰𠻳頭目昏涕唾粘關滑脾熱口臭及宿食不化吐逆滑實胃熱尺滑因相火炎而引飲多臍冷脹鳴或時下利婦人主血實氣壅月事不通若和滑為孕澁不滑也虚細而遲往來極難參伍不調如雨沾沙如輕刀刮竹然為氣多血少之候為少血為亡汙為血痺痛為傷精女人有孕為胎痛無孕為敗血病左寸澁心神虚耗不安及冷氣心痛關澁肝虚血散肋脹脇滿身痛尺澁男子遺精及疝女人月事虚敗若有孕主胎漏右寸澁榮衞不和上焦冷痞氣短臂痛關澁脾弱不食胃冷而嘔尺澁大便清津液不足小腹寒足脛逆冷經云滑者傷熱澁者中霧露金革長不短也指下有餘而過於本位氣血皆有餘也為陽毒内蘊三焦煩鬱為壯熱短不長也兩頭無中間有不及本位氣不足以前導其血也為隂中伏陽為三焦氣壅為宿食不消大不小也浮取之若洪而浮沈取之大而無力為血虚氣不能相入也經曰大則病進小不大也浮沈取之悉皆損小在陽為陽不足在隂為隂不足前大後小則頭疼目眩前小後大則胸滿短氣𦂳有力而不緩也其來勁急按之長舉之若牽繩轉索之狀為邪風急搏伏於榮衞之間為痛為寒浮𦂳為傷寒身疼沈𦂳為腹中有寒為風癎左寸𦂳頭熱目痛項強𦂳而沉心中氣逆冷痛關𦂳心腹滿痛脇痛肋急𦂳而盛傷寒渾身痛𦂳而實痃癖尺𦂳腰脚臍下痛小便難右寸𦂳鼻塞膈壅𦂳而沈滑脈實咳𠻳關𦂳腹痛吐逆𦂳盛腹脹傷食尺𦂳下焦作痛弱不盛也極沈細而軟怏怏不前按之欲絶未絶舉之即無由精氣不足故脈息痿弱而不振也為元氣虧耗為痿弱不前為痼冷為關熱為泄精為虚汗老得之順壯得之逆左寸弱陽虚心悸自汗關弱筋萎無力婦人主産後客風面腫尺弱小便數腎虚耳聾骨肉酸痛右寸弱身冷多寒胸中短氣關弱脾胃虚食不化尺弱寸焦冷痛大便滑動其狀如大荳厥厥動揺尋之有舉之無不往不來不離其處多於關部見之動為痛為驚為虚勞體痛為崩脫為泄痢陽動則汗出隂動則發熱伏不見也輕手取之絶不可見重取之附着於骨為隂陽潛伏關膈閉塞之候為精聚為瘕疝為食不消為霍亂為水氣為榮衞氣閉而厥逆關前得之為陽伏關後得之為隂伏左寸伏心氣不足神不守常沈憂抑鬱關伏血冷腰脚痛及脇下有寒氣尺伏腎寒精虚疝瘕寒痛右寸伏胸中氣滯寒痰冷積關伏中脘積塊作痛及脾有停滯尺伏臍下冷痛下焦虚寒腹中痼冷促陽脈之極也脈來數時一止復來者曰促陽獨盛而隂不能相和也或怒逆上亦令脈促促為氣涌為狂悶為瘀血發狂又為氣為血為飲為食為痰盖先以氣熱脈數五者或一有留滯乎其間則因之而為促非惡脈也雖然加即死退即生亦可畏哉結隂脈之極也脈來緩時一止復來者曰結隂獨盛而陽不能相入也為癥結為積聚為七情所鬱浮結為寒邪滯經沉結為積氣在内又為氣為血為飲為痰盖先以氣寒脈緩而五者或一有留滯於其間則因而為結故張長沙謂結促皆病脈芤浮大而軟尋之中空傍實傍有中無診在浮舉重按之間為失血之候大抵氣有餘血不足血不能流氣故虚而大若芤之狀也左寸芤主心血妄行為吐為衂關芤主脇間血氣痛或腹中瘀血亦為吐血目暗尺芤小便血女人月事為病右寸芤胸中積血為衂為嘔關芤腸癰瘀血及嘔血不食尺芤大便血又云前大後細脫血也非芤而何革沈伏實大如按皷皮曰革氣血虚寒革易常度也婦人則半産漏下男子則亡血失精又為中風寒涇之診濡無力也虚軟無力應手散細如綿絮之浮水中輕手隨來重手却去為氣血俱不足之候為少氣為無血為疲損為自汗為下冷為痺左寸濡心虚易驚盗汗短氣關濡榮衞不和精神離散體虚少力尺濡男為傷精女為脫血小便數自汗多右寸濡關熱増寒氣之體虚關濡脾軟不化物胃虚不進飲食尺濡下元冷憊腸虚泄㵼牢堅牢也沈而有力動而不移為裏實表虚關中氣促為勞傷萎極大抵其脈近乎無胃氣者故諸家皆為危殆之脈云亦主骨間疼痛氣居於表疾盛也快於數為疾呼吸之間脈七至熱極之脈也在陽猶可在隂為逆細微𦕈也指下尋之往來微細如線盖血冷氣虚不足以充故也為元氣不足乏力無精内外俱冷痿弱洞洩為憂勞過度為傷濕為積為痛在内及在下代更代也動而中止不能自還因而復動由是復止尋之良久乃復强起為代主形容羸痩口不能言若不因病而人羸痩其脈代止是一藏無氣它藏代之真危亡之兆也若因病而氣血驟損以至元氣不續或風家痛家脈見止代只為病脈故傷寒家亦有心悸而脈代者腹心痛亦有結澁止代不勻者勿以為凶盖九痛之脈不可准也又姙娠或有脈代者必三月餘之胎也亦無慮焉散不聚也有陽無隂按之滿指散而不聚來云不明謾無根柢為氣血耗散府藏氣絶在病脈主虚陽不歛又主心氣不足大抵非佳脈也經言少陽之至乍大乍小乍短乍長陽明之至浮大而短太陽之至洪大而長太隂之至𦂳大而長少隂之至𦂳細而微厥隂之至沈短而敦何也冬至之後得甲子少陽王其脈乍大乍小乍短乍長盖冬至之後若得第一甲子乃大寒中氣日也自大寒至春分六十日正初之氣分也其時草木方主風令鼓折萬物未有定象故脈大小長短不一也復得甲子陽明旺其脈浮大而短乃第二甲子正春分至小滿六十日二之氣分也其時草木雖生而未茂盛陽氣清明故脈浮大而却短也復得甲子大陽旺其脈洪大而長乃第三甲子正小滿至大暑六十日三之氣分也其時萬物茂盛陽氣極熱故脈洪大而又長也復得甲子太隂旺其脈緩大而長乃第四甲子正大暑至秋分六十日四之氣分也其時濕熱變作林木津潤故脈緩大而長也復得甲子少隂旺其脈𦂳細而微乃第五甲子正秋分至小雪六十日五之氣分也其時草木凋零天地肅殺故脈𦂳細而微也復得甲子厥隂旺其脈沈短以敦乃第六甲子正小雪至大寒六十日四終之氣分也其時萬物閉宻陽氣伏藏故脈沉短而反敦厚也心脈浮大而散心合血脈心脈循血脈而行持脈指法如六菽之重來盛如循連珠曰平按至血脈而得者為浮稍稍加力脈道粗者為大又稍加力脈道閎軟者為散連屬中微曲曰病堅摶如操帶鈎者死肺脈浮濇而短肺合皮毛肺脈循皮毛而行持脈指法如三菽之重浮虛如落榆葉曰平按至皮毛而得者為浮稍稍加力脈道不利為濇又稍加力不及本位曰短中堅兩傍虚曰病虚大如毛羽中膚者死肝脈弦而長肝合筋肝脈循筋而行持脈指法如十二菽之重而大長如竿末稍曰平按至筋而脈道如筝弦相似為弦次稍加力脈道迢迢者為長來盈實而滑曰病急益勁如按弓弦死脾脈緩而大脾合肌肉脾脈循肌肉而行持脈指法如九菽之重和柔如雞踐地曰平按至肌肉如微風輕颭栁稍之狀為緩次稍加力脈道敦實者為大盈如雞舉足曰病鋭堅乍疎乍數者死腎脈沈而軟滑腎合骨腎脈循骨而行持脈指法沈實堅滑按至骨上而得者為沈次重而按之脈道無力為濡舉止來疾流利者為滑如引葛益堅曰病摶絶如指彈石堅者死凡診脈湏要識時脈胃脈與府藏平脈然後及於病脈時脈謂春三月六部中俱帶弦夏三月俱帶洪秋三月俱帶浮冬三月俱帶沈胃脈謂中按得之脈和緩府藏脈既平胃脈又應時脈乃無病者也反此為病察脈須識上下來去至止六字不明此六字則隂陽虚實不别也上者為陽來者為陽至者為陽下者為隂去者為隂止者為隂也上者自尺部上於寸口陽生於隂也下者自寸口下於尺部隂生於陽也來者自骨肉之分而出於皮膚之際氣升也去者自皮膚之際而還於骨肉之分氣之降也應曰至息曰止也六字診脈之常也明脈須辨表裏虚實四字表陽也府也凡六淫之邪襲於經絡而未入於胃府及藏者皆屬於表也裏隂也藏也凡七情之氣鬱於心腹之内不能越散飲食五味之傷留於藏府之間不能通泄皆屬於裏也虚者元氣之自虚精神耗散氣力衰竭也實者邪氣之實由正氣之本虚邪得乘之非元氣之自實也故虚者補其正氣實者㵼其邪氣經所謂邪氣盛則實精氣奪則虚此大法也内經診法帝曰診法何如岐伯曰診法常以平旦隂氣未動陽氣未散飲食未進經脈未盛絡脈調勻血氣未亂故乃可診有過之脈過異於常候也切脈動靜而視精明視人之精彩神明察五色觀五藏有餘不足六府强弱形之盛衰以此參伍决死生之分夫脈者血之府也府聚也長則氣治短則氣病數則煩心大則病進上盛則氣髙下盛則氣衰細則氣小濇則心痛上謂寸口下謂寸中渾渾革至如涌泉病進而色色當作危弊綿綿如弦絶者死微妙在脈不可不察察之有紀從隂陽始始之有經從五行生生之有度四時為宜是故聲合五音色合五行脈合隂陽持脈有道虚靜為保虚心息慮以候脈也春曰浮如魚之遊在波夏曰在膚泛泛乎萬物有餘秋曰下膚蟄蟲將去冬曰在骨蟄宻周蟲君子居室四脈有生長收藏之義君子居室此人事也尺内兩傍謂内外側則季脇也季脇近腎尺主之尺外以候腎尺裏以候復中附上左外以候肝内以候鬲肝上賁賁鬲也滑云附上如越人所定關中也右外以候胃内以候脾上附上右外以候肺内以候胸中滑云上附上如越人所定寸中也左外以候心内以候膻中前以候前後以候後上前謂左寸下前謂胸前上後謂䂖寸下後謂背也上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也上竟上至魚際也下竟下盡脈動處也帝曰平人如何岐伯曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閠以大息命曰平人人一呼脈一動一吸脈一動曰少氣人一呼脈三動一吸脈三動而躁尺熱曰病温尺之皮膚熱也尺不熱脈滑曰病風脈濇曰痺滑謂陽盛濇謂無血人一呼脈四動以上曰死脈絶不至曰死乍疎乍數曰死脈絶不至天真之氣已無乍疎乍數胃穀之精亦􅀈此皆死之候也春胃微弦曰平弦多胃少肝病胃而毛肺病木受金邪也夏胃微鈎曰平鈎多胃少心病胃而石腎病火受水邪也長夏胃微弱曰平弱多胃少脾病弱而弦肝病一云弱而石冬病秋胃微毛曰平毛多胃少肺病毛而鈎心病一云毛而弦春病冬胃微石曰平石多胃少腎病石而弱脾病一云石而鈎夏病胃大絡曰里虚實鬲絡肺出左乳下其動應衣脈宗氣也盛喘數絶者病在中結而横有積絶暫斷也中腹中也呼吸定息脈五動曰平一呼一吸各再動定􅒚一動則五動常氣禀於胃無胃氣曰逆謂肝不弦心不鈎脾不弱肺不毛腎不石也脈弱以滑是有胸氣但代無胃曰死脈來動而中止不能自還因而復動曰代隂也不治六部平脈浮而散心之平弦而長肝之平按至骨舉指來疾而實者腎之平也肺平浮而數脾胃平緩而滿指凡診脈下指本部不平便可尋詳病情矣一脈為十變者何謂也五邪剛柔相逢之意也假令心脈急甚者肝邪干心也心脈微急者膽邪干小腸也心脈緩甚者脾邪干心也心脈微緩者胃邪干小腸也心脈濇甚者肺邪干心也心脈微濇者大腸邪干小腸也心脈沈甚者腎邪干心也心脈微沈者膀胱邪干小腸也五臟各有剛柔邪故一脈輙變為十也脈有逆順男女有恒而反者何謂也然男子生於寅寅為木陽也女子生於申申為金隂也故男脈在關上女脈在關下是以男子尺脈恒弱女子恒盛是其常也反者男得女脈女得男也其為病何如然男得女脈為不足病在内左得之病在左右得之病在右隨病言之也女得男脈為太過病在四肢左得之病在左右得之病在右隨病言之此之謂也甚矣診脈之難也王叔和脈經左手寸心小腸關肝膽尺腎膀胱䂖手寸肺大腸關脾胃尺命門三焦五臟六腑脈之定位也重按為臟臟者藏也輕取為腑腑者附也一指間重按分浮中沈輕取分浮中沈一部又分浮中沉數息且分至微何微乎尊生經男脈一如叔和女則左手寸命門三焦關脾胃尺肺大腸右手寸腎膀胱關肝膽尺心小腸男尺常弱初生微𦕈之氣女尺常强太陽心火之位也徧考方書悟褚論為精男女隂陽分也姙則男抱母女背母溺則男面覆女面仰男命繫腎衰自下始故小腹先垂女命繫乳衰自上始故乳房先槁雲間儲泳袪疑篇同噫庸醫渾醫死者可勝言哉天地者萬物之父母也隂陽者血氣之男女也男子負隂而抱陽女子負陽而抱隂南方陽也北方隂也男子面南而生則兩寸在南而得其陽故寸脈洪大而尺脈微弱也女子面北而生則兩寸在北而得其隂故寸脈微弱尺脈洪大也男得女脈為不足女得男脈為太過脈訣云女人反此背看之尺脈第三同斷病正謂此也諸家論男女脈者惟此不詭于理彼混焉無辨者非也因反此背看之説即以左右相反分男女者豈理也哉男子先診在左手女人先診在右手男子左脈大則順女人右脈大則順論診脈大法夫療病以識脈為先識脈必明金木水火土之理次察虚實賊微正之邪更復辨其部位則病若指其掌焉芤實洪弦𦂳伏沈濡滑浮濇弱微遲緩皆左右手之主脈也左手三部所主温風寒也温風寒病得於外是外邪所感致五行不平也皆客隨主變客既隨主而變所見者主脈而已右手三部所主燥濕暑也燥濕暑病生於内是内自傷五行自不能平也皆主隨客變主既隨客而變所見者客脈而已此脈法之大槩及其互相變見或左脈見之於右或右脈見之於左或隂陽更相乘或隂陽更相伏或一脈為十變脈理精微非一言可盡然其要不越乎隂陽五行而已且左右之脈五行分之各得三脈五三壹十五脈也芤實洪應心屬火弦𦂳伏應肝屬木沉濡滑應腎屬水浮濇弱應肺屬金微遲緩應脾屬土至於五行當更相平一有不平病即見焉而又當詳審乎主脈客脈之相合何謂主洪弦沉濇緩是也何謂客本部不應得之脈皆是也能如是可以盡知内傷外感主客標本之别判然在夫何繆哉論辯臟腑脈法盖五臟六腑之脈詳觀素難脈經諸書俱載臟脈周備惟腑脈只言浮沉微甚即隂陽剛柔之義五臟屬隂六腑屬陽配合表裏分為六部各司其職固臟腑之脈同部見焉臟脈主沈主微腑脈主浮主甚假令肺部如三菽之重與皮毛相得者肺脈也浮於三菽者太陽脈也大抵臟脈來微腑脈來甚者也難經有云然遲者臟也數者腑也亦隂陽之意耳但腑之脈分别五邪必于本臟互相推求明證定擬則庶無差誤矣脈形狀歌芤旁邊實中央虚浮按不足舉有餘滑脈往來流利動呼吸三至號為遲弱如浮細按欲絶伏脈重按要尋思𦂳若切繩如轉索沈須着骨乃得之緩而去來如小駛弦似弓弦狀莫違濇帶細遲如剖竹實當長大帶强微洪來極大微極細濡類軟同水帛衣此是叔和真妙訣泄𫝊明白漏天機論察脈之要夫察脈之要莫急於人迎寸口是二脈相應如兩引繩隂陽均則繩之大小等凡平人之脈人迎大于春夏寸口大于秋冬何謂人迎喉取之内經所謂别于陽者也越人不盡取諸穴之脈但取手太隂之行度魚際後一寸九分以為配隂陽之數而得關格之脈然不先求喉手引繩之義則昧尺寸隂陽關格之所起寸口倍于尺則上魚際而為溢故言溢者寸配尺極矣溢之脈一名外關一名内格一名隂乘之脈曰外關者自關已上外脈也隂拒陽而出故曰外格隂主于寸動于尺今自關以上溢于魚際而以後伏行是謂隂壯乘陽而陽竭陽竭則死脈有是者死矣此所謂寸口四倍于人迎為關隂之脈者也關以後脈當一寸而沉過者謂尺中倍寸口至三倍則入寸而為覆故言寸者尺倍寸極矣覆之名一名内關一名外格一名陽乘之脈内關者關以下内脈也外格者陽拒隂而内入也陽生于隂尺動于寸今自關以下覆入尺澤而關以下脈伏行則為陽亢乘隂而隂竭隂竭亦死脈有是者死矣此所謂人迎四倍于寸口而為格陽之脈也經曰人迎與寸口皆盛過四倍則為關格關格之脈羸不能極天地之精氣而死所謂關溢者復溢是也雖然獨覆獨溢則補㵼以生之尺部一盛㵼足太陽補足厥隂二盛㵼足太隂補足少隂三盛㵼足陽明補足太隂要皆二㵼而一補四盛則三極導之以鍼當取少隂太隂陽明之穴脈弱者取三陽於足脈數者取于手少陽二當于隂一至寸而反之脈有九候者寓浮沈於寸關尺也且越人不取於十二經穴直以二經配合於手太隂行度自尺至寸九分之位復分三部部中有浮中沉以配天地人也圖書編卷七十二
