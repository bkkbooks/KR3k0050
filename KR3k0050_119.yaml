body:
  text: 圖書編卷一百十九明章潢撰營法總敘軍制曰止則為營行則為陳言營陳同制也法云陳中容陳謂隊伍布列有廣狹之制欲其回轉離合無相奪倫營中有營謂部分次序有疏密之法欲其左右救援不相姦亂卒有外寇侵軼皆堅整全備莫得而動也茍非規模素定其孰能與於此乎故司馬宣王觀武侯營壘處所而歎曰天下竒才美其法製精妙也昔衛青出塞以武剛自環蓋今之車營也充國屯田則校聮不絶今之木柵營也其來尚矣凡大將出戰且約授兵二萬人即分為七軍如或少臨時更定大率十分之中以三分為竒兵中軍四千人內取戰兵二千八百人五十人為一隊計五十六隊戰兵為弩手四百人弓手四百人馬軍一千人跳蕩五百人竒兵五百人左右虞候各一軍每軍各二千八百人內各取戰兵一千九百人共計七十六隊戰兵內每軍弩手三百人弓手三百人馬軍五百人跳蕩四百人竒兵四百人左右兩廂各二軍每軍各二千六百人內各取戰兵一千八百五十人共計一百四十八隊弩手二百五十人弓手三百人馬軍五百人跳蕩四百人竒兵四百人凡馬步軍通總計當萬四千人共二百八十隊當戰餘六千人守輜重下營之時以四千人為中營在中心左右虞侯左右廂四軍共六總管各千人為營六面援中軍六總管下各更有兩小營每隊幕五口若在賊境地狹則四步下幕若地土寬廣不在賊境則五步下幕凡五十人為一隊合五隊為一大隊每軍大將一人副二人纛六口門旗二口色紅五方旗五口各隨其方色大將軍中營建纛五旗亦於纛後隨方建之凡置營先計人數列營幾重配地多少隨師衆寡一人一步使隊間容隊寧使剩隊下得少隊已住便定不得移易若有緊急隨方捍禦方營法凡軍逢平原廣澤無險可恃即作方營兵既有二萬人已分為七軍中軍四千人左右四軍各二千六百人虞候兩軍各二千八百人左右軍及兩虞候軍别三營六軍都當十八營中軍立一大營如其不在賊境田土寬平每營中當使容一營如狹則不得使容一營中軍在中央六軍總管在四畔象六出之花及軍出之日虞候引其前營在中央後廂向南左軍虞候押後在中央後左廂近北結角兩軍虞候相當伏同日月若左虞候前即虞候在後諸軍並卻轉其左右兩廂營在四面各令依本營卓幕得相統攝急緩須救援若欲得放馬其外營幕即狹長布列務取營裏面寬廣不使街巷窄狹營外仍置拓隊效此月營法凡地帶半險須作月營其營軍列面平背險而兩趐向險如月初生每營相去踈密又及置隊伍凖前方營法其門則臨時計之至若兵馬多少幕次所設此大約也如有緊急牧畜並於營後安置一説安營之法與圓陳相侔每一大營有四十子營營各四十幕為一部其一子營皆空其內入開三徑十二旗十六鼓左矛右戟前盾後弩旗鼓中央大將之所餘法同上裴緒營法凡兵師之營擬於城郭宫室必須牢固不可得而犯亂也其古法多依九宫六甲太乙天門地户之法皆為疑惑不便於事今則但取山川地形利便水草隨其險易為防禦平則列圍水則圓開山路則盤回川流則屈曲務於敵時便用耳束伍編陳敘夫營陳之法全在編𣲖伍什隊哨之際計算之定若無與於行陳然伍什隊哨之法則或為八陳或九軍七軍十二軍古人各色陳法皆在於編戶時已定一加旌旗立表則雖畎畝之夫十萬之衆一鼓而就列者人見其教成之易而知其功出於編伍者鮮矣故營陳以伍法隊哨為者乃以束伍冠之庶使知次第也今法長牌一面狼筅二把長鎗四枝短兵二件火兵一名為一隊方而為九直之為伍分而為三才為五花四隊為一哨虛其中哨長居之四隊為一哨虛其中鳥銃火器哨官居之每前後左右四哨為一總把總居之設與五方旗一付髙招一付巡視旗四件掌號一名金鼓十二名銃手另聚為伍庶便裝藥點放無他失而鳥銃則是單人自放也鴛鴦陳乃殺賊必勝屢效者此是緊要束伍第一戰法冝遵式以二牌平列狼箭各跟一牌以防拿牌人後身長鎗每二枝各分管一牌一筅短兵防長鎗進的老了即便殺上伍長執挨牌在前餘兵照鴛鴦陳緊隨牌後其挨牌手低頭執牌前進如己聞鼓聲而遲疑不進即以軍法斬首其餘兵仗牌刀遮抵於後緊隨牌進交鋒筅以救牌長鎗救筅短兵救長鎗牌手陳亡伍下兵通斬要依此法無不勝矣鳥銃遇賊不許早放不許一遍盡放每賊至近銃裝不及往往誤事今後遇賊至百步內聽吹竹筒響在兵前擺開每一哨前擺一隊聽本營放銃一箇才許放鳥銃凡弩手射手候鳥銃打放將完賊至六十步內起火放才許繼銃後射箭無令不許擅發夫倭性疑疑則遲兵臨之時我若進而有制彼若先不預聞便不就合我得易於分布余數年百戰但見諸賊據髙臨險坐待我師只至日暮乘我惰氣衝出或於收兵錯雜乘而追之又能用乘鋭氣盛以初鋒且其盔上飾以金銀牛角之狀五色長線類如神鬼以駭士氣多執明鏡善磨刀鎗日中閃閃以奪士目故我兵持久便為所怯余所著操練圖令內切切分詳退兵之法諄諄面諭鴛鴦陳勢速戰之條者良以此也若夫北方原曠地形既殊鐵馬動以數萬衆寡亦異馳如風雨進不能止豈可以此用之耶或曰必如何而可曰北方之事須革車三千練驥萬餘甲兵數萬必興十萬之師用衛公之法而不泥其迹乃可收功尺寸出萬千里水操擺船式夫擺船之説大端海濤洶湧港有灣曲闊狹或當風隱風不同隨港形淺深難拘一定之勢此言處寬回水善之形耳設使狹如羊腸則又當單隻一字順下不可拘以方也福船説夫福船髙大如城非人力可驅全仗風勢倭舟自來矮小如我之小滄船故福船乘風下壓如車碾螳蜋鬬船力而不鬬人力是以每每取勝設使賊船亦如我福船大則吾未見有必濟之䇿也且吃水一丈三尺惟利大洋不然多膠於淺無風不可使是以賊舟一入裏海沿淺而行則福舟為無用矣故又有海滄之説海滄説夫海滄稍小福船耳吃水七八尺風小亦可動但其力功皆非福船比設賊大而相並我舟非人力十分膽勇死鬬不可勝之然二項船皆只可犁沉賊舟而不能撈取首級故又有蒼船之設蒼船説一名􅀈􅀈又蒼之大者夫蒼船最小舊時太平縣地方捕魚者多用之海洋中遇賊戰勝遂以著名殊不知彼時各漁人為命負極之勢亦由賊入我地是也今應官役便知愛命然此船水面上髙不過五尺加以木料棚架亦不過五尺賊舟與之相等既勢均不能衝犁若使徑逼賊舟兩艘相聮以短兵鬬力我兵決非長䇿多見誤事但遇賊舟甚小一入裏海非我大福海滄不能入必用滄船以追之此船吃水六七尺與賊舟等耳其撈取首級水潮中可以搖馳而怏便者三者之中又此為利近改制為艟􅀈比蒼船稍大比海滄更小而無立壁最得中制遇倭船或小或少皆可施功但水兵人技皆次於陸兵設使將水兵教練遴選亦如陸兵然後登之舟中則比陸戰加一舟險其功倍於陸兵必矣司寄者何憚而不為此之勉哉三船利鈍總説大端天若風動勢順滄不如福蒼不如滄若風小勢逆則福不如滄滄不如蒼其開浪網船之類皆可備哨探而不戰者開浪以其頭尖故名吃水三四尺四槳一櫓其形如飛內可容三五十人不拘風潮順逆者又不如八槳船左右十六槳後一櫓更為飛迅但坐卧處不冠冕耳網船形似織梭內用二人前後用二人以罩罩之風浪大又可拖之塗上不至於覆吃水七八寸耳此可走報或用之裏港窄河動以百數每隻內鳥銃二三人蜂集蟻附沿淺沿塗而打之甚妙如賊追逼就可棄走一舟不過一金之費耳相寇情小舟數往來者謀議也遲而審顧者疑我也欲進而復退者探我也既退而卒進者襲我也鼓噪而矢石不下者兵器少也卻而顧者欲復來也先急而復緩者整備也促鼓而不戰者懼我也泊而揚帆者欲出不意也既退而不速者謀也夜火明而呼噪者恐我襲彼也擲纜而即起者欲擇其利也火數明而無聲者備器也夜泊而趨於涯涘者鄉𨗳欲往也促纜而不呼者急欲逃也促纜及流懸燈於塗者夜逸而潰也久而不動者偶人也鼓而無韻者偽響也近岸連村而不登劫者怯也不久困請和投降者詐也舟師總論夫舟師之用多在江海而不可過大如漢人之樓船晉人之巨舟所費不資且轉動為難冝求古擊竿橫海之制如閩廣所置者所謂百僚之名不必盡拘可也且今沿海衛所四十有一戰船之設百二十九即備倭船幾隻四時分哨上下畨休亦足稱有備然論者以為嵗嵗督造而無一日之用亦或積朽費缺舟中器具頁亦腐敗而軍士頗不素練則當事者亦宜為之規畫矣車制考詩秦風小戎章曰小戎俴收五楘梁輈遊環脅驅隂靷鋈續文茵暢轂駕我騏馵小雅采薇章曰彼爾維何維常之華彼路斯何君子之車戎車既駕四牡業業豈敢定居一月三捷駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔棘出車章曰王命南仲往城於方出車彭彭旗旐央央天子命我城彼朔方赫赫南仲玁狁於襄六月章曰玁狁匪茹整居焦穫侵鎬及方至於涇陽織文鳥章白斾央央元戎十乘以先啓行戎車既安如輊如軒四牡既佶既佶且間薄伐玁狁至於太原文武吉甫萬邦為憲采芑章曰蠢爾蠻荆大邦為讐方叔元老克壯其猷方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威左傳北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也公子突曰使勇而無剛者嘗寇而速去之君為三覆以待之戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝𣆀逐之衷戎師衷戎師謂戎師在三伏之中也前後擊之盡殪戎師大奔陳祥道曰古者之用兵也險野人為主易野車為主則險野非不用車而主於人易野非不用人而主於車車之於戰動則足以衝突止則足以營衛將帥有所庇兵械衣裝有所齎詩曰君子所依小人所腓晉中行穆子敗無終及羣狄於太原將戰魏舒曰彼徒我車所遇又厄請皆卒乃毁車以為行荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之荀吳用車法雖舍車而法在其中馬端臨曰兵雖曰凶器然古之以車戰其坐作進退整暇有法未嘗掩人之不備而以竒取勝也故韓厥遇齊侯則捧觴加璧郤至之遇楚子則免胄趨風可以死則為于犨之請矢可以無死則為庾公之扣輪所謂殺人之中又有禮焉至狄戎之侵中國則雲合鳥散輕進易退於是乎車之雍容不足以當徒之慓疾遂至舍車而用徒然彼長於徒我長於車捨吾之長技而與之搏是以兵與敵也故必設覆以誘之未陳而薄之然後可以取勝而車戰之法廢矣秦漢以後戰勝攻取者大槩皆如鄭之禦戎晉之敗狄耳何嘗有堂堂正正之舉乎晉馬隆擊鮮卑以山陕隘乃作偏箱車地廣則為鹿角車營路陜則為木屋施於車上轉戰而前行千餘里殺傷甚衆遂平涼州李靖曰偏箱鹿角之兵大要一則治力一則前拒一則東部伍三者迭相為用斯馬隆得古法詳矣按今海北地所造小車獨輪無箱若因其制而改為戰車一可以戰二可以前拒三可以為營四可以衝突五可以載軍裝六可以舁病卒且其費不多千錢以下可具一車中途有損不用匠而可修宋真宗時吳淑上疏請復古車戰之法謂夫當契丹之戰陳禦突騎之輕慓而可無蔽護哉夫人之被甲鎧所以蔽護其身也而戰之用車亦一陳之甲鎧也夫鱗甲之蟲肌肉在內鱗介在外而用車以戰亦一陳之鱗介也故賊至則斂兵附車以拒之賊退則乘勝出兵以擊之用竒掩襲見可以進故出藉此為所歸之地入則以此為所居之宅故心有所依據不懼敵騎之陵突也按淑之車制取常用車接其行軛駕以牛布為方陳此但可用之平地而施於險阻未易行也其後至和中有郭固車戰法嘉祐中有章洵陳腳兵車治平中有黃懷信萬全車後李綱又上車制圖王大智造霆電擊車然卒不見用用者亦未聞戰勝之效有則史書之矣今日之邊皆臨崇山峻嶺浮沙磧石其車之大者不可也惟魏勝創為如意車每車二人推轂行則載輜重器甲止則為營挂搭如城壘人馬不能近遇敵又可以禦箭鏃列陳則如意車在外以旗蔽障弩車當陳門炮車在陳中李賢上禦戎疏略曰臣觀今日之拒馬木止能拒馬不能避箭挨牌止能避箭不能拒馬惟有所謂戰車者既能避箭又能拒馬蓋此車即漢時衛青武剛車之類青擊丐奴深入寇內地見單于兵陳必以武剛車自環為營兵法謂是車有中有蓋為先驅焉臣謂武剛車徒能避其弓馬自今之戰車不但能避弓馬又有取勝之道取勝者何火鎗是也論中國之長技無出於火鎗前代未嘗有也若用得其法彼之弓馬弗能當也近來不能出此取勝者非火鎗之過用之者不得其法耳且使火鎗者須要遮其身以壯其膽然後發而有所中不然則畏其箭來傷已手足失措雖能發鎗不暇取中臣觀車制四圍箱板內藏其人下留銃眼上門上窗長一丈五尺髙六尺五寸前後左右橫排鎗頭每車前後占地五尺若用車一千輛一面二十五輛約長四里四面共十六餘里欲行則行欲止則止謂之有腳之城內藏軍馬糧草輜重以此禦敵使馬不能衝陳箭不得傷人彼若近前火炮齊發竒兵既出彼若逺避我勢自張我威益振况此時大同宣府遼東一帶軍民不敢出城耕作城外之地俱是敵人馳騁之所若此等邊俱是用此車遣將出師可以橫行於沙漠可以深入其巢穴不但用之退敵驅之出境使我軍民得以耕作營其衣食所謂其䇿莫善於此余子俊上言邊務曰自古命將出師誅暴禁亂見可而進知難而退進退之間非車不可臣奉命以來熟看大同地方山川平曠宣府地方一半相等門庭寇至車戰為宜今為軍之計大率以萬人為一軍戰車五百餘輛用兵軍十人駕拽行則繼以為陳止則橫以為營車空缺去處用鹿角祚補塞凡戰士器械不勞馬馱乾糧不煩自齎若使賊人合衆對壘彼用弓矢止有百步技能我用鎗炮動以三四百步威勢如相持過久彼將分散搶掠我則出兵或首遏其驕橫或尾擊其惰歸前項車營取便䇿應運有足之城䇿不飼之馬此意萬年守邉簡易之法也夫兵戰用車其來尚矣然古今異人古兵車之制不可復矣今當師其意不師其制其必斟酌損益今民間獨輪小車而用之乎蓋大車難行而小車易運大車之造費多而小車費省大車用騾畜費芻而小車一二人可推挽大車重滯難於前卻而小車開合周旋易為布陳大車遇險阻溝塍難踰而小車遇險即可舁以度是故今欲車戰酌用小車便矣宋李綱論用兵謂步不足以勝騎而騎不足以勝車吳淑請復車戰之法謂契丹所長者騎兵茍非車以制之則何以禦其奔突我戰之用車一陳之鎧甲也故可為行止為營陳賊至則斂兵附車以拒之賊退則乘勝出兵以擊之出則藉此為所歸之地入則以此為所居之宅故人心有依不懼鐵騎之陵突也二子所言其逹車戰之利乎自漢以下備邉禦狄用車者不一而足衛青之擊胸奴以武剛車自環為營光武造戰車上作樓櫓置塞上以拒丐奴隋禦突厥皆戎車步騎相參與鹿角為方陳哥舒翰節度隴右嘗造戰車以收黃河九曲是數者皆知車戰之利而用之也不特此也馬隆擊鮮卑作偏箱車為木屋施於車上轉戰千餘里殺傷甚衆遂平涼州劉裕伐秦為魏軍所遏命將軍朱超石等以車七百乘渡河北岸為却月陳以大弩及矟千餘禦之魏師奔潰後魏攻鍾離梁武帝遣豫州刺史韋睿救之魏將軍楊大眼勇冠三軍將萬餘騎來戰所向皆靡睿結車為陳以強弩三千一時俱發殺傷甚衆矢貫大眼右臂大眼退走唐馬燧鎮河東戰車冒以狻猊行以載兵止則為陳遇險以遏奔衝討田恱大破之前代名將用車取勝往往如此况於今日如何不可行之有若夫戰車制度則往籍所載不一今姑舉其可行者著之宋魏勝嘗創為如意戰車弩車炮車矣近日何燕泉餘冬嵗序録載今寧夏戰車之制矣大明會典雙槐日抄皆嘗録及當時戰車矣丘文莊亦嘗言小車之制於大學衍義補尤詳可考而近日邉城亦嘗言輕車之利矣今誠欲舉行但考三者斟酌行之斯善矣抑守邉用車尤有説焉亦時焉而已蓋承平之勢與開國創業時勢霄壤不侔開國利於戰承平利於守開國之初乘百勝之餘威士馬精強將臣彪武有不戰戰必勝斯時也車固為贅也不必用也若夫承平恬熙之餘百不如前強寇內侵非守何以為䇿非車何以為守不暇逺引即以我國朝言之國初兵勢視今日何如也髙皇帝命將四征而漠南肅清文皇親駕六征而寇迹逺遁無怒臂當轍請降恐後斯時也守在四夷邉雖不備可無警也而何談於車後來則有不然者正統己巳之役王師二十萬騎覆於土木近日邉臣搜套亦以數萬騎敗於花馬池是皆不知承平時勢之宜戰不知禦狄之宜車而不宜騎以我所短角彼所長一敗塗地無惑也使二役也有車為拒長短兵夾衛之彼馬豈能近驅車以衝之彼馬將退走豈有此禍哉悲夫一時謀臣不知出此也愚備徵今古而灼知車戰為守邉禦狄之長䇿不容於己故首陳之用車總論兵法曰用車之法五車有一長十車有一吏五十車有一卒百車有一將易戰之法五車為列前後相去四十步左右十步隊間六十步險戰之法車必循道十車為一聚二十車為一屯前後相去二十步左右六步隊間三十六步五車一長縱橫相去一里易戰之法一車當步卒八十人八十人當一車一車當十騎十騎當一車車騎者軍之武兵也故十乘敗千人百乘敗萬人用車之道隂濕則停陽燥則起貴髙賤下馳其要害逐其糧草若進若止必從其道敵人若起必逐其迹其士須選少壯強健走追奔馬及馳而乘之則前後左右上下周旋能縛束車旗力可引其八石能射前後左右便習者名武車之士養之不可不厚也然用車之道死地有十勝勢有八不可不審察也可往而無以還者車之死地越絶險阻乘敵逺行者車之竭地前易後險者車之困地陷之阻險出而無以返者車之絶地圯下漸澤黑土粘埴者車之勞地左險右易上陵仰跋者車之逆地殷草橫畝犯歷深澤者車之拂地車少地易與步不敵者車之敵地後有溝瀆左有深水右有深塹者車之壞地日夜霖雨旬日不止道潰地陷前不能進後不能解車之陷地此十者車之死地也拙將之所以見擒明將之所以見避凡以車陷敵者敵之前後行陳未定或坐或起即陷之陳堅不固士卒前後相顧即陷之前往而疑後恐而怯即陷之三軍卒驚皆薄而起即陷之戰於易地暮不能解即陷之逺行而暮舍三軍恐懼即陷之此八者車之勝勢也將明於十害八勝敵莫之禦也至若敵騎慓輕以安車制之適當其理河朔坦平以車騎行之正得其便前賢著説皆可推用故謂以車禦侮以騎逐利行有所恃止有所息居則不可犯動則不可失機此用車之利也臨陳輕車制度此車面濶三尺單輪前昂後低兩傍各設枝柱一根活眼可以上下車後長拖兩腳行則持之止則拄之中置方箱可藏二人以放鳥銃車前橫木開孔以閣鳥銃三箇內又一橫木閣鳥柄令銃可上下左右也前用竹皮夾紙綿為牌四面安置木架之上其隙處開三孔以放鳥銃一人安樂彼此迭為之車前兩旁各沖出三尺鐡鎗二根前稍出橫置二木安一上一下各懸夾綿方帳一面打濕垂幛用避箭炮其上帳用繩索牽扯則開起放炮下扯則放遮避炮此車務要輕便兩人可擡而行出則為陳止則為營是也立營時車兩旁地夾一千里城牀子弩將軍炮牌卒長鎗各二周圍排定真如鐡壁銅墻可橫行丐奴安營衝鋒百戰百勝之具竒門遁甲總敘昔大撓造甲子而天地之數管是矣風后復演為遁甲其法幽深隱祕未易窺測故謂之為遁歟大約以六甲儀為直符以二十四氣為式局而六戊之下貴神攸處然總之以乾坤坎離震巽艮兊八卦以一節二氣分之八節各起主卦冬至後陽遁順數自一至九夏至後隂遁逆數自九至一冬至後順布六儀逆布三竒夏至後順布三竒逆布六儀所謂六儀者即六甲也三竒者乙丙丁也如六甲為直符直事乙為日竒丙為月竒丁為星竒戊己庚辛壬癸為儀也常以直事加時宫即知開休生三門所臨又以直符加時於天上三竒與開休生三門合則吉無不利九宫即九星也蓋天有九星以鎮九宫地有九州以應九土取諸洛龜戴九履一左三右七二四為肩六八為足五居中宫之儀也是遁甲法不過乘天之日時擇地之方向使人皆知趨吉避凶云耳豈行軍避敵伏匿逃形之怪術哉竒門布局法遁甲之法三重象三才上層象天列九星中層象人開八門下層象地定八卦九宫天蓬及休門與坎相對三才定位也乙丙丁三竒也乙為日竒丙為月竒丁為星竒戊己庚辛壬癸六儀也而甲常同六戊甲戌常六己甲申相同六甲二辛甲辰壬申寅癸甲雖不用而六甲為天之貴神常隱於六儀之下為直符其發用實在此故謂之遁此大衍虛一太玄虛三之義也蓬任衝府輔英芮柱心禽九星也遞直符休生傷杜景死驚開八門也通為直使二十四氣直於八卦坎則冬至小寒大寒艮則立春雨水驚蟄震則春分清明榖雨巽則立夏小滿芒種離則夏至小暑大暑坤則立秋處暑白露兊則秋分寒露霜降乾則立冬小雪大雪四時分至及四立為八節得八卦正氣故各為初直二氣從之以分天地人元又間六宫而行各為中下元也冬至十二氣為陽遁皆順行夏至後十二氣為隂遁逆行二遁各占卦四為節中之氣各六諸氣一周八卦嵗事備矣此以月取之也五日一候故遁法過甲巳易日局蓋自甲子至戊辰五日六十時足為上局己巳至癸酉五日六十時足為中局甲戌至戊寅又五日六十時足為下局三局三才之道也餘如之由是甲巳加四仲皆為上加四孟皆為中加四季皆為下三局定而六十甲子畢矣上局則起本氣之上元中局則起下易之法也故凡日雖以氣候相推至三元先後不同而三元始終日有多少在經有折局之法因日定局因局起元終不可易此以日取之也凡選日時先分二遁次定三局方起三元蓋先看其日在何節氣內合為其遁次看其日在何甲巳下合為某局於是一本局起遁冬至後為隂遁則遁逆六儀順布三竒本法自甲至癸十千常以序行如局逆順並先布三竒後六儀今皆反之因指六甲為六儀而布局及布三竒並以乙丙丁為序皆捷法也布五竒理於二宫此土長生於申之説也九宫已布滿則點出其時旬頭之甲在何宫以為直符以其門為直使然後以加臨法用之尋本時枝落處加以直符加臨已乃視其時課大綱吉與凶所作之方得不得休開生三門并天上三竒必其時課吉又得門竒不可用事此三開即北方三白也其所選時每月先取四大時用之諸法已通必於此得吉縱遇太嵗金神等殺亦無害凡行方者尤宜用此已有諸門可止所向若為隂陽二寄家以其宫為山或為其坐向而選之但於符應經不可不詳察也夫遁甲一為課四千三百二十古人約為千八十局後修為七十二局最後撮為圖局十有八可為要矣然為局尚多莫若止一局用盤子為簡徑若又嫌􅌉子多事則惟上指為妙冬至用陽遁順行九宫夏至後用隂遁逆行九宫總只是從天道也天道日也圖書編卷一百十九
