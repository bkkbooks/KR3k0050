body:
  text: 圖書編卷三十五明章潢撰皇明南北兩都總叙自古帝王平定天下必建都㑹以為四方之極而據形勝擇便利正所以為久安長治計也是故武王得天下都于豐鎬成王繼其志即有宅洛之舉亦猶我太祖建都于吴而成祖繼之又建都于燕也成周之後漢唐宋皆並建兩京然漢唐皆以長安為西京洛陽為東京宋以汴為東京洛為西京其地皆接壌相去不甚逺也我朝則以南北為稱葢跨江南北而各為一大都㑹也高皇帝定鼎金陵天下萬世之大利也文皇帝遷都金臺天下萬世之大勢也葢天下財賦出于東南而金陵為其㑹戎馬盛于西北而金臺為其樞並建兩京所以宅中圖治足食足兵據形勢之要而為四方之極者也用東南之財賦統西北之戎馬無敵于天下矣論都㑹形勝地脉向中國來者三支北絡發崑崙東折而東南行其背則沙漠其正結為冀都其支結為燕京其餘氣為出塞外都自雲中上黨轉换来三面繞河外案多疊大河東北趨入海重重包裹故堯舜禹都之但四方險阻貢輸非後世所便河且徙而南氣大洩燕京旺氣我朝鍾焉中絡發崑崙東南至岷山由蜀隴轉北而東為終南長安之地也金城四塞以為固古豪傑有取焉貢輸艱入後世費繁今能處之耶由闗中出至太華中嵩伊闕既鑿是謂洛陽洛陽天地之中隂陽和南北平百物㑹周公營之地氣自北以南人事化機互以為用古今固不齊也行乃盡于東泰翻身顧祖東海外盪河江前向萃産賢貴凝聚有因後世河徙截其来脉者三乃㑹通河復加截之其力遂微南絡發崑崙迤東南而行至大峨山其背為西戎直南折而東為五嶺其餘氣為南蠻復折而東北大盡於建康其支結為吳閩越大峨而下至于五嶺環抱中原無情南面力雄勢次吳越閩支凝謭力海水陽勝明有餘而氣不足以當之一大都㑹於今日其金陵也乎長江天塹財用易輸持䕶不少世謂江左不得於宅中偏安不可以圖大是安於建康之説不能用建康于天下夫安于建康乃謂大勢不拱東壩未立秦淮河不湧䢴溝尚微故建康俗狃于自便知守江而不知用淮於江知圖淮而不知用天下於淮知據武昌之上㳺而不知上㳺之守鎮知集貨之易而不知散貨以用于四方知南兵之難振而不知練兵于北之可用故金陵不可以故常論當有知者曠百世相感不爾則中絡為河截所在其汴淮江漢之間乎金陵為南京汴梁為北京國初深見也冀州之中三面距河處是為平陽蒲坂乃堯舜建都之地其所分南北之境是為幽州太行自西来演迤而北綿亘魏晉燕趙之境東而極于醫無閭重岡疊阜鸞鳳峙而蛟龍走所以擁䕶而圍繞之者不知幾千萬里也形勢全風氣宻堪輿家所謂蔵風聚氣者兹地實有之其東一帶則汪洋大海稍北乃古碣石淪入海處稍南則九河既道所歸宿之地浴日月而浸乾坤所以界之者又如此其直截而廣大也况居直北之地上應天垣之紫微其對面之案以地勢度之則泰岱萬山之宗正當其前也夫天之象以北為極則地之勢亦當以北為極易曰艮者東北之卦也萬物之所以成始而成終也艮為山水為地之津液而委于海天下萬山皆成于北天下萬水皆宗于東于此乎建都是為萬物所以成終成始之地自古所未有也兹葢天造地設蔵之以有待我太宗文皇帝初建藩于兹既而入正大統乃循成王宅洛故事而又于此建都焉葢天下王氣所在也前乎元而為宋宋都汴梁前乎宋而為唐唐都于秦在唐之前則兩漢也前都秦而後洛然皆非其州境也雖曰宅中圖治道里適均而天下郡國乃有背之而不面焉者元人嘗都于此至順帝三十六年而祚歸于我朝蓋我朝得國之正同于堯舜拓地之廣過于漢唐書所謂東漸西被朔南暨北聲教訖于四海僅再見也猗歟盛哉孔子曰為政以徳譬如北辰居其所而衆星拱之易曰離萬物皆相見南方之卦也聖人南面而聽天下嚮明而治天下以北面為天之樞居微垣之中而受衆星之環拱天之道固在北也天之道在北而面之所嚮則在南焉今曰京師居乎艮位成始成終之地介乎坎離之間出乎震而勞乎坎以受萬物之所歸體乎北極之尊嚮乎離明之光而使夫萬方之廣億兆之衆莫不面焉以相見則凡舟車所至人力所通者無不在于照臨之中自古建都之地上得天時下得地勢中得人心未有如今日者也况此乃蘓秦所謂天府百二之國杜牧所謂王不得不可為王之地牧之言曰禹畫九州一曰冀州舜以其分太大離為幽州其人沉鷙多材力重許可耐辛苦本兵矢他不能蕩而自若也復產健馬下者日馳二百里所以嘗當天下兵馬之強在昔則然矣且其地瀕大海在秦始皇時起黃腄瑯琊負海之粟轉輸北河是時海運固已通于兹矣杜甫謂漁陽豪俠之地雲㠶轉遼海粳稻来東吳則唐時又一東吳之粟于此焉前元盛時漕東南粟至燕嵗幾至四百萬石而南方之貨亦隨以至是天生鉅海以為國家運道不假通渠轉漕自然而成者也則其食貨之豐有非他方所及可知己矧兵食俱足文武並用向明以用文而臨乎華夏則有以成文明之化育幽以建武而厲乃兵戎則有以張震叠之威信自古建都之地莫有如今日者也雖然居安者不可不思其危享全盛者不可不為衰微之慮自昔都燕者始于召公而極于金元然召公侯國也金元帝都也侯國處偏隅之地其勢在治内而不能治外帝都操統馭之權其勢在治外而不專治内歴觀金元之代以推出治之原則固邊圉選將帥强兵馬豐貨食使國勢壯而逺人不敢萌窺伺之心謹法度用賢才省刑罰薄税斂使朝綱正而生民不敢起背馳之念如此則國家如磐石之固泰山之安而乆安長治之策與天地相為悠乆矣兩都形勝總論嘗謂形勝者可以威天下而不可以留天下威天下以險險也者力之所恃者也力不足者取之于險留天下以仁仁也者險之所恃者也險不足者取之于仁君而仁矣無險可也險而且仁萬世猶可也失仁而得險亦或可也不可久也得險而力且足焉而敵者猶斃也易曰王公設險以守國而周官之法所以必立民極之中也此古之有天下者雖不敢不本之以仁而亦切切焉據形勝之地以雄視天下葢亦知險之不可廢也且天下之險因乎勢得其勢者可以居重而馭輕天下之勢因乎時觀乎時者可以通今而酌古王者所居曰京師大衆之義也曰天邑天子之居也據之非其地則不足以協天下之威匹夫劒立而全城不守矣善守國者烏可不審勢以宅險本之不以仁則不足以建天下之極外患雖寕而内變將作矣善宅險者烏可不廣仁以和民孟子曰天時不如地利地利不如人和此定論也嗚呼伏羲畫卦而臨民黃帝垂衣而神化斯時也未見有所謂險者若堯之平陽舜之蒲坂禹之安邑亦各自其所起取朝貢之易達者都之耳後世因其皆在冀州而有三面距河之險然後見其險焉耳在堯舜禹不之知也在堯舜禹之民亦不之知也何也天下安于仁而無所事于力也下堯舜而文武不能不用乎力矣然而仁之所將也是故文武之豐鎬所以據天下之形勝處上㳺以制六合其慮天下也逺成王之洛邑所以㑹天地之中和宅中土以莅四海其示天下也公威足以行其慮而莫敢誰何恩足以𢎞其功而下皆用命厯年八百固其所也何則仁與力之並用雖無險可也况得其所謂要㑹者哉是知周之所以永命者仁也非徒在險也王孫滿以卜世卜年之説謬當聖人之心是術數者奚足與議周王之仁哉下周而漢而唐而宋其仁葢已㣲矣而力且弗之競也漢祖䇿都闗中所以執天下之樞也南北二軍其權足以雄天下唐亦都闗中亦所以執天下之樞也内外諸府其兵足以威天下然九錫之雄既熾而西京之所以衰方鎮之兵漸強而朝廷之所以斃至于晩年末路司巇拊鍵内鉥外乗而太阿之柄已倒持而授人之手矣其誰不逞哉宋太祖之都汴所以因五代之舊也西夏之役方殷而國勢浸弱仁宗之議修洛陽所以為徙闗中之漸也仲淹之説不行而勢益弗競於是再和再退再退再失而崖山之溺已噬臍無及矣其將誰咎哉何也葢漢之力雖足以自競而七制之仁未徧也况七制之外如桓靈者乎唐之兵雖足以耀武而三宗之徳益衰也况自三宗之外如武宣者乎宋則險力俱斃仁亦無足稱矣嗚呼豈是形勝之罪又豈形勝之所能留哉恭惟太祖高皇帝下建康而定鼎此南都之所由始也太宗文皇帝靖難北廵之日命阮安而營北平此北都之所由始也以今觀之南都之形勝跨江南北以為甸服岷峨以西五嶺以北川流以萬數皆㑹于江繞鍾山而之海岍岐之南太華恒嶽之間川流亦以萬數皆會于河入乎淮朝宗畿甸而之海布帛榖粟之富魚鹽材用之饒甲于天下天下無事則坐享揚越之粟而無轉輸之勞天下有事則席卷全吴之甲而為張皇之舉誠周禮所謂隂陽之會風雨之交諸葛孔明所謂鍾山龍盤石城虎踞真帝王之居也古之人有都之者六朝是也而偏安之陋固不足以擬一統之盛北都之形勝奄有幽燕以為王畿外設八府以為捍衛太行在其西醫無閭在其東重岡叠翠鸞鳳峙而蛟龍走大海居其左九河經其前漭漾浩蕩浴日月而浸乾坤沉鷙激捍之材雲錦騰驤之馬為天下最向明以用文而臨乎華夏則有以成文明之化育幽以建武而厲乃戎兵則有以張震疊之威誠蘓秦所謂天府百二之國杜牧所謂王不得不可以為王者也古之人有都之者金元是也而天命靡常不能為萬年鞏固之業則天下之至險已屬之于天下之至聖而深仁厚澤又有以維持之也以天下之仁起天下之義而財賦出於東南矣以天下之義聚天下之力而戎馬盛於西北矣財賦出則所以豢其力者有備戎馬盛則所以雄其險者有人力以仁奮險以力固地利人和萬世猶競宜無復容喙者矣然弊生於積習之餘事怠于異世之後今之東南視昔之東南何如也始之以水旱繼之以蝗蝻加之以賍吏之攘剥而陰瘠於土豪之浚血則今日之東南非昔之東南矣今之西北視昔之西北何如也前者邊隅不靖參將芮寕之死一時同殲者八百近者旱魃為災延綏軍民之死形於奏牘者五萬人則今之西北非昔之西北矣善守成者可不張而相之扶而植之使天下被其仁而不知作其氣于事變之猝乗而顧因仍於漢唐宋末流之弊哉然觀今二都之勢北都為急請得復舉而備言之可乎漢之邉在北去咸陽千餘里唐之邉在西亦去長安幾千里今京師北抵居庸東北抵古北口西南抵紫荆闗近者百餘里逺者不過數百里疾馳之騎約日可至所謂居庸則吾之背也紫荆則吾之吭也據闗中者將以搤天下之吭而拊其背都幽燕者切近于漠北又將恐其搤我之吭而拊我之背也葢制人而不得猶不至于失已守已而失焉則其害豈但不得於人而已哉此其外患之可畏也至於唐之漕因于河宋之漕因于汴國初海運十萬餘石以給邉永樂引汶泗諸水以益濟引黃河自魚臺以益御漳然後漕舟自江達于淮自河達于京師今觀漕河以一衣帶之水掬土可塞萬一無賴荷鍤而決迎鑾瓜州之垻則江不達于淮矣塞魚臺汶泗之水則河不達于京師矣斯時也將何以處之哉唐之軍士脱巾而呼而元之貴人抱珍而枵腹者可鑒也此其内變之足虞也是故知外患之可畏則必選將帥厲甲兵廣儲蓄塞要害先為不可勝以待敵之勝則患斯弭矣知内變之足虞則必慎隄防設重鎮恤軍士廣田畜先為不可犯而後人莫之敢犯則變斯消矣如此則善政流而仁不阻大化也武勇奮而力不困大權也四漠息而京師無憂大勢也勢張則固權重則肅化洽則順不怒之威篤恭之妙信能咸美文武而陋漢唐宋於不足言矣然猶未也矧今日京師之地去黃帝堯舜之都於七八千年之後則其所以成華胥之治致於變之風將不在隆古而在今日矣南北兩都形勝北京之龍發脉崑崙河在其南與北龍並從西南走東北山脊經雲中至冀州拔起西山正脉脱卸平地四十餘里由阜城門入而結都城西山左張稍北行而東環厯居庸闗直至山海闗為羅城以障蔽東方盧溝一水自西南来宻雲一水自東北来皆數百里㑹流合于丁字沽此兩大水之分合處也京城據此兩水之中衛輝一水呼為御河自南奔趨朝入數百里至直沽㑹盧溝宻雲二水為内堂之水山東諸山横過為前案黃河遶之淮南諸山為第二重案大江遶之江南諸山則為第三重案矣葢黃河為分龍發祖之水與大江及山東淮南江南之山水皆来自萬里而各效用于前合天下一堂局此所謂大聚大成之上者也南京山水起祖發源於岷其逺亦萬里東行至仙霞闗嫡宗由此分龍出脉東北行至常鎮遂逆江而西行二百餘里聳起鍾山作囘龍顧祖穴大江逆遶其背淮揚廬鳳纒托于江北又北則繞以黃河黃河之北又纒托以山東之山若非大幹龍安能正盡逆二百里茍非逆入之深何以受此四重萬里山水之遶托於背後乎是皆合天下為一堂局亦大聚大成之龍也合論葢南京回龍逆結山水遶背乃定格也北京順結山水遶前亦定格也前後之遶雖異其理則一矣但北京之東北朶顏地方東則遼東東南連朝鮮左肩左臂𢎞厚障蔽大海與西南西北山水畧相停聚氣之厚在此南京左肩臂乃江陰通泰之地傷于薄氣不足也優劣亦在此乎燕京論燕京依山帶海有金湯之固真定以北至于永平闗口不下百十而居庸紫荆山海喜峰古北黃花險阨尤著故薊州保定重兵屯焉自山後諸州棄以與人則居庸之外即宣府為藩鎮廣平以南水陸畢會于臨清而天津又海運通衢也其防禦之勢山西行都司當其衝萬全都司䕶其背大寕都司蔵其備薊州守備㫁其徑萬全都司一衛一所嵌山西行都之境以為瞭逺之兵大寕都司五衛一所嵌薊州守備之境以為夾持之法自秦漢備邉所急在西北上谷北平為緩我朝所急在東北甘肅寜夏為緩秦漢急西北故秦塞起臨洮漢武置朔方緩東北也神京以遼東為左臂宣大為右臂古北口永寜居庸為腦後遼東限以山海宣大隔之居庸惟大寜淪失天夀與塞外為隣宣府以遼東隔絶腦後之防葢甚踈矣説者欲規復大寜此豈可易言哉養威蓄鋭觀釁俟時可也其他如遂城西北之牟山保州西之栢山保安之八角口定州之北岩與夫石舅銀坊冶山等處皆臨制中原之道然山川形勢與京都大是向背茍屯兵聚衆必死以守未易當也此外自安順東至任丘二十里川塹溝瀆韋泉縱横地類天牢又東北至雄州三十里又東至霸州七十里又東抵海口營田圩􅜌集水淤濘地類天陷又自順安至肅約五十里葦草叢茂地類天羅凡此皆兵家所忌遇澇更甚未易進矣建康徐淮臨徳之間似當練兵儲將可備緩急遣發無徒藉手于北可也北直𨽻圖叙北直𨽻古冀州地京師即金元舊都也扆山帶海有金湯之固左環滄海右擁太行北枕居庸南襟河濟真定以北至於永平闗口不下百十而居庸紫荆山海俱闗喜峰古北黃花鎮俱口子在順天東北境險阨尤著故薊州順天府屬保定重兵屯焉山後諸州自宣東南至遼陽俱是故我大寕都司地也自國家棄以與敵今日衛是則居庸之外所恃以為藩籬者宣府耳廣平以南四方水陸畢㑹于臨清山東屬州轉漕京師輻輳而進若天津又海運通衢也國初江南糧運俱從海道今廢惟薊州運道猶通河間真定保定之間多達兵營塢其人性獷難馴且東安霸州武清俱順天府屬而東野曠人稀姦宄伏匿頗基腹心之患迤山一帶則樵採耕牧之利居多奸人每竄其中有司病之葢賦煩民困户口流亡雖畿甸同風而順天之馬政寄養馬匹河間之水潦患尤烈焉沿革古幽薊之地左環滄海右擁太行北枕居庸南襟河濟形勝甲于天下誠所謂天府之國也遼金元並嘗建都至我成祖文皇帝乃龍濳于此及纘承大統遂建為北京而遷都焉于以統萬邦而撫四夷真足以當形勢之勝為萬世不抜之鴻基自唐虞三代以來都㑹之盛未有過焉者也北直𨽻府八屬州一十七縣一百一十五又州二屬縣一總為里三千二百有零戸四十一萬八千七百八十九口三百四十一萬三千二百五十四夏秋二税共米麥六十萬一千一百五十二石絹四萬五千一百三十五匹棉花一十萬三千七百四十八觔鈔九貫馬草八百七十三萬七千二百八十四束長蘆鹽運司額辦大引折小引鹽一十八萬八百七引鹽運司一在滄州領鹽課司二十四青州十二滄州十二親軍衛三十九属所十百五十二守禦千户所一在京屬所衛三十八属所二百三守禦千戸所二在外直𨽻衛三十九属所一百二十二守禦千户所九大寜都司領衛十属所五十四守禦千户所一萬全都司領衛十五属所七十六守禦千户所七京營見操并外衛馬歩官軍共一十一萬七千三百餘員名廵捕官軍五千六百餘員名薊州保定宣府三鎮馬歩官軍共十萬五千八百餘員名太僕寺所屬順天等府寄養馬三萬肆千八百餘匹然贏縮有時弗常厥數南北直𨽻及山東河南二省種馬共四十餘萬匹各處苑馬寺行大僕寺不與焉欽差總督薊遼都御史一巡撫順天真保定都御史三巡按御史三提學御史一巡鹽御史一印馬御史一巡倉刷卷京營御史各一順天府其名漢廣陽宋燕山民貧賦重丁少差多煩劇難治其属州五縣二十二通州三十二里冲煩昌平州二十七里陵寢重地且近黃花鎮民疲涿州四十六里冲疲軍民雜霸州三十一里多賊盗好訟僻薊州二十六里古漁陽僻冲煩疲附郭之縣大興四十九里錢糧難追宛平一百二里卜錢糧難追夕良鄉二十五里