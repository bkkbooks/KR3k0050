寕五里曰保安武定徳興永興涿鹿威塞奉聖七里都司一曰萬全處置北直𨽻畿甸重地根本係焉永平逼近邉陲屢遭外患順天役賦並繁禁厰莊田星羅棊布事務掣肘而養兵之累則諸縣同焉河間類多水患真定保定路極衝繁軍屯達塢交錯其間撫輯為難且每秋防守三闗更為勞費順徳俗淳訟簡大名廣平地僻土饒賦税易辦長民者持亷敦儉加意撫綏可不勞而治矣議墾田今保瀛燕薊之墟巨浸洪洋在在皆是萑葦蘆荻蕭然彌望抑何惑乎民貧而賦莫給也宜設營田憲使如前代擇有心計忠實給工本募農人教土耆為水田重事權久任弗移如此豈惟贍民且可以限冦騎備漕便輕南運尚亦有利矣議防禦北畿防禦之勢山西行都司當其衝萬全都司䕶其背大寜都司蔵其備薊州守備㫁其徑萬全都司一衛一所嵌山西行都司之境遼逺之道也大寜都司五衛一所嵌薊州守備之境夾持之法也議地利按京畿之地西北多高山大川東瀕海沮洳之塲也每嵗霖雨輙泛溢為害愚徴今凖古有轉移之策焉畧具于左嘉靖中給事中秦敖言畿輔之地北抵灤州南距慶雲一帶州縣地廣人稀生理鮮少然水深土厚地方沃饒乞選江浙之士為之長吏使之訪募江南作田如法水耕隨其高下或鑿渠以畜水或築圩以㐮田仍乞倣行古者孝弟力田之科有能率衆墾田萬畝者授某官其千畝者亦如之有司果能勸課有法不吝超遷如此則三數年後必有萬倉之積矣王畿足則天下無不足之憂而嵗漕之數可省矣富國之道莫先于此詹事霍韜亦言臣嘗詢訪邉闗地利自真定至永平灤州近邉之境皆有山澗之泉惟北人不知水利反以為害若能慎選守令勸民農畝開導溝洫旱以灌溉潦以洩淫沿溝之堤徧植果木可以資用戎馬遇之可以限隔不敢長驅此古昔明王設險保國之要道也愚按二公非徒言無徴一本于前代已驗之成效觀大學衍義補所載宋陳恕何承矩營田河北及元托克托議立分司農司召募江南人耕種京畿則地無遺利不煩海運而京師足食可知矣今誠因二公之言推而行之實所謂裁成天地之道輔相天地之宜左右斯民參賛化育之第一義尚何水旱之足憂乎議設輔鎮北京宻切邉境近輔之城少雖曰大同北輔易州西輔永平東輔臨清南輔甚逺也東南通州二城矣東大寜已廢移於保定矣宜東直門外二十里上築一城如通州為近京東北之輔西北因上陵築沙河城矣西南良鄉北界築一城如沙河為近京西南之輔實設險一助也范仲淹請修京城立四輔慮逺哉丘文莊注意于此有志之臣也臨清出紫荆闗甚近宜設重鎮控之可也議戰守自古建立都邑率在北土葢不止我朝而我朝近邊為甚且如漢襲秦舊都闗中匈奴入冦烽火輙至甘泉唐襲隋舊亦都闗中吐蕃入冦輒至渭橋宋襲周舊都汴西無靈夏北無燕雲其去元為逺唐契丹界直浹旬耳景徳之役亦輒至澶淵三治朝幅􅊷葢廣矣而定都若此者何禦敵便也我朝定鼎燕京東北去遼陽尚可數日去漁陽百里爾西北去雲中尚可數日去上谷亦僅倍漁陽爾近敵甚則常時封殖者尤勤常時封殖則一旦規畫措置也尤亟是故去敵之近制敵之便莫有如今日者也昔漢文帝朝晁錯有實塞分戍臨陣合刄諸説而文帝取焉唐徳宗朝陸贄有險以固邦國兵以服兇獷諸説而徳宗取焉宋仁宗朝范仲淹有守兵聚散多寡戰兵主客勞逸諸説而仁宗亦取焉今其言載在三史中班班可攷豈非經時石畫哉然漢卒患匈奴唐卒患吐蕃宋卒患契丹西夏何也所行與所談悖也今之論議毋亦類是乎夫分境畫疆秉持阨塞可謂確矣然外有棄野所傷實多是移其禍而以異壌當之也於此不得以忘戰也驅兵䇿馬衝撃郊原可謂雄矣然内無良材所損非細是積其弱而以異日當之也於此不得以忘守也議豫保障夫全寜徙患叢於遼左漁陽矣今處遼左漁陽得不以全寕為鍳乎開平興和遷患叢於上谷矣今處上谷得不以開平興和為鍳乎東勝移患叢於雲中矣今處雲中得不以東勝為鍳乎愚故知疆場之臣無一時自寜于心也撫循三衛督臣議設垣墻墩堡議大城京後將重險而豫防一勞而永逸也因以復大寜之戍奠開平之都讋諸敵之心息四郊之燧其見卓矣然而塹山堙谷嫌于絶地畫境分圻能無棄野異日者叩垣登陴恐貽與共之戚矣矧物力方虚閭左復發豈節民之道耶又儒臣議于幽冀之域土著之民一切賦役咸與蠲貸惟飼馬而供税列屯而置隊也因以固疆圉之守施寛假之恩張制禦之威成拱翼之勢其見逺矣然而藉民為兵近於保甲月操嵗閲能不妨時異日者揭竿挺鋤恐貽腹心之患矣矧公計方殷輸將悉罷豈裕國之謨耶是故两議者皆非要也夫宣大急矣猶為外户若薊鎮則堂奥也東起山海西抵居庸延袤幾二千里而近膺筦鑰之司者懐震驚之慮胡可不審其要哉逺徴延固近檄宣遼在我仰給于客兵在彼實疲於逺戍戎心洊啟滋蔓難圖于役靡遑爪牙莫代甲胄苦於蟣虱杼軸竭於轉輸非久逺之畫經畧之臣謂宜先拊之參衛伺彼虚實絶彼鄉道以敵攻敵至善䇿也夫拊循者惠而懾服之者威也威振矣而惠施焉而後弗敢玩也所以振其威者惟練兵之為要乎揀兵墾田夫天下大勢譬人一身京師元首也而朝廷政令出焉則心也四方四體也體戴夫首則外有統而其勢尊心運夫體則内有主而其勢順居尊而達順則重常在我重常在我然後天下不勞而治自古帝王垂拱而天下宴如者凡以能制輕重之勢而加意於本原之地也國家肇基自南而定鼎於北上應北辰以象天極南面而聼天下謹按輿圖以觀其勢土門遼陽上谷雲朔者肩背也河渠咽喉也伊洛湘漢江淮之間腹心也齊魯秦晉左右手也閩蜀腋也交廣滇粤足也肩背欲厚咽喉欲通腹之欲實左右手腋欲彊足無􅏓盭相承而奉元首以聼命于心而心與元首則又精神所聚㑹以運用百體而營衛灌注焉然後形氣充暢而外邪不奸也二祖開基列聖纘緒逾二百年于兹朝廷清明百官守職萬姓安堵四夷嚮風可謂極治矣乃愚所私憂過計不在形體而在精神也夫嵗簡久邉之鋭卒以戍薊門徒罷於奔命而亡益然其始猶曰土兵未練也今練之幾何歳而戍未盡撤是欲背之厚而不恤肩寒也諉河渠於不可治而更求便道始猶曰海運可復也今海舟報罷而河渠如故是不急咽喉之塞而求他竅也伊洛湘漢多曠土淮江多游民而洛人苦宗藩淮人苦水潦平居無事常皇皇若不聊生是枵腹旦夕也齊魯南支河渠秦晉北羌閩蜀交廣滇粤又西南萬里而反冦彌山海民無所號頃雖蕩定如窶人病起休養無所資又虞復病是手足腋且倒懸也如此以為安葢俞扁不顧聖明在御賢公卿在列豈以内寜而忘外憂夫薊門教練取浙卒為漁陽突騎故甲於天下豈曰無兵而南取浙居則南兵倍其食急則北兵當其鋒南驕北怨敗道也頃冦一小入輒破軍殺將其效可睹已愚以為不罷浙卒則土兵不成土兵不成則久邊之戍未得息肩也河故湍悍隄束其流洲綰其口豪俠貴勢宅菰葦田沮洳以當水道者有司不敢問以故數治數淤數淤數决往往坐此迄無成功頃疎草灣報決矣愚以為不併力下流則漕渠不通漕渠不通則徐淮間未得安枕也新政一務節約帑庾不盈水旱盗賊不加於往時而皇皇不聊生者舊逋雜征而催科急也天子幸哀憐小民不待建白一旦而下緩征之詔民鼓舞若更生矣諺曰東南熟天下足東南之粟轉轂贍天下而交廣江淮創夷昏墊之民終歳不復喁喁待澤其它山徼海壖君門萬里民懸命於有司此尤當念愚以為不覈實有司則徳意不宣徳意不宣則窮陬遐壌之未得被澤也然此皆末論非本原至計夫順天八郡於周為燕趙諸國於唐為成徳盧龍魏博范陽等軍當是時各阡陌其地什伍其民無庸外助今其地與民猶昔也而班操止徐豫之軍漕􅞮籍江淮之粟旁引百郡以為助而猶不足乃欲開京東瀕海萑葦之塲用浙人築隄捍水之法聼富民田其中合衆分地計畝授官此元臣虞集之議也然洪武中葢有開荒田土永不起科之令矣其後荆棘未盡剪而有司者輒履畝而税之矣抑或田成業定而中貴外戚輒請為已業而豪奪之矣如此尚有應令者乎愚以為今即不能如令第募民田以三年起輕科而信守之豈惟京東將隙地無不可耕者且使粟價無踊㳺民有歸萬世之利也又欲倣漢唐置三輔宋四輔郡意東永平西易州南臨清北宣府各宿重兵二萬而罷直𨽻河南山東班軍此先臣丘濬之議顧安所得兵若募市人徒益餽餉緩急不可恃若籍民丁前代葢有名寓于農而實編于官者矣既編於官後必勾補又或有調征移戍者矣是無辜坐謫也葢洪武中太平諸郡數蠲田租海内不以為私若曰此吾湯沐邑緩急共之愚以為誠舉四輔赤子付之良有司俾悉心愛養勿撓以貴勢而又寛其徭賦時加惠焉稍以其間分曹角射課藝習兵民業既成皆安土樂生而戴其上雖不設四輔隠然保障之固亦萬世之利也至若三營精鋭國之威也半雜老弱而敝装羸馬四方逋逃民之賊也羣萃淵藪而作奸犯科甚非所以重京師而示天下也今嵗時簡練團營精采固已改觀而市井游惰尚多竊匿蒐而逐之則傷覆載之仁保而容之則滋奸宄之黨愚以為此二事者乃金吾廵徼戎臣開府一有司之事耳而國家之精神不與焉夫齊秦霸臣尚能保伍其民令無匿奸李光弼為將而旌旗壁壘皆變是故精神誠通凡此類者皆不問而舉今朝廷下尺檄而中外諸吏恐懼奔走此乃形體相攝属而非精神相流貫故法嚴令具而輦轂之下且有令之不行禁之不止者又何以責四方宜明目達聰開誠廣益時召公卿坐論治理間引郡縣親對便宜燭閭閻於衿帶運要荒於几席使上之情常通于下如星辰垂象而易知下之情常通于上如聲響乘虚而易達然後天下之勢聫合為一身無復有壅閼者雖尺寸之膚癬疥之疾心所拊循手不待命而至首所嚮往足不煩諭而行此所謂不在形體而在精神者也議扼險阻按秦都長安張良謂闗中為用武之地阻三面而守獨以一面東制諸侯今世都燕真所謂用武之地比之關中其所阻者亦有三面而亦獨以一面制天下之大凡虞州十二夏州九春秋國十二戰國國七其地皆在所臨制也較之闗中則西有巴蜀之饒南有商鄧之險以為退歩之地然則前之進者無窮盡後之退者有界限則是今日京師之勢大非漢唐都闗中比也闗中地被山此則被乎太行一帶之險阻闗中帶河此之所襟帶則大海也然漢之邉在北咸陽去朔方千餘里唐邉在西長安去吐蕃界亦幾千里焉今京都北抵居庸東北抵古口西南抵紫荆闗近者百里逺者不過三百里所謂居庸則吾之背者也紫荆則吾之吭也據闗中者將以扼中國之吭也而拊其背都幽燕者切近于北敵則又將恐其反扼我之吭而拊我之背所以防備之者尤當深加之意葢制人而不得猶不至于失己守己而有所失則其害豈但不得于人而已哉議設險易重坎象曰王公設險以守其國險必以水守國者尚之燕都古冀州并州之域職方氏稱冀北曰并州其川嘑池漚夷其浸淶易禹貢叙冀州恒衛既從大陸既作故淶易恒衛燕之寳也昔召公始封于此迨其衰也秦欲併之猶恐督亢之地水綢繆而難入及荆卿獻圖而大喜曹𦙍儒云燕南之地以水為固瀛莫間諸淀鈎連埂道如綫耳陳貫所謂天造地設者也今畿内千里之水皆㑹于直沽不可以因境内諸川滙成地險哉且武清有三角淀即古之雍奴長濶百餘里寳坻有七里海亦𣺌然巨浸也昔在直沽之内今不引之相通而更障之置巨壑于無用之地不惟河流不安亦且天險弗設良可憾已豈惟諸河即運河常患水淺及山水一發奔衝特甚常損漕船倘使諸淀相通水少則開淀以濟運水溢則由淀以分其怒䇿之至便者也是有溝有洫可以限戎馬可以消水患即可以治井田興水利得非古人之良法萬世不易之定論哉議轉漕㑹川閘連慶豐惠和諸閘起都城而抵通州元世祖時都水監郭守敬上言𨗳昌平縣白浮村神山泉西折南向過雙塔榆河至都城南引一畝玉泉至西門入都城匯積水潭復東折而南入三里河經十里河至煙墩港入渾河東下每十里置一閘以時啟閉漕舟自通州直抵都城民無陸輓之勞國有貯積之富首事于至元二十九年春成于三十年秋公私便之世祖自上都還過積水潭見軸轤蔽水而悦賜名通惠國朝永樂間亦以通漕今遂廢葢運船一隻載米三百石自通州上車費脚價三十七两有奇船直抵京則車家頓失此利不免流言惑衆任耳者信之又人多勢要渉利生怨相與排擊阻難𫝊聞宫閫震驚龍御之心用遂奸欺之志其端有自来者然聞自通抵京僅五十里許而高低實踰五十尺其源㣲淺而其去直遂仗數閘以節之行遇天時久旱則舟澁難行莫若因故閘之遺址而為五壩每壩置剝船百隻米置布袋中轉剝而前可省脚價十分之九仍聼車戸易車造船在河生理則官不勞而事可集利不專而讒謗息矣京東水利方今籌民生國計者大都言西北水利云夫燕秦趙魏古稱沃饒國也非王侯所自立授井田以貢助者哉何至近世竟棄之為萑葦沮洳而不圖一開墾也古無自藝之田亦無天雨之粟委地利而不治長民者溺其職矣胡不引載籍徴之鄭國開涇水為渠泰之所以益富厚輕諸侯也史起導漳水於鄴魏之所以實河内雄三晉也他如文翁湔㳛口於蜀郡卲信臣造盧陂於南陽皆國頼其饒民歌其惠非已事之良規往哲之芳躅乎我國家宅鼎燕京嵗用率仰給於漕運舳艫千里銜尾而雲集率取足于東南顧災沴頻仍催科務急東南之民力寖竭矣於是體公識逺之臣譚漕運則虞阻譚江南則虞詘譚無事則虞朘膏譚有事則虞扼吭始有發憤上書言西北水者思深哉非為國忠謀宜不及此請置西北而論京東虞文靖嘗有言曰京東瀕海數千里宜聽民願得官者合其衆捍水為田能以萬夫耕者為萬夫長千夫百夫亦如之三年而後征五年而後命以官十年不廢得世襲丘文荘亦曰譬之富家東南别業也海濵負郭也若能遵用集䇿可以安享其利而逺近有資兩公之論固今日之嚆矢也苐言發盈庭迹同謀道為水利左袒者什五而右袒者亦什五其左袒稱便者則謂蓄洩有備也納支流殺河勢也招南人耕北田民均田亦均也漕運漸減頼以寛東南也可以使溝澮代金湯限敵騎也可以使㳺惰者有歸業無盗賊也近邉田墾轉輸不煩也脩水利因舉屯政也人聚則兵足可省募戍停勾補也在各省者可給授以代宗禄也是為十利夫河流猛悍人力無所施周定王時井田如故也不嘗大决乎邊馬出入溪澗上下山陂周宣王時溝澮未廢也不嘗侵鎬及方乎民性獷悍聚則必争南北雜處能保其無齮齕而民田两均乎屯田之使項背相望竟未得其要領水利興果能使屯政舉乎謫戌之條下大辟一等今方募之為農而遽簡之為兵人心肯樂從乎姑舉一省如河南八郡荒田幾何荒田而可墾者幾何宗室萬餘果能盡給乎乃所謂蓄洩有備㳺惰有歸省轉輸而寛東南者其説不可廢也右袒言不便者則謂北方雨澤恒在夏秋𤾉暵乾雨則汎溢時難齊也富民安土重遷勢難彊也窶人下户官給工本費難辦也欲募富民必資官品竊恐章服被於庸奴世爵加于賈豎雖曰虚銜亦闗名器其源不可開也千則役萬則僕物之理也兹復假名器為之長小必武㫁于一鄉大則恣睢路扈而抵法禁其流不可忽也招募既廣則奸人亡命恃為逋逃萃為淵藪其萌不可植也無論難墾即墾矣而令北民有之則南人必不願將令南人為世業乎安在其為利畿内也無論北民即勲貴外戚將請乞而豪奪之亦安在其為利南人也借曰水田豈必常稔脱或汙萊方闢凶歉薦臻能使招来者枵腹以待嵗乎始欲驅游惰而歸農今將聚流移而為盗未可知也南方㛠于文學往往入貲以圖進取若應募占籍許試有司則冒百畝而業諸生其費更省是上本借士以勸農下實假農以售士未可知也是為十害夫天下熙熙皆為利来富商大賈有不棄家逺遊者乎誠居積饒羨何重遷之足虞王者有分土無分民侯彊侯以古無傭耕力食者乎誠處置得宜何北民之不利濟大事者畧小費即稍給工本庸足恡乎杜禁請乞即勲貴外戚庸可奪乎富民第加散官不予世爵則名器可無濫矣招募嚴詰所從来則奸宄靡所容矣乃所謂天時不齊武㫁占籍豐歉靡常者其説不可不察也大抵言便者其計詳因其計而善用之則可以奏功言不便者其慮逺因其慮而預防之則亦可免于貽患語云事無百利亦無百害天下寜有無害之利哉責在當事者權輕重蘄於害不勝利耳京都形勢説本朝之燕都也葢與古不同稍難于周漢而大勝于東漢趙宋矣夫周漢建都西北地資建瓴之險人藉風氣之勁天下莫之競焉東漢宅雒已失全勢宋人按燕雲則又無限敵之防故卒不能為守我朝都燕雖風氣之禀士馬之強不及周漢然據險防患居外馭内其視周漢一也故自其常論之則京後為最急宣大次之遼東次之陜西又次之去京有逺近也夫京師為最急則大寜之内徙三衛之盤據不可不講也宣大次之則獨石之孤懸豐勝之淪沒不可不講也講大寕則宣薊無阻隔而遼東之右臂伸講豐勝則山陜有交應而甘肅之左臂伸此立國之宏規保安之上畫也而永樂宣徳之間但知烏梁海之誠欵開平之艱逺豊勝之丁口不立甘心棄土畧不顧惜得非往事之恨乎自其變論之則大寕不可復而京後之重垣宜設宣遼不可合而和坦諾延之交搆宜防開平東勝已淪異域而宣大之士馬不可一日忘戰而成化𢎞治之間但知和碩之通貢山海之征商宣大之鑿塹築敵臺京後之防一不措之籌䇿又非往事之恨乎夫始也乘開創之盛東斥大寕西闗豐勝無難也繼也藉生養之富大垣京後盛兵宣大無難也時日因循不以為意偷安既久釁孽乃生敵犯太原則増忻代澤潞之兵而乘寜雁之塞敵犯洪蔚廣昌則城宣府之塞而弛東北之防夫阻太原之冦在力戰于大同偏頭之間恤洪蔚之優當不忘乎朝河川黃花鎮之備増忻代澤潞之兵則度支急弛東北之防則畿輔震近年之經營得微亦有過乎嗟乎白刄在前不顧流矢彼既指宣大矣垣宣大可也明哲所燭防患未然因垣宣大而併垣京後亦可也積薪必燃防川必决以宣大為餌而先垣京後亦可也悉力宣大置京後不講則所謂輕重緩急之間失權多矣於戱往有恨無能追也近有過亦幸無大失也今宣大之垣役告成而隆永之荼毒極慘懍矣大城京後以奠金湯宣大以戰而為守京後以守而為戰宣太遇秋則乗塞餘時有入輿之戰京後有警則乗塞餘時分為畨休以習禁軍之勞逸斯皆所謂即體酌用備形勢之道也圖書編卷三十五
