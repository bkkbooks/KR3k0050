body:
  text: 圖書編卷七十九明章潢撰朝㑹總叙周天子之朝有四一曰外朝以聴訟二曰中朝以見羣臣三曰内朝以聴政四曰詢事之朝國有大事致萬民以詢之於是後世有常朝與大朝㑹之禮焉漢髙祖用叔孫通起朝儀七年長樂宫成羣臣奉賀武帝十月朔行饗㑹二千石以上上殿稱萬嵗此大朝㑹也每月有朔朝至宣帝則五日一朝此常朝也唐貞觀初宣政殿每日臨朝十三年則三日一朝二十三年則毎日常朝永徽間於太極殿五日一朝及朔望朝開元後不能日見羣臣而獨望一朝其正旦冬至五月朔千秋節則受朝賀焉宋太祖建隆二年正旦御崇元殿受朝賀元豐中侍從官常㕘於垂拱殿百司朝官五日一朝紫宸殿在京官朔望亦朝於紫宸殿其正旦五月朔日冬至長春節則行大朝㑹禮於文德殿焉元世祖至元十一年正旦始御大明殿受朝賀及後天夀節皆行朝賀禮每日則宰執入延春閣及别殿奏事而已國朝之制正旦冬至聖夀節於奉天殿受朝畢賜宴於謹身殿及東西廡其蕃使表貢則以其所至之日而設朝毎日見羣臣於謹身殿或奉天殿奉天門以為常朝焉今著歴代朝會器服儀文之詳及國朝儀注圖本作朝㑹篇王朝之禮通典周制天子有四朝一曰外朝秋官朝士掌之二曰中門夏官司士正其位朝夕視政三曰内朝亦謂路寢之朝正朝視事畢退適路寢聴政四曰詢事之朝小司冦掌其政以致萬人而詢焉周禮天官宰夫之職掌治朝之法以正王及三公九卿大夫羣吏之位掌其禁令叙羣吏之治以待賓客之令諸侯之復太僕長正王之服位出入王之大命掌諸侯之復逆王眡朝則前正位而退入亦如之太僕之官在周為侍御之長所掌者眡朝之事也後世則專以典牧馬之政失古意矣然眡朝之政若後世付之鴻臚而屬之禮部可也小司冦之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君其位王南向王公及州長百姓北面羣臣西面羣吏東面小司冦擯以叙進而問焉以衆輔志而弊謀朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庻在其後左嘉石平罷民焉右肺石逹窮民焉帥其屬而以鞭呼趨且辟禁慢朝錯立族談者按外朝在庫門之外最居外者也人君不常御國家有大典禮則于此朝㑹而朝士掌其法有大疑難則于此詢事而小司冦掌其政禮玉藻曰朝辨色始入君日出而視之退適路寢聴政使人視大夫大夫退然後適小寢釋服漢有天子大㑹殿為周之外朝蕭何造未央宫言前殿宜有後殿宜大會殿為外朝宫中有後殿為治朝唐以宣政殿為前殿謂之正衙即古之治朝也以紫宸殿為便殿謂之入閣即古之燕朝也外别有含元殿含元非正至大朝㑹不御正衙則日見羣臣百官皆在謂之常㕘宋朝因唐與五代之制文武官每日赴文明殿正衙常㕘宰相一人押班五日起居即崇德長春二殿中書門下為班首其長春殿常朝則内侍省都知押班至神宗元豐中官制始行詔侍從官而上日朝垂拱謂之常㕘官百司朝官以上每五日一朝紫宸為六㕘官在京朝官以上朔望一朝紫宸為朔望㕘官遂為定制按前代朝儀無一定之制時有更改惟我朝定制率循舊章一日三朝每日晨興上便服御奉天門文東武西侍鳴鞭畢上乗輦往御武英殿或文華閲章䟽日率如此至午復出朝晩亦如之此每日常朝之制也每月朔望上具皮弁服御正殿朝畢上出奉天門視朝如常儀太祖諭大臣曰近者臣僚尊卑體統多未得宜爾等宜著禮儀以為定式禮部尚書李原名等㑹官著為禮儀定式一書凡三十七條所謂常㕘之禮有八焉國語内官不過九御外官不過九品考工記曰内有九室九嬪居之外有九室九卿朝焉則九室在應門外君日視治朝在路寢門外退適路寢聴政卿退適九室退聴政也燕朝外朝非常諸侯亦三朝但無明堂為差耳按周禮太僕視燕朝則正位掌擯相治朝則司士正朝儀之位辯貴賤之等王南面三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上太僕太右太僕從者在路門之左南面西上外朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庻在其後左嘉石平罷民焉右肺石逹窮民焉即此觀之古三朝之制可識矣按每朝列位所向不同者皆以事異故變其位三公之位常北面不變者以三公内臣位尊故屈之使常北面其餘諸侯孤卿大夫皆以地道尊君故尊者東面卑者西面是以於外朝之時諸侯東面尊于孤卿也故于内朝孤卿東面尊于卿大夫也時亦無諸侯故也唯詢事之朝非常朝之限故不與三朝同按玉藻曰朝辨色始入君日出而視之退適路寢聴政使人視大夫大夫退然後適小寢釋服則朝辨色始入所以防微日出而視之所以優尊詩曰夜嚮辰言觀其旂臣辨色始入之時也又曰東方明矣朝既盈矣君日出而視之之時也盖尊者體磐卑者體蹙體蹙常先體磐常後故視學衆至然後天子至燕禮設賓筵然後設公席則朝禮臣入然後君視之皆優尊之道也然朝以先為勤以後為逸退以先為逸以後為勤朝而臣先於君所以明分守退而君後於臣所以防逸荒此所以使人視大夫退然後適小寢釋服也然則公卿諸侯之朝王其有先後乎詩云三事大夫莫肯夙夜邦君諸侯莫肯朝夕夫夙先於朝夜後於夕則公卿朝常先至夕常後退諸侯朝常後至夕常先退明矣四朝總論天子之禮至尊無上其居處則内有六寢六宫外有三朝五門其嬪御侍衛飲食衣服貨賄之官皆領於冡宰其冕弁車旗宗祝巫史卜筮瞽修之官皆領於宗伯有師以道之教訓有𫝊以𫝊其德義有保以保其身體有師氏以詔之徽有保氏以諫其惡前有凝後有丞左有輔右有弼其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧在輿有旅賁之規旅賁勇士掌執戈楯夾車而趨位宁有官司之典門屏之間謂之宁倚几有訓誦之諫工司所誦之諫書之於几也居寢有暬御之箴暬近也臨事有瞽史之道宴居有工師之誦史為書太史君舉則書瞽為詩工誦箴諫大夫規誨士傳言庻人謗商旅于市旅陳也陳貨物以示時所貴尚百工獻藝獻其技藝以喻政事動則左史書之言則右史書之其書春秋尚書有存者御瞽幾聲之上下幾猶察也察其所樂不幸而至於有過則又有爭臣七人面折廷爭以正捄之蓋所以養之之備至於如此是以恭巳南面中心無為以守至正而貎之恭足以作肅言之從足以作乂視之明足以作哲聴之聰足以作謀思之睿足以作聖然後能以八柄馭羣臣八統馭萬民而賞無不慶刑無不威逺無不至邇無不服傳說所謂奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民武王所謂亶聰明作元后元后作民父母所謂天降下民作之君作之師維其克相上帝寵綏四方箕子所謂皇建其有極斂時五福用敷錫厥庻民惟時厥庻民于汝極錫汝保極董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方者正謂此也何謂六寢六宫曰王太寢也小寢五大寢聴政嚮明而治故在前小寢釋服燕息也故在後其小寢一寢在中四寢在於四角春居東北夏居東南秋居西南冬居西北土王之月居中后之六宫正宫在前五宫在後其制如王之五寢何謂三朝五門曰王宫之外門一曰臯門二曰雉門三曰庫門四曰應門五曰路門又曰虎門又曰庫門此鄭司農說也康成以雉門在庫門外而設兩觀其朝在雉門之外者曰外朝在路門之外者曰治朝路寢之廷曰内朝臯門之内外朝也朝士掌其法小司農掌其政列三槐與九棘設嘉石與肺石而朝諸侯聴詔詢大事在焉應門之内治朝也司士正其位宰夫掌其法大儀正王之位而王日視朝在焉路門之内燕朝也大儀正其位掌擯相族人朝焉玉藻曰朝服以視朝退適路寢聴政然則王日視朝於治朝而退聴政於燕朝矣雉門之外懸象治所以待民應門之設宗廟社稷所以嚴神位路門之外則九室九卿朝焉路寢之内則九室九嬪居焉外朝之法朝士掌之左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庻在其後左嘉石平罷民焉右肺石逹窮民焉古今納言說命令者王所以操御天下之大柄也一有所移則德意不得施威福自下出復逆者三所以通逹天下之大機也一有所塞則過失不得聞下情無由逹皆亂亡所由生也稽之虞書命龍曰汝作納言夙夜出納朕命惟允此主傳命令于外弗當則納之也又曰工以納言時而颺之格則承之庸之否則威之此主逹復逆于上善則納之也唐虞事簡二者總為一官而名之曰納言初命龍而後典于工故各舉一事言之耳嘗合周制而論之凡王有命令大宰詔之然後命内外史書之内史復審以法因而獻可替否龍作納言夙夜出納朕命惟允後世中書不肯草制是也内外史草制畢下大僕小臣傳逹于外善則行之審有弗當得駁正故曰出入王之大命若後世封還王之詔書是也凡臣下有復逆者大僕主諸侯小臣主三公孤卿御僕主羣吏庻民在外分接為之傳逹其善其惡得以司馬之法正之宰夫以敘進其治則又得以治朝之法糾之矣内史掌敘事之法受納訪又得以大史之典攷之矣大事内史引以白王與之答問使得讞言自盡冡宰從而賛之小事則宰夫白于冡宰冡宰自聴之而御史賛之虞書所謂工以納言時而颺之也盖周人制備故在于王所與夫親民而在外者既有所分而命有内外大小臣下有尊卑又各有所屬故與有虞小異者以此愚因是而有以知周制之善矣盖大宰主賛王治矣然可以賛王而不敢專也内史主代王言矣然可以書而不得行也必夏官之大僕小臣而後得以𫝊逹之掌之者非一官王之命令寧有下移之患哉秋官朝士掌逹窮民矣大僕小臣御僕掌諸侯諸臣吏民之復逆矣而又有宰夫掌敘羣吏之治以待之内史掌敘事之法以受之納之者非一人臣下之復逆豈復有壅蔽之患哉聞之師曰夷考歴代納言之職秦漢改為尚書魏晉為中書門下以侵奪宰相之權者也由人主踈逺輔臣進與左右親信議政號曰内相故有天子私人其始亦内史之職而其後遂建為三省宰相之官名實俱紊矣嘗參諸古今而斷曰王疑冡宰則内史重疑内史則宦官重自古宦官禍天下皆先竊宰夫之權得居中承受章奏而後傾宰相之權又竊内史之柄典國樞機以至廢置天子在其掌握可不謹哉夫人主親覽章奏則勞宰相專决則僭謂宜立為大公至正之法凡有章奏宰夫㸔詳各盡所見呈白小宰以及大宰然後進呈于天子謀謨既定命内史宣行之則天下之治出于一體統正而朝廷尊矣又按大僕正治朝廷之位而退又正燕朝之位是内外之治常相通也内宰史掌王内之政令而屬之大宰是宫中府中實合于一體也故宰夫掌朝法以貳小宰小宰掌宫刑以貳大宰凡復逆大僕傳于宰夫小宰以逹于大宰凡命令大宰平章下于諸史而宣之于大僕此周官之治所以出于一而不移于多門也歴代朝儀鄭康成之注玉藻曰天子諸侯皆有三朝曰外朝曰治朝曰燕朝盖天子有五門一曰皐門二曰庫門三曰雉門四曰應門五曰路門庫門之外者外朝也小司冦朝士掌之路門之外者治朝也宰夫司士掌之路門之内則路寢燕朝也大僕掌之小司冦之職曰掌外朝之政以致萬民而詢焉其位王南面三公及州長百姓北面羣臣西面羣吏東面小司冦擯以敘進而問焉以衆輔志而弊謀朝士之職曰掌外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庻在其後此豈非所謂外朝者乎宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位司士之職正朝儀之位辨其貴賤之等王南面三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上太僕太右太僕從者在路門之左南面西上孤卿特揖大夫以其等族揖士旁三揖王還揖門左揖門右太僕前王入内朝皆退此豈非治朝者乎太僕掌正朝之服位出入王之大命王眡朝則前正位而退入亦如之建路鼓于大寢之門外而掌其政以待逹窮者與遽令聞鼓聲則速逆御僕與御庻子王眡燕朝則正位掌擯相王不眡朝則辭於三公及孤卿此豈非所謂燕朝者乎然通典所載則曰周制天子有四朝一曰外朝在皐門之内二曰中朝在路門之外三曰内朝即路寢之朝四曰詢事之朝在雉門之外小司冦掌之所以每朝列位所向不同者皆以事異故變其位王公之位常北面不變者以三公内臣位尊故屈之使常北面其餘諸侯孤卿大夫皆以地道尊右故尊者東面卑者西面是以於外朝之時諸侯東面尊於孤卿也故於内朝孤東面尊于卿大夫也唯詢事之朝非常朝之限故不與三朝同此通典四朝之說也至於文王世子公族朝於内朝庶子掌之其在外朝司士掌之玉藻朝服以日視朝於内朝退適路寢聴政然則文王世子與玉藻所謂朝者諸侯之朝也盖至於漢亦有中朝外朝之名劉輔傳曰中朝左將軍辛慶忌右將軍亷襃等俱上書而孟康注曰大司馬左右前後將軍侍中常侍散騎諸吏為中朝丞相以下至六百石為外朝霍光謂車千秋曰今光治内君侯治外光為大將軍而曰治内千秋為丞相而曰治外則是有中朝外朝之别也然中朝外朝之名必始於武帝以後此漢初制也漢初惟有叔孫通朝儀采古禮與秦儀雜就令羣臣朝十月平明謁者治禮次第而入殿廷陳車騎設兵衛張旗幟功臣列侯以次陳西方東向文官丞相以下陳東方西向廣行設九賓臚句傳百官執㦸傳警諸侯王以下至吏六百石以次奉賀御史執法舉不如儀者無敢譁讙失禮則漢之朝儀莫盛於十月武帝雖用為正然每月朔至於十月朔猶常享㑹攷後漢志雖以每月朔嵗首為大朝賀舉觴上夀奏食舉樂然每朔惟十月旦從故事者正以髙祖定秦之月元年嵗首也若髙祖講朝儀於長樂武帝受計於甘泉顯宗朝正月於德陽此漢朝㑹之所也班固東都賦曰春王三朝㑹同漢京是日也天子受四海之圖籍膺萬國之珍貢張衡東京賦曰每嵗元旦觀于殿下者數萬人賓臚傳命郎將司階天子穆穆南面然後司儀辨等以朝而天子禮以三揖詢問朝政行羣臣燕飲之禮以罷此漢元㑹之禮也魏王肅䟽云漢初公卿皆親以事升朝故髙祖躬追反走之周昌武帝遥可奉奏之汲黯宣帝使公卿五日一朝成帝始置尚書五人自是凌遲朝禮遂缺觀此則是漢代五日一朝起自孝宣而罷於成帝耳世祖中興紀述其每旦視朝日昃乃罷曰每旦者世祖之勤勞也故其宻疎不同焉此漢常朝之制也以史攷之自蕭何置未央宫前殿而漢有宫闈之禁自叔孫通制朝㑹而漢有君臣之禮召文臣則見于宣室賈誼何武召武臣則見於武臺李陵不下司馬門則有罰醉䙝殿上則有劾嬖臣怠慢于朝㑹宰相得檄召而戮辱之則猶知宫闕之嚴而君臣之不相狎盖至見於大臺而願以常服朝踞厠視大將軍而加以不冠見則何䙝之甚也彼其溺於宴安而憚于禮法不樂於外庭之檢束而便於内御之媟近故常朝之禮止於月朔此又其禮之變也蘇武之典屬國蕭望之賜爵闗内侯張禹之罷相就第孔光之為太師皆朝朔望此又漢世朝朔望之禮也石奮以上大夫禄歸老於家以嵗時為朝臣馮㕘以列侯奉朝請世祖中興不任功臣其加優異者皆以列侯奉朝請此又漢世奉朝請之制也若唐之朝儀冬正設仗以朝萬國則於含元殿盖唐之含元在周為外朝於唐為大朝也朔望起居則於宣政殿蓋唐之宣政在周為中朝在漢為前殿於唐為正衙也隻日常朝則於紫宸殿盖唐之紫宸在周為内朝在漢為宣室於唐為上閣也夫上閣之制果何所始乎自東晉之太極殿有東西閣之名故唐置紫宸上閣所以法晉制也唐制凡御紫宸則先立仗於正衙然後喚仗自東西閣門而入故謂之入閣自𤣥宗以前猶未有此制也開元以後以朔望上食𤣥宗欲避正殿遂移紫宸喚仗自閣門以入始有入閣之名自後行之至昭宗時失其本㫖乃以朔望御正衙而行入閣禮宋建隆元年行於文德殿者皆是禮也盖宋朝之大慶即唐之含元宋朝之文德即唐之宣政宋朝之紫宸即唐之紫宸也開寳中諸儒增附新禮遂載月朔入閣之儀文以文德為上閣差舛尤甚淳化中太宗嘗命張洎詳定儀注洎以為入閣之儀乃唐一時之禮非盛制也至寳元二年仁宗又以問宋庠庠言開元本無此制請改舊儀歐陽修與劉敞論入閣之儀亦以唐日入閣而御前殿自昭宗失之起居而廢正衙自明宗失之唐末或指朔望宣政為入閣尤為誤說至熙寧三年遂罷入閣行正衙之制而朝儀遂為萬世法若夫景德之閣門儀制景德之合班圖則定於梁灝李宗諤祥符之閣門儀制則定於陳彭年張知白祥符之重畫入閣圖則定於楊徽之張洎大禮慶賀合班圖則定於天禧紫宸垂拱立班圖則定於景祐至於康定之閣門儀制則定於章得象李淑天聖之元㑹禮則始於王曾此皆宋朝之朝儀也朝㑹班位周制朝㑹班位其在外朝左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後斯聴獄之時所列位焉樹棘以為位者取其赤心而外刺也列槐以為位者槐之言懐也言懷來人於此欲與之謀也其在中朝則王南面三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上太僕太右太僕從者在路門之左南面西上此王視事於路門之位也王族故事為士免退畱宿衛者太右司右也太僕從者小臣祭僕御僕𨽻僕也其在詢事之朝則王南向三公及州長百姓北面羣臣西面羣吏東面漢髙帝長樂宫成功臣列侯諸將軍軍吏以次陳西方東向文官丞相以下陳東方西向唐開元禮正旦冬至受羣臣朝賀典儀設文官三品以上位於横街之南道東介公􅈶公於横街之南道西武官三品以上於介公之西少南每等異位重行北面相對為首設文官四品五品位於樂懸東六品以下於横街南每等異位重行西向北上設諸州朝集使位都督刺史及三品以上東方南方於文官三品之東重行北面西上西方北方於武官三品之西重行北面東上四品以下皆分方位於文武官當品之下諸州使人分方位於朝集使下亦如之設諸親位於四品五品之南皇宗親在東異姓親在西設諸方客位三等以上東南方者於東方朝集使之東每國異位重行北面西上西北方者於西方朝集使之西毎國異位重行北面東上四等以下分方位於朝集使六品之下重行每等異位奉禮設門外位文官於東朝堂之前每等異位重行西面介公􅈶公於西朝堂之前武官於介公之南少退每等異位重行東面諸親位於文武官四品五品之南皇宗親在東異姓親在西設諸州朝集使位東南方者在宗親位之南每等異位重行西面西北方者於異姓親之南每等異位重行東面諸州使人分方位於朝集使之下亦如之諸方客位東南方者於東方朝集使之南每國異位重行西面北上西北方者於西方朝集使之南東面北上宋大慶殿正旦冬至大朝㑹三師三公侍中中書令左右僕射開府儀同三司在丹墀香案之南少東次尚書左丞相在其後皆北面西上親王在香案之南少西北面東上門下侍郎位于其東次左散騎常侍次給事中左諫議大夫次左司諫正言皆重行位於其後觀文資政殿大學士學士端明殿學士位于次南並西面北上中書侍郎位于其西次右散騎侍郎次中書舍人右諫議大夫次右司諫正言皆重行位于其後翰林學士承㫖至寳文淵閣學士位于次南次樞密直學士待制重行位于其後並東面北上契丹使在龍墀之上少西北面宗姓節度使以下至率府副率在横街之南分東西相對各重行異位北上夏國使在宫架之東軍員在其後夏國從人次之髙麗使在宫架之西軍員在其後髙麗從人次之諸道四品第八班從四品第九班正五品第十班從五品第十一班正六品第十二班從六品第十三班正七品第十四班從七品第十五班正八品第十六班從八品第十七班正九品第十八班從九品使客位文官之東洪武元年太祖皇帝謂侍臣曰朕念創業之艱難日不暇食夜不安寢侍臣對曰陛下日覽萬幾未免有勞聖慮上曰汝曹不知創業之初其功實難守成之後其事尤難安敢懷宴安而忘艱難哉洪武元年九月上朝罷召宿衛武臣諭之曰朕與爾等起布衣歴戰陣十五六年乃得成功朕今為天子卿等亦任顯榮居富貴非偶然也當四方豪傑並起互相攻奪提孤軍應敵危亦甚矣然每出師必戒將士毋妄殺戮毋焚民居此心簡在上帝故有今日卿等亦思曩時在民間視元之將帥輕裘肥馬氣燄赫然何敢望之然彼之君臣不思祖宗創業之艱驕淫貢舉解首在其後皆北面序班于大慶門外則東西相對以北為上元文武百司自一品至九品序列于崇文門外文班自外旁折位入日精門武官自外旁折位入月華門各就東西起居位立定然後趨丹墀就位行禮國朝文官齊班位於午門外之東西向以北為上武官齊班位於午門外之西東向以北為上午門西偏門入奉天門西偏門文官起居位於文樓丹墀之南北上西向武官起居位於武樓丹墀之南北上東向殿前班位於武官起居位之北北上東向侍從班起居位於文官起居位之北北上西向文官一品二品拜位於内道上之東每等異位重行北面西上武官一品二品拜位于内道上之西每等異位重行北面東上文官三品以下拜位于丹墀内道下之西毎等異位重行北面東上分文武官為十八位第一班正一品第二班從一品第三班正二品第四班從二品第五班正三品第六班從三品第七班正奢侈但顧一身逸樂不恤生民疾苦一旦天更其運非特不能保其富貴遂至䘮身㓕名今厯數已在朕何敢驕怠常恐政事廢缺日慎一日自非犒賞將士宴百官享勞外使未嘗設宴為樂爾等亦須勤身守法勿忘貧賤之時勿為驕奢淫佚之事則身常榮而家常裕矣洪武十年九月上謂侍臣曰前代庸君暗主莫不以垂拱無為藉口縱恣荒寧不親政事孰不知治天下者無逸然後可逸若以荒寧怠政為垂拱無為帝舜何以曰耄期倦於勤大禹何以惜寸陰文王何以日昃不食且人君日理萬幾怠心一生則庶務壅滯貽患不可勝言朕即位有年常以勤勵自勉未旦即臨朝晡時而後還宫夜卧不能安席披衣而起或仰觀天象見一星失次即為憂惕或量度民事有當速行者即次第筆記待旦發遣朕非不欲暫安但祇畏天命不敢故爾朕言及此者但恐羣臣以天下無事便欲逸樂股肱既惰元首叢脞民何所頼書云功崇惟志業廣惟勤爾羣臣但能以此為勉朕無憂羣臣皆頓首受命洪武十八年春三月太祖謂侍臣曰朕夙興視朝日髙始退至午復出迨暮乃罷日間所决事務恒默坐審思有未當者雖中夜不寐籌慮得當然後就寢侍臣對曰陛下勵精圖治天下蒼生之福但聖體過勞太祖曰吾豈好勞而惡安何者天下未寧吾饑不暇食倦不暇寢奬勵將帥平定禍亂今天下已安四方無事髙居宴樂亦豈不可顧自古國家未有不以勤而興以怠而衰者天命去畱人心向背皆决於是甚可畏也安敢暇逸永樂元年九月上御右順門與侍臣論時政曰朕即位未久常恐民有失所每宫中秉燭夜坐披閲州郡圖籍靜思熟計何郡近罹饑荒當加優恤何郡地廹邉鄙當置守備旦則出與羣臣計議行之近河南數處蝗旱朕用不寧故遣使省視不絶于道如得斯民小康朕之願也永樂四年正月太宗皇帝御右順門晚朝百官奏事畢皆趨出召六部尚書及近臣諭曰早朝四方所奏事多君臣之間不得盡所言午後事簡卿等有所欲言可從容陳論毋以將晡朕倦於聽納蓋朕有所欲言者亦欲及此時與卿計議上又曰朕每旦四鼓以興衣冠靜坐是時神清氣爽則思四方之事緩急之宜必得其當然後出付所司行之朝退未嘗輒入宫中間取四方奏牘一一省覽其有邉報及水旱等事即付所司施行宫中事亦多須伺外朝事畢方與處置閒暇則取經史覽閲未嘗敢自暇逸誠慮天下之大庻務之殷豈可須臾怠惰一怠惰則百度弛矣卿等宜體朕此意相與勤勵無厭斁也自今凡有事當商確者皆於晚朝來庶得盡委曲永樂四年七月祀太廟太宗還御奉天殿遣使祭告嶽鎮海瀆諸神太宗出視朝奉天門百官奏事退復召侍臣與語久之時已五鼓侍臣請曰聖躬勤勞須少息太宗曰朕嘗在宫中周思庶事或一事未行或行之未善即不寐至旦必行之乃心安積習既久亦忘其勞蓋嘗自念才德不逮若又不專心志勤思慮所行何由盡善生民何以得安盖勤於思則理得勤於行則事治勤之為道細民不敢廢况君乎洪惟我太祖成祖思創業守成之艱難日不暇食夜不安寢常以勤勵自勉未旦臨朝晡時而後還宫夜或披衣而起仰觀乾象或秉燭夜坐披閲州郡圖籍周恤民𨼆暇則取經史覽閲未嘗敢自暇逸與大禹惜寸陰文王日昃不遑暇食先聖後聖其揆一也國家有道之長豈偶然哉洪武二十四年九月禮部言朝廷禮貴於嚴肅近者文武官入朝往往爭趨競進品級紊亂髙下失倫甚非所以明禮法振朝綱也請自今朝㕘之時將軍先入近侍官員次之公侯駙馬伯又次之五府六部又次之應天府及在京雜職官員又次之有不如儀從監察御史及儀禮司糾覈從之按丘濬曰我祖宗以勤為治無日不朝而每日之間有早午晚三朝或再朝焉誠以自古禍亂之端皆起自蒙蔽蒙蔽之由起自上下之情不通上下之情不通起自君臣不相接見然徒接見而不相親問答猶不見也故聖祖御製大誥首篇以君臣同遊為開巻第一義所以示萬世聖子神孫者至矣按前代朝儀無一定之制時有更改惟我朝自祖宗以來至于今日率循舊章一日三朝自古帝王所無也每日晨興上便服御奉天門文東武西侍鳴鞭畢鴻臚卿唱入班百官行叩頭禮分班侍立翰林學士侍御座左錦衣衛夾陛西立六科給事中分班左右御史分班面北立鴻臚官屬立其後先日謝恩見辭者于鴻臚寺報名至日先赴午門外俟百官叩頭畢鴻臚卿對御宣奏姓名員數於午門外行五拜三叩頭禮畢五府六部以次奏所司合行事次通政司引人於御前面奏請㫖該司出班承㫖大理司以下有事出奏無則已次禮科引差使考滿官員次六科各奏㫖意題本守衛揭帖賞賜鈔錠次鴻臚宣奏藩府鎮邉所遣使臣上命以酒飯賞賜既而兩京堂上官新陞者及在外三司來朝赴任者面見叩頭畢鴻臚唱奏事畢羣臣俱側身向上立鳴鞭畢上乘輦往御武英殿或文華閲章疏日率如此至午復出朝晩亦如之此每日常朝之制也每月朔望上具皮弁服御正殿百官公服叩頭畢分班侍鴻臚卿宣奏謝恩見辭員數畢上出奉天門視朝如常儀臣竊考前代之制有所謂捲班放仗入閣等名或失於粗畧或失於繁𤨏惟今日朝儀酌古凖今實為得中洪武二十年冬十月太祖皇帝諭大臣曰近者臣僚尊卑體統多未得宜爾等宜著禮儀以為定式禮部尚書李原名等㑹官著為禮儀定式一書凡三十七條所謂朝㕘之禮有八焉頒行既久而奉行者偶因一時之便遂襲以為故事旁觀者雖知其非而不敢以為言後來者因以為當然者有之竊觀前代朝㑹班次儀注皆著成圖式載在文獻通考諸書者可考也乞敕大臣及翰林院鴻臚寺官將累朝實録及禮儀定式等書并稽洪武永樂年間以來事例詳加講究稳括節潤畫為圖式懸於兩長安門用以表正百官觀示列辟俾人人知所趨避世世得以遵守永為定制云朝廷講筵之禮自古帝王曷常不以勤政典學為首務哉顧深宫决事非有公卿執事相與參商也典籍獨對非有賢士大夫可備顧問也即有天縱神聖之資豈能獨成雖日視朝御講容接臣下若可以待咨詢𢎞啟沃然一日之間不過片頃而又肅之以等威重之以糾儀君臣之情能通而忠藎之懷得盡者少矣我聖祖特為此慮故于大誥首篇以君臣同遊為開卷第一義而于早朝之外又御便殿聽政經筵之外又御文華殿日講分情兩盡禮意兼周無非欲其上下通蒙絶蔽開泰召和慮至深逺也皇上嗣祚往在冲年不免僅循故事今神睿日長思藻日新乞于每日間御便殿會集内閣部院大臣及科道官凡闗係應行重務未得勝畫或聖心已定就中恐有未盡者不妨從容訪問但有四方災異閭閻愁苦皆得詳究其有内外官員朝見赴任亦可兼訪時出天語分付以所宜行如遇奏本事體明白亦就時批答逕下所司如成祖諭廷臣以午後事簡有言可得從容如孝廟朝召對徐溥劉健等故事則不出皇序不下堂階而明見萬里澤沛海隅矣乃若文華日講正辨論得詳之地如但取講官口誦而已傴僂而前逡巡而退為益幾何謂當於前一日先進講章皇上覽閲之餘端默凝思有無禆益治道有無符合聖𠂻俟是日講畢隨時叩問如講官對未稱㫖但在講或聴講諸臣咸令各陳所見得者非工失者非拙順者非美逆者非違不但聖賢之微言奥㫖可以旁通而諸臣之忠邪深淺亦可槩見皇上何憚而不為也雖然其要在於和顔色畧儀文皇上雖臨下以莊不必其矜持之過也諸臣雖事上以敬可省其節目之煩也盖便殿與正朝異日講與經筵異也圖書編巻七十九
