於上流發源求之徐鉉注説文云江出岫山至楚都名南江潯陽為九道名中江至南徐州名北江入海郭璞山海經注岷山大江所出也嵊山南江水所自出也崌山北江水所自出也三江皆發源於蜀而注震澤禹貢紀其源而及其委耳豈區區為其地記其瑣瑣改易不常之名乎觀禹貢三江之説當以此意求之則余之言雖大禹復生不能易矣五湖五湖之説有二周禮揚州其浸五湖國語與我爭三江五湖之利者非吳耶史河渠書於吳則通渠三江五湖貨殖傳曰夫吳有三江五湖之利太史公自敘曰登姑蘇望五湖此五湖者即具區也其派有五故曰五湖一名震澤一名笠澤張渤吳録云五湖者大湖之别名以其周行五百里三萬六千頃故以五湖名義興記大湖射湖貴湖陽湖洮湖為五湖酈道元水經謂長唐湖射陽湖上湖隔湖大湖為五湖張守節史記正義云菱湖遊湖漠湖貢湖胥湖皆大湖東岸五灣為五湖虞翻云大湖有五道東通長洲松江南通安吉霅溪西通宜興荆溪北通晉陵滆湖西南通嘉興韭溪陸魯望云大湖上稟咸池之氣一水而五名其名大同小異皆禹貢之所謂震澤也王勃文襟三江而帶五湖則總言南方之湖洞庭一也青草二也鄱陽三也彭蠡一名宫亭湖即禹貢滙澤四也太湖五也九州嶽鎮川澤辨古者言九州者禹貢之冀兖青徐揚荆豫梁雍夏置也爾雅之冀幽營兖徐揚荆豫雍商置也職方之揚荆豫青兖雍幽冀并周制也商有幽營而無禹貢之青梁周有幽并而無禹貢之徐梁此三代九州之不同也爾雅何以知其為商制以郭璞注云也賈氏乃謂之夏置蓋以詩譜所謂梁雍荆豫徐揚之民被文王之化文王當商之末有雍梁之民爾雅無梁州則不可為商制不知鄭譜但言文王三分天下有其二州名不足憑也若以爾雅為夏制則禹貢當為何制乎然爾雅有九州之名無九州之界而禹貢職方之界有相侵者請得而言之且職方冀州視禹貢為小以分冀為幽并如舜時制是一分而為三也雖無徐州而青兖之間是已雖無梁州而雍豫之間是已禹貢曰海岱及淮惟徐州又曰大野既瀦今職方青州之川淮泗兖州之澤大野是以徐而入青兖可知矣禹貢曰華陽黑水惟梁州又曰厥貢璆鐵銀鏤砮磬今職方豫州之山華山雍州之利玉石是以梁而入於雍豫可知矣職方既以青兖而包徐故青州多入禹貢之豫兖州多入禹貢之青禹貢豫州曰被孟瀦而職方青州曰其澤望諸豈非青之入豫乎禹貢青州曰鹽絺海物而職方兖州曰其利蒲魚豈非兖之入青乎職方既分冀而為幽并故幽州多入禹貢之青徐冀州多入禹貢之雍職方曰幽州其山醫無閭醫無閭在遼東漢光武以遼東屬青州後又屬幽州兹非幽之入青乎職方曰幽州其澤貕養其浸災時貕養在長廣災出萊蕪地理志以長廣屬徐州琅琊有萊山兹非幽之入徐乎職方曰冀州其澤楊紆爾雅謂秦有楊紆李淳風謂在扶風兹非冀之入雍乎大抵周以禹之一冀州分而為三以禹之八州合而為六其勢必不能如禹之舊杜氏與二鄭不本此説不改職方之字則改職方之意後鄭以潁宜屬豫溠宜屬荆不知幽青雍梁兖豫尚多侵入况去荆豫相距之州乎改其意而釋者此也先鄭以青之淮字當為睢沭當為洙直謂宋有次睢魯有洙泗曽不謂青之包徐也先鄭謂雍之弦當為汧蒲當為浦直謂雍有汧水曾不謂吳山在汧而有弦蒲之藪杜氏以荆之湛當為淮後鄭以兖之盧維為雷雍直以湛與盧維無所經見曽不謂地名變易不一不可一一知也改其字而釋者此也至如山鎮藪澤又有可得而辨者九州山鎮分言之則曰四鎮五嶽總言之皆曰山鎮揚之會稽青之沂山幽之醫無閭冀之霍山固為四鎮矣而五嶽在虞夏商周與世有不同舜典南嶽孔安國以為衡山職方曰山鎮曰衡山是衡為南嶽明矣而爾雅有二説江南衡山為南嶽又以霍山為南嶽蓋漢武帝元封五年巡南郡禮天柱山號曰南嶽是以衡山之神遼逺又移其神於霍山也説者謂一山兩名則失之此漢嶽之與虞周不同也王制有恆山衡山而不言大華嵩山舜典有四嶽而不言中嶽蓋王制南北以山為至東西以水為至故五嶽言其二舜典言四方巡狩所至之地故五嶽言其四泰山為東嶽華山為西嶽恆山為北嶽衡山為南嶽嵩山為中嶽嵩大也即禹貢之外方也初無嶽山之名職方山鎮有恆有岱有華有衡不言嵩髙而有嶽山蓋周都在五嶽之外故以雍之吳山為嶽山此周嶽之與虞夏商不同也故曰山鎮之有可辨者此也九州澤藪在職方為九在爾雅為十蓋職方以州言爾雅以國言也爾雅以吳越有具區即此揚也楚有雲夢即此荆也鄭有圃田即此豫也宋有孟瀦即此青也魯有大野即此兖也秦有楊紆即此冀也燕有昭餘祁即此并也此藪澤之名同也獨晉之大陸齊之海嵎周之焦穫爾雅與職方不同然爾雅之濟即職方之幽以其幽之澤藪貕養而貕養在徐也爾雅之燕為職方之并以其并之昭餘祁而燕為幽州也爾雅之周為職方之雍爾雅之秦亦為職方之雍職方既以弦蒲為雍所以不受焦穫爾雅之晉為職方之冀職方既以冀之界入於秦以楊紆為冀所以不受大陸此澤藪之名異也故曰澤藪之可辨者此也然嘗考之禹貢之别九州隨山濬川而終之曰庶土交征底慎財賦咸則三壤成賦中邦故夏書謂之禹貢今職方之辨九州制畿封國而終之曰制其職各以其所能制其貢各以其所有故周官謂之職方氏鄭氏曰職主也主四方之職貢者其知成周設官之意乎周人設官以職貢為名而制貢又曰各以其所有此正禹貢任土作貢之意也不原周人設官制貢之意而徒區區於九州山川之辨是特一地理書爾而於治道何益古今山水載籍總考禹貢導岍及岐至于荆山逾于河壺口雷首至于大嶽底柱析城至于王屋大行恆山至于碣石入于