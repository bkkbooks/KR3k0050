body:
  text: 圖書編卷三十明章潢撰天下山川海嶽大勢圖敘論天下之大勢者必周覽乎山川山者水之源水者山之委諸山皆發脈於崑崙本雖同而末則異諸水皆會歸于海本雖異而末則同所以山愈聳愈髙而分則小水愈下愈大而合則多其勢然也然山各鎮乎一方而水則以江河為中原兩大界也是故河為北戒而濟會於河江為南戒而漢則會於江然河之源發于崑崙以西之星宿海江雖發源岷山若在雲南之金沙江言之則江源亦本之西也是水皆源於西也雖因江河以分于南北不其會歸于東海矣乎即水之兩戒以觀乎山凡河北諸山皆自代北寰武嵐憲而來為華嶽為析城王屋為雷首為大行為恆嶽而東為岱嶽江南諸山皆來自岷峨由滇貴至廣右經武岡寶慶至衡陽為南嶽散為廬阜為會稽鴈蕩為金陵又别為閩粵是山之支分又水之流派所由辨也然則觀於名山大川而形勝鞏固風氣攸鍾天下之大勢不即此可知乎雖然豫自幼聞山過山水過水之説嘗兩否之及讀前人書於水過水則然於山過山則否豫亦從而然之否之也自今言之合天下之水為一水而其源分派異故有味别之説但理雖可信味實未易測也衆山鼎峙雖小大卑髙不齊而支派連絡脈理分明此則有形可覩者人反莫之信焉何哉噫無怪其然也兩山之中必有水兩水之中必有山加以山過水也山雖斷而脈不斷水過山也水雖分而流未分此豈常情所能識哉但坎流艮止可以迹求可以意會惟隨地以察其情不執見以定其局則不獨天下之山川大勢瞭然在目中也以此周覽一郡一邑一家之形勝亦然故易曰俯以察於地理論三大幹龍朱子曰天下有三處大水曰黃河曰長江曰鴨緑江今以輿圖考之長江與南海夾南條幹龍盡於東南海黃河與長江夾中條幹龍盡於東海黃河與鴨緑江夾北條幹龍盡於遼海此則自其水源之極逺者而論之耳泄天機不原水之逺近龍之配敵惟據禹貢江淮河漢四水及王鄭三條四列之名而以中幹分為二支謂有四大幹龍殊不知禹貢所敘山川自與地理家所論不同先儒蔡文正公蓋嘗辨之曰禹之治水隨山刋木其所表識諸山之名必其髙大可以辨疆域廣博可以奠民居故謹而書之以見其施功之次第初非有意推其脈絡之所自來若今之葬法所言者又曰王鄭三條四列之名皆為未當是故草廬吳文正公有云崑崙為西極之祖分派三幹以入中國良可據也論南條幹龍脈絡按廖氏金壁元文云大江以南之龍其脈起自岷山在茂州岷山縣繞行而西自西而南至雲南之境又東趨夜郎踰桂嶺至零陵為九疑山入桂連撼龍經云五嶺分星入桂連是也過大庾嶺出南淮由汀從邵武抵信走徽東行為天目一枝為錢塘經云一枝分送入海門凡稱經者即楊公三龍經也後倣此又云海門旺氣連閩粵南龍支隴交相纒此是海門南脈絡貨財文武交相錯是也一枝為建康今南京應天府盡江陰經云幹龍盡在江陰墳是也一枝自靈山逆奔盡鄱湖其水源則湘水出永州寧陵縣至洞庭湖入長江論中條幹龍脈絡大河以南大江以北乃中條幹龍其脈起自西傾在洮州臨鞏縣行隴右經云山來隴右尖如削盡是貪狼髙聳卓此處如何不出文只為峰多反成濁是也過鳳翔經云行行退缷大散關在鳳翔府寶雞縣百二山河在此間大纒大護到函谷在𢎞農縣水出黃河如玦環是也為長安一枝出熊耳在髙州上洛縣經云低平漸漸出熊耳萬里平洋漸如砥是也為嵩嶽為汴經云大梁形勢亦無山到此尋龍何處是若無河流與淮水渺渺茫茫不見山是也此處脈亂於河經云河流衡決山斷絶又無石骨又無脈君若到彼説星峰一句不容三寸舌是也出兖為泰嶽經云黃河在北大江在南兩水夾行勢不絶行到青齊忽起峰兖州東嶽插天雄分枝擘脈鍾靈氣聖賢多在魯邦中是也一枝盡於登萊一枝盡於滄棣其水源則濟水出絳州垣曲縣至孟州溫縣入河復出河之南溢而為滎又東北至于青州入海自宋元以來河水穿淮黃河故道淤而東嶽泰山今在河北矣又一枝自嶓冢西行湄州漢水之間出武關由裕過唐抵信陽行淮水之南趨廬行淮水之東為揚盡於通其水源漢水出嶓冢至漢陽縣入江淮水出桐柏山在唐州桐柏縣至淮安入海按此一條泄天機直為一大幹而謂中國有四大幹龍固亦非謬但以極長者論之則此非其所配况青囊理氣心印及諸明術皆無四幹之説今從衆要之此蓋三大幹龍之亞耳辨見前三大幹下論北條幹龍脈絡大河以北之龍其脈起自崑崙經云崑崙山腳出闐顔闐音田西域國名隻隻都是破軍山連綿走入瀚海北北海名風俗強悍人粗頑生兒五嵗學騎射骨鯁方剛是此間是也至白登山名在大同府白登縣西一枝為壺口在隰州古鄉縣大嶽在晉州霍邑次一枝南出為析城在澤州陽城縣而又西折為雷首在河中府河中縣又次一枝為大行在懷州河內北至幽州九嶺綿亘一十二州之界有北陘又次一枝為恆山在定州曲陽府又次一枝為燕山盡於平灤碣石山在平州廬縣經云若以幹龍論大盡大行碣石至海堧是也其水源則汾水出汾州管岑山至絳州入于海已上三大幹龍皆始於崑崙分派三條以入中國其所厯九州則北條出河海以入于海為冀兖之分中條出河南自秦隴三輔入豐沛汾晉派伊洛東而淮泗以入于海為雍豫徐青之分南條出江南自陜右分出西鄙回巴蜀踰荆衡入黔中東而匡阜南極嶺海東北渡閩粵跨三吳自浙右以入于海為梁荆揚之分三幹總論三幹之布於九州也三幹之龍中幹最尊次北幹又次南幹故厯代以來如漢髙祖之泗上漢光武之白水村宋太祖之夾馬營我太祖之鍾離皆在中幹而唐虞之君俱為北産南幹至宋以來運氣方興萃産朱子為萬世儒宗而近來文物東南為多其南幹之最長者為金陵我國朝根本重地太祖髙皇帝龍興之畿也中幹之最長者盡東泰翻身顧祖東海外蕩河江前向萃産孔聖及賢貴凝聚宋末河徙截其來脈者三會通河復加截之其力遂微而中幹之旺氣南北兩大枝盡頭乃萃於泗州鳳陽我皇朝熙祖仁祖二陵在焉北幹之最長者為燕京今京師也朱子曰冀都是正天地中間好個大風水山脈從雲中發來雲中正髙脊處自脊以西之水則西流入于龍門西河自脊以東之水則東流入于海前面一條黃河環繞右畔是華山聳立為虎自華來至中為嵩山是為前案遂過去為泰山聳於左是為龍淮南諸山是第二重案江南諸山及五嶺南安大庾嶺桂陽騎田嶺九真都龎嶺臨賀萌浩嶺始安越城嶺是也又為第三四重案正謂此也吳興唐子鎮以燕京為枝結以堯都為正結而謂朱子所論冀都指作堯都非也彼蓋未考舜分冀東北為幽州而幽燕乃古通稱曰冀耳若堯都既為朱子所稱之冀則朱子又何復曰堯都中原風水極佳左河東大行諸山相繞海島諸山亦皆相向右河南繞直至泰山湊海云云此不待辨説而明矣故丘文莊公大學衍義補直以朱子所稱為今京師誠確見也其以燕京為枝結者不為妄談乎夫南幹正結為南畿及我太祖髙皇帝孝陵中幹正結為我熙祖仁祖皇陵北幹正結為今日京師三幹之盡惟我朝獨會其全回視唐虞以來或得正幹之一或得分幹之一者亦能衍數百年之基則我朝三大幹之福力真億萬斯年可預卜于兹也論中國之山按朱子曰河圖言崑崙為地之中蓋中國至于闐音田二萬里于闐遣使來貢自言其西去四千三百餘里即崑崙山今中國在崑崙之東南而天下之山祖於崑崙惟派三幹以入中國其入外國之山無可考亦不足論今以中國之山言之其河北諸山則自代北寰武嵐憲諸州乘髙而來山脊以西之水流入龍門西河脊東之水流于幽冀入于東海其西一支為壺口泰嶽次一支包汾晉之源而南出以為析城王屋而又西折為雷首又一支為恆山又一支為大行山大行山一千里其山髙甚上黨在山脊河東河北諸州在山支其最長一支為燕山盡於平灤大河以南諸山則關中之山皆自蜀漢而來一支至長安而盡關中一支生下函谷以至嵩少東盡泰山一支自嶓冢漢水之北生下盡揚州江南諸山皆祖於岷江出岷山岷山夾江兩岸而行那邊一支去為江北許多去處這邊一支分散為湖南閩廣盡於兩浙建康其一支為衡山而盡於洞庭九江之西其一支度桂嶺則包湘源而北經袁筠之地以盡于廬阜其一支自南而東則包彭蠡之原度歙黃山以盡于建康又自天目山分一支盡于浙江西之山皆自五嶺贑上來自南而北閩廣之山自北而南一支則又包浙江之原北首以盡會稽南尾以盡閩粵此中國諸山祖宗支派之大綱也總論中國之水按仁山金氏曰天地常形固相為勾連貫通然其條理亦各有脈絡自崑崙而東北言之則自積石而北為湟水星海青海以至浩亹皆河源也入胸奴以東為陰山又東南自代北雲朔分而南趨為北嶽以至大行是為河北之脊壺口雷首大嶽析城王屋皆其羣峰河之折而南汾晉諸水之所以西入河涿易􅋤漳恆衛之所以東入海也分而東趨者行幽燕之地為五關之險以至營平而為碣石此北絡也自崑崙以東言之則自西傾而洮水出其北入河桓水出其南入江又東為朱圉鳥鼠諸隴則為渭之源自渭源以北即夾河源而北以東若岍岐若荆山諸峰涇水漆沮諸源也自渭以南即西傾而下諸峰亘為終南屹為大華東北為殽陜東南為熊耳外方嵩髙伊涪之源又南為桐柏淮源以達于淮西諸山此中絡也又自西傾朱圉而南分是為嶓冢漢源夾漢而趨者北即終南華熊諸隴南則蜀東諸峰説者謂蜀東諸山皆嶓冢正謂其岡岫綿亘耳又東南言之是為岷山江源夾江而東者北支即西傾以南嶓冢以西之脈為恆水西漢水嘉陵江諸源其南支即南趨為蒙蔡諸山青衣大渡馬湖諸源又東包涪黔一盤而北為三峽其出者包絡九江之源中盤中為衡山其再盤而北為廬阜其嶺之東出者又為袁吉章貢旴信諸江之源至分水魚梁嶺三盤而北趨過新安峙天目盡升潤再盤之間其水聚洞庭三盤之間其水聚為彭蠡三盤以東則南為閩浙北為震澤此南絡也惟泰山則特起東方橫亘左右以障中原此所以為異與又曰泰山特起東方為中國水口表鎮禹貢導水略云導河至同為逆河入於海導漾至東為北江入于海導江至東為中江入于海導沇水至東北會于汶又東入于海導淮至東會于泗沂東入于海導渭至東過漆沮入于河導洛至東會于伊又東北入于河此中國山水大勢也山類賦夫山者宣也宣氣生萬物者也出説苑爾其天孫日觀博物志曰泰山一曰天孫言為天帝孫也主召人魂魄東方萬物始成知人生命之長短應劭漢官儀曰泰山東南名曰日觀雞一鳴時見日始出終南大一五經要義曰大一山在扶風武功縣與終南山相連蓬萊九氣十洲記曰蓬萊山外則負海謂之溟海無風則洪波百丈上有九氣丈人九天真官也崑崙五色博物志曰崑崙從廣萬一千里百神所集出五色雲氣五色流水其水東南為中國河天台赤城孫綽天台賦曰赤城霞起以建標瀑布飛流而界道龍門積石書曰浮于積石至于龍門西河訪至道於崆洞莊子曰黃帝聞廣成子在崆洞之上往問道焉識神人於姑射見水賦想肌膚於姑射注江郎之一子還家郡國志曰江郎山三峯上又各有巨石昔山下民兄弟三人化於此晉永嘉之亂湛滿者亦居山側有三子仕宦不得歸禱於三石旬日中湛子出洛水見三少年使閉目入車中恍然不知所之須臾至家林慮之雙童不食顔修內傳曰橋順二子曰璋曰瑞師事仙人盧子基于林慮山棲霞谷服飛龍藥一丸千年不飢故魏武詩曰西山有雙童不飲亦不食節彼南山詩曰節彼南山維石巖巖始於一拳禮曰今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉度懸之祭爾雅曰祭山曰度懸配林是先禮曰齊人將有事于泰山必先有事于配林故梁為晉望爾雅曰梁山晉望也岷實江源書曰岷山導江聳香爐之秀出南雍州記云武當山山髙隴峻若博山香爐廬山亦有香爐峰抗射的之髙懸水經注云會稽有射的山逺望如射侯土人以占米價貴賤諺云射的白斛一百射的玄斛一千至若觸石吐雲説苑曰五嶽能大布雲雨焉能大斂雲雨焉觸石而出膚寸而合不崇朝而雨天下含澤布氣春秋説題辭曰山之為言宣也含澤布氣調於百神者也鳴陳倉之寶雞三秦記曰大白山南有陳倉山山石與雞不别趙髙燒山雞飛去晨鳴山頭聳聞三十里或人謂是玉雞翔淳于之白雉武陵記曰淳于山與白雉山相近絶壑之半有白石雉逺望首尾可長二丈伸足翔翼若虛中翻飛既含情於度木左傳曰山有木工則度之亦遊心於覆簣論語曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也登宛委而得書吳越春秋曰禹傷父功不成登衡山血白馬而祭之夢赤繡丈衣男子稱玄夷蒼水使者謂禹曰欲得我仙書者齋於皇帝之嶽禹乃退齋三日登宛委石得金簡玉字言治水之要圖書出器車而表瑞禮曰山出器車河出馬圖黃帝之遊具茨陽城記曰黃帝登具茨之山升於洪隄之上受神芝圖於黃蘆童子夏王之登會稽吳越春秋曰禹巡越大會計治國之道更名茅山曰會稽爾其探禹穴水經注會稽山東有穴深不見底謂之禹穴東遊者多探其穴紀秦功水經注云秦始皇登會稽山刻石紀功李斯所篆或形標九子九華山録曰峯巒異狀其數有九故號九子李白更號九華或禮視三公禮曰五嶽視三公四瀆視諸侯著屐嘗聞於靈運宋書曰謝靈運好登山嘗著木屐上山則去前齒下山則去後齒朽壤曽聞於伯宗左傳曰梁山崩晉侯召伯宗伯宗辟重曰避傳重人曰待我不如捷之速也問其使曰絳人也問絳事曰梁山崩召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉至若汶為天井河圖曰汶山之地為井絡天以會昌神以建福上天為井岐為地乳河圖曰岐山在崑崙東南為地乳維應桐柏河圖曰桐柏山為地穴上為維星畢連鳥鼠河圖曰鳥鼠同穴山地之幹也上為掩畢星嘉無恤之臨代史記曰趙簡子謂諸子曰吾藏寶符于常山能往得者立為後諸子競往無所得無恤曰常山臨代代可取也簡子曰是知符矣遂立之美仲尼之小魯孟子曰孔子登東山而小魯登泰山而小天下或形類冠幘宣城圖經曰幘山層峯崔峩狀如冠幘或狀同枹鼓隋圖經曰燕山在易縣巖側有石鼓去地百餘丈望之若數百石因左右梁貫之鼓東南有石人援桴而擊世云燕山石鼓鳴則有兵感叱馭之忠臣漢書曰王陽為益州刺史行部至卭郲九折阪嘆曰奉先人遺體奈何乘此險後以疾去及王尊為刺史至其阪問吏曰此非王陽所畏道邪尊叱其馭曰驅之王陽為孝子王尊為忠臣識搗衣之玉女郡國志曰靈山昔有神女於此搗衣山南絶巖有方石明瑩謂之玉女搗練砧縣圃嘗留於穆滿淮南子曰崑崙山去地萬一千里上有層城九重或上倍之是謂閬風或下倍之是謂縣圃穆天子傳曰天子至於崑崙丘季夏丁卯升於春山之上以望四野是惟天下之髙山先王之所謂縣圃山海經曰實惟帝之平圃疏屬曽拘於二負山海經曰二負之臣曰危與二負殺窫窳帝乃梏之於疏屬之山桎其右足反縳兩手以髮繫之於山上盤石之下在開題西北注漢宣帝時使人鑿上郡發盤石得一人徒祼被髮反縛械一足莫有識者劉子政按此言之宣帝大驚時人爭學山海經則有石帆孤出夏侯曽先志曰會稽山有石帆山石危起若數百幅帆砥柱分流水經注曰砥柱者禹治洪水山陵當水者鑿之故破山以通河河水分流包山見水中若柱然故曰砥柱巨靈之擘太華郭緣生述征記曰華山與首陽本同一嶽河神巨靈擘開以通河流故掌迹在焉共工之觸不周見天賦共工折柱注秦望則金簡玉書靈祕之所潛隱水經注曰會稽秦望山在州正南為衆峯之傑涉境便見吳越春秋稱山覆釜盎盎中有金簡玉書皇帝之遺緘也又云金簡玉字之書夏禹發之得百川之理羅浮則璿房瓊室神仙之所嬉遊日南志曰羅浮山本蓬萊山一峯有璿房瓊室七十二所又聞嬴政曽驅見石賦秦皇過海賦愚公欲徙列子曰大行與王屋二山方七百里髙萬仞北山愚公者年且九十面山而居懲山北之塞出入之迂也聚室而謀曰吾與汝畢力平險可乎雜然相許其妻曰以君之力曽不能損魁父之丘如大行王屋何且焉置土石雜曰投諸海渤之尾隱士之北遂率子孫荷擔者三夫叩石墾壤運於渤海之尾鄰人京城之孀妻者有遺男始齔往助之寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曽不能毁山之一毛其如土石何北山愚公長息曰汝之心曽不若孀妻弱子雖我也死有子存焉子又生孫孫又生子孫孫子子無窮匱也如山不加增何若而不可乎河曲智叟無以應操沱之神聞之懼其不已告之于帝帝為感其誠命夸娥氏二子負山一措朔東一措雍南覿修羊於華陰列仙傳曰修公羊者蜀人也於華陰山石中有懸石榻卧其上石盡穿陷見王喬於緱氏列仙傳曰王喬周靈王太子晉也好吹笙作鳳鳴遊伊洛之間浮丘接以上嵩髙山三十餘年後于山上見桓良曰告我家七月七日待我於緱氏山頭至日果乘白鶴駐山嶺望之不得到舉手謝時人數日去指闕逺屬於牛頭晉書曰元帝渡江草創欲立石闕于宫門未定王導隨駕出宣陽門乃遙指牛頭山南峯為天闕中宗從之積甲遙齊於熊耳東觀漢記曰赤眉初降輦輸鎧甲兵弩積與熊耳山等至有羣玉册府穆天子傳曰癸巳至于羣玉之山四徹中繩先王之所謂册府也注四徹中繩言皆平直也崑崙下都搜神記曰崑崙之山是惟帝之下都環以炎火之山洞臺灊霍道經曰霍山下有洞臺方二百里司命君之府也員嶠方壺列子曰渤海之東有大海其中有山一曰大輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊其上有臺觀有金玉琳琅之樹皆叢生實皆有滋味食之不死人皆仙聖一日一夜飛翔來往焉觸百神者帝臺山海經曰鼓鐘之山帝臺之所以觸百神者也今名鐘山在陸渾縣迎四皓者髙車髙士傳曰髙車山上有四皓碑及祠皆漢惠帝所立也漢髙後使張良詣南山迎四皓之處因名髙車山及夫瞻挂鶴之悠揚臨海記曰郡西有白鶴山山上有池泉水懸溜逺望如倒挂白鶴因名挂鶴泉望盤龍之宛轉徐懸釋問曰諸葛亮以為鍾山龍盤即蔣山也聞蘇門之清嘯十道志曰蘇門山一曰蘇嶺即阮籍見孫登長嘯有鳳凰集登所隱之處故號登蘇門先生訪酉陽之逸興荆州記曰小酉山上石穴中有書千卷相傳秦人於此學因留之故梁湘東王云訪酉陽之逸興用干言之飲宿李公緒趙記曰柏仁縣有千言山衛詩云出宿于干飲餞于言是也紀云亭之封禪後漢書曰光武封泰山禪梁甫注云云亭亭肅然蒿里社首梁甫皆太山下小山也石閭在西巖之下焉亦有蘭巖唳鶴神境記曰滎陽縣有蘭巖山峻拔千丈傳云昔有夫婦隱此山數百年化為雙鶴忽一旦一鶴為人所害其一鶴嵗常哀鳴至今響動巖谷莫知年嵗金華赤羊見石賦初平叱羊注再成三襲爾雅釋山曰三襲涉再成英朝陽夕陽爾雅曰山西曰夕陽山東曰朝陽桂陽話石荆州記曰桂陽萬嵗山出靈夀仙草方云服之不死又有話石有聲如人共語吳宫採香吳地記曰香山吳王遣美人採香於此山因以為名故有採香徑凜冽而風門激吹水經注曰北屈縣有風山上有穴如輪風氣蕭瑟不止當其衝所略無生草蓋衆風之門也晶熒而火井揚光見火賦觀彼瑩臺注其戴石為砠爾雅曰土戴石為砠注云土山上有石者多草為岵爾雅釋山曰多草木岵無草木屺摘天柱之仙桃郡國志靈臺山天柱巖有一桃樹髙五尺皮是桃心肉似柏張陵與王良趙升試法於此曰百餘年桃迄今不朽有小禪記之采華容之雲母荆南志曰華容方臺山山出雲母土人採之先候雲所出之處於其下掘取無不大獲者往往有長五六尺可為屛風當掘時忌有聲否則所得粗惡矣尋謝敷之紫石孔靈符會稽記曰諸暨縣有鳥帶山其上多紫石世人莫知居士謝敷少時經始諸山往往遷易功費千計生業將盡後遊北境夢山神語之曰當以五十萬相助但見主人牀下有異石色甚明徹試取瑩拭乃紫石因問所從來云出此山遂往掘果得利不訾訪桓溫之白紵宣城圖經曰白紵山本名楚山桓溫領妓遊此山奏歌好為白紵歌因改焉駭媧宫之臺榭南康記曰君山翠麗鮮明逺若臺榭名曰媧宫風雨之後景氣明靜頗聞鐘鼓之聲識仇池之棲櫓秦州記曰仇池山本名丘維山形似覆囊上廣百頃壁立千仞自然棲櫓却敵分置均調竦起數丈如人立亦有烏龍白騎湘州記曰汝城縣有烏龍白騎山有黑石如龍白石如馬紫蓋青泥荆州記曰衡山三峯其一名紫蓋郡國志曰興州青泥嶺縣崖萬仞上多雲雨屢成泥淖遂以為名羊腸鳥翮郡國志曰羊腸塞在龍門西山海經曰大翮山小翮山有王仲廟仲字次仲秦始皇時變蒼頡舊文為今𨽻書用之大嘉使徴不至始皇大怒檻車迫之次仲化為大鳥出于檻外翩然髙翔至於西門山落二翮因名之馬鞍牛脾郡國志曰栁州馬嶺山本名牛脾山續南越志曰馬鞍山始皇時望氣者云南海有五色氣遂發卒千人鑿以斷山之岡阜今其山如馬鞍因以名之又襄陽記曰楚山一名馬鞍山劉𢎞山簡九日賞宴之所猿門聳拔益州記曰猿門在涪縣上多猿其山二峯傑竪如門鴈塞逶迤荆州記曰景山鴈南翔北歸遍經其上人謂之鴈塞山仙翁種玉見玉賦羊公種之而娶婦注烈女磨笄隋圖經曰磨笄山在懷戎縣昔趙襄子殺代王其夫人曰代已無矣吾將何歸遂磨笄于山而自殺代人名其山為磨笄山言聽蔡誕抱朴子曰蔡誕者自云被謫至崑崙問曰崑崙似何答曰天不問其髙幾里要於仰視之去天不過十數里也約信安期列仙傳曰安期生琅琊阜鄉人皆言夀千嵗始皇與女賜金璧數千萬出阜鄉亭皆委去留以赤玉舄一兩報曰後千秋來我蓬萊山下見祝融之降崇聞鸑鷟之名岐國語云夏之興也祝融降於嵩山周之興也鸑鷟鳴於岐山注崇嵩字古通用耳復聞馬援壺頭武陵記壺頭山在縣東援所穿室也室內有蛇如百斛船云是援之餘靈羊公峴首十道志曰羊祜嘗與從事鄒湛共登峴山垂泣曰自有宇宙便有此山由來賢達勝事登此望遊如我與卿者多矣皆湮滅無聞念此使人悲傷我百年後魂魄猶當登此山也湛對曰公德冠四海道符前哲令聞令望當與此山俱傳若湛輩乃當如公語耳挹少室之石膏河圖云少室山有白玉膏服即成仙飲洞庭之美酒博物志曰洞庭君山帝之二女居之曰湘夫人又荆州圖經云湘君所遊故曰君山也有道與吳包山潛通上有美酒數斗得飲者不死漢武帝齋七日求得東方朔曰臣識此酒請視之因一飲至盡帝欲殺之朔曰殺朔若死此為不驗如其有驗殺亦不死乃赦之又若望朝霞於赤岸南兖州記曰瓜步山東五里有赤岸山南臨江中羅君章云赤岸若朝霞郭景純山賦云鼓洪濤於赤岸祝黃石於穀城見石賦祠彼榖城注雖陽岐之能買荆州記曰石首縣陽岐山無所出不足可書本屬南平界范玄平記曰古老相承云胡伯始以本境縣無山買此山上記皆簿也豈北邙之可平魏志曰明帝欲平北邙使登臺可觀孟津辛毗諌曰天地之性髙髙下下今而反之既非其理加以損費人工民不堪役乃止陳音以之而立號會稽記曰陳音山昔有善射者陳音越王使簡士習射於郊外死因葬焉冢壁悉化作騎射之象因以名山張嵊因之而得名宋書曰張稷為剡令至嵊亭生子因名嵊字四山雲氣或成於宫闕袁嵩後漢書曰光武封泰山雲氣成宫闕風雨曽避於崤陵左傳曰秦穆公使孟明潛師於東門之外蹇叔之子與師哭而送之曰晉人禦師必于崤崤有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也必死是間余收爾骨焉已夫少室登仙之臺述征記曰少室山中多神藥漢武築登仙臺於其中句曲華陽之洞茅君內傳曰茅山一名句曲山秦時名為華陽洞天燕然勒名後漢書曰竇憲與單于戰于稽洛山大破之憲遂登燕然山刻石勒碑令班固作銘祁連作冢漢書曰霍去病以驃騎將軍擊胸奴至祁連山獲首虜三萬去病薨上悼之發屬國玄甲軍陳自長安至茂陵為冢象祁連山或功代攸彰或靈仙所重若過之而身熱經之而頭痛漢書曰杜欽説大將軍王鳳曰罽賔國道厯大頭痛山小頭痛山赤土身熱之阪徒為患於蠻貊而無資於財用水類賦夫潤萬物者莫潤乎水出易若乃玩文章於濉渙述異記濉渙二水波若五色有文故名繢水修袚除於溱洧見春賦玩兹溱洧注飲玄州之似蜜魚龍河圖曰玄洲在北海中去南岸十萬里上有芝生玄澗澗水如蜜服之長生味晉安之如醴名山略記曰僧權道人居晉安霍山晨出澗忽見白水異常飲之甘如醴水過甚速以器取得少許以餉陶晉安不復可飲權年百三十餘嵗後不知其所終或見漸車詩曰淇水湯湯漸車帷裳注帷裳即婦人之車也或稱濡軌詩曰有瀰濟盈濟盈不濡軌歌屈原之濯纓楚辭曰滄浪之水清可以濯我纓滄浪之水濁可以濯我足耻巢父之洗耳逸士傳曰堯讓天下於許由由逃之巢父聞而洗耳於池濵樊堅字仲文方飲牛乃繫而還恥令牛飲其洗耳之下流若夫挹彼注兹詩曰泂酌彼行潦挹彼注兹泳之遊之詩曰就其深矣方之舟之就其淺矣泳之遊之傳既聞於流惡左傳曰有汾澮以流其惡詩亦言其樂飢詩曰泌之洋洋可以樂飢象存習坎易曰水洊至習坎性存盛衰淮南子曰水之性循勢而行乘衰而流注衰下也湛靈源於疏勒後漢書曰耿恭為戊己校尉以疏勒城旁有澗水可固乃據之胸奴復來攻恭于城中穿井十五丈無水乃嘆曰昔二師將軍拔佩刀刺山而泉湧乃整衣向井拜于是有飛流奔出衆皆稱萬嵗因揚泉示虜虜以為神遂引去湧清流於二師已見上注至於懷山襄陵書曰湯湯洪水方割蕩蕩懷山襄陵浩浩滔天浮天載地玄中記曰天下之多者水焉浮天載地髙下無不至萬物無不潤滿而後進揚子法言曰或問進曰水或曰為不捨晝夜歟曰有是哉滿而後進者其水乎盈而不概孫卿子曰孔子見大水必觀焉曰夫水柔而無為也似德其浩浩乎不屈似有道其赴百仞之谷不懼似勇主量必平似法盈不求概似正發源必東似志知檻泛之殊名爾雅曰檻泉正出湧出也沃泉縣出下出也氿泉穴出仄出也涉冬春而凝泮淮南子曰夫水向冬則凝而為冰迎春則冸而為水量深淺而揭厲爾雅曰深則厲淺則揭揭者揭衣也以衣涉水曰厲爾其流觱沸詩曰觱沸檻泉道靈長郭璞江賦咨五材之並用嘉水德之靈長天齊之東漢書曰秦始皇東遊海上祠八神將一曰天主祠天齊天齊淵水居臨災南郊山下注云五泉並出帝臺之漿山海經曰髙前之山其上有水焉甚寒而清帝臺之漿水也驚迅湍於灩預夔州圖經曰灩預在瞿唐口夏水迅激至艱難諺曰灩預大如襆瞿唐不可觸灩預大如馬瞿唐不敢下駭懸流於吕梁莊子曰孔子觀於吕梁懸水三十仞流沫四十里黿鼉魚鱉不能遊見一丈夫遊之與齎俱入與泊偕出則有臭過椒蘭列子曰禹治水土迷之一國無風雨霜露不生鳥獸有山名壺嶺頂有口若圓環名曰滋穴有水湧出名曰神瀵臭過椒蘭味過醪醴利穿金石淮南子曰水之為物擊之無創射之不傷斬之不斷焚之不然利穿金石功濟天下河分簡潔見河賦簡潔鈎盤注渠名鄭白漢書溝洫志曰鄭國韓之水工韓欲疲秦無令東伐乃使國間説秦令鑿涇水自中山西邸瓠口為渠以溉田禾就而詐覺秦欲殺國國曰臣為韓延數嵗之命為秦建萬世之功遂成之名鄭國渠又漢太始二年趙大夫白公復奏穿秦渠傍引涇水注渭名白渠民歌曰田於何所池陽谷口鄭國在前白渠起後舉插為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口美君子之為交僼曰君子之接如水小人之接如醴君子淡以成小人甘以壞歎小人之是溺禮曰小人溺於水君子溺於口禮著淵泉禮中庸曰溥博如天淵泉如淵祭名清滌禮曰祭宗廟水曰清滌偉文公之獨見後漢書曰任文公巴郡人為治中時天大旱白刺史曰五月一日當有大水宜為預備刺史不聽文公獨儲大船百姓或信文公頗為防者至其月日中雲起須臾雨至晡時湔水湧起十餘丈突壞廬舍所害數千人美公沙之先識後漢書曰公沙穆鋭思河洛推步之術永夀元年大雨水三輔以東無不漂沒穆豫告百姓徙居髙地故𢎞農人獨免異出兮同流見上瀵肥斯異注載舟兮覆舟袁宏三國名臣贊序曰江湖所以載舟亦所以覆舟仁義所以全身亦所以亡身美彼上善老子曰上善若水水善利萬物而不爭嘉其至柔老子曰水天下之至柔馳騁天下之至剛感若思之置坐唐書曰孔若思常謂人仕至中郎足矣及遷庫部郎乃置一石止水于坐右示止足之意為左慈之逆流抱朴子曰左慈以氣禁水水為逆流一二丈著水禁中庭露之大寒不氷至於閲彼流漣詩曰河水清且漣猗又清且淪猗乘之沿泝尚書傳曰順流而下曰沿詩注逆流而上曰泝潤下潛滋書曰水曰潤下朝宗逺鶩詩曰沔彼流水朝宗于海歎逝者之如斯論語曰子在川上曰逝者如斯夫不舍晝夜處衆人之所惡老子曰水善利萬物而不爭處衆人所惡故幾于道美夫不雜則清莫動則平莊子曰水之性不雜則清莫動則平五色不得不彰禮曰水無當於五色五色不得不彰百事不得不成淮南子曰天下之物莫柔弱於水上天則為雨露下地則為潤澤萬物不得不生百事不得不成識武都之泥紫隴右記曰武都紫水有泥其色紫而粘貢之用封璽書故詔誥有紫泥封見豳土之蛇青唐書曰楊朝晟為邠州刺史奏方渠合才波皆賊路請城之軍次方渠無水師徒囂然遽有青蛇垂髙而立視其迹水隨而流築防環之遂為渟泉在成都者以錦為號華陽國志成都道西城故錦官也錦工織錦濯于江中則鮮明濯他江則不如故名錦里城出房陵者以粉為名荆州記曰陽縣粉水源出房陵取其水為粉鮮潔異于餘水别有夫餘沈毛廣志曰弱水在夫餘北不勝毛羽襄城化血古今注曰漢安帝延平中河東水化為血元初中潁川襄城水化為血不流范雲慕仁而不怠韶州圖經曰曲江縣修仁水北有三峯亭五渡水齊范雲為始興至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹皆邪流吳隱酌貪而愈潔晉書曰吳隱之為廣州州石門有貪泉傳云飲者貪隱之酌而飲之為詩曰嶺南有一水號曰貪泉深若使夷齊飲終當不易心新豐則時平乃清唐書新豐鸚鵡谷水清世傳云谷水清天下平臨淄則世亂而竭述征記曰臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭慕容超時乾涸彌載及宋武北征乃激洪流淮為滸江為沱漢為潛洛為波爾雅釋水曰濟為濋汶為瀾洛為波漢為潛淮為滸江為沱濄為洵潁為沙汝為濆美陳宣之納諫謝承後漢書曰建武中洛水出延津城門或欲築塞之陳宣諫曰昔王尊正身金隄而水退况聖人也言未絶而水去韙王商之止訛漢書曰建始中京師民無故相驚言大水至成帝召公卿議大將軍王鳳以為太后與上及後宫可御舟船令吏民上長安城以避水羣臣皆從鳳議左將軍王商獨曰自古無道之國水猶不冒城郭今聖政和平上下相安何因當有大水一日暴至此必訛言也不宜重驚百姓上乃止有頃長安中稍定問之果訛言也投舒姑而靈變宣城記曰臨城縣蓋山有姑泉俗傳有舒氏女與父析薪女坐泉處忽牽挽不動父遽告家比還唯見清泉湛然母云女好音樂乃作絃歌泉湧流雙鯉赴節泛滄浪而浩歌見上濯纓注或曰拗堂莊子曰水之積也不厚則其負大舟也無力覆杯水於坳堂之上則芥為之舟置杯焉則膠矣水淺而舟大也或稱瀱汋爾雅釋水曰泉一見一否為瀐一有水一無水為瀱汋瀱居例切汋仕捉切味識淄澠列子曰白公問於孔子曰人可與微言乎孔子不應白公曰若以石投水如何孔子曰吳之善遊者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人故不可與微言也鬭聞穀洛國語曰周靈王二十二年榖洛鬭毁王宫王欲壅之太子晉曰夫山土之聚也藪物之歸也川氣之通也澤水之鍾也夫天地取於髙歸於下今吾執政無乃實有所闕以滑二神王卒塞之王室大亂雖灌注於百川梁簡文帝海賦曰坎德洊臻水源深博灌注百川控清引濁蓋權輿於一勺禮曰今夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉稽夫循而難毁淮南子曰天光可見而不可握水可循而不可毁親而不尊禮曰水之於人也親而不尊動則叶乎智者論語曰仁者樂山智者樂水仁者靜智者動靜則符乎聖人莊子曰水靜則明燭鬚眉水靜猶明而况聖人之心靜乎或浸彼苞蕭詩曰冽彼下泉浸彼苞蕭或不流束薪詩曰楊之水不流束薪女媧之積蘆灰淮南子曰往古之時四極廢九州裂水浩漾而不息於是女媧積籚灰以止淫水夏禹之鑿龍門淮南子曰古者水為民害禹鑿龍門平水土民乃得而陸處及夫瞻瀏其詩曰瀏其清矣觀毖彼詩曰毖彼泉水亦流于淇玄灞素滻之名潘嶽西征賦曰玄灞素滻湯井溫谷溫洛榮河之瑞易乾鑿度曰盛德之應洛水先溫九日乃寒五日變為五色玄黃尚書中候曰昔堯修壇河榮光出河休氣四塞既近之而易溺禮曰夫水近於人而易以溺人亦玩之而多死左傳曰子産謂子太叔曰惟有德者能以寬服民其次莫如猛夫火烈人望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬為難也下令斯同管子曰措國於不傾之地下令於流水之源臣心是比漢書曰趙昌佞諂奏尚書鄭崇與宗族通疑有姦上責崇曰君門如市人何以欲禁切主上對曰臣門如市臣心如水任重致逺之功尚書大傳曰非水無以準萬里之平非水無以通逺任重也激濁揚清之美尸子曰水有四德沐浴羣生通流萬物仁也揚清激濁蕩去滓穢義也柔而難犯弱而難勝勇也道江流河惡盈流謙智也取瓠葉以泉渟博物志曰庭州灞水以金銅銀鐵器盛之皆漏唯瓠葉則不漏發績籠而波委續述征記曰梁鄒城西有籠水云齊孝婦誠感神明涌泉發於室內潛以績籠覆之由是無甕汲之勞家人疑之時其出而搜其室試發此籠而泉遂涌流漂居宇故名曰籠水至有陷空桑之里吕氏春秋曰有侁氏女子採桑得嬰兒于空桑之中獻之其君命庖人養之察其所以然曰其母伊水之上嘗夢神人告之曰臼出水而東走明日視臼果出水告其鄰東走十里而故邑盡為水身化為空桑故命之曰伊尹化厯陽之都淮南子曰厯陽有老嫗常行仁義有過者謂曰此當沒為湖視東城門有血便走上山勿反顧也自此嫗數往視門門吏問之嫗對如其言吏殺雞以血塗門明日嫗早往視門有血便走上山厯陽遂沒為湖杯浮曲岸見春賦秦昭之受水心注月射方諸淮南子曰方諸見月則津而為水又萬畢術曰方諸取水注曰方諸形若杯無耳以五石合治之十二月壬子夜半作之以承月水即來也詠鮑照之九塗鮑照詩曰九塗平若水雙闕似浮雲望馬氏之行車後漢書曰明德馬后好儉常曰前過濯龍門見外家起居者車如流水馬如龍顧視御者不及逺矣洛宜禾而渭宜黍此淮南子之文也方有玉而圓有珠尸子曰凡水方折者有玉圓折者有珠清水有黃金龍淵有玉英勺蠡而滄海寧測見天賦誰能管窺注決江則波臣有餘莊子曰貸粟於監河侯侯曰我將得邑金貸子三百斤可乎周曰昨見中道而呼者周顧視車轍中有鮒魚焉曰東海之波臣豈肯有斗升之水活我哉周曰我且南遊説吳楚之王激西江之水而迎子可乎魚曰吾得斗升之水然活耳君乃言此曽不如早索我於枯魚之肆斯流濕之為美豈獨薦獻於潢汚易曰水流濕火就燥左傳曰筐筥錡釜之器潢汚行潦之水可以薦于鬼神可以羞于王公天下諸山所在州縣有時而更山川千古不易詳察山與水則天下可運于掌泰山為東嶽在泰山博縣西北岱宗也蒙山在沂州費縣嶧山在兖州鄒縣霍山為南嶽在廬江灊縣西南天柱山也塗山在濠州鍾離縣八公山在夀州夀陽縣華山為西嶽在𢎞農華陰縣西南古文之敦物山也雷首山在河東蒲坂縣東南砥柱在河東大陽縣東河中王屋山在河東垣曲縣東北也林慮在相州西白鹿在衛州北大行山在河內野王縣西北王烈得石髓處封龍在趙州西井陘在恆州西恆山為北嶽在中山曲陽縣西北碣石山在遼西臨渝縣南水中也大禹鑿其石右夾而納河析城山在河東濩澤縣西南大嶽山在河東永安縣壺山在河東北屈縣東雷首在蒲州介山在汾州崞山在代州一名五臺山南龍門山在河東皮氏縣西梁山在馮翊夏陽縣西北河上太白在京兆武功縣荆山在馮翊懷德縣南九嵕在奉天縣岐山在扶風美陽縣西北關山在扶風汧縣之西也吳山在隴州熊耳在商州上洛縣隴山終南山敦物山在扶風武功縣西南也隴坻在清水縣須山在隴西臨洮縣西南禹貢中條山也秦嶺在秦州上邽縣嶓冢山在隴西氐道縣之南南條山也鳥鼠同穴山在隴西首陽縣西南積石在隴西河關縣西南山海經云山在鄧林東河所入也都野澤在武威縣東北縣在姑臧城北三百里東北也即休屠澤也古文以為豬野合離山在酒泉會水縣東北合黎山也崆洞在肅州西傾在洮州之西南流沙地在張掖居延縣東北居延澤在其縣故城東尚書所謂流沙者也三危山在燉煌縣南山海經曰三危之山三青鳥居之是山也廣圓百里在鳥鼠山西即尚書所謂竄三苗于三危也朱圉山在天水北冀縣南即冀縣山有石鼓開山圖謂之天鼓山峨眉山在嘉州青城在蜀州岷山在蜀郡湔氐道西漢書以為瀆山者也巫峽在夔州巫山縣銅梁在合州石􅀈縣嶓冢山在𢎞農盧氏縣南是山也穀水出其北林也荆山在南郡臨沮縣東北東條山也卞和得璞玉于是山峴山在襄州襄陽縣內方山在江夏竟陵縣東北禹貢立章山也大别山在廬江六安縣西南外方山嵩髙是也桐柏在南陽平氏縣東南陪尾山在江夏安陸縣東北衡山在長沙湘南縣南禹治洪水血馬祭衡山於是得金簡玉字之書大庾在虔州南康縣武夷在建州崇安縣九江地在長沙下巂縣西北雲夢澤在南郡華容縣之東東陵地在廬江金蘭縣西北敷淺原地在豫章厯陵縣西南彭蠡澤在豫章彭澤縣北尚書所謂彭蠡既豬陽鳥攸居也匡廬山在江州潯陽縣茅山在潤州丹陽句容二縣蔣山一名鍾山在潤州江寧縣天目在杭州於潛縣會稽在越州山陰縣四明在餘姚縣天臺在台州始豐縣括蒼縉雲在金華婺州黃嶺在廣州寶安縣澤陽山在下邳縣之西羽山在東海祝其縣南也縣即王莽之郵亭也尚書殛鯀於羽山謂是山也陶丘在濟陰定陶縣之西南陶丘丘再成也荷澤在定陶縣東雷澤在濟陰成陽縣西北荷水在山陽湖陸縣南蒙山在太山蒙陰縣西南大野澤在山陽巨野縣東北大邳地在河南城臯縣北爾雅曰山一成謂之邳明都澤在梁郡睢陽縣東北益州池水在蜀郡汶江縣西南其一在郫縣西南皆還入江荆州沱水在南郡枝江縣三澨地之南在卭縣之北尚書曰導漢水過三澨地説曰沔水東行過三澨合流觸大别山陂故馬融鄭玄王肅孔安國等咸以為三澨水名也海內諸水之源大江出汶山今江出汶山郡北遷縣岷山東南經蜀郡揵為至江陽東北巴東建平宜都南郡江夏弋陽安豐至廬江南界東北經淮南下邳至廣陵郡入海北江出曼山南江出髙山髙山在成都西入海在長州南浙江出三天子都在其東按地理志浙江出新安黟縣南蠻中東入海今錢塘浙江是也黟即歙也浙音折在閩西北入海餘暨南餘暨縣屬會稽今為永興廬江出三天子都入江彭澤西彭澤今彭蠡也在尋陽彭澤縣一曰天子鄣淮水出餘山在湖陽東義鄉西入海淮浦北今淮水出義陽平氏縣桐柏山山東北經汝南汝隂淮南譙國下邳至廣陵縣入海湖陽縣今屬新野湘水在舜葬東南陬西環之環繞也今湘水出零陵營道縣陽湖山入江入洞庭下洞庭地穴也在長沙巴陵今吳縣南大湖中有包山下有洞庭穴道潛行水底云無所不通號為地脈一曰東南西澤漢水出鮒魚之山書曰嶓冢導漾東流為漢案水經漢水出武都沮縣東狼谷經漢中魏興至南鄉東經襄陽至江夏安陸縣入江别為沔水又為滄浪之水帝顓頊葬于陽九嬪葬于陰四蛇衛之言有四蛇衛守山下濛水出漢陽西入江聶陽西漢陽縣屬朱提溫水出崆洞崆洞山在臨汾南入河華陽北今溫水在京兆陰盤縣水常溫也臨汾縣屬平陽潁水出少室少室山在雍氏南入淮西鄢北今潁水出河南陽成縣乾山東山東南經潁川汝陰至淮南下蔡入淮鄢今鄢陵縣屬潁川一曰緱氏縣屬河南音鈎汝水出天息山在梁勉鄉西