汾陰者人雍其流以為陂種稻呼其本所出處為瀵魁此是也尾猶底也水醮曰厬謂水醮盡水自河出為灉書曰灉沮會同濟為濋汶為瀾洛為波漢為潛書曰沱潛既道淮為滸江為沱書曰岷山導江東别為沱濄為洵潁為沙汝為濆詩曰遵彼汝濆皆大水溢出别為小水之名水決之澤為汧水決入澤中者亦名之為汧決復入為汜水出去復還河水清且瀾漪大波為瀾言渙瀾小波為淪言藴淪直波為徑言徑涏江有沱河有雍汝有濆此故上水别出耳所作者重見滸水崖水邊地水草交為湄詩曰居河之湄以衣涉水為厲衣謂褌繇膝以下為涉帶以上為厲繇自也潛行為泳水底行也晏子春秋曰潛行逆百步順流七里泛泛楊舟紼縭維之紼􅛢􅛢索縭緌也緌繫天子造舟維連四船大夫方舟併兩船士特舟單船庶人乘泭併水以渡水注川曰溪注溪曰谷注谷曰溝注溝曰澮注澮曰瀆此皆道水轉相灌注所入之處名逆流而上曰泝洄順流而下曰泝遊皆見詩正絶流曰亂直橫渡也書曰亂于河江河淮濟為四瀆四瀆者發源注海者也爾雅釋名山頂曰冢亦曰巔亦曰椒山脊曰岡山大而髙曰嵩小而髙曰岑鋭而髙曰嶠卑而大曰扈小而衆曰巋上大下小曰巘山有草木曰岵無草木曰屺石戴土曰砠土戴石曰崔嵬山東曰朝陽山西曰夕陽山足曰麓山穴曰岫山邊曰崖崖之髙曰巖上秀者曰峰陬隅髙者岊山坡曰坂山三襲曰陟山再成曰坯山中絶曰陘未及上曰翠微山屬曰澤山狹而髙曰巒巒山曰嶞二山曰阜曲阜曰阿大阜曰陵山陵曰丘大唐六典一曰關內古雍州之境東拒河西抵隴阪南據終南之山北邊沙漠其名山有大白九嵕吳山岐山梁山太華之嶽在焉其大川有涇渭灞滻二曰河南古豫兖青徐四州之境東盡于海西距函谷南瀕于淮北薄于河名山則有三崤少室砥柱蒙山澤山嵩岱二嶽在焉大川有伊洛汝潁沂泗之水淮濟之瀆三曰河東古冀州之境東拒恆山西據河南抵首陽大行北邊胸奴其名山則有雷首介山霍山嵉山其大川有汾晉及丹沁之水四曰河北古幽冀二州之境東並于海南迫于河西距大行恆山北通榆關薊門其名山有林慮白鹿封龍井陘碣石之山恆嶽在焉其大川有漳淇呼沱之水五曰山南古荆梁二州之境東接荆楚西抵隴蜀南控大江北據商華之山其名山有嶓冢熊耳巫峽銅梁荆山峴山大川則有巴漢沮溝之水六曰隴右古雍梁二州之境東接秦州西逾流沙南連蜀及吐蕃北界朔漠其名山有秦嶺隴坻西傾朱圉積石合黎崆洞三危鳥鼠同穴其大川則有洮水弱水羌水河瀆及休屠之澤在焉七曰淮南古揚州之境東臨海西抵漢南據江北距淮其名山有八公灊大别霍山羅山塗山其大川有滁淝之水巢湖在焉八曰江南古揚州之南境東臨海西抵蜀南極嶺北帶江其山有茅山蔣山天目會稽四明天台括蒼縉雲金華大庾武夷廬山而衡嶽在焉其大川有浙江湘贑沅澧之水洞庭彭蠡大湖之澤九曰劒南古梁州之境東連牂牱西界吐蕃南接羣蠻北通劒閣其名山有峨眉青城鶴鳴岷山其大川有涪雒及西漢之水江瀆在焉十曰嶺南古揚州之南境東南際海西極羣蠻北據五嶺其名山有黃嶺及鬱之水靈川在焉其大川有桂水鬱水中國五嶽東嶽泰山嶽神天齊王領仙官玉女九萬人山周回二千里在兖州奉符縣羅浮山括蒼為佐命蒙山東山為佐理南嶽衡山嶽神司天王領仙官玉女三萬人山周回二千里以霍山潛山為儲副天台山句曲山為佐理中嶽嵩髙山嶽神中天王嶺仙官玉女一十二人為五土之主周回一千里在洛州考城縣少室山東京武當山為佐命大和山陸渾同佐理西嶽華山嶽神金天王領仙官玉女七萬人山周回二千里在華州華陰縣地胏山女几山為佐命西域山青城山峨眉山嶓冢山戎山西玄吳山同佐理北嶽恆山嶽神安天王領仙官玉女五萬人山周回二千里在鎮州河逢抱犢山為佐命玄隴山崆洞山洛陽山為佐理五鎮海瀆東鎮沂山東安王南沂州南鎮會稽山永興公在越州中鎮霍山應聖公在晉州西鎮吳山成德公在隴州北醫無閭廣陵公在營州東海廣德王在萊州界南海廣利王在廣州界西海廣潤王在同州界北海廣澤王在洛州界江瀆東源王在益州立春祭淮瀆長源王在唐州立夏祭河瀆西靈源王在同州立秋祭濟瀆北青源王在洛州立冬祭漢瀆漢源王在梁州十大洞天記附第一王屋洞小有清虛天周回萬里王褒所理在洛州王屋縣第二委羽洞大有虛明天周回萬里司馬季主所理在武州第三西城洞天玄總真天周回二千里王方平所理在蜀州第四西玄洞三玄極真天廣二千里裴君所理在荆州第五青城洞寶仙九室天廣二千里寧真君所理在蜀州青城縣第六赤城洞上玉清平天廣八百里玉君所理在台州唐興縣第七羅浮洞朱明曜真天廣一千里葛洪所理在博羅縣第八句曲洞金壇單陽天廣百五十里茅君所理在潤州句曲縣第九林屋洞左神幽墟天廣四百里龍威丈人所理在蘇州吳縣第十括蒼洞成德隱真天廣三百里平仲節所理在台州三十六洞天霍童山霍林洞天三千里在福州太山蓬玄洞天一千里在兖州衡山朱陵洞天七百里在衡山縣華山總真洞天三百里在西嶽常山總玄洞天一百里在北嶽嵩山司真洞天三千里在中嶽峨眉山凌虛大妙洞天三百里在峨眉縣廬山洞虛詠真洞天三百里在潯陽縣九天使者四明山丹山赤水洞天一百八十里在餘姚縣劉樊得道會稽山極玄陽明洞天三百里在會稽縣夏禹探書方白山德玄洞天五百里在盩厔縣大上所現壇西山天寶極玄洞天三百里在南昌縣洪崖所居大圉山好生上元洞天三百里在醴陵縣傳天師所居石室仙壇潛山天柱司玄洞天一千三百里在桐城縣九天司命武夷山升真化玄洞天百二十里在