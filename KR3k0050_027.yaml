body:
  text: 圖書編卷二十七明章潢撰西漢厯法漢武帝元封元年大中大夫公孫卿壺遂太史令司馬遷等言厯紀壞廢宜改正下御史御史大夫寬與博士賜等議皆言古帝王創業改制前後不相復所以明受命于天也三統之制後聖復前聖者以二代在前可推明今二代之統絶而不序惟陛下發盛德考宣天地四時之極則順隂陽定明制為萬世法詔卿遂遷與侍郎尊大典星射姓等議姓等奏不能為算願募治算者造密度乃選治厯鄧平及長樂司馬可酒泉候宜君二十餘人方士唐都巴郡洛下閎與焉乃分東西立晷儀下漏刻以追二十八宿相距于四方舉終以定晦朔分至躔離月行弦望乃以前厯大初四千六百一十有七歲至元封七年復得閼逢攝提格之歲仲冬十一月朔旦冬至日月在建星大歲在初得本星度於是都分天部閎運算其法以律為宗曰律容一籥積八十一寸則一日之分也與長相終長九寸八十一分而終復三復而得甲子夫律隂陽九六爻象之所從出也故黃鍾紀元氣之謂律律者法也物莫不取法焉蓋以律轉厯也與鄧平所治同於是觀察星度日月之行以推算如閎平法法一月之日二十九日八十一分日之四十三先籍半日名陽歷先朔月籍生不籍隂厯朔而後月生而以陽厯朝諸侯王郡臣便議上上使校律厯官淳于陵渠覆校之陵渠言大初厯晦朔弦望最密而冬至之夕日月如合璧五星如連珠乃詔鄧平所造八十一分厯罷廢尤疏逺者十七家遂下詔以元封七年為大初元年其後元鳯三年大史丞張夀王言更厯非是詔使者鮮于妄人治厯大丞相麻光等二十餘人雜候日月晦朔弦望八節二十四氣于上林清臺課諸厯疏密十一家盡六年而夀王課最疏逺大初􅔦第一即墨徐萬且長安徐禹治大初厯亦第一蓋自大初起厯盡元鳯六年三十有六歲而是非定至孝成之世劉向總六厯列是非作五紀論子劉歆究其微眇作三統厯及譜之以説春秋步法密要東漢厯法東漢志曰天之動也一晝夜而運過一周星從天而西日違天而東日所行與天運周在天成度在厯成日居以列宿終以四七受以甲乙終于六旬日月相推日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相與為衝分天之中謂望以速及舒光盡體復謂之晦晦朔合離斗建辰移謂之一日月之行則有冬有夏冬夏之間則有春有秋日道發南去極彌逺其景彌長逺長乃極是為冬至日道斂北去極彌近其景彌短近短乃極是為夏至長短之中道齊景正春秋分焉日周于天一寒一暑四時備成萬物畢改攝提遷次青龍移辰謂之歲歲首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀歲朔又復謂之元是故日以實之月以閏之時以分之歲以周之章以明之蔀以部之紀以記之元以原之然後變化萬殊嬴朒無方莫不結繫而稟正焉極建其中道營于外璇衡追日以察發斂光道生焉孔壺為漏浮箭為刻下漏數刻以考中星昏明生焉日有九道月有九行九行出入而交生焉朔會望衝鄰于所交虧薄生焉月有晦朔星有合見月有弦望星有留逆其歸也步術生焉金水承陽先後日下速則先日遲而後留留而後逆逆與日違違而後速速與日競競又先日速遲順逆晨夕生焉日月五緯各有終原而七元生焉見伏有日留行有度而率數生焉參差齊之多少均之會終生焉引而伸之觸而長之探賾素隱鈎深致逺無幽辟潛伏而不以其精者也夫然後隂陽有分寒暑有節天地貞觀日月貞明晉厯晉杜預作春秋長厯有言曰天行不息日月星辰各運其舍皆以其象動者也新故相涉固不容無毫末之差積久而差遂失晦朔則不得不改憲以從之亦其理也易於革繫之曰君子以治厯明時革之言更也言當隨時更革順天以求合而不當為合以驗天唐厯法開元中詔僧一行作新厯蓋自大初至麟德凡二十有三家矣而一行所為厯其倚數立法皆本易大衍而立術以應之蓋以易轉厯也盡七年較經史所書氣朔日行宿度可考者皆合而厯成其本議曰易大傳稱天一地二天三地四天五地六天七地八天九地十天數始于一地數始于二故合二始以位剛柔天數終於九地數終於十故合二終以紀閏餘天數中於五地數中於六故合二中以通律厯天有五音所以司日也地有六律所以司辰也參伍相周究于六十聖人以此見天地之心也自五以降為五行之生數自六以往為五材之成數錯而乘之以生數衍成位一六而退極五十而增極以一六為爻位之統爻始於初成於六五十為大衍之母中五衍母次十衍子成數乘生數其算六百為天中之積生數乘成數其算亦六百為地中之積合千有二百以五十約之則四象周六爻也以二十四約之則大極包四十九用也綜成數約中積皆十五綜生數約中積皆四十兼而為天地之數以五位取之則復得二中之合也蓍數之變九六各一乾坤之象也七八各三六子之象也故爻數通乎六十策數行乎二百四十此大衍之所以為天地之樞如環無端而為律厯之大紀也夫易象微于三四而章于七八卦有二微策有四象故二微之合在始中之際焉蓍一以七備卦以八周故二章之合在中終之際焉中極居五六之間由闔闢之交而在章微之際則人神之極也天地中積千有二百揲之以四為爻率三百以十位乘之而二章之積三千以五材乘八象為二微之積四十兼章微之積則氣朔之分母也以三極參之倍六位除之凡七百六十是謂辰法而齊于伐軌以十位乘之倍大衍除之凡三百有四是謂刻法而齊于德運半氣朔之母千五百二十得天地出符之數因而三之凡四千五百六十當七精返初之會也易始于三微而生一象四象成而後八卦章三變皆剛大陽之象三變皆柔大隂之象一剛二柔少陽之象一柔二剛少隂之象少陽之剛有始有壯有究少隂之柔有始有壯有究兼三才而兩之神明動乎其中故四十有九之象而大業之用周矣數之德圓故紀以三而變於七象之德方故紀之以四而變于八人在天地之中閲盈虛之變則閏餘之扐而虛朔之所虛也以終合通大衍之母虧其地十凡九百四十為通數終合除之得中率四十九餘十九分之九終歲之弦而斗分復初之朔也夫十九分之九盈九而虛十地于中極之際虧十而從天所以逺疑陽之戰也乾盈九隱乎龍戰之中故不見其首坤虛十以道潛龍之氣故不見其成周日之朔分周歲之閏分與一章之弦一蔀之月皆合于九百四十蓋取諸中率也一策之分十九而章法生一揲之分七十六而蔀法生一蔀之日二萬七千七百五十七以通數約之凡二十九日餘四百九十九而日月相及于朔此六爻之紀也以卦當歲以爻當月以策當日凡三十二歲而小終二百八十五小終於是與卦運大終二百八十五之數合則參伍二終之合也策以紀日象以紀月乾坤之策三百六十為日度之準乾坤之用四十九象為月弦之檢日之一度不盈全策月之一弦不盈全用故策餘萬五千九百四十三則十有二中所盈也用差萬七千一百二十四則十有二朔所虛也綜虛盈之數五歲而再閏中節相距皆當三五弦望相距皆當二七升降之應發斂之候皆紀之以策而從日者也表裏之行朓朒之變皆紀之以用而從月者也積算曰演法紀曰法曰通法月氣曰中朔朔實曰揲法歲分曰策實周天曰乾實餘分曰虛分氣策曰三元一元之策則天一遁行也月策回象一象之策則朔弦望相距也五行用事曰發斂候策曰天中卦策曰地中斗卦曰貞悔旬周曰夕數小分母曰象統曰行曰躔其差曰盈縮積盈縮曰先後月行曰離其逶迤訓屈行不中道進退遲速不率其常過中則為速不及中則為遲積遲謂之屈積速謂之伸徒以土圭之法測土深日至之景尺有伍寸謂之地中鄭氏以為日景於地千里而差一寸一謂尺有五寸者南戴日下萬五千里地與星辰四遊升降三萬里之中是以半之得地中焉在今潁川陽城宋元嘉中南征林邑以五月立表望之日在表北景居表南於交州景在表南三寸於林邑九寸一分交州距洛水陸九千里蓋山川回折使然以表考其徑當五千里也今所測交州夏至在表南長三寸三分與元嘉所測略同而使者還言于交望極才髙二十餘度八月海中望老人星下有列星燦然明大者甚衆古所未識乃渾天家以為常不見者也蓋隨所至為見如此大史監南宫説擇河南平地設水準繩樹八尺之表以引度之自滑臺白馬縣夏至之景尺有五寸七分自滑臺表南行百九十八里二百七十九步得浚儀嶽臺晷尺有五寸微強自浚儀又南百六十七里二百八十一步得許州扶溝晷尺四寸四分自扶溝又南百六十里至上蔡武津晷尺三寸六分半大率五百二十六里二百七十步而晷差二寸餘則舊説日千里而差一寸者妄矣今以勾股法校陽城中略夏至尺四寸七分八釐冬至丈二尺七寸一分半定春秋分五尺四寸三分以覆矩斜視出地三十四度十分度之四自滑臺浚儀扶溝諸表視之大率三百五十一里八十步而北極差一度極之逺近既異則黃道晷景固隨之而變矣又以圖經校安南日在天頂北二度四分極髙二十度四分冬至晷七尺九寸四分夏至在表南三寸三分定春秋分二尺九寸三分差陽城十四度三分其徑則五千二十三里矣又南一至於林邑北至於鐡勒之地各差十七度四分則在鐡勒五月日在天頂南二十七度四分極髙二十二度周圓百有四度常見不隱北至晷四尺一寸三分南至晷二丈九尺二寸六分定春秋分晷五尺八寸七分其沒地才十五餘度夕沒亥西晨出丑東校其里數已在回紇之北而骨利幹極南之地猶在其南矣則知常侍王畨本鄭傳萬五千里為勾股斜射法考周徑之率以揆天度徑五萬里者所謂以蠡測海者也不知目視不能及逺逺則微差其差不已遂與術錯譬遊于大湖之中廣袤不盈百里已見日月朝夕出入於湖中及浮大海不知幾千萬里猶見日月朝夕固出入其中也令于朝夕之際俱設重差而望之必將大小同術無以分矣橫既如此縱亦宜然原古人所以步圭影之意將節宣和氣輔相物宜不在于辰次之周徑其所重厯數之意將欲恭授人時欽若乾象不在於渾蓋之是非也而或者各信所傳以術天體謂渾天可任數而測大象可運算而籌是述無稽之法于視聼之所不及君子所當闕而不議者也誠以為蓋天耶則南方之度漸窄果以為渾天耶則北方之極寖髙此又渾蓋家盡智畢説而未有能通其説者也則王仲任葛稚川之徒區區於異同之辨亦何益于人倫之數哉今為覆矩圖南自丹穴北冀幽都每極移一度輒纍其差于以稽日食之多少定晝夜之長短而止則天之晷皆協其數矣唐志曰一行厯專用大衍之策其要在于候天地之時以知四時寒暑而仰察夫日月星辰之運行以相參合而已然四時寒暑無形而運于下天日月星有象而見于上二者常動而不息一有一無出入升降或遲或疾不相為謀其久而不能無差忒者勢使之然也故為厯者其始未嘗不精密其後多疏而不合亦理之然也不合則纍變其法以求之自堯舜三代以來厯未嘗同也唐自大初至麟德歷二十三家與天雖近而未密也至一行密矣其倚數立法固無以易也宋厯宋志曰厯者歲之積歲者月之積月者日之積日者分之積又推餘分置閏以定四時非博學妙思弗能考也夫天體之運星辰之動未始有窮而度以一法是以久則差差則敝而不可用厯之所以數改造也物銖銖而較之至石必差况于無形之數哉元朝厯法元承用金厯歲久寖疏世祖欲釐正之命王恂楊恭慤郭守敬領其事恂等言厯家知厯數而不知厯理願得通天道精厯理大臣如許衡者總之厯宜精於是命衡領大史院而是時守敬于厯象特精諸厯事受成焉當是時守敬言司天莫大於測景古今厯以唐一行所造大衍為稱首則以唐開元間令南宫説行天下測景所歷地最廣也今國家一統疆宇比唐尤廣袤宜遣使者四往測景成一代之制而測驗莫先於儀表今司天儀本宋皇祐中於汴京所造與大都天規環不協比量南北極差四度有竒又表石年深欹側難遵用請别創儀表相比核宜可精於是創簡儀仰儀及諸儀各臻其精妙以為天樞附極而動昔人嘗展管候之宿度餘分終未得其的用二線測餘分纎微可考作候極儀極辰既位天體斯正作渾天儀儀象形似莫適于用作玲瓏儀以表之矩方測天之正圓欲合也實難法當以圓求圜作仰觀儀古有經緯儀相連絡而不動作新儀東西運轉南北低昂而七政列舍中外宫去極度分燦然作立運儀日有中道月有九行用為測驗其致一也作證理儀表髙景虛罔象非真作景符月雖有明測景則難作窺幾厯法之驗在於交會作日月食儀天有赤道輪以當之兩極低昂標以指之作星晷定時儀諸皆創以意為之又作仰規覆矩圖異方渾蓋圖日出入永短圖與諸儀互參驗而彌精其仰儀銘曰不可體形莫天大也無競維人仰釡載也六尺為深廣自倍也兼深廣倍潔釡兌也鑿環為沼準以概也辨方正倍曰子卦也衡縮度中平斜再也斜起南極平釡鐓也小大必周入地畫也始周浸斷浸極外也極入地深四十太也北九十一赤道齘也列刻五十六時配也衡竿加卦巽坤內也以負縮竿本午對也首璇璣板窾納芥也上下懸直與鐓會也視日透光何度在也㿩谷朝賓夕餞昧也寒暑發僉驗進退也薄蝕起自鑒生殺也以避赫曦奪目害也南北之偏亦可槩也極淺十五林邑界也黃道夏髙人所載也夏永冬短猶少差也深五十竒鐵勒塞也黃道浸平冬畫晦也夏則下沒永短最也安渾宣夜昕穹蓋也六天之象言殊話也一儀一揆孰善悖也以指為告無煩喙也暗資以明疑者沛也智者是之膠者怪也古今巧厯不億輩也非讓不為思不建也將窮神巧造化變也其有俊明昭聖代也泰山礪平河如帶也黃金不磨悠久賴也鬼神訶禁謹勿壞也於是設監候官十四人分道行測景東至髙句驪西極滇池南踰朱崖北盡鐡勒凡二十七所而守敬作懸正儀坐正儀令行四方測景者用之仰察躔離近取晷景微入刻秒逺周寰海遍參厯法酌稽中數蓋五年而厯成衡守敬具疏言天體難測古厯家于天往往各有測悟而未備精察今創以新儀木表與舊儀所測較得數歲冬至晷景及日躔所在月離遲速與列舍分度之差自大都校北極出地髙下之度四時晝夜刻之長短參古制立新法非測悟一本其故常考正者七事創法者五端非敢謂能然方之前代全踵故厯增損傅會為法者較然易知誠得每歲測驗修改積三十年庶幾可使如三代日官世專其職驗氣法曰天道運行如環無端治厯者必就隂陽消息之際為之法而始于候景候景之法不過植表測景以究其氣至之始而已知作能述前法略備而植表已短尺寸之下所為分杪太少未易分别表長則分寸稍長而晷景虛淡難得其實人于虛景之半或設望筒或置小表或以木為規皆取表端日光下徹圭面然皆其浮陽之數非足準也今以銅為表髙三丈六尺端挾以二龍舉橫梁一由表端下至圭面為四十尺于古八尺之表一寸引伸之為五即毫釐易分而别創景符取實其制以銅葉博二寸長加博之二中穿十大衍之數也道居一而不用其餘四十有九所用也故蓍之為數兩之以象兩參之以象三四之以象四歸竒象閏十九孟康曰歲有閏分七分滿十九則為閏也師古曰竒音居宜反及所據加之因以再扐兩之劉攽曰兩之得九十八三之得二百九十四四之得一千一百七十六象閏所一據加之為一千一百九十六兩之為二千三百九十二是為月法之實如日法得一則一月之日數也而三辰之會交是以能生吉凶易曰天一地二天三地四天五地六天七地八天九地十天終九地終十并數終為四十有九易窮則變為閏法參天九兩地十為會數參天數二十五兩地數三十為朔望之會以會數乘之周于朔旦冬至為會月孟康曰會月十七章之月數也得朔旦至日與歲復黃鍾初九之數也經于四時雖無事必書時月時所以紀啓閉也月所以紀分至也啓閉者節分至者中也節不必在其月而中必在其正數之月故聖王重閏也以五位乘會數而朔旦得冬至是為章月四分月法以其一乘章月是為中法參閏法為周至以乘月法以減中法而約之則六扐之餘為一月之閏月其餘七分此中月相求之術也朔不得中為閏言隂陽雖交不得中則不生故日法乘閏法是為統歲三統為元歲元歲之閏隂陽災易九厄曰初入元百六陽九次三百七十四隂九孟康曰易傳歲謂陽九之厄百六之會也初入元百六所有厄者則前元之餘氣也若餘分為閏易爻有九六七八百六與三百十四六乘八之政也六八四十八合為四百八十歲次四百八十陽九如淳曰六八四十八為四百八十歲有九年旱次七百二十隂七次七百二十陽七次六百隂五次六百陽五次四百八十隂三次四百八十陽三凡四千六百一十七歲與一元終經歲四千五百六十災歲五十七春秋傳曰閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在不告閏朔棄時正也何以為民日南至極於牽牛之初斗端之綱連貫營室織女之紀指牽牛之初以紀日月故曰星紀起其初日月起其中凡十二次日至其初為節至其中斗建下為十二辰視其建而知其次故制禮上物不過十二天之大數也三統合於一元而三代各據一統三統常合而迭為首登降三統之首周還五行之道也故三五相包而生天統之正始於子半日萌色赤地統受之于丑初日肇化而黃至丑半日牙化而白人統受之於寅初曰蘖成而黑至寅半曰生成而青天施復千子地化自丑畢於辰人生自寅成於申故厯數三統天以甲子地以甲辰人以甲申孟仲季迭用事為統首三微之統既著而五行自青始序亦如之三行與三統相錯傳曰天有三辰地有五行易曰參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象大極運三辰五星于上元運轉三統五行于下而皇極建三德五事于中故三辰之合于三統也日合於天統月合於地統斗合於人統五星之合于五行也水合于辰星火合于熒惑金合于大白木合于歲星土合于鎮星故歷三辰五星相經緯也天以一生水地以二生火天以三生木地以四生金天以五生土一五勝相乘以生小周乘乾坤之策而成大周隂陽比類交錯相成故九六之變登降于六體三微而成象二象十八變而成卦四營成易為七十二參三統兩四時相乘之數也參之得乾之策以陽九九之為六百四十八兩之得坤之策以隂六六之為四百三十二凡一千八百隂陽各一卦之微算策也八之為八千六百四十而八卦小成引而伸之又八之為六萬九千一百二十再之又十三萬八千二百四十為大成五星會終觸類而長之以乘章歲為二百六十二萬六千五百六十而與日月會三會為七百八十七萬九千六百八十而與三統會三統二千三百六十三萬九千四十而復千大極上元九章歲而六之為法大極上元為實如法得一隂一陽各萬一千五百二十當萬物氣體之數天下之能事畢矣郭守敬敘厯法沿革帝王之事莫重於厯自黃帝迎日推策帝堯以閏月定四時成歲舜在璇璣玉衡以齊七政爰及三代厯無定法周秦之間閏餘乖次西漢造三統厯百二十年而後是非始定東漢造四分厯七十餘年而儀式方備又百二十一年劉洪造乾象厯悟月行有遲速及魏黃初間始以日食課其疏密及魏楊偉造景初厯始立交食起虧術又百八十年薑岌造三紀甲子厯始悟以月食術檢日宿度所在又五十七年何承天造元嘉厯始悟以朔望及弦皆定大小餘及以晷影驗氣又六十五年祖沖之造大明厯始悟太陽有歲差之數極星去不動處一度餘又五十二年張子信始悟日月交道有表裏五星有遲疾留逆又三十三年張胄玄造大業厯始立五星入氣加減法及月應食不食術劉焯造皇極厯始悟日行有盈縮及立推黃道月道術又三十五年傅仁均造戊寅元厯頗采舊儀始用定制又四十六年李淳風造麟德厯以古厯章部元首分度不齊始為總法用進朔以避晦晨月見又六十三年一行造大衍厯始以朔有四大三小定九服軌漏交食之異及創立歲星差合術又九十四年徐昂造宣明厯始悟日食有氣刻時三差又七十二年邊岡崇玄厯始立相減相乘法以求黃道月道又六十三年王朴欽天厯始變五星法遲留逆行舒亟有漸又九十八年李宗造明天厯始悟日法積年自然之數又三十六年姚舜輔造紀元厯始悟食甚泛餘差數以上計千一百八十二年厯經七十改其創法者十有三家自是又百七十四年元朝專命郭守敬等改治新厯守敬用創造簡儀髙表憑其測實數所考正者凡七事一曰冬至自丙子年立冬後依每日測到晷景逐曰取對冬至前後日差同者為準得丁丑年冬至在戊戌日夜半後八刻半又定丁丑夏至在庚子日夜半後七十刻又定戊寅冬至在癸卯日夜半後三十三刻己卯冬至在戊申日夜半後五十七刻庚辰冬至在癸丑日夜半後八十一刻各減大明厯十八刻逺近相符前後應準二曰歲餘自大明厯以來凡測影驗氣得冬至時刻真數者有六用以相距各得其時合用歲餘今考驗四年相符仍自宋大明壬寅年距至今日八百一十年每歲合得三百六十五日二十四刻二十五分其二十五分為今厯歲餘合用之數三曰日躔用至元丁丑四月癸酉望月食既推求日躔得冬至躔赤道箕宿十度黃道箕九度有竒仍憑日測到太陽躔度或憑星測月或憑月測日或徑憑星度測日立術推算起自丁丑正月至己卯十二月凡三年共得一百三十四事皆躔於箕與日食相符四曰月離自丁丑以來至今憑每日測到逐時太隂行度推算變從黃道求入轉極遲疾并平行處前後凡十三轉計五十一事內除去不真的外有三十事得大明厯入轉後天又因考驗交食加大明厯三十刻與天道合五曰入交自丁丑五月以來憑每日測到大隂去極度數北疑黃道去極度得月道交於黃道共得八事仍依日食法度推求皆有食分得入交時刻與大明厯所差不多六曰二十八宿距度自漢大初厯以來距度不同互有損益大明厯則於度下餘分附以太半少皆私意牽就未嘗實測其數今新儀皆細刻周天度分每度為三十六分以距線代管窺宿度餘分並依實測不以私意牽就七曰日出入晝夜刻大明厯日出入晝夜刻皆據汴京為準其刻與大都不同今更以本方北極出髙地下黃道出入內外度立術推求每日日出入晝夜刻得夏至極長日出寅正二刻日入戊初二刻晝六十二刻夜三十八刻冬至極短日出辰初二刻日入申正二刻晝三十八刻夜六十二刻永為定式所創法凡五事一曰太陽盈縮用四正定氣立為升降限依立招差求得每日行分初末極差積度比古為密二曰月行遲疾古厯皆用二十八限今以萬分日之八百二十分為一限凡析為三百三十六限依垜疊招差求得轉分進退其遲疾度數逐時不同蓋前所未有三曰黃赤道差舊法以一百一度相減相乘今依算術勾股弧矢方圜斜直所容求到度率積差差與天道實吻合四曰黃赤道內外度據纍年實測內外極度二十三度九十分以圜容方直矢接勾股為法求每日去極與所測相符五曰白道交周舊法黃道變推白道以斜求斜今用立渾比量得月與赤道正交距春秋二正黃赤道正交一十四度六十六分擬以為法推逐月每交二十八宿度分於理為盡國朝厯洪武初召集天下通知律厯名家者赴京議厯法占天象三年立欽天監設官凡玄象圖書非其職不得習其習業者分四科曰天文曰刻漏曰大統厯曰回回厯自五官正而下至天文生各專科肄焉靈臺郎辨日月星辰之躔次分野以占候保章正專志天文之變辨吉凶之占挈壺正知漏孔壺為漏浮箭為刻以考中星昏明之度而統于監正丞博士元統言一代之興必有一代之厯隨時修改以合天道今厯以大統為名而積分猶踵授時之數非所以重時敬正也授時歷法以元至元辛巳為厯元至今洪武甲子積一百又四年以厯法推之得三億七千六百一十九萬九千七百七十五分經云大約七十年而差一度每歲差一分五十抄辛巳至今年逺數盈漸差天度擬合修改矧今又厯一甲子而過其半其年愈逺其數愈多其所差者當益甚也臣愚以為厯者天下之大事所以膺在躬之數承上天之託以敬天道以授人事者端有在于此臣請詔求天下通星厯之學如郭守敬者以任考驗之責明天人之理如許衡者以任講究之方失今不為後愈差舛嘉靖初光祿少卿管監事華湘言自昔聖王承天行極必以治厯明時為先乾坤奠位之後四時七政隨天而運寒暑代謝為歲虧盈互易為月晝夜環轉為日經緯錯列為星辰步算周密為厯數天子燮理隂陽時以作事事以厚生而世從治也時茍不明將晦朔弦望失其節分至啓閉乖其期則無以該洽生靈而世亂矣厯之由來黃帝訖秦末凡六改漢髙祖訖漢末凡五改由魏文帝訖隋末凡十三改由唐髙祖訖周末凡十六改由宋太祖訖宋末凡十八改由金熙宗而訖元末凡三改一厯之改廣集衆見思無遺智法無遺術宜其永久不變然歷代長於厯者不數歲而輒差杜預曰隂陽之運隨動而差差而不已遂與厯錯歐陽修曰事在天下其易差者莫如厯夫所以差者由天周有餘日周不足也天周有餘則天常平運而舒日周不足則日常內轉而縮天日之差于中星驗之焉堯之冬至初昏昴中而日在虛七度虛者北方之宿則日行北陸躔於玄枵之子也今之冬至初昏室中日在箕三度箕者東方之宿則日行東陸躔於析木之寅也計今去堯未四千歲而差五十度矣再以赤道考之勝國至元辛巳改厯冬至赤道歲差一度五十抄今退天三度五十二分五十秒矣黃道歲差九十二分九十八秒今退天三度二十五分七十四秒矣哉洪武中博士元統上言我朝承運以來厯雖以大統為名而積分猶授時之數年逺數盈漸差于度以元辛巳至元統上言時歲在洪武甲子僅一百四十年迄今則二百四十二年授時厯法每歲差一分五十秒約七十年差一度今古差三度餘矣年逾久而數愈盈然則治厯者豈可不隨時修改以求合于天哉夫不隨時修改求合於天則厯必差是以正德戊寅日食庚辰月食時刻分秒起復方位多與欽天監推算不合臣伏揆古今善治厯者三家漢大初以鍾律唐大衍以蓍策元授時以晷景而晷景為近其所因者本也欲正厯而不登臺測景竊以為皆空言臆見非事實已伏望許臣暫住朝參督同中官正周濓及遴選疇人子弟諳曉本業者及冬至前詣觀象臺晝夜推測日記月書至來年冬至以驗二十四氣分至合朔日躔月離黃赤二道昏旦中星七政紫氣月孛羅候計都之度視元辛巳所測差次録聞昔漢固作漢志言治厯有不可不擇者三家專門之裔明經之儒精算之士臣三者無一蚤夜皇皇罔知所措伏乞敕禮部延訪有能知厯理如揚雄精厯數如邵雍智巧天授如僧一行郭守敬者徵赴京師令詳定歲差成一代之制總厯代厯考古厯有六家黃帝顓帝夏殷周魯是也秦用顓帝厯漢初因之或云用殷厯故通鑑編年朔日兩存之也自武帝更造太初厯前歷與天不合迄東漢之末厯凡四改成帝三統厯平帝四分厯因太初二統踈闕靈帝乾象厯晉書志言四分計分大祖而改作此厯乃劉洪蔡雍共為之八代多仍此法自魏至隋厯凡十三改魏文帝有黃初厯韓翊以乾象減斗分大過而更造此校議未定帝崩明帝有景初厯楊鋒造晉武帝有正厯劉智造即景初舊法也以五景疏闕故元帝渡江更以乾象法推五星穆帝有通厯王朔之造元是後秦姚興時羌岌亦從三統厯秦姚興當晉武帝太元九年羌岌造三記甲子元厯專援劉歆三統宋元嘉中何承天造甲子元厯迄宋末相仍用梁武帝改行宋祖沖之甲子元厯其子祖睢奏請行之以何承天厯絶差設也陳氏因之北齊文宣髙氏用宋景業天寶厯妄引元命包言齊受厯之期董峻鄭元偉非之乃上甲寅元厯鄭元偉董峻又上甲寅元厯時又有劉李孫張孟賓同知厯事孟賓受業於張子信與宋景業爭論未定屬國亡西魏入關行李興業正光厯于時宇文周明帝使庾秀彥等造周厯宇文周武帝時甄鸞造天和厯以甲寅為元周天象初馬士顯又上丙寅元厯迄于隋開皇四年用張賓厯隋開皇行張賓厯張賓盛稱髙祖非人臣相自陳代謝之證帝乃下詔頒行寶厯厯本之何承天而劉孝孫劉焯改其失寶方有寵孝孫焯議竟不行十七年後用張胄元厯胄元因言日景長之事帝大恱令與劉暉秀才等相駁難會顔敏上書言太初厯八歲之事帝欲視其事下詔褒美頒行胄元厯胄元與袁充更相引重先是劉焯使胄元進乃更名劉孝孫厯法曰十曜厯主之胄元唐之遂罷焯又增修其書曰皇極歷駮正胄元之短袁充左右胄元共排前厯更不行焯皇極厯厯法見隋志唐厯凡八改髙祖戊寅元厯道士傅仁均所造髙祖麟德甲子元厯李淳風造玄宗開元大衍厯僧一行造以前厯日蝕不驗此下皆因其法肅宗至德厯韓穎益大衍術代宗寶應五記厯以前厯不與天合郭獻之造寫大衍舊法德宗建中正元厯徐承嗣等造因前厯氣朔稽後也又雜麟德大衍術憲宗元和觀象厯穆長慶宣明厯以前厯測驗不合也皆因大衍舊術昭宗景福崇元厯以前厯數差五代初用唐厯并閏國厯凡有八家晉髙帝調元厯馬重鎮因厯上薦符天小厯不復推古上元起唐天寶十四年乙未為主元以正月雨水為氣首行之五年輒差復用崇元厯周有明元厯王處訥私撰又有萬分厯蜀有永昌厯正象厯南唐有齊政周世宗有欽天厯王朴造宋朝一祖十宗厯凡十一改太祖造應天厯後置閏差乃王處訥所造太宗乾元厯王素造後以朔望有差真宗儀天厯厯家造朱帛為之序後以星曜有差仁宗崇天厯厯家造晏殊序並見會要英宗改為明天厯以日蝕差神宗改為奉天厯因日蝕有差哲宗改為觀天厯因冬至差徽宗改為紀元厯以時氣之差髙宗改為紀天厯以定臘有差孝宗造乾道厯以統元日食有差又改淳熙厯曽子固嘗云王處訥見王朴造欽天厯謂之同此厯可見行久則差矣已而果然宋朝命王處訥正之於是有應天厯久之又差苖守信等承詔論定於是嘉元厯淳化至道間王濬鄭安之徒校其疏密曰官韓顯符晦定渾儀之器楊交遂增用甲子之數皆施行焉天之髙也日月星辰之逺也寒燠雨㿩氣數之不齊章蔀紀元餘分之所積以千百年計之有可運之掌上及其久也有非智巧之所能計者此厯久則必差勢所必至也治厯明時之君子因其差之未逺革而正之無難也其或盡更前人之法而更復疏逺其或增損前人之舊而更加詆毁則非矣自昔黃帝以來厯凡五十餘家皆由氣朔纒度或先天或後天微有不應厯象則歷法從而變也夫黃帝始調厯顓帝為厯宗至漢則不能無疏密漢人課之詳矣由漢以來太初厯法為第一三統四分乾象或因革焉而復有疏密之間蓋三統則甚疏而乾象則甚密也乾象之厯為推步之師表韓翊楊偉成遵其舊法而不及深妙翊又復據其術而背其言唐自開元大衍之厯行算數備悉其後雖屢有變更皆不外于一行之數改厯者又從而指其疏謬不特此也北齊文宣恱宋景業讖緯之佞而改行天寶厯隋髙祖喜張賓陳代謝之證而改行開皇厯上之人所以改厯者恱喜諛耳不為敬天愛民而設也劉孝孫厯法甚精輒為劉暉所抑劉焯推占至詳常不為張胄元所容下之人所以造厯者冒寵嗜利初不揆其法之是非也操是心以往其何以議厯為哉是以知天道逺厯法推測不能每事中程其曰日食不效更考日度可也其曰斗分有差更定密率可也其曰五星疏逺更驗星可也其或一事不中程乃盡更前人之法大抵因其實而實其名異其所入之門而同其所歸之極如宋何承天厯法齊用之則為齊厯隋張賓用之則為隋厯也如劉孝孫厯法劉焯更名七曜厯其後又更為皇極厯也一法而異用一厯而數名大抵然也然則自古迄今五十餘厯其立法之異者太初厯本於律大衍厯本於易是也其餘皆襲舊法而增損焉耳諸厯總論太初厯為張夀王所詆清臺課疏密而是非乃定徐禹治太初第一夀王下吏太衍厯為瞿曇撰南宫説所非靈臺校薄而當否始決太衍厯頒行説等伏罪侍御史李麟之等校之也東漢厯元為馮晃馮光所駁熹平校議得失遂分詔從蔡雍議雍等議光晃之罪此厯之方行而迭相詆刺者如是也太初厯是非既定而朱浮以為後天四分儀式既備劉洪以為與天疏闊班固謂三統最密而杜預以為疏一行獨指杜預之謬鄭玄謂乾象窮幽深妙而韓翊指其失此厯行既久而遞相詆刺者又如是也其餘如祖睢之非何承天劉孝孫劉焯之駮張賓王孝通李淳風之譏傳仁均遞遞相非無窮已也要之兩漢之厯太初乾象其最也隋唐之歷皇極太衍其冠也雖更相是非而是非自有定論矣然則太初乾象皇極大衍之厯果能窮盡千萬年之數未及百年咸悉更變何哉杜預之言曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量可得而限纍日為月不得無毫毛之差厯差始於毫毛積而弦望晦朔不得不改憲從之書欽天象易治厯明時言當順天以求合非為合以驗天者也唐志曰四時寒暑無形而運於下日月星辰有象而見於上二者常動而不息一有一無出入升降或遲或速不相為謀其久而不能無差忒者勢使之然也故為厯者其始未嘗不精而其後多疏而不合亦理所當然不合則屢變其法以求之自堯迄于唐此厯所以未嘗同也杜預唐志言異世而一事也是知立推步之法者求之千萬年之上以為上元自謂無毫釐之差行之未十百年而乖違已見蓋數往者無所辨而推來者有所證也一行是非諸厯之得其論甚備而唐志亦稱其立法之密一行之言乃曰乾度盈虛與時消息告譴於經數之表變常於潛遁之中則聖人且猶不質非籌策所能及矣太玄擬卦子雲單思渾天三摹而四分之極於八十一首旁則摹三九據極之七百二十九贊當期之日又為踦嬴二贊以盡餘分之數其用自天元推二晝一夜隂陽數度星日之紀與泰初厯相應其取數似與易異矣其為書則欲自成一家初無意於贊易也考諸解難之文可見矣夫易之六十四卦八卦相錯而成也玄之有方部家則各有分域矣不可相錯也故一而三之自三而九又三之為二十七終於八十一而玄之首畢矣八十一家又離為三以極三玄之數方州部各三之為九又三之為二十七家此一玄之數也以次比之不可相易贊辭自一至九配麗五行而日星節換分布其間皆有成數恐其書特易中之一事與易經不盡相涉也世之治厯者守成法而已非知厯也自漢迄今厯法之更不知其幾人未有不知厯理而能創法也求玄於厯法理之內亦恐未足以盡玄之妙厯象申餘太玄擬卦日星節候卦氣總論連山六十四卦坎離震兊分御四仲以主二十四氣其周流三百六十五度四分度之一以成一歲之功紀以章會統元而有四千六百一十七歲以成一元之易者六十卦之用也蓋閏有大小之餘月有小大之盡日一日躔一度月一日一十三度十九分度之七以月之疾及日之舒是以二十九日五十刻有竒而會朔故一歲之日三百五十有四而餘一十一日四分度之一積其餘而置閏故五歲再閏一十九年為一章而閏分盡又積五百一十三年為一會而日月交會之數盡自天統甲子朔旦冬至無餘分積一千五百三十九年為地統而十一月甲辰朔旦冬至無餘分盡又積一千五百三十年為人統而十一月甲申朔旦冬至無餘分又積一千五百三十九年合合前四千六百一十七年復得十一月甲子朔旦冬至無餘分為天統而六甲盡是謂一元之數易之用也實統於斯故自天統起算一爻主十二年九月二十七日一卦主七十六年十一月一十二日二十卦主一千五百三十九年為一統六十卦主四千六百一十七年為一元而易之藴盡矣故一元之易為甲子七十有七而歲少三焉又積二十元得九萬二千三百四十歲為一紀元而六甲之歲亦盡矣元之所以為元虛之所以為虛不能外乎是也特易以一爻尸一度而周天三百六十五度四分度之一以六十卦三百六十爻配之猶餘五日四分度之一以一日為八十分五日四分度之一為四百二十分均之六十卦率一卦得七分而六日得七分之説不可以不知也元以一贊準晝一贊準夜故以三百六十五度四分度之一而兩之得七百三十有一為一元之贊數以三贊為一表三表為一家三家為一部三部為一州而州管九家二十七章為一會得日月交會之數三州為一方而方管二十七家八十一章為一統而得朔分盡之數三方為一元管八十一家二百四十三章而得六甲盡之數與易之數如合契矣然元一家九贊積八十一家七百二十九贊爾故有踦嬴之二贊以其家外有二贊而均其數于一元之間故每贊主六年三月二十有六日一家主五十六年十月二十四日一部主一百七十年八月一十二日一州主五百一十二年一月六日一方主一千五百三十六年三月一十八日八十一家主四千六百八年十月二十四日加踦贊六年三月二十六日又加嬴贊一年九月一十日而四千六百一十七年之數無遺策矣虛有五十二圖圖有七變元餘無變而齊無位五十二圖計三百六十四變加元餘之二數亦當周天之度矣故一變主一十二年七月二十日一圖主八十八年五月二十日五十二圖主四千六百年六月二十日加元之數一十二年七月二十日又加餘之數三年九月二十日通四千六百一十七年為一虛與元之年亦契合矣是知聖賢之作以明天道豈苟然哉聖人作易本以明道其餘緒可以卜筮而已而後之言隂陽者言星歷者言樂律莫不於易求之求之自以為得配之自以為合然則以為聖人之意則非也古之言卦氣者本于何書出于何氏易緯稽覽圖曰卦氣起于中孚坎離震兌各主一方其餘六十卦卦有六爻爻則主一日凡主三百六十日餘有五日每日分為八十分五日分為四百分人四分日之一為二十分是為四百二十分六十卦分之六七四十二卦各得七分每卦得六日七分世儒傳卦氣六日七分之説蓋起於此嗚呼木鐸無聲大易不振至使讖緯之學本巫史之説易道以自神學者不察遂為成説亦可悲夫彼其意蓋見夫子於大衍有謂當期之日於後有謂七日來復故以為説耳此甚不可也夫子曰乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日據此乃言揲蓍之法乾老陽三少之餘得四九三十六策一爻三十六策六爻則三百六十一策坤老隂三多之餘得四六二十四策一爻二十四策六爻則百四十四策合乾坤六爻之策數則為三百六十當期之日是特聖人言乾坤二卦爻之策數如此何嘗為六十四卦之爻論乎何嘗以一爻配一日乎聖人言乾坤二卦之策數易緯乃以六十四卦之爻數配之何耶豈非以二篇之策數有萬一千五百二十不可以相配故捨聖人所言之策數而求聖人不言之爻數也三百八十四爻已踰一期之數矣不相當也於是又以坎離震兌各主一方為方伯以此四卦二十四爻主二十四氣損四卦主四方又不足於期數也於是又有五日分為四百分四分日之一為二十分每卦得六日七分然後足其數吁其亦迂曲僻怪牽強配合甚矣經曰七日來復言復卦自姤初六至此七變而成爻於臨曰消至于八月有凶言一陽方長終為二隂所臨也或言日或言月以隂陽言之耳來復者陽也為陽言故云日消臨者隂也為隂言故云月此乃告人以隂陽消息之義何嘗卦氣七日乃當復乎借曰卦氣以七日當陽何得又云六日七分乎又云坎離震兌不與當日之數何自知之也蓋不過求以足當期之數不得不強説也使一期之數三百八十有四日則必不省四卦當四方矣不知夫子謂當期之日無他特以乾坤策數大率與期數合亦如分而為二以象兩卦一以象三揲之以四以象四時之意矣期三百六十有六日聖人但以三百六十當之者舉其大率相當耳若果以一策配一日則其數不足也且下云二百之策萬有一千五百二十當萬物之數只以萬數當之足其餘又有一千五百二十何以能當其數耶為數氣之説者能強相配合以萬有一千五百二十以足萬物之數然後可以當期之日配卦也不可強於彼而復強於此妄説可知也子雲儒之勤而陋者也凡易之精義奧旨皆所不見而徒模效形象本易緯卦氣之陋説而作太極卦氣始於中孚終於頤太玄亦始於中孚終於養吾不知卦氣必始於中孚者何而子雲乃法之巧中孚卦四陽二隂四陽處乎上下二隂處乎內説者皆曰中孚之象如鳥卵然二隂居中有孚故曰中孚此不知易者之誤説也據中孚信及豚魚聖人曰柔在內而剛得中二隂謂之在內則可謂之剛得中則非觀三與四隂爻皆無誠信可言何孚之有不知聖人名卦曰中孚者謂居中者孚不中者不孚也二五剛中故五曰有孚攣如二則有鶴鳴子和之德主卦之美全在九二以有成於幽隱之間也聖人名中孚之義如此今乃以冬至節氣當之何義此已不可其他以某卦配某節俱非禮也太玄法之乃云信無不在中果易旨乎使子雲而深於易必不作太玄溺星厯而逺於道也學者睹於易道而不究始為卦氣之誤説反以為易與太玄非當期數何以配之可怪矣邵伯溫曰統之於一而散之為元元之數一月為會會之數十二星為運運之數三百六十辰為世世之數四千三百二十則是一元統十二會三百六十運四千三百二十世一世三十年則一十二萬九千六百年一十二萬九千六百年是為一元之數一元在大化之中猶一年也自元之元至辰之元自元之辰至辰之辰而後數窮矣窮則變變則生蓋生生而不窮也經世但著一元之數舉一隅而已引而伸之則窮天地之數可知矣日甲至癸日之數一歲一周月子至亥月之數十二歲十二周也星三百六十隨天而轉日一周歲三百六十周也一日十二辰積一歲之辰則歲四千三百二十辰也自子至巳作息自午至亥作消作息則陽進而隂退作消則隂進而陽退開物於月之寅星之巳七十有六閉物於月之戌星之戊三百一十有五月至巳之終當辰之二千一百六十為陽極隂陽之餘空各六月至亥之終當辰之四千三百二十為隂極隂陽之餘空各六凡二十有四以當易六十四卦三百八十四爻之數焉除四正卦凡六四六二十四三百八十有四去其二十有四則所存者三百六十也四正卦謂乾坤坎離居四方之正位反復不變故謂之四正經世一元之運數舉成數焉消息盈虧之法在其間矣所以藏諸用也唐堯起於月之巳星之癸一百八十辰之二千一百五十七推而上之堯天地之中數也故孔子贊堯曰唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章揚雄亦謂法始乎伏羲而成乎堯蓋自極治之盛莫過乎堯先乎此者有所未至後乎此者有所不及考之歷數稽之天時質之人事若合符節嗚呼盛哉西山蔡氏曰一元之數即一歲之數也一元有十二會三百六十運四千三百二十世猶一歲十二月三百六十日四千三百六十日四千三百二十辰也前六會為息後六會為消即一歲之自子至巳為息自午至亥為消開物於星之七十六猶歲之驚蟄也閉物於三百一十五猶歲之立冬也一元有十二萬九千六百歲一會有十二萬九千六百月一運有十二萬九千六百日一世有十二萬九千六百辰皆自然之數非有所牽合也或曰氣盈於三百六十六朔虛於三百六十六朔虛於三百五十四今經世之數槩以三百六十為率何也曰所以藏諸用也消息盈虛之法在其間矣唐堯始於星之癸一百八十辰之二千一百五十七何也曰以今日天地之運日月五星之行推而上之因以得之也嗟夫皇極一元之運始於日甲月子星甲辰子者豈特厯數之用而已哉一陽初動萬物未生是聖人所以見天地之心又以範圍天地曲成萬物者也非元氣之會聰明過人者其孰與此豈特厯數之用而已哉又曰元會運世之數大而不可見分釐絲毫之數小而不可察所可得而數者即日月星辰而知之一世有三十歲一月有三十日故歲與日之數三十一歲有十二月一日有十二辰故月與辰之數十二自歲月日辰之數推而上之得元會運世之數推而下之得分釐絲毫之數三十與十二反覆相乘為三百六十故元會運世歲月日辰八者之數皆三百六十以三百六十乘三百六十為十二萬九千六百故元有十二萬九千六百歲會有十二萬九千六百日世有十二萬九千六百辰歲有十二萬九千六百分月有十二萬九千六百釐日有十二萬九千六百毫辰有十二萬九千六百絲皆天地自然非假智營力索而天地之運日月之行氣朔之盈虛五星之伏見朓朒屈伸交食淺深之數莫不由此由漢以來以厯數名家者惟大初大衍耳惟太初以四千六百一十七歲為元以八十一為分大衍之厯乃以一百六十三億七千四百五十九萬五千二百為元三千四十為分皆附會合以此求天地之數安得無差一元消長圖總論蓋以本書約之也今詳本書日甲一位為一元該十二萬九千六百年此一元總數也其所以得一元之數者由十二會積之也月子一位為一會該一萬八百年至月亥十二位為十二會該十二萬九千六百年屬上日甲統之也其所以得十二會之數者由三十運積之也星皆一位為一運該三百六十年至三十位為三十運該一萬八百年屬十一月子統之過此屬月丑統之其所以得三十運之數者由十二世積之也辰子一位為一世該三十年至辰亥十二位為十二世該三百六十年屬上星甲統之過此屬星乙統之蓋由世積而為運運積而為會會積而為元即由時積而為日日積而為月月積而為年也邵伯溫所謂一元之數在天地之間猶一年是已然邵子此數何從而知其始何從而知其終耶善乎西山先生之言曰以今日天地之運日月五星之行推而上之因以得之也故曰堯得天地之中數斯言何謂也蓋堯之時日在甲月巳星癸辰申當十二萬九千六百年之半以上為六萬四千八百年之已往以下為六萬四千八百年之方來是以謂中數也堯而後可遽而推矣一元之數即一歲之數一元有十二會三百六十運四千三百二十辰也前六會為息後六會為消即一歲之自子至巳為息自午至亥為消開物於星之七十六猶歲之驚蟄也開物於星之三百一十五猶歲之立冬也一元有十二萬九千六百歲一會有十二萬九千六百月一運有十二萬九千六百日一世有十二萬九千六百辰一日自子至寅為曉自戌至亥為夜由大撓作甲子遡之子天開丑地闢寅人生自開闢至我明萬厯丁丑一千一十五萬五千四百九十五年請修改厯法疏臣惟帝王若天授民釐工熙績則惟厯法實重陶唐氏命羲和厯象而其仲若叔分掌四時持籌而算萬不失一矣有虞氏承之厯七十載間猶然在璣衡而齊七政今者陛下欽崇天道孕唐育虞此亦萬世敬授齊政之會已臣見比者日月之交保章氏所報既而驗之刻漏分秒稍又不相應若是毋乃厯象未明而璣衡之象猶有所闕也臣請修厯法臣見洪武中刻漏博士元統嘗請修改矣嘉靖中欽天監華湘又請修改矣迄今一百餘年而修改未聞何也意者以為非所急耶以為可沿無動耶以為天行微眇未易測耶以為無可使者耶臣謂順時興事厯象是稽推驗不時度數或爽積秒成分積分成度積度成日年逺數多乖舛逾甚意非所以合天前民明昭代盡制垂憲來􅑤也不得謂非所急也臣觀厯代迭興厯法屢改漢四百餘年耳三改厯唐三百餘年耳七改厯宋三百餘年耳十八改厯自漢厯元四十餘厯矣蓋厯之不得不改也因乎歲差晉虞喜謂五十年差一度則五十年當改也何承天謂百年而差則百年當一改也隋劉焯謂七十五年而差則七十五年當一改也唐僧一行謂八十三年而差則八十三年當一改也元郭守敬謂六十六年而差則六十六年當一改也至元辛巳至洪武元統上言時一百四十年至華湘時二百四十餘年今又若干年計以授時厯歲差之法差當三度有竒矣如之河可沿無動耶夫天行數度以日月為驗誠晝夜於觀象臺詳測日景黃道赤道中星等日記月書至來歲冬至以驗二十四氣七十二候日月交會日纒月離之類視元辛巳以來究所錯繆則歲差可定厯元更時分刻刻分秒務極精密頗用回回厯法參計之即細至年秒亦加酌量又何患微渺難測也夫明理達數代不乏人區區勝國猶有許衡王恂郭守敬輩興起其間孰謂熙朝而須借才異代乎今保章五官之屬禆海之內安知無究心天文精通理數如虞喜何承天之儔誠稍窺私習之條廣延訪之令得所謂其人者俾盡觀祕書假以歲月必能有所更定又何患乎無可使者也臣讀易之革曰君子以治歷明時革之為言改也厯不厭改故以革繫治厯焉夫歲漸久差漸多改漸難失今不一修改蓋不易為已臣願陛下繹革象之義憲唐虞之典考歲差之數創一代之法為先朝所未及為使天下知聖天子補偏救弊咸正無缺傳之萬􅑤永永無極臣不勝大願惟聖明留意厯法總論函史曰自孟子以故言性而驗諸千歲之日至曰利為本也蓋主也後代厯本千歲之日至挾莢布算庸考今故失其本矣蓋其鑿也帝典命羲和欽若昊天厯象日月星辰若之言順也敬而明之厯而象之循故主利俾毋失其天常斯大智不鑿哉乃命官曰嵎夷曰南交曰西極幽都亦足明古測候盡四表矣天主日配以月播五行於四時故春寅賓日秋寅餞日冬夏敬致日日南北陸東西行時從改焉故平秩平在為兢兢歲霄日中而立二分永短極而立二至星中以為紀物以為候天行嬴於日而盈朔行縮於日而虛交矣則定之以閏乃參相得而辰從厯常古如一日也故帝典也而厯法本諸此善乎張平子衡推言之也曰夫厯有聖人之德六焉以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占往者尚其源以知來者尚其流大業載之吉凶生焉是以君子務焉咨焉以從事受命而莫之違也夫能貞而明之者其興也勃焉回而敗之者其亡也忽焉巍巍乎若道天地之紀綱帝王之統是以聖人寶焉君子勤之若夫用天因地揆時施教頒諸明堂以為民極者莫大乎月令帝王之大師備矣天下之能事畢矣過此而往羣忌茍禁君子未之或知也圖書編卷二十七
