不可悉使其運轉以下諸使無過所置廢不常故不克列於篇自六品以下率由選曹居官者以五嵗為限夫九寺三監東宫三寺十二衛及京兆河南府是王者之有司各勤所守以奉職焉尚書省舊章立程度以頒之御史臺按格令採姦濫以繩之中書門下立百司之體要察羣吏之能否善績著而必進敗德聞而且貶政有恆而易守事歸本而難失經逺之理舍此奚據泊姦臣廣言利以邀恩多立使以示寵剋下民以厚斂張虛數以獻狀上心蕩而益奢人望怨而成禍使天子有司守其位而無其事愛厚祿而虛其用宇文融首唱其端揚眘矜王鉷繼遵其軌楊國忠終成其亂仲尼云寧有盜臣而無聚斂之臣誠哉是言前車既覆後轍未改求達化本不亦難乎唐官制總論周用蘇綽議倣周禮文建六官唐因其舊立大師大傅大保曰三師太尉司徒司空曰三公然徒空名不設官多以為贈官親王拜者亦惟名銜立尚書門下中書為三省以尚書令侍中中書令為之長共國政析一相而三尚書為都省門下為左省中書為右省其後以太宗嘗為尚書令臣下避不敢當已又以三省隆重中書令侍中亦不以時授而左右僕射遂長尚書省貞觀中上以僕射當洞闢耳目訪賢才為𢎞益令尚書細務悉委於兩丞其寃濫大故當奏白者乃關請僕射及貞觀未常以他官行相事而拜除僕射必加同平章及參機務乃預政而僕射亦徒擁名銜其後李績以兵部尚書同中書門下三品而同三品之名昉焉永淳初郭待舉岑長倩以侍郎同中書門下平章事而平章之銜自此始終唐世不改天寶後天下多難方鎮以同平章事備位示尊重非實秉鈞衡然名實彌紊矣他官司之署曰省曰臺曰寺曰監曰衛曰府各統其屬於三省外以省稱者曰祕書曰殿中曰內寺署在省闥故俱以省名御史臺御史大夫中丞為之二其屬三曰臺院曰殿院曰察院分十道察巡州縣九寺曰太常曰光祿曰衛尉曰宗正曰太僕曰大理曰鴻臚曰司農曰大府皆漢官五監曰國子曰少府曰將作曰軍器曰都水其衛府之制左右衛上將軍凡親勳翊五中郎將府及折衝所𨽻皆制焉京兆三府置牧鳯翔五府各置尹上州州有刺史中下州亦如之畿縣若上中下縣亦各有令丞簿尉以其地為秩差初太宗論周官喟然嘆曰真聖典也不井田不封建不肉刑而能致治者未矣於是省中外官制為七百二十員曰吾以此待天下賢才足矣然是時業已有員外置矣其後又有特置同正員若檢校兼守判知之屬至景龍而官紀大紊開元中天子自撰唐六典判定職次從官為之注頒行之於是三省統會衆務舉持綱維有九寺五監以分理羣司有六軍十六衛以嚴禁禦有詹事府二春坊三寺十率以輔衛儲宫有牧守督護以分臨畿外設官以經之置使以緯之於是百司詳密庶績從理而六部之設迄於今倣焉而議者頗疵其復何也司農少府户部之任也太常宗正禮部之職也廷尉刑也府衛兵也鴻臚光祿禮部之膳部主客也衛尉太僕兵部之駕庫也他將作少府軍器都水四監咸冝𨽻兵工繁復莫省矣宋官秩正一品諸國王左右丞相太傅太保太師少師少傅少保從一品諸將軍左右光祿開府儀同三司郡王國公太子太師太傅太保嗣王樞密使特進正二品金紫光祿大夫知樞密院事參知政事同知樞密院事大尉上柱國從二品太子少師少傅少保柱國銀青光祿大夫簽書樞密院事觀文殿大學士御史大夫六部尚書左右金吾衛左右衛上將軍九州牧殿前都指揮使節度使正三品上護軍觀文殿學士資政保和殿大學士翰林學士承旨翰林學士資政保和殿端明學士樞密直學士龍圖天章寶文顯謨徽猷敷文等閣學士左右散騎常侍權六曹尚書從三品開國侯護軍龍圖天章寶文顯謨徽猷敷文等閣學士正議通奉大夫開封尹尚書列曹侍郎太子賔客詹事正四品祕書監開國縣伯上輕車都尉通議大夫給事中中書舍人太常宗正卿諸衛大將軍殿前副都指揮使承宣使從四品大中大夫輕車都尉權六曹侍郎保和殿及龍圖等閣待制九寺卿國子祭酒少府將作監諸衛將軍正五品開國縣子上騎都尉中大夫馬步軍都指揮副指揮使觀察使從五品駙馬都尉中奉中散大夫太常宗正少卿祕書少監太子左右庶子樞密都承旨殿前馬步軍都虞候防禦使揮日天武神龍衛四廂都指揮使團練使諸州刺史騎都尉正六品朝議奉直大夫集英殿修撰七寺少卿中書門下省檢正諸房公事尚書左右司郎中國子司業軍器監都水使者太子少詹事左右諭德入內內侍者內侍省都知副都知宣慶宣布昭宣使入內內侍省內侍省押班樞密承旨副承旨從六品起居郎侍御史朝請朝散朝奉大夫尚書左右司員外郎右文殿祕閣修撰樞密院檢詳諸房文字開封少尹尚書諸司郎中開封府判官推官少府將作軍器少監靈臺令正七品朝請朝散朝奉郎殿中侍御史左右司諫尚書諸司員外郎侍講直龍圖天章寶文閣開封府司録參軍事樞密院諸房副承旨太子侍讀侍講兩赤縣令從七品承議郎左右正言符寶郎監察御史直顯謨寺閣大常宗正祕書丞大理正著作郎崇政殿説書閣門宣贊舍人正八品奉議郎通直郎七寺丞祕書郎令所刪定官直祕閣著作佐郎國子監丞王宫大小學教授國子博士大理司直評事內常侍京府判官開封府諸曹參軍事京畿縣丞三京赤縣畿縣令中書門下省録事尚書省都事從八品宣教郎宣義郎御史臺檢法官主簿祕書省校書郎正字太常寺奉禮郎大祝閣門祗候從義秉義郎太武律學博士諸州簽判節度觀察防禦團練軍事軍監判官節度掌書記觀察支使京府節度觀察防禦團練軍事推官節鎮上中下州録事參軍事京府諸曹參軍事巡判官京畿縣丞三京赤縣畿縣丞諸州上中下縣令丞承直儒林文林從事從政修職郎兩赤縣主簿尉節度副使行軍司馬諸府諸曹節鎮上州諸事參軍事防禦團練副使太史局承直長正九品諸承事承奉郎律學正國子大字正録京畿縣三京赤縣簿尉諸州别駕長史從九品諸州中下縣主簿諸州上中下縣尉將仕郎承務郎高班黃門內品承節承侍郎迪功郎中下州諸司參軍城塞馬監主簿諸州司士文學助教翰林醫學右宋官秩載在文獻通考如三公三少左右丞相知樞密參知同知簽書俱執政官上資政殿學士曽任執政者班序雜壓並在六曹尚書之上觀文殿大學士至敷文閣待制俱侍從官常閲史如侍中尚書令煥章閣及運使提刑提舉總領經略制置安撫以至巡檢監鎮監務俱未之載故其品秩俱不及詳或沿革不同因事而設兹有所遺耶宋朝舊官制文臣則兼帶階勳即自武騎尉至上柱國十二轉是也武臣則兼帶舊勳階憲銜檢校官四色憲銜自監察御史至御史大夫號為憲銜檢校自國子祭酒至三公亦唐及五代舊制也而宋朝遵之元豐初始命置局詳定官制削去憲銜檢校官留勳十二轉宋官制總論宋初官號名秩皆唐舊三公三師亦獨為親王使相加官其特拜者不預改上於尚書省而太師為異數其三省長官亦不授以同平章事領相職參知政事副焉而中書門下尚書省並列於外别於禁中置中書政事堂與樞密院為兩府蓋析一相而為二樞密掌兵天下財賦若內府若中外度支悉三司使領之同平章事於漢為丞相參知政事其御史大夫也察院其太尉三司使其計相也蓋官名仍唐而義類依倣於漢者如此其時臺省寺監無定員無專職出入分蒞而即所蒞為職司以課職而考功百司庶府皆得以其職自達中書樞密院為奏覆畫一下而行之體統正事權一官司相承無損於治然是時三省六曹二十四司互以他官典領其正官特以寓祿秩位著非别敇不治本司事事之所寄十無二三惟內侍省閣門省四方館略有職掌它無所典署故以登臺閣任禁從為榮以差遣要劇為貴而階勳爵邑無能重輕名實泥貿甚矣神宗覽唐六典慨然欲酌古今之冝改官制幕以賜羣臣乃置局中書考故實釐定制三省凖唐尚書令侍中中書令亦不授以左右僕射為宰相中書揆議門下審覆而尚書宣行之他諸省臺寺監各還其職司會明堂禮成詔以新制遷敘尚書新省成上親臨幸召六曹長二而下詢職事申敕而異時試攝判知差遣之弊廓然矣然其時參政確以王圭首相妨己欲傾之建白以左僕射兼門下侍郎行侍中之職右僕射兼中書侍郎行中書令之職於是本六典中書造命之説已得以次相管機務承旨奏事而左僕射以門下不得與實擯圭而奪之權其內降制敕及中外復逆本三省定奪取旨下已稱尚書駁審徒虛文而行遣顧壅閼元祐中司馬吕相繼柄國乃請令三省復合班奏事明同心共政之義其後蔡京當國更開封守臣為尹牧府分六曹縣六案修六尚局建三衙郎又更兩省長官為輔弼而易左右僕射以太宰少宰名官諸皆釐正然而亂政亟行晚罷政復令其黨建白古太師太傅太保為三公令乃稱三師司徒司空周六卿太尉秦主兵之官今覆為三公非制也冝復古三公為真相三孤少師少傅少保為次相蓋一復周官之舊而京乃復以太師三日一至都堂治事復柄國毒痡於天下乃其時鄆王肅王以皇子童貫以中人皆得官師傅諸嬖幸走馬承授得擁使節方士黃冠畢玷清班則壞弊極矣建炎初復國初同平章事參知政事之舊乾道初更為左右相而建設非人亦將如官何哉嗚呼不得於道揆法守之意而取必於建置其效已可覩矣按以宰相而兼他官本非令典唐制所謂反輕宰相之體是也然時方用兵則兼節度使崇儒學則為大學士急財用則為鹽鐵轉運使蓋以國家方重其事而以宰相提綱則下不敢以泛泛之司存視之猶有説也至於三省則俱為政本之地無所不統長官則宰相所謂中書門下同平章事是也佐官則參知政事是也元豐改官制既以中書門下同平章事為左右僕射參知政事為中書門下侍郎尚書左右丞矣而復以左僕射兼門下侍郎右僕射兼中書侍郎則是既自有佐官而復出長官兼之贅龐甚矣節度使在唐為閫帥觀察團練使在唐為監司防禦使在唐為邊將刺史在唐為郡守至宋則閫帥監司邊將郡守各别有以名其官而節度承宣觀察團練防禦刺史則俱無職任特以為武臣遷轉之次州之名起於虞十有二州後世刺史之所治是也郡之名起於秦三十六郡後世太守之所治是也隋廢郡以州統縣然郡卒不可廢也至唐而復之然唐太守俱稱刺史使持節蓋所治者太守之事而所稱則州牧之官矣故所謂治中别駕之屬其在歷代本州之佐官也唐郡守稱刺史而遂以治中别駕為郡官屬矣然唐州牧之官為節度觀察諸使而其屬官則有推官判官書記支使之屬至宋而節度觀察特為貴官之虛名初不預方嶽之事而州牧之任則自有閫帥漕憲等官而各臺又自有掾屬若唐莭度觀察之屬官則反為列郡之元僚蓋雖冒以節度推官觀察推官判官書記支使等名而實則郡僚耳唐宋官制總述嘗考之唐宋建官名乖職冗太師太傅太保謂之三師太尉司徒司空謂之三公中書門下尚書謂之三省御史大夫中書門下謂之三司左右散騎常侍分屬門下中書規諷獻納謂之八貂左屬門下則左貂右屬中書則右貂宰相帶平章事自唐優李靖始平章軍國重事自宋禮王旦始留守典宫鑰之嚴節度當方維之重觀察任激揚之等轉運專漕計之司其元帥副元帥宣慰宣撫安撫招討諸使制閫臨邊不恆置焉六曹等監小異而大同也侍從臺諫名殊而實一也兩朝沿革其大都不過如此矣然宋之冗比唐尤甚三省平章職皆宰相而中書與樞密又稱兩府分主兵民一制誥也而學士而舍人並稱兩制學士掌內制舍人掌外制一祕書也而三館昭文館集賢院史館而祕閣而祕書省一御史也而侍御而殿中而監察侍御史稱臺院殿中侍御史稱殿院監察御史稱察院號曰三院而裏行監察御史裏行即今之試御史以檢校官兼中書令侍中同平章事官階極品並謂使相不以使相與曹斌者此也以節度使同平章事任尊將相亦謂使相寇凖使相判河南者此也其掌國計有三司使此三司謂鹽鐡使户部度支也置使領之號三司使掌殿庭宣答有宣徽南北二院使掌祖宗宸翰有龍圖諸閣之官直祕殿有觀文端明諸殿大學士其判府知州以宰執侍從其監司有轉運提舉提刑諸名宋制然也洪惟聖祖倣周監漢不置宰相三公論道六卿分職糾之以都察院達之以通政司參之以大理寺列以寺監錯以百司文事悉歸翰苑耳目專任臺諫體統專而名實得矣若殿閣大學士論思密勿官止五品修撰編修皆得入閣地之峻而秩之卑者慮誠逺也其後閣下多由尚書例加公孤禮絶任崇無異宰相而天下亦以相稱之此最失祖宗之意者今制然也歷代官職總論古者因事設官隨能授職無清濁之殊無內外之别無文武之異何也唐虞之際禹宅揆契掌教臯陶明刑伯夷典禮羲和掌厯夔典樂益作虞垂為共工蓋精而論道經邦粗而飭財辨器其位皆公卿也其人皆聖賢也後之居位臨民者則自詭以清高而下視曲藝多能之流其執技事上者則自安於鄙俗而難語以輔世長民之學於是審音治厯醫祝之流特設其官以處之謂之雜流擯不得與縉紳位而官之清濁始分矣昔在成周設官分職綴衣趣馬俱籲俊之流宫伯內宰盡興賢之侣逮夫漢代此意猶存故以儒者為侍中以賢士備郎署如周昌袁盎汲黯孔安國之徒得以出入宫禁陪侍宴私陳誼格非拾遺補過其才能卓異者至為公卿將相為國家任大事霍光張安世是也中漢以來此意不明於是非閹豎嬖幸不得以日侍宫庭而賢能縉紳特以之備員表著漢有宫中府中之分唐有南司北司之黨職掌不相為謀品流亦復殊異而宫之內外始分矣古者文以經邦武以撥亂其在大臣則出可以將入可以相其在小臣則簮筆可以待問荷戈可以前驅後世人才日衰不供器使司文墨者不能知戰陳被介胄者不復識簡編於是官人者制為左右兩選而官之文武始分矣至於有侍中給事中之官而未嘗司宫禁之事是名內而實外也有太尉司馬之官而未嘗與兵戎之事是名武而實文也太常有卿佐而未嘗審音樂將作有監二而未嘗諳營繕不過為儒臣飬望之官是名濁而實清也尚書令在漢為司牘小吏而後世則為大臣所不敢當之尊官校尉在漢為兵師要職而後世則為武辨所不齒之冗秩蓋官之名同而古今之崇卑懸絶如此參稽互考曲暢旁通而因革之故可以類推矣歷代官制變革周典六官其來尚矣唐虞水土事殷故伯禹以司空居冡宰之任垂益以工虞分司空之職是時兵刑雖設民用不犯於是司馬司寇臯陶兼掌之而有餘禮樂教化務所當先於是司徒宗伯契夷夔分典而不足棄后稷龍納言十有二牧食哉惟時凡以為民也三代相承率由斯道秦人不師古始輕變官制未害也特罷侯置守尊君抑臣燔燒詩書以愚黔首其意惟知自奉而不知有臣民也雖然周之官制非至秦而始變也蘇秦為國相許歷為國尉孫龎仕魏為將軍而須賈亦為魏中大夫吳起守西河馮亭守上黨西門豹令鄴荀卿令蘭陵是則守令將相之名在戰國則已然特至秦而始定耳夫是制既定於秦而漢人復因秦舊自魏晉迄於隋唐又復因先漢之名而升降之如秦漢侍衛之士謂之侍郎而近世居從槖之尊秦漢出入禁闥謂之侍中而近世為三省之長秦漢僕射之職甚卑而近世以為宰相之任其升降輕重雖不同苐顧其所任之人與夫所以為民之意如何耳其或煩其制以病民侈其名以尊已文貌有餘而精神不足氣血壅滯而脈絡不貫者皆未免秦皇漢武之餘習也歷代官名沿襲人皆謂唐之官名因乎隋宋朝官名因乎唐曾不知公師保傅太尉將軍自周漢已有之二漢百官表志有侍中備顧問有僕射中常侍黃門侍郎給侍中等皆在禁中似今門下省也有尚書令又有中書謁者令掌選置及奏下文書衆事似今中書尚書省也有尚書僕射佐令奏下衆事似今左右僕射也有尚書六人分為六曹典天下集課事似今六部尚書也內有三公尚書二人與三公文書有吏曹尚書典選舉似今吏部尚書也有常侍曹尚書掌公卿事有二千石曹尚書主郡二千石及水火盜賊似今刑部兵部尚書也有民曹尚書興治功作及監治苑圃似今工部户部尚書也有各曹尚書似今禮部尚書也又有左右丞掌録文書似今尚書左右丞也每曹有侍郎六人似今六部侍郎也有尚書郎中似今六部郎中員外郎也不特此也少府之屬有御史大夫有御史中丞有治書御史有監察御史東宫之屬有庶子有詹事有舍人洗馬議郎九卿則有宗正司農太常光祿太僕衛尉鴻臚大理七監則有都水將作大匠等其餘如太史太祝大醫博士祭酒光祿大夫大中大夫諫議大夫凡此之類皆二漢之官名也唐豈特因隋宋朝豈特因唐也哉夫古今天下雖封建與郡縣不同而其民其事則同故其所以異者封建則事要而官簡郡縣則事煩而官冗也周之官簡矣復以三公兼冡宰以三孤列九卿則其制為益簡民胡得而不安秦漢以來官冗矣既有三公復有三師既有三省復有六曹既有九寺復有七監則其制為益冗民胡得而不病哉隋志云隋尚書八座六部之屬並皆如漢制又如梁武用宋齊舊制有尚書省置令僕六尚書有門下省置侍中給事侍郎有中書省置監令侍郎又有策書祕書省此見隋唐官名皆因秦漢魏晉六朝之舊也歷代官品多寡周官九命漢自中二千石至百石凡十六等後漢自中二千石至斗食凡十三等魏秩次多因漢制更制九品晉宋齊並因之梁因之更制十八班班多為貴陳並因之後魏制九品品各制從凡十八品自四品以下每品分為上下階北齊並因之後周置九命每命分為上下凡十八命隋置九品品各有從自四品以下每品分為上下凡三十階自太師始焉謂之流內流內自此始焉煬帝除上下階惟留正從各九品又置視正二品至九品各有從自行臺尚書令始焉謂之視流內視流內自此始唐自流內以上並因隋制又置視正五品從七品以署薩寶及正祓謂之視流內又置勳品九品自諸衛録事及五省令史始焉謂之流外流外自此始勳品自齊梁即有之圖書編卷八十二
