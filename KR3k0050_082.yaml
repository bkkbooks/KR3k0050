body:
  text: 圖書編卷八十二明章潢撰統論秦漢官職廢置或問周官之制內外庭固一體矣維周如漢其制亦嘗有近於周者乎曰豈惟漢近於周雖秦亦然秦人變古不道無復先王之舊制然至於內外之相屬其事則猶有可言者外之九卿如少府猶得置尚書在內主發文書而掌奏下諸事外之三公如御史大夫猶得置中丞在內受公卿奏事而舉劾案章又外之叁拾六郡如監郡者皆是御史之屬為之猶得以天下之利害徑達於御史大夫而大夫竟達於天子漢興惟監郡之制變為部刺史若夫少府之尚書御史之中丞則一切因秦之舊而不改非因秦也蓋因周也尚書中丞非周制而曰因周何哉秦人雖變周之名而未嘗變周之意漢亦惟存周之意而不暇復周之名以百官公卿表觀之少府屬官自尚書而下有符節大醫大官湯官有東西織室有庖人主長丞有上林十池監以至中書謁者黃門內盾尚方御府永巷內者宦者皆屬於少府又復以司府永巷倉廄祠祀食官宦官分屬於大長秋御史大夫屬官有兩丞一曰中丞在殿中蘭臺掌圖籍祕書權尊勢重與人主親近事下中丞則中丞白之大夫大夫白之丞相是中丞在內丞相御史在外外得以統內也內領侍御史外督部刺史刺史掌奏詔例察州郡治狀黜陟能否以六條問事而奏事復上於中丞是部刺史在外中丞在內內得以統外也要之漢之官制三公九卿雖列職於外而皆有屬在內以周官之遺意求之則丞相猶大宰也御史大夫猶小宰也御史之中丞少府之尚書猶宰夫也少府之下又有大長秋猶內宰也大長秋屬少府少府中丞屬丞相御史是秦與漢之制皆近於周之制也不特此也高帝之世御史大夫周昌常燕見奏事見高帝擁戚姫吕后之世審食其為相監宫中如部中令公卿百官皆因之以奏事武帝之世丞相公孫𢎞亦得數宴見上或時不冠雖非禮貌大臣之意然亦可見其洞然無內外之限矣夫是以閹臣雖寵丞相猶得以檄召而詰責而大長秋中常侍猶參用士人而為之自武帝晚年宴遊內廷不出不復與士大夫接用宦者主中書而典尚書之章奏尚書之官於是乎廢矣既以中書居中而受事又置諸吏居中而舉法故當時奏下諸事自中書遞送兩府自兩府下九卿自九卿下郡國而不由中丞中丞之官於是不得居中制事而內之侍御史外之部刺史併廢矣將軍列侯而下皆得加官而丞相御史獨不加名曰尊之而實疏外之於是丞相御史無復有至內庭者矣末年以霍光為大司馬領尚書事冝若內外合為一也然非丞相職任儼然號稱內朝而併奪丞相御史之權昌邑之廢丞相楊敞不及與議不惟不得至內庭且不復預內庭之事矣夫宦官典中書之任中丞無制事之權三公無加官之號大將軍領內書之職霍光告車千秋所謂令光治內君侯治外內外朝判然如此此漢治之所由以盛衰也宣帝中興復遵漢初之制魏相為御史大夫外則遣丞相掾吏案事郡國而不遣中使內則奉封事而不經尚書去副封而不令壅蔽加給事中而得宴見言事是以霍山方秉樞機相乃訟言其過杜延年居中用事相乃列奏其姦中外之政復合為一然猶未知復中丞之權元帝以來石顯用事丞相之權復去而盡歸於尚書哀平之際又歸外戚紀綱散壞內外不足以相統而西漢遂趨於亡光武懲外戚之用事憤大臣之竊命於是取三公之官以為間職而取尚書中丞專委任之以為臺閣之長以舉法歸中丞而以奏事歸尚書二官雖復用事然疏外庭而親內庭矣舍大臣而近小臣矣置三公而事歸臺閣矣變前世參用士人之制而專任奴僕薰腐之餘矣桓靈之季御史之權盡移於尚書尚書之權又移於宦官尚書宦官合為一黨而宰相疏隔於外御史緘默於內是以太尉揚秉奏侯覽而尚書召秉掾屬詰之曰設官分職各有司存三公統外御史察內當是時也御史豈真得以察內耶事權之失已久小人徒借察內之名以自便耳蓋自古外內之不相屬未有若東漢之甚者也而其源實始於光武極其源而論之則又始於武帝使武帝不改漢初之制以三公九卿在外而以中丞尚書在內內外相屬而關節脈理相應則漢之制周官太宰之制也奈何快意於法度之外使內外事權分裂四出而不專領於大臣其末流遂以若此極也蓋嘗觀之自出納之職不領於大臣而宰夫之官遂去為尚書之任尚書中書迭用事而霍光之權重𢎞恭石顯之事起尚書中書之形成矣自宿衛之親人不領於大臣而宫正宫伯之官遂去為光祿勳之任光祿勳之屬日益親而門下遂為省加官遂為司侍中遂為宰相矣自供奉之近習不領於大臣而膳夫而下掌次而上遂去為少府太常之任逮其極也門下太僕之司又分為殿中省為內諸司使矣以至王府財用之司既非大臣之所與聞則漢鴻都之賣爵唐瓊林大盈之各庫夫誰得而檢之女寵近習之嬖既非大臣之所與聞則母后臨政下令不出房闥國命寄之刑人或冒侯爵之封夫誰得而制之此其源皆起於武帝是以其弊至於不可救其禍反生於殺戮大臣而無顧忌之心事權之不合於一此冝大宰之所拳拳而小宰宰夫之所以佐大宰而兼掌其事也兼則治散則亂合則盛離則衰自三代以下其治亂盛衰之變凡幾見其變而復周官以救之此為治之大原漢仍秦官稍異同相國丞相秦官周六卿即是相秦却又用一個代天子之勞不知繼體之君一代勞便生事端雖其屬置司直秩比二千石然終是其屬太尉秦官金印紫綬祿位與相國埓秦專事戰功所以重太尉漢南北軍制甚稱乃因周禮制內兵法秦這處能悟其妙但兵權須有制豈可位百僚上時謂司馬主天司徒主人司空主土是為三公蓋以司馬為立國命脈前後左右將軍秦官位亦上卿漢特不常置中尉秦官掌徼循京師秩中二千石大率兵衛便隆御史大夫秦官位上卿掌副丞相舉劾按章迄今因之蓋欲以虛隆制太尉秦漢所以治不如古秦改周制始置丞相大尉御史大夫侍中黃門侍郎給事中散騎中常侍郎中令謁者尚書令僕射尚書丞御史監御史奉常衛尉中尉宗正大僕廷尉典客理粟內史太史令少府將作前後左右將軍五官左右中郎將詹事中庶子太子家令率更令衛率郡守丞尉漢初因之文帝改奉常曰太常典客曰太鴻臚廷尉曰大理武帝置五經博士及鹽鐵之官改郎中令曰光祿勳中尉曰執金吾初置十三州郡刺史京兆尹成帝置尚書五人分五曹之事以大司馬及大司空並丞相為三公罷刺史置州牧光武改常侍曹為吏部曹主選舉秦官爵等差秦制爵二十等以賞功勞其十八等自大庶長以下又似官也其帥人皆更率也有功賜則在吏之例自公大夫以上令丞與亢禮言從公大夫以上與令丞亢禮亢當也言高下相當無所卑屈也漢官秩差次二漢並有秦二十等爵然以為功勞之賞非但秩也丞相大尉司徒司空大將軍諸侯王國官不在此目中二千石月給八十斛御史大夫大常光祿勳衛尉大僕廷尉大鴻臚宗正大司農少府執金吾二千石月百二十斛亦曰真二千石太子太傅少傅將作太監太子詹事大長秋典屬國水衛都尉京兆尹左馮翊右扶風司𨽻校尉城門校尉中壘校尉屯騎校尉步兵校尉越騎校尉屯騎校尉長水校尉胡騎校尉射聲校尉虎賁校尉州牧及郡太守比二千石月百斛丞相司置光祿大夫光祿中郎五官左右三將光祿虎賁中郎將光祿中郎將騎都尉西域都謢副校尉駙馬都尉郡尉千石月八十斛丞相長史大司馬長史御史中丞更名御更長史前後左右將軍長史太常丞衛尉丞光祿勳丞太僕丞廷尉左右監大鴻臚丞宗正丞大司農丞少府丞執金吾丞太子衛率萬户以上縣令比千石光祿大中大夫光祿郎中車户騎三將光祿謁者僕射光祿虎賁郎將八百石太子家令比八百石光祿勳諫大夫六百石月七十斛衛尉公車司馬令衛士令旅賁令廷尉左右平太子門大夫太子庶子將作大匠丞太子詹事丞水衡都尉丞京兆尹丞左馮翊丞右扶風丞州刺史郡丞郡長史郡尉丞次萬户以上縣令比六百石月六十斛太常太卜博士光郎議郎中郎光祿謁者掌賔讚受事員西域都護丞司馬候五百石武帝除減萬户縣長四百石月四十五斛自四百石至二百石為長史太子中盾萬户以上縣丞比四百石光祿侍郎三百石月四十斛次減萬户縣長比三百石月三十七斛光祿郎中二百石月三十斛萬户以上縣尉次萬户以上縣尉減萬户縣尉百石自百石已有計食佐史之秩為少吏右漢吏員自佐史至丞相凡十三萬二百八十五人哀帝時官數命數未詳漢魏以降逮於周官研核莫辨今約其本史聊存一代之制後漢官秩差次大傅三公大將軍驃騎大將軍並不在此目中二千石月百八十斛太常光祿勳衛尉太僕廷尉大鴻臚宗正大司農少府執金吾注云比二千石太子太傅河南尹京兆尹左馮翊右扶風二千石月百二十斛度遼將軍大長秋太子少傅將作大匠司𨽻校尉州牧凡州所鹽都為京都置尹郡太守皇子封王國傅相皇子封王國御史大夫及諸卿比二千石月百斛都護將軍大將軍營五部校尉光祿五官中郎將光祿左中郎將光祿右中郎將光祿虎賁中郎將光祿羽林中郎將光祿奉車都尉光祿駙馬都尉光祿騎都尉光祿大夫少府侍中少府中常侍城門校尉北軍屯騎校尉北軍越騎校尉北軍步兵校尉北軍長水校尉北軍射聲校尉每王屬國都尉護都桓校尉護羌校尉皇子封王國中尉千石月八十斛太傅長史太尉長史司徒長史司空長史大將軍長史光祿大中大夫廷尉正右監史少府中常侍少府尚書令少府御史中丞太子家令大長秋中宫僕太子率更令太子僕城門司馬城門平屯司馬北軍屯騎校尉司馬北軍射聲校尉司馬北軍越騎校尉司馬北軍步兵校尉司馬北軍射聲校尉司北軍長水校尉司馬胡騎司馬右扶風京兆每大縣令雒陽縣令皇太子封王國郎中令僕比千石大將軍司馬太常光祿丞光祿謁者僕射衛尉丞衛尉宫掖門司馬大僕丞鴻臚丞宗正丞司農丞少府丞使丐奴中郎將執金吾丞六百石大將軍從事中郎度遼將軍長史度遼將軍司馬太常贊饗太常太史令太常博士祭酒太常大祝令太常太宰令太常太子樂令太常高廟令太常光武廟令太常前帝陵每園令太常先帝陵每陵食官令光祿左右僕射左右陵長光祿羽林左監光祿羽林右監光祿中散大夫光祿諫議大夫光祿議郎光祿常侍謁者公府掾尉衛公車司馬令衛尉南宫衛士令衛尉北軍衛士令御尉左右都侯太僕考公令太僕車府令太僕未央廄令宗正諸公主每主家令宗正諸公主每主主簿僕私府長大司農僕丞大司農大倉令大司農平凖令大司農導官令少府太醫令少府大官令少府守宫令少府給事黃門侍郎少府上林苑令少府小黃門侍郎少府小黃門令少府中黃門冗從僕射少府掖廷令少府永巷令少府衛府令少府祠祀令少府鈞質令少府濯龍盤少府中藏府令少府內謁者令少府尚方令少府尚書僕射少府尚書令少府符節少府治書侍御史少府侍衛史執金吾武庫令大長秋丞大長秋中書謁者令大長秋中官尚書大長秋中官私府令大長秋中官永巷令大長秋中官黃門冗從僕射大長秋虎賁官騎下中宫宦者令太子倉令太子食令太子門大夫太子中庶子將作丞將作左校令將作右校令城門每門候北軍中候州刺史左扶風京兆每次縣令護烏桓校尉擁節長史司馬護羌校尉擁節長史司馬比六百石月六十斛又云五十斛大將軍與軍候光祿五官中郎光祿左右中郎光祿虎賁中郎光祿常侍謁者太子洗馬皇子封王國治書四百石月五十斛又云四十五斛光祿給