body:
  text: 圖書編卷一百十六明章潢撰兵曹總叙周禮大司馬曰夏官何哉夏大也離為火夏屬離離火隂寓於陽而夏至一隂生焉夏隂氣兵隂象也故説卦離為甲胄為戈兵離上九王用出征有嘉折首匪獲其醜無咎象曰王用岀征以正邦也夏官司馬主兵掌邦政統六師佐王大一統之治其取義不亦深乎易師之象曰君子以容民蓄衆寓兵於農伏險於順也萃之象曰君子以除戎器戒不虞制治於未亂保邦於未危也故觀陣於天之積卒則知戎器不可以不除觀象於易師則比閭族黨即五兩卒徒農皆為兵兵皆自賦國家無養兵之費此古司馬法也自井田廢而兵農分司馬穰苴之法興謂兵為詭道惟戰勝攻取竒正倚伏是尚而節制之師亦不可得而見矣漢南北軍尚有將相一體宫府相維之意唐府兵法得兵農合一之規其餘非忘戰則好戰失之均爾惟我朝設兵部尚書即周夏官大司馬卿也侍郎即小司馬也所屬四司武選職方車駕武庫凡天下武職班秩輿地要害馬政戎器皆其所掌内而五府京營諸衛外而都司各衛所皆其所屬是其政皆軍政也董治軍國機務不亦大乎但職専軍政文武權分視司馬論進士之賢者定其官爵禄位大不侔矣況古人操練皆用八陣亦井田遺法自兵不井出陣法亦尚竒不尚正而蓄威耀德之道不復講焉軍民文武徳威竒正判然兩途豈足以盡夏官之義乎是故隂麗乎陽為離為夏兵寓於農為夏官司馬在徳不在險吳起尚能言之今知德君子以為何如坤至順也坎至險也民之順坤也兵之險坎也至順之中至險者寓非徒論其理也觀江河之源泉混混忽𨼆其流至數十百里而其流復出蓋其𨼆而莫之見者水由地中行即所謂洑水也易師卦上坤下坎故孔子大象曰地中有水師君子以容民畜衆夫謂之容民者何畫之井田以定其居食而勤農事焉坤之象也謂之畜衆者何制之軍旅以時其訓練而講武事焉坎之象也方其無事也比閭族黨之中莫非五兩卒徒之衆及其有事也荷執戈之士是即於耜舉趾之農民皆兵也兵即自養也民固不必出粟以養兵兵即農也農即自衛也兵亦不必出身以衛民此法之所以良而井法即兵法也後之言兵法必曰八陣圖孰知中田即中軍私田八家即八陣之遺制耶但兵法猶存於世而井田廢焉是廢其本而存其末矣雖然兵農合一聖人豈有意以為之哉地中有水之象本如是也先王因象以立法孔子因卦以立言自兵農分而立法立言之意盡失之矣欲寓兵於農者盍於此卦觀其象而玩其辭乎師卦陣記附師卦之陣伏羲氏王天下之所作也伏羲仰觀積卒之宿而得五營九軍之數乃以一卦當一星十二星而布十二卦布四坎於中以為貞布八卦於外以為悔環八方坤坎之相涵營在其中矣對待交互其爻六十有四又八坤四坎積爻三十有二拆隂盡之偶其畫亦六十有四陣在其中矣坤者順也靜也坎者險也不可測也或靜或不可測竒正在其中矣一陽居中而用事内外三十二隂皆為所率將在其中矣南為先鋒北為後游東為左翼西為右翼東南為前軍西南為右軍東北為左軍西北為後軍陣在其中矣初爻為殿二爻為中三爻為戎四爻為駐五爻為前六爻為先鋒卒在其中矣内外相維大小相包四面如一觸處為首節制在其中矣故名其卦曰師有陣之象也所謂作易以通神明之徳以類萬物之情蓋如此文王係卦辭重順義而貴選將也周公係爻辭審進退而察動靜也孔子係象傳務養民以得其心也以伏羲之陣兼三聖之辭則師為直將為明兵為和陣為武仁義節制兩者備矣以王天下其孰有不服者哉故曰後世兵書之繁不如師卦之約乃此之謂與按師卦有陣之象如此篇所云誠有然者但又謂伏羲仰觀積卒之宿而得五營九軍之數何歟且謂一卦當一星必布十二卦八坤四坎而後成師之陣又未免以己意附㑹之矣以予觀之即師一卦而陣之象已備何也坤順坎險伏至險於至順陣之義也以卦之象言之隂爻五非五人為伍五旅為師乎陽爻一非大將居中軍無二將乎以一竒統五偶非中軍握竒而運謀帷幄者乎四偶在前分而為八非天地風雲鳥虎龜蛇之八陣乎一偶在後析而為二非遊兵却月之陣乎坤順在前非陣之方而順所以為正乎坎險在後非陣之圓而險所以為竒乎前後皆偶而受乎一竒之節制非首尾之相應乎衆隂對隊而分列兩旁非左右之相翼乎衆偶層疊非縱横翕闢而不可敗乎前衝三陽後衝二隂非大陣包小陣大營包小營乎可見因師之卦而為師之陣即師之象而有師之名皆天地自然之造化聖人無一毫私智雜於其間也自後諸家曰握竒陣曰五行三才陣曰兵農陣曰魚麗陣曰荆尸陣曰崇卒陣曰鷄父陣曰内政陣曰握竒營陣曰乘之陣曰象棋陣曰垓下陣曰八陣曰扁箱車陣曰六花陣曰四門斗底陣曰十二將兵陣曰十二辰陣曰平戎萬全陣曰常陣其名雖殊孰非師卦之推演乎積卒陣記附積卒之象天之陣也在房度西南其星十二㸃布為内外二重外圍以八八營也内握以四中壘也合内外而為九九軍也各三星品連而相統以為左右前後四獸之局向於前者前拒之為鳥陣也向於後者後拒之為蛇陣也向於左者左角之為龍陣也向於右者右角之為虎陣也又外體圓天陣布也内體方地陣布也外四偶各一風雲起四維東西各二大衝居左右也内二縱相對天衝居前後也二横相對地軸貫中央也又外之四位之相間各離二星之廣内四星之相去各離一星之廣陣間容陣隊間容隊也前參連如後參連左參連如右參連以前為後以後為前四面如一觸處為首也合有五營散有八陣數起於五而終於八也以内之四統外之八四竒傳命於八正八正取稟於四竒也其法咸備如此豈非自然之理乎蓋民物有治亂夷夏有盛衰帝王有興替盜賊有熾滅𡨕𡨕之中天所隂制而黙調者蓋用以此其陣至簡而備至約而要至整而固聖人雖智其何能加於此宋史天文志積卒十二星在房西南步天歌屬心五營軍士之象主衛士掃除不祥星小為吉明大揺動則有兵火起一星亡兵少出二星亡兵半出三星亡兵盡出五星守之兵起不測近臣誅彗星守之禁兵大出天子自將風雲犯之青赤為大臣持政欲論兵事周兵制總叙王畿千里近郊五十里逺郊百里為鄉六鄉百里通十為同為百里者十提封九萬井九十萬夫之地除山川城邑之屬三萬六千井地除公田九分之一為五十萬二千夫又以一易再易三易通之三分去一為三十五萬四百夫率三百五十家賦一乗積六鄉為千乗而餘率七家賦兵積六鄉為七萬五千人此六軍之制也六遂及三等侯國皆如鄉之法畿方千里為千里者十如鄉之除為三百五十萬四十夫賦車七乘卒七十五萬人為六軍者十此通畿之師也大司馬逓而征之十年而役一遍凡三家可任者率十有一人則終身無過一再給公上事蓋先王忠厚之至更勞均逸不欲窮民之力也古者畿内之兵不出所以重内也卒有四方之役即用諸侯人耳或遣上公帥主賦亦不過元戎十乘以先啟而行也而調兵諸侯亦各從其方之便高宗伐楚蓋裒荆之旅武王克商實用西土至於征徐以魯追貊以韓於淮夷以江漢畧見於經可考也平王出戍逺以見刺當是時周都洛矣自洛戌申許無乃未甚逺而周人已不堪況後世有勞師萬里者哉春秋之初從王伐鄭遂有蔡人衛人二百四十二年間王人㑹伐屢矣未嘗見師之出唯敗績於姜戎王師自出春秋深譏焉成周兵民之制嘗合周制土田居民之數而得其制兵之税矣夫以王畿千里居民之數計之為田一千六百同每同除山澤邑居溝渠道路等三分之一為六千四百井每井以上中下三等不易一易再易計之一夫耕二夫地實止四家可任者三人至二人計之每井十人故每同二萬五千餘家可任者六萬四千人出車百乗徒萬人每五家而出二人可任者六人而用其一也是千里之地合有四千萬家為車十六萬乗矣然自古稱天子曰萬乗則十六倍而用其一十家用其一人而已又以鄉遂居民之數計之逺郊近郊四面各地方二百里為田六十四同每同二萬五千家合有一百六十萬家矣及觀鄉遂序官之數比鄰之長共三萬人所統止於十五萬家是一家而兼十家每一比長所統五十餘家矣夫丘甸之法兵皆設而不用比閭之法户皆有餘而不籍何也蓋有居民可任之數用以力田治水田獵追胥每同可任者十萬餘人是也有丘甸出車之數每同出車百乗徒萬人是也有簡稽之數茍盡簡閲之則民不勝其疲故如載師之法自十一至於二十而三每五分而稽其一必十餘載而一周其比閭之法則以一家而兼十家所以統轄乎民者必十年而一周推此二法即如今之設里者計一藏九休九而用一其法不得不然也至以調遣言則行者有寒暑鋒鏑之苦居者有離索怨曠之思是豈可發而多用哉故大司馬所統不過六軍為車七百五十乗為徒七萬五千人於千里之内均畨而調遣之其優裕而不迫均徧而不頗類如此故天子出必有六軍君行師從卿行旅從徴發而不至於空虛行役而不以為勞苦居足以守而無虞出足以戰而無敵田足以耕而不乏食老幼廢疾有養而無失所此周制之所以為善也周兵制圖王上公六鄉六遂六軍七萬五千人大國上公三鄉三遂三軍三萬七千五百人次國侯伯二鄉二遂二軍二萬五千人小國子男一鄉一遂一軍一萬二千五百人伍五人伍長公司馬下士一軍伍長二千五百人六軍共一萬五千人兩二十五人兩司馬中士一軍兩司馬五百人六軍共三千人卒百人卒長上士一軍卒長一百二十五人六軍共七百五十人旅五百人旅師下大夫一軍旅師二十五人六軍共一百五十人師二千五百人師帥中大夫一軍師帥五人六軍共三十人軍萬二千五百人軍將卿一軍一人卿六軍共六周兵制考周官大司馬凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士一十五人為兩兩司馬皆中士五人為伍伍皆有長一軍則二府六史胥十人徒百人李氏曰此則六鄉為六軍又按遂人職云稽其人民而授之田野簡其兵器康成謂遂之軍法如六鄉則六遂亦為六軍注疏謂天子六鄉六遂合有十二軍而止六軍何也蓋六鄉為正軍六遂為副倅至於大國之三鄉三遂次國之二鄉二遂小國之一鄉一遂莫不皆然但以王家迭用之則常六軍爾故止言六軍此鄉遂制軍之法小司徒乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒卒者毋過家一人以其餘為羨惟田與追胥竭作凡國之大事致民大故致餘子遂人以歲時稽其人民而授之田野簡其兵器教之稼穡凡治野以下劑致甿陳氏禮書曰古者國有遊倅田有餘夫軍有羨卒皆所以副其正也六鄉以三遂劑致民上地家七人至毋過家七人以其餘為羨則一人為正卒餘可任者皆羨卒也六遂以下劑致民上地可任者家三人中地可任者二家五人而皆以下地二人任之則一人為正卒一人為羨卒其餘不預所以優野人也惟田與追胥竭作鄉遂皆然以田獵禽獸人所同欲追伺盜賦人所同惡故也羨卒亦謂之餘子則餘子自私言之羨卒自公言之故詩曰其軍三單先儒謂公劉始遷於豳無羨卒是也班固漢志殷周以兵定天下矣天下既定戢藏干戈教以文徳而猶立司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有税有賦税以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一疋牛三頭四丘為甸甸六十四井也有戎馬四疋兵車一乗牛十二頭甲士三人卒七十二人干戈備具是謂乗馬之法一同百里提封萬井除山川沈斥城池邑居園圃道路三千六百井定出賦六千四百井戎馬四百疋兵車百乗此卿大夫采地之大者也是謂百乗之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千疋兵車千乗此諸侯之大者也是謂千乗之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬疋兵車萬乗此主戎車馬徒干戈素具春振旅以蒐夏㧞舍以苖秋治兵以獮冬大閲以狩皆於農隙以講武事焉五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧連帥比年簡車卒正三年簡徒羣牧五載簡車徒此先王為國立賦足兵之大畧也薛氏曰一封出車千乗以杜氏法積筭十同千乗當有戎馬四千疋牛一萬二千頭甲士二千人步卒七萬二千人合士卒之數可以為六軍然而大國不過三軍其有六軍者猶天子六鄉六遂迭用之耳記曰大國不過千乗蓋謂諸侯地不過百里車不過千乗以開方之法計之方十里為方一里者百其賦十乗方百里者為方一里者萬其賦千乗然賦雖出千乗而兵不過三軍五百乗而已則五百乗三鄉之所出也千乗闔境之所出也何則鄉萬二千五百家合三郷則三萬七千五百家凡起徒役無過家一人則三軍為三萬七千五百人矣三軍而車五百乗則天子六軍為車千乗矣又曰周制萬二千五百人為軍六軍七萬五千人千里之畿提封萬井定出賦六十四萬一井之田八家耕之總計六十四萬井之田為五百一十二萬家家出一夫為五百一十二萬夫以此夫衆而供萬乗之賦是為七家而賦一兵孫子曰興師十萬日費千金内外騷動怠於道路不得操事者七十萬家蓋言一夫從軍七家奉之此亦見七家賦一兵也自夫率之七家相更已給軍則王畿之内凡七征而役方一遍焉章氏曰司徒之可任者如此其多司馬法之出士徒如彼其少蓋古今之於兵不盡用之小司徒只言其可任者非實數也後世反此晉作州兵乃是盡數調發甚非先王之制其他如魯成作丘甲蘇秦謂齊宣王臨淄之中七萬户不下户三男子而卒以二十萬曹操謂崔琰曰昨案户籍可得三十萬衆故為大州是皆以十數調發惟孔明僅有此意以蜀之大其兵常不過十二萬而所用八萬常留四萬以為更代蜀之强以孔明不盡用之故及蜀之亡常有十萬二千數年之間所折不過二萬耳齊桓公問管仲行伯用師之道仲曰公欲定卒伍修甲兵大國亦將修之而小國設備則難以速得志矣乃作内政而寓軍令焉三分其國為二十一鄉工商之郷六士鄉十五三國起案以為三官臣立三宰工立三族市立三卿澤立三虞山立三衡作内政而寄軍令焉五家為軌軌為之長十軌為里里有司四里為連連有帥十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為郷故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之師帥之公將其一國子帥五鄉焉高子帥五鄉焉三軍故有中軍之鼓有國子之鼓有高子之鼓春以蒐振旅秋以獮治兵是故卒伍整於里軍旅整於郊内教既承令勿遷徙夜戰聲相聞足以不乖畫戰目相視足以相識凡三軍教士三萬人車八百乗蓋如鄉之法五鄙制鄙三十家為邑邑有司十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥十縣為屬屬有大夫五故立五大夫各使治一屬焉立五正各使聴一屬焉是故正之政聴屬牧政聽縣下政聽鄉自邑積至於五屬為四十五屬家率九家得一兵得甲十萬九十家一車得車五千乗可為三軍者四蓋如遂之法以通國之數逓征之率車用六之一士用十之三大畧依周變從輕便正月之朝鄉長復事君親問焉嚴蔽明蔽賢下比之罰其賢者則鄉長進之官長書之公訾相之謂之三選國子高子退而修鄉鄉退而修連連退而修里里退而修軌軌退而修伍退而修家五屬大夫復事擇其寡過者而摘亦嚴蔽賢蔽明下比之罰五屬大夫於是退而修屬屬退而修縣縣退而修鄉鄉退而修卒卒退而修邑邑退而修家政既成以守則固以征則强蘇氏曰予嘗讀周官司馬法得軍旅什五之數其後讀管夷吾書又得管子所以變周之制蓋王者之兵出於不得已而非以求勝敵也故其為法要以不可敗而已至於桓文非决勝無以定霸故其法在必勝繁而曲者所以為不可敗也簡而直者所以為必勝也周之制萬二千五百人而為軍萬之有二千二千之有五百其數竒而不齊是其知其所以為繁且曲也今夫天度三百六十均之十二辰得三十者此其正也五日四分之一者此其竒也使天度而無竒則千載之日雖婦人孺子皆以坐而計唯其竒而不齊是故巧厯有所不能盡也聖人知其然故為之章㑹統元以盡其數以極其變司馬曰五人為伍伍伍為兩萬二千五百人而為軍二百五十十取三焉而為竒其餘七以為正四竒四正而八陣生焉夫以萬二千五百人而均之八陣之中冝其有竒而不齊者是以多為之曲折以盡其數以極其變鉤聨蟠屈各有條理故三代之興治其兵農軍賦皆數千百年而後得志於天下自周之亡秦漢陣法不復三代其後諸葛獨識其遺制以為可用以取天下然相持數歲魏不敢决戰而孔明亦卒無尺寸之功豈八陣者先王所以為不可敗而非以逐利勝者耶若夫管仲之制兵其可謂截然而易曉矣三分其國為三軍五人為軌軌有長十軌為里里有司四里為連連有帥十連為鄉鄉有良人五鄉為師萬人為一軍公將其一高子將其二三軍三萬人如貫繩如畫碁局疎暢通逹雖有智者無所施其巧故其法令簡一而民有餘力以致其死昔者嘗讀左氏春秋以為丘明最好兵法蓋三代之制至於列國猶有存者以區區之鄭而魚麗鵝鸛之陣見於其書及至管仲陣法不少槩見者何哉蓋管仲欲以歲月服天下故變古司馬而為是簡畧速勝之兵是莫得而見其法也其後吳晉爭長於黄池王孫雒教夫差以三萬人壓晉壘而戰陣為行行百為陣行陣皆徹無有隠蔽援桴而鼓之勇怯盡應三軍皆讙晉師大駭卒以得志由此觀之不簡而直不可以决勝深惟後世不達繁簡之宜以取敗北而三代什伍之數與管子所以治齊之兵雖不可盡用而其近於繁而曲者以之固守近於簡而直者以之决戰則庶乎其不可敗而有所必勝矣林氏曰如韋昭之説則是國内無農其六鄉為工商其十五則為兵而已五屬之地則皆農居之四民之外特有所謂士卒則是兵農分矣或曰齊變周制欲速得志於天下則釐國内之民在十五鄉者専使之為士卒亦必有田以授之第不使出租税供他役庶調發雖煩而民亦不怨若其工商之六鄉為農之五屬則皆不以為兵或問宫正掌兵衛宫伯掌宿衛而兵衛宿衛則皆統於太宰何也曰宿衛不統於太宰則内外之勢有所限隔而賢否之人無所决擇事權將分政令將下移而錯出其禍有不可勝言者曰信如是説則九兵皆宿衛也虎賁之虎士何以掌於司馬司𨽻之𨽻何以掌於司寇司寇猶有可諉者曰是掌外朝與京師四夷之兵耳若虎士八百人自六軍之外獨此為王之親兵乃不統於太宰而散於司馬何耶曰司馬亦聴命於太宰耳必散於司馬者内外雖有不可以不相統而彼此之勢則不可以不相持是故兵衛掌於宮正而王親之兵與四夷之兵則掌於虎賁與司𨽻昔者西漢之世以期門羽林等為宫禁之親兵以衛尉掌宫門之屯兵而以城門校尉掌京師十二城門之屯兵及三輔所屬於中尉之兵所謂北軍蓋指環衛王宫在長安之内者言之所謂南軍蓋指十二門及三輔屬中尉之兵在長安之外者言之及武帝増置八校之軍兵以中壘益北軍以長水池陽胡騎益南軍蓋北軍不出長安之外南軍不散在三輔之中入校則包南北軍在其中矣是故周勃安劉氏乃北軍制南軍之效劉屈氂發三輔近縣軍兵及長水宣曲胡騎入長安與太子戰乃南軍制北軍之效宋朝有閤門司皇城司又有殿前司皇城司有親從官數千人入内内侍省都知與副都知同主判之殿前司有馬步軍殿前太尉獨統攝之是故皇城一司於内庭宿衛無不預者而宿直禁衛無所統攝殿前一司雖統攝諸班禁衛而皇城之事亦恝然不相關是漢以南軍北軍相制而宋朝以皇城司殿前司相維持大抵皆祖周人之遺意而其所為不同者漢南北軍雖𨽻於三公而掌於太尉然皆以文屬而政令不行於其間國朝則皆統於樞府周則皆統於冢宰此所以逺過於漢也故嘗因是而考之以為周人宿衛之制其别有五而其所以為宿衛之政令者其用則有四蓋居則有宫中之徒役公卿大夫之士庶子以為環列腹心之衛若宫正宫伯之所掌是也出則有虎士八百人掌先後王而趨以卒伍視朝則在路門之右若虎賁氏之所掌是也奉輿馬督扈從視朝則在路門之左則有太僕以掌之所謂侍御僕從罔匪正人是也執其兵器服以衛王之門外朝在野外則守内列則有司𨽻以掌之所謂使其屬帥四夷之𨽻是也由是言之環列腹心之衛非兵衛在内而不出虎士之衛為重兵之衛王不出亦不行四翟之𨽻則以王之出而環衛諸門侍御僕從之役則以王之出行而飭整騶從此宿衛之别也然環列腹心之衛則為尤重且急是故稽其功緒而紏徳行㑹其什伍而教其道藝所以勸之而使為善掌其紏禁而㑹其行事掌其政令而均其秩序頒其衣裘而時其誅賞所以警之而所為不惡去其淫怠與其竒衺之民所以不使放僻邪侈之失徳以亂宫中之政令宫正均外朝之稍食内宰均内朝之稍食所以養人心之善而保護亷恥之風此宿衛之政令也夫以貴游之子弟授之以八次八舍之職掌以宫中之徒役而錯置於八次八舍之中既勸其為善又禁其為惡既不使之混淆又不使之䘮亷恥若是則凡居王之左右前後備王之顧問應對者孰非直諒多聞之士哉君子學道則愛人小人學道則易使學問日新職業日修而王亦中心無為日見正事而聞正言也其餘凡係於宿衛之兵者則大司馬教之太僕正之司𨽻令之師氏帥之内外相統而彼此相持雖名為兵而不聞有一武夫悍卒放慢詭譎之人得以厠迹於其間者每觀成王之季吕伋掌虎賁之士非有宰臣之命則吕伋不敢以擅發召公雖得以制命非有二諸侯將命以徃則召公亦不敢以専行不惟内外相制而内之夾階而立堂垂執劉鉞而止戈刄者則又無非冠冕士大夫是故春秋之際雖以僭竊之楚而環列之尹太師猶得以掌之是猶有太宰統宫正宫伯之意區區之曹荷戈與殳猶有賢者如候人之詩是徳行道藝猶未有愧於宫正宫伯之所掌也乃若西漢之興雖祖周人之故意而定内外之制然已駁雜而不純矣雖然漢猶古也不惟南北軍𨽻於三公而衛尉光禄勲皆屬於丞相御史光禄勲歲以四科考第即從官凡更直執㦸内謹門禁外充車騎者無非以經明行修者為之故當時諸吕之亂滕公除宫左右執㦸不肯去代王入未央宫謁者執㦸衛端門不得入其後效亦畧可觀矣自武帝使世家富人犯令而入財者皆得補郎而郎選於是始衰自期門羽林佽飛之屬及𨽻於光禄勲以為天子私人而兵衛於是始變自宣帝又發羽林孤兒佽飛射士征西羌而禁衛始紛紛輕出光武以來其制益壊矣京師止置北軍而八校之兵併為五營南軍不復有焉中衛不掌京輔士卒城門不置屯兵郡國罷材官車騎之屯而衛尉不聞更戍之士於是北軍分為宦官所親竇武誅宦官雖召㑹北軍五校士數千人未幾即散降王甫外既不足以制内而内之所存者又未嘗教之使知義焉魏晉而降光禄勲不復居禁中士大夫不復與宫衛直閣帶刀變生肘腋唐興置左右金吾衛將軍掌宫中及京師之廵警烽堠凢翊衛及外府佽飛番上者皆屬焉而文武於是判然兩途徳宗之世權移近習宦官握禁兵而廢立在其手矣及覈魏晉李唐之亂參觀兩漢之盛衰吾然後知周官之制不可廢有宫正宫伯矣不可以無虎賁無司𨽻有宫正宫伯與夫虎賁司𨽻之屬矣又不可以無太宰以兼統之周兵總論按周官小司徒五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍上地家七人可任也者家三人中地家六人可任也者家五人下地家五人可任也者家二人此教練之數也司馬法地方一里為井四井為邑四邑為丘四丘為甸甸六十四井有戎馬四疋兵車一乗牛十二頭甲士三人卒七十二人此調發之數也教練則不厭其多故凡食土之毛者除老弱不任事之外家家使之為兵人人使之知兵故雖至小之國勝兵萬數可指顧而集也調發則不厭其簡甸六十四井乃為五百一十二家而所調者止七十五人是六家調發共出一人也每甸姑通以中地二家五人計之五百一十二家可任者一千二百八十人而所調者止七十五人是十六次調發方及一人也教練必多則人皆習兵革調發必簡則人不疲於征戰此古者用兵制勝之道也後世士農自為士農工商末技自為工商末技凡此四民者平時不識甲兵為何物而所為兵者乃出於四民之外故為兵者甚寡知兵者甚少一有征戰則盡數驅之以當鋒刄無有休息之期甚則以未嘗訓練之民而使之戰是棄民也宋唐以來始専用募兵於是兵與民判然為二途諉曰教養於平時而驅用於一旦然其季世則兵數愈多而驕悍而劣弱為害不淺不惟足以疲國力而反足以促國祚矣周禮治民制兵之法儒先之説曰六鄉七萬五千家六軍七萬五千人居則為比閭族黨州鄉行則為伍兩卒旅師軍是故人服習而政便安上易事而民易使此周人之法所以為善也夫兵不外乎民將不出乎吏此説是矣惜乎知其一而未嘗㑹其全也夫使王之所以守國者止此六軍茍事變紛沓如天子廵狩於方岳敵國交侵姦宄竊發王城要害之並守逺近征討之迭用將何以為備耶蓋鄉遂近郊二百里之地為田六十四同當有一百六十萬餘家以丘甸出車之法計之當為五十餘軍矣茍謂一家出一人而有十二軍之衆則二百里内豈止十五萬家而已乎故以鄉而言約二十五軍遂亦如之此猶後世之京軍以居守為重而不廢弛者也每都鄙各有鄉遂之兵視夫侯國之制而在野則有井邑丘甸出軍之賦此猶後世之畿輔軍各守衛其國都而拱護王畿者也故凡有大故致萬民於王門大䘮用役凢事致野役此惟鄉遂之民有之也大事致民用之軍役旅田役大故致餘子令各守其閭由郷遂至都鄙定法皆然也至於大司馬所握之六軍通王畿千里之内相更休而調遣之每以十分有餘而用其一觀四時教閱之旗物號令必兼州里野家都鄙而並陳之可見矣其在王國則用之以為㑹同軍旅田役䘮紀其出畿外則用之以為廵狩征討此皆公卿大夫各帥其鄉遂都鄙采地之民在後猶更畨上直郡國調遣之兵故鄉遂之征止十一與十二而三用一而休九至丘甸稍縣都則其征十二用一而休四大較天子之役民近數而逺疏故大司馬之用衆近輕而逺重豈有専以六鄉為六軍之理茍比即為伍人人盡用歲歲無更休豈自古制軍之法且六鄉盡用而千里則居然無事何其勞逸不均況六軍每出則天子之近郊壙然無人胡以居守此皆悖理之大者昔人何不察此耶以此觀之則五等之國其三軍二軍一軍皆通於四疆可以類推矣學禮者尚詳之漢南北軍總叙漢之兵制莫詳於京師南北軍之屯雖東西兩京㳂革不常然皆居重馭輕而内外自足以相制兵制之善者也蓋是時兵農未分南北兩軍實調諸民猶古者井田之遺意竊疑南軍以衛宫城而乃調之於郡國北軍以護京城而乃調之於三輔抑何逺近輕重之不倫耶嘗考之司馬子長作三王世家載公戶滿意之言曰古者天子必内有異姓大夫所以正骨肉也外有同姓大夫所以正異族也蓋同姓親也於内為逼故處於外而使之正異族異姓疏也於親為有間故處於内而使之正族屬南北軍調兵之意殆猶是歟郡國去京師為甚逺民情無所適莫而緩急為可恃故以之衛宫城而謂之南軍三輔距京師為甚近民情有閭里墳墓族属之愛而利害必不相棄故以之護京城而謂之北軍其防微杜漸之意深矣按漢軍南北之制雖與成周之兵農合一者異矣然三輔之兵入衛殿門出充車騎固有以一其中外之權聨其渙散之勢且三輔之設拱衛京師緩急相應猶為得體經國者當詳其制云按自古建都者皆於四近之地立為輔郡所以為京師屏翰也漢以京兆左馮翊右扶風為三輔唐以華州同州鳯翔為輔宋初未遑建立至徽宗亦於畿郡立為四輔我朝建國江南於鳯翔屯重兵凡京師軍皆散於江北滁和等處為屯田雖不名輔而儼然有藩屏之意太宗自北平入正大統然而畿甸猶未有輔郡蓋有待也按漢唐都長安宋都汴梁皆去邊地遼逺非若我朝都燕則自以都城為北邊捍蔽北最近而東次之西又次之南為最逺請如漢唐宋故事立為輔郡以宣府為北輔因其舊而加以藩守之軍俾守國之北門其東也以永平為輔以守松亭一帶關隘及扼遼左要害其西也以易州或真定為輔以守紫荆一帶關隘其南則以臨清為輔坐鎮牐河而總扼河南山東之衝又自此而南屯兵於徐州以通兩京之咽喉罷兩直𨽻河南山東上京操備班軍因地屯守以為京師之屏蔽遇京師有事則調發軍士遂室家之願而生息日蕃國家省轉輸之勞而調發易集邊方足備禦之具而關隘有守如此則都城鞏固宗社奠安矣按南軍衛宫城以郡國兵畨上為之則在外而且逺北軍護京城以三輔兵畨上為之則在内而且近此其意何耶蓋三輔在内而近有閭里親戚之愛以之護京師而無心腹之憂郡國在外而逺人無覬幸非常之望以之衛宫城則無肘腋之變亦如師氏帥四𨽻守王門王宫朝在野外則守内列蓋謂是歟古者前朝後市一城之中王宫在南故衛宫之軍以南名之宫城之軍既謂之南京城之軍又謂之北所以别也南京衛尉主之百官表衛尉掌宫門内屯兵師古注漢舊儀云衛尉寺在宫内胡廣云主宫闕之門内衛士於周垣下為區盧以此考之則南軍在宫内按百官表衛尉掌宫門屯衛兵而高后紀言周勃既將北軍然尚有南軍乃令平陽侯告衛尉無納吕産以此知南軍衛尉主之也又按百官表百官志西漢中壘校尉主北軍營壘之事至光武變為北軍中候而西漢之初中尉屬官有中壘令丞尉而中尉所職乃廵徼京師以此知北軍為京城軍而中尉主之此漢初之志也漢武帝増八校改中尉名為執金吾錢曰漢京師惟有南北二軍亦如唐之南北二衙也唐兵志南衙衛尉是北衙禁軍是胡廣謂衛尉廵行於宫掖則金吾徼於宫外相為表裏東漢兵志注而唐李揆亦云漢以南北相制然二軍衛士皆調發郡國材官騎士更畨為之初未始有定在中壘屯騎射聲越騎長水北騎步兵虎賁募知北人事者為北騎知越人事者為越騎皆屬中尉而北軍始有召募之兵復恐中尉之權太重乃於光祿勲增置羽林期門為宿衛而與衛尉同掌軍門而南軍始有長從之兵方漢之初京城兵猶未逺出高帝發中尉卒止軍霸上文帝發中尉材官止軍長安或謂材力調發民間即非南北軍也至武帝則發中尉卒擊南越元鼎元年而京師之兵始從逺調昭宣以來禁旅之列屯如故有警則發雖金城去京師遼絶而羽林孤兒北騎越騎亦從此而遣矣神爵元年西羌反發羽林孤兒南越騎詣金城元帝以太常任千秋將五校擊西羌自是而後益募外兵以從軍而更代之法浸弛昭帝募吏民衛京師宣帝選郡國吏三百名伉徤者從軍至光武一切倚重於京師之兵而郡國都尉省併矣光武省八校作五營時中壘屬北軍中候掌監五營為宿衛兵郡國無都尉惟京師𨽻兵如故又罷天下輕重騎士材官樓船居邊民伍而不知漢初京城之兵亦從郡國而畨上也此後所以有列屯養兵之費歟兩漢内外兵始末按高帝之世南北二軍不出而民兵在郡國有事以羽檄召材官騎士以備軍旅文帝始以銅虎符代檄當時各因其地以中都官號將軍將之事已則罷京師南北軍當武帝更太尉為大司馬大將軍以中尉材官出擊南越恐京師無重兵而生變於是分北軍為八校以中壘領之置七校尉後又取中尉屬官所謂中壘者進為校尉為八校又恐北軍之權大重即中壘故於光禄勲南軍増羽林期門之兵此南北相制之意頗亦稱善然其間漸多更張矣蓋異時南北軍皆郡國畨上自武帝置八校大抵以習知南北人充之知北事者為北騎知越事者為越騎則募兵始此期門羽林皆世家為之則長從始此自是始有養兵之費而兵師之兵制壊矣元狩以後兵革數動民多買復調發之士蓋鮮於是發及謫吏次及謫戍次及七科謫多非曩日𨽻於都尉者充兵而伍符不整則郡國之兵制又壊矣是故昭宣以來其弊日甚發民從軍益少遂募及奔命調及惡少刑徒選及三百石吏而又以羽林佽飛北騎越騎從事則南北從此出矣紛紛無復舊制皆自武帝起之也及光武一起而變之兵制又蕩然矣蓋自其罷都試而外兵不練雖疆塲之間廣屯増戍列營置塢而國有征伐終藉京師之兵由建武迄於漢衰匈奴鮮卑更迭為患或遣將出擊或移兵留屯連年暴露奔命四方而禁旅無復禁衛之職矣至永初安帝間募入錢榖得為羽林虎賁緹綺營士而營衛之選亦衰延熹桓帝間詔減羽林虎賁不任事者半俸而京師之兵又弱矣外之土兵不練而内之衛兵不精一方盜起則羽檄被於三邊至興兖豫之卒擊象林萬里之寇而民始不堪命矣亦何怪交趾女真之兵之叛也逮於永建間桓靈方且令郡舉五人教習戰事射又募為陷陣為積射為義從大抵非召兵良法雖或委任叚熲盡滅諸冦而中平初黄巾遂作所在盜起於是置八都尉黄巾既殄而蕭墻之禍興蓋自中世以後令出房帷政歸臺閣宦戚更領兵權迭相傾奪然中營畏服中人陳竇欲誅宦官北軍不助武等而助宦官遂又滅夷何武袁紹懲其事故欲藉外兵以懲於是内置園校陽尊奄宦外重州牧實召邊將董卓以并州牧將兵閹宦雖除而卓患已成義兵四起郡牧爭政漢遂三分論者乃謂原漢盛衰皆兵之由而光武實為之有由然矣唐府兵總叙唐志言凡天下十道置府六百三十四皆有兵號而關内二百六十有一皆以𨽻諸衛㑹要云折衝府二百八十通計舊府六百三十三陸贄奏議則以為太宗置府八百在關中者五百杜牧原十六衛上畜養戎臣外開折衝果毅府五百七十有四其數不同府多在關中説者以為固本漢置都尉亦此意左右衛皆領六十府諸衛領五十至四十其餘以𨽻東宫十率府而折衝亦𨽻焉太子管軍非古制也唐亦是折衝自教漢都試之日郡縣之官盡㑹唐之府兵雖散在諸道然折衝都尉並遥𨽻於諸衛乃是内任官故官志係之於諸衛之後不與外官同漢都尉不𨽻於衛尉乃是外任官故表係之郡守之後與唐異然而領兵則太守與都尉刺史與折衝同矣唐以逺近分畨皆以一月恐太紛擾漢以一歲更代為善又唐在二千里外者亦不免此法所以壊也吾觀李泌告徳宗曰府兵之制史册不詳於是參稽傳記以類焉蓋府兵之制始於西魏因於周隋而大備於唐二十為兵六十而免而民無常兵之勞三時耕稼一時治武而兵無常聚之患六家而賦一兵是不悉民以為兵也六家而併一兵是不仰給於官也宿衛者一月而更戍兵者三年而代則所以役民者甚簡也置府六百而居關中者三百六十舉天下不敵關中所以明乎輕重之勢兵散於府將歸於朝而無握兵之重所以杜乎禍亂之原若夫器甲則出於民戍兵衣糧則又取辨於民國無養兵之費唯元從禁兵與畨上衛兵或出征者有所給焉至於教戰調發亦有可考者折衝以農隙教戰陣按閲不精則罪至折衝并及刺史此其教戰者也國家有所召發則下符契於郡府參驗乃發此其調發者然也夫府有三等千二百人為上千人為中八百人為下府有折衝都尉左右果毅都尉又有别將長史兵曹校尉旅師等官以其等級相統治則有坊團隊之制居無事時耕於野有事則命以出兵解輙罷其所以纎悉委曲為維持經乆之計者誠三代而下近古之良法也故李泌謂徳宗曰貞觀中北滅突厥延陀西取龜兹盡臣西域滅吐谷渾高宗滅高麗百濟新羅皆府兵也自置府兵未有外叛内侮殺帥自擅者正以經畫得宜而區處之盡善也杜牧作原十六衛亦曰國家始踵隋制開十六衛將軍屬官各守分部夾持禁省自貞觀至於開元百三十年間戎臣兵伍未始逆命此聖人所能柄統輕重制鄣表裏聖算神術也古今以還法術最長其置府立衛乎然不一再傳而弊端己見接於開元其制因以廢墜是豈立法之不善蓋所以守之者非其制也且始者宿衛之士月上而嵗徧至高宗則畨役更代多不以時始者畨上宿衛謂之侍官至武后則悉假姻戚以充役使宿衛之士固亦有亡匿之患矣始者出征多不踰時逺不經歲高宗命劉仁軌鎮洮河而兵始困於久戍始者戰没行陣則官其子孫高宗以後官不紀錄而兵非樂於征戰又州縣調發類不以實壯而富者以財免貧而老弱者不得免而逃焉州縣之兵於是又有逃亡之患矣逮至開元𤣥宗之時衛士不給府兵寡弱是以張説募彍騎以為長從宿衛而畨上之制已廢李林甫募長征兵以息山東之戍而邊戍之制又廢自是而後兵農既分不可復合於是有養兵之費矣至其甚也止受甲天寳以後彍騎之法又稍變廢士失捬循折衝諸府至無兵可交李林甫邊請停上下魚書其後徒有兵額而戎器並廢禄山之變至無兵可以受甲至永泰建中之世其弊尤甚故獨孤及陸敬輿諸人皆言其弊以為竭天下之財以供無用之兵財利匱於兵税法壊於奉軍豈非兵民既分其弊遂至於此歟加以天寳以後人主甘心邊功調發逺戍民益無以為生杜子美所謂一從十五北防河便是四十西營田去時里正與裹頭歸時頭白還戍邊亦可見矣世之説者見府兵後日之弊遂歸咎於太宗立法之不詳蓋亦未深攷焉耳張説不能因時救弊以復貞觀之舊顧乃立茍簡之制以便目前畧不思異時之患遂使古人良法美意因不復見終唐之世根本不固國勢動揺失居重馭輕之意者説亦不得不任責焉其後雖李泌與徳宗議復府兵非不拳拳而終不可復杜牧傷其廢壊慨然作原十六衛以自見意而一代之制竟無有能興起者豈非其源一失後世難以復攷歟識者觀古制之不存後世蓋不無恨於張説也諸史皆不志兵惟歐陽公作新唐史乃志史以唐兵有井田遺意也惜乎不保其徃耳嘗觀太宗起晉陽之甲未免於智數開天府推刄同氣亦未免於詐力天下既定因周齊之制置十六衛將軍内統北門百騎七營屯騎謂之北衙禁軍外統關内天下諸府畨上宿衛者謂之南衙衛兵是則北衙即漢之北軍而南衙即漢之南軍也安得有井田鄉遂之遺意哉蓋後周府兵講閲戰陳皆於農隙身租營調一切蠲除北齊租調之制十八受田二十充兵六十免力役是則周齊之兵皆受田矣唐㳂周齊有口分世業田三衙隊正副各八十畆諸府坊團有王掌督課農桑是則唐兵亦受田矣兵農一致所以得井田之遺意歟井田之制漸壊於春秋戰國故鄉遂變而為技擊鋭士者勢也口分世業既開貿易之門而府兵變為彍騎者亦勢也況北衙禁軍自睿宗平韋氏之亂左右屯營欲避征戍者皆納資以𨽻軍而府兵之家不免雜徭千里畨上宿衛召為侍官安得不逃匿而耗散乎此府兵所以變為彍騎為藩鎮者何如哉太宗務廣地諸邊都䕶諸道經畧大將大總管大都督即藩鎮之漸也自開元而上北衙禁軍諸府衛兵尚可枝梧太平日久至天寳末府兵既壊而彍騎之為禁軍者又復单弱元宗幸蜀從者千人肅宗幸靈武士不滿百自是以來調捕禁衛又皆以宦者主之此所以禁衛弱於上而藩鎮强於下也然則開貿易而馴致府兵之壊務廣地而遂成藩鎮之弊是則太宗之過至於玩太平而不能振起前人之制疑大臣而以宦官主之激成藩方之僣者𤣥宗肅宗不能逃責矣唐府兵圖上府千二百人折衝都尉左果毅都尉右果毅都尉同史一人長中府折衝都尉左果毅都尉右果毅都尉兵曺一人别將一人下府八百人折衝都尉左果毅都尉右果毅都尉校尉一人同坊髙祖置坊主一人羽林軍髙宗龍武軍𤣥宗團三百人校尉神武軍肅宗隊五十人隊正禁軍神䇿軍代宗英武軍代宗火十人火長天威軍順宗神威軍徳宗統軍為折衝都尉别將為果毅都尉三時務農一時講武無事耕耨有事征戰籍藏將府兵散田疇將不握兵兵不冗食唐府兵考太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而闗内二百六十有一皆以𨽻諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衡都尉一人左右果毅都尉各一人長史兵曺别將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長火備六䭾馬凡火具烏布幕鐡馬盂布槽鍤钁鑿碓䇫斧鉗鋸皆一甲牀二鎌二隊具火鑽一胸馬繩一首羈足絆皆三人具弓一矢三十胡禄横刀礪石大􅀢氊㡌裝行縢皆一麥飯九斗米二斗皆自備并其介胄戎具藏於庫有所征行則視其入而出給之其番上宿衡者惟給弓矢横刀而已凡民年二十為兵六十而免其能騎而射者為越騎其餘為歩兵武騎排攢手步射每嵗季冬折衝都尉率五校兵馬之在府者置左右二校尉位相距百步每校為步隊十騎隊一皆巻稍幡展刄旗散立以候角手吹大角一通諸校皆歛人騎為隊二通偃旗稍解幡三通旗舉左右擊鼓二人校之人合譟而進右校擊征隊少却左校進逐至右校立所左校擊鉦少却右校進逐至左校立所右校復擊鉦隊還左校復薄戰皆擊鉦隊各還大角復鳴一通皆巻旛攝矢弛弓匣刄二通旗矟舉隊皆進三通左右校皆引還是日也因縱䕶各入其人其𨽻於衛也左右衛皆領六十府諸衛領五十至四十其餘以𨽻東宫六卒凡發府兵皆下符契州刺史與折衝勘契乃發若全府發則折衝都尉則下皆行不盡則果毅行少則别將行當給馬者予其直市之每足予錢二萬五千刺史折衝果毅嵗閱不任戰事者鬻之以其錢更市不足則一府共足之凡當宿衛者番上兵部以逺近給番五百里為五番千里七番一千五百里八番二千里千番外為十二番皆以月上若簡留直衛者五百里為七番千里八番二千里十番外為十二番亦月上唐書兵制唐有天下二百餘年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎又廢而方鎮之兵盛矣及其末也強臣悍將兵布天下而天子亦自置兵於京師曰禁軍其後天子弱方鎮強而唐遂以滅亡者措置之勢使然也盖府兵之制居無事時耕於野其番上者宿衛京師而已若四方有事則命將以出解輒罷兵散於府將歸於朝故士不失業而將帥無握兵之重所以防微杜漸絶禍亂之原也及府兵法壞而方鎮盛武夫悍將雖無事時據安險專方面既有其土地又有其人民兵甲財賦以布列天下然則方鎮不得不強京師不得不弱夫置兵所以止亂及其弊也適足以為亂又其甚也至困天下以養亂故兵之始重於外也土地民賦非天子有既其盛也號令征伐非其有其末也至無尺土而不能庇其妻子宗族遂以滅亡可不哀哉古之兵皆出於民者也故民附則兵多而勃然以興民叛則兵寡而忽焉以亡自三代以來皆然秦漢始有募兵然猶與民兵參用也唐之中世始盡廢民兵而為募兵夫兵既盡出於召募於是兵與民始為二矣兵與民為二於是兵之多寡不闗於國之盛衰國之存亡不闗於民之叛服募兵之數日多養兵之費日浩而敗亡之形反基於此唐自天寶以來内外皆募兵也外兵則藩鎮擅之内兵則中人擅之其勢不相下而其力足以相制故安史反叛而郭子儀李光弼以節度之兵誅之朱泚僭亂而李晟渾瑊以神䇿之兵誅之及其衰宦官則以内兵而刼制人主方鎮則以外人而擅廣土地及朱温舉兵内向盡夷中人廢神䇿而唐之鼎祚移於内楊行密錢鏐馬殷王建劉仁恭李茂貞之徒以卒伍竊據一方而唐之土宇裂於外而唐遂亡矣中更五代則國擅於將將擅於兵卒伍所推則為人主而國興焉非以得其民也其所廢則為獨夫而國亡焉非以失其民也宋有天下藝祖太宗以兵革削平海内暨再傳則兵愈多而國勢愈弱元昊小醜稱兵搆逆王旅所加動輒敗北卒不免因循茍且置之度外洎女真南牧徴召勤王之師動數十萬然援河北則潰於河北援京城則潰於京城於是中原拱手以授金人而王業偏安於江左建炎紹興之間驕兵潰卒布滿東南聚為大盜攻陷城邑荼毒生靈行都數百里外率為冦賊之淵藪而所謂冦賊者非民怨而叛也皆不能北向禦敵之兵也張韓劉岳之徒以輔佐中興論功行賞視前代衛霍褒鄂曽無少異然䆒其勲庸亦多是削平内冦撫定東南耳一遇女貞非敗則遁縱有小勝不能補過而卒不免用屈己講和之下策以成宴安江左之計及其末也夏貴之於漢口賈似道之於魯港皆以數十萬衆不戰自潰於是賣降効用者非民也皆宋之將也先驅倒戈者亦非民也皆宋之兵也夫兵既不出於民故兵愈多而國愈危民未叛而國已亡唐宋是也噫兵猶手足也國猶身也手足強壯則身存手足枯槁則身廢兵多則國存兵少則國亡未有以兵多而國亡者今唐兵雖多而強悍不為用猶病狂易之人奮拳舉爪自陷其膚自屠其腸以至於殞身也宋兵雖多劣弱而不可用猶病痱癖之人恣其芻豢以養擁腫之四肢脛如腰指如股而病與之俱増至於殞身也然則所以覆其國者乃兵也所以斃其身者乃手足也又古者籍民為兵其法不過因其户田之可賦者賦之年齒之可任者任之民固不容於倖免而亦不可以濫入司馬法曰使智使勇使貪使愚盖言户盡為兵則君子小人賢與不肖俱出其間也自募兵之法行於是擇其願應募者而所謂願應募者非游手無籍之徒則負罪亡命之輩耳良民不為兵也故世之詈人者曰黥卒曰老兵盖言其賤而可羞然則募兵所得者皆不肖之小人也夫兵所以耗國而皆得不肖之小人則國之所存者幸也紀綱尚立威令尚行則猶能驅之以親其上死其長否則敗潰四出反為生民之禍而國祚隨之矣可勝慨哉丘氏濬曰成周之制兵籍於大司徒征行則屬之大司馬凡其有事以起徒役則皆前日之農也士不待遷皆吾民將不改置即吾吏居則聯其家而為比閭族黨出則聯其人以為伍兩卒旅父死而子繼無招致之繁而數不缺自耕而自食無廪給之費而食自飽豈非制兵之得其道歟嘗謂果能行𢎞治初令州縣選取民壯之制亦庶幾成周遺意惜乎行而不終今日惟從事朋合混編雇募頂役也所以猶未合古未盡善歟或曰子何以言今日衛兵之弊極也曰虚名而無實也有損而無益也百害而無一利也何也今總計天下實在衛所官軍之數猶踰九十萬除西北諸邉兵約三十萬為稍得其用其兩京及腹裏六十萬餘徒為贅物而已徒為耗蛀而已非特徒為贅物耗蛀而已而且易為亂階有司給糧稍不如期輒羣起詬譟思欲為變甚至戮辱官史焚掠居民朝廷無如之何惟事姑息而已語云養軍千日用在一朝令國家倉廪大半費於兵不惟無一朝之用而且伏無窮之禍胎焉語曰兵以衛民今有警惟恐折傷官軍顧驅鄉兵募打手以當冦反役民以衛兵焉嗚呼有兵如此不如無之兵而無用曷若已之而議者猶憂軍伍之不充每司府州縣各置清軍官而嵗差御史督之亦弗思甚矣愚謂今每衛縱使清勾填補充滿舊額亦不過徒増贅物徒増耗蠧徒益禍胎事竟何益故愚以為不若罷軍勿清停清軍官勿置勿差而從事選取民壯之制以倣寓兵於農斯為更化善治可久可繼唐府兵之法始一寓之於農史稱其居處教養畜財持事動作休息皆有節目居無事時耕於野其番上者宿衛京師而已若四方有事則命將以出事解輒罷兵散於府將歸於朝故士不失業而將帥無握兵之重所以防微杜漸絶禍亂之萌此唐初之所以盛由寓兵於農也至開元中承平日久府兵法壊張説李林甫始奏募人為長征兵卒啟方鎮跋扈之禍李泌謂其兵不土著又無宗族不自重惜忘身徇利禍亂遂生下陵上替不可救止歐陽修唐史謂置兵所以止亂及其弊也適足以為亂又其甚也至因天下以養亂而遂至於亡焉此唐室後來之禍皆原於輕變府兵之法而兵農為二也蘇軾曰三代之兵不待擇而精盖兵出於農有常數而無常人國有事要以一家而備一正卒民各推其家之壯者以為兵使之足輕險阻而手易器械聰明足以赴旗鼓之節强鋭足以犯死傷之地千乗之衆而人人足以自捍故殺人少而成功多費用省而兵卒強後世兵民既分兵不得復還為民於是始有老弱之卒徒為無益之費而不可使戰由此言之寓兵於農之制誠行則兵可強費可省無將帥專兵之虞無募兵潰亂之禍永世保民之道莫加於此我太祖平一天卞設置衛所分在内外為衛者四百九十有三為守禦所者三百一十有七每衛旗軍以五千六百名為率每所以一千一百餘名為率可謂盛矣然承平日久武備廢弛軍士逃亡故絶者過半甚至十無二三者其存者率多懦弱不堪雖每嵗勅差御史清勾司府州縣皆設官清理然亦徒有其名無益於事今雖逃亡耗缺之餘總計天下實在兵帳猶逾九十四萬而西北邊兵且四十萬然近年夏人深入我并汾䖍劉我畿甸如蹈無人之境諸衛之兵曽不能向敵發一矢交一戰今縱清勾充滿衛伍亦徒耗國儲而何益於勝負之算保障之功也哉語曰養軍千日用在一朝令國家竭帑庾以供軍而實何嘗得一朝之用如此雖有衛猶無衛也雖有軍猶無軍也朱子有曰令朝廷盡力養兵嘗有不足之患自兵農既分之後計其所費却是無日不用兵也觀之今事實然唐兵始末唐兵志曰唐有天下三百年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎彍騎又廢而方鎮之兵盛矣及其末也強臣悍將兵布天下而天子亦自置兵於京師曰禁兵其後天子弱方鎮強而唐遂以亡滅者措置之勢使然也吕東萊曰唐之制兵其所以處内之制何其曲盡處外之制何其疎戾也人以為兵衛之法壞而後有方鎮之兵不知府衛之法成而方鎮之形已具府衛壊於内而方鎮遂成於外内兵不足以捍内患而至於外倚鎮兵其來非一日之積矣盖太宗既分天下為十道而以軍政戍之兵為十道而至使處之總之以都督者此其為方鎮已形之兆特待時而張耳以天下之極邊為天下之重鎮而撫之以都督其品秩與十衛將軍同迺在六尚書之上而與左右僕射為一流所謂五大不在邊者果若是乎天寶之際沿邊置十節度經畧使凡鎮兵四十九萬馬八萬餘匹而安禄山遂以范陽反當是時府兵之法已再壞矣其初壞也張説募兵補之謂之彍騎又其壊也折衝諸府無兵可交李林甫奏停上下魚書但有兵額存耳而六軍宿衛皆市人不復受甲更此二壊掃地無餘於是外兵盛强其反者以鎮兵而討平之者亦以鎮兵居重馭輕之意不復反矣今為唐兵三變之說者曰府兵變而為彍騎則可謂彍騎變而為方鎮特未之考耳總之兵志叙其流東萊究其源両說亦不甚相背復玩當自得之宋兵總叙兵之不出於農久矣然前代尚有府兵之制畨上遞依教習精練至於國用少則費耗宋朝沿近代養兵之法一係名籍非老不休中下一兵衣粮給與嵗約五六十緡則其中可容冗者乎太祖朝得周代之兵中外一十二萬後平全蜀揀其精兵只留一百二十人則鎮南諸國之兵所留者可知矣及乾徳中外之兵却只揀成十萬蓋要人人精銳也太宗盡有天下所添兵士不過三十餘萬真宋當全盛之世添兵至多亦不過五六萬尚慮耗費財用時命减去冗者自慶厯以來添兵數廣軍額天下至一百餘萬不問精勇但要張皇人數欲威四裔則未能致勝欲禦盗賊則未能止奸但費財用竭天下之力神宗嘗謂輔臣曰藝祖養兵止二十萬京師十餘萬諸道十餘萬使京師之兵足以制諸道則無外亂合諸道之兵足以當京師則無内變内外相制無偏重之患觀神宗斯言宋初兵制未嘗不善然其所以至於冗費不可支者蓋盡由於契丹元昊之邊患哉觀孫經緯云兵一而已矣今内外之兵百餘萬而别為三四又離為六七别為三四禁兵也廂兵也民兵也蕃兵也離為六七者謂之兵而不知兵者也給漕輓者皆兵也服工事者皆兵也繕河防者皆兵也典誰河者皆兵也衛陵寢者皆兵也給國馬者皆兵也疲老而坐食者皆兵也前世之兵未有猥多於今者也前世制兵之害未有甚於今日者也吁宋朝兵制亦可以鑒矣按殿前司與侍衛司馬軍歩軍為三衙其實兩司而侍衛司都指揮使外又置馬歩軍都指揮使耳殿前司亦參馬歩軍而總於都指揮使故殿前司都指揮副都虞候侍衛親軍都指揮使副都虞候與馬軍歩軍都指揮使副使虞候兩司三衛合十二員分天下兵而領之此宋家制兵之大要也始唐制有十二衛兵後又有六軍十二衛兵為南衙漢之南軍也六軍為北衙漢之北軍也永年常以大臣一人縂之如崔𦙍判六軍十二衛是也宋自有兩司六軍諸衙漸廢後但有其名則兩司不獨為親軍而已天下之兵柄在焉其權雖重而軍政號令則在樞密院與漢周之間史𢎞肇之徒為之者異矣按宋沿唐重樞密院懲藩鎮之弊而唐末設樞密秖能奪宰相權藩鎮之禍卒不免也低昂之勢相因設樞密以弱藩鎮藩鎮弱而邊備日弛唐之藩鎮兆於武徳置使十道為都督品在尚書上弊源有屬何必肆其中以遙為制方且不豶豕牙而九節度之分封肅宗已成其勢平盧之自立代徳已遂其横樞密其何能為宋並兩府不圖飾武於外徒置副置使置知院置同知置簽書置直學士都承㫖檢討編修奚禦元金之烈本朝武備布列中外其柄權一主於内然掌握在五府調發在本兵二者不相假借侵奪其在諸鎮各練以為本方之用非奉勑不得宣調此其勢執於朝廷實無强幹弱枝之弊宋養兵二十三萬京師諸道各參以半制諸道而當京師神宗之所自誇者孰知偏重之患更復倚於是乎本朝兵不較數各隨其地而永適於用其偏重之權則盡除之是以不必煩於兼互而血脈無不貫通也宋三衙四廂兵制殿前軍指揮使副使都虞侯侍衛馬軍都指揮使副都虞候侍衛步軍都指揮使副使都虞候捧日天武四廂都指揮使龍衛神衛四廂指揮使蓋殿前有捧日天武馬軍有龍衛歩有神衛謂之上四軍各有左廂右廂廂各有三軍殿前有神威宣武驍騎各上下軍又有寧朔驍騎虎翼各三軍馬軍有馬騎武騎歩軍有虎翼左右各三軍宋以仁得天下未始倚兵以為重也然定都陳留四面抗敵其勢亦必資於兵而所聚之兵有三衙四廂或合而為三或分而為三或殿前居侍衛之下或侍衛居殿前之上其故可得而稽也葢侍衛起於後唐殿前起於周之顯徳國家侍衛親軍有都指揮使有副使有都虞候殿前亦然而下於侍衛故雖殿前都指揮亦在侍衛都虞候之下自王超罷職無復任者而侍衛馬軍歩軍遂分為二與殿前號為三行馬歩二軍始居殿前之下矣捧日天武四廂屬之殿司龍衛神衛四廂屬之馬歩二司謂之主四軍謂之八杬梯入則侍衛殿陛出則扈從乗輿凡天下之兵柄皆在焉其任之也重則其待之也亦不輕是故見宰執而聲揖禮也至其後則推横杖矣見両制而聫騎通名至其後則又分道矣至於熈軍待遇之禮繼於二府至於寺監召之而不可得者吁何其重也而祖宗立法又有深意所寓者天下之兵本於樞密有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權彼此相維不得專制宋兵始末宋兵制據両朝國史以為厯真仁英制益完密及觀葉適馬端臨論迺大不然蓋自雍熈端拱皆大宗年號以後契丹横不可制已召募日廣供饋日増而康定慶厯皆仁宗年號間謀國日誤恃兵為國之說大熾不禁遂弱天下以奉百萬之兵及兵不可用則又為之俛首以事契丹而兵顧自安於營伍之中故王安石為神宗講所以銷兵之術知兵之不勝養而不悟籍兵之不必多教諸路保甲至肆伍拾萬陰以代正兵正兵不可代則已化天下之民皆為兵於是虛耗之形見而天下之勢愈弱元祐乃議罷之未㡬保甲復治正兵自若而内外俱耗本末俱弱矣大觀正和中徽宗保甲之數至六七十萬二法皆弊名具實亡軍政大壞士卒不能披甲荷戈平民相挺變為盗賊女真南牧挾兵纔萬餘長驅而至莫有敵者徴召勤王之師動數十萬然援河北則潰於京城於是中原拱手以授金人而王業僅偏安江左建炎紹興之間驕潰卒布滿東南聚為大盗攻陷城邑茶毒生靈卒皆不能北向為禦敵之兵也時張韓劉岳輩輔佐中興足稱名將然䆒其勲庸多是削平内冦撫定東南耳一遇女真非敗則遁縱有小㨗僅足補過卒有免屈已講利之下策以成晏安江左之計及其末也夏貴之於夏口賈似道之於魯港皆以數十萬之衆不戰自潰而賣降效用者皆宋之將先驅倒戈者皆宋之兵也總之中興以前則養兵以自困多兵以自禍中興以後則民愈多而勢愈弱民未叛而國已危其所由來皆以兵不出於民也蓋自召募之法行於是擇其願應募者以為兵而所願應募者非游手無籍之徒則負罪亡命之輩耳大宗以來為已然矣方一再傳紀綱尚立威令尚行猶能驅之以親其上死其長及其末也潰散四出反為生民之禍而國祚隨之矣彼謂宋都大梁無形勢之險而其險以兵者真誤宋也哉厯代兵制總論古者天子六軍諸侯大國三軍次國二軍小國一軍夏而上制度無載不可得而紀也周官以一卿為大司馬掌制軍詰禁又有小司馬軍司馬官皆用大夫又有輿司馬行司馬官皆用士是謂建其正立其二設其考陳其衆以相督攝以相轉承而武官之例備矣凡制軍國中自六尺至六十野自六尺及六十有五皆征之鄉萬有二千五百家家出一人故五人為伍而屬之比長五伍為兩而屬之閭胥四兩為卒而屬之族師五卒為旅而屬之黨長五旅為師而屬之州長五師為軍而屬之命卿是謂五有長兩有司馬卒有長師有帥軍有將焉居守征行以相部曲而帥營之法備矣齊桓公用管夷吾之說制國五家為軌則五人為伍有軌長以帥之十軌為里則五十人為小戎里有司以帥之四里為連則二百人為卒有連長以帥之十連為鄉則二千人為旅有鄉長以帥之五鄉為一師則萬人為軍有五鄉之帥以帥之故有中軍之軍髙子之軍國子之軍馬蒐苖獮狩畧本周治亦大國三軍之制也戰國以前軍士在於閭里有事馬而簡稽有時焉而教習於功暇日農作而居家未有留屯坐食畨上長征之法是以其所處軍置吏之名一随於鄉黨惟出師行營則以部隊禆校之號一切為殊漢以後大改三代之軍始有州郡教大京都校卒而掌興衆不任鄉黨之吏矣初詔郡國選有材力之民籍為材官騎士使守尉令丞典領課試以備征討京師則有虎賁羽林之士多者千人就選材髙者選為將監而屬光禄又有南宫北宫衛士有令丞一人掌之左右劔㦸士有都候丞一人掌之屬在衛尉又有越騎屯騎歩兵長水射聲五校士各七百人設置員吏稍尊有司馬稍尊有校尉而屬在北軍中候皆閒時宿衛有征則行自髙帝至建安雖士員官號更易廢置不常而漢之營法具此也魏晋已降號尤繁處置統𨽻大約如漢逮於西魏始立諸府不滿百人有即將主之𨽻在二十四軍軍一開府將之每二開府屬一大將軍凡十二大將軍分屬六柱國隋則每府有隊副旅帥校尉鷹揚即將歩卒有歩兵校尉騎士有越騎校尉雜典兵馬而征防上免内聴命於十二衛衛二將軍一大將軍判之唐貞觀以後上府至千二百人中府至千人下府八百人十人為火火有長備六䭾馬五十人為一隊立隊正三百人為一團置團校尉而府有折衝左右果毅知府並判府事内屬諸衛則如隋制凡武士成丁入軍六十而免應宿衛者離為三畨其征人防人亦有迭次起西魏大統至唐天寶凡名軍防鄉團衛士武士皆謂此也宋朝㳂唐末五代之制並號禁軍黥面營處衣食公上草教日閲無得畨休大凡百人為都五都為營五營為軍十軍為廂或𨽻殿前或𨽻両侍衛司自廂都指揮而下皆節級有員品每都立軍使都頭兵馬使則古之隊正之任也每營立指揮使則古之旅師之任也每軍立都指揮使都虞候則古之師帥之任也每軍每廂每第立都指揮使則古之軍將之任也各有副簉以貳其政其兩河闗西諸州則别募蕃漢丁壯差置將職以傚内軍至其戍守征伐則古有大將元帥大總管今謂招討使都部署是也古有副將副元帥副縂管今謂招討副使副部署鈐轄是也古有校尉已下兵職今謂都鑒隊將之類是也立軍制吏古今率同其名雖殊其任則一凡涖師者亦當參攷前後以為今事之法式焉圖書編卷一百十六
