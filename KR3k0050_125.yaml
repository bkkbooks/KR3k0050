body:
  text: 圖書編卷一百二十五明章潢撰開浚田畝水利總敘昔人有言積貯天下之大命而軍國之需必資焉王制曰三年耕必有一年之食九年耕必有三年之食是貯積之道也然所以致之者豈無其道哉有田畯以率甸人有匠人以治溝洫有遂人以興水利有稻人以祛水害是故田野之所由闢而積貯之所由充也井田既壞此法不傳蓋自漢唐以迄于今日而公私之積皆可哀痛矣邇年以來蘇松之水溢為巨浸江浙之旱赤地千里一苖半穗民命盡矣兼之以貪墨之侵漁豪強之兼併緇黃之靡食賦斂之峻削門攤之稅十室九空𨽻卒所過雞犬亦索東南民力困竭甚矣則大運削弱之患供輸逋負之狀其敝不惟在民生而且移之國計矣思患預防者可不通變以宜民乎何則揚州之域厥田下下厥土塗泥而今財賦乃至甲於天下者以民事勤而庶功興也昔人有言東南有可耕之人而無其地西北有可耕之地而無其人則夫西北之地古之中原地非不可耕也但人力不知奮耳誠能稽元學士虞集之議而於河南山東陜西諸省長川廣野可以開溝洫而蓄泄其水畫經界而原隰其田成災畬而稼穡其利者因而用之或召募異地之人給其牛種而寬其租賦或留休尺籍之兵立之屯營而儲其糗糧則通東南之漕運以給太倉者常也斂西北之粟以足邊儲者權也所以濟漕運之所不及也雖然天下之事建議者思之非不周而執事者行之未必力方集議開京東瀕海之田而極施為措置之詳其法非不鑿鑿可行也而肉食者鄙竟以浮言阻之卒之至正間海運不繼燕京乏食宰臣議行僅以紓一時之急而國之成敗莫之有救豈議論多而成功少集之言有不足用歟無亦主之者無其人也昔賈讓治河之策固曰不與水若爭咫尺之利則夫今日之治田也其可與土地爭利乎誠能擇通敏練達之臣委任而責成之許以便宜不撓之以文法遲以歲月不責之以旦夕不為羣議所搖不為流言所惑捐內帑而不之惜召民怨而不之顧舊堰可增也則任其增而不撓于中制新河可開也則聽其開而不請於上裁則墝埆之地皆可田灌莽之區皆可稼矣然又必不亟其利初所入者豫之民而不爭二三年後始籍而賦之則民知利之所在咸爭先而趨之矣丘文莊之議載於衍義補者可考也夫開西北之田以資積蓄固所以紓東南之困也然東南水利其可不思所以興之乎東南水害其可不思所以去之乎故今董治農政非無通判也而未嘗聞其有勸相之方提督水利非無憲臣也而未嘗聞其論疏濬之術則遇旱而無所蓄遇潦而無所泄凶荒之故恆必由之誠使知水政者如劉彛其人興陂塘者如孫叔敖其人則東南之凶歉可免矣圍田築土作圍以繞田也蓋江淮之間地多藪澤或瀕水不時淹沒妨耕種其有力之家度視地形築土作堤環而不斷內容賴畝千百皆為稼地後值諸將屯戍因令兵衆分工起土亦一此制故官民異鄰復有墟田謂疊為墟岸扞護外水與此相類雖有水旱皆可救禦凡一熟餘不惟本境足食又可贍及鄰郡實近古之上法將來之永利富國富民無越於此水閘開閉水門也間有地形高下水路不均則必跨津要高築堤埧滙水前立斗門甃石為壁疊木作障以備啓閉如遇旱涸則撒水灌田民賴其利又得通濟舟楫轉激碾磑實水利之總揆也周禮以潴蓄水以防止水説者謂瀦者蓄流水之陂也防者瀦旁水之堤也今之陂塘既與上同考之書傳廬江有芍陂潁川有鴻隙陂黃陵有雷陂愛敬陂陽平沛郡有鉗盧陂餘難遍舉其各溉田大則數千頃小則數百頃後世故迹猶存因以為利今人有能别度地形亦效此制足溉田畝千萬比作田圍特省工費又可蓄育魚鱉載種菱藕之類其利可勝言哉治水諸器治水諸器十有三曰鐵簸箕曰五齒爬曰杏葉杓曰攪江龍曰方船曰水車曰戽斗曰泥㨮曰泥筐曰鐵鐝曰竹􅀢皆舊制也曰活閘曰刮板余新制也然皆可深閘河耳而深黃河之法可以制勝之乎鐵簸箕重艱不可用五齒爬可搜泥根杏葉杓可潦淤泥攪江龍急水可偶一為之多弗效方船利於載石撈泥水車大利於乾漕北人不能用戽斗利於挹水南人不能用泥㨮以布為之二人共舉煩難可厭泥筐以擔貫之一人獨舉用人少而盛工多利器也恨北人不習鐵鐝利器也南北通習之竹􅀢水中夾泥唯高寶湖中能用之活閘以板為之遇閘河淺則施有石閘之用可移而置也刮板施於淤沙之淺一刮可去沙數斗二器大利閘漕云治槽之淤有二法遇淤泥之淺利用爬杓不利於刮板遇沙淤之淺利用刮板不利於爬杓岸塍岸塍所以圍田也即一方而他方皆可以例推矣國家倚辨東南財賦而蘇松之賦又甲於東南顧地處下遊古號澤國蓋平時既雜受杭嘉毗陵諸路之水而湖沙往來之處浦塘又多壅塞故時雨淋淫輒駕堤上而濵湖近海之處被害尤劇此豈獨不浚灑之故哉亦以障捍之無䇿也蓋有司既困於簿書期會之繁又格於因循積習之論故於水務每疏濶不講至於岸塍雖亦業田者修築然人情恆慳一時小費而不顧異日大害乃多虛應故事夫岸塍當平時風浪之衝激侵蝕既已不鮮逮經霖雨則連絡盡圮而穡夫束手號籲無門矣故當事者首務須在經理幹河之大且要者其次則疏支渠築圍埂急焉檄郡縣修築必嚴厥令必責厥成相機宜授方略視窊隆凖事物計田授役而公家亦資以錢榖其為岸必高與廣等上廣若干而下內外各加三之一其當齧而易潰者則斷木為撅甃石為址必期於雄固而後已如是而又歲歲修之俾勿壞則水潦有備而沮洳之區可與沃壤並矣茍徒曰理河道足矣而於岸塍漫不加意則雖得之於河而終失之於堤埧歲疏濬諸塘浦後而水患頻仍病民虧國其效可覩矣此豈備災萬全之䇿乎夫國需取辨常在目前而里閭利病常在千萬里外茍不悉圖所以備災者而徒一切責賦於受災之民則百姓抗弊何時可夷而軍國儲蓄亦何能常足也故於溝洫之外復著岸塍之説蓋詳於人之所易忽以備水利者採焉浚渠浚與濬同開治也湡也凡川澤之水必開渠引用可及于田考之古有溝洫畎澮以治田水書云濬畎澮距川是也逮夫疏鑿已逺井田變古後世則引川水為渠以資沃灌按史記秦鑿涇為渠又關西有鄭國白公六輔之渠外有龍首渠河內有史起十二渠范陽有督亢渠河北有廣戾渠朗州有右史渠今懷孟有廣濟渠俱各溉田千百餘頃利澤一方永無旱暵所謂人能勝天豈不信哉後之人有能因其地利水勢繼此而作益國富民可見速效凡長民者宜審行之論浚渠築堰禹之治水不過曰決九州距四海濬畎澮距川而已而天下之言智者莫踰焉何哉洪範五行水曰潤下知水之性潤下則知禹之治水矣是故先決九州以導於海使水之大者有所歸次濬畎澮以距於川使水之小者有所泄此所以九州同四隩宅而萬世永利也商之衰也五行之官世失其業周人始命遂人十夫為溝百夫為洫千夫為澮萬夫為川而溝洫之制始立稻人以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮㵼水而溝洫之制益詳至於匠人氏又辨其深廣之度而通其蓄泄之宜其法可謂盡善矣然周人豈夷陵谷而為之哉亦不過因其自然之利而修伯禹之故而已周之衰也遂人稻人匠人之官又世失其業列國之君皆自利以病鄰國暴秦之興又廢溝洫開阡陌而水利廢矣是故孫叔敖起芍陂則楚受其惠文翁穿㳛口則蜀以富饒史起鑿漳水於魏則鄴傍有稻粱之詠鄭國導涇水於秦則谷口有禾黍之謡許景山復蕭何之故堰則興元之荒瘠復為膏腴趙尚寬修召信臣之故渠則南陽之瀉鹵變為沃壤之數君子者孰非因其自然之利而修其已然之法哉謂之得周官之遺意亦可也伏惟我國家司空有總職水利有専官省以督之府府以督之縣而縣之陂塘墟堰又莫不有長重以憲臣之稽察皆以愍惠元元而興水利也然遇水旱民輒告病者是必有其故矣此無他陂塘墟堰之長皆失其業而郡縣長吏又莫之省憂故也欲修周官之職加疏濬之功通灌溉之利絶湮沒之患甚盛心也愚則以為周官之職不可卒復而溝洫之遺意尚亦可尋周官曰溝必因水勢防必因地勢蓋溝以導水不因水勢則其流易壅防以止水不因地勢則其土易壞為今之計莫若申飭郡縣長吏督率陂塘墟堰之長察水勢之曲直原地勢之高卑可堤則堤可決則決因陂塘墟堰之舊加疏濬築塞之功而又嚴侵占之禁明考課之法則灌溉之利興漂沒之患免矣雖然賈讓有言曰立國居民疆理土地必遺川澤之利分度水勢所不及大川無防小水得入陂障卑下以為墟澤使秋水多得所休息左右遊波寬衍而不迫此誠萬世水利之上策治河墾田疏御史用周言治河墾田事相表裏田不治則水不可治蓋田治而水治矣古今稱聖人之治水者必曰大禹禹治水莫大于河自告厥成功之後至周定王五年而河乃徙自龍門至於碣石入海不為中國害者一千七百餘年宜其功施未易名狀然禹之自言則曰豫決九州距四海濬畎澮距川至孔子稱禹亦惟曰盡力乎溝洫而已然則厯千七百年而河不為中國害者實大禹盡力溝洫之賜也故自禹至殷盤庚五遷厥邦以避河圯溝洫小壞矣然猶未徙也至定王時而徙溝洫加壞矣然猶未決也至秦廢井田開阡陌而溝洫掃地矣秦祚不延及漢而河決酸棗決瓠子厯漢而唐而宋元源河徙決不可勝記治河費歲以若千萬計其治塞之而已溝洫之政無聞焉今自黃河言之每歲春冬西北演迤而來固亦未害逮夏秋霖潦時至吐泄不及震蕩衝激莫斯為甚夫以數千里之河挾五六月之霖潦建瓴而下乃僅以河南開封之渦河與直𨽻徐州州縣數百里之河束而委之唯其不遭橫決者幸而已矣夫今之黃河古之黃河也今自陜西西寧至山西河津所謂積石龍門合涇渭漆沮汾沁伊洛瀍澗諸名川之水與納每歲五六月之霖潦古與今無小異也何獨大禹能使之安東北之故道厯千百年而不壞後世曽不能保之於數年之間此其由於溝洫之不修大較然矣陛下愛養元元無所不至墾田勸農之疏屢蒙俞允則今日肇修溝洫之政以繼神禹平成永賴之功臣實望焉且黃河所以有徙決之變者無他以水未入海而霖潦無所容也天下皆有溝洫則天下皆吞水之地天下皆修溝洫則天下皆治水之人水無不治則田何所不墾是一舉而興天下之大利平天下之大患也今河南州縣被衝決者壠畝淤墳耕者不得種種者不得收而科催額稅如故中土之民困于河極矣至運河以東濟南東昌兖州三府州縣雖有汶沂洸泗等河與民間田地支節脈絡不相貫注每年泰山徂徠山水驟發漫為巨浸潰決城郭漂沒廬舍與河無異或值旱暵則又無可修繕陂塘渠堰蓄水以待急遂致齊魯之間方四五千里之地一望赤地蝗蝻四起草榖俱盡此皆溝洫不修之故也使溝洫既修又寧患此今欲修溝洫之政非謂一一如古也但各因地勢水勢之宜縱橫曲直隨其所向自高而下自小而大自近而逺盈科而進委之海而已逺謀不可以幸致美功不可以雜施孔子曰無欲速無見小利今莫若正疆理以稽工程集人力以助夫役蠲荒糧以復流移專委任以責成功持定論以察羣議毋以欲速而輒更張毋以小利而生阻撓則治河裕民之計也所謂正疆理以稽工程者蓋疆里不正則規模不立脈絡不貫而彼此相病合行司府州縣規畫立界先因通流畫為大渠多者五六少者三四次因頃畝畫為中渠小渠而又計其工程之難易土壤之生熟夫役之多寡錢糧之盈縮期會之後先為三年規大略初年疏大渠會于諸河次疏中渠達于大渠又次疏小渠達于中渠其淺深濶狹各因水勢縱橫曲直各因地勢中間卑窪特甚不通轉折之處則疏為塘濼於溝洫之間水潦則趨平旱暵則節蓄經畫既定造成疆里圖册上之下令如式施行責其成效可也所謂集人力助夫役者大約大渠用官夫小渠用民夫官夫專開水道為之經民夫各治其田為之緯乞行河南山東直𨽻問刑官除特旨并情理深害免死充軍外其餘少倣宋人民屯之法𨽻其名於附近衛所而屬之有司責令開渠并墾除糧荒田自給口糧三年之後量徵屯糧若會赦願附籍佃前田為永業者聽其府州縣徒罪發配人願贖者俱令以官夫開渠徒以里計杖以丈計隨所犯輕重為放免差次則軍犯免衛所凌虐且省軍儲徒罪得以力免贖亦不廢法外此更清驛傳應付之濫恤貱賠稅糧之苦議保馬積習之弊裁里長浮靡之費省民壯團操之擾當事諸臣皆相與推廣德意一一行之則溝洫之政可舉溝洫既成豈止河患可平民利可興即萬一有兵戎之警亦將逡循相顧而不敢橫又推其法於諸邊修古人屯田分兵之法使耕者雜於居民之間不惟可省餉饋之費溝壘相望所在皆險所謂寓武備于農功資人和于地利者也今自近黃河一帶州縣積年逋欠查理停免而見在積荒田糧核實開除則流移漸復而荒田自墾往年治河任事之臣劉大夏等或蒙大發浙江等布政司銀兩或蒙給鈔關抽分以備支費莫非因民之財救民之患也今溝洫大務誼當不惜小費乞于蠲糧數內通融扣補略如宋臣范仲淹以官糧募飢民修水利之法使官司惠而不費百姓勞而不怨溝洫修復則下足民食上給公賦皆將沛然而有餘比之俟河決時驅無辜之民傾不資之費興再三不得已之役徼萬一不可必之功者利害蓋相萬也夫黃河徙決不常捍禦之策言人人殊會通河之外謂引沁河謂通衛河蓋皆博採人言以求𢎞濟然開鑿建置之役費率不下幾十萬金即令運道既成其張設官府開創閘壩編命夫役必一如會通河之故則為費已繁往年工部侍郎劉天和奉命治河專意修復故道竟以底績是也至於海運之議則既有不必妄議生擾之明旨在矣故以遼東而視海運則當舍危而就安以山東河南而視遼東則當舍逺而就近以北直𨽻而視山東河南則又當先內而後外誠自內而外自近而逺修溝洫之政使國有十年之積民無墊溺之危以保國家億萬年無疆之安天下幸甚治田治水議按古之畿甸數百畝之田必溝數十溝之水必川數大川之水必就窪而為湖溝因水潄防因水淫淵因水罄折而向於矩為湖為渚也湖渚多而天下西北之水不助河而為暴然後數千里中原之地可樹藝而農唐虞之盛由五事宣八風雨暘時若無崩竭淫溢之災無轉漕輸將之費而封濬分畫功臻于永賴熙寧之術也此謂本務漕河前已類附黃河以别參考而治河則工曹職也故復記之治河失其故道按漕河原不用黃河之水惟用洸汶沂泗諸泉之水足以濟之渡淮而西皆是清水故名清河正統十三年黃河決滎陽衝入漕河潰沙灣以達于海景泰四年都御史徐有貞塞之乃分流自蘭陽東至徐入于漕河以疏殺之而黃河始來然亦小小與清水合流清水七分黃水三分並入于淮至正德六年水勢方盛行浸漫而衝洗之矣先是黃河未衝之時清河河道皆狹故易充然亦有淺故沿河俱設淺鋪每年轉運故無滯也後黃河水大來而淺鋪亦設而不用矣今觀二洪之舊堤宛然正是先年河道但二洪一向黃水浸漫一旦水落石出而清河一帶淺涸人心乍見不能無異其實則故河也蓋自淮達濟由會通以至衛河一路堤防只恐黃河之水衝入為漕河之害今徐州二洪以下一向反用黃河之水而忘其故及水不來則用工挑濬以引之日望其來而不可得如酒本傷人之物而耽酒者一向沈溺于酒反以酒為生一不飲酒即欲死矣此非今日漕河之喻乎論東南水利禹貢三江既入震澤底定爾雅吳越之間有具區蓋鎮常蘇湖七郡之地中含太湖而東漸于海上受杭睦宣歙天目諸山之水下自三江泄焉自漢以來咸獲其利蓋古人順治之道必觀其源以遡其委上築溧陽之間分水銀林五堰以節其流而使發源之水得以西決于蕪湖下疏三江而使積集之水得以東決于漲海故自吳江抵華亭青龍合于三江之水雖有二百八十之遙而上流既迅大海之潮沙不得以障之也夫何唐末東南商販薄木由宣歙以達兩浙乃病五堰艱阻給官中廢則金陵九陽數郡之水不西入于蕪湖而東入于震澤矣至宋慶厯間李禹卿又堤大湖四十里為漕而中截之使湖水不得以東下是五堰既開則來者愈迅湖堤既錮則去者復緩其勢又惡得不為蔽乎由是三江之水上不受湖流之衝而下有潮沙之壅于此亦蔽矣單鍔嘗言之自五堰以至湖堤猶之一身也五堰則首也荆溪則咽喉也百瀆則心也震澤則腹也傍通大湖之衆瀆則脈絡諸竅吳江則足也今上廢五堰之固下有江岸之阻是桎其首足塞其衆竅以沃其口沃而下已則腹滿而中絶矣其後吳執中郟僑類皆言之而當時執政漫不知檢遂使江口為豪強之業江尾為茭蘆之區淤田村落無類數計湖日湧而江日廢漸為百世之患矣我朝永樂間夏元吉以善言水利得蒞茲土一時亦稱底績惜其不念厥本而徒自崑山開下界里掣吳以達劉家河而泄吳江北去之水自華亭開黃浦三泖以達范家濱而泄吳江南去之水至于湖堤之痼則漫不加意正統間周忱修復三江復以湖沙墾辟成田因循不舉豈知湖堤不去終非利導之原三江不復終非底定之本哉為今之計五堰之復于正德者修其成可也其下委之勢當自吳江以決其堤自堤以決三江之壅使由華亭青龍顧會諸浦以達于海其他疏淺之處若宜興之百瀆吕城之三堰崑山之至和塘咸復故道則水何患其不治哉經理三吳水利圖説江南水利譬之人身天目首也諸山溪口也本湖其胞腹三江其腸胃海其尾閭也考諸志載黃浦即東江之别名劉河即婁江之舊迹併吳淞為三江吳淞西連太湖東通大海江流迅駛唐以前未聞有水患後吳江長堤一築腸胃始失其利國初以來水患轉亟而夏忠靖公乃専力于夏駕新洋一時大有所禆其後新洋港水勢湍悍日就深濶而吳淞江之氣脈漸微矣土人以此稱為漫水港云夫江流迂緩既無以蕩滌潮沙而新洋夏駕倒注之潮復與東來之潮相會合合則停停則淤江之旋塞有由然也某恪遵廟算廣集衆思咨訪機宜究極形勢乃知併益為災由于源之未節江之併行而至于相奪則以流之未得所歸也於是闢治江中壅塞四十餘里以復吳淞江之故道決去吳江灘漲數十處使大湖積水直注于吳淞濬淞之山涇等港秀川官紹鹽鐵浦淮六磊等塘泄澱泖之水于黃浦濬蘇之吳塘顧浦戚虞徑南北橫瀝等處泄崑太倉諸水于劉河復濬七浦梅林等塘使陽城巴城諸湖之水徑入于海濬白泖福山三丈諸浦九里青陽山塘雷溝等河使尚崑湖毗陵晉陵諸水徑入于江皆所以導其流也濬白鶴荆城港西泛裏河泄長蕩荆溪諸水入于運河濬武進之水於孟瀆丹陽之九曲河丹徒之鐵貓港泄潤州上流之水亦入于大江皆所以節其源也源流各得其所然後于千墩堡南濬澱山湖口使湖水通徹入于吳淞又慮江水外逸乃於夏駕及漫水江口並建一閘隨時開閉庶幾水不外趨潮不倒注吳淞可保無虞伊洛水田議河南本有水利可以興水田古之人蓋嘗為之矣如太陽三渠去府城南十里而近分洛水以溉田者宣利渠去永寧縣南三里而近又有新典萬箱等渠皆亦分洛水以溉田者伊陽渠去嵩縣東十里而近永寧渠去嵩縣南六里而近又有鳴臯順陽濟民等渠皆分伊水以溉田者而盧氏縣之東澗水則嘗析而為渠流入于城中以灌蔬圃者也可以灌蔬圃則亦可以灌田興水田之利也至於伊洛瀍澗載在經史流經府城外夏秋間每泛溢而東者寧不可以隄障之車戽而耕種為水田乎豫嘗舉其説以告東濲孫公公言不可蓋其人習於種旱榖憚于胼手胝足之勞而又不諳埂塍之制不慣於裁插耘耔之方術也聞永寧嵩縣亦已有水田其民頗稱饒裕豫方欲募召能作水田之人於我蘇松及永寧嵩縣之已有成效者以分教乎凡伊洛三川之民興粳稻之利於此一方而惜乎不久即遷官去入閩矣洛民每苦糧重疏欲與汝南道丈地而均糧格不行豫嘗為之請輕折而方伯公靳不許每歎之倘水田之利成每畝可收榖三四種其每畝所上糧一斗比之我蘇松猶為輕則爾即不盡水田也以水田與不水田相參錯為輕重數年以後歲稍多收民間亦或稍致饒裕如永寧嵩縣也糧則稍重於輸將不為難亦何至強聒於人前仰人鼻息而不蒙一許可也歟豫請輕折而不得欲興水田以利氓民而以轉官去不獲遂豫心又以為大夫士亦安於故常而不樂為此也每每嗟歎之且著議以告後來者淮鳳墾田記臣愚伏見皇上留心吏治加志窮民奬賞來朝官員則親發玉音諭以愛養百姓慮有司催科稍急則敕下户部蠲免閭閻宿逋孜孜講求惟欲康阜兆民永固國本甚盛心也臣智識淺陋不能仰贊萬分之一思得往年出守廬陽嘗巡行阡陌勸民開塘蓄水招集流移開墾荒蕪頗覺有益又嘗往來鄰境鳳淮兩府之間習見地廣人稀一望數十里皆紅蓼黃茅大抵多不耕之田間有耕者又苦天澤不時非旱則潦蓋雨多則橫潦瀰漫無處歸束無雨則任其焦萎救濟無所取資以是飢饉頻仍窘迫逃亡人煙日稀曠土益廣此地界連蕭碭汝潁皆多盜之區逋逃之藪積久不無隱憂宜得専官教民稼穡招撫流移在世廟中業曽専設都御史王璣時值大水浸淫功不及施輒復報罷臣為督撫時因潁州僉事升任具本奏薦原任知州姚筐或注原缺或另添設専理開荒議亦未行然臣竊以關係地方安危時時念之不置近復有以此白臣者臣謹以昔時之見參以今日所聞竊意必設専官以重責成蓋潁州僉事淮陽副使兩道各有兵餉錢糧問理詞訟之責勢不能兼各該有司非得監司督責人無畏憚合於淮鳳二府特設一僉事擇實心幹濟者畀之専敕給以關防住劄適中州縣撫按同心重其事各道不得侵其權有司勢豪不得撓其法假以歲月不責近功開一頃即一頃之利招一民即一民之安三年果有成績進秩而不遷再考再進秩久且超遷之其所轄有司即以開墾土地招來人民多寡為殿最亦務各久任超遷如是十年不臻庶富之效無是理也専官之責其效在廣開溝洫夫水土不平耕作無以施力必先度量地勢高下跟尋水所歸宿濬河以受溝渠之水開溝渠以受橫潦之水官道之衝設大堤以通行褊小之村亦增卑以成徑惟欲於道旁多開溝洫使接續通流水由地中行不占平地又度低窪處所多開塘堰以瀦水之夏潦之時水歸溝塘亢旱之日可資灌溉高者麥低者稻平衍地多則木綿桑枲皆得隨時樹藝土本膏腴地無遺利遍野皆衣食之資矣其次招恤流移夫良民忍棄鄉土止為無食耕種多荒年宿逋苦追併其勢必不能安其居也今地既開闢夏秋有收不愁無食鼓動其懷歸之心將受㕓為氓之恐後各該有司寬慰而安撫之量撥地土處給牛種不得責其逋負量寬二三年俟其志定業熟然後起科又或招致江南客日或勸諭本土地鄰或審擬徒夫無力者令供役開濬有力者出資給食皆僉事可得專行其餘未盡事宜悉聽其酌量區畫或者有窒礙難行事干題奏者議擬停當徑自請旨施行既無掣肘之虞民心莫不歸向而展布無難矣臣芹曝微忱冒昧瀆聞伏乞敕下該部再加詳議見諸施行庶幾釀無窮之利於根本之地消意外之虞於未萌之先皇上厚生育物至仁誕敷於窮簷曠土鼓動四方務本力田之風實化導民生之一機也議興西北水利客曰子謂經國訏謨其大且急莫有過于西北水利則豫之所未解也曰禹功茂矣而濬畎距川乃其盡力而終身者騶孟談王道教樹蓄厥惟先務客惡得以水利而左之豫將為客悉其利夫雨暘在天而時其蓄泄以待旱潦者人也乃西北之地旱則赤地千里潦則洪流萬頃惟寄命於天以幸其雨暘時若庶幾樂歲無飢耳此豈可以常恃哉惟水利興而後旱潦有備其利一也神京北鞏財賦取給於東南忠於謀國者鏡勝國之往事懷和人之隱憂尚有出於河流外者惟興水利而西北儲蓄近取常裕視東南為外府可也中人之治生必有附居常稔之田始可以安土而無飢乃國家全盛之勢據上遊以控六合獨待哺之東南近廢可耕之田逺資難繼之餉豈計之全哉今運蚤而積久儲蓄信有賴矣然運蚤而收之其熟有浥損之患久積而散之恆過其期有紅腐之憂水利既興則田疇之間要皆倉庾之積其利二也東南轉輸每以數石而致一石民力竭矣而國計所賴欲暫紓之而未能也惟西北有一石之入則東南省數石之輸所入漸富則所省漸多先則改折之法可行久則蠲租之詔可下東南民力庶幾獲蘇其利三也昔禹導河入海而溝洫之修尤盡力焉固以利民亦以分殺支流而不以助河之虐河之無患溝洫其本也周定王以後溝洫漸廢而河患種種矣今河自關中以入中原合涇渭漆沮汾泌伊洛瀍澗及丹沁諸川數千里之水當夏秋霖潦之時諸川所經無一溝一澮可以停住曠野洪流盡入諸川其勢既盛而諸川又會入於河流則河流安得不盛流盛則其性自悍急性悍則遷徙自不常固勢所不至也今誠自沿河諸郡邑訪求古人故渠廢堰師其意不泥其迹疏為溝澮引納支流使霖潦不致泛溢於諸川則並河居民利水成田而河流漸殺河患可彌矣其利四也古人之畫地而田也曰我疆我理南東其畝既順土而宜民亦設險而禦侮也晉之邀齊也必曰盡東其畝以為戎車之利晉之利齊之害也今西北之地平原千里冦騎得以長騎若使溝澮盡舉則田野之間皆金湯之險而田間植以榆栁棗栗既資民用又可以設伏而避敵其利五也往者劉六劉七之亂持竿一呼從者數萬則遊惰歸之也蓋業農者縻其田里惟遊惰之民輕去鄉土而易於為亂今西北之境土曠而民遊識者常惴惴焉誠使水利興則曠土可墾而遊民有所歸消釁彌亂深且逺矣其利六也東南之境生齒日繁地苦不勝其民皆不安其土乃西北蓬蒿之野常疾耕而不能遍蘇子謂聚則爭於不足之中散則棄於有餘之外其不均固如此也今若招撫南人修水利以耕西北之田則民均而田亦均矣其利七也東南多漏役之民而西北罹重徭之苦則以南之賦繁而役減北之賦省而繇重也使田墾而民聚民聚則賦增而北繇可輕其利八也沿邊諸境有轉輸不能至者招商以代輸蓋有數頃之田困於一商遂棄業以他徙其有曲避轉輸之苦者則私以折色兌軍商得茍安軍無宿儲即承平勿論設有烽警何以待之惟近邊田墾轉輸不煩其利九也屯田之成熟者多屬隱占久則難稽矣然亦不必稽也西北非無田之為患而不墾之患彼既墾而熟矣何必歸官始為國家之利哉惟自其荒蕪不理者召募墾之則新屯固種種也兵之壯悍者既心恥於負鋤而其羸弱者又力疲於荷戈驅兵為農勢固難行惟募之農而簡之為兵則心安而力奮屯政無不舉矣今天下浮户依富家以為佃客者何限募而集之可立致也募農以修水利修水利以舉屯政其利十也塞上之卒土著者少不得已而有募軍則居行給餉為費不資又不得已而有班軍則春秋遞往疲於奔命又不得已而按籍勾補解檄方登逃亡旋報閭閻重困行伍又虛若近塞水利既修屯政大舉田墾而人聚人聚而兵足可以省逺募之費可以蘇班戌之勞可以停勾補之苦其利十有一也宗祿勢將難繼咸切憂之而莫肯任其議將以難遺後人而後之難更有甚於今日此不可不亟為之圖也世有勇於建議者則曰裁其祿弛其禁而已夫不資之以謀生而徒曰裁其祿則飢寒者孰恤不定之以安居而徒曰弛其禁則流離者孰依我聖天子睦族展親之仁必不忍其至是也昔范文正以兩府祿入尚能廣義田以廩族人矧以國家之大而不能使天潢之𣲖皆飽食而安居乎今西北之地曠土彌望於其間擇人所棄者官為墾闢分井而田如中尉以下量歲祿之入授田若干使得安居而食其土其後支庶漸繁田不再授蓋既授之以田開其治生之端彼知田不再授則皆及其始授之時勤儉明農於其間以歲食之餘漸墾田而擴産為長子孫之計其雄桀者不失為富家翁即庸拙者亦可以依田力穡其與坐食多餒散處失所者相去逺矣其利十有二也昔之有志者嘗欲倣井田之遺制授民之産而惜其時之不可痛豪強之兼并限民之田而限其勢之難行今若於西北空間之地修舉水利則倣古井田亦可也限民名田亦可也古昔養民之故以漸可舉其利十有三也古者以井畫地度地居民比閭族黨井自為界民不可多得尺寸之地而地亦不可多得一介之民民與地適相均也今通都大邑之民踵接肩摩而爭繁習靡多梗化而敗俗其爭少習村者惟寥廓之鄉為然今若畫井居民裒益其多寡使民與地均如古比閭族黨之意則教化可興而俗尚自美其利十有四也客曰信如子言水之利溥矣西北皆可行獨先於京東者何居曰京東輔郡而薊又重鎮固股肱神京緩急所必須者矧其地負山控海負山則泉深而土澤控海則潮淤而壤沃利水尤易易也豫所屬二三解事者蓋遍厯山海之境閲兩月而返披圖出示如指諸掌也為言諸州邑泉從地湧一決而通水與田平一引而至比比皆然姑摘其土膏腴而人曠棄即可修舉以兆其端者自西厯東如密雲縣之燕樂庒平峪縣之水峪寺及龍家務庒三河縣之唐會庒順慶屯地皆共著者薊州城北則有黃崖營城西則有白馬泉鎮國庒城東則有馬伸橋夾林河而下城南則有别山鋪及夾隂流河而下至於隂流淀疏渠皆田也遵化西南平安城夾運河而下及沙河鋪地方又鐵厰湧珠湖下至韭菜溝上素河下素河百餘里夾河皆可成田遷安縣北徐流營山下湧出五泉合流入桃林河又三里橋湧泉流出灤河又蠶姑廟湧泉成河與灤河相接夾河皆可田之地盧龍縣燕河營湧泉成河及營東五泉湧漫四出至張家莊撫寧縣西臺頭營河流亦自燕河營湧泉而來皆可田自西以東如豐潤縣南則大寨及刺榆坨史家河大王庒之地東則榛子鎮西則鴉洪橋夾河五十餘里皆可田玉田縣清庒塢導河可田後湖庒疏湖可田二里屯及大泉小泉引泉可田其間有民所不業之地有屯地有牧馬草地屯草之地屬於官官為闢其蕪而收其利不難也至於民不業者召民業之官為助其力何至連阡陌棄鞠為茂草乎至於瀕海可田則自水道沽關黑崖子墩起至開平衛南宋家營之地東西度之百餘里南北度之百捌拾里皆𨽻豐潤其地與吳越瀕海之沃區相等今萑葦彌懋而繫名於勢族然葦之利微即勢族亦無厚入於其間也若如吳越人田而耕之則利十倍於葦即捐其一以與勢族使不失其舊入勢家亦無憾焉昔虞文靖公之議東極遼海南濵青徐瀕海皆可田之地今豐潤實其中境欲舉其議而行之滋非其先當致力者乎蓋先之京東數處以兆其端而京東之地皆可漸而行也先之京東以兆其端而畿內列郡皆可漸而行也先之畿內列郡而西北之地皆可漸而行也在邊陲則先之薊鎮而諸鎮皆可漸而行也至於瀕海則先之豐潤而遼海以東青徐以南皆可漸而行也夫事有小用則宜大則局而不通大用則宜小則窘而難布兹其試之一井究之天下無不利者事有旦夕計功而逺猷不存積久考成而近效難覩兹其暫之歲收久之永賴無不利者特端之於京東數處因而推之西北一歲開其始十年究其成而萬世席其利矣客曰西北之人歲苦水害奈何利之且彼宿苦其害而子驟言其利其不信亦何異乎曰嗟乎水在天壤間本以利人非以害之也惟不利斯為害矣人實貽之而咎水可乎蓋聚之則害而散之則利棄之則害而用之則利如血之在人身流貫於肢節而潤澤其肌膚一有壅注則上而為癰下而為痔又或溢出於口鼻而因以戕其軀遂曰血之為人害也亦舛矣今之咎水害者即山川之委原未悉胡不引人身觀之也古昔盛時列國分布畫井而田甽達於溝溝達於洫洫達於澮澮達於川縱橫因其地勢以取利於水今西北皆其故疆也豈古以為利今以為害乎且東南之民爭涓流於尺寸之間何者彼固利之也謂水利於南而獨為北害此必無之理也客曰南北均利水矣而北之視南亦有難易乎徐子曰北易客乃吒曰子固好竒甚言北之利於水耳烏得而稱北易也曰客何異豫言哉南方之民披簑而耕抱濕而穫蓋恆與雨相值也長夏苖將立稿則訟風伯而祝雨師盻盻焉以一沾濡為快乃西北之雨多於長夏而耕穫之時少雨其易於南天時則然也西北地曠而水夷稍一疏引水即為利東南之地高下相懸有轉水於數仭之深者再日不雨則桔橰之聲徹於郊原竭人力以資灌溉苦且難地勢使然也考之古昔甽深尺許遂深二尺溝深四尺洫深八尺澮深二仞而已未有如東南轉水於數仞之深者至於京東山之湧泉溢地而出河之支𣲖等地而平其於西北尤為易易也東南瀕海歲多潮患蓋海之勢趨於東南也遼海以及青徐有海之饒而鮮潮之患其難易又彰彰矣奈何目為萑葦之場而棄之不田乎豫謂北易蓋亦有據而言之也客曰南北水利修廢頓殊亦有由乎曰水利修廢由於人之聚散而旋轉之機上實握之西北在三代盛時溝洫時修農功畢舉厥後魏史起引漳水溉鄴以富秦開鄭國渠溉舄鹵之地四萬餘頃關中為沃野秦以富強至漢文翁溉灌繁田千七百頃而蜀饒白公穿渠引涇水溉田四千五百餘頃而民以饒富馬援引洮水種粳稻而狄道並塞之民得以樂業虞詡復三郡激河浚渠為屯田而省內郡之費蓋三代之時溝洫遍於列國水之為利也宏魏秦各擅其利文翁以下諸子人興其利水之為利也専然皆在西北之境若東南稱水利者在漢以前惟馬臻開鑑湖而已他未有聞也及西晉之亂中原生齒漸耗從晉室而東徙者謂之僑人久則安其土而樂其生西北民散而東南利興非細故也即如東南之饒三吳稱最在禹貢揚州之域厥土塗泥厥田下下而已漢之時亦一澤國耳惟晉室既東民日聚而利漸興然其財賦亦未至於今日之盛也至五代時錢鏐竊據以稱饒及南宋偏安以致富則民益聚利益興而財賦遂甲於天下矣嘗考宋紹興五年屯田郎中樊賔言荆湖江南與兩浙膏腴之田彌亘數千里無人可耕則地有遺利中原士民扶携南渡幾千萬人則人有餘力若使流寓失業之人盡墾荒間不耕之田則地無遺利人無遺力以資中興由此觀之則宋室方南之時東南尚有曠棄之田及其季年人多而田少豪右擅陂湖以自殖地利盡而民不聊生者聚故也東南地利盡而西北曠廢厥有由哉今國家當全盛之時兵戈不試者二百餘年南北生齒日漸繁夥而東南之民爭附於輦轂之下誠勞來安集於其間則民聚而利無不興矣即畫井而溝洫之亦不難也矧秦漢以下其興利而足民者獨不能尋其迹師其意而行之乎何至待哺於江南也彼其竊據稱饒偏安致富者亦不得已耳乃今國家奚賴焉其機固在一旋轉間也客曰西北利水吾固知其舊矣然吾聞懷慶紀守嘗因丹沁支流疏渠成田民頗利之紀去而田隨廢又如真定楊中丞之家居也亦嘗募南人緣水墾田歲入甚饒及滹沱旁決桑田之變秪瞬息間耳豈久廢之餘固難卒舉者乎是所謂廢食於噎非通論也夫利水之法高則開渠卑則築圍急則激散緩則疏引其最下者遂以為受水之區因其勢不可強也然其致力當先於水之源源深則流微而易禦田漸成則水漸殺水無泛溢之虞田無衝激之患彼懷慶當丹心之下流而真定尤滹沱所必衝者也安能久而無患哉蓋不先於其源之故也嘗考桑乾水發於渾源州經保安之境則自懷來夾山而下至盧溝橋狼窩地方衝溢為患漫至彰義門先朝屢經修築為費不資今保安境上聞有用土牛逼水成田者恐亦不能久而無患也若督責有人多方招募使桑乾上流皆引水成田則豈惟保安之田恃以無患而懷來以下水患亦殺矣豫又嘗物色瀛海之間如元城窪羅家灣窪郝家庒窪高橋鋪窪章家橋窪皆連阡黑壤廢為水區非不可田顧以下流受黑洋等九河之水非先致力於水源未可徼利旦夕而終貽水患也客曰子論甚悉然世之疑而不遽行者亦有説焉一難于得人二憚於費財三畏於勞民四忌於任怨五狃於變習子亦不可不察也曰微子言豫亦籌之夫畏事者既因循而不理喜事者又輕率而罔功固矣得人之難也是必有經略之功而無紛更之擾使利興而民不知則善矣世固有能任之者亦不如宋人専以勸農之名亦不如今制責以水利之職蓋勸農而興水利牧養斯民之首務也今若另設勸農而水利又有専職則若於牧養斯民之外增勸農水利一事被之號為牧養斯民者又將何為耶今之開府持節與藩臬守令皆以牧養斯民也勸農水利責將誰諉惟於開府持節者得人以擇藩臬以擇守令久任而責成之殿最繫焉利興而民不知者可坐而致也世之言費者吾惑焉夫捐數萬金之費於春而收數萬石之穫於秋費於帑而償于田此庸人操十一之利者尚甘心焉曽謂善於謀國者而顧以費為憚乎且始為而穫繼是有興即以所穫者為資漸而廣焉不煩再費也畏於勞民雖文忠公嘗有是論文忠公之言曰天下久平民物滋息四方遺利皆略盡矣今欲鑿空尋訪水利所謂即鹿無虞豈惟徒勞必大煩擾所在追集老少相視可否吏卒所過雞犬一空審如文忠之言民信勞矣子謂不必於牧養斯民之外而専設勸農水利者亦恐其喜事勞民如文忠公之言也誠得牧養斯民者擇其勢順而功省之處暫出官帑募願就之民經略其端以示倡率之機使民灼然知水利可興則必有競勸而爭先者庶令不煩而事自集若槩以水利役民使貧民苦於追呼妨其生業而富家反擅其利豫嘗見水利使者檄下諸邑閲治水利輒飽吏胥之槖而害及閭左此文忠公所以極論而深嘆也怨生有二妨小民之業怨隱而害深奪豪右之利怨顯而謗速既不槩以水利役民民無追呼之擾怨不叢於小民矣而豪右之利亦國家之利也何必奪之周禮使世祿地主之有力者與其廣瀦巨野之可以利民者曰主以利得民曰藪以富得民彼小民欲自利而力有所不逮官為倡率豪右從而競勸於其間則借豪右之利以廣小民之利固主與藪之遺意也方欲籍之矧曰奪乎此何以任怨為也北之治田也逸南之治田也勞彼其以惰心而乘之以逸習卒而驅之宜有未從者然彼之鹵莽而耕亦鹵莽而獲所入固微也以南之勞治北之田則一畝之入倍於數畝而旱潦可以無憂試一驅之其嗜利之心必潛易其好逸之習且相率而為逸者以其習之故然比閭族黨皆然也官為倡率有能爭先力田者稍優異之則皆恥於逸而趨於勞矣昔張全義起於羣盜其尹河南也當喪亂之後白骨蔽地荆棘彌望居民不滿百户全義擇人以修屯政招徠農户流民漸歸逺近趨之如市全義為政寬簡出見田疇美者輒下馬與僚佐共觀之召主勞以酒食有蠶麥善收者或親至其家悉呼出老幼賜以茶綵衣物民間言張公不喜聲伎見之未嘗笑獨見佳麥良蠶則笑耳有田荒蕪者則集衆杖之或訴以乏人牛則召鄰里責之曰彼乏人牛何不助之由是鄰里相助比户有積蓄在洛四十年遂成富庶蓋其勸農力本生聚教誨變荒墟為富壤非偶然也誠使西北牧養斯民者能以全義之心為心未有狃於故習而不變者不一日倡率而遂曰習之難變可乎夫得人而任捐公帑以募就役之民宜怨讟不生惰習可變而田功畢舉矣乃若不費公帑不煩募民而田功自舉者豫又得而熟籌焉邊地屯田以餉軍也其道有三倡力耕之機定賞功之典廣世職之法而已內地墾田以阜民也其道有三優復業之人立力田之科開贖罪之條而已蓋大將固偏禆卒伍所望而趨也今諸邊沃土多大將養亷之地使大將肯以其地畫井而田以率偏禆卒伍無不響應而競耕者昔郭子儀因河中軍乏食乃自耕一畝將校以是為差於是士卒皆不勸而耕是歲河中野無曠土軍有餘糧昔宋廖給事中剛亦嘗首陳是説也將卒捐生而赴敵者冀以功而獲賞也今若計田行賞又如廖給事所謂勞來之安定之操戈之危豈不特易此賞一行萬頃不難得者信然矣今富民得納貨以列武辨職冗而軍政無禆也若倣虞文靖公之意聽富民欲得官者能以萬夫耕則為萬夫之長千夫百夫亦如之先試以虛銜緩其征科俟其田入既饒積蓄漸充則命以官而量征其稅就所征者得給以祿佩之印綬得世其官練集其耕夫以寓兵於其間真良法也民之流離棄其業而畏不敢復蓋瘡痍未起科督又嚴甚則舉其宿負者而取盈焉此宜上有以招徠之蠲其負寬其征時其賑貸則離流競復荒蕪漸墾矣漢之盛時孝悌力田同科蓋務本重農以寓勸率之微權也今若定為之制有能於荒蕪之鄉墾田而井者田得自業而輸其稅於官官因稅而定等上者如納粟待銓次者遙授散職又其次者補胥吏而役於官則力田者競起矣贖罪有條借貪墨以行私者何限也使令罪而有力者捐資墾田官課其墾田之費與贖罪相當則歸其田而收其稅即無力宜逺配者亦得近屬於田畝之間以力墾田而贖其罪此固法行而人亦樂從也倘舉數者而行之屯田可興墾田可多又何必費出公帑而役煩募民哉客曰就子數説尚有可宜者捐生而獲邊賞積汗馬之勳而獲世職欲以田畝之勞並可乎力田贖罪田固彼之田也稅入幾何恐無以足經費而佐司農之急談何容易子更籌之曰審時度勢各有攸當也敵刃既接軍功為先邊烽稍寧屯政是急倘屯政舉而邊地墾食足兵強敵來而應之有勝算敵去而守之有長策又何軍功之足羡乎若徒尚軍功則忽內修而啓外釁非國家之福也且邊人之剽悍者勇於赴敵其椎魯者樂於力田各以其長邀上之賞又何妨焉今邊地久蕪師不宿飽非懸殊格亦何望屯政之修乎即兵興之時轉餉勤勞亦得與對壘者論功客何疑之至於世職之法所繫于今日之邊務者尤非小也今之武辨能因世閥以樹功名者固亦有之然其間困乏孱弱僅存者種種矣惟其先世汗馬之勞不忍遽廢則可耳欲藉以練卒而應敵必不能也彼富民欲得官者能以萬夫耕則其財力智識已出於萬人之上能以千百人耕者亦出於千百人之上其財力智識既足以為主帥之倚用使之部耕夫以為勝卒又皆其衣食安養者心附而力倍其與今之武辨困乏孱弱剝羸卒以自肥固天壤懸也子孫席其世業亦不至於遽替即有替者又必有財力智識之人代其業而繼其官邊圉之間轉弱為強兹其大端矣瀕海之地國初皆設墩臺分戍瞭守以備南倭今草頭沽關及水道沽關以至於新橋海口赤洋海口等處遺址尚存日漸圮廢國初設墩分戍固將備倭亦以南北勢懸使瀕海墩戍連絡於其間則內地有梗此路可通又防微慮逺之深意也惟其初設墩戍稀少冀後漸增然無田可耕則墩戍漸廢勢必至也今若於瀕海闢田以世職之法屯駐於其間久之田益闢而人益聚則海上為樂土瀕海有通道即內地有梗南北不至懸隔於國初設墩分戍之意固相成也國家分兵而屯授之以田統於衛所之官法非不詳然久則田隱占而屯亦漸廢蓋田授於官兵非己業也惟富民得官屯駐則其田固己業子孫相承稽核自詳無隱占之患蓋井田而寓封建之意也夫富民捐己之貨闢荒區以輸稅養耕夫以寓兵其利於國者多矣就其所入給以祿朝廷御之以虛名使之世其職而守其業有增課之饒無養兵之費又何靳而不與乎彼積汗馬之勳者祿入兵費皆仰給於縣官歲縻而無補安可以此例論也今民間子弟入胄監者例得輸三百五十金若使力田者於荒蕪之野墾田三百五十畝得比輸三百五十金者而同科則國家一時雖未得三百五十金之入而歲收三百五十畝之稅歲歲積之其得更倍諺謂千鏹而家藏不若銖兩而時入此尤易曉也田少而殺與贖罪而入者即是可推也若恐力田可同於輸金則必有偽增田畝以欺上或始而墾旋而廢難以一一稽之則又不然夫民間始繫名於胄監距其入銓得官之時多者三十年少亦不下二十年所墾之田入官稅總而計之當不止於三百五十金彼既墾田歲以其田之入而輸官不難也亦何樂於偽田增稅歲以厲已乎即有田偽而稅負者有司將時稽而除其名彼亦何利焉若謂國用方詘經費之內歲少三之一必賴開納以紓其急不能徐徐以待歲稅之入則亦思之未詳也蓋經費之廣由於各邊主客兵餉所費為多若各邊屯政漸舉則經費自省況力田者得以田自利而歲稅又取足於田之所入其從之固易則以力田而應者比令輸金之人必且數倍其願輸金者仍輸金不因此而廢彼二者並行國用又何患焉行之積久田闢而稅廣費省而用足則力田之科與輸金者皆可漸罷又不必商盈詘於財賄酌多寡於開納也客曰勝國都燕且百年虞文靖公之議格焉未行我國家定鼎於兹又二百年矣通漕理財紛然建議而西北水利未聞舉其議而行者子何惓惓於今日也曰勝國往事已無足論虞文靖公之言既不獲售於泰定可為之時及季年東南有梗思其言倣其意設海口萬户已無救於元事矣可勝慨哉國家承平既久竭東南之力尚不足以裕西北之儲幸外國之欵貢修內地之水利千載一時不可失也若急而圖之其將及乎此豫之所以惓惓也京北水利興則敵騎不能馳驅敵必不敢復窺燕薊而兵不必調食可自足秦晉中州水利興則會流黃河諸水皆有渚蓄而河無溢流漕渠自利江以北水利俱興則北地所出可足京師之用而南糧可省即宗祿亦自可取給世以北敵漕河宗藩為三大患吾只以興水利一事並治之能使不為患今之籌國者孰不以財用之不給為憂又孰不以漕渠之不可恃為慮然而西北之境沃衍千里昔人所以坐致富強者其成迹具在若虞文靖丘文莊之論亦既詳且確矣而卒莫有肯任其事見之施行者何也豈非以積敝之餘驟振為難利未及興而或以滋害歟兹固老成謀國者之所宜慎也然審如徐子所云先之京東以次推廣責之守令不設専官多方勸募不煩公帑不強民之所不欲不奪豪右已成之産不為官司收種之擾若是則所謂法行以漸而不驟有萬全之利而一無其害者復何疑焉蓋是書也集古今之議而酌其宜析利弊之源而殫其畫視虞丘二公之論益詳且確矣籌國者果采而行之即使萑葦之場盡為庾廩殆非虛語也財用之不給漕渠之不可恃又豈足憂乎論治水莫先於京東當今經國訏謨其大且急孰有過於西北水利者乎雖然槩而行之則效逺而難臻驟而行之則事駭而未信蓋西北皆可行也盍先之於畿輔諸郡皆可行也盍先之於京東永平之地皆可行也盍先之於近山瀕海之地近山瀕海之地皆可行也盍先之數井以示可行之端則效近而易臻事狎而人信又恐其難於遙度也則又裹糧為二三解事者走沿瀕海近山之境相度而經略之既得其水土之宜疆理之詳始信其事之必可行也宋朝屯田水利東自滄洲界去海西岸黑龍港口如乾寧軍信安軍霸州保定雄州順安一帶皆有塘水蔭灌稻田塘水之北畫河為界所以限南北謹障塞也初淳化中雄州何承矩制置緣邊屯田以大理丞黃懋充判官懋於河北大興作水田緣山導泉倍省工力以陂塘甚多引水溉田公私獲利因詔承矩領護之發戍兵萬八千人給其役承矩於順安軍西開易河蒲口引水東注至海東西三百餘里南北五十七里滋其陂澤築堤貯水為屯田以助要害捍蕃騎侵軼時多為將帥所沮云甲馬雄盛不宜示弱殊不知地利者兵之助也又順安至西山地跨數軍不遙百里縱有丘陵岡阜而多泉瀆因而廣之審地勢而制塘埭令滄州乾寧軍常督壕寨吏轉視斗門水口旦夕俟海潮至放水入御河東置塘以益塘水由是順安軍東瀕於海廣袤數百里悉為稻田萑蒲蚌蛤民賴其利太宗以為渠田之設制戎馬之長策又以安撫司専制置緣邊浚陂塘築堤道具為條式畫圖以付邊郡屯田司東自泥姑海口凡一百六十里西盡邊吳泊凡厯七州軍近復據樞密使夏竦上言沿邊塘泊自海而西至邊吳淀及安肅軍保州而西接西山路濶一百餘里其間有紀河曹河徐河呌喉泉尚泉方順河安陽河唐河盡可堰截引水灌注以為塘淀遂詔修保州廣信安肅順安永寧五州築堤道作匯水之備惟跳山以西有壅水不可到處第密種所宜樹木祥符中沿邊官地榆栁三百萬宋朝所論形勝論曰今北邊控扼之方中國形勝之地西自黑蘆口東距滄海其間三百餘里中國得地者多胸奴得地者寡何哉且自順安軍東至莫州二十里皆是川塹溝瀆葭葦蔽茀泉水縱橫此乃胸奴天牢之地也彼自不能馳騁又東北至雄州三十里又東至霸州七十里又東至海水口皆是營田堤岸泉水漸洳此乃胸奴天陷之地也彼自不能騎射又自順安軍西至安肅軍約五十里夾兩河之間草木茂盛乃胸奴天羅之地也彼自不能騎戰又西至廣武軍二十里夾二軍之間地多磽確此胸奴天隆之地也彼自不能奔衝此中國得地形之多也夫引弓之民恃其徑騎利在平地中國多步兵利於險阻趙魏之北燕薊之南千里之間地平如砥兵法謂走不逐飛步不逐騎較然可知矣今北邊要害阻塘水之外自保州邊吳泊西距長城口廣袤五十里可以長驅深入乃中國與胸奴必爭之地開西北水田紓東南漕運善醫者治未病不治己病蓋未病而治之則元氣固百邪不能為之侵矣茍不得已而治己病焉邪氣已深非急攻之不能起死回生故凡烏附砒霜惟其所用雖病者亦急於求痊聽其所用而莫之禁也急則治標緩則治本理固然也及病勢稍愈雖參苓歸术之投且慎之至再若見效稍遲議者羣起而非之不特醫以目前愈病為功索謝為念而病者亦忘其危迫之苦不求完養元氣以免將來之患矣曽謂善醫與善攝生者顧如是乎急則妄以身命付之庸醫緩則道謀巷議泄泄然莫為後患慮者滔滔皆是也今之醫國手何以異此是故我朝定鼎燕京百費皆仰給東南而漕河為最要也是漕河為國家咽喉漕河病則咽喉塞矣可不懼哉蓋漕河之水黃河據其上流黃水一不循其故道則徐沛諸水泛濫相繼頻年河病亦亟矣當事者百計撑持不過捲帚撈沙築堰建閘濬海口挑月河大槩僅以不失運為上策邇者謂海無可濬之理惟當導河以歸之海則以水治水即所以為濬海也然河豈可以人力導之哉欲順其性先懼其溢惟當繕治堤防俾無旁決則水由地中沙隨水刷即導河之策也于是築河堤以東上流造減水閘壩泄水函洞以導下流塞崔鎮之決使全河不分塞高堰黃浦八淺使全淮堵截且修通濟清江福興各閘復禮智各壩今幸諸決盡塞兩河復合而漕無轉挽之艱其實所費不資特免目前之急耳雖急則治標重病稍愈而善醫國者恐不止如是而已蓋元氣不固難保舊病不復作也緩則治本豈容泄泄然哉以愚度之西北曠地不於此時墾而闢之以為固本之圖則東西漕運更有難為力者即如畿輔郡縣一望千里萑葦極目瀛深諸郊一遇淫潦溟渤為區而濵河瀕海之地本皆古人稼穡之場也使得賢守令悉心講畫用南人水耕法募人田之開墾既多收入必富由是西北各郡邑粟多而價賤則民富國不獨貧東南之困不可以少紓耶若曰召募遊兵墾田立室與夫牛種之需皆無所助獨不思每歲治河之費何啻百十萬金與其付諸波浪中止為目前之計曷若用以開其溝洫畝澮而獲歲歲無窮之利哉茍釋此不為無異病急則請禱神百費不惜病愈則肉食是吝而或有告之治未病者反從而嗤笑之矣抱把人之憂者何能以自解耶噫古人窮則願為良醫達則願為良相同此心也同此道也安得盡國人語之以固本飬元之道而勿藥有喜哉古今水利總論論古今水利之制莫善于周莫不善於漢夫水利之在天下猶人之血氣然一息之不通則四體非復為有大而江河川澤微而溝洫畎澮其小大雖不同而其疏通導達不可使一國之壅害則一也成周之盡力於溝洫西漢之用功於河渠不貪小利以害大謀不急近功以遺逺害田畝有灌溉之益川澤無壅塞之憂此周禮通溝洫遷史書河渠之利歟且成周匠人之職方井之地廣四尺者謂之溝十里之成廣八尺者謂之洫百里之同廣二尋者謂之澮夫自四尺之溝積而至於二尋之澮一同之間其捐膏腴之地以為溝洫之制者凡幾畝也禮冬官匠人為溝九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮小司徒之經土地而井牧其田野説者論田稅之所出則百井之地出田稅者六十有四而三十六井則治洫也萬井之地出田稅者四千九十有六井而五千有竒則治溝與澮也夫自一成之地積而至於一同萬夫之衆其捐賦稅之入以治溝洫畎澮之利者幾人也地官小司徒注成周之君豈不愛膏腴之地賦斂之入而棄以為無用之溝洫哉誠以所棄者小而所利者大所捐於公上者不能毫髮而所以福斯民而澤天下者無窮已也自經界不明而先王溝洫之制漫無可考以九河之地猶失其八支而莫得其迹東坡辨九河云以漢許商之言考之徒駭最北鬲津最南蓋徒駭是河之本道東出分為八齊小白塞之今河間弓髙以東至平原鬲津之地往往有其遺處蓋其八支併歸徒駭也則細而溝洫之屬可知矣天下所謂有才之士始出而以私智經營雖其利澤不博未及古人遍利天下之意不猶愈於後世與水爭地貪尺寸之利而遺無窮之之害哉自春秋戰國浚其源西漢導其流而河渠之水利詳矣孫叔敖起芍陂楚受其惠文翁穿㳛口蜀以富饒史記鑿漳水於魏者鄴旁有稻梁之詠魏襄王時史起為鄴令曰魏氏行田以百畝鄴獨二百畝是田患也漳水在其旁西門豹不用是不智也於是引漳水灌田鄴以富民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古寫鹵兮生稻粱導涇水於秦者涇陽有禾黍之謡班固西都賦又前溝洫志自秦用鄭國穿涇陽渠又名鄭國渠至武帝中大夫白公復奏穿引涇水首起谷口以灌池陽因名曰白渠民歌之曰鄭國在前白公在後云云且灌且溉長我禾黍此建於春秋戰國之時自漢以來講明尤備內而京師外而列郡又逺而邊地源流𣲖分原隰碁布厯厯可見矣嚴熊穿龍首渠於馮翊之地注見前倪寬穿六輔渠於左內史之治武帝元鼎間倪寬為左內史奏請穿六輔渠白公引涇水於池陽之區見上決渠降雨荷插成雲衣食京師億萬之口豈非京師之利乎西都賦其他郡縣泰山則引汶東海則引巨定海南九江則引淮朔方西河酒泉諸郡則皆引河及川谷以溉田溝洫之用事者爭言水利朔方西河河西酒泉皆引河及山谷以溉田而關中輔渠靈軹引諸水汝南九江引淮東海引巨定泰山下引汶水皆穿渠溉田各萬餘頃他小渠及陂山通道者不可勝言也陂山通道在在相望豈非諸郡之利乎輪臺之東有渠溉田五千頃桑𢎞羊奏故輪臺以東枝渠黎皆欲國地廣饒水草有溉田五十頃以上溫和田益可益通溝渠而種五榖而鮮水左右亦有橋七十所趙充國屯田奏云願留萬二千人屯要害處繕鄉亭浚溝渠治隍狹以西道橋七十所令可至鮮水是雖極邊之地水道源流無不加意又豈非邊地之利乎西漢之君不計地利之廣狹不論費役之多寡不一勞者不永逸不暫費者不永寧此漢人得享溉灌之利也然周漢所以得水利者治之者非一官領之者非一人得以盡心於溝洫河渠之間是故周官營溝行水之制則職之匠人俾任浚導之功也匠人為溝洫凡溝必因水勢防必因地勢止水蓄水之令則領之稻人俾専儲蓄之利也地官稻人以瀦蓄水以防止水以溝瀦水以遂均水以列舍水以澮㵼水夫惟浚之於其始積之於其中又安有旱潦之患哉漢之京師則少府總禁池之事其屬則有池監百官表少府掌山海陂澤之稅其屬有上林上池監有都水長丞有都水見上水衡掌林苑之事其屬則有水司空百官表水衡都尉水司空長丞屬焉有都水前百官表奉常注如淳曰都水治渠隄水門又按大常少府水衡署有都水長丞三輔以行京師之職太常以領巴陵之渠並百官表郡國則九江有陂湖官南海則有淮浦官南郡江夏則有雲夢官夫惟既任於其內又分於其外又安有壅閼之憂哉地理志九江郡有陂官湖官南海郡中有淮浦官南郡江夏郡有雲夢官宋朝惠養元元留心水利三司則有都水監宋朝官制都水監屬三司員無常職典役則差諸路則有提舉淳熙七年臣僚乞委提舉常平築陂塘於海門瀦水為備州有倅二邑有丞佐淳熙七年又臣僚劄子乞委諸路常平司籍定所𨽻郡縣公私陂塘川澤之數専責縣丞因民暇日勸率疏導聖旨依令専責縣丞於農隙日浚治疏導廣行儲蓄而又郡有守邑有令皆得以行其浚導儲蓄之利故修蕭何之故堰則若許景山而廢壞之地復蒙大利真宗朝知興元府許景山常修漢蕭何所為故堰號其屬曰酇侯方定天下乃暇為此以灌農田今吾豈憚一時之勞而費萬世之利於是因其壞堰大修之正鄭公在前白公在後之意也見上修召信臣之舊渠則若趙尚寬而荒廢之場變為沃壤仁宗朝有唐州太守趙尚寬者復修召信臣渠與境內陂堰向為荒瘠之地變為沃壤三司使包拯上其事以嘉其能命留再任且有擢旌之諭正前有召父後有杜母之意也後漢杜詩復修召信臣南陽渠人歌之曰前有召父後有杜母築海堤以衛田而民享其利則如范文正范仲淹監西溪稅建白於朝請築海堤於通泰海州之境長數百里以衛民田以文正為興化令専掌役事發通泰楚海四州民夫治之既而民享其利興化以范為姓興水利有功而治纍得聲則如劉彛安定胡先生有治事齋如治兵水利之類常言劉彛善治水後纍為政皆興水利得人如是則其利可勝計耶今日聞有論水利之事矣而不蒙其利聞有任水利之官矣而不行其勞太湖藪陂澤水之所瀦而河渠畎遂水之所泄豪民墾之以獲豐殖之資官私仰之以享租輸之入及其日增歲衍而水利之故地皆為創置之良田曩之仰其水利以耕者今不勝旱溢之害是故不可以悉舉也姑以越之鑑湖言之自漢永和中始闢其廣二百餘里而灌溉之利及於民者為田八千餘頃及熙寧中盜耕其中者九百頃至近歲又甚矣至取其田以歸之公上此未害也而不知所剩者僅數百畝而利之所以復未必盡歸之官所言者凡數千頃而駸駸不已則越三郡將受其弊矣倘今日公上不利絲毫之賦守令不恤豪右之民毋惑於紛紛之議毋付於悠悠之事則何患乎利不具害不除而使周漢専其利哉雖然有利固當舉也亦未易輕舉也才不辨者不足任心不盡者不足任茍且順從者不足任上縻帑庫下奪農田隄防一開水失故道間有指鄰國以為壑説禹貢而行河者益以滋其謬耳不然聞之苕溪入太湖東坡何託此以諷熙寧興水利者哉漕運各總船數南京衛分淺船原共一千七百四十隻今增至二千一百三十隻每年該造船二百一十三隻江北直𨽻各衛所淺船原共二千六百九十六隻增減不同今共船二千五百四十二隻每年該造船二百五十四隻二分中都留守司淺船共八百八十七隻每年該造船八十八隻七分山東都司淺船共七百七十六隻五分每年該造船七十七隻六分遮洋總海船原共五百一十二隻一分今增至五百四十八隻一分每年該造船五十四隻八分以上淺船海船原造於衛河提舉司今併入清河厰團造附録浙江都司淺船共二千四十六隻江西都司淺船共八百九十九隻湖廣都司淺船共七百五十九隻江南直𨽻淺船共一千二百五十八隻以上造於各原衛所運船料額國初漕船𣲖造於諸省及各提舉司其料價例為軍三民七天順六年以後諸省罷造止解料赴二司厰江南漕船歸造原衛者照例𣲖料故軍無補貸天順間料價倚辨於各省者徵解如期照數給造故軍所補尚未多也成化元年以後各處災傷料價日縮軍士始有賠補之患矣成化十五年停止各處𣲖料議取抽分水價以充造船之需成化十六年取荆杭木價銀各四千兩成化十七年取荆州木價銀四千兩杭州木價銀五千五百兩成化十八年議取荆州木價銀六千兩杭州木價銀七千兩成化二十年荆杭銀數如故取蕪湖木價銀一千五百兩成化二十二年蕪湖木價銀九千五百兩荆州木價銀七千三百兩𢎞治二年議增取杭州木價銀一萬八百七十兩荆州木價銀八千三百兩蕪湖銀數如故𢎞治三年會議每船一隻艘官給木價銀五十兩軍辦銀五十兩舊船準銀五十兩通計銀一百二十兩𢎞治四年以後銀有定數船日加多官軍每有借貸之患矣𢎞治十四年會議每船一艘增木價銀五兩及移荆州木價悉於蕪湖取用𢎞治十六年會議每船一艘增木價銀十兩軍辦小料銀三十五兩嘉靖三年議將南河提舉司原額蕪杭木價及人匠班銀悉歸清江厰以供造船之需古今漕船總略論曰三代而上漕法未備無論已古者封建井田各有定制天子食於國中禹貢所稱四百里栗五百里未是己其卿大夫各有采地而兵賦寓於農無後世飬官養兵之費也春秋秦輸粟於晉自雍及絳相繼命之曰泛舟之役漕運之舟始此秦欲攻胸奴使琅琊負海之郡轉輸北河海運之舟始此漢用張良議河南以東造舟五百艘歲漕東方之粟於關中歲不過數十萬石武帝時用粟多歲漕至四百萬石耿夀昌糴關內之粟築倉理船費至百萬有餘當時船數之多可知蕭望之議其事不便帝卒用耿議漕事果便唐劉晏領漕事乃於揚子置十場造船每艘計錢千緡或言虛費太多晏曰不然論大計者不計小費凡事必為可久之慮云即鹽利顧傭分吏督之隨江汴河渭所宜造歇艎支江船上千艘受粟千斛唐漕法江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入大倉歲轉粟百一十萬石無升斗溺者宋初命溫台婺楚諸州設場歲造運舟分綱而運共三千三百餘艘處州六百五吉州五百二十五明州一百七十七婺州一百三十溫州一百二十五台州一百二十六楚州八十七潭州二百八十鼎州二百四十一鳳翔斜谷六百嘉州四十五天禧末議於各州歲減造四百二十一皇祐中漕綱法壞用發運使許元議諸路增置漕船然勞費甚巨久之寖弊也宋漕法分為四路江南淮南浙東西荆河南北六路之粟自淮入汴陜西之粟自三門白波轉黃河入汴陳蔡之粟自閔河蔡河入汴京東之粟自十五丈河厯陳濟及郡皆至京師初於各州置倉行轉搬法歲漕粟七百萬石一變直達久涉歲月姦弊互生所積發運名浮於實漕政日壞至是用元議增舟輸米充歲計如故事既而諸路綱亦不集汴綱既不得至江江船亦不至京師船愈壞而漕愈減耗矣至我朝洪武元年詔中書省議漕粟於京師三十年議海運遼東以給軍餉此漕政伊始也是時河海運船俱改造川湖諸省及龍江提舉司以諸省産未近水州縣軍民相兼成造亦有造於龍江關者永樂初議於淮安臨清建清江衛河二厰令各衛屬督造運船六年令遮洋海船運糧八十萬石於京師會通河衛河以淺船轉送嗣後罷海運遮洋船外增設淺船共三十餘艘南京直𨽻江西湖廣浙江各總裏河淺船俱造於清江遮洋海船并山東北直𨽻三總淺船俱造於衛河大約造於清江者多衛河十之七淺船從儀真徐淮臨得運至通州遮洋海船由山東北直𨽻從直沽入海轉白沙河運至薊州先年遮洋船多直𨽻清江厰造尋改衛河十三年開清江浦裏河運船徑達清口南北始通宋雍熙中轉運使劉璠議開沙河以避淮水之險喬維嶽繼之開河自淮安至清口凡六十里舟行便之是歲平江伯陳公瑄訪詢故老尋喬維嶽故道建四閘以通漕自是舟無車壩之危淮波之險矣漕政殊大備焉宣德間議造淺船或歸原衛或𨽻清江南京鎮江江北直𨽻諸衛𨽻於清江其江西湖廣浙江江南直𨽻各總以各諸水次兑軍不専在淮安常盈倉攴運故歸原衛造船以便物料至後各船雖歸原衛計料修造仍從清江凡各船回至清江本厰委提舉司官匠估計應該修理或改造合用料物填注票帖給官軍回至原衛照數支給買料修造後因各船守候日久本司方行估計稽誤回程成化十年以後議令各司府自行估計修理正統間令造船旗軍不與城守操練從總兵官武公興等題景泰間定匠役班期令清江衛河二提舉司匠役二年一班先年原撥薊淮二府各色人匠共四千名二年一進每年二千名在厰上工造船近因新編勘合該四年一班班稀匠少造船不敷總兵官徐公恭奏照正統年間例二年一班户部會議依擬天順間額天下船數先洪武永樂間河海運船未有定式亦無定數每年會議合用船隻臨時𣲖造以為增減至是定為一萬一千七百七十五艘合用官軍十二萬一千五百餘員名領駕成化間木價告匱更置抽分先景泰間設淮安抽分厰至是增設蕪杭二處詳見奏議其諸議改造大都因時注措成化二十一年議得衛河總遮洋海船山東北直𨽻淺船聽官軍領價從便成造官軍仍如儀真自造雖有衛河主事管轄緣隔逺不能遙制往往侵費以至船隻盜賣而潛逃者成化二十三年御史謝文郎中洪漢奏將鎮江衛淺船比照蘇松事例歸本處成造及將通秦鹽城三所分撥軍民一體出辦料銀伍兩𢎞治間定立江南造船料價限期先是湖廣江西浙江南直𨽻四總運船俱軍三民七出料打造各司府衛所不依時給領官旗負纍都御史季公蕙總兵官郭公宏會題從之詳見奏議正德間查處十總經燬補造船料從總兵官顧公仕隆奏也詳見奏議嘉靖初罷衛河船厰總𨽻清江正德十六年刑科給事中田公賦建議嘉靖三年該本部尚書趙公璜題準衛河厰衙門未幾裁革詳見奏議隆慶間漕司奏革各厰武辨胥以文職理之從都御史王公之請也詳見奏議漕政益畫一可循矣舟車總題兵車兵船見兵漕舟車之利天下所必資也然船之用莫大於漕兵船之用莫大於防海兵車之用莫大於防邊前各以類附而造舟車則職掌於工曹故於此記其式與數焉車制按車之制方而任載曰軫曰箱四面皆廣六尺六寸大車深八尺兵車深四尺四寸小戎所謂俴收乘車皆然便坐立也軫之下木午貫而衡於車者橫曰軸以受輪從曰輈以施行合於軸而外行者曰輪以軌之八尺記之除車之廣則輪厚七寸其輪之大兵車六尺六寸田車六尺三寸大速小遲也支輪者曰輻輻三寸外持輻內受軸者曰轂曰軧徑八尺中空有三四寸圓孔以受軸長一尺五寸出於軸外八寸兵車長三尺二寸故曰暢轂蓋古者行軍以車為營轂出輪二尺五寸使之比次齊整不相磨擊與離次也軸貫轂而出與轂齊端曰範範上之板曰隂所以約轂使輪不外脫也轂軸之交運動易敗故各施金轂內之金曰輨軸頭金曰轄輈車從車後至前長丈四尺四寸亦曰轅輈之端高曲而施橫木以駕馬者曰衡又曰輗平直而施橫木以駕牛者曰軛又曰軏馬高牛卑也輈彎曲處有皮束之凡五故曰五楘梁輈駕於衡之兩馬曰服外兩馬曰驂皮繫於隂板而驂引於胸者曰靷亦謂之靳隂板有環以繫者曰續皮前繫於衡後繫於軫之兩端驅兩驂使不得內入者曰脅驅馬之韁曰轡亦曰􅀈手執之而垂者曰革驂馬之內轡係於軾前謂之軜係軜之環謂之觼執兩服之四轡及兩驂之外轡而御之者曰六轡以皮為環總約六轡而遊移不定者曰遊環馬銜曰鑣鏤額有鈎當胸帶曰膺而在膺有樊纓樊馬大帶纓駚也鈴在鑣曰鑾在軾曰和或曰乘車之鑾在衡軫上橫木當隂曰軾却暑雨曰蓋亦曰轑空用朱鞹蔽旁曰簟茀析竹所為並見齊詩載驅藏用不常故經傳或有或無加木於車旁以防傾側曰輔詩無棄爾輔木止車將行則發之曰軔亦曰柅挽以上車之索曰綏尊者别有器如短梯者曰􅀢凡兵車曰軘輣取其屯衛朋屯又曰輶車取其輕疾如猶如巢其上而望敵者曰轈攻城曰臨衝轒䡝婦人車及載衣物者曰輜軿蓋即施簟茀者以其漆而黑者故曰輜可以蔽屏故曰軿又曰輼輬取其如窗牖可開閉也器車及柅行載物者曰輀輴輇三者名殊義同四輪而卑取其安而不傾覆也又有大車曰輂取其載之多小車曰軺人助挽者曰輦今之大車其輂之類小車其軺之類與此其大略耳仰觀乾象若五車軫輻車府車肆甚詳故聖王經略中原車制與經界相表裏實制戎馬之精意而平居則以之辨等威學者則以之觀材藝其用為不小矣後世率從簡便平居則車肩輿名存實亡識者謂以人代畜而深非之至於車戰之法遂不可復一有戎騎充斥更不可制卒有虔劉邊陲之禍今平國之人一議及此遂謂必不可復然則古先哲王豈故為此遲頓之器而費無益之財上天抑豈設此無用之象耶殊不知步騎今雖易辨而其敗莫能支車法始雖未易卒辦而其功則甚博今人徒計其始之難易而不要其終之利害譬之作室者北人多以甄土為壁每遇火災不過數十家止矣南人皆蘆竹為壁每延燒數千家及其重建則復如之徒取其始之易而不顧其後之害何以異此昔魏勝造如意車用之輒效惜乎其法不傳方今歲有甲兵之禍盍召諸色人等有巧思者倣此意而斟酌之成造演習務欲脫駕輕易轉折便利縱送擊刺銃炮火器靡不如意行則為竒兵突擊止則為營在外庶可以遏奔突之勢亦制勝之一事也論車制夾漈鄭氏車説曰聖人作車圜而為輪方而為輿曲而為輈皆有制度運而無窮無作則止者輪也掬之乎上拱之乎下者輿也載欲凖行欲利以需為病以覆為戒者輈也輪以運輿以載輈以服三者備然後行故兵車乘車之輪各六尺有六寸田車之輪六尺有三寸轂以利轉輻以直指牙以固抱轂之材中以虛受軸大穿為賢小穿為軹外以實受軸故二分在外一分在內轂末則軹是也轂之約則篆是也軸之近轂則謂之股近牙則謂之骰骰入轂中謂之災骰入牙中謂之蚤夫牙之材或謂之渠其大足以包輻故也或謂之揉揉木以為之故也轂又有革以􅞮之輻有綆以固之牙又有漆以飾之此輪之制也即輿以考之兩騎上出式者較也較下橫一木者式也軹則騎之植者以其旁止於此故曰軹轛則式之植者對人而言故曰轛輿後橫木則曰軫式前橫木則曰軌此輿之制也即輈以考之國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺適當伏免圍在前持衡則為頸圍在後承軫則為踵圍此輈之制也且輪之中有軸所謂軸有三理也輿之下有轐所謂加軫與轐是也輈之前有衡所謂衡任是也軸末則有轊助輻則曰輔輿間橫木則曰軫繫木橫輿則曰輹大車舟端則曰輗小車輈端則曰軏其制雖考工記無所見要其材皆相資以致用缺一不可故軫可以名輿可以名車達常可以名部軫前橫木可以名輅此又因一材而通名之也其為車也有長轂者有短轂者有杼輪者有侔輪者有反揉者有仄揉者有兩輪者有四輪者有輻者有無輻者有曲轅者有直轅者有一轅者有兩轅者有直輿者有曲輿者鈎輿曲輿有廣箱者有方箱者有重較者百單較者或駕於馬或駕於牛或挽以人或飾以物或飾以漆或朴以素皆因宜以為制稱事以為之文也圖書編卷一百二十五
