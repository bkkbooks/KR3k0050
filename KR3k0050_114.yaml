body:
  text: 圖書編卷一百十四明章潢撰律吕旋宫納音體用一原圗敘天地之道隂陽五行盡之天干地支即隂陽五行參差錯綜以盡其變化之道者也聲音者陽氣之發宣五聲即五行之氣而律吕非即五聲之節奏乎其聲五而律吕各六非即天地之五行而子午隂陽各六之義乎世之論樂者皆曰黃鍾起於子㽔賔起於午以十二律應十二月其聲音之清濁髙下一以隂陽之消息盈虛凖之然於天地之太隂太陽少隂少陽支干五行之變化未之明焉欲其聲音與天地相應無是理也况聲音即天地自然之樂非人為可得而參者若於天籟谷響未能心契神解惟擬議於竹管之短長斟酌乎古人之論説要皆執一己之意見以測度乎天地之節宣又何怪乎古樂之不復作乎噫執泥器數固無當於作樂崇德聞樂知德之訓然於隂陽五行支干之義而心誠求之則律吕旋宫納音體用一原之道或者其有通乎大哉律乎其天地隂陽之中乎民之所受以生以為心者乎方其隂陽未形渾淪一中天地萬物敦化統同樂之本也及其隂陽既行天地化生髙下散殊禮制肇興禮備而樂生矣是故聖人察天地之中法隂陽之變以為之律文之五聲播之八音奏之郊廟用之朝廷以宣八方之風以平天下之情於是天命人心流行不息合化同風萬殊統一聖人有樂之用其律之所為乎吾聞律有十二六為律六為吕律法也律以統氣類物吕侣也吕以助陽宣氣為道不同其中一也是故冬至子中太陽陽生日光在地聚以為聲是曰黃鍾大吕者太陽陽吕以太隂之隂納丑上侣於太陽之陽者也雨水寅中少隂陽生萬物湊地而出是曰太簇夾鍾者少隂陽鍾以少陽之隂納卯兼輔少隂之陽也榖雨辰中少隂之隂陽生為太隂先是曰姑洗仲吕者中陽之吕以太隂之隂納已上侣於少隂之隂之陽也夏至午中太隂陽生草木之實𬎼𬎼陽在外也故曰𬎼賔林鍾者太陽鍾也以太陽之陽之隂納未藂助太隂之陽也處暑申中少陽陽生太陽在地上夷天則是曰夷則南吕者少陽陽吕以少隂之隂納酉侣於少陽之陽也霜降中少陽之陽陽生日晷在戍陽無餘氣是曰無射應鍾者少陽之陽陽鍾以太陽之隂納亥上應少陽之陽也然律呂有六彚之惟三律陽也陽之陽三太陽之陽黃鍾之宫子少陽之陽夷則之宫申少隂之隂之陽姑洗之宫辰陽之隂三少隂之陽太簇之宫寅太隂之陽𬎼賔之宫午少陽之隂之陽無射之宫戍隂之陽三太陽之隂應鍾之宫己少陽之隂夾鍾之宫酉太陽之陽之隂林鍾之宫丑隂之隂三太隂之隂仲吕之宫亥少隂之隂南吕之宫卯太隂之陽之隂大吕之宫未傳曰五聲之本生於黃鍾之律九寸為宫損益以定商角徴羽九六相生隂陽相應有三統之義焉是故聖人為之旋宫之制冬至太陽之陽律起黃鍾之宫其積五百三十一萬萬四千四百一十萬下生太陽陽之陽吕林鍾之宫徴太陽之隂隂吕上生少隂陽律太簇之宫商少隂陽律下生少隂隂吕南吕之宫羽少隂陽隂吕上生少隂陽之陽律姑洗之宫角而黃鍾太陽之均備矣於是少隂隂之陽律起姑洗之宫其積四百一十九萬萬九千四十萬下生太陽隂吕應鍾之宫徴太陽陽吕上生太隂陽律𬎼賔之宫商太隂陽律下生太隂陽之隂吕太吕之宫羽太隂之陽隂吕上生少陽之陽律夷則之宫角而姑洗中陽之均備矣於是少陽陽律起夷則之宫其積三百三十一萬萬七千七百四十萬下生少陽隂吕夾鍾之宫徴少陽隂吕上生少陽隂之陽律無射之宫商少陽之陽律下生太隂隂吕仲吕之宫羽太隂太吕上生夷則音角歸太陽陽律黃鍾之宫而三分損益之法不行焉此旋宫所以止於仲吕而不返而夷則少陽之均終焉然律紀三均音通五氣是故黃鍾太簇姑洗𬎼賔夷則無射之宫為六戊六壬為太陽之陽六丙為太陽之隂六申為少隂之陽六庚為少隂之隂太陽之陽為羽太陽之隂為徴少隂之隂為商少隂之陽為角太吕夾鍾仲吕林鍾南吕應鍾之宫為六己六癸為太隂之隂六丁為太隂之陽六乙為少陽之隂六辛為少陽之隂太隂之隂為羽太隂之陽為徴少陽之隂為角少陽之陽為商傳曰天有五行地有六氣五六者天地之中合也是故聖人為之納音之制嵗天正冬至日甲起子坤與震交有太隂庚金之化故黃鍾甲子納音首商其吕曰乙丑乙丑金隔八生夷則壬申金其吕曰癸酉癸酉金隔八生姑洗庚申金其吕曰辛巳為商三辛巳隔八為戊子氣行少隂丙火故黃鍾戊子納音次徴其吕曰己丑己丑火隔八生夷則丙申火其吕曰丁酉丁酉火隔八生姑洗甲辰火其吕曰乙巳為徴三乙巳隔八為壬子氣行少陽甲木故黃鍾納音次角其吕曰癸丑癸丑木隔八生夷則庚申木其吕曰辛酉辛酉木隔八生姑洗戊辰木其吕曰己巳為角三己巳隔八為丙丁氣行太陽壬水故黃鍾納音次羽其吕曰丁丑丁丑水隔八生夷則甲申木其吕曰乙酉乙酉水隔八生姑洗壬辰水其吕曰癸巳為羽三癸巳隔八為庚子氣行中央戊土故黃鍾納音次宫其吕曰辛丑辛丑土隔八生夷則戊申土其吕曰己酉己酉土隔八生姑洗丙辰土其吕曰丁巳為宫三而三陽甲子之音備矣夏至日甲起午乾與巽交有太陽辛金之化故𬎼賔甲午納音首商其鍾曰乙未乙未金隔八生太簇壬寅金其鍾曰癸卯癸卯金隔八生無射庚戍金其鍾曰辛亥為商三辛亥隔八為戊午氣行少陽丁火故𬎼賔納音次徴其鍾曰己未己未火隔八生太簇丙寅火其鍾曰丁卯丁卯火隔八生無射甲戌火其鍾曰乙亥為徴三乙亥隔八為壬午氣行少隂乙木故𬎼賔納音次角其鍾曰癸未癸未木隔八生太簇庚寅木其鍾曰辛卯辛卯木隔八生無射戊戍木其鍾曰己亥為角三己亥隔八為丙午氣行太隂癸水故𬎼賔納音次羽其鍾曰丁未丁未水隔八生太簇甲寅水其鍾曰乙卯乙卯水隔八生無射壬戍水其鍾曰癸亥為羽三癸亥隔八為庚午氣行中央己土故𬎼賔納音次宫其鍾曰辛未辛未土隔八生太簇戊寅土其鍾曰己卯己卯土隔八生無射丙戍土其鍾曰丁亥為宫而三鍾甲午之音備矣傳曰樂均紀之以三平之以六成於十二天之道也窮本知變則天道在我萬理一理萬心一心生生不窮合化統同此之謂聖神化之功極此之謂盡性至命之終律紀元氣亥子之間實無聲無臭之始一陽既生黃鍾宫動子生丑丑生寅寅生卯卯生辰辰生巳巳生午午生未未生申申生酉酉生戍戍生亥而太極一元之道備矣太陽始於子而極於巳其交在丑太隂始於午而極於亥其交在未少隂始於卯而極於酉其交在辰少陽始於申而極於寅其交在戍子丑寅卯辰巳六辰屬天太陽所以始於子而終於巳也午未申酉戍亥六辰屬地太隂所以始於午而終於亥也少隂始於卯終於酉少陽始於申終於寅皆天地之交也太陽之陽子下生太陽陽之隂丑太陽之隂隂丑上生少隂之陽寅少隂之陽寅下生少隂之隂卯少隂之隂卯上生少隂之陽辰少隂之陽辰下生太陽之隂巳太陽之隂巳上生太隂之陽午太隂之陽午下生太隂之隂未太隂之隂未上生少陽之陽申少陽之陽申下生少陽之隂酉少陽之隂酉上生少陽之陽戍少陽之陽戍下生太隂之隂亥始於太陽之陽終於太隂之隂而三分損益之法不行焉此律吕之道所以往而不返也又曰三分損益隂陽生物之則也劉光漢問納音首金何謂曰天正冬至日甲起子坤與震交一陽初生有太隂庚金之化故黃鍾納音始於甲子商也天正夏至日甲起午乾與巽交一隂初生有太陽辛金之化故𬎼賔納音始於甲午商也又問黃鍾商納音以為太陽陽金又言太隂庚金之化何如曰黃鍾位子本是太陽之陽然坤與震交震固太隂庚金耳𬎼賔位午本是太隂之陽然乾與巽交巽固太陽辛金耳或問三統之義曰非臆説也玄圗云自子至辰自辰至申自申至子冠之以甲而章會統元與月食俱沒玄之道也鬱林吳績釋曰太初上元正月甲子朔旦冬至無餘分後千五百三十九嵗甲辰朔旦冬至無餘分又千五百三十九嵗甲申朔旦冬至無餘分十九嵗為一章閏分盡二十七章五百一十三嵗為一會月食盡三會八十一章千五百三十九嵗為一統朔分盡歷子辰申五統凡四千六百一十七嵗為一元六甲盡由是言之三統之説其來有自諸説蓋未嘗深考云又問律吕以戊己起土又以納音始金或曰納音始角木何如曰冬至天太隂四與地太隂六交而天五戊土生其中矣律吕起戊己天地之始也天太隂曰震地太隂曰坤冬至坤與震交日甲在子天太陽曰乾地太陽曰巽夏至乾與巽交日甲在午震為庚金巽為辛金納音首商氣化之始也甲為少陽角木乙為少隂角木納音首甲日行之始也萬徑千蹊同歸一轍求其自然之故而律吕之理得矣吕巾石公古義其論吕律分寸雖發明蔡氏之説然於十二律一原諸天地之太陽太隂少陽少隂二十四氣中節以為之凖且以納音起甲子三統為子辰申義頗精密亦律音之所當究心者故併録之律尺考古人制尺以調律纍黍以定尺然隨代變易訖無定凖漢志云律本起於漢黃鍾之長以羊頭山秬黍中者一黍之廣度之九十黍為黃鍾之長盡一黍約一分九十黍九寸律也此必上古以來有所傳授故歷代因之以定律尺之度周禮考工記於案言十有二寸於鎮圭言十有二寸又言桓圭九寸是周人以十寸為尺故歷代以周尺為古尺漢有劉歆銅斛尺蔡雍銅籥尺建武銅尺漢官尺魏杜夔尺田父玉尺梁表景尺晉始平古銅尺汲冢玉律尺錢樂之渾儀尺隋開皇水尺官尺後魏元延眀尺梁劉曜土圭尺五代王朴律凖尺宋和峴尺大府布帛尺李照尺胡瑗阮逸尺由是觀之尺隨代更律隨尺異雖有慕古之君出而正之終亦不能歸一豈非神理難全器數形拘耶按晉荀朂依周禮制尺謂之晉前尺與劉歆銅斛尺建武銅尺祖沖之銅尺汲冢玉律尺其度皆合隋意以其與周尺同因以較諸代之尺田父玉尺梁表尺加朂尺七釐漢官尺加朂三分三釐始平銅尺杜夔尺加朂四分渾儀尺加朂六分四釐蔡雍銅籥尺加朂一寸五分八釐元延眀尺加朂五分八毫開皇水尺加朂一寸八分六釐劉曜土圭尺加朂一寸五分夫史臣稱朂推考百代之法術極精密及阮咸聽其所造之樂則又以鍾律聲髙樂音哀思及得始正銅尺果長朂所造四分是豈可以朂所造獨是而諸代盡非乎宋仁宗朝詔丁度詳定鄧保信等所定律尺則以和峴之景表尺為長王朴律凖尺比漢錢尺長二分比景表尺短四分有竒胡阮保信及李照所用大府等布帛尺其制彌長去古彌逺不可依用乃再造景表尺上之而髙若諾卒用漢錢尺依隋書定十五尺藏於太常寺夫宋祁以胡瑗所造鍾律與古法相合隋唐以來諸儒皆不及瑗而髙若訥則以為不可依用然則鍾律尺度之中將何所據而為定依乎夫器有形而易拘者也聲無形而難調者也以為校黍則黍有大小之異纍有長廣之殊黍不可盡信矣以為定於人之聲則喉有修短之不齊音有清濁之各異聲不可以盡依矣故歷代以來尺之長短杳無定凖樂之髙下茫無定聲擬議紛紛率莫能決如此嗟乎形質難均物情自然是以聖人制度立法存其大概要在聰明察之耳今之制律者必曰纍黍定尺固無恰好符契之妙若曰棄黍為尺亦無特契之理乎謂先守纍黍之法以為律尺大分資藉之地後參古人耳聽心會之術以為考聲命尺之本庶幾所謂元聲者必於此而得之不然止據區區纍黍之法以為定尺之要恐未免毫釐之差遂致千里之謬矣又何望夫夔曠之閫域也哉律尺論馬端臨曰古人言律為萬事本度量衡皆由焉律以和聲度以審度量以嘉量衡以權衡度有長短量有大小衡有輕重雖庸愚之人皆能知之至律之於聲其或雅或淫或和或乖則雖賢哲之士不能遽曉蓋四者之中議律為難度或長或短量或大或小衡或輕或重三物皆生民日用不可缺者然以四海九州觀之未有千年而同一度量衡者也以古往今來觀之未有千里而同一度量衡者也蓋隨世立法隨地從宜取其適於用而初無害於事固不必盡同也至於律則差之絲忽不能以諧聲聲不諧不足以為樂樂不和不足以致治蓋四者之中制律為尤難是以古人之於律或求之於絲竹伶倫之管京房之凖是也或求之於金石編鍾編磬鎛鍾簴磬之屬是也雖曰假器物以求之然心之精微口不能授性所解悟筆不能書假如有人與后夔伶倫並世而生亦豈能盡得其依律和聲之法乎後之儒者病樂之不和議欲更律而更律之法或取之纍黍或求之古度量然纍黍之法漢制特以較度量衡所謂黃鍾之長黃鍾之籥黃鍾之重云者特以明三物之與律相表裏耳未嘗専言纍黍以為律也至於古之度與量則周釜漢斛與魏晉以來尺十有五種相去且千年其流傳至於今者是乎非乎不可得而詳也倘其果為古制則不知造此器之時其與虞朝之同律度量衡周王之考制度果無纎毫之差乎亦不可得而詳也而方倀倀然於千百載之後搜求古雅之器於荒丘古墓之中而自以為得之蓋亦疏矣蓋律度量衡雖曰相為表裏然而至易曉者度量衡也至難知者律也隨時而變易雖易而無害於事者度量衡也假如古者度短量小衡輕後世度長量大衡重則當其或短或小或輕之時多取之或長或大或重之時少取之而斂散同此一器何害於事乎周取民之制什一漢取其五秦取其大半蓋病在重不必大其器也一定而不易易則害於樂者律也今失其難者而反取則於其易者失其不可易者而反取則其於屢易者何哉竊以為必欲制律必如杜夔荀朂阮咸張文收之徒自有宿悟神解如聽牛鐸而知其可諧音聽玉磬而知其為閏月所造之類而後可以語此不然専求之於纍黍或專求之於周釜漢斛魏尺之屬無異刻舟而尋劒也李照胡瑗房庶之説皆以黍求律者也范蜀公力主房庶之説以為照以縱黍纍尺管空徑三分容黍千七百三十則太長瑗以橫黍纍尺容黍一千二百而空徑三分四釐六毫則太短皆以尺生律不合古法今庶所言實千二百黍於管以為黃鍾之長就三分則為空徑則無容受不合之差較前二説為是纍千百言大要不過如此愚請得而詰之夫古人之制律管皆有分寸如十二律管皆徑三分圍九分黃鍾之管長九寸自大吕以下以次降殺是也然則欲制律必先定分寸而古今之分寸不可考矣是以隋書因漢制之説以一黍為一分則是十黍為一寸分寸既定然後管之徑圍可定管之徑圍既定然後律之長短可定瑗與照雖有縱橫之異然以黍定分以黍之分定管之圍徑則一也今庶既盡闢縱橫之説而欲以是千二百黍亂實之管中隨其長短斷之以為黃鍾九寸之管取三分以度空徑則不知庶之所謂空徑三分之管既非縱黍之分復非橫黍則必别有一物為度以起分倘别有一物為度以起分則只須以其三分為徑以九十分其長為黃鍾之管為律本不因於黍矣何煩實黍於管又何煩於漢書中增益八字以求合千二百黍之數乎此愚所以未敢以為通論也律原此下八假皆大明集禮所載今存之以備考班固漢前志曰黃帝使伶倫循大夏之西崑崙之隂取竹嶰谷生其竅厚均者斷兩節間而吹之以為黃鍾之宫制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六此黃鍾之宫而皆可以生之是為律本至治之世天地之氣合以生風天地之風氣正而十二律定劉昭漢後志曰伏羲作易紀陽氣之初以為律法建日冬至之聲以黃鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽應鍾為變宫𬎼賔為變徴此聲氣之元五音之正也又曰截竹為律吹以考聲列以候氣道之本也律數後漢鄭康成月令注曰凡律空圍九分蔡雍銅籥銘曰籥黃鍾之宫長九寸空圍九分容秬黍一千二百粒稱重十二銖兩之為一合三分損益轉生十一律韋昭周語注曰黃鍾之變也管長九寸徑三分圍九分因而九之九九八十一故黃鍾之數立焉按周徑之説開端於漢律厯志而蔡氏遂創為徑三分之説晉孟康韋昭又續為徑三分圍九分之説以九章少廣內祖氏審率乘除之止得空圍內面羃七分七釐竒乃少一分九十二釐竒空圍內積實止得六百三十六分乃少一百七十三分竒如此則黃鍾之管無乃太狹乎黃鍾空積忽微若徑內差一忽即靣羃及積所差忽數至多矣毫釐之差千里之失豈不悮乎胡氏律吕議曰按歷代律吕之制黃鍾之管長九十黍之廣積九寸度之所由起也容千二百黍積八百一十分量之所由起也重十有二銖權衡之所由起也既度量權衡皆出於黃鍾之籥則黃鍾之籥容受可取四者之法交相酬驗庶不失其實也後世儒者不能實知權衡之法但制尺求律便為堅證因謂圍九分者取空圍圎長九分耳以是圍九分之悮遂有圍三分之説若從徑三圍九之法則黃鍾之管止容九百黍積止六百七分半如此則黃鍾之聲無從而正權量之法無從而生周之嘉量漢之銅斛皆不合其數矣鍾均通典曰古之神瞽考律均聲必先立黃鍾之均黃鍾之管以九寸為法故用九自乘為管絲之數其增減之法又以三為度以上生者皆三分益一下生者皆三分去一宫生徴徴生商商生羽羽生角此五聲小大之次也是黃鍾為均用五聲之法以下十一辰辰各有五聲其為宫商之法亦如之辰各有五聲各為十六聲是十二律之正聲也按宫聲之數八十一商聲之數七十二角聲之數六十四徴聲之數五十四羽聲之數四十八是黃鍾一均之數而十一律於此取法焉通典所謂以下十一辰辰各五聲其為宫為商之法亦如之者是也夫以十二律之宫長短不同而其臣民事物尊卑莫不有序而不相凌犯良以是耳中聲昔伊耆氏實始作樂以謂土位中央而於隂陽為沖氣籥生黃鍾而於律吕為中聲始乎土鼓中聲出焉中乎蕢桴中聲發焉卒乎葦籥中聲通焉樂之所本如此所以為天地之和人道之正論三才之道者參和為沖氣論五六之數者一貫為中合故參兩合而五聲形焉參五合而八音生焉二六合而十二律成焉其取數雖多要之會歸於中而已是樂以太虛為本而聲音律吕又以中聲為本中聲正則鄭衛哇淫之聲自然可黜雅部之樂自然可復故談樂者不可不知中聲之為要也子聲鳬氏為鍾以律計自倍半半者準半正聲之半以為十二子律制為十二子聲比正聲為倍則以正聲於子聲為倍以正聲比子聲則子聲為半但先儒什用倍聲自有二義一義云半以十二正律為十子聲之鍾二義云從於中宫之管寸數以三分益一上生黃鍾以所得管之寸數然半之以為子聲之律其為半正聲之法者以黃鍾之管正聲九寸為均子聲則四寸半黃鍾下生林鍾之子聲林鍾上生太簇之子聲太簇下生南吕之子聲南吕上生姑洗之子聲姑洗下生應鍾之子聲應鍾上生𬎼賔之子聲𬎼賔下生大吕之子聲大吕下生夷則之子聲夷則上生夾鍾之子聲夾鍾下生無射之子聲無射上生仲吕之子聲此半正聲法其半相生之法者以正仲吕之管長六寸仲吕上生黃鍾黃鍾下生林鍾三分去一還以下生所得林鍾之管寸數半之以為夾鍾子聲之管以次而為上下相生終於仲吕皆以相生所得之律寸數半之各以為子聲之律故有正聲十之子聲十二分大小有二十以為二十四鍾通於二神迭為五聲合有六十聲即為六十律其正管長者為均之時則通用正聲為五音正管短者為均之時則通用子聲為五音皆三分益一減一次還以宫商角徴羽之聲得調也和聲漢前志曰黃鍾為宫則太簇姑洗林鍾南吕皆以正聲應無有忽微不復與他律為役者同心一統之義也非黃鍾而他律雖當其月自宫者則其和應之律有空積忽微不得其正此黃鍾至尊無與並也按黃鍾為十二律之首他律無大於黃律故其正聲不為他律役其半聲當為四寸五分而前乃云無者以十七萬七千一百四十七之數不可分又三分損益上下相生之所不及故亦無所用也至於大吕之變宫夾鍾之羽仲吕之徴𬎼賔之變徴夷則之角無射之商自用變律半聲非復黃鍾矣此其所以最尊而為君之象然亦非人之所能為乃數之自然他律雖欲役之而不可得也此一節最為律吕旋宫用聲之綱領古人言之已詳唯杜佑再生黃鍾之法為得之而他人不及也候氣候氣之法為室三重斥閉塗釁必周密布緹縵室中以本為按每律各一按內卑外高從其方位加律其上以葭灰實其端覆以緹素按歷而候之氣至則吹灰動素小動為氣和大動為君弱臣強専政之應不動為君嚴猛之應其升降之數在冬至則黃鍾九寸大寒則大吕八寸三分七釐六毫雨水則太簇八寸春分則夾鍾七寸四分三釐七毫三絲榖雨則姑洗七寸一分小滿則仲吕六寸五分八釐三毫四絲六忽夏至則𬎼賔六寸二分八釐大暑則林鍾六寸處暑則夷則五寸五分五釐五毫秋分則南吕五寸三分霜降則無射四寸八分八釐四毫八絲小雪則應鍾四寸六分六釐按陽生於復隂生於姤如環無端今律吕之數三分損益終不復始何也曰陽之升始於子午雖隂生而陽之升於上者未巳至亥而後窮上反下隂之升始於午子雖陽生而隂之升於上者亦未巳至已而後窮上反下律於隂則不書故終不復始也是以升陽之數自子至巳差強在律為尤強在吕為少弱自午至亥漸弱在律為尤弱在吕為差強分數多寡雖若不齊然其絲分毫别各有條理此氣之所以飛灰聲之所以中律也或曰易以道隂陽而律不書隂何也曰易者盡天下之變善與惡無不備也律者致中和之用止於至善者也以聲言之大而至於雷霆細而至於蠛蠓無非聲也易則無不備也律則寫其所謂黃鍾一聲而已矣雖有十二律六十調然實一黃鍾也是理也在聲為中聲在氣為中氣在人則喜怒哀樂未發與發而中節也此聖人所以一天人贊化育之道也論品擇樂工之教薑夔進大樂議於朝言紹興大樂多用大晟所造有編鍾鎛鍾景鍾有特磬玉磬編磬三鍾三磬未必相應塤有大小簫箎遂有長短笙竽之簧有厚薄未必合度琴瑟絃有緩急燥濕軫有旋復柱有進退未必能合調總衆音而言之金欲應石石欲應絲絲欲應竹竹欲應匏匏欲應土而四金之音又欲應黃鍾不知其果應否樂曲知以七律為一調而未知度曲之義知以一律配一字而未知永言之旨黃鍾奏而聲或林鍾林鍾奏而聲或太簇七音之協四聲各有自然之理今以平入配重濁以上去配輕清奏之多不諧協八音之中琴瑟尤難琴必每調而改弦瑟必每調而退柱上下相生其理至妙知之者鮮又琴瑟聲微常見蔽於鍾磬鼓簫之聲匏竹土聲長金石常不能以相待往往考擊失宜消息未盡至於歌詩一句而鍾四擊一字而竽一吹未叶古人稿木貫珠之意况樂工茍焉占籍擊鍾磬者不知聲吹匏者不知冗操琴瑟者不知絃同奏則動手不均迭奏則發聲不屬比年人事不和天地多忒由大樂未有以格神人召和氣也宫為君為父商為臣為子宫商和則君臣父子和徴為火羽為水南方火之位北方水之宅常使水聲衰火聲盛則可助南而抑北宫為夫徴為婦商雖父宫實徴之子常以父助夫子助母而後聲成文徴盛則宫唱而有和商和則徴有子而生生不窮休祥不召而自至災害不祓而自消聖主方將講禮郊見願召求知音之士考正太常之器取所由樂曲調理五音櫽括四聲而使之叶和然後品擇樂工其上者教以金石絲竹匏土歌詩之事其次教以匏擊干羽四金之事其下不可教者汰之雖古樂未易遽復而追還祖宗盛典實在兹舉正樂要法兹欲由今之器考古之聲去其惉滯浮靡之習還其中和雅淡之風則其法有四焉一曰眀候氣之理蓋律吕之制隂陽各六先王凖之以應十有二月之中氣如冬至氣至則黃鍾之管飛灰衝素而大寒以下各以其陽月隨而應焉夏至氣至則𬎼賔之管飛灰衝素而大暑以下各以其隂月隨而應焉播之音樂取其中月之律用之班固所謂風氣正而十二律定者此也今當備其筌氣閉以重室按以方位實以葭灰覆以緹素以候其氣之所應使隂陽之用各順其應則氣和聲和八風從律而不姦矣二曰較長短之度蓋黃鍾律吕之首也在氣為元氣在聲為元聲前漢志曰隂陽相生自黃鍾始言十二律所以受法也以古制考之均其長得九寸審其圍得九分積其實則肥瘠之中者可容千二百黍此黃鍾之制所以定黃鍾定則隔八律而相間以陽律生隂律曰下生三分長而損其一則林鍾以下諸律可定矣隂律生陽律曰上生三分長而益其一則太簇以下諸律可定矣其徑也各三分有竒其生也皆左旋以為法然後長短各中其節矣三曰詳考聲之義蓋十二律有長短短者其聲髙輕清而剽疾長者其聲下重濁而舒徐其清濁長短之間而宫商角徴羽之五聲因以辨也然宫之與商商之與角徴之與羽相去皆一律角之與徴徴之與宫相去獨二律一律則近而和二律逺而不相及故近宫收一聲比宫稍下謂之變宫近徴收一聲比徴稍下謂之變徴此亦出於自然也五聲者正聲故以起調畢曲為諸聲之綱至二變聲則宫不成宫徴不成徴不比於正音但可以濟五音之所不及而已有五音而無二變亦豈可以成樂哉此之謂七聲也然宫為聲氣之中自宫而下屬乎隂而未唱自宫而上屬乎陽而始和故宫在五行屬土而為中聲也然十二變律之聲如黃鍾八寸一分全律也仲吕上生林鍾不及八寸謂之執始則謂子聲也十二月半律之聲如黃鍾正聲九寸則變聲四寸半仲吕為宫則黃鍾為子而用其半是謂半聲焉京房所謂一為變聲四為變始黃鍾終仲吕凡十二正聲始執始終南事凡四十八變聲者此也四曰逹旋宫之數蓋律以正聲而辨聲以十二律而和一律之中各具五聲五聲之外又有二變則君臣民物不相凌犯而十二律皆可為宫以統衆律黃鍾亦可以次而為他律役矣如黃鍾為宫則太簇為商姑洗為角林鍾為徴南吕為羽應鍾為變宫而林鍾為變徴此大吕之一均也而餘可知矣禮運所謂旋相為宫者此也候氣之理眀則天機以審長短之度較則器數以精考聲之義詳則條理以察旋宫之數逹則節奏之妙以曲盡而無遺矣先王之所以作樂崇德者寧有外於此乎三代而下如師曠識紂樂於濮水季子美韶舞於上國者鮮矣天時地氣之弗審人聲樂音之弗諧雖以一代宗儒而或眩於金石法錢之求泥於蠶絲馬尾之察又何以神晤於千載之下而弼成夫金聲玉振之盛也哉諸家論樂考國語周景王將鑄無射問律於伶州鳩對曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾百官軌儀紀之以三天地人正之以六正律成於十二律吕天之道也夫六中之色也故名之曰黃鍾所以宣養六氣九德也由是第之曰太簇淮南子曰規始於一一不生故分而為隂陽隂陽合和而萬物生故曰一生二二生三三生萬物三參物三三如九故黃鍾之九寸而宫音調因而九之九九八十一故黃鍾之數立太史公曰細若氣微若聲聖人因神而存之雖妙必效言黃鍾始於聲氣之元也班固曰律者致中和之用止於至善者也以聲言之大而至於雷霆細而至於蠛蠓無非聲也律則寫其黃鍾一聲而已雖有十二律六十調然實一黃鍾也是理也在聲為中聲在氣為中氣在人則喜怒哀樂未發與發而中節也此聖人所以一天人贊化育之道也濓溪周子曰不復古禮不變今樂而欲至治者逺矣伊川程子曰律取黃鍾黃鍾之聲亦不難定世自有知音者參上下之聲考之自得其正既得其正將黍以實其管看管實得幾粒然後推而定法可也張子橫渠曰聲音之道與天地通蠶吐絲而商絃絶木氣盛則金氣衰乃此理自然相應今人求古樂太深始以古樂為不可知律吕有可求之理惟德性淳厚者能知之按三儒之説周氏以復古禮為先程氏以致聲音為正張氏則以人之德性為本三人者可謂窮本知變逹樂之要者矣宋天子鋭意古樂而胡瑗范鎮司馬光輩方講求鍾律遍訪四方草澤以應詔而三大儒乃遺焉使在講求之列其所次列論敘必有可觀古樂或有可復之理朱子曰宫之一聲在五行為土在五常為信在五事為思蓋以其正當衆聲和與未和用與未用隂陽際會之中所以為盛若角雖當五聲之中而非衆聲之會又有宫當配仁之説胡五峰説蓋以仁當四德之元而有包四德之義則宫之統五聲仁之包五常蓋有並行而不悖者何奪彼與此哉楊亷論元聲書曰李公律吕書即其黃鍾三寸九分算之由十一月之黃鍾至十二月之大吕增六分由大吕至正月之太簇增九分由太簇至二月之夾鍾增九分由夾鍾至三月之姑洗增九分由姑洗至四月之仲吕增九分由仲吕至五月之𬎼賔增九分由𬎼賔至六月之林鍾減六分由林鍾至七月之夷則減九分由夷則至八月之南吕減九分由南吕至九月之無射減九分由無射至十月之應鍾減九分由應鍾復回十一月之黃鍾減九分其所增皆以九分而所減亦皆以九分惟黃鍾之於大吕𬎼賔之於林鍾其所增減比之他律不同然實各有至理蓋大吕當五隂之盛一陽始生則是陽雖進而尚弱林鍾當五陽之盛一隂始生則是陽雖退而尚強大吕林鍾固宜其增減僅得三分之二也律管長短一本隂陽升降之氣所謂律厯同道於此乃見執事書序髙文所謂黃鍾三寸九分升陽漸益至𬎼賔而得九寸歸陽漸損至黃鍾仍得三寸九分所謂三分損益者以對待言隔八相生者以正徴言與夫所謂喉齶舌齒唇之聲證宫商角徴羽之音之書之要一一拈出以示人可謂透其關鍵而得其三昧矣今以司馬遷黃鍾九寸上下相生損益算之黃鍾生大吕減六分竒大吕至太簇減三分竒太簇至夾鍾減五分竒夾鍾至姑洗減三分竒姑洗至仲吕減五分竒仲吕至𬎼賔至林鍾增二分竒林鍾至夷則增四分竒夷則至南吕增二分竒南吕至無射增四分竒無射至應鍾至黃鍾增四寸三分竒厯家二十四氣每氣算之不差毫忽若一氣短二分竒又一氣短三分竒又一氣短四分竒又一氣短五分竒又一氣短六分竒又一氣短四寸三分竒則月之大者過於三十日月之小者不及二十九日不惟無以成嵗而律管候氣亦不可用矣且隂氣自冬至後以漸而升而律反減則氣有餘而管不足陽氣自夏至後以漸而降而律反增則氣不足而管有餘其亦背馳之甚哉謂司馬遷之差處正在於此謂李書之得處正在於此至於從前宫羽之舛此清濁之逆施正由黃鍾一差諸謬所必至者而不俟於言也亷嘗見歙人鮑泰希止著天心復要書以眀厯大概氣朔八十年一齊厯家每嵗二十四氣於時之八刻中往來無定鮑書所排節氣之交皆有定刻中氣之交亦有定刻如冬至乃十二月之中氣定十二時之五刻嵗嵗如此餘氣之定在某刻者亦然朱子謂厯有一定之法後人於法不知只是趕趂天之行度然則鮑書豈非有一定之法而如是哉知厯者得之則亦可以推算矣嘗以今厯氣朔校之相去特五六時却是亘古至今如此實萬年厯也鮑書謂郭守敬之法未是守敬法即今厯法我朝仍勝國之舊未嘗改也厯自漢以來亦皆不得其傳審如李書則鍾律自漢以來亦皆不得其傳而此二人者之獨見如此謂非天授不可也方今聖人在上必有軒轅命伶倫放勳命羲和之盛舉惜無以二書獻之闕下者其所係豈細故哉亷於西山蔡氏書嘗為之律吕算例於郭守敬法亦嘗為之綴算舉例然不過為二家之注腳亦終於聚鐵鑄錯耳亷於李書窺見一班半點安敢肆然輒加語於其上哉自漢以來凡論律吕而謂黃鍾長九寸者總會之律吕新書謂黃鍾長三寸九分者總會之律吕元聲今並録之以備考變樂總論宋神宗元豐中楊傑詳定大樂傑欲銷王朴舊鐘意新樂成雖不善更無舊鍾可校詔不得銷毁後輔臣按試傑乃陳朴鍾已弊者一縣樂工不平夜易之而傑不知明日輔臣至傑厲聲云朴鍾甚不叶美使樂工叩之韻更佳傑大沮按宋樂至此屢變景佑之樂李照主之太常歌工病其太濁私賂鑄工使減銅劑而聲稍清歌乃叶而照卒不知元豐之樂楊傑主之欲廢舊鍾樂工一夕易之而傑亦不知崇寧之樂魏漢津主之欲請帝中指寸為律徑圍為容盛制器不成劑量工人但隨律調之大率有非漢律本説而漢律亦不知是樂名雖曰變而實未嘗變也訂正雖詳而鏗鏘不成韻辨析雖可聽而考擊不成聲既私為工師所易而懵不復覺則三人者亦豈真為審音知律之士其暗悟神解豈足以希荀朂阮咸萬寶信都芳之萬一哉愚謂宋人多言而妬前倔強而無本類如此其説理也解經也論文也評詩也一一皆然不獨樂律而已圖書編卷一百十四
