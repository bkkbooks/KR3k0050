官逢三日上與懷寧縣廵江官接㑹逢七日下與安慶衛守老洲頭哨官接㑹如荻港營仁字號哨官逢三日上與貴池縣廵江官接㑹逢七日下與繁昌縣廵江官接㑹義字號哨官逢三日上與銅陵縣廵江官接㑹逢七日下與蕪湖縣廵江官接㑹禮字號哨官逢三日上與安慶衛老洲頭哨官接㑹逢七日下與無為州廵江官接㑹智字號哨船逢三日上與無為州廵江官接㑹逢八日下與和州廵江官接㑹如安慶衛上廵江指揮逢一日與九江衛廵江官接㑹下廵江千户逢五日與建陽縣廵江指揮接㑹建陽衛哨官逢二日上與當塗縣廵江官接㑹逢六日下與遊兵營第三哨哨官接㑹凢遇㑹哨之日但有不到者徑註單内繳報其有司廵江軄官俱各如期而至毋許相左俱取各官私記關防為准其信地内廵檢土官悉聴查㸃但有違抗開報備總官轉報本道詳奪一岸上一墩江上一船岸有警則報船江有警則報墩相應相接地里均矣但一聨之中須以水兵為主如輪日信地哨船有功水兵同之各船次之如輪日信地哨船失事水兵亦同之各船次之凢信地在一聨之内水兵不得推諉如哨官船以接㑹不在槳船代在信地接㑹不許並出但私回不到查發本船綑打追工食外一連同罪失事隱匿查發信地哨官綑打外把總官㕘究一兩岸兵船每日於所分信地擺列凢遇三府江防官將本道㑹哨簿發到本船即於簿空格内填註姓名并接到日期地方於前件下填註有事無事及陰晴風雨縁由自上水來者即刻遞下自下水來者即刻遞上各船照前填註接㑹但有不在信地者即於簿格内填註其信地其船官兵不在越過徑交與上下手官兵接去兩岸一週仍送江防官轉報不到者本道徑拏綑打仍追工食充越過官兵之賞如將㑹簿遞墩者綑究一安池大江防官本道各印發循環㑹哨簿二本各江防官即於本府信地不拘上水下水先發一本以次兩岸接㑹一週一面將簿内查覈有無不到稽誤縁由連簿報道一面再發一本接㑹各江防官凢遇暇日仍親自出江查㸃如此而官兵有不在江上者寡矣江西江湖要害長江一帶自吉安府起至峽江縣中間張家渡天井壩狗子嶺牛口江龍邱雲洲或居民窵逺墨潭桐江横釣魚臺或四壁皆山其富口石窩二處雖有人烟尤多土賊峽江縣起至豐城縣中間桐江墓膳烏口象口蓮花潭長排城排城頭潭横梁孔埠枯州斗角灘凉傘洲拖船埠黄埠腦安沙壩老蛤石小港口漳湖渡龍霧洲象牙潭爛泥灣數處港口交雜人烟稀疎尤為盗賊出没匿藏之所從此入東湖有黄溪渡趙家圍白沙寨漁門寨樊西寨焦湖坽口龍山鄔子梅岐寨南山埂康山上下蛇山五谷潭棠陰柴棚瑞洪四山三山又自樵舍昌邑迤西至具城轉折三横及中洲等處入西湖倉厫洲兩河口松門吉山鷪子口洋瀾渚溪左蠡青湖洲山青山大孤山從此出江則城子鎮至馬當内有新開口小池口楊家穴南湖嘴沿洲港鱘魚嘴黄茅潭小孤袱茅湖夾女兒港以上各處所俱稱要害春夏水漲港嶼瀰漫盗賊揚㠶縱槳勢或難當秋冬水涸支港縱横盗賊舶舟伏岸防或不及甚當晏起早住務要趕趨地頭不可貪程夜行及聴稍子哄誘致其通賊自害自吉安府萬安縣良口起至九江府彭澤縣馬當鎮止通計要害地方八十一處守備廵湖廵江廵河廵捕廵司等官共四十員座哨戰船共一百四十二隻水手共一百名添設遊兵除江道不用外每遇春夏水漲之時東湖梅岐寨添委饒州所百户一員帶領哨船八隻精兵一百四十名蛇山寨添委饒州所百户一員帶領哨船七隻精兵一百三十名徃來廵邏圖書編卷五十八
