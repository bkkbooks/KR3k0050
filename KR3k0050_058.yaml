body:
  text: 圖書編卷五十八明章潢撰萬里長江圖總叙水之大者莫大於四瀆江淮河漢是也淮漢之源在中國境内故其流短惟河源發於崑崙之西江源亦發於西戎故其流長然則中國之水源皆自西而來乎西方兊金金為水母水皆發源於西者其金生水之義乎河由西而北而東入于海江由西而南而東入于海然則海固江河之㑹而江河其殆南北兩大經絡所以㑹四方之水而歸之海矣乎江源發自岷山固屬之蜀也雲南之金沙江來自西畨而㑹于蜀江蜀果足以盡江之源乎即如江西之水其大𣲖數支其流長餘二千里㑹于九江即江西而湖廣四川可推也是圖也特記江之大勢云爾安足以盡江之源委乎若江防一節近日南直𨽻可謂密矣而盜賊即為之歛跡在他省獨不可倣而行之乎噫江防密則江中之盜熄海防密則海中之冦寧河防密則漕河之舟楫利古今法制其在典册而按圖可考要在得人以行之耳故曰其人存則其政舉江源江出岷山其源實自西戎萬山來至嘉州而沬水自嶲州合大渡河穿夷界十山以㑹之至叙州而馬湖江㑹之又十五里而南廣江㑹之至瀘州而内江又自資簡㑹之至重慶而嘉陵江自利閬果合等州㑹之至涪州而黔江合南夷諸水㑹之至萬縣而開江水自開逹等州㑹之夫然後總而入峽是江自峽而西受大水凢八及出峽而下岳陽則㑹之者洞庭湖所受湖南北諸水也又自是而下鄂渚則㑹之者漢口所受興元諸水也又自是而下黄州東四十里則㑹之者巴河也又自是而下九江則㑹之者彭蠡今名鄱陽湖所受江東西諸郡水也又自是而下則㑹之者皖水所受淮西諸水也夫然後總而入海是以自峽而東又受大水凡五畧計天下之水㑹于江者居天下之半其名稱之大而可考者凢十有三故曰江源其出如甕而能滔滔萬里達海所受者衆也嗚呼問學者可以觀矣江水經行郡邑江水自四川成都府茂州岷山發源西南至威州轉汶川過而東南至灌縣過金口至新津縣合皂江水入叙州府宜賔縣與馬湖江合東北入瀘州合江縣至瀘州東北入重慶府巴縣經涪州合州黔江忠州入䕫州府萬縣雲安奉節經瞿塘峽入湖廣荆州府歸州出硤入夷陵宜都枝江公安石首入沔陽州過雲夢澤入武昌府嘉魚縣經江夏縣東㑹漢水南過武昌縣入岳州府巴陵縣過洞庭湖東至武昌府咸寧縣東歴江西九江府徳化縣合南康府星子縣鄱陽湖入南直𨽻安慶府懷寧縣入池州府東流縣北流又折而東歴李楊河中梅根口銅陵縣東入太平府當塗縣入和州為横江入應天府上元江寧入揚州府經儀真歴泰州經常州府江陰縣江南江陰江北泰州經蘇州府常熟縣至揚州府通州入海江南常熟江北通州江源總論水必有源而源必有逺近小大不同或逺近各有源也則必主夫逺或逺近不甚相懸而有大小之殊也則必主夫大縱使近大逺微而源逺流長猶必以逺為主也况近者微逺者大乃主近而遺逺豈知源之論哉是故古之言河源者皆曰出崑崙山北陬而東行又曰河有兩源一出葱嶺一出于闐不知崑崙為正源三河合而東過蒲昌入中國自臨洮寧夏流至延綏山西兩界之間夫崑崙特河之流遶過其山麓耳非河之源也迨元窮河源使都實出西域自河州行五千里抵星宿海則是言河源者至元始得其真焉言江源者則不然謂江水出岷山東南至天彭山又東南過成都郫縣又東南過陽江又南過嘉州犍為縣又南過戎州𤏡道縣又東南過巴郡江州縣又東過涪州忠州萬州言中國之江水信得其源矣然岷山在今茂州汶山縣發源不一而亦甚微所謂發源濫觴者也及閲雲南志則謂金沙江之源出于吐蕃異域南流漸廣至于武定之金沙廵司經麗江鶴慶又東過四州之㑹州建昌等衛以逹于馬湖叙南然後合于大江趨于荆吳又緬甸宣慰司志謂其地勢廣衍有金沙江濶五里餘水勢甚盛緬人恃以為險夫以緬甸較之茂州其逺近為何如以汶山縣之發源甚微者較之緬甸濶五里餘者其大小又何如况金沙江源出于吐蕃則其逺且大也明矣何為言江源者止于蜀之岷山而不及吐蕃之犁石是舍夫逺且大者主夫近且微者以是論江之源吾不知也是故合江河二源言之鄂端諾爾即華言星宿海在吐畨西鄙犁石亦吐畨地也吐畨廖廓總屬西方河之源發于正西轉西北由積石入中華又北出長城轉東北流過河南山東至南直𨽻地方正東入海江之源亦發於西轉西南入中華過雲南諸郡南流過四川馬湖合大江轉東南荆吳至正東入海今江河二口之入東海者相距不過二三百里皆在正東則二源發於正西者當亦不甚遼絶以方求之西兊金也金乃水之所從出理或然歟或曰水必發源于山崑崙廼山之最髙廣者岷山亦髙山也江源何為不祖岷山而祖犁石即曰星宿海有泉百餘竇從平地泡出非山也何獨疑犁石未必非髙山乎安知今之主江源於岷山者無異昔之主河源於崑崙乎唐劉元鼎所探河源自以為過漢張騫矣安知今之所謂江源出吐畨犁石者非唐之劉元鼎而尚未得夫星宿海乎姑即江水來自西畨者以俟真知江源之君子云記入蜀江山六月過荆門十二碚皆髙崖絶壁嶄岩突兀則峽巾之險可知矣過碚望五龍及鷄籠山差峩正如夏雲之竒峯荆門者當以險固得名碚上有石穴正方髙可通人俗謂荆門妄也晚至峽州泊至喜亭峽州在唐為硤州後改為峽而印文則為陜州元豐中郎官何洵直建言陜與陜相亂請改鑄印文從峽至喜亭記歐陽公撰黄魯直書東山寺亦見歐陽公詩距望京門五里晩集于楚塞樓遊爾雅臺錦障亭爾雅臺者圖經以為郭景純註爾雅于此八日過下牢關歐陽公有詩云入峽水漸曲轉灘山更多即此也登三游洞泊石牌峽九日過扇子峽登蝦蟆碚碚洞相對稍西有一峯孤起侵雲名天柱峯自此勢稍平晚次黄牛廟山復峻其下即無義灘十日早過鹿角虎頭史君諸灘泊城下歸州秭歸縣界也至白沙市慈濟院對黄牛峽城西北一山山上有伍子廟十一日過逹洞灘灘惡乃陸行過之晩泊馬肝峽口十二日過東􅍽灘其旁有獅子岩十三日舟上新灘南􅜌曰官漕北曰龍門為峽中最險處游江瀆北廟十四日晩渡江南登山至江瀆南廟十五日過白狗峽十六日到歸州卧牛山臨江前即人鮓甕十七日集于望洋堂玩芳亭十九日訪宋玉宅在秭歸縣之東二十日出巫峽門過業灘亦名灘也二十一日舟中望石門關僅通一人行天下至險也晩泊巴東縣二十二日發巴東山益竒二十三日過巫山謁巫山神女祠祠正對巫山峯巒上入霄漢山腳直插江中十二峯不可悉見惟神女峯最為纎麗竒峭二十四日早抵巫山縣二十六日入瞿塘峽兩壁對聳上入霄漢其平如削仰視天如疋練過聖姥泉晩至瞿唐關唐故䕫州與白帝城相連關西門正對灧澦堆自關而東即東屯少陵故居也二十七日早至䕫州州東南有八陣蹟孔明之遺也記自蜀出峽江山五月離成都泊舟合江亭下合江者乃岷江别派自永康離堆入城都及彭蜀諸郡合於此下新津亭之上曰黄華樓其西則萬里橋六月己巳朔下彭山縣單騎轉城過東北門又轉而西走岷山五十里至郫庚午至永康軍崇徳廟在運城西門外山上秦太守李氷父子廟食處也辛未登城西樓其後皆西戎山西門名玉叠關將至青城當再繩橋晩至青城山曰寳仙九室洞天夜宿丈人觀觀丈人峯癸酉自丈人觀西登山五里至上清宫最髙峯之頂岷山數百峯悉在欄杆下雪山在西域去此不知幾千里暸然見之甲戌早頓長生觀乙亥發青城縣丙子至蜀州丁丑早頓江源縣宿新津縣成都萬里橋之江與岷江合派于此己卯以小舟至彭山午後至眉州城外江即玻瓈江也壬午至中巖後西州甲申至嘉定壬寅至王波渡宿癸卯至羅䕶鎮百里至犍為縣甲辰發下壩百里至叙州宣化縣百二十里至叙州叙州即古戎城也乙巳發叙州十五里南廣江來合大江通百二十里至南溪縣四十里至瀘州江安縣百二十里至瀘州戊申至合江縣己酉至恭州江津縣庚戌發泥培至恭州自此入峽路大抵西川至東川風土不同至峽益陋辛亥發恭州嘉陵江江自利閬果合等州來合大江百四十里至涪州樂温縣七十里至涪州過州入黔江泊此江自黔江來合大江壬子至酆都縣遊仙都觀癸丑至忠州宿萬州甲寅至開江口水自開達來合大江乙卯至䕫州丙辰泊䕫是夜水忽驟渰漲及排亭丁巳至瞿塘口水平如席獨灧澦之頂猶渦紋瀺灂舟拂其土以過而黒石山最號險惡十五里至大溪口水稍濶亦稍逺䕫峽之險也七十里至峽山縣戊午乘水退巫峽灘至神女廟廟前灘尤洶怒二十里至東奔灘髙浪大渦巨艑掀舞不當一葉二十里過巴東縣九十里至歸州未至州數里曰叱灘其險又過東奔連接新城下大灘曰人鮓甕己未泊歸州戊辰發歸州五里至白狗灘三十里至新灘此灘惡豪三峽八十里至黄牛峽上有洺州廟黄牛之神也亦云助禹所疏川者順流過扇子峽則峽中灘盡矣三十里得南岸平地曰平善壩出峽舟至是皆相慶如更生三十里至峽州漢水考嶓冡導漾東流為漢又東為滄浪之水過三澨至於大别南入于江東滙澤為彭蠡東為北江入於海嶓冡之山漾水出焉禹則自嶓冡而導之濬其源也東流則為漢焉漢即漾也而易其名又東流則為滄浪之水焉滄浪即漢也而易其稱又東過三澨之水至於大别之山南入於江㑹同東下有朝宗之勢焉漢水出陜西鞏昌府秦州嶓冡山為漾水東流至西和縣即入武都上禄之地名為西漢水又東流至成縣即武都郡治名六漢水折而稍西折而東南入漢中府鳯縣過沔縣西别為潛又東合沔水東流經本府洋縣流入湖廣襄陽府鄖縣至均州為滄浪之水厯灮化襄陽宜城荆州府荆門州潛江縣至沔陽州過三澨至漢陽縣大别山南流合於江荆揚諸水九州之域水居其半而山次之邑居土田又次之雖水由山而分實山以水而界禹貢言北條之水主于河凢水皆以河稱言南條之水主于江凢水皆以江稱惟其主于江也漾漢彭蠡皆江之所翕受而異派同歸者也是源之大而流之長者江也自江之左入而源流長且大者非漢乎自江之右入而源流之長且大者非彭蠡乎漢先入江後江漢同㑹彭蠡入海經文錯綜互見不可以經生文義律之矣所以經文曰嶓冡導漾東流為漢又東流為滄浪之水過三澨至于大别南入于江言漢水入江止此曰東滙澤為彭蠡東為北江言滙澤者乃每嵗春夏江漢水漲倒入彭蠡與前彭蠡既瀦義相聯貫滙者水之勢瀦者水之常也曰入于海此則言江漢與彭蠡而同入焉如言身之左股因及夫右股以明一體之意何必疑經文謂江與漢滙為彭蠡亦何必直以十三字為當衍哉曰岷山導江東刖為沱又東至于澧過九江至于東陵迤北㑹于滙東為中江入于海言滙即滙澤而東迤北㑹正言江之㑹彭蠡以入海也前言東滙澤後言㑹于滙前後相承何必疑其滙于漢亦何必疑滙字或多而或誤哉蓋彭蠡方廣數百里自今九江郡以上發源章貢合吉之王江廬江恩江袁之泉江臨之清江瑞之蜀江㑹為南昌之章江又建之旴江撫之汝水寧之修水信之上饒江弋陽江饒之鄱江錦江共諸郡邑之水瀦為彭蠡故春夏水溢則壅遏不通雖因江漢阻塞而實有滙入之勢至於中江北江安知非當時之通稱哉或曰彭蠡咸指為今之鄱陽湖矣又有謂即今之巢湖方與東滙文義合何如曰荆揚之水莫踰江漢其次莫如鄱湖經文叙九州之水反於數百里之鄱湖瀦數千里之水畧而不叙無是理也然或彼或此猶可説也陽鳥攸居迄今如故此亦可以意見更改之哉或曰揚州獨舉震澤彭蠡二湖何也曰揚之水自滙以南有廣于二湖者乎蓋言水而不及山則水亦無有而分之矣南條之水自岷至衡一支盡于九江之西其一支又南而東渡桂嶺北徑袁郴盡于廬阜水皆東流其一支又南而東度大庾北趨信衢介徽歙而抵建康由徽饒而上岡脊以西之水皆西流滙為彭蠡岡脊以東之水南則浙江北則震澤也所以金仁山謂彭蠡之水不瀦則今江東西諸州之水為揚西偏之患震澤之水不泄則今浙西諸州之水為揚東偏之患揚雖北邊淮而于徐巳書乂雖中貫江而于荆已書朝宗獨大江之南西偏莫大于彭蠡東偏莫大于震澤二患既平則揚之土皆治矣發明經文可謂無餘藴也或曰揚之彭蠡震澤二湖其廣不能踰荆之洞庭也經文何不叙之九江孔殷潛沱既導若謂九江非今郡地抑又何指耶曰九江即洞庭也江自出峽以來上截所受之水惟洞庭之源流最廣如江陵所記九江源委頗詳曰瀟江湘江蒸江澬江沅江漸江溆江辰江酉江㑹而為洞庭焉想禹時尚支分為江自後遂㑹為湖而以湖名也其實郴水發源袁吉之武功北入湘江與沅江俱視九江為最逺凡武功之水西流者盡入洞庭東流者盡入鄱湖故經文過九江至東陵㑹于滙可見禹于洞庭鄱陽二湖之水與江㑹次第亦甚明矣或曰叙導江而于中乃稱九江則其所謂三江果不必指大江為中江漢為北江彭蠡為南江耶曰叙揚州之水不必逺蒹夫荆此不必辨盖震澤即今之太湖而太湖之下三江入海本為吳淞江與松江婁江為三今皆可據况荆之九江本在乎上揚之三江在乎下又何必强為之説哉若夫山之由大庾北趨界信衢者一支包有浙江福建又一支由大庾東趨包有廣東水各入海而東南之水盡矣三江九江彭蠡敷淺原辨朱子嶓冡導漾東流為漢又東為滄浪之水過三澨至於大别南入於江東滙澤為彭蠡東為北江入於海又曰岷山導江東别為沱又東至于澧過九江至於東陵東迤北㑹于滙東為中江入于海又曰岷山之陽至於衡山過九江至於敷淺原此皆禹貢之文也古今讀者皆以為是既出於聖人之手則固不容復有訛謬萬世之下但當尊信誦習傳之無窮亦無以覈其事實是否為也是以為之説者不過隨文觧義以就章句如説九江則曰江過尋陽派别為九或曰有小江九北來注之説彭蠡則曰漢水所滙而江水亦徃㑹焉説北江中江則曰漢既滙而出為北江江既㑹而出為中江也説九江則但指今日江州治所以當之説敷淺原則但以為漢厯陵縣之傅易山在今日為江州之徳安縣而已如是而言姑為誦説則可矣若以山川形勢之實考之吾恐其説有所不通而不能使人無所疑也若曰派别為九則江流上下洲渚不一今所計以為九者若必首尾短長均布若一則横斷一節縱别為九一水之間當有一洲九江之間沙水相間乃為十有七道於地將無所容若曰㕘差取之不必齊一則又不知斷自何許而數其九也况洲渚出没其勢不常江陵先有九十九洲後乃復生一洲是豈可以為地理之定名乎此不可通之妄説也若曰旁計横入小江之數則自岷山以東至入海處不知其當為幾千百江矣此又不可通之妄説也且經文言九江孔殷正以見其吐吞壯盛浩無津涯之勢决非尋常分派小江之可當又繼此而後及夫沱潛雲夢則又見其决非今日江州甚逺之下流此又可以證前二説者為不可通之妄説也若曰漢水滙為彭蠡而江水亦徃㑹焉則彭蠡之為澤也實在大江之南自今江州湖口縣南跨南康軍饒州之境以接于隆興府之北瀰漫數十百里其源則東自饒徽信州建昌軍南自贑州南安軍西自袁筠以至隆興分寧諸邑數千里之水皆㑹而歸焉北過南康揚瀾左里則兩岸漸迫山麓而湖面稍狹遂東北流以趨湖口而入于江矣然以地勢北髙而南下故其入于江也反為江水所遏而不得遂因卻而自瀦以為是瀰漫數十百里之大澤是則彭蠡之所以為彭蠡者初非有所仰於江漢之滙而後成也不唯無所仰於江漢而衆流之積日遏日髙勢亦不復容江漢之來入矣又况漢水自漢陽軍大别山下南流入江則其水與江混而為一至此已七百餘里矣今謂其至此而復一先一後以入于彭蠡既滙之後又復循次而出以為二江則其入也何以識其為昔日之漢水而先行何以識其為昔日之江水而後㑹其出也何以識其為昔日之漢水而今分以為之北何以識其為昔日之江水而今分以居中耶且以方言之則宜曰南㑹而不應曰北㑹以實計之則湖口之東今但見共為一江而不見其分流然則所謂漢水滙為彭澤而江水亦徃㑹焉者亦不可通之妄説也此數說者既無一之不窮於是味别洲别之説出焉而終亦不免於窮也蓋曰味别則不知凡禹之所為過門不入胼手胝足而不以為病者為欲大濟天下昏墊之民使得平土而居以衣且食而遂其生耶抑如陸羽張又新軰但欲較計毫分於齒頰間以為茗飲一時之快也嗚呼彼以是為説者亦可謂童騃不思之甚矣且河之所㑹漆沮涇渭伊洛瀍澗支川尤多而初無味别之説濟之所經或潛或見或止或流其變不一而初無味别之說何獨至此而辨之若是悉耶此又可見其為不通之妄說也若曰洲别則又九江之鑿吾既辨於前矣若果如此則漢水入江之後便須常有一洲介於其間以為江漢之别而湖口入滙之處又當各分為二以為出入之辨而後可也今皆無之而湖口横度之處予常過之但見舟北為大江之濁流舟南為彭蠡之清漲而已蓋彭蠡之水雖限於江而不得洩然及其既平則亦因其可行之隙而又未嘗不相持以東也惡暏所謂中江北江之别乎此又可見其為不通之妄説也若曰古之九江即今之江州古之敷淺原即今之徳安縣則漢九江郡本在江北而今所謂江州者實武昌郡柴桑縣後并江北之潯陽立郡又因潯陽而改為江州實非古九江地也又况經言過九江至於東陵而後㑹于彭蠡則自今江州城下至湖口縣纔四十里不知東陵的在何處何所表異而其志之繁密促數乃如此又曰過九江至於敷淺原則已自江州順流東下湖口又復泝流南上彭蠡百有餘里而後至焉亦何説哉此又不可通之妄説也至於今之所謂敷淺原者為山甚小而卑不足表見而其全體正脉遂起而為廬阜則甚髙而且大以盡乎大江彭蠡之交而所以識夫衡山東過一支之所極者唯是乃為宜耳今皆反之則吾恐其山川之名古今或異而傳者未必得其真也凢此差舛其類不一讀而不思思而不考者既昏昧鹵莽而無足言矣其間亦有心知其誤而口不敢言乃反為之遷就穿鑿以蓋其失者則其謬愈彰使有識之士讀之愈疑而愈不敢信唯國朝初胡秘監旦近世晁詹事說之皆以九江為洞庭則其援正皆極精博而莆田鄭樵漁仲獨謂東滙澤為彭蠡東為北江入于海十三字為衍文亦為得之予既目睹彭蠡有源兩江不分之實又參之以此三者而深以事理情勢求之然後果得其所以誤也盖水之患唯河為甚而兖州乃其中流水曲而流緩地平而土疎故河之患於此為尤甚是以鑿治之功十有四載然後同於諸州竊計當時唯此等處事急民困勢重役煩禹乃親涖而身督之不可一日而舍去若梁雍荆揚地偏水急不待疏鑿固已通行則分遣官屬徃而視之其亦可况彭蠡洞庭之間乃三苗氏之所居當是之時水澤山林深昧不測彼方負其阻險頑不即工則官屬之徃者固未必遽敢深入其境是以但見為彭蠡之澤而不知其源之甚逺而且多但見洞庭下流之已為江而不知其中流之常為澤而甚廣也以此致誤宜無足恠若其用字之同異則經之凡例亦自可考顧讀者未深思耳今但刪去東滙北江之衍字而正以洞庭為九江更以經之凡例通之則過九江至於東陵者言導岷山之水而是水之流横截乎洞庭之口以至東陵也是漢水過三澨之例也過九江至於敷淺原者言導岷陽之山而導山之人至於衡山之麓遂越洞庭之尾東取山路以至乎敷淺原也是導岍岐荆山而逾于河以盡恒碣之例也以是觀之則經之文意不既明乎若更以他書考之則山海經云廬江出三天子都本注云一作鄣今按丹陽故為鄣郡其得名蓋以此則作鄣為是入江彭澤西本注云彭澤令彭蠡也在鄱陽彭澤縣漢志亦云廬江出陵陽東南北入江蓋陵陽者丹陽之屬縣今寧國府旌徳縣尚有陵陽山而三天子都屆在徽饒之境疑與陵陽腹背相直故廬江者得出其東南而西流北折以為鄱餘二水遂以㑹于彭蠡而入于江也及其入江則廬山屹立乎其西南而江之北岸即為郡之南境疑江與山相因以得名而郡境雖在江北亦以其南直此江此山而名之也然則彭蠡安得為無源而必待漢滙江㑹而成哉漢志豫章為郡領縣十八其彭蠡縣下注云禹貢彭蠡澤在西其餘則言水入湖漢者八鄱陽鄱水餘干餘水艾修水塗淦水南城旴水建城蜀水宜春南水南􅀢彭水入大江者一顔豫章水而湖漢一水則又自雩都東至彭澤入江行千九百八十里也按今地勢彭蠡既與江通而豫章諸水不由彭蠡别無入江之路則湖漢者即是彭蠡而其所受衆水之源又不止廬江而已也以此而觀則山海經之言猶有未盡且其曰入江彭澤西者本謂逕彭蠡縣之西而入江耳而語意不明遂若析江與澤各為一水而一東一西以入江者此亦其立言之疵也漢志又自不知湖漢之即為彭蠡而兩言之又不知入大江者亦瀦於彭蠡而别為一例又不知湖漢之為湖正以其澤名之而復兼以漢稱則又承禹貢之誤而弗深考也至於雩都之水則但見其為一郡衆流之最逺者而遂推為湖漢之源以主其名則又不知湖漢之名初非一水必自隆興以北衆水皆㑹瀦為大澤然後可以名之非雩都一水所可得而專也至於鄭漁仲漢水衍文之説固善矣而其下文江水東迤北㑹于滙東為中江入于海之數言似亦可疑而彼猶未能盡正也嗚呼禹貢所載者九州之山川吾之足迹未能遍乎荆揚而其所可疑者已如此不知耳目見聞之所不及所可疑者又當幾何是固不可得而知矣至於經之凡例本自明白而諸儒乃有過為新竒之説以亂之者若論導山而逾于河而以為導岍岐荆山之脉使之度河以為壺口諸山之類則亦不待聞見之及而知其謬矣夫禹之治水隨山刋木其所表識諸山之名必其髙大可以辨疆域廣博可以奠民居故謹而書之以見其施功之次第初非有意推其脉絡之所自來若今論葬法者之所言也若必實以山脉言之則亦自有可言而尤足以見其説之謬者蓋河北諸山本根脊脉皆自代北寰武嵐憲諸州乘髙而來其脊以西之水則西流以入龍門西河之上流其脊以東之水則東流而為桑乾道幽冀以入於海其西一支為壼口大岳次一支包汾晉之源而南出以為析城王屋而又西折以為雷首又次一支乃為太行又次一支乃為常山其間各隔沁潞諸川不相連屬豈自岍岐跨河東度而反為是諸山哉若過九江至於敷淺原亦有襲其謬者以為衡山之脉東度而來則以見聞所及而知其必不然也蓋岷山之脉其一支為衡山者已盡於九江之西其一支又南而東度桂嶺者則包湘源而北徑潭袁之境以盡於廬阜其一支又南而東度大庾者則包彭蠡之源以北至乎建康其一支則又東包浙江之源而北其首以盡于㑹稽南其尾以盡乎閩越也豈衡山之脉能度九江而其度也又直為敷淺原而已哉又有欲以揚州之三江即為荆州之中江北江而猶病其闕一乃顧彭蠡之餘波適未有號則姑使之潛冒南江之名以足其數且又自謂聖經書法之妙非他人之所及是亦極巧而且新矣然自湖口而下江本無二安得有三且於下文之震澤又懸隔遼夐而不相屬也則又安能曲説而彊附之哉問諸吳人震澤下流實有三江以入于海彼既以目驗之恐其説之必可信而於今尚可考也因并論之以俟來者質焉江防總叙嘗閲三國志魏文帝至廣陵臨江見波濤洶湧歎曰嗟乎天所以限南北也而宋劉珏亦言金陵天險前據大江可以固守則長江豈不誠勝勢哉然王濬之克西陵北軍飛渡韓擒虎之濟采石陳人不覺則雖有勝勢亦恃吾所以守禦之者何如耳吕頤浩有言諸郡自荆南抵儀真可渡處甚多豈不預為計望置使兩員一自鎮江至池陽一自池陽至荆南專提督造船且詢水戰利害但當時宋遷都建康恃江為守故有此論今天下一統其要害固不繫長江然潢池之警竊發不時頤浩造船水戰之説可無豫為之計乎是故操江廵江各有專寄而江防之設雖以備水寇其所以為建康之守禦者亦豫且密矣長江天塹尚慎旃哉南直𨽻江防事宜查得牒江都御史原奉勅書專管沿江一帶上自九江下至鎮江及通常狼福等處先年承平無事專一操練水兵禁戢鹽盗用重留都之衛以為江海之防一應兵事盡屬操江近縁倭變大江南北道臣俱兼提督軍務之任有所錢糧兵馬各歸撫屬體勢恒專調度自便而操江大臣仍照舊勅參錯行事臨警倉皇未免掣肘所以該科長慮有此建白看得長江南北自𤓰儀鎮江之下有山破江而生名曰圍山此誠留都之門户而江海之噤吭也春汛之際南北撫院俱各設有兵船㑹哨防守自此以下接連海洋江面濶逺北有周家橋大河口掘港等把總而以狼山副總兵統之南有靖江福山乍捕等把總而以金山副總兵統之各為軍門專屬若復㕘以操江權任並大調度殊方使承行者無所歸心而前却者有以藉口或乖進止之宜恐非備禦之策况操院之設不妨院事專管操江帶管廵官乃今急逺憂而忘内顧畧專任而重帶管似亦非命官之初意也合無自今以後上自九江下至江南圍山江北山江㑹口為操江信地如遇信警但在圍山三江㑹口以下專責南北督撫嚴督將領之類畢力堵截圍山以上逼近留都南北督撫仍與操江互為應援不許自分彼此致失事機及查圍山把總原設兵船向係江南廵撫管轄今信地既分前總應分專屬操江提督所有兵船器械糧餉成造修理等項仍照舊䂓於江南辨給與操江衙門見役官耆兵勇三百員各相防守其三江㑹口先該操江都御史閭議題添設把總咨行廵撫㑹節經總廵撫督議定派各屬如徵軍餉銀二萬兩扣减民壯弓兵銀一萬三千零四十二兩二錢又原議事寧减免江洋嵗支必致乏絶倉卒之際復議派徵是無禆於寛卹而適増其科歛也合無將節年定派操江軍需俱照成䂓不必加减仍嚴行各屬如期徴解嵗支之外稍有存餘聴行收貯以備緩急不許别項支銷再照車行百里例有行糧若召募之衆日有常支原無此例惟是交仗對壘之際憫其勤勞時有犒恤今遊兵俱召募而營兵例無外援若以預處行糧更議分派不免異同徒為紛擾萬一警報非常内地孔棘則南北督撫俱同憂責又須别為權宜互相接濟非可預擬而定設也江淮總兵官之設本為靖肅江洋輯寧地方上以制𤓰儀之盗賊下以鎮通泰之鹽徒所以屏翰留都防䕶運道者也設必於鎮江者蓋以路通南北地呃咽喉金山備倭在其南儀真守備在其北適中可以調度據險可以設防取其傳報易而策應速也南直𨽻江防兩營信地南岸安慶營元字號哨官樓船一隻常泊黄石磯上哨自馬當起下哨至崩灣止計一百五十里自馬當紫磯牛磯墩至香口止四十里元字二號兵船一隻彭澤縣哨船一隻馬當廵司船一隻共為一聨自香口黄家嘴烏石磯至東流止三十五里元字三號兵船一隻香口土官廵船二隻共為一聨自東流廻龍山祝家磯至吉陽止三十里元字四號兵船一隻東流縣哨船二隻共為一聨自吉陽馬家磯黄石磯至崩灣止四十五里元字五號兵船一隻東流縣哨船一隻吉陽廵司船一隻共為一聨亨字號哨官樓船一隻常泊李陽河上哨至崩灣起下哨至池口止計一百四十里自崩灣鴈汊下烟墩至黄盆止四十里亨字二號兵船一隻吉陽廵司船一隻李陽廵司船一隻共為一聨自黄盆丁家港牛頭山至李陽河止三十里亨字三號槳船一隻貴池縣哨船一隻李陽廵司船一隻共為一聨自李陽河黄公山烏沙夾上口至中口止三十里亨字四號槳船一隻池州府一號二號槳船二隻共為一聨自烏沙夾中口軍渡灣下烟墩至池口止三十里亨字五號兵船一隻池州府三號槳船一隻池口廵司哨船一隻共為一聨專守烏落洲池州府四號槳船一隻荻港營仁字號哨官樓船一隻常泊大通上哨自池口起下哨至老鸛嘴錢家灣止計一百八十里自池口芭莽港麻埠至仙姑廟止三十里仁字二號兵船一隻池州府下哨船一隻池口廵司船一隻共為一聨自仙姑廟郭港梅港河至五埠溝止三十里仁字三號兵船一隻池州府哨船一隻貴池縣哨船一隻共為一聨自五埠溝程家溝大通河至洋山磯止三十里仁字一號樓船一隻大通廵司哨船二隻共為一聨自洋山磯横港馬石磯至銅陵河止三十里仁字四號兵船一隻銅陵縣哨船一隻大通廵司船一隻共為一聨自銅陵河長山磯丁家洲至老鸛嘴止三十里仁字五號兵船一隻銅陵縣哨船二隻共為一聨自六百丈中江起至斷腰三江口止銅陵縣哨船一隻青陽縣哨船二隻共為一聨遊廵夾江一帶禮字號哨官樓船一隻常泊三山上哨自張潭起下哨至大信四合山止計二百里自老鸛嘴錢家灣張灣潭至胭脂夾止三十里禮字二號兵船一隻石埭縣哨船一隻繁昌縣哨船一隻共為一聨自胭脂夾荻港河板子磯至舊縣止三十里禮字三號兵船一隻繁昌縣哨船一隻建陽衛廵船一隻共為一聨自舊縣黄石磯髙安橋至宗三廟止三十里