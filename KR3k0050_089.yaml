body:
  text: 圖書編卷八十九明章潢撰貢物總叙禹貢八州皆有貢物而冀州獨無之甸服有米粟之輸而餘四服俱無之説者以為王畿之外八州俱以田賦所當供者市易所貢之物故不輸粟然則土貢即租税也漢唐以來任土所貢無代無之著之令甲猶曰當其租入然叔季之世務為苛橫徃徃租自租而貢自貢矣至於珍禽竒獸衺服異味或荒滛之君降㫖取索或奸謟之臣希意創貢徃徃有出於經常之外甚至掯留官賦隂增民輸而命之曰羡餘以供貢奉上下相蒙茍悦其名而於百姓則重困矣合沙鄭氏曰召公曰明王慎徳四夷咸賔無有遠邇畢獻方物惟服食器用予觀禹貢九州之貢篚雖非四夷之獻而亦以服食器用為安而冀州獨不言貢篚者蓋畿甸之内賦其總銍秸粟米也總銍秸粟米者倉廪之儲也糇糧之濟也是食為土貢之要也兖州之貢蠶絲豫州之貢絺紵其地則宻邇於畿甸焉是衣服之用亦為土貢之要也自服食之外則器用次之器用之外則不過寳玉玩好而已不足國家慮也帝王之建都必擇衣食之地而謂之京師京大也師衆也言天子之居既衆且大非衣食之豊不可以為國也若夫大輅南金犀革象齒珠貝之類非服食器用之物貴其土産也皆逺於畿甸而或貢於要荒之服焉茍帝王以為貢篚之要國家所急則堯舜之都遷於荆梁久矣其肯以為冀都區區禦大河之患圖一日之安耶及周之衰荆揚陷于吳楚貢金不入而天王求之於魯蓋以魯通於吳也是豈聖人制貢之初意哉九州貢賦今昔之殊冀州厥賦惟上下錯厥田惟中中今北直𨽻古冀州地也米麥之賦計六十萬一千一百五十二石絲二百二十四斤絹二萬五千一百三十五疋木棉一十萬三千七百四十八斤鈔九貫草八百七十三萬七千二百八十四束塩一十八萬八百七引今山西亦古冀州之域米麥之賦計二百二十七萬四百二十二石絲五十斤絹四千七百七十七疋草三百五十四萬四千八百五十束塩四十二萬引兖州厥田惟中下厥賦貞青州厥田惟上下厥賦中上厥貢塩絺海物惟錯岱畎絲枲鉛松恠石菜夷作牧厥篚檿絲今山東古青兖地也米麥之賦二百八十五萬一千一百一十九石絲二千一百一十斤絹五萬九千九百九十疋木棉五萬二千四百四十九斤草二百八十一萬四千二百九十束塩一十四萬五千六百一十四引徐楊今属南直𨽻列于雍州之後荆州厥田惟下中厥賦惟上下厥貢羽毛齒革惟金三品杶幹栝栢礪砥砮丹惟箘簵楛三邦底貢厥名包匭菁茅厥篚𤣥纁璣組九江納錫大龜今湖廣古荆州之域米麥麻豆之賦二百一十六萬七千五百五十九石絹二萬七千九百七十七疋布七百五十疋鈔一百七十五貫豫州厥田中上厥賦錯上中厥貢漆枲絺紵厥篚纖纊鍚貢磬錯今河南古豫州之域也米麥之賦二百四十一萬四千七百七十七石絲三十五萬三千六百四十三兩絹九千九百五十九疋木棉三百四十二斤草二百二十八萬八千七百五十四束梁州厥田惟下上厥賦下中三錯厥貢璆鐵銀鏤砮磬熊羆狐狸織皮今四川古梁州之域也米麥之賦一百二萬六千六百六十九石絲六千三百三十三斤木棉七萬三千八百五十斤塩十萬九千一百七十七引雍州厥田惟上上厥賦中下厥貢惟球琳琅玕今陜西古雍州域也米麥之賦一百九十二萬九千五十七石絲綿三百零六斤絹九千二百一十八疋木棉一萬七千一百七十二斤布一十二萬八千七百七十疋草一百五十一萬四千七百四十九束揚州厥田惟下下厥賦下上錯厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢徐州厥田惟上中厥賦中中厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠暨魚厥篚𤣥纖縞今南直𨽻古揚州之域米麥之賦五百九十九萬五千三百四十石絲一十萬九千九百一十兩絹三萬八千四百五十二疋麻布二千七十七疋鈔八千七百七十錠草五百八萬四千二百一十七包塩十萬五千一百八十斤今浙江亦古揚州之域米麥之賦二百五十一萬二百九十九石綿并綵二百七十萬四千二百七十兩絹三千五百七十四疋布九疋鈔五萬一千二百九十三錠草八十七萬四千四百九十一包塩四十四萬四千七百六十九引今江西亦古揚州之域米麥之賦二百六十一萬六千六石絲八千二百三斤絹一萬一千五百一十六疋布一千六百四十一疋鈔九千九百七十九錠按賦出于冀兖青荆豫梁雍七州者僅居其半揚徐二州今南直𨽻浙江江西與之等埒而廣之東西與雲貴百萬之賦又在九州外矣然此惟約計米麥絲絹布鈔塩草七賦之正供而金沙銀鑛銅山鐵務珠池汞土酒茶榷酤礬硝蠟蜜丹漆藥材機坊鑄局竹木蒲葦磁器文石柴薪果品海物山芼羽毛觔角牛羊魚牲虎豹熊羆象牙香麝之類如禹貢所言又有不可勝記者在周禮九貢周官大宰以九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢按古者之内租税天子食之國中租税諸侯食之諸侯食其國之租税必以其半若五之一四之一入于天子効其土地之所有而盡其臣子奉上之心於是乎有九貢之制然大府掌九貢貨賄之入而曰凡邦國之貢以待吊用内府掌九貢之貨賄良兵良器而曰以待邦國之大用則既非無名之需矣又職方氏曰凡邦國制其職各以其所能制其貢各以其所有山師川師以山林川澤之物頒于邦國則曰致其珍異之物懷方氏來遠方四夷之民則曰致方貢致遠物又無非聴其所自至也蓋人君昭徳之致于侯邦則諸侯自奔走入貢之不暇固不必强之而來矣周之衰此意不存或來求金或來求車則不復有致用之意或來歸賻或來歸賵則又不復有吊用之常甚至包茅不入王祭不供齊人得以奉辭而伐罪男邦使從公侯之貴鄭人得以藉口而告晉則是貢法至此湮沒不存嗚呼内而侯國職且廢矣外而藩國周制九州之外謂之藩國世一見各以其所寳重為貢况能必其來貢如肅慎之矢越裳之雉有以自獻于天子者哉但後世科責無藝則又失其任土作貢之制矣禹貢職方相合總論禹貢之别九州隨山濬川而終之曰庶土交征底慎財賦咸則三壤成賦中邦故夏書謂之禹貢職方之辨九州制畿制國而終之曰制其職各以其所能制其貢各以其所有故周官謂之職方氏鄭氏曰職主也主四方之職貢者夫周人設官以職貢為名而制貢又曰各以其所有此正禹貢任土作貢之意也茍不原周人設官之意而徒區區於九州山川之辨是特一地理書耳于治道何益國朝諸夷所貢方物朝鮮以馬苧䕕豹獺安南以犀象白練沈水諸香暹羅以生象孔翠珊瑚瓊碧硫黃薇水琉球以赤銅瑪瑙刀錫古城以龍瑙兠羅真臘以犀象黃蠟日本以劍鎧𤓰哇以矛鐵犀象苾布珠瓊碧血瑣里以紅撒哈剌西洋瑣里以黒虎三佛齊以白獺大雞浡泥以玳瑁熊皮倒掛百花以赤猴彭亨以腦檀淡巴以苾布古里以寳刀蘇合龍涎溝剌加以熊狼白麂華縵鎖袱錫娑羅以玳瑁珠蕉小葛蘭以珠蓋阿魯以象齒榜葛剌以琉璃紫膠錫蘭山以水晶蘆薈細布蘇門荅剌以蕃刀囘青蘇禄以竹布迤北瓦剌以貂駝馬鶻朶顔三衞以馬海西女直以馬豹貂鷹鶻珠角哈宻以玉石禽皮烏思藏以氆氌毛纓甲胄長河以氆氌足力鐵力朶甘思以明胄長刀董卜韓胡以甲胄毛纓洮岷畨族以馬刀明胄論九州地利周禮遂人以歳時稽其人民而授之田野教之稼穡凡治野以土宜教甿今去古已逺江野散閒在上者可不稽諸古而驗於今而以教之民哉夫封畛之别地勢遼絶其間物産所宜者亦徃徃而異焉何則風行地上各有方位東方谷風東南方淸明風南方凱風西南方涼風西方閭闔風西北方不周風北方廣莫風東北方融風土性所宜因隨氣化所以逺近彼此之間風土各有别也自黃帝畫野分州得百里之國萬區至帝嚳創置九州統領萬國堯遭洪水天下分絶使禹治之水土既平舜分為十有二州尋復為九州禹平水土可事種蓺乃命棄曰黎民阻饑汝后稷播時百榖是水平之後始播百榖者稷也孟子謂后稷教民稼穡樹蓺五榖謂之教民意者不止教以耕耘播種而已其亦因九州之别土性之異視其土宜而教之歟今按禹貢冀州厥土惟白壤厥田惟中中兖州厥土黑墳厥田惟中下青州厥土白墳厥田惟上下徐州厥土赤埴墳厥田惟上中揚州厥土惟塗泥厥田惟下下荆州厥土惟塗泥厥田惟下中豫中州厥土惟壤下土墳壚厥田惟中上梁州厥土青黎厥田惟下上雍州厥土黃壤厥田惟上上由是觀之九州之内田各有等土各有差山川阻隔風氣不同凡物之種各有所宜故宜於冀兖者不可以青徐論宜於荆揚者不可以雍豫擬此聖人所謂分地之利者也農書云榖之為品不一風土各有所宜周禮職方氏云揚州其榖宜稻豫州其榖宜五種黍稷菽麥稲雖徐梁闕所紀載而九州風土之宜其大概可見矣書序稱九州之志謂之九丘言九州所有土地所生風氣所宜皆聚此書孔子述職方以除九丘蓋謂此也此言九州之域種萟之法也今國家區宇之大人民之衆際所覆載皆為所有非九州所能限也嘗以大體考之天下地土南北高下相半且以江淮南北論之江淮以北高田平曠所種宜黍粟等稼江淮以南下土塗泥所種宜稲秫又南北漸逺寒暖殊别故所種早晩不同惟東西寒暖稍平所種雜錯然亦有南北高下之殊其大約論如此然又以十二月十二分野土壤名物論之不無少異所宜謂十二分野上應二十八宿各有度數州郡度數躔次云角亢氐鄭兖州東郡入角一度東平任城山隂入角六度濟北陳留入亢五度濟隂入氐一度東平入氐七度泰山入角十三度房心宋豫州潁州入房一度汝南入房二度沛郡入房四度梁國入房五度淮陽入心一度魯國入心三度楚國入房四度尾箕燕幽州涼州入箕巾十度上谷入尾一度漁陽入尾三度右北平入尾七度西河上郡北地遼西東入尾十度涿郡入尾十六度渤海入箕一度樂浪入箕三度𤣥莵入箕六度廣陽入箕九度斗牽牛須女吳越揚州九江入斗一度廬江入斗六度豫章入斗十度丹陽入斗十六度㑹稽入牛一度臨淮入牛四度廣陵入牛八度泗水入女一度六安入女六度虛危齊青州齊國入虛六度北海入虛九度濟南入危一度樂安入危四度東萊入危九度平原入危十一度菑川入危十四度營室東壁衛并州安定入營室一度天水入營室八度隴西入營室四度酒泉入營室十一度張掖入營室十二度武都入東壁一度金城入東壁四度武威入東壁六度燉煌入東壁八度奎婁胃魯徐州東海入奎一度瑯琊入奎六度高宻入婁一度城陽入婁九度膠東入胃一度畢昴趙冀州魏郡入昴一度鉅鹿入昴三度恒山入昴五度廣平入昴七度中山入昴八度清河入昴九度信都入畢三度趙郡入畢八度安平入畢四度河間入畢十度真定入畢十度觜參魏益州廣漢入觜一度越雋入觜三度蜀郡入參一度犍為入參三度牂牁入參五度巴蜀入參八度漢中入參九度益州入參七度東井輿鬼秦雍州雲中入東井一度定襄入東井八度鴈門入東井十六度代郡入東井二十八度大原入東井二十九度上黨入輿鬼二度柳七星張周三輔𢎞農入柳一度河南入星三度河東入張一度河内入張九度翌軫楚荆州南陽入翼六度南郡入翼十度江夏入翌十二度零陵入軫十一度桂陽入軫六度武陵入軫十度長沙入軫十六度其土産名物各有證驗此天地覆載一定古今不可易者蓋其土地之廣不外乎是但所属邊裔不無遼絶若能自内而及外由近而及逺則土産