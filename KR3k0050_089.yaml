香西木香鮮子訶子孟定禦夷府香櫞比之南安府者尤大南甸宣撫司孔雀叫鷄晝夜依時而鳴紅滕篾夷婦用為腰餙千崖宣撫司土錦白㲲布白蓮花竹䶉大如兎子至肥可食瀧川宣撫司芋大者一尺三寸孔雀豪猪紫膠大藥鮮子咸逺禦夷州鹽境内莫䝉寨有河水汲而澆於炭火上煉之則成細鹽凡交易無秤斗止以小篾羅計多寡而量之灣甸禦夷州茶境内孟通山産細茶名灣甸茶谷雨前採者尤佳也鎮康禦夷州大藥有大如斗者味極甘美鮮子大如棗味酸䗲膽可解諸毒藥水乳香大侯禦夷州垂絲竹枝葉軟弱皆下垂金剛纂色青狀如刺桐性最毒訶子秋熟味苦又甘芒市長官司金金沙江香橙橄㰖芋蔗藤貴州宣慰司茶鐵馬薑蘭菖蒲刺竹筋竹思州府鉛蠟府硃砂水銀施溪鐵竹鷄府思南府水銀鐵竹鷄白鷴蘭菖蒲葛鎮逺府艻竹竹鷄海棠芙蓉石榴柑綿竹石阡府鐵苖民水銀石阡蠟木𤓰銀杏府境銅仁府硃砂省溪大萬山水銀大萬金省溪提溪鐵銅仁省溪蠟楠木杉木箭竹葛布黎平府鐵洞被府以苧布為質以綵線桃刺成之茯苓葛布都勻軍民府普安州硃砂水銀鐵雄黃橙榛芭蕉永寜州新添軍民指揮使司茶葛布丹平薑梅菖蒲刺竹平越軍民指揮使司木香葛布茶麂水竹橘烏頭安南衞橙梅葛蕨菖蒲馬猿麂竹鷄楓木刺竹苧麻按土之所有必以為獻尊君親上之大義也然夏書周典所載必立為經制上有所程以致邦國之用下有所守惟其物土之冝豈若後世科責無藝者之為哉故曰任土作貢言物非其土則不藉其貢也古今貢物總論萬物盈天地間可得一悉數之哉要以資民用者貢之于天府亦將以資國之用也書曰畢獻方物惟服食器用之類又曰不貴異物賤用物可見古者貢以物起物以土宜如橘踰淮為枳生湖北則為蕪菁鸚鵒不踰濟貉踰汶則死此無他庻物蕃阜凡情性形體臭味各視水土所宜生尅制化地氣殊也故禹貢十二壤九等之辨周職方九土之宜無非任土作貢俾上有所程下有所守經制一定而國用不匱耳惟在上者因天地自然之利盡樽節愛養之方斯物不可勝用也况天地生物止有此數不在官則在民上能寛一分則民受一分之賜哉自漢以來如却獻名馬寳玩詔大官勿受逺國珍羞迄今靡不稱頌柰何貢無定額科責無藝而日進月進者有之或假貢奉為名侵漁民利强奪商販至於禽獸昆蟲珍味之屬抑配人戸致使所在居民以土産之物為苦先王制貢之意蕩然盡矣洪惟我聖祖立國之初即定諸州所貢之額如太常寺牲幣欽天監厯紙太醫院藥材光禄寺厨料寳鈔司桑穰諸皮角翎鰾之属著為定額俾其嵗辦凡皆周官所供祀嬪器幣財貨之需外此珍竒玩好及唐宋以來藩方之羡餘郡國之進獻佞倖之珍異一切無有焉其諸畨國及四夷土官人等所貢方物禮部奏啟進納而土客司則辦其五年三年比年之貢及其貢物貢途貢使豊約遥徑多寡之數差其迎送宴勞賞賚廬室幕帳食料之等蓋庶幾乎西旅越裳之獻而中國之利四裔者亦有體歟圖書編卷八十九
