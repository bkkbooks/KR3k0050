body:
  text: 圖書編卷六十明章潢撰南直𨽻應天府山曰鍾山曰石頭即諸葛亮云龍盤虎踞是曰聚寶上多細瑪瑙石故名曰茅山句容三峰三茅君居第八洞天福地曰牛首二峯東西相對王導指曰雙天闕故又名天闕山攝山有草可以攝生故名天開巖在攝山棲霞寺後曰石屋溧陽歐冶鑄劍于此芝山溧水上有李子洞泉出沸湧相去三百步名燕洞中有石燕遇雨則飛晴則還落為石廣可容數千人曰定山江浦上有獅子峯下有逹摩晏坐岩曰峨眉六合曰古迹雨花臺梁雲光法師講經于此感天雨花故名鳯陽府山曰萬嵗在皇城北城垣經其上東西有二峯東曰日精西曰月華曰鳯凰治北曰荆山懷逺即卞和採玉處曰塗山即禹會諸侯之所曰韭山曰華蓋俱定逺曰鹿鳴虹曰八公壽州淝水之北淮水之南淮南王與八公學仙于此謝玄敗苻堅八公山草木皆兵曰大别霍丘曰北狼蒙城曰碧山泗州曰第一盱𣅿有米芾三大字曰龜山相傳禹水鎖渦神巫支祁于此三足山西南上有絶壁下有重淵即其處浮山北臨淮水山下有穴去水一丈淮水泛溢其穴即髙水減其穴還低曰治山天長曰相山宿曰磬石靈壁繡谷旴𣅿普落院南白虎坡其石岩多花木春口如錦繡故名響洞泗州崇福院後洞方圓丈許語響輒應蘇州府山曰虎丘府城西北山中有劒池千人坐石陳顧野王序有云髙不抗雲深無藏景卑非培塿淺異疏林路若絶而復通石將斷而更綴抑巨麗之名山大吳之勝壤也曰靈巖府城西南吳王館娃宫故地舊志云下瞰太湖望洞庭兩山摘翠叢碧在白銀世界中亦宇內絶景山冇西施洞玩花池採藥徑及琴臺諸勝景曰穹窿府城西南舊傳赤松子食桂實石脂于此曰玄墓山府城西南山峯四立林木蔥蒨前一石屹立太湖中若畫屏然山上有萬峯寺樓閣翬蜚湖光掩映亦其中佳處其山之隂名至理山山勢蜿蜒前瞰湖水對峙陽山光福諸山左右夾挾山北向踓隆冬入山其氣盎然曰若公山府城西南山根有石如老翁立水中涸不露潦不沒故名曰洞庭山府城西南一百三十里大湖中一名包山漢書云下有穴洞潛行水底無所不通號為地脈道書以為第九洞天內有角里村毛公壇曰天平曰馬鞍崑山孤峯特秀極目湖海無所蔽山出玲瓏石曰虞常熟越絶書巫咸所居又傳虞仲隱此故名雪井在虞山古迹姑蘇臺松江府山曰鳯凰城北華亭有九峯為邑之勝此其一也干山吳干將鑄劒于此因名澱山澱湖中其形四面如鼉上有浮圖下有龍洞屹立湖傍華亭谷在崑山之西谷有水縈繞百里出鱸魚蓴菜下通松江唳鶴灘陸機曰華亭鶴唳可復聞乎即此常州府山曰橫曰錫惠山東峯也古銘云有錫兵天下爭無錫寧天下清曰慧無錫舊名九龍山曰君江陰以春申君名曰荆南宜興曰張公洞其門三面皆飛崖峭壁惟正北一門可入嵌空邃碧有水散流石乳融結石上有唐人題刻洞中又有燒香臺仙人房玄武石風土記漢張道陵嘗修道于此洞善卷洞在國山東南洞有二曰乾洞曰大小水洞舊經周幽王時洞忽自開有二巨石形常如墮洞中寬廣可坐千人周圍峭壁刻為佛像有石柱髙丈餘號玉柱唐張祜詩金函崇寶藏玉柱祕靈根會仙巖宜興白鶴洞張公洞北鎮江府山曰北固曰金山此山大江環繞每大風四起勢若浮動名浮玉山冇裴公洞龍王池妙空巖善財石山後有孤峯鶻棲其上曰鶻山曰焦山在江中漢焦光隱此故名旁有海門二山金焦相望十五里有羅漢岩曰招隱相傳梁昭明太子讀書于此石案尚存下有招隱寺寺內有虎跑鹿跑真珠三泉及玉蘂亭曰繡毬丹陽曰大伾金壇古迹妙髙臺在金山揚州府山曰甘泉城西北曰城子儀真曰孤泰興曰神居髙陲曰昭陽興化曰雲山寶應曰天目泰州曰摩訶如臯曰狼通州淮安府山曰鉢池曰韓山沭陽信追項羽于此曰朐山海州即始皇東巡界曰孔望海州孔子問官郯子登此曰羽山海州殛鯀處禹貢羽畎出此因名曰葛嶧邳州禹貢嶧陽孤桐即此曰磬石泗濵浮磬出此曰馬陵宿遷曰仙掌睢寧古迹田橫國小鬲山壘石為城漢初田橫與五百人居海島即此圯橋即黃石公授張良素書處廬州府山曰雞鳴淝水所出曰四頂山俯瞰巢湖上有四峯特起亦名四頂山曰浮槎城東俗傳自海上浮來昔有梵僧過而指曰此耆閣一峯也龍穴山上有張龍公祠曰龍眠舒城形若卧龍曰治父廬江曰紫芝無為曰卧牛巢父許由隱此曰金庭即道書第十八福地王子喬登仙處上有金庭洞紫微王蘭二洞相連又冇杏花泉曰武陟六安曰霍山霍山漢武帝南巡至盛唐以南嶽衡山逺乃移嶽神于霍山祀焉山頂有天池龍湫風洞嶽井試心石凌霄樹又有緑水池雖旱不乾潦不溢一名衡山曰英山英山安慶府山曰大龍曰盛唐桐城漢武作歌曰潛山一名皖伯臺上有三峯二岩四洞二池山與皖公天柱三峯鼎峙層巒疊嶂為長淮之捍蔽焉曰天柱俱潛山與潛山連其峰最髙曰三祖山梁志公隱居于此冇唐僧三祖禪師塔曰白雲曰司空俱太湖相傳釋氏二祖傳三祖衣鉢在此山極髙峻山半有洗馬池曰靈隱宿松曰小孤江北岸孤峯秀拔與南岸山對峙如門大江之水至此隘束而出其下深險可畏上有神女廟對彭浪磯故俗冇小姑嫁彭郎之語曰麒麟曰鳯凰俱望江曰石牛洞潛山曰西風洞兩石壁立洞口濶五尺入內漸狹風從上出草木不生太平府山曰白紵本名楚山曰龍山府城南十里孟嘉落帽處曰采石孛白著宫袍泛舟于此曰牛渚溫嶠燃犀即此曰靈山蕪湖曰天門府城西南二山夾大江東曰博望西曰梁山對峙如門亦名峨眉山曰鳯凰繁昌靜隱山有五峯曰碧雲桂月鳴磬紫氣行道又有宿猿岩噴雲泉岩七磯蕪湖寧國府山曰陵陽城內曰洪公寧國曰文脊有山門連漪紫雲朝陽夕陽碧雲六洞曰水西涇曰黃山太平縣南三十里黃帝浮丘煉丹于此有三十二峯二十六源二十四溪十八洞八大嵓李太白詩黃山四千仞三十二蓮峯曰華容旌德曰石壁峯巒對起清溪中流境最為竒絶曰石柱曰宫山南陵舊傳孔子嘗遊後人置石室曰射的山池州府山曰齊在府城南三里山有十餘峯其髙齊等故名又有妙空武功寄隱竇雲玉柱有待等岩九頂圓頂華蓋蓮子左史石虎等洞極為竒勝唐杜牧九日詩有江涵秋影鴈初飛之句曰九華青陽詳後曰中峯衆峯環列而此峯居中上睇日月下瞷雲兩清泉迸石翠霧凝空曰五松桐陵曰金城石埭曰博陽建德曰厯山東流西枕厯池故名曰半巖在齊山大小泉凡十一而半巖為勝徽州府山曰烏聊城內曰黃山即前黃山曰松蘿休寧曰白嶽中峯獨聳旁有懸崖小徑可慿而上絶頂有池池西有石室東北有五彩石壁狀若樓臺有飛動之勢學仙者多居石室中曰大鱅婺源曰祁山祁門曰林厯黟曰石照績溪石髙二丈光可鑑物齊雲巖在白嶽正區靈岩洞在婺源縣西北一百二十里中有洞靈觀觀東北曰慶雲洞巖竇皆五色兩崖上有鸞鶴雲霞之象芝田靈草羅列左右西曰蓮花洞洞有大石室刻石像旁有羽蓋旙􅓚南曰含虛洞洞有二重外徑內平有積雪臺及沉香岑芙蓉嶺婺源有五嶺極髙峻而芙蓉嶺尤為峻特廣德州山曰橫山曰石婦衆山環繞中一峯獨髙峯之巔髙二丈許如婦人狀舊傳謝氏女介潔有守登山化為石藤蘿薜荔縈繞其上如衣被之象樵者莫敢採云靈山泉石甲于一郡上有文殊岩普賢臺羅漢洞山水合流而出淮于丁公潭邐迤數里前後有巨石平廣數十丈流瀑垂其上望之如織機然大洞廣數丈深不可測遊者秉燭而入有石燕羣飛乳泉滴􅅹神人佛像棋盤鍾磬之屬皆白石天成其東洞水深不可入曰建牙伍牙建平和州山曰梁山城南曰雞籠以形而名道書為四十二福地褒禪山在縣北出有起雲峯龍洞羅漢洞龍女泉白龜泉華陽山含山縣北上有二洞前洞遊者甚衆後洞獨王后石遊焉有記濡須山含山縣西南與無為州七寶山對峙中有石梁鑿石通流山水險阻卜為控扼之雄吳據其北築塢以拒魏號濡須塢魏據其南為關以之備吳蜀號東關張孝祥詩二闕形勝千年壯即此滁州山曰琅琊州城南晉琅琊王嘗駐此因名其山谷七八里自城南行六七里至溪溪之源出兩峯間流為釀泉曰南岡全椒曰石固來安龍盤州城南上有虎上桃花澗偃月洞洞側皆峭刻壁徐州山曰彭城州東楚王山山下有楚元王墓皆赭土禹貢徐州厥貢惟土五色後王莽使徐州嵗貢五色土即此山也桓山山下有桓魋墓故名蘇軾遊桓山有記徐山周穆王命楚伐徐偃王敗北走彭城武源山即此吕梁山下有二洪上有雲夢梁王二城碭山漢髙帝微時常隱于山上有雲氣吕后與人倛求得之即此九里山東西連亘凡九里相傳有穴潛通琅琊王屋象山韓信伏兵與楚戰即其地上有樊噲摩旗石下有曽參井盤馬山頂平無草木漢髙祖盤馬于此境山西臨泗水有鎮有閘子房山世傳子房隱此又謂子房作楚歌散羽兵處雲龍山上有放鶴亭蘇軾有記戲馬臺項羽因山築臺以觀戲馬後宋公劉裕九日登臺謝靈運賦詩即此廟山蕭縣白土山稍東北戚山員聳為沛縣鎮微山沛縣東南東華豐縣北周亘十里多竒石矗屹五洞各幽勝金陵鍾山鍾山一名金陵山漢末秣陵尉蔣子文逐賊死山下大帝封蔣侯大帝祖諱鍾又更名蔣山實作揚都之鎮諸葛亮所謂鍾山龍蟠是也金陵諸山凡過後湖必出太平門命舟行可七八里許一望渺漫光映上下微風播揚文漪聿興蕩漾煙波之上莫不情暢神爽若遊仙焉余間立四顧其嵳峩霄漢之表王氣鬱蔥而峙乎東南者鍾山也疊連如屏如幃在西北者幕府山也巒嶺偃蹇盤伏於地而松森其上者覆舟山也挺拔而凸出城頭殿閣參差浮屠聳空者雞鳴山也東西一帶列如懸榜者世傳臺城也峻􅜤冒水而出者島嶼也傍視三法司隱隱錯落雲水之湄重岡疊阜遙連於其外巋然而鸞鳯峙騰然而蛟龍走矣牛渚山山在當塗縣北三十里山下有磯古津渡也與和州橫江戍相對隋師伐陳賀若弼從此而渡六朝以來為屯戍之地輿地志牛渚山昔有人潛行云此處通洞庭傍逹無底見金牛狀異乃怪而出牛首山金陵多佳山牛首為最山據城之南初名牛頭以雙峰並峙若牛角然佛書謂江表牛頭是也晉王導嘗指曰此天闕也又名天闕山出鳯臺門南行十五里至塘灣又南行十里度嶺又三里抵山舍西上二里逹𢎞閣寺門內二井左曰白龜池右曰虎趵泉至其顛經修廊東行緣石魚貫上登觀音閣再上間有捨身臺及辟支佛足迹至下兜率巖空洞上突出如屋至文殊洞既而登山之背觀蕭昭明太子池徑可丈餘冬夏不涸下而西至辟支洞廣差文殊石浮圖立其前辟支舍利所藏處也出寺而南山路陡絶二里至獻花岩石益竒麗中虛深可十步儼如堂宇相傳唐髙僧懶融嘗居其中有百鳥獻花之異岩因以名今名華巖巖之南曰屯雲亭又南曰芙蓉閣閣嵌岩石登其上羣峯攢蹙悉在目睫山之最佳處也北下僧廬扁曰無邊風月可坐眺逺又下有軒曰無塵又二里出山盧龍山山在儀鳯門內與獅子山相連蜿蜒而東故名盧龍山山阿有道觀因山之名山慿城瞰大江抱都邑崔嵬兀起實據龍江之險由臺宇傍一徑叢樹環繞而上至其巔則平脊回拱去江咫尺林木中江影掩映可愛髙皇帝嘗登其上建閲江樓命學士宋濓記之後復親製記一篇今樓已毁故址尚存山之西下都城之外有天妃宫靜海寺亦山之麓形勢竒偉有觀靜閣毗盧閣前有石磊珂岩穴相貫攝山山出都城北經蔣山廟東行出姚坊門三十里入山後有田疇平野度石橋而東復入山古檜長松連抱夾路至棲霞寺寺殿宇皆古制殿後有石浮圖數丈極精巧山千巖盤繞隨處皆鑿釋像于中飾以金碧名千佛嶺山多藥草可以攝生故名山之頂極衆山之髙下視江水如帶左龍江右龍潭前瓜步真州金焦二山如塊石在江中南登臨竒壯之勝叢林之古無踰于此塗山臨濠古迹唯塗荆二山最著圖經塗山在昔鍾離縣西九十五里荆山亦在縣西八十三里二山本相聨屬而淮水繞荆山之背神禹鑿開使水流二山間其疏鑿之蹤具在故人思其功迄今弗能忘二山見諸載記者其説多乖舛以塗山言之春秋左氏傳云禹會諸侯於塗山杜預注云在壽春縣東北説者云今濠州是也國語史記則又云禹會諸侯於會稽亦有塗山吳越春秋亦以塗山在會稽又兼載塗山之歌應劭云塗山在永興北説者云今會稽蕭山縣是也是二説已不能歸於一致矣至於蘇鶚演義又云塗山有四一會稽二渝州三濠州四當塗然其處皆有禹迹或者遂謂禹之治水固常遍厯宇內而會諸侯實在會稽之塗山柳子厚塗山銘蘇子瞻子由塗山詩指在濠州者皆非是濓之存疑未決者一也以荆山言之荆山楚山也楚之先王熊繹僻在荆山篳路籃縷以處草莽傳至成王始盛又七傳至昭王始遷都郢昭王有言曰自吾先王受封望不過江漢河非所獲罪則楚之封強可知郢即今江陵其地有荆山一名景山荆故楚號也有之誠宜世則謂在濠州濠州古鍾離子國與壽春密邇楚自昭王之後又厯十一傳至考烈王始從都壽春韓非子所載卞和獻玉事乃在厲武文三王之際昭王上接武王已越十世當三王時鍾離何嘗屬楚而強謂卞和至此山耶新序又謂抱玉而泣在共王之時雜記又謂在懷王及其子平王之時平王乃昭王之父下距懷王九世共王上至武王亦六世何至顛倒錯亂如是耶濓之存疑未決者二也必欲可信塗山當稽之左氏以壽春為正荆山當證諸史傳以江陵為正有謂塗山氏乃故國名禹曽娶其女者别是一説與此殊不相涉也虎丘山山在城西北九里又名海湧山遙望平田中一小丘越絶書吳王闔閭葬虎丘山下發五都之士十萬人共治葬穿土為川積壤為丘丘廣六十步水深一丈五尺銅棺三重傾池六尺黃金珠玉為鳬鴈扁諸之劍魚腸之干在焉靈巖山山即古硯石山吳縣圖經云在縣西二十里亦名石鼓山越絶書云吳人於硯石山館娃宫又云硯石去姑蘇山十里闔廬養越美人於此上有兩湖吳越春秋云闔廬城西有山號硯山髙三百六十丈去人煙三里去吳縣西三十里上有吳館娃宫董覽吳地記云吳王離宫在石鼓山越獻西施於此有琴臺在其上續圖經云硯石山西有石鼓故以為名山頂有三池一曰月池一曰硯池一曰玩華池雖旱不竭蓋吳時所鑿也山上舊有響屧廊其下有石室今存俗傳吳王囚范蠡之地又有㠛村其山出石可以為硯蓋硯之名由此也吳郡志云登山見太湖諸山在銀濤中亦宇內絶景皖山在懷寧西十里皖伯始封之地漢地理志與潛山天柱峯相連三峯鼎峙疊嶂重巒拒雲槩日登陟無由東有激水冬夏懸流狀如瀑布下有九井有一石床可容百人五里至三祖寺每嵗夏仲有龍水洗塔茅山山有三峯最髙者為大茅峯草被之其緑如黛而茂樹清泉復相映𢃄遂疾行上山二里至崇禧萬壽宫其東西楚王澗自華陽洞西三水合流趨宫之前相傳昔楚威王遊憩於是沈靈官清緣率道士出迓宫蓋梁陶貞白華陽下館入門有崇臺三級甃石堅緻名拜章臺宋徽宗時物宫又有陶貞白及王逺知祠逺知貞白弟子其教所謂正法主是也出宫東行折而南約五里許皆石級躋陟頗艱輿非挽不得上里許舍輿而徒經朝山亭復上憩半山土地祠峯至是登已四里去巔不逺殆不止於半也又上緣崖而行道益峻險金壇諸山逺列雲霧竦栗不暇顧隨行函童為道士各持瓦數片謂可以獲福雀躍而至若角健者豫哂之戒毋失足一里聖祐觀據峯之巔大茅君升仙處也觀北稍上平石為天市壇道士云永樂中於此五埋玉簡左稍下則龍池也池不甚廣小黑龍十數遊其中取視之長僅三寸昂首四足目晴爛然腹有丹書而無牝牡蓋蜥蜴類也宋祥符間嘗遣使醮祭緘二龍於器將獻之闕下中道風雨惟存其一御製詩送之還山洪武中亦命取入宫五失其四每嵗旱禱雨輒應今與山之神同著祀典重午日祀山神而龍則以驚蟄皆縣官親祀下東北半里閲喜客泉甃以石圓徑丈深可半尋衆鼓掌即湧沸津津如散珠否則湛然山復有撫掌泉在昭明讀書臺下與此泉同誠異迹也涉澗東折數百步二碑屹立草中其一宋景祐間賜觀額敕牒其一晏元獻五雲觀記又東百步至華陽洞道家書謂三十六洞之八周百五十里名金壇華陽之天上巨巖如削有華陽洞三大字旁多昔人題名洞舊塞於泥近道士通之外兩石相拒狀如掀唇後人纍甃為垣以防失足而復亭其上以俟遊者自其左循右級俯首而入巖泉點滴下多積水數丈泥仍塞不可以前蓋洞有五門此南面之西便門也洞又東下數百步有石柱洞口逼仄容僅一人豫疲不能入東北道多亂石經仙人洞西折厯馬迎街度石梁上元符萬壽宫宫陶貞白故宅中亦有拜章臺堅緻不逮祟禧臺之右二碑刻宋理宗聖德仁祐之殿六大字并前元賜印劒環山省劄登方丈茅峰當其前還崇禧已暝沈靈官開宴言嵗庚戍三月之望辰刻三茅君現形大茅峯西足躡祥雲金光繞身食頃而散見者幾百人或曰茅君現形其衣皆雲氣所為無眉目也夜深宿方丈左室聞窗外聲澎湃淜滂飄匆揚激如秋江怒濤又如大將之師萬馬奔騰千里驟至豫意是日熱必大雨虞其妨遊攬衣起徐耳之蓋松風云山空人寂境乃如是宜陶真白之愛聽也癸卯經茅君殿偕至方丈觀宋徽宗賜元符宗師玉印方三寸許其色蒼潤文曰九老仙都君印篆刻精妙非今人可及元符有法劍一亦徽宗所賜二物皆鎮山之寶也出山一里入崇禧觀其右王法主墓攝衣欲登而阻於行潦墓前二石表猶是唐物與今之製絶異左表中斷道士續以新石北折幾三里有古松千秣殿角出其中者祠宇宫也宫祠三茅君道祖有唐刻石北折五里草際遺斷碑一石羊二其一羊已無首碑字大數寸其僅存者云宗玄翊教陶隱君瘞劍之地上數百步拜貞白墓敗垣荒草上老樹欲壓元劉宗師大彬刻石表之一里至玉晨觀即所謂金陵地肺天下第一福地者也東晉陽羲許長史父子並於此得道其前池曰雷平真誥謂昔雷氏養龍之所後人訛為郭真人養龍池非也池之南為伏龍岡上有唐玄靜先生李含光墓不及登觀門列石古檜十四傳為許長史手植大逾合抱紋皆左紐若出人力此可以觀造化之巧近一株瘁人割其皮以去道士云左紐檜不止是三清殿前凡六老君殿前凡二藏殿茅君殿後皆有其一子平生見樹之竒古者惟常熟之七星檜錢塘之九里松及此而已七星檜植于梁九里松植于唐壽咸遜左紐下視宋元之木直孫曽耳觀東檜下有古井石闌刻字已半漫剝摹讀數四逆之以意始辨其字云晉許真人丹井梁天監十四年重開十六年安闌今道士呼為陶公丹井豈以其重開而誤耶觀之兩廡及庭古碑二十有五其間梁刻者一唐刻者六南唐刻者二豫所最愛則陶貞白許長史碑顔魯公玄靜先生碑暨李陽氷篆餘皆宋刻不能悉讀登白馬老君殿前有周真人池其水已涸老君象後龕仙人展上公像山志稱上公髙辛時人不知其何據劉大彬題板謂因漢象增飾之亦未必然也午飲方文聞法堂東有陰陽井亟觀之井二穴而共一水以其氣分寒燠故名道士云此許長史舊迹飲之可以愈疾齊山昔人有言九華可玩而不可登齊山可登而不可玩言是山竒秀藴而不外露也乃九月之三日林君約遊遂入齊山寺始登玩月樓有郡人張侍御所為記稍折而東寺僧引觀仙人迹迹巨而且長紋劃顯然厯雲樽及穿石竇路甚險隘相與捫蘿緣薜蜿蜒而上升翠微亭則林木森蔽禽鳥飛鳴回視下界真已隔塵世矣俄臨九頃洞品一人泉又百步許陟小九華則羣石森立髙下參差其數與九華等故以九華名少憩振衣亭直上望天門則石耳諸山厯厯如指掌已而由招隱岩南越上青岩中有巒石塞道且草莽蓁塞難於登陟命輿人芟草剔石石骨立見形如抱磬陟岩之右經壽字岩仰視宋張時修所刻壽字不爽毫髮須臾轉蕉筆岩南至妙空岩穹然空隆乳溜凝結紺翠蒼緑潤如過雨妙空西上為石鼓洞洞有石旁出如肺肝懸壁擊之擊然逺聞可諧絃管傍有一石相去尺許其形與前石無異擊之若稿木竟不知造化之逞竒於泉石若此也又西為仙人橋廣僅咫尺長五之並跨兩崖膚理渾然不假人力維是三者為齊山最勝後至三竒亭因問所以得名曰即前石鼓洞仙人橋妙空岩三者是也宴罷欲返三泉子曰去此山折而東百步許北有華蓋洞洞口石峙如門其中豁然上員如蓋下平若砥可容坐數十人洞形九旋由大而漸入于小如螺尾然今之華蓋殿即此製也善權洞由夾浦泛太湖抵宜興又六十里至善權寺寺在國山東始于南齊建元蓋祝英臺之故宅也門有榜曰龍巖福地行松間數百步泉上有亭翼然曰湧金小憩久之遂入寺寺唐大中十年七月所建柱礎刻字猶存計年已厯千載有餘矣因名曰唐殿其制與今絶異殿之四正柱凡用斗拱者二以矮柱接而長之至柱中用板鋪甃如回廊可旋繞諸所染色千年如新丹青炫目不知何故僧云自建寺至今棟宇絶無塵埃與蛛網粘帶相傳魯公輸子所構故顯其異云傳昔創殿時雷震其處柱有字者凡二一曰詩來漢一曰謝鈞計皆倒書大可徑尺非𨽻深入木裏或謂二者皆雷神之名不可曉也正統周文襄來遊見之戲命削謝鈞計三字隨削而字隨入文襄異之乃止今柱上削處猶窪鄉民恆摹拓以去云佩之可以愈疾寺之後亂石離立泉交流其間數十步至小水洞上飛嵓突出巉峻可二十仞而大石翼其左右其中有竇形類偃月深莫可測水由是出客投以尾石輒關然鳴季司空碑謂微時親見白龍騰出洞中蓋龍穴云水出洞潛行石下百步乃見其一南注經寺之鍾樓一東流至于寺門一自湧金亭南下與東流淮至玉帶橋入于溪鄉之人資灌田甚利復由平地登山計二里許西北循石磴而上至乾洞右崖有刻字曰仙李巖下小洞如甃覘之無所見洞左峭壁百尺一古木葉類榆其根緣壁下垂附石而出復産枝葉人不知其根也前有一石蹲踞為洞之主峰左白象右青獅相向而立象之形垂而獅之形則昻以炬蠟照之中有玉柱髙可丈餘大六圍下圓而上鋭光潔如玉即唐張承吉所謂玉柱閟靈根者也石之白而方者髙下井井儼如經畫曰仙人田瀦水尺許冬夏不枯洞北有丹竈可容三釡竈之後倚壁一石石上特伸一手巨而且長色白如粉指甲宛然曰米堆曰鹽堆以形似名南有仙床倚壁如今僧之禪床石色皆青紅黃白相錯復緣石蹬而下凡數百級則大水洞在焉水勢迅奔而其流由外而入于小水洞而止聲如轟雷且不盈溢不知其何受而何泄也由洞而進右一長石直亘于中左之長亘者比右稍狹若為洞之第二門豫自外窺內洞益髙水益深左右石皆碧色如肝肺倒垂者以四五百計聨屬不絶二洞上下相承不爽尺寸如巍樓然亦天下一竒絶也乾洞前有九斗壇山有九峯如覆斗故名梁武帝禱雨輒應寺之西名國山山巔有封禪碑乃具孫浩天璽離墨山空石石長十丈餘無故自立因封禪之侈以為瑞寺之後有三生堂唐李蠙宋李剛李曽伯一姓而皆位至宰相沈石田詩所謂一姓轉身三宰相者也堂右偏石室刻碧鮮庵三大字李曽伯所書乃祝英臺讀書處與梁山伯同事筆硯者舊有偃柏在寺前如卧龍今已腐爛滅迹矣寺門西有玉帶橋唐李丞相舍玉帶而建者又名勝義橋李曽伯書扁寺前有龍巖亭豫先憩于此扁亦李曽伯所書也夷考洞之得名則善卷者即舜讓天下與善卷而不受逃之深山謂洞名以此豫品張公善卷二洞張之綺麗雖不亞善卷第卑濕而狹善卷則有張公之竒巧而雄偉髙爽過之張公洞遊善卷之明日思為張公洞之遊舟遂經東溪風逆甚四十里至湖汶鎮微雨豫興不可遏乘肩輿冒雨東南行羣山在目蒼翠可挹五里避雨天申宫宫舊名洞靈觀嘗有後唐明宗題榜及南唐韓熙載撰碑今皆不存而殿宇亦已傾圯所存惟三星石門而已須臾雨霽道士隨豫南行至頤山舍輿而登路多草莾約半里抵張公洞道士云唐仙人張果得道之所豫嘗覽周處風土記謂漢張道陵修仙于此而郭景純亦稱陽羡有張公洞則知名洞始于道陵不以果也洞面西北其周五里脣有石相距丈許又一石橫亘宛若門闕俯身從石級南下數十步上皆飛巖峭壁嵌空邃深駭人心目莫敢端視豫足弱附石小憩盤旋而下又數百步洞益空豁石壁三面儼如堂宇其通明處可方數丈謂之天窗雜樹蒙翳天光下垂傳為吳赤烏中震霆所劈上石乳萬株異形詭狀不可摹繪時有泉下滴人默承之出洞衣潔如故稍有言其滴處遂痕歸必浣滌亦甚異也中一臺崇三丈面可坐百人宋縣令趙伯津築以息遊者坐飲久之俯瞰冥窅足不能措命童子秉炬先後扶携而下臺南石刻張公洞福地五字道書謂天下福地七十有二此其五十八也臺之下怪石紛錯欹者倚鋭而出者却而後者顛而欲仆者拔而起者橫理者端莊而拱者偃者夷者將斷而復續者與石乳皆蒼緑一色傅染不逮又有如笋之植如鳯之騫如獸之怒而走雞而噬蓋洞之妙至此咸粹而遊者亦多止是洞西壁斜裂下多亂石其東一穴類洞而小人不敢入正南壁下其深黑處云可通後洞出洞半里東折觀後洞門石頗隘豫疲極不能入又東南數百步會仙巖孤峯側立數仞橫理若鑿道士言昔有人見二叟倚石遁形而入因以名巖其下空洞有泉出焉自右而趨潺潺有聲極可聽一斷碑橫卧草際乃元延祐四年重修會仙亭記大洞由合溪七十里入道院傾圯殊甚望之洞口呀然豫以日尚未暮命童子持炬并爉而入之僅數十步而止竒偉異常不覺喜愕交并是夜大雨如注早起視之日光燦爛山樹如沐飯畢復持炬入洞口洞口如大厦四五間可容千人石乳融結四壁纍垂若峯房鶴膝純白如玉青苔莓蘚雜然成章日光射洞五色如繪回光返射又如大緑金相非人世所有左之北白石下垂又一石直下與下石聨屬如柱透漏竒瑰形如鼇足其下平地以大石撞之轟然有聲名曰石鼓進五十步稍北則橫亘如列屏然若與外隔絶中用白石塑觀音像以祀之乃州守鍾其所立細玩之其文理縱橫形如今之泥塑佛座者至此遂分為二矣由西入則又𢎞敞若樓臺狀石皆削平又進則髙而且窪如螺尾由漸而小西石壁有咸淳年號題名墨染如新中有仙田大小十二頃疆界斬然如受巧匠施工又進則一洞平削光若墨漆有白石結成如雲而成象者有鍾之懸者有磬之覆者有垂若蓮者又如白布數十匹絞成下垂而文理燦然者有白石蹲踞名曰鹽堆堆之北有一石如人名曰賣鹽老左石中央一白石長可七八尺由大而尖如人舌特伸于外其上皆結成龍形首尾交互雜見者三四有龍石山人題云地肺開天竅行行入洞玄片雲孤鶴下誰見此中仙復大書靈洞二字循此深入里許懸石噴雪勢欲飛墮又進則石壁橫塞已若無路止一小竇旋折尺餘如車谼僅可容一人名曰銅關石橋橫亘于上非跣足傴僂不可入豫興不可遏令二童子涉之則水深及腰道人曰惟久旱則無水可入某嘗入其內則宛然一方丈四面純白色間桃紅若脂膏玉如雉雞斑絢爛奪目昔年題咏滿壁一石垂下曰石磬一石如練軃尾倒捲曰珍珠簾其左最深處為大雪洞右曰小雪洞比大洞尤髙而深邃不及愈入愈深土人云可通大湖昔好事者又深入十里沉黑巉呀疑為罔象所遊蓋不知其所窮矣豫聞之怏怏乃秉炬而返道人曰關外有一西洞洞口有橋橫亘如銅關水聲潺潺名曰仙橋髙約五尺轉折一窩曰燕巢一壁方徑惟餘桂字無年月可記不知何時其廣一丈有竒深可二百丈髙可一丈進數步石鏬中特出一白石下垂亦如前鼇足狀石之下垂若成雲者若肝聨者若肺附者若覆鍾若懸磬者仙田又一二十畦其規模愈小其景愈竒不可殫述遂出至洞口復命人以石撞地其聲如初真石鼓也豫以東洞詢諸道人道人云相傳為黃河洞非舟不可渡豫命童子涉之云止深二尺餘遂命輿人以竹椅由水中行計其廣殺比三之二髙若倍之進數十步則石形傴僂如人其色若甘草紋若未糝名曰米堆北復垂一石中分而上聨輳成一堆竒怪可駭轉而北則又如螺頂髙可二十丈突生白色牛頭下垂者二􅀢孔與角種種具存峭刻瑰譎乳膏融結千態萬狀此石崖愈竒岩下有潭深不可測進八十步許為龍潭可以行舟再轉則深暗無底不可入矣洞之南又一小洞深廣約四丈又一小景象也僅可容十人暖如曝日上下如砥可以開宴豫所見洞天若華陽張公善卷及齊雲雖竒巧不忝而病于淺狹獨此洞如臺閣規模雄偉壯麗兼而有之斯遊竒絶可冠平生矣恨生於深山僻壤遊客罕至惜哉豫又恨銅關以北止於口傳不及目見又笑丗人謂東洞如何觀者絶迹以見人言之不足信因題石上曰江南第一洞天天平山續經圖云天平山在縣西二十里巍然特髙羣峰拱揖吳之鎮山也山腹有亭亭側清泉泠泠不竭所謂白雲泉也自白樂天題以絶句名遂顯于世有卓筆峰巾子峯五丈峯石龜照湖鑑毛魚池大小石屋蓋因好事者得名吳郡志云此山在吳中最為崷崒髙聳端正特立山皆竒石山半白雲泉亦為吳中第一水盧志云山頂平正有望湖臺下有白雲寺宋參政范魏公奏請賜名及公之先隴在焉姑蘇志云在支硎南里最多竒石今按此山峯巒峭拔石皆林立亦無樹藝由以賢逹名也支硎山吳地記云支硎山在縣西十五里晉支遁嘗隱此山後得道乘白馬升雲而去山中有寺號曰報恩梁武帝續圖經云所謂南峯中峯皆其山别峯也今名楞伽山天峯中峯二院建其旁蘇州志云平石為硎山有平石故因其石以支硎為號焉玉篇吳有臨硎山即此是也其石室寒泉乃道林盤桓之處姑蘇志云支硎山其南有石門尤竒特七十二峯太湖之山發自天目迤邐至宜興入太湖融為諸山湖之西北為山十有四馬迹最大又東為山四十有一西洞庭最大又東為山十有七東洞庭最大馬迹兩洞庭望之渺然如世外即之茂林平野閭巷井舍仙宫梵宅星布棊列馬迹之北津里夫椒為大夫差敗越處也西洞庭之與北渡渚黿山橫山陰山秦餘長沙山為大長沙之西衝山漫山為大東洞庭之東武山北則餘山西南三山厥山澤山為大此其上亦有居人數百家或數十家馬迹兩洞庭分峙湖中其餘諸山或逺或近若浮若沉隱見出沒于波濤之間馬迹之西北有若積錢者曰錢堆稍東曰大㞦與錫山若連而斷舟行其中曰獨山有若二鳥相向者曰東鴨西鴨中有三峯稍南大墮小墮與夫椒相對而差小為小椒為柆圻范蠡所嘗止也西洞庭之北貢湖中有兩山相近曰大貢小貢有若五星聚曰五石浮曰茆浮曰思夫山有若兩鳥飛且止者曰南鳥北鳥其西兩山南北相對而不相見見即有風雷之異曰大雷小雷橫山之東曰干山紹山曰疃浮曰東嶽西嶽世傳吳主於此置男女二嶽也其前為粥山云吳山飼囚者也有若琴者曰琴山若杵曰杵山曰大竹小竹與衝山近若物浮水面可見者曰長浮癩頭浮殿前浮與黿山相對而差小者為龜山有二女娟好相對曰謝姑有若立柱嶻嶭玉柱稍却金庭其南為垓山為厯耳中髙而旁下者筆格驤首若逝者石蛇有若老人立石公石蛇石公石最竒與黿山龜山南北相對曰鼉山山傍有小鼉若螺者青浮二鼉之間若隱若見曰驚藍東洞庭之南首鋭而末岐者曰箭浮若屋欹者曰王舍浮苧浮又南為白浮澤厥之間有若粒浮水面者曰蒻帽有逸于前後追而及之者曰貓鼠有若碑碣橫者曰石碑是為七十二然其最大而名兩洞庭也莫釐峯成化戊戌行至法海仰見異峯寺僧進曰是所謂莫釐者也文振衣以升衆皆繼之或後或先或喘或顛至絶頂而休焉天若為之寬地若為之闢西望吳興渺瀰一白有若雲焉隱見天末或日下山也北望姑蘇橫金一𢃄人家厯厯可數有浮圖亭亭曰靈巖上方也東望吳江雲水明麗帆影出沒若有若無蓋七十二峯之麗三萬六千頃之竒皆一覽而在縹眇峯滙三州以為澤水始大中五湖以為鎮山始尊然三州之利不同而形勝亦異不厯其尊未易遍也而尊莫尊縹眇峯其陽空虛無梯可至西為晉陵水最大山最髙第四峯臨之特親第四峯之於縹眇猶人之掉右臂北厯三嶠以由西向東踰莫釐以窺吳江秦家嶺臨之最親秦家嶺之于縹眇猶人之出左臂北為姑蘇城穹窿陽山或逺或近厥疆不齊砂子嶺臨之最親由砂子嶺厯西湖寺躡峯之陰尢近是升峯之三道也明日得第四峯之道輿舁以進踰時而造厥顛遊于空虛忽見大水下奔千巖莫知所在客已有懼色矣居頃獲詢三州之形如螺如黛隱映煙際可以意求難以形辨然東北隱起非河非虹可指者靈巖浮屠也北為無錫其入最深可臆者陽羡諸山也西方不究厥始率山率山在豫里西二十里俗呼為張公山中古為率山即山海經所謂三天子鄣也鄣一作都後世失其處或云績之大鄣歙之黃山乘之而遂謂其上皆有三天子都又岐而二之指休寧率口上遊之山為率山皆非水經云浙江出三天子都在其東廬江出三天子都入江彭蠡西今為率山之水山陰山陽一東一西而流入于江者與古今吻合國朝禮侍朱公大同嘗考知率山之為張公山矣然不知三天子都之即為率山故猶以新安之江自績溪者出大鄣山巃嵸山自歙者出古黟山即黃山自婺源者出吉陽章嶺諸山各遡其源而不知統出于率山之一源循生其下少從堪輿家得見吳文正公所著地理表云率山乃江南諸山之祖長閲古經三天子都實彭浙兩江之源乃斷然以吾里中所謂張公山者當之而無疑而以昔所謂黟山率山大鄣者本一山也旋厯一山所謂金字牌李家店者乃古僧院住山盛時遊客絡繹行治宿貫之區今已蕩然翳莽中惟巨石一片上有三天子都刻字畫蘇蝕摹度可驗山澗兩石對峙如門謂之石門又上有兩石倒跨澗上水從跨下流出乃字之為仙人跨澗此正江源所自出青冽潺湲捫弄久之而去上一山至清風嶺獨石枕山相傳為支磯石乃憩嶺上萬甥携酒班荆而坐周羅二第亦至同飲三四行直上三天子都特出上兩圓土岡東西相望相傳東為擂鼓尖西為振衣岡中擁小石岡二北岡稍低舊無名岡石上巍下束壁削千仞頺然有飛墜之勢據之股戰心悸不敢俯視竊為兩巨中小以小為尊此即所謂三天子都也俯視萬山眇若丘垤下至清風嶺復盤折西下半山抵靈隱庵宿焉舊為靈隱院右有釋號靈隱師者飛錫駐于此以建院宋時極盛而今山下休婺叢林名剎乃其屬庵也旦起訪靈隱故墟度西嶺尋龍窟觀瀑布泉泉自崖顛㵼下以坎坎為三井神物潛焉禱雨請汲其水即應井下石壁斗絶莫能適從巔而下旦視危懼不敢慿乞水者多夜往掩所不見還至清風嶺復欲一登天都衆莫從然復雲四合黟山古注以為深山多雲故黟字從多從黑而謂之黟山於此益驗黃山在宣歙境雄鎮東南山之陽踰百里為歙郡治其北三十里為太平縣又北抵宣治二百四十里不當通都大邑之衝遊者罕至今余始得遊焉山西之麓田土廣衍曰焦村蓬峯丹碧稍拔攢蹙若植圭若側辨若列戈矛若芙蓉菡蓞之開雲煙晴雨晨夕萬狀繇焦村南道二十五里至湯嶺上仰視羣峯猶在霄漢間岡阜蟠結鑿石開徑嵁巖欹危瀑布聲訇磕如雷怪石林立半壁飛泉灑巾袂當新暑凄然如秋又十里憩祥符寺寺前淙流走萬石間山皆直松名杉藤落莎被蓊薆蘢茸有龍泉自朱砂峯來依巖通二小池上池瑩徹廣可七尺深半之毫髮可鑒泉出石底纍纍如貫珠不絶氣馝馞若湯酌之甘芳蓋非他硫黃泉比也明日遂試浴垢旋流出纎塵不留令人心境清廓氣爽體舒相傳沉疴者澡雪立差理或然也寺有南唐碑初名靈泉院宋祥符中改今額又龍池距寺左三里許奔流噴薄㵼石潭中亭午照燭五色璀璨誠靈物所居夜聞啼禽聲甚異若歌若詠節奏疾徐名山樂鳥下山無有行寺旁近見數峯凌空僧指曰天都芙蓉朱砂峯其尤髙者天都峯也上多名藥採者裹糧以上三日逹峯頂余心甚欲遊而鳥道如綿不可乃止凡再宿寺中還至焦村之三日行三十里遊翠微寺古松修篁石澗橫道僧橋焉覆之屋以息遊者清冷靜邃已隔塵雜余為榜曰翼然至寺庭有井泉僧言此麻衣師卓錫處泉亦清美不溢不涸一峯卓然獨秀直峙東南隅曰翠微峰其條支回互寺居盤中故諸峯俱隱不見明發行十五里過白沙嶺往往攀崖壁牽蘿蔓或小木貼巖或棧而度幾不容武旁臨絶壑惴惴焉不敢俯而窺又七里至絶頂頂平廣倍尋方據石少休時晴雨旭霽氣象澄潔環視數百里岡巒墟落厯厯可數九華緑翠若連開陸焦村向所見峯皆平挹座間俄頃白雲滃起遙山近海如出沒海濤僅餘絶頂若乘槎于天漢中倐又斂藏如掃如是者三可謂竒觀矣日暮抵寺信宿又二日從村北十里登仙源觀至元中新安吳萬竹習靜兹壤嘗衍易宛陵誇詡其勝豫贈詩還山今竹存而吳逝已久林阜周密南列翠峯練形引年者固其所哉既還憩吳宗公仲雲松樓越十日踰興嶺而南所謂三十六峯者駢列舒張橫絶天表衆岫疊嶺效竒獻秀盡在一覽世稱黃帝與浮丘容成於此山上升改名黃山江浙諸大山所分以出君山在縣治北二里枕江之濵舊名瞰江山後以春申君易今名江流回沍其下奫潾􅐓溶水光如練山半有亭曰松風其巔有廳曰翠煙廳之後有堂曰浮雲正德八年重建蘇人都穆記北向有堂曰時雨從堂而右為如斯亭山之麓西向為東嶽行宫左為光孝禈寺右折而西為張公祠從此而上當山正中真武廟焉突然髙出跂而望之山氣青縹杳乎神明攸居而靈颷皓景懷納川渠曲而阿復而蹬脊而岡層出而崖叢石積比巒峯嶞秀巋然百里之巨瞻信佳勝云按宋志山巔故有松風亭後易名心逺紹興間知軍趙嶲之作堂其上名曰浮逺取東坡詩江逺欲浮天之句招隱山由廣德至寧國入招隱山洞當巔出洞前有小築左昭明太子讀書臺初入卧龍洞深約六七丈廣半之內一石如床可卧折而北則有玉蘂洞廣深三倍卧龍空突多門覆處巉嶫如蘂然又折而北留仙洞差小石頗嘉東下棲雲洞外口復圈一門門上可步行洞內廣不及玉蘂中實竅窽諸洞石膚潤而堅又玲瓏瑩淨云文脊山寧國縣西三十里脈迤邐而落還為小山皆石成者水從石洞中漈消自東南巖下啓一洞如城門廣四五丈傍甃兩壁石懸突如鍾鼓是為山門洞繞入一寺嵌石藏中背下一小孔為夕陽洞孔狀鱗文猶繪鐫所就又隙穴種種西牖一通明寺右數百武躋陟為碧雲紫雲二洞小石屯擁靉靆然别以二色西碧雲形圓中尖竅而上右復啓一軒一門有石盆諸物東紫雲形長兩壁麗繡有石牀諸物南越一山又為漣漪洞隘􅀢而深石巖上覆水暗下洞中隔山復啓一洞流出石赭色瑩潤又南里許朝陽洞特廣青翠交垂左半為水道右通二門上覆玲瓏石峯矗起門亘巧如舞如蹲浮山在桐城縣東九十里又曰浮渡山自地視之如􅀈自江視之如浮不峻不麗其中巖壑相屬多石石多屈曲可觀其崖三百有五十其最著者三十有六其峯七十有二其少南為石龍峯其峯蜿蜒如龍人行龍脊上其東為陸子諸巖陸務觀有詩其巖聨綿如千步廊即之纍如延之豁如謂之廊巖其南為會勝巖其巖洞而且邃可屋可樓景象皆萃山巒翕集其東有穿心巖空曠可數百武遊者出入焉又其東下為石門其門綽如也又其東南為金谷巖髙而敞倍於會勝其上有屋有塔其西南有峯千仞巋然俯江其上有兊巖其西上為大通巖視諸巖尢勝者古寨有龍湫人謂之天地云又有井其水淵洄不溢不涸深不可測其內有浮苴壅積而生草木蓊然木今茂矣而其根猶著水上其西下為張公巖其中亦有井甘而且冽又其西峯諸岩巖亦有可居者中有滴水巖其上有門僅其望天日坐其中泠然生寒久則毛髮俱灑矣其南下漸平曠有浮山寺今廢其上多芝多蘭有桂多白石多唐宋人石刻其周五里其髙三里灊嶽灊嶽在潛山縣西北二十里一曰天柱山一曰灊山一曰皖山漢武帝以霍嶽逺在衡山欲南狩乃移近於灊山登封之故今為霍山亦以為霍嶽云然灊山聳其北皖山揖其南兩山削壁如拱如輔疊嶂層巒拒雲拂日空青積翠萬仞如翔逺之不見分即之不見合雪山盤其東俗以為天柱山磅礴重厚如俯如集霍屏在其西巉崖絶碧真若屏立是山也仰摩層霄俯瞰廣野瑰竒秀麗不可名狀有峯三十有七其最竒者在灊山有天柱峯其峯突出衆山之上屹然獨尊峭拔如柱倚連二峯其勢鼎峙一曰飛來其巔有巨石如人置於其上一曰三台上台如麗中台如倚下台如隨其頂有七星池一方一圓周不滿丈深不滿尺其傍有獅巖曰大獅曰小獅其巖槎牙如座其中有洞曰司玄其洞空邃可容萬餘武石梯差差石欄礌礌可遊可止曰桃源其洞有桃其花五色其實可食曰黑虎其洞如虎有煉丹上山中山下山昔人丹臺在焉相傳為左慈煉丹處其東下少南有真元宫有山谷水有山谷寺其在皖山有榴峰其峯突然如結有獅峯其峯昻然如顧有印峰其上有石如印其半有天祚宫其下有登天壇有九井其傍有石床可容百人其井深不可測旱則殺一犬投其中即降雨犬亦流出其在雪山有雪崖崖半色垂如雪瀑布萬丈冬夏瑩然如晴故又謂之晴雪其上有蓮巖有玉鏡池有芙蓉山盆盂山其中有白雲巖下有石室石牀石壁石門石臼石磴有丹竈其傍有石松其松如蓋松生石上不知幾百年上有鬬牛石貂鼠石鸚鵡石酒甕石月牙石其石如牛如鼠如鳥如甕如牙其半有藏虎巖其下有太子閣昭明讀書處有回龍橋武帝回輦處有天柱寺其中有三十六菴其最著者曰芙蓉曰中峯有仰天湖其湖􅀈而可注可灌可沃其在霍山視灊皖若引若障其山之髙七千二十丈廣二百五十四里周八百里道家以為第十四山司玄洞府其峻如擎其起如躍其止如蟠其落如踞云三祖山縣東南麓曰山谷一曰三祖山為灊之支山其山上有燦師塔一其下有志公塔七其東為真元宫白鶴泉其南為山谷寺卓錫泉吳塘陂其內為涪蓊亭其中多宋元人石刻其下有石宛如牛其牛卧有龍泓其前有酒島在潛水之涯有簾巖有釣崖有石蛟又有峯十五嶺八崖五巖八源四洞八臺四池三朝峯即天柱峯有雲鶴時往來其上迎真峰天書峰丹霞峰頂有神丹或獻如霞司命峯司命真人發祥所都降丹峯相傳昔人降丹與許真人處潛陽峰在司命後上有獅子石麟角峯嵿最髙石萬嵗峯在玉照峯北真元宫東排衙峯真元宫西皖伯峯在天柱山下上有仙丹函天池峯皖山嵿冇定心石天印石上有丹甕巖兩相挾中如甕世傳皖山之嵿有丹砂人不可到夕陽斜照紅日輝映覆盆峯皖山之嵿巨頂如盤丹砂峯盆峯之南世傳有丹砂人不能取中夜或獻紅光逺近皆見石函峯皖山削壁間有石函陷于壁中光彩熒然斗嶺又曰大嶺在逍遙壇岩西其上地平如趙公嶺三祖山後趙真人嘗寄岩下其上有下棊石試劍石金仙嶺在真元宫後十里煉房嶺下煉丹之上中煉丹之下雪珠嶺中煉丹後數百步徑通仙人臺上有碎石圓淨如珠石壯嶺皖山南罔嶺白鹿見處九曲嶺三祖山後其嶺曲道士崖石函峯西南逺視之如羽人端笏而立獅子崖天柱山下有路通天池絶頂仙桃崖下煉丹崖壁産挑處仙女崖白水澗側詩崖吳塘水南崖有石曰詩崖又曰蓮子崖白鹿巖其上有洞穴朝真巖真元宫前其上有迎真亭虎頭巖真元宫東極髙處水晶巖司玄洞下其巖直通蒼海昔有道人玄巖採藥見一處煙霞清絶有洞門幽曠峰巒竒特冠絶諸處真司玄洞天也懸崖絶隔人不能到焙藥巖上煉丹五里左直人焙藥處逍遙巖上煉丹龍吟巖灊山前虎嘯巖灊山側天柱源在朝天峯下乃閭丘方逺棲處桃源昔人曽結菴其上種术蒔茶源下田數畝所收可以卒嵗物不外求浮人罕至山川風物如在世外白水源灊西南飛瀑千丈上連藥真人芰舍衆山闈繞景物絶嘉丹霞洞灊山後香泥洞真元宫殿後相傳唐明皇開元間遣使齎額時出泥其泥香劍仙洞在蓮子崖下石牛洞在山谷中蓮子洞崖邊水蓮洞中煉丹白花洞真元宫殿前毛人洞相傳夜毛人曽來聽經髙奔臺存真菴東仙人臺白鹿崖東北廣五丈其面甚平中有仙人足迹定心臺灊山天池之北花峯之南方廣數丈下臨千仞視之悚栗照陽臺皖山間夕陽所照光彩射空盆池皖山之頂其池如盆天池灊山北其上垣然有天池二清瑩澄徹不溢不涸七星池天池北環列七池其形如水清水盈溢金焦二山南都東以赤山為成臯南以長淮為伊洛北以鍾山為曲阜西以大江為黃河即北都據冀薊上遊當燕趙要會環蒼海博大襟河濟通流同一形勝之雄也石頭城樓堞相望玄武湖圖籍閎深閲江樓萬象崢嶸獻花巖天闕拱峙亦與北都天壽山龍翔鳯舞大行峯積翠凝華玉泉湖銀河碧浪居庸關疊嶂重巒同一山川之麗也猗與盛哉崶到官無幾何忽拜廣西臬僉之檄戒行登舟渡江帆揚風迅須臾抵鎮江郡金焦之間泊焉維舟陟磯披襟逺覽用愜夙慕東南賞心金山舊名浮玉有龍洞有妙髙臺有善財石有吞海亭有日照巖而中泠泉水品稱天下第一蓋其前臨滄海却倚大江獨立無朋以天為際風濤朝夕吞吐魚龍淵窟盤據所謂萬川東注一島中屹者也焦山或名譙山有羅漢巖有煉丹臺有桃花塢有吸江亭有寶蓮閣白石粼粼髙見雲表其獨也如洪濤之砥柱其對也如蒼龍之雙闕山旁二島即江漢朝宗于海水道也合而觀之焦山山裹寺金山寺裹山相距甚邇氣勢相抗世以並稱緣二山拔出江心岌嶪分引如兩臂狀南臨鐵甕之城北瞰瓜步之洲西接建業集慶之都東據海門天蕩之險淏淏焉㵿㵿焉稽天而白者皆水也矗矗焉嵯嵯焉拔地而青者皆山也信哉乾坤勝覽乎按焦山乃漢處士焦光所隱地故名光三詔不起蔡中郎贊曰猗與焦君常此玄默衡門之下棲遲偃息云云以其曠然天地為棟宇出形入玄羲皇以來一人而已瘞鶴銘為此山一絶石刻猶存乃華陽真逸撰上皇樵人逸少書詞曰相此胎禽浮丘著經爾其何之解化惟寧云云原其所書諸説不同即蘇子美山陰不見換鵝經京口新傳瘞鶴銘之詩知為右軍書也金山名昉於晉建或謂唐貞元間江際獲金數鎰表聞賜名宋祥符名龍遊主僧佛印了元者收內翰蘇文忠公所許玉帶永鎮山門觀公之金焦放船詩篇則其夙耽兹寺可知矣虛蜃氣浮張敬夫萬頃洪濤裏巍然閲古今在元如馮海粟江流吳楚三千里山壓蓬萊第一宫雲外樓臺迷鳥雀水邊鍾鼓振蛟龍夫金焦佳山水為京口重而京口形勢亦為留都壃域重鎮口山川京口揚帆急渡頃刻登岸首觀善財石其石孤挺欹側宛然有禮拜之狀寺僧導豫西至回廊入玉華館扁曰觀瀾左右兩壁嵌名人題詠至於無隙豫坐對玉華峯則西南以北三面水光山色照映几席且形勢環繞波濤洶湧異常真一竒觀也遂入大雄殿其西則中冷泉扁曰天下第一嘗之甚佳或又以泉在江中苦於汲引寺僧移置於此非原泉也未知孰是又由石級轉至琉璃殿殿後有廊護以木欄坐觀之則西之江茫然萬頃逺望諸山如抹景象頓殊又一竒觀也由石級而坐坐江天閣閣之下塑關王像於其中其窗臨江舉目北望則瓜州煙大皆可屈指而風帆往來下視一葉濤聲瀠回愈急愈震遂登其閣則錫山王問題曰江天一覽至此下望則濤聲與水勢若緩而其見愈竒矣遂轉北上直登留雲亭若置身雲際四面江山如指掌焉夫以萬水東注一島中立丹輝碧映攬數州之竒于俯仰間而下盤魚龍之宫實堪輿一極勝處也復由塔傍攀髙北下數丈自石隙而入名裴公洞石碧四圍中空丈許內置僧龕中肖頭陀之狀俯視江水出竒石間於石中窺見中流帆影尢為搖曳自洞門捫石而下僅可容足而石勢巉岩陡絶下臨湍流不覺目眩神悚路忽中斷山僧接以木棧自下而升始逹朝陽洞洞廣袤六丈許石皆下垂中可坐二十餘人有遊僧入定於內洞東向日初出時霞光五彩如繪隨浪沉浮僧言與岱嶽日觀相似出洞至江堤尋石鏬秉燭俯傴而入則山皆玲瓏空透以垂石則如氷溜其下而起者如笋然縱橫排列水流石間亦甚湍駚聞濤聲恍在數里外復回數十武始出洞門轉東即盤陀石東坡與僧了緣坐談處石髙數丈水流其下盤陀石稍南名曰妙空岩方廣數丈石西復如廊岩又上數級乃妙髙臺東坡書經處故址尚存復自中冷而西至江岸乃見石排山三石削成髙數丈孤立湍流中與東善財石左右若拱若揖石去山址百丈波濤洶湧聲如巨雷名為龍門其勝益名於天下蓋勝在水而不在山也若以此山置之於陸特一卷石耳故觀山之道有二有因水之外景而增勝於此者則浙之天目徑山潤州之金山是也有直自本體而稱勝者則閩中之武夷台之鴈蕩休寧之齊雲是也及豫返掉登玉華寺復覽長江一望無際回視金山之逶迤曲折不啻十百千萬可以互照矣初九日由西門北行三里許入北固寺寺之殿宇不甚𢎞麗傍有空地半畝許如砥且潔望之則甘露寺之樓閣層疊如倚空中寺址有地一窪甚平且曠新建一大佛殿獨居其中塗以丹粉前後青松四列相雜成文真如圖畫遂出北至甘露寺榜曰天下名山第一舊乃梁天監中武帝御書今則宋延陵吳琚書也進寺門則回廊環繞由漸而髙製類金陵之朝天宫及巔則一亭雄據其上額曰摩雲坐亭逺望則東之焦西之金如侍衛而長江一望合二山之景而在目焉京口三山此其最勝歟轉而西則有觀音閣周遭檻欄皆以青石極其堅固扁曰靜裏乾坤西望金山青􅀢一抹可謂萃景人皆知金焦之勝而不知北固之尤勝豫故題曰三山第一上乘禪林云蓋甘露與北固雖異名而總之則北固山也黃山三十六峯總圖黃山舊名黟山當宣歙二郡界髙一千一百七十丈東南屬徽之歙縣西南屬休寧縣各一百二十里東北屬宣之太平縣八十里即軒轅黃帝浮丘公容成子棲真之地唐天寶六月十七日敕改黃山按江南諸山之大者有天目天台二山郡國志云天目山髙一萬八千丈而低于黃山者何也以天目近于浙江天台俯瞰滄海地勢傾下百川所歸而宣歙二郡即江之上遊海之濫觴也今計宣歙平地已與二山齊况此山有摩天戛日之髙則浙東西宣歙池饒江信等郡之山並是此山支脈諸峯積石迥如削成煙嵐無際雷雨在下霞城洞室乳竇瀑布無峯不有山下往往聞峯上仙樂之聲林澗之下巖巒之上竒蹤異狀不可模寫誠神仙之窟宅也自歙郡自山口一百二十里自山口至湯院又八里磴道﨑嶇不通車馬按周書異記神仙傳云昔軒轅黃帝問道於廣成子受胎息於容成子吐納而谷神不死獲靈丹於浮丘公遂思超溟渤遊蓬萊乃告浮丘公曰願摳衣躬侍修煉浮丘公曰凡擇賢而師學必精奧棲隱勝地業則易成煉金成丹必假於山水山秀水正則藥乃靈惟江南黟山據得其中雲凝碧漢氣冠羣山神仙止焉地無葷辛境絶醒腐古木靈藥三冬不凋名花異果四季皆有山髙木茂可為炭以成藥迸泉直㵼狀如飛布下有靈泉清溫東夏無變若能齋心潔已沐浴其中飲之灌腸萬病皆愈黃帝遂命駕與容成子浮丘公同遊此山山有三十六峯三十六源二十四溪十二洞八巖云齊雲山環休寧縣山皆平逺不足以當大觀出縣西三十里至白嶽嶺山始髙峯始竒石路盤回如線遊者肩輿緣梯而升至以雙絙曳前後其甚處輒下行拊背或行不能步自白嶽西南行五里至桃源嶺重崖夾峙上結小屋以臨風曰中和亭立亭心下視已數百仞野田茅屋秩秩如畫亭下二巨石蹲伏色黧黑中有白質成突晴曰石鱉塢塢傍大壑深不得其底但聞水聲濺濺出草樹間曰桃花澗循澗南行里餘至獨聳巖蒼然峭壁橫截一山近西乃有石鏬方廣若門蓋天造以通遊者門首石楠一株其大數圍四顧門下諸石如伏犀馴象不可狎玩入石門東南聨巖如城懸石四覆勢欲飛墜其第一曰彌陀巖巖屋不踰丈第二曰觀竒巖視彌陀稍劣前一石色正緑昻啄而軃尾曰鸚鵡石第三曰羅漢洞稍加大焉二石龍循洞門旁出鱗骨隱隱蹴之疑為石子所砌諦視之石肉相粘復意其為真龍也洞深二十餘里束炬東出可抵縣之藍渡溪然愈入愈狹莫敢為之導者第四曰龍王巖視觀音加劣巖上飛泉灑灑落崖下如雨四時不竭曰珍珠簾潴水沸散于西澗曰龍池泉西巘有虎迹如泥淖所印者曰黑虎岑黑虎西行折南里餘至車谼嶺其峻視白嶽倍之車谼南二里餘至玄武觀觀後一山突起如屏倚天正立所謂齊雲巖也古松數十夭矯如虬龍皆數百年物觀左一峯曰右鼓右一峯曰石鐘夾屏兩峯曰輦輅皆以其形名觀前溪水如帶委蛇而東為石橋以度南直觀門數百步一峯挺然拔出莽蒼中不與羣山相屬曰香爐峯橋西數百步髙崖中斷一小峯離立澗下曰捨身崖崖西二里餘五峯差列如羣仙冠珮下天際以向齊雲曰五老峯西北聞有沉香洞人迹罕至草木蒙翳時有蛇虎潛其中不能往也遊者始入率以白嶽髙至桃源則白嶽已在其下至車谼則桃源又下至齊雲則車谼益下蓋於此可以見天之髙地之迥杳不知身之在何境也齊雲嵓齊雲嵓為白嶽之正區羣山回環夾衛後峯倚者為輦路前峯面者為香爐大素宫端據中央鎮九霄而攬四境果宜神靈之栖而非玄帝自相卜焉不能也東去里餘惟羅漢洞與天門為竒詭此外則蜿蜒散漫漸入凡塵矣白嶽來自岐山二十餘里故竒詭紛然交爭疊競不可悉狀者惟西來為最盛由宫西踰浮雲嶺下不一里峯側一石斜架有泉飛灑如縷注為洗藥池者鵲橋峯也又踰里餘壁立橫張蓋覆穹窿如堂室者紫霄崖也馴伏崖前其首軒然欲起而奔者駱駝峯也崖左卓牙拖練飄揚如飛者展旗峯也峯外盤螺並立如去欲留者三姑峯也西望里餘參差俯仰翻聨如向人拱揖者五老峯也又踰里餘回望方平如障峯半踈松行列蒼翠貼嵌丹崖如畫者獨聳峯也由是西望里餘諸峯有如劒如戟如蓋如鼎者雖可狀而未有名焉又踰二里餘則茅臺嶺麓矣嶺麓浮沙穿石小澗清冷漾漾而流五六里乃渠口焉齊雲南澗晨下五老峯由獨聳塘折西里餘至南山嶺慿視兩山傾峽下插深壑中而茅屋石田平林盤阻逺則亂山糾結煙靄明滅杖屨之下窈然别一洞天也迤登而下幾一里舉首巖崖砑然欲飛墮左前雙峯並峙中巑一峯竒詭東向如人為望仙峯右削丹崖橫理深闞飛泉厯級而注如珠為玉階泉又下五里穿磈緣蘿始抵平壑水聲濺濺出亘樹間為井源循澗經丘及農舍少憩啜茗而出當門數峯拔地如笋四顧巃嵸如城堞獨西峯窈窕入雲如髻為玉女峯北向一峰方平如臺為玉臺峯左開北巖空洞如室深入二十尺長廣五倍之龕榻之迹依然為佛巖豫詢天井所在道人指西嶺以陟穿松林塢稍東折北巨壑幽陰漫目青茅蕭颯夾徑如人長道人健步如奔鹿又南陟三里逾一岡下見石溪穿林抱麓西走如虹為南山澗砂石可數毛髮可鑑遡行二里行石井九焉黛色深坎是固地設冥造顧人力不能有或束如甕口或圓如明月或長如海蚌或長如天塹屈曲相屬如星躔炯炯泠泠可聽可玩復順流泉二里得一潭焉砂漲幾平旁有瀑下如布其源不知所從來由澗度峽行則不能成步崖間一石如橋橫跨飛泉之上為小石橋巖折北里餘突見蒼巖騰空如雲一竅通明如望月為月巖直前二里又得一潭焉道人曰是所謂天井也流至是陡落奔如玉龍轟如雷驚濤如雪中有井口圓徑丈餘謂嵗旱有激龍者以絙百丈繁鐵篆探之終不得其底上則雄崖虬木勢向下窺陰翳嶮峭潭畔凝立久之心神自怖疑有神物在焉乃梯崖而下轉盻周覽其源則又不知所從來矣循澗以西二里許乃得第三潭流至是而夥集峽至是而益嶮瀑布下懸如銀河人至是不敢近但袖手仰觀而已謂是流出為靄江會黟溪入浙赴海夫是山深入不二十里萃三潭九井之勝羣峯萬壑長林夾澗前峻嶮以蔽日後幽晦以多阻春夏則百泉淮漲峽徑泊沒逈絶人迹杳然深邃誠為魍魎之疆場龍虎之窟宅也豫嘗竊以為齊雲勝於山抑孰知其水之勝有如是耶嗚呼登齊雲自白嶽而升至觀而返者嵗幾千萬人至觀及紫霄五老而返者嵗幾千百人自五老而至於是者嵗不一二人遊迹罕及而境固自竒今子幸來遊而宣之言夫豈偶哉是知物之不終蒙也九華山總圖九華山敘圖必有總合之盡其大也九華自秋浦七井而來屈折三十六盤過白沙嶺入邑之南界山始髙峰始竒殆天造地設以壯青之形勢也其山水寺宇之名位形狀俱詳各圖兹不復贅但俗傳九十九峯云者自陽數之極言之未足盡其祕也大史陶文節公云萬峯飛舞上青天信哉不然陳青隱先生曷云三十年來遊未了也九華山自青至化城約五十里許去輿就騎由九華廟行十五里至西洪嶺適天氣和朗諸山拱秀左一峯最髙詢輿人則枕月也右峯突起雲觀山也西洪南下有山在東南兩峯間則蓮花峯也其他峰指顧類是又五里至石龍口十里至山西屯中有田數十頃寬平如山外而春水之漲日光掩映四山環列如黛亦竒境也路東折見獨峯雙峯等列峙上華石照諸峯升髙時見之經協濟祠抵橋庵日已西僧具飯飯已過伏龍橋路險甚易肩輿著道袍僧會前引按志指諸峯觀焉二里許有巨石名定心百餘步至湧泉亭山泉冷冷噴流諸峯各露頂顱又二里至半霄亭自橋至化城路之半也里許兩澗深絶中一路僅通人行小仙橋也半里許至碧霄亭香風冉冉自山下則二小僧以香爐迎十餘步過大仙橋狀如小仙橋而長聞空中簫管聲則小僧又以吹迎已至望江亭則老僧盡以徒衆迎前指曰西北煙霧中如練此長江也登是亭見之故名又東指某天柱某雲門某二神天柱北五峯拱對余問曰此五老邪僧頷之稱是經玄覽亭路南下左折過聚仙橋懷賢亭扺化城寺則日銜山矣峯巒四列橫藍疊翠在在竒絶飯已出門緩步老僧出觀諸名賢詩數數陳山中故事已蘇君遣青衣擊門以酒至觴數舉問天色晴晦忽無星宿豫恐曰諸峯尚未登覽將山靈祕豫耶為乞晴文禱之夜宿千佛樓風聲四作翌晨二吳生携榼來則蘇君不得至遣二生侍也起視雲氣漸微齋沐謁太白陽明先生祠已諸峯盡出偕二生至玉香笑指諸亭禮金池藏環視塔光老僧談地藏顛末亹亹不倦東折登神光嶺最髙處采五叉松望天香嶺金剛尖二生啓榼酒數舉東遊晏坐岩自山根至岩五里許路九轉有石甚平可坐數人足至是亦倦少憩焉題緩步二字于石又五轉觀龍女泉路左有石突出狀如龍頭題云龍頭石至岩巔四壁峭削岩石倒垂上有陽明親書周經和尚偈卧而仰讀筆迹宛然西折一庵庵內石洞長丈餘金藏修行處也庵外有舍生岩其下深不可測令數人牽衣袖側身下視毛髮竦動稍南一禪室懸岩南向適對外山坐牖中界境空寂二生觴豫豫亦觴二生遣人取石芝烹以侑酒地源摘茗汲泉水煎啜各嘆竒不置已登洞之顛與二生蔭夜合趺坐僧環列指云此古仙此鉢盂此中峰此雲門其對岩稍西而最髙者此天台他峰類是皆外峰也自今光嶺而宴坐至棋盤石而北則內峰也皆拱向化城晏坐岩一名東岩登是岩則內外諸峯皆在几席岩額大石二方平廣如削豫書千峰坐照四字于上僧立鐫焉內峯之外有溪石聲括括僧曰此溪經龍池而下即伏龍橋水也志載龍池者三厯數之實數十焉此內池也每山一重則有溪緯其下外峯有數重焉各奔連近縣來化城途所見獨髙蓮花等峯與九子岩獅子行道羅漢面壁等峯不止百數皆外峯之綿亘秀麗者其溪因之其外峯之二重溪流直抵協濟祠同諸山之水而併入西北則驛路之五溪橋水也外峯險絶遊足鮮到與僧周厯內峯焉二生力倦不能從峯巔上下殊險怪肩輿亦弗能就徒步往命兩人掖之由插霄峰摩空嶺觀虎洞僧云數年前有僧坐此六年不出虎不入洞經讀書臺望一中石乃緣蘿而下圖書編卷六十
