body:
  text: 圖書編卷四十二明章潢撰雲南圖敘雲南古梁州裔境地崇岡􅏭嵲激澗縈紆城郭人民夷屬十七時恬則蟻屯蝟聚有事則禽駭獸奔蓋人自為險勢難統一者也必知其要領則雲南臨安大理永昌鶴慶楚雄頗號沃壤然元元江安臨安路納交趾金金齒司後改設永昌軍民府騰騰衝地擁諸甸瀾滄聨絡寧永寧麗麗江曲靖彈壓烏蠻四川烏撒烏蒙等府是王公設險於斯要矣而土酋大者元江武定景東麗江小者姚安北勝鄧川霑益鄧川屬大理霑益屬曲靖俱州并以兵力稱桀向背靡常蓋自麓川難夷正統土酋任思發以麓川叛嘗發兵討平滇境粗安則沐氏黔國公世與有力焉惟尋甸一帶風土絶異兵衛漸疏故諸羅武定諸川等族俱羅夷搆釁相尋而木邦孟密亦恃其險逺至今不聞悔禍咎在撫綏失䇿本無置制可言然滇南北向中州必假道貴陽貴州而後進稍值兵梗坐令隔絶則滇池之達馬湖四川屬府武定之達建昌四川行都司屬衛川陸具存久而榛塞在今日所宜亟講而萬里投宦類難得人則夷情蠢動未為無故此尤不可不慎也沿革古梁州之南境為徼外夷地漢置益州郡領於益州部刺史自唐至宋為蒙氏段氏所據元置雲南諸路行中書省及肅政廉訪司于中慶又置曲靖等路宣慰司于曲靖臨安等處宣慰司于臨安大理金齒等處宣慰司都元帥府于金齒本朝置雲南等處承宣布政使司都指揮使司提刑按察司並治于雲南府云雲南等處承宣布政使司治雲南左右布政使二左右參政四左右參議三領府二十有二內羈縻十一屬州三十有八內羈縻十一縣三十有三內羈縻二長官司十宣慰司二宣撫司三總為里六百二十有四户一十三萬二千九百五十八口一百四十三萬三千一百一十夏秋二稅共米麥一十四萬五百八十八石鹽課提舉司黑白等鹽并額辦本折色小引鹽五萬六千九百六十五引雲南都指揮使司𨽻右軍都督府都指揮三內掌印一僉書二領衛一十有七屬所一百六安撫司三長官司三守禦千户所一十有二本都司所屬漢土韃馬步官軍八萬一千四百餘員名提刑按察使司按察使一副使僉事分道四普安金滄臨元洱海欽差巡撫兼贊理建昌畢節都御史一巡按御史一或清軍御史一俱駐雲南欽差征蠻將軍總兵黔國公一世守雲南雲南各府州縣煩簡雲南府其名春秋時滇國漢益州後漢建寧晉晉寧煩其屬州四縣九附郭昆明二十七里煩沖外富民三里僻簡無瘴宜民四里僻簡晉寧州五里簡屬歸化二里簡僻呈貢四里沖安寧州十里煩屬羅次三里僻簡祿豐二里簡沖昆陽州四里簡僻屬三泊二里僻易門三里崇明州九里簡少賊少瘴其形勝東距爨東南屬交趾西摩伽陀北接土番東北際黔巫山明水秀會要之地其俗諸夷種類非一其俗習尚各異大理府其名永昌煩沖其屬州四縣三附郭太和六十六里煩趙州八里煩沖屬雲南十五里煩沖鄧川州十二里沖簡瘴屬浪穹二十五里簡僻有山賊夷漢雜賓川州十二里簡有瘴賊雲龍二里有軍民總管長官司一為十二關煩無瘴其形勝百里二關峭山深塹其俗本于漢地雜百夷民多士類臨安府其名通海建木秀山煩其屬州五縣四附郭建水州八里煩沖外石屏州八里簡僻微瘴阿迷州十四里簡瘴寧州七里簡瘴寧逺州七里無瘴通海縣二里僻河西縣四里嶍峨縣七里瘴蒙自縣十五里長官司九其形勝雲南極邊廣西都會北澄江西楚雄南鄰交趾其俗士質野民愚傲僰爨二種最盛楚雄府其名威楚無瘴無賊漢多夷少煩其屬州二縣五附郭楚雄十里煩沖夷廣通四里簡僻定逺五里煩僻定邊五里簡僻􅑇嘉一里簡南安州五里無瘴有賊鎮南州五里簡沖其形勝當陽之地南瞰金齒北距羅婺東接昆若諸郡西連大理最為大部其俗好訟崇釋漢僰同風澄江府其名河陽無瘴其屬州二縣四附郭河陽六里煩江州二里有瘴賊新興州二里簡僻路南州三里無瘴屬邑市一里其形勝跨㿩溥倚湧拔面撫仙背羅藏山明水秀其俗蠶衣耕食質野富強蒙化府漢為益州郡地知府土官其名唐陽瓜微瘴多夷其形勝四山環堵北距點蒼襟帶西珥其俗狼悍景東府古桾南地漢時未有其地唐時南詔蒙氏為銀生府之地知土判流其名開南八里有瘴賊其形勝徼外荒僻其俗民多百夷不通漢書廣南府其地宋時為特磨道儂智髙之裔居之其名元廣南知土判流六里簡其屬州一富州四里其形勝山崖髙峻道途﨑嶇一夫當隘萬夫莫入其俗地多儂人沙人好鬭訟廣西府其地梁州界古滇國牂牁郡無瘴有賊其屬州三師宗州十六里簡僻彌勒州十六里維摩州十六里其形勝瞰廣西距交趾山谷幽阻其俗生蠻四種附十八寨守禦千户所鎮沅府其地古西南極邊濮洛雜蠻所居唐時南詔蒙氏為銀生府之地土知同流八里僻長官司一谷祿寨其形勝依山為郡其俗婦勤蠶績務耕作信巫祝鬼永寧府其地昔名樓頭睒地接吐番又名答藍唐時屬南詔蒙氏知土同流四里有瘴賊山夷長官司四俱永樂中置其形勝襟麗江帶三湖山川險阻其俗朴野勇厲順寧府其地本蒲蠻名慶旬宋以前不通中國雖蒙氏段氏亦莫制元泰定內始內附知土判流二里有瘴賊俱夷其形勝南面負山並立如門一中有路﨑嶇險隘其俗惡甚于諸夷曲靖軍民府其名漢興一唐南寧蒙氏石城有賊無瘴煩其屬州四縣二附郭南寧三里沖外亦佐三里無瘴有賊霑益州十四里陸涼六里馬龍四里羅雄三里僻其形勝東通兩廣西接四川北連貴竹南上滇藩四達要衝盤水之固其俗力耕好訟姚安軍民府其名漢弄棟知流同推土其屬州一縣一附郭姚州四里半大姚縣四里半僻其形勝崇山修谷平疇廣州其俗野悍勇事勤耕作鶴慶軍民府十三里其名鶴川其屬州二劍川州十八里僻順州三里其形勝左麗江右劍湖蠻嶂明秀其民州宇修整性剛武定軍民府知土同推流古滇國地其屬州二縣三和曲州七里僻屬南甸四里半元謀五里僻祿勸州八里屬石六里革其形勝東赬緩西姚褒四維千里削壁懸巖水甘草茂最宜蓄牧其俗男女混雜難治尋甸軍民府其名元仁德五里無瘴其形勝西接中慶東連曲靖川原平衍可耕其民有四種麗江軍民府其民麗江知土同流無瘴其屬州四縣一附郭通安州十三里僻外寶山州六里僻簡州四里叵津州六里僻臨西二里邊其形勝東麗水西瀾滄南大理北吐番橫連千里雄據九賧種類有四麼些玀玀怒人古宗沅江軍民府其地古西南夷極邊唐南詔蒙氏屬生銀節度長官司一因逺羅必甸附郭知土判流八里僻其形勝界連交趾永昌軍民府其名古哀牢漢永昌無瘴其屬州一縣二騰越州八里保山縣十八里煩劇永年縣八里微瘴夷猓雜安撫司一潞江長官司二鳯溪施甸騰衝軍民指揮使司漢為永昌郡西境此段即金齒孟定府舊名景麻元為孟定軍五里知土孟艮府蠻名孟掯自古不通中國國朝永樂四年來歸附其俗同木邦八百知土多瘴北勝州其地唐貞元中南詔異牟尋始開其地名北方睒徙彌河白蠻及羅落麼些諸蠻以實其地號成偈賧其名善巨十五里僻其形勝地廣人稀九龍山髙可萬文巔四顧千里瀾滄軍民指揮使司州一蒗蕖三里其地元為北勝州新化州五里即馬龍他郎甸改舊阿僰諸部蠻所據元時內附威逺州其地唐南詔銀生府舊為濮落雜蠻所居大理時為白夷所有四里其俗勇健走險如飛灣甸州蠻名細賧元時內附五里鎮康州蠻名石賧本黑僰所居元時內附六里大侯州蠻名孟祐白夷所居元時內附車里宣慰司蠻名車里倭泥皆土官本朝洪武入貢置司所轄惟百夷一種木邦宣慰司舊名孟都一名孟邦元時立木邦路領安撫司一孟密孟養宣慰司地名香柏城緬甸宣慰司古西南夷八百大甸宣慰司即八百媳婦國元時招撫本朝洪武入貢置司老撾宣慰司其俗呼曰撾家即古越裳國朝永樂三年入貢置司原無城郭江源通交趾暹羅入海干崖宣撫司舊名干賴賧南甸宣撫司舊名南宋隴川宣撫司舊名麓川者樂甸長官司本馬龍他郎甸猛摩之地馬龍元時內附鈕元長官司蠻名也兀自古不通中國國朝宣德七年歸附芒市長官司其地舊曰怒謀曰大枯賧曰小枯賧按雲南在三代為荒服之地秦漢為西南夷唐為南詔亦曰哀牢夷宋為大禮至元始郡縣之此沿革大略也然以西南夷者其地界于西南以哀牢云者哀牢山名在永昌以山名夷謂之南詔者蒙舍詔在諸詔之南大禮國即今之大理此其名稱之梗概也然夷非一種大段有三曰僰曰爨曰百夷僰雖一種所居之地不同則所習之俗自異言語各為一家爨夷亦然爨即玀玀是也有數十種百夷亦數十種玀玀其居依山百夷則多近水僰處平原玀玀性剛而勇悍百夷性柔而險惡僰人性疑而譎詐亦居之使然也自漢而下或內附叛亂或相連屬或各據一郡恩德所不能服法令所不能加不過羈縻之而已惟我皇祖命將克平輿地悉入版圖爨僰皆為臣庶軍衛有司犬牙相制漢夷雜處政布教行二百餘年淪膚浹髓殆非夙昔之遐荒也惜乎深山窮谷人生其間食無梁肉衣無文繡而皆刀耕火種衣氊服皮狼心鴂舌無怪其然凡府州縣衛所總百三十五各府州宣慰宣撫長官司又在滇西南之極邊皆百夷别種形體各異其飾習染各異其尚飲食各異其味性惡習陋自古不能變今漸染久之亦有稍革其故者矣雲南承宣市政使司領府二十二曰雲南滇國益州建寧晉國昆州善鬬煩淳曰臨安建海建水秀山阿僰煩上曰澄江河陽羅伽甸無瘴曰廣南持磨道知土判流簡曰廣西古滇國牂牁郡羈縻師宗彌勒無瘴有賊曰楚雄威楚安州硪碌白鹿部銀生谷縣當筯僉無瘴賊有山漢多夷少煩曰鎮沅威逺州案板寨知土同流判推少五里曰景東開南有賊知土判流八里曰大理大理國大理永昌郡羊苴咩城煩無瘴曰永昌哀牢不韋博南金齒無瘴九里曰蒙化滄江知土微瘴夷多三十五里曰永寧樓頭睒答藍麼些日月知茶藍有瘴賊山夷知土同流曰順寧慶甸蒲蠻有瘴賊俱夷知土判流二里軍民府七曰曲靖益州郡味縣興古郡有賊無瘴煩曰尋甸仁德為美歸厚無瘴五里曰元江惠龍威逺見知土判因逺羅必羅槃甸流假八里曰姚安㺯練姚州統矢還知流同推土曰武定昆州羅婺知土同推流曰鶴慶鶴州謀統郡越祈治曰麗江麗水茶罕章無瘴知土同流州二曰新化馬龍它即甸改曰北勝成紀鎮施州流同土僻十五里都司一曰瀾滄北勝州一蒗蕖直𨽻長官司六曰者樂甸夷名者島曰鈕兀也兀曰芒市舊地曰怒謀大枯賧小枯賧芒市蠻曰孟璉曰茶山曰麻里軍民宣慰使司六曰孟養香柏城曰車里皆土官有瘴賊曰木邦孟都孟邦領安撫一曰老撾越裳曰緬甸江頭大公蒲甘緬馬來安鎮國邦牙曰八百大甸八百媳婦宣撫司三曰干崖于賴睒渠賴睒鎮西曰南甸南宋曰隴川麓川年緬禦夷州四曰鎮康石賧知土六里曰灣甸細睒知土五里曰大候孟佑知土四里曰威逺銀生府濮落雜蠻知土四里禦夷府四曰孟定景麻孟定軍知土五里曰孟艮孟指知土夷衙門多有瘴賊軍民指揮使司一曰滕衝處置雲南逺在西南漢夷雜沓無事則狃於偏安有事則互為桀驁積弊然也府屬如雲南臨安大理永昌鶴慶楚雄足稱沃壤曲靖為入滇之路供億惟艱武定當新造之區安輯為要元江景東麗江姚安北勝鄧川霑益諸夷其情則鎮巡同心恩威兼濟方可稱治至於旌别庶官責在監司撫字百姓責在守令惟求得人而已興農桑滇處西南徼外人情苦飢寒而利衣食與吳會同風土之宜農桑家之宜蠶與吳會同農稍知耕而蠶桑則猥為長物置之耕而不桑必糜其耕之所入以易衣耕以給食而衣資之一業而二者需焉奈之何民不飢且寒也飢寒切身慈母不能有其子上安得有其民奈之何民不窮且盜也民窮且盜矣而競靡好華之俗又從而據之遊賈以土著之不桑也販帛於萬里因其從來之艱坐以賈價所售必倍焉土著以積習之不桑也市帛於賈肆因其所需之急聽其要市所酬必倍焉中土之一縑徼外之二縑也中土一金之直徼外二金之費也生之無源而靡之復甚驅富而之貧驅貧而之盜不桑使然哉故農桑王政之急務而滇尤甚也雲南沿革夫滇周之百濮漢之西南夷也其類氐其屬靡莫其人僰爨玀獠域殊種别馬牛其風自楚蹻開疆秦政類略通道始以名入中國漢始置益州郡其渠酋賢栗朝貢內附厥後附叛不一諸葛亮南征益郡始平唐蒙舍立國稱南説既皮羅閣築城自王尋以守將起釁鮮于仲通計之唐軍盡戮宋鑒唐禍以玉斧畫大渡河絶不與通然後段氏得以睨璆僰爨以長世矣由斯以論置郡者令自彼就官非我設也朝附者不讓不貢不告不王法非我飭也王之者幸借其力威貽破蕃懸爵以答其功恩非我出也斧畫之者不欲罷弊所恃以事無用威非我播也乃今日塹山堙谷啓土披地矣方制提封同文共規拯溺龕暴布德抗陵驅駒町為編户更魋結為冠裳魁頭露紒解辦請職燋齒梟瞷回面革心絶鞮譯之傳撤稿街之邸蓋自我皇祖攠善闡俘段明叩勤揚苴蹂轔平緬混炎區而一之以及列朝休養生息利其資用阜其財源羣以師儒建之庠校以茂正其德而厚其生乃時享嵗貢入稅給繇訓經鬯達文物昭宣莫不家有詩書人襲組紱矣然夷考其世滇地雖逖天覆則同滇族雖夷人性則一觸之可發豚魚自孚擾之可馴猛虎亦服漢唐以來龍佑那漸出山林徙居平地是慕中國之德也鳯伽異入朝得樂一部以歸是沿中國之樂也西瀘令教異牟尋以祀嶽瀆改官號是法中國之禮也段正淳遣使求經籍得六十九家是購中國之書籍也惟中國德不能徠威不能讋恩不能綏信不能通以故正朔不加羈縻弗絶非我祖宗大赫威武無以犂其庭收其版章非我祖宗大修文德無以牧其境釐其土俗肆我皇上嗣服罷採金之令以藏富于民增北士之科不遺賢于野所謂帝德光天率履不越成率俾有截之化巍巍乎信道逺三代術長前世矣雖然未雨徹土無畏下民未濡戒襦可濟終日故治不忘亂安不忘危者保邦之閎略也圖難于易為大于細者馭世之逺猷也滇地安矣然疆徼厄塞滇人治矣然華裔雜居即今熙洽日久釁孽少萌卒有推埋胠篋之姦緩之鳥散急之虎嘻非可走尺檄而械致也山菁諸夷盤據險阻如放豚憚于罥絡野鹿駭于牢籠非可按比伍而尋躡也土官裂壤而守各顧其家幽明不分豪舉鼎立非有憚繩墨可以拘束為也夫以不賓之地棲雜處之民間以無嚴黜陟之官茍非事制曲防却顧長慮而簡節疏目廢法弛威竊恐氣泄針芒提潰蟻孔民未得常寧地未得常安也吾聞沅江臨安南通交趾金齒騰衝西擁諸甸自曲靖迤北而東彈壓鳥蠻是不當稽關簡邏扼其咽喉設候保圉謹察出入乎吾聞武定麗江姚安北勝鄧川霑益繼雄兵力尋甸一路兵衛漸疏是不當簡師征役庀賦訓戎核土酋為率編部落為兵乎滇欲假道必出貴竹萬一衝決何以禦之吾聞滇池有徑可達馬湖武定可達建昌川陸綰轂捧蕪莫啓是不當鑿磴增傳以通其道乎入滇之路滇土天下之達藩處夷落之中為中國屏敵其守與內地異周禮孟冬之月有司壞城郭固封疆完要塞塞徯徑此為備外者言之也若滇則孤懸萬里恃中國以為聲援其地遼濶廣逺實東則西虛南顧則北單弱不患無地而患無人以守外有窺伺之虞而內有負固之漸如秦之函谷蜀之劍門一夫當關萬夫莫開非如中州之四通五達一號召之間士馬雲集無仰哺待救之難也嘗考自古入滇之路有三楚將莊蹻略巴黔以西威定蜀楚其所由入則今之貴州古之牂牁郡也南越以財物役屬夜即漢王然于乘誅南越之威脅取滇土史稱牂牁江出番禺城下其源在田州泗城之境與雲之廣南貴之普安實相接壤輕舟東下徑達南海所謂南路也司馬相如持檄喻西南夷諸葛武侯渡瀘深入皆由益部取道南中非古所謂西路耶自昔經略西南掃蕩草竊其故道章章若是此三道不通則全滇郡縣四望阻塞而扼我之吭拊我之背勢所必致矣又以其形勢言之東為黔中在今日為內地固勿論若南蔽元江元江之外為車里此又外則為交趾西蔽永昌永昌之外為麓川又外則為緬甸西北則為羈縻麗江以為捍蔽此外則為吐番氣勢稍弱則吐番西伺南交外竊西南諸夷不受約束此又其必者天寶間張處他暴使滇人唐有南詔之衄連結吐番終唐之世不入職貢宋室不競遂棄為異域蒙段二氏崛據數百年計其士馬不足當中國一大郡然窮天下之力不能下者則以兵恃險逺下流仰攻形不便勢不利也我太祖髙皇帝削平僭偽混一區宇戡定西夷置立州郡二百年來夷靺之風變為中土編辮之習易為冠裳一方之人如脫隂翳而覩日月之昭融神功聖德輝映古今矣然執事之間若有隱憂然者何也為滇人之慮逺也且執事所謂紆遲驛遞則病於官綽逺侵掠則病於民是固然矣然又有甚者夫中原之人入滇其道里自西至者上荆門涉瀘水登陸陟烏撒自南至者遡流上郴桂泛洞庭巨浸又數千里始達沅州攀緣關嶺其鳥道盤鬱苗夷出沒四旁於危磴中壘土築堡憑髙瞭逺晝柝宵鉦日晏啓閉遊徼之兵負弩尾躡而後敢啓行士旅往來若履虎尾而蹈春氷猶或白晝之中剽人而奪之金如此而謂保百年無事是目聽而耳食云耳不特紆遲而危險特甚故議者紛然皆謂欲開通西南二路非無所考而漫為言也嘗考求故道在昔固多岐矣其小小間捷之徑人不得並肩車不得方軌者置勿論金沙江寬廣數里自麗江而下吞納滇洱諸水徑達蜀江其為舟楫利涉行道之人能言之太祖髙皇帝諭潁川侯謂關索嶺本非正道正道乃在西北聖謨具存乃土夷射利倡言為梗一疏鑿之民固樂從昆明威楚羅婺之境皆可揚帆至矣詢之土人稱僅有一二梗澀之處稍加轉搬不過尋丈以天造地設之利棄之無用舛也若東南之勢又大異是廣南一郡便於入粵而艱於入滇去泗城不二百里而近晉安安龍商旅往來自粵者日夜不絶在今仍為通衢且山徑平夷無盜賊出沒所少者亭驛憩息耳土曠人稀原産銅礦誠於此郡邇封許土著之民開鑿取利以其七與民徵其三以為經營之費客貨往來仍禁土人私斂官為定額稱資其入以助官費之不足移維摩州於隘地以彈壓草竊不加賦於民而事集與跋涉黔中﨑嶇之徑逺甚何憚而久不為此愚謂開通此二道無大費而有巨利滇土故饒笮馬僰童髦牛礦碌諸産舟車輻輳省負挽之煩百貨增直一利也通二廣綿枲繒帛鐵釡逺方難至之物自此踵集滇民益以富實二利也嵗有荒歉可移民移粟三利也士旅往來無紆遲間關剽掠之警人樂遊其土四利也流落邊徼老幼孤寡得襁負生還五利也水浮與陸走勞逸相懸人情孰不欲舍勞而趨逸者自此傳置資糧皆可次第裁縮紓官民之困六利也此又其小者西南有事調發滇南徑卒西可制蜀東南可控百粵其或滇中有負固內訌之憂如蒙之割據皮羅思平之僣竊呼召川蜀之兵自岷瀘西入揚旗搗壘則卭笮以南無堅壁南檄百粵左言鳥章之士不數日抵安龍廣南則鉦鼓相望於昆池其或外侮窺我門庭連掣三省戰旅麻列蝟合西指則吐番徙幕南馳則交夷不敢髙枕而卧施長組問包茅不入則哀牢以西稽首納琛不敢猶豫趦趄利害較然明若觀火執事者毅然行之吾滇人萬世之利也豈特士旅之便已哉控制雲南天子統一海內區宇廣矣臣民衆矣其體國經野不得不畫為畿省郡縣之界以責成羣工者勢也然畿省郡縣之既分則監司守令各司其事雖有部院總之於上而各省界分勢散孰從而聨屬之哉觀成周分封千八百國各有方伯連率得專征伐以為之屏翰此自古帝王統馭疆宇使小大相維犬牙相制之䇿也我朝統有兩畿十三省外如九邊雖信地各分矣而薊遼宣大關陜又各設總督以聨之內如各省雖疆界各别矣而兩廣南贛鄖陽亦各設總督以聨之獨雲南界在萬里外孤懸一隅其所通之道特藉貴州九驛以為往來萬一中阻則彼此懸隔鄰邦軍旅雖衆且強而救援無可通之途勢可隱憂莫此為亟也况土官各巢穴其中唇齒黨結雖省會數郡號稱文物未免軍民華夷雜處其獷悍之性雖平居未易制馭茍變生不虞役又何所忌憚而不逞其跳梁之習耶近有議者謂自古入滇之路有三今之貴竹其一也而鳥道紆遲險峻可危莫若西南疏鑿金沙江由水路以達于蜀東南經營廣南郡自普安安隆由陸以達于粵三路俱通公私兩便此亦一説也豈所以為聨屬之道哉彼曲靖古益州地也古人既可以益州而統轄乎曲靖今獨不可以曲靖而聨屬於益州耶為今之計欲鞭撻蟒酋恢擴侵疆固宜廣儲蓄振軍旅以張其薄伐之威使羈縻屬國皆帖然讋服不敢觀釁肆毒乃滇中之急務也茍論久安長治之策莫若於四川雲南貴州三省擇其形勢接壤照南贛汀漳各割郡縣合為總鎮方其無事也則合數郡土著之兵而訓練之有方合數郡土産之物而儲蓄之有素屹然坐鎮三省之界凡各土酋自將畏憚斂戢而潛消其跋扈之心矣及其有事則聲息朝聞暮可遣兵壓其境其視奏請動經半載然後調兵聚糧以議𠞰撫者何可同日語也俟區畫既定物産漸豐或金沙江水路可疏鑿焉即疏而鑿之無難也或廣南郡陸路可經營焉即經而營之無難也况總鎮所在則三省如臂運指使趨走服役山谷盡為通衢而列郡之血脈經絡既以貫通雖各巢之險阻自將習熟縱使一方啓釁而三省之兵糧皆在指顧間于以扼其項拊其背而深入其阻郡縣其地皆不勞餘力又不特鎮壓其格鬭強梁之習已也何也我之勢合則彼之勢分彼勢一分則鄰境諸酋皆為我用我之勢合則籌畫素定動中機宜不數十年間荒陬絶域皆將用夏而變夷若曰開府設鎮未免嵗費數千金不知兵戈一動視月費數十萬者何如也况朝廷無南顧之憂百姓免鋒鏑侵軼之苦一勞永逸䇿無善于此者在司國計者加之意焉耳議開金沙江夷考金沙江之源出於吐番異域南流漸廣至於武定之金沙巡司又東過四川之會州建昌等衛以達於馬湖敘南然後合于大江趨于荆吳此其水之所從經絡蓋南中西北之險也自漢武帝遣郭昌等開益州諸郡西南之夷始通中國及孔明渡瀘南征七擒孟獲六詔之地遂入華圖歷晉及隋以迄於宋各酋之叛服靡常而漢法之羈縻難定故路之通塞因之逮我太祖平定天下命將征西諭潁川侯傅友德曰關索嶺本非正路正路在西北是誠神謀睿算明見萬里矣兹欲息東西兩路之肩拊滇雲百蠻之背通諸夷梯航之道會三省聨絡之防則開導疏濬誠有不可緩者節經巡按御史毛鳯詔等建議於前巡撫都御史陳大賓等會議於後反復經畫不為無據矣其事未竟成焉何哉所謂狃於茍安而惑於異説者是已大約説之異者其端有四其一則曰由滇南之金沙以達蜀之馬湖原非操舟縱楫之江水雖徑流而山多巇嶮由東川之小江貓至濶州則有阿補溪灘矣由濶州至烏芒則有虎跳大灘大流小流灘矣故其奔騰衝撞之勢見者方懼心焉而憚其排鑿之難成也其一則曰雲南尋甸之柯度以至馬湖之銅厰溪原非經商往來之地沿江夷玀雜居跧山伏穴易擾難馴竊弄鋤梃行將禦人矣故其桀驁忿鷙之性聞者且戒心矣而畏其即次之或虞也况滇雲一省接壤於蜀貴之間封疆之臣各為其土其為西蜀計者則曰金沙江之路一通則當建之郵舍而設以夫役其應支之直當必取給於蜀民大木之餘財力久竭矣故滇雲之所利而蜀境之所不利也此又一説也為貴陽計者則曰金沙之路既通則行商競便於舟而憚勞於陸其轉輸之貨當必充斥於北路九驛之道工商閴寂矣故滇南之所利而貴陽之所不利也此又一説也噫是豈得為通方之利哉蓋天下之大勢猶人之一身善養身者必使脈絡貫通然後元氣壯而腹心賴之以榮衛善審勢者必使華夷通道然後疆場定而根本賴之以輯寧故艮其限列其夤者非衛生之術也任其壅塞而幸其暫安者非長治之計也蓋四端之説雖殊而阻撓之心則一無意於長慮者每憚其即事之難而有心於自便者又岐於爾我之限此是非之所以未決而功之所由以未成也殊不知灘石誠可懼也然則鑿龍門而闢伊關者非其已試之功乎凡怒濤於中流者亦在乎去之而已矣如人力必不可施即如蜀之新灘設為盤運之夫亦可也夷玀固可戒也然則通西域而窮河源者非其已行之迹乎凡出沒於河濱者亦在乎撫之而已矣如一時果未可馴則沿江一帶多設巡司亦可也彼西蜀既以錢糧為難則經理之勞滇當獨任其費而求借官帑以充之俟榷商稅以補之亦無有不可者况滇之與蜀本有輔車之勢者也容可參以彼此之念如是哉貴陽既以商販為病則貿遷之征滇當稍寬於陸而舟車並用以通之東西二路以分之亦無有不均者况滇之於貴本有比鄰之義者也豈可乘以爾我之私若此哉是四者皆有調停處置之法未見其為難也何足以惑吾之定見哉矧夫勞於暫者豎永佚之功用之久也成周行之道蜀無協濟之費而二省俱便貴省供應之勞而兩路經行尤見其胥利耳又何害之足云抑愚猶有説焉滇去神京甚逺凡惟正之供方物之獻嵗時之朝賀冠蓋之往來多士之計偕商賈之行貨如必舍舟而徒跋履於萬里外肩負擔之勞任靻蹻之苦如之何不重以自困也今若舍陸而登舟焉則由金沙而之馬湖非有髙山大川為之限隔也計程七晝夜可達非有曠日持久為之濡滯也以此易彼孰得孰失孰易孰難孰紆孰捷必有能辨之者何為畏難以自沮耶故曰揭炬而度暗昧者明也乘舟而杭江湖者便也於其所謂便者顧扞格而不行焉深昧於天下之大勢矣又嘗稽古而有得焉宋藝祖得國之初尚未遍覩天下之勢乃以斧畫大渡河曰此外非吾有也遂成鄭楊趙段之僭元憲宗乘革囊及筏濟江進薄大理虜段智與遂平西南之夷夫以宋主之畫河為界若有得於閉關謝西域之意然而棄險以資敵其為謀也疏憲宗之乘勢濟師似有戾於勤兵務逺略之訓然能思患而豫防其得䇿也上此又利害之大較深切而著明者也今六詔憑深阻峭疊嶂層崖土酋驕悍易動難制劉安曰有野心者不可與便勢言當謹之於微也今可不加之意乎矧雲省逺距京師萬有餘里奏報相聞動經嵗月宋祁有云喪羊於易患生無備言當防之於豫也又可不加之意乎夫披輿圖而覽形勝則經略不可不周度時勢而揣夷情則隄防不可以不豫江路之開正所以撤諸箐之藩籬而聨三省之脈絡析百蠻之巢穴而大一統之規模所謂扼其項而拊其背奪其險以分其勢者胥此矣豈可恤一勞而不為久安之計吝小費而不懷逺大之圖耶貴州圖敘貴州古西南夷羅施鬼國地地里蠻夷並同滇境雲南而山箐峭深地瘠寡利夷性猾詐殆有甚焉故泗城州廣西土官衙門恣其狼吞同竊外户則守在永寧州名芒部今鎮雄府盤據廣土蹲伏北藩則憂先畢節若思南石阡銅仁數郡界在鎮筸鎮逺筸子坪俱長官司𨽻湖廣酉播酉陽宣撫司播州宣慰司俱𨽻四川夷洞之間鴟張豕突諸夷常突出數郡寇掠貽患實深况地雜東川烏蒙諸郡俱四川軍民府師旅繹騷每與川湖四川湖廣同其災害而軍民嵗計又大半仰給於二省兵荒交值時有弗繼之憂且水西普安凱里俱土官地方諸酋富甲他夷地連肘腋逞姦首禍患豈一朝故知梟獍之資不忘格鬭而爭強奪職乃其兵端焉然夷虜自相翦伐貴在因俗以時撫定不足煩國家力也沿革本西南夷羅施鬼國也元於此置八番順元等處軍民宣慰使司都元帥府本朝太祖初以其地分𨽻廣西四川雲南三布政司永樂十一年始置貴州等處承宣布政使司都指揮使司提刑按察司並治于貴州宣慰司云貴州等處承宣布政使司治貴州左布政使一左參政二內清軍一總理糧儲一左右參議三內分守貴寧安平二道一分守新鎮道一撫苗思仁二道一領府八屬州二縣六安撫司一長官司五十六宣慰司一屬長官司十州四屬長官司六官廨附三衛城內一十一總為里九十九户一十四萬八千九百五十七口五十一萬三千二百八十九夏秋二稅共米麥一十四萬八千九百四十八石有零湖廣布政使司坐派解納本司糧米一十萬二千四百石每石折解白銀參錢共該銀三萬七百二十兩正四川布政司坐派解納本司糧米一十萬九千七百五十三石內五萬石每石折銀三錢三萬石每石折布二匹每石徵銀二錢原運永寧倉今改豐濟庫布米二萬九千二百三十三石每石折布二匹每匹徵銀一錢七分五釐綦江縣秋米五百二十石每石折銀五錢五分四川播州宣慰司坐派解納本省豐濟平錢青平興隆黃平等倉夏秋糧米共一萬六百石零三斗六升八合四勺二抄五撮焉撒倉秋糧米九千四百石烏蒙府起運烏撒倉秋糧米三千八百五十石東川府起運鳥撒倉秋糧米二千九百石鎮雄府起運鳥撒秋糧四千九十二石四斗洞蠻麻布二百五十九條有零課程稅鈔一十三萬六千四十六貫四千三百八十八文稅銀三百二十九兩九錢三分三釐九毫貴州都指揮使司𨽻右軍都督府都指揮三內掌印一管屯一管操捕一領衛一十有八屬所九十三長官司一十有三守禦千户所二本都司所屬馬步官軍三萬七千四百一十七員名提刑按察使司按察使一副使四僉事二分道三貴寧都青思石欽差巡撫兼提督湖北川東都御史一巡按御史一或清軍御史一欽差鎮守貴州兼提督清平等衛總兵一駐宣慰司參將二一駐永寧一駐鎮逺貴州宣慰司宣慰使二貴州各府州縣煩簡程蕃府本西南夷地苗獠雜居原係貴州宣慰所轄至成化年間奏改府治今宣慰使司其屬長官司十附郭為貴竹為水東為中曹為蠻夷為青山為劄佐為龍里為百納為底寨為乖西蠻為養龍坑府長官司十二為韋番為方番為洪番為卧龍番為金石番為小龍番為大龍番為羅番為盧山為上馬橋為小程為廬番其形勝東阻五溪西距盤江滇南門户其俗所轄夷種類不一習俗亦異舊皆撓邪之俗國朝始漸詩禮登仕版思州府其地昔楚之黔中其名唐寧夷簡其屬長官司四附郭都坪四里都素二里施溪一里黃道一里其形勝連溪洞扼槃弧其俗剛悍思南府其地荆州荒裔春秋國為楚黔中其名寧夷煩其屬長官司四水德四里祐溪三里朗溪二里蠻夷羈縻縣二婺川四里印江二里其形勝牂牁要路山川險阻狸獠所居鎮逺府其地荆州南境其屬縣二附郭鎮逺三里外施秉一里苗民長官司二卭水五里偏橋二里無瘴其形勝東通沆水西接貴州習俗質野儉約石阡府其地荆州南裔其名元石阡其屬長官司二附郭石阡五里外龍泉二里其形勝南通鎮逺北距思南其俗不事文墨銅仁府古溪蠻地苗賊出沒其屬長官司六附郭銅仁五里外提溪一里烏羅三里省溪一里大萬山一里平頭一里其形勝東麻陽西思南北苗界南思州髙山峻嶺其俗犵狫勇譎黎平府地旁夜郎漢屬牂牁郡簡其屬長官司十三洪州四里潭溪三里八舟二里古州二里軍民西山二里湖耳一里亮寨一里曹商洞六里歐陽一里新化一里中林一里赤溪一里龍里一里縣一永從二里其形勝東連靖州西控生苗南通交廣北達辰沅古荆州荒裔其俗凶頑鴂舌都勻府舊為軍民指揮使司𢎞治中改軍民府其屬州二麻哈無瘴簡獨山僻夷瘴縣一清平瘴夷長官司四都勻平浪平州邦水一里其形勝北通平越南抵南舟壤僻而險其俗鄙陋普安州其地古夜郎秦黔中其名漢牂牁後漢興古簡沖其屬所三樂民安南安龍永寧州其地古荒服簡瘴長官司二慕役四寨頂營三寨鎮寧州其地古荒服簡瘴沖長官司二十二營寨二十九康佐寨四安順州治馬頭山簡長官司二寧谷寨二十九西堡寨四瘴金築安撫司其地古荒服好訟長官司三為木瓜為麻嚮為大華普定指揮使司𨽻都司古羅甸國後為羅鬼犵狫可􅝮苗蠻成居其名普川安順州附新添指揮使司二里𨽻都司其地古荒服長官司五附郭新添二里外小平二里丹平二里􅀈平二里丹行二里其形勝東界平越西接龍里其俗土民貧龍里指揮使司𨽻都司其地古西南邊長官司二平伐一里大平伐二里其形勝襟山帶水夷地之勝其俗雜醇疵尚儉朴平越指揮使司二里𨽻都司其地古蠻夷名黎蛾里寨長官司一楊乂畢節衛𨽻都司地本貴州宣慰司荒服西南夷清平衛一里古西南夷地𨽻都司沖舊有清平平定長官司二安南衛其地古西南夷夷名尾灑𨽻都司沖平壩衛其地古西南夷𨽻都司沖興隆衛即清平衛都勻即新添衛赤水衛安莊衛烏撒衛普市千户所其地古蠻夷𨽻都司貴州承宣布政使司國初𨽻湖北雲三省永樂年始置布政司嘉靖始專開科領宣慰使司一八番順元藏甲大萬谷落紅邊龍章大羅甕篷小羅暢水骨隆龍廣底窩曾竹將臺府八曰程番南寧定逺古築苗獠雜居先係貴州宣慰轄成化年間奏改府治曰鎮逺曰黎平曰都勻舊為長官司今升為府治曰思州曰思南曰銅仁曰石阡安撫司一曰金築吏目一貴州衛四曰畢節曰赤水曰烏撒曰永寧州一曰並市舊為千户所今改州治簡外衛六曰威清曰平壩曰普定曰安莊曰安南曰普安州四曰安順曰普安曰永寧曰寧鎮軍民指揮使司五曰新添曰平越曰龍里曰清平曰興隆州一曰黃平處置貴州初屬四川行都司永樂間始置省治官則流土相參民則漢夷錯處不當中土一大縣一線之路外通滇南官軍月糧仰給川湖二省黎平寄治湖廣五開衛銅仁僻處萬山逼近苗穴都勻程番與廣西接壤土酋讐殺素稱難治鎮逺當湖廣之衝面水背山險頗足恃思州石阡孤懸一隅勢可隱憂惟思南城下有江足通舟楫商賈行旅比之他郡不甚蕭條大抵貴州開省原為雲南無貴州是無雲南也內安外攘其撫鎮大臣之責哉山川形勝九州封域各有山川所以表壯觀占靈育也天下山川之險貴州為最所至峰巒絡繹巉巖連雲插漢衆水之行懸崖穴地橫斜詰曲如龍蛇狹處才容獨木舟而深或至十餘丈斯亦竒矣然幽崖巨箐或反為盜賊淵藪岸髙石狠舟楫灌溉兩無功焉其利害多少可得而知也風俗昔人謂繫水土之氣謂之風隨君上之情謂之俗然十五國風其美與惡皆繫于上而俗因以成則水土固世所論也貴州土著蠻夷族類實蕃風俗亦異大抵標枝野鹿醇朴猶存各軍衛從自中原因沿故習用夏變夷胥此焉恃彼至愚無知者或反見變於夷重以江右川湖敗商流徙罷役逋逃多為姦詐誘羣酋而長其機智而淳朴浸以散矣班史謂箕子以禮義化朝鮮其俗甚美郡初取吏于遼東吏見民無閉藏及賈人往者夜則為盜俗稍益薄以今貴州觀之得無類是也乎然則敦本實戢姦暴以美教化而厚風俗是在長人者加之意焉耳户口民數者庶事所自出以多為貴不可不知也貴州四面皆蠻夷所可知者各府若衛軍民之數其寥落也蜀中江右之民僑寓于此者甚衆買田宅長子孫者蓋多有之蜀中江右既不得其用而視貴州官府亦漠然若不相干是併失之矣謂宜分别稅户承佃營生等第而籍為見稅户俾與主户錯居共役願投軍者亦編入行伍庶户口增而軍民不至重困矣財賦天下布政司十有三而貴州為最後故財賦所出不能當中原一大郡諸所應用大半仰給於川湖頃因有事銅仁盡所取于川湖者不足以供銅仁一嵗之費不知諸所應用復何以給之是故開荒蕪教樹藝籍鴈户減戍兵皆今日所不可緩者議者又欲割川湖之地以易每嵗數萬金之供天下一家彼此何間當事者儻以上聞以吾君包荒不遐遺之盛德宜無不可者不然貴州之財賦吾不知其所終也徭役古者用民之力不過三日凡起徒役毋過家一人以其餘為羡惟田與追胥竭作其重民之力如此貴州軍民雜處民固夷也雖租賦徭役略倣中原而椎髻鳥言終駭官府故有司之役惟漢人軍衛之役惟卒伍而諸夷當役于官府者又各以漢人卒伍代之而取其直焉是漢人卒伍一身而衆役萃矣又其弊也直不可得役不能免乃使衆漢人卒伍共佐之是衆人一身而衆役萃矣嗚呼欲求嵗不過三日家不過一人何可得也易曰通其變使民不倦長人者盍務諸職官宋人有言荒陬絶域親民之吏貴得其人也茍非其人則寃民無由申訴勢必為亂而歷代銓選反以內地為重以邊方為輕何倒置之甚哉竊謂貴州遊宦之難又有甚焉蓋其所治者蠻夷也縱得其人亦往往難之守令以下授官不赴者十七八也不知孔子欲居九夷與謂忠信篤敬蠻貊可行者非歟乃若土官襲替非赴部不得官固有要之不行甘心混羣醜者其情亦可憫矣議兵食貴藩越在荒徼四望夷區孤懸鳥道猶然捍川湖抗滇中諸苗或狶突非時竊發緩而撫綏急而創艾制夷則需兵治兵則需食猶水之必舟而舟之必擑也夫烏得而闕一焉今之軍伍半折丁壯阻消為宜詳核所部悉清勾之使原伍漸還名不浮籍而又嚴逋逃之禁重督邏可譏闌出入毋令以賄脫伍者如是則軍復矣夫貴雖僻壤置衛十八各兵千餘誠得盡勾數萬之衆在也何憂兵寡今之屯田虛冒悉入豪右為宜大索侵沒董以重法必歸之軍無論賦盈而又嚴課耕之令督之總管别勤惰而考成焉如是則屯復矣夫貴雖瘠土而屯多田每衛各若干誠得盡種九年之蓄在也何患食匱或者謂勾軍必假於緩期而抽丁可議以為助貴之墾田科糧而無差有差之糧率資以影射兹量其糧而起丁役既足以塞弊孔時而訓練之又足以佐軍伍此固一策也或者謂與其抽丁而充伍莫若募民以墾田貴地多不宜稻而宜薺菽之類今蓬藋者半則無可耕之民故也州民僑耕思銅蓋亦有之其以開曠益募川湖附民以漸墾之先給其資暫復其稅且又查所墾之田與戰功同賞彼冒首功而徼國爵者比比然豈若此為實用猶古孝悌力田意耶夫耕作日廣則生聚日繁積之嵗月科田且蕃夫然後從而起丁焉則人樂趨命而不妨夫募耕之意矣况足食則兵自足此又一策也圖書編卷四十二
