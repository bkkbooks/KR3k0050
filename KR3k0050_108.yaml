body:
  text: 圖書編卷一百八明章潢撰四禮總敘冠婚喪祭有家日用乃古意無復有存尤有不可不亟講者夫人生一冠一婚耳三加之儀古非難行也而何以必違古論財之道元魏自始也而何以必從魏人生一父一祖耳喪易寧戚而宴賓讖佛暴親擇兆易亦難言祭享惟誠而木棲無地豆薦不供享寧克舉其溢也繡牆冶服其愚也尚鬼信巫其忍也水火親骸兒女之溺俗流至此可為寒心故謂宜倣朱子家禮及丘文莊公儀節損益行之以為齊民表行於家興於鄉漸於邑逹於天下章軌貞俗四逹而不悖不亦大有賴哉祠堂君子將營宫室先立祠堂于正寢之東為四龕以奉先世神主髙祖考妣居左曾祖考妣居右祖考妣居次左考妣居次右祖考妣皆南向考左妣右置田祭具祭器主人辰謁于大門之內出入必告正旦冬至朔望則參俗節則獻以時食有事則告若無力之家只擇明潔空室一間以奉四世神主再無别室可於别寢堂正間祝之伊川云古者庶人祭于寢士大夫祭于廟庶人無廟可立影堂今文公先生乃曰祠堂者蓋以伊川先生謂祭時不可用影故改影堂曰祠堂云本注云凡屋之制不問何向背但以前為南後為北左為東右為西如小小祭時亦可只就其處大祭祀則請出神主或堂或廳祭之小祭如節祀之類大祭如四時及正旦之類聖祖定制洪武十七年十二月十八日欽準庶人祭三代曾祖考洪武三十一年三月十九日欽奉旨意頒降祝文祭髙曾祖考祭四代按不祭髙祖如何程子曰髙祖自有服不祭甚非某家却祭髙祖又曰服既如此祭祀亦須如此四代不可僭祭按繼曾祖之小宗則不敢祭髙祖而虛其西龕一繼祖之小宗則不敢祭曾祖而虛其西龕二繼禰之小宗則不敢祭祖而虛其西龕三非嫡長則不敢祭其父必大宗及繼髙祖之小宗然後得祭四代其餘祭之為僭祔位謂旁親無後及卑幼先亡者主櫝祭饌並同正位按伯叔祖父母祔于髙祖伯叔父母祔于曾祖妻若兄弟若兄弟之妻祔于祖子姪祔于父皆西向列于東龕乃孫祔祖龕也姪之父自立祠堂則遷而從之或問何謂旁親曰中庸或問云自吾父祖曾髙謂之正統其伯叔曾髙伯叔父祖衆子昆弟皆為旁親又問旁親有後者如何曰按本注云其子孫自祀之則此不祔伊川云曾祖兄弟無主者不祭殤謂卑幼先亡者男婚女嫁皆不為殤程子曰無服之殤不祭下殤之祭終父母之身中殤之祭終兄弟之身長殤之祭終兄弟之子之身成人而無後者其祭終兄弟之身之孫此皆以義起者也按八嵗至十一為下殤其祭終父母之身十二至十五為中殤其祭終兄弟之身十六至十九為長殤其祭終兄弟之子之身成人而無後者其祭終兄弟之孫之身不滿八嵗為無服殤不祭或問祔位四時祭于正寢則祔東序或兩序相向南男向東女向西坐以就裏為大祠堂內則孫祔祖龕若孫死而祖在則祔何處曰按禮記祔于曾祖龕妻死夫之祖母在亦然庶母春秋傳曰於子祭於孫止按程子曰庶母主不可入祠堂其子當祀于私室主櫝之制則一或問嫡母無子庶母有子為後主得入祠堂否曰喪服小記云妾祔于祖之妾祖無妾則間曾祖而祔髙祖之妾若髙祖又無妾當易牲而祔之女君謂嫡室可也易牲如祖為大夫孫為士孫死祔祖則用大夫牲士牲卑不可祭於尊者也謂妾牲卑不可祭於嫡室乃易牲俗節獻以時食按俗節則獻以時食如端午角黍凡鄉俗所尚者薦以大盤間以蔬果只就祠堂每位用脯醢二味用止一止斟一杯朱子曰但七月十五日用浮屠設素饌祭其不用從俗祭儀或問家禮告事止用酒果近世冠婚等事皆尚宴樂若據之廢祭而生者則隨俗飲宴自如於心安否曰按節祠條朱子答張南軒曰今人重俗是日必宴樂不能不思祖考以物享之雖非禮之正然人情之不能已者以此推之今既於冠禮等事不能廢宴樂其能恝然於祖宗止以酒果告而無祭禮哉當如時祭之儀可也或問文公家禮髙曾祖禰之位皆西向以次而東於心切有未安陽明子曰古者廟門皆南向主皆東向合祭之時昭之遷主列于北牖穆之遷主列于南牖皆統于太廟東向之尊是故西向以次而東今祠堂之制既異於古而又無太祖東向之統則西向之説誠有所未安曰然今當如何曰禮以時為大若事死如事生則宜以髙祖南向而會祖禰東西分列席皆稍降而弗正對似于人心為安曾見浦江鄭氏之祭四代考妣皆異席髙考妣南向曾禰皆西向妣皆東向各依世次稍退半席其于男女之别尊卑之等兩得其宜今吾家亦如此行但恐民間廳事多淺隘而器物亦有所不備則不能以通行耳又問無後者之祔于己之子姪固可下列矣若在祖宗之行宜何如祔陽明子曰古者大夫三廟不及其高矣適士二廟不及其曾矣今民間得祀髙曾蓋亦體順人情之至例以古制則既為之置後無後者鮮矣後世人情偷薄始有棄貧賤而不嗣者古所謂無後皆殤子之類耳祭法王下祭殤五適子適孫適曾孫適玄孫適來來孫諸侯下祭三大夫二適士及庶人祭子而止則無後之祔皆子孫屬也今民間既得假四代之祀以義起之雖及弟姪可矣往年湖湘一士人家有伯曾祖與堂叔祖皆賢而無後者欲為立嗣則族衆不可欲弗祀則思其賢有所不忍也以問于某某曰不祀二三十年矣而追為之嗣勢有所不行矣若在士大夫家自可依古族屬之義於春秋二社之次特設一祭凡族之無後而親者各以昭穆之次配祔之于義亦可也朱子曰考諸程子之言則以為髙祖有服不可不祭雖七廟五廟亦止於髙祖雖三廟一廟以至祭寢亦必及於髙祖但有疏數之不同耳疑此最為得祭祀之本意禮家言大夫有事省於其君干祫及其髙祖此則可為立三廟而祭及髙祖之驗但干祫之制它有可考耳按自天子以至于士五服之制則同而祭祀止及其立廟之親則大夫不祭其髙曾士不祭其祖非人情也程子以為有服者皆不可不祭其説當矣愚又嘗考之禮經參以諸儒注疏之説然後知古今異義禮緣人情固當隨時為之損益不可膠於一説也人徒見適士二廟官師一廟以為所及者狹不足以伸孝子慈孫追逺之心也然古人之制則雖諸侯大夫固有拘於禮而不得祀其祖考者矣何也鄭氏注諸侯五廟云太祖始封之君王者之後不為始封之君立廟疏曰凡始封之君謂王之子弟封為諸侯為後世之太祖當此君之身不得立出王之廟則全無廟也注太夫三廟云大夫太祖别子始爵者然則諸侯始封之太祖如鄭桓公友是也鄭桓公以周厲王少子而始封於鄭既為諸侯可以立五廟矣然其考則厲王祖則夷王曾祖則懿王髙祖則共王五世祖則穆王自穆至厲皆天子也諸侯不敢祖天子則此五王之廟不當立於鄭此所謂此君之身全無廟也必俟桓公之子然後可立一廟以祀桓公為太祖桓公之孫然後可立二廟以祀其祖若禰必俟五世之後而鄭國之五廟始備也大夫始爵之太祖則魯季友是也季友為魯桓公之别子季為大夫可以立三廟矣然其考則桓公其祖則惠公其曽祖則孝公自孝至桓皆諸侯也大夫不敢祖諸侯則此三公之廟不當立於季氏之家所謂别子亦全無廟也必俟季友之子然後可立一廟以祀季友為太祖季友之孫然後可立二廟以祀其祖若禰必俟三世之後而季氏之三廟始備也蓋諸侯大夫雖有五廟三廟之制然方其始為諸侯大夫也茍非其襲數世則亦不能備此五廟三廟之禮至於士庶人則古者因生賜姓受姓之後甫其一傳即有嫡有庶嫡宗子也庶支子也禮云支子不祭祭必告於宗子又云庶子不祭明其宗也蓋謂非大宗則不得祭祭必告于宗子又云庶子不不得祭其四小宗所生之祖禰也先王因族以立宗敬宗以尊祖尊卑有分而不亂親疏有别而不二其法甚備而猶嚴於廟祀之際故諸侯雖曰五廟而五世之內有為天子者則不可立大夫雖曰三廟而三世之內有為諸侯則不可立適士二廟官師一廟庶人祭於寢然茍非宗子則亦不可祭於其家必獻牲於宗子之家然後舉私祭凡為是者蓋懼上僭而不敢祭非薄其親而不祭也然諸侯不敢祖天子而天子之為祖者自有天子祭之大夫不敢祖諸侯而諸侯為之祖者自有諸侯祭之支子不敢祭大宗而大宗之為祖禰者自有宗子祭之蓋已雖拘於禮而不得祭而祖考之祭則元未嘗廢適士官師雖止於二廟一廟而祖禰以上則自有司其祭者此古人之制也後世大宗小宗之法既亡别子繼别之序已紊未嘗専有宗子以主祀事其入仕者又多崛起單寒非時王之支庶不得以不敢祖天子諸侯之説為諉也乃執大夫三廟適士二廟之制而所祭不及祖禰之上是不以學士大夫自處而孝敬之心薄矣焉得為禮乎故曰古今異宜禮緣人情當隨時為之損益不可膠於一説也或曰此為國中公族之世祿者言也若庶姓之來自他國而為諸侯大夫者則如之何愚曰古未有無宗者庶姓有庶姓之宗他宗有他國之宗而宗子之制則一也曾子問曰宗子為士庶子為大夫其祭之也如之何孔子曰以上牲祭於宗子之家又問曰宗子去在他國庶子無爵而居可以祭乎孔子曰祭哉望墓而為壇以祭此二條正為起自匹庶與來自他國者言若大公東海人而仕周為諸侯孔子宋公而仕魯為大夫之類是也注疏謂異姓始封為諸侯者及非别子而始爵為大夫者如他國之臣初來為大夫本身即得立五廟三廟蓋以其非天子諸侯之子孫上無所拘礙故當代即可依禮制立廟然以曾子問宗子為士一條及參以內則中所謂不敢以富貴加於宗子之説則知崛起為諸侯大夫者若身是支庶亦合尊其宗子不敢盡如禮制也宗廟昭穆考昭穆之昭謂其向明也此不可以空言曉也今且假諸侯之廟以明之蓋周禮建國之神位左宗廟則五廟皆當在公宫之東南矣其制則孫育以宫外為都太祖在北二昭二穆以次而南是也蓋太祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟之南向各有門堂寢室而牆宇四周焉太祖之廟百世不遷自餘四廟則六世之後每一易世而一遷其遷之也新主祔于其班之南廟南廟之主遷于北廟北廟親盡則其其主于太廟之西夾室而謂之祧凡廟主在本廟之室中皆東向及其祫于太廟之室中則惟太祖東自如而為最尊之位羣昭之入于于此者列于北牖下而南向羣穆之入于此者皆列于南牖下而北向南向取其向明故謂之昭北向者取其深逺故謂之穆蓋羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也曰六世之後二世之主既祧則三世為昭而四世為穆五世為昭而六世為穆乎曰不然也昭常為昭穆常為穆家禮之説有明文矣蓋二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以為序若武王謂文王為穆考成王稱武王為昭考則自其始祔而已然而春秋傳以管蔡郕霍為文之昭刋晉應韓為武之穆則雖其既逺而猶不易也豈其交錯彼此若是之紛紛哉曰廟之始立也二世昭而三世穆四世昭而五世穆則固當以左為尊而右為卑矣今乃三世穆而四世昭五世穆而六世昭是則右反為尊而左反為卑矣而可乎曰不然也宗廟之制但以左右為昭穆而不以昭穆為尊卑故五廟同為都宫則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而內有以各全其尊必大祫而會一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易唯四時之祫不陳毁廢之主則髙祖有時而在穆其禮未有考焉意或如此則髙之上無昭而特設位於祖之西禰之下無穆而特設位於曾之東也與曰然則毁廟云者何也曰春秋傳曰壞廟之道易擔可也改塗可也説者以為將納新主示有所加耳非盡撒而悉去之也然則天子之廟其制若何曰唐之文祖虞之神宗商之七世三宗其詳今不可考獨周制猶可有言然而漢儒之記又已有不同者矣謂后稷始封文武受命而王故三廟不毁與親廟四而七者諸儒之説也謂三昭三穆與太祖之廟而七文武為宗不在數中者劉歆之説也雖其數之不同然其位置遷次宜亦與諸侯之廟無甚異者但如諸儒之説則武王初有天下之時后稷為太祖而組紺居昭之北廟太王居穆之北廟王季居昭之南廟文王居穆之南廟猶為五廟而已至成王時則組紺祧王季遷而武王祔至康王時則太王祧文王遷而武王祔至昭王時則王季祧武王遷而康王祔自此以上亦皆且為五廟而祧者藏於太祖之廟至穆王時則文王親盡當祧而以有功當宗故别立一廟於西北而謂之文世室於是成王遷昭王祔而為六廟矣至共王時則武王親盡當祧而亦以有功當宗故别立一廟於東北謂之武世室於是康王遷穆王祔而為七廟矣自是以後則穆之祧者藏於文世室昭之祧者藏於武世室而不復藏於太廟矣如劉歆之説則周自武王克商則增立二廟於二昭二穆之上以祀髙圉亞圉如前遞遷至於懿王而始立文世室於三穆之上至孝王時始立武世室於三昭之上此為少不同耳曰然則諸儒與劉歆之説孰為是曰前代説者多是劉歆愚亦意其或然也曰祖功宗德之説尚矣而程子獨以為如此則是為子孫者得擇其先祖而祭之也子亦嘗考之乎曰商之三宗周之世室見於經典皆有文明而功德有無之實天下後世自有公論若必以此為嫌則秦政之惡夫子議父臣議君而除諡者者不為過矣且程子晚年嘗論本朝廟制亦謂太祖太宗皆當為百世不遷之廟以此而推則知前説若非記者之誤則或出於一時之言而未必其終身之定論也曰然則大夫士之制奈何曰大夫三廟則視諸侯而殺其二然其太祖昭穆之位猶諸侯也適士二廟則視大夫而殺其一官師一廟則視大夫而殺其二然其門堂寢室之備猶大夫也曰廟之為數降殺以兩而其制不降何也曰降也天子之山節藻梲復廟重簷諸侯固有所不得為者矣諸侯之黝堊斫礱大夫有不得為矣大夫之倉楹斫桶士又不得為矣曷為而不降哉獨門堂寢室之合然後可名於宫則其制有不得而殺耳蓋由命士以上父子皆異宫生也異宫而死不得異廟則有不得盡事生事存之心者是以不得而降也曰然則後世公私之廟皆為同堂異室而以西為上者何也蓋由漢明帝始也夫漢之為禮略矣然其始也諸帝之廟皆自營之各為一處雖其都宫之制昭穆之位不復如古然猶不失其獨専一廟之尊也至於明帝不知禮義之正而務為損益之私遺昭藏主於光烈皇后更衣别室而其臣子不敢有加焉魏晉循之遂不能革而先王宗廟之禮始盡廢矣降及近世諸侯無國大夫無邑則雖同堂異室之制猶不能備獨天子之尊可以無所不致顧乃梏於漢明非禮之禮而不得以致其備物之孝蓋其别為一室則深廣之度或不足以陳鼎俎而其合為一廟則所以尊其太祖者既褻而不嚴所以事其親廟者又厭而不尊是皆無以盡其事生事存之心而當世宗廟之禮亦為虛文矣宗廟之禮既為虛文而事生事存之心有終不能以自巳於是原廟之儀不得不盛然亦至於我朝而後都宫别殿前門後寢始略如古者宗廟之制是其沿襲之變不惟窮鄉賤士有不得聞而自南渡之後故都淪沒權宜草創無復舊章則雖朝廷之上禮官博士老師宿儒亦莫有能知其原者幸而或有一二知經學古之人乃能私議而竊歎之然於前世之譏孝惠之飾非責叔孫通之舞禮而於孝明之亂命與其臣子之茍從則未有正其罪者於今之世則又徒知論其惑異端徇流俗之心陋而不知本其事生事存之心有不得伸於宗廟者是以不能不自致於此也抑嘗觀於陸佃而知神祖嘗有意於此矣然而史籍未記豈天未欲使斯人者復見三代帝王之盛耶宗法總敘人君欲教民和親其道必始於宗族故欲復古之小宗以收天下不相親屬之心古有大宗有小宗禮曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也古者諸侯之子弟異姓之卿大夫始有家者不敢禰其父而使其嫡子後之則為大宗族人宗之雖百世而宗子死則為之服齊衰九月故曰宗其繼别子之所自出者百世不遷者也别子之庶子又不得禰别子而自使其嫡子為後别為小宗五世之外則無服其繼禰者親兄弟為之服其繼髙祖者三從兄弟為之服其大功九月而髙祖以外親盡則易宗故曰宗其繼髙祖者五世則遷者也小宗四有繼髙祖者有繼曽祖者有繼祖者有繼禰者與大宗為五此所謂五宗也古者立宗之道嫡子既為宗則其庶子之嫡子又各為其庶子之宗其法止于四而其實無窮自秦漢以來無世卿大宗之法不可以復立而其可以收合天下之心者有小宗之法存而莫之行此甚可惜也宗法考證大宗則一小宗則四承大宗者身繼五宗禰之次子身繼四宗有大宗則事五宗禰謂父也大宗别子為祖别子者謂諸侯嫡子之弟别于正嫡也為祖者别與後世為始祖也繼别為宗謂别子之適長子繼别子與族人為百世不遷之宗也繼禰者為小宗謂别子之次子以其長子繼已為小宗而其同父兄弟宗之也有五世則遷之宗繼禰之小宗則同父兄弟宗之繼祖之小宗則堂兄弟宗之繼曾祖之小宗則再從兄弟宗之繼髙祖之小宗則三從兄弟宗之至于四從則親屬盡絶所謂五世則遷者也是之謂小宗始祖始有封爵及始遷者為始祖長子繼之子孫世世為大宗統族人主始祖廟祭百世不遷髙祖傳至玄孫為繼髙祖小宗統三從兄弟主髙祖廟祭至其子五世則遷曾祖傳至曾孫為繼曾祖小宗統再從兄弟主曾祖廟祭至其孫五世則遷祖傳至孫為繼祖小宗統從兄弟主祖廟祭至曾孫五世則遷禰所生子為繼禰小宗統親兄弟主禰廟祭至玄孫五世則遷大宗子按諸侯適長為世子繼諸侯正統其次適為别子别子所生之長子乃大宗子今法長子死主父喪用次子不用姪宗子法立則用長子之子小宗子按别子之庶子所生之長子乃小宗子也或問如何謂之别子曰别子諸侯之弟别於正適也不得禰其父又不可宗嗣君又不可無統屬故死後别子孫立此别子為始祖所謂别子為祖即太宗之祖讀為分别之别或問小宗欲立祠堂止立當祭之龕却是四龕俱立曰按本注四龕俱立若世數未滿且虛其不當祭之龕待他日世數滿然後遍祭四代宗法考程子曰管攝天下人心收宗族厚風俗使人不忘本須是明譜係收世族立宗子法宗子法壞則人不知來處以至流傳四方往往親未絶不相食又曰今無宗子故朝廷無世臣若立宗子法則人知尊祖重本既重本則朝廷之勢自尊古者子弟從父兄今父兄從子弟由不知本也宗子法廢後世譜牒尚有遺風譜牒又廢人家不知來處無百年之家骨肉無統雖至親恩亦薄張子曰宗法若立則人各知來處朝廷大有所益或曰朝廷何所益公卿各保其家忠義豈有不立忠義既立朝廷豈有不立朱子曰大傳云别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗何也君適長為世子繼先君正統自母弟以下皆不得宗其次適為别子不得禰其父又不可宗嗣君又不可無統屬故死後立為大宗之祖所謂别子為祖也其適子繼之則為大宗之直下相傳百世不遷别子若有庶子又不敢稱别子死後立為小宗之祖其長子繼之則為小宗五世則遷别子者謂諸侯之弟别於正適故稱别子也為祖者自與後世為始祖謂此别子子孫為卿大夫立此别子為始祖也繼别為宗謂别子之世世長子當繼别子與族人為不遷之宗也繼禰者為小宗禰為别子之世子以庶子所生長子繼此庶子與兄弟為小宗也五世則遷者上從髙祖下至玄孫之子髙祖廟毁不復相宗又别立宗也然别子之後族人衆多或繼髙祖者與三從兄弟為宗至子五世或繼曾祖者與再從兄弟為宗至曾孫五世或繼祖者與同堂兄弟為宗至曾孫五世或繼禰者與親兄弟為宗至玄孫五世皆自小宗之祖以降而言也魯季友乃桓公别子所自出故為一族之大宗滕文之昭武王為天子以序則周公為長故滕文謂魯為宗國又有大宗而無小宗者皆適則不立小宗也又有有小宗而無大宗者無適則不立小宗也今法長子死則主父喪用次子不用姪若宗子法立則用長子之子圖書編卷一百八
