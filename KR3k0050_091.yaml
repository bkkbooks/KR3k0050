body:
  text: 圖書編卷九十一明章潢撰屯鹽相須總序利弊常相因也欲興利者不得不去其弊而不察其弊之所由起則弊未易去利亦未昜興也今日國計莫大於邉國用告困亦莫困於邉其弊安在哉蓋沿邉之屯田廢則邉費不得不取給於內帑而內帑不得不取足於東南之轉輸究其弊之原緣商人不種粟於邉而屯卒之牛種不能盡仰給於官坐是屯田廢而商人之利亦薄矣若由今之道無變今之俗且曰種邉非商人所願也曷不推原昔之所以願種於邉者何故昔日邉屯廣積商兵兩利者何故未有可行於昔不可行於今者特在經國者一反掌間耳計近利而忘逺慮安故常而昧變通更絃改轍不得不深有望於幹蠱之君子此屯鹽利弊相因之圖所由作也鹽法利弊𢎞治五年令兩淮等鹽運司鹽引俱於運司招商開中納銀類解户部太倉以備邉儲國初以來天下鹽課俱於各邉開中上納本色米豆商人欲求鹽利於近邉轉運本色以待開中故邉方粟豆無甚貴之時至是户部尚書葉淇淮安人鹽商皆其親識因與淇言商人赴邉納糧價少而有逺涉之虞在運司納銀價多而得易便之利淇然之內閣徐溥同年最厚淇遂奏準商人引鹽悉輸銀户部送太倉銀庫收貯分送各邉鹽銀積至一百萬餘兩人以為利而不知其壞舊法也商人赴邉開中之法既廢近邉米豆無人買運價遂騰湧邉儲自此整理愈難矣按嘉靖中詹事霍韜疏謂昔我太宗皇帝之供邉也悉以鹽利其制鹽利也每鹽一引輸邉粟二斗五升是故富商大賈悉於三邉自出財力自招遊民自墾邉地自藝菽粟自固堡伍嵗時屢豐菽粟屢盈至天順成化年間甘肅寧夏粟一石易銀二錢時有計利者曰商人輸粟二斗五升支鹽一引是以銀五分得鹽一引也請更法課銀四錢二分支鹽一引其獲利八倍於昔矣户部以為實利遂變其法凡商人引鹽悉輸銀於户部間有輸粟之例亦屢行屢止且雖輸粟亦非二斗五升之舊矣商賈耕稼積粟無用徹業而歸邉地遂日荒蕪困敝千里沃壤莽然荆榛稻米一石值銀五兩皆鹽法更弊之故也然則欲安邉足用莫急於復太宗鹽法乎按祖宗朝足邉屯田為急中屯次之今皆不行惟臨時倚辦於穵運糴買二者而已然穵運苦於陸路艱難糴買苦於邉方粟貴皆下䇿也嗚呼祖宗良法廢格不行末世下䇿因循蹈襲無怪乎邉事之日非也備書於紀惟智者察焉國家之設六邉其初雖仰給鄰省之常賦然屯田鹽法所補至為不少今屯田久弊勢難卒復然尚有可諉者謂敵數內侵地荒不可墾也至如鹽法一事則固任其大壞而莫之省憂其又何説焉哉頃嵗以來所司以商人困敝不得利改議每鹽一引止令輸粟一斛若銀則四錢有半此誠通商惠工之術安邉足用之道其何不善之有奈何法立姦生利不歸商賈之家顧以充豪猾之橐聞之邉人言每嵗户部開納年例方其文書未至則內外權豪之家遍持書札預託撫臣撫臣畏勢而莫之敢逆其勢重者與數千引次者亦一二千引其餘多寡各視其勢之大小而為之差次名為買窩賣窩每占鹽一引則可不出大同之門坐收六錢之息至於躬身轉販真正商人茍非買之權豪之家丁丐諸貴幸之僕𨽻則一引半緡曾不得而自有夫一引白得銀六錢積而千引則可坐致六百金萬引則可得六千金以遊手遊俠之人不移跬步而坐致千金之利至於商賈負販勞筋苦骨乃為人奴役其支鹽也則有伺候需索之煩至其行鹽貿昜也又率為餘鹽之賈所苦人情何樂於此而為之乎此邉人耳目所共聞見所以失人心而召禍變虧國計而積耗蠧皆由此道也嘗細求其故其弊之所以不可反者蓋緣比年巡撫都御史習知其地與時不可久處則日夜圖維遷轉既不免曲意以奉人加以時有喪敗踣躓之失又每務彌縫而懼人之議其後故以重利啖人至於負纍商人虧損國計非惟不知恤而亦不暇恤雖其撫治士宦之家與其舉人監生生員之室無不人人得其歡心甚至以之賞伶人犒樂工而亦莫之恤焉豈不可為痛恨也伏望敇下該部查議將前開納事宜改屬巡按御史務令召募正商上納而增其課額即每引可得米九斗如令納銀亦不失一兩之入著令沿邉之人無問車芻石粟皆得詣吏上納則彼號稱商人者既無勢豪之占據既以樂從而彼所謂勢豪者知其無利亦將舍置而不顧如是而商不輻輳財不裕饒請伏誣妄之戮若御史仍前所云不能為國家增課去弊以濟時艱許吏部都察院及兩京科道參奏紏劾重承法典其於邉計雖未必遽充當亦稍稍有所補助此外更能乘今中熟糴十萬餘石顓備客兵毋令輒以按伏隂耗必不至失我軍之心而召外國之侮如比日也何者昨敵人壓境乘間挑戰邉人紿之曰朝廷遣大將調集諸鎮人馬數十萬以與汝殺而彼傲然不信且曰今汝本鎮軍已數月不得食矣即調到諸軍汝將何以供給夫邉臣耗國計而使強敵輕侮至於此豈不可痛恨故今日之計必先厚自積貯以壯我軍之氣而逆折其心即屯田之利將漸可規復昔趙充國論備邉之計以為湟中榖斛八錢糴三百萬斛則羌人不敢少動諸葛亮用兵如神而以糧道不繼屢出無功由是言之豐則積榖豈非古今之要務哉今敵得利以數十萬計牛羊彌滿於山谷子女充牣乎穹廬彼諸部之人聞之見之者必且爭相告語轉相誇詫將日夜治其器械練其人馬猶若漁人之治網罟獵者之調鷹犬以期於必得而我乃泄泄然自若也豈不貽後日之深悔哉近該南京吏科等衙門建言屯田之利臣竊思之以飢餒就戰之兵使釋戈矛而緣南畝是猶解危急之病而方種救病之藥也若戰守有傋此亦當言然屯政之利無他去其害屯政者而已考趙充國屯田自燉煌至遼東環合萬有餘里則今西北正在其中卒至西羌遂無邉患此屯政之利也今饒沃并於富強荒瘠困於牛種耕斂奪於私差輸挽脅於包攬屯地太廣屯糧太重剽爭無禁疆畔不定此屯政之害也其他委曲事宜在彼中詳定難預究竟又該副使胡松議抑權豪杜塞賣窩買窩之弊似稍可觀然未聞果濟邉用何也自積粟無用商賈廢業耕地荒蕪千里沃壤遂成榛莽未易通商要之屯田鹽法政實相成鹽法通故佃田益力屯田舉故商賈可依望即令屯田官痛革窩姦廣募正商稍益常課詣吏上納者即備客兵行糧勿歸户部添置農官而兩法兼舉職不勝願望但增改鹽課於前須盡減餘鹽於後自先年御史秦越巡鹽兩淮謬增餘鹽希圖恩賞商人大失其資今雖裁減尚或未盡乞議盡減以便客商通鹽法邉民乏食濟困良難穵運非恆久之䇿鹽糧亦有限之課西北漕運不可不深長計也屯政利弊自古守國以兵而邉兵尤為難強養兵以食而邉食尤為難給蓋邉塞之地舟楫不通千里陸運勞費十倍故秦人轉輸率三十鍾而致一石茍非即其地分屯力耕食未昜給也蓋土地本生物以養人天下未有不毛之土司民牧者茍能使地無遺利人無遺力則何兵食之不可給也語曰千里餽糧士有飢色此為一時行兵者言也豈有邉塞常屯空棄地利不力耕自給而顧嵗嵗仰餉於千里之外非計之得也昔日戰國分裂燕趙特彈丸黑子耳北抗胸奴南支齊秦諸國未聞有兵食不足之患秦人初謂山東諸國未足以擯自孝公以亟耕力戰遂強其國莫有與抗者今以天下之大舉太倉之積以輸邉而猶皇皇然有不足之慮反不如戰國一隅之君此其故何哉古之地利盡而今之地利不足也古之兵皆自食其力而今之兵悉仰給於官也然則屯田之䇿謂非今日守邉急務乎故鼂錯勸募民徙田塞下謂使屯戍之事益省輸將之費益寡為惠甚大趙充國擊先零願罷兵屯田二十畝益蓄積省大費即滅羌振旅而還二子其真知邉計者乎不特此也李泌勸其君以屯田關中之䇿而士卒多應募願耕唐德宗問李泌以復府兵之䇿對曰誠能用臣之言可以不減戍卒不擾百姓糧食皆足粟麥日賤府兵亦成請鑄農器給牛種分賜沿邉軍鎮募戍卒耕荒田而種之關中土沃而久荒所獲必厚戍卒因屯田致富則安於其土不復思歸舊制戍卒三年而代及其將滿下令有願留者即以所開田為永業家人有願來者本貫給長牒續食而遣之不過數番則戍卒皆土著乃悉以府兵之法理之是變關中之疲敝為富強也上喜曰如此天下無復事矣既而戍卒應募願耕屯田者什五六韓重華募人營田於代北而嵗省度支二千餘萬緡元和中振武軍飢宰相李絳請開營田可省度支漕運乃命韓重華為營田使起代北墾田三百頃出贓罪吏九百餘人給以耒耜耕牛假種糧使償所負粟一嵗大熟因募人為十五屯每屯百三十人人耕百畝就髙為堡東起振武西逾雲州極於中受降城凡六百餘里列柵二十墾田三萬八百餘頃嵗收粟二十萬石省度支錢二十餘萬緡按李泌韓重華所營屯田即今大同宣府陜西諸邉之地而趙充國所屯即今甘肅地也前人之事即後人之師有為者亦若是豈有可行於古而不可行於今者哉但邉塞之地風沙早寒耕穫比南方為難而又每有邊人冦掠之慮今若不先為防護且重勸賞以來之則雖日談屯田無益矣故必修車戰繁林木列伏兵以為之屏衛捍禦然後田者有所恃而不恐若倣周人之田畯命官秦人之以力耕受爵秦法謂農與戰始得入官漢有孝弟力田之科賜帛之詔唐有給耒耜耕假種糧之令皆所以鼓舞斯民使趨事赴工也又按洪武中大學士宋訥上守邉䇿有曰備邉在乎足食足食在乎屯田今諸將中豈待借才於異代哉宜選其有智勇謀略者數人每將以東西五百里為制隨其逺近髙下分屯所領衛兵斟酌損益率五百里一將彼此相望首尾相應耕作以時訓練有法遇敵則戰冦退則耕此長久安邉之䇿也景泰中葉文莊公盛以左參政協贊獨石等處軍務嘗請官銀買牛千餘頭摘戍卒不任戰事俾事耕稼嵗課餘糧於官凡軍中買馬勞功恤貧諸費皆於是乎取給自是邉人歡給嵗亦屢登葉文莊所行即與宋學士之䇿相表裏使今日各邉皆如此則糧粟不可勝用而尚何患邉餉之不充哉又按今日胡端敏奏議一欵欲廣屯種以足邉餉夫屯種孰不欲廣然每差官督勸不能增者急於起科得利也夫嵗收不常而租有定額則開墾者利未得而害巳隨故人不敢開種今若查照北直𨽻地方欽奉太宗皇帝聖訓聽令各屯原額拋荒及空間地土不拘土客官民軍舍盡力開墾永不起科及正統四年令大同宣府遼東陕西沿邉空間之處許官軍户下人丁儘力耕種免納子粒如此則有利無害而人樂於興種矣蓋所貴乎廣種多收民間米榖價賤發銀可糴則邉儲易足矣丘文莊亦請於凡邉塞置立屯田分軍耕種不必征其租入士卒能於本田之外多耕者立為賞賚則例使人人奮耕家家有積邉城自然充足於是令內地該運邉糧州郡俾其賫價來糴家積有餘市價自平不獨邉軍皆贍而內地之田亦省矣愚按二公之言尤合於王道藏富於民無見小欲速之意且屯田既興即因屯田以制邉縣宋滕甫有言中國契丹之兵常患多寡不敵蓋中國兵有定數至於平民則素不知戰契丹之俗人人能戰舉國皆兵此其所以多勝也馬端臨曰周官五兩卒旅軍帥之衆此教練之素也家家使之為兵人人使之知兵故雖至小之國勝兵萬數可指顧而集也觀滕甫之言則知契丹之所以強而中國之所以弱觀馬端臨之言則知古列國之所以強而今天下之所以弱其故皆由於兵矣愚謂今宜稍倣此意創制立法略如漢鼂錯所謂制邉縣以備敵者矣蓋既重賞以墾屯田則兵民皆願耕矣然後編之悉使為兵一切他役無所預如佃田百畝即出一兵則田千頃即可得千兵萬頃即可得萬兵矣兵至滿萬則大縣矣合數縣為一郡則大郡矣得良守令撫綏之良將帥統御之敵雖強不足畏矣新縣既立俾沿邉舊所有州縣亦皆一從此制什伍其民盡習兵戰專以守邉禦敵上供嵗賦一切除免凡軍需雜役取諸近邉司府以給之使邉民自為兵之外一無所事事得專於備禦樂於戰鬬藩籬成而邉防永固矣庶幾滕甫謂人人能戰舉國皆兵契丹之所以強者轉而為中國之強矣馬端臨所謂勝兵數萬可指顧而集古列國之所以強者轉而為今天下之強矣昔鼂錯言於漢文帝曰逺方之卒不知邊人之能不如選常居者家室田作且以備之以便為之髙城深塹要害之處調立城邑毋下千家先為室屋具田器乃募民免罪拜爵復其家豫冬夏衣廪食能自給而止古之制邉縣以備敵也使伍家為伍十伍一里四里一連十連一邑皆擇其賢材習地形知民心者為之長居則習民於射法出則教民於應敵服習以成勿令遷徙幼則同遊長則共事夜戰聲相知則足以相救畫戰目相見則足以相識歡愛之心足以相死如此而勸以厚賞威以重罰則前死而不旋踵矣按錯之言當時文帝一一施行之邉防賴焉唐李泌嘗言欲行屯田之䇿以復府兵亦備與錯同意嗚呼時無古今人無古今顧力行何如耳今誠能酌行此䇿因屯田以制邉縣以籍為兵不收其稅但資其力不取其財但為保障不為繭絲實安邉長計嗚呼此䇿行則衛所坐食無用之兵可省矣夫邉縣既立即因屯田以寓地網夫敵騎利在平曠易為馳突今邉塞之地多平原曠野一望極目險阻實希宜因屯田定其經界開為溝洫就藉墾田者之力每一里共濬一溝略如古者井田之制一可以息爭端二可以備旱潦三可以阻敵騎四者我兵車禦備即可以此為常陳免臨時掘塹之勞草木子曰井田之法非獨為均田制祿而已蓋所以隂寓設險守國之意中原平衍設立許多溝澮許多阡陌使車不得方其軌騎不得騁其足故也豈非寓至險於大順之中者乎觀晉郤克欲使齊人盡東其畝以便戎車吳玠在蜀於天水軍作地網以阻金兵之騎於此可驗矣宋紹興間金人侵蜀近邉地勢平衍騎兵縱橫無礙宣撫使吳玠乃創地網於平田間縱橫鑿為渠濶八尺深丈餘連綿不絶如網其後金人來犯騎兵始不得肆宋太宗時議者謂順安軍至北平二百里地平廣無隔閡每嵗敵騎多由此而入謂宜度地形髙下因水陸之便建阡陌浚溝洫益樹五榖所以實倉廪而禦戎馬愚謂古今智謀之士所見略同至於修車戰繁林木列伏兵又皆潤色屯田之制也但諸商不令納粟於邉以復祖宗之舊止欲復屯田也惡可得哉國朝各都司衛所屯田在京錦衣等衛屯田共六千三百三十八頃五十一畝零南京錦衣等衛所屯田共九千三百六十八頃七十九畝零中都留守司并所屬衛所及皇陵衛屯田共七千九百五十三頃七十八畝零北直𨽻衛所屯田共七千九百三十七頃四十九畝零南直𨽻衛所屯田共一萬九千八十七頃二十五畝零大寧都司并所屬衛所屯田共二千一百二十六頃七十六畝零萬全都司并所屬衛所屯田共一萬九千六十五頃七十三畝零浙江都司并所屬衛所屯田共二千二百七十四頃一十九畝零湖廣都司并行都司并所屬衛所屯田共一萬一千三百十五頃二十五畝河南都司并所屬衛所屯田共三萬六千三百九十頃一十七畝零江西都司并所屬衛所屯田共五千六百二十三頃四十一畝零陜西都司所屬衛所屯田共二萬九千四百四十四頃二十二畝零陜西行都并所屬衛所屯田共一萬三千一十二頃五十畝廣西都司并所屬衛所屯田共五百一十三頃四十畝山東都司并所屬衛所屯田二千六十頃遼東都司并所屬衛所屯田共一萬一千三百八十六頃山西都司并所屬衛所屯田共一萬二千九百六十三頃八畝零山西行都司并所屬衛所屯田共一萬一百一十八頃二十畝零廣東都司并所屬衛所屯田共七千二頃三十三畝零四川都司并所屬衛所屯田共六十五萬八千三百四十四頃零四川行都司并所屬衛所屯田共一千二百頃五十五畝零福建都司并所屬衛所屯田共三千七百七十四頃福建行都司并所屬衛所屯田共九千三百三十九頃二十九畝零雲南都司并所屬衛所屯田共一萬八百七十七頃四十三畝零貴州都司并所屬衛所屯田共九千三百三十九頃二十九畝零國初兵荒之後民無定居耕稼盡廢糧餉匱乏初命諸將於龍江等處屯田自是立法漸密遍令天下大率衛所軍士以三分守城七分屯種又有二八一九四六中半等例皆隨地而異云今各省屯政未大舉亦未盡廢固與鹽法無與而邉屯之大廢也謂其無關於鹽法可乎國朝屯田考夫邉計最重且亟者莫如屯政矣國家九邉之地肥沃可種者悉為屯田甲楯之所棲耒耜之所事綿亘數千里於焉耕耨於焉捍禦蓋即古寓兵於農之遺而漢趙充國諸葛亮晉羊祜唐元振韓重華諸臣之所嘗收其利者二百餘年聖明憂勤於上耆碩擘畫於下將臣經略於外謀士講求於內則惟屯政為孜孜顧其間或舉或廢或利或否非壤地不可則政之得失異也何也髙皇帝閔海運之艱詔羣臣議屯田法用宋訥所獻守邉䇿立法分屯布列邉徼逺近相望首尾相應創制如此其周也邉境既寧撤守關士卒僅僅備譏察外悉令屯田致力如此其一也山西泌州民若干户願應募受屯賞以鈔錠公田給之仍令募本州民召募如此其廣也令屯士并樹桑棗柿栗隨地所宜粟雖不足而足於桑棗柿栗矣地利如此其盡也文皇帝納黃福之請官為市牛鑄器至於廣屯於遼陽而遣人徴牛於朝鮮耕具如此其給也詔各荒屯空土不論土客軍民官舍盡力開墾永不起科恩澤如此其厚也謂將領能時時勞問屯士所苦誰不感奮勤力軫恤如此其殷也以寧夏積榖獨多降敇奬諭總兵何福激勸如此其明也仁宗念所司以征徭役擾之令毋擅役防農愛養如此其至也宣宗初大同總兵鄭亨上屯田子粒數多則遣人勘實賞之論功如此其核也提督必遣老成更命風憲官以時巡察任使如此其慎也屯久嵗豐邉士一切用度多以粟易於是令户部灌輸貿雜多至二三十萬石少亦不下十萬積貯如此其豫也天順中都御史葉盛巡撫宣府修復官牛官田法墾田益廣積榖益多以其餘易戰馬千八百匹修築城堡七百餘所興利如此其巨也蓋其立法也周故人便其任人也當故其法舉其與士也優故士奮其取利也緩故利集即所稱湟中渭濵涼州振武之事不啻過之無不及焉乃其弊也則有膏腴之地多為莊田空間之區咸歸邉帥士卒無近田可耕如商輅所論者矣有墩堡不修額森輕犯有可耕之田而不敢耕士卒瘠憊家無耒耜有可耕之田而不長耕如梁材所疏者矣有耕種之際鹵莽滅裂收貯之後侵欺侵用以管屯為職者優逸城市而不見阡陌之巡以典屯而來者憑信簿書而不校倉庫之實如劉定之所議者矣則有擾之以弗靖持之太急今日核地明日徴逋輒起正德中寧夏之變卒令荒地儲竭邉民凋瘵且叛漢而入敵如王煜所陳者矣恬嬉既久因循廢弛日復一日邉境蕭條沃壤盡棄茭粟不繼士馬不飽控運例銀所費不資而度支亦告匱矣議者或欲令各邉撫臣選廉幹吏闢荒蕪革豪敓核乾沒修亭障逺斥堠每嵗終以聞部臣分别上請明示勸戒或欲召募開墾及令軍民自種量徴其稅或以為歸利於下則人樂趨往時為邉帥豪户種田不荒蕪而公糴亦紛紛請勘邉生厲階夫與其膏土沃田鞠為茂草孰若捐以豫人請明詔有長開種者悉與為業毋有所問或以為自鹽法折納商不赴邉而屯政遂與俱壞欲復屯政盍令商納粟於邉耕者有所資積者有所散而塞下自實蓋諸議之指大都任人廣募薄征緩取而鹽法與屯田相為維持鹽法之復尤不可不亟也夫欲令農狎其野穡人成功積豐於垣士厭於伍內有亡費之利而外有守圉之備以振威生氣制勝撻伐其惟屯政哉屯營田考漢文帝從鼂錯言募民徙塞下錯復言募民相徙以實塞下使屯戍之事益省輸將之費益寡甚大惠也此後世屯耕邉塞之始宣帝時趙充國擊先零羌乃言擊羌以殄滅為期願罷騎兵屯田益積蓄省大費且條上留便宜十二事按守邉之議固當知屯田之利亦不可不知擾田之害今邉塞可耕之地近城堡者固易為力若夫邉外之地地逺而勢孤必如充國所謂乘塞列隧羌大攻不能為害而又有山阜可以望逺有溝塹可以限隔有營壘可以休息架木以為譙望聮木以為排柵時出遊兵以防冦掠如是則屯耕之卒目有所蔽而無外虞心有所恃而無內恐得以盡力於畎畝之中而享收穫之利矣漢末天下亂離諸軍並起率乏糧榖無終嵗之計曹操從棗祗請建置田官以祗為都尉募民屯田許下得榖百萬斛於是所在積榖倉廪皆滿故操征伐四方無運糧之勞諸葛亮由斜谷伐魏以前者數出皆以運糧不繼使巳志不伸乃分兵屯田為久駐之計耕者雜於渭濵居民之間而百姓安堵軍無私焉晉羊祜鎮襄陽墾田八百餘頃祜之始至也軍無百日之儲及其季年有十年之積平吳之後杜預修召信臣遺迹激用滍淯諸水以浸田萬餘頃分疆刊石使有定分公私同利衆庶賴之按羊杜二人所墾之田在今湖廣之荆襄河南之唐鄧蓋我朝天下之中也天下之田南方多水北方多陸今此三郡兼水陸而有之者也而南北流民僑寓於此者比他郡為多請於兩藩交界之中立一官司遴擇廷臣知稼穡者循行其地可水耕者引水立堰募南人耕之可陸種者分疆定界募北人耕之成熟之後按畝分租隨地儲積遇有急用由漢入江由江而達於金陵稍省嵗漕之數多留郡縣之儲或遇河洛關陕荒歉亦可用以救濟又於暇日講求武關入秦之路商於陸挽之故萬一三邉有缺亦或賴以濟焉又按今水田惟揚州最賤陸田惟潁夀為輕夫魏司馬懿伐吳用鄧艾計以三隅已定事在淮南且田且守嵗完五百萬斛以為軍資以此乘吳無往不克蓋魏人以偏安之國有外敵之患猶能兼淮潁而盡田之果賴其用矧今盡四海以為疆而此地介兩京間又為運道經行之路有魚鹽之利有莞蒲之用古人所謂揚一之地也考之唐史上元於楚州今淮安古射陽湖置洪澤屯於夀州置芍陂屯厥田沃壤大獲其利俱在此地其遺迹可考也唐開軍府以扞要衝因隙地置營田天下屯總九百九十二司農寺每屯三頃州鎮諸軍每屯五十頃水陸腴瘠播植地宜與其功庸煩省收率之多少皆決於尚書省按我朝之制就於衛所所在間曠之地分軍以立屯堡其且耕且守蓋以十分為率七分守城三分屯耕遇有警急朝發夕至是於守禦之中而收耕穫之利其法視古為良近又於各道專設風憲官一員以提督之有衛所之處則有屯營之田非若唐人専設農寺以領之也每軍受田二十畝納租六石臣以為民田則例最輕者頃收三石其田率多膏腴軍所屯種多其所棄不耕之田而所收之租乃十倍焉請如唐人較其水陸腴瘠收率多少各因其地利土宜定為徴收則例屯軍樂於趨赴則公私兩便上下俱足矣元和中振武軍飢李絳請開營田可省度支漕運乃命韓重華為營田使起代北墾田三百頃出贓罪吏九百餘人給以耒耜耕牛假種糧因募人為十五屯每人耕百畝凡墾田三萬八百餘頃嵗收粟以省度支錢宋太宗時以陳恕為河北招置營田使議者謂宜度地形髙下因水陸之便建阡陌浚溝洫益樹五榖所以實邉廪而限戎馬故遣恕等經營之恕密奏戍卒皆遊惰仰食縣官一旦使冬被甲兵春執耒耜恐變生不測乃止天下之事非興作之難而處置得宜之為難自趙充國於邉地建屯田之議魏晉至唐皆行之未嘗不用兵也未聞有不測之變而不為也如恕所奏豈佚道使民之義而亦何以立國哉淳化中以何承矩為屯田使黃𢡟允判官於河北諸州水所積處大墾田發諸州兵萬八千人給其役於雄莫霸等州興堰六百里置斗門引淀水灌溉次年方熟至是沮何承矩屯田之議者始息莞蒲蜃蛤之饒民賴其利此地今在畿甸近地神宗時詔以坊監牧馬餘地立田官令専稼政以資牧養之用孝宗時張闡言荆襄屯田之害非田之不可耕也無耕田之民也官司慮其功之不就不免課之遊民遊民不足不免抑勒百姓捨已熟田耕官生田私田既荒賦稅猶在占百姓之田以為官田奪民種之榖以為官榖老稚無養一方騷然有司知其不便申言於朝罷之臣以為與其棄之孰若使兩淮歸正之民就耕非惟可免流離異日墾闢既廣田疇既成然後取其餘者而輸之官實為兩便元虞集進言曰京師東瀕海數千里北極遼海南濵青齊萑葦之場也海潮日至淤為沃壤宜用浙人之法築隄捍水為田聽富民欲得官者合其衆分受以地官定其畔以為限能以萬夫耕者授以萬夫之田為萬夫之長千夫百夫亦如之察其惰者而易之三年後視其成五年有積蓄命以官就所儲給以祿十年不廢得以世襲如軍官之法集此策未曽行末世海運不至於是乎有海口萬户之設大略宗之每年亦得數十萬石以助國用至正時承相托克托言京畿近水地召募南人耕種嵗可收粟麥百萬餘石不煩海運京師足食從之按近日胡尚書世寧奏議一欵欲廣屯種以足邉儲夫屯種誰不欲廣然每差官督勸不能增者急於起科得利也夫嵗收不常而租有定額則開墾者利未得而害巳隨故人不敢開種今若比照太宗皇帝聖旨聽令北直各屯原額拋荒及空間地土不拘土客官民軍舍儘力開墾永不起科及正統四年令各邉空間之處許官軍户下人丁儘力耕種免納子粒如此則有利無害而人樂於興種矣蓋所貴乎廣種多收民間米榖價賤發銀可糴則邉儲可足矣又按邉儲之策有三趙充國之留田湟中韓重華之營田代北者上也勸民廣種以待糴召商開中以代輸者次也轉餉千里終嵗嗷嗷脫巾待哺策斯下矣此三策其為得失上下人莫不知然近日諸邉每止行下策而莫克由其上雖中策行之猶捍格焉謂之何哉國朝各運司提舉司鹽課北直𨽻長蘆運司嵗額辦大引折小引鹽一十八萬八百七引折布一萬一千二百六十匹南直𨽻兩淮運司嵗額辦小引鹽七十萬五千一百八十引又折色銀一千八百三十兩山東運司嵗額辦大引鹽一十四萬五千六百一十四引折色銀九百兩折布四萬六千六十匹河東運司嵗額辦大引鹽四十二萬引兩浙運司歲額辦四十四萬四千餘引鹽價銀六萬四千三百四十二兩福建鹽運司嵗額辦鹽價銀八千八百七十八兩四川提舉司嵗開中鹽十萬八千八百引鹽井衛龍州司雅州所折米二千四百石引每一百二十斤折米麥一石廣東提舉司嵗額辦鹽價銀二萬五千二兩海北鹽價銀三千二百兩靈州嵗開中五萬九千四引西和漳縣嵗折鹽價銀一千六百二十兩雲南各提舉司嵗開中五萬三千引折銀闕兩五井安夏二司嵗辦無定數黑井嵗辦六十一萬餘引白鹽井嵗辦三十三萬餘引按兩淮鹽課幾二百萬可當漕運米直全數天下各鹽運兩淮課居其半而浙次之長蘆次之福場無巡御以行無逺地河南場無官以出有専所廣場兼之故巡運俱無或清理鹽法遣都御史一員統制長蘆淮浙兹已革之但鹽法大壞邉儲匱乏匪朝夕矣欲整理之也難哉當閲鹽法志序有曰鹽法有一言可以蔽之者寬商而已或者又以為利國之言者公也為私商之言者嫌也嫌不當避耶嗚呼商猶農也夫不奪農利可使田也不奪商利可使鹽也奪其農利彼不利我田我田自治耶奪其商利彼不利我鹽我鹽自食耶是故利農者自利也利商者亦自利也在邉陳陳相因在部源源而來國之利莫大焉納銀於衣冠之部惟恐不足關糧於矢石之邉不求有餘當道者縱不為商人惜獨不為飛挽之良法善政惜有志鹽法者幸三復斯言淮鹽利弊霍韜鹽政議曰立法須公而溥行法須嚴而密然又善適變通之權乃可久而無弊唐劉晏只用淮鹽遂濟國用臣今始議淮鹽利弊即天下可推也嘗考自國初以兩淮鹵地授民煎鹽嵗收課鹽有差亦猶授民以田而收其賦也惟鹽課條例云凡各竈丁除正額民外將煎到餘鹽夾帶出場及私鹽貨賣者絞然則耕民納賦稅外將餘粟賣者絞可乎此法良有深意而後人失之也淮鹽原額嵗辦三十五萬引有竒後改辦小引七十萬有竒然兩淮鹽貨除正額外猶産餘三百萬引有竒今正額已不得多取餘鹽復不得私賣即三百萬餘鹽安所消遣乎兩淮行鹽地方數千里人民億萬家所仰食鹽只七十萬引饔餐安所取足乎是無怪乎私鹽橫溢而鹽價湧貴也國初竈丁辦鹽每引四百斤給工本鈔二貫五百文蓋洪武年間鈔一貫值錢千文故竈丁得實利如是而冒禁賣私鹽絞死可也今鈔一貫不易粟二升乃禁絶竈丁勿賣私鹽是逼之餓以死也此後來行法之弊非初年之失也正統二年令曰貧難竈丁除正額鹽照舊收納其餘鹽收貯本場每二百斤官給米麥二斗十三年令曰每餘鹽二百斤竈丁實得米一石乃私賣鹽即絞死可也蓋當時此令雖出而米實無措故官司徒挾此令以征取餘鹽實不能必行此令以給民米麥且貧弱竈丁朝有餘鹽夕望米麥不得已則先從富室稱貸米然後加倍償鹽以出息者有矣故鹽禁愈嚴則貧竈愈多此之由也貧民賣私鹽人即捕獲富室賣私鹽官亦容隱故貧竈餘鹽必藉富室乃得私賣富室豪民挾富負險多招貧民廣占鹵地煎鹽私賣富敵王侯故鹽禁愈嚴富室愈橫此之由也且法愈嚴則私愈大頑民見利而不見法淮安頑民數千萬家荒棄農畝専販私鹽挾負努刃官不敢問近年恃衆往往為劫此隙不弭必貽大患不止阻壞鹽法而已然既不能講求古法以處置餘鹽復不能變通鈔法以補給工本則貧民何所仰賴而不為變故鹽禁愈嚴盜賊愈多此之由也此鹽場竈户之利弊也洪武年間招商中鹽每引納銀八分官之徴至薄商之獲至厚故鹽價平賤民亦受賜永樂年間每鹽一引輸邉粟二斗五升商稅雖加邉糧仰足民亦受賜自永樂以前淮鹽開中嵗無定額永樂以後嵗定七十二萬引每定七分常股三分存積夫曰常股猶常行也商人先納邉糧乃給引自守場候支常年鹽也有守候數十年老死不得支者今兄弟妻子代支之令可考也曰存積者積鹽在場遇邉糧急缺乃倍價開中越次放支之鹽也此居貨罔利非王法正體成化以後淮納折支每鹽一引納銀三錢五分或四錢二分又令云客商若無見鹽許本場買補即開餘鹽私賣之禁矣故姦商借官引以影私鹽每商人竈户兩得嬴利州縣士民亦食賤鹽惟私鹽愈行則官鹽愈壅而法遂大壞今兩浙鹽課許納折色之令可考也𢎞治正德年間或權姦奏討或勳戚恩賜皆給引目自買餘鹽故法遂大壞而鹽亦平賤復有各年開中未盡鹽名曰零鹽稱掣餘鹽堆積在所名曰所鹽皆權要報中借引私鹽以壅正額故正德以前鹽價雖平而正課日損自御史秦越奏革所鹽稱掣餘鹽每二百斤作一小引稅銀一兩則取之過重自御史戴金奏減鹽課每鹽一引納銀八錢庶幾適中今之議者復論鹽包過大皆不知本末之見也蓋洪武年間鹽一引納銀八分而已永樂年間納粟二斗五升而已今則每引七錢五分矣權要賣窩復取利二錢矣復以長蘆兩浙兼搭配支商人一身三路支鹽勞費殆不資矣計淮鹽一引蓋用銀二兩有竒也商人専販復以市利則鹽價益湧貴乃其所也夫正鹽湧貴則私鹽盛行私鹽愈行則正鹽愈滯亦乃其所也此商人中納利弊也今欲復洪武之法則有上策欲救今日之急則有中䇿區區修補近年利弊則已無策何謂上策須變通鈔法鈔法重則錢法均而鹽法行矣今若立法使鈔一貫值錢千文竈丁為實利則額鹽一大引工本鈔二貫五百餘鹽一小引亦給鈔二貫五百各場餘鹽盡屬之官私挾私賣即處絞勿贖則兩淮正鹽七萬引餘鹽三百萬引舉可招商開中或如永樂時例一引輸邉粟二斗五升可也或如成化時例一引折銀四錢亦可也若國稅充足如洪武時例一引納銀八分藏富於國尤可也蓋私鹽行由正課重也課輕則私鹽不禁自止矣私鹽塞正課流邉儲自實矣故曰上策何謂中策須更為令曰凡各商人中正額鹽一百引許帶中餘鹽三百引正鹽納邉糧二斗五升餘鹽納邉糧二斗聽與竈户價買又嚴為令曰客商借官引影私鹽竈户不辨驗官引輒賣餘鹽者各照私鹽律絞勿贖又嚴為令曰正鹽一引只二百五十斤餘鹽一引亦二百五十斤革近年大包之弊革近年勸借米麥之弊革鹽場積年轄害客商之弊三邉選亷而有才者為提督都御史兼三邉勸農使遇鹽商納糧即與收受糧賤許納本色糧貴許納折色俾商無久淹凡積年所以為商人害者阻壞鹽法者悉與革絶復選亷而有才者為漕運都御史兼理鹽法俾自舉用運使提舉等官凡商人納完糧料即與支鹽勿得久淹凡積年為商人害者阻壞鹽法者即令革絶漕運都御史與提督都御史鹽課邉儲互相關通盈縮交與接濟利病均為欣戚邉方腹裏共為心腹兩都御史如左右手然後足以集事行之數年即邉儲可足乃以餘積召募遊民開墾邉地勸課農畝邉地愈闢邉防愈固百年之利也故曰中䇿何謂無䇿洪武初給竈丁鹵地復給草場所以利竈户者甚厚額鹽一引給工本鈔二貫五百文復免竈户雜差所以資竈丁者甚厚嵗課止七十萬引所以取之者甚薄惟餘鹽不許私賣有餘即給官鈔收之下以資竈户上以總利權而均其施天下食賤鹽之利竈户無餘鹽之滯其法極善自鈔法不行則官司無法以處餘鹽矣乃曰挾餘鹽者絞果可行乎行之而嚴即竈丁空腹以死不然即為變行之而寬即三百餘鹽之利盡入姦人囊橐矣法之弊而窮者一也竈丁窮矣轉而逃逋乃區區拯濟區區招復千日握其喉一朝與之食可聊生乎故撫賑徒勤逃亡益甚法之弊而窮者二也招商中鹽一引銀四錢已重矣今復加而七錢尤重矣買鍋刻取二錢邉上科罰或三四錢勸借米麥亦復二錢殆不知幾倍重矣稅愈重則利愈大姦人避重稅而趨大利避重稅則正課壅趨大利則私鹽行私鹽愈溢正課愈壅雖絞刑治之不可禁遏况有贖刑之令蓋開寬路示之趨矣則私鹽如何不溢溢則正課如何不日壅也法之弊而窮者三也私鹽盛行矣官兵捕獲迄無寧日頑民挾刃率而旅拒在揚子江及各海港者髙檣大船千萬為聚行則鳥飛止則狼集殺人劫人不可禁禦官兵敢逺望而不敢近詰在兩淮通泰寶應州縣民厭農田惟射鹽利故山陽之民十五以上俱習武勇氣復頑悍死刑不忌前年流劫幾至大變故淮安官軍不惟不捕私鹽反受弭利而為護送出境矣山東官軍不惟不捕私鹽反向鹽徒乞鹽充食矣鹽徒千百白日挾帶徑行州邑官兵不敢誰何矣州縣不敢言科道不肯言陛下髙拱焉得知之抑亦諉曰事弊已極無可奈何再及數年則官兵之追捕日嚴鹽徒之旅拒日鋭拒捕之迹日著則罪惡之狀日深官司列罪狀以請法愚民罹罪罟以逃生出不獲已必激他變將誅夷之則情可哀恤將緩縱之則頑獷愈甚禍釁所極遂有不可言者矣法之弊而窮者四也故曰無䇿臣嘗竊曰治鹽利猶治河患也治鹽利不究弊源惟末流之防猶治河患不從雍冀孟津懷衛引為陂堰鑿為溝渠以廣其利而分其勢乃從徐沛下流浚其淤土厚其隄防則愈浚而愈淤愈築而愈潰亦勢也自正統以後講治鹽法事例叢瑣無益鹽利祇足驅民為盜而已故今欲興淮鹽之利須選淮安漕運及三邉提督都御史講求其法而責以底績選人得失委託專暫成效虛實尤宜責之吏部期之數年鹽利不興邉儲不實邉民不蕃邉地不闢不收久大之效而坐策治安兩都御史吏部尚書侍郎誅罰連坐然後任人者不敢茍且任於人者不敢怠玩而政有實效此兩淮利弊也舉兩淮即天下可知也按此疏雖詳陳淮鹽利弊而邉屯興廢即此乎寓觀其疏內上䇿在復鈔法以今日人情事勢揆之恐未可必行果能舉用中䇿則屯田可興邉民萃集不惟疆圉足食而實可以強兵鹽法疏通私販阻塞不惟利商人而實有以利貧竈也救弊興利莫此為善但司國計者主意在興邉屯聊借此以運旋其闢荒廣種之䇿可也否則上之人無意於屯政止靠商人上粟實邉倘一遇歉嵗則商人無應之者亦同歸於無策蓋屯其體也鹽其用也無體斯無用矣雖然舍見在一引七錢五分之重價止得粟二斗五升計目前近利者已從旁唾之矣昔陶朱公仲子罹法欲遣少子挾資救之然少踈於財而長嗇於用及長子必欲請行乃父已知仲子之必不生也後果如其言噫今之不為陶朱公長子者誰歟長蘆煎鹽源委本司所轄二十四場俱濵東海因地利而設也所産之鹽最資國用原其成育則有煎曬不同如南有利民等八場北有嚴鎮等一十二場産鹽出於煎煮而成每竈十丁夥置鐵淺鍋一靣濶五尺深垜在灘二三四月天道晴明將灘內鹻土黑色者用耙或鋤鏟浮在地曬乾刮土入池以水浸之淋鹵流入池內陸續舀入淺鍋內發火燒煎隨乾隨添鹽至滿鍋方止約可得鹽二十斗每次為用三日若遇隂雨則點散其鹽不成然試鹵之法先以石蓮子投於鹵中如沉而下者則鹵淡浮而橫側者則鹵稍淡煎之俱費草而難成必浮而立於鹵靣者乃可入鍋煎之不但省草鹽且易成煎鹽男婦貧窘衝冒風日形容枯稿勞可知矣如海豐等場産鹽出自海水灘曬而成彼處有大口河一道其源出於海分為五𣲖列於海豐深州海盈二場之間河身通東南而逺去先來有福建一人來土此水可以曬鹽令竈户髙淳等於河邉挑修一池隔為大中小三段次第澆水於段內曬之浹辰則水乾鹽結如氷其後本場竈户髙登髙貫等深州海盈場竈户姫彰等共五十六家見此法比刮土淋鹽簡便各於沿河一帶擇方便灘地亦挑修為池照前曬鹽有占三五畝者或十餘畝者多至數十畝者共占官地一十二頃八十畝或一畝作一池或三四畝作一池共立灘池四百二十七處所曬鹽斤或上納丁鹽入官或賣與商人添包雖人力造作之功實天地自然之利但遇隂雨其鹽不結每年或收三五分或收六七分不常長蘆鹽課佐國經費久矣長蘆之所供則以上給郊廟百神之祭祀帝后內府之膳羞百官有司凡餼於公者嵗遍焉以及於輦轂之下萬億之兵民下乃貨之於啇均之於畿內八郡西暨河南之彰德衛輝北通居庸東盡遼陽數千里其出給之廣與諸運司略同而上供之必精諸運司無有也凡備物之精者不必富貴者不必能精惎精惎富惟長蘆鹽則然是故思善事也虞夏青州貢鹽齊管子肇興鹽䇲長蘆置司滄州介古燕齊所轄二十有四場東濱海渤與登萊相望蓋古興鹽首地而課入視他司稍劣夫地利以民力為本民力弗充則地利不究夫賦役重則逃亡滋草場侵則本業廢朘削繁則力本怠兼并行則公課減凡養課在養民養民在去害民者爾矣是故思阜民也天下之禁防一也禁防之決必自豪貴始兩運司暨淮司當兩都往來之衝而長蘆尤京師密邇為豪貴淵藪淮鹽價髙天下當正德末年閽寺之使西域者織造東南者公破分地之例奏給長蘆諸鹽動數千引舳艫相銜遏奪商旅以爭利於南南北交受其病比年雖厲禁復始而挾勢植私者亦時有之夫以稍劣之課應甚重且繁之供而弊之弗戢其將何䇿以贍是故思敕法也山東竈户鹽民最為勤苦亭户鍋户逈與農殊然土著守業反致逃亡浮寄姦猾轉生詭竄生齒未必不繁而編户日見減削何也蓋古無竈户自魏遷鄴後於滄瀛幽青四州之境傍海煮鹽青州置竈五百四十六歷唐乾元初置鹽院遊民業鹽者為亭户免其雜徭竈專有户始此宋雍熙二年置濵州場嵗煮鹽二萬一千餘石元豐三年京東南京濟濮曹澶行解鹽餘十有二州行海鹽置買鹽場盡竈所煮鹽官自賣之迄元皆有定額國朝山東運司所𨽻一十九場户凡一萬三千五百七十有一丁凡四萬五千二百二十有六邇來户凡三千九百零八減舊額四之三丁凡三萬八千七百三十有八減舊額四之一雖十年清查擇有力者充總稱即如有司里長蓋常制云噫知恤鮮哉山東鹽課齊嵗鬻鹽得金萬一千餘斤魏嵗收錢二十萬九千有竒鹺課裕國振古于兹蓋藩府之供有司之餼商賈之貨行之州縣胥取是焉故涉蕩蓄薪登場刮泥艱其力也霖潦鹵薄旱暵土墳係其時也斗鹽三百石鹽二千湧其價也火伏必察袋􅋔必監密其禁也鹽民之課亦難言矣哉山東課額本司所𨽻永利等一十九場鹽課每嵗該辦大引鹽一十四萬五千六百一十四引六斤八兩七錢三分六釐內除竈丁逃竄遺下竈地俱係濟青萊登所屬四十五州縣所居民佃種該徴十引鹽二萬八千三百九十引七十八斤有竒正德七年奏準每引折徴民佃竈地銀一錢五分存積常股正德五年令長蘆山東運司每嵗額辦鹽課以十分為率八分給與守支客商二分另為收積在官候邉方緊急糧儲召中以所積見鹽人到即支謂之存積其價則重其八分年終挨次給守支客商謂之常股其價則輕例以鹽課册內二項數目限以定期出給通關送繳山西解鹽利弊山西有解鹽稱海眼不假工作名曰盬鹽與淮浙齊閩殊而反穡事蓋浙淮齊閩鬻海法也其利在地不在天其祛弊之法在有餘不在不足乃解池則異是矣穡事憂旱而池利旱且利南風恆雨則結者融恆北風則升者下鹽丁散處諸邑既難遽集稍不及春夏欲結之候而為之則患其解矣此解鹽與他所鹽不同也然當祖宗法一志定之時公私俱足而商人轉輸於三省全晉關洛梁鄧之間種者不稱難食者不病苦自隆慶辛未兩決地防池水四溢鹽不結果當事者謂國計不可負始為澆灑之術蓋以人力勝天時也然而硝與鹽淆不能一一而析之也有姦商者出焉乘間營私砂礫雜和故色愈變味愈惡解鹽於是乎不可食而民於是不樂售矣於是商人坐官肆終嵗不能銷引目所在長吏又從而代之斂散以取其值焉此不獨商困而民亦困矣是以民視商若贅疣視解産為棄物無不利於食私販者而淮蘆花馬之産紛紛四至勢不可禁已夫私販盛則商利薄商利薄則國賦病為之計者夫亦酌其宜而變通耳論者謂宜採取及期則所獲不可勝用人亦且樂用之然必廣募附近居民籍名所司雜採之計其所獲劑量而歸之官則民樂於赴赴之益衆則採益時採益時則入益富一嵗可獲數嵗之利矣如是而又採擇必精毋雜硝石支給循法毋募小販禁大汾之票毋使束閣則生之既裕其原救之又通其變不必分地改額而壅滯者自行流布者自廢矣議改河東鹽課河東之鹽惟在天時非苦雨水深而鹽不結則池涸水乾而鹽不生是産鹽之地不易也鹽不易生而課銀不減是以商與竈丁俱困而國與民俱病也且河東之鹽多苦不可食轉之於秦官之𣲖而定其值民出其值而鹽歸於無用是行鹽之地固病之者也嘗按花馬池一𢃄皆有産鹽之地此鹽出之於土即為鹽根自成為鹽是不必須之於天時者也為今之計莫如改河東之鹽於花馬池一路即移河東西分司居之將河東發陕西鹽引二十二萬有餘約銀之萬餘兩免其徴𣲖即令商人照河東價銀三錢二分糴買糧草施之平延諸郡以供三邊之費扣其銀兩數目即以大倉發陕西年例銀徭發山西以補陕西原𣲖原課之數如此不更便乎事雖更張實無紛亂於國計民生所為禆益者蓋不淺矣况此鹽一開則延平之際商賈輻輳齊民貿易雖凶荒卒至可以不患也鹽政考夫鹽者民之食不可一日闕也其用則與民共之其利則在民而不在官也昔禹任土作貢而令青州貢鹽蓋貢其所有以供王用爾周官鹽人一職以百事之無鹽故亦以鹽之用而共邦事未嘗以鹽之用而共邦財也鹽有數品有刮於地而得者其味苦謂之苦鹽有熬其波而出者其鹽散謂之𣪚鹽有風其水而成者産於土中其味甘甜謂之飴鹽有積鹵而結者其形似虎而人築成謂之形鹽此鹽之名然也祭祀則供散鹽而加以苦鹽取其自然而成不忘本也賔客則供散鹽而加以形鹽取其如虎之形象其威也王后世子膳饈則供飴鹽取其味之甘甜而可常食也此鹽之用然也鹽人則以奄二人為之掌其政令謂供鹽爾待其戒令請煮鹽爾自祭祀賔客膳羞之外更不聞以一毫取民是其利則常在民而不在官也上之人特資鹽以供三者之用爾不規其利之可以富國下之人亦惟資鹽以供飲食之用而不謀其利之可以富家自後世以鹽致富強而𣙜利之禁始興世儒乃謂先王山澤亦必有厲禁以遏民趨利之原不思虞衡等官因設厲禁以為之守初未嘗私其利以公上而亦何嘗有一語及鹽乎故嘗謂壞天下之風俗者管子也啓公上以𣙜禁者猗頓也蟊賊人主之心術者鄭當時也齊桓問管仲何以為國而仲告以海王之國謹正鹽䇲舉先王公共之物而為後世自私之具管仲者作俑之尤也霸主既資鹽利以富其國則民趨利日熾矣豈非壞天下之風俗者乎魯人有猗頓者用鹽起家致富與王者埒取天下通行之利而為私有之財猗頓者壟斷之賤也豪民且専鹽利以富其家則上之征利亦無怪矣豈非啓公上之𣙜禁者乎𣙜鹽者無怪也鄭當時何人乃逢武帝之欲推轂齊之大煮鹽者用事漢朝而𣙜鹽之法始密鄭當時者其蟊賊之臣乎人主之心自此蟊賊寧非鄭當時之罪耶且以成周之鹽政言之鹽人一官掌之不過奄如官奴而已至漢大司馬屬官有幹官有兩長丞有水衡都尉有均輸官皆主鹽事以至郡國鹽官有三十九雁門沃陽有長丞地理志其法既密則官必繁也嗚呼周以鹽用而供邦事自賔祭膳羞之外則不敢以一毫取之民漢以鹽利而供邦財自公上𣙜禁之外則不肯以一孔遺之民方且𣙜鹽之不足而又𣙜鐵𣙜鐵不足而又𣙜茶鹽鐵之𣙜茶鹽之𣙜自漢至唐法日密矣儒者不排其非而反取成周山澤之禁以佐其説豈不惑哉屯鹽議一嘉靖十三年二月內户部題該户科都給事中管懷理等題為議處邉儲事臣等竊惟大同之亂特彈丸之區爾動調兵馬徴發錢糧前後未及五月用銀百萬有竒軍門尤且每每告急惟恐糧餉不繼所以然者何哉亦失於無備故耳國初之給邊也有屯田之嵗入有邊引之飛挽有近省供邉之稅銀是以嵗有餘積邊儲富厚而威震四裔今者屯田不興鹽法大壞又加以連嵗災傷百姓救死不贍此所以邊倉空虛日甚一日積至於今敝壞已極若不從宜痛加裁處臣恐將來益不能振起矣然何謂屯田不興國初邊威強盛敵尚衰微出則防邊歸則治農家有田儲時無空隙故公私兩利取用不竭今則邊備廢弛敵馬充斥勢不能耕治一也軍士貧乏牛具種子不能備辦力不能耕治二也逃亡數多空野千里無人耕治三也黃河之套盡為賊有賊反居內田顧居外堅壁清野無敢耕治四也有此四弊而屯田俱為拋荒草蕩矣管屯田官員復不省憂乃坐名分𣲖履畝徴取而曰我能催督屯糧是知屯軍無粒米之獲而空賦取盈之稅奈之何軍士不逃竄亡匿乎臣等聞邊軍月糧既已扣減及至關支又以屯糧未完盡行坐除是無其利而反有其害矣屯田何自而興乎何謂鹽法壞國初設立鹽法専為邊儲故使之入粟歸邊下場支鹽官無科取商獲重利不費轉輸而邊倉積實謂之飛挽今則開中不時米價湧貴而易糴之難勢豪大家賣窩買窩而報中之難官司科罰吏胥侵漁而輸納之難定價太髙反過本值而取利之難及至給鹽下場又被官吏留難棍徒轄害挨單守支動以數年而支掣之難至於行鹽地方私鹽盛行民皆買賤官鹽又復壅滯而發賣之難有此六難故商人有傾家蕩産妻子不相見者矣商人離親戚棄墳墓備資本出於千里之外者非以重義也惟以計生息之利以資身家耳今求利未得而害反隨之欲望正課之行豈可得乎正課不行私鹽自盛議者不得已而權為區處乃設餘鹽之例如兩淮報中正鹽一引許𢃄餘鹽二引正鹽在邊納粟餘鹽在場納價故商人猶肯一一報中甘受正鹽之害以趨餘鹽之利殊不知餘鹽一行雖每嵗昜銀百數十萬兩而無益邊儲則猶徒也鹽法何自而行乎二者俱不能行司邊計者無術以處此臣等以為今當懲往事之弊為經久之圖不可狃目前之安而不動深長之慮也臣等今欲通鹽法須先處餘鹽必多減正價大抵正鹽賤則私販自息私販息則正鹽自行此不易之定論也今雖不可知而祖宗時八分二斗之制宜斟酌開中每正鹽一引定價五錢或四錢餘鹽一引定價二錢五分或二錢俱令在鹽照時上納粟米料豆草束每年差給事中或御史一員赴鹽趂時開中禁革一應買窩占中等弊正鹽給與引目餘鹽給與小票正鹽下場支給餘鹽徑自收買正鹽一引許中餘鹽三四引或五六引務以盡收竈丁餘鹽為止若或未盡再添一二倍亦無不可如此正鹽價輕既有以利乎商人餘鹽盡收又有以利乎貧竈國課不集而自足私鹽不禁而自止邊儲日見富厚糧餉日見充積可不動內帑而用無不裕矣至於屯田之制即古人寓兵於農之意無事則耕有事則戰自食其力不費而可足矣我皇上既設風憲重臣以専理其事又設管屯田諸職以分任其責其用意可謂詳且周矣奉行至今猶不見甚興何哉蓋以事鎡基則賢者可因以成事若法已敗壞非大聖人綱維而振起之則謀未成而議者已起於後臣等訪聞沿邊荒蕪之地十常八九而見在耕種者惟近腹裏一二耳今若不大加整頓茍且補塞終無益於事臣等愚以為合無行令差去招募給事中主事會同各邉總制撫按等官拘取地方耆老人等親履邊境相度形勢某處地方肥饒形勢可依相應築為城堡以便耕守某處地方廣濶可以出沒相應修濬壕塹以為捍禦或舊有垣墻而但加修整或原無基址而創為建置務要堅城可憑互相倚制畫圖帖説具以奏聞大者或設為衛小者或立為所或將招募新軍或用附近舊卒俯順人情量移新城住種乞下廷臣議處等因本部查得節該巡鹽御史戴金題準事例每鹽二百斤準南納銀八錢準北納銀六錢即以官價之額定為平市之法仍要嚴禁各商勿令縱打大包餘鹽雖多無過正鹽斤數開中有商若無資本或時難收買不願附帶者聽從其便其所入餘銀隨時盈縮不必拘定一例不許法外抑勒及於未稱掣未發賣之先亦不許令稱貸預納以足百萬兩之數多者多解少者少解多不為功少不為嫌倘天時人事偶爾相值而餘銀之利或溢出百萬兩之外亦只以常處可也淮浙正鹽定價太髙亦合斟酌淮鹽每引減去一錢浙鹽每引減去五分至於甘肅地方孤逺險阻比之各邊尤甚若與各邊定價相同商亦難從合將甘肅淮鹽量減一錢五分浙鹽量減一錢本鎮止用開中浙鹽不必搭配别處浙鹽開中别處邊鎮亦不許搭配商自樂趨其長蘆鹽價原定二錢山東原價定一錢五分似難增減仍令照舊配之蓋二處行鹽地方既狹而私鹽又復盛行縱減其價亦恐無報中者故仍舊時搭配非得巳也除甘肅不搭山東長蘆外其餘各邊開中淮鹽搭以長蘆則不必更搭山東搭以山東亦不必更搭長蘆無使一人奔走三路各邊𣲖去淮鹽仍令上納本色折鹽本折中平長蘆山東惟令折銀上納如遇年豐願收本色聽從其便欽此俱今通行去後今該前因為照屯田鹽謂邊儲急務國初之時民糧不敢後時徴解兼以屯政修舉而邊課疏通以故邊儲充實不致缺乏且祖宗開立各邉以陕西全省八府供延寧甘肅以山西三府供宣大以山東永平供遼東而又以河南北直𨽻等處麥折布匹等項并京運年例銀兩一嵗所入自彀一嵗支用歷觀天順成化𢎞治年間以來徴運不乏未聞缺用而當時主兵之費鹽法不與焉蓋鹽者飛挽之法非有緊急聲息不開中引鹽誠恐取辦於倉卒非常使主兵之用近年以來各處天時之荒熟雖有不一而官司之職業實因廢弛視邊務為踈逺以停免為有功有冒災而一槩停止者有豐年不行帶徴者因循沮格不可盡言遂至邊儲缺乏奏討不息本部節經議擬至於開中引鹽以補嵗用發內帑以抵民糧不過因時救弊權宜目前實非祖宗遺謀本意國家經久之計也且如宣府嵗支糧草料豆共該銀九十餘萬兩除年例河東鹽價十六萬兩外山東河南山西北直𨽻民運該銀七十萬兩本處屯糧一十二萬石是民運居十之七屯糧止十之一各鹽惟遼東屯糧二十五萬例算折銀止該銀五萬兩并大同延寧甘肅大約民運常十之七八而屯糧常十之一二此國初山東到今體例舊額且以陜西三邊言之嘉靖八年至十一年卒皆年荒嘉靖九年四十七萬兩嘉靖十年五十六萬兩嘉靖十一年臣等任事一年發一百一十九萬兩嘉靖十二年榖稍熟已經題準見徴一年帶徴一年尚猶發銀四十二萬兩有餘其餘邊鎮莫不皆然而開中鹽銀此外又各邊開鹽或召買本色或上納折銀斗頭難以預料時價不可執定至於年嵗豐歉道路險易悉不可知如嘉靖十年𣲖中遼東兩淮引鹽經今四年猶未報納非因别故值以年荒米貴然也嘉靖十二年各邊奏討之疏內有曰乞發太倉銀九十萬兩者有曰四五十萬兩者不下六七次臣等只得酌量參錯或稽考邊儲文簿或詢訪盈縮緩急量為奏發以免誤事若不酌量多少一槩漫發則一旦盡發太倉之銀亦不足所討臣等雖欲樽節拘執而勢亦有不能已者臣等駑鈍之才踈淺之見誠有負經國逺圖罪莫能逃也前項餘鹽銀兩雖稱嵗有百萬或七八十萬其實未嘗盡解太倉查得去年工部奏準動支前項餘鹽銀兩一為織造一為修河共用二十五萬兩本部雖以别項處補實皆餘鹽之數况又備之以修邊處之以給軍士衣鞋收買物料那進內庫等項是餘鹽之銀有限費用不可枚舉或未解已行奏討或解到隨即轉發太倉安有見收餘鹽銀兩而久處不動者哉各處引鹽浙江山東長蘆其利甚微商不願中所賴者淮鹽七十萬引該銀三十餘萬兩加以存積不可盡開一年之例是三十萬兩尤不得而盡用也餘鹽之銀只在兩淮運司他處絶無解部况正課拖欠數多而各處鹽價淮浙二鹽已減一錢五分見今各邉淮鹽一引止銀五錢甘肅四錢五分正與都給事管懷理所見相同若餘鹽盡開各邊須要增添引目而納價多少亦須商人情願方為便益等因復奉欽依行移各處巡撫都御史及管屯管糧守巡等官拘取地方屯頭馬户耆老人等親履邊境相度形勢博訪人情某處可築為城堡以便耕守某處可修濬壕塹以為捍禦或舊有垣墻者但加修整或原無基址者創為建置某處可設為衛某處可立為所或用招募新軍或用附近舊卒俯順人情量移新城畫圖帖説具奏以聞務使各邊無不耕之田屯種復祖宗之舊及咨各都察院轉行兩淮并各處巡鹽御史會同巡撫都御史及督同運司等官拘集年老知音商人耆老人等查照先今行勘鹽法查各處運司有無餘鹽數目多少明白要見餘鹽課銀就彼掣賣與盡行開邊商人有無樂從江南江北見定銀兩應否量行增減餘鹽銀兩徑解各邊運司是否便益若欲盡行開邉價值尤須勘處停當毋使日後已行開邉復有阻滯致使臨時有誤邊儲卒難措手或倍開餘鹽其數幾倍或另照引其引幾何務使官商兩便鹽課無虧餘銀既盡解邊或遇各衙門奏準支用作何抵補餘鹽既稱有壞正課應否盡行裁革前項二事承委官員逐一勘處參酌輿論揆度時宜務求合於人情宜於土俗不拘於目前而經久可行不惑於浮議而事體歸一庶乎國計不窮邊儲有賴明白具奏以憑會議參酌施行至於邊備利弊之由兵馬強弱之故屯田興廢鹽法通塞一應實邊禦備長䇿事干本部及移咨兵部各通行在廷羣臣九卿科道等官并見在任及生長邊方等項大小人員但有曉知前項事務許各陳所見徑自奏聞以備采擇見今大同地方傷殘之餘陕西經賊侵擾之後遼東災傷各處拖欠嘉靖十年以後各邊糧料布草等項并應該見徴錢糧本部通行各處撫按官先將布政司府州縣掌印管糧官俸糧截日住支上緊徴收解運以濟目前急用務俾完解方許關支屯鹽議屯田何所昉乎自漢文帝從朝錯言徙民實塞下而屯耕邊塞始於是矣自兹以後雖沿革不同求其規畫周詳者其漢之充國乎乃若京師屯田李元紘則有廢業闕賦之陳澧州屯田嚴郢則有利害不便之請若河北屯田有變生不測之論者非陳恕言於端拱之時乎夫屯田一也充國行之坐困先零而後世反以為害是豈法之不宜於今歟邊地逺近異勢調發與屯戍苦樂異情安舊與創新嫌隙易起故三臣之奏及之因此而遂謂屯田之不可行也不猶見刖而廢履者耶鹽䇲何所昉乎自管仲言海王之國謹正鹽䇲而征鹽利國自此始矣自是以來興廢不一其綜理周密者其唐之劉晏乎乃若請官鬻鹽韓愈則有鹽怨已多之議蜀井增鹽王堯臣則有牟利重困之奏至捕鬻私鹽而有蜂起為盜之慮者非張詠止庸繩之請乎夫鹽䇲一也劉晏行之嵗課增六百萬緍而後世反有損於民豈法之不宜於後歟蓋利歸於官則民不便澤竭於逺則力不堪禁嚴於斂則亂易生故三臣之言及之茍因此而遂指鹽之不可行也不猶因饐而廢食者耶歷觀前代屯營之田或以兵或以民各分兵置司惟我朝於各衛所寬曠之土分兵以立屯堡俾且耕且守於守禦之中收耕穫之利其視古之分兵置司者為獨得矣前代鬻鹽之制或在官或在民惟我朝於天下産鹽之處設轉運司者六提舉司者七鹽課各有定額行鹽各有地方召商開中稅糧以鹽償之法最善矣奈何歷時既久弊蠧漸生屯政日荒鹽法日廢而邉廷有米珠薪桂之謡矣邇者皇上集議選兵措餉以靖邉疆時遣風憲大臣以督理之行之未幾仍復報罷要之屯鹽之政祖宗成法具備即補偏救弊在典守者任之有餘而分遣大臣將何為耶故始而采議即行仰見皇上從善之公繼而漸次報罷尤見皇上睿斷之獨自今觀之古今言屯政之善無如充國但充國屯營之地乃取之於羌人而今則取之內地是主客之情異也充國屯營之勢乃我侵敵而為屯以困之今則敵侵我而為屯以守之矣是攻守之勢異也充國屯營之兵不過萬人其期不過踰嵗今則九邉蟻聚嵗嵗為戍矣是衆寡久近之辨又異也不論主客之情攻守之機衆寡久近之辨槩謂今之理屯者無如充國可乎嘗考輿地圖內開宣府一鎮額設官軍一十二萬六千三百餘名屯糧六萬二千三百餘石即使盡數完徴僅支半月而餘所闕者將盡責之屯乎而主客行糧出於常調之外者又將何以應之乎説者謂屯田固不足盡供邉儲此外豈無可以開墾以禆軍食者但監司必委之有司有司必假之胥里縱有開報不過揑文增科造册銷繳而已以後按册追徴吾知其始而賠繼而纍又繼而逃將并其原額而失此屯田之所以益廢也為今之計亦惟嚴兼併之法正侵隱之罪催逋負之科使天下各衛所之屯不失舊額則其所禆於兵食者不少矣又何必借開墾之名日事講求以滋科擾之害也哉古今言鹽䇲之善者無如劉晏但晏始至鹽利嵗才四十萬增至六百萬緍隨時多寡取之今則嵗額各有定數恐增之而勢難繼也晏令亭户糶商人縱其所之今則行鹽各有地方恐縱之而弊難稽也晏制萬物低昻所理者不獨鹽之一事今轉運司鹽課之外不敢再及他課恐侵之而職掌亂也不察課之有數行之有方職之有定而盡指今之理鹽者不如晏可乎嘗考會典借備事例內開獨石馬營龍門所雲州四邉倉開中淮浙長蘆河東官鹽九十五萬二千三百二十餘引十二年大同等處開中長蘆官鹽十萬引河東官鹽二十萬引兩鎮官軍不啻二十餘萬即使前引盡數報中僅支兩月而餘所闕者盡責之鹽乎而兩鎮之外原未報有開中者又將何以給之乎説者謂鹽法固不足盡供邉計此外豈無餘鹽可以查核以益軍食者但地廣而勢不能遍條繁而力不能及縱有清理不過分析地方完銷勘合而已因而據題為例吾知其始而信繼而疑又繼而相顧指摘而盡斥以為非矣此鹽䇲之所以益廢也為今之計亦惟杜窩賣之姦懲老引之贋絶奏討之欺使天下各運使之鹽不失舊額則其有益於軍食者不少矣又奚必假餘鹽之名多立條目以啓分更之端也哉屯田鹽法總論夫屯田鹽法之始興也凡以厚農也蠻夷猾夏冦賊姦宄自唐虞不能免而秦漢盛時邉郡轉輸之費或三十鍾而致一石生民之病不亦大可哀耶鹽之領於官也以杜兼併之源也其通之於商也以布上下之利也其中之於邉也以省任載之煩也山陕之民僦牛車具徒伍奔走顛踣於風雪山谷之中而無救於待哺之期會平時嵗豐室家不相保一有兵荒之警上厪宵旰之憂亟發內帑以濟之乃至無從得粟則知實邉貴豫濟變貴急而飛挽之神速莫過於鹽糧今鎮守之兵遍天下屯田亦遍天下諸軍更畨休佚卒以十分之三服農畝之事二人受田四十畝嵗入十二石足供一兵而自食其餘餘丁則亦以差受田而嵗課其入立法之初以為承平日久則餘丁益多而地利益盡充拓得人則增屯益廣而嵗入益增如是而兵無加額焉行之百年舉天下之屯糧足以廪天下之兵而民糧之上供者惟上之所用之耳乃今升斗之給盡出民力一兵以上悉仰縣官然後知屯田之不可以巳也漢文帝所以能賜民田租者徒以募民入粟實邉次實郡縣而京自有餘耳然而酬民以爵啓鬻官之漸孰若開中之法酬商以鹽使民得食味商得取贏兩利而無害乎唐府兵之所以稱近古者徒以兵皆土著而不廪於官也然而籍農為兵或至業務交廢孰若屯田之法兵以餘力治農服勤警惰自食其力兩利而無害乎二法立而軍國無餘論豈不誠然乎夫不知立法之原則不知行法之委不知立法之利則不知廢法之害夫鹽以竈為本以商為用二者皆優恤所當加也今郡縣無勸農之政則鹽司豈復有恤竈之實哉商人罰賑而費出無經草蕩之弗詰流亡之不復則給散亦豈能均適哉姑如河東顆鹽幾年而遇風結花倍常乃亦拘常額不得撈辦是猶粒米狼戾而封其倉庾俾之棄於塗泥之中曽不得為遺秉滯穗其於勸相阜康之道從可知矣國初征商甚薄而酬估甚厚是以商人樂趨邉而無變計以其家衆占間田稍役屬其民而耕之以待國家開中之事故私積亦富而粟價亦平邇者粟貴徴粟粟賤徴銀重以勸借之科罰困以搭配之守支轉展折閲業荒衆散一有控訴則有司且議姦商罔利罪焉商固四民之一而職利之趨也將使皇皇求仁義乎商不近利是農不望秋也且買窩者姦商也而賣窩者誰耶不誅怯將而誅怯兵兵益不精不誅賄吏而誅賄民賄益不止法弊而售姦良商亦姦姦懲一革姦商亦良人才與時姦良而况商乎别姦恤良無以掊克之政一施之則善矣若夫括餘鹽之利則內帑雖實而邉郡增運糴之煩加引目之數則商利益微而勤竈失補恤之惠若是者無乃論列愈詳而鹽法愈不通耶屯政之不綜也始傷於嚴而卒壞於寬也因習之故非一日矣自父母侵而有之而子孫固以為世業也雖左驗甚明至死不心服若是則雖有必行之政安得而加哉富豪乾沒而告詰橫行雖明者或不能辨則仁者固不欲棘之也畨休之法不行兵久駐屯依憑威虐兵實民虛田屯相逺形禁勢格兵不得田民亦病兵當事者徒見其相戕而不見其相濟則謂屯田可罷清查可已殊不知天下無不弊之法而有善通變之人宜早為之科制年以久近定限屯以逺近遞遷見存之田履畝而正界服農之兵間嵗而代更則亦庶乎其可也張橫渠議井田朱考亭定經界今之核實屯田不猶差易於彼乎新屯之增置立法之初固將有待於後來觀其分數有常而置屯無限則可知矣其在南方則凡湖山斥鹵之可墾者淫祠毁寺之可收者姦豪欺隱之可沒入者宜盡以為屯田大江之北至於畿甸蓋有不可勝用者焉不然則近臣貴戚競請莊田於何取之逺至於諸邉又有不可勝用者焉不然則趙充國田金城韓重華田振武於何取之且今兵籍尚虛患人力之不足不患增屯之無所田既增兵亦可實姑緩其舊而新是圖不亦可乎夫科制不早定則將與見存之額而并失新屯不增置則是棄可興之利而他求若是無乃清查愈密而屯政愈不修耶屯鹽總論善經國者不與民爭利不與民爭利則藏富於國即藏富於民也善養兵者能以兵自養能以兵自養則足食於邉即強兵於邉也何也九邉遼逺轉輸甚艱况千里餽糧士有飢色而轉東南之粟以養西北之兵河漕勞費在萬里之外哉此屯田在所當議乃以兵自養之道也然邉兵之屯牛種皆無所資不得不仰給於鹽商而重其輸邉之例雖鹽商輸邉得利甚厚然利之所在人爭趨之不惟屯兵牛種有所資藉而秋成谷秸皆有所售開墾愈多收成必富邉方之粟賤矣此鹽法在所當議而不與民爭利非藏富於民之道乎信乎強兵莫急於屯田屯田莫要於中鹽屯鹽利弊相須不得不亟講也以國朝言之鹽有常股有存積常股者商人先納銀粟於邉乃給引守場候支是也至有翁納資而孫始收息者矣存積者積鹽在場遇邉糧急缺則倍價開中越次放支是也居貨罔利王道固如是哉所以洪武正統間官給鹽直甚貴民得利甚多鹽法畫一自成化以來鹽直日輕私販日衆姦商影射或權要奏討法遂大壞况賣窩買窩之弊牢不可革商人一身復以長蘆兩浙兼搭配支勞費無窮商亦困矣噫人知鹽法壞而商人困矣孰知困商乃以困邉儲哉蓋國初供邉而以鹽利其制鹽利也鹽一引輸邉粟二斗五升故富商大賈悉於三邉自出財力自招逰民自墾邉地自藝穀粟自立堡伍所以邉兵亦藉商財春耕借為牛種之費秋成即為售還之資千里荆榛盡成沃壤成化初年甘肅寧夏粟一石易銀二錢邉方粟無甚貴之時以其儲蓄之富也夫商以二斗五升之粟支鹽一引是以銀五分得鹽一引商之利誠過厚矣使商人輸銀京師則鹽一引課銀四錢二分而厚利不在於官乎會計聚斂之徒見小忘大此鹽法所由更也惟商不輸邉則近邉米豆無有貿遷之者而價遂騰湧且邉兵耕種無所資助屯田亦從而廢遂至稻米一石直銀五兩皆由鹽法之壞致之也即此觀之可見屯田之興不自興也鹽商種粟於邉每引止二斗五升惟其估值之厚是以不憚邉方之逺招募開墾野無曠土地無遺利而邉粟常賤故屯兵始焉賴商人稱貸以便牛種之需既焉因商人上納以收貿粟之利農商兩便屯田所以日廣也屯田之廢不自廢也鹽商納銀於部每引加至四錢八分則其利薄矣利不在邉不免徹業而歸邉地遂日荒蕪且屯兵春焉耕種無其力秋焉收穫無所售農商交困屯田所以日廢也惟屯田之興也穀粟積於西北則東南漕運固可以緩而屯一廢焉商皆輸銀户部送太倉分送各邉孰若商人自輸之尤便乎為今之計安得修復輸邉舊法令商人入粟各邉即量其逺近以隆殺價值務使利厚人趨茍有能於並邉開墾者即給為巳業永不起科更安撫招集時加存恤庶逺人如歸屯聚益衆於此又嚴其法禁凡粟貴徴粟粟賤徴銀鹽賤守支鹽貴則發存積勢豪奏討侵奪已熟之田權貴囑託發賣餘鹽之例一切預為之防焉吾知國家不與小民爭利雖曰利在商人而各邉粟多價賤國之利也大矣况寓兵於農兵皆自食其力墾田浚渠各有善制亦已寓乎防守之術焉安邉足國之道宜無有善於此者圖書編卷九十一
