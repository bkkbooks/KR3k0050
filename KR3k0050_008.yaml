body:
  text: 圖書編卷八明章潢撰諸儒圖書總敘天地大德曰生不可以象求也一圖一書已多矣况先天圖後天圖造化之散見於卦爻者已畢露也故云易者象也象也者象此者也善窺天地之大生者求諸圖書卦爻有餘裕矣何為自圖書易卦之外如濓溪太極圖有發前聖所未發彼焦延壽京房揚雄以及諸儒所畫圖象紛紛不一抑亦可與圖書易卦並傳乎蓋生生之謂易而既謂之生生則其變易無窮象亦無窮盡也諸儒之圖書固未可齊肩古聖要亦各攄其一得之見以發乎生生之緒餘其有功於斯道以開發後人亦不淺矣古先聖賢採善及於芻蕘况諸儒論者各自成一家言槩律以周易而盡屛棄之可乎哉至於所見或偏焉而未全或駁焉而未純又在中正立極者自得而自裁之也故併録其梗槩云易林無此圖乃後人所增入者其序用後天六十四卦而去坎離震兊四正以立二至二分雙峯胡氏曰費直作易林序引孟康曰分卦直日之法一爻主一日六十四卦為三百六十日餘四卦震兊離坎為方伯監司之官所以用震離坎兊者是二至二分用事之日又是四時各專主之氣各卦主時其占法各以其日觀其善惡也又按項平庵曰焦氏卦法自乾至未濟並依易書本序以一卦直一日乾直甲子坤直乙丑至未濟直癸亥乃盡六十日而四正卦則直二分二至之日坎直冬至離直夏至震春分兊秋分不在六十卦輪直之數此即京房六十卦氣之法但京主六日七分此但主一日與費氏一爻直一日之説不同姑記此以俟參考按焦延壽時尚未有先天六十四卦之傳説易者多用後天之卦焦氏宗之故其所去震離兊坎乃後天八卦之四正也項平庵謂起乾坤以至未濟者是矣但曰一卦直一日自乾直甲子以至未濟直癸亥則六周為三百六十日而氣餘五日四分日之一又當以甲子起之非周一歲之義也故卦氣之説當以費直序一爻主一日卦主三百六十日者為是如此則每卦主六日而加七分氣盈之數在其中矣此其法所以至於邵子莫之能改也焦氏易林卦變辭略乾道陟多阪胡言連蹇譯􅂒且聾莫使道通請謁不行求事無功之坤招殃來螫害我邦國病傷手足不得安息之屯陽孤亢極多所恨惑車傾蓋亡身常憂惶乃得其願雌雄相從之蒙鵠鵴鳲鳩專一無尤君子是則長受嘉福之需目瞤足動喜如其願舉家蒙寵右以乾為主而坤屯蒙需皆乾之變也坤不風不雨白日皎皎宜出驅馳大道通利之乾谷風布氣萬物出生萌庶長養華葉荗盛之屯蒼龍單獨與石相觸摧折兩角室家不足之蒙城上有馬自名破家招呼鴆毒為國患災之需霜降閉戶蟄蟲隱處不見日月與死為伍右以坤為主而乾屯蒙需皆其變也既濟玄兔捐掌與足相視謹訊詰問注情自似死誣難告口為身禍之乾遊駒石門騄耳安全受福西鄰歸隱玉泉之坤陽春草生萬物風興君子所居禍災不到之屯人無法緩除才出雄走羊驚不失其家之蒙太山上奔變見太微陳吾廢忽作為禍患右以既濟為主而乾坤屯蒙皆其變也未濟志慢未習單酒糗脯數至神前欲求所願反得大患之乾旦生夕死名曰嬰鬼不可得視之坤大步上車南至喜家送狐裘與福喜來之屯西多小星三五在東早夜晨行勞苦無功之蒙北陸藏氷君子心悲困於粒食鬼驚我門右以未濟為主而乾坤屯蒙皆其變也按文王卦序本有六十四而易林於每卦又有六十四變各以已意别為一詩共詩四千九十六首以代占辭而文王周孔之辭並不復用今止舉乾坤既未濟四卦及其變各四卦摘録其辭以見大略其法以揲蓍得卦而日以其辭占然亦兼卦氣而用之故費直曰其占法各以其日觀其善惡云易林揲法即朱子本義所載筮儀也易緯類是謀曰冬至日在坎春分日在震夏至日在離秋分日在兌四正之卦卦有六爻又主一歲餘六十卦主六日七分八十分日之七歲十二月三百六十五日四分日之一六十而一周蓋自焦氏已然矣京揚卦氣直日圖總敘易卦之位震東離南兊西坎北者為一説十二辟卦分屬十二辰者為一説乃焦延壽京房為卦氣直日之法合二説而一之既以八卦之震離兊坎二十四爻直四時又以十二辟卦直十二月且分四十八卦為公侯卿大夫而六日七分之説生焉若以八卦為主則十二卦之乾不當為己之辟坤不當為亥之辟艮不當侯於申酉巽不當侯於戌亥若以十二卦為主則八卦之乾不當在西北坤不當在西南艮不當在東北巽不當在東南彼此二説互相矛盾且其分四十卦為公侯卿大夫以附於十二辟卦初無法象不待論其減去四象卦二十四爻而後可以見其失也揚雄太玄次第全用焦法其八十一首蓋亦去其震離兌坎而但擬其六十卦耳諸家於八十一首多有作擬震離坎兌者許翰始正其誤至立踦嬴二贊則止以七百二十九贊又不足乎六十卦六日七分之數而加益之恐不可反據其説以正焦氏之失也內一運列四正卦二十四爻以司一歲二十四氣也百中一運除四正卦外以六十卦分公辟侯大夫卿九六十爻以司一歲三百六十五日四分日之一也其卦次第與大玄卦氣次第同外一運乂取中運內十二辟卦凡七十二爻以司一歲七十二候也京房直日之説以坎離震兊各主一方以六十卦分主一歲凡三百六十五日四分之一卦得六日七分其為算固周且悉矣然坎離震兌與乾坤諸卦一也坎離震兌主二十四氣而乾坤諸卦主六日七分何耶合六十卦為日三百六十五四分之一附之一歲則有餘而加之閠則不足若之何其主一歲耶一歲之中贏縮餘閠初無常時而卦之所直則有定日又烏能候溫寒耶且使夫六十四卦所配之日皆惟我所分則何獨六日七分而後可吾將合六十四卦而以一歲三百五十四日均之則一卦直五日四十二分五釐亦可也吾將損四正而用六十卦以當三百五十四日則卦直五日七十二分亦可也不然惟用八卦以當三百五十四日則卦直四十四日二十分又誰曰不可凡去取多寡惟我之所制則人皆可為矣何取乎經此房之非也京房揚雄皆以卦配氣候謂之卦氣同是卦也同是氣候也宜其所配有不可得而異者然房以六十卦配之三百六十五日四分之一而雄則以六十四卦配之去取之異何也房以兊應大雪而雄以坎房以兊應秋分而雄以震節候之異何也房以坎離震兊各主日九十而雄於四卦卦得四日有半房以六十卦主六日七分而雄亦以四日有半處之多寡之異何也雄之太玄以二贊配一晝一夜凡一首九贊為四日有半有以一首準一卦則得四日半矣而又以二首準一卦則是卦又得九日也雄之以卦配日又自為異如此何也茍卦為有用則隂陽之體有非人所能移者而增損遷變惟二子之所私何耶自達者觀之其為謬妄氷炭不言冷熱可知也蓋亦求二子之所同者惟以卦氣起於中孚則一耳然卦氣不自他卦始而獨起於中孚不知何義復以一陽初生謂之冬至之候猶有一説也屯以一陽震動於坎離之中謂之冬至之候猶有説也至於中孚以兊巽為卦而謂之冬至則無一説而可太玄以中準中孚其辭曰陽氣潛萌於黃宫信無不在其中蓋謂中孚者信也夫以中孚為信陽氣必應於此則是取其義而不取其氣也不取其氣而取其孚信之義則謂之起於旡妄可也何必中孚雄之太玄乃亦效之以首擬卦豈以首與卦皆主是氣而後擬之也以中擬中孚以養擬頥以強擬乾以視擬觀以止擬艮以難擬蹇不過以其字之同義而取之是知其所謂起中孚者亦取其信也其於所𨽻之節氣何所取哉使雄獨以太初厯於中起於冬至起於牛之一度則猶可也而反以為起中孚嘗見宋咸著論言卦氣起中孚非聖人之旨而朱氏難咸曰中孚十一月之卦也以歲言之陽起於冬至以厯言之日始於牽牛以日言之晝始於夜半以人言之慮始於心思咸謂何不起於他卦真不知者也切謂朱氏言人之慮始於心思故起於中孚使中孚取心思之義則起於咸可也何必起於中孚而後可朱氏又言歲始於冬至厯始於牽牛日始於夜半故必始於十一月夫律厯始於十一月是矣而以中孚為十一月卦為何義不此之解而欲以折咸殆不可也使咸之説得行房與雄之言皆可寢矣揚雄太玄方州部家八十一首圖玄圖曰一玄都覆三方方同九州枝載庶部分正羣家玄始三方方有三州州有三部部有三家皆一生三故有三方九州二十七部八十一家也太玄以八十一首繫之於方部州家四畫之下於象與義初無所取特不過以四畫分之有八十一樣借以釋八十一首之名又有七百二十九贊散之於八十一首之下每首九贊皆是初一次二次三次四次五次六次七次八上九首首一樣更無分别而七百二十九贊亦與八十一首象與義皆無相關以八十一首名強附於四畫之下以七百二十九贊又強附於八十一首之下然以中之初一作冬至第二日積起至養之上九而一歲節氣三百六十四日半一周又加踦贏二贊以足日之餘分而起閠又自冬至一日繫之以牽牛之星第一度日一日躔星一度至三百六十四日半而斗星二十五度半亦周又以踦贏二贊繫斗星餘度而一歲周天之日與星湊合恰好太玄之要法全在於此其實自為厯法一書亦自可傳何必規規於易也太玄首贊辭略一方一州一部一家中陽氣潛萌於黃宫信無不在其中首測曰中擬中孚天元陽家一水下日在牽牛初初一崑崙旁薄幽測曰昆侖旁薄思諸貞也次二神戰於中首尾信可以為庸測曰龍戰於中見其造也次四痺虗無因大受性命否測曰痺虗無因不能大受也次五日正於天利以其辰作主測曰日正於天貴當位也次六月闕其博不知開明於西測曰月闕其博明始退也次七酋酋大鬼頥水包貞測曰酋酋之包任臣則也次八黃不黃覆秋常測曰黃不黃失中德也上九巔靈氣形反測曰巔靈之反時不克也右中太玄第一首也為陽氣之始二方二州二部二家應陽氣極于上隂信萌于下上下相應首測曰應擬咸地元陽家五土中日在井二十九初一六幹羅如五枝離如測曰六幹羅如附離君也次二上厯施之下律和之非則否測曰上施下和匪其肯也次三一從一橫天網䍚䍚測曰一從一橫經緯陳也次四援我䍔罟絓羅于舒至測曰援我䍔罟不能以仁也次五龍翰于天貞栗其麟測曰龍翰之栗極懼墜也次六熾承于天水萌于地測曰承天萌地陽始退次七日強其衰應蕃貞測曰日強其衰惡敗類也次八陽極徵隂不移日而應測曰極陽徴隂應其法也上九元離之極不可曷止也右應太玄第四十一首也為隂陽之中三方三州三部三家養隂弸于野陽蓲萬物赤之于下首測曰養擬頥人元陽家九金上下日在斗二十二初一藏心于淵美厥靈根測曰藏心于淵神不外也次二墨養邪元涵否貞測曰墨養邪中心敗也次三糞以肥丘育厥根荄測曰糞以肥丘中光大也次四燕食扁扁其心􅩒􅩒利用征賈測曰燕食扁扁志在賴也次五黃心在腹白骨生肉孚德不復測曰黃心在腹上得天也次六次次一日三餼祗牛之兆肥不利測曰次次之餼肥無身也次七小子牽象婦人徽猛君子養病測曰牽象養病不相因也次八鯁不脫毒疾發鬼上壟測曰鯁疾之發歸于墳也上九星如歲如復繼之初測曰星如歲如終始養也踦贊一凍登赤天晏入元泉測曰凍登赤天隂作首也嬴贊二一虗一嬴踦竒所生測曰虗嬴踦竒禪無已也右養太玄第八十一首也為隂陽之終故繫踦嬴二贊于七百二十九贊之末舉此三首義可槩見矣八十一首太玄之卦名也不曰卦而曰首以别于易卦也玄以首名凖易若訓字然如蒙之為童隨之為從晉之為進解之為釋訟之為爭革之為更師之為衆比之為親乾之為強姤之為遇豐之為大損之為減萃之為聚觀之為視遁之為逃益之為增恆之為常賁之為飾困之為窮艮之為止蹇之為難頥之為養剝之為割暌之為戻升之為上豫之為樂夬之為斷大有為盛鼎之為竈渙之為文履之為禮明夷為晦大畜為積大過為失小過為差之類只如解説易卦之名而已至于重二十一卦以配八十一首之數尤無意義首有九贊故一首之下列一二三四五六七八九位每贊直半日則九贊直四日半而為一首九贊當四日半而曰五日者以夜統于晝也晝夜相配則為一日矣故于初贊即言至八十一首之九贊當得三百六十四日半而曰三百六十五日以踦一之半日為夜併言于晝也又有嬴二半日之半為四分度之一則踦嬴二贊在八十一首之外矣夫揚雄所用固京房法也房去震離兌坎四正卦而用止六十卦故卦直六日七分雄雖去四正卦而重二十一卦為八十一卦則卦直四日半是雄雖用京法而亦以己意更改矣以雄之法推算亦合三百六十五日四分日之一但此六日七分之法牽強不整齊耳虗谷方氏謂太玄精于卦氣特以其所紀日星氣候比京稍詳而豈知增益易卦以私見強排乃朱子所謂工夫之拙者哉又一隂一陽者玄相錯之法也故陽首數竒而主陽謂之陽家隂首數偶而主隂謂之隂家至于八十一首交于初首則皆陽也所餘踦嬴二贊又附于末首之十末則皆以陽數為主而隂陽無相錯之義矣水火木金土者玄相禪之法也玄以九成數故以五居生成二數之中五土也一二三四生數居五之前六七八九成數居五之後然五行各自為序自九交初亦未見其有相禪之義也雄雖自謂凖易而不知易也夫易本以一隂一陽之交而成八卦自復而升以至于乾自姤而降以至于坤其流行之不已固其對待之不偏者也而雄則以一歲分而為三自子中至辰中為天元自辰中至申中為地元自申中至子中為人元而于易中隂陽消息之序則既亂矣蓋本好竒之見而非剛柔立本變通趨時之道也可以謂之知易乎雄為人深沉頗能思索故能略見天地之理而于卦氣之起中孚則曰陽氣潛萌于黃宫信無不在其中而其八十一首亦于一歲隂陽之氣因以立義焉故邵子稱之曰揚雄知厯法又知厯理其子伯溫遂曰揚子雲知易之本是亦即其所見之一斑而許之耳徒守靜虗不得其正故動必有咎歟雄之書宋時亦少有傳者故或者謂其用六十四卦不去震離兊坎四正卦與京法異而四正卦在六十四卦之中則又易置其位以為房以坎應大雪而雄以兊房以兊應秋分而雄以坎則許翰既已辨之矣卦氣起中孚揚雄太玄謂卦氣起中孚嘗思之不得其説宋儒且謂揚與焦宏京房皆偶以中孚起厯數于卦義全無當也嘗讀易中孚豚魚諸儒云豚頑魚冥本無知之物當至誠以感孚之且取感格鱷魚為證豫謂古今惟此一事差近之文王亦虗設此象耳雖遍求之不達其義久之因以江豚吹浪夜還風之語合而紬之繹之乃知豚魚即江豚也本兊澤中物而得風之性者澤物信風一出天然此所以利貞歟又數年因遍閲諸家有載正月鯊鰡至二月鯉至三月鱖至四月鰣至八月黃􅀈至九月蟹至仲冬豚魚至始知物至以其時而仲冬豚魚至即中孚豚魚之象也可見聖人于各卦爻取象皆時物之自然而然者揚雄中孚卦氣在古昔已然漢儒尚有所傳匪後人杜撰者比也緣觀雜説既通易象且識卦氣深自愧心思未徹覩聞淺鮮不能博窮物理何以窮經何以窺古人著作也後儒未悉其旨反訾議漢儒詎止兹一事為然哉太玄凖易太玄曰夫作者貴其有循而體自然也夫質幹在乎自然華藻在乎人事故玄聘取天下之合而聨之者也斯太玄之所由作歟今以其意求之聖人作易仰觀象于天俯觀法于地近取諸身逺取諸物以通神明之德以類萬物之情子雲作玄仰以觀乎象俯以視乎情察性知命原始見終律則成物厯則編時晝以好之夜以醜之斯凖其意一也以其用求之易將以指吉凶悔吝之途玄將以辨君臣父子夫婦之道斯凖其用二也易之數一生二二生四四生八八生十六十六生三十二三十二生六十四太玄之數一生三三生九九生二十七二十七生八十一斯凖其數三也易有貞悔六畫玄有方州部家四重易有彖玄有首易有爻玄有贊易有象玄有測易有文言玄有文辭易有繫辭玄有攡瑩圖告易有説卦玄有數易有序卦玄有衝易有雜卦玄有錯易有乾元亨利貞玄有罔直蒙酋冥及其定首之名從中至養皆擬從中孚至頥之卦而曾無踰越尺寸斯凖其體四也易之揲法大衍之數五十其用四十有九分二挂一揲四歸竒是為一營已則又然凡十二營而成爻七十二營而成卦玄之揲法天之策十有八地之策十有八地虗其三次配三猶大衍之五十虗一也扐一以卦中分其餘以三揲之并餘于扐一扐之後而數其餘七為一畫八為二畫九為三畫凡四度畫而成一首之位斯凖其揲五也易之占法一卦之內有初二三四五上之爻卦之既成然後觀其爻之變以定所占玄之占法一首之內有一二三四五六七八九之贊首有隂陽贊有晝夜旦占用經夕筮用緯所用之贊下為始次為中上為終故曰觀始中決從中終又雜星時數亂而觀之從多為休違多為咎此凖易之占六也然玄之于易也凖其數而法則殊凖其體而名則别凖其揲而變亦異凖其占而考亦違惟其所以明于天人之道察于民物之故以擷造化之幽玄以指趨避之向方者其致一焉非不可異不能異而已矣此太玄之大方也然嘗以是而定其論玄之形凖夫易而數凖夫厯非易也蓋自分卦直日而六日七分之説起于焦京矣太玄祖之而首起于中盡于行起于水水盡于金數起于下盡乎上上曰起牛宿一度盡斗宿三十二度月起于子盡于亥節起于冬至盡于大雪律中起于黃鍾盡于夾鍾然太玄以七百二十九贊積二萬一千二百四十四策為大積每二贊為一晝一夜七十二策為一日凡三百六十四日有半于是而不及周歲之數益之以踦嬴二贊以合歲之日而行律厯焉推自甲子至甲辰自甲辰至甲申還至甲子而冬至皆無餘分十九歲為章二十七章為會三會為統三統為元以盡玄之道班氏謂玄太初厯相應亦有顓頊厯焉此之謂也故曰玄凖厯凖易也非惟凖厯也又凖律律志曰太極元氣函三為一中也元始也行于十二辰始動于子參之于丑得三參之于寅得九又參之于卯得二十七又參之于辰得八十一是為九三之法玄之所聘取也故曰又凖律也然非獨玄也自漢以來論律厯者皆推而附之于易班氏律厯志稱自伏羲畫八卦由數起至黃帝作五聲十二律九六相生是也今推而致之大衍之數增也堯命羲和厯象日月星辰歲三百有六旬有六日以閠月定四時成歲是也今以大衍參天九數二十有五兩地十數三十而乘之增之也杜預曰厯者順天以求合非求合以驗天今以大衍算周天是求合以驗天也夫圖授于羲書發于禹律製于黃厯定于堯古之聖人各以事起而槩為求合雖有一二符契然所乖誤已十二矣或問孔子謂易當期之日何如曰聖人所謂揲四象時歸竒象閠乾坤竒當期曰象曰當適相應會之辭耳此乃觀易于既畫之妙而非謂易之所由作者也此其周天之數尚有餘贏而經言三百六十止舉其槩耳豈適一一密合哉若太玄者為法以象天象之不合不得已而加踦嬴二贊以完之然亦勤矣天體至圓動而不滯元封七年日在建星建星者斗宿也而太玄日在牽牛考太玄以牽牛起中首象中孚卦然中孚實先于復在厯家所謂先天之候者故起牽牛初度意蓋出此也雖然必以牽牛起冬至上施往古則失之于玄枵下施今兹則失之于龍尾安在為考之混元而玄已生察之當今而玄非不行窮之天地之委而玄不可亡耶論者謂易極于六十四而變化無窮玄極于八十一而其法不行此非所以病玄極玄之數若律吕太極參之于亥得十七萬七千一百四十七可也論者又謂天地之數但有竒偶自三而四自四而八揚子益為三事且有氣無朔有日星無歲月以是貶議亦非也老子謂一生二二生三三生萬物參天兩地皆足倚數九三之法以積鍾律是也余學術淺小不足以評隲往匠聊著所見以開暇日駁正之原因疏所議于後云非深于九九者不足以窮大易之變夫以劉歆厯律之精奧而笑為覆瓿則玄且無當於律厯矣而况于易乎然張平子妙識天文稱其特極理數更僕難論隂陽之事何哉斯又不可測矣近世邵堯夫作正元改四重為上下減九贊為五贊而蓍之三十三首之八十一不易焉然則玄又可得增損耶大抵玄之為書可為卓然一家之言未為天壤無弊之物也學者以易象厯律讀玄可也以玄求易象厯律不可也卦氣起中孚坎離震兊各主一方其餘六十卦主周歲之日而坎離震兊各一方為方伯之職一爻主一候之日太玄則坎離震兊與六十卦皆主日而不為方伯也太玄八十一首以配六十四卦所重者十七卦或曰以象閠也然考其書有踦嬴二贊以象閠矣而安用以重卦象閠乎又其所重者雜出而無序何也一隂一陽玄相錯之法也然養為陽而中不為隂水火木金土玄相傳之法也然狩為金而羡不為土皆未有明之者涯説玄揲法所稱挂一之後中分其餘以三揲之并餘于扐又三數之不中分蓋誤也若爾則終不成七分之數李氏巽嚴以為又當中分其餘而三數之但不復挂一若爾亦不成七八之數矣非也姑闕以待辨焦贛京房揚雄卦圖總論易道廣大悉備變動無方闔闢乎乾坤化生乎萬物故聖人用之中庸不可能也術數得之小道有可觀焉嘗觀漢儒焦贛京房揚雄皆精于易占其于六十四卦或以巳意增損之而其占皆驗益信卦占在乎人心之誠否故云有其誠則有其神無其誠則無其神而占不足以盡易也試以數子卦圖言之焦贛易林占法用六十卦直日用事一爻主一日六十卦主三百六十日餘震兊坎離四卦為方伯監司之官分列二至二分專主四時節候又以復臨泰大壯夬乾姤遁否觀剝坤為辟君之象以各統一月而公卿大夫佐之然每歲凡三百六十五日四分之一繼三子者如關朗之洞極司馬之潛虗蔡氏之洪範皇極各本之河洛以巳意列圖實于易卦無與惟于先天圓圖六十四卦出于邵康節所傳而玉齋胡氏因邵詩冬至子之半推之以卦分配節候由復卦冬至子之半至乾交夏至午之半三十二卦為陽由姤卦夏至午之半至坤交冬至子之半三十二卦為隂卦爻自然與天地之節候相吻合未嘗以巳意參乎其間殆出漢三子之右矣但焦京揚邵之圖以之推卦氣算厯數占候得失雖有不同皆活法也後世隂陽家用以按節候擇日時是或一説而堪輿家乃假數圖以定方向配卦位分金布氣其亦未知分數多寡悉由焦氏所分派者乃可據以為定向乎噫周天三百六十五度四分度之一此一定不可易者諸家分列十二宫二十八宿且多寡靡定又何有于分金之定向也因論諸子卦圖故併及之衛氏元包總敘伏羲六十四卦在夏曰連山首艮商曰歸藏首坤周易首乾謂之三易其説必有所自來也以今觀之惟文王首乾次坤則天地隂陽尊卑髙下始得其當故孔子十翼獨宗乎周易豈徒曰不敢生今反古吾從周哉後之學易者只宜宗文宗孔此萬世不易之大經也衛氏元包獨首乎坤閲其全書總以八正卦為主每卦七變十四變復原卦即其立本明變非不各有條理但于隂陽剛柔既已紊亂則大本一差餘何足觀哉世之有志易學者盍于文孔先乾後坤之大旨潛神以洞究其底裏或别有著述庶免妄作之愆云元包卦次太隂自坤七變成比自比七變復成坤餘卦皆然包止其七變者用其顯也八卦爻變自下而上至五世則自上而下也坤復臨泰大壯夬需比太陽乾姤遁否觀剝晉大有少隂包以坤為首隂也易以乾為首陽也隂生於上陽生於下故包先少後長易先長後少兊困萃咸蹇謙小過歸妹少陽艮賁大畜損暌履中孚漸仲隂離旅鼎未濟蒙渙訟同人仲陽坎節屯既濟革豐明夷師孟隂巽小畜家人益旡妄噬嗑頥蠱孟陽震豫解恆升并大過隨周易乾坤二卦餘卦類推易主爻而用七變而反生十二變而復本乾􅅀巳龍亢􅅀辰龍飛􅅀卯龍淵􅅀寅龍人􅅀丑龍見􅅀子龍潛坤􅄲亥戰龍􅄲戌裳黃􅄲酉囊括􅄲申章含􅄲未方直􅄲午霜履元包乾坤二卦包主卦而用七變而歸魂十四變而反本乾􅅀上為世爻不變􅅀五世變剝􅅀四世變觀􅅀三世變否下體成坤􅅀二世變遁􅅀一世變姤若上九變遂成純坤無復乾性矣乾之世爻上九不變九還于四而成離則明出地上陽道復行故遊魂為晉歸于大有則乾體復于下矣自大有又七變焉而乾體復純也乾坤上爻不變遊魂于離坎則為晉需若上爻反生則為復姤也蓋八卦與六爻之用不同在卦者十四變而復本在爻者十二變而復本坤􅄲上為世爻不變􅄲五世變夬􅄲四世變大壯􅄲三世變泰下體成乾􅄲二世變臨􅄲一世變復若上六變遂成純乾無復坤性矣坤之世爻上六不變六還于四而成坎則雲上于天隂道復行故遊魂之卦為需歸魂于比則坤體復于下矣自比又七變焉而坤體復純也元包總義揚子云太玄其法本于易緯卦氣圖衛先生元包其法合于火珠林皆革其誣俗而歸諸雅正者也伏羲始作八卦因而重之為六十四是名先天陳希夷所傳先天圖是也其數有二圓圖者天也自一隂一陽各六變為三十二隂三十二陽者運行數也方圖者地也八卦縱橫上下一卦為主各變七卦者生物數也卦氣圖以六十卦為主一爻當一策所謂乾坤之策三百六十當期之日其于繫辭則序卦之義也主于運行之用者天而地之數故為天地之大數也火珠林以八卦為主四隂對四陽所謂天地定位山澤通氣雷風相薄水火不相射其于繫辭則説卦之義也主于生物之用者地而物之數故為人物之小數也卦氣圖之用出于孟喜章句火珠林之用祖于京房易末流之弊雜亂于星官厯翁其事失之誣其辭失之俗故二君以其法為書而歸之雅正也太元日始于寅義祖連山元包卦首于坤義祖歸藏由是三易世皆有書矣唐蘇源明作元包傳李江為之注徒言其理未達其數夫天下之象生于數而數生于理未形之初因理而有數因數而有象既形之後因象以推數因數以推理論理而遺數譬如作樂而棄音律造器而捨規矩雖師曠之聰工倕之巧安能無失哉天地闢萬物生生必萌而後息息而華華則茂物不終茂故能以止止然後安安則得其燠燠則實實可資矣資必有所用用然後達達則能興興則能􅀢􅀢則能悖悖莫若靜靜則可育矣育然後和平平則有序序則不終和和久則塞決塞必有作作則幾乎正矣至正必有抑抑則冥物不終冥故以通而終焉洞極雖是擬玄其實只是一生二二生三三生萬物一即一之象其名曰生一即二之象其名曰育一即三之象其名曰資由生而萌息華茂止安育實屬乎天由育而和塞作燠幾抑冥通屬乎地由資而用達興􅀢悖靜平序屬乎人是三三而九三九而二十七觀其所畫非杜撰者然而不足以窺天地造化之祕則玄且不足以擬易也何有于擬玄之極哉子曰河圖之文七前六後八左九右聖人觀之以畫八卦是故全七之三以為離竒以為巽全八之三以為震竒以為艮全六之三以為坎竒以為乾全九之三以為兊竒以為坤正者全其位偶者盡其畫易曰四象生八卦其是之謂乎洛書之文九前一後左七右三前左二前右八後左六後右四後聖稽之以為三象是故一為生之二四為生之二七為生之二二為育之一五為育之二八為育之二三為資之一六為資之二九為資之三因而變以成二十有七焉按洞極真經莫知作者而元魏關朗子明之所傳次也雖無預于易然敘本論述聖人本河圖以畫卦朱子啓蒙之所援證其為極也又起于洛書之數以北方一為生之二西南二為育之一東方三為資之一而極有一畫矣又以東南四為生之二中央五為育之二西北六為資之二而極有二畫矣又以西方七為生之三東北八為育之弎南方九為資之弎而極有三畫矣每一極演而為九三九二十七而極終亦猶蔡氏皇極內篇演洛書之數至于九九八十一也其為書也生傳一資傳二育傳三論上四敘本一明變二極數三原明四原德五論下五體用六為用七為擬八次為九互為十極圖十一子明自為之序今録敘本論并圖以見一書大略云明變圖論此圖直看以生育資分天地人三極而每極之中各有九變猶易之變卦也生煥實興燠茂達序和育萌華安悖止靜息紊資抑用作冥塞平通幾生之象育乘其一而為煥乘其二而為實乘其弎而為興資乘其一而為燠二而為茂弎而為達育一資一而為序育二資二而為和育之象生乘其一而為萌二而為華弎而為安資乘其二而為悖二而為止弎而為靜生一資二而為息生二資一而為紊資之象乘其一而為抑二而為用弎而為作育乘其一而為冥二而為塞弎而為平生一育二而為通生二育一而為幾止此謂變之為道也次為圖論此圖之象以生資育别列為序與敘本明變之次不同猶易之序卦也生萌息華茂止安燠實資用達興紊悖靜平序育和塞作煥幾抑冥通天地闢萬物生生必萌萌而後息息而華華則茂物不終茂故所以止止然後安安則得其燠燠則實實則可以資矣資必有所用用然後達達則能興物不終興興久則紊紊則悖治悖莫若靜靜則平平則有序序則可以育矣育然後和物不終和和久則塞決塞必有作作則煥煥則幾矣正矣至止必有抑抑則冥物不終冥故以通而終焉細繹之可見矣生傳生一生二生弎生洪明正翼曰陽乘日生洪哉大也明哉正哉極也惟生故能大盛而極焉則曰聖人以化育天下一一冥乎傳曰冥物生始也一二形乎為傳曰形乎為質始成也一弎罔不利傳曰罔不利濟于用也次萌息華茂止安燠實通九傳今不盡録原德篇曰物無不受之謂物無不噣之謂明於物無欺之謂正君子體洪臨下以修性正以治德故曰洪明正資傳資一資二資三資天生地育而人資翼曰取天地之道曰資觀其資三極之情可見矣則曰聖人以順天地而創法立制三一資其象以制服器傳曰資其象制服器也三二資其器以闢田里以興地利傳曰資其器興地利也三弎資其用以化育兆姓其道大也餘九傳不盡録育傳育一育二育三育洪明翼曰隂能成陽之生曰育育則洪洪然後正則曰君子以承君闢化以育兆姓二一女子育于家正臧傳曰女子育于家育在內也不正則否正乃臧也二二乃蟄乃萌育于田傳曰乃蟄乃萌育于田也二弎利用獲傳曰利用獲育道成也餘九傳不盡録極數篇天一地二人三天四地五人六天七地八人九三極之數四十五天有十二一四七地有十五二五八人有十八三六九審其數而畫之三十有九則一除天地人六數刃有三十九數歸之于天四十有二則二除人三數外有四十歸之于地四十有五則弎洛書全數歸之于人生之策百一十七三畫計三十九育之策百二十六三畫計四十二資之策百二十五三畫計四十五遺其餘則三百有六十當期之日顯冥之道盡矣此洞極揲蓍法也雙峯胡氏曰洞極雖無預于易然敘本論述聖人本河圖以畫卦朱子啓蒙之所援證其為極也又起于洛書之數以北方一為生之一西南二為育之一東方三為資之一而極有一畫矣又以東南四為生之二西北六為資之二中央五為育之二而極有二畫矣又以西方七為生之弎東北八為育之弎南方九為資之三而極有三畫矣每一極演而為九三九二十七而極終云司馬溫公潛虗自敘萬物皆祖于虗生于氣氣以成體體以受性性以辨名名以立行行以俟命故虗者物之府也氣者生之户也體者質之具也性者神之賦也名者事之分也行者人之務也命者人之遇也論氣張氏敦實曰五行之在天地間一水二火三木四金五土所謂生數五行具天地自然之氣也天一居北方坎位為水地二居南方離位為火天三居東方震位為木地四居西方兊位為金天五居中而為土在虗則有原有熒有本有丱有基焉至土則本無方隅分王四正之方能生萬物故北方水一得土五而成六南方火二得土五而成七東方木三得土五而成八西方金四得土五而成九中央五土合而成十生數一十有五成數四十生成之數五十有五所以具天地終始之道在太虗之中能成變化而行鬼神也白虎通曰土可以王四季者何木非土不生火非土不熒金非土不成水非土不膏土扶微助衰歷成其道故五行更生得土以助之所以昔之原者今為委昔之熒者今為焱昔之本者今有末息之丱者今有刃昔之基者今成冢矣按原者水之泉也泉既出則流而為委委者水之聚也水以一六居北方坎位故原為生而屬一委為成而屬六熒者火之爝也爝既然則炎而為焱焱者火之熾也火以二七居南方離位故熒為生而屬二焱為成而屬七本者木之根也根既萌則達而為末末者木之暢也木以三八居東方震位故本為生而屬三末為成而屬八丱者金之礦也礦既開則煉而為刃刃者金之利也金以四九居西方兊位故丱為生而屬四刃為成而屬九基者土之實也實既積則起而為冢冢者土之崇也土以五十居中央故基為生而屬五冢為成而屬十五行各設二名以配生成由生而成此從微至著之理而位次則河圖之序也其分震東離南兊西坎北者乃後天八卦之序則溫公時尚未見先天之卦矣潛虗性圖水火木金土水火木金土火木金土水火木金土水木金土水火木金土水火金土水火木金土水火木土水火木金土水火木金水火木金土性論凡性之序先列十純十純既浹其次降一其次降二其次降三其次降四最後五配而性備矣始于純終于配天地之道也相生適以相繼相克適以相成也按此圖自從觀之在左皆以一二三四五六七八九十為序在右則水從一起以至于十皆與左同數謂之十純二則去一而起二三則去一二而起三四則起四去一二三五則起五去一二三四由六至十皆然而數備矣自橫觀之上一層屬水二火三木四金五土皆以上數言各得六位而為三十第六層屬水七火八木九金十土皆以成數言各得五位而為二十五此適五十五之數也去純卦十則為四十五反之亦得四十五共九十通十純為百而五行之性備矣潛虗行圖行圖第一截為體名之辭變圖第二截元餘齊不變通以變言解圖第三截皆解變辭元慎于舉趾差則千里機正其始慎于舉趾差則逺也元始也夜半日之始也朔月之始也冬至歲之始也好學智之始也力行道德之始也任人治亂之始也裒初進而逡而俟其聚不可茍必進逡也信而利用正裒聚也氣聚而物宗族聚而家聖賢二人猓而繁獸猛而殫人猓而繁善以道羣也聚而國三百毒之聚勝者為主惟物之蠱有毒之聚祇害人也四羽毛鱗介各從其類羽毛鱗介聚以倫也五莬絲之紛附草絶根莬絲之棼不知固根也六八音和鳴神人昱聽八音之裒感神明也上雲還于山氷泮于川雲還氷泮聚極必分也按自裒至散凡五十二名皆有七變今不書録後有餘齊併具于左餘堯舜之德禹稷之迹周規孔式終天無斁堯舜周孔垂世無窮也餘終也天過其度日之餘也朔不滿氣月之餘也日不復次歲之餘也功德垂後聖賢之餘也故天地無餘則不能變化矣聖賢無餘則光澤不逺矣齊衆星拱極萬矢湊的必不可易衆星萬矢誰能易中也齊中也隂陽不中則物不生氣血不中則體不平剛柔不中則德不成寬猛不中則政不行中之用其至矣乎潛虗總論溫公之潛虗五十五行其象以丨為原為熒為本為礦為基具五生數也以丅為委為焱為末為丱為冢具五成數也以吉凶臧否平定其占以王相休囚死推其理蓋以虗形性動情事德家國政功業莫不該焉然自氣體性名行變除元餘齊外每名有七自裒至散五十二名以七乘之得三百八十四變每變主一日三百六十五日四分日之一之中尚虧一日四分日之一則以餘一名周之適合周天之度即太玄卦氣之意也公最好太玄故自謂玄以擬易虗以擬玄而以七為變者則又一本乎律吕七聲之法張氏變論乃以八十四聲言調以京房六十律言上下相生之法不知果得公之本旨否故朱子謂後截乃張行成所續亦以見其偽云洞極元包濳虗總論仲尼至聖也曰述而不作聖作難矣明述豈易言哉嘗閲洞極元包潛虗皆不敢自擬于作而各有所述焉洞極真經莫知所創始傳次則關子明也觀其敘本述聖人本河圖以畫卦而敘洛書之數故其書起一二弎生傳一資傳二育傳三每一極演之為九三九二十七而極終焉皆洛書數也天一地二人三天四地五人六天七地八人九故為三極其義取天生地育人資其畫則􅅀為一􅄲為二為三而二三二二三一三二三三以為之變也是洞極之數述洛書也衛氏元包則祖述京房易傳八宫卦以為之如坤宫八卦為元包太隂乾宫八卦為元包太陽次兊宫八卦為少隂艮宫八卦為少陽離宫八卦為仲隂坎宫八卦為仲陽巽宫八卦為孟隂震宫八卦為孟陽易首乾坤包首坤太隂取歸藏之義也然隂生于上陽生于下故包于隂陽亦先隂而後陽先少而後長且其變則易主爻包主卦故變皆自上而下各卦上爻皆不變凡七變而歸魂十四變而反本也卦雖用易法則放于火珠林焉司馬溫公之潛虗則自以擬太玄也其七十五數皆取諸五行十為水草為火為木為金支為土其圖則先氣次體性名行命其義則謂萬物皆祖于虗生于氣氣以成體體以受性性以辨名名以立行行以俟命而其占不過吉凶臧否平其理一歸諸王相休囚死也即是觀之三書所述雖不同所起卦數亦各有所指凖易則一也試舉其辭略言之可凖易否自不能淆矣彼洞極以生萌息華茂止安育實屬乎天以育和塞作煥幾抑冥通配夫地以資用達興紊悖靜平序配之人在元德篇曰物無不受之謂洪物無不燭之謂明于物無欺之謂正君子體洪臨下明以修性正以治德故曰洪明正乃獨以洪明正歸生以洪明歸諸育餘可例見矣元包首太隂篇曰坤荒并莫默傳曰荒者春之熙并者夏之茂莫者秋之落默者冬之濳次大陽篇曰乾顛宀包盈傳曰顛者仁之高宀者義之覆包者禮之拎盈者性之充序謂其文字竒詭音義譎怪者此也濳虗名圖篇曰一六置後二七置前三八置左四九置右通以五十五行叶序卭而瞻之宿纒從度卭則為天俯則為墜卭得五宫俯得十數元餘者物之始終故無變齊者中也包幹萬物故無謂奧至之氣起于元轉而周三百六十四變變尸一日乃餘而終之以步天軌以叶歲紀注卭仰天天俯俯墜地奧冬也讀其辭義亦可識矣嗚呼三書雖曰各有祖述其實皆作也非述也即其辭句之間心良苦矣宜其精藴奧義匪人所易窺矣何獨艱深譎詭其辭句而意義乃爾也抑以為易之其辭危也顧如是哉雖然洞極以起數而三九二十七變焉可也元包依易六十四卦而卦止七變可也濳虗以五行起數二十五而通之以五十亦可也但四聖畫卦繫辭皆循天地造化之自然而一毫人力不與也三書心非不苦思非不精辭非不確而欲以通神明之德類萬物之情吾未知之矣此所以人工雖巧安足以侔天工哉無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事足矣聖人定之以中正仁義而主靜無欲故靜立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知生死之説大哉易也斯其至矣周子太極圖中謂定之以中正仁義而主靜立人極乃一篇之要旨也夫立人之道曰仁與義既曰仁義而又曰定以中正立極其淑世之意至深切矣中正易之教也故末云大哉易也信乎是篇其善發易之道乎無極太極朱陸辨之屢矣二先生意各有所指一恐滯于有一恐淪于無惟得意忘言兼收而融會之斯善矣但易繫謂繼善成性謂成性存存道義之門謂窮理盡性至命周子乃謂五性感通故後儒每裂性為五而支離之終不若聖教含蓄至善而無弊雖然仁義而不中正即所謂偏隂偏陽偏剛偏柔非天地之太極也即孟子所謂為我兼愛之異端也世之學者不論其仁義之謂何不論仁義中正之謂何止曰主靜主靜云曾謂離却定之中正仁義而一于主靜便可以立人極歟是圖乃康節之師李挺之所傳河陽陳氏得之康節是圖可信不獨八卦能生六千四卦又旁通以相生得此然後易之彖辭可知其所從來所謂象學也玩是圖竒偶相生最有次第較之諸儒卦變之説惟此為獨精也但謂伏羲之意原是如此用心布置恐亦未然况謂之為象學而天下寧有象外之理哉西山蔡氏曰一動一靜之間即易所謂太極動靜者易所謂兩儀隂陽剛柔者易所謂四象太陽太隂少陽少隂太剛太柔少剛少柔者易所謂八卦也按動靜之間者兩在不測之謂也動者陽靜者隂不曰隂陽而曰動靜者蓋邵子之意本以説卦傳有立天之道曰隂與陽立地之道曰柔與剛之言故分太陽太隂少陽少隂為天之四象而屬於動少剛少柔太剛太柔為地之四象而屬於靜其後日月星辰水火土石之類皆因此分四片而配之蓋天之四象為氣其用則為寒暑晝夜地之四象為質其用則為雨風露雷氣動故能變質靜故能化寒暑晝夜之變則為性情形體雨風露雷之化則為飛走草木皆天地所生之物也由天之變而感者為耳目口鼻由地之化而應者為色聲香味此生物之用也以氣化言則元會運世屬天歲月日辰屬地以治化言則皇帝王霸屬天易書詩春秋屬地皆因天地之四象以分互相交易而天下之變可推而盡矣蓋氣化往來自然消長有非人力所能為者萬物所以有不同也惟於此而察其幾焉則人之所以異於物而聖人之所以異於人者有以超氣數之外也邵子之學當於此求之經世衍易圖太極為一一生二二為動靜四為隂陽剛柔四分八為太陽太隂少陽少隂少剛少柔太剛太柔也動之大者謂之太陽動之小者謂之少陽靜之大者謂之太隂靜之小者謂之少隂太陽為日太隂為月少陽為星少隂為辰日月星辰變而天之體盡矣靜之大者謂之太柔靜之小者謂之少柔動之大者謂之太剛動之小者謂之少剛太柔為水太剛為火少柔為土少剛為石水火土石變而地之體盡矣大者得氣之多小者得氣之少也日月星辰麗乎天而乾兊離震生矣水火土石麗乎地而坤艮坎巽生矣日午中氣熱為暑月子中氣冷為寒十干之星為陽主晝十二支之辰為隂主夜此皆天之氣也水降為雨地氣之上騰也火熾生風地氣旁達地氣夜升為露星殞有聲主雷此皆地之氣也日月星辰交而天變盡於十六卦水火土石交而地變盡於十六卦天地之氣凝結而生萬物有物則有數數者盡天下之物則也得乎數而物之則事之理無不在焉不明乎數不明乎善也不誠乎數不誠乎身也玩天地四象圖雖以隂陽剛柔分别日月星辰水火土石各有定數日為陽中陽月為隂中隂星為隂中陽辰為陽中隂水為柔中柔火為柔中剛土為剛中柔石為剛中剛此本象也若錯綜觀之則天亦有剛柔地亦有隂陽日為陽月為隂星為剛辰為柔天有地也水為隂火為陽土為柔石為剛地有天也先天八卦乾為日兊為月離為星震為辰巽為石坎為土艮為火坤為水者此本象也又以乾為日兊為月離為星震為辰巽為石艮為土坎為水坤為火者變象也取星之陽為剛以應兊則震之辰為柔矣取火之剛為陽以應坎則坤之水為隂矣本象者天地之用錯綜者人物之用天地交而生人物故也知此則雨風露雷飛走草木耳目口鼻聲色氣味皆不可執一論矣此圖邵康節先生所述也古今之數皆始於一而皇極之數實本於伏羲之先天也乾一兊二離三震四巽五坎六艮七坤八是八卦之生數也陽一而隂二故陽之生隂二而六之為十二隂之生陽三而十之為三十是以乾始為一而兊為十二離則十二而三十為三百六十震則十二而為四千三百二十自巽之坤皆竒偶之生數也離之為六十四卦則以所生之數而相乘之知其總數也如兊之震則為十五萬五千五百二十之數也周旋六十四卦相生之數皆如是也若以日月星辰水火土石暑寒晝夜飛走草木分𨽻於八卦得生生之數則知其所以生得化化之數則知其所以化在學者冥心於此思則得之也此圖即先天八卦圓圖乾兊離震為日月星辰之變數坤艮坎巽為水火土石之化數四象運而四時行焉八卦變化而百物生焉邵子皇極經世之綱領兹可見矣邵子皇極經世全數圖一一元之元日之日乾之乾一二一會之元月之日兊之乾一十二一二元之會日之月乾之兊十二二二會之會月之月兊之兊一百四十四一三元之運日之星乾之離三百六十二三會之運月之星兊之離四千三百二十一四元之世日之辰乾之震四千三百二十二四會之世月之辰兊之震五萬一千八百四十一五元之歲日之石乾之巽一十一萬九千六百二五會之歲月之石兊之巽一百五十五萬五千二百一六元之月日之土乾之坎一百五十五萬五千二百二六會之月月之土兊之坎一千八百六十六萬二千四百一七元之日日之火乾之艮四千六百六十五萬六千二七會之日月之火兊之艮五萬五千九百八十七萬二千一八元之星日之水乾之坤五萬五千九百八十七萬二千二八會之辰月之水兊之坤六十七萬一千八百四十六萬四千三一運之元星之日離之乾三百六十四一世之元辰之日震之乾四千三百二十三二運之會星之月離之兊四千三百二十四二世之會辰之月震之兊五萬一千八百四十三三運之運星之星離之離一十二萬九千六百四三世之運辰之星震之離一百五十五萬五千二百三四運之世星之辰離之震一百五十五萬五千二百四四世之世辰之辰震之震一千八百六十六萬二千四百三五運之歲星之石離之巽四千六百六十五萬五千四五世之歲辰之石震之巽五萬九千九百八十七萬二千三六運之月星之土離之坎五萬五千九百八十七萬二千四六世之月辰之土震之坎六十七萬一千八百四十六萬四千三七運之日星之火離之艮一百六十七萬九千六百一十六萬四七世之日辰之火震之艮二千一十五萬五千三百九十二萬四八世之辰辰之水震之坤二萬四千一百八十六萬四千七百四萬五一歲之元石之日巽之乾一十二萬九千六百六一月之元土之日坎之乾一百五十五萬五千二百五二歲之會石之月巽之兊一百五十五萬五千二百六二月之會土之月坎之兊一千八百六十六萬二千四百五三歲之運石之星巽之離四千六百六十五萬六千六三月之運土之星坎之離五萬五千九百八十七萬二千五四歲之世石之辰巽之震五萬五千九百八十七萬二千六四月之世土之辰坎之震六十七萬一千八百四十六萬四千五五歲之歲石之石巽之巽一百六十七萬九千六百一十六萬六五月之歲土之石坎之巽二千一十五萬五千三百九十二萬五六歲之月石之土巽之坎二千一十五萬五千三百九十二萬六六月之月土之土坎之坎二萬四千一百八十六萬四千七百四萬五七歲之日石之火巽之艮六萬四千六十六萬一千七百六十萬六七月之日土之火坎之艮七十二萬五千五百九十四萬一千一百二十萬五八歲之辰石之水巽之坤七十二萬五千五百九十四萬一千一百二十萬六八月之辰土之水坎之坤八百七十萬七千一百二十九萬三千四百四十萬七一日之元火之日艮之乾四千六百六十五萬六千八一辰之元水之日坤之乾五萬五千九百八十七萬二千七二日之會火之月艮之兊五萬五千九百八十七萬二千八二辰之會水之月坤之兊六千七萬一千八百四十六萬四千七三日之運火之星艮之離一百六十七萬九千六百一十六萬八三辰之運水之星坤之離一千一十五萬五千三百九十二萬七四日之世火之辰艮之震二千一十五萬五千三百九十二萬八四辰之世水之辰坤之震二萬四千一百八十六萬四千七百四萬七五日之歲火之石艮之巽六萬四百六十六萬一千七百六十萬八五辰之歲水之石坤之巽七十二萬五千五百九十四萬一千一百二十萬七六日之月火之土艮之坎七十二萬五千五百九十四萬一千一百二十萬八六辰之月水之土坤之坎八百七十萬七千一百二十九萬三千四百四十萬七七日之日火之火艮之艮二百一十七萬六千七百八十二萬三千五百萬八七辰之日水之火坤之艮二千六百一十二萬一千三百八十八萬二千七八日之辰火之水艮之坤二千六百一十一萬一千三百八十八萬二千八八辰之辰水之水坤之坤三萬一千三百四十五萬六千六百五十八萬四千邵伯溫曰為元元之數一月為會會之數十二星為運運之數三百六十辰為世世之數四千三百則是一元統十二會三百六十運四千三百二十世一世二十年則一十二萬九千六百年一十二萬九千六百年是為一元之數在大化之中猶一年也自元之元至辰之元自元之辰至辰之辰而後數窮矣窮則變變則生蓋生生而不窮也經世但著一元之數舉一隅而已引而伸之則窮天地之數可知矣日甲至癸日之數一歲一周月子至亥月之數十二歲十二周也星三百六十隨天而轉日一周歲三百六十周也一日十二辰積一歲之辰則歲四千三百二十辰也自子至巳作息自午至亥作消作息則陽進而隂退作消則陽退而隂進開物於月之寅星之巳七十有六閉物於月之戌星之戊三百一十有五月至巳之終當辰之二千一百六十為陽極隂陽之餘空各六月至亥之終當辰之四千三百二十為隂極隂陽之餘空各六凡二十有四以當易六十四卦三百八十四爻之數焉除四正卦凡六四六二十四三百八十有四去其二十有四則所存者三百六十也四正卦謂乾坤坎離居四方之正位反復不變故謂之四正經世一元之運數舉成數焉消息盈虧之法在其間矣所以藏諸用也唐堯起於月之巳星之癸一百八十辰之二千一百五十七推而上之堯得天地之中數也故孔子贊堯曰唯天為大唯堯則之蕩蕩乎民無得名焉巍巍乎其有成功煥乎其有文章揚雄亦謂法始乎伏羲而成乎堯蓋自極治之盛莫過乎堯先乎此者有所未至後乎此者有所不及考之厯數稽之天時質之人事若合符節嗚呼盛哉西山蔡氏曰天地之數窮於八八故元會運世歲月日辰之數窮於六十四也陽數以三十起者一月有三十日一世有三十年也隂數以十二起者一日十二辰一歲有十二月也天地之數至於八八而遂窮乎曰窮則變變則生蓋生生而不窮者也全數只是四象總論按日月星辰水火土石雖分為八然日月星辰即水火土石形於天之氣也水火土石即日月星辰凝於地之質也元會運世歲月日辰亦然元會運世即歲月日辰之總歲月日辰即元會運世之分朱子謂康節只是看得易有四象舉眼便成四片故言日月星辰則不必言水火土石言元會運世則不必言歲月日辰因此可以識彼也但欲致其詳故以八數耳元會運世以元經會以運經世蓋元為會之總運為世之總而運與世則皆十二支為序即朱子所謂辟卦如一年之有十二月一日之有十二時也自元為主而言則會運世歲月日辰之分數皆元之所總自辰為主而言則日月歲與世運會元之總數皆辰之所分總者數疏分者數密數疏者大而貴數密者小而賤一本萬殊之别也此豈有先後之等哉其有先後則自子至寅為氣通自戌至亥為物盡終十二會而天地之始終具焉故元會運世歲月日辰數雖多寡不齊其所推步皆以十二支為節限而十二支又以十干為節限如一歲之節限在十二月一月之節限在三十日也因其節限而推之盛衰可知矣雖以元會運世歲月日辰經之而分先後如祝氏泌所載挂一圖泰損以至姤訟之卦自元之元會之元運之元以至歲之時月之時日之時時之時陽卦二百五十六隂卦二百五十六共五百一十二其序卦乃後人以意強排無所取於自然之法象不過因先後之數以别次耳雖欲以起斷例亦豈出此節限之外哉元會運世大意總論夫天地萬物以一為之原原於一而衍之為萬窮天地之數而復歸於一日為元天主日元者氣之始也其數一一元月為會會者數之交也其數十二十二月星為運運者時之行也其數三百六十周天之數辰為世世者變之終也其數四千三百二十觀一歲之數而一元之數可知矣以大運而觀一元則一元一歲之大者也以一元而觀一歲則一元一歲之小者也一元統十二會三百六十運四千三百二十世歲月日時各有數焉一歲統十二月三百六十日四千三百六十二時刻分毫釐絲忽眇沒畢有數皆統於元宗於一始終往來而不窮在天為消長盈虗在人為治亂興廢皆不能逃乎數而反之近事小物其生成顛末吉凶成敗洞晰之如響古未嘗有也邵氏皇極經世聲音律吕圖總論日甲月子星三十辰三百六十一聲多可介吾禾火化入開宰愛叵每退一音古甲九癸近揆坤巧丘􅀈乾蚪月丑星六十辰七百二十二聲良兩向光廣况丁井恆兄永瑩二音黑花香血黃革雄賢五瓦仰口吾牙月堯月寅星九十辰一千四百四十開物星之巳七十六三聲千典旦元犬半臣引艮君允巽三音安亞乙一囗爻黃寅母馬美米目貌眉民月卯星一百二十辰二千八百八十四聲乃早孝嶽毛寶報霍牛斗奏六壬四音夫法張父兄咉武晚尾文萬未月辰星一百五十辰五千七百六十五聲妻子四口衰師骨德龜水貴北五音卜而丙必步白萌鼻普朴品匹旁排平瓶月巳星一百八十辰一萬一千五百二十唐始星之癸一百八十虞辰二千一百五十七六聲宫孔衆龍角用魚鼠去烏虎兔六音東丹天兊大弟土貪大同覃田月午星二百一十辰三萬三千四百夏殷周秦二漢三國二晉十六國南北朝隋唐五代宋七聲心審禁十男坎欠妾七音乃妳女內南年老冷吕鹿雄離月未星二百四十辰四萬六千八十八聲八音走哉足自在匠草禾七曹才全月申星二百七十辰九萬二千一百六十九聲九音恩三星寺口象月酉星三百辰十八萬四千三百六十十聲十音山手土石二月戌星三百三十辰三十六萬八千七百二十閉物星之成三百一十五十一音壯震乍口人赤崇神月亥星三百六十辰六十三萬七千四百四十十二音卓中宅直折丑荼呈右圖天之體數四十地之體數四十八天數以日月星辰相因為一百六十地數以水火土石相因為一百九十二於天數內去地之體數四十八得一百一十二是謂天之用聲於地數內去天之體數四十得一百五十二是謂地之用音凡日月星辰四象為聲水火土石四象為音聲有清濁音有闢翕遇竒數則聲為清音為闢遇偶數則聲為濁音為翕聲皆為律音皆為吕以律唱吕以吕和律天之用聲别以平上去入者一百一十二皆以開發收閉之音和之地之用音别以開發收閉者一百五十二皆以平上去入之聲唱之據圖觀之直看則第一字為日聲水音第二字為月聲火音第三字為星聲土音第四字為辰聲石音橫看則第一行為日聲水音第二行為月聲火音第三行為星聲土音第四行為辰聲石音西山蔡氏曰凡太陽太剛少陽少剛之體數皆十又日月星辰四象相因而為十六以十因十六為一百六十凡太隂太柔少隂少柔之體數皆十二又水火土石四象相因亦為十六以十二因十六為一百九十二為日月星辰水火土石之體以一百六十因一百九十二得三萬七百二十為動以一百九十二因一百六十亦得三萬七百二十為植是為動植之全數於一百六十中去太隂少隂太柔少柔之體數四十八得一百一十二為日月星辰之用數於一百九十二中去太陽少陽太剛少剛之體數四十得一百五十二為水火土石之用數以一百一十二因一百二十二因得一萬七千二十四為動物之用數以一百五十二因一百一十二亦得一萬七千二十四為植之用數又以一萬七千二十四乘一萬七千二十四得二萬八千九百八十一萬六千五百七十六為動物通數凡日月星辰寒暑晝夜性情形體耳目口鼻元會運世皇帝霸王之數皆一百六十水火土石雨風露雷走飛草木色聲氣味歲月日時易書詩春秋之數皆一百九十二其去體與用宛轉相因同一法也物有聲色氣味惟聲為盛且可以書别故以正聲之平上去入正音之開發收閉列以為圖以見聲音之全數其有其聲而無字者也其有其音而無字者也但以上下聲音調之則自可通其即所去之四十八其即所去之四十也陽數用十隂數用十二者即易之陽數用九隂數用六也經世聲音律吕圖總論邵子聲音之學乃自其家傳得之伊川丈人者不盡於李挺之也然其數由先天而起無二道也聲音之數即四象中色聲氣味之一也色可以鑑物形氣所以察腥氛味可以别藥性皆有象可推而不可以言傳惟聲可書故特立此法以其能盡萬物之用故謂之萬物之數司馬遷曰聞聲較勝負則聲之繫於推驗信不誣矣聲之有平上去入屬乎天者也音之有開發收閉屬乎地者也聲如今之叶韻故有有其聲而無其字者如風雷雨雹之聲不可以切字者是也音如今之切字故有有其音而無其字者如鳥獸蟲蛇之音不可以叶韻者是也其有隂陽否塞則聲音俱泯矣然以日月星辰水火土石之數而推之則縱橫交互各以數成如祝氏泌卦一圖所列縱橫之卦而萬物之消長盛衰皆盡於此陽數用十者元會運世皆以十干列數即經世日甲星甲之義也隂數用十二者會世月辰皆從十二支列數即經世月子辰子之義也本與律吕上下相生者各為一法此特借律吕之名以明隂陽相倡和之意邵子書載此本十有六篇而西山蔡氏約為此圖所包甚大其變無窮於學未有得者豈能盡識其微哉邵伯溫曰乾之數一兊之數二離之數三震之數四巽之數五坎之數六艮之數七坤之數八交相重而為六十四焉乾兊離震在天為陽在地為剛在天則居東南在地則居西北巽坎艮坤在天為隂在地為柔在天則居西北在地則居東南隂陽相錯天文也剛柔相交地理也西山蔡氏曰八卦之數乾一兊二離三震四巽五坎六艮七坤八先天之序也一一為乾以至八八為坤參伍錯綜無不備也圓者為天方者為地一二三四為陽五六七八為隂即先天圖也一一起於南八八終於北者以少為息多為消也皇極經世總論説易者謂邵子主數須合邵子之數始可以明易嘗即皇極經世考之如觀物篇所謂律吕聲音等圖不過本伏羲六十四卦先天圖以演其數然尚象而不尚辭於文周孔子之易一無所雜謂之邵子之易可也必欲據以明四聖之易奚可哉且以先天圖言之圓圖象天包於地外方圖象地處於天中是一大隂陽相配也分圓圖而觀乾兊離震居左為天卦巽坎艮坤居右為地卦分隂陽立兩儀而主乎運行不息之事分方圖而觀西北十六卦天卦自相交東南十六卦地卦自相交其斜行天交地地交天或生植物或生動物要皆以生物為事也可見邵子先天之數則皆由橫圖一一八八之數以演之耳何也橫圖一也彼則取橫圖復至乾三十二卦自北厯東以至於南取姤至坤三十二卦自南厯西以終於北以應天之運而圓圖具矣取橫圖乾一宫之八卦自乾至泰橫布圓圖之內而兊二宫之卦自履至臨加布於乾宫八卦之上餘六卦以次橫列而乾居西北坤居東南否泰隂陽之交居於東北西南以應地之方而方圖具矣雖方圓皆本乎先天之圖未嘗增損然其發用則即在天日月星辰以為元會運世之大四象即在地水火土石以為歲月日時之小四象分方圖為四片各主十六卦凡古今治亂興衰皆慿一定之卦以推步之其數總歸於一萬七千二十四而日月星辰之變水火土石之化律吕聲音之實數皆會於兹矣然皆由布籌推算以得之不知於易之知來為何如也况即易與皇極之旨而究竟之其能以盡同哉易之乾為天為金也極則為日為火易之坤為地為土也極則為雨為水易之震為雷為木極則為辰為夜易之巽為風為木而極則為石為雷坎為水為月者易也極則為土為露離為火為日者易也極則為星為晝艮為山極則為火為風兊為澤極則為月為寒自此推之其取象若此其異而吉凶悔吝其異又當何如是其同於易者特同乎伏羲所畫之卦象耳所以示人易知簡能崇效卑法吾未見其同也雖然康節於文周孔子之辭未嘗以己意參之此其所以善用易也此所以謂之邵易可也知邵子之皇極經世則揚雄之太玄又可推矣世之學易者不究其本原務欲以皇極經世同於羲文周孔之易可乎噫邵子之皇極經世豫願學未能但謂其即四聖之旨豫則未知也故即先儒之説著之以取正於高明云易繫辭曰易有太極是生兩儀兩儀生四象四象生八卦蓋自有太極即有兩儀有兩儀即有四象有四象即有八卦易蓋自其敦化川流生生不窮者言之也是乾坤坎離震巽艮兊即四象之隂陽上下多寡而畫之為八太隂太陽少隂少陽即兩儀之隂陽老少而分之為四一隂一陽即太極之闔闢變化而分之為兩非既有此太極然後旋生兩儀而太極兩儀判然各一其所太極之外别生兩儀兩儀之外尚别有一太極在也亦非既有兩儀然後旋生四象既有四象然後旋生八卦而四象之外有兩儀八卦之外有四象也是易之道也一而二二而四四而八八而十六十六而三十二三十二而六十四由此以至於無窮雖析之萬也不見其為分統之一也不見其為合總而名之生生之謂易也聖人未圖未畫之前原有此太極兩儀四象八卦聖人不過因天地自然之法象而圖之畫之以示人耳奈何後人因聖人之圖書卦畫遂執名泥象如何而為太極太極如何而生兩儀有此兩儀如何而為四象有此四象如何而為八卦雖曰窮理而理反為之晦雖曰原卦而卦反為之淆所謂周流六虗變動不居者反滯於象數而人心之活物反支離於紙上之陳言矣善乎朱子有云聖人當初亦不恁地思量只是一箇陽一箇隂只管恁地去自一而二二而四四而八八而十六十六而三十二三十二而六十四既成個物事自然如此齊整皆是天地本然之妙原如此但略假聖人手畫出來斯言也何其簡而明也但又云方其為兩儀則未有四象方其為四象則未有八卦不知此果自天地之造化言也抑自聖人手畫出來時言也又云太隂太陽交而生艮少隂少陽交而生震巽坎離不交各得本畫坎離之交在第二畫兩儀生四象時交了老陽過去交隂老隂過來交陽便是兊艮上第三畫少隂少陽交便是震巽上第三畫所以知其如此者他這位次相挨傍蓋以太陽過去交太隂則生艮上爻之陽太隂過來交太陽則生兊上爻之隂乾坤不言交而生者以上爻陽生於太陽隂生於太隂於交之義無取也少隂交少陽則生震上爻之隂少陽交少隂則生巽上爻之陽坎離不交各得本畫者離之上得陽儀之陽坎之上得隂儀之隂亦非交而生也坎離之交在第二畫生四象時交者陽儀交隂儀而生坎中爻之陽隂儀交陽儀而生離中爻之隂也此所以四象生八卦獨兊艮震巽而乾坤坎離不交也位次相挨傍者兊乾艮坤震巽六卦位次皆相挨也斯言也於前言為何如也欲求天地自然之妙者試思之自八卦以後每卦之上皆加一竒一偶為四畫者十六又自四畫之上每卦各生一竒一偶為五畫者三十二却自三十二卦每卦添三畫為六十四卦且於六十四卦之上各加一竒一偶為七畫至十二畫而以六十四乘六十四與焦贛易林之變數合不知聖人原畫卦之意果如是否也卦變圖彖傳或以卦變為説今作此圖以明之凡一隂一陽之卦各六皆自復姤而來五隂五陽卦同圖異剝比豫謙師復夬大有小畜履同人姤凡二隂二陽之卦各十有五皆自臨遁而來四隂四陽卦同圖異頥屯震明夷臨蒙坎解升艮蹇小過晉萃觀大過鼎巽訟遁革離家人旡妄兊暌中孚需大畜大壯凡三隂三陽之卦各二十皆自泰否而來損節歸妹泰賁既濟豐噬嗑隨益蠱并恆未濟困渙旅咸漸否咸旅漸否困未濟渙井蠱恆隨噬嗑既濟賁豐節損歸妹泰凡四隂四陽之卦各十有五皆自大壯觀而來二隂二陽圖已見前大畜需大壯暌兊中孚離革家人旡妄鼎大過巽訟遁萃晉觀蹇艮小過坎蒙解升屯頥震明夷臨凡五隂五陽之卦各六皆自夬剝而來一隂一陽圖已見前大有夬小畜履同人姤比剝豫謙師復卦變圖説竊疑此圖尚未能究其義夫自畫卦言之六十四卦一時而成固非以此而變彼也以揲蓍言之一卦可為六十四其變固無定也此其可疑者一也如圖云一隂一陽之卦各六皆自復姤而來又云五隂五陽之卦各六皆自夬剝而來今觀五隂五陽之卦即一隂一陽之卦也既自復姤來又自夬剝來此其可疑者二也又如無妄大畜暌之類皆四隂之卦據圖皆自大壯觀來矣而本義復以無妄自訟來大畜自需來暌自離中孚家人來蹇自小過來解自升來升自解來自與圖背且一暌成於三卦解升彼此互易與他卦又别蓋獨取比爻相變而執以為例似非聖人本意此其可疑者三也且一卦必自一卦而來則六十四卦皆當有變今本義所指者不過訟泰否隨蠱噬嗑賁無妄大畜咸恆晉暌蹇解升鼎漸渙十九卦而已不知聖人何獨取此數卦之變而他不復言也又如損益損下益上損上益下之類與賁之文剛文柔何異小畜柔得位之類與暌之柔進而上行何異而皆不以變言此其可疑者四也程子又以乾坤變而為六子六十四卦皆乾坤之變自後天之易言之似亦可通若以先天言乾坤六子固無先後也朱子嘗辨之矣夫易本以明變自六十四卦觀之一卦一義不相同也自三百八十四爻觀之一爻一義不相同也而位則六而已矣故曰變動不居周流六虛上下無常剛柔相易此卦爻之通義也故謂卦無變不可也謂某卦變自某卦不可也某卦變某卦不變不可也蓋易道無窮聖人觀象取義亦非一例隨其卦之所重與象之易見者各指以示人非特以其變而言也凡曰往曰來曰上曰升之類皆自成卦之後觀之似有此往來升降之象耳非真自外而之內自此而之彼也虛而求之默而識之則於易也其庶幾乎而無事於紛紛之説若術數家之為者矣蔡九峯謂河圖更四聖而象已著洛書錫神禹而數不傳故作是書以究極其數其演數之法縱橫皆九位經之以一一一二至於九一九二而終之以九九緯之以一一二一至於九一九二亦終之以九九是於數學亦自有見而一一比擬洪範則非矣且謂二而四四而八八者八卦之象也一而三三而九九者九疇之數也由是重之八而六十四六十四而四千九十六而象備矣九而八十一八十一而六千五百二十一而數周矣謂易成於耦止於象固不知易謂範始於一專於數豈知範者哉噫離象言數易道之不明也久矣嘗觀西山有曰揚氏之太玄八十一首關氏之洞極二十七象司馬之濳虛五十五名皆不知而作者也固不足於三子矣九峯承其家學欲正司馬氏喜太玄之失而亦未離乎揚氏之見蓋亦由易道之不明也然則隂陽消長自然之理羲文周孔發揮造化自然之文何由而昭然於天地間哉九數定占一吉而九凶三祥而七災八休而二咎四吝而六悔八數周流推類而求五中則平四害不親厥或是攖雜而不純承平之世視主廢置凶咎災吝有命不摯此以洛書之位為主故六居西北為乾一居北為坎俱屬水八居東北為艮三居東為震俱屬木四居東南為巽九居南為離沖漠無朕萬象具矣動靜無端後則先矣器根於道道著器矣一實萬分萬復一矣混兮闢兮其無窮矣是故數者計乎此者也疇者等乎此者也行者運乎此者也微而顯費而幽神應不測所以妙乎此者也一者九之祖也九者八十一之宗也圓之而天方之而地行之而四時天所以覆物也地所以載物也四時所以成物也散之無外卷之無內體諸造化而不可遺者乎蔡氏範數八十一圖而交互變易又有大九小九之變圖大九者何自原至厲為一九自養至終為一九十九者何一圖之九又有九焉以一為九是謂小九小九之象亦有九變所謂一吉九凶三祥七災八休二咎四吝六悔無不同也然考其意義原取蚯蚓結濳取麋角解守取水泉動移取虎始交墮取荔挺出之類其所分者則二十四節中之七十二候是也而原之占有五為始為次為中為逺為終各有五焉其節之有分何也猶易之有爻也五日而當一數九數藏用實四日有半一日而當二九一而當五日是也候之一日為始二日為次三日為中四日為逺五日為終是又一候之分也始屬水次屬火中屬木逺屬金終屬土是又五行之分數也以是而體物則始為機次為遂中為形逺為變終為成而數之占候則前後相參又自有錯綜之義故候雖七十二數則八十一而數之始次中逺終所以不齊占事者溟漠之間兆朕之先數之原也有儀有象判一而兩數之分也日月星辰垂於上山嶽川澤奠於下數之著也四時迭運而不窮五氣以序而流通風雷不測雨露之澤萬物形色數之化也聖人繼世經天緯地立兹人極稱物平施父子以親君臣以義夫婦以别長幼以序朋友以信數之教也分天為九野中央曰鈎天其星曰北極上規七十二度東方曰蒼天其星亢氐房心尾東北曰旻天其星箕斗北方曰玄天其星牛女虛危室西北曰幽天其星壁奎婁西方曰昊天其星胃昴畢西南曰朱天其星觜參井南方曰炎天其星鬼栁星張翼東南曰陽天其星翼軫角皆四十有五度半強别地為九州東南曰揚州其山鎮曰會稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其穀宜稻正南曰制州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸穎湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻河南曰豫州其山鎮曰華山其澤藪曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其穀宜五種正東曰青州其山鎮曰沂山澤藪曰望諸