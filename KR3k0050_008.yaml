國施貢分職以任邦國簡稽鄉民以用邦國均守平財以安邦國比小事大以和邦國九伐正邦國馮弱犯寡則眚之賊賢害民則伐之暴內凌外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弒其君則殘之犯令陵政則杜之外內亂禽獸行則滅之九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰財貢六曰貨貢七曰服貢八曰斿貢九曰物貢九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以利得民七曰吏以治得民八曰友以任得民九曰藪以富得民營國九里制城九雉九階九室九經九緯匠人營國方九里旁三門國中九經九緯經塗九軌左祖右社面朝後市市朝一夫夏后氏世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾忩白盛門堂三之二室三之一殷人重屋堂修七尋堂崇三尺雷火曰油火曰蟲火曰鄰土之質也曰沙曰石曰玉曰土曰壤曰泥金之質也曰汞曰銀曰金曰銅曰鐡曰鉛水之質也曰澗水曰井水曰雨水曰溝渠曰陂澤曰湖海水之物也曰鯪鯉曰蛇曰龍曰鯉魴曰小魚曰鰍木之物也曰雞曰雉曰鳳曰鷹隼曰燕雀曰蠛蟻土之物也曰蟾蜍曰蠶曰人曰蜘蛛曰蟃曰蚓金之物也曰鹿曰馬曰麟曰虎曰獺曰毛蟲水之物也曰蟹曰鱟曰龜曰蝦曰蚌曰蠣木之器也曰疏器門忩曰琴瑟曰規曰算篩曰耒耜曰網罟火之器也曰登器梯棚曰文書曰繩曰冠冕曰檯棹曰履踏土之器也曰腹器筐筥曰圭璧曰量曰舟車曰盤盂曰棺椁金之器也曰方器斧越曰印節曰矩曰弓矢曰簡册曰械校水之器也曰平器權衡曰輪磨曰凖曰鏡奩曰研椎曰厠溷逆順者事之幾也吉凶者事之著也順而吉木為徵召為科名為恩赦為婚姻為産孕為財帛火為燕集為朝覲為文書為言語為歌舞為燈燭土為工役為循常為盟約為田宅為福壽為墳墓金為賜豫為按察為更革為軍旅為錢貨為刑法水為交易為遷移為征行為酒食為田獵為祭祀逆而凶木為􅑾杌為驚憂為醜惡為壓墜為夭折為産死火為公訟為顛狂為口舌為炙炙為災焚為震燬土為反覆為欺詐為離散為貧窮為疾病為死亡金為征役為罷免為責降為爭鬪為傷損為殺戮水為盜賊為囚獄為徒流為淫亂為咀呪為浸溺洪範皇極總論蔡氏蓋謂九數者聖人之所原也以決疑成務順性命之理則範數之所用也然非析事而辨物則無以彰往而察來乾為天為君為父坤為地為臣為母是易之所以聚類也木火土金水之五性胎生壯老死化三陽三隂之六質是範之所以取類也定氣質之類而析事辨物者干支之象也定干支之象以彰往察來者九九自然之數也範曰一為水而智其德二為火而禮其德三為木四為金五為土由是而例六七八九則天干可得而定矣支以配干者也用九九右方之加數以配左方之本數則地支可得而定矣即干支以求事物之類則事物可得而辨析矣凡此皆凖易之象數變占而為之不知易之所以順性命之理者果如此而已焉否也精於易學而易簡理得自能辨之洛書洪範蔡氏洪範皇極總論今夫天垂象見吉凶聖人象之河出圖洛出書聖人則之者易大傳之言也象數之説昉於此乎然易言河出圖而不明言圖之故也言洛出書而不明言書之故也列言圖書而不言其象之竒偶也數之多寡也曰聖人則之而不言其因圖以畫卦因書以立範也其分圖書為易範而以洪範九疇屬洛書者則漢儒孔安國劉向父子始之也其説以為河圖者伏羲氏王天下龍馬負圖出河其數十遂則其文以畫八卦洛書者禹治水時神龜負文出洛其數九因而第之以定九疇至班固五行志復引歆向之言以為伏羲則河圖以畫八卦大禹法洛書以開洪範聖人行其道而寶其真彼以聖人之道若是其神竒祕怪也而不知牽合附會資世儒紛紛之説者斯實啓之也自是而後諸家之言易範者必徵圖書而類九疇配易八卦謂書之有範猶圖之有易至宋儒蔡九峯氏乃衍九疇之數作皇極內篇以為書有九類範有九疇疇有九等遂以九衍之而世儒復遂諛以為因占設教與易同歸得洪範不傳之數彼信夫聖人之道可以刻合默契也而不知扳援強附曲引而僻求以幸其説之行也則亦漢儒之説誤之耳蓋其説始於漢儒之附會失在於過求聖人之道而不稽其實成於宋儒之因襲失在於重違漢儒之義而喜於附聖人也愚則以為圖書並出皆所以作易而大禹洪範非洛書也範之九疇所陳者理而蔡氏範數非九疇也試舉而並論之今夫二七居前一六居後三八居左四九居右五十居中者圖之文也以之畫易則其義可知也其數可陳也戴九履一左三右七二四為肩六八為足者洛書之文也以之陳範則其義與數皆不可得而知也何也蓋自一以至十者圖之數也而隂陽竒耦之理存焉故一六居北以水位乎北也二七居南以火位乎南也三八為木木以陽故居左四九為金金以隂故居右五十為土土為中氣也故居中陽之數竒竒主天故一三五七九屬之天天數也圖之所為白其文也隂之數偶偶主地故二四六八十屬之地地數也圖之所為黑其文也是其於陽隂之理竒偶之數生成之位凖之於易無不合者以之為易則然也乃若書之為範則可疑者蓋自一至九書之數也而範之疇合焉語其數則同矣然九疇次序一曰五行也而五行何以居下二曰五事矣而五事何以居前三曰八政何以居左而五紀之四何以居前左耶五為皇極何以居中而三德之六何以居後右七曰稽疑何以居右而庶徴福極何八九而各專一位耶况書之數一三五七九者竒也竒者陽而五行八政皇極稽疑福極何以屬之陽與竒二四六八者偶也偶為隂而五事五紀三德庶徵何以屬之隂與偶耶則求之於隂陽竒偶方位名數俱不相當若曰舍隂陽竒偶而惟取其數之九也則列而數之不必前後左右之分而一可以居前九可以居後而自一至九皆可直截類推非若圖之一六可以居北而不可移之南三八可以居左而不可移之右也又奚必縱橫其數黑白其文以待禹第而出之耶况書之數總之為四十有五而九疇之目乃合河圖五十有五之數則是書之數不足而待圖之數以足之是不惟範出於書而又出於圖矣豈伏羲河圖負圖之時遂以逆為神禹洛龜之地也耶其為牽合附會可知矣故愚以為圖書皆可以作易而洪範非洛書也漢儒之習為此説者蓋泥於書所謂天錫洪範之言以附成神龜出洛之説而不知書之所謂洪範者大法也自伏羲以下神禹而前中更數聖矣其法天行道率皆由之豈曰自禹而上天果祕之而洛龜之出於禹果有所授受耶此可以明範之不於書而漢儒則未之察也若蔡氏皇極內篇之作則又多可論者蓋其書本以明數以數宗乎九遂自附於範之九疇而不知範之所陳者理也蔡氏所衍者數也今夫五行五事五紀皇極三德稽疑庶徴福極者九疇之綱也自五行金木水火土以至五福六極者九疇之目也蓋禹所敘箕子所陳者三才之道聖人治天下之大法也非故縱橫其文錯綜其目必足其數以求合於洛龜所負之文也故皇極以一三德而不為少庶徴以七福極至於十一而不為多者以疇之為目列言其理而非取必於數也乃若蔡氏則信以為疇之目合於書之九也故九衍之而為八十一焉而衍之為七百二十九焉七百二十九而終之以六千五百六十一焉以為範之疇猶易之卦以八畫八八而重之則六十四矣因而重之則三百八十四矣而疇以九敘九衍之而成數則八十一者若易卦之有六十四也七百二十九者若易爻之有三百八十四也終之以六千五百六十一者若易之有爻辭而通於象占也不知圖雖無文而象數之理巳具則易在其中若蔡氏所衍之數期以明範也而自原以至終其橫數之八十有一者果若易之有卦乎其於九疇所第自初一以至次九者果皆數之所能盡乎其八十一圖之縱數果若易之有爻六千五百六十一之數果若卦之有爻辭乎其於九疇之目自五行金木水火土至於五福六極之理果皆無所挂漏而吉凶災祥休咎之占果足以盡疇乎若曰洛書為數之原而疇之目定於九數之衍亦宗於九也則是蔡氏之數不特可以明範而直可以上繼洛書矣又何必假神禹之範以衍洛書之文耶其為穿鑿強附可知矣故愚以為範有九疇所陳者理而蔡氏範數非九疇也世俗皆宗其説者蓋泥於範出洛書見書之數九疇之數亦九也遂以數求之而不知是理也非數也如以數而已則禹受之武王訪之箕子陳之更三聖矣不聞有一言之及於數者豈範錫神禹尚有不盡之祕而寥寥千載必待蔡氏以發其不傳之數耶此可以明範數之非九疇矣而宋儒則未之察也故愚又謂洪範非洛書也禹之謨訓也要之垂世以敘彛倫因事以立法則亦不出於書者猶之羲文之易也太公之丹書也皆可以垂訓而以為必出於書者非也範數非九疇也蔡氏之書也要之因占以設教因事以示戒則亦不必出於疇者猶之揚氏之太玄也焦氏之易林也固可自成一家而以為必合於疇則未也故先儒劉牧謂圖書同出伏羲之世河南程子亦謂聖人見河圖洛書而畫八卦知圖書皆所以畫易則知範之不出於書矣知範之不出於書則蔡氏不得以數明疇矣世徒見緯候之書詳聖人受河圖之始以為河出天苞洛出地符河圖龍發洛書龜感聖人之受圖書於天其始皆有神物以受之以是為可以厭服天下與來世也而通人達士莫能討核世儒因是以信其必然也增長而附益之以成其説譬之律令其始若畫一而巧文以舞之則千機百算者出矣是故有以十為洛書九為河圖如劉長民張文曉者矣有以先天圖為河圖五行生成數為洛書戴九履一圖為太一下行九宫數如蔣得之者矣有謂得圖書於青城山隱者有謂别傳圖書於異人而為九十皆河圖洛書非圖之説者有以六十五字為洛書本文者遂以聖人明白簡易之理多支離變怪之説而訛沿詭襲益增説者之蹊徑矣今夫六經之始也其作易也不知有書也其敘書也不知有詩也而其道昭晣並行譬之七曜之懸於天也五氣之布於時也道固章章在矣而後世擬易而易晦矣補書而書亂矣續詩而詩失矣三傳作而春秋微矣補周禮而禮亡矣此僭經擬經窮經經絶而後世多異論也不知六經未作而道未嘗不在也象數未畫而理未嘗不明也學者誠達於象數之原以契傳心之要則可以筌蹄象數注腳六經矣又何説家之紛紛哉河圖洛書邵康節皇極經世蔡九峯洪範皇極總論聖人之作易也不遺乎數而未嘗倚於數儒者之説經也貴依於理而不可鑿乎理蓋天下之數莫非理也天下之理莫非天也聖人默契乎天自能明天下之道而天有所不必畀聖人神明乎理自能周天下之數而數有所不足拘自世儒喜為竒説以神異乎聖人之事推象數以原經而經滯務為過求以自附聖人之學衍意見以傳經而經離求愈竒故説愈鑿説愈鑿故旨愈繁而聖人之道愈失其初矣雖其為學未必皆叛於聖人以是為作經之本可乎嗚呼吾獨怪夫六經之旨如日中天未嘗託異徴祕以求信於天下而後世儒者亂之也今夫易卦何昉乎伏羲畫之為文字之祖也當其時鴻濛未闢人文未啓天地萬物之情隂陽鬼神之祕寓於法象而易行乎其中矣伏羲神而明之以定畫焉故易曰仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜於是始作八卦此作易之本也洪範何昉乎箕子陳之是神禹之傳也當其時玄龜告功文明未布立極綏民之具事天治人之本藏於幾微而疇具乎其中矣神禹會而通之以作範焉故書曰禹乃嗣興天乃錫禹洪範九疇彛倫攸敘疇之本也二聖人者運而精神既有以丕隆休烈聚而心術又足以開先世教雖其聖德格天河洛效瑞圖書之數未必不可通於經而聖人取義也大立教也正惟其理之可以信天下而不必乎象數之模倣瑞應之托飾也何至後世異説之紛紛哉其謂龍馬出河伏羲遂則其文以畫八卦神龜負文而列於背有數至九禹遂因而第之以成九類此孔安國之説也其謂伏羲繼天而王受河圖而畫之八卦禹治洪水賜洛書法而陳之九疇此劉歆之言也其謂河圖之文七前六後八左九右洛書之文前一後三左七右四前左二前右八後左六後右四此關朗之論也宋儒邵子亦曰圓者河圖之數方者洛書之文故羲文因之而造易禹箕敘之而作範嗚呼信如是則易出於圖無圖即無卦矣範出於書無書即無疇矣而聖人作經之本不既逺乎其訛起於緯候之書謂河以通乾出天苞洛以流坤出地符聖人必有神物以授之之説漢儒惑之牽合文致不求聖人之實逮宋儒喜於附聖而輒取之復強證於易傳圖之一言不知孔子嘗言河出圖矣而竒偶之象未詳也嘗言洛出書矣而九一之數未悉也嘗言聖人則之矣而因圖畫卦因書立範未及也諸家之言何祖乎夫觀鳥迹而製字因規矩而製器藝也聖人恆必詳之顧此經學禎符祕訣不與本文同傳而千載之下山人野士創為之説不幾於詭誕而不可從矣乎况以圖之數析補八卦拘合強同多所難信如使揭圖而示之孰為一六而下孰為二七而上孰為三八四九而左右孰為乾兊離震孰為巽坎艮坤天之告人也何其瀆因其上而上因其下而下因其左右而左右因其乾兊離震以為乾兊離震因其巽坎艮坤以為巽坎艮坤聖人之效天也何其拘易既如是作矣然則仰觀俯察者又何物通德類情者又何事而易書本體不在此而在彼耶以書之數參合九疇則隂陽竒耦俱未相當按類而求之五行何以居下五事何以居上五紀何以居前左而皇極何以居中耶八政何以居左稽疑何以居右三德何以居後右而庶徴福極何以各專一位耶書之方位實不同於疇一三五七九竒也而五行八政皇極稽疑福極何以屬之竒二四六八偶也而五事五紀三德庶徵何以屬之耦疇之名數又不同於書如謂大義無取姑摘其自一至九之文則又奚必縱橫黑白祕傳神授重煩聖人第之而後成耶先儒劉長氏謂伏羲兼取圖書又謂九為河圖十為洛書蔣得之謂先天圖為河圖五行生成數為洛書諸説紛雜皆無定據而獨孔劉之言為信謬矣程子有云孔子感麟而作春秋麟不出春秋豈不作而畫八卦因見河圖洛書果無圖書八卦亦須作朱子亦謂伏羲仰觀俯察逺求近取安知河圖非其中一事二氏之論稍為得之聖王達天明道而作經禎符適見理固有然而謂必作於圖書者非也蓋聖人之經主於理而後世索之於數聖人之理得於天而後世擬之於怪故不但原經者飾為異説以誇世誣人也世儒圖經傳經者往往惟新竒玄奧是務分配離析以解經而經可明乎夫易者不離象之理自不可窮然而有正焉有變焉卦之明白較著者正也旁推而衍之者變也伏羲八卦隂陽剛柔其理一定變化盡於是矣故三代更帙易卦則同而連山而歸藏而周易未嘗外伏羲所作而别為一易也乃邵子圖學以此為周之易而非伏羲之易别出橫圖於前後左右分析以象天氣謂之圓圖於其中交加八宫以象地類謂之方圖易於天氣地類蓋象矣奚俟夫圖而後見也且謂其必出於伏羲既規橫以為圓又填圎以為方前列六十四卦於橫圖後列一百二十八卦於圓圖上古無言之易何若是紛紛哉易始於一由太極而兩儀而四象而八卦生生之序也未聞筆之圖以立卦天地山澤風雷水火相合配偶此八卦對待之體乃别而圖之為先天由此行乎四時序於五方又流行之用乃别而圖之為後天何據也孔子作傳於千百年之前邵子讀易而悟其變推而衍之如此不應謂聖人之傳反為其圖説也近世黃東發著日抄極謂天地定位一章必非先天卦位疑圖學之不可從蓋彼謂先天在卦氣傳何為舍而曰天地定位彼謂後天在八用傳何為舍而曰帝出乎震繫一書語象變詳矣未嘗一及於圖且漢儒得經近古未有以圖為言者圖學邵子之易也而可即謂聖人之易也哉洪範者聖王治世大法其道盡於皇極而終始意義聨貫而不可離是故有本焉有枝焉前四疇皇極之體治天下之本根也後四疇皇極之用治天下之枝葉也讀洪範者當知天人合一至理聖人嚴感應之機詳著五事修廢與五行徴應之論特其理微妙不可迹拘耳劉向作洪範五行傳其言某事致某災某災應某事捷若形影破碎分析世以災異之學病之而遂疑念用之疇或未可盡信夫人君事天如孝子事親日候其顔色喜怒以為己之悖順此所謂念也徴而休焉修之當如是而求其肅必時雨又必時暘哲必時燠謀必時寒聖必時風則難矣徴而咎焉廢之當如是而求其狂必恆雨僭必恆暘豫必恆燠急必恆寒蒙必恆風則舛矣聖人立教論其理而奚必於類應之符耶惟其言理故不祖於數而宋世蔡元定作皇極內篇補洪範不傳之數以疇之目合書之九九衍之而為八十一八十一衍之而為七百二十九極之於六千五百六十一焉自元至終猶易之卦也而六千五百六十一猶卦之爻也其於天人妙理經世大法果皆曲盡而無遺否乎洛書數之祖祖洛書而推之於不可窮此元定之精於數學而有功於書也若謂洪範之缺藉以推衍何其敢於誣經也哉是故六經之道幾絶而復明者諸儒傳經之力而使大義不盡明於世者諸儒牽合擬附之罪也漢儒之失在示天下後世之信而涉於誇宋儒之失在求聖人之精而流於過或曰宋儒之學何可非也曰何敢非也天下理與數而已矣若惟其理數是精而不援經解附邵子之圖學蔡氏之數學豈可少哉參兩會極數原天數一參一得三三生九地數二兩二得四四生八以一而九天之所以周流而不已以二而八地之所以對待而不移天之道盡於九九視地為有餘地之道盡於八八視天為不足然天用用而不用體故減其體之九以從地地用體而又用用故加其用之八以應天九八合而歲功成矣乘原九疇八卦順布相乘為乘七十有二乘有五位合三百有六十以應一期之數疇外象天為位二委其乘於地也卦內象地為位三代其終於天也少之少曰元少之壯曰息少之老曰進壯之少曰隆壯之壯曰中壯之老曰殺老之少曰退老之壯曰消老之老曰徂一陽消長而隂之進退乘之天之所以一而神也少隂之初曰震終曰離老陽之初曰兊終曰乾少陽之初曰巽終曰坎老隂之初曰艮終曰坤二氣變遷而四時之錯行因之地之所以兩而化也神化流通歲功以成位原初下終上二三曰竒曰耦卦之儀也四上曰少曰壯曰老疇之序也二儀三序北而吉凶悔吝判其中矣一為水二為土三為木四為金五為火各乘其所勝不僭差也水成於地之六土成於地之十木成於地之八而居於下金成於天之九火成於天之七而居於上本乎地者親下本乎天者親上也一為地二為人物三為闕四為君五為天以言乎天地之間則備矣七十二乘萌元震疇一之一卦一之一冬至子中養息離疇一之二卦一之二拓進兊疇一之三卦一之三桓隆乾疇一之四卦一之四小寒丑初闢中巽疇一之五卦一之五佇殺坎疇一之六卦一之六縮退艮疇一之七卦一之七大寒丑中瘠消坤疇一之八卦一之八蓄徂乾疇一之九卦二之一燧元離疇二之一卦二之二立春寅初溉息兊疇二之二卦二之三奔進乾疇二之三卦二之四颷隆巽疇二之四卦二之五雨水寅中梁中坎疇二之五卦二之六戢殺艮疇二之六卦二之七伏退坤疇二之七卦二之八驚蟄卯初危消震疇二之八卦三之一晦徂離疇二之九卦三之二滋元兊疇三之一卦三之三春分卯中育息乾疇三之二卦三之四飄進巽疇三之三卦三之五盈隆坎疇三之四卦三之六清明辰初居中艮疇三之五卦三之七稼殺坤疇三之六卦三之八霖退震疇三之七卦四之一穀兩辰中暮消離疇三之八卦四之二濳徂兊疇三之九卦四之三霽元乾疇四之一卦四之四立夏巳初虛息巽疇四之二卦四之五極進坎疇四之三卦四之六阜隆艮疇四之四卦四之七小滿巳中包中坤疇四之五卦四之八妄殺震疇四之六卦五之一昃退離疇四之七卦五之一芒種午初乖消兊疇四之八卦五之三裂徂乾疇四之九卦五之四兆元巽疇五之一卦五之五夏至午中畏息坎疇五之二卦五之六留進艮疇五之三卦五之七敵隆坤疇五之四卦五之八小暑未初迸中震疇五之五卦六之一暈殺離疇五之六卦六之二去退兊疇五之七卦六之三大暑未中幸消乾疇五之八卦六之四恬徂巽疇五之九卦六之五泉元坎疇六之一卦六之六立秋申初鬱息艮疇六之二卦六之七違進坤疇六之三卦六之八決隆震疇六之四卦七之一處暑申中照中離疇六之五卦七之二濡殺兊疇六之六卦七之三依退乾疇六之七卦七之四白露酉初蘀消巽疇六之八卦七之五設徂坎疇六之九卦七之六立元艮疇七之一卦七之七秋分酉中乳息坤疇七之二卦七之八迅進震疇七之三卦八之一暄隆離疇七之四卦八之二寒露戌初歡中兊疇七之五卦八之三翳殺乾疇七之六卦八之四枯退巽疇七之七卦八之五霜降戌中圯消坎疇七之八卦八之六斃徂艮疇七之九卦八之七凝元坤疇八之一卦八之八立冬亥初惕息震疇八之二卦九之一旭進離疇八之三卦九之二涸隆兊疇八之四卦九之三小雪亥中轉中乾疇八之五卦九之四摧殺巽疇八之六卦九之五湴退坎疇八之七卦九之六大雪子初阻消艮疇八之八卦九之七穸徂坤疇八之九卦九之八右七十二乘當七十二候乘有五位計三百有六十以當一期之數每九乘為一疇之始終亦一卦之始終當期之一節五日成候九候成節八節成歲而疇不失序卦不易方九八合而萬物生成其間一天地自然之數也蓍法用蓍百莖初營隨手平分為四內取其一以四揲之餘一為竒二為用偶三為用竒四為偶二營三營如初四營合前蓍平分為三內取其一以六揲之餘一為少二為壯三為老四為用少五為用壯六為用老五營而四五營畢而一乘備乃占其所用之位以别吉凶無用則占乘辭二用三用以至四用則以上用為主五位全用仍占乘辭內卦為貞外疇為晦索辭前四卷上下各分二篇後索辭二卷分原索撰索曜索韞索用索頤索筮索八篇兹録數條以見其作書之大旨也易曰天地變化聖人效之何言其變化也天以一而神地以兩而化一動為三三為九消息進退始終無端天之所以神變無方也兩分為四二四為八代謝往來對待不紊地之所以化行有漸也聖人者體天地之撰者也是故有以變通而達化通極晝夜之道而不疑為之書以類萬物之情發鬼神之靈而不爽易曰河出圖洛出書聖人則之圖以全乎其十生成相從同居其方虛五含十八卦之原也書以言乎其九竒偶相從各守其隅體數敘紀九疇之綱也聖人兼兩而則之八九同用矣作易云乎哉易曰參天兩地而倚數參天者所以生疇九疇立而天經備矣兩地者所以列卦八卦成而地維彰矣本天經達地維體萬物運四時倚乎數而不盡於數聖人之通極性命也如是夫劉子曰河圖洛書相為經緯八卦九章相為表裏是故九章為表以運乎外八卦為裏以運乎內圖書之所以經緯而無間也倚圖而廢書為律厯為運氣為濳虛拘攣而無圓通之妙倚書而廢圖為太玄為洞極為洪範皇極牽合而非自然之機象數之所以不明理氣之所以莫晰嫌疑之所以莫定有由然哉易有太極超乎八卦之外者也範有皇極立乎九疇之中者也言極則卦疇皆九去極則卦疇皆八會而通之比類而合之此通極之所以獨妙也歟陽生乎元極於中絶於徂隂生於殺極於徂絶於隆中半為純陽半後為隂始此九疇循環之幾也其言陽而不言隂者疇天道也一陽進退而隂之倚伏隨之矣陽始於震極於乾殺於巽盡於坤隂始於巽極於坤殺於震盡於乾陽與隂互為貞勝者也舉一端而二氣之往來見矣其言陽而復言隂者卦地道也剛柔錯陳對舉而不遺也按圖書卦疇皆天地自然之象數無所為而為者也後有作者不免模倣而比擬之此書八九參乘揆諸理而不悖蓋其所見亦超卓矣先儒諸圖總論太極河洛易卦諸圖圖天地之造化也天地之造化一本萬殊參差不齊諸圖或描寫其似或象其一端要皆順乎造化之自然而人力不與也儒者之學得非求全天地之造化哉先聖畫為圖象無非教人順天地自然以盡性盡人物之性而參贊化育云耳中庸曰誠者天之道也誠之者人之道也擇善固執以盡乎人道雖人一已百人十已千發憤竭才亦惟復還此天道耳天命之謂性而盡性者可以人為意見參之哉蓋以人為意見而力學者非聖人盡性之學也以人為意見而形之圖畫者非聖人太極河洛易卦之圖也譬諸畫工既名曰寫真名曰傳神雖有巧思妙意豈能於斯人之真神加毫髮哉或以己見人為加減毫髮而孝子慈孫見之必以為非其父祖之真神矣丹青妙手不能為人加減毫髮而圖畫卦象豈能於天地之造化加毫末而為之安排布置也吾知其必不能矣借曰能之必非天地造化真圖象矣孰敢曰天地無肖子能識其真法象耶自漢而下如京房揚雄關朗司馬君實各有圖焉以其思則精矣以其象數則密矣以為是即天地自然之造化則未然何也京揚於易之卦爻不免以己意減損之其餘又非二子比也惟周邵雖與四聖之易異而揆之太極卦爻俱不相暌朱子乃原其卦之所由畫與卦之變耳若蔡氏九九圖謂非自然之數不可也特謂為箕子之洪範九疇而為之辭豈其然哉雖俯仰觀察果能明其法象而窺其化育之運雖創為之圖可也依倣先聖别有所發明可也以之經綸制度而順民情因物性謂其燮理造化亦可也若徒以一人之意見揣摩測度似精而實疏似順而實舛而謂其為自然之化育也志性學者其辨諸圖書編卷八
