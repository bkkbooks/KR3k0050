body:
  text: 圖書編卷六十九明章潢撰心臟歌心臟身之精小腸為弟兄象離隨夏旺屬火向南生任物無纎巨多謀最有靈内行於血海外應舌將榮七孔多聰慧三毛上智英反時憂不解順候脉洪驚液汗通皮潤聲言爽氣清伏梁秋得積如臂在臍縈順視雞冠色凶看淤血凝診時須審委細察有叮嚀實夢憂驚在虚翻烟火明秤之十二兩大小無常平心臟圖說心火宫也居肺下肝上對鳩尾下一寸丈夫六十心氣衰多錯忘也心為五臟之主明運用生開竅于舌在形為脉出於中衝心者生之本神之處也汗者心之液腎邪入心則多汗小腸為心之府舌為心之苗心氣通則舌知五味心病則舌焦卷而短不知五味矣合于脉其縈色也心之合也血脉虚少而不縈于臟腑者心先死也口乾舌强或咽喉中痛嚥唾不便口内生瘡忘前失後心氣衰也或因怒氣傷肝或因驚氣入膽母能令子虚而心血為之不足又遇事繁冗思想無窮則心君為不寧故神明不安而怔忡驚悸之證作矣心病證臍上有動氣按之牢苦痛心苦煩掌中熱也吐納法心病用呵法呵為㵼吸為補須正身端坐先調氣和勻以鼻㣲長引氣然後細細呵之令耳不得聞大略以三十六遍為則能去心部一切煩熱疾愈則止過則損導引法正坐以兩手作拳用力左右互相築各六度又可正坐以手按腕上一手向下拓空如重石又以兩手作乂以脚踏手中各六度能去心胸中風邪諸疾關炁為之畢散良久三咽三叩齒而止心部食忌四月勿食大蒜令人髪白及墮齒五月勿食薤損心并勿食各物心腎令人心痛宜食大小麥去霍禁醎味養心法言心者身之主宰萬事由之應酬而病否之所繫也故相思一病神仙難醫正心之人鬼神亦憚養與不養故也未事不可先迎既事不可留滯忿懥恐懼好樂憂患皆得其正此養心之法也治心要法心臟之病必先調肝腎兩臟盖腎者心之鬼肝者火之母也故心病者先求乎肝清其源也五臟受病必𫝊其所勝水能制火則腎之受邪必𫝊于心故先治腎逐其邪也若診脉肝腎俱和而心自生病然後察其心象之虚實而調治之斯得之矣肝臟歌肝臟應春陽連枝膽共房色青形象木位列在東方含血榮於目牽筋爪運將逆時生恚怒順候脉弦長泣下為之液聲呼是木鄉味酸宜所納麻穀應隨糧積因肥氣得杯覆脇隅傍翠羽身將吉顔同枯草殃四斤餘四兩七葉兩分行肝臟圖說肝木宫也居心下少近左三葉丈夫六十肝氣衰减葉薄膽目不明也肝者凝血之本魂之變也肝脉出于大敦發竅于目左目甲右目乙淚者肝之液腎邪入肝則多淚膽為肝之腑膽與肝合眼為膽之官肝氣通則眼分明肝實則眼赤肝合于筋其榮爪肝之合也筋緩而不能収持者肝先死也故人之肝虧則筋急人之皮枯者肝中熱也人之肌肉斑㸃肝風也人之色青者肝盛也人之好食酸物者肝不足也人之髪枯者肝傷也人之手足多汗者肝無疾也肺邪入肝則多哭肝病急食甘以緩之欲散則食苦以散之用鹹補之用辛㵼之禁當風肝悪風也相肝病法肝熱者左目赤肝病者目睷兩脇下痛引小腹令人喜怒肝虚則恐如人將捕之肝實則怒虚則寒隂氣壯壯則夢山樹園苑生草肝氣痛頭痛耳聾頰風腫惡風診在目其色青肝病主青足厥陰與足少陽為表裏主治其日甲乙吐納法肝病用嘘法同前去肝家虚熱亦除四肢壯氣與夫眼赤一切熱疾嘘後仍向東三吸之嚥津叩齒而止導引法正坐以手兩相重按脇䏶下徐緩身左右各三五度又向正坐兩手拽相乂翻覆向胸三五度能去肝家積聚風邪毒氣為之畢良久閉目三咽三叩齒而止肝部食忌正月勿食葱二三月勿食蒜子蓼子及百藥心勿食諸物肝肺宜食麻子巨勝子李子禁辛味養肝法言肝屬木藏血魂所居焉人之七情惟怒惟甚怒則傷肝故血枯而魂散也善養肝臟者莫􅋀于戒暴怒膽臟圖説膽膞著肝膽者筋之應也六腑之精也膽合于膀胱上主毛髪故人之髪枯者膽竭也人之爪乾者膽虧也人之髪燥膽有風也人之毛焦膽熱也人之目無光有淚者亦膽熱也好食苦味膽不足也顔色青或光白膽無病也夫心主火膽主水火得水而㓕水得火而煎隂陽交爭水勝火故淚從目出也膽與肝同道有病用肝臟方相膽病法膽有病太息口苦嘔宿汗口淡恐人將捕之眉傾也膽若實傷熱熱則精神不守臥起無定若虚則傷寒寒則恐畏頭眩不能獨臥虚損則爪枯髪燥目中淚出膀胱連腰小腹俱痛吐納法膽病用嘻法如前數膽病并腎臟除一切冷陰汗盗汗面無顔色小腹脹滿臍下冷痛口乾舌苦嘻之則病愈導引法可平坐合兩脚掌昻頭以兩手挽脚腕起揺動三五度亦可大坐以兩手拓地舉身弩腰脊三五度能去風毒邪氣畢則閉目三咽三叩齒而止也腎臟歌腎臟對分之膀胱共合宜旺冬身屬水位北定無欺兩耳通為竅三焦附在斯味鹹歸藿豆精志自相隨沉滑當時本浮灘厄在脾色同鳥羽吉形似炭煤危冷即多成唾焦煩水易虧奔豚臍下積究竟骨將痿實夢腰難解虚行涉水湄一斤餘二兩脅下對相垂腎臟圖說腎水宫也左腎右腎前對臍膊著于脊丈夫六十腎氣衰髪墮齒氣衰焦脛脉空虚人之有腎猶樹之有根也腎開竅於二隂左為壬右為癸在形為骨久立損骨腎脉出于湧泉腎者臟之本精之處也經於上焦榮於中焦衞於下焦腎之餘氣通於兩竅為液為唾邪氣入腎則多唾膀胱為腎腑耳為腎官腎氣通則聞五音腎病則耳聾骨痿也腎合于骨其榮髪也腎之合也骨萎不能起牀者腎氣先死也上主齒齒痛者腎傷也又主耳耳不聞聲者腎虧也人之骨痛者腎虚也人之齒多齟者腎弱也人之齒􅀈者腎有風也人之耳痛者腎氣壅也人之多呵吹者腎邪也人之腰不伸者腎水枯也人之色黄黒者腎衰也人之容色光紫者腎無病也人之骨鳴者腎羸也肺邪入腎多伸病燥食辛以潤之腎堅食苦以弱之又用苦以㵼之鹹以補之禁無犯熱食温衣腎畏燥也相腎病法臍下有動氣按之苦牢病苦腹食不消體重肢節痛嗜臥吐納法腎病用吹法同前數能去腎家一切冷氣腰痛膝沉重久立不得陽道衰弱耳中蟬鳴及口中有瘡一切腎部煩熱之疾疾愈即止導引法正坐以兩手上從耳左右引脇三五度亦可以足前後踰左右各十數度能去腰腎膀胱間風邪積聚為之畢良久閉目三咽三叩齒而止腎臟食忌十月勿食椒令人口乾成赤白痢十一月十二月勿食鱗甲鮮物并勿食諸物脾腎宜食大豆黄卷粟養腎法言腎於諸臟為最下屬水藏精盖天一生水乃夫人生身之本立命之根也天地間凡有血氣者莫不有牝牡之欲故天與水違行欲情一動精即離原而生身者亦所以戕身者也君子學易玩損之大象而窒慾如防水之源塞水之漏損之又損以至於無焉是欲固夀命之原莫先于色慾之戒也治腎要法五臟惟腎之一臟母勝而子反受邪肺與腎是也肺主氣氣之輕浮能上而不能下腎主精精之沉重能下而不能上若肺勝則熱作氣得熱上蒸則不能下生腎水而腎之邪生矣須急食凉劑以解之此腎病必先求諸肺是也或肺臟安和而腎忽受病則當察其本臟而治之斯得之矣肺臟歌肺臟最居先大腸通道宣兊為八卦地金屬五行牽皮與毛相應魂與魄共連鼻聞香氣辨壅塞氣相煎語過多成𠻳瘡浮酒灌穿猪脂凝者吉枯骨命難全本積息賁患乗春右脇邊順時浮濇短反即大洪弦實夢兵戈競虚行渉水田三斤三兩重六葉散分懸肺臟圖說肺金宫也為臟之華盖居上對胃六葉丈夫八十肺氣衰魄漸散也肺脉出于少商開竅于鼻左孔為庚右孔為辛肺者臟之長氣之本也是以諸氣屬焉久臥則傷氣涕者肺之液腎邪入肺則作涕肺在形為皮毛故肺合於脾其榮毛也肺之合也皮緩而毛落者肺氣先死也肺合于大腸大腸為肺之府上主鼻鼻為肺之官故人肺傷風則鼻塞人之容色枯者肺乾也人之鼻痒者肺有蟲也人之多怖者肺魄離于外也人之體黧者肺氣癥也人之多聲者肺之盛也人之不耐寒者肺衰也人之好食辛味者肺氣不足也人之腸鳴者肺壅也人之顔色鮮白者肺無病也肺病食酸以収之辛以補之苦以㵼之禁勿寒肺惡寒也相肺病法肺病熱則右顴赤肺病者色白而毛聚喘咳逆氣胸背四肢煩痛或夢美女相依肺虚則少氣不能報息鼻燥喉乾肺風則多汗畏風時欲咳𠻳如氣盡日則止暮則甚診在眉上其色白肺主秋手太隂陽明主治其日庚辛又肺病證臍右有動氣按之若痛苦咳𠻳熱也吐納法肺病用呬呬為㵼吸為補先調氣令和以鼻㣲長引氣然後呬之令自耳不聞呬聲聞則㵼之大過也大呬三十六遍細咽十二遍能去肺家勞熱凡一切逆氣咳𠻳皮膚瘡瘍四肢煩疼鼻塞胸背痛皆宜數呬之疾愈則止過度則損矣大凡呬嘘呵吹呼俱宜向西北徐向東南三吸生氣以補之導引法可正坐以兩手據地縮身曲脊向上三舉能去肺家風熱積勞亦可反拳搥脊上左右各三五度去胸臆間風毒閉氣為之良久瞑目嚥液三叩齒而止肺部食忌七月勿食茱茰成血痢八月九月勿食薑并諸物肝心肺肺病宜食黍禁苦味養肺法言肺最在諸臟之上而諸臟之氣咸由之以吐納也惟氣得所養則鼻息調勻肺嘗滋潤故魄與之俱凝而睟然見於面盎於背皆於肺氣驗之也是故善養肺臟者莫要於養氣治肺要法凡肺之得病必先觀心脾二臟之虚實盖心火尅肺脾土生金子母鬼賊之義也診其脉心脾既和然後察肺家之虚實以調治焉脾臟歌脾臟象中坤安和對胃門旺時隨四季自與土為根磨穀能消食榮身命本温應唇通口氣連肉潤肌臀形扁纔三五膏凝散半斤順時脉緩慢失則氣連吞實夢歌懽樂虚爭飲食分濕多成五泄腸走若雷奔痞氣冬為積皮黄四體昏二斤十四兩三斗五升存脾臟圖說脾土宫也揜大倉在臍上三寸丈夫七十脾氣虚而皮膚枯痩也脾者肉之本意之處也涎者脾之液腎邪入脾則多涎胃與脾合為穀府口為脾之官脾氣通則口知五味脾病則口乾不能食不知五味脾合于肉則榮肉也脾之合也肌肉消痩而不能肥脾先死也脾之於胃如轉磨也化其生而為熟也食不消脾不轉也食堅物者脾磨不盡化則為食患故諸臟不調則傷質傷質則損神此傷人之速也故不欲食堅物者養身之妙道也人之欲不食者脾中有不化之食也人多惑者脾臟不安也人之多食脾虚也人之食不下者脾寒也人之無顔色者脾傷也人之好食甘味者脾不足也人之明潤鮮白脾無病也肝邪入脾則多歌脾病濕宜食苦以燥之欲緩食甘以緩之甘則補之苦則㵼之禁燥相脾病法脾熱者鼻赤色黄而濡脾病者體上逰風習習遍體悶疼身重善飢肉萎足不能行喜聲脚下痛脾虚腹吐脹鳴成溏痢食多不化脾寒之疾多汗惡風身體怠惰四肢無力不用癥黄不嗜飲食診在鼻其色黄旺于季夏足太隂陽明主治其日戊巳又脾病證當臍有動氣按之牢苦痛逆氣小腸急痛洩不定重脛寒吐納法脾病用呼法同前數能去脾家一切冷氣發熱霍亂宿食不化偏頑痺腹内結塊疾愈則止導引法可大坐伸一脚屈一脚以兩手向後反掣三五度亦可跪坐以兩手拒地囘顧用力更視各三五度能去脾臟間風邪喜食為之畢良乆閉目三嚥津三叩齒而止脾部食忌六月勿食茱茰令人患赤白痢四季勿食諸物脾肝羊血宜食粳米棗葵禁酸養脾法言脾居五臟之中出納穀氣以輸貫四肢百骸者也欲養脾者須節爽口之物慎無邪之思則外不傷乎飲食内不傷乎思慮而脾可永安矣治脾要法凡脾之得病必先察肝心之虚實而調治之其義同前總論五臟時調攝法肝主春足厥隂少陽主治其日甲乙肝苦急急食甘以緩之心主夏手少隂太陽主治其日丙丁心苦緩急食酸以收之脾主長夏足太隂陽明主治其日戊巳脾苦濕急食苦以燥之肺主秋手太隂陽明主治其日庚辛肺苦氣上逆急食苦以泄之腎主冬足少隂太陽主治其日壬癸腎苦燥急食辛以潤之開腠理致津液通氣藏惟有五府獨有六者何也然所以府有六者謂三焦也有原氣之别焉主持諸氣有名而無形其經屬手少陽此少府也故言府有六焉經又言府有五藏有六者何也六府者止有五府也然五藏亦有六藏者謂腎有兩藏也其左為腎右為命門命門者謂精神之所舍也男子以藏精女子以繫胞其氣與腎通故言藏有六也論三焦三隧三焦固為六府之一而水穀入胃其糟粕精液實之為三隧也夫宗氣者真氣也真氣受于天與穀并充于身宗氣搏而不行積于胸中命曰氣海行于上焦出于肺循喉嚨以貫心脉而行呼吸焉呼則出吸則入其大數常出三入一營氣水穀之精氣也出于中焦泌糟粕蒸津液化其精㣲上注之于脉以應刻數調和于五藏灑陳于六府乃化而為血以榮四末奉生身貴莫貴于此得獨行于經隧中常榮無己衞氣者水穀之悍氣也其氣慓疾滑利不能入于脉行于四末循分肉皮膚之間熏于肓膜散于胸腹而不休宗氣行于上焦營氣出于中焦衞氣出于下焦是三隧分于三焦各一其行也論三焦有形蘇黄門龍川志云彭山有隠者通古醫術與世諸醫用法不同人莫之知單驤從之學盡得其術遂以醫名于世治平中予與驤遇于廣都論古今術同異驤既言其略復歎曰古今論五臟六腑其說有謬者而相承不察今欲以告人人誰信者古說左腎其府膀胱右腎命門其府三焦丈夫以藏精女子以繫胞以理主之三焦當如膀胱有形質可見而王叔和言三焦有臟無形不亦大謬乎盖三焦有形如膀胱故可以藏有所繫若其無形尚可以藏繫哉且其所以謂之三焦者何也三焦分布人體中有上中下之異方人心湛寂慾念不起則精氣散在三焦榮華百體及其慾念一起心火熾然翕撮三焦精氣入命門之府輸㵼而去故號此府為焦耳世承叔和之謬而不悟可為長太息也予甚異其說後為齊州從事有一舉子徐遁者石守道之壻也少嘗學醫于衞州聞高敏之遺說療病有精思予為道驤之言遁喜曰齊嘗大饑羣㓙相臠割而食有一人皮肉盡而骨脉全者遁以學醫故往視之其五臟見右腎下有脂膜如手大者正與膀胱相對有二白脉自其中出夾脊而上貫腦意此即導引家所謂夾脊雙關者而不悟脂膜如手大者之為三焦也單君之言與所見懸合可以正古人之謬矣今醫家者流皆執叔和三焦無狀空有名以自信不聞有此說故録之按叔和言三焦有名無狀容忩所録則言脂膜如手大與膀胱相對是有形狀之可覩矣然黄帝書云上焦如霧中焦如漚下焦如瀆又扁鵲曰焦原也為水穀之道路氣之所終始也上焦在心下下膈在胃口上中焦在胃中脘不上不下下焦在臍下當膀胱上口是三焦各有在也雖有形狀而止以一處言之可乎哉或者如仲景所云下焦不和清溲重下此特下焦之一處乎故併存之以俟知者五臟六腑之位五臟者心肝脾肺腎也六腑者小腸大腸膽胃膀胱三焦也肺最居上為臟之華盖六葉兩耳主藏魄心在肺下其體半葉如未開蓮花上有七孔三毛主藏神心下為鬲鬲下有胃主藏水穀胃左有肝左三葉右四葉主藏魂膽在肝之短葉間有精汁三合胃右有脾主藏意胃下為腹大腸當臍右㢠廻十六曲小腸左㢠廻疊積十六曲主傳溲便二腸之下為臍臍下為膀胱主藏溺背脊骨節第七之下有二腎左者為腎主藏志右為命門主藏精故曰臟者藏也腑者聚也五臟六腑之官心者君主之官神明出焉肺者相𫝊之官治節出焉肝者將軍之官謀慮出焉腎者作强之官技巧出焉脾胃者倉廩之官五味出焉膽者中正之官决斷出焉膻中者臣使之官喜樂出焉小腸者受盛之官化物出焉大腸者𫝊道之官變化出焉膀胱者州都之官津液藏焉氣化則能出矣三焦者决瀆之官水道出焉凡此十二官者不得相失也主明則下安以此養生則壽没世不殆以為天下則昌主不明則十二官危使道閉塞而不通以此養生則殆以為天下者其宗大危戒之戒之故曰心者一身之主宰萬事之本根也五臟之候目者肝之外候肝氣通於目目和則辨白黑矣鼻者肺之外候肺氣通於鼻鼻和則知香臭矣舌者心之外候心氣通於舌舌和則知五味矣口者脾之外候脾氣通於口口和則知穀味矣耳者腎之外候腎氣通于耳耳和則知五音矣五臟之竅東方青色入通於肝開竅于目南方赤色入通於心開竅於舌中央黄色入通于脾開竅于口西方白色入通於肺開竅于鼻北方黒色入通于腎開竅于耳及二隂故清陽出上竅乃氣道呼吸之間濁隂出下竅乃便溺𫝊㵼之所五臟所入肺主聲入心為言入肝為呼入脾為歌入腎為呻吟自入為哭肝主色入肺為白入心為赤入脾為黄入腎為黑自入為青心主臭入肝為燥入肺為腥臭入脾為香臭入腎為腐臭自入為焦臭脾主味入心為苦入肝為酸入肺為辛入腎為鹹自入為甘腎主液入心為汗入肝為涙入肺為涕入脾為涎自入為唾五臟所養肺養皮毛心飬血脉脾養肌肉肝養筋膜腎養骨髓五臟化液心為汗肺為涕肝為淚脾為涎腎為唾五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥五精所并氣并于心則喜并于肺則悲并于肝則憂并于脾則畏并于腎則恐五勞所傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋五臟生成心之合脉也其榮色也其主腎也肺之合皮也其榮毛也其主心也肝之合筋也其榮爪也其主肺也脾之合肉也其榮唇也其主肝也腎之合骨也其榮髪也其主脾也五臟應時帝曰五臟應四時各有収受乎岐伯曰有東方青色入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞其穀麥其應四時上為歳星是以春氣在頭也其音角其數八是以知病之在筋也其臭燥月令作羶南方赤色入通於心開竅於耳藏精於心其病在五臟其味苦其類火其畜羊其穀黍其應四時上為榮惑星是以知病之在脉也其音徴其數七其臭焦中央黄色入通於肺開竅于口藏精于脾故病在舌本其味甘其類土其畜牛其穀稷其應四時上為鎮星是以知病之在肉也其音宫其數五其臭香西方白色入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬其穀稻其應四時上為太白星是以知病之在皮毛也其音商其數九其臭腥北方黑色入通於腎開竅於二隂藏精於腎故病在谿其味鹹其類水其畜彘其穀豆其應四時上為辰星是以知病之在骨也其音羽其數六其臭腐故善於脉者謹察五臟六腑一逆一順隂陽表裏雌雄之紀藏之心意合心於精非其人勿教非其真勿授是謂得道五臟所主肺主身之皮毛心主身之血脉肝主身之筋膜膜者人皮下肉上筋膜是也脾主身之肌肉腎主身之骨髓五臟所欲心欲苦合火故也肺欲辛合金故也肝欲酸合木故也脾欲甘合土故也腎欲鹹合水故也五臟圖文備記黄帝謂岐伯曰夫人受天地之氣以生氣之凝也謂之精精之遘也謂之靈靈之發也謂之神神之化也謂之魂魂隨神往来謂之識並精出入謂之魄主榮積魂謂之心心有所從謂之情情有所屬謂之意意有所指謂之志志有所憶謂之思思之有所逺慕謂之慮慮而事成謂之智智者盡此諸見者焉孫思邈曰髪宜多擲齒宜數叩液宜常咽氣宜常煉精宜常存大𤣥經曰喜怒損性哀樂損神性損則害生故養性以全氣保神以安身氣全體平心安神逸全生之訣也臟腑總論夫天主陽食人以五氣地主隂食人以五味隂陽相成結為五臟之氣藏入四肢十二部三百六十關節引為經脉津液骨髓藴成六腑三焦十二經通為九竅可見五臟為人形之主一臟損則百病生五臟損則百形㓕故云五臟者神明魂魄志意之所主是以心主神肝主魂肺主魄脾主智腎主精發外為五事若能存神修養克己勵志其道成矣五臟之氣於何發起通於何許曰五臟者上關于九竅也故肺氣通於鼻鼻和則知香臭矣肝氣通于目目和則知黑白矣脾氣通于口口和則知穀味矣心氣通于舌舌和則知五味矣腎氣通于耳耳和則知五音矣三焦之氣通于喉喉和則聲鳴矣五臟藏于中者難知九竅通于外者易見即其通于外以察其藏乎中者亦易易也况口之于味也目之于色也耳之于聲也鼻之于臭也喉舌之于聲音也尤有易知者在乎雖然五臟九竅合外内之道也惟心不在焉則視而不見聴而不聞食而不知其味果于此握其養徳養生之樞焉則一以貫之何病之有人身中毛竅八萬四千氣宫三百八十四毛竅散屬氣宫臍中氣宫又為三百八十四官之主降于陽宫皆為精心為中田項為上田舌下𤣥膺目中有銀海額之中眉之間口鼻之衝目之畔咽喉之側腰脇中皆竅也豈曰人一身止有此九竅哉數者腑也遲者臟也數則為熱遲則為寒諸陽為熱諸隂為寒故以别知臟腑之病也臟主藏積腑主納物臟實而不滿腑滿而不實是以陽受之則入於六腑隂受之則入於五臟故腑病易治臟病難治也但熱為陽屬腑寒為隂屬臟然矣若寒自外感非隂屬之腑而熱自内生非陽屬之臟乎隂中之陽陽中之隂尤不可不辨圖書編卷六十九
