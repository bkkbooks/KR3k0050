十八里煩沖外廬溪十二里險峻淳辰溪八里溆浦三十四里險峻淳沅州二十六里險淳煩沖屬黔陽二十二里麻陽七里險峻與苗雜處僻簡其形勝諸蠻咽喉武陵障蔽重同複嶺地連嵠洞其俗巴渝同俗信鬼滛祀刀耕火種永州府其名漢零陵晉營陽山川險易其屬州一縣六附郭零陵二十八里冲淳外祈陽十三里民頗惡東安八里險淳僻道州三十五里山險地豐民淳煩僻屬寧遠六十三里山險有瘴刁煩永明十八里瘴淳江華四里瘴淳其形勝南九疑北衡岳接五嶺凑三湘控百粤瞰重江其俗參越兼蠻風浮信鬼靖州其名宋渠陽二十九里山多高深有瘴刁煩其屬縣三會同二十八里通道五里有瘴民薄綏寧三十五里瘴多民悍沖煩僻其形勝據夷播叙三州之境牂牁武溪之間百蠻襟喉辰沅寳武之藩籬其俗要約以木鐵為契淳儉尚鬼郴州其名漢桂陽郴江山川有瘴刁其屬縣五永興二十里瘴淳宜章七里興寧十五里桂陽十五里桂東五里其形勝山竒變水清㵼引衡岳𢃄九疑其俗脆薄愿朴魁竒忠信施州衛二里領民軍千户所一曰大田宣撫司四曰施南三里曰散毛三里曰忠建曰容美又安撫司八長官司七又𨽻容美之長官司四其形勝山明水秀巴荆之會其俗離夷獠近華風伐木燒畬捕獵魚獸男不裹頭女衣花巾永順軍民宣慰司二里𨽻湖廣都司領州二長官六其形勝東抵荆湘西通巴蜀南近辰陽北距歸峽其俗短裙椎髻裔出槃瓠銅鼓祀神常𢃄刀弩刻木為契五色為衣保靖州軍民宣慰司一里𨽻湖廣都司領長官二其形勝四山環抱澗水中流其俗刀耕火種喜食腥膻湖廣承宣布政使司領府十五曰武昌鄂渚江夏郢州北新州武昌軍武昌路武清軍淳煩衝曰漢陽江夏郡沔州漢陽郡裁多訟曰黄州齊安永齊寧樂陎城西陵重慶西湯衡州永安黄州路刁悍徤訟難治曰承天郢中雲杜南司北新郢州石城富水民淳地簡饒瘠相半曰德安安陸漢東荆州澤藪雲夢南司安滇州安黄接度宣威安遠軍簡淳曰荆州郢都南郡江陵荆南新郡重鎮南都荆湖中興路衝難治曰岳州麋國羅國巴陵岳陽長沙郡建昌巴郡華容軍冗衝疲曰鄖陽裁減土薄民淳好訟煩衝曰襄陽荆州治南雍州襄州山南道行台忠義軍襄陽路曰辰州沅陵長沙武陵盧溪西陽江口荆州路州路頗饒淳曰常德武陵黔中建平武沅朗三州義陵常武武王武順武平常德軍曰衡州湘東長沙桂陽湘廣二州東衡州衡陽衡山衡州路衝繁曰永州零陽營陽衡淳豐曰長沙荆楚黔中湘州星沙熊湘三湘潭州欽化武安軍曰寳慶邵陵資冮建州南梁州邵州敏州悍險州二曰郴州桂陽郴州路山川山有瘴刁一十四里曰靖州黔中溪峒誠州靖州渠陽山多高深有瘴刁煩初置十四府嘉靖龍飛升安陸州為承天府置鍾祥縣而割荆門州沔陽州縣附屬之是為十五府處置湖廣襟𢃄江湖澤多田少民俗慓輕鮮思積聚且道通九省冠蓋輻輳郵驛苦之即今宗室日繁徭賦日重採辨之後財力愈難故其民率啙窳而難治此其大較也武漢德安民貧地瘠承天陵寢所在費冗事繁荆岳潛沔之間頻遭水患盜且乘之近日鄖襄大水盡損因廬則又向來未有之變長沙地雖稍沃稅糧甲於他所黄州澆頑常德困憊辰沅半為賊穴麻陽溪洞諸蠻連結永保每肆刼爭去嵗支羅之害實縁於此長永僻饒寳慶簡靜庶幾可為非復曩時比矣加志窮民者其尚思援拯之䇿也形勝江陵楚所都古為霸國大江居其前漢水經其後經云更有江陵楚兩都從來只霸圖是也議處湖課楚湖池最多舊屬課程久多湮塞地極肥饒乃皆為豪富所有其册厯可考也議處水患楚之水有三曰九江曰岷江曰漢江而漢水之患為甚此無他以東西無所洩而且值泥沙之易淤也今之議江者在捍禦而以施之漢水則難矣必也疏水筩之水則上流易行間沙洋之口則下流易達此治水之䇿也議處楚邊楚之邊有三曰靖州曰清浪曰鎮筸而鎮筸之地為要此無他以川貴相株連而且當麻陽之出没也今之議苗者在防守而以施之鎮筸則舛矣必也離哨兵土司之糾結則黨援可孤清永順保靖之逋逃則奸慝易息此治苗之一䇿也楚均田議楚疆遼逖度一邑地可當東南一大郡當天下初定井廬寥濶原野荒穢故經界靡及焉計今闢地十倍蓰於國初而藉額嵗縮德靖以來遞削至數十萬夫土無盈虛避新闢之税匿已定之田此大不均者一鄂州中廬沙羨常武南交麋蘄之間皆諸侯王封國也分茅之始錫以土疆其籍藏於内府有司不得窺虞芮之田往往没入其國比於湯沐食邑不可勝數皆各為私奉養焉不闗於天下之經費此大不均者二楚故饒湖利而滄桑徙易靡常昔為菹茹今稱沃衍者不啻萬萬荆郢尤甚大姓與游民强有力者據之計畝歳入數鍾專其厚積坐攫齊民食亡租稅而苦積逋者曽不得以塗足而收半穗彼獨非王事哉而吏不敢問如河南南陽此大不均者三屯非獨楚有也而楚之屯非昔之屯矣按制每軍給屯五十畝有竒今屯浮者什伯其額此非獨依山濵水之地耕新墾遺也蓋亦占射焉夫屯軍不能世其業輒質之民民利其賦薄無他役即以己所有之民田更籍為軍歴數十傳不可窮竟所謂民竄於屯屯竄於民者非耶此大不均者四先是山澤之羨率棄不理今則臯隰原阪耕者鱗集甚至叢菁幽蓽人力所不能通者亦皆累累象耕鳥耘稱常稔焉乃聽其封殖自利幾世幾年不問所收此大不均者五五者弊也而非所以弊也其失在庸有司與舞文之吏不軌之民曰飛詭曰影射曰懸虛曰那移曰隱没曰兼并其奸狀若蝟毛務欺謾以逃其課以故富者連阡陌而嫁稅於貧貧者或不厭糠秕而代富人輸此大不均者六故曰今日田賦之當均未有甚於楚者也請即一二所目覩者商之兼併濫冒詔㫖常懲之而今偷翫繩約狃習故智者何衆也楚諸侯王誠賢顧貴倨不習外事閹監取累代圉奪者以為故籍而豪氓巨𨽻挾高貲以相夸詡不可殫記彼單門層户僅僅以身守世業者百無一焉豈惟違兩觀之束偪有司之權將漫漶恩澤之謂何矣宜令憲使者明敕條章無論士若民按一切匿産亂籍隱畝避役之罰亷其尤者下之吏以顯示天子㫖夫然後倣限田均田之議以稍品節之法庻幾可守哉墾荒招流詔㫖嘗督之而今草莽封盈户口銷亡者何衆也考之令甲荒間以業貧民占籍以附流徙畸零以寄寒細良規美政邇來里社漸縮於舊占籍畸零百不存一而墾田之數率皆便文以罔上則勸罰之未明而招􅝘之未至也夫荒間易闢而不易守亡徙易還而不易安鏄銍未施有司已履畝而稅之煬突未黔有司已按籍而驅之民是以憚於歸耕而溺於偷惰有田卒汙萊耳宜嚴飭所司嚴偽増之罰科重開疆之勸格土曠矣召田以廣其來召佃矣免租以固其存免租矣弛役以優其力則歸耕之民纍纍而至而地力有不盡者否也全楚習俗全楚之賦各郡不同然傳有之田下而賦上者人功修也又曰率賦上下是賦之第一等也楚之人功在夏時不為之惰土之田稅在夏時不為之腴曰田腴者自人功之修始也今乃田腴而民惰焉是所甚可念也即是而湖塘户口可知也全楚之俗各郡不同然志有之曰民淳而事簡民之淳自不見其事之多事之簡益可見其民之淳曰悍戾者自風尚之㑹始也今仍慓疾而無畏焉是所甚可慮也即是而㓂竊詞訟可知也所以然者何也全楚之域俗其五方而地聨八省者也魚稻麻縷之所出舟車貨利之所經故不知耕織之勞兼併之所富田里之所殖故不知鄉遂之樂不知耕織之勞者多為豪民即游民皆坐而衣食者也以坐而衣食之人不聞力田尚農之政則農桑之民日寡富民有田而無丁貧民有丁而無田富為貧者逋逃之藪而檄其鬻售知兼併而不知盡地之利貧為富者佃作之客而終運地方知苟活而不知盡農之功吾見田賦弊滋逋負自積水政多缺陂塘不修富不增丁貧者愈耗是以田賦也湖塘也丁口也其所以多負所以無備所以虚耗其原實出於一也都鄙為民藏息之藪故多以書數文法為終身之技鄉遂為民誇詡之地故多以道卒胥徒為里巷之榮自身寄窟穴而木訥者變為强悍之民自身習文法而淳朴者變為剽輕之民非恃其强即恃其智皆痼於習尚者也以痼於習尚之民而不聞孝弟興行之教則薄惡之風日熾剽悍之所引即游手之徒窟穴之所與即豪右之侣游手衆而無所忌憚豪右結而日行其私無知者為悍戾不顧者為攘竊不畏者為訐訟者以風俗也詞訟也所以悍戾所以充斥所以繁多其原亦出於一也力田尚農之政既不修矣而吏於下者以繭絲為稽績之課不從則横征而痛警之警之是也然此所以勝民非以裕民也孝弟興行之政既不修矣而吏於下者以刑獄邀公法之民不從則鍜鍊而周納之納之是也然此所以服人非以養人也吏治至此亦無惑乎其然也豪游習聽之人久成氣習而長吏之至乃務徼聲名以汲汲遷去之官而馭久成氣習之民間有欲使田里以安其業仁讓以綴其恩以求為循吏者而或歎其時有所不暇也不然則炫能伐異之政急疾取辨之時而有曰力田有曰孝弟非遷即偽聽令之人且掩口而笑而宋時力田民之最勞孝弟匹夫匹婦所不悅且宜其然矣賦役議荆湖之民惰者不能耕而本業日虧貧者不知販而生計日縮其駑鈍者甘於為傭而鷙悍者流而為劫於是賦之不知盈其額而役之有不能任其力者矣為今之計富則畧倣建中兩稅之移意户無主客以居為簿丁無上中以産為差不至如陸敬輿所謂計估筭緡失平長偽挾輕資者以徙而為脱敦本業者以在而倍誅其亦可以均賦乎役則踵行熙寧僱役之成規官任其募而横費省民出其直而休暇多不至如馬端臨所謂睥睨朶頤徵求凌蔑官以役之貧富為宦況之豐嗇户以差之繁省卜家道之衰隆其亦可以均役乎嗟乎會計之目唐獨精於東南以兵資徧也差役之條宋獨詳於荆湖以民力薄也由吾二者之説酌而行之一年而事役均十年而庻功興其或可以有效於今乎圖書編卷三十九
