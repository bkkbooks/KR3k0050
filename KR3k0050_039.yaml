body:
  text: 圖書編卷三十九明章潢撰江西圖敘江西古揚州地當吳南直𨽻楚湖廣閩福建粤廣東之交險阻既分形勢自弱安危輕重常視四方若保境和民則九江獨據上流牽至沿江州郡且密邇南康濱臨巨湖鄱陽湖盜舟四出不可無備南南安贛贛州之間則汀漳汀州漳州俱福建屬府雄韶南雄韶州俱廣東屬府諸山㑹焉連州跨境林谷密茂盜賊之興斯為淵藪故設巡撫重職提師以臨之袁州地僻長沙湖廣屬府逋民客户頗難譏察而南昌建昌饒州宗室固在民疲供億視臨臨江吉吉安信廣信撫撫州諸郡代有加焉故凡江西之民樸質儉苦有憂勤之思𢎞治以來賦役漸繁土著之民少肚者多不務穡事出營四方至棄妻子不顧而禮俗日壞惡少間出矣沿革古揚州地漢領以揚州部刺史唐𨽻江西道開元中分為江南西道置採訪處置使治洪州後改採訪為觀察治仍舊宋置江南西路安撫使以隆興守臣兼領又置江西提㸃刑獄司治贛州元於隆興路置江西等處行中書省及江西湖東道肅政亷訪司本朝置江西等處承宣布政使司都指揮使司提刑按察司並治于南昌云江西等處承宣布政使司治南昌左右布政使二清軍一左右叅政三分守二督册一左右叅議三糧儲一分守二領府一十三州一縣七十三總為里九千九百五十六里半户一百五十八萬三千九十七口七百九十二萬五千八百二十五夏稅米麥八萬八千五十九石五升八合三勺秋糧官民米二百五十二萬八千三百五十五石八斗二升絲八千二百三斤絹一萬一千五百一十六疋布一千三百四十一疋鈔九千九百七十九錠江西都指揮使司𨽻前軍都督府都指揮三内掌印一僉書二㑹昌鄱湖守備二領衛三屬所一十五守禦千户所一有二百户所一本都司所屬馬步官軍一萬二千七百員名儀衛司二提刑按察司按察使一副使六内提學一兵備三清軍驛傳二僉事七分巡五屯田一分道五南昌湖東湖西九江嶺北欽差巡撫都御史一駐南昌提督南贛等處軍務都御史一駐贛州巡按監察御史一或清軍一駐南昌王府二淮府仁七封韶州徙饒州郡王十益府憲五封建昌郡王三江西各府州縣煩簡南昌府其名漢豫章隋洪都宋隆興人皆勞悍相半事煩訟多其屬州一縣七附郭南昌五百九十三里冗訟新建二百十四里冗訟外豐城三百七十三里陸冲冗進賢二百八里陸冲冗奉新一百四十九里僻簡刁靖安二十八里貧簡武寧五十六里鄙野盜寧州九十八里僻刁訟其形勝咽扼荆淮翼被吳越江湖之間東南都㑹其俗講誦為業衣冠萃止勤生嗇施薄義喜爭饒州府其名秦鄱陽多訟尚狡其屬縣六附郭鄱陽三百二十一里冲外餘干一百五十四里山多盜冲樂平二百四十三里地廣盜多奸偽訟盛浮梁一百十三里土厚通商不冲德興七十二里僻處山谷安仁八十二里冲淳萬平六十四里簡其形勝廣谷大川吳楚冠冕洪巖鬱葱叢玉森秀其俗嘉儒好事文獻相續廣信府其名唐上饒民近淳訟頗簡冲其屬縣六附郭上饒一百二十里民淳煩外玉山六十里刁煩弋陽七十五里刁煩貴溪一百十九里刁煩鉛山五十七里淳煩永豐六十四里多盗刁僻簡興安二十一里頗衝兇頑難治其形勝川源夐遠關防襟𢃄吳楚閩越之交東南鎮其俗土風貧薄文風日盛安土重業矜謹節義南康府其名星渚匡廬地窄田少民貧事簡其屬縣四附郭星子二十九里外都昌五十九里地窄民貧建昌一百三十七里地惡民强安義四十六里僻其形勝控五嶺壓三吳匯岷江瀦彭澤匡廬竒秀甲天下其俗淳固樸實土瘠民貧九江府其名晉潯陽隋九江民貧土瘠淳奸相半訟多糧少水陸冲其屬縣五附郭德化十六里裁德安十八里簡瑞昌十四里簡湖口十七里簡彭澤十八里簡其形勝左匡廬右江湖勢擬溟岳衝要襟喉其俗尚樸崇禮勤耕習書建昌府其名旴江建民俗淳厚易治其屬縣四附郭南城二百五十三里淳外新城七十八里淳南豐一百二十一里淳簡頗有瘴廣昌二十四里簡糧輕廬溪新設其形勝兩粤七閩相為犬牙五嶺三吳江山炳靈其俗風氣和平比屋絃誦人物秀特性悍好爭撫州府其名吳臨川訟煩事冗其屬縣六附郭臨川四十八里訟煩外崇仁二百二十三里簡僻金谿一百二十五里僻煩宜黄六十八里僻刁樂安二百一十六里窄東鄉一百二十里簡僻其形勝瀕汝為郡居山川風雲之㑹介江湖之表其俗民樂耕桑風流儒雅臨江府其名宋臨江多訟煩劇其屬縣四附郭清江二百五十三里沿江煩外新淦二百二十五里沿江煩新喻二百六十七里僻簡峽江一百八十二里其形勝碧嶂清江四㑹之衝其俗尚禮崇德勤力知分吉安府其名漢廬陵安成螺川政事旁午古稱難治其屬縣九附郭廬陵六百三里外秦和二百六十里濵江煩冲吉水四百三十二里朴淳沿江煩永豐三百二十六里僻居山谷刁安福二百三十四里煩刁龍泉六十三里僻刁萬安九十七里沖永新一百八十三里僻刁詐永陵四十二里簡其形勝東挹蒙岡南據牛嶺江山映𢃄據江上流其俗龎淳多壽儒術為盛士秀而文民險而健瑞州府其名唐高安宋瑞陽奸頑嘯聚訟多煩其屬縣三附郭高安二百八十六里煩外上高一百六十七里僻新昌一百二十三里僻居山民刁其形勝負鳯山面錦水斷崖深壑遶水環山其俗務本勤穯樂鬬尊巫不嚚於訟袁州府其名隋宜春糧多逃欠尤甚其屬縣四附郭宜春一百五十里淳簡外分宜一百八里淳簡萍鄉一百三十一里萬載一百四里僻刁詐其形勝山水秀麗江右奥區其俗事簡民淳贛州府其名章貢宋贛城地險山多盜賊出没時有瘴癘民訟煩甚其屬縣十附郭贛一百十一里淳簡外雩都十四里刁野信豐六十里淳簡興國七十七里刁㑹昌九里流賊時發安遠五里多流賊寧都一百一十七里刁訟瑞金八里簡龍南五里流賊出没石城十二里簡定南新設四里長寧新設四里其形勝山長谷荒江湖嶺海樞鍵其俗火耕水耨輕生好鬬抗志厲節南安府其名横浦人雜居時有瘴癘民野好訟糧少難徵其屬縣四附郭大庾二十六里半冲簡外南康三十二里冲刁上猶二十一里半頑山多盜崇義七里其形勝交廣襟喉五嶺最東其俗民氣淳古士果而義處置江西界吳楚閩廣之間土薄民勤俗尚儉嗇頗稱安壤南昌省㑹衝繁吉安健訟奸狡至於豪右掣肘田糧逋負則二郡同也南贛宻邇閩廣巢㓂時發而贛當其衝故軍門兵備叅將在焉饒州南枕彭蠡九江東據上流江湖水㓂四出為患而饒郡内有藩封邑多頑梗瑞州地窄民頑撫州訟繁多盜袁州臨江建昌廣信頗稱饒富第袁州界湖土民時有爭奪處置為難故江湖水㓂當責撫臣南贛山㓂當責督臣有司又能輕徭薄賦養而教之瘠土勞瘁之民庶幾其有瘳乎九江據金陵上游湖口為鄱陽湖綰轂厥險在澤關津之當警者也其更添舟師而耀之武乎玉山為入浙之衝鉛山當入閩之扼厥險在陸門户之當嚴者也亦嘗飭亭鄣以示之限乎長寧蓋萬山之中反側子初定設竄匿其中戍守稍不慎不復蹈寧州之轍乎是不可不預為之防也全省險要江西延袤割屬厯履不類不可詳道今制所分𨽻大都境内南壮一千九百里東西一千二百里南昌北負大江依湖東北為饒州盡浮梁東下廣信窮玉山最南南安沮嶺稍轉而西袁州際萍鄉西北則九江界瑞昌此其五大門户也國家初定天下更置衛所藩屏凡西而南皆設衛如袁如九江如贛而東皆設所如信如饒豈非以楚有洞庭長沙郴衡之險為江上流盜所根盤而東則浙與徽皆平安號無事者可稍簡易為防哉鄱湖固大澤壓四郡之境春夏水溢𣺌茫萬頃則波濤蕩潏不可湊泊秋高水落堘埂微露則又千條萬港舟一入其中鬼伏神藏不可周詰而奸民聚居則行賈風泊不可安致甚或剽刼大姓不逞無忌捕急則入匿其中國家巡司之建一省百一十三所而沿湖者一十有四蓋謹之也他諸嶺北邇廣建信接閩皆萬山盤迤官府捕𨽻足跡之所不能至民窮或負釁逃入其中教之摶噬出入事連數省則彼此相持莫之誰何彼方恃其窟穴而有司又以逋負急征之無罪虐厲易生其憤心聚而得志其為隱憂豈可一二數哉其勢非有以剪截之究詰之則且聚不散此非不見形影露端倪也而言無害者冀茍安枕耳故江西大勢凡四鄰有警皆所可畏而湖口尤為咽喉境内有警皆一可慮而贛州尤為樞機蓋大江之舟入自湖口則乘風南指不啻驚四郡也倐忽上下一省皆震贛州據上流方舟而北猶建瓴也而數郡皆糜爛矣正德初年巡按御史臧公鳯上言四事一謂假兼制以安地方南贛二府接連三省流賊出没東西北方不相綂攝文移約㑹動淹旬月以致賊多散逸事難就緒今命都御史兼制四省按境府州隨宜調度則奏可施行而其後御史楊公必進亦上疏畧曰南京根本重地淮揚諸衛悉屯重兵所以備淮海也荆蜀江漢㑹於九江而贛吉撫饒匯于鄱湖口國家於九江開府置衛又置兵備以專守之而湖口曽無一卒之戍非全䇿也請於湖口増設一軍而以九江鈔闗餘積各置戰船百艘俾相為應援俾南康黄州二府𨽻九江兵備而巡江御史得以往來巡厯則荆蜀諸盗不敢窺九江贛瑞諸盗不敢窺湖口今南京江口雖有水操不過文具乞命操江都御史將水軍事宜詳議舉行其安慶九江蕪湖三處各以時演習水操則水軍可無憂矣江西閩廣之盜泛鄱湖而登陸則池之建德徽之祁門晝夜兼程五日可至金陵宜撥新安衛一所屯祁門池州衛一所戍建德復于要害隘險守以弓兵謹以烽堠則陸可無憂矣下兵部覆令南京内外守備官及撫按官㑹議以聞事竟不行二公慮誠深其于金陵之勢猶有闗涉而楊議竟不見實事豈非所謂冀茍安枕者哉防守要害江西延袤千里疆理而郡者一十有三法制畫一風俗樸淳垂二百年人庇綏靖宜無他患而乃有如桶岡姚源之為斯任事者之計失也何者桶岡之徒自廣而逋耕于横水雁湖山谷之間其初不過以起生業資蕃息也後以土地之故與我民遘爭强梁頑悍日益以甚郡縣吏乃束縛而操切之故彼自棄於我而阻衆稱亂耳姚源之徒固亦類此是以議者咎時之失計謂不當以我土地而資逋亡及其遘也又不當右我人民而督過之茍明其是非順其好惡則彼之心未必不協于我協於我而政令加焉雖胡越可使也夫桶岡姚源其往者也横峯之人自浙而入始業陶焉氣習頑獷生齒繁多則鼔禍煽爭遂為弋陽之患正德所專設郡倅分署其地而撫之振以社倉興以學校譏以保甲制至善也議者猶欲縣其地以圖久安乃以費之鉅而不果今者桀驁復悖以逞至執吏而質也夫横峰其小者也鄱湖匯合三江波濤瀰漫盗賊舸艦率以為歸遂為豫章諸郡之患國初常即康山置署設守偹以制之協以巡司邏以衛卒聨以期㑹制至善也議者又欲鄥子以扼要害乃以地之薄而不果今者桀驁益肆以横至殺越人而貨也夫鄱湖其小者也高砂之地山林深阻與岑岡三浰相入其人習於攻鬬而易於駭亂遂為龍南安遠之患正德時因其内附而以新民待之使自保伍而時其調役使自耕鑿而薄其征稅恩意之洽體綂之嚴制至善也議者又於羊陂為隘而戍以譏察焉其後譏察漸弛而隘不為賴今者桀驁遘禍連年至樹黨而援也夫以勢言横峯之僑寓不若鄱湖出没之難窺鄱湖之出没不若高砂割據之難馴彼之負固已然乃欲以縣一城而制其命愚未見其可也蓋幾有所必先紀綱是也今自時事所見而言則桀驁之徒恒托於市㕓而腹心之寄近及乎吏胥况㸃戌之頻士有怨心職制之分官無信地紀綱之弛如是盍考諸成制而申嚴之奈何而自弱其弱也夫以類言鄱湖之烏合不若横峯之保聚横峯之保聚不若高砂之遠交彼之觀釁已然乃示之必攻必滅而益堅其亂志愚未見其可也蓋情有所必明好惡是也今自時事所見而言則桀驁之徒猶戀其室家而毫髪之爭遂忘乎黨與故鼓義而動自殱其魁聞檄而泣自質其文好惡之端如是盍亦原其舊染而與新之奈何而必掩其類也議說營兵江右承平日久民不知兵邇者吳楚閩粤之間山箐溪洞之頑乘間竊發往歳流突臨吉諸郡已不勝其荼毒今思患預防俯從議請建中營於省㑹而以遊擊領之以待東西之應援建東營於南豐而以叅將領之以固吳楚之門户建西營於萬安而以守備領之以控閩粤之襟喉設險守固靡不悉至誠有不戰而屈先聲而禠者矣但各營召募非土著以之戌守則歳月之無期餽之糧餉恐供億之難繼故愚以為禦㓂而藉召募之兵則㓂未至而我益勞守望而資土著之民則㓂可待而我常逸昔人云屯兵十年五年無益言靡濫之可惜也又曰養兵十萬五萬可去言老弱之當汰也為今之計不必易民而教特教之者無其素耳誠能於精常二兵慎其揀選汰其老弱而後畀之閫師使之更畨操練專委任以責成之則人人皆壯勇也何患乎兵之不精哉不必加賦而益之特賦之者無其術耳誠于額編工食取之有時用之有節而實惠於民兵毋令冐破虛耗督逋負而禁絶之則時時有糗糒也何患乎食之不足哉議屯田水利夫江西為衛者三為所者十一而屯軍分𨽻歳計屯糧八萬六千有竒以充衛所之軍實當大有禆于國計者乃今一軍以上悉仰給於縣官軍未贍而民告病矣嘗求其弊則因册籍廢久轉相欺隱漫不可詰曰絶伍湮没也曰猾卒盗沽也曰民田棼錯也曰磽瘠鮮獲也又其甚者有田衛所勢不聮絡如南昌錯落於東流建德撫州分布于安仁餘干地遠業曠久無根柢也兼之督率者役什伍於私門收屯租於己槖致使按圖索糧僅如捕影或者以軍民株連告訐横出輒委之不問焉非計之得也昔唐韓重華為營田使東起振武西逾空州墾田三千八百餘里歳收粟二十萬石省度支錢二十餘萬緡彼時沿邊之地皆藩鎮所專猶行之得利若此况江省列在中土清理見在之田安得倡陳恕不測之言范睢栝牛之說乎是故按開屯之藉則欺隱之端可求勘原田之界則侵占之跡可檢田有肥瘠則履畝之稅不可以不别卒有老弱則番休之制不可以不明嚴清勾之法則逃亡之數可補申占役之律則私役之弊可革擇賢吏焉假之歳月不事摶擊以需漸理不撓浮議以責成功如是而屯政不修未之有矣江西列郡為州者一為縣者七十有二陂塘無慮數萬有竒以興一方之水利宜大有益於民事者乃今修濬方新而旋復壅决所在控告者月無虚牘而民事無補矣推原其故則以溝洫久廢互相因循莫為修舉曰富强自為葑殖也曰貧瘠苦於資計也曰勢分而衆心易媮也曰利鉅而當事易撼也又其大者則江湍湖滙勢易毁囓而平豐等處一决輒數百丈彭蠡四際一漲率為巨浸膏腴汙萊人謀無措也且職水利者奉上官之檄至捉里胥以文應致使旱乾水溢待命於天或者歸諸氣數適然委之無可奈何焉非民之利也昔唐韋丹為江西觀察築隄捍江為陂塘五百餘所溉田萬有二千頃功德被於八州兹江右之地皆當時故址彼既築以利民若此况于數百載之後求其故智安得藉口於杜亞先事之無功而並棄賈讓之下䇿乎是故在高原宜鑿池引水以資其利在下濕宜築隄開港以殺其勢門閘不復修舉壩堰之䇿猶可行也民力宜恤三時務農之後亦可勞也專利之禁必嚴而曲防者有罪議貸之令必申而惰事者無赦擇賢吏焉專其委任俾利建百年勿惜一時之費計安萬姓勿恤一人之讟如是而水利不與未之見矣湖廣圖敘湖廣古荆州地襄襄陽鄧今河南鄧州即襄陽北境抗其頭顱蘄黄州府屬州黄黄州引其肘腋江陵荆州制其腰腹伸膫向南亦足以雄是諸州矣鄖陽之保商陜陜西交界河南地方郴郴州桂本州桂陽縣之跨閩福建粤廣東辰辰州沅沉州所屬辰州府之捍蔽雲貴大江中貫五溪在常德辰州地方外錯荆楚扼塞斯其備焉蓋二儀效靈山川獻秀故王氣獨鍾于潜邸然襟江𢃄湖所至民罹水患㓂盜亦復乘之過此則永州寳慶之間謹備苗夷而矧宗藩棊布嵗賦實繁楚俗慓輕鮮思積聚於是四方流民失業者多赴焉故其民率啙音子偷隋之意窳音愈壞也而難治割洞諸蠻施州及永保所屬地方是本以漢法羈縻差易馴擾惟永順保靖世席富强每爭奪獲罪輒假戰功自贖奸謀偏構驕横滋萌朝議不明猥加徵發使遠方之民坐困且久而玩敵將貽異日之憂謂宜定令母輒輕發斯則善矣沿革古荆州地漢置荆州步刺史領南郡江夏長沙武陵桂陽零陵等郡國而不常所治東溪荆州初治漢壽夏治江陵唐貞觀中令以江南道開元間增置十五道採防處置使而山南東道治襄陽以諸郡𨽻之兼分入㸃中淮南及江南西道後改採訪為觀察其治仍舊永泰間始置鄂岳觀察使于鄂州宋置荆湖西北二路及京西二路安撫司以潭州江陵襄陽守臣兼領又於襄陽衡州潭州各置提㸃刑獄司元置湖廣等處行中書省及江南湖北道肅政亷訪司于武昌又置荆湖北道宣慰司及江南江北道肅政亷訪司于江陵置湖南道宣慰司及嶺北湖南道肅政亷訪司于潭州本朝置湖廣等處承宣布政使司而安陸州為睿宗獻皇帝藩封於此洪惟我世宗肅皇帝入繼大統遂陞為承天府桂興都焉及置都指揮使司行都指揮使司提刑按察司而三司並治於武昌則行都司分治于鄖陽云湖廣等處承宣布政使司治武昌左右布政二左右參政四抏苗一左右參議五大和山一領府一十有五屬州一十三縣九十三外直𨽻州三屬縣九里為