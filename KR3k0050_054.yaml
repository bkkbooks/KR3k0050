body:
  text: 圖書編卷五十四明章潢撰泉河總敘我國家臣一海宇都燕冀以制六合凡萬方小大羣工不問海內外可以浮航而至者罔不時獻方土百物以效順又歲漕東南粟四百萬餘石輸京師以充積貯咸由于會通一河會通界南北之中處其上遊視諸漕渠為最重漕渠若江淮衛白之水源遠而流長故無事于泉惟會通受汶泗沂而成近泉之委潤者不計焉是故泉涓涓甚微合十餘為沂數十餘為泗百十餘為汶汶故入海遏至南旺而中分之其北流者徑會衛白其南流者合沂泗以會江淮故東郡諸泉又會通之命脈也然則分水之于漕渠詎不謂尤重歟嗟夫漕海有風波之患漕江及河有陸挽之勞其視會通奚啻什伯也殆天隆景運河伯效靈開此億萬祀無疆之利以致萬國賓貢千艘順達繩繩而繼而無沒挽之虞所謂萬古永賴者非耶濟青兖三府諸泉總考山東凡發地皆泉其為漕河之利者不過三府十八州縣二百四十四泉也大𣲖有五三汶爭趨勢如飛㵼出萊蕪新泰泰安肥城東平平隂汶上蒙隂之西寧陽之北經南旺以南北其流者曰分水𣲖關係最重者也故首志之泗沂西下夾魯而南出泗水曲阜滋陽寧陽會汶與洸係堽城所分汶水以入元人所謂會源閘者曰天井𣲖關係亦重故次之鄒縣濟寧魚臺嶧縣之西曲阜之北諸泉通乎塂里黃良而下各入漕渠其濟魯橋一也則曰魯橋𣲖故又次之鄒滕嶧魚之流及昭陽湖分入沙河八泉入上沽頭統與沙河相近者也則曰沙河𣲖故又在其次沂水蒙隂及嶧縣許池泉會沂汶二河而下徑入古邳與黃河入淮曰邳州𣲖若黃河經徐吕而下則可以無若不經則可以有略在所緩故以是終焉𢎞治十四年巡撫山東都御史徐所以將蒙沂二縣夫役暫行革之其關係雖有重輕其實皆能利澤萬世者也故各疏其所出及其𣲖所由來以備參考云若夫因時之變遷酌勢之緩急而施疏濬之功則又在司泉務者加之意焉一分水𣲖凡二州七縣共一百零三泉舊泉八十一新泉二十二新渠溝六新河四一天井𣲖凡四縣共七十七泉舊泉六十一新泉十六一魯橋𣲖大𣲖一小𣲖五凡一州三縣共二十四泉舊泉十五新泉九一沙河𣲖其𣲖有四凡三縣共二十六泉舊泉二十新泉六一邳州𣲖其𣲖有三凡三縣共十四泉泉志所載泉百九十有一今增至二百四十上虞張公本所定圖次倣禹治水之意自流徂源新安王仲錫因之編為舊志竊以為自下流始者治河之法也至于濬泉不必盡然惟視關係以為緩急况禹之導淮渭不自源及流乎今既分為五𣲖所係有重輕其次序自明故先新泰次萊蕪次泰安次肥城次平隂次東平次汶上而後及寧陽者為其有天井𣲖也次泗水次曲阜次滋陽次鄒次濟寧次魚臺次滕而後及于嶧者為其有邳州𣲖也邳州𣲖雖在所裁亦當存之以俟將來故以蒙隂沂水終焉非敢以臆見紊之也泉源以陶泰徂徠諸山為主以其能出雲為風雨也若雨澤及時則可以不勞人力各處山河自足以供之而有餘若雨澤愆期則泉水亦各細微雖疏濬百方運河亦未免於涸也然則泉源固以南旺分水為緊要而陶泰徂徠諸山又南旺之根本也地高平則水疾泄故為堨以蓄之水積則立機引繩以挽其舟謂之壩地下迤則水疾涸故防以節之水溢則縋起懸版以通其舟謂之閘皆置官以司啓閉而聽其訟獄焉潦則命積土壤具畚鍤以備奔軼衝射涸則發徒以導閼塞崩潰而察其用命不用命以賞罰之南旺考南旺古大野既瀦之地舊以湖名方漕河未開直澤藪沮洳之區耳今堨汶至此界以長堤漕渠貫其中南北分流實上流之要會也守臣請以司泉者兼蒞焉可謂知所重矣當春夏之交雨澤愆期水利亦微茍啓閉或非其時勢如建瓴遂難停蓄霖潦暴至輒漲溢衝潰劉元常明減水諸閘盡啓猶不足以殺其勢至決坎河王堂諸口雖由開河以下復歸漕河往往淹沒民田水退又調本縣撈沙淺及附近泉壩各夫役以築塞之議者欲于黑馬溝迤西修石為隄立減水石閘於故決諸口可歲省土築之費然工程浩大未易輕舉又恐閘設而水不由淺往者曽立石閘一見存亦徒勞耳然亦不可拘也司其務者尚因其勢而利導之哉南旺總論南旺湖者古大野澤而古今貢道之要會也按禹貢徐州大野既瀦東原底平周禮職方兖州其藪澤曰大野地志謂大野在巨野縣北而何承天云巨野廣大南道洙泗北連清濟則其地與其所鍾可知矣或又云鄆州中都西南有大野陂鄆州今東平州即古東原而中都則汶上縣也去古既遠陵谷變遷求古大野未知孰是顧今南旺湖實在汶上西南會通漕河縱貫其中湖界為二東湖廣衍倍於西湖北接馬踏武莊陂湖以及安山南接馬場陂湖以及昭陽諸湖相屬綿亘數百里而徐兖東平汶上巨野諸郡邑又悉環列于左右與古經志合是南旺湖即古大野無疑也禹治水時大野既鍾洙泗濟水而成而泗通于淮濟通于汶淮通于沂汶通于洸而泗之上源又自大野而通于濟則是大江以北中原諸水縱橫交織皆于大野相聯而當時入貢之路若青之浮汶兖之浮濟徐與揚之浮于淮泗亦皆于大野相關是大野在古已為貢道之要會處矣後世建都不同輸將之途亦異惟我成祖文皇帝定鼎燕師控制上遊與堯舜禹所都同在冀州方域之內故其經理貢賦道路亦與禹迹大略相同濟寧之境南迄于江中間雖有二洪五湖之險河淮湍激之虞然所循者猶淮泗之故道也至如漳衛合流直趨天津則與達河以達帝都者亦殊途而同歸矣惟是濟寧抵于臨清上下三數百里地勢髙仰舟楫不通會通河雖創自前元未底於成也國初黃河決於原武漫過安山而會通河遂以湮廢至永樂始以飛挽艱虞爰命宋司空禮發丁夫十餘萬疏鑿會通以濟漕運顧瞻南旺適當其衝宋公乃用老人白英之言導汶自戴村西南流合洸與濟伏所發徂徠諸泉之水瀦于南旺注于會通南旺分流上下交灌而又建閘設壩蓄泄以時遂使三千年已廢之大野復為聖世利涉之用蓋亘古今而再見者也向非南旺則會通難開亦枯瀆耳烏能轉萬里之舳艫來四海之朝獻以供億萬年之國計也哉是南旺湖誠又今日之要會也南旺既瀦會通其道自時厥後海運陸輸一切報罷嵗漕東南粟四百萬石直抵京師若行堂奧然上下咸利者且百餘年矣物盛致蠱積習生常邇年以來河沙壅而吏職曠於是有湮塞之患水土平而利孔開於是有冒耕之患私藝成而官防礙於是有盜決之患三患生而湖漸廢湖廢而運道遂失其常此所以不能不軫聖明宵旰之憂也乃者廷議因漕船阻滯請遣大臣如宋公者往任其事於是按圖牒以正疆界昭憲典以懾豪強飾官聫以慎法守而又躬履地形指授方略先濬諸泉以開湖源繼疏四湖以為水匱又以南旺地當要會用力尤多西湖環築堤岸以丈計凡萬五千六百有竒隨堤既開大渠與堤共長而湖內縱橫復穿小渠二十餘道使相聫絡引水入漕東湖迤東地勢漸髙無需防遏止于官民界分植栁豎石以防侵冒而南至長溝小河口蘇魯橋北至田家樓受水之處則亦堤而築之視西湖工又倍焉凡所新造為閘者三在李大口𢎞仁橋為壩者二在馮家口王岩口為河者九百丈在李村王堂二口皆蓄泄要害處也至於關闌全湖申縮漕道有若南北端二閘東西岸十七斗門則皆因舊而益濬之以司啓閉焉泉河總論山東志曰禹貢冀州夾右碣石入於河兖州浮於濟漯達於河青州浮於汶達於濟徐州浮於淮泗達於河山東漕運其昉於茲乎秦欲攻胸奴使天下飛芻挽粟起于黃腄琅琊負海之郡轉輸北河漢髙祖運山東之粟以給中都歲不過數萬石至武帝通西南夷滅朝鮮擊胸奴城朔方轉漕甚遠而山東咸被其勞矣宋初都汴京東之粟歷曹濟及入五丈渠至京師真宗時東京及廣濟河由定陶至徐州入清河歷吕梁灘磧之險至理宗時於堽城作斗門以遏汶流益泗漕以餉邊衆而漕渠開矣元初開濟州泗河至新開河由大清利津諸河入海既而海口沙壅復從東阿陸挽至臨清入御河又開膠萊新河以通海道勞費不資少有成效巴延始創海運與濟州河並行未幾又用韓重暉等言自安民山開河北抵臨清引汶絶濟直屬漳衛名會通河夫汶水東北入海以智力導引使南接淮泗北通白衛實自元人始然河渠淺澀舟不負重歲運不過數十萬石終元之世海運不能廢也國朝初給餉遼卒海運如故永樂徙都于北亦嘗行之後尚書宋禮等復浚會通河於是漕利通而海運罷膠萊故道亦遂湮廢而河漕誠利矣然泉源壅塞有疏濬之勞偃壩蓄泄有供役之繁徐吕洪流之泛濫淮揚襟喉之扼塞意外之患有不可不防者海運其可不講耶是故漕河者萬世之通利也海運者備不虞之變也膠萊故道者翼海道以成功也皆不可廢也各處當治河渠總敘黃河本不必治而不得不治者為漕運所必資也惟其為漕運所必資則其所當治者又豈獨黃河為然哉水利自古重之故我朝于凡陂池川瀆閘壩橋梁之事具載諸司職掌大明會典永樂遷都後尤重漕運故河道洪泉等項有關漕事者事例甚詳今具列于後而諸處水道亦類附焉盧溝河出山北代州泛溢輒壞民田廬宣德𢎞治間嘗命官修治滹沱河出真定府西山天順𢎞治間每命官修築大通河在京城東自元置閘蓄水通舟以免漕運陸挽之勞永樂間諸閘多存成化間浚以通漕亦賴以濟白河在通州源出湖地經密雲合大通榆渾諸河至直沽入海決則修築淺處設鋪置夫挑浚薊州河薊州軍餉國初海運𢎞治初發軍夫萬人鑿河四十里以免海險每三年一浚衛河元名御河出河南輝縣下臨清至直沽入海今為運河會通河無源元自安民山開通河北至臨清引汶絶濟屬于衛賜名會通沁河出山西沁源縣由大行山麓至河南原武縣黑洋山與濟源合流至徐吕二洪景泰間於黑洋山北黃河缺口開河以接舊道汶河出山東萊蕪縣原山南從濟水西北入海元築壩遏之南流至今合沂泗入淮永樂間復壩于東平州戴村汶盡入漕至分水龍王廟四分南流六分北流南有洸河亦入漕南旺湖詳前昭陽湖北屬山東滕縣南屬沛縣周圍八十餘里納諸縣水湖口置石閘放水入薛河由金溝口以達運河徐州洪在徐州為運河要害亂石峭利成化間命官鑿石又甃石路置石壩遇損壞修築吕梁洪在徐州東南有上下二洪亦運河要害成化間甃石堤築石壩復于壩西築堤洪東甃石路遇壞修築管家湖在淮安府城西門外舊有隄永樂間於湖內築長堤以便運舟隨時修築寶應諸湖自寶應至槐樓南諸湖相接西抵泗州旰𣅿界皆運河所經湖東堤長三十餘里洪武磚修髙家潭等處成化造石堤漸長二十餘里其南髙郵邵伯諸湖皆石堤遇壞修築康濟河髙郵湖運河所經舊堤三十餘里舟行湖中被風觸堤往往破壞𢎞治間于湖東開一河以避險名康濟河南北各置閘以時啓閉又用磚修築東岸浙西諸水太湖受六府諸水注江入海每壅塞則長洲吳江常熟諸縣多被淹沒永樂𢎞治間每命發民夫導之山東諸泉詳前沂水考鄭康成云沂水出沂山水經云出蓋縣艾山道元則曰沂有二源一出祚泉山一出魚窮山余按今蒙隂縣東北地名南河川小阜之下有曰狗泉此沂源也東南徑馬頭固山有泉東流與之合北望沂山五十里殊無别源據周禮沂山因其水得名康成又齊之大儒不應有誤疑沂山水源古流今竭耳沂水過馬頭固南流徑蓋縣故城又南至沂水縣城西又南至河陽村桑泉水西來入焉道元云桑泉水出五女山南流納堂阜水即今蒙隂東北憚阜大水二河也又南合蒙隂水通名為汶河東注沂沂水又南徑諸葛城又南徑王祥墓孝感水入焉其水出墓西戚溝湖剖氷躍鯉之地又南至沂州之城東小沂水西來入焉小沂出蒙山西東過費縣神山納祊水祊出縣南關陽川至沂州西分為洓水洓自州城西小沂自城北俱入沂宋慶厯間沂州修城碑云大小二沂環流外轉而小沂尤湍悍西北平日波如簞紋清淺可愛及山雨水至如百萬陳馬摩壘而來謂此水也沂水又南分流入三十六冗湖東通沭水又南徑古郯城又南至下邳入泗下邳古城在今邳州南道元云沂水至下邳分為二一自城北趨南入泗一自城之東南入泗東沂水上有橋徐泗間呼為圯子房遇黃石公進履處今入泗者西沂耳泗水考源發陪尾山四泉並發循泗水縣北入里始合為一西經曲阜縣貫府城下至濟寧分流南北南流入徐州境北流入會通河汶水考水經出朱虛縣小泰山今沂山絶頂穆妃陵側有瀑布泉懸百丈崖而下即汶水也東流循鳯凰嶺折而北經大峴山隂峴水入焉又北徑蔣峪口有水出谷中西來入焉又北徑龜山隂乃折而東徑柴阜又東北徑安丘南阜山又東北徑安丘城西又東北入于濰顔監曰前言汶水出萊蕪入濟今此又出朱虗入濰將桑欽所説有異或者有二汶乎余按入濟之汶見禹貢論語之汶上書傳謂之北汶即今大清河入濰之汶見漢書入沂之汶見水經齊有三汶清河為大述征記泰山郡水皆名汶有北汶嬴汶柴汶牟汶皆源别流同又在三汶之外徐沛并二洪漕河總論按漕河經流徐沛之境凡二百里有竒自沙河至謝溝一百六里為沛縣境自謝溝至雙溝一百三十五里為本州境詳見山川其支流入漕在沛境者三曰泡河上通賈魯新開黃河流經單縣至本縣飛雲閘橋入漕河盈涸不常曰薛河自滕縣東髙薛二山之間來西南流二百里會南沙河玉華等泉由金溝口閘入漕河曰雞鳴臺東小河在縣治東北五十五里源出滕縣三里橋泉併七里溝泉西南流百餘里至雞鳴臺東入漕河初二泉之水漫流為澤正統六年漕運參將湯節始開渠引入漕河置閘于河口以積水既以濟漕又變沮洳為良田云在州境者四曰留城小河源出山東滕縣黃溝泉及徽山三家灣等泉西流八十里至留城鎮北東岸入漕河曰境山溝源出東北馬跑等泉西南流三十里至境山鎮北東岸入漕河曰留溝湖在州城北五十五里自沛縣泡河上河分來至許家淺北西岸入漕河曰烏觜溝源出城北八十里屯東冷泉來西流三十里至秦梁洪入漕河至州城北則受汴水合流據二洪險阻而黃河決嚙所必歸焉夫會通河上受汶泗洸沂諸水搜取山澤諸泉以為漕綱之助又有安山南旺昭陽諸湖瀦蓄謂之水匱先朝尚書宋禮奉命經畫當時漕河初不藉黃河之水元人所謂漕以汶而不以河者此也至正統以來河勢播遷倐無定所其支派大槩有六其一自汴梁東北經蘭陽儀封曹鄆至陽榖縣入漕其一至漕州由雙河口分流至魚臺縣塌場口入漕其一至儀封縣東經歸德府至徐州入漕其一至歸德府東南經虹縣宿州睢寧至宿遷縣入漕其一自汴梁東南經陳留通許亳縣至懷遠縣入淮其一自汴梁城西南經營澤中牟尉氏陳潁至壽州入漕自河入于漕水勢浸淫諸閘沉于深淵二洪泯其險隘泉政日弛湖防盡廢至于二洪而下衝決歲深崖岸寬廣一遇旱乾則汶泗諸流渙散靡濟必賴黃河之水而後漕運流通如嘉靖庚子諸閘泉微二洪水涸至厪宵旰命重臣是可鑒已然河所趨泥沙相半若決入陽榖魚臺豐沛則漕渠淤塞經曲睢宿則二洪反髙全入渦淮則陵寢所繫尤難輕議全歸汴水則徐民昏墊又所不堪如嘉靖丁未衝決曹縣及武城金鄉魚臺溢于徐沛蕭碭亦可鑒已要之徐沛而上非泉湖之備不能通徐吕而下非黃河之來不能濟惟在疏濬得宜隄防不失俾源泉沛注勺水不遺以為閘河之助於汴河故道如野雞岡孫繼口黃陵岡等處各加濬治使黃河正流南趨鳯陽以入淮海其支流從汴入泗達于二洪以濟運道既非上出豐沛魚臺以淤漕閘又不全入渦淮以干陵寢而徐民墊溺用是少瘳則誠國家之慶生民之福也附鹿園萬表論曰黃河自野雞岡而下分為二股其自東南渦河而行者則為河身其自孫繼口出徐州小浮橋者則為支流然皆併合於淮以入海是故河流入海舍淮無他道也比歲庚子二洪水涸漕舟併阻議者謂為黃河改流豫則曰非也夫河流遷改宜必有漫溢之處計今水道只渦河孫繼口耳今孫繼口之出徐州者既淤是當泛溢於東南之渦河何渦河之水亦微至可截以壩斷可識矣蓋自清以至徐沛地勢隆擁節髙一節如往年黃河盛溢之時則上漫濟寧其魯橋諸閘皆為淹沒而淮水亦幾浸城後水勢少降則自魚臺以出穀亭再降而由飛雲橋以出沛縣而準水以次漸少又降而出徐州小浮橋則淮水亦漸平矣近年黃河之水日微故小浮橋之水淤塞豈特小浮橋之水淤塞宿遷桃源二小河亦塞今淮安河口合流入海之處可以褰裳而涉也此徐水之通塞實本黃河之嬴縮非關於河之改流也又曰漕河原不用黃河之水惟用洸汶沂泗諸泉溝湖之水足以濟之渡淮而西皆是清水故名清河正統十三年黃河決滎陽至陽榖入漕河潰灣以達於海景泰四年都御史徐有貞塞治之乃分流自蘭陽東束至徐入漕河以疏殺之而黃河始合于漕然黃流尚微至正德六年水勢方盛行浸漫而衝洗之矣先是黃河未衝之時清河河道皆狹水故易充然亦有淺故沿河俱設淺鋪每年轉運固無滯也後黃河水大來而淺鋪俱沒而不用矣今觀二洪之舊堤路宛正是先年河道但二洪一向黃水浸漫年久一且水落石出而清河一帶淺涸人心乍見不能無異其實則故河也蓋自淮達濟由會通以至衛河一路隄防只恐黃河之水衝入為漕河之害今徐洪以下一向反用黃河之水而忘其故及水不來則用工挑濬以引之日望其來而不可得此即所謂以病為藥也如酒本傷人之物而耽酒者一向沉溺於酒反以酒為生一不飲酒即欲死矣此非今日漕河之喻乎濟水考導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北會于汶又北東入于海沇水出山西澤州陽城縣王屋山既見而伏東出於懷慶府濟源縣二源東源周圍七百步其深不測西源周圍六百八十五步其深一丈合流至溫縣是為濟水自縣西南虢公臺入于河濳行絶河復出於河之南溢而為滎河南開封府滎澤縣地也既見而伏歷鄭州中牟祥符陳留杞縣睢州歸德至山東兖州府定陶縣出於陶丘北又東至山東兖州府曹州過菏澤又東北至本府東平州夀張縣安民亭合汶水又東北至青州府博興縣入海東北者由東而北也北東者由北而東也汶水出山東濟南府泰安州萊蕪縣原山之南流至本府滋陽經寧陽平隂汶上西至東平州壽張縣安民亭注濟河今濟涸仍順濟故道折而東北經東阿入濟南從濟故道入海王屋山有三處據蔡傳在山西平陽府垣曲縣今一見山西陽城縣一見河南濟源縣實一山也綿亘數縣然沇水正發源處則在濟源西八十里濟漯辨孟子云瀹濟漯而注於海蓋濟水出於泰嶽諸山至王屋山始大在沇地初名沇水自沇入河至於濟隂之地故名濟水漯即濟水泛溢湍漯無涯因名曰漯非濟自濟而漯自漯也二水至東北與汶合流而入于海或曰漯水在章丘縣北七里濟河源流附禹貢濟河惟兖州又導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北會于汶又北東入于海周官兖州其川河濟是已水經注及山海經云濟水出河東垣縣王屋山初名沇水東出溫縣西北始名濟水又東南流當鞏縣之北而南入河與河並流過成臯溢出為滎水東流過陽武及封丘縣北又東過臨朐縣南至定陶縣南又東北流與菏水會東至乘氏縣西分而為二其一東北入巨野澤過壽張西與汶水合又北過榖城縣西又東北過盧縣北經齊郡東萊郡而入海也唐李賢謂濟自鄭以東貫滑曹鄆濟青以入于海宋樂史謂東平濟南淄川北海界中有水流入海謂之清河今按濟水在漢時伏流不見惟汶水自泰安州出者由故道東北流入海自元人引汶水入洸為運河國朝因之凡汶水入海處皆築堰壩以遏其流而入海之道遂多湮塞今所謂大清河者乃汶水出洸河者復從張秋分流而入會齊東南諸山泉溝澤北經長清齊河至厯城會濼水經濟陽齊東武定青城濱州蒲臺利津諸州縣界入海實濟河之故道也所謂小清河者即濼水發源濟南趵突諸泉流至城北大明湖出而合之由華不注山下東流會巨合水又東經章丘會淯河又會漯河三水合流經鄒平長山新城又會孝婦河又東經髙苑入博興樂安界合於烏河又北至馬車瀆入海或云古樂水自華不注山東北入為大清河自偽齊劉豫導之東行始為小清河云又按酈道元謂濟水在王莽時枯竭鄭樵通志亦曰濟水多涸竭自今觀之濟水徑疾能穴地伏流隱見無常乃其本性非真涸竭也濟水既伏流地中則發地皆泉又不特歷下諸邑為然是故一見為濟源再見為滎水三見為山東諸泉水而溢為大小清河其實皆濟水也又何嘗見其枯竭耶淮南子曰濟水通和宜麥周官曰鸜鵒不踰濟風俗通曰濟齊也齊其度量劉向説苑稱濟能蕩滌垢濁通百川于海蕩出雲雨則濟水之德又古今所並稱濟源山海經曰王屋之山㶌水出焉而地理志亦曰王屋山沇水所出㶌沇聲相近蓋一水也沇水即濟水故禹貢曰導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北會于汶入于海夫濟之為水瑩潔如玉性下徑疾貫大河而不濁故釋名曰濟源也言源出河北濟河而南也余曩閲桑欽水經酈道元為之注凡異常事無不具載而獨於濟水下無所稱乃知世謂靈異者皆訛謬也渭水考導渭自鳥鼠同穴東會于灃又東會于涇又東過漆沮入于河渭水出渭源南谷山禹只自本縣鳥鼠山導之東至咸陽縣會于灃又東至髙陵縣會于涇又東至朝邑縣過漆沮至司空縣入河涇水出涇陽縣岍頭山涇陽縣今陜西平涼府平涼縣岍頭山即笄頭山也陽陵縣今西安府髙陵縣也涇水出岍頭山經本府涇州歷西安府醴泉縣邠州又東至髙陵入渭汭水出扶風汧縣弦蒲藪汧縣即今鳯翔府隴州弦蒲藪在州四十里蔡傳不言入涇之地汭水弦蒲藪出經平涼府崇信縣華亭縣至涇州入涇渭水出隴西郡首陽縣首陽縣即今臨洮府渭源縣南谷山去鳥鼠山五里司空縣即今西安府華隂縣也渭水自南谷山出經鞏昌府通渭縣隴西縣歷鳯翔府寶雞扶風岐山入西安府盩至興平咸陽臨潼渭南南華州至華隂縣入河灃水出終南山東至咸陽縣入渭洛水考導洛自熊耳東北會于澗瀍又東會于伊又東北入于河按洛水出冢嶺山禹只自熊耳導之耳至新安縣會于澗至偃師縣會于瀍至洛陽縣會于伊至鞏縣入河洛水出慶陽府環縣即古洛源縣也經延安府甘泉縣即古雕隂縣也經鄜州宜君縣子午嶺至中部縣入西安府界經耀州及同官縣至富平縣合沮水歷蒲城同州至朝邑縣東南入渭沿河三府之人至今皆呼為洛河潦沮之名亦不知也古今郡縣慶陽有洛源縣延安有洛川縣及三川洛其一也朝邑有洛苑鄉水經言延安形勝云洛水之交漢志亦云雍州其浸渭洛注云洛水經北條荆山而東南入渭此尤為明證漢志又曰洛都襄洛皆延安近洛之地略無一字及漆者獨漢上郡志有曰漆垣又不知何所指顔師古曰洛水即漆沮也此後世指洛為漆沮之由豈洛亦名漆歟作記者不知鳯鞏自有漆沮二水以二漆為一水而莫究其源但云自同官縣界來不知自同官來者洛也一統志遂言同官之漆出自鳯翔不知漆水為涇汭所間其能飛度涇汭來同官耶秦士往往疑此故詳考而著之焉伊水經偃師入洛瀍水經榖城入洛澗水經新安入洛淮水考導淮自桐柏東會于泗沂東入于海淮水出河南南陽府唐縣泌陽及湖廣德安府隨州襄陽府棗陽縣西界胎簪山禹只自唐縣桐柏山導之桐柏去胎簪不遠沂水至邳州會泗同至南直𨽻淮安府清河縣入淮自桐柏東會于泗沂至本府海州入海按徐之水有泗有汶有汴有漷而獨以淮言者職方氏青州其川淮泗其浸沂沭周無徐州兼之於青周之青即禹之徐則徐之川莫大於淮胎簪山極大廣深秀綿亘河南南陽府唐縣泌陽湖廣德安府隨州襄陽府棗陽縣四州縣之界有卧龍山石女山蓮花峯銅山皆其山也而淮正出於泌陽之銅山下謂淮源出桐柏山者非也黃河由淮入海按鄭曉曰洪武二十四年河決黑羊山東經汴城北五里又南至項城入淮而故道遂淤正統十三年決張秋沙灣東流入海又決滎澤東經汴城歷睢陽自亳入淮景泰七年始塞沙灣而張秋運道復完自後河勢南趨而汴城之新河又淤𢎞治二年以後漸徙而北又決金龍口等處直趨張秋橫衝會通河奔流入海而汴城南之新河又淤命副都御史劉大夏治之施功未竟伏流潰溢人皆言黃陵岡塞口不合張秋護堤復壞河不可治運道不可復且有為海運之説者蓋滎澤孫家渡口舊河東經朱仙鎮下至項城南猶有河流淤淺近二百餘里若多役夫力疏濬深廣使由泗入淮可殺上流之勢黃陵岡賈魯舊河南經曹縣梁進口下通歸德丁家道口足以分殺水勢然梁進口以南滔滔無阻以北淤澱將平計其功力僅八十里若多役夫力疏濬深廣使由徐入淮可殺下流之勢水勢既殺則決口可塞運道可完矣但既疏之後不能保其不復淤既塞之後不能保其不復決耳是時劉大夏能虛懷博訪推心任下五旬而事竣江通於淮江與淮不通越揚州髙郵僅四百里許吳夫差與晉會黃池鑿溝以運輜重隋人廣之築堤壅水於兩頭自江拽船而上復拽船而下于淮於是江淮舟楫始達渦河渦河在淮之南商船皆自淮入渦河至河南祥符銅瓦箱以達陽武陽武去衛河只六七十里議者欲鑿而通之只萬夫一月之力耳闕至河北之會通河甚便且渦河雖比會通河差險不愈於海運之險乎其言固是但先會通河之役也築金口堰於兖東而障泗水流西南築堽城壩於兖北而障汶水以南注疏渠出漕流分南北南達於徐北通於衛當時會通之塞自濟寧至臨清共三百八十里內止七十七里有小河可通漁船其三百餘里皆為陸地工部尚書宋禮都督周長發山東濟兖青東四府丁夫十五萬登萊夫三萬以成之而開河建閘所費不資當時若可為豈有棄七十里之易不為而顧為其難哉今若鑿而通之則黃衛二河之水合矣二水相合則衝激非常誰復測之此會通之運誠永久而不易者若于衛輝府置倉每年糧運就以鳯陽等衛軍船兊鳯陽等府糧米者今由渦河達陽武陸路七十里輸于衛輝倉交納即有災折計至京則由衛河順流而下甚易此或可通且會通達船得以分減而河道船行亦為疏便如昔年山東流賊之變運道不通京師阻絶則又可為事變之備殆亦一策但多七十里之腳價耳泇河附泇口河從馬家橋入微山諸湖穿梁城侯家灣取道于利國監經蟃蛤栁諸湖出邳州直河入黃河有六難焉微山諸湖水中不可堤一也梁城侯家灣葛墟嶺皆數十里頑石不可鑿二也碙石水中隨撤隨合金火不可施三也嶺南去徐吕二洪一舍耳二洪髙下相等避徐吕二洪險葛墟洪險復生四也假令治泇河即不治徐邳河猶可萬一泇河成歲治之而徐邳河非無事之水也而又治是兩役也勞不已甚乎五也計鑿梁城侯家灣非五百萬不可視今治徐邳河五百萬之費也况未必成六也治泇河策宜永罷之泇河泇水有二東泇出沂州西北其山南流至卞莊站國初立站今廢東分一支入芙蓉湖溉田數千頃湖在沂州東南芙蓉山下香粳鍾畝古稱琅琊之稻即此西泇出嶧州東北抱犢山東南流至三合村與東泇合又有魚溝水出浮丘山合于此故名三合南貫四湖溉田倍芙蓉又南合武河入于泗謂之泇口淮泗舟楫通焉元和志云承縣界有陂十三所皆貞觀以來修立以溉田者今沂嶧二州仰泇承二水溉田青徐水利莫與為匹皆十三陂之遺迹也武河者疑即漢志冠石山之武水水經亦謂之小沂上流有故渠俗名文河土人云浚此渠六十里使武河通沛可避吕梁徐洪之險而徑達新濟矣徐邳人恐徙河無業每沮之已上二説不同具存之以備考膠河附水經云出黔陬膠山今膠州膠西縣西南鐡橛山也北經密州東北鹵山古名五弩山鹵水入焉寰宇記膠水出密諸城縣東蜷山或亦曰膠水出鹵山皆非是又北經髙密縣東北入都濼都濼者水經謂之夷安潭秦地圖謂之劇清池即古貕養澤也張奴水出髙密東阜下亦注此澤自澤北出注新河張奴水一名墨水水側有張奴店由河北入于海其東北入海者膠水之故道差淺而新河為經流新河者至元初萊人姚演建言首起膠西縣東陳村海口自東南趨西北鑿陸地數百里欲通漕直沽海口數年而罷豫嘗乘傳過之詢土人云此河為海沙所壅又水潦積淤終不能通徒殘人耳演真鄭國之罪人也山東平度州東南境有南北新河元時所開以避海運放洋之險其水源發髙密至膠州分流為南北新河自膠州入新河二百四十里入萊州之海倉口入海自迤北新河店置閘以達安東止八十里可通海歲久盡塞近王副使獻方御史遠宜力主開復并於馬家濠鑿山麓通海近該巡按山東御史商惟正題會同都御史李時達勘議欲從元人故河引泉瀦水通漕間道但南海由海口至店口三十餘里多沙自麻灣以上係估流沙與沙互壅麻灣以下則金海中隨潮湧進淖沙勢俱難取欲由把郎廟地名路溝另開二渠至鴨緑港才避麻灣十三里之沙由鴨緑港迤南尚有沙洲見露水中即空舟尚不能行况古路溝未挑通地脈相似安知下無沙安保他日海沙之不湧入北海海倉口龍王廟前沙數十里許用徒夫及昌邑夫三千餘人撈二十餘日給過工食二千三百兩去沙僅二尺路只二里沙堆積岸上大潮一至沙壅如故且議築堤約水障沙不知海口之堤用土則勢不能固用石則費不可計分水嶺自嘉靖十七年十八年二十二年三十二年隆慶五年節次勘測皆髙海靣五丈以上接白河流沙先年胡給事中謂流來之沙旋挑旋壅况沙中乃有石沙見水則可搏濕泥帶水即成稀滋軟土故役人言地底有泉泉內有沙工力難施夫海口之沙既欲避而不可得兩海之潮又勢遠而不能通縱欲引附近張魯河白河膠河都泊諸水以益之而春夏旱乾俱各微細既不足恃秋漲沙壅輒復為患徒費挑濬奏聞報罷治兩河議我國家漕河形勝誠天造地設而有所待者夫自通州以至儀真凡三千里而南旺分水適當其中南由閘抵徐州則會黃河至淮安入海而揚州湖水接之以達于江北由閘抵臨清則會衛至天津入海而通州白河接之以達於京南北地里之遠近既侔而水道之接濟亦類雖圖畫亦不能盡其妙誠天下河道第一形勝我聖明億萬載無疆之業也每思兩河修治大要不同竊謂治運河者須治其源而河有體用源乃體也河其用也治黃河者惟治其流而水有常變小則常也大其變也治運河者濬泉導流不少懈墮則體立矣而又挑淺修閘築壩治堤之類其用亦行河其少難乎治黃河者於水之常遇有泥沙淤塞則用人夫駕船于水中以鐡扒并尖鐡鋤濬之使泥沙隨水而去夫淤既除則水得其道自無衝決之虞更修築堤岸以禦水之變或護城池或資耕種使民得遂其安養而免淹沒之虞則黃河之事可少濟矣今黃河三委一由蘭陽大名山東至蕭縣出徐州一由憲陵夏邑宿州出宿遷一由河州合渦河會淮水出清河三委俱當疏濬通流以塞水勢第人多狃于俗見惟以瀰漫之勢為言謂黃河為神水不可治要在斷然行之耳若夫今日徐吕二洪則在用黃河之水由蕭縣出者經小浮橋與閘河泉水合流共濟焉是皆於其要處致力如此兩河修治大要不同治運河者須治其源而河有體用源乃體也河其用也治黃河者惟治其流而水有常變小則常也大其變也斯言實國家治河要義彼宋元竭民事河卒無成績所以為無策之甚也若謂沛縣水患可憫但河流經行不在豐沛則在蕭碭即開新集龎家屯等處不過移沛縣之患於蕭碭之間去歲勘議之初蕭碭方脫水患之民嗷嗷惶怖不忍見聞况今沛縣四圍漸已淤髙詢之土人皆謂一二年間水必他徙似不宜以一邑之故動列省三十餘萬之衆費三百餘萬之資以徼不可必成之功而貽有害無益之悔也所謂欲開舊河者其謂有二一則新開集由浮橋出徐吕二洪免黃河北徙之勢此以黃河舊河言也臣度之自新集至浮橋一百六十餘里不知該幾百萬銀錢糧自處一難也夫取資黃河不過為濟二洪之險今於二洪無礙即其北徙害在地方不在河道似不必更興不急之工二難也是黃河舊河不必議也一則以南陽等閘至湖陵城等處即今堅硬可鑿此以運河舊河言也臣度之黃河北徙之勢未艾也即今開鑿能保其不再衝乎此一難也且新河費四十餘萬銀役幾十萬夫死於工作者幾百十人命僅成此河又欲舍此而他圖則前項工費皆成無用矣此二難也且府庫既虛民力已竭再行用之勞傷之下必有他變此三難也是運河舊河不必議也至所謂新河不可行者其説有三一則馬家橋易淺一則沙河易淤一則薛河易衝謂之三難臣愚以為此三者其委也但在因地修補隨時救治臣不謂難臣之所謂難者則其源也夫新河與青原山相近而兖州以南費嶧鄒滕四縣之水實注焉夫以一隄而障四縣之水又當大山瀉下之勢必不能支且其地水利素不疏通每遇隂雨彌望白水遍地成湖若不尋其源分其流則自濟寧至南陽至秦溝無處不可衝決不特三河口一口為然也臣愚以為善治水者不與水爭水有所歸流行無滯必有分殺之處則不至暴溢大都順其勢而利導之耳即今河工已成宜急為疏濬分殺之謀又夏村一帶地形稍髙非薛河之水又不足以濟運道臣愚以為薛河上流須别濬支河以分其勢至於三河口鮎魚泉等口對過之處鑿開大口令其順流西去仍於下流百步外再築一矮隄或為湖為塘髙六七尺仍作一水閘水溢則任其西流水淺則所蓄之水以資運舟其上流低窪之處亦因其勢捲掃為湖以為停水之所多置放水閘以為關閉之具夫有處以分其流則水自不至暴溢不暴溢則自不至衝決自不至淤淺而所謂三難者可免矣又多方處置蓄水之所以為運舟之資則既去其害又收其利雖未遽為經久之計而亦不失為一時之便其開鑿舊河二説俟財力充足之時為之未為不可也國家運河漕東南之粟以實京師自臨清而北徐州而南悉資衛淮諸水惟徐州至臨清一帶閘河則藉山束泉水然與黃河相近故多衝決之患𢎞治以前決在河南正德以後決在徐沛查自嘉靖四十五年之間沛縣被決凡八次矣而未有如四十四年之甚者蓋緣沛縣舊河積沙為岸而其東昭陽湖地勢卑窪黃水乘虗就下自西奔入昭陽湖必先橫截舊河而始成抵於湖水過沙停不數年必一淤者勢固然也自築馬家橋隄成而沛縣之流遂斷沛縣斷流而秦溝濁河之勢日盛即今徐沛一望盡是髙地舊河河身淤深宜稻方數百里魚鱉之區皆變為桑麻之地矣臣又慮留城至舊山係黃水故道乃築東堤五十餘里為障禦計則黃水可無壅塞之虞又建復黃家閘則泉有所節宣亦無膠淺之患二年間新舊相接水流相滿舟楫通行惟薛沙二河亦嘗慮其伏漲衝突方興工分殺其勢工未及就而水已至矣是以有去夏之患然臣思之運河之患患在黃河彼其排山倒海之勢經年纍歲之害來則難禦去則必淤若山水則乍盈乍消涸可立待或一歲而再至或數歲而一見此可以人力勝者也今皆在於上源改水在薛河則於東邵王家口各開支河築厚壩三道引水經赤山微山吕孟等三湖從地濱溝下徐在沙河於黃甫開支河經趙溝歸獨山湖南建減水閘一十三座泄出昭陽湖而又於翟家口宋家口楊家口杜家口各開支河築厚壩二道以防末流引之而入甄家窪尹家湖而歸於印馬池等處是沙河薛河之水俱有歸宿又何衝突之足患乎圖書編卷五十四
