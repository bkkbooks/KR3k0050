body:
  text: 圗書編卷五明章潢撰乾坤易簡諸圗總叙易雖變動不居周流六虚而上下經所以成于四聖者一卦一爻不容毫髪混也惟上下繫與説卦諸萹原無卦爻若有不可以圗象求者然知始作成羣分類聚乾坤大父母姤復小父母與夫仰觀俯察之類雖不滯于象而以象觀之皆可得其象于意言之表也是萹因先儒之所圗者採而編之皆所以發明孔子贊易之意也欲求易簡之理者于此觀其㑹通焉思過半矣易繫辭曰一陰一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣所謂一陰一陽之道盖指一􅄲而言也聖人不得已乃畫此卦以示将來而世之人不為仁知之見則為百姓之不知聖人亦且奈何哉况不徒示之以象于一則謂之知大始謂之易知謂之崇效于一則謂之作成物謂之簡能謂之卑法可見乾坤知能久大徳業一而二二而一者也果能以此崇徳廣業則易簡而天下之理得矣天下之理得而成位乎其中矣此之謂易簡之學乾知大始坤作成物二圗總論乾坤二卦隂陽判矣易繫辭曰乾知大始坤作成物亦判然不相合也前二圗又以自子至已屬乎知始之乾自午至亥屬乎作成之坤不亦分析之太甚乎此皆自其分殊處言也然而理則一焉非强合也一氣翕闢而為陰陽陽本闢也翕即為陰陰本翕也闢即為陽從冬至一陽至四月之純陽皆乾陽用事而物皆由之以知始矣從夏至一陰至十月之純陰皆坤陰用事而物皆由之以作成焉即一嵗之間其知始作成故如此近而一日逺而元㑹運世莫不然也且其知大始者非乾自為乾而無與于坤也盡坤之所作成者而始之也其作成物者非坤自為坤而無與于乾也盡乾之所知始者而成之也乾坤二彖曰大哉乾元萬物資始至哉坤元萬物資生可見萬物由乾而始由坤而生也况既曰乾元資始矣又曰乾道變化各正性命保合太和則是萬物至于各正保合不其作成矣乎而乾道變化為坤可知也既曰坤元資生矣又曰後得主而有常萬物化光謂非坤之自後而得乾以為之主乎所以乾利貞在乎變化為坤坤利貞在乎柔順從乾陰陽翕闢惡可判然二之哉惟真知其分而非一于分真知其合而非一于合則二圗以十二辰分屬知始作成奚不可者否則本欲求明象義反蹈乎支離之病矣是故一極渾淪大明終始則知能之易簡徳業之久大一皆循其自然而無所矯强闢即乾也闔即坤也易其庶矣乎坎北方也乾以水之成數類聚于西北震東方也艮以木之成數類聚于東北離正南也㢲以火之生數類聚于東南兊正西也坤以金之生數類聚于西南故八卦各以其方而類聚雖曰本乎天者親上本乎地者親下亦類聚之道也然析觀其所聚而四方之各一其類者亦莫不然天下之動者不能植偏于陽也天下之植者不能動偏于陰也陰陽之物以是而羣分惟人為能動而植能植而動所以得陰陽之全固能靈于物而為之羣分也以卦分之乾乃陽之陽為飛走之羣艮坎震乃陽之陰為魚蟲之羣坤乃陰之陰為土石之羣巽離兊乃陰之陽為草木之羣通神眀類物情者當自得之乾南坤北天覆地載也離東坎西日卯月酉也㢲西南者風本陰氣伏于陰之方也震東北者雷本陽氣動于陽之方也兊東南者多川澤也艮西北者多山石也乾三陽也不能以不上也坤三隂也不能以不下也坤陰極則陽生而震乾陽極則陰生而巽皆造化自然之妙故聖人卦位之設自與造化合夫豈用意以安排之哉伏羲仰觀天文以畫八卦故日月星辰之行度運数十日四時之屬凡麗于天之文者八卦無不統之仰觀于天凡三垣二十八宿日月五行躔度次舍皆天之文也果能視昏旦之星測日月之次審其遲留伏逆彗孛飛流之象則四時寒暑之推遷五氣祲祥之變態皆可後天而奉其時矣故賁卦彖曰觀乎天文以察時變况伏羲仰觀天象仲尼上律天時而吾人欲與隂陽同其卷舒天文即吾心之文也曾謂博學于文者可以天文盡委之象緯之術而莫之仰觀也邪伏羲俯察地理以畫八卦故四方九州鳥獸草木十二支之屬凡麗于地之理者八卦無不統之四海九州之廣峙而為山嶽流而為江河雖卷石勺水莫非地也其支分𣲖别脉絡分明孰非地之理乎理必俯而察之而後可以得其槩也使察之不詳辨之不審則各方風氣之所尚水土之所宜人文之所鍾物産之所聚其何以知之哉即治水一事言之禹必承四載歴八年雖窮荒絶險靡不遍覽所以能隨山刋木濬澮距川于以奏夫平成之績厥後公劉陟巘降原衛文升虚景山而遷都卜居率是道也否則一鄉一邑之脉理且莫之察也又安望其順地勢水勢之宜以疆理海甸之廣哉易六十四卦悉本之乾坤二卦乾天也坤地也乾坤非徒竒耦之象六十四卦非徒卦爻之變化也在天成象在地成形凡四時隂陽之迭運八方剛柔之異宜親上親下類聚羣分莫非天地之法象莫非卦爻之布列莫非易也易繫辭古者包羲氏之王天下仰則觀象于天俯則觀法于地又曰易與天地凖故能彌綸天地之道仰以觀于天文俯以察于地理諄諄于俯仰觀察之訓何歟正以是易也無逺近精粗無内外隐顯退蔵于宻者即所以周流乎六虚感而遂通之故即寂然無思為之神而未畫之前不離乎有象之外一仰觀觀此也一俯察察此也日用間滿前天地之至教皆吾之所以崇效而卑法也有志崇徳廣業者必如此而後可以知天地之化育必如此而後可以語易簡之學希夷曰正位稱方故震東離南兊西坎北四維言位故艮東北巽東南乾西北坤獨稱地者盖八方皆統于地也兊言正秋亦不言方位者舉正秋則四方之主時為四正類可見矣離稱相見以萬物皆見于此也兊稱説者以正秋非萬物所說之時惟以兊體為澤澤者物之所說而不取其時焉艮稱成言者以艮之體終止萬物無生成之義今以生成初言者以艮連于寅也故特言之坤加致字者以其致用于乾也觸類皆然帝出乎震此帝字合下成言乎艮而統言之盖謂八者乃帝之所主也出乎震者帝以震出萬物耳故下文曰萬物出乎震若以帝自出為義則齊乎巽亦帝自齊相見乎離亦帝自相見乎可見分之為八固有震巽離坤兊乾坎艮之不同而合之為一孰非帝之所為乎鄭氏曰造化之一氣即聖人之一心造化之氣本以發生而聖人之心亦将以濟世故不免由静之動自無入有使萬物得以遂其生安其業人不見其迹者其故何哉盖造化之氣與聖人之心雖動而不離静雖有而不捨無比萬物與萬民也其見役説戰勞于其間而不自覺知耳此八卦之序所以出乎震而成乎艮也謂之帝者豈非造化之氣與聖人之心一乎八卦配八方莫非帝之所主矣又曰神妙萬物豈帝自帝神自神乎盖帝以主宰言神以流行言帝主宰不動故有以統萬物神流行不拘故有以運萬物帝也神也一也八卦取象昔者卦之始畫也以象而已矣象既立然後分八方之位水火金木天地之正氣生民所日用不可無也近取諸身則乾首坤腹震足巽股是也逺取諸物則乾馬坤牛震龍㢲雞是也是之謂八卦之策巽為雞爻之得酉者亦為雞坤為牛爻之得丑者亦為牛是之謂納甲之象三日出為爽震受西方庚八日兊受丁上兹乎如䋲是之謂四象之象八卦既立因而重之俱為巽也位乎内者為入位乎外者為散俱為坎也位乎下者為心病位乎上者為心亨是之謂重卦之象一陽為復二陽為臨三陽為泰四陽為大壮五陽為夬六陽為乾是之謂辟卦之象復之一陽進于二為師進于三為謙進于四為豫進于五為大有進于六為剥是之謂升卦之象屯反而為蒙需反而為訟師反而為比小畜反而為履是之謂反對之象遇屯之比其説為車從馬遇歸妹之暌其説為姪從姑是之謂變卦之象觀之二四有艮存焉暌之六二有困存焉是之謂直體之象下二為地中二為人上二為天是之謂三極之象一為元士二為大夫三為諸侯四為上公五為天子六為宗廟是之謂六位之象師北面而出征比南面而受朝咸之六位自拇以至輔井之六位自泥以至幕是之謂全卦之象噬嗑之卦生于頥中有物小過之卦生于中孚之卵是之謂二卦合體之象物之在天地間多矣聖人欲以六爻說之非立法如是之多不可也易象總論易有象有象之象象如竒乾偶坤八卦之類是也象之象如乾龍坤馬離牛咸艮人身之類是也盖卦之所包大矣其義難知也近取逺稽曲暢其旨趣用明本象使人易從此學者所當盡心也至于雜卦謂乾為圜為金玉為良馬坤為布為釜震為𤣥黄决躁之類不過備言萬象皆易所該非有闗于作易之大㫖學者所不必深究也何也上古聖人仰觀俯察既象六竒以盡乾道然徒知其健不知玩其消息屈伸之理亢不終無也故復象以龍潛見飛躍變化備焉君子觀見羣龍而用九之道得矣既象六偶以盡坤道然徒知配乾而不知䘮類從乾之㫖戰不終無也故復象以牝馬柔順攸行後得昭焉君子取法牝馬履霜之戒深矣既中虚象離以盡乾之用然或徒知用明而不知于麗正履錯之咎不免也故復象以牝牛則黄離之正昭焉涕洟之吉大老至之嗟又不待言而析其得失之所在矣乃若咸艮之取象于身尤可得言矣山上有澤剛來而下柔咸卦也咸感也身感之本也故象焉然人一身外惟拇腓股脢與輔頰舌内惟思不足以感人則身所為感果何物乎君子觀象于此知必有咸于身而不滯于身者在也而虚可黙識矣内外皆山敵應不相與艮卦也艮止也身止之樞也故亦象焉然人一身止之可得言者析之趾腓限輔總之則身今皆所不可止則身所為止果何在乎君子一象于此知必有艮其身又不獲其身者在也而思不出位可黙識矣盖乾坤之取象于龍馬牝牛以所可得象者象所不可得象者欲求于象之中咸艮之取象于吾身也借可象者以反形乎可象之有不可象者而欲人求于象之表所謂曲暢其旨使人易從者也知此則吉不知此則㓙悔吝是非易之旨大業所由生矣非學者所當盡心乎至于說卦所稱乾為君為父是矣而又為瘠馬為駁馬坤為母是矣而又為吝嗇為子母牛震之寡髮坎之薄蹄離之乾卦艮之黔啄皆不知所取雖一一解釋不無義理然斷無闗于作易之㫖吉凶之大業焉故曰學者所不必深究也後世儒者不知此義愈求愈惑遂使䜟緯占卜之術皆簒附于易率天下以歸于賊固無足論而晦菴先生于本義亦時以坤為土兊為羊坎為輪之類釋之雖閒見一二亦有以啟後人徇象支離之弊矣或曰說卦所稱後世據為卦例測占多驗何邪曰此道不明乆矣聖人之占非世所謂占聖人之吉凶悔吝非世之吉凶悔吝也聖人之占誠明之實理而世固術數之小知也聖人之吉凶悔吝天理得失之至公而世固一己利害之私也然則世所謂吉者安知非凶悔吝而幸中之多反足為誠明之累亦何所論于驗不驗之間乎乾坤姤復有父母大小之分何哉易六十四卦陰陽而已矣一陽為復乾則純乎陽也一陰為姤坤則純乎陰也由復而臨泰大壮夬乾則乾道成男由姤而遯否觀剥坤則坤道成女是萬物化生皆成于乾坤而始于姤復也雖然此固天地自然之運人心亦若此也乾用九坤用六邵子云如何九與六能盡人間事指乾坤也復為天根姤為月窟邵子云乾遇㢲時觀月窟地逄雷處看天根指姤復也善用九與六者其致審于姤復之際乎乾稱父坤稱母姤復不過得乾坤之初爻耳然而均之為父母者盖惟父母為能生生不息也人知乾坤之大生廣生矣孰知由微至著皆自一陰一陽為之始哉况乾陽之極而巽之一陰已于此乎姤矣坤陰之極而震之一陽已于此乎復矣乾坤姤復之間萬物之生生化化無窮盡者皆從此出也豈獨天地為然一呼一吸一動一静即吾人之姤復也惟日用不知未免滯焉而不交偏焉而過勝此所以不能立天下之大本也欲為乾坤之肖子者慎毋忽于姤復之㡬十二卦乃陰陽消長之機聖人于六十四卦獨于此八卦謂其長且于四陽卦則喜其長于四陰卦則懼其長其意葢可識矣先儒于姤之不可與長而獨以不可長久釋之何歟四聖之易只是發明陰陽消長之理陽長陰消則吉陰長陽消則㓙人之所以進退存亡作止語黙皆是理也果能真悟陰陽消長之機則藏往知來沉機先物天地合德四時合序者在吾人矣故泛應曲當舉措合宜與時偕行而我無所與雖日與天下相酬酢咸吉無不利非握陰陽消長之權者其孰能之十二月卦自復卦一陽生為冬至子中屬十一月中臨卦二陽生為大寒丑中屬十二月中泰卦三陽生為雨水寅中屬正月中大壯四陽生為春分卯中屬二月中夬卦五陽生為糓雨辰中屬三月中乾卦六陽生為小滿已中屬四月中為純陽之卦陽極則陰生故姤卦一陰生為夏至午中屬五月遯卦二陰生為大暑未中屬六月中否卦三陰生為處暑申中屬七月中觀卦四陰生為秋分酉中屬八月中剥卦五陰生為霜降戌中屬九月中坤卦六陰生為小雪亥中屬十月中為純陰之卦陰極則陽生又繼以十一月之復焉陰陽消長如環無端不特見之卦畫之生如此而卦氣之運亦如此自然與月之陰陽消長相為配合大傳所謂易與天地凖故能彌綸天地之道於此亦可見其一端聖人之作易也觀變于陰陽而立卦雖上下無常變動不居然陽之畫象則竒也陰之畫象則耦也故曰乾陽物也坤陰物也知乾陽坤陰則六十四卦可知矣于乾初爻曰陽在下也坤之初爻曰陰始凝也知乾坤之初爻則三百八十四爻可知矣但消長盈虚固天地一定之運而世道之升降人道之吉㓙于此乎寓故于泰曰小往大來彖曰内陽而外陰内君子而外小人君子道長小人道消也于否曰大往小來彖曰内陰外陽内小人而外君子小人道長君子道消也即陰陽之盛衰示人以理欲消長之機可謂諄且切矣凡剛柔大小内外出入卑髙貴賤皆此意也且于繫辭曰陽卦多陰陰卦多陽其故何也陽卦竒陰卦耦其德行何也陽一君而二民君子之道也陰二君而一民小人之道也註云凡陽卦皆五畫凡陰卦皆四畫君謂陽民謂陰是陰陽之卦皆以陽為君也陽卦多陰以一陽畫為君則四畫為民君一而民二故為君子之道矣陰卦多陽以二陽畫為君則二陰畫為民君多而民寡故為小人之道乎且只以多寡言是陽多反為小人也殊不知陽卦竒竒即一也陰卦耦耦即二也謂陽一而陰則二也陽一君二民者陽卦以陽為主而陰為之民故曰君子之道陰二君一民者陰卦以陰為主而陽反為民矣故曰小人之道本以陰陽分君子小人非以五畫四畫為君子小人之分也雖扶陽抑陰易為君子謀要皆因天地自然之象而繫之辭焉耳聖人何庸心哉况究其極至既云德行則畫數非所論也不然否泰二卦乾無陰畫何以謂之為君子坤無陽畫何以謂之為小人剥止一陽何以謂之為小人長也唯㑹而通之斯善易矣王氏曰三相參為參五相伍為伍以乾之畫參坤之畫變之為震坎艮以坤之畫參乾之畫變之為巽離兌所謂參以變也象天地合德陰陽交感也一與九相伍二與八相伍三與七相伍四與六相伍五與五相伍謂為行伍合為大衍之數五十所謂伍以變也參天則天一天三天五總而為九兩地則地二地四合而為六方其揲蓍者七九八六皆以為用及其成卦舍七而取九舍八而取六倚於一偏是為倚數夫竒數皆天偶數皆地生以天者成以地生以地者成以天其為天若地特陰陽之進退出入竒耦之體用分合而已説卦曰參天兩地而倚數觀變於陰陽而立卦發揮於剛柔而生爻大傳曰參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變孰能與於此其曲盡乎至妙之用者河圖法也其曰參曰兩曰參伍者通其數之所變以用也參也者一二之所以變也由一自分其一以為二起自為之對則見其二而不見其一矣其一又自參出於二之中故三也於參之法是即為一小成是三畫之立見人參於天地之中以生也積三小成參其三而合於乾元用九是參之始制即陽竒之謂天者所由然也兩也者由一生二起而對並以立既以象因之兩其二以象四象天一本自一而二參其一以為三况二本一之對豈不得二其三而反對之乎故從而三其二以成六即合於坤元用六是又兩之始制兼三才而兩之故六因之六畫成卦六位成章即陰耦之謂地者亦由以然也由是參其兩二而交又以合之是伍也兩其二伍則又什矣十特見於參九之外則又一之所由以寄者也何以明之參之兩之而伍而什之皆人文之為而自然與天地合者參文之厽彡兩文之帀从至維伍維什皆立人於維中維旁者斯可黙識古人立心立極之制有在於是矣必參其三三兩其三二是參兩之一小成矣故必又參其三三而參之為參天兩其三二而兩之為兩地是天地之數無從而合且分矣乃以其初不入於用之一數竒於十以行其中而為之分且合以成其中制者是一也而求於圖之數如環無端其一莫見何在而所見惟十爾夫參其三三與兩其三二合而為大參兩斯有以見天地渾成一始終者所以然也至所謂參伍錯綜則未究也其謂之參伍錯綜者伍以􅀢之數少於伍無所用伍五以後之數多於五故參以五伍於其中錯且綜之而行其制中之法也然大傳於參伍以變錯綜其數亦必謂通其變然後能成天地之文極其數然後能定天下之象則知其未易知也然既教以參伍錯綜則安得不研求所以然哉因參稽自繫易以來已幾二千年矣學者無探索及之者至於龍圖續始亦無發明深切愚之心濳力索極深研幾適然省悟元無他事也大傳曰天數五地數五五位相得而各有合即圖之數矣故夫參天者成象謂乾於是參陽數之三三以統乾元用九而參中有兩陽中見陰兩地者效法謂坤於是兩陰數之二二效法於乾遂參其二而六之以㑹坤元用六而兩中用參隂中見陽以是見一陰一陽變而通之於天地之間所以必參兩也參之兩之所以必九六也參亦非他即前所謂一二之變也一自分其一以為二起而相對則見其二而不見一其一又自參出於二之中故曰參也此參制之一小成然參兩參伍莫不於是焉起斯故示其參之幾也天髙地下渾兮闢兮二氣絪緼莫知端倪屈伸摩盪變化無方成象成形洋洋乎充塞於兩間矣果孰主張是哉不可得而形容不可得而名狀渾淪無端謂之太極空洞無際謂之太虚真精不二謂之太一生化莫測謂之大造髙明博厚其形體也覆載發育其功用也陰陽剛柔神妙萬物皆所以言天地而非所以言天地之心也天地之心且不知何所指而欲見其心焉難矣哉復卦彖傳曰復其見天地之心乎天地之心何心也親上親下類聚羣分化機滿盈孰非天地生生之心乎雖純陰純陽冲漠無朕而萬象已森然其具在焉况天地之心本無間斷從開闢以來無一日不生無一息不生淵淵浩浩無從而見之也聖人教人惟於雷在地中一陽起於五陰之下其卦名曰復可見其心焉何哉乾知大始坤作成物一陽之復即乾陽也乾陽復於坤陰之初則其作成物已於此乎知大始矣一歲之間大生廣生品物流形滿腔子生意盎然莫不由冬至一陽以鼓其化生之機天地生物之心不即此而見之乎葢天地以生物為心物必陽氣而生也玩其卦畫一陽復于五陰之下而得意忘象亦可以黙識矣大哉乾元萬物資始至哉坤元萬物資生元為萬善之長即仁也見其所謂元則心可見也天地之大德曰生生生之大德即心也見其所謂德則心可見也程子謂動見天地之心震動也震陽動於坤下故見其心于陽之動也邵子謂冬至子之半天心無改移一陽初復處萬物未生時亦以一陽初動為天心也且易卦于震在天上為大壯謂天地之情可見矣於咸恒萃又謂天地萬物之情可見矣夫復見天地之心大壯見天地之情咸恒萃見天地萬物之情合而觀之天地之化育其庶幾矣夫天地之大其心亦可見焉在人又不可知也彼謂合性與知覺有心之名果足以盡心之義乎雖然聖人指天地之心以示人而人皆有不忍人之心所謂得天地生物之心以為心是也故曰仁人心也但人皆不能自見而能見諸天地焉未之有也復初爻辭曰初九不逺復無祗悔元吉仲尼獨以許顔氏之子焉葢克己復禮為仁而囘也其心三月不違仁以其復也信乎復以自知而欲見天地之心豈求諸天地哉惟求自知焉斯可矣天大於地而包乎地地之上天也地之下亦天也日與天同運天無晝夜而日亦無晝夜也所以有晝夜之分者日出乎地而明則為晝日入於地而暗則為夜耳知日通晝夜而明則近而一呼一吸之暫逺而千萬世之上千萬世之下猶是也人即小天地也形其地之載乎氣其天之運乎形氣之所以靈於萬物非吾德性之知著明於太虚之表乎世之日用不知者昏昏而晝昏昏而夜者人亦物也無足論也雖知人各一其見者明於東而暗於西通於此而塞於彼亦彼自以為知耳晝亦未之通何以通乎夜也如是而謂其能全吾性之知也可乎或曰晝作而夜息吾人亦何嘗與天地異曰日出地而晝日入地而夜天地之常也日則不以晝夜異其明日出而作日入而息吾人之常也知果通晝夜而無一息之間乎彼昏昏而作昏昏而息者彼百年皆長夜矣縱此明而彼暗不免以瞬息為晝夜也况所明之不全乎雖然以人性之知而取譬於天之日猶涉于象也惟得意忘象斯可矣或曰行不著習不察由于不知信乎知先而行後謂之知行以萬古常行萬古常明而行矣不明是為㝠行知或偶合亦為暗合所以學莫要於致知然則聖人之知如之何曰聖通明也即吾人本然之性也聖人先知先覺常明常覺特先得乎吾性之同然者耳然則作聖人之功如之何曰終日乾乾夕惕若知至至之知終終之庶幾通晝夜之道而知朱吕二公話及九卦之序象山先生因亹亹言之大畧謂復是本心復處如何列在第三卦而先之以履謙葢履之為卦上天下澤人生斯世須先辨得俯仰乎天地而有此一身以達其所履其所履有得有失又繫于謙與不謙之分謙則精神渾收聚於内不謙則精神渾流散于外惟能辨得吾一身所以在天地間舉措動作之由而斂藏其精神使之在内而不在外則此心斯可得而復矣次之以常固又次之以損益又次之以困葢本心既復謹始克終曽不少廢以得其常而至於堅固私欲日以消磨而為損天理日以澄瑩而為益雖涉危蹈險所遭多至於困而此心卓然不動然後於道有得左右逢其源如鑿井取泉處處皆足葢至於此則順理而行無纎毫透漏如巽風之散無往不入雖宻房奥室有一縫一罅即能入之矣易繫辭傳下包犧氏罔罟取諸離神農氏耒耜取諸益市取諸噬嗑黄帝堯舜衣裳取諸乾坤舟楫取諸渙服牛乗馬取隨門柝取諸豫杵臼取諸小過弧矢蓋取諸睽棟宇取諸大壯棺槨取諸大過書契取諸夬右十三卦夫子述五聖人制器尚象之事也器無窮卦之象亦無窮豈特十三卦為然哉夫子特舉此以發其例耳觀此則聖人之用易豈盡假卜筮以用之而卜筮一端豈足以盡易哉天地定位山澤通氣雷風相薄水火不相射八卦相雜數往者順知來者逆是故易逆數也讀卦説卦曰天地定位山澤通氣雷風相薄水火不相射八卦相雜數往者順知來者逆是故易逆數也先儒謂此為伏羲卦位先天之學且未敢辨然註云起震而厯離兑以至于乾數已生之卦也自巽而厯坎艮以至于坤推未生之卦也是以震離兑乾為數往以巽坎艮坤為知來其意謂陽順而陰逆也但㨿一圖而以半為數往之順半為知來之逆謂之為易道也其果然歟夫易之書示人以知來之學而藏往在其中也何也陰陽消長其機甚㣲而吉㓙悔吝即此乎在故以陽為君子之道陰為小人之道然陽之方長即當保其微既長則又懼其過所以一陽方復于下即以為元吉于乾初則曰濳龍勿用然上則㓙而于乾上則曰亢龍有悔盈不可久也防陰亦然所以一陰方姤於下即以為見㓙于坤初則曰履霜堅冰至然上則吝而于坤上則曰龍戰于野其道窮也所謂其初難知其上易知見其㣲而逆知其将來葢不待其顯著而後為之圖也子曰知幾其神乎幾者動之㣲吉之先見者也君子見幾而作不俟終日又曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行中庸善必先知之不善必先知之易道逆之將來葢如此嘗觀古太極圖一陽復于坤而究其極則純乎乾一陰姤於乾而究其極則純乎坤陰陽老少八卦方位一皆天地自然之道聖人不過指其象以垂訓世人使人皆知㣲之顯而極數知來之占占以此耳譬如厯之設也豫推來歲寒暑節候以敬授人時而已往甲子亦即此可數雖厯亦重乎來歲之宜也是故觀圖象卦位其順逆往來可以左右言不可以陰陽分也明矣試以順逆二字之義言之如時當半夜自今亥時數至昨日之午自昨日巳時數至昨夜之子皆數往也順也所謂茍求其故千歲之日至可坐而致是也自今子初推至明日巳末自明日午初推至明夜亥末皆知來也逆也所謂成敗利鈍非臣之明所能逆覩是也然則自乾之純陽厯離兑以至一陽之震而其原則為純陰自坤之純陰厯艮坎以至一陰之巽而其原則為純陽非數往之順乎自震之一陽厯離兑以至乾之純陽而陰又將姤自巽之一陰厯坎艮以至坤之純陰而陽又将復非知來之逆乎可見左旋則總為知來右旋則總為數往不必以一二三四五六七八之卦從中半分其順逆也但易以知來為主陰陽往來生生不窮故曰生生之謂易而於此段總之以逆數也是以逆而數之由一竒以推極乎數之陽由一耦以推極乎數之陰自震至乾自巽至坤按圖象卦位則皆逆也况數其已往知其將來理本一致而陰陽消息盈虚循環無端惡可截然分之二哉易逆數余三復學庸深知易數之貴逆也所以致未發之中也大傳曰天地定位山澤通氣雷風相薄水火不相射數往者順知來者逆夫易逆數也先儒謂由震至乾數已生之卦為順由巽至坤數未生之卦為逆而本易之成則惟乾兑離震巽坎艮坤之次如横圖與圓圖右方而已故曰易逆數也其説是矣然易主生生順其所也而何逆哉則儒者所未嘗言矣愚謂往者由中之外之辭來者由外及中之辭造化冬至陽生子中為震小滿極午為乾之乎外也謂之往數此謂之數往以其生生之機順故稱順焉夏至陰生午中為巽大雪極子為坤反乎中也謂之來知此謂之知來以其於生生之機逆故稱逆焉與往而信者神來而歸者鬼同義葢造化之理非逆則無順使皆順窮矣故聖人作易㕘贊之深㫖全在於逆故曰易逆數也此即學庸致中之道也何者大學經世之書也始欲明明德於天下終焉絜矩天下平凡好惡公僻慈讓貪􅎱庸賢理財之賾惓惓唯恐不盡君子志存天下固宜云爾矣而必首推知止極於静慮何哉固以治平之有本也然彼猶畧言之也至於中庸則始性命之不可睹聞終天地之無聲無臭雖中間備詳舜文武周孔子聖神之業而淵泉於穆無為不顯之妙津津乎詳言之葢大學意在盡人中庸極于本天故詳畧各異然思知人不可不知天中庸出而大學之意愈明矣兹易之所為逆矣今夫天下曷為有事變乎好惡形而事變起心曷為有好惡乎性情感而天命嚴故卦不虚設設以象事事不自作作於一心心不孤起肇於天命是以卦質乎事爻畫乎心吉㓙原乎天凡逆之㫖本天而已故兩書者易之註疏也嘗合而論之羲文創易既作八卦又重為六十四卦豈好詳哉推心知性命為脩齊治平參贊經綸之實事卦以事為質無是事則無是卦事有不得不詳故曲暢其往而使人道盡所謂麗於事也坤生震兑乾之義也孔子贊易既明六十四卦之中又遡於太極宻於退藏推本羲畫之由如此豈好深哉正反道德仁譲盡人贊化之盛於未發與天載之㣲㫖人非天不因天命有所必不可違是以精研逆數於心而使天道明所謂畫乎心而原乎天也乾生巽艮坤之義也故六位折乎倫品竒偶盡乎時宜或盈虚消長之異數或吉㐫悔吝之殊方動此應彼皆人事之至切好惡貪慈機分失得從前先後具屬經綸葢吾身所至非家即國非國即天下無一日可廢事則無一事可廢易不必求之卦數之順凡由中達外以恕施時出莫非吾之數往矣雖然物情類乎神慮惟幾研於極深使盡人者一求諸人事之賾往而不返而可以施於天下國家也則慮不本静顯不自㣲肺肝之見屋漏之愧亦何當於潤身絜矩篤恭刑辟之實事哉易無事於實中矣不知六十四卦必有中而中即八卦之中也八卦之中即一卦之中一卦之中即吾喜怒哀樂之未發未發天也所好好之所惡惡之罔不本吾一念之天善必先知之不善必先知之亦罔或昧吾一念之天葢人心雖殊天固自定情偽變遷知常自止而戒欺求慊脩吉違㐫非深研莫竟不必求之卦數之逆凡由外反中而兢兢幽獨以稽謀自天莫非吾之知來矣余故曰逆數者所以致未發之中也君子深味兩書而後知易為心數豈徒象天地山澤風雷水火之往復而已哉學易君子其盡心焉必知天乃盡人矣或問順逆之説異於先儒者何曰先儒惟就横圖以論圓圖故自震至乾為數往故曰順自巽至坤為知來故曰逆以横圖由逆而成故以易為逆數此先儒之所已發可以象求者也至圖之所示則坎離為用順則左旋一陽震二陽兑三陽乾巽一陰艮二陰坤三陰自外而内所謂化育之真機也逆則右轉一陽艮二陽巽三陽乾兑一陰震二隂坤三隂自内而外所謂聖神之妙用也一陽初動坤變為震艮變為離坎變為兑右轉又一先天此易為逆所謂天地人之至妙至妙者也八卦相錯為六十四順則六陽六陰由外之内逆則六陽六陰由内之外逆轉則坤變為復剥變為頥比變為屯六十四卦逆變莫不皆然此圖不能盡意吾人當黙㑹於言句之外者也易逆數圖前已論之矣復取此圖者何葢就圖言之從中兩分陽順陽逆亦無不可但以此釋易逆數也則非聖人之㫖矣若變通觀之六十四卦六陽六陰以内外言順逆而總一圖以左右還轉何不可哉是故順則左旋一陽震二陽兑三陽乾巽一陰艮二陰坤三陰自外而内逆則右轉一陽艮二陽巽三陽乾兑一陰震二陰坤三陰皆自内而外非特與圖象不相抵忤而易道變遷不可為典要此亦其一端云先天方圓圖順逆總論大哉易乎本無體也體且無之而畫為圖象聖人豈得已哉正以見不易之内有變易者存變易之中有不易者寓雖畫為圖象以盡其意要非一圖所能盡也故既曰先天又曰後天而先天亦豈一圖能盡哉故既有圓圖又有方圖其中意義又有不可以一端盡者何也易本生生不測而無體之秘悉藏于有象之圖也以圓圖順逆言之自復至乾陽變陰也皆從下而上復一陽臨二陽泰三陽大壯四陽夬五陽乾六陽自姤至坤陰變陽也皆從下而上姤一陰遯二陰否三陰觀四陰剥五陰坤六陰總之順而左旋也自夬至坤陰之變陽則從上而下夬一陰大壯二陰泰三陰臨四陰復五陰坤六陰自剥至乾陽之變陰亦從上而下剥一陽觀二陽否三陽遯四陽姤五陽乾六陽總之逆天而右轉也然左右順逆其氣之與數又不齊焉自子一陽生而為復左旋至乾氣順也自乾一至震四逆天右行數逆也自午一陰生而為姤右旋至坤氣順也自坤八至巽五逆天右行數逆也順行者數往故順卦之氣逆行者知來故逆卦之數也且卦數雖始乾一終巽五逆天而行然卦氣則始冬至復終大雪坤實順天而行葢卦數之元自乾始卦氣之元自復始也自右旋而言左陽順陰逆一二三四順八七六五逆右陰順陽逆八七六五順一二三四逆自左旋而言則左陽右陰之數皆逆葢由氣左行數右行以氣順而觀則其數已往以數逆而觀則其氣方來也若自左右卦畫言之左為乾兑離震共一百十二陽八十陰右為坤艮坎巽亦一百十二陰八十陽其象何整齊也然兑離當春百五十二陽四十陰坎艮當秋故反之乾巽當夏百六十四陽三十二陰坤震當冬故反之葢春秋晝夜等而陰陽殊由春主陽生秋主陰殺故在日月則晝夜之數同在天地則陰陽之分異也以卦畫竒耦言之兑離震居左天之分也震一陽二陰離兑陽漸多焉巽坎艮居右地之分也巽一陰二陽坎艮陰漸多焉葢在天而陰多陽少則陽不見在地而陽多陰少則陰不見故冬至後四十五日立春而後陽用事夏至後四十五日立秋而後陰用事所以天辰不見地火常濳也即卦圖觀天地曽何毫髪之或爽邪知圓則知方矣以言乎方圖則又有不盡然者葢四周皆乾坤之卦而中心三十六卦皆六子卦也乾陽爻三十六坤陰爻三十六六子卦縱横相對陰陽之爻合而為三十六焉然横數八卦乾居在下縱數八卦則乾卦在上葢運行用横數生物用縱數八宫卦横數夬在乾宫縱數則夬在兑宫矣葢運行者氣也生物者質也氣與質殊故縱與横異乾為北政坤為南紀乾上行而左坤下行而右動物本乎天植物本乎地賦與不齊南北異施所以横數八卦類聚于下氣之變也縱數八卦類聚于上形之化也且圖從中出六十四卦震巽為之中心葢震巽屬木木主仁也不可以見天地生物之心乎若并方圓二圖而言圓圖左乾兑離震陽在陽中皆順行方圖左坤艮坎巽陰在陽中皆逆行圓圖左坤艮坎巽陰在陰中皆順行方圖右乾兑離震陽在陰中皆逆行此若有不同者不知天圓地方而圖象之方圓即天地也天以陽在南陰在北地以陽在北陰在南觀南方天氣熱地氣寒北方天氣寒地氣熱葢可見也謂方圓圖象即天地之法象也不信然哉然此皆自圖象之易見者言之以見意義之無窮耳觀象察變凡宇宙間生生化化孰不含蓄於圖象中哉至于縁有象之圖窺無體之秘與造化為徒豈易言哉圗書編卷五
