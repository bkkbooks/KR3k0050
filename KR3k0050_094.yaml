虔臣蓋祇獻兮馨醴牷願垂歆享兮民福淵初獻夀和禮嚴初獻兮捧觴臣將上進兮聖皇聖皇垂享兮穆穆臣拜首兮何以忘亞獻豫和禮觴再舉兮薦玉漿帝顔歆悅兮民福昂民生有賴兮感上蒼臣惟鞠拜兮荷恩長終獻熙和三獻禮觴兮祀事孔明一念微衷兮露悃臣情景張樂舞兮聲鍠鋐仰瞻聖容兮俯賜恩泓徹饌雍和祀禮峻兮精意禋三獻備兮誠己申敬徹弗遲兮肅恭寅恐多弗備兮賴洪仁送帝神清和禋事訖終兮百辟維張帝垂歆鑒兮沐澤汪洋龍車冉冉兮寶駕旋雲靈風鼓舞兮瑞露清瀼洪恩浩蕩兮無以為酬粗陳菲薦兮已感歆嘗香氣騰芳兮上徹帝座仰瞻聖造兮賜福羣方臣同率土兮載歡載感祗回寶輦兮鳯嘯龍翔誠惶誠恐兮仰戀彌切願福生民兮永錫亨昌望燎時和龍車寶輦兮升帝鄉御饈菲帛兮奉燎方環珮鏗鏘兮羅壇壝炬焰特舉兮氣輝煌生民蒙福兮聖澤沾臣荷眷佑兮謝恩光銅人齋牌年月日冬至大祀天于圜丘某日午後沐浴更衣某日為始致齋三日祭司牲祝文太常寺卿某等致祭于司犧牲之神青山水草之神犧牲所土地之神曰郊祭為重犧牲為先畜牧豐肥惟神是賴某等兹選吉辰躬親自上滌欽奉上命祭用肴饈謹用祭告神其鑒之尚享長安門示太常寺為祭祀事某年十一月某日冬至大祀天于圜丘文武百官自某月某日午後沐浴更衣于本衙門宿歇某日各具朝服聽受誓戒本日為始致齋三日其陪祭官員除年老殘疾瘡疥氣喘刑餘喪過之人不與外文官五品以上武官四品以上六科都給事中皇親駙馬指揮千百户等官至日各具祭服伺候陪祭官合行知會大報前期欽定大臣命下移手本各大臣請知前七日移手本鴻臚寺請升殿奏看牲并奏祭祀又揭帖移司禮監接看牲官本又手本移錦衣衛差官校舁香輿亭前五日移揭帖司禮監填請配神祝版並奏祭祀接分獻官本是日委官二員赴寺領金燈掌樂領金鐘前三日移揭帖司禮監填祝版令壇官發香輿亭于錦衣衛官校并捧蒼璧祝版匣同青紵絲分八十一龍袱青白匣二香盒一送寺候進是日晚官吏厨役俱于本寺齋宿圖書編卷九十四
