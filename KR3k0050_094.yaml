body:
  text: 圖書編卷九十四明章潢撰皇明郊社宗廟聖廟三禮總敘太祖勤民育物敬共明神博考經誼釐正祀典二丘始分而中合四廟先異而後同明堂肇於周經我則郊焉而侑仁祖太公遺於漢寢我則廟焉而祔宗人有其舉之至存佛老之宫無可考矣寧缺禘嘗之義蓋其酌今古通幽明絶地天和上下時因而因或沿於七代時革而革可考于三王殷殷乎秩秩乎撫世宜民神道設教不可以有加矣當是時議禮之臣李善長宋濓詹同陶安崔亮牛諒陶凱朱升樂韶鳯諸君子皆能尋則夷彤取法萃渙條章品式以授祠官雖損之益之未必盡復古先聖王之舊而仰贊聖猷一洗汚俗凡其矯誣妖誕褻鄙侵黷奇邪巫覡諸不在祀典者莫不峻制而曲防之豈非猾夏之禍烈於九黎非常之功難於二正時與勢然乎必欲咨三禮於四嶽俟兩生於百年迂遠而闊於事情矣列聖相承式遵成憲建文撤仁祖而郊髙皇仁宗因髙皇而進成祖逮至憲宗升祔有祧寢之議孝穆登饗有奉慈之議情文恩義不得不然也其他稍有注措不過微文細故之間而已世宗皇帝天德髙明聖學純邃孜孜三重休洽百神郊禘廟祧社稷禖雩帝王聖師雲雨風雷嶽鎮海瀆農蠶醫牧老君仙子山公水伯司舟宗匠靡神不舉商宗肜日徒云豐昵周王雲漢僅爾弭災孰若世宗皇帝發九世積德而垂常經也嗚呼盛矣郊社名義郊郊特牲兆于南郊就陽位也又曰王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也大司樂冬至日于地上之圜丘奏之則天神皆降可得而禮矣冬至一陽生而郊此祭天之正祭也以其在郊外南方之園丘故名之為郊四面各設天神蓋日東月西風師東雨師西星則或南或北也自冬至祭天後每日以次而祭天神或使諸臣命秩同者攝之同丘同樂故曰天神皆降非謂百神從祀也古者大祭祀必七日戒三日齊茍祭日月四望等神而皆如此日亦不足矣惟于祭天後行之或于時日而攝祭既得精意于大祀又得精意于次祭而亦不失其為致齊也祀五帝小宗伯兆五帝于四郊四望四類亦如之大宰祀五帝則掌百官之誓戒前期十日帥執事而卜日大司徒祀五帝奉牛牲大小司冦禋祀五帝或疑天一而已不應有五疑後世纂入之文是不然周禮全經文誤者寡雖纂入不應數處皆然蓋天體雖一而氣之流行截然不同易曰帝出乎震齊乎巽月令曰盛德在木之類是矣故王者因其氣之至而祀之也夫天無心也一陽之生天心于是而見故冬至以祭天帝無形也五氣之易帝之主帝于是見故于四孟季夏以祭五帝然祭雖有五但因其方氣之不同而其禮物亦異非天實有五也至其所配則以五人帝而其從祀又以五神人者蓋上古聖人繼天而王其性雖無不全其厯數受命必各得其氣之盛若太皡以木德王周人以火之類又古者神明之臣皆能燮調元和司天司地各有攸職世執其功如重為勾芒黎為祝融該為蓐收修及熙為玄冥其功不可掩故必配以五人帝而從以五神人也或又云祭不欲數上帝一嵗五祭無乃煩而不敬乎蓋元后者天之元子故事天之禮一視其禮考而時祭不為數也迎氣月令先立春三日天子乃齋立春之日迎春于東郊迎夏于南郊迎秋于西郊迎冬于北郊皆如迎春禮致日堯典寅賓出日寅餞納日敬致春分朝日秋分夕月大祁大雩大享月令孟春天子以元日祈榖于上帝元辰天子親載耒耜周頌臣工明昭上帝迄用康年月令仲夏大雩帝用盛樂大雅雲漢篇不殄禋祀自郊徂宫月令季秋大享帝小雅來方禋祀以其騂黑月令孟冬乃祈來年于天宗類虞書肆類于上帝湯誥敢用玄牡敢昭告于上天神后大雅是類是禡武成底商之罪告于皇天庚戌柴望召誥用牲于郊周禮大宗伯國有大故則旅上帝小宗伯大災及執事禱祠于上下神祗太祝太師類于上帝類于郊故曰類柴虞書嵗二月東巡狩至于岱宗柴五月南巡狩八月西巡狩十有一月朔巡狩如岱禮孝經曰宗祀文王于明堂以配上帝大社祭法王為羣姓立社曰大社大司樂夏日至于澤中之方丘奏之若樂八變則地示皆降可得而禮矣又曰以夏日至致地示物魅四時社祭春祈榖于方社田祖夏禜水旱冬大蠟大司馬春火弊獻禽以祭社秋羅弊致禽以祀祊詩以社以方以御田祖以祈甘雨王社祭法王自立社曰王社小宗伯凡天地之大災類社稷則為位大祝國有大故天災彌祀社稷禱祠大師宜于社及軍歸獻于社大會同宜于社反行舍奠小祝有寇戎之事祀于社后土為大社冡土為王社大封先告后土軍社大司馬小宗伯師帥有司立軍社大祝大師設軍社甘誓不用命戮于社亳社商之舊社周禮郊社總論楊氏曰愚按古者祭天地有正祭有告祭禮雖不同義各有當冬至一陽生此天道之始也陽一噓而萬物生此天道生物之始也故周禮大司樂以圜鍾為宫冬至日於地上之圜丘奏之六變以祀天神所以順天道之始而報天也祭天必於南郊順陽位也夏至一隂生此地道之始也隂一吸而萬物成又地道成物之始也故大司樂以函鍾為宫夏至日於澤中之方丘奏之八變以祀地祗所以順地道之始而報地也祭地必於北郊順隂位也此所謂正祭也舜之嗣堯位也類於上帝望於山川嵗二月東巡狩則柴於岱宗秩望於山川武王之伐商也底商之罪告于皇天后土又柴望並舉大告武成成王之營洛也丁巳用牲于郊翼日戊午乃社于新邑凡因事並告天地有同日而舉有繼日而舉者此所謂告祭也然祀上帝則曰類者謂倣郊祀之禮而為之則非正祭天也告地而舉望祭之禮或社祭之禮則非正祭地矣蓋特祭天地乃報本之正祭也故其禮一位専並祭天地因事而告祭也不必拘其時不必擇其位雖舉望祀社可以該地祗故其禮要而簡所謂禮雖不同義各有當者此也自漢以來分冬至夏至二祀為南北郊北郊則周人之方澤也然後之人主欲行郊社之禮者未聞以南郊為難而常以北郊為難夫五月雖盛暑之月他事之當舉他禮之當行者未嘗廢也而獨難於北郊何也諸儒謬誤之説惑之也按司服王祀昊天上帝則服大裘而冕祀五帝亦如之惟祀地之服經無明文鄭注亦未嘗及之賈公彥始為之疏曰崑崙神州亦服大裘可知夫賈公彥一時率爾之言未嘗深考其故豈有夏至陽極之月而服大裘哉崔靈恩孔頴逹與杜通典亦謂是郊天地之服不問寒暑必服大裘而北郊遂為不可行之禮至宋朝元祐中議北郊禮論者猶以大裘不可服為言於冬至南郊合祭天地者矣若顧臨等所言是也有援虞周告祭之禮以證祀地之正祭者矣如蘇軾之言是也因諸儒一時謬誤之言欲廢祀地之大典可不惜哉或曰正祭告祭之禮不同而人主父事天母事地其心一也告祭不拘其事不擇其位而可以對越天地則正祭不拘其時不擇其位奚為不可以對越天地乎曰因天道之始而祀地以類求類此報本之祭也當天道之始而祀地於義何居周公制禮冬至祀天夏至祀地其義不可易矣周分豈欺我哉祀天總敘天子之禮莫大于祀天故有虞夏商皆郊天配祖所從來尚矣周官大司樂冬至日祀天於地上之圜丘大宗伯以禋祀祀昊天上帝孝經曰周公郊祀后稷以配天所以重報本反始之義而其禮則貴誠而尚質見於遺經者可考也秦人燔書滅學西戎之俗立畤以祠白青黃赤四帝漢高祖因之又增北畤兼祠黑帝至於武帝有雍四畤之祠又有渭陽五帝之祠又有甘泉太乙之祠而昊天上帝之祭則未嘗舉行至元帝時王莽諂事元后傅會昊天有成命之詩合祭天地同牢而食其褻尤甚光武祀太一遵元始之制而先王之禮隳廢盡矣魏晉以來郊丘之説互有不同宗鄭玄者以為天有六名嵗凡九祭六天者北辰曜魄寶蒼帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝叶光紀是也九祭者冬至祭昊天上帝於圜丘立夏季夏立秋立冬祭五帝于四郊王者各稟五帝之精而王天下謂之感生帝于夏正之月祭于南四月龍見而雩總祭五帝于南郊季秋大享于明堂是也宗王肅者則以天地為一安得有六一嵗二祭安得有九大抵多參二家之説行之而至唐為尤詳武德貞觀間用六天之義永徽中從長孫無忌等議廢鄭玄義從王肅説乾封中復從鄭玄議焉宋太祖乾德元年冬至合祭天地于圜丘神宗元豐中罷合祭哲宗紹聖徽宗政和間或分或合高宗南渡之後用合祭之禮元初用其國俗拜天于日月山成宗大德六年建壇合祭天地五方帝九年始立南郊專祀昊天上帝泰定中又合祭然皆不郊文宗至順以後親郊者凡四惟祀昊天上帝國朝初分祭天地于南北郊冬至祀昊天上帝于圜丘以仁祖淳皇配其從配則惟以大明夜明星辰太嵗皇帝每嵗親祠參酌成周唐宋之典以適其中蓋不牽惑于鄭玄讖緯之説可謂眀矣郊祀義郊之祭也大報本反始也窮本極始而天地之性可得也主日日天之主也天無眀日為之萬物所視以作息天之有日猶心有知故主之也冬日至祀天於圜丘圜丘郊南之高丘也因高事高掃地而祭於其質也天地之性以成而眀幽三為一者若可覿也前期十日大宰帥執事而卜日遂戒卜之日王立於澤以親聽誓戒澤下流也天有至教庸庸祗祗式欽式承靣稽天之道也郊非迎長之祭乎有期日而作龜卜之何也容孟春祈榖孟冬祈年也至之日尊微陽而郊有期日惟天祈年榖必卜吉無期日亦惟天也戒百官百官天工也戒百姓于廟門內百姓王族姓親之也先十日容散齊致齊齊不齊致虛極而王心唯天也太史與羣執事讀禮書而協事嚴事也事協禮而後嚴乃習射於澤宫選與於祭者嚴百執事也王致齊玉府共食玉玉陽精天之性也鬯人共秬鬯給淬浴祀之前日大宰及執事眂滌濯致潔清也潔清天德也大宗伯涖玉鬯省牲鑊詔大號與大禮禮號鬯玉禮之宗秩宗之所守也大司樂既宿縣遂以其聲展之殷薦主樂樂主以聲音詔號也祀之日雞人夜呼旦以嘂百官巾車鳴鈴以應之戒夙作也典路出玉路贊駕設玉路以祀也王皮辨以聽祭報待事也小宗伯告時于王告傋于贊贊事也王服大裘而祀大裘反始也戴冕藻十有二旒繁纓十有二就建大常十有二斿則天數也龍章而設日月則天象也樂春王夏乃出王馭路犯軷遂驅之肅趨事也先夕掌次張氊案設皇邸為王次王即以立焉大司樂乃奏圜鍾為宫黃鐘為角大簇為徵姑洗為羽以迎神奏黃鐘歌大吕舞雲門以禮神祀至尊用盛樂也禮神之玉以蒼璧牲及幣皆如玉之色尚其色也牲用一犢犢在滌三月貴誠也誠天德也大祝逆牲入司徒奉之大宰贊王牲事王親牽而麗之碑而射之柴而燔之謂之禋祀禋之言禋也報氣也小宗伯逆齍大宗伯奉之小臣沃王盥而共之器用陶匏席用蒲稿秸貴其質也貴天地之性暢用黃目清眀中通象天也司烜氏以火燧取明火於日以鑒取明水於月而祝執以號眀水火天地之性也秩芻合百縣鄉為田燭鄉汛掃反道土新之不命而民聽上則合萬物於天也夫天德至矣舉天下之物無足以稱其德者諧萬民致萬物禮反本樂復古誠竭慎盡而後天神可得而降也濳學稿長樂陳氏曰先王祀天有文以示外心之勤有質以示內心之敬故因丘掃地陶匏藁秸疏布樿杓素車之乘此因其自然以示內心之敬也執鎮圭繅藉五采五就旗龍章而設日月四圭有邸六變之音黃鐘大吕之鈞此致其文飾以示外心之勤也然則內服大裘以因其自然外被龍衮戴冕藻以致其文飾不以內心廢外心不以自然廢文飾然後事天之禮盡矣祀天祀帝之辨郊特牲疏曰先儒説郊其義有二按王肅聖證論以天體無二而鄭氏謂天有六者指其尊極清虛之體其實是一論其五時生物之功其别有五以五配一故為六天又春秋緯紫微宫為大帝又云大微宫有五帝座星青帝曰靈威仰云云是五帝與大帝六也又五帝亦稱上帝故孝經曰嚴父莫大配天下即云宗祀文王于明堂以配上帝帝莫非天何得云嚴父配天也而賈逵馬融王肅等以五帝非天惟用家語之文謂大皥炎帝黃帝少皥顓頊五人帝其義非也故周禮司服云王祀昊天上帝則服大裘而冕祀五帝亦如之五帝若非天何為同服大裘又小宗伯云兆五帝于四郊禮器云饗帝于郊而風雨節寒暑時帝若非天焉能令風雨節寒暑時陳氏禮書曰周禮有言祀天有言祀昊天上帝有言上帝有言五帝者言天則百神皆與言昊天上帝則統乎天者言五帝則無與乎昊天上帝言上帝則五帝兼存焉周官司裘掌大裘以共王祀天之服典瑞四圭有邸以祀天大司樂若樂六變天神皆降凡以神祀者以冬日至致天神此總天之百神言之也大宗伯以禋祀祀昊天上帝司服大裘而冕以祀昊天上帝此指統乎天者言之也司服言祀昊天上帝祀五帝亦如之則五帝異乎昊天上帝也大宰祀五帝掌百官之誓戒祀大神示亦如之五帝異乎大神也肆師類造上帝封于大神則上帝又異乎大神也掌次大旅上帝裘氊案設皇邸祀五帝張大次小次則上帝異乎五帝也典瑞四圭有邸以矢旅上帝則上帝異乎天也上帝之文既不主於天與昊天上帝又不主於五帝而典瑞旅上帝對旅四望言之旅者會而祭之之名則上帝非一帝也上帝非一帝而周禮所稱帝者昊天上帝與五帝而已則上帝為昊天上帝及五帝眀矣孝經曰郊祀后稷以配天宗祀文王于眀堂以配上帝則眀堂之祀上帝其為昊天上帝及五帝可知也易曰先王以作樂崇德殷薦之上帝以配祖考以配祖者天也以配考者兼五帝也合天與五帝而謂之上帝則易孝經之于周禮其義一矣周禮眀其祀之大小輕重故天帝之辨如此詩書之文未嘗有稱五帝而書未嘗有稱昊天上帝者其稱天及上帝類皆泛言之而已此固不可援之以議周禮也且周人明堂之制有金木水火土五室有漢以來皆于五室以祭五帝惟晉泰始及唐顯慶中嘗議除之後亦遂復則眀堂之祀五帝其來逺矣鄭康成以上帝為五帝而皆及天王肅以上帝為昊天上帝而不及五帝二者之説曰上天曰太乙元始間曰皇天上帝魏初元間曰皇皇天帝梁曰天皇大帝惟西晉後齊後周隋唐乃曰昊天上帝而鄭氏以星經推之謂昊天上帝即天皇大帝名雖不同其實一也今之南郊既以昊天上帝位乎其上而壇第一等又有天皇大帝是離而兩之也宜講求以正之又曰五帝與昊天同稱帝不與昊天同稱天猶諸侯與天子同稱君不與天子同稱王周禮祀五帝之禮有與天同以極其隆有與天異以致其辨故皆禋祀以服大裘此其所同也祀帝于圜丘兆五帝于四郊此其所異也鄭氏之徒謂四圭之玉黃鐘大吕之樂夏正以祀感帝於南郊蒼帝之玉六變之樂冬日至禮天皇大帝在北極於圜丘天皇大帝耀魄寶也五帝太微之帝也晉書天文志中宫鈎陳口中一星曰天皇大帝其神耀魄寶史記天官書大微三光之庭其內五星五帝座分郊與丘以異其祀别四帝與感帝以異其禮王肅嘗考之矣然肅合郊丘而一之則是以五帝為人帝則非夫有天地則有五方有五方則有五帝月令之五人帝伏羲神農少昊顓頊而已春大昊夏炎帝中央黃帝秋少昊冬顓頊魏相曰大昊乘震執規司春炎帝乘離執衡司夏少昊乘兌執矩司秋顓頊乘坎執權司冬黃帝乘坤艮執繩司下土素問謂春陽氣柔而中矩秋隂升陽氣降有高下而中衡冬陽氣居下而中權然則魏相言五帝之所司則是言五帝之所執以夏為衡以秋為矩則為誤矣果以是為五帝則前其無司四時者乎古者祀五帝必配以五人帝從以五人臣月令之五人臣春勾芒夏祝融中央后土秋蓐收冬玄冥春秋傳曰少昊氏有四叔曰該曰修曰熙重為蓐收修及熙為玄冥顓頊氏有子曰黎為祝融共工氏有子曰勾龍為后土然即太昊少昊春秋之氣言之也炎帝以火土之性色言之也萬物之象勾芒于春而其氣祝融于夏其榮也以秋而蓐其發也以秋而收色以冬而玄體以冬而冥后土居中央以君之此五人帝五人臣命名之不同也春夏秋中央之臣皆一人耳而冬有修與熙者蓋冬於方為朔於卦為艮於腎為左右於器有權衡於物有龜蛇於色有青黑則官有修熙宜矣司馬遷不紀少皥以黃帝顓頊高辛唐虞為五帝孔安國以少皥顓頊高辛唐虞為五帝其説與四時五行之理不合當以月令為正郊祭考虞書肆類于上帝胡宏曰聖人名必當物祀上帝而謂之類者本乎天者咸在其中也按祀典之載于禮者莫先于舜典也然上帝之祭不言后者言天則地在其中猶中庸所謂郊社之禮所以事上帝而不及后土者注謂其省文耳分配天地之説始見于周禮雖曰必順隂陽因高下而各從其類以從之庶得其從之來享然天與地對皇天與后土對六經言天必與地俱孔子言郊多與社並則天與地並祭猶父與母同牢也豈得為瀆乎况一年之間夏在冬前並祭天地則以為瀆亂龎雜地先天祭豈非越次先食乎虞夏祀帝之説與其時俱不經見惟周禮祭天則用冬之日至蓋成周以建子之月為嵗正也嵗正首舉上天之祭至于建午之月乃祀地耳是蓋一代之制後世因之可也别以義起亦可也夫類于上帝經有眀言舍周而從虞又何不可哉烏可以合祀之禮起於王莽而以為非夫事茍合義固不當以人廢矧在周之前明有虞書之文所謂類者安知非當時所稱之祭名哉我聖祖初築壇為南北郊冬至祭天于圜丘夏至祀地于方丘一如周制行之數年風雨不時天多變異乃斷自宸衷復為合祭之禮而以正月行禮凡所謂六宗山川羣神皆各為壇以從祀蓋復有虞之制于四千餘載之後矣萬世所當遵守周禮大宗伯以禋祀祀昊天上帝王者祭天以柴燎牲使氣上逹語其精神謂之煙語其感格謂之類指其方兆謂之郊指事異名其實一也大司樂圜鍾為宫黃鍾為角大簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至于澤中之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫大簇為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地祗皆出可得而禮矣胡宏曰樂六變而天神降樂八變而地祗出此豈君子知禮之言類如巫祝造怪之辭也曾不知樂所以導和禮所以為節作禮乃所謂以禮禮神也豈待神降祗出然後行禮哉按天地分祭之説始見于周大司樂他經典所不載也先儒固謂周禮非盡出于周公况其所論樂律自相背戾吳澄謂其不經不足信非無徵之言也郊特牲郊之祭也迎長日之至也大報天而主日也兆于南郊就陽位也掃地而祭于其質也于郊故謂之郊牲用騂尚赤也用犢貴誠也月令孟春之月天子乃以元日祈榖于上帝周禮以蒼璧禮天以黃琮禮地牲弊如其器之色此言郊祀玉幣王制祭天地之牛角繭栗郊特牲帝牛不吉以為稷牛帝牛必在滌三月稷牛惟具此言祀天之牲周禮司服王祀昊天上帝則服大裘而冕祀五帝亦如之楊復曰天帝一也以一字言則祀天享帝之類以二字言則格于皇天殷薦上帝之類以四字言則惟皇上帝昊天上帝皇天上帝之類以氣之所主而言則隨言隨方而立名而青帝赤帝黃帝白帝黑帝之類其實則一天也在鄭玄始分為六天之説皆以星象名之又附以緯書謬妄不經之甚王肅引經傳以排玄失併圜丘于郊似矣然又謂五帝非天而用家語之文則非也鄭則失矣王亦未為得也夫祀天祀五帝皆聖人制禮之條目非如鄭氏分天六也天猶性也帝猶心也五帝猶仁義禮智性之心隨感而應者也鄭玄分六天以星象名之謂昊天上帝北辰也謂五帝太微宫五帝座星也又附以緯書如北辰曰曜魄寶之類王肅用家語謂太皥炎帝黃帝五人帝之屬為五帝按漢儒附會為六天之説既有昊天上帝又有太乙大帝又有太乙感生帝皆非正禮也蓋天無二日民無二王固無本二帝之説况六五哉朝惟於大祀殿祀昊天上帝凡所謂天王太乙五天帝之類一切革去三代以下祀典之正所僅見也惟道家者流承襲前代之舊因仍未革其所奉祀者乃列昊天上帝於其所謂三清之下又塑上帝像與天皇紫微並列至其所謂上帝稱號又于昊天之下加以金闕于上帝之上加以玉皇夫金玉為物滯于形乃世俗之所貴者而非大道之所寓也顧以世俗所尚者為上帝之尊稱其褻瀆甚矣且老𣆀生于周末死有孫及子乃人鬼也而躋之天神之上且不可况上帝乎唐玄宋徽宗本欲尊天而不知其褻天也其后流離困厄禍及生民安知非天之所譴也眀聖之主尚其正之不諉為異教之徒自相崇奉非祀典之所繫也厯代郊祀有虞氏禘黃帝爾雅釋天云禘大祭也虞氏冬至大祭天于圜丘以黃帝配坐而郊嚳夏正之月祭感生帝于南郊以嚳配焉夏后氏禘黃帝而郊鯀商人禘嚳而郊冥周制大司樂云至日祀天於地上之圜丘又大宗伯職曰以禋祀昊天上帝禮神之玉以蒼璧其性及幣各隨玉色牲用一犢幣用繒長一丈八尺鄭康成注曾子問云制幣長丈八鄭約逸巡狩禮文也餘用幣長短皆準也王服大裘其冕無旒尸服亦然乘玉輅錫繁纓十有再就建大常十有二旒以祀樽及菹醢之器以瓦爵以匏藉神之席以藁秸及蒲剪而不納􅢠秸藉天神蒲越藉配帝配以帝嚳其樂大司徒云凡樂圜鍾為宫黃鍾為角大簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之其感生帝大傳曰禮不王不禘王者禘其祖之所自出以其祖配之因以祈榖其壇名大壇在國五十里禮神之玉用四圭有邸尺有二寸牲用騂犢青幣配以稷其配帝牲亦用騂犢其樂大司樂云乃奏黃鍾歌大吕舞雲門以祀天神日用辛又王者必五時迎氣者奉承天道從時訓人之義故月令于四立日及季夏土德王日各迎其王氣之神于其郊其配祭以五人帝春以太皥夏以炎帝季夏以黃帝秋以少昊冬以顓帝其壇各於當方之郊去國五十里內曰近郊為兆位於中築方壇亦曰大壇而祭之禮神之玉按大宗伯云青圭禮東方赤璋禮南方黃琮禮中方白琥禮西方玄璜禮北方牲用犢及幣各隨玉色樂與感帝同秦始皇既即位以昔文公出獵獲黑龍此其水德之瑞用十月為嵗首色尚黑音尚大吕東遊海上禮祀八神二年尊雍四畤上帝名其祭處曰畤也春為嵗祠因泮涷秋涸涷冬賽禱五月嘗駒及四仲之月每畤用駒四匹木禺龍一駟木禺車馬一駟各如其帝色黃犢與羔各四圭幣各有數皆生瘞埋無爼豆之具三年一郊常以十月上宿郊見通爟火拜于咸陽之旁而衣尚白其用如常漢高帝立二年冬敗項籍還入關問秦時上帝祠何帝也對曰四帝有青白黃赤高帝曰乃待我而具五也遂立黑帝祠名北畤有司進祠帝不親往悉召故秦祠官復置太祝大牢皆如其故儀後四年詔御史令九天巫祠九天皆以嵗時祠宫中文帝即位詔有司增雍五畤路車各一乘駕被具魯人公孫臣上書曰始秦以水德則漢當土德其應黃龍見宜改正朔易服色尚黃眀年黃龍見成紀拜公孫臣為博士申眀土德改厯服色事有司曰古者天子夏親祠上帝于郊故曰郊夏四月詔郊祀上帝始幸雍郊見五畤祠衣皆尚赤趙人新垣平上言長安東北有神氣成五采若人冠絻焉宜祠上帝於是作渭陽五帝廟眀年四月帝親郊見五帝廟爟火舉若光屬天於是貴平至上大夫文帝出長門亭名若見五人於道北因其直立五帝壇人有告平詐偽遂誅平後渭陽長門五帝使祠官領以時致禮不親往焉武帝即位初至雍郊見五畤後尚三嵗一郊亳人謬忌曰天神貴者太一太一佐曰五帝古者天子以春秋祭太乙於東南郊日一大牢凡七祭為壇開八通鬼道於是令太祝立太一之祠於長安城東南郊常奉祠如忌言未幾又祠天一自此方士之言興而迂怪之祠紛然起矣宣帝神爵元年正月始行甘泉郊見泰畤修武帝故事二年幸雍祠五畤眀年春幸河東祠后土然未有定制元帝即位始定舊儀間嵗正月一幸甘泉郊泰畤又東至河東祠后土西至雍祠五畤凡五奉泰畤后土之祠亦施恩澤時所過毋出田租四百户賜牛酒或賜爵赦罪人成帝初即位丞相匡衡等奏言先王祭天於南郊就陽之義也瘞地於北郊即隂之象也往者孝武居甘泉宫即于雲陽立泰畤祭於宫南今常幸長安郊見皇天反北之大隂祠后土反東之少陽未合承天之意於是徙甘泉泰畤置於長安又言今雍鄜密上下畤本秦氏各以其意所立非禮所載不宜復修遂廢雍鄜密上下畤九天太一天一八神之屬并餘淫祠陳寶等祠所不應禮者四百七十五所皆罷初罷甘泉泰畤作南郊月大風壞甘泉行宫折拔畤中木十圍以上者百餘天子問劉向向曰家人尚不欲絶種祠况於國乎且甘泉汾隂及雍五畤如故天子親郊禮如前又復長安雍祠眀著者半後成帝崩皇太后詔復南北郊長安如故以順帝意哀帝立寢疾博召方士復甘泉泰畤祀如故遣有司行事而禮祠焉平帝立王莽奏宜如建始所行丞相匡衡等議復長安南北郊祀如故莽又頗改其祭禮後漢光武元年光武即位為壇營于鄗之陽祭告天地采用前漢元始中郊祭故事六宗羣神從祀未以祖配天地共犢餘牲尚約二年正月制郊兆於雒陽城南七里依鄗故事為圓壇八陛又為重壇天地位其上皆南靣西上其外壇上為五帝位青帝位甲寅赤帝位丙巳黃帝位丁未白帝位庚申黑帝位壬亥其外為壝重營皆紫以象紫宫有四通道以為門日月在中營內南道日東月西北斗在北道之西皆别位不在羣神列中八陛陛五十八醊五帝陛郭帝七十二醊中營四門五十四神外營四門門百神神皆背營內嚮中營四門門封神四外營四門門封神四凡千五百一十四神至七年五月詔三公曰漢當郊堯其與羣臣議時御史杜林等上疏以為漢起不緣堯與商周異宜從舊制以高帝配從之隴蜀平後乃增廣郊祀高皇帝配食位在中壇上西靣北上天地高皇帝黃帝犢各一四方帝共用犢二日月北斗共牛一四營羣神共牛四樂奏青陽朱眀西皓玄冥及雲翹育命舞中營四門門用席十八外營四門門用席三十六皆管簟率一席三神曰月北斗無陛郭醊既送神燎爼實于壇南已地眀帝即位永平二年以月令有五郊迎氣因采元始故事兆五郊于雒陽四方中兆在未壇皆三尺階無等立春日迎春東郊祭青帝勾芒立夏日迎夏南郊祭赤帝祝融先立秋十八日迎黃靈於中兆祭黃帝后土立秋日迎秋西郊祭白帝蓐收立冬日迎冬北郊祭黑帝玄冥車旗服飾各從方色魏文帝南巡在潁隂有司為壇於繁陽故城庚午登壇受􅌧降壇視燎成禮未有祖配眀帝即位太和元年正月丁未郊祀武帝以配天宗祀文帝于眀堂以配上帝至景初元年十月乙卯始營洛陽南委粟山為圓丘詔曰曹氏世系出自有虞今祀圓丘以始祖帝舜配號圓丘曰皇皇帝天郊所祭曰皇天之神以太祖武皇帝配十一月壬子冬至始祀皇皇帝天於圓丘以始祖帝舜配自正始以後終魏代不復郊祀吳南郊尊父堅以配天蜀營南北郊于成都晉武南郊燎告未有祖配泰始二年詔定郊祀南郊宜除五帝之座五郊同稱昊天上帝各設一座而已二月丁丑郊以宣皇帝配十一月有司奏古者丘郊不異宜并于圓方二丘更修壇兆二至合祀是後圓丘方澤不别立東晉元帝即位于建康議立南郊于已地大常賀循定制度多依漢及晉初之儀成帝咸和八年正月郊天則五帝之佐日月五星二十八宿文昌北斗三台司命軒轅后土太乙天一太微勾陳北極雨師雷電司空風伯老人凡六十二神從祀康帝南郊帝親奉焉祝文稱嗣天子臣某安帝元興四年應郊帝蒙塵于江陵朝議宜依周禮宗伯攝事尚書右丞王納之曰郊天極尊非天子不祀無使皇輿不得親奉時從納之議郊廟牲幣璧玉之色雖有成文秦世多以駢駒漢則但云犢江左南北郊用玄牡眀堂廟社用赤牲宋永初二年正月上辛親郊祀三年九月司空羡之等奏高祖武皇宜配天郊詔可孝武大眀二年正月有司奏今月六日南郊輿駕親奉至時或雨遂遷日有司行事大眀三年移郊兆于秣陵牛頭山西南郊之午地孝武崩廢帝以郊舊地為吉祥移置本處齊高祖受禪眀年正月上辛有事南郊而無配武帝繼立眀年正月祀南郊自兹以後間嵗而祀梁武帝即位南郊為圓壇在國之南常與北郊間嵗正月皇帝嵗齋於萬嵗殿上辛行事吳操之云啓蟄而郊郊在立春後何冬之云今之郊祀是報昔致之功而祈今年之福故取嵗首上辛不拘立春前後周之冬至圓丘大報天也夏正又郊以祈農事故有啓蟄之説帝曰圓丘自是祭天先農自是祈榖祭昊天宜在冬至祈榖必須啓蟄用特牛一祀天皇大帝於壇上以皇考太祖文帝配五帝天神從祀禮以蒼璧制幣除鬯祼五年迎五帝以始祖配十七年帝以威仰魄寶俱是天神於壇則尊於下則卑且南郊所祭天皇其五帝别有眀堂之祀不煩重設又郊祀二十八宿而無十二辰于義闕然南郊可除五帝祀加十二辰與二十八宿各于其方為壇陳武帝永定元年受禪修圓丘柴燎告天明年因以正月上辛南郊以皇考德皇帝配除十二辰風師雨師及五帝位間嵗而祀文帝天嘉中改以高祖配復三獻之禮後魏道武帝即位二年正月親祀上帝于南郊以始祖神元皇帝配北齊每三嵗一祭後周憲章多依周制隋文帝受命再嵗冬至日祀昊天上帝於圓丘以太祖武元皇帝配唐武德初定令每嵗冬至祀昊天上帝於圓丘以景帝配五方上帝天神皆從祀上帝及配帝用蒼犢各一五方帝及日月用玄色犢各一內官以下加羊豕各九孟春辛日祈榖祀感帝於南郊以元帝配牲用蒼犢二武德貞觀之制大享之外每嵗立春立夏季夏立秋立冬郊祀並依周禮其配食及星辰從祀亦然貞觀中奉高祖配圓丘元皇帝配感帝餘依武德制宋興一祖六宗皆合祭天地自元豐分南北郊至政和乃克行之建炎二年上祀圜丘獨祭上帝而配以大祖用元豐禮也紹興十三年郊祀始設大神大祗及大祖大宗配位自天地至從祀百神凡七百七十有一蓋元祐禮云大率三嵗一親郊並祭天地宗廟因行赦宥頒賞軍士自南北分郊夏至方澤之祭乃止遣上公皇地祗遂不在親祀之典厯代郊社總論禮記正義曰夫天有六嵗有九祭昊天上帝冬至祭之一也蒼帝靈威仰立春之日祭於東郊二也赤帝赤熛怒立夏之日祭於南郊三也黃帝含樞紐季夏六月土旺之日亦祭於南郊四也白帝白招拒立秋之日祭於西郊五也黑帝叶光紀立冬之日祭於西郊六也王者各稟五帝之精氣而王天下於夏正之月祭於南郊七也四月龍星見而雩總祭五帝於南郊八也季秋大享五帝於眀堂九也以經考之有虞氏禘黃帝而郊嚳夏后氏禘黃帝而郊鯀商人禘嚳而郊冥周人禘嚳而郊稷鄭注云禘者冬至祭天於圜丘郊者夏至祭感生帝於南郊以禘嚳在郊稷之上稷卑於嚳禘大於郊爾雅云禘大祭也大祭莫過於圜丘為禘也夫圜丘之禮何如也大司樂云冬至日祀天於地上之圜丘大宗伯曰以禋祀祀昊天上帝王服大裘禮神之玉以蒼璧配以帝嚳牲用犢其禮七獻其樂圜鍾為宫黃鍾為角大簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬至日於地上之圜丘奏之若樂六變則天神皆降可得而禮矣此圜丘之禮也其祭感生之禮何如哉大傳曰禮不王不禘王之禘其祖之所自出以其祖配鄭注云禘王者先祖皆感太微五帝之精以生者也故變郊稱禘因以祈榖其壇則名曰大壇祭法曰燔柴於大壇以稷配靈威仰牲用騂其樂大司樂云乃奏黃鍾歌大吕舞雲門以祀天神其禮亦以七獻禮神之玉四圭有邸此祭感生之禮也五時迎氣之禮何如哉月令於四立日及季夏土德王日各迎其旺氣之神於其郊其配祭以五人帝春以太皥夏以炎帝秋以少皥冬以顓帝各於其方為兆於近郊名曰大壇神之玉則大宗伯青圭禮東方赤璋禮南方白琥禮西方元璜禮北方其禮亦以七獻其樂同於黃鍾此五時迎氣之禮也月令建巳之月大雩五方上帝其壇名曰雲業於南郊之旁配以五人帝命樂正習盛樂舞皇舞月令命有司為民祈祀山川百源百辟卿士有益於民者以祈榖實春秋曰龍見而雩此雩之禮也故孝經有曰宗祀文王於眀堂以配上帝周制季秋大享於眀堂考工記周人眀堂此眀堂之禮也地祗有三嵗有二祭夏至之日祭崑崙之神於方澤一也夏正之月祭神州地祗於北郊二也大司樂云夏日至禮地祗於澤中之方丘注云主崑崙者其丘在國之北禮神之玉以黃琮配以后稷其樂則大司樂云凡樂函鍾為宫太簇為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地祗皆出可得而禮矣其神州地祗則王者所居五千里之內地也故不言丘而言郊其壇於地祗名曰泰折祭法曰瘞埋於泰折祭地也配亦以后稷其樂奏太簇歌應鍾舞咸池以祭地祗至唐開元亦夏日至祀皇地祗於方丘孟冬祭神州于北郊此皇地祗神州地祗之禮也蓋五帝與昊天同稱帝而不與昊天同稱天猶諸候與天子同稱君而不與天子同稱王周官祀五帝之禮有與天同極其隆有與天異致其辨故皆禋祀皆服大裘此其所同也祈祀帝於圜丘兆五帝於四時郊此其所異也鄭氏之徒謂四圭之玉黃鍾大吕之樂夏正以祀感生帝於南郊蒼璧之玉六變之樂冬日至禮天皇上帝在北極者於圜丘天皇大帝耀魄寶也五帝大微之天也分郊與丘以異其祀别四時帝與感帝以異其禮王肅嘗考之矣然肅合郊丘而一之則是以五帝為人帝則非天有天帝地則有五方有五方則有五帝月令之五人帝伏羲神農黃帝少昊顓帝而已果以是為五帝則前此其無司四時者乎古者祀五帝必配以五人帝從以五人臣月令之五人臣者春勾芒夏祝融中央后土秋蓐收冬元冥春夏秋冬之臣各一人爾而冬有修與熙者修及熙為元冥蓋冬於方為朔於卦為艮於器有權衡於色有青黑則有修熙宜矣更秦則興鄜密上下之四畤以祀五帝至漢則增之以北畤以祀五帝漢之祀天不於南郊而於甘泉其祠地不於北郊而於汾隂河東以至壇有八觚席有六采樂有王女車有變輅騂駒龍馬一切侈靡而匡衡劉向之徒邪正異同之論蜂起一時元始之間謬戾尤甚春秋則天地同牢於南鄜冬夏則天地分祭於南郊光武兆南郊於洛陽之陽兆北郊於洛陽之隂其禮儀度數一遵元始之制而先王之禮隳廢殆盡唐禮樂志曰自周衰禮樂壞於戰國而廢絶於秦至漢讖緯之書出以亂經自鄭元之徒號稱大儒皆主其説由是郊丘明堂之論至於紛然而莫知所止禮曰以禋祀祀昊天上帝此天也元以為天皇大帝者北辰耀魄寶也又曰兆五帝於四時此五行精氣之神也元以青帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝叶光紀者五天也由是有六天之説後世莫能廢焉唐初貞觀禮冬至祀昊天上帝于圜丘正月辛日祀感生帝於南郊以祈榖而孟夏雩于南郊季秋大享于明堂皆祀五天帝高宗顯慶中許敬宗等議以六天出於緯晝而南郊圜丘一也由是盡黜鄭説而南郊祈榖孟夏雩眀堂大享皆祭昊天上帝開元中王仲丘議以為宜於祈榖祭昊天而兼祭五帝既而蕭嵩撰開元禮雖未能合古而天神之位别矣嗚呼禮之失也豈獨緯書之罪哉在於學者好為曲説而人君一切臨時申其私意以增多為盡禮而不知煩數之為黷也古者祭天於圜丘在國之南祭地於方丘在國之北所以順隂陽因高下而事天地以其類也其方位既别而其燎壇瘞坎樂舞變數亦皆不同而後世有合祭之文則始合祭天地玄宗定開元禮天寶元年遂合祭天地於南郊是時神仙道家之説興乃建元皇帝廟凡有事於上帝則廟獻於太清朝享於太廟然後有事於南郊遂為故事杜甫獻三禮賦是也終唐之世莫能改為禮者可不謹哉宋太祖在位十有七年行四大禮乾德中歷六年而方再講開寶中更五嵗而祭於洛太宗自雍熙而至淳化凡十年而一郊真宗東封西祀往往率三年而一行大禮自仁宗以來三嵗一郊始為定制其後分祭合祭之説議於元豐再議於元祐又再議於紹聖考之宋朝會要在元豐時陳襄謂漢元始附會周官大合樂之説謂當合祭由漢厯唐千有餘年而以五月親祀北郊者惟魏文之太和周武之建德隋高祖之開皇唐睿宗之先天耳請先以夏日至祭地祗於方丘然後以冬日至祀昊天於圜丘王存則議欲以孟冬純隂用事之月有事於北郊張璪則欲以夏日至祭方丘陸佃則欲以冬日至親祀上帝於圜丘之北别祠於地祗此元豐之所議者然也在元祐時曾肇言南郊非欵地祗之處冬至非見地祗之時樂以圜鍾為宫其變以六非致地祗之音燎柴升禋非祭地祗之禮崔公慶則以漢武郊祀歌曰惟泰元尊媪神蕃釐涓選休成天地並况皆合祭之辭蘇轍則以為欲當郊之嵗先以夏至祀北郊有欲移夏至之祀行於十月者有欲三年祀天三年祀地皆不可行蘇轍則以為郊而肆赦非周禮也優賞諸軍非周禮也此皆不改而獨於地祗則曰周禮不當祭於圜丘此何議也此元祐之所議者然也在紹聖時黃履林希等議請罷合祭天地張商英言神宗謂合祭非古據經而正之元祐之臣乃率其私意此紹聖之所議者然也然宋朝之制又有恭謝天地之禮始於大中祥符之間再行於天禧一如南郊之祭仁宗於眀道嘉祐均復即大慶殿行之如眀堂故事因輟郊祀自是而後遂不復講真宗恭謝大中祥符五年十月三日奉天書於朝元殿恭謝上皇大帝聖祖配位在東太祖太宗在西天禧元年既上玉皇聖號寶册皆舉是禮然别立壇壝於國南而儀物禮制悉如郊祀視五年之制為加盛矣祥符六年八月詔入來春親詣亳州太清宫行朝謁之禮先於東宫置壇回日恭謝天地一如南郊之制郊祀羣神從祀是非按祭義郊之祭也大報天而主日説者謂懸象著明莫大乎日月日月之眀即天之明故郊以報天而日以主神然有其祀必有其配故又配以月也然則周之郊以后稷配天之外從祀惟日月而已祭義又言祭日于壇祭月于坎以别幽明以祭上下祭日于東祭月于西以别外內以端其位是于郊祭主配之外又自有敷祭也參之周禮大宗伯以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌古風字師雨師其節文之先後輕重已自可見豈有郊之日一時並祭諸神者乎後之言禮者失於講明東漢建武初采用元始故事合祭天地羣神從祀泰壇之上至一千五百一十四神唐圓壇從祀之位尚七餘座猥且褻矣承五代弊政一畨郊祀賞賚繁重國力不給于是親祠之禮不容數舉遂以后土祭于圜丘而海嶽鎮瀆山川丘陵墳隰原衍皆在從祀之列于是祭天從祀始及地祗矣至皇祐中仁宗大饗明堂又因鄭氏之注及厯代所行乃以大昊炎帝黃帝少昊顓頊五人帝勾芒祝融后土蓐收玄冥五人官侑祀五帝于是祭天從祀又及人鬼矣夫莫尊于天莫重于郊祀精一以享猶恐誠意之不至也而猥褻若此豈古人掃地而祭之意乎即厯代郊祀之非觀世廟釐正之典雖謂之與周禮並隆可也大祀殿南京吳元年建圜丘壇於鍾山之陽以祀天墠崇尺許方縱橫五尺壇不崇尺方縱橫各二丈立配位壇於墠內西南相距數尺壇亦不崇尺方縱橫一丈云即高皇帝即位南郊所也洪武十年春合祀天地即舊址改築壇去墠約二丈墠皆繞以女墻崇約六尺壇覆以屋曰大祀殿九間中三間金飾左右六間繪采前後左右丹陛三級琢石為欄斜廊兩廡外大祀門南天門中天路左御路右王路東並四瀆壇南址與壇齊立具服殿墠北通天庫東通天厨西降階通西御路甬道右直西稍南立齋宫前立太和鍾樓甬道左直東稍南鑿池方里許曰海子嵗十二月取水藏之以供薦獻嵗首春合祀天地凡齋戒先二日太常官宿於本寺次日奏齋戒次日進銅人傳制諭文武百官齋戒祭先二日用酒果奉先殿告配上帝皇祗祝文年月朔日凡祝同孝孫皇帝御名敢昭告於某皇帝兹以正月日恭祀上帝皇祗於大祀殿謹請配神伏惟鑒知謹告先一日本寺官奏聞眀日與光祿寺省牲次日省牲畢同復命祭品上帝蒼璧一郊祀帛一蒼色蒼玉爵三燔牛一騂犢一登一實太羮簠二實黍稷簋二實稻梁籩十二實以形鹽藁魚棗栗榛菱芡鹿脯白餅黑餅糗餌粉糍豆十二實以韭葅菁葅芹葅笋葅醯醢鹿醢兔醢魚醢脾析豚胉􅓞食糝食皇祗黃琮一郊祀帛一黃色玉爵三黝犢一登一簠簋各二籩豆各十二大祖配位奉先帛一餘同惟無玉大眀從位禮神帛一紅色青磁爵三酒盞二十犢一登一簠簋各二籩十無糗餌粉糍豆十魚􅓞食糝食夜眀同惟帛白色星辰禮神帛五色青磁爵三酒盞三十犢一羊一豕一登一鉶二實和羹簠簋各二籩豆各十西同北嶽禮神帛一黃磁爵三酒箋三十羊一豕一鉶三簠簋各二籩豆十餘十九壇同惟帛各從其色祝文嗣天子臣御名敢昭告于昊天上帝皇地祗曰時維孟春三陽開泰敬率臣僚以玉帛犧牲粢盛庶品恭祀於大祀殿備兹燎瘞太祖聖神文武欽眀啓運俊德成功統天孝高皇帝太宗體天宏道高眀廣運聖武神功統仁至孝文皇帝配神尚享高皇帝御製合祭天地樂章迎神中和荷蒙天地兮君主華夷欽承踴躍兮備筵而祭誠惶無已兮寸衷微仰瞻俯首兮惟願來期想龍翔鳯舞兮慶雲飛必昭昭穆穆兮降壇壝奠玉帛肅和天垂風露兮雨澤沾黃壤氤氲兮氣化全民勤畎畝兮東帛鮮臣當設宴兮奉來前進爼凝和庖人兮列鼎殽饈兮已成方爼兮載獻願享兮以歆初獻夀和聖靈兮皇皇穆嚴兮金牀臣令樂舞兮景張酒行初獻兮捧觴亞獻豫和載斟兮載將百辟陪祀兮具張感聖情兮無已拜手稽首兮願享終獻寧和三獻兮樂舞揚殽俱納兮氣藹而芳祥光朗朗兮上下方况日吉兮時良徹饌雍和粗陳菲薦兮神喜將感聖心兮何以忘民福留兮佳氣昻臣拜首兮謝恩光送神安和旌幢煜煜兮雲衢長龍車鳯輦兮駕飛揚瞻冉冉兮上下方必蒸民兮永康瘞燎時和進羅列兮詣燎方炬熖發兮煌煌神變化兮物全於上感至恩兮無量方丘樂章迎神仰皇祗兮駕來川嶽從兮威靈備開香煙繚繞兮神臨御街漸升壇兮穆穆靄瑞氣兮應結樓臺以微𠂻兮率職幸望聖恱兮心諧但允臣兮固請願嘉蒸民兮永懷奠帛臣捧兮以筐玉帛是進兮嵗奠以常百辟陪祀兮珮聲琅琅惟南薰兮解愠映燎炎兮煌煌進爼庖人兮淨湯大烹兮氣靄而芳以微衷兮獻上曰享兮曰康初獻初獻行兮捧觴聖靈穆穆兮洋洋為蒸民兮永康鑒豐年兮耿光亞獻雜殽羞兮已張法前王兮典章臣固晨兮情悃用斟禮兮載觴終獻爵三獻兮禮將終臣心眷戀兮無窮恐殽羞兮未具將何報乎神功徹饌爼豆徹兮神熙鑾輿駕兮旋歸百神翼翼兮雲衣敬奉行兮弗敢遲送神祥風興兮悠悠雲衢開兮民福留嵗樂蒸民兮大有想洋洋兮舉觴載酒望瘞殽饈玉帛兮瘞坎中遙瞻隱隱兮龍旗從祀事成兮盡微衷感厚德兮民福雍雍𢎞治十五年本寺題準今後打掃天地壇照例差撥軍餘先期開具委官職名及各衙千百户等官將撥過軍餘名數開報內外守備并該部及本寺知會守備官處選差公正指揮一員管束與本寺定約日期合行打掃如各衛委官仍前怠忽或有賣放等情許將該把總官參呈守備官處查究施行成化九年本寺奏準南京天地壇自外西門以裏直抵東墻至秦淮俱係壇場地方合行南京禮部榜出仍行南京守備內外守備相看眀白即與砌築墻垣阻塞行路仍著該城兵馬司嚴督火夫人等常川巡視如違拏送法司究治吳元年建圜丘於鍾山之陽以冬至祀昊天上帝建方丘於鍾山之隂以夏至祀皇地祇於洪武元年二月壬寅朔太祖敕禮官翰林太常寺昔聖帝眀王嚴於祭祀內致誠敬外致儀文朕膺天命首崇祀事顧草創之初典禮未備何以交神眀致靈貺其博考郊禮來聞丞相善長學士安太常卿惟庸等議上請祀天圜丘以大眀夜眀星辰太嵗諸神從祀地方丘以嶽鎮海瀆諸神從祀上從之撰二丘樂章二年奉仁祖配天地位西向時中都亦有南北丘五年著令皇帝郊祭太子留宫居守親王戎服七年上以大祀獻終分獻未安諭學士詹同宋濓議請初獻奠玉帛已分獻官即初獻亞獻終獻亦如之上曰善祀於奉天殿親製祝文八年奏上所撰樂章大祀登壇脫舄禮九年定郊社之禮雖有三年喪不廢十年秋上感齊居隂雨覽京房災異之説始定合祀禮上更撰樂章八年作大祀殿於南郊未成拾一月丁亥合祀於奉天殿十二年正月合祀於大祀殿昊天上帝后土皇地祗南向仁祖配位如故從祀丹墀四壇曰大眀曰夜眀曰星辰又曰星辰四壝外二十四壇曰五嶽壇五曰五鎮壇五曰四海壇四曰四瀆壇四曰風雲雷雨曰山川曰太嵗曰天下神祗曰厯代帝王各壇一凡二十四壇大臣分獻禮成上大喜作大祀文并歌九章其辭曰朕聞太極之化也天生於子地闢於丑位極既定虛其中而為寰宇是時人生於寅樂居兩間人生既多非聖莫馭天生君主為民立命然鴻荒之時莫知誰始今載於書始自伏羲相繼而至唐虞以及夏商周斯數君者開天立極首興彛倫者乃前伏羲神農黃帝是也法三皇而守行者少昊顓頊高辛唐虞其益損禮樂文飾其事者三皇五帝皆然不獨夏商周也下及秦漢以來宋元亦然嗚呼天惟自然而常者三綱五常昔聖人度人情而措彛倫特不逆其性務從其善未嘗有異此道而為人君者也每聞昔君欽若昊天莫敢有怠朕即位以來命儒臣遍考羣書自周以至宋元皆著祀典守而行之然當行祀之時惟宗廟頗合人情南北二郊以及社稷甚有不合人情者以社稷言之古人以社為五土之神稷為五榖之神土主發生五榖用之以生而乃一圍之中各壇而祭是土榖不合於生生之意也行禮之時先社固宜而又先奠社配方行稷神之禮此果合人情乎况朕自即位以來祀天享地奉宗廟社稷每當齊期必有風雨臨祭方斂每以為憂京房有云郊祭鬼神必天道雍和神乃答矣若有飄風驟雨是為未善於是自洪武十年更祀社稷於闕右去繁就簡一壇合祀以奉二神神乃我答人情歡恱後洪武十一年命三公率土工部役梓人於京城之南創大祀殿合祀皇天后土是年冬十月三公奏告工成朕命禮部去前代之祭期嵗止一祀朕度古人之祀南北郊彼以義起故曰南郊祭天以其陽生之月北郊祭地以其隂生之月殊不知至陽祭之於至隂之月至隂祭之於至陽之月於禮可疑且掃地而祭其來甚逺言祀天地尚質不尚華固執古不變至令天地之享與人大異朕以斯禮執古不變則人之享亦執古而不變乎若人執古則汙尊抔飲茹毛飲皿巢居穴處今可行乎斯必不然因命太常卿每嵗祭天地於首春三陽交泰之時遂於洪武十二年正月十有一日合祀天地前期致齊五日內二日以告仁祖三日正齊風和日暖及夜升壇山川草木不搖江海息波輕雲縹眇于天穹獨見太隂于中天纎塵不動銀燭舒光香煙裊繞斯必神之臨降合祀宜也朕雖失學無聞特述其事而歌咏之歌曰第一歌陳樂而奏金石絲竹之會陳兮必五音以諧同命舉枹拊鼓而撫琴兮加寶瑟及以笙鍾罄聲嘹喨而韻窮兮吹塤箎以管從度干羽而周旋兮文武之樂隆百弼奔走而供獻兮期上下以來通第二歌駕出天門遙瞻閶闔之開闢兮飛龍前導而翺翔蹁躚鶴舞鳯揚兮鑾輿冉冉而上方侍從景從周匝兮天香馛郁而旌幢張帝衣玄雲之衣兮綵霞赤霓而為裳稽首仰瞻遙迓兮聽金玉之鏗鏘帝臨世而閲民兮蒙臻百福而海內康第三歌駕升地户洪龎之户闢兮擁地祗之旌幢麒麟丹鳯之挾車兮角端前驅以騰驤衛護森嚴而凛凛兮於昭穆穆而聖皇稽首鞠躬而駕來兮惟恪勤以趨蹌為母之慈而為民兮合造化于乾陽豫率百職以俟臨兮惟菲禮而願享第四歌七曜從駕天星不息而周章兮擁旌旄而運銀潢旙􅓚繚繞於太虛兮護從鑾輿而至下方惟五星日月照臨兮邇帝左右而龍斾傍引領以欣覩兮威威而衛帝行第五歌嶽鎮從駕覩旗旙之四維兮列神威而倍張嶽鎮海瀆之會兮斂欣地祗之來降陪神迓聖而相從兮擁山鬼于幽篁飛蒼龍而倐然兮清塵導道而妖魅藏矯首以候來兮聖皇為民而錫康第六歌瞻天望聖民望天地之臨祭兮老幼相將而迎昊蒼日吉而時貞兮慶雲縹眇于天堂柴燎煙焰而福洽兮盡寰宇以芬芳民歌且舞而跳躍弓俯仰乾坤以荷聖皇第七歌兆民之福皇天后土之既臨兮享殽羞而美椒漿思隂陽之會合兮如臨已而穆穆洋洋躬竭𠂻以趨蹌兮周旋三獻而奉觴皇皇二聖之優遊兮眷豫牧民而為王惟天地之恩無極兮獨父母之育相當雖欲報之何以兮但法常經而頤臧第八歌鸞駕回旋氣氤氲而馛郁兮樂聖駕之旋幢喜雲衢而耿冉兮天廊落而地洪龎因遙送而俯仰兮鑾輿降而逹玄黃慕神降上之盤桓兮於心燁燁而耿光願民之多福兮每以嵗首而奠筐第九歌升降殽羞升沉燎瘞而幻化兮殽羞備納而供勤昌以之而祈榖兮民謳歌而福愈良想天門地户之茫茫兮欲假之來享而難望樂之既成兮必時若而兩暘迎神歌二首薰風蕩蕩兮解炎備朝兮惟恐弗専夜沉沉兮星辰團圞皎日輝輝兮馳天頓首稽首兮遙瞻孰知后土兮何然昊天昊天鑒蒼生兮來筵諸侯趨蹌兮肅齊列郊壇兮次第金石絲竹兮方擕皇兮倣佛兮鳯凰來儀俄冉冉兮慶雲飛恭遙瞻兮俯首低靖沉沉兮后土降臨時地祗兮欣喜吾民今歲兮樂雍熙臣率百職兮羅拜壇壝感恩兮無已惟父天兮母地二十一年增修壇壝大祀殿丹墀中疊石為臺東西相向為壇四內壝外二十四壇亦東西相向文武大臣及近侍官二十四人分獻罷朝日夕月禜星之祭并罷太嵗風雲雷雨嶽鎮海瀆山川月將城隍歷代帝王春秋祭惟嵗八月中旬擇日于山川壇及帝王廟祭之建文元年撤仁祖配配太祖高皇帝文皇即位亦如之永樂八年後太子攝祭遣禮部尚書至北京復命十八年北京壇成上歲親詣南京郊壇有事則遣官祭告洪熙元年奉文皇配位太祖下西向嘉靖九年上從言官夏言欲分祀天地下廷議主分祭者左都御史王鋐中允廖道南編修程文德等八十二人主分祭而以成憲及時未可為言者大學士張璁等八十四人主分祭而以山川壇為方丘者尚書李瓚等二十六人主合祭而不以分祭為非者尚書方獻夫李勛詹事霍韜魏校編修徐階郎中李默王道等二百六人無可否者英國公張崙等一百九十八人上曰分祀禮也建圜丘于天地壇南稍北為皇穹宇先名泰和殿作方丘于北郊稍南為皇祇室從祀圜丘日月星辰雲雨風雷方丘嶽鎮海瀆丘陵山川是年三月上從言議南北二郊奉太祖配孟春祈榖祀上帝于大祀殿奉文皇配下廷議羣臣以為不可疏留中言又疏請上怒羣臣違君叛禮令祈榖二祖並配二郊専奉太祖配已而罷祈榖之配毁祀殿改建大享殿殿後為皇乾殿十七年薦大號于天改昊天上帝稱皇天上帝祀天壝壇周禮至敬不壇掃地而祭特燔柴於泰壇而已至秦則有四畤之制漢元始儀上帝圓壇八觚徑五丈高九尺茅營去壇十步光武始百步土營徑五百步神靈壇各於其方靣三丈去茅營二十步光武始為郊兆於洛陽城南七里圜丘八陛中又為重壇其外為壝重營皆紫以像紫宫有四通道以為門中營四門外營四門營即壝也隋制為壇四成唐因之每成各高八尺一寸下成廣二十丈再成廣十五丈三成廣十丈四成廣五丈凡二壝宋初因唐制熙寧中始增壝為三每壝三十五步周垣四門元制為壇三成以合陽竒之數每成高八尺一寸以合乾之九九上成縱廣五丈中成十丈下成十五丈四陛陛十有二級外設二壝內壝去壇二十五步外壝去內壝五十四步各四門壇設於丙巳之地以就陽位外垣南櫺星門三東西櫺星門各一中築圜壇周圍上下俱護以甓內壝外壝各高五尺壝四靣門三俱塗以赤國朝為壇二成下成闊七丈高八尺一寸四出陛正南陛闊九尺五寸九級東西北陛俱闊八尺一寸九級上成闊五丈高八尺一寸正南陛一丈二尺五寸九級東西北陛俱闊一丈一尺九寸五分九級壇上下甃以琉璃磗四靣作琉璃欄杆壝去壇一十五丈高八尺一寸甃以磗四靣有櫺星門周圍外墻去壝一十五丈四靣亦有櫺星門天下神祗壇在東門外天庫五間在外垣北南向厨屋五間在外壇東北西向庫屋五間南向宰牲房三間天池一所又在外庫房之東北執事齋舍在壇外壇之東南牌樓二在外橫甬道之東西燎壇燎牲附周禮大宗伯以禋祀祀昊天上帝禋謂煙也周人尚臭故升煙以祀天祭法又曰燔柴於泰壇謂實牛柴上以焚之也蓋陽祀自煙始故升煙以致神不可不在先及致神矣方有事焉至於禮畢則以牲幣之屬焚之然後為禮之終也唐燎壇在神壇之左宋因唐制燎壇方一丈髙一丈二尺開上南出户方六尺在壇南二十步丙地庀燎壇髙一丈二尺四方各一丈周圍護以甓在外壝內丙巳之位東西南三出陛開上南出户上方六尺深可容柴國朝燎壇在內壝外東南丙地髙九尺闊七尺開上南出户其燎牲則漢用牛首後魏同左體六朝用䝱之九箇唐宋皆用牛首元用馬首國朝别用全犢以燎配帝祭法曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王孝經曰周公郊祀后稷以配天蓋祀天莫大于郊而祀祖莫大于配天也自秦滅學舊禮隳廢漢至光武始以高祖配焉魏眀帝用鄭玄周祀天於圜丘以嚳配之説逺推帝舜以配圜丘晉武帝用王肅之説始以其祖配由宋及隋或以祖配或以考配唐髙祖武德初郊以其祖景帝配太宗以髙祖配髙宗以髙祖太宗並配開元中以髙祖配寶應初又以景皇帝配宋太祖乾德初郊以其父宣祖配太宗時配以太祖真宗時奉太祖太宗並配仁宗時以太祖太宗真宗並配神宗以後専以太祖配元至成宗朝始定郊以太祖配國朝洪武九年初郊議配祀上謙讓不許親為文以告太廟曰臣於今年十一月三日冬至祀上帝于南郊故先告祖考鑒觀歷代有天下者未嘗不以祖配天兹臣獨不敢者以臣功業猶有未就政治或有闕失懼有責焉去年上天垂誡有聲東南又雷火焚舟及擊殿吻早暮兢惕恐無以承上帝好生之德故不敢輒以祖配天也惟祖神與天通恐上帝有問以臣之所行敷奏帝前善惡無隱惟上帝鑒之候南郊竣事臣當率百司恭詣廟庭告成大禮以共享上帝之錫福謹告明年夏至將祀方丘羣臣復請舉配典上堅執前志不允羣臣固請乃俟慶陽平議之八月慶陽平諸將凱還十一月十四日冬至羣臣復固請上勉從衆議奉皇考仁祖淳皇帝配天于圜丘從祀祭義曰郊之祭也大報天而主曰配以月大猶遍也蓋祭天之祀日月天神共為一壇而日為衆神之主秦祭四畤漢祀太乙從祀之禮無見焉東漢光武初郊祀日月於中營內南道北斗在北道之西其中八陛及中營四門外營四門中外營門封神共千五百一十四神背中營神五星中宫宿五官神及五嶽之屬背外營神二十八宿外官星雷公先農風伯雨師四海四瀆名山大川之屬隋文初郊五帝日月在圜丘第二等北斗五星十二星辰河漢內官在第三等二十八宿中官在第四等外官在內壝之內衆星在內壝之外凡六百四十九座唐初五方帝日月七座在圜丘第二等內官五星以下五十五座在第三等二十八宿以下百四十五座在第四等外官百一十二座在內壝之內衆星三百六十在內壝之外宋制天皇五帝日月北極九位在第一龕北斗天一太一帝座五帝內座五星十二辰河漢內官等神位五十四座在第二龕二十八宿中官等神位一百五十九座在第三龕外官神位一百六座在內壝之內衆星三百六十座在內壝之外元制五方帝日月等共九位在第一等內官五十四位在第二等中官一百五十九位在第三等外官一百六位在內壝內衆星三百六十位在內壝外國朝遵用古制惟設大眀夜眀星辰太歲從祀而不襲前代之謬實得貴誠尚質之義焉圜丘壇以下太常寺在正陽門外五里許制三成壇靣并周欄俱青磂􅲚東西南北階九級俱白石內櫺星門四南門外東門砌緑燎爐燔柴焚祝帛旁砌毛血池西南築望燈臺祭時懸大燈于竿末外櫺星門四列南門外左設具服臺東門外建神庫神厨祭器庫宰牲亭北門外正北建皇穹宇外又建四天門東曰泰元門東建崇雩壇東建神庫南曰昭享門左右石坊西曰廣利門西建鸞駕庫西為犧牲亭北為神樂觀北曰成貞門外西北建齋宫歲冬至大祀天於圜丘凡國有大事則祭告先一月本寺擇日祭司牲令屬官每日二員滌牲又令協律郎率樂舞生每日習禮樂于太和殿先十五日題請上視牲次題欽定大臣三員看牲次題欽定大臣四員分獻進儀注並登壇執事官樂舞生名數先六日本寺官吉服詣寢殿候上告視牲是旦上乘輿至太廟門降輿導引官導上由殿左門外至拜位內贊就位導上詣太祖歷世宗香案前俱奏上香訖奏復位奏跪贊讀告辭訖奏四興奏四拜奏禮畢導上出左門還宫先五日本寺官具公服詣皇極殿鳴鞭訖奏省牲官員題本進司禮監官接訖奏請省牲承旨叩頭退上常服乘輦至犧牲所轉西南牆角知觀二員叩頭起提爐導至所南門迤西輦至駐鴻臚寺官奏神樂觀樂舞生叩頭錦衣衛官奏落輦上降輦禮部尚書左右侍郎太常寺卿少卿導上至所門內西小次憩出禮部太常導上至正牛房香案前北向立養牲官率軍人牽牲過上前卿奏大祀牛犢又奏大祀北羊又奏備祀牲導至鹿房前奏大祀鹿至兔房前奏大祀兔仍導至小次內少憩出導升輦上還至太廟參拜還宫先四日本寺官具公服詣皇極殿鳴鞭訖奏祭祀齋戒承旨叩頭退於東柱下西向立候朝畢奏分獻官出班叩頭訖即出屬官一員率鋪排六人執御杖紗燈進設銅人于文華殿東九五齋北向乃出示長安門是日早博士捧請太祖祝版詣平臺候填御名捧出藏於太廟神庫巡風官候會極門宣領香燭堂上官俱詣天壇神庫視滌器次詣太和殿觀禮樂次詣犧牲所看牲先三日五鼓本寺官具祭服詣太廟候上請太祖配帝是旦上乘輿至太廟門西降輿導引官導上至戟門帷幄內具祭服出導至左陛上典儀唱執事官各司其事內贊內導引導上至拜位內贊奏就位典儀唱迎神內贊奏再拜典儀唱行獻禮執事官詣御前獻爵內贊奏跪贊讀祝贊俯伏興平身少卿跪御前東北向奏禮畢請還宫內贊奏再拜典儀唱讀祝官捧