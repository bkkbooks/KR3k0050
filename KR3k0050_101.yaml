body:
  text: 圖書編卷一百一明章潢撰專祀太嵗風雲雷雨師總叙太歳者十二辰之神按說文歳之字從歩從戍木星一歳行一次十二辰十二周天若歩然也自子至已為陽自午至亥為隂所謂太歳十二神也隂陽家說又有十二月將十二時所直之神若天罡太乙功曹大衝之類雖不經見歴代因之唐宋不載祀典元每有大興作祭太歳月將日直時直於太史院若其風師雨師之祀見於周官秦漢隋唐亦皆有祭天寳中又增雷師於雨師之次因升風雨雷師為中祀宋元因之國朝既祀於圜丘以太歳風雨雷師從祀且增雲師於風師之次復以春秋驚蟄秋分後之三日專祀本歳太歳及風師雲師雨師於國南羣祀壇天子降香遣官展事其郡縣風雲雷雨師之祭一如前代之儀云太歳壇在正陽門外之西與圜丘相對中為太歳殿東西兩廡南為拜殿殿之東南砌燎爐殿之西為神廟神厨宰牲亭亭南為川井外四天門東門外為齋宫殿駕庫外為東天門又神祗壇今罷祀護壇地六百畆供粢盛及薦新品物又種九十四畆有竒每年額稅四石七斗有竒本寺㑹白禮部收貯神倉以備旱潦又壇官種一百九十畆壇万二百六十六畆七分歳孟春歳除遣太常寺卿祭太歳之神於太歳殿四季月將從祀春秋東廡夏冬西廡先十五日題遣官行禮委協律郎率樂舞生演禮樂先三日同享祫奏齋詣大和殿觀禮樂犧牲所看牲先一日樂舞生燒香陳設樂器厨役洗祭器至夜陳設籩豆祭品太歳禮神帛一白色磁爵三酒盞三十黝牛一羊一豕一登一鉶二籩豆各十簠簋各二四季月將同惟帛一每季爵三至期導引官導遣官由拜殿右門入典儀唱樂舞生就位執事官各司其事贊引贊就位典儀唱迎神奏樂樂止贊兩拜典儀唱奠帛行初獻禮奏樂執事捧帛爵詣各神位前奠訖樂暫止贊引贊跪典儀唱讀祝訖樂復作贊俯伏興平身樂止典儀唱行亞獻禮奏樂儀同初儀獻惟不獻帛讀祝樂止典儀唱行終獻禮奏樂儀同亞獻樂止典儀唱賜福胙執事進福酒胙於遣官右贊跪贊搢笏贊飲福酒贊受排贊出笏贊俯伏興平身贊兩拜典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位贊拜奏樂捧祝帛官下陛贊禮畢孟春祝文皇帝遣致祭於某甲太歳之神四季月将之神時維孟春聿新歳序特用遣祭以牲帛庶品之儀神其歆此祭誠敷佑康吉尚享歳暮則改云時維歳暮將届新春祭誠則改為報誠樂章樂八奏樂生七十二人舞八佾文生六十四人武生六十四人迎神保和吉日良辰祀典式陳輔國佑民太歲尊神四時月將功曹司神濯濯厥靈昭鑒我心以候以迎來格來歆奠帛保和靈其􅊩止有赫其威一念濳通幽㝠弗違有儀在篚物薄而㣲神兮安畱尚其享之初獻安和神兮我畱有薦必受享祀之初奠兹醴酒晨光初昇詳徴應候何以侑觴樂陳初奏亞獻中和我祀維何奉兹犧牲爰酌醴齊二觴再昇洋洋如在式燕以寧庻表㣲忱交於神明終獻肅和執事有嚴品物斯祭黍稷非馨式將其意薦兹酒醴成我常祀神其顧歆永言樂只徹饌雍和春祈冬報率為我民我民之生賴於爾神惟神祐之康寧是臻祭祀云畢神其樂歆送神寧和三獻禮終九成樂作神人以和旣燕且樂雲車風馭靈光昭灼瞻望以思邈彼寥廓望燎寧和俎豆旣徹禮樂已終神之云旋倐將焉從以望以燎庶幾感通時和嵗豐惟神之功先農壇南京洪武二年建壇於山川壇之西南墠崇尺許南為籍田北為神倉歳仲春遣應天府官祭先農之神於先農壇典儀唱樂舞生就位執事官各司其事贊引引獻官至盥洗所贊詣盥洗所搢笏出笏贊引贊就位典儀唱瘞毛血迎神奏樂止贊引贊四拜陪祭官同典儀唱奠帛行初獻禮奏樂詣神位前搢笏執事官以帛跪進于奠官奠訖執事官以爵跪進于獻官贊引贊獻爵出笏詣讀祝位跪讀祝官跪於獻官左讀祝畢進祝于神位前贊引贊俯伏興平身復位樂止典儀唱亞獻禮奏樂執事以爵進於神位前樂止典儀唱終獻禮儀同亞獻典儀唱飲福受胙贊引贊詣飲福位執事以爵進于獻官贊飲福酒受胙出笏俯伏興平身復位贊引贊二拜典儀唱徹饌奏樂執事於神位前徹饌樂止典儀唱送神贊奏樂唱引贊四拜樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位望瘞贊引贊詣望瘞位贊禮畢祝文皇帝謹遣致祭于先農之神惟神功興農事乃種嘉榖為民立命萬世永頼今將親作親耕籍田謹以牲醴庶品用修常祀尚享樂八奏樂八奏樂生七十二人舞八佾文生六十四人武生六十四人迎神永和東風起蟄地脉奮然蒼龍掛角蔚蔚天田民命維食創物有先圜鍾既奏有降斯延奠帛永和帝出乎震天發農祥神降于筵靄靄洋洋禮神有帛其色惟蒼豈伊具物誠敬之將初獻壽和九榖未分庶草攸同表為嘉種實在先農黍稌斯豐酒禮是供獻帛之初以蘄感通亞獻寧和倬彼甫田其隰其原來耜云載驂御之間報本斯享亞獻惟䖍神其歆之自古有年終獻雍和帝籍之典享祀是兹潔豐嘉栗咸仰于斯時維親耕享我農師禮成于三以訖陳詞徹饌景和於赫先農歆此潔修于篚于爵于饌于饈禮成告徹神恵感畱餕及終畆豐年是求送神泰和神無不在於昭于天日迎日送于享于筵冠裳在列金石在懸徃無不知其珮翩翩望瘞泰和祀帛特醴先農既歆不畱不䙝瘞之厚深有幽其瘞有赫其臨曰禮之常匪今斯今洪武元年御史尋适請耕籍田享先農以勸天下上從之二年建壇以后稷配正月十七日告祭於先農之神惟神生於天地開闢之初創田器别嘉種以肇興農事古今億兆非此不生永為世教帝王典祀敬不敢㤀因天下亂集兵保民者一紀於兹荷天眷佑海内一家臨御稱尊紀綱黎庶考典崇祀神載䇿書今東作方興禮宜告祭謹命太常寺築壇於京城之陽躬率百司詣壇展禮緬惟神明造化萬世如新冀發太古之苗寳初生之粟為民立命昭祀無疆謹以制幣犧齊粢盛庶品肅備常儀陳其名薦以神作主尚享是日親祀先農畢太常寺卿引皇帝至耕籍位南靣立三公以下及合從耕者各就耕位万部尚書北靣進耒耜太常卿引皇帝秉耒三推訖尚書跪受耒太常卿奏請皇帝復耕籍位南向坐三公五推尚書九卿九推訖奏禮畢應天府并两縣官率耆老終畆已而奉仁祖配八年奉欽依我想先農只是上古一箇種田的人今後祭先農時百官都致齋那當致日子教應天府官率耆老并種田的老人去祭祭畢我率百官到那田所欽前親耕欽此遣應天尹祭不設配上親耕如故永樂建壇如南京耕籍親祭仲春遣順天府尹禮樂如舊𢎞治元年二月十三日孝宗耕籍禮部尚書李敏題順天府添上中下等農夫各十人穿本等衣鞋各執農器引進叩頭令其終畆或賜食賜布以慰之奉欽依朕正要看農夫艱苦着順天府分付終畆庶人只穿本等衣鞋耕地人賜布一疋嘉靖元年奉欽依終畆農夫照例引見只穿本等衣鞋每人賞布一疋二年耕籍用樂舞仲春教坊奏樂九年建圓廪方倉備黍盛祝文嗣天子御名致祭于先農神曰惟神肇興農事始種嘉種立斯民命萬世攸頼兹當東作之期躬耕籍田惟頼神慈黙施化理俾年榖豐茂率土皆同以牲帛醴齊之儀用伸祭告之誠十六年遣万部尚書用樂舞四十一年仍遣順天府尹免樂舞皇帝即位行耕籍禮親祀焉先農壇以下太常寺在太歳壇之西南為制一成四靣石階九級西為瘞位東為具服殿前為觀耕臺南即籍田東北建神倉歳仲春上戊日遣順天府尹祭先十五日委恊律郎率樂生演禮樂先二日奏至齋具本奏省牲進銅人齋牌示長安門是日詣太和殿觀禮樂犧牲所看牲先一日上告辭内殿省牲官具本服命博士捧祝版候填御名捧安於香亭厨役舁至神庫奉安樂舞生陳設樂器厨役洗器夜三更捧安於神版設籩豆祭器先農告祀帛一青色磁爵三酒盞三十黝牛一羊豕一登一鉶二簠簋各二籩豆各十祭日昧爽本寺卿於皇極殿候請聖駕上由正陽門至神祗壇東西入導至具服殿具皮弁服出導至先農壇典儀唱樂舞生就位執事官各司其事内贊對引導至御拜位位設於壇上奏就位典儀唱瘞毛血迎神奏樂奏陞壇内贊導上至香案前奏搢圭奏上香奏出圭奏復位樂止奏四拜傳贊百官同典儀唱奠帛行初獻禮奏樂執事官捧帛爵獻於神位前樂暫止奏跪傳贊衆官皆跪典儀唱讀祝訖樂復作奏俯伏興平身傳贊百官同樂止典儀唱行亞獻禮唱奏樂執事官獻於神前樂止典儀唱行終獻禮奏樂儀同亞獻樂止本寺卿於壇東西向唱答福胙光禄寺卿跪進福酒胙於上右内贊奏跪奏搢圭奏飲福酒奏受胙出圭奏俯伏興平身奏再拜傳贊百官同典儀唱徹饌奏樂樂止典儀唱送神奏樂奏四拜傳贊百官同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣瘞位奏樂捧祝帛官下級奏禮畢導引官導上囘具服殿更翼善冠黄袍本寺卿入奏詣耕位導駕官同卿導上至觀耕臺前耕籍位南向立三公以下從耕者各吉服侍万部尚書北向跪進鞭導駕官同卿導上秉耒耜三推三返畢万部尚書跪受耒耜順天府官跪受鞭卿跪奏請復位順天府捧青箱隨以種子播而覆之上御觀於耕臺上南向坐觀三公五推尚書九卿九推訖卿跪奏耕畢從耕官各就位教坊司承應畢卿跪奏禮畢導駕官同卿導上還至齋宫宴從耕官宴畢上囘參内殿祝文兩京同樂章太祖御製兩京同歳仲春祭贊引導遣官詣盥洗所洗訖典儀唱執事官各司其事贊就位位設於壇下典儀唱迎神自迎神至送神同前惟不答福胙無樂舞先蠶嘉靖九年壇於北郊十年改築於内苑以仲春上巳祀二十七年罷歳春擇日皇后祭公主内外命婦陪祀前三日内尚儀奏齋戒洗宫令陳祭物樂女生陳樂器祭品先蠶之神爵三盞三十黍稷稻籩豆各十帛一羊一豕一是日未明司禮監備儀仗及重翟車蠶宫令備鈎筐一副俱候西華門外將明皇后出宫門乗肩輿侍衛警蹕如常公主及内命婦應入壇者各著其服以從至西華門升重翟車兵衛儀仗導女官捧鈎筐行於車前至具服殿皇后至祭拜位司贊奏就位公主内外命婦各以次就位内贊唱瘞毛血迎神奏樂樂止司贊奏四拜公主内外命婦同内贊唱奠帛行初獻禮樂作執事官捧帛爵於神位前各奠跪訖樂暫止司贊奏跪皇后跪公主以下同跪内贊唱讀祝訖樂復作司贊奏興皇后公主以下同興樂止内贊唱亞獻禮終獻禮樂作執事官捧爵於神位前跪奠訖樂止執事女官進立壇東西向唱賜福胙司贊跪奏皇后跪執事女官捧福酒胙跪進於皇后右奏飲福酒奏受胙訖奏興皇后興奏兩拜公主以下同内贊唱徹饌樂作樂止内贊唱送神樂作奏四拜公主以下同樂止内贊唱讀祝官捧祝執事官捧帛饌各詣瘞位樂止皇后退拜位之東立捧祝帛饌官過訖司賛奏禮畢皇后還具服殿更常服詣采桑臺行采桑禮祝文皇后某氏致祭於先蠶氏之神曰惟神肇興蠶織衣我萬世永頼仰冀黙垂庇佑相兹蠶事率土大同惟神之休敬以牲帛醴齊之儀用伸祭告尚享樂章樂六奏去舞迎神貞和於穆惟神肇啟蠶桑衣我萬民保有家邦兹舉曠儀春日載陽恭迎霞馭靈氣洋洋初獻壽和神其靈只有苾其芬乃獻玉齍乃奠文纁仰祈昭鍳淑景氤氲顧茲蠶婦祁祁如雲亞獻順和載舉清觴蠶祀孔明以格以享鼓瑟吹笙隂教用彰坤儀久貞神之聽之鍳此禋誠終獻寧和神之格思桑土是宜三繅七就惟此繭絲獻禮有終神不我遺錫我純服藻繪其儀徹饌安和爼豆具徹式禮莫愆既筐既敇我祀孔䖍我思古人葛覃惟賢明靈歆只永顧桑阡送神恒和神之升矣日霄霞蒸相此女紅杼柚其興兹返𤣥宫鑾鳳翔騰瞻望弗及永賜嘉徴三公命婦五采列侯九卿命婦三采蠶成内命婦十人行三盆手禮遂布於織婦獻織於蠶宫令社稷總叙周制小宗伯掌建國之神位右社稷左宗廟社稷之祀壇而不屋必受霜露風雨以逹天地之氣凡起大事動大衆必先告於社而後出其禮可謂重矣蓋古者天子社以祭五土之祗稷以祭五榖之神其制在乎中門之外外門之内尊而親之與先祖等人非土不立非榖不食以其同功均利以養人故祭社必及稷所以為天下求福報功之道也然天子有三社為羣姓而立者曰太社其自為立者曰王社又有所謂勝國之社屋之不受天陽國雖亾而存之以重神也後世天子之禮惟立太社太稷以祀之社皆配以勾龍稷皆配以周棄漢因高祖除亾秦社稷立官太社太稷一歳各再祠光武立太社稷於洛陽在宗廟之右春秋二仲月及臘一歳三祀唐因隋制並建社稷於含光門之右仲春仲秋二時戊日祭之𤣥宗升社稷為大祀仍以四時致祭宋制每歳春秋二仲月及臘日祭之元世祖營社稷於和義門内少南以春秋仲月上戊致祀國朝建壇於宫城之右春用二月上戊日秋用八月上戊日致祭若其歴代制度儀文之同異者詳具於左方社稷壇壇建於午門之右制二成四靣石階各三級上成用五色土隨方築之壇西砌瘞位四靣開櫺星門西門外西南建神庫庫南為神厨北門外為拜殿外天門四座西門外南為宰牲亭國初太社太稷建於宫城之右異壇同壝洪武三年壇北建祭殿拜殿以備風雨十年改建闕右同壇同壝先是社主用石半埋土中稷不用主至是埋石主於壇之正中并稷更設神牌而丹漆之永樂中京師壇成制如之歳仲春秋上戊祭太社稷於社稷壇東太社西太社皆北向配北后土勾龍氏西向后稷氏東向凡國有大事則祭告國初太社太稷異壇同壝北向勾龍后稷配社石主半埋土中稷不設主洪武元年令風雨齋宫望祭三年建祭殿於壇北又北拜殿十年更祭社稷於闕右同壇同壝壇二成四出陛用五色土如其方色埋石主於壇中比祭設神牌北向是年以禮官張籌議罷勾龍后稷配配以仁祖西向一壇合祀後撤仁祖配太祖永樂中京師壇成位設如故仁宗又奉成祖配嘉靖九年世宗皇帝諭禮官奉太祖成祖配位藏大寢仍以勾龍后稷配先是高皇帝曰古人以社為五土之神稷為五榖之神土主發生五榖用之以生而乃一圍之中各壇而祭是土榖不合於生生之意也行禮之時先社固宜而又先奠社配乃行稷神之禮此果合人情乎於是合祀更正奠獻國朝祭社稷儀節事例洪武元年定社稷配祀歳仲春秋上戊日祭社稷於西南郊其壇壝石主並依舊儀在京官給祭物各府州縣官給米三石三年詔京師於壇北建祭殿五間又北建拜殿五間以備風雨祭祀七年定府州縣社稷祭正配皆少牢已而罷配十年本部議社稷合社稷共為一壇皆設木主而丹漆之祭則設於壇上祭畢復奉貯於庫二十九年令陪祭未入流官用祭服祭期歳仲春秋上戊日行事齋戒前三日三獻官散齋二日於别寢致齋一日於祭所散齋理事如舊惟不吊喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡事致齋惟祭事得行其餘悉斷執事人貟齋各一日於祭所省牲執事者引獻官至省牲位南立執事者自門東宰牲西行過獻官前省訖執事以豆二取毛血獻官在省城者布政司官主祭府不别祭縣附府者亦如之儀注正祭日將行禮起鼓初嚴遍燃令庭燎香燭鼓再嚴執事者各序立於兩階鼓三嚴贊引引各獻官立俟行禮通贊唱執事者各執其事陪祭官各就位獻官各就位瘞毛血迎神鞠恭拜興拜興拜興拜興平身奠帛行初獻禮贊引唱詣盥洗所搢笏出笏詣酒罇所司罇者舉羃酌酒詣司社神位前跪搢笏奠帛獻爵出笏俯伏興平身詣司稷神位前跪搢笏奠帛獻爵出笏俯伏興平身詣讀祝位跪通贊唱衆官皆跪贊引唱讀祝通引同唱俯伏興平身贊引唱復位通贊唱行亞獻禮贊引唱詣酒罇所司罇者舉羃酌酒詣司社神位前跪搢笏獻爵出笏俯伏興平身詣司稷神位前跪搢笏獻爵出笏俯伏興平身復位通贊唱行終獻禮贊引唱詣酒罇所司罇者舉羃酌酒詣司社神位前跪搢笏獻爵出笏俯伏興平身復位通贊唱飲福受胙贊引唱詣飲福位搢笏跪飲福酒受胙出笏俯伏興平身復位通贊唱鞠叅拜興拜興平身徹饌送神鞠恭拜興拜興拜興拜興平身讀祝者捧祝進帛者捧帛各詣瘞所望瘞贊引唱詣望瘞位通贊唱焚帛一段焚帛二段禮畢祝文維年歳次月朔日某申某衙門某官某等敢昭告于司社之神司稷之神曰惟神贊輔皇祗發生嘉榖粒我蒸民萬世永頼時當仲春秋禮嚴告祀報謝謹以牲帛醴齊粢盛庶品式陳明薦尚饗社稷總論按周禮小司徒凢建國立其社稷封人凢封國設其社稷之壝社土神稷榖神白虎通曰人非土不立非榖不食土地廣博不可偏敬也五榖衆多不可一一而祭也故封土立社有土之尊五榖之長故封稷而祭之也祭法共工氏之子曰后土能平九土故祀以為社厲山氏之子曰農能殖百榖周棄繼之故祀以為稷此蓋以其有功於土榖祀土榖之神則以之配食焉耳周制諸侯立三社大夫以下立一社祭法諸侯為百姓立社曰國社大夫以下成羣立社曰置社國社者今之縣羣社也置社者今所謂里社也不言稷者舉社則稷從之陳氏禮書曰稷非土無以生土非稷無以見生生之澤故祭社必及稷以其同功均利而養人也詩載芟春祈也良耜秋報也漢高帝初起禱豐枌榆令天下立靈星祀后稷靈星龍星左角曰天田農祥也光武二年令郡縣皆置社稷令長侍祠牲用羊豕隋文帝開皇初郡縣社稷春秋二仲月並以少牢祭百姓亦各為社唐天寳四載定社稷為大祀宋自京師至州縣皆有社稷而社主不以石禮部言社稷不屋而壇受霜露風雨以逹天地之氣故用石主取其堅久從之於是社主以石為之形如鐘長二尺五寸方一尺剡其上培其半瘞坎於壇之北壬地春秋二祭刺史縣丞初獻上佐縣丞亞獻州博士縣簿尉終獻牲用少牢致齋三日服用常服正配坐尊各二籩豆各八簠簋各二爼三從祖籩豆各二簠簋爼各一紹興元年命春秋二仲及臘前為三祭元太祖三十年立社稷國朝洪武元年令郡縣置社稷七年定府州縣社稷祭正配皆少牢已而罷配頒降圖式社稷同壇夫孔門為宰已有社稷為重言務民義必言敬鬼神鬼神固莫先於社稷矣自上世以來惟社稷天下得通祀我高祖稽酌前代之制立壇設壝品式儀數至周至慎頒行郡邑然而有司知毖恤者鮮矣歴代社稷顓帝祀共工氏子勾龍為社烈山氏子柱為稷高辛氏唐虞夏皆因之商湯為旱遷柱以周棄代之欲遷勾龍無可繼者故止周制天子立三社稷法云王為羣姓立社曰大社於庫門内之西立之王自為立社曰王社於籍田立之亾國之社曰毫社廟門之外立之諸侯立三社祭法云諸侯為百姓立社曰國社於臯門之西立之自為立社曰侯社亦於籍田中立之而亦立毫社大夫以下立一社祭法云大夫以下成羣立社曰置社今之里社也但立名雖異其神則同皆以勾龍配之稷周棄配社者五土之神稷者於五土之中特指原隰之祗援神契曰稷者原隰之中能生五榖之祗也社壇在東稷壇在西俱北面壇築墻開四靣門天子之社則以五色土各依方色為壇廣五丈諸侯則但用當方之色為壇皆植木以表其處又别為主以象其神大夫以下皆但以其地所宜之木而立之漢高帝初起禱豐枌榆社二年東撃項籍還入關因命縣為公社後四年天下定詔御史令豐謹理枌榆社其後又令縣常以春三月及臘祠后稷平帝時王莽奏建立社稷自高祖除秦社稷立漢社稷時已有官社以夏禹配而未立官稷至此始立之稷種榖樹徐州牧歳貢五色土一斗後漢光武建武二年立大社稷於洛陽在宗廟之右皆方壇無屋有墻有門而已二月八月及臘一歳三祀皆大牢具使有司祠郡縣皆置社稷太守令長侍祠牲用羊豕惟州所治有社無稷以其使官也魏自漢後但大社有稷官社無稷故常二社一稷也至明帝景初中立帝社明帝祭社但稱皇帝晉武帝大康九年詔曰社實一神其并社之祀東晉元帝建武元年又依京洛立二社一稷宋仍晉舊無所改作梁社稷在大廟西依晉元帝所創有大社帝大稷凡三壇至大同初又加官社官稷為五壇陳依梁而帝社以三牲首餘以骨體薦粢盛為六飯粳以敦稻以牟黄粱以簠白粱以簋黍以瑚粢以璉後魏天興二年置太社太稷帝社於宗廟之右為方壇四陛以二月八月日用戊皆以太牢勾龍配社周棄配稷並有司侍祠北齊立大社帝社大稷三壇於國右每仲春仲秋元辰及臘皆以太牢祭焉皇帝親祭則司農卿省牲進熟司空亞獻司農獻終後周立社稷於左帝親祠則冡宰亞獻宗伯終獻隋文帝開皇初建社稷並列於含光門内之右仲春仲秋吉戊各以一太牢祭牲色用黒仲冬下亥又臘祭之州郡縣二仲月並以少牢祭百姓亦各為社唐社稷亦於含光門之右仲春仲秋二時戊日祭大社大稷社以勾龍配稷以后土配武太后天授三年九月為社至長安四年三月制社依舊用八月神龍元年改先農壇為帝社壇於大壇西立帝稷壇禮同大社大稷其壇不備方色異於大社又其年五月詔於東都建置大社天寳三載二月詔社稷列為中祀頗紊大猷自今以後升為大祀宋制祀大社大稷為大祀每歳春秋二仲月及臘日奉之其常祀州縣惟春秋二祭圖書編卷一百一
