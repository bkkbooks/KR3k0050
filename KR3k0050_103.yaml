  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0050_WYG_103-1a, image: WYG0972/WYG0972-0136c.png}
body:
  text: 圖書編卷一百三明章潢撰厯代帝王廟祀總序人君為天地宗子家六合子萬姓蓋以天地為大父母也即宜以天地為大宗譜從開闢以來曽任君天下之責居天位食天禄者即其同姓之宗親况伏羲神農黄帝堯舜禹湯文武其經制述作有功民物乃萬世所永頼者得非後代君王所當祖述之者乎生而君天下没而師天下崇廟貌以尊祀之者禮也洪惟我太祖高皇帝特隆廟宇正祀典不惟漢髙祖光武唐太宗宋太祖俱與列聖並列雖元世祖今已革祀而國初亦得與焉偉哉一代之盛典也噫自天地言之作君作師既均之為宗子則凡為後世之君師不得不儀刑前代以上慰乎乾父坤母生養民物之心今黄帝先醫且均得祀諸内殿曷若并列聖祀之庶旦夕瞻仰祖述在念不尤為祀典之要也耶厯代帝王廟祀典在欽天山之陽帝王冕服坐像伏羲神農無之中室太昊伏羲氏炎帝神農氏黄帝軒轅氏東一室帝金天氏帝高陽氏帝高辛氏帝陶唐氏帝有虞氏西一室夏禹王商湯王周武王東一室漢高祖皇帝漢光武皇帝又西一室唐太宗皇帝宋太祖皇帝從祀東廡風后臯陶龍伯益傅説召公奭召穆公虎張良曹參一壇西廡力牧䕫伯夷伊尹周公旦太公望方叔蕭何陳平一壇又東周勃馮異房𤣥齡李靖李晟潘羙岳飛一壇又西鄧禹諸葛亮杜如晦郭子儀曹彬韓世忠張浚一壇嘉靖九年奉欽依古先帝王春祭南京不必増待廟成春秋都在京行禮舊儀注祝文與今異撤元世祖在停祭之後遣守偹官行禮百官陪祀至期典儀唱樂舞生就位執事官各司其事贊引引獻官至盥洗所贊搢笏出笏引至拜位贊就位儀典唱迎神協律即舉麾奏樂樂止贊四拜陪祭官同典儀唱奠帛行初獻禮奏樂執事官各捧帛爵進于獻官贊獻于神位前贊引贊陞壇贊引贊詣三皇位前贊搢笏執事官以帛進于獻官贊獻爵凡三出笏詣五帝神位前俱同前爵凡五詣三王神位前爵凡三詣漢高祖漢光武唐太宗皇帝神位前爵凡三詣宋太祖皇帝神位前爵凡一出笏詣讀祝位讀祝官取祝跪于獻官左讀祝畢進于神位先贊俯伏興平身復位樂止典儀唱亞獻禮奏樂執事官各以爵獻于神位前樂止典儀唱終獻禮儀同亞獻典儀唱飲福受胙贊詣飲福位跪搢笏執事官以爵進贊飲福酒執事官以胙進贊受胙出笏俯伏興平身復位贊二拜典儀唱徹饌奏樂執事官各于神位前徹饌樂止典儀唱送神奏樂贊四拜平身陪拜同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位望瘞樂止贊禮畢祝文皇帝謹遣致祭于太昊伏羲氏炎帝神農氏黄帝軒轅氏帝金天氏帝高陽氏帝高辛氏帝陶唐氏帝有虞氏夏禹王商湯王周武王漢高祖皇帝漢光武皇帝唐太宗皇帝宋太祖皇帝曰昔者奉天命相繼為君代天理物撫育黎黔彝倫攸叙井井繩繩至今承之生民多福思不忘而報徳特祀以春秋惟帝兮英靈來歆來格尚饗洪武元年祀三皇用太牢勾芒祝融風后力牧配四年令三皇不必設祭祭於陵是年命官㕘考厯代聖帝賢王但在中原安養人民者三十四君合祀之擇名臣從祀洪武四年奉欽依厯代帝王都是前王如今祀祭我必親祀一遍六年禮官言古帝王有父子祖孫一廟合祭非禮令别立厯代帝王廟同堂異室嵗春秋祀三皇五帝禹湯文武漢高祖光武唐高祖太宗宋太祖元世祖其守成賢君令所在有司嵗春秋祭於陵六年上曰五帝三皇及漢唐宋創業之君俱宜于京師立廟致祭其餘守成賢君令有司祭于陵廟皆每嵗春秋祭之七年望帝王衮冕坐像上曰伏羲神農未有衣裳之制勿加冕服已而郊祀祔祭諸帝王省春祀増帝王壇于大祀殿環墠之外孟春從祀嵗仲秋遣官祭于廟二十年以武成王從祀帝王廟去王號罷故廟祀二十一年禮官擇上厯代名臣始終全節者三十五人從祀帝王廟上曰趙普負太祖不忠不可祀元穆呼哩安圖祖也不可祀孫而去祖可祀穆呼哩罷安圖祀祀巴延阿珠可勿祀又曰漢陳平馮異宋潘美皆宜祀未幾上曰文王雖基周命終守臣節唐高祖有天下本太宗力也可勿祀祀于陵増祀隋文帝是年廟火改建于欽天山之陽去隋文帝子午邜酉年傳制祭陵停廟祭嘉靖九年罷厯代帝王南郊壇從祀禮官請加南京廟春祭上不從令建廟京師嵗仲春秋祭南京祭罷十年春廟未成世祖祀之文華殿廟初成上至廟祭是年修撰姚涞請罷元世祖祀禮官議不可上從禮官議二十四年給事中陳裴又言之乃罷祀元世祖并罷從祀穆呼哩等五人厯代帝王廟太常寺在阜城門東廟曰景徳崇聖之殿厯代帝王從祀位次如南京丹墀東西砌燎爐殿後為祭器庫殿前為景徳門門東為神庫神厨宰牲亭鐘樓西住持房外門廟街門嵗仲春仲秋遣大臣祭先十五日委協律郎率樂舞生演禮樂先十日題欽遣大臣一員正獻四員分獻先二日奏致齋進銅人齋牌示長安門同日具本奏省詣太和殿觀禮樂犧牲所㸔牲次日具本復命博士捧祀版于神庫樂舞生燒香陳設樂器鋪排洗祭器奉安神牌陳設籩豆三皇祭品三案各禮神帛一白色磁爵三登一鉶二簠簋各二籩豆各十共騂牛一羊一豕一五帝五案三王三案漢髙祖光武二案唐太宗宋太祖二案俱同風后至曹參九位各素帛一爵三酒盞三十鉶一簠一簋二籩四形鹽棗栗鹿脯豆四菁葅鹿芹葅醯醢共羊一豕一周勃至岳飛九位力牧至陳平九位鄧禹至張浚七位俱同至期導引導遣官由右㦸門入贊詣盥洗所贊搢笏洗訖贊出笏典儀唱樂舞生就位執事官各司其事分獻官陪祭官各就位導引贊就位位設丹陛典儀唱迎神導引贊四拜傳贊百官同典儀唱奠帛行初獻禮奏樂執事官捧帛爵詣各神位贊引奏陞壇導由左門入至中爐贊跪搢笏上香至左爐右爐俱贊上香仍至中贊獻帛獻爵出笏詣讀祝位樂止贊跪傳贊百官皆跪贊讀祝訖樂復作贊俯伏興平身傳贊同樂止典儀唱行亞獻禮奏樂儀同初獻惟不上香獻帛讀祝樂止唱行中獻禮奏樂儀同亞獻樂止徹饌奏樂樂止典儀唱送神奏樂贊四拜傳贊百官同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位奏樂遣官退于拜位東捧祝帛饌官出㦸門贊禮畢分獻官儀祝文皇帝御名謹遣致祭于太昊伏羲氏云云曰仰惟諸帝昔皆奉天撫世創治安民我皇祖景慕不忘奉命致祭著在令甲恭修恒祀時維仲春謹以牲幣庶品用享於列聖敬體皇祖追報之䖍惟諸帝鍳臨來格于斯庶副予誠之至尚饗上親祭由中門入位于殿内内贊奏禮同前惟答福胙樂章樂七奏樂生七十二人舞八佾文生六十四人武生六十四人迎神雍和仰瞻兮聖容相鑾輿兮景從降雲衢兮後先來俯鍳兮㣲衷荷聖靈兮蒼生有崇睠諸帝兮是臨予頓首兮幸蒙奠帛初獻安和秉微誠兮動聖躬来列座兮殿庭予今顧兮効勤捧禮帛兮列酒尊鍳予情兮忻享方旋駕兮雲程酒行兮爵盈喜氣兮雍雍重荷蒙兮再瞻再崇羣臣欣兮躍從顧覩穆穆兮聖容亞獻中和酒斟兮禮明諸帝熙和兮悦情百職奔走兮滿庭陳籩豆兮數重亞獻兮願成終獻肅和獻酒兮至終早整雲鸞兮將還宫予心眷戀兮神聖欲攀留兮無從躡雲衢兮緩行得遥瞻兮達九重徹饌凝和納餚饈兮領成蒸民樂兮幸生將何以兮崇報惟歳時兮再瞻再迎送神夀和旛幢繚繞兮導來蹤鸞輿冉冉兮歸天宫雲擁兮祥風生民歌聖佑兮樂年豊望瘞豫和神機不測兮造化工珍饈禮帛兮薦火中望瘞庭兮稽首願神鍳兮寸衷樂章太祖御製兩京同凡三年傳制遣官祭于各陵寢省廟祭皇帝初即位遣官于帝王陵祭告先聖先師嘉靖初年祀于文華殿皇師伏羲氏神農氏軒轅氏帝師陶唐氏有虞氏王師夏禹王商湯王周文王周武王俱南向先聖周公先師孔子東西向以嵗仲春秋開講先一日祀至日昩爽太常寺陳設酒果籩豆祝帛訖候上皮弁服由文華殿出内贊對引導上至拜位奏就位上就御拜位内贊導上至伏羲氏前奏搢圭奏上香訖詣各神位前俱奏上香訖奏出圭奏復位上復位奏再拜訖讀祝官啓祝跪内贊奏跪上跪贊讀祝訖俯伏興平身讀祝官安祝退訖奏再拜訖贊焚祝帛上退拜位之東立捧祝帛官出門奏禮畢内贊對引導上出上回宫按初議罷元世祖祀世宗皇帝不可而從禮官議者豈以高皇帝詔文嘗有曰天命真人於沙漠入中國為天下主又文中子有帝元魏之説耶圖書編卷一百三
