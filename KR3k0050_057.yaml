body:
  text: 圖書編卷五十七明章潢撰海防廣東事宜東路廣東列郡者十分為三路東路為惠潮二郡與福建連壌漳舶通畨之所必經議者謂潮為嶺東之巨鎮柘林南澳俱係要區扼吭撫背之防不可一日緩而靖海海門蓬州大城諸所又皆跬歩海濤所頼以近保三陽逺衛東嶺者也惠州海豊東南濵海其㨗勝平海甲子門皆瞬息生變潮惠守備劄於衛治誠有以嚴其防矣然未知柘林為尤要也柘林乃南澳海道門户據三路之上㳺畨舶自福趨廣悉由此入舊例風汛之期各澳皆設戰艦秋盡而掣回泊水寨此在他澳猶可柘林去水寨一日之逺警報未易逹倘賊覘我無備批吭搗虚不亦危乎無柘林是無水寨也無水寨是無恵潮也為今之計東路官軍毎秋掣班必以柘林為堡慎固要津附近大城所戍卒互為聲援不得規避空所縱賊馳驟若遇颶霧塵霾尤宜加意其外石靖海甲子門海澳雖視柘林稍次而舟師防禦各有汛地之責者又可少懈乎中路嶺南濱海諸郡左為惠潮右為髙雷連亷而廣州中處故於此置省其責亦重矣環郡大洋風濤千里皆盗賊淵薮㠶檣上下烏合突來樓船屯哨可容緩乎常考之三四月東南風汛日本諸島入寇多自閩趨廣柘林為東路第一関鎻使先會兵守此則可以遏其衝而不得泊矣其勢必越中路之屯門雞棲佛堂門冷水角老萬山虎頭門等澳而南頭為尤甚或泊以寄潮或據為巢穴乃其所必由者附海有東莞大鵬戍守之兵使添置徃來預為廵哨遇警輒敵則必不敢泊此矣其勢必歴峡門望門大小横瑟山零丁洋仙女澳九竈山九星洋等處而西而浪白澳為尤甚乃畨舶等候接濟之所也附海有香山所戍守之兵使添置徃來預為廵哨遇警輙敵亦不敢泊此矣其勢必厯厓門塞門海萬户山綱州等處而西而望峒澳為尤甚乃畨舶停留避風之門户也附海有廣海衛新寕海朗所戍守之兵使添置徃來預為廵哨遇警輙敵則又不敢泊此矣夫其來不得停泊去不得接濟則濵海居民且安枕而卧况會城乎按今設禦之法浪白望峒二所各置戰艦慎固封守而南頭宜特設海道駐劄居中調度似有以扼嶺南之咽喉矣應援連哨其中路今日之急務乎西路議者曰廣東三路雖並稱險阨今日倭奴衝突莫甚於東路亦莫便於東路而中路次之西路髙雷亷又次之西路防守之責可緩也是對日本倭島則然耳三郡逼近占城暹羅刺諸畨島嶼森列㳺心注盻防守少懈則變生肘腋滋蔓難圖矣故高州東連肇東南慿溟渤神電所轄一𢃄海澳若連頭港汾州山兩家灘廣州灣為本府之南翰兵符重寄不當託之匪人以貽保障之羞也雷州突出海中三面受敵其遂溪湛州潿州樂民等四十餘隘固為合衞三道門户而海安康黒石清道并徐聞錦嚢諸隘所以合防海澳操縱反側俾不敢梗化焉者猶可齷齪玩愒已哉若亷州則尤為全廣重輕海北扼塞兩有攸寄故兵符特劄於靈山逹堡増屯於衞北海寇峒獠外顧之憂視三嶺獨勞焉西南雄郡如瓊為亷之外户五指腹心盡為黎據郡邑封彊無不凛冽備倭之制若白沙石瓊舘頭文昌海安海康對峙畨島飄風突來防禦甚艱近雖駐叅將於厓州責有攸寄而守禦營戍舊額嵗久寖弛凢此皆西路今日所當汲汲經畫焉者深念預防俾幕南稽顙重譯來庭非長民若兵者之責乎一南越當閩廣交界之處周圍皆山中有田百頃乃國初起發居民遺業之地也四面蔽風大潭居中可以聚舟其大視金堂二倍五六年來因浙直攻捕之嚴倭舶無所容俱于此互市福建捕急則奔廣東廣東捕急則奔福建定期於四月終至五月終去不論貨之盡與不盡也其交易乃撘掤於地舖板而陳所置甚為清雅刀鎗之類悉在舟中若能密令人於海濵沉㓕其舟則岸上之倭生擒也何有海防福建事宜三四月東南風汛畨船多自粤趨閩而入於海南澳云蓋恃走馬溪乃畨船始發之處慣徒交接之所也附海有銅山𤣥鍾等哨守之兵若先分兵守此則有以遏其衝而不得泊矣其勢必趨於外峿嶼乃五澳地方畨人之巢窟也附海有峿嶼安邉等哨守之兵若先會兵守此使小哨守把𦂳要港門則必不敢泊此矣其勢必趨於料羅烏紗乃畨船等候接濟之所也附近有官澳金門等哨守之兵若先會兵守此則又不敢泊此矣其勢必趨於圍頭峻上乃畨船停留避風之門户也附海有深扈福金哨守之兵若先會守此則又不敢泊此矣其勢必趨於福興若越於福興計其所經之地在南日則有岱墜湄州等處在小埕則有海澶連盤等處在風火門則有官井流江九澳等處此賊船之所必泊者也若先會兵守此則又不敢泊矣來不得停泊去不得接濟船中水米有限人力易疲將有不攻而自遁者况乗其疲而夾力攻之豈有不勝者哉倭宼擁衆而來動以萬千計非能自至也由福建内地奸人接濟之也濟以米水然後能久延濟以物貨然後敢貿易濟以嚮𨗳然後敢深入海洋之治接濟嚴而後倭夷可靖所以稽察之者其沿海寨司之官乎都御史唐順之云賊之根本實在閩中海上經畧此為第一義况一海喘息相連閩賊亦浙直賊也都司戴沖霄云福建五澳水寨乃江夏侯所設俱在海外今遷三寨于海邉曰峿嶼烽火門南日是已其舊寨一一可考孤懸海中既鮮村落又無生理一時倭㓂攻刦内地不知哨援不及兵船之設無益也故後人建議移入内地移之誠是也信國公不設險于下八山等處而設于舟山之沈家門可見江夏侯之所見不迨信國逺矣欲復祖宗之訓須知斟酌乃善又云閩中事體與浙直不同惟在撫之得宜而已盖米艘不許下海之禁若行于浙直則海濵之民有魚鹽之利可以聊生而海洋即為肅清若福建漳泉等處多山少田平日仰給全賴廣東惠潮之米海禁嚴急惠潮商舶不通米價即貴民何以存活乎愚聞漳泉人運貨至省城海行者每百斤脚價銀不過三分陸行者價増二十倍覔利甚難其地所産魚鹽比浙又賤盖肩挑度嶺無從發賣故也故漳泉强梁狡猾之徒貸資通畨愈遏愈熾不可勝防不可勝殺為倭嚮導者官府繫其家屬不敢生還嵗嵗入㓂是外㓂之来皆由内㓂糾引之也福建之亂何時已乎福亂不已浙直之患何時靖乎唐荆川云倭患始于福建福建者亂之根也諒哉言乎如愚見莫若因其勢而利導之督撫海道衙門令漳泉巨室有船隻者官為編號富者與之保結許其出洋南則哨至廣東北則哨至浙江装載貨物納税自賣督之以將官限之以信地交相報驗其回也南則許販惠潮之米北則許販福寧温台之米但不許至外國及載畨貨今也海禁太嚴見船在海有兵器火器者不問是否畨貨即捕治之米穀魚鹽之類一切厲禁據其迹雖似犯法論其情實有可原盖海船往来非𢃄兵器火器無以防海㓂之刦奪明乎此則民情得伸而亂原可塞矣雖然亦末矣將欲撫之必先威之練兵足食使在我之威足以制賊則民有所憚而聴吾撫治撫治而不從者然後兵以𠞰之是故能攻而後能撫知撫而不知攻者吾未見其能撫也福寧在福建之東南突出海中左為歐括海居東面右為福建居南面福寜尤當東南北三面之衝倭船入㓂必先犯此水寨之設職是故也舊寨在州東北五六十里三沙海面永樂初所置抽用福州左中二衛福寜衛大金千戶所守之秦嶼羅浮官井洋胥屬焉正統間焦𢎞倡議風濤難泊徙今松山之下必復舊而後可福洋五寨㑹哨由南而哨北則銅山㑹之浯嶼浯嶼㑹之南日南日㑹之小埕小埕㑹之烽火而北来者無不備矣由北而哨南則烽火㑹之小埕小埕㑹之南日南日㑹之浯嶼浯嶼㑹之銅山而南来者無不備矣哨道聨絡勢如常山㑹捕合併陣如魚麗防禦之法無踰于此海上有三山彭湖其一也山界海洋之外突兀迂迴居然天險實與南澳海壇並峙為三島夷所必窺也往林鳯何遷輝跳梁海上潛伏于此比倭夷入㓂亦往往藉為水國焉險要可知矣今南海有重帥海壇有遊兵獨委此海賊豈計之得乎愚謂不必更為益兵以滋紛擾惟就浯銅兩部各量損其艦十之三調其兵十之四慎簡材官部署其衆往守之又就漁人中擇其黠而力者署數人為長以助我兵聲援遇有俘獲賞倍内地其遇㓂而不援助者及觀望助㓂者罰亦倍之則有所覬而其氣激有所畏而其志堅漁人皆兵矣三山之犄角既成五寨之門户不益固哉福建海防今之談海防者輒曰兵食夫兵食非二䇿也不可一日缺兵則亦不可一日缺食故今之最急者不在于策食而在于策兵愚不知其他而覩於閩以為客兵之為利者一而其為害者二閩兵之為利者三而其為害者一何以言之方島㓂猝至勢至急也當事者無以應急則不得不徴之客兵及其披甲獵纓持戈吹角揚揚而来也使賊至而能馳之而有所俘獲亦足以薄收咫尺之功而暫紓斯須之憤所謂利之一者此也然而客兵悍而貪不可法馭者也賊之至也則必先倍其餉呼其酋長而勞之未及即戎已靡千金矣既偪賊壘可攻也顧解甲而坐以多索我金金至而分而賊已鼓噪去矣然後卷甲趨之即不獲一賊亦揚揚而回又責我勞也執事謂客兵豈誠勁可恃哉幸不勁耳使果勁而殺賊即坐而索金何以繼之此其為害者一也執事又謂其往来數千里侵掠殘害數千里外逺矣吾不能知即近而省中繩之以法猶獷而難制則其持戈野畧又何問哉無論有司者懼不敢問即其酋長亦多尅其餉金一任之矣甚者又從而令之此其為害者二也夫客兵之為害至著也然而重視客兵輕視閩兵者何哉誠懼閩兵之不足恃也而事有大不然者且今嵗賊至而長樂鎮東興泉同惠之間危矣乃卒無事者則咸其鄉之人共持之賊之逼長樂也其人伐木為挺伏于莽中賊至輒大呼而逐之無不披靡切齒相誡勿犯長樂也長樂人非閩人哉鎮東之圍盖一月矣乃城中人日日絙引數十人於城外禦賊賊近則握亂石撃之無不捫首去者雖肆掠山中固未有一人持戈逼城也當事慮其急則檄兵數千往援而城中人謝不納曰無論我弱而不能抗敵恐食盡不能空腹立耳即鎮東人者非閩人哉是民兵近而能守其利一也往嵗越警亦嘗徴兵於閩而閩兵之入越也輒能先驅走敵以故吳越之人輒稱閩兵閩兵云即今之賊既去而要擊之海中至沉其數十大䑼無一生還者固閩兵非客兵也無論兵即諸生中亦有張空拳缚之而獻者是閩兵逺而可戰其利二也夫客兵者即使勁而可恃而又畏不為害亦安能使之常操戈數千里之外以障我哉乃閩民者使之守即所以守其父母妻子也而使之戰則又朝令朝行夕令夕行固不敢坐而挾我金也而其食之也十人之直且不足以當客兵五人之直是閩兵可以常恃而且不費者其利三也然而有一害焉夫今之所謂機兵弓兵者即食我之食而我之所恃以守以戰者也今乃令其人世守其役而世食之且令役其十之二丞簿與尉役其一其執牒勾攝譁於道路者咸是人也而當事者輒曰此何足恃而當别募之夫既不足恃則當奪之食既不奪之食又别募之兵而重食之宜百姓之大困也是其一害也然其害也非係之兵而係之練兵者也愚之所謂練兵者非今之所謂練兵也則欲以八府之兵而分責之當事者即身至各縣而月練焉其兵之役於官者既精矣懼其少也則又於二十五家而擇其一人以為之兵以言乎練之之具也則無踰弓者弩者礟者三者固中國之長技賊之所至畏者也以言乎練之之法也則以此三者而五日一試也又五日再試焉其有十發而五獲以上者是上兵也宜賞者也其有十發而五獲者是中兵也不賞不罰者也其有十發而僅二獲者一獲不獲者是下兵也宜罰者也宜賞者不必别予之則予以五日之食宜罰者不必鞭之則奪之五日之食其所予者即其所奪者也夫食者人之養其父母妻子而不令餒焉者也日日而倍其所入固欣然喜矣日日而奪其所有以與人固拂然怒矣無論其人即其父母妻子亦不肯一日而使其人怠於其事也如是而兵未有不精者也既月練矣去則付諸其縣之令已有間詣而試焉其兵之精倍之是令之勤也再倍之是令尤勤也則狀其勤於上而請賞焉如其精或不及其初是令之惰也國之大亊在戎此而惰咸惰矣則狀其惰於上而請罰焉令盖無甘於惰者兵亦精矣一縣而以精兵稱者五百則一省而以精兵稱者二萬矣豈不赫然威盛哉此練縣兵之法也於是選其精者數千戌之各寨謂之寨兵寨兵者水兵也賊未有不制之水能制之陸者也故最精者戌之則付諸督水兵者如其法練焉選其精者數千戌之省中謂之省兵省兵者陸兵也賊之至也不水則陸故精者戍之則付之督陸兵者如其法練焉郡之在海上者春汛秋汛則調其縣及他郡之縣之兵數千戌之過汛則遣謂之郡兵郡兵者水陸之援兵也且以守其郡也則付諸督郡兵者如其法練焉此練水兵陸兵之法也夫兵之在官既有定食矣二十五家而一兵者則令二十五家共食之即多直十金耳又計貧富而盈縮焉則富不過一金貧不過十人一金也其費甚省故事軍餉納之官恒什一收之其散也恒什一除之是民常多出而兵常少獲也兹令自收而自給之猶之取之家而與諸其家之人也其法甚便此食縣兵之法也縣兵食於縣矣其調之寨則寨食之調之省則省食之調之郡則郡食之三食者安食哉屯田者正戌閩之兵而使之自食者也其餘餉併其所食之柤是可以請而留者也上杭河税者先南贑督臣留作兵餉者也當是時閩無督臣故歸之贛今設督臣矣則以軍之食食閩之兵理也且南贛者分也閩者守也無他餉也此則可以請而歸矣或分焉者若其他糧剰之餘也各郡練兵之需也咸可佐餉者也此其食水兵陸兵之法也閩故僻在海隅其人喜為儒不儒則農終年率其孥息而雜作田隴堇堇焉數其粟芋以編朝夕即是繇亦苦之又預収其直或倍其直而里胥又因之苛征固宜其憂嗟怨嘆仰天而呼也兵練則冗兵以裁兵精則冗食可省此急民之至計而萬世之長利也雖然愚又有説焉客有見其鄰荒其田而貸粟以充餒者則教之曰何不耕而田然非謂朝耕而夕獲之也既耕之矣且貸栗以需之及其獲也始可以無貸若恃耕可充餒而故不為貸是益之餒也今夫練兵節食是耕之説也百世之計也客兵而取諸民以養之是貸粟之説也一時之計也客兵可罷矣而兵固未練也賊而猝至孰執其咎乎食固可省矣而客兵固難遽罷也紛然而索我之食何以應之乎此所謂利之疑於害而害之疑於利者也夫人之保家未有不善者乃其謀國則不及其家者踈之也夫人之愛子未有不盡其心者乃其為民謀則不及其子者忽之也惟執事者之於閩也不閩視之而家視之其於閩之民也不民視之而子視之則其斟酌利害之原而委曲從違之機必有道矣浙江事宜一國初定海之外秀岱蘭劒金塘五山争利内相仇殺外連倭夷嵗連邉患信國公經畧海上始遣其民盡入内地不容得業乃清野之策也趙工侍近奏令民開種以給募租若興此利金塘一山即可墾田數萬畝嵗入米幾萬石玉環諸山計之每嵗可得米幾十萬石大為海防之助但其患二故當道屢議屢止其一是倭人藉以為糧結巢於此兵費反多其一是大家争佃秋糧難徵且無益於小民以愚計之須丈量為屯田召民耕種輸賦軍門耕者撘掤而居不挈妻拏不得賣買逐嵗更始如大家放租之法則官民兩利而爭奪之患免矣官差石工伐山造堡海堡有警小民避入賊之堡中無子女財帛自無結巢之念矣蠡測之見未知然乎否也一台州沿海近漲灘塗長數十里闊十里若放范蠡圍田之法令民耕種外設海塘一條以捍鹽潮俾不傷稻每嵗起科以給募租可得若千萬石主事唐樞云杭州居腹裏之地而以錢塘港海門為分戶南岸為寧紹北為松嘉極西盡底為杭末臨大海若戰艦嚴守聞警即出把截賊難直搗把總指揮蔡汝蘭云東南自倭變以來議者不少然於台州獨無説焉何也夫台州遼處海濵誠四塞之國南有桃嶴金竹北有桑洲桐巖西有闗山衛墅疊嶂層巒重闗鳥道真一可禦之險而且南去盤石楚門僅五十里東南去松門僅百里東去海門僅八十里設或倭奴棄舟登陸皆可卒至城下自海門而上者則隨湖直達實一時難禦之變也三靣阻山一面瀕海孤懸數十里之外救援接濟所難卒至者惟此耳曩者戚參將駐兵桃渚而倭奴屯聚桑洲遣輸糧銀經月不至孤危之勢誠可畏也今宜於台州專立督餉方靣積聚糧餉訓練兵士以重鎮而且西控温處金衢北衛寧紹權非遥制而威可近飭也如是則糧餉無臨時輸運之難而士卒有先時設備之佚以至出海兵船衛所官軍悉知警備而防禦益固矣夫督餉既立則糧餉聚糧餉聚則兵士充兵士充則訓練精如是則先聲足以破其膽而防禦足以杜其釁衝突足以挫其鋒行之三年而海不揚波矣此督餉所當議也近雖添設兵備參將然於糧餉無禆雖增兵何益哉都御史唐順之云江南控扼在崇明浙東控扼在舟山天生此兩塊土大海中以障蔽浙直門戶諸哨船皆自此分而南北總㑹於羊山若㑹哨嚴𦂳遇船即打賊何從入信國廢昌國故縣而内徙之恐是千慮之一失未可謂昔人盡是而今人非也浙海諸山其界有三黄牛山馬墓長塗册子金塘大樹蘭秀劒山雙嶼雙塘六横韭山檀頭等山界之上也灘山滸山羊山馬蹟兩頭洞魚山三姑霍山徐公黄澤大小衢大佛頭等山界之中也花腦求芝絡華彈丸東庫陳錢壁下等山界之下也此倭宼必由之道也海防莫急於舟師四參六總分哨守各洋港其南哨也至鎮下門南麂玉環烏沙門等山交於閩海而止其北哨也至羊山馬蹟灘許衢等山處交於直海而止陳錢為浙直分䑸之處交相㑹哨是故今日之設險自内達外有三重焉㑹哨於陳錢分哨於馬蹟羊山普陀大衢為第一重出沈家門馬墓之師為第二重總督兵發兵船為第三重備至密也直𨽻事宜巡撫都御史翁大立題云今日海防之要惟有三策出海㑹哨毋使入港者得上策循塘距守毋使登岸者得中策出外列陣毋使近城者得下策不得已而至守城則無策矣臣周行海壖分有信地視吳松所乃水陸之要衝蘇松之喉吭也提兵南向可以援金山之急揚帆北哨可以扼長江之險以副總兵統兵鎮之自吳淞而北為劉家河七了港港又東為崇明縣七了而西為白茒港為福山又折而西北為楊舍為江陰為靖江又西為孟河為圖山此砦舟師可居利於水戰臣皆設有兵船非統以把總即統以指揮而又以圖山逰兵把總駐劄營前㑹沙哨於江北吳淞逰兵把總駐劄竹箔沙㑹哨於羊山常鎮𠫭將統水陸兵據江海之交鎮守於楊舍所備水戰者亦既密矣但吳淞而南雖有港汉每多沙磧賊可登岸兵難泊舟非選練步兵循塘距守以出中策不可也今自吳淞所而南為川沙堡以把總練兵一枝守之川沙而南為南滙所以把總練兵一枝守之南滙而西為青村所以把總練兵一枝守之青村而西為柘林堡以都司練兵一枝守之此皆不逺六十里聲援易及首尾相應宛然常山蛇勢也柘林而西為金山衛西連柘浦東接柘林頻年皆賊所巢窟添設遊擊將軍一員統領馬歩遊兵往来遊徼則北可以䕶松江而西可以援乍浦江北都御史唐順之云廟灣𠞰賊之路原有兩條一條從寳應拖船過垻水路自清溝喻口進攻則兵勢既迅而饋餉亦易一路從淮安至馬邏陸路進攻此兵勢既迂而饋餉亦難又云江北局面與江南浙福不同靠不得水戰止靠陸戰也閩縣知縣仇俊卿云海㓂之来每自南而北度南麂山則自廣入閩矣過流江寨則出閩入浙東矣越海門則又浙之西矣踰寳山至吳淞沙上等處則又自浙入江南直𨽻矣沙上以南不暇泛及兹以海道之要害切於江北者言之狼山當江南之吭而廖角掘港皆揚之東南界也朐山據淮海之首鬱州嚶游山皆淮之東北境也中包泰興之周家橋鹽城之射陽湖山陽之雲梯關廟灣等處此皆沿海衝要之區㓂盗停舶出沒之處乃據守所當先者也淮陽二郡界於江淮之間東瀕大海賊舟出沒三面隄防為難國初備禦之制淮安設衛二内屬所五外屬所五揚州設衛三内屬所十四外屬所三復建兵府雖職司轉漕實示控扼之勢盖南北之咽喉非他郡比也愚考其地形𧺫自東南蓼角嘴以抵姚家蕩綿延三四百里除安豐等二十六塲俱在腹内不為要害要害之處乃通州也狼山也楊樹港裏河鎮也餘東餘西塲也蓼角嘴吕四塲也掘港新開港也廟灣劉庒金沙塲也其尤要者有三曰新塲出入至逼近揚州也曰北海所從以通新閘港且有鹽艘聚泊也曰廟灣其為巨鎮而通大海口也當事者須設把總三人一駐新港一駐北海一駐廟灣更有陸路遊擊一員駐劄海東則東可以控狼山通州海門之入而西可以捍衛揚州矣山東事宜登州營登莱二郡凸出於海如人吐舌東南北三面受敵故設三營聨絡每營當一面之寄登州營所以控北海之險也登莱二衛併青州左𨽻焉其䇿應地方語所則有竒山福山中前王徐前諸所語寨則有黄河口劉家汪解宋蘆徐焉停皂河馬埠諸寨語巡司則又有楊家店髙山孫家鎮馬停鎮東良海口柴胡海倉魚兒鋪髙家港諸司三營各立把總二員以總轄之其在海外則島嶼環抱自東北崆峒半洋西抵長山蓬莱田横沙門鼉磯三山芙蓉桑島錯落盤踞以為登州北門之䕶過此而北則遼陽矣此天造地設之險也然諸島雖近登州而居島以取魚鹽之利者乃遼陽之編伍非山東之戌卒也呌呶跳梁可畏而不可恃故北海之濱既有府治而設險者復建備倭城於新河海口以為屏翰且有本營之建焉沿海兵防特重其責非若他省但建水寨于島嶼良有以也夫島嶼既不設險則海口所係匪輕自營城以東若抹直石落灣子劉家汪平暢蘆洋諸處自營城以西若西王荘西山欒家孫家海洋山後八角城後芝芣莒島諸處皆可通畨舶登萊嚴外户以綏堂閫其平營典守之責乎一曽聞宋以前日本入貢自新邏以趨山東今若入㓂必由此路但登莱之海危礁暗沙不可勝測非諳練之至則舟且不保何以迎敵而追擊乎故安東以北若勞山赤山竹篙旱門劉公芝界八角沙門三山諸島乃賊之所必泊而我之所當俟焉者也若白蓬頭槐子石橋鷄鳴嶼金嘴石食廟淺灘亂磯乃賊之所必避而我之所當逺焉者也嚴出洋之令勒㑹哨之期交牌信驗習熟有素則他日廟堂或修海運亦大有賴焉獨禦倭云乎哉遼陽亊宜遼地負山阻海屹然為東北雄鎮北臨沙漠而遼海三萬瀋陽鐵嶺之統於開元者足遏其衝南枕滄溟而金復寜蓋旅順諸軍聨屬海濱足嚴守望京師翰屏可謂固矣然觀今日備邊之防頗為有賴而備倭之防視為虚文盖自劉江金線島之捷而海氛久熄自山東海運之廢而墩寨益廢於是旅順諸堡亦無復用識者謂遼東沿邊五路得分守應援之規沿海衛所亦當如其制如旅順而西以金州轄之三岔河而南以蓋州轄之三岔河而東以三屯轄之總兵撫按之統其責者秋汛以防邊為重防海為次春汛以防海為重防邊為次則雖島夷窺伺豈能遽犯哉海防總論總督尚書胡宗憲云海防之制謂之海防則必宜防之於海猶江防者必防之於江此定論也國初沿海每衛各造大青及風尖八槳等船一百餘隻出海指揮統率官軍更畨出洋哨守海上諸島皆有烽墩可為停泊其後弛出洋之令列船港自浙東定海浙西于乍浦蘇州于吳淞江口及劉家河夫乍浦之地海灘淺閣無山嶴避風之處前月把總周易等所領戰船被賊燒燬僅遺十餘隻近又報為颶風擊碎不若海中洋山殿前窩集反可泊船也吳淞江口及劉家河出海紆迴又非泊船處所議者欲分畨乍浦之船以守海上洋山蘇淞之船以守馬蹟定海之船以守大衢則三山品峙哨守相聨可扼来㓂而又其外陳錢諸島尤為賊衝三路之要兵部原題副總兵俞大猷統領戰船駐劄海上防賊截没則如陳錢乃其所當屯泊而提督軍門及海道等官每於風汛時月相參巡察有警則我大船火器衝截賊入使不得越各島則彼毒無所施釁孽不作而外地安堵矣通政唐順之云禦倭上策自来無人不言禦之於海而竟罕能禦之者何也文臣不下海者則將領畏避潮險不肯出洋將領不肯出洋而責之小校水卒則亦躱泊近港不肯逺哨是以賊惟不来来則登岸殘破地方則陸將重罪而水將旁覩矣竊觀崇明諸沙舟山諸山各相連絡是造物者特設此險以迂海賊入㓂之路以蔽吳淞江定海内地港口也國初設縣置衛最有深意而沈家門分哨之制至今可考合無春汛𦂳急時月蘇松兵備暫駐崇明寧紹兵備或海道擇推一人暫駐舟山而總兵副總兵常居海中嚴督各把總分定海面南北㑹哨晝夜揚帆環轉不絶其逺哨必是至洋山馬蹟又云國初防海規畫至為精密百年以来海烽久息人情怠弛因而隳廢國初海島便近去處皆設水寨以據險伺敵後来將士憚於巡海水寨之名雖在而皆是海島移至海岸聞老將言雙嶼列港峿嶼諸島近時海賊據以為巢者皆是國初水寨故處向使我常據之賊安得而巢之今宜查國初海防所在一一修復及查沿海衛所原設出哨海船額數係軍三民七成造者照數徴價貼助打造福船之用兵部尚書楊轉云平倭長䇿不欲鏖戰於海上直欲邀擊於海中比之制禦北方守大邊而不守次邊者事體相同誠得先發制人之意國初更畨出洋之制極為盡善至於列船港次猶之棄門戶而守堂室寖夫初意宜復祖宗出洋之制知府嚴中云海防不設險於海中山沙猶論北方邊務者不可但守近邊須逺守於邊墻之外其見同也昔者俞子俊嘗因修外邊費財甚多其後邊墻反易壊而難守何也離内地太逺照顧之力自有所不迨也且如北邊之制每城垜相去六尺一軍守之至於六百丈之逺不過守以千人而已倘来攻城動以數萬計六百丈之間只此千人何以相策應而禦乎此與水兵哨船出海太逺聲援不及備禦甚難同一義也國初信國公不肯設險於險之外豈其智不及此哉可以悟矣寧波生員陳可願云禦海洋之策有言其可行者有言其不可行者將以何為定乎嘗親至海上而知之向来定海奉象一𢃄平民以海為生盪小舟至陳錢下八山取穀肉柴菜者不啻萬計每嵗倭舶入㓂五島開洋東北風五六晝夜至陳錢下八分䑸以犯重浙直𨽻此輩恒先遇之有遇殺者有被擄為鄉導者因此諸山曠逺蕭條無居民守禦賊以深入總督胡公與趙工侍之議所由建也此國初以來從無人法此二公上疏之後罔不羡其精思卓識然事理雖長而未經試練茍無將官遵而行之始覺其間有便者何也離内地太逺聲援不及接濟不便風潮有順逆􅖼舶有便否蛟龍之驚觸礁之險設伏擊刺之難將官之命危於累卵無惑其爭執為難行也然自禦海洋之法立而倭至必預為之備亦甚易非若乙卯已舶岸人猶未覺其為㓂也茍因將官之不欲而遂已之是因咽而廢食也烏可哉如愚見哨賊於逺洋而不常厥居擊賊於近洋而勿使近岸是謂善體二公立法之意而悠久可行矣太常寺卿魏校云晉溪在三邊欲分軍守邊邃菴聞而訝之使人往問晉溪答曰三邊數千里欲一一守之雖盡天下之兵不能也只是擇要害處為倭人素所入㓂之路把接則可耳晉溪威令素行凡倭入㓂衆軍爭相救援無不擒獲邊境稍安廣福浙三省大海相連地畫有限若分界以守則孤圍受敵勢弱而危戢捕之謀能無賴於相須乎曽考入畨罪犯多係廣福浙三省之人通夥流刦南風汛則勾引夷船由廣東而上達於漳泉蔓延於興福北風汛則勾引夷船由浙江而下達於福寜蔓延於興泉四方無賴又從而接濟之嚮導之若欲調兵剿捕攻東則竄西攻南則遁北急則潛移外境不能以窮追緩則旋復合䑸有難於卒殄此夷船與草撇船之大勢也又有一種姦徒見本處禁嚴勾引外省在福建者則於廣東之髙潮等處造船浙江之寜紹等處置貨糾黨入番在浙江廣東者在於福建之漳泉等處造船置貨糾黨入番此三省之通弊也故福建捕之而廣浙不捕不可也廣浙捕之而福建不捕亦不可也必嚴令各官於連界處㑹哨如在福建者下則哨至大城千戶所與廣東之兵㑹哨至淞門千戶所與浙江之兵㑹在浙江者下則哨至流江等處與烽火之兵㑹在廣東者上則哨至南澳等處與銅山之兵㑹遇有倭患互為聲援協謀㑹捕賊勢有不孤窮而海患有不戢寜者哉海防要害章氏俊卿曰江淮手足也海口咽喉也京畿建康腹心也則防海之䇿海口為要害矣故在浙則金山海門明州定海秀州海鹽為要害在淮則通州料角泰州石港建康土山江乘為要害于此有備則賊不能衝突矣葉義問亦言今江淮既有師屯獨海道宜備臣謂土豪官軍不可雜處蓋土豪諳練海道之險易又能役使船户若雜以官軍彼此氣不相下難以協濟欲於沿海要處分寨以土豪為寨主令隨其便使土豪撓於舟楫之間官軍扼於塘岸之口䇿之上也此雖皆為宋都建康而設筴與今日事體不同然嘉靖以來海上桀黠之徒或射利以熾張或望風而嘯聚而島夷之為患者縱横刼掠于吳浙閩中嶺表之間且數嵗其始皆從海上來也使當時有建此䇿者撓之以土豪扼之以官軍而于所謂咽喉者吾據而遏之則彼豈能飛渡而登陸乎若熾張嘯聚之徒又不足言矣今幸海波不揚而桑土之徹不可無慮其間規畫之宜如簡沿海之軍復戰船之數固所當預者若宋人防海阨其要害與土豪分寨為主之説誠有可行視昔日縱使登陵而百萬禦之不得及召募烏合之衆以應接者功相萬也當事者圖之大廣船雖不如大福船之便而大福船則不如大廣船之堅然皆可施於開洋風濤之中而稍遇風小水淺又不如蒼山之便易故凡大如樓船艨艟小如舴艋海鰍以至草搬開浪艟橋八槳鷹船漁船沙船之類皆可備用但海寇所恃全在于銃吾亦當以銃中軍大船之前用次等船載佛郎機大銃數架以鎮之兩翼中船之前亦用再次船以載銅將軍大銃數十架以列之其小船亦各載鳥銃銅筒於以備于四面各船編定字號每數船列為一行每一陣列為數行晝則麾旗為號夜則振鼔為節此乃各船大利器也若夫蜈蚣船踏輪船亦皆防海所當講求者按兩頭船具于大學衍義盖因海運船巨遇風懼難旋轉故兩頭製舵東風則西馳南風則北走海道諸船無踰其利以此衝敵則賊舟雖整可亂也况用此捕盗江洋不尤便哉沿海界倭要害之地沿海自廣東樂會縣接南安界起厯海條澳為文昌界舖前港為會通界神應港豐盈浦為瓊州界麻頭浦吕灣浦為臨髙界田禾灣為儋州界峩詐山為昌化所界厯白沙營為感恩縣界大洞天小洞天為崖州界牙郎澳雙洲門為凌水縣界七十二徑牙山淡水灣為欽州界革水營烏雷山為靈山縣界青嬰池楊梅池平江池為亷州界郡州為永安所界􅍩洲為康海所界潿州為錦農所界詞洲獨猪山為石城千戶所界碙洲小黄程汾洲為寜川所界青聚山羅浮峯為神靈衞界海凌山為雙海所界小獲山為海朗所界中獲山為陽江所界大獲山為新寜縣界西雄山鶚洲山為新會縣界萬斛山上川山為順徳縣界石岐峯為香山縣界蛇西山大南常山為南海番禹界烏沙洋為白沙巡司界九星洋為福永巡司界珊瑚洲渡杯山為東莞縣界合蘭洲為大鵬所界馬鞍洲為鐡岡驛界寜洲山桔洲山為惠州界記心洋為平海所界徐娘山為海豐縣界大星尖山為㨗勝所界吉頭峯為碣石衞界前標峯為甲子門所界陶娘灣靖海嶴為靖海所界大浮山玉嶼山為潮陽縣海門所界小柑山為蓬州所界大柑山為大城所界大京山九猴山為饒平縣界計五千里抵福建南澳山為𤣥鍾界厯侍郎洲石城嶼為銅山所界厯鴻儒嶼沙􅜉嶴為陸鰲所界大潵嶼璧洲山為鎮海衞界小潵嶼為月港界舊浯嶼為髙浦所界嘉禾山大担山為中左所界小担虎頭山為金門所界大登山小登山為福全所界大捕山小捕山為永寜衞界埕埭峯獺窟峯為崇武所界沙塘灣為惠安縣界􅰔嶼白嶼為蜂尾巡司界湄洲山為南泉寨蒲禧所界石獅峯小澚峯為小海衞界埕中三江中為冲心巡司界綱山王家嶼為萬安所界六湖山碧水島為鎮東衞界踵門山為蕉山巡司界日嶼月嶼為梅花所界即會城三波礁五虎澳為連江界下千塘四嶼為定海所界花瓶為北茭巡司界飛鸞渡為寜徳縣界青山峯為大金所界天千山丁家程大俞山三星山流江為福寜州界計二千里抵淛江懸中峯為浦門壯士二所界厯長沙門大昆山為金鄉衞界鳳凰山為平陽所界銅盆山為沙園所界仙口峯飛雲渡為瑞安所界大衢山海安港為海安所界霓嶴披山為寜村所界黄華港為磐石衞界大巖頭為磐石後右界前山䨥斗門為蒲岐所界九眼塘斗門闗為三山巡司界丫髻峯為楚門所界臨門隘為隘頑所界省梅坑為沙角巡司界大陳山石塘港為松門衛界金清閘西嶼閘氷清閘皆朱文公所造為新河所界金沙灘鐺礁為海門衞界海門港為海門前所界五嶼為桃渚所界三門山為徤跳所界石浦港為前後二所界青苔灣為昌國衞界小目山為爵谿所界西厨山為前倉所界孝順洋白塗為大嵩所界大射山為穿山後所界洛茄山長白山為中左所界大魚灣為長山巡司界招寳山巾子山為定海衞界金家嶴為寜波界丘家洋為慈溪界金塾浦為龍山所界松浦港為松浦巡司界黄山為觀海衞界破山浦為三山所界化龍浦為餘姚界臨山港為臨山衞界西海塘為上虞界漁山蒙池臺為紹興三江所界鱉子山為蕭山界和尚山栲門為㑹城界茶浦門為海寜所界大衢山小衢山為澉浦所界扶桑山為海寜衞界西海口馬蹟山北丁興殿前山淡水門為乍浦所界計二千七百里抵南直𨽻三姑山為金山衛胡家港金山巡司界上釣山中釣山下釣山大盤山為青村所界蒲嶴為南滙所界陳錢山茶山為南蹌巡司界寳山為上海界永字山分水礁海礁山綵淘港為吳淞所界浪岡山顧涇港為嘉定界竺箔沙送信嘴小團沙新安沙為太倉界大隂沙管家沙為崇明界福山狼山三槿口為通州千户所界唐家港海門島為泰州界亂沙新洋港為鹽城界開山淮河口鶯山為安東界蚄山髙公島為海州所界清河口已頭河為贑榆界旬島勞山島為安東界孤耆山為石臼所界計一千八百里抵山東青沉峯厯胡家峯為髙港巡司界沙嘴峯為靈山衞界黄埠峯為夏河寨界洋河為膠州界大勞山田横島為鱉山衞界走馬峯為即墨界馬山為浮山所界旬島赤島為雄崖所界浯嶼徐福山為大山所界巨髙島為大嵩衞界竹島為海隅所界松島莫邪島漫鷄島為靖海衞界佛島為津寜所界五疊島下勞山為尋山所界歇馬墩洛口堡為成山衞界海牛島為不夜城界竇家峯為百尺巖所界古陌頂為威海衞界父島為金山所界新安堡戱山峯為寜海衛界海鷄山為竈河寨界武家庄為馬埠寨界洋山為萊州界八角島蜿蟻島為登州界劉馬窪為盧洋寨界沙門島為解宋寨界單山為黄縣界桑島為馬停寨界龜島為昌邑縣界歆未島為夀光界都里鎮為蒲臺界青島為利津界黄島為賔州界直沽口為寳坻縣界㙮山為盧龍衞界蔬萊島為中前所界牛車島為中後所界孤山為中右所界向陽島羅兒島為金州衛界石灘島為左所界東雲島黄駝島為蓋州衞界屏風山為復州衞界鳳凰山為中左所界女兒河為中屯衞右屯衞界遼河渡古寺島為廣寜衞界麻田島平島為海州衞界湯站堡為鎮遼所界臨江為義州界計一千三百餘里為鴨綠朝鮮界總其入寇則隨風所之東北風猛則由薩摩或由五島至大小琉球而視風之變北多則犯廣東東多則犯福建正東風猛則由五島厯天堂官渡而視風之變東北多則至烏沙門分䑸或過非山海閘門而犯温州或由舟山之南而犯定海犯象山奉化犯昌國犯台州正東風多則至李西嶴壁下陳錢分䑸或由洋山之南而犯臨觀犯錢塘或由洋山之北而犯青南犯太倉或由南沙而入大江犯𤓰儀常鎮或由大洋而風歘東南也則犯淮揚登萊若在五島開洋而南風方猛則趨遼陽天津防倭者以三四五月為大汎九十月為小汎向之入寇者薩摩肥後長門三州之賊居多其次則大隅筑前筑後博多博人善造舟而豐前豐後和泉之人間亦有之乃因商于薩摩而附行者也廣東列郡十分為三路髙雷亷近占城滿刺諸畨烟烽稀曠東路東莞惠潮皆倭寇不時出入之地而東路為尤要衝若柘林者則又東路控賊之咽喉門户也無柘林是無水寨矣無水寨是無東路矣瓊州四面環海東西九百里南北一千一百四十里長山峻嶺三黎錯居其間而五指腹心盡為黎㨿羣岡之中定安尤險稍或撤備門庭皆勍敵矣頃因辛丑之亂舉兵討平事雖大定險終在夷議者欲於羅活岡㨿以重兵斷其徃來戎伏噫必如是而後為久安之計乎福洋烽火門寨設于福寜州所轄官井埕羅浮為南北中三哨後官井添水寨則又以羅江古鎮分為二哨是在烽火官井當會哨者五小埕水寨設于連江所轄安鎮北茭焦山等七巡司為南北中三哨是在小埕當㑹哨者三日南水寨設於莆田所轄冲心蒲禧崇武等所司為三哨而文澳港則近添設於平海之後是在日南當會哨者四浯嶼水寨設于同安上自圍頭以抵日南下自井尾以抵銅山大約當㑹哨者二銅山水寨設於漳浦北自金山以接浯嶼南自梅嶺以接廣東大約當會哨者二由南而哨北則銅山㑹之浯嶼浯嶼㑹之日南日南㑹之小埕小埕會之烽火而北來者無不備矣由北而哨南則烽火㑹之小埕小埕會之日南日南㑹之浯嶼浯嶼㑹之銅山而南來者無不備矣哨道聨絡勢如長蛇防禦之法其能踰此耶總計八閩之地三面當海者二興泉是也一面當海者二福漳是也其要害地如晉江深扈獺窟興化冲心平海龍溪海門漳浦島尾南靖九龍寨溪是也然莫有如福寜之尤險者三面孤懸海中如人吐舌賊入必首犯之舊寨設於州東北六十里三沙海面後焦竑倡議棄徙松山今必復舊而後可乎浙洋沿海舊設四總今増為四參六總矣四參者杭嘉湖一寜紹一台一温一也六總者定海昌國臨觀松海金盤海寜也悉其防禦之制自内達外有三重焉㑹哨于陳錢分哨于馬蹟羊山普陀為第一重沈家門馬墓之師為第二重總兵督發兵船為第三重備至密也乃若定海者是寜紹之門户舟山者又定海之外藩其地則故縣治也為里者四為嶴者八十有三五榖之饒魚鹽之利可供數萬人不待取給于外非若普陀諸山比也國初置昌國衞於其上屯兵戍守誠至計也信國經畧海上以其民孤懸徙之内地改𨽻象山識其小而未見其大也蘇松為畿輔望郡濵于大海自吳淞江口以南黄浦以東海壖數百里一望平坦皆賊徑道因不能禦之于海致賊深入其禍慘矣今建議者曰松江之有海塘而無港口者則自上海之川沙南涯華亭之青村柘林凡賊所㨿以為巢穴者各設陸路把總以屯守之而金山界于柘林乍浦之間尤為直浙要衝特設總兵以為陸路各將之領䄂又于其中添設遊兵把總一員專駐金山徃來巡哨所以北衛松江而西援乍浦也至于蘇之沿海而多港口者如嘉定之呉淞太倉之劉家河常熟之福山港凡賊可入者各設水兵把總以堵截之至于崇明孤懸海中尤為賊所必經之處特設參將以為水兵各將之領䄂而又于中添設遊兵把總二員分駐行治營前二沙徃來巡哨所以逺哨海洋而遮蔽港口也外内夾持水陸兼備上之可以禦賊于外洋下之可以循塘而拒守亦既精且宻矣乃若淮陽二郡介於江淮之間東瀕大海三面隄防考其形勢起自東南蓼角嘴姚家蕩綿延四百里除安豐等三十六塲俱在腹裏其為要害之處乃通州也狼山也楊樹港裏河鎮也餘東餘西等塲也蓼角嘴吕四場也掘港新閘港也廟灣劉家庄金沙塲也其尤要者有三曰新塲為其出入至近逼揚州也曰北海所為其通新閘港且有鹽艘聚泊也曰廟灣為其巨鎮而通大海口也須設三把總以駐之仍用陸路遊擊一員駐劄海安則東可以控狼山通州海門之入而西可以捍禦揚州矣倭患之作嶺嶠以北達于淮揚靡不受害而山東獨不之及者豈其無意于此哉良以山東之民便鞍馬不便舟楫無過海通畨之人為之嚮導接濟耳所虞者登萊突出海中三面受敵且危礁暗沙不可勝數非諳練之至則舟且不保何以迎敵而追擊乎故安東以北若勞山赤山竹篙旱門劉公芝界八角三門沙山諸島乃賊之所必泊而我之當伺者若白蓬頭槐子口橋鷄鳴嶼夫人嶼金勞石倉廟淺灘亂磯乃賊之所必避而我之所當逺者當事諸臣無恃其不來恃吾有以備之造舟選卒練習故事將來在廟堂或修海運以備不虞亦大有頼焉獨禦寇云乎哉遼東古營并地也皆為沙漠花常告列迷諸部落在焉其面為滄溟其餘氣為朝鮮國初設瀋陽遼陽三萬鐡嶺四衛統于開元以遏北來之衝金復海蓋旅順諸軍聫屬海濵以防島夷之入東北藩籬可謂固矣洪武初倭奴以玩南方之心而玩遼東遼人以禦北方之法而禦倭冦斬㓕無遺海氛蕩熄劉江金線島之㨗是已二百年來邊備如故倭敢遽犯哉但地方千有餘里馬步九萬員名止藉山海闗一路饋餉我朝北都燕而逺漕江南粟又自京師達于遼陽飛輓不繼何以食之此其患非渺小矣邇者登萊運米達遼甚便惜未多耳愚謂國初軍屯商中之制至為精當而大壊極敝司國計者當深念而亟圖之不當專責幕帥而已也沿海禦寇要地倭之來在海或仗我中國人為舶主比登陸又仗我中國人為地主蓋倭以剽刼我中國人為利而我中國奸人則徃徃以得主倭為利浙直皆然閩為甚閩之泉漳尤甚禦之之法莫善於洪武初湯信國海上之經畧其法自遼東山東浙直閩廣凡沿海要害處咸置行都司以備倭為名而閩之五水門寨尤碩畫也廢之不講久矣嘉靖癸亥甲子間二華譚公來開府提督軍務與總兵戚南塘共訪求信國遺迹修復之西為烽火門寨在福寜州寜徳縣地方與浙之温台接壤次西為小埕在羅源連江長樂三縣地方又次在南日山福清縣鎮東衛興化府地方次東為浯嶼在泉州府永寜衞同安縣地方最東南為銅出寨在漳州府漳浦縣鎮海衞及𤣥鍾所地方彼此接界而接哨又防于海之外是最為䇿之善者漳之月港向為倭之窟穴今改設海澄縣於防禦亦為得䇿矣第從此更東南則廣東界而閩廣交界之所為南澳澳中有柘林有金嶼臘嶼有虎嶼有獅頭嶼有鷄母澳有宰猪澳有龍眼沙澳有雲蓋寺澳有清澳有深澳又有許朝光新舊城山嶼在大海洋少人屯聚地甚遼濶又有險可㨿近年海賊呉平曽據以叛造居室起敵樓于娘娘宫澳口之前後泊艨艟巨艦于澳前深處我師攻之不克頼戚將軍竭謀悉力僅能驅之于廣海而其地未聞有所以經畧他時倭復來與我内地賊互相結而盤㨿為閩廣間腹心肘腋患此不可不逆慮謂當于五水寨之外更設一鎮即其所謂新舊城所為宫室敵樓僧置而修葺分兵命將戍守之地可以耕海可以漁即可省兵餉之四五或即召募土著統之以能將為防海永逺計亦一䇿也又若防海者以三四五月為大汎九十月為小汛而防之以其時防當如五寨於海之外不當於陸於陸斯無䇿矣禦倭之船當髙大髙大則我能衝壓彼彼舟小不能當我也我之長技在火器在長兵在筅筅居前而夾用長兵火器斯為善用長技者矣譚戚二公敗之于仙遊驅出其巢穴盡殱之于廣東之界上用此法也濟倭之人在士夫家之門幹在我學校中一二無耻生亦或利倭之來相與將迎而羽翼之如所謂程新所謂朱熙載者則軍門既嘗正法而予嘗黜革其一二示警戒矣是在後來者加之意時倣循故事振飭焉海氛庻可息矣禦倭夷總論禦倭之䇿謹條其事之大者蓋有七焉一曰議將二曰議守令三曰議兵四曰議財五曰議援六曰議守七曰議防海此七議者固游談之常言而當事者所易厭者也然而不可易也愚聞古之遣將者或誓于軍中或誓于軍門之外或將交刃而誓所以一定其制也故將者君授之制而無所制于人者也昔孫武為吳將兵未試而斬隊長穰苴為齊將始出而斬監軍此二子者非好殺以明威也子公伐郅支延夀欲請之而不從條侯禦七國梁王數趣之而不動此二子者又非執已以忤物也然且行之則以肅人心而制重也故古者將之于軍如心使臂如臂使指赴湯火投溝壑而無不從者誠足以制其命也而今也如漬土如潰癰則敗不可收拾將與俱靡而已此最今之大患也愚以為將必先有天下之識具命世之才自知其足以任矣然後不辭而受之因察彼而審虚實慮時當否具列其狀請少寛日月一切得以自由如有不効願伏斧躓既得請矣然後卧薪席藁誓不與此賊並立入忘其家出忘其身淬礪奮發天地可感而金石可破也蓋三軍之志竦矣然後左援鼓右援旗申衆而誓之取其不率者罪之于庭以令三軍又取其甚者懸頭于門以令衆其令一新矣然後陳金于廡縣格于外有士從中吐奇撫劒躍而出焉則賞不踰時士皆超距作矣有將如此則其氣足以横海上而目無倭夷矣軍安得不壯功安得不成故有將則其他便宜皆末計也故一曰議將然將者折衝于上者也而守令者保障於下者也將之所轄者廣而守令之所守者專如使守令能用其民則諸郡邑皆兵也否則將以賊所至而用兵兵不得不寡如使守令能率其民以禦賊賊所至皆敵也否則將禦其東而賊轉而西將禦其南而賊轉而北賊無端而將所嚮之力有限將不得不勞兵寡而將勞立敝之道也故李廣守北平而匈奴避邊魏尚為雲中守而敵不敢犯龔遂為渤海而盗賊散魯恭至樂安而渠帥降此其已然之效也其法莫如使部使者察東南諸郡守令之宜而易置之又使天下部使者皆察其可為東南者上之銓司又使諸臺諌徧察中外以請又使銓司按諸察舉擇其宜而授之如賊小至則各以其兵戰大至則固守其地以待能固守者與戰勝者同賞賞必速玩寇者與將同罰罰必重如此則守令與將同心而諸郡邑與募府同體合而為一以禦賊尚何賊之不滅哉故二曰議守令愚聞之將不知兵以其地與敵也兵不知教以其將與敵也今議者不謂兵之不練而數欲調兵昔山東兵常調矣而無捄于敗狼廣兵再調矣而無捄于敗畨土兵又調矣無捄于敗而害益滋其所至如乳虎而其臨陣而鳥散居則為民蠧出則長賊威故民苦調兵與被賊等以其遣之不精而馭之無統也夫兵法平原曠野此用衆之地也如羣鹿抗獐以多者勝道狹險要如兩鼠鬭穴以勇者勝雖衆無所用也故我軍千人並進而賊以數人舞刀横行稍勁其前則後皆反走千人皆廢矣故兵而有制則淮隂驅市人而勝泜上兵而無制苻堅以四十萬而敗于淝兵多則難制難制則易敗此其明騐也故莫若練土著之兵然始練不可以應卒而調兵不可以持久莫若稍减其調而徐俟其練調簡則易精練久則愈習精則土著之兵益奮習則調兵可以益减此始相輔而終相省也其法則分責守令而總責之將非愚所能悉數也故三曰議兵愚嘗思今坐困之術莫有過於兵多者方其兵之初調縣縣傳送其道里之費不可勝言也所過虜掠其騷動之費不可勝言也至則家給而户養之供餉益繁而虜掠不息其費又不可勝言也此自竭其源者也今議者不惟兵多之費而憂財之乏此所謂舛也因其乏而議加賦益財此又舛之舛也昔先零之役當其兵集耿中丞糴四十萬榖而不足及充國罷騎兵般師不費斗榖而羗平人皆知充國屯兵之興利而不知般師之省費也故調兵一而當練兵之費百養調兵一而當土著之兵其費十調益减則費益省以其所費者而練士何弗强也以其所省者而充費何弗贍也此不加益而足財之道也故四曰議財夫列地定制犬牙相入所以相衛也封疆相錯所以相保也緩則相安急則相救非茍自全而已也故春秋鄰國不能救則譏之桓公不能恤小則譏之此天下之大誼也漢右渠之伐兩將軍異同而朝鮮幾危唐禄山之變而賀蘭擁兵睢陽遂䧟此天下之大機也今地壤相接而坐視勝敗令賊長驅深入而無顧忌之心此甚不可長也愚以為宜特嚴其法約曰賊攻西則東出鋭師擊其左賊東則亦如之賊攻南則北出銳師繞其後賊北則亦如之賊攻中則左右前後各出鋭師四面而起非其守地而兵先至者有異賞坐視其隣之敗者與同罰則是賊腹背受敵而我多樹兵也賊亦安能肆而不顧哉此是多方弭賊之道而今日之要務也故五曰議援夫是援莫先于守未有榦弱而枝扶者也然守必以戰而守城必以野自法有陷城之誅而未嚴殘野之罰賊至則茍賦孤城而棄其四禁烟焰相望號聲相聞所至蕭條郭為丘墟誠有所不忍言者又安問其援乎故李牧備邊先在收保而不失不能收保是資賊也後將軍燉煌先在乘隧列障相聨不絶賊不敢犯使踈而可犯是自敝也愚以為宜畧倣墩堡之制使民各聚為市市列為堡約其道里之中使勢可相及每賊至則墩堡固守而郡縣急趨而助之而又特嚴其法使四境殘甚者與失城同罪則人各為戰地各為守賊入而無所得其勢自困矣故六曰議守雖然此皆賊已入則守之于内而其未入則禦之于海然諸將海戰而勝者常十七其内地戰者敗常十八非將勇於海而怯於内也其故有四士卒入海人無還心皆殊死戰無所逃難一也洪艟巨艦易以凌䇿勢便二也毒藥火器且戰且焚三也賊載水而飲開口待鹵勢不能持四也其後不能禦賊者亦有四犯不測之險以命搏賊而賞常不讐生其怠心一也海中無人易以為解二也既不能賞易於姑息將不能驅三也海波不常或利或否四也議者皆言益修戰具反其四失守馬蹟諸山以控吳守大衢諸山以衛越守陳錢諸島以制賊徃來之衝夾擊互救三道鼎峙賊不足防矣故七曰議防海然愚又聞善計者當反其始詳慮者當慮其終自明興以來防倭之法備矣當是時信國江夏築城起自登萊至浙沿海凡五十九城費非不甚大也籍民丁四之一以戍人非不甚勞也設置衞所間以烽墩其故基纍然猶有存者役非不甚廣也然且為之亦見倭之不可不防而制之不可不備也圖書編卷五十七
