body:
  text: 圖書編卷十九明章潢撰五星總敘洪範一曰五行挈其綱也是五行也凡天之五星地之五方人之五德五事五倫物之五色五味五香孰有能離此五行者乎故五星即五行也木曰歲星火曰熒惑土曰鎮星金曰太白水曰辰星而木春火夏金秋水冬土分旺四季各十八日有竒此以四時言也木東火南金西水北土中央此以五方言也木仁火禮土信金義水智此以五德言也木青火赤土黃金白水黑此以五色言也歲星主東嶽徐青兖三州熒惑主南嶽荆揚二州鎮星主中嶽豫州太白主西嶽雍州梁州辰星主北嶽冀州此以主言也金水一年行一周天火二年木十二年土二十八年一周天此以其行之遲疾言也歲星之精變為攙搶熒惑變為蚩尤旗鎮星變為天賊太白變為天狗辰星變為枉矢此各以其變異言也其行或入黃道之裏從月行有隂陽也其東行曰順西行曰逆順則進而疾逆則退而遲不東不西與日相近而不見曰伏與日同度曰合五星相陵曰鬬行各宿次舍其理域曰入留其左右曰守其留行順逆掩合凌犯變色芒角越次搖動俱以時政之得失占焉順則雖災亦輕逆則災必甚也且其所經宿度各有垣廟而皆以得位為吉然其行度在古厯惟主順行秦厯始有金火之逆漢初測候乃知五星皆有逆行至後魏張子信避亂居海島中専以渾儀測候天象始悟日月交道有表裏遲速五星伏見有感召向背故厯家因之而加密焉是昏旦者隂陽之大分也南方者太陽之位天地之經也七曜行至陽位當天之經則虧昃留逆而不居焉得非天地之常道哉木土火三星經天金水二星不經天雖行有遲速亦三天兩地之道也但天垂象見吉凶聖人象之豈徒司國柄者謹候之以順五行而時其調燮勤其修省已哉觀洪範一曰五行由次二敬用以至次九威用皆所以用此五行也况貌言視聽思五事非即人身之五行乎果能則天象而敬用之則天人合一之學其庶幾矣漢天文志曰木仁也火禮也土信也金義也水智也金星與日同南北之行為贏與日分南北之次為縮出早為月食出晚為天妖主兵象也木星所在國不可伐而可以伐人超舍為盈退舍為縮出入不當其次必有天妖水星出早為日食出晚為彗四時不出則天下大飢出於房間主地動也火行一舍二舍為不祥東行疾則兵聚於東方西行疾則兵聚於西方鎮星失次而上一舍三舍則為大水失次而下二舍有后戚之變其詳見於漢晉志木為歲星其德配仁其方配東其時配春超舍為盈退舍為縮出入當其軌則國有慶不當其次必有天妖木者東方之正氣秉天三之陽得地八之隂卦為震巽時為甲乙其性曲直其味作酸質陽而氣隂也其行天所以導和生氣十二年一周天木星所在國不可伐而可以伐人超舍為盈退舍為縮出入不當其次必有天變時災當其軌則國有徴祥其應龍見郊原木辰不撫則木氣弱而金賊乘之故刑罰濫而兵革興矣火為熒惑其德配禮其方配南其時配夏火行一舍二舍為不祥出入當其道則國有慶失次為旱飢火為南方之正氣秉天七之陽得地二之隂其卦為離其時丙丁其性炎上其味作苦質隂而氣陽也其行天所以佐理化氣七十九年一大周天二年一小周天火行一舍二舍為不祥東行疾則兵聚於東方西行疾則兵聚於西方南行主火北行主旱火辰不撫則火弱而水賊乘之由是淫雨降而潦水興土鎮星其德配信其位居中其時寄旺其行順軌國有慶失度為國戚土者中央之正氣秉天五之陽得地十之隂其卦坤艮其時戊己其性厚載其味作甘質陽而氣隂也其行天所以升降日月鎮四氣二十九年一周天土星失次而上一舍二舍則為大水而下一舍二舍則為國戚土辰不撫則土氣弱而木乘之於是草木解落人民遷徙金為太白其德配義其方配西其時配秋其行順軌為國慶失度有天殃金者西方之正氣秉天九之陽得地四之隂其卦乾兌其時庚辛其性從革其味作辛質隂而氣陽也其行導輔太陽出沒一歲一周天凡金星與日同南北之行為盈與日分南北之行為縮出早為日蝕出晚為天妖其兆主兵金辰不撫則金氣弱而火賊乘之於是蟄蟲滋生寒暑不節水為辰星其德配智其方配北其時配冬其行順軌則歲豐失舍則兵興水者北方之正氣秉天一之陽得地六之隂其卦為坎其時壬癸其性潤下其味作鹹質陽而氣隂也其行天所以輔相太陽出沒一歲一周天水星出早為日蝕出晚為彗孛四時不出則天下大飢出於房間主地震出於星紀主大水水辰不撫則水弱而土賊乘之由是愆陽多而旱燥至矣五緯距合晦朔弦望其遲速不因日若五星則因日而有遲留伏逆矣近日則疾逺日則遲遲甚而留留久而退初遲退漸疾退最疾而後遲退如初退止而留留久而順行却從最遲以至於最疾最疾則與日同躔也歲星最疾約四日行一度熒惑最疾約七日行五度鎮星最疾約七日行一度此三星比日行度較少故伏合以後日在前歲星距日十三度而晨見熒惑距日十九度而晨見鎮星距日十八度午而晨見晨見則在東方大約近一逺二而留周天相年而退歲星初留約距日一百九度初退約距日一百三十一度熒惑初留約距日一百三十四度初退約距日一百四十四度鎮星初留約距日九十四度初退約距日一百二十八度凡退行最疾之時必與日對衝退止而留則背距日如初退之度留久而順行則背距日如初留之度日近於後躔漸近而行漸疾背近如晨見距日度則伏而光不著矣與日未對衝之先夜半後可望謂之晨假與日既對衝之後夜半前可望謂之夕假太白辰星則不然太白最疾約四日行五度行五度有餘辰星最疾約一日行一度有餘此兩星常比日行度較多伏合以後則過日而前太白距日兩度半而夕見辰星距日十六度而夕見夕見則在西方太白距日甚逺不過四十五度辰星距日甚逺不過二十四度既已甚逺則所行遲比日較少由是漸與日近太白距日三十度有餘而初留辰星距日二十一度半而初留太白留後距日二十四度有餘而初退辰星留後距日十九度半而初退退行之際與日相近如夕見之度伏而不著與日相逺如夕見之度晨見於東退行最疾之時與日必同度退正而留則距日如初退之度留久而順行則距日如初留之度遲行漸疾而漸近日距日如退伏之度則久退而不著矣與日未退合之先昏後可望謂之夕假與日既小合之後曉前可望謂之晨假蓋金木形體大固伏見與日逺歲星八十三年而七周天與日合度者七十六合期約三百九十九日熒惑七十九年而四十二周天與日合度者三十七合期約七百八十日鎮星五十九年而二周天與日合度者五十七合期約三百七十八日太白辰星與日常相近隨日一年一周天太白八年而五合於日退合者又五約五百八十四日而順逆兩合辰星四十六年之間合於日者一百四十五退合亦然約一百一十六日而順逆兩合此乃五緯之常數也古法唯知有常度未知有變數之加減北齊張子信仰觀歲久知五緯有盈縮之變當加減常數以求其逐日之躔蓋五緯不由黃道內外各自有其道視日逺近為遲疾如足力之有勤倦其變數之加減如里路之徑直斜曲也歲星加減最多處二十五度有餘填星加減最多處八度有餘太白加減最多處四度有餘辰星加減最多處六度有餘此乃五緯盈縮之變數也若夫羅侯計都月孛紫氣則其行均平無有遲疾羅侯計都從月交黃道求之月交之終始該三百六十三度七十九分三十四秒厯二十七日二十一分二十二秒二十四毫羅計於其間各逆行一度四十六分三十秒其數併月行交終之度即黃道周天之度凡十八年有餘而周天交初復在舊躔矣月孛從月之盈縮而求盈縮一轉二十七日五十五分四十六秒月行三百六十八度三十七分四秒半孛行三度十一分四十秒半黃道周天之度併孛行數即月行數也凡六十二年而七周天月行最遲之處與之同躔矣紫氣起於閏法約二十八年而周天授時厯以一十日八十七分五十三秒八十四毫為一歲之閏紫氣則一歲行十三度五分四秒六十毫八十芒兩數比之乃加二之算二十八年十閏紫氣行十二宫亦加二之算也舊云紫氣即景星罕聞其見史記注云景星狀如半月生於晦朔助月為明則人君有德初盛之慶也五緯與月孛紫氣皆以左旋步之羅侯計都逆行乃右旋步之設十一曜不附天而空轉則右轉者亦皆左旋其留者一日繞地一周與天同過一度行疾者反為遲行遲者反為疾退者反為疾之甚矣蓋順行而遲疾者皆一日繞地一周以不及天行之數為所行度退行者乃一日繞地一周多退天行之數退遲者先天不甚多退愈多則愈失矣以物喻之日月猶魚也魚行江河不著其底必憑江河之水以行或逆或順各任其情日月雖懸虛不附於天意其必憑天之氣以行五緯之行亦猶是也夫在天成象日月星辰皆象也而日月五星獨異於衆自有行度者此隂陽五行之精為造化之妙非衆星之比也日月五星體性不齊故遲疾有異亦當以隂陽五行别之五辰旺相休囚附歲星在春曰旺其色比心左角大而青精光立春後滿七十日後十八日始見色黃仲春之時有芒角在冬曰相其色黑精光而芒角在夏曰休其色青黃無精光在四季曰囚其色青微黑在秋曰死其色細小不明熒惑在夏曰王其色比心大星大而赤精光仲夏有芒角在春曰相其色精光無芒角在季夏曰休其色精赤無精光在秋曰囚其色青白不明在冬曰死其色黃細不明鎮星在四季曰王其色正黃比北極中央大星而明有芒角在夏曰相其色黃大而精光無芒角在秋曰休其色黃白無精光在冬曰囚其色黃黑不明在春曰死其色青白細小不明太白在秋曰王其色比狼星精光明而有光仲秋之時有芒角在四季曰相其色精光而無芒角在冬曰休其色精明而無光在春曰囚其色青黃而不明在夏曰死其色青黑而不明辰星在冬曰王其色比奎大星青白精明而有光仲冬有芒角在秋曰相其色精明而無芒角不搖在春曰休其色青黃微小無精光在夏曰囚其色黃黑小而不明在四季曰死其色青赤小而不明水生於北方隂位而陽已生火生於南方陽位而隂已形故水火互根也木生於陽方陽時金生於隂方隂時而隂陽無所生故金木不互根也五星在天髙則景小低則景大素問云然五星色象論古今星釋曰凡五星之色各象四時而比擬之歲星在春如大角而有精光仲春之時有芒角熒惑在夏色比心大星而有精明仲夏之時有芒角鎮星在四季之時其色正黃比北極中央大星而精明有芒角太白在秋其色比狼星精明而光仲秋之時有芒角辰星在冬其色比奎之大星精明而有光冬至之時有芒角歲星之色在春比左角而青有精明當其夏也其色尚青所宿國主弱臣強當其秋也其色尚精明所宿國有相死當其冬也其色尚如左角所宿國臣下專政熒惑之色在夏比心之大星有精明仲夏有芒角當其秋也其色尚青有精明所宿國相蔽主聰當其冬也其色尚黃有芒角所宿國不可舉事用兵當春也其色尚如心之大星所宿國讒臣用事妬賢嫉能鎮星之色在四季之時其色正黃比北極中央大星而精明有芒角當四孟之月其色尚黃而精明所宿國臣下專恣人君受制當四仲之月其色尚黃而有芒角所宿國女主請謁行又曰女主擅政太白之色在秋其色比狼星精明而有光仲秋之時有芒角其色尚精明而有光所宿國有急兵亦曰軍破將死當其秋也其色尚精明而有芒角所宿國武吏縱橫亦曰將有叛志當其夏也其色尚如狼星所宿國不有破軍必有屠城辰星之色在冬比奎之大星精明有光冬至則有芒角當其春也其色尚精明而有光所宿國大水當其夏也其色尚精明而有芒角所宿國大臣受禍當其秋也其色尚比奎之大星所宿國女主有憂亦曰後宫有憂五星得位論天文别録曰凡五星所出行所直之辰其國為得位得位者歲星以德熒惑有禮鎮星有福太白兵強辰星隂陽和又曰五星得位者勝所直之辰順其色而角者勝其色害者敗晉灼曰鄭色黃而赤蒼小敗宋色青而赤黑小敗燕色黃小敗皆大角勝也古今星釋曰凡五星循軌不失本色所直之辰所宿之國為得位及色勝者國昌不得其位及色不勝者國亡人君有德則歲星得其位色青而潤澤者勝人君有禮則熒惑得其位色赤而潤澤者勝人君有福則鎮星得位色黃而潤澤者勝人君兵強則太白得其位色精明而有其光者勝人君順隂陽之序使無愆忒則辰星得其位色蒼而微有光者勝五星反是者敗大象旁通曰凡五星得位者所宿國昌五星失位所宿國亡故星傳以為得位者謂五星所出所行所直之辰其國為得位順其色而有角者勝其色害者敗居實君有德也居虛君無德也色勝位行勝色行德盡勝之五星入廟論河圖遺書曰營室為清廟歲星廟也心宿為明堂熒惑廟也南斗為文大室鎮星廟也亢星為疏廟太白廟也七星為員宫辰星廟也五星行至其廟謹候其行古今星釋曰五星循軌順入廟宫所宿國昌其年穰君有福若五星逆行失度入廟宫是謂逆入其年歲飢人相食亦曰有暴兵起大象旁通曰歲星順守廟宫其野歲穰若逆入廟宫其野歲歉民飢熒惑順守廟宫其國人君有逆地之喜若逆入廟宫其國人主有憂亦曰禁廷有災鎮星順守廟宫其國有德令以及天下若逆入廟宫其國禮樂法度不自天子出太白順守廟宫其國兵強軍威大振若逆入廟宫其野軍覆將死一曰有亂兵辰星順守廟宫其野徙都市五星下降論河圖遺書曰凡五星盈縮失位其精降於地為人歲星降而為貴臣熒惑降而為童兒歌謡嬉戲鎮星降而為老人婦人太白降而為壯夫處於林麓辰星降而為婦人吉凶之應隨其象占之古今星釋曰凡五星越舍而盈退舍而縮不循軌度而失其位則其精必降於地精降而為人吉凶禍福各隨其行止以占之歲星越舍而失位其精降於地為貴臣多衣金紫手有所執行則大臣被黜大臣止則政令不通下情若退舍而失位其精降于地為貴臣多冠冕手無所執行則有急政以酷民止則人君有憂亦曰有疾疫熒惑退舍而失位其精降於地為兒童歌謡嬉戲則其國有火災若退舍而失位其精降於地為兒童悲哀哭泣則其國有大喪鎮星越舍而失位其精降於地為老人行則其國興土功臣勞怨則其下有急兵若退舍而失位則其降於地為婦女行則其下有強臣止則其野有走君大白越舍而失位其精降於地為壯夫處於山林行則其國以兵亡止則其下有亂君退舍而失位其精降於地為壯夫處於田野行則其野徙都市止則其國有死君亦曰有大兵喪辰星越舍而失位其精降於地為婦人行則其國有女主憂止則有女喪五星相合論同舍為合相陵為鬬二星相近其殃大五星相逺毋傷以七寸內占之天文志曰凡五星木與土合為內亂飢荒木與水合為變謀而更事木與火合為飢為旱木與金合為白衣之會合鬬國有內亂野有破軍為水災太白在南木在北名牝牡榖大熟金在北木在南年或有或無火與金合為爍為喪不可舉事用兵從軍為軍憂離之軍却出太白隂分軍出其陽偏將戰火與土合為憂主孽卿與水合為北軍用兵舉事大敗一曰火與水合為淬不可舉事用兵土與水合為壅沮不可舉事用兵有覆軍敗師土與金合為疾為白衣會為內兵其國亡地土與木合國飢水與金合為變謀為兵憂入太白中而出破軍殺將客勝下出客亡地視其所指以命破軍漢成帝河平二年十月下旬鎮星輿鬼先到歲星熒惑亦貫輿鬼十一月上旬歲星熒惑去鎮星西北逆行占曰三星若合是謂驚立是謂絶行外內有兵喪改立王公其十一月丁巳夜郎王韻大逆不道牂柯太守立捕殺韻二年九月甲戌東郡莊平男子侯毋辟兄弟五人羣黨為盜攻燔官寺溥縣長吏盜取印綬自稱將軍三月辛卯左將軍千秋卒四年四月戊申梁王賀薨後漢和帝永元七年八月甲寅水土金俱在軫春秋緯曰五星入軫者為兵大起巫咸曰五星入軫者司其書而數之期二十日皆為兵喪司始入處之卒一曰期十曰軍罷石氏經曰辰星守軫歲水郤萌曰鎮星出入屇舍軫六十日不下必有大喪春秋緯曰大白入軫兵大起郤萌曰大白守軫必有死王後八年樂成王黨七月樂成王宗皆薨將兵長吏吳岑坐事徴下獄誅十月北海王威自殺十二月陳王羡薨又曰三星合軫為白衣之會晉元帝建武元年五月癸未大白熒惑合於東井占曰金火合為爍為喪是時愍帝蒙塵于平陽七月崩子冠庭立大興二年四月甲午七月甲午歲星熒惑會于東井占曰為兵飢二年六月丙辰大白與歲星合于房永昌元年王敦攻京師六軍敗績王敦尋死晉成帝咸康七年三月大白熒惑合于太微中犯左執法明年顯宗崩晉穆帝永和七年三月戊子歲星熒惑合于奎其年劉顯殺石祗及諸邊師中土大亂晉安帝元興三年二月壬申大白熒惑合于羽林二年十一月桓玄篡位遷帝于永安宫三年二月劉裕起義兵桓玄逼帝東下義熙二年十二月丁未熒惑大白皆入羽林又合于壁三年正月慕容超冦淮北徐州空下邳八月遣劉敬宣伐蜀五星相鬬論天文志曰五星同舍為合五星相陵為鬬二星相近其殃大相逺無傷皆以七寸內占之凡木火土金與水鬬為戰兵不在外皆為內亂水繞環太白若與鬬大戰客勝古今星釋曰歲星逆行不循軌度而陵大白是謂逆鬬其野金不從革國多暴兵亦曰無兵兵起歲星越舍而陵熒惑是謂盈鬬其野多火災不爾大旱歲星退舍而陵鎮星是謂縮鬬其下多土功民勞怨歲星失行失色而陵辰星是謂失鬬其國多大水亦曰有兵喪熒惑逆行不循軌度而陵歲星是謂鬬之逆也其國歲凶民大飢熒惑越舍而陵太白是謂盈陵而鬬之爍也其下多兵火熒惑退舍而陵鎮星是謂縮陵鬬之反坐也其國多水旱熒惑失行失色而陵辰星是謂失位而鬬之淬合也臣下多隂謀鎮星逆行不循軌度而陵歲星是謂陵制而鬬之尅也其國多土役違農時民怨為盜鎮星越舍而越陵熒惑是謂盈陵而鬬之反常也其下多姦謀亦下謀上鎮星退舍而陵太白是謂縮陵而鬬之復生也其國多急兵亦曰軍政急鎮星失行失色而陵辰星是謂壅沮也其國江河暴決洪水橫流泛濫于天下大白逆行不循軌度而陵歲星是謂反制其國多暴令亦曰有苛酷之政以虐民大白越舍而陵熒惑是謂盈縮而鬬之甚也其國以兵亡大白退舍而陵鎮星是謂縮勝而鬬之淺也其下有兵兵止無兵兵起大白失行失色而陵辰星是謂失經其國多隂事亦曰女主擅辰星逆行不循軌度而陵歲星是謂易常其下多飢民糴貴人死亦曰水災辰星越舍而陵熒惑是謂淬合鬪之災也其野有大兵喪辰星退舍而陵鎮星是謂失道其下王道不行辰星失行失色而陵太白是謂溺本其下多大水舟船入井邑市人操舟楫糴貴民飢漢孝成帝建始四年七月熒惑踰歲星居其東北半寸形如連珠時歲星在關星西四尺所熒惑初從畢口大星東北往數日至往疾去遲占曰熒惑與歲星鬪有病君歲飢至河平元年三月旱傷麥民食榆皮二年十二月壬申大皇大后避時昆明東觀晉惠帝永寧二年十一月熒惑大白鬭于虛危占曰大兵起破軍殺將虛危又齊分十二月熒惑襲大白于營室占曰天下起兵亡君之戒又曰易相初齊王冏來京都因輔政專傲無君是月成都河間檄長沙王義討之冏義交戰攻焚宫闕冏兵敗夷滅義殺其兄上軍將軍實以下二十餘人大安二年成都又攻長沙於是公私飢困百姓力屈月蝕五星論天文别録曰凡月蝕五星其國棄祀月蝕歲星天下大飢月蝕熒惑天下大亂月蝕鎮星人君好殺月蝕大白強國侵陵月蝕辰星則有內亂亦曰有女亂各以其所在之國命之陳卓敘占月蝕五星其國皆亡五星入月其野有逐相又曰凡星入月見月中為星蝕月月奄星星滅為月蝕星古今通占曰月蝕五星其國皆亡歲以飢熒惑以亂鎮以殺大白強國以戰辰以女亂漢宣帝地節元年正月戊午乙夜月蝕熒惑孟康曰凡星入月見月中為星蝕月月奄星星滅為月蝕星占曰有死亡期近一年逺二年是時楚王延壽謀逆自殺漢成帝建始四年十一月乙卯月蝕鎮星星不見時在輿鬼西北八九盡所占曰月蝕鎮星流民千里河平元年三月流民入函谷關後漢孝明帝永平十五年十一月乙丑大白入月中為大將戮人主亡不出三年後三年孝明帝崩五星變色論石申占曰凡五星之色各有常失其常則為變五星之色各隨其變以占之荆州占曰歲星在東方之宿色當青若赤若白皆為兵黑則有喪歲星在西方之宿色當白而角色青有憂色赤有兵色黑則有大兵喪歲星在北方之宿色當黑而色青有憂色白有兵色白而角有大兵又曰歲星正見南方芒角黃白指子午卯酉王者心正若芒邪角不正及變色則王者心不正青白赤色皆有急兵熒惑在東方之宿色當微青而赤若白若黑為急兵若大青而角則破軍殺將熒惑在西方之宿色當微赤而白若青若黑為女喪若白而角其野更政熒惑在南方之宿色當政赤而精明若青若白其野內外有喪若黑而角則其國有哭泣事熒惑在北方之宿色當赤而微若青若白其野有急政若大赤而角其國君亡太白在東方之宿色當白而微黃若赤若青其野有兵與喪若太白而出怒角其下有改立侯王太白在西方之宿色當政白而精明若青若赤其下人君有憂若黑而微其國有亡地亦曰有屠城大白在南方之宿色當白而微赤若青若黑其下大水民飢若大赤而出怒角其野大旱民飢太白在北方之宿色當蒼白而潤澤若赤若青其下人君有憂若色蒼而出怒角其國君無出宫下有伏兵辰星在東方之宿色當蒼白而精明若赤若黑其下大水若大白而角其國有酷令辰星在西方之宿色當青白而微光若赤而角其國有君變殺主將辰星在南方之宿色當青黑而光潤若赤若白其國有讒諂害忠良辰星在北方之宿色當精明而潤澤若青若赤其國將棄祀亦曰國祚將亡鎮星在四季之時其色正黃精明而有芒角若青若赤其國多亂兵在春則其色當無精明若青若白蒼赤其國多土役在冬則其色當赤黑細小不明若復精明若有芒角其國嵗歉人相食在春則其色當青白細小不明若不青不白其國有峻令若明大而不細小則其國多妖言政令五星出不出論河圖遺書曰凡五星分天之中積于東方中國利積于西方外國用兵者利辰星不出太白為客其出大白為主出與大白不相從及各出一方為格野雖有軍不戰古今釋星曰嵗星當出而不出其國嵗凶未當出而出其野有內憂熒惑當出而不出其國有兵喪未當出而出其野有大變鎮星當出而不出為內兵為急戰未當出而出為兵飢太白當出而不出是為失舍其下不有破軍必有亡國未當出而出是為越舍其下有破國辰星當出而不出其下有大水災傷禾稼糴貴民飢未當出而出其國有大兵喪亦曰有女喪星傳曰凡五星之出不出繫乎人君之政急緩也嵗星政緩則不行急則過逆則占熒惑政緩則不出急則不入違道則占鎮星政緩則不還急則過舍逆則占大白政緩則出急則不入逆則占辰星政緩則不出急則不入非時則占漢三年秋大白出西方有光幾中乍北乍南過期乃入辰星四孟是時項羽為楚王而漢已定三秦與相距榮陽太白出西方有光幾中是秦地戰將勝西漢國將興也辰星出四孟易王之表也後二年漢滅楚辰星當出四仲不四仲而出四孟乃易王之象也漢孝昭帝始元中大白出西方下行一舍後上二舍而下去大白主兵上復下將有戮死者後大白出東方入咸池東下入東井人臣不忠有謀上者其後左將軍桀驃騎將軍安與長公主燕剌王謀作亂成伏其辜兵誅烏桓漢孝宣帝本始二年七月壬戌中夜辰星與參出西方其二年十月辛亥夕辰星與翼出皆為蚤占曰大臣誅五星伏見論天文别録曰五星五德之主其行或入黃道裏或出黃道表猶月行出有隂陽道也然出入無常不可以算數求也其東行曰順西行曰逆順則疾逆則遲通而率之終為東行矣不東不西曰留與日相近而不見曰伏伏與日同度曰合其留行逆順掩合犯凌變色芒角凡其所主皆依時政五常五官五事之得失而見其變天文總占凡五星見伏留行逆順遲速應厯度者為得其行正合于常違厯錯度而失路盈縮者為亂行亂行則為天矢慧孛而有亡國乖政兵飢喪亂之禍云古厯五星並順行秦厯始有金火之逆又甘石氏並時自有差異漢初測候乃知五星皆有逆行其後相承罕能察至後魏末清河張子信學藝博通尤精厯數因避葛榮亂隱于海島中積三十許年專以渾儀測候日月五星差變之數以算步之始悟日月交道有表裏遲速五星伏見有感召向背言日行在春分後則遲秋分後則速合朔月在日道裏則日盈若在赤道外雖交而不虧月望值交則虧不問表裏又月行遇木火土金四星向之則速背之則遲五星行四方列宿各有所好惡所居遇其好者則留多行遲見早遇其惡者則留少行速見遲與常並差三十許度其辰星之行見伏尤異晨應見在雨水後立夏前或見在處暑後霜降前者並不見于驚蟄立夏立秋霜降四氣之內晨夕去日前後三十六度內二十八度外有木火土金一星有者見無者不見後張胃玄劉孝孫劉焯等依此差度為定入交蝕分及五星定見定行與大密會皆古人所未得也五星在隂論天文别録曰凡五星之行入黃道裏或出黃道表猶月行出有隂陽道也若嵗星失行在隂其下嵗大荒亦曰有兵飢熒惑失行在隂其國有火災亦曰有誅伐事鎮星失行在隂其國有土役勞民力大白失行在隂其國有急兵亦曰有死將辰星失行在隂其國大水災毁城色傷人民凡五星在隂各以其舍命國而吉凶在焉漢孝景帝四年七月癸未火入東井行隂占曰為誅罰又為火災後二年有栗氏事後未央東闕災五星所主論天文别録曰嵗星主太山徐州青州兖州熒惑主霍山揚州荆州交州鎮星主嵩山豫州太白主華隂山涼州雍州益州辰星主恆山冀州幽州并州古今星釋曰嵗星主角亢氐房心尾箕熒惑主輿鬼栁星張翼軫鎮星主東井太白主奎婁胃昴畢觜參辰星主斗牛女虛危室壁五星常色論天文志曰凡五星有色色變有類凡五星色青比參之左肩五星色赤比心之大星五星色黃比參之右肩五星色白比狼星五星色黑比奎之大星若五星不失本色而應其四時者吉色害其行者凶天文總占曰嵗星之色春青而有精光仲春之時有芒角冬色白精光芒角夏色赤黃而精明四季色青微黑秋色細不明其色如常則天下利平失常則變變則凶各以其舍命國所在熒惑之色夏赤而有精明仲夏之時有芒角春色精明無芒角四季色黑黃精明秋色清白不明冬色黑黃細而不明其色如常則天下和平失常則變變則凶各以其舍命國所在鎮星之色在四季正黃而有明有芒角秋色無精明冬色赤黑細小不明春色青白細小不明其色如常則天下和平失常則變變則凶各以其舍命國所在大白之色在秋則精明而有光仲秋之時有芒角四季之色精明而無芒角在冬則無精明而無光在春之色青黃而不明在夏則色細小而不明在秋則無其精明色而無光其色如常則天下和平失常則變變則凶各以其舍命國所在辰星之色在冬則精明而有光冬至之時有芒角在秋則其色精明無芒角不搖光在春則其色蒼黃微小無精明在夏則其色黃小黑如不明其色如常則天下和平失常則變變則凶各以其舍命國所在五星色圓論河圖遺書曰凡五星色皆圜白為喪為旱五星色圓赤中不平為兵五星色圓青為憂為水五星色圓黑為疾疫為多死五星色圓黃為吉天文志曰凡五星同色天下偃兵百姓安寧歌舞以行不見疫災五榖蕃昌五星有角論河圖遺書曰凡五星有角而赤兵犯我城五星有角而黃其地爭五星有角而白有哭泣聲五星有角而青則有兵憂五星有角而黑則有大水古今星釋曰嵗星出怒角而赤其野大旱出怒角而青其下有憂出怒角而白其下有急兵出怒角而黑如不明其野有隂謀出怒角而黃潤其野大穰古今注曰嵗星出角各以五色占之謂非時出怒角而不得四時常色者此也熒惑出怒角而赤其國多火災亦曰旱荒出怒角而青其國君多內憂亦曰有失喪出怒角而白其野邊將亂為出怒角而黑如不明其國有匿謀亦曰有女主擅權出怒角而黃潤其國益地古今注曰熒惑出一角失常其殃淺出二角其殃深出四角已上其為禍尤甚鎮星出怒角而赤其國多土功民勞怨出怒角而青其國有飢民出怒角而白其下有死將出怒角而黑如不明其國有水患出怒角而黃潤其野人君有慶大白出怒角而白其下有覆軍殺將亦曰國以兵亡出怒角而赤其國有兵火出怒角而青其下有叛將出怒角而黑似不明其國有女主喪亦曰後宫有憂出怒角而黃潤其大將受賞辰星出怒角而黑似不明其野大水飄泛井邑出怒角而青其國大飢民困出怒角而赤其國大旱有兵火出怒角而白其國有內亂亦曰禁衛有變出怒角而黃潤其野王者有喜慶事大象旁通曰凡五星得常色則精明而光澤不得其常則出怒角乍東乍西乍動乍靜各隨五色以占之而吉凶在焉五星繫八卦論古今星釋曰凡五星居四正與四隅之方皆曰繫八卦各隨星所繫而命其卦則吉凶可知矣嵗星失其變色繫乎乾則其國君有憂嵗星繫坤其野地動民災嵗星繫坎其野大水嵗歉民飢嵗星繫離其野大旱嵗星繫震其國號令不振嵗星繫艮其野山崩或山鳴嵗星繫巽其國人君無德嵗星繫兑其國多土功民怨怒熒惑失行變色繫乎乾其國有內憂亦曰內庭有火災熒惑繫坤其野有女喪熒惑繫坎其國水旱不時熒惑繫離其國多水災熒惑繫震人君憂喪熒惑繫艮其國有兵變熒惑繫巽其國小人乘君子之器熒惑繫兑其國有暴政民怨鎮星失行變色繫乎乾其國君有急政以毒民鎮星繫乎坤其下有女主擅國政鎮星繫坎其國后族朋黨盛朝士側目鎮星繫離其國多土功鎮星繫震其下德政大壞鎮星繫艮其國不寧亦曰有不庭方鎮星繫巽人君無德令以及民鎮星繫兑其下民怨大白失行變色繫乎乾其國有死君亦曰用兵亡國大白繫坤其下女主有隂謀大白繫坎其國江河暴決禾稼傷人民溺大白繫離其國多兵火大白繫震其國君政隳廢號令不專大白繫艮其國有變謀大白繫巽其國無德大白繫兑其下失三軍心亦曰百姓有離心辰星失行變色繫乎乾其國大水入都市辰星繫坤其國后族于時政辰星繫坎其國洪水橫流泛濫于天下辰星繫離其野大大旱之荒辰星繫震其國多雨水辰星繫艮其國有山崩地陷之危辰星繫巽其野多大風拔巨木飄屋瓦辰星繫兑其國有水患興土役勞下民五星經天論天文别録曰木土火三星行遲夜半經天其始皆與日合度而後順行漸遲追日不及晨見東方行去日稍逺朝時近中則留留經旦過中則逆行逆行至夕時近中則又留留而又順先遲漸速以至于夕伏西方乃更與日合金水二星行速而不經天自始與日合之後行速而先日夕見西方去日前稍逺夕時欲近南方則稍遲遲極則留留而近日則逆行而合在于日後見東方逆極則留留而後遲遲極去日稍逺旦則欲近南方則速行以追日晨伏東方復與日合此五星合見遲速逆順留行之大經也漢天文志曰昏旦者隂陽之大分也南方者大陽之位而天地之經也七曜行至陽位當天之經則虧伏留逆而不居焉此天之常道三星經天二星經天三天兩地之道也陳卓敘占曰自古厯法無木火土三星經天謂行遲也金水二星不經天謂行速也是亦三天兩地之道也用是推之此天之常道也及其變也五星之行盈縮伏留遲速逆順之異不可以常道言也五星俱有經天之理明矣古今星釋曰嵗星經天其國大飢人相食熒惑經天有兵火鎮星經天其國大旱亦曰有土功大白經天有急兵亦曰國以兵亡辰星經天其國大水秦始皇時有大白經天占曰國棄祀宗祀亡後果因漢楚興兵相距籍秦遂以亡晉惠帝永寧元年自正月至于閏月五星互經天縱橫無常星傳曰日陽君道也星隂臣道也日出則星亡臣不得專也晝而見午上者為經天其占為不臣為更王今五星悉經天天變所未有也石氏説曰辰星晝見其國不亡則大亂是後台鼎方伯在執大權二帝流亡遂至之夷更王迭據華夏亦載籍所未有也其四月嵗星晝見五月大白晝見同前晉安帝義熙元年至十四年大白經天者九皆華伐更王臣失君之象也是後劉裕受宋公帝遜位于宋候五星論海上通占曰凡五星見伏留行逆順遲速應厯度者為得其行政合于常違厯錯度而失道盈縮者為亂行亂行則有亡國乖政兵急喪亂之禍云嵗星政緩則不行急則過分逆則占熒惑政緩則不出急則不入違道則占鎮星政緩則不還急則過舍逆則占太白政緩則不出急則不入逆則占辰星政緩則不出急則不入非時則占五星不失行則年榖豐昌河圖遺書曰秦之強候大白占狼弧吳楚之強候熒惑占鳥衡燕齊之強候辰星占虛危宋鄭之強候歲星占房星晉之強候辰星占參秦并吞三晉燕伐自河山以南者中國中國于四海內則在東南為陽陽則日嵗星熒惑鎮星占于街南畢主之其西北胡貉月氐稱裘引弓之民為隂隂則月大白辰星占於街北昴主之故中國山川東北流其繼首在隴蜀尾沒於渤海碣石是以秦晉好用兵復占大白大白主中國而胡貉數侵掠獨占辰星出入躁疾常主夷狄此其大經也大嵗在四仲則嵗行三宿嵗在四孟四季則嵗行二宿二八十六三四十二而行二十八宿十二嵗而周天候熒惑常以十月入太微受制而出行列宿司無道出入無常也候鎮星常以甲辰元始建斗之嵗行一宿二十入嵗而周天也候大白常以正月甲寅熒惑晨出東方二百四十日而一入四十日又出西方二百四十日而入入三十五日而復出東方出以寅戌入以丑未也候辰星常以二月春分見奎婁五月夏至見東井八月秋分見角亢十一月冬至見牽牛出以辰戌入以丑未二旬而入晨候之東方夕候之西方也五星合聚論天文别録曰凡五星所聚合以其事致天下四星從嵗星以義四星從熒惑以禮四星從鎮星以重大白從辰星以法從各以其事致天下也五星若合是謂易行有德受慶改立王者奄有四方子孫蕃昌亡德受殃離其家鄉滅其宗廟百姓離去被蒲四方五星皆大其事亦大皆小其事亦小漢元年五星合聚東井以厯推之從嵗星也此髙祖受命之符也故客謂張耳曰東井秦分漢王入秦五星從嵗星合聚當以義致天下秦王子嬰降於枳道漢王以屬吏寶玉婦女無所取閉宫封門還軍次於灞上以候諸候與民約法三章民無不歸心者可謂行義矣天之所豫也五年遂定天下即帝位以明嵗星崇義東井為秦之明效也四星合聚論天文别録曰四星若合是謂太蕩其國兵喪並起君子憂惶小人流亡晉孝武帝大元十九年十月大白鎮星熒惑辰星合于氐占曰為亂飢為內兵至隆安元年王恭等舉兵顯王國寶之罪朝廷殺之是後連嵗旱飢晉安帝義熙三年二月癸亥熒惑鎮星大白辰星聚于奎婁從鎮星也徐州分是時慕容超僣號于齊兵連徐兖連城冦掠至於淮泗姚興譙縱僣號秦蜀盧循及魏南北交侵其五年劉裕殄慕容超義熙九年三月壬辰嵗星熒惑鎮星大白皆聚東井從嵗星也東井秦分十三年劉裕定關中其後遂移晉祚三星合聚論天文别録曰三星若合是謂驚立絶行其國外內有兵與喪百姓飢餓改侯王漢孝文帝後元二年四月乙巳水木火三星合於東井占曰外內有兵與喪改立王公東井秦也是嵗誅反者周殷于長安市其七年六月文帝崩漢孝景帝元年七月乙丑金木火三合於張占曰外內有兵與喪改立王公張周地金之河南也又為楚王三年吳楚膠西膠東淄川濟南趙七國及吳楚攻梁膠東西及淄三國圍齊漢遣大將軍周亞夫等戍止河南以候吳楚遂敗之吳王走粵攻殺之平陽侯敗三國之師于齊遂伏其辜齊王自殺漢兵以水攻趙城懷王自殺六月立皇子二人楚元王子為土膠西中山楚濟北為淄川至淮陽魯王汝南為江都七月兵罷漢成帝河平二年十月下旬鎮星在東井軒轅南端太星星盡餘嵗星在其西北尺所熒惑在其西北二尺所皆從西方來鎮星貫輿鬼先到嵗星次熒惑亦貫輿鬼十一月上句嵗次熒惑西去鎮星皆西北遂行占日三星若合是謂驚立絶行外內有兵與喪改立王公其下十一月丁巳夜郎王韻大逆不道牂牱太守立捕殺韻晉惠帝元康三年鎮星嵗星太白三星聚于畢昴占曰為兵喪昴趙地也後賈后陷殺太子趙王廢后又殺之斬張華裴頠遂篡位廢帝為太上皇天下從此兵亂禍連晉懷帝永嘉六年七月熒惑嵗星大白聚牛女之間徘徊進退占曰牛女楊州分是時懷帝傾覆而元帝中興於楊晉孝武帝大元十七年九月丁丑嵗星熒惑鎮星同在亢氐十二月癸酉鎮星去熒惑嵗星復合占曰三星合是謂驚立絶行內外有兵喪與飢改立王公二星合聚論天文别録曰凡五星木與火合為內亂飢水合為變謀而更事與火合為飢為旱與金石白衣之會合鬭國有內亂野有破軍為水大白在南嵗星在北名曰牝牡年榖大熟大白在北嵗星在南年或有或無榖與金合為爍為喪不可舉事用兵從軍為軍憂離之軍却土大白隂分軍出其陽偏將戰與土合為憂主孽魚列切庶子卿與水合為北軍用兵舉事大敗一曰火與水合為淬淬內切梁也不可舉事用兵土與水合為壅沮不可舉事用兵有覆軍與金合為變謀為兵憂入大白中而上出破軍殺將視其所指以名破軍環繞大白若與鬭大戰客勝漢孝文帝七年十一月戊戌土與水合於危占曰為壅沮所當之國不可舉事用兵必受其殃一曰將覆軍危齊也其七月火東行行軍陽環畢東北而出西逆行至昴即南方東行占曰為喪死寇亂畢昴趙也後三年膠西膠東淄川三國攻齊國漢遣大將軍周亞夫等戌止河南以候吳楚之斃遂敗之漢孝景帝元年正月癸酉金水合於婺女占曰為變謀為兵憂婺女粵也又為蠻二年七月丙子火與水晨出東方因斗牛占曰其國絶祀至十二月水火合於斗占曰為淬不可舉事用兵必受其殃一曰為北軍用兵舉事大敗斗吳也又為粵三年吳楚膠西膠東淄川濟南趙七國反吳楚攻梁膠西膠東淄川三國圍齊漢遣大將軍周亞夫等戍止河南遂敗之吳主亡走粵攻而殺之平陽侯敗七國之師于齊咸伏其辜齊王自殺漢兵以水攻趙城城壞王自殺漢孝景帝中元三年正月丁亥金水合於觜觹為白衣之會其五月甲午金木俱在東井戊戌金去木留守之二十占曰傷城於鉞木為諸侯將行誅於諸侯也是時梁王欲為漢嗣使人殺漢臣袁盎勸漢誅梁大臣梁王恐懼布軍入關伏斧鉞謝罪然後免漢孝景帝中元三年十一月庚午夕金水合於虛相去一寸占曰為鑠為喪虛齊也四年丙申金水合於東井占曰為白衣之會井秦也五年四月乙巳水火合於參占曰國不吉參梁也其六年四月梁孝王死五月陽城王濟隂王死三月天子四白衣臨邸等後元元年五月壬午金合於輿鬼之東北不至栁出輿鬼北可五寸占曰為爍有喪輿鬼秦也丙戌地大動鈴鈴然民大疫死棺貴至秋止晉惠帝光熙元年九月鎮星合嵗占曰鎮與嵗合為內亂是時司馬超專權於中以無禮破滅內亂之應也十二月癸未太白合鎮星占曰為內兵有大戰是後河間為東海王越所殺正月東海王越殺諸葛政等五月汲桑破馮嵩殺東燕王八月茍晞大破汲桑圖書編卷十九
