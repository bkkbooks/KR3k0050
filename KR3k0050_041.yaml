body:
  text: 圖書編卷四十一明章潢撰廣東圖敘廣東古百粵地蓋五嶺之外號為樂土由雄南雄連連州廣州府屬可以向荆吳湖廣江西是也由惠惠州潮潮州可以制閩越福建是由髙髙州亷亷州可以控交桂交趾廣西是而形勝亦寓焉濱海一帶島夷之國雖時時出沒要其志在貿易非盜邊也然諸郡之民恃山海之利四體不勤惟務剽掠有力則私通番舶托名通番因而行劫海上無事則挺身為盜將鼓之警彌山谷凡以良民困於徵求通山之禁久弛齎送鹽未入山通盜者謂之通山教治不修而大征數舉之過也且密邇蒼梧廣西梧州府征蠻幕府在焉總督兩廣太監總兵都御史俱駐劄于此軍旅之興殆無寧嵗兵糧供饋咸得待乏况在産珠池在亷州境內番物駢集本民時所興而內使數來采辦民反病之故外負富饒之名而內實貧困者廣東是也沿革古百粵地漢置交州部刺史察舉南海等郡而不常所治東漢末交州遷治番禺唐貞觀中置嶺南道開元中置嶺南道採訪處置使治南海後分為嶺南東道仍舊治宋置廣南東路經略安撫司以廣州守臣兼領又置提點刑獄司治韶州元置廣東宣慰司及肅政廉訪司於廣州又置海北海南道宣慰司及肅政廉訪司於廣州𨽻江西行中書省本朝改置廣東等處承宣布政使司都指揮使司提刑按察司並治于廣州云廣東等處承宣布政使司治廣州左右布政使二左右參政二嶺東一嶺西一左右參議三嶺南一嶺北一領府十屬州七縣六十九總為里四千二十八里户四十八萬三千三百八十口一百九十七萬八千二十二夏秋二稅共米麥一百一萬七千七百七十二石廣東鹽課提舉司領鹽課一十四海北鹽課提舉司領鹽課一千五二司本所色鹽價并引價銀共三萬七千二百八十兩廣東都指揮使司𨽻前軍都督府都指揮三內掌印一僉書二領衛十五屬所六十八守禦千户所四十有五本都司所屬馬步官軍三萬九千四百餘員名提刑按察司按察使一副使四僉事七分道五嶺東嶺西嶺南海南海北欽差總督兩廣都御史一欽差平蠻將軍總管一欽差巡撫都御史一巡按御史或清軍御史一俱駐廣州市舶提舉司一廣東各府州縣煩簡廣州府其名古羊城秦南海無瘴煩其屬州一縣十五附郭南海二百五十一里煩番禺一百三十九里煩外崇化三十里僻簡順德一百六十四里近海無瘴煩東莞一百八十里煩增城九十八里地險無瘴龍門十七里有瘴香山三十六里四圍俱海無瘴清逺十七里無瘴簡連州十七里近山有瘴地鄰猺賊屬陽山六里在山有瘴連山二里接湖廣三水五十一里從化三十里新寧四十里多盜無瘴新會二百三十八里近海無瘴煩其形勝總百粵連五嶺扼巨海帶衡嶽其俗得華之雜刀耕火種商賈阜通韶州府其名始興廣興韶陽無瘴煩沖其屬縣六附郭曲江三十六里沖外樂昌十五里有瘴僻簡仁化二里乳源猺里有四賊僻翁源十二里沖英德十二里無瘴沖其形勝控扼五嶺粵之北門其俗土曠人稀習尚浮朴運販鹽鈔嵗月致富藤葉嚼檳榔茅簷覆土床南雄府其名江凌宋保昌有瘴沖其屬縣二附郭保昌四十四里有瘴簡沖外始興七里瘴僻其形勝控帶羣蠻襟會百粵其俗鑄銅鼓號召攻擊為都老婚娶檳榔為禮病不服藥而祀鬼惠州府其名梁化隋龍川唐海豐宋博羅無瘴沖煩其屬縣八附郭歸善四十五里沖外博羅五十六里海豐四十里簡僻瘴河源十里多瘴盜沖龍川十里簡瘴沖長樂十里無瘴興寧七里有盜無瘴長寧二十七里和平三里永安七里新設其形勝東接海潮西連汀贛漢之名郡越之沃野其俗女為市男坐家婚喪用樂衣葛紵盤遊潮州府其名晉義安唐潮鳯又鳯城無瘴煩其屬縣七附郭海陽三百里沖潮陽二百四十二里沖揭陽一百三十四里煩僻程鄉十八里有賊瘴饒平一百四十六里瘴煩沖大埔二十七里惠來裁三十里平逺十二里新設其形勝城號鳯棲溪傳鱷徙閩南兩越之界其俗士篤文行海濱鄒魯肇慶府其名隋信安又古端無瘴煩沖其屬州一縣十附郭髙要一百里煩沖外四會六十二里僻冗新興五十八里無瘴簡沖陽春二十四里瘴簡沖陽江五十里簡沖髙明十八里無瘴僻簡恩平二十二里有賊德慶州六十三里猺人半瘴簡沖屬瀧水二十六里多賊少瘴沖封川二十四里淳瘴簡沖開連四里僻其形勝據雍桂賀三江口居廣上遊頂湖在北銅鼓在南其俗火耕水耨食魚與稻椎髻跣足雞骨為占鬭歌為樂市無陶瓦好著木屐又羅定州二十六里屬東安縣即東山西鄉新設西軍縣即西山大洞新設髙州府其名漢髙涼髙興山多有瘴盜賊出沒其屬州一縣五附郭茂名四十六里猺賊出沒瘴外電白十二里僻瘴信宜十五里猺瘴化州三十七里瘴簡屬吳州二十七里瘴簡石城四十六里瘴簡其形勝三山揖前三水繞城其俗為臘髙欄為居三日一市信鬼尚儉廉州府其名漢合浦吳珠官有瘴簡其屬州一縣三附郭合浦二十六里簡瘴外石康十里欽州十里簡無瘴屬靈山三十里簡其形勝大廉峙東巨海南鑿山為城門其俗珠採甲香為業以臘月為嵗首以亥聚市不事巫醫儉朴簡訟雷州府其名唐海康雷陽無瘴沖其屬縣三附郭海康一百五十里簡沖外遂溪四十八里瘴徐聞九十里瘴其形勝窮服嶺並南海平田沃壤海道通閩浙其俗人多欄居以避時鬱風淳嚮學己酉為臘極南倍熱州雜黎俗瓊州府其名漢珠崖唐瓊山瓊管在大海中無瘴煩其屬州三縣十附郭瓊山一百四里煩外澄邁五十六里簡定安三十里簡文昌三十八里簡會同七里樂會十一里簡臨髙六十七里僻儋州四十六里簡僻屬昌化九里萬州三十九里僻簡屬陵水九里僻崖州二十二里簡僻屬感恩九里簡無瘴其形勝海中洲居四郡一島潮候不同中盤黎洞其俗富而尚儉民無飢寒黎蛋雜居牛羊被野無冒認者鹽課提舉司十八里海北鹽課提舉司十五里廣東承宣布政使司領府十曰廣州羊城南海郡番州清海軍廣州路無瘴煩曰韶州南海郡番州東衡州始興廣興韶陽無瘴煩衝曰南雄始興郡雄州江凌保昌有瘴煩曰惠州梁化龍川海豐博羅無瘴衝煩豐曰潮州義安潮陽郡鳯城無瘴曰肇慶蒼梧信安古端興慶軍無瘴煩衝曰髙州髙涼髙興石番山多有瘴盜賊出沒曰廉州合浦官珠大山還珠大亷軍有瘴簡曰雷州南合州海康雷陽無瘴衝曰瓊州珠崖儋耳崖州鎮州瓊山瓊管靖康軍在大海中無瘴煩淳饒處置廣東介嶺海間昔稱饒富然地逺法疏官多黷貨以致山海諸寇聨䑸嘯聚師旅繁興民之殘疲既甚而廣西兵餉又全仰給近增巡撫雖稱得䇿方在經始故廣潮惠肇南韶都郡盜熾事繁選用守令為急雷廉髙瓊諸郡民淳務簡稍為次之至於擇海道副使以備諸夷擇嶺南兵備以防山寇擇屯鹽僉事以修舉屯政講求鹽法庶幾南粵有息肩之日乎制禦山猺夫廣東上燭南斗下聫衡嶽左跨荆揚五嶺之重阻右瞰牂牁溟渤之洪波少隂多陽物恆榮茂固天實作之以開竒甸也然山猺海舶菁伐航浮時為疆場之害愚嘗考自洪武以迄嘉靖選將誓師屢廑征討如鍾福全寇海晏下川我是以有陽江之役既猺寇長孰林墟我是以有雷州衛官軍之追嚴啓盛寇香山東莞我是以有大船之衝黃蕭養攻廣城我是以有董興之旅黃秀山屯據海洋許折桂何並八遁回聚黨我是以有馘首磔市之提清逺黃白眉上杭江小流劫漳泉程鄉我是以有二省夾攻之舉羅劉寧林烏鐵蘇孟凱丘泥金陳萬寧魏宋輝先後寇海陽我是以有葉元玉劉洪源等之禦其平海之盜有若此者洞獠李仲可則葉榮擒之潭源岡吕法子則征虜移師定之白飯坑等猺則率鄉夫滅之連賀獞賊劫江華則會調三省官軍剿之大帽猺彭錦瀧水猺劉第三趙音旺鳯第吉封川猺龎古子侯弟晚蘇公樂則調達漢土兵朴之茂名茅岡鄧公長化州遊魚寨馮曉則抵營諭降之羅扶山寨李汝端黃三坑盤永賢等則分哨捕獲之其平山之盜有若此者然戰艦方回棹於二洋而雙桅復揚帆於諸澳矣征卒才載戈於舊壘而羣酋已舞劍於郊埛矣抑愚復有陳焉海寇之來當防諸海閩浙之水寨是已山猺之治貴因其俗粵西之土官是已吾廣地濱南海而分東西平洋東洋之極東曰拓林稍西曰碣石近省曰南頭西洋之極西南曰瓊州極西曰欽廉而曰沙烏白鴿乃其要害頃嵗比例閩浙創六水寨統之以參將守備把總協之以近府同知而監之以海兵各道綜理周密海防振舉矣顧所以制禦山猺者可無長䇿乎嘗考聖祖命將討平溪洞即立猺首領之自是四面向化緣正統間鎮守內臣多索方物乃始作亂延蔓至今未已兹若仰體聖祖遺意近倣粵西成規取諸酋中素所信服者授之以官其秩崇卑視地大小而又禁交通之私守必經之路則不惟息征剿之繁而且獲調遣之用與粵西向武等州埒矣區處諸寇夫粵自番州而上接牂牁九疑此嶺南界也其番夷市舶交易蓋自唐結好立户而已然矣洪武初命商番止集舶所乃後稍稍築私室於灣澳以便交易則已有雜居之意矣嘉靖間盜發禁之徙去尋又别集今之香山濠鏡澳林林然聚也夫市之可也居之不可也乃今則居矣居而聨絡矣又或匿亡命畜死士矣而漳潮無藉蟻附而蠅集矣官為之權而任其便而譁然齮齕莫之誰何矣今承平既久國家威靈萬無一失脫有不測何以待之今成者即不可亟毁廢者勿令其續成又禁其來不得附益如洪武中只就舶所故事數年之後以次散落是亦隂折其武悍之氣而剝落其附比之黨也或者其庶幾矣不然吾見其寖以滋蔓昌熾不可圖也合浦欽靈山雷北海北界也其俗類西粵地墝埆不耕作民以採珠為業然自吾已有禁矣唐宋間尋弛尋復至洪武中猶復採取已而禁嚴民以飢困然大盜巨艘掠而取之而不得則攻埋椎剽久而戍者私焉陽浮而隂示其意既乃半其入則取其沒而得者掌握錐刀之末抵死鉗鐵載道亦可憫也先是烏白鴿二寨面峙夾而戍已廢烏而並于白鴿益單弱莫濟盜公行無禁矣議者欲復烏嚴其戍而差其罪劫殺為上從者次之沒而得者末減之是亦救敝之微權乎不然吾莫知其所終也已瓊崖亦南溟之一都會也則黎岐為急盤據山洞羣縣環乎其外進有所掠而退有所守彼無外憂而我有內患蓋自職方以來千六百年餘靡有寧日元至元間大舉空其巢窟勒五指山嘉靖間渡師直搗其穴賊迸首就死可謂偉矣然皆未有善後之略以故隨散隨聚其舉之也未覩目前一息之安而調發傳置儲芻之費不待逺計瓊崖之間固已數千萬矣如此即纍舉何益也議者欲于大兵之後乘其威力從瓊至崖千里而遙自儋至萬六百餘里橫徑以十字通道直走其洞洞胸達背瓜分之然后邑里亭障衣冠禮樂而沙灣羅合即溫嶺腳諸洞悉為坦途是亦一勞永逸之計而瓊之民或者其少息也自春恩陽電而上互髙涼倉梧嶺西一都會也其間猺浪最著從晉康都城走髙要楊栁兩山之間如大牛石歌村石龜古種古蓬上馬綿邈千餘里皆為巢窟往時劫髙州破其城嗣復出沒莫禁蓋我聚而彼散我進而彼退我厚集其陳而彼星落以伺吾釁近一舉蕩平為東安西寧二都界兩山之間而統之於羅定州燧亭障為函夏經略虜于是狼奔鳥遁無復逸志是誠千載一會也但其招插安輯愚以為園田漆林之類宜悉以付也勿與之兢豪眇而履畝之稅不必煩劇新民復業者任之其不能盡墾者始令屯兵雜耕如孔明渭濱之事而又聚兵力營保千百為屯統以偏裨勿令使分即有流劫相機雕剿數年之後可以袵席而為樂土之民矣廣東風氣風土紀南中五六月長風迄七月止每發或三日或七日大害農穡冬月則北風暴發海行舟南越志南海熙安間多颶風颶者具四方之風也或曰懼風言怖懼也熙安與義寧抵界將發則兆以斷虹時謂颶母初則自東而北而西而南乃止未至時三日雞犬為之不寧既大至則林宇悉拔覆舟殺稼俗有朝三晚七晝不過一之諺亦頗驗云宋張世傑覆舟時乃五月四日也漢書陽奧之地少隂多陽其人疏理鳥獸希毛其性耐暑拔荒録嶺南方盛夏倐暘倐霽雖大雨傾注頃即赫日已復驟雨故炎熱甚于北土自三月至于九月皆夏令也舊志瀕海地卑土薄陽燠之氣常泄隂濕之氣常甚三者相搏少寒多暑故四時常花隆冬無雪風則暮北而朝南時則春寒而夏暖甚至一日之間風候屢變夏綿冬葛者有之語曰急脫急著勝服藥言氣候不時也村落依山者草茅障翳炎氣蒸鬱或生瘴癘海濵之地風氣舒遲則無此患廣東習尚禹貢島夷卉服逮漢猶椎結箕踞中國人雜居其間漸見禮化至於宋聲教日洽然後士𢎞學農力本工不事淫巧民不貴末作間有小民好為師訟刑撲屢加略無悔色恃財者慕外而輕悍遊民則投充打手轉為剽盜河圖義曰荆揚角徵會氣慓輕人聲急其泉酸以苦始安記曰吳越之境其人好劍輕死易發火耕水耨人養魚稻無千金之家而好巫鬼重淫祀此語足以槩其風俗蓋由廣郡本荆揚之裔土而邑之習尚與風氣恆相隨也議處黎人瓊州居浮海中周二千餘里中有黎母山絶峻五峯諸蠻盤據號黎人最中者為生黎不與州人交其外為熟黎雜耕州地原姓黎後多姓王及符熟黎之産今半為湖廣福建姦民亡命及南恩藤梧髙化征夫利其土占居之各稱洞酋成化來副使凃棐有犛庭之計漸就編差𢎞治末符南蛇之亂連郡震驚其小醜侵突無時而息故欲拔其根株可編甲食土或遷置髙雷湖廣酋籍之亦可嶺南總論天下之所日中寇而尾幾不掉者自諸邊外則莫若嶺南夫吳越之所以中寇者海上之姦民為之內主也姦民盡則寇亦從盡非能使寇盡也寇至而無與導者也故吳姦民最少最先弭越次少次弭閩次多次後弭若夫嶺南則不然其海寇負海以為訌東借日東諸島悍夷以為爪牙而西南借交趾占城闍婆暹羅以為逋藪此其於疾在骨節腠理間而非可湯藥去也而又內結山寇以為腹心之援山寇之為巢穴纍數百千計而不可窮緩則出急則遁撫之則陽聽招而隂為寇我寡則彼乘間我衆則彼匿形而吾民介於二寇之間善事之則相與通有無而得為利不善事之則併其身家以餌寇夫耕而出其賦稅以共官官且重徵之矣出其賦稅以豫寇則搆郭之民以為間郭之民餌於寇而樂為間則借郊之民以為藏故其始也海寇焉而已山寇焉而已今而郊之民寇也郭之民寇也自節帥而有司一身之外皆寇也此其疾於膏之下肓之上非可以金石針砭也夫海寇之來也彼為客而我之除山寇也我為客夫主不可以不時備而客可以不時至也故其便莫若先除山寇除山寇則莫若大用兵大用兵者合二廣閩楚之分道而悉入窮其巢穴之所至而蕩芟之度其險逺而素不為盜者為置官吏以約束之分兵以扼其要害而後時察郭之時為寇偵我者郊之民兩屬寇者轘而裂之以使民曉然知從寇之害海寇之至茫然不知我之有無內寇而我始得為主善為主者多聚兵以為伏深寇之入而焚其舟寇進而無與之導退而歸已絶其氣必奪而計必窮矣夫然一舉而殱之此十世利也書云若藥不瞑眩厥疾不瘳屠牛垣之屠牛皆衆理解也至於髖髀而非斤則斧皆嶺南之謂也圖書編卷四十一
