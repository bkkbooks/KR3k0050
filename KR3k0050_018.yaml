body:
  text: 圗書編卷十八明章潢撰七政總敘七政者肇於虞書至漢劉歆張衡雅善星理厥術猶精歆曰太極運三辰五星于上元氣轉三統五行于下三辰合于三統五行合于五星三辰五星而相經緯也衡曰文曜麗乎天其動者七為日月五星故曰七政皆緯又曰日陽精宗也月隂精宗也五星五行宗也日行黃道月與五星皆出入黃道也是故聖人有作齊七政以立元測圭箭以候氣明九道以步月交遲速以推星考黃道之斜正辨天勢之升降而交蝕詳焉噫明乎此其於王政也視諸掌乎夫先王之以時齊七政也非曰文也以時作息保和也辨氛祲先幾也審象器定制也裁成範圍贊化也推衍德運明統也是以人神式序天地官也故日月合璧五星聨珠數之值不得已也非所以為祥然王者道吉丁辰亦可慶焉日月之會是謂合朔會之極不得已也非所以為沴然聖人扶陽抑隂必謹候焉春秋傳曰先王之正時也履端于始舉正于中歸餘于終又曰龍見而戒事火見而致用水昏正而裁日至而畢凡此皆以欽若其道者也日太陽之精主生養恩德人君之象也人君有道則日五色失道則日露其慝譴告人主而警戒之如史志所載日有食之日中烏見日中黑子日色赤日無光或變為孛星夜見中天光芒四溢之類是也日體徑一度半自西而東一日行一度一日一周天所行之路謂之黃道與赤道相交半出赤道外半入赤道內冬至之日黃道出赤道外二十四度去北極最逺日出辰日入申故時寒晝短而夜長夏至之日黃道入赤道內二十四度去北極最近日出寅日入戌故時暑晝長而夜短春分秋分黃道出赤道相交當兩極之中日出卯日入酉故時和而晝夜均焉月太隂之精主刑罰威權大臣之象大臣有德能盡輔相之道則月行常道度或大臣擅權貴戚宦官用事則月露其慝而變異生焉如史志所載月有食之月掩五星五星入月月光晝見或變為彗星陵犯紫宫侵掃列舍之類是也月體徑一度半一日行十三度百分度之三十七二十七日有餘一周天所行之路謂之白道與黃道相交半入黃道內半出黃道外出入不過六度如黃道出入赤道二十四也陽精猶火隂精猶水火則有光水則會影故月光生於日之所照魄生於日之所不照當日則光明就日則光盡與日同度謂之朔月行潛於日下與日會也分天體為四分謂初八及三十日月行近日一分謂之近一逺日三分謂之遐三通旦分受日光之度故半明半魄如弓張弦上弦昏見故光在西下弦旦見故光在東也衝分天中謂之望謂十五日之昏日入月出東西相望光滿而魄死也光盡體伏謂之晦謂三十日月行近於日光體皆不見也月行於白道與黃道正交之處在朔則日食在望則月食日食者月體掩日光也月食者月入暗虛不受日光也暗虛者日正對照處木星者東方木之精也其名歲星又名攝提星其色青其性仁君王之象也太歲在子午卯酉之歲上行三宿太歲在寅申巳亥辰戌丑未之年歲行二宿寅申巳亥辰戌丑未歲四四一十六子午卯酉歲三月一十二而行二十八宿十二年而周天火星者南方火之精也其名熒惑應朱雀之位其色赤其性禮為執法之象火星常以十月入太微垣受制而出入無常晨始見去日半次順日行九十二分度之五十三二百七十六日始留不行而旋退逆日行六十二度度之十七六十日復留十日不行而旋復順日行九十二分度之五十三二百七十六日而伏晨伏七十一日行五十一度去日二十度晨見東方夕伏七十一日土星者中央土之精也其名鎮星應勾陳之位其色黃其德信尊王之象常以甲辰元始建斗之歲晨始見去日半次順日行十五度之一八十日始留三十四日不行而旋退逆日行八十一分度之五一百一日復留三十三日有竒而旋復日行十五分度之一八十五日而伏晨伏二十一日有竒行二度七十五分去日十九度而晨見於東方夕伏二十一日有竒與日會五十九年周天金星者西方金之精也其名太白主白虎之位其色白其性義為將軍之象金星出以辰戌入以丑未晨見東方二百四十日而一入又夕出西方二百四十日又一入三十五日而復出晨始見去日半次逆行日一分度之二六日始留八日不行而旋退始順日行四十六分度之一三十三秒四十六日順疾日行一度九十二分度之十五一百八十四日而伏夕伏二十九日行四十九度五十分半而夕見晨伏三十九日行四十九度五十分水星者北方水之精也其名辰星其色黑應玄武之位其性智為衛尉之象春見奎婁夏見東井秋見角亢冬見牛出于辰戌入于丑未晨見東方夕見西方晨始見去日半次逆日行二度十日始留二日不行而旋順日行七分度之六十七日順疾日行一度三分度之一順遲十日共三十一度五十分十八日而伏伏十八日行三十四度五十分而夕見於西方晨伏十八日緯星五行之精木曰歲星火曰熒惑土曰填星金曰太白水曰辰星并日月而言謂之七政皆麗于天天行速七政行遲遲為速所帶故與天俱東出西入也五星輔佐日月斡旋五氣如六官分職而治號令天下利害安危由斯而出至治之世人事有常則各守其常度而行其或君侵臣職臣専君權政令錯謬風教陵遲乖氣所感則變化多端非復常理如史志所載熒惑入于匏瓜在黃道北三十餘度或勾已而行光芒震曜如王十器大白或犯狼星狼星在黃道南四十餘度或晝見經天與日爭明甚者變為妖星歲星之精變為欃槍熒惑之精變為蚩尤旗填星之精變為天賊太白之精變為天狗辰星之精變為枉矢之類如日之精變為孛月之精變為彗政教失於此變異見於彼故為政者尤謹候焉臨川吳氏曰天與七政八者皆動今人只將天做硬盤却以七政之動在天盤上行古來厯家蓋非不知七政亦左行但順行不可算只得將其逆退與天度相值處算之因此復遂謂日月五星逆行也譬如兩船使風皆趨北其一船行緩者見前船之快但覺自己之船如倒退南行然其實只是行緩趕前船不著故也今當以太虛中作一空盤却以八者之行較其遲速天行最速一日過了太虛空盤一度鎮星之行比天稍遲於太虛盤中雖略過了些子而不及於天積二十八月則不及天三十度歲星之行比鎮星尤遲其不及於天積十二個月與天爭差三十度熒惑之行比歲星更遲其不及于天積六十日爭差三十度太陽之行比熒惑更遲但在太虛之盤中一日行一周匝無餘無欠比天之行一日不及天一度積一月則不及天三十度太白之行稍遲於太陽但有疾時遲疾相準則與太陽同辰星之行又稍遲於太白但有疾時遲速相準則與太白同太隂之行最遲一日所行比天為差十二三四度其行遲故退度最多今人不曉以為逆行則謂太隂之行最疾也今次其行之疾遲天一土二木三火四日五金六水七月八天土木火其行之速過於日金水月其行之遲又不及日此其大率也七政行道附行兩角間行亢外三尺行氐外四尺行房中間行心內二尺行尾外十二尺行箕內六尺行斗柄一尺行牛上間行女外四尺行虛外六尺行危外七尺行室外十三尺行壁外十四尺行奎外十三尺行婁外九尺行胃外九尺行昴外十五尺行畢左角行觜內八度行參內十三尺行井中行鬼外四尺行星內十五尺行張內十八尺行翼內六尺行軫內三尺已上日月五星常行黃道也月行遇木火水金四星向之則速背之則遲五星行四方列宿各有所好惡所居遇其好者則留多行遲見早遇其惡者則留少行速見遲與常數並差至五度多至三十度許其辰星之行見伏之異晨見在雨水後立夏前夕應見在處暑後霜降前並不見驚蟄立夏立秋霜降四氣之內晨夕去日前後三十六度內十八度外有水火土金一星者見無者不見五星為五德之主其行或入黃道裏或出黃道表猶月行出有隂陽也然出入無常不可以算數求也其東行曰順西行曰逆順疾逆遲通而率之終為東行矣不東行不西行曰留與日相近不見曰伏與日同度曰合列宿所以定經天之體七曜所以布四時之政月因日而有晦朔弦望而遲疾不由日而定也五星却因日而有遲留伏逆日總敘日者衆陽之宗人君之象也光明外發魄體內全匿精陽輝圓而常滿人君之體也晝夜有節循度有常春生夏長秋收冬藏人君之政也星月資其光辰宿宣其氣生靈仰其照葵藿慕其恩人君之德也故日主道德養生佑仁恩人君有瑕必露其慝以告示焉日行於天一晝一夜行一度日出地上謂之晝日沒地下謂之夜謂之一日積三百六十五日有竒而周天謂之一嵗日寅也言光明盛也寅也日之先後不可名狀假甲子乙丑以異之其行乎天去極近而日長為暑去極逺而日短為寒去二極中晝夜均暄涼等以入大槩未能盡其微妙故聖人作厯以推步焉序之以時分之以八卦正之以中氣變之以節為二十四氣其詳著之厯法兹不能載也天文志曰日月行有道之國則有色光明人主吉昌百姓安寧其君無德其臣亂國則日為之失色不明日食者隂侵陽臣掩君也有亡國有死君有大水日食見星臣奪其君天下分爭故有變人君必修德以禳之日乃陽精一日繞地一周而在天為不及一度厯家遂以其度為行度而推其右行至三百六十五度四分度之一復與天會為一嵗其行黃道與天腹赤道交於卯酉而橫距於子午二道宿度多寡不同而各次宿度亦不等者蓋由冬夏二至之日平近兩極其度斂狹每度約得十之九春秋二分斜行赤道之交赤道所在為度既廣而又斜每度為十有一惟四立之日度在酌中之處餘則以漸而廣狹矣故隋劉焯推其有盈縮自冬至行一度五分漸減一二分至三四分以及赤道之交則正行一度從此復漸減之極於夏至止行九十五分自夏至後其行漸增與所減之數相似及冬至則復如前蓋一日行一度有餘日疾不及一度日遲以增虧之數相補一日止為一度從冬至距春分以行疾而積盈從春分距夏至以行遲而消其積盈比之常度猶差前故冬至距夏至皆曰盈段從夏至距秋分以行遲而積縮從秋分距冬至以行疾而消其積縮比之常度猶差後故夏至距冬至皆曰縮段然春分二日之前已交赤道則盈二度有餘秋分二日之後才交赤道則縮二度有餘故二分之際盈縮最多授時厯謂日在赤道之南行疾赤道之北行遲而後厯亦以春分距秋分行遲秋分距春分行疾雖然此一嵗日行之數也其積久必差嵗差一分餘而斜絡於二十八宿之間嵗久皆其經厯之道如捲苧絲為團絲絲雖纒絡重復而為周之數則一也唐虞時冬至日躔在子今未四千年而日躔在寅矣計其差以五十度則由堯舜而後萬餘年日躔反在午若復舊躔當在二三萬年之間逆而推之堯舜之前想亦如是日躔之起雖有不同姑以起於虛者立春定式而斟酌以用之可也均為二十四氣一氣得一十五日二十一分八十四秒七十三毫半黃道日之所行也半在赤道半在黃道內與赤道東交於角五少弱西交於奎十四少強赤道外極逺者去赤道二十四度斗二十一度是也其入赤道極逺者亦二十五度是也日南至在斗二十一度去極一百一十五度少強是也日最南去極最逺故景最長黃道二十一度出辰入申故日亦出辰入申晝行地上一百四十六少強故日短夜行地下二百一十六度少弱夜長自南至之後日去極稍近故景稍短日晝行地上度稍多故日稍長夜行地下度稍少故夜稍短日所在度北以至於夏至日在井中二十五度去極六十七少強是日最北去極最近景最短黃道井二十五度出寅入戌故日亦出寅入戌日晝行地上二百一十九度少弱故日長夜行地下一百四十六度少強故夜短自夏至之後日去極稍逺故景稍長日晝行地上度稍少故日短夜行地下度稍逺故夜長日所在度稍南故日出入稍南以至於南至而復初焉斗二十一井二十五南北相應四十八度春分日在奎十四少強秋分日在角五少弱此黃赤二道之交中也去極俱九十一度少強南斗處斗二十一井二十五之中故景居二至短長之中奎十四角五出卯入酉晝行地上夜行地下俱一百八十二度半強故日見之漏五十刻謂之晝夜同夫天之晝夜以日出沒為分人之晝夜以昏明為限日未出二刻半而明日入酉二刻半而昏故損夜五刻以益晝是以春秋分漏晝五十刻也洛書甄曜春夏考異皆云周天一百七萬一千里一度為二千九百三十二里七十一步二尺七寸四分周禮日至之景尺有五寸謂之地中鄭衆説土圭之長尺有五寸以夏至之日立表八尺其景與土圭等謂之地中鄭玄云凡影於地千里而差一寸景尺有五寸者南戴日下萬五千里也以此推之日當去地下八萬里矣則天徑之半也以勾股法言之以周率乘之徑率約之得五十一萬三千六百八十七里六十八步一尺八寸二分周天之數減甄曜度考異郵五十五萬七千百一十二里有竒凡一千四百六里二十四步六寸四分減舊度一千五百二十五里二百五十六步三尺三寸黃赤二道相與交錯其間相去二十四步以兩儀推之二道俱三百六十五度有竒而黃道差十一秒是以知天體圓如彈丸也萬厯五年十二月朔日日牛初度十二月太陽過宫正月在子二月在亥三月在戌四月在酉五月在申六月在未七月在午八月在巳九月在辰十月在卯十一月在寅十二月在丑二十四氣太陽過宫立春子雨水壬驚蟄亥春分乾清明戌穀雨辛立夏酉小滿庚芒種申夏至坤小暑未大暑丁立秋午處暑丙白露己秋分巽寒露辰霜降乙立冬卯小雪甲大雪寅冬至艮小寒丑大寒癸二十四氣太陽躔度正月立春虛四度雨水危九度後四日入亥躔娵訾之次二月驚蟄室九度春分璧五度後七日入戌躔降婁之次三月清明奎十一度榖雨婁九度後八日入酉躔大梁之次四月立夏胃十一度小滿昴十度後九日入申躔實沈之次五月芒種畢十三度夏至井二度後八日入未躔鶉首之次六月小暑井十七度大暑鬼一度後七日入午躔鶉火之次七月立秋栁十二度處暑張七度後九日入巳躔鶉尾之次八月白露翼五度秋分軫一度後十二日入辰躔夀星之次九月寒露軫十五度霜降角十一度後十三日入卯躔大火之次十月立冬氐五度小雪房四度後十一日入寅躔析木之次十一月大雪尾八度冬至箕五度後八日入丑躔星紀之次十二月小寒斗十一度大寒牛四度後四日入子躔玄枵之次日行天分晝夜别寒暑一日一周天晝夜行三百六十五度不及天一度積三百六十五度而與天會是一嵗一周天也一嵗十二月二十四氣其過宫分宫躔度悉依上所載而推步之不爽矣天人之道中而已矣天雖覆冒運旋變化莫測得其中焉莫能逃乎算也雖日用云為動靜靡常得其中焉莫能違其則也蓋天之中日也人之中心也人得天地之中以有生人心惟危道心惟微惟精惟一允執厥中者執中而人道管是矣曽謂日而不定位於天之中乎孟子曰天之髙也星辰之逺也茍求其故千歲之日至可坐而致也以日之中有定在歲歲日至定于此也是故天本無度周天三百六十五度以列宿而分其度也二十八宿無次以十二辰而分其次也雖日之運旋不離乎天之度星辰之次而度也次也皆以日而推步之耳天一晝夜一周而過一度日不及一度月不及十三度有竒果日行遲而不及乎天哉因天之過而謂日不及耳其實過者天之度也日之中如故也不及天者月之行也日之中如故也何也天以南北二極分中故十二辰以子午為中八卦以坎離為中坎象一陽在中所以子為天中也萬古一中不變惟日而已矣自日分為時時分為刻以至分秒皆由日起子中而分之也自日積為月月積為歲以至章蔀紀元皆由日起子中而積之也故以一日言之日起于子則為子時出卯入酉則時為卯酉厯十二辰而為日一日如是日日如之而每日起于子中者無改移焉以一月言之晦朔之間日與月交會于壬子則為朔周三十日而為月一月如是月月如之而每月交于子中者無改移焉以一歲言之冬至日與天會于子故十一月建子周十二月而為歲一歲如是歲歲如之而每歲會于子中者無改移焉可見厯數以日為主算厯當以子中為主而其有改移者天之宿度與星辰之次舍不齊耳日起子中曷嘗有過不及哉或曰日行黃道在南北二極之中謂子為天中定位可也然一歲之間或出黃道表或入黃道裏故時有寒暑晝有短長謂其一于子中可乎曰子午分天之中也試自日之晝行易見者觀之春秋二分出入卯酉正值黃道之中日當午謂之午時其八刻無增損也出黃道表謂之北陸則夏日至而晝極長矣日當午位斯為午時八刻果因之而加歟入黃道裏而行乎南陸則冬日至而晝極短矣日當午位斯為時之午也八刻豈因之而損歟雖陸有南北晝有短長之不齊而晝夜子午則一知晝之午則知夜之子矣曰據歲月日時而論信乎子為日之定位也然堯時日短星昴冬至日在虛固虛為子中矣夏商在女周在牛漢至宋在斗元在箕史册班班可考今積大明厯冬至箕三四度矣謂子為定位可乎曰天度密移惟其一日過一度也積一歲過三百六十五度積而至於六七十年則實移一度矣當其嵗嵗密移人莫之覺及移一度人始知之矣其實左旋而過之者日之起子終亥無改移也試以今厯太陽行度言之列宿三十餘度為一宫十一月冬至日躔析木寅寅宫也自至日積之三十日則過三十度而移一宫矣故十二月日躔星紀非丑宫乎然其所以躔丑宫者由天之過度星紀適當乎子非日過丑宫與月交也自十一月建子積至來歲十月建亥則過三百六十五度移十二宫而一周矣故十月日躔大火非卯宫乎然其所躔卯宫者由天之過度大火適當乎子非日過卯宫與日交也知一歲太陽之躔度則十百千歲可知矣堯時日躔虛宿由虛宿恰當子宫本位也從此天度密移數千百年厯虞夏商周冬至日躔女越牛去虛宿逺矣由天之過度牛女各適值子宫故日與天會由當時正值牛女之宿也而其會于子者何異堯之時哉又從此密移數百千年厯漢唐宋元冬至日躔經斗越箕去虛宿愈逺矣由天之過度各適值子宫故日與天會當時皆實在箕與斗之宿也而其會于子者何異堯之時哉若謂日躔于箕乃日之實過于箕宿次舍則今厯冬至當在建寅之月矣曷為仍在建子之月也可見密移者天之度而日位子中不可得而易也謂盤中之珠滚來滚去不在舊處者誤矣然則厯家歲差之説非歟曰彼亦非謂差在日也天有三百六十五度歲有三百六十五日餘分積算氣盈朔虛因而置閏其實天行盈乎日故盈月行縮乎日故虛盈虛原不繫日特據日行有定在者以為算而閏于是乎定焉斯中氣正嵗功成也治厯明時取諸事者此也若必先為一定之法以算天謂天有差者誤矣然則中星不必考歟曰考中星以察天度固矣豈曰夜半日不起子冬至日與天交晦朔月與日交皆不在子而必考中星以定日哉然則子之説與古人異甚果厯法歟抑厯理歟曰豫匪知厯者但子為天中日起子中坎為陽中離交坎中理也天地全數本起天一水生坎中辰肇子位孰謂厯法起算不由日起子中者以肇其端而天之髙星辰之逺不緣日有定位以審其過不及哉然則子如何而知之也曰知以吾之心耳萬事萬化未有不從中心起者故隨其事物變化而中心如故也心在人之中日在天之中不信然哉觀堯咨舜厯數執中足以蔽天人之道矣所以堯典莫先欽天厯象日乃太陽之精貞明不息而其體質本無增損但象一也方其東升及將西沉時乃覺其象頗大甚赤至中天則覺其象小而色稍淡何也光一也方其升於東方但覺其光尚隱而物皆無影其質尚暗而光不爍目及將西沉亦猶是也惟中天則大明朗照質亦洞然而人不敢仰視何也氣一也夏則朝暮涼而午漸熱冬則朝暮寒而午稍溫又何也以豫言之其殆精氣舒斂之不齊乎嘗觀諸火矣炭之方灼也其體已赤而其質暗故其光亦不遍及其昭明有融而氣焰爍人則其色反淡矣是故朝升暮沉由于陽氣翕聚故其象之大也色之赤也光之隱而質之暗也人皆可以目而對之猶方然之炭其焰尚內聚而未之散也若中天之時則陽氣已盡發散故覺其象小色淡光顯質朗而不敢凝眸仰視猶火炭炎炎外爍而其內外洞明有如此耳胡可盡歸於天體之逺近也否則近故大而赤矣何為其早暮涼而人可對以目也逺故小而淡矣何為其午反熱而人不敢仰也況一日之間由旦而晝由晝而暮人皆得而見之而何其不同一至此哉然萬古此日也試於一日之間即其象而觀之自有不待辨者惟知日則知月矣太陽之精在天為日在人為心日一也陽氣發散則明而為晝陽氣翕聚則暗而為夜日固通晝夜而不息而謂其陽氣無翕散焉不可也心一也指體而言則寂然不動指用而言則感而遂通心固合體用而不二而謂其陽神無寂感焉不可也易曰不専一則不直遂不翕聚則不發散在天之四時固如此在人之一刻亦如此不知四時者一日之積也一刻者一日之分也況在天不徒有是理而日固有實象之可見乎但觀於日之升沉見其明有聚散此所以日新日日新而貞明不息日誠在天之神物也曽謂人之精神不専一翕聚而可與日月合其明乎天地隂陽之精氣聚于日月果信日月之精氣本有斂而有散也其精氣散則熱斂則涼其精氣斂則覺其形質小散則覺其形質大非日月有小大也而小大涼熱亦不以逺近言也一精氣之斂散為之耳知此則所謂日初出大如車蓋及日中則如盤盂此不為逺者小而近者大乎所謂初出滄滄涼涼及其日中如探湯此不為近者熱而逺者涼乎皆可以斂散決之矣日月精氣發斂説天地大矣一本乎隂陽之屈伸隂陽微矣一顯諸日月之發散易繫辭曰一隂一陽之謂道生生之謂易隂陽不測之謂神而隂陽之所以生生不測者即日月升沉之際可象見而意會也是故觀之於一日也陽光初啓而為曉故率土皆明人物咸營營以作興陽光漸收而為昏故率土皆晦人物悉冥冥以宴息是晝夜晦明謂非陽精發斂為之歟觀之於一月也隂魄漸蘇其光漸滿故自朔上弦而為望隂魂漸消光體漸微故自望下弦而復晦是晦朔弦望謂非隂精發斂為之歟觀之于一嵗也冬至一陽生而隂氣漸返則為春為夏萬物悉流形而育神夏至一隂生而陽氣漸斂則為秋為冬萬物悉歸根而復命是節候寒暑晝夜短長生長收藏孰非隂陽斂散為之歟況其發也斂也非意之也即旦暮中天其象之小大色之濃淡凡有目者所共觀也知此則知古人所謂日初出大如車蓋及日中則如盤盂此不為逺者小而近者大乎非然也精氣散不敢寓目故覺其小精氣尚斂而未盡發泄則可以目及故覺其大也小大不以逺近論也明矣所謂初出滄滄涼涼及其日中如探湯此不為近者熱而逺者涼乎非然也精氣散則陽盛乃熱而午後秋初尚有積熱之餘威精氣斂則隂盛而寒將曙初春尚有積隂之餘威也寒熱不可以逺近論也昭昭矣信乎隂陽生生不測所以易字即日月之象而日月為天地間之神物歟雖然天人一也人之神猶夫天之日而心乃神明之舍也方其旦而寤寤而興也神則注心而遊於目及其夜而寢寢而寐也神則注心而歸於腎神之發斂亦猶之日也但日一也光發為晝光斂為夜時當昏夜雖明若離婁無徑寸之光人之目亦一也開則見明閉則見暗茍不用明即白晝為長夜矣然則通知晝夜得非人心之神歟天人合發交用互藏尚慎思之冬至日躔距赤道二十四度立冬與立春所距亦相近是時黃道橫而平近南極也立夏至立秋黃道橫平而近北極亦然蓋冬夏之日躔東西移差多南北移差少春秋則黃道斜移於南北雖東西行而南北差速於冬夏故春秋六七日間增減晝夜一刻而二至前後其晝夜長短增減一刻相去二十餘日矣是故冬夏增減之日遲春秋增減之日速日數未始均平也舊云日未出二刻半天先明日已入二刻半天方昏然此五刻不可以衆星出沒論但日始出為晝入則為夜也天暑則日髙而近北天寒則日低而近南立表木以測其影日在中天表景最短東西出沒之時表景最長以四時驗之中晝之景漸長漸短逐日不同於是以中晝表景極短之日為夏至以中晝表景極長之日為冬至其所以短者由日近北而髙所以長者由日近南而低也日髙則行天必久而晝長晝長則陽氣積多而暑矣日低則行天不久而晝短晝短則隂氣積多而寒矣寒暑之變驗日景之長短可知也日初出時見日大宜當熱而尚寒涼者隂凝而陽未勝也日中天時見日小宜寒涼而反漸暖漸熱者陽積盛而隂已消也申未熱愈於午者陽尤積盛故也廣海冬熱由冬日南行正當戴日之下故熱朔北夏寒夏日西北行朔北直當隂山之背處日光斜及故寒由此觀之南北寒熱亦由於日也日為衆陽之宗故其暖熱之氣皆出乎日也涼寒則日氣之不及處爾日漸長故暖日極長則熱矣日漸短故涼日極短則寒矣暖則陽氣之盛也而極則斯熱涼則隂氣之盛也而極則斯寒日在地上時多故地熱而井水寒也日在地上時少故地寒而井水溫也月總敘月者太隂之精積而成象魄而含影稟日之光以明照夜以之配日女主之象以之比德刑罰之義列之朝廷諸侯大臣之數故近日則光斂猶臣卑君尊而居也逺日則光滿為其守道循法蒙君榮華而體勢伸也當日則蝕猶臣僣君道而至于覆滅也盈極必缺示其不可久盈也行有弦望晦朔遲疾隂陽刑政之等威也日一日行一度月一日行十三度一千三百四十分度之四百九十四此平行之大率也人君有道人臣奉法則月行依度臣擅權則月行失道大臣用事兵刑失理則月行乍南乍北女主外戚擅權則月行或進或退此以其大略也若夫推求晦朔弦望等術皆著于厯法此不勝載春入陽厯秋入隂厯月行朱道則羅在日之春躔計在日之秋躔春入隂厯秋入陽厯月行黑道則羅在日之秋躔計在日之春躔冬入隂厯夏入陽厯月行青道則羅在日之夏躔計在日之冬躔冬入陽厯夏入隂厯月行白道則羅在日之冬躔計在日之夏躔起於女虛俱閏有閏極遲後一日半無閏極速先一日遇孛最疾行十四度餘四之三衝孛最遲行十三度餘算法積置日減二以三百二十四一之為順行減積日餘不滿順逆行數者以九因之中數二百四十八數除之不盡者為殘分在一百二十四以下入疾厯一百二十四以上入遲厯月乃隂精一日繞地一周而在天為不及十三度百分度之三十七厯家遂以不及之度為行度積二十九日五十三分五秒九十三毫而與日會為一月其行不指曰黃道乃出入黃道之內外而有九行九行止是一道其道與黃道相交如赤道然黃赤二道相距逺處二十三度九十分而月道距黃道六度二分而已其相交交之始強名曰羅㬋交之終強名曰計都自交始至交終月在黃道外名陽厯乃背羅向計之處也自交終至交始月在黃道內名隂厯乃背計向羅之處也月猶水道日猶陸道而羅計猶橋其嵗嵗改異者由日行嵗差之故也所謂九行者陽厯在夏至日躔之南夏為南乃南之南也名外朱道隂厯在冬至日躔之北北為內名內朱道在北而曰朱者冬至屬子若冬至日躔伏於地盤子位則月在黃道之上凡地以下為北上為南故曰內朱道乃北之南也茍冬至日躔反在午位則內朱道亦在黃道之北矣此不論反而論伏黑道之理亦然隂厯在夏至日躔之北名內黑道夏為南乃南之北也陽厯在冬至日躔之南名外黑道在南而曰黑者月在黃道之下凡地以上為南下為北故雖南而曰黑冬為北方北之北也月行朱道則羅在日之春躔計在日之秋躔月行黑道則羅在日之秋躔計在日之春躔陽厯在秋分日躔之東名外青道乃東之東也隂厯在春分日躔之東名內青道乃西之東也陽厯在春分日躔之西名內白道乃東之西也青白道不論反復若天地卯酉互位者然月行青道則羅在日之夏躔計在日之冬躔月行白道則羅在日之冬躔計在日之夏躔以內外分别朱黑青白八道而名九行者以八道之行交於黃道而穿度其間故通以九言也月從黃道之交出外一百八十一度七十九分六十七秒則終交於黃道從此入黃道之內復至初交則該三百六十三度七十九分三十六秒乃月道之一周計二十七日二十一分二十三秒二十四毫然其行有盈縮後漢劉洪以為疾行則十四度餘約四之三遲行則止十三餘度其間漸疾漸遲大率二百八十四日盈縮九匝授時厯謂每轉二十七日五十五分四十六秒月行三百六十八度三十七分四秒半為盈縮一匝其間遲疾之數相補遂以十三度三十六分八十七秒半為一日平行之度然其盈縮視孛星所在與其同位為最遲與其對衝為最疾所起有女虛危之不同宜取其起於危者立為定式而斟酌以用之可也萬厯五年十二月朔日月昏牛四度初二日丑三刻入子宫太隂行道遲疾相交之處月者太隂之精右行循白道白道者古謂九道實惟一道也白道半入黃道北半出黃道南相距逺處六度二分其相交處自北而南曰陽厯口世謂羅㬋自南入北曰隂厯口世謂計都羅㬋逆行黃道上每十有八日六十一分三十秒而移一度月行一交而移一度四十六分三十一秒二微五十七絲羅居午計居子則月道出黃道東是謂青道羅居子計居午則月道出黃道西是謂白道羅居酉計居卯則月出黃道南是謂赤道羅居卯計居酉則月出黃道北是謂黑道四道各分內外是曰八道八道出入黃道間是曰九道其實非二道也月行十有八年有竒而遍九道所謂春行青道夏行朱道秋行白道冬行黑道妄矣月行二十有七日五十五刻五十五分而一周天二十有九日五十三刻五分九十三秒而與日會周天為一轉中折半為轉中轉終前後月行疾日十有四度七十一分五十四秒轉終前後月行遲日十有二度一分八十一秒終中之間月行平日十有三度二十三分五十三秒其轉中度分曰孛月行最遲處也轉終月行三百六十八度七十三分五秒五十八微七十五絲折半為轉中月行之數月行二十七日二十一刻二十二分二十四秒行三百六十三度七十九分三十四秒一十九微五絲為一交終折半為交中交終前六度一十五分三十四秒曰正交交中後六度一十五分三十三秒曰中交正交近羅㬋中交近計都月離其度而與日遇則日食月離其度而與日對則月食也月行九道日有中道月有九行説見洪範本傳合以陽厯隂厯之説推之凡月行所交以黃道內為隂厯外為陽厯冬入隂厯夏入陽厯月行青道冬至夏至後青道半交在春分之宿當黃道東立冬立夏後青道半交在立春之宿當黃道東南至所衝之宿亦如之冬入陽厯夏入隂厯月行白道冬至夏至後白道交在秋分之宿當黃道西立冬立夏後白道半交在立秋之宿當黃道西北至所衝之宿亦如之春入陽厯秋入隂厯月行朱道春分秋分後朱道半交在夏至之宿當黃道南立春立秋後朱道半交在立夏之宿當黃道西南至所衝之宿亦如之春入隂厯秋入陽厯月行黑道春分秋分後黑道半交在冬至之宿當黃道北立春立秋後黑道半交在立冬之宿當黃道東北至所衝之宿亦如之四序離為八節至隂陽之所交皆與黃道相會故月行有九道所謂日月之行則有冬有夏也月行不由黃道亦不由赤道乃出入黃道之內外而有九行九行止是一道其道與黃道相交半如赤道然然黃赤二道相逺處二十三度九十分而月距黃道逺六度二分而已其相交處交之始強名曰羅㬋交之中強名曰計都自交始至交中月在黃道外名陽厯乃背羅向計之處也自交中至交始月在黃道內名隂厯乃背計向羅之處也月道猶水道日道猶陸道而羅計猶橋道其嵗嵗改異則由日行嵗差之故也且所謂九行者陽厯在夏至日躔之南夏為南乃南之南也名外朱道隂厯在冬至日躔之北北為內名內朱道在外而曰朱道者冬至屬子若冬至日伏躔於地盤子位則月在黃道之上凡地以下為北上為南故曰內朱道乃北之南也茍冬至日躔反在午位則內朱道亦在朱道之北矣此不論反而論伏黑道之理亦然隂厯在夏至日躔之北名內黑道夏為南乃南之北也陽厯在冬至日躔之南名外黑道在南而曰黑者月道在黃道之下凡地以上為南下為北故雖南而曰黑冬為北乃北之北也月行朱道則羅在日之春躔計在日之秋躔月行黑道則羅在日之秋躔計在日之春躔陽厯在秋分日躔之東名外青道乃東之東也隂厯在春分日躔之東名內青道乃西之東也陽厯在春分日躔之西名外白道乃西之西也隂厯在秋分日躔之西名內白道乃東之西也青白道不論反復若天地卯酉互位者亦然月行青道則羅在日之夏纒計在日之冬躔月行白道則羅在日之冬躔計在日之夏躔是故以內外分别朱黑青白為八道八道而曰九行者以八道之行交於黃道而穿度其間故通以九言也八道變易不常不可置於渾儀亦不可畫於星圗所可具者黃赤二道耳欲别於黃故塗以赤赤道與八道相交逺近朱道止十八度逺黑道至三十度逺青白二道約二十四度逺授時厯謂月從黃道之交出外一百八十一度八十九分六十七秒則中交於黃道從此入黃道內復至交初則皆三百六十三度七十九分三十六秒乃月道之一周計二十七日二十一分二十二秒二十四毫與古厯數不同焉月變總敘中興天文志或曰日月猶水火也火外光水含景故月之光生於日之所照其魄生於日之所不照也故當日則光盈照之全也自是而闕以日光之映有不全乃至於晦愈相近而不之照故也嘗觀諸水日之所照每借以為光仰而映于屋梁一有掩焉則向之光於屋梁者不復見也月之借於日猶是故夫月之光也以日之光有照焉則月之食也亦以日之光有掩焉耳人之于月猶見其光與食豈知有借於日哉太史遷曰月食常也日食不臧也是以春秋書日食不書月食月食固可無書也然常試以前説推之於月之食以知日之行於地中其亦有食焉不然則日光之全與月相望其何食之有月食所關豈細哉夫日月者象君臣也咎繇稱元首明股肱良元首叢脞股肱惰良惰之分關於君德月有光食顧不然乎於是月食而書赤可也湯誥曰萬方有罪罪在朕躬古之畏天戒者不以移於股肱嗚呼書月食其亦足以戒乎又曰孟康月星入月而星見於月中是為星食月月掩星而星滅不見是為月食星隋天文志曰月食五星嵗以飢熒惑以亂鎮星以殺太白以強國戰辰以女亂孝宣本始四年七月甲辰星在翼月犯之地節元年正月戊午月食熒惑熒惑在角亢成帝建始四年十一月食鎮星陽朔元年七月月犯心此其證也月體本無圓缺如懸黑漆丸於簷下映日必有光轉射暗壁其半邊因映日故有光而半邊元暗也遇望與日躔度相對半邊之光全向於地普照人間半邊之暗全向於天人不可見也及漸相近而側相映則向地之邊光漸少矣至晦朔則與日同經日與天近月與日近其半邊之光全向於天半邊之暗則向於地及漸相逺而側相映則向地之邊光漸多矣故月體之光暗半輪轉旋人目所不及因謂其有圓缺耳然其與日對望為地所隔猶能受日之光者陰陽精氣之潛通如吸鐵之石感霜之鍾莫或間之也月明不全瑩而似瑕者如懸明鏡照水之處則瑩映地之處則瑕世以為山河所印之景是也朱子曰月體常圓無闕但常受日光為明初三四是日在下照月西邊明人在這邊望只見上弦光十五六則日在地下其光由地四邊而射出月被其光而明月中是地影古今人皆言月有闕惟沈存中云無闕月無盈闕人看得有盈闕蓋晦日則月與日相疊了至初三方漸漸離開去人在下靣側看見則其月闕至望日則月與日正相對人在中間正看見則其光方圓厯家舊説月朔則去日漸逺故魄死而明生既望則去日漸近故魄生而明死至晦而朔則又逺日而明復生所謂死而復育也此説誤矣若果如此則未望之前西近東逺而始生之明當在月東既望之後東近西逺而未死之明却在月西矣安得未望載魄於西既望終魄於東而遡日以為明乎故唯近世沈括之説乃為得之蓋括之言曰月本無光猶一銀丸日耀之乃光耳光之初生日在其傍故光側而所見才如鈎日漸逺則斜照而光稍滿大抵如一彈丸以粉塗其半側視之則粉處如鈎對視之則正圓也近歲王普又補其説月生明之夕但見其一鈎至日月相對而人處其中方得見其全明必有神人能凌倒景傍日月而往參其間則雖弦晦之時亦復見其全明而與望夕無異耳以此觀之則知月光常滿但自人所立處視之有偏有正故見其光有盈有虧非既死而復生也若顧兔在腹之間則世俗桂樹蛙兔之傳其惑久矣或者以為日月在天如兩鏡相照而地居其中四傍皆空水也故月中微黑之處乃鏡大地之影略有形似而非真有是物也斯言有理足破千古之疑矣問日月陰陽之精氣所謂終古不易與光景常新者其判别如何非以今日已映之光復為來日將升之光固可略見大化無息而不資於已散之氣也然竊嘗觀之日月虧食隨所蝕分數則光沒而魄存是魄常在而光有聚散也所謂魄者在天豈有形質耶或乃氣之所聚而所謂終古不易者耶曰日月之説沈存中筆談中説得好日蝕時亦非光散但為物掩耳若論其實須以終古不易者為體但其光氣常新耳然亦非但一日一個蓋頃刻不停也西山真氏曰月太陰也本有質而無光其盈虧也以受日光之多少月之朔也始與日合越三月而明生八日而上弦其光半十五日而望其光滿此所謂三五而盈也既望而漸虧二十三日而下弦其虧半三十日而晦其光盡此所謂三五而闕也方其晦也是謂純陰故魄存而光泯至日月合朔而明復生焉臨川吳氏曰古今人率謂月盈虧蓋以人目之所覩言而非月之體然也月之體如彈丸其遡日者常明常明則常盈而無虧之時當其望也日在月之下而月之明向下是以下之人見其體之盈及其弦也日在月之側自下而觀者僅得見其明之半於是以弦之月為半虧及其晦也日在月之上而月之明亦向上自下而觀者悉不見其明之全於是以晦之月為全虧儻能飛步太虛傍觀於側則弦之月如望乘凌倒景俯視于上則晦之月亦如望月之體常盈而人之目有所不見以目所不見而遂以為月體之虧可乎知在天有常盈之月則知人之曰盈曰虧皆就所見而言爾曾何損於月哉氣朔滅沒唐一行以前滅沒之術不同今授時厯蓋倣一行法也沒用氣盈而推滅用朔虛而求所謂沒者期內三百六十五日二十四分二十五秒均為二十四氣每氣均為三候每候均為五段一期為三百六十段每段為一日一分四十五秒六十二毫半如以冬至為第一段則小寒為第十六段餘以類推其段日日有之凡兩段跨三日先一日九十九刻左右後一日一刻左右二段之間雖止一日一分四十餘秒但一日整居其間而餘數跨在前後二日首尾故曰跨三日若一日之段在九十八刻五十四秒三十七毫半以後者為沒沒之次日必無其段無段之日其先一日必為沒矣所謂滅者每朔二十九日五十三分五秒九十三毫常朔之日辰為第一段常望為第十六段餘以類推其段亦日日有之或其日之段在九十八刻四十三秒五十三毫一十芒以後為滅若一日內凡刻分極少是夜半後刻分極多是夜半前夜半前是一日極終處沒滅乃已極之義故選日者或忌之晦朔弦望皆因於日也晦月與日會全無光也朔會而復蘇也弦有上下相去四分天之一也望則相對相去四分天之二也陰陽各一其精日月即為之互藏而其明生焉但日則常明不息月則三五圓缺而或晦其明乃天地自然之盈虛也是故月之明雖晦而其魄亦萬古不息觀于晦朔先後數日其魄之行于天也本不可見及其日食如有物以掩之則其魄之可見者以日而見之也魄之常運於天也不信然哉日之行于天也厯一晝夜而周乎東西厯春夏秋冬而周乎南北月之晝夜周乎東西者不及乎日而一月之間則東西南北莫不周焉故二十七日有奇與天會二十九日有奇與日會厯十二辰而月建一周嵗乃成焉月亦何其勞歟蓋日天道也君道也夫道也月地道也臣道也妻道也易於坤之卦爻曰利牝馬之貞曰先迷後得主曰或從王事無成有終曰地道無成代有終也是故知坤則知月矣知乾坤則知日月矣豈特知日月哉凡兩間之陰陽消息莫不知之矣故易字為日月之象漢上朱氏曰繫辭傳懸象著明莫大乎日月虞翻曰謂日月懸天成八卦象三日暮震象月出庚朱子曰三日第一節之中月生明之時也蓋始受一陽之光昏見於西方庚地八日兌象月見丁朱子曰八日第二節之中月上弦之時受二陽之光昏見于南方丁地十五日乾象月盈甲壬朱子曰十五日第三節之中月既望之時全受日光昏見于東方甲地是為乾地十六日旦巽象月退辛朱子曰十六日第四節之始始受下一陰為巽而成魄以平旦而沒于西方辛也二十三日艮象月消丙朱子曰二十三日第五節之中復生中一陰為艮而下弦以平旦而沒于南方丙也三十日坤象月滅乙癸朱子曰三十日第六節之中全變三陽而光盡體伏於西北一月六節既盡而禪於後月復生震卦云此朱子所注參同契也真西山蠔之讀書記而釋之曰震一兌二乾三巽四艮五坤六十五日為一節晦夕朔旦則坎象水流戊日中則離象火就已成戊己土位象見於中西山曰朔旦震始用事為日月陰陽交感之初道家象此以為修養之法易卦納甲總論納甲之説京房易傳有之魏伯陽參同契曰三日出為爽受庚西方八日兌受丁上弦平如繩十五乾體就成滿甲東方十六轉受統巽辛見平明艮直於丙南下弦二十三坤乙三十日東方喪其明節盡相禪與繼體復生明壬癸配甲乙乾坤括始終其疏云震象三日月出於庚兌象上弦月見于丁乾象望日月滿於甲巽象十六日月虧於辛艮象下弦月消於丙坤象晦日月沒於乙此指二八月晝夜均平之時若以厯法言則晝夜有長短若晝短日沒於申則月合於申望於寅矣若晝長日沒於戌則月合于戌望於辰矣十二月之中三日之月未必盡見庚十五日之月未必盡見甲合朔有先後則上下弦未必盡在八日二十三日望晦未必盡在十五三十日也又虞翻易傳曰日月懸天成八卦象三日暮震象月出庚八日兌象月見丁十五日乾象月盈甲壬十六日旦巽象月退辛二十三日艮象月消丙三十日坤象月滅乙癸晦夕朔旦則坎象水流戊日中則離象火就已成戊己土位而象見于中約甲之説虞氏比參同契為備而坎離戊巳始有歸著故詳記之書武成曰惟一月壬辰旁死魄嘗讀書因考哉生明既生魄而有疑于旁死魄之説蓋武成惟一月壬辰旁死魄書傳乃云一月二日即以二日壬辰推之戊午師渡孟津乃二十有八日癸亥陳于商郊甲子爽昧受率其旅若林會於牧野乃二月初二初四也以是數至四月安得有丁未庚戌乎非四月哉生明後既生魄前無丁未與庚戌也旁死魄之義未明故耳夫月之於每月也初三明生十八魄生初八二十三半明半魄惟望則明全晦則魄全此乃一定而不易者明生則魄死魄生則明死所謂旁死魄者其在望後十六七之時乎何也因其明死故于初三謂之哉生明因其魄死故于十八謂之哉生魄旁者旁此也且月之與日近一逺三上弦昏見故光在西而既生明下弦則旦見故光在東而既生魄十五之昏日入月出東西相望光滿魄死謂之望三十日月行近日月皆不見而明盡體伏謂之晦但望亦非定于十五之夜也早則十四或十三遲則十六或十七故上弦下弦亦如之知此則明與魄彼生此死黑白判然不可混也可見晦則魄全而明盡死望則明全而魄盡死每月初二其魄尚全其明未蘇謂之旁死明可也何以謂之旁死魄耶果於旁死魄之義炳然不眩則自一月壬辰以至四月丁未庚午其中癸亥甲子皆不爽也奈何月體黑白凡有目者皆見之今之月猶古也乃以合朔為死魄是指白為魄指黑為明胡為顛倒一至此極所以自一月至四月甲子皆錯亂猶以訛傳訛守為定論莫敢有議其非焉者嗚呼月本懸象著明人所共覩其生魄生明又一定不移釋經者至以魄為明以生為死悉宗信之不疑則武成經文雖本不亂也乃以意見更定之又何足怪况引伸觸類其中如理義之精微不可測政事之古今不相沿悉定其説以為萬世不刋之典者又豈特旁死魄一端而已哉一陰一陽之謂道乾陽物也坤陰物也天地一陰陽也而日月則陰陽之精焉周天三百六十五度有奇故一歲有三百六旬有六日冬至一陽生人知陽氣復而漸升至巳月純陽為乾矣夏至一陰生人知陰氣姤而漸升至亥月純陰為坤矣然陽來則陰往陰來則陽往此所以寒暑往來相推成歲而不知寒暑之相推即日月之相推也何也自周天三百六十餘度周歲三百六十日從中分之各得一百八十也十一月中日在地之極下處月在天之最上處冬至一復則日從地而漸上月從天而漸下日上一百八十度厯一百八十晝夜而五月中則陽氣全而于卦為純乾矣其時月在地之極下處日在天之最上處夏至一姤則月從地而漸上日從天而漸下月上一百八十度厯一百八十晝夜而又十月中則陰氣全而于卦為純坤矣所以冬春卦爻皆陽秋冬卦爻皆陰一陰一陽往來升降天地間亳釐不爽陽推出陰故寒陰推出陽故暑寒暑相推而歲之所由成者其理甚明日月相推而明之所由生者其精微不于此可窺也耶故徵之厯家冬至距夏至皆為盈段夏至距冬至皆為縮段也雖云月之行也每月周天與日不同而其望則有定也故夏至望在地極下處冬至望在天最上處即此言之其所以與日交者不于上下而定之耶雖曰日月交會每嵗十二次然日行黃道月行白道白道半入黃道內半出黃道外日夏行北陸冬行南陸而月行白道其出入黃道不過六度故曰白道與黃道正交之處日月會焉而冬夏二至之交不于子午之位而定之耶奈何古今論日月者止以望朔定其明之薄食不知明之所以明者實在于兹也不然豈聖人論歲成于寒暑之相推者為可信而明生于日月之相推者獨無見歟且繫辭首章云日月運行一寒一暑寒暑之相推由于日用之相推不亦有明證歟是故冬夏二至者天地一歲之大交會也朔望者每月日月兩交會也此乾坤姤復之機在人猶其在天地也懸象著明莫大乎日月其相推明生夫固有象之可覩者人徒知求厯家日月相食之法而不知求日月相生之理又何怪其不知求吾聖人明明德之學耶日陽精也月陰精也日月于每月交會謂之朔對衝謂之望厯家止以朔望推步其薄食豫于此得其搆精之象焉即其所謂日月相推而明生也即所謂陰陽之精互藏其宅也何也陰麗于陽謂之離離為日陽陷于陰謂之坎坎為月日月本陰陽之互藏是以晦時日月同度同道適相交合而既合則將復蘇為朔朔晦之中月光體滿而為望朔之會也或度數有逺近然交雖合體而日不食者其常也望之對也或度數有參差然雖衝分中天而月不食者其常也陰施陽受一盈一虛絪緼摩蕩變化無窮此所以貞明萬古不息也若其薄食者反交亢敵乃其變焉耳但在厯家則謂日蝕者只是月道與日道交交有逺近故有蝕不蝕也豈知謂之交則食也則一歲一十二交十二望當二十四食矣曷為有數載不食者乎茍謂近則蝕也三十日兩體相疊宜日食矣曷謂月為之晦而日食反在朔乎謂逺則不食也則朔前不當晦而其交則或三兩分則其蝕亦如之或從邊而過即宜食其邊矣曷謂每月多不食乎况曰同宫而度或不同同度而分數不同誠有然者若十字相衝之處雖欲謂其不容合焉不可得也儒者謂陽為萬象之主陽盛則不蝕而日蝕者陽之衰也殊不知陽盛則當蝕而不蝕矣曷為極盛之世不免日食而春秋二百四十二年陽道本微日蝕乃止三十六也日食由陽之衰矣則月食必為陽之盛曷為一月之間日蝕于朔而月又蝕于望也陰陽盛衰其理信然矣必精于厯者乃能前知于數年之前也要之其論皆是也特知其一不知其二知其變不知其常耳所謂常者豈有他哉日月搆精于朔望之交會即所謂日月相推而明生陰陽之精互藏其宅是也或有時而蝕者特其變焉耳是故行道誠有逺近而或表或裏非逺近之義乎陰陽誠有盛衰而相反相亢非盛衰之義乎掩必在表則不掩必在裏陽盛則陰不反亢而反亢即為衰此所以搆精者其常也薄食者其變也惟僧一行有其交不軌道則食之説但其所謂不軌道者不知果何所指而又云遇交則有薄食之變不亦自悖其説歟又舊厯云􅖍令中間食既戴日之下所虧才半化外反觀則交而不食化外食既戴日之下所虧才半中間反觀則交而不食何則日如大赤丸月如小黑丸共懸一索日上而月下即其下正望之黑丸必掩赤丸似食之既及旁觀有逺近之差則食數有多寡矣日行有四時之異月行有九道之殊日行極南月在陰厯則中國見食分多月在陽厯則中國見食分少開北戶而向日北處月在陽厯反食多在陰厯反食少夏至近中國冬至近交廣惟戴日之下則在酌中之間凡食在午前見食早午後見食遲地偏西見食早偏東見食遲此其推步之差實因四時早晚及地偏南北東西而加減然東西南北不可以里路計南北則考表景及北極出地之數東西亦考表景及中星之所在以為加減之法若大史所驗徒以中國所見者言之而已耳即此觀之其所謂表裏逺近者不可以類推乎然此亦自其推步薄食之法言之耳曷足以窺其原也雖然豫非無據也乾坤坎離姤復得之伏羲之卦畫日月相推明生得之孔子之繫辭故既演之為日月相推明生之圖復演之為日月搆精之圖于以請正精厯理者或問陰陽之精互藏其宅先儒特論其理也子謂日陽精月陰精其所互藏者有實象焉何歟曰陰陽皆有其精日月各得其貞而日月懸象於天蓋可覩也彼日體陽而其中本陰月體陰而其中本陽聖人已於坎離二卦示之象矣觀火中有黑外明內暗水外黑而中明其根陰根陽者本如此也故日受月之精則浮于表而為影其影蕩漾其色黑月受日之精則著於表而為光其光瑩徹其色白而晦朔之交乃其相受之時也同度同道二物相遇而魄氣相交月得日精是以魄而受魂也其象如圓炭燃火漸次而生明焉日得月陰是以形而受氣也其象如圓火之生熖動蕩而成影焉明漸生則其魄漸死魄死則化為日表之氣故自朔至望日表之氣全盛日表之光全盈既望之後則月之明漸死而日表之氣復報生於月之魄至晦則魄復全而明死盡矣故日月再會而重受其精以相生於無窮也易云剛柔相摩又相推明生聖經豈妄語哉莊子謂日火外影金水內影即此義也又問子以合朔乃互藏其精為相推明生其常也而以日月之食為變果非日月之常道歟曰日月運行本有常度而乖其常度是以相食詩小雅十月之交章有云日月告凶不用其行謂非乖其行度之常而何衆言淆亂折衷于聖經云耳張子謂朔望之際精魄反交則光為之食亦有見于斯歟然昔人火鏡圓珠與夫借日為光之説亦具録於天道編以俟精達造化之君子云論交朔月必有朔古之天子諸侯月必告朔所以孔子欲存告朔之餼先儒謂稟命君親為禮之大者豈徒備其禮文已哉蓋朔必定于日月之交會是日月交會則其氣復蘇而郊迎之典正以迎其復蘇之氣告朔視朔之禮所以為甚重也詩小雅云十月之交朔日辛卯然則朔必定於日月之交也不於此可證已乎一行乃謂陰陽厯交或在四立或在分至所交並同而出入之行異蓋以日道為主而驗月道之交或月道自裏而交於日道之表或自表而交於日道之裏故謂陰陽厯交是也謂所交則同而出入之行異者以月道交日道春分與秋分同冬至與夏至同其於四立亦然特其所以不同者黃道居中月道或出其東而入其西或入其北而出其南所謂東交于角西交于奎是也不知日月之交會每月之朔望皆然豈徒二至二分四立為然哉特朔交為初交望交為中交皆視陰陽厯以正其行耳且朔必以日月之交會為定法則雖二小三大或三大二小一日為朔十五日為望俱不甚差否則望或在于十四十六而朔之拘為一日者非真朔矣此所以論朔當必求乎交也然日月交必食者何也厯家止論其變而不知天道之常無怪也然日或食於晦或食於二日而不食於朔豈不交而亦食或食於交前交後之謂乎觀春秋日食三十五書朔者二十七其不書朔者八故公羊傳謂不書朔者食二日也榖梁傳謂不食朔者晦也此皆由月法拘於一大一小之相間耳惟左傳謂不書朔官失之也斯言得之矣詩小雅云朔日辛卯日有食之然則日食必於朔也不於此可證已乎可見論定朔不於日月之交而不知月法小大或二或三之相錯論日食不於朔而或食於晦或食於二日之無定時者皆由厯法之不正也噫十月之交朔日辛卯日有食之止十二字耳而古今論定朔論日食可謂萬世厯法之凖者恃有此經文在也凡世家一切淆亂悉宜折衷於聖經於此益信月令孟春之月日在營室昏參中旦尾中其日甲乙其帝大皥其神勾芒其蟲鱗其音角律中大蔟其數八其味酸其臭羶其祀戶祭先脾東風解凍蟄蟲始振魚上冰獺祭魚鴻鴈來天子居青陽左個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達是月也以立春先立春三日太史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿大夫於朝命相布德和令行慶施惠下及兆民慶賜遂行毋有不當乃命太史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常是月也天子乃以元日祈榖於上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒是月也天氣下降地氣上騰天地和同草木萌動王命布農事命田舍東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之田事既飭先定準直農乃不惑是月也命樂正入學習舞乃修祭典命祀山林川澤犧牲毋用牝禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵毋聚大衆毋置城郭掩骼埋胔是月也不可以稱兵稱兵必天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀孟春行夏令則雨水不時草木蚤落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入仲春之月日在奎昏弧中旦建星中其日甲乙其帝大皥其神勾芒其蟲鱗其音角律中夾鍾其數八其味酸其臭羶其祀戶祭先脾始雨水桃始華倉庚鳴鷹化為鳩天子居青陽大廟乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達是月也安萌芽養幼少存諸孤擇元日命民社命有司省囹圄去桎梏毋肆掠止獄訟是月也玄鳥至至之日以大牢祀于髙禖天子親往后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前是月也日夜分雷乃發聲始電蟄蟲咸動啓戶始出先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災日夜分則同度量鈞衡石角斗甬正權概是月也耕者少舍乃修闔扇寢廟畢備毋作大事以妨農之事是月也毋竭川澤毋漉陂池毋焚山林天子乃鮮羔開冰先薦寢廟上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之仲丁又命樂正入學習樂是月也祀不用犧牲用圭璧更皮幣仲春行秋令則其國大水寒氣總至冦戎來征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱暖氣早來蟲螟為害季春之月日在胃昏七星中旦牽牛中其日甲乙其帝大皥其神勾芒其蟲鱗其音角律中姑洗其數八其味酸其臭羶其祀戶祭先脾桐始華田鼠化為鴽虹始見萍始生天子居青陽右個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達是月也天子乃薦鞠衣于先帝命舟牧覆舟五覆五反乃告舟備具于天子焉天子始乘舟薦鮪于寢廟乃為麥祈實是月也生氣方盛陽氣發泄勾者畢出萌者盡達不可以內天子布德行惠命有司發倉廩賜貧窮賑乏絶開府庫出幣帛周天下勉諸侯聘名士禮賢者是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞田獵罝罘羅網畢翳餧獸之藥毋出九門是月也命野虞無伐桑柘鳴鳩拂其羽戴勝降于桑具曲植籧筐后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服無有敢惰是月也命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良百工咸理監工日號毋悖于時毋或作為淫巧以蕩上心是月之末擇吉日大合樂天子乃率三公九卿諸侯大夫親往視之是月也乃合纍牛騰馬遊牝于牧犧牲駒犢舉書其數命國難九門磔攘以畢春氣季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不收行秋令則天多沈陰淫雨蚤降兵革並起孟夏之月日在畢昏翼中旦婺女中其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中仲吕其數七其味苦其臭焦其祀竈祭先肺螻蟈鳴蚯蚓出王瓜生苦菜秀天子居明堂左個乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗是月也以立夏先立夏三日太史謁之天子曰某日立夏盛德在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏於南郊還反行賞封諸侯慶賜遂行無不欣説乃命樂師習合禮樂命太尉贊桀俊遂賢良舉長大行爵出祿必當其位是月也繼長增髙毋有壞墮毋起土功毋發大衆毋伐大樹是月也天子始絺命野虞出行田原為天子勞農勸民毋或失時命司徒巡行縣鄙命農勉作毋休于都是月也驅獸毋害五榖毋大田獵農乃登麥天子乃以彘嘗麥先薦寢廟是月也聚畜百藥靡草死麥秋至斷薄刑決小罪出輕繫蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服是月也天子飲酎用禮樂孟夏行秋令則苦雨數來五榖不滋四鄙入保行冬令則草木早枯後乃大水敗其城郭行春令則蝗蟲為災暴風來格秀草不實仲夏之月日在東井昏亢中旦危中其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中𬎼賔其數七其味苦其臭焦其祀竈祭先肺小暑至螳蜋生鵙始鳴反舌無聲天子居明堂大廟乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗養壯佼是月也命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈榖實是月也農乃登黍天子乃以雛嘗黍羞以含桃先薦寢廟令民毋艾藍以染毋燒灰毋暴布門閭毋閉關市毋索挺重囚益其食遊牝别羣則縶騰駒班馬政是月也日長至陰陽爭死生分君子齋戒處必掩身毋躁止聲色毋或進薄滋味毋致和節嗜欲定心氣百官靜事毋刑以定晏陰之所成鹿角解蟬始鳴半夏生木堇榮是月也毋用火南方可以居髙明可以逺眺望可以升山林可以處臺榭仲夏行冬令則雹凍傷榖道路不通暴兵來至行春令則五榖晚熟百螣時起其國乃飢行秋令則草木零落果實早成民殃於疫季夏之月日在栁昏火中旦奎中其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中林鍾其數七其味苦其臭焦其祀竈祭先肺溫風始至蟋蟀居壁鷹乃學習腐草為螢天子居明堂右個乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器髙以粗命漁師伐蛟取鼉登龜取黿命澤人納材葦是月也命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福是月也命婦官染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良毋敢詐偽以給郊廟祭祀之服以為旗章以别貴賤等級之度是月也樹木方盛命虞人入山行木毋有斬伐不可以興土功不可以合諸侯不可以起兵動衆毋舉大事以搖養氣毋發令而待以妨神農之事也水潦盛昌神農將持功舉大事則有天殃是月也土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆季夏行春令則榖實鮮落國多風咳民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風寒不時鷹隼蚤鷙四鄙入保中央土其日戊巳其帝黃帝其神后土其蟲倮其音宫律中黃鍾之宫其數五其味甘其臭香其祀中霤祭先心天子居大廟大室乘大路駕黃駵載黃旗衣黃衣服黃玉食稷與牛其器圜以閎孟秋之月日在翼昏建星中旦畢中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中夷則其數九其味辛其臭腥其祀門祭先肝涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮天子居總章左個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深是月也以立秋先立秋三日太史謁之天子曰某日立秋盛德在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於廟天子乃命將帥選士厲兵簡練桀俊専任有功以征不義詰誅暴慢以明好惡順彼逺方是月也命有司修法制繕囹圄具桎梏禁止姦慎罪邪務搏執命理瞻傷察創視折審斷決獄訟必端平戮有罪嚴斷刑天地始肅不可以贏是月也農乃登榖天子嘗新先薦寢廟命百官始收斂完隄防謹壅塞以備水潦修宫室培墻垣補城郭是月也毋以封諸侯立大官毋以割地行大使出大幣孟秋行冬令則隂氣大勝介蟲敗榖戎兵乃來行春令則其國乃旱陽氣復還五榖無實行夏令則國多火災寒熱不節民多瘧疾仲秋之月日在角昏牽牛中旦觜觽中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中南吕其數九其味辛其臭腥其祀門祭先肝盲風至鴻鴈來玄鳥歸羣鳥養羞天子居總章大廟乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深是月也養衰老授几杖行糜粥飲食乃命司服具飭衣裳文繡有恆制有小大度有長短衣服有量必循其故冠帶有常乃命有司申嚴百刑斬殺必當毋或枉撓枉撓不當反受其殃是月也乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者備當上帝其饗天子乃難以達秋氣以犬嘗麻先薦寢廟是月也可以築城郭建都邑穿竇窖修囷倉乃命有司趨民收斂務畜菜多積聚乃勸種麥毋或失時其有失時行罪無疑是月也日夜分雷始收聲蟄蟲壞户殺氣浸盛陽氣日衰水始涸日夜分則同度量平權衡正鈞石角斗甬是月也易關市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂凡舉大事毋逆大數必順其時慎因其類仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五榖復生行冬令則風災數起收雷先行草木早死季秋之月日在房昏虛中旦栁中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中無射其數九其味辛其臭腥其祀門祭先肝鴻鴈來賔爵入大水為蛤菊有黃華豺乃祭獸戮禽天子居總章右個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深是月也申嚴號令令百官貴賤無不務內以會天地之藏無有宣出乃命冢宰農事備收舉五榖之要藏帝藉之收於神倉祗敬必飭是月也霜始降則百工休乃命有司曰寒氣總至民力不堪其皆入室上丁命樂正入學習吹是月也大饗帝嘗犧牲告備于天子合諸侯制百縣為來歲受朔日與諸侯所稅於民輕重之法貢職之數以逺近土地所宜為度以給郊廟之事無有所私是月也天子乃教於田獵以習五戎班馬政命僕及七騶咸駕載旌旐授車以級整設于屏外司徒搢撲北面誓之天子乃厲飾執弓挾矢以獵命主祠祭禽于四方是月也草木黃落乃伐薪為炭蟄蟲咸俯在內皆墐其戶乃趣獄刑毋留有罪收祿秩之不當供養之不宜者是月也天子乃以犬嘗稻先薦寢廟季秋行夏令則其國大水冬藏殃敗民多鼽嚏行冬令則國多盜賊邊境不寧土地分裂行春令則暖風來至民氣懈惰師興不居孟冬之月日在尾昏危中旦七星中其日壬癸其帝顓頊其神玄𡨕其蟲介其音羽律中應鍾其數六其味鹹其臭朽其祀行祭先腎水始氷地始凍雉入大水為蜃虹藏不見天子居玄堂左個乘玄輅駕鐵驪載玄旗衣黑衣服玄玉食黍與彘其器閎以奄是月也以立冬先立冬三日太史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡是月也命太史釁龜策占兆審卦吉凶是察阿黨則罪無有掩蔽是月也天子始裘命有司曰天氣上騰地氣下降天地不通閉塞而成冬命百官謹蓋藏命司徒循行積聚無有不斂壞城郭戒門閭修鍵閉慎管籥固封疆備邊竟完要塞謹關梁塞徯徑飭喪紀辨衣裳審棺椁之薄厚塋丘壟之大小髙卑厚薄之度貴賤之等級是月也命工師效功陳祭器案度程毋或作為淫巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情是月也大飲蒸天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀勞農以休息之天子乃命將帥講武習射御角力是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨於下其有若此者行罪無赦孟冬行春令則凍閉不密地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土地侵削仲冬之月日在斗昏東壁中旦軫中其日壬癸其帝顓頊其神玄𡨕其蟲介其音羽律中黃鍾其數六其味鹹其臭朽其祀行祭先腎冰益壯地始坼鶡旦不鳴虎始交天子居玄堂大廟乘玄路駕鐵驪載玄旗衣黑衣服玄玉食黍與彘其器閎以奄飭死事命有司曰土事毋作慎毋發蓋毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死民必疾疫又隨以喪命之曰暢月是月也命奄尹申宫令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習毋有不禁乃命大酋秫稻必齊麯蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸天子命有司祈祀四海大川名源淵澤井泉是月也農有不收藏積聚者馬牛畜獸有放佚者取之不詰山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦是月也日短至陰陽爭諸生蕩君子齋戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待陰陽之所定藝始生荔挺出蚯蚓結麋角解水泉動日短至則伐木取竹箭是月也可以罷官之無事去器之無用者塗闕廷門閭築囹圄此以助天地之閉藏也仲冬行夏令則其國乃旱氛霧𡨕𡨕雷乃發聲行秋令則天時雨汁瓜瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭民多疥癘季冬之月日在婺女昏婁中旦氐中其日士癸其帝顓頊其神玄𡨕其蟲介其音羽律中大吕其數六其味鹹其臭朽其祀行祭先腎鴈北鄉鵲始巢雉雊雞乳天子居玄堂右個乘玄路駕鐵驪載玄旗衣黑衣服玄玉食黍與彘其器閎以奄命有司大難旁磔出土牛以送寒氣征鳥厲疾乃畢山川之祀及帝之大臣天之神祗是月也命漁師始漁天子親往乃嘗魚先薦寢廟冰方盛水澤腹堅命取冰冰以入令告民出五種命農計耦耕事修耒耜具田器命樂師大合吹而罷乃命四監收秩薪柴以共郊廟及百祀之薪燎是月也日窮于次月窮于紀星回于天數將幾終歲且更始専而農民毋有所使天子乃與公卿大夫共飭國典論時令以待來歲之宜乃命太史次諸侯之列賦之犧牲以共皇天上帝社稷之饗乃命同姓之邦共寢廟之芻豢命宰歷卿大夫至于庶民土田之數而賦犧牲以共山林名川之祀凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀季冬行秋令則白露蚤降介蟲為妖四鄙入保行春令則胎夭多傷國多痼疾命之曰逆行夏令則水潦敗國時雪不降冰凍消釋周禮冬夏致日春秋致月以辨四時之序吳徵曰冬夏致日春秋致月蓋冬至日在牽牛景長丈有三尺夏至日在東井景長尺有五寸此長短之極極則氣至冬無愆陽夏無伏陰所以致日春分日在婁月上弦於東井下弦於牽牛秋分日在角月上弦於牽牛下弦於東井此長短之中所以致月然致日必于冬夏致月必于春秋何也天度一月易一位一時易一方推之日月所經正在分至為天度之中分至之氣正則四時之序亦正矣春秋分之日道卯酉正當天之中央日之行以直徑一百八十二度半強為晝一百八十二度半強為夜故日中宵中也夏至之日道寅戌當天之北日行一百八十二度之外又兼北極出地三十六度總二百一十八度為晝故日永也冬至之日道辰申當天之南於一百八十二度之內陰南極之地三十六度止有一百四十六度為晝故日短日陽也夜陰也故陽長而陰消則日長夜短陰長而陽消則夜長日短皆非陰陽之中也夫陽生於子終於午至卯而中分陰生於午終于子至酉而中分故春為陽中而仲月之節為春分秋為陰中而仲月之節為秋分春秋之分則陰陽適中而日夜無長短之差故於其月每言日夜分也邵子曰二至相去東西之度凡一百八十南北之度凡六十冬至之月所行如夏至之日夏至之月所行如冬至之日四正者乾坤坎離也觀其象無反覆之變所以為正也日月分至盈縮遲疾古法一晝夜月行十三度餘十九之一然觀其所躔先後不同有差至四五度者後漢劉洪始推究之知其疾行則十四度餘約四之三遲行則止十二度不餘其間漸疾漸遲大率二百四十八日盈縮九匝隋劉焯又推究日行亦有盈縮自冬至行一度五分漸減一二分至三四分以及赤道之交則正行從此復漸減之極於夏至止行九十五分自夏至後其行增所增與所減之數相似及冬至則復如前蓋一日行一度有餘日疾不及一度日遲以增虧之數相補一日止為一度從冬至距春分以行疾而積盈從春分距夏至以行遲而消其積盈比之常度猶差前故冬至距夏至皆曰盈段從夏至距秋分以行遲而積縮從秋分距冬至以行疾而消其積縮比之常度猶差後故夏至距冬至皆曰縮段然春分二日之前已交赤道則盈二度有餘秋分二日之後才交赤道則縮二度有餘故二分際盈縮有最多矣授時厯謂日在赤道之南行疾赤道之北行遲而後厯亦以春分距秋分行遲秋分距春分行疾要之月行遲疾盈縮之理亦然但度數不同耳授時厯謂每轉二十七日五十五分四十六秒月行三百六十八度三十七分四秒半乃盈縮之一匝其間遲疾之數相補遂以十三度三十六分八十七秒半為一日月正行之度李淳風有推步月孛法以六十二日行七度六十二年七周天孛者彗星之屬光芒偏掃者為彗光芒四出者為孛孛之所在月行最遲與孛對衝則月行最疾孛不常見則月行最遲處可以測之矣若夫日躔十二次蓋因各次黃道宿度不等又日有盈縮故或近或久不同且一歲分二十四氣名曰常氣授時厯一氣為十五日二十一分八十四秒三十七毫半則是以常氣為定不復增減而舊厯則有增減之法月度縮而日度盈則定朔在常朔後名曰朒月度盈而日度縮則定朔在常朔前名曰朓若俱盈俱縮則對消而用有餘數定弦定望亦如之蓋古者未嘗推步日月盈縮止以常朔弦望為定今朔與弦望既有常定之名復有進退之法定朔在日沒以後若無日食見其所虧者則進以次日為朔恐月見於晦之晨也定弦望在日出以前則退一日定望在日出以後其望有食初虧在日出前者亦退一日定望在十七雖日出後亦退一日為其太遲也或望在初四上弦在初七下弦在二十二則不可退退則太早也或望在十三上弦在初六下弦在二十一非退而太早因進朔而然雖不皆早其朔不進或朔進而大月連四日為其過多朔亦不進也授時厯則不然當朔計二十九日五十三分五秒九十三毫當望半之當弦又半之實定而不進退矣但月食在夜半後雖屬次日亦只以當夜言望致日於冬夏二至致月於春秋二分此即易之革象治厯明時之意也何也日有三道北至東井去極逺東至角西至婁去極中故極南至於牽牛則為冬至極北至於東井則為夏至南北極中東至角西至婁則為春分秋分此日之常度也月有九行故立春春分從青道立秋秋分從白道立冬冬至從黑道立夏夏至從赤道此月之常度也所謂致日致月者以土圭立表以度其至否冬至日在牽牛景長丈有三尺夏至日在東井景長尺有五寸此長短之極故冬夏言至春分日在婁月上弦於東井下弦于牽牛秋分日在角月上弦於牽牛下弦於東井此長短之中故春秋言分分至正則四時之敘可辨矣可見古人辨四時之敘惟在致日致月而未嘗執一定之法以必其日月之從我也今歲之致于分至者如此來歲之致于分至者其差與否一隨日月以定之蓋以天本有一定之敘而人特有以致而辨之耳此治厯明時取諸革孔子與周公一也精于厯者盍取法於聖人焉不然周時日在牛度而今在箕雖欲不隨時變革奚可哉日月二表所以為致日致月之法日表詩定之方中章曰景山與京公劉章曰既景乃岡相其陰陽是古人之測日也必量八尺之表以量日景故表短而晷景短惟元朝立四丈之表於二丈折中間開竅以量日景故表長而晷景長縱使尺寸或有毫秒不審所差亦無幾矣月表禮記云為朝夕必放于日月為朝夕者蓋立圭以測日景立表以量月采日圭之法具于周禮月表世罕知漢書李尋傳月者衆陰之表消息見伏百里為品千里立表王僧虔詩所謂月表望青丘是也吳下田家以正月八日夜立一竿於平地月初出有影即量之據其長短移於水靣就橋柱畫䀶記之梅雨水漲必到所記之處蓋古之遺法管子云不明于則而欲出號令猶立朝夕於運鈞之上運鈞泥工圓轉之器也日所行黃道未嘗附著於天其道印天一周乃在天之黃道在天如大環日行赤道如小環居大環之內雖寬一有少殊而皆為三百六十五度四分度之一且以日擬尺而量故為度則日行之黃道要為得數之真者夫日體大其道周圓亦大月體小其道周圓亦小月道在日道內亦猶小環在大環之中日去人逺月去人近月體因近視而比日體之大月道因近視而比日道之廣亦由日道之比乎天道矣若日食於朔月食於望則當以天度經緯推之日月之行常數以二十九日五十三分五秒九十三毫相會二次相會則同一經度雖其行度有盈縮定朔有先後所差不多較其同經不同緯止曰合朔或曰從八道穿度黃道過與日遇則謂同經同緯合朔而有食矣日體為月體所蔽故日食而日體非有損也日道與月道相交之處有二若正會於交則月體障盡日體而日暗甚謂之食既若交不正但在交之前後而度相近者亦食而不既近於正交則食分多逺於正交則食分少也兩朔之間日月對躔而望平分黃道之半黃道有二交若不當二交前後而望則月不食望在二交前後者必食食或既或不既其食分數則以距當交逺近推之月體映日而明但涉經度相對其光已滿或於二交限內對經對緯所受日光傷於太勝陽極反亢故致月體黑暗如染紅濃後反成紫也授時厯望在交之前後者距交十三度五分則不食當交限內則有食矣望而距交未還在四度三十五分之內其食必既餘八度七十分雖是食限而食不既也古者以日對衝之處名為暗虛謂之象景也月體因之而失明故云暗日非有象景而強名之故云虛暗虛緣日而有故其圓徑與日等日體徑一度月體半之而其徑亦準一度則道之廣亦必與徑同月道既準一度則暗虛廣二度也今以暗虛之黃道與月之本道兩道相交前四度三十五分併交後四度三十五分共八度七十分為食既限既限之前八度七十分為既外前限既限之後八度七十分為既外後限此三限在暗虛則為二十六度十分而在月道止為十三度五分也夫日食至十分即為食既月食乃至十五分者蓋十分已是食既食則已盡黑然所食雖既而才入既限故食十分以上之數為既內之分月望正在交的而食則名曰既內五分乃十五分也所以然者月之食限交前後各十三度五分歸限八度七十分而望則已食十分矣更歸八十七分而後望則十一分以十三度五分均為十五分每分計八十七分計歸限八度七十分又既內五分計四度三十五分共十三度五分乃前限之一半其出後限亦然故月食有既限而日食則不立既限矣月食分數惟以距交逺近而論别無四時加減八方所見食分並同而日食則不然舊厯云假令中國食既戴月之下所虧才半化外反觀則交而不食化外食既戴日之下所虧才半中國反觀則反而不食何則日如大赤丸月如小黑丸共懸一索日上而月下即下正望之黑丸必掩赤丸似食之既及傍觀有逺近之差則食數有多寡矣日行有四時之異月行有九道之殊日行極南月在陰厯則中國見食分多月在陽厯則中國見食分少開北戶而向日北處月在陽厯反食多在陰厯反食少夏日近中間冬日近交廣唯戴日之下則在酌中之間凡食在午前見食早午後見食遲地偏西見食早偏東見食遲此其推步之差實因四時早晚及地偏南北東西不可以里路計南北則考表景及北極出地之數東西亦考表景及中星之所在以為加減之法今太史所驗徒以中國所見者言之而已且推步雖有法亦時或有失日月交會於夜望食於晝人不及見固所不論若帶食分出入在晨昏之際雖不見其食甚但見初虧或見復圓以前則必論之而所謂食甚之時則在初虧復圓之際其非食既者亦於此際食分最多從此則轉減少也日食止言既月食言既又云甚者蓋月初既之時名食既食既之後生光之前此際名為食甚若日則不然食既甚生光無所分别食既不久止須臾耳日月在望交者月道廣一度暗虛之道廣二度兩度相犯者多故食限亦多至十三度五分而其食之時刻亦不少在朔交者日月二度皆廣一度相犯者少故食限亦少約八度左右而其食之時刻亦不多日之食限少故其食也罕月之食限廣故其食也頻若夫起復方位則以月在陰陽厯論之月在陽厯者日食起於西南甚於正南復於東南月食起於東北甚於正北復於西北月在陰厯者日食起於西北甚於正北復於東北月食起於東南甚於正南復於西南凡日月食至八分以上者日食但云起於西復於東月食但云起於東復於西也日月之食其所行交道有常數雖盛世所不免故可以籌策推非若五星有反常之變也程子問日蝕有常數者也然治世少而亂世多豈人事乎曰天人之理甚微非燭理甚明者其孰能識之曰無乃天數人事交相勝負有多寡之應耶曰似之未易言也張子正蒙曰日質本陰月質本陽故於朔望之際精魄反交則先為之食矣問同度同道朱子曰天有黃道有赤道天正如一圓匣相似赤道是那匣子相合縫處在天之中黃道一半在赤道之內一半在赤道之外東西兩處與赤道相交度却是將天橫分為許多度數會時是日月在那黃道赤道十字路頭相交處厮撞著望時月與日正相向如一個在子一個在午皆同一度謂如月在畢十一度日亦在畢十一度雖同此一度却南北相向日所以蝕於朔者月常在下日常在上既是相會被月在下靣遮了日故日蝕望時月蝕固是陰敢與陽敵然厯家又謂之暗虛蓋火明外影其中實暗到望時恰當著其中暗處故月蝕明天有黃赤二道沈存中云非天實有之特厯家設色以記日月之行耳夫日之所由謂之黃道史家又謂月有九行黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東并黃道而九如此即日月之行其道各異况陽用事則日進而北晝進而長陰用事則日退而南晝退而短月行則春東從青道夏南從赤道秋西從白道冬北從黑道日月之行其不同道又如此然每月合朔不知何以同度而會於所會之辰又有或蝕或不蝕及其行或髙而出黃道之上或低而出黃道之下或相近而逼或差逺而不相值則皆不蝕如何曰日月道之説所引皆是日之南北雖不同然皆隨黃道而行耳月道雖同然亦常隨黃道而出其旁耳其合朔時日月同在一度其望日則日月極逺而相對其上下弦則日月近一而逺三如日在午則月或在卯或在酉之類是也故合朔之時日月之東西雖同在一度而月道之南北或差逺於日則不蝕或南北雖亦相近而日在內月在外則不蝕此正如一人秉燭一人執扇相交而過一人自內觀之其兩人相去差逺則雖扇在內燭在外而扇不能掩燭或秉燭者在內而執扇者在外則雖近而扇亦不能掩燭以此推之大略可見之矣或問日食之變精於數者皆於數十年之前知之以為人事之所感召則天象亦當與時盈虧潛室陳氏曰日月交會日為月掩則日蝕日月相望月與日亢則月蝕自是行度分道到此交加去處應當如是厯家推算専以此定疏密本不足為變異但天文才過此際亦為陰陽厄會於人事上必有災戾故聖人畏之側身修行庶幾可弭災戾也陸子曰黃道者日所行也冬至在斗出赤道南二十四度夏至在井出赤道北二十四度秋分交於角春分交於奎月有九道其出入黃道不過六度當交則合故曰交蝕交食者月道與黃道交也黃瑞節曰春秋疏云日月同處則日被月映而形魄不見故食朔則交會故食必在朔然而每朔皆會應每月皆食杜預云日月動物雖行有大量不能不小有盈縮故有雖交會而不食者或有頻交而食者又云日月異道交互相錯月之一周必半在日道表從外而入內半在日道二從內而出外或六入七出或七入六出凡十三出入而與日會厯家謂之交道通而計之一百七十三有餘而有一度唐一行日議云日行黃道月有九道其所行之道遇交則有薄食之變也至於合朔如合璧則不食其交不軌道則食也故驗日食者必以日躔月道之交驗之耳五代王朴云自古相傳皆謂近交則日月有食殊不知日月之相掩與暗虛之相射其理有異今據諸家之説所謂九道者青道二赤道二白道二黑道二與黃道而九也月不行黃道止行其餘八道但此八道皆斜出入於黃道之內外故謂之九道耳月一歲凡十三次經天則二十六次出入於黃道之內外一次經天則一次入一次出也或六次入七次出或七次入六次出各十三出入也此二十六次出入於黃道之時也有二十四次皆不與日會惟有兩次與日會故疏云通計一百七十三日有餘而有一交也於此時方有食然而有食有不食者或日月同道之際道有分數故食亦有分數或小有盈縮遂從邊而過故有不食也吕氏詩記十月之交篇載孔疏之説亦然若以定法論之一歲兩交當兩食春秋二百四十二年日食三十六唐二百九十年食百餘何也此杜預所謂有雖交會而不食者或有頻交而食者也朱子與王朴之説合日月之相掩與暗虛之所射是日月食之理也史記兩軍相當日暈暈等力鈞厚長大有勝薄短小無勝抱大破無抱為和背不和為分離相去直為自立立侯王指暈若曰殺將負且戴有喜圜在中中勝在外外勝青外赤中以和相去赤外青中以惡相去氣暈先至而後去居先至先去前利後病後至後去前病後利後至先去前後皆病居軍不勝見而去其發疾雖勝無功見半日以上功大白虹屈上下兌有者下大流血日暈制勝近期三十日逺期六十日其食食所不利復生生所利而食益盡為主位以其直及日所宿加以日時用命其國也月行中道安寧和平陰間多小陰外北三尺陰星北三尺太陰大水兵陽間驕恣陽星多暴太陽大旱喪也角天門十月為四月十一月為五月十二月為六月水發近三尺逺五尺犯四輔輔臣誅行南北河以陰陽言旱水兵喪月蝕歲星其宿地飢若亡熒惑也亂填星也下犯上太白也疆國以戰敗辰星也女亂食大角主命者惡之心則為內賊亂也列星其宿地憂月食始日五月者六六月者五五月者復六六月者一而五月者凡五百一十三月而復始故月蝕常也日蝕為不臧也甲乙四海之外日月不占丙丁江淮海岱也戊巳中洲河濟也庚辛華山以西壬癸恆山以北皆蝕國君月蝕將相當之邵子曰日食月以精月食日以形是以君子用智小人用力此見君臣之禮也又曰月受日之光不受日之精相望中弦則光為之食甚矣精之不可以二也切計太陽乃火之精其氣亦類於人間之火也火正當氣焰之上必有黑暈觀之燈燭可見星家謂之星象想即此也受光則稍偏受精則正對以月正對此黑暈之中所以食也月食時辰多天下見之其分數皆同日食時辰少天下見之其分數皆不同由日食月以精其所虧之分其明全盡所以天下皆同月食日以形其虧之分正當其下則分數同及側逺望之則分數或少或多所以天下多不同也日之食月暗虛之精大故食時辰多月之食日其形小故食時辰少月食陰抗陽而不勝猶可言也日食陰掩陽而勝之不可言也是以春秋書日食而不書月食詩云此月而食則為其常此日而食于何不臧即取此義日月薄食先儒謂其同度同道而日為月掩故日為之食然也謂其同道而十字路頭彼此相望其果然歟日月皆左旋安有彼往此來相撞之理蓋由月隨日以為盈虧不因日而有遲疾日行此道而月行適與日相交焉故陽精反為其所傷也觀春秋書法日有食之是若有物食之焉者使止云掩之而已何為日食之後其色赤而黑其光人皆可以目對其神不著若有傷焉乃如此也以太陽之精為陰所傷月不避日非天下之大變而何况月食于望其彼此相對而月為之食故月食之後其明之受傷亦然此皆有象可共覩也噫天地間陰陽交會其常也變也莫不然也何獨於日月而疑之特日月至神非人之知識所能測焉耳日月交食常變日月陰陽之精也天地不交則品物不育夫婦不交則男女不生此天下之至理也交而得其道則有以合乎陰陽化醇之妙交而失其道則有以戕其陰陽化生之機知此義者斯可以論日月之交食矣何也陰陽雖各一其精坎離實互藏其宅故嘗於日月搆精而究其相推明生之微矣惟知其所以相推而明生則摩蕩不停變化不息乃知由晦而朔其交會有定處有定時者其常也交而至於相食者其變也何也交之常必在地之下未明之時也若交於既明之後則在天之上而反其軌道之常矣非常即謂之變也不然天地上下皆日月行道所經何為古今記日食者咸在于晝而不在乎夜咸在天之上而不及乎地之下也不知其常而止謂交朔即有日食之變豈無日月之道哉况交得其常則陰陽之精互藏不息交值其變則陰陽之精兩有所傷厯家乃謂日道月道交軌之際日上月下日形為月形所蔽儒者亦有秉燭執扇之喻是同度同道日為月掩而日為之食也然觀小雅與春秋俱云日有食之是乃有物以食之焉者若止云相掩而已何為日食之後其色則赤而黑其光則昏而神采不著其受傷也明矣以太陽之精為陰所傷非天下之大變而何噫凡日月之食其果有傷也其果止於相掩蔽已也昭然有象可覩不必以意識推測之也是故推厯數之最精者莫如唐僧一行然開元十二年七月朔於厯當食半強自交址至朔方候之皆不食十三年十二月朔於厯當食大半而亦不食乃曰然後知德之動天不俟日是果玄宗能修德以動天耶抑亦一行厯數之未密耶要皆求之不得其故所以不歸德於君則委罪於厯晦朔之間朓朒之微孰從而正之哉要之不究天道之常安知天道之變不窺日月搆精生明之本安知日月反交傷明之原徒以一人之知識揣摩天地之變化何怪其術雖精而厯不驗耶嘗以此考之史册雖古之治世未嘗無日食之變而古之昏君嘗有當食不食之祥古之未精于厯者每有驗于日食之度而於厯數最精者未能一一占驗之無差此其故何也明厯理厯法者即此可默識矣信乎日食有定數而不可以定數求人君當修德以弭天變厯家不可泥法而反昧乎天道之常斯庶幾矣日食説日食者數當食也有當食而不食者邵子曰算法之誤此言得之或者當夜食厯家差其時如宋寧宗六年太史言夜食不見是也蓋日食常在于朔月食常在于望間有差者不過差一日耳不離朔望者定數也圓必有虧者定理也朱子言朔而日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月亢日而月為之食亢當也言日月相對太親切遂遙奪其光又云正如一人秉燭一人執扇相交而過看來通説錯了日月在天譬如兩毬疾馳如飛相交而過彼此安能掩乎况日一日一周天其迅速一瞬千里月豈能掩乎厯家見得日食皆在朔月食皆在望固生此議論也此皆不將造化陰陽大頭腦理會故吾儒亦信之殊不知天地有此陰陽不齊就生起許多不齊事來故有吉必有凶有盈必有虧有消必有長有長必有短有好必有醜有常必有變此必然之理必然之數也今以天言之蒼然者天之常也然或時而白或時而紅而黑或時空中偶生雷霆偶生風雨非變乎方者地之體也然或髙而萬丈或卑而萬丈亦有成有虧非其生來之變乎鎮靜者地之常也然或時而震時而裂非其偶然之變乎故明者日之常也或時赤如血或時昏暈或時有黑氣如飛鵲如飛燕或有黑子如棗如李或時貫白虹或夾兩珥此皆載之簡册昭昭可考非明者之變乎故周禮祗祲掌十輝之法以觀妖祥辨吉凶一曰祲謂日旁有陰氣相侵也二曰象謂陰氣附日凝結成象燕鵲之類也三曰鐫謂黑氣刺日也四曰監謂氣抱日也五曰暗謂方晝而晦也六曰瞢謂日瞢瞢然無光也七曰彌謂白虹彌天也八曰序謂雲有片段次序如山在日旁也九曰隮螮蝀升氣于日也十曰想謂雜氣成形想也故圓者日之常也或時有缺焉或缺十分之五或缺十分之盡則圓而缺者雖變亦常也若以為月所掩且如桓公三年秋七月壬辰日有食之既既者盡也襄公二十四年安王二十年髙后二年平帝元始元年普通三年日皆食之盡赧王十四年日食盡晦夫月掩日安能至此甚乎且古人不言日缺而言日食者其缺處皆如物食之狀故解蝕字云如蟲食草木之類也每救日見甚缺處參差不齊非月掩日安得有是象乎蓋月之圓有時而虧正猶日之白有時而雜氣如周禮所云十輝也又説有交而不食者同道而相避也謂王者修德行政則陽足以勝陰雖當食而月常避日亦不食此尢不通也蓋日者無心情之物也若月避日是有心情矣五帝三王已上不可得而知若漢文帝宋仁宗豈不修德然亦日食如常何哉考宋中興志云日之食又有當食而不食者出于厯法之外者也如唐開元盛際及本朝中興以來紹興十三年十八年十九年二十四年二十五年二十八年皆當虧而不虧及考唐史開元共日食十二次何嘗不日食乎又考宋紹興共日食十三次是中興志不足信矣朱子修德不食之説主厯家説也蓋日者衆陽之宗君象也天道變于上人事應于下人君于日食必當側身以回天變非修德則不食也嘉祐六年日食又云不見時議稱賀司馬光上言臣愚以為日之所照周遍華夷雖京師不見四方必有見者此天戒至深不可不察也臣聞漢成帝永始元年九月日有食之四方不見京師見谷永以為禍在內也二年三月日有食之四方見京師不見谷永以為禍在外也臣愚以為谷永之言似為協天之意夫四方不見京師見者禍當淺也四方見京師不見者禍寖深也天意以為人君為陰邪所蔽天下皆知人君獨不知也人君尢冝側身戒懼乃相率稱賀上下蒙誣哉若司馬光者可謂委曲善導其君以回天變者矣禮曰日食則天子素服而修六官之職以蕩天下之陽事此皆垂訓之言欲人君反身修德也蓋言反身修德以回天變則可若曰修德則日不食非矣禮記月令孟春之月乃命太史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常月令所載四時十二月二十四氣七十二候本萬世所通行者然二十四氣本一氣也以歲言之則一氣耳以四時言之則一氣分為四氣以十二月言之則一氣分而為六氣故六陰六陽為十二氣又於六陰六陽之中每一嵗分為初終則又裂而為二十四氣二十四氣之中每一氣有三應故又分而為三侯是為七十二候原其本始實一氣耳自一而為四自四而為十二自十二而為二十四自二十四而為七十二皆一氣之節也但其所載昏旦中星不専指二十八宿蓋一月之內有中者即得載之如斗井度多則星體廣不可確定故耳觀此則厯家豈可拘於一定之法哉每時計九十日每節計四十五日每氣一十五日每候計五日故候有七十二日氣有二十四節有八時有四各有三百六十日天地一元為十二萬九千六百季元分而為十二會會分而為三十運運分而為十二世世分而為三十年年分而為十二月月分而為二氣氣分而為三候候分而為五日日分而為十二時積四千三百二十時三百六十日而為七十二候則天地之貞觀日月之貞明寒暑之代謝生物之終始又孰有外焉者乎惟逐月審察日月之交會及昏旦之中星則歲月日時舉不能逃矣易曰懸象著明莫大乎日月是日月著明之象懸于天普天之下人人得而覩之自古迄今亦人人朝夕所常覩也夫人人所共覩朝夕所常覩則其行度宜乎古今人所共知也然或以為左旋或以為右旋何紛然論議之靡定耶諸家且弗之論而經乃衆説所取𠂻者在詩傳則謂天左旋日與月皆右旋在書傳則謂天與日月皆左旋何二傳相矛盾哉且以左右言之天體雖圓而子居正北午居正南此定位也以南北二極為天之樞言左右者當自北極不動處分之雖天體子午言其縱日月升沉言其衡而周天度數縱橫一也但天與月月皆圓象動體人若難測惟地之東西南北乃一定而不易者且地亦南北分中在列宿為虛在月建為子不均之為北乎在列宿為星在月建為午不均之為南乎惟即其一定不移者以觀乎活動無定在者庶左右不可得而淆也故此圖內一層為地之四隅外第一層為天第二層為日蓋天無體以二十八宿為體是列宿即天象也日月無定在而其交會則在壬子十二辰即其次舍也天北髙南下此以二極出地入地言之人居地上背北面南東為左西為右也子午左右既定則無論天之上地之下凡從子至卯均之為左從子至酉均之為右也明矣是故排列宿者起于角亢論北方七宿則以虛為中即如冬至起于虛宿某度自此由虛而女而牛以及斗箕尾心乃從北以轉東矣謂天逆列宿而左旋也非歟排支干者起于甲子論日月與天交會則以壬子為始大凡冬至起于壬子自此由子而丑而寅以及卯辰巳午亦始焉從北以轉東矣謂日月皆順天而左旋也非歟或問每日太陽升于東沒于西本自左以轉右反不主右旋之説何也曰日之行度早出寅卯辰晝厯巳午未晚入申酉戌謂非從左轉右不可也然子位乃日之初起處也由子丑以至寅卯謂之非左旋可乎是右旋從東轉西左旋從北轉東似乎二説各有所據然從起頭處算其運旋之度于厯法為尢便也或問月建月將之説何如曰月建從斗柄所指言月將從太陽會舍言况歲月日時有其名必有其實也天何為而有歲之名乎一寒一暑而陰陽一周故謂之歲而一歲之初必起于子也太陽何為而有日之名乎一明一暗而晝夜一周故謂之日而一日之初必起于子也太陰何為而有月之名乎一圓一缺而晦朔一周故謂之月而一月之初必起于子也一日分十二時時分百刻未有不從子位起者子丑寅卯之次皆由北而東是謂天之左旋可無疑矣或問子謂日一晝夜而一周天並無絲毫增減日日如是歲歲如是然則太陽過宫如正月立春後在子雨水後在士驚蟄後在亥春分後在乾以此觀之謂日常在子而位乎天也可乎矧由子而壬而亥乾不與右旋之説相孚而由北以轉西乎曰厯數太陽陰陽家謂之逐月過宫由其不明天之運旋一日過一度焉耳彼天之左旋一晝夜厯三百六十五度四分之一而又過一度積一月三十日則過三十度矣如今之厯每年冬至起于箕宿三四度夫箕乃東北析木寅宫也自冬至一日過一度積八九日則過八九度始躔星紀之次大略又過將三十度始躔玄枵又過將三十度始躔娵訾所以正月在亥二月在戌由天之過度亥戌適當子宫故每月日月交會于其次舍豈正月日月過到亥二月日月過到戌由北而西以周十二宫乎况歲次甲子乙丑月建子丑寅卯厯十二宫六十甲子自始及終周而復始未有不從北而東者雖天之過度亦然又何疑於左旋之説也盍稽之月令乎孟春之月日在營室日月會于娵訾仲春之月日在奎日月會于降婁季春之月日在胃日月會于大梁厯家記日月相會次舍皆在天所過之度自古已然矣或問天與日月皆左旋者常也厯家謂有歲差何歟曰歲差之法起于晉虞喜後何承天劉焯唐僧一行所約年數多寡不齊今且勿論蓋緣不知古厯簡易惟時考驗修改以與天合故不差自歲差之説興法愈精而差愈多矣觀虞書日短星昴以正仲冬則知冬至日在虛也夏商在女周在牛秦漢唐宋在斗元在箕國初在箕六度今在箕三四度故厯于十一月云日躔析木之次可見冬至日躔自虛至箕茍以差言則差五六十度矣矧其杪忽尤難算也夫虞書仲冬中星在昴月令仲冬昏東壁中旦軫中觀中星自昴而壁天之左旋益無疑也虛正北子宮宿也箕東北寅宫宿也由子而丑而寅日之左旋也不信然哉若夫厯家専主日月右旋之説不謂天一日一周而又過一度乃謂太陽每日實不及天一度故其法日減二算至退數一周日與天會為一歲此置厯算數之法非日月星辰旋轉之實象也詩傳右旋之論本之厯家或有然矣七政運行總論爰自混元之初七政運行歲序變易有象可占有數可推由是厯數生焉夫日月星辰有形而運乎上者也四時六氣無形而運乎下者也一有一無不相為侔然而二者實相撿押以次歲功蓋日窮于次月窮於紀星回於天此有形之運於上而成歲者也五日為候三候為氣六氣為時四時為歲此無形之運於下而成歲者也混元之初日月如合璧五星如連珠自此運行逮今未嘗復會如合璧連珠者何也蓋七政之行遲速不同故其復會也甚難日之行天也一歲而一周月之行天也一日而一周歲星之周也常以十二年世俗以年為歲者蓋本于此鎮星之周也以二十八年營惑之周也以二年惟太白辰星附日而行或速則先日或遲則後日速而後日昏見西方遲而後日晨見東方要之周天僅與日同故亦歲一周天焉夫惟七政之行不齊如此此其難合也世之觀漢史者見其論太初厯之密日月如合璧五星如連珠而遂以為五星會於太初之元年殊不知此乃論太初厯之周密推原上至於混元之初其數之精無有餘分故有是言在太初之年實未嘗如合璧如連珠也何以言之五星之會常從鎮星五星之行鎮星最遲故諸星從之如會以厯考之漢髙祖之元年五星聚于東井蓋鶉首之次也自髙祖元年至太初元年凡百有年也鎮星二十八年而一周當是之時鎮之周天蓋已三周而復行半周有餘凡八次矣進在元枵之次安得有日月如合璧五星如連珠起於牽牛之初乎牽牛星紀之次也夫日舒而月速其相會也以速而及舒月之會日常以二十九日半強而相及半強謂四百四十九分也蓋月行速而日行遲故也是故一歲之周凡十有二會焉以其序而言之十有一月會于星紀之次十有二月會于元枵正月會訾娵二月會降婁三月大梁四月實沈五月鶉首六月鶉火七月鶉尾八月夀星九月大火十月析木夫會則為晦晦而復蘇明于是乎生焉是之謂朔月之行速漸逺於日以周天言之其近于日也九十一度有奇其逺於日也二百七十四度有奇是之謂近一逺三謂之弦此蓋謂上弦也其行上逺而與日對去日百八十二度六十二分有奇是之謂相與為衡分天之中謂之望蓋日與月相望故也其行過中逺於日也二百七十四度有奇其近日也九十一度有奇亦謂之近一逺三謂之弦此蓋下弦也上弦在於八日下弦在於二十二日望在于十五日此其常也上弦或進則在七日或退則在九日下弦或進則在二十一日或退則在二十三日望或進在十四日或退在十六日此皆其變也雖然晦朔弦望在日月果有常變之不齊乎厯家執一定之法以算七政不知日月五星皆活物也晦朔弦望當依日月之度以治乎厯而排定晦朔弦望以必日月之從乎厯是果日月之變乎抑亦厯家不知變通以為常乎圖書編卷十八
