body:
  text: 圖書編卷七十明章潢撰經絡考肝經之正别跗上上至毛際合于少陽與别俱行絡之别曰蠡溝去內踝五寸走少陽别者經脛上睪結于莖膽經之正繞髀入毛際合于厥隂别者入季脅間循胸裏屬膽散之上肝貫心以上挾咽出頥頷中散于面繫目合少陽于外眥或以諸隂别者為正絡之别曰光明去踝五寸别走厥隂下絡足跗心經之正别入于淵液兩筋之間屬于心上走喉嚨出于面合目內眥絡之别曰通里去腕一寸半别而上行循經入于心中繫舌本屬目系小腸經之正指地别于肩鮮入腋走心繫絡之别曰支正上腕五寸內注少隂别者上走肘絡肩髃脾經之正上至髀合于陽明與别俱行上結于咽貫舌中絡之别曰公孫去本節之後一寸别走陽明其别者入絡腸胃大絡曰大包出淵液下三寸布胸脅胃經之正上至髀入于腹裏屬胃散之脾上通于心上循咽出于口上頞䪼還繫目系絡之别曰豐隆去踝八寸别走太隂别者循脛骨外亷上絡頭頂合諸經之氣下絡喉嗌三焦經之正指天别于巔入缺盆下走三焦散于胸中絡之别曰內關去腕二寸出于兩筋之間循經以上繫于心包絡心系一云外繞臂注胸中心包絡經之正手心主之别下淵腋三寸入胸中别屬三焦出循喉嚨出耳後合少陽腕骨之下絡之别同前三焦曰內關肺經之正别入淵腋少隂之前入走肺散之太陽上出缺盆下循喉嚨復合陽明絡之别曰列缺起于腕上分間並太隂之經直入掌中散入魚際大腸經之正從手循􅈾乳别于肩髃入柱骨下走大腸屬肺上循喉嚨出缺盆絡之别曰偏歷去腕三寸别入太隂别者循臂乘肩髃上曲頰偏齒别者入耳腎經之正至膕中别走太陽而合上至腎當十四顧出屬帶脈直者繫舌本復出于項合于太陽絡之别曰大鍾當踝後繞跟别走太陽别者并經上走于心包下外貫腰脊膀胱經之正别入于胸中其一道一尻五寸别入于肛屬于膀胱散之腎循膂當心入散直者從膂上出于項復屬太陽絡之别曰飛揚走踝七寸别走少隂人身關要統會隂陽血為陰氣為陽腰已上屬陽腰已下屬隂背為陽腹為陰臟為隂腑為陽表為陽裏為隂四肢外側為陽四肢內側為隂是也表裏表為陽皮毛湊理經絡是也裏為隂臟腑骨髓咽喉二便是也榮衛血為榮氣為衛三焦胸為上焦氣之源也鬲為中焦血之源也腹為下焦水之源也五臟屬隂臟者藏也心屬火肝屬木脾屬土肺屬金腎屬水是也六腑屬陽腑者府也膽屬土又屬金小腸屬少陽火大腸屬陽明金三焦屬少陽火膀胱屬太陽寒水十二經手三隂足三隂手三陽足三陽竒經八脈任脈上自人中當咽直下神闕至隂為隂之竒脈督脈自人中已上當眉心貫頂直至脊中至尾閭為陽之竒脈衝脈自內出于包上循脊中至咽喉會任脈三脈並起而異行帶脈周圍于季脅之下腰之上如圍帶之回還陽蹻起足之外跟踝直上入風池隂蹻起足之內跟循腹直上咽喉陽維起足太陽經則出踝旁金門穴隂維發足少隂經别行隂脈築賔郗是也十二官心者君主之官神明出焉肺者相傳之官治節出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾者倉廩之官五味出焉大腸者傳道之官謀慮出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二者不得相失也此乃一身之根本關節百病總不外此人身神氣總説天地定位人物萬殊其主宰流行總只在神與氣也粵自伏羲俯仰近逺洞見此理初畫一竒一偶名曰隂陽竒偶各三名曰乾坤乾坤再索名曰坎離八卦隂陽初交名曰姤復孰知皆神氣之名象哉何也天載聲氣俱無天命於穆不已此乃人生而靜已上不可得而名不可得而象故謂之先天謂之元神元氣者此也然天地開闢即有隂陽之别者隂陽之純者隂陽之中隂陽交會之初陽即神也隂即氣也天地人物咸得隂陽神氣以有成也人之成形成性生幼壯老知能言動氣全則生神氣離則死矣是故神宰乎心氣充乎身非神自神氣自氣也神即氣之靈氣即神之衛一而二二而一與生俱生者也但有生以後神隨氣以飛揚凡靈明識知之運于思慮者皆識神用事盡為耳目口體所役使而神非元神矣故氣隨神以奔軼凡氤氲充溢于四體者皆血氣運旋咸徇聲色名利以經營而氣亦非元氣焉旦晝牿亡幾盡形雖存而實亡矣抑豈欲氣神之雙修乎孟子曰先立乎其大者則其小者不能奪也養神即養氣也曰其日夜之所息平旦之氣其好惡與人相近也者幾希又曰我善養吾浩然之氣其為氣也至大至剛以直養而無害則塞乎天地之間其為氣也配義與道養氣非所以養其神乎有志身心性命者真能因姤復之初交使坎離之既濟而復乎乾坤之易簡俾神一定則氣不妄動氣太和則神愈清明乾知坤作心正身修乾統天坤順承天易簡理得成位乎中豈不為天地間之完人哉右十二經五臟六腑十一耳其一經何等經也然一經者手少隂與心主别脈也心主與三焦為表裏俱有名而無形故言經有十二也馬蒔曰右十二經者雖各經自有起止而其交經接續或自臟而腑或自腑而臟必行其五行所屬本經而後交于别部其起于頭而止于足者必交于足其起于足而止于腹者必交于腹其起于手而止于頭者必交于頭其起于腹而止于手者必交于手昔人謂十二經之行本一脈貫通是也經有十二絡有十五餘三絡者是何等絡也然有陽絡有隂絡有脾之大絡陽絡者陽蹻之絡也隂絡隂蹻之絡也故絡有十五焉徑而直者為經支而橫者為絡經絡總論經行氣故見色常應于時絡主血故受邪則變而不一然經之常色如心赤肺白肝青腎黑脾黃隂絡之絶應其經陽絡之色變無常隨四時而行也寒則凝沍則青黑熱則燥澤則黃赤此皆常色若病則五色具見寒熱故云經行氣而絡主血其色常變不同也經言肺之原出於太淵心之原出於太陵肝之原出於太衝脾之原出於太白腎之原出於太溪少隂之原出於兊骨膽之原出於丘墟胃之原出於衝陽三焦之原出於陽池膀胱之原出於京骨小腸之原出於腕骨十二經皆為腧原者何也然五臟腧者三焦之所行氣之所留止也三焦所行之腧為原者何也然臍下腎間動氣者人之生命也十二經之根本故名曰原三焦者原氣之别使也主通氣行三氣經歷於五臟六腑原者三焦之尊號也故所止輒為原五臟六腑之有病者皆取其原也經言肝主色心主臭脾主味肺主聲腎主液鼻者肺之候而反知香臭耳者腎之候而反聞聲其意何也然肺者西方金也金生於己巳者南方火火者心心主臭故令鼻知香腎者北方水也水生於申申者西方金金者肺肺主聲故令耳聞聲五臟藏於中者難知九竅通于外者易見即其通于外以察其藏于中者亦易易也况口之于味目之于色耳之于聲鼻之于臭喉舌之于聲尤有易知者在乎故肺氣通于鼻肝氣通于目脾氣通于口心氣通于舌腎氣通于耳三焦氣通于喉五臟九竅合外內之道也茍心不在焉則視而不見聽而不聞食而不知其味果知此義而握其養德養生之樞焉則一以貫之何病之有五臟俱等而心肺俱在膈上者何也心者血肺者氣血為榮氣為衛相隨上下謂之榮衛通行經絡營周於外故令心肺在膈上也肺主氣其脈居右寸脾胃命門三焦各以氣為變化運用故皆附焉心主血其脈居左寸肝膽腎膀胱皆精血之隧道管庫故亦附焉人之四肢百骸惟氣血已爾內經曰諸氣皆統於肺諸血皆統於心所以六脈心首左寸肺首右寸心勞則血虧而百病皆生肺塞則氣喘而通身不寧亦可見矣血氣者二五之精也始于有形付受之先以至于有生長養之後五內百骸周流不息如日月之經天潮汐之運海同此樞機運行無停而不少緩也血生之謂榮氣守之謂衛榮性好靜衛性好動動則情隨言隂血之性隨氣之情則體氣之道致也靜則情順言陽氣之性順血之情則成血之功效也順則血生隨則氣守血生則內固氣守則外旺故血同心生氣從肺主血榮氣衛各得相生之道人身榮衛即天地之乾坤乾坤者施天地之德也榮衛者施血氣之德也由是尊卑有位動靜有常合造化於一機而無差矣人身之血氣常相隨而不相離也一或窒滯百病生焉然氣陽血隂氣行則血行氣止則血止氣有一息之不運則血有一息之不行凡善治病者若病在于血必當調其氣猶可以道達之故曰病在血而調氣多順病在氣而理血多阻也所以血為榮氣為衛榮虛則不知痛癢衛虛則不能運動而養氣為尤要焉榮氣之行常與衛氣相隨不然經言人受氣於穀穀入於胃乃傳與五臟六腑皆受于氣其清者為榮濁者為衛榮行脈中衛行脈外營周不息五十而復大會隂陽相貫如環無端故知榮衛相隨也榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也灑陳猶云分布故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入于脈也故循皮膚之中分肉之間熏於肓膜散于胸腹逆其氣則病從其氣則愈內經曰夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血少隂常少血多氣厥隂常多血少氣太隂常多氣少血此天之常數論氣血者須詳察之氣血總論人受天地之氣以生天之陽氣為氣地之隂氣為血故氣常有餘血常不足何以言之天地為萬物父母天大也為陽而運於地之外地居天之中為隂天之大氣舉之日實也亦屬陽而運於月之外月缺也屬隂稟日之光以為光者也人身之隂氣其消長視月之盈缺故人之生也男子十六嵗而精通女子十四嵗而經行是有形之後猶有待于乳哺水穀以養隂氣始成而可與陽氣為配以能成人而為人之父母古人必近三十二十而後嫁娶可見隂氣之難于成而古人之善于攝養也禮記注曰惟五十然後養隂者有以加內經曰年至四十隂氣自半而起居衰矣又曰男子六十四嵗而精絶女子四十九嵗而經斷夫以隂陽之成止供給得三十年之視聽言動已先虧矣人之情欲無涯此難成易虧之隂氣若何而可以縱欲也經者陽者天氣也主外隂者地氣也主內故陽道實隂道虛非吾之過論也或曰仰觀俯察乎天地日月既若是之不同何寒暑溫涼之見於四時者又如此之相等而無降殺也曰動極復靜靜極復動猶人之噓吸也寒者吸之極氣之沉也熱者噓之極氣之浮也溫者噓之微氣之升也涼者吸之微氣之降也一噓一吸所乘之機有以使之宜其相等而無降殺此以流行之用而言前以大小虛實言者蓋其對待之體也或曰逺取諸天地日月近取諸男女之身曰有餘曰不足吾知之矣人在氣交之中令欲順隂陽之理而為攝養之法如何則可曰主閉藏者腎也司疏泄者肝也二臟皆有相火而其系上屬于心心君也為物所感則易于動心動則相火翕然而隨雖不交會亦暗流而滲漏矣所以聖賢只是教人收心養性其旨深矣食氣入胃散精于肝淫氣于筋食氣入胃濁氣歸心搖精於脈脈氣流經經氣歸于肺肺朝百脈輸精於皮毛毛脈合精行氣於府府為氣海膻中是也府精神明留於四藏氣歸於權衡權衡即膻中有氣三隧氣由三隧分布周身權衡以平氣口成寸以決死生氣口者脈之大要會也百脈盡朝故以決死生也飲入於胃遊溢精氣上輸於脾脾氣散精上歸于肺通調水道下輸膀胱水精四布五經並行合于四時五藏隂陽揆度以為常也人受水穀之氣以生而胃為水穀之海故人以胃氣為本所謂清氣榮氣運氣衛氣春升之氣皆胃氣之别稱也若飲食失節則脾胃乃傷脾胃氣衰則元氣不足而心火獨盛心火隂火也起于下焦其系繫于心不主令相火代之相火乃下焦包絡之火元氣之賊也火與元氣不兩立一勝則一負惟脾胃氣虛下流使穀氣不得升浮是春生之令不行則無陽以護其榮衛故不任風邪乃生寒熱皆脾胃之氣不足所致也五臟各有聲色臭味皆可曉知然十變言肝色青其臭臊其味酸其聲呼其液泣心色赤其臭焦其味苦其聲言其液汗脾色黃其臭香其味甘其聲歌其液涎肺色白其臭腥其味辛其聲哭其液涕腎色黑其臭腐其味鹹其聲呻其液唾是五臟聲色臭味也五臟有七神各有所藏臟者人之神氣所舍藏也故肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志也夫養神之術去牽引而已矣牽如牽纜之牽引如引弓之引舟欲病必牽行之急矢欲中必引滿之審纜斷則舟往矣矢釋則弓舒矣欲寡則神凝矣大雅曰無然畔援無然歆羡誕先登于岸又曰一切病生皆生于心心神安泰病從何生不觀農夫冒暑耘耨無著病相習忘之也凡心動火即起外邪斯入矣是以貴忘外又曰心血方寸甚幾希者旦晝欲火煎熬牿亡殆盡則神不能留非時時靜養之烏能延生當念夜氣滋息而慎之以保命為要可也精神問答問今時有志之士多知收斂精神則有謂身之知覺運用是也何如曰心之精神之謂聖此禮經夫子之訓而一言以盡天下之道者也是故心以為之根聖以為之果而精之與神則條達乎心根敷榮乎聖果而為全株實樹者也蓋吾人此心統天及地貫古迄今渾融于此身之中而涵育于此身之外其精瑩靈明而映照莫掩者謂之精其妙應圓通而變化莫測者謂之神神以達精而乃知覺是知覺雖精所為而實未足以盡乎精也精以顯神而身運用是運用雖神所出而實未足以盡乎神也古之欲明明德于天下者其心既統貫天地古今以為心則其精神亦統貫天地古今以為精為神故其耳目手足四肢百骸知覺固與人同而聰明之精通而無外者自與人異運用固與人同而舉措之神應而無方者自與人殊夫是以為父子兄弟足法而人自法之燦然經綸天下之大經而齊治均平之無不備舉者端自卓立天下之大本格致誠正之無不純全者出之無窮也此之謂人之聖善之至學之集大成者而萬世無復加也彼沾沾完養自家精神以為長生久視之術者安足語此精神總論夫精神之道至矣孔子曰心之精神是謂聖易曰精氣為物遊魂為變是故知鬼神之情狀所以立人道之先統幽明之故皆是物也豈可以不思乎人皆曰我之精神彼之精神不知盈天地間惟一精神而彼我之非知道矣故吾無精也以天地之精為精吾無神也以天地之神為神茍不至德至道不凝貴吾有以凝之耳茍無以凝之則精不吾存而神不吾用精不吾存神不吾用是以昧始終死生之故不能上下與天地同流而自與草木均其朽腐聖所以愈聖愚所以益愚其可以不思乎雖然精者常存之實體神者應物之妙用故精神之主也君子之學貴為精凝精而神在其中矣是道也吾質之以學庸而本之於大易中庸曰君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微君子慎其獨也所謂獨者精之謂也何也精者天下之至一而獨一之謂也凡天下之有聲者有色者萬有不齊者皆不能自生必有隱微不可睹聞者主乎其中然後聲色得以生生於不窮是睹聞生於不睹聞也睹聞生於不睹聞是不睹不聞者天下之至睹至聞也睹聞有盡不可睹聞者無盡常若顯見於睹聞之外而獨見獨聞者此精之所以常一而可貴也而當慎矣大學曰欲誠其意者先致其知致知在格物所謂知者精之謂也何也精者天下之至靈而知靈明之謂也身與家國天下為物修身與齊家治國平天下為格物物不能自格必有至靈不物於物者主乎其中而後格物之用不窮蓋知者物之體物得知而後能成緣知而後能相感故有知則有物無知則無物矣物虛而知實物變而知不變知即是物此精之所以常明而可貴也而當致矣君子貴精之學質之學庸如此不惟是也易之文言曰大哉乾乎剛健中正純粹精也又曰乾知大始夫貴精之學莫詳於易而易莫備于乾乾之初畫三百八十四爻之第一爻蓋三才之根本也其辭曰潛龍勿用潛潛于下也言初之不可用也然二方用而見而三則惕其終之履于危乾之四與初應蓋重乾之革於外者也其辭曰或躍在淵淵潛之所也言四之躍不可以離乎潛也然四五方躍而飛而上則懼其終之悔于亢夫乾之所以中正純粹而知大始者如此夫曰潛曰淵曰中正曰知非所謂獨與知者乎曰勿用曰惕曰悔非所謂慎與致者乎蓋天地之理必如是而後乾之精健君子之學必如是而後乾乾之精而不息故三百八十四爻之變至不一而乾常一吉凶悔吝之賾至不可測而乾常知鬼神非是無以效其良能萬物非是無以成其終始非天下至精其孰能與于此夫既曰潛曰勿用而又曰健曰自強何也曰惟至精而後能健惟乾乾之至精而後能自強故乾之精似無而實至剛君子凝精之學似柔而實至強此乾之所以為仁而人之所以體仁在思而得之也彼以為我之精神云者自私而已豈足識天地之全而語貴精之旨哉臟有一耳腎獨有兩者何也然腎兩者非皆腎也其左者為腎右者為命門命門者諸神精之所舍原氣之所繫也故男子以藏精女子以繫胞故知腎有二也或言腎虛而下部冷者非謂下部腎水虛也所謂腎有兩枚經曰七節之傍中有小心楊上善注太素曰人之脊骨有二十一節從下第七節之傍在左者為腎右者為命門命門者小心也難經言心之原出于太陵然太陵穴者屬於厥隂包絡相火小心之經也玄珠言刺太陵穴曰此㵼相火小心之原也然則右腎命門為小心乃手厥隂相火包絡之藏也仙經曰右腎則為男左腎則為女謂男為陽火女為隂水故也或言女子左腎為命門者誤也難經止言右腎為命門男以藏精女以繫胞豈相反也然右腎命門小心為手厥隂包絡之藏故手少陽三焦合為表裏神脈同出見手右尺也二經俱是相火相行君命故曰命門爾故仙經曰心為君火腎為相火是言右腎屬火不屬水也是以右腎火氣虛則為病寒也君相雖為二穴論其五行之氣則一於為熱也夫五行之理隂中有陽陽中有隂孤隂不長獨陽不成但有一物全備五行遞相濟養是為和平交互尅伐是為敗衰變亂失常災害由生是以水少火多為陽實隂虛而病熱也水多火少為隂實陽虛而病寒也故俗以熱藥欲養腎水勝退心火者豈不誤與甚矣精為至精之實也故岐伯云精者身之本也是以精枯則病精竭則死夫勞極則精罷思極則精離飲食少則精減房欲頻則精耗試觀樹木膏脂竭則枝葉萎枯矣夫人曷可妄用其精哉故曰精不妄用則氣不散氣不散則神不移又曰思不可用意不可動意動則神移神移則氣散氣散則精亡道德經曰致虛極守靜篤谷神不死是謂玄牝黃帝曰地之為下否乎岐伯曰地為人之下太虛之中者也曰馮乎曰大氣舉之也此勝邵子天地自相依附之説夫地即血天即氣天包地氣載血今人骨肉臟腑皆血也魄也神靈運用皆氣也魂也人死乃魂去魄存氣散血尚聚也是以貴養氣世降氣轉耗也朱丹溪乃曰氣有餘血不足藥專補血夫氣有餘邪氣也正氣何嘗有餘岐伯曰人以胃氣為主甚矣貴養氣也經言東方實西方虛㵼南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方者肝也則知肝實西方者肺也則知肺虛㵼南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故㵼火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也肺金體燥居上而主氣畏火者也脾土性濕居中而主四肢畏木者也若各失所養則火木之邪易侵肺熱則不能管攝一身脾傷則不能為用大法㵼南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有况人身隂常不足陽常有餘又節欲者少縱欲者多精血既虧相火必旺則隂愈燥矣故宜常補其隂使隂與陽齊斯水能制火而水升火降則無疾矣相火論附太極動而生陽靜而生隂陽動而變隂靜而合而生水火木金土各一其性唯火有二曰君火人火也曰相火天火也火內隂而外陽主乎動者也故凡動皆屬火以名而言形氣相生配于五行故謂之君以位而言生而虛無守位稟命因其動而可見故謂之相天主生物故恆于動人有此生亦恆于動其所以恆于動者皆相火之為也見于天者出于龍雷則木之氣於海則水之氣也具于人者寄於肝腎二部肝屬木而腎屬水也膽者肝之腑膀胱者腎之腑心包絡者腎之配三焦以焦言而下焦司肝腎之分皆隂而下者也天非此火不能生物人非此火不能有生天之火雖出于木而皆本乎地故雷非伏龍非蟄海非附于地則不能鳴不能飛不能波也鳴也飛也波也動而為火者也肝腎之隂悉具相火人而同乎天也或曰相火天人之所同何東垣以為元氣之賊又曰火與元氣不兩立一勝則一負然則如之何而可以使無勝負也曰周子曰神發知矣五性感物而萬事出是有知之後五者之性為物所感不能不動謂之動者即內經五火也相火易起五性厥陽之火相煽則妄動矣火起於妄變化莫測無時不有煎熬真隂隂虛則病隂絶則死君火之氣經以暑與溫言之相火之氣經以火言之蓋表其暴悍酷烈有甚于君火者也故曰相火者元氣之賊周子又曰聖人定之以中正仁義而主靜朱子曰必使道心常為一身之主而人心每聽命焉此善處乎火者人心聽命于道心而又能主之以靜彼五火之動皆中節相火惟有補助造化以為生生不息之運用耳何賊之有水火互根水火之氣一燥一濕水濕極而生木火燥極而生金人物始生亦精與氣聚而為之耳精濕而氣燥精沉而氣浮故精為貌而氣為聲精之盛者濕之極故為木為肝為視氣之盛者燥之極故為金為肺為聽大抵貌與視屬精故精衰而目暗言與聽屬氣故氣塞而耳聾隂陽交合之初水火有互根之妙善養德養身者常使其相交而不相離焉斯已矣人身隂陽氣血精神魂魄總説天地間一氣而已矣一氣屈伸升降而為隂陽知天地隂陽不相離斯可以論人身之造化矣彼陽氣本在上也冬至一陽生于地而陽起于隂坤之復也隂氣本在下也夏至一隂生于天而隂起于陽乾之姤也人孰不云水隂而火陽也然天一生水本陽也乃成于地六而屬隂是水本天其成則地故生于上而性必潤下者自上而下行也地二生火本隂也乃成于天七而屬陽是火本乎地其成則天故生于下而性必炎上者自下而上行也日陽魂也其體則隂麗乎陽而為離故易卦火在天上即日也月隂魄也其體則陽陷于隂而成坎易卦水在地中實一陽在五隂中也所以乾下坤上則天地交而為泰反是則為否坎上離下則水火交而既濟反是則不交為未濟觀天地日月水火莫非隂陽之氣而吾人效法乾坤效此法此焉耳易曰一隂一陽之謂道程子謂隂陽亦是形而下者元來只此便是道道豈逺人哉所以隂陽之氣交相摩蕩生生不測萬化從此出焉故人之生也負隂抱陽一身之中血氣精神魂魄渾然畢具禮運言人者隂陽之交鬼神之會是也凡氣也魂也神也皆陽之屬也精也血也魄也皆隂之屬也統一身之骨肉肌體謂之血統一身之呼吸溫暖謂之氣然血之始生由氣而化而血之流貫滋養亦由氣而行故總為隂陽之氣也易謂天地絪緼萬物化醇絪緼化醇非魂之原歟男女構精萬物化生構精化生非魄之始歟子産謂人始化曰魄既生魄陽曰魂此自受形之初言也易曰精氣為物遊魂為變此自人生以後言也書曰帝乃徂落徂言魂之升落言魄之降也孔子曰神也者氣之盛也魄也者鬼之盛也又曰衆生必死死必歸土是謂之鬼骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴百物之精神之著也此自人死已後言也蓋自父母將受胎之先已有絪緼化醇者為託魂之原故父母孕胎之際斯有構精化生者為成魄之本是人在胞中精氣結成胚胎既已成魄而漸能活動即謂之魂及形既生矣精氣為物凡一身之骨骸皆是也神發知矣逰魂為變凡一身之思為皆是也雖曰魂陽魄隂魂動魄靜魂主經營魄主納受而人皆賴魄為之主持彼二氏或指魂為覺明或指魄為胎光以為生人之本其實隂陽各有靈魂魄自相守也蓋魂為陽之靈即知來之神魄為隂之靈即藏往之智故人有善記有善悟有神智具全者此也然又有精神云者豈魂魄之外别有一種精與神乎而亦有不可混者觀醫家謂心藏神腎藏精肝藏魂肺藏魄脾藏意而總名之為神其源亦自上古傳之至今非臆説也嘗以此反求諸身而默識天地之造化矣是故心為離火而神發于上腎為坎水而精沉于下兊金為水母而精魄即金水渾涵清明內瑩而水其金之液乎少隂金生太隂水故腎水旺則耳目聰明而魄強者精為之也苟精竭則魄虧而形斃矣震木為火母而神魂即木火通融輝光外照而火其木之焰乎少陽木生太陽火故離火靜則血液充足而魂安者神為之也茍神勞則魂虧而氣散矣正醫家所謂子能令母虛子能令母實之義也抑豈神魂精魄兩不相關耶蓋即耳目之覩計聰明可見魄為魂之藏而精中固有神也即思慮之透悟明覺可見魂為魄之著而神中自有精也試觀肺雖隂而統夫氣右腎乃火所自起非水中之火歟肝雖陽而統夫血心中真液生焉非火中之水歟易曰水火不相射即此亦可以默會惟忿懲則火降欲窒則水升而洗心退藏于密聖人喫緊教人斯其至矣是故精之神謂之魂神之精謂之魄魂非神魂不足以御精魄非精魄不足以凝神精神魂魄合則生精神魂魄離則死生則神為主而陽以統夫隂死則鬼為主而隂以攝夫陽此生死鬼神之大較也奈何人之生也營營逐逐祗求聲色臭味之欲以為耳目口體之娛役神以養其骨骸驅魂以奉其血肉縱使羅百物之精以強伯有之魂其形雖生已為未死之鬼矣人盡人道豈有他哉矢志竭才養吾浩然之氣全吾圓虛不測之神自有與天地日月鬼神合者矣所以聖人神魂全而精魄化故堯舜知他幾千年其心至今在衆人精魄盛而神魂亡醉夢生死與草木同腐朽死之日民無得稱焉者豈獨齊景公為然哉噫是神也運精氣而精氣不能為之囿寓魂魄而魂魄不能為之拘周流于天地人物浩然莫測其端出入于有無生死杳然莫窺其際要之各在當人之身也邵子謂天之神棲于日又謂日入地中構精之象也人之神雖棲于目然將寐在脾熟寐在腎將寤在肝正寤在心果能構會精神于形氣之交則天地交而水火既濟非難事矣雖然神無二也但求神于精氣魂魄之間終不免認心之精神以為聖而危微亦可以無辨矣易曰神無方也又曰隂陽不測之謂神于此神而明之則存乎其人圖書編卷七十
