body:
  text: 圖書編卷三十三明章潢撰都邑總敘建邦設都皆馮險阻山川者天之險阻也城池者人之險阻也城池必依山川以為固大河自天地之西而極天地之東大江自中國之中而極中國之東天地所以設險之大者莫如大河其次莫如大江故中原依大河以為固吳越依大江以為固中原無事則居河之南中原多事則居江之南自開闢以來皆河南建都雖黃帝之都堯舜禹之都於今皆為河北昔皆為河南大河故道自碣石入海碣石今晉州也所以幽薊之邦冀都之地皆河南地周定王五年以後河道堙塞漸移南流至漢元光三年徙從頓丘入渤海今濵滄間是也成周以來河南之都惟長安與洛陽或逾河而居鄴者非長久計也漢晉以來江南之都惟有建業或據上流而居江陵武昌者亦非長久計也是故定都之君與議都之臣惟以此三都為最此三都者皆以江河之險阻為可恃也舍此則唐末博士朱朴遷都疏云去已衰之衰就未王之王有取于襄鄧之間是或一道若止信在德不在險如宋都汴梁一無足恃易曰王公設險以守其國獨不可信乎歷代帝王所都大昊伏羲氏今陜西鞏昌府秦州人都河南陳州炎帝神農氏今湖廣德安府隨州人都陳州徙山東曲阜黃帝軒轅氏今陜西中部縣人都涿州少昊金天氏今陜西秦州人都曲阜顓頊髙陽氏都今河南開封府杞縣帝嚳髙辛氏都今河南開封府偃師縣帝堯陶唐氏都今山西平陽府帝舜有虞氏今山西蒲州人都今山西平陽府夏禹王今四川成都人都今山西平陽府安邑縣商湯王都今河南歸德州契初封商後世遷亳西亳湯遷南亳故名曰殷仲丁遷亳河亶甲遷于相祖乙遷于耿至盤庚復都南亳紂居于朝歌周武王今陜西岐山縣人都今陜西西安府咸陽縣秦始皇都咸陽漢髙祖皇帝今直𨽻徐州沛縣人都今陜西西安府長安縣漢光武皇帝今湖廣棗陽縣人都洛陽西晉都洛東晉宋齊梁陳都建康今應天府唐太宗皇帝今陜西華陰縣人都西安府徙洛陽宋太祖皇帝今河陽人都開封府髙宗徙都臨安今杭州府元世祖皇帝蒙古人都燕京明太祖髙皇帝都金陵今南京應天府成祖文皇帝都燕今京師每方千里廣袤萬餘里輿地都會總考須彌山是大地骨中鎮天心為巨物如人背脊與項梁生出四枝龍突兀四枝分出四界南北東西為四𣲖西北崆洞數萬程東入三韓隔杳冥惟有南龍入中國胎宗孕祖來竒特黃河九曲為大腸川江屈曲為膀胱分枝劈脈縱橫去氣血勾連逢水住大為都邑帝王州小為郡縣居公侯其次偏方小鎮市亦有富貴居其地與君略舉大形勢舉目一望皆山河天下江山幾萬里我見破軍到處是祿存文曲輔弼星低小山形總相類只有髙山形象殊略舉大綱與君議崑崙山腳出闐顔隻隻都是破軍山連綿走入瀚海北風俗強悍人粗頑生兒三嵗學騎射骨硬剛方是此間山來隴右尖如削盡是狼峯更髙卓此處如何不出文只為峯多反成濁髙山大嶺峯多尖不似平原一錐卓行行退卸大散關百二山河在此間大纒大護到函谷水出黃河如玦環低平漸漸出熊耳萬里平洋漸如砥大梁形勢亦無山到此尋龍何處是若無河流與淮水渺渺茫茫不見山河流沖決俱斷絶又無石骨又無脈君若到此説星峯一句不容三寸舌黃河在北大江南兩水夾行勢不絶行到青齊忽起峯兖州東嶽插天雄分枝劈脈鍾英氣聖賢多在魯邦中自古英雄出西北西北龍神少人識南龍髙枝過蔥嶺黑鐵二山雪峯盛分出秦川及漢川五嶺分枝入桂連山行有斷脈不斷直至江陰大海邊海門旺氣連閩越兩兩水夾相交纒北走海門南繳絡貨財文武相交錯請君更將舊地覆狼星乳頭巨鈐局外縣京師多平洋也有城邑在髙岡淮甸州縣在水尾夔峽山嶺是城隍隨他地勢看髙下不可執一拘攣也千萬隨山尋穴形此説斷能辨真假冀州壺口洛低下蓋緣輔弼為垣馬太原落處尖似鎗木頭兩鋭也蓋緣亷破龍最長建康洛在坡平洋蓋緣輔弼星為體太垣平垣古戰場熊耳為龍星可詳長安帝垣星外峙巨武山龍生出勢京師落在垣局中狼星夾出巨門龍太行走入河中府入首連生六七存入首雖然只是山落處却在回環間此與鍋鈐無以異只在大小識形難古人建都與建邑先尋頓伏識龍關升虛望楚與陟巘此是尋頓與山面降觀于桑與降原此是尋伏下平田度其夕陽揆以日南北東西向無失乃陟南岡景與京此是望穴識龍形相彼北泉觀水去涉彼溥原觀水聚或涉南岡與下原是尋頓伏非茍然吉人卜宅貴詳審經旨分明與後傳朱子曰冀都是正天地中間好個風水山脈從雲中發來雲中正髙脊處自脊以西之水則西流入于龍門西河自脊以東之水則東流入於海前面一條黃河環繞右畔是華山聳立為虎自華來至中為嵩山是為前案遂過去為泰山聳於左是為龍淮南諸山是第二重案江南諸山及五嶺又為第三四重案堯都中原風水極佳左河東太行諸山相繞海島諸山亦皆相向右河南直至泰山湊海第二重自蜀中出湖南出廬山諸山第三重自五嶺至明越又黑水之類自北纒繞至南海河東地形極好乃堯舜禹故都今晉州河中府是也左右多山黃河繞之嵩華列其前河東河北皆繞太行山堯舜禹所都皆在太行下太行山一千里河北諸州皆旋其趾潞州上黨在山脊最髙處過河時便見太行在半天如黑雲然上黨即今潞州春秋赤狄潞氏即其地也以其地極髙與天為黨故曰上黨上黨太行山之極髙處平陽晉州蒲坂山之盡頭堯舜之所都也河東河北諸州如太原晉陽等處皆在山之兩邊窠中山極髙濶伊川云太行千里一塊石山後是欣代諸州泰山却是太行之虎山或問平陽蒲坂自堯舜後何故無人建都曰其地磽瘠不生物人民朴陋儉嗇故惟堯舜能都之後世侈泰如何都得前代所以都關中以黃河左右旋繞所謂臨不測之淵是也近東獨有函谷關一路通山東故可據以為險又關中之山皆自蜀漢而來長安而盡他録作關中之山皆自西而來若橫山之險乃山之極髙處橫山皆黃石不生草木東南論都所以必要都建康者以建康正諸方水道所湊一望則諸要害地都在面前有相應處臨安如入室角房中坐視外面殊不相應武昌亦不及建康然今之武昌非昔之武昌吳都武昌乃今武昌縣地勢迫窄只恃前一水為險耳鄂州正今之武昌亦是好形勢上可以通關陜中可以向許洛下可以通山東若臨安進只可通得山東及淮北而已天下之山西北最髙自關中一支生下函谷以至嵩少東盡泰山此是一支又自嶓冡漢水之北生下一支至揚州而盡江南諸山則又自岷山分一支以盡乎兩浙閩廣大凡兩山夾行中間必有水兩水夾行中間必有山江出岷山岷山夾江南岸而行那邊一支去為江北許多去處這邊一支為湖南又一支為建康又一支為福建二廣岷山之脈其一支為衡山者已盡於九江之西其一支又南而東度桂嶺者則包湘源而北經袁潭之境以盡於廬阜其一支又南而東度庾嶺者則包彭蠡之源以北盡於建寧其一支則又東包浙江之源而北其首以盡會稽南其尾以盡乎閩粵也仙霞嶺在信川分水之右其脊脈發去為臨安又發去為建康江西山皆自五嶺贛上來自南而北故皆逆閩中却是自北而南故皆順閩中之山多自北來水皆東南流江浙之山多自南來水多北流故江浙冬寒夏熱荆襄山川平曠得天地之中有中原氣象為東南交會處耆舊人物多最好卜居但有變則正是兵交之衝蔡伯靖言山本同而末異水本異而末同西北地至髙地之髙處又不在天之中地有絶處唐太宗收至骨利幹直堅昆都督府其地夜易曉夜亦不甚暗蓋當地絶處日影所射也其人髮皆赤至鐵勒則又北矣極北地之人甚少所傳有二千里松木禁人砍伐此外龍蛟交雜不可去通鑑有人適外國夜熱一羊胛而天明此是地之角尖處日入地下而此處無所遮蔽故常光明及從東出而為曉其所經遮蔽處亦不多耳問周公定豫州為天地之中東西南北各五千里今北邊無極而南方交趾便際海道里長短敻殊何以云各五千里曰此但以中國地假四方相去言之未説到極邊與際海處南邊雖近海然地形則未盡如海外有島夷諸國則地猶連屬彼處海猶有底至海無底處地形方盡周公以土圭測天地之中則豫州為中而南北東西際天各逺許多至於北逺而南近則地形有偏爾所謂地不滿東西禹貢言東西南北各二千五百里不知周公何以言五千里今視中國四方相去無五千里想他周公且恁大説教好看如堯舜所都冀州之地去北方甚近是時中國土地狹想只是略羈縻至夏商已後漸漸開闢如三苖只在今洞庭彭蠡湖湘之間彼時中國已不能到三苖所以負固不服東萊吕氏曰關中是形勢之地洛是都會之中欲據形勢須都關中欲施政令須都洛九峯蔡氏曰河北諸山根本脊脈皆自代北寰武嵐憲諸州乘髙而來其脊以西之水則西流以入龍門西河之上流其脊以東之水則東流而為桑乾幽冀以入于海其西一支為壺口太嶽次一支包汾晉之源而南出以為析城王屋而又西折以為雷首又次一支乃為太行又次一支乃為恆山此大河北境之山也其江漢南境之山則岷山之脈其北一支為衡山盡于洞庭之西其南一支度桂嶺北經袁筠之地至德安之敷淺原二支之間湘水間斷衡山在湘水西南敷淺原在湘水東北孔氏以為衡山之脈連延而為敷淺原者非也臨川吳氏曰天下之山脈起于崑崙山脈之所起即水源之所發也水之發自崑崙者其源為最逺惟中國之河為然漢之發原於嶓冢江之發原於岷山以西視他水亦可謂逺而非極於山脈初起之處則不得與河源並也故天下有原之水河為第一古人祭川先河後海重其原也冀州龍脊堰黃河不得直趨入海橫之中國逺繞冀州西南東蓋河以龍堰而曲流龍以河繞而截住夾身則左有小東河右有西恆水南有小南河攔截於內而大河經之龍將焉往其他橈棹手足得無名之水界畫分明者不可以數計但眼目難檢點墨楮難以描畫今姑舉其堂局形勢可想而知也發揮曰冀州分崑崙之左脈綿亘萬里之逺屈曲出夷入貊始回中國而盡於冀州古之帝王其興也以德而不以力其守也以道而不以地堯舜聖人承襲授受揖讓相遜亦未必慮及風水然聖人之興自合造化聖人所作自為法則風水固不拘而密協于龜卜即天地造化設之自然故易曰王公設險以守其國此理固先天地而有即風水之攸始矣或曰正緣聖人略於風水冀都要未是大地去處若都於內河之外大河之內如何豫曰如此却不合法度冀都如舌西南東三面之地如齒若舍舌而以齒門為可安排之地其説謬矣中心一舌橫六百餘里自恆山至小河八百餘里而西恆水小東河小南河之外其地自西而南自南而東自東北而止於海此一大勾股曲繞中舌正護龍也此護蓋自本身分出者耳常人眩於目前則內外之地在大河之內者方千餘里宜其茫不可見也玉髓經魏莊渠曰大地之脈咸祖崑崙而南北二絡最大大河出崑崙東北墟屈而東南至積石始入中國此天下大界水也北絡發於崑崙之隂折而東南行其中結為冀都其左結為燕京冀都則恆山發祖龍脈若從天降下為平陽而大河三面環繞以絶龍氣天文北極不動而衆星拱焉冀都正北南面以臨天下上應薇垣此第一都會也堯舜禹由是興焉而後世德薄弗能都矣其地表裏山河而四旁多阻朝貢轉輸弗便後世人主垂裳無為能如古之人乎吾恐不能矣儉嗇無欲能如古之人乎吾恐不能矣夏后氏以後廢而莫都冀在北邊堯舜盛德逺覆北地皆為要荒後世詎能及也北絡極於幽燕而大河至此入海與鴨緑會諸島為其下沙此山水一大交會也其北崇岡千疊而其前平夷千有餘里泰山聳于南誠國家萬年之基也但河徙而南氣不交固今其勢且北以害於漕河則障之使南况國家北都燕而逺漕江南粟民力易罷地則有遺利矣以漕河故多逆水性大河淮濟皆拂經是于天時人事無乃有未盡乎桑田之變碣石入淪海中中國水口不固世道升降天人固相孚也周洛邑乃飛龍格勢手腳本自分明迎送却從外假合也凡大地皆取諸外而不取諸身所謂本身腳手一屈曲縈回輒五六十里或七八十里故人不見其為腳手也况逺外迎送其得見乎發揮曰凡大地必有關攔其規模愈大則堂局愈濶堂局愈濶則關攔愈逺故冀州關攔乃在碣石長安關攔乃在荆山洛邑關攔乃在太華蓋如荆山太華等山動占據百千里而手腳支𣲖皆有風水大地非孤然一山之比碣石亦有石山綿亘在海其深無底人不能見所可見者山上之石如婆娑之樹耳滄海揚塵陵谷變遷寧有此理此冀以兵戎之迫風水之變河溢之患而不可都洛以封建之罷獨守之難而不可都惟長安天險實為金城之固天運周流何能復覩豐鎬威儀也魏莊渠曰南絡發於崑崙之東委蛇南行其背為西戎其面為中國而其餘氣為南蠻蔥嶺􅊳起為祖南起雪山其東為江源地脈因界為二江以南仍為南絡其北别為中絡與大河分為兩界中絡岷山為祖自蜀入隴結于初龍則為長安四塞以為固金城千里天府之國也結于中龍則為洛陽風雨之所會陰陽之所和天地之中也南絡傳大江放於海北絡傳大河放於海惟中絡止於嵩髙其前平夷凡幾千里而泰山特起東方張左右翼為障以天下大勢言之長安龍首穴也洛陽龍心穴也兹其大龍之腹乎古之神聖多起於東土宋都大梁亦在龍腹而國勢弱者汴垣無備其勢必重兵民力坐而困矣余嘗至洛陽相其形勢熊耳祖龍發自終南逺則太行為後托進則嵩髙為左障然終南自為長安前朝太行亦為平陽左障嵩髙雖回障洛陽而大情自欲東出與萬里平原作祖然後默識天道之公大地相為句連其融結非一處王氣發久而歇又轉而之他帝王有德而興無德而亡世不一姓宇宙所以無窮也秦都咸陽非長安之正以宫屬渭跨渭為飛橋復道以象天闕道而屬阿房如驪山溫泉又長安之支龍也長安之下則有岐梁荆諸山為托灃涇漆沮河水界限為衛以髙臨卑百二之固沃壤千里可以積儲此秦所以能併吞六國至今為天府也發揮曰咸陽之地龍合之玄格左右前後諸山包護天造地設以為大城郭而渭水浸溉地髙而田衆今長安又在咸陽之左乃得其正即咸陽舊基則接龍者也即長安今址則盡龍者也其龍則發于崑崙經回黑水綿絡正河橫山始起祖宗轉縈貊澤自西而東盡于雍州之地此易所謂天險不可升地險山川丘陵王公設險以守其國者然耳洛邑居天下之中為大龍之腹四望平夷近則熊耳居其右取諸逺則上洛在其西大華在其東終南惇物在其北內方則在河南周公所取制天下之中耳猶腹為人身都會之所也以水而言則洛水自西而經其前瀍澗界其東汾水黎水繞其後伊水陳其西面如平洋無蔽有德者易以興無德者易以亡如以風水言之則瀍澗伊洛界限分明其進送護衛不取諸身而取諸外耳但今之洛陽非周之洛邑亦非周居頑民之洛陽居頑民在洛水之陽伊水之地東都洛陽在河南又隔伊水周洛邑最合風水法度後人不敢居者周家封建諸侯東西南北皆我守衛侯國滅而後能及於周故以秦之強又以無道行之不滅六國周不可併也後世罷封建而制郡縣所守皆須自備故力有不及則難於守若立國於河南有諸水在後而地方之備差完然終不如長安可恃今之西京即周公所卜澗水東瀍水西而墨食者亦可立京畿之地蓋下有太華一臂力量甚重洛邑則又添得西京一臂也然無太華亦非京邑之地玉髓經武夷熊氏曰雍州秦地周之岐豐鎬京漢之三輔皆此焉婁敬謂金城千里天府之國合天下形勢言之秦得百二實以據地勢之上遊當天下之要脊四塞以為固全一面之險以東制諸侯故言定都必先焉但其地迫近邊垂周秦漢唐世有外患必盡陰山唐三受降城靈夏河西五都為塞乃可爾古者京畿為歷代帝王所都得名於萬世者莫如冀州其次莫如秦雍其次莫如洛邑今洛陽非周洛邑也冀州之地右則西河左則東河前則南河逾河而為壺口近河而為覃懷入河而為衡漳以古都言之則三面距河一面背山其發龍於崑崙而大盡于此所背恆山相距甚逺逶迤而下其平如砥方廣千里其手足橈棹之可見然夾水之外皆有名山巨鎮迎送護衛但堂局寬濶非凡俗所能檢點耳玉髓經京畿之地在虞氏為幽州域在禹貢為冀州域黃帝都幽州之涿鹿堯舜都冀州之蒲坂我成祖遷都於燕京蓋復黃帝堯舜之故都於千八百年之後左環滄海右擁大行北枕居庸南襟河濟形勝甲于天下蘇秦所謂天府百二之國杜牧所謂王不得不王之地也帝都總論已上建都之地其槩如此唐虞之都以河溢為患周洛邑以備守之難大梁平夷無險臨安僻處一隅金陵形勝雖優而垣氣多泄兩淮龍氣大盡而地勢卑下東魯中幹最尊而已鍾孔聖且今河水穿龍皆非建都之宜他如武昌成都等處則又不足論矣故惟我京師為上而關中次之東漢所都之洛又次之餘非愚之所能知也雖然在德不在險聖帝明王皆以道化天下未必恃其地之美而已焉史記魏武侯浮西河而下中流顧謂吳起曰美哉山河之固魏國之寶也起對曰在德不在險昔三苖氏左洞庭右彭蠡禹滅之桀之居左河濟右太華伊闕在其南羊腸在其北湯放之紂之國左孟門右太行恆山在其北大河經其南武王殺之君不修德舟中之人皆敵國也武侯善之愚謂君子不以人廢言起雖不足道若斯言者誠亦確論茍不以德則秦隋亦嘗都雍之關中金元亦嘗都冀之燕京矣風水之美形勝之固何獨不驗於彼哉是故形勝風水之説在於地固有國者所當擇而禍福得喪之機存乎人尤有國者所當修省矣洪武初御史胡子祺上書請都關中其略曰天下形勢之地可都者四河東地勢髙厚控制西北堯嘗都之然其地苦寒江淮士卒不便汴梁襟帶河淮宋嘗都之然其平曠無險可守洛陽周公嘗卜之周漢嘗遷之然嵩邙諸山非有殽函終南之固瀍澗伊洛非有涇渭灞滻之雄故惟關中據百二山河之勝可用以建都者莫此若也王氏鏊曰自古中原無事則居河之南中原多事則居河之北自然之勢也成周以來河南之都惟長安洛陽江南之都惟建康其次則有襄鄧唐朴之議曰襄鄧之西夷漫數千里其東則漢興鳳林為之關南則菊潭環屈而流屬於漢西有上洛重山之險北有白崖聨絡誠形勝之城沃衍之墟若廣陵河渠漕挽天下可使大集此建都之極選也雖然皆未有燕冀之形勢豈非天遺其勝以貽我朝萬世帝王之業乎周諸侯國都魯都曲阜魯本少皥摰居之謂之少皥之墟又大庭氏居之魯于其上作庫故為大庭氏之庫至周成王以周公之功而封伯禽於此其地本名魯乃作都於曲阜宋祥符中改曲阜為仙源今𨽻兖州齊都薄姑遷於營丘齊本顓頊之墟營丘今臨淄薄姑亦謂之蒲姑在其西北宋都商丘杜預云梁國睢陽縣按睢陽隋改為宋城本陶唐氏之火正闕伯之墟相土因之武王伐紂封武庚于弼武庚叛成王殺之改封紂兄微子啓于宋以為商後故謂之商丘衛都朝歌及懿公為狄所滅宋桓公迎衛之餘民渡河立戴公以廬于曹後齊桓公城楚丘而居文公焉至成公又遷於帝丘朝歌故城在汲縣西二十里本紂故都曹亦作漕今滑州白馬是也楚丘今澶州城武帝丘本顓帝之墟故曰帝丘夏昆吾氏居之今澶州濮陽縣鄭都本西周畿內之地周宣王以封母弟桓公友及幽王有犬戎之變鄭武公遂遷於濟洛河潁之間謂之新鄭故鄭今華州鄭縣新鄭即今之滎陽晉都唐謂之夏墟大名也本堯所都謂之平陽成王封母弟叔虞於此初謂之唐其子燮立始改為晉以有晉水出焉其地正名翼亦名絳而平陽者是其總名及昭侯立封其叔父于曲沃後武公滅翼遂有晉都至景公遷于新田唐今定州唐縣平陽今絳州翼今絳州翼城曲沃今絳州縣新田一名絳今絳州縣楚都丹陽成王封熊繹以子男之田至熊達始盛強僣稱王遷都于郢昭王為吳所滅遷于鄖楚本立荆至成王頵始改號楚卅陵今江陵枝江縣郢江陵縣北十餘里鄖今襄陽宜城縣東楚州懷王孫心所都秦周孝王封非子居于秦谷至襄公赴幽王之難以兵助送平王故平王與之以岐豐之地列為諸侯莊公居犬丘文公居汧渭德公遷于雍獻公遷櫟陽孝公乃遷咸陽秦谷故隴西縣秦亭是也汧渭今𨽻隴州犬丘今興平縣雍今鳳陽治咸陽今皆為縣𨽻永興軍虞都虞今平陸縣東北有故虞城吳都吳即今蘇州虢都上陽在鳳翔縣曹都曹即今定陶許都許後遷於葉又遷于城父又遷于白羽又遷于容城許今許州白羽一名析鄧州浙川是或云內鄉是容城華容縣是邾都邾今兖州邾城是莒都莒後遷鹽官故謂之南莒今密州縣紀都紀遷於劇紀本東海即贛榆紀城劇在臨朐縣東夀光縣西滕都小邾遷于公丘小邾即滕縣公丘今兖州龔丘薛仲虺之都本在魯地奚仲遷于邳今徐州有薛城是州都淳于後遷華容淳于即今髙密華容今監利蔡在畿內之地以為蔡叔之采邑至蔡仲改封汝南遷州來則以州來為下蔡汝南為上蔡蔡州上蔡縣西南州來即下蔡縣徐都臨淮今泗臨淮有徐城葛都寧寧陵縣故寧城是越都會稽即越州城陳都宛丘今陳州治本大昊之墟南燕都胙胙城𨽻滑州遂都乘丘今齊州治談都談歷城縣有古談城管都管鄭州管城是鄶都鄶新鄭東城有古鄶城戴都戴開丘縣有戴城任都任今濟州有任城宿都無鹽在鄆州須城東須句都須朐遷於須昌夀昌縣西北有須朐城須昌今鄆州舒城也顓臾都費沂州費縣有故顓臾城鄫都鄫今沂州承縣東有鄫城向都向今沂州古向城鄅都開陽在臨沂縣北蕭都蕭徐州蕭縣頓都南頓今陳州南頓縣息都新息今蔡州新息縣沈都平輿在汝陽縣東項都項城項城縣東北有故項城隨都隨今隨州鄧都鄧襄陽鄧縣界夔都夔歸州東有故夔子城北燕都冀幽州治邢都襄國今邢州治梁都新里同州下陽有新里城韓都韓城在韓城縣南魏都魏城遷於大梁今陜州平陸有魏城大梁即開封趙都趙城遷于平棘趙城今𨽻晉州縣平棘𨽻趙州郕都郕武王封季載今雷澤北有故郕城郜都郜今單州成武有二郜城應都葉汝州葉縣有故應城耿都耿在河中府龍門縣南蔣都期思在光州固始西北申都申今信陽軍吕都吕蔡州有古吕國焦都焦陜州東北霍都霍今晉州有霍邑陽都陽洪洞縣東南有故陽城冀都冀今河中府有冀亭芮都芮臨晉縣有芮鄉賈都賈蒲城縣有賈城荀都荀在綘州西黎都黎洛州黎城縣有黎侯故縣邘都邘野王縣西有故𨝍城今懷州治周四裔都附戎都戎城陳留濟南縣東南有戎城夷都夷安即夷安縣介都黔陬諸城縣東根牟都安丘今密州安丘萊都黃登州黃縣有故黃城即萊子國歷代國都歌若考國都地理要書契以前難論究自從太昊伏羲來歷代國都方可考伏羲建都還在陳神農都陳徙曲阜黃帝涿鹿以為都曲阜為都是少昊顓頊帝丘髙辛亳堯平陽舜蒲坂道夏都安邑商都亳仲丁徙囂亶甲紹亶甲徙相祖乙耿盤庚復亳周武鎬成王以鎬為宗周還從東都會諸侯平王徙向東都建秦都咸陽關中漢東漢洛陽後漢益曹魏鄴都以洛換孫吳東晉宋齊梁與陳六朝都建康西晉後魏洛陽置東魏北齊徙鄴鄉西魏後周隋文帝建都長安至煬皇或如江都或如洛還向江都覆所將唐都長安昭徙洛遼平五代金汴梁宋都汴徙杭閩廣元立大都自北方大明太祖鳳陽起定鼎應天置都位成祖遷都今順天上考厯代國都全論帝都夫地理之大莫先於建都立國稽之古先哲王將營都邑罔不度其可居之地以審其吉凶如公劉將居豳也其詩曰于胥斯原大王將居岐也其詩曰聿來胥宇武王將居鎬京其詩曰宅是鎬京成王將營洛邑書曰召公既相宅衛文公將營楚丘其詩曰升虛望楚見於經者如此則宅都誠不可不重也雖然子微有云帝王之興也以德而不以力其守也以道而不以地堯舜聖人承襲授受揖讓相遜亦未必慮及風水之説但聖人之興自合造化聖人所動作為法則風水固不拘而密協于龜卜即天造地設之自然者也故易曰王公設險以守其國此理固先天地而有即風水之攸始矣今將歷代所都録以補考云論北龍帝都垣局北龍有燕山即今京師也以燕然山脈盡於此故曰燕山昔燕昭王築黃金臺以招賢者故又稱金臺古冀州地舜分冀東北為幽州故又謂之幽都按丘文莊公大學衍義補云虞夏之時天下分為九州冀州在中國之北其地最廣舜分冀為幽并營故幽與并營皆冀境也楊公云燕山最髙象天市蓋北幹之正結其龍發崑崙之中脈以內外共視為中脈蓋鴨緑江外有大幹為護矣綿亘數千里至于闐歷瀚海之玄屈曲出夷入貊又萬餘里始至燕然山以入中國為燕雲北京為山前曰燕大同為山後曰雲復東行數百里起天夀山乃落平洋方廣千餘里遼東遼西兩枝關截黃河前繞鴨緑後纒而陰恆太行諸山與海中諸島相應近則灤河潮河桑河易河并諸無名小大夾身數源界限分明以地理之法論之其龍勢之長垣局之美幹龍大盡山水大會帶黃河扆天夀鴨緑纒其後碣石鑰其門最合風水法度又按衍義補云朱子語録冀都天地間好個大風水山脈從雲中發來前面黃河環繞泰山聳左為龍華山聳右為虎嵩山為前案淮南諸山為第二重案江南五嶺諸山為第三重案故古今建都之地皆莫過於冀都就朱子所謂風水之説觀之謂無風以散之有水以界之也冀州之中三面距河處是為平陽蒲坂乃堯舜建都之地其所分東北之境是為幽州太行自西來演迤而北綿亘魏晉燕趙之境東而極于醫無閭重岡疊阜鸞鳳峙而蛟龍走所以護擁而圍繞之者不知幾千萬里也形勢全風氣密堪輿家所謂藏風聚氣者兹地實有之其東一帶則汪洋大海稍北乃古碣石淪入海處稍南則九河既道所歸宿之地浴日月而浸乾坤所以界之者又如此其直截而廣大焉按此皆以風水之美言之也若以形勝論之則幽燕自昔稱雄左環滄海右擁太行南襟河濟北枕居庸蘇秦所謂天府百二之國杜牧所謂王不得不可為王之地楊文敏謂西接太行東臨碣石距野亘其南居庸控其北勢拔地以崢嶸氣摩空而崱屴又云燕薊內跨中原外控朔漠真天下都會桂文襄公謂形勝甲天下扆山帶海有金湯之固蓋真定以北至于永平關口不下百十而居庸紫荆山海俱關隘喜峯古北黃花鎮俱口子險厄尤著會通漕運便利天津又通海運誠萬世帝王之都自昔之都燕者始於召公諸侯也金元乃雜霸之氣皆不足以當其大惟我皇明得國之正同乎堯舜拓地之廣過於漢唐功德隆盛上足以當天心下足以乘地氣真萬世不拔之洪基而議者乃謂北太近邊距塞不二百里無藩籬之固而天子自為之守然不知今之北門管鑰為急倐忽來去邊備須嚴若畿甸去逺而委守將臣則非居重馭輕之道故我成祖文皇帝睿意建都於此良謨逺猷豈凡愚之所能及哉然當時未必談及風水之説而默契若此是蓋聖王之興動自合法而天地造化有自然相符之理耳抑論堯舜禹三聖之都皆北龍今我朝家畿甸亦北龍而形勝與夫風水法度又皆邁之宜其駕唐虞追三代全盛如此是固我列聖之峻德神功鴻休盛烈之不可及然地理之應亦或然也愚何幸躬逢其盛北龍之次有平陽蒲坂安邑亦冀境乃堯舜禹所都之地按朱子曰河中地形極好乃堯舜禹故都今晉州河中府是也左右多山黃河繞之嵩河列其前又曰河東河北皆繞太行山堯舜禹所都皆在太行山下又曰上黨太行山之極髙處平陽蒲坂山之盡頭堯舜之所都也又曰堯都中原風水極佳右河東太行諸山相繞海島諸山亦皆相向右河南繞直至泰山湊海第二重自蜀中出湖南廬山諸山第三重自五嶺至明越又黑水之類自北纒繞至南海此皆以其大形勢而言之也宋國師張子微曰河中之地右則西河左則東河前則南河逾河而為壺口近河而為覃懷入河而為衡漳三面距河一面背山所背恆山相去甚逺逶迤而下其平如砥方廣千里夾水之外四面皆有名山巨鎮迎送護衛但堂局寬濶非凡俗所能檢點若兩腋無水夾截即是水不交會大龍如何得住故夾身之左有小東河右有西恆水南有小南河關截於內而大河經之龍將焉往其他撓掉手足得無名之水界夾分明者又不可以數計眼目難於檢點舉其堂局形勢可想而知此則以其親切者而言之也是故河中誠亦天地間大都會而堯舜禹三聖人以道化天下後世罕及雖聖人巍峩未必係於風水然天造地設自然默契之理有不可誣者但今河水為患風水變遷無復可都矣蓋河源於崑崙星宿海又入地伏流不見其派者凡數百里禹之所𨗳始於積石初不曽窮河源也河至於此其勢橫放衝溢外則涇渭沮之會于渭汭又有伊洛瀍澗汾黎之會于底柱所泄惟汝泗二流內則淮濟內河滹沱恆絳從而益之至於九河逆河勢雖逺而逾盛故有河患非人之之所制者是以河決之患三代已然自漢唐宋元及今頻年衝決而沿河之民淪於魚鱉況可都乎論中龍帝都垣局中龍有關中曰豐曰鎬曰咸陽長安皆今陜西地通曰關陜古雍州也楊公云關中原是太微垣又曰長安落在垣宿中蓋中幹之尊也其龍發於崑崙由黑水綿絡西河橫出始起祖宗轉縈貊澤自西而東盡於雍州宋國師張子微曰長安之龍起於橫山其山皆黃石綿亘八百餘里不生草木及至雍州之地涇水出安定在雍州之西自西而南入渭水而北是為渭汭水出鳥鼠同穴而為雍州之西山至涇水所屬之地則為北惟此依山挾水號為天府之國又曰秦咸陽非長安之正以宫屬渭跨渭為飛橋復道以象天闕道而屬阿房如驪山溫泉又長安之枝龍也長安之下則有岐梁荆諸山為托灃涇漆沮河水界限為衛蔡文節公曰咸陽之地龍合之玄格左右諸山包護此皆謂其風水之美也若以形勝言之則婁敬所謂披山帶河四塞為固張良所謂左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而守獨以一面東制諸侯乃金城千里天府之國者是也故史稱關中阻山帶河四塞之險東有函關西有散關南有武關北有蕭關吕成公亦謂關中是形勢之地欲據形勢須都關中桂文襄公謂其山河四塞形勝甲于天下易曰天險不可升地險山川丘陵王公設險以守其國惟此為然耳故關陜之地形勝全龍局美王氣攸萃而文武周公列聖篤生自文王都岐徙豐武王遷鎬京成王實都于鎬以據天下形勢當西周全盛時特往來朝諸侯於洛邑至平王避犬戎始遷都洛陽號曰東周則周日微弱而雍州王氣為秦得之蓋秦先世有非子者善育馬為周孝王主馬馬大蕃息分土為附庸邑之秦歷三世至秦仲始大歷莊襄犬戎殺周王襄公救周有功封為諸侯賜以西周畿內八百里之地秦即其地日以強盛兼併天下統一區宇然無功德肆暴虐不足以當其王氣之大漢興以婁敬張良之議遂因其故都都之傳十二帝歷二百一十四年其後唐又都之傳一十八帝歷二百六十九年宋人亦嘗議欲都此而以橫山未入版圖故都大梁以經營橫山蓋橫山當宋時諸戎所依為戎夏必爭之地不得則不可都故爾丘文莊公曰秦地披山帶河四塞以為固所謂金城千里天府之國得天下之百二者也周人初起於邠繼都豐鎬天下形勢之地蓋莫有過焉者也至平王東遷而棄其地與秦秦地始大戰國之世山東之國六而秦居其一六者為縱而獨為衡焉卒能以少制衆併而有之非獨人力蓋亦地勢也自髙帝用婁敬言西都關中後世言形勝者必歸焉唐起晉陽亦居於斯自宋人都汴之後王氣消歇者五六百年於今矣詳究文莊兹論各有所見而議者乃謂漕運不便然不知周與漢唐各數百年而其儲積豈無其道且禹貢著雍州厥田惟上上史稱沃壤千里可以儲貯而秦號富強顧所處之何如耳大抵雍州非直形勢險固風水融聚為美已也且其水深土厚民性質朴易於從化尤為可嘉朱子曰岐豐之地文王用之以興二南之化如彼其忠且厚也秦人用之未幾而一變其俗尚氣槩先勇力忘生輕死悍然有招八州朝同列之氣其故何哉誠以雍州土厚水深其民重厚質直無鄭衛驕惰浮靡之習以善𨗳之則易興起而篤於仁義以猛驅之則其強毅果敢之資亦足以強兵力農而成富強之業非山東諸國所及也後世欲為定都立國之計誠不可不監乎此而於𨗳民之路尤不可不慎其所之旨哉言乎中龍之次有洛陽即周營洛邑之地也前值伊闕後據邙山左瀍右澗洛水貫其中以象河漢此紫薇垣局也張子微曰洛邑是飛龍格勢腳手本自分明迎送却從外假合凡大地迎送皆取諸外而不取諸身所謂本身腳手一屈曲縈回輒五六十里或七八十里故人不見其為手足况逺外迎送其得見乎此其平夷之地一望無際惟審其水源而後識之也然洛居天下之中為大龍之腹四望平夷近則熊耳居其右西京在其左取諸逺則上洛在其西太華在其東終南惇物在於北內方則在河南周公所以取制天下之中猶腹為人身都會之所也以水而言則洛水自西而經其前瀍澗界其東汾􅤰繞其後伊水陳其面最合風水法度但以形勝論之則平夷無險四面受敵故周營洛邑特以宅中圖治道里適均之故乃於此朝會諸侯非建都也按大學衍義陳大猷曰成王實都鎬京特往來朝諸侯祀清廟於洛故鎬京謂之宗周以其為天下所宗也洛邑謂之成周以周道成於此也洛邑天下之至中豐鎬天下之至險成王於洛邑定鼎以朝諸侯所以承天地中和之氣宅中以蒞四海其示天下也公於鎬京定都以壯基本所以據天下形勢據上遊以制六合其慮天下也逺誠哉言也後平王避犬戎徙都於洛則周室日衰馴至不可為矣漢初髙帝亦欲都洛以婁敬張良之言都於關中光武中興始於洛建都謂之東都洛陽却在周都河南又隔伊水有諸水在後而地方之備差完頗為可取然皆平洋無蔽有德易以王無德易以亡不可用也故東周都洛而能延數百年之久者誠以文武之德民不忍忘故爾溫公歷年圖曰周自平王東遷日以衰微至於戰國又分而為二其土地人民不足以比強國之大夫然天下猶尊事之以為共主綿綿然久而不絶其故何哉文武之德植本固而發源深也不然以區區數邑處於七暴國之間一日不可存況於數百年乎此確論也中龍之又其次者有汴梁其龍自熊耳至此平坦萬里天河在其北淮河在其南亦天苑垣也五代梁唐晉周皆都於此而年代不永宋都之傳九帝歷一百六十七年而南遷臨安是時汴在河之南猶差可取今河水衝決而在於河之北無復當時風水形勝耳舊説黃河在開封城北四十里宋元以來河徙穿淮馴及我朝洪武二十四年河決原武東經開封域北五里又南行至項城經潁川以入淮而黃河故道遂淤正統十三年又決滎陽過開封城之西南而城北之西河又淤自是汴梁城在河之北龍脈經河穿壞形勝亦無河繞可恃不可用也論南龍帝都垣局南龍有金陵即今之南畿我太祖髙皇帝建都之地也戰國楚威王時以其地有王氣埋金以鎮之故稱金陵漢改曰秣陵吳曰建業晉曰建康其形勢前輩與洛陽同廖氏云建康形勢洛陽同王氣古云鍾蓋紫薇垣局南幹之盡也蘇伯衡謂劉迪簡云金陵地脈自東南遡長江而西數百里而止其止也蜒蜿磅礴既翕復張中脊而下降為平衍所謂土中於是乎在西為雞籠覆舟諸山又西為石頭城而鍾山峙其東大江回抱秦淮玄武湖左右映帶兩淮諸山合沓內向若委玉帛而朝焉諸葛孔明謂鍾山龍蟠石城虎踞真帝王之都昔始皇見金陵有王氣東遊以壓之其後三國吳都之傳四世東晉又都之傳十一世歷百餘年南朝宋齊梁陳南唐皆都之而年代不永蓋以其雖合垣局而垣氣多泄故爾楊筠松云長江環外有三結垣前水中列垣中已是帝王都只是垣城氣多泄是也若以形勝論之則江限南北古今恃為天險朱子曰東南論都必要都建康者以建康正諸方水道所湊一望則諸要會地都在面前有相處劉誠意伯謂襟帶長江勢甚險固桂文襄公謂金陵江北則有徐潁二州地跨中原􅏨連數省並稱雄鎮為藩籬有控扼之勢江南則有安慶當長江委流西控全楚為江表門户按諸君子所論形勝是誠英雄用武之地可以駕馭四方號令天下而興王業者我太祖髙皇帝以之定鼎良有見也但以地理家言之雖合紫薇垣局奈垣氣多泄故成祖文皇帝再建燕京為萬世不拔之基豈偶然哉蓋天眷皇明故二祖動即合法而初非有意於地理之説耳南龍之次有臨安今浙江杭州府其龍脈自天目山分入錢塘而海門有龕赭二山在中郭景純記云天目山前兩乳長龍飛鳳舞到錢塘海門更點巽峯起五百年間出帝王經云海門環合似天市天目天池生侍衛萬里飛來垣外挹海外諸峯補垣氣廖氏云大江以南天目峙海門似天市故臨安亦天市垣耳若以形勝論之則僻處一隅爾朱子謂如入屋角房中坐視外面殊不相應宋髙宗南遷建都於此其卜相京畿國師吾邑傅公伯通也有臨安行在表謂其地只可駐蹕不宜建都不過偏安之地且主姦相弄權武臣多咎後宋竟未能恢復而姦相如秦檜賈似道諸人不忠皆操弄國柄武臣多不善其終果符傅公之言古今都會總論班孟堅著漢史敘列國之地各有都會蓋謂其財貨之所阜水陸之所湊山河之所襟帶足以指臂四域冠履一方而獨隆者也夫土地腴瘠道里逺近山川夷險皆一定而不可易者則名都要會之所宜古今之所同也然而興廢隨時升降不一郡方都會代有不同前王之所升者或後王之所廢今之所重者乃古之所輕如宋北京古之元城縣也西漢時已有元城縣應劭以為即魏公子元之食邑自有書契以來逮夫隋唐之交兩河變故實多其王霸之所重督帥之所治戰爭守城不免前史載之詳矣初未聞所謂元城者當時河朔都會代有其所或稱濮陽宋朝開德府即古之帝丘焉乃髙陽及昆吾氏之墟春秋魏國常遷于此或稱朝歌宋朝衛州黎陽縣鎮商自武丁已後至紂都之周初衛國亦都于此或稱邯鄲宋朝磁州邯鄲縣戰國趙嘗建都于此或稱襄國宋朝邢州即漢襄國縣也西楚常山王張耳後趙石勒皆都之春秋時謂之夷儀即邢所遷也古謂之邢商帝祖乙遷於邢即此也或稱鄴城宋朝相州臨朝縣之鄴鎮商帝河亶甲曹魏後趙前燕東魏北齊皆都之或稱中山宋朝定州戰國時中山國都後燕慕容垂亦都之斯六城者屹然據趙代之間古今更相倚以為重豈元城之足云哉李唐之季魏州始稍隆重更五代至于宋朝形勢益壯遂建上京而歷代所稱六城者反蔑然無聞矣夫鄴城一地也而始建為都又降而為州後周降為相州又降而為縣後周又移州為安陽縣降而為鎮宋朝熙寧中省鄴縣為鎮入臨漳縣何其前重而後輕也元城亦一地也始建而為縣又升而為郡曹操就置武門郡又升而為州後周就置魏州又升而為府唐升為大都督府又升而為京宋朝慶厯二年升為北京何其前輕而後重也夫土壤腴瘠山川夷險古今不殊而前後輕重若此是不無其説也易曰田囿之蕪治城池之修廢民物之聚散甲兵之利鈍風俗之美惡皆在人事如何耳此非地利所能移也人事既有工拙而形勢輕重亦隨時而遷矣歷觀往古皇帝王霸之都興廢無常類皆如此豈惟鄴城而已哉試因此而備論之三皇五帝三王之都十有二曰陳宋朝陳州伏羲所都曰曲阜宋朝改為仙源縣𨽻龍慶府神農少昊所都曰涿鹿宋朝燕山府黃帝所都曰新鄭宋朝鄭州新鄭縣即古之有熊氏也黃帝所都曰帝丘宋朝開德府髙陽所都曰亳宋朝西京偃師縣帝嚳成湯所都曰安邑宋朝澤州安邑縣帝禹皆都是曰平陽宋朝晉州唐堯所都曰蒲坂虞舜氏都曰陽翟宋朝潁昌府陽翟縣夏禹所都曰豐曰鎬豐在宋朝京兆府之西北靈臺鄉豐水上鎬在昆明池北鎬坂上相去才二十五里周文王都豐武王都鎬至春秋戰國時為大國之都者才五城而已曰曲阜曰安邑曰新都曰薊春秋戰國之時大國之都十有七曰曲阜魯國都曰新安韓國都曰安邑魏國都曰陳楚自鄴徙於此曰薊即涿鹿也燕國都曰吳宋朝平江府吳國都曰絳宋朝涿州絳縣晉國都曰雍宋朝燕府秦國都曰郢宋朝荆南府江陵縣地楚國都曰睢陽宋國都曰臨淄宋朝臨淄縣齊國都曰會稽宋朝越州越國都曰邯鄲趙國都曰大梁魏自安邑遷于此曰夀春宋朝夀春府之夀春縣楚自陳徙于此曰櫟陽宋朝京兆府之櫟陽縣秦自雍而徙干此曰咸陽宋朝京兆府之咸陽縣秦自櫟陽遷于此至西漢之初為藩王之都者才三城而已曰邯鄲曰臨淄曰薊西漢之初為藩王之都十有四曰邯鄲趙國都曰臨淄齊國都曰薊燕都曰許宋朝徐州楚王劉交所都曰下邳宋朝淮陽軍楚王韓信所都曰定陶宋朝興仁府之定陶縣梁國都曰晉陽宋朝平定軍韓國都曰丹徒宋朝鎮江府荆國都曰廣陵宋朝揚州吳國都曰臨湘宋朝嶽州臨湘縣長沙國都曰番嵎宋朝廣州南越國都曰代晉魏以後夷狄侵其都代國都曰閩宋朝福州閩越王都至魏晉南北之時為王霸大國之都者一城而已薊是也魏晉南北之時王霸大國之都者十有七曰薊前燕國都曰許宋朝頴昌府之許昌縣魏太祖奉漢獻帝都于此曰鄴注已見前曰公安蜀先主初治于此曰成帝宋朝成都府蜀王李特譙縱皆都于此曰武昌宋朝鄂州吳國孫權宛都乎此曰秣陵宋朝建康府吳晉宋齊梁陳皆都之曰洛陽宋朝西京曹魏皆都之曰平陽後漢劉聰都之曰襄國後趙都之曰廣固宋朝青州益都縣南燕都之曰中山宋朝宋州後燕都之曰江陵宋朝荆南府元都都之曰統萬宋朝夏周赫連夏都之曰平城宋朝雲中府拓拔魏都之曰柳城宋朝營州前燕後燕北燕皆都之至隋唐五季之時為王霸僣竊之都者總六城而已魏鄭隋唐後漢石晉皆都之洛陽隋唐皆都之長安前蜀後蜀皆都城都偽燕遼國皆都之吳南唐皆都建康偽梁南平皆都江陵唐去宋為甚近也而唐時三都存于宋朝者一而已東都洛陽是也其西都則降為京兆府其北都則廢為平定軍而宋朝四京因于唐者一而已東都洛陽是也餘三京則皆當時之郡治耳夫以數十年之間其興廢之驟也如此矧以悠悠往古而較於今是必有大不相侔者矣夫然後知地無常重亦無常輕挈其輕重之權者在斯民而已民無常重亦無常輕挈其輕重之權者在政理而已觀姬周以前帝王之作莫不更都三河之間未始有宅西土者也爰自后稷居邰太王居岐文王都豐武王都鎬而關中浸以休息自後雍土常為王霸之都則以后稷之稼穡太王之遷豳文王之子來武王之求定有以臻此之盛也自周至唐洛陽為帝居垂二千載矣而代宗遭吐蕃之亂倣徨陜服欲東遷洛陽而郭子儀以為東都乘大亂之餘千里蕭條百遭荒榛其何以備萬乘供百官井舍代宗遂西還而不復倚洛陽為重由是觀之則班史都會之論特可施之一時而不可施之萬世也若欲隆上都而觀萬方峙都府以制四履則要當以政事為先豈以古為泥哉天下各國形勝中國之地左濵海右通流沙方而言之萬五千里堯别九州舜為十二秦前有藍田之鎮後有胡苑之塞左崤函右隴蜀西通流沙險阻之國也蜀漢之土與秦同域南跨卭笮北阻褒斜西即隈礙隔以劍閣窮險極峻獨守之國也周在中樞西阻崤谷東望荆山南面少室北有太嶽三河之分雷風所起四險之國也魏前枕黃河北漳水贍王屋望梁山有藍田之寶浮地之淵趙東臨九州西瞻恆嶽有沃瀑之流飛狐井陘之險至於潁陽涿鹿之野燕却背沙漠進臨易水西至君都東至於遼長蛇帶塞險陸相乘也齊南有長城巨防陽關之險北有河濟足以為固越海而東通于九夷西界岱嶽配林之阪險固之國也魯前有淮水後有岱嶽蒙羽之向洙泗之流大野廣土曲阜尼丘宋北有泗水南迄睢渦有孟諸之澤碭山之塞也楚後背方城前及衡嶽左則彭蠡右則九疑有江漢之流實險阻之國也南越之國與楚為鄰五嶺已前至于南海負海之邦交趾之土謂之南裔吳左洞庭右彭蠡後濵長江南至豫章水戒險阻之國也東越通海處南北尾閭之間三江流入南海通東治山髙海深險絶之國也衛南跨于河北得洪水南過漢上右通魯澤右指黎山圖書編卷三十三
