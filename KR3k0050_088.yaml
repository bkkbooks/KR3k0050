body:
  text: 圖書編卷八十八明章潢撰財賦總叙賈山至言曰昔者周蓋千八百國以九州之民養千八百國之君君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力盡不能勝其役財盡不能勝其求一君之身耳所自養者馳騁弋獵之娛天下弗能供也然則國之廢興非財也財少而國延財多而國促其效可覩矣然自周官六典有太府又有王府内府且有惟王不會之説後之為國者因之兩漢財賦曰大司農者國家之帑藏也曰少府曰水衡者人主之私蓄唐既有轉運度支而復有瓊林大盈宋既有户部三司而後有封椿内藏於是天下之財其歸于上者復有公私恭儉賢主常指内帑以濟經國之用故民裕而其祚昌淫侈僻主至糜外府以供耳目之娛故財匱而其民怨此又歴代制國用者龜鑑也周官理財總論或問周禮真理財之書乎曰周之理財理其出而已矣非理其入也理國之財而已矣非理天下之財也昔者天下之民百畝之田可以無饑墻下之桑五母之雞二母之彘可以衣帛而食肉而又任之以百工商賈責之以嬪婦臣妾資之以山澤藪牧其地無餘利而其民有餘財當是時也下之所以輸於上者常易辦而上之所以取於下者常不見其難集内而九功之正税九職之正賦外而九正之常則其時已至其財已可取責太宰立法以授之征者司徒之屬征財以入之掌者太府之職掌財以頒之當用者如斯而已矣非理天下之財之入也財之來為無窮財之取為甚易其藏之常足而盈羡而其用之也則常懼其姦欺而鹵莽是故一時之財不待於理其入而常盡心於理其出焉每觀六典之書六卿之職兵既以私田而不餉士大夫既以公田而不廪而歳時經費獨祭祀賔客喪荒飲膳衣服與夫稍秼匪頒賜予玩好數者之用而已周公於此上則慮夫人侈心之生而妄費之無節下則慮夫掌財用財者之滲漏乾沒或有以容姦而肆欺異日之憂則又慮夫國計匱乏而府庫空虚既窘於用則不免虐取於民也於是一毫財賦之出而數人之耳目通焉前有太宰小宰宰夫後有太府掌皮地官之屬又有泉府廪人但斂散賙救事近於民故泉府而下皆以屬地官太宰兼制國用故太府與司㑹皆列於天官而太府以下三府則皆掌貨賄泉布以待用司㑹以下四職則皆掌㑹計以足用衣裘皮革之數一歳之出入尤多則又專命司裘掌皮以㑹計其用反覆十一官之職未嘗不深歎周公措置之合宜而均節之有法防閑之周宻而視聽之詳多也蓋内府若可以兼王府矣而必分為二府者切於一身之用固不可以混夫一國之用也司㑹若可以通司書矣而必立為二司者掌財用之㑹計固不可汨之以書契版圖也職内若可以攝職歳矣而必分為二職者出入之數固不可以專責之一人之手也使其兼攝而通行之則不惟不免於姦欺而其内外之參差不齊出入之交錯差舛簿書㑹計之煩多委軋亦必將有敝其精神而昏其思慮者周公不為此也故以太府言之自關市之賦以至萬物之貢其各有所待非以其物也以其數之多寡而為所用厚薄之限也以其數之多寡為限則用不免有欠餘勢不免有相補足而財不免有相移用移易紛然始舛錯而難理是非一人之所能理也故法式則見於太宰而定數則見於太府移用則掌於職内矣以内府言之九貢九賦九功之貨賄與夫四海幣獻之貨賄紛然而入既擇其精美者以充王之藏又擇其精美者以充王之獻九貢九賦九功之良兵良器與夫四方之金玉齒革兵器雜然而受既以共王之玩好又以共王之獻賜又以待邦之大用是亦非一人之所能究故其大體則掌於内府而其精美𦂳切者則分於王府矣又以外府言之掌邦布之出入以共百物之用此特其綱領也至於王后世子凡衣服之用邦布者則共之祭祀賔客喪紀㑹同軍旅凡幣帛賚予之用邦布者則共之賞賜給勞之用邦布者則又共之其出入文用固已鎖碎不一矣而斂滯貨給除貸所以用通者則又豈外府之所能兼乎故係邦之用者則外府領之而其在民者則分於泉府矣以至司㑹而下掌皮而上其所以設官分職而不相參者大抵皆然雖式貢之餘財以共玩好之用而司書亦别為一書以待司㑹之攷以佐太宰之撙節雖然此特其不相參者耳至於相參而相攷者則内府在内反以共仰之大用外府在外反以共王后世子衣服之用内外互相攷也職内職入反以每歳所入而考其所出職歳職出反以每歳所出證其所入出入互相考也不相參則可以専其耳目必相考則可以防其姦欺惟其然也故財用之出上無所肆其侈下無所容其私上不侈而下不私則財常足於用征斂常不至於虐而民無復有受其病者然則周家之理財理其出而已非理其入也理之於上者不欲虐取之於下而已非固屑屑焉為是不憚煩也大宰統其大綱司徒統泉府倉人廩人之大綱㑹計則均出於司㑹式法之數則同出於大府然則論周家之理財太宰之府較太府太府式法之次序辨九貢九正九賦九式九事之異同此則自有諸儒之𫝊説在經𫝊所稱國中邦中四郊鄉遂近郊逺郊野等地名多錯互惟比而觀之自可見載師以㕓里任國中之地以場圃任園地又云國宅無征此則國中正名太宰又謂之邦中也以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地而其下即稱公邑則知近郊為鄉逺郊為遂其義甚明遺人邦之委積以待施恵即國中鄉里以恤民之囏阨即六鄉郊里以待賔客即六遂野鄙以待覊旅即甸外故知曰邦中曰鄉曰遂曰野界限亦甚明若秋官鄉士掌國中以鄉為國中遂士掌四郊則以遂為郊縣士掌野則自遂以外之稱書費誓魯人三郊三遂郊在遂上則以鄉為郊孟子請野九一而助國中十一使自賦則以鄉為國中遂以外為野葢六鄉者附郭之民與國中同故鄉士稱為國中民居稠宻可井者少故孟子亦稱為國中以其原係近郊之地故遺人以遂為郊里秋官遂士以遂為四郊也以鄉對遂則遂為野故遂人云掌邦之野孟子所謂請野九一而助以遂對甸則甸在郊外為野故縣士又云掌野也周禮貢賦税征總論問畿外有貢畿内有賦有税有征斂之目其别何如曰公田以為税私田以出賦征斂則税賦之總名家征力征則以一家餘夫之力言之夫征地征則以一夫私田之賦言若畿外諸侯則食公田之税以為禄私田之賦以為貢耳學者于貢賦税之説何其紛紛也愚請略公田之税而姑論畿内之賦次及于畿外之貢然後紛紛之説可以盡折而一之人徒見夫税以足食賦以足兵則以民賦為止于兵車以九賦為諸臣田祿之賦非也税賦雖一而賦有三凡起徒役毋過家一人此兵賦也甸出長轂一乘此車賦也一曰邦中二曰四郊而下此九等之賦也時方有事則農出一兵甸出一車事已則兵還于農車還于甸雖名為賦其實則使民自為衞耳有以足軍之用而未有以足國之用也國之大用有祭祀有賔客有喪荒羞服有工事幣帛有芻秣匪頒好用不取諸民于誰責而供之於是始助百畝之私以制九等之賦勸九職之任以代九賦之出今考之周禮國中四郊之賦閭師征之野之貢賦縣師征之委人征薪芻木材獸人㕓人收皮毛筋角人斂齒角羽翮非人收金玉錫石澤虞取國澤財物掌葛掌染草則征絺綌染草以當邦賦掌炭掌茶則征灰炭茅莠以當邦賦其始也以九谷為主而其中則皆以九賦之物充賦其始也以五等定輕重而其終則皆以年之上下出斂法熟讀一書其所以孜孜於田賦之説者葢以未始立法也昔公田什一之税周禮曷嘗一言之豈惟公田太宰九等之賦言軍旅亦以一兵一車之出自有定制耳此自黄帝為井牧以來未之有改彼則自周公之身而經始之色目常慮其巧立輕重常恐其過差有無常患其相違受用常憂其相亂是以太宰正其名載師酌其數閭師縣師隨其物大府謹其待用葢其始終本末無毫髮不經思慮者達之王畿之外則有異名而無異法諸侯食其税于國則税之名變而為禄諸侯納其賦于王則賦之名變而為貢始于太宰之致其用中于司馬之制其賦終于小行人之致其獻考之職方氏自揚之金錫荆之丹銀并之布帛此即取物以充賦也自侯服之祀物甸服之嬪物以至要服之貨物此即取物以為貢也其纎悉委曲則與畿内無一不相合若以禹貢之書考之然後周禮貢税賦之别源流㑹通葢無可疑者夫冀州在王畿之内堯之所都也厥賦惟上上厥田惟中中是公田之税雖其等在五而私田之賦拆以他物則其等實在一也此乃太宰之九賦也八州在王畿之外諸侯之國也田賦之下于是始立為貢篚之制焉有金木鉛石之貢有漆絲羽茅之貢有球琳琅玕銀鏤砮磬之貢此則大宰之九貢也然禹貢與周禮少異者周禮畿内之類通可以言貢而禹貢則專以為賦禹貢畿内之賦專以粟米之屬而周禮則雜以他物代之此特其㣲異者耳不害其為同也周衰王制不明貢税賦之法不復存成王周公之制魯之宣公初税畝是以公田之外復履私田之畝行什一之税雖然賦則尚無恙也至于成公之作丘甲則每三甸而加一乘兵車之賦非復司馬之舊哀公之用田賦則受田百畝而出賦二十畝私田之賦非復載師之舊至于邦國之貢益悖謬而無統包茅不入王祭不共是諸侯既不致貢于天子子産言鄭伯之男服而使從公侯之貢見昭公十三年是晉人責貢於諸侯者又難給焉此豈惟非周家之舊法哉虞夏貢賦之法自三代以來所謂相承而不廢者至春秋而掃地矣嗚呼讀周禮見周之所以盛讀春秋見周之所以衰按周禮置理財之官及理財之法可見天下貨財必有統御而後能度支惟冢宰制國用此量入為出之道也後世量出以為入故當事者漫無所紀各求其事之必濟竭民之財而不知唐之錢榖判於丞相宋立三司使雖其法屢變要之欲一事宜以歸主者元豐改制計相職分天下之民困于取之無度而公帑日窘雖欲會其歳之登耗審其儲之盈縮稽其民之虚實以衡出入不可得也今之户部大率類此兵禮工光禄太僕等衙門錢糧多有不通籍户曹者當祖宗創設之始葢嘗周覽畢議兼總一時之條貫分布諸司時移事更盈縮登耗實不相侔而尚守其二百年之舊由其不能通耳九賦九賦之中除關市幣餘于九職無與山澤出于虞衡藪牧其餘千里之地孰非九職之民故曰九賦不外乎九職九職九職之中除虞衡藪牧當山澤之賦其餘七等之民分布于千里之内故九職即所以出九賦也按九職生財之道九賦斂財之道也王畿之内分九等職事以任萬民則生之者衆為之者疾矣賦取于民之稱兵有車馬戎器亦取于民故謂兵為賦賦分九等乃王國賦入之定法也生之有常産斂之有定法先王之厚民也如此後世為民上者不過聽民之自為生甚則困之使民無以為生且日夜疾視其民而斂之若仇民將何以遂其生哉理財考周禮太宰以九賦斂財賄一曰邦中之賦在城郭者二曰四郊之賦去國百里三曰邦甸之賦二百里四曰家削之賦三百里五曰邦縣之賦四百里六曰邦都之賦五百里七曰關市之賦八曰山澤之賦九曰幣餘之賦職幣所掌餘財以九式均節財用一曰祭祀之式二曰賔客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式葉時曰未見其理財先見其節用則是周公之節財乃所以理財也太府掌九貢九賦九功之式以受其貨賄之入金玉曰貨布帛曰賄頒其貨于受藏之府内府頒其賄于受用之府外府凡官府都鄙之吏及執事者受財用焉凡合用財物皆受之太府凡頒財以式法授之關市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待王事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜予凡邦國之貢以待弔用即九貢之財凡萬民之貢以充府庫即九職之財凡式九式貢九貢之餘財以供玩好之用凡邦之賦用取具焉歳終則以貨賄之入出㑹之王府掌王之金玉玩好兵器凡良貨賄之藏凡王之獻金玉兵器文織良貨賄之物受而藏之凡王之好賜共其貨賄内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用凡四六之幣用獻之金玉齒革兵器凡良貨賄入焉外府掌邦布之入出以共百物而待邦之用凡有法者故冡宰施其法于上者也司㑹察其法于下者也則有傷于國有蠧于民葢得以卷舒裁成王道焉然後參互以考之防吏之奸欺非以戕吾民也司書掌邦之六典八法八則九職九正九事邦中之版土地之圖周知入出百物以叙其財受其幣使入于職幣職内掌邦之賦入職歳掌邦之賦出職幣掌式法以斂宫府都鄙與凡用邦財者之幣振掌事者之餘財廩人見前恤民之患内倉人掌粟入之藏辨九榖之物以待邦用若榖不足則止餘法用有餘則藏之以待凶而頒之按成周理財之官有太宰以制其出有司徒以制其入而其官屬之太宰者有職内以㑹其入有職歳以㑹其出有職幣以㑹其餘而其大要則總之以司㑹掌之以司書所以參校鉤稽之者日有日要月有月成歳有歳㑹若夫司徒之屬則有所謂泉府廩人舍人倉人或以分其財首或以取其財用是固人君治世之大用而大臣經國之要務也原其所以經治之大要有三焉生財共王后及世子衣服之用按大府之職兼總内外二府内府在内所供者乃邦之用外府在外所供者乃王及后世子衣服之用内外交相稽考用之于外者取之于内用之于内者取之于外此宫中府中共為一體而内外之情通或者深宫之中燕好之私恐外人知而中止者有矣此古人之深意歟司㑹掌邦之六典八法八則之式以逆邦國都鄙宫府之治以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用掌國之宫府郊野縣都之百物財用凡在書契版圖者之式以逆羣吏之治而聽其㑹計以參互考日成以月要考月成以歳㑹考歳成以周知四國之治以詔王及冢宰廢置劉彛曰司㑹職財計者也而必先掌六典八法八則之式以逆邦國都鄙官府之治者聖人以為職㑹計以進身者不顧國政之是非不度民情之弊疚惟利是積則或傷于仁惟財是求則或害于義故禮樂衰㣲黎民困弱非所以存國之體也故必知六典八法八則之本然後施九貢九賦九功九式之法知其治之本而不失之則財用可致而不害夫王之所以皇建其極于天下者以生財有道取財有義用財有禮而已先儒謂自其係之九兩以定其業任之九職以厚其生雖無常職者猶使之轉移執事以食其力凡此皆生財也財足矣然後制九賦之法以取之又制為九式之法以用之夫有道以生財有義以取財有禮以用財然後有以服天下則諸侯有以服天下則諸侯是以莫敢不來享而邦國之用可制故九貢又次之由是觀之萬世安民生裕國用之常經大道誠不出乎是書若王莽假之以禍天下王安石竊之以促國脉皆周禮之罪人也孔子曰若欲行而法則周公之典在王通亦曰如有用我執此以往謝枋得曰民生于三代之前其命制乎君民生于三代之後其命制乎天吾求其所以制命之道矣取民常少與民常多斂散得宜豐凶有備新者方收入廪陳者即取以食農人補不足助不給從古以來豈無水旱霜蝗吾民常如有年者上之人斂散得其道也漢制大司農卿一人掌諸錢糧金帛貨幣郡國四時上月旦見錢榖簿其逋未畢各具别之邉郡諸官請調度者皆為報給損多益寡取相給足丞一人主帑藏少府卿一人掌中服御諸物衣服寳貨珍膳之屬凡山澤陂池之税名曰禁錢皆屬焉後漢始以屬司農水衡都尉主上林苑後漢有之併去職于少府按母將隆言于哀帝曰國家武備繕治造作皆度大司農錢大司農錢自乘輿不以給供養供養勞賜一出少府葢不以本藏給未用不以民力供浮費判公私示正路也應邵註漢書謂縣宫公作當抑司農今出水衡錢以為異政由是觀之在大司農者國家之公用也在少府水衡者人主之私蓄也公用所儲乃田賦之常數非軍國之需則不用私蓄所具乃山澤之餘利雖燕好之私亦可用焉其制雖異而用則周然出入之際有所分别不至混用而濫費漢高祖時張相為計相唐置度支郎中掌天下租賦物産豐約之宜道塗之利歳計所出而支調之宋沿五代之制置三司使以總國計號曰計省位亞執政目為計相恩數與參樞同按大學以用人理財為平天下之要道前代稱輔弼之臣曰宰相㑹計之臣曰計相同以相稱一以用人一以理財皆相佐其君以平治天下者也唐制户部掌天下土地人民錢榖之政貢賦之差其屬有四一曰戶二曰度支三曰金四曰倉李翺作平賦書諸人皆知重斂之可以得財而不知輕斂之得財愈多也楊炎言于徳宗曰財賦邦國大本生人之喉命天下治亂輕重繫焉先朝權制以中人領其職五尺宦䜿操邦之柄豐儉盈虚雖大臣不得而知無以計天下利害臣請出之以歸有司從之乃詔歳中截取入大盈庫度支其數先聞按徳宗為君楊炎為相無可取者惟此一事差强人意范祖禹謂炎知為相之體徳宗知為國之務後世所當法也及徳宗宣索于諸道而勅其勿使宰相知李泌知徳宗非禮誅求而惆悵不敢言胥失之矣然徳宗勿使宰相知是猶知所畏而秘之不言則為臣而不忠矣憲宗元和二年李吉甫撰元和國計簿上之按自唐李吉甫為元和國計録丁謂因之為景徳㑹計録其後林特作于祥符田况作于皇祐蔡襄作于治平韓綘作于熙寧蘇轍作于元祐所㑹計者其别有五一曰收支二曰民賦三曰課入四曰儲運五曰經費所以總括天下財賦出入之數而周知其有無多寡以為豐殺增减者也使今之知昔而後之知今以歳計定國用實有賴于斯焉宋太祖以軍旅饑饉嘗預為之備不可臨事厚斂于人始于講武殿置封樁庫常欲積縑帛二百萬易外國昔太宗置景福殿庫𨽻内藏庫揀納諸用上供物史臣曰有宋自中世以後内牽于繁文外撓于彊敵供億既多調度不繼勢不得已徴求于民又多伐異而黨同易動而輕變殊不知大國之制用如鉅商之理財不求近效而貴逺利宋臣于一事之行初議不審行之未幾即區區較其失得尋議廢格使上之為君者莫之適從下之為民者無自信守因革紛紜是非貿亂而事弊日益以甚矣世謂儒者議論多于事功若宋人之言食貨大率然也蘇轍曰國之財賦非天不生非地不養非民不長取之有法收之有時盡于是矣而宗室官吏之衆可以禮法節也祖宗之世士之始事當秩者竢闕則補否則循資而已不妄授也仁宗末年自宰相以下任子之法無不减損英宗之初三載考績增以四歳神宗之始宗室袒免之外不復推恩袒免之内以試出仕此四事者使今世欲為之將以逆人心違舊法不可言也而况于行之乎雖然祖宗行之不疑當世以為之非何者事勢既極不變則敗衆人之所共知也今朝廷履至極之勢獨持之而不敢議臣實疑之誠自今日而議之因其勢循其理㣲為之節文使見在者無損而來者有限今雖未見其利要之十年之後事有間矣賈誼言諸侯之變失今不治必為痼疾今臣亦云陳傅良曰唐代宗時劉晏掌江淮鹽鐵之權歳入六百餘萬緡是時租賦之所入不過千二百萬而江南之利實居其半韓愈謂賦出天下而江南居十九以今觀之浙東西又居江南十九而蘇松常嘉湖五郡又居兩浙十九也今國家都燕歳漕江南米四百餘萬不以實京師而此五郡者幾居江西湖廣南直𨽻之半自宣徳正統以来每擇任有心計重臣巡撫其地以司其歳入葢以此地朝廷國計所資故也伏願明主一視同仁念此五郡財賦所出國計所賴凡百科索悉從寛省又必擇任巡撫大臣假以便宜之權任其從宜經制而不拘以文法必計上無虧於國計下不殫于民力一方得安四方咸賴之矣本朝田土戸口税糧課程錢鈔十三布政司并直𨽻府州實在田土計二百二十二萬八千五十八頃九十二畝零十三布政司并直𨽻府州人戸總計一千六十五萬二千八百七十戸人口總計六千五十四萬五千八百二十一口十三布政司并直𨽻府州夏税秋糧總數諸司職夏税米麥四百七十一萬二千九百石錢鈔三萬九千八百錠絹三十八萬八千四百八十七疋秋糧米二千四百七十三萬四百五十石錢鈔五千七百三十錠絹五十九疋各布政司并直𨽻府州課程錢鈔并金銀布帛等項折收總計三百六十三萬七百七十八錠有零外有各處土産茶鹽硝礬朱砂水銀等物雖有定額數目繁碎難以備載已上俱大明㑹典按自𢎞正後至嘉靖二十五年大倉銀庫舊管一百六十二萬餘新收四百八千八萬餘開除三百七十一萬餘羽林前等衛五十二倉糧舊管九百九十八萬餘新收一百四十九萬餘開除一百六千八萬餘本朝㑹期歳入歳用之數張文疏略曰足國莫先生財生財尤莫先節用近年冗食之費積習至今固非一日頃來尤甚供億愈難陛下合無敕吏部查冗官兵部查冗兵工部查冗匠禮部於光禄寺司理於内府各監局查理各項冗費又命下戸部約祖宗以來官兵吏匠及本部本歳賦入之數酌取其中以為定制以千之七為經費而儲其三以備山陜各邉兵荒非常之事此外如土木齋醮遊賞燕樂貴戚近倖無名之賞不經之費悉從裁節不致妄用情由禮約費從事省期以數歳積蓄有餘物力稍紓自然富强矣否則雖以泥沙為粟瓦礫為金而用之無節安得不乏古人有言國用盈虚在於節與不節不節雖盈必竭能節雖竭必盈此為至論臣等㑹同五府六部都察院通政司大理寺堂上官及六科十三道官查得京庫銀以歳入言之夏税共該五萬五百餘兩秋糧共九十四萬四千八百餘兩馬草二十三萬七十餘兩鹽課折銀三十餘萬兩閘辨三萬餘兩通計各項實該一百四十萬九百餘兩以歳用言之宣府年例五萬兩大同五萬兩遼東一十五萬兩延綏三萬兩甘肅寧夏共六萬給散京衞官軍俸銀共三十三萬五千餘兩内府成造寳玩等項其數不可與知大約并前折俸銀不下五六十萬餘兩通計各項實該一百萬餘兩其間支剰馬草等銀節該本部題准俱送太倉收候以備邉方𦂳急之用不許别項支銷故太倉之積多者三四百餘萬少亦不下二百餘萬夫闕前項額辨銀兩或災傷减免或小民拖欠或請㫖蠲免入既虧于原額而出仍過于常數姑以近日言之宣府年例外運送過六千一萬餘兩大同年例外運送過七十七萬餘兩陜西各邉年例外運送過四十餘萬兩遼東豫送過三十二萬四千餘兩葢邉方𦂳急糧草缺乏鎮巡等官内外奏討之數又征進諸軍給賞過六萬九千六百餘兩在京官軍人等共用過銀七十二萬四千二百六十餘兩及各邉官軍共六十九萬三千三百二十兩陜西賑濟銀二十萬兩宻雲紫荆居庸倒馬等處召買糧草銀共一十二萬八千餘兩買金送内府二萬六千五百餘兩迄今舉大婚禮等項支用一歳之間實用過四百餘萬兩通前年例將及五百餘萬兩是舊例歳用之外又加至四倍餘矣帑藏何由而不虚財用何由而不竭哉臣等竊聞滄海不能實漏巵鄧林不能供野火其勢使然也今值海内虚耗之日百姓愁苦之時加以兵荒之相仍供億之浩繁不經之費日甚于前奢靡之費漸長于昔而欲變制以周倉卒之取豈不難哉㑹計存留起用錢糧總數𢎞治十五年户部題㑹計錢糧以足國裕民事查得本部每年㑹計天下司府州縣税糧存留一千一百七十六萬四千八百六十五石零起運二千五百三萬四千四百七十六石零馬草存留四百九萬二千五百六十四束起運二千一百八十五萬二千七百四十八束絹二十七萬八千二百八十七疋布五十七萬六百三十七疋花絨三十七萬四千九百二十五斤一十二兩戸口食鹽鈔存留七千三百五十二萬一千三百七十九貫零起運四千四百七十九貫零鈔關船料大約二千七百一十九萬三千六百一十一貫各運司額辦鹽課一百九十五引屯糧大約三百七十七萬六千一百九十三石零及於本部遞年支運過錢糧并各處歳支卷册内查得近年起運京邉并存留本處錢糧有遇事故停减而歳入不及原額者有逐年加减而歳支過於原額者至有一歳所入不足以供一歳支用者夫常入之賦或以停减而不足常用之數又以加添而過多則知在内在外一歳所入俱不足供一歳所出况今天下災傷迭見供餉頻繁若不早為處置誠恐將來誤事非細戶部財賦總數國家經制户部財賦或存留於司府或起運於京邉賦有常額費有常經公私所需未嘗不足今查順天等府浙江等布政司每年財賦實徵起存之例夏税秋糧馬草地租屯田食鹽錢鈔税課鹽課顔料果品厨料蠟茶燈草蒲杖鹽斤局税門攤各有成數成化𢎞治以前各邉寧謐百費歳入之賦足供歳出之用尚有盈餘南京内府及光禄寺并兩直𨽻天下司府衞所各邉一應起存錢糧不計外姑自其盈縮易見者言之京通倉糧入三百七十萬石嘉靖十年以前至有八九年之積今則所儲僅餘四年大倉禄庫歳入二百萬兩嘉靖八年以前内庫積四百餘萬外庫有一百餘萬今則内庫止存一百一十餘萬外庫僅及二十餘萬大倉銀兩極費而其詘者邉防為最商舖料價次之馬匹料草次之加以不時奏討如進用修邉給賞賑災之類不可勝紀且今之邉費每年仰給大倉有增無减及備查太倉歳額銀正折銀折草餘鹽等銀止計一百八十餘萬加以𣲖剰餘米輕賫放剰等銀每年額入實計銀二百餘萬先年歳用各邉額用主兵年例銀四十一萬衞所額用折糧四個月銀二十三萬一千四百二十餘兩職官額用布絹銀一十一萬五千九百餘兩軍士額用布花銀十萬餘兩京營額用馬匹草料折色三個月并巡捕一年全支共銀一十二萬六千六十餘兩倉場料草束額用銀三千五萬餘兩每年大約實支銀一百三十三萬三千三百餘兩近年以來除進用備邉給賞賑災等項外各邉每年加添募軍銀五十九萬二千八百餘兩各邉每年加添防秋擺邉設伏各兵銀一百一十餘萬各邉每年又加添補歳用不敷鹽銀二十四萬五千六百四十餘兩京營每年加添商舖料價銀二千餘兩通前額用銀内除衞所兩個月折糧銀不放外大約每年實支本倉銀三百四十七萬餘兩是太倉每年歳費少銀一百四十九萬餘兩迄今不為節省年復一年出浮於入雖有開納括取等項有事之時所濟幾何此近日户部之所具題國計如此誠不可不為之慮也戸部財用出入掲帖臣等看得國家財賦正供之數總計一歳輸之大倉銀庫者不過四百三十餘萬兩而細至吏承納班僧道度牒等項毫釐絲忽皆在其中矣嘉隆之間海内虚耗公私貯蓄殊可寒心自皇上臨御以來躬行儉徳覈實考成有司催徵以時逋負者少姦貪犯贓之人嚴併不貸加以北人欵貢邉費省减又㑹徼天幸歳比豐登故得倉庫積貯稍有贏餘然閭閻之間已不勝其誅求之擾矣臣等方欲俟國用少裕請皇上特下蠲租之詔以慰安元元之心今查萬厯五年歳入四百五十五萬九千四百餘兩而六年所入僅三百五十五萬九千八百餘兩是比舊少進八十餘萬兩矣五年歳出三百四十九萬四千二百餘兩而六年所出乃至三百八十八萬八千四百餘兩是比舊多用四十餘萬兩矣問之該部云因各處存留蠲免數多及節年追賍犯人財産已盡無可完納故入數頓少又兩次奉㫖取用及凑補金花拖欠銀兩計三十餘萬皆額外之需故出數反多也夫古者王制以歳終制國用量入以為出計三年所入必積有一年之餘而後可以待非常之事無匱乏之虞乃今一歳所出支多於所入如此年復一年舊積者日漸消磨新收者日漸短少目前支持巳覺費力脱一旦有四方水旱之災疆塲意外之變何以給之此皆事之不可知而勢之所必至也此時欲取之於官則倉廪所在皆虚無可措處欲取之於民則百姓膏血已竭難以復支而民窮勢蹙計乃無聊天下之患有不可勝諱者此臣等所深憂也夫天地生財止有此數設法巧取不能增多惟加意樽節則其用自足伏望皇上將該部所進掲帖置之座隅時賜省覽總計内外用度一切無益之費可省者省之無功之賞可罷者罷之務使歳入之數常多於所出以漸復祖宗之舊庶國用可裕而民力亦賴以少寛也鄙諺云常將有日思無日莫待無時思有時此言雖小可以喻大伏惟聖明留意王鏊震澤長語記正徳以前各處税糧馬草折徵銀各鹽課銀各鈔關船料銀及雲南閘辦銀每年入數總計二百四十三萬兩移送内庫豫備成造等項十餘萬兩官軍俸銀及折糧銀共六十六萬六千餘兩宣府大同遼東陜西年例共四十萬兩若有聲息𦂳急奏討加添四五十餘萬或二三十萬聖旦千秋等用二十九萬餘兩親王王妃公主及上用又天下王府銀盤水礶儀仗等用共三十萬七千餘兩每年出數總計二百萬兩此我朝歳用銀兩出入大約總數也其不時災傷蠲免賑濟營繕征討册所費並不在此數震澤長語又記正徳以來天下親王三十郡王二百十五鎮國將軍至中尉二千七百文職二萬四百餘員武職十萬餘員衛所七百七十二旗軍八十九萬六千餘廩膳生員三萬五千八百吏五萬五千餘各項禄糧約數千萬浙江等十三布政司并南直𨽻額𣲖夏秋税糧大約二千六百六十八萬餘石此我朝歳用糧米出入大約總數也除災傷蠲免等亦未計及震澤長語又云祖宗時歳用省以黄臘一事言之國初歳用不過三萬斤景泰天順間加至八萬五千成化以後加至十二萬其餘可推也又正徳十六年工部奏巾㡌局缺内侍但靴鞋合用紵絲紗羅皮張等料成化間二十餘萬𢎞治間至三十餘萬正徳八九年至四十六萬末年至七十二萬此我朝内府歳用後來日增之大畧也即此二者可以知其餘矣順天程䇿略曰天下財賦自漕運外其以銀輸大倉庫領于度支之經費者歳入一百一十六萬有竒而各轉運司餘鹽課銀一百三萬有竒耳九邉主客兵餽餉歳為銀二百三十六萬有竒内府之供應官員之俸給京衛兵馬之布花蒭菽為銀一百三十五萬有竒總計一歳所出浮於入數二百五十餘萬嘉靖二十五年北京月支米二十五萬三千五百二十八石京營官軍十六萬五千七十名支十六萬二千三百二十二石雜差軍匠二萬四千三百九十九名支二萬二千七百六十八石班操官軍三萬八千二百九十八名支一萬五千三百一十九石八斗將軍勇力校尉二萬六千四百六十五名支二萬六千九百一十三石監局官匠七千五百五名支一千八百二十三石一斗厨役五千五百四十一名支五千四百五十三石四斗武生二百一十一名支六十三石三斗倉塲攢斗三千三百四十五名支三千九十一石樂工四百六十四名支二百八十石五斗淨身男并孤老九千八百名支二千九百四十石屯軍一萬四千二百五名支一萬三百八十三石八斗倉攢甲斗一千三百四十八名支一千一百七十石一斗京軍歳支冬布五十六萬二千一百三十六疋綿花二十八萬一千五百四十六斤京官一萬七千八百七員除四月五月例折絹實支折色米銀二十六萬七千八百三兩七錢按洪武十一年封周王于河南開封一郡惟一王府今則郡王三十九府輔國將軍二百一十二位奉國將軍二百四十四位中尉以下不計矣洪武年間軍職二萬八千有竒成化迄今不知增幾倍算洪武初錦衣衛官二百五員今一千七百餘員此禄所以不足也嘉靖八年春詹事奏云正徳年間親王三十位郡王二百十五位將軍中尉二千七百位文官二萬四百武官十萬衛所七百七十二萬旗軍八十九萬六千廪膳生員三萬五千八百吏五萬五千其禄俸糧約數千萬天下夏秋税糧大略二千六百六十八萬四千石出多入少故王府久缺禄米衛所久缺月糧各邉缺軍餉各省缺俸廪今宗室王二等將軍三等中尉四等主君五等及疏庶人凡五萬餘文武官益冗兵益竄名占役徒煩抽補召募名數日增而實用日减加以冗費無經財安得不盡司農告匱有以也㑹計問答問堂堂萬乗什一之征何以足用孔子盍徹何以謂之徹也曰能通之謂徹通之者均之也民有其十君用其一乃造化實理流行不滯之妙君民情相協是均事相安是均報相宜是均貴與賤均文與武均名與實均事與既均施與答均有倚重非均有姑息非均有作無益傷苦節各出納皆非均故為政首務直須覈實今食者京營衞官軍十八萬八千能禦戰幾何内團營六萬餘即唱名幾何外衛班操三萬八千餘能援敵幾何將軍勇力校尉二萬六千五百以充宫衞羡否匠作七千六百以布功指羡否厨役五千六百以供庖力羡否樂舞生一千三百五十以協音班羡否教坊四百七十淨身男孤老九百八十其給養羡否凡此歳支米三百餘萬石布五十六萬餘疋綿花二十八萬餘斤於此叅較裁量然後取與相當用無不足問國用不足正徳來已然但嘉靖壬子後民業蕭颯何如曰天下歳徵糧三千六百三十餘萬石漕費白糧南糧禄俸餉邉等各有頭項内運三百七十萬正徳間京師月支三十四萬每侵用大倉原積嘉靖元詔革月止支十八萬二年後月支二十五萬四千餘京通倉𢎞治前十年之積嘉靖十年前尚有六年餘積二十年後不彀四年之數歳入銀糧折八十餘萬兩及戶口商税鹽銀船料草折閘辦等共二百四十三萬餘而官軍折俸諸邉年例内府成造聲息奏討賞賜節誕親宗各費約二百餘萬嘉靖八年前内庫積四百餘萬外庫積一百餘萬二十年後止存内庫一百一十餘萬外庫三十餘萬二十九年大冦深入通州請備兵銀八十萬薊州請備邉三十七萬大同請增防秋四十餘萬宣府請增防秋四十餘萬京師咸寧經略費出多名昌平懐柔順義白羊口湖河川紫荆關各加厚治增定賞格自是歳各邉募兵銀五十九萬三千擺邉謨伏客兵銀一百一十餘萬又加鹽銀二十四萬六千京營加免放馬料一十八萬内府加補料數千共數支太倉三百四十七萬扣歳入尚欠一百四十餘萬却以開納括取濟用添設天下巡撫數員兵備數員員下所用無算河南山東創練各六千山西陜西倍戍而南倭實猛東南繕城百萬計逺調募勇百萬計哨海百萬計其被標擄囊萬萬不能計也時出竒告能提編巧取括㩁無漏軍門揮金扶夫兢刺加以元寮􅀢縱宫奄風求宦林自立之難又廣有張璉福有胡平江有三巢川有三章大同有丘富河南有師尚照貴州有楊河民告困矣問本朝度支之法何如國初費甚繁而倉庫有儲用不告急何與今異也曰天下貨財必有統御而後能度支周禮冢宰制國用此量入為出之道後世量出以為入故當事者漫無所紀各求其事之必濟竭民之財而不知唐之錢榖判於丞相未立三司使雖其法之屢變要之欲一事權以歸王者元豐改制計相職分天下之民困於取之無度而公帑日窘雖欲㑹其歳之登耗審其儲之盈縮稽其民之虚實以衡出納不可得也今之戸部大率類此兵禮工光禄太僕等衙門多有不通籍户曹者祖宗創設之始葢嘗周覽畢議兼總一時之條貫分布諸司矣時移事更盈縮登耗虚實不相侔而尚守其二百年之舊知其不能通也乎哉問治國經制可得言乎曰經制之道莫善於任土經制之法莫要於慎費財慎者民之心財者民之力取其力之所不逮則其心傷得乎丘民可以為天子奚而傷其心乎其用使之然也以必不可已之用而為之取隨古今盈縮登耗緩急必能率力之所逮其不慎於取者非殖貨自封則經制之法缺也古者井田養民而秦廢之漢初輕田租十五而税一文景三十而税一光武初行十一之法後亦三十而税一晉隆和畝收二升五季錢民税兩浙畝三升末用不輕王方贄均兩浙田畝一斗元耶律楚材定天下税則三上畝三升中畝二升五合下畝二升水田五升國初天下田租定三升五升其後東南之地以都北加運耗又籍沒田襲原租額及沿宋六郡公田例遂有畝税五斗七斗及一石餘者加蘇元秋糧三十六萬張士誠税額百萬今至二百七十餘萬天之生財國之用財今於昔無異而取者懸絶民何以堪故不議任土不裁冗費欲天下治難矣按田賦著夏書什一而税孟軻氏謂堯舜之道古今不可易之中制也國家則壤定賦粟米之征初未逮什一葢併地税為什一也邇歳起運加耗諸色帶徵重以上下有司之過求所至胥徒之横索殆已近於什二矣而兩京諸曹之𣲖辦一方百費之供需歳增月益諸徭共夫馬無一而不出於丁田又冗出納之際因縁苛濫不可勝道嗚呼寛一分民受一分之賜惟良牧念之理財時務財用之在天下其生出有原其制用有節而其補捄有要今天下銀課自上供外其領於度支之經費者歳二百九十萬有竒耳而諸邉兵餉殆且稱是竊聞祖宗開立各邉以陜西八府供延寧甘肅以山西三府供宣大以山東永平供遼東而又各以幾輔河南諸郡麥銀益之率歳入自足一歳之用即如宣鎮歳九十萬兩而民賦居十之七他鎮亦略相孚發帑金以代賦乃捄急權宜非經制也今乃為額且歳有加益矣夫宣大增於辛丑壬寅薊鎮增於庚戌葢一時懲冦侵軼故厚集廣募冀一創抑之今敵欵雖不足恃而土兵久練計必服習諸鎮之入衛南兵之寄寓不可議撤乎諸召募修邉等費不可議覈乎而又推之各邉籍民賦之由耗考經制之當復則費必大省矣是議邉餉者其一也國初親王歳禄五萬石數歳而裁為萬石或千石葢不以親故殫民財祖訓言將軍以下有才能者得改官陞轉如銓法又不以親故妨其任也今嫡長世及支庶遞降而麗屬籍者萬五千餘歳禄之數即竭天下之賦不能贍也誠宜斟酌變通稍為限制遞降之法視親疎為等殺絶封之後令為業以自資而弛禁階什一如齊民法則禄必漸省而法可經久是議藩禄者其一也軍職世及報功也聖祖垂永世無窮之諭而復嚴犯罪謫配之律葢仁義並行之道也今前澤不斬而後勲復繼故繫藉日繁而制禄日廣至錦衣之冗濫則又其甚者也夫箕裘不世則豢養不足以勸功下紀不懲則詐諼益恃以無恐誠宜禁其旁襲而嚴其比試諸不中式與試不如期者奪其禄編為士伍無少貸有犯法者則案劾謫遣之如律諸冗濫非功次者檢籍而裭革焉武胄其少清乎是議軍職者其一也他如職以事列則内外剰員之無關事守者可汰也廪以稱事則匠藝力勇之詭名篡籍者革也費必有經則不時之宣索無名之賞賚可停也斷而行之於財計其少補乎夫是數者皆節約之説也若生出之原則賦法備矣即孔桑持籌亦何以加者無已則愚謂屯政之當修也鹽法之當復也夫國家實邉之䇿斯二者實頼為議者葢屢及矣而卒泥不行者患在行之不果而撓於沮事之議也往諸邉武備廢弛敵騎充斥耕稼之地灌莽彌望今北人業已納欵而環慶以西亦稍革面塞上之腴可墾必多誠宜以時相度利便為封畛堡砦使足居守募軍民耕墾其中期以三年方徵之税仍薄其額則願耕者必衆矣其内地之侵于官豪者量時久近以漸清之要在當事者虚心任怨勿縱勿憂事必有濟也或乃謂計其羡僅足以供軍豈未計養軍之重費邪鹽政一壊於輸粟之易銀再壊於餘鹽之權制故商人不樂趨塞而競逐餘鹽之制生是飛􅞮利失而諸邉愈窘一有災警帑金雖出乃至無從得粟始懲榖錢之利商不計榖貴之弊反移之國也屯田既復芻粟且易得宜處給工本盡收餘鹽而并正課悉開之邉仍輕估以召之約非由報中者則無從得引而私販轄害等弊則屬其禁勿使犯商人必趨塞下矣商通則塞地益墾邉庾可滿而帑金可以漸革减也或乃計開中之入無當於原估其始者易銀之淺見邪愚又謂河以北水利稼政宜修也夫京輔諸郡古燕趙用以内支諸雄外禦邊冦者唐之三鎮亦以其力抗天下未聞借資於他境也今瀕海千里萑葦極目而􅘵深諸郊一遇霖潦溟渤為區豈地利之不如古邪誠宜倣元人疏潬漂障滹沱遺跡於濵河之地或築隄灑渠或瀦為陂澤或去其壅塞使水有所歸則不為患矣而又修虞集之議於京東瀕海地用南人水耕法募民田之亦以三年起輕科仍禁貴戚毋請奪諸他郡濵水者悉凖是則地利必興畿輔殷阜亦可漸减漕粟以紓東南之困此永世利也他如長淮以北河濟左右諸封域類多無棄倘營田之使悉心講畫勤行勞徠而以闢土勸農計其吏治於財計亦豈無禆乎錢法附南齊孔顗論鑄錢不可惜銅愛工又言利孔四散乃是以小利失大利實不可易之論也大槩如周如秦如漢五銖如唐開元其規或可以為式此是錢之正若一時之所鑄如劉備鑄大錢時軍用不足劉巴請鑄直百錢平諸物價旬月間府庫充足第五琦鑄乾元錢唐肅宗國用不足幣重貨輕琦請鑄乾元錢徑一寸每緡重十斤此是錢之權也如漢武帝以鹿皮為幣王莽以龜貝為幣此是錢之蠧也或見貨財之多欲得廢錢或見貨財之少欲得鼓鑄皆一時矯枉之論不可通行者也聖初置寳源局鑄造通寳者二洪武六年禁民私鑄申著律令成祖而後皆有年號通寳體郭盡制輕重適中彷彿乎五銖開元之遺較之八銖半兩赤仄當千榆莢荇葉不失之大重則失之大輕者相去逺甚矣顧日久則敝法敝則民玩容有壅而不布者今上邇歳既允滇中按臣之請又可科臣部臣之奏乃頒降式錢行各省直設法經理一體鼓鑄給散行使且于凡巧偽之徒競相規利城社奸豪阻撓錢法置爐舟中夜鑄明散任意低昻希圖興販者罪各有差而捕獲者皆有重賞法禁嚴矣宣課等税輕則盡數收錢重則銀錢中半與夫大倉給放商價錢二分兼支既不病商亦不擾民惠澤流矣然或通之而輙以塞或各以其方私相布者未盡無也論者謂宜握廣鑄之柄申流布之令收納兼輸矣而又抑興販以節夫錢之流折當不行矣折當謂行錢所在有以二當一以三當二者遂至以錢為無用而賤之而又嚴責成以疏夫錢之滯斯錢之利可興而錢之弊可釐弊釐則民宜民宜則時從即不必竒羡于目前而息出息入足下足上錢神不滯投金損珠之化且坐而致若夫私錢之禁則既有令而孔顗之言具在也又何贅焉議邉權附各邉主客兵歳費二百三十六萬兩而宣大薊居三之二宣大薊歳費一百五十餘萬而居二之一宣大歳額之增嘉靖辛丑壬寅始薊鎮之增庚戌始正統丁卯始發内帑濟邉前是俱守常額時遼東止十萬宣大十五萬嘉靖二十五年遼東官軍七萬三千三百歳用糧八十六萬石弱宣府官軍八百六十弱糧九十萬三千強料十二萬三千强大同官軍六萬四千强糧六十八萬四千强料二十萬三千强延綏官軍三萬三千强糧四十三萬强糧十萬弱寧夏官軍四萬一千强糧四十五萬六千强料七萬七千强甘肅官軍五萬三千强糧六十萬二千強料十二萬四千强國初召商中鹽量納糧料實邉不煩轉輸而食自足謂之飛輓後因積納數多價直亦賤興利之臣遂改議上納折色行之既久習以為常彼時改折糧料有餘而價亦賤計似所入為有嬴利未為不可近來糧料不足而價亦騰貴徒煩轉糴邉用索矣大率鹽一引納銀五錢先時可糴米一石今多不過三四斗或二三斗故商人所納數倍於前而國初之所資以餉軍者實則無增於舊彼此虧費其弊益滋是故多得銀不如少得米省和糴之擾也杜侵尅之弊也慰待哺之望也漸墾邉地以致殷富也一舉而四善具焉説者又謂間曾開納本色召商不至葢何者上納本色時商自募民耕種塞下而得榖為易又塞下之積甚多而價輕又無戎敵之患今則耕種廢矣塞下之積虗矣榖價騰湧強敵出沒勢不安居商人安得糧料應召募乎欲復本色非减頭斗利商人使商人趨利而開墾邉地不可也然必遲之四五年而後得其利霍韜曰甘肅延綏軍士月糧一石折銀四錢成化米一石價銀二錢軍士得銀四錢買粟二石食烏得不足也今則銀一錢僅買粟二升銀四錢僅買粟八升矣軍士數口之家月食八升之粟如之何可足也空腹守邉寒苦交迫無怪其然矣然粟價所以先亷而後厚者何也成化以前邉防嚴固猛將林列故邉地盡耕邉粟自多今則將庸卒弱不堪支持地之出粟者寡人之食粟者衆成化以前鹽引皆輸邉粟故富商自招流民自墾邉地其米價自平而食自足𢎞治以後鹽引輸銀故富商大賈得輸銀之便而不復開墾邉地粟之所以貴而食之所以不足者殆為此也又曰邉軍每糧一石價銀一兩二錢收受之際惟八錢餘四錢則官吏漁獵之矣及其給軍又止與四錢存留四錢謂之奉行樽節之例兼之守臣極力苛刻凡軍糧上納盡攘而歸於其家虚出通關以蔽覆其攫奪之罪軍士實糧升勺不沾惟甘凍餒而已夫盗邉糧者服上刑典法具在邇年禁令寛弛貪墨如市不深切懲創則人心何由反正風俗何由挽回乎成化中葉淇既變中鹽本色為納銀正徳中馮清又改陜西糧草為折色邉境既以市糴為艱而官司又有侵剋之弊不免請發内帑而虧國損民二臣實作俑哉按自成化間開設榆林衛巡撫凃子俊增置城砦陜西民供不繼奏送江南折糧銀以補不足然初亦依江南原折銀例每米一石折銀二錢五分放支軍士其後大同等邉缺乏亦暫送銀補足數皆不多未有以萬計送者𢎞治間戸部尚書葉淇奏改商人赴邉納糧中鹽之法令納銀赴司解部分送各邉自此始有年例銀兩而鹽法屯田一時俱壊商人既不上納本色而邉方米價湧貴市糴艱難鹽課銀兩不敷支用遂日漸增加迨至數萬益以各鈔關商税猶且不足而加賦于民内帑漸虗東南民力日竭若鹽法復國之舊則邉境田地皆為商人佃種以供本色而年例銀兩可以盡革惜顧佐不盡言于劉瑾以復正鹽法迨後邉儲告缺而年例銀兩終不可罷自兹展轉侵漁其弊日滋而邉方屯田皆就荒蕪國計民生將何底極也一日海運洪武末及永樂初蘇松浙江等處歳糧俱輸納大倉蘇州地方由海道以達直沽洪武三十年永樂六年十二年海運糧俱有數見歳運條下二曰海陸兼運永樂初肇北京江南糧一由海道一由淮河入黄河至陽武陸運至衛輝由衛河入白河至通州三曰支運先是永樂五年禮部㑹官議北京合用軍餉本處税糧子粒并黄河漕運未能周急必藉海運然後足用即目海船數少每歳運不過五六十萬石且未設衙門專領事不歸一莫若于蘇州大倉城内專設海道都漕運使司堂上官于文武中擇公勤亷幹者以充行移與布政司同各處衞所見有海船并出海官軍俱屬提調以時檢㸃如法整治奉太宗文皇帝聖㫖運糧的事再議了來説至九年以濟寧州同知潘叔正言命工部尚書宋禮都督周長等發山東丁夫十六萬五千濬元㑹通河自濟寧至臨清三百八十五里於是始逹通州十年禮以海船造辦大迫議造淺船五百艘曰㑹通河運淮楊徐兖等處歳糧一百萬石以補海運一年之數十二年平江伯陳瑄等始議原坐大倉歳糧蘇州并山東兖州送濟寧倉河南山東送臨清倉各支收浙江并直𨽻衞分官軍於淮安運至徐州京衛官軍於徐州運至徳州各立倉厫收囤山東河南官軍於徳州接運至通州交收名為支運一年四次十三年增造淺船三千餘艘海運始罷遮洋船每歳于河南山東小灘等水次兑運糧三十萬石内六萬石于天津等衛倉收二十四萬石内十四萬石連耗折銀六錢俱從直沽入海轉運蘇州倉收四曰兌運先是裏河民運多失農月永樂末始令民運於淮安𤓰州補給脚價兌與軍軍民兩易衛所出給通關付繳從巡撫侍郎周忱等議也宣徳八年叅將吳亮言江西浙江湖廣江南船各回附近水次領兊南京江北船於𤓰淮領兊其淮徐臨徳諸倉仍支運十分之四浙江蘇松等船本各司府地方領兌不盡者仍于𤓰淮交兑其北邉一帶如河南彰徳府於小灘山東濟南州縣於濟寧其餘水次倣此脚價米在淮安水次者每正糧一石外加五斗在𤓰州水次者每正糧一石外加五斗五升五曰改兌成化七年都御史滕昭議罷𤓰淮兑運裏河官軍顧江船於江南水次交兑民加過江之費視逺近為差十年議淮徐臨徳四倉支運糧七十萬石改就水次兑與軍船名為改兑每年議𣲖多凖其數然不為常例浙江等處每正糧一石外加過江米一斗南直𨽻等處每正糧一石外加過江米一斗三升天順間始額漕舟遮洋裏河共額一萬七千七百七十五隻官軍一十二萬一千五百員名歳運糧四百萬石總叙長運按前代所用之夫皆是民丁惟今朝則以兵運前代所運之粟皆是轉遞惟今朝則是長運唐宋之船江不入汴汴不入河河不入渭今日江湖之船各逺自嶺南湖北直逹于京師唐宋之漕卒猶有畨休今則歳歳不易矣漕法便易而回船又有載鹽之利今之漕卒其勞百倍一歳之間大半在途無室家之樂有風波之險洪牐之停留舳艫之衝激隂雨則慮濕漏淺澁則費推移沿途有將領之科索上倉苦官攢之留難及其回家之日席未及煖而文移又催以兑糧矣漕卒艱苦如此食此糧者其知所自哉長運又在五運之外漕法沿革國朝運法凡三變初海運再海陸兼運三漕運已而漕運之法又二變初轉運再兑運已而兌運又有支兑改兑遮洋一總猶海運但不自大倉開洋遶出登萊大洋只從天津入海運至蘇州耳轉運雖變兑運而淮徐臨徳四倉尚存改兑即改支兑者為兑運其為兑運一也糧運輕齎按萬表云糧運輕齎所謂一六二六三六者即耗糧也江西湖廣浙江兑運正米一石加耗六斗六升又加尖米一斗共七斗六升以四斗隨船作耗餘三斗六升則折銀故謂之三六江南直𨽻兑運正米一石加耗尖米共六斗六升除四斗隨船作耗只二斗六升折銀故謂之二六江北直𨽻兑運正米一石加耗尖米共五斗六升除三斗隨船作耗六只二斗六升折銀故亦謂之二六若山東河南兑運之耗并尖米止四斗一升除二斗五升隨船餘一斗六升折銀故謂之一六葢加耗隨地里逺近為差耳先是耗糧俱本色隨船候到灣顧車起糧則易銀為用後以灣中米價低昻不一而易賣又滯交納𢎞治十三年都御史張敷華都督郭宏方議折銀每石定價伍錢可以輕齎就於交兑之時支領隨船此一六二六三六輕齎之名由始也然只令完納兑運三百三十萬石而已餘耗本折皆歸旗卒官固無利之者是故旗卒富饒糧運於斯為盛其成化一年改淮徐臨徳四倉支運糧七十萬石此山東河南直𨽻民運西倉交納者亦令軍船就水次與民交兑運赴京通二倉上納即今之所謂改兑者其加耗數少止有隨船耗米俱無一六二六三六折耗輕齎就令于兑運輕齎銀内均貼脚價進倉等用若地方災傷支運倉糧亦以兑運輕齎處貼之亦只總完四百萬石而已此雖减耗究貼比之只了兑運者數雖减少然用亦裕而軍無告苦至正徳六七年來京師權要始有官債虚立文約逼奪輕齎而弊又從此生矣時各總運官多出其門牽引為害葢借公物以為私賂希寵庇耳於是始有鞘封過淮赴漕運衙門呈驗重封仍委官至張家灣過發之葢以革逼奪之弊而把總聶欽遂引夤縁驗封查算使用以羡餘獻之於官故又有扣除之例矣欽雖即以贓敗而後之相繼者則用意算扣歳增其數咸務多獻以為功太倉庫所積羡餘至盈數十萬而官旗掲借陪費貽害不可勝言欽之倡始為可罪也夫一六二六三六輕齎乃耗糧也惟因地有逺近故耗有多寡非脚價也若脚價則一例矣灣中起糧使用則各總皆同又何必分一六二六三六之殊哉今以輕齎除於官是則正糧四百萬之外復收其耗糧也豈制法之意乎後又添設叅將一員駐劄通州專一驗封叅將王佐乃定脚價搜刮倉中使用如太監則有茶菓錢如經歴倉攢毎石一釐則謂之釐兒錢及至吏書門官斗級之類莫不定之以數每年造報花銷遂以為例先年倉中使用初無定數每因人之狡懦而高下而增减之司使用之人又有虚數以欺衆者累致爭訐故此法一立一時人亦便之但使用公行太監茶菓又添火耗催茶菓者又有班兒錢其經歴倉攢往年各衛得以所帶貨物高價與之而今皆紋銀且以此為應得又于數外求之為厚薄低昻矣葢作法於凉其弊猶貪作法於貪弊將焉止故為法之不可不慎也後又革去㕘將只巡倉御史㑹同通州坐糧員外驗封查算凡倉中一應無名之費俱不凖開銷扣除愈多糧米不能上納運軍苦逼之甚勢不可行乃以别淮南河起剥以抵其費為法不一故倉有掛欠之米庫有羡餘之銀而理不可通又往往人皆以為言故又議以羡銀給軍夫羡餘不復扣之於官而又給軍是矣然而無救於糧運之弊者蓋有説也各總運船只旗甲一人管事衆軍只任撑挽今以羡餘概給使旗甲則有掛欠鎖扭追賠船軍則有羡餘歌唱飲酒恝然不顧但恨扣除之不多又相結黨告訐欺打旗甲時灣中糧運俱集動聚數人成羣哄嚷官亦無如之何為弊一至于此而旗甲受累日益困敝是故旗甲敝而運亦敝也愚謂盈縮之利當歸旗甲旗甲裕而運其有不裕哉衆軍則量賞之以酬其撑挽之勞可也運期宜早萬厯初總理河道侍郎萬恭與漕運都御史王宗沐議疏言黄河之汛與潮汐等三月清明水高數尺且不害運惟自五月至于九月為伏秋水多至數四高者丈餘此運船之所必避也使歳運從四月前盡過徐吕二洪而閘河先肅清以待事令不與怒河直則河豈能為之患哉故河臣能使河之安而不能使運之早漕臣能使運船之入閘而不能使運船之必早入河其權則在于各省之糧儲道矣宜督令江以南各省糧儲趁早運輸巡按御史驗覈限四月前盡漕船過徐臣等得按程殿最之其三月過洪者以上勞叙四月者次之至五月者罰而過伏秋水漂流者重擬則為河亦所以為漕也奏可於是漕船不與河泛溢直而歳運畢如期抵京京未直平不翔踴如異時矣歳漕各省府𣲖數及各總船卒運數漕運歳額糧斛四百萬兑運三百三十萬石支運七十萬石成化八年該漕運都御史奏准將支運糧米就各水次領兑名為改兑漕司一向循守舊規均搭分𣲖軍船領兑運納除外河遮洋總下旗軍六千三百名運糧三十萬石内正兑二十四萬石改兑六萬石裏河南京等十一總旗軍一十一萬五百一名每軍一名額運止兑糧二十五石二斗九升二合惟北𨽻總下每軍多運三升八合以盡畸零之數每淺船一隻旗軍十名共運正糧三百七石二斗耗在外前項官軍共分𣲖正兑糧三百六萬石改兑糧六十四萬石運赴京通二倉正兑者三七改兑者四六上納通前不失四百萬石之數正耗米之外照依有司地里逺近又出輕齎以備水陸脚價浙江江西湖廣最逺每石二斗六升折銀一錢五釐山東河南二省最近每石止出一斗六升折銀六分其改兑糧米原係有司自運淮徐臨徳四倉上納官軍支運之數其正耗米浙江江西二省每石四斗二升江南各府三斗二升江北各府三斗七升山東河南二省一斗七升俱是本色原無折色輕齎京通二倉水陸脚價遞年於正兑輕齎内穵貼完納損正兑之有餘以補改兑之不足多寡適均不分南北通融領兑前項漕規俱經先朝文武大臣議處停當行之歳久則例已定自永樂年間開設裏河漕運以來定撥湖廣江西浙江南京江南江北中都留守司衛所官軍一千二萬七千八百餘員名分為十二總歳運糧儲四百萬石于京通天津薊州等倉交納其江西湖廣浙江南直𨽻都司衛所官軍運糧由揚子大江至江北裏河由儀真揚州淮安邳徐濟寧東昌臨清徳州天津直抵通州等九衛皆𨽻漕運所轄者不過欲其程途接續制統聫絡便攢運也其直𨽻徳州天津通州等九衛又其臨近京師天下根本萬一天時亢旱邉務緩急不同稍有不繼必須用此直𨽻官軍轉搬至京得以一時而集是北直𨽻通州等九衛之官軍尤重於迤南漕運衛所之官軍矣歳漕𣲖數運總論中古制國用悉賦畿内無有輸於千里之外者秦廢封建而漕運聿興其數亦視國之侈節以為盈縮焉漢初米不過數十萬石元封元年山東漕歳葢六百萬石昭帝元鳯二年詔减漕三萬石明年又詔勿漕唐初亦不過數十萬石睿宗河南陜運一百八十萬石天寳歳水運二百五十萬石代宗時劉晏歳百一十萬石劉晏後寢减至季㢲復如之宋太平興國始置汴河歳運江淮秔米三百萬石大中祥符初至七百萬石此最登之數也景徳三年以李溥之請定制為六百萬石天聖間則又以吳耀卿言减五十萬石元漕三百餘萬石至我國朝歳運定例四百萬餘石載之歴代實為中制然其為攴為兑為改兑為本色為折色或遇事變為减留為借撥為蠲免雖無定則而數則常盈焉漕運各倉總論漕之法莫善於轉般莫不善於直逹稽之於古漢漕關東山東之粟悉從渭而上故河東有糧倉涇倉榮陽有敖倉河南以東置漕舟五百艘則知東方諸郡其粟自逺而致者皆至三河交卸給節而入都矣迨後魏邸閣之法立厯代相因在唐則於水次有集津倉有洛口又有含嘉倉有河隂倉水通則隨近轉運否則暫寓以待以及江南之運積楊州汴河之運積河隂河船之運積河中操舟便宜無有傾覆唐之運於斯為盛在宋東京之制度四方之運者謂之船般倉曰永豐曰通濟曰富國等凡十倉則受淮江所運謂之裏河曰永濟曰永富者受淮孟等州所運謂之西河曰廣濟等者受頴夀等州所運謂之河南曰廣積曰廣儲者則受漕濮所運謂之北河又置搬運倉于真楚泗三州而江南之船至三倉而止汴船轉輸京師故大中祥符間歳漕至七百萬石可謂極矣一達直達久涉歳月奸費互作而委積𤼵運名浮于實遂啟邊人之亂元都幽燕變為海運而白河一道接運備至在河西則有倉十四通州則有倉十三河倉則十有七是皆重於轉般也我國家監於前代其漕運之敖倉在京通者則有總督大監戶部尚書或侍郎巡倉則有御史撥糧則有員外郎監收則有主事以至倉使攢典各有人焉所以統儲天下之粟以資國用也在淮徐臨徳者監收亦有大監亦有主事以至倉使攢典亦各有人焉所以分儲天下之粟以待轉運也及後轉運變為兑運又變為長運至今其間因時便宜為軍民計者固周且審然竟疑於直達也議者謂轉運則民有往復出納之擾長運則軍有守淺阻凍之困利害蓋相當焉漕運考附程頤曰禹貢冀州為帝都東西南三面距河他州貢賦皆以達河為止按禹貢所謂達于河即達京也然叙水路于貢賦之後每州皆同亦後世漕運之法也但未明言其為漕耳管子曰粟行三百里則國無一年之積粟行四百里則國無二年之積粟行五百里則國衆有饑色左傳晉薦饑乞糴于秦秦輸于晉自雍及綘相繼命曰汎舟之後吳城刋溝通江淮按汎舟以輸粟開渠以通糧道已見于春秋之世秦欲攻匈奴運糧使天下飛芻輓粟起于黄腄瑯琊負海之郡轉輸北河率三十鍾而致一石按飛輓始于秦葢由海道以入河也海運在秦時已有之漢興髙祖時漕運山東之粟以給中都官歳不過數十萬石李文時賈誼上疏曰天子都長安而以淮南東南邉為秦地古者天子地方千里中之而為都輸將繇使逺者不在五百里而至公侯地方百里中之而為都輸將繇使逺者不在五十里而至輸者不苦其繇繇者不傷其費故逺方人安及秦不能分人寸地欲自有之輸將起海上而來一錢之賦數十錢之費不輕而致也上之所得甚少下之所苦甚多也武帝時通西南夷滅朝鮮擊匈奴築衛朔方轉漕甚逺山東咸被其勞武帝勞中國人漕中國粟以爭無用之地是以璀璨之珠而彈啁啾之雀也務虛名而受實害損有用之才而易無用之地豈盛徳事哉鄭當時言關中運粟請引渭穿渠涇易漕度而渠下民田萬餘頃又可得以溉此損漕省卒上以為然發卒穿渠以漕運大便利吕祖謙曰漢初中都所用者省漕運之法未講也鄭當時議開漕渠引渭入河葢縁是時用粟之多漕法不得不講宣帝時耿夀昌奏故事歳漕關東榖四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原諸郡榖足供京師可省關東漕卒過半夀昌此議遇京輔豐穰之歳亦可行之趙充國條留屯十二便其五曰至春省甲士卒循河湟漕榖至臨羌以威羌虜揚武折衝之具也充國此議遇歳豐稔邉方無事亦可行之光武北征命冦恂守河内收四百萬斛以給軍以輦車驪駕轉輸不絶諸葛亮在蜀勸農講武作木牛流馬運米集斜谷口邸閤息民休士三十年而後用之後魏於水運之次隨便置倉每軍國有須應機漕引此法亦民便隋文帝以倉廪上虚議為水旱之備詔于蒲陜等十三州募運米丁又各置倉轉相灌注漕關東及汾晉之粟以給京師隋制凡經過之處以丁夫遞運要害之處置倉塲收貯次第運之以至京師運丁得以畨休而不久勞漕船得以回轉而不長運且所漕之粟亦得以隨宜措置而或發或留也唐都關中歳漕東南之粟高祖太宗時用物有節而易贍水陸漕運不過二十萬石𤣥宗時裴耀卿請于河口置倉有武牢洛口等名使江南之舟不入黄河黄河之舟不入洛口而諸倉節級轉運水通則舟行水淺則寓於倉以待不滯比于曠年長運利便一倍有餘在當時未行又請罷陸運而置倉于河口凡三歳漕七百萬石代宗時劉晏掌漕事故時陸運斗米費錢十九晏命囊米而載减錢十五江船不入汴汴船不入渭江南之運積楊州汴河之運積河隂河船之運積渭口渭船之運入太倉歳轉粟一十萬石無升斗溺者宋定都于汴漕運之法分為四路東南之粟自淮入汴至京師陜西之粟自黄河入汴至京師陳蔡之粟自關河即恵民河入汴至京師山東之粟歴漕濟及鄆入五丈渠至京師四河惟汴最重漢唐建都于關中漢漕仰於山東唐漕仰於江淮其運道所經止於河渭一路宋都汴梁四衝八達之地故其運道所至凡四路宋歳漕東南米麥六萬斛漕運以儲積為本故置轉般倉于真今儀真楚今淮安泗今泗州三州以發運官董之江南之船輸米至三倉卸納即載官鹽以歸舟還其郡卒還其家汴船詣轉般倉漕米輸京師三倉有數年之備按宋人以東南六路之粟載于轉般之倉江船之入至此而止無留滯也汴船之出至此而發無覆溺也江船不入汴汴船不入江豈非良法歟竊以宋人都汴漕運比漢唐為便易前代所運之夫皆是民丁惟今朝則以兵運前代所運之粟皆是轉遞惟今朝則是長運唐宋之船江不入汴汴不入河河不入渭今日江湖之船各逺自嶺北湖南直達于京師唐宋之漕卒猶有畨休今則歳歳不易矣宋人又有載鹽之利今之漕卒比之宋人其勞百倍一歳之間大半在途無室家之樂有風波之險洪牐之停留舳艫之衝激隂雨則慮浥漏淺澁則費推移沿途為將領之科索上倉為官攢之留難及其回家之日席未暇煖而文移又催以兑糧矣運糧士卒其勞苦萬狀有如此者伏乞推行宋人轉船載鹽之法于今日少寛士卒之一分寛一分則受一分賜矣况其所賜非止一分哉按沙河即今淮安府板牐至新莊口一帶是也本朝永樂十三年平江伯陳瑄因運舟沂淮險惡乃尋宋劉璠議開沙河以避淮水之險喬惟嶽繼自楚州之至淮隂故道於是開清江浦五十餘里置四牐以通漕又於沿江一帶增堰以防走泄蓄水以資灌注引泉以備亁涸至今為利今日運道自儀真直抵潞河其間最險者有二所高郵湖隄及徐吕二洪是也然二洪之險地也地有定形人可以用其力湖隄之險天也天無常變雖若非人力可為然人力勝天亦有此理惟今高郵之湖南起杭家觜北至張家溝共三十餘里唐李吉甫為淮南節渡使始于湖之東亘南北築平津堰以防水患即今牽路在宋時又有斗門水牐本朝洪武九年知州趙原者始甃以甎永樂十九年加以甎之大者景泰五年又護以木樁實以甎土以備風浪舟楫往來方其天色晴霽風恬浪靜如行鏡中一遇西風驟起波濤洶湧人物淪亡不可勝計建議者往往欲于舊隄之外湖泊之傍别為長隄一帶約去舊隄一二十丈下覆鐵釡以定其基旁樹木樁以固其勢就浚其巾之土以實之用甎色砌一如舊隄其中舊有减水牐三座就用改作通水橋洞引湖水于内以行舟楫仍于外隄造减水牐以節水勢如此則人力足以勝天省官物之失陷免人物之死亡為利實亦不小元史食貨志元都于燕去江南極逺而百司庶府之繁衞士編民之衆無不仰給于江南自伯顔獻海運之言而江南之糧分為春夏二運葢至于京師者歳至三百餘萬石民無輓輸之勞國有儲蓄之富豈非一代良法歟按海運之法自秦已有之而唐人亦轉東吳粳稻以給幽燕以給邉方之用而已用之以足國則始於元焉考元史論海運有云民無輓輸之勞國有儲蓄之富又云海運視河漕之數所得葢多故終元之世海運不廢作元史者皆國初史臣生長勝國習見海運之利所言非無徵者我朝洪武三十年海運糧七十萬石給遼東軍餉永樂初海運七十萬石至北京至十三年㑹通河通利始罷海運竊以自古漕運所從之道有三曰陸曰河曰海陸運以車水運以舟所運有多寡所費有繁省河漕視陸運之費省什三四海運視陸運之費省什七八今漕河通利歳運充積固無資於海運也然㑹河一河譬則人身之咽喉也一日食不下咽立有死亡之禍請于未事之先而為意外之慮尋元人海運之故道别通海運一路與河漕並行江西湖廣江東之粟照舊河運而以浙東西瀕海一帶由海道運使人習知海道一旦漕渠少有滯塞此不來而彼來亦思患預防之先計也夫海運之利以其放洋而其險也亦以其放洋今日欲避放洋之害宜預遣習知海道者起自蘇州劉家港訪問傍海居民漁斤竈丁逐一次第蹈視泊舟港㲼沙石多寡洲渚逺近丘曲為之設法圖畫具本以防傍海通運之法是亦良法且元史載海運自至元二十年始至天厯二年止備載歳運所至之數以見其所失不無意也竊恐今日河運之糧每年所失不止此數况海運無剥淺之費無挨次之守而國家亦有水戰之備可以制服朝鮮安南邉海之夷誠萬世之利也至元時韓仲暉等言自安民山開河北至臨清凡二百五十里引汶絶濟直屬漳御建閘三十有一度高低分逺近以節蓄洩賜名㑹通河按㑹通河之名始此至我朝洪武二十四年㑹河淤往來者悉由陸以至徳州下河永樂初肇造北京糧道由江入淮由淮入黄河運至陽武由陸運水運至北京厥後濟寧州同知潘叔正因州夫遞運之難請開㑹通河朝命工部尚書宋禮發丁夫疏鑿以復故道又命刑部侍郎金純開黄河故道分水以益漕河自是始罷海運專事河運葢永樂十三年也明年平江伯陳瑄又請濬淮安莊牐一帶沙河自淮以北沿立淺舖築牽路樹柳木穿井泉于是漕法通便噫元之為此河河成而不盡以通漕葢天假元人之力以為我朝之用也又按歴代建都于西北者皆仰給東南之漕都長安者阻關陜之險漕運極難所以資於江淮渭河都洛陽汴梁者兼資汴洛汝蔡而已惟我朝建都幽燕東至於海西暨於河南盡於江北至大募水涓滴皆為我國家用其功最鉅者其運河由江而入䢴溝繇淮而度上清口經徐吕二洪沂沁泗水至濟寧居運道之中所謂天井牐者即元史所謂㑹源牐也諸水畢㑹于此而分流於北此葢居南京之間南北中分之處通議諸牐天井居其中臨清總其㑹居中者如人身之有腰脊也總㑹如人身之有咽喉腰脊損則四支莫運咽喉閉則五臟不通濟寧居腹裏之地而多有旁出之途臨清乃㑹通河之極處漕路之要害也東控青齊北臨燕趙且去邉關不逺疾馳之騎不浹旬可到為國家深長之思者請跨河為城兩際各為水門以通舟楫而包圍巨牐在于其中設官以司啟閉屯兵以為防守亦思患預防之一事也凡漕運事宜詳具漕河圖後但河之淤決不常或有為陸運海運之説以備不虞是或一道也併採録之陸運附陸運之方每人行十步三十六人可行一里三百六十人可行十里三千六百人可行一百里每人負米四斗以夾布囊盛之用印封記人不息肩米不着地排列成行日行五百回計路二十八里輕行一十四里重行一十四里日可運米二百石每運給米一斗可供二萬人此百里一日運糧之術也海運附詳已後海運圖後今浙福海船雖極逺畨皆能通至京師或不難也松江與太倉通泰州俱有沙船淮安有海雕船常由海以至山東寧海縣賈米離天津不逺若以南京等總缺船衛分坐兑松江太倉等處近海糧米者求的當船户厚與雇值量運三四萬石歳一行之使海舟漸熟可為日後之備或可行也圖書編卷八十八
