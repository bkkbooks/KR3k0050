body:
  text: 圖書編卷三十四明章潢撰輿地總圖敘自古帝王之御世者必一統天下而後為世羲農以上疆理之制世逺莫之詳矣其見諸載籍者謂黃帝畫野分州得百里之國萬區帝嚳創制九州統領萬國堯遭洪水天下分絶為十二州使禹平治水土更制九州列五服禹繼唐虞之盛塗山之會執玉帛者萬國而四百年間遞相兼并逮商受命其能存者才三千餘國亦為九州分統天下及周克商尚有千八百國而分天下為九畿至成王時仍曰九州厥後諸侯相吞列國耗盡陵夷至於戰國天下分而為七秦并六國罷侯置守分天下為四十郡漢因秦制加置郡國武帝開拓疆土四履彌廣分天下為十三州郡皆置刺史既而三國鼎峙至晉始合為一置州凡十有九未幾南北分裂至隋復合為一盡廢郡為州唐承隋後置州愈多貞觀初分天下為十道開元中又置十五道宋承五季削平偏據至道末分天下為十五路宣和年又增置至二十六路元太祖即位於鄂諾河內立中書省一以領腹裏諸內外立行中書省十以領天下諸路然其地西北雖過於南而東南島夷則未盡附惟我皇明誕膺天命統一華夷幅貟之廣東盡遼左西極流沙南越海表北抵沙漠四極八荒靡不來庭而疆理之制則以京畿府州直𨽻六部天下分為十三布政司曰山西曰山東曰河南曰陜西曰浙江曰江西曰湖廣曰四川曰福建曰廣東曰廣西曰雲南曰貴州以統諸府州縣而都司衛所則錯置於其間以為防禦總之為府一百四十九為州一百二十八為縣一千一百五而邊陲之地都司衛所及宣撫招討宣慰安撫等司與夫各國受官封執臣禮者皆以次具載於志焉顧昔周官詔觀事則有志詔地事則有圖故今復為圖分置於兩畿各布政司之前又為天下總圖於首披圖而觀庶天下疆域之大了然在目而我皇明一統之盛冠乎古今者垂之萬世有足徴云輿地圖總考粵自黃帝疆理南北堯命禹平水土分天下為九州别五服舜分冀為幽州并州分青為營州是為十二州禹貢仍九州商有幽營無梁青周有幽并無徐梁王畿居中九州環列於外至秦始皇分置三十六郡後平百粵增置四郡為四十郡罷侯置守漢初承秦舊武帝開西南夷增置七郡各置刺史統治之哀平時置郡國六十三與秦四十合百有三分道凡三十有二侯國二百四十一光武中興乃併省郡國十縣道侯四百餘所後漸增郡國置一百五仍有十三部漢末三國鼎立晉分十九道為郡一百七十二八代分裂唐初權置州郡頗多太宗始命併省郡國因山川形便分天下為十道州府三百五十八至明皇又增五道各置採訪使如刺史之職宋平五季之亂撫有四京二十三路高宗僅保有東南元南北混一置立三臺十二省宣慰司一十八道至順帝輿圖悉歸我大明際天薄海莫非王土初梓大明志洪武六年命州府繪上山川險易圖十六年詔天下都司上衛所城池地理山川關津亭墩水陸道路倉庫圖十七年令朝覲官上土地人民圖十八年夏上覽輿地圖侍臣有言輿地之廣古所未有者上曰地廣則教化雞周人衆則撫摩難遍此正當戒慎天命人心惟德是視紂以天下而亡湯以七十里而興所係在德豈在地之大小二十七年寰宇通志書成書分為八目東距遼東都司又自遼東北至三萬衛西極四川松潘衛又西南距雲南金齒南距廣東至崖州又東南至福建漳州府北暨北平大寧衛又西北至陜西甘肅為驛九百四十九天下道里縱一萬九百橫一萬一千七百五十里四夷之驛不與焉嗣是永樂十六年纂天下郡縣志天順五年造大明一統志至嘉靖八年大學士桂萼上皇明輿地圖敘記條其風俗厄塞兵賦藩封稍稱精核十六年禮部主事許論上九邉圖論條析鎮塞利害亦為明練然聞學士大夫有謂我朝疆域過於宋敵於唐不及於漢蓋以失朔方大寧交趾及開平興和玄菟樂浪燉煌故也夫堯封禹貢閩越無聞荆蠻徐戎殷周為梗以今視昔奄甸𢎞矣揆文教奮武衛得非今日之要道乎輿地總論天下輿地古今一也其在古也諸侯之封土不一其在今也畿省之郡縣不齊疆以世殊名以時易或求之險要不知古昔為何方或考古之史書不識今何名何地也體國經野惟於禹貢九州而識其疆域之所别焉雖三代以前侯國有分合秦漢以來郡邑有變遷亦庶乎其不淆矣不然晉一也分而為韓為趙為魏魏又謂之梁楚一也越并吳而楚并越均之為吳楚為吳越河東一名也兖州并州異焉河西一名也雍州涼州異焉河南一名也中土邉境異焉山東一名也河南河北異焉江南一地也江左江右異焉周之河內與漢之河內同乎否乎漢之河東與唐之河東同乎否乎至於山有東吳西吳水有東漢西漢其何以别之也耶不知荆衡萬古不易之山河濟萬古不易之水故禹貢分州一以山川定其疆界兖州可移而濟河之兖如故也梁州可遷而華陽黑水之梁如故也所以唐一行以天下山河之象在乎兩界北戒自三危積石負終南地絡之隂東及太華逾河並雷首底柱王屋大行北抵常山之右乃東循塞垣至穢貊朝鮮是謂北紀南戒自岷山嶓冡負地絡之陽東及太華連商山熊耳外方桐柏自上洛南逾江漢抵武當荆山逾衡陽乃東循嶺徼達東甌閩中是謂南紀窮沙漠限蠻獠極于聲教之所可及一如門户之不容越此以天象分南北言也或又即中華之山川大勢分為三條者如長江與南海夾南條大幹盡於東南海黃河與大江夾中條大幹盡東海黃河與鴨緑江夾北條大幹盡於遼東吳草廬所謂崑崙為西極之祖分沠三幹以入中國此又以地脈言也惟禹貢九州其所載者山川也冀州王都不言所至而壺口碣石衛洚在其地焉自是以及濟河惟兖州海岱惟青州海岱及淮惟徐州淮海惟揚州荆及衡陽惟荆州荆河惟豫州華陽黑水惟梁州黑水西河惟雍州今各州之山川果異於古歟所載惟土田也如冀之厥土白壤厥田中中兖土黑墳田中下青土白墳海濵廣斥田上下徐土赤埴墳田上中揚土塗泥田下下荆土塗泥田下中豫土惟壤下土墳壚田中上梁土青黎田下上雍土黃壤田上上今各州之土田果異於古歟所載惟物産也自冀之厥賦上上所賦總銍秸粟米以至兖則草繇木條厥貢漆絲青貢鹽絺海物絲枲鉛松怪石徐草木漸包貢土五色羽翟孤桐浮磬揚草夭木喬貢惟金三品瑤琨篠簜齒革羽毛荆貢羽毛齒革惟金三品杶幹栝柏礪砥砮丹豫貢漆枲絺紵纎纊錫磬梁貢璆鐵銀鏤砮磬熊羆狐狸織皮雍貢球琳琅玕今各州之物産果異於古歟是九州之載在禹貢者皆千古不易者也以今兩畿十三省合禹之九州即其郡邑疆界而分别之冀即北直𨽻山西雍即陜西豫即河南梁即四川荆即湖廣惟淮以北為山東幾包青兖徐三州而遼東則古屬青州耳淮以南為古揚州原包南直𨽻浙江江西以及廣東今以一州分一畿三省雖參錯不盡同大略不甚相逺也合古今觀之則凡在天之星土隨其州縣變易而星土未之變也凡在地之川嶽隨其州縣遷移而川嶽未之遷也與夫厯代風俗厄塞兵賦藩封雖越數千百載一一如指諸掌矣但禹都冀州王畿四面各五千里今京師即其地而宣薊大同去北部何其近歟大寧河套之失此可知矣揚州自淮南以及江浙地本廣矣而又加之以閩廣荆梁之廣本由湖之巨浸山之重復矣而又益之以雲貴此則不可概以九州限之也然則統觀宇內西北文物之盛逺不逮古而東南過之固由天運使然而冀雍青徐兖豫之土田今猶古也一望千里萑葦極目亦可委之於天運乎揚州田本下下賦下上今嵗運居天下之半而民力殫矣况古之王畿百里賦納總二百里納銍三百里納秸服四百里粟五百里米是粟米之賦取諸五百里而足也今京師天下之本財賦斯民之命而盡仰給于東南得無大異於古歟然則墾西北之曠土紓東南之漕儲在司國計者加之意耳噫以古證今詳審幅􅊷之沿革因今思古深慨治化之汚隆覽輿圖者豈獨思禹功哉皇明輿圖四極東起朝鮮西至嘉峪南濵海北連沙漠道路紆縈各萬餘里京師據一統圖在東北之境南京在東南之境南京之東南為浙江浙江之東南為福建濵海南京之西南則為江西由江西而西北則為湖廣轉而東南則為廣東濵海廣東之西少北是為廣西南海濵廣西之西北則為貴州之西南則為雲南而貴州之西北則四川也此四藩者總在南方此只以地分東北論河南在京師之西南乃天地之中據一統圖湖廣承天襄陽之間居地之中朱子亦云荆襄得天地之中有中原氣象為東南交會處京師東南為山東西為山西又西南為陜西此四藩者總在北方其九邉則遼東薊州皆在京師之東而薊州為近宣府大同皆在京師之西而宣府為近榆林固原皆在陜西北境而固原在外寧夏在河套過河而西寧夏之西轉南則甘肅也統天下地方所至東則山東登萊揚州之通海蘇州之太倉浙江之定海福建之興泉皆濵大海此自東及東南所至之境而日本琉球則居東南海中由東轉南則廣東之潮瓊由南而西則蘇門答剌安南諸國交趾在安南之東暹羅在安南之西而雲南孟定等府亦濵海居于海中者則西洋等國也皆在西南正西則雲南之麗江極西則黃河之星宿海崑崙山黃河黑水諸處更西不可詳矣由西而北則西域諸國吐魯畨所居而大磧陰山瀚海在焉所謂沙漠者也又西北數千里有鐵門關過此則不可詳矣東北則由京師出居庸關自北而東過白浪山抵女直過黑松林以達北海出居庸關至北海共四千餘里大抵中國之勢南臨大海北接長城西北多山東南多水此其概也學士大夫嘗言我朝疆域過于宋敵于唐不及于漢蓋以朔方大寧交趾及開平興和玄菟樂浪燉煌不足故也夫先王盛時土地西不盡流沙南不盡衡山東不盡東海北不盡恆山如洛陽為王城臯蠻氏陸渾氏密邇乎其境其東之萊牟介莒皆夷地淮南為舒郡秦為西戎河北真定中山之境乃鮮虞肥鼓國河東之域而有赤狄甲氏此外荆楚吳越閩蜀又皆在荒服之外是時中國所有者宋晉齊魯衛鄭通不過今數十郡地耳周之盛時猶然則夏商以前可知已故應鏞言自秦而上西北袤而東南􅕚秦而下東南展而西北縮蓋各有不盡之地不勞中國以事外也今日地勢東南已極于海至矣盡矣惟西與北尚未底於海耳然視之前代奄甸已𢎞彼大荒絶漠之險地氣既惡人性復獷非復人居之處其有與無固不足為重輕也皇明輿地總圖建置南北直𨽻府二十二州六屬府州三十縣二百二十二承宣布政使司十三屬府一百二十一羈縻一十五州一百六十四羈縻四十七縣九百三十又羈縻九總為府一百五十八州二百四十七縣一千一百五十一實計里六萬九千五百五十六戶九百三十五萬二千零一十五口五千八百五十五萬八百零夏秋二稅共米麥二千六百零八萬五千九百一十六石京通二倉臨德徐淮四倉每年漕運米四百萬石南京各倉每年運米闕絹二十萬五千五百九十八匹絲一萬七千零三斤又三百六十一萬八千一十七兩棉花二十四萬六千五百六十二斤棉布一十三萬八百七十匹麻布二千七十七匹洞蠻􅀢布二百五十九條苧六十五斤鈔八萬一千二十五錠零一百八十四貫馬草一千四百六十九萬五千九百九十一包又一千一百一十六萬二千六百四十二斤都轉運鹽使司六鹽課提舉司九鹽課司一百六十九每嵗辦鹽一百一十七萬六千五百二十五引又鹽價并引價銀四萬六千一百五十八兩太倉庫嵗額運一百四十九萬兩內夏稅五萬五百餘兩秋糧九十四萬四千八百餘兩馬草折銀二十三萬七千餘兩鹽課折銀二十餘兩雲南閘辦三萬餘兩行太僕寺三苑馬寺二監十八苑七十七馬騾驢匹二十萬一千一百市舶提舉司三茶馬提舉司三河渠提舉司一兩京都督府八𨽻各都指揮使司十六行都指揮使司五中都留守一所屬衛共四百九十三屬所二千五百九十三守禦千戶所三百一十五儀衛司二十九犧牲所二京營并在外衛所中都承天各邉馬步官軍共八十四萬五千八百餘員名兩京文武官吏嵗俸糧共該若干各邉鎮應發年例并新增調集軍馬等項四百四十五萬兩有零王府二十九郡王三百五十四鎮輔奉國將軍中尉以下九千四百四十一郡主縣主郡君縣君鄉君以下共九千七百九十三每嵗祿米八百五十三萬以上係嘉靖三十年十月前數各長官使司三十四夷官宣慰司十一宣撫司十一安撫司二十二招討司一長官司一百六十三蠻夷長官司五四夷入貢各國東北朝鮮等二東日本一南安南占城等六西南浡泥等四十九西哈剌等四十六西北哈密等七古今方輿總論大都山河兩戒各極遐方自鴻濛剖判則然而東限滄海西限流沙南限溪領北限磧漠為天子之四履內劃五服别九州謂之中國蓋是封域之廣莫若秦漢秦皇兼併天下設九尉東傅海西湊月支南至北嚮戶據北河阻陰山為塞威莫振焉孝武之烈鏤碣石包罽賔隃蘭滄封狼胥勳莫高焉二君負闔闢宇宙之才席屢世戰勝之烈藉前代共險之饒天實啓之以恢拓境宇易亂而治安可謂非功也唐之盛長安西境萬三千里後乃失河湟捐維州宋則燕雲幅割靈武瓜裂大渡斧劃蓋自南渡而後紛擾已極也已愚究覽方輿之概古西北袤而後縮強鄰壓境漸逼也古東南􅕚而後展蠻夷服屬漸衆也至云三五之宅甚邇後乃寢廣博綜其實不然記牒稱神農地過日月之表禹使章亥步四極里各數億什即詡言未可盡詰自日南徼外堯時羲叔所宅也滇垂黑水玄禹所𨗳也庸髳百濮武王歌舞之師也穢貊句驪箕子田蠶之國也蓋古以文教漸逺不盡若後世𨽻為冠帶之室必謂古之地愜臻秦漢乃大非通論也惟君德休明即殊域絶黨不異宇下否則赤縣神鄉判若外域化隆者閎博治淺者褊狹可不鑑歟我太祖誕膺寶命振天維而總坤絡既奠基江左表率萬方一六合而光宅乃經營四方東北起遼海西盡張掖以要會為鎮咸建強宗東南命東甌環海置戍西南委黔寧永綏滇服東收朝鮮為守禮之藩蓋開濟維新而萬葉之鴻謨大定兼乎保業矣成祖法天樞以定鼎扼天下之吭而撫其背親御六飛三犂邊庭至視斗杓而還于撻伐不靖時聫絡諸塞勢如控御靡不順從封哈密以控諸蕃定交趾復漢唐故壤西南建官府以慰撫稱者牙錯而居使臣航海重譯而欵三十六國蓋纂紹重光而堂構之固特勞兼乎創造矣皇朝輿圖之廣際天匝地書文通被幾將日所出入神農所稱禹迹所被曷以侈兹顧繼世而後疆事之變亦略可言自遼陽之舊委于前則寇兵集三岔河之中而東西肘腋不應矣大寧之全捐于後則朝灤兩口外強悍聚居而神京肩臂寒矣開平興和遷大邉保堡後而上谷雲中患剝膚矣東勝內徙則千八百堠罷戍而冦家河曲關輔腹心結轖矣哈密沒于土畨則西域朝貢之吭咽饐而河西孤懸斗絶股指幾于􅏓盩矣其在東南者則交南設藩置吏一旦以卑夷而揚戈三下之勞盡捐矣諸此非可輕議而愚不敢苛責當事者蓋祖宗以百勝之威乘物力之富犁庭闢境易若卷席而世之平也欲以習安之士當凶暴之徒靡有限之財爭域外之利雖鞭之長不及馬腹其勢然也雖然得其土地非可供耕耘得其人民非可供驅使故漢之欵五原銘燕然不以增治棄斗辟閉玉關不以貶烈有道之君務耀德以盛內不敝所恃以事無用則談今日全盛之烈當以九州和理論而邉陬海澨隔閡山河之表者惡足較論也哉但自昨嵗洮河之警終于畔約罪在必討海島之夷濳謀犯順又已見告則方隅不無事矣保泰防微之慮其可忽也統論長安洛陽汴梁三都形勝自古帝王之作莫不更都三河之間而周秦以降繼宅兩京五季而下又都大梁何帝居之不常也然考其所以定都改卜之意則有在矣大抵長安便於守洛陽便於歸大梁便於戰三京利害各有一偏故前王因其便利而都之也方其正朔雖一而利勢不專藩侯棊布山河瓜分列國有唇齒之依朝廷無指臂之順必也守戰並修軍民兩恤俾其進足以制諸夏之變退足以保固宗社捨長安莫利也故宗周西漢繼宅西土勢或然也嬴秦隋唐踵卜長安仍以為安也逮夫車書混一禮教修明表正朝廷綱目郡縣於是偃武修文輕徭薄賦俾斯民均受其賜思所以新一王之制侔盛古之隆唯禮樂教化是遑而不以兵革戰伐為事則捨洛陽莫便也故周成漢光定都成周誠得其宜也曺魏司馬晉踵卜洛邑仍以為安也光武而下唯元魏孝文僅留意於稽古禮文之事故逺拔乎舊俗中宅洛邑燦然新一王之政逺侔盛古亦遷都改卜有以相之若乃版圖未一侵伐頻乘苖蠻外訌邉隅僭竊必也德刑兼修戰守兩備宿重兵於京師強幹弱枝以鎮服夷夏而指蹤英雄以赴其功則捨大梁莫便也朱梁而下以迄於宋仍都大梁亦勢或然也然有其利必有其害膏腴惰農險阻逸德知禦侮于海隅而忽艱虞於京輦者長安之不利也故五侯九伯不能亂周而犬戎實亂之山東戰國不能亡秦而趙高實亡之藩狄不能犯函谷而王莽實篡漢燕晉不能隳苻秦而姚萇實逼堅以至輔民譟而新莽燼涇師囂而德宗逃豈非長安忘警戒之道也歟德化有時替而君不常明紀綱有時紊而政不常舉敵受八面而險不數舍一方矯虔九重震動此洛邑之不利也在董卓奮而東漢亡爾朱騁而北朝亂倫師犯闕如履門闌以至典午失馭藩侯弄兵往來如織王城不啻傳舍豈非洛陽失戰守之備也歟宴安起於無虞弊蠧生於悠久故載戢載櫜而甲械朽鈍以安以處而士卒獰憊兵多難用將逸難使可以隆安強之威而不足禦一旦之變此則汴都之不利也故石晉之亡兵叛于外也宋朝靖康之變太平之久也然則長安便於守洛陽便於歸大梁便於戰又在人之所便利如何固未可恃其所便而遽即於安也雖然玉京之制各有輔居屛蔽之地又不可不察長安之制以陜西為畿輔而屛蔽實在隴右宋朝失於西夏洛陽之制以關東為畿輔而屏蔽實在河東大梁之制以河南為畿輔而屏蔽實在河北故由古以來洛京之禍常起于并汾汴都之變常起于燕趙長安之難雖不常所自而河隴之寇尤為頻駭良由失其外屏也是以河湟未歸則長安未易都雲朔未賔則洛陽未易卜燕薊未服則大梁未易宅脣亡齒寒者此之謂矣由是以論則三京利害各有攸當不可一概求也然以王道繩之是不無優劣焉從古議者紛紛莫不以長安為優而愚意則否長安之地四塞雖固而包履裁一州之境八州之民皆吾赤子而乃漸潼洮以自固是何示天下以私也豈天子守在四夷而王者以天下為家之義哉嗚呼天生民而立之君所以均調而齊一之也故王者之作必中天下而立定四海之民俾其貢賦於是而易輸寃抑於是而易訴朝覲會同於是而易期赴調上計於是而易逹故布德行仁則易以霑濡發號施令則易以敷暢皆所以均惠斯民也若夫洛邑之地當天下之中大梁坐水陸之衝其所以惠利斯民孰便于此傳曰譬如北辰居其所而衆星共之洛邑之謂也又曰三十輻共一轂大梁之謂也然則欲求一定萬世之都所以為國家生民無窮之計三都之中惟洛其庶幾矣統論南北強弱周室之衰秦晉齊楚擅天下相持五百年而秦滅楚漢室之亡天下三分相持六十年而晉平吳晉室之亂琅琊南渡繼為南北朝相持三百年而隋併陳周秦漢唐肇基王業皆本陜西光武中興亦賴河北遂令古今議者有形勢優劣之辨讀賈生之過秦則夸言陜右誦杜牧之罪言則齒譽山東即宋朝河北西路河東路及燕雲地也而赫赫南夏未有稱焉寡見謏聞之士大抵雷同深以為不然夫欲觀古今盛衰之理者無徒驗功業之已成當考其興亡治亂之所由致良將不擇兵而戰循吏不擇民而治王霸之興豈擇見利而後制勝沃野不能起惰農高賢不能成格虜山河襟帶又安能保亡國之君是以荆楚削弱王翦渡江高齊荒蕩周師入鄴是善用關西者能以併南國也赫連屈強魏武克朔方孫皓淫虐王濬入金陵是善用河北者皆能以併西南也章邯輕敵項王渡河姚泓玩冦宋武入關是善用江南者皆能以併西北也魏太祖宋高祖周武帝皆一代英雄故魏起河北周本關西宋興江南皆能奮自孤微赫然成伯業此則三方之地利皆可以興也商受暴虐黃河無固胡亥愚蒙秦關洞開叔寶荒淫長江失險此則三方之地利皆不足恃也項王殘鷙石季驍雄皆轉戰無前而斯民重困故項興東南石奮西北其亡一也蕭衍苻堅皆一時令主乘時奮功然有雄志而無權材一則強霸于南夏一則制勝於北朝其敗一也夫以孫皓淫虐叔寶荒淫固同符于桀紂矣使奄有萬國覆亡不暇何待于東南哉文王之謨武王之烈高祖之神光武之聖唐太宗之英武皆以天錫勇智俾表正萬邦者也一旅之衆一成之田亦足以王矣何待於西北哉彼東南之君唯宋武最稱英雄然究其威略基圖未可與始皇較優劣又何敢企文武高光之清塵也無其人而無其功理之必然者也故知南北東西皆無地利興亡治亂悉在人謀尚何妄分優劣之有識者或謂西北之風渾東南之俗偷西北之人直東南之民詐西北之土沃東南之地瘠西北之士徑東南之兵囂此形勢之所以異也是又不然彼各有所短長固不可一概論也夫西北之風渾其失也悍東南之俗偷其得也和渾厚可與奮功悍突難與圖治和易則易與樂成偷惰則難與慮始故由古以來南北紛爭則西北以強勝而多失之亂東南以治隆而多失之弱此則風俗之各有得失也西北之人直其失也狠而後雜以羌渾之人然而羌渾之人驕奢者也東南之人詐其得也易而又邉以蠻獠然而蠻獠之人庸愚者也直則不可以屈犯驕則不可以禮加狠暴之人尤然不可以德化是知西北之人難治也雖愚可以誠推雖詐可以利夸和易之人易以德懷故知東南之人易治也故由古以來西北之政多以嚴致平東南之政多以寬為治此則人民之各有得失也西北之地沃便種植而宜蠶桑東南之地磽瘠多田疇而利耕布故由古以來西北之人裕于賄而患于飢東南之人苦于貧而足於食善治西北則足以富國善治東南則足以餘糧若九有同軌南北一家則儲糧常仰于東南貨賄常資于西北則食貨之各有得失也西北之兵沉徑其失也扺肆東南之兵囂亂其得也剽鋭故西北之兵便于持久東南之兵利於速戰嘗考曺公用兵常以堅守挫強敵及征孫權驟來亟戰遂大敗于赤壁此則西北之兵便於持久而不利於速戰項王持孤軍轉戰無前及遇漢祖堅守相持卒敗於垓下此東南之兵利于亟戰而不利于持久也深淵高田戰不獲騁而諸葛恪之師敗矣江漢之士出入如飛而李密之衆隳矣是以周亞夫堅壁以挫吳楚謝幼度亟戰而敗苻堅則以各能用其便利故耳故張良賈充鄭袤之徒皆有南兵剽鋭之言而北制勝以守成不戰之功者蓋畏其鋭而莫敢爭也自古惟聞北人之畏南未聞南人之憚北也顧議者何蔽焉愚謂南北形勝初無輕重舉其天時人事如何耳論西北古今盛衰劉石之亂東晉奄有東南垂百餘年淮漢以南盡為晉土而當時有志之士常嘆中原之未復豈不以古帝王之墟而重失之耶然考其地不過禹貢青徐兖豫冀州之壤而在唐為河南河北河東三道在宋朝為四京七路及淮南宿亳海泗諸州與陜西河中府解州陜虢諸郡是已以宋疆理校之僅能當天下十三耳何於古而甚重也亦嘗考之載史自開闢以來綿於三代其間帝王之作莫不建國於三河之間戶口庶繁田腴囿闢城邑井里燦然聿修天下名物於此乎聚四方風教於此乎美更三皇五帝而益重冠九有四夷而屹崇故厯古以來端為重地號稱中原捨此以外則蠻夷之所居中原可坐而制之以為偏方指臂之地耳逮夫宗周以降陜服始為王畿春秋而下南國滋為霸土秦漢以還居中馭外包四海之內盡歸中國疆理而偏方指臂之地浸與中原埒矣然而西漢盛時總天下民户千有二百二十餘萬而中原垂九百萬天下縣千三百七十有餘而中原當一千有餘大率縣戶過天下十之七矧三代以前抑又可知東晉之時去西漢為未逺中原之地雖漸以陵替而中原之名猶在也當時有志之士深用慨嘆蓋亦宜矣然自新室而下更厯魏晉南北隋唐五季之亂三河亂離于是郡邑名物代不如昨中原之名雖因於古而中原之實已非古矣何則當西漢元始五年中原縣戶過天下十之七後一百三十有九年當東漢建康元年中原縣戶過天下十之六時天下縣千一百八十中原當七百天下戶九百七十萬中原當五百七十萬又後一百三十有六年當晉太康元年中原縣户乃當天下十之五時天下縣千二百有餘中原當五百有餘天下戶二百四十五萬中原才餘一百二十萬又後四百六十有一年當李唐開元二十八年中原縣戶乃當天下十之四時天下縣千五百七十有餘中原當五百有餘天下户八百四十餘萬中原當三百九十萬又後三百四十年當宋朝元豐末元祐年中原縣戶乃當天下十之三時天下縣千一百三十有餘中原當四百有餘天下戶垂千六百五十萬中原四百七十萬夫以宋朝元豐間去西漢之季才千一百年耳而昔之民户縣邑當天下之七今乃僅能當十之三何古今之殊絶也蓋自秦漢以前天下蕃庶舉在中原而江淮閩浙川廣之間荒涼為甚漢魏而下三河浸以荒涼而中原蕃庶反移於江淮閩浙川廣之間暨于宋朝虛實推遷不啻十倍如今琅琊一郡五十二縣而宋朝存者止三縣而已諸城安丘二縣屬宋朝密州宋朝海州東海縣即漢贑榆縣也漢會稽治縣一縣也宋朝乃為福建一路凡四十五縣漢潁川一郡餘四十三萬户宋朝為許潁二州民户才贏十萬而已而漢豫章一郡才六萬戶宋朝乃為江東西有十三州軍江西惟興國軍餘皆豫章郡地江東饒信二州及南康軍亦是豫章郡地也增至一百七十萬户夫琅琊潁川皆中原地也略以此數郡觀之盛衰相反如此然則中原安得不益輕而偏方安得不益重故今之中原非古之中原今日之中原已與古偏方無異而古之中原乃在今東南偏方之域矣徇名而責實必有輕重之當議者可不深考云論川陜大勢粵自蜀江東下黃河南注而天下大勢分為南北故河北江南皆天下制勝之地而挈南北之輕重者又在川陜而已夫江南所恃以為固者長江也而四川之地據長江上遊而下臨吳楚其勢足以奪長江之險河北所恃以為固者黃河也而陜西之地據黃河上遊而下臨趙代其勢足以奪黃河之險是川陜二地常制南北之命而况江南之地以淮漢為喉襟以荆襄為肘腋而巴蜀之地乃控勒湘漢鴻溝千里無再舍不接畛設令北人兼有巴蜀則南國以湘漢之郊為戰守之地而耕桑之民止於江浙之間萬有偏師不陳一城告奔則冀馬秦鋒馳於吳會之交矣河北之地以汴洛為喉襟以并汾為肘腋而秦中之地乃與汾洛踵接百城逶迤鋒火相望也借令南人兼有秦中則汾洛之間皆為戰守之地而耕桑之民止於河漳之間萬有偏師不陳一城告奔則越戰吳兵騁於趙代之郊矣輔車相依脣亡齒寒者正此之謂也蓋自春秋戰國以來至于宋朝之興垂千有七百年而南北交爭餘九百載而北人能并南者有四大率皆先得四川故秦惠王併蜀而始皇因以滅楚晉文帝併蜀而武帝因以滅吳周文帝併蜀而隋文帝因以滅陳及宋之興亦乾德中併蜀而開寶中遂平江南然則四川克固江南可奠枕也春秋三國東晉南朝之際南兵屢得志於中原矣然而終不能成功者以其不知先取關中故也唯宋武嘗克長安旋即失之故亦不能濟河夫得河南而未得關中則沿河抵關縱橫數十城皆為戰守之地而所向遇敵其勢逆矣故自河北而渡河南則易自河南而渡河北則難自關中而出河南則易自河南而入關中則難借使南人兼有關中而善用之則河南數千里之地縱在敵人徒為戰場無險可恃一戰而勝則汴洛百城可傳檄而下矣故知得關中則取河南易於反掌不得關中雖有河南不能守也而東晉南朝交爭三百年間君臣將士日夜圖維雖鋭意收復中原而不知陜西之利故轉戰河南以徼河朔之功而勝負叛服如代棊變終無益也然則自古南北交爭而南人終不能併者豈惟力之不逮固亦謀之不臧也夫然後知南人之守在巴蜀而戰在陜西北人之守在陜西而戰在巴蜀彼河南江北之間特舟車往來之地耳非成功制勝之所也故曰天下大勢分為南北而挈南北之輕重者又在川陜而已論東南古今盛衰傳稱善人天地之紀君子邦家之光又曰不有君子其能國乎然則天下國家之重端有在于得人也江淮閩廣之地其來尚矣自黃帝南巡而登湘山宋朝潭州益陽縣內夏禹東巡而登會稽宋朝越州高陽正朔所際南暨交趾唐交州宋朝棄之南蠻是東南之域振古通中國也然而文身鵙舌去京華甚逺承太古巢穴之餘未陶王化三代以前邈為蠻區賢人君子不産其邦帝王公侯未始建國中原視為遐陬之不齒也逮夫泰伯奔荆蠻而吳人化其德文王之興化行江漢而召伯之教明于南國東南之民浸沐休風聲教既被君子出焉由是季札厯聘諸華而先王禮樂逹于海隅陳良北學中國而周孔之道遍于南服若敖蚡冒篳路藍縷以啓山林而荆楚以闢句踐種蠡焦勞辛苦牧養其民而揚越以庶子胥之治吳楚實倉廩峙兵庫創城郭設守備而浙江之間浸有疆理矣蒍敖之相楚商農士賈各肄其業德刑政事不易其常而湘漢之間滋然繁甚矣加之兩漢而下循吏接踵馬援修駱越之律張霸興吳會之學王景導淮西以牛耕韋宙教江西以陶瓦許荆以人倫之教新桂嶺之治任延錫以諸華之風移嶺表之俗而東南之邦浸為禮義矣嗟乎城邑而居倉廩而儲陶瓦以覆服牛以耕父子夫婦以為家鄉黨庠序以為教斯中原之民自古能之而東南之民自三代以前漫然未有聞知則與禽獸何異哉逮夫春秋戰國得善人君子以為邦浸革蠻風而歸諸華而又漢魏以還天下有變常首難于西北衣冠轉而南渡故西北益耗而東南益盛施於隋唐宋朝風教滋美端與中原無異而民物豐夥又復過之故知今之東南非昔之東南昔之東南不能當一路而今之東南乃過于昔之中原又豈可一槩論哉方西漢元始五年嵗在乙丑東南縣戶僅得天下十之一時天下縣千五百五十餘東南才百七十餘天下戶千二百餘萬東南才百餘萬後一百三十有九年當東漢建康九年嵗在甲申東南縣户乃當天下之十二時天下縣千一百八十餘東南當二百四十有餘天下戶九百七十萬東南當二百四十餘萬又後一百三十有六年當西晉太康元年嵗在庚子東南縣戶乃過天下十之三時天下縣千二百有餘東南當四百七十有餘天下戶二百四十五萬東南八十餘萬又後四百有六十年當李唐開元二十八年嵗在庚辰東南縣戶乃當天下十之四時天下縣千五百七十有餘東南當六百有餘天下户八百四十餘萬東南二百七十餘萬又後三百五十年當宋元豐末東南縣户乃過天下十之五時天下縣千一百三十餘東南當四百七十有餘天下戶千六百五十萬東南九百萬觀其縣邑之增民户之庶既若此其盛而又貨財如山利源百出以今擬古邈焉殊絶蓋自開闢以來東南財用之饒見諸載史者莫盛于唐而宋猶且加增數倍唐時嵗運東南粟以實關中不贏二百萬石而宋朝漕運大增嵗至六百餘萬石唐朝出銅鐵銀錫之冶凡六州而五在江浙宣潤饒衢信州嵗鑄錢多止十數萬緡而宋朝鼓鑄大增嵗至百餘萬緡唐朝鹽利初不過四十萬緡至劉晏斡畫其利常增至六百萬緡鹽不常有而宋朝鹽利大增多至歲二千萬緡而海鹽之利居多茶利興自唐季正元中始定之額得四十萬緡自後代有增加終唐世不過倍正元之額而宋茶利大增嵗至二百二十五緡而皆在東南此皆熙豐以前國家常賦之嵗額也其後益有加增至于今則又不然矣嗚呼漢魏以還皇天眷佑東南密為覆護俾斯民日以富庶迄于宋朝物大豐美方之西漢盛時縣邑之增幾至三倍民戶之增幾至十倍財貨之增則數十百倍以至庠序之藹興人材之挺出與夫典禮之修習俗之美則又與古斬焉不相侔矣雖往古中原之盛尤有所不逮則知天運去來地無常利特因時而已然自開闢以來至于宋之興王者之作皆不自東南故議者不能無惑而不知壅久必行蓄厚必發天意所鍾抑有待而然耳且如并州之地自陳隋以前寥寥數千載未有一王興其間河東三節度乃相繼為帝又何其盛也閩中之地自陳隋以前亦寥寥數千載未嘗有顯者出及李唐中葉而後常衮唱其教歐陽詹為之師于是庠序浸興更五代至于宋朝而英才輩出傑然為國用者不勝其紀由是觀之則并州之利始于唐太宗而閩中之利始於常衮又安知東南之利不始于宋朝哉仰觀俯察酌以民情國家之勢斷可識已統論南北形勝江河淮漢經乎中國皆自西而東注是開闢以來南北之形勢已分矣而古今推遷輕重奪移不可不審也蓋普率之間覆載長育各有定限旺于此則彼衰盛于此則彼謝雖先後不齊其有興廢一也是皆天地自然之數非人所能為者觀秦漢以前天運旺於北方故天下之美舉萃於西北其冠冕之盛風化之美榖粟之豐機巧之利財用之饒户口之登舉在淮海以北才越淮漢以南頓然陵替故帝王之興廢在西而謂之中國淮漢以南盡為蠻夷之域是以舜分天下為十二州淮漢以北居其九兖豫青徐雍冀幽并營淮漢以南止居其三荆揚梁周公分天下為九州淮漢以北居其七兖豫青雍并幽冀淮漢以南居其二荆揚漢武分天下為十三部淮漢以北居其九兖豫青徐梁冀幽并司𨽻淮漢以南止居其四荆揚益交元始中總天下千有二百餘萬戶淮漢以南止當二百萬户是秦漢以前萬里南邦僅能當天下四分之一而已加之三國而下繼以東晉南朝紛爭數百年間斯民重困故晉武平吳藉其民户才盈五十萬隋文平陳其藉亦不過晉武之初反以三隅兩淮四川蓋可知矣按其道里雖當宋朝十五路之地淮南江南荆南湖南廣南八路兩浙路福建路蜀川四路及京西南路而户口凋耗曽無江浙一路之民加之利源匱竭食貨蕭然茶稅未興鹽利無幾酒課既疏商算亦罕其仰以給國家之用者不過桑農之稅而已是數百年間罄南朝財賦所以曽不及宋朝江浙一路之半而乃用以提挈天下大半之地以與西北爭衡又豈可得哉爰自李唐而下南北一家蠻荒萬里悉為郡縣而民物自古凋零山川英傑抑鬱而無所發泄由是天地王氣盡鍾於北海嶽之藏勃焉洶湧動植含靈莫不昌盛而又蠻夷軌順盜賊浸息更安史之變而無虞厯五季之難而獲免其間縱有禍亂旋即削平至于宋朝之興罰罪弔民拾取諸國州縣晏然不知有軍而聖聖承承深加涵養民物康寧益用豐泰遂為九圍重地奪往古西北之美而盡有之是以魯鄒多儒古所同也至於宋朝則移在閩浙之間而洙泗寂然矣關輔饒裕古所同也至于宋朝則移在江浙之間而雍土荒涼矣青齊冠蓋衣履亦古所同也至於宋朝則移在蜀漢之間而海岱蕭然矣古之賦於民者惟桑麻所出而桑麻之饒關河為甚東南無足道焉宋朝則異然酒茶鹽鐵香藥關津之利嵗入不資雖兩稅所及殆不能加國家利源莫重於此而太平在于江淮閩浙川廣之間西北無足道焉是以熙豐盛時分天下為三路而淮漢以北止居其八京西北路京東兩路陜西兩路河北兩路河東路共八路淮漢以南乃居其十有五即東晉南朝十五路之地終天下户餘千有六百五十萬而淮漢以北才當五百餘萬户四京餘七十九萬京東兩路垂百二十萬京西北路垂四十九萬河西北路垂九十六萬陜西兩路垂一百三十二萬河東路垂五十九萬共五百二十七萬户淮漢以南乃當千有百萬餘户京西南路餘三十五萬淮南兩路餘百三十一萬兩浙路垂一百六十一萬江西兩路餘二百三十八萬荆湖兩路垂一百五十三萬蜀川四路餘一百九十五萬福建路餘一百五萬廣南兩路餘八十一萬共千有一百一十九萬戶大率當天下三之二是不出東晉南朝之地而爭十五倍之人以十五倍之人而爭三十倍之利舉天下之利盡萃于南夏其古今相反若此之甚是豈非天運回環物無兩大故輕重奪移一至此耶抑嘗譬之人之生世有幼必有壯有壯必有老秦漢以前西北壯而東南稚也魏晉而下壯者之齒益衰稚者之年方長至于宋朝而壯者已老稚者已壯矣人猶以其昔日之壯也而未敢輕其老以昔日之稚也而未知畏其壯是又可以為常乎故曰古今推遷輕重得失不可不審也論青齊春秋戰國之時齊據東海雄置中夏赫然為五百年之強國逮于秦漢之際形勢益張與陜右相確天下制勝之地舉在兩隅如河北江南皆不足道焉故韓信下趙挈以與張耳而弗顧既襲有全齊遽啓假王之請漢為䇿命而蒯通遂知楚漢輕重舉在于信垓下克集西楚遂亡則其地利斷可知也是故田肯有東西秦之稱愚初讀戰國楚漢之書殊覺齊地之強意其後世滋甚然而漢魏而下寥寥數千載間青齊之地浸以汩沒其間擅王張耳僭帝南燕與藩臣不軌唐淄青節度者各一姓而已而又莫不喘息釜中幸亂茍安僅為嵗月崛強之計王師壓境遽即丹夷所謂昔日形勢果何在也以至漢晉隋唐之季天下盜起如蝟南北五季之際中原禍亂沈酣姦雄投隙莫甚于此時矣而全齊之地蔑爾無聞又何其荒涼削弱之甚也夫土壤腴瘠山川夷險今古不殊而前後強弱相戾若此何哉既而考厯代户口登耗與夫城邑修廢郡縣增損離合之制然後知青齊之地一盛一衰蓋有自而來方姬周之季有齊垂九百年斯民久獲休息而為之上者經制緝理又皆得其道惟太公克慎厥始而桓公克振厥中威王又克成厥終三后奮功全底于治斯民浸以藩息鑿斯池築斯城深耕易耨日以赴功而齊國赫赫稱強伯矣當時齊地不下七十城而臨淄一城已有丁男二十一萬觸類而長則他城可知故蘇秦稱齊人連袵成帷揮汗成雨蓋言蕃庶之甚也嘗考西漢之時全齊之地有二百三十餘縣民户不下二百萬大率當天下之十二蓋其去田氏為未逺也故知春秋戰國楚漢之時齊地獨稱強伯不為過矣爰自新莽之亂山東盜起而青徐首難暨光武中興削平中土而齊實為殿故地已丘墟戶口凋耗建武之初縣邑并省幾半涵養二百年而民户不踰百萬重以黃巾之亂海岱騷然全齊之民舉如羣盜拏賊數載殺傷困重而歸降曺公者猶百三十餘萬人籍其勇鋭者為兵餘皆漂流失所自是齊地空矣魏晉之際休息六十年而民户才盈十萬舉全齊之民僅能當戰國臨淄一城之衆既而又遭永寧之後王彌騁亂殺戮如刈瀕海困重雖有州郡之名幾為空地自是而後東國汨焉不振勢亦宜也由是觀之天下國家之輕重特在民户登耗何如茍人物蕃庶則鹵莽為膏腴隳廢為金湯丘墟為甍棟荒圮為桑麻狼號鬼哭之地為雞犬相聞牛羊羣牧之鄉而赫然盛強矣乃若人民凋耗莫克有為雖雍州之上腴蜀土之險阻東國之纎巧河朔之強悍將安設施哉斯率土之濵莫不皆然豈惟青齊之地古今盛衰有足詫也抑嘗譬之土地其軀幹人民其精魄也精魄去矣軀幹猶存其何用哉彼有爭地以戰殺人盈野是猶舍精魄而爭其軀幹豈可謂知務也哉論韓魏河南豫州之地平夷洞逹九有一轂八面受敵之場也而戰國之時韓魏以區區陋邦北縈南齊環繞數千里界於秦楚齊趙四大國之間無再會不受敵而虎狼之秦搏噬尤亟其勢可謂危矣而終能雞唱荷戈月沉擊柝繼世相承為二百年之戰國及與齊楚皆亡夫以二百年韓魏之君豈皆賢哉咸能不失疆土則以生於憂患故耳下至李唐之亂梁王朱溫亦割據河南濳窺唐室天下環起而攻之腹背首尾舉為敵國而溫轉戰萬里出入十年亦能劫據中原以傾唐祚然後知無山河之恃者所以固疆埸之防無守禦之志者所以啓開拓之心天下之勢固有不安之安不固之固存焉在王者處之何如耳論淮蔡河南之地天下之中其生民稟中和性安舒逸豫而不能為亂故古名其州為豫自秦漢以還天下有變常為兵衝而其民不工戰鬭大抵易為勘定王師甫至則簞食交迎雖有姦雄不能割據豈非習俗和平不能為亂故耶爰自李唐中葉而後兩河淆亂李忠臣節度淮西統其下暴掠以啓衆心而蔡人始樂為不軌忠臣既敗李希烈承之益逞由是申蔡之人縱亂如歸吳少誠繼世遂以跋扈淮西之民習久為常但知為賊之利不復知有逆順之理及王師壓境則城自為守人自為戰父子相視死不為悔其鉗亂錮禍乃與羌夷無異故唐朝環天下兵以事三州厯三世五將五十餘年僅乃克之顧其人如此則所謂昔人安舒逸豫之性果何在也嗟乎河南之地自古名為豫州而習俗之弊乃至甚于幽燕慘殺之氣而况不為豫者乎為人上而以風俗為任者其可不戒哉論汴梁酈食其荀文若之徒皆稱陳留為天下之衝四通五逹之郊蓋言其平夷洞逹而坐九圍之中也故從古盟會戰爭此地尤亟傳稱夏禹有鈞臺之亭今陽翟縣京西三百里有鈞臺陂春秋齊桓公會諸侯于葵丘今雍丘縣京東七里有葵丘聚吳晉爭戰於黃池即今之封丘縣也京北六十里晉文公會諸侯於踐土即今之滎陽也京西北百六十里晉敗楚師於鄢陵即今之鄢陵縣也京東南百六十里楚敗晉師于邲即今之管城縣也京西百四十里袁曹相持于官渡在今之中牟縣北京西七十里劉項畫界于鴻溝在今之滎陽縣西京西百九十里祖逖鎮雍丘而黃河以南盡為漢有即今之雍丘縣也南北朝力爭河南而滑臺兼為重鎮即今之白馬縣也京北二百里若此之類前史班班未易殫舉則荀酈之言為不誣矣故秦漢以還訖于南北朝天下有變常為兵衝四面搏擊莽為戰場王伯之興未有都于汴者蓋憚其四通五逹而無險可恃也爰自隋煬帝大開汴河直逹淮泗而大梁實坐要會扼南北水陸之衝形勢百倍既焉李唐中僨奄山東百州大梁屹為重鎮逮黃巢逆亂中原分擾梁高祖僭窺唐室遂據汴地以為根本既而征伐四克卒拓中原自後常為帝居迤于宋朝勃興卜都仍舊開寶九年三月駕幸西京有事于南郊遂有留都之意議者謂東京汴渠引漕東南宿衛百萬實所仰給帑藏軍兵皆在樞握本不可搖即日下詔東還嗚呼古先哲王所以更都三河之間者蓋務求水陸便利之鄉所以便國用而紓民力也嘗考堯都平陽命夏禹治水每一州所至必導決川流直通於河以達平陽皆所以便諸侯之職貢也宋祖之興混一宇內而猶都大梁誠得唐堯之遺志焉論睢陽保障江淮春秋以還議者紛紛莫不以名城要害之為尚謂天下國家藩籬舉在於此而不知險非人不守人無險不固險在于人而不在于城也何則睢陽之城自春秋有之厯秦漢魏晉暨於南北朝其間中原變故多矣初未聞其為要害之地及祿山反陷沒兩京威熖赫然而張巡許逺持孤旅扼危城困十萬之衆於一埤之下俾江淮克全中興實賴以濟則所謂要害者果在于睢陽乎抑亦有賴于巡逺也泛觀前史所謂要害大率得人則重失人則輕蕞爾危城屹為重鎮者無世無之如盱眙玉璧鍾離宛丘諸侯自秦漢以還皆蔑然無聞及魏太武南渡長驅江淮江北塵潰南朝大振而臧質乃固守旴眙宋朝泗州西魏之初齊神武掃國西下氣吞關陜而韋孝寬乃固守玉璧故城在宋朝絳州稷山縣西蕭梁之初元英提山東數十萬衆乘勝而南江淮震駭而昌義之乃以三千兵固守鍾離宋朝濠州李唐之季黃巢訌亂剽擊萬里宇內瓦裂而趙犨乃固守宛丘宋朝陳州皆能挫鋭摧敵收不世之功則四城之要害為何如以至隗嚻保冀李憲阻舒吳守須濡塢魏爭滑臺城吳大義竊咸陽王武俊僭真定或攻之連年而不下或討之再世而不賔或環天下兵束之而無功或數十百年爭之而不已自當時觀之宜若險夷鞏固之甚真所謂名城要害者而前此未有聞也後此不復有聞也故知地利無常惟人所制吾險不足恃敵險不足畏茍得其人函關雖大拳泥可封也茍失其人黃河雖廣一葦可航也故善設險者擇良將善守城者固民心城不下雖雲屯百萬其孰能乘之哉嗟乎前史班班議論要險守禦之術多矣莫不據一時成敗而言非可為萬世通論也得其要者孟軻氏而已鑿斯池也築斯城也與民守之效死勿去此則萬世不易之要害也若張巡許逺之徒豈非所謂與民守之效死而不去者乎愚感巡逺睢陽之事故備論於此而人事地利之分庶可見矣論河朔甚矣亂離之勢不可以久而興復之功不可以緩也蓋常人之情駭于驟見而狃于常聞作於始而怠於終方其禍亂之初天下之人駭然而奮雖匹夫匹婦莫不有忠義奮激之心則姦雄之徒劫以從亂也難及其久也天下之人習亂為常因循顧望之心生而忠義敢為之氣阻則姦雄之徒劫以從亂也易及其又久也天下之人蕩而忘反耆舊既沒而少壯生長亂離視犯順逆節之事以為當然則操戈為仇者唯知各為其主矣於是有一危而不可復安一亂而不可復理厯觀前古例有此弊而李唐河北之禍尤為昭然方安史首亂兩京淪沒宇內大震唐祚不絶僅若綴旒而肅宗匹馬北方提孤軍橫摶強敵不數年間遂清大憝者蓋民心未變因而取之易以成功故也及代宗瓜分河朔付諸叛將涵養二十年間羣起而肆逆則雖窮天下兵纍世爭之終不能克蓋民心已變則難以成功故耳切觀貞元之初朱滔召燕人以叛號于衆者三皆不應遂劫之以前既乃大譟而還滔誅戮數百人然後定則知河朔之人本無負唐之心不幸因循以至此耳且以德宗之初去天寶之亂幾三十年矣而河朔之民猶未始忘唐者豈不以太平之老猶在而斯民猶有所聞故邪逮四十五年之後耆舊既沒少壯生長離散不復知有太平涵養之恩於是狼心始逞而不可誰何矣愚故曰亂離之勢不可以久而興復之功不可以緩者此也統論河西杜氏通典言唐之土宇南北如漢之盛時東不及而西則過之唐史取其説以序地理志此蓋開元天寶時事也然愚嘗考之河西在漢本胸奴休屠所居武帝始取其地置郡縣自東漢以來民物富庶與中州不殊竇融張軌乘時多難保有其地融值光武中興亟歸版圖而軌遂割據纍世其後又有吕光禿髮沮渠之徒迭據其土小者稱王大者僭號蓋其地勢險僻可以自保於一隅貨賄殷富可以無求于中土故五涼相繼夷夏不同而其所以為國者經制文物俱能放效中華與氐羌角立中州人士之避難流徙者多往依之蓋其風土可樂如此唐天寶以後河西隴右沒於吐蕃大中雖復河湟而名存實亡流傳五代以及于宋而河隴為西夏所據元昊倔強搆逆兵勢甚鋭竭天下之力不能少挫其鋒然至絶其嵗賜互市則不免衣皮食酪幾不能為國是以亟亟屈服蓋河西之地自唐中葉以後一淪異域頓化為荒莽沙漠之區無復昔之殷富繁華矣唐自安史之亂西北土地皆不能如舊然北方如盧龍滄景雖世為強藩所據自據其兵賦而奉正朔請旌莭猶唐之臣也風聲氣習文物禮樂猶承平之舊也獨西陲淪於吐蕃祖宗功德所昭垂盡沒于委靡不振之氣遂使數百年間不能自拔雖驍悍如元昊所有土地過于五涼五涼止有河西五郡無靈夏然不過與諸蕃部落雜處于旱海不毛之地兵革之犀利財貨之殷富俱不能如曩時是以北事遼南事宋僅足以自存然則涼州之地自亂而至治始於漢而殷富者數百年自治而復至亂始於唐而搶攘者復數百年謂唐之土地西過於漢者非要終之論也荆揚統論三國之季吳主孫皓自建鄴遡流移都武昌而土地埆塉民間苦之當時謠曰寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居誠以地薄而民窮也據禹貢荆州厥土塗泥厥田下中而武昌乃荆州之壤即宋朝之鄂州是鄂州之塉振古則然矣然而李唐長慶中崔郾為觀察治陜以寬繼治鄂更以嚴或問其故曰陜土瘠而民勞吾撫之不暇鄂土沃而民剽非用威莫治也夫陜郡古雍州之界厥土黃壤厥田上上而鄂土比之猶且為沃則土腴可知矣彼唐堯以來至于三國之季二千五百餘年矣鄂土之塉自若也孫皓而下至于崔郾之時才五百五十年矣而土壤腴塉若此其不侔何哉蓋三代以前東南荒涼為甚春秋而下又為吳楚之境兩漢之際未經輯理自吳主孫權以來始倚武昌為重更三國東晉西晉南朝之時常為重鎮舟車所湊人物聚焉積壤流膏耕鑿滋利嵗時浸久遂為沃壤則亦宜然也雖自東漢以還東南民物漸以蕃息至于隋唐宋朝大為豐美人力既備皆為沃壤方之往古全不相侔固非特鄂土為然也按禹貢揚州厥田下下是東南之地天下最塉薄者也而隋志乃稱江浙之間川澤衍沃有陸海之饒與古相反如此豈不以兩晉南朝之時人力有致于此耶嘗觀漢武帝時趙過能為代田比他畝倍收固非土地有腴塉而人力有勤怠也特謀畫有工拙耳振古中原之地種植所加盡為沃壤者詎皆其質然哉抑由厯代帝王所都朝覲會同九有輻輳百巧所聚萬貨所通人力修而地利盡故也及漢魏以還天下有變常首難于西北則衣冠伎巧轉而南渡四方習俗所利舉萃東南農桑工賈由盡其便人物之繁與京華無異而土壤亦從而沃矣加之亂離少弭上下浸安井里環萃以糞其田雞豚畜之牛羊牧之荆棘芟而草萊闢種植時而灌溉利雖欲不為沃壤得乎哉且以有隋盛時總江浙閩中不盈三十萬户則人力之不寧幾何自唐朝以來浸以休息更五代至于宋朝增至五百餘萬户州縣郡鎮整焉相望則其陸海之名益不虛矣故知今之東南全非昔之東南若欲議東南之實必舍古之名然後可也統論江淮襄陽巴蜀自京口而至秣陵控帶荆揚引輔江湖咫尺淮甸應接梁宋人皆知其為長江之險也自武昌而至于江陵東通吳會西連巴蜀南極湖襄北控關洛人皆知其為荆湖之險也自涪陵而極於成都土地險塞沃野千里控渝扼瀘聫接關隴人皆知其為巴蜀之險也然知有長江之勢而不知所以為守淮之計則非知江之險者也徒知有荆湖之勢而不知所以為襄漢之計則非知荆湖之險者也徒知有巴蜀之勢而不知所以為漢中之備則非知巴蜀之險者也蓋長淮所以為江浙之藩籬襄漢所以為荆湖之脣齒漢中又所以為巴蜀之門户陳宣帝失淮甸之地而致隋人之禍南唐罷把淺之師而啓周師之釁蓋棄淮而守江則江左亦難以自立矣吳人不得襄陽杜預得以成江陵之捷苻秦會師淮北而朱序必欲以嚴城中之守蓋棄襄陽而守荆湖則荆湖必不能以自固矣曹操既破漢中故蜀人皆無自固之志薑維退保漢樂二城故鍾會如履無人之域蓋棄漢中則巴蜀必不能自存矣惟守江以為門戶備淮以為藩籬則長江之險可得而保也以荆湖為重鎮以襄陽為脣齒則荆湖之險可得而固也以巴蜀為要害以漢中為門户則巴蜀之險可得而有也晉人能守合肥夀陽以為重地故劉石終不能踰淮以圖晉陶侃使桓宣以鎮襄陽故趙人不能越漢沔以取荆蜀以魏延鎮漢中故魏人不敢踰南鄭以謀蜀合厯代之得失而並觀之則荆襄江淮蜀漢之相為用其效可觀矣昔祖逖自淮隂進兵以復河南到彥之自漢入泗以平司兖則在淮之形勢為可用也桓溫自江陵以趨霸上栁元景自襄陽以克潼關則在荆襄之形勢為可用也漢高祖自南鄭以克三秦諸葛孔明自漢中以鎮關隴則漢中之形勢為可用也為今之計自淮泗以搗青徐自夀春以取汝潁取財于蜀合軍于陜以遏河隴出師襄陽困糧唐鄧以趨京洛則天下之大勢一矣論江淮江淮之險天地所以限南北也而長淮之地又天地所以蔽長江也昔立國于南則守江以為家户備淮以為藩籬是故輕重之權不在江而在淮知有江而不知有淮是未知有重險者也夫江東西東極于海上流江陵歸峽則襄陽隨郢為之藩蔽中流武昌九江則舒蘄光黃為之藩蔽下流建康京口則真陽楚泗廬夀為之藩蔽昔三國時吳不得淮南至晉太康兵出廣陵夀春而吳亡東晉經劉石苻姚之亂長淮以南一彼一此而合淝夀陽淮隂常為晉氏鎮守至陳宣帝始盡失淮南之地其後賀若弼等自揚廬渡采石京口而陳亡南唐罷把淺之師夀春失守而江北之地遂入于周此淮南之得失繫江左之安危也今自淮而東以楚泗廣陵為之表則京口秣陵得以蔽遮自淮而西以夀廬厯陽為之表則建康姑熟得以襟帶江西之鎮莫重于潯陽而舒蘄者潯陽之表也湖北之鎮莫重于武昌而齊安者實武昌之表也愚觀三國六朝之間爭戰攻守嘗從事于此矣恨其未知所以用之也吳氏自孫䇿駐足江東而於淮之地則又有廬江之守故魏氏雖竊取中土而不能以得吳世率以為守淮之利足以蔽長江也而不知用淮之利以圖取江東此吳氏之失也劉宋自劉裕立國於建鄴而於淮之地則有盱眙之蔽故元魏雖有虎視之意而終不能窺宋世率以為守淮之地足以蔽長江而不知用淮之利以爭中原此劉宋之失也蕭梁自武帝立國於江左雖與元魏交爭於兩淮之間互有勝負而鍾離之守元英退縮斂袵而不敢爭世之議者又以為淮右之勢誠足以禦敵人之衝也而不知用淮以為恢拓之計則其失殆與孫吳劉氏等耳愚考之孫權踵孫䇿之遺緒而無爭衝攻取之才觀孫䇿晚嵗囑咐之語止以自保之能許之而魯肅帷幄之謀亦止於保守江東之計故廬江之地吕蒙雖守之而合淝之役一為張遼所敗遂終身不敢以窺魏此長淮之地在吳而吳不能用也宋文帝紹劉裕之遺業雖有爭戰之意而無規恢之大志觀王玄謨之徒率師進取以經略中原而止欲圖河洛之地劉興祖徑取河北之䇿則置而不論故臧質盱眙之守僅免敗缺竟未足多而元嘉之政從是不振卒不能挫元魏虎狼之勢此長淮之地雖在劉宋而劉宋不能用也蕭梁自武帝創有基業初年英武似亦可嘉然自其既有天下之後志氣凋落無復囊括宇宙之志雖席鍾離天險之勢而略不能用險以挫北敵之鋒元澄之圍鍾離雖以失利而自退元英之圍鍾離雖以韋獻之救而自解不過僅僅自守耳此長淮之地在梁而梁不能用也宋邉之東有淮陰盱眙西有鍾離蘄春西北自襄陽抵樊城自丹陽而抵廣陵自廣陵而抵淮陰自淮陰而抵盱眙此全淮之右臂也自采石而抵厯陽自厯陽而抵鍾離自鍾離而抵蘄春此全淮之左臂也自武昌齊安而逹信陽自江陵而至襄陽此漢沔之關梁也故淮陰盱眙之城固則自淮而東可以無患鍾離之城固則自淮而西可以獲全至于信陽樊城之壘全則漢沔以南無敵虞矣雖然豈特自固而已哉王羲之與殷浩書曰保淮之志非復所及莫若還守長江羲之勸浩因長江以保大業此言是也至謂捨淮而守江豈不謬哉論荆襄昔諸葛亮勸劉備取蜀結吳跨有荆益周瑜亦勸孫權分以荆州資劉備以發兵爭蜀還據襄陽以蹙曺操北方可圖也由是觀之坐制吳楚通西蜀而守襄陽英雄之資而帝王之業也昔荀彧説曺操則曰先取河北南臨荆州諸葛説備曰跨有益州魯肅説孫權曰荆州與國鄰接據而有之天下可定及曺操破荆州順江東下則遣周瑜逆之劉備領荆州牧則躬擐甲胄與魯肅吕蒙陸遜輩數十年間以死據戰而荆州卒為吳有魏不復南渡蜀不敢南下者以不失上流之勢也此豈非荆州之形勢乎孫權初有江南而周瑜吕蒙勸權取襄陽以抗曺操晉羊祜滅吳果自襄陽始桓溫之領荆州也決䇿北征自江陵通襄陽直抵關中進至灞上而還栁元景自襄陽率諸軍據潼關戰于陜下南國之威少振焉苻堅乘陷蜀之勢興兵冦襄陽則江表之勢固可憂矣此豈非襄陽之形勢乎嘗聞吳紀陟之言曰自西陵至江都五千七百里疆界雖逺而險要必爭之地不過數四猶人有六尺之軀其護風寒亦數處爾如此則上流所備可得而言矣夫荆湖之地為州者十而其鎮則江陵武昌是也京西道為州者八而其鎮則襄陽是也江西道為州者十而其鎮則九江是也凡畫野分土必據其津塗而扼其喉襟今所謂險要必爭之地不過江陵武昌襄陽九江是己何以明之江水源于岷山下夔峽而抵荆楚則江陵為之都會故諸葛亮謂荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國也嶓冢導漾東流為漢漢沔之上則襄陽為之都會故庾翼謂襄陽西接益梁與關隴咫尺北去河洛不盈千里方域險峻土沃田良水路通流轉運無滯進可以掃蕩秦趙退可以保據上流故也沅湘衆水合洞庭之波而輸之江則武昌為都會故吳常都於此而東晉宋齊梁陳之際號稱盛府者此也豫章西江與鄱陽之浸浩瀚吞納而匯於湓口則九江為之都會晉人謂潯陽北撫羣蠻西運荆郢亦藩屏之要地以此守江陵則可以開蜀道守襄陽則可以控川陜守武昌九江則可以蔽全吳夫蜀漢吳楚併而為一則東海之守亦固矣兩廣統論漢魏以還守官廣南者多以貪墨坐激利民之變啓蠻獠之冦實由于此蓋古今之同患也抑嘗考其故嬴秦以來以守令為治臺省銓除莫不以內地為重以邊逺為輕而廣南之地去京華為尤逺瘴癘蠱毒種種穢惡內地之人南轅越嶺不啻斥逐必罪戾孱庸不得已然後膺其選既百舍登途往返重費不過厚取於民耳而又地産珍奇掌握之物足當數世疆域曠邈按察稀臨京闕萬里赴訴莫及則無聊汩沒之人何憚而不為賄乎厯古交廣之間民獠多叛致騷擾江淮震駭朝省職由此也嘗觀漢順帝永和中日南象林羣蠻並反四府議發江淮甲卒致討李固駁之以為前尹就討益州叛羌蜀人諺曰羌來尚可尹來殺我乃召還以兵付刺史張喬旬月之間冦虜殄敗宜精選牧守以安殊俗乃以喬刺史交州祝良為九真守喬至開示慰諭並皆降散良單車入賊中降者數萬人皆為良築起府寺由是嶺表無虞至靈帝中平中屯兵作亂嶺南大擾三府乃精選賈琮為刺史琮至蠲復徭役選良吏謹守諸縣逺近翕然巷路為之歌曰賈父來晚使我先反今見清平吏不敢叛自後嶺表之民又獲安堵審顧張喬祝良賈琮之事而人情可見矣然則嶺南厯世多亂豈皆蠻獠之罪抑當時朝廷制置失宜矣嗟乎監司守令九重之指臂也所以撫育斯民全賴良吏其休息安危莫不由之又可易其選耶內地之民伊邇闕庭監司往來如織號令所宣閭閻必達借使守令或非其人寃抑易訴詣監司而不獲則裹糧走闕下耳是內地親民之吏猶可非其人也至嶺表則不然逺者去京華萬里終嵗道塗僅能一詣闕庭而又荒陬絶域程驛邈焉監司不能周及守令茍非其人則寃民無由申訴屈抑既甚則其勢將必為亂是逺地親民之吏不可非其人也而厯代銓除反以內地為重以邊方為輕是何倒置之甚哉切觀宋朝開寶中太祖命錢文敏知瀘州召見講武殿謂文敏曰瀘州最近蠻獠尤宜撫綏聞知州郭思齊監軍郭重遷掊斂其民恃其遐逺謂朝廷不知爾至為朕鞠之茍一毫剝民朕不以逺赦夫瀘州去京師四千一百里可謂逺矣而官吏貪墨宋祖盡知之雖僻逺小郡凡差守臣必親自處分其謹慎如此則邉民安得不理蠻獠自何而叛措方內太平之盛東南一尉西北一候端有餘矣嗚呼兩廣四十州之地皆宋朝瀘州之地其選任守臣可不戒哉百粵總論秦并百郡嶺南有三郡桂林今廣西地南海今廣東地象郡今安南地也夫自秦漢以來所以為中國害者北曰胸奴南曰越然胸奴之勢與南越不同西北之國皆居中國邊塞之外有所限制則彼不得越其界而入我內地也惟越之地在古種類實多故有百越之名曰南越曰甌越曰閩越曰東越曰於越其地非一處其人非一種然自秦漢以來所謂於越東越甌越之類皆已久入中國與齊魯宋衛無異惟所謂南越者其地西連湖湘直抵滇貴越之境山深而地險猶有不盡歸王化者時時為郡邑居民害蓋今日湖南北廣東西其郡邑皆錯列山嶺之間與蠻夷雜居但有險易之異耳時或竊發難於備禦非若西北邉塞之有限隔也聞閩越今福建地其入職方已久非復漢時舊矣然劉晏所言南方濕毒兵入其地不待兵刃先自病死與夫兵至則濳藏兵退則復聚持久則士卒疲倦民苦兵事今日湖南廣右雲貴其山箐之瘴癘苖獠之情狀省民之受害實與漢時無異也明主在上以天地為量以宇宙為境遇有逺人梗化則如晏言以方寸之印丈二之組鎮撫方外不勞一卒不煩一戟而威德並行以一使之任代千萬之師毋使中國之民懼蝮蛇猛獸之毒染嘔泄霍亂之病親老涕泣孤子啼號迎尸千里之外棄骨無人之境如晏所慮者非獨逺夷之幸實中國之幸也圖書編卷三十四
