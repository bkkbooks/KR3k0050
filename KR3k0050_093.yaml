body:
  text: 圖書編卷九十三明章潢撰禮曹總敘明則有禮樂幽則有鬼神春官宗伯掌建邦之五禮實兼幽明之道也故吉禮所以仁鬼神也凶禮所以仁死喪也賔禮所以仁邦國也軍禮仁師田封役大均也嘉禮仁邦國萬民而親之也春仁德也記曰宗伯之官以成仁不其合天地人鬼而一歸之仁乎歷代官名職掌不齊我朝設禮部尚書即周春官大宗伯卿也侍郎小宗伯也四司儀制祠祭主客精膳皆其屬也凡郊廟社稷朝貢燕饗厯法樂律冠婚喪祭學校之教賔興之舉與夫醫卜佛道番夷重譯一切等威名數皆其所掌雖外有太常鴻臚為之分職而禮曹實總之周官大司徒大樂正此其兼之矣夫天之仁天下也以春故隂陽和而萬物遂春官之仁天下也以禮故神人洽而萬國寧仁豈易言哉孔子曰仁者人也曰人者天地之心又曰人而不仁如禮樂何周禮大宗伯以天産作隂德以中禮防之以地産作陽德以和樂防之以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物孰非仁以為之本哉可見萬物夥矣必生之以春萬民衆矣必教之以仁職掌雖煩其本則一必如此而後可以配乎天之春也否則禮樂皆虛文欲以事天享帝親萬民也難矣是故論宗伯之職莫要於仁民論端本之教莫先於仁身以立其本仁民以敷其教禮樂鬼神一以貫之矣本朝聖制洪武二年六月上讀叔孫通傳至兩生不肯行因謂侍臣曰叔孫通雖云竊禮樂之粳粃然創制禮儀於煨燼之餘以成一代之制亦可謂難矣如兩生之言不無迂耶若禮樂必待百年而後可興當時朝廷之禮廢矣朕聞先王之禮因宜孔子曰期年三月必世亦因時制宜之謂若謂必待百年則誠迂矣八月禮部尚書陶凱等言古者人臣進膳日舉一樂今擬舉行上曰古之帝王德隆治洽熙然太和日一舉樂似未為過今天下雖定人民未蘇北征將士尚在暴露朕宵旰憂勤之不暇而可自為逸樂哉寢之洪武四年六月命吏部尚書陶凱製宴享九奏樂章成上之一曰本大初二曰仰大明三曰民生初四曰品物亨五曰御六龍六曰泰階平七曰君德成八曰聖道成九曰樂清寧上命協音律者歌之謂侍臣曰禮以道敬樂以宣和不敬不和何以為治元時古樂俱廢惟淫詞艷曲更唱迭和又使外國之聲與正音相雜甚者以古先帝王祀典神祗飾為舞隊諧戲殿廷殊非所以道中和崇治體也今所製樂音頗協音律有和平廣大之意自今一切流俗喧譊淫褻之樂悉屏去之洪武十七年六月上御奉天門諭羣臣曰治天下之道禮樂二者而已若通於禮而不通於樂非所以淑人心而通治道達於樂而不達於禮非所以振綱紀而立大中必禮樂並行然後治化醇一或者曰有禮樂不可無刑政朕觀刑政二者不過輔禮樂為治耳茍為治徒務刑政而遺禮樂在上者雖有威嚴之政必無和平之美在下者雖有茍免之心終無格非之誠大抵禮樂者治平之膏粱刑政者救弊之藥石卿等於政事間宜知此意毋徒以禮樂為虛文也子曰人而不仁如禮何人而不仁如樂何遊氏曰人而不仁則人心亡矣其如禮樂何哉言雖欲用之而禮樂不為之用也子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉敬而將之以玉帛則為禮和而發之以鐘鼓則為樂遺其本而専事其末則豈禮樂之謂哉周禮大司徒以五禮防萬民之偽而教之中以六樂防萬民之情而教之和大宗伯以天産作隂德以中禮防之以地産作陽德以和樂防之以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物樂記曰禮樂皆得謂之德德者得也是故樂之隆非極音也食饗之禮非致味也清廟之瑟朱弦而疏越一唱而三歎有遺音者矣大饗之禮尚玄酒而爼腥魚大羮不和有遺味者矣是故先王之制禮樂也非以極耳目口腹之欲也將以教民平好惡而反人道之正也大樂必易大禮必簡樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也故事與時並名與功偕故鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋爼豆制度文章禮之器也升降上下周旋裼襲禮之文也故知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也孝經子曰移風易俗莫善於樂安上治民莫善於禮禮者敬而已矣故敬其父則子恱敬其兄則弟恱敬其君則臣悅敬一人而千萬人恱所敬者寡而恱者衆此之謂要道也漢書禮樂志曰六經之道同歸禮樂之用為急説者因班固此言謂易以道禮樂之原書以道禮樂之實詩以道禮樂之志春秋以道禮樂之分歐陽修曰三代而上治出於一而禮樂達於天下三代而下治出於二而禮樂為虛名周子曰禮理也樂和也隂陽理而後和君君臣臣父父子子夫夫婦婦萬物各得其理然後和故禮先而樂後山谷黃氏曰禮樂者聖人所以節文仁義至於大成者也修之身立於天下一法也一物也樂由天作禮以地制夫範圍天地非聖人孰能之惟聖人能遂萬物之宜通天下之志萬物皆得宜禮之實也天下皆得志樂之實也董生王吉劉向所論蓋欲用先王之禮樂宜於世者以教化民此與聖人之言不悖孔子所論孟公綽卞莊子之徒蓋或過或不及非以禮樂節文之則不可以為成人如孟子所論合矣聖人者知人之根本材器故其用禮樂也知變成之道與天地同流故鐘鼓之間而與天地同和爼豆之間而與天地同節後世不本之心術故肝膽楚越也而况於禮樂乎程子曰禮樂大矣然於進退之間已得性情之正五峯胡氏曰等級至嚴也失禮樂則不威山河至險也失禮樂則不固禮乎樂乎天下所日用不可以造次顛沛廢焉者乎北溪陳氏曰禮樂不是判然兩物不相干涉禮只是箇序樂只是箇和才有序便順而和失序便乖戾而不和如父子君臣夫婦兄弟所以相戕相賊相怨相仇如彼其不和者都緣先無箇父子君臣夫婦兄弟之禮無親義序别便如此北溪陳氏曰禮樂有本有文禮只是中樂只是和中和是禮樂之本然本與文二者不可闕一禮之文如爼豆玉帛之類樂之文如聲音節奏之類是有這中和而文以玉帛爼豆與聲音節奏方成禮樂禮樂須就心上論禮只是箇恭敬底意樂只是箇和樂底意本是裏靣有此敬與和底意然此意何自而見須於賔客祭祀時將之以玉帛寓之於籩豆播之於聲音節奏間如此則內外本末相副方成禮樂禮樂無所不在所謂明則有禮樂幽則有鬼神如何離得如盜賊至無道亦須上下有統屬此便是禮底意才有統屬便自相聽從相睦這便是樂底意又如行路人兩箇同行才存箇長少次序長先少後便相和順而無爭其所以有爭鬭之心皆緣是無箇少長之序先自亂了安得有和順底意人徒見升降裼襲有類乎美觀鏗鏗節奏有近乎末節以為禮樂若無益於人者抑不知釋回增美皆由於禮器之大備而好善聽過皆本於樂節之素明禮以治躬則莊敬不期而自肅樂以治心則鄙詐不期而自消蓋接於視聽者所以養其耳目而非以娛其耳目形於舞蹈者所以導其血氣而非以亂其血氣則禮樂之用可知矣西山真氏曰敬者禮之本制度威儀者禮之文和者樂之本鐘鼓管磬者樂之文禮樂二者闕一不可記曰樂由陽來禮由隂作天髙地下萬物𣪚殊而禮制行焉天尊於上地卑於下萬物散殊有大有小此即制之所由起蓋禮主乎别故也流而不息合同而化而樂興焉隂陽二氣流行於天地之間未嘗止息二氣合而化生萬物此樂之所由興蓋樂主和故也所謂隂陽二氣者日月雷霆風雨寒暑之類皆是二氣和合方能生成萬物故禮屬隂凡天地間道理一定而不可易者皆屬隂樂屬陽凡天地間流行運轉者皆屬陽禮樂之不可闕一如隂陽之不可偏勝一嵗之間寒暑之相易雨露霜雪之相濟方能氣候和平物遂其生陽太勝則亢而為旱隂太勝則濫而為水有隂無陽則物不生有陽無隂則生不成禮勝則離以其太嚴而不通乎人情故離而難合樂勝則流以其太和而無所限節則流蕩忘返所以有禮須用有樂有樂須用有禮此禮樂且是就性情上説然精粗本末亦初無二理禮中有樂言嚴肅之中有自然之和此即是禮中之樂樂中有禮言和樂之中有自然之節此即是樂中之禮朱文公謂嚴而泰此即禮中有樂和而節此即樂中有禮禮樂總論禮樂切身斯須不可離也斯須離之則耳目瞶毦視聽失職手足痿痺痛癢不相關矣禮樂可以斯須離之哉嘗誦孔子禮云之言固知玉帛鐘鼓不足以盡禮樂欲求其所謂本焉不可得也因會通人而不仁其如禮樂何始豁然省焉仁即其本矣乎仁則禮樂不待外求隨其儀度之交錯莫非至敬之文而觸目皆玄黃也隨其聲音之鏗鏘莫非太和之響而盈耳皆笙簧也有本焉故也否則不仁已非人矣雖有玉帛鐘鼓而虎皮羊質瓦缶雷鳴禮樂云乎哉蓋人之為人而與禽獸異者以其有禮樂之道也而人之所以為人者以其仁也試觀七尺之軀內而五臟六腑外而四肢百骸活潑潑地參兩儀而靈萬物者以其有此生理流通貫徹故血肉之軀皆活物也孔子曰仁者人也孟子曰仁人心也與生俱生與形俱形非仁而何惟以仁存其心焉則視聽言動協其則喜怒哀樂中其節作止語默合其宜脈絡貫通形神俱融而太和之氣充滿於一身矣無體之禮無聲之樂惟仁人能實有諸已所以不待三千三百為之等殺而身即為度也不待六律六吕為之節奏而聲即為律也仁豈離於須臾之頃耶斯人離也不獨一身為然凡君臣父子夫婦長幼朋友之倫莫非仁道之浹洽也故此身之所應接其分秩然其情藹然亦孰非禮樂以為之節宣哉然論禮樂者莫不曰天髙地下萬物散殊而禮制興焉流而不息合同而化而樂行焉盈天地間莫非禮樂人雖滿腔皆惻隱之心焉其如天地之禮樂何是又不識仁即天地生物之心物各得其理而和即天地之禮樂也况仁者天地萬物為一體一物失序即非禮也一物違和即非樂也此心其能忍乎哉充此不忍之心必欲理萬物之宜必欲通天下之志而大禮與天地同節大樂與天地同和非仁人其孰能之然亦非仁之外别有所謂禮與樂也禮即仁之條理樂即仁之和樂是也求仁者抑豈能斯須舍禮樂哉斯須不莊不敬不和不樂即非仁也故禮以固人肌膚之會筋骸之束也敢以為升降上下周旋裼襲皆禮之文也不盡心於禮乎歌詠可以養其性情舞蹈可以養其血脈也敢以為屈伸俯仰綴兆疾徐皆樂之文也不盡心於樂乎本之以仁而文之以禮樂則執持堅定蕩滌消融此即其熟仁之道矣茍遺其本而專事其文則不可禮樂合一總論周禮大宗伯掌五禮大司樂掌六樂小宗伯而下如司命司服等十九官皆禮官之聮樂師而下如大師大胥等十九官皆樂官之聮則是禮樂之職分矣然禮樂未嘗分也盍求之古人制禮作樂之本乎大司徒曰以五禮防萬民之偽而教之中以六樂防萬民之情而教之和大宗伯曰以天産作隂德以中禮防之以地産作陽德以和樂防之夫禮樂固所以防民者也而司徒宗伯之所掌皆同謂之中和何邪蓋嘗觀子思子之言中和矣喜怒哀樂之未發謂之中性之正也發而皆中節謂之和情之正也中者天下之大本天下之理皆由此出道之體也和者天下之達道天下古今之所共由道之用也致其中之至者則體立致其和之至者則用行而天地位萬物育矣此子思子之言中和也然而喜怒哀樂不能不發發而不能皆中節是以不能無望於隄防之功是故大宗伯以民物得於天之所産者本屬陽以其沖漠無眹隂之靜也故其德為隂此乃未發之時寂然不動者也故以中禮防之民物得於地之所産者本屬隂以其呈露畢見陽之動也故其德為陽此乃既發之時感而遂通者也故以和樂防之此二者因其自然之中和而隄防之使不流於情偽是宗伯有以導之於內而制之於外也大司徒以民之易離其中而流於偽則失其性之正故教以五禮而防其偽以存養其未發之中以民之易乖其和而流於情則失其情之正故教以六樂而防其情以省察其既發之和此二者遏其未流之情偽而隄防之使不失其中和是司徒有以制之於外而養之於內也蓋人生而靜天之性也感於物而動情之欲也如欲內外交制隄防而教導之舍禮樂何以哉中和者禮樂之本也五禮六樂者禮樂之文也舍中和之本無以為禮樂舍禮樂之文無以導中和故曰禮以導中樂以導和司徒以之而防民則大本立達道行宗伯以之而合天地之化萬物之産則天地位萬物育豈特事鬼神諧萬民致百物而已哉觀周官之禮樂不知有中和之本而徒求詳於玉帛鐘鼓之文未足與言禮樂矣禮總序禮者理也在天曰天理在地曰地理在人曰脈理在人倫曰倫理在木曰條理支分節解脈絡貫通至纎至悉秩然不淆此禮之所以嚴而明經而等曲而中也觀於天澤則天地自然之理了然於卑髙上下之陳聖人制為五禮豈能於自然之理加減毫末哉故曰親親之殺尊賢之等禮所生也禮固制自聖人實本乎天則雖其安上治民維持世教儀文度數森不可犯茍有一毫拂人情乖物軌何能使萬世常行而不易哉是故朝覲所以理上下也郊社所以理神祇也宗廟所以理昭穆也帝王聖廟所以理功德也學校賔興所以理賢才也冠婚喪祭所以理生死也鄉飲射士相見禮所以理賔友也以至宫室車旗之制衣裳冠冕之度樽爵爼豆之設進趨拜跽辭讓揖遜周旋曲折之節三百三千不可窮詰一皆人心同然之理自為之經曲隆殺也孰非天命之中乎聖王不過因人心之自然者為之制耳故定省抑搔噦咳欠伸何其煩也至敬無文乃見天則何其簡也真知禮者自一理達之萬殊而有壬有林莫非文理之散見自萬殊會之一本有倫有脊一皆至理之淵涵人徒見其聲名文物等列如此其盛抑知身容俯仰一循其脈理之不可亂者典禮之敦庸一循其倫理之不可紊制作至於經天緯地一循天地之理而無一毫矯強於其間也試反之心茍存焉有不能敬不能序不能節文不能别嫌明微以極其條理之詳者哉心茍不存則天理已泯縱作而致其恭而不由至誠惻怛以行之凡儀節皆虛文耳何怪以禮為偽也蓋禮以範俗威儀制度乃其所必有者朝廷有典章聖賢有成法在也於此特推其本與知禮之君子一商確之以共服膺乎克巳復禮之教云象曰上天下澤履君子以辨上下定民志上天下澤履天尊地卑乾坤定矣卑髙以陳貴賤位矣然以澤視天則尤下之下卑之卑者夫固天地自然之限制也君子觀履之象於以辨上下定民志夫民志何以不定由上下未辨不知履之所以為履在人本至卑至下也故上下無辨則紀綱不立凌逼不慎則僣亂易生焉因天澤自然之分制為典禮三千三百各有隆殺不相踰越為之君臣使天下貴役賤為之等殺使天下尊役卑為之節制使天下上役下舉紛然不可齊之衆一歸於截然不可亂之禮上者如天之不可以為澤下者如澤之不可以干天民見其上下懸絶若此則心志一定凡服食器用之間進退升降之際不敢僣踰蓋自有天澤以來未之改也記曰禮禁亂之所由生者此也噫是禮也君子所素履者也惟此志默順乎天則德愈盛禮愈恭而率履不越則民之所視者即此在矣可不慎歟五禮總敘自伏羲至黃帝五禮始具其唐堯則舜典云修五禮及命伯夷典三禮論語云商因於夏禮周因於商禮則夏商亦有五禮然王制云司徒修六禮以節民性明七教以興民德六禮者冠婚喪祭鄉相見也七教者父子兄弟夫婦君臣長幼朋友賔客也孔頴達之疏曰此六禮教皆商禮也周有五禮十二教焉由三代而上治出於一而禮樂達乎天下由三代而下治出於二而禮樂為虛名古者宫室車輿以為居衣裳冕辨以為服樽爵爼豆以為器金石絲竹以為樂以適郊廟以臨朝廷以事神而治民其嵗時聚會以為朝覲聘問歡欣交接以為射鄉時享合衆興事以為師田學校下至里閭田畝吉凶哀樂凡民之事莫不一出於禮由之以教其民為孝慈友弟忠信仁義者常不出於居處動作衣服飲食之間蓋其朝夕從事者無非在乎此也此所謂治出於一而禮樂達之天下使天下安習而行之不知所以遷善逺罪而成俗也及周之衰也道散於異政之國法忘於殊俗之家君子不得以行禮小人得以行非禮故兩觀大路朱干玉戚天子之禮在諸侯塞門反坫素衣朱襮諸侯之禮在大夫隨武子不知殽蒸孟僖子不知相禮范獻子不知問諱魯不知尚羔則當時之知禮者蓋亦鮮矣遭秦變古後之有天下者自天子百官名號位序國家制度宫車服器一切用秦間稍損益而大抵茍簡其朝夕從事則以簿書獄訟兵食為急曰此為政也所以治民至於三代禮樂具其名物而藏於有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出於二而禮樂為虛名故自漢以來史官所記事物名數降登揖遜拜俯伏興之節皆有司之事耳所謂禮之末節也然用之郊廟朝廷自縉紳大夫從事其間者皆莫能曉習而天下之人至於老死未嘗見也况欲識禮樂之盛曉然諭其意而被其教化以成俗乎嗚呼習其器而不知其意忘其本而僅存其末又不能備其所謂朝聘射鄉食享師田學校冠婚喪祭之禮在者能幾何哉五禮考大宗伯之職掌建邦之天神人鬼地祇之禮以佐王建保邦國以吉禮事邦國之鬼神示以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風伯雨師以血祭社稷五嶽以貍沈祭山林川澤以疈辜祭四方百物以肆獻祼享先王以饋食享先王以祀春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王以凶禮哀邦國之憂以喪禮哀死亡以荒禮哀凶札以弔禮哀禍災以禬禮哀圍敗以恤禮哀冦亂以賔禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同時聘曰問殷俯曰視以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也以嘉禮親萬民以飲食之禮親宗族兄弟以婚冠之禮親成男女以賔射之禮親故舊朋友以饗燕之禮親四方之賔客以脤膰之禮親兄弟之國以慶賀之禮親異姓之國小宗伯掌五禮之禁令與其用等辨廟祧之昭穆吉凶之五服車旗宫室之禁掌三族之别以辨親踈其正室皆謂之門子掌其政令春秋傳曰周內史過禮國之幹也敬禮之輿也不敬則禮不行則上下昏何以長世劉子曰君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤君子曰讓禮之主也世之治也君子尚能而讓其下小人農力以事其上是以上下有禮而讒慝黜逺由不爭也謂之懿德子貢曰夫禮死生存亡之體也將左右周旋俯仰於是乎取之朝祀喪戎於是乎觀之晉女叔齊曰禮所以守其國行其政令無失其民者也子太叔引子産之言以答趙簡子曰夫禮天之經也地之義也民之行也天地之經而民實則之則天之明因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎晏子曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也荀子曰人生而有欲欲而不得則不能無求求而無度量分界則不能不爭爭則亂亂則窮先王惡其亂也故制禮義以防之以養人之欲給人之求使欲必不求於物物不必屈於欲兩者相待而長也凡禮事生飾歡也送死飾哀也師旅飾威是百王之所同古今之所一也程頥曰學禮節文必求先王之意得意乃可以沿革禮之本出於民之情聖人因而道之耳禮之器出於民之俗聖人因而節文之耳張載曰禮者理也知禮則能制禮朱熹曰聖人有作須别有箇措置瑣細制度皆若具文且要理會大本大原按古禮之不能行於今世猶今禮之不可行於古也然萬古此天地萬古此人心聖人緣人情而制禮何有古今之異哉若夫衣服器用之類則有不能以盡同亦在時王斟酌而損益之耳蓋三代以前以禮為治天下之大綱三代以后以禮為治天下之一事古今治效所以有汚隆之異者以此我太祖初得天下於洪武元年即命中書省暨翰林院太常寺定擬三禮明年遍徵草茅道德之士相與考訂之以為一代之制今書之存者大明集禮洪武定制禮儀定式稽古定式制及諸司職掌所載者乞命掌禮大臣著為一書頒賜中外使天下後世知我朝一代之制永永遵守周行已曰聖人制冠婚喪祭朝聘鄉射之禮以行君臣父子兄弟夫婦朋友之義其形而下者見於飲食器服之用其形而上者極於無聲無臭之微衆人勉之賢人行之聖人由之故所行其身與其家與其國其天下者禮亂則亂禮存則存禮亡則亡按禮記一書當以禮為主而分四科以類考之先儒謂四科禮也儀也樂也制度也以此四科讀此四十七篇思過半矣總論大哉禮乎必本於太一分而為天地轉而為隂陽變而為四時列而為鬼神其在人也所以明親踈别嫌微固人肌膚之會筋骸之束不可須臾離也禮可以易言哉故以言其博有大有小有顯有微大者不可損小者不可益顯者不可掩微者不可大也有以多為貴者有以少為貴者有以大為貴者有以外為貴者有以髙為貴者有以下為貴者有以文為貴者有以素為貴者不豐不殺惟其稱也君子之於禮也有直而行也有曲而殺也有經而等也有順而討也有漸而播也有推而進也有放而文也有放而不致有順而托也餘並然又大積不苑並行不謬細行不失深而通荗而有間連而不相及動而不相害斯之謂大順也至天子諸侯卿大夫士庶人其禮文不齊又有不可勝言者何其博也豈一於博而無其要哉禮即吾心之條理也故曰無體之禮曰至禮不讓曰至敬無文曰經禮三百曲禮三千一言以蔽之曰毋不敬以天下之至不齊者一本諸吾心毋不敬又何其約乎孔子大林放之問曰人而不仁如禮何禮云禮云玉帛云乎哉皆此意也是故人惟齊莊中正而至敬在吾心焉則形之親踈其等殺自嚴形之尊卑其名分自辨形之動容周旋升降裼襲自協乎規矩而儀文度數雖不同一皆吾心條理之散殊耳然則人心自然之敬古猶今也無恭敬之心非人也所謂內心之禮當體之禮五等之禮文孰非吾心固有之物哉雖然易謂嘉會足以合禮又謂觀其會通以行其典禮禮豈易言乎哉孔子大聖人也素以知禮稱而問之太廟學之老聃若此乎好古而敏求也觀曽子問載在禮經大聖大賢其究心於禮也勤勤懇懇無所不用其極况先聖先王其制禮垂訓纎悉備具后之人欲觀通嘉會而可以弗之問弗之學哉要之禮有本也有文也志斯禮者果能會通經曲而毋不敬天體物不遺故天髙地下萬物散殊禮制行焉禮非他也即萬物之體也仁者人也仁體事無不在故人而不仁如禮何而禮非人之體乎禮器篇曰禮也者猶體也體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可掩微者不可大也故經禮三百曲禮三千其致一也一者何也范氏謂經禮三百曲禮三千可以一言蔽之曰毋不敬是已試觀人之一身肌膚筋骸具而百體備內焉毫髮之孔竅何一非體何一非禮此所以君子無不敬而敬身為大也茍斯須不莊不敬則暴慢邪僻得以乘之耳目無所加手足無所措且不可以語人也然則欲以固肌膚束筋骸使百體各得其理者豈有他哉一敬焉盡之矣夫以禮治躬整齊嚴肅樽節退讓凡升降進退之間周旋裼襲之中一一中規中矩使耳目鼻口心之百體皆由順正以行其義者非矯強而致其情也天生蒸民物則皆其賦子典禮皆其秩敘即周身內外思維運動莫非自然之天則也惟一敬宰乎中洞洞屬屬朝乾夕惕無非全吾之天則已耳可見禮切於人非外鑠也即人之體也體豈可須臾離之哉或曰禮誠體備於人身而一身能幾何哉周禮儀禮其大綱節目何可以一端盡也曰禮之𣪚殊彌綸天地要皆體備於一人之身者也周禮禮之官也儀禮禮之文也須臾不可離者非經曲之在吾身者乎真知禮儀威儀所以定命而修已以敬焉則體國經野靡不盡其職朝祭聘享靡不盡其文而筐篚玉帛莫非禮也否則綱舉目張不過繁縟之末節耳已禮云乎哉或曰禮即體也而有無體之禮敬即禮也而有無文之敬何也曰禮原於太一何體何文之有然天地四時隂陽日月五行萬物實渾然一體而燦然有文者也人惟即有體之身以凝乎無體之禮其經而等者森列不淆其曲而殺者纎悉畢舉即其執禮惟謹雖曰無不敬而動容周旋中禮實無不敬也故曰待其人而後行信乎禮一也三千三百言其文之博無不敬也言其體之約所以顔淵問仁孔子教以非禮勿視聽言動必克巳復禮斯可為成身之仁人者此也彼周禮儀禮之所載固有典有則不過舉此以措之耳因世之論禮者舍其本而事其末故即文公先生所輯小學敬身篇以冠諸禮之首云敬身考孔子曰君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其本傷其本枝從而亡仰聖謨景賢範述此篇以訓蒙士丹書曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶曲禮曰毋不敬儼若思安定辭安民哉傲不可長欲不可從志不可滿樂不可極賢者狎而敬之畏而愛之愛而知其惡憎而知其善積而能散安而能遷臨財毋茍得臨難毋茍免狠毋求勝分無求多疑事毋質直而勿有孔子曰非禮勿視非禮勿聽非禮勿言非禮勿動出門如見大賔使民如承大祭已所不欲勿施於人居處恭執事敬與人忠雖之夷狄不可棄也言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義曾子曰君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙背矣曲禮曰禮不踰節不侵侮不好狎修身踐言謂之善行樂記曰君子姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義孔子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已管敬仲曰畏威如疾民之上也從懷如流民之下也見懷思畏民之中也以上明心術之要冠義曰凡人之所為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而後禮義備以正君臣親父子和長幼君臣正父子親長幼和而後禮義正曲禮曰毋側聽毋噭應毋淫視毋怠荒逰毋踞立毋跛坐毋箕寢毋伏斂髮毋髢冠毋免勞毋袒暑毋褰裳登城不指城上不呼將適舍求毋固將上堂聲必揚户外有二屨言聞則入不聞則不入將入户視必下入户奉扄視瞻無回户開亦開户闔亦闔有後入者闔而勿遂毋踐履毋踖席摳衣趨隅必慎唯諾玉藻曰君子之容舒遲見所尊者齋遫足容重手容恭目容端口容止聲容靜頭容直氣容肅立容德色容莊曲禮曰坐如尸立如齋少儀曰不窺密不旁狎不道舊故不戲色毋拔來毋報往毋瀆神毋循枉毋測未至毋訾衣服成器毋身質言語論語曰車中不內顧不疾言不親指禮記曰凡視上於靣則傲下於帶則卑傾則姦論語曰孔子於鄉黨恂恂如也似不能言者其在宗廟朝廷便便言唯謹爾朝與下大夫言侃侃如也與上大夫言誾誾如也孔子食不語寢不言士相見禮曰與君言言使臣與大夫言言事君與老者言言使弟子與幼者言言孝弟於父兄與衆言言忠信慈祥與居官者言忠信論語曰席不正不坐子見齊衰者雖狎必變見冕者與瞽者雖褻必以貌凶服者式之式負版者禮記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐論語曰寢不尸居不容子之燕居申申如也夭夭如也曲禮曰並坐不橫肱授立不跪授坐不立入國不馳入里必式少儀曰執虛如執盈入虛如有人禮記曰古之君子必佩玉右徴角左宫羽趨以采齊行以肆夏周旋中規折旋中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞和鸞之聲行則鳴佩玉是以非辟之心無自入也射儀曰射者進退周旋必中禮內志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德行矣以上明威儀之則士冠禮始加祝曰令月吉日始加元服棄爾幼志順爾成德夀考維祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑慎爾德眉夀萬年永受胡福三加曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黃耉無疆受天之慶曲禮曰為人子者父母存冠衣不純素孤子當室冠衣不純采論語曰君子不以紺緅飾紅紫不以為褻服當暑袗絺綌必表而出之去喪無所不佩孔子曰羔裘玄冠不以弔禮記童子不裘不帛不履絇孔子曰士志於道而耻惡衣惡食者未足與議道也以上明衣服之制曲禮曰共食不飽共飯不澤手毋摶飯毋放飯毋流啜毋吒食毋嚙骨毋反魚肉毋投與狗骨毋固獲毋揚飯飯黍毋以箸毋嚃羮毋絮羮毋刺齒毋啜醢客絮羮主人辭不能烹客啜醢主人辭以窶濡肉齒決乾肉不齒決毋嘬炙少儀曰侍燕於君子則先飯而後已毋放飯毋流啜小飯而亟之數噍毋為口容論語曰食不厭精膾不厭細食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食割不正不食不得其醬不食肉雖多不使勝食氣唯酒無量不及亂沽酒市脯不食不徹薑食不多食禮記曰天子無故不殺牛大夫無故不殺羊士無故不殺犬豕君子逺庖厨凡有血氣之類弗身踐也樂記曰豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮一獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也孟子飲食之人則人賤之矣為其養小以害大也以上明飲食之節圖書編卷九十三
