body:
  text: 圖書編卷十一明章潢撰學詩叙小子何莫學夫詩嘗荘誦斯言未嘗不三復而動予衷也且日不學詩無以言曰不為周南召南其猶正牆面而立也小子于詩學之有年矣何面牆如故耶盖風雅頌賦比興各有體雅之大小風雅之正變均之乎有體也雖其本無邪之心以達諸言者一也而體各不同故夫子删詩俾雅頌各得其所也今識其體者誰與日用間人孰無言即風雅變體且未之脗合又何有于二南歟此學詩多識學詩原體所由述也惟其識其體然後乃知一言以蔽之只在思無邪是故閑邪以存誠修詞以立誠體立用行各有攸當庻不負聖人學詩之教矣詩大序曰詩者志之所之也在心為志發言為詩故正得失動天地感鬼神莫近于詩先王以是經成夫婦訓孝敬厚人倫美教化移風俗故詩有六義焉曰風曰賦曰比曰興曰雅曰頌上以風化下下以風刺上主文而譎諌言之者無罪聞之者足以戒故曰風至于王道衰禮義廢政教失國異政家殊俗而變雅作矣故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事係一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有大小故有大雅焉有小雅焉頌者美盛徳之形容以其功告于神明者也是謂四始詩之至也史記曰闗睢之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始所謂四始也周禮太師教六詩曰風曰賦曰比曰興曰雅曰頌以六徳中和祇庸孝友為之本以六律為之音王制曰天子五年一廵狩命太師陳詩以觀民風子曰詩三百一言以蔽之曰思無邪子曰誦詩三百授之以政不達使于四方不能專對雖多亦奚以為子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與程頤曰周南召南如乾坤二南之詩盖聖人取之以為天下國家之法使邦國鄉人皆得歌咏之也有天下國家者未有不自齊家始故先言后妃次言夫人又次言大夫妻而古人有能修之身以化在位者文王是也故繼之以文王之詩又曰學者不可不看詩看詩使人長一格張載曰置心平易然後可以言詩涵泳從容則忽不自知而自解頤矣謝良佐曰君子之于詩非徒誦其言又將以考其情性又將以考先王之澤游酢曰學詩者可以感發人之善心如觀天保之詩則君臣之義修矣觀常棣之詩則兄弟之愛篤矣觀伐木之詩則朋友之交親矣觀闗睢鵲巢之風則夫婦之經正矣昔王裒有至性而子弟至于廢蓼莪則詩興發善心于此可見矣朱子曰本之二南以求其端參之列國以盡其變正之于雅以大其規和之于頌以要其止此學詩之大㫖也于是乎章句以綱之訓詁以紀之諷咏以昌之涵濡以體之察之性情隠微之間審之言行樞機之始則修身及家均平天下之道得之于此矣孔子雅言詩曰興於詩曰不學詩無以言小子何莫學夫詩詩誠不可以不學也然誦詩三百不足以致用詩亦未易學也學之當何如亦惟取法孔子而已矣即如詩云天生蒸民有物有則民之秉彛好是懿徳孔子誦之曰為此詩者其知道乎故有物必有則民之秉彛也故好是懿徳只轉換二三字而性情之道了然矣詩云迨天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮予孔子誦之曰為此詩者其知道乎能治其國家誰敢侮之只提醒一語而治國家之道了然矣此孔子所以善說詩孟子所以願學孔子而說詩亦以此為凖繩也但一則曰知道二則曰知道三百篇豈只此二詩為知道哉欲求知道之㫖豈徒區區于名物之訓釋而不思以意逆其志哉大抵賦比興風雅頌雖各不同其發乎性情止乎禮義知道則一而已觀周召之告君也七月章惓惓于蠶桑稼穡之艱難卷阿章諄諄于馮翼孝徳之引翼成王所以興起于善而夙夜基命宥宻盖以此也故甘棠之愛九罭之留一皆人心不容自己者即此推之君之燕臣也曰人之好我示我周行臣之答君也曰天保定爾俾爾戩穀臣之戒君也曰敬之敬之天惟顯思命不易哉君之答臣也曰學有緝熙于光明弼時仔肩示我顯徳行君之於農也曰我田既臧農夫之慶農之答君也曰雨我公田遂及我私上下之感應㨗于影響一皆真心之見乎詞也今讀緇衣隰桑即知其好賢之誠讀巷伯何人斯即知其惡惡之切讀伐檀衡門即知其守己之正讀宛丘株林即知其行己之邪讀采采芣苢即知其太平之樂讀彼黍離離即知其東遷之憂讀魚麗南山蓼蕭湛露即知周之所以盛讀民勞板蕩苕之華何草不黄即知周之所以衰讀車攻吉日雲漢庭燎即知宣王之所以中興讀祈父黄鳥我行其野即知宣王之所以終怠此其感發懲創一諷詠即得之矣雖意之所指或不齊孰非知道之言乎至于饗祀朝㑹則歴舉先祖之徳如穆穆文王於緝熙敬止維此文王小心翼翼昭事上帝帝謂文王無然畔援無然歆羡誕先登于岸帝謂文王予懐明徳不大聲以色不長夏以革不識不知順帝之則維天之命於穆不已於乎不顯文王之徳之純所以形容其心神者至矣故凡上而后稷公劉太王王季下而武王成康各舉其實以昭示後裔而子孫臣工得與聞于朝廷之間有不感發興起者哉是故不特抑抑威儀維徳之隅與賔筵淇澳之咏可以為知道也甚至兵旅之興有嚴有翼既敬既戒一皆自其徳心而充廣之耳若夫里巷之歌謠則一出于婦人女子之口在汝墳乃曰王室如燬雖則如燬父母孔邇在雄雉乃曰百爾君子不知徳行不忮不求何用不臧在雞鳴之婦乃曰知子之來之雜佩以贈之然猶處其常也如柏舟緑衣燕燕終風以及白華之雅一則曰我心匪石不可轉也一則曰我思古人實獲我心所以至今讀之猶足以動人也道在人心一觸之而即興秉彛好徳同焉故也孔子謂思無邪之一言足以蔽三百篇之㫖兹可黙㑹矣雖然古天子廵狩列國必命太史陳詩以觀政謂治道風俗所攸闗也迨詩變而騷猶為近古至漢魏而下㸃綴敲推可謂工矣然發乎性情止乎義禮謂之知道則槩乎未之聞也詩不足以興何以詩為哉詩大㫖學易莫要于玩象學詩莫要于辨體象者何隂陽竒偶爻位是也象明而六十四卦了然矣體者何風賦比興雅頌是也體明而三百篇了然矣是詩之有體與易之有象同而體定于未删之先與象定于未畫之先亦同也奈何有畫之後猶不明夫所畫之象既删之後猶不辨乎删定之體伏羲何必於畫孔子何事於删乎豈詩之外别有所謂體乎哉天無别體日月星辰即天之體也茍于日也月也星與辰也諸體不辨何以仰觀于天之文地無别體水山土石即地之體也茍于水也山也土與石也諸體不辨何以俯察乎地之理人無别體首腹股肱即人之體也茍于首也腹也股與肱也諸體不辨何以中盡乎人之道昔人以風雅頌為三經賦興比為三緯經緯雖分體則一耳但賦也興也比也各一其義亦各一其體或一章而三義具備體則不殊或賦以直述其事而中寓興意或比與興雖各别以之為比即以之為興亦于經之體無與也此所以為經中之緯也若夫風不可為雅小雅不可為大雅而雅不可以為頌正風不可以為變風二雅三頌正變亦然非真識其體如蒼素不可淆如絲竹不可混則各任意識註述篇章藝工理昌反沉滅其本㫖尊雅而卑風者謂雅可降而為風貴正而賤變者謂變非盛時所有此以國異王侯地異朝野世異盛衰自生分别心而於本然之體則茫乎其未之識也故意本委婉每認比興以為賦詞本假托毎認質言以為真或以鄙䙝之詞釋其深邃之意或于忠臣義士之諷刺指為淫慝邪僻之歌謠詩之晦塞可勝慨哉然非古人混六義為一途而莫之講也由辨體不清則詮義不澈孔子謂雅頌各得其所若有意以升降之矣豈知體裁一定聖人刪之次之特去其無意義者存其有關風教者一切咸據體以分别而次第之耳雖欲于體外加以毫髪意見不可得也是故風雅頌無卑高也賦興比無淺深也正變無關于隆替也得其體則六義炳炳如仰天俯地近取諸身色色信其本來而已矣况諸書皆假言以闡明其理義詩獨隨聲以宣洩其性靈其體固别于聲響節奏之間其情則起于諷咏音律之外學詩者于詞外見意則意味津津乎其無窮若先執理以解文則性情反為義理所拘不能洒然于歌詠之表矣潢鄙人也敢自以為識體乎哉但學詩乆之知有體之當辨也迺敢僭妄陳述辨體一端以為學詩之指南云周禮太師教六詩曰風曰賦曰比曰興曰雅曰頌即大序所謂詩有六義是也程子曰國風大小雅三頌詩之名也六義詩之義也一篇之中有備六體者有數義者又曰學詩而不分六義豈能知詩之體也可見體即義之所由辨也何也風雅頌各有體不可混也但風非無雅雅非無頌又風雅頌正變所由分也茍不能先辨其體何以俾風雅頌各得其所古人于六義先風即次賦比興者何盖賦比興雖風雅頌所通用然首之以國風而三緯即備于國風中焉如關睢首篇云窈窕淑女君子好逑賦之義也關雎荇菜皆因物起興雎鳩之和鳴荇菜之柔順則又取之以為比也此三緯所以即次乎風而先雅頌之意也六義先風而風之義何居大序曰風者風也教也風以動之教以化之又曰上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風是也朱子曰國者諸侯所封之域而風者民俗歌謡之詩也謂之風者以其被上之化以有言而其言又足以感人如物因風之動而有聲而其聲又足以動物也是以諸侯采之以貢于天子天子受之而列於樂官于以考其俗尚之美惡而知其政治之得失焉皆是也然未盡其義也盖風乃天地隂陽之氣鼔動萬彚無所不被無所不入而各國之風土不齊則各國之風氣不一故各國之風化因之善者矯其偏而歸之中不善者循其流習而莫之返也記曰鄭聲好濫淫志衛音促數煩志齊音傲僻驕志是列國之音亦不同天子廵狩列國太史陳詩以觀民風者此也但列國之風化不齊聲氣不類而體則一焉是故風之體輕揚和婉微諷譎諌托物而不着于物指事而不滯于事義雖寓於音律之間意嘗超于言詞之表雖使人興起而人不自覺如參差荇菜與樛木螽斯之三叠如已焉哉天實為之謂之何哉母也天只不諒人只重複咏之如麟趾三章止更易子姓族數字而咏嘆不已皆風之類也若夫碩人一篇正是稱美衛荘姜中間止㸃出衛侯之妻一句而不見答于衛荘公全不說出猗嗟一篇全是稱美魯荘公中間止㸃出展我甥兮一句而不能防閑其母亦不說出美中含刺之意却在言外風之體率類此國風不曰正風而曰周南召南果文王之化自北而南之謂乎盖江漢汝墳不足以盡南國所選之詩亦不應止此二篇已也盖南為離明之正方故風為太和之正氣取其長養萬物而不傷也子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與又曰不學詩無以言茍不知二南之體則言之出也不失之發露則失之廹切内則傷己外則傷人真有一歩不可行者况于修齊治平之道哉惟詩之在二南者渾融含蓄委婉舒徐本之以平易之心出之以温柔之氣如南風之觸物而物皆暢茂凢人之聴其言者不覺其入之深而咸化育于其中也試舉一二証之即一螽斯可以詠歌后妃之徳即一甘棠可以形容召伯之仁即兎罝麟趾羔羊騶虞中間止移易數字而咏歎不已雖不直言其所以而意自涵藴於其中此二南所以為正音也知二南之體則知正風之義矣否則漢廣行露摽梅野有死麕本因不識其諷諭乃又從而為之詞是于面牆者加桎梏也不深負聖人諄切之教耶南體裁不長而咏歎不已渾含不露而意趣躍然誦其言而其所未言者令人玩味之不忍釋紬繹之而其義愈無窮也學詩者學二南以立言則終日言而人不厭聴雖片言亦可以悟人也否則其如朔風之栗烈何變風云者果如孔氏所謂王道衰諸侯有變風王道成諸侯有正風王道明盛政出一人諸侯不得有風王道既衰政出諸侯故各從其國有美刺之别也據其所云則有道之世天下不宜有風又何為黍離降為國風也盖惟以時之盛衰論正變既不識體之正又何有于體之變耶不知變者詩之體變乎正非世之隆變而汚也惟以其時之汚隆論正變故何彼穠矣在二南者必欲改平王為文王曽不思七月篇非成王周公之盛時乎且謂居變風之末見變之可正也今取七月置之二南即可以為正風乎盖體合乎正者雖衰世所作不得不歸之于二南體異乎正者雖盛時聖人之所作不得不歸之于變風是正變各以體分亦非以正變評品詩之高下也知風以南長養萬物為正則凢各方稍異乎正南者即為變風可見正南一出于和柔餘風未免渉于勁直也試即柏舟為變風之首者觀之我心匪石六句此雅體也風中雜有雅體謂之為正南可乎茍此詩作于成康之時即欲類歸二南可乎辨體之正變者辨乎此而已矣賦之義云何鄭氏周禮注曰賦之言鋪直鋪陳善惡程子曰賦者敷陳其事如齊侯之子衛侯之妻是也又曰賦者詠述其事如蔽芾甘棠勿翦勿伐召伯所茇是也吕東萊曰賦叙事之由以盡其情状朱子曰賦者敷陳其事而直言之者也皆是也然而未盡也如關雎興也下文窈窕二句非賦之謂乎甘棠賦也蔽芾二字非比之意乎葛覃首章本是直陳其事而中涵許多興味便是興之意義君子于役萹雞棲于塒羊牛下來又是賦中覩物興思不可確然執定一賦字以盡一篇一章之大㫖比之義云何鄭司農周禮注曰比者比方於物程子曰以物相比狼䟦其胡載㚄其尾公孫碩膚赤舄几几是也又曰比者直比之蛾眉瓠犀温其如玉之類是也朱子曰比者以物為比而不正言其事又曰比方有兩例有繼所比而言其事者有全不言其事者皆是也亦未盡也或興中含有比意如下泉之類或如習習谷風在風以為比在雅以為興者如北門北風皆賦其事以為比又不可不觸類而伸之也興之義云何孔氏曰興者起也程子曰因物而起興闗關雎鳩瞻彼淇澳之類是也朱子曰興者先言他物以引起所咏之詞也然有兩例有以所興為義者則以下句形容上句之情思下句指言上句之事實有全不取義則但取一二字而已要之上句常虚下句常實之例則同也皆是也亦未盡也如卷耳桃夭草蟲皆即所賦以為興而又有興兼比與賦者伐木鳥鳴則既興而又興也須玩味乆之自得其不盡之意不可便以為無取義也國風用比興最多美刺雖殊亦多諷意盖言之風謂之諷含而不露婉而不廹故也如漢廣之游女野有死麕之有女懐春皆托言以致諷如谷風與氓皆假棄婦之詞以致怨而非實言也且其寓意於物如誦關雎便知為夫婦誦螽斯便知為子孫誦桃夭便知為婚姻誦蝃蝀便知為刺淫誦相鼠便知為刺無禮之類由古人明庻物察人倫故比興皆不移易後人倫物俱昧凡其所托諷者一切不探其微反指為無意義良可羞也若雅與頌則比興漸少矣如小雅八十篇用比興者尚四十六篇大雅三十一篇用比興者止八篇頌總四十篇用比興者止四篇盖小雅得風體最多大雅與頌則多質言故鮮諷諭之詞矣雅之義云何大序曰雅者正也言王政之所由興廢也政有小大故有小雅焉有大雅焉程子曰雅者陳其正理如天生烝民有物有則民之秉彛好是懿徳是也朱子曰小雅燕饗之樂也大雅朝㑹之樂受釐陳戒之詞也論雅之義備是也然以政之小大燕饗朝㑹分屬其亦未識小大雅之體乎彼鹿鳴天保君臣上下之交孚常棣伐木蓼莪白華乃父子兄弟夫婦朋友之恩義倫孰有大于斯者乎湛露彤弓之燕饗采薇出車之兵戎楚茨信南山之田事政孰有大于斯者乎謂小雅為政之小與燕饗之樂果足以該小雅否也鳬鷖既醉之燕禮未必大於魚麗嘉魚江漢常武之征伐未必大于六月采芑安見其為政之大乎又安見其為朝㑹受釐陳戒與小雅異也不知雅體較之于風則整肅而顯明較之于頌則昌大而肆達惟彛倫政事之間尚有諷諭之意皆小雅之體也天人應感之際一皆性命道徳之精皆大雅之體也其中或近于風與頌者則又為小大雅之變體也小雅未嘗無朝㑹大雅未嘗無燕饗小大雅之正變無所與于時世之盛衰要在辨其體而小大雅正變之義俱不待言矣頌之義云何大序曰頌者美盛徳之形容以其成功告於神明者也吕氏曰頌者美之詞也無所諷議果足以盡頌之義乎未也盖頌有頌之體其詞則簡其義味則雋永而不盡也如天作與雅之綿均之美太王也清廟維天之命與雅之文王均之美文王也酌桓與雅之下武均之美武王也試取而同誦之同乎否乎盖雅之詞俱昌大在頌何其約而盡也頌之體于是乎可識矣敬之小毖雖非告成功而謂之為雅可乎哉魯之有駜泮水則近乎風閟宫與商之伍篇則皆近乎雅而其體則頌也故謂為變頌也亦宜周自文王初婚至陳靈公上下五七百年其所存詩各國多者二三十篇少者數篇而已說詩者每牽扯于數十年間或有歸諸一二人焉如變小雅盡指為平王幽王時詩何謂也司馬遷謂太師蔵詩三千餘篇孔子删之存三百餘篇止十之一也盖亦存其可以垂世立教者皆綱常道義風教之所係也即孔子所謂詩三百一言以蔽之曰思無邪是矣若不辨體且曰其中雜有淫僻悖亂之詩在焉不大悖孔子删詩之㫖乎詩聲教也言之不足故長言之性情心術之微悉寓于聲歌咏歎之表言若有限意則無窮也讀詩者先自和夷其性情于以仰窺其志從容吟哦優游諷詠玩而味之乆當自得之也盖其中間有言近而指逺者亦有言隠而指近者總不可以廹狹心神索之不可以道理格局拘之也噫賜商可與言詩其成法具在也否則誦詩三百雖多亦奚以為善說詩者固不可以辭害意亦可因辭以㑹意但詞有限意無窮也法語之言小雅之謂也㢲語之言二南之謂也一部論語其周南召南之體乎發乎情止乎禮義三百篇皆然大約風多主乎情小雅多主乎事大雅多主乎理頌多主乎徳非謂大雅之遺徳小雅之無情然小雅則情寓于一事之中大雅則徳見于一篇之内各就其多者見之也仲尼于詩三百蔽以思無邪一言則凢有邪思者必其所删而所存必無邪思也明矣故惓惓以學詩勉二三子而雅言詩也然及門諸賢獨商賜可與言詩曰起予曰告往知來謂其得意言外不滯泥于文辭間耳孟子亦曰善說詩者不以文害辭不以辭害志以意逆志是為得之然則學詩者又可尋文泥句逐字解義云乎哉盖詩之為教性隨物感聲逐意宣或寓言多質言寡或假此形彼或微露其意不竟其辭縱文辭偶同美刺逈别要在悠游涵泳以我心神契古人意趣而超然朗悟懸解斯可也是故各經皆循文探理惟詩則言外傳心若一逐字句則滯象迷真體且莫辨又奚有于興觀羣怨哉風雅頌詩各有體也聖人删詩謂之風謂之雅謂之頌者直古人作詩之體耳得其所以為風雅頌之體可與言詩矣或以為天子諸侯之辨者豈深于詩者哉何以謂之風也風之體多重複咏嘆輕婉淺淡况百里不同風而出于民俗之歌謠者雖各發于性情而各土之音因以異各國之風亦因以見也何以謂之雅也雅之體多正大整肅雖或各言其情而終非輕婉之辭矣何以謂之頌也頌之體多荘嚴恭敬于以發君徳之淵微揚祖先之勲烈云爾如後世之作詩者有律有古有歌有引體製不同而名亦異也自風之體觀之大率三章四章一章之中每每數句而詞多重複既曰參差荇菜左右采之窈窕淑女琴瑟友之又曰參差荇菜左右芼之窈窕淑女鐘鼓樂之既曰葛之覃兮施于中谷維葉萋萋又曰葛之覃兮施于中谷維葉莫莫樛木三章四十有八字惟六字不同螽斯三章三十有九字惟十二字不同芣苢三章四十有八字亦惟六字不同甚者殷其靁三章七十有二字惟六字不同北風已焉哉天實為之謂之何哉黍離不知我者謂我何求悠悠蒼天此何人哉三章皆重言之麟之趾三章三十三字而實字止九字耳以此觀風之體多類此盖以數字咏嘆成章一歌咏之間風之有聲其感人最易入也若雅之正大整肅則異乎風焉然而有大雅小雅之别者以小雅之所咏者雅則雅矣大率多述其事道其情猶未若大雅之渾涵也如云穆穆文王於緝熈敬止云上天之載無聲無臭云予懐明徳不大聲以色不長夏以革不識不知順帝之則云天生烝民有物有則民之秉彛好是懿徳若此之類涵蓄淵邃此其大雅為何如也此觀雅之小大而其體裁自殊果惟在于燕饗朝㑹之别乎雖大小雅多道乎人君政事之得失然猶有美有刺而頌則無有諷刺要皆鋪張其功徳焉今試以風之體與雅頌之體詳觀之然後知聖人辨小大之意子曰吾自衛反魯然後樂正雅頌各得其所可見聖人未反魯之先風雅頌之混淆也非一日矣彼序詩者乃以言謂之風言天下之事謂之雅政有大小故有小雅大雅頌則以其成功告於神明後儒又以風為被上之化小雅為宴饗之樂大雅為朝㑹之樂頌為宗廟之樂其果然與夫既以風為諸侯矣乃以周南為王者之風后妃之徳何耶若謂文王在當時尚為諸侯故謂之風而豳詩為成王之詩周公之事亦列之風何耶况聖人既降黍離為國風矣而豳詩列于國風不謂之降又何耶夫既以小雅蓼蕭為澤及四海湛露為燕諸侯六月采芑為南征北伐是王者之政莫此為大而小雅果為政之小乎吾不知常武之征伐何以大于六月卷阿之求賢何以加于鹿鳴采薇出車何為燕享既醉鳬鷖何為專于㑹朝也頌謂其稱君之功徳則有然矣若謂專于宗廟告神明焉則閔予小子敬之小毖何有於神明之告載芟良耜何與于宗廟之樂也况類而通之七月之詩不有類于雅乎而其體則風也瓠葉鳬鷖不有類於風乎而其體則雅也泮水不有類于雅有駜不有類于風乎而其體則頌也審如是也王國侯國各有風天子諸侯各有頌周平王詩列于國風不害為天子之尊魯僖詩列于頌不失為諸侯之卑彼謂聖人降王國尊諸侯者陋亦甚矣嘗自衛武公一人觀之淇澳列諸風固諸侯也賔筵列之小雅抑列之大雅果以諸侯為政王朝是以列諸雅與若不論其體裁則以淇澳列之雅賔筵與抑列之風亦無别與以抑而置之小雅以賔筵而置之大雅果以政而分之與噫今田夫野婦皆能為鄉土之歌是即古風之遺體也唐人作平淮夷雅漢人作聖主得賢臣頌之類是即古雅頌之遺體也何獨于古詩之體裁無所辨哉國風天地嘘育萬物莫疾乎風所以節宣隂陽之氣而萬物之生機頼之以宣暢也然吹萬不同一皆隨其竅之所感而聲亦因以異焉是本之氣而形之聲氣和則聲徐氣勁則聲肅和則物觸之欣欣向榮勁則物觸之而撓折者多矣其機如此然率土之濵各方風氣異齊人之聲亦因之知風之自其風俗成于下其風化則本乎上也故曰君子之徳風上有好者下必有甚焉者矣易地上有風觀君子以省方觀民設教古者天子廵狩列國太史陳詩以觀民風觀此也詩三百篇曰風曰雅曰頌所以列國之風亦區以别焉觀風者觀乎此而列國之教化習俗昭然于聲歌之表矣或曰自二南至豳均之為國風也周召獨謂之南子以南為樂章取證以雅以南之詩記亦曰胥鼓南信有然者但以二南為正風列國為變風古人豈無意義而云然哉盖八方一也而獨以南為正由北高南下天之象也北幽南明天之氣也位北向離君之體也孔子曰恭己正南面而已矣知八方以南面為正則八風一也獨以南風為正可推矣知南為正風則列國為變風可推矣且八方各一其地八風各一其時故舜獨以解愠歸諸南風之薫以阜財歸諸南風之時惟時乎正夏天地太和萬籟俱暢隂陽之氣有發生而無肅殺故八方均之為風獨以南為正也試誦二南其體皆優柔委婉含蓄不露猶之乎南風鼔盪庻類靡不蕃殖故孔子謂關雎樂不淫哀不傷亦此意也類觀各篇盖莫不然可見同一國風而周召二十五章獨謂之南不于天地正風之義而有取于南哉若夫柏舟緑衣以後未免廹切不平發揚太過凢所美刺多直言之雖非後世詞家怨讟誇毗呌號者比殆不若二南之渾厚無迹令人得意言外其入人為尤深矣猶五諫均之為忠也二南比諷諫列國比之直諌譎諌未若諷之猶善也深于風體者其正變當自得之然則知風之正變凡大小雅之含蓄而和婉者必正體也發露而質直者必變體也况正變一以體言則雖一人之歌咏亦自有風雅正變不齊者在也故朝堂之上未嘗無風閭巷之間未嘗無雅雖盛時未嘗無風雅之變雖衰世未嘗無風雅之正也豳詩七月似雅而實風都人士何草不黄似風而實雅者不即此可推矣乎真知二南正風為三百篇之首則正以啓其端變以盡其賾如易首乾坤二卦而諸卦皆易卦之變體書首堯舜二典而誓誥皆書典之變體禮首曲禮二篇而檀弓曾子問皆經曲之變體又可推矣雖然正變固各一其體要皆此心真機所發洩也惟其一出于人心自然之天機故雖閭巷婦人女子所歌謠與帝王典謨並傳萬世足以風動人心無窮盡焉但八風皆能動物尤莫善於南風之和列國之詩皆可觀風尤莫善于南樂之詩章有正必有變凡風氣風化風俗在天在人在上在下一也奈何誦詩三百不識南樂之名義謂周南召南為王化自北而南謂胥鼔南為南夷之樂又惡足與語國風之正變小大雅問詩有小大雅之分果政之小者為小雅政之大者為大雅與抑小雅為燕享之樂大雅為受釐陳戒之詞與曰均之未盡也盖朝廷燕享無非祭祀兵農之舉政孰有大於此者觀鹿鳴天保之類固謂為政之小矣行葦鳬鷖既醉謂非燕享樂歌可乎哉盖雅者政也均之為政矣而小大分焉如鹿鳴之乞言皇華之遣使天保之答君采薇之遣戍與夫常棣伐木白華之于兄弟朋友夫婦要皆事體之正大而章著于倫物間者若大雅則一皆天人性命之奥而有未易窺測者矣故不曰文王在上於昭于天則曰文王陟降在帝左右不曰上天之載無聲無臭則曰明明在下赫赫在上不曰小心翼翼昭事上帝則曰上帝臨汝無貳爾心不曰無然畔援無然歆羡誕先登于岸則曰不大聲以色不長夏以革不識不知順帝之則不日神之格思不可度思矧可射思則曰天生蒸民有物有則民之秉彛好是懿徳要皆天人交際之間其義至精至粹大雅所以異于小雅者此也是故賔筵與抑同一衛武詩也在抑則曰抑抑威儀為徳之隅不愧屋漏豈徒飲酒孔偕惟其令儀已哉黍苗與烝民同一召穆詩也在烝民則曰小心翼翼古訓是式威儀是力豈徒原隰既平泉流既清已哉六月采芑與江漢常武同一宣王南征北伐詩也在江漢常武則曰矢其文徳洽此四國曰王猷允塞徐方既來豈徒薄伐玁狁蠻荆來威已哉舉此數章引伸觸類觀之均為政之大而雅之大小有辨矣况善讀二雅者又自有感發之機如昊天曰明及爾出王昊天曰旦及爾游衍誦此寧無敬天之思乎如穆穆文王於緝熙敬止不顯亦臨無斁亦保誦此寧無修徳之念乎試觀古人之讀詩也如鳶飛戾天魚躍于淵只子思引之言其上下察便見其性道之活潑如自西自東自南自北無思不服只孟子引之言其以徳服人便見乎王道之精純如天生烝民有物有則只孔子一贊其知道便見乎性情之本善此皆學詩之法也他如小弁與蓼莪常棣與角弓伐木與谷風使皆合而誦之有不動其父子兄弟朋友之真情者必非人也要皆不在乎尋章摘句而徒泥乎文詞斯可矣故曰詩可以興曰小子何莫學夫詩風雅正變虞書曰詩言志歌永言孟子曰以意逆志是為得之是詩乃志之所發而風雅頌之體所由存也讀詩者以意逆志則正也變也于以揆其志之所自而得扵意言之表焉可也舊以二南二十五篇為正風鹿鳴至菁莪二十二篇為正小雅文王至卷阿十八篇為正大雅皆文武成王時詩周公所定樂歌之詞也邶鄘至豳十三國為變風六月至何草不黄五十八篇為變小雅民勞至召旻十三篇為變大雅皆康昭以後所作而正變定于盛衰之時焉不知詩人之志有美有刺故見之于詞有美有惡而志則一也彼謂二南為正風以其多美詩則野有死麕亦以為美詞矣然則變風無復有美詩也如淇澳美衛武公緇衣美鄭武公何獨與正風大相懸耶彼既以政之小為小雅以政之大為大雅則小雅之變是特政之小者變于燕饗之間大雅之變是特政之大者變于朝㑹之際也然幽王鼓鐘于淮水而憂心將將尹氏秉政以致亂而憂心如惔猶以為變之小而異乎瞻卬召旻之篇也耶若謂變風變雅之作由禮義廢政教失故作者傷人倫之廢哀政刑之苛矣如淇澳緇衣羔裘鳴鳩果何所哀而傷也耶楚茨信南山諸篇繼于鼓鐘之後固以為思古之詩矣桑扈鴛鴦魚藻采菽果一皆傷今思古之作也耶民勞板蕩信乎其變之大矣嵩高烝民江漢常武以宣王中興之烈申伯山甫召虎皇父之賢終不得與于大雅之正不知其所謂大雅者果何謂耶程元嘗問文中子曰豳風何也曰變風也曰周公之際亦有變乎曰君臣相誚其能正乎成王終疑周公則風遂變矣非周公至誠其孰卒正之哉元曰居變風之末何也曰夷王以下變風不復正矣夫子盖傷之也故終之以豳風言變之可正也斯言也謂其說理不精不可也謂聖人刪詩原有此意而為詩之定論奚可哉况觀豳風則變固可正矣變小雅終何草不黄變大雅終召旻而雅之變卒不克正何耶反變風之正非周公不能矣三頌終殷武又何耶即如周公之際亦有變康昭以後獨無正耶是皆因篇次先後求其說而不得從而為之辭耳文中蔽于漢儒而後儒又崇信之使讀詩者習于其說而莫之辨良可慨哉然則風雅果無正變耶盖卦爻有正變而變卦不出乎正卦之外樂音有正變而變音不離乎正音之中如其風肆好穆如清風雅中未嘗無風猗嗟昌兮三章雖曰美之實則刺之而正中之變變中之正或一于正或一于變惟以意逆志當自得之也若以風雅之正變拘拘于時之盛衰焉豈深于詩者哉二南詩序非子夏作人皆能辨之矣後儒祖述詩序使萬世之下悉尊信而不疑可無辨哉即如二南之詩小序曰關睢麟趾之化王者之風故係之周公南言化自北而南也鵲巢騶虞之徳諸侯之風也先王之所以教故係之召公後儒遂謂文王使周公為政于國中召公宣布于諸侯於是徳化大成于内而南國莫不從化故三分天下有其二信如是言則文王從豐即使周公為政召公宣布而三分有二皆周召致之周召亦不待武王伐商已秉政之有年矣且關睢篇既謂宫人作於文王后妃初婚之時矣而麟趾為關雎之應則其化被南國冝不俟周召為政以宣布之也况周公亦在振振公子中乎周召固二公采邑也抑亦分于文王三分有二之先乎然則謂之周召者何也地志扶風東北有周城東南有召城安知周召非地名又安知二公之封非因周召之封國而得名乎古以周召二公分土而治主東西方諸侯安知非采詩于周之地而得之故名之周南采詩於召之地而得之故謂之召南乎然則南非自北而南之謂矣而謂之南者何也南樂章也小雅鼓鐘篇以雅以南以籥不僭亦可証矣夫既以二南係之二公矣遂以其詩皆文王時詩見關雎葛覃或出于婦人遂以他詩亦皆出于婦人即如汝墳曰既見君子不我遐棄殷其靁曰振振君子歸哉歸哉果皆室家思見君子之詞乎小星曰肅肅宵征夙夜在公肅肅宵征抱衾與裯乃謂夫人不妬忌以惠其下盖衆妾進御於君抱衾裯而往不致怨于往來之勤焉借云進御何用肅肅宵征見星而往還為哉夫肅肅宵征者逺行不逮也夙夜在公者勤勞王事也詩中此類亦多矣安知抱衾裯以夜行者非勤勞公事而自安于不均之命乎夫既謂南國被文王后妃之化雖江漢之女人望見之知其有端荘静一之徳非復前日可求矣然豈不夙夜謂行多露而致鼠牙雀角之訟有女懐春吉士誘之而致野有死麕之詞者何也果文王后妃但能化及女子而不能化彼强暴之男乎讀舒而脫脫無使厖吠之詞謂其貞㓗自守吾不信矣凡詩有美有刺雖衰世未必無可美雖盛世未必無可刺者即如二南之地雖嘗被王化矣然所采之詩安知其世無後先而盡出於文王周召之盛世乎觀何彼穠矣篇曰平王之孫齊侯之子考春秋荘公元年書曰王姬歸于齊此乃桓王女平王孫下嫁于齊㐮公非平王之孫齊侯之子而何若必指為文王時非特不當作正義而太公尚未封于齊則齊將誰指乎又謂武王女文王孫不知邑姜乃武王元妃果以姜女而下嫁于太公之子乎此皆至明至顯無可疑者安知唐棣桃李非徒美其色或言其時而王姬之車曷不肅雝正以刺其徳之有不稱乎茍時有不同雖文王之子孫且不免管蔡鴟鴞之比而後世有小弁白華之咏安能必王國之無可刺也况丹朱驩兠無損于堯舜之二典亢龍龍戰無損于乾坤之二卦而野有死麕之類即有損于文王之二南乎是故舉何彼穠矣一篇而二南可類推矣舉二南而三百篇可類推矣然則詩删于孔子而前之所采者時雖盛衰之不齊詩亦美刺之不類地雖周召之如故風則隨世態以變遷所以同一雅也而美刺之雜出者無害其為雅則同一南也而美刺之悉采者何害其為南哉善學詩者無為舊見聞所拘始得召南詩有六義風雅頌賦興比是也比興中固有賦而賦中亦未嘗無比與興古今凡詩皆然今誦三百篇于千百載之下也一一盡以己見揣摩測度求為何事何人以實之雖賦體且難知也况比興哉姑即召南言之詩總十六篇除甘棠羔羊騶虞三詩外皆出婦人女子周南十一篇除免罝麟趾亦然果風多採于閭巷必出婦人女子之口而後謂之風所謂之子懐人有女游女果皆賦體不可為比興哉召南既謂召伯敷文王之政而化被南國則男女皆化而歸乎善矣厭浥行露繼甘棠之後也貞女為强暴所訟而速之獄鼠牙雀角之風方盛行焉使非以禮自守决不爾從何能以自免哉如此而云王化浹洽召伯能誕敷王政吾不知也殷其靁謂婦人思念君子猶可說也摽梅女子懼嫁不及時則有強暴之辱恐非大無道之世遇極惡之人未必至此乃曰求我庻士迨其謂之何急求自售如是哉斯女也謂其貞信自守吾不知也至野有死麕章謂詩人美懐春之女貞潔自守不為强暴所汚末乃述其拒之之詞言姑徐徐而來毋動我之恱毋驚我之犬而謂其凛然不可犯吾不知也且王化肆被南國徒能化及女子耳在在强暴之徒梗化如故則是諸詩本以美王化實以醜文王也向使不沾文王之化則舉男女之在南國者盡非人類乎哉然則諸詩何謂也吾意其多比體也觀古詩之變始自離騷而屈原去周猶未逺其賦有曰思美人兮覽涕而竚眙媒絶路阻兮言不可結而詒蹇蹇之煩寃兮滔滯而不發申且以舒中情兮志沉筦而莫達曰衆女嫉予之蛾眉兮謠諑謂余以善淫諸賦中所謂娀女姱女宓妃佳人不一而足以屈子之清貞亦借此為比詩可類觀矣今予亦以鄙見揣摩測度而妄言之大抵二南之詩多出于文武盛時其出共和以後者恐未必盡無也即厭浥行露首章似為比體君子敬慎避禍而禍猶不免故下二章雖遭獄訟猶守正不妄從人今以意逆之其志可想見矣何必執室家不足之語即謂女子之不從强暴也摽有梅亦比體或者詩人傷賢哲之凋謝故寓言摽梅使求賢者及時延訪之耳蔵激切之意于㢲順之中只今猶有一唱三歎者在矣野有死麕亦比也惟野有死麕故白茅得以包之惟有女懐春故吉士得而誘之今也林有樸􅈪野有死鹿非特麕之小也白茅純束寧不取以包之哉懐春之女其色且如玉也吉士寧不誘之哉是誘在吉士而致其誘者懐春如玉之女也既已致其誘矣乃曰舒而脫脫兮無感我帨兮無使厖也吠是已既炫才求用于人又欲人勿廹于求己也可乎哉詩人不過託言懐春之女以諷之耳何必質言懐春女子不汚于强暴之徒歟若夫平王之孫齊侯之子則又無俟于辨也但執泥文王之時盡歸諸賦體故不得不體婦人口氣而謂之賦耳果不泥其盛衰之時不為直言之賦以意逆志則昔固測度以為賦予乃測度以為比昔固測度以為婦人之詩予乃測度以為詩人之詩昔固測度以為美貞女予乃測度以為美君子或諷君子皆可也引而伸之三百篇如此類者不可以達觀之哉關雎孔子序詩必先之以國風者何也頌乃宗廟之樂歌而雅則朝堂之上燕享朝㑹及受釐陳戒之詞惟風自王都達之里巷各隨其風俗以形之歌謡如風之動物而廣被無方也序國風必先之以二南者何也風本善入而南為正離惟凱風自南則解愠阜財長養萬物故八風惟南最善而詩惟二南一出於正非若列國之風之多變也序二南必首之以關睢者何也知風之自閨門尤為風化之原關睢篇乃風化所自始如家人卦大象所謂風自火出是也然則關睢匪徒首二南首十五國孔子揭以冠三百篇者必有取爾也已是以孔子雅言詩而觀其以二南訓伯魚謂人而不為周南召南其猶正牆面而立也與今之二南具在也學詩者果何以為之而可以免夫面牆之失哉彼詩有六義興其一也詩不盡言言不盡意而其寓意于物者為無窮焉即如鳶飛戾天魚躍于淵向非中庸揭以發明費隠之道則詩人所咏亦若目前之景物云爾孰知其形容道妙寓意微奥有如斯也則是詩中之比興亦若易中卦爻之取象也茍不得其象而能得其詞與意者鮮矣豈若後人㸃綴風花烟栁以玩物適興已哉是故詩之首篇以關睢荇菜起興其詩夲平常雅淡而其寓意深逺乃一章之㫖要所涵蓄焉當于其興義得之斯善于詩也何也匹配為天地之大義人道之終始詩云窈窕淑女君子好逑所以咏歌文王后妃夫婦合徳而大雅謂其天作之合是也如徒以其詞焉雖長言之恐猶不足以形容合徳之善而詩人乃獨寓意于睢鳩特一羽族之微耳關關然和鳴于河洲之上其生有定耦而不相亂耦常並遊而不相狎故毛傳以為摯而有别列女傳以為人未嘗見其乘居而匹處者盖其性然也即此玩味之而君子淑女之合徳者可得于意言之表矣後二章又以參差荇菜起興夫荇菜特澗溪沼沚之毛耳然茍有明信可以薦鬼神可以羞王公其物雖微而其所係于薦享者甚重不得則薦内豆者無所獻如之何而不憂得之則職中饋者盡其誠如之何而不樂是以淑女之未得也寤寐輾轉之不寧其既得也琴瑟鐘鼔之偕作玩味于荇菜之興則憂也樂也一出於性情之正而無一毫情欲係于其中孔子謂關雎樂不淫哀不傷盖以此也即關睢而三百篇可類推矣且文王后妃之徳化一倡于關睢由此而葛覃樛木螽斯以及江漢汝墳之間莫不被其化而公子有麟趾之祥焉由此而鵲巢采蘩采蘋又有甘棠以溥其化而諸侯有騶虞之瑞焉風化所被自近及逺所謂刑于寡妻至于兄弟以迓于家邦其機有如此况由是而列國之詩雖多為變風然弼鄘皆首柏舟二詩亦皆善處夫婦之變者歴觀列國閨門肅則其國治閨門亂則其國衰信乎風化以閨門為首而君子之道由夫婦以造端也若夫豳居變風之末文中子謂其變之可正矣其實豳詩七篇皆周公詩也始之以周南終之以周公所以風動列國者不有所歸哉要之國風首關睢而夫婦之倫正小雅首鹿鳴而君臣之情通大雅首文王而天人之道著頌首清廟而幽明之感孚以此觀詩則不拘縛于字義之訓詁庻乎詩人之意與我相黙契矣鹿鳴天下地上為泰天上地下為否君臣天地也天地之卑高不可易君臣上下其可亂乎盖陽氣本上隂氣本下陽下于隂則天地交而萬物通上下交而其志同也茍陽自為陽隂自為隂則天地不交而萬物不通上下不交而天下無邦矣可見卑高者其等也其氣未始不相通上下者其分也其情未始不相洽詩小雅首鹿鳴深有取于地天交泰之義也夫人臣抱忠義之懐孰不欲自靖自獻願攄一得之愚以自表見然而卒不敢言者以君臣之分若天地懸隔孰敢披逆鱗以犯雷霆不測之威乎周王之于臣也至以嘉賔待之固所以尊之矣然于燕飲勸酬間必將之以禮必樂之以樂乃曰我有㫖酒嘉賔式燕以敖我有㫖酒以燕樂嘉賔之心是其尊之者一出于中心之孚而人之好我示我周行夫固其師臣之志也故以鹿之羣食夫苹也其鳴呦呦而可聴而我之燕飲嘉賔也不將有周行之我示乎感鹿之聚食以燕夫賔感鹿之和鳴以乞乎言所謂式燕以敖燕樂嘉賔之心無非表其精誠以為受教之地焉耳夫以天子之尊而賔禮其臣焉尊徳樂義學焉後臣之道本如是也惟天氣既為之下降則地氣必為之上騰君既屈己以下賢則臣必獻忠而納誨此亦感應之必然者故鹿鳴之歌興由是天保以下所以惓惓於報禮者自不容己凢魚麗南山蓼蕭湛露彤弓菁莪諸篇至今讀之見其君臣相與藹然明良喜起之風而當時太平氣象可想矣要亦有自來也武王克商下車之初詢常道於尚父而丹書獻訪彛倫于箕子而洪範陳至成王免喪即延訪羣臣乃曰佛時仔肩示我顯徳行而周召之所納誨者若七月卷阿之詩莫非周行之示也是求教臣工武王以之永清乎四海成王以之日靖乎四方夫固有周家法也小雅首鹿鳴其諸周庭燕羣臣之樂章乎書曰能自得師者王謂人莫己若者亡好問則裕自用則小于此益信雖然地天交則泰天地不交則否天地且然而况于君臣乎人之好我示我周行天子且然而况自公卿大夫以下至士庻人乎聴鹿鳴者盍自思之大雅嘗讀李白詩云大雅乆不作白其深明大雅之㫖矣乎三代而下如韓退之唐平淮西碑其于小雅猶庻㡬近之至于大雅豈特乆不作而已乎而大雅之義其不明于世也亦乆矣何也大雅篇什皆所以發天人之奥也雖後儒終生勤苦探索亦止能敷陳其理義云耳求其知性知天洞晰大雅之精奥者㡬何人哉試即大雅之詞詳玩味之文王在上於昭於天文王陟降在帝左右夫文王已没矣謂其神於昭于天理固如此也帝果有所在乎文王陟降在其左右果想像而言之亦真知其所在而云然乎神與帝俱猶有可信者然而天何言哉帝謂文王無然畔援無然歆羡誕先登于岸帝謂文王予懐明徳不大聲以色不長夏以革不識不知順帝之則帝果有言乎哉即皇矣一篇如帝省帝度帝耆帝作臨赫監觀究度眷顧其於上帝若親見其然者果測度其理必如此而咏歌之哉不然謂之為荒唐怪誕之說亦可也噫嘻是詩皆周公作也周公豈欺我哉况惟此文王小心翼翼昭事上帝盖其緝熙敬止不顯亦臨文王在宫在廟其所以刑寡妻至兄弟迓家邦莫非昭事之道也則是上帝文王相與感通殆有非常情所能測度者矣豈惟文王前此而誕降嘉種有相之道后稷之所昭事非上帝乎後此而上帝臨汝無貳爾心武王之所昭事非上帝乎且天生烝民有物有則天之所以生斯人者本如是也昊天日明及爾出王昊天曰旦及爾游衍天之所以監斯人者皆如是也神之格思不可度思矧可斁思則是事天之學得非斯人之所同乎明明在下赫赫在上天人感通之機㨗于影響自文王在上以至召旻篇什不齊莫非此意但是詩也向非周召衛武申伯大聖大賢亦孰能有此大雅之音也然則誦大雅之詩宜如之何盖上天之載無聲無臭至矣知中庸所以賛天載之至則知大雅之所以為大雅者端有在也故孔子謂天生烝民之詩而賛其為知道也雖然豈必一一言天言帝言俾爾彌爾性而後為性天之妙哉鳶飛戾天魚躍于淵自後之詩家觀之不過㸃綴景物之詞爾惟子思子一發明之昭明有融觸處皆道乃知於昭陟降即鳶魚飛躍之真機也果能小心昭事不愧屋漏而夙夜之匪懈焉則自求多福之道即于此乎在而矢音遂歌亦莫非大雅之音矣孰謂大雅終不可作乎頌詩集傳曰頌者宗廟之樂歌大序所謂美盛徳之形容以其成功告于神明者也今果以為美盛徳乎如雅之文王大明棫樸旱麓思齊皇矣諸章其所以美之者至矣果以為告成功乎如雅之江漢常武采芑車攻諸章所以告之者詳矣至于清廟之頌乃自顯相多士對越駿奔言之而不顯不承亦止一二言已耳歴觀諸頌皆然其所以美盛徳告成功反不如雅詩之詳且盡何也雅固升歌于朝廷未嘗不奏之宗廟而頌固宗廟之樂也振鷺有客謂二代之後來助廟祭臣工噫嘻豐年載芟良耜謂粢盛出之農事尚于祭祀有相關者若閔予小子訪落敬之小毖諸詩㮣為宗廟之樂歌可乎盖雅頌各得其所謂雅頌各有其體如既醉鳬鷖雖奉之宗廟而原非頌體如訪落敬之雖歌之朝廷終不可以為雅也然則頌之體維何其詞簡而㓗其㫖沉而静其音疏越而雋永宗廟朝廷均有頌也大約主于祭祀而交神明頌之道也敷揚先王之盛徳成功固不如雅詩之詳盡然聞清廟之頌顯相多士能無感乎聞維天之命曾孫能無感乎聞烈文天作辟公與其子孫能無感乎於乎前王不忘之音一入于耳而思及前王者不容己也噫嘻成王之㫖一惕於𠂻而思及成王者不容己也寓悚動儆惕之意於登歌祝頌之間使在朝在廟之人莫不精白一心以對越祖考洋洋乎如在其上如在其左右焉則先人之盛徳成功固已洋溢于升歌之表而人神懽洽幽明貫通此頌之所以為頌也書大傳曰周公升歌清廟茍在廟中嘗見文王者愀然如復見文王焉以此意㑹通諸頌頌豈有餘藴哉然魯侯國也有頌者何彼謂魯本周公後而不係之風者不使列之太師所以重魯重周公也非所以論詩之體也又謂風雅皆有變周頌奏諸廟魯頌奏諸朝周祀先魯禱君周以祭魯以燕周王而魯侯非變而何此又以朝廟祭享王侯不同而謂之變亦非所以論變體也周之臣工訪落得非朝乎魯之閟宫得非廟乎不知頌之體不以朝廟為正變也惟駉與有駜有似于風實非風也泮水閟宫有似于雅實非雅也魯四篇本皆頌體特以氣揚詞夸有似于風雅故謂之變頌亦可也雖然周之頌簡而文矣商之頌何其質周繼商而王而録商頌於周詩之末者反本也其實商亦頌體故以類附世之後先亦非意為之也是故論頌者惟于其體焉則諸說皆不待辨矣噫王之風非貶王也體本風也魯之頌非褒魯也體本頌也詩體有風雅頌之殊非雅重于風頌高于雅也因倂及之七月流火之詩周公訓告成王而作也註云七月夏七月也盖火心星退於七月萬古不易雖欲不謂之為夏正不可得也但以七月流火為夏之七月則三百篇凢所云時日皆當謂為夏正而詩即謂之為夏詩斯可矣如以周之詩咏夏之時此章歸諸邠公猶近似也然則二月初吉四月維夏六月徂暑六月棲棲十月之交將以為夏之時乎抑周之時乎要皆因周正建子之說誤之也非周正不建子也特改歲于建子之月以易乎朝㑹之期耳而其時與月未之改也春不可以為冬秋不可以為夏天固不能改乎時與月而聖人厯象日月星辰敬授人時雖欲改月與時以令臣民而有不能也曽謂武王周公有是事哉且不必他有所證試即七月一章觀之三之日于耜四之日舉趾春日載陽蠶月條桑四月秀葽五月鳴蜩六月食鬰及薁七月烹葵及菽八月載績九月築場圃十月納禾稼一之日于貉二之日其同十二月中天時人事恐前乎周而唐虞夏商後乎周而秦漢唐宋莫不然也曾謂周而獨不然乎先儒固以此為夏之時也然第五章云五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下穹窒熏鼠塞向墐戸嗟我婦子曰為改歲入此室處夫以十月而入執宫功將入此室處想夏時亦然豈夏時亦改歲于十月之終與咏而玩之似不必謂夏正也明矣知周特改歲於十一月而未嘗改月與時豈特七月流火九月授衣不當謂之為夏正而三百篇如六月棲棲十月之交諸篇俱可無疑也予嘗徧考之易書周禮春秋以證春王正月之誤故于此復詳言之以俟諸論世之君子云切磋琢磨學之一字千古聖賢明道立徳要法也凢有志之士孰不患其道不明徳不立哉彼用功不力者固不知學然優游歲月又不知所以進乎學如此而學焉或作或輟奚怪其不明不立猶故吾也試觀工人治骨角玉石尚象制器以利天下之用未有不求其工緻而滑澤者方其功未加也衆器之體質雖已備具不過塊然一頑梗耳及其功一施焉變化裁成俾骨角玉石各適于用是骨角玉石不能自成其器而器用之利必藉乎工人之能也夫人生長天地間祗自其形言之不過蠢然一血肉之軀與彼骨角玉石何以異也然良知良能則已畀于成形之始而道明徳立恒必由夫踐形之功奈之何憧憧逐逐迷蔽終生甘自朽腐棄玉石于岡山委骨角于溝瀆兹無論已間有志乎道徳者又皆躭虚寂宗自然不曰人性原無善惡則曰此性知能本良一或加功便渉人力稍有意念盡屬識情豈知骨角玉石之器不能自成而工人之技能孰敢鹵莽滅裂一蹴而致之哉彼治骨角者先之以刀鋸之切繼之以鑢鐋之磋其用力亦勞且苦矣然必如此而後骨角為有用也治玉石者先之以椎鑿之琢繼之以沙石之磨其用力亦苦且勞矣然必如此而後玉石為可珍也功深力到方圓小大成象成形引伸觸類何物不然人之為人何為獨不然哉雖然同一骨角玉石也又在工人之製噐者何如耳惟製之得宜或為天下貴噐而寳玩之者此也可為國家重器而世守之者亦此也不然則亦器之小者耳或極其工巧止可以供玩賞而不為大人君子所貴重者亦多矣不亦甚可惜哉噫今之論學者謂本體即是功夫或認現在享用良知或尋樂體玩弄精魂既不知痛自克責懲窒以變化其氣質又不肯深自思維究竟以洞徹乎性天堯舜以上其善無窮一息尚存此志不容少懈仲尼老且發憤忘食顔子竭才欲罷不能豈虚語哉盖亦非謂本體之自然者為不當順于骨角玉石外别用雕鏤之巧也正以涵養徳性不可不加夫問學之功切磋琢磨斯可以利乎骨角玉石之用衛武髦年猶日勤箴警此所以不愧淇澳之詠也是故學者果欲道明徳立必思反身切磋琢磨而後可儀一心結心在身中莫不知之矣身在心中咸莫之知焉何哉人身中血氣凝結銳上而排下者謂其非心不可也有象可覩莫不信之然此特神明之舍也若夫至虚至靈為一身之主宰在目為視之明在耳為聴之聰在口為言之從在體為貎之恭臟腑爪髮凢有形者莫非無形者以為之統攝謂身在心之中也非與况周流六虚變動不居倐忽間或在几席之前或在萬里之外或在千百世之上下天飛淵沉莫測端倪雖强有智力有術數者莫得而拘執之心之神妙若此欲其凝聚身中渾然如結也難矣詩云其儀一兮心如結兮有味哉善形容身心合一之學哉但禮儀威儀三百三千其形諸一身者若此其繁何以謂之一也周旋折旋中䂓中矩升降進退可象可威其協諸禮者何其一乎心之應感靡常何以謂其如結也危微操舍存乎其人結則一致散則萬分故念慮旁雜精神紛擾由事物交接日與心鬬如馳騁遊騎莫之歸宿晝焉放逸于識情夜焉奔軼于魂夢安得常如結哉可見結則一也所以不曰心結而曰如結云者不二以二不參以三精神念慮凝聚堅固正目視之無他見也傾耳聴之無他聞也如猫捕鼠如雞覆卵如舟子之操舟渉江海遇風濤惟舵是操不得知其他也商書以禮制心周雅無貳爾心兹可證矣夫惟其心之一也則隨其身之動履整齊嚴肅較若畫一而民之表儀即于兹乎樹焉在家足以儀刑乎一家在國足以儀刑乎一國在天下足以儀刑乎天下真所謂其為父子兄弟足法而民法之也或曰心活物也操之至如結焉得無束心之太廹乎曰擇乎中庸得一善則拳拳服膺而勿失亦可以急廹疑之否觀知及而非仁守則雖得必失而如結可懸解矣知及仁守必莊涖動禮而如結儀一可意㑹矣矧謂之如結則百慮一致非專守念頭以結胎也謂之儀一心結則心正身修非徒致飾于動容儀節間也其儀不忒謂之正是四國胡不萬年則正己而物正一身足以植萬年之法則非徒攝意念飭行檢生無益于時死無聞于後者可倫矣是故誦鳲鳩之全篇而益信乎身心合一之學出幽遷喬脫凡近以遊高明者莫急于擇善資麗澤以求上達者莫先于擇交何也凡人甘自暴棄固本于無志然亦未嘗無朋交也觀其日與徵逐者匪燕游狎僻之陋即貨利聲色之華羣居黨集矇然莫覺設有談道義倫理于其側者不鄙之為庸愚則嗤之為誑誕此其在一人也非一朝一夕之故在一國也非一鄉一邑之弊大抵世之積習使之然也何怪高明鮮人哉盖必豪傑之士不肯以凢流自居識超志卓雖一技能且不肯以擅長標名則必以千古聖哲為歸宿矣又肯安然于樊籠羅穽中哉但學必須友以成其徳而友必勝己者斯可以聨其交故曰毋友不如己者懼其志趣卑暗好行小慧匪徒無益而幽僻中垢一或䧟溺其身能自振㧞者鮮矣嘗誦小雅伐木章于出幽遷喬有深省也詩云鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲矧伊人矣不求友生諷詠間豈徒有感于求友之一端哉盖凢有志之士孰不欲遷善改過以求首出乎庻物又孰不思得良朋以自輔翼但既云良朋必不肯聨交于下流之夫也友也者友其徳也我擇人人豈不擇我乎故云一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士志同道協聲應氣求風虎雲龍不期自合而有朋自逺方來必本于時習之學也况友天下之善士猶不足以滿其願而必欲尚友千古此其出幽遷喬豈猥瑣庸流可得而忖度其識量哉夫鳥之求友必遷夫喬木而鳥之遷喬必出夫幽谷是幽谷之出鳥自出也喬木之遷鳥自遷也友聲之求鳥自求也可見鳥之求友必非睍睆于幽谷之中凢友之求者必羣集于喬木之上今即其出幽遷喬則知鳥之能擇善矣即其遷喬求友則知鳥之能擇交矣夫何人之論友道者不過杯酒洽情貨帛將意已耳况富貴之徒自矢志功名者視之不啻幽谷之卑汚而功名之士又自以為遷喬木焉安能與道徳之品相砥礪也然則出幽遷喬謂非求友之先務哉雖然因鳥以自警尤有甚焉者色斯舉矣翔而後集鳥之知㡬為何如也綿蠻黄鳥止于丘隅鳥之知止為何如也是丘隅之止且不徒為喬木之遷色舉即翔則尤敏于幽谷之出故孔子曰於止知其所止可以人而不如鳥乎是故知止至善必不能忘情于友生也報徳罔極天之大徳曰生故論徳之罔極者必歸諸天也以天徳之大而欲報之難矣子之于親雖莫不受其鞠育之恩若難乎與天並也然得天地之塞以成形而所以成其形者非親乎得天地之帥以成性而性即秉于賦形之始所以成其性者非親乎蓼莪之詩哀父母之劬勞而欲報其徳謂如昊天罔極者以其生我鞠我拊我畜我長我育我顧我復我出入腹我若止言乎我之形骸已耳其于天親罔極似未之盡也然形性合而成人有是人即有是形有是形即有是性形性本不相離天親原自合一以其生生者一也所以孔子謂修身以道修道以仁仁者人也親親為大孟子謂不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也觀參于易簀時啟手啟足以示門人子夏下堂傷足數月尚有憂色何也身體髮膚受之父母不敢毁傷而保親之遺體不敢不敬必于其全而生者悉全而歸之斯可謂之孝也已知此則知詩人所謂罔極之徳不越乎父母生鞠之外而口體甘㫖之奉特孝養之一端耳不足以盡其欲報之恩焉故云蓼蓼者莪匪莪伊蒿匪莪伊蔚正以及其壮且老也非復始生之美其所哀哀者何可勝言又云瓶之罄矣惟罍之耻至于生不如死則其所深耻者不有出于怙恃之表者乎或問形色天性踐其形即所以盡其性也窮神善繼其志知化善述其事而踐形惟肖果在天為肖子即為父母之孝子與欲報之徳謂其猶天之罔極可也然徳之報尚可勉而能也天徳罔極亦可報與曰人生七尺之軀自昊天視之不過一塵一芥云耳然而此性之大彌綸六合包含萬象浩浩乎窮之莫盡其量淵淵乎測之莫得其朕即於穆不已之天命也在天為命在人為性其如性本大而人自小之何于此真信不疑信乎天以此罔極者而生我我即全此罔極者以報天而報親即所以報天也所以孔子謂君子修身不可不思事親是知人知天又謂能敬其身則能成其親仁人之事親也如事天事天如事親是故孝子成身此之謂也昔晉王裒毎誦蓼莪涕泣沾襟弟子為之廢講盖子之慕親有感即動是篇一字一淚情見乎詞讀是詩而不涕淚者非人子也信哉詩可以興小心昭事廣大高明覆幬無外所以主宰于其上者帝也聰明知慮應感不窮所以主宰于其中者心也在天為帝在人為心其理一而已矣試觀日月星辰水火土石飛潛動植何一非天茍非帝以宰之則時行物生不將亂其紀乎耳目口體臟腑血脉經絡爪髪何一非人茍非心以宰之則作止語黙不將紊其緒乎然亦非天自天人自人兩不相關渉也盖岐天人而言之人之生也一皆在乎上帝主宰中若真信夫誠者天之道誠之者人之道盡人正以承天則知天人原自通一無二文王小心翼翼昭事上帝人一天矣然事之云者豈齋明盛服以承祭祀如郊以事天明堂以饗上帝之謂哉又豈若晝之所為夜必焚香以告天者可擬之哉盖文王之事事之以心也心粗則氣浮心散則思雜心怠則念馳惟翼翼然緝熙敬止而此心極其小也雖不顯而亦臨雖無射而亦保朝乾夕惕無一息一念不與上帝相為對越雖謂文王之心即上帝主宰于其中焉亦可也故曰不識不知順帝之則夫文王之生也惟帝則之黙順斯其沒也一陟一降無時不在上帝左右又何存亡之間也然小心以事之而謂之昭事何與由此心不能惟精惟一虚靈窒塞馳騖紛擾既以失其神明之體安足以語懋昭之學若文王則敬以直内故昭明有融帝謂文王予懐明徳而文王之所以克明徳者恪遵乎帝訓此其事也昭以事之及其沒也於昭于天夫復何疑凢所謂明明在下赫赫在上有周不顯帝命不時而新乎舊邦之命者一根諸此耳雖然小心昭事豈獨文王為然周祚肇自后稷曰帝命率育太王曰帝省岐山王季曰帝作邦作對帝度其心一脉相傳盖有自也傳之武王曰上帝臨汝無貳爾心傳之成康曰上帝是皇逮周公曰我亦不敢寧于上帝孰非昭事之家法哉帝心簡在明昭有周可黙識矣然則後學誦法文王當如之何盖天道若此乎高明廣大而莫非上帝以為之主宰則不宰之宰其機甚微非小心不能以相通也况此心本自一物不著而無主則淪于無本自萬物皆備而有主即滯于有惟小心以昭事乎上帝雖無形聲可覩聞而臨下有赫實無物不有無時不然此心之神明惟帝是依有而未嘗有也一身之耳目口體臟腑經絡咸有所統凢宰制萬變不特私欲不能為之擾雖情識意念不能為之參一切奉帝則以周旋而一毫人力之莫與矣何簡易如之故盡心知性以知天存心養性以事天而存文王即所以存乎上帝之神不識不知凡生天地間者有血氣之屬必有知有知必有識而人為萬物靈獨無知識乎哉良知學知雖不齊其知一也然而必有自焉惟皇上帝降𠂻下民厥有恒性自有生以來孰不知饑寒孰不識父母雖人人完具靈明烱然在中而正目視之無形可覩傾耳聴之無聲可聞故不可謂之有及其事物形聲之一接則各有所知各有所識又不可謂之無無知無不知無識無不識雖無尺度權衡之形而短長輕重烱然秩然此帝之則也即帝降之恒性也夫性一而已矣而有識知之别何與知以知來識以蔵往一物而二名故良知不事乎學慮黙識不假乎見聞而見聞學慮莫非知識要之莫非上帝之降𠂻此所以帝則之當順也但人生而静天之性也感物而動性之欲也物至知之始焉因知以生識繼焉縁識以起知性之寂然不動者反為外物所引誘矣輾轉起滅憧憧往來故其知也既為物誘引之于前而聚之為衆有其識也又以物誘藏之于後而塞其所本無彼聰明不逮者固為氣稟所拘縳矣稍有靈慧者各以意見開通徑竇或探賾索隠窮高極逺莫不自以為知或博聞强記獵古搜今莫不自以為有識也此其所知所識一出于見聞思慮未免雕刻乎貞元鑽鑿其渾樸以人力勝天工則性真反為之桎梏而帝則淆亂矣所以不識不知順帝之則匪文王其孰能之試觀其聲色不大夏革不長畔援歆羡之皆無翼翼勉勉惟小心以昭事乎上帝故不聞亦式何假乎識也不諌亦入何庸乎知也即如庻獄庻慎亦罔敢知伐密伐崇惟帝是命王赫斯怒怒以天下已無所怒於樂辟雍樂以天下已無所樂所以道岸誕登純亦不已文王其即天乎順帝則以為知識文王無知知以天也文王無識識以天也所以不敢自作聰明而為天聰明之盡也是文王與天為徒豈逺人以為道乎即其為人君父為人子臣與國人交而一止乎仁敬孝慈信焉可見仁敬孝慈信乃人性之至善即上帝之降𠂻五典天叙五禮天秩惟文王為能止之順之耳嘗觀之論語曰吾有知乎哉孔子亦自以為無知也汝以予為多學而識之者與非也孔子亦自謂非識矣但雖曰無知却曰五十而知天命知我其天此孔子所以不踰矩也信孔子則信文王矣易曰乾元用九乃見天則又曰乾知大始乾以易知易知即天則也果自冺其知識而洞澈乎知大始之乾元則日用莫非天則之顯見文王我師豈欺我哉有覺徳行知行之說其來舊矣分之為二者必欲先知而後行又以為行難而知易合之為一者既認真知即是行且以為行易而知難嘗以此反之于身而體貼乆之本一而二焉何待人之分二而一焉亦何待人之合自彼認識見以為知而不肯反躬實踐規之以力行之艱可矣若謂行難于知固於知體未透自彼不自著察而㝠行以自是者則當以知難責之俾其求進于明焉而率意妄行乃謂行之易易者其亦未嘗深省夫躬行之不逮與嘗于大雅抑抑威儀篇深喜其言之約而盡焉詩曰有覺徳行盖以覺而不行是謂空行不可以語徳性之真知行而匪覺是謂㝠行烏覩庸徳之行皆所以明明徳哉易繫辭曰乾以易知坤以簡能知能分属乾坤謂之二者非與易則易知簡則易從夫不曰簡行而曰易從是從即從夫知也謂之一者非與又玩乾坤二卦爻象竒畫三爻已成下卦之乾體矣曰知至至之知終終之夫知至知終乾也至之終之非坤乎偶畫三爻已成下卦之坤體矣曰或從王事無成有終象曰或從王事知光大也文言曰地道也臣道也妻道也地道無成而代有終也盖以地必從天臣必從君妻必從夫而坤亦不過代乾以有終耳一乎二乎何待辨而後明也且即據此以詳究衛武之學曰視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧於屋漏合隠顯而一之其致力徳行者亦既宻矣又曰神之格思不可度思矧可射思思者聖功之本必欲通乎神明之徳此非真有覺者何其言之洞澈一至此哉後云誰夙知而莫成有覺徳行亦不待他訓釋矣故大學引淇澳篇以證明明徳止至善迺申之曰如切如磋者道學也如琢如磨者自修也皆此意也或曰佛者覺也儒書從先覺後覺外他何所證耶曰說命篇有云徳修罔覺亦可以大之意訓之哉人皆夜暗而朝覺神氣交而合則寐神氣開而醒則覺從之天將明而人皆覺焉日用常行雖皆從覺寤中行特不能自覺乎性覺之真體固不可以稱有道之顯徳行也是故以衛武而稱之曰叡聖兹于有覺徳行之言而益信有物有則學者蔽于見聞豈徒承襲師說堅不可破即大學首篇前云物有本末後云致知在格物先儒各有定訓矣但既云物猶事也窮至事物之理此物專指有形者言矣明明徳為本新民為末朱子亦未嘗不以明徳為本也明徳亦有形乎胡為乎牿于下文之物格并上文明徳為本之物莫之㑹通也大雅烝民篇曰天生烝民有物有則民之秉彛好是懿徳是物也即本文之秉彛懿徳不專指有形言也明矣朱子釋之云自百骸九竅四體而達之君臣父子夫婦長幼朋友無非物也而莫不有法焉如視之明聴之聰貎之恭言之順君臣有義父子有親之類是也試合本篇下文詳玩味之又有不待訓釋者在夫云仲山甫之徳柔嘉維則可見柔嘉之徳即物則也不可以形求也未已也令儀令色小心翼翼古訓是式威儀是力統一身之間有形無形何一非物則乎未已也天子是若明命使賦以至式百辟保王躬出納王命賦政四方保身事君不吐剛茹柔而總歸諸徳輶如毛此其所謂物則者與大學合致知誠意正心修身齊家治國平天下而總謂之物格似無異義胡為乎詩之所謂物則舉信之勿疑矣廼獨疑大學之物格也又胡為乎舉信明徳新民之為物矣廼獨致疑于物格之物也要皆梏于舊說莫肯脫然于文義外直從敦化川流之原以究竟之耳雖然一物各具一太極予今所言亦不過自詩與大學之章句而合論之茍觀其㑹通于萬物統體一太極者得意忘言洞然于物則之義而格物之學當有渙然冰消霧㪚者矣他經書言物不專指有形者最多惟有物有則併格物物格而統言之幸有此詩可徵也故併舉之以觀其㑹通云於穆不已窮理盡性以至于命聖學之極則也茍不知命不特終身貿貿焉無所底止謂之知性可乎性有未知謂别有物理當窮究焉志性命之學者可如是乎但世之學者舉凡言寂言虚言無言静者莫不曰此𤣥談此禪詮也然則聖人之學果專于典禮紀法儀文度數之顯設乎不知喧寂虚實有無動静即道之一隂一陽費隠微顯不貳不測不可以一偏言也詩曰維天之命於穆不已若專自虚無寂静以言天矣然非離四時百物以言於穆亦非離時行物生以言於穆不已也何也天之象浩浩乎高大而不可窮也天之運悠悠乎廣逺而不可禦也天之覆幬林林乎衆多而不可紀也然其所以斡旋者孰樞紐是孰綱維而推行是盖有天之命存焉渾兮闢兮其無垠兮杳兮㝠兮其無朕兮非人之精神心知可得而測度也自昭昭以及無際凡在其中者如日月星辰之運行寒暑晝夜之往來山河土石之奠麗尊卑貴賤之等列窮通壽夭之同異鉅而六合微而纎塵莫非天命以為之宰制而流行焉二氣五行參差雜揉鬼神造化卷舒乘除雖巧厯不能致其算聖哲不能殫其藴將以為有體也瞬息間變動不居何其疾乎將以為無定在也司化握機栽培傾覆一定不爽若有為之劑量而節裁焉者從開闢以來無頃刻間歇謂之非虚而無寂而静也何為莫得其端倪而思議之哉此乃性理之根源窮者窮此盡者盡此至者至此特不離日用常行人情物理而一循乎天命之性非二氏習静歸寂專事虚無者比所以為聖門中正之學也觀中庸論至誠無息博厚高明覆載生成總以於穆不已之天命結之且曰天之所以為天也程子曰聖學本天真知言哉夫學無徵不信中庸因論天命之謂性而徵諸詩正以見性即於穆不已之命也予今因論於穆不已之命而取證中庸正以見盡性者當求明乎於穆之命而盡人以合天修徳以凝道也然穆穆文王當何以儀刑之哉必也戒懼乎不覩不聞敬信乎不言不動庻㡬于純亦不已有從入之方矣安得專精于虚無寂静者從事乎倫物又安得勞心于載籍事功者致力于性命與之共明乎天人合一之學緝熙光明嘗誦大學之道在明明徳且歴引康誥太甲堯典總之曰皆自明也是明徳乃其本體自明即其功夫明之一言足以盡聖學矣及誦詩曰學有緝熙于光明不可以見古人無二學哉朱子曰明徳者人之所得乎天而虚靈不昧以具衆理而應萬事者也盖人心惟虚故靈惟靈故不昧所以形容明體者亦既盡矣且云人之所得乎天何哉凢言太虚言神靈言昭明不昧者莫踰乎天所以詩人首云天維顯思正此意也惟知天之顯則知人心之光明丕顯有自來矣然則人匪光明不可以語人徳匪光明不可以語徳學匪光明不可以語學而大人之學惟在明明徳天道本如兹也且成王之學得諸家傳緝熙敬止小心昭事而稱至顯必歸諸文王者此也故成王曰維予小子不聰敬止日就月將學有緝熙于光明不可以觀周家之學脉哉且文王純亦不已先天而天不違後天而奉天時文王一天也天道下濟而光明陟降厥士日監在兹及爾出王游衍雖欲戲渝馳驅而不可得所以光明之體其原諸天者雖人人同惟成王則學專主敬俾日有就月有將于以緝而續之如日月之代明繼照無瞬息間斷熙而明之如日月之普明中天無纎毫昏翳炳炳煌煌光明全體復還其初學必如此斯可以言學也所以當時頌之者曰成王不敢康夙夜基命宥宻於緝熙殫厥心曰不顯成康上帝是皇奄有四方斤斤其明學必以光明為歸宿也豈虚語哉或曰明心見性禪宗之正脉大光明蔵佛典之真詮子論學而有取于光明不有類乎禪耶曰緝熙光明豈獨詩人言之易曰履帝位而不疚光明也動静不失其時其道光明言不期同而自無不同同此性體故耳矧同此大光明蔵也佛從一毫端放大光明普照十方轉大法輪而悉歸諸寂滅儒學則藴之為明徳顯之以明倫而必欲明明徳于天下國家不可以揚性天之耿光哉或又曰光明以言其體也緝熙以言其功也舉詩證學功夫即本體一言蔽之矣光之與明得無别耶曰光于四方者文王也一本諸克明徳光被四表者堯也一本諸克明峻徳即孟子所謂日月有明容光必照明其體也光其用也體用一源庻㡬乎至善之止矣近世良知之學實根諸此而緝熙之功非其所當亟講者乎稷契聖人亦人也聖人之生也天或縱其聰明睿智之資以宏其開物成務之績生有自也出有為也此理之必然者若以奇怪論聖人降生之異窮理君子當聞言而即決之矣子不語怪雖有之且不語也况取奇怪之事垂訓萬世而謂之經乎一有不決遂至誣天誣聖誣經以誣後人之耳目非孔子删述意也是故或有問稷契二聖人之生最為希奇然與否與予曰何為其然也曰予每據經論世其在周雅有曰厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷其在商頌有曰天命元鳥降而生商宅殷土芒芒先儒謂其履巨人跡而生稷吞鳦卵而生契也其亦謂之非經典乎曰如此而據經是叛經也是誣經也善說詩者不以文害辭不以辭害意不善說詩者大以己意害文辭也何也雅頌二傳皆謂其祈祀郊禖固有然者而一詩之中帝與上帝可無辨乎第三章曰上帝不寧第八章曰上帝居歆是上帝指天而帝乃高辛氏也姜嫄即高辛氏妃郊禖之禮必帝與妃同所謂履帝武者得非妃履帝之武哉踵歩以行禮將以速歆乎上帝觀前曰敏歆後曰居歆前後相應歆字可以意㑹何為而謂帝即上帝也惟其謂帝即上帝故以帝武為巨人跡而以敏歆為歆歆然如有人道之感反摭麒麟蛟龍之異以神其說不惟誣聖人而其誣天也特甚矣然則曷為誕寘隘巷也誕彌厥月先生如達不拆不副無菑無害居然生子此所以棄之也鄭姜寤生荘公而終身惡之亦若有同然者胡為乎以其棄之異即以足跡而誣天也耶若元鳥之詩謂春分元鳥降正郊禖時也簡狄郊禖于元鳥降時孕而生契故詩人歸之天命云爾又胡為反據此詩以証吞卵之妄耶噫嘻一則以天跡之巨而敏歆一則以鳥卵之㣲而誕降暌諸事理果可信乎儒者當惟理是從况有經文可據既不能據經以熄邪說而反引邪說以誣聖經即此事理與經文至顯明者且繆妄若此則凢依違近似以己意傅㑹穿鑿又何可勝言箕子衛武公道無順逆也非道則逆而困道無老少也非道則老而衰盖順逆者遇也老少者年也貫通乎老少順逆而貞夫一者道也無志于道者無論已雖矢志斯道且有難為力者盖以順則意氣舒而逆則氣易折也少則精氣壮而老則氣漸衰也茍見之不真執之不固而養之無素則志不足以帥氣欲其患難皆順境耄耋如壮夫與時偕行與日俱新也難矣哉嘗于商末得一箕子周末得一衛武公其于道脉皆大有關繫也何也箕子之處常不可得而詳觀于其變而常可知矣衛武少時不可得而詳觀于其老而少可知矣故箕值紂惡方稔目覩刳孕之慘炮烙之酷而四海民不堪命商祚岌岌乎不可旦夕留矣斯時也身為宗臣既不可皆為微子之去又不可盡為比干之死乃佯狂以晦其明焉身可辱也可困也可奴也與道合貞萬變不能為之挫也此豈止于忠臣智士之為哉甯武子公孫杵臼狄仁傑皆能為之矣易獨稱其蒙難正志貞明不息何也嘗因武王以道咨訪而陳洪範焉如五行五事皇極福極天人感應之際了然如指諸掌非學貫天人能之哉若曰隠忍以觀時勢之變則亦知箕子之淺淺者耳衛武年已九十五矣猶箴警於國曰自卿以下至于師長士茍在朝者無謂我老耄而捨我必恪恭于朝夕以交戒我故在輿位宁依几居寝臨事宴居史矇皆訓御之如左史倚相所記果足以盡其睿聖之稱哉思曰睿睿作聖恐未易言也盖惟其有切磋琢磨之功是以有金錫圭璧之徳惟其有圭玷僭賊之戒是以極温温抑抑之純至于相在爾室尚不愧于屋漏中庸引以發明性道而道學自修恂慄威儀大學推其民不能忘想皆武公之實徳斯足以垂訓無窮也所以孔子删述六經獨存洪範于書存淇澳賔筵抑于風雅皆道脉所係也可見箕子之道不以逆而變衛武公之道不以老而衰也况人見箕子之難箕子不自知也人見衛武之難衛武不自知也至今誦其詩讀其書想見其人如書曰無有作好遵王之道無有作惡遵王之路曰沈潛剛克高明柔克如詩曰無競維人四方其訓之有覺徳行四國順之曰神之格思不可度思矧可射思孰非道之所關係哉雖然以順逆老少論難易正謂人當終始一于道也不然少之時血氣方剛鮮有不用壮而敗事者及其老也閱歴多操練熟而徳慧術智非少壮比也渉逺者不敢逞轡于羊腸駕舟者不敢揚㠶于巨浪至覆舟順風蹶足坦途滔滔皆是矣志道者可以一時一事乘之以慢易之心哉思無邪思本心之官萬事之權輿也官得其職則事皆得其理官失其職則事皆失其理至百姓勸懲則又皆由官司秉正致之也茍以勸懲為百姓之官各得其職有是理哉子曰詩三百一言以蔽之曰思無邪夫以三百之詩而總歸諸無邪之思則思當自作詩者言非專為讀詩者發也明矣若云凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸于使人得其情性之正而已是謂詩有善惡其思未必無邪惟誦詩者因其善惡而懲創焉斯可無邪思也夫好賢如緇衣好得其正也惡惡如巷伯惡得其正也因好善惡惡之正而有所感創則是感創本于詩人好惡之正而以正感正謂之皆無邪焉可也以此觸類三百篇亦可也茍專以無邪歸諸誦詩之人雖得詩之用而昧詩之體不并孔子說詩之意而失之哉說者曰子謂三百篇一出無邪之思意則善矣以此歸諸頌當無異論而二雅且有不盡然者如小弁未免以子怨親菀栁未免以臣怨君白華未免以妻而怨夫也三綱之主亦可以相怨乎猶可言也至于國風則二南豳詩外如弼鄘衛鄭諸國其詩多淫詞矣信若子之言彼詩人之好色者亦謂其無邪思耶是說也正以列國多淫風故以無邪歸諸感創之人也然三百篇未删已前其篇什之多不知㡬何孔子縱欲取其可為鑑戒者以垂訓亦不必多取淫詞以懲創人也且謂鄭國淫辭為獨多又引鄭聲淫以證之然謂其聲淫耳非指其詩言也如緇衣羔裘雞鳴東門皆善之善者而風雨思賢也子衿不悅學也野有蔓草致美也孔子誦之以美程子華亦自可證其他狂童之語皆托以致刺耳今以千百年後斷千百年之前安見其皆出于淫也舉鄭則他國又可知矣借曰中有淫詞雜焉或亦為刺淫作果刺淫不足垂戒必淫人之口而後可以垂戒乎哉又安見非秦灰後或雜逸詩以足三百餘篇之數也若夫孤臣孽子不得于君親棄婦不得于其夫或形諸咏歌一出于真誠惻怛之情焉故孟子謂小弁親之過大者也親之過大而不怨是愈疏也愈疏不孝也即小弁而餘不可類推乎可見思乃聲詩所由起詩三百篇皆發乎無邪之思也美善者無邪刺惡者亦無邪而善可感發惡可懲創則又皆統括于其中矣奈何孔子删詩止存三百餘篇本欲存無邪之詩以垂訓後人乃遂以無邪歸諸誦詩之人豈聖人意㫖哉嗟夫詩不明一至此哉不論詩之邪正善自可以示勸惡自可以示懲孔子又何以删為哉果如俳優詞曲聞其忠孝節義者自足以起人善心聞其艶麗淫蕩者自足以消人惡念詩亦如斯而已爾則又何取乎三百篇之詩哉又何怪乎騷人墨客動輙藉口于風人之態度也說詩嘗聞删後無詩予謂自孔孟後并說詩者無其人矣非無詩也亦非無說詩者惟其辭不惟其意故總謂之無孟子云王者之迹熄而詩亡即子夏詩序先王以是厚人倫美教化移風俗之謂也凡詩人之咏歌非質言其事也毎托物表志感物起興雖假目前之景以發其悲喜之情而寓意淵微有非恒情所能億度之者况其言雖直而意則婉亦有婉言中而意則直也或其言若微而意則顯亦有顯言中而意甚微者故美言若懟怨言若慕誨言若愬諷言若譽要之一出于性情之正故孔子謂其可興可觀可羣可怨可以事父事君可以從政専對莫非綱常倫理所關係也自三百後求詩之可存王迹厚人倫者誰與孟子曰故說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也嗚呼後之說詩者孰不如其辭而已哉向非孟子善說詩又孰信詩皆無邪之言而謂三百篇中多淫辭哉且詩可以興必其感發興起超然于文辭外也故聖門諸賢獨商賜可與言詩曰起予曰告往知來莫非興起于言詞之外者後之人胡為乎滯泥于習見習聞卒莫之悟耶試即七篇中說詩之類觀之如經始靈臺則謂其與民偕樂而不滯乎臺池鳥獸之辭也刑于寡妻則謂其舉斯心加彼而不滯乎咏歌文徳之辭也王赫斯怒則謂其一怒安民而不滯乎整旅遏密之辭也乃積乃倉則謂其好貨與百姓同而不滯乎公劉遷豳之辭也爰及姜女則謂其好色與百姓同而不滯乎太王遷岐之辭也自西自東則謂其心悅誠服而不滯乎武王建辟雝之辭也迨天之未隂雨則謂其及時明政刑而不滯乎周公鴟鴞之辭也雨我公田意在雖周亦助也曽為大田篇章之所泥乎周雖舊邦意在新子之國也曽為文王篇章之所泥乎戎狄是膺意在子之不善變也曽為閟宫篇章之所泥乎不愆不忘意在遵先王之法也曽為假樂篇章之所泥乎他如殷鑒不逺誰能執熱載胥及溺娶妻如之何永言孝思天生烝民小弁凱風不素餐兮憂心悄悄肆不殄厥愠凡其所說何莫不然可見孟子之說詩與孔子許商賜可與言詩者一也自孟子後說詩者非一家求其得意言外不為文辭所拘縛者又誰與或曰說詩必如孟子斯善矣然則詩無定論惟在人各以意而㑹之歟曰詩言志后䕫言之矣是以作詩者皆起于意而意寓于辭實不盡于辭也要在以意逆志是為得之果能反覆涵泳頓然朗悟而得乎作者之意則胸次豁達無往非詩而說詩又當于篇什之外引伸觸類不溺其辭不失其意是之謂善說詩也不然徒以沉滯意見解釋其章句而且以義理傳註其文辭如彼汾沮洳園有桃皆實語也反以為興摻摻女手可以縫裳本寓言也反以為實談不止此也如將仲子兮叔于田貳章鄭人本以刺荘公也而辭則為叔段咏焉今誦其辭逆其意得非寓刺鄭荘之意於愛叔段之中乎楊之水椒聊之實晉人本以刺昭公也而辭則為桓叔咏焉今誦其辭逆其意得非寓刺晉昭之意於美桓叔之中乎敝笱猗嗟齊人本以刺㐮公也而辭則指魯桓及魯荘焉今誦其辭逆其意得非寓刺齊㐮之意於刺魯桓莊之中乎魚藻本刺時王之崇飲也如以其辭信乎美天子之燕飲矣車牽本慕賢者之徳音也如以其辭信乎美新婚之燕樂矣民勞與板本以刺厲王之不敬天恤民也如以其辭信乎僚朋之相戒矣此其故何也誦詩讀書當論其世或時所難言或勢不敢言每借虚以為實托此以形彼而說詩者不悟其意本婉言也反直言之本托言也反質言之本微言也反顯言之中間凢托為婦人女子之辭者即信為實言而假游女静女為比喻者又皆指為淫詞使作者之志意咸晦塞而不達矣盖惟不能以意逆志故不免逐響尋聲而詩人之㫖無復存也又安望如商賜告往知來以起予哉故特因孟子論北山之詩而表章之以為萬世說詩之法圖書編卷十一
