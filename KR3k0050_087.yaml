body:
  text: 圖書編卷八十七明章潢撰田賦總敘古之帝王未嘗以天下自私也故天子之地千里公侯皆方百里伯七十里子男五十里而王畿之內復有公卿大夫采地祿邑各私其土子其人而子孫世守之其土壤之肥磽生齒之登耗視之如其家不煩考核而姦偽無所容故其時天下之田悉屬於官民仰給於官者也故受田於官食其力輸其賦仰事俯育咸得其所而無甚貧甚富之民此三代之制也秦始以宇內自私一人獨運於上而守宰之任驟更數易視其地如傳舍而閭里之情偽雖賢且智者不能周知也守宰之遷除歲月有限而田土之還受姦敝無窮故秦漢以來官不復可授田而田遂為庶人之私有亦其勢然也雖其間如元魏之泰和李唐之貞觀稍欲復三代之規然不久而其制遂隳者蓋以不封建而井田不可復行故也三代而上天下非天子所得私也秦廢封建而始以天下奉一人矣三代以上田産非庶人所得私也秦廢井田而始捐田産于百姓矣秦於其所當與者取之所當取者與之然沿襲既久反古實難欲復封建是割裂上之土字以啓紛爭欲復井田是強奪民之田畝以召怨讟書生之論所以不可行也隨田之在民者稅之而不復問其多寡始於商鞅隨民之有田者稅之而不復視其下中始於楊炎三代井田之良法壞於鞅唐租庸調之良法壞於炎二人之事君子所羞稱而後之為國者又莫能變其法一或變之則反至于煩擾多事而國與民具受其病則以古今異宜故也治地事宜凡尺度皆從人身起寸指節也尺臂長也尋伸臂而上也約以中人十寸為尺十尺為丈倍丈為引八尺曰尋倍尋為常布帛尺十二寸者天數也周尺尺六寸四分洛陽測景臺之制猶存其度起黃鍾故短步武半步曰武二足所履二武曰步兩足所張六尺為步此人身自然之度量日用之自古及今未之有改王制云古以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步東田謂山東之國以關中在西而言也此不過周末權度不審故有此謬夫步生于足謂步有不同足亦有不同乎鄧展曰古者百步為畝漢時二百四十步為畝古千二百畝則得今五頃趙氏曰古以百步為畝今以二百四十步為畝古百畝當今之四十一畝也桑𢎞羊曰古者制田百步為畝民井田而耕什而藉一先帝哀憐百姓之愁苦衣食不足制田二百四十步而一畝率三千而稅一文王在岐用平土之法以為治人之道地著為本地著謂安王故建司馬法六尺為步步百為畝畝百為夫夫三為屋具也屋三為井井十為通通十為成成十為終終十為同同方百里同十為封封十為畿畿方千里故丘甸提方不同而出戎馬牛兵車甲士各有差以為百乘千乘萬乘之别按馬端臨氏以為文王治岐耕者九一即司馬法也此恐商之末季法制隳弛故文王因而修明之耳不然文王豈遽自立千乘之畿遽有萬乘之兵車哉周禮井田之制周禮致太平之書井田太平之紀綱也不井田則不可以行周公之道用周禮者可不先明井田之制乎然制度明則井田可以行議論定則井田可以復今考鄭注分畫殆有異同是豈先王制度或有不同歟何先儒議論自為不一也大司徒曰不易之地家百畝一易之地家二百畝再易之地家三百畝此言都鄙之田制也小司徒曰九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都此泛言經土地而井牧田野爾鄭氏則曰此謂造都􅀈也采地制井田異於鄉遂遂人曰上地夫一㕓田百畝菜地五十畝餘夫亦如之中地夫一㕓田百畝菜地百畝餘夫亦如之下地夫一㕓田百畝菜二百畝餘夫亦如之此言辨野之土以頒田里也大司馬田上地食者三之二中地食者半下地食者三之一此泛言凡今賦與民之制爾鄭氏則曰今邦國之賦亦以地之美惡民之多寡為制如六遂矣至於匠人為溝洫九夫為井十里為成百里為同此言溝遂洫澮之制也鄭氏亦曰此畿內采地之制采地制井田異於鄉遂夫井牧之制通夫天下可也如鄭氏之説則邦國之田制尚如六卿而都鄙之田制獨與六遂異乎田謂之井則通天下皆井矣井邑丘乘縣都之制無往不同井方一里凡九夫受田九百畝邑方四里三十六夫受田三千六百畝丘方十六里百四十四夫受田萬四千四百畝甸方六十四里五百七十六夫受田五萬七千六百畝縣方二百五十六里二千三百有四夫受田二十三萬四百畝都方一千二十有四里九千二百十六夫受田九十二萬一千六百畝中為公田之數在內自井而邑至縣而都欲其相聮不可暌也經野不殊乎九夫度地不離乎三等受田不過乎百畝此井田之定制也大司徒曰造都鄙則舉外以見內也小司徒曰經土地則舉內以見外也遂人曰辨野之土則舉遂以見鄉也司馬曰今賦則舉鄉以見遂也匠人曰溝洫則舉內外並言也鄭氏何見而分都鄙鄉遂之異乎况小司徒明言以稽國中四郊都鄙之夫家九比之數先鄭謂九夫為井是也國中四郊都鄙同是夫家九比之數則是鄉遂采邑通行矣合而觀之都鄙不易之地即上地一易之地即中地再易之地即下地特遂人於采邑加菜五十畝一遂之上地有不如采地爾雖曰百畝二百畝三百畝數有不同而大司馬言其所食上地百五十畝而食者二之二則百畝爾中地二百畝而食者半則百畝爾下地三百畝而食者三之一則亦百畝爾而實則一夫百畝爾此一夫受田之制然也然一夫受田百畝遂人言餘夫則如之則受田之數不已多乎蓋古者用民之力則必授之以田小司徒言上地家七人可任者家三人中地家六人可任者二家合五人下地家五人可任者家一人大司馬言可用者亦如之凡一夫一婦則為夫家登五人以上則為家其餘夫則上家三人中家合五人下家一人可任用者故必授之以田不可任用則不受田矣遂人田以強子任氓謂餘夫強有力者則豫之田而任其力是也孟子所謂餘夫二十五畝此乃言自卿以下圭田五十畝餘夫則二十五畝與遂人餘夫受田百畝之制不同此餘夫受田之制然也説者謂小司徒之所井牧者六鄉之田遂人之所辨治者六遂之田自鄉遂之外則為都邑之田如載師所謂公邑家邑小都大都之田任甸稍縣量之地是也考之載師又有宅田士田賈田任近郊之地官田牛田賞田牧田任逺郊之地近郊逺郊皆六鄉之民民皆計夫而受田矣則此七等之田果何所授乎蓋自國中而至逺郊皆為鄉遂之地鄉遂止有十五萬家自十五萬夫及餘夫受田之外其餘則為七等之田亦奚有不足者是以致仕者其家所受田則曰宅田仕有祿者受田如圭田則曰士田賈人在市其家所受田則曰賈田每人在官者其家所受田則曰官田田賦所出以飼牛者曰牛田田賦所出以飼馬者曰牧田公卿大夫有功而受賞者曰賞田此載師七等受田之制然也孟子曰仁政自經界始經界既正分田制祿可坐而定是故大司徒之造都鄙而繼日分地職制地貢小司徒之經土地而繼曰任地事令貢賦遂人之頒田野而繼曰領職作事以任貢賦載師之物地事授地職亦必辨任土之征蓋經野以分田則必足賦以制祿也然夏后氏五十而貢殷人七十而助周人百畝而徹徹之為言通也蓋與貢助之法通行也鄭氏於匠人之注則曰周制畿內用貢法邦國用助法夫貢者所耕其田而自輸其稅如孟子所謂什一使自賦也助者借民力以耕公田而公取其稅如孟子所謂九一而助也鄭氏以畿內為用貢法以邦國為用助法乃與孟子不合不知成周鄉遂都鄙邦國井牧之制本同惟貢助之法少異爾行井田法總論井田之制中公外私民之耕而獲也先公而後私上之稅而斂也取其公不復及其私養民足國之道莫善乎此也孟子曰方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事言井田形體之制亦既詳且明矣夫井九百畝為方一里每夫受田百畝則一井九區步百為畝畝百為夫止八夫也九夫為井是井中公而數之公田曷常有夫哉以九夫名井則可以九區起夫則非况制里室亦起數於九夫則九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都即夫家而賦車乘已虛四千三十二夫矣雖曰比閭族黨以五家起數然田有不易一易再易之異夫有家七人五人三人之殊乃謂井邑丘甸縣都起數九夫何謂哉至鄭氏以井邑丘甸縣都之制為造都鄙其説已非又云邑方二里丘方四里甸方八里旁加一里則方十里為一成俱與孟子方里而井不合其旁加之説亦不過求合乎司馬法耳起夫制里且各一其見其何以行之哉春秋時魯既取公田之稅至宣公稅畝則復稅其私田而什取其二故春秋譏之觀有若盍徹之對哀公曰二吾猶不足如之何其徹也是徹法久已不行矣逮戰國暴君汚吏不奪不饜使先王法制蕩廢幾盡孟子曰今也制民之産仰不足以事父母俯不足以育妻子則其開阡陌盡地利豈可盡委罪衛鞅李悝之徒哉厥后惟元魏行之由周隋以及唐初亦無成績而限田均田紛紛靡有定論故言井田之當行者則曰仁政必自經界始况民有恆産重本抑末同井并耕勤惰齊力富無兼并吏無橫征革車長轂出之丘甸不必出賦以養兵戎馬馳突限於溝澮不必長城以禦患出入相友守望相助疾病相扶持而親睦之風于是乎興信乎井田之當行也謂其不可行者則田為政而亟奪富人之田未免怨生釁作且驅天下之民竭天下之財俟之十數年之久不耕不種以待井受非塞溪壑平澗谷夷丘陵破墳墓壞屋廬徙城郭易疆隴必不可為斯言也亦未可謂其無見而訾之也以鄙見度之行之於春秋戰國而尋其遺迹也易行之後代而更新開拓也難行之於創造而産無專主也易行之承平而奪民定産也難行之封建而諸侯各視為已業也易行之郡縣而守令遷轉視為傳舍也難行之於江北而因其沃衍也易行之江南而欲平其隰臯也難行之此以禦戎馬也易行之內外盡奪民之世業也難以至于乘時度勢説以先民先庚後庚重巽申命先甲後甲革故鼎新而肫肫乎必本之以仁民之實心則一存乎大有為之君與相也今兩存其説以俟採焉步百為畝橫一步直百步畝百為夫橫直皆百步匠人為溝洫耜廣五寸二耜為耦一耦之伐廣一尺深一尺謂之􅎌田首倍之廣三尺深二尺謂之遂鄭氏曰古者耜一金兩人並發之具壟中曰􅎌􅎌上曰伐伐之言發之􅎌畎也今之耜兩頭金象古之耦也田一夫之所田百畝方百畝也遂者夫間小溝遂上亦有徑夫三為屋橫百步直三百步為一里屋三為井橫直皆三百步方一里九夫之地中百畝為公田外八百畝為私田授八家公田中二十畝為廬舍井竈蔥韭盡取焉八家各耕公田十畝匠人所謂井間廣四尺深四尺謂之溝是也然此就不易之地大槩言之也若一易再易之地則又大槩二井而當一焉鄭康成以小司徒有邑甸縣都之别而其名與采邑同匠人有􅎌遂溝洫澮之别而多寡與遂人異故言采地制井田鄉遂公邑制溝洫又謂鄉遂公邑之吏或從民以公使不得恤其私諸侯專國之政或恣為貪暴稅民無藝故畿內用夏貢法邦國用商助法賈公彥之徒遂以載師自國中園㕓以至甸稍縣都皆無過十二是鄉遂及四等公邑皆用貢而無助以明鄉遂為溝洫而已然先王之為井田也使所飲同井所耕同田所居同㕓所服同事出入相友守望相助疾病相扶持鄉遂六師之闕萬豈可受之田而不為井乎大田之詩言曽孫來止而歌雨我公田遂及我私噫嘻之詩言春夏祈穀于上帝而歌駿發爾私終三十里亦服爾耕十千為耦周官遂人言興鋤旅師有鋤粟比鄉遂井田之事鄭氏以鄉遂無井田而又以遂人之法釋詩以一井之法釋旅師是自戾也孟子曰鄉田同井請野九一而助則鄉遂之為井田可知也李泰伯曰司馬法與周禮其言頗異意者文王在岐作司馬法及周公攝天子位從而增損之以為周禮乎當以周禮為定司馬法有步畝夫屋井周禮如之但不别為屋爾司馬法十井為通十通為城周禮則四井為邑四邑為丘四丘為甸旁一里為成司馬法十成為終十終為同周禮則四甸為縣四縣為都旁加十里為同又司馬法止為一制無逺近之殊周則三百里以外都鄙為井田二百里以內鄉遂為十夫百夫千夫萬夫則是殊制矣故當以周禮為定井田總論老泉蘇氏曰周之時用井田井田廢而田非耕者之所有田者不耕也耕者之田資於富民富民之家地大業廣阡陌連接募召浮客分耕其中鞭笞驅役視以奴僕安坐四顧指麾於其間而役屬之民夏為之耨秋為之穫無有一人違其節度以嬉而田之所入已得其半耕者得其半有田者一人而耕者十人是以田主日纍其半以至於富強耕者日食其半以致於窮餓而無告夫使耕者至於窮餓而不耕不穫者坐而食富強之利猶且不可而况富強之民輸租於縣官而不免於怨嘆嗟憤何則彼以其半而供縣官之稅不若周之民以其全力而供上之稅也周之什一以其全力而供什一之稅也使其半供什一之稅猶用十二之稅然也况今之稅又非特止於什一而已則宜乎其怨嘆嗟憤之不免也噫齊民耕而不免於飢富民坐而飽且嬉又不免於怨其弊皆起於廢井田井田復則貧民有田以耕榖食粟米不分於富民可以無飢富民不得多占田以錮貧民其勢不耕則無所得食以地之全力供縣官之稅又可以無怨是以天下之事言復井田既又有言者日奪民之田以與無田之民則富民不服此必生亂如乘大亂之後土曠而人稀可以一舉而就髙祖之滅秦光武之承漢可為而不為以是為恨吾又以為不然今雖使富民奉其田而歸諸公乞為井田其勢亦不可得何則井田之制九夫為井井間有溝四井為邑四邑為丘四丘為甸甸方八里旁加一里為一成成間有洫其地百井而方十里四甸為縣四縣為都四都方八十里旁加十里為一同同間有澮其地萬井而方百里百里之間為澮者一為洫者百為溝者萬既為井田又必兼備溝洫之制夫間有遂遂上有徑什夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路萬夫之地蓋三十二里有半而其間為川為路者一為澮為道者九為洫為塗者百為溝為畛者千為遂為徑者萬此二者非塞溪壑平澗谷夷丘陵破墳墓壞廬舍徙城郭易疆隴不可為也縱使盡能得平原曠野而遂規畫於其中亦當驅天下之人竭天下之糧窮數百年專力於此不治他事而後可以望天下之地盡為井田盡為溝洫已而又為民作屋廬於其中以安其居而後可吁亦已迂矣井田成而民之死其骨已朽矣古者井田之興其必始於唐虞之世乎非唐虞之世則周之世無以成井田唐虞啓之至於夏商稍稍葺治至周而大備周公承之因遂申定其制度疏整其疆界非一日而遽能如此也其所由來者漸矣夫井田雖不可為而其實便於今今誠有能為近井田者而用之則亦可以蘇民困矣乎聞之董生曰井田雖難卒行且少近古限民名田以贍不足名田之説蓋出於此而後世未有行者非以不便民也懼民不肯損其田以入吾法而遂因此以為變也孔光何武曰吏民名田母過三十期盡三年而犯者沒入官夫三十頃之田周民三十夫之田也縱不能盡如周制一人而兼三十夫之田亦已過矣而期之二年是又迫蹙平民使自壞其業非人情難用吾欲少為之限而不奪其田嘗已過吾限者但使後之人不敢多占田以過吾限耳要之數世富者之子孫或不能保其地以復於貧而彼嘗已過吾限散而入於它人矣或者子孫出而分之亦無幾矣如此則富民所占者少而餘地多則貧民易取以為業不為人所役屬各食其地之全利利不分於人而樂輸于官夫端坐於朝廷下令於天下不驚民不動衆不用井田之制而獲井田之利雖周之井田何以逺過於此也水心葉氏進卷曰今之言愛民者臣知其説矣俗吏見近事儒者好逺謀故小者欲抑奪兼并之家以寬細民而大者欲復古井田之制使其民皆得其利夫抑兼并之術吏之強敏有必行之於州縣者矣而井田之制百年之間士方且相與按圖而畫之轉以相授而自言其迂未敢以告於上者雖告亦莫之聽也夫二説者其為論雖可通而亦皆非有益於當世為治之道終不在此且不得天下之田盡在官則不可以為井而臣以為雖得天下之田盡在官文武周公復出而治天下亦不必為井何者其為法瑣細煩密非今天下之所能為昔者自黃帝至於成周天子所自治者皆是一國之地是以尺寸步畝可歷見於鄉遂之中而置官師役民夫正強界治溝洫終嵗辛苦以井田為事而諸侯非各自治其國百世不移故井田之法可頒於天下然江漢以北濰淄以東其不能為不強使也今天下為一國雖有郡縣吏皆總於上率二三歲一代其間大吏有不能一歲半歲而代去者是將使誰為之乎就使為之非少假十數嵗不能定也此十數嵗之中天下將不事耕乎井田之制雖先廢於商鞅而後諸侯封建絶然封建既絶井田雖在亦不可獨存矣故井田封建相待而行者也夫畎遂溝洫環田為之間田而疏之要以為人力備盡至之而可觀而得粟之多寡則無異於後世且大陂長堰因山為源乾涸流潦視時決之法簡而易周力少而用博使後世之治無愧於三代則為田之利使民自養於中亦獨何異於古故後世之所以為不如三代者罪在於不能使天下無貧民耳不在於田之必為井不為井也夫已逺者不追已廢者難因今故堰遺陂在百年之外瀦防衆流即之渺然瀰漫千頃者如其湮淤絶滅尚不可求而况井田逺在數千載之上今其阡陌連環墟聚遷改蓋欲求商鞅之所變且不可得矣孔孟生衰周之時井田雖不治而其大略具在勤勤以經界為意歎息先王之良法廢壞於暴君汙吏之手後之儒者乃欲以耳目之所不聞不言之遺言顧從而效之亦咨嗟歎息以為不可廢豈不難乎井田既然矣今俗吏欲抑兼并破富人以扶貧弱者意則善矣此可隨時施之於其所治耳非上之所恃以為治也夫州縣獄訟繁多終日之力不能勝大半為富人役耳是以吏不勝忿常欲起而誅之縣官不幸而失養民之權轉歸於富人其積非一世也小民之無田者假田於富人得田而無以為耕借資於富人嵗時有急求於富人其甚者傭作奴婢歸於富人遊手末作俳優技藝傳食於富人而又上當官書雜出無數吏常有非時之責無以應上命常取給於富人然則富人者州縣之本上下之所賴也富人為天子養小民又供上用雖厚取贏以自封殖計其勤勞亦略相當矣乃其豪暴過甚兼取無巳者吏當教戒之不可教戒隨事而治之使之自改則止矣不宜豫置疾惡於其心茍欲以立威取名也夫人主既不能自養小民而使先以破壞富人為事徒使其客主相怨有不安之心此非善為治者也故臣以為儒者復井田之舉可罷而俗吏抑兼并富人之意可損因時施智規世立法誠使制度定於上十年之後無甚富甚貧之民兼并不抑而自巳使天下速得生養之利此天子與其羣臣當汲汲為之不然古井田終不可行今之制度又不復立虛談相眩上下乖忤俗吏以卑為實儒者以髙為名天下何從而治哉按秦廢井田之後後之君子每慨歎世主不能復三代之法以利其民而使豪強坐擅兼并之利其説固正矣至於斟酌古今究竟利病則莫如老泉水心二公之論最為確實愚又因水心之論而廣之曰井田未易言也周制凡授田不易之地家百畝一易之地二百畝再易之地三百畝則田土之肥瘠所當周知也上地家七人中地家六人下地家五人則民口之衆寡所當周知也上農夫食九人其次食八人其次食七人則其民務農之勤怠又所當周知也農民每戶授田百畝其家衆男為餘夫年十六則别受二十五畝士工商受田五口乃當農夫一人每口受二十畝則其民之或長或少或為士或為商或為工又所當周知也為人上者必能備知閭里之利病詳悉如此然後授受之際可以無敝蓋古之帝王分土而治外而公侯伯子男內而孤卿大夫所治不過百里之地皆世其土子其人於是取其田疇而伍之經界正井地均穀祿平貪夫豪民不能肆力以違法制汙吏黠胥不能舞文以亂簿書至春秋之世諸侯用兵爭強以相侵奪列國不過數十土地寖廣然又皆為世卿強大夫所裂如魯則季氏之費孟氏之成晉則欒氏之曲沃趙氏之晉陽亦皆世有其地又如邾莒滕薛之類亦皆數百年之國而土地不過五七十里小國寡民法制易立竊意當時有國者授其民以百畝之田壯而畀老而歸不過如後世大富之家以其祖父所世有之田授之佃客程其勤惰以為子奪校其豐凶以為收貸其阡陌之利病皆其少壯之所習聞雖無俟乎核者而姦弊自無所容矣降及戰國大邦凡七而么麼之能自存者無幾諸候之地愈廣人愈衆雖時君所尚者用兵爭強未嘗以百姓為念然井田之法未全廢也而其敝已不可勝言故孟子有今也制民之産仰不足以事父母俯不足以育妻子之説又有暴君汙吏慢其經界之説可見當時未嘗不授田而諸侯之地廣人衆考核難施故法制隳施而姦敝滋多也至秦人盡廢井田任民所耕不許多少而隨其所占之田以制賦蔡澤言商君決裂井田廢壞阡陌以爭百姓之業而一其土夫曰爭曰一則可見周授田之制至秦時必是擾亂無章輕重不均矣漢既承秦而卒不能復三代井田之法何也蓋守令之遷除其歲月有限而井土之還授其姦敝無窮雖慈祥如龔黃召杜精明如趙張三王既不久於其政則豈能悉知其土地民俗之所宜如周人授田之法乎則不過受成於吏手安保其無敝後世蓋有爭田之訟厯數十年而不決者矣况官授人以田而欲其均平乎杜君卿曰降秦以後阡陌既敝又為稽核稽核在乎權宜權宜憑乎簿書簿書既廣必藉衆功藉衆功則政由羣吏由羣吏則人無所信矣夫行不盡之法委政於衆多之胥欲紀人事之衆寡明地利之多少雖申商督刑撓首總算不可得而詳矣其説可謂切中秦漢以後之病然揆其本原皆由乎地廣人衆罷侯置守不私其土世其官之所致也是以晉太康時雖有男子一人占田七十畝之制而史不詳言其還受之法未幾五胡雲擾則巳無所究詰直至魏孝文始行均田然其立法之大槩亦不過因田之在民者而均之不能盡如三代之制一傳而後政已北亂齊周隋因之得失無以大相逺唐太宗口分世業之制亦多踵後魏之法且聼其買賣而為之限至永徽而後則兼并如故矣蓋自秦至今千四百餘年其間能行授田均田之法者自元魏考文至唐初才二百年而其制畫隳矣何三代貢助徹之法千餘年而不變也蓋有封建足以維持井田故也三代而上天下非天子之所得私也秦廢封建而始以天下奉一人矣三代而上田産非庶人所得私也秦廢井田而始捐田産以與百姓矣秦於其所當與者取之所當取者與之然沿襲既久反古實難欲復封建是自割裂其土宇以啓紛爭欲復井田是強奪民之田産以召怨讟書生之論所以不可行也小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事鄭司農云井牧者春秋傳所謂井衍沃牧隰臯者也玄謂隰皋之地九夫為牧二牧而當一并今造都鄙授民田有不易有一易有再易通率二而當一是之謂井牧昔夏少康在虞師有田一成有衆一旅一旅之衆而田一成則井牧之法先古然矣九夫為井者方一里九夫所治之田也此制小司徒經之闕為之溝洫相包乃成耳邑丘之屬相連比以出田稅闕水害四井為邑方二里四邑為丘方四里四丘為甸甸之言乘也讀如裏甸外甸甸方八里旁加一里則方十里為一成積百井九百夫其中六十四井五百七十六夫出田稅三十六井三百三十四夫治洫四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也積萬井九萬夫其四千九十六井三萬六千八百六十四夫出田稅二千三百四井二萬九百三十六夫治洫三千六百井三萬六千四百夫治澮井田之法備於一同今止於都者采地食者皆四之一其制三等百里之國凡四都一都之田稅入於王五十里之國凡四縣一縣之田稅入於王二十五里之國凡四甸二甸之田稅入於王地事謂農牧衡虞也貢謂九榖山澤之材也賦謂出車徒給繇役也司馬法曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人十成為終終十井三十家革車十乘士百人徒二百人十終為同同方百里萬井三萬家革車百乘士千人徒二千人何休曰聖人制井之法而口分之一夫一婦受田百畝以養父母妻子五口為一家公田十畝即所謂十一而稅也廬舍二畝半凡為田一頃十二畝半八家而九頃共為一井故曰井田廬舍在內貴人也公田次之重公也私田在外賤私也井田之義一曰無泄地氣二曰無費一家三曰同風俗四曰合巧拙五曰通財貨因井田以為市故俗語曰市井種穀不得種一穀以備災害田中不得有樹以妨五穀還廬舍種桑荻雜菜畜五母雞二母豕瓜果種疆畔女工蠶織老者得衣帛焉得食肉焉死者得葬焉多於五口名曰餘夫餘夫以率受田二十五畝十井共出一兵車司空謹别田之髙下善惡分為三品上田一嵗一墾中田二嵗一墾下田三嵗一懇肥饒不得獨樂墝埆不得獨苦故三年一換土易居財均力平兵車數定是謂均民力強國家在田曰廬在邑曰里一里八十戶八家共一巷中里為校室選其耆老有髙德者名曰父老其有辨護伉健者為里正皆受倍田得乘馬父老比三老孝弟官屬里正比庶人在官吏民春夏出田秋冬入保城郭田作之時春父老及里正旦開門出孰上晏出後時者不得出暮不持樵者不得入五榖畢入民皆居宅里正趨促績男女同巷相從夜績至於夜中故工一月得四十五日作從十月盡正月止男女有所怨恨相從而歌飢者歌其食勞者歌其事男年六十女年五十無子者官衣食之使之民間求詩鄉移於邑邑移於國國以聞於天子故王者不出牗戶盡知天下疾苦不下堂而知四方十月事訖父老教於校八嵗者學小學十五者學大學其有秀者移於鄉學鄉學之秀者移於庠庠之秀者移於國學學於小學諸侯嵗貢小學之秀者於天子學大學其有秀者命曰進士行同而能别之以射然後爵之士以才能進取君以考功授官三年耕餘一年之畜九年耕餘三年之積三十年之儲雖遇唐堯之水殷湯之旱民無近憂四海之內莫不樂其業故曰頌聲作矣田制遂人辨其野之土上地中地下地以頒田里上地夫一㕓田百畝菜五十畝餘夫亦如之中地夫一㕓田百畝菜地百畝餘夫亦如之下地夫一㕓田百畝菜二百畝餘夫亦如之菜謂休不耕者七口受上地六口受中地五口受下地餘夫受田後又有所生成丁者亦如之孟子言餘夫二十五畝與此不同彼自一人有餘力言所謂強豫任氓注云強豫謂民有餘力復與之田若餘夫然是也先儒以為同此餘夫皆非也凡治野夫間有遂遂上有徑千夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路以達于畿此言鄉遂井田之法溝洫澮川與匠人所云不同者此以人而言猶曰四閭為族八閭為聯意鄭氏曰十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞徑畛塗道路皆所以通車徒於國都也徑容馬牛畛容大車塗容乘車一軌道容二軌都之野塗與還塗司可也萬夫者方三十三里少半里九而方一同以南畝圖之則遂從溝橫洫從澮橫九澮百川周其外焉去山陵林麓川澤溝瀆城郭宫室塗巷三分之制其餘如此以至于畿則中雖有都鄙遂人盡舉其地大司徒凡造都鄙制其地域而封溝之以其室數制之不易之地家百畝一易之地家二百畝再易之地家三百畝乃分地職奠地守制地貢而頒職事焉以為地法而待食鄭氏曰不易之地歲種之地美故家百畝二易之地休一嵗乃復種地薄故家二百畝再易之地休二歲乃復種故家三百畝分地職分其尤職所宜也定地守謂衡麓虞侯之屬制地貢謂九職所稅也頒執事者分命使各為其所執之事按大司馬上地食者三之二中地食者半下地食者二之一則不易之地家百畝即田百畝菜五十畝也一易之地家二百畝即田百畝菜百畝也再易之地家三百畝即田百畝菜二百畝也一自始開墾言再自既成田言其實一也遂人之田皆大司徒不易之地也因舉成田言故不云菜耳一易再易之地以生熟之田準菜田言耳周之制何嘗鄉遂周貢法都鄙用助法哉蓋野皆用助法但山林不可為井田及國中園圃始用貢耳孟子云請野九一而助國中什一使自賦國語所謂籍田以力而砥其逺邇籍田耕而蹈藉也砥正也平逺邇如不易之地家百畝一易之地家二百畝再易之地家三百畝類賦里以入而量其有無里㕓也謂商賈所區之域也以入計其利入多少而量其財業有無以為差也任力以夫而議其老幼力謂徭役以夫以夫家為數也議其老幼老幼則有復除也田制考通典曰黃帝時八家為井井開四道而分八宅鑿井於中則井田之原其來逺矣堯遭洪水天下分絶使禹平水土别九州舜典帝曰棄黎民阻飢汝后稷播時百穀周禮大宰以九職任萬民一曰三農生九穀二曰園圃育草大三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰飭百工化八材六曰商賈阜通貨賄七曰嬪婦化治絲􅀢八曰臣妾聚斂疏材九曰間民無常職轉移執事大司徒頒執事子邦國都鄙使以登萬民一曰稼穡二曰樹藝小司徒之職乃經土地而井牧其田野可耕之地為井可畜之地為牧遂人辨其野之土上地中地下地以頒田里前漢食貨志聖王量能授事四民陳力受職若山林澤藪原陵淳鹵之地各以肥磽多少為差民年二十受田六十歸田七十以上上所養也十嵗以下上所長也十一以上上所強也秦用商鞅廢井田開阡陌東西為阡南北為陌漢武帝時董仲舒説上曰秦改帝王之制除井田民得買賣富者田連阡陌貧者無立錐之地漢興循而未改古井田法雖難猝行宜少近古限民名田以贍不足塞兼并之路然後可善治也孝哀時師丹請建限田下其議孔光何武請吏民名田無過三十頃唐授田之制成丁者人一頃其田十畝為口分二十畝為永業二百四十步為畝田多可以足其人者為寬鄉少者為狹鄉狹鄉授田咸寬鄉之半凡徒鄉及貧無以葬者得賣世業自狹鄉徒寬鄉者得賣口分已賣者不復受宋太宗詔江北之民種諸榖江南之民種藝稻真宗遣使就福建取占城稻三萬斛分給三路為種林勳上政本書曰宜假古井田之制使民一夫占田五十畝其有羡田之家毋得市田其無田與遊惰隨未作者皆驅之使𨽻農以耕田之羡者而雜紐錢榖以為十一之稅陳亮曰勳為此書考古驗今思慮周密可謂勤矣世之為井田之學者孰有加于勳者乎要必有英雄特起之君用于一變之後成順致利則民不駭庶可以善其後小司徒經土地而井牧其田野春秋傳井衍沃牧隰臯寬平之地為井窄狹之田與夫髙下不齊者但可為牧多則十夫少則雖不足一夫皆可補而授之司馬法步百為畝畝百為夫夫三為屋屋三為井步百為畝謂闊一步長百步畝百為夫謂長闊皆百步匠人廣尺深尺為畝田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝遂人夫間有遂遂上有徑十夫有溝溝上有畛夫間有遂廣深二尺遂上有徑髙廣亦二尺可以通人行十夫有溝廣深四尺溝上有畛廣髙亦四尺可以通牛馬舊説以遂人有十夫子因以為鄉遂用貢法之溝洫匠人有九夫字因以為都鄙用助法之溝洫愚謂凡耕者皆為橫畝以入于遂一步為三畝立苗方二尺此樹植之法井牧皆然也夫間有遂遂上有徑十夫有溝溝上有畛大抵田首之水于溝亦井牧所同也但井限于九夫牧則十夫此微不同然所謂九夫者乃九夫之地非九家也且每井有餘夫受田一井實不止九夫故舉成數言豈可因此而遂分鄉遂都鄙有二法乎葉氏曰司徒言井邑遂人言溝洫非鄉遂異制也井邑定田畝多寡以出稅故以四井四邑言溝洫定水道大小以興利故以十夫百夫言鄉言井邑則遂之田賦亦如之遂言溝洫則鄉之水利亦如之互文見義耳胡瀚井牧論曰天地養萬物聖人養萬民故天下之利聖人不私諸已亦不以私於人井田之制是也井田者仁政之首也井田不復仁政不行天下之民始敝敝矣其後二百三十有二年而漢始有名田之議猶古之遺意也又其後六百有三年而元魏始有均田之法猶古之遺制也先王之遺制遺意由秦以來僅一二見又皆行之不逺天下之民益敝敝矣為政者南面以子萬姓一夫之飢猶已飢之一夫之寒猶已寒之孰無是心也而訖莫之拯焉方漢承秦後民新脫去湯火未遑蘇息髙帝因而撫之逮及文景之世國家晏安無事宗戚大臣憑籍貴髙之勢爭取美田宅以為子孫利益郡邑富商大賈周流天下資纍巨萬治生産畜牧膏壤十倍上擬封君編戶之氓無立錐之地則卑下之為役為僕不暇顧其身貧富不均勢所馴致也故董仲舒言於孝武以古井田之法雖難卒行宜少近古限民名田以抑兼并名田者占田也占田有限是富者不得過制也其後師丹孔光之徒因之令民名田無過三十頃期盡三年而犯者沒入之議者以三十頃之田周三十夫之地也一夫占之過矣晉石苞令民男女二人占田百畝下男女有差有國食祿者有差或十頃或五十頃兼以品蔭其親屬自啓計端矣民無恆産不能制之専事要束之間不勞民駭衆坐獲井田之利此吾所未喻也殆不過為兼并之間耳非有資於畎畝細民能無不足之患耶名田雖有古之遺意不若均田之善李安世在魏太和中其得君非華夏之主也其得民非歸馬牧牛之時也以魏國之大獨能均其土地審其經術差露田别世業魏人賴之力業相稱北齊後周因而不變隋又因之唐有天下遂定為口分永業之制而取其租庸調之法口分即露田也露田夫四十畝婦人二十畝而率倍之口分八十畝而不倍惟嵗易之田倍之永業即世業也夫家受而不還皆二十畝所以課蒔桑麻也民有多寡鄉有寬狹田有盈縮狹鄉之民受田半之為工商者不給而在寬鄉者給之亦半也老疾寡妻妾給之三十畝四十畝雖不耕不可無養也當戶者益之二十畝雖已有田不可不優也以此均天下之田貧不得鬻富不得兼猶懼不能守吾法而乃聽民鬻永業以葬鬻口分以遷是以小不足而大亂法也何救於敝振窮困貧民獲保息周典也何惜而不為之鬻而加罰永徽之禁抑末耳議者如宋劉敞又以魏齊周隋享國日淺兵革不息土曠人稀其田足以給其衆民獲其實唐承平日久丁口滋多官無間田給受民不復其實徒為具文不知隋唐之盛丁口相若耳開皇十二年發使均天下之田狹鄉一夫僅二十畝隋之給受何加於唐也唐雖承平日久貞觀開元之盛其人戶猶不及隋何至其田具文無實也敞言過矣但狹鄉之民多而田不盈永業之田粥而民不固如陸贄所謂時弊者勢馴致也時敝則法亦敝故均田雖有古之遺制不若井田之善周制九夫為井井有溝四井為邑四邑為丘四丘為甸甸有洫四洫為縣四縣為都都有澮地方百里是為一同治都鄙者以之夫間有遂遂有徑十夫有溝溝有畛百夫有洫洫有塗千夫有澮澮有道萬夫有川川有路萬夫之地三十二里治鄉遂者以之孟軻氏請野九一而助國中什一使自賦蓋二法並行遂人匠人多寡異數而內外相經緯焉王畿之內五十里為近郊百里為逺郊六鄉六遂居之六遂之餘地為甸地距國中二百里即公邑之田天子使吏治之者也甸地之外為稍地距國中三百里大夫所食之采地也稍地之外為縣地即小都之田距國中四百里卿及王子弟之疏者所食之采地也懸地之外為疆地即大都之田距國中五百里公及王子弟之親者所食之采地也此王畿之制井田常居十之六其不為井者四郊甸地耳其田夫三為屋屋三為井則出地貢者亦三三相任如井田之法八家樹藝一夫稅入于公孟軻氏所謂皆十一者是也鄉遂之地采五十畝或百畝二百畝而都鄙之田或不易或一易再易是亦名異而實同也地有肥磽為之井者必有牧以濟之所謂采與易者則皆牧也故小司徒曰井牧其田野井者正也牧者變也井地均不必牧也井地不均必牧以均之也由是達于天下雖有山林川澤不可以開方制者以井牧授之以貢助取之諸侯之國可按而定也楚人東南之夏服也為掩為司馬度山林鳩澤藪辨京陵表淳鹵數疆潦規偃瀦町原防牧隰臯井衍沃量九土入修千乘之賦况中國之地無山林澤藪之阻無淳鹵疆潦之患原隰衍沃舉目千里夏后氏用之以為貢商人用之以為助而周人兼用之以制畿甸經邦國其法可考者往往存於周官之書其不合者以孟軻氏為之權衡豈不較然也哉故嘗以為井田之法行有十便民有恆産不事末作知重本一也同井並耕勞逸巧拙不相負齊民力二也奉生送死有無相贍通貨財三也貨財不匱富者無以取贏絶兼并四也取以十一天下之中正吏無橫斂五也比其丘甸革車長轂於是乎出有事以定軍實六也一同之間萬溝百洫又有川澮戎馬不得馳突無邊患七也畎澮之水潦則疏之旱乾則引以溉注少凶荒八也少壯皆土著姦偽不容善心亦生以其暇日習詩書俎豆養老息物成禮俗九也逺近共貫各安其居樂其業尊君親上長子孫其中不煩刑罰而成政教十也一舉而十者具矣何憚而不為乎其謂不可為者蓋亦有二焉丘甸縣都其間萬井為溝洫者又萬計也原隰而為之窮天下之力傾天下之財非數十年之久不免責于成也非大有為之君不能致其決也此不可者一也中古以降淳厚之俗薄澆偽之風熾恭儉之化衰功利之習勝經久之慮少僥幸之敝多以限田抑富強猶有撓之者況使盡棄其私家之産乎以均田授農民猶有不能周之者又況生齒滋衆之時乎怨歸於上姦興於下凡不可為者二也以余論之二者何足尼吾事乎古者步百為畝漢人益以二百四十為畝北齊又益之以三百六十為畝今所用者漢畝少也今之五十畝古之百畝也漢提封田萬萬頃為邑居道路山林川澤不可墾餘二千二百二十九萬頃皆可墾元始初遣司農勸課定墾田八百二十七萬五百三十頃是時天下之民一千二百二十三萬三千户以田均之計戶得田六十七畝古之百四十畝也家獲百四十畝耕之未為不給也加之簡稽則工商祿食之可損者又不知其幾也雖盛時永徽民戶不過三百八十萬至開元七百八十六萬小不漢過也以天下之田給天下之民徴之漢唐則後世寧有不足之患乎田無不足之患則取諸民以與民天下皆知吾君之不私也天下有如卜式者且將先吾民而為之孰不響應於下也秦長城之役袤延萬里塹山堙谷暴兵三十萬而阿房之作督用徒刑者又七十餘萬郡邑之民發謫徒邊者又嵗不休息不德甚矣天下怨誹未聞有一人違者下令如流水之源固民心之所欲也王政之所本也今先取一鄉之田井之其制定其事便其民悅然後行之一郡取一郡之田井之其制定其事便其民悅然後行之天下天下之制定事便而民恱也亦何異於卿郡乎是天下之田可井也事不勞者不永逸欲長治久安而不於此圖之亦茍矣唐太宗嘗讀周官之書至體國經野設官分職以為民極慨然歎曰不井田不封建不足以法三代之治人君負有為之才操可致之勢其時又非難也封建議而不行井田知而不復君子蓋深為唐惜之吾聞春氣至則草木生秋氣至則草木落生與落必有使之者矣物莫知之也故使之者不至物無不生使之者不至物無可為上之人審其所以使故物莫不為用管商之法孰與先王之制天下皆知其非民利也而齊秦舉國聽之其故又可知也以先王之制使若管商者為之以紀人事經地利吾知天下之田可限也可均也亦可井也此無他善使而已矣忠信之道賞罰之柄上之所以使也溝洫總論陳及之曰周制井田之法通行於天下安有內外之異哉遂人十夫有溝以一直度之也凡十夫之田之首必有一溝以㵼水以方度之則方一里之地所容者九夫其間廣四尺深四尺謂之溝則方一里之內凡四溝矣兩旁各溝中間二溝遂人云百夫有洫是百夫之地相連屬而同以一洫㵼水以方度之則方十里之成所容者九百夫其間廣八尺深八尺謂之洫則方十里之內凡四洫矣兩旁各二洫中間二洫至于澮亦然若川則非人力所能為故匠人不為川而云兩山之間必有川焉遂人萬夫有川亦大約言之耳大槩甽水㵼於溝溝水㵼於洫洫水㵼於澮澮水㵼於川其縱橫因地勢之便利遂人匠人以大意言之遂人以長言之故曰以達於畿匠人以方言之故止一同耳朱子語録曰溝洫以十為數井田以九為數決不可合近世諸儒論田制乃欲混井田溝洫為一則不可行鄭氏注分作兩項却是永嘉陳氏曰鄉遂用貢法遂人是也都鄙用助法匠人是也按遂人云百夫有洫十夫有溝溝即不見德包溝洫在內若是在內當云百夫十夫之間矣匠人溝洫却在內故以間言方十里者以開方法計之為九百夫方百里者以開方法計之為萬夫遂人匠人兩處各是一法朱子總其説謂貢法十夫有溝助法人家同井其言簡而盡矣但不知其必分二法者何故地意鄉遂之地在近郊逺郊之間六軍之所從出必是平原曠野可畫為萬夫之田有溝有洫又有遂路方圓可以如圖蓋萬夫之地所占不多以井田一同法約之止有九分之一故以徑法攤算遂一見其子數若都鄙之地謂之甸稍縣都乃公卿大夫之采地包出林陵麓在內難用溝洫法整齊分畫故遂處畫為井田有溝洫不能如圖故但言在其間其地綿亘一同之地萬夫者九故以徑法紐算但止言其畝數按自孟子有請野九一而助國中什一使自賦之説其後鄭康成注周禮以為周家之制鄉遂用貢法遂人所謂十夫有溝是也都鄙用助法匠人所謂九夫為井是也自是兩法晦庵以為遂人以十為數匠人以九為數決不可合以鄭氏分注作兩項為是而近世諸儒合為一法為非然愚嘗考之孟子所謂野九一者乃授田之制國中什一者乃取民之制蓋助有公田故其數必拘于八居四旁為私而一居其中為公是為九夫多與少皆不可行若貢則無公田孟子之什一特言其取之之數遂人之十夫特姑舉成數以言之耳若九夫自有九夫之貢法十一夫自有十一夫之貢法初不必拘以十數而後可行法也今徒見匠人有九夫為井之文而謂遂人所謂十夫有溝者亦是以十為數則似太拘蓋自遂而達于溝自溝而達于洫自洫而達于澮自澮而達于川此二法之所以同也行助法之地必須以平地之田分畫作九夫中為公田而八夫之私田環之列如井字整如棋局所謂溝洫者直欲限田之多少而為強界行貢法之地則無見髙原下隰截長補短每夫授百畝所謂溝洫者不過隨地之髙下而為之蓄泄此王法之所以異也是以匠人言遂必曰二尺言溝必曰四尺言洫必曰八尺言澮必曰二尋蓋以平原曠野之地畫九夫之田以為井各自其九以至於同其間所謂遂溝洫澮者隘則不足以蓄水而廣則又至於妨田故必有一定之尺寸不可踰也若遂人止言夫間有遂十夫有溝百夫有洫千夫有澮蓋是山谷藪澤之間隨地為田橫斜廣狹皆可墾闢故溝洫亦不言其尺寸所謂夫間有遂遂上有徑以至萬夫有川川上有路云者始終略言之大意謂路之下即為水溝水溝之下即為田耳非若匠人之田必拘以九夫而其溝洫之必拘以若干尺也訂義所載永嘉陳氏謂遂人十夫有溝是以直度之匠人九夫為井是以方言之又謂遂人所言者積數匠人所言者方法想亦有此意但説欠詳明耳然鄉遂附郭之地必是平衍沃饒可以分畫宜行助法而反行貢法都鄙野外之地必是有山谷之險峻溪澗之阻隔難行分畫宜行貢法反行助法何也蓋助法九取其一似重於貢然地有肥磽嵗有豐凶民不過任其耕耘之事而所輸盡公田之粟則所取雖多而民無預貢法十取其一似輕於助然立為一定之規以樂嵗之數而必欲取盈於凶歉之嵗至稱貸而益之則所取雖寡而民已病矣此龍子所以言莫善於助莫不善于貢也鄉遂迫近王城豐凶易察固可行貢法都鄙僻在遐方情偽難知故止行助法此又先王之微意也然鄉遂之地少都鄙之地多則行貢法之地必少而行助法之地必多至魯宣公始稅畝杜氏注以為公無恩信於民民不肯盡力於公田故履踐案行擇其善畝好榖者稅取之蓋是時公田所牧必是不給於用而為此橫政孟子曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也則是孟子之時助法之廢已久盡胥而為貢法矣孟子特因詩中兩句而想像成周之助法耳自助法廢胥而為貢法於是民所耕者私田所輸者公租田之豐歉靡常而賦之額數已定限以十一民猶病之況過取於十一之外乎右萬夫之地地方三十三里少半里此圖一方當百夫有洫一行當千夫千夫有澮九澮而川周其外若以百夫之圖觀之則一方為一夫夫間有遂以洫作遂觀之一行為十夫十夫有溝以澮為溝觀之亦九溝而達於洫以川為洫觀之其溝澮廣深鄭注與井田相隼但井田法溝澮稀少如此溝洫法溝澮稠多此川廣深當亦倍澮與自然之川異彼則百里之間一大川耳凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路以達于畿十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也徑畛塗道路皆所以通車徒於國都也徑容牛馬畛容大車塗容乘車一軌道容二軌路容三車萬夫者方三十三里少半里九萬夫而方一同以南畝圖之則遂縱溝橫洫縱澮橫九澮百川周其外焉師之象曰地中有水師君子以容民蓄衆夫水不外乎地兵不外乎農畜衆養民之道必都鄙有章閭井有伍田有封洫孟子謂仁政必自經界始故因地中有水之象兼考周官之説而圖敘井田之法以附大易之義云授菜田法凡上地菜田有在處者則右圖是也有美田不可為菜者則當别受之菜田更在他處也凡耕菜田有以百畝而二易一嵗曰災二嵗曰畬三嵗曰新田是也有菜在别處則當雜植以助正田凡公田之入亦當以上中下三等之田計之故有三井而當一者有二井而當一者有一井而當一者夏官量人云凡班賞地三之一食賞地多間田故率三井而當一井此可以為證井田夫家總論孟子曰方里而井井九百畝中為公田八家皆私田百畝然周初時闢土分田不盡然者大司徒不易之地家百畝一易之地家二百畝再易之地家三百畝遂人上地夫一㕓田百畝菜五十畝餘夫亦如之中地夫一㕓田百畝菜百畝餘夫亦如之下地夫一㕓田百畝菜二百畝餘夫亦如之小司徒上地家七人可任地者家三人中地家六人可任地者二家五人下地家五人可任地者家二人大司馬上地食者三之二中地食者半下地食者三之一三等之地經中四見然皆分土任民侯國與王國鄉遂公邑與菜地並不容有異夫不易者膏腴上地而必益以菜地之五十畝者常使地力有餘不至耗竭草菜葑遊田益肥美家有餘利自生禮讓生齒日蕃有田可耕也三分而食其二故曰食者三之二每一夫田百畝菜五十畝所占夫半之地是一井中實止六夫而不足矣一易者肥瘠半之中地休一嵗而種其獲與上地等益以菜百畝二分而食其一故曰食者半每一夫田二百畝所占二夫之地是一井中實止四夫也再易者瘠薄下地休二嵗而種其獲與上地等益以菜二百畝三分而食其一故曰食者三之一每一夫田三百畝所占三夫之地是一井中實三夫而不足也井田之界限有定而夫之分授不齊如此夫有休代之法則田之所牧固無不均但不易則用人工少易則費人多故上地之入食七人而可任者家三人中地之入食六人而可任者二家五人下地之入食五人而可任者家二人正夫足其所食之數而又有可任者即受餘夫而滿其七人六人五人之數者别受正夫田大約以上中下三等之地總而計之每一井田通融而論止于四家可用之民十人而已若舊泥于一夫百畝然田有髙下口有多寡似均而實不均也惟其以上中下三等之田授之有一百五十畝二百畝三百畝多寡之三等上中下三等農夫可任之民亦有家三人二家五人家二人多寡之三等然後為均平以此知古人云八家同井蓋治久齒繁井田大治之峕耳初闢地之時不可為也欲知井田夫家之數當考于周禮可也治地總論嘗考自古井田之説而為之溝洫丘邑封強等圖蓋欲知其大較不得不然爾山林川澤回曲萬狀不可拘一也地有肥瘠司徒言上地中地下地參差不齊二也宅田土田賈田圭田餘夫田所授不盡田之數三也地形偏斜不等不及百畝者甚多四也山林川澤固在餘除之外一易再易者一夫耕二夫三夫之地圭田則以一井中公田而為二餘則以一夫之田而為四士田賈田等各隨分量授之如餘夫法若其地形偏斜不足者則會算以足百畝之數蓋無窒礙不可行亦何取正方如紙上所畫哉孟子曰此其大略也若夫潤澤之則在君與子斯言得之矣但其法始於黃帝暨大禹伯益后稷皆以神明之德相與參畫輔相始克成功又厯殷周數聖人而後大備今廢棄殆盡若欲急遽起事竊古人之糟粕而行之必致紛紜徒敗壞天下使後人指為口實而已夏殷周授田季氏云夏時地未盡墾則田少殷地漸墾則田增至周益墾則田多以五十畝變為七十畝以七十畝變為百畝截長補短隨地制形不過易一經界而已豈必截然方正區分為九列如井字整如棋局哉後儒止因拘于周禮遂溝之説取必於方祗見其難行耳乃併以孟子為傳聞其誤後學甚矣朱子曰嘗疑孟子所謂夏后氏五十而貢殷人七十而助周人百畝而徹恐不解如此先王強理天下之初做許多畝澮溝洫之類大段是費人力了若是自五十而增為七十自七十而增為百畝則田間許多強理都會更改恐無是理孟子當時未必親見只是傳聞如此恐亦難盡信也按三代授田有五十七十百畝之不同者皆因步有多寡否則尺有長短耳步有多寡者如古以步百為畝自漢武至今以二百四十步為畝故殷八以一百四十步為畝則七十畝當周之百畝夏后氏以二百步為畝則五十畝亦當周之百畝也謂尺有長短者如三司布帛尺以十二寸通用尺十寸周尺止六寸有竒蓋周建子度從黃鍾起數故尺短殷建丑度從大吕起數尺差長夏建寅度從太蔟起數尺尤長其説亦通不然經界豈易事可如是紛更乎經界既移則廬舍亦當盡為改造且每井田中必鑿一井以備汲灌此井田之所以得名也亦將盡為改鑿乎蓋井田起于黃帝至少康云有田一成則井十為通通十為成之制已久夏后氏亦非全用貢法也畿內外貢助辨季氏引匠人法注云采地制井田異于鄉遂及公邑鄉遂與公邑之在甸稍縣都皆有貢而無助其餘稍縣都皆行助法又云畿內用夏之貢法都鄙用殷之助法愚謂一國之民一也何分地之逺近天下之民一也何分畿之內外雖自國中以及于四強自四強以達于四海稅無重輕所以為王者大同之政其有不同者不過以地有上中下之等差則授有多寡民有居之逺近則役有疏數重輕皆低昻稱量使無不均耳舊注謂周之畿內稅有重輕邦國之稅內外異法此不過因孟子請野九一而助國中什一使自賦遂生此説耳愚謂國中壙野之地即可為助野有隰皋之地即可為貢蓋不可泥也唐均田法唐制令民田五尺為步二百四十步為畝百畝為頃授田之制丁男年十八以上人一頃其八十畝為口分二十畝為永業耆老及癃篤廢疾者人四十畝寡妻妾三十畝當戶者增二十畝皆以二十畝為永業餘為口分永業田樹以榆棗桑及所宜木皆有數凡鄉田多足授丁者為寬鄉少者為狹鄉狹鄉授田減寬鄉之半嵗一易者倍授之三易者不倍授工商寬鄉減半狹鄉不給凡民徙出鄉及貧無以葬者得賣世業田自狹鄉而徙寬鄉者得并賣口分田已賣者不復授死者收之以授無田者凡收授皆以嵗十月授田先貧及有課役者凡鄉田有餘以給比鄉縣有餘以給比縣州有餘以給比州凡新附之戶春以三月免役夏以六月免課秋以九月課役徙寬鄉者縣覆于州出境則覆于戶部官以附達之自畿內徙畿外自京縣徙餘縣有某沒外蕃入一年還者給覆三年二年還者給覆四年三年者給覆五年浮民部曲客女奴婢縱為良者附鄉貞觀中太宗方鋭意於治課州縣吏以鰥寡少者進者如增戶法失勸導農田者以減戶論其凶荒有社倉賑給不足焉徙民豐登州縣就食焉李翺分田法唐李翺著平賦書曰凡為人下者視千里之都為千里之都者視百里之州為百里之州者見一畝之田而一畝之田起于六尺之步二百四十步之謂畝三百有六十步之里方里之田五百有四十畝十里之田五萬有四千畝百里之州五千有四億畝千里之都五千有四百億畝方里之內以十畝為之屋室徑路牛豚之所息蔥韭蔬菜之所生而里之家給焉凡百里之州為方十里者百州縣城郭之所建通川大塗之所更丘墓鄉井之所聚􅎌遂溝澮之所渠大以人過方十里者三十有六而百里之家給焉千里亦如之一畝之田以強并弱水旱之不時雖其不能盡地力者嵗不下粟一石公收其十一凡百里之州為田三十四億五百有六十畝畝率十取粟一石三十四萬五千有六百石以貢于天子以給州縣凡執事之祿以供賔客以輸四方以禦水旱之災皆足於是矣其田間樹之以桑凡樹桑人一日之所作者謂之功桑太寡則乏于帛太多則暴于由是故十畝之田植桑五功一功之桑取不宜蠶之嵗度之雖不能盡其功者功不下一匹帛公稅其百之十凡百里之州樹桑百一十五萬有二千功率十取一匹帛帛一十一萬五千有二百匹以貢于天子以給州縣凡執事者之祿以供賔客以輪四方以禦水旱之災皆足于是矣鰥寡孤獨有不人疾者公與之粟帛能自給者弗征其田桑凡十里之鄉為之公囷焉鄉之入粟于公者嵗十舍其一于公囷十嵗得粟三千四百五十有六石十里之鄉多人者不下千六百家鄉之家保公囷使勿偷飢嵗并人不足于食量家之口多寡出公囷與之而勸之蠶以需麥之熟焉及其大豐鄉之正告鄉之人歸公所與之粟戒必精勿濡以內于公囷窮人不能歸者與之勿徴于書則嵗雖大飢百姓不困于食不死于溝壑不流而入于他境矣人既富樂生重犯法而易為善教其父母使之慈教其子弟使之孝教其在鄉黨者使之敬讓羸老者得安幼者得養鰥寡孤獨有不人疾者皆得樂其生屋室相鄰煙火相接于百里之內與之居則樂而有禮與之守則人皆固其業雖有強暴之兵莫之敢陵自百里之內推而布之千里自千里而被于四海其孰能當之是故善為政者百姓各自保而親其君上雖欲為亡弗可得已其在詩曰逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫此之謂也且夫重斂則人貧人貧則流者不歸而天下之人不來土地雖大荒而不耕雖其耕之而地有遺力猶不耕也是謂棄天之時遺地之利竭人之財輕斂則人樂其生人樂其生則居者不流而流者日來居者不流而流者日來則土地無荒桑柘日繁地有餘利人益富兵益強與之安而居則富而可教與之危而守則人皆自固孟軻所謂率其子弟攻其父母自有生人以來未有能濟者也宋林勳占田法林勳政本書十三篇略言國家兵農之政大率因唐五代之故農貧失職兵驕不可使而飢竄四逸為盜賊也亂本立矣宜倣古井田之制使民一夫占田五十畝其有羡田之家毋得更市田其無田與遊惰末作者皆驅之使農耕羡田而雜紐錢榖為十一之緡每井賦兵二人馬一匹率為兵六千四百人馬三千四百匹嵗取五之一為上畨之額以給征役無事又分為四畨以直官給守衛是民三十五年而役乃一周也畨上則嵗食米萬九千餘斛錢三千六百餘緡無事則減四分之三皆以一同之租稅供之匹婦之貢絹三尺綿一兩百里之縣嵗收絹四千餘匹綿三千四百斤非蠶鄉則布六尺麻二兩所收視絹綿率倍之行之十年則民之口算官之酒沽與凡茶鹽香礬之權𣙜皆可弛以豫民其説甚具後又獻比校書二篇大略謂桂州地東西六百里南北五百里以古尺記之為方百里之國四十當墾田二百二十五萬二千八百頃有田夫二百四萬八千出米二十四萬八千斛祿卿大夫以下四千人祿兵三十萬人人桂州墾田約萬四十二頃丁二十一萬六千六百一十五人稅錢萬五千餘緡苗米五萬二百斛有竒州縣官不滿百員官兵五千一百人蓋土地荒蕪而遊手未作之人衆是以地多遺利財用不足皆本政不修之故也朱文公熹甚愛其書東陽陳亮歎以為考古驗今思慮周密世為井地之學者莫能加也按自限田名田之議先漢不即行而貧富益逺獨唐李翺宋林勳倣三代井田遺意考古驗今分劈講畫作賦政本二書甚具而宋儒張載有買田一方畫為數井之思且講求法制以為不刑一人而可復時皆不售惜哉均田論附國初分田之制有四曰魚鱗有圖曰刑嚴詭寄曰律嚴欺隱曰籍沒有稽夫魚鱗有圖則強界明矣刑嚴詭寄則法令行矣律嚴欺隱則賦役均矣籍沒有稽則官民辨矣而且賦有定期役有常額此師古而迹不泥政善而民宜焉者也今則豪右之兼併也而賦獨輕問之曰可不舉初年之法乎則皆曰南陽𢎞農不可問姦猾之詭射也而彼不供問之曰何不舉初年之法乎則又曰投鼠忌器城狐莫究夫兼併不抑則無土之民外逃詭射不問則守法之民必貧夫兼併何以能驅民於逃也得其地而遺其糧賦奚以供而可獨存乎詭射何以能致民於貧也差重而貢之者寡役奚以辨而能獨供乎故地去而糧存兼併者使之也人逃而賦存詭射者為之也况兼併必勢豪其財智足以迷吏書而賦獨減詭射必貴顯其信望足以懾官守而役獨蠲由是鬻産者逃而責陪於里甲里甲復逃而均之槩縣包陪不勝而告者紛紛矣守令無如之何而均田之説起矣蓋古之所謂均田者因人而授之田而無不耕之夫顧賦有定籍法不可以盡壞人有定業勢有難以遽奪是未可行也今之均田云者無亦欲因田以平其賦使無不稅之田乎然行之未得其道弊且緣是以興其故何也蓋國初以監生供丈量之差履畝畫圖有差錯則罪之以故法行而難犯今則民偽滋甚法有難以盡行者且田有等則賦有上下不論其等則欲盡取而均之則官民莫辨肥瘠無等吾恐法難行而弊之踵於昔者愈滋矣何也蓋兼併詭射者威既足以制人賄又有以通神向也賦雖匿而名猶存今則併其名而亡之矣向也役雖隱而籍猶存今則併其籍而去之矣矧夫投獻過寄流弊日深有長民之責者寧能恝然而不為之所哉兹欲除其弊以復其舊使不去其所為法之蠧者可乎夫田不可均故也而兼併獨不可抑乎糧不可均固也而詭射獨不可革乎然抑兼併之法有三日稽田地曰重差曰先徴科産去稅存則稽鬻産者誰也由是計畝而責之催收田多糧少則稽脫漏者誰也由是計糧而責之收籍此稽田地之法也富者必重其差役必先其科徴役重則不勝其差之繁彼或且無樂其業之廣徵先則不勝其督之嚴而亦將苦其糧之多此重差役先徴科之法也稽詭射之役術有二日慎優免曰考寄莊夫優免免其本業耳今則廣收富人之田以射利欲慎之則近日之例可尋也寄其廣布者耳今則借豪貴之名以隱差欲革之亦近日之禁可尋也至於投獻有例強占有禁其法具存也其他荒蕪汙下之地糧不可減也召民耕種之使之止供輕糧而差不與焉獨曰不可乎河水衝決之地糧不可減也則以汙漲者補給之計畝而不使贏焉獨曰不可乎是皆救賑之急務而通變宜民之至術也舉而行之則利不必興也去其害利者則利自興矣法不必改也去其蠧法者則法無不善矣然則積弊以革賦役已均流亡漸復荒蕪漸墾如是而其民有不富盛而其法有不行者吾未之信也若曰必欲行均田之法則將奪富人之所有給貧者之所無情屈勢格必羣起而爭之況司府會計之繁郡邑踏勘之擾又有不勝其弊者乎故朱子謂均田為東坡之戲論良有以也井田限田均田總論夫井田法黃虞氏以前尚矣靡得而記云至周始備亦子輿氏所謂大略也自李悝商鞅出而其法決裂廢滅無存誠為萬世戎首然秦漢迄今英君誼辟與竒謀石畫之臣莫之能變即有變者或至紕戾無稽此豈秦之法有加於三代聖人耶談者謂戰國干戈之後丘陵城郭墳壠廬舍鞠為茂草即有平原亦半荆棘漢去秦無幾已不能比次而經紀之顧處千載之下而欲籠其業以授民踵新莽之復轍吁亦迂矣是井田之不能復也勢也議者無巳又有限田均田之説董仲舒倡限田於元狩而武帝不果行師丹請限田於鴻嘉而成帝不能用乾興初詔限公卿以下與衙前將吏田而任事者以為不便夫井地既廢富民業已肥殖長子孫傳襲擬於封國而遽欲於嵗月間盡裭其所有此亦非人情矣是限田之不能行也亦勢也由周而來七百年魏孝文納李安世之疏均授民田然不再傳而廢又百二十年而唐太宗定口分世業之法然行未久而報罷又二百三十年而周世宗詔行元稹均田圖法然世族羣起而撓之夫周制既逺生齒錯出民之遷徙靡定田之給代無常而履畝握算官且不勝其盩矣是均田之不能久也亦勢也夫田不能井又不能限又不能均均亦不能久第建步立畝括田均賦此為至䇿其必量山澤之入視莊屯之額塞飛詭之竇責無籍之戶令所輸者與所入相當取他羡補崩決償失額無嫁稅匿逋者即驗問嘉與更始弛其罰無論世世偏纍疲癃之民歡然若更生如此則田不必井而井之之法存田不必均而均之之法寓矣㕓里空地未有肆城中空地未有宅場圃之地可以種果蓏可以納禾稼宅田者以備民宅及致仕者所受之田士田者士大夫所受之田賈田者商賈所受之田官田者庶人在官所受之田賞田者有功而受賞之田牛牧田者牧養之家所受之田自甸之外以至疆地有公邑有卿之采地有公之采地有王子弟所食之邑亦以任之載師掌任地之法有㕓里有㕓場圃有宅田士田賈田有官田牛田賞田牧田有公邑之田有小都大都之田且國有四民農之受田無疑矣惟工商之受田初無明文而二鄭之釋周禮則有異商之議元謂士大夫之子得而耕之田也賈田吏為縣官賣材者與之田也後鄭則引漢食貨志之言謂農民戶一人已受田其家衆男為餘夫亦以口受田如此士工商家受田五口乃當農夫一人據後鄭之意則直謂賈田為商田之家所受田也豫以為不然夫四民不相業亦不相雜處其來久矣四民之中自農之外惟士為然田蓋使之耕且養也果如後鄭之言以賈為商賈之賈則工商一也何載師獨載賈田而不言工田乎嗟夫王者之所重者農民也所輕者未作也不耕者出屋粟宅不毛者出里布莫非設輕重之法使民知農之為優而工商之不足事也今使為工者得以器械易粟而復受田焉則誰不為工乎使為商者日中而市交易而退而復受田焉則誰不為商乎然則載師無商田工田之明文而後鄭必為之説豫以為深知先王重本抑末之意王城之中國宅無征園圃所償窶者賴之㕓里所受民以為居者皆薄其征五十里近郊其民役使頻故輕稅十取一優之百里逺郊其民役使不若近郊之頻故二十取三至於甸稍縣都在逺郊外其民役使又不若近郊之頻故十取二唯潻林之征二十而五者懼民趨末作侈於器用故二十取五以抑之載師任土載師所治廣總其大綱故自國中至疆而言其地閭師任民閭師所治小徴于各戶故自三農至間民而言其民載師任土自國中以及疆掌其大綱閭師任民自三農以致無常職掌其細目相為經緯夫凡民之事有一定而不易者九職是也有兼為而不費者樹畜是也故先王之世雖士工商之家靡不受田務使人知稼穡之艱難婦女各務蠶絲紡績則業日起而善心生至于梧檟桑柘之植雞豚狗彘之畜尢取諸天地自然之利而無所費但在乎愛養之而已此皆富民之本而為善之資也不勤于樹畜者則五者之罰使不得備禮載師以其不務本業故徴其財閭師以其不能兼職故罰其禮上之人非利其財也將驅之以務本耳非靳于禮也將愧之而使勤耳又旅師三六遂之賦猶閭師之于六鄉也閭師罰惰民之禮旅師聽新畝之治此皆鄉遂之不可少者王畿任土任民總考載師掌任土之法以物地事授地職而待其政令物如物土方之物區别也别土所冝而定制以待其賦稅之式也以㕓里任國中之地㕓里市宅分域限也居室相比乃國中所冝以場圃任園地種草木果蓏屬曰圃季秋或有收者乃則築為場詩九月築場圃是也乃園地所冝樊圃謂之園以宅田士田賈田任近郊之地宅田凡民居中者庶人在官者皆是也士田賈田所謂士工商家受田五口當農夫一人蓋土居學而費居市也三者在國於近郊五十里之地為宜以官田牛田賞田牧田任逺郊之地官田籍田類牛田供牲牢喪奠兵車之牛賞田賞賜之田即匪頑之式也牧田即芻秣之式也故於逺郊百里之地為宜百里之內以供官以公邑之田任甸田公邑之田地天子使吏治之供羞服類所謂千里之內以為御以家邑之田任稍地家邑大夫采地而有宰也稍地三百里於小邑為宜以小都之田任縣地小都卿之采地成都者七十里視伯於縣地四百里為宜以大都之田任強地大都公之采地王子弟所食邑也百里視侯於疆地五百里為宜郡王畿界也凡任地國宅無征國宅凡官府有官室吏所治者園㕓二十而一指國中近郊二十而二甸稍縣都皆無過十二皆指圍㕓近輕而逺重也唯其漆林之征二十而五不分逺近而特重者以獲利之多也凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之役以時徴其賦毛桑麻也布帛也宅地不種桑麻出一里之布鄭玄㕓城邑之居孟子所云五畝樹之以桑麻者也王莽時城郭中宅不樹者為不毛者出三夫之布市也田地不耕墾者出一屋之粟夫三為屋亦長一里也征一布也夫家之征一夫受田成家口稅也如家三人二家五人家二人之家蓋民唯有七口六口五口之三等而皆受田百畝為夫也以屋粟證之百畝而出三百之粟則令出上地家三人之稅與小司徒所謂歟夫屋孟子曰㕓無夫里之布是也各因其類而重罰之所以警戒驅之也先儒分夫家為一非也閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徴其賦凡任民任農以耕事貢九穀即太宰以九職任萬民一曰三農生九穀任圃以樹事貢草木即二曰園圃疏草木任貢以飭材事貢器物即五百口飭化八初任商以市事貢貨賄即六曰商賈阜通貨賄任牧以畜事貢鳥獸即四曰藪牧養蕃鳥獸任嬪以女事貢布帛即七曰嬪婦化治絲枲任衡以山事貢其物任虞以澤事貢其物即三曰虞衡作山澤之林但九職又有八曰臣妾聚斂疏材此不言者山澤足以該之注疏材百草根實可食者凡無職者出夫布九曰間民無常職轉移執事此云出夫布乃不執事者耳凡庶民不畜者祭無牲不耕者祭無盛不樹者無槨不蠶者不帛不績者不衰衰布也凡此皆罰其所無以勸其業按載師掌任地事則無曠地閭師掌任民力則無遊民先王所以治國中野外不過如此而已況任地配酌其輕重而以其十之一十之二十之三輸之天子亦不失徹法之意任民凡無職者出夫布又謂無牲無盛無槨不帛不衰無非示罰以警遊惰耳非若後世經常之征斂也可見任地之法又自與任民之法不同鄭氏遂以載師為任民之法誤矣圖書編卷八十七
