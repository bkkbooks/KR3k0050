body:
  text: 圖書編卷二十五明章潢撰堯典分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交平秩南訛敬至日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虚以殷仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛鄭氏云二十八宿環列於四方隨天而成轉東方七宿自角至箕是為蒼龍以次舍而言則房心為大火之中南方七宿自井至軫是為鶉鳥以形而言則有朱鳥之象虚者北方七宿之中星也昴者西方七宿之中星也星本不移附天而移天傾西北極居天之中二十八宿半隠半見各以其時所以必於南方而考之仲春之月星火在東星鳥在南星昴在西星虚在北至仲夏則鳥轉而西火轉而南虚轉而東昴轉而北仲秋則火轉而西虚轉而南昴轉而東鳥轉而北至仲冬則虚轉而西昴轉而南鳥轉而東火轉而北來嵗仲春鳥復轉而南矣循環無窮此堯典考中星以正四時甚簡而明異乎吕令之星舉月本然聖人南面視四星之中豈徒然哉凡以授民時秩民事而已春夏秋冬四時之運也若隠於無形然日月星辰七政之旋也則顯於有象而日中星鳥日永星火宵中星虚日短星昴此皆有象之可見者惟即其有象以察無形而四時寒暑之候固已昭然於天象之表矣後世厯家執其一定之數以算其無窮之運一有不合則歸之差法不精不知考驗天象以授民時何怪其法愈密而差愈多歟堯典分至中星分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交平秩南訛敬至日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虚以殷仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛鳥火虚昴皆分至之昏見于南方正午位之中星仲春之月七宿各居其方位故星火在東鳥在南昴在西虚在北日在昴入于酉地則初昏時鶉火見于南方正午之位當是時晝夜各五十刻是為春分之氣至仲夏之月則鳥轉而西火轉而南虚轉而東昴轉而北日在星入于辛地初昏之時大火房心見於南方正午之位當是時晝長夜短晝六十刻夜四十刻是為夏至之氣至仲秋之月則火轉而西虚轉而南昴轉而東鳥轉而北日在心入于酉地初昏之時虚見於午當是時晝夜分亦各五十刻是為秋分之氣至仲冬之月則虚轉而西昴轉而南鳥轉而東火轉而北日在虚入于申地初昏之時昴見於午當是時晝短夜長晝四十刻夜六十刻是為冬至之氣冬至之氣既定則十二月之氣無不定矣星鳥以象言星火以次言虚昴以宿言互相備也愚謂天地四時之氣皆不外于中子午者二至之中亦天地之中夘酉者二分之中亦陰陽之中也以二十八宿之中星至于中而止聖人出而致中和以位天地者亦曰執中而已唐虞時日躔冬至在子夏至在午春分在夘秋分在酉今未四千年而冬至在寅夏至在申春秋二分在己亥計其嵗差退四五十度則由帝堯後萬餘年冬至日反躔午夏至日反躔子春分在酉秋分在夘矣若復舊躔而冬至在子夏至在午當在二萬年之間逆而推之帝堯之前亦必如是四時中星何由而定曰昏旦之星由日而行出入志其中黄道既毎嵗有差則日躔亦隨之而變故正四時之中星必先於冬至日日躔既定於冬至則推之四時可坐而致大抵日冬至日躔與夏至日躔對衡春分與秋分亦然堯時冬至之日日在虚一度則星鳥星火星虚星昴皆於四時之中而得其正四仲中星正日總論聖人南面視四時之中所以候四時以布民政也故堯命羲和厯象日月星辰敬授人時舜在璿璣玉衡以齊七政皆為此也然則天以二十八宿分布四方凡三百六十五度有竒為日月五星之次舍日行一度為一日一周天為一嵗月行三十日一周天為一月故日月一嵗十二㑹為四時時有孟仲季仲為分星人君不能以朝夕察候乎星度也故舉四時之中以驗之曰日中春分也曰日永夏至也曰宵中秋分也曰日短冬至也所謂星鳥者南方之星七為朱雀體春分則見於南方也所謂星火者東方之星七為蒼龍體夏至則見於南方也所謂星虚者北方之星七為𤣥武體秋分則見於南方也所謂星昴者西方之星七為白虎體冬至則見於南方也鄭康成曰凡記昏明中星者為人君南面而聽天下視時候以授民事也既舉四時之中又昏旦但視南方列宿則孟季之月與周天之度數從可知也故厯代聖王尚之夏有小正周有時訓秦漢暨唐及宋朝皆有月令所以順天時而督民務也詩曰定之方中作於楚宫又有三星在天在隅在户之候春秋𫝊曰啟蟄而郊龍見而雩又曰土功水昏正而裁又曰凡馬日中而出日中而入此皆視列宿而行國政也厯三代漢唐至于今數千年日行漸逺故中星隨而轉移堯典之中星與月令之中星為不同月令之中星與厯之中星又不同書於春舉星鳥而月令於仲春則曰昏弧中書於夏舉星火而月令於仲夏則曰昏尾中書於秋舉星虚而月令於仲秋則曰昏牽牛中書於冬舉星昴而月令於仲冬則曰昏東壁中書之中星常在後而月令之中星常在前故鄭康成之釋禮記則曰月令舉其初朔而尚書舉其月之中也豈非與月令為不同乎月令於孟春昏參中而三統皆於立春則以為昏畢十度中元加厯於立春則以為昏昴九度中皆不同其為昏參中者考之餘月之昏旦亦莫不然是月令與厯未嘗同也故孔頴達之疏禮記則曰月令但舉其大畧所以昏明之星不可以正依厯法也豈非與厯為不同乎昔元祐中蘇頌為儀象法要以月令洎唐及宋朝所測者合為四時昏旦中星圖陳祥道為禮書亦併論其月令尚書中星之異皆此意也雖然月令於餘月之昏旦中皆舉二十八宿如孟春之參尾中季春之牽牛中孟夏之日翼日婺女季夏之日火日奎孟秋之昏虚中孟冬之旦七星中季冬之旦軫中皆二十八宿也惟仲春之月日奎昏弧中旦建星中獨非二十八宿者以弧星近井而建星近斗石氏星經曰井有三十六度斗有二十六度以井斗度多其星體廣逺不可的指其昏旦之中故舉弧建以定之此又不可不知其大畧葢以不合於厯數何言之疎矣斯殆不知夫嵗差所由始哉春秋運斗樞所次七星一天樞二璇三璣四權五衡六開陽七摇光一至四為魁五至七為杓魁杓合故曰斗焉居陰布陽故稱北焉石氏乃曰一主天二主地三主火四主水五主土六主木七主金也又曰一秦二楚三梁四呉五燕六趙七齊也其占法殊焉天官書則曰杓携龍角衡中南斗魁枕參首斗為帝車運于中央臨制四海分陰陽建四時均五行移節度定諸紀皆係於斗也其取義異焉斯殆有見於七政所由叙哉夫所謂嵗差者葢後世史官攷諸中星與太初厯不協大要日躔之次常失不及未敢有定制焉迨晉虞喜始創差法宋何承天倍之隋劉焯折衷之唐一行復推以大衍皆以所推之年為日退一度至校以堯典月令之差又不符合或謂吕不韋已用差法故不宗堯典載考自堯甲子厯秦莊襄漢太初越宋紹興甲子積年三千四百二十一其日差也計度以四十三積分以七千八百八十八然或百嵗計或七八十嵗計又莫一焉噫差是也其不能必一者非差之咎也昔者聖人作厯考之以象曰日月星辰驗之以氣曰陰陽寒暑積之以數曰秒忽毫釐夫以至㣲之數而推至變之氣動息升降不謀也盈縮遲速不律也非變通以達其滯神明以觀其用毫忽之爽躔次之謬幾南北易位冬春互見矣故杜預曰治厯者當順天以求合非為合以驗天程朱亦論陰陽盈縮不齊不能無差凡此獨觀其原者也厯法所起古法以紀蔀為宗從伏羲先天甲寅積周一千八百一十四紀再八十五紀人元一十有二蔀當癸酉蔀嵗在己丑而生帝堯至甲辰嵗十有六即位越二十有一嵗得甲子而演紀作厯是年天正冬至日在虚一度按乾鑿皇極經世及漢皇甫謐所載並然嵗差法按紀元厯嵗周三百六十五度四千二百三十六分此一嵗之氣積分也周天三百六十五度四千五百六十四分大陽所躔周天之度也嵗差一百二十八分注云以嵗周數除周天數即得太陽嵗行不及之分度毎一萬注以一度為萬分自演紀至開元甲子冬至在斗十度凡退三十八度四千一百二十八分王乾德甲子冬至日在斗六度凡退四十一度四千八百四十分至慶厯甲申冬至日在斗五度此法通古合今故堯厯日在虚一度而鳥昴虛以仲月昏中合堯典嵗差之法虞喜以五十年差一度久而驗之弗合也何承天以百年劉焯以七十五年僧一行以八十三年久而驗之又弗合也許衡王恂郭守敬以六十六年有餘似密矣今據其法歩之又弗合也且如定嵗之法積四朞餘日而分日加於四朞故二至之時秪存絲忽此所宜定也又如定日之法日有百刻而變為九百四十畫以氣朔有不盡之數難分故也凡月三十日而二氣盈四百十一畫二十五秒一朔虚四百四十一畫積虚盈之數以成閏故定朔必視四百四十一畫前後為朓朒秪在一畫之間此又所宜定也日月交食唯日食實難定月食分數惟以距交逺近别無四時増損葢月小闇虚大月入闇虚而實故八方所見同也日為月所掩而食而日大而月小日上而月下日逺而月近日異四時月有九道故旁觀者逺近自不同矣如北方食既南才半虧南方食既北才半虧故食之時刻分秒據地定表因時求合而後準也如乾清宫火之嵗仲秋日食日宫所歩合八分六十七秒而閩廣之區遂至食既其時刻分秒焉可同之今按交食以更厯元時分刻刻分分分分秒至精至細及至於半秒難分之所此又所宜定也夫差之半秒積以嵗月則躔離朓朒皆不合原算矣嵗差法見天道自古及今日漸不同也厯家但拘常而推所以誤焉隨時脩改以與天合元厯得之矣厯自上古黄帝以後莫不隨時考驗以與天合故厯法無數更之弊及秦滅先世之術置閏於嵗終古法殫廢矣由漢而下以積年日法為推歩之準以至於天夫天運流行而不息欲以一定之法拘之未有久而不差之理差而必改其勢有不得不然者乃命改造儀象日測月驗以與天合庶永終無弊自古厯多一定之法故未久而差由不知天為動物而嵗亦畧有差也古厯雖立差法五十年差一度又太過一百年差一度又不及七十五年差一度稍為近之尚未精密元朝以八十一年而差一度算已往減一算算將來加一算始為精密又隨時以儀象三代以上厯無差法非不差也順天運以治厯故也漢唐以下厯法愈密而差愈多非始有差也執厯法以合天故也夫法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月惟順此以治厯而隨而變通焉故雖有差也亦差于本嵗之四時而即因以草之不守其故轍此所以無差也若恃吾之算數為至密籌䇿為甚精毫釐絲忽為不爽吾恐銖銖而較之至后必差况執有為有盡之術窮無方無體之妙雖欲不差其可得乎盍以古今之日躔觀之彼天開于子冬至乃時之始也混沌初闢日躔冬至而日月五星皆在于子凡知厯理知厯法者莫不云然考之堯典曰日短星昴以殷仲冬是冬至昏見之星昴在天中則日之躔固在虚也夫子之虚非子之半乎堯時冬至日躔虚宿故知堯去開闢未逺也周則冬至日躔牽牛矣夏商雖把宋無徴以是推之其在須女乎漢太初厯猶在牽牛唐在斗迨元厯日已在箕我朝在箕三四度矣夫斗牛女虚皆北方之宿箕乃東方之宿也自子之半虚之十度至箕三四度已差六十五六度可見日度漸移古今一也三代以前無差法無所用其法也雖然猶有説焉書堯典曰日短星昴以殷仲冬禮記月令曰仲冬之月日在斗昏東壁中旦軫中又與史書周漢在牛唐在斗者不合故漢洛下閎但疑八百年差一度至虞喜劉焯議始紛紛唐冬至日躔斗十三度至一行而論始定蔡邕何承天王朴輩皆所不及然久亦弗合元郭守敬授時厯倬然超軼古今而在元時亦已有差焉然則後世算愈密而差愈多者得非察于細而畧于大較于尺寸而遺于尋丈驗於旦夕而不迨於天地之始終歟今將何所折衷哉書有欽天授時之訓易有治厯明時之象周禮有致日致月之法皆聖人之教也大約總年與度而通均之則知一度所得之年矣而又嵗嵗冬夏致日春秋致月隨其變通為之改革故雖有差也要不出於一嵗之外也以此欽天授民得非堯典四仲考定中星之遺法乎十九年七閏而氣朔分齊特餘三時爾是為一章也七十六年為一蔀凡為四章四三十二合三時之數復得全日一闗十二時為一日一章該二百三十五朔一蔀該九百四十朔故以二百三十五闗為三時以九百四十闗為一日是以分四章而為一蔀故四三一十二而朔亦無餘分也漢太初厯凡十九年七閏為一章章者至朔分齊閏無餘分也二十七章五百一十三嵗為一㑹㑹者日月交㑹一終也凡三㑹八十一章一千五百三十九嵗為一統閏朔並無餘分但非甲子嵗首也凡三統二百四十三章四千六百一十七嵗為一元至是閏朔並無餘分又值甲子嵗首也此揚子雲擬之以作太𤣥也唐大衍厯亦以初年甲子日子時朔旦冬至在嵗次甲子之首謂之至朔同日第二十年為第二章首復得至朔同日然非甲子之先期夜半乃是癸邜日邜時第三十九年至朔同癸未日午時第五十八年為第四章首至朔復同於癸亥日夘時第七十七章至朔又復同於癸邜日子時因其至朔同在夜半與初年第一章同遂以七十六年名一蔀蔀者蔽暗昧之時也凡四章為一蔀總二十蔀者曰一紀計一千五百二十年必然至朔同於甲子之先期夜半但非甲子嵗首耳總三紀積四千五百六十年至朔同於甲子之先期夜半又甲子嵗首總㑹如初名曰一元此僧一行推之衍大易也厯説雖多不出此二家之一説也厯家之好為欺罔也甚哉不知厯者率為其所欺及知厯者又復與之為徒欲自神其術故凡為是紛紛名數之浩繁㕘錯者大抵設辭飾説務使人莫知之遽解以自神竒而已矣獨司馬遷之厯書獨為簡易特曰大餘小餘而已而亦不明著其説至於班固之志太初厯何其欺之甚也太初立法之踈已不足道司馬遷悟其非不敢筆之於書復用古厯九百四十分而固尊稱八十一分之善又從而肆陳其飾説所謂太初厯之本法以一日為八十一分凡月行凡一十九日八十一分日之四十三復與日㑹而為一月如此言足矣何必秘其説而曰月法二千三百九十二也二千三百九十二即二十九日又八十一分日之四十三之數也以月法二千三百九十二而四之弦望晦朔於是乎定爾又分何必復立通法五百九十八也此猶云可十九年而七閏初無深秘乃立為章嵗之名又曰合天地終數得閏法地數於十天數於九十九而七閏耳何必詭為是强合之説自此積之至千五百三十九年而為統何法之有又何必言以閏法乘日法得統法其章二十七章而為㑹三㑹而為統初無闗乎以閏法乗日法也秘其本實之説詭飾偶合之文所謂章月二百三十五日者十九年之月數耳殊不必言何必復立其數又何必五位乗㑹數得章月也所謂㑹月六千三百四十五者二十七章之月數耳亦何必言又何必曰以㑹數乗朔望之㑹得㑹月也所謂統月萬九千三十五元月五萬七千一百五皆不必言也所謂章中二百二十八即十九年之中除七閏月之無中氣者其數如是耳所謂統中即統月之除閏所謂元中即元月之除閏徒為浩繁之數以助神竒之狀葢不神其術無以言功于上功無足言則名譽不彰利禄患失此漢以來厯家胸中黙符之利心厯法精備世服大衍之為法其要在乎通法三千四十凡二十九日三千八十四日之一千六百一十三則月復與日㑹是為一月耳何必飾而為説曰四象之䇿又曰揲法八萬九千七百七十三揲法之數即二十九日與夫餘分一千六百一十三之數每一日為分三千四十即得其數何竒之有何揲之有如曰四四揲之象夫四方其數而定弦望晦朔則明曰四分之以定弦望晦朔足矣何必為是詭飾之辭不務以明告天下而専務以滋惑人周天三百六十五度三千四十分度之七百七十九太如此言周天度分豈不明白簡易何必易其名曰乾實又積每度三千四十分而為一百一十一萬三百七十九太也日行不盡天度嵗差三十六分如此言嵗差又豈不明白簡易又何必變其名曰實䇿一百一十一萬三百四十三也所謂減法尤其無謂所謂九萬一千二百者三十日之數耳既不合日之行又不合月之行乃先布此數復減朔虚一千四百二十七是為揲法一月之數八萬九千七百七十三耳不必立此數可也所謂所差一萬七千一百二十四即十二月之朔虚一千四百二十七也朔餘一千六百一十三其數不可廢至於虚分一千四百二十七不必言可也又何必詭其名日用積差其虚數至于一萬七千一百二十四若此之類奚可殫舉自時厥後諸厯迭興豈能果有所改作哉皆不過寫大衍之分或以八千四百為日法以四千四百五十七為朔餘或以一千三百四十為日法以七百一十一為朔餘其數自異其實即大衍之日法三千四十即大衍之朔餘一千六百一十三詭名飾詐以欺不知厯者忠信道喪一至于此歐陽永叔既知其詭又備載其詭辭相與為欺何也豈詭辭為文士之常耶日與天㑹而有氣盈即厯書所謂大餘五小餘八也月與日㑹而有朔虚即厯書所謂大餘五十四小餘三百四十八也大餘日也小餘分也五嵗再閏而無餘分厯書所謂無大餘無小餘也厯家逆考往古冬至嵗月日時各紀甲子兩曜交㑹五星連珠必推其聚於子正𤣥枵之中者名曰上元乃履端於始也從上元而下至當時測驗與籌䇿相應乃取正於中也又順推以後求其餘分皆盡總㑹如初乃歸餘於終也一日百刻亦曰百分一分又為百秒求其積年總㑹難以百分萬秒細作名項籌䇿亦不能齊是以日法立焉古者以九百四十為日法始於至朔同在甲子夜半復㑹如初名曰一元積年止四千五百六十而已後世推歩知十九年七閏尚有餘數兼欲七政皆齊是以履端歸餘之算非積年數千萬不可諸厯各立日法或以八十一或作三千四十或作九千七百四十其數多寡不定惟所謂截元厯者但以推歩定數為則不復逆考順推以求其齊至元辛巳改授時厯實用其術而積年日法在所不取左𫝊文公元年於是閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖厯法以十一月甲子朔夜半冬至為一元其時日月五星皆起於牽牛初度更無餘分以此為推歩之端每嵗有二十四氣節氣十二中氣十二是每月皆有中氣惟閏月獨無中氣閏前之月則中氣在晦日閏後之月則中氣在朔日舉中氣而正月則置閏不差矣周天三百六十五度四分度之一日之行也日一度自今年冬至至明年冬至方一周天實計三百六十五個日零三個時也而一嵗止有三百六十日更有五日零三個時辰無所歸著是為日行之餘分每嵗只均分在二十四氣上所謂氣盈者也月之行也日十三度十九分度之七常以二十九日半强與日合於朔是每月又有半日弱無所歸著是謂月行之餘所故月不滿三十日而有大小盡焉所謂朔虚者也積日月之餘分每嵗常餘十一日弱故十九年而置七閏月是謂一章之數故云終于終也惟開端不差故時序無愆過中氣既正則寒暑不惑而民心無疑惑置閏得所故作事順時而無悖亂史記太史曰神農以前尚矣葢黄帝考定星厯建立五行起消息正閏餘於是有天地神祗物類之官是謂五官各司其序不相亂也民是以能有信神是以能有明德民神異業敬而不凟故神降之嘉生民以物享灾禍不生所求不匱少皥氏之衰也九黎亂德民神雜擾不可方物禍菑荐至莫盡其氣顓頊受之乃命南正重司天以屬神命火正黎司地以屬民使復舊職無相侵凟其後三苖服九黎之德故二官咸廢所職而閏餘乖次孟陬殄滅攝提無紀厯數失序堯遂復重黎之後不忘舊職使復典之而立羲和之官明時正度則節陰陽調風雨節茂氣至民無夭疫年耆禪舜申戒文祖云天之厯數在爾躬舜亦以命禹由是觀之王者所重也夏正以正月殷正以十月周正以十一月葢三王之正若循環窮則反本天下有道則不失紀序無道則正朔不行於諸侯幽厲之後周室㣲陪臣執國政史不記時君不告朔故疇人子弟分散或在諸夏或在夷狄是以其禨祥廢而不統周襄王二十六年閏三月而春秋非之先王之正時也履端於始舉正於中歸邪於終履端於始序則不愆舉正於中歸邪於終事則不悖其後戰國並爭在於强國禽敵救急解紛而已豈遑念斯哉是時獨有鄒衍明於五德之𫝊而散消息之分以顯諸侯而亦因秦滅六國兵戎極煩又升至尊之日淺未暇遑也而亦頗推五勝而自以為獲水德之瑞更名河曰德水而正以十月色上黒然厯度閏餘未能覩其真也漢興髙祖曰北畤待我而起亦自以為獲水德之瑞雖明習厯及張蒼等咸以為然是時天下初定方綱紀大基髙后女主皆未遑故襲秦正朔服色至孝文時魯人公孫臣以終始五德上書言漢得土德宜更元改正朔易服色當有瑞瑞黄龍見事下丞相張蒼張蒼亦學律厯以為非是罷之其後黄龍見成紀張蒼自黜所欲論著不成而新垣平以望氣見頗言正厯服色色貴赤後作亂孝文帝廢不復問至今上即位招致方士唐都分其天部而巴洛下閎運算轉厯然後日辰之度與夏正同乃改元更官號封泰山因詔御史曰乃者有司言星度之未定也廣延宣問以理星度未能詹也葢聞昔者黄帝合而不死名察度驗定清濁起五部建氣物分數然葢尚矣書缺樂弛朕甚閔焉朕惟未能循明也紬績日分率應水德之勝今日順夏至黄鍾為宫林鍾為徴太蔟為商南吕為羽姑洗為角自是以後氣復正羽聲復清明復正變以至子日當冬至則陰陽離合之道行焉十一月甲子朔旦冬至已詹其更以七年為太初元年年名焉逢攝提格月名畢陬日得甲子夜半朔旦冬至潛室陳氏曰左𫝊正義曰周天三百六十五度四分度之一日一日行一度月一日行十三度十九分度之七計二十七日有餘月已行天一周至二十九日過半即月法二十九日四百九十九分也又遂及日而與之㑹是為一月十二月而成嵗一嵗氣周有三百六十五日四分日之一今十二月惟三百五十四日是少十一日四分之一未得氣周細而言之一嵗正少十一日少弱所以然者一月有餘分二十九日法九百四十分四百七十八為半日今有四百九十九分是餘二十九分合十二月餘分三百四十八是一嵗既得三百五十四日又餘三百四十八分一日九百四十分其二百三十五分為四分日之一今於餘分三百四十八内取二百三十五以當四分日之一仍有一百一十三其餘整日又以餘分一百一十三減之是一年正餘十日八百二十七分不成十一日故謂十一日少弱一年少十日八百二十七分積十九年少二百六日六百七十三分少弱足以當之古厯十九年為一章章有七閏八章三年閏九月六年閏六月九年閏三月十一年閏十一月十四年閏八月十七年閏四月十九年閏十二月此據元首初章若於後漸積餘分大率三十二月則置閏不必同初章日月運轉於天如人之行歩推厯謂之歩厯歩厯之始謂之上元必以日月全數為始於前更無餘分以此日為端首即十一月甲子夜半朔旦冬至也故言履端於始也分一周之日為十二月則每月當三十日餘以日月㑹為一月則每月惟二十九日餘每月參差氣漸不正但觀中氣所在以為此月之正取中氣以為正月閏前之月中氣在晦閏後之月中氣在朔無中氣之月則謂閏月故言舉正於中也月朔之與月節每月剩一日有餘以所有餘日歸之於終積成一月則置閏故言歸餘於終也厯法總論厯法之難言也久矣天道無端惟數可以推其機天道至妙惟數可以明其理是故理因數顯者也數從理出者也理數可相倚而不可相離者也治厯以正天時因時以興民事而帝王為治之先務在是矣何則日月之運行星辰之次舍凡可歩推而知者亘古今而不變者也日月有盈縮朓朒之不齊焉星辰有遲留疾伏之不一焉往來出入于二道之間者雖竭天下之至巧而不能盡者也于天運有常之中而參之以隨時變通之術驗之以陰陽寒暑之氣積之以絲秒毫忽之數其于厯也庶幾乎自黄帝命羲和占日常儀占月臾區占星象大撓作甲子而容成總其術厯所自始也少昊使𤣥鳥氏司分伯趙氏司至青鳥氏司啟丹鳥氏司閉而鳳鳥氏為厯正法所由𫝊也顓頊命南正重司天北正黎司地而建孟春為元是為厯宗帝堯使羲仲叔主春夏和仲叔主秋冬以閏月定四時是為厯紀舜察璣衡禹衍疇範周官設馮相保章古之帝王所以奉若天道者其法雖不盡𫝊其意固可得而識矣然古未有閏也至堯命羲和而後置閏閏法立則四時之氣候不忒矣古未有嵗差也至晉虞喜諸人而後立差差法立則七政之躔度不爽矣二者相用而不可偏廢者也古今改厯者無慮數十家由黄帝訖秦末凡六改惟史官喪紀疇人子弟分散春秋因魯厯而譏置閏之差秦厯無定法而置閏常在十月之後是三代至秦已非黄帝之舊矣由漢髙祖訖漢末凡五改張蒼用顓帝厯司馬遷作太初厯劉歆作三統厯李梵作四分厯劉洪作乾象厯可謂備矣而惟太初為善葢其説本于鍾律以黄鍾八十一分為日法復自前厯上元推之得閼逢攝提格之嵗為甲子冬至日月如合璧五星如連珠而晦朔弦望不爽毫髮當時一十七家之疏逺者悉罷矣由魏文帝訖隋末凡十三改由唐髙訖周末凡十六改晉有春秋長厯杜預之長慶厯何承天之元嘉新厯崔浩之五寅元厯馬重績之調元厯隋劉焯之皇極厯唐髙祖有傅仁均厯髙祖有李淳風厯開元有一行大衍厯代宗有寳應五紀厯徐承嗣有建中正元厯徐昻有元和宣明厯穆宗時有長厯昭宗時有景福崇元厯周王朴有欽天厯可謂備矣而惟大衍為最葢其説起于蓍策以卦當嵗以爻當月以䇿當日以天地之二始位剛柔以天地之二中終紀閏餘以卦氣定七十二候以中星正二十四氣以晦朔正日月之㑹以日度正周天之數章蔀紀元皆合于易而二十三家之厯盡廢矣由宋太祖訖宋末凡十八改由金熈宗訖元末凡三改呉昭素衛朴之乾元奉元厯呉處訥周琮之應天明天厯夀星之㑹元厯孝宗之乾道厯史序宋行古之義天崇天厯皇居卿姚舜輔之觀天占天厯陳得一之統天厯楊級初之大明厯元許衡之授時厯耶律楚材之庚午厯皆各所取也而惟授時為近之葢簡儀仰儀及諸儀表皆郭守敬創為之宿度餘分約為大半少未得其的乃用二線推測餘分纎㣲皆有可考而又當時四海測景之所凡二十有七東極髙麗西極滇池南踰珠崖北盡鐵勒皆古人所未為者其法具載元史可謂度越前古矣合而觀之隨時更改代有損益而推驗精密不過三家耳豈皆憑胸臆以作聰明任智巧以愚耳目為哉廣集衆見而周思曲算之無遺博采羣言而參伍錯綜之不謬然後定而行之宜其推往知來信今𫝊後也即厯代長于厯者亦不數嵗而輒差何哉考之堯時冬至躔在虚一度夏至在栁十四度春分在胃十二度秋分在氐十度至唐開元大衍厯冬至日躔在斗十度夏至在井十度春分在奎七度秋分在軫十四度宋統元厯冬至在井二度夏至在井六度春分在奎初度秋分在軫七度此厯代之厯可驗者也晉虞喜覺其差乃以天為天嵗為嵗立差法以追其變而算之以五十年差一度然失之大過久而驗之弗合也何承天倍増其數約以百年差一度而乂不及劉焯取二家中數以七十五年為近之僧一行以大衍推之得八十三年而差一度久而驗之又弗合也許衡王恂郭守敬以六十六年而差一度算已往減一算算將來加一算至精密矣今據其法歩之又弗合也此厯代之不可驗者也或者曰四時寒暑無形而運于下日月星有象而見于上二者常動而不息一有一無出入升降或遲或速不相為謀其久不能無差忒者勢使之然也夫以嵗差而歸之勢其能有合乎哉然其所以差者由天周有餘日周不足也天周有餘則天常平運而舒日周不足則日常内轉而縮天日之差于中星驗焉堯之冬至初昏昴中而日在虚七度虚者北方之宿則日行北陸躔于𤣥枵之子也今之冬至初昏室中而日在箕三度箕者東方之宿則日行東陸躔于析木之寅也是去堯未四千年而差五十度矣古厯之簡易者今安得倣而求之乎或曰定朔之法莫驗于日月之交食書詩春秋所載日食俱在朔漢魏以後日食或在晦者葢日行一度月行十三度有竒言其平行也二十九日有竒而㑹言其經朔也夫日者陽之精也行南陸則盈行北陸則縮月者隂之精也近日則行疾逺日則行遲古者止用經朔故月一大一小日食或在朔二月食或在望之前後漢魏以後日食多在晦其弊葢坐此耳張衡分九道何承天定小餘李淳風之定朔皆是矣然日躔有自然之度而以己意附之可乎善乎杜預之言曰陰陽之運隨動而差差而不已遂與厯錯厯家者流欲以管窺之見而推合以驗天不知以有常之理而順天以求合差法何時而明哉洪惟我太祖髙皇帝承乾御極膺厯授圖數由天悟理本心孚二統相持則徴諸七政三厯相讎必協于五紀占天有臺而璿璣之器存造厯有官而羲和之職舉銅候有儀而推測之法立其積分一授時之數也其置閏一大易之㫖也分至啟閉即少昊之所命也春夏秋冬即陶唐之所授也敬天勤民也至矣而猶有謂年逺數盈隨時改厯之説是豈無所徴歟嘗考博士元統之議曰厯日之法其來尚矣今厯雖以大統為名而積分猶授時之數况授時厯以至元辛巳為厯元至洪武甲子積一百四年以厯法推之得三億七千六百一十九萬九千七百七十五分經云大約七十年而差一度每嵗差一分五十秒辛巳至今年逺數溢漸差天度擬合脩改太祖是其言矣開創未遑也正德十三年五月己亥朔日食起復弗合員外郎鄭繼之日官周濂請驗交食以更厯元矣而武廟未之行也嘉靖三年正月五星聚營室勸脩德以應天脩省以承慶少卿樂䕶之疏可考也請登臺測影調元正厯以求未定之差法少卿華湘之疏可考也諸臣先後之建白豈無所見而云然哉嘗以赤道考之勝國至元辛巳改厯天正冬至赤道嵗差一度五十秒今退天三度五十二分五十秒矣黄道嵗差九十二分九十八秒今退天三度二十五分七十四秒矣故距元辛巳至洪武甲子僅一百四年迄今則二百九十五年每嵗差一分五十秒約七十年差一度今合差四度餘矣考厯元以坐致千嵗之日授民時以永萬年之統者不有待于今日哉竊聞之改厯之法有四一曰立元二曰測候三曰察度四曰定朔夫嵗朔又復謂之元作厯者每以十一月甲子夜半朔旦冬至為厯元必也用太史公三紀大備之法本范史紀元之日如太初所謂四千六百十七嵗已盡都無絲髮之餘特起新厯之第一日則厯元不差後其可久乎是謂厯元馬融謂天體不可測知天之度惟有璣衡一事夫璣衡即今之渾儀也厯代以來其法漸備至郭守敬又加詳焉獨不可倣而行之乎是謂測候易之革曰澤中有火革君子以治厯明時夫作厯有常度也惟觀五星以測三垣觀三垣以測二十八宿觀二十八宿以察中星是謂察度定朔之法必于交食驗之張何所考皆不能無差惟郭守敬以辰集時刻所在之日為定數此其為最精者是謂定朔治厯之人有三一曰專門之裔二曰明經之儒三曰精算之士夫漢之公孫卿壺遂司馬遷請改正朔矣而不能為算也乃鄭平唐都洛下閎之徒出然後成太初厯崔浩之魏厯稱精矣而惟髙允能辨五星聚井之差程子嘗曰堯夫差法冠絶古今堯夫嘗曰揚子雲知厯法又知厯理許衡郭守敬王恂之作厯也窮極四海竭盡心思就晷測影凌駕百代夫唐都洛下閎鄧平專門之裔也子雲堯夫許衡明經之儒也髙允郭守敬王恂精算之士也誠得三者之人而行改厯之法庶可備一代之制而樹未來之準圖書編卷二十五
