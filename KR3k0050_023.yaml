body:
  text: 圖書編卷二十三明章潢撰五運六氣總敘運而謂之五者何水木火土金是也氣而謂之六者何風火寒暑燥濕是也運謂之五氣謂之六而五六不同者何運本諸天而天干有十氣本諸地而地支十二以天干合地支而大陽寒水厥隂風木少隂君火大隂濕土少陽相火陽明燥金水木土金各一而君火相火則有二焉此所以運五而氣則六也是運氣也其説雖本之素問用之于醫其實周流乎天地統攝乎人身有大過有不及而民之疾病于是乎生焉欲躋斯民仁壽之域而于天地運氣之序莫之察其何以變理乎隂陽哉噫唯其疾之憂父母之心也以萬物為一體君子之學也體父天母地之心而一體乎民物求以醫身醫國慎毋以運氣之説為小道而忽之云此圖言其六氣之定位也經有南政北政之説其六氣之布令也南政者靣南布政以象君位向明而治北政者北靣布政以象臣位定君之令蓋六十年中十年南政餘者皆北政也何以言之甲巳之歲土也土為萬物之尊五行之主萬物非土無以生五行非土無以備貫統四時寄生四季故土運居中司天司泉之氣皆靣南而處尊也餘運居中司天司泉之氣皆靣北而處卑也詩曰到者司天進四地隂陽上下定災危後學醫流如曉得逐年病體見根機此之謂也丹天之氣經于奎壁牛女戊分戊與癸合丹火氣也故戊癸為火運黅天之氣經于心尾己分己與甲合黅土氣也故甲己為土運蒼天之氣經于危室柳鬼危室壬位柳鬼丁位蒼木氣也故丁壬為木運素天之氣經于亢氐昴畢亢氐乙位昴畢庚位素金氣也故乙庚為金運玄天之氣經于張翼婁胃張翼丙位婁胃辛位玄水氣也故丙辛為水運角音屬木丁壬化之丁隂木也壬陽木也丁為少角壬為大角木旺於春觸物而生有角之義也角者觸也徴音屬火戊癸化之戊陽火也癸隂火也戊為大徴癸為少徴火旺於夏物長巳極有止之義也徴者止也宫音屬土甲己化之甲陽土也己隂土也甲為大宫己為少宫土旺於長夏位在中央有宫之義也宫土中也商音屬金乙庚化之乙隂金也庚陽金也乙為少商庚為大商金旺于秋萬物剛強有商之義也商者強也羽音屬水丙辛化之丙陽水也辛隂水也丙為大羽辛為少羽水旺於冬陽氣屈而隂氣伸有舒之義也羽者舒也五運六氣論鬼臾區告黃帝曰子午之上少陰主之少陰之上君火主之此子午所以為君火也丑未之上太陰主之太陰之上濕土主之此丑未所以為土正位也寅甲之上少陽主之少陽之上相火主之此寅甲所以為相火之位也邜酉之上陽明主之陽明之上燥金主之此邜酉所以為陽明燥金之位也辰戌之上太陽主之太陽之上寒水主之此辰戌所以為太陽濕土之位也巳亥之上厥陰主之厥陰之上風木主之此巳亥所以為風木之位也日月一年而十二會主坐有蝕有不蝕交則蝕不交則不蝕所以有交與不交皆行黃道行九道亦有交而不蝕者同道而相避日月之相合數之交也日望月則月蝕月掩日則日蝕猶水火之相尅水尅火掩而尅之火不能尅水之陽焉此邵子康節篇衍義云五運丹天之氣經于奎壁牛女戊奎壁乾位戊土屬乾戊與癸合丹火氣也故戊癸為火運黅天之氣經于心尾角軫巳分角軫巽位己土屬巽甲與己合黅土氣也故甲己為土運素問曰所謂戊己分者奎壁角軫則天地之門户也遁甲經曰六戊為天門六己為地戶蒼天之氣經于危室栁鬼危室壬位栁鬼丁位丁與壬合蒼木氣也故丁壬為木運素天之氣經于亢氐昴畢亢氐乙位昴畢庚位乙與庚合素金氣也故乙庚為金運玄天之氣經于張翼婁胃張翼丙位婁胃辛位丙與辛合玄水氣也故丙辛為水運按二十八宿木火土金水于此乎分與七政分屬不同何也四方七宿各有定位此則甲己戊癸丁壬乙庚丙辛以二氣相合則化故即化氣以分其運也分則其象各專所應合則其氣變化不窮而天地運氣管是矣主運木火土金水木初之運火二之運土三之運金四之運水五之運每年主運各七十二日零五刻以位相次于下萬年不易詩曰常年五運大寒初木火土金水自如記得七旬二餘日明年又向大寒推客運甲己乙庚丙辛丁壬戊癸甲己之年土運統之乙庚之年金運統之丙辛之年水運統之丁壬之年木運統之戊癸之年火運統之如甲己年土運土為初之運土生金金為二之運金生水水為三之運水生木木為四之運木生火火為五之運乙庚年金運初運金二運水三運木四運火五運土餘亦如之每年客運各七十二日零五刻周流于上每年一遷詩曰甲己土運乙庚金丙辛水運木丁壬火從戊癸為客運宫商羽角徴加臨又曰五大甲丙戊庚壬陽年大過運先臨五少乙丁己辛癸陰年不及後天尋五運大過年大寒前十三日交曰先天甲丙戊庚壬陽干也運不及年大寒後十三日交曰後天乙丁己辛癸陰干也正大寒日交曰齊天主氣風熱暑濕燥寒暑一作火風初之氣熱二之氣暑三之氣濕四之氣燥五之氣寒六之氣風每年一氣各主六十日八十七刻半有竒位定于下萬年不易詩曰初氣逐年風木先二君君火三相相火火相連四之濕土常為主五燥金清六水寒客氣子午丑未寅申卯酉辰戌巳亥子午年少陰君火司天熱陽明燥金司地丑未年大陰濕土司天濕大陽寒水司地寅申年少陽相火司天暑厥陰風木司地卯酉年陽明燥火司天燥少陰君火司地辰戌年大陽寒水司天寒大陰濕土司地巳亥年厥陰風木司天風少陽相火司地子午年少陰君火司天主二一之氣子午陽明燥金司地主六之氣卯酉大隂濕土天之左間四之氣丑未厥陰風木天之右間二之氣巳亥大陽寒水地之左間初之氣辰戊少陽相火地之右間五之氣寅申其丑未寅申卯酉辰戌巳亥周而復始亦如之在天三年一降五年遷正在泉在地三年一升五年遷正司天六客氣各主六十日八十七刻半有竒一嵗在上一嵗在下二氣在左二氣在右上者右行下者左行左右陰陽之道路也六氣申子辰年大寒日寅初一刻交初氣春分日子末交二氣小滿日亥末交三氣大暑日戌末交四氣秋分日酉末交五氣小雪日申末交終氣一六天也巳酉丑年大寒日巳初一刻交初氣春分日卯末交二氣小滿日寅末交三氣大暑日丑末交四氣秋分日子末交五氣小雪日亥末交終氣二六天也寅午戌年大寒日申刻交初氣春分日午末交二氣小滿日巳末交三氣大暑日辰末交四氣秋分日卯末交五氣小雪日寅末交終氣三六天也亥卯末年大寒日亥初刻交初氣春分日酉末交二氣小滿日申末交三氣大暑日未末交四氣秋分日午末交五氣小雪日巳末交終氣四六天也每三支嵗氣會同周而復始十二支年分運氣子午年少陰君火司天嵗氣熱化之候司天者天之氣也君火者手少陰心經也心者君主之官神明出焉君火乃主宰陽氣之本餘象土土乃發生萬物之源陽明燥金在泉在泉者地之氣候也初之氣二陰風木用事子上父下益辛瀉苦自年前十二月大寒節起至二月驚蟄終止天時寒風切洌霜雪水氷蟄蟲伏藏民病關節禁固腰腿疼中外瘡痬二之氣少陰君火用事火盛金衰補肺瀉心自二月春分節起至四月立夏節終止天時風雨時寒生羽蟲民病淋氣鬱於上而熱令人目赤三之氣少陽相火用事君相二火瀉苦益辛自四月小滿節起至六月小暑節終止天時大火行熱氣生羽蟲不鳴燕百舌杜宇之類民病厥熱心痛寒更作咳喘赤目四之氣太陽濕土用事子母相順瀉肺補腎自六月大暑節起至八月白露節終止天時大雨時行寒熱互作民病黃疽衄血咽乾嘔吐痰飲五之氣陽明燥金用事心盛肺衰火怕水復自八月秋分節起至十月立冬終止天時溫氣乃至初冬尤暖萬物尚寒民病寒熱伏邪於春為瘧六之氣太陽寒水用事火衰心病瀉鹹益苦自十月小雪節起至十二月大寒止天時暴寒徑切火邪恣毒寒氣暴止民病上腫咳喘甚則血益下連小腹而作寒中丑未年大陰濕土司天嵗氣濕化之候太陰濕土者足太陰經也脾中央戊己土每季寄旺一十八日合為七十二日以應一嵗六六三百六十日之成數也太陽寒水在泉初之氣厥陰風木用事主旺客衰瀉酸補甘自年前十二月大寒節起至閏二月驚蟄節止天時大風發榮雨生毛蟲民病血溢經絡拘強關節不利身重筋痛二之氣少陰君火用事以下生上瀉甘補鹹自二月春分節起至四月立夏終止天時大火至疫癘君令宣行濕蒸暴雨時相降民病瘟疫盛行逺近咸若三之氣少陽相火用事土旺尅水補腎瀉脾自四月小滿節起至六月小暑節終止天時雷雨電雹地氣騰溫氣降民病身重胕腫胸腹滿感冒濕氣四之氣大隂濕土用事甘旺鹹衰補腎益膀胱自六月大暑節起至八月白露節終止天時炎熱沸勝地氣升土化不流民病腠理熱血暴益寒瘧心腹脹浮腫五之氣陽明燥虛用事土能生金益肝瀉肺自八月秋分節起至十月立冬終止天時大涼霧露降民病寒瘧痢甚行六之氣大陽寒水用事以上尅下瀉脾補腎自十月小雪節起至十二月小寒終止天時大寒凝冽民病關節禁固腰腿拘痛寅申年少陽相火司天嵗氣火化之候少陽相火者三焦浮流之火火邪炎上主尅肺金金受尅則腎水失毋上盛下衰虛陽上攻變生諸疾至能傷元氣厥陰風木在泉初之氣厥陰風木用事子父相逢瀉苦益辛自年前十二月大寒節起至二月驚蟄終止天時熱風傷人時氣流行民病寒熱交作咳逆頭痛血氣不調心腹不快二之氣少隂君火用事肺衰心盛制苦益辛自二月春分節起至四月立夏終止天時暴風疾雨濕氣相蒸民病上血熱咳逆胸膈不利頭疼寒熱三之氣少陽相火用事夏旺火熾補肺益大腸自四月小滿節起至六月小暑終止天時炎暑亢旱草萎河竭民病煩熱目赤喉閉失血熱渴風邪人多暴死四之氣太隂濕土用事火能生土瀉甘補鹹自六月大暑節起至八月白露終止天時風雨時降炎暑來去民病瘧疾交作寒熱頭痛五之氣陽明燥金用事肺金受邪瀉苦補辛自八月秋分節起至十月立冬終止天時寒熱風雨草木黃落民病寒邪風熱君子周密六之氣太陽寒水用事心火受尅瀉鹹補苦自十月小雪節起至十二月大寒終止天時寒濕無時地氣正寒霜露乃降民病感冒寒邪關節不利心腹痛卯酉年陽明燥金司天嵗氣燥化之候陽明燥金者肺與大腸之氣象庚辛金也少陰君火在泉初之氣厥陰風木用事金木相尅補酸瀉辛自年前十二月大寒節起至二月驚蟄止天時陰始凝風始雨水乃氷寒雨多花開遲民病寒熱浮肺失血嘔吐小便赤淋二之氣少陰君火用事火盛金衰瀉苦益辛自二月春分節起至四月立夏終止天時臣居君位大熱早行民病疫癘流行多人暴卒三之氣少陽相火用事主盛客衰瀉心補肺自四月小滿節起至六月小暑終止天時燥熱交合風雨暴至民病寒熱頭痛心煩作渴四之氣大陰濕土用事以下生上瀉辛益酸自六月大暑節起至八月白露終止天時早秋寒雨有傷禾稼民病卒暴寒熱風邪傷人心疼浮腫瘡痬失血五之氣陽明燥金用事金盛木衰瀉肺補肝自八月秋分節起至十月立冬終止天時冬行春令草木生氣候反溫熱蟲清風生蟲出現反行春令民病疫癘溫毒寒熱伏邪寒熱作痢氣血不同六之氣太陽寒水用事客來助主益苦瀉酸自十月小雪節起至十二月小寒止天時氣候反溫熱蟲出現行春令民病疫癘溫毒寒熱伏邪辰戌年太陽寒水司天嵗氣寒化之候太陽寒水者足膀胱經也與足少陰經合為表裏屬北方壬癸水太陰濕土在泉初之氣厥陰風木用事脾胃受邪瀉酸助甘自年前十二月大寒起至二月驚蟄終止天時氣早暖草早榮濕風至民病瘟疫寒熱頭疼嘔吐瘡痬二之氣少陰君火用事心火受邪瀉鹹補苦自二月春分起至四月立夏終止天時春寒多雨寒溫無時民病氣鬱中滿浮腫寒熱三之氣少陽相火用事以上尅下瀉鹹助苦自四月小滿節起至六月小暑終止天時暴熱乍涼疾濕暴雨民病寒熱吐痢心煩悶亂癰痘瘡痬四之氣太陰濕土用事水旺土衰瀉鹹補甘自六月大暑起至八月白露終止天時風溫交事雨生羽蟲暴風疾雨民病火熱短氣赤白痢瀉五之氣陽明燥金用事金土水旺制鹹益苦自八月秋分起至十月立冬終止天時溫熱而行客行主令民病氣虛客熱血熱二行肺氣壅盛六之氣太陽寒水用事水盛火衰瀉鹹助苦自十月小雪起至十二月小寒終止天時凝寒雨雪地氣正濕令行民病病乃慘悽孕婦多災脾受濕肺旺肝衰巳亥年厥陰風木司天嵗氣風化之候厥陰風木者足厥陰肝經也肝屬東東甲乙木春旺七十二日也少陽相火在泉初之氣厥陰風木用事脾胃受邪瀉酸補甘自年前十二月大寒起至二月驚蟄止天時寒始肅寒行生令殺氣方生民病寒居右脅氣滯脾胃虛人二之氣少陰君火用事火旺金衰瀉心補肺自二月春分起至四月立夏終止天時寒不去霜雪氷殺氣施水草焦寒雨至民病熱中氣血不升降三之氣少陽相火用事肺經受邪瀉苦益辛自四月小滿節起至六月小暑終止天時風熱大作雨生羽蟲民病淚出耳鳴掉眩四之氣太陰濕土用事木土相刑瀉酸益甘自六月大暑起至八月白露終止天時熱氣返用山澤浮雲暴雨浮濕民病心受邪黃疽面為跗腫五之氣陽明燥金用事以金刑木瀉肺益肝自八月秋分起至十月立冬終止天時燥溫更濛沉陰乃布風雨乃行民病寒風及體肺受風脾受濕發為瘧六之氣太陽寒水用事主助客勝瀉酸補甘自十月小雪起至十二月小寒終止天時長火司令陽乃火化蟄蟲出現流水不氷地氣大發草乃生民病殟歿心腎相制夫五運六氣相摩相蕩上加下臨六十年之紀不能齊矣大過之紀有五木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍不及之紀有五木曰委和火曰伏明土曰卑監金曰從革水曰涸流平氣之紀有五木曰敷和火曰升明土曰備化金曰審平水曰靜順大過則乘已所勝而侮所不勝侮反受邪寡于畏也不及則勝已者來欺之子必為母復讎也六氣分上下左右而行天令十二支分布於時日而司地化上下相召而寒暑燥濕風火在四時之氣不同者蓋相臨不一而使然也六氣司於十二支者有正對之化也然厥陰所以司巳亥者何也謂厥陰木也木生於亥故正化於亥對化於巳也雖有卯為正木之分乃陽明金對化也所以從生而順於巳也少陰所以司子午者謂少陰為君火司尊位所以正得南方離位故正化於午對化於子也太陰司於丑未者謂太陰為土土屬於中寄居坤位西南居未分也故正化於未對化於丑也少陽所以司寅申者謂少陽相火位卑於君火雖有午位君火居之火生於寅故正化於寅而對化於申也陽明所以司卯酉者為陽明為金酉為西方屬金故正化於酉而對化於邜也太陽所以司辰戌者謂太陽為水雖有子位以居君火對化辰戌屬土水乃伏土中即六戊天門戌是也六己地户辰是也故水須土用孟子曰水由地中行斯可見矣乃正化對化於辰也此玄硃之説詳矣莫不各有因焉此天之陰陽合地之十二支動而不息者但將年律起當年司天數至者為司天相對一氣為在泉餘氣為左右間用在泉緩一氣為初之氣主六十日餘八十七刻半至司天為三之氣主上半年自大寒日後通主上半年也至在泉為六氣主下半年自大暑日後通主下半年也少陰為首順行又為大過司天大過不及亦間於數則十干起運圖上下相合也故經云嵗半以前天氣主之嵗半以後地氣主之者此也天之六氣客也將此客氣布於地之六氣步位之則有氣化之異矣經自上下位左右有紀為司天曰上位南方則面北立左右乃左東右西也故上下異而左右殊亦微旨論曰少陽之右陽明治之緒者乃南面而立以閲氣之至也非論上下左右之位而與顯明之左右火治之之意同謂面南視之指位而言也天地寒暑燥濕風火化生萬物帝曰寒暑燥濕風火在人合之奈何其於萬物何以生化岐伯曰東方生風風在木木生酸酸生肝肝生筋筋生心其在天為玄在人為道在地為化化生五味道生智玄生神化生氣神在天為風在地為木在體為筋在氣為柔在臟為肝其性為暄其德為和其用為動其色為蒼其化為榮其蟲毛其政為散其令宣發其變摧拉其眚為隕其味為酸其志為怒怒傷肝悲勝怒風傷肝燥勝風酸傷筋辛勝酸南方生熱熱生火火生苦苦生心心生血血生脾其在天為熱在地為火在體為脈在氣為息在藏為心其性為暑其德為顯其用為躁其色為赤其化為茂其蟲羽其政為明其令鬱蒸其變炎爍其眚燔􅌊其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣鹹勝苦中央生濕濕生土土生甘甘生脾脾生肉肉生肺其在天為濕在地為土在體為肉在氣為充在藏為脾其性靜兼其德為濡其用為化其色為黃其化為盈其蟲倮其政為謐其令雲雨其變動注其眚淫潰其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘西方生燥燥生金金生辛辛生肺肺生皮毛生腎其在天為燥在地為金在體為皮毛在氣為成在藏為肺其性為涼其德為清其用為固其色為白其化為斂其蟲介其政為徑其令霧露其變肅殺其眚蒼落其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛北方生寒寒生水水生鹹鹹生腎腎生骨髓生肝其在天為寒在地為水在體為骨在氣為堅在藏為腎其性為凛其德為寒其用為闕其色為黑其化為肅其蟲鱗其政為靜其令霜雪其變凝冽其眚氷雹其味為鹹其志為恐恐傷腎思勝恐寒傷血燥勝寒鹹傷血甘勝鹹五味更立各有所先非其位則邪當其位則正帝曰病生之變如何岐伯曰氣相得則微不相得則甚帝曰主嵗如何岐伯曰氣有餘則制已所勝而侮所不勝其不及則已所不勝侮而乘之已所勝輕而侮之侮反受邪侮而受邪寡所畏也帝曰善五運有旋轉之機六氣有早遲之變天以是終始之因於地地以是終始之因於物五運者即五行也六氣者五行之變風火暑濕燥寒也故一氣王六十日六六三百六十日六甲終以為陰陽寒暑之運而成二嵗冬至後得甲子為早或在十二月節為中或在正月為遲夏至倣此故物之生落遲早感應於此而已臨川吳氏曰風木冬春之交北東之維艮震巽也君火春夏之交東南之維震巽也相火正夏之時正南之方一也濕土夏秋之交南西之維坤兑也燥金秋冬之交西北之維兑乾也寒水正冬之時正北之方坎也此主氣之定布者也地初正氣子中而丑中震也地後間氣丑中而卯中離也天前間氣卯中而巳中兑也天中正氣子中而未中乾巽也天後間氣未中而酉中坎也地前間氣酉中而亥中艮也地終正氣亥中而子中坤也此客氣之加臨者也主氣土居二火之後客氣土行二火之間終艮始艮後天卦位也始震終坤先天卦序也世以嵗氣起大寒者似協後天終艮始艮之文然而非也楊子建以嵗氣起冬至者冥契先天始震終坤之義子午嵗之冬至起燥金而生丑中之寒水丑未嵗之冬至起寒水而生丑中之風木寅申嵗起風木卯酉嵗起君火辰戊嵗起濕土已亥嵗起相火皆肇端於子半六氣相生循環不窮豈嵗嵗間斷於授承之際哉然則終始乎艮者可以分主氣所居之位而非可以論客氣所臨之序也天地陰陽之運往過來續木火土金水始終終始如循斯環六氣相生之序也嵗氣起於子中盡於子中故曰冬至子之半天心無改移子午之嵗始冬至燥金三十日然後襌於寒水以至相火日各六十者五而小雪以後其日三十復終於燥金丑未之嵗始冬至寒水三十日然後禪於風木以至燥金日各六十者五而小雪以後其日三十復終於寒水寅申以下皆然如是六十年至千萬年氣序相生而無間非小寒之末無所於授大寒之初無所於承隔越一氣不相接續而截自大寒而為次年初氣之首也此造化之妙經祕而未發啓玄子闕而未言近代楊子建昉推而得之醫家五運皆起月初天氣之先主乾知大始也六氣皆起於月中地氣之後應坤作成物也五運相勝相生五運之説肇於鄒衍自漢張蒼公孫𢎞之徒皆用其説而賈誼司馬遷劉歆輩又從而附益之今考其説有二賈誼公孫𢎞倪寬司馬遷則本五行相勝之説劉歆父子則以五行相生為言主相勝者則以前世帝王皆後代勝前代火能滅金即以火勝金金能尅木即以金勝木夫帝王之有天下豈以一人之私求勝於前代耶堯舜禹之相遜蓋不得已而處大位湯武之征伐亦不得已而應天順人初無一毫私意行於其間也今乃推五行之相勝是以末世爭奪之事為帝王盛舉豈不謬哉故漢儒以周當木德秦人以為水乃用水德以勝之更名河曰德水秦人既自以為水矣漢儒必欲以土勝之至大初遂更用黃德夫秦之暴虐以干戈魚肉諸侯併吞海宇秦人推五運相勝蓋有以也漢髙之興雖以征伐然討定暴亂亦秦民之湯武也賈誼司馬遷不能推述漢興撥亂之功反用秦人相勝之説欲以此制禮樂易服色豈理也哉逮向歆又論五行之相生曰帝出乎震故伏羲始受木德木生火故炎帝以炎繼之火生土故黃帝以土繼之由是相推以至於漢是謂以母傳子也况既以黃帝為土德矣少昊其子也何得又自為金既以帝嚳為木德矣帝堯其子也何得又自為火父子之間五行之迭運乎誠如是則商周傳數十世一世為一德不幾于紛亂之甚耶秦雖不德亦傳位二世矣今乃以漢德之火上承周德之木置秦於閏位比之共工可乎哉蓋二説並行各逞己見主相勝之説則不得不變周之木為火主相生之説則不得不置秦之水為閏厯觀詩書述堯舜三王之事亦詳矣何嘗如陰陽家之説妄相配合其繆戾一至此耶嗚呼漢之興都一也見神母之祥者則以為火德見黃龍之瑞者則以為土德考河決之符者又以為水德是漢儒議論本朝且紛然靡定他又何足憑哉雖然五行之相生相尅亦天地自然之造化也硜硜然拘滯於帝王之代興者固非也後儒又以此為陰陽家之術并消息盈虛之理莫之察焉通儒固如是哉天符運氣相同曰天符戌子戊午戊寅年運氣皆火丙辰丙戌年運氣皆水己丑己未年運氣皆土乙卯乙酉年運氣皆金丁巳丁亥年運氣皆木六十年中有此十二年天符也順化天氣生運曰順化甲子甲午甲寅甲申年火下生土也壬辰壬戌年水下生木也乙丑乙未年土下生金也辛卯辛酉年金下生水也癸巳癸亥年木下生火也六十年中有此十二年順化也天刑天氣尅運曰天刑庚子庚午庚寅庚申年火下尅金也戊辰戊戌年水下尅火也辛丑辛未年土下尅水也丁卯丁酉年金下尅木也己巳己亥年木下尅土也六十年中有此十二年天刑也小逆運生天氣曰小逆壬子壬午壬寅壬申年木上生火也庚辰庚戌年金上生水也癸丑癸未年火上生土也己卯己酉年土上生金也辛巳辛亥年水上生木也子臨父位于理未當六十年中有此十二年小逆也不和運尅天氣曰不和丙子丙午丙寅丙申年水上尅火也甲辰甲戌年土上尅水也辛丑辛未年木上尅土也癸卯癸酉年火上尅金也己巳己亥年金上尅木也六十年中有此十二年不和也嵗會運臨木氣之位曰嵗會子水位也丙子年小運臨之午火位也戊午年火運臨之卯木位也丁卯年木運臨之酉金位也乙酉年金運臨之辰戌丑未土位也甲辰甲戌己丑己未年土運臨之六十年中有此八年嵗會也太乙天符天符嵗會相合曰太乙天符戊午乙酉己未己丑六十年中有此四年太乙天符支德符運與四孟月同曰支德符寅屬木春孟月也壬寅年木運臨之巳屬火夏孟月也癸巳年火運臨之申屬金秋孟月也庚辰年金運臨之亥屬水冬孟月也辛亥年水運臨之六十年中有此四年支德符也干德符運與交司日相合曰干德符甲與己合乙與庚合丙與辛合丁與壬合戊與癸合一年遇此二干天地德合亦為平氣之嵗也同天符大過之運加地氣曰同天符庚子庚午年運同司地燥金壬寅壬申年運同司地風木甲辰甲戌年運同司地濕土六十年中有此六年同天符也同嵗會不及之運加地氣曰同嵗會辛丑辛未年運臨司地寒水癸卯癸酉年運臨司地君火癸巳癸亥年運臨司地相火六十年中有此六同嵗會也五運六氣總論夫五運者金木水火土也六氣者風火暑濕燥寒也天干取運地支取氣天干有十配合則為五運地支十二對待則為六氣天氣始于甲地氣始于子天地相合則為甲子故甲子者干支之首也天氣終于癸地氣終于亥天地相合則為癸亥故癸亥者干支之末也隂陽相間剛柔相須是以甲子之後乙丑繼之壬戌之後癸亥繼之三十年為一紀六十年為一周太過不及斯皆見矣然以天干兄弟次序言之甲乙東方木也丙丁南方火也戊己中央土也庚辛西方金也壬癸北方水也以其夫婦配合言之甲與己合而化土乙與庚合而化金丙與辛合而化水丁與壬合而化木戊與癸合而化火故甲己之嵗土運統之乙庚之嵗金運統之丙辛之嵗水運統之丁壬之嵗木運統之戊癸之嵗火運統之詩曰甲己化土乙庚金丁壬木位盡成林丙辛便是長流水戊癸離宫號曰心然以地支循環之序言之寅卯屬春木也巳午屬夏火也申酉屬秋金也亥子屬冬水也辰戌丑未屬四季土也以其對衝之位言之子對午而為少陰君火丑對未而為大陰濕土寅對申而為少陽相火卯對酉而為陽明燥金辰對戌而為大陽寒水巳對亥而為厥陰風木故子午之嵗君火主之丑未之嵗濕土主之寅申之嵗相火主之卯酉之嵗燥金主之辰戌之嵗寒水主之巳亥之嵗風木主之詩曰子午少陰君火暑丑未大陰濕火雨丙寅申少陽相火炎卯酉陽明燥金主辰戌火陽司水寒巳亥厥陰風木舉然五運有主運有客運六氣有主氣有客氣主運主氣萬載而不易客運客氣每嵗而迭遷然則客一也有大過焉有不及焉大過之年甲丙戊庚壬五陽干也不及之年謂乙丁己辛癸五陰干也大過者其至先不及者其至後客氣也有正化焉有對化焉正化之嵗謂午未寅申辰亥之年也對化之嵗謂子丑申邜戌巳之年也正化者令之實對化者令之虛假令甲子年甲為土運統主一年子為君火専司一嵗一期三百六十五日零二十五刻正合乎周天三百六十五度四分度之一也一期之中主運以位而相次於下客運以氣而周流於上主運者木為初之運火為第二運土為第三運金為第四運水為第五運客運者假如甲巳年甲為土運初之運即土也土生金二之運即金也金生水三之運即水也水生木四之運即木也木生火五之運即火也每一運各主七十二日零五刻大過之年大寒前十三日交名曰先天不及之年大寒後十三日交名曰後天平氣之年正大寒日交名曰齊天一嵗之後主氣定守于六位客氣循行于四時主氣者風為初之氣火為二之氣暑為三之氣濕為四之氣燥為五之氣寒為終之氣客氣者假令子午年少陰君火司天陽明燥金司地大陰濕土為天之左間厥陰風木為天之右間所以南面而命其位也大陽寒水為地之左間少陽相火為地之右間所以靣北而命其地也一氣在上一氣在下二氣在左二氣在右經曰天地者萬物之上下也左右者陰陽之道路也地之左間為初之氣天之右間為二之氣司天為三之氣天之左間為四之氣地之右間為五之氣司地為終之氣每一嵗各主六十日八十七刻半有奇申子辰之年大寒日寅初一刻交初之氣至春分日子時之末交二之氣小滿日亥時之末交三之氣至大暑日戌時之末交四之氣至秋分日酉時之末交五之氣至小雪日申時之末交終之氣所謂一六天也巳酉丑之年大寒日巳初一刻交初之氣至春分日邜時之末交二之氣至小滿日寅時之末交三之氣至大暑日丑時之末交四之氣至秋分日子時之末交五之氣至小雪日亥時之末交終之氣所謂二六天也寅午戌之年大寒日申初一刻交初之氣至春分日午時之末交二之氣至小滿日巳時之末交三之氣至大暑日辰時之末交四之氣至秋分日卯時之末交五之氣至小雪日寅時之末交終之氣所謂三六天也亥卯未之年大寒日亥初一刻交初之氣至春分日酉時之末交二之氣至小滿日申時之末交三之氣至大暑日未時之末交四之氣至秋分日午時之末交五之氣至小雪日巳時之末交終之氣所謂四六天也蓋因客運加于主運之上主氣臨于客氣之下天時所以不齊民病所由生也授時之説始於堯典自古有天文之官重黎以上其詳不可得聞堯命羲和厯象日月星辰考四方之中星定四時之仲月南方朱鳥七星之中殷仲春則厥民析而東作之事起矣以東方大火房星之中正仲夏則厥民因而南訛之事興矣以西方虛星之中殷仲秋則厥民夷而西成之事舉矣以北方昴星之中正仲冬則厥民隩而朔易之事定矣然所謂厯象之法猶未詳也舜在璇璣玉衡以齊七政説者以為天文器後世言天之象如洛下閎鮮于妄人輩述其遺制營之度之而作渾天儀厯家推步無越此器然而未有圖也蓋二十八宿周天之度十二辰日月之會二十四氣之推移七十二候之遷變如環之循如輪之轉農桑之節以此占之四時各有其務十二月各有其宜先時而種則失之太早而不生後時而蓻則失之太晚而不成故曰雖有智者不能冬種而春收農書天時之宜篇云萬物因時受氣因氣發生時至氣至生理因之今人雷同以正月為始春四月為始夏不知陰陽有消長氣候有盈縮冒昧以作事其克有成者幸而已矣此圖之作以交立春節為正月交立夏節為四月交立秋節為七月交立冬節為十月農事早晚各疏於每月之下星辰干支别為圓圖使可運轉北斗旋於中以為準則每嵗立春斗杓建於寅方日月會於營室東井昏見於午建星辰正於南由此以往積十日而為旬積三旬而為月積三月而為時積四時而成嵗一嵗之中月建相次周而復始氣候推遷與日厯相為體用所以授民時而節農事即謂用天之道也夫授時厯每嵗一新授時圖常行不易非厯無以起圖非圖無以行厯表裏相參轉運無停渾天之儀粲然具在是也然按月農時特取天地南北之中氣立作標準以示中道非膠柱鼓瑟之謂若夫逺近寒暑之漸殊正閏常變之或異又當推測晷度斟酌先後庶幾人與天合物乘氣至則生養之節不至差謬此又圖之體用餘致也不可不知順天時勤民事論蓋神農為耒耜以利天下堯命四子敬授民時舜命后稷食為政首禹制田土萬國作乂殷周之盛詩書所述要在安民富而教之管子曰一農不耕民有飢者一女不織民有寒者倉廪實知禮節衣食足知榮辱丈人曰四體不勤五榖不分孰為夫子傳曰人生在勤勤則不匱語曰力能勝貧謹能勝禍蓋言勤力可以不貧謹身可以避禍故李俚為魏文侯作盡地利之教國以富強秦孝公用商君急耕戰之賞傾奪鄰國而雄諸侯淮南子曰聖人不恥身之賤也愧道之不行也不憂命之長短而憂百姓之窮是故禹為治水以身解于陽旴之河湯由苦旱以身禱於桑林之野神農憔悴堯疲臞舜黎黑禹胼胝由此觀之則聖人之憂勞百姓亦甚矣故自天子以下至於庶人四肢不勤思慮不用而事治財贍者未之聞也故田者不強囷倉不盈將相不強功烈不成仲長子曰天為之時而我不農穀亦不可得而取之青春至焉時雨降焉始之耕田終之簠簋惰者釡之勤者鍾之矧乎不為而尚乎食也哉譙子曰朝發而夕異宿勤則菜盈傾筐且茍有羽毛不織不衣不能茹草飲水不耕不食安可以不自力哉朝錯曰聖王在上而或不凁不飢者非耕而食之織而衣之為開其資財之道也夫寒之於衣不待輕暖飢之於食不待甘旨飢寒至身不顧亷恥一日不再食則飢終嵗不製衣則寒夫腹飢不得食體寒不得衣慈母不能保其子君亦安得以有其民夫珠玉金銀飢不可食寒不可衣粟米布帛一日不得而飢寒至是故明君貴五榖而賤金玉劉陶曰民可百年無貨不可一朝有飢故食為至急陳思王曰寒者不貪尺玉而思短褐飢者不願千金而羡一食千金尺玉至貴而不若一食短褐之惡者物時有所急也誠哉言乎神農蒼頡聖人者也其於事也有所不能矣故趙過始為牛耕實勝耒耜之利蔡倫立意造紙豈方縑牘之煩且耿夀昌之常平倉桑𢎞羊之均輸法益國利民不朽之術也諺曰智如禹湯不如常耕是以樊遲請學稼孔子答曰吾不如老農然則聖賢之智猶有所未達而况於凡庸者乎猗頓魯窮士聞陶朱公富問術馬告之曰欲速富畜五牸乃畜牛羊子息萬計九真廬江不知牛耕每致困乏任延王景乃創鑄作田器教之墾闢嵗嵗開廣百姓充給燉煌不曉作耬犂及種人牛功力既費而收穀更少皇甫隆乃教作耬犂所省傭力過半得榖加五又燉煌俗婦女作裙攣縮如羊腸用布一匹隆又禁改之所省復不資茨充為桂陽令俗不種桑無蠶織絲麻之利類皆以麻桑頭貯衣民惰窳少粗履足多剖裂血出盛冬皆燃火燎炙充教民益種桑柘養蠶織履復令種苧麻數年之間大賴其利衣履溫暖今江南知蠶桑織履皆充之教也五原土宜麻枲而俗不知績織民冬月無衣積細草卧其中見吏則衣草而出崔實為作紡績織絍之具以教民得免寒苦安在不教乎黃霸為潁川使郵亭鄉官皆畜雞豚以贍鰥寡貧窮者及務耕桑節用殖財種樹鰥寡孤獨有死無以葬者鄉部書言霸具為區處某所大木可以為棺某亭豚子可以為祭吏往皆如言龔遂為渤海勸民務農桑令口種株榆百本薤五十本蔥一畦韭三畝家二母彘五母雞民有帶持刀劍者使賣劍買牛賣刀買犢曰何如帶牛佩犢春夏不得不趣田畝秋冬課收斂益畜果實菱芡吏民皆富實召信臣為南陽好為民興利務在富之躬勸耕農出入阡陌止舍鄉亭稀冇安居時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣溉灌民得其利蓄積有餘禁令嫁娶送終奢靡務出於儉約郡中莫不耕稼力田吏民親愛信臣號曰召父童恢為不其令率民養一豬雌雞四頭以供祭祀買棺木顔裴為京兆乃令整阡陌樹桑果又課以間月取材使得轉相告戒教匠作車又課民無牛者令畜豬投貴時賣以買牛整頓豐足王丹家纍千金好施與周人之急每嵗時後察其強力收多者輒厯載酒殽從而勞之便于田頭樹下飲食勸勉之因留其餘殽而去其惰者獨不見勞各自恥不能致丹其後無不力田者聚落以致殷富杜畿為河東課勸耕桑民畜牸牛草馬下逮雞豚皆有章程家家豐實此等豈好為煩擾而輕費損哉蓋以庸人之性之堀為耕稼之場者此君長所用心也是以大公封而斥鹵播嘉榖鄭白戍而關中無飢年蓋食魚鱉而藪澤之形可見觀草木而肥磽之勢可知又曰稼穡不修桑果不茂畜産不肥鞭之可也拖落不完墻垣不牢掃除不淨笞之可也此督課之方也且天子親耕皇后親蠶况夫田父而懷窳惰乎李衡於武陵龍陽泛洲上作宅種柑橘千樹臨卒敕兒曰吾州里有千頭木奴不匱汝衣食嵗上一匹絹亦可足用矣吳末柑橘成嵗得絹數千匹恆稱太史公所謂江陵千樹橘與千户侯等者也樊重欲作器物先種梓漆時人嗤之然積以嵗月皆得其用向之笑者咸求假焉此種植之不可已也諺曰一年之計莫如種榖十年之計莫如種木此之謂也書曰稼穡之艱難孝經曰用天之道因地之利論語曰百姓不足君孰與足漢文帝曰朕為天下守財矣安敢妄用哉孔子曰居家理故治可移於官然則家猶國國猶家是以家貧思良妻國亂思良相其義一也夫財貨之生既艱難矣用之又無節凡人之性好懶惰矣率之又不督加以政令失所水旱為災一榖不登胔腐相繼古今同患所不能止也嗟乎且飢者有過甚之願渴者有兼量之情既飽而後輕食既暖而後輕衣或由年榖豐穰而忽於畜積或由布帛優贍而輕於施與窮窘之來所由有漸故管子曰桀有天下而用不足湯有七十里而用有餘天非獨為湯雨菽粟也蓋言用之以節耳仲長子曰鮑魚之肆不自以氣為臭四夷之人不自以食為異生息然也居積習之中見生息之事孰自知也斯何異蓼中之蟲而不知藍之甘乎圖書編卷二十三
