body:
  text: 圖書編卷二十二明章潢撰時令總敘夫時行不息即天氣之運行也積時而成日積日而成月積月而成歲一日之間時分十二一歲之間時分四季舉天地之所覆載成形成象其所以生生化化夭喬開落孳息蟄啓未有一物能違乎天之時者可以人而不順天時乎哉先王治厯明時敬授人時無非欽若昊天茂對時育萬物已耳即一晝一夜而晦明異一冬一夏而寒暑異凡吾人之衣食起居嚮晦宴息雖欲違乎時焉何可得也且孔子德與天地並也子思孟子稱之不過上律天時孔子聖之時稽之謨訓曰時習時敏時措時出與時偕行後天而奉天時莫非時中之道也故易曰隨時之義大矣哉雖然時一也欲動靜不失其時盡人道以奉若天道尚可於天之四時五行隂陽節候支千配屬而均莫之省也耶四時氣序天地大矣不越乎隂陽之變化隂陽神矣不越乎時序之節宣論語曰天何言哉四時行焉百物生焉天何言哉中庸曰萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也是故善觀天者觀之時行物生盡之矣其實時行而物之生育在其中也觀此圖時分春夏秋冬而五行五音五帝五神以及四方八卦各有配屬究其根源惟一氣消息虚盈自有温涼寒暑之異故謂四時異行而分為四氣亦可土旺四季謂五氣順布而四時行亦可此所以天不言而敦化川流自爾物生之不測也但木為少陽屬春而氣温火為太陽屬夏而氣熱金為少隂屬秋而氣涼水為太隂屬冬而氣寒然春雖温也不能以遽温夏熱也不能以遽熱秋之涼冬之寒也豈能遽涼而遽寒哉春夏秋冬各有定時温涼寒熱氣行有漸而四氣流行又有隂陽韶占之四變焉何也一歲之間非四氣無以管籥四時非四變無以流通八節四氣在子午卯酉而二分二至為天四正若四變則臨乎甲丙庚壬之宫而戊己土氣則各旺于辰戌丑未十有八日故每歲時起立春而春已交矣然春初尚仍冬政其氣猶寒至二月驚蟄朔氣值甲乃變其氣為韶計三十日其氣多陽天地之啟氣所以變化也既變之後則春分之温氣始得以生物矣夏初尚仍春令其氣猶温至五月芒種朔氣值丙乃變其氣為隂計三十日其氣多隂天地之合氣所以變化也既變之後則夏至之暑氣始得以長物矣秋初尚仍夏政其氣猶熱至八月白露朔氣值庚乃變其氣為占計三十日其氣多隂天地之殄氣所以變化也既變之後則秋分之涼氣始得成物矣冬初尚仍秋令其氣猶涼至十一月小雪朔氣值壬乃變其氣為陽計三十日其氣多晴天地之閉氣所以變化也既變之後則冬至之寒氣始得藏物矣况春夏屬陽而一陽之氣已萌于冬至而為復秋冬屬隂而一隂之氣已萌于夏至而為姤由復之一陽漸積至孟夏為純陽之乾故五月雖一隂漸萌于下而純陽之氣則愈浮于地之上矣惟陽氣上浮所以末夏初秋時為酷熱由姤之隂漸積至孟冬為純隂之坤故十一月雖一陽漸萌于下而純隂之氣則盡凝于地之上矣惟隂氣上凝所以冬末春初時為嚴寒可見四時雖以温涼寒暑而異名一氣則隨隂陽消長而變化是天氣之時序又各有其漸非以四時而截然各分之也然地有四方果可以四時分屬之哉不過以東方木氣西方金氣南方火氣北方水氣各以其時而應之爾所以四氣不拘方隅者以其乗中正之氣得天度之多而地之應亦均也若夫四變則各有差殊故謂江北無隂江南無韶西土無占東邦無陽以其地偏方隅而天度不齊地氣流行適有偏耳此則不可不察也雖然四時之候又各有氣運立春至春分厥隂風木主之謂之生氣清明至小滿少隂君火主之謂之舒氣芒種至大暑少陽相火主之謂之長氣立秋至秋分太隂濕土主之謂之化氣寒露至小雪陽明燥金主之謂之收氣大雪至大寒太陽寒水主之謂之藏氣而一氣運于甲子冬至之朔二氣運于甲戌霜降之朔三氣運于甲申處暑之朔四氣運于甲午夏至之朔五氣運于甲辰榖雨之朔六氣運于甲寅雨水之朔故天氣左旋地氣右轉一闔一闢生化無窮是又一氣司四節一節計十五日每候司五辰皆在天度計五度强弱而與時變易鬼神情狀俱有定數可坐而占之矣然則五行五音五帝五神四方八卦其于四時雖各有配屬而一氣運旋川流敦化原無方所要皆隨時隨處異其名耳噫天雖不言不于並行並育者而可以黙識之哉論四時氣序按庖犧氏則河圖畫八卦定五行配四時其數曰一三五七九陽也二四六八十隂也所謂天一生水地六成之在北方播于冬天三生木地八成之在東方播於春天之陽數生之故冬春之月卦皆陽爻自復始陽推出隂故寒地之隂數成之乃寒隂之氣也故冬寒而後春漸暖隂極生陽也地二生火天七成之在南方播於夏地四生金天九成之在西方播於秋地之隂數生之故夏秋之月卦皆隂爻自姤始隂推出陽故熱天之陽數成之乃熱陽之氣也故夏熱而後秋漸涼陽極生隂也天五生土地十成之土為萬物之母尊居中以配天代天而生萬物故不名時也蓋五行生成之數皆含天五之數故天一得五而六成天三得五而八成地二得五而七成地四得五而九成天五得五而十成故土播於四時之間旺於季月之末可見矣得天生者屬陽地生者屬隂後天卦位是也故冬至子之半而陽生夏至午之半而隂生以四時詳而言之冬水生春木春木生夏火夏火生秋金秋金生冬土是以人之五臟腎水生肝木肝木生心火而心與肺金相聨象四時也脾胃屬土居中納水穀而腎肝心肺皆資脾胃之氣象土播於四時之間此人事合天時之造化也按月令以季夏一歲中屬中央土則四時無不在故無定位寄居火金之間火中生土土中生金是時酷暑火盛生土之氣也厯法以夏至後三庚曰伏亦此也伏者金伏土之義立秋金代火金畏火尅故曰伏又以五子納音統十千五運化氣論之丙辛化水丙子水旺於北丁壬化木壬子木旺於東戊癸化火戊子火旺於南甲巳化土甲子金旺於西乙庚化金庚子土居中庚子納土甲乙化土子居母腹甲子納金乙庚化金母無正位合居兒家從子之道也此火中生土土中生金蓋五行質具於地氣行於天以質言則曰水火木金土取天地生成之序也以氣言則曰木火土金水取四時運行之序也其氣即一元之氣行於地中地受天之氣行於四時之間發生萬物今厯家以律吕候氣之法晷刻不差便是此氣從地中透出吁大哉聖人之作易也與夫律呂候氣之法以見天地之心造化流行如循環無窮也書洪範四五紀一曰歲二曰月三曰日四曰星辰五曰厯數歲者序四時也月者定晦朔也日者正躔度也星經星緯星也辰日月所會十二次也厯數者占步之法所以紀歲日月星辰也歲月日時無易百穀用成乂用明俊民用章家用平康歲月日三者雨暘燠寒風不失其時則其効如此休徵所感也日月歲時既易百穀用不成乂用昏不明俊民用微家用不寧日月歲三者雨𤾉燠寒風既失其時則其害如此咎徵所致也是圖由外以及内也初一二層記十二時積時以成日也第三層因月之盈虧以記三十日積日以成月也第四層因十二卦以記十二月積月以成歲也第五層記四時二十四節氣乃一歲之周而復始也即一歲而千萬歲可知矣夫一歲之日月起於一時之積而天運實無一息之停君子惜隂將以配天行健也其可有廢時哉歲時總考春前律厯志曰少陽者東方東動也陽氣動物於時為春春蠢也物蠢乃運動故為規禮記月令曰孟春之月日在營室昏參中旦尾中孟長也日月之行一歲十二㑹觀斗所建命其四時孟春日月會於娵訾而斗建寅其日甲乙其帝大皥其神勾芒鄭𤣥曰此蒼精之君木官之臣自古以來著德立功者大皥宓羲也勾芒少皥氏之子曰重為木官律中大蔟倉律候氣之管以銅為之中猶應也高誘註曰萬物動生蔟地而出故曰大蔟東風解凍蟄蟲始振振動也魚上氷獺祭魚鴻雁來此皆記時候天氣下降地氣上騰天地和同草木萌動此陽氣蒸運可耕之候夏小正曰正月啟蟄雉震呴呴古雊字古豆反呴者鳴也震者鼔其翼也時有浚風浚者大也南風滌凍塗滌者變也變而暖也田鼠出田鼠嗛鼠也嗛簟也反農及雪澤采芸音魂芸似耶蒿可食栁稊苦兮反稊者發孚也梅杏柂斯桃則華柂桃山桃月令曰仲春之月日在奎昏弧中旦建星中仲中也仲春者日月㑹於降婁而斗建卯律中夾鍾高誘曰是月萬物去隂而生故候管者中夾鍾始雨水桃始華倉庚鳴倉庚黄鸝也鷹化為鳩𤣥鳥至𤣥鳥燕也日夜分雷始發聲始電蟄蟲咸動夏小正曰二月祭鮪鮪之至其時美采芑芑音把菜也降燕乃睇降下也燕一名𤣥鳥齊人呼乙睇眄也眄者視可為室淮南子曰二月之夕女夷鼔歌以司天和女夷神名月令曰季春之月日在胃昏七星中旦牽牛中季少也季春日月會於大梁而斗建辰律中姑洗高誘注曰姑故也洗新也是月陽氣發去故就新桐始華田鼠化為鴽虹始見蓱始生螮蝀謂之虹䓑萍也生氣方盛陽氣發洩勾者畢出萌者盡達屈而生者曰勾芒而生者曰萌夏小正曰三月參則伏參星伏不見􅕪斛則鳴􅕪天螻也爾雅注云天螻螻蛄頒冰分冰以授大夫拂桐葩桐葩始生貌拂拂然周書時訓曰三月鳴鳩拂羽戴勝降于桑拂羽以羽相擊戴勝促織絍之鳥一名戴鵀鵀音時鴆反詩云春日遲遲卉木萋萋又曰春日載陽有鳴倉庚梁元帝纂要曰春曰青陽氣清而温陽亦曰發生芳春青春陽春三春九春天曰蒼天萬物蒼蒼而下風曰陽風春風暄風柔風惠風景曰媚景和景韶景時曰良時嘉時芳時辰曰良辰嘉辰芳辰節曰華節芳節良節嘉節淑節草曰弱草芳草芳卉木曰華木華樹芳林芳樹林曰茂林鳥曰陽鳥時鳥陽禽候鳥時禽好鳥好禽正月孟春亦曰孟陽孟陬音鄒上春初春開春發春獻春首春首歲初歲開歲發歲獻歲肇歲芳歲華歲二月仲春亦曰仲陽三月季春亦曰暮春末春晩春三春于卦總屬震方屬東音屬角五行屬木夏前律厯志曰夏假也物假大乃宣平禮記月令曰孟夏之月日在畢昏翼中旦婺女中鄭𤣥注曰孟夏者日月會於實沈而斗建巳之辰其日丙丁丙之言炳也萬物皆炳然著見而强大其帝炎帝其神祝融此赤精之君火官之臣炎帝大庭氏也祝融顓頊氏之子曰黎為火官正者律中仲吕髙誘注曰陽散在外隂實在中所以旅陽成功故曰仲吕也螻蟈鳴蚯蚓出王𤓰生苦菜秀螻蟈蛙也王𤓰薢挈也高誘曰螻蟈蝦蟆薢蒲結反靡草死麥秋至斷薄刑决小罪靡草薺葶􅐗之屬夏小正曰四月昴則見昴星名易通卦驗曰立夏清風至而暑鵲鳴聲博穀飛電見龍升天龍心星名月令曰仲夏之月日在東井昏亢中旦危中鄭𤣥注曰仲夏者日月㑹於鶉首而斗建午之月律中㽔賔髙誘曰是月隂氣萎㽔在下象主人陽氣在上象賔客小暑至螗蜋生鵙始鳴反舌無聲螗蜋螵蛸母也鵙伯勞也反舌百舌鳥高誘日螗蜋代謂之天馬一名齕疣兖豫謂之巨斧是月隂作於下陽散於上伯勞夏至後應隂而殺蛇乃磔之棘上而始鳴也反舌百舌也變易其聲倣百鳥之鳴故謂之百舌也鹿角解蟬始鳴半夏生木槿榮木槿玉蒸也名蕣一名櫬夏小正五月參見則琅蜩鳴蜋蜩者五彩貝初昏大火中大火心星尚書曰日永星火以正仲夏永長也謂夏至之日也火蒼龍之中星舉中則七星見可知矣鳥獸希革時羽毛希少改易革改也月令曰季夏之月日在栁昏火中旦奎中鄭𤣥曰季夏者日月㑹於鶉火而斗建未之辰律中林鍾温氣至蟋蟀居壁按爾雅曰蟋蟋蛬劉邵注云謂蛚蜻也孫炎云梁國謂之蛬郭璞云今促織也蛬音義或作蛩方言蜻蛚楚謂之蟋蟀似蝗而小正黒有光澤如漆有角起一名蛬有名蜻蛚幽州人謂之促織鷹乃學習腐草化為螢詩云四月維夏六月徂暑梁元帝纂要曰夏曰朱明氣赤而光明亦曰長嬴以征反朱夏炎夏三夏九夏天曰昊天言氣浩汗風曰炎風節曰炎節草曰茂草雜草木曰蔚林茂林密樹茂樹孟夏亦曰維夏首夏季夏亦曰徂暑三夏于卦總屬離方屬南音屬徵五行屬火一歲之中四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水惟立秋金代火金畏火故庚日心伏是庚金因火而伏也其實季夏之月土潤溽暑大雨時行土雖分屬四季而于季夏尤旺故火生土土生金子藏母腹也季夏中央屬土其帝黄帝其神后土其音屬宫秦伏祠社祠后土也秋律厯志曰秋揫也物揫斂乃成熟禮記月令曰孟秋之月日在翼昏建星中旦畢中鄭𤣥曰孟秋者日月會於鶉尾而斗建申之辰其日庚辛庚之言更也辛之言新也日行秋西從白道成熟萬物月為之佐萬物皆肅然改更秀實新成也其帝少皥其神蓐收此白精之君金官之臣少昊金天氏蓐收少昊氏之子曰該為金官律中夷則高誘曰太陽力衰太隂氣發萬物凋傷應法成性涼風至白露降寒蟬鳴鷹乃祭鳥鷹祭鳥者將食之示有先也仲秋之月日在角昏牽牛中旦觜觽中鄭𤣥曰仲秋者日月㑹於夀星而斗建酉之辰律中南吕髙誘曰陽氣内藏隂吕為陽事其成功盲風至鴻雁來𤣥鳥歸羣鳥養羞盲風疾風也𤣥鳥燕也歸謂去蟄也凡鳥隨陽者不以中國為歸羞謂所養日夜分雷乃始收聲蟄虫坏裴户殺氣日衰水始涸坏益也季秋之月日在房昏虚中旦柳中鄭𤣥曰季秋日月會於大火而斗建戌之辰律中無射季秋氣生則無射之律應髙誘曰隂氣上升陽氣下降萬物隨陽而盛而無射出見者也鴻雁來賔雀入大水為蛤菊有黄華豺乃祭獸戮禽來賔者其客止未去大水海也戮殺也霜始降草木黄落尚書曰霄中星虚以殷仲秋宵夜也虚𤣥賦中星以秋分日見鳥獸毛毨詩曰秋日凄凄百卉具腓又云七月流火九月授衣淮南子曰七月百蟲蟄伏青女乃出高誘曰青女乃青要玉女司霜雪者以降霜露夏小正曰八月丹鳥羞羞進也白鳥白鳥蚊蚋辰則伏辰房星鴽為鼠九月内火内收斂梁元帝纂要曰秋曰白藏氣白而收藏萬物亦曰收成萬物成而收斂亦曰三秋九秋素秋素商高商天曰旻天旻愍也愍萬物之凋零風曰商風素風凄風高風涼風激風悲風景曰朗景澄景清景時曰凄辰霜辰霜辰可施九月節曰素節商節草曰衰草木曰疎木衰林霜柯霜條七月孟秋首秋上秋肇秋蘭秋八月仲秋亦曰仲商九月季秋亦曰暮秋末秋暮商季商杪秋三秋于卦總屬兌方屬西音屬商五行屬金冬律厯志曰陽氣潛伏於下于時為冬禮記月令曰孟冬之月日在尾昏危中旦七星中鄭𤣥曰孟冬者日月㑹于析木之精而斗建亥之辰其日壬癸壬之言任也癸之言揆也日之北行從黒道閉藏萬物月為之佐萬物懐姙於壬癸揆然萌芽其帝顓頊其神𤣥㝠此黒精之君水官之臣顓頊高陽氏也𤣥㝠少昊氏之子曰脩曰熈為水官之神律中應鍾高陽曰隂應於陽轉成其功水始冰地始凍雉入大水化為蜃虹藏不見大水淮也大蛤為蜃仲冬之月日在斗昏東壁中旦軫中鄭𤣥曰仲冬者日月會於星紀斗建子之辰律中黄鍾黄鍾者律之始也高誘曰陽氣聚於下隂氣盛於上萌於黄泉下故曰黄鍾冰益壯地始坼日短至隂陽爭諸生蕩爭者隂方盛陽欲起蕩謂物將萌芽者芸始生荔挺出蚯蚓結麋角解水泉動芸香草也荔挺馬葅也水泉動潤上行也季冬之月日在婺女昏婁中旦氐中鄭𤣥注曰季冬日月會於𤣥枵而斗建丑之辰律中大吕鴈北嚮鵲始巢雉雊雞乳雊雉鳴也出土牛以送寒氣出猶作也土牛者丑為牛牛可牽止送猶畢也日窮于次月窮于紀星迴于天數將幾終言日月星辰運行至此皆周匝於故處也次舍也紀猶會也尚書曰日短星昴以正仲冬日短冬至之日昴白虎中星鳥獸氄辱勇切毛詩云冬日烈烈飄風發發蔡邕月令章句曰冬終也萬物於是終也梁元帝纂要曰冬曰𤣥英氣黑而青英亦云安寧亦曰𤣥冬三冬九冬天曰上天言時無事在上而臨下風曰寒風勁風嚴風厲風衰風隂風景曰冬景寒景時曰寒時節曰寒節鳥曰寒鳥寒禽草曰寒卉黄草木曰寒木寒柯素木寒條十月孟冬亦曰上冬亦曰陽月此是純隂用事嫌其無陽故曰陽月十二月季冬亦曰暮冬杪冬除月暮節暮歲窮稔窮紀三冬于卦總屬坎方屬北音屬羽五行屬水時令總論董子曰天有兩和以成二中歲立其中用之無窮是故北方之中内産陽而物始動於下南方之中内萌隂而養始美於上動於下者不得東方之和不能生中春是也養於上者不得西方之和不能成中秋是也東方和北方之所起而西方和南方之所養起之不至於和之所不能生長之不至於和之所不能成生於和成必和始于中止必中也中者天地之所始終也和者天地之所生成也夫德莫大於和而道莫至于中中和者天地之美德達道也聖人之所保守也陽氣起于北至南方而盛盛極而合乎隂隂氣起于南至北方而盛盛極而合乎陽不盛不合終歲再合此天地冬夏之所以為節也夫隂陽之合皆在日至之後為寒則凝氷裂地為熱則焦沙爛石氣之精至於是故能出入無形而物莫不應天地之生至於東方之中而所生大成養成西方之中而所養大成一歲四起業而必止於中中之所為而就之和故和者天地之正也隂陽之平也天地之道雖有不和必歸之于和而所為有功雖有不中必止之于中而所為不過是故陽之行始于北方之中而止于南方之中隂之行始于南方之中而止于北方之中隂陽之道不同盛而皆止于中中者天地之太極也日月之所至而却也故陽者天之寛也隂者天之急也節者天之制也中者天之用也和者天之功也舉天地之道而莫美於中和聖人内居其至以立中嗜慾不滑神凝于一以守中外處其平以達和動靜應候喜怒度理以導和見端而知本精之至也得一而應萬類神之至也政以此平令以此宣故冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無菑霜雹厲疾不降民不夭札此先王之所以若天也天道以隂為權以陽為經陽出而南隂出而北經用于盛權用于末以此見天之顯經隠權前德而後刑也春愛志也夏樂志也秋嚴志也冬哀志也故愛而有嚴樂而有哀四時之則也喜怒之禮哀樂之義不獨在人亦在于天春夏之陽秋冬之隂不獨在天亦在於人人無春氣何以博愛而容衆人無秋氣何以立嚴而成功人無夏氣何以養盛而樂生人無冬氣何以哀死而恤喪以暖而春生育天喜志也以清而秋殺戮天怒志也以疏陽而夏養長天樂志也以激隂而冬閉藏天哀志也故曰天乃有喜怒哀樂之行人亦有春夏秋冬之氣此之謂也此可以見德刑之用矣是故隂陽之行各六月逺近同度而所在異處出陽為暖以生之出隂為清以成之是故非熏也不能有育非栗也不能有熟歲之精也知天而不省薰與栗孰多者用必大戾力雖勞而不成是故自正月至于十月而天之功畢于是問隂陽各居幾何薰與栗其用孰多據物之初生至其畢成露與霜其用孰倍故陽者歲之主也德者君之宗也隂者陽之助也刑者德之輔也從中春以至於秋氣温柔和調乃季秋九月隂始多於陽於是而出溧下霜而物固已皆成矣故九者究也天地之功究于是月也十月而悉畢隂乃大出故天之成功小隂與而大隂不與霜加物而雪加空空者亶地而已不及物也此非親陽而疎隂任德而逺刑之明效與天之志常置隂空處稍取之以為助而非所用也天下之昆蟲隨陽而出四十六秒月行三百六十八度三十七分四秒半孛行二度十一分四十秒半黄道周天之度併孛行數即月行之數也凡六十二年而七周天月行最遲之處與之同躔矣取上古甲子分為一十二號每號分十二月而置閏於其下閏在號前那前一月閏在號後那後一月萬厯五年十二月朔日孛危十三度五星雖各一其明也雖各一其行度也要之皆視日以為隱伏遲疾若羅計紫氣孛星則皆隨乎月何也羅計纒度其數併月行交終之度月之盈縮視孛星所在與之同位為最遲與之同衝為最疾紫氣則狀如半月生於晦朔助月為明其平行之度皆與日無異是四餘皆助乎月者也雖無形象光明可覩而其魄之行于天者亦萬古常存如月之晦時也觀紫氣有時而見謂之為景星可類推矣夫羅乃火之餘孛乃水之餘紫氣乃木之餘金獨無餘氣焉彼以月為金精故無餘或亦有見於斯歟七政四餘總敘夫日月木火土金水謂之七政紫􅉋月孛羅㬋計都謂之四餘合七政四餘謂之十一曜凡天地之所以位萬物之所以育與夫四時之代序隂陽之消長何莫而非順天之數也故四時同氣各有所宜宜之所在其物代美故冬水氣也薺味甘乗于水而美者甘勝寒也夏火氣也芬味苦也乗於火而成者苦勝暑也天無言意以物示故物與羣物不同時而生死者必深察之是天之所以教人也故薺以冬美芬以夏成薺成告之甘芬成告之苦君子察物成而謹告戒故春襲和陽夏居密隂秋避殺氣冬避重凛就其和也怒而反中而自説以平喜則反中而自攝以正憂則反中而舒之以意懼則反中而實之以精春秋雜物其和而冬夏代服其宜是謂得天地泰聖人所以自漸于天地之道也氣候總論夫七十二候見於周公之時訓吕不韋載於吕氏春秋漢儒入于禮記月令其來逺矣若載之於厯則自後魏始耳第其禽獸草木多出北方蓋緣漢前諸儒皆産江北故後之江南雖號宿儒老師亦難盡通其名義然多識參考求覈其實則庶幾得之斯亦吾儒格至之學所不廢乎愚嘗因是而知天地氣序推遷之妙矣蓋一歲之間本一氣之周流耳一氣分而為二則有隂陽二倍而為四則有四時三四一十二則又有十二月十二倍而為二十四則有二十四氣復三其二十四而為七十二則有七十二候是七十二候者吾得之于乾坤之策焉乾之策三十六而兩之夫固七十二也坤之策二十四而三之亦七十二也計乾六爻之策二百一十有六坤六爻之策一百四十有四通合乾坤之策而三百六十日之數盡矣舉乎七十二候之全而三百六十日之歲周矣然厯書之所計者候也而候之所應者氣也氣至而物感則物感而候變是故天地之氣撓萬物者莫疾乎風也正月而東風解凍者則天地收斂之氣散矣七月而涼風至者則天地發舒之氣散矣動萬物者莫疾乎雷也二月而雷始發聲者陽之中也八月而雷始收聲者隂之中也説萬物者莫説乎澤潤萬物者莫潤乎水也六月而土潤溽暑大雨時行者隂之濕陽之終也十一月而水泉動十二月而水澤腹堅者陽之動隂之終也隂陽之氣交而為虹季春虹始見者陽勝隂也孟冬虹藏不見隂勝陽也隂陽之氣鳥獸草木得之為先鷹主殺而秋擊鼠主貪而夜出而夘辰之月能化鳩鴽者以辰卯者陽之壯隂為陽所化也雀乳子而春集雉求雄而朝呴而戌亥之月能為蛤蜃者以戌亥者隂之極陽為隂所化也蟄蟲啟户者雷發聲之時與陽俱出也蟄蟲坏户者雷收聲之時與隂俱入也孟春而獺祭魚者此時魚逐陽氣而上遊也季秋而豺祭獸者此時獸感隂氣而見殺也春而鴻鴈北𤣥鳥至者鴈自南而來北燕自北而來南各乗其陽氣之所宜也秋而鴻鴈來𤣥鳥歸者鴈自北而來南燕自南而來北各乗其隂氣之所宜也二月而倉庚鳴四月而螻蟈鳴者鳴以陽也及五月一隂始生鵙一鳴而反舌則無聲矣七月而寒蟬鳴者鳴以隂也及十一月一陽始生鶡鴠能鳴而感陽則不鳴矣四月而蚯蚓出者隂之屈者得陽而伸也十一月而蚯蚓結者陽雖生矣而隂尚屈也夏至得一隂而鹿角解者鹿陽獸也冬至得一陽而麋角解者麋隂獸也草木正月而萌動者隂陽氣交而為泰也九月而黄落者隂長陽消而為剝也桃桐華於春者應陽之盛也黄菊華於秋者應隂之盛也四月而靡草死者隂不勝於陽也十一月而茘挺出者陽初復於隂也麥得隂之稺也故金王而生火王而死而麥秋在於四月也禾得陽之稺也故木旺而生金王而熟而禾登在於七月也至於腐草之為螢則植物之變為動物無情之變為有情豈非陽明之極而隂幽之物亦隨之以化哉大抵隂陽二氣無形而黙運於内風雨露雷昆蟲草木有形而改換于外君子觸其景而測其應則可以寓對時育物之心因其候而思其義則可以悟隂陽貞勝之理由是而知一歲之間七十二候即二十四氣也二十四氣即一十二月也一十二月即四時也四時即二氣也二氣即一氣之周流也而乾坤無餘策厯書無餘術矣月令孟春之月日在營室昏參中旦尾中其日甲乙其帝太皥其神勾芒其蟲鱗其音角律中大蔟其數八其味酸其臭羶其祀户祭先脾東風解凍蟄蟲始振魚上冰獺祭魚鴻鴈來天子居青陽左个乗鸞路駕倉龍載青旂衣青衣服倉玉食麥與羊其器疏以達是月也以立春先立春三日太史謁之天子曰某日立春盛德在木天子乃齋立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿諸侯大夫於朝命相布德和令行慶施惠下及兆民慶賜遂行毋有不當乃命大史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常是月也天子乃以元日祈穀于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒是月也天氣下降地氣上騰天地和同草木萌動王命布農事命田舎東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五穀所殖以教道民必躬親之田事既飭先定準直農乃不惑是月也命樂正入學習舞乃修祭典命祀山林川澤犧牲毋用牝禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋殺麛毋毁卵毋聚大衆毋置城郭掩骼埋胔是月也不可以稱兵稱兵必有天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀孟春行夏令則雨水不時草木早落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入仲春之月日在奎昏弧中旦建星中其日甲乙其帝太皥其神勾芒其蟲鱗其音角律中夾鍾其數八其味酸其臭羶其祀户祭先脾始雨水桃始華倉庚鳴鷹化為鳩天子居青陽太廟乗鸞路駕倉龍載青旂衣青衣服倉玉食麥與羊其器疏以達是月也安萌芽養幼少存諸孤擇元日命民社命有司省囹圄去桎梏毋肆掠止獄訟是月也𤣥鳥至至之日以太牢祀于髙禖天子親往后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前是月也日夜分雷乃發聲始電蟄蟲咸動啟户始出先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災日夜分則同度量鈞衡石角斗甬正權概是月也耕者少舍乃修闔扇寢廟畢備毋作大事以妨農事是月也毋竭川澤毋漉陂池毋焚山林天子乃鮮羔開冰先薦寢廟上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之仲丁又命樂正入學習樂是月也祀不用犧牲用圭璧更皮幣仲春行秋令則其國大水寒氣總至冦戎來征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱暖氣早來蟲螟為害季春之月日在胃昏七星中旦牽牛中其日甲乙其帝太皥其神勾芒其蟲鱗其音角律中姑洗其數八其味酸其臭羶其祀户祭先脾桐始華田鼠化為鴽虹始見蓱始生天子居青陽右个乗鸞路駕倉龍載青旂衣青衣服倉玉食麥與羊其器疏以達是月也天子乃薦鞠衣于先帝命舟牧覆舟五覆五反乃告舟備具于天子焉天子始乗舟薦鮪于寢廟乃為麥祈實是月也生氣方盛陽氣發洩勾者畢出萌者盡達不可以内天子布德分惠命有司發倉廩賜貧窮賑乏絶開府庫出幣帛周天下勉諸侯聘名士禮賢者是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞田獵罝罘羅網畢翳餧獸之藥毋出九門是月也命野虞無伐桑柘鳴鳩拂其羽戴勝降于桑具曲植籧筐后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲効功以共郊廟之服無有敢惰是月也命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良百工咸理監工日號毋悖于時毋或作為淫巧以蕩上心是月之末擇吉日大合樂天子乃率三公九卿諸侯大夫親往視之是月也乃合累牛騰馬遊牝于牧犧牲駒犢舉書其數命國難九門磔攘以畢春氣季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不收行秋令則天多沈隂淫雨蚤降兵革並起孟夏之月日在畢昏翼中旦婺女中其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中仲吕其數七其味苦其臭焦其祀竈祭先肺螻蟈鳴蚯蚓出王𤓰生苦菜秀天子居明堂左个乗朱路駕赤駵載赤旂衣朱衣服赤玉食菽與雞其器高以粗是月也以立夏先立夏三日太史謁之天子曰某日立夏盛德在火天子乃齋立夏之日天子親帥三公九卿諸侯大夫以迎夏於南郊還反行賞封諸侯慶賜遂行無不欣説乃命樂師習合禮樂命太尉贊傑俊遂賢良舉長大行爵出祿必當其位是月也繼長增髙毋有壊墮毋起土工毋發大衆毋伐大樹是月也天子始絺命野虞出行田原為天子勞農勸民毋或失時命司徒巡行縣鄙命農勉作毋休于都是月也驅獸毋害五穀毋大田獵農乃登麥天子乃以彘嘗麥先薦寢廟是月也聚蓄百藥靡草死麥秋至斷薄刑决小罪出輕繫蠶事畢后妃獻繭乃收繭税以桑為均貴賤長幼如一以給郊廟之服是月也天子飲酎用禮樂孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草木早枯後乃大水敗其城郭行春令則蝗蟲為災暴風來格秀草不實仲夏之月日在東井昏亢中旦危中其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中㽔賔其數七其味苦其臭焦其祀竈祭先肺小暑至螳螂生鵙始鳴反舌無聲天子居明堂太廟乗朱路駕赤駵載赤旂衣朱衣服赤玉食菽與鷄其器髙以粗養壯佼是月也命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實農乃登黍是月也天子乃以雛嘗黍羞以含桃先薦寢廟令民毋艾藍以染毋燒灰毋暴布門閭毋閉關市毋索挺重囚益其食游牝别羣則縶騰駒班馬政是月也日長至隂陽爭死生分君子齋戒處必掩身毋躁止聲色毋或進薄滋味毋致和節嗜欲定心氣百官靜事毋刑以定晏隂之所成鹿角解蟬始鳴半夏生木槿榮是月也毋用火南方可以居髙明可以逺眺望可以升山陵可以處臺榭仲夏行冬令則雹凍傷穀道路不通暴兵四至行春令則五穀晩熟百螣時起其國乃饑行秋令則草木零落果實少成民殃於疫季夏之月日在栁昏火中旦奎中其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中林鍾其數七其味苦其臭焦其祀竈祭先肺温風始至蟋蟀居壁鷹乃學習腐草為螢天子居明堂右个乗朱路駕赤駵載赤旂衣朱衣服赤玉食菽與雞其器髙以粗命漁師伐蛟取鼉登龜取黿命澤人納材葦是月也命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福是月也命婦官染采黼黻文章必以法故無或差貸黒黄倉赤莫不質良毋敢詐偽以給郊廟祭祀之服以為旗章以别貴賤等級之度是月也樹木方盛乃命虞人入山行水毋輕斬伐不可以興土功不可以合諸侯不可以起兵動衆毋舉大事以搖養氣毋發令而待以妨神農之事也水潦盛昌神農將持功舉大事則有天殃是月也土潤溽暑大雨時行燒薙行水利以殺草如以熱湯可以糞田疇可以美土疆季夏行春令則穀實解落國多風欬民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女灾行冬令則風寒不時鷹隼蚤鷙四鄙入保中央土其日戊己其帝黄帝其神后土其蟲倮其音宫律中黄鍾之宫其數五其味甘其臭香其祀中霤祭先心天子居大廟大室乗大路駕黄駵載黄旂衣黄衣服黄玉食稷與牛其器圜以閎孟秋之月日在翼昏建星中旦畢中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中夷則其數九其味辛其臭腥其祀門祭先肝涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮天子居總章左个乗戎路駕白駱載白旂衣白衣服白玉食麻與犬其器廉以深是月也以立秋先立秋三日太史謁之天子曰某日立秋盛德在金天子乃齋立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於朝天子乃命將帥選士厲兵簡練傑俊專任有功以征不義詰誅暴慢以明好惡順彼逺方是月也命有司修法制繕囹圄具桎梏禁止姦慎罪邪務搏執命理瞻傷察創視折審斷決獄訟必端平戮有罪嚴斷刑天地始肅不可以嬴是月也農乃登穀天子嘗新先薦寢廟命百官始收斂完隄防謹壅塞以備水潦修宫室坏垣墻補城郭是月也毋以封諸侯立大官毋以割地行大使出大幣孟秋行冬令則隂氣大勝介蟲敗穀戎兵乃來行春令則其國乃旱陽氣乃還五穀無實行夏令則國多火災寒熱不節民多瘧疾仲秋之月日在角昏牽牛中旦觜觿中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中南吕其數九其味辛其臭腥其祀門祭先肝盲風至鴻鴈來𤣥鳥歸羣鳥養羞天子居總章大廟乗戎路駕白駱載白旂衣白衣服白玉食麻與犬其器廉以深是月也養衰老授几杖行糜粥飲食乃命司服具飭衣裳文繡有恒制有小大度有長短衣服有量必循其故冠帶有常乃命有司申嚴百刑斬殺必當毋或枉撓枉撓不當反受其殃是月也乃命宰祝循行犧牲視全具按芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備當上帝其饗天子乃難以達秋氣以犬嘗麻先薦寢廟是月也可以築城郭建都邑穿竇窖修囷倉乃命有司趨民收斂務蓄菜多積聚乃勸種麥毋或失時其有失時行罪無疑是月也日夜分雷始收聲蟄蟲坏户殺氣浸盛陽氣日衰水始涸日夜分則同度量平權衡正鈞石角斗斛是月也易關市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂凡舉大事毋逆大數必順其時慎因其類仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五穀復生行冬令則風灾數起收雷先行草木早死季秋之月日在房昏虚中旦栁中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中無射其數九其味辛其臭腥其祀門祭先肝鴻雁來賔爵入大水為蛤菊有黄華豺乃祭獸戮禽天子居總章右个乗戎路駕白駱載白旂衣白衣服白玉食麻與犬其器廉以深是月也申嚴號令命百官貴賤無不務内以會天地之藏無有宣出乃命冡宰農事備收舉五穀之要藏帝藉之收於神倉祗敬必飭是月也霜始降則百工休乃命有司曰寒氣總至民力不堪其皆入室上丁命樂正入學習吹是月也大饗帝嘗犧牲告備于天子合諸侯制百縣為來歲受朔日與諸侯講所税於民輕重之法貢賦之數以逺近土地之所宜為度以給郊廟之事無有所私是月也天子乃教於田獵以習五戎班馬政命僕及七騶咸駕載旌旐授車以級整設于屏外司徒搢扑北面誓之天子乃厲飾執弓挾矢以獵命主祠祭禽于四方是月也草木黄落乃伐薪為炭蟄蟲咸俯在内皆墐其户乃趣獄刑毋留有罪收祿秩之不當供養之不宜者是月也天子乃以犬嘗稻先薦寢廟季秋行夏令則其國大水冬藏殃敗民多鼽嚏行冬令則國多盗賊邊境不寧土地分裂行春令則煖風來至民氣懈惰師興不居孟冬之月日在尾昏危中旦七星中其日壬癸其帝顓頊其神𤣥㝠其蟲介其音羽律中應鍾其數六其味鹹其臭朽其祀行祭先腎水始冰地始凍雉入大水為蜃虹藏不見天子居𤣥堂左个乗𤣥路駕鐵驪載𤣥旂衣黑衣服𤣥玉食黍與彘其器閎以奄是月也以立冬先立冬三日太史謁之天子曰某日立冬盛德在水天子乃齋立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡是月也命太史釁龜策占兆審卦吉凶是察阿黨則罪無有掩蔽是月也天子始裘命有司曰天氣上騰地氣下降天地不通閉塞而成冬命百官謹蓋藏命司徒循行積聚無有不斂坏城郭戒門閭修鍵閉慎管籥固封疆備邊境完要塞謹關梁塞蹊徑飭䘮祀辨衣裳審棺椁之厚薄營丘壠之大小髙卑厚薄之度貴賤之等級是月也命工師效功陳祭器按度程毋或作為淫巧以蕩上心必工緻為上物勒工名以考其成功有不當必行其罪以窮其情是月也大飲烝天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀勞農以休息之天子乃命將帥講武習射御角力是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨于下其有若此者行罪無赦孟冬行春令則凍閉不密地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土地侵削仲冬之月日在斗昏東壁中旦軫中其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中黄鍾其數六其味鹹其臭朽其祀行祭先腎冰益壯地始坼鶡鴠不鳴虎始交天子居𤣥堂太廟乗𤣥路駕鐵驪載𤣥旂衣黑衣服𤣥玉食黍與彘其器閎以奄飭死事命有司曰土事毋作慎毋發蓋藏毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死民必疾疫又隨以喪命之曰暢月是月也令奄尹申宫令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習無有不禁乃命大酋􅐕稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸天子命有司祈祀四海大川名源淵澤井泉是也農有不收藏積聚者馬牛畜獸有放佚者取之不詰山林藪澤有能取蔬食田獵禽獸者野虞敎導之其有相侵奪者罪之不赦是月也日短至隂陽爭諸生蕩君子齋戒處必掩身身欲寧去聲色禁嗜慾安形性事欲靜以待隂陽之所定芸始生荔挺出蚯蚓結麋角解水泉動日短至則伐木取竹箭是月也可以罷官之無事去器之無用者塗闕廷門閭築囹圄此所以助天地之閉藏也仲冬行夏令則其國乃旱氣霧㝠㝠雷乃發聲行秋令則天時雨汁𤓰瓠不成國有大兵行春令則蝗蟲為害水泉為竭民多疥癘季冬之月日在婺女昏婁中旦氐中其日壬癸其帝顓頊其神𤣥㝠其蟲介其音羽律中大吕其數六其味鹹其臭朽其祀行祭先腎鴈北鄉鵲始巢雉雊雞乳天子居𤣥堂右个乗𤣥路駕鐵驪載𤣥旂衣黑衣服𤣥玉食黍與彘其器閎以奄命有司大儺旁磔出土牛以送寒氣征鳥厲疾乃畢山川之祀及帝之大臣天之神祗是月也命漁師始漁天子親往乃嘗魚先薦寢廟冰方盛水澤腹堅命取冰冰以入令告民出五種命農計耦耕事修耒耜具田器命樂師大合吹而罷乃命四監收秩薪柴以供郊廟及百祀之薪燎是月也日窮于次月窮于紀星囘于天數將幾終歲且更始専而農民毋有所使天子乃與公卿大夫共飭國典論時令以待來歲之宜乃命太史次諸侯之列賦之犧牲以供皇天上帝社稷之饗乃命同姓之邦共寢廟之芻豢命宰厯卿大夫至於庶人土田之數而賦犧牲以供山林名川之祀凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀季冬行秋令則白露蚤降介蟲為妖四鄙入保行春令則胎夭多傷國多痼疾命之曰逆行夏令則水潦敗國時雪不降日百刻配十二時之數天行之周晝夜百刻配十二時一時得八刻十時得八十刻又二時得十六刻總九十六刻所餘者四刻每刻分為六十分四刻該二百四十分布之十二時之間每一時得八刻二十分故有初初刻者一十分正初刻者一十分今具于后初初刻一十分初一刻六十分初二刻六十分初三刻六十分初四刻六十分以上是上四刻正初刻一十分正一刻六十分正二刻六十分正三刻六十分正四刻六十分以上係下四刻一日總該六千今厯所分又不同晝夜十二時均分百刻一時有八大刻二小刻總九十六大刻總二十四小刻亦准大刻一故共為百刻也上半時之大刻四始曰初初次初一次初二次初三最後小刻為初四下半時之大刻亦四始曰正初次正一次正二次正三最後小刻為四正若子時則上半時在夜半前屬昨日下半時在夜半後屬今日亦猶冬至得十一月中氣一陽來復為天道之初耳古厯每時以二小刻為始初各繼以四大刻然不若今厯之便於籌策也世謂子午卯酉各九刻餘皆八刻者非是厯家大抵以刻漏極長于六十極短於四十嘗聞前輩言惟正統巳巳官厯晝刻三十九夜刻六十一以為隂過故為土木之變元授時厯則長極於六十二刻短極於三十八刻以為驗丁燕地稍偏北故然外國有蒸羊胛未熟而天明者則短又不止於三十八刻而已豈漏刻隨日因地有不同者如此初不全繫于隂陽之消長也歟刻漏總論周天之星二十有八星之辰十有二辰之度三十有竒而十二辰之度三百六十五有竒星辰循天而左旋日月五星遡天而右轉日陽也舒而遲故朞而周月隂也蹙而速故一月而周日月會於辰則為月十有二會則為歲歲三百有六旬有六日而日之長短參差不齊於是先王刻箭沃漏以揆之故隋志曰黄帝創觀漏承制器取則以分晝夜則漏刻之制蓋始於黄帝其後因以命官周禮挈壺氏則其職也及考之鄭氏所注則有曰漏之箭晝夜共百刻冬夏之間有短長焉太史立成法有四十八箭此亦可見周制之大略也漢興因拘占制漢武所用之法二至之後九日而增損一刻建武中興厯稍後天宋浮許淑請更厯法天下初定顧猶未遑而令甲第六漏品斯載日分百刻率以九日為刻增損視夏厯為疎焉永平紹隆張盛景倣以四分法課校弦望術頗施行元和編訢李梵推廣其術厯用四分而宫漏之制一仍其舊或時至差二刻以上不與天應迄于和帝永元之十四年未知改作惟霍融待詔太史新頒夏厯露章抗議詔刻四十八箭以二十四氣日躔所在洎于黄道去極晷景昏明中星刻于其下隨日南北以為長短始終至起凡一再周而一歲之運畢矣四分厯法政定于兹然則是氣之設實為至妙終于魏晉相𫝊不改故晉陸機則有刻漏賦晉李充孫焯則有刻漏銘梁陸倕則又有刻漏銘唐藝文志則有刻漏經唐厯志則有一行步晷漏術此亦可以考厯代之大略也然孔頴達謂浮箭壺内以出刻為凖賈公彦謂漏水壺内以設刻為度或浮或沈此其説之異也古今刻漏之法有浮漏有稱漏或漏或稱此其制之異也漢夏賀良則有百二十刻之説宋何承天則有春秋二分晝夜各五十刻之説梁武帝大同之所改用者則又有百八十刻之説至於陳隋則仍用百刻之制此又其數之不同者也在天聖中燕肅所上刻漏浮箭之壺為金蓮花則曰蓮花漏皇祐初舒易簡等所造刻漏以木為權衡增平水壺置于文德殿則為文德殿刻漏蘇頌之在元祐上儀象法要于渾天儀銅候儀渾天象三器之外又置刻漏四副一曰浮箭漏二曰稱漏三曰沈箭漏四曰不息漏使挈壺專掌時刻與儀象互相參考以合天星行度為正所以驗天數與天運為不差則寒暑之氣候自正也雖然周官挈壺氏凡軍事垂壺施之於軍所以嚴警守以至朝夕之禮而常以是為節焉然春官雞人凡國事為期則告之時而齊詩特罪挈壺氏者蓋天子備官挈壺氏掌漏雞人告之諸侯則掌漏告時一於挈壺氏而已此不可不知也晉天文志蓋日未出地二刻半而地上已明即曉分時日已入地二刻半而地上明盡即黄昏時世人但知以昏明為晝夜不知日出在已明之後日入在未昏之前也且世人只知十二時耳孰知一晝一夜而太陽之所臨有二十四時乎周天日月節侯卦律分野總圖敘易繫辭傳曰易與天地凖故能彌綸天地之道又曰廣大配天地變通配四時隂陽之義配日月信乎月之卦數即天地之造化也是圖也凡天之度數日之運行月之盈虧與五行之會四時之序二十四氣之節七十二候之變以至九州之分野十二律吕之宣助莫不備具然即歲月日時而細玩之孰非卦畫隂陽竒偶之數以為之彌綸配合者乎然彌綸也配合也一皆易道生生自然之運聖人不過畫卦以示之象耳試觀醫卜諸技悉有不能違者况學聖人之學而不明聖人之易可乎欲上律天時其餘歲月日時之節候隂陽氣數之升降均莫之肖也故于天道諸圖既散而列之復會而總之敦化川流其道本如是也噫易一也人與天地一也况即是圖反求諸身心又自有脗合者在乎每時計九十日每節四十五日每氣一十五日每候計五日故候有七十二日氣有二十四節有八時有四各為三百六十也厯家借易之卦爻于六十四卦中先除震兑坎離二十四爻總二十四氣復以六十卦分三百六十爻以直三百六十日謂之卦氣乾生於子坤生於午坎終於寅離終於申此伏羲先天卦象也蓋自太極一理而二儀二儀而四象四象而八卦二八而十六十六而三十二三十二而六十四加倍以成象者也易曰天地定位山澤通氣雷風相薄水火不相射數往者順知來者逆此之謂也其法以乾南坤北離東坎西震東北巽東南艮西北兑西南分為定位每一位以本位之卦畫之每八體焉然後分其順逆以先天卦次乾一兑二離三震四巽五坎六艮七坤八每用一卦重加於各位之上其自乾起者則左旋而順行其自巽起者則右轉而逆布然後六十四卦有定位矣乾生於子者復之一陽也坤生於午者姤之一隂也坎盡夘中離盡酉中陽極而隂生隂極而陽生也地法用以消息隂陽定其八卦以致于用者蓋本諸此因卦爻以明天時生成起滅之機天地之機一闢一闔天地之氣一呼一吸以其變化者言之則曰生成起滅以其運行者言之則曰孤虚旺相一寒一暑互為往來一隂一陽迭為消長聖人皆因卦爻而以卦理明之也歲有四時以歲星一周故曰歲始於子而終于亥也五行之氣流於四時每行司七十二日故五行之司共得三百六十日所以分𨽻四時也春秋冬夏按月令孟春之月其數八孟夏之月其數七以木火者生物之數也孟秋之月其數九孟冬之月其數六以金水者成物之數也春秋者天氣之一生一成冬夏者天氣之一生一成則春夏所以生物而秋冬所以成物所謂精氣為物遊魂為變也故不言次而以時代言之時有三月而仲為正四時各有孟仲季月以仲為正者以中星之占候言之故春有三月而仲春為正者以仲春昏中則星烏見於南星火在東星昴在西星虚在北而又當震宫令木之旺其正氣為燠變氣為韶夏有三月而仲夏為正者以仲夏昏中則星火見於南星鳥見於西星虚在東星昴在北而又正當離宫令火之旺其正氣為暑變氣為隂秋有三月而仲秋為正者以仲秋昏中則星虚見於南星火在西星昴在東星鳥在北而又正當兑宫令金之旺其正氣為涼變氣為占冬有三月以仲冬為正以仲冬昏中則星昴見於南星虚在西星鳥在東星火在北而又正當坎宫令水之旺其正氣為寒變氣為易以此故也四時有十二月正月建寅日在營室昏參中旦尾中其辰娵訾其律大蔟其卦泰立春為朔艮氣雨水為中寅氣二月建卯日在奎昏弧中旦建星中其辰降婁其律夾鍾其卦大壯驚蟄為朔甲氣春分為中卯氣三月建辰日在胃昏七星中旦牛中其辰大梁其律姑洗其卦夬清明為朔乙氣穀雨為中辰氣四月建巳日在畢昏翼中旦婺女中其辰實沈其律仲吕其卦乾立夏為朔巽氣小滿為中巳氣五月建午日在東井昏亢中旦危中其辰鶉首其律㽔賔其卦姤芒種為朔丙氣夏至為中午氣六月建未日在栁昏火中旦奎中其辰鶉火其律林鍾其卦遯小暑為朔丁氣大暑為中未氣七月建申日在翼昏建星中旦畢中其辰鶉尾其律夷則其卦否立秋為朔坤氣處暑為中申氣八月建酉日在角昏牽牛中旦觜中其辰夀星其律南吕其卦觀白露為朔庚氣秋分為中酉氣九月建戌日在房昏虚中旦栁中其辰大火其律無射其卦剥寒露為朔辛氣霜降為中戌氣十月建亥日在尾昏危中旦七星中其辰析木其律應鍾其卦坤立冬為朔乾氣小雪為中亥氣十一月建子日在斗昏東璧中旦軫中其辰星紀其律黄鍾其卦復大雪為朔壬氣冬至為中子氣十二月建丑日在婺女昏婁中旦氐中其辰𤣥枵其律大吕其卦臨小寒為朔癸氣大寒為中丑氣月有三十日月本無光麗日而明自朔而暗至三日而朏八日而弦十五日而望十八日而生魄二十三日而下弦至三十日復暗而不明是謂晦日謂之月者以月之明暗為期也故月有三十日焉三五為一氣一月之中有朔有中朔者氣至之節度中者日行之節度故云三十日分為二氣氣分為三候五者天數之中故曰五日為一候三為少陽之數故一氣分三候以二十四氣𨽻合七十二候以行天氣也冬至日在坎夏至日在離春分日在震秋分日在兑此四正之卦又配成三卦而十二月之卦備而每爻主一候焉餘六十卦卦主六十日七分八十分日之七歲十二月三百六十五日四分日之一六十而一周也聖人仰觀俯察逺求近取以四卦之爻計二十有四而成二十四氣以十二卦之爻計七十有二而成七十二候以周推氣建候是故冬至之候蚯蚓結鹿角解水泉動小寒之候鴈北鄉鵲始巢雉始雊大寒之候雞始乳鷙始厲疾水澤腹堅立春之候東風解凍蟄蟲始振魚上冰雨水之候獺祭魚鴻鴈來草木萌動驚蟄之候桃始華鶬鶊鳴鷹化為鳩春分之候𤣥鳥至雷乃發聲始電清明之候桐始華田鼠化為鴽虹始見穀雨之候萍始生鳴鳩拂其羽戴勝降于桑立夏之候螻蟈鳴蚯蚓出王𤓰生小滿之候苦菜生靡草死麥秋至芒種之候螗螂生鵙始鳴反舌無聲夏至之候鹿角解蜩始鳴半夏生小暑之候薰風至蟋蟀居壁鷹乃學習大暑之候腐草化為螢土潤溽暑大雨時行立秋之候涼風至白露降寒蟬鳴處暑之候鷹乃祭鳥天地始肅禾乃登白露之候鴻鴈來𤣥鳥歸羣鳥養羞秋分之候雷乃收聲蟄蟲坏户水始涸寒露之候鴻鴈來賔雀入大水為蛤菊有黄華霜降之候豺乃祭獸草木黄落蟄蟲咸俯立冬之候水始冰地始凍雉入大水為蜃小雪之候虹不見天氣上騰地氣下降大雪之候鶡鴠不鳴虎始交荔挺出此皆聖人占候之道焉謂之候者因夫物化以察時變之理也日有十幹甲木乙草天三地八之數丙火丁灰天七地二之數戊土巳砂天五地十之數庚金辛石天九地四之數壬水癸泉天一地六之數辰有十二支亥子水寅夘木巳午火申酉金辰戌土丑未土日有十二時其名則十二支也以氣候占之則半夜子雞鳴丑平旦寅日出卯食時辰禺時巳日卓午日昃未晡時申日入酉黄昏戌人靜亥自子至巳為陽自午至亥為隂以人呼吸卜之則陽時左盛右衰隂時右盛左衰此皆占候之法也十二時百刻一日之候百刻每時八刻則十二時得九十六刻餘四刻以子午卯酉得天度之多而得地氣之盛故每時多一刻也而八刻之中有初有正初者其朔氣也正者其中氣也故用時之法每用其正若癸為子下四刻艮為丑下四刻之類以其得天干之正氣焉非日有二十四時也但以上下刻分爾授時厯以六千分為百刻每時初刻十分初一刻六十分正初刻十分正一刻六十分每時得五百分十二時共六千分子午卯酉四時非多也天之晝夜以日之出入為分人之晝夜以天之昏明為節天本無晝夜以地居天中日行地下人處地上乃有明暗之分故天之晝則日當天而大明天之夜則日入地而月星皆見故日未出前以二刻半為明日既入後以二刻半為昏蓋地之高下各以其方而明昏之際為日出日入之度故以日之出入為分也人本不知有晝夜但有昏明之際故人有作息之節此天之昏明為之節也以百刻而分之百刻者自子至亥一日之常數而以昏明分之則有晝刻夜刻之分也故短極不過四十大雪以後之晝刻小滿以後之夜刻長極不過六十冬至以前之夜夏至以前之晝長短之中各有五十春分秋分之晝夜刻也所以定分至自春分以至夏至之日道去北極近南極逺晝六十刻自夏至以至秋分之日道去南北極中晝夜各五十刻自秋分以至冬至去北極逺南極近晝四十刻自冬至以至春分復去南北極中晝夜各五十刻别時晷冬至日出卯五刻入申三刻二十八分夏至日出寅四刻二十分入酉二刻春秋分日出卯正初刻入酉正初刻立春立冬日出卯三十二分入申四刻四十八分立夏立秋出寅四刻四十分入酉二刻三十二分小寒大雪日出卯四刻五十分入申三刻三十分清明白露出寅七刻三分入酉一刻十七分大寒小雪出卯四刻十二分入申四刻穀雨處暑出寅五刻五十分入酉二刻三十分雨水霜降出卯二刻三十分入申五刻五十分驚蟄寒露出卯一刻十七分入申七刻三分小滿大暑出寅四刻入酉四刻芒種小暑出寅三刻三十八分入酉四刻五十分大約九月增减一刻此氣朔出没之候也推孤虚夏至日出甲近寅入辛近戌故隂虚而陽孤冬至日出乙近辰入庚近申故陽虚而隂孤明吉凶分至既定昏曉可分時晷既别孤虚可推則吉凶判然矣百刻為日日三十為月月十二為歲此天地之常數歲分二十四氣氣分七十二候坎離震兑為四大卦每爻分一氣為二十四每月一卦每氣三爻則七十二候此中天大卦箕子所陳歸藏于易也是故因八卦以推天時因地支以配天干制為土圭别理地宜以立人極八卦為象數之始天干所以配八卦而地支所以佐十干也故聖人因卦以推時用支以配干而定其方位之次制為土圭之氣以消天地孤虚之氣蓋自上古之世伏羲命大撓氏始立八卦之方而已未有支干也至堯命羲和考中星始用十二辰位周公作指南車有其形而無其方至𤣥禦授赤松子始用卦氣支干分配而成以為神器法以天數二十有五扐一以為體而二十四氣備地數三十去六以為用而二十四位全五行生成二氣對待北一南二東三西四土五中氣奠居中處明河圖五行生成之氣推洛書九宫推移之跡制以水北火南木東金西土中生成化育有定序矣夫天一生水坎者水之位也故子居正北癸得地六之隂水之柔也故癸次於子水不止則流蕩而忘返必土止則能生物丑者土之柔也故丑次於癸艮為山土之剛也故艮次於丑而居東北所以代震之施化故水土合而氣化將以生木也寅為稚木故次寅於艮甲得天三之陽木之剛也故甲次于寅震者木之旺也故卯居正東乙得地八之隂木之柔也故乙次於卯木非土無以盛辰者土之正氣故辰次于乙木者陽之穉也木非旺不能生火故巽為旺木而次於辰旺極必資生所以生火也故巳次于巽丙得天七之陽火之剛也故丙次于巳離者火之位也故午居正南丁得地二之隂火之柔也故丁次于午火旺必有止將以生土也故未次于丁坤者地之體土之正氣也故坤次于未土旺必生金申者金之初氣也故次于坤庚得地九之陽金之剛也故庚次于申兊者金之位也故酉居正西辛得地四之隂金之柔也故辛次于酉金非土無以成戌者土之正氣也故戌次于辛金者金之稚也金不盛不能化故乾為旺金而次于戌旺極而化成所以生水也故亥次于乾壬得天一之陽水之剛也故壬次于亥於是二十四位有定方矣戊己者得天地之中天五地十之氣故中處以為金母金伏天干之戊土而謂制于地支之午火藏于地支之子水謂分金以戊子戊午居子午之中也故土圭之器其體以木其用以金水而化成于水火寄跡于土中其子午之正中既定則天地之正氣可從而知矣其所以丙庚得陽而居隂位者蓋以河圖之數居東北者陽内而隂外居西南者隂内而陽外故壬癸甲乙先生而後成丙丁庚辛先成而後生此之謂也欽天授時堯命羲和欽若昊天厯象日月星辰敬授人時歸竒作閏易曰大衍之數五十其用四十有九虚一以象太極分而為二以象兩儀掛一以象三才揲之以四以象四時歸竒于扐以象閏月五歲再閏故再扐而後掛然則閏法與大衍實相參焉按厯法一歲十二月月三十日此厯法左旋退數也三百六十日一歲之常數也故日與天會而多五日九百四十分日之二百三十五者為氣盈陽舒隂縮蓋自今年冬至數至明年冬至則三百六十五日二百三十五分十忽為一毫十毫為絲十絲為釐十釐為分象數以凡百四十分為一度厯數以百分為一度以朞法三百計之則多了五日零二百三十五分也故日與天會常在朞月之後月與日會而少五日九百四十分日之五百九十二日為朔虚隂舒陽縮蓋自正月朔日數至臘月之晦則三百五十四日零三百四十八分而以朞法計之則少五日零五百九十二分也故月與日會必在一月之晦合氣盈縮虚而閏生焉閏者二歲之樞紐所以歸竒也斗所以建者為中氣日月所在斗指兩辰之間無中氣則置閏故一歲閏率則十日九百四十分日之八百二十七分八百二十七者蓋以日之三百三十五分與月之五百九十二分合而得之也三歲一閏則三十二日九百四十分日之六百一分欲知來年置閏在何月觀今年至後之餘日則可知矣五歲再閏則五十四日九百四十四分日之三百七十五分十有九歲七閏其餘二百有六日九百四十分日之六百七十三分以月法除之恰計七個月日數欠者其小盡者然後氣朔分齊是為一章二十七章為一會三會則為統三統則為元故三年不置閏則差一個月春之一月入于夏而時漸不定子之月入于丑而歲漸不成矣是故聖人制法歸竒於閏者所以體天道定四時正人事也使人作訛成易不失其候析因夷隩各適其宜所以為民者甚至也堯命羲和定厯象授時使民知時變時氣候應而知順天體物之道若東作南訛西成朔易所以順生長收藏之候也春析夏因秋夷冬隩所以順寒暑炎涼之氣也其於順天時適物理莫大焉此足以見天地生物之心聖人體天地之心以為心也世元之交天地之神復也冬春之交一歲之神復也晦朔之交一月之神復也亥子之交一日之神復也呼吸之交一息之神復也圖盡之矣息日之分也日月之分也月歲之分也歲天地之分也觀歲而元世可知矣觀月而至可知矣觀日而晦朔可知矣觀息而亥子可知矣故世元天地之息也冬春歲之息也晦朔月之息也亥子日之息也天地四時日月始終備乎一息孟子曰萬物皆備於我矣雖然晦者朔之根也亥者子之根也吸者呼之根也造化不返其根則愆于陽日月不返其根則愆于度人不返其根則愆于欲愆陽則竭愆度則亂愆欲則危故非世無以為元必世元交而天地不毁矣非冬無以為春必冬春交而歲功不隳矣非晦無以為朔必晦朔交而月精生矣非亥無以為子必亥子交而日神運矣非吸無以為呼必呼吸交而息道存矣然晦朔象也亥子時也呼吸機也晦極則象不可覩非象矣故知朔易而知晦難也亥盡則時不可紀非時矣故知子易而知亥難也吸定則機不可測非機矣故知呼易而知吸難也陽不返於極隂猶為彊陽之必竭動不根於至靜猶為妄動之必凶矧造化無心而人有欲故天之愆恒寡人之愆恒多凡天之愆恒必自人致之蓋火燥而難伏氣强而難柔慮紛而難解耳目引而難返無以自克可乎傳曰克己復禮為仁克逆也逆易數也非至明不知逆非至剛不能逆嗚呼非古之聰明睿知神武而不殺者其孰能與於此哉革之象曰澤中有火革君子以治厯明時四時變化革之大者治厯數者推日月星辰之遷易以明四時之序而於澤中有火言之何也説卦離為火為日兑為澤為水而邵子經世書以兑為月離為星星者日之餘也由是言之則離兑二卦有日月星三辰之象焉故彖曰水火相息水為月火為日日月相推而明生焉水為寒火為暑寒暑相推而歲成焉夫懸象著明莫大乎日月垂象而聖人象之觀周歲日月之行所會為辰辰有十二前代之厯更革不一今據授時厯孟春之月日月會於𤣥枵仲春會于陬訾季春會于降婁孟夏會于大梁仲夏會于實沈季夏會於鶉首孟秋會于鶉火仲秋會于鶉尾季秋會于夀星孟冬㑹于大火仲冬會于析木季冬會于星紀凡十有二辰按月令孟春之月日在營室斗建在寅故寅與亥合仲春之月日在降婁斗建在卯故卯與戌合餘月次第推之今日月行度既有差移建辰不復相合而欲依古候氣造律或者有所不侔矣所次為舎舎二十有八東方蒼龍七宿角氐亢房心尾箕北方𤣥武七宿斗牛女虚危室璧西方白虎七宿奎婁胃昴畢觜參南方朱雀七宿井鬼栁星張翼軫是為二十八宿也所立為度度三百六十有五度四分度之一天本無度因日之行而有度其二十八宿宿度多寡之不同又以日行有淺深東方七宿凡七十五度北方七宿凡九十八度西方七宿凡八十度南方七宿凡百一十二度合之為三百六十五度由是敘之為四時正之為八節建之為十二月分之為二十四氣定之為七十二候朞之為三百六十五日四分日之一而一歲周矣夫易者範圍天地之化而不過者也易有四象以應四時少陽為春太陽為夏少隂為秋太隂為冬易有八卦以應八節立春為艮春分為震立夏為巽夏至為離立秋為坤秋分為兑立冬為乾冬至為坎八卦以應八節卦有十二辟以應十二辰復十一月臨十二月泰正月大壯二月夬三月坤乾四月姤五月遯六月否七月觀八月剝九月十月為十二辟卦八卦二十四爻以應二十四氣辟卦七十二爻以應七十二候交易之卦二十有八以應二十八舍六十四卦三百八十四爻當朞之日以應周天三百六十五度是故履端於始舉正於中歸餘於終合氣朔虚盈而閏生焉傳曰日月運行一寒一暑洪範曰日月之行則有冬有夏冬至日行北陸而寒夏至日行南陸而暑春行西陸秋行東陸而晝夜平温涼均是故馮相氏冬夏致日春秋致月以辨四時之序致日之法樹八尺之杙於地四維四中引八繩以正之夏至影長一尺五寸而日極長冬至影長一丈三尺而日極短極長極短之間相距一丈一尺五寸冬至後日漸長至春分則影減五尺七寸半而晝夜短等又减至夏至而影至一尺五寸夏至後日漸短至秋分則影比夏至而長五尺七寸半而晝夜平又長至冬至而仍得一丈三尺其晷為度如度者歲美人和不如度者歲惡人偽晷進則水晷退則旱進尺二寸則月食退尺二寸則日食日行出黄道外則晷長長則隂勝故水日行入黄道内則晷短短則陽勝故旱進尺二寸則月食者月以十二為數以勢言之宜為月食退尺二寸則為日食者日之數備於十晷進為盈退為縮故為日食致月之法按天文志月有九行黑道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東赤青出陽道白黑出隂道月失節度行出陽道則旱風出隂道則雨雲九行者通黄道而數之也夏時月在黄道南謂之赤道進入黄道北謂之黑道春時月行黄道東謂之青道進入黄道西謂之白道冬時月行黄道北謂之黑道進入黄道南謂之赤道秋時月行黄道西謂之白道進入黄道東謂之青道此皆不得其正故曰出陽道則旱出隂道則雨若得黄道則是其正也鄭康成曰春分日在婁秋分日在角而月弦於牽牛東井亦以其景知氣至不通卦驗云夫八卦氣驗常不在望以八月八日上弦不盡八日下弦候諸卦氣隂氣得正而平以此而言則致月影亦用此日矣謂如春分日在婁則月上弦於東井下弦於牽牛秋分日在角上弦於牽牛下弦於東井蓋春分婁星昏在酉秋分角星昏在酉以是推之而月令中星皆可知矣今春分日在璧秋分日在軫則月弦於參井箕斗之間為不同者歲差然也按授時厯冬至日在箕八度出辰初一刻入申正三刻小寒日在斗十四度出辰初初入申正四大寒日在女初度出卯正四入酉初初立春日在虚五度出卯正三入酉初一雨水日在危十度出卯正二入酉初二驚蟄日在室十一度出卯正一入酉初三春分日在璧八度出卯初四入酉正初清明日在奎十四度出卯初三入酉正一穀雨日在婁十度出夘初二入酉正二立夏日在胃十二度出夘初一入酉正四小滿日在畢一度出寅正四入戌初初芒種日在畢十五度出寅正三入戌初初夏至日在井三度出寅正三入戌初一小暑日在井十八度出寅正四入戌初初大暑日在栁初度出卯初初入酉正四立秋日在星一度出夘初一入酉正三處暑日在張九度出卯初二入酉正二白露日在巽七度出卯初三入酉正一秋分日在軫一度出夘初四入酉正初寒露日在軫十七度出卯正一入酉初三霜降日在亢二度出卯正二入酉初二立冬日在氐七度出卯正三入酉初一小雪日在心初度出辰初初入申正四大雪日在尾十度出辰初一入申正三此晝夜長短刻數也天地之氣周流六合日往則月來寒往則暑來前圖圓方二象中建八卦八卦左右相錯一順一逆隂陽相推一往一來陽為晝為温為熱隂為夜為涼為寒晝夜相感而萬物生寒暑相代而四時成是故五日謂之候三候謂之氣六氣謂之時四時謂之歲一歲二十四氣故八卦二十四爻爻直一氣下體八卦為貞上體八卦為晦其爻初與四為應二與五為應三與上為應冬至始於復之初九震下坤上一陽動於重隂之下隂盛而陽微以前後十分約之一陽而九隂以前後各二氣併看之始冬至則兼小雪大雪小寒大寒併本位凡五氣共十爻約之餘氣同故長夜短晝天氣至是而極寒六二六三爻應皆隂小寒大寒隂沍重極而春氣應立春始於賁之初九離下艮上以前後十分約之三陽而七隂故氣漸温六二九三雨水驚蟄春分中於節之初九兑下坎上隂陽均齊以前後十分約之五陽而五隂天氣至是而和煦晝夜平分九二六三清明榖雨積温生熱而夏氣應立夏起於小畜之初九乾下巽上以前後十分約之七陽而三隂氣候向暑九二九三小滿芒種天氣盛熱夏至至於姤之初六巽下乾上一陽生於重陽之下陽多隂少以前後十分約之一隂而九陽故長晝短夜天氣至是而大熱九二九三爻應皆剛小暑大暑熱盛鬱變而秋氣應立秋起於困之初六坎下兑上以前後十分約之三隂而七陽天氣漸涼九二六三處暑白露秋分終於旅之初六艮下離上剛柔中分以前後十分約之五隂而五陽天氣至是而清涼晝夜平分六二九三寒露霜降積涼生寒而冬氣應立冬起於豫之初六坤下震上以前後十分約之七隂而三陽天氣向寒六二六三小雪大雪隂氣盛極而一陽復生于下如環無端周而復始由是八卦相盪一貞而八晦八八六十四卦圜轉周流而天度畢矣六十四卦圓圖見内篇按復姤節旅賁小畜困豫在八卦宫變皆為一世之卦復姤當二至乾坤以初爻變節旅當二初坎離以初爻變也賁當立春艮以初爻變也小畜當立夏巽以初爻變也困當立秋兑以初爻變也豫當立冬震以初爻變也二至二分以乾坤坎離者四正不易之卦也四立以艮巽兑震變者四隅反易之卦也又易中惟此八卦初與四隂陽相應而二五三六爻皆不應是以歲有二十四氣而節僅止於八也日一日一周天而比天為不及一度一歲之積恰與天會故日有三道者黄道也北至東井去極近南至牽牛去極逺東至角西至婁去極中道中道南道北道為三道也蓋極南至於牽牛則為冬至晝四十刻夜六十刻極北至於東井則為夏至晝六十刻夜四十刻南北極中東至角西至婁則為春分秋分晝夜各五十刻凡天行之分正月雨水中氣后一日躔亥娵訾之次其應甲丙庚壬二月春分中氣后二日躔戌降婁之次其應艮巽坤乾三月穀雨中氣后五日躔酉大梁之次其應乙辛丁癸四月小滿中氣后六日躔申實沈之次其應甲丙庚壬五月夏至中氣后五日躔未鶉首之次其應乾坤艮巽六月大暑中氣后四日躔午鶉火之次其應辛丁乙癸七月處暑中氣后五日躔巳鶉尾之次其應庚丙甲壬八月秋分中氣后八日躔辰夀星之次其應乾坤艮巽九月霜降中氣后九日躔卯大火之次其應辛丁乙癸十月小雪中氣后七日躔寅析木之次其應丙庚甲壬十一月冬至中氣后四日躔丑星紀之次其應艮巽坤乾十二月大寒中氣后六日躔子𤣥枵之次其應乙丁辛癸以上總敘日躔度月無光麗日而明以不明之體言之則純隂而象坤晦朔之時也越三日不及日三十七度强而生明始資日之光而有光因謂之朏陽之初生也昏見于庚震之象也故震納庚越八日不及日九十八度强而資日之半明因謂之上弦謂陽之將半也昏見于丁兌之象也故兑納丁越十五日不及日一百八十二度半强與日對望資日之全明而大圓因謂之望言三陽備見也昏見於甲乾之象也故乾納甲又三日不及日一百九十五度强而生魄與日之望偏而隂魄始生因謂之魄言隂復生也晨見于辛巽之象也故巽納辛又五日不及日八十一度强而半晦明資日之明用謂之下弦言隂生至半也晨見于丙艮之象也故艮納丙又六日去日之四百九十分而不及盡三百六十五度四分度之一而與日交會日之明全不能相資復晦而不明因謂之晦盡没于乙坤之象也故坤納乙其行天之度一日之行得三百五十二度八百二十八分六釐在日而不及十二度十九分度之一在天而不及十三度十九分度之七積二十九日九百四十分日之四百九十九而與日合會於辰次之所是為一月十二會得三百五十四日九百四十九分日之三百四十八分而與天會是為一歲也以上總敘月之晦望乾坤坎離陽也震艮兌巽隂也甲乙壬癸𨽻于陽而陽中四枝繫焉丙丁辛庚𨽻于隂而隂中四枝同焉此言納干配支之法也乾陽體也居于九宫卦陽而數竒也甲得天三之陽天干陽首乾稱乎父故納干于甲坤隂體也居于一宫卦隂而數偶也乙得地八之隂天于隂首坤稱乎母故納干于乙此乾坤父母納干于東以東也者生物之地也故乾坤秉其權焉艮陽稚也居于六宫卦陽而數偶也丙得天七之陽艮為少男故納干于丙此乾卦之第一變也兑隂稚也居于四宫卦隂而數偶也丁得地二之隂兌為少女故納干于丁此坤卦之第一變也夫少男少女納干于南以南也者化物之地故艮兑司其化焉震陽長男也居于八宫卦陽而數偶也庚得天九之陽震為長男故納干于庚此乾卦之再變也巽隂長女也居于二宫卦隂而數偶也辛得地四之隂巽為長女故納干于卒此坤卦之再變也夫長子長女納干于西以西者成物之地故震巽專其令焉離隂用也居于三宫卦隂而數竒也壬得天一之陽離為中女故納干于壬此乾卦之四變也坎陽用也居于七宫卦陽而數竒也癸得地六之隂坎為中男故納干于癸此坤卦之四變也夫中男中女納干于北以北者藏物之地故坎離司其任焉戊己得天五地十之成數為天地之中氣故處中而尊居皇極無可配納化成于四季之氣而致養于坤以坤者真土也火金之交也故附麗焉蓋其隂陽以數相從孤旺則以卦而定至若地支十有二辰納甲之法則四行分配而附麗于四正之宫坎以水體申子辰水之垣也故納坎從水離以火體寅午戌火之垣也故納離從火兑以金體巳酉丑金之垣也故納兑從金震以木體亥卯未木之垣也故納震從木此陽支從陽干隂支從隂干也於是五氣生成隂陽翕合聖人因其至理而消息以為妙用使天陽地隂一闢一闔一造一化生成無方其機微矣以上總叙卦宫干支配屬因卦爻以明天時生成起滅之機歲有四時春夏秋冬時有三月而仲為正四時有十二月月有三十日三五為一氣氣分為二候歲分二十四氣氣分七十二候以二十四氣𨽻合七十二候以行天氣也日有十幹辰有十二支日有十二時時有五刻天之晝夜以日之出入為分人之晝夜以天之昏明為節以百刻而分之故極短不過四十極長不過六十短長之中各五十刻所定分至别時晷推孤虚明吉凶也夏至日出申近寅入辛近戌故隂虚而陽孤冬至日出卯近辰入庚近申故陽虚而隂孤分至既定昏曉既分時晷既别孤虚可推吉凶判然矣以上總敘四時十二月二十四氣七十二候聖人因八卦以推天時用地支以配天干制為土圭别理地宜以立人極八卦為象數之始天干所以輔八卦地支所以佐十干也故聖人因卦以推時用支以配干而定方位之次制為土圭之器以消息天地孤虚之氣法以天數二十有五扐一以為體而二十四氣備地數三十去六以為用而二十四位全五行生成二氣對待北一南二東三西四中五冲氣尊居中處以明河圖五行生成之氣推洛書九宫推移之迹以水北火南木東金西土中生成化育有定序矣夫天以一生水坎者水之位也故居正北癸得地六之隂水之柔也故癸次于坎水不止則流蕩而忘返必土以止之則能生物丑者土之柔也故丑次于癸艮為山土之剛也故艮次于丑而居東北所以代震之施化也水土合而氣化將以生木寅為稚木故次於艮甲得天三之陽木之剛也故甲次于寅震者木之旺也故卯居正東乙得地八之隂木之柔也故乙次于卯木非土無以盛辰者土之正氣也故辰次于乙巽者陽之稚也木非旺不能生火故巽為旺木而次于辰旺極必資生所以生火也故巳次于巽丙得天七之陽火之剛也故丙次於已離者火之位也故午居正南丁得地二之隂火之柔故丁次于午火旺必有止將以生土也故未次於丁坤者地之體土之正氣也故坤次于未土旺必生金申者金之初氣也故申次于坤庚得天九之隂金之剛也故庚次于申兑者金位也故酉居正西辛得地四之隂金之柔也故辛次于酉金非土無以成戌者土之正氣也故戌次於辛金者隂之稚也金不盛不能化故乾為旺金而次於戌旺極而化成所以生水也故亥次于乾壬得天一之陽水之剛也故壬次于亥於是二十四位有定方矣戊己得天地之中天五地十之氣故中處以為金母金伏于天干之戊土制於地支之午火藏于地支之子水謂分金以戊子戊午居子午之中也故土圭之器其體以木其用以金而化成於水火寄跡於土中其子午之中正既定則天地之正氣從可知矣其以丙庚得陽數而居隂位乙癸得隂數而居陽位者蓋以河圖之數居東北者陽内而隂外居西南者隂内而陽外故壬癸甲乙先生而後成丙丁庚辛先成而後生此之謂也其分金之法則以甲丙戊庚壬分𨽻於子寅辰午申戌之位乙丁己辛癸分𨽻于丑卯巳未酉亥之位倍而重之則為首二十分金其所以𨽻生旺休囚則月一例其歸藏大卦所用除却坎離震兑為本卦不用每值戊己位為本月之卦以次行之則甲子配頥丙子得中孚戊子得復庚子得屯壬子得謙此子癸宫之分金卦也乙丑得暌丁丑得升己丑得臨辛丑得小過癸丑得蒙此丑艮宫之分金卦也甲寅得益丙寅得漸戊寅得泰庚寅得需壬寅得隨此寅甲宫之分金卦也乙卯得晉丁夘得解己卯得大壯辛卯得豫癸夘得訟此夘乙宫之分金卦也甲辰得蠱丙寅得革戊辰得夬庚辰得旅壬辰得師此壬巽宫之分金卦也乙巳得比丁巳得小畜己巳得乾辛巳得大有癸巳得家人此己丙宫之分金卦也甲午得井丙午得咸戊午得姤庚午得鼎壬午得豐此午丁宫之分金卦也乙未得渙丁未得履己未得遯辛未得恒癸未得節此未坤宫之分金卦也甲申得同人丙申得損戊申得否庚申得巽壬申得萃此申庚宫之分金卦也乙酉得大畜丁酉得賁己酉得觀辛酉得歸妹癸酉得无妄此酉辛宫之分金卦也甲戌得明夷丙戌得困戊戌得剝庚戌得艮壬戌得既濟此戌乾宫之分金也乙亥得噬嗑丁亥得大過己亥得坤辛亥得未濟癸亥得蹇此亥壬宫之分金卦也於是一氣甲子二氣甲戌三氣甲申四氣甲午五氣甲辰六氣甲寅隨天而左旋一元甲子二元丙子三元戊子四元庚子五元壬子隨地而右轉聖人所以理别地宜以立人紀實在於此至其所以為用者則又不過四正八國之氣四正者坎離震兑乾坤艮巽甲庚丙壬乙辛丁癸寅申巳亥辰戌丑未是也八國者乾甲丁坤壬乙艮丙辛巽庚癸坎申辰離寅戌震亥未兑巳丑是也以上總敘卦數方位支干分屬二十八宿之經有盈有縮周布於三百六十五度四分度之一本皆不移附天而行是為天之常經也其星土之分則角亢為鄭氐房心為宋尾箕為燕斗為吳牛女為越虚危為齊室璧為衛奎婁為魯胃昴畢為趙觜參為魏井鬼為秦栁星為周翼軫為楚角亢星曰夀星宫曰天秤時曰辰州曰兖氐房心星曰大火宫曰天蝎時曰夘州曰豫尾箕星曰析木宫曰人馬時曰寅州曰幽斗牛星曰星紀宫曰磨蝎時曰丑州曰揚女虚危星曰𤣥枵宫曰寳瓶時曰子州曰青室璧星曰娵訾宫曰雙魚時曰亥州曰并奎婁星曰降婁宫曰白羊時曰戌州曰徐胃昴畢星曰大梁宫曰金牛時曰酉州曰冀觜參星曰實沈宫曰隂陽時曰申州曰益井鬼星曰鶉首宫曰巨蟹時曰未州曰雍栁星張星曰鶉火宫曰獅子時曰午州曰梁翼軫星曰鶉首宫曰雙女時曰巳州曰荆以上總敘十二宫二十八宿分屬易有太極凡兩儀四象八卦皆太極之生生也豈兩儀四象八卦外别有五行哉太極一也兩儀即太極之判為隂陽四象即太極之判為太陽太隂少陽少隂是也陽生于隂則為水木即陽氣之成其質者隂生于陽則為火金即隂氣之成其質者土乃隂陽之冲氣也是五行特兩儀四象之别名耳凡天干地支六十甲子五運六氣所以行四時生百物孰非五行之變化亦孰非太極之統體哉夫干之名十甲乙丙丁戊己庚辛壬癸也干十而干之氣五木火土金水也五而十之分隂分陽也干之氣屬於天而行於地各有所居之位而謂之支干者榦也支者枝也言榦之所由分也故干生於河圖之十數支亦生於河圖之十數干之數十而支之數十二者土無專位分寓於四德之中也干生於十數者謂壬生於一癸生於六丙生於七丁生於二戊生於五己生於十甲生於三乙生於八辛生於四庚生於九支亦生於十者謂子生於乙亥生於六寅生於三卯生於八丑生於十辰生於五巳生於二午生於七酉生於四申生於九未生於丁戌生於五也卦寓於理理生乎數數本乎氣若圖所以極數之出入者也若數所以窮氣之始終者也若卦所以著理之變動者也非達性命之原者未可以語此夫八卦之横布者乾一兑二離三震四巽五坎六艮七坤八以相生之序推之則土為五行之祖而居中故居先由中而出於北故坎次之由北而之東故巽震次之水生木也由東而之南故離次之木生火也離有坤土轉生西北之乾兑火生土土生金也隂陽五行八卦隂陽五行氣而已矣雖各一其名義各一其象數各一其方位而一氣周流變動本無端倪然隂陽五行自不可亂猶定盤之針雖盤隨方位轉移而針之指南者不易也于此了然洞徹胸中有活子焉則支干卦爻隨其布列造化由之以斡旋矣諸術家各執一説確信不疑固未免膠柱刻舟捫盂以為見也又有會通諸術凡古人畫一圖創一説者皆兼收以統其全殆如萃盤示兒色色具備欲嬰兒盡取之以為終身福慶之驗也有是理哉彼天陽而地隂也日陽而月隂也春夏陽而秋冬隂東南陽而西北隂也然晝則天地皆屬陽夜則天地皆屬隂春夏則天地日月皆陽秋冬則天地日月皆隂東南則四時皆陽西北四時皆隂譬手焉左陽右隂不可易也而左右仰皆陽覆皆隂仰覆熱皆陽寒皆隂隂陽惡可執一論耶然卒不可以左為隂右為陽在人雖男女皆有隂陽卒不可以女為陽男為隂也明矣是故天干陽也地支隂也甲丙戊庚壬非干之陽乙丁己辛癸非干之隂乎子寅辰午申戌非支之陽丑夘巳未酉亥非支之隂乎所以論干支之分不過甲陽乙隂子陽丑隂如律吕陽宣隂助之義耳然有謂甲乙壬癸子寅午申俱陽丙丁庚辛丑夘巳未酉亥俱隂執此為净隂凈陽何歟八卦乾兑離震為陽巽坎艮坤為隂言先天也乾坎艮震為陽巽離坤兑為隂言後天也論凈隂陽者又以乾坤坎離為陽艮巽震兑為隂何歟若夫五行則亥壬子癸為北方水寅甲夘乙巽為東方木巳丙午丁為南方火申庚酉辛乾為西方金辰戌丑未與辰坤為四隅之土而戊己土則本乎中央此以後天卦位與洛書之數言也然有謂震庚亥未巽辛木乾甲兑丁巳丑金坎癸申辰水離壬寅戌火坤乙艮丙土者有謂甲寅辰巽戌坎坤辛水震艮巳木離壬丙乙火兑乾丁亥金丑癸坤庚土者又有以十二宫分列七政如子丑二宫土者又有以二十八禽星各方七宿分列七政如角木蛟亢金龍者始就數家舉土一端言之戊己之土屬中央矣而辰戌丑未在乎四隅子丑則偏乎正北艮坤則偏乎西南西北氐女胃栁則在乎子午卯酉之位納甲則又在乎坎離之中况乙丙庚癸各偏東西南北之左以六十分金言之九方皆有土也將以何者為定向何者為定在乎即一土而水火金木可例觀矣且又以邵子先天圓圖焦氏卦氣直日圖河圖洛書之位數悉兼取之以分金配卦據此推測節候氣數猶可説也一一而按之為定位也不亦謬哉殊不知先天以氣言後天以位言干主天之氣支主地之位此合體用動靜而分之可也其實八卦重為六十四卦而天地之變化管是矣不必益以支干而後全十二支干排為六十甲子而天地之氣運管是矣不必增以卦爻而後備今若論其定位只十二辰足矣乃補之以天支而存戊己於中央則土一也而有干支方位之别其説巳舛至子午夘酉之四位即疉以坎離震兑之四卦而乾西北坤西南艮東北巽東南畫地而守各專一隅是乾坤二卦果于二十四位各守一隅之微而已哉乾坤定上下之位本不可以南北分不可以西北西南拘而分列于戌亥未申之間繆亦甚矣至謂乾坤老亢故從而退之居不用之位是必逃乎六合之外而後可也術家雖有是説寜容以無辨哉經曰初一日五行五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土曰稼穡傳曰田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直説曰木東方也於易地上之木為觀其於王事威儀容貌亦可觀也故行步有佩玉之度登車有和鸞之節田獸有三驅之制飲食有獻享之禮出入有名使民以時務在勸農桑謀在安百姓如此則木得其性矣若乃田獵馳騁不反宫室飲食沈湎不顧法度妄興徭役以奪民時作為姦詐以傷民財則木失其性也蓋工匠之為輪矢者多傷敗及木為變怪是為木不曲直傳曰棄法律逐功臣殺太子以妾為妻則火不炎上説曰火南方揚光輝為明者也其於王者南嚮明而治書云知人則哲能官人故堯舜舉羣賢而命之朝逺四佞而放諸埜孔子曰浸潤之譖膚受之愬不行焉可謂明矣賢佞分别官人有序率由舊章敬重功勲殊别嫡庶如此則火得其性矣若乃信道不篤或耀虚偽讒夫昌邪勝正則火失其性矣自上而降及濫炎妄起焚宗廟燒宫舘雖興師衆不能救也是為火不炎上傳曰修宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成説曰土中央生萬物者也其於王者為内事宮室夫婦親屬亦相生者也古者天子諸侯宫廟大小高卑有制后夫人勝妾多少有度九族親疎長幼有序孔子曰禮與其奢也寧儉故禹卑宫室文王刑于寡妻此聖人之所以昭教化也如此則土得其性矣乃若奢淫驕慢則土失其性亡水旱之灾而草木百穀不熟是謂稼穡不成傳曰好戰攻輕百姓飾城郭侵邊疆則金不從革説曰金西方萬物既成殺戮之類也故立秋而鷹隼擊秋分而微霜降其於王事出入行纛揚旌仗鉞誓士衆抗威武所以征叛逆止暴亂也詩云有䖍秉鉞如火烈烈又曰載戢干戈載櫜弓矢動静應宜悦以犯難人忘其死金得其性矣若乃貪慾恣睢務立威勝不重人命則金失其性蓋工冶鑄金銕冰滯涸堅不成者衆乃為變怪是謂金不從革傳曰簡宗廟不禱祀廢祭祀逆天時則水不潤下説曰水北方終藏萬物者也其於人道命終而形藏精神放越聖人為之宗廟以收其魂氣春秋祭祀以終孝道王者即位必郊祀天地禱祈神祗望秩山川懐柔百神亡不宗祀慎其齋戒致其嚴敬鬼神歆饗多獲福助此聖王所以順事隂氣和神人也至發號施令亦奉天時十二月咸得其氣則隂陽調而終始成如此則水得其性矣若乃不敬鬼神政令逆時則水失其性霧水暴出百川逆溢壊鄉邑溺人民及淫雨傷稼穡是為水不潤下京房易傳曰顓事有知誅罰絶理厥灾水其水也雨殺以隕霜大風天黄饑而不損兹謂泰厥灾水水殺人辟遏有德兹謂狂厥灾水水流殺人已水則地生蟲歸獄不改解兹謂追非厥水寒殺人追誅不解兹謂不理厥水五穀不收大敗不解兹謂皆隂解舍也王者於是必誅首惡赦其衆不則皆函隂氣厥水流入國邑隕霜殺榖周子曰五行之序以質之所生而言則水本是陽之濕氣以其初動為隂所陷而乃不得遂故水隂勝火本是隂之燥氣以其初動為陽所揜而不得達故火陽勝蓋生之者微成之者盛生之者形之始成之者形之終也然各以偏盛也故雖有形而未成質以氣升降土不得而制焉木則陽之濕氣浸多以感於隂而舒故發而為木其質柔其性暖金則隂之燥氣浸多以感於陽而縮故結而為金其質剛其性寒土則隂陽之氣各盛相交相搏凝而成質以氣之行而言則一隂一陽往來相代木火金水土者各就其中而分老少耳故其序各由少而老土則分旺四季而位居中者也此五者序若參差而造化所以為發育之具實並行而不相悖蓋質則隂陽交錯凝合而成氣則隂陽兩端循環不已質曰水火木金蓋以隂陽相間言猶曰東西南北所謂對待者也氣曰木火金水蓋以隂陽相因言猶曰東西南北所謂流行者也質雖一定而不易氣則變化而無窮所謂易也程子曰動靜者隂陽之本也五氣之運則參差不齊矣或曰五行一氣其本一物耳曰五物也五物備然後生猶五常一道也無五則亦無道然而既曰五矣則不可混而為一也朱子曰氣之精英者為神金木水火土非神所以為金木水火土者是神在人則為理所以為仁義禮智信者是也問以質而語其生之序不是相生否只是陽變而助隂故生水隂合而陽盛故生火木金各從其類故在左右曰水隂根陽火陽根隂錯綜而生其端是天一生水地二生火天三生木地四生金到得運行處便水生木木生火火生土土生金金又生水水又生木循環相生又如甲乙丙丁戊己庚辛壬癸都是這箇物事也隂陽播而為五行五行中各有隂陽甲乙木丙丁火春屬木夏屬火年月日時無時非五行之行甲乙丙丁又屬隂屬陽只是二五之氣人之生適遇其氣有得清者有得濁者貴賤夀夭皆然故有參差不齊如此李氏希濂曰近見勉齋黄氏論五行多所未解其曰生之序便是行之序而以太極圖解氣質之説為不然以洪範五行一曰二曰為非有次第但言其得數之多寡以夏行繼以秋為火能生金惟其能生是以能剋夫五行一也而以為有生與行之異則誠若近於支離者然天地之間未有不以兩而化成者也以二氣言則互為其根者氣也分隂分陽者質也以五行言則有形體而分峙於昭昭之間者其質也無形體而黙運於㝠㝠之表者其氣也夫豈混然而無别哉故就質而原其生出之由雖水火以隂陽之盛而居先木金以隂陽之穉而居後此質之序然也就氣而探其運行之常則木火以陽而居先金水以隂而而居後此氣之序然也質雖以氣而成然其體一定而不可易氣雖行乎質之内而其用則循環而不可窮二者相次以成造化今必混而一之則是天地之間不過輪一死局而無經緯錯綜之妙其為造化亦淺矣其一也五行之生同出隂陽有則俱有誠若不可以次第言然水火者隂陽變合之初氣之至精且盛者也故為五行之先水隂而根于陽火陽而根於隂故水又為火之先也有水火而木金生焉木華而疏金實而固故木金次水火而木又為金之先也土則四者之所成終而成始也故次五焉易大𫝊自天一至地十以為五位相得而各有合正指五行生成之數而言按之河圖可見而洪範五行亦以是為次此河圖洛書所以相為經緯也今則削其次第而但以得多寡為説則是以五行之質水木皆陽之所為而無與乎隂火金皆隂之所為而無與乎陽既乖生成之序復戾變合之㫖所謂五行一隂陽者皆為虚語矣然勉齋亦云初只是一箇水水暖後便是火此兩箇是母木是水之子金是火之子是四者之序亦未嘗無但所謂水暖後便是火與金是火之子亦未詳其義而恐其未安耳按水暖是火蓋取既生魄陽曰魂之意但二者恐自不同此其一也若火生金之説則尤不可曉若以相生為序則曰木火土金水若以相剋為序則當曰水火金木土未有其四以生相受而其一獨以剋相生也禮運曰播五行於四時周子亦曰五氣順布四時行焉是四時之内固備五行之氣也惟土無定位寄在於四季辰未戌丑之月土之所旺也土旺則皆可以生金矣然辰未陽也戌丑隂也陽則生隂則成辰未固為陽也春水之氣盛則土為之傷夏火之氣盛則土為之息故季夏本生旺之月而又加之以火則為尤旺故能生金而為秋此其相生之序豈不瞭然甚明也哉按五行家金生於巳蓋辰之所生也但孕育方微必至季夏然後成體而為壯耳今但見夏之後便繼以秋思而不得其説遽㫁之曰火能生金竊恐其為疎矣月令以中央土繼於季夏之後素問於四時之外以長夏屬土皆是此意與十干之序脗合自炎黄以及于今未之有改周子朱子蓋皆取之今一旦創生孤論以行其獨見愚恐其不合乎造化本然之體也或問氣行於天質具於地則是有氣便有是質氣如是質便如是以氣而語其行之序則木火土金水以質而言其生之序則水火木金土氣之序如此質之序如此潛室陳氏曰五行始生謂太極流行之後自氣而成質自柔而成剛水最柔故居一火差剛故居次至木至金至土則浸堅剛故洪範與易言所生之序皆如此氣則成四時之序即五行之序也蔡氏曰五行在天則為五氣雨暘燠寒風也在地則為五質水火木金土也天之五氣雨暘質也地之五質水火氣也天交於地而雨𤾉為質地交於天而水火為氣二變為三不變者二得隂陽之正而三得隂陽之雜也故二能變而三不能變也五行二氣之分也二氣交感絪緼雜揉開闢動盪相生則水木火土金相剋則水火金木土出入幽明千變萬化四時之運生剋著焉自隂而陽也順自陽而隂也逆木之盛也水實生之金之成也火實制之水之潤下火之炎上木之曲直其德以順而成金之從革其德因制而成自然之理也順而生者易知逆而克者難見曰伏焉厯書曰庚伏曰伐焉律書曰罰伐土居其中因時致旺四序成功而無成名稱焉其至德矣夫月令増置土行雖曰中央土然繫於夏月之後是以土生於火矣三季皆一行而夏之三月獨二行也近代以一朞之日而五分之行各七十有二日以辰戊丑未為土季旺之月之方似矣然猶未免刻舟之固豈知語造化之微也哉金木水火土五精之總也寒熱風燥濕五氣之聚也水以潤之火以熯之土以溽之木以敷之金以斂之此其以性言也水之冽也火之炎也木之温也金之清也土之蒸也此其以氣言也水在下火在上土在中木在右金在左此其以位言也水之平也火之銳也土之圜也木之曲直也金之方也此其以形言也水則流火則革土則化木則變金則從革此其以才言也水井洫也火釁冶也木金器械也土爰稼穡也此其以事言也然則冬屬水而一陽生於冬夏屬火而一隂生於夏水生於北方隂位而陽已動火生於南方陽位而隂已形此水火之所以互根也春水秋金皆非隂陽始生之月故木生於陽之方陽金生於隂之方隂而隂陽無所生此金木之所以不互根也是五行之相生而尅相尅而生又非其變化無窮者乎五行氣質太極者二氣之統體五行者二氣之參差是五行也質根于地氣運于天天地合而絪緼雜揉參差不齊根隂根陽固循環之無端分隂分陽實一定之不易所以自氣成質木金隂陽之穉也水火隂陽之盛也土則隂陽之和也隂陽雖並行而不悖氣質本相須而不離雖以氣而語其行之序以質而語其生之序古人論之詳矣實有不盡然者何也仰而觀之日月懸象天豈專於氣而無其質乎俯而察之水火互藏地豈専於質而遺其氣乎水生成于天地之一六火生成于地天之二七木生成于天地之三八金生成于地天之四九土生成于天地之五十生之者氣也成之者質也氣質何可離也故語其相生也氣之流行木温火熱金涼水寒而土冲也然温必變熱熱必變冲冲必變涼涼必變寒寒復變而為温此其生生自有不容己者語其相尅也寒氣至則熱氣消熱氣至則涼氣消涼氣至則温氣消温氣至則冲氣消冲氣至則寒氣消此殆不可專以氣質論也若其變化則又非一端順而言之甲乙木東丙丁火南戊己土中庚辛金西壬癸水北此五行之正也錯而言之甲已土乙庚金丙辛水丁壬木戊癸火孰非二氣之更革乎至於土得水則柔得火則剛金得火則流得水則止木得水則長得火則消火得木則生得水則死水得金則寒得火則煖五行參錯果可以一定拘之否也故雨陽寒燠風言其氣潤燥溽敷斂言其性上下左右中言其位宫商角徵羽言其聲青黄赤白黑言其色尖圓方直曲言其象辛酸醎苦甘言其味一二三四五言其數春夏秋冬言其時東西南北言其方其常五其變不可勝計而天地萬物何一非五行之運用哉但千變萬化其中亦自有不可易者水本沈也藴而為五精火本炎也達而為五氣木本茂也華而為五色金本堅也擊而為五聲土本和也滋而為五味物固不專夫五而亦不離夫五而二氣之運行其參差不齊有如此亦孰非太極之統體也雖然氣之與質固不相離而水火以氣用也木金以質用也惟其以質用也故木金之分不可使之合而合則不可使之分拘于質也若水火則即其一而分之萬焉不見其有異同即其萬而合之一焉不見其有彼此由其以氣用耳所以水自金生而水盛則金沈火自木生而火盛則木消其實皆本之土旺四季尤為氣質之冲也論五行者必會而通之斯可矣况書齊七政撫五辰大要在乎裁成天地之道輔相天地之宜也而洪範九疇莫非五行之用要以攸敘乎彛倫此五行所以為甚切也惡可視為䜟緯術數之學而莫之究心哉問五行相生之理曰氣之流行温屬水熱屬火冲氣屬土涼屬金寒屬水氣温便須變熱熱便變冲冲便變涼涼便變寒寒又變温此五行生生自然之序其不盡然于交錯之變也問相克曰寒氣至則熱氣消熱氣至則涼氣消涼氣至則温氣消温氣至則冲氣消冲氣至則寒氣消此五行相克自然之理非獨以其形質言也問五行化氣曰順而言之甲乙木東丙丁火南戊己土中庚辛金西壬癸水北此五行正氣相生之序也錯而言之甲已土乙庚金丙辛水丁壬水戊癸火此天地更革之氣其為相生之序一也千變萬化不出一隂一陽之道五行之質根於地而其氣則運於天根於地者隨用而不窮運於天者參錯以成化此理之可推者也七政之齊書于舜典五辰之撫著在臯謨孟子亦有天時之説其來逺矣窮其本末不出乎隂陽兩端夫有氣斯有神有象斯有數變化紛紜胡可勝紀然太極之妙無乎不在其流為䜟緯術數之學者良由昧於至理而溺於偏見耳高明之士固宜知所决擇如洪範五行傳之類牽合附會誠無足取或乃并與其所當信者而不之信至欲一例破除將無矯枉過正已乎五行間色五行之理有相生者有相克者相生為正色相克為間色正色青赤黄白黑也間色綠紅碧紫流黄也水生木木色青故青者東方也木生火其色赤故赤者南方也火生土其色黄故黄者中央也土生金其色白故白者西方也金生水其色黑故黑者北方也此五行之正色也甲已合而為綠則綠者青黄之雜以木克土故也乙庚合而為碧則碧者青白之雜以金克木故也丁壬合而為紫則紫者赤黑之雜以水克火故也戊癸合而為流黄則流黄者黄黑之雜以水克土故也此五行之間色也流黄一作騮黄五行五物鑽燧改火四時而五物焉朱子謂夏火大盛故再取此意料之言耳先王取火法五行也春行為木榆栁色青以象木也木生火夏行為火棗杏色赤以象火也火生土季夏行為土桑柘色黄以象土也土生金秋行為金槐檀色白以象金也金生水冬行為水柞楢色𤣥以象水也四時平分而夏乃有二焉何也土位在中宫而寄王于四時季夏者土之中位故月令于仲夏之後列中央土素問謂之長夏是其説也統之則為四時分之則為五行五行各七十二日土分王於四時之末各分十八日合之亦七十二日總五行之七十二日合三百六十而成一歲也五行總論五行之論固見於箕子洪範實兆於河圖洛書之位數焉蓋其見象於天也為五行分位於地也為五方行於四時也為五德稟於人也為五常播於律吕為五音發於文章為五色易曰五位史曰五材志曰五物醫曰五運其該曷既哉但相生則水木火土金相克則水火金木土五者各有定質而氣則生於其質矣以相生言之亦謂其氣之相質而生生不害焉耳非謂木出於水土出於火也一歲之間水生木木生火火生土土生金金又生水此固序之一定者而夏火不能生秋金故易之革卦上兑下離其卦辭曰革巳日乃孚二爻辭曰巳日乃革之巳土之義素問於四時獨以長夏屬土亦此意也可見四季雖曰皆屬乎土然丑未陽也辰戌隂也丑月木盛傷土惟未月火盛生土故季夏之土為獨盛焉此其相生固然而相克之義何居蓋木火金水各旺於四時而土為冲氣則於四時無不在也秋金勁疾固所當制而夏火未退未免制伏太過故得季夏之土調和于中於以洩火之盛養金之微此金之所以不害於火也厯書所謂夏至三庚之後逢庚而三伏者以金之畏火也律書所謂由未而申比至於罰者言火之伐金也則其所謂克之之義不即此而在乎况生之克之循環不息固非以克為生亦非生而不克陽雖生於仲冬而實盛於春夏隂雖生於仲夏而實盛於秋冬故自隂而陽則順木之成也水實生之自陽而隂則逆金之成也火實克之孔子以治厯明時取諸革又曰天地革而四時成此之謂也五行之成克變化無端不可測識惡可執一以論之哉五行總論余聞太史公厯書已謂黄農建立五行起五部矣高辛命勾芒祝融蓐收𤣥㝠后土為五正則治之者有專職伯禹列水火木金土與穀為六府則修之者有常政箕子謂鯀陻洪水汩陳其五行而演九疇初一曰五行水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡視禹所敘加備矣自是而後有以五行分屬天地者矣如天一生水地六成之地二生火天七成之天三生木地八成之天四生金地九成之天五生土地十成之是已有以五行分屬星緯者矣如歲星為木熒惑為火鎮星為土太白為金辰星為水是已有以五行分屬支干者矣如甲乙寅夘木丙丁巳午火戊己辰戌丑未土庚辛申酉金壬癸亥子水是巳有以五行分屬四時者矣如春屬木夏屬火秋屬金冬屬水是已有以五行分屬四方者矣如東方屬木南方屬火中央屬土西方屬金北方屬水是已有以五行分屬五常者矣如仁為木禮為火信為土義為金智為水是已有以五行分屬五臟者矣如肝為木心為火脾為土肺為金腎為水是巳其他萬事萬物莫不各以五行分配然要之凡言五行者有二端曰木火土金水者以造化氣序之流行者而言也曰水火木金土者以萬物生成之次第而言也何以明之五行之生也由微而著水質微故居先火漸著故次之然二物猶氣爾流動閃爍體虚而形未定者也至于木則著而實矣金則實而固矣故次於水火若土則該其全體故又次於木金此其生出之有序如此也則其本數只是一二三四五而已其六七八九十者無乃為無用之物矣乎蓋造化之理一物兩體一二三四五者乃其生數之正六七八九十者乃其生數之副生者即所成之端倪成者即所生之結果如一變生水但以一隔五則成六故曰六化成之其實則一之一也二化生火但以二隔五則成七故曰七變成之其實則二之一也餘皆倣此非既生之後必待五行具足而始有以成之也以此又見五行之生不離中五之土以成形質是故水得土則源泉以出故一對五而成六也火得土而歸宿有方故二對五而成七也木得土則培植以厚故三對五而成八也金得土則滋凝以固故四對五而成九也土而得土則積厚累博故五又得五而成十也是以自其相生者言之則水生木木生火火生土土生金金又生水自其相克者言之則水克火火克金金克木木克土土又克水蓋造化不可無生然一於生則無繇而裁制亦不可無剋然一於克則亡繇而發育故相生者嗣續以不窮而相克者亦循環而不已有母必能生子子必為母報讐之義焉如土克水水之子木又克土水克火火之子土又克水火克金金之子水又克火金克木木之子火又克金木克土土之子金又克木此必然之理也然世俗每以生克制化並言生克之理固若是矣所謂制者果何如耶蓋因五行内有生中之克反有克中之用何謂生中之克也如木生火若火過盛則木反為灰燼矣火生土若土過盛則火反被撲滅矣土生金若金過盛則土反無發生矣金生水若水過盛則金反見沈溺矣水生木若木過盛則水反為壅滯矣此雖生而反忌者也何謂克中之用也如水克火若火過盛又喜水克以成既濟之功火克金若金過盛又喜火克以成煅煉之材金克木若木過盛又喜金克以成芟削之美木克土若土過盛又喜木克以成秀聳之勢土克水若水過盛又喜土克以成隄防之用此雖克而反美者也夫生中有用斯則不拘於生克之常而謂之制者矣由是觀之五行也者質具於地氣行於天或為相生而又有生中之克或為相克而又有克中之生舉兩間之物其孰能外之也哉横渠張子獨言陽陷於隂為水附於隂為火木金者土之華實也其性有水火之雜故木水漬則生火然而不離蓋得土之浮華於水火之交也金得火之精於水之濡故水火相持而不害爍之反流而不耗蓋得土之精實於水火之際也則是以金木為水火土三者之所生而有矣近世王子衡又祖其説以為天一生水等語乃緯書之辭儒者不當援以入經而謂水火者隂陽如化之妙物故一化為火日是也再化為水雨露是也今曰天一生水地二生火戾於造化本然之妙矣又有地即有土何至天五方言生土若尚未有土則天三生木地四生金將附於何所乎水火土天地之大化也金木者三物之所自生與人物所同出安可與之相配地闢而人物即生金石之質必積久而後結恐其生必後於人物謂金之氣生人得乎若謂五行生人則觀之木津液血水也鑽燧氣火也皮之柔肉土也心之堅骨金也何異於人謂人生木不亦可乎至於分配支干乃半途立論無所本始甲乙丙丁子丑寅夘大撓作此以紀歲月日時非有所謂屬木屬水之説且五行之氣無則已矣有之則一日之内無不全體俱在安有今日為木明日為火又明日為土為金為水乎何春止為木夏止為火秋止為金冬止為水乎何土惟王於四季而餘月土氣即滅絶乎方其一行主事而餘四行孰把持之孰留停之而能退避相遜定分而不敢越耶子衡論辨雖多大都不過如此其闢世俗𫝊會牽合之説極為詳盡精當矣愚竊謂五行若以其質而言則金與木乃水火土之所生而有也其於人物之生實然亡異各有種類各自完具謂其能生人物者非也不惟金木不能生人物雖火亦不能生人物也藉令能生火鼠火雞不常有也絶未見有火生人者也不惟火不能生人雖水止生魚鼈而已矣土止生禽獸草木而已矣亦未見有水土中生人者也不惟不能生人雖其自生亦有不可强通者如金之生水特以其為火所煅煉而融流不知此融流之水能如源泉之混混乎吾見稍離於火即凝而為金矣豈有生水之理水之生木亦必藉土而後生若使無土水能自生乎或者以水生萍當之不知萍可以為木乎以火為體也必以薪而為體使無草木為之薪且無火矣安得有灰燼而成土乎抑此灰燼之土果能凝結而成金乎且吾聞金多生於汝漢涪水麗水潭瀨沙渚之中則謂水之生金不亦可乎故欲論五行者以質而論决有不可强通者也若以其氣而論則造化之始惟有元氣之運行而已元氣分而為二氣陽之氣濕是水也隂之氣燥是火也濕氣漸多感於隂而發舒是水也燥氣漸多感於陽而斂縮是金也二氣各盛交相傳合而成冲和是土也水火二物在五行之中最為清輕木次之金又次之而土則最為重濁矣此乃以氣而論其微著清濁之序謂其能為生天生地生人生物之本亦何不可愚嘗有説曰天地未開未闢之先是謂水火生天地天地既開既闢之後是為天地生水火何以故彼元氣變化水火之氣升而為天水之渣滓火之燥結降而為地此水火生天地也既有天地觀之天焉日火也故陽燧可取火於日焉月水也故方諸可取水於月焉又觀之地焉山川出雲升而為水矣山下出泉降而為水矣剛者成石石中有火矣柔者為木木中有火矣此天地生水火也既生水火則金木亦生乎其間矣既有五行則語其性也水主潤火主熯木主敷金主斂而土主溽語其氣也水為冽火為炎木為濕金為清而土烝無一日而不流行於天地之間無一物而不取足於五者之用則二月蘼草死三月而麰麥黄不可以為木專主春而無金之主殺也八月而種菘九月而種麥不可以為金專主秋而無木之主生也盛夏之時寸雲上騰大雨時行不可以為水專主冬而夏之水不健旺也隆冬之時井氣皆温田間野馬絪緼如故不可以為火專主夏而冬之火遂死絶也四物之質無土何附有生之類無土何依則又不可以土只寄王於四季各十八日也大抵五行為造化之本吾則不可以强探五行為日用之常吾則不可以不修是以肅時雨若則水行修也乂時𤾉若則火行修也哲時燠若則木行修也謀時寒若則金行修也聖時風若則土行修矣及施之有政預蓄洩通灌溉則水以潤下矣明鑚燧禁焚採則火以炎上矣慎鼓鑄審五庫則金以從革矣順隂陽時斧斤則木以曲直矣辨疆理重農時則土爰稼穡矣斯五行之政舉而六府之用成也聖賢之所重者惟此而已外是如五運五德休旺更始之談不過厯術家之事而六壬六甲太乙財官星數範圍皇極之術轉相湛溺怪誕又豈吾之所暇知也哉臨川呉氏曰十干十二支之名立而相配為六十不知其所始世傳黄帝命大撓作甲子或然也漢之時術家以六十之四十八配周易八純卦之六爻謂之渾天納甲不過以寅卯二支為木巳午二支為火申酉二支為金亥子二支為水辰戌丑未四支為土而已後世所謂納音者每支五行備而每行周乎十二支干則否壬癸各二水而四金四木丙丁各二火而四土四水戊己各二土而四木四火庚辛各二金而四木四土甲乙各二木而四火四水四金焉予嘗謂納甲之五行猶先天之卦納音之五行猶後天之卦也且納音始於誰乎五行之上曰某水某火某土某金某木者又始於誰乎疑末世術家猥瑣之所為也五行者何謂也謂金木水火土也言行者欲言為天行氣之義也地之承天猶妻之事夫臣之事君也謂其位卑卑者親事故自周於一行尊於天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方北方者隂氣在黄泉之下任養萬物水之為言淮也隂化沾濡任生木木在東方東方者陽氣始動萬物始生木之為言觸也陽氣動躍火在南方南方者陽在上萬物垂枝火之為言委隨也言萬物布施火之為言化也陽氣用事萬物變化也金在西方西方者隂氣始起萬物禁止金之為言禁也土在中央者主吐含萬物土之為言吐也何知東方生樂記曰春生夏長秋收冬藏土所以不名時地土别名也此於五行最尊故不自居部職也元命包曰土之為位而道在故大不預化人主不任部職五行之性或上或下何火者陽也尊故上水者隂也卑故下水者少陽金者少隂有中和之性故可曲可直從革土者最大苞含物將生者出者將歸者不嫌清濁為萬物尚書曰水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡五行所以二陽二隂何土尊尊者配天金木水火隂陽自偶水味所以鹹何足其性也所以北方鹹者萬物鹹與所以堅之也猶五味得鹹乃堅也水味所以酸者何東方萬物之生也酸者以達生也猶五味得酸乃達也火味所以苦何南方主長養苦者所以長養也猶五味須苦可以養也金味所以辛何也煞傷生物辛所以殺傷之也猶五味得辛乃委煞也五味所以甘何中央者中和也故甘猶五味以甘為主也尚書曰潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘北方其臭朽者何北方水萬物所幽藏也又水者受垢濁故臭腐朽也東方者木也萬物所出地中故其臭羶南方者火也盛陽承動故其臭焦西方者金也萬物成熟始復諾故其臭腥中央土也主養故其臭香也月令曰東方其臭羶南方其臭焦中央其臭香西方其臭腥北方其臭朽所以名之為東方者動方也萬物始動生也南方者任養之方萬物懐任也西方者遷方也萬物遷落也北方者伏方也萬物伏藏也少陽見寅寅者演也律中大蔟律之言率所以率氣令生也夘者茂也律中夾鍾衰於辰辰震也律中姑洗其日甲乙者萬物孚甲也乙者物蕃屈有節欲出時為春春之為言偆偆動也位在東方其色青其音角角者氣動耀也其帝大皡皥者大起萬物􅀈也其神勾芒者物之始生其精青龍芒之為言萌也隂中陽故太陽見於巳巳者物必起律中仲吕壯盛於午午物滿長律中㽔賔衰於未未味也律中林鍾其日丙丁者其物炳明丁者强也時為夏夏之言大也位在南方其色赤其音徵徵止也陽度極也其帝炎帝者太陽也其神祝融祝者屬續其精為鳥離為鸞故少隂見於申申者身也律中夷則壯於酉酉者老物收斂律中南吕衰於戌戌者滅也律中無射無射者無聲也其日庚辛庚者物更也辛者隂始成時為秋秋之為言愁亡也其位西方其色白其音商商者强也其帝少皥少皥者少斂也其神蓐收蓐收者縮也其精白虎虎之為言摶討也故太隂見於亥亥者仰也律中應鍾壯於子於子者孳也律中黄鍾衰於丑丑者紐也律中大吕其日壬癸壬者隂始壬癸者揆度也時為冬冬之言終也其位在北方其音羽羽之為言舒言萬物始孳其帝顓頊者寒縮也其神𤣥㝠𤣥㝠者入㝠也其精𤣥武掩起離體泉龜蛟蛛蛤土為中宫其日戊己戊者茂也巳抑屈起其音宫宫者中也其帝黄帝其神后土月令云十一月律謂之黄鍾何中和之色鍾者動也言陽氣動于黄泉之下動養萬物也十二月律則謂之大吕何大大也吕者拒也言陽氣欲出隂不許也吕之為言拒者旅抑拒難也正月律謂之大蔟何大亦大也蔟者凑也言萬物始大凑地而出也二月律謂之夾鍾何夾者孚甲也言萬物孚甲種類分也三月謂之姑洗何姑者故也洗者鮮也言萬物皆去故就新莫不鮮明也四月謂之仲吕何言陽氣極將彼固復中難之也五月謂之㽔賔何㽔者下也賔者敬也言陽氣上極隂氣始賔敬之也六月謂之林鍾何林者衆也萬物成熟種類衆多也七月謂之夷則何夷傷也則法也言萬物始傷被刑法也八月謂之南吕何南者任也言陽氣尚有任生齊來也故隂拒之也九月謂之無射何射者終也言萬物隨陽而終也當復隨隂起與有終已十月謂之應鍾何鍾動也言萬物應陽而動下藏也五行所以更主何以其轉相生故有終始也木生火火生土土生金金生水水生木是以木王火相土死金囚水休正所勝老死囚故王者休見王相何以知為臣王所以死者子為父報讐者也五行之子慎之物歸母木王火相金成其火燋金金生水水滅火報其理火生土土則害水莫能而禦五行所以相害者天地之性衆勝寡故水勝火也精勝堅故火勝金剛勝柔故金勝木專勝散故木勝土實勝虚故土勝水也火陽君之象也水隂臣之義也臣所以勝其君何此謂無道之君也故為衆隂所害猶紂王也是使水得施行金以益之土以應之欲温則温欲寒則寒亦何從得害火乎曰五行各自有隂陽木生火所以還燒其母何曰金勝木火欲為木害金金者堅强難消故母以遜體助火燒金此自然成子之義又陽道不相離故為兩盛火死子乃繼之木王所以七十二日何土王四季各十八日合九十日為一時王九十日土所以王四季何木非土不生火非土不榮金非土不成水無土不高土扶微助衰厯成其道故五行更正亦須土也王四季居中央不名時五行何以知同時動丑訖義相生傳曰五行並起赴各以明陽生隂煞火中無生物水中反有物何生者以内火隂在内故不生也水火獨一種金木多品何以為南北隂陽之極也得其極故一也東西非其極也故非一也水木可食金火土不可食何木者陽陽者施生故可食火者隂在内金者隂嗇恡故不可食水火所以殺人何水盛氣也故入而殺人火隂在内故殺人壯於水也金木微氣故不能自殺人也火不可入其中者隂在内也入則殺人矣水土陽在内故可入其中金木微氣也精密不可得入也水火不可加人功為人用金木加人功何火者盛陽木者盛隂者也氣盛不變故不可加人功為人用金木者不能自成故須人加功以為人用也五行之性火熱水寒有温水無寒火何明臣可以為君君不可更為臣五行常在火乍亡何水太隂也刑者故常在金少隂木少陽微氣無變故亦常在火太陽精微人君之象象尊常藏猶天子居九重之内臣下衛之也藏於木者依於人也木自主金須人取之乃成隂卑不能自成也木所以浮金所以沈何子生於母之義肝所以沈肺所以浮何有知者尊其母也一説木畏金金之妻庚受庚之化木者洪其木柔可曲直故浮也肝法其化直故沈五行皆同義天子所以内明而外昧人所以外明而内昧何明天人欲相嚮而治也行有五時有四何四時為時五行為節故木王即謂之春金王即謂之秋土尊不任職君不居部故時有四也五行相生父子之道也相克君臣之道也毗和兄弟之道也配合夫婦之道也相得朋友之道也五行支干總論粤自鴻蒙之初文字雖未起而二儀已判筭數雖未通而七政巳立故二儀上下即可以知隂陽之對七政長短即可以知日月之數而干支出矣閼逢旃蒙十者為干困敦赤奮若十二者為支天皇肇創之所授授諸此耳蓂莢雖無生焉可也十干之名易以甲乙十二支之名易以子丑大撓更定之所據據諸此耳魚圖雖無流焉可也天有四時而五行應之故甲乙為春木丙丁為夏火庚辛為秋金壬癸為冬水戊己為土居中為季夏者十干之五行也地有四隅而五氣屬之故亥子為北水寅卯為東木巳午為南火申酉為西金辰戌丑未為中土寄王四方者十二支之五行也此五行之正也至於干支之中各分隂陽五行之中自為生尅豈非正之妙者乎天干有合有化如甲與巳合遇申化土者是也地支有合有衝如子與丑合與午對衝者是也衝合生尅盡其變化故甲子乙丑非金而納音屬金甲寅乙卯非火而納音屬火此五行之變也至於金分沙土水别河海午未之後復同子丑豈非變之微者乎干言乎榦支言乎枝大小二十二也彼去戊己外加乾坤巽艮者蓋以辰戌丑未不盡四維之位故足以四卦而戊己固在耳或者指為術家之傅會不知天數中於五戊居之地數中於六巳居之戊無位附於戌而在乾巳無位附於辰而在巽未在西南為坤丑在東北為艮其分位固然矣况觀之月朏於庚弦於丁盈於甲會於坤而晦朔之間坎水流戊離火就以隂陽相推以生明不與堪輿有相發邪干為之母支為之子重生六十也彼象六十卦獨去乾坤坎離者蓋以天日地月比於君臣之象而以用卦為數耳或者指為厯數之牽合不知乾起於坎而終離坤起於離而終坎乾坤交而天地位坎離交而萬物育又以六十卦應甲子以三百六十爻應策數其理數固然矣載觀之坎主冬至離主夏至震主春分兌主秋分而每月之間五卦用事不及四正此則專言乎時令豈與易家有相悖耶五行屬四時則木屬春火屬夏固也然斗杓所指之月春建寅卯辰夏建巳午未者豈非支屬乎禮月令何不及之於孟春仲春季春皆曰其日甲乙蓋干能兼支之義而所兼之支又與月建之支異也若易言先甲後甲先庚後庚則因文立意欲占者自新於辛叮嚀於丁揆度於癸耳漢儒乃謂先甲為賁後甲為无妄先庚為益後庚為噬嗑甲以乾納而蠱有之庚以震取而巽有之此爻變之説與本義不同豈無所據乎十二辰配十二域如子為齊丑為呉是也然五星北斗之應謂歲星主齊呉搖光主豫州者不皆可採乎周禮職方氏何不及之於𤣥枵星紀等次屬之十二分野蓋地合於天之説而所合之十二辰又與干支之十二辰異也若天文家之二十八宿分配星禽則因宿取象故因辰而象角於蛟象亢於龍而總曰天秤耳註疏又謂東方龍西方虎南首北尾南方鳥北方龜西首東尾四方七宿各成一形此四禽之體與星禽不同豈無所見乎六甲而甲子成六甲子而歲成六十歲而一元成蓋謂六甲復元循環無端天地自然之數也然花甲一週數止六十耳太初乃以四千六百一十七歲為一元經世以一十二萬九千六百為一元大衍以一百六十三億七千四百五十九萬五千二百為一元何多寡懸絶之甚如此哉蓋元者氣之始也月有月之元歲有歲之元厯有厯之元邵堯夫總天地之始終起日甲月子星甲辰子之數以三十年為一世十二世為運十二運為會十二會為元合之十二萬九千六百者是所謂天地之元也太初大衍皆以機頴參酌古書以為造厯之法雖各有契授各有竒中要之不如皇極合之堯厯矣日經元為皇月經會為帝星經運為王蓋謂彌綸宇宙出入造化皇帝三王之事也然應革治厯時以明時耳世編乃謂天皇制干支夀一萬八千歲地皇定三辰亦一萬八千歲黄帝作甲子列星軒轅與天無極此果可盡信而盡非哉蓋天地間一元氣也天有天之元氣人有人之元氣帝王有帝王之元氣夷考邃古顓蒙之初精一完聚渾渾以為德狉狉以為治𤣥𤣥以為禪深深以為息故元神與天通元化與天應享長算而比列星者亦是元氣之聚也或疑每一會一萬八百年而以三皇御世為百遂以八千為八百之誤此據目前之理論未見之事亦可參諸司馬並傳其疑矣愚嘗總而論之干支一五行也五行一隂陽也隂陽一氣也自一而二之為二儀四之為四時八之為八卦炁之為二十四宿之為二十八甲子之為六十朞之為三百六十爻之為三百八十四世之為三十年運之為三百六十年會之為一萬八百夀之為一萬八千元之為十二萬九千六百莫非一氣之所為也氣不息則數亦不息數不息則理亦不息故所以著數者存乎理人身亦天地也一此隂陽五行也亦一此氣也五形為之五岳五府為之五運六脉為之六氣子夜之壑為之復亭午之田為之姤三百六十息為之周天三百八十四爻為之直日木臨卯火臨午金臨酉水臨子土臨四維為之歲會莫非一氣之所為也氣不害則天亦不害天不害則人亦不害故所以合天者存乎人天干始於甲而終癸河圖生成之數也地支起於子而終亥洛書竒偶之數也陽自復始六變而乾陽備隂自姤始六變而坤隂成合二六之數而十二辰也夫甲丙戊庚壬陽干也子寅辰午申戌陽支也乙丁已辛癸隂干也丑卯巳未酉亥隂支也厯法以陽干配陽支隂干配隂支猶木之有榦而有枝自甲子為首以六甲五子次第推排而盡於癸亥此天干地支相配合而六十甲子所由成也天地大矣造化神矣匪人之知識所能測也然干支止二十二字而天地悉在其範圍中焉千古而下神術莫能窺其奥巧厯莫能析其微孰謂此特備卜擇一藝之用而莫之究心耶雖然世之能究心者又不過䜟緯術數之末耳孰能直從天地之造而研究其所以然夫干以紀天之運支以紀地之位以支配干所以合天地之氣也天地之氣合則干以生之支以成之而五氣之類息矣干合於支則五其六支生其干也支合於干則六其五干生其支也五六相生而六十之數成矣大矣哉戊己之德乎其萬物化生之基乎戊己不四則變化不行變化不行則生生之道息矣五行適均而支之土四地以土為立也戊己天地之精氣專隂專陽故其氣盛大而有餘辰戌丑未分隂分陽故其氣㪚佚而不足支干之相合也干以五周支以六周干以五交六支以六交五也干支之相交也干始於甲而終於癸支始於子而終於亥干凡六交以應地也支凡五交以承天也若夫干氣之陽則行於支位之陽干氣之隂則行於支位之隂五六自然之化也支退而右干退而左天氣左旋地道右行也支處其方而支氣流行天圓而動地方而靜也必以二者隂陽合而後生也即其行五氣之運也要其來一氣之變也夫干支之運非有所始亦非有所終也所謂始終者以其行於元會運世年月日時分秒者而為言耳一五行也有行於元者行於會者行於運世年月日時分秒者大德敦化小德川流也五行占驗總論古者帝王之興取法五行故太皥配木炎帝配火黄帝配土少昊配金顓頊配水斯吾所嘗聞於夫子者也然亦謂統緒相承猶夫五行相生於是焉建號易色各從其所王之德而已非以相勝論也為勝論者見於吕覽其言曰凡帝王之興也天必見祥於下民故黄帝以土氣勝禹以木氣勝湯以金氣勝周以火氣勝代火者必將水氣勝斯所謂終始之傳也然猶為迭勝之論而非以知來也為知來者自緯始緯謂伏羲以來以斗精受命者七得間氣而生者二十有八所謂三十五際者也人元三百四歲為德運七百六十歲為代軌千五百二十歲為天地出符四千五百六十歲為七精反初其言甚誕漢儒皆謂孔氏語豈信孔子語哉自有緯而洛下閎始造大初厯以閏統元會得日法而積中之言應以五氣正餘凖大統而百六之論明故平帝以三七輳厄光武以四七中興其説頗信然王湜作太乙肘後而推羿浞以來九世驗舜以來八世不驗夫既驗不驗參半而惡乎知來大初厯焉知天道是亦多言矣自大初不驗而唐王勃有千言厯言唐得土運宜承漢統不宜承隋統其世當五十其年當千而後張説作開元厯論五德大抵皆勃㫖然指三代與漢數多寡皆合推唐數當千而不千不合蓋此兩人者皆造無徵之談以佞時主而已焉知天道是又多言矣宋邵雍最稱知厯理其所謂元會運世者以十二與三十相乗而成猶之歲月日時也推天地大數開物於月之寅星之巳閉物於月之戌星之戊堯之時正符中數信有當矣雖然歲以十二月日之會也月以三十日日月之及也日以十二時時之周天也皆有據也彼元會運世則何據以為十二為三十乎自元會運世而上自歲月日時而下愈久愈暫而愈不可窮此何異朝秀日及而論春秋之變哉天津之兆豈不或中雍亦多言矣大抵乾坤有六子支干有剛柔隂陽五行豈無前識而實者難設虚者易假是以古者慎言之也天地之氣五五氣之行其節度則為數此天地自然之數見於物象者圖書也五行之氣各為隂陽故其數一二三四五六七八九十也蓋大虚之本體萬物之運旋也氣機之旋由靜而動正北者靜極之地也故五中之一始行於下而生一由北厯東而南則生二由南厯西北而東以生三由東厯南而北以生四合中之一而為五五雖無數也而該動靜貫五行而一之者也其運行則自中而出居於北以趨一由北而南以趨二由南而東以趨三由東而西以趨四由西入於中以趨五為由靜而動之數也由五復出於北以趨六由北而南以趨七由南而東以趨八由東而西以趨九由西入於中以趨十為由動而靜之數也動靜相根而循環無端者氣之用也居南者為火氣居北者為水氣居東者為木氣居西者為金氣居中者為土氣一稱壬六稱癸二稱丁七稱丙三稱巳八稱乙四稱辛九稱庚十稱巳五稱戌皆天之氣謂之天干其在於地也壬位子癸位亥丙位午丁位己甲位寅乙位卯庚位申辛位酉戊位辰戌已位丑未謂之地支干支相配而流行於元會運世年月日時分秒之中者五氣之消息也洛書者方位之始也其數主乎變始一終九所以定四正四隅之方以一九三七陽數居四正之宫以二四六八隂數居四隅之位以五行言之一六水二七火三八木四九金而五位土之中央是也以十二支言之子午卯酉得天陽之數而居四正寅申巳亥辰戌丑未得地隂之數而居四隅陽數竒故各王其一隂數偶故各王其二辰戌丑未之土寄居四隅是也即五行之位而東南西北所由定即十二支而二十四方位所由分凡術數各家所謂九宫八卦悉不越此先輩謂河圖圓象天而天干所自出洛書方象地而地支所自生豈無見而云然哉但四隅配卦分巽東南艮東北坤西南乾西北可也若確指六為乾二為坤四為巽八為艮以義揆之終非定論艮陽土坤隂土也又以辰戌分屬乾巽亦為土何拘泥若此耶干支分𨽻八卦并納甲説先天卦數乾一居南兑二東南離三正東震四東北巽五西南坎六正西艮七西北坤八正北化成之後定方入用則震巽離坤兑乾坎艮而後天之位始定故天一與地六合於北而生水地二與天七合于南而生火天三與地八合於東而生木地四與天九合於西而生金天五與地十合於中而生土水居北者壬癸司之火居南者丙丁司之木居東者甲乙司之金居西者庚辛司之土居中者戊己司之故十干之氣每司一行壬癸屬坎亥子𨽻焉丙丁屬離巳午𨽻焉甲乙屬震巽寅卯𨽻焉庚辛屬兑乾申酉𨽻焉戊己屬艮坤而辰戌丑未𨽻焉或以戊己土位中矣而辰戌丑未與乾坤艮巽各同在四隅故從而分屬之耳然五行孤虚旺相亦從卦氣而分乾三陽也以中爻為本卦之體分上下二爻于甲干是二陽也二陽為極故為陽之孤坤三隂也以中爻為本卦之體分上下二爻于乙干是二隂也二隂為極故為隂之虚震陽卦而隂爻陽下而隂上也以中爻為本卦之體分上下二爻于庚干一隂一陽交合之象也故為陽之相氣巽隂卦而陽爻陽上而隂下也以中爻為本卦之體分上下二爻于辛干一隂一陽交合之象也故為隂之相氣坎陽卦而隂爻陽内而隂外也以中爻為本卦之體分上下二爻于癸干是二隂也二隂為極故為隂之虚氣離隂卦而陽爻隂内而陽外也以中爻為本卦之體分上下二爻于壬干是二陽也二陽為亢故為陽之孤氣艮陽卦而隂爻陽上而隂下也以中爻為本卦之體分上下二爻於丙干一隂一陽交合之象也故為陽之旺氣兑隂卦而陽爻隂上而陽下也以中爻為本卦之體分上下二爻于丁干一隂一陽交合之象也故為隂之旺氣術家又以戊己土干本無正位寄旺四季無可以為生成之基故謂為龜甲猶龜甲之堅氣所不行故不列于卦位非通論也若夫支干納卦則以日為陽之象陽中含隂離二陽在外而一隂居中故離為日之正體月為隂之象隂中含陽坎二隂在外而一陽居中故坎為月之正體日無遲速月有盈虧卦有變化時有納配月麗於日而有明自晦而朔象坤朏出于庚象震上弦干丁象兑盈干甲壬象乾退干辛象巽消干丙象艮没於乙癸而復于坤此一月之消息盈虧而支干所由納也或又謂坎離得乾坤之中中爻中土位也故戊乃陽土納于坎巳乃隂土納于離其地支之寅戌巳丑亥未申辰則各從其類而納之矣天干地支河圖洛書卦氣方位天地之造化變動不測而中有一定不易者在也任其不測而忘其不易之方執其一定而昧其變動之時皆非也是故先天主乾坤坎離乃天時之不測也後天主坎離震兑乃地方之不易也而天之時地之方豈相悖乎試自日月觀之離為日大明生於東故在先天居東日正照于午日中時也故在後天居南坎為月月生於西故先天居西月正照于子夜分時也故在後天居北在先天居生之地在後天居旺之地即坎離以推後天卦位震木旺於卯兑金旺於酉土王中央故坤位金火之間艮位水木之間兑隂金乾陽金故乾次兑居南北而接乎陽則金生水矣震陽木巽隂木故巽次震居東南而接乎隂則木生火矣皆以五行生旺為序其在四時亦然邵子謂乾生於子坤生於午坎終於寅離終於申以應天之時也坎離得位而兑震為偶以應地之方也朱子謂在河圖則乾坤坎離居四實兑震巽艮分居四虚在洛書則坎離震兑分居四方乾坤巽艮分居四隅會而通之皆此意也今大明厯所載子午卯酉居四正之位其四隅則巽居東南坤居西南艮居東北乾居西北離居午位正南而丙丁分𨽻之坎居子位正北而壬癸分𨽻之震居卯位正東而甲乙分𨽻之兑居酉位正西而庚辛分𨽻之合十二辰八干四隅謂之二十四向其實不過五行焉耳如寅申卯乙巽屬木巳丙午丁屬火申庚酉辛乾屬金亥壬子癸屬水辰戌丑未坤艮屬土凡論各方孤虚旺相之氣未有能越乎此者且天干地支本出黄帝考定星厯分命大撓作六十甲子容成總訂之以建立五行消息而萬世因之以𨽻歲月日時不可易也彼隂陽家謂天干始於甲終於癸河圖生成之數也地支起於子終於亥洛書竒偶之數也陽自復始六變而乾陽備隂自姤始六變而坤隂成合二六之數為十二辰也夫甲丙戊庚壬陽干也子寅壬午申戌陽支也乙丁已辛癸隂干也丑卯巳未酉亥隂支也陽干配陽支隂干配隂支本有不可紊者故以位言之東木南火西金北水中土孰得而易之乎以氣言之寅為東木之始其胎已生於亥巳為南火之始其胎巳生於寅申為西金之始其胎巳生於巳亥為北水之始其胎巳生於申法以水土凝而為地浮而為天西南者致養之地而坤者地之體也故水土生於甲從母氣也水從一數運行至亥為水生之初故木滋水而生於亥水從三數運行至寅為木生之初故火待木而生於寅火從二數運行至巳為火生之初故金資火而生於巳蓋總不出乎隂陽二氣所化孰得而測之也位不可易氣不可測天時地方豈相悖哉不然先天本以氣言也天位乎上地位乎下日生於東月生於西山峙西北澤注東南雷動東北風起西南果一于變動而非一定者乎後天本以位言也乾以君之帝出乎震神妙萬物而謂之君謂之帝謂之神果可以定向拘之而不能變動者乎信乎天干地支河圖洛書先天後天執此以定方位非真識隂陽造化之秘鮮有不滯於一偏者即如納甲法乾納甲壬坤納己癸離納已坎納戊巽納辛震納庚兑納丁艮納丙此皆本於月之晦朔弦望惡可鄙之為小術也特假之以定方位則非至曰乾坤坎離陽也震艮兑巽隂也甲乙壬癸𨽻於陽而陽中四支係焉庚丙巽辛𨽻於隂而隂中四支係焉乾亢而坤極也坎止而離燥也甲壬陽而孤乙癸隂而虚也震以發之巽以順之兑以説之艮以成之丙庚陽而旺丁辛隂而相也此亦堪輿一隅之説然謂乾坤老亢退居無用之位不免説愈多而愈支矣辨方正位要不離乎二氣五行又何必一一强合之哉圖書編卷二十二
