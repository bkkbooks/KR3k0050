body:
  text: 圖書編卷二十八明章潢撰天圓地方圖古今言天地者不一方圓所以言其象玄黃所以言其色健順所以言其德覆載生成所以言其職卑髙上下所以言其位動靜闔闢所以言其機隂陽剛柔輕清重濁所以言其氣與質也要之皆是也是故日月星辰莫非天水火土石莫非地故曰凡有氣皆天有形皆地然猶未免以二物分言之也其實天地一也天無形而地之上虛空皆天也地之中所以發生萬物皆天之氣也中庸曰天地之道可一言而盡其為物不二則其生物不測至哉言乎善觀天地者須默識其所以為物不二而後可雖然羲皇仰觀而俯察尼父上律而下襲豈徒求之天地乎哉凡今之人孰不戴天而履地也孰不圓首而方足也盡心於崇效卑法之道者幾何人哉噫嘻天地為物不二也天地人之道可一言而盡亦曰為物不二也人惟反身以求之則參贊位育之道即于此乎在黃帝曰地之為下否乎岐伯曰地為人之下大虛之中者也帝曰馮乎岐伯曰大氣舉之也天體之運有常度而無停機非有體也因星之所附麗擬之為天之體耳觀夫星之昏在東者及曉則西墜昏所不見者至曉則東升東西轉運有以驗天體之左旋矣然而北天之星未嘗入地終夜可見其旋轉為甚窄窺之以管其間一星旋轉尤密不出管中者曰紐星紐星所在天體是為北極若南天之星雖終夜不常見而其旋轉亦不逺知為南極之所在而南極亦不動南北二極為天體之管轄其猶門之樞車之軸與試以圓瓜譬之北極乃瓜頂聨蒂之所南極乃瓜末含花之所天之東西為最廣則比瓜之腰圍北極髙而南極下故北極之傍雖旋轉而常在於天南極之側雖旋轉而不出於地此又可驗地在天內天如雞子地如內黃矣然天體極圓不類雞子乃取以為譬者非取其形之肖特以比天包地外而已以今譬之天體如鞠內盛半水而浮板水上板譬則地也置物板上鞠雖外轉板豈常動乎物逺視之微近視則大當午之日如盤盂出沒之日如車輪豈非午日為逺耶或疑午日熱為近殊不知日久照則熱不可以逺近論也至於星度髙升則密低垂則疏則天頂逺而四傍近固可知矣且天體圓如彈丸圓中心六合之的也周圍上下相距正等名曰天中從天中直上至天頂名嵩髙地平不當天半地上天多地下天少從地平之中直上自有天中之所或以為地平正當天半者蓋以周天三百六十五度餘四之一仰視為一半星宿周度可見故以地中就為天中而今以地中直以上自有天中之所者以日月之近大而逺小星之髙密而低疏知之也然地平既在天半之下而仰觀止見周度之半者天逺似乎低地平與之相妨人目不可盡見也古者以陽城為地中然非四海之中乃天頂之下以為地也論四海之中則崑崙為天下地平最髙處東則萬水流東西則萬水流西南北亦然其山距西海三萬餘距東海不及二萬里則天下之地多在地中以西地中之東則皆海也故四海之內不中於陽城中於四海者乃天竺以北崑崙以西也若天之所覆通地與海而言中則中於陽城仰觀北極出地三十六度南極入地亦三十六度北至朔方則北極出地四五十度南極入地亦然南至二廣則出入之度三十一又南至交廣則出入之度二十而已天地之逺近非惟仰觀不同而寒暑晝夜表景亦皆差别舊厯晝永極於六十刻晝短極於四十刻今授時厯以驗於燕地稍偏北故其永至六十二刻短至三十八刻蓋偏南則長短較少偏北則所較最多夏則所較漸多夏日出寅入戌其地近北冬日出辰入申其地近南日近北則夏晝長而北方尤長夏夜短而北方尤短日近南則冬夜長而北方尤長冬晝短而北方尤短而南方之晝夜長短則不較多也古者立八尺之表驗日景短長地中夏至午景在表北約一尺六寸地中冬至午景在北表約一丈三尺南至交廣北至鐡勒等處驗之景各不同然非特測之南北亦驗之東西帝堯分命羲和之官宅於四方是也然表用八尺似失之短至元辛巳用表四丈允為定法是故表短則景短差數難覺表長則景長差數易明而一寸千里之差終未足據若土圭者雖古有其制然陽城地中已不無差若即八方偏地驗之實有不可準者大抵偏東者早景疾而晚景遲午景先至偏西者早景遲而晚景疾午景後期偏北者少其晝而景遲偏南者多其晝而景疾蠻粵短景指南而子午反復則又舛訛甚矣天體周圍皆三百六十五度四分度之一徑一百二十一度四分度之三凡一度為百分四分度之一即百分中之二十五分也四分度之三即百分中七十五分也天左旋東出地上西入地下動而不息一晝一夜行三百六十六度四分度之一緣日東行一度故天左旋三百六十六度然後日復出於東方地體徑二十四度者其後半之勢傾東南其西北之髙不過一度邵雍謂水火土石合而為地今所謂徑二十四度乃土石之體耳土石之外水接於天皆為地體地之徑亦得一百三十一度四分度之三也兩極南北上下樞是也北髙而南下自地上觀之北極出地上三十五度有餘南極入地下亦三十五度有餘兩極之中皆去九十一度三分度之一謂之赤道橫絡天腹以紀二十八宿相距之度大抵兩極正徐晝夜循環斡旋天運自東而西分為四時寒暑所居南北之中是為天心中氣存焉其動有常不疾不徐以子隂陽所以和此後天之太極也先天之太極造天地於無形後天之太極運天地於有形其實非二極也天地之道可一言而盡也其為物不二則其生物不測天地之道博也厚也髙也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不泄萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貸財殖焉自古論天地孰有如中庸此章之親切最詳明哉邵子曰天圓而地方天南髙而北下是以望之如倚蓋焉地東南下而西北髙是以東南多水西北多山也天覆地地載天天地相函故天上有地地上有天邵子曰天何依依乎地地何附附乎天天地自相依附程子曰凡有氣莫非天凡有形莫非地天地之中理必相直則四邊常有空闕處空闕處如何地之下豈無天今所謂地者特如天中一物爾如雲氣之聚以其久而不散也故為對凡地動者只是氣動凡所指地者只是土土亦一物爾不可言地更須要知坤元承天是地之道也天地動靜之理天圜則須轉動地方則須安靜南北之位豈可不定所以定南北者在坎離也坎離又不是人安排得來莫非自然也天地之化一息不流疑其速也然寒暑之變甚漸冬至之前天地閉塞可謂靜矣日月運行未嘗息也則謂之不動可乎故曰動靜不可離天主施成之者地也天地生物之氣象可見而不可言善觀於此者必知道也地氣不上騰則天氣不下降天氣降而至於地地中生物者皆天氣也惟無成而代有終者地之道也致堂胡氏曰夫天非若地之有形也自地而上無非天者昔人以積氣名其象以倚蓋名其形皆非知天者莊周氏曰天之蒼蒼其正色邪言天無色也無色則無聲無臭皆舉之矣日月星辰之繫乎天非若山川草木之麗乎地也著明森列躔度行止氣機自運莫使之然而然者無所託也若其有託則是以形相屬一麗乎形能無壞乎朱子曰天運不息晝夜輥轉故地𣙜在中間使天有一息之停則地須陷下惟天運轉之急故凝結得許多渣滓在中間地者氣之渣滓也所以道輕清者為天重濁者為地天包乎地天之氣又行乎地之中故橫渠云地對天不過問天地之所以髙深曰天只是氣非獨是髙只今人在地上便只是如此髙要之連地下亦是天又云世間無一個物事大故地恁地大地只是氣之渣滓故厚而深也問康節天地自相依附之説某以為此説與周子太極圖程子動靜無端隂陽無始之義一致非厯家所能窺測曰康節之言大體固如是矣然厯家之説亦須考之方見其細密處如禮記月令疏及晉天文志皆不可不讀也西山真氏曰按楊倞注荀子有曰天無實形地之上空虛者皆天也按天圓地方人皆知之然天之圓者氣之運也固流行于地之四周地之方者質之凝也實在天範圍之內邵子謂天地自相依附程子謂地者特中天一物朱子謂地者氣之渣滓俱為確論惟岐伯大氣舉之一語則尤精也雖然乾統天坤順承天欲窮天地者須窮天地之原如文中子所謂圓者動方者靜見天地之心其果然歟張子正蒙曰地物也天神也物無踰神之理顧有地斯有天若其配然耳地有升降日有修短地雖凝聚不散之物然二氣升降其間相從而不已陽日上地日降而下者虛也陽日降地日進而上者盈也此一歲寒暑之候也至於一晝夜之盈虛升降則以海水潮汐驗之為信然間有大小之差則繫日月朔望其精相感黃瑞曰此段地有升降日有修短及證以海水潮汐之候皆用舊説今考先儒皆謂地在天中水環地外四遊升降不越三萬里春遊過東方五千里其下降如其數秋遊過西方五千里其上升如其數夏遊在南故日在其上冬遊過北故日在其南此冬夏晝夜之長短因地有升降而然人處地上如在舟中但見岸之移而不見舟之轉也至於論潮則謂天包水水承地而一元之氣升降於太空之中地勢水力與元氣相為升降氣升而地沉則海水溢上而為潮氣降而地浮則海水縮而為汐一晝一夜隂陽之氣再升再降故一日之間潮汐皆再其説與地有四遊相為表裏然以渾天觀之天形斜倚半在地上北極出地三十六度其南五十五度正當地之中又其南十二度為夏至之日道天在地上最髙故晝長又其南二十四度為春秋分之日道天在地上稍低故晝夜平又其南二十四度為冬至之日道天在地上最低故晝短其南下入地才三十一度而已此晝夜長短乃天體髙低自然之理非因地之升降也潮汐消長則惟余襄公海潮圖序最明蓋潮之消息皆繫於日月臨卯酉則潮漲乎東西月臨子午則潮平乎南北晝夜之運日行一度月行十三度有竒故太隂西沒之期常緩於太陽六刻有竒潮信之來率亦如是自朔至望常緩一夜潮自望至晦復緩一晝潮朔望前後月行差疾故晦前三日潮勢長朔後三日潮勢大亦如之月弦之際月行差遲故潮之出來勢亦稍小一月則潮盛於朔望之後一歲則潮盛於春秋之中春夏晝長潮常大秋冬夜長潮常大蓋歲之有春秋猶月之有朔望天地之常數也此潮之消息乃繫之日之進退亦非因地之浮沉也張子特用舊説而未之易耳晉人謂崑崙山乃天下之最髙者其東面中原所以江淮河漢之水皆東流其西面西域諸國所以流沙以西之水皆西流南自吐蕃兩廣水皆南向北自沙漠虎林以至海都木鉢地勢漸低水皆北向然此亦舉其人力之所通者言之耳若以是為盡窺天地則吾不知也蓋造化之妙無窮耳目之力有限以有限窺無窮則有限者易窮而無窮者難限譬之蟻焉生於穴長於穴遊於墻屋聚於纍土而曰墻屋足以盡天纍土足以盡地可乎異氏九天之説既成虛妄世儒蠡測之言博而寡要蓋人生天地如魚在水而不知有水是以日月之外聖人不能範圍之而作厯日月之內聖人不能不損益之而成歲天地二儀一也日月二曜一也隂陽二氣一也天統地日統月陽統隂元氣至明而純陽也精萃為日神運為天往來屈伸動靜為寒暑寒暑之交為四時一日之間有四時之候是以混沌開闢亦有四時之候四時一也混闢無窮而元氣不改也天地一氣爾氣化生水水中滓濁積而成土土遂成山川土之剛者成石而金生焉土之柔者成木而火生焉五行具萬物生而變化無窮矣天地總論易道乾一而實故以質言而曰大坤曰二虛故以量言而曰廣朱子謂此兩句説得極分曉蓋曰以形言之則天包地外地在天中所以説天之質大以理與氣言之則天之氣却在地之中地盡承受得天之氣所以説地之量廣天只是個物事一故實從裏面便實出來流行發生只是一個物事所以説乾一而實地雖堅實然却虛天之氣流行乎地之中皆從裏面發出來所以説坤二而虛用之行地如肺形雖硬而中本虛故陽氣升降乎其中無所障礙雖金石也透過去地便承受得這氣發育萬物要之天形如一個鼓鞲天便是那個鞲外面皮殼子中間包得許多氣開闔消長所以説乾而一實地中間盡是這氣來往升降緣中間虛故容得這氣來往升降以其包得地所以説其質之大以其容得天之氣所以説其量之廣非是説地之形有盡故以量言也只是説地盡容得天之氣所以説地之廣耳今厯家用律吕候氣其法最精氣之至也分寸不差便是這氣都只地中透出來如十一月冬至用黃鍾管距地九寸以葭灰實其中至之日氣至灰去晷刻不差天空虛而其狀與雞卵相似地局定於天中則如雞卵中黃地之上下四圍蓋皆虛空處即天也地所以懸於虛空而亘古不墜者天行於外晝夜旋轉而無一息停也天北髙南下而斜倚故北極出地三十六度黃道周匝於天腹日月則行於虛空之中而晝夜不離黃道隋書謂日入水中妄也水由地中行不離乎地地之四表皆天安得有水謂水浮天載地尤妄也冬至之日晝則近南極而行在天之南方而陽氣去人甚逺故寒夜則潛於地底之虛空而陽氣正在人之足下所以井泉溫夏至之日晝則近北極而行正在人之頂上而陽氣直射於下故熱夜潛於地外在北方之虛空處而陽不在地底所以井泉冷萬物春而生夏而長由地底太陽之氣自下蒸上也秋而收冬而藏由太陽之氣去地底以漸而逺也此理昭然而昧者自不知耳天外論邵康節曰天何依依乎地地何附附乎天天地何所依附曰自相依附自斯言一出宋儒標榜而互贊之隨聲而妄衍之朱子遂云天外更須有軀殼甚厚所以固此氣也天豈有軀殼乎誰曽見之乎既自撰為此説他日遂因而實之曰北海只挨著天殼邉過似曽親見天殼矣自古論天文者宣夜周髀渾天之書甘石洛下閎之流皆未嘗言非不言也實所不知也若邵子朱子之言人所不言亦不必言也人所不知亦不必知也人所不問亦不必問也莊子曰六合之外聖人存而不論此乃切要之言孰謂莊子為虛無異端乎元人趙緣督治稍正邵子之誕而今之俗儒已交口議之又丘長春世之所謂神仙也其言曰世間之事尚不能究况天外之事乎由是言之則莊子長春乃異端之正論而康節晦翁之言則吾儒之異説矣本朝劉伯溫古甘石洛下之流其言曰天有極乎極之外何物也天無極乎凡有形必有極理也勢也是聖人所不能知耳非不言也故天之行聖人以厯紀之天之象聖人以器驗之天之數聖人以算窮之天之理聖人以易究之天之所閟人無術以知之若惟此耳今不曰不知而曰不言是何好勝之甚也嗚呼伯溫此言其確論乎其曰好勝者蓋指宋儒之論天者豫嘗言東坡詩不識廬山真面目只緣身在此山中蓋虛於物之外方見物之真也吾人固不出天地之大何以知天地之真實歟且聖賢之學切問近思亦何必天外之事耶天地東西南北溫涼寒暑帝曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也岐伯曰隂陽之氣髙下之理太少之異也東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精升於上故左寒而右涼是以地有高下氣有溫涼寒涼者脹下之溫熱者瘡汗之下之則脹已汗之則瘡已此腠理開閉之常太少之異耳援西北與東南言其大也夫以氣候驗之中原地形所居者悉以居髙則寒處下則熱試觀之髙山多雪平川多雨髙山多寒平川多熱可徵矣中華之地凡有髙下之大者東西南北各三分也其一者自漢蜀江南至海也二者自漢江北至遙平縣三者自遙平北山北至蕃界北海也故南方大熱中分寒熱兼半北分大寒南北分外寒熱尤極大熱之分其寒徵大寒之分其熱徵然其登步極髙山頂則南面北面寒熱懸殊榮枯倍異也又東西髙下之列亦三矣其一者自汧源縣西至沙州二者自開封縣西至汧源縣三者自開封縣東至滄海也故東分大溫中分溫涼兼半西分大涼大溫之分其寒五分之二大涼之分其熱五分之二溫涼分外溫涼尤極變為火寒火暄也約其大凡如此然九分之地寒極于東北熱極于西南九分之地其中有髙下不同地髙處則寒下處則燥此一分之中小異也若大而言之是則髙下之有一也何者中原地形西髙北髙東下南下今百川滿湊東之滄海則東西南北髙下可知一為地形髙下故寒熱不同二則隂陽之氣有少有多故表溫涼之異爾今以氣候驗之乃春氣西行秋氣東行冬氣南行夏氣北行以中分校之自開封至汧源氣候正與厯候同以東行校之自開封至汧源每一百里秋氣至晚一日春氣發早一日西行校之自汧源縣西至蕃界磧石其以南向及北東南者每四十里春氣發晚一日秋氣至早一日北向及東北西南者每一十五里春氣發晚一日秋氣至早一日南行校之川行有北向及東北西南者每五百里行新校正云按别本作十五里陽氣行晚一日隂氣早一日南向及東南西北川每一十五里熱氣至早一日寒氣至晚一日廣平之地每五十里陽氣發早一日寒氣至晚一日北行校之川行有南向及東南西北者每二十五里陽氣行晚一日隂氣行早一日北向及東北西南川每一十五里寒氣至早一日熱氣至晚一日廣平之地則每二十里熱氣行晚一日寒氣至早一日大率如此然髙處峻處冬氣常在平處下處夏氣常在觀其雪零革茂則可知矣然地土固有弓形川蛇形川月形川地勢不同生殺榮枯地同而天異凡此之類有離向丙向巽向乙向震向處則春氣早至秋氣晚至早晚校十五里有丁向坤向庚向兊向辛向乾向坎向艮向處則秋氣早至春氣晚至早晚亦校二十日是所謂帶山之地也審觀向背氣候可知寒涼之地腠理開少而閉多閉多則陽氣不散故適涼寒腹必脹也溫熱之地腠理開多而閉少開多則陽氣散故往濕氣之地皮必瘡也下之則中氣不餘故脹已汗之則陽氣外泄故瘡愈天地運旋變化天體東南西北經緯三十五萬七千里每一方距八萬九千二百五十里自地至上八萬里以日照陽城之半為中乃天體正圓也以古法算之南極七十二度隱而不見謂之下規北極七十二度見而不隱謂之上規每度比人間二千九百三十里七十一步二尺七寸四分總而算之每度皆三千里自下度之每度如日輪之大三百六十五周絡四方以行七政雖位分四方體無定常旦暮視中星以知方所其體健而不息其行如璧周旋自東運至南自南運至西自西運而入北自北運而出東推行以序漸積寒暑以成歲功二儀隨以出沒五緯隨以伏留列舍隨以隱見七政非不行也天行速而七政行緩如負戴以周運也夫天一氣也氣分東南為陽而日隨陽升于東南氣分西北為隂而日隨隂入于西北蓋東南陽氣盛于自然故日出于東方陽谷熾于南方明都而顯麗於正晝西北隂氣盛于自然故日入于西方昧谷藏於北方幽都而晦伏于半夜炎夏天道南行陽盛之方日出寅入戌以陽盛于隂日影隨長窮冬天道行北隂盛之方日出辰入申以隂盛于陽日影隨短春秋行于正中日出卯入酉而影隨停且南為明都天體所見日月五星至是明顯北為幽都天體所藏日月五星入是隱晦兩都各異天體一也日月五星入幽都隂氣之極所以不明非天入於地也若天入地則地中為日月所照而明何得名地為幽都壤歟雨出天氣霜雪肅寒皆自天降蓋天體陽而其用隂也雲出地氣風煙蒸鬱皆自地出蓋地道隂而其用陽也天不足於西北則陽弱而隂盛西北之化常多風寒地厚天低日氣易及乃生其和以成萬物地不足於東南則隂弱而陽盛東南之化常多炎熱江南陂湖水泉所聚四五月時陽氣上蒸其水脈時復為雨化為寒熱方得其中乃成萬物且春首三陽上出天地氣相交通近水則陽蒸水氣以成煙霧近鹵則陽蒸鹵氣以成雲靄近山則陽蒸山氣以成昏霾皆籠日蔽天春夏則東南氣如煙火秋冬則西北氣如暝此天道化令之常皆無關於休咎也天地只是隂陽二氣程子曰天地一氣而已分隂分陽便是兩物張子曰氣坱然太虛升降飛揚未嘗止息虛實動靜之機隂陽剛柔之始浮而上者陽之清降而下者隂之濁其感遇聚散結為風雨為雪霜山川之融結糟粕煨燼無非教也遊氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不已者立天地之大義又曰造物所成無一物相肖者以是知萬物雖多其實無一物無隂陽者以是知天地變化二端而已又曰兩不立則一不可見則兩之用息又曰一故神兩故化兩者隂陽消長進退邵子曰隂以陽為體陽以隂為體又曰氣自子至午為升自午至子為降子至寅地中升于地上卯至巳地中升于天中午至申天中降于地上酉至亥地上降于地中朱子曰太極分開只是兩個隂陽都括盡天下事物易不離隂陽千變萬化只是兩個隂氣流行則為陽陽氣凝聚則為隂只這一氣消長進退做出古今天地間無限底事來唐孔氏曰隂蔭也隂氣在內奧蔭陽揚也陽氣在外發揚伏羲見隂陽之數畫一竒以象陽畫一偶以象隂陽一而施隂兩而承本一氣也生則為陽消則為隂二者一而已陽來則生陽去則死萬物生死主乎陽則歸之于一也蓋天地是劈初隂陽之氣結成立其大者以為之主便是個胚朴子然後為父為母生人生物千變萬化皆不出此所以充塞宇宙何莫非隂陽之氣都那兩個物事不得造化之初以氣造形故隂陽生天地以形寓氣故天地轉隂陽漢董仲舒始推出隂陽為儒者宗是故儒者知隂陽則知天地而萬事萬物無餘奧矣天地所以為天地論虛谷問云有天然後有地有天地然後有五行地固不能敵天之大水亦不當過地之多以意推之天形之內皆氣也地體浮于天氣之中天氣貫于地體之中海至深至濶猶有地以為之底流至于無地之處則無底而天下之水皆入於天地之氣日一夜一晝行地一次所以助天之氣涸其水以歸于無似勝乎沃焦尾閭之説魯齋答云豫兒時侍東里葉公知天者也問乘楂之事謂水從海逆入天河循環天地中只是許多水往往來來不然水溢無去處則天下浸殺公笑而不答有客從傍代對謂海有沃焦石水至一吸而乾有尾閭穴水至一泄而盡愚曰吸與泄有限而水無窮終不之信及閲隋志謂陽精炎職入水則竭百川歸注足以相補故旱不滅而浸不溢此説固善又遺了氣而説未瑩今先生不取沃焦尾閭而取日衆瞶俱醒真名言也然愚猶又即水與氣之説以求印證焉葛洪釋天曰地居天內天大而地小表裏有水天地各乘氣而浮此以水與氣並言也何承天曰天形正圓而水居其半地中髙外卑水周其下日東出暘谷西入濛汜亦曰咸池四方皆水故云四海此專以水言也虞聳曰天形穹窿如雞子幕其際周接四海之表浮于元氣之上譬如覆奩于水而奩不沒氣充其中也邵子曰其形也有涯其氣也無涯程叔子曰有氣莫非天岐伯對黃帝問曰大氣舉之皆以氣言者也愚謂言水不言氣水從何生言水與氣而不言日二者何從消長合而論之水也氣也日也三者相與循環於無窮此天地之所以為天地也諸儒論天地總説或問天地之形邵子依附之説是矣朱子之説何如朱子説天地間只有隂陽二氣只一箇磨來運去磨得急了拶得許多渣滓在裏面無出處便結成地在中央氣之清者便為天為日月為星辰又説天初生想只是水火二者水之滓腳便成地今登髙而望羣山皆為波浪之狀只不知因甚麼時凝了初間極軟後來方凝得硬又説五峰所謂一氣大息震蕩無垠海宇變動山勃川湮人物消盡舊迹大滅是謂洪荒之世嘗見髙山有螺蚌殼或生石中此石即舊日之生螺蚌即水中之物下者却變而為髙柔即變為剛此數條通説錯了以朱子前説恰似天才初生這一畨至五峰螺蚌之説猶可笑也鴻荒之世至宋不知幾千萬年矣尚有螺蚌哉此朱子篤信之過也殊不知天地乃無始無終者也止有一明一暗耳明了又暗暗了又明所謂萬古者一日之氣象是也到得暗時雖然昏黑不曽墜敗就似人間睡著一般其氣尚流通人睡著之時人雖不知然氣息一呼一吸未有一息之停是以知天地雖昏黑其呼吸未嘗停也月何為昏黑也為無陽也蓋天地到了戌亥純是一團隂氣通是此隂氣煙霧塞了日通無光然雖昏黑天地之形質未嘗敗壞春華秋實之草木並凡有血氣者皆不生了至陽生天依舊開了以天屬陽故也天雖開然陽尚微至寅之時三陽開泰天地交搆所以依然春華秋實生起血氣之物來天地總占惟天為大惟君最尊政教兆於人理祥變見於天文行有玷缺則日象顯示天有妖孽則德宜日新確乎在上而晶明者天之體也隤乎在下而安靜者地之形也地土忽陷萬民離散天色忽變兵戈來侵天裂是謂陽不足君弱政亂而土裂地震是謂隂有餘臣專民擾而兵興地鳴有聲天子失國政天鳴有聲至尊有憂驚天雨草緣信衰所致地生毛人勞兵起之徵地成泉大水而兵亂天雨石大戰而君凶天隂晦而不雨者內亂隂謀圖議地坼裂而有聲者大兵失土不寧山鳴乃有大亂天鼓乃有暴兵地燃乃專恣自災之害天火乃虛偽侈靡之戒民無祿而祿不肖則天雨以土霾賢滅而用小人則地生乎光怪下人將起也踊土如山貴臣將死也木氷而介雨雹雨霰四裔侮而臣后專山徙山崩社稷亡而君道壞雨羽則人相殘食雨毛則兵徭不息雨金鐡殘酷之由雨螽螟貪苛之致雨血則君不親於民雨肉則天不享其德有暴政則天威成灰多隂謀則天雨成墨雨釡甑歲穰之徵降爵錫易王之異雨物則其野大兵雨水則其分大疫無雲而雨者封拜無功不時而雨者賊臣將起霜雪之降苟非其時政在大臣而不在辟天文地理合論嘗聞之易大傳曰天尊地卑乾坤定矣夫以尊卑定乾坤言乎其位之莫同也而又曰天地絪緼萬物化生乾道成男坤道成女乃謂其原于乾坤焉既又曰在天成象正也成形變化見矣言乎其象之莫一也而又曰易簡而天下之理得而成位乎其中矣又謂其合德乎乾坤焉何哉噫吾知之矣天地之間一氣而已而位不與焉一理而已而象不與焉蓋相感者此氣也而相孚者亦此氣也始生者此理也而終合者亦此理也知大易之旨而後可以論於理氣之精達於三才之奧矣今夫天有二極星官有是言也其言曰南極入地下三十六度常隱不見北極出地上三十六度常見不隱彼何以知其出入隱見哉以渾儀之象知之也儀渾之制昉見伏羲而北極之髙下日景之短長星間之廣狹南北東西之方隅咸於是乎取象焉斯其為制也逺矣地有兩界唐志有是言也其言曰自三危至朝鮮為北界以限外裔自岷山至甌閩為南界以限蠻夷彼何以知其南北界限哉以江河之會知之也江河之原論自僧一行北首雍州達為濟瀆謂之胡門南首梁州達于荆揚謂之越門皆有所考而準焉斯其于術也精矣夫二極兩界若是乎其髙且下也然星土九州之屬見于保章氏所載者鄭康成謂其有相係之義焉山川列宿之驗見于法象志所配者李淳風謂其有相應之機焉清寧奠位一氣相承而何有于髙下為哉中國居于二極南界之中又若是乎其大且小也然中州清淑之氣降於山川固不特如嵩髙所云也真精不雜之神稟於隂陽又不特如載記所論也符樞在我司命出焉而何有于大小為哉夫髙下逺邇者位也而位屬方隅幾微相感者氣也而氣通冥極君子不取其位之相懸而惟取其氣之相協於是而推步考測有宣夜周髀渾天之三家焉分星布位有歲星主祀纒次之三説焉司天有考則王朴發斂四篇歐陽所取以附之史者是也指掌有圖則蘇軾聚古今列國可見者為圖後儒間取之以首于經者是也是數子也觀象制厯則渾天為幾分節論道則王朴為近其他見亦不過蠡測之知耳而亦惡能盡夫明白顯易之天耶隂陽之三合吾知其本于天而化于隂陽也洪水之降洞吾知其水退而髙者為墳下者為窞也西北多山故謂天極之加東南多水故謂地維之折水勢盡而沃焦尾閭之消爍則曰東流所以不溢也鶉火加諸午位日月五星隨天而轉則曰天地三光之所以合而順軌也之數義也荒誕怪漫則離騷之天問雖不經而據理消詳則朱子之注釋為有見其他諸問固皆齊諧之所志者也而亦何所窺于杳冥莫測之精乎夫小大方圓者象也而象屬有形孚合潛通者理也而理入無朕聖人不泥其象之相違而取其理之相洽于是而考星宿之行列焉使夫二千五百之可見者皆得以順其軌而左旋也循日月五星之常道焉使夫遵黃道而歷天階者皆得以受事于太微也起于天稷沒于析木此雲漢之升沉也吾識之而分野可定矣繞地左旋一日一周此周天之運行也吾稽之而七政可齊矣噫銅渾轉象玉表求中久矣夫天道之難測也而聖人直以此心之理自然之數知之則失範圍之德其真有以植夫天之維乎弼成五服則侯甸綏要荒之所由分區别華夷則鞮象寄譯之所由設而王制職方之訓其舉乎審方以官人故百職不曠任土以作貢故九賦惟供而周官禹貢之制其舉乎守國莫先於封建也則裂天下之土以封天下之賢興利莫要于井田也則審百物之宜以成四方之利疆域明而樹畜育矣取諸月令以協時序之中本諸王道以臻逺邇之化經緯明而萬方朝矣噫玄圭錫命玉版獻王久矣夫地道之難奠也而聖人直以所性之理當然之道行之然則裁成之教其真有以肇天地之紀乎大抵天地設位則聖人成能人極之功固本于二儀之奠而參贊之妙又豈出於謀猷政事之外哉易曰仰以觀于天文俯以察于地理是故知幽明之故鬼神之情狀此聖人知天之智窮理之事非天下之至精其孰能與於此星野合論今夫天氣也而成文地形也而有理形不得不散而為氣氣不得不聚而成形星辰者地之精氣上發于天者也天有三垣旁列四隅天中極星崑崙之墟也天門明堂太山之精也岍岐雷首太嶽砥柱東方之宿也而蒼龍奠位於左矣太行常山碣石朱圉北方之宿也而玄武奠位於後矣鳥鼠太華熊耳桐柏西方之宿也而白虎奠位於右矣荆山大别岷衡九江南方之宿也而朱雀奠位於前矣星官之書自黃帝始嗣是而欽若天象者代不乏人顧金繩玉策之書不可得而窺也所可傳者天有十二次而日月躔焉地有十二野而郊圻畫焉自今觀之雍主魁冀主樞青兖主機而揚徐荆梁豫莫不有主焉此繫之北斗者也歲星主齊吳熒惑主楚越辰星主燕趙代而鎮而金亦莫不有主焉此繫之五星者也角亢夀星鄭也氐房心大火宋也尾箕析木燕也斗牛星紀吳越也女虛危玄枵齊也室璧娵訾衛也奎婁降婁魯也胃昴畢大梁趙也觜參實沈晉也井鬼鶉首秦也栁星張鶉火周也翼軫鶉尾楚也此繫之二十八宿者也星有七州有九兖青徐揚并屬二州此七星所以主九州而七國亦在其中矣然方隅躔次東西南北每每相背者則賈公彥謂古者受封之月歲星所在之辰其國屬焉似也然有封國自有分星非因封國而始有虞夏秦漢郡國廢置有前後狹廣之不齊則歲之所在不可執泥以為常晉屬實沈者髙辛之子主祀參星宋屬大火者閼伯之墟主辰似也然齊屬玄枵逢公託食既非所主之國而吳越同次燕陳共分又非所祀之專則主祀之説亦未敢以為然矣善乎唐一行有言星土以精氣相屬而不係乎方隅其占以山河為限而不係乎州國庶幾為可近焉故地有水火木金土之形天有水火木金土之星一形一象交而精氣自屬非如地在北而分星之在天者亦居北地在南而分星之在天者亦居南也同一中星也一則取義之不同蓋星適昏中則以星言如星虛星昴是也星不當中則以次言如尾火是也次不當中而適界乎兩次之間則以象言如星鳥是也一則所舉之不同者蓋書言分至之所中月之本也故春夏舉鳥火秋冬舉虛昴是也月令言昏旦之所見月之中也故春夏舉弧亢秋冬舉牛璧是也夫天之髙也星辰之逺也觀緯而審機祥者恆推天以合人然天之理即人之理也因機祥而修德政者當以人而合天何者民之麗乎土猶星之麗乎天也君之統乎民猶北極之統乎星也古之聖人有見乎此道之所在固嘗以經法天矣而猶察昏見之辰知緩急之序觀鳥中則授民以種稷之時焉觀火中則授民以種黍之時焉觀虛中則授民以種麥之時焉觀昴中則授民以伐木之時焉而順五行以理隂陽又剛克柔克迭用以出治焉始之乎情性之正著之乎事為之施措之乎悠久之道動之乎氣機之間則天不愛道地不愛寶河出圖而洛出書矣此豈無自而然哉若宋有善言而退舍齊無穢德而可穰非無一事之徵終為適然之數未敢以為應天之實也星度職方合論周禮馮相保章氏司天察變皆有定職不可易也自是而後各國代有其官而占測之法往往見諸史册至漢諸家濫觴愈極矣且自星度言之靈憲論曰中外常明者百有二十四可明者三百二十為星二千五百微星之數萬有一千二百五十庶物蠢動咸有繫命而星之變昭焉三垣之外有中星者聖人南面視四時之中以布政者也詳著於尚書鳥火虛昴之四宿而月令之中星與大統之中星又不同焉觀孔穎達之疏陳詳道之書可見矣至于經星則二十八宿之分羅四方而奠其位緯星則太白辰星鎮歲熒惑之别盡周天以稽其行經則隨天而緯則順度熒惑者迭見是咎之方尤難豫定者也至若瑞星出于隋志景星周伯含譽格澤是也而中興志瑞十有二焉何其多乎或者謂玄保以下悉係妖星是則各窮所見矣而分野之疑秦漢郡國李唐州縣或係之北斗或係之二十八宿或係之五星蓋因地制有殊而為星應之迥别耳甚者緯象以迎占移地以合術而吉凶之僭其能一定乎日有中道月有九行或出之司天考或詳之王朴之論或定之王蕃之占蓋因度數不齊而為運行之差異耳甚者疑井寬而鬼狹歲疾而鎮遲而占測之宜其能的據乎世久術湮而象緯之學得其要者蓋亦寡矣自今觀之盍因其故而推之乎是故中星也察四仲則據堯典之詳而孟季則本月令之演經星也觀方位則審一定之則而羅布則驗所繫之星緯星也而順逆休囚旺相徵焉瑞星也而遲速經歷色象昭焉九道也據黃道以察其紘而七政不愆分野也據限度以明其地而二十八宿不亂要而論之各有一定之故繫象環于九道度數錯于周天吾知黃道大差九道皆定斯其簡明之法耳故先儒曰不難于視赤道而難于規黃道亶其然乎能循其故而星變之周旋于外者凌歷薄蝕飛孛順逆雖若不齊隨所值之方察各分之地一推算焉而往來愆忒之應莫能逃矣又何必稽之玄逺然後謂之觀天文也哉周禮司徒職方氏掌地制域皆有成規不可易矣自是而後歷代互有攻伐而經理之宜每每垂諸編謨至元狩以來土地愈廣矣且自外國而言其應則曰西盡于闐龜兹東極夫餘挹婁北窮樓蘭南究瘴海疆域不下數萬餘里釐為郡邑設以關津而地之勢極焉是故朝鮮破于漢髙至武帝開之而立玄莵樂浪之名隋令漢王討之唐令蘇定方征之至李績滅其國而暫疑焉雖處置曲盡具方而叛合不常終至疲中國而無尺寸之利南越之地漢分儋耳珠崖南海蒼梧合浦鬱林九真日南等郡而交州刺史領之武德有總管之稱至德建都護之府至曲承美奪其地而賈亂焉雖防禦各有其道而繼代不一終至事逺征而無輸服之誠左將之擊可謂盡制置之法矣卒之夏參來降而增真蕃臨屯之部豈中華之力果能致之乎亦其敵之相疑成之耳朱鎬之使可謂得撫安之策矣卒之黎桓肆虐而來番隅歐越之侵豈朝廷之命不足制之乎亦其蠻之習詐致之乎又夷地逺而經絡之久得其實者蓋亦鮮矣盍因其勢而究之乎是故量逺邇之宜守要害以厄其衝慎邊防以通其使審內外之辨富民力以固其本􅊩中土以納其降或航海也嚴大宗之禁勿使之知險夷虛實之情而南雍鴨緑牙校不得以私通或諭蠻也謹貞觀之符勿使之行欺詐異同之術而渤海交州夷使咸懷其至信要而言之各有不易之勢也若事外而忘內虛己以制人吾知衆不可使地不可耕斯其財力俱困耳故先儒者不難于勤逺而難于篤近信其然乎能究其勢而土地之控制于外者廣狹奢儉理亂貧富雖若不齊隨五方之制鑒絶域之圖一酌量焉而緩急輕重之理莫能越矣何必謀之遐徼然後謂之知地理也哉是故天文之觀觀以故也而莫詳于淳風之渾儀一行之遊儀而已矣其他隱樓覆矩鐡極銅匭各有一時之妙而占測之法皆出二子技藝之餘地理之察察以勢也而莫備於商之四方誥令周之王會圖而已矣其他拓邊啓釁事逺勤兵各精一時之業而綏懷之道罕出二代包羅之外由是觀之牽合事應之變徼幸分外之圖皆昔人無益之舉耳而豈所以垂謨後世也哉圖書編卷二十八
