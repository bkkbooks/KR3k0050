body:
  text: 圖書編卷四十三明章潢撰天下各鎭各邊總叙大生者天地之德好生者帝王之心觀春夏時萬物區萌孕育長養條達生意芸芸洵可覩也及霜雪沍凍物各歸根復命于秋冬謂非化工之生生不息哉知天地則知帝王矣是故自昔皇王本其好生之心視萬國一體四海一家浩浩乎統中夏外夷悉徧覆包涵之無外也然於中國黎庶制田里立學校正德厚生如保赤子其仁愛之也至矣乃於各鎭各邊則必宿重兵固垣堡以峻内外出入之防以嚴控馭征伐之法豈驅逐外視之哉凡臣服賔貢莫不禮遇優容寇則撻伐之不爽順則防禦之必周使彼畏威懷恵正所以一視同仁各安其所也是不特北貊南倭山岡嘯聚各立總府都司以為之鎭壓或中原稍有險隘可虞即設衛所以潜消其不軌之謀聲靈赫濯孰非鼔天地肅殺之義以成其生息之仁哉當事者若徒以荒外獷悍視之或喜功生事黷武開釁葢亦不知朝廷建置之初意云天下各鎭各邊總說春秋大一統故設險守國俾内率治而外威嚴聖帝明王率由此道我高皇帝克定前元統一寰宇經邦畫野設官分職居中制外小大相維奚啻衆星拱北辰哉即於遼東宣府大同延綏建立四鎭後於薊州甘肅寧夏分布三鎭列聖相承又以山西巡撫統三關陜西巡撫統固原共為九邊然又合薊遼合宣大合寧固莊肅為三大總督沿邊屯聚兵馬脩築墻堡設立烽堠所以防北邊者亦何備哉他如雲南兩廣南贑鄖陽各設督府兩直𨽻十三省各設都司萬全東昌等處各設行都司或於各郡邑險隘所在各設衛所并設兵備以統轄之要皆因其地方要害輕重故屯兵多寡以抗其吭而撫其背耳若夫沿海自瓊州以達遼東又各設衛所以扼其島嶼所以備南倭也近於浙直亦建督府以總海防惟淮揚總府雖專司河漕而歲集運軍數萬亦以豫為臨清江淮之防焉此其建置扼險據要棋布星列如臂指相使枝幹相承可謂極周宻矣然自大寧失而薊州宣大不相聨自河套失而大同榆林不相聨如此而深為萬全之謀也得乎哉至自薊以達遼惟恃山海關一線以相通自貴州以達滇惟恃九驛以相達設萬一中途衡阻則遼東雲南莫得而救援之矣然相擇險要聨屬川貴雲南跨衆山以為一總聨屬登萊遼左跨東海以為一總是亦一策矧漕山東可以實遼萬一咽喉梗塞亦可由遼海以達燕此把人之憂或有不可忽者噫各邊鎭宿兵數萬歲給芻粟數百萬而中外財力亦既殫竭矣當無警時倣趙充國興北方水利屯田以足兵食不待其人以行之哉九邊圖叙國家克定前元混一寰宇東至遼海西盡酒泉延袤萬里中間漁陽上谷雲中朔代以至上郡北地靈武臯蘭河西山川聨絡列鎭屯兵帶甲六十萬據大險以制諸侯全盛極矣初設遼東宣府大同延綏四鎭繼設寧夏甘肅薊州三鎭專命文武大臣鎭守提督之又以山西鎭巡統馭偏頭三關陜西鎭巡統馭固原亦稱二鎭遂為九邊𢎞治間設總制于固原聨屬陜西諸鎭嘉靖間設總督于偏同聨屬山西諸鎭又設總督于薊州聨屬遼東鎭戍益嚴宻焉然自大寧未棄都司洪武初設者屯重兵鎭之其地遶出山後遼東宣府大同勢相聨屬自偏頭關逾河跨西北守在東勝在今河套之北近受降城即其地河套之南又有榆林今在延安府綏德州北境實相掎角後棄大寧移置都司於保定而宣府遼東勢始分矣正統以來有司又失守東勝套寇乃得逾河而偏頭關迤西遂有失陷之虞因循既久有司又不肯以時巡套東勝之鎭併近内地形勢愈弱於是所賴以衛京師防邊患者不過遼東宣府大同榆林四鎭而已夫四鎭所領各堡亦有精壯茍足其糧餉守備等官勤加巡哨為之牽連援救自足以各守地方督率耕牧從古備邊之道也今則撫臣假調操以自固夫鎭城本為牽連所領各堡地方令有統屬而設今凡各堡精壯士卒盡聚鎭城名曰調操以習攻撃實乃自為備禦之計遂致各堡地方徒以老弱疾病者守之敵冦縱横無復能為耕牧者矣將帥假按伏以為奸夫精壯既畢集于鎭城矣又每假按㐲為辭調兵四出以致各堡不得備禦而堡中老弱反受供億騷擾之苦軍士乏正支之糧而將帥等官反以尅減行糧為務攻守無策而偷惰相襲文法太宻而巧避益多斥堠不立而勇敢未倡力賞不明而激勸每爽方今沿邊之守有營有堡有墩有空有巡探有按伏有備禦設將領以總其權分遊擊以備調發重總以司機宜防守之道備矣而地方抄虜之失未見息肩此其故何也兵法曰善戰者先為不可勝以待敵之可勝夫謹斥堠練士卒據地形利器械信賞罰厚儲峙先自治者皆自為不可勝也以是形人而後敵無可勝之兵今之將領安居而巡警無方精銳買閒而疲病乗鄣不為不可勝之算而勤于勾當詞訟若有司然不練之兵無謀之士有生之氣無死之心偷惰相仍自衛且不遑而况驅之使戰哉假令五路備禦各率所分部于近邊要害無影射無買閒無役占無市法身先士卒捍衛有紀練習有時可以横行匈奴矣夫墩堡者烽火之緩急也今之逺斥堠時巡邏嚴哨探本以防範也即不幸有卒然之慮過而掠之驅而殺之則死者不論其功而守者先當其罪降謫戍遣而刑辱之苦尚慘然人見以此逮罪也則舉墩堡之人巡探之卒環而坐之堅城之中溝壑之間出入若罔聞知即虜抄掠襲其老弱以還䘮失損傷匿不以聞虛文巧飾扶揑勘報則終為無事矣夫繩人以法而不調其情何乃自苦取罪哉夫法以防奸情以逮下可相循而治也今不縁情以論法而拘拘焉惟勘委是聽人且求避之之術矣爵賞者奔走豪傑之機非明與決亦徒焉耳乃今冒功有法買功賣功有法其他條格甚備矣而邊人之親冒矢石幸而成功者盻盻焉無所控訴陞職世襲率勢豪紈綺之徒萬一獲紀錄而又苦於勘驗之搜求刑法之逼迫打㸃之索需日益不足已是故恩每濫於平人而威恒加於下卒此之謂廢賞而失刑矣是故文法不宻則巧避之術生功賞不明則偷惰之習長而斥堠之不立勇敢之不倡自上玩之也邊事安得而不廢乎地方屢失糧餉屢乏實此之故矣今惟痛革其敝堅壁固守勤加巡哨為耕牧長計而無狃近利乃可為也其治蠻倭之道則在率土著良民得以自相守望一或不支為之連屬附近地方策應之如湖廣之永靖廣西之狼兵置之不復徵調民足相死兵不毒民無貪功之文臣無貪利之武將則邊鄙晏然矣以上論按伏乃今日之弊耳又聞兵無定形古人云五指之更彈不如合拳之一扶故擇要害之地選良將統精兵數萬賊來分散搶掠聚者不過數千我常以數萬逐數千其算不為不是但今邊將多不知兵所為俱被賊誘而覆之故將不得人不可調操也又聞兵忌形露賊來不知我之虛實必攻墩誘我我不往應但分兵按伏於屯堡或依山林或阻溝澗乍隱乍見使賊見我堡屯處處有兵而不露多少之形攻墩又不往應自生疑懼矣及賊散入屯堡又被我伏兵屯斬彼敢深入乎今或一聞賊來攻墩即發兵擡營往救賊返得以設伏誘我縱我不為所誘彼以精卒數千絆我於外即堡塞之内盡為蹂踐矣若使我兵不受其絆於外彼敢無忌憚若是乎故將不得人亦不可以言按伏矣又聞近之善守邊者每十餘墩必總委一官提調十墩之中擇一可守者先儲米數石水數缸賊近則歛十墩之軍共處一墩止留善走者一人舉煙放砲而又潛來共墩而處賊若攻墩不分有軍無軍墩分俱寂然無聲彼攻空墩常多半日之勞而卒無所攻而有人之墩則輒被木石擊傷而墮相繼來者見我各墩煙火齊舉即莫測孰為有守而自畏矣所謂以靜制動以逸待勞常形人不形於人者此類是也然此法須先逺探俟賊往之處我乃提兵間道而往復於要害誘而取之乃為得策今皆不揣敵情不分竒正一槩鳴鼓遽出兵未集而形已露曾何益乎故將不得人凡調操按伏反為邊防弊政故不得不痛革者况帝王之道以全取勝此固在所不講者也九邊總督分地駐兵遼東薊州宣府大同延綏寧夏甘肅皆文武大臣鎭守提督又山西鎭巡控偏頭三關陜西鎭巡控固原共為九邊而總督之設則巡撫以下皆禀受節度東路宣府大同一員西路陜西延綏寧夏甘肅一員葢黄河自金城出中國經戎地東行南入中國在大同西界偏頭河曲延綏東界府谷神木之間故西路有警則宣大遊兵駐河東濵東路有警則延寧遊兵駐河西濵戎入套則西路之警出套則東路之警西路治固原在延慶凉洮中東路往來于宣大近薊遼則專防京後九邊要害國初以遼東大寧宣大寧肅為六鎭其後更置薊州榆林固原而九邊聨絡建帥屯兵城守特重觀之地勢可察也已是故明於天地之故而後防禦之策可得而施也夫遼陽城衛勢成藩蔽三岔河南北舊城在焉薊州外邊大寧鎭立而山海關羽翼三衛在焉自舊城三衛棄去宣薊隔渉從此多事諾延部落累肆侵噬漸不可長雖然舊地之復未易議也若黄花鎭擁䕶陵寢潮河川宻邇邊關非召兵墾田積石見橋難以守矣宣府漢之上谷土木之變獨石不支而此地益重形勢既殊經畫宜備若補長峪城以鎭邊城之募軍脩浮圖峪以嚴插箭嶺之防守不可已也大同古雲中之地川原平衍大寇屢至今五堡既經脩築高山聚落亦增戍加舊矣若及其時申久廢之法補失額之糧革搶兌之馬則偏頭寧武鴈門三關平定平逺長勝諸堡與春長峪之脩築固可得而議也延綏襟帶千里當一面之險自徙鎭榆林内地乆安後敵據河套邊境漸嚴軍用告窘議者謂青山隘口為敵患必由之地若屯置軍器脩築邊城而綏德近璄沿河郡縣皆徵芻糧本色水陸並運榆林可長無事矣寧夏古之朔方花馬池一帶舊為敵衝近因前後大臣建議户曹設官撫臣駐兵亦既得地利矣若賀蘭山諸口盡建墩堡鐵柱泉近地設兵據守不惟得阨吭先制之策且榆林應援相及亦常山蛇勢也甘肅漢之河西四郡孤懸幾二千里經制長策自古已難哈宻藩籬陷於土魯番久矣恢復之議自先朝大臣馬文升許進討平之後又經彭澤經畧王瓊撫綏竟不能復葢在彼則䘮亡殆盡而在我則勞費無資此當在所緩也明矣其議復本色以給邊寨之儲則憲臣之策是也增修嘉峪關以為内外之防則輔臣之策是也固原古開城之地一自和碩入掠遂為要衝𨽻以三衛而守之重臣屹然為巨鎭矣然山後之蕃踏氷馳踐則蘭靖安㑹之間便為禍階而西鳳臨鞏之卒多未經戰說者謂不添沿河之堡不屯常戍之兵則固原未可息肩也眞知言哉夫天地之形勝略備於此矣然必明於防禦之策而後天地之勢可得而用也九邊總論或有問於論者曰今天下之患何居論曰北邊最可憂餘無患焉曰何以為可憂也曰我太祖皇帝迅掃之後百餘年來生聚既蕃侵噬漸近開平興和東勝河套之地皆為所據額森和碩之後益輕中國恃其長技往往深入風雨飄忽動輒數萬我軍禦之不過依險結營以防衝突僅能不亂即為萬全視彼驅掠莫敢誰何彼氣日驕我氣日奪絶無堂堂一戰者其零騎出没雖稍有俘斬亦已甚難葢衆寡之勢殊强弱之形異耳所幸其欲易饜無有他志計日數程不能持久每一大舉曬肉晾馬頗亦勞費若得失不讐則懊悔無已以是邊境得茍免焉近年以來既連得利心益歆豓而濟農者復跳梁其間最稱雄黠控弦之士餘二十萬益以中國驅掠逋逃之衆竊知内地虚實若一旦改慮不為劫略之計則久敝之鎭豈能外寧供餽之擾或生内憂誠不知邊事所終矣曰今之邊備何如曰地方殘破兵馬單弱邊臣欺玩芻糧匱乏法令縱弛在處皆然是則所謂最可憂者曰孰能興之曰我聖天子能興之何以能興曰聖天子注意所在賞罰必行謀國者不敢因循任事者不敢欺玩是以能興何以興之曰重巡撫將臣此第一議餘皆待其人而行者耳何謂重巡撫一曰愼其選二曰久其任三曰假其權四曰明其功罪夫邊方巡撫責任至重不同腹裏必有變通之才堅忍之性奮迅之志而後可以有為先年最重其選不肯泛授後則視為常階不論所宜倘失其人則非徒無益而又害之愚謂於無事之時先令科道官及吏兵部各用所知以備簡用遇有員缺即於所舉之内酌量才力㑹推選補庶衆論攸同眞才効用是為愼巡撫之選夫軍人久􅊩而後威惠洽事久練而後劑量審功久積而後庶務成今之巡撫甫至任而即望遷官焉得其固志無固志焉得有逺圖無逺圖焉得有善政無善政焉則朝廷將焉用彼也邊事因循而廢正坐此弊若自今限年為例非兩考者不選六年之内利害切身規避無由雖欲不極力以為之不可得已是為久巡撫之任選慎矣任久矣而信之不專終亦無益近日邊臣奏議多見齟齬而言官苛舉細過悍將動輒抗衡每每令其束手是雖有頗牧之才何所用之必也朝廷之上不惑浮議本兵之地推以同心言之得行行之得至無牽制無掣肘庶幾其有濟乎是謂重巡撫之權權重矣而勸懲不立何以奔走天下之豪傑願著為令凡巡撫三年以上兵食有賴地方無虞者加陞正卿職衘仍令巡撫六年以上即取掌臺部其失機僨事即從敗軍之法如先朝制縱得末減不廢禁錮如是則人將憂其敗而希其成邊防大計自知所以圖之而所謂最可憂者不煩聖主之外顧矣是謂明巡撫之功罪何謂重將臣一曰求實用二曰愼武舉三曰廣任使四曰懲欺玩夫將才所須本將戰陣况於邊方殺賊之外豈有别事近年倡儒將之說以致武職不務本業競為浮誇雅言而矩歩繪句而摛章撫按以是為薦揚本兵因之而任用墮國家神武之威銷英雄感慨之氣為害非淺况鸞刀解牛豈其適用急須洗此頹風還其本業作之新之如式怒蛙寧粗直猛暴之失勿從容文雅之是庶得跅弛之士克廣鷹揚之任矣夫是之謂求實用且武舉所以選將才也今退學生員縁此以影避差徭白丁快餘假名而希求進用豈有韓彭之良在此闒茸之内就使僥倖掛名便無可用之地邊方賛畫騷擾居多掛印登壇從來未見不若罷去閒人止許武官應選仍分邊方腹裏如㑹試之南北卷更多其名數以廣賢科勿偏重浮詞以遺驍果夫然則既是見官即可推委亦自知重不肯茍同將邊方腹裏均有所賴得人為盛矣夫是之謂愼武舉又國家推用武職止許指揮以上官而千百户不與將無隳惰人心阻遏賢路歟使得程工積事以次而升既足任使之資亦廣忠良之勸不亦可乎夫是之謂廣任用先朝軍機法重邊官不敢欺蔽否則禍出不測今乃造為活套規避任情巡撫將臣同然一律本屬陣亡而云囘營身故本是敗失而云走死官馬襲殺老少而云入寇斬獲戎馬在門而云追襲出境殺掠至萬而不以聞連城陷没而報無事死者含寃而不蒙恩生者憤懣而無控訴若不痛懲此弊賞罰不明則邊事未可知也必申嚴敗軍之法更為欺玩之例使將臣畏而懼敗敗而不敢隱則警聳之下人自求全邊事或可興矣夫是之謂懲欺玩嗚呼百歩之矢激於寸括千金之運轉在隻輪今之論者孰不知巡撫將臣為急哉顧言之不得行行之不得至茍簡因循遂至於此若非聖天子銳意講求大臣極力贊襄必賞必罰一洗積習之弊則雖言官諤諤朝議諄諄而因循之根終不可拔茍簡之為又復延蔓矣如九邊何哉如九邊何哉語云根本在朝廷此知要之言也敬附于後聊以見臣子期望之心焉耳統論九邊古今禦戎之策無過攻守二端守藉地形攻資兵力二者常相為重不可偏也我國家建都燕京防邊大計視古加詳自東至西綿亘萬里曰遼東曰薊鎭曰宣府曰大同曰三關曰延綏曰寧夏曰甘肅此九邊形勝大略也每邊各設重兵統以大將副以偏裨監以憲臣鎭以開府聫以總督無事則畫地防守有事則掎角為援地形兵力可謂備且周矣但承平日久舊制漸渝不無可議者自大寧都司之内徙而左臂單寒自遼陽舊城之外棄而守望勞費開平移而上谷之烽火益逼東勝廢而三關之設備愈嚴今且不守偏頭而守寧武矣河套住牧鎭逺缺防而朔方之形勢虧矣哈宻折入土魯畨而河西之孤懸益甚矣大抵形勝日縮邊患日近猶撤藩籬而退守門庭居室者其能晏然高枕乎又調入衛之兵以為常則踐更疲命是自耗之術也設擺兵之卒以為固則力分推諉是自弱之道也募南兵暫為技擊之倡可矣還當練土著為久逺之需築墩臺用壯阨塞之觀可矣還當繕城堡為清野之計丁壯則困于修築隱于占役而取數于荷戈矣糧餉則尅于樁頭苦于折支而難望其宿飽矣方今政治威嚴諸部效順外寧内安此一時矣但貢市利歸於彼而部落尚挾狼心馬價暗償脂膏已竭金繒日索嗜欲何厭板升聚毒慮有潰決之虞土蠻垂涎慮有糾合之舉未雨而懷桑土之謀既濟而謹衣袽之戒今日所宜亟講而善圖焉此春秋意也邊防形勝天下形勢得之者勝失之者敗然有形勢之體有形勢之用何謂體地里險隘輕重之分是也何謂用人事規畫緩急之序是也孟子曰天時不如地利地利不如人和地利者形勢之體人和者形勢之用也今夫輿地河北重關隴河南重襄鄧又太行為華夷之界陘嶺通中國之門所謂形勢也體也而酈食其謀撓楚則曰塞城臯距飛狐趙渉劃制七國則曰走藍田出武關亦所謂形勢也用也由是觀之則古今之形勢可知矣輕重之分緩急之序可按而舉矣是故險阨莫重於西北而都邑所在則尤重經理莫急於邊塞而都邑所蔽則尤急智者為謀不過此而已矣嗟夫江都之禍已兆而高麗之師尚陳漁陽之釁既萌而南詔之兵亟䘮古來東南之夷亦惟中國務廣崇侈者事之爾乃若周之玁狁漢之匈奴唐之突厥宋之夏元昊類皆盛控弦以為武恣荼毒以為虐中國之人奉將養兵閉關飭塞竭財力疲奔走以事之强者僅勝弱者削壊譬之懸千鈞以朽索而坐卧其下支撑稍弛則碎首立見禍至烈也周人之為謀也伐太原城朔方後嗣忽之其禍至於攻驪山覆宗周漢人之為謀也始秦中實塞下後嗣忽之其禍至于主下殿魚羊食之唐人之為謀也斥磧北置都䕶府後嗣忽之其禍至于掠都邑焚宫闕宋人之為謀也復燕雲城靈武後嗣忽之其禍至于輸歲幣割三鎭而南渡而亡然則太原朔方周人之形勢也秦中塞下漢人之形勢也磧北都䕶唐人之形勢也燕雲靈武宋人之形勢也本之地利以為險阨資其險阨以為戰守是固所謂體矣而或曰太原朔方或曰秦中塞下或曰磧北都䕶或曰燕雲靈武則又以都邑不同境土有異審其緩急以為應酬所謂形勢之用也始而謀之强者僅勝嗣而忽之弱者削壞必然之理也我朝之都燕也葢與古不同稍北於周漢而大勝于東漢趙宋矣夫周漢建都西北地資建瓴之險人藉風氣之勁天下莫之競焉東漢宅雒已失全勢宋人捐燕雲則又無限敵之防故卒不能為守我朝都燕雖風氣之禀士馬之强不及周漢然據險防敵居外馭内其視周漢一也故自其常論之則京後為最急宣大次之遼東次之陜西又次之去京有逺近也夫京師為最急則大寧之内徙三衛之盤據不可不講也宣大次之則獨石之孤懸豐勝之淪没不可不講也講大寧則宣薊無阻隔而遼東之右臂伸講豐勝則山陜有交應而甘肅之左臂伸此立國之宏規保安之上畫也而永樂宣德之間但知烏梁海之誠欵開平之艱逺豐勝之丁口不立甘心棄土略不顧惜得非往事之恨乎自其變論之則大寧不可復而京後之重垣宜設宣遼不可合而和坦諾延之交搆宜防開平東勝已淪異域而宣大之士馬不可一日忘戰而成化𢎞治之間但知和碩之通貢山海之征商宣大之鑿塹築敵臺京後之防一不措之籌策又非往事之恨乎夫始也藉開創之威東斥大寧西闢豐勝無難也繼也藉生養之富大垣京之盛兵宣大無難也時日因循不以為意偷玩既久釁孽乃生彼犯太原則増忻代澤潞之兵而乗寧雁之塞彼犯洪蔚廣昌則城宣府之塞而弛東北之防夫阻太原之寇在力戰于大同偏頭之間恤洪蔚之擾當不忘乎潮河川黄花鎭之備増忻代澤潞之兵則度支急弛東北之防則畿輔震近年之經營得微亦有過乎嗟夫白刃在前不顧流矢寇既中宣大矣垣宣大可也明哲所燭防患未然因垣宣大而倂垣京後亦可也積薪必燃防川必决以宣大為餌而先垣京後亦可也悉力宣大置京後不講則所謂輕重緩急之間失算多矣於戲往有恨無能追也近有過亦幸無大失也今宣大之垣役告成而隆永之荼毒極慘懔矣大城京後以奠金湯宣大以戰而為守京後以守而為戰宣大遇秋則乗塞餘時有入與之戰京後有警則乗塞餘時分為畨休以習禁軍之勞逸斯皆所謂即體酌用備形勢之道也國朝防邊節略高皇帝永清四海傳檄大定魏鄂逐于前宋凉蹴于後當是時元運已衰然猶㐲我障圉掩我將校皇子元侯作鎭開封周匝三垂選練士馬日夜防警羽檄南馳殆無虚日高皇帝垂訓後皇時備西北猷慮逺矣靖難之後臚朐挫跌王師不還文皇赫怒仗鉞出征雖常蹂北庭降名王俘其輜蓄而我之財力亦已大窘至于末歲猶議勒兵廷臣力阻上意益堅司徒匏繫于掖庭本兵雉經于私第榆木之變雖悔曷追宣宗時出近郊大蒐講武喜峰之役薄伐山戎而已正統十餘年間貢使往來好語相怵謾和親于漢姬委賜物于宋幣戎心狡焉覬覦非望重以奄寺鴟張柄臣首鼠垣墉既潰羈靮弗䖍卒致六師失次將相輿尸駱馬被遮四郊多壘三陵徹祀萬雉幾摇頼天之靈景皇知人善任文武大臣艱難宣力禹鼎遄歸堯封如故彼亦散亂叛殺相尋我得寧輯顧其書詞桀傲使价驕凌稍示包荒治以不治爾天順時我懷平城之警彼遘呼韓之隙雖有寇掠亦能悍禦迨至成化諸豪競起分部爭雄各據水草殘我邊郡河套沃土棄為巢穴威寧之捷足稱敵愾顧兹讒口反謂貪功刀筆因而舞文干城為之解體不惟大寧興和開平已非我有朔方河南亦非職方之舊而河西遼東徼外城郭諸國堡塞奚夷漸亦攜貳於是並塞萬里所在將屯官益多力益分財益匱中國益困以故𢎞治初年頗搜往牒謂洪武永樂皆嘗遣使穹廬至廑書勅錫之綺繡縻以官封茍駕馭有方彼狎其餌吾峻其防亭堠不驚耕牧自便遲以數年彼將耗鈍我將富强此計之得也於時許進行之大同三年三貢費纔十餘萬金大同東西五鎭皆無寇患已而議者又謂㓂入邊塞經關隘扣闕庭知我地利闞我兵力布哈額森前車不逺我是以閉關却貢專意内脩己未庚申妖纒昴畢上谷雲中慘被荼毒孝宗發憤召見公卿即議征討劉大夏面陳利害僅遣柳棘之師坐收薇杜之績不然幾考庚寅之故不貽己巳之憂乎比至正德河東陜西鴈門以北歲有邊患隱敗冒功上下欺蔽脩攘無策盗賊四起宗藩再變世宗躬神聖之資乗鼎革之㑹政治威嚴化洽内外維茲小警曾何足慮或謂近日北敵解讐結好更入迭出罷我奔命且進退分合頗有紀律而又納我逋人巧為間諜混迹市㕓至窺京甸往歲越大同逾鴈門經太原掠上黨闖平陽近復度紫荆逼居庸秦中隴西去京已逺即殺掠人畜數萬不以聞也乃役役焉議兵食戰守通貢互市亦其細耳嗟乎三代之盛漕輓未及於江南五季以還征調不施于薊北漢開疆于衛霍唐蹙國于安史豈若我朝山川綢繆已得天險營鎭聨絡更盡人謀節其貢賦有恒足之才總其紀綱無專命之吏葢自生民以來未有盛於今日者也善為國者特加之意而已邊防考漢武帝時衛青出雲中西至高闕遂至隴西取河南為朔方郡按朔方郡即赫連勃勃命呼干阿利蒸土築城之處所謂夏州是也葢此地在漢已有城而赫連夏乃於此建都也隋以朔方地分置勝州榆林郡唐開元中置朔方都大總管兼安北都䕶唐末拓跋思恭鎭是州唐賜姓李五代李仁福彝超繼領節鎭號定難軍宋太平興國八年李繼捧來朝願納土其弟繼遷不樂内附亡命嘯聚擾邊太宗以夏州深在沙漠奸雄因之以竊據欲墮其城吕蒙正亦言遂詔廢之遷其民于銀綏其州兵不徙相聚置營仍曰夏州眞宗咸平中繼遷死其子德明欵寨附朝廷假以本道節制夏州遷懷逺鎭改為興州居之即今寧夏衛是也德明之子元昊僣稱夏帝史謂其境土方一萬里河之内外州郡凡二十有二河南之州九河西之州九河外之州四河西及河外之州今多存焉其河南九州雖其一二可考而其七者不知其所在意者皆在兮河套中耶洪武之初西北邊防重鎭曰宣府曰大同曰甘肅曰遼東曰大寧永樂初革去大寧惟存四鎭寧夏守鎭肇于永樂之初榆林控制始于正統之世其餘花馬池等堡皆是邊境多事之秋創置者也方今處置固已嚴宻但所謂黄河套者尚若闕焉何也前代所以廢棄之者以其邊城之防守在内而其地在外故也今日吾之守鎭顧有在河套之外者秋高馬肥風寒河凍彼或長驅而入屯結其中以為内地之擾幸其素無深謀忽往忽來有獲即去似若無足為意者然患貴乎先防彼所以從入者必有其路所以屯聚者必有其所所以食用者必有其物于其所經行之路則預扼其要衝于其所屯聚之處則先據其形勢或謂置為城守則餽餉為難將至于漢人之勞費盍思赫連之建國元昊之列郡皆在其地何從得食乎宋史明言其地饒五榖尤宜稻麥宜遣通識大臣躬􅊩其地或于河之南築城池以為之鎭遏或于河之北據要害以為之扼塞或沿河之壖設營堡以防其徑渡事必出于萬全然後行之可也魏中書監高閭表長城有五利罷遊防之苦一也北部放牧無抄掠之害二也登城觀敵以逸待勞三也息無時之備四也歲常遊運永得不匱五也按我朝建都于燕切臨邊境太行西來逶迤而北歴居庸而東極于醫無閭為第一層之内藩籬也又東起舊大寧界越宣府大同代州之境而西至於保德州之黄河又為第二層之外藩籬也其内之藩籬天造地設重巒疊嶂以為國家北門之屏蔽易所謂地險者也若夫外之藩籬固有天然之險然其間多有間斷之處因而補其闕塞其罅以為外寇之防則又賴乎王公之設險焉臣聞雲代一帶其設墩臺以守候有大小邊大邊以謹斥堠小邊以嚴守備今城于大邊墩臺之間空缺之處因其崖險隨其地勢築為城墻以相連綴實為守邊長久之計高閭謂六鎭東西不過千里一夫一月之功可成三歩之地不過十萬人一月可就臣謂今山後沿邊之地東起永寧之四海治西抵保德之河壖自東而西計其所長一千三百二十里而已其間墩臺相望遠者十數里近者數里就其空處而加築塞之功延引以相連接亦無甚勞費者昔人謂一月可就臣請以三年為期成此千百年莫大之功唐高祖時突厥歲盗邊于筠請于五原靈武舟師于河扼其入温彥博曰魏為長塹遏匈奴今可用帝使桑顯和塹邊大道大發卒治戰艦按據于筠彥博之言則是迤西黄河固可以行舟而沿河之地亦可以塹也朔方軍與突厥以河為境張仁愿請于河北築三受降城絶彼南寇路唐休璟以為兩漢以來皆北守城今築城彼腹中終為所有仁愿固請中宗從之六旬而三城就以拂雲為中城三壘相距各四百餘里其北皆大磧也又於牛頭朝那山北置烽堠千八百所自是突厥不敢踰山牧馬按朔方軍即今河套地也唐初與突厥以河為界則是固常守河矣而張仁愿所築三受降城皆在黄河之北大漠之南史謂中城南直朔方意今河套之地西城南直靈武意今寧夏之地東城南直榆林意今綏雲之間今其故址無可復考說者多謂東勝州即古東受降城所在其地今有斷頭山地最腴且宜牧馬疑即史所謂牛頭朝那也國朝設東勝衛於此其後移于内地宣德正統間往往有建議者欲復其故然而卒不果焉夫自古守封疆者必據險阻然守險也不守其險而守於險之外若即險而守則敵與我共其險矣是以古人之守江也必守淮而河亦然唐人禦突厥也始以河為界其後張仁愿乃建三城于河之外焉是即守江之意葢擇其要害之地扼其吭而折其脅是以唐自有此城之後朔方益無寇嵗省費億計减鎭兵數萬此其明驗也宋仁宗時范仲淹言攻守二議終曰國家用攻則宜取其近而兵勢不危用守則必圖其久而民力不匱又上和守攻備四策其守策曰彼戎大舉我若持重不戰則彼之重兵糧草無所給牛羊無所獲不數日人馬困斃彼之重兵不敢越險又未能决勝必不得已而散兵擄掠我于山谷村落中伏精銳以待之使散無所掠聚不得戰欲長驅深入我則使諸將出竒以躡其後欲全師以歸我則使諸城出兵以乗其弊此守策之要也其攻策曰請于鄜延環慶涇原路各選將臣以為三軍觀賊之隙假若鄜延一軍先出賊必大舉來應我則退守邊寨或據險要不與大戰不越旬日彼自困斃勢將潰歸則我懷慶之師復出焉彼若再圖㸃集來拒王師則又有涇原之師乗間而入彼則奔命不暇部落攜怨則我兵勢自振此春秋吳用三師破楚之策也廢東勝則大同寧夏不為援廢大寧則遼東宣府不為援以榆林援大同寧夏則偏頭關花馬池等處所以孤弱以諾延三衛代大寧則喜峰古北口黄花鎭等處所以單薄近來益貢之傲雖小而急意者諾延不可不設圖以處濟農之患雖緩而重意者河套不可不俟時而復城塞說本朝與秦漢之緩急可得聞乎曰秦漢所急在西北上谷北平為緩我朝所急在東北甘肅寧夏緩也秦漢急西北故秦塞起臨洮漢武置朔方緩東北也故誘匈奴入則于馬邑開樂浪𤣥菟當時非之我朝反是然則我朝長城應始東北乎曰應始神京夫神京在燕大寧淪失天壽與異域為隣宣府與遼東隔絶汲汲圖營以實後皆猶恐後也是故開平之轉運難繼則當徙三衛以易大寧大寧之巢穴不除則當通宣遼以為絶塞失時不舉策之可憾者也何失時也曰徙三衛當在國初為絶塞當在成化𢎞治之間何也曰國初三衛之置根本未深而開平之廬舍未廢且北寇達道三衛得以有之以此相易不為難也成化𢎞治之間北人數貢邊境罕聞年數屢登塞下殷富彼時若城京後彼既不與我近我亦力足辦之紆直進退即少有渉于三衛三衛蔑視之也今三衛視大寧為樂土而開平限入北庭非惟我不能以大寧為我有且亦不能以開平與三衛矣又邊警所急愼在宣大禍發有形難先未兆而京後尺寸棄取之間三衛興尤以為厲已故曰失時可憾也然則宜如何曰宣大不可不城所謂白刃在前也宣大既城戰守斯議謹哨望于登陴伏精銳于半道叩垣則左右備施以為守入塞則左右邀擊以為戰此之為宣大計也而以其閒暇大城京後慮版築之屢興則寛其諸役恐三衛之有競則啗以微資土可築則土築而磚甃繼施石可劚則石劚而灰灌必愼自居庸抵山海以為袤遍其下列保寨以為援先之以京營出戍繼之以招募成家葢當天下之力以之而不煩費阻與遷都較重而不以勞煩輟也是則失時可憾而捄時有要也然有言長城無益于疆宇者何曰不究始末之言也夫塞下田不塞下人有也為敵墾也一騎長驅耕夫䑕竄耕具牛畜舉為其有矣塞下丁不塞下人有也為息寇也朝取數人焉殺而委諸壑暮取數人焉驅而入之部夫塞田不墾則粟愈貴非惟居者不可留而兵廪且不勝轉輸之困矣塞丁不息則地愈孤非惟伍失者無從補而敵幕且愈增其類矣夫當長城之未城也塞下粟有斗數錢者乎塞下有人舍内郡而願僦居塞下者乎塞兵有一非坐食官廪給地自養為官戰守者乎一遇伍缺清勾拘攝如捕罪人有招幕一呼千百彚集者乎帑金至重也輦輸有遇掠者矣巡察使憲臣也行部有遇害者矣赴簿計即如探虎穴轉商賈即如臨重壘洪蔚内地也寇至境而烽火不聞朔州開府也先入塞而聲聞永隔今時亦有之乎故曰議長城之無益者不究始末之言也然則長城足恃先終不能入塞乎曰何言終不入也堤水而浸潰必有方引繩而牽斷必有處長城之利燧明而野易清也攻拒久而兵易集也粟入多也生息繁也小舉之莫能犯也大舉之易于調伏為應援突擊也彼慮歸之難而不敢深入也嗟夫守不宻則入言必不入則宜廢守矣入則有戰言必不入則宜廢戰矣古今有廢戰守為國者乎是故詰邊隅之令以嚴乗塞之時精團練之兵以待農隙之入申堡塞之約以盡清野之實固京後之防以居萬乗之重可戰可守斯固策之中也而近時邊將不求備其所未備顧曰未塞之前敵惟小犯既塞之後必求大舉小犯易遏大舉難支則是以大舉為塞致也嗟夫城塞以止驅猶服藥以已疾小犯必至大舉猶細症必至沉疴也以城塞之遏小犯為致大舉則將以服藥之已細症為致沉疴乎謬也甚矣乗塞說夫城塞非難也乗之難也乗之非難也久之難也夫集丁壯以事版築恤之有方役之有漸斯塞城矣而欲離畎畆捐妻子林林總總于亭障陴隩之間不服怨不力疲稱干奮戈敵愾爭先不能也暫乗之猶可而必欲歴歲年長子息偲偲業業于沙磧斥鹵之外不逃亡不隱匿世嗣家繼如保恒產益不能也秦之亡也以長城而非以長城也城成矣而謫戍遍天下天下不能堪也秦之亡也以謫戍而非以謫戍也謫戍無更踐犬羊死塞下天下不能堪也夫行者無憩息之所則行不如處負者無息肩之望則負不若仆城長役而不休戍長謫而不代居者必發而無免藉往者必死而無返期此秦人之所以懼而亂而秦亡也故晁錯為漢畫尚募徙而尤謫戌懲秦失也文景重入奴婢入粟而輕鬻爵贖罪知民情也然秦之城也與今異其戍也亦與今異晁錯之為漢謀也難而今謀不難審其易知其不難是故塞可城城可乗乗可久也秦虐用其民而一天下天下既一黔首引領思治覬一休養匈奴無盗塞之罪邊土無䖍劉之慘而勞師萬里斥不毛之地發謫以戍之轉餉以給之其結怨天下一也役丁百萬為塞數千里地不計土石年不計豐歉期以一二歳時盡羅絶漠其結怨天下二也夫古之為師也不得已命下而哭鑿凶門而出軫未旋國君為之不舉寢不安席而長城之役未休五嶺之戌復舉阿房驪山一時並作其結怨天下三也今時則不然北部擁衆侮慢不恭其曲在彼邊民罹害骨肉荼毒其害切身三駕之後休養者垂二百年須之已久自天子以至度支凛凛以財用之困工役之勞憂念之已深民無得而非上也夫鯀之治水其役豈下于始皇方命受殛而民無叛者知急其急也故曰秦之城也與今異也漢之初也諸侯戍邊者皆去楚漢兵爭未暇顧也秦長城毁矣匃奴關故河南矣韓信陳豨之叛戎馬及于晉陽矣晁錯之䇿曰募民夫漢已徙大族實新秦三輔五陵矣其徙邊必不以徙新秦三輔五陵者也其外郡國乎邊塞去外國地甚遼邈水土又不服習也聞邊土苦惡當徙者憂懼其難一也亭障未立保聚無所一旦置之荒墟而即責其扞禦其難二也塞田未墾塞廪未實徙口既盛轉運益增始之以坐養繼之以凶年其難三也富人鬻爵恐不屑身往所入奴婢及罪人贖者逃亡相繼其難四也今時則不然塞垣已盛警急有備塞下殷富號為樂土人多而苦于無田者比比是也但有募集不必與冬夏衣廪食也不必拜爵高之增至卿也分口受田無不樂從者矣國初鹽利稍寛逺方商賈有攜家居邊塞者以利之所在也而况即募塞下人耕塞下地乎故曰錯為漢謀難為今謀不難也夫塞城矣不可以不乗不乗是棄塞也塞乗矣不可以不久不久是棄乗也更踐則習謫戍不可也今年春城塞集丁男若干歴夏入秋而免明年復然今年夏乘塞兵若干歴秋入冬而免明年復然乗者至則役者當往役者返則乗者就道朞月計數旬千里而已室家之棄曠生理之蹵乏形貌之悴瘠鬭心之懈沮恐非所以圖久也夫乗塞非古也而亦不可廢也古之乗塞者列亭障而已今則長羅千里無不受陴者矣古之乗塞者通烽火而已今則執㦸據險日與之戰矣然塞已成矣秋歲防矣禾稼棲畝恃之以無恐矣婦子嘻餉恃之以罔戒即廢之不乗則畜牧驅逆之失農樵殺戮之慘士女虜逼之耻禾稼􅏥踐之費無所于償也故曰乗塞非古而亦不可廢也嘗為畫曰塞城矣其地卑而圯不便而受敵者宜更也更矣而無堡在近者宜增也城如引繩結之而不斷列堡如布棊錯之而不雜堡去城不二三里其相去不三十里保為廬舍備器用鑿井增竈具樁列櫪人有所棲馬有所秣使至者如歸寓者如家每堡五六百人則人受之㕓綂之以一校則校為一廨歩卒勤瞭望晝夜為二畨馬卒遞邏徼彼此為信驗無事則畨上者倚戈于城而畨下者休邏徼者遞哨于途而堡居者習技藝有警則畨上者為燧邏者先登堡居者繼登而畨下者亦登則役有畨而不疲事有經而可守矣行之一年人皆便之來歲徵集則令于軍曰乗塞而欲攜室者聽増養以半口比歸令于軍曰室至而欲留者聽增給以温絮且移額廪既畱而復令于軍曰欲恒居此而授田者聽且給牛種夫人情之不能絶者嗜慾而其甚趨者利也朞月不數旬千里有不願攜室者乎其歸不數旬復往有不願畱者乎既増室養復給冬絮移廪以為資有田以為產有不願恒居者乎夫為國家非財用之急也無勝兵之急也非無勝兵之急也無邊兵之急也非無邊兵之急也無執㦸登陴結髪與匈奴戰者兵之急也乏財用撙節焉已爾乏勝兵清補焉已爾乏邊兵清補邊兵焉已爾乏執㦸登陴結髪與匈奴戰者兵則强之怨生廢之蹙守為治者所深憂也不强之以生怨不廢之以蹙守拔邊兵于中土拔乗塞于邊兵一轉手之間耳夫秦工役與謫戍並行而致釁吾工役已息而戍以情誘之異於秦可知也錯為漢謀募逺道之人吾即募塞下人逺不出百里易于錯可知也故曰審其易知其不難則塞可城城可久也凡此行之于天下之甫定則願息者咨行之于邊口之未充則應募者鮮行之于邊患之不數則逺敵者疑今其時也而勤不為可謂智乎國朝城塞不始于近年也而規制品式則備于近年其乗之亦不始于近年也而法令節目則備于近年何者成化𢎞治之敵臺懸樓大同往年之月􅀈長塹城始也始臺樓相去大疎壕塹亦塡塞垣周于壕壕附于垣葢近年始為之耳固原花馬池之傳箭境門宣府往年之蘆席山麓乗塞之始也然傳箭恒失夜警蘆席不禦風寒歩山登垣而屋居馬兵列營以待戰亦近年始為之耳外此而有不備則規制隨宜移易法令以時申明智者審機運軸不膠一隅而必共軸同輪以合途轍也夫塞城更數人矣乗之亦數年矣其始也謀之未嘗不僉同其繼也恃之未嘗不有效乃今則甲可乙否方信忽疑急喙莫能辦緩頰莫能曉是何也忿於敵之入懼於役之久惑於當事者之避難而文罪也夫天下之事有禍福倚伏而當局者迷輕重區分而持衡者眩亦惟察其機要究其紀極而已即以乗塞機要察之塞下田盡墾禾盡入轉輸可省也小舉莫能至大舉必歴時烽堠易明也外阻于高墉内限於重關久攻而暫入既入而虞歸畿輔不震摇也是之謂三便以其紀極究之瘡痍之疾希則生口日盛戎馬之力節則出塞可期剽掠之路難則盗心漸沮盤詰之令宻則奸細可無是之謂四宜今之病乗塞者一曰塞雖成敵人百道攻之無不潰而入者夫百道攻必曠時日我援兵可集也潰而入必殺傷相當我不徒損也乗塞之兵憑高拒下以逸待勞既不徒損援兵復集而終莫能支然則不乗塞不相縱之入而與之戰馳擊突剌于平原曠野之間反能支乎此一辯也二曰天下鎻鑰宜愼京師居庸倒馬紫荆之間足恃則宣大固在所略夫為防貴周設險宜厚居庸倒馬紫荆京師之内户宣大京師之外門又宣大之士結髪從戰關南之人鮮任兵革徹彼外門專恃内户忽結髪從戰之士倚不任兵革之人其能支乎此二辯也三曰兵有竒正勢有倚伏遏之于境上不若殱之于既疲夫竒正相生倚伏取利謂我能得士之死力且洞測敵人之虚實也今部曲之衆屢北而膽寒其計且百出而莫測遏之境上稽彼師期弱彼馬力尚能為患縱之境内則搜掠四獲騰槽超乗矣而能殱其疲乎此三辯也四曰長羅絶塞不若散守内堡夫堡宜守在盡規制具器械團丁壯民自為之耳兵民百年所養也無事實其力有事庇其生分也而乃令之入堡與民雜授陴乎且一堡五十人則百堡五千人千堡五萬人宣大之堡奚止千邪盡數萬公養之兵配數百私築之堡將何以自解于民且使敵人入也野無與戰則勢必攻堡旁無可警則勢必久畱堡不百兵亦勢必即破而食既食而復攻得不長久駐之心啟攻城之漸乎此四辯也五曰馬兵自宜邀擊但令歩兵守堡夫邊兵具器械諳旗鼓者馬兵耳歩兵則墩臺之烽燧站遞之送迎衛所之雜役而已散之堡内與民何殊又歩兵不堪乗塞而曰足堪守堡馬兵不能援塞而曰可用邀擊其算已為左矣此五辯也六曰連嵗乗塞兵皆駐邊敵人潰垣則外實而中虚夫中外皆實首尾聨絡固兵家之勢然亦自料敵有中分布足用者言之今宣大之馬兵不數營而塞外之横帳千里分列于塞下且猶不支何得餘兵布之腹裏且往者未乗塞之時鎭兵數萬寇來尾之來去尾之去何嘗不内虛邪其算又為左矣此六辯也以上諸論多出于將臣之口將臣者當事者也往年歩兵既不出戰馬兵則隨將臣之命曰暗伏敵偶不出其地則自張功伐遇當策應則多方規避不曰傳報失眞則曰發遣不早不曰馬力不及則曰數日無糧展轉之間因以脫罪今兵皆乗塞歩兵既有分陴馬兵亦有定援前當勍敵退有死刑一有失機辭無可諉以故諸人倡為異說以壞成規也夫縉紳之士言守介胄之士言戰介胄言守且不可而曰歩兵不宜乗塞宜守内堡馬兵不能止驅能解堡圍是可信哉事有輕重區分而持衝者昧此之謂也然則乗塞可無虞乎曰何無虞也受陴既久玩愒乃生將校無効閱之勤行伍鮮鬭擊之志忘戰一也始焉應役尚皆軍身繼有顧差半成遊食鮮實二也一處潰防千里震動人情洶懼不能圖存自擾三也事有禍福倚伏而當局者迷此之謂也然此皆彼將臣不得其人之故耳夫歩兵登陴荷戈馬兵自宜練習有警協力拒擊無警自可畨休何忘戰之有五人為伍伍必相親五千人為隊隊必相識何鮮實之有塞高二丈内外皆烽燧之傳必知起止何自擾之有今將臣貪者誅求懦者坐視不自反其督責之政而欲歸罪于建議之人又可信乎嗟夫塞之初城難也斧斤遍于山谷版築奪乎畎畝力三時而不懈役連歲而不休孰不為建議者危之而初城極衝次城稍衝又次不衝丁夫役焉帑金發焉浸浸乎可大之業矣塞之初乗亦難也隣虎狼于枕席蹈鋒刃于體膚晝無藩籬之隔夜有掩襲之虞孰不為建議者危之而守長塹次結蘆席又次登陴逢秋乗焉入冬罷焉浸浸乎可久之規矣嘗謂危城塞于工役之初興智也棄城塞于工役之已就則所損者大危乗塞于擺守之既久仁也廢乗塞于秋禾之被野則可虞者多何者千里之城悉役塞下之民意外不可以不防萬口之食仰給塞下之粟蹂踐不可以不䕶而况版築正殷有衝突之患戎馬一入得飼秣之資邪今城成矣壕塹品窖敵臺暗門備矣城乗矣乗罷期日應援節度定矣欲一旦舉而廢之乃不可乎然則今時之所當移易而申明之者何曰城二乗之三二者何曰堵口不便于援兵山麓不支于下擊也夫塞之可乗謂以逸待勞自上臨下也今堵口之塞旗幟隔目金鼓隔耳獨以一隊直當鋒鏑譬之鼠鬭穴間勇者勝矣山麓之塞遺矢雨隊潰石雷轟欲以孤垣仰首拒擊譬之牛僨豕上壓者斃矣是二者城之失也而諸將臣分地已定軍令甚嚴無一人慮及請移易改築者不亦惑乎四者何曰哨探之不相𨽻陴兵之無畨休派撥之有隱射烽堠之無識别也夫塞之可守習技巧于暇時奮勇力于有警與夫緩急得宜耳目不惑也今乗塞之將既非本地之官而本地長短哨兵復不聽其發縱又其所部悉已數丁受陴出塞覘望不得專之私人則何以豫知敵情不能豫知敵情勢必晝夜荷戈疑目直視又何以畨休其衆畜養銳氣習試技巧邪分陴主將所對簿也以付軍吏險僻者宻垣衝者疎有以貨賂損軍實者矣烽燧諸將宜各為號也以付墩卒一隅有警四方不寧有以虚聲沮軍心者矣是四者乗之者失也而諸將臣視以為安習以為常無一人慮及請裁酌圖畫者又不惑乎故欲塞之足據須更久任之垣欲兵之畨休須布腹心之間欲軍實之不損須正分陴之簿欲軍心之不沮須明諸路之烽自茲以後所當移易而申明者此焉已耳今以一時之見而棄塞數人之言而罷乗則所謂敵之入懼于役之久惑避難而文罪者也九邊總督駐劄九邊初設遼東宣府大同延綏復設寧夏甘肅薊州皆文武大臣鎭守提督又以山西鎭巡控偏頭三關陜西鎭巡控固原共為九邊鎭𢎞治間設總制於固原嘉靖間設專督於三關權任差異而邊防則一葢北邊有戎警則設總制大臣或都御史尚書侍郎兼憲職自巡撫以下皆禀受節度東路宣府大同一員西路陜西延綏寧夏甘肅一員葢黄河自金城出中國經戎地東行南入中國在大同西界偏頭河曲延綏東界府谷神木之間故西路有警則宣大遊兵駐河東濵東路有警則延綏寧夏遊兵駐河西濵戎入套則西路之警出套則東路之警西路總制治固原在延慶凉洮中東路則往來於宣大北部欵塞制御由我議天子聖明方内輯和航浮索引之國日域月窟之民䞇方物稱外臣者以千百數乃北部數號驕悍者今亦回面舉踵稱臣欵塞而請命焉蓋古英君猛將所以駘藉生靈殣身百戰而不能得者執事謂聖德逺被非前代和議之比愚亦以為然也抑聞道路其言有兩端尚撫綏者則曰夫越裳南獻楛矢東來盛王之遠略也今外叛者已誅而内降者不聽猝有騷動其曲在我許之便核情偽者則曰夫頡利刼盟女直背約前事之殷鑒也逺人之情叛服不常矧物力方虛既以養兵又以資敵是重困也勿許便夫此二說者愚以為無全是亦無全非何也今之套冦蓋在冒頓呼韓之間非甚彊也非甚弱也彊不如冒頓即一旦渝盟棄好未足為中國大憂故持議勿許者逆詐之偏指非通論也弱不如呼韓即一旦稽顙屈膝未可謂中國無事故持議許之者應變之權宜非完策也今方鎭之臣與彼接境通譯而言能審知其嚮義果誠設約果信乎能屈首受戎索無衆入爭市乎縣道續食及禮賔一接之外無他求乎民無姦䦨出物乎如是則天子何惜階前尋丈之地使者盈尺之紙隔閡夷情狹小皇化愚亦曰許之可也夫許之可也許之而遂弛吾中國之防不可也何者今彼雖内順而諸邊戍卒非減也司農藏錢要以日月銖兩責辦歲額不能省也近塞磽瘠之地又非能倉猝開種也而兵以益驕吏以益狎則天下之患豈不在此易曰其亡其亡繫于苞桑書曰惟事事乃其有備有備無患此皆憂危之論老成之見也葢昔者渾邪内附漢武議誅通市賈人而汲黯發憤進諫請收鹵北人以賜從軍死事者家竟寧中單于上書請罷邊備以休天子人民而郎中侯應陳其十害葢黯之激詞主於全䕶根本而應則為國家憂將然逆未形自古言和戎利害莫切於此今日之勢雖萬無收降之理亦宜稍倣二臣之意撫安人民以内固其根本而嚴敇將臣以外修守戰之具督屯募農鍜甲厲刃嚴圻逺堠増墉浚濠使元氣不泄於鍼芒河堤不潰於蟻穴倘可少紓執事之憂乎大抵戰守和三策也而守常居戰與和之中能守則可以和可以無和能守則可以戰可以無戰是三策歸之一策也許與勿許二說也而許之以迹不許之以心脩守戰於間暇寓防禦於羈縻是二說歸之一說可也此愚前之所謂審盛衰彊弱之勢致人而不致於人者也何休曰王者不治夷狄來者不拒去者勿追而蘇氏非之曰聖王於夷狄吾欲其來則來之不可得而去也吾欲其去則拒之不可得而來也今能使制和者在中國而不在夷狄則吾之力常有餘而許與不許不足論矣國家邊防之制西起甘肅以跨寧延連亘宣大東盡遼海而又於甘肅之西封哈宻以制西域大同之西表東勝以控河套遼陽之西闢大寧以遏山戎國初之規畫備矣自烏梁海以義從而割大寧則畿輔之屏蔽始撤東勝以廣漠失備而北門之鎻鑰始疎哈宻以土畨侵據西域之藩籬始剖暨乎大同之大邊既失而内邊之内棄為王庭則門庭之寇深矣西畨之求援甚切而邊方之臣置而不應則肘腋之患生矣此其失也失地險也北部欵塞宜益脩邊防議嘉靖中諳達率其黠弟悍子以數十萬騎牧於雲中上谷之間而與我共不入犯三輔則東躪遼西嚙晉又西而掠秦凉夏朔之境中國罷於奔命者三十年矣天子為之北顧而興嗟至數四廢旰食乃隆慶中諳逹不勝其孽稚之愛而輸其要領以欵我縛中行翕侯於鼎爼之上谷蠡屠耆而下解辮請命者數百人國家因其人而侯以封爵大小羈縻之然不為給祿食也以漢文之盛猶厪厪稱兄弟焉而我明若天之覆彼而日益尊彼不能講敵禮也漢供呼韓邪嵗費四十四億而我市馬不過一二邑之租而已不為傾左藏也且納欵之端在彼而不在我制欵之權在我而不在彼即魏絳揚雄所稱何啻焉或以為彼詐而欵我非也彼不欵我何以制之而彼故為詐且俺荅誠老厭兵其孽稚誠感我之厚待而思效順夫焉得為詐也又謂彼解媾輕竒閧於互市之下而疾馳扣居庸鹵昌平緩急何以應之又非也夫彼將大舉必先厚集諸部祠蹛林暴􅀈晾騎形見勢動而我故得先為備也大約中國因欵而息肩而得專精預防則可因欵而息肩而遂玩敵則不可夫所謂專精者何也比薊鎭歲益省調各邊鮮按伏贏金錢當以萬計不可裒而積之近鎭乎秋稍登商賈時集贖鍰爵貨不可損而平糴以實邊乎塩筴屯政不可時舉乎冗卒不可汰而驍騎不可益練乎山海而西以至鴈門不可削夷而為險乎猶未也而諳逹計已耄且死耳其貳者必黄台吉而是孽孫故不變也其勢必内猜而不相容降人之在寘顏者因中行翕侯之縛而中恨且自疑也當其時有能兩匈奴其國而中度遼且為維州其降人乎是一大奇也然而不敢盡言也當穆皇即位諳逹以軼孫之故遂堅守臣塞之盟主上踐阼四年于茲歲貢名馬守市惟謹則豈惟列聖之所不能得之者見之將漢唐宋以來亦名惟欵塞來朝而未有若是之恭順者豈非我有以治之乎執事詢其道之所在倂别求制禦長策復何言夫鷹隼恒性饑則依人飽則颺去而圉人獵者獨能籠絡之不去以其維縶在我也豹善逸兕尤不可狎而擾人可令之入攌以能操能縱之耳性强則吾摩之以使其馴習性輭則吾厲之以入於勒閑於其無稍假之以令其得所於其有少抑之以塞其妄求時柔時剛不激不沮彼獨非人耶是故在上郡者逼鄰河套近有逹爾罕之稍黠然河套我受降城内地也彼竊伏其中其理原屈茍倖得賜生全吾治之當無能逸朔方背名山而面洪流中多畛塍敵騎時難獨騁綽里特烏蘭相為接壤限以崒嵂阻以渀澎而又彈以雄兵偕之大道吾治之當無能逸酒泉張掖孤懸河外然仁祖北峙祁連南揖中繞澮洫重鎮内壓瀚海城頭羣飲螘集不惟我防彼彼旦暮亦須罣我吾治之當無能逸湟中碣石諸番甲馬弓矢刀鋋與彼無貳然吾有茶焉以縻其心諸羌一日無茶不渇即死古阿二寇時令繫頸引獮猴吾治之當無能逸疊州而南岷宕武都内武都氐為難馴吾御之者銜轡原自未備既斷茶市又尠刀貝通融增議稍厭其心吾治之當無能逸何者其機由我也吾識其機而推移旋轉如弄丸千仞之上彼匪茹之心自消吾執其機而牢絡羈鞿如掣電于九天之中彼狂宄之謀自􅓈茍得其機豈惟秦以西雖兩粤八閩三吳執此以往可也附牧市荅問牧人方牧于野所見驪黄牝牡嚙草飲水各適其性之自然牧人無所事事於是偃息乎毛頴之林游覽乎子墨之囿有市賈者將趨市過而問焉葢聞受人之牛羊者求牧與芻牧馬亦猶是也今子誦言不輟馬之肥瘠子知之乎牧人曰吾惡乎知之市賈曰夫越人視秦之肥瘠漠然不加喜戚於其心以其不相關也吾子所職者牧所司者馬而肥瘠不以知得無廢厥事而虚人之直乎吾懼子之速官謗矣牧人曰不然吾方慮吾馬之無所用之而不憂其瘠也子獨不聞乎國家威德逺邁唐虞北部貢市歲以為常今牧之邊圉者紛若雲錦即有肥瘠譬則江湖之濵渤海之島曾不知其乗鴈隻鳬之多寡豈能一一而計度之哉市賈曰北部貢市以來十五六年于茲矣中國所費財物不下數十百萬竊聞所市之馬率欵叚不堪乗載子盛稱貢市然則貢市可益於我哉牧人曰子誠市賈也計市利耳烏睹國家之大計吾試為子言之國家建都北平自正統己巳以來世有邊患然亦隨發隨撲隨撲隨滅所以制禦之者有定畫矣世廟時有俺荅者最為􅀈獍而又有叛賊趙全輩為之羽翼横行塞外時肆侵掠甚者逼犯我京邑殘毁我石州禍至烈矣當是時也不愛萬金封侯之賞搆得賊首而甘心焉然卒無應者豈非以諸部虐焰之熾而逆賊憑藉之固耶亦莫如之何矣隆慶庚午天厭禍亂諳逹婬酗以逞而孽孫歸義於我大臣在疆埸者乗機制便因厚遇之遂與為市得諸逆賊即戮於東市以正典刑然後以封爵羈縻諸部貢市至今不絶雖數歲以來不無市本撫賞之費較之客兵擺邊纔什一耳况邊鄙不聳穡人成功又以暇日増脩戰守之具使國家頓釋西顧之憂此古之謀臣策士所為日夜深慮而不可幾焉者也又奚計財之小費與馬之不足為用耶賈曰誠如是也能保百年無事而兵革可盡弛乎牧人曰烏乎可烏乎可今吾中國親父子兄弟相約也不能必其久而不相背日中為市有司治之細人較銖兩之利而爭鬭起焉况交易爭利之塲變或起於倉卒而盟遂敗於斯須是未可知也豈足恃哉以今觀於市事釁隙有三而所可慮者亦有三焉各鎭市易雖有常數而戎心無厭求増撫賞漸不可長稍裁抑之輒出不遜語其為釁隙一也所得幣貨皆歸之部長衆夷垂涎側目為日已久萬一竊發部長恐不能制或陽制而隂縱之亦狡寇之常態其為釁隙二也往者防秋警報沿邊士卒所得行糧賞不可勝計而今皆無之月支糧料又有椿朋加減將領掊克餘者幾何饑寒所逼欲其無為奸邪難矣其為釁隙三也在昔外國能為中國患而中國未嘗不為外國擾彼來殺掠人民我亦常得首功彼來刼奪財物我亦搗巢趕馬利害大略相當自貢市以來邊境雖寧彼有歲歲之入曾無毛髮之損安知其不包藏禍心養力以俟時乎是曰養寇一可慮也逆賊趙全輩叛入北庭為彼鄉導後遂不可制此往事之殷鑒也今也欲示招攜之意故弛内外之防彼帳中名為筆且齊者多中國識字之流走邊通事夷人即拜甡之類皆得入戎鎭城窺我帑藏城中奸狡之徒利其財者寧無與彼交結而為之腹心者乎是曰啟寇二可慮也彼雖欵貢猶射獵為生其剛心猛氣未耗也沿邊將卒茍偷燕雀處堂之安不顧一旦棟焚之患聞戰陣殺伐之事則皆掩耳縮首而不願聽其茂才異等往往從文學取青紫矣與之從事於砲鼔矢石之間將安用之是曰玩敵三可慮也積三釁隙而有三可慮者存將憂在眉睫矣奚俟百年市賈曰人情狃於久安而明者易慮事機伏於未露而智者先圖貢市之不保其終端已見矣曷若早與之絶以市本之資搆良馬以撫賞之費厚士卒利猶在中國也而顧以之資敵不亦左乎牧人曰羽翮未備者不可以高飛舟車未具者不可以逺適在我無必勝之策而横挑强敵是養鬭雞者虛憍而恃氣耳盍姑待之而隂圖之吾聞當諳逹乞封通貢雖感吾不殺其孫之恩實由棟折於九楹之居衆䘮於石州之役彼固知天意之不與故耳况今黄台吉死亡相繼東西兩哨彼此相仇黄毛叛去追及吐蕃之地互有殺傷呻吟方未起而齊哩克新立人心未附决不敢遽爾寒盟苐恐數年之後馬力肥充不忘決囓而吾桑土綢繆正當汲汲然在今日耳請言其略夫中國制禦之策惟戰與守今邊防八事如修關隘練兵馬無非為戰守計而吾則以為關隘誠修未可與守兵馬誠練未可與戰非臆說也吾嘗適市見其軀幹材藝不甚相逺然而勇怯之不敵者何以故今有二人搏一人飲酒食肉結束襟帶盛氣而來其一人方枵腹藍縷存立不定將望之而怯走耳豈敢與之左撐右支决勝負哉今之邊卒與此無異此其不敵宜矣兵志曰視卒如嬰兒可與赴深谿視卒如愛子故可與俱死則夫厚其衣廪寛其力作未戰養其氣此第一義也至於臨陣合刃猶有說焉子不見刺虎者乎善刺虎者以巧不以力左持楯右持刃直前犯虎虎一怒則避之再怒則逃之三怒而來入其腹砍其足而虎仆矣又不見驅虎者乎童子牧羊見虎方捕羊不知虎之能食人也持杖往逐之虎且棄羊逺遁童子奪羊而歸矣今欲與彼戰當其怒心勿遽犯之吾姑柔之使怯當其貪心勿遽挫之吾姑飽之使逃明哨探謹烽火避其實而搗其虛委之財而擊其惰為約曰彼驅羊馬歸而能遏其歸路者即以其所驅予之此李牧守鴈門之故智在善用之何如耳若恃目前為長乆安寧之術將驕卒惰歲額漸增鄙人簡陋誠不知其所終矣市賈讚曰始吾以子不知馬之肥瘠而今而後知子之明於料敵若燭照數計而龜卜矣言既訖市賈趨市牧人策馬而去邊防總論今天下仰賴天子聖神戎羌即叙莫不交臂受事屈膝稱臣疆埸障徼之間卉服列塗謳歌成韻羽檄不馳於近塞邊馬不飲於長城既十有餘年矣而執事者穆然長慮圖所以久而無虞之筴甚忠計也然古今籌邊者衆矣大都古慮在逺今慮在近古慮在我今慮在敵聰聽無聲明睹無形未雨而桑未病而艾慮在逺者也躭處堂之安忘徙薪之戒取效眉睫不問肩背慮在近者也不為鳴鏑控弦而張不為熄烽寢燧而弛無恃不來吾有以待其來慮在我者也有事皇然若失無事晏然若忘有事又復如是慮在敵者也此相去逺矣不啻霄淵夫欵市以來封疆之臣譚利文學之臣譚害譚利者曰曩也弓矢今也畚鍤環九塞而營之幾若完室不欵市能乎利一偃兵休卒少壯老羸各有攸處費用不擾利二邊以内居者如堵行者如家賈者如市牧者如廐耕者如雲舉砂磧而桑榖若内地焉利三而譚害者曰氣久而不運不振器久而不操不習一旦有警其不心駭股慄者能幾害一彼貪索無厭而我經費有限不與之是棄前功而為戎首舉之則無力而給之非損内帑則剥軍膏害二藉口和欵縱横出入不為限我之情形備嘗之矣第令無動動將不支害三兩者相左亦相當云愚則以為事無全利亦無全害軍不習戰是練之而已孰與數戰之害嗜欲無厭是節之而已孰與徵調費之害出入不為限是禁之而已孰與久結難連兵之害其大較章章也然則固無慮乎執事者慮之是矣夫利害有隱者逺者燕薊之困也自三衛始也三衛二心于敵敵藉其鄉導以為我害於此撫賞於彼鹵掠百相負也百相欺也其機變械飾不一日矣此豈可不為寒心哉胡不以漢事明之也漢初匈奴兼從西國結黨南羌中行說翕侯信又日夜所以教匈奴圖漢者今年入上郡明年入雲中入漁陽雖衛霍為將不少衰止於是降渾邪表河曲列四郡開玉關通西域斷匈奴右臂隔絶南羌月氐自是逺徙漠北稽顙入侍竟西漢無北患焉夫神爵五鳳之威不烈于元光元狩也而匈奴頓弱若此此非匈奴之弱弱于漢之得策也建元中羌寇金城隴西司徒掾彪言凉州部郡皆有降羌數為小吏黠人所見侵奪故致反叛去蠻夷冦亂皆為此請置蠻羌騎都尉護羌校尉理其怨結問所疾苦數遣使驛通達動靜使羌衆得為吏耳目永元中超自西域還曰塞外吏卒本非孝子順孫以罪過徙邊而蠻羌懷鳥獸性難養易敗宜蕩軼簡易寛其小過夫不急叛羌急降羌而後從之欲羌為我用亦使不得没於南而為蠻用也夫今者何以異此請得臆筴之三衛我當劉矣第恐依山聚谷鋌而走險况狡悍雖深而藩籬尚在我邊塞有隙或猶以敵情輸我也毋滋他族寔逼處此以自徹其藩籬也至其鼠竊他境當隨地殱之或懸賞格購其首逆者置之法此所謂服其叛者也土蠻負其衆遮求貢市每弄兵要挾而王杲餘孽懷憤圖報此可以兵碎非可以恩結也宜聽諸夷小市以攜其黨因往來偵候其有㑹蹛林者悉兵剿之弗使得志一大治則終身創矣此所謂離其合者也丙兔超忽既西利水草又貪羌衆而吾復優撫之是彼一舉而得利三也當酌議撫處亟脩邊備揚兵聲討張疑設間復曉示畨種使招致西行凉畨之衆盡歸其毳幙毋使相結是所謂服叛之謀懷攜之策惟我之所欲為矣圖書編卷四十三
