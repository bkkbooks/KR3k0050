body:
  text: 明章潢撰皇朝文武銓選國初選用人才不拘一途設賢良方正聰明正直孝悌力田通經孝亷科或從耆民及稅户人才與科貢之士兼收並用隨材授任多岀親擢其後始定銓選之法祖宗以來文武並用選法亦循資格然亦不專資格文選主於吏部武選主於兵部武臣之選其始也以功次而用其後也純用任子之法父死子繼無子者兄若弟繼之有定格也若夫都指揮至都督則以才能擢用又不專於資格矣文臣入仕之途有三進士也監生也吏員也吏員資格其崇者止於七品用之為佐貳幕職監當筦庫之任非有保薦者不得為州郡正員監生則出自學校之貢選及舉人試進士不第者其肄業大學也循資以出先歴事於府部諸司然後次其名於選曹循資而考之以定其髙下而授以職焉監生吏員各有資格進仕初任亦循甲第及其不測擢用徃徃越常調又不專在資格也第行之既久不能無弊武臣之弊天下衛所有定所設官有定員世襲之官恒滿其位新立功資之人歲有増益其後亦何以處之也又臣當祖宗之時科舉有定額歲貢有常數學校貢舉與吏部選調其人才適足以相當而無甚有餘不足之數其後言者憫學校之士多衰老乃開四十五歲入監之例又用國計不足立納粟上馬入監等名自是科貢之外别開蹊徑選用之條止有此數入仕之途比舊加多其人才日積月累遂至數倍於前至有需次二十年而不得選者其監生兼舉人亦以人多缺少常充積於待選此非獨士子不幸亦國家之不幸也盖國家所恃以為治者人才也今日用人必循資格而才能需選者徃徃老於選調而不得及時進用及用之大半衰老矣鮮不為身家子孫計者茍不為之所而欲事治民安不可得也為今之計必有以消息調停之謂宜通計考試第列三等造册送部上中者依次選用下等者授以冠帶庶使仕路澄徹選法疏通仕進者有及時效用之實汰退者免失職無聊之嘆且不復開倖門擠塞正路則洪武永樂之盛可復矣皇朝考課丘氏濬曰考課之法屬之吏部内外官皆以三年為一考六年再考九年通考始行黜陟之典即有虞之制也官滿者則造為牌册備書其在任行事功績屬官則先考於其長其最目轉送御史考核亦書其最目考功則稽其功狀書其殿最凡有三等一曰稱二曰平常三曰不稱既書之引奏取㫖令復職六年再考亦如之九年通考乃通計前二考之所書者以定其升降之等其以御史考核即漢宣命御史考殿最也書以考語即唐人第其殿最也稽其牌策以實奏對即宋人之引對磨勘也以一代之制兼各代之所長而又本於有虞三考黜陟幽明之意誠萬世之良法矣又曰本朝三年一朝覲天下布政按察諸司府州縣官吏各齎須知文册來朝六部都察院行查其所行事件有未完報者廷劾奏之以考黜陟近世為因選調積滯設法以疏通之輙憑廵按御史開具揭帖以進退天下官僚不復稽其實跡録其罪狀立為老疾罷軟貪暴素行不謹等名以黜退之非祖宗初意也按舊制官員考滿給由到部考得平常及不稱職者亦皆復任必待九年之久三考之終然後黜降焉其有縁事降職除名亦許其申理其愛惜人才如此而近制則使人改過遷善無由矣雖然使天下失職之人布列郡縣亦豈朝廷之福哉夫授人以章程約束而考其成者譬之懸權以辨輕重惡可緩耶近者狃於治平日就偷安即所上計簿入聖覧者每廢時日貪墨酷鷙有定論也乃滯留不發何所懲惡也勸賞虚冐有明徴也乃稽滯不止何所懲欺也錢糧額賦徴解有期也乃㑹稽徒具何以充國計也刑獄擬議輕重有律也乃停閣踰年而寃抑不白何以重民命也條陳利病詳勘以定也乃徒取文具何以補民生也凡此類遂成常習矣上今頃歲稽查積年章奏立限考成内閣則總其綱部院則分其事臺省則核其實下之監司下之郡縣若雷之震若風之披中外臣工㒺不滌玩愒改觀聽日有成歲有報矣以此飾吏治而臣下尚安有不奮起事功者哉三途並用議議曰所謂三途者進士也科貢也吏員也國初用人有徴聘有經明行修有人才有賢良方正有才識兼人有楷書有童子諸科其後率多罷廢承平以來專用進士科貢吏員是三者初未嘗廢而邇者欲新天下之吏治於科貢吏員之中稍加不次之擢故有三途並用之說其實前此未嘗不並用也愚以為朝廷欲收用人之實效於科貢吏員所宜加之意者當先清其源而後其末流可治也今進士之與科貢皆出學校皆用論經義論策試進士不中入國子為舉人監生試舉人不中循年資而貢之入國子為歲貢監生非若漢世賢良孝亷對策與博士弟子判然為二其實一途而已然進士升於禮部為髙選舉人之下第與歲貢國家亦不輕以待之故使之學於大學以觀其成茍成矣雖任以進士之官可也今成均教養之法不具獨令以資歴待選而已非復如古之舎法此其科貢之源不清也吏員之在古本與士大夫無别異迨後流品既分遂為異物士人不復肯詘辱於此故本朝資格吏員崇者止於七品多用為掾幕監當筦庫之職非保薦不得為州郡則吏道本不可與儒者並然其始皆自藩憲衛府州縣府署置猶有前代辟舉之遺法而今則自始為吏先責其輸納自提控以下至于吏典但以所輸之貲第其出身之等差此吏員之源未清也夫欲使舉貢之得人在於修大學之法而科貢可用矣欲使掾幕監當管庫之得人在於辟舉之舊而掾幕監當筦庫可矣然吏者止可以循資如祖宗之制非得與科貢並也愚於貢猶有說焉㑹試有甲乙榜盖乙榜即亦舉人之中試者特限於欽定之制額故次之乙榜授以教職其實進士無異今特以敗卷置乙榜而以乞恩者概與教職則教官之選輕矣歲貢本以州縣之俊如徃年所謂選貢者今不本洪武舊制而專累日月則歲貢無少俊者可施以成均之教矣愚又怪夫今之未有以清其源而壅其源者又不止也自納粟買馬穵運納級之例日開吏道雜而多端官方所以日繆也而科貢吏員皆由此而妨閼矣故欲振飭吏治莫若清其源而無壅之凡此皆於格例之中修其廢壊耳於此二者其源既清於格例已復其常而於其間簡其卓異加不次之擢盖天下竒俊之士少而中庸之士多三者之道先為其法以就天下中庸之士而精神運用獨可於竒俊之士加於其法之外而不為法之所限此其所以能鼓舞一世之人材也或曰子謂吏道不得與先朝如尚書徐熈知府况鍾皆至顯用者何也曰此又不可以吏之途論也盖先朝用人時取之常格之外宋景濓一代文章之宗楊士竒三朝輔相之首皆以布衣特起乃遂掌帝制典機宻豈謭謭於循途者盖自古中世猶未嘗不事旁招俊乂博採聲望側席幽人思皇多士今百餘年寥寥未之見而專以資格進叙今亦頗苦其膠束伏隘而未能曠然也是以思為三途並用之說愚以為非大破因循之論考國家之故事追三代兩漢之髙踪以振作鼓舞一世之人材恐不足以剗累世之宿弊而収用人之實効也謹議前詔不及吏員此議不及薦舉兹兩存之以備考嘉靖十年正月内吏部題為開讀事查得嘉靖九年十一月二十三日奉詔書内一欵一天之立君本以為民今天下之廣兆民之衆為人君者豈能人人而加之惠哉惟在内外大小諸司得人任用而已我祖宗朝雖定科舉歲貢之法猶為薦舉之例並列三途自夫科舉之法重而尤以偏用進士為重而歲貢之法遂輕薦舉之路已盡塞矣夫三途並用材無偏重而人才有餘由是懷才抱德之士斯得顯於世非特求之文詞之徒而已今舉人無九卿之望歲貢禁方靣之陞田野絶保舉之路有一員缺必求進士出身者斯得推補以致人尚浮詞不修實行甚至修於家而壊於天子之庭欲求為上為德為下為民者率未易得也今後着吏部禮部即便考求祖宗以來舊典備細開具奏請定奪務要科舉歲貢薦舉三途並用但有真才實德不拘資格一體不次擢用庶忠義向風浮薄改行内外大小諸司各得其人以為惠民致治之本欽此欽遵抄奉到部除科舉歲貢係禮部掌行徑自具奏外查得𢎞治十九年天下各府州縣每歲於所轄隅廂鄉都内㧞選容止端謹無過人才一名申布政司考覈轉行按察司覈實有堪充歲貢開坐考過詞語差人送部若有賢良方正及山林巖穴隱逸之士并通曉經書儒士秀才孝亷俱各訪求到官不拘名數差人送部永樂元年勅内外諸司文職官員於羣臣百姓之中各舉所知懷才抱德堪以任用者以聞洪熈元年令各處見任官於軍民中薦舉行止亷能才堪守令經明行備可充教職者宣德七年令各處有司保舉有文學才行卓然出衆之士自三十五以上者俱送赴京師選用正統五年令進士辦事一年監生歴事考中並坐監三年以上由吏員授官曽歴兩考悉聽保舉景泰三年詔各處見任官有屈在下僚文學才行之士隱於民間文官罷職無贓犯而才學可用並聽在京四品以上在外撫按方靣官并府州縣正官舉薦聽用成化二十三年令軍民之中有懷才抱德堪為任用者許府州縣正官推舉送吏部以憑覈實考用不許徇私濫舉𢎞治十一年令山林隱逸之士有懷才抱德經明行修衆所推服者許本府州縣正官保舉從撫按及布按二司官覈實奏送吏部量才擢用如所舉不當保勘官員一體㕘究及查永樂宣德正統景泰天順等年由舉人陞任京堂者如俞山歴陞本部左侍郎吕震陞禮部尚書鄭誠歴陞本部右侍郎陳諤歴陞順天府尹鄧浩歴陞南京太僕寺少卿傅宗歴陞翰林院檢討由監生陞任方靣者如尚廸張鵬歴任左布政李浩袁昱歴陞左右參政荆璞宋徴歴陞左右參議華嵩劉成歴陞按察司副使張善楊和歴陞按察司僉事看得我朝祖宗求才圖治之法委的不限一途歲貢不足則求之科目科目不足則又求之薦舉夫薦舉者有人才則取之有孝亷則取之有儒士有秀士則取之有賢良方正則取之有懷才抱德經明行修則取之故薦舉一途比之科貢二途得才最廣三途並用然後天下之人才得以乗時並進而野無遺賢至其録用則又惟求才與位稱者用之初不論其出身以為叙遷之地故當時號稱得人多係薦舉所出奈何後來科目盛興進士一途日重于是薦舉之路遂塞歲貢之法亦輕矣夫薦舉之途塞則山林之下雖有賢士無由進用歲貢之法輕則貢之於禮部者類多衰朽無用之人故當事凡遇京堂方面有缺其勢不能他求只得取足於進士出身者用之伏詳詔㫖所謂舉人無九卿之望歲貢禁方靣之陞田野絶保舉之路大哉皇言切中用人偏重之弊合無查照洪武永樂以來舊典并欽奉詔㫖行令天下各府州縣正官保有懷才抱德或經明行修不干名利素為鄉評許可伏在岩穴者悉聽所在有司即時薦舉從本處廵撫廵按㑹同布按二司覈實然後送本部考驗奏請量才擢用若有徇私濫舉聽本部與科道官紏劾所舉之人後有犯賍罪者連坐舉主其舉人監生見任官員果有才德出衆屢經廵撫廵按官論薦及於本部查訪相同者不拘常格一體陞用京堂方靣等官以勵其餘如此則取人之途既廣用才之法亦均勞於求賢逸於得人而雍熈太和之治可計日而成矣奉聖㫖是用賢圖治國家急務我祖宗朝三途用人取之至廣俾才德者各稱其位故仁覃天下澤被生民後來因專務科舉之學偏重進士之選以致人尚浮辭不修實行蠧國害民者在在有之依部裏既開具祖宗及累朝事例明白逐一遵照着實舉行以後用人務要三途並進必求得人以稱朕用賢澤民之意欽此公侯伯表總叙封建古制也而莫詳於周周之天子僅稱王而其下為公侯伯子男不能子男者為附庸其命則自九而至五其别則有同姓有異姓而其封則以功德不以親踈秦始并天下創尊為皇帝廢封建公侯無尺寸之土而猶存侯爵為三等以待有功者列侯則如武城通武之類倫侯則如建城武鄉之類皆有邑名而不稱國下者則關中侯有封食而無邑名然皆金印紫綬而列侯倫侯至位在丞相之上尊重者莫如李斯九卿之見幸有大功者莫如蒙恬兄弟而皆不得沾其封慎貴可畧推矣漢髙豁逹裂天下以王諸子弟及大功臣而其次則因秦之舊為徹侯亦有關内侯凡二等第功臣之為王雅非其意至白馬之誓而獨侯國存武帝挾海宇鞭誅四夷不愛通侯之印以待有功者雖尠細或見録天下之壤地不能侯而國用則益侈于是苛為之禁以伺其過即尠細亦見削而髙帝身與共創業之臣所餘無幾封拜日下而侯國不日益漢地不少損自武帝而後封拜之典削亦漸寡而終東西二京其制畧相仿彿中間雖以吕氏之擅王與新莽之盗為公未幾輙罷自魏氏之末司馬擅制始復為五等曰郡縣公侯伯曰縣子曰縣男皆得稱開國金印紫綬而關内侯有不開國者顧反居子男下晉氏以至齊梁陳皆因之若北魏之與北齊皆崇設王爵以待勲舊而其更有功則别封郡公侯或一人而儋三四爵然同姓異姓皆不得為國王而郡縣公侯益卑矣後周宇文泰辭安定王遂以安定公終其身而其子簒魏進封功臣晉趙等大國然皆稱公而不王隋氏因之至唐而始定以子弟為親王正一品其稍疏而有功者為郡王功臣之有功者為國公皆從一品郡公以至侯伯子男則逓降焉如趙公無忌梁公𤣥齡之類皆得世襲而它以恩賜者或世與否自安祿山之為東平王遂毁周例而踰之然中興以後王公之格益輕至有佩櫜鞬捧酒巵而趨走於節度之庭者而封亦不復世矣宋興復唐初之制以宗室之懿叙封王爵而其疎者與文武大臣自國公而下至子男徃徃以推恩逓進徒以􅍇其名而已户不得言祿爵不得言世然猶斤斤守其制焉自蔡京之公而國而公制紊矣童貫之為王而王制除矣南渡以後所謂三者遂冐於宰執如檜如侂胄如彌逺矣元承遼金之後王爵尤易即將相非勲德可以一嚬唉而得之獨漢人至國公而止明興髙皇帝之下建業草創未遑吳元年始拜功臣李善長徐逹常遇春為國公而其他功臣之死勤事封疆者有國郡公侯伯子男之贈然徃徃一徇元舊洪武三年始大啟封建皇帝之子為親王親王之從庶子為郡王而功臣則公侯伯三等有世襲有流爵罷子男不置公侯位正一品上伯位正二品上朝服進賢官加籠巾貂蟬世襲者領鐵劵流爵則否當是時封伯者僅二人忠勤之祿僅當侯三之一誠意至不能當六之一而其輕可知矣十年以後封束莞徽先祿遂與侯等永樂初而始定居侯之下正一品之上其階勲皆與侯等而伯益重矣凡公侯伯之任入則掌參五府總六軍出則領將軍印為大帥督留都筦鑰轄曹綱獨不得預九卿事大抵視一以下獨隆崇云髙帝功臣公侯伯表余讀髙皇帝洪武之三年功令未嘗不三復而嘆也曰嗚呼厚而裁則可久矣當是時封公者六人而魏公功最大祿秩亦最重中山侯宿將也以一言之誖而不獲公德慶侯鉅勲也以一事之紕而不獲公永城封而貶東勝封而奪訓詞盖凜乎斧鉞焉夫孰敢有恣睢而隕于法者然至安吉江夏臨川東平之類抑其殱夷狼籍也三年而後續侯者獨西畨之役最盛平雲南次之其它以舊封伯錯封然至藍氏之株累而幾若掃矣夫以馮宋公傅頴公之雄而卒不免死嫌謂其不蔽法也可諱之猶不為置後可嘆也太史公言幽厲之後見于春秋尚書有唐虞之侯伯歴三代千有餘載自全以蕃衛天子豈非篤于仁義奉上法哉漢興功臣受封者百有餘人天下初定故大城名都散亡户口可得而數者十二三是以大侯不過萬家小者五六百户後數世民咸歸鄉里户益息蕭曹絳灌之屬或至四萬小侯自倍富厚如之子孫驕溢㤀其先淫僻至太初百年之間見侯五餘皆坐法隕命亡國耗矣網亦少宻焉㫖哉所稱網少宻者人主不睹其先得天下之所由是以輕視其功臣而私利其土地人臣不睹其先國之所由是以易為慝而難為守明之國邑薄不過再倍一公卿而已天子無所利之然而至嘉靖百餘年之間初所封六公僅一公在二十八侯其二侯進為公者亦絶而餘二十六侯一里土乗駟之奉後封四公二十一侯二伯亦僅西平武定在耳其故何也當是時天子紹明先世之道慨然下明詔太宰大司馬追政故實収錄故鄂國公遇春曹國公文忠衛國公愈信國公和後俱為徹侯誠意伯基後仍為伯増其秩天下翕然歸厚焉而一時奉行之臣不能推廣德意至使宋頴二公遂不獲一比肩曹衛而李韓公廖德慶吳江隂靖海之裔寥寥勒一命之澤將無望于後聖哉夫繼絶世舉廢國天子所以懷諸侯也則自古記之矣夫豈欺我故特紀之而表其興廢云永樂以後功臣公侯伯年表文皇帝以建文之四年七月下京師即大位因其年為洪武三十五年又二月制詔吏兵部差次從靖難功臣遂封淇公等二公城陽等十三侯興安等十一伯已又錄降附功増曹公歲祿封永春一侯忠誠等三伯明年封駙馬都尉袁客等二侯遂追舊功封豊城一侯寧陽等五伯三年復追舊功進封新城侯至是靖難始究六年論平安南功進封新城西平二侯皆為功増豐城侯雲陽伯祿各五百石已進清逺一侯安逺建平二伯終文皇帝之世凡再大封至睿皇帝之元年論奪門迎駕功進封武清侯為忠國公封太平一侯興濟文安等四伯已又封武功一伯自是終諸帝世僅一大封而其它破軍殺將戡亂僝工之特封者不與焉鳴呼靖難諸將臣從藩邸起以一旅之師彈丸之地出萬死者三載而安宗社于泰山之固此其績誠巨然英主實在軍攻堅履危斷自神授又大戰不過十餘所定軍府不過三四而已母論中山開平其視曹衛宋潁而下抑何徑庭也定興之掃安南固自偉亦何能超潁川之下滇蜀且久復失之今髙帝之盟白馬指黄河而誓其功臣鮮有存者易世而後所留僅如一綫區區萑苻之盜累級數十以至百積封自伯而至侯遂有公者今胡以貂綿蟬聫也以此况彼誠不可同年而語自孝宗而後執政者始知愛守名爵不輕畀而不能無畏於首尾未暇一一釐正之然至新建之取叛王不煩天子璽書不費太倉水衡金錢縛之于股掌寧逺之摧東累積級至萬餘其所遘敵固皆瑕然其績豈與它徹侯等而縉紳大夫猶齗齗有後言者何也少所見多所怪故也又陋而不習掌故余故表之以告夫司勲者内閣輔臣年表叙内閣故翰林學士任也始髙皇帝渡江剪荆棘日不暇給矣而稍從諸儒生受經而是時𢎞文學士基最貴幸當帷中寄丞相以下亾敢望之已益勌焉上業進學士承㫖同及濓濓又最幸得偕上坐起其職大抵紀註言動備顧問云而上時時授以㫖使為詔草濓獨多所當久之上傚宋益置華盖謹身文華武英四文淵東閣二俱大學士秩正五品徴諸明經長者以次代擢而㑹丞相惟庸敗析中書六之尚書寄天下任而大學士稱近臣不為置僚屬亾所治天子方自操威福亦亾所寄裁至文皇帝繼大位始即文淵閣召侍講七人日入直左右已益親重上所與謀羣臣甚秘稍遷至大學士歲時賚予同尚書矣仁宣朝用太子經師恩累加至三孤益尊而宣皇帝右文遏殺内柄無大小悉下大學士士竒等取報行而吏部蹇義户部夏原吉以不時召得迭入省可六尚書事與士竒均而大學士陳山等或鮮所關預豈無顓職由上輕重裁耶論道之體創尊仁宣迨景及憲大權始集今視之赫然眞相矣夫閣于禮至貴倨也視百司乃無重相壓何以相稱焉其喜怒借上意故上不嫌逼也威福間己意故下屏息也創白由六曹故難不與也取以詔行故衆無敢訾也賢者當之不見跡而治不肖者當之不及敗而亂此在人主擇矣公孤表三公古官也自周公制為一代經典而係之曰太師太傅太保曰三公少師少傅少保曰三孤又曰官不必備唯其人盖坐而論道者其體誠重而其選誠不易矣漢承秦制設丞相大夫以至九卿而罷三公不復設至安漢公莽竊政始自為太傅而以虚名崇故丞相孔光為太師東漢以後惟代置太傅一人踞三公上而隆其秩曰上公至董卓竊政自相國拜太師踞諸侯王上而幾成鼎革矣晉以避諱故改太師為太宰然猶在丞相下大將軍大司馬大尉司徒司空上江左以後自王導謝安外非宗屬尊貴者亦不及而北魏之季太師與大丞相並加以待執國之臣北齊因之太師與太宰並設而序遷太宰乃序遷左右丞相則又舛矣宇文泰之執國始倣周官自為太師大冡宰兼總五官之柄而宇文䕶因之其事雖美其心則慝矣乃欲與三代比隆得哉自隋迨唐大抵以太師太傅太保為三師曰上公而以太尉司徒司空為三公而宋氏亦因之然三公不時置而所謂三師者抑何寥寥也太師重矣乃有謂太尉次重寧與太傅而不與太尉者宋徽宗政和定官制如以太宰易左僕射少宰易右僕射為真宰相太師太傅太保為三上公以少師少傅少保易太尉司徒司空為三孤無職而有秩以隆宰執之資深績崇者南渡而後因之元人得中土置公孤皆如故而益以太尉司徒司空環衛之㣲與言色之昵合朝拜暮加不可勝紀明興髙皇帝始釐正之罷太尉以下官而李韓公善長徐魏公逹以舊德元勲為太師太傅亦無職事不置掾屬防閤洪武十三年罷中書省采御史言欲特置三公府竟不果而僅設四府官位尚書上聘耆儒自布衣徑為之賜坐倡和分四時以示燮理之任而無何復罷師傅之官自魏公薨韓公雉亦絶響矣將下視博采鮮所當意所謂無其人則缺者耶建文永樂代不置此官仁宗初即位謂羣臣皇祖考神聖無所藉毗師傅即𦕈末何敢于是拜張英公輔太師沐黔公晟太傅陳寧陽侯懋太保蹇吏部義自少保屢進少傅至少師楊殿學士竒自少保進少傅夏户部原吉進少保于是公孤之官備矣然以是寓美稱耳非必有燮理之實也獨宣德三年詔太師輔少師義少傅士竒少保元吉太子少傅榮俱輟所領從容謀議以不時召對凡所游幸必從庶幾若真授矣而士竒榮理閣務如故自是而後三公僅公侯伯而文臣限三孤以為常嘉靖二年以太學士楊廷和一品滿十二載且有定册功太傅四辭而止萬厯九年大學士張居正一品滿十二載遂拜太傅其後病甚以遼左功加太師不及拜縉紳聚而譁之以為非故典然而嘉靖中加大同帥左都督周尚文錦衣帥左都督陸炳武弁也其非故典尤甚而未有譁者何也夫燮理責之紈袴論道以施乳臭即公侯伯奚取焉然則文臣而加者非德嫓則譁非勣崇則譁非齒宿而資重則譁以譁江陵可也夫四者備矣而譁不必也政和之制有以太尉冠武階于義竊謂可取云東宫三師表東宫三師古官也漢獨制太子太傅二千石至東漢為中二千石少傅比二千石後亦為二千石魏晉以還雖並設三師而徃徃不備官大約太師太傅太保為一品下少師少傅少保為二品上髙帝初因勝國之制自太師至賔客皆無所闕掌而詹事以下至于坊局始實為宫臣然洪武元年丞相善長逹平章遇春帶少師少傅少保右都督馮勝帶詹事平章廖永忠趙鏞帶副詹事都督康茂才等帶左右率府使副御史大夫湯和鄧愈帶左右諭德中丞劉基章溢帶贊善大夫善長基溢理省臺幾事煩日不暇給而逹遇春等諸大將帥征討之不遑然則以虚名被之而已所日授經者宋濓軰耳洪武二十二年公馮勝傅友德領太師公藍玉李景隆領太傅公常昇侯孫恪領太保而尚書詹徽兼少保尚書楊靖領賔客亦不聞有關掌永樂初以公李景隆丘福領太師朱能領太傅尚書蹇義金忠侍郎墨麟領少傅事而學士解縉等七人皆兼坊學士庶子諭德中允等官顧獨僧姚廣孝專為太子少師㑹上狩北京廣孝與義忠麟留輔太子學士楊士竒亦以諭德輟閣務輔太子而自是以後三師至賔客乃為虚銜以待文武臣之資重或有功者然三師視三孤三少在尚書上賔客在侍郎上故為表之使有考焉翰林諸學士表學士非古官其職初散寓於中秘諸省至唐文皇開天䇿府而始有學士之目武后中復置北門學士間以親暱充之如漢鴻都而加重其後至德宗朝始定設學士繫衘于翰林與中書舎人對掌内外制然無定品徃徃寄祿於他官其資重者至散騎諫議而淺者僅拾遺參軍尚不能與舎人埒獨其長一人最貴曰承㫖徃徃竟拜宰相其次亦不失三師觀察卿監至宋一切因之而益加重然不為定品如故元豐制行自是稍有恒秩元之初興定學士承㫖正三品學士以下逓降有差其後進承㫖為從一品視中書平章政事學士視左右丞髙祖初下江南庶事草創有所聘擢以備顧問而已吳元年五月始置院學士正三品侍講讀學士正四品直學士正五品修撰典簿正七品編修正八品洪武二年正月定學士承㫖正三品學士從三品侍講學士正四品侍讀學士正五品典簿正七品待制從五品修撰正六品應奉正七品編修正八品典簿從八品九年閏九月詔承㫖與六部尚書同然班在其上十四年罷承㫖直學士待制應奉檢閱典簿十八年三月始定置學士一人正五品侍讀講學士各二人從五品孔目為首領一人未入流侍讀侍講各二人從六品五經博士五人正八品典簿二人從八品侍書二人正九品待詔六人從九品皆稱屬又修撰三人從六品編修四人正七品檢討四人從七品别為史官亦係屬焉是歲侍讀始列侍講前建文初大有所更制然于職分無損益永樂初仍髙帝舊尋擢史官解縉而下七人入内閣預機宻典綸綍然自學士王景卒解縉胡廣楊榮軰猶相繼領院篆洪熈之歳大學士士竒驟遷至三孤踞六曹上遂不復領院矣第文淵内署與諸曹異文移徃復猶以翰林行之今雖稍稍變革而猶有一二存者如史成焚草中貴傳㫖猶傳大學士為翰林學士翰林公署中左設大學士三座學士一座而講讀學士東西對列是也學士秩雖卑而職與内閣通故係其姓名于後六部尚書表尚書非周官也自秦寄國事于丞相而内庭有尚書其為令丞不可攷但其職惟以通章奏而已漢興至武帝而始削丞相權躬自攬斷而中書令以㕘尚書至臨崩而始命大將軍霍光領尚書事裁斷萬幾可否保䕶萬乗兼馭宫禁而九卿將軍守相所諮白不之丞相而之大將軍富平繼之稍自抑絀至大將軍王鳯而復修光故事權至侔人主丞相取充位而已成帝始置尚書令各一人尚書四人凡四曹曰常侍曹二千石曹民曹客曹後又益四直三公曹是為五曹然不過一大將軍掾屬而已後漢光武不以政委三公天下章疏皆尚書與人主㕘决乃下三府而至孝明以後天子初即位輙置錄尚書事以太傅居之或以太尉參之然時置時罷而令僕射及尚書號八座其可否庶務即今之内閣而案考功法詰責公卿又有今所不敢望者然令秩不過千石僕射公百石銅印墨綬令以久次始得為郡守用望遷九卿而尚書至有補大縣令者以故委寄雖重而不敢萌肆心至魏晉時令僕不出為他官徃徃逕為三公如山濤衛瓘或領開府如荀朂而居端揆自命矣魏分尚書五曰吏部左民客曹五兵度支晉分為六曰吏部五兵客曹駕部屯田支度而尚書始以其職入衘矣渡江後改為吏部祠部五兵左民度支凡五歴宋齊梁陳又加都官為六當是時六尚書雖分寄省事于令僕不稱屬而吏部尤重沿至北齊周隋有錄公則録為真相而令僕為參執無録公則令為真相而僕射為參執無令則僕射真相矣而中書主奉行門下主封駁與尚書省次體而為參執唐自太宗為尚書令遂罷令不復置而至髙宗以後左右僕射為左右丞相姑美其名以為侍中中書令優老之階而歸重文武二憲其後遂以中書令為右相兼文部尚書而李林甫楊國忠居之左相兼武部尚書而李適之陳希烈居之尚書之重盖未有甚於此時而左相武部其權寄不能右相文部之士二亦人主為之低昻耳至德以後侍中中書令復以重故為勲臣加秩而二侍郎同平章事為真相資望之深重亦有至中令侍中者其左右僕射或以為加秩或以優資大抵省事非關係天下大計而六尚書亦因之矣宋初以至元豐政和淳熈宰執之更改不常而六尚書之係尚書省如故元制中書省令丞相平章左右丞參政以釐天下之務而吏户禮兵刑工六尚書為曹官率屬分職其尚書省遇理財則以權幸臣為之徃徃奪中書柄然不數歲輙革而以尚書部𨽻中書省于職名頗不維矣明髙皇帝下江南即置行中書省自頒之即吳王位改置中書省而于六尚書勢不遑設洪武元年始備六尚書皆正三品而侍郎正四品郎中以下品秩有差而皆𨽻中書省一仍元舊獨戸部事煩設三四科尚書尋亦罷十三年丞相胡惟庸以專擅蒙蔽誅分其職于吏户禮刑工兵部分五大都督府為五而攝其樞要于兵部陞尚書正二品左右侍郎正三品雖並稱政府而名位不極事權不專天子之威福無下移盖隱然周世六官之媺而獨冡宰不制國用司徒不掌政邦教以此小異耳建文之主歸重左班以故進尚書正一品増設侍中正一品侍郎品如故欲以踞五都督之上而權輕位崇遷拜太驟識者以為未然至文皇即大位而悉從洪武之舊矣是時改北平故燕國為北京設刑部尚書以總布按二司事行都督府總都司永樂上狩北京討不庭經畧定鼎之日雖備行在九卿印以從然皇太子以元良監國大小庶務悉以委之唯封爵大辟及除拜三品文武職六科都給事中以聞而户部主糧餉兵部主軍旅禮部主朝議始以行在尚書夏元吉方賔吕震扈從而九卿印務徃徃令原吉兼攝是時六部政本猶在南十七年而皇太子歸青宫以皇太孫留守南京六部政悉移而北十八年行在六部落行在字諸九卿大小省署之留皆稱南京洪熈元年天子留意豐鎬諸九卿大小之在南者皆落南京字而六部復稱行在宣德三年始定如永樂𢎞正以還内閣日益重而六尚書日益輕然老臣勲業稍重加三孤東宫三師共吏兵之長猶能與之抗而至分宜之得政則若外藏矣江陵之當國則若曹郎矣嗚呼人主不可以太阿授人哉余因攷六尚書姓名自永樂四年而後十七年而前其在南北者皆列之本部十七年而後在南者始列之南京盖以政本為重故也都察院左右都御史表都察院古御史府也自周官御史掌贊善授法令秦人因之自漢益重置大夫以貳丞相銀印青綬位上卿于萬機無所不參攝每丞相闕則大夫以次選代成哀之際遂為大司空與丞相大司馬俱封侯位三公金印紫綬後雖旋復旋改而建武以還遂定與太尉司徒仍三公故鼎足承君矣當御史大夫有中丞二在内則掌蘭臺秘書受公卿奏事舉劾按章外則督部刺史與丞相司直司𨽻校尉察舉非法自大司空設而中丞廢獻帝時尊權將曹操并太尉司徒于丞相俾任之而郄慮以御史大夫為之副然不復置中丞至魏黄初建司空官仍罷大夫不置而歴晉宋南北朝以至北齊後周别設中丞主臺事而御史府自是稱臺矣後魏以至北齊改中丞為中尉最號雄峻若李彪崔暹之類紏按貴戚威行朝省瑯琊帝子之尊尚假赤棒之威以自張餘可推也隋始復置大夫罷中丞唐初亦因之有以其官為大司憲者以臺為正肅者而職任如故開元之際復為御史臺而大夫與中丞不並設其職俱以振綱紀察奸弊中丞秩雖卑大夫而雄峻過之至有逕入相者宋初有中丞而無大夫其屬有侍御史監察裏行知雜之類大約三司使學士承㫖以為班知諫院司諫正言以為表裏參知樞副承郎僉院以階進監司牧守以待退至元而尤重其任設大夫從一品中丞二品侍御史從二品治書侍御史正三品皆為長官當是時扎雅圖帝有恒言中書省樞宻院吾左右手也御史臺治吾左右病者也㫖矣明興其初制一循元舊當是時左右大夫湯和鄧愈數膺斧鉞寄外出而中丞劉基章溢理臺事其後汪廣洋陳寧軰俱遷大夫洪武十三年胡氏之事發而御史臺僅設左右中丞俱正二品侍御史正四品而已十四年始改為都察院然僅正七品其官有御史而無都御史十六年仍為正三品明年為正二品于是定設左右都御史正二品左右副都御史正三品左右僉都御史正四品職紏劾官邪申辨寃抑而所屬御史分為十三道御史廵按以至它公委出則奏請還則考績然御史獨不係都察以示相得紏察之意建文初改為御史府都御史一員左右副都御史各一員品如故故十三道御史曰左右兩院監察御史永樂鼎革悉復洪武之制其後移都察院于北京而留者曰南京都察院畧如六部矣其以左右都御史而下總督提督㕘贊撫各鎮者初自本院出曰公差事或得代則回理院事其後不勝多則徃徃自部佐卿寺藩臬遷轉亦不復歸院以為衆御史大夫中丞左右都御史及左右都御史出鎮者總督陜西三邊都御史年表髙皇帝初中山武寧王逹等下陜西遂悉平甘肅寧夏諸鎮秦慶肅三公鎮之而侯伯都督耿秉文等理兵政間命宋潁諸國公一按閱操練而已永樂始命寧陽侯陳懋西寧侯宋晟鎮寧夏寧逺侯何福等鎮甘肅而文臣不過分理文移治糧餉而已正統初西邊弗靖始命兵部尚書王驥提督諸軍踞總兵官任禮蔣貴上討平而陜西右都御史王文陳鑑分歲鎮守然實未嘗合三鎮而歸一總督也成化初滿政據石城叛詔左副都御史項忠總全陜三邊兵討之已詔右都御史王越右副都御史馬文升總兵如之然有事而置事已則革不為恒也𢎞治十年始起王越以太子太保左都御史總制禦火篩十一年二十五年秦紘以户部尚書守如越自是定矣嘉靖十九年避制字改總督總督兩廣軍務年表洪武元年師未下廣東西命永嘉侯朱亮祖出鎮廣永樂中廣西則都督韓觀山雲侯柳溥相繼為大帥得專征及誅賞獨有文臣督攝之寄至正統十四年苖㓂蝟起廣東則命侍郎掲稽廣西則命侍郎李棠各廵撫之然二廣地勢犬牙賊東西豕突來徃叵測而武臣自守便利不相䇿應天子用兵部尚書于謙言命太子太保左都御史王翺總督兩廣軍務總兵以下悉聽節制一切便宜從事然事已即歸不恒設馬昻再以提督至葉盛以成化元年復命都督趙輔帥大兵討之陞浙江參政韓雍為僉都御史贊理軍務然于制書特重雍既平㓂遂命總軍務兼理廵撫久之雍以兩廣土地廣逺恐餘孽復生重貽邉患請于朝願得文武大臣分理其事上命副都陳濓撫廣東僉都張鵬撫廣西而雍專治軍尋以憂去五年復起雍以右都御史總督兼廵撫于梧州開設總府居中調度兩廣副總兵㕘將而下悉聽節制而兩廣廵撫不復設仍統于總督正德十一年改都督為提督嘉靖四十五年因廣東㓂發遥制不便兵部題准總督軍務止撫廣西于廣東另設廵撫至隆慶四年改總督閩廣兼理糧餉廵撫廣東于廣西另設廵撫南京守備恊同㕘贊大臣年表永樂中皇太子監國南都府部大小諸臣六軍按堵如故自二十二年皇太子即位為仁宗亡何晏駕皇太子來自南都即位是為宣宗始制詔太監鄭和王瑾總下西洋及留水陸兵馬與駙馬都尉沐琮襄城伯李隆同督守備于是和等稱内守備琮等稱外守備而亡何琮罷隆專督守備久之以南京户部尚書黄福㕘贊機務參贊所理專外守備亦時與内守備㕘盖位差亞而權實重今列外守備㕘贊諸公于左總督河運兼廵撫鳯陽等處都御史年表太祖有天下漕東南粟于海以營遼東五年屬靖海侯吳禎復卒乃遣都朱夀張赫領之二十年冬十月享太廟封夀舳艫侯赫航海侯又嘗建漕運使尋罷成祖始命平江伯陳瑄治漕河内地贍北京景泰二年特命都御史王竑總督與總兵㕘將同理其事尋令淮陽廬鳯四府徐和滁三州屬竑廵撫兼督常盈倉以淮為治所至成化八年改廵撫總漕各設一員明年復舊正德十三年又各設一員十六年復嘉靖三十六年又改各設一員四十年復廵撫自永樂十九年吏部尚書蹇義廵行南畿考察官吏至宣德五年始命刑部右侍郎曹𢎞廵撫正統八年又命工部右侍郎廵撫十三年又命刑部右侍郎薛希璉吏部尚書趙新相繼廵撫然未奉命故另列表首今詳漕臣年表于後其行實見于事紀其勲德茂著者表為列傳若奉勅清理田地賑濟饑民并考察官吏有事准甸不可以類附者亦另列于後云國子祭酒年表國子監古太學也祭酒古宴賔之尊長者先舉酒而酹地者也博士有之郡邑三老亦有之至晉而始以祭酒屬國子遂為諸生師髙皇帝因元之舊不廢其僚有司業監丞博士助教典簿正學學錄掌饌之類祭酒正四品尋降秩為從四品以鳯陽為中都亦置國子祭酒未幾革永樂間都北京設國子監其國子監冠以南京國朝官職事宜問辯三省問三省者漢以下之制得失互制之法可行于後世天子不能以一人治天下尚書省奉行之不可無也繼世貴養不能勞悉萬機中書省造命之不可無也獨任易流則門下省審駁之不可無也今日之事可與同之否曰三省之意古與今大畧相同但前代都未盡善中書尚書官尊得門下省相為持衡惟漢武宣以任宦者弊於襲成帝以更士人弊於輕晉宋而來以屬相臣弊於合光武事歸臺閣則繼之者弊於尚書任重魏置秘書令監典尚書奏事則中書宻勿弊於尚書疏逺東晉南北朝天子以侍中常在左右弊於權歸門下唐武德中門下省署政事堂開元後移政事堂於中書省皆先議同而後行之宋宰相兼統三省以三省為空官元以中書省為都省弊於和光而無建白吕公著司馬光請三省合班奏事分省行事議者謂既同進呈不應自駁已行之命盖無補於事也宋宰相權合三省所籍後省給舎尚存㕘復之意元豊制則以給舎為宰相屬官由是風采蔑聞矣我朝太祖深識此意重六科封駁與天子抗議而特卑其衘超越前古之見其一洗諸弊者乎入閣考之漢朝凢為賢相俱由郡守考之宋制凡為宰相須歴州郡盖取其知閭閻之困苦與人情之練逹也我朝若薛瑄入閣則由御史李賢入閣則由主事皆為一時名臣大學士楊一清亦由巡撫而轉吏部選入閣矣是誠立賢無方善能變通者也乞議為定制永世遵行可焉師保問師保加官自三代而上且然盖古之道乎由今以觀若綴旒然徒以為華也則奈何曰世之議者謂三公三少之不當立則哂然以為不考古甚矣古三代之英三公論道三孤貳公𢎞化盖天子不可無師故歴代因之似矣而孰知其為責也格人主之非必司萬化之原無案牘以為託者乎是以周官不列衘司冦詢萬民位槐棘司士掌治朝儀位太僕掌復逆不過備顧問習聞國議論道不論政與後世師傅保異耳夫尊之以道則不常授之以事今大臣總有朝廷機務復以師禮致隆如其實師之則宷寮稽覈之典或疏如繫之以空名則其建是官亦徒也太祖的知此意未嘗有師保加秩太宗深識太祖之心至洪熈朝始加張輔為太師楊士竒為少保進少傅楊榮為太子少傅進少保後三楊皆進少師又夏元吉蹇義黄福亦加師保景泰間以易儲事文武大臣各進師保之衘天順初悉革罷天順五年曹欽及李賢幾被害獨加太子少保成化初復加少保吏部尚書王翺加太子太保其後或以考滿加或以論功加漸無制矣故以道德為王者師官不必備惟其人乃借為酬恩榮資之賫不惟溷王者不僭之賞抑所以長臣子自恣之心至於身殁濫為贈典則尤其無謂者矣内閣問本朝内閣票㫖太祖太宗未有也然繼體之君貴養萬幾之勞似須有代之者而絲綸之寄權局攸歸復與相體無異則太祖禁立相之嚴恐於此焉閡矣設加情於内閣之臣則欲通閭闔者乃釁端焉奄監是重有不宜可乎敢質其所由來與可通於萬世盖奚從而便曰永樂初建内閣於東閣門内取翰林解縉等七人在閣辦事止以備顧問官衘學士而已終永樂之世楊士竒楊榮官止五品是時尚沿太祖之意欲卑其衘以殺其勢至仁宗朝其意漸失一在閣資深又東宫誼厚勢難久滯乃陞楊士竒為禮部侍郎尋加少保轉少傅兼華盖殿大學士楊榮為太常鄉進太子少傅兼謹身殿大學士楊溥為太常卿兼翰林學士此三楊特恩破格之始也後楊榮陞尚書授以工部盖不欲以兼官壓六卿之上楊溥丁憂起復不入閣宣德間因九年考滿陞禮部尚書至英宗時復命入閣故宣德以前内閣與外九卿為平交執禮持法不相顧忌宣德以後三楊眷重漸柄朝政英宗以九歲登極事凡啟太后太后避專令内閣議行此内閣票㫖之所由始也然三楊權在不妄用及楊榮卒於正統五年楊士竒卒於正統九年楊溥卒於正統十一年則漸改於其舊及景泰易儲之後雖天子亦藉内閣以為已用但其官品如蕭鎡江淵許彬王一寧商輅等皆不脫學士之衘天順初李賢始以兵部侍郎陞吏部尚書兼翰林學士入閣薛瑄由大理卿陞禮部侍郎兼翰林學士入閣成化𢎞治多由侍郎陞尚書入閣若先陞尚書則無入閣之命至正德初劉瑾亂政其黨焦芳直以吏部尚書入閣盖以外寮之首而入主中秘之權然亦隂執其柄至張孚敬則直以相體自尊危坐諸卿之上而名委之張雖好髙不懼絶利一源乃其具美以後則廣容奔競鈐攬百司典内則禍福響應漁外則餽將鱗集有不可勝言者矣天官冡宰問周禮天官卿總五官庶職如錢榖供御悉屬其掌理不幾於𤨏屑非易簡之道乎然今日之事何以不然曰周冡宰之職只稽覈百官而出之法敷布于正月之吉廢置于歲終之㑹只大計於三年之誅賞豈屑屑八法八則八柄八綂九式九職九貢九兩之親理耶彼其所有事在建牧立監設參傅伍之類定其銓注以考課要其功罪其贊治聽朝及戒祀贊至不過具百官之長非其所專業也今之職掌大畧相似惟計覈疏宻為不同及内政不相關逈異耳銓司問銓司缺少每病壅滯奈何曰覈今仕板京堂官約一百二十餘京司官約五百方靣官約四百進士候選者三年約三百進士為州縣正府佐及舉人官可陞京司約二百三年之間以進士候選者進士為州縣府佐者舉人官可陞京司者共計五百以陞京司五百之缺京司之五百以陞方靣之四百及羡餘以補京堂方靣之四百合京司羡餘共以京堂綂共約一千五百員三年之内續益進士三百舉人約陞京司者少許歲准其益數計合消一百餘員以一千五百人歲得廢黜亾故百餘消息之數亦自然之勢也而銓司復慮才湧而官無以居之乃不為久任長便之法或數轉以申私或巧排以騰缺或添註増設以疏通而士無固志雖欲痛裁奔競其庸得乎哉臺省今之弊官不久任國初臺省不甚通如御史陞按察僉副或徑陞使使久則入為左右副都則左右副僉則左右僉如知府久則陞左右布政使或參左右使久則入為部侍郎尚書等如此則法吏敢持繩紏之權民吏無不更事之嫌今臺省既大相通融而任又弗久也盖官非良久必敗故今之官利數遷往往夤縁求速故私奸易規避大事又徃來途路迎送麋費甚者一官至民不知姓名去矣猶過客也今又為小轉法如知府轉按察副使按察僉事轉㕘議等或年資未應轉又為更調法如此府調彼府此縣調彼縣此臬調彼臬此省調彼省等甚者廵撫都御史亦調法愈巧而官愈廢故曰今弊翰林問吳元年置翰林院開禮樂二局洪武初局廢已而設學士承㫖侍講侍讀直等學士及典簿待制修撰應奉編修典籍檢閲官洪武十四革承㫖直學士待制應奉檢閱典簿又設孔目五經博士侍書待詔檢討至十八年定學士侍讀侍講學士為正官孔目為首領官經博士典籍侍書待詔為屬官編修修撰檢討為史官又有秘書監𢎞文館起居注亦皆革先是十五年倣宋制設華盖武英文華殿文淵殿東閣大學士後先創革必有說乎曰髙皇帝初定東南首召陶安為學士制度儀章悉安所議是時宋升詹同宋濓魏觀劉三吾葛鈞皆有藉焉洪武初典禮肇修局且廢制誥記史藝翰有國之首翰乃立諸員而總以學士為提綱學士文學之成者以之侍其讀侍其講以親其所御其考經執籍執書應詔更以供其所役編焉撰焉檢覈焉以記其所行此建置之周也中間謂其繁而革之亦各有指殿閣之沿於古即承㫖學士直學士之職也制應奉即知制誥之事也檢閱即檢討之官也秘書監即典籍之司也起居注即史官之業也𢎞文館即五經博士之屬也盖廢置有因典司無缺而設立甚明其後不就列陳力典宻非奉直原司制誥非承㫖舊意修書非史官故業撰著非學士本色或非昔之舊矣官僚問願聞官僚建置曰國朝東宫官屬洪武二十五年以詹事院為府左右春坊司經局悉屬焉二十九年増設清紀郎司諫通事舎人大要以輔導侍從為職盖預養皇德雅意墳史輯頥性情前代設五率十府掌兵仗羽衛洪武初沿古亦設左右率府尋罷夫東宫不在防禦衛則廢置之由其輕重太祖已深識之洪武初置諭德贊善洗馬庶子等官皆以勲舊大臣兼之亦沿親翊三府之義皆非設官之正耳夫詹省也給也視主而給之視屬而省之總其屬以事主主德未修吾輔掖之無功也主學未明吾開導之弗至也是故羣而正焉少而習焉不見異物而遷焉此皇之所以恒為皇三代有道之長也國初立大本堂合親王居之是時制未全備永樂間定文華殿講義師少詹事鴻臚給事衆官講畢齊出及有召問衆官亦必齊入苦獨進獨留許給事鴻臚司直清紀紏劾天順間革選秀才以充伴讀皆所以慎清接與不令見聞之雜也司直清紀詹事府侍從兼輔東宫舊設司直清紀職掌紏彈今官且不設矣况繩愆紏繆哉總督夫天下豈有常之勢哉顧制勢者何如耳善勢者常合而不分則常治不善制勢者常分而不合則常不治三代以上無論已漢初以合治矣其終也以分侯王而亂唐初以合治矣其終也以分藩鎮而亂宋初以合治矣其終以分南北而亂夫通天下猶一身也治一身者必使摩頂放踵氣血周流榮衛清利精神管攝而無有壅蔽杆格之處是久視長生之道也治天下者必使循内及外逺近相折大小相濟强弱相維而無有偏重不舉之處是久安長治之道也我列聖制勢之䇿盡善矣無遺筭矣盖兩京十三省各設廵撫大臣以制京省之勢而凡城池錢榖甲兵官屬丁田之勢皆得便宜從事而文武諸臣悉攝巳以聽而奉行其制命焉而得其人也又太平無事則一國之勢合而不分則常治而不亂此國家安寧之術所以度越前代也正綂而後或變生於腹裏或釁起于邉陲而諸邉諸省一時撫臣多不能振聫屬之策興討罪之師保境以自全攖城以自守直為懔懔耳若北之也先河北之趙賊西蜀之廖冠江西之華林及藩豪八閩之鄧茂楚之麻陽廣之岑猛滇之麓川猖獗震蕩而各省撫臣皆相視而莫之能相救必設總督而後能平之彼其時非盡撫臣之怯也亾筭也爵並權均夫兩大不能以相使而况十數大乎勢分故也列聖振長䇿而議聫屬邉方腹裡多設總督以聫屬而節制之若連環然且頒之勅如一省難作則總督調近省之食與兵或擊其首或邀其尾或掎其左或角其右有同心合制之權已則散而歸之無借兵之苦無萃食之擾語曰分指之十彈不如合掌之一擊此分合利病之說也制勢之䇿善之善之者也難之者曰多設總督恐多擾則不便恐多費則不便不知今天下薊遼已設總督矣宣大山西又總督以聫屬之陜西三邉又總督以聫屬之四川雲貴湖廣嘗設總督矣事平罷不設假令至今存也調諸省之食與兵撻而制莽酋耳胡有今日之紛紛也且兩廣有總督矣閩浙直又設總督以聫屬之事平又罷不設假令至今存也調諸省之食與兵直拉朽而誅浙兵之亂矣又胡有今曰之紛紛也近又從言者河漕總督得提督南北直𨽻山東河南之兵浙江江西湖廣之食是中原一總督也即有師尚詔者弄兵釜中第合諸路坐而烹之爾又胡有徃事之紛紛也惟河漕大臣不當令兼廵撫鳯陽爾夫鳯陽廼是陵寢之所鍾也中原之所樞也其地重其勢尊烏可以河漕帶為也且古治水者八年萬里于外又安可匏繫一隅哉决以另置廵臣便由是言之則邉海増兩總督足矣鳯陽増一廵撫足矣増三臣而博天下安何費之足云且無事則總督不得侵廵撫之權有事則廵撫不得抗總督之命夫調兵食之事數十年一有之何擾之足云若川雲總督當駐滇或兼廵撫閩浙總督當駐浙或兼廵撫尤屬省便又不必増官矣河漕總督中原當駐淮而江北廵撫當駐鳯陽此大聫屬勢也而鄖陽贑州之軍門又小聫屬勢也如此則常合而不分常治而不亂然非老臣尊爵不可也詩曰維師尚父又曰太師皇父固廟堂事乎責乎故曰善制勢者制之堂上而已矣總督問總督軍務官本朝始于何時曰都御史總督軍務自正綂四年麓川之役王驥始也總兵官悉聽節制既以兵部尚書帥師當王振好大之心遂擬糧儲故事糧儲稱總督宣德中始也繼是而巳巳之變兵薄都城石亨營城于謙督之孫鏜營城西則江淵參之而已繼是而四方多警類率如例如馬昻於兩廣石璞于關外王來於湖廣侯璡於雲南然事平則罷又繼是景㤗天順及成化初白圭葉盛韓雍等皆稱提督意屬恊同勅以贊理為云又繼是則為任官矣成化六年開總府於梧州此任官之所由始也三邉總制自𢎞治末年秦紘楊一清張泰始便於徴發䇿應今亦為任官夫議者秉低昻文武之釣濟兼制勦綏之術是矣而進止異同束於和混内外援搆隱於奸宄其能制而協之更當潤飾令必無伏機不亦盡乎又繼是而陳金華陽之役陸完劉六七之役至綂制七省者後事而或援以為例其必有慎而馭之則可矣廵撫問天下廵撫之說何如曰天下設廵撫都御史洪武未有也太祖不欲以重臣令典錢糧兵馬永樂十九年勅尚書侍郎都御史少卿等官十三員各同給事中廵行天下是謂廵撫宣德間令廵撫官每歲八月一赴京議事盖不欲疏逖以懸機重景泰四年纔差都御史其意尚在執持風紀有故則入參廟議而握纛之柄則有司存自是則曰整飭曰提督曰總制曰鎮守又復典兵部尚書侍郎之職兼都御史百寮羣將俯首聽一人之謀似于兼制少疏故復以廵按權參殺之然表裏異同痛癢不相關而司鋒鏑者毎掣肘不能自盡是近年失事并罪撫臣誠得肯綮而當道執要可愈施矣夫天順間石亨曹欽請罷廵撫正德間劉瑾取回廵撫彼固借私以逞要亦不謂無說茍使其置布腹心則其為毒又不可勝言切願天下錢糧兵馬之重所頼鎮攝不以躁僨事廵撫之不可缺者而書生渉仕必由此以致卿輔能允文武得全才有幾乎哉不素習而亟與之恐亦不易為稱也廵按御史問廵按御史復命以銷繳勘合七分為稱職近固即其數而踰之者矣舊百執事各職其所司而今廵按百務萃攬事大繁而反易集謂之何哉則其所為集知非昔日之詳也曰按憲綱廵按受理詞訟必自各衙門斷過不公者其所受理必親决不令批發懸意向於喜怒夫然事可直見而上下附同之流塞矣六科問六科主封駁九卿取承㫖宸衷而給事中與天子爭可否其非宿諳深造不足以當之秪以要津思抑故特卑其衘品遂以新進是充不幾於覆若餗乎曰太祖設科官始示名元士又名士源盖言繫之重也𢎞治前以進士筮仕注銓意在初出山人無世情入心必能恪守成章率真不懼𢎞治十五年馬文升題議始開行人博士兼除之例而推官知縣行取入選則正德中始也盖法與時更事由諳得有不可以强一者夫道於科言責同而政本之在科尤為關係道選多途直是舊例然又加以試事科之未有處雖後事通融亦終未之悉焉國初新進士分習九卿衙門各衙門朝夕親試堂上官以其通敏諸歴頴出者咨銓司首充科選是得人有以也小京堂問科道部屬陞小京堂宜否乎曰此𢎞治初例也超㧞任賢亦何不可直須慎用之耳天順以前方靣勢重又不為部使所困其遷轉與小京堂等成化間始重小京堂之職内閣吏部乃以是推為駕駁科道之法成化末知釐此弊不許科道陞轉只于郎中内選用𢎞治改元乃始有兼補之例近來則全以吏部科道充之夫欲重其任則輕其衘祖宗用人本意盖隱其後以殺之所以恃心不萌而逸意自戢今必并其所後而便以圖焉非法之宜也推用大臣問陞用大臣吏部㑹推例不亦公乎起自國初否曰公矣自成化間始也天順間朝罷宣吏部降㫖除某人為某官前是亦出宸擬法漸以備大臣之道無以輕為乃以票㫖異同為内閣所執則關白其容巳乎大臣進退設有專屬勢之不能無所趨有由然者矣推用方靣問推用方靣官吏部舉兩人以聽簡任例始何朝曰此天順末年例也李賢在閣為之宣德間三楊用事勅方靣有缺令在京三品以上官舉保親民要職盡出私門銓曹專業乃成虚設矣此可行於三楊而不可行於後世三楊後此例亦罷止吏部查各衙門歴俸淺深奏除夫查其年資出補固必然之限而低昻品器復所不能齊試課稽覈是持過此以徃未之或知耳兵備問兵備憲員始設於何時曰此𢎞治間例也馬文昇居本兵慮武職不修故増一臬員以敇之時内閣劉健力阻而不欲行後因奏設九江兵備都給事中夏祚疏論不可着劉馬回話劉馬皆秉正未克濟時而議見逈不恊何也劉欲修祖宗之舊以振武備馬則拯倉卒之急以釐宿滯嗟乎為天下計者二澄源塞流世知塞流之易効而人樂於就易是以創建之本世逺愈不明於天下故各知其已而不㑹其全日冗世費而不能以自止雖賢者不能免民其且奈之何哉守令問養民之道莫切於有司而有司賢否必恃於考課當而賢否明何術而能然曰天下之親於民得以盡其牧之之意者莫州縣若天下之近於民得以持其牧之之道者莫府若惟其親民而能牧則亦能肆已而為殃於是乎持之以府臨之以監司紏之以觀察府上其計監司㑹之觀察稽之於是乎銓曹考課之法審有司廢置之典明舊意久而漸湮當事者急近功乃欲以低昻平其勢故行取縣令為科道不信監司觀察之言為考課是職無綂紀非易簡之法也監察者便自决乃欲以法律嚴其情故關白赫於𤨏牘下情綑於遥斷是事無體制非平易之道也夫上下有體大小有職不容於混施王澤壅而不濬其患坐混施援上陵下九牧十羊無體無職民其得養乎哉州縣官問先王體國經野曷為而州也以復别於縣也曰凢天下要害多設州盖欲重其衘以鎮之今科道選於縣令而知州勢輕似於原設矛盾矣教職問教之為官也可以寄士養哉曰今天下勢官謂可茍具無所繫重輕焉莫教職若以其實論之庶官之賢不賢其由教職之懋不懋始耳天下教官幾三千員注銓者以御末才舉人乙榜令就教洪武十八年例也而今故以毦鈍居乙榜以應之正統八年令副榜限年非三十不除盖惜之也歲貢令就教景㤗元年例也而貢至景泰非衰敝不能與納馬納粟四十五歲令就教成化元年例也而其意固將以備雜流矣𢎞治間懲其大甚一切革不准除正令舉人歲貢及進士内外見任官科目出身願就者聽𢎞治十五年許教官如憲綱例入御史選然不能實崇之使得盡職抑末矣今之部使劾有司不職則曰堪以任教夫模範不立乃欲責士以行豈不甚難矣乎今欲尊師寮覈士養慮於貢員未澄欲並用三途慮於貢法無制古鄉舉里選以得士而今獨不可行乎若科甲之外依古薦舉而充歲貢之額嚴其法必得真才而並用以為教豈不為養士之望哉鎮守衛所問在外各地方設建官軍衙門必有機要大意願聞之曰凡天下要害之地不係一郡者不設兵其止係一郡者設所係連郡者設衛勢重則衛多其尤重者設鎮特官主之總鎮一方為鎮守獨鎮一路者為分守各守一城一堡者為守備與主將同處一城者為恊守又備倭提督提調廵視等官稱掛印專制者為總兵次為副總兵為參將為遊擊武職䕃襲問祖宗飭武之道致重於世官祖宗養材之方豫練於應襲故制官舎隨軍操備箕裘禪習朝夕見聞而今重武舉榮任調以佔畢鉛槧礪干戈之士而簽書掛印咸頼以文顯一有緩急是以國與敵也可不畏乎曰本朝武選之途其初深重録䕃洪武二十二年兵部五軍府官奉㫖華盖殿衛所官員不肯教兒子弓馬如今但有學唱的割了舌頭下棋打雙陸的斷了手蹴圓的䣃了脚做賣買的發邉逺充軍已而府軍左衛千户虞讓男虞端吹簫唱曲將上唇連鼻尖割了龍江衛指揮伏顒與小旗姚晏保蹴圓卸了右脚能不驅而自盡其職其後安於世胄紈袴恣情不得已而思收異材宣德五年正統八年成化八年各有㫖令天下保舉有謀勇者用之其天順八年始開武舉成化四年𢎞治十七等年各有㕘定條例然所取甚少初止取二名七名至十五名三十餘名及嘉靖年間䕃襲太隳故此途漸重乃非武舉不得陞調於是世胄擁為虚器而功臣之澤斬矣國家相沿君子已踰五世舊祿不减而新進繼増不有以通之則用於民者何以勝其費耶京官遷調科道部屬陞小京堂此𢎞治初例任賢不次直順慎之天順前方靣勢重又不為部使所困其遷轉與小京堂等成化間始重京職遂有借為駕馭之法成化末知釐此弊一於郎中選用𢎞治改元乃始有兼補之例近來則全以要充之夫欲重其任則輕其衘祖宗用人本意盖隱其後以殺之所以恃心不萌而逸意自戢今必并其所後而便以圖焉非法之宜也添設冗官冗官如寺部卿等帶俸添註郎中主事増官百倍又競求外差為家鄉便利之圖督速錢榖増郡縣奉承之苦是何益乎藩臬則添設管糧㕘議海道副使官員何重兵備僉事屯田僉事一事添設一官則原順者乎郡縣者乎郡縣佐貳或添註四員三員凡此冗員生艱難求進或納粟入監希圖厚獲者故於未選則負債以徃授任則携帑以行舉數十口以仰食一官責望一官以富厚一世則政何有不弊民何由不窮是將添官以任事實因官以生事也識治體者寧不深思逺慮為國家分憂乎薦舉霍韜曰國初用薦舉為重貢舉次之科舉為輕今則科舉為重貢舉次之薦舉不行矣故有行同盗跖心孚商賈者能染翰為文俱𨽻仕籍此士風所以益偷也進士觀政進士每科大約三百名分試九卿衙門觀政每衙門大約三十餘人堂長司僚與之朝夕而試之事其人端衺能不能若燭照而數計之於是㑹其實以上于天官天官籍准以為銓注文學政事風節慈愷隨所成以授其任任則必乆而不數更是以無不可用之才無不可知之人此易簡之道祖宗朝之所以得人今乃無豫以處士而後輕用以棄之士先不幸而嘆其無遭朝廷亦不幸而咎不得士其誰自哉祖宗之法不存也京省陞黜員缺今仕版京堂官約一百二十餘京司官約五百方靣官約四百進士候選者三年約三百進士為州縣正府佐及舉人官陞京司者約一百三年之間以進士候選者進士為州縣正府佐者舉人官陞京司者共計五百以陞京司五百之缺京司之五百以陞方靣之四百及羡餘以補京堂方靣之四百合京師羡餘共以陞京堂統共約一千五百員三年之内續益進士三百并舉人陞京司者歲准其益數計合消其一百餘員以一千五百人歲得廢黜亾故百餘消息之數亦自然之勢也復慮才湧官無以居之不為久任長便之法或數轉以申情或侈摘以騰缺或添設増設以疏任而士無固志雖欲痛裁奔競不能吏員文獻通考曰西漢開儒吏二途以取人未為抑掦輕重自後判為二途儒詆吏為俗吏誚儒為迂故拘謭不通者一歸之儒放蕩無恥者一歸之吏而二途皆不足以得人噫古之儒通經籍吏精法律今之儒非古之儒今之吏非古之吏况吏員乎哉謚法文經緯天地修德來逺勤學好問道德博聞慈惠愛民敏而好學愍民惠禮剛柔相濟忠信接禮修治班制施而中禮武克定禍亂保大定功威强克敵剛強直理剛強以順闢地斥境折衝禦侮刑民克服成禮樂明具持盈守滿遂物之美通逺強立安民立政康安樂撫民温柔好樂令民安樂淵源流通獻聰明睿智嚮惠内德智質有聖懿柔克有光温柔賢善元體仁長民行義悅民道德純一立建國都恩能辨衆立義行德章法度大明敬慎髙明出言有文景耆意大圖由義而濬布義行剛宣施而不私善問周逹誠意見外聖善周聞明照臨四方任賢致逺獨見先識譖愬不行察危見情招集殊異昭明德有功聖聞昭逹昭德有勞正内外賔服恭卑以自牧尊賢貴義不懈為德敬事供上愛民弟長執禮御賔尊賢讓善執事堅同敬順事上正德美容既過能改莊嚴敬臨民威而不猛履正志和肅剛德克就執心厥斷正己攝下穆布德執義中情見貌清避逺不義定安民大慮安民法古純行不爽簡治典不殺平易不訾正直無邪一德不懈憲賞善罰奸博聞多能行善可紀敏應事有功端守禮執義敬夙夜警戒夙興恭事介執一不遷裕強學好問通物至能應事起而辨白内外貞復靖寛樂令終恭巳鮮言柔德安衆賢行義合道明德有功貞清白守節大慮克就不隱無屈孝慈惠愛親五宗安之大慮行節能差能恭繼志成事恊時肇享秉德不回幹蠱用譽忠盛衰純固危身奉上推能盡忠廣方公正臨患不忘國惠愛民好與柔質慈民施勤無私柔質愛諫和柔逺能邇不剛不柔號令民悅推賢推能安和好不争兆民寧頼質名實不爽忠正無邪静柔德教衆烈安民有功秉德尊業禮奉義順則恭儉莊敬威賞功刑懲以刑服逺猛以強果強義執正勇率意共用義制事合宜見義能忠先君後己取而不貪除去天地之害剛強毅果敢追補前過致果殺敵壯勝敵志強叡圉克服死於原野兵甲亟作屢征殺伐武而不遂潔不汚不義節好亷自克謹行制度襄闢地有德甲胄有勞因事有功愍在國逢艱良小心敬事温良好樂勤能修其官宻追補前過温得性寛和榮寵祿光大順慈和偏服和比於理慈仁和民僖小心畏忌無過為僖質淵受諫小心恭順純中正和粹果好力致勇好學近智修勤其世業顯行見中外恪敬共官次威容端嚴温恭朝夕毅善行不怠温仁忠厚能紀國善思追悔前過念終如始謀慮不僣外内思索容寛裕温柔懷慈仁短折失位而死隱懷情不盡不顯力國隱拂不成見美堅長悼肆行勞祀年中早夭恐懼從處懋以德受官以功受賞愿弱無立志匡貞心大度比擇善而從翼愛民好治思慮深逺湯除殘去虐伐剛克為伐圉威德剛武桓辟土服逺克敬動民辟土兼國慧柔質受諫周人制謚美刺並陳所由來長逺矣我朝尤重視之髙皇帝至不以私諸子一何嚴也太史公曰謚者行之迹也大行受大名細行受細名殆庶幾乎周人之遺意焉國朝謚法有美無刺實始於賀侍郎銀說者謂與初指稍異竊以為非然也美刺並陳不如無謚矣何者所以激厲者顯而其指淺也今制大都非尊貴不得謚非起家翰林不概以文謚盖功德名位參互用之美者自美亦有隱刺於美者矣今其謚具在試因其論求之深恩哉朝廷易名之典鄭先生分類之意維鏡可覩已嗟嗟斯固太史公家法也圖書編卷八十五
