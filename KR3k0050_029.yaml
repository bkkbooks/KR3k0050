宗嵗星位焉星紀鶉尾以負南海其神主于衡山熒惑位焉鶉首實沈以負西海其神主于華山太白位焉大梁析木以負北海其神主于恆山辰星位焉鶉火大火夀星豕韋為中州其神主于嵩嶽鎮星位焉近代諸儒言星土者或以州或以國虞夏秦漢郡國廢置不同周之興也王畿千里及其衰也僅得河之七縣今天下一統而直以鶉火為周分則疆場舛矣七國之初天下地形雌韓而雄魏魏地西距髙陵盡河東河內北固漳鄴東分梁宋至於汝南韓魏據全鄭之地南盡潁川南陽西達虢貉距函谷固宜陽北連上地皆綿亘數州相錯如繡考雲漢山河之象多者或至十餘宿其後魏徙大梁則西河合于東井秦拔宜陽而上黨入于鬼方戰國未滅時星家之言屢有明效今則同在畿甸之中矣而或者猶據漢書地理志推之是守甘石遺術而不知變通之數也又古之辰次與節氣相係各據當時厯數與嵗差遷徙不同今更以七宿之中分四象中位自上元之首以度數紀之而著其分野其州縣雖改𨽻不同但據山河以分爾晉天文志十二次分野始角亢者以東方蒼龍為首也唐十二次始女虛危者以十二支子為首也以其斗牛為星分之首者日月星起于斗宿古之言天者由斗牛以紀星故曰星紀則星紀為十二次之首而斗牛又二十八舍之首也本朝應運肇基而南京應天府是星紀斗牛之分且與天地人三統之正相協自周以來千年間帝王之運適符於今豈偶然哉諸星分野附北斗一主秦二主楚三主梁四主吳五主趙六主燕七主齊南斗一主吳二主會稽三主丹陽四主豫章五主廬江六主九江三台上台上星主兖豫下星主荆揚中台上星主梁雍下星主冀州下台上星主青州下星主徐州五車一主秦二主燕趙三主魯衛四主楚五主魏衛五星所主嵗星主齊魯東吳青徐揚兖之地熒惑主荆楚川南荆州衡陽之地鎮星主中州三河梁豫之地太白主西維秦晉巴蜀梁雍之地辰星主燕趙代幽燕之地天市垣牆下元一宫名天市兩扇垣墻二十二東邊宋與南海關燕東徐越齊中山九河趙魏次其間西邊韓楚梁巴蜀周與鄭晉并河間河中直在頭上安紫微垣墻左樞右樞當門路左畔上少分宰輔上衛少衛次第分六丞最後成八數西邊少尉起等初輔衛亦分上少無上丞最後對上少七星點點不搠望十二諸侯十二諸侯次第陳先從越國向東論東西兩周次二陳秦雍周南雙鴈門代國向西一縉紳韓魏各一皆北輪楚之一國魏西屯楚城南畔趙燕畢燕西北郡是齊鄰星細區分十干分野甲乙海外日月丙丁江淮海岱戊己中州河濟庚辛華山以西壬癸常山以北甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬燕趙癸北夷十二支分野子周丑翟寅趙卯鄭辰邯鄲巳衛午秦未中山申齊酉魯戌吳越亥燕代總論分野分野視分星古不謂地也地有彼此之不齊而分野在天則一定而不易以彼此不齊之地必欲求配於在天十二次整然之分野其説之難通也固宜蓋天有三垣紫微太微天市是也紫微太微皆將相輔佐之位而天市下垣則列國星宿之所在其星東南二十二宋南海燕東海徐吳越齊中山九河趙越韓楚巴蜀秦周鄭晉河間河中曰分野者指列宿所屬之分而言也鄭氏所謂星土星所主土是也其國在此而星則在彼彼此若不相配而其為象未嘗不相屬非地之在北者其分野在天亦居北地之在南者分野在天亦居南也列國之在天下彼此縱橫之不齊猶犬牙然而欲以其地之不齊者求合乎在天分野之整然彼此之不相配無足怪者甚者至於天之北極為天之首其體反背故有吳北魯東之差其惑甚矣易不云乎在天成象在地成形水火金木土其形在地者也而天有其星焉所謂象也豈惟五星哉凡物莫不皆然矣故夫齊吳燕宋韓楚周秦魏趙諸國之地地之形也而其星在天象之謂也地有是形則天有是星有是星則有是名曰齊吳燕宋韓楚周秦魏趙列國者非後世有是名而舉以為分野之名也何以知其然也徵諸東海南海九河河間河中巴蜀中山有以知之也東海南海九河河間河中非國中山巴蜀非若諸國之顯也故曰地有是形則天有是星而分野者指列星所屬之分而言也或曰若然則十二次之説將無所徵曰十二次所以驗天運之度數日躔之次舍此蓋古法而厯家之所取驗者也因其度數次舍之所在而妖祥見焉則其所屬之地從亦可徵矣抑分野之豈専繫於是哉又按宋葉時禮經會元其辨尤詳兹不能具矣分野辨容齋洪氏隨筆曰十二國分野上屬二十八宿其為義多不然前輩固有論之者矣其甚不可曉者莫如晉天文志謂自危至奎為娵訾於辰在亥衛之分野也屬并州且衛本受封於河內商虛後徙楚丘河內乃冀州所部漢屬司𨽻其他邑皆其東郡屬兖州於并州了不相干而并州之下所列郡名乃安定天水隴西酒泉張掖諸郡自繫涼州耳又謂自畢至東井為實沈於辰在申魏之分野也屬益州且魏分晉地得河內河東數十縣於益州亦不相干而雍州為秦其下乃列雲中定襄鴈門代太原上黨諸郡蓋又自屬并州耳謬亂如此而出於李淳風之手豈非蔽於天而不知地乎按吳越南而星紀北齊東而玄枵北衛東而娵訾北魯東而降婁西周中土而栁星南秦西北而井鬼西南觜參西而魏東北角亢東而鄭滎陽昴畢西而趙河朔又曰牛女北而謂之揚州虛危北而謂之青州昴畢西而謂之冀州奎婁西而謂之徐州魏冀州之國而屬於益魯兖州之國而屬於徐然則分野之説若有可疑者但傳訛已久厯代因之而唐一行以山河為限而不主於州國之説後人竟未之講也按大司徒只言土宜辨其土不言所辨何次保章只言星土辨九州不言所辨何星又言所封之域皆有分星不言其何分也康成以春秋時十二國分配十二次恐未必然今此圖不指定九州分配某星只按職方氏所言九州東西南北自有定界觀九州地界之所抵則星之所辨亦略可觀矣分野之疑何始乎曰二鄭之釋周禮也大司徒曰以土宜之法辨十有二土之名物康成以為十二土分野十二邦繫十二次各有所宜保章氏曰以星土辨九州之地所封封域各有分星司農引春秋傳曰參為晉星商主大火國語曰嵗之所在則我有周之分野是也康成則曰今其存可言者十二次之分也此分野之辨所以紛紛而不一歟自時厥後或以十二州配之或以列郡配之或以山河兩界配之或以七星主九州後天文志劉昭或以七星主七國晉志或繫之二十八宿或繫之五星紛紛異論是以學者多疑焉主分野之是者則曰自栁九度至張十六度為鶉火之次當周之分武王克商嵗在鶉火伶州鳩曰嵗之所在則我有周之分野則周屬鶉火可知自畢十二度至東井十五度為實沈之次當晉之分晉文即位嵗在實沈董固曰實沈之次晉人是居則晉屬實沈可知自張十七度至軫十七度為鶉尾之次當楚之分魯襄公二十八年嵗淫於玄枵而禆竈知楚子之將死且曰嵗棄其次而旅於明年之次以害鳥帑周楚惡之説者謂帑鳥尾也則楚屬鶉尾可知自氐五度至尾九度為大火之次當宋之分昭公十七年星見大辰而梓慎知宋之將火且曰宋大辰之墟鄭祝融之墟也皆火房也説者謂辰大火也則宋屬大火可知此則分野之説為不疑矣辨分野之非者則曰吳越南而星紀北齊東而玄枵北衛東而娵訾北魯東而降婁西周宅中土而栁星乃位于南以栁星為周可乎秦在西北而井鬼乃在乎西南以井鬼為秦可乎觜參在西魏在東北以觜參為魏可乎角亢東宿鄭在滎陽而屬於角亢可乎昴畢西宿趙居河朔而屬於昴畢可乎又曰牛女北也史記謂之揚州虛危北也史記謂之青州昴畢西也史記謂之冀州奎婁西也史記謂之徐州魏冀州之國也晉則不屬于冀而屬于益魯兖州之國也魯則不屬于兖而屬于徐此則分野之説為可疑矣然略分野之説而不信則周禮不應有星土之辨拘分野之説以為驗則左氏未免有傅會之誣更以左氏考之無水之災何關于玄枵星紀而梓慎以為宋鄭之災襄二十八年日食之變何與于豕韋降婁而士元伯以為魯衛之惡昭七年星紀果同為吳分則吳亦得嵗士墨何以謂之越得嵗而吳伐之必受其凶昭二十二年參虛果為晉分則實沈為星子産何以謂之髙辛之子而能為晉侯之祟昭元年此又左氏之説之不足信也又以史册觀之四星聚牛女而晉元王吳四星聚觜參而齊祖王魏彗星掃東井而苻堅亡秦景星見箕尾而慕容德復燕此又分野之驗而未可以盡略之也蓋星土分星本不可以州國拘也且以職方氏言地理必指其東西南北之所在山鎮川澤之所分民畜穀利之所有獨於天文之紀如司徒只言十有二土未嘗斥言其所應者何次保章氏言星土辨九州之地不明言其所辨者何星是星土分星不可以州國定名亦明矣愚以保章觀之隨其土之所屬應其星之所臨故謂之星土辨九州之地非如鄭氏言十二邦繫十二次也隨其國之所封屬其星之所在故謂之所封封域皆有分星亦非如賈氏言受封之日嵗星所在國屬焉夫九州上應星土則三百餘度皆有其驗豈特十二次而已乎封域皆有分星則千八百國皆有所屬豈特十二國而已乎九州之土皆配星九州之國皆有分故因其星可以辨其州之地因其分可以觀其國之妖祥保章氏之説如是而已説者何必牽合傳會而定指後世郡國之名以求配之也昔孔子作春秋日食隕星之變無所不記豈必皆周魯之分而後言之乎五星聚東井漢入秦之應也崔浩嘗言其不在十月司馬公作通鑑乃棄之而不取歐陽志唐天文日食星孛之變一一紀之而獨不言其事應亦豈拘拘於分野之説哉大抵周官所辨者欲以觀妖祥爾天子之所觀者九州也諸侯之所觀者一國也諸侯以一國分星而驗一國天子以九州星土而辨九州諸侯觀一國之妖祥而為一國之備可也天子可以諉之一國分星之所屬而不為之救政序事乎知乎此則可以言星土分星之説矣諸家分星辨按分野之説自周禮保章氏以星土辨九州之地所封之域各有分星故後世若范蠡王鬼谷張留侯諸葛孔明譙周京房張衡諸子並云十二國以當十二次而已漢書始分十二次度數魏太史令陳卓始立郡國所入宿度唐天文志又以山河兩戒分南北分野之説諸家不同大抵十二次者星之土九州者地之土所封之域之星乃嵗星之分也嵗主農祥后稷憑焉故周人常閲其禨祥以觀善敗其始王也嵗次于鶉火以達天黿及其衰也淫于玄枵以害鳥帑所觀者在嵗之次舍不在其度數之縷析蓋以天體赤道度多黃道度少兩次相交又非截然彼我之分且天下之九州磬折牙制勢既不同而隨時削益統復不一又可以一度二度限之乎蓋嘗稽之晉文即位嵗在實沈故董固曰始受實沈之星實沈之次晉人是居吳伐越嵗在星紀故士墨曰越得嵗吳伐必受其凶五星聚東井而漢髙帝秦聚牛女而晉元主吳聚觜參而齊祖主魏要皆以十二次繫十二國占十二嵗星也漢魏分度之説與後世日者之術無異先儒訾之者若宋葉文康公嘗於分野辨其乖謬嘉定中知靜江府蔡氏勘者亦嘗辨其荆揚之異乃若分度之非則未之及自今言之蒼梧以上為楚下為揚越境土相接若此其密而星紀去鶉尾百四十餘度如以今桂林楚野入軫十一則已涉夀星為鄭地蓋度者天之經體兩極相懸所以紀辰曜於一日之差而非所以語九州郡邑之素定也况自度法既立而後世之言占者未聞一應則亦奚以度為哉他如春秋文耀鉤北斗分楚荆則屬衡晉志牛女十六星主十二國魏西一星則屬楚宋天文志天市垣二十二星其西垣第二星居韓梁之間曰亦楚星則一次舍之間即有諸國之通繫長沙附軫東甌附翼南蠻之星觀於軫轄又豈非類見獨發而不必以度占者乎夫分土之體亦猶人身茍有痌瘝則四肢百體莫不震動故患之所及雖鄰國不免於災况其本乎區區以絲分縷析之數求三才之吻合某雖愚未之信矣輿地山海全圖敘嘗聞陸象山先生悟學有云原來只是箇無窮今即輿地一端言之自中國以達四海固見地之無窮盡矣然自中國及小西洋道途二萬餘里使地止于兹謂之有窮盡可也若由小西洋以達大西洋尚隔四萬里餘矧自大西洋以達極西不知可以里計者又當何如謂之無窮盡也非歟此圖亦自大西洋以至廣東其海上程途可以里計者如此故并後小西洋圖存之以備考云地球圖説地與海本圓形而同為一球居天球之中誠如雞子黃在青內有謂地為方者乃語其定而不移之性非語其形體也天既包地則彼此相應故天有南北二極地亦有之天分三百六十度地亦同之天中有直道自直道而南九十度為南道九十度為北道日行直道則晝夜平行南道則晝短行北道則晝長故天球有直道圈列于中南北二圈列于南北以為日路之界地球之南北中三圈亦同焉但天包地外其度廣地處天中其度狹此其差異者耳地每度廣二百里南至北東至西各七萬二千里是南北與東西數相等而異南北于東西者無據也夫地厚二萬二千九百零八里上下四旁皆生齒所居是渾淪一球原無上下總六合內凡足所佇即為下凡首所向即上矣此無疑之論其専以身之所居分上下未然也且豫自大西浮海入中國轉南過大浪山已見南極髙三十六度則大浪山與中國豈不相為對待乎故謂地形圓而周圍皆生齒者信然矣兹以普天下輿地分五州曰上下亞墨利加曰墨瓦蠟泥加曰亞細亞者利未亞曰泥邏河其各州之國繁顆難悉大約皆百以上此圖本宜作圓球以其入册籍不得不析圓為平其經緯線畫每十度為一方以分置各國于其所東西線數自中國起南北線數自福島起也此圖即太西所畫彼謂皆其所親厯者且謂地象圓球是或一道也輿地圓圖考此二圖即前圖也前圖因赤道其直如繩故總為一圖而五方止列其槩此圖圓形以南北二極分之為二故各國可因地以考其詳蓋天圓地亦圓與舊所記載相反且非足迹所及若未可確信然以理揆之却不相背馳况本天之圓以定日月星宿之行度固時令不爽兹據此圖圓象準地面各方相距近逺以定日晷亦節令時刻不差則其度數皆可槩見參之先儒謂天如雞子青地如雞子黃理則同也故併録之亦可以廣見聞之一端矧戴天履地敢不究心乎哉問天圓地亦圓子何所據而信之乎曰豫信乎理耳彼地勢平面山崇水低人止見其層積平陂之稍殊耳兹以吾江右一方水勢觀之自大庾嶺至江州相去幾二千里設地平如砥則水即四泛不下流矣每嵗春夏間淫雨連日夕洚水瀰漫懷山襄陵不旬日悉流出湖口凡四時順流亦莫不然以其自髙趨下之易易也若一丈止髙一二寸則自此處達江口可以丈尺計之乎大江發源岷山以抵東海其髙下可以里數計之乎又黃河由星宿海流入海口固可類推則即東海類觀四海卑髙懸絶皆可因水以知地也况昊天三百餘度為地一周知地球每度計二百五十里北極出地三十六度南極入地三十六度由廣東以達京師每相距數百里即差一度即此以定日晷皆不爽時刻則據天圓不可以證地之圓乎故曰吾惟信乎理而已南贍部洲者乃四洲之一也海中有須彌盧此云妙髙山出水三百三十六萬里入水亦然日月腰中旋照四洲此洲在須彌之南其地形三角南狹北廣人面肖之周二十八萬里大小江河二千五百大國十六中國五百小國十萬諸國中中印土為最大實當洲之正中我震旦九州介洲之東北特中國數耳印土乃天笠之正名北背雪山三垂大海地形南狹如月上弦州平地廣周九萬里大小七千餘城古有轉輪王建都于此也震旦地形南廣北狹周二萬七千餘里自古三皇開闢未聞分野至帝嚳始劃九州夏分萬國商曰三千周曰千八百國厯皇王周孔所化聲名文物獨盛焉北印土之北其地尚廣東西俱海南北可二萬里皆頑山磧石物雜居乃上古帝王所羈縻而不臣者如獫狁羌戎胸奴突厥等號族種不一亦有君長統之而獷悍難馴故直以邊野目之中印土至東海邊四萬五千里南西地倣佛此南洲之大較也洲中有大池周八百里名阿耨達此云無熱居香山南雪山北派分四河流入大海池東曰恆河繞地流入東南曰信度河流入西南海西曰縳芻河流入西北海北曰徙多河東流注東北至烏煞國海鹽澤入地潛流抵積石山復湧出為黃河之源今傳星宿海是也又于岷山湧出為川江之源今長江一帶是也天下泉流綿綿不絶者悉源于池之一派潛通耳世傳水皆東流不知印土以西水皆西流也且儒書所稱四海而論王教所及惟曰東漸于海是上古聖人豈不知震旦之介在東偏而印土尚有南西北海哉意者秦火之後墳典丘索俱燼不獲見圖經之全耳究竟地形非佛經不足以核其致矣某禪暇檢閲三藏至統紀中有震旦圖漢西域諸國圖盤師西土五印圖三圖參合道里略備但形勢失次覽者茫然于是再探諸經圖洲潭之形勢及考諸師西域等傳列衆國名又採托洪範等書參侔海中諸國以妥方向然圖所列者亦百分之一耳要之一世界中山之大者莫若須彌境之大者莫若四洲其餘海島拳石之國或千里萬里如星羅棋布為人仙神鬼龍獸異類所居不可勝記其南洲大略如此按此圖與説出于釋氏雖不可盡信然覽此亦可以知地勢之無窮盡云又四大洲名南閻浮提洲縱廣七千由旬東拂于逮洲縱廣九千由旬西瞿耶尼洲縱廣八千由旬北鬱單越洲縱廣十千由旬圖書編卷二十九
