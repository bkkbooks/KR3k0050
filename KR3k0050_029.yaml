body:
  text: 圖書編卷二十九明章潢撰地道總敘羲皇俯察地理孔聖下襲水土學羲孔之學而於地道弗之庸心焉可乎哉輿地廣矣山川之脈絡未易以周知矣而其大勢則自陰陽開闢天若有意以界內外而限南北者在分野則然是故自三危積石負終南地絡之陰抵太華而北逾大河並大行抵恆山之右循塞垣至於濊貊朝鮮是謂北紀三邊也自岷山番冢負地絡之陽並商山抵上洛而南逾江漢至於荆衡循嶺徼至於百粵是謂南紀越門也其間包有冀兖青徐荆梁豫揚雍畿服畫九州江河分為兩界其大幹入中國者為南北中三支雖土宇版章在德不在險也然天險不可升也地險山川丘陵也王公設險以守其國所以公劉相邠太王遷岐武王宅鎬成王營洛衛文卜乎楚丘形勝亦古人所必擇而處也厯觀古今輿圖孰有如我明大一統之盛兩都並據南北雄圖而省府州縣翕然其環拱哉然廣谷大川異制民生其間異俗剛柔遲速異齊所以周禮體國經野辨方正位度地居民則壤成賦各隨地勢以為之區畫至如今之邊防海防河運海運尤經世者所宜究心余嘗愧不獲環孔轍躡禹迹以盡其俯察下襲之宜幸圖籍具存亦可以不出户庭而周知天下也故為地道編分野總敘分野之説蓋以星之在天者而分在地之土也觀周禮大司徒言土宜辨十二土未言所辨何土保章氏言星土辨九州未言所辨何星嘗以天象二十二州之名考之或者春秋戰國時因星土之義而詳其説乎但以列國參差不齊之地而配乎在天一定之星諸家辨其非誠有然者易曰在天成象在地成形雖以列星象官象民象物且莫不驗也况天地本一氣也謂其無所關焉可乎惟唐僧一行則以天下山川之象存乎兩界而分野一以山川為界不主封國郡邑之名庶乎近之今載二十八宿分應各省地理圖并存古九州分星圖合而觀之無泥乎一定之説則分星分土亦可以得其槩也已星宿次度分屬天下州郡國邑考十二次班固取三統厯配十二分野其言最詳又有費直説周易蔡雍月令章句頗有先後魏太史令陳卓更言郡國所入宿度今附而次之自軫十二度為夀星於辰在辰鄭之分野屬兖州費直起軫七度蔡雍起軫六度自氐五度至尾九度為大火於辰在卯宋之分野屬豫州費直起氐十一度蔡雍起氐九度自尾十度至斗十一度為析木於辰在寅燕之分野屬幽州費直起尾九度蔡雍起尾四度自斗十一度至女七度為星紀於辰在丑吳越之分野屬揚州費直起斗十度蔡雍起斗六度自女八度至危十五度為玄枵於辰在子齊之分野屬青州費直起女六度蔡雍起女二度自危十六度至奎四度為娵訾於辰在亥衛之分野屬并州費直起危十四度蔡雍起危十度自奎五度至胃六度為降婁於辰在戌魯之分野屬徐州費直起奎六度蔡雍起奎八度自胃七度至畢十一度為大梁於辰在酉趙之分野屬冀州費直起胃十度蔡雍起胃一度自畢十二度至東井十五度為實沈於辰在申魏之分野屬益州費直起畢九度蔡雍起畢六度自井十六度至栁八度為鶉首於辰在未秦之分野屬雍州費直起井十二度蔡雍起井十度自栁九度至張十六度為鶉火於辰在午周之分野屬三河費直起栁五度蔡雍起栁三度自張十七度至軫十一度為鶉尾於辰在巳楚之分野屬荆州費直起張十三度蔡雍起張十二度又改陳卓范蠡鬼谷先生張良諸葛亮譙周京房張衡所著州郡躔次井方角亢氐鄭兖州東郡入角一度入東平任城山陰入角六度泰山角十二度濟北陳留入亢五度入濟陰入氐一度東平氐七度房心宋豫州潁川入房一度沛郡入房四度汝南入房二度梁國入房五度淮南入心一度楚國入房四度魯國入心三度箕尾燕幽州涼州入箕十度漁陽入尾三度上谷入尾一度度右北平入尾七河西上郡北地遼東西入尾十度勃海入箕一度樂浪入箕三度涿郡入尾十六度玄菟入箕六度廣陽入箕九度斗牛女吳越揚九江入斗一度豫章入斗十度廬江入斗六度度丹陽入斗十六會稽入牛一度泗水入女一度臨淮入牛四度六安入牛六度廣陵入牛八度虛危齊青州齊國入虛六度濟南入危一度北海入虛九度樂安入危四度東萊入危九度度平原入危十一度災川入危十四室壁衛并州安定入室一度隴西入室四度天水入室八度度酒泉入室十一張掖入室十四度武城入壁六度武都入壁一度燉煌入壁八度金城入壁四度奎婁胃魯徐州東海入奎一度髙密入婁一度琅琊入奎六度陽城入婁九度膠東入胃一度昴畢趙冀州魏郡入昴一度常山入昴五度巨鹿入昴三度廣平入昴七度中山入昴十度趙郡入畢八度清河入昴九度安平入畢四度信都入畢三度河間入畢十度真定入畢十三度觜參魏益州廣漢入觜一度蜀郡入參一度越􅖿入觜三度犍為入參三度牂牁入參五度漢中入參九度巴郡入參八度益州入參七度井鬼秦雍州漢中入井一度度定襄入井八度十八度鴈門入井十六代郡入井二太原入井二十九度上黨入鬼二度栁星張周三河𢎞農入栁一度河東入張一度河南入星三度河內入張九度翼軫楚荆州南陽入翼六度度南郡入翼十度度江夏入翼十二江陵入軫一桂陽入軫六度度武陵入軫十度長沙入軫十六國朝列郡分野北直𨽻順天府古幽州尾箕分野漢名廣陽宋名燕山保定府古幽州尾箕分野漢為涿郡河間府古幽州尾箕分野秦為巨鹿上谷真定府古冀州昴畢分野秦為巨鹿常山順德府古冀州昴分野廣平府古冀州昴分野秦為邯鄲大名府古冀兖二州室壁分野商舊都春秋為晉地唐為魏郡周為天雄軍南直𨽻應天府古揚州斗分野漢為丹陽郡吳為建業鳳陽府古揚州斗分野古為塗山氏之國戰國時屬楚秦屬九江郡漢為淮南唐為濠州蘇州府古揚州斗分