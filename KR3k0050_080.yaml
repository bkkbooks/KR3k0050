body:
  text: 圖書編卷八十明章潢撰皇明同姓諸王傳敘明興同姓鮮少所謂廟祔十五王者皆追王也當是時開基江左去塞萬里近亦數千里雖嘗圖宅咸陽詔遷汴邑然時有未逮議遂中輟髙皇帝繼元首出天造草昧慎始慮終防患為急於是大啓宗封錯布萬國擇選諸子周匝三陲文皇英略蓋世開府北平天險地利甲於諸藩北平以東歷漁陽盧龍出喜峯包大寧控葆塞山戎為寧王度渝關跨遼東西並海被朝鮮聯開原交市東北諸夷為遼王北平西接古北口瀕於雍河中更上谷雲中鞏居庸蔽鴈門為代王鴈門之南太原其都會也表裏河山為晉王逾河而西歷延慶韋靈又逾河北保寧夏倚賀蘭為慶王兼殽隴之險周秦都圻之地牧坰之野直走金城為秦王金城西渡河領張掖酒泉諸郡西扃嘉峪護西域諸國為肅王此九王者皆近塞下以故城郭富於曹滕車兵雄於魯衛莫不位以元侯翊以宿將權崇制命勢匹撫軍肅清沙漠則壘帳相望締好宗潢則軺輪不絶若乃周楚齊潭魯蜀諸王並列內郡亦皆秉鉞麾旄部兵耀武蓋草昧利於建侯板蕩維於宗子斟酌周漢而衣食於縣官寧有尾末之憂懲創宋唐而綴旒於下國必無坑沉之禍世平自足以展親時危不難於復振此思王之所以抗表宋侯之所以畫䇿者也逮其弊也磐石雖堅髖髀莫解葉髙進賈誼之䇿而齊黃竟鼂錯之謀凌逼既深猜忤遂積建文數年間雉罹龍躍利害相尋靖難以後矯枉鑒覆益篤因心驕恣復萌稍申裁抑書敇再三規誨懇切而齊谷不悛終負私貸宣德初二叔不靖漢以義滅趙以恩完自是以後天子攬綱結紐彞臬日嚴一不律則奪祿再不律則奪兵三不律則奪爵賢傅終老於梁園懿親絶蹤於魏闕即使力如晉鄭無假於勤周頑如吳楚何緣而抗漢以故八十餘年間有圜土之收未聞甸師之戮至正德中置鐇狂狡卒起窮邉宸濠凶姦久窺神器不逾旬朔身殞國除今皇帝峻德明倫每布詔令首念宗人諸王拱辰宗海好禮樂善雖堯親九族周享萬邦曾何足云夫聚人莫急於理財宜民莫大於通變洪武時親王嵗祿米五萬石他用亦不下萬石而吉凶之賜不與焉髙皇帝約巳裕人未幾肆減六之一今載屬籍者王二等將軍三等中尉三等主君五等若未名未封疏庶人罪庶人蓋四萬有奇邸祿嵗增民財日窘至共蓬而居分餅而膳四旬而未婚十年而不葬者矣嗟乎驕溢則橫而干紀窘困則濫而思亂其為禍一也而不早為之所可乎吳元年冬上念七子漸長宜習勞令內侍製麻屨行縢凡出城稍逺馬行十七步十三洪武二年設王相府是年令博士孔克仁授諸子經三年封諸子王詔曰朕荷天地百神之祐祖宗之靈當羣雄鼎沸之秋奮興淮右賴將相宣力創業江左曩者命大將軍徐逹總率諸將以定中原不二年間海宇平定元遁沙漠大統既正黎庶靖安欲先論武功以行爵賞緣土蕃之境未入版圖今年春復命徐逹等西征是以報功之事未及舉行朕聞昔帝王適子正儲位衆子封王爵朕今有子十人即位之初已立長子標為皇太子諸子之封本待報賞功臣之後然尊卑之分所宜早定乃以四月七日封第二子樉為秦王次棡晉王次棣燕王次橚吳王次楨楚王次槫齊王次樟潭王次杞趙王次檀魯王姪孫守謙靖江王皆授以册寶設置相傅官屬及諸禮儀已有定制於戲奉天法古實生民明此彞倫非文武賢能三軍用命江左人民之助何以致此尚賴各盡心力以成治功六年春賜諸王昭鑒録又賜祖訓録令書殿中宫中八年初定諸王宗人祿米每嵗親王五萬石鈔錦紗羅紸絲絹布綿鹽茶粟又萬計靖江王二萬石郡王六千石鈔等減十九郡王諸子年十五人賜田六十頃為永業除其租是年定王邸殿門名九年中書省議親王宫飾彩上曰惟儉養德惟侈蕩心居上能儉可以導俗居上而侈必至厲民獨不見茅茨卑宫堯禹以崇聖德阿房西苑秦隋以失人心諸子方及冠年去朕左右豈可使靡蕩其心是年申定王府官制語在百官志中再定諸王及公主嵗供之等秦晉燕王將之國上令辭皇陵曰若等觀祖宗肇基之地當知王業艱難又命皇太子率三王祭開國功臣然後行會星變求言平遙訓導葉伯巨應詔上萬言書言分封太侈用刑太煩求治太速其論分封曰主上有天下掃除羣雄如踣草芥已絡公卿豪傑如臂指使公卿大臣數十萬衆戰勝攻取者一介使召拱手聽命無敢後時况敢有抗衡者乎傳曰都城過百雉國之害也先王之制大都不過三國之一中五之一小九之一蓋強幹弱枝遏亂原崇治本也國家裂土分封諸王各有分地以樹藩屏復古制蓋懲宋元孤立宗室不競之弊然秦晉燕齊梁楚吳閩諸國各盡其地而封之都城宫室之制廣狹大小亞于天子之都賜以甲兵衛士之盛恐數世之後尾大不掉然後削其地而奪其權則起其怨如漢七國晉諸王各恃險爭衡擁衆入朝甚則緣間而起防之無及也議者曰諸王皆天子親子皇太子親骨肉所謂磐石之宗天下服其強耳禮莫大於分使王侯之國與京畿同則為列國矣尚有君臣之分乎今秦晉燕齊梁楚吳閩諸國連帶數十城而復優之以制假之以兵何不托漢晉事觀之乎景帝髙帝孫也七國諸王皆景帝同祖父兄弟子孫也一削其地遽構兵西向晉諸王皆武帝親子孫也易世後迭相擁兵以危王室遂成五胡雲擾之患分封踰制禍患立生援古證今昭昭然矣昔賈誼勸漢文帝早分諸國地空之以待諸國王子孫謂力少易使義國小無邪心使帝盡從誼言必無七國禍願及諸王未之國之先節其都邑之制減其衛兵限其疆理亦以待封諸王之子孫此制一定然後諸王有聖賢德行者入為輔相其餘世為藩輔可以與國同休世世無窮矣上大怒曰小子敢間吾骨肉吾見且切齒可使吾兒見乎速取來吾將手射之且啖其肉逮至瘐死刑部獄十九年冬詔王國慶賀惟國城官致禮在外文武官不得赴府賀有事遣人啓聞不得遣將官二十年秋詔給親王嵗祿五萬石停茶鹽布絮物給二十六年賜諸王永鑑録二十八年八月更定宗人封爵册寶之制親王金册金寶王妃金册無寶皇太子之庶子年十嵗封郡王塗金銀册銀印親王嫡長子年十嵗封王世子塗金銀册銀印庶子年十嵗封郡王册印亦如之凡王世子必以嫡長以庶奪嫡降庶人重則遠竄王年三十妃未有子庶子止封郡王俟王與妃年至五十無適子始封庶長子為王世子凡嗣封受封納妃朝廷遣使行册命禮郡王次子授鎮國次孫輔國次曾孫奉國皆將軍凡三等次玄孫鎮國次五世孫輔國次六世孫奉國皆中尉凡三等親王女曰郡主郡王女縣主郡王孫女郡君郡王曾孫女縣君郡王玄孫女鄉君凡五等靖江王府視郡王降一等宗人有文武才能堪任用者宗人府名聞考驗升轉如常選法有犯宗人府訊聞量罪降等重斥為庶人罰而不刑責先是上謂户部尚書郁新曰朕今子孫衆盛原定新王嵗祿五萬石今天下官吏軍士多俸給彌廣其斟酌古今稍節減以資乏用至是上議更定親王嵗祿萬石郡王三千石鎮國將軍一千石輔國奉國將軍六百石鎮國中尉四百石輔國中尉三百石奉國中尉二百石公主及駙馬二千石郡主及儀賓四百石縣君鄉君次減一百石皇太子庶子既封郡王俟出閣嵗賜如親王子封郡王者女俟嫁嵗賜如親王女已嫁者即王子嗣郡王者比始封郡王減半祿是時重定祖訓録名皇明祖訓遣使召諸王至京諭減祿之故賜皇明祖訓九月部言親王嵗米既有定議請令有司如數給之上曰晉燕楚蜀湘府給如故代肅遼慶寧谷府逺在邉民少賦薄嵗且給五百石齊府千石嗣秦王幼應用米有司月進其罷給及多寡異者並出一時權制云十月製二十字命名詩登玉牒三十年敇遼寧諸王據邉場孳牧勿侵民田是年令王府官不得三六九年考核建文即位詔王國所在惟國事聽王文武吏士聽朝廷王不得節制永樂二年諭天下諸司事關王府遵祖訓啓王有司合行事務不許槩啓若王府事馳奏不待報輒行重罪論三年五月上以代寧秦晉諸王屢驕恣怨謗賜書戒飾諸宗人宣德元年定將軍主君儀賓品級冠服儀式王府官不得外調升不知起於何時或曰靖難後事也然宣德中周忱以越府長史升侍郎巡撫江南鄭府長史王瀹改行在户部郎中洪熙中淮府長史王榮改吏科左給事中荆府長史曹曼齡改翰林修撰矣嘉靖八年大學士楊一清言楊士奇以審理副選翰林編修周忱自長史纍升尚書成化年雷霖以德府長史為山西提學副使又言布政使雍泰秦府有姻亦升巡撫都御史乞容王官與别官一體升用王親亦選京官吏部議此祖宗微意如近年江西婁性足為監戒况王親縱不得京任得仕至左右布政使官與尚書等使非區區自懷重內輕外之心則展布才猷亦足自見一清請再議吏部執不可二十二年蜀府長史髙鵬九年考滿至吏部吏部請奪職遂請王府官凡稱病乞改用者並勒致仕輔導失職調者不得授府州縣親民官時陜西山西河南湖廣積欠王祿百數十萬有司不能給宗人輒告飢譁有司有司或杜門或踰墻走每下詔即念宗人嵗祿顧嵗祿百倍洪武時有司竟不能給初制定親王嵗祿萬石惟肅岷府千石正統初岷府加二百石後加三百石伊遼府二千石韓府三千石唐府五千石代府六千石郡王將軍中尉儀賓幾千倍於國初於是宗人有上言願停祿如唐宋故事得應用舉效用者有請田力耕自養者竟莫敢決宗人有罪者錮髙墻在中都凡先後入髙墻者男女且千人嘉靖四年釋二百九十人十二年釋十三人十三年又釋三十八人十八年又釋四十五人傳還原邸給薪米自便宗藩條例節略禮部尚書兼翰林院學士臣嚴訥等謹題為際遇明時竭愚忠以少圖報塞事儀制清吏司案呈奉本部送禮科抄出巡按直𨽻監察御史林潤奏臣嘗聞諸易曰窮則變變則通故自古聖帝明王未有不通變而可以宜民也今論天下之事極弊而大可慮者莫甚於宗藩邇年以來羣臣咸切隱憂然卒莫能定不易之策以垂可久之制者大抵懼無以愜宗室之心而重祖訓之違也顧時有所必變勢有所不能劑量品節使之不過侈以驕其性而亦不過儉以至於失所仁義並行未有以遂其親親之心者兹非今日之急務乎國初支庶不繁定制因略今螽斯麟趾其麗不億比諸前殆至數百倍矣臣嘗觀嘉靖初年霍韜疏云洪武初在河南開封府惟分封一周府而已今郡王已增三十九府輔國將軍增至二百一十二位奉國將軍增至二百四十四位中尉儀賓不計也舉一府而天下可知也今距嘉靖初四十餘年矣所增之數又可推也故天下財賦嵗貢京師米計四百萬石而各處祿米凡八百五十三萬石視輸京師之數不啻倍之即如山西存留米一百五十二萬石而宗室祿米三百一十二萬石河南存留米八十四萬三千石而宗室祿米一百九十二萬石是二省之糧即無災傷蠲免嵗輸不缺亦不足以供祿米之繁况官吏俸給軍士糧餉皆取其中如之何其能辦故自郡王以上猶得厚享將軍中尉而下多不能以自存其苦愁之狀誠有非臣之所忍言者食不充飢衣不蔽體生則假息於蓬蒿死則委骸於溝壑男婚女嫁不能循理甚至藏匿名姓投身𨽻卒勢之所逼不得不然也有司祿糧不給安受其戾無可奈何或號呼於公庭或聚辱於道路或投石擲瓦於馬首仕於其土者懍懍度日不獨懼辱且懼變生於不測矣是在官司困於祿米之繁在宗藩屢有不足之歎今天下無可增賦之理年復一年愈加繁衍勢窮弊極將何以足支興思至此誠為寒心夫民有農工商賈之業宗藩舍祿米無謀身之䇿矣坐視其弊而不為謀途人且不忍况天潢耶歷聞羣議或云當損過以就中損有餘以補不足必天下親王皆從國初遼韓伊岷肅諸王每嵗祿米皆二千石不使有厚薄之差或云郡王而下定中半折支如在內之職三分支米七分折鈔之例其儀賓而下則如在外之職二分本色八分折鈔之例焉或云自親王袒免以下則從庶人之制皆月支三石焉或云不宜遽削於見在而惟定制於方來或云宜定子女之數以杜其詐冒或云許其如民間應制舉商吏各治生為兩便凡此皆各出其見臣未敢遽以為是然此事體重大非下諸廷臣公議恐無以定其可久之計非與諸王共議恐無以服其億兆之心臣愚懇乞陛下命諸大臣科道各獻其猷仍乞陛下特賜手書頒諭諸王示以勢窮弊極不得不通之意又令户部備查各省錢糧之數每嵗所入夏秋稅糧幾何輸邉幾何通十年之內大約災傷蠲免幾何或地方有事存留費用幾何然後具宗藩初年分封幾何所需祿米幾何今之各王府增封幾何祿米增加共幾何房喪嫁娶等項共約共幾何使各宗藩一展卷瞭然知賦入之有限費出之不經今眼前已不可支再數十百年之後生生不窮決莫能給必至於狼狽失所無惑也令其各陳所見共圖善後之䇿然後通集諸王併諸臣所陳之章斷自宸衷採其何者為可行何者為不可行可行者且未即行仍乞諭諸王質其可否有不便者仍聽其自陳然後斟酌定制垂為億萬年不易之規夫如是則謀及於衆則諸臣皆得盡其長論出於公則宗藩莫能議其後百姓無加賦之煩宗藩無失所之苦庶有以遂我皇上親親之心而慰我祖宗在天之靈矣不然賈誼所謂失今不治恐成痼疾臣竊慮之此宗藩之所當議處等因奉聖旨該部看了來説欽此欽遵抄出送司查得奏內各省錢糧出入之數係𨽻户部掌行移咨該部備查題覆外案呈到部看得巡按直𨽻監察御史林潤奏稱宗藩邇年以來愈蕃衍嵗徵錢糧不足以供祿米之半將軍中尉而下多不能以自存乞要命諸大臣科道各獻其猷仍諭諸王示以勢窮弊極不得不通之意令其各陳所見然後斟酌定制垂為億萬年不易之規一節臣等為照建藩頒爵者朝廷親親之重典酌時濟變者聖人御世之大權我太祖髙皇帝立賦稅之則以經國用定祿糧之制以贍宗藩當是時祿給用裕法至善也仰惟皇上惇族展親同符太祖夫何邇者各邉宗室往往祿糧告乏甚至貧困失所無能慰皇上親親之意此其故何也良由太祖當天潢發源之始即給以數郡之稅而有餘皇上當宗枝盛衍之時雖祿以全省之賦而不足蓋賦稅之出於土地者有限而生齒之在宗藩者無窮以有限之賦稅供無窮之宗室即使連年大稔正賦不虧猶且不給况加以非時水旱其何以責諸有司以故在宗室徒擁祿糧之虛名而緩急無濟在有司每苦祿糧之詘乏而措辦不前及今不慮誠恐將來之宗藩愈繁則祿糧之愈匱而飢寒窘逼之狀愈甚此誠勢所必然而觀勢會通以垂萬世之利在今日誠有不容己者臣等亦夙懷軫念而思以善其圖者久矣但緣事體重大未容輕議今該御史林潤論奏前因無非目擊時艱欲集衆思廣忠益補偏救弊為國家畫宗藩善後至計相應俯採合候命下本部備行有王府地方布政司轉行各府長史教授啓王知會仍轉示所屬將軍中尉等爵俱令審時度勢悉心體國無便近圖無徇己私備查奏內事理從長計議各行具奏前來其大臣及科道等衙門凡有所見許隨時疏聞通候各王府陳奏至日敕下廷臣集議可否具題上請斷自宸衷定為可久之規上不失乎朝廷親睦之意下有濟於國家經費之宜斯則藩封之制當與國永垂萬世矣緣係際遇明時竭愚忠以少圖報塞及奉欽依該部看了來説事理未敢擅便謹題請旨嘉靖四十一年十月二十四日具題二十六日奉聖旨是欽此自古法莫備於成周周家五世袒免燕會無與慶問無及非故絶之也王者以貴奪親止乎其所不得不止仁之至義之盡用能萬世不磨享厯永久今奉國中尉而下皆五世以外親也若欲盡人而贍養之難以塞其嗷嗷待命之口若欲盡人而約束之難以抑其洶洶不平之情雖曰生之實則傷之雖曰厚之實則錮之臣以為禁不可太苦苦則易壅莫若少寬嚴敇中尉以下但令奏報宗支紀名玉牒聽其相生相養各成世業而以自食其力如有文武才能超邁等倫者推廣祖訓宗人府具以名聞責令督學課其行藝撫按稽其賢否與凡民之俊秀者一體應試比照宗親事例外任效勞仍行刋著令典嚴為管束其或敗禮敗度驕縱不法者即以凡民之罪罪之夫如是則寬之以恩而生全者有所賴制之以法而驕恣者無所容以此處同姓之親是或一道也其於各府儀賓及鄉縣君亦羽儀宗室作賓王家之意也竊思天朝戚畹皆有侍從護衛之勞駿奔俎豆之役雖以親議貴未嘗不以勞奠食也惟藩府宗壻於朝廷無尺寸之勳於國家無纖毫之補以文則不足於經濟以武則不足於折衝彼其聯姻帝室誇耀鄉閭亦寵極無涯矣顧乃盤桓聯結與宗臣雜居齊齒榮之以爵秩奠之以宅第厚之以餼廩慶賀不與赴告不及憂制不行謂之何哉又其甚者罄不資之産而多方以求附及其得遂攀援則驕奢淫佚憑陵撥置以貽宗室憂者籍籍有之矣此亦非細故也臣以為恩不可太濫濫則易窮今其締婚親郡王者所宜優禮未可槩議其他宗女宗壻出自將軍中尉者賜以冠服給以嫁資聽其各相依倚使得全父子之親而又不失夫婦之義仍令有司衙門隆之禮貌復其徭役則亦未為不厚矣何必加之廩祿以奪宗藩之食乎以此處異姓之親又或一道也但立法者貴乎趨時而更化者先於審勢宗藩安享祿位者已非朝夕之由一旦而驟更之恐至於不可測如臣所議創自今嵗以後以漸計之其已經奏請封名者悉如已往之制而不可動則由今以前者消之以漸而不嫌於驟由今以後者生之以漸而各得其所他如立宗學嚴保勘革冗費戒奔競特一時經畫之微權又無甚難處者臣以管測井窺之見妄及國家大計罪又何辭竊念厝火於積薪悲處堂之燕雀孟子以七年之病求三年之艾今為盧扁所驚豈值七年哉臣謂自今蓄之誠非過計也以故蒙死而不敢諱然臣之言不足憑也其間大經大法與纖悉委曲之詳伏乞敕下禮部會同文武百官另行熟計各獻謀猷刻定期日多端集議仰祈聖明著為定制以垂不易之典行之萬世而無弊再懇天語叮嚀宣諭廷臣勿以曲突為迂圖終於推托遷延釀成意外之慮如是則天潢之支𣲖得有所歸而宗社無疆之慶於兹裕矣此宗室之所宜亟議者一也修明宗範議得宗藩子姪為善者固多中間亦往往有失教而寢至敗度者故南陵等王議立宗學以興教化不為無見但其建置黜陟事多更端所關重大未敢輕議所以先年府部臺諌諸臣如霍韜等屢經建議竟未舉行今據武岡王論列似得中制頗為可采今後止於本府選取教授文行俱優者為師或有不足亦照所題事理取紀善教職等官補之其肄業課試悉如其議年至十五先令照例請封且給祿米三分之一習學五年親王方與奉請出學以正本等祿爵亦以見優異不羣足為宗室之光其有放縱傷教有玷宗儀者小則竟自訓責大則參奏降革庶人知所警而列藩多彬彬之盛矣宗支奏報議得宗室子女系出天潢誠不可以混殽也近乃務多子女以圖祿入遂詐偽百出至有一位而生數十子者故奏報之籍信不可以不嚴但前次屢經奏有定例而奉行者一切視為虛文中間乞養過房花生傳生等弊恬不知戒不惟縻國家有限之祿糧而宗支瀆亂所繫甚大今後如再踵襲前弊聽本部查出參奏將本位并保勘宗室通行革去爵祿以示懲戒長史教授等官及一應甘結有名人等問擬邉衛充軍奏報格式議得宗支奏報他日名封率由此定所係甚重各該王府近年奏報皆朦朧不明中多影射且格式不一雜亂無章非政體也臣等擬定請名請封選婚奏格通行各王府遵照必合此格方行題覆任意違式希圖詐冒者立案不行查參玉牒議得玉牒所以正宗室之世系而將來封爵由此以定者也但各府造册等官徇私作弊因循玩弛以至差訛舛謬已經屢次具題奉旨申飭去後今查見解文册或沉改年月或遺漏名位或母姓之不同或生年之不載如前弊端不可勝計甚則稱為妾媵某氏所生而保勘者又非此妾影射如此其弊極矣今後如有仍前差錯等項經造人員參奏治罪所生子女不許造入玉牒進封親王議得郡王入繼親王所以重親王之統也若進封之後則本支止許以本等官職奏請奉祀不得復請繼封次子蓋以郡王而進親王已為踰等茍以進封之親王而又欲推恩於本支不亦太濫乎故禮有繼統不繼嗣之文例無加恩再加恩之禮今後郡王進封親王本王郡爵照例不許補襲原授册命隨即進繳以後世子世襲親王次嫡庶子每世止照原封世次本等官職不得進封親王襲封議得各府親郡王病故其子暫理府事待服滿請封此定例也其後晉府世曾孫知煬奏稱連喪孤苦因許襲封故趙府庶長子佑採亦得夤緣請乞槩蒙世襲然據纍朝政令議準服滿請封如彥汏者國家之定制其知煬等例乃朝廷矜恤之殊恩今後但有親郡王應襲封爵者止照彥汏前例請敕管理府事及服滿而年嵗已足方許請封不許援引遠年事例服內陳乞如違本部將該府輔導官參奏問罪追封親王郡王承襲議得郡王封典推自親王郡王繼絶祖訓無其文故身殁之後得人以為之奉祀即已足矣至於兄終弟及以姪繼叔則非法制所宜今後當以寵波為煡為例不許朦朧瀆奏亦不許奏乞繼嗣以為冒襲之地初封祿米議得郡王祿米二千石襲封者比初封減半支給此載在祖訓者也其後韓府襄陵等王十七府初封襲封俱一千石蓋不止平涼岐陽𢎞農三郡王為然也甚至岷府善化等三十四府初封襲封俱五百石在當時多寡懸殊已如此况蕃衍如今日乎除已封郡王及岷府五百石俱照舊外以後初封郡王祿米悉照成化年間例俱一千石仍照今題事例三七本折兼支合候命下行文户部通行各該王府知會永以為例住支祿米追封郡王庶子爭襲另城請封查革冒封自備儀仗議得郡王及妃儀仗內例有交椅等大器銀質抹金載在會典蓋謂其分所得用也况所領止是大器又皆折銀餘皆自備充用夫鉦鼓幢節既可自備則大器自備亦無不可而乃往往瀆請在國初則封少而易給在今日則封多而難周一位之所得雖無幾舉天下郡王生生不窮而皆取給於內府則財賦有限有難於周給者以後除親王及親王妃初封照例頒給外凡初封郡王及妃銀大器合行停止俱令自備不許仍前奏請以為定例改封世子改封世孫改封長子改封長孫請封曾孫堂孫請襲議處改折議得藩封之祿親王自遼韓伊岷肅諸府止二千石外秦晉諸府一萬石郡王初封二千石襲封及鎮國將軍皆一千石故鎮國將軍以上常有餘而鎮國中尉以下常不足在國初分封不多猶可支給二百年來宗支繁衍郡王三百四十餘位將軍中尉一萬二千餘位郡縣主君一萬六千六百餘位嵗支祿米八百六十餘萬石民力有限其勢必不能給是以中尉諸位窮苦貧迫之狀有不忍聞者若不為酌處數十年後生息愈繁祿糧愈增不惟民力困竭而宗室之窮苦窘迫將益盛也羣議云當損有餘以補不足在景王奏稱儀賓祿米宜各照品級遞減交城王謂宜議處以便將來誠為有見除親王另行議處外郡王則推自親王將軍則推自郡王祿給少從減折亦不為過查得見行事例郡王將軍中尉本折中半兼支若依交城所奏二分本色八分折鈔似涉太亷合無依林潤所奏羣議三七之説通融酌處在郡王及鎮輔奉國將軍俱三分本色七分折鈔鎮輔奉國中尉俱四分本色六分折鈔郡縣主鄉君及儀賓俱二分本色八分折鈔其本折輕重之數各從彼中舊例支給以為定例亦裒多益寡之義也至於親王有能仰念朝廷經費之難同宗窘乏之極慕義願減原額之數以補不足者聽其具疏奏聞降敇褒異以為宗藩尚義者之勸仍咨都察院轉行各該巡按御史行令長史司啓王知會文書至日限半月以裏徑自具奏施行酌處庶糧議得宗室爵祿隆殺各有差等以其分有不同也今中尉之祿實食百石而庶人之米則反過之宗女之婚僅資百兩而庶人之壻則反厚之是負愆受譴之裔竟優於王孫見爵之貴輕重委為失倫今後合依武岡王所奏庶人止許同妻月共支米六石量從本折中半兼支庶女任其擇配不得復給米布婚喪之資永為定例再照庶人往往結交無藉揑報詭名虛冒食米管束宗儀親郡王等以其不係有爵人數漫不留心稽查為害滋甚以後造册奏報須要嚴行保勘及至本身故絶即與除名如有生前詭名虛揑殁後不與除名冒濫口糧者即將該府本爵降革祿米以補正數揑報之人問發邉衛充軍親王削封郡王革爵管理府事降發髙墻釋放庶人乞恩有罪查刷府事請封生母選擇婚配擅自成婚議得請封有制宗室所當恪遵者也有等不遵成命就吉成婚是蔑視憲典允宜敕戒查得西河王擅婚以乞恩準看已經纍朝政令改題不允今後如有敢於犯禁者聽本部參奏輔導等官及主嫁之人治以重罪擅婚子女議得宗室請婚雖重人道之始實重朝廷之命也若不請命而擅自婚配則非人臣之禮矣今後有擅婚者所生之子止許請名不許朦朧請封其嵗給口糧照依歷年原議減庶人三分之一給米五十石仍本折中半兼支其女任其擇配毋得别有希望奏優妾媵限制議得宗室妾媵之制載在會典蓋為無子者而設如有子者則數不必盈也近經本部題奉欽依申明典制以後如有不遵明例或未婚而先娶或私合而先收或年未及而預陳或已生子而復娶凡若此類長史教授等官檢舉親王轉奏以慿本部參治輕則罰住祿米重則革去爵職輔導等官知而不舉事發體降黜選娶內助冒妾子女議得假名冒選妾媵前無舊例今已題奉欽依比照擅婚革去官職等項止給口糧不給婚嫁之資永為定例濫妾子女議得妾媵本為嗣續之計非以縱情而導欲也舊例郡王將軍而下妾皆限有定制而所生子女遂得亞於正嫡其宗支所係亦甚重矣近來濫娶者漫無顧忌犯禁者曾無重罰輒敢一槩請封悖禮瀆倫莫此為甚節該本部題奉欽依如寵泑寵添顯桄華塑表椇安洢子女等止許請名不許請封其法始定他如聰瀺等以認罪首正者不可為例今後有以逃移婦女有冒報妾媵認為繼妻併額外濫收增立陪從等名目俱行革其生育子女盡為庶人如有朦朧請封者輔導官一體問罪花生子女革前子女議得各府革爵庶人所生子女不許請封此定例也其後復有革前之例那移奏復實從此始以後革爵子女仍照定例無論革前革後一槩不許請封如有仍引革前之説朦朧奏擾者本部參送髙墻禁住寄養子女議得宗藩名位各有不同其所生子女亦以次遞降而封號之崇卑祿米之多寡因之如成鑱所奏伊妹寄養事體本無考况宗室蕃衍子女數多一有稱託那移則中間詐偽恐不能保已經題奉明旨不許以改正為由濫請封號永宜遵守違者聽本部參治慎簡官僚藩僚考察裁革冗職儀賓婚配教養儀賓儀賓守制王親仕格恩恤限制議得儀賓例給養贍祭葬其生死沾榮所以優禮之者極矣然主居系次等級漸降配後存亡所值異勢則儀賓所受之恩亦不容無隆殺之差况以素殖之厚經商貿易亦足贍給似不必盡籍於官雖量行裁減亦不為過今後除親郡王儀賓例給祭典外其餘身後諸恤典悉從裁革及一應儀賓於妻亡之日即住支常俸不許虛冒仍免本府朝賀聽其自便停給工價議得郡王將軍中尉郡縣主君受封例給房屋冠服等價及身後例給墳價此固朝廷優厚宗室之恩但行於國初則封少而易給今天下郡王至百四十餘位將軍中尉至一萬二千餘位郡縣主君至一萬六千六百餘位將來生息可類推矣若房屋冠服墳價一一取給於朝廷則民力不勝其疲此勢之所必不可給而法之所不得不變者也以後合依弋陽武岡等王所奏郡王將軍中尉郡縣主君房屋冠服墳價俱一槩免給以為定例收買子女收買物件行禮次序王國相賀宗儀服飾進繳册印旌表孝行激厲風節書院請名越關奏擾議得宗室私自來京違例奏擾一則惑於憸人引誘圖濟姦謀一則利驛遞需索冀充私橐所以法例屢申而屢犯奏詞愈禁而愈繁今後若不嚴加譴罰則將來何所底止合無通行曉諭如或再有從前故違者俱不給以應付一面差人徑送間宅拘禁其同行人等務要追究問擬極邊永逺充軍該府長史教授等官定行革職毋得如前輕宥凡所奏情詞不拘事理曲直俱不準理奏差人役奏討內使保升官員私收淨身改正樂工私收錢債宗藩總論夫衆建支庶以屏王室大業也食租衣稅世世勿絶大恩也載在祖訓畫一而守之久矣今更制易法則有混亂約束之説以義斷恩則有間疏骨肉之罪忍而坐視則蠧耗愈甚卒有土崩之憂僅而補葺則茍幸旦夕不救衡決之禍故雖計臣謀士莫為破盈廷之言而建必然之畫者難之也雖然釋今弗圖則後世之難且十百此矣請試言之漢初諸侯王置吏握兵同制天子其患在強大而不掉自武帝推恩分王則宗室子弟莫不受地矣然王之庶子間為列侯侯之庶子絶無爵土有去而為民者有為民而復仕於朝者自是而後無諸侯王之患亦無養宗室之費其經制定也唐之末也帝裔王支流播民間其患離渙而不屬自宋養之京師則五葉之後騷然煩費矣其後辨親疏之等明甄序之法袒免以下不復賜名敦宗之院散居都邑故宋雖費於前而大省于後其救弊早也由是言之勢有所必極極則必通恩有所必窮窮則必殺兹非其明效大驗耶髙皇帝神武開基忠厚立國故利建宗子以強本朝明惇睦之誼以先天下然是時宗室之衆無幾可按籍而數也今熙洽二百餘年麟趾瓜瓞綿昌浩衍麗屬籍者四萬而存者二萬八千五百有奇以祿計之不下八九百萬設一傳再傳而後其生齒什倍其祿又當什倍此勢之所必極而恩之所必窮也故欲竭天下之賦以奉宗室則國益病減宗室之祿以紓國計則宗室亦益病何者今賦斂非減而積貯非盈也乃水旱為災迄無寧嵗諸邉轉餉未見休時財力亦甚詘矣加以宗室之祿日引月長則賦安得不竭而國安得不病語曰附枝大者賊本心此善喻也且宗室至貴倨也又非人人能謀生也今祿既益微網亦少密業已困矣而有司奉行條例一切以法繩之令搖手觸禁資身無䇿則安所歸命也蓋宗室亦極病已語曰飢寒切於人之肌膚欲其毋為姦邪不可得矣此非細故也故雖桑孔握籌朝賈挾䇿而圖今日之弊終不能兩利而兼得也愚故曰勢之所必極而恩之所必窮胡不引漢唐宋之事以觀之也夫揚湯止沸無益也不如絶薪止火而已子孫而守先人之廬至於棟折榱傾不得不撤而新之為其將壓也今承祖宗之業視國家之弊不思變通安全之則何異以指撓沸以繩維顛乎愚以為祖訓至嚴而善推聖祖之意則猶善繼述也宗室至親而曲體宗室之情則所以親親也何以言之國初親王嵗祿五萬他賜豫甚盛不數嵗而裁為萬石又以民貧賦少給代肅諸王僅五百石或千石耳夫莫富於海內莫親於天子之子不加賦而奪之祿者以為寧儉宗室而不可以耗國計瘦民力也祖訓言將軍有以材能者得改官升轉如銓選法夫既富貴之矣猶不絶其仕進者所以興其善行而消其怙侈使外有親賢之重而內有亡費之利也然則聖祖之意可推也人情孰不欲生全而惡死亡趨富厚而逃貧困然令豫之虛名而奪之實惠則三尺童子不願有矣曩者宗室獻議有請試官自效者有請力田自給者夫田農至拙業也簿書之吏至拙體也猶願為之彼擁有爵之虛名而棄資生之實惠其情固弗樂也然則宗室之情可察也今欲善推聖祖之意而曲體宗室之情其當議者有三以正倫次則封爵當議以廣德厚則禁例當議以節浮冗則恩數當議何者天下之法未有莫為之限制而能世世無弊者也古者五世袒免六世而親屬絶至於祖宗之廟猶限之以七世親盡而迭毁今已絶之屬猶儕於五服之親則無等也忍于親盡之祖而不忍于親盡之子孫則舛也誠宜按諸屬籍别其世次而為之限制如親王世及矣其次封郡王者可限也郡王世襲矣其次封鎮國將軍者可限也諸將軍中尉以嫡相繼矣其一子降封之外可已也奉國中尉一子得襲矣其世世承襲之例可已也大抵以位尊卑為之多寡以世親疏為之隆殺其不得封者皆如漢列侯庶子之法則坐食可益省而詔祿可繼此封爵之當議者也古者公族得仕於國非絶之也庶民之家得占田治生非禁之也今宗室槩以例見疑是以賢愚同滯而人無聊生矣夫既限之以爵則絶封之始宜人豫之資賦之間田以為永業令家自為養而盡弛出城諸禁其材者得應舉試外官如常法或懼其縱也則如蘇轍所謂臨以按察持以寮吏威以刑禁使不材者不至害民賢者有以自效顧不可乎此禁例之當議者也且夫禮所以為節而法所以為懲今疏庶人有給已猶無罪也已罪黜而猶給之與詔祿無别非所以為懲也自郡主至鄉君有祿已猶同姓也至諸儀賓得聯姻王室貴重矣其祿不省非所以為節也愚以為諸降庶人者宜皆以絶封庶人同法郡主視郡王之限縣主以下視將軍中尉之限祿皆半給餘皆量給婚資則恩澤不至冒濫費必大省此恩數之當議者也如是則可以清耗蠧之原紓待哺之困上無失聖祖之至意而下能通乎宗室之情大較若此矣然愚聞之救弊者必反其始更化者必虞其終今封爵限矣得無有怨望而羣譁者乎禁例疏矣得無有恣睢而為暴者乎恩數節矣得無有顛連而失所者乎則愚又以為盈縮之議在下而操縱之機在上惟聖天子燭安危之故恢繼述之圖毅然獨斷而力行之示諸王以大義不得不通之法則必有河間東平之賢奉宣德意而深樂其便者何至於羣譁有爵者制之於王國絶封者治之以有司何患乎為暴且齊民非廩于官而固有比于封君者宗室而有永業世世無有所與設天子不忘恩厚舉古賜民粟帛之令以間恤之何憂乎失所較之嵗祿不給而羣辱有司犯禁而不止救死而不贍者利害相百也此之不為而顧彼之久行至於勢不可復反恩無所復施則其害不獨宗室且移之社稷矣故為之於可為則易為之於不可為則難今天子仁明英斷釐弊剔蠧以興至理賢公卿能矢謨陳力為國家任大事以圖大功則何有於草野之言哉問藩府供例不充奈何曰嘉靖末年郡王二百四十餘位將軍中尉一萬二千餘位郡縣主君一萬六千六百餘位嵗支祿米八百六十餘萬石如山西存留米止一百五十二萬而祿米三百一十二萬河南止存留八十四萬餘而祿米一百九十二萬何以克濟太祖初藩封五萬不久改為一萬郡王初封二千襲封一千成化十一年例初襲封俱一千嘉靖四十三年例悉照成化間例其三七本折兼支將軍三七中尉四六郡縣主君二八本折庶人同妻月給六石中半庶女不給凡房屋冠服墳價俱革免此亦太省但以大道為公須各令自申賢為世用次以食力更可復省國費中間差令有别以盡親親之仁又不失成全之德屢見有建白者宋事亦可考也宗藩私議帝王之待親親不過仁以周之禮以節之已爾仁即此心之公愛也一體之愛萬物盡然况宗親乎禮即此心之等殺也一體之間萬有不齊况親親乎故仁莫大於親親而非禮以為之殺則仁有所不能周矣况仁也禮也一天理也此理一出於天豈待人力以為之愛而殺之耶知此則知所以處今日之宗藩矣伏覩近日禮曹疏中有曰仲尼憲章文武非不知尊位重祿所以勸親而又首云親親之殺者豈故倍文武之道哉良由禮之所生其勢不得不殺耳嗚呼盡之矣所以考之前代周室時庸展親蓼蕭行葦何其忠厚之至然五世外燕會慶問皆弗之及非故疏之也蓋五世袒免六世親屬盡矣即周公成文武之德追王止及太王王季而先公止祀以天子之禮此周公所以為典禮之宗也考之國初髙皇帝稽古定制封建宗藩誠盡制盡倫萬世莫及矣然於親王封祿在洪武八年則定各五萬石在洪武二十八年則減為一萬石是髙皇帝於二十年間猶不能不為變通之術以救極重之勢且親藩祿既定萬石矣代府何為止六千石韓府何為止三千石肅府何為止千五百石郡府初封祿定二千矣何為襲封減半止給千石豈故為是變通以救勢之極重哉正所謂禮之所生有不得不殺者在耳近河南撫院題稱河南宗室惟周府最為繁衍嵗支祿銀二千餘萬額𣲖民糧止六萬零其餘一十六萬零皆係雜𣲖湊補見今尚欠一十餘萬無從措處欲將解部銀九萬餘兩懇留湊補且求變通之宜為經久之計故部科題請從長會議為今之計豈能出廟堂經畫外别為一説哉如前所議或云定限子女封爵如親王之子止封五位郡王之子封三位將軍有嫡子許封其二無嫡子止封庶子一人中尉不論嫡庶計封一子其限外之數止給冠帶口糧親王之女止封其三郡王之女止封其二將軍之女止封其一或議親王傳至袒免以下萬一絶嗣止許親支以本爵管理府事不得繼封或議奉國將軍以下宜節其祿秩或議奉國中尉以下止記名玉牒不必給以祿米聽其自便或議弛出城之禁開四民之業有志讀書者與民間俊秀一體應舉出仕如有失職及犯法者一以有司之法齊之言人人殊大都不出此數者然備查前議而裁訂之則中間可疑亦非一端其曰限封爵之制如親王許封五子似矣又云無王者不復嗣封第令親支以本爵攝理其於大宗之統亦有防否且封不及於五子之外假令始封之帝子帝孫其説可槩行否如郡王之子許封三位似矣其將軍有嫡子許封二位無嫡子止封庶子一人既限其子而數又不均能無失之偏重否中尉不論嫡庶止封一子似矣其云限外之數止給冠帶口糧此似專指中尉之餘子而言而未審親郡王將軍之餘子亦復如例否或云既奪其本封亦可遞降其位次而仍其現封之爵否親王之女止封其三郡王之女止封其二將軍之女止封其一似矣未審餘女亦另有處分否此封爵之當議也其曰開四民之業似矣今之宗黨隱匿姓名已有竄身於輿皂者矧農工商賈何待弛禁而後為之今之所未為者惟仕一途而已即今驅之為四民亦宜限其世否如專指六世之宗而言假令天潢之籍未除而偶捍文網果礙於有司之法否此疏宗之當議也其曰弛出入之禁似已蓋指無名封之宗而言欲其散之四方以便糊口也顧此輩久處酣豢之中於人情世故多所未諳一旦雜於與齊民處能必其不橫奔恣肆以罹刑辟否或云縱有之亦付之士官耳而城門一開有封之宗又能必其不掩迹於無封之衆而混行出入否倘有作姦犯科將誰任其咎此門禁之當議也即此五條則前議皆有可疑若未可以決行矣雖然宗𣲖日繁祿糧日窘其終於莫之處耶易曰天與火同人君子以類族辨物不能辨物類族何以同人哉當今之世設使髙皇帝處此既不能加賦於民令四海困窮義又不忍坐視子孫貧乏使其朝夕不給安得不節宗藩之封不開宗藩自生自養之路哉是故周之以仁而有禮以為之節則揆諸天理而安即諸人心而順前議皆可行也不節之以禮而仁有所不能周則天理有乖人心不服前議皆不可行矣何也疏中有曰昔朝錯懲尾大之患為漢畫削地之策其謀國忠矣而變生倉卒者激於無漸也宋之宗室聚之京師而王安石以親盡當祧之一言徐而喻之而袒免以下甘心除籍者屈於有理也即此觀之我朝宗藩條例擬議數十年可謂有漸而袒免之禮獨不可徐行於今日哉蓋尊尊親親其心一也聖天子於宗廟之主有不容不祧者非忍於祖也禮也則其於宗藩不容不節者豈忍於親乎亦禮也禮之所在雖萬古帝王莫與易焉今果確遵袒免之禮而行之凡親藩各自始封以至於今茍在五世之內萬一絶嗣亦所當繼支庶亦所當封雖郡王將軍子女亦不必限數所以廣天子待子孫之仁也禮之所當隆也使一槩行於帝子帝孫非禮也勢有所不可也茍在五世之外親郡嫡長世襲無論已支庶止許世傳奉國中尉一人其餘止記名各管理府籍而已萬一親王絶嗣第令親支以本爵攝理蓋既有人以主其祀又何妨於失大宗之統耶是節封則祿常有餘亦所以廣天子待宗藩嫡長之仁也禮之所當殺也使一槩行之疏屬無所限制如河南周府一年祿糧止足四分之一亦勢有所不能也奉國中尉已在袒免外故止封一子其餘子給以冠帶口糧雖則口糧稍薄亦得世膺其祿也五世外親郡王將軍餘子亦許世傳中尉一人而五世外親郡王將軍之女又可知矣或曰祿雖因乎天敘禮宜順乎人情使降爵太驟減祿太多人情未甚安妥莫若袒免以下漸次遞降親王衆子封鎮國將軍郡王衆子封輔國將軍鎮國將軍衆子封奉國將軍輔國將軍衆子封鎮國中尉奉國將軍衆子封輔國中尉鎮輔國中尉衆子封奉國中尉亦禮之殺也是一説也或曰奉國中尉止封一子茍無嫡子不得繼封亦一説也或又曰貧苦相周以有餘補不足鄰里且然况在同宗之親今或祿以萬計或以千百計則祖父富者不可分祿以為子孫計乎子孫貧者不可依父兄以為居食謀乎何為祿厚者率驕侈而淫縱祿薄者止袖手以待哺仰望朝廷何其厚而自待何其薄乎如此則各當親其親仁也亦禮也若曰開四民之業懼其偶扞文網或礙有司之法蓋禁有不嚴則其中科甲遊宦途者雖有王親之例不得膺京秩握兵柄而或恃宗室之貴暴虐下民則下民莫之敢攖而司府上官將何以待之哉吾知越職犯法者比職官尤衆也在仕進且然而四民不得不齊之以法俾服舍器用一物毋得僭踰庶舟車往來無招盜誨淫之具而利有攸往矣若曰弛出入之禁則懼有封之宗或混行出入不免有作姦犯科之咎蓋法不預防則四民遊江湖處田野或恃宗室之貴與民交易在齊民莫敢誰何而姦邪誘之為非有司其何以詰之哉吾之作姦犯科者比齊民猶衆也在無封之衆且然且有封者不得不責之管理如商賈給引以備盤詰無引者追奪其爵祿焉國有明憲孰謂執皋陶之法者無人哉是禁之以法者亦間之以禮而為仁愛之至也信乎欲破拘攣之見消掣肘之虞而為國家治安計者莫先乎袒免之禮也已如此則禮之所當隆者爵位一定民糧常足以給其祿禮所當殺者倫敘一定輿論亦足以服其心且云不驟更以裁其見在惟定制以限其將來可無他虞矣然紛紛之議止云減祿糧限子女節財之計得矣其何以俾宗藩之心服耶宗學宗議愚以為欲宗人皆善而無惡莫若實興宗學而欲宗學之實行莫若通宗正互行之法其説有三執事試垂聽焉凡人情不有所激則不進于善不有所制則不憚於為惡誠慎揀宗子中樂東平之善修河間之雅者為宗正令假之事權優之祿秩以示風勸而頑不即率教與敗度䡍禮者即奉三尺隨其後則進有所慕退有所阻如是而不顒昻穆皇者當不其然蓋以我治宗人難以宗人治宗人易也而以宗人之最賢者治宗人尤易也是舉賢之當議者一也凡人習聞而習見大聖被誚于東家創見而創聞遼豕見奇于白蹢蓋以甲治甲則素所狎熟將曹起而衆咻惟倣流官法以周齊之賢者治秦韓而以秦韓之賢者治魯晉重以朝命斷然期於必行俾其董正則銜憲而來既畏此簡書而人得於乍覩若雷電鬼神之不可測也如是而不讋承伏聽者當不其然蓋玩忽於耳目者難而更新于聽覩者易也非所常新而創為新者尤易也此互調之當議者二也利器不可假人六馬惟在控轡既假事權矣不有以操之又為逞刀爼而肆魚肉也既俾董正矣不有以課之誰為程甲乙而辨蒼素也故以撫按察殿最而以督學課功能能者久于最事否則還其故吾顯定去留之品而陰消不肖之心提綱挈領道莫有善于此矣如是而不斧藻濯磨者當不其然蓋以我治千萬人難而以治一二人者易也治一人以治千萬人尤易也此考課之當議者三也非愚一人之私言也祖訓著之矣將軍以下有才能者得改官升轉如銓選法夫曰才能改官即舉賢之意而升轉銓選則更互考課皆在其中矣修明宗範嚴立課程教養如法不得虛應故事撫按提學等官訪其賢不肖勤惰以聞此正德己卯例也宗室之子俱入宗學于中舉一人為宗正主領其事驗其進益方與奏請此嘉靖乙丑例也皇上御極以來亦以監成憲率舊章三令而五申不啻詳焉然則三議者上以繩祖武相遵而匪相悖也下以固宗盟相愛而匪相厲也奈何此之不行而彼之久拘令其日益曠巖以就於陵替乎愚嘗深求其故矣不過曰官與其設寧省也多一官則虞其費疏屬貧宗受困也增之正則虞擾王孫帝裔素貴倨也令俯首稟仰于院道則虞􅉏而要之皆知其一不知其二覩其偏未覩其全也何也吾所用者將軍耳中尉耳彼鎮輔奉國各有定爵令以本爵帶銜視事而不益之祿也何費之有即稍有增焉而承寧天室糾正愆違視之無紀乃亂者利害相去伯矣吾所選建者乃明德耳髙賢耳布令之初衆心競勸企以樹名聲而顯清白且圖異日之終譽也何擾之有即不盡無焉而去其太甚禮順人情視向之朘削于強宗者損益不啻懸矣至於稟仰院司則可逆知其樂從而無他奚以明之夫宗人非盡朱户以居納陛以升也又非盡羽葆在前劒盾衛後也窶空無第混迹輿臺者有之富不知學竄身商販者有之懷奇抱異者仰屋歎約結或棄祿而作逍遙遊頴秀沖英者昻首志髙遐或易名而就青襟選誠以投間竄冷之朱組不若展米錯事之青襟也縳手縶足之逺遊冠不若明目伸眉之進賢冠也若是則其從吾教也惟不得與之為恨而又何􅉏之有况鄉議通籍矣今不與之涖民而第藉以正宗則有用而又無用也鄉議裁祿矣今賢否之品既辨而盈縮之際可參則量能亦以置粲也鄉禁冒濫矣今評品之法嚴而僥幸之途塞則尚賢亦以戢姦也此愚生堅執三議之可行蓋誠見其必然者也圖書編卷八十
