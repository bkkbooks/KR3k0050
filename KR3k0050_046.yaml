body:
  text: 圖書編卷四十六明章潢撰大同總敘大同古雲中地川原平衍東至枳兒嶺西至平冦城無山設險故多大舉之冦國初設大同府分封代王外分東西二路北設二邊拱衛鎮城西則平冦威逺中則右衛水口等處皆稱要害蓋敵南犯朔應諸城必窺之路也東則天城陽和為敵入順聖諸處之衝此二邊俱壞冦直抵鎮城况冦在套中而平冦西連老營堡與偏闗近敵纔出套便涉其境故大同稱難守焉大同鎮城髙拱完固内設山西行都司管轄東西二路一十五衛所鎮守總兵一副總兵一遊擊将軍二坐營官一統領本鎮并河南春秋二班輪戍官軍東西北三路各設分守㕘将一員以守一路設守備都指揮一十七員以守一方此去鎮城九十里舊為二邊又九十里為大邊各牆堡連絡以限邊夷後兩邊俱壞嘉靖十八年復築𢎞賜鎮川鎮邊鎮敵鎮河五堡於二邊内去鎮城五十里五堡添設守備五員𢎞賜堡居中復添設分守㕘将一員屯兵戍守以漸修築則大邊可復受鎮寄者當留意焉先年邊政嚴明警備差緩自多故已來大邊已失二邊之内棄為王庭墩軍卒驕惰警報不明至有與敵通貨入而後報者他可知矣以地利言則議者曰五堡決不可不復髙山聚落之戍是宜當増以人事言則正紀綱明法令今日第一義也夫修五堡有三利焉藩屏外固内地獲安一也沃土茂田富庶可期二也二邊既復宣寧等縣棄地亦可漸理三也若髙山聚落二堡在鎮城兩腋間實為東西冦衝募軍分駐則按伏之費省犄角之勢成無容議矣顧募軍之糧所宜亟補耳北人貢路例在大同正徳時三年三貢各邊寧謐者數年往嵗榆林欵塞説者謂似涉和議拒而不納豈典章未諳耶夫北人稱欵難也反自疑阻然則嵗嵗侵暴而勞費者是當然耶河南山西嵗運多不及額而屯田又多逋負是故足食之計非例外發銀専官糴買吾無策矣若夫馬之衰耗弊在各城搶兑此在軍之言當事者不可不知耳偏頭寧武鴈門三闗各稱要害而偏闗逼近黄河焦家坪娘娘灘羊圏子等處皆套中渡口往來蹂躪嵗無虚日尤為難守偏頭寧武鴈門自西延東三闗並盡西盡黄河東岸抵大同西路雖太原北境要害之地與真定相為唇齒非惟山西重鎮而畿輔之地安危係焉况達官達舍多安置真保河間等府子孫世受國恩臣服効力固無他志但同本原性習尚在世終與合故三闗疆域所係非輕與宣大並稱重鎮焉黄河東北舊有東勝城與大同大邊興和開平相聯通為一邊外狹内寛復設偏頭寧武鴈門三闗十八隘口于内以為重險往年東勝開平能守三闗未為要害正統以來東勝開平俱失三闗獨當其衝時無往牧之敵防守尚易𢎞治十四年以後敵住套中地勢平漫偏頭闗逼近黄河焦家坪娘娘灘羊圏子地方皆套敵渡口往來蹂踐嵗無虚日保障為難三闗要害雖同偏頭尤急十八隘口雖同胡峪口陽方口石峽口尤急河岸渡口雖同娘娘灘太子灘尤急先年以山西巡撫駐劄鴈門闗内代州總兵駐劄偏頭闗又各設守備一員以備調度嘉靖十九年北人充斥三闗不能禦近議於朔代之間設重臣一員總督宣大三闗亦如陜西固原之制又按三闗東十八隘口又東紫荆闗又東居庸闗山勢連亘實天設之險為京師近藩往年紫荆居庸可踰而今不可踰者以其増築修鑿之工多而其險備也使今之三闗亦如紫荆居庸邊馬敢深入乎故今之急務惟在備三闗之險擇将帥練壯勇積芻糧以整深入之門戸庶山西定而畿輔之地無警矣今防守之兵半是民壯馬又小弱非太僕寺所兑者扶傷救死之不暇而責以敵愾之氣難哉或謂已巳之變大同徵山西之兵防禦者葢幾七千今在鎮城止供薪水門户之役而坐縻糧餉分毫無益若改戍三闗給以太僕寺之馬民壯數千盡為除革此不惟邊防有賴而所省亦且不貲矣夫魏尚李廣皆守雲中尚給士卒饗軍吏無所不至廣逺斥堠就水草頓止人人自便是以能用其衆以制匈奴今之邊臣有能愛将士若此者乎襄毅公巡撫之日裁賦役禁掊尅恤調遣優死傷未嘗不誠心以求之是以鎮人至今不能忘焉今平日恩徳既無以結其心臨時節制又無以宣其威不幸有變遂因而為姑息之政姑息必疑疑則阻威之不服而恩之不威是成驕悍之習雖魏尚李廣豈能馭之哉由今之道馭今之兵厝火積薪因以為安吾不知大同所終也大同鎮屬衛八所七堡五百八十三馬步官軍舍餘土兵共五萬四千一百五十四員名糧料花布屯糧屯草及京運年例通共銀七十七萬五千一百八十八兩七錢五分屯糧一十二萬七千七百一十一石毎石折銀八錢屯草一十七萬六千四百一十一束秋青草三十七萬二百一十束每束折銀三分年例銀七萬兩例鹽七萬引馬四萬六千九百四十四匹每匹折銀三錢山西起運夏秋二税糧料二十九萬一千四百七十五石每石折銀一兩夏秋税糧折布一十八萬二千五百匹毎匹折銀四錢綿花絨八萬斤草二百四十四萬四千八百五十束每束折銀八分河南起運小麥九萬六千石每石折銀四錢大同事宜大同府城夏商屬冀周𨽻并州或為代或為趙至我朝洪武五年大将軍徐達築甎城周九里一百八十步髙四丈二尺東至枳兒嶺二百一十里西至丫角山三百四十里南至鴈門闗二百六十里北至鎮羌堡八十里治府屬縣一代藩封焉設巡撫都御史并分巡僉事戸部分司又設總兵官一員遊擊四員山西行都司及衛所總官軍二萬三百二十三員名視宣府為加備庫貯主客兵銀一十五萬七千二百六十兩有奇倉庫主客兵糧二萬五千八百二十石有奇料三萬二千一十九石有奇草一十二萬六千九百餘束是鎮外則捍北敵以藩屏乎幽燕内則接并冀以招來乎晉魏顧與敵為一牆之隔呼聲可達則視諸邊為獨重在天順之末北部入犯數經殘掠而近年以來自是鎮之衝而長驅者多不勝書設險崇防以戰為守則今日不可不亟為之圖也大同總論自山西老營歴沿邊接五堡而東至陽和盡大同界六百里其全壤特與敵為密邇登牆則敵在其下平地則敵或在山有跂而視過者至得勝堡偕撫臣與隨行司道出視市場之外則敵帳在焉呼而犒之升髙北望數百里皆平曠無闗闌詢之諸将云皆大敵帳也往敵未貢時近敵之郊絶無人跡雖巡按之行必架梁而後進猶有幾不免者其在今日誠謂邊鄙不聳而四陲晏然此邊民之快覩也中間有新工未接而舊牆尚存者則頽垣敗壁僅存形影敵馬精强可以一策而上計先年所報謂敵拆牆而入者夫亦為之名耳而豈其待於拆耶夫一家之門必有藩籬烏獲而肉袒固童子之所侮也今以六百里之長邊而恃此以為備固宜敵之長驅莫或限之居者耕者旦不謀夕即守堡副總㕘遊等官處於濵危之地其勢不隂有以賂敵無以安枕剥軍士之膏血以為私賄之資又安能以一矢相加而怒敵哉敵惟其不欲入已矣入即零騎數十人可以徜徉而長驅况於大舉乎何以故積威所刼舉鎮聞警炮之聲則百城皆廢自邑郭之外悉以委敵而沿邊民堡無復孑遺今邊民且耕且聚已六年矣而殘敗之形尚可覩在眉睫事體壞爛一至於斯意當時邊将有能賄敵不數入者夫亦暫休之一策而其軍士亦以為固然而不足怪使天未悔禍敵不欵闗則殘掠之禍率均九邊而其在大同尤未能知其所終也夫大同長邊非牆無以拒敵而牆非髙三丈以上則敵且潰以入險設崇臺明烽火其使邊民並耕之穡可望成功而牆臺既完又漸修腹内之堡以防有急之聚則大同之民庶其息肩乎而全晉之屏蔽伊亦有藉也修邊之役九邊所同而大同尤為切務限以十年則以敵之情不可測或者云併工以速集亦大同之急策也始者大同之民以邊之不可恃而敵又數長驅不能禦也則有竊出而從敵耳是以五堡之變充灼之叛往往出於大同而今拜甡之聚無慮數萬豈其民之甘於入敵耶邊不足恃而敵患最急非入敵則無以自紓也内防蔽而地不可耕所謂執梃而走險不復能擇者何可以厲法禁也先有殺掠之慘又有竊逃之患自欵貢以後即有復還與生聚者亦安得遽復國初之舊今邊工漸具而人烟尚稀則曠土不闢生意猶荒雖牆臺其誰與守是大同之募民以實塞下於修牆之後不可不講也按載籍自嘉靖初年皆嘗調宣府延綏之兵以衛大同誠危之也至庚戌以後而始以大同之兵援薊鎮豈所謂先其急耶今各鎮之兵請勿入援者謂尚欲省費爾而在大同則有大可念者葢以危迫之區方不足以自救而乃責之以庇鄰人是何異人方饑餓且困而又奪其食以與人未知其終之不羸且死也近以修工亦既准免其一枝然謂敵既貢矣在薊亦不過以修工爾今大同邊臺正當經始而乃分其二千餘人之力舍己耘人邊臣以為病酌緩濟急兵政所當先謂大同入援之兵必在所當罷即不終罷者且暫留以為六百里見急之工限完而再調可也是大同之請留援兵於募民實塞之後不可不講也大同據一郡雖無起運而有存留其民之被殺者其戸絶矣而派有定額甲去則乙之存者為之賠殺者多而賠者少久之則并乙而疲且逃矣乙幸不被於敵而不免於疲且逃是相率而盡之術也清理戸之額而為之均稍加調停以存其倖而未殺者而其甚凋之調理則責撫臣以别為之處庶里邑可望漸復是大同之清查逃絶於請留援兵之後而不可不講也大同之所謂存留者要以供王府禄米爾初年以見在之額派大同列邑以為之供其數正相適也今民之輸者日有減耗於敵而宗藩給禄之額則且百倍於初民不能盡輸即輸而不能滿其額而生長日増将至於不可繼今宗藩之不給天下之人皆知之矣如開封桂林同為急切然彼為一省尚可或括或借以紓其急而大同則一府且邊也置數千人於城中而使其枵腹則何以善後故或者有欲将族繁如潞城昌化等府遷封於别所如襄藩之例幸聖明加之一念此又不特為大同慮巳也是大同之議處藩禄於清查逃絶之後而不可不講也嗟乎外欲修邊而大同之驕軍素不便於役則工将誰程内欲鳩民而大同之缺額且使存者并逃則民将安聚禄賦日曠而大同之民貧勢難以復加則供将安出是以謂大同之難視各邊為最而今始可以稍延者敵尚未之有變也前謂大同事勢守一而戰九大敵之帳板升之聚相去不數舍萬一稍動大同其何以支乎此之所以乞陛下視大同其毋均各邊可也宣大總論國家威靈視兩漢什伯之一頃嵗敵奉貢請封其恭順過匈奴逺甚維時廷議藉藉有言互市之非便者有言所市漢物不宜恣所請者聖天子𢎞覆載之仁推赤心待之五六年來敵奉約束惟謹即文學所稱班彪所論其為利孰與今日哉顧敵情叵測自古則然撫與戰守之圖誠未可一日釋慮也夫今之大酋住牧豐州正直我大同塞其子若姪株連宣大之交河西套敵所覘以為向背者也薊鎮自敵和後羽書稀聞陜以西則弛堠安枕舊矣惟遼左孤懸闗外三面受敵環遼諸部又陽順隂逆而勾引邊民為之鄉導此之可虞猶未若宣大之為急也宣大安則諸鎮安矣善乎漢人之䇿匈奴曰交接得其情則折衝却敵應對入其數則反見輕欺今第令宣大撫臣羈縻有方威信並著譬諸奕手角技然或操或縱務俾悉中機宜時有小小寇掠即明言於朝宣示期約必得其罪人乃止毋私為設購以啓彼輕中國之心其諾延諸衛夙通貢市於薊者及今一申威戒責之革心回面萬一不悛則峻驅而創艾之懲此警彼且以示我之不狃於和也雖然此直為貢市籌耳乃所以握其權而禦之則莫急於内治葢聞宣大之築垣修守已有緒可竟矣第其効非可旦夕睹也漢侯應言繕塞工費久逺至以為累世之功兹欲計一勞永逸宜量地責成勿恡小費勿蘄速效而又卹畨休之卒簡熊飛之士凜然如臨大敵則窺覦無罅宣大可久安也薊鎮已無大警而轉輸徵戍不異往時宜稍加調停節財力為經久計南北兵厚薄懸殊卒乗不睦涇原戍卒之怨言可謂殷監即謂南兵未可遽罷無亦量均其衣廩於北兵以廣挾纊投醪之惠間直耗缺無復募補則土著漸増薊鎮可久安也遼左一軍武悍善戰近併其力與諸軍犄角頗聞奏捷然入衛薊門勞者弗息緩急之勢不相權矣矧其折餉之需視他鎮特菲藉令李牧為将安能驅不飽之士以赴强敵哉誠為之罷免調遣以養其全力而又厚給糧餉使人人樂於從軍則戰氣自倍遼左可久安也陜以西雖帖然無事而居安慮危當不異於諸鎮及是時閒暇選武略守境之臣飭障燧備塞之具厲長㦸勁弩之械皆所以修守待冦而防之於豫者也葢愚嘗歴數載籍雖自古明盛之世未有可盡馴之邊冦無必不渝之和盟惟制和在我則我之威震制和在彼則彼之志驕何休曰王者不治逺人來者不拒去者不追揚子雲曰六經之治貴於未亂兵家之勝貴於未戰此治内不治外之説也使吾之内治誠修邊備誠固敵威畏惕息必且怯於戰而懼失於和邊境可以無事倘遂至不逞自受其曲則吾拒之有詞而當之有餘力戰攻驅除亦惟我所為而無不如意豈以其順逆為輕重哉河套叙夫邊計博而悍鋭之臣亦或有理先帥之緒而思復河套者乎藉令國家都長安借河套之地以為外屏而益斥逺人可復也長安今不得言重矣我以十萬之衆逐敵而果去也勢不得不設八衛衛五千人而後成軍何所取調也若移鎮何鎮可移也勢必錯衛所州邑得二萬民戸以配何户可徙勢必築五六城以犬牙相錯何所取土石材木也敵必争争當以兵數萬衛之何所取餉也河地饒即可屯敵不能無蹂踐乎何以能且耕且戰也敵既失地獨不能合聚諸部而併力我乎諸部即不東獨不能從之而西以取償於京輔乎我竭天下以奉陜而陜不益安乃以京輔委者非筴也故曰海道可暫通而河套卒不可復也海縱不暫通吾不可遽而廢其道河套縱可復吾且緩而待數十年之後河套叙河套特邊防之一然為國家要害所係故復詳之河套周迴三面阻黄河土肥饒可耕桑切近陜西榆林堡東至山西偏頭闗西至寧夏鎮東西幾二千里南至邊牆北至邊河逺者八九百里近者二三百里即周之朔方秦之所取匈奴河南地漢之定襄郡赫連勃勃趙元昊之所據以為國者也唐三受降城在河套北黄河之外元東勝州在受降城之東國初敵遁河外居漠北延綏無事正統以後寖失其險彼始渡河犯邊鎮守都督王禎始築榆林城創縁邊一帶營堡墩臺累増至二十四所嵗調延綏延徳慶陽三衛官軍分戍而河南陜西客兵助之列營積糧以遏冦路景泰初敵犯延慶不敢深入天順初敖拉出掠我邊人以為嚮導因知河套所在不時出没遂為邊境剥膚之害矣防河套議成化二年三月延綏紀功兵部郎中楊琚奏延綏慶陽二境東接偏頭闗西至寧夏花馬池相去二千餘里營堡迂疎兵備稀少以致河套諳達屢為邊患近有百戸朱長年七十餘自幼熟遊河套親與臣言套内地廣田腴亦有鹽池海葭州等民多出墩外種食正統間有寧夏副總兵黄鑑奏欲於偏頭闗東勝闗黄河西岸地名一顆樹起至榆溝速迷都六鎮沙河海子山火石腦兒鹻石海子回回墓紅鹽池百眼井甜水井黄沙溝至寧夏黑山觜馬營等處共立十三城堡七十墩臺東西七百餘里實與偏頭闗寧夏相接惟隔一黄河耳當時議者以為地土平漫難據巳之後總兵官石亨又奏欲将延綏一路營堡移徙直道是欲不免暫勞一時軍民之力實為萬世邊防之長策也按薛應旂曰嘗歴延綏慶陽二境往復於偏頭闗花馬池二千里間凡諸營堡咸為稽考詢之将官故老猶皆記憶楊琚之策且曰曽銑幾於復套其計葢不出此惜乎垂成而殺身也河套地廣袤略河套東至山西偏頭闗地界西至寧夏鎮地界東西二千餘里南自邊牆北至黄河逺者八九百里六七百里近者二三百里惟皇甫川稍近川南焦家坪兩岸夾山氷先合後泮及娘娘灘羊圏子渡口交冬氷堅故敵率其衆或自坪或灘或渡口以入套元史河源附録朱思本曰自洮水與河合又東北流過達旦地凡八百餘里過豐州兩受降城折而東流過達旦地古天徳軍中受降城東受降城凡七百餘里折而正南流過大同路又西南入陜西榆林衛境然河源東北流所歴皆西畨地至蘭州凡四千五百餘里始入中國又東北自寧夏過達旦地凡二千五百餘里始入河東境内也河套處置按河套之地大河外環此天地設險以界華夷之所虞夏輸貢未嘗外焉自是以來凡中國盛時咸有其地我皇祖時亦然嘗設立将士阻河以守葢因天地之險帝王之軌防外虞靖中夏也後委之禆北人巢穴於内因而侵犯我鄙幾無寧嵗矣昔秦取其地募内郡貧民充實其中然政教不聞故卒没入匈奴漢武時復取其地立朔方郡縣募民徙者十萬口及山東大水徙其貧民於中者又七十餘萬口自是隴西北地河西邊冦益少然當其時皆仰給縣官使者分䕶費以億計其後政教未聞亦終没入匈奴今内郡民十室九貧有無産有家之民有無家有身之民豐嵗尚多缺食稍值饑饉則易於為亂故白蓮赤眉之徒一唱輒和者如蟻往嵗流賊横行海内蠢動山西諸郡皆此輩也保釐大臣誠請㫖招募并諸鑛洞壯士悉收蓄之稍加訓練皆精兵也夫然後授以妻室以漸自南而北按周官井田之法給以斯地凡為邑為丘為甸悉如周制但澮洫稍深廣之其廬舍為堡久之食裕倣西戎雕房之式為之可也其始授田給費半載若種黍時授田給以四月之費可也農暇則訓以孝弟忠信之道師律戰陣之法如是三年可使有勇知方十年則岐周之政可復匈奴将喙息遯逃不暇又何侵犯之足虞哉然此特大略而已若夫大綱小紀舉而張之以合時宜不失先王之軌以盡經綸之道則在當路君子云河套事宜天順五年冬套酋敖拉出渡河入套冦延綏河套周迴三面阻黄河土肥饒可耕桑切近陜西榆林堡東至山西偏頭闗西至寧夏鎮東西幾二千里南至邊城北至黄河逺者八九百里近者二三百里即周之朔方秦之取匈奴河南地漢之定襄郡赫連勃勃趙元昊之所據以為國者也唐三受降城在河套北黄河之外元東勝在受降城之東國初敵遁河外居漠北延綏無事正統以後浸失其險敵始渡河來犯近邊鎮守都督王禎始築榆林堡城設法禦之築瞭望墩臺創沿邊一帶營堡累増至二十四所嵗調延安綏徳慶陽三衛官軍分戍而河南陜西客兵助之列營積糧以遏冦路景泰初敵犯延慶不敢深入天順初敖拉出掠我邊人以為鄉導遂知河套所在入居其中以伺機便不時出没遂為邊境剥膚之害矣按自秦蒙恬逐匈奴取河南地漢武帝用主父偃策言河南地肥饒外阻河乃立朔方郡因河為固後赫連勃勃李繼遷皆據此地雄於北方元昊繼之遂稱夏帝據河南之州九皆在今套中宋史稱其地饒五穀尤宜稻麥淑園雜記謂近時闗中大饑流民入其中求活者甚衆踰年纔復業九邊圖亦謂彼時敵少過河軍士得耕牧套内益以樵採圍獵之利地方富庶稱雄鎮焉此數言鑿鑿皆實也葉文莊議乃謂不可駐牧耕種未之究矣况中國守邊皆營屯在内而拒戎敵於其外今河套花馬池一帶則敵反入吾之内而吾寧夏之屯反守其外焉不亦傾乎嗚呼唐張仁愿猶能築三受降城於北以絶敵南冦路而我朝能因河為固以守河南而使敵得入據以游牧以為闗陜無窮之害我朝将有愧前代矣曽總督復河套疏夫逺人之叛服無常而中國之制馭有道要在圖難於易庶幾杜漸防微仰惟皇上聰明聖治法古憲天禮樂文章一新昭代之制文事武備殆曠世所莫及者是宜舞干羽於兩階内治修而逺人服顧兹强敵乃敢梗化往犯山西宣大二三年來入冦榆林内地殘傷逺邇驚懼夫敵冦雖衆不過漢一大縣而猖獗迺爾豈國家之兵力不能支而制禦之者或未得其要歟臣竊計之葢我失其險人得所據根本既固驅除遂難顧其因循日甚一日故制馭上策莫如復套不是之圖而徒周章於防禦之末譬猶揚湯止沸而不知抽薪外患未能已也臣謹按河套古朔方地三代以來悉麗中國詩曰天子命我城彼朔方赫赫南仲玁狁于襄漢武帝遣衛青出塞取河南地為朔方郡築城繕塞因河為固後世稱之曰雄才大略唐初朔方軍以河為境嗣是張仁愿取河南地於河北築三受降城突厥不敢踰山牧馬朔方亦無冦嵗省費億計至宋李繼遷叛走斤澤進陷靈肅河套復為敵有率不能制我太祖髙皇帝順天應人驅逐前元逺遯漠北成祖文皇帝三犂敵庭餘孽奔亡幾千里救死不暇當是時薄海内外皆入版圖豈界河套已乎後以東勝孤逺撤之内守復改榆林為鎮城方初徙時套内無敵土地沃膏草木繁茂禽獸生息當事之臣不以此時據河守乃區區於榆林之築此時敵勢未大猶可委也失此不為𢎞治八年敵帥筏渡河剽掠官軍牧馬十二年擁衆入冦自後常牧套内侵擾中原孝廟有欲復之志而未逮至武廟常欲征之而未能因使敵酋濟農得以據為己有禍根既種竊發無時出套則敵冦宣大三闗京師震恐入套則冦延寧甘固生民塗毒此撥亂之功天将有意於我皇上乎夫河套自三代以迄於今中國所守以界夷夏又我聖祖之所留也一統故疆三邊沃壤其理宜復頃年不守遂使深山大川勢顧在彼而寧夏外險反南備河敵得出没自由東西侵掠徒勞守禦無補緩急葢套敵不除則中國之害日熾浸淫虚耗将來之禍有臣子所不忍言者其勢所宜復也我皇上徳邁三皇功光列聖選将練兵宵旰日切嵗發帑銀以濟邊圉凡所以攘却外患以保安兆民者天心實鑒祐之而當時封疆之臣曽無有為國家深長之思以收復祖宗舊業為生民立命者葢軍旅之興國家之重務圖近利則壞逺謀小有挫失媒蘖其短者繼踵而至鼎鑊刀鋸面背森然其不改心易慮者幾希况復所見不同甲可乙否若待來年便已遷延不振日復一日長冦貽禍臣雖愚昧豈不知兵凶戰危未易舉動但近年以來得之見聞常懷憤激今復親履其地目擊此敵跳梁地方危殆切齒痛心實有寢不安席食不下咽焉者昔葛伯仇餉成湯往征淮蔡一隅之冦耳裴度尚以為不與此賊共戴天陛下徳過成湯而在位之臣文武足備又匪但裴度之比可使套衆猖肆蒼生阽危一至此哉夫蔓草未滋為力尚易猛虎負嵎則有莫之敢攖者其勢則然也故敢冒昧輒具短見上陳睿覽伏乞勅下該部将臣此奏與修築榆林邊牆之奏會集廷臣詳議可否如蒙采納特賜該部修邊復套次第施行葢選将材除戎器備芻糧練兵馬非朝夕可辦所貴及時修舉則臨期無誤武功底成或曰榆林邊牆方議修築今乃輒有復套之議會極歸要顧當何如臣曰築邊之議為四十年之謀也敵在套中生長日盛病根尚在為患無期不防則為無險防之則兵力坐困有餘在賊不足在我譬之作隄壅水一朝潰決則汎濫不支矣若夫復套振武揚威殱彼敵冦驅其餘黨置諸大漠臨河作障天險為池皇靈既昭賊膽應裂狼顧脅息雖數輕肆侵軼譬之大禹治水以海為壑而水歸其所不至横流此社稷之計聖子神孫之所永圖也然河套既復猶兼修邊之工若距榆林以為邊則河套永棄邊患何時而息乎今神聖在上英俊在旁時所當乗機不可昧見可而動相時以成此臣犬馬之忠也謹将復套數事開坐具本伏惟皇上裁擇二曰立綱紀綱者大綱也規模之謂也紀者條理也節目之謂也規模欲其大節目欲其詳紀綱既立則戎事可興也復套之舉國之重務人之謀曰須得兵三十餘萬馬步水陸齊驅並進裹糧二百萬石兼折銀三百萬兩一舉破敵驅之出境即沿河修築城垣界守此一説也臣以為此謀雖善其勢實難今三邊之兵可用者不滿六萬如調他鎮顧此失彼三十萬衆徒爾煩勞其難一也倉庫空乏上下交困銀穀累五百萬一朝畢集勢不易能其難二也一戰勝賊賊未膽落輒興板築師徒易撓其難三也臣則以為憫生民之陷溺而與之除暴疾敵冦之猖獗而因之正名爰整雄師張皇義旅奚煩兵力之多雖在兵精食足以時而春蒐於套秋守於邊如是三年敵勢必折俟其逺遯然後拒河為城分畨哨守則人力不困財用不竭而河套可復既而移撫鎮以制之立行都司并衛所州郡以屬之又設巡守兵備道以理之凡江淮之北各省有犯該邊衛及烟瘴充軍者皆定發於衛所犯皆口外為民者皆定發於州郡将套中之地預為踏撥多立魚鱗籍冊以防日後弊端每軍民一戸給田二頃俾之嵗耕一頃閒一頃是為閒田以養餘力其沿邊軍民亦出召募有願守邊者皆給以田引黄河之水為大小之渠渠以灌田可備旱澇髙黍下稻任土所宜數年之後套地可盡墾而又倣井田之意廣溝洫之制吾民易於稼穡勇於驅馳既臨河設險夏秋決難侵犯我得耕稼矣比及河凍農事已竣乃於講武之時為禦敵之計民不告勞農不告費行之既久則河湟之地不異中州此規模節目之大略也乞勅該部預為料理三年之後舉而措之有未盡者容臣次第陳奏雖然屢年邊事廢弛将士怯懦甲兵未練整頓實難須及時飭治來年春月先将鄰邊冦巢𠞰除以倡我軍之氣俟其膽略漸雄于焉昭盛明無外之度闡皇上救民之仁多給榜文標示牌額遍置套中以開來降之路以歸被虜之民然後興問罪之師舉三年之役則順天以動豫在師中吉矣三曰審機宜天下之事有機時與勢為之也孟軻氏曰雖有智慧不如乗勢雖有鎡基不如待時知機論也得其機而乗之勝算在我何往不濟敵之據有河套也逐水草以往牧獵禽獸以馳騁秋髙馬肥弓矢勁利糾合黨類動數十萬長驅深入彼聚而攻我分而守此敵冦之時勢我不得而與之也及其入套深冬沍寒水草枯凍又皆各就住牧其勢自分且馬無宿藁漸至羸瘠比及春深賊因以弱我則訓練强兵攅槽秣馬營伍整肅火器精利此我之事勢敵不得而與之也今之禦邊者敵弱不乗因仍怠怯敵强莫禦茍且支吾坐失軍機所以有敗而無勝臣願練兵六萬再調山東鎗手二千多備矢石每於春夏之間水陸並進直抵寇巢乗其無備我聚而攻彼分而守材官騶發矢道同的砲火激烈電掣雷轟賊縱有援旬日斯集目前震蕩勢必難支此窺敵觀變潛深㕘伍之術臣亦計之審矣仍乞命下宣大山西總督撫鎮等官調度各鎮兵馬嚴加隄備耀武揚威以防河東往牧之冦倘套賊敗亡必将逾河而逃厲兵秣馬又可以收斬獲之功所謂犄角之勢以全取勝之道也然後班師而歸守我分地秋髙之時敵如復讐而來我軍據險以守况得勝之兵勇氣自倍不待臨牆可使撻伐如是三年敵勢自衰将逺遯之不暇而又敢據我河套也耶至是則祖宗故地已復因河為險修築墩煌一如榆林修守之議且講求屯政建置衛所處分戍卒填實邊民牆塹既固耕獲可饒全陜之轉輸漸省而内帑之給發亦寛三秦重地可保萬萬年安固矣不然賊之强也來不能禦賊之弱也去不能懲機事大失公私俱困臣不知其所終也八曰備長技漢書匈奴之長技三中國之長技五兩軍相為表裏斯為萬全之術今强敵之長技不異於昔時而在我之長技復有如漢時之伍者乎臣不得而知也欲求相為表裏殆又難矣抑求其次莫先於火器葢天之所以保國家而衛生民者也但有之而不能用用之而不盡其利與無技等耳安望其有摧擊之功乎臣昔提督山西三闗嘗造盞口礟毒火飛礟具式奏請伏䝉皇上發銀數千兩以資成功比年禦敵賴焉今秋於寧塞定邊亦嘗藉此兩挫敵兵故來降人口云敵中甚畏此器言每年響子不似今年響子利害打死人馬數多此其明驗也今欲復套須備熟鐵盞口礟六十個長管鐵銃一萬五千把手把小鐵鎗二萬根長鎗二千根生鐵作礟十萬個熖硝十五萬斤硫黄三萬斤砲鐵鉛子大小二十五萬斤弓矢盾架相為表裏庶可鞭撻此方恢復故壤然此特一年之具爾三四年間如飛礟硝黄鉛子之類又須陸續補其缺壞今京造火器種種具備防邊可矣但或宜於此而不宜於彼或可以守而不可以攻大者質重而難於致逺生者日久而多所燬烈留以别用各有所長若曰神機不可外造盔甲神鎗等器原為私藏者例也而盞口礟長短鐵銃律條既無該載而實為籌邊破敵之公器特勅該部不以為例速發帑銀二三萬兩給各該撫鎮官於山西陜西等處買辦置造以為復套之資葢成造而後教演服習而後運用語云工欲善其事必先利其器此之謂也不然敵技精强我軍莫恃萬全之功未可必也復河套議國家慎西北之防以固封守自東勝而西因河為境葢二千餘里自河以南則皆周秦以來朔方故地且其地沃衍有屯牧之利此祖宗之疆理所謂内夏外夷而據險以守者也往以承平弛備敵遂得乗慿要塞出入於吾河套之中百有年來莫有能驅之出境亦罔復有以拓還為意者甚可嘆也皇上喟然嘉與邊臣欲復套之議一代纘承之鴻烈誠在是矣而或者謂黠冦盤據之勢慮不足以逐之夫儲峙之必充器用之既利将卒之選練戰陣之服閑倡其勇敢而相其機宜傳曰兵義而時動動則威以吾之人民復吾之土地其於順逆之勢何如也或慮其逐之可以復至洪河之險與彼共之者非也葢自東勝内移榆林啟鎮而河套昔時豐膏之壤盡舉而棄之論者徒知敵人蕃牧其中其勢為日盛而不知我兵玩愒積懦實有以相成授之安飽以啟吾疆圉之勞饑納之門庭以勤吾扃閾之備禦豈非所謂藉冦兵而齎盜糧者哉今乃曰烽堠之綿長轉餉之懸逖士伍之單弱甲馬之疲羸若将無以守之者愚則曰祖宗守邊之制屯田不可不講也夫河套之地歴代之所列郡而宋史所載五穀咸宜祖宗時沿邊設備皆有屯營故邊防有策應之便今誠復祖宗之法俟河套既復開衛留屯雜籍兵民署建撫總外則乗塞列隧營壘木譙珠聯不絶庀兵飭堠相警防援使敵人不得攻擾内則制畝分川牛具農器種糧有給誘勤督惰息訟寛征使吾軍家有葢藏如是則士有餘糧馬有餘芻以戰則克以守則固黄河如帶可以永為天險之防而宣大固寧無窺竊之警所謂敵可久絶吾可恒守可行之策庶其在兹乎九邊總論聖王之制馭宇内也在中國宜使其逺近聯屬而不使其散在邊鄙宜使其部落隔絶而不使其合此固夷夏之防萬全之策也何也合則聚衆小而為大分則散衆大而為小故合則其勢强分則其勢弱也九邊之逺自遼薊宣大以至甘肅在中國可使其隔絶而不通乎自東北强敵以至西畨在畨冦可使其聯屬而為一乎譬人之一身血脈流通不滯則精神和暢百邪不能為之侵使手足之間或有痿痺而血脈不貫雖若病在一節焉耳久則遂成痼疾而藥亦難効且将漸及腹心矣可不慎哉我聖祖驅逐北人光宅海宇至成祖三犂北庭中國之勢至强盛矣然國初備邊之制最為詳密洪武間即古營州地建大寧都司東接廣寧西連宣府以為外邊自密雲古北口至山海闗以為内邊俱屯重兵以相應援固猿臂之勢也延緩寧夏榆林烟火相望河套之地屯兵要害春夏耕稼秋冬防守至安固也平凉甘肅雄據千里西畨北人形禁勢隔不能為患至完善也如此則中國血脈貫而精神强外夷各部間隔不通雖或為邊患而其勢弱矣惟自永樂間以大寧都司地賜諾延本望其為藩籬之衛而後漸不臣東勝諾延相繼失險故京師遂至單薄遼東宣大遂至隔絶陵寢所在誠不可不為之慮也河套千里在元昊時四十餘郡而套居其半亦饒沃之地也因邊臣失防遂使敵衆乗騎飛渡據為巢窟而長城失其障蔽牆堡迭興徒示弱耳哈密實為甘肅藩屏自吐魯畨攻陷其地奪我金印據我城池屢煩經略未見厎定而戎心日驕邊患愈滋矣凡此數地未嘗不建督閫屯重兵也然大寧河套哈密三險既失敵畨反得以阻隔我矣謂中國之强也得乎今敵酋固已納欵稱臣然西北諸畨反畏其威力而諾延三衛皆結為婚姻謂外國之弱也得乎為今之計莫若乗敵酋臣服東北自居庸古北等處西北自花馬池靈州等處西則自嘉峪闗至齊勤罕都等處相其形勝度其險要凡邊牆墩堡當及時修築務使睥睨繦屬亭障星聯而督閫屯聚大兵雖各有専方要必如常山蛇勢首尾相應或如趙充國列燧屯田得以便宜行事而兵食皆取足於本鎮或如張仁愿築受降城於要地使敵部隔絶不敢連結出没以肆慿陵或乗我兵威燀赫之時運長策出其不意直𢷬長驅使九邊外大有所創不敢陽順陰脅時有窺伺如李牧威匈奴焉可也至於京師西北以宣大為蔽東北以薊州為藩薊州雖宿重兵而練土著為急宣大與敵接壤而又當敵衝可不先事為之備乎噫一方保障萬里長城在得人也自古及今何代無才如牧如充國如仁愿我朝獨鮮其儔焉何哉使擇之慎信之専待之以嵗月不以文法牽制阻撓之當必有胸中數萬甲兵之人在也顧用之何如耳何九邊强悍之足云圖書編卷四十六
