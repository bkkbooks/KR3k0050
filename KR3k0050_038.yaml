body:
  text: 圖書編卷三十八明章潢撰陜西圖敘陜西古雍州地山河四塞形勝甲于天下然平涼固原平涼屬州一𢃄畜牧蕃滋外之屏蔽邉騎漸已侵入鞏鞏昌鳯鳯翔之墟若延延安慶慶陽則原野蕭條兵亦精徑寧夏則跨有賀蘭山黃河之險敵難馳驟故為備差易蓋本朝開拓以來受降故城唐張仁願嘗築三受降城于河外以禦敵久棄不守自移鎮榆林延安鎮河套延安北境是盡為敵有烽火遂達於內郡矣甘甘州涼涼州以西左番西番右達北敵而肅州尤孤故土魯番在肅西北二千餘里輒肆侵犯以為河西憂洮岷西寧則地入西羌西番實與四川同患苦且亦不刺北虜小王子枝將以殘孽竄居西海在西寧西境番人漸以南徙今松藩􅀈臘地方是國家既失荼馬之利每嵗番人獻馬易茶頗資其利而逋寇生齒日繁則西境腹心之禍也若漢中之襟喉巴蜀潼關在西安府東南之保障金陵並稱重地而險者在我矣然所在罄力以供邊奉宗室而平涼尤甚閭閻愁苦又何加焉沿革古雍州地漢都於此置司𨽻校尉領三輔置涼州部刺史察各隴西北地等郡而不嘗所治東漢司𨽻如故涼州治隴唐貞觀中置關內道開元中置京畿等四道採訪處置使而京畿道治京城關內道以京官領隴西道治西平山南西道治漢中後改採訪為觀察其治仍舊宋初置西路後置永興酈延環慶秦鳯涇原熙河六路經略安撫司並以守臣兼領又置提點刑獄司治鳯翔元置陜西等處行中書省于西安置陜西漢中道肅政亷訪司于鳯翔又置甘肅等處行中書省及河西隴北道肅政亷訪于甘州本朝置陜西等處承宣布政使司都指揮使司提刑按察司三司並治于西安而行都司則分治甘州以控制邊境云陜西等處承宣布政使司治西安左右布政使二左右參政六分守二管糧一管册一西寧一涼州一左右參議七分守三商洛一花馬池一領府八屬州一十三縣九十四總為里三千五百九十七户三十六萬三千二十七口三百九十三萬四千一百七十六夏秋二稅共米麥一百九十二萬九千五十七石絲綿三百六斤絹九千二百一十八匹綿花一萬七千二百七十二斤布五十八萬八千九百九十匹京運年例并鹽課銀共四十六萬四千五百二十三兩有零馬草一萬八千八百四十三萬六千七百餘束茶馬司三兆州一河州一西寧一課茶共五萬一千三百八十四斤有零河渠提舉司一在西寧陜西都指揮使司𨽻右軍都督府都指揮三內掌印一僉書二領衛二十有六屬所一百三十四守禦千户所一十有二陜西行都指揮使司在甘肅領衛一十有三屬所五十六守禦千户所四總延綏寧夏甘肅三鎮共馬步官軍舍餘土達一十三萬九百餘員名行太僕寺二陜西一在平涼甘肅一在甘州苑馬寺二監十二平涼六甘州六苑四十八平涼二十四甘肅二十四所屬馬五萬七千七百八十餘匹洮河西寧三衛番茶易馬四千八百餘匹提刑按察使一副使十四凊軍一提學一糧斛一分巡兼兵備撫民一鞏昌一延安一又岷州一肅州一固原一西寧一甘州一金州一僉事八邠涇一分巡鳯翔一屯田一榆林寧夏二蘭州一分道六關西河西關內隴右關南西寧欽差總督陜西三邊都御史一駐固原防秋駐花馬欽差巡撫都御史四陜西一駐西安防秋駐固原延綏一駐榆林寧夏一駐寧夏甘肅一駐甘州巡按監察御史二一駐西安一駐鞏昌王府四秦府高二封西安護衛一郡王十一肅府高十四封甘州徙蘭一千石護衛一郡王七慶府高州六封慶陽改徙寧夏護衛一郡王十三韓府高二十封開原改軍涼二千石護衛一郡王二十四每年夏秋祿米共一十七萬五千九百四石六斗西安府其名漢京兆宋永興元安西煩冗番漢軍馬雜處難治其屬州六縣三十一附郭長安五十五里煩沖咸寧八十一里煩沖外咸陽十二里地沖事簡興平十七里沖簡臨潼五十二里煩沖訟益高陵十四里淳簡鄠二十三里僻簡藍田二十九里僻頗刁頑涇陽五十里刁僻盩厔四十四里僻煩頗饒頑三原三十三里沖煩頗饒商州二十八里簡僻盜屬鎮安公里近山僻簡多礦賊洛南十里僻刁山陽四十一里近山簡僻商南三十五里近山僻淳新安十里同州三十九里僻煩刁疲屬朝邑八十二里刁僻煩邰陽七十里簡刁訟澄城六十四里僻簡煩白水二十八里僻簡盜韓城五十里華州四十九里沖簡刁華州四十一里沖煩華隂三十四里沖煩貧渭南八十六里沖煩饒蒲城六十七里僻煩耀州十八里簡沖疲屬同官二十二里煩凋弊富平四十四里僻簡訟乾州二十七里沖煩貧屬醴泉二十一里沖煩武功十六里沖簡淳永壽十里沖煩疲邠州二十七里沖煩刁賦重屬淳化十二里僻簡三水十一里僻簡其形勝四塞之國披山𢃄河關中金城千里其俗男耕女桑尚氣概勇力鳯翔府其名漢扶風西魏岐陽路沖事簡地饒民質其屬州一縣七附郭鳯翔四十里煩刁訟外岐山二十九里煩疲刁訟寶雞四十四里刁沖簡扶風三十二里沖煩刁郿十八里僻簡淳麟遊十七里近山僻簡隴州二十六里近山僻煩屬汧陽十三里近山僻簡其形勝地形險阻犬牙長蛇五水之會三秦之一其俗勤穯務本質直儒雅漢中府其名後周漢川唐興元地廣頗饒亦易治其屬州二縣十四附郭南鄭二十里沖疲外褒城七里沖煩城固三十三里僻冗洋三十里僻冗刁西鄉十五里近山僻煩鳯九里近山沖煩沔五里近山沖寧羌州四里近山沖好訟屬略陽四里近山僻淳金州四里近山僻煩頗饒屬平利八里近山淳簡洵陽十七里僻淳有盜漢陰七里裁僻有盜石泉八里裁簡淳盜白河八里僻裁刁紫陽五里近山僻其形勝東有南郡西有隂平南有廣漢北有四川其俗徑悍朴厚踏石解繳平涼府其名漢安定宋涇原簡沖其屬州二縣八附郭平涼二十三里沖煩外宗信五里僻簡華亭八里近山僻簡鎮原二十三里刀煩僻涇州二十七里煩沖屬靈臺二十里近山僻煩靜寧十一里近邊沖屬莊浪七里近邊僻隆德五里近邊沖固原州九里近邊沖煩其形勝山川秀拔中華襟𢃄其俗民淳近古文王之化鞏昌府其名秦隴西漢天水東漢漢陽其屬州三縣十四附郭為隴西三十一里沖煩外安定十九里近邊沖煩會寧十二里近邊冗通渭十八里近邊僻簡漳六里僻簡寧遠十七里沖簡伏羌十二里僻簡成六里簡西河七里簡僻秦州四十九里刁煩沖屬秦安十里僻簡清水八里沖煩禮十九里簡僻階州二十一里近西番僻屬文三里近西番僻簡徽州六里僻簡屬兩當八里僻簡其形勝接壤羌戎通道隴蜀其俗獵野務農質朴徑勇臨洮府其名秦隴西宋武始隋金城簡其屬州二縣三附郭狄道二十五里沖煩外渭源四里近邊沖簡蘭州七里沖煩屬金十里近邊僻簡河州四十里近西番刁沖煩其形勝境接巴嶲地控邊陲其俗徑悍質朴好勇喜獵慶陽府其名秦北地隋𢎞化唐安化宋環慶簡其屬州一縣四附郭安化三十二里煩沖合水十八里簡僻環四里近邊煩沖寧州四十八里煩沖真寧二十一里簡僻其形勝關輔保障地接羌中其俗稼穯務本民淳士慤延安府其名秦上郡元魏金明簡其屬州三縣十六附郭虜施二十七里沖煩外安塞二十里簡僻甘泉二十三里沖煩安定九里簡僻保安八里僻宜川二十三里沖簡延川九里沖煩延長十里沖煩鄜州五十一里刁沖煩屬洛川六十四里沖簡中部二十四里裁沖煩宜君三十八里沖煩綏德州十里煩屬清澗十里沖煩米脂十三里僻葭州八里極邊簡屬吳堡三里極邊神大五里簡邊府谷四里簡極邊其形勝五路襟喉長城因河為塞洛水之交三水所會其俗勤穯尚鬼寧夏衛其名漢朔方後周懷遠其衛四寧夏寧夏前寧夏左寧夏右屯四里其形勝黃河東繞賀蘭西聳其俗信鬼尚詛洮州衛軍民指揮使司三里其形勝西控番戎東蔽湟隴其俗好弓馬衣褐食乳射獵為生人性勇悍岷州衛軍民指揮使司十七里本古西羌其名唐和政宋西和其形勝東連熙鞏西並洮疊其俗徑悍質木弓馬佃獵河州衛軍民指揮使司其地古西羌其名抱罕唐安鄉其形勝東洮河西積石南雪嶺北黃河其俗番漢雜居射獵為生靖敵衛其名會寧其形勝面山背河地勢險阻其俗習武尚攻殺陜西行都指揮使司其名張掖武威酒泉西平俱漢其屬衛十二附郭甘州左甘州右甘州前甘州外肅州山丹永昌涼州鎮番莊浪西寧守禦千户所二鎮夷古浪其形勝環祁連合黎之山浸居延鮮卑之水萬山回抱三峽重圍其俗質朴慷慨採獵陜西承宣布政使司領府八曰西安王畿地內史雍州佑國永平軍晉昌奉化路京兆永興安西煩曰鳯翔扶風秦安岐州岐陽郡西京天興軍煩曰平涼安定涇原路簡沖曰慶陽北豳地朔州慶州𢎞化安化安定軍環慶路慶原路花馬池鹽生自水中不用煎簡曰延安安郡金明延安郡延州忠義彰武軍簡曰鞏昌隴西天水漢陽渭州曰臨洮隴西武始金城武勝軍鎮洮軍簡曰漢中梁州漢州郡興元褒州煩處置陜西內綜八郡外控三邊吏兹土者牧且蒹帥焉責誠艱矣西鳯漢中稍稱饒庶百需給仰供應頗難延慶平涼臨鞏逼近邊陲敵一入無論資産鋒鏑死傷之患獨先嘗焉三邊視諸郡尤衝而勢不相貫故甘肅星懸於河外寧夏株保於橫城榆林一望敵幕千里餽糧獨其人輕生敢戰相恃無恐頻年更番入衛耗亡半矣墮城殞將蓋有由然又其甚者固原為開府調度之中重兵屯戍自敗績之後懸賞選募至今鋭士尚不滿千若敵襲舊直驅踐汧隴薄涇邠窺三輔特再晝夜力耳鳯沔之墟夙多回種而無良亡命者又多逃匿其中立俟風塵鼓煽而起腹心之患其將大乎是故有牧帥之責所當觀釁而預圖也關險地利關中雖稱四塞然南山東西通接商洛汝鄧漢鳯襄沔山深谷密綿邈遼曠縈紆盤互無慮數千里內多巖洞窟穴盜賊往往逋逃其中潛通聲問弗啻萌孽故易稱豶豕牿牛渙丘解拇其稱名取類宏遠矣塞北江南陜西饒沃盛水草可耕可牧故名陸海又云塞北江南又云百二山河蓋南北兩山脈會至龍氣極盛故冬不甚寒其堰埧渠陂耕溉相濟有歌曰舉鍤為雲決渠成雨注水一石其泥數斗且溉且糞長我禾黍惜其舍西安每地多遺利耳全陜邊防榆林蔽延安花馬池蔽慶陽固原蔽平涼西寧蔽河洮莊浪蔽臨洮岷文蔽鞏昌靖敵蔽會寧沙州蔽甘肅靈韋寧夏之接葭綏榆林之接蘭州河洮之接古浪涼州之接環縣以援固原鎮番以援寧夏山丹以援肅州碾伯以援西寧此全雍邊防之大略也關中風土入關分守關西埋在涇滸涇雖荒落陋瘠然所過西安所部平涼鳯翔則皆古賢聖豪傑誕育經營之地固平生之所寤寐快覩者遇行部必迂途往觀用以激昂砥礪試為諸君誦焉方自靈寶出函谷望潼關見黃河迢迢從西來切抱關麓而大華三峯高矗東南歷歷如畫乃賈生所謂踐華為城因河為固者今猶宛然真稱天地之險使秦漢唐隋稍能布張政教用維其人豈有敗與亡哉自關行六十里至華隂縣縣正直大華西嶽廟在縣中宏壯不可言又六十里至華州遙睇驪山諸阜信若培塿兒孫然又五十里至渭南渭源出鞏昌之鳥鼠同穴山迤邐而東行可千餘里合汧湋鎬戲漆沮滻灞灃潏涇汭諸水西至于華入河而斯邑適在其南又八十里至臨潼所謂華清繡嶺僅存其名茫茫惟土至驪山亦不甚高惟溫泉如昨然當年繁華侈盛俱隨浮雲流水散矣為題古今殷鑒四大字於驪阜而去自是西行則新豐鴻門灞橋皆在所歷過橋不三十里入長安履任經長樂里登西南城望終南諸山高入雲表張屏列障儼如罨畫橫𢃄會城周際而山之下周方數百里多秦漢故渠膏塍沃壤古所稱天府陸海殆謂斯域外此則昔所習稱未央長樂諸宫上林樂遊諸苑與昆明曲江棘門細柳雲陽豐鎬杜陵韋曲樊川御宿歷歷皆在目睫指顧之前乃憶唐人所云宫中下見南山盡者真實語也四月念日出長樂赴涇原路當西出咸陽為欲至終南遊所謂祖菴樓觀者乃東出長安門望鄠縣行可七十里鄠古崇侯虎國也後文王奉天伐之作豐邑路皆廣原平陸中有渠通長安渠上垂楊夾峙參天合抱長亦五六十里不斷人行樹底殆不知有夏出鄠縣里許為渼陂上為紫閣峯峯下陂水澄湛環抱山麓方廣可數里中有芙蕖鳬雁之勝杜子美所云半陂以南純浸山者也恨不得岑參王維少陵其人載酒從之遊又四十里至祖菴元王重陽道場也右石刻遺像與其手書書亦飛動竒譎又一十里至樓觀觀蓋老子與關令尹喜傳道處也上有説經臺臺在終南山腰松阡石徑迤邐而上最上有洞可容數十百人非惟西北所無殆非人境又二十里至盩厔形勝膏沃與鄠埒而長楊五柞舊宫皆在其境又七十里至武功武功古邰國后稷舊封禹貢所載惇物若秦嶺藍關於子午谷諸勝皆在東南睇望中又數里輿人遙指馬嵬坡會日欲暮不能往然問俗所傳土皆成粉非實事憶哲婦傾城之詠為歎息久之又七十里至乾州乾於唐稱奉天從此地漸高寒有邊鄙意出乾西北數里經乾陵則天葬處也所遺石翁仲人物雜卧土石草樹間甚巨且衆則當其盛時雄麗可想然行道之人語及盜掘亦多詢而羞之真稱遺臭豈若昭陵杯土漫然九嵕山下之有耿光耶從此過永壽縣至邠州邠本稱豳玄宗開元間因恤岐周府兵幸其地以豳近幽字改今名稱至今入其境則陶穴纍纍如見公劉時人而所云凌隂室履迹坪與其隘巷種種故在北望甘泉林光諸故址炯焉未滅而甘泉則黃帝祭天雍時萬靈明廷處也西行百八十里至涇州涇以涇得名水切城麓詩大雅所謂密人不恭侵阮徂共者皆其境內共即土人所稱共池是也回中山在其城北一里許其下為涇河汭水從西來屬涇城東南流數百里東至於華隂合渭而汭之源則出隴州城北弦蒲藪詩言汭鞠之即是也蓋關中山最多而水亦無慮數十其最大者為黃河次則涇若渭其旁諸水數十則皆隨在入涇渭從涇西行百四十里至平涼平涼於春秋為朝那漢析置安定郡故又稱安定渾瑊會盟壇在其城西北五里今惟名存西行可三十里至崆洞山問道宫在焉志稱黃帝問道廣成子於斯山而山高際天峯巒聳拔信是仙靈之宅又西七十里而羡過蕭關漢文帝時囚奴入蕭關燒回中宫即此處然宫址莽不可辨矣又八十里至固原原即詩所云薄伐玁狁至於大原者本是侯服然地近北邊風氣高洌八月中雨雪者再秦文王者為誼楚於朝那湫者在焉然有二一在州東二十里一在州西三十里水各方數十里深不可測傳有蛟龍藏其中人莫之敢狎然歷世滋邈忘其本名土人但稱東西海子云而西海子水流百數十里經隆德靜寧兩界即好水川也宋與夏人大戰場在焉東望環慶延安境相銜接追憶韓范經營殫勞心力然卒罔底續豈自古豪傑功業之成亦藉天幸與國運耶乃若平涼東北百六十里則為鎮原縣漢潛夫王符之鄉也符才足用世而限於衰季嬖幸塞塗弗克行其志今讀其書甚可痛金泰定間州守和某嘗作思潛亭於其書臺舊址然久廢而土人莫之知余為立石其處章表之此皆平涼東西北境也率以防秋之役行視焉又夏日出按鳯翔則由涇東南行百餘里至靈臺靈臺之名雖古然非詩所歌詠特以文王為西伯征密雖嘗過其境後人神明其地築臺以識遂名至今而古左丘明晉皇甫謐隋牛𢎞唐牛僧儒實生其壤今其詞墓宅野巍然而存又東南百里至麟遊縣縣南五里九宫故址在焉祇存歐陽詢書記一石而字多剝落不可讀所謂十二層樓閬苑西者惟翠巘丹梯尚無恙爾然古木丫槎半無枝葉欹斜偃側巖壑無光矣又南八十里至鳯翔鳯翔秦故都也秦雖起西戎有非子者為周孝王主馬於汧渭之間馬大蕃息封為附庸邑之秦使續嬴氏之祀故今城中有穆公與三良墓余行過之則嗤彼穆之謬而重興黃鳥之哀焉登城以望見岐及梁山奠其東北岍與吳山亘其西南襟𢃄環合居然一大都會雖其雄偉廣博差謝長安而聲名禮樂殆踰他郡又城東門外有東湖即大旱不涸花木水竹之勝舟楫壺觴之適無讓江鄉而凌虛臺喜雨亭址在其北陬今則復為荒煙野草如蘇長公之臺記語矣從鳯翔西行七十里為汧陽汧於漢屬隃麋縣耿況嘗封于其邑又有唐人段大尉秀實祠汧蓋其鄉也又西七十里為隴州而吳山在其東南七十里號西鎮然在周職方則稱嶽李義山所稱吳嶽曉光連翠巘者是也巖石聳峭林木秀阻九峯離立如筍拔地而舊志第稱為五峯余為數之十有九數已刻其説於巖壁豈帝命巨靈雕刻鑿削特示工巧其勝乃若耶又東南百餘里為寶雞大散關在其西南數十里路通褒斜宋與金人百戰爭得之而石鼓山在縣南二十里陳倉山距縣東南百十餘里志載山上有石類山雞晨鳴山頭則聲聞數十里而縣因以名縣南十五里有曰益門山者所從入蜀道也棧閣蓋實自兹始縣東南八十里為磻溪溪流注謂旁有石室傳為太公所為避紂地東坡為鳯翔僉書判官時夜遊焉詩言夜入磻溪如入硤照人炬火落驚猿蓋實録也而穆公女弄玉鳯女臺元貞人丘處機清鳯臺皆在縣東南六十里外至張三丰菴則在縣東三里焉志稱三丰洪武癸酉秋七月念日自言當逝留頌以别邑人楊軌山等為置棺斂比葬發視之三丰復生後入蜀見蜀王又入武當山或遊襄鄧間永樂中嘗遣使尋訪竟不遇為宫以待之余他日遊武當親見成祖所為招三丰手書當不妄云寶雞東南行數十里為岐山縣縣西八十五里為岐山中有周公太公召公三廟巍然並峙而岐山之南數里而近則為郿大白山峙其東所謂和尚原五丈原斜谷關者則分峙其西誦出師未捷身先死之句為之淚下若東南五十里則有橫渠先生祠其北二十里為郿塢漢董卓所為貯金積穀徼覬富貴無窮者夫張祠董塢地相距甚邇而使人貴賤愛惡至與天地隔若此然則吾人百年易盡之身其惡可不遹修厥德也歟又東為扶風漢畿輔地其人則馬援傅毅馬融諸子望於其鄉又東則醴泉咸陽雖非余所守然往來會城必道焉咸陽故阿房宫址褰帷四顧但見蒼蒼雲木離離禾黍淲淲泉流彌漫近遠爾又北行以望周文武諸陵若漢高長陵祇遺數大阜近道側其餘環陵者以百數纍纍錯落率如屋如鐘如釡如囷如廪如罘不知其為后歟王歟將歟相歟公歟侯歟祇增嘆息彼貪且懵者可以悟而省矣遠道垂囊無可持贈贈君斯紀奉供卧遊若夫飄泊離索之懷世故戎情之賾與風謡習俗嗜向之異齊欲一一而記之則須伐南山之竹矣關中之險關中之險華山與長河會處雖在潼關然河之南須得河南府新安此函谷河之北須得山西平陽府平陽南有東烏嶺北有泠泉關蓋河之南無新安則由沙澗可渡河至蒲州河之北無平陽則由烏嶺泠泉入平陽至蒲州自蒲州至龍門兩岸平廣可渡者百里故在古人秦有函關陜西統平陽也至今陜州以西及平陽與陜西人之語音風俗相同論關中之險者當詳於是封疆兵力雍州之地土厚水深漢唐建都皆以四塞為固者也在漢雍之郡十有六縣二百三十有一户至一百十萬餘初置南北軍于京師材官於郡國武帝增期門羽林屬南軍八校屬北軍又發謫吏謫民七科開河西發三輔免刑惡少屯遼東發官徒弛刑戍金城其制之為兵者殆居民之半也唐則為府者一為州者十有三為縣一百七十有三為户九十餘萬高祖初舉關中之衆為十二軍太宗更之為府兵總曰折衝府而在關內者當天下之半嗣是又有千騎萬騎之立射生供奉左右神策之名逮李郭成功則實藉朔方兵力矣謂二代國勢之強非於地力有資哉我國家盡二代故疆創建藩省而南益漢中東連商洛又蒹前代所未備者有之矣是宜兵力民財超二代而軼之也然頃嵗敵人匪茹徂伺塞下每一竊入諸將輒閉壁坐觀一矢莫敢發詰之則曰兵寡不敵也入衛之士每懼不盈列障乘墉悉資內地之力焉議者屢欲日募以充之而鎧甲之所資芻糧之所給慮其費之無從也竟莫克舉焉夫兵不可寡也寡而精焉非寡矣兵貴多也多而不精也焉用彼哉練土著夫窮邊之地千里蕭條逐水草為鄰伍以戰鬭為嬉遊自非生於其地者罕能寧其居也矧塞下之民勇悍純實出於天性愚以為莫若於沿邊要地聨其土著家自為兵有警則藉之以驅除而給以客兵之食凡奪敵所有悉以給之而不計也無事則還之於閭井而不必𨽻名於軍中凡幕府之役毋或及之而不渝也夫親戚資産既其所繫念而比閭族黨自可以同心較之徵調費省而功倍矣議守關虎牢關潼關誠為險要能以寡遏衆然貼鄰大河若踰河避險而出則關無恃於險矣故虎牢不守孟縣潼關不守蒲州烏乎用其險議防禦花馬池極要地成化前敵患在河西敵據套而河東為敵衝花馬池居其中都御史徐廷璋楊一請王瓊新舊城效力甚宜花馬池西至興武營一百二十里又西至橫城堡一百四十里一漫沙漠寇路拆牆頗易入靈韋掠環慶犯平固則凊水營鐵柱泉小鹽池一𢃄為捷徑又自大廣武而下渡河至靈韋亦易議選撫臣陜稱內綜八郡外控三邊每嵗當秋防督臣提兵出塞上則撫臣移節固鎮待之敵如入犯我疆場憑凌我邊鄙羽檄交馳兵干謀動於是居中馭外而擊左左應擊右右應千里轉餉兵無枵腹則有用兵之難其若今受我盟約就我羈縻往來華夷雜遝獨為審機觀變而剛不速釁柔不啓侮坐籌帷幄銷禍未萌則有納欵之難邊事固耳八郡之勢星羅棋布東南為晉魏楚蜀之交西界諸番北接沙漠延袤萬有餘里其間風土異宜民生異俗欲胥擾而治之為難而又有銀兵鹽販茶賈回夷乘以姦宄時肆跳蕩上之人亦未易制禦格化之術其尤難者秦地廣而賦薄邊儲宗祿恆不給則盡括鹺課賈稅贖鍰之類以充之帑藏匱乏鮮終嵗之計設或事出不虞將不知何以措其手足然則所稱控三邊而綜八郡當斯任者顧不重且艱哉陜西事宜地有中外人心之從違無中外也順則從逆則違也時有古今地利之興廢無古今也勤則興惰則廢也是故善撫人者順其情以利導之則欲之所在華之人爭趨之矣而夷之人獨不思自遂其欲耶善治地者率其人以勤殖之則人力所至地利已興於古之人矣今之人獨不能興乎地之利焉未之有也關陜如平涼洮河以及甘肅幅􅊷數千里一望荒蕪人物凋耗較成周隆盛其興衰霄壤未可並論西漢置涼州部刺史察隴西北等郡東漢司𨽻如故唐置關內道以京官領隴西皆視為重地故漢唐盛時人材之多財貨之富甲於各郡有由然也況趙充國屯田金城湟中東至浩亹而羌人讋服非今之甘肅西寧間地乎張萬嵗監牧汧渭雲錦成羣縑易一馬比屋豐盈非今之平涼洮鞏間地乎夫充國屯田之地具在也屯獨勝於漢而廢於今豈今之地不可耕且種耶萬嵗監牧之地具在也馬獨盛於唐而耗於今豈今之地不可牧且畜耶特無充國萬嵗之人焉耳或曰今甘肅已有鎮巡之設矣涼鞏已有苑馬之設矣而各衛所屯田之不廣各寺監馬畜之不蕃豈有他哉患在軍民丁户不如古之多也曰我國家二百餘年休養不為不久雖間有邊疆侵掠之患此亦周秦漢唐所不免者特在據形勝豫兵糧以制禦之耳然屯田監牧之不盛則委之丁户不多而丁户之不多將誰諉也聞涼鞏山谷多羌人竄伏其中雖有服屬官司者要非馴擾之良也此豈終梗王化者哉又聞番夷雜居塞外今求革面尚不可得茍懷柔有道視羌人即吾人也則番夷有人心者孰不革心而畏威畏德哉要在得人而已矣今甘肅鎮巡以禦備為重務苑馬寺監以點視為常規求其留神民瘼也難矣莫若以固原邊事責之總督而朝堂之上遴選憂國奉公不循流俗之士且曽任監司郡縣素以循良稱者擢為撫臣于以巡撫涼鞏各郡不兼以他務不拘以文法不限以時日專以撫綏之事委任責成焉一切假之便宜加意賑恤慰安流徒招徠羌夷視土壤之沃腴則廣屯種而屯田之軍丁即吾民也視水草之茂密則廣牧畜而牧畜之户丁即吾民也且請內帑備牛種鑄農器或本地之貧户或遠方之願耕與夫羌番之來歸者量其衆寡結之凡開荒之田不責其償而耕熟之畝給為永業吾知上之仁愛斯民一念如保赤子而下之人獨無父母孔邇之懷也耶惟任是責者必如古人舍茇甘棠身巡阡陌孜孜焉勞心撫字雖鞠躬盡瘁亦所不辭如此而十餘年間户口不蕃田畜不富吾弗之信矣陜西總論夫秦關中四塞之國也方嬴吕時藉以舉塞戎距羌笮鏖六國而殱之有餘力焉今軍國百需仰給東南而關陜之利厪厪自給傾天下之資市羸馬以厭夷心而雲錦騰襄之驥在關中者置不以齒延綏以南捐數千里沃饒之地以資敵而邊夷噤莫敢言此其故余莫之究詰矣蓋漢武拓地置張掖酒泉郡急則守帥士卒給餱糧以從故邊郡數有功令兵民分統封疆之臣惟程書錢穀是給四方有敗問主帥已耳主帥檄諸嶽伯則芻糧器械莫之應也夫亦禁防煩密積輕重之勢哉浙江圖敘浙江古揚州地崇山巨浸所在限隔然嘉嘉興湖湖州與江淮相表裏嚴嚴州衢衢州以徽直𨽻徽州饒江西饒州府為浮郭左信都冮西廣信府右閩關在福建北境大海東蟠繞出淮淮安揚揚州之境斯固四通八達之區也安吉長興安吉州長興縣俱湖州府屬以西本山越巢窟界在廣德南直𨽻州之間上無兼轄之司訟訐繁興頗號難治嘉湖寧寧波紹紹興四郡則震澤今太湖是東海之所經也淜衝淤壅大遺三農之害而鹽徒嘉湖易通舟楫故私鹽尤多之患次之處州之民多依山盜礦動至數千持之則激緩復馳縱慶元處州屬縣松溪福建屬縣與處州接界一𢃄嵗被侵暴溫溫州台台州並海而南一宿再宿達于福寧福建屬州估客良便之然不能不防他寇也若倭夷奉珍入貢則風帆直指寧波突至倐來黠詐叵測先事而備其在定海寧波屬縣即夷舟所從入乎沿革古揚州地漢會稽郡兼統二浙𨽻揚州部刺史唐貞觀中𨽻江南道開元中增置江東道採訪處置使而兩浙諸州並𨽻焉宋初以兩浙為一路後分浙東西為兩路而浙西安撫使治臨安浙東安撫使治紹興並以守臣兼領元置江浙等處行中書省及江南浙西道肅政亷訪司于杭州又置浙東海右道肅政亷訪司于婺州又置浙東道宣慰司于慶元本朝置浙江等處承宣布政使司都指揮使司提刑按察司皆治于杭州府云浙江等處承宣布政使司治杭州左右布政使二左右參政五管糧一杭嘉湖一金衢嚴一左右參議二寧紹台一溫處一領府十一州一縣七十五總為里一萬八百九十九户一百二十四萬二千一百三十五口四百五十二萬五千四百七十一夏秋二稅共米麥二百五十一萬二百九十九石絲綿共二百七十萬四千二百七十兩絹九萬八千匹有零鈔五萬一千二百九十三錠馬草八十七萬四千四百九十一包浙江都指揮使司𨽻左軍都督府都指揮三內掌印一僉書二領衛一十六屬所一百二守禦千户所三十五本都司所屬馬步官軍三萬九千九百餘員名浙江按察司按察使一副使八僉事七分道五杭嚴嘉湖寧紹台溫處金衢欽差提督軍務兼巡撫都御史一巡按御史一或清軍一俱駐杭州巡鹽御史一都轉運鹽使司一在杭州領鹽課司二十六杭州二松江二溫台八嘉興五寧紹二嵗辦鹽四十四萬四千七百六十九引市船提舉司一駐寧波杭州府其名錢唐武林餘杭煩沖劇其屬縣九附郭錢塘一百六十一里沖煩劇仁和三百七十三里沖煩劇外海寧四百八十里煩沖富陽七十五里淳頑餘杭七十三里簡僻臨安四十六里於潛十二里僻淳頑新城十四里昌化十里簡僻其形勝左浙江右具區北大海南天目其俗水行山處船為車楫為馬尚侈靡習工巧嘉興府其名古檇李宋嘉禾淳頑相半煩沖其屬縣七附郭嘉興三百八十五里地卑水多煩沖外秀水二百三十一里煩沖嘉善二百四里煩刁海鹽一百十六里沿海僻刁崇德三百十一里淳煩沖平湖一百二十一里刁冗桐鄉一百七十八里頗淳沖煩其形勝負海控江襟溪𢃄湖海濵廣斥鹽田相望全吳腴壤澤國佳政其俗慕儒勤農風淳民富素蓄魚鹽之利湖州府其名吳吳興霅東北湖陂西南多山淳頑相半沖煩其屬州一縣六附郭烏程一百六十七里淳頑相半刁沖歸安三百九里刁沖長興二百六十七里山多水廣刁煩安吉州九十三里煩刁屬孝豐三十五里阻山刁德清二百五十七里多湖陂煩武康六十三里山僻刁其形勝山水清遠五湖之表南國之奧其俗江左而後清流美士餘風相續嚴州府其名嚴陵取子陵名吳新都唐新定山多田少淳頑相半沖其屬縣六附郭建德八十六里沖煩外淳安八十一里桐廬五十三里山多田少刁簡遂安五十八里地瘠民頑簡壽昌二十九里刁簡分水十八里山多田少刀其形勝當甌歙數道之衝錦峯繡嶺山環水縈宏偉險巘據浙上遊其俗輯睦和厚士多文學金華府其名吳東陽梁金華宋寶婺山多田少狡詐好訟煩沖其屬縣八附郭金華二百五里淳頑煩沖外蘭溪二百四十五里健訟沖煩劇東陽二百二里山多田少頑簡義烏一百四十五里山多田少冗煩沖永康一百二十三里刁冗武義九十三里瘠刁冗浦江一百三里土薄民野煩湯溪八十五里山多田瘠刁其形勝三洞兩溪名山之勝金華為最其俗醇厚尚禮耕織士知所學衢州府其名春秋姑蔑唐三衢山多田瘠民猾刁地濕熱煩沖其屬縣五附郭西安一百六十五里淳猾半冗沖外龍遊一百九十三里田少冗沖常山一百六里山多田少淳頑半煩沖江山一百二十七里山多田少頑煩開化一百六十里其形勝姑蔑之墟大末之壤其山邃以麗其水清以駚得山水之勝東南孔道浙之上遊其俗君子耿耿好氣敏事處州府其名古括蒼因山唐縉雲山多間有礦田少有嵐氣民悍煩沖其屬縣十附郭麗水一百八十里好訟刁沖外青田一百六十六里煩沖縉雲一百八里煩沖松陽一百六里煩沖遂昌七十五里煩沖僻龍泉一百六十六里山多微嵐刁僻富多頗煩慶元五十九里山多微嵐刁僻雲和五十九里山多微嵐刁僻宣平六十里無嵐刁簡偏景寧六十六里山多無瘴淳簡僻其形勝湍流險阻羣峯倚天其俗尚禮勤耕習儒稀訟紹興府其名東漢會稽劉宋東陽負山濵海好訟刁煩其屬縣八附郭山隂二百十五里淳頑相半沖會稽一百三十一里淳頑相半多訟煩沖外蕭山一百四十二里刁煩沖諸暨一百七十五里僻刁煩餘姚二百一里好學沖上虞一百八十四里刁詐冗煩嵊九十九里好訟新昌三十二里簡其形勝千巖競秀萬壑爭流襟海𢃄江東南都會其俗舟楫為車馬民性敏慧寧波府其名甬東唐四明宋慶元刁頑煩其屬縣五附郭鄞四百五十一里刁沖外慈溪二百八里刁訟煩奉化一百四十九里濕刁定海九十六里象山三十二里濵海務農少學其形勝東南要道水陸平通抱負滄海枕山臂江其俗尚淳龎詩書之鄉衣冠文物之盛台州府其名梁城陳章安唐天台其屬縣六附郭臨海一百七十三里饒外黃巖八十六里饒天台三十八里山瘠淳簡仙居八十八里山瘠淳刁半寧海一百六里饒淳頑半大平四十六里饒刁健訟其形勝山海環麗川澤沃衍雙闕雲竦瓊臺中天其俗朴靜儉約閭閻興禮溫州府其名漢東甌晉永嘉唐東嘉淳頑相半僻煩其屬縣五附郭永嘉二百八十四里煩外樂清一百七十里囂好訟刁僻平陽二百四十里淳僻瑞安一百三十八里淳僻秦順十八里僻簡其形勝城當斗口巨海重山其俗勤紡績尚歌舞習尚競渡鄉會以齒浙江承宣布政使司領府十一曰杭州錢唐武林餘杭武勝軍吳越國古杭卑濕差重嘉湖尤甚煩沖劇曰嘉興長水檇李嘉禾郡淳頑相半煩沖曰湖州吳興郡震州平陳郡東北湖陂西南多山淳頑相半煩沖曰嚴州巖陵新都新定遂安軍山多田少淳頑相半沖簡曰金華東陽郡婺州寶婺武勝軍山多田少刁訟煩沖曰衢州姑蔑三衢信安郡山多田瘠猾刁濕沖煩曰處州括州括蒼縉雲郡處州路山多有礦田有嵐氣民悍煩沖曰紹興會稽東陽吳州越州義勝軍訟煩曰寧波鄞州餘姚郡望海軍甬東四明慶元路通日本國刁頑煩曰台州回浦赤城章安臨海郡德化軍天台山瘠淳刁相半曰溫州東甌永嘉東嘉靖安軍靖海應道軍濵江民淳頑相半僻煩處置兩浙當天下財賦之半頃嵗倭夷陸梁東則寧紹台溫西則杭嘉湖諸郡橫被蹂躪以故增兵置帥加賦給餉視昔數倍近方稍寧議者即欲罷兵輟餉海上卒然有警不知何以應之況定海係倭夷入貢之道尤為兩浙門户懷安攘之遠圖者奚容以一日忘備哉至於杭嘉湖地饒多利俗尚紛華賦役不均逋負日多救弊補偏誠為急務處州依山盜礦黨與本衆且與衢嚴徽州之寇聨蹤嘯聚時肆剽掠義烏民俗獷悍竄名兵籍敗無所歸恐生他釁先事預籌尤不可不加之意海壖水國夫浙海壖水國也浙水出三天子都而委錢唐苕水出天目而委震澤嚴陵為桐寶婺姑蔑為濲會稽若耶檇李四明赤城並海東甌括蒼山溪映𢃄與郡邑錯壤如繡蓋其民明秀而雅化則水國之恆也邊海墾田之利寧波之金塘山大榭山台溫之玉環山皆島沃區也諸山去海岸較之舟山尚近橫亘袤延大約計百十餘里廢棄嵗久置之榛蕪不可取而田乎紹興餘姚諸湖皆內地腴壤也環列海濵與臨山龍山相為聨護大者三四十里小者一二十里漸次淤積多成田蕩不可墾而耕乎此皆開屯之助也或者又以金塘大榭舊有明禁未敢輕墾此乃國初一時預防之謀耳今若建議奏請召民就佃即籍為兵立重鎮以統之寇去且守且耕寇來且耕且守是即東浙鎖鑰也奚有不利哉或者又以餘姚諸湖皆儲水之所未可遽變為田然此乃自先年湖尚窪下之時言之耳今若建議取高者築埂為田低者仍挑濬為湖與邑民均而為業經畫其疆界疏導其溝洫是即兩利皆得也奚有于妨民哉浙海事宜夫浙連閩廣環海千里蠻夷諸島交舶萬艘常候風潮毒機矢以待將吏釋而不治非所以安邊也枕山依海耕鑿胥藉一聞寇警則遐邇繹騷非所以靜民也荷鎡而守調卒而戰去來不時出沒叵測非所以持久也昔我高皇帝混一函夏廓清東南闢濛沌而為家奄九有而光澤其聲教所記南流朱垠而經略所加復先全浙嘗命大將湯和勞來安集之牧瘡痍之民息鴻雁之歌而置制周防纎悉畢備豈徒為海上之虞哉凡以計安元元也今夫沿海諸衛四十有一壯以金湯聨以烽堠首尾策應可以見固圉之略戰艦之設四百二十九艘四時分哨上下番休可以見制勝之具焉衛所之兵束甲長屯按尺籍則魚鱗比序列攻守則象弭先驅可以見戎伍之修焉沿郡委輸權量本折海倉之儲貫朽紅腐可以見峙粻之富焉其建置之詳密規模之宏遠是以潢池無警海波不揚東南之安蓋肅然而垂萬世矣然法每起於因循而弊或生於玩愒桀黠之民射利以熾張貪猾之徒望風而嘯聚彼其乘徼於舟楫之便詭伺於風濤之間而匹夫內訌則遠近轉徙雖一方之􅏓盩亦目前之至虞兹固識時者所輟餐而計也夫立法不善不足以經遠救弊不善不足以通變故利而知其害者然後可與論經也弊而知其利者然後可與論權也要於規畫中宜創置得法動在萬全事歸百順焉耳矣請條陳六事以備採擇一曰復兵額夫沿海軍士列屯坐食兵非不足也然而戎籍徒存部伍日虛循其名則額數具陳核其實則老羸不備耗廢若斯其何以待緩急也夫貧乏者苦於朘削精壯者役於權門欲其聊生而蕃滋勢且不能故録其餘丁以實營伍或度其便宜調之近衛其與清勾於逃亡之籍召募於烏合之衆者功相萬也二曰復戰艦夫沿海之舟舊制四百有竒則舟非不足以備攻守也然而頻年積朽遂成廢缺倉卒有警則簡調陸兵夫乘潮以伺釁者疾如飛颷緣陸以應援者動經旬日水陸之勢殊戰守之形異也今所修者宜稍更其制而已夫樓船飛鳬戈船下瀨皆古之取勝於舟楫之間者也但古之戰者爭利於江河今之戰者競技於海島今欲襲江河之舊以收海戰之功計亦左矣宜求古擘竿橫海之製如閩廣所置者蓋得其遺似焉則所謂百料之名不盡拘可也三曰實軍儲夫千里餽糧有飢色之憂樵蘇後㸑無袵師之利向者卒伍充盈食無告匱今乃十耗其半而儲積日虛此所謂舛也無乃冒食者多而浸漁者衆軍需之外剖尅既煩減存之糧縻費無紀誠宜閲其見存考其贏餘計其儲積而又清屯種以廣其源杜侵冒以塞其流則糧餉之額可稽矣所謂實軍儲者此也四曰隆責任夫台寧之間隨宜設備定海臨山觀海之險尤當要衝守禦之官向總而為一今分而為二議者謂戰守所宜連合事權不宜互分似矣然分之則彼此角立畫地而守緩急怠於策應合之則地里遼隔聲息稽緩奄忽逼於支吾竊以定海有急得以調援臨觀至於臨觀有急亦得以責應定海勞則均其賞敗則均其罰則官守雖分而事權聨屬矣所謂隆責任者此也五曰恤歸附夫法太嚴則民無固志網太密則外有遺姦今俘獲之民比黨而連類者豈其得已哉進則陷於賊退則罹於法雖改過不足以補愆自新不足以求贖是以謀無回心而計不旋踵也誠使開歸附之門恕脅從之辜怙終不宥而罪疑惟輕則從亂者鮮矣所謂恤歸附以袪其黨者此也六曰明法禁夫狡猾者嗜貨而動射利者冒險而趨彼越關通夷之令非不飭然明也然法之所防利之所集雖抵觸殊扞而不顧者是法不行而人不格也竊以比閭之居當嚴其什伍舟楫之用當謹其出入彼其守望友助之間信誼足以相規過戾得以相糾是疸惡禁姦移風易俗固將不威而自戢者所謂明法禁以杜其源者此也行是數者以戰則勝以守則固以令則行以禁則止庶乎可以清寰海之塵而紓東南之急矣然閩浙海道相通而海寇出沒靡常往者常設經略重臣節制二藩幾有成績然隨置輒罷豈以東南承平姑緩而不設哉夫權無統攝則力輕於勢分事無專斷則機失於遙制今南贑北鄖俱屬內地猶分閫授鉞以隆其任而況東南之交會當東夷之要衝非有專閫重臣經畫節制簡徒揆䇿剿除而剃獮之則東南之患有未知所終者此識治之臣所逖慮而熟計也全浙習俗洪惟我太祖定鼎開基首崇風教以浙服為文獻峩冕靈秀鬱鍾金華一􅊩啓萬年文治之精華于時懸禮樂而置軌範家稷契而人臯陶即山陬海澨咸翕然相逐淳謹官府斂董治之威闤􅣃有頌聲之作鄉之老成猶能談浙之舊事乃今之浙固昔之浙而今之習則殊非昔之習矣故杭承先朝繁華又舟車所輳湖山所環其四方之遊士賈客肩摩踵躡風會趨靡遂日流於好蕩而無節其西郡澤菹田疇殖餉攸資民俗多饒而繁文競侈不免喜事之嫌又其甚則私艇出沒郡猾所淵藪也其東郡聲名文物詩書比屋民俗多慧而穯業尚虛稍沿江左之習又其甚則齒繁射利遊食所四出也上遊諸郡敦睦之俗簡訟而奉公較為寡尤然業貧而惰事亦緣以積困至婺衢之墟衣冠淳龎猶有先民之遺然訐而姦鬭勇而尚氣乃家藏戈矛視殺人僅若草菅則其居使之然矣甌括之俗奢儉異習亦有近古之稱然負山阻海均為遠屬乃法令多玩積逋負且至千萬則其流之弊久矣夫三家之市十金之資乃所恃以卒嵗而不至展轉流離於中路也然能儉約以居之則用享延年使奢靡以繼之則立見傾覆此其明效大驗者況進三家十金而上之者乎今環浙之境有獻酬而動費數金竭其身力以奉者有作嬪而傾資無量不足則稱貸以益者奔走之僕紈綺相炫輿臺之輩絢縟爭侈不知在上之章德何物也專業樗蒲延招朋類轉瞬一擲蓋藏靡遺不知注孤而盜起相繼也披緇髠髮實繁有徒寶觀崇菴侈隆鼎建是不可以不急汰也振履連翩競標姱麗結驪絡繹馳騖冶容是不可以不急逐也里閈富強偃仰瞪盻浚貧民之錐刀以冒道家之忌所謂陸梁其性也是不可以不重懲也少年遊俠黨附逍遙飛終日之崇觴以起遊觀之艷所謂蜉蝣其習也是不可以不亟屏也見𨽻成籍用之本省所謂練土著者誠以是矣而各省徴募復且嵗至安可不蚤杜以塞其流乎嵗輸課額􅀈剝艱阻所由免漕挽者誠以是矣而本郡餉額復且嵗逋安可不嚴核以懲其玩乎凡若是者均于習俗為纍非細故也兩浙水利夫吳越地巨麗之區而浸藪之奧也自天下輿圖按其方隅則東南下流之會相距不千百里而灌注􅐓溶水半吞之蓋測其勢高下溟渤尋丈間耳是故畛畷無數膏腴兼倍環異所叢鱗甲所集所謂富中之氓貨殖之選他莫能尚焉則利在水也而控清引濁潰渱渺漫混濤並瀨濆薄沸騰則奠居者病而播種者憂乃其患亦在水也然則治水之術自古蓋難之矣昔禹八年飲至水土既平九州已置而末年南巡乃舉諸侯為苗山之會夫夏邑宅中之後未聞禹遍歷方嶽也乃苗山玉帛萬國攸同則豈事遊豫為哉毋亦云兹地水所漨浡而巡狩專行則以考其成觀其定所以為治之之術或尚不能忘情於既平也三代以後民生日繁而畎畝溝澮所需益廣是故水利為兹土一大政而百姓俯仰之資有國征輸之計取給乎此蓋當寰宇之半矣吾嘗按之古為吏境內者開鏡湖於會稽復漢陂於勾章則漢馬臻孔愈也捍錢唐而築之隄浚廣德而疏其隘則唐白居易任侗也周因令奉化而濬靈濟陳渾令餘杭而開南湖陸明允疊龍潭之石李濬築陽陂之湖孟簡觀山隂而新河北開王濟刺杭州而斗門增置諸賢相繼卓有成績而興利障患全浙賴之即今感其德則廟祀遺其愛則名存或呼為長官之碶或稱為資國之渠數千百年如一日也然自三江既入震澤底定之後凡治吳越水者固不止數賢乃其施設大較如是焉耳自有宋慶厯欲便糧道遂於吳江築岸橫絶江流蓋自是水流漸紆泥沙易漲而東向之勢不敵渾潮是以壅積不滌吳淞之堙無異平陸而太湖達海之道始失其趨矣夫太湖一噎於長隄再澀於吳淞泛溢之患理所必至況霪雨一集諸郡奔流磕焉注之則欲其不為廬舍稼穯之災勢可得乎然則治水慶厯之後較之馬臻輩殆難其功矣是故范仲淹有上宰臣之書陳正同有言相視之札史才有圍田之議李結有敦本之説而單鍔郟亶則其經畫尤為詳切焉自今觀之置五堰於溧陽開百瀆於宜興置斗門於江隂建千橋於吳江則單鍔之大概也而環湖卑下之地縱浦以通於江橫塘以分其勢堅厚隄岸以禦湍悍必使塘浦高於江而田無所容水則郟亶之大概也蓋鍔之議詳於導水亶之見乃工於固田夫治水以為田也治水而不治田則濡足何益治田而不治水則耒耜何功然則二者事誠相須而二子之為議則固不可以偏廢者矣國朝定鼎金陵之日首鑿溧水石河引之北注而於五堰築壩以辟宣歙池陽九經之衝則所以治其上流者可固也繼而遣大臣夏原吉浚夏駕北貫吳塘通劉家港而導之海周忱浚顧浦以通吳淞而導之海此其疏浚隄防之績要不後古人之所為蓋諸郡農桑實國家百費之資而經畫平成之計固不止導利閭閻之間已也然邇者泛溢之患較嵗為常今則春夏積雨為災滋甚淪垣屋徙蓬翟怨咨起而和氣傷目擊之憂誠切於燃眉之急者此豈疏治之法或廢于因循之久而便宜之政或泥於通變之權乎是故今之為力莫切乎決三江浚諸浦疏涇港理岸塍禁圍占夷葑葦而凡古人已試之迹垂成之功不可以不講矣夫三江之梗以長橋也或者欲決去長橋以快入海之道則國家之漕挽勢所必賴即易為木橋廣開其谼以通之則衝突之憂亦終為網運妨焉然則二者不可計矣若其港汊經泄之所為民間所侵認日漸狹小上源諸漾積受洪流之處為廬埂藕蕩所屯結勢已布護此可不厲禁以清閼閉之患哉故相視開掘宋乾道間曾詔於王炎圍田堙塞淳熙間曾請於傅淇而岸東江尾茭廬沙泥則單鍔之憂又為拳拳此皆可稽而行之者彼其時所謂豪右之家肆意圍築而守倅縣令輒為給據今得無尚爾于是不可不痛滌其弊也或曰江湖草蕩計畝有納而圍田耕種者嵗增賦焉亦府庫之一需盡欲禁之則少損于公也夫天下利害當較其重利尋尺之人而養深長之害奚待智者辨之乎或又曰征輸疲藪民勤于力而驅之畚築則恐沈于衆也夫逸道使民雖勞不怨即其所有之田議之遠邇揣之厚薄而量工命日則豈厲民于公乎至若按禹迹大勢則湖之下流莫要吳淞今得開吳淞與黃浦會則太湖不足㵼矣然淤澱既久工力煩浩議者又謂黃浦吳淞其勢相敵此盛則彼必衰恐吳淞未必通而黃浦先湮則東南之害愈急以此則吳淞之開不易言矣然澱湖之西曰急水曰白蜆東曰小漕曰大瀝皆東江入海之故道今諸港淺狹而東江遂塞則支流為未廣至若范家濱劉家港夏駕安亭諸處凡以達婁江導之海者則今日所賴矣然潮汐難遏而浚治久疏則壅滯為可虞此可不加之意哉古之沿海三十六浦今入海者惟茜涇七鴉白茅楊林入江者惟福山許浦而已又能按其未浚者求而導之則散流之途多而四達之勢沛矣或曰若開諸浦東風駕海水逆注反病民田不知百川東流有常西激有時單鍔固已辨之而可稽也是故近理之湖則水得所容而橫泛可銷遠濬之江則水得所趨而壅噎可達然則所謂障患以興利或者萬一有禆於是乎至若分㵼浙江之議則所以殺太湖之受而省專治三江之難也蓋自蕭梁大通三年吳興告災遣王奕督率三郡大圖鑿泄而有此舉然當其時十郡流移草竊窺伺故昭明太子有丈一呼門動為人蠧出丁之處必妨蠶桑之類上書止之夫誠以其時不可為也而擬之今日則民窮時詘益非可以舉嬴矣然求逸者不吝其勞圖遠者不泥於近昔賈讓持上䇿論漢庭首謂瀕河十郡治隄之費嵗且萬萬及其大決所殘無數如出數年治河之費以業所徙則河定民安千載無患愚不能不以讓之見酌今日也蓋嘗按地勢之所歸而訊之長老之智者曰天目以東之水可以自餘杭入德勝出沈塘遵臯亭下臨平而㵼之江也如此則太湖所納止孝豐安吉之流而勢減其半昔之淤浸之田可以復膏壤之舊矣此非有待於經濟謀猷之士乎然則毋間於浮言毋滿於近效毋避於嫌毋遜於勢毋阻於怨毋隳於勞則三吳之所賴在兹舉也已而實存乎其人也夫上古有五官以治五材秦漢之間天下猶有水工唐宋而下自安定分科設教後講治水之學於東南者復何人哉蘇子云古者將有決塞之事必通知經術之臣計其利害而又水工行視地勢不得其工不可以濟也又曰三千年之間無一人能興水利者其學亡也蓋不能無感於時也國家於水利董之憲臣錫之專勑非不重其事然東南之水勢相延連而監司所及則有分地蓋自近日事權始分而張弛之間不無撓制其中矣夫事有專任則功可責有定權則政乃從此非今日之所當議者乎至於心存立功志在經邦毅然以水利之學經術之臣任諸身而斯民之溺日切於念則真存乎豪傑者起而為吾東南圖之夫善於驅民者導其利姑息所弗事也長於計國者治其急紛更所弗恤也明於稽古者通其變執泥所弗為也故曰存乎其人也而發言於庭築室于道已耳則三吳之魚鱉未有歸壑之期矣兩浙人物吳越畫江綰海以為國而春秋以來闔閭勾踐所嘗霸諸侯列冠𢃄其以會盟車書之盛與晉楚爭衡也舊矣司馬晉以後風流文物爛然江左及南渡迄我明興遂擅海內嘗遵錢唐登會稽及沂漢太史公司馬氏所弔禹之遺烈其所當山川之吞吐風氣之磅礴亘牛斗薄虹霓非特古所稱一都會而已矣故嘗按吳越之士公子札范蠡言偃以來世多聞人他不暇引即如我國家劉公基章公溢葉公琛宋公濓王公禕始以幃幄訏謨文章典禮翊戴高皇帝草昧之際者當與商之萊朱周之閎夭等其他戡亂定難身捍社稷則于公謙仗節死事欷歔鳴咽則方公孝孺孫公燧抗聲直諫死且不避則章公綸張公寧正己率下大雅不羣則商公輅謝公遷文經武緯超曠百世則王公守仁抒忠發姦彈壓中外則胡公世寧理學淵懿領褎士林則章公懋陳公選他名臣碩卿後先鱗次屬望儒紳者不可勝數圖書編卷三十八
