body:
  text: 圖書編卷一百明章潢撰明堂大饗總叙昔周公郊祀后稷以配天宗祀文王於明堂以配上帝朱子謂郊而曰天所以尊之也配天以祖亦所以尊祖也明堂而曰帝所以親之也配帝以父亦所以親親也尊親之說誠有以得周公制禮之意矣豈凡有天下者皆得郊以尊其祖亦皆可以明堂親其親乎誦郊祀后稷之頌曰思文后稷克配彼天誦宗祀文王之頌曰儀式刑文王之典日靖四方又曰維天之命於穆不已於乎不顯文王之德之純是后稷德足配天郊祀之禮不可易也文王有配帝之德而無以伸其配享之情仁人孝子豈得已哉此武周明堂之禮以義起也後世君王祖非后稷郊祀即冝配以創業之主而親之德非文王則明堂之饗可已乎其不可已乎知此始可以議明堂之典始可對揚我世宗明堂大饗之休烈也至於諸家所論制度各有不齊惟以義起典禮得其當則惟王定制亦可以義而裁之矣何必拘拘諸儒之說哉朱子曰論明堂之制者非一竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右个東之北為青陽左个南之中為明堂太廟南之東即東之南為明堂左个南之西即西之南為明堂右个西之中為總章太廟西之南即南之西為總章左个西之北即北之西為總章右个北之中為𤣥堂太廟北之東即東之北為𤣥堂右个北之西即西之北為𤣥堂左个中是太廟太室凡四方之太廟異方所其左个右个則青陽之右个乃明堂之左个明堂右个乃總章之左个總章之右个乃𤣥堂之左个𤣥堂之右个乃青陽之左个也但隨其時之方位開門耳太廟太室則毎季十八日天子居焉古人制事多用井田遺意此恐是也明堂制度明堂之制或以為一殿公孫玉帶之言裴顯亦言一殿或以為五室考工記或以為九室十二堂大戴禮張衡東都賦或以為十二室吕氏春秋或以為四堂十二室明堂月令其堂室之多寡不同如此或謂之天府神農或謂之合宫又曰崑崙黄帝或謂之五府堯舜又曰衢室堯又曰總章舜或謂之世室夏或謂之重屋應劭又云商曰陽舘或謂之明堂周蔡邕又取其正室之貌則曰太廟取其尊崇則曰明堂取其四時之學則曰太學取其水圜如壁則曰辟雍大戴禮云其外有水曰辟雍古周禮孝經說明堂文王之廟戴德云明堂辟雍是一其名之不同如此左傳魯僖公五年既視朔遂登觀臺服氏云人君入太廟視朔天子曰靈臺諸侯曰觀臺在明堂之中文公二年服氏曰明堂祖廟並與鄭注不同玉藻云天子廟及路寝皆如明堂制即鄭𤣥以為三者名異而制同王制云小學在公宫之左太學在郊即云天子曰辟雍是學不得與明堂同為一物又天子宗廟在雉門之外孝經緯云明堂在國之陽玉藻又云聽朔於南門之外是明堂與祖廟别處不得為一也蔡邕明堂章句曰明堂者天子太廟所以宗祀周謂明堂東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室人君南靣故主以明堂為名在五堂之中央皆曰太廟享射養老教學選士皆於其中故取其宗祀之清貌則曰清廟言其正室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四門之學則曰大學取其四靣周水圜如壁則曰辟雍雖各異名而事實一也袁凖正論明堂宗廟太學各有所為而儒者合為一體失之逺矣宗廟之中人所致敬幽隐清净鬼神所居而使衆學處焉享射於中人鬼慢黷生死交錯囚俘截耳瘡痍流血以干鬼神非其理也茅茨采椽至質之物建日月承玉輅以處其中非其類也夫宗廟鬼神之居祭天而於人鬼之室非其處也王者五門宗廟在一門之内若在廟而張三侯又辟雍在内人物衆多非宗廟之中所能容也其用之不同如此夏度以歩商度以尋周度以筵大戴禮云宫統三歩東西九仞南北七筵堂髙三尺禮記正義曰按鄭𤣥日録云明堂東西九筵南北七筵堂崇一筵五室凡室二筵明堂月令堂高三丈東西九仞南北七筵又云堂方百四十四尺坤之䇿也屋圜徑二百一十六尺乾之䇿也太廟明堂方三十六丈通天屋徑九丈其廣狹之不同如此或以為在國之陽三里之外七里之内丙巳之地淳于登説或以為在宫中顔師古說蓋得之干路寢歟或以為在郭内字文溰說或作之汶上武帝或寓之雩壇隋或寓之圜丘唐或以為在近郊三十里明堂月令其地之不同如此或祭上帝黄帝或祭五帝唐虞或祭太乙武帝時以上帝為太乙或除五天帝明帝時摯虞除五帝終東漢至晉皆以五帝即上帝上帝即天帝用王肅一天之說於是除五帝之位惟祭上帝或祭五人帝鄭康成說淳于登曰周公祀文王於明堂五帝之精太㣲之庭中有五帝座星蔡邕明堂論曰明堂者所以崇禮其祖以配上帝也其所祭之不同如此大戴禮云凡九室四户八牎共三十六户七十二牖以茅蓋屋上圜下方明堂月令云四户八窓淳于登曰八牎四闥鄭駿之曰戴禮所云雖如盛德但云九室三十六户七十二牖似吕不韋作春秋時說者非古也其制之不同如此古周禮孝經說蓋以茅晏子春秋曰明堂之制下之温濕不能及也上之寒暑不能入也木工不鏤示民知節也吕氏春秋曰周明堂茅茨蒿柱土堦三等以見節儉也胡廣曰古之清廟以茅蓋今之明堂茅蓋之乃加瓦其上不忘古也封軌議曰上圜下方以則天地通水圜宫以節觀者茅蓋白盛為之質赤綴白綴為之户牖大小栱綴大梠飛檐上以清陽玉葉覆之後竟不行其制度之豐儉如此隂陽九九之變且圜蓋方載六九之道也八闥以象八卦九室以象九州十二宫以應十二辰三十六户七十二牖以四户八牖乗九室之數也户皆外脫而不閉示天下不藏也通天屋高八十一尺黄鍾九九之實也二十八柱列於四方七宿之象也堂高三尺以應三統四鄉五色各象其行外博二十四丈以應節氣也封軌議曰鄭𤣥曰五室者象五行也九堦者法九土四户者逹四時八窓者通八風上圜下方以則天地白虎通又以為上圜法天下方法地八窓象八風四闥法四時九室法九州十二坐法十二月三十六户法三十六雨七十二牖法七十二風其取象之不同如此五帝之位正四方而明堂祭於四維不以其方天子之朝向明而明堂則四時異宫不必南靣其所向之不同如此或配以遠祖漢初配以高帝晉初配以宣帝尋復還以文帝配宋朝升以列聖同侑其配享不同如此或一犢明帝紀光武制或具大牢武帝從方士言其牲醴如此且明堂之制於以朝羣后而致其義養三老而致其仁頒月令以奉天時聽政考言以修人紀適時也又孰曰不可者乎既曰可矣則重屋總章不必詢其名之詭土階茅茨不必從其制之陋至若八闥以象八卦九室而象九州上圜而法乎乾下方以體乎坤十二宫以應歳之辰七十二牖以應氣之候者無為詭異不經也要之廣大周旋禮文㓗净足以致享上帝其最不可取者蔡邕之章句而最可取者袁凖之正論而已世室重屋明堂考考工記曰夏后氏世室堂脩二七廣四脩一按世祭有天下者配五帝於此故曰世室即明堂也夏屋兩翼檀弓云覆若夏屋者是也先儒因魯公稱世室遂以爲廟制非也廟豈有五室於一堂哉辨見玉藻鄭氏曰世室者宗廟也魯廟有世室牲有白牡此用先王之禮脩南北之深也夏度以歩令堂修十四歩其廣益以四分修之一則堂廣十七歩半五室三四歩四三尺鄭氏曰堂上為五室象五行三四歩室方也三四尺以益廣也木室於東北火室於西南金室於東南水室於西北其方皆三歩其廣益之以四尺此五室居堂南北六丈東西七丈按三四歩四三尺乃互文其横廣皆三歩四尺其直修皆四歩三尺鄭氏以修不益而但益廣則横連不通而直又大空文亦不順九階鄭氏曰南面三三而各二四旁兩夾窓鄭氏曰窓助万爲明每堂四八窓白盛鄭氏曰蜃灰也盛之言成也以蜃灰垔墻所以餙成宫室門堂三之二鄭氏曰門堂門側之堂取數於正堂令堂如上制則門堂南北九歩二尺東西一十一歩四尺爾雅門側之堂謂之塾室三之一鄭氏曰兩室與門各居一分殷人重室堂修七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凢室二筵按下云廟門容大扄七箇闈門容小扄參箇註扄鼎之扄長三尺每扄為一箇七箇二丈一尺廟中之門曰闈小扄膷鼎之扄長二尺參箇六尺按膷鼎無扄小鼎指羊豕鼎註見後或曰即世室門也路門不容乗車之五箇註路門者大寢之門乗車廣六尺六寸五箇三丈三尺言不容者是兩門乃容之兩門乃容之則此門半之丈六尺五寸或曰此即重屋門也應門二徹參箇註正門謂之應門謂朝門也二徹之内八尺三箇二丈四尺或曰此即明堂門也鄭氏之註本此然應門二丈四尺與夏世室門二丈三尺三寸有竒正合則世室即明堂可知殷承夏後其制皆同但改爲重屋髙其堂四其簷耳周承殷後則亦重屋矣窓户皆同但深廣堂室大小異耳淮南子云明堂之制重屋是也廟與寢則放其制擴而大爲五廟五寢異處呉氏曰按書傳云周人路寢南北七雉東西九雉室居二雉以雉長三丈言之則南北之脩為二十一丈東西之廣為二十七丈此路寢之制古人寢不踰廟則明堂之制固宜大於路寢今日明堂之室止於丈八尺而反狹路寢逺矣豈有是禮哉註見寢此說誤蓋明堂乃祀始有天下者配上帝之所四時迎氣於四郊祭帝還於明堂亦如之而配以文王武王詩我将我享惟羊惟牛乃祀文王於明堂之詩時武王未没故不云武王牧野語稱武王祀乎明堂而民知孝是也則始祖配天一年止一祭有天下祖配上帝一年四祭矣月朔則以特牛告朔於明堂而聽朔於南門外餘日之朝皆路寢門外其六年諸侯總朝亦於明堂每年朝則於廟將合諸侯則司儀於國外為壇三成宫旁一門下為五室以向明方四尺設東西南北上下六色於上設六王以代之詔王儀南嚮見諸侯其方嶽之明堂亦同此制故先儒誤合為一詳見玉藻諸侯則告朔聽朔於廟春秋於告月猶朝於廟是也傳曰諸侯受十二月朔正於天子藏於太祖廟毎月朔朝廟使大夫南靣奉天子之命君北靣而受之此時使有司先告朔慎之至也受於廟者孝子歸先君不敢自專也言朝者縁生以事死親在朝朝莫夕已死不敢渫鬼神故也必於朔者感月始生而朝也按此言禮是而釋義非尸子曰黃帝曰合宫有虞曰總章商曰陽舘周曰明堂通典曰黄帝拜祀上帝於明堂唐虞祀五帝於五府夏后享祖宗於世室商人曰重屋周人宗祀文王於明堂以配上帝漢時公孫玉帶畫黄帝明堂圖則明堂要自黄帝始也今之言明堂秪知其始於周耳考古者盍詳其所自始云歴代明堂饗祀黃帝拜祀上帝於明堂或謂之合宫其堂之制中有一殿四靣無壁以茅蓋通水水圜宫垣為複道上有樓從西南入名崑崙天子從之以入拜祀唐虞祀五帝於五府蒼曰靈府赤曰文祖黃曰神計白曰明紀黑曰𤣥矩夏后氏曰世室商人曰重屋周人曰明堂其制度詳於禮經漢武帝元封五年祀太一五帝於明堂上座髙皇帝對之牲以太牢天子從崑崙道入始拜明堂如郊禮禮畢燎堂下其明堂制從公孫玉帶所上黄帝時圖也後漢光武建武三十年初營明堂明帝永平二年正月辛未初祀五帝於明堂光武帝配五帝座位堂上各處其方黄帝在未皆如南郊之位光武位在青帝之南少退西靣牲各一犢奏樂如南郊章帝元和二年二月壬申宗祀五帝於孝武所作汶上明堂光武帝配如洛陽明堂禮癸酉更告祀高祖太宗世宗中宗世祖顯祖於明堂各一太牢安帝延光三年祀汶上明堂如元和故事初建武營明堂其制上圓下方八窓四闥九室十二座三十六万七十二牖魏明帝太和元年正月丁未宗祀文帝於明堂以配上帝祝稱天子臣某晉武帝泰始二年正月丁丑宗祀文皇帝於明堂以配上帝又議明堂宜除五帝之座同稱昊天上帝各設一座而已十年十月詔復明堂五帝位東晉大元十三年孝武帝正月後辛祀明堂車服之宜悉遵漢制出以法駕服以衮冕宋孝帝大明五年依漢汶上儀設五帝位太祖文帝對饗祭皇天上帝鼎爼彞簋一依大廟禮制作作大殿屋十二間以應一周之數其餘煩雜一皆除之六年正月帝親奉明堂祭五時帝以太祖配齊高帝建元元年七月祭五帝之神於明堂有功德之君配明堂制五室從王儉之議也明帝永泰元年有司奏以武帝配梁祀五帝於明堂服大裘冕罇以瓦爼豆以純漆牲以特牛餚膳准二郊若水土之品蔬菜之屬猶宜以薦郊所無者並從省行禮自東郊而升從青帝始止一獻清酒無黍肉之禮請停灌及授爼十二年毁宋太極殿以其材為明堂十二間基准太廟以中央六間安六座悉南向東來第一青帝第二赤帝第三黃帝第四白帝第五黑帝配帝總配五人帝在祚階東上北向大殿後為小殿五間以為五佐室焉陳祀昊天上帝五帝於明堂牲以大牢粢盛六飯鉶羹蔬備薦焉武帝以德帝配文帝以武帝配廢帝以文帝配堂制殿屋十二間中央六間依前代安六座四方帝各依其方黄帝居坤維而配饗座依梁法後魏文帝大和十三年四月經始明堂改營大廟遷洛之後宣武永平延昌中欲建明堂而議者或云五室或云九室至明帝神龜中復議之元义執政遂營九室值亂不成宗配之禮迄無所設北齊採周官考工記為五室後採漢三輔黄圖為九室並終不立隋文帝開皇中議立明堂時將作大匠宇文愷依月令造明堂木様以獻帝異之然以衆議不定故不成終隋代祀五方上帝於明堂常以季秋在雩壇上而祀其用幣各依其方人帝各在天帝之左大祖在昊天南西向五官在庭各依其方牲用犢十二皇帝太尉司農行三獻禮於青帝及太祖其餘皆有司助奠五官位於堂下行一獻禮有燎其省牲進熟如南郊儀唐武德初定令每歳季秋祀五方上帝於明堂元帝配五人帝五官並從祀訖於貞觀之末未議立明堂季秋大饗明堂則於圓丘行事永徽二年又奉太宗配祀明堂有司遂以高祖配五天帝太宗配五人帝下詔造明堂内出九室之様顯慶元年禮官議太宗不當配五人帝太尉長孫無忌等議以高祖躬受天命奄有神州為國始祖抑有舊章太宗道格上𤣥功靖下黷拯率土之塗炭布大造於生靈請准詔書宗祀於明堂以配上帝從之乾封初復議立明堂或云九室或云五室以議不定又止武后垂拱四年二月毁東都之乾元殿就其地造明堂因下詔曰時既㳂革莫或相遵自我作古用適於事今以上堂為嚴配之所下室為布政之居來年正月一日可於明堂宗祀三聖以配上帝其月明堂成號為萬象神宫天授二年正月乙酉日南至親祀明堂合祀天地以周文王及武氏先考妣配百神從祀並於壇位以茅布席而祀武大后又于明堂後造佛舍髙百餘尺始造為大風振倒俄又重營其功未畢證聖元年正月丙申夜佛堂災延燒明堂至明而盡未幾復令依舊規制重造明堂凡高二百九十四尺東西南北廣三百尺上施寳鳳俄以火珠代之明堂之下圍遶施鐵渠以為辟雍之象天册萬嵗二年三月造成號為通天宫四月又行親享之禮大赦改元為萬歳通天明年九月又享於通元宫開元五年幸東都将行大享之禮以武大后所造明堂有乖典例遂拆依舊造乾元殿每臨御依正殿禮自是駕在東都常以元日冬至於乾元殿受朝賀季秋大享依舊於圎丘行事其大饗儀具開元禮宋初因唐舊制每嵗冬至圎丘正月上辛祈榖孟春雩祀季秋大享明堂凡四祭昊天上帝初未嘗親祠只命有司攝事寓祭南郊壇至仁宗皇祐二年始以大慶殿為明堂合祭天地太祖太宗真宗並侑又建炎以來朝野雜記明堂者仁宗皇祐中始行之其禮合祭天地並配祖宗又設從祀諸神如郊丘之數政和七年既建明堂於大内自是歳以九月行之然獨祀上帝而配以神宗惟五帝從祀紹興元年上在㑹稽將行明堂禮命邇臣議之王剛中居正為禮部郎官首建合祭之議宰相范覺民主之以常御殿為明堂但設天地祖宗四位而已四年始設從祀諸神七年復祀明堂而徽宗崩問已至中書舍人傅崧卿請増設道君大上皇帝配位於大宗之次禮部侍郎陳公輔言道君方在几筵未可配帝乃不行三十一年始宗祀徽宗於明堂以配上帝而祀五天帝五人帝於明堂上五官神於東廂罷從祀諸神位用熈寧禮也乾道以後說者以德壽宫為嫌止行郊禮淳熈六年李仁父周子充議復行明堂之祭並侑焉逮十四年高宗崩明年季秋乃用嚴父之典令郊祀從紹興明堂從皇祐惟歲時常祀則以太祖配冬至圓丘太宗配祈穀大雩高宗配歴代明堂大饗總論按前代祀上帝於明堂者周禮也祀五帝於明堂者漢禮也合周禮而並用之既並祀五帝又祀上帝者唐宋禮也其不取六天之説並罷羣神從祀僅宋之神宗一人惜當時諸臣不大為建白而孝經嚴父之義遂終於不明矣明堂大饗孝經子曰孝莫大於嚴父尊嚴其父嚴父莫大于配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝朱熹曰為壇而祭故謂之天祭於屋下故謂之帝按古者聖人之於天尊而遠之故祀於郊而配以祖親而近之故祀於明堂而配以父蓋一歲之間而有二祭旣於歲首一陽之月祭天於泰壇而以祖之有功者配祀又於季秋萬寶告成之後饗帝於明堂而以宗之有德者配食而曰天所以尊之也尊之則祀之惟以其誠故壇而不屋以其形體稱之曰天配天以祖亦所以尊祖也明堂而曰帝所以親之也親之則祀之必備其禮故屋而不壇以其主宰稱之曰帝配帝以父亦所以親父也朱子引陳氏說謂郊者古禮而明堂者周制也周公以義起之也我聖祖初分祀天地其後乃合祀之共為壇於南郊其上則屋之焉蓋泰壇明堂一也列聖相承皆以太祖太宗並享配其於孝經之義脗合無間矣國朝明堂大饗典禮季秋行大饗禮于南郊大饗殿省牲齊戒儀同前祈榖前三日上祭服詣睿宗廟請皇考配帝行一獻禮用祝前三日太常愽士捧祝板於文華殿上填御名訖捧安於香帛亭厨役舁至神庫供奉三更初太常官請安神位陳設如儀祭品皇天上帝南向騂牛一蒼璧皇考西向配陳設同無玉是日上常服乗輿至内西天門外神樂觀二知觀叩頭起執香爐導至神路錦衣衛官跪奏落輦上降輿導引官導上至大次具祭服出導引官導上由左門入至陛上典儀唱樂舞生就位執事官各司其事内賛對引官導上至拜位内贊奏就位典儀唱迎帝神奏樂樂止奏四拜傳贊百官同典儀唱奠玉帛奏樂奏陞壇内贊導上至上帝香案前跪奏搢圭奏上香訖上受玉帛奏獻玉帛訖奏出圭内贊導上至配位香案前儀同前奏復位樂止典儀唱進爼奏樂齊即舁安訖奏陞壇内贊導上至上帝前奏搢圭奏進爼奏出圭内贊導上至配位前儀同前奏復位樂止典儀唱行初獻禮奏樂奏陞壇内贊導上至上帝前奏搢圭上受爵奏獻爵訖奏出圭奏詣讀祝位樂暫止奏跪傳贊衆官皆跪贊讀祝訖樂復作奏俯伏興平身傳贊百官同内贊導上至配位前同前獻爵訖奏復位樂止典儀唱行亞獻禮終獻禮儀同初獻惟不讀祝樂止太常卿立於殿西東向唱賜福胙内贊奏詣飲福位内贊導上至祝飲位光禄寺卿捧福酒胙跪於左奏跪奏搢圭奏飲福酒訖奏受胙訖奏出圭奏俯伏興平身奏復位奏四拜傳贊百官同典儀唱徹饌奏樂樂止典儀唱送帝神樂奏四拜傳贊百官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各恭詣泰壇上退拜位之東立典儀唱望燎奏樂捧祝帛饌官出殿中門奏詣望燎位内贊對引官導上至望燎位燎半奏禮畢導引官上至大次易祭服出樂止上囘至㕘拜祝文維恭奏享於皇天上帝曰時當季秋咸成農事羣生蒙利黎兆永安邦家是頼帝德敷天臣統臣工宜為酬享謹用玉帛牲醴祗謝生成大福備此禋燎奉皇考睿宗知天守道洪徳淵仁寛穆純聖恭儉敬文獻皇帝侑歆尚享樂章迎神中和於皇穆清兮宏覆惟仁既成萬寳兮恵此蒸民祗受厥明兮欲報無因爰稽首兮式展明禋肅肅廣庭兮遥遥紫旻笙鏞始奏兮祥風道雲臣拜稽首兮中心孔懃爰瞻寳輦兮森羅萬神庶幾昭格兮眷命其申徘徊顧歆兮鍳我恭寅奠玉帛肅和捧圭幣兮瑶堂穆將愉兮神聖皇乗予心兮純一荷帝德兮溥將進爼凝和歳功阜兮庶類成黍稷馝兮臑鼎馨敬薦之兮慙菲輕大禮不煩兮惟一誠初獻壽和金風動兮玉宇澄初獻觴兮交聖靈瞻𤣥造兮懐鴻禎曷以酬之心怦怦亞獻豫和帝眷我兮居紛歆繁㑹兮五音再捧觴兮莫殫臣心惟帝歆懌兮生民是任終獻熈和綏萬方兮屢豐年𦕈𦕈予躬兮實荷旻天酒三獻兮心益䖍帝命參輿兮勿遽旋徹饌雍和祀禮既洽兮人神肅雍享帝享親兮勉竭臣衷惟洪恩兮罔極儼連蜷兮聖容送神清和九韶既成兮金玉鏗鏘百辟森立兮戚羽斯藏皇天在上兮昭考在傍父配天兮祗修厥常殷薦既終兮神去無方𤣥雲上升兮鸞鵠參翔靈光囘照兮郁乎芬芳載慕載瞻兮願賜亨昌子孫黎民兮維帝是將於惟明德兮永懐不忘望燎時和龍輿杳杳兮歸上方金風應律兮燎斯楊逹精誠兮合靈光帝庭納兮玉帛將顧下土兮眷不忘願錫吾民兮長阜康嘉靖九年上欲於奉天殿行秋報禮夏言言秋報仍行於大祀殿亦得以伸配帝之敬於太宗而分配祖宗兼舉祈報之儀盡矣十七年上欲崇祀皇帝考以配上帝乃撤南郊大祀殿建大享殿享上帝尊謚皇考為睿宗知天守道宏德淵仁寛穆純敬恭儉敬文獻皇帝侑享焉是秋報未成乃大享於宫右乾隅𤣥極寳殿升祔皇考於太廟仍藏主於原寝世宗朝明堂大享禮之興也莫貴於時莫大於稱二者備矣是謂大順大順禮之極致也夫有天下之大位者謂之時具天下之大德者謂之稱行是二者而宜之之謂義明其義之盡以斷天下之疑以立萬世之典者之謂聖數者皆備以考三王而不謬以俟百世而不惑者謂之大順為禮之極致也是道也有天地以來惟武王能行之惟孔子能明之兼武王孔子之道而備美極盛孰有過於今日者哉我皇上秉生知之資撫制作之權光承天序立天下之大位非所謂時乎我皇考睿宗皇帝躬修德譲克配於天聖功昭赫繫遹峻之望篤生聖嗣啟受命之原非所謂稱乎以天下之大徳當天下之大位本嚴父之文舉大享之典而恊乎人心當乎天理非所謂行而宜之之義乎徃者戊戌之歳大議初下羣論籍籍禮臣惶懼莫知定擬我皇上親御宸翰作為或問反覆千餘言妙悟英斷㣲詞奥㫖炳然懸之日月與六經昭映信非虛矣嘗仰而頌之見其折羣疑以孔子之言凖成周宗祀之典明周武君臣之分定百世宗祧之法别祖功宗德之異凡若此者有以超百代之見而斷千古不决之疑非天下之至聖其孰能與於此哉由是大典昭於一代天下臣民曉然知天子之孝可通於神明加於百姓刑於四海施於萬世蓋自成周以還越二千年而再見其盛也茲非所謂大順而為禮之極致也乎然此義自周以來鮮克知之徒察於制度之細而靡究於理義之原紛紛之議而不可為訓久矣愚嘗聞之禮曰義者禮之實也恊於義而恊則禮雖先王未有可以義起也又曰其數易陳也其義難明也故不知義者不可以言禮秦漢而下舉其數而失其義者不能更僕數也是故有一殿有五室有九室十二室有四堂十二堂之異有配以始祖有配以祖考有三君並配侑有祖宗送配有主於嚴父而一世迭配之殊蔡邕鄭𤣥桓譚之所紀述聶崇義李謐王炎李覯之所考究何其紛紛也裴碩歐陽修之倫制庶幾近之乎大始永平顯慶之所經營杜鴻漸王涯孫幵司馬光王安石陳與義之所論辨何其紛紛也胡寅錢公輔之論義殆庶幾近之乎然皆未有持時與稱二者之說卓然見武王周公制禮崇親之心於千載之上者也是聖人之道待人而明若斯之難也嗚呼此豈可以與寡聞淺見者道哉蓋嘗論之明堂之制猶可畧也其義則難明也是武王周公以義起焉者蓋武王周公之意以為郊以享帝廟以享親天人之道備矣惟我文王備聖人之至德是天命之所與也使終同羣廟則何以嚴親躋以配郊則嫌於並祖故以義起設為明堂以隆専祀而推尊於主宰之神是尊文王之至也夫尊文王者主於尊德也非武王周公之獨私於親也不然則舜可為矣而不為禹湯可為矣而亦不為三聖人者愛親之心豈與武周異哉時可得為而親之德未能配天而不愧則雖聖人未敢先天以有為也此稱之為難之說也武王周公之意以為迎至大報四序禘嘗誠孝之心逹矣惟此明堂但以宗文考之德出於二禮之外者也如四序並舉則病於凟禮之為煩或歳首一行則失於取義之無謂故以義起擇於季秋以行大享而著於成形之義是親文王之至也夫親文王亦主於嚴徳也非武王周公之可得公於人者也不然則成王之世未聞拘父之說而祀武王也康王之世未聞泥成形之義而祀成王也是二聖人者其爱親之心豈獨厚於人哉親徳既盛而又適當乎應天之時故特舉嚴父之典而不譲所謂聖人奉天之時也此時之為貴之説也故知時之為貴也則明堂之祀非有天下者不可得為也知稱之為難也則嚴父之典非有天下者之皆得為也故曰二者偹矣是謂大順孔子曰則周公其人所謂以義起者豈不信然哉是知虞夏之際協諸義不協而止者也漢晉之後協諸義不協而不止者也孰有若我皇上修禮嚴親於武王有光者乎又孰有若我皇考凝德對天於文王有光者乎文王之德詩書所稱備矣我聖考之德則載於史氏之書藏於金匱之秘非疏遠草萊之臣所得覩識也圖書編卷一百
