body:
  text: 圖書編卷五十明章潢撰外四夷館考總叙國朝自高皇帝以神武肇基奄有萬國列聖繼作文命覃敷舟車所至㒺不稽首稱藩獻琛恐後王㑹之盛葢自昔罕儷矣顧遐陬裔壌聲教隔閡語言文字各成一家典象胥者不有専業何以宣聖德而逹夷情此四夷館之設猷慮甚宏逺也當是時爲舘傅者多徵自外國簡吾子弟之幼頴者而受學焉是以能習彼中之故實雖數十年後籍記無徵而爲之徒者猶能憶其師説不煩考鏡迨今二百餘年曩之遺老盡矣官師之所肄習者即語言文字尚不能該貫况其他乎今上嗣服之六年㑹暹羅使者來庭始闢舘受譯課業少間輙進夷使而詢之具述彼國之山川道里食貨謡俗如在掌股間因以詢于鞮鞻之舘則其詳不可得而聞矣夫㝢内冠𢃄之國守官者馭臨其方猶必藉乗史以徵一方之文獻故措注不繆而與民攸宜矧魋結各類疆殊風異辭令往復脫有牴牾斯情實眩而彼我攜矣我不彼知彼乗而匿端彼不我知我安能令之懐且讋哉余因是蒐輯往牒㕘稽國朝故實于凡所譯諸夷建置沿革山川巖易食貨便滯謡俗龎漓與夫叛服之始末戰守之得失畧詮次成編弁干首俾初學之士得有所考以知夫彼國之委悉庶于譯學不無小補耳或謂創籍記事似也戰守諸計得毋尸祝而代庖乎葢陸敬輿有言中夏之盛衰異勢邊方之强弱異時事機之利害異情措置之安危異便形勢不同胡可専一則夫辨方記事隨事考文以備卒然之應者亦安得而不詳也方今明良交泰四夷咸賔象胥之所譯者非請求職事則表獻方物也葢以爲我能是是亦足矣然事變不常容有出於職貢之外者如近者諳達請經于西竺暹羅失篆乎東牛其文移奏請皆曩所未有者非多識其何以應之乎若乃遺書解聊城之圍傳檄定卭筰之亂古之喆士葢有以尺牘而當三軍者苟用之中機雖蠻貊之邦行之矣然則文事武備可以不並講哉四夷邉圖可以知險要豫戰守之防四夷舘考可以知故實待貢獻之使盖夷狄之叛服不常服則綏之叛則禦之其事一也故合而存之以備考云若夫圖以地而殊方舘因字以審譯故後先彼此參錯不齊如百夷緬甸八百三舘又當列之雲南夷中惟在善覽者㑹而通之可也况圖之所載各國方位特其大略爾有圖載其國名而無考亦有記載頗詳而不見之圖者故諸圖總揭之於前隨依東西北先載古夷考畧繼述今時四夷舘考并各夷見聞記載於後庶可與各圖㕘考焉制禦四夷典故皇明祖訓曰四方諸夷皆限山隔海僻在一隅得其地不足以供賦得其民不足以供役若其自不揣量來擾我邉則彼爲不祥彼既不爲中土患而我興兵輕伐亦不祥吾恐後世子孫以中國富彊貪一時戰功無故興兵致傷人命慎勿爲也但諸部在西北邉境互相宻邇累世戰争必選將練兵時謹備之海外諸夷東北朝鮮即高麗其李仁人及子成桂今名旦者自洪武六年至二十八年首尾凡弑王氏四王姑待之正東偏北日本雖朝實詐暗通奸臣胡惟庸謀爲不軌故絶之正南偏東大琉球朝貢以時王子及陪臣之子皆入太學讀書禮待甚厚小琉球不通往來不曽朝貢西南安南三年一貢真臘朝貢如常濱海暹羅朝貢如常濱海占城自占城以下諸國朝時内𢃄行商多詭詐故沮之自洪武八年沮至十二年方乃得止國海濱蘇門答剌濱海西洋濱海瓜哇濱海彭亨居海中百花居海中三佛齊居海中浡泥居海中洪武四年九月上御奉天門諭省府臺臣曰海外夷國爲患中國者不得不討不爲中國患者不可輙用兵古人言地廣非久安之計民勞乃易變之源隋煬帝妄興師旅征討琉球荼毒生民徒慕虚名反疲中土載諸史冊爲後世譏朕以諸小蠻夷阻越山海不侵中國無煩用兵惟西北最强世爲中國患不可不謹備卿等記此言知朕意洪武十五年命翰林侍講火原㓗等編類華夷譯語上以前元素無文字發號施令但借高昌書製蒙古字行天下乃命原㓗與編修馬懿赤黒等以華言譯其語凡天文地理人事物類服飾器用靡不具載復取元秘史㕘考以切其字諧其聲音既成刋布自是使臣往來朔漠皆得其情凡四夷分十八所設通事六十人大通事有都督都指揮等官統諸小通事總理貢夷降夷及歸正人夷情畨字文書譯審奏永樂七年遣太監鄭和王景𢎞侯顯率官兵三萬下西洋凡西洋功次即非斬首選法不得减革十三年吏部員外即陳誠上使西域記凡十七分别四夷種類周禮職方氏掌天下之圖與其地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民周知其利害而王昭禹釋之由東方曰夷其種有四南方曰蠻其種有八東南曰閩其種有七西北曰貉其種有九西方曰戎其種有五北曰狄其種有六而王制言東方之夷則曰被髪文身言南方之蠻則曰雕題交趾皆不火食言西方之戎則曰被髪衣皮言北方之戎則曰衣毛穴居皆不粒食葢其生禀習俗大畧如此而夷者則外域之總名也古帝王所以治之總之杜預所謂訓誥之所不可禮義之所不及外而不内疎而不戚來則禦之去則備之如是而已然四夷種類猥多見于史冊者如馬韓夫餘百濟新羅挹婁扶桑侏儒長人等國皆東夷也盤瓠南平牂牁夜即獠滇卭筰冉驪南詔松外諸蠻交趾黎峒海南諸國真臘闍婆占城等國皆南夷也羌氐弋姚氏苻氏吐谷渾党項吐畨泥婆羅大勃律骨咄西域諸國樓蘭車師西茲焉耆于闐烏孫大宛莎車天竺波斯西方等國皆西夷也匈奴沮渠赫連烏桓鮮卑秃髪拓㧞突厥契西大漠契丹囘紇沙陀等國皆在北也不能徧舉姑撮其載統志圖者皆中國四方邊外之夷也其自巴蜀以東歴湖南北桂嶺雲貴數千里谿峒山菁之中如曰犵曰狑曰獠曰猺曰苖之類凡十數種皆所謂蠻也時或竊發備禦爲難故併列之云外四夷總論杜氏通典邉防總序曰覆載之内日月所臨華夏居中生受正氣其人性和而才慧其地産厚而類繁所以誕生聖賢繼施法教隨時拯弊因物利用三五以降代有其人君臣長㓜之序立五常十倫之教備孝慈生焉恩愛篤焉主威張而下安權不分而法一生人大貴實在於斯昔賢有言曰失道而後德失德而後仁失仁而後義失義而後亂誠謂削厚爲薄散醇爲醨又曰古者人至老死不相往來不交不争自求自足蓋疾今時澆薄美徃昔敦淳務以激勉其慕尚也然人之常情非今是古古之敦龎純悶固為可美而鄙風弊俗或亦有之緬惟古之中華類多淳朴之風有居處巢穴焉有塟無封樹焉有手團食焉有祭立尸焉聊陳一二不能遍舉其地偏其氣梗不生聖哲莫革舊風訓誥之所不可禮義之所不及外而不内踈而不戚來則禦之去則備之前代逺識之士亦已言之詳矣歴代觀兵黷武討伐戎夷爰自嬴秦禍患代有始皇恃百勝之兵威既平六國終以事强爲弊漢武資文景之積蓄務恢封畧天下危若綴旒王莽竊元始之全實志滅匈奴海内遂至潰叛隋煬帝承開皇之殷盛三駕遼左萬姓怨苦而亡夫持盈固難知足非易唯後漢光武深逹理源建武二十年人康俗阜臧宫馬武請殄匈奴帝報曰舎近而圖逺勞而無功舎逺而謀近逸而有終務廣地者荒務廣德者强有其自者安貪人有者殘自是諸將莫敢復言兵事於戲持盈知足豈特治身之本亦乃治國之要歟我國家開元天寳之際宇内謐如邊將邀寵競圖勲伐西陲青海之戌東北天門之師磧西怛暹之戰雲南渡瀘之役於異域數十萬人向無幽冦内侮天下四征未息離潰之勢其可量耶前事之元龜足爲殷鍳者矣古東夷總叙東夷有九種曰畎夷方夷黄夷白夷赤夷𤣥夷風夷陽夷干夷皆土著喜飲酒歌舞或冠弁衣錦器用爼豆所謂中國失禮求之四夷者也昔堯命羲仲宅嵎夷曰暘谷葢日之所出也夏后氏太康失德夷人始叛其後如后發即位賔于王門獻其樂舞桀爲暴虐諸侯内侵商湯革命伐而定之至於仲丁藍夷作㓂自是或服或叛三百餘年武乙衰弊東夷寖盛遂分遷淮岱漸居中土周初封商大師國於朝鮮時管蔡畔周乃招誘淮夷作亂周公征定之其後徐夷僣號穆王命楚滅之至楚靈王㑹申亦來同盟後越遷琅琊遂凌暴諸夏侵滅小國秦并天下其淮泗夷皆散爲人户其朝鮮歴千餘年至漢高帝時滅武帝元狩中開其地置樂浪等郡至後漢末爲公孫康所有魏晉得其地而三韓之地在海島之上朝鮮之東南百濟新羅魏晉以後分三韓地新羅又在百濟之東南又東南隔越大海夫餘在高䴡之北挹婁之南其倭及夫餘自後漢百濟新羅歴代並朝貢中國不絶而百濟唐顯慶中蘇定方滅之高䴡本朝鮮地漢武置縣属樂浪郡時甚微弱後漢以後累代皆受中國封爵所都平壤城則故朝鮮國王險城也後魏周齊漸强盛隋文帝時㓂盗遼西漢王諒率兵討之至遼水遭癘疫而返煬帝三度親征初渡遼水敗績再行次遼水㑹楊𤣥感奔退又往將逹涿郡屬天下賊起及饑饉旋師貞觀太宗又親征渡遼破之高宗總章初英國公李勣遂滅其國古之肅慎宜即魏時挹婁自周初貢楛矢石砮至魏常道鄕公末東晉元帝初及石季龍時始皆獻之後魏以後曰勿吉國今則曰靺鞈焉大抵東夷書文並同華夏閩越之地秦平天下以爲郡及秦亂其帥各自稱王於故地武帝元封初楊僕滅其國遷其人於江淮墟其地自漢後人庶復集遂爲郡縣矣古東夷考畧朝鮮昔武王封箕子於其地其後四十餘代至戰國時朝鮮凖亦僣稱王漢武帝平朝鮮分爲真蕃臨屯樂浪𤣥莬四郡濊濊亦朝鮮之地南與辰韓北與高句䴡沃沮接東窮大海西至樂浪自謂與高䴡同種馬韓韓有三種一曰馬韓後漢時通焉二曰辰韓三曰弁辰馬韓在西有五十四國其地與樂浪南倭接辰韓在東十有二國其北與濊貊接弁辰在辰韓之内率有二國其南亦與倭接凡七十八國百濟是其一焉地各方四千餘里東西以海爲限皆古之辰國也馬韓最大都目支國夫餘國在𤣥莵北千里南與高句􅌐東與挹婁西與鮮卑接北有弱水地方貳千里本濊地也倭即日本倭在韓及𢃄方郡東南大海中依山島爲居去樂浪郡境及𢃄方郡並一萬二千里凡百餘國其地大較在會稽東冶之東與朱崖儋耳相近統五畿七道凡三千七百七十二鄕四百一十四驛八十八萬三千三百二十九課丁課之外不可詳見高句䴡其先出夫餘王其地在遼東之東千里南與朝鮮濊貊東與沃沮北與夫餘接地方二千里多大山深谷都平壌即漢樂浪郡王險城城内惟積倉儲器械賊至方入固守王别宅于其側豆莫婁國在勿吉北千里舊夫餘地室婁之東至海方二千餘里百濟即後漢末夫餘仇台之後馬韓五十四國百濟其一也自晉以後并吞諸國據有馬韓故地其國東西四百里南北九百里南接新羅北拒高䴡千餘里西限大海至唐爲新羅渤海靺鞈分其地百濟遂絶新羅魏時新盧國焉其先本辰韓種也辰韓始有六國稍分爲十二國新羅其一也其國在百濟東南五百餘里東濵大海沃沮東沃在高句䴡葢馬大山之東濵大海而居其地形東北狹西南長可千里北與挹婁夫餘南與濊貊接北沃沮一名置隔婁去南沃沮八百餘里與挹婁接挹婁即古肅慎氏國周時貢楛矢石砮魏常道鄕公時猶貢其國在不咸山北夫餘東北千餘里濵于大海南與北沃沮接不知其北所極廣袤數千里勿吉國在高䴡北一曰靺鞨邑落各有長不相總一其人勁悍于東夷最强去洛陽五千里自和龍北二百餘里有善玉山北行三十里至祁黎山又北行七日至洛壌水水廣里餘又北行十五日至太岳魯水又東北行十八日到其國其部落凢七種渤海本粟末靺鞨附高䴡者姓大氏後建國自號震國王地方五千里盡得夫餘沃沮弁韓朝鮮海北諸國唐封爲渤海郡王蝦夷海島中小國其使鬚長四尺尤善弓矢扶桑地在中國之東去二萬餘里其土多扶桑木故以爲名女國在扶桑東千里毎至二三月競入水則姙娠六七月産子百日能行三四歲則成人矣文身梁時聞焉在倭國東北七千餘里人體有文如獸其額上有三文文大直者貴文小曲者賤大漢梁時聞焉在文身國東五千餘里侏儒國人長四尺又南有黒齒國裸國去倭四千餘里長人國在新羅之東人類長三丈鋸牙駒爪黒毛覆身不火食流求國居海島在泉州之東有島曰彭湖煙火相望水行五日而至女真葢古肅慎氏世居混同江之東長白山鴨綠水之源南鄰高䴡北接室韋西界渤海鐵甸東瀕海後漢謂之挹婁元魏謂之勿吉隋唐謂之靺鞨姓挐氏於外國中最大且强五代時始稱女真後更女直遼按巴堅吞北方三十六畨此其一也厥後阿固達代遼而帝國號曰金八世而亡國朝女直考在東北安定本馬韓之種自云高䴡舊壌渤海遺黎宋時嘗因女真貢獻肅慎氏東方强國地濕築土如堤鑿穴以居自魏延興以來累代入貢乞列迷有四種性奸貪居草舎捕魚爲生腥穢不可近今入貢北山野人乞列迷别種飬鹿乗以出入昔入貢今不通焉東夷總論范氏曰中國之有外國自古而然所貴御之得其道則我亦安也中國失政四夷交侵先王所以御之者亦可得而略聞矣舜曰而難任人蠻夷率服又曰無怠無荒四夷來王然則欲其率服莫若難任人欲其來王莫若無怠荒柔逺能邇治内安外而殊俗之民嚮風慕義不以利誘不以威脅而自至矣欲附者則撫之不欲者不强致也故不勞民不費財至於後世之君或讐疾而欲殄滅之或愛悦而欲招徠之是二者皆非也何則彼雖外國亦猶中國之民也趨利避害欲生惡死豈有異於人乎王者于天地之間無不飬也鳥獸草木猶當愛之况人類而欲殘之乎殘之固不可况不能勝而殘其民乎仁人之所不爲也爲之者秦始皇是也山川之所限風氣之所移言語不通嗜慾不同得其地不可居得其民不可使列爲州縣是崇虚名而受實弊也且得之既以爲功則失之必以爲耻其失不在於己必在於子孫故有征討之勞饋餉之煩民不堪命而繼之以亡隋煬帝是也且中國地非不廣也民非不衆也曷若自治修其禮樂刑政以惠飬吾民使男有餘粟女有餘布兵革不試以致太平不亦帝王之盛美乎故有求于外如彼其難也無求于外如此其易也然人君常舎所易而行所難何哉忽近而喜逺厭故而謀新不入于秦則入于隋雖不至于行而常與之同事其累德豈細哉朝鮮考朝鮮國本箕子所封秦属遼東外徼漢初燕人衛滿據其地武帝定朝鮮爲真畨臨屯樂浪𤣥莵四郡昭帝并爲樂浪𤣥莵二郡漢末爲公孫度所據傳至孫淵魏滅之晉永嘉末䧟入髙䴡高䴡本扶餘别種其王高璉居平㐮城即樂浪郡地唐征高䴡㧞平㐮置安東都䕶府其國東徙在鴨綠水東南里餘五代唐時王建代高氏闢地易廣并古新羅百濟而爲一遷都松岳以平壌爲西京其後子孫朝貢宋遼金歴四百餘年未始易姓元至元中西京内属置東寧路總管府畫慈悲嶺爲界國朝洪武初其主王顓表始封高䴡國王改號朝鮮其國僞分八道中曰京畿東曰江原本濊貊地西曰黄海古朝鮮馬韓舊地南曰全羅本弁韓地東南曰慶尚乃辰韓地西南曰忠清皆古馬韓域東北曰咸鏡本高句驪西北曰平安本朝鮮故地分統郡府州縣其忠清慶尚全羅三道地廣物衆州縣雄巨最爲富庶俗尚詩書人才之出比諸道倍多平安咸鏡二道境接靺鞨俗尚弓馬兵卒精强東西南瀕海北隣女直西北抵鴨綠江東西二千里南北四千里洪武二十五年徙居漢城遣使請改國號詔更國號曰朝鮮其俗柔謹知文字喜讀書崇釋尚鬼惡殺法無苛條刑不慘毒山川九都神嵩海及鴨緑江爲大按高䴡其國頗尚禮義安分守己自入國朝以來四時朝貢不廢禮節葢得小國事大之禮孟子曰畏天者保其國朝鮮有之雖然昔唐大宗以英武之君親駕於樂浪𤣥莵之境而不能得志我朝開明堂而受其朝歲時節序使幣往來曽無虚日是固德化感召之使然亦壌地接近之故也樂天字小之道其可忽諸經理朝鮮事宜竊見倭入朝鮮以來皇上廓如天之仁授之一封以罷戰息民至恩也乃倭自絶于天復渡海來則廷臣交言朝鮮當救我師當出矣顧師雖當出而用兵方畧尚宜講究昔漢臣趙充國有言帝王之兵以全取勝兵法言善戰者先據不可勝之地以示敵之可勝則所謂以全取勝也否則佳兵不祥易動難静國家之力専于一隅脫四夷内外復有蠢然而起者何以應之前者屢奉明㫖勅朝鮮自行脩備中國决無數千里轉餉爲屬國防禦之理聖慮至深矣今朝鮮既不自强而必恃我以爲强倭去復來知我虚實亦必念前計之未工而後謀之益狡此非可以虚聲下偏師克者當作萬全之計絶僥倖之意多官所議但詳言設官遣將出兵處餉之事而于戰守機宜進止緩急尚爲濶略或欲搗釡山據全慶守烏嶺恐有輕進玩敵之虞或欲扼旅順守鴨緑屯寛奠恐有隔逺遲誤之患臣等以爲兵欲争利當爲自固之謀爲自固之謀先當擇要害適中處所以立根本不㧞之基使進可以戰退可以守戰則决能制勝守則必其無敗我欲戰則戰非人可廹之而戰我欲止則止非廹于人而止其峙如山其聚如淵如此始爲萬全無憂之計莫若于開城平壌二處開府立鎮練兵屯田西接鴨緑旅順之師使有所望而歸依東爲王京烏嶺之援使有所恃而奮躍勢便則遣輕兵而趨利與倭决勝勢不便則虎踞此處足以壓其邪心而禁其無横逸須得實心練事才力兼全者爲巡撫司道而専任之聽其便宜行事中國之人欲以功名自見于萬里外者不少不問品流願從者聽就中選其才能者數十軰分各處爲之長帥就朝鮮之人雜之以漢人齊之以漢法教之以漢戰變其偷惰之風作其敵愾之氣因而務農勸織通商惠工廣樹畜之原開山澤之利其地多銅即山鼓鑄以資軍興一年之後本年之錢粟可以爲餉本地之民可以爲兵中國之轉輸歲減一歲而本地之威力歲饒一歲但資以火藥利器供其所乏而不必一一盡仰于朝廷直待夷氣悉静然後議撤如此賊知我之久屯不去必且鳥驚魚散朝鮮知我之久屯不去必且景附響從以朝鮮防朝鮮不煩中國而藩籬可厚倭奴可驅矣中國之大無難于一倭所謂難者道路逺而費用多往返難而人馬敝彼爲主我爲客故也今倭屯釡山數年且耕且輸已握勝筭吾不能然第欲以一旦調發千里争鋒利在速戰不利持久勝負之數恐未有歸倘因糧于朝鮮而不我繼求戰倭奴而不我應一乗我敝禍不可言即善能相持而軍無固志士有歸心勢亦危矣惟倭有屯蓄吾亦有屯蓄倭有轉輸吾亦有轉輸自寧前距開城一千四百里已據朝鮮之半葢以朝鮮諸道之力乗瑕避堅可緩可急休息待時雖不速進葢已不爲退計矣况以吾之歩卒加之以馬騎而當倭之徒歩以吾之兵矢益之以火器而當倭之徒兵則必勝之術始制于我開平既定得一歩則進一歩次第取慶尚忠清黄海等處屯守又如前法日廹月削而蹙之倭可立盡無疑矣凢舉事必先爲久計而偶值其早完則可苟先爲暫計而或不克如願豈不終可慮哉今談者但忿倭之不恭動以滅此朝食爲言徒求快目前不念危計不若從長計議設置巡撫司道帶領見調人馬先屯二處以資接濟以立根本仍明示德意不責㨗于旦夕之間而以經畫長久爲計烏嶺以南相機進止毋得浪戰損威烏嶺以北還定安集不許尺寸有失務使事舉而國不告乏兵出而人不知勞倘朝鮮人不爲吾使朝鮮財不爲吾用又須更奏别議勿悞大事庶幾保全勝之道也既定此䇿即當通登莱入遼之海路從此轉餉以資軍興從此渡軍以講水戰使往來之人不疲於陸且令二鎮聮絡可以相援又可以通朝鮮之黄城島涉金山而視對馬此爲長策當急行者也言者欲轉浙直舟師從海入遼北海風高少山嶼無棲泊所且舡各有宜宜於南者不宜於北以不習之卒涉波濤之險又輕萬里之逺大是危事不若從内地至登萊駕登萊之舟以入遼此最便安稳之計登萊舟雖不能遽辦從今議造亦未爲晚又今言兵者動稱南兵夫南方久不用兵所稱南兵非經戰之士葢市井少年耳虚有其名實須教習且南人風氣柔弱不耐寒苦體力之强亦不能過北人獨其攻殺擊刺之法與器械戈甲之利本爲制倭設者不可不循倣而用彼方老將猶能言之臣等以爲招南兵不如求南將以南將教練甚易與所募南兵參而用之此亦長久之計也昔趙充國欲困先零則屯金城諸葛亮再出伐魏則屯渭濵羊祐圖呉則㐮陽墾田八百餘頃其始至也軍無百日之糧及其季年乃有十年之積葢以兵非嘗試之物不得已而用則當爲老成持重長筭而行之今忠猷滿廷臣等亦試陳其愚雖機宜未必中而意則昔人之意不無可採日本國序日本在溟渤之東其地形類琵琶東西數千里南北數百里肥前肥後豐前豐後築前築後日向大隅薩摩等九州居西為首陸嶴居東為尾至山城旱程七十五日舊云陸嶴為頭薩摩大隅為尾者非山城居中乃彼國之都也山城以東地方廣邈雖倭奴逺服賈者不能閱歴而知况華人乎故其島之數可考按舊圖山城以東中為近江伊賀尾張三河美濃飛彈信濃上野陸嶴北邊海為但馬丹後若佐加賀越前越後越中出羽甲裴嘗陸南邊海為攝摩攝津太和河内逺江駿河伊豆相摩武蔵下野東北懸海則為佐渡在南懸海則為志摩七島上總下總安房而其間廣狹至於有不能考者今姑據昔之所聞者而述之山城之南為和泉其南海嶴泊舟者為阿賣介撒几為歪打阿波為干撒几為天正者為沙界衣又其南為沙界之東南為紀伊東為三河出海之口南濵大海其島為康大為科什磨為奴智紀伊之西為伊勢北為三河其嶴為腰大為阿乃奴子山城之西為丹渡左為攝津其嶴爲飄船谷爲阿家世奴辣爲素埋爲男女懐東南懸海爲安功州左之西爲攝摩其嶴爲那敗爲合箇世爲杭茄爲我這古爲磨羅右爲但馬石之西為因幡舟渡西爲美作左爲備前其嶴爲亢什麽舵爲茄賣茄里爲舎多大左之西爲備中出鉄其嶴爲山子加爲言奴乎頼爲那什麽南爲東島懸海三十里右亦因幡右之西爲伯耆沿海俱白沙無嶴可泊其鎮爲阿家殺記爲倭子介爲他奴賀知其北爲竹島懸海三十里美作之西爲備後之北境其嶴爲一子該一知爲干奴鼻爲和奴宻知爲拿敗爲赦東大出雲之南境其嶴爲畨你爲山子介爲欽子溪爲石流爲非􅀈咑爲失喇哈咑爲也生忌爲宻和奴失記其北爲隱岐懸海三百五十里備後之西爲安藝其嶴爲翁家搭曰昆敗爲法子加一枝爲窟撒子爲谷也爲他加歪喇其南爲宫岳懸海三十里出雲之西爲石見出銀與銅其嶴爲南高畨馬爲畨馬搭爲歌爲撮奴市爲有奴子北至海三千里安藝石見之西爲山口國即古之周防州也横直二百四十里其南邉海之嶴爲翁哥里爲宻火逝里爲東大爲陀奴米爲哈迷奴失記爲奴羅市米其北邉海之嶴爲斯殺爲賣抵哈打爲夜市爲高奴烏刺北至三島海靣三百五十里山口之西爲長門横直皆二日程嶴爲花浦爲薫州爲畨記爲倭委北至三島懸海三百五十里關渡在焉其西旱關爲河介馬失記抽分司投於此渡此而西爲豐前横五百里直四百里其奥爲可苦􅀈爲􅀈介襪次爲大義地爲野慢茄爲阿世夜爲暮治爲一賣其南爲豐後横直皆六百里其嶴爲福乃爲倭几奴法賣爲鎻孤舟爲由奴烏剌爲撒一基爲鳥四基又其南爲日向横直皆三百六十里其嶴爲多故奴甫治豊前之西北爲筑前横六百五十里直四百里其嶴爲右勢爲加菩里爲加打野馬爲多賣里爲一萬字爲奴打爲世加爲經字里爲多罷爲宻那多爲法哈噠即慱多之别名也其北離伊岐島海靣五百里西南爲筑後横直皆二百五十里筑後之南爲大隅其南濱海之嶴爲什麽烏思迷今之人訛傳爲懸海懸海乃大漁州也大隅與日向薩摩等連壌名爲九州大隅之西爲薩摩横直皆三百六十里其嶴爲暗孛剌爲起麻子記爲羊埋高爲康國什麽爲罷里爲拖馬里爲强頭馬里爲鸚哥里爲年市米爲仙臺爲審孛署豐後東南懸海爲土佐爲伊豫爲阿波阿波相近懸海爲炎路土佐豐後之間爲佐加關土佐至佐加關海靣一百八十里佐加關至豊後海靣七十里薩摩之北爲肥後横直皆五百里其嶴爲牙子世六爲阿麻國撒爲昏陀爲一國撒介烏刺爲開懐世利爲噠加什又其北爲肥前横直皆五百里其嶴爲鉄来爲言奴氣子爲法司奴一計爲客舎其内沿湖泊舟交易之處為倭磨喇爲知十歪爲法一溪爲夜間迷爲坐迷子爲迷坐骨知爲一掃骨拂爲愛奴乎剌爲世子爲迷古里爲失撒爲喃哥呀爲雄婆哥爲松本一名馬子喇爲法麻撒几肥前西懸海爲平戶東西海靣十里西北至慱多海靣四百五十里平戶之西爲五島五山懸海相錯而生其中其嶴可泊乃日本西境之盡處也過此西行連五六日四望無山直抵陳錢壁下此島與薩摩相去一千五百里與肥前相去四百三十里與平戶相去二百五十里五島至山口必由平戶經過其嶴爲乃路爲倭齊家爲衣屋奴宻爲通記爲逹奴烏剌爲烏苦爲話哈噠北爲多藝爲伊岐横直皆七十里至對馬島海靣五百里爲對馬島横三百里其南嶴爲哥爲甘大宻東乃爲拂乃哥世西北爲堆沙几爲山谷爲撒思乃爲知六磨爲你他北爲倭奴烏喇其西北至高䴡也必由對馬島開洋各島之人俱至堆沙几撒思乃山谷三嶴開洋至高䴡之則失多順風一日約五百里南至流球也必由薩摩州開洋順風七日其貢使之來必由博多開洋歴五島而入中國因造舟水手俱在慱多故也貢舶囘則徑收長門因抽分司官在焉故也若其入㓂則隨風所之東北風猛則由薩摩或由五島至大小琉球而視風之變遷北多則犯廣東東多則犯福建彭湖島分䑸或之泉州等處或之梅花所長樂縣等處若正東風猛則必由五島歴天堂官渡水而視風之變遷東北多則至烏沙門分䑸或過韭山海閘門而犯温州或由舟山之南而犯定海經大猫洋入金堂蛟門犯象山奉化由東西厨入湖頭渡犯昌國入后浦關犯台州入桃渚海門松門諸港正東風多則至李西嶴壁下陳錢分䑸或由洋山之南而犯臨觀過漁山兩頭相三姑山入蟶浦則犯紹興之臨山三山過霍山洋五㠘烈表平后則犯寕波之龍山觀海犯錢塘過大小衢徐公入鱉子門赭山則薄省城或由洋山之北而犯青南過馬蹟潭而西犯太倉過馬蹟潭而西北或過南沙而入大江過芩山入瞭角嘴涉谷櫝狼福山而犯𤓰儀常鎮若在大洋而風歘東南也則犯淮陽犯登莱過歩州洋亂沙入鹽城口則犯淮安入廟港灣則犯揚州再越而北則犯登萊若在五島開洋而南風方猛則趨遼陽趨天津大抵倭舶之來恒在清明之後前乎此風候不常届期方有東北風多日而不變也過五月風自南來倭不利於行矣重陽後風亦有東北者過十月風自西北來亦非倭所利矣故防春者以三四五月爲大汛九十月爲小汛其停橈之處焚刼之權雖倭得而主之而其㠶檣所向一視乎風實有天意存乎其間倭不得而主之也向之入㓂者薩摩肥後長門三州之人居多其次則大隅筑前筑後博多日向攝摩津州紀伊種島而豐前豐後和泉之人亦間有之乃固之商于薩摩而附行者也而日本之民有貧有富如攝摩伊勢若佐博多其人以商爲業其地方街巷風景宛如中華冨者各數千家有積貲至百萬者又如和泉一州富者八萬户皆居積貨殖有淑有慝如薩摩之鸚哥里方數十里其邑長安慶能納民於軌物無一人爲盗又如宫島人不嗜殺大有不平事但詣神廟罰錢又如紀伊之頭陀僧三千八百房専習武藝殺人而不犯中國富而淑者或登貢舶而來或登商舶而來凡在㓂舶皆貧與爲惡者也山城君號令不行徒寄空名於上非若我中國禮樂征伐自天子出大一統之治也山口豐後出雲開三軍門如中國總督府之義各以大權相吞噬今惟豐後尚存亦不過兼并肥前等六島而已肥前肥後筑前筑後豐前豐後山口出雲以貪滅亡山口原并國十二曰后見長門安藝備前備後備中出雲伯岐丹後因幡但馬後出雲奪歸其地山口長子死焉其君亦爲陶殿所殺豐後君以其弟攝山口事吞安藝安藝殺之嘉靖三十六年山口無君豐後獨稱雄焉山城君金印勘合久爲山口所有向未入貢俱山口自主山城惟出名而已陶殿之亂宫殿勘合俱焚金印亦損一角不知所歸貢自此絶矣欲望彼國之約束諸夷斷斷乎不能也愚聞之軍志曰無恃其不來而恃吾有以待之斯言也禦倭之道備矣告自今大修祖宗舊制禁戢沿海接引之人擇守令阜民生儲糗糧練精鋭冦來則殺之入貢則撫之通商則絶之如是而亂有不息者吾未之信也日本國考在囘囘舘今移于此以便覽日本即倭奴國在東南大海中依倚山谷高䴡在其北新羅百濟在其西北地勢東高西下於閩浙爲東北隅王以王爲姓文武僚佐皆世其官有五畿七道各有所屬州州以統郡其附庸國凢百餘自北岸去拘邪韓國七千里曰對海國又南渡一海千里曰瀚海國又渡一海千餘里曰未羅國東南陸行五百里曰伊都國又東南百里曰奴國又東百里曰不彌國又南水行二十日曰投馬國又南水行十日陸行一月曰邪馬一國其次曰斯焉國曰已百支國曰伊邪國曰郡支國曰彌奴國曰好古都國曰不呼國曰姐奴國曰對蘇國曰蘇奴國曰呼邑國曰華奴蘇奴國曰呼邑國曰鬼國曰鬼奴國曰邪馬國曰躬臣國曰巴利國曰支惟國曰烏奴國皆附倭境其國小者百里大者不過五百里戶少者千餘多不過一二萬自漢武帝滅朝鮮驛通漢者三十許國皆稱王其大倭王居邪焉臺國即邪摩維是已光武中元初始來朝貢後國亂國人立其女子曰卑彌呼爲王卑彌死其宗女壹與繼之後復立男王並受中國爵命歴魏晋隋唐皆來貢稍習夏音唐咸亨初惡倭名更號日本自以其國近日所出故名曰日本故小國爲倭所併因冐其號焉宋雍熈後累來朝貢熈寕以後來者皆僧也元至元初遣使招諭不至因命使由高䴡且介高䴡王植致書諭意皆不報至十七年春二月顧殺國使杜世忠等世祖怒於是召范文虎議廣募士卒伐之踰年遂率兵十萬以往至五龍山暴風破舟文虎等擇好舟乗走棄餘衆山下衆推張百戶爲主將伐木造舟㑹倭來戰盡殱焉逃歸者纔三人終元之世使竟不至以上俱寰宇一統等志及元史本朝洪武二年命臣趙秩往諭其國王良懐遣使臣僧祖朝貢自後數歲一來後屢入㓂且與胡惟庸通謀惡之著爲訓絶不與通爰命信國公湯和經畧沿海自遼左至徐聞甚具詳具沿海圖志永樂以來嘗遣太監鄭和招諭諸夷日本首先納欵乃給勘合百道許其通貢仍非時㓂至十九年大㓂遼東等處總兵官劉江盡殱之於望海堝海氛始熄百八十年海上恬晏姦商造孽乗時跳梁大掠沿海内地自壬子至戊午㡬至㴞天幸而渠魁授首兇燄頓衰雖間或弗靖然要領絶矣故永安長筭其猶須詳議乎海㓂圖說始倭之通中國也實自遼東由六朝及今乃從南道浮海率自温州寕波以入風東北迅自彼來此約可四五日程而西風迅自此之彼約亦四五日程葢其去遼甚逺而去閩浙甚邇若盡其國界則東西也長行可四五月南北也短行三月而皆極於海其西北至高䴡也必由對馬島開洋順風僅一日二日南至琉球也必由薩摩州開洋順風七日其貢使之來必由博多開洋歴五島而入中國以造舟水手俱在博多故也貢舶囘則徑收長門抽分司官在焉故也若其入㓂則隨風所之東北風猛則由薩摩或五島至大小琉球而仍視風之變遷北多則犯廣東東多則犯福建彭島或泉州等處或梅花所長樂縣等處若正東風猛則必由五島歴天堂官渡水而視風之變遷東北多則至烏沙門分䑸或過韭山海閘門而犯温州或由舟山之南而犯定海經大猫洋入金口門犯象山奉化由東西厨入湖渡犯昌國入石浦関犯台州入桃渚海門松門諸港正東多則至李西嶴壁下陳錢分䑸或由洋山之南而犯臨觀週源山兩頭洞三姑山入之臨山三山過霍山洋五嶼寕波之龍山觀海犯錢塘過大小徐公鼈子門諸山薄城或由洋山之北而犯青村南􅚈過馬頭潭而西犯太倉過馬蹟潭而西北或過南沙而入大江過茶山而入嘹角出而犯𤓰儀常在大洋而風歘東南也則犯淮揚登萊過歩州洋亂沙入鹽城口則犯淮安入廟灣港則犯揚州兩越而北則犯登萊若在五島開洋而南風方猛則趨遼陽趨天津大抵倭舶之來恒在清明之後前乎此風候不常難準定清明後方多東北風且積久不變過五月風自南來不利於行矣重陽後風亦有東北者過十月風自西方來亦非所利故防海者以三四五月爲大汛九月十月爲小汛其停橈之處焚刼之權雖曰在倭而其㠶檣所向一視乎風實有天意有備者率勝前此入㓂者多薩摩肥後長門三州之人其次則大隅竺前竺後博多日向攝摩津州紀伊種島而豐前豐後和泉之人亦間有之葢因商於薩摩而附行者葢日本之民有貧有富有淑有慝富而淑者或因貢舶或因商舶而來其在㓂舶率皆貧而惡者且山城君號令乆不行於諸島而山口豊後出雲又各専一軍如中國總督府之義相吞噬今惟豐後强頗併肥前等六島而有之山口出雲俱以貪滅亡倭葢無尊定主矣山城君倭王别號也此叚乃崑山鄭上舎若曽所聞於蔣州夷萊庭云海中泊舟自潭岸山以北以西之海水淺多硬大船誤閣則破壊且無避風安嶴兵船至彼如遇夜必須當洋下碇碇不能堅毎被急流飄去或夜半發風則尤危然多頼天幸非安計然則宜如何曰錢塘江烏嘴頭浦内船兵一枝不可無餘則揀陸兵精率一枝以待而嚴龕赭嘴探逺諜焉庶救倉猝或曰賊舟何能至此曰賊用單桅小舟徑抵山邊閣乾登刼故必用陸兵追捕方不走脫若以兵船必髙大方能勝賊如與賊舟等則勝負未可必也今言禦賊於海也易要非通論海本遼濶舟行全藉天風與潮人力能幾風順而重則不問潮候逆順皆可行若風輕而潮逆甚難夏秋之間西北風起不日必有極大西北風也操舟者見此風候須急收安嶴兵船在海毎日遇晚俱要酌量收舶安嶴以防夜半發風至追賊亦要預計今晚收舶何嶴若一意前追遇夜風起悔無及矣海中嶴港沿海之中上等安嶴可避四靣颶風者凡三十三處曰馬蹟曰兩頭峒曰長途曰高丁港曰沈家門曰舟山前港曰潯江曰烈港曰定海港曰黄岐港曰梅港曰潮頭渡曰石浦港曰猪頭島曰海門港曰松門港曰蒼山嶴曰玉環山梁嶴等嶴曰楚門港曰黄花水寨曰江口水寨曰大嶴曰女兒嶴中等安嶴可避兩靣颶風者凡一十八處曰馬木港曰長白港曰滿門曰觀門曰竹齊港曰石牛港曰烏沙門曰桃花門曰海閘門曰九山曰爵溪嶴曰牛攔磯曰旦門曰大陳山曰大床頭曰鳯凰山曰南麂山曰霓嶴其餘下等安嶴只可避一面颶風如三姑山衢山之類不可勝數必不得已寄泊一宵若停久恐風反别迅不能支矣又潭岸山灘山許山之類皆團生無嶴一靣之風亦且難避可不慎乎海戰用舟海戰雖藉風潮全在舟械堅善今造以利徒既苦窳疎薄而軍數率詭名冐餉即執械下碇俱乏人故兵不可戰而舟難出洋甚者利倭焚焼以滅跡藉口弊焉極矣觀元兵至五龍山大風破舟然范文虎猶擇得堅好者乗以遯使能盡䕶破舟奔山之人不自相争猶可一戰以俟伐木造艦而相棄如仇莽無約束遂致被虜俱殱同塟鯨穴可恨哉邊海守備國初懲倭之詐縁海備禦㡬於萬里其大爲衛置軍四千六百四十人次爲所置軍一千二百餘人又次爲巡檢司置弓兵百人少亦不下數十人大小相維經緯相錯星羅棊布狼顧犬防故所在製有數百料大船八櫓哨船若風尖快船高把稍船十槳飛船凡五等至如浙定海昌國貢道所經切近彼島則船數倍蓰他處而以時出哨各有限準如三月爲頭哨四月爲二哨五月爲三哨號大汛至六月收港避風及秋七八九月亦如前爲小汛汛必回衛休息責令各取印到单海物爲驗至各港次嶴所則又設有水寨營柵以止舍之而統指揮千百户鎮撫總以閫職督以憲臣所以制禦之者宻矣而歲久人玩法去盗生二十年來山頽瀾倒當事者見不可用遂别募以充逺徴以禦改造巨艦一切從宜而舊法因廢不講則亦懲咽之過矣自頃客兵驕暴鮮克宣勞故中外建言鄕兵似矣然徇名弗思終屬文具夫所謂鄕者對客兵而言豈謂荷鋤秉耜穡奴牧竪然哉竊謂衛所巡司軍壯弓兵之類宜因舊法潤澤損益之務足故伍或抽羡丁壯或僉壯士無論軍舎通融凑攅優與津給而以其半哨守其半團練更迭肄之俾皆可戰或慮一時未習不足應猝則量留舊募與調之選以備緩急久之或可盡罷一守石浦而循焉雖然此特治其標末云爾若夫約己裕人宜民酌損修明法紀變易風俗力挽衰頽黷冐之習務敦忠實節愛之政是謂自治是謂先爲不可勝則存乎其人焉矣海中風汛按海㓂舊乗風汛易於爲備歲凡仲春東南風始迅畨舶乃西北行至秋而歸今任其何風可轉㠶借發往者由新羅百濟至遼陽南下本朝初由大小琉球迂繞福建至浙近乃發五島由八山霍山直對寧波不五日夜必至浙發則無時海㓂情弊按國初呉淵頴論倭書説盡事情乃引辛毗對魏文帝之言曰罷我互市任彼貿易中國免徼利之名外夷知效順之實計莫便於此惟其商道不通而利之所在人必趨之不免巧生計較商轉而爲㓂商道既通則㓂復轉而爲商彼其既犯國禁思圖苟安因㗖引勢家同作勾當行之既久不免惹起奸圖大生覬覦時則不因商貢不通而實成㓂心矣伏按國初禁海之例始因遣諭不來繼恨林賢巨燭之變欲與閉絶之故非以通商之不便耳惟其不通商而止通貢所以正德年間各道争貢以䂓利市在彼國則强請勘合倭王遂不能禁制在中國則有宗設宋素鄕之禍而漳寧惡少則甘蹈負固而縱肆横行然以前狡僞未備華夷兩家行之既久併力合作乃有不可知者推厥所原各爲行商之意而終貽地方之害能無處乎禦倭問答問曰近日倭㓂剽掠爲患倐來忽去備之無餘力攻之無定形何以保東南民社而安室家也曰聞諸洪武永樂間倭夷數犯而莫禦今惟漳㓂耳且敕巡撫嚴督之是以激而變生欲弭之請考前之無㓂者何謹微以防漸不必過嚴不治治之而冦息矣又曰禦海冦與山冦不同故禦山冦利用攻禦海冦利用守攻貴神速守貴招降是以憲臣廣投檄文以誘其從將臣勤加巡望以嚴其備則海㓂得生而居民無擾也又曰禦㓂無難在得人在據險在利器在足餉在令嚴夫統率紈綺士卒尫羸人匪得也南藍田以及興福東龍王以膺琴室北武場以至楊村踈而且曠險勿據也戈矛幹脆而鐵綉甲胄線穿而紙糊器不利也歲久不支包侵爲弊枵腹稱貸妻子啼饑食不足也守而敵者無功退而逃者不罪令匪嚴也必總戎者身先行伍内守者勤加策應伏兵以絶汲道寫逺居民則徙之入城此保海鹽一隅之策若欲海㓂悉平必須憲臣奏請沿海凢泊船處所多設市舶司有貨稅貨無貨稅船船出地方給以票証人皆好生而嗜利化㓂而爲良善且因以裕國用矣又曰破海㓂其策有三防其源困其遥間其黨也沿海出船海口查其家註之冊誘其親属俟㓂囘諭其降以自新不罪又嚴禁不使招引下船則在海者日減而無増此防之策也海㓂食必須米飲必須泉截其掠米汲泉之路可也可泊之處悉立鐵尖撞椿隱于水靣礙其來船可也詗其聚泊束芻灌油桴筏隨之順風縱火可也此困之策也或取重囚許釋其罪持檄往喻能殺大船㓂首來降者賞以爵能殺小船㓂首來降者賞以金登岸對陣投戈自降者不罪或用木牌硃漆書寫順流浮至海船聚處㓂必取視自相猜疑而黨不固矣此間之策也夫用間自古長勝之策不特可消海㓂而已也日本國考日本國考日本古倭奴國海中諸夷倭奴最大西南至海東北至大山國主世以王爲姓羣臣亦世官地分五畿七道三島又有附庸國百餘拘邪韓最大其國小者百里人不過五百里戸少者千多止一二萬皆倭種也漢滅朝鮮通使稱王者三十餘國倭主最雄長者居邪馬臺即邪摩維歴漢魏晉宋隋皆朝貢稍習華音唐咸亨初惡倭名更號日本國朝洪武二年倭㓂山東瀕海郡縣又㓂淮安三年㓂山東轉掠浙東福建旁海諸郡是年遣萊州府同知趙秩賜璽書諭其王良懐言倭㓂海上書至日如臣我奉表來庭不臣則脩兵自固先是勝國時曾遣使趙良弼襲擊日本遂絶不通中國比秩至疑爲良弼後將刃之秩言今天子文德武功非蒙古比且曉以禍福王乃懼禮秩遣僧進方物隨秩奉表稱臣入貢使未至又掠温州五年遣明州天寧僧祖闡南京瓦棺寺僧無逸開諭之王遣使同二僧入貢是年㓂海鹽澉浦温州初令浙江福建造海舟防倭而倭又㓂海上諸郡六年以于顯爲總兵官出海巡倭㓂倭㓂登萊七年㓂膠州是年遣僧來貢無表文却之其臣亦遣僧貢馬茶馬刀扇上曰此私交也亦不受令中書移文責王九年遣僧歸庭用等奉表貢馬及方物謝罪賜王及使文綺有差已而上覽表曰良懐不誠詔責之十二年來貢無表文安置使人於陜西畨寺十三年遣使詔諭良懐遣僧如瑶貢馬令禮部移書責王數掠我海上復却之諸僧皆安置川陜畨寺十四年遣僧入貢乞還安置諸僧使上曰日本既謝罪還其使召至京宴賞遣歸十五年歸庭用又來貢于是有林賢之獄曰故丞相胡惟庸通日本葢訓所謂日本雖朝實詐暗通奸臣胡惟庸謀爲不軌故絶之也是時惟庸死且三年矣十六年㓂金鄉平陽十七年如瑶又來貢坐通惟庸發雲南守禦是年遣信國公築登萊至浙沿海五十九城民丁四調一爲戍兵二十二年置浙東西防倭衛所是年遣江夏侯周德興築福建海上十六城設衛所遂垜福建漳泉人爲戍兵二十六年㓂金鄉二十七年二月遣都督僉事劉徳商嵩巡視兩浙防倭三月又勅都督楊文尋又勅魏國公徐輝祖安陞侯呉傑練浙江海上兵防守倭二十八年㓂金州靖難後太監鄭和等帥舟師三萬下西洋日本遣人來貢併擒犯邊賊二十餘人即付使人治之縳置甑中永樂二年使還遣通政趙居任賜王冠服文綺金銀古器書畫又給勘合百道令十年一貢毎貢正副使等毋過二百人若貢非期人船踰數夾𢃄刀鎗並以㓂論居任還不受王餽上喜厚賜之尋命僉都御史俞士吉賜王印誥冊封爲日本國王詔名其國之鎮山曰壽安鎮國山上爲文勒石久之嗣王道義卒子源道義嗣益奸狡時時令各島人掠我海上九年㓂磐石十五年㓂松門金鄕平陽是年遣禮部員外郎吕淵諭王還所掠海上人十六年遣使謝罪十七年倭賊數千分乗二十舟進圍望海堝遼東總兵劉江率精兵設伏出竒斬首七百四十二生捕八百五十七召江至京封廣寧伯自是不敢窺遼東二十年㓂象山宣德元年遣人來貢人船刀劍不奉我約束上諭使臣自後貢毋過三舟使人毋過三百刀劒毋過三十否則不受七年遣人來貢如約束受之八年源道義卒命太監雷春少卿潘賜等弔祭十年嗣王遣使貢謝倭自得勘合方物戎器滿載而來遇官兵矯云入貢貢即不如期倖臣幸無事輙請俯順夷情主客者爲畫可條奏即復許貢云不爲例嗣後再至亦復如之我無備即肆出殺掠滿載而歸宣德末年海防益備賊不得間貢稍如約遂許夷至京師宴賞市易飽恣其欲已而備禦漸踈正統四年㓂大嵩入桃渚焚刼屠掠慘毒不可言於是朝廷下詔備倭命重帥守要地増城堡謹斥堠修戰艦合兵分番屯住海上㓂盗稍息七年來貢十一年復㓂寧乍浦成化初忽至寧波知我有備矯稱進貢守臣爲請于朝且欲遣之至京楊文懿公守陳貽書張主客力言其不可許二十年遣周瑋等來貢𢎞治八年壽蓂來貢正德六年宋素卿永壽來貢求祀孔子儀注不許鄞人朱澄告言素卿本臣從子叛從夷人守臣以聞主客以素卿正使釋之令諭王效順無侵邉八年僧桂梧等來貢嘉靖元年王源義植無道國人不服諸道争貢大内藝興遣僧宗設細川高遣僧瑞佐及素卿先後至寧波故事凡畨貢至者閱貨筵席並以先後爲序時瑞佐後至素卿奸狡饋市舶太監以重寳先閱瑞佐貨宴又令坐宗設上宗設席間與瑞佐忿争與相讐殺太監又隂助佐授之兵器殺總督備倭都指揮劉錦大掠寧波旁海鄕鎮素卿坐叛論死宗設瑞佐皆釋還給事中夏言上言禍起于市舶禮部遂請罷市舶自是畨貨至不得市輙賖奸豪家久之奸豪欺負日積畨人坐索不得償遂出没海上爲盗諸負貨者利其速去以危言嗾官府出兵捕之畨人益怨恨大肆殺掠而中國又多爲之嚮導於是王忤瘋徐必欺毛醢風之徒皆我華人稱王海島攻城掠邑浙東大壊二十五年以朱紈為浙江巡撫都御史兼領福興漳泉軍務紈勇于任事上章暴二三勢豪通畨狀竟爲勢豪阻誣被劾恚憤卒其所任福建副使柯喬都指揮盧鏜殺賊有功皆論死繫獄於是羣盗肆起益無忌憚三十一年殘黄岩掠定海全浙騷動遣都御史王忬巡視兩浙兼領福興泉漳四郡以都指揮俞大猷湯克寛爲㕘將剿賊時兵政久弛所在無備忬經畧未幾羣盗總至勢益猖獗三十二年大猷出洋焚賊巢羣賊乗風奔突倐忽千里徧畧温台寧紹杭嘉蘇松淮揚十郡破昌國臨山霩􅛾乍浦清村南匯呉淞江諸衛三十三年遂犯江北海門如臯通州皆被殺掠是時復用盧鏜爲㕘將而以俞大猷爲浙直總兵未㡬工部侍郎趙文華以海賊猖獗請禱海道遂遣文華行禱公私勞費不貲皆歸囊橐比忬改大同巡撫徐州兵備李天寵代忬南兵部尚書張經提督浙閩江南北軍務有王江涇之㨗文華又出監督監軍素忌經天寵逮詔獄論死西市而以浙江巡按胡宗憲代天寵南户部侍郎楊宜代經自後賊益熾縱横出入二十六郡宗憲計擒賊首汪直浙西江東稍得安寧浙東温台江北淮揚尤被其毒時李遂巡撫淮揚以智畧誘至廟灣縱兵殱之四十年賊破興化政和夀寧平海銅山寧徳等郡縣巡撫譚綸總兵戚繼光募浙兵剿平自是始更置政府絃轍一新中外文武大吏悉心經畧武威稍振賊雖時肆㓂掠多創少利沿海郡邑始免倭患矣計處野酋按平秀吉此酋起于厠役由丙戌至今不十七八年而簒奪國柄詐降諸島縶其子弟臣其父兄不可謂無奸雄之智興兵朝鮮席捲數道非我皇上赫然震怒命將東征則朝鮮君臣幾于盡爲俘虜不可謂無攻伐之謀整造戰艦以數千計徴兵諸州以數十萬計皆曩時之所未有日夜圖度思得一逞不可謂無窺中國之心使其遣酋出衆乗風揚㠶㓂我沿海府郡備禦兵力容有未完一時勝負得失是未可知也然臣等竊料平秀吉一狡詐殘暴之夫耳本以人奴簒竊至此彼國諸酋欲爲秀吉之爲而思攘奪之者甚衆隂謀伐國構怨亦深如結薩摩州將幸侃逼令州官義久殺其弟中書以自明義久不得已而佯爲降順其心未嘗一日忘秀吉也奪豐後州官之妻爲妾民間妾女充塞卧内淫虐百端諸州質子禁若囹圄父子兄弟不能相見共不勝其仇讐忿恨之情日本原無征科之擾而今令各州逺道輸糧原無興大兵動大衆之舉而今則徵發騷然舉國鼎沸倭之人民何以堪命日肆殺人而虞其噬多行不軌而慮其毒故出則蒙靣卧則移徙彼亦自知其不免于禍以事理䇿之秀吉之自㡳滅亡可計日而待也今夫謀動干戈驅無辜之蒼赤而欲盡置死亡之地此爲神明之所不與恃其取諸州之故智以襲朝鮮慿其破朝鮮之餘威思犯中國盡起國内之將爲無前之舉怒臂當車不量彼己兵驕者敗豈可長久且彼雖十萬之衆航海而來我沿海舟師以主待客以逸待勞隨至隨擊勝筭在我而又絶嚮導乖其所之彼未可以遽入吾地也戰艦雖巨而多離船則不能守守之則不能登陸而戰兵以數萬計日須數萬石之糧我堅壁清野使無所掠食則困斃立至曩時倭犯浙直閩廣之間雖有生靈受其塗毒卒就殱滅曽無生還昨入朝鮮之倭不下一二十萬遇我王師僅二三萬一戰退怯偵其死亡者過半其伎倆可知矣蕞爾夷邦主者不過一匹夫之勇左右羽翼非素親信曽無韓白之畧又或懐豫譲之謀故以臣策之此酋必不能得志于我而不戢自焚旋就顛蹶亦理勢之所必然今中外洶洶有畏蜀如虎之意者皆過也若夫封貢之説䑓省禮部諸臣言之甚詳臣等無容復置其喙竊謂日本有山城君在雖其懦弱名分猶存一旦以天朝封號加之僭逆之夫且將置山城君於何地崇姦怙亂乖紀廢倫非所以令衆庶而示四夷也比來諳達之孫巴罕鼐濟來投於我我執以爲質而彼卑辭求之因而還其孫鼐濟與之議通貢市假以王封先帝有不殺之恩外藩無要挾之迹此一時機㑹偶有可乗而然而今非若此也平秀吉無故興兵聲言内犯䧟我屬國東征之師相拒日久損失日多碧蹄戰後暫退釡山尚未離朝鮮境上而我以細人之謀聽其往來講封講貢若謂朝廷許我封貢則退不許我封貢則進要耶非耶近朝鮮國王李昖奏稱倭賊方于金海釡山等處築城造屋運置糧器焚焼攻掠無有已時至稱屠戮留州死者六萬餘人尚可謂之退兵乞和耶夫乞封固非秀吉本謀然藉此名號以讋服諸夷益以恣其狂逞之志則秀吉亦姑爾從之行長小西飛諸酋懾于平壤王京之戰既未能長驅直入而入朝鮮者又死亡數多恐無辭于秀吉䘮師之戮亦姑假封貢之説以紿秀吉而緩其怒是以沈惟敬軰僥倖苟且之謀得行乎其間若我經畧總督諸臣不過因惟敬軰而過信行長諸酋又因行長諸酋而錯視平秀吉不知秀吉豺狼之暴狐兎之狡變詐反覆必不可以信義處者也兹觀總督所呈請封表文末云世作藩籬之臣永獻海邦之貢因封及貢其情已露於此葢秀吉狂謀蓄積已久一封必不足以厭其意要而得封必復要而求貢求市得隴望蜀憑陵及我朝廷又將何以處之朝鮮李昖之奏亦謂賊兵仍舊屯留聲言待天朝准許封貢乃退又放出臣貳賤息無非所以姑緩天兵而求逞兇計則倭酋之情朝鮮君臣知之矣今當事之議欲令倭盡歸島不留一兵于朝鮮以聽命顧彼方進兵攻掠肆無忌憚又安肯收兵還國憣然順從揆情度勢臣等恐其不能得此于彼也即使暫時退兵旋復入㓂敗盟之罪又將誰責即議者多謂封貢不成倭必大舉入冦不知秀吉妄圖情形久著封貢亦來不封貢亦來特遲速之間耳六十六州與朝鮮一國先和後取此其狡謀明甚奈何堂堂天朝而可下同於海外小國之愚耶伏乞皇上大震天威罷議封貢明詔天下以倭酋平秀吉干犯天誅必不可赦之罪兼勅文武將吏及詔諭日本諸酋長以擒斬平秀吉則有非常之賞破格之封朝廷不封兇逆之夫而封其能除兇逆者以此曉然令於天下然後奸權䘮膽豪傑生氣平秀吉一酋不久當殄滅無難也臣等迂籌以爲今日之計莫妙於用間莫急於備禦莫重於征剿何者倭酋倡亂惟在平秀吉一人諸州酋長多靣降而心異中間有可以義感者有可以利誘者秀吉原無親戚子弟股肱心膂之人儻得非常竒士宻往圖之五間俱起神秘莫測則不煩兵戈而元兇可擒一獲元兇倭亂頓弭故曰莫妙于用間備禦之策頻年屢奉明㫖申飭當事諸臣亦云嚴矣臣等竊惟遼陽天津兩地宻邇京師一由朝鮮渡鴨緑江而上一由山東海靣乗風疾趨設有踈虞令倭得長驅而入震驚宸極此不可以不慮宜將東征之兵挑選或増募二三萬人遣大將二員分屯兩地以防不測其各省直水陸兵防更於今日嚴爲整備俟其入㓂五境或犄或角相爲戮力殱此不可恃其不來一日懈緩故云莫急於備禦然用間妙矣恐未可必得志於彼備禦急矣恐未能使䘮膽於我臣等以爲彼不内犯則已果其内犯大肆猖狂乞我皇上與二三大臣定議征討特發内帑百萬分助諸省打造戰船二千餘隻選練精兵二十萬人乗其空虗出其不意㑹師上遊直擣倭國順命者宥逆命者誅彼秀吉一酋何能逃遁此所謂堂堂之陣正正之旗名其爲賊敵乃可服者也故曰莫重於征剿或者謂興師逺渉爲費不貲當國計詘乏時何以堪此臣等計之山東浙直閩廣備倭兵餉歲不下二百萬兩積之十年則二千萬兩又積之三五十年其費不可勝窮今征剿所費不過一歲之需而足若倭奴蕩平之日海防又可息肩各處歲辦餉銀可以坐省其半一勞永逸事半功倍未有若斯舉者矣臣聞元世祖曽以舟師討倭致溺十萬衆於五龍山下談者恒以為口實臣竊料秀吉雖雄其實虜人不諳海上形勢當時將帥必多逹官俾不習波濤不識風汛之人而驅駕海洋直顛倒沉溺雖百萬何用今在東南而用舟師則大不然必習波濤必知風汛乗時而往無憂覆溺試觀沿海商民興販各國者百鮮失一故元事非所論于今日也夫人情慮倭而畏其來又惟議株守而憚于往是以倭酋得恐嚇要求於我誠知所以備禦之策與夫攻伐之謀不患其來復制其往則彼雖狡詐百出無所用之兵志所謂先聲後實又謂未戰而廟筭者此舉是也制倭八策今倭之疲中國也雖自遼東由六朝及今實從南道浮海率自温寧以入葢其去遼甚逺去浙閩甚邇也其入㓂則隨風所之或由薩摩五島至琉球而犯閩廣或由五島歴天堂官渡至烏沙門分䑸過韭山海鴨門而犯温州或由舟山之南而犯定海犯象山奉化犯昌國犯台州若至李西嶴壁下陳錢分䑸由洋山之南而犯臨觀犯錢塘過南山而入大江在大洋也則犯淮揚登萊若在五島開洋則趨遼陽趨天津矣其舶之入全視風候大要春之後冬之前匪是者不利往此入犯之大較也彼既出没不一其地則海防不得不周彼既往逞不一其時則海汛不得不謹所以制馭之策有八諸所恒稱簡兵足餉重將議援之類不與焉一激朝鮮而夾攻可資二刺敵隱而勝筭可决三廣用間而大首可折四奮火攻而衆寡可易五重屯戍而險扼可固六蒐軼才而衆智可集七得樞督而竒勲可奏八搗賊瑕而属圍可解區區小醜何足慮哉琉球事實琉球國在福建漳州東福州東北大海中漢魏以來不通中國隋大業中令羽騎尉朱寛訪求異俗始至其國語言不通掠一人以返遣武賁中郎將率兵再徃虜其男女五百人還唐宋時未嘗朝貢元遣使招諭之不至國朝首先歸附率子弟來朝太祖嘉其忠順賜符印章服及閩人之善操舟者三十六姓又許其遣子及陪臣之子來學於國學分其國爲三曰中山王曰山南王曰山北王皆遣使朝貢永樂來其國王嗣立受冊封自後惟中山王朝貢不絶其山南山北二王俱爲所併云我使者去必孟夏來以季秋乗風便也厥貢方物率市諸他國本國無所有厥期二年一行每船止許百人多不過百五十人按琉球國在漳州之東自福州視之則在東北是以去必孟夏而來必季秋乗風便也國無典籍其沿革不能詳然隋兵刼之而不服元使招之而不從我太祖之有天下也不加兵不遣使首効歸順其忠順之心無異越裳氏矣故特賜以閩人之善操舟者三十有六姓焉使之便往來順朝貢亦作指南車之意焉在昔其國三分今中山三并而爲一者得非沃强晉弱之故歟風俗男子不髭亦不羽冠但結髻于首之右凢有軄者簮一金簮漢人之有髻則結于髪之中俱以色布纒其首黄者貴紅者次之青緑者又次之餘斯下矣王首亦纒錦帕衣則大袖寛博製如道服然腰束大𢃄亦各有首纒布之色辨貴賤也足則無貴賤皆有草履入壁宇則脫之一則席地而坐恐塵汚一則以跣足爲敬故王見神臣見王及賔主相見皆若是也惟接見平等則加冠具服履揖遜之間毎見其疾首蹙額弗勝其束縳之勞矣其君臣之分雖非華夷之嚴而上下之節亦有等級王之下則王親尊而不與政也次法司官次察度官司刑名也次那壩港司錢榖也次耳目之官司訪問也此皆土官而爲武職者也若大夫長史通事等官則専司朝貢之事設有定員兼文武者也王日視朝自朝至于日中昃凡三次陪臣見之則搓手膜拜尊者親者延至殿内賜坐賜酒其卑而踈者則移時長跪于階下焉凡遇元旦聖節長至日率衆官具冠服設龍亭行拜祝禮葢久漸文教非復曩者之陋矣父之于子少雖同寢及長而有室則異居食亦用匙筯得異味先進尊者及子爲親䘮數月不食肉亦其俗之可嘉死者以中元前後用溪水浴其屍去腐肉收其骸骨以布帛纒之裹以韋草襯土而殯上不起墳若王及陪臣之家則以骸匣藏于山穴中仍以木版爲小牖户歲時祭掃則啓鑰視之葢恐其木朽而骨暴露也地無貨殖是以商賈不通若以爲防剽掠則其國小法嚴凢有竊物者即加以劓刖之刑人誰敢犯朝貢往來俱乗大船海邉魚鹽亦泛小艇未嘗不駕舟楫而縳木爲筏也俗畏神神皆以婦人爲尸凢經二夫者則不之尸矣王府有事則哨聚而來王及世子陪臣皆頓首百拜所以然者以國人凡欲謀不善神即夜以告王就擒之聞昔倭㓂有欲謀害中山王者神即禁錮其舟易水爲鹽易米爲沙尋就戮矣惟其守䕶斯土是以國王敬之國人畏之也王之宫室建于山巔國門扁曰歡㑹府門扁曰漏刻殿門扁曰奉神四圍皆石壁至於賦歛則寓古人井田遺法但以名義未詳備其臣民亦各分土以爲祿食上下不交征有事如封王所用布帛粟米力役之征則暫取之民而不常也雖無經生慱士之流亦曉漢字奉正朔豈至視月盈虧以知候視草木榮枯以計歲哉總論琉球僻居海島雄視東南自以爲鳩國之固也用是歴代以來不襲朝貢隋元臨之以兵使卒不奉用至我國家向化獻琛胄子就學其殆可以德綏未可以威刼者耶圖書編卷五十
