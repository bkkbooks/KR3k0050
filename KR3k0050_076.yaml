body:
  text: 圖書編卷七十六明章潢撰朱子曰天地以生物為心者也而人物之生人各得夫天地之心以為心者也故語心之徳雖其總攝貫通無所不備然一言以蔽之則曰仁而已矣盖天地之心其徳有四曰元亨利貞而元無不統其運行焉則為春夏秋冬之序而春生之氣無所不通故人之為心其徳亦有四曰仁義禮智信而仁無不包其發用焉則為愛恭宜别之情而惻隠之心無所不貫故論天地之心者則曰乾元坤元則四徳之體用不待悉數而足論人心之妙者則曰仁人心也則四徳之體用亦不待遍舉而該盖仁之為道乃天地生物之心即物而在情之未發而此體已具情之既發而其用不窮誠能體而存之則衆善之源百行之本莫不在是此孔門之敎所以必使學者汲汲於求仁也其言有曰克己復禮為仁言能克去己私復乎天理則此心之體無不在而此心之用無不行也又曰居處恭執事敬與人忠則亦所以存此心也又曰事親孝事兄弟及物恕則亦所以行此心也又曰求仁得仁則以讓國而逃諌伐而餓為能不失乎此心也又曰殺身成仁則以欲甚於生惡甚於死為能不害乎此心也此心何心也在天地則坱然生物之心在人則温然愛人利物之心包四徳而貫四端者也或曰若子之言則程子所謂愛情仁性不可以愛為仁者歟曰不然程子之所謂以愛之發而名仁者也吾之所論以愛之理而名仁者也盖所謂情性者雖其分域之不同然其脉絡之通各有攸屬者則曷甞判然離絶而不相管哉吾方病夫學者誦程子之言而不求其意遂至於判然離愛而言仁故特論此以發明其遺意而子顧以為異乎程子之説不亦誤哉或曰程氏之徒言仁多矣盖有謂愛非仁而以萬物與我為一為仁之體者矣陳淵問楊龜山曰萬物與我為一其仁之體乎曰然亦有謂愛非仁而以心有知覺釋仁之名者矣上蔡謝氏曰心有所覺謂之仁仁則心與事為一草木五糓之實謂之仁取名於生也生則有所覺矣四體之偏痺謂之不仁取名於不知覺也不知覺則死矣事有感而隨之以喜怒哀樂應之以酬酢萬變者非知覺不能也身與事接而心漠然不省者與四體不仁無異也然則不仁者雖生無以異於死雖有心亦鄰於無心雖有四體亦弗為吾用也故視而弗見聴而弗聞食而不知其味此善學者所以急急於求仁也今子之言若是然則彼皆非歟曰彼謂物我為一者可以見仁之無不愛矣而非仁之所以為體之真也彼謂心有知覺者可以見仁之包乎智矣而非仁之所以得名之實也觀孔子答子貢博施濟衆之問與程子所謂覺不可以訓仁者則可見矣子尚安得復以此而論仁哉抑泛言同體者使人含糊昏緩而無警切之功其弊或至於認物為巳者有之矣専言知覺者使人張皇迫躁而無沉潜之味其弊或至於認欲為理者有之矣一㤀一助二者盖胥失之而知覺之云者於聖門所云樂山能守之氣象尤不相似予尚安得復以此而論仁哉因并記其語作仁説古今言仁考易曰君子體仁足以長人書曰民㒺常懐懐於有仁禮記子曰無欲而好仁者無畏而惡不仁者天下一人而已矣子曰仁之為噐重其為道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉于仁者不亦難乎子曰中心安仁者天下一人而已矣大雅曰徳輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢㤀身之老也不知年數之不足也俛焉日有孶孶斃而後已大學𫝊曰此謂惟仁人為能愛人能惡人中庸曰修身以道修道以仁仁者人也親親為大力行近乎仁子曰巧言令色鮮矣仁子曰人而不仁如禮何人而不仁如樂何子曰不仁者不可以乆處約不可以長處樂仁者安仁智者利仁子曰惟仁者能好人能惡人子曰茍志於仁矣無惡也子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也君子去仁惡乎成名君子無終食之間違仁造次必於是顛沛必於是子曰我未見好仁者惡不仁者好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身有能一日用其力於仁矣乎我未見力不足者盖有之矣我未之見也子曰人之過也各於其黨觀過斯知仁矣或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乗之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賔客言也不知其仁也子張問曰令尹子文三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弑齊君陳文子有馬十乗棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁子曰回也其心三月不違仁其餘則日月至焉而已矣宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可㒺也子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸夫仁者巳欲立而立人巳欲逹而逹人能近取譬可謂仁之方也巳入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨子曰仁逺乎哉我欲仁斯仁至矣顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣仲弓問仁子曰出門如見大賔使民如承大祭己所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣司馬牛問仁子曰仁者其言也訒曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎樊遲問仁子曰愛人問知子曰知人樊遲未逹子曰舉直錯諸枉能使枉者直樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也子夏曰富哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也子曰剛毅木訥近仁克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也子曰君子而不仁者有矣夫未有小人而仁者也子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到于今受其賜㣲管仲吾其被髮左祍矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者犮其士之仁者子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也子曰當仁不讓於師子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寛信敏恵恭則不侮寛則得衆信則人任焉敏則有功恵則足以使人㣲子去之箕子為之奴比干諌而死孔子曰殷有三仁焉有子曰孝弟也者其為仁之本與曾子曰士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後巳不亦逺乎曾子曰君子以文㑹友以友輔仁子夏曰博學而篤志切問而近思仁在其中矣子游曰吾友張也為難能也然而未仁曾子曰堂堂乎張也難與並為仁矣欲仁而得仁又焉貪未有仁而遺其親者也未有義而後其君者也孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也如惡之莫如貴徳而尊士賢者在位能者在職國家閒暇及是時明其政刑雖大國必畏之矣詩云迨天之未隂雨徹彼桑土綢繆牖戶今此下民或敢侮予孔子曰為此詩者其知道乎能治其國家誰敢侮之今國家閒暇及是時般樂怠敖是自求禍也禍福無不自已求之者詩云永言配命自求多福太甲曰天作孽猶可違自作孽不可活此之謂也惻隠之心仁之端也孟子曰矢人豈不仁於函人哉矢人唯恐不傷人函人唯恐傷人巫匠亦然故術不可不慎也孔子曰里仁為美擇不處仁焉得智夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也不仁不智無禮無義人役也人役而耻為役由弓人而耻為弓矢人而耻為矢也如耻之莫如為仁仁者如射射者正巳而後發發而不中不怨勝巳者反求諸巳而已矣孟子曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶惡醉而强酒孔子曰仁不可為衆也夫國君好仁天下無敵孟子曰不仁者可與言哉安其危而利其菑樂其所以亡者不仁而可與言則何亡國敗家之有有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰小子聽之清斯濯纓濁斯濯足矣自取之也夫人必自侮然後人侮之家必自毁而後人毁之國必自伐而後人伐之太甲曰天作孽猶可違自作孽不可活此之謂也孟子曰仁之實事親是也義之實從兄是也智之實知斯二者弗去是也禮之實莭文斯二者是也樂之實樂斯二者樂則生矣生則惡可巳也惡可巳則不知足之蹈之手之舞之孟子曰仁人心也義人路也舎其路而弗由放其心而不知求哀哉人有鷄犬放則知求之有放心而不知求學問之道無他求其放心而已矣强恕而行求仁莫近焉孟子曰知者無不知也當務之為急仁者無不愛也急親賢之為務堯舜之知而不徧物急先務也堯舜仁不徧愛人急親賢也不能三年之䘮而緦小功之察放飯流歠而問無齒决是之謂不知務孟子曰仁也者人也合而言之道也仁之於父子也義之於君臣也禮之於賔主也智之於賢者也孟子曰人皆有所不忍逹之於其所忍仁也人皆有所不為逹之於其所為義也程子曰天地之大徳曰生天地絪緼萬物化醇生之謂性萬物之生意最可觀此元者善之長也斯所謂仁也又曰非仁則無以見天地仁者以天地萬物為一體莫非我也如其皆我何所不盡不能有諸已則其與天地萬物豈特相去千萬而已哉自古不曾有人解仁字之義須是道與他分别出五常若只是兼體却只有四也且譬一身仁頭也其他四端手足也至如易雖言元者善之長然亦須通四徳以言之問仁曰此在諸公自思之将聖賢所言仁處類聚觀之體認出來孟子曰惻隠之心仁也後人遂以愛為仁惻隠固是愛也愛自是情仁自是性豈可専以愛為仁孟子言惻隠為仁盖為前已言惻隠之心仁之端也既曰仁之端則不可便謂之仁退之言博愛之謂仁非也仁者固博愛然便以博愛為仁則不可仁者必愛指愛為仁則不可仁者無所知覺指知覺為仁則不可觀物於静中皆有春意切脉最可體仁觀鷄雛此可觀仁仁之道要之只消道一公字公只是仁之理不可将公便喚做仁公而以人體之故為仁只為公則物我兼照故仁所以能恕所以能愛恕則仁之施愛則仁之用也人之一肢病不知痛癢謂之不仁人之不仁亦猶是也盖不知仁道之在巳也知仁道之在巳而由之乃仁也視聴言動一於禮謂之仁仁則一不仁則二大率把捉不定皆是不仁去不仁則仁存學者識得仁體實有諸已只要義理栽培如求經義皆栽培之意仁者渾然與物同體義禮智信皆仁也識得此理以誠敬存之而已至仁則天地為一身而天地之間品物萬形為四肢百體夫人豈有視四肢百體而不愛者哉聖人仁之至也獨能體是心而已曷甞支離多端而求之自外乎故能近取譬者仲尼所以示子貢以為仁之方也醫書有以手足風頑謂之四體不仁為其疾痛不以累其心故也夫手足在我而疾痛不與知焉非不仁而何世之忍心無恩者其自棄亦若是而已孟子云仁也者人也合而言之道也中庸所謂率性之謂道是也仁者人此者也敬以直内義以方外仁也若以敬直内則便不直矣行仁義豈有直乎必有事焉而勿正則直也夫能敬以直内義以方外則與物同矣故曰敬義立而徳不孤是以仁者無對放之東海而凖放之西海而凖放之南海而凖放之北海而凖醫家言四體不仁最能體仁之名也張子曰虚者仁之原禮義者仁之用虚則生仁仁在理以成之敦厚虚静仁之本敬和接物仁之用龜山楊氏曰論語言仁處皆仁之方也若正所謂仁則未之甞言也故曰子罕言利與命與仁要道得親切唯孟子言仁人心也最為親切上蔡謝氏曰心者何也仁是已仁者何也活者為仁死者為不仁今人身體麻痺不知痛癢謂之不仁桃杏之核可種而生者謂之桃仁杏仁言有生之意推此仁可見矣問一日静坐見一切事平等皆在我和氣中此是仁否曰此只是静中工夫只是心虚氣平也須是應事時有此氣象方可好仁者天之理非杜撰也故哭死而哀非為生也經徳不回非干禄也言語必信非以正行也天理當然而已矣當然而為之是為天之所為也聖門學者大要以克己為本克己復禮無私心焉則天矣和靖尹氏曰鮑某甞問伊川仁者愛人便是仁乎伊川云愛人仁之事耳焞時侍坐歸因取論語中説仁事致思乆之忽有所得遂見伊川請益曰某以仁惟公可盡之伊川沉思乆之云思而至此學者所難及也天心所以至仁者惟公爾人能至公便是仁謝收甞問學於伊川伊川云學之大無如仁汝謂仁是如何謝乆之無入處一日再問愛人是仁否伊川云愛人乃仁之端非仁也謝收去焞因曰某謂仁者公而已矣伊川云何謂也焞曰能好人能惡人伊川云非善涵養不易見得到此延平李氏曰答朱元晦書曰仁字難説論語一部只是説與門弟子求仁之方知所以用心庶幾私欲沉天理見則知仁矣如顔子仲弓之問聖人所以答之之語皆其切要用力處也孟子曰仁人心也心體通有無貫幽明無不包括與人指示於發用處求之也又曰仁者人也人之一體便是天理無所不備具若合而言之人與仁之名亡則渾是道理也來諭以謂仁是心之正理能發能用底一箇端緒如胎育包涵其中生氣無不純備而流動發生自然之機又無頃刻停息憤盈發洩觸處貫通體用相循初無間㫁此説推擴得甚好但又云人之所以為人而異乎禽獸者以是而已若犬之性牛之性則不得而與焉若如此説恐有礙盖天地中所生物本源則一雖禽獸草木生理亦無頃刻停息間㫁者但人得其秀而最靈五常中和之氣所聚禽獸得其偏而已此其所以異也若謂流動發生自然之機與夫無頃刻停息間㫁即禽獸之體亦自如此若以為此理唯人獨得之即恐推測體認處未精於他處便有差也又云須體認到此純一不雜處方見渾然與物同體氣象一段語却無病又云從此推出分殊合宜處便是義以下數句莫不由此而仁一以貫之盖五常百行無往而非仁也此説大槩是然細推之却似不曾體認得伊川所謂理一分殊龜山云知其理一所以為仁知其分殊所以為義之意盖全在知字上用着力也謝上蔡語錄云不仁便是死漢不識痛癢了仁字只是有知覺了了之體段若於此不下工夫令透徹即何縁見得本源毫髪之分殊哉若於此不了了即體用不能兼舉矣此正是本源體用兼舉處人道之立正在於此仁之一字正如四徳之元而仁義二字正如立天道之隂陽立地道之柔剛皆包攝在此一字爾大抵學者多為私欲所昏故用力不精不見其效若欲於此進歩須把㫁諸路頭静坐黙識使之泥滓漸漸消去方可不然亦足是説也更熟思之朱子曰仁也者天地所以生物之心而人物之所得以為心者也惟其得夫天地生物之心以為心是以未發之前四徳具焉曰仁義禮智而仁無不統已發之際四端著焉曰惻隠羞惡辭讓是非而惻隠之心無所不通此仁之體用所以涵育渾全周流貫徹専一心之妙而為衆善之長也仁是根愛是苖不可便喚苖做根然而這箇苖却定是從那根上來問仁者愛之理曰這一句只将心性情看便分明一身之中渾然自有箇主宰者心也有仁義禮智則是性發為惻隠羞惡辭讓是非則是情惻隠愛也仁之端也仁是體愛是用又曰愛之理愛自仁出也然亦不可離了愛去説仁問韓愈博愛之謂仁曰是指情為性了問周子説愛曰仁與博愛之説如何曰愛曰仁猶曰惻隠之心仁之端也是就愛處指出仁若博愛之謂仁之謂便是把博愛做仁了終不同問周子窓前草不除去即是謂生意與自家一般曰他也只是偶然見與自家意思相契又問横渠驢鳴是天機自動意思曰固是他也是偶然見他如此如謂草與自家意一般木葉便不與自家意思一般乎如驢鳴與自家呼喚一般馬鳴便不與自家一般乎問程子觀天地生物氣象也是如此曰他也只是偶然見如此便説出來示人而今不成只管去守看生物氣象問聖賢言仁有專指體而言者有包體用而言者曰仁對義禮智言之則為體專言之則兼體用以心之徳而専言之則未發是體已發是用以愛之理而偏言之則仁便是體惻隠是用南軒張氏曰仁者天下之正理此言仁乃天下之正理也天下之正理而體之於人所謂仁也若一毫之偏則失其正理而為不仁矣勉齋黄氏曰仁包四者包字須看得出甞記朱先生云未發則有仁義禮智之性而仁則包四徳已發則有惻隠羞惡恭敬是非之情而惻隠則貫四端貫字如一箇物串在四箇物裏面過包字如四箇物都合在一箇物裏面北溪陳氏曰仁道甚廣大精㣲可以用處只為愛而發見之端為惻隠又曰仁是此心生理全處常生生不息故其端緒方從心中萌動發出來自是惻然有隠由惻隠而充及到那物上遂成愛故仁乃是愛之根而惻隠則根之萌芽愛則又萌芽之長茂已成者也觀此則仁者愛之理愛者仁之用自可見得脉絡相闗處矣孔門敎人求仁為大只専言仁以仁包萬善能仁則萬善在其中矣至孟子乃兼仁義對言之猶四時之隂陽也自孔門後人都不識仁漢人只把做恩愛説是又大泥了愛人就上起樓起閣将仁看得全粗了故韓子遂以博愛為仁至程子始分别得明白謂仁是性愛是情然自程子此言一出門人又将愛全掉了一向求髙逺去不知仁是愛之性愛是仁之情愛雖不可以正名仁而仁亦豈能離得愛上蔡遂専以知覺言仁夫仁者固能知覺謂知覺為仁則不可若轉一歩看知覺純是理便是仁也龜山又以萬物與我為一為仁體夫仁者固能與萬物為一體謂萬物為一為仁則不可此乃是仁之量若能轉來看只於與物為一之前徹表裏純是天理流行無間便是仁也吕氏克己銘又欲克去有己須與物合為一體方為仁認得仁都曠蕩在外了於我都無統攝必己與物對時方下得克己工夫若平居獨處不與物對時工夫便無可下手處可謂疎闊之甚㨿其實也如何得與物合一洞然八方如何得皆在我闥之内此不過只是想像箇仁中大抵氣象如此耳仁實何在焉殊失向來孔顔𫝊授心法本㫖其他門人又淺皆無有説得親切者仁有以理言者有以心言者有以事言者以理言則只是此心全體天理之公如文公所謂心之徳愛之理此是以理言者也心之徳乃専言而其體愛之理乃偏言而其用也程子曰仁者天下之公善之本也亦以理言者也以心言則知此心純是天理之公而絶無一毫人欲之私必間之也如夫子稱回心三月不違仁程子謂只是無纎毫私欲少有私欲便是不仁及雍也不知其仁等類皆是以心言者也以事言則只是當理而無私心之謂如夷齊求仁而得仁殷有三仁及子文之忠文子之清皆未知焉得仁等類是也若以用工言則只是去人欲復天理以全其本心之徳而已矣如夫子當時答羣弟子問仁雖各隨其才質病痛之不同而其㫖意所歸大槩不越乎此西山真氏曰仁之一字從古無訓且如義訓宜禮訓理又訓履智訓知皆可以一字名其義惟仁不可以一字訓孟子曰仁者人也亦只是言仁者乃人之所以為人之理亦不是以人訓仁盖縁仁之道大包五常貫萬善所以不可以一言盡之自漢以後儒者只将愛字説仁殊不知仁固主乎愛然愛不足以盡仁孟子曰惻隠之心仁之端也惻隠者此心惻然有隠即所謂愛也然只是仁之發端而已韓文公言博愛之謂仁程先生非之以為仁自是性愛自是情以愛為仁是以情為性也至哉言乎朱文公先生始以愛之理心之徳六字形容之所謂愛之理者言仁非止乎愛乃愛之理也盖以體言之則仁之道大無所不包發而為用則主乎愛仁者愛之體也愛者仁之用也愛者如見赤子入井而惻然欲有以救之以至矜憐憫惜慈祥恩恵愛之謂也性中既有仁發出來便是愛如根上發出苖以苖為出於根則可以苖便為根則不可以愛出於仁則可以愛便作仁則不可故文公以愛之理三字言之方説得盡又曰心之徳何也盖心者此身之主而其理則得於天仁義禮智皆此心之徳而仁又為五常之本如元亨利貞皆乾之徳而元獨為四徳之長天之元即人之仁也元為天之全徳故仁亦為人心之全徳然仁之所以為心之徳者正以主乎愛故也仁所以能愛者盖天地以生物為心而人得之以為心是以主乎愛也愛之理心之徳六字之義乃先儒所未發而朱文公始發之其有功於學者至矣可深味之魯齋許氏曰仁為四徳之長元者善之長前人訓元為廣大真是有理心胷不廣大安能愛敬安能教思容保民無疆臨川呉氏曰天之為天也元而已人之為人也仁而已四序一元也五常一仁也人之有仁如木之有本木有本榦枝所由生也人有仁萬善所由出也人而賊其仁猶木戕其本也木無本則其枝瘁而榦枯人不仁則其心死而身雖生也奚取敬軒薛先生曰思慮一毫雜妄即非仁便當克去西銘自乾父坤母至兄弟顛連而無告者一莭皆状仁之體自于時保之至沒吾寜也皆求仁之方只是循天理便有序而和故仁者禮樂之本也陽明王先生曰自格物致知至平天下只是明明徳雖親民亦明徳事也明徳是此心之徳即是仁仁者以天地萬物為一體使有一物失所便是吾仁有未盡處樂是心之本體仁人之心以天地萬物為一體訢合和暢原無間隔來書謂人之生理本自和暢本無不樂但為客氣物欲攪此和暢之氣始有間㫁不樂處也時習者求復此心之本體也悦則本體漸復矣朋來則全體之訢合和暢充周無間本體之訢合和暢本來如是初未甞有所増也就使無朋來而天下莫我知焉亦未甞有所减也夫聖人之心以天地萬物為一體其視天下之人無外内逺近凢有血氣皆其昆弟赤子之親莫不欲安全而教養之以遂其萬物一體之念天下之人心其始亦非有異於聖人也特其間於有我之私隔於物欲之蔽大者以小通者以塞人各有心至有視其父子兄弟如仇讐者聖人有憂之是以推其天地萬物一體之仁以教天下使人皆有以克其私去其蔽以復其心體之同然陽明子曰大人者天地萬物為一體者也其視天下猶一家中國猶一人焉若夫間形骸而分爾我者小人矣大人之能以天地萬物為一體也非意之也其心之仁本若是其與天地萬物而為一也豈惟大人雖小人之心亦莫不然彼顧自小之耳是故見孺子之入井而必有怵惕惻隠之心焉是其仁之與孺子而為一體也孺子猶同類者也見鳥獸之哀鳴觳觫而必有不忍之心焉是其仁與鳥獸而為一體也鳥獸猶有知覺者也見草木之摧折而必有憫恤之心焉是其仁與草木而為一體也草木猶有生意者也見瓦石之毁壊而必有顧惜之心焉是其仁與瓦石而為一體也是其一體之仁也雖小人之心亦必有之是乃根於天命之性而自然靈昭不昧者也是故謂之明徳小人之心既已分隔隘陋矣而其一體之仁猶能不昧若此者是其未動於欲而未蔽於私之時也及其動於欲蔽於私而利害相攻忿怒相激則将戕物圮類無所不為其甚至有骨肉相殘者而一體之仁亡矣是故苟無私欲之蔽則雖小人之心而其一體之仁猶大人也一有私欲之蔽則雖大人之心而其分隔隘陋猶小人矣故大人之學亦惟去其私欲之蔽以自明其明徳復其天地萬物一體之本然而已耳非能於本體之外而有所增益之也仁總論學莫要於求仁論語二十篇聖賢問答莫非求仁之方而仁之所以為仁聖人且罕言之矣仁豈易識哉昔之人有以愛與公與覺言仁者皆不足以盡仁也朱子則謂仁者天地生物之心而人物所得以為心者也惟其得天地生物之心以為心是以未發之前四徳具焉曰仁義禮智而仁無所不統已發之際四端著焉曰惻隠羞惡辭讓是非而惻隠之心無所不通此仁之體涵育渾全周流貫徹專一心之用為萬善之長也論仁之理亦既詳矣獨孔子曰仁者人也孟子亦曰仁也者人也説仁者曾有親切簡明如孔孟者乎但不識人之所以為人其何以識仁也是故天地絪緼萬物化醇惟人也無極之真二五之精妙合而凝獨得其秀而最靈者焉精氣為物形之謂也游魂為變神之謂也形神渾合活潑潑地人之謂也故細觀人之一身外而耳目口鼻四肢百骸以及爪髪之細内而髓精血液五臟六腑以及神氣之靈統同而融㑹為一身焉此身自頂及踵周流貫徹生生不息故耳聽目視手持足行臟腑之運化經絡之管攝血脉之流注雖各一其職而聫絡以共成一體無毫釐隔礙此其所以為活人者何也仁也無故毁傷其肢體㧞一髪㫁一爪即痛徹渾身此心有不忍焉無尺寸之膚不愛無尺寸之膚不自知覺者何也仁也即六尺之軀為一元之㑹四端萬善悉從此出人者仁也不信然哉斯人也設病痿痺則手足吾之手足也痛癢若不相闗便為不仁之人矣知痿痺為不仁則仁即人也㫁可識矣一人如是人人皆然人固如是大而天地㣲而萬物亦莫不然所謂視天下為一家中國猶一人天地萬物為一體者非以仁為美而有意以為之也乾父坤母民胞物與混混淪淪本同一氣無有間隔故不獨骨肉至親恩愛浹洽如手足之衛頭目腹心之顧四肢一或觸之自然萌動此衷自有不容巳者觀其遇孺子入井而倏然惻隠遇鳥獸哀鳴觳觫而倐然憐憫遇草木摧折而倏然矜恤遇瓦石毁裂而倐然顧惜雖由親及疎不無差等而不忍之心則一而已矣故曰人皆有不忍人之心未發而謂之體謂為愛之理發而謂之用謂為愛之施統而言之人之心也猶元亨利貞統之為乾元坤元大生廣生而天地之大徳曰生是也惟其人人同此仁體所以孩提之童不學不慮莫不知愛其親者此也所以大人與天地合徳其要只在不失赤子之心者此也所以慈母不待學而後嫁自能保養赤子者此也所以八荒我闥巳欲立而立人巳欲逹而逹人而一曰克己復禮天下歸仁者此也所以萬物皆備於我而已所不欲勿施於人與强恕而行求仁莫近焉者此也所以形色天性而踐形惟肖骨肉都融與道合真而為天下之完人者此也否則一或不仁不特隔形體分汝我視至戚若仇讎甚則縱耳目之欲雖毁傷軀命而不顧自暴自棄雖有仁者亦無如之何矣雖然人特弗之思耳彼一肢一莭或痿痺不仁則不逺秦楚之路必求良醫以自療治而渾身麻木不知痛癢乃不思求明師為之鍼砭其惻隠之心安在哉知所以惻憫孺子鳥獸草木以及瓦石而㤀自惻焉胡為乎不自愛也不自覺也不能公此身于天地萬物中而自戕其生生之真機也人之丼心不仁一至此哉噫孔子之為人也發憤不厭故中心安仁囘之為人也竭才服膺故不違仁善乎曾子曰仁以為己任不亦重乎死而後巳不亦逺乎此萬世為人之極則也後儒止以公理視仁不教人以人道自盡天下鮮仁誰之咎哉道古今言道總考易曰一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業易曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義書洪範篇曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已矣子曰志於道㨿於徳依於仁游於藝子曰士志於道而恥惡衣惡食者未足與議也子曰道不同不相為謀曾子曰君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣子夏曰君子學以致其道子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也中庸曰率性之謂道子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也君子之道費而隠夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉詩云鳶飛戾天魚躍于淵言其上下察也君子之道造端乎夫婦及其至也察乎天地子曰道不逺人人之為道而逺人不可以為道詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止忠恕違道不逺施諸巳而不願亦勿施於人君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸徳之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾君子之道辟如行逺必自邇辟如登髙必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且躭宜爾室家樂爾妻孥子曰父母其順矣乎修身以道修道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也天下之逹道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之逹道也知仁勇三者天下之逹徳也所以行之者一也誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也大哉聖人之道洋洋乎發育萬物峻極於天優優大哉禮儀三百威儀三千待其人而後行茍不至徳至道不凝焉孟子曰王何必曰利亦有仁義而已矣夫道一而已矣於此有人焉入則孝出則悌守先王之道以待後之學者聖王不作諸侯放恣處士横議楊朱墨翟之言盈天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也公明儀曰庖有肥肉廐有肥馬民有飢色野有餓莩此率獸而食人也楊墨之道不熄孔子之道不著是邪説誣民充塞仁義也仁義充塞則率獸食人人将相食吾為此懼閑先聖之道距楊墨放淫辭仁人之安宅也義人之正路也曠安宅而弗居舎正路而不由哀哉孟子曰道在邇而求諸逺事在易而求諸難人人親其親長其長而天下平孟子曰仁之實事親是也義之實從兄是也知之實知斯二者弗去是也禮之實莭文斯二者是也樂之實樂斯二者樂則生矣生則惡可巳也惡可巳則不知足之蹈之手之舞之堯舜之道孝弟而已矣孟子曰行之而不著焉習矣而不察焉終身由之而不知其道者衆也孟子曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無他逹之天下也所惡執一者為其賊道也舉一而廢百也公孫丑曰道則高矣美矣宜若登天然似不可及也何不使彼為可幾及而日孶孶也孟子曰大匠不為拙工改廢䋲墨羿不為拙射變其彀率君子引而不發躍如也中道而立能者從之孟子曰仁也者人也合而言之道也萬章曰一鄉皆稱原人焉無所往而不為原人孔子以為徳之賊何哉曰非之無舉也刺之無刺也同乎流俗合乎汚世居之似忠信行之似亷㓗衆皆悦之自以為是而不可與入堯舜之道故曰徳之賊也君子反經而已矣經正則庶民興庶民興斯無邪隠矣董子曰春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上無以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使復進邪説㓕熄然後統紀可一而法度可明民知所從矣夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺童子羞稱五霸為其先詐力而後仁義也韓子原道篇畧曰凢吾所謂道徳云者合仁與義言之也天下之公言也老子所謂道徳云者去仁與義言之也一人之私言也又曰古之為民者四士農工商今之為民者六四民之外又有釋老農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六柰之何民不窮且盗也又曰古之所謂正心誠意者将以有為也今也欲治其心而外天下國家㓕其天常子焉而不父其父臣焉而不君其君民焉而不事其事又曰以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常又曰夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足于已無待於外之謂徳其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服絲麻其居宫室其食粟米果菜魚肉其為道易明而為教易行也曰斯道何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是𫝊之舜舜以是𫝊之禹禹以是𫝊之湯湯以是𫝊之文武周公文武周公傳之孔子孔子𫝊之孟軻軻之死不得其𫝊焉荀與楊擇焉而不精語焉而不詳周子曰動而正曰道用而和曰徳匪仁匪義匪禮匪智匪信悉邪也邪動辱也甚焉害也故君子慎動聖人之道仁義中正而已矣守之貴行之利廓之配天地豈不易簡豈為難知不守不行不廓耳天地間至尊者道至貴者徳而已矣至難得者人人而至難得者道徳有於身而已矣求人至難得者有於身非師友則不可得也聖人之道入乎耳存乎心藴之為徳行行之為事業彼以文辭而巳者陋矣程子曰道未始有天人之别但在天則為天道在地則為地道在人則為人道天之自然謂之天道繫辭云形而上者謂之道形而下者謂之器又云立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰一隂一陽之謂道隂陽亦形而下者也而曰道者惟此語截得上下最分明元來只此是道要在人黙而識之或者以清虚一大為天道此乃以器而言非道也道即性也若道外尋性性外尋道便不是書言天叙天秩天有是理聖人循而行之所謂道也道之外無物物之外無道是天地間無適而非道也即父子而父子在所親即君臣而君臣在所嚴以至為夫婦為長㓜為朋友無所為而非道此道所以不可須㬰離也冲漠無朕萬象森然已具未應不是先已應不是後如百尺木有根本至枝葉皆是一貫不可道上面事無形無兆却待人旋要安排引入來教入塗轍却只是一箇塗轍今語道則須待要寂㓕湛静形使如槁木心使如死灰豈有直做墻壁木石而謂之道所貴乎智周天地萬物而不遺又幾時要如死灰所貴乎動容周旋中禮又幾時要如槁木論心術無如孟子也只謂必有事焉今既如槁木死灰則却於何處有事張子曰大和所謂道中涵浮沉升降動静相感之性是性絪緼相盪勝負屈伸之始其來也幾㣲易簡其究也廣大堅固起知於易者乾乎效法于簡者坤乎散殊而可象為氣清通而不可象為神不如野馬絪緼不足謂之大和語道者知此謂之道循天下之理之謂道得天下之理之謂徳故曰易簡之善配至徳道所以可乆可大以其肖天地而不雜也與天地不相似其違道也逺矣人知道為自然而未識自然之為體邵子曰天由道而生地由道而成物由道而形人由道而行天地人物則異也其于由道一也夫道也者道也道無形行之則見于事矣如道路之道坦然使千億萬年行之人知其歸者也事無大小皆有道在其間能安分則謂之道不能安分謂之非道顯諸仁者天地生萬物之功則人可得而見也所以造萬物則人不可得而見是藏諸用也天地之道備於人萬物之道備於身衆妙之道備於神天下之能事畢矣藍田吕氏曰人受天地之中以生良心所發莫非道也在我者惻隠羞惡辭讓是非皆道也在彼者君臣父子夫婦昆弟朋友之交亦道也在物之分則有彼我之殊在性之分則合内外一體而已是皆人心所同然乃吾性之所固有也上蔡謝氏曰聖人之道無顯㣲無内外由灑掃應對進退而上逹天道本末一以貫之和靖尹氏謂吕堅中曰吾道甚平易明白須行到無内外無思慮方得五峰胡氏曰道者體用之總名仁其體義其用合體與用斯為道矣堯舜禹湯文王仲尼之道天地中和之至非有取而後為之者也是以周乎萬物通乎無窮日用而不可離也道不能無物而自道物不能無道而自物道之有物猶風之有動水之有流也夫孰得而間之故離物求道者妄而已矣朱子曰這道浩浩無窮聖人之道如饑渴飲食道之常存初非人所能與只是此箇自是亘古亘今常在不㓕之物雖被人作壊終殄㓕他不得鳶飛魚躍道體隨處發見天髙地下人位乎中天之道不出乎隂陽地之道不出乎柔剛是則舍仁與義亦無以立人之道矣然而仁莫大於父子義莫大於君臣是謂三綱之要五常之本人倫天理之至通天下只是一箇天機活物流行發用無間刻息據其已發者而指其未發者則已發者人心而凢未發者皆其性也亦無一物而不備矣夫豈别有一物拘於一時限於一處而名之哉即夫日用之間渾然全體如川流之不息天運之不窮耳此所以體用精粗動静本末洞然無一毫之間而鳶飛魚躍觸處朗然也存者存此而已養者養此而已學者去求道不是外面添聖人之教人亦不是强人分外做樂庵李氏曰道非事不形事非道不行道一而已而以修身為本自修身以及於治國平天下皆是也南軒張氏曰道者天命之全體流行無間貫乎古今通乎萬物者也衆人自昧之而是理也何嘗有間斷聖人盡之亦非有所增益也未應不是先已應不是後立則俱立達則俱達葢公天下之理非有我之得私此仁之道所以為大而命之理所以為㣲也當其可即是道葢事事物物之間道無往而不存然無適而不為中也陸子曰此道充塞宇宙天地順此而動故日月不過而四時不忒聖人順此而動故刑罰清而民服古人所以造次必於是顛沛必於是也道遍滿天下無些少空缺四端萬善皆天之所予不勞人粧㸃但是人自有病與他間隔了事外無道道外無事東萊吕氏曰夫道非窮天以為髙非極地以為深人所性之中固有之矣其體則純而不雜其用則施之無方草廬呉氏曰道在天地間猶水之在大海道之中有人猶水之有器浸灌此器者水也納受此水者器也水中之器或沉或浮而器中之水或出或入器與水未合也水在器中凝而為氷則器與水合不相離而水為器所有矣人之於道猶器與水是也有以凝之則道在我無以凝之則道自道我自我道豈我之有哉困知記曰程伯子嘗厯舉繫辭形而上者謂之道形而下者謂之器立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義一隂一陽之謂道數語乃從而申之曰隂陽亦形而下者而曰道者惟此語截得上下最分明元來只此是道要在人黙而識之也學者試以此言潜玩精思久久自當有見道總論道一而已矣在天為隂陽在地為柔剛在人為仁義其道一也是道也統攝三才流行萬化自一息至不可終窮自一毫至不可限量悉由之以綱維而主宰焉世有治亂道不因之以汚隆人有聖狂道不因之而增損雖罹秦坑焚之慘而道如故也然由秦以降志道者率病于多岐何哉韓子曰古之教者處其一今之教者處其三其教既三從事于其教者安得不岐而三之哉孔子繫易曰一隂一陽之謂道葢統天地造化言之也程伯子謂隂陽亦形而下者也而曰道者惟此語截得上下最分明元來只此是道要在人黙而識之信乎形而上者謂之道形而下者謂之器器即道道即器也故下文即舉繼善成性而仁知不可偏藏用顯仁而徳業所畢備言道者斯其凖矣中庸曰天命之謂性率性之謂道所謂道之大原出于天是也下文即曰修道之謂教又曰修身以道修道以仁仁者人也親親為大義者宜也尊賢為大天下之達道五所以行之者三孟子亦曰仁也者人也合而言之道也皆此意也可見仁義人之性也言立人之道舉性之仁義無餘藴矣何也日月星辰雨風露雷成象於天者萬有不齊而立天之道隂陽盡之矣水火山川土石草木成形於地者萬有不齊而立地之道剛柔盡之矣君臣父子男女飲食體備於人者萬有不齊而立人之道獨不盡於仁義乎哉况舉仁義已該夫隂陽剛柔此道之所以一也孔孟而下惟韓子原道亦自仁義言之雖指博愛以名仁遺格致以言大學而以仁義言道則確有定見曰其文詩書易春秋其法禮樂刑政其民士農工商其位君臣父子師友賔主昆弟夫婦其服麻絲其居宫室其食粟米菓蔬魚肉其道易明其教易行也又斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉觀其前舉文法居食若不過斯道之粗迹後叙堯舜相傳又莫窺斯道之淵㣲而其源一本諸仁義之徳古今論道莫詳于斯矣何後之名道者各一其辭云動而正焉之謂道云變通之謂道云自理言之謂之道云大和所謂道云當其可即是道云由氣化有道之名云道者體用之總名云道者事物當然之理即其言非不各有攸當終不若韓子原道只自仁義言之較親切著明匪特確遵孔孟遺訓人人皆可與知而與能焉使其言一定不易即此可以閑先聖之道可以放淫詞息邪說距詖行而佛老之學不攻自破也惟儒家意見雜出各一其說故佛老之徒敢為髙論以乗之殆將率天下人盡歸之無為無着虛寂湛静而後謂之道也已盍觀其言乎曰道可道非常道曰道之為物為恍為惚曰至道之精杳杳㝠㝠曰道自虚無生一炁此非老氏家之言乎曰道無方體隨緣自在曰道越三空不可思議曰其道清净亦無諸相曰如來自在力無量刼難遇若生一念信速登無上道此非佛氏家之言乎是其教各以虛寂為宗則學其道者不得不脫離父兄妻子以求其所謂虚所謂寂而與聖人仁義之教視之皆恩愛坑塹恐逺之不暇矣雖然道之得名謂共由之路也南之粤北之燕莫不各有蕩平坦夷之途而聖人仁義之途皆實地也在賢智者可俯而就在愚不肖者可企而及雖愛親敬長百姓尚日用不知而盡性至命聖人豈能舍此而他由哉此教之所以近易道之所以一也若二氏既以虛寂認心性因以虚寂為妙道曰旁日月挾宇宙揮斥八極神氣不變曰光明寂照無所不通不動道塲周遍法界直欲縱步大空頓超三界如之何可同日語也合而觀之道若大路人豈難知昔孟子于學仁學義之偏者尚懼流弊至無君父今海内髙明俊偉悉甘心無君無父之教是誠何心哉噫仁義充塞則率獸食人人將相食莫此時為甚故余于韓子原道深有取也達道中庸之道何道也天下無人外之道也天下無人外之道又豈能逺人為道哉君臣父子夫婦昆弟朋友之交五者天下之達道也是道也費而隱㣲而顯雖聖人有所不能盡實愚不肖可與知與能而為夫人率性之常也但仁智各一其見百姓日用不知所以有過有不及而素隱行怪廢于半塗此中庸不可能也孰知道本不可離而人自離之哉欲修道者果知道不逺人自造端夫婦以至子臣弟友之倫本之為庸徳之行行而世為天下法本之為庸言之謹言而世為天下則修道之教于兹立矣然又謂和為天下之達道何也喜怒哀樂斯須不能去身者也人于日用内而父子兄弟夫婦外而君臣朋友未有一日能相離者應接間其能斯須離喜怒哀樂之情乎惟喜怒哀樂發皆中節則隨其所接固盎然太和之充周也使一有不和則雖欲宜兄弟樂妻孥求父母之順也難矣安望其獲上而信友也然亦非待喜怒哀樂之發方知所節也未發之謂中夫固天命之性人之所以為人者也君子之中庸也君子而時中正以時時此未發之中時時此天命之性則喜怒哀樂自爾中節君臣父子夫婦昆弟朋友自莫不和天地萬物自然位育而四達不悖矣是故謂之中庸者一中以為日用之常達之天下不可須㬰離也譬木之根水之源其枝葉花實固榮謝開落不常而根自生生之不窮其盈科放海固波瀾流注不一而源自混混之不竭斯道達之天下一由天性降衷者以立其本此所以無所不達而為率性之道也特君子自戒懼中來而中和位育乃其常事若無所忌憚即為小人反中庸矣雖然人知道不外乎倫矣不知即吾天命之性人知道不外乎情矣不知即吾未發之中此子思子所以必推本言之之意也夫何中庸之道不明于後世迺自以為求道于天命之性淵淵乎無聲無臭而已矣謂父子兄弟為假合之相而必欲斷絶乎人倫自以為求道于未發之中黙黙乎不覩不聞而已矣謂喜怒哀樂為恩愛之私而必欲寂滅乎種性道其所道豈中庸不逺人之道哉達之一身一家且不能其何以達天下哉故曰為道而逺人不可以為道又曰人能𢎞道非道𢎞人性道總論性道一也人所固有亦人人所各足本不俟外求而後明以其所固有各足者證諸聖經亦非無徴而不信是故有先言道而後性者有先言性而後道者究其立言本㫖各有攸當也後世乃岐性道而二之老氏云道自虛無生一氣佛氏云性覺真空性空真覺言道不言性可也而道則一歸諸虛言性不言道亦可也而性則一歸諸空諸儒每兼言之未免認氣質為性指方法作用為道此所以性道愈晦無怪學術多岐人人得逞一見横一說標立宗㫖俾志士莫知適從貿貿焉各任意識馳騖而失彌逺也孰知信而好古聖謨自有不容紊者易曰一隂一陽之謂道繼之者善也成之者性也得非先言道乎然此自天道言又曰乾道變化各正性命惟其各正故論語謂之性相近也豈專指生之謂性混人與犬羊而一之耶中庸曰天命之謂性率性之謂道得非先言性乎然此自人道言又曰性之徳也合外内之道也惟其道合内外故易謂成性存存道義之門惡可一歸諸虛無空寂且執一廢百莫可勝說也即此觀其㑹通立天之道曰隂與陽立人之道曰仁與義仁義性也即天道之隂陽也原無天人之殊無先後之别性即道道即性也昭昭矣惟知一隂一陽之道繼善成性彼謂無善無不善可乎惟知率性即道而五倫乃天下之達道也彼謂道可道非常道可乎惟知性善本相近成性存存道義之門則道必根諸天性斯道不可離性必顯諸道義斯為達道凢岐而二之者皆非真知性道者矣雖然堯舜性之也堯舜之道孝弟而已矣故曰人皆可以為堯舜圖書編巻七十六
