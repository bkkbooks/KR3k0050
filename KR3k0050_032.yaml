body:
  text: 圖書編卷三十二明章潢撰周職方春秋列國圖總敘禹貢九州想從古有圖籍可考三代封建未之改也觀周禮職方所掌幽冀分屬而梁之名已不見于九州矣然列國都邑大勢如故及平王以後諸侯率以兵力爭雄區宇分裂非復先王之舊也故蘇子瞻畫為春秋列國指掌圖以便觀覽凡古今圖國邑沿革異同皆可按圖以核其詳焉嗟夫凡今之人誰不罪秦之廢封建為郡縣也抑孰知唐虞萬國至周王代商止存千八百國耳春秋魯衛齊晉小大不侔其所存者不過數十匪特篡弒之禍靡國不然而強弱吞噬亦無虛日秦雖始欲復封建萬國勢不能已雖然今昔之時勢雖殊而疆土則萬古不易欲求先王區畫舊制盍于周禮職方春秋列國圖而考其變革之自云周職方氏九州山澤川浸利民畜穀九州分立與虞書禹貢異者蓋禹至于治水幽并營皆北方廣漠之地罹水患少故幽并統于冀營統于青而止九州舜時四夷來王封域極廣肇十有二州後有作者不可及矣周時大約與漢同但淮與大野在禹貢徐州之川澤而職方青州之川淮泗兖州之澤大野是以徐而入青兖矣華陽璆鐵砮磬在禹貢為梁州之山與貢也而職方豫州之山華雍州之利玉石是以梁而入雍豫矣此為不同耳然無徐州者蓋洪水之害淮河為大禹于其下流施功為多故建徐州周時碣石淪于海正東之地不及于虞故有青兖則雖革徐州而東方為無空者無梁州則西方輿地似于缺然何也夫天地之化開之有漸始西北而次東北次東南次正南故上古聖人皆出于北方周家世居西土文王之化延及江漢正荆州之地武王伐紂而庸蜀羌髳景從是乃梁州以及徼外之地然其中未歸化者則甚衆故周以其施貢所及者則分屬于荆雍豫而其不及以政者亦不入于職方也方今財賦文獻多出南方雖閩越南粵自古所謂荒服者今悉與中土無異但西南地俱為來王之國而時有背叛者宜周公于此不置屬也夫聖人之教不先天以開人不棄天以從人西南之域開之有時是故不能強之以俟後聖也乃若北方醫無閭冀州河套內等地正職方氏所謂榖宜三種畜宜四擾而在九服之內其外則為九貊六狄亦皆內屬而周知其民物之數者自周德衰而為他人所竊據秦人不知守在四夷之道為長城以限之遂使肥美之地與兖豫等者悉淪沒沙漠不毛之域矣自漢以來欲為控禦之䇿者已視為大事而不思生聚教訓以經略吾之九服者乃分內事是不免于棄天也周九州與禹貢異丘氏曰冀兖青徐揚荆豫梁雍此禹貢九州也冀豫雍幽營揚兖徐荆此爾雅九州也揚荆豫青兖雍冀幽并此職方九州也舜肇十有二州分冀為幽并青為營夏復為九州周九州與禹貢不同者周都雍王畿不可不廣梁多險阻故合雍梁為一時碣石淪于海徐地狹故青兼之堯舜都冀壤最闊今京師山西外所包者廣故此分幽并春秋列國圖傳稱武王克商光有天下兄弟之國者十有五人姬姓之國者四十人爵五品而土三等公侯百里伯七十里子男五十里不滿為附庸蓋千八百國周室既衰轉相吞滅數百年間列國耗盡春秋之世見於經傳總一百二十四國魯晉楚齊秦吳越宋衛鄭陳蔡諸曹許莒杞滕薛小邾息隨虞北燕紀巴鄧郕徐鄫芮胡南燕州梁荀賈凡蔡宿鄅原夔舒鳩滑郯黃羅邢魏霍郜鄋蒲向逼陽韓舒庸焦陽夷申密耿麋邾弦頓沈榖談舒鄖白狄賴肥鼓戎蠻唐潞江鄖權道桓二軫絞蓼六遂崇戴冀溫厲項英氏介巢盧根牟無終牟姒蓐房狄鮮虞陸渾桐郡於餘丘須勾顓臾任葛蕭鄟極鄣至其他蠻夷戎狄不在其間若夫二百四十二年之中朝會盟聘圍伐滅入孔子筆之於經丘明公榖發明於傳至今猶想見其處今掇取其尤著者附次於斯舊圖引晉地理志云見于經傳者百七十國以夏商時諸侯斟尋過戈豕韋之類並列其間蓋前史誤今以左傳書春秋纂例參定之春秋列國合皇明輿圖齊桓服楚結江黃晉文摧楚服曹衛皆按地以握其背也虞失下陽國遂滅鄭失虎牢民告病皆開門以延夫冦也是故審要害據形勝自可制人而不制于人國無憂矣槩而論之地理疆域其可以弗究乎欲究地理無出東坡指掌一圖即披閲間不惟知春秋諸侯所屬之國道里逺近即皇明一統輿圖亦得以詳其自矣山東即春秋之齊魯也浙江即春秋之吳越也福建即春秋之閩越也山西即春秋之五臺欣代也陜西即春秋之秦也四川即春秋之蜀也廣西即春秋之思柳也湖廣即春秋之楚也江西即春秋之西康以上也河南即春秋之許鄭也廣東即春秋之南粵也知各省之所自則知春秋五霸十二公經歷處矣然五霸之所禦者即今之九邊而九邊又可以弗究乎嘗聞之冀州即燕京左輔也宣府即大寧涼亭間而葛峪柴溝皆其路也大同即古雲中偏頭寧武鴈門三關附焉所謂娘娘灘羊圈皆其地也榆林即舊治綏德而棄米脂魚河皆其地寧夏即朔方賀蘭山花馬池花兒岔皆其要也甘肅即漢之河西紅城子莊浪鎮皆其要也固原即開城與寧夏為唇齒花馬池邊人謂之大門吾以是益知九邊要害譬大家門户利在關防設使大門不嚴而守儀門角門不固而守房門可使暴客不入吾院宇及吾房舍乎今宣府大同國朝大門也遼東延夏甘涼角門也山海居庸紫荆鴈門之類儀門也緩大門而急儀門不可以言計無故而退守不可以言武縱大門失守獨責儀門不可以言法深謀逺慮者可不加之意哉觀春秋伐山戎敗長狄入州來會潢池而治亂存亡之機兆矣齊魯秦晉之封危矣哉歷代州郡沿革考秦罷侯置守分天下為四十郡內史雍州之域北地雍州之域隴西雍州之域上郡雍州之域九原雍州之域三川荆河之域碭郡豫州之域潁川豫州之域南陽豫州之域邯鄲冀州之域上谷冀州之域巨鹿冀州之域漁陽冀州之域右北平冀州之域遼東青州之域河東冀州之域上黨冀州之域太原冀州之域代郡冀州之域鴈門冀州之域雲中冀州之域東郡兖州之域齊郡兖州之域薛郡兖州之域琅琊青州之域泗水徐州之域漢中梁州之域巴郡梁州之域蜀郡梁州之域會稽揚州之域閩中揚州之域南郡荆州之域長沙荆州之域黔中荆州之域南海南越之域桂林南越之域象郡南越之域其地西臨洮北沙漠東縈南帶皆臨大海漢開越攘邊土宇彌廣分為十三州部刺史𨽻治河南今河南府豫治譙鄴縣兖治昌邑魯郡徐治郯下邳縣青治臨淄北海郡涼治隴天水郡并治晉陽大原冀治鄗趙郡幽治薊范陽揚治歷陽今縣益治雒永昌荆治夀春武陵縣交治廣信蒼梧其地東樂浪郡西燉煌郡南日南郡北鴈門郡西南永昌郡晉初分為十九州部置司州治洛陽兖治廩丘雷澤縣豫治項項城冀治房子趙郡并治晉陽青治臨淄徐治彭城荆初襄陽後江陵揚治夀春春後建業涼治武威分三輔為雍治京兆分隴山之西為秦治上邽益治成都分巴漢為梁治南鄭漢中分雲南為寧治雲南幽治涿分遼東為平治昌黎安東府交治龍編安南分合浦之北為廣治番禺唐貞觀分為十道開元分為十五道置採訪使以檢察非法京畿治西京城都畿治東都關內多以京官遙領河南治陳留郡河東治河東郡河北治魏郡隴右治西平郡山南東治襄陽郡山西南治漢中郡劍南治蜀郡淮南治廣陵郡江南東治吳郡江南西治豫章郡黔中治黔中郡嶺南治南海郡其地東至安東都護府西至安西都護府南至日南郡北至單于都護府南北如前漢東不及西過之宋分天下為二十四路東京開封西京洛陽南京應天北京大名浙江路臨安浙東路紹興福建路福州江南東路建康江南西路隆興淮南東路易州淮南西路廬州湖南路湘潭湖北路江陵成都府路四川利州路漢中梓州路潼川夔州路寧江軍廣南東路廣州廣南西路靜江京西南路襄陽京西北路穎昌京東東路青州京東西路兖州秦鳳路鳳翔永興軍路陜西河北東路澶州河北西路真定河東路太原如唐之河東河北隴右則多為遼夏據疆土視漢唐則大促矣按自秦漢以來州郡建置遷徙弗常疆土分裂廣狹靡定時勢然也欲稽古證今使于載籍一無所據則制以時異地以名淆悉混焉罔辨矧其間人物風土及一切沿革于何而徵之哉爰採各代州郡大略以備尚論之考證云冀州沿革冀州其在天上昴畢則趙之分野尾箕則燕之分野兼得秦魏衛之交秦平天下置郡則為巨鹿邯鄲上谷漁陽右北平遼西河東上黨太原代郡鴈門雲中及三川郡之北境漢武置十二州此為冀州幽州并州後漢並因前代為冀州幽州并州魏並因之晉置冀州幽州并州惠帝之後其地淪沒於劉元海石勒慕容雋又為符堅所陷堅敗慕容垂據之後屬後魏自此分割不可詳焉唐分置十五部此為河北道河東道兼分入都畿關內道唐末營平二州陷于契丹梁初劉仁恭父子據幽燕繼而為晉王所滅晉滅梁稱唐唐末石敬塘叛以幽涿薊檀順瀛莫蔚朔雲應新媯儒武寰十六州賂契丹資其兵伐唐為晉晉亡漢繼之漢亡周劉旻據河東周世宗伐契丹取瀛莫二州周亡宋受命太宗以太平興國四年平劉繼元盡得河東之地宋承唐制冀州之境為河北河東兩路其後又分河北為東西二路宣和間遣使約女真夾攻遼取石晉所沒之地十六州遼既亡金人止以薊景檀順涿易六州二十四縣來歸遼將張玨又以平州來降繼復為金所取靖康後冀地盡沒于金揚州沿革在於天官斗則吳之分野兼得楚及南越之交亦古流服之國春秋時屬吳越二國越滅吳盡并其地戰國時屬楚秦并天下置郡此為九江鄣會稽閩中南海郡之東境漢改九江曰淮南國及封皇子長為淮南王封劉濞為吳王二國盡得揚州之地武帝置十三州此為揚州後漢因之三國時淮南屬魏而江南屬吳也魏晉亦置揚州元帝渡江揚州遂為王畿領江東浙江地宋孝武分浙東為東揚州後罷揚州以其地為王畿而東揚州直云揚州尋復舊又分置南兖州南徐州南荆河州江州齊並因前代唯徙置豫州北兖州北徐州梁陳分裂不可詳焉唐分置十五部此為淮南道江南道江南西道五代淮南江東北為南唐兩浙為吳越閩為王氏其後南取閩至宋開寶八年取南唐太平興國三年吳越納土始盡有揚州之地為淮南東西路浙東西路江東西路福建路兖州沿革其在天文營室東壁則衛之分野兼得魏宋齊趙之交秦平天下置郡此為東郡碭郡之東北境齊郡之北境巨鹿上谷二郡之東境漢武置十三州此為兖州後漢並因前代魏晉亦置兖州永嘉之後陷于石勒宋武平河南又得其地置兖州宋末其地入魏自後分割不可詳焉唐分置十五部此為河南道梁時滄德二州為唐所有末年貝博二州為唐所取唐滅梁傳晉漢周皆有其地宋以魏博貝滄德棣為河北東路濮鄆濟為京東西路滑為京西北路靖康後沒于金青州沿革在天官則虛危齊之分野秦平天下置郡此為齊郡琅琊之東境遼東秦亂項羽宰割天下以其地為國曰膠東齊濟北漢武置十三州此亦為青州後漢因之魏晉亦因之晉又置平州懷帝末沒於石勒慕容皓及慕容恪滅冉閔尅青州至苻氏平燕復有其地及苻氏敗後刺史苻朗以州降晉晉以為幽州安帝時平州又陷于慕容垂其青州又為慕容德所據復改為青州後為劉裕所尅復置青州平州自慕容垂後又沒于馮跋旋為後魏所有其青州宋分為青冀二州後入後魏其後分析不可具舉唐分置十五部此為河南道河北道安東府宋為東京路建炎後沒於金徐州沿革在天文奎婁則魯之分野兼得宋齊吳之交秦平天下置郡此為泗水琅琊之西境薛郡漢又加置東海郡漢武帝置十三州還以其地為徐州後漢並因之前代魏晉亦因之曰徐州自元帝渡江徐州所得唯半而已宋初因之明帝初地入于後魏其後不可詳焉唐分置十三部此為河南道唐末海泗二州為楊行密所據其後為南周世宗伐南唐取二州宋分為京東路京西路淮東道建炎後沒於金惟海泗二州屢失紹興議卒割以遺金豫州沿革在天官柳七星張則周之分野房心則宋之分野觜觹參則魏之分野角亢氐則韓之分野兼得秦楚之交秦平天下置郡為三川碭潁川南陽郡之東境北境南郡之北境漢武置十三州此為豫州後漢為司𨽻豫州魏亦同晉分置司州及豫州永嘉之亂豫州沒于劉石苻姚宋初有其南境置豫州後魏以後分裂不詳焉唐分置十五部此為都畿河南道兼分入山南東道及河東道五代並都于汴宋因之其豫州之境俱為京師輔郡置京東路京西路南渡後俱沒于金惟得京師之襄陽均隨棗陽光化而已雍州沿革在天文東井輿鬼則秦之分野兼得趙魏之交始皇置四十郡此為內史上郡北地九原隴西及雲中之西南境其餘郡縣自漢後歷代開置其伊吾以西並雍州之封域外諸裔地也秦滅項籍分秦地為三國曰雍塞翟謂之三秦漢武帝置十三州以其地西偏為涼州蓋以地處西方常寒涼也又置司𨽻領三輔後漢時司𨽻三輔立如前代魏分河西為涼州分隴右為秦州三輔仍舊屬司𨽻晉置雍州涼州秦州愍帝之後劉聰石勒苻堅姚萇相繼據之及姚泓為宋武帝所滅後屬赫連勃勃其州縣之名不可得而紀也後魏以其地置北秦雍南秦三州頗得古雍州之地逮西魏以後及于周氏分裂置制其名甚多不可悉數隋氏置司𨽻刺史分部巡察而不詳所統唐分置十部此為京畿關內道隴右道天寶盜起而河西隴右不守陷於吐蕃至太中咸通始復隴右宋為陜西路及河東路內夏銀綏宥靜靈鹽諸郡為西夏所據甘涼瓜沙肅西伊安西北庭亦沒於西夏及諸蕃慶厯初分陜西緣邊為秦鳳涇源環慶鄜延四路熙寧間又以熙河洮岷州通逺軍為一路各置帥五年又以五路三十四州軍分為兩路永興軍等路秦鳳等路紹興初置川陜等路宣撫處置使富平之敗陜西五路俱陷于金吳玠胡世將等力戰守鳳翔之和尚原九年和議成歸我陜西地十年背盟復入再取陜西僅餘階成岷鳳泗州以屬四州之利州路云荆州沿革在天文翼軫則楚之分野兼得韓秦之交秦平天下置郡此為南郡黔中長沙南陽之東郡漢武置十三州此為荆州其五溪中地歸漢以後歷代開拓後漢因之漢末曹公赤壁敗後遂與吳蜀三分其地及劉備沒後所分之地悉復屬吳而荆州南北雙立晉置荆州宋分置荆州司州郢州湘州雍州齊並因之州境之內含帶蠻蛋土地遼落稱為殷曠江左大鎮莫過荆揚故謂荆州為陜西也其後割裂不可詳也唐分置十五部此為山南東道江南西道黔中道兼分入淮南道及嶺南道宋乾德元年平荆湖三年平蜀始盡得古荆州之地後為荆湖北路荆湖南路及夔路之施黔思播等州云梁州沿革在天文兼參之宿亦秦之分野又得楚之交秦平天下置郡為漢中巴蜀隴西郡之南境內史之南境其餘土境自漢以後歷代開拓氐羌戎夷之地漢武帝置十三州益州領郡八益之為言隘也言其地隘險亦曰壤壤益大王莽末公孫述據有其地後漢建武中平之置益州至獻帝末劉備復據其地魏末平之遂分置梁益二州晉初因之後又分益州南境置寧州惠帝以後李特據之至穆帝時平之其後沒於苻堅後又復其地安帝時譙縱據之後又收復宋梁益寧三州並因前代更置秦州齊及梁初多因之後魏得漢中亦曰梁州西魏亦因之復入於梁梁滅再復其地自是以後所置州郡割裂無恆不可詳記唐分置十五郡此為山南西道山南東道劍南道兼分入京畿隴右道及黔中道唐末蜀地為王建所據後唐滅王氏而取其地孟知祥復據之至宋乾德三年平孟蜀始盡得梁州之地分為益州利州梓州夔州四路云南越沿革在天文牽牛婺女則越之分野兼得楚之交秦始皇略定楊越謫戍五方南守五嶺後遣任囂攻取陸梁之地遂平南越置郡此為南海桂林象置南海尉以典之所謂東南一尉者也秦末趙他遂王其地漢因封之他後數代其相吕嘉反叛武帝使伏波將軍路博德討平之元封初又遣軍自合浦徐聞入南海至大州方千里略得之後兼置交趾刺史其餘土宇自漢以後歷代開拓後漢建武中交趾女子徵側妹徵二反於是九真日南合浦蠻俚皆應之自立為交趾帝使馬援平定交部始調立城郭置井邑至獻帝乃立為交州其邊州詔使持節給鼓吹以重威鎮加九錫六佾之舞漢末其地並屬吳仍分為廣州後屬以建寧大守遙領交州晉平蜀亦然及平吳仍舊是交廣二州宋分為廣州交州越州齊並因之梁陳以來廢置混雜不能悉舉唐分十五部此為嶺南道五代時為劉氏所據宋乾德四年平南漢始盡得嶺南之地分為廣南東路西路統論九州之田今天下之田稱衍者莫如吳越閩蜀其一畝所出視他州輒數倍彼閩蜀吳越者古揚州梁州之地也按禹貢揚州之田第九梁州之田第七是二州之田在九州之中等最為下而今以沃衍稱者何哉吳越閩蜀地狹人衆培養灌溉之功至也夫以第七第九之田培養灌溉之功至猶能倍他州之所出又况其上之數等乎以此言之今天下之田地力未盡者亦多矣九州之産揚州其利金錫竹箭荆州其利丹銀齒革豫州其利林漆絲枲青兖州其利蒲魚雍州其利玉石幽州其利魚鹽冀州其利松柏并州其利布帛以禹貢揚州惟金三品瑶琨篠簜則金錫竹箭固揚州所産也荆州厥貢羽毛齒革惟金三品與夫砥礪砮丹則丹銀齒革固荆州所産也然則餘州皆以其地所産之多少者而言之也總論九州田賦九州之內有田重而賦輕如青州田上下賦中上徐州田上中賦中中梁州田下上賦下中雍州田上上賦中下或田輕而賦重如冀州田中中賦上上是也或田賦等如兖州田中下賦下下是也以州之兵賦考之民之能出兵馬以供上之征伐者以其力之有餘而已民力厚薄由乎田之肥瘦自古當然而禹貢所出之賦乃爾輕重不同何哉冀州土厚水深號為沃野豫州天地之中商賈所集揚州東方之都會荆州南夏之名區故冀豫為羅綺之鄉荆揚為魚鹽之海他物所出利倍於田所以田輕而賦重也青徐海上僻陋之邦土狹民瘠雍梁西鄙控扼之國地險患多田土之外雜出不厚此所以田重而賦輕也至於兖州無雍梁之邊患無青徐之鄙陋又無荆揚之魚鹽又無冀豫之羅綺居天下有無之中此所以田賦等也九州水土田里總數帝王世紀曰禹平水土九州之地凡二千四百三十萬八千二十四頃定墾者九百二十萬八千二十四頃不墾者千五百萬二千頃民口千三百三十三萬三千九百二十三人至於塗山之會諸侯承唐虞之盛執玉帛者亦有萬國是以山海經稱禹使大章步自東極至于西垂二億三萬三千五百里七十五步又使竪亥步南極北盡於北垂二億三萬三千五百里七十五步四海之內則東西二萬八千里南北二萬六千里出水者八千里受水者八千里名山五千二百五十徑六萬四千五十六里出銅之山四百六十七出鐵之山三千六百凡以供財用儉則餘奢則不足以男女耕織不奪其時故公家有三十年之積私家有九年之儲歷代郡縣沿革論昔堯遭洪水疇土居民始别九州舜肇州十有二説者八家為鄰三鄰為朋三朋為里五里為邑十邑為都十都為師州十有二師焉蓋州凡四十三萬二千家或曰二百一十國以為州與周禮所謂五黨為州州二千五百家者不同蓋唐虞所謂州畫土以命牧伯也周禮所謂州限民以施教法也周制天子方千里分為百縣縣有四郡凡縣百里郡二十五里故左氏傳曰上大夫受縣下大夫受郡較諸周禮所謂四甸為縣五鄙為縣者又不同按大司徒經土地而井牧其田野自方里而井積至四甸則方二千里遂人掌邦之野以土地之圖經田野造縣鄙形體之法自五家為鄰積至五鄙則二千五百家蓋周制所謂縣因地設官也周禮所謂縣因田授民也楚子嘗縣陳矣以國為縣其大可知也孔孟所稱葉公費惠公之屬特一縣尹耳下王一等至僣稱公則其大又可知也秦兼天下初置三十六郡以監縣於是郡始大而縣反小漢復十二州孝武皇帝南平百越北却胸奴置交趾朔方獨不稱州明帝王不相沿襲蓋或以羈縻視之不可知云交趾統七郡治蒼梧廣信孝獻皇帝建安二年南陽張津為刺史交趾太守士燮表言伏見十二州皆稱曰州而交獨為交趾刺史何天恩不平乎蓋普天之下可謂十二州者獨不可為十三州乎詔報聽許拜津為交趾牧加以九錫彤弓彤矢使持節并七郡皆給鼓吹禮樂征伐威震南夏與中州方伯齊同自津始也其後交州徙治番禺建安十五年復分為廣州晉始有使持節都督荆揚交廣諸軍事之制是謂軍府梁又開督府于交廣隋制州皆置都督府唐因之又置總管府蓋府以領軍得名如帥府幕府嶺南五府之例其以名郡則自宋始宋制州有節度重鎮者始升為府為廣南為東西路西路之府惟靖江慶逺餘皆為州元制凡府州皆為路路有總管府大明興分天下為十三布政司統府府統州州統縣有州不屬府而屬布政司者亦有縣不屬府者因道路逺近相時制宜故也由是言之州始于陶唐州統縣縣統郡始于周郡統縣始于秦州統郡郡統縣始于漢三國鼎分迄于南北割據置州始多至隋而州郡相等唐乃混州郡為一宋始有府猶與州並肩不相統然郡之名至是遂廢蓋府即郡也其在于今府始大而州益小州蓋與縣等或有反不及縣者矣古今地名沿革總論百王制度代有沿革考正實難而地名同異古今溷淆尤為難辨者也蓋其山川所屆時各異名而郡邑之名又復非古嵗代兹久史傳互見或沿其地而異其名或襲其名而遷其地或以遷其地而革其名此輿地之所以難考也抑嘗討之河東一名也有兖州之河東有并州之河東黃河舊道三代以前自宋衛州之黎陽縣近折而北流故北京及河北東路諸州在河之東即古兖州之域故周禮職方河東曰兖州爰自周定王時黃河舊道漸以湮塞秦漢以還河堤屢壞乘上遊之勢決而東下故兖州之域隔在河北而河東之名乃移在并州戰國以來子史中所謂河東之地皆指宋朝河東路而言之即古并之域也河西一名也有雍州之河西有涼州之河西黃河源自崑崙傍積石北流餘二千里至於宋銀夏之交稍漸而東流不盈十里又折而南流故宋永興軍路鄜坊丹延諸州在河之西而河湟之間鄯涼甘肅諸州亦在河西戰國之際所稱河西地即指鄜房丹延之間而言在雍州之域也西漢以來所稱河西地即指河湟而言古涼州之域也河南一名也有中土之河南有邊境之河南河北一名也有中國之河北有僥外之河北黃河大勢如覆斗之狀而關中正在斗間而中原適當如衡故宋之京畿西路在河之南斯中土之河南也而綏銀勝夏諸州亦在河南即邊境之河南也河北東西路在河之北斯中國之河北也而隂山瀚海之間有秦長城外地亦在河北即僥外之河北也三代以前河南之稱止在中土秦漢而下奪胸奴南牧之地列為郡縣亦名之曰河南自是河南之稱一彼一此不常也陳隋以前河北之稱止在中國李唐之初夷突厥之地悉為郡縣亦名之曰河北自是河北之稱一彼一此不常也如春秋傳中所稱河南河北之地皆指邊境之地而言與前史至不相侔若此之類不可不察也加之百王疆理代有不同有指一郡而言者有指一州而言者有指一道而言者如中土河南之地今古一名而兩漢河南之稱惟指一郡而言即宋西屬縣兼鄭孟二州之境而已姬周河內之稱則指一州而言即宋東西二京及京西南北路之地李唐河南之稱則指一道而言包古青徐兖豫四州之境奄黃河以南皆是也宋為東西南三京及京畿四州之地故周之河內異乎漢之河內周禮職方河內曰冀州即宋河北東西路地漢之河內乃古郡宋懷衛二州是已漢之河東異乎唐之河東漢河東郡即宋河中府及慈隰晉絳解五州唐河東道乃宋河東路地古之淮北乃今之淮南宋宿亳二州自開國以來至于唐李皆在淮北宋乃移屬淮南而今之河北乃古之河東宋朝河北東路之地三代以前屬河東以至淮西一名也有在京東有在京西淮道自西而東時折而北流故淮北之地間名淮西如漢封劉交為楚正王淮西則宋京東西路之地也唐裴度身督戰遂平淮西則宋西北路之地江西一名也有在江北有在江南江道自西而東時折而北流故江北之地間名江西而魏志武帝既稱江西遂空則宋淮南東路之地也晉記稱石勒陷江西壁壘百餘則宋京西南路之地也至五代史稱鍾傳據有江西乃今江南西路之地江南一地也有稱江左有稱江右金陵居長江下流前朝有江南者皆都之據金陵而言則江南居左四瀆之流皆自西而東天下之形勢亦然以中原而言則江南之地居右故前史兩稱之山東亦一名也有指河南而言者有指河北而言者前史有山水之稱者皆據華而言之則其所謂在華山之東也其地正當河南而稍及河北之近河南者至杜牧之罪言則所稱山東之地專指河北而言也陜西亦一地也虞夏曰雍州商周曰西土春秋為秦國戰國稱關中楚漢之際謂之三秦兩漢又名山西宋列為陜西路而前史又從而稱顯之曰四塞之國曰陸海之地曰天府之居其名雖異實則同也反以三隅他可知已此所謂山川所屆時各異名者也嘗考歷代州郡之名多有異同於古之國號如書稱河亶甲居相即今之相州也春秋衛侯燬滅邢即今之邢州也楚子入陳即今之陳州也齊師滅陳即今之陳州也齊師滅萊即今之萊州也楚子圍鄭即今鄭州之新鄭縣也齊侯侵蔡即今蔡州之上蔡縣也若此類未易槩舉蓋履其地不敢沒其名也然而遷徙不常考證或踈至有已非其地而空存其名者如春秋吳師入郢近於今之郢州而非也古郢城在今之荆南府界去郢州餘三百里秦師入滑近於今之滑州而非也古滑國今在西京偃師縣之滑氏鎮去滑州餘四百里楚人滅舒近於今之舒州而非也古舒國今在廬州之舒城縣去舒州餘三百里楚人滅黃近於今之黃州而非也古黃國今在邢州定城縣去黃州四百五十里楚人伐徐近於今之徐州而非也古徐州今在泗州臨淮縣之徐城鎮去徐州垂五百里傳稱允姓之戎居於瓜州於今之瓜州而非也古瓜州地在今沙州去瓜州垂三百里有西亳南亳北亳而皆非今之亳州也西亳今在偃師南亳在榖熟縣北亳在考城縣有東虢西虢南虢而皆非今之虢州也東虢在鄭州滎陽縣西虢在鳳翔府虢縣南虢在南陵軍升陸縣有東楚西楚南楚而皆非今之楚州也東楚今蘇州西楚今徐州南楚即今荆州府夫以州郡之名既非古昔而縣邑之名抑又乖戾方春秋之際鄉亭邑聚之名見於經傳者不啻千數而存于今者百無一二其有地不徙名不更歷代常存用迄于今如彭城鍾離酸棗長葛諸城才十數而止耳其餘或名同於古則地改於今故古之酒泉在河南而今之酒泉在河西左傳王與虢公酒泉之邑實在於河南而西漢而下迄於今有酒泉郡乃間胸奴之地實在河西古之丹陽在荆南而今之丹陽在江東左傳稱楚子邑于丹陽今在荆南府枝江縣內今丹陽郡乃潤州也古之豫章在江北今之豫章在江南而皆吳楚之境也古之澶淵在河南今之澶淵在河北而皆宋衛之郊春秋諸侯會于澶淵實宋古都所謂澶淵聚者即其地正屬今之幽州而今之澶淵郡乃河北東路之都督府古之南陽在河北今之南陽在河南而皆晉地也左傳晉於是始啓南陽即今之懷州也而今之南陽郡乃京西南路之鄭州也古之東陽在淮北今之東陽在浙西而皆吳地也漢嘗以鄣郡東陽郡行封今浙西在吳亦有東陽夫地理更乎歷代必至混殽驗其名初無異同考其實則為甚異觀者於此幾何而不誤哉愚故曰百王制度考政實艱而地名異同尤為難辨者也地名異同左傳注雲夢跨江南北故有南夢北夢浯水有南浯北浯北浯在琅琊靈門南浯在九嶷零陵冀州之浸曰潞有東潞西潞東潞今之張家灣潞河驛西潞山西之上黨也東陽今之金華西陽今之黃州山海經注東甌今之永嘉在岐海中西甌即閩越今之建安亦在岐海中山有東吳西吳西鎮吳山在隴州水有東漢水西漢水見蜀志即此數處可見各方地名異同不可不察桂林非百粵辨今之桂林春秋戰國屬楚自楚滅越時越人散處海濵各為君長今桂林在嶺之北去海二千里與越不相涉東越都會稽閩越都甌冶南越都番禺駱越都交趾蓋百粵之統名在岐海中者是也秦桂林為西越地者以其為南越之屬後趙他所擊併蒼梧實不與焉即非秦之桂林可知矣五代時劉日晟盡有嶺南西地者二十年時亦僣稱南漢地非越王也終始無越之名何得以百粵名之楚越雖皆有南蠻之畿而其種類自别今越西蠻與武陵九嶷多同者同一疆界故也三河三秦三齊三楚三吳三梁三蔡三苗之辨三河唐堯都河東殷都河內周都河南故稱三河三秦項羽三分關中地封章邯雍王司馬欣塞王董翳翟王故稱三秦三齊謂齊及齊北膠東也三楚淮北沛陳汝南二郡此西楚也彭城以東東海吳廣陵此東楚也衡山九江江南豫章長沙此南楚也或曰楚文王都郢楚昭王都鄂楚考烈王都夀春故曰三楚三吳圖經云漢分會稽為吳與吳興丹陽為三吳通典同水經以吳興吳郡會稽為三吳指掌圖以蘇常湖為三吳其説不同九修稿云春秋之吳都蘇常之間漢封之吳都會稽即蘇常嘉杭非紹興之會稽也三國之吳初為會稽太守封吳侯即蘇松常鎮杭嘉湖之地備記之三梁謂南梁大梁少梁三蔡謂新蔡上蔡下蔡三苖在堯時為夷地在今日則為中國乃湖廣江鄂嶽之三州故今三州人皆有苗姓圖書編卷三十二
