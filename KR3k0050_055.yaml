body:
  text: 圖書編卷五十五明章潢撰兩河新築堤閘壩總敘竊惟黃淮二河古稱二瀆黃河發源於星宿海經崑崙山歷陜西山西河南出南直𨽻之徐州合山東汶泗諸水以資運道自徐經邳至清河縣東與淮水會淮河發源於河南之桐柏山經鳯陽泗州亦至清河縣東與黃河會二瀆合流俱經安東縣由雲梯關入海其淮河以南則由淮安歷揚州以通江南黃河以北則由會通河歷天津以達京師兩河抱於鳯泗光嶽鍾於祖陵我國家億萬年根本之地實在於此且歲輸江南四百萬之糧以給官軍數十萬之用上有關於國計下有係於民生自隆慶年間黃河從崔鎮等口北決淮水從髙家堰等處東決二瀆之水散漫無歸故入海之路停滯而不達此非河之淺也水不行而沙自塞耳今惟諸決盡塞兩河復合水行沙刷海口復通且堅築􅀈堰以防伏秋之漲連建減水壩以泄盈溢之水築歸仁集而泗州陵寢無衝射之虞固黃浦八淺寶應諸隄而興鹽諸邑無昏墊之苦塞天妃閘以拒黃流修復通濟清江福興諸閘以嚴啓閉復禮智二壩創建天妃壩以便車盤則二瀆不至橫流兩河悉循故道閭閻有可耕之業漕運無轉挽之難真平成之偉觀曠世之希覯也初議治河疏略看得水性就下以海為壑向因海壅河髙以致決隄肆溢運道民生胥受其病故今談河患者皆咎海口而以濬海為上策則誠然矣第海有潮汐茫無駐足不得已而議他闢豈知海口視昔雖壅然自雲梯肆套以下濶七八里至十餘里深皆三四丈不等縱使欲另開鑿必須深濶相類方便注放則工力艱巨必不能成矧未至海口乾地猶可施工及將入海之處則潮汐往來亦與舊口等爾且海之舊口皆係積沙人力可濬水力能衝乃若新闢之地則土壤堅實不特人力難措而水力亦不能衝故職等竊謂海無可濬之理惟當導河以歸之海則以水治水即濬海之理也然河又非可以人力導也欲順其性先懼其溢惟當繕治隄防俾無旁決則水由地中沙隨水去即導河之策也顧頻年以來無日不以繕隄為事亦無日不以決隄為患何哉卑薄而不能支迫近而不能容雜以浮沙而不能久隄之制未備耳是以黃決催鎮等口而水多北潰為無隄也淮決髙家堰黃浦等口而水多東潰隄弗固也乃議者不咎制之未備而咎築隄為下策豈得為通論哉又有所未盡者上流既潰隄以旁決矣至於下流復或岐而分之其趨於雲梯關正海口者譬猶強弩之末耳蓋徒知分流以殺其怒而不知水勢益分則其力益弱水力既弱又安望其能導積沙以注於海乎職等故謂今日濬海之急務必先塞決以導河尤當固隄以杜決而欲隄之不決者必真土而勿雜浮沙髙厚而勿省巨費讓遠而勿與爭地斯隄可固也如徐邳桃清沿河各隄固矣催鎮等口塞矣則黃不旁決而衝漕力專髙家堰築矣朱家口塞矣則淮不旁決而會黃力專淮黃既合自有控海之勢又懼其分之則力弱也則必暫塞清江浦河而嚴司啓閉以防其內奔姑置草灣河而專復雲梯以還其故道仍接築淮安新城長堤以防其末流盡令黃淮全河之力涓滴悉趨於海則力強且專下流之積沙自去下流既順上流之淤墊自通海不濬而闢河不挑而深矣此職等所謂固隄即所以導河導河即所以濬海也猶慮伏秋水發暴漲傷隄職等查得吕梁上洪之磨臍溝桃源之陵城清河之安娘等處土性堅實可築滚水石壩三座若水髙於壩任其走泄則水勢可殺而兩隄無虞矣至若寶應石堤之當復與夫下流支河之當疏揚州運河之當濬皆今時之切務所宜次第併舉而不可緩者也但前項工程自豐沛徐淮以至海口共長千有餘里自清江浦以至儀真共長三百餘里地勢遙遠工程浩大一時錢糧未措人夫難集除前請發銀二十萬兩并截留漕糧八萬石一靣先將豐沛縷隄大黃遙隄及徐邳一帶縷隄酌量幫築桃清南隄併接淮安新城長隄乘時創築髙家堰兩頭水勢稍緩先行築塞寶應湖先用樁笆修築土隄外其餘各項工程相應大加修舉云云議照事師古者罔愆智不鑿者乃大孟子論智一章首以禹之治水為喻而論為政則曰為政不因先王之道可謂智乎是大智者事必師古而不師古則鑿矣故治河者必先求河水自然之性而後可施其疏築之功必先求古人已試之效而後可倣其平成之業黃水來自崑崙入徐濟運歷邳宿桃清至清口會淮而東入於海淮水自洛及鳯歷旴泗至清口會河而東入於海此兩河之故道即河水自然之性也元時歲漕江南之粟由揚州直北出廟灣入海至永樂年間平江伯陳瑄始隄管家諸湖通淮河為運道然慮淮水漲溢東侵淮郡也故築髙家堰隄以捍之起武家墩經大小澗至阜寧湖而淮水無東侵之患矣又慮黃河漲溢南侵淮郡也故隄新城之北以捍之起清江浦沿鉢池山栁浦灣迤東而黃水無難侵之患矣尤慮河水自閘衝入不免泥淤故嚴啓閉之禁止許漕艘鮮船由閘出入匙鑰掌之都漕五日發籌一放而官民船隻悉由五壩車盤是以淮郡晏然漕渠永賴而陳平江之功至今未斬也後因剝食既久隄岸漸傾水從髙家堰決入一郡遂為魚鱉而當事者未考其故乃謂海口壅塞遂穿支渠以泄之蓋欲亟拯淮民之溺多方規畫以為疏導之計其意甚善而其心良亦苦矣詎知旁支暫開水勢陡趨西橋以上正河遂至淤阻而新開支河濶僅二十餘丈深僅丈許較之故道不及三十分之一耳豈能容受全河之水下流既壅上流自潰此崔鎮諸口所由決也今新開尋復淤塞故河漸已通流雖深濶未及原河十分之一而兩河全下沙隨水刷欲其全復河身不難也河身既復靣濶者七八里狹者亦不下三四百丈滔滔東下何水不容若猶以為不足而欲另尋他所别開一渠恐人力不至於此也以臣等度之非惟不必另鑿一口即草灣亦須置之勿濬矣故為今之計惟有修復平江伯之故業髙築南北兩隄以斷兩河之內灌而淮揚昏墊之苦可免至於塞黃浦口築寶應隄濬東關等淺修伍閘復伍壩之工次第舉之則淮以南之運道無虞矣堅塞桃源以下崔鎮口諸決而全河之水可歸故道至於兩岸遙隄或葺舊工或創新址或因髙岡或填窪上次第舉之則淮以北之運道無虞矣淮黃二河既無旁決並驅入海則沙隨水刷海口自復而桃清淺阻又不足言矣此以水治水之法也若夫扒撈挑濬之説僅可施之於閘河矣黃河河身廣濶撈濬何期悍激湍流器具難下前人屢試無功徒費工料但恐伏秋水發淫潦相仍不免暴漲致傷兩隄故欲於磨臍溝陵城安娘城等處再築滚水壩三道萬一水髙於壩任其宣泄則兩隄可保而正河亦無淤塞之患矣徐州以南之工如此而已或有難臣者曰臣等欲順水性今淮水欲東而乃挽一道果字鋪起至李字鋪加築遙隄四里餘谷山匙頭灣添建涵洞二座三義鎮添建滚水壩一座此皆原題未載委應增益在淮則有通濟福興二閘從新改遷新莊逼近通濟閘勢難兩存板閘止宜仍舊信字壩逼近黃河不便修復仁義壩改建天妃閘以裏至於興鹽等處入海支河因髙堰黃浦八淺隄成水可泄自宜停止而寶應湖隄減水閘止須修建四座此原題備載委當更易因時審勢隨地制宜臣等固不敢惜勞以貽一簣之虧亦不敢妄舉以滋無益之費兩河工成疏略照得數年以來黃淮二河胥失故道至以地方州縣為壑蓋由黃河惟恃縷隄而縷隄逼近河濵束水太急每遇伏秋輒被衝決橫溢四出一㵼千里莫之底極北岸則決崔鎮季大等處南岸則決龍窩周營等處共百餘口又從小河口白洋河灌入挾永堌諸湖之水越歸仁集直射泗州陵寢以致正河流緩泥沙停滯河身墊髙淮水又因髙家堰年久圮壞潰決東奔破黃浦決八淺而山陽髙寶興鹽悉成沮洳清口將為平陸黃淮分流淤沙罔滌雲梯關入海之路坐此淺挾而運道民生俱病矣自去秋興工之後諸決盡塞水悉歸漕衝刷力專日就深廣今遙隄告浚自徐抵淮六百餘里兩隄相望基址既遠且皆真土膠泥夯杵堅實絶無往嵗雜沙虛鬆之弊蜿蟺綿亘殆如長山夾峙而河流於其中即使異常泛漲縷隄不支而溢至遙隄勢力淺緩容蓄寬舒必復歸漕不能潰出譬之重門待暴則暴必難侵增纊禦寒則寒必難入兼以歸仁一隄橫截於宿桃南岸要害之區使黃水不得南決泗水至於桃清北岸又有減水四壩以節宣盈溢之水不令傷隄故在遙隄之內則運渠可無淺阻在遙隄之外則民田可免淹沒雖不能保河水之不溢而能保其必不奪河固不能保縷隄之無虞而能保其至遙即止蓋嘗考𢎞治以前張秋數塞數決自先任都御史劉大夏將黃陵岡一帶增築大行隄一道而張秋之患遂息此其已試之明驗也今職等所築之遙隄即大行隄之别名耳况係真正淤土較之大行雜沙又有不侔者故今歲伏初驟漲桃清一帶水為遙隄所束稍落即歸正漕沙隨水刷河身愈深河岸愈峻前歲桃清之河膠不可楫今深且不測而兩岸逈然髙矣上流如吕梁兩崖俱露巉石波流湍急漸復舊洪徐邳一帶年來篙探及底者今測之皆深七八丈兩崖居民無復昔年蕩析播遷之苦此黃水復其故道之效也髙家堰屹然如城堅固足恃今淮涓滴盡趨清口會黃入海清口日深上流日涸故不特堰內之地可耕而堰外湖波漸成赤地蓋堰外原係民田田之外為湖湖之外為淮向皆渾為一壑而今始復其本體矣其髙寶一帶因上流俱已築塞湖水不至漲滿且寶應石隄新砌堅緻故雖秋間霖潦浹旬隄俱如故黃浦八淺築塞之後俱各無虞栁浦灣一帶新隄環抱淮城並無齧損不特高寶田地得以耕藝而上自虹泗旴𣅿下及山陽興鹽等處皆成沃壤此淮水復其故道之效也見今淮城以西清河以東二瀆交流儼若涇渭誠所謂同為逆河以入於海矣海口之深測之已十餘丈蓋借水攻水以河治河黃淮並注水滌沙行無復壅滯非特不相為扼而且交相為用故當秋漲之日而其景象如此昔年沙墊河淺水溢地上祗見其多今則沙刷河深水由地中祗見其少地方士民皆謂二十年來所曠見也竊照我朝建都燕冀轉輸運道實為咽喉自儀真至淮安則資淮河之水自清河至徐州則資黃河之水黃河自西而來淮河自南而來今流於清河縣東經安東達雲梯關而入於海此自宋及今兩瀆之故道也數年以來崔鎮諸口決而黃水遂北髙堰黃決而淮水遂東桃清虹泗山陽髙寶興泰田廬墳墓俱成巨浸而入海故道幾成平陸臣等受事之初觸目驚心所至之處子遺之民攀輿號泣觀者皆為隕淚然議論紛起有謂故道當棄者有謂諸決當留者有謂當開支河以殺下流者有謂海口當另行開濬者臣等反覆計議棄故道則必欲乘新衝新衝皆住址陸地漫不成渠淺澀難以浮舟不可也留諸決則正河必奪桃清之間僅存溝水淮楊兩郡一望成湖不可也開支河則黃河必不能兩行自古紀之淮河泛溢隨地沮洳水中鑿渠則不能别尋他道則不得况殺者無幾而來者滔滔昏墊之患無時而止不可也惟有開濬海口一節於理為順方在猶豫而部遺咨叮嚀臣等親詣踏看臣等乃乘輕舠出雲梯關至海濱延袤四望則見積沙成灘中間行水之路不及十分之一然海口故道則廣自二三里以至十餘里詢之土人皆云往時深不可測近因黃淮分流止餘涓滴入海水少而緩故沙停而積海口淺而隘耳若兩河之水仍舊全歸故道則海口仍舊全復原額不必别尋開鑿徒費無益也臣等乃思欲疏下流先固上源欲遏旁支先防正道遂決意塞決以挽其趨築遙隄以防其決建減壩以殺其勢而保其隄一歲之間兩河歸正沙刷水深海口大闢田廬盡復流移歸業禾黍頗登國計無阻而民生亦有賴矣蓋築塞似為阻水不知力不專則沙不刷阻之者乃所以疏之也合流似為益水不知水不𢎞則沙不滌益之者乃所以殺之也旁溢則水散而淺返正則水束而深水行沙靣則見其髙水行河底則見其卑此既治之後與未治之先光景大相懸絶也每歲修防不失即此便為永圖借水攻沙以水治水臣等蒙昧之見如此而已至於復閘壩嚴啓閉疏濬楊河之淺亦皆尋繹先臣陳瑄故業原無竒謀祕䇿駭人觀聽者凡所勘隄壩慮長短之異數也為長繩以計其丈尺慮厚薄之異制也為橫竿垂線以計其底靣慮泥沙之異土也試之鋤鐝以驗其純雜慮堅鬆之異工也試之鏟錐以驗其虛實隄堰以土真杵實為上壩閘以石磈堅厚為工治河議文皇帝宅幽都歲漕東南粟四百萬置都水使者河上築隄距河慮至深矣嵗久禁弛濟南諸泉多牟沒而黃河亦時徙時決是故當永樂則鑿汶河正統𢎞治則鑿張秋金龍口在正德則塞曹沛嘉靖則有房村趙皮塞廟道口李景髙口之役蓋至嵗乙丑河決而東自華山入飛雲橋截沛水歷湖陵南至谷亭四十里匯為巨浸固漕河之大厄也明年大司空治之棄斯集龎家屯之舊河不治乃鑿自南陽東至夏村又東南至馬家橋然後遏河流之入沛者折入秦溝而疏留城故渠至境山五十里又疏薛沙諸支河分殺水怒蓋漕道是始更出而東南粟四百萬得從漕上入於大司農矣越隆慶辛未徐邳之水病漕則諸言濬舊河便者交難司空曰黃河所從來建瓴萬里邀挾百川獨秦溝當之彼其勢不溢而北則溢而東矣舊河之淪沒無幾其處易浚浚之良便奈何司空一日而勞十萬人之力捐縣官金錢數十萬緡粟稱是以鑿新河黃河性寧有常豈其能及舊河獨不及新河哉此固一説也然愚則以為國家漕道業已與河相直出秦溝過吕梁洪踰淮放海譬之大盜然矣漢武帝竭天下之力至沉璧馬令從官負薪石而後僅勝之乃立宣房宫作歌以侈大其事説者猶以為不若避之便何者河不與漕爭道也今河與漕爭道矣乃至欲引河利漕豈非延大盜入室哉故勢不得避則逆而捍之勢得避則順而徙之今必欲泝豐碭越虞城放於歸德之丁家道口以窮新集故道則厥土惟塗泥耳即具卒萬人恐不能操舟沒而取也且河性湍悍土疏善潰日雜之而日塞之則人將告病而久頓大衆以幾萬一之功非策也今獨疏鑿新河令河出秦溝而東不至病漕則是國家於河不治而已得其大竊以為司空之策得也然新河初成而境山而南又塞司空奉璽書役河上隄茶城以西至於馬家口幸應績矣而明年茶城蒙隂寶應下邳之間又以竭澤告病於是天子以當事諸臣意見不同動多掣肘故久而無功乃一事權假便宜豫金錢八十萬使重臣率水衡使者經畫漕事以力踐其言事克底績邀之以酬功勸之於是漕臣皆焦心乾口以盡其餘而淮決髙堰河決崔鎮者皆幸就塞淮揚徐邳之隄延袤千里而丁子淺蘆子沽其功頗告成矣此皇上元德格天淮海效靈所至獨所謂專一之效耶然愚聞往者髙堰黃浦以全淮之水病興化鹽城故議者請鑿丁溪白駒周祿港諸支河為水壑今黃浦幸就塞則開支河之役當議罷也不然是外引水病興鹽也范隄肇自吕泗終於徐瀆延袤數百里所以貽淮海之安非一日也即令以髙堰黃浦之故必當微鑿之以泄暴水亦所不敢言者况牛灣河瓦龍港其水門固在此何待范隄耶令黃浦幸就塞則范隄當以時修復也不然非所以捍海潮障鹽河也往者武宗朝有乞省轉輸之半者會羽書旁午主計者不能支遂罷其議今誠不能以減漕邀於左藏然稍議折以佐民旦夕之命且省轉輸此事理可為者也不然則頃者且賜民田租之三矣何論議折也往者嵗漕十二萬石海上而廟議有恐其以芻粟萬石率千人而棄之海者於是天子遂罷海漕愚則以為海漕亦不可罷誠自淮鹽海道夾碣石以薄幽薊嵗不過一月之勞耳其所輸可以佐緩急其視河漕大都所省牽挽供餉之費當得數十萬且令四方郡國寶藏皆得自海舶以交錯於幽薊為市也不然假令有羣不逞者當河而大呼以坐索餉饋而吾獨舉國待哺於河漕此非策也往者廟議皆言膠萊河北自海口南至麻灣縈紆三百餘里乘潮之艘雖能上下然不能遠諸山溪之水即欲鑿之使深而其應或多遊沙或多岡石其大沽河又南入麻灣不可挽而西濰河則越在百里外不可引而東必欲鑿兩海非經費百萬積五六年不可於是天子遂罷治膠萊愚則以為國家建設長利茍利足以償費猶將為之况相什百千萬此者乎今之膠萊廢河僅僅百里可以計日而就即費甚亦千金已耳何至縻費三百七十八萬也况姚演既治閘新河店通海潮達於安東則膠萊宜無不可開者元既歲漕百二十萬粟入大帑則今雖若丘文莊議以江東西湖廣之粟從河而以浙東西瀕海之粟航於海上使之羽翼河漕以蘇漕卒之困而坐食其利宜亦無不可者不然則宜若天順七年引沁通衛以殺黃河水力又不然而疏紅荆口故道與河漕並行是又患河計河之外一長策也若河漕則必欲蓄水而與水爭矣夫欲與之爭利則又安得不受其害在任事者時加之意使不至於大潰耳圖書編卷五十五
