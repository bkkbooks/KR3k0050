body:
  text: 圖書編卷四十八明章潢撰内夷各土官總敘帝王制馭外國如畜猛獸然其所以不弛禁圉箠撻之者不過馴擾其性使聽吾畜牧不敢肆其搏噬之害已爾雖乆之馴伏依人不敢縱肆而防禦終不可弛也茍縱其奔突之性至跳梁搏噬不可近始歸咎猛獸而殺之亦晩矣歴觀徃古唐虞三代之盛漢唐之强而邊塞警備則代有之其不至為中國大患者皆馭得其道也所謂天子有道守在四方是也我朝提封萬里逺方莫敢不來享來王矣所當嚴其限而愼其防者豈獨嘉靖時南之倭已哉西起巴蜀牂牁東抵㐮楚包絡湖嶺東折而南南盡海上又東跨北粤三江層巒疊嶺眞有飛鳥不能越猿猱不能攀者其間苖獠蠻僰猺獞各盤據深箐險峒已非一世然卒聽吾之約束者禁圉羈勒在我故也何也貪戀富貴有生類然彼世以土官雄據一方惟恐失其所固有耳伏覩洪武七年西南諸蠻夷来朝貢者多因元官授之稍與約束定糧徭差發其土官名號曰宣慰司十一宣撫司九招討司一安撫司二十長官司一百七十三初皆𨽻吏部驗封後因掌土兵者改𨽻兵部襲替則關武選凡土官無子弟其婿與妻皆得襲替人文出十年者亦聽然皆萬里赴闕或獻馬及方物請命最謹正所謂以夷治夷彼固得倚朝廷官爵以制其黨與朝廷亦得因爵賞以制土官誠得馴擾之道也迨天順八年三月上兩宫徽號詔許土官繳呈勘奏即與冠裳於是介使未將威福自恣雖托羈縻之名竟開驕悍之漸成化十五年又有納榖備賑之令則經制日卑規取愈陋孝宗末年發憤釐革至正徳旋復隳廢嘉靖九年始曲為條例稍復祖宗之舊令該府州縣正二幕屬廵檢驛傳三百六十𨽻驗封宣慰宣撫招討安撫長官凡一百三十二𨽻武選𨽻驗封者皆領於布政司武選所𨽻或領於都指揮使司文武相維機權攸寓細大相關掌股易運數年來鎭廵部院諸司建白日煩紛更已甚矣故夷情叛服靡常多有不就約束者可盡委罪邉夷哉葢獷悍桀驁彼之性也世相讐殺猜忌輕生烙蹠善奔忍饑行鬭其習也眈戀巢穴不敢逺離假重爵命威制服屬其勢也知其性與習則不可喜功生事輙開邊釁知其勢則彼或出没剽掠誘我逋逃擅我彊塲而我之防禦征勦格撫亦易為力終非患倭比也雖然亦不可視為疥癬之疾無與於腹心也即如麓川本百夷僻逺不當中國一郡而王驥欲立功名遂督兵五十萬轉餉半天下雖窮捜巢穴思任發卒不可得徒殺無辜數十萬驥且以功封伯其餘膺陞賞者殆萬計及再出師而東南騷擾軍民疲敝不可勝言矣若夫南贑麻陽隴水羅傍蕞爾小醜又皆在腹内一或馭之失䇿未免調集客兵轉輸餽餉威未加乎醜類禍先被乎生靈近事良可鑒也司邊籌者内夷尤宜愼之四川土官四川布政司領宣慰司一宣撫司二安撫司三長官司十二都司領宣撫司招討司一安撫司四長官司十二行都司領長官司五播州宣慰永寧龍州為二宣撫草塘黄平黎州為三安撫泥溪平夷蠻夷木川播州餘慶白泥容山眞州重安九姓平茶峒為十二長官其都司領者石砫酉陽為二宣撫天全六畨招討八郎阿角寨麻匝兒芒兒者為四安撫司木頭靖州岳希蓬石耶峒邑梅峒占藏先結簇蠟匝簇白馬路簇山峒簇阿㫖峒北定簇麥匝簇者多簇牟力結簇班班簇祈命簇勒都簇包藏簇阿昔簇思曩兒簇阿用簇潘幹寨疊奚鬰即為二十四長右𨽻兵部武選四川土官二十五烏撤芒部烏蒙東川知府四人同知一人龍州判官一人龍州宣府知事一人馬湖把事一人信寧侮泥溪麻剌村昭平堡寒氷寧戎明月三盆廵檢八人溪龍阿用禄馬蠻夷白水大平瀘沽驛丞七人改流知府一人馬湖右𨽻吏部騐封四川夷考播州古夜郎國地楚莊王遣將莊蹻泝沅水出且蘭以伐夜郎植牂牁繫船因名牂牁國漢武帝發兵討之即其地置夜郎縣屬牂牁郡公孫述時大姓傅龍尹董氏與郡功曹謝䢰保境為漢光武嘉之並加褒賞自後渠師多姓謝氏唐興謝龍羽遣使奉貢太宗即其地置播郎牂夷珍溱等州宋乾徳貢名馬丹砂終宋朝貢不絶元時内附國初其首領楊鑑率其屬來朝封為播州宣慰使領長官司安撫司二其後楊洪楊俊楊信俱有威名黎州占西南夷筰都之地白馬氏之遺種也漢武帝定西南夷以筰都為沈黎郡㝷罷郡置兩部都尉一治旄牛主外羌一治青衣主漢漢民晉時為李雄所據至後周改為黎州隋唐改登州唐天寳乾元初改漢源郡後復為黎州五代時前蜀王建後蜀孟知祥據有其地宋滅蜀屬成都路元屬吐蕃等處宣慰司國初改黎州長官司㝷陞宣撫司烏蒙古竇地甸漢屬牂牁唐烏蒙㨿之元時歸附置烏蒙國朝改軍民府烏撤占西南夷地唐宋屬烏蠻元時歸附置宣慰司國朝改鎭雄軍民府東川舊烏蠻地元置東川府國朝改軍民府芒部舊烏蠻阿統據之元置芒部路國朝改軍民府永寧宣撫司領長官司一為九姓其地秦為蜀漢為益上通雲南北連川廣龍州宣撫司其地周為羌氐在隋為平武龍門山髙水峻四塞之地也天全六畨招討使司古蠻獠之地松潘圖敘我朝開設松潘東綴安綿南控威茂譬人之一身松潘其首也安綿威茂其股肱也番酋比附於外材官控禦於中聖模神武淵乎盛矣嗣後五寨塞而威茂分三溪叛而安綿出致使手足頭目各不相顧何以聨屬而成身乎此所以有白草之變而廑執事之憂也愚嘗讀申孝友㑹要而有感於松潘之事其言曰西南諸畨雖衆且㣲然而勢合則强力分則弱必離其黨使不得親分其勢使不得不弱斯可也由此觀之則我當合而彼當分亦明矣胡今之不然也故松潘之勢似合而其中皆秦越相視實則分也白草之寨似分而其黨皆患難以相死實則合也豈不尤為可異哉松潘建置欽差廵撫四川兼理松潘安綿建昌等邊務都御史一駐四川欽差整飭松潘威茂安綿等處兵備按察司三一駐松潘一駐威茂一駐綿州欽差分守松潘等處副總兵一駐松潘協守左叅將一駐小河埧右參將一駐茂州協贊遊擊將軍二松潘衛小河所三路新舊屯田二千八百五十九頃七十畆有零主客官軍各兵一萬一千六百八十四員名額坐倉糧九萬九千三百八十一石布政司原額茶課一十九萬二千九百四十四斤零原額鹽課銀七萬八十四兩零茂州衛并疊溪威州灌縣四路主客官軍各兵一萬四千一百五十二員名守禦所新舊屯田八百五十六頃七十四畆額坐各倉糧一十萬三千九百一十七石外倉二十收糧一十萬三千九百一十七石安綿壩氐石泉四路各官軍各兵六千四百五十二員名額坐各倉糧三萬一千一百一十八石四川行都司領衛六屬所七關七堡五十有四總為里六十有七屯糧五萬六千七百四十三石夏秋米一萬八千七百四十五石九斗鹽課米三千六百石有零松潘邊考松潘古冉駹地漢時自筰以北君長以十數冉駹為大武帝開以為汶山郡歴魏晉五代未嘗入宼唐初置松州後改交州郡唐貞觀時發蜀十二州兵討松外諸蠻獲十餘萬諭降者七十餘部戸十萬九千署首領蒙和為縣令後茂州西南築安戎城絶吐蕃通蠻之道生羌為吐蕃攻㧞之宋初茂州無城知州事范百常始因民之請而築焉宣和以後入宼不絶元始内附國初征松州及茂威等處克之即古松州地置松潘衛松潘威茂總論松茂有衛疊灌有所采衛誠錯布矣大都紈袴之胄不識韜鈐尺籍之夫不諳紀律恃此以禦戎譬之驅羣羊搏猛獸不格明矣今非欲悉更置之而戰陳之法不可不訓也私門之役不可不禁也賞罰之令不可不明也逋亡之籍不可不稽也格鬬之器不可不利也夫將不知兵與無將同兵不習戰與無兵同誠脩此五者而不足以備邊吾不信矣堡關之設自荗北抵松十有七自荗南抵威十有五金鼓聞烟火接亭障誠相望矣吾聞夷恃剽徤恣睢輕漢兵誅求無厭戍卒下堡必擊牛酒邀諸畨㰱血盟誓乃不犯毎一舉火輙蟻聚而食之我卒寧㮙腹不敢争是吾之設堡適以資宼也何頼焉盍亦相地形擇要害而併置之乎夫關堡併則兵力聚兵力聚則夷不敢侮是所當講也諸堡之卒歳於内衛選官軍更畨而戌大約主客遊兵不下二萬秋而徃春而代法非不善也但不知地利不識夷情恫疑虚喝習為上計不聞有剡一矢持一㦸攘臂而與之角者未至而思歸未滿而望代是奚足多也曷若罷之而養戍兵之費籍土民站丁而守之如其不足則邊關餘丁可練而使也無已則擇勇徤者量堡緩急分布而汰其充數之老弱可也夫堡無冗兵則食無浪費亦一利也松茂地鮮五穀官軍待哺於内境歳輓全蜀之糧數十萬斛峙積邊庾食至裕也今常額雖存寧無逋負之民乎法禁雖嚴寧無乾没之吏乎夫餽糧千里斗粟數錢民不堪矣而以實老弱之腹吁可惜哉乃若維州之城李唐故地也在戎虜平州之衝漢人入兵之路後吐蕃計取之曰無憂城焉李徳裕帥西川悉怛謀舉城降其籌邊遺蹟可考也而沮於牛僧孺城竟棄議者有曰新與之盟而遽納其叛語利則維州小而信大語害則維州緩而關中急此司馬之說也有曰維州本唐故地取我故地以刷前日之耻正以大義謀國者此胡寅之說也是非迄無定論以今日觀之維州據髙山絶頂三面臨江不易取其取也不易守必欲復之要在蓄鋭養威相機審勢使我有萬全之䇿一鼓而擒耳而輕動以啟釁非計之得也先臣董軒嘗議欲棄疊溪移所髙屯堡有八害三利之說夫入松有二道東自小河南自疊溪皆羊腸一線之逕如人兩臂然胡可廢也而維州則其後矣即使無之不過太山虧一簣土耳何足惜哉松潘事宜松潘二鎭為蜀城之右臂係全省之安危松潘不守則威灌之藩籬不固而沃壌千里之區亦㡬于危薄而不安矣此謀國者所以重之也錢糧則額𣲖全省正軍之外益以戍守不為無見比年以來軍伍缺而不補錢糧日事尅削一切因仍茍且之政多而補偏救弊之術少昔人有云毋曰無害其禍將大竊有隠憂焉南路畨種固多作惡為地方患然最稱桀驁者無如人荒没舌丢骨三寨也其次則别拓一寨焉查得三寨眞畨不多漢居其半大約不過五百人以五百人終年為害而莫之一處養兵之謂何夫不一懲創則不知畏懼故謬為之說曰三寨一除則餘寨可傳檄而定也松潘邊境地方非戰則守戰不可常恃而守則可以永固操縱之權在我而已南路十五關堡前隔大河後阻重山大小畨姓前後夾居其中羊腸一線之路乃為中國所有之地如鐵爐溝走石坡鴛鴦橋石花鞋奤子灣木驢溝掃氷岩凝氷溝乾溝子三哨嘴楊廣墩砲腦溝老虎石翟貴哨石窝墩關門石陡溝子大小横梁溝沙灣龍溝秦王箭鐮刀灣掃水岩凉水井黄沙壩索橋頭五哨溝乾溝黄土坎野猫壩石門坎亂石窖石蛇兒􅉰子嘴龍打溝洞子溝沙灣麻答嘴等處東路有天花石三岔溝乾溝子琵琶頂谷驢兒溝髙哨子黄土坎亂石窖旋風岩險頭哨髙子哨出龍溝母猪洞落魂橋月兒岩山䓤溝髙哨子大灣老虎石松坪子擦耳岩闘老岩吊岩子掃子岩龍黎兒溝髙橋鷄公嶺大沙灣臘菜坪等處北路有寡石岩虹橋関絶塞墩鐵門墩銅柱墩八呷口林燦口恰乍口惡柘口寒盻口了裕口麻盻口唐弄敵貢壩栢木橋東勝墩等處俱為畨虜出没路口來則逼近官道肆行刼掠去則隔河阻山難以追捕最為要害之處不可不為之防者先年何總兵自威荗以逹松潘小河三舍漳臘一帶地方官道兩傍脩築邊墻防護行堵畨夷至今稱便但年乆歳湮率多倒塌有行經數里而基土盡碩者有曽經補砌而底薄難恃者以故畨夷徃來出没如履無人之境亦可憂也東北二路稱為稍緩而南路一帶尤為𦂳要欲為國家萬年之計其在南路必於後山自雄溪西寧以逹蒲江北定直抵鎭平界限倚就山勢築城一道城上多設敵樓而兩頭盡處鎻以重關以遏山後之諸畨又于沿河復何總兵所築邊墻聨絡墩䑓以遏革河之諸畨縱百蠻有羽翼亦難飛渡如是而輪班戍軍可以盡革糧之所省歳不知㡬千萬兩周遭田土可以屯種地之所産歳不知㡬千萬石乆安萬全之䇿莫有踰於此者但山後城工非大舉動壓以重兵且戰且守勢不可也且三寨底平而同溝諸寨撫處已定或可保數十年之安姑待將來次第舉行之耳審時度力則沿河官道墻工似今日之所當為亦今日之所得為者誠不可不為之脩復也但邊墻可以近守不可以逺瞭又㸔得敵䑓之設尤于遠瞭為便欲脩邊墻必増敵䑓兼舉之乃萬全也松潘一鎭五榖不生戸無百金之産家無石粟之餘誠為絶塞窮邊而軍民百萬生命所頼為養者皆懸于東南兩路之糧運也但糧運之數有限而商販所取易窮故於秋成之後毎米一斗價銀一錢八分或銀二錢及至經商不通囤戶坐索髙價毎斗増銀至二錢四五分者有之甚至青黄不接之時有錢無米無論齊民即官員之家懸釜待㸑者亦有之衣不蔽體食不充腸故有身死未寒其妻下嫁於部卒有子備員竊禄母餬口於他人所以百戸徐榮至閉門忍饑而死而父母兄弟夫婦骨肉之間生不相保死不相顧者比比然也查得松潘放糧事規毎年四六十十二月支實米其餘月分皆支折色此先時作者葢以糧運之艱故支折色多而本色少所以為糧戸節省之計意誠善矣但所存恤在糧戸而所苦在邊氓見其大而不見其小知其一而不知其二非中道也今照布政司買運松潘一鎭萬暦七年分各倉糧米共該四萬七千六百九十一石七斗八升而松小等邊主客舍軍兵孤老共五千六百八十一員名客官軍四千八百十一四員名若以毎月米銀兼支實為利便如指揮使月俸七石支實米三石云云大約年該支實米三萬五千八百五十五石四斗尚剩米一萬八千八百三十六石三斗八升可供别項支用裒多益寡酌盈濟虚糧不加運即原額之中而通融之自裕人無多給即本分之内而均平之自充况各軍月有實米可備饔飱又有折色可供使費稍加樽節可以無饑即有不敷凑買不多不至枵腹待哺其利一也又毎月放米家給人足其家稍充者可以出糶不給者亦可那移市價自平囤戶不得坐索以増價其利二也又松地苦寒稱貸為難徃徃山陜富商携資坐取重利毎借米一斗候至放糧之時加至二三斗者有之窮軍細民甘心兊支無如之何若毎月給米不至稱貸之難商人不得勒取重息其利三也有此三利而糧又不加増公私兩便誠善之善者也四川行都司四川行都司領衛六日建昌衛建昌前衛寧畨衛越嶲衛鹽井衛㑹川衛屬所七關七堡五十有四總為里六十有七屯糧五萬六千七百四十三石夏米一萬八千七百四十五石九斗鹽課米三千六百石有零建昌考論建昌本禹貢梁州之境天文井鬼分野乃西南夷邛都國地漢武帝置越嶲郡領邛都等縣晉徙郡治㑹無縣宋因之齊謂之㺐郡後周置嚴州隋改西寧州後唐為嶲州治越嶲縣大業初改為嶲郡唐初復改嶲州置中都督府又改越嶲郡至徳初没於吐畨貞元中收復大和中徙治臺登縣懿宗時為蒙詔所據改此城曰建昌府以烏白二蠻實之元至元間置建昌府又立羅羅斯宣慰司以統之𨽻四川行省㝷改𨽻雲南行省本朝洪武中罷宣慰司置建昌衛𨽻四川都司改建昌路為府𨽻四川布政司後廢府改建昌衛為軍民指揮使司㝷置行都司領衛六形勝東連烏蒙西距吐蕃中接中慶北鄰西蜀據西南咽喉衝要之處雖通商貨殖田地膏腴而土廣人稀竹籬板舍不事脩飾善造堅利人甚畏弩末之毒嘗觀元遣譚澄同知宣慰司事至其境議之曰皇元一視同仁特置大帥安輯招懐以捍外侮非利徵求於汝也夷人大恱即此可以得夷情亦以識治夷之道矣孰謂夷終不可以誨懐服哉議制馭松州諸寨建昌餘孽按蜀界在坤隅三靣邊夷自漢武通道之後毎煩中國其西北則為疊茂為松畨與氐羌為界有大姓小姓小蕃大蕃之别在昔為吐蕃慿陵已甚是李贊皇之所經營而未得其要領者也其西南則為沉黎越嶲建昌諸衛連亘獠𤏡之外諸種盤據麏屯鳥㪚靡有定在昔為南中叛服靡常是諸葛武侯之所經畧而卒以攻心為䇿者也我太祖聖武布昭鞭撻四埀西南夷交臂内附稽首獻琛願比編氓猗歟盛矣然彼性頑悍好利樂災少有間隙狺然而起邇年松州諸寨既已鋤其兇渠破其碉穴羣氐請命矣建昌餘孽既嘗俘其首虜燬其保聚計所殺獲亦畧相當矣論者乃謂諸寨大創之後可圖數十年之安而餘孽未殄宜大伸一怒之威皆一時之筴也然畨戎無親視我虚實我實則服我虚則叛裔夷小醜慿縁箐薄我徃則㪚我歸則合處之固異術焉則冉駹之揵不可遂忘桑土之徹而猓玀之疥不必遽鳴伊吾之劔矣常勝在我制勝有經酌而施之可也建昌建置欽差整飾建昌等處兼分廵地方僉事一駐建昌欽差督理糧儲叅議一駐雅州守備二四川夷四川山包劒棧水鎻瞿峽襟帶擁束是為天阻惟烏蠻阻其東南蔓繞西抵畨族欲其馴順是在調擾龍州為松畨咽喉毎遮我餉道烏蒙烏撤芒部諸府雖仰我鼻息而内黨日堅數啟隙亂唇齒之勢彼得挾而擾我瀘叙之間宜有機權携其醜類若乃碉門逺引諸畨播州旁通四省所謂與蜀盛衰者也川夷考楊輝者播州宣慰使也始祖鏗元時為安撫使洪武初納欵授宣慰使三傳而輝襲之怙富負險大恣豪舉輝二予長友次愛友庶而長輝以妾故嬖之屡欲奪嫡而安撫宋韜長官毛釗等不從曰楊氏家灋立嗣以嫡不以長主公奈何紊之以啟亂階輝不得已乃嗣愛嬖友之心終不解倖客張淵日慫慂之因說輝曰主公欲貴孟主與戚戚與仲主為仇即使奪彼以與此不過轉移故物耳且貽口實於後人何不别為孟主地雙貴而朋立是使孟主創業而傳世也輝曰為之奈何淵曰天覇諸苖主公部境也山箐險遠憨而易凌誣之曰賊而請兵討之歸功孟主因諸立官分治則事為有名矣輝大喜乃召容山長官韓宣重安長官張通計之將以疏請宣曰夭覇諸苖力耕服役皆順民也奈何以賊誣之輝大怒立杖殺宣通皇恐股栗叩頭曰諸苖誠賊也乃從輝署名疏言苖亂請兵討之部議報可乃命都御史張瓚將兵討之諸苖被戮者千餘人輝通賂於瓚瓚乃盛陳友功且曰友謀勇冠軍手刃七馘誠設安撫司於安寧以友為安撫使則諸苖不復反矣時友年纔十三耳部議信之乃立司授官一如所請既而爛土諸苖賫果等忿夭霸以無辜受戮也時時攻安寧瓚又疏請築城衛之費糧數十萬十九年輝死愛脩怨於淵淵屢謀殺愛不克二十一年丹章諸苖宼安寧四川右叅政謝士元副使翟廷蕙都指揮楊綱以兵徃過播州詣愛家置酒髙㑹翌日視學適州民賽社士元等因坐學宫觀之愛復携酒以徃訓導楊禮者介士艴然諌視學而觀社提兵而樂酒畧等威而欵下屬竊為明公耻之士元等大慚而起淵自知不容於愛乃嗾友誣愛通苖越境為亂報知貴州守臣而致書舉人路通義賂上下安撫宋韜獲之以報愛愛乃易書於義偽以人徃義信之告貴州守臣陳愛反狀守臣不聽曰播州非我轄也義復書於友言非奏聞不可愛得書以報四川守臣友淵大懼乃誣疏愛嘗言夢騎龍登天上帝謂我曰南方帝子也又嘗立嵩呼門金水橋以擬宫禁廷議大駭乃命刑部侍郎何喬新錦衣指揮劉綱㑹四川都御史御史等官鞫之淵以妖言坐死士元等落職義削籍友愛皆論死贖免之友削官竄保寧無何友黨簒友以歸與愛仇殺不已而友子張愛孫相尤酷毒嘉靖七年兵部尚書胡世寧議謂張黨與已成若不因而撫之恐遂流禍請立安撫司于凱里屬治貴州以張為安撫使而相宣慰屬治四川如故然其讐固自若也諺云骨肉臡醢參商播凱論曰播凱之亂其初不過楊輝奪嫡之私耳一妄夷酋上書誣人以逞兵部不覈實而遽許興師非狥情何以有此張瓚欺君曲法造禍百年蔓延邊徼其後輾轉調停不過分疆别省耳貸禍首而不究何以服諸夷哉雲南夷土官雲南布政司領宣慰司七宣撫司三長官司二十都司領安撫司三長官司三車里木邦孟養緬甸老撾東里八百大甸為七宣慰南甸于崖隴川為三宣撫十二關納樓茶甸教化三部王弄山虧容甸處溪甸思陀甸左能寨落恐甸安南禄谷寨剌次河革甸香羅瓦魯之因逺羅必甸馬龍他郎甸者樂甸紐兀芒市為二十長官其都司領者安撫三潞江鎭逺楊塘長官三茶出鳳垓施甸右𨽻兵部武選雲南一百五十一武定麗江景東沅江順寧永寧鎭沅䝉化孟艮孟定知府十人寳山南甸蘭州彎甸寧州富州北勝大侯雲龍浪葉部鄧州安寧威逺霑益羅雄鎭康陸凉知州十七人臨西嶍峨雲南亦佐羅次元謀知縣六人廣南姚安府同知鶴慶府知事一人千厓宣府經歴一人巨津師宗浪蕖通安北勝領南姚州順州同知八人北勝南安鎭南州判官三人雲南楚雄亦佐易門定邊永平縣丞六人昆明雲南廣通嶍峨定逺楚雄主簿六人威逺州吏目一人五井順盪鹽井副使二人連為古剌騰衝様備觀音山莎橋徳勝關泔西在城打牛坪晉寧易龍驛丞十二人金齒水眼鄧川州寧蕃順寧㝷甸禾摩村東山口浪滄江師井打牛坪盪井金沙江十二關備溪江青索翼納更山蒲陀崇鎭南箭捍塲關索嶺鐵爐青水江黒鹽井西金沙江赤水鵬定西嶺龍街關蔓神寨伱白水關南平關黒鹽井阿雄村戞頼元江禾摩村安南坡禄腠煉象關楚雄縣松詔鋪觀音山鳳羽鄉東金沙江囘登關湯池英武關廵檢二十五人改流二十五知府鶴慶㝷甸廣西知州四人馬龍彌勒維摩阿維知州二人路南蒙自府同知一人楚雄府照磨一人麗江典史一人浪穹鹽井副使一人彌勒沙驛丞五人永平孟哈潞江羅卜恩庄雲南廵檢十二人宣化關甸頭様備神摩洞下江南安州普昌石門關彌沙井雲龍甸煉象關楚塲右𨽻吏部騐封八百舘八百大甸軍民宣慰使司世傳其土酋有妻八百各領一寨因名八百媳婦自古不通中國元世祖始遣崇烏嚕黙色帥軍征之至成宗責其叛宼車里遣額森布哈征之辛丑以劉深佩虎符將兵三萬勅雲南省各給馬匹征之癸卯劉深復請加兵哈喇哈遜曰海嶠小夷遼絶萬里可諭之使來不足以煩中國元主不聽竟無功士卒存者纔十之一始悔不用其言㑹有司議釋深罪哈喇哈遜曰深徼名首釁䘮師辱國不誅無以謝天下遂誅深其酋恃逺叛服不常至元統初賽音迪延齊遣使招附置八百等處宣慰司我明洪武二十四年其酋刁攬那來貢方物始立八百大甸軍民宣慰使司毎遇改元則頒給勅諭金牌勘合與緬甸其地東至老撾南至波勒蠻西至木邦北至孟艮自司治北至布政司三十八程其人性頗緩刺花様于眉目間以為飾男女服食與木邦同事佛敬僧亦緬甸與客相見無跪拜之節但把手為禮境内有南格剌山山上有河屬八百北屬車里附老撾車里孟艮于後老撾老撾軍民宣慰使司俗呼為撾家自古不通中國我明永樂三年其酋招攬章入貢方物始置宣慰使司其地東至水尾南至交趾西至寧逺北至車里其民皆百夷性獷悍身及眉目皆刺花様服食噐用大類木邦其酋長有三等長曰招木弄次曰招木中又次曰招花為宣慰者即招木弄也車里車里軍民宣慰使司蠻名徹里又有倭泥貉􅀈蒲刺黒角諸蠻雜居自古不通中國元世命將烏蘭濟達率兵伐交趾經其地悉降之至元中置徹里路軍民總管府領六甸後又置耿凍當孟弄二州本朝洪武十七年酋長刀光歸附改置車里軍民府十九年改宣慰使司在浪滄江之南接南海交趾人情頗淳額上刺一旗為號境内猛永山杉木江孟艮孟艮府蠻名孟掯古不通中國我朝永樂四年始來歸附置孟艮府東至車里南至八百西至木邦北至孟璉其士俗與木邦同百夷館木邦百夷在雲南之西南自古不通中國元世祖時命將伐交趾經其所部盡降之舊名孟都又名孟邦元至元二十六年立木邦路軍民總管府領三甸至我朝洪武十五年改木邦府後改木邦軍民宣慰使司命西平侯沐英遣使徃諭之始從化來王其所部猛宻有寳井為木邦利府陶孟思歪領之陶孟者猶華言頭目也木邦宣慰司罕揲以其女曩罕弄妻司歪罕揲死其孫罕穵立嗜酒好殺曩罕弄遂以猛密叛木邦成化初南寧伯毛勝守雲南猛密寳石許得自貢不關木邦大監錢能尤利其珍賂曩罕弄遂怙勢無忌畧地自廣十六年大監王舉索猛密寳石不得因䟽猛宻木邦罪請征之曩罕弄大懼㑹有江西人周興五者逋猛密因為曩罕弄計遣人賫金寳賂政府求釋罪且請授官政府許之遂授意都御史陳宗徃撫之宗至猛密曩罕弄恃有内援益踞傲不出迓宗且要宗過南牙山就見坐講宗不得已從之曩罕弄乃曰我猛密之于木邦猶大象之孕小象也今小象長成軀倍大象矣寕能復入大象腹中乎宗曰然遂以所侵木邦地畀之為設安撫司以歪子孫世其職木邦人詣宗訴辯宗輙笞止之狀聞政府大喜遂以宗撫雲南㝷遷刑部尚書曩罕弄既立盡奪木邦地罕穵奔猛正由是孟養諸酋大不平遣大陶孟倫索提兵衛罕穵聲言必滅猛密㑹𢎞治改元副使林俊稍割猛密地還木邦曩罕弄懼不敢逆命遂與木邦並立為世讐矣其種類最繁故以百稱諸部落有木邦有南甸有干崖有隴川有孟養有孟密有孟璉有孟羅有孟楞有孟定有孟艮有芒市有景東有鶴慶有大候有威逺有鎭康有甸灣有者樂甸其民多百夷不通漢字俱屬本舘譯審附列于后孟養孟養宣慰使司地名香栢城元至元二十六年置雲逺路軍民總管府本朝洪武十五年改為雲逺府十七年改孟養軍民宣慰使司其民獷野小有隙即搆兵相殺正統初土酋思仁叛㨿孟養地官兵追奔至緬甸購捕斬之語在緬甸考成化中思仁子禄以祖母琭帶及諸珍物賂鎭守太監錢能能召見飲食之思禄稍稍縱横𢎞治初元給土酋金牌信符偶忘孟養乆廢止按舊籍頒給思禄遂謂天朝復其官職以符牌號召諸夷畧取旁邑自廣㑹猛密叛木邦叅政毛科檄思禄兵攻猛密思禄以羸兵數千應科為猛密所敗思禄大怒遂越界過金沙江攻猛密取蠻莫等十七寨科又勸廵撫金獻民請兵大舉征思禄上不許㑹思禄亦遣人奏言為鄰惡詿誤願入蠻莫十七寨贖罪得比米魯仍乞以一字為宣慰如故朝議遲疑不决思禄遂據孟養自立孟定孟定府舊名景麻元至元二十六年立孟定路軍民總管府領二甸𨽻大理金齒等處南甸南甸宣慰司舊名南宋元至元二十六年置南甸路軍民總管府領三甸本朝洪武十五年改南甸府永樂十二年改南甸州正統八年陞宣撫司其俗結姻用榖茶内有丙弄蠻干温泉沙木籠南牙諸山小梁諸乃二河大盈江黄連坡關小龍山關干崖干崖宣撫司其地舊名干頼賧曰渠瀾賧白夷居之元中統初内附至元中置鎭西路軍民總管府領二甸本朝洪武十五年改為鎭西府後為干崖長官司正統間陞宣撫司境内有雲晃雲籠白蓮刺朋諸山雲晃安樂止西三河其土産四時皆蠶取其絲染五色為土錦隴川隴川宣撫司舊為麓川地皆白夷所居元至正中置麓川路本朝洪武十七年内附置麓川平緬宣慰司正統三年其土酋思仁叛發官兵討平之革除其司十一年置隴川宣撫司于隴把俗與南甸同威逺威逺州郡唐南詔銀生府之地舊為濮落雜蠻所居大理時為白夷所有元至元中始置威逺州本朝因之編戸四里境内有蒙樂山南堆谷寳江灣甸灣甸州蠻名細賧元中統初内附屬鎭康路本朝洪武十七年置灣州編戸五里鎭康鎭康州蠻名石賧本黒僰所居元中統初内附至元十三年立鎭康路軍民總管府領三甸本朝洪武十五年改為鎭康府十七年改為州編戸六里其人形惡體黒以青白布為衣跣足行荆棘中如飛大候大候州蠻名孟祐白夷所居元中統初内附𨽻麓川路本朝洪武二十四年置大候長官司後改為州編户四里俗與灣甸順寧同境内有昔彌蠻剌蠻彌阿輪諸山孟祐孟頼二河芒市芒市長官司其地舊曰怒謀曰大枯賧曰小枯賧即唐史所謂芒施蠻也元中統初内附至元十三年立芒施路軍民總管府領二甸本朝洪武十五年置芒施府正統九年改芒市長官司景東景東府古柘南也唐時南詔蒙氏為銀生府之地舊為濮落雜蠻所居後為金齒白蠻侵奪迄宋大理叚氏莫能復元中統初始討平之以其所部𨽻威楚萬戸至元中置開南州𨽻威楚路本朝洪武改為景東府編户八里其民多百夷不通漢書田皆種􅐕境内有景董秦鶴籠蒙樂諸山瀾滄江大河龍潭筧泉諸水母𤓰定景闌三關鶴慶鶴慶軍民府東漢為永昌郡西北境唐時為越析詔之地名鶴川及漾共川南詔於漾共置謀統郡元初内附置鶴川㝷置二千戸仍稱謀統屬大理上萬戸至元中復為鶴州後陞鶴慶府改鶴慶路本朝洪武中改為府後改為軍民府編戸十三里領州二曰劔川曰順州其民蠢朴稍剛好嚚訟帶弓矢境内有峯頂龍珠方丈金華劒和石寳公山烏舖諸山漾共江劔川牛甸二湖温泉諸水者樂甸者樂甸長官司本馬龍他郎甸猛摩之地夷民者島本朝洪武末分置長官司𨽻雲南布政司其民多百蠻交易用金銀或五日十日一集旦則婦日中則男更代為市境内有者島蒙落二山景來河緬甸館緬甸古西南夷未詳何種其地舊有江頭太公馬來安正國蒲甘緬王五城元至元中遣將烏蘭濟達屢討平之後于蒲甘緬王城置邦牙等處宣慰使司我朝洪武二十九年始歸附立緬甸軍民宣慰使司因其朝貢不缺始設本舘正統四年孟養宣慰使司刀賔王昏懦不振其下大酋思仁叛刀賔王擁衆麓川併有孟養地遣黔國公沐晟左都督方政等徃征之政乘勝追思仁至上江以無援力戰死上遣使問晟罪晟自知失律遂飲藥死廷臣皆言宜置思仁不問不聽乃用大監王振議遣兵部尚書王驥定西伯蔣貴發湖廣四川廣西貴州及京營兵一十二萬徃討之思仁敗走緬甸驥遂割思仁所掠孟養地畀緬甸購思仁緬甸酋長卜剌浪斬思仁縛其子思機思卜差酋莽剌札等六十四名進貢至京併獻俘闕下朝廷用驥言録緬甸功即以其子銀起莽居守孟養地項之麓川夷擁思仁少子思禄攻敗銀起莽復有孟養地驥知夷終不殄遂與思禄約以金沙江為界今居孟養如故其地東至木邦南至南海西至戞里北至隴川自司治東北至雲南布政司凡三十八程其俗居有城郭屋廬地勢廣衍有金沙大江闊五里餘水勢甚盛緬人恃以為險滇夷記畧滇載記逸史氏曰史稱西南靡莫之屬以什數滇最大元封中以兵臨滇王舉國降然未有稱也及張氏受姓後世迭君長者蒙氏鄭氏趙氏楊氏叚氏髙氏凡七姓惟蒙叚最乆故著稱焉夷啇盗名號互起滅若蜂蟻然不足録也然至與中夏交援抗凌疲我齊民世主甘心焉以無用戕有用是可慨已漢司馬氏傳西南夷誠有意哉余嬰罪投裔求蒙叚之故於圖經而不得也問其籍於舊家有白古通𤣥峯年運志其書用𤏡文義兼衆教稍為删正令其可讀其可載者葢盡此矣滇𤏡於三代為荒服漢僅剽分其方雖前元兵力勝之而不能守也于今列箐落而郡縣之馴鱗介而衣裳之華風沃澤同域共貫昭代恢宇前是孰並傳稱神農地過日月之表㡬近是哉雲南夷總論伍段雲南本徼外地國初屬王保保戊申開基尚阻聲教王偉乘義捐軀傅友徳沐氏父子兄弟威戡惠戢梅思祖張鶴繼膺藩屏平徭均賦疆土稍開顧其人慓悍不得已因俗為政官其酋領稍示安輯元江永寧鎭沅孟艮景東最强獷鎭南蒙化順寧霑益差小然皆向背靡常調濟為難諸甸約攝騰衝諸羅窺竊㝷靖葢自麓川虚耗中土孟養曲狥奸夷正統迄今益復反覆况投宦非人刓法好貨湖南滇北將有梗隔之憂至求馬湖建昌川陸逵道計亦晩矣漢武帝始通滇國置益州郡明帝時哀牢王柳貌率其民五萬戸内附以其地置哀牢博南二縣唐𤣥宗册南詔為蠻王語謂王曰詔先是六詔莫能相統蒙舎詔最在南至皮羅閤浸彊大乃求合為一朝廷許之徙居大和城及宋熈寧大理遣使貢方物封其酋為大理國王元憲宗平大理立為三十七郡世祖自西畨入大理平雲南遂分三十六路本朝洪武十七年立為麓川車里二宣慰使司此外又有孟養木邦緬甸老撾八百大甸宣慰司其與麓川車里皆百夷之種類也按雲南地漢時已入中國謂為西南夷唐末為南詔所據後為蒙叚二氏所有自為一國宋竟不能有之元世祖始平大理以其地内屬本朝立為藩府命黔國公世守之今其雲南楚雄臨安大理等府設置如内地而更以元江永昌之外麓川車里等處為西南夷亦猶漢時自成都而視滇池也大扺雲南之地其南以元江為闗以車里為蔽而逹于八百其西以永昌為關以麓川為蔽而逹于木邦西南通緬甸底於南海東南通寧逺而竟乎安南西北盡麗江而通乎吐蕃所以制馭之者與南蠻北狄不同葢彼去中國逺甚其有叛亂不過梗化虧欠歳貢而已不足為中國輕重也為今之計宜擇一要害地或景東或騰衝命將一員統軍于此守備嚴禁中國客商不許擅入其地則彼不知中國虚實而不為人煽惑引誘設為互市有所交易許其移文通譯賫載以來使彼知中國之貨難得則不敢輕自棄絶矣雲南在古荒服聲教弗漸自唐及宋則偃然僭竊睥睨巴蜀元雖開省設官而疆圉𤓰裂以覊縻畜之迨乎我朝幅員混一僰㸑羅甸咸籍版圖可謂盛矣第其疆域阨塞華夷雜居時恬則蟻聚蜂屯有事則狼跳虎噉葢負險使然也雲南臨安大理永昌鶴慶楚雄頗號沃壌元江臨安南通交趾金齒騰衝西擁諸甸瀾滄聨洛永寧麗江曲靖迤北而東弹壓烏蠻四境領要指掌可窺矣諸夷之魁則元江武定景麗江姚安北勝鄧川霑益並兵力稱雄向肯靡一葢自麓川伏法而滇境稍寧惟㝷甸一帶兵衛漸踈諸羅䟦扈木邦孟密恃其險逺至今不聞悔禍咎在撫綏闕狀乖方莫可數矣至於滇南北上必假道貴州萬一衝决何以越之滇池有徑可逹馬湖武定可逹建昌川陸具存而榛塞莫啟刋山通道之䇿所宜亟講也按百夷之種麓川緬甸數為梗元江永昌之外設宣慰者七以統百夷以沐氏遥轄亦以諸省惟雲南諸夷雜聚之地其為中華人惟各衛所戍夫耳百夷種曰僰人㸑人各有二種即黒羅羅白羅羅麽些秃老些門蒲人和泥蠻土獠羅舞羅落撤摩都摩察儂人沙人山後人哀勞人哦昌蠻懈蠻魁羅蠻傅㝷蠻色目濔河㝷丁蠻栗㱔不可悉記貴州夷土官貴州布政司領宣慰司一安撫司一長官司五十二蠻夷長官司二十都司領長官司十一貴州宣慰金筑安擇貴竹水東青山劄佐龍里白納底寨養龍坑施溪黄道溪水徳江蠻夷沿河祐溪偏橋而阡苖民葛章葛商龍泉坪銅仁省溪提溪大萬山平頭著可烏羅麻響木瓜大華上馬橋大龍番程番小程方番金石畨韋番洪番盧番羅番盧山都匀平川六峒邦水豊寧平定樂平慕役頂營十二營康佐寧谷寨西堡為五十二長官中曹乖西都坪峨異溪都素朗溪鎭逺金容金逹邛水十二峒潭溪八舟洪洲伯里曹滴洞古洲西山陽洞湖耳亮寨歐陽新化中林驗洞赤溪湳洞龍里為十二蠻夷長官其都司領者新添小坪伐把平寨丹平丹行楊義樂平伐平浪九名九姓獨山州為十二長官右𨽻兵部武選貴州土官一十五鎭逺府同知一人通判一人推官一人安順州同知一人普安州判官一人婺州縣丞一人曹沙渡瓮城河盤江谷龍的成河覃韓偏刀水廵檢六人司獄一人改流二知縣一人婺州廵檢一人都儒五堡三坑右𨽻吏部騐封貴州夷貴州本西南夷羅施鬼國國初靄翠朱欽歸附仍其世官山峭地瘠夷情猾詐分𨽻川湖雲南永樂癸巳始立三司當時顧成易節以文武大臣威懐有方時稱馴順然壌時聨絡衝胸掣肘自泗城北窺永寧芒部南擾畢節酋播外突普凱内潰交讒搆亂喜禍佳兵毎一梗阻滇海中斷乃知分割三𨽻疆域相牽不可謂非䇿也諸夷考貴州夷種類非一曰羅羅有二種黒羅羅即東㸑烏蠻白羅羅即西㸑白蠻與六詔同種世居水西以安為姓一名羅鬼一名㸑人曰宋家曰蔡家者皆中國之裔曰仲家曰龍家其種有四曰犵狫一曰犵獠其種有五曰𦍕獚其種亦夥曰東西苖曰紫薑苖曰賣爺苖曰阿和習尚各異力耕嗇用刻木為信好佩刀劔勇於戰鬬貴州夷考安貴榮者靄翠之孫也奢香死靄翠之弟安匀立子孫遂以安為姓世驕蹇不受節制即聽調從征非徼厚賞不赴所過村落殺掠無噍類者諸羅亦獷悍𦕈官軍嘗睥睨省城曰是直用水西氊衫疊塞耳貴榮多智畧善兵以從征香爐山加貴州布政司參政怏怏薄之乃奏乞减諸場諸驛以償其功事下督府勘議時兵部主事王守仁以建言譴謫龍場驛丞貴榮甚敬禮之守仁乃貽書貴榮曰减驛事非罪人所敢與聞承使君厚愛因使者至偶問及之不謂其遂逹諸左右悚息悚息然已承見詢則又不可黙凡朝廷制度定自祖宗後世守之不敢以擅改改在朝廷且謂之變亂况諸侯乎縱朝廷不見罪有司者將執法以繩之使君必且無益縱遂幸免於一時或五六年或八九年雖逺至二三十年當事猶得持典章而議其後若是則使君何利焉使君之先自漢唐以來千㡬百年土地人民未之或改所以長乆若此者以能世守天子禮法竭忠盡力不敢分守有所違越故天子亦不得踰禮法無故而加諸忠良之臣不然使君之土地人民富且盛矣朝廷悉取而郡縣之其誰以為不可夫驛可减也亦可増也驛可改也宣慰司亦可革也由此言之殆甚有害使君其未之思耶所云奏功陞職事意亦如此夫剗除盗寇以撫綏平良亦守土常職今縷舉以要賞則朝廷平日之思寵禄位顧將何為使君為參政已非設官之舊今又干進不已是無抵極也衆必不堪夫宣慰守土之官故得以世有其土地人民若參政則流官矣東西南北惟天子所使朝廷下方尺之檄委使君以一職或閩或蜀其敢弗行乎則方命之誅不旋踵而至捧檄從事千百年之土地人民非復使君有矣由此言之雖今日之參政使君將恐辭去之不速又可求進乎凡此以利害言揆之於義反之於心使君必自有不安者夫拂心違義而行衆所不與鬼神所不嘉也承問及不敢不以正對幸亮察既而驛竟不减宋氏部羅阿賈阿札等叛人言貴榮嗾之而督府檄兵安家輒違約不至守仁復諭貴榮阿賈阿札等畔宋氏為地方患傳者謂使君使之雖或出妬婦之口然阿賈等自言使君嘗錫之以氊刀遺之以弓弩雖無其心不幸乃有其迹矣始三堂兩司得是說即欲聞之於朝既而以使君平日忠實之故未必有是且信且疑姑令使君討賊茍遂出軍勦撲則傳聞皆妄何可以濫及忠良其或坐觀逗遛徐議可否亦未為晩故且隠忍其議所以待使君者甚厚既而文移三至使君始出衆論紛紛疑者將信喧騰之際適㑹左右來獻阿麻之首偏師之解洪邊之圍羣公又復徐徐三月餘矣使君稱疾歸卧諸軍以次濳囘其間分屯寨堡者不聞擒斬以宣國威惟増剽掠以重民怨衆情愈益不平而使君之民罔所知識方揚言於人謂宋氏之難當使宋氏自平安氏何與而反為之役我安氏連地千里擁衆四十八萬深坑絶屯飛鳥不能越猿猱不能攀縱遂髙坐不為宋氏出一卒人亦莫如我何斯言已稍稍傳播不知三堂兩司已嘗聞之否使君誠久卧不出安氏之禍必自斯言始矣使君與宋氏同守土而使君為之長地方變亂皆守土者之罪使君能獨委之宋氏乎夫連地千里孰與中土之一大郡擁衆四十八萬孰與中土之一都司深坑絶屯安氏有之然如安氏者環四靣而居以百數也今播州有楊愛凱黎有楊友酉陽保靖有彭世麒等諸人斯言茍聞於朝朝廷下片紙於楊愛諸人使各自為戰分安氏之所有葢朝令而夕無安氏矣深坑絶屯何所用其險使君可無寒心乎且安氏之職四十八支更迭而為今使君獨傳者三世而羣支莫敢爭以朝廷之命也茍有可乘之釁孰不欲起而代之乎然則揚此言於外以速安氏之禍也者殆漁人之計蕭墻之憂未可測也使君宜速出軍平定反側破衆讒之口息多端之議弭方興之變絶難測之祸補既徃之愆要將來之福某非為人作說客者使君幸熟思之貴榮死子萬鈞立淫酗嗜殺其下怨之一日集督府督府未衙候於外次忽有賊刅萬鈞頭去一城閧然督府索賊竟不得亂五六年不定其弟萬銓㢘知土目烏掛所殺也撲殺之誅其從者百餘人遂自立収其嫂為妻督府置不能理而萬銓恣横尤甚論曰安氏有貴州千餘年矣豈其先世有大功徳於諸蠻哉其何祚之綿永也羅鬼憨而戀主與諸夷異即暴虐不怨其他强族不得代有之故不易姓今雖受官給印直名羈之不能令也恣殺戮服食僭儗自專無上彼何歉於南靣稱孤者哉貴州武備單弱征勦必頼水西長彼桀傲萬一衡决則雲南非所有也貴州夷總論髙宗克鬼方疑即其地可謂難矣漢以下未有能郡縣之者然滇南之境非繇貴不逹漢惟不能有貴故自巴蜀邛笮逹牂牁紆歴險逺卒不能令黔中被聲教如中土唐亦不得志於南詔葢有以也我太祖撫有滇南貴州諸夷施亦服屬既我成祖復郡縣其地任土作貢服徭役與諸甸服同其大一統之盛逺過三代何漢唐足云乎馬燁鎭貴州功文獻無徵獨貴人徃徃能談其事今㑹城帥府㕔事猶所建立其甃甓棟宇之壯固類非後人之所能及要不失為任事之臣其政刑過嚴豈亦亂國用重典乎髙帝斬之誠非得已至成祖以一介之使深蹈夷庭執二酋而市肆不易道路不傳其淵謀睿筭真鬼神所不能測後世小小舉措不免張皇漏洩因以敗事者視此何如也大抵夷性嗛怨而戀主負悍而喜怒樂縱肆而憚文法馭之在威信素孚簡静不擾耳又曰貴州諸夷惟安氏享爵土最久豈不先世嘗有大功徳于諸蠻邪不然何歴千餘年而不一更其姓也圖書編卷四十八
