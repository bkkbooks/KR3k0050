body:
  text: 圖書編卷一百五明章潢撰太學總序夏曰校殷曰序周曰序學則三代共之禮書曰四代之學虞則上庠下庠夏則東序西序商則左學右學周則東膠虞庠而周則又有辟雍成均瞽宗之名則上庠東序右學西膠太學也故國老於之飬焉下序西序左學虞庠小學也故庶老于兹養焉記曰天子設四學蓋周之制也周之辟雍則成均也東膠即東序也瞽宗即右學也蓋以其明之以法和之以道則曰辟雍以其成其虧均其過不及則曰成均以習射事則曰序以糾德行則曰膠以樂祖在焉則曰瞽宗以居右焉則曰右學蓋周之學成均居中其左東庠則右瞽宗此太學也虞庠在國之西郊小學也記曰天子視學命有司行事祭先師先聖焉卒事遂適東序設三老五更之席又曰食三老五更於太學所以教諸侯之弟祀先賢于西學所以教諸侯之德夫天子視學則成均也命有司行事祭先聖先師焉即祀先賢于西學也祀先賢于西學則祭于瞽宗也有司卒事適東序設三老五更之席即養國老於東膠也養國老于東膠即祀三老五更于太學也然則商之右學在周謂之西學亦謂之瞽宗夏之東序在周謂之東膠亦謂之太學蓋夏學上東而下西商學下右而上左周之所存特其上者耳則右學東序蓋以成均並見建于一丘之上而已由是觀之成均頒學政右學祀學祖東序養老更右學東序不特存其制而已又因其所上之方而位之也夫諸侯之學小學在內太學在外故王制言小學則公宫南之左大學在郊以其選士由內以升於外然後達於京故也天子之學小學居外太學居內故文王世子言凡語于郊然後于成均取爵於上尊以其選士由外以升于內然後逹於朝故也江陵項氏松滋縣學記曰學制之可見於書者自五帝始其名曰成均説者曰以成性也然則有民斯可教有教斯可學自開闢則既然矣有虞氏始即學以藏粢而命之曰庠又曰米廪則其自孝養之心發之也夏后氏以射造士如行葦矍相之所言而命之曰序則以檢其行也商人以樂造士如夔與大司樂所言而命之曰學又曰瞽宗則以成其德也學之音則校校之義則教也蓋至於商人先王之所以教者偹矣周人修而兼用之內即近郊並建四學虞庠在其北夏序在其東商校在西當代之學居中南靣而三學環之命之曰膠又曰辟雍郊言其地壁言其象皆古今假借字也其外亦以四學之制參而行之凡侯國皆立當代之學而損其制曰泮宫凡鄉皆立虞庠凡州皆立夏序凡黨皆立商校於是四代之學達於天下夫人而習聞之故今百家所記參錯不同者無他皆即周制雜指而互言之王制曰司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以絀惡命鄉簡不帥教者以告耆老皆朝于庠元日習射上功習鄉上齒大司徒帥國之俊士與執事焉不變命國之左鄉簡不帥教者移之右如初禮不變移之逺方終身不齒命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征于鄉升于學者不征于司徒曰造士樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王太子王子羣后之太子卿大夫元士之適子國之俊秀皆造焉凡入學以齒將入學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉屏之逺方西方曰棘東方曰寄終身不齒大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後祿之學制考明堂位曰米廪有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也古之教者家有孰黨有庠術有序國有學按易傳大初篇曰天子旦入東學晝入南學暮入西學在中央曰大學天子之所自學也賈誼曰學之所學之宫也學禮也帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則賢一作聖智者在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不踰矣帝入大學承師問道退習而考於太傅太傅罰其不則而匡一作逹其不及則德智長而理一作治道得矣此五學者既成於上則百姓黎民化輯於下矣蓋有虞氏上庠下庠夏后氏東序西序商人右學左學周兼三代家有孰黨有庠術有序國有學庶人家無孰則中里共一校室有孰之意春秋傳鄭人遊于鄉校以論執政是也而國學則人兼之左近北東序即東學也左近南以其無房室亦名東序祀先老於此即南學也右近北為士庠即北學也右近南為瞽宗即西學也所謂凡有道德者使教焉死則以為樂祖祀于瞽宗是也中為太學為視學乞言之所文王世子及登歌清廟既歌而語以成之也總名曰成均以成天子至庶人也亦曰大學又曰辟雍按天子設四學并中學而五學一處並建周人則辟雍居中南為成均上為上庠東為東序西為瞽宗學禮者就瞽宗學書者就上庠學干戈者就東序學樂德樂舞者就成均辟雍惟天子承師問道養三老五更及出師受戒等就焉天子入太學則四學之人環水觀之故謂之辟雍總言亦大學也尚書大傳曰公卿之庶子大夫元士之適子十有三年始入小學見小節焉踐小義焉二十入大學見大節焉踐大義焉故入小學知父子之道長幼之節入大學知君臣之義上下之位故為君則君為臣則臣為父則父為子則子董仲舒曰王者正南靣而治天下莫不以教化為大務立大學以教于國設庠序以化于邑故養士莫大乎大學大學賢士所關也教化之本原也今以一郡一國對亡應書者是王道往往而絶也願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣漢武帝因公孫𢎞請為博士置弟子五十人復其身太常擇民年十八以上儀壯端正者補博士弟子太學建于此班固曰入小學學六甲五方書計之事始知室家長幼之節十五入大學學先聖禮樂而知朝廷君臣之禮其有秀異者移鄉學于庠序庠序之異者移國學于少學諸侯嵗貢小學之異者於天子學于太學命曰造士行同能偶則别之以射然後爵命焉即今嵗貢唐太宗增創學舍一千二百間國學太學四間亦增生員其書算各置博士凡三百六十員其屯營飛騎亦給博士授以經業髙麗百濟高昌吐蕃諸國酋長亦遣子弟請入國學國學之盛近古未有陽城為國子司業引諸生告之曰凡學所以學為忠與孝也諸生有人不省親乎明日辭城還養者二十輩有三年不歸侍者斥之宋仁宗時范仲淹等建議請興學校本行實乃詔州縣立學時胡瑗教學于蘇湖是時方尚詞賦獨湖學以經義時務有經義齋擇通經有器局者居之有治事齋人各治一事又兼一事如邊防水利之類故天下謂湖學名秀彥其出而筮仕往往取高第及為政多適于世用由講習有素也至是詔州縣皆立學于是建大學于京師而有司請下湖州取瑗法以為大學法著為令按我聖祖欲復古庠序之制未登大位之先即建國子學洪武二年詔天下立府州縣學八年詔立社學上諭中書省臣曰昔成周之世家有孰黨有庠故民無不知學是以教化行而風俗美今京師及郡縣皆有學而鄉社之民樂覩教化宜令有司置社樂延師儒以教民間子弟庶可導民善俗者方其初立學也擢許存仁為博士以専學事四年升學為品始設祭酒即拜存仁為之存仁元儒許謙之孫謙承考亭正學而存仁承之上命以為教一宗朱氏之學學者非六經四書不讀非濓洛關閩之學不講所謂全體大用之學也所謂治事者固已在乎經義之中宋人乃分之為二則是以體用為二事而非聖賢之學矣程皓言于朝曰治天下以正風俗得賢才為本宜先禮命近臣賢儒及百執事悉心推訪有明先王之道德業充偹足為師表者其次有篤志好學材良行修者延聘敦遣萃于京師朝夕相與講明正學其道必本于人倫明乎物理其教自小學灑掃應對以往修其孝弟忠信周旋禮樂其所以掖誘激勵漸磨成就之道皆有節序其要在于擇善修身至于成化天下自鄉人而可至于聖人之道其學行皆中于是者為明德取材識明達可進于善者使日受其業擇其學明德尊者為太學之師次以分教天下之學擇士入學縣升之州州賔興于太學太學聚而教之嵗論其賢者能者于朝凡選士之法皆以性行端潔居家孝弟有亷耻禮讓通明學業顯達治道者程頤看詳學制蓋以宋制有外舍內舍上舍之法月一私試嵗一公明試補內舍生間嵗一合試補上舍生上舍分三等上等命以官中等免禮部試下等免解夫以禮義相先之地而月使之爭殊非教養之道改試為課有所未至則學官召而教之更不考定髙下鐫解額以去利誘省煩文以専委任勵行檢以厚風教程頤曰古之仕者自十五入大學至四十方仕其間自有二十五年學又無利可趨則所志可知後之人自童稚間已有汲汲趨利之心何由得向善故古人必使四十方仕其志始定朱熹曰小學教之以事大學教之以理熹學校議曰學校必選實有道德之人使為學官以求實學之士裁減解額舍選濫繆之恩以塞利誘之塗蓋古之大學主於教人而因以取士故士來者為義而不為利吕祖謙曰學校之説非為士之貧而養之也又非欲羣其類而習為文詞也不農不商若何而可以為士非老非釋若何而可以為儒事親從兄當以何者以為法希聖慕賢當自何門而入道德性命之理當如何而明治亂興衰之故當何由而達考之古以為得失之鑒驗之今以為因革之宜此士之所當用心也古之庠序以養老以習射以教詩書禮樂以率其德行道藝聰明以開偏枉以正仁義以成譽髦以興我國家建學立師教追隆古崇正學迪正道振篤實革華靡聖祖之訓萬世之法言流習日移道德之不務而藝焉是攻日以占畢摛染為事惟干祿之圖噫以人材為念者盍思仰體聖訓而反其本乎天子曰辟雍為圓壁形築土引水使四方均得來觀列辟雍之內有館舍而內無墻院也其制環之以水圜象天也辟雍學之名王制以殷之辟雍與太學為一蔡雍月令論云取其四門之學則曰太學取其水圜如壁則謂之辟雍名雖異而義同也諸侯曰泮宫泮之為言半也蓋東西門以南通水北門無也所以降殺於天子王制云諸侯止有泮宫一學乃魯之所立非獨泮宫明堂位曰米廪有虞氏之庠也序者夏后氏之學也瞽宗者殷氏之學也泮宫周學也是魯得立四代之學僖公修之亦存古法也靈臺詩曰於論鼓鐘於樂辟雍文王有聲曰鎬京辟雍自西自東自南自北無思不服皇王蒸哉張載曰靈臺辟雍文王之學鎬京辟雍武王之學至此始為天子之學矣魯頌泮水首章曰思樂泮水薄采其芹魯侯戾止言觀其旗其旗筏筏鸞聲噦噦無小無大從公于邁按詩於樂辟雍鎬京辟雍莊子文王有辟雍之樂武王周公作武蓋本文王禮法之樂周有天下遂以為學名以樂可以告人也禮法而雍和則德成矣所謂成於樂也命夔典樂教胄子意非水旋丘如璧也豈因靈臺靈沼附會為之説與諸侯學制亦同五室但以其貢士於天子而在國外不同在魯則謂之泮宫以泗水縣泮水出焉作宫于上曰泮宫猶楚渚宫意詩思樂泮水集于泮林亦非半於天子也王制作泮宫鄭氏曰頖之為言班也所以班政教也又因頖而附會班云學校總敘古之教者家有孰黨有庠術有序國有學所謂學校至不一也然惟國學有司樂司成専主教事而州閭鄉黨之學則未聞有司職教之任者及考周禮地官黨正各掌其黨之政令教治孟月屬民而讀法祭祀則以禮屬民州長掌其州之教治政令考其德行道藝紏其過惡而勸戒之然後知黨正即一黨之師也州長即一州之師也以至下之為比長閭胥上之為鄉遂大夫莫不皆然蓋古之為吏者其德行道藝俱足為人之師表故發政施令無非教也以至使民興賢出使長之使民興能入使治之蓋役之則為民教之則為士官之則為吏鈞此人也秦漢以來儒與吏始異趣政與教始殊途於是曰郡守曰縣令則吏所以治其民曰博士官曰文學掾則師所以教其弟子二者漠然不相為謀所用非所教所教非所用士方其從學也曰習讀及進而登仕版則棄其詩書禮樂之舊習而從事乎簿書期會之新規古人有言曰吾聞學而後入政未聞以政學者後之為吏者皆政學者也自其以政學則儒者之學術皆筌蹄也國家之學宫皆芻狗也民何由而見先王之治哉又况異途捷徑旁午雜出蓋未嘗由學而升者滔滔也於是所謂學者姑視為粉飾大平之一事而庸人俗吏直以為無益於興衰理亂之故矣國朝學校始末祖宗時重國子儒宗之選祭酒司業必簡翰林宿學有碩望者以充之禮眷遷陟於他司絶等前代未有也即博士學正學録學博行修者亦往往補館職列坊局官已乃置內臺當是學國學惟官民生之目品官自一品至七品皆蔭敘與外夷子弟入學者曰官生郡縣中論秀升之若嵗貢鄉舉曰民生軍衛子弟得選入受學曰軍生諸官民軍生非強學登科必積分至十餘載升上館乃後使厯仕事而任官其後官生惟京堂官三品而上乃得蔭已别設武學武舉而進士科目益重得一第輒以資自侈舉人下第者引他故自弛不以時入監通嵗至監者曽不能數十人嵗貢生類哀頓願就教為祿仕計通天下郡縣學嵗貢入監者十不能三四其後納粟納馬入監之例起而國學愈淆初例開時猶提學官試文理通而後聽後彌弊濫郡縣學停降增附若斥退者得納銀齒于學于是商賈之子總角之童以及遊蕩愚不肖咸混迹其中士恥與為伍京闈重地曽不若郡庠邑序為猶有推擇也于是燕朋僻友恃蓄聚自恣蔑繩法不守雖祭酒司業隆重不異疇昔而養望需陟頗不屑督迪南北監博士助教學正學録官頗獨類剩員資敘漸下遷往往寬縱取妄説而國學大壞於是太學特為出身之塗而司教者不能遲之嵗月冀優遊於學舉人官生僅六月以上嵗貢生僅八月以上援例生亦不過一嵗即序撥而雜厯者減倍矣祖宗時特重督學使者之選兩京用御史外省用按察司風憲官類皆海內名流國盛時未論逮正德中猶然御史蕭鳴鳳懲惡嚴雖才不貸副使魏校敦行節受欺不悔副使李夢陽伸士義振萎習誦義不休己皆遭搆去其後督學官稍益輕柄其任者必非有卓行實學厭士心如異時高者虛談沽譽劣者安樂養交甚且開幸門招請託不忌又憚于巡厯品閲獨高坐自崇至大比委府州縣類考而合試之故士習利而騖于奔趨嘉靖初詔吏部將天下提學官特考察調黜而不久輒廢祖宗時重學官之選往往取耆儒宿學以充後科目法行舉人登乙榜者選授凡國推選坊局纂修典籍會試校文必與焉其經保薦及九載處優考者類得授翰林科道部曹官他常調未論也故廷臣薦士以起家學官者為美談後久刓弊師儒之職益輕乙科舉人不屑起就而嵗貢生年稍邁若貧困甚者乃甘心焉因取充位精力倦于鼓舞而學術紕謬無能為諸生先於是奔走有司結富豪以茍得而於月考課及上下三等薄卒以資不復關行能蓋冗蠧甚矣弟子員各以其意散處書院若寺觀相師友獨月朔望一詣學而講課缺然祖宗以經術作人令研磨于義理以檢點身心文尚典質諸剽老莊浮華言若獵竒鬬異者不録己文漸開自𢎞治迄嘉靖初最盛程式文及各家作者類精義雅詞有爛其文後學校所取士遺棄典實獨取輕俊即戾經畔義者得録又學無師法經有成説講貫粗通即稚子能之業之者以為取足行文而止於微義奧詞固無俟深解為也於是窮年畢力獨取進士科高等課試之文讀之他經史未論即異時所業専經亦簡棄不讀獨剪截科場中可為試目者為擬題搆文己然者輒效輾轉摹擬習為靡濫彼其以國家設科取士直為利祿資一旦效髙第取右職試官異時業棄如辨髦即夙昔受學師升沉稍異忽若途人長􅏥進之心傷揖遜之美而風習大潰當是時天下學士聚講者亦復不如古六籍四教遜志遊藝成德達才之盛獨取近儒一二激世之論如所謂六經糟粕須焚書一遭之語為至言倡天下於師心自用而名世高虛之士至空靈自詡蔑棄修學混楊墨老釋于一途揚波助瀾仕競茍得居榮口實幾於晉宋清談濁亂之俗而未知所止也先是大理寺副李承芳著論言近代來害天下之人心者莫甚于學宫壞天下之士習者莫甚于科舉率天下為惡無紀莫甚于學官可一切廢去而惟敕天下守令于郡邑之內求老師宿儒為一鄉之善士者令師其一鄉一國之善士者令師其一國而學焉者必六德六行六藝以立其本經書以擴其用至于農田水利及錢榖兵甲律令之類皆一一究極之而可效諸用守令卑恭盡禮其師而勸誘成之其道成德尊者則舉而加之高位由邑而逹之郡由郡而逹之省逹之天下庶其可也雖持議已激而痛時弊至深學校總論王陽明先生論國家立學校之意曰三代皆所以明人倫今之學宫皆以明倫堂名則其所以立學者固未始非三代之意也堯舜禹之授受曰人心惟危道心惟微惟精惟一允執厥中斯明倫之本也道心者率性之謂也未雜于人無聲無臭而顯者也誠之源也人心則雜於人而危矣偽之端也見孺子之入井而怵惕惻隱率性之道也從而納交於孺子之父母焉要譽于鄉黨朋友焉則人心矣飢而食渴而飲率性之道也從而極滋味之美焉恣口腹之叨焉則人心矣率是道而發於用也為喜怒哀樂發皆中節之和為三千三百經曲之禮為父子之親為君臣之義為夫婦之别長幼之序朋友之信而天下之達道盡此矣舜使契為司徒以教天下教以此也孔子之聖所求乎子臣弟友均曰未能未能乎此也是明倫之學始于孩提之知愛少長之知敬則孩提少長無不能而及其至雖聖人有所不能盡也故明倫之外無學矣博學者學此者也審問者問此者也慎思者思此者也明辨者辨此者也篤行者行此者也心外無事心外無理故心外無學是故于父子盡吾心之仁於君臣盡吾心之義言吾心之忠信行吾心之篤敬懲心忿窒心欲遷心善改心過處事接物無往而非求盡吾心以自慊者也譬之植焉心其根而學也者其培壅灌溉之者也扶植芟鋤之者也今之學校必由此而教之而後無忝於建學立師今之舉業必由此而精之而後不悔於敷奏明試今之仕進必由此而施之而後無負於行義逹道也二業合一甘泉子曰古之學者本于一今之學者出乎二二則攴攴則離攴離之弊也久矣故文武二而天下無全材矣豈惟文武為然才德二而天下無全人矣豈惟才德為然體用二而天下無知道矣豈惟體用為然行之動靜二而天下無善學矣豈惟動靜為然德業舉業二而天下攴離甚矣非其本然也孟子之時其楊墨矣程子之時其釋老矣故自攴離之説興而儒學壞矣儒學壞而天理幾乎息矣嗚呼知學之壞而不知儒者之學之壞也原本及末故知合一之説則可以化舉業而知道矣或問何為合一説執事則敬作字則學吾聞其語矣未見其人也故學在修其二而復之一而已矣小學附夫自小學與大學二而今之才遂與古之才異矣社學之教與大學之教曷可二也然則社學庠序奚别焉曰曷請以山木譬諸今夫童蒙也者非山木勾萌之時也乎成人也者非其根幹具而枝葉花實將不可禦者乎夫勾萌根幹同一山木則固同一生意惟於其勾萌而禁其摧折焉於其根幹具而禁其斧斤焉是則其所以養之者異耳夫自其勾萌而養之也欲其直則直矣從其曲則曲矣觀之山木童蒙之教其不尤重乎哉或曰請問社學庠序之所以同者奚在曰天命流行物與無妄孩提而知愛其親長而知敬其兄是心也謂秦之小子與越之小子異乎哉夫是心也秦之小子不異乎越之小子謂秦越之成人或異乎秦越之小子然乎否也是故灑掃應對歌詠舞蹈小子之教也而入孝出弟者其本也春夏以禮樂秋冬以詩書成人之教也而事親從兄者其本也易曰蒙以養正聖功也因其愛親敬長之良而訓以申之禮以理之樂以樂之是之謂養正孟子曰大人者不失其赤子之心者也所謂赤子之心者非即其愛親敬長有不容自己之心戒慎恐懼盡而知之存而養之自富貴貧賤以至終食造次顛沛而不違是謂不失故成人小子無二心也社學庠序無二教也社學也者自其勾萌而養之使之勃焉進於條達者也庠序也者自其根幹具而益養之使之翹焉極於參天摩漢者也曰愛親敬長此愚夫愚婦所以與知與能者也可以舉天下國家而盡之也乎曰吾未聞愛其親有不愛其他人之親者未聞敬其兄有不敬其他人之兄者矣愛其親而不能愛他人之親則其于親也其必有時愛有時不愛其愛也必非由其赤子之愛達之也乎敬其兄而不能敬他人之兄則其于兄也其必有時敬有時不敬其敬也必非由其赤子之敬達之也乎是故愛其親亦愛他人之親則老老之政必行矣天下之老有不得衣帛而食肉者其為圖之必不已也敬其兄亦敬他人之兄則子庶民之政必行焉天下之民有不獲時使而薄斂者其為圖之必不已也用是以觀居其位忍於牛羊其人民而弗之恤者其固以失其愛敬之心非一朝一夕也乎是故由愛敬之心充而至於惡可已不知手之舞之足之蹈之天下之能事畢矣雖以配天地可也于天下國家何有哉訓蒙大意王陽明先生示教讀曰古之教者教以人倫後世記誦辭章之習起而先王之教亡矣今教童子惟當以孝弟忠信禮義亷恥為専務其栽培涵養之方則直誘之歌詩以發其志意導之習禮以肅其威儀記之讀書以開其知覺蓋童子之情樂嬉遊而憚拘檢如草木之始萌芽舒暢之則條達摧撓之則衰萎固其理也故凡誘之歌詩者非但發其志意而已亦以泄其跳號呼嘯于詠歌宣其幽抑結滯于音節也導之習禮者非但肅其威儀而已亦以周旋揖讓而動蕩其血胍拜起屈伸而固束其筋骸也諷之讀書者非但開其知覺而已亦以沉濳反復而存其心抑揚諷詠以宣其志也夫然故順適其志意調理其性情濳消其鄙吝默化其粗頑日使之漸于禮義而不苦其難入于中和而不知其故是蓋先王之立教之微意也若近世之訓蒙稚者督責檢束而不知導之以禮求其聰明而不知養之以善鞭撻繩縛若待拘囚彼其視學舍如囹圄而不肯入視師長如寇仇而不欲見規避掩覆以遂其嬉遊設詐飾詭以肆其頑鄙偷薄庸劣日趣下流是蓋驅之以惡而求其為善也何可得乎凡吾所以教實在于此恐時俗不察視以為迂爾其務體吾意母輒因時俗之故廢其繩墨焉飬老總敘禮書曰天子之於老也其所飬也三國老也庶老也死政者之老也歲飬之也三仲春也季春也仲秋也周禮羅氏羅春烏獻鳩以飬國老在仲春月令飬衰老授几杖在仲秋文王世子曰凡大合樂必遂飬老鄭氏云大合樂謂春入學舍菜合舞秋頒學合聲於是時也天子則視學焉遂飬老此飬老于仲春仲秋者也月令季春之末擇吉日大合樂天子乃率三公九卿諸侯大夫親往視之大合樂亦必飬老此又飬老於季春者也若夫簡不帥教出征受成以訊馘告凡天子入學莫不飬老此又不在歲飬之數也夫貴胄謂之國子則貴而老者謂之國老賤者謂之庶人則賤而老者謂之庶老國子與庶人俊者同其學所以一道德國老與庶老異其學所以别分義故有虞氏飬國老於上庠飬庶老於下庠夏后氏飬國老於東序飬庶老於西序殷人飬國老於右學飬庶老於左學周人飬國老於東膠飬庶老於虞庠而又有死政者之老焉故羅氏獻鳩以飬之者國老也司徒以保息飬之者庶老也司門以其財飬之者死政者之老也若夫外饔者正稿人所謂耆老者總三者而言之也鄭氏謂三老五更各一人皆年老更事致仕者也名三五者取象三辰五星天所因以照明天下者謂人君飬老有四種一是飬三老五更二是子孫為官而死者父祖三是飬致仕之老四是引斤校言庶人之老熊氏云天子之視學飬老一歲有七鄭氏云凡飲飬陽氣凡食飬隂氣陽用春夏飲用秋冬是四時飬老凡四也文王世子凡大合樂必遂飬老大合樂謂春入學舍菜合舞秋頒學合聲又季春大合樂天子視學亦飬是七也然則古者建國必立三卿鄉飲必立三賔而飬老必立三老故禮曰三公在朝三老在學三公非一人則三老五更非各一人矣漢志以德行年髙者一人為五更故永平中拜桓榮為五更建初中拜伏恭為三老而鄭氏以此為三代之制誤矣先王父事三老兄事五更則三老五更乃羣老之尤者而致仕之老亦在其間皇氏離而二之誤之矣月令無冬夏飬老之文周禮禮記特言春飬秋食而已熊氏謂飬老歲有七亦誤矣又禮記言天子視學遂適東序飬老則視學飬老皆同日也鄭氏謂用其明曰亦誤矣飬老之禮外饔掌割烹酒正共酒稿人共食羅氏共鳩方其飬也必先釋奠于先老遂設三老五更羣老之席位適饌省醴飬老之珍具遂發詠焉登歌清廟下管象武天子袒而割牲執醬而饋執爵而酳冕而總干則乞言憲典之義著而孝悌之化行矣有司告以樂闋王乃命公侯伯子男及羣吏曰反飬老于東序而終之以仁此所謂一舉事而衆皆知其德之􅊀也禮言凡飬老有虞氏以燕禮而服深衣夏后氏以饗禮而服燕衣殷人以食禮而服縞衣周人修而兼用之而服玄服蓋虞氏以燕則恩勝禮夏后氏以享則以禮勝恩殷人以食則趣恩禮之中而周則文􅊀故修而兼用之周官外饔言享耆老此周人以饔醴飬老也行葦言飲射而繼之以祈黃耇此周人以燕禮飬老也禮記曰食二老五更於太學此周人以食禮飬老也然玄衣燕衣也燕衣非冕服及總干而舞必冕服以舞者樂之成故特服冕以明至誠有加而無殺也冕而總干施于食禮而記稱食嘗無樂者考之於詩商頌言顧豫蒸嘗而有鞉鼓淵淵嘒嘒管聲小雅言以往蒸嘗而有鐘鼓既戒鼓鐘送尸則嘗有樂矣樂師饗食諸侯序其事令奏鐘鼓鐘師凡饗食奏燕樂籥師賔客享食鼓羽籥之舞則食有樂矣其曰食嘗無樂蓋非商周之制也漢明帝飬老之禮其曰乘輿先到辟雍禮殿御坐東庠遣使者安車迎三老五更天子迎於門屏交禮道自阼階三老升自賔階至階三天子揖如禮三老升東南三公設几九卿正履請天子親袒割牲執醬而饋執爵而酳祝哽在前祝噎在後五更南面公進供禮亦如之明日皆詣闕謝其飬特三老五更二人而已羣老不與焉非古禮之意也圖書編卷一百五
