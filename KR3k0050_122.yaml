body:
  text: 圖書編卷一百二十二明章潢撰刑曹總叙五刑之設本以齊萬民也四海風土不齊習尚亦異故民之敢於爲惡者由法律不明心無畏憚比比焉驅而納諸罟擭䧟阱中而莫之知避也此所以不得不設之刑使其有所畏而不敢犯耳夫天討有罪五刑五用刑固天之刑也盍觀之天乎紫㣲垣内有大理隂德天牢而文昌第六星曰司寇太㣲垣内有左右執法并九卿郎位中有司刑之責天市垣内有貫索七公天紀列宿如角之平道亢之折威頓頑房之罰其主刑者不一而足焉刑獄民命所闗故在天垂象燦然可覩王者代天子民何能廢刑但先王之制刑也刑期無刑本以弼教也惟禮以教之於其先刑以禁之於其後民有不率教者斯加之以刑正所以體上天仁愛斯民之心而俾之盡歸於善也久之治隆化洽禮譲成風至於刑措不用由其純任教化故耳豈若後代惟法律是尚嚴刑峻罰訟獄日繁奸宄日熾無知小民反惴惴然無所措手足如此而望天下之太平何可得哉非謂刑可無設也聖祖象天制刑曹聖諭洪武八年太祖髙皇帝勅諭刑官肇法司於𤣥武之左鍾山之隂其所名者貫城貫者何且法天之貫索也是星九宿如貫珠圈而成象乃天牢也若中虚而無凡星於内則刑官無私邪政平訟理故獄無囚人貫内空若凡星處其中而有數枚者則刑官非人若中有星明亮者則貴人無罪而獄人法司已法天道爾諸執事各司其事還有以身法天道而行之邪若如天之所以獄清而無事心靜而神安以𤣥武之澄波印鍾山之蒼翆雖飛巢巔而走窩下亦莫潛毫釐洞見其真智人居是寧不開懐抱而長嘯終日引觴侣酌以快今生庶不負朕肇法司之初志也汝其敬哉法天制刑考紫微之垣大理二居尚書左宜明其旁隂德二宜暗大理隂德天之祥刑也文昌六六曰司寇大理佐理宜明潤天牢六主繩愆禁暴太微之垣九卿三一即司寇郎位十有五今之尚書郎也左右執法左執法廷尉之象右執法御史大夫主象主理法諸臣考節稽疑宜靜不移天市之垣貫索九亦曰天牢主刑獄宜中空太祖法之爲貫城凡列宿主刑者皆其屬七公七主執刑法别善惡宜明正天紀九主理怨訟宜明不宜芒夾角平道二左爲理主刑其下平二主執刑法以典獄事俱宜明正而靜亢四總理天下卿大夫治曹主聼訟理獄宜明大而靜折威七主斬殺以斷軍獄不宜金守頓頑二主考察囚情宜黄罰三主受金贖罪宜正直列天獄惟婁三宜明大昴七天之耳目主西方獄事宜明靜參七亦曰天獄主權衡以平理宜明靜井八主水衡法令于斯乎取平宜明而端列旁一星爲鉞主斬奢滛宜暗小内平四近職執法宜明論曰天之監下豈惟星哉茲獨言星者廣我太祖論貫索意也太祖謂貫索天牢以有無凡星於内知法司之刑政獄情聖人之於天道精矣天應人人承天惟影響或宜明而乃暗或宜隠而乃顯或宜靜而乃動在位者宜仰察焉以自考刑制稽古書帝曰臯陶蠻夷猾夏宼賊姦宄汝作士總建刑官之始刑官獨謂之士以民命所繫重德選也周禮大司宼卿一人小司宼中大夫二人士師下大夫四人旅建刑官之始今之刑部尚書即大司宼侍郎即小司宼十三司郎中員外郎主事即士師在外府州縣理刑官即鄉士遂士縣士或以十三司官爲鄉士恐非凡諸侯之獄訟以邦典定之凡鄉大夫之獄訟以邦法斷之凡庶民之獄訟以邦成弊之刑部十三司分理各布政司刑名并𢃄管在京衙門直𨽻府州之始六典八法八成皆冢宰所掌而定之斷之弊之則在司宼而士師贊之今刑部職掌即其遺意云在外府州官即諸侯在京官即卿大夫其所𨽻則皆庶民周禮大僕建路鼓於大寢之門外而掌其政以待逹窮者與遽令聞鼓聲則速逆御僕與御庶子窮謂寃抑遽傳也路鼓掌於太僕而守之者御僕御庶子也故聞鼓聲則迎之擊登聞鼓之始調人掌司萬人之難而諧和之凡過而殺傷人者以民成之鳥獸亦如之聼民息辭之始如過失殺及鳥獸踐傷之類乃許和我太祖作教民榜文頒示閭里有曰民間除犯十惡及強盗殺人外其有犯姦盗詐偽人命本鄉本里内自能含忍省事不願告官係累受苦被告伏罪亦免致身遭刑禍止於老人處决斷者聽與周禮調人意同大司宼以兩造禁民訟入束矢於朝然後聽之以兩劑禁民獄入鈞金三日乃致於朝然後聽之告訴納紙之始凡以財費相告曰訟相告以罪名曰獄雨造者使訟者兩至也兩劑者訟者各執劵書也入矢明其直入金明其堅金必三十斤使民因借物以致思待之三日使民因遲留而自省先王不輕受民之訟納民於刑也周禮小司宼以五聲聽獄訟求民情一曰辭聽觀其出言不直則煩二曰色聽觀其顔色不直則赧三曰氣聽觀其氣息不直則喘四曰耳聽觀其聴聆不直則惑五曰目聽觀其眸子不直則眊吕刑兩造具備師聽五辭五辭簡孚覆實無疑正於五刑必情真者然後質之以刑五刑不簡正於五罰五罰不服正於五過罪疑惟輕也五過之疵惟官畏權勢保禄位惟反報復恩仇惟内交通内謁惟貨狗貨惟來干請凡出入人罪以此五者其罪惟均尚克審之此二節聽斷詳慎之始周禮小司徒凡民訟以地比正之地訟以圖正之取鄰證地圖之始凡有責古債字者有判書以治則聽凡民同貨財者令以國法行之犯令者刑罰之凡屬責者以其地傅而聽其辭斷債負驗契證之始然司徒所斷附於刑者歸於士今制戶婚田土債負之訟則専屬刑部矣士師掌官中之政令察獄訟之辭以詔司宼斷獄弊訟致邦令刑部十三司說堂處斷之始司刑若司宼斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重刑部問擬罪囚而以大理平允之始書曰象以典刑制法定律之始象懸法而示之儀式也典常也此刑即墨劓剕宫大辟之五者周懸法象魏夲此時未有律書也至後魏文侯師於李悝采諸國刑典造法經六萹蕭何加以三篇通號九章曹魏劉劭又行漢律爲十八篇晉賈充又參魏律爲二十篇唐長孫無忌等又取漢魏晉三家擇可行者定爲十一篇大槩皆以九章爲宗宋因唐律令格式随時損益則有編勅一司一路一州一縣又别有敇神宗以律不足以周事情凡律所不載一斷以勅乃勅乃更其目曰勅令格式而律恒存乎勅之外曰禁於未然之謂勅禁於已然之謂令設於此以待彼之謂格律使彼效之之謂式其目愈繁我朝一凖於唐以定今鞭作官刑扑作教刑笞杖之始唐宇文融之子審爲大理評事以夏楚大小無制始創杖架以髙卑度杖長短又鑄銅爲規齊其巨細則較勘刑具之端也金作贖刑納贖之始蓋過誤情輕者乃准贖若五刑不論輕重皆贖則過矣罪疑惟輕吕刑五刑之疑有赦五罰之疑有赦矜疑寛貸之始周禮司刺贊司宼聽訟一赦曰幼弱再赦曰老旄司厲凡有爵者與七十者與未齔幼未毁齒者皆不爲奴收贖之始今有爵者議請凡七十以上十五以下犯流罪以下收贖八十嵗以上十嵗以下盗及傷人亦收贖餘皆勿論九十嵗以上七嵗以下雖有犯罪不加刑犯罪時雖未老疾而事發時老疾者依老疾論犯罪時幼小事發時長大依幼小論又禁考訊并不合爲證之類皆先王尊爵敬老慈幼之意漢書二千石有罪先請又詔六百石位大夫有罪先請品官請㫖提問之始光武詔囚各减本罪一等其餘贖輸作有差擬罪减等之始我太祖以大誥有無行之得律法經權之中非前代徒爲逓减者比周禮大司寇以圜土聚教罷民牢獄之始掌囚掌守盗賊凡囚者上罪梏拲而桎中罪桎梏下罪梏在手曰梏在足曰桎拲者兩手共一木也桎梏手足各一木也此獄官督罪人上肘鐐之始周公爻辭曰何校㓕耳噬嗑上九係用徽纒坎上六項枷繫索之始虞書五流有宅五宅三居流罪定里之始至隋新律流刑三有千里千五百里二千里周禮大司宼以嘉石平成也罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任保也而舎之枷號發工之始畢則保而放之使改過也司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之事而收教之能改者上罪三年而舎中罪二年而舎下罪一年而舎徒罪定限之始至隋新律徒刑五有一年一年半二年二年半三年掌戮墨者使守門刺字發配之始晉天福中流徒用刺面之法爲戢姦重典宋因之我朝惟竊盗刺臂假以充警猶飬其羞惡之心仁厚之至也宫者使守内奄寺畱中之始今刑部不用自宫者有禁惟大軍勦㓕之地間奏行之姑存以識所自漢文帝除肉刑定律曰諸當髠者完爲城旦旦起行治城四嵗刑也舂婦人舂作米當黥者髠鉗爲城旦舂罪人獄已决完為城旦舂滿三嵗爲鬼薪取薪供宗廟白粲擇米使舂白三歳刑也鬼薪白粲一歳爲𨽻臣妾𨽻臣妾一歳免爲庶人徒工發膳夫及充皂𨽻之始自文帝除肉刑之後則以笞杖徒流死爲今之五刑矣唐太平興國四年詔配役者分𨽻亭役使發囚徒煎鹽之始周禮孟夏出輕繋仲夏梃重囚熱審之始唐制凡大辟罪令尚書九卿讞之㑹審之始宋乾道中聚錄時長吏委無干礙吏人先附囚口占責狀一通覆視獄案無差復㸃無礙吏人依句宣讀令囚通曉㑹審先送掲帖及審令監生宣讀之始王制成獄辭史以獄成告於正正聽之正以獄成告於大司宼大司宼聽之棘木外朝之卿位之下大司宼以獄之成告於王王命三公參聽之三公以獄成告於王王三又當作宥然後制刑㑹審三覆奏之始季秋促獄刑秋後處决之始唐制京師决死蒞以御史金吾御史錦衣衛監刑之始小司宼之職歳終則令羣士計獄弊訟登中於天府歳報罪囚之始論曰政貴通時事必師古帝王之政斷自唐虞而三代之法至周大備漢唐而下則間有取云耳於昭皇祖損益厯代折自聖衷奚啻功倍於作已邪罔敷求以明刑則自用之過矣刑官虞曰士夏曰大理周曰大司宼按刑官在朝者謂之士師在六鄉謂之鄉士在六遂謂之遂士在各縣遂謂之縣士各掌其民之數夫謂之士者理官也士居四民之先而列五爵之一列官分職不皆謂之士而理官獨謂之士者蓋以此官民命所係天討所寓國家所以得失民心皆在於此故非明理義備道德通經學者不可以居之自虞廷以臯陶爲士而周人自秋官卿以下皆以士名蓋示後世使知刑官之重而不可雜以他流也本朝定制風憲官不以吏員爲之深得虞周之意周刑法周官大司宼掌建邦之三典以佐王刑邦國一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典視國俗爲重輕制御世之權不顓之於法此其大綱以五刑紏萬民一曰野刑上農功而紏其力作爲野治二曰軍刑上順命而紏其失守爲軍律也三曰鄉刑鄉首善上德而紏孝孝德之原也四曰官刑上功能而紏職職官之守也五曰國刑上愿而紏暴國兆民所聚風易澆難純故紏暴民歸之愿爲紀法守也亦不顓之法彼司刑之所司者法也非制法者也而刑莫先於罷民罷民者民惰於教不昬作勞如疲癃者然是滛酗之所生敖狠之所始民俗所以日偷而不可反也其害人也泰而固未麗於刑也故刑之則已重不刑則亂俗而傷化故寘諸圜土而守教之日夜施九職工事焉而役之用其力以強其罷書其罪於方版著之皆以耻其心而兾其改則教道存焉爾蓋環而教之也故圜土非其獄之謂也能改之三年不齒其不能改而出圜者殺則止惡於萌坊俗於忽王教之爲俗化慮至深逺也其有爭曲直而訟者以兩造辯之入束矢於朝然後聽蓋兩造而後是非形矯誣變亂者有質而是非有正也世未有偏辭而可蔽訟者故必兩造也其財訟地訟當入獄者以兩劑質之入鈞金三日乃致於朝而後聽蓋財訟地訟非可立判也必兩劑合而後有徴無辭也世未有聽獄而不以傅别書契質劑者故必兩劑也亦禁訟之道也禁之教之使無訟也其罷民之有罪過未麗於法而害於州里者桎梏而坐諸嘉石嘉石外朝之坐石不宜圜土也役司空不直明刑施職也坐以日斷役以月計各以其罪之輕重爲差若役已使州里任之而後宥弼教之道也凡逺近惸獨老幼之有復於上而其長弗逹者遽聽之使民易其長不聽使上虐其下使立肺石三日而後士聽之其辭直以復於上而辠其長逹下情之至也民壅於下而不逹國之大患始此矣諸侯之有獄訟者則以邦典定之六典所以爲邦國治也卿大夫之有獄訟者則以邦法斷之八法所以爲官府守也庶民之有獄訟者則以邦成弊之八成所以爲萬民統也此治獄訟之大凡也小司宼聽萬民之獄訟用情而訊之至旬乃弊以五聲聽訟求其情一曰辭聼謂辭枝辭滛若直也二曰色聽謂色怖色怍若定也三曰氣聽謂氣懾氣喘若氣壯也四曰耳聽五曰目聽謂視聽直則端不直則眊惑失常也其制五刑也必原父子之親立君臣之義以權之意論輕重之量慎測淺深之宜以别之悉其聰明致其忠愛以盡之猶恐其未也必三刺三宥三赦以求其衷三刺者一訊羣臣再訊之羣吏三訊之萬民所謂疑獄氾與衆共之者也衆疑赦之矣即罪麗於罰衆所宥雖上刑下服舉與衆宥之所刺即下刑上服舉與衆刺之也不顓之於法惟用中於民故曰國人刑殺之也猶未也司刺者又得以不識過失遺忘而宥之幼弱老耄蠢愚而赦之至國有大獄又得以親故賢能功貴勤賔八辟焉麗邦法以議之則其所求諸刑者爲已悉矣乃歳孟春遒人以木鐸狥於朝以邦之五禁書懸之象魏浹日而後歛以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁國有事則又爲五戒以先後之一曰誓用之於軍旅二曰誥用之於㑹同三曰禁用之於田役四曰紏用之於國中五曰憲用之於都鄙斯曷非欲法令著掲無使罪麗於民欲民恊中懐德而使無麗於法也哉乃其鄉遂縣方之獄訟則各以其士掌其治聽其獄訟察其詞而辯之異其死刑之辠而要之服念至三旬而後上之史以獄成告於大司宼大司宼聽之棘木之下羣士司刑者咸在各麗於法以審蔽之大司宼以獄成告於王王命三公參聽之三公以獄成告於王王三宥然後司宼受中而協日刑殺焉關重慎之至也刑各於其鄉遂縣都之市肆之日三示各與其衆棄之於觀警痛深歳孟冬司宼命羣士計獄弊訟登中於天府明刑殺一天也刑制考易噬嗑亨利用獄程頥曰聖人以噬嗑之象推之於天下之事在口則爲有物隔而不得合在天下則爲有彊梗或䜛邪間隔於其間故天下之事不得合也當用刑法小則懲戒大則誅戮以除去之然後天下之治得成矣象曰雷電噬嗑先王以明罰勅法程頥曰電明而雷威先王觀雷電之象法其明與威以明其刑罰飭其法令法者明事理而爲之防也初九屨加於足挍木械㓕趾旡咎六二噬膚㓕鼻旡咎六三噬腊肉遇毒小吝旡咎九四噬乾胏得金矢利艱貞吉六五噬乾肉得黄金貞厲旡咎上九何挍㓕耳凶朱熹曰初上旡位爲受刑之象中四爻爲用刑之象初在卦始罪薄惡小又在卦下故爲屨挍㓕趾之象止惡於初故得旡咎子曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大戒此小人之福也易曰屨校㓕趾旡咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善爲無益而弗爲也以小惡爲無傷而弗去也故惡積而不可掩罪大而不可觧易曰何校㓕耳凶賁之象曰山下有火賁君子以明庶政無敢折獄程頥曰君子觀山下有火明照之象以修明其庶政成文明之治而無果敢於折獄也折獄者人君之所致慎也豈可恃其明而輕自用乎旅之象曰山上有火旅君子以明慎用刑而不畱獄程頥曰火之在髙明無不照君子觀明照之象則以明慎用刑明不可恃故戒於慎明而止亦慎象觀火行不處之象則不畱獄獄者不得已而設民有罪而入豈可淹滯畱乆也豐之象曰雷電皆至豐君子以折獄致刑程頥曰雷電皆至明震並行也折獄者必照其情實惟明克允致刑者必威於奸惡惟斷乃成故君子觀雷電明動之象以折獄致刑也中孚之象曰澤上有風中孚君子以議獄緩死程頥曰水體虚故風能入之人心虚故物能感之風之動乎澤猶物之感於中故爲中孚之象君子觀其象以議獄緩死君子之於議獄盡其忠而已於决死極其惻而已故誠意常求於緩緩寛也於天下之事無所不盡其忠而議獄緩死最其大者也按卦象言刑獄者五卦噬嗑賁豐旅中孚也噬嗑賁豐旅皆有離象而噬嗑豐則兼取震賁旅則兼取艮蓋獄以明照爲主必先得其實則刑不濫然非震以動之則無有威斷非艮以止之則輕於用刑惟中孚一卦則有取於㢲兊蓋用獄必明以照之使人無隠情震以威之使人無拒意而又當行而行當止而止不過於用其明而恣其威也夫然後兊以議之㢲以緩之原情定罪至再至三詳之以十議原之以三宥三聽之司宼定之三公聽之旬而職聽三旬而職聽三月而上之議而又議緩而又緩求其出而不可得然後入之本乎至誠孚信之心存乎至仁惻怛之意在我者有誠心則在人者無遺憾矣舜典象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉帝曰臯陶蠻夷猾夏宼賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允大禹謨帝曰臯陶汝作士明於五刑以弼五教期于予治刑期于無刑民恊于中時乃功懋哉臯陶曰宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心兹用不犯于有司康誥王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺立政曰和我庻獄庻慎時則勿有間之又曰繼自今文子文孫其勿誤于庶獄庶慎惟政是乂之又曰今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫吕刑伯夷降典折民惟刑蔡沈曰典禮也伯夷降天地人之三禮以折民之邪妄蘇軾曰失禮則入刑禮刑一物也士制百姓于刑之中以教祇德天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德剛柔正直一人有慶兆民賴之其寧惟永王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及蔡沈曰刑凶器也而謂之祥者刑期無刑民協于中其祥莫大焉輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要周禮乃立秋官司宼使帥其屬而掌邦禁以佐王刑邦國大司宼之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典祖訓有曰朕自起兵至今四十餘年人情善惡真僞無不厯渉其中奸頑刁詐之徒情犯深重灼然無疑者特令法外加刑使人知所警懼不敢輕易犯法然此特權時處置頓挫奸頑非守成之君所常用以後子孫做皇帝時止守律與大誥並不許用黥刺剕劓閹割之刑敢有請用此刑者將犯人凌遲全家處死由是觀之可見聖祖以亂國待前元而用重典蓋非得已也以五刑紏萬民一曰冬官野刑上功農功紏力二曰夏官軍刑上命將命紏守三曰司徒鄉刑上德六德紏孝四曰治典官刑上能能其事紏職修其職五曰禮典國刑上愿慤慎也紏暴暴當作恭不恭者當紏也按刑雖屬於秋官而五官不得不治蓋治也教也政也禮也事也聖人治天下之具也然所以致其功之立而化之成舎刑以紏之安能保其終不怠而乆不廢哉大戴禮刑罰者御人之銜勒也吏者轡也刑者筴也天子御者内史太史左史手也古者以法爲銜勒以刑爲筴以人爲手而御天下公家不蓄刑人大夫不飬士遇之途不與之言屏諸四方惟其所之不及以政不欲生之子曰五刑之屬三千而罪莫大於不孝要君者無上非聖人者無法非孝者無親此大亂之道也漢刑法志曰古人有言曰滿堂而飲酒有一人向隅而悲泣則一堂皆爲之不樂王者之於天下譬猶一堂之上也故一人不得其平爲之悽愴於心今郡國被刑而死者歳以萬數天下獄二千餘所其寃死者多少相覆獄不减一人此和氣所以未洽者也原獄刑所以蕃若此者禮教不立刑法不明民多貧窮豪傑務私奸不輙得獄犴不平之所致也孔子曰古之知法者能省刑本也今之知法者不失有罪末矣又曰今之聽訟者求所以殺之古之聽訟者求所以生之今之獄吏上下相驅以刻爲明深者獲公名平者多患害諺曰鬻棺者欲歳之疫非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶是矣夏作禹刑湯制官刑儆于有位周禮士師之職掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸狥之于朝書而懸諸門閭以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于㑹同三曰禁用諸田役四曰紏用諸國中五曰憲用諸都鄙掌事之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰撟讀爲矯邦令六曰爲邦盗七曰爲邦朋八曰爲邦誣司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百若司寇斷獄弊訟則以五刑之法詔刑罰而以辯罪之輕重司約掌邦國及萬民之約劑劵也治神之約爲上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之禁殺戮掌司斬殺戮者凡傷人見血而不以告者攘獄刼獄者遏訟者以告而誅之禁暴氏掌禁庶民之亂暴力正以強力得正矯誣犯禁者作言語而不信者以告而誅之吕刑曰墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪無僭亂辭勿用不行惟察惟法其審克之漢髙祖約法三章殺人者死傷人及盗抵罪後以三章之法不足以禦奸遂令蕭何攟摭秦法定律令除參夷連坐之法増部主見知之條於李悝所造六篇益事律擅興廐户三篇合爲九篇叔孫通益律所不及傍章十八篇律之名始見於此文帝除收孥諸相坐律令又除肉刑景帝詔曰加笞者或至死而笞未畢朕甚憐之其减笞三百曰二百笞二百曰一百又笞者所以教之也其定箠令景帝定箠令丞相劉舍御史大夫衛綰請笞者箠長五尺其本大一寸竹也末薄半寸皆平其節當笞者笞臀毋得更人畢一罪乃更人自是笞者得全獻帝時議者欲復肉刑孔融議曰古者淳龎吏端刑清百姓有罪皆自取之末世凌遲風化壊亂政撓其俗法害其人故曰上失其道民散乆矣而欲繩之以古刑投之以殘棄非所謂與時消息者也且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙髙英布爲世大患不能止人遂爲非也適足絶人還爲善耳雖忠如鬻拳信如卞和智如孫臏寃如巷伯才如史遷逹如子政一離刀鋸沒世不齒是太甲之思庸穆公之霸秦南睢之骨立衛武之初筵陳湯之都賴魏尚之守邊無所復施也漢開改惡之路凡為此也故明徳之君逺度深維棄短就長不茍革其政者也朝廷善其言按唐虞三代以來俱用肉刑至漢文始廢肉刑用笞蓋權輿於虞刑之鞭扑也景帝定箠令魏晉南北朝其君臣仁暴不同其俗尚厚薄不一其所用刑各有不同隋文帝始定今之五刑凡前代考訊之具盡除不用唐宋因之制爲刑具各有等第本朝於大明律卷首作爲横圖以紀獄具其大小厚薄視唐畧等比宋則尤爲輕焉祖宗好生之仁也固如此成帝詔今大辟之刑千有餘條律令煩多百餘萬言竒請他比日以益滋其令中二千石二千石博士及明習律令者議减死刑及可蠲除省約者令較然易知條奏大明律四百六十條死罪二百二十光武時桓譚上䟽曰今法令决事輕重不齊或一事殊法同罪異論奸吏得因縁爲市所欲活則出生議所欲䧟則與死比是為刑開二門也今可令通義理明習法律者校定科比一其法度由譚之言是法又不足任須得之公良之士司刑可也隋定律令置十惡之條多採齊之制而頗有損益一曰謀反二曰謀大逆三曰謀叛四曰惡逆五曰不道六曰大不敬七曰不孝八曰不睦九曰不義十曰内亂十惡及殺人獄成者雖㑹赦猶除名自隋以前死刑有五曰罄絞斬梟裂而流徒之刑鞭笞兼用數皆踰至隋始定爲笞刑五自十至於五十杖刑五自六十至於百徒刑五自一年至於三年流刑二自千里至於三千里死刑二絞斬除其鞭刑及梟首轘裂之酷按笞杖徒流死此後世之五刑也始於隋而用於唐以至於今日唐之刑書有四律令格式令者尊卑貴賤之等數國家之制度也格者百官有司之所常行之事也式者其所常守之法也凡邦國之政必從事於此三者其有所違及人之爲惡而入於罪戾一斷以律律之爲書因隋之舊爲十有二篇一曰名例二曰衛禁三曰職制四曰戶婚五曰廐庫六曰擅興七曰盗賊八曰鬪訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄其用刑有五一曰笞笞之爲言耻也凡過之小者箠撻以耻之漢用竹後世更以楚書曰扑作教刑是也二曰杖杖者持也可持以撃也書曰鞭作官刑是也三曰徒徒者奴也蓋奴辱之周禮曰其奴男子入於罪𨽻任之以事寘之圜土而教之量其罪之輕重有年數而捨四曰流書曰流宥五刑謂不忍殺宥之於逺也五曰死乃古大辟之刑也唐因隋制髙祖入京師約法十二條後詔裴寂等更撰律令凡律五百太宗即位詔長孫無忌房𤣥齡等復定舊令按洪武六年命刑部尚書劉惟謙等重定諸律每一篇成輙繕上奏掲於西廡之壁聖祖親御翰墨爲之裁定明年書成篇目一凖於唐之舊采用已頒舊律二百八十八條續律一百二十八條舊令改律三十六條因事制律三十一條掇唐律以補遺一百二十三條合六百有六分爲三十卷其後復定爲吏戶禮兵刑工六類析十八篇以爲一十九約六百六條以爲四百六十析戶婚以爲戶役婚姻分鬪訟以爲鬪毆訴訟廐庫一也則分廐牧於兵倉庫於戶焉職制一也則分公式於吏受贓於刑焉名例舊五十七條今止存其十有五盗賊舊五十三條今止存其二十八名雖沿於唐而實皆因時以定制縁情以制刑上稽天理中順地宜下合人情立百世之凖繩爲百王之憲度自有法律以來所未有也唐自房𤣥齡等更定律令格式訖太宗世用之無所變更髙宗時又詔長孫無忌等増損格勅其曹司常務曰畱司格頒之天下曰散分格其後武后時有垂拱格元宗時有開元格憲宗時有開元格後敕文宗時有太和格又有開成詳定格宣宗又以刑律分類爲門而附以格勅爲大中刑律統類歐陽脩曰書曰慎乃出令令在簡簡則明行之在乆乆則信而中材之主庸愚之吏常莫克守之而喜爲變革至其繁積雖有精明之士不能徧習而吏得上下以爲姦此刑書之弊也宋法制因唐律令格式而隨時損益則有編敕一司一路一州一縣又别有敕神宗以律不足以周事情凡律所不載一斷以敕乃更其目曰敕令格式而律恒存乎敕之外曰禁於未然之謂敕禁於已然之謂令設於此以待彼之謂格使彼效之之謂式凡入笞杖徒流死自名例以下至斷獄十有二門麗刑名輕重皆爲敕自品官以下至斷獄三十五門約束禁止者皆爲令命官之等十有七吏庶人之賞等七十有七又有倍全分釐之級凡五等有等級髙下者皆爲格表奏帳籍關檄符牒之類有體製模楷者爲式按我聖祖登極之初元年即爲大明令一百四十五條頒行天下制曰惟律令者治天下之法也令以教之於先律以齊之於後古者律令至簡後世漸以煩多甚至有不能通其義者何以使人知法意而不犯哉民既難知是豈吏之奸而䧟民於法朕甚閔之今所定律令芟煩就簡使之歸一直言其事庻幾人人易知而難犯書曰刑期于無刑天下果能遵令而不䧟於律刑措之效亦不難致兹命頒行四方惟爾臣庶體予至意斯令也蓋與漢祖入關約法三章唐祖入京師約法十二條同一意也至六年始命刑部尚書劉惟謙等造律文又有洪武禮制諸司執掌與夫大誥三篇及大誥武臣等書凡唐宋所謂律令格式與其編敕皆在是也又按法者祖宗所制百世之典例者臣僚所建一時之宜法所不載而後用例可也既有法矣何以例爲若夫其間時異勢殊因時救弊有不得盡如法者則引法與例取裁於上可也宋徽宗時臣僚請取前後所用例以類編修與法妨者去之在今日亦宜然論治刑獄按宋濓溪周子曰天以春生萬物物之生也既成矣不止則過焉故得秋以成聖人之法天以政飬萬民民之盛也欲動情勝利害相攻不止則賊㓕無倫焉故得刑以治情僞㣲曖其變千狀茍非中正明逹果斷者不能治也訟卦曰利見大人以剛得中也噬嗑曰利用獄以動而明也嗚呼天下之廣主刑者民之司命任用可不慎乎程子曰聖人所知宜無不至也聖人所行宜無不盡也然而書稱堯舜不曰刑必當罪賞必當功而曰罪疑惟輕功疑惟重與其殺不辜寧失不經異乎後世刻核之論矣東坡蘇氏曰東漢梁統上言髙惠文景以重法興哀平以輕法衰頽當時不從其議此如人年少時不節酒色而安及老雖節而病便謂酒色可以延年可乎統亦東京名臣一出此言獲罪於天其子松棟皆死非命冀卒㓕族嗚呼悲夫戒哉踈而不漏可不懼乎朱子曰今人說輕刑只見所犯之人可憫不知被傷者尤可念也如刼盗殺人人多知求其生殊不念死者之無辜是知爲盗賊計而不爲良人地若饑荒竊盗之類可以情原大小輕重處之又曰或以妻殺夫或以族子殺族父或以他客殺地主有司議刑卒從流宥之法夫殺人不死傷人者不刑雖二帝三王不能以此爲治况係父子之親君臣之義三綱之重非凡人所比者乎諸若此類渉於人倫風化之本者有司不以經術義理裁之而世儒之鄙論異端之邪說俗吏之私計得以行乎其間則天理民彜幾何不至於冺㓕而舜之所謂無刑者又何日而可期哉宜博採經史及古今賢哲議論及於教化刑罰之意者刪其精要聚爲一書以教學古入官之士與凡執法治民之官皆使畧知古先聖王所以敕典敷教制刑明辟之大端而不敢隂爲姑息果報便文之計則庶幾有以助成世教而仰稱好生惡殺期於無刑之本意又曰今人獄事不問是非善惡只務從厚豈不長姦誨惡大凡事付之無心因其所犯考其實情輕重厚薄付之當然可也若從薄者固不是只云我只要從厚則此病所係亦不輕南軒張氏曰治獄所以多不得平者蓋有數説官吏賣獄固不足論而或矜知巧以爲聰明持姑息以惠姦慝上則視大官之趨向而重輕其手下則惑胥吏之浮言而二三其心不盡其情而一以威怵之不原其初而一以法繩之如是不得其平者多矣厯代用刑總論昔漢陳咸言爲人議法當依於輕雖有百金之利慎無與人重比蓋漢承秦法過於嚴酷重以武宣之君張趙之臣滛刑喜殺習以爲常咸之言蓋有激也竊嘗以爲劓刖㧻黥蚩尤之刑也而唐虞遵之收孥赤族亡秦之法也而漢魏以來遵之以賢聖之君而不免襲亂虐之制由是觀之咸言尤爲可味也漢文除肉刑善矣而以髠笞代之髠法過輕而畧無懲創笞法過重而至於死亡其後乃去笞而獨用髠减死罪一等即止於髠鉗進髠鉗一等即入於死而深文酷吏務從重比故死刑不勝其衆魏晉以來病之然不知减笞數而使之不死乃徒欲復肉刑以全其生肉刑卒不可復遂獨以髠鉗爲生刑所欲活者傅生議於是傷人者或折腰體而纔剪其毛髪所欲䧟者予死比於是犯罪者既已刑殺而復誅其宗親輕重失宜莫此爲甚及隋唐以來始制五刑曰笞杖徒流死此五者即有虞所謂鞭扑流宅雖聖復起不可偏廢也若夫茍慕輕刑之名而不恤誨姦之患殺人者不死傷人者不刑俾無辜罹毒虐者抱沉寃而莫伸而舞文利賕賄者無後患之可惕亦非聖人明刑弼教之本意也易書周禮祥刑總說按舜典周禮吕刑易大傳所稱祥刑參錯不一愚嘗合而觀之辠狀之辭情真罪當則當正之以五刑有大辟肉刑者二通謂之刑在虞書爲象以典刑怙終賊刑周禮五刑之灋麗萬民之辠吕刑之五辭簡孚正於五刑易謂之折獄致刑也有所謂過者則在所當宥虞書宥過無大又曰流宥五刑周禮分爲不識過失遺忘三者而爲辟讎之法大約與虞之流同吕刑則曰五刑不簡正於五罰使出財以償之五罰不服正於五過痛懲之以警衆又有𤯝災者則在所當赦虞書𤯝灾肆赦周禮分爲老幼蠢愚三者亦止所赦易則謂之赦過宥罪也又所謂疑者臯陶稱舜曰與其殺不辜寧失不經謂參錯訊鞠而終不得其情實者寧失之以與民周禮鄉士等職所謂若欲免之吕刑則曰五刑之疑有赦五罰之疑有赦易謂之緩死也然虞書又有所謂罪疑惟輕者茍有罪而輕之可也若無罪雖得輕刑亦非辜矣蓋此非犯有虚實之疑乃灋可上下之疑故比之當從輕耳二千年間聖經所言無不脗合但虞之金作贖刑蓋指鞭扑之輕者而吕刑於五刑之不簡者俱正于五罰此乃世變之不同至若易之明罰敕法此罰字亦指刑言蓋刑罰二字亦通用也嗚呼後世之刑則與古異矣文帝以一時不忍之心而去肉刑免肢體之傷殘是矣然以輕罪而卒死於敲扑之下是以大辟而易肉刑也自開罰之端凡欲科歛者必假此爲詞是以贖罪爲利網也吕刑有言罰懲非死人極于病今之稍居人上得以杖罰人者即能生殺人豈以無有作威之道哉至於眚灾則有赦也無故而大赦縱有罪而虐無辜將安居乎避讐之法不得已而有瑞節之與也鐵劵之賜預免其身及子孫死罪幾名不幾干宥人犯法乎且三千條雖有明憲至議刑之時則任意出入是刑非以懲惡也反爲殃民之具非以矜善也祗以長惡之媒所謂天討有罪者安在哉名例五刑笞刑五一十贖銅錢六百文二十贖銅錢一貫二百文三十贖銅錢一貫八百文四十贖銅錢二貫四百文五十贖銅錢三貫杖刑五六十贖銅錢三貫六百文七十贖銅錢四貫二百文八十贖銅錢四貫八百文九十贖銅錢五貫四百文一百贖銅錢六貫徒刑五一年杖六十贖銅錢十二貫一年半杖七十贖銅錢一十五貫二年杖八十贖銅錢十八貫二年半杖九十贖銅錢二十一貫三年杖一百贖銅錢二十四貫流刑三二千里杖一百贖銅錢三十貫二千五百里杖一百贖銅錢三十二貫三千里杖一百贖銅錢三十六貫死刑二絞斬贖銅錢四十二貫管見曰贖罪鈔有律有例律鈔稍輕例鈔稍重復有錢鈔兼收各折筭不同不得混收近時惟京師錢鈔便乃兼收在外錢鈔不便故奏定折銀至如過失殺人者又有定例兼追錢鈔不可執一論也㑹典𢎞治十四年奏凖刑部都察院問完例難的决人犯并婦人有力者每杖一百該鈔二千二百五十貫折銀一兩每十以二百貫逓减至杖六十爲銀六錢笞五十該鈔七百五十貫折銀五錢每十以一百五十貫逓减至笞二十爲銀二錢笞一十該鈔二百貫折銀一錢如收銅錢每銀一兩折七百文其依律贖鈔除過失殺人外其餘亦照此數折收十惡一曰謀反謂謀危社稷二曰謀大逆謂謀毁宗廟山陵及宫闕三曰謀叛謂謀背夲國濳從他國四曰惡逆謂毆及謀殺祖父母父母夫之祖父母父母殺伯叔父母姑兄姊外祖父母及夫者五曰不道謂殺一家非死罪三人及支觧人若採生造畜蠱毒魘魅六曰大不敬謂盗大祀神御之物乗輿服御物盗及偽錯誤若造御寳合和御藥誤不依夲方及封題造御膳誤犯食禁御幸舟船誤不堅固七曰不孝謂惡言呪罵祖父母父母夫之祖父母父母及祖父母父母在别籍異財若奉飬有缺居父母喪身自嫁娶若作樂釋服從吉聞祖父母父母喪匿不舉哀詐稱祖父母父母死八曰不睦謂謀殺及賣緦麻以上親毆告夫及大功以上尊長小功尊屬九曰不義謂部民殺本屬知府知州縣軍士殺本管指揮千戶百戶吏卒殺本部五品以上長官若見殺受業師及聞大䘮匿不舉哀若作樂釋服從吉及改嫁十曰内亂謂姦小功以上親若父妾及與和者八議一曰議親謂皇家袒免以上親及太皇太后皇太后緦麻以上親皇后小功以上親皇太子妃大功以上親二曰議故謂皇家故舊之人素得侍見特䝉恩待日乆者三曰議功謂斬將奪旗摧鋒萬里或率衆來歸寧濟一時或開拓彊宇有大勲勞銘功太常者四曰議賢謂有大德行之賢人君子其言行可以爲法則者五曰議能謂有大才業能整軍旅治政事爲帝王之輔佐人倫之師範者六曰議勤謂有大將吏謹守官職早夜奉公或使逺方經渉艱難有大勤勞者七曰議貴謂爵一品及文武職事官三品以上散官一品以上者八曰議賔謂承先代之後爲國賔者應議者犯罪凡八議者犯罪實封奏聞取㫖不許擅自勾問若奉㫖推問者開具所犯及應議之狀先奏請議議定奏聞取自上裁其犯十惡者不用此律圖書編卷一百二十二
