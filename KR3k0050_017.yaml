北二星曰司祿主爵祿增年延德故在六宗之祀司危二星司祿之北主驕佚司非二星司危之北主愆過凡此四星皆黑星明大為災居常則平南二星曰哭主號哭也哭東二星曰泣主死明則國多哭泣金火守之亦然泣南十三星曰天疊城形如貫索形主北邊丁零胸奴敗臼四星在虛危南知凶哭他星守之飢兵起秦代東三星南北列曰離瑜離主衣瑜主飭皆婦人服星也微則后宫儉明大則婦人奢虛二星距南星去極一百度半司命二星距西星去極九十二度入虛宿三度司祿二星距西星去極九十度入虛宿四度司危二星距西星去極八十五度半入女宿八度司非二星距西星去極七十九度半入女宿九度半哭二星距西星一百九十七度半入女宿九度泣二星距南星去極一百四度半入危宿三度天壘城十三星距西星去極一百二十六度入女宿十一度敗臼四星距北星去極一百三十九度半入虛宿八度離瑜三星距西星去極一百二十八度入女宿九度危宿總敘熒惑守危嵗飢人疫死無葬者東南皆有兵起大臣為逆國易政大旱米貴十倍黃占曰民為變一曰其國為政者危海中占云春旱致多水又主架屋受藏風雨墳墓祠祀女動則天下大動土功張衡云虛危星為死喪哭泣事亦為邑居廟堂祠祀事冡宰之官動則哭泣死喪火守則天子將兵金守飢饉兵起虛危動則有災車府東南五黑星曰人星有如人象主靜衆庶柔逺能邇一曰卧星主房淫不見則人有詐行詔書明則人安暗則凶內杵三星在人星傍主運糧正直下臼吉不相當糧絶不直民飢內臼四星在人星東南主杵臼覆大飢仰則大豐隋志云客星入杵臼兵起天下聚米天津東南七星曰車府東近河邊抵司非主官庫之府火金守主兵車大動天鈎狀在造父西河中主乘輦服飾法式直則地符動明則服飾正也傳舍南河中五星曰造父御官也一曰司馬曰伯樂星亡馬大貴明大則吉墳墓四星在危下如墓形主喪葬之事明則死亡虛梁四星在蓋屋南主園林寢廟非人所處故曰虛梁金火守之入犯兵災大兵起天錢十星在北落西北主錢帛所聚占明則藏府盈不爾虛耗金火守之兵盜起蓋屋二星在危南主天子所居室亦為宫室之官金守之國兵起彗孛尤甚也危三星距南星去極九十六度人五星距西南星去極七十度入虛宿六度半杵三星距西星去極六十一度半入危宿三度臼四星距西南星去極六十九度半入危宿三度半車府七星距西第一星去極五十六度半入虛宿四度半造父五星距北星去極三十八度入危宿十一度墳墓四星距中星去極九十六度入危宿五度半虛梁四星距東西星去極一百度半入危宿八度天錢十星距東北星去極一百一十八度入危宿三度蓋屋二星距西星去極九十七度入虛宿九度室宿總敘室二星曰營室一曰定星一曰玄宫一曰清廟一曰玄冥一曰天宫一曰天庫一曰休官天子之宫軍糧之府木星也主宗廟主三軍廪食及土工事其下九尺為日月五星中道其北六星兩兩而居曰離宫后妃入御之位為宫掖者或曰營室二星上一星為天子宫下一星為太廟故置羽林以衛之將以土工事占為營室星主明則國昌不明則鬼神不享祠祀國多疾疫動則有土工事芒角則有兵疫星亡則輔國臣死離宫不見則主有災又不明則國多疾疫芒動則有土工兵出野又主其兵先起者敗離宫六星兩兩居之分布室壁之間天子之别宫也亦隱藏休息之所金火守之則兵起室南六星曰雷電主興雷動蟄明則震雷作壘壁十二星在羽林北橫列營室之南羽林之垣壘也星衆而明則安寧稀而動則兵革起不見天下亂五星入天軍皆為兵起金火守之尤甚羽林四十五星三三而聚散在營室之南天軍也主車騎又主翼王也星衆而明則安寧稀而動則兵革起不見天下亂金火水入守兵起斧鉞三星亦曰斧鑽在八魁西北主誅夷不明則斧鑽不用移動則兵起有星入之皆為大臣誅北落師門一星在羽林西南天之著落也亦曰天軍蕃之候門長安門曰北洛門以象此也主非常以候兵明大則軍安微弱則兵起金火守之有兵災一曰有星守之兵入塞北落門東南九黑星曰八魁主張禽獸之官也客星入之多盜賊兵起金火入亦然北落西一星曰天綱主武帳天子遊獵之會所金火守兵起室西南二星曰土功吏主土功之官也搖動則有修築之事隋志土功吏主司過度騰蛇二十二星在營室北若盤蛇之狀居於河洛謂天蛇星主水蟲微則國安明則不寧移大旱移北大水客星守之雨水為災水物不收室二星距南星去極八十度半雷電六星距西南星去極八十七度入危十二度壘壁陳十二星距西第一星去極一百十五度入女宿十一度羽林四十五星距大星去極一百十七度入危宿十五度半鈇鉞三星距北星去極一百三十度入室宿二度北落師門一星去極一百二十六度入危宿十一度半八魁九星距南星去極一百三十九度入壁宿四度半天綱一星去極一百二十九度入危宿五度土功二星距西星去極八十五度入壁宿初度騰蛇二十二星距中大星去極四十四度少入危宿九度半按雷電在室南霹靂在雷電南雨雲在霹靂南土工吏在壁西南蓋雷公電姥雲將雨師與夫霹靂斧吏皆北方水府之精而娵訾為天門故其神棲焉室不得而司之也壁宿總敘壁二星曰東壁一曰天衛一曰天池一曰天梁圖書之府土星也主文章亦主土工興室共為天之四輔其南九尺為日月五星中道星明正則道術行國多水若大小不同或失色則天子輕道術賤文士動搖則土功興離徙就聚則天下有田宅事星暗則王失小人進用及親黨回邪専權任事日月食損賢臣五星孛犯兵起土工西南五星曰霹靂主興雷奮擊明而動則正人用事不明凶霹靂南四星曰雲雨明則多雨水火守之大旱天廄十星在東壁北蓋天馬之廄今之驛亭也不見天下道斷鈇鑕五星在天倉西門刈具也主斬芻飼牛馬明則牛馬肥暗則牛馬飢並喪也壁二星距南星去極八十度半霹靂五星距西星去極九十三度入危十五度雲雨四星距西北星去極九十五度入室五度天廄十星距西星去極四十九度半入室初度奎宿總敘奎有十六星一曰對豕一曰天豕一曰天庫一曰天邊金星也奎為天之武庫其下九尺為日月五星中道西南大星為之天豕為大將又為文命石氏曰奎主庫兵禁不時顧置將軍以顧之奎又主溝瀆故將陂池江河之事皆占于奎大星欲其明明則天下安芒角動搖國必用兵或曰有赦隋志云若帝淫佚政不平則奎有角角動則有兵不出年中或有溝瀆之事又曰奎中星明水大出日月食五星犯皆有凶奎南七星曰外屏以蔽天溷也占與天溷七星同天溷七星在屏南天之厠也不見則人不安移徙亦然天溷南一星曰土司空主水土之事大而黃明天下安客星入之多土功天下大疫軍南門一星在大將軍西南主出入搖動則軍行不見則兵亂閣道六星在王良前飛道也從紫宫至河神所乘也一曰主道理張衡云天子逰别宫之道一曰王良旗一曰紫宫旗亦所以為旌表而不欲搖動一星不具則輦道不通動則宫掖之內兵起附路一星在閣道南傍别道也備閣道之敗復而乘之也一曰大僕主禦風雨亦逰從之義也一曰占與閣道同王良五星在奎北居河中天子奉車御官也其四曰天駟旁一星曰王良亦曰天馬其星動為策馬故曰王良策馬亦曰王梁梁為天橋主禦風雨水道故或占津梁其星移主有兵亦曰馬病客星守之橋不通金火守皆兵憂前一星曰䇿王良御䇿主天子僕御在王良旁若移在馬後是謂䇿馬車騎滿野奎十六星距西南大星去極七十二度外屏七星距西星去極八十九度入奎宿八度半天溷七星距南星去極九十七度入奎宿三度土司空一星去極一百一十五度少入壁宿九度軍南門一星去極六十六度入奎十五度附路一星去極三十五度半入奎宿五度王良五星距西星去極三十七度入壁宿初度婁宿總敘婁三星曰天獄一曰密官一曰國市一曰天廟庫土星也主犧牲宗廟五祀苑牧故置天倉以飬之婁聚也又興兵發將有聚衆殺兵之事占之於婁其下九尺為日月五星中道星經曰婁天福祿車也萬物之所藏收也婁星明則郊祀得禮天子有福多子孫天下臣子忠孝暗小失色則反是動搖則有聚斂暗則有主執命者就聚則國不安又曰婁星明則六樂和不明則反是婁主音樂動則歡娛音樂大盛若其星直則國必有執主之命者若金火守之則宫苑之內兵起日月食宫內亂金木火土犯凶水犯吉孛入兵起月暈兩庫各退左更五星在婁東山虞主知山林澤藪之事亦主仁智右更五星在婁星西牧師也主官養牧牛馬亦主禮義金火守之山澤有兵其占兩更同兩更者秦爵名天倉六星在婁南舍榖所藏黃而大嵗熟西南三星曰天庾積厨粟之所也天將軍十二星在婁北主武兵中央大星天之大將也外小星吏士也大將星搖兵起大將出小星不具兵起婁三星距中星去極七十五度半左更五星距西南星去極七十六度半入婁宿四度半右更五星距東北星去極七十五度入宿十四度天倉六星距西北星去極一百四度半入奎宿十一度天庾三星距中大星去極一百二十五度半入婁宿五度天大將軍十二星距大星去極六十度半入婁宿四度胃宿總敘胃三星曰大然曰天中府曰天倉庫一曰密宫金星也胃者五榖之府天下之厨藏主倉廩入藏積萬物又主討捕誅殺葅醢之事其南九尺為日月五星中途胃星明則倉庫盈豐暗小則天下米貴倉庫空上下失位星亡則大兵起移徙則倉粟耗散就聚則米貴民流動則有轉輸之事芒角其旁星衆則粟聚小則粟散又云動有運事暗則凶荒若五星犯日月食孛後有災天廩四星在昴南一曰天廥張衡云主積蓄黍稷以供享祀春秋所謂御廩也天囷十三星在胃南倉廩之屬主給御糧也明而黃則嵗微變常色則不吉金火守之即災起大陵八星在胃北主陵墓明而大或中星多則天下多死喪或兵起天船九星在大陵北河居中一曰舟星主渡亦主水旱不在河中津河不通水泛溢中四星欲其均明則天下安否則兵若喪移徙亦然客彗出入為大水有兵大陵一星曰積尸明則人死如山張衡曰一名積廩積尸明而大或其傍星多則天下多死喪或兵起若不見而暗皆吉火守則天下大哭泣天船中一星曰積水主候水災廥古外切庫廄名胃三星距西南星去極六十度半天廩四星去極八十五度半入胃宿十二度天囷十三星距大星去極九十一度半入胃宿六度半大陵八星距大星去極五十四度入胃宿七度天船九星距大星去極五十四度半入胃宿十度積尸一星去極五十五度入胃宿四度積水一星去極五十三度入昴宿初度昴宿總敘昴七星曰旄頭一曰天吞一曰天獄一曰天厨一曰天路水星也昴為天耳目又為白衣聚胡星也主兵喪口舌奏對主獄事其下九尺為五星中道二星為天街隂陽之所昴大星欲其明明則訟獄平國無佞臣天下安不明刑罰濫佞臣得志天下凶其六星不欲明明則天下受誅罰邊兵多死星動則大臣下於獄天子信讒殺害忠良亦為白衣聚會明而數動則邊兵大起其大星動若跳躍而他皆不動則兵欲侵邊期一年不出一星不見為兵喪星明與大星等則天下大水七星皆明而黃則兵大起所以昴為兵之象也天之河一星在昴東皆黑星並主女人失福又曰天河主察山林妖變天隂五星畢柄西主從天子弋獵之臣預隂謀也不明則禁言漏泄天苑十六星在昴畢南如環狀天子之苑囿養禽獸之所在也主馬牛羊明則馬牛羊盈稀則死芻藁六星在苑西以供馬牛之食也一曰天積天子之藏府也星盛則嵗豐稔稀則貨財散張衡云不見則牛暴死火守之則火災起卷舌六星在昴北天讒之外主言語以知讒佞張衡云主樞機曲而靜則賢人用直而動則讒人得志卷舌移出漢則天下多佞言傍星繁則死人如嶽天讒一星在卷舌中主醫巫占與從官同礪石四星在五車北主磨礪鋒刃明則兵起如常則吉金火及客星守之兵動昴七星距西南星去極七十度天阿一星去極六十六度入胃宿十度月一星去極七十一度半入昴宿五度天隂五星距西星去極七十五度半入胃宿七度天苑十六星距東北星去極一百七度半入昴宿七度半芻藁六星距西行中星去極一百八度入婁宿十一度卷舌六星去極五十三度入昴宿初度天讒一星去極六十一度半入昴宿半度礪石四星距南第二星去極六十五度入昴宿六度畢宿總敘畢八星附耳一曰畢車主邊兵弋獵田逰之事一曰天耳一曰天口一曰虎口一曰天獨一曰天都主尉制四方一曰天空水星又曰天獄主司鬼方之動靜察姦謀以備外患故直衝地之陽以為邊方之候故附耳以察不詳又主街巷主隂雨天之雨師也其北上七尺為日月五星中道畢主山河以南中國地中國于四海內則在東南為陽昴之間為天街隂陽雨間之所分也畢為陽國昴為隂國畢左股大星曰天髙為邊將主掃妖凶通外域星光大則天下和有逺夷來貢失常改色則邊境亂國不寧耀芒則外國叛動搖則邊將有急一星不見則為喪為兵離徙則天下獄大亂就聚則令法酷不明則天下謀亂明而動則多雨附耳搖動則有國令角動則讒邪行兵大動明盛則邊兵交戰中國失勢移徙則有亂臣在主側附耳入畢口則天下有大變邊地尤甚五車五星三柱九星共十四星在畢東北五車主天子五兵張衡云天子兵舍也西北曰天庫主大白秦也次東北曰天獄主辰星燕趙也次東南星曰天倉主嵗星魯衛也中央星曰司空主鎮星楚也次西南星曰卿主火魏也五星有變各以其所主占之三柱一曰三泉一曰休一曰旗五星均明柱皆具即天下倉庫實不具其國絶食兵且起五車三柱有變各以其國占之三柱出外兵出柱入兵入柱出一月米貴三倍飢一年兩月米貴六倍飢二年出三月米貴十倍飢三年柱出不與天倉相近米榖運出千柱側立尤甚火守之天下旱金入守兵起水入月暈不爾有赦天潢五星在五車中主河梁濟渡之處不見則河梁不通咸池三星在五車西天潢南魚囿也金火犯之則有大災隋志云月五星天潢兵起道不通天下亂易政咸池明有龍隨死虎狼害人兵起天關閉芒角有兵五星守之貢人多死移徙若與五車合大將軍被甲參旗九星在參西五車之間天旗也明而稀則邊冦不動不然反是隋志云參旗一曰天旗一曰天弓主司弓弩之張候變禦難玉井西南九星曰九斿天子之旗也主邊兵進退金火守之兵亂起天苑之南十一星曰天園植果菜之所也曲而鈎則果菜熟不然則否畢八星距右股第一星去極七十五度天街二星距南星去極七十一度入昴宿十度附耳一星去極七十七度入畢宿三度天節八星距北星去極八十度半入畢宿三度諸王六星距西星去極七十度入畢宿三度天髙四星距東去極七十四度半入畢宿六度五車五星三柱九星距大星去極四十七度半入畢宿八度半天潢五星距西北星去極五十八度入畢宿十一度咸池三星距南星去極五十一度入畢宿十一度半天關一星去極七十一度半入觜宿初度參旗九星距南第一星大星去極八十七度入畢六度九斿九星距南星去極一百一十三度入畢十二度天園十一星去極一百二十四度入畢宿五度觜宿總敘觜宿三星曰觜觿白虎之守也為三軍之候行軍之藏府金星也主操旅收斂萬物色赤則為刀鉞斬刈之事一曰天貨主貨其北上三尺為日月五星中道內主梁外主巴漢此星明則天下大安五榖豐軍有儲移則君臣失位五星犯災生孛客星犯災兵起坐旗九星在司怪西北主别君臣尊卑之位明則國有禮暗則反是司怪四星在井鉞前候天地日月星辰禽獸蟲蛇草木之變與天髙占同觜三星距西南星去極八十二度半坐旗九星距南星去極六十度半入參宿八度司怪四星距西星去極七十一度入參宿六度半參宿總敘參七星伐三星曰參伐十星為虎身伐為尾觜為首共為白虎主西方一曰大辰一曰天市一曰鍾龍金星也亦曰鐵鉞主斬刈刑罰又為天獄主殺伐又為天尉主邊城九澤及鮮卑等國七星為七將軍其中三星橫列為衝主車理前二大星曰左右股為左右肩為左右前將軍後二大星一曰左右足右足為偏將軍左足為後將軍中三星為三將軍也七星觜舉邊兵其左肩觜三尺為日月五星中道七星皆明天下兵精暗小則將弱芒角大揮張赤揮旁豹則三軍駭動天子躬甲一日將出征搖動則邊候有急無光則國欲改軍參差不常則君任不忠臣有外謀大而動則大將執權天下易政就聚則大將誅細則天下兵不精移徙則大將逐所以各星皆不欲其動也金火來守則國易政兵起災生日月則田荒米貴土星犯災甚玉井四星在參西右下水象也屏二星在玉井南屏風客星入四足出大疾人亦多死不見則國內寢疾玉井東四星曰軍井軍之井也軍井未達將不言渴名取此也又曰主軍營之事天厠四星在屏東溷主天下疾病黃吉青赤白凶不見與屏同天屎一星在厠南色黃則吉他皆凶參十星距中星西第一星去極九十二度半玉井四星距西北星去極九十八度少入畢宿十一度半天屏二星距南星去極一百一十五度入畢宿十三度半軍井四星距西南星去極一百五度半入畢十四度天厠四星距西北星去極一百一十八度半入參宿二度屎一星去極一百一十五度入參宿三度半井宿總敘東井星一曰天府一曰東陵一曰天井一曰天關一曰天門一曰天渠一曰天亭一曰天候一曰天齊一曰天池水星也主水泉亦為天之南門日月五星貫之為中道又主酒食女主之象主諸帝滅三公之位為天之亭堆主水衡法令之所取平也三光行不由其中道為下無道雖輕之不得留之王者心正則井星正明則法度正號令明大盛則多風雨有大水暗中不正則國弱兵亂動搖變色則諸侯帝移徙則國亂君憂決水為災鉞一星附井口第一星主邊兵起主司淫奢而斬之不欲其明大大而明則鈇鉞用事兵起搖動芒角則大臣多死於法者星芒則天下大水又曰井為天子府暗芒角日月食五星犯逆大臣謀亂兵起中有六星不欲大明明則即火災南北兩河各三星分夾東井一曰天高天之闕門主關梁南河曰南戍一曰南宫一曰陽門一曰權星主火北河曰北戍一曰北宫一曰隂門一曰衡星主水兩戍之間三光之常戍道也河戍搖動中國兵起天樽三星在五諸候南主盛饘粥以給酒食之正也張衡云以給貧餒明則豐暗則荒或言暗吉五諸侯五星在井東北近北河主刺舉戒不虞又曰治隂陽察得失亦曰主帝心一曰帝師二曰帝友三曰三公四曰博士五曰太史又曰五大夫此五者常為帝定疑誼星明大潤澤則天下大治芒角則禍在其中張衡又曰赤則豐暗則荒積水一星在河北所以供酒用也不見為災又曰主候水災積薪在積水東以備庖厨之用明則人主康火守之大旱水府四星在井西南水官也占與水位同水位四星在東井主水衡又主㵼溢也故巫咸氏贊曰水位四星㵼溢流移流近河北則國沒為江河淮濟之積精也明大則水泛濫軍市十三星如錢狀在參東南天軍貨易之市客星入金火守之軍大飢野雞一星在軍中主變怪也以芒角動搖為兵災移出則諸侯兵起軍市西南星曰丈人丈人東二星曰子子東二星曰孫丈人主夀考之臣不見人臣不得通子與孫皆峙丈人之側相扶而居不見為災守常無咎闕丘三星南河東主象魏天子之雙闕諸候之兩觀金火守丘戰闕下狼一星在丘東南為野將殺略色有常不欲變動芒角而變色動搖盜賊作邊兵起人相食躁則人主不靜不居其宫馳騁天下張衡曰居非其處則人相食色黃白而明吉黑凶赤芒角兵起金火守之亦然弧矢九星在狼東南天弓也以備盜賊常向狼弧矢動搖不如常多盜賊明則兵大起狼弧張天下乖禮又曰天弓張天下盡兵主與臣相謀張衡云引滿則天下兵起老人一星在弧南一曰南極秋分之旦見于丙春分之夕沒于丁常以秋分候之明大則人主夀天下安寧不見則人主有憂井八星距西扇北第一星去極六十九度鉞一星去極六十九度少入參八度半北河三星距東大星去極六十一度半入井宿二十度南河三星距東大星去極八十三度半入井宿二十一度天樽三星距西星去極六十八度入井宿十六度五諸侯五星距西星去極五十六度半入井宿六度半積水一星去極五十四度半入井宿十八度積薪一星去極六十五度半入井宿二十七度水府四星距西星去極七十六度半入井宿七度半水位四星距西星去極七十三度半入井宿十八度四瀆四星距西南星去極八十六度入井宿二度軍市十三星距西北星去極一百七度半入井宿初度野雞一星去極一百九度半入井宿四度半丈人二星距西星去極一百二十八度入參宿四度子二星距西星去極一百二十八度入參宿九度孫二星距西星去極一百二十五度入井宿六度闕丘二星距大星去極九十一度少入井宿十五度狼一星去極一百七度半入井宿十度弧矢九星去極一百一十四度入井宿十五度老人一星去極一百四十三度入井宿三度鬼宿總敘鬼宿四星曰輿鬼一曰天目主視明察姦偽朱雀頭眼一曰天鐵鎖主誅殺一曰天廟主祀事一曰天松一曰天匱一曰天壙主疾病死喪土星也其中為日月五星中道東北星主積榖東南星主積兵西南星主積布帛西北星主積金玉有變則占其所主其中央色白如粉潔者謂之積尸氣一曰天尸主死喪祠祀一曰鐵鎖主刑罰主誅斬鬼星不欲其明明則鬼害人多病甘氏云積尸搖動失色則疾病鬼哭人荒軒轅西四星曰爟亦曰烽爟主烽火備警急占以不明安靜明大甚則邊警急搖動芒角亦然又曰明吉暗凶天狗七星在鬼西南狼之北橫河中以守賊也移徙則兵起金火犯之人相食外厨六星在栁南天子之外厨也占與天厨同弧南六星為天社在老人東南以栁直明且吉隋志云共王之子勾龍能平水土故祀以配社其精為星外厨南一星曰天紀主知禽獸金火守之禽獸多死鬼四星距西南星去極六十九度半爟四星距西北星去極六十度半入井宿二十九度天狗七星距西星去極一百二度入井宿二十二度外厨六星距大星去極九十二度半入鬼宿二度天社六星距西南星去極一百三十四度入井宿十二度天紀一星去極一百一度半入栁宿三度栁宿總敘栁八星為朱鳥喙一曰天相一曰注亦作咮一曰天將軍一曰天厨主御膳酒食倉庫和鼎以享宗廟主匠主草木星也一曰土星其北六尺為日月五星中道其星欲明明則大臣鎮重人豐酒食王者安厨膳其不明則王失政宫中不安星直則天下謀伐其主就聚則兵鬬國門又云主木功酒旗在軒轅右角之南官酒之旗也主享宴飲食五星守酒旗天下大酺有酒食物財之事賜爵及宗室栁八星距西第三星去極八十二度半酒旗三星距西北星去極七十七度入栁宿十四度星宿總敘星七星曰天都一曰負宫一曰天逆宴為赤帝府於午主衣裳黼黻文繡是為朱鳥之鎮周禮鳥旗七旒以象鶉火謂七星也一曰天御一曰汪候一曰津橋后妃嬪御之位亦為賢士又為絳亭主急兵主盜賊水星也一曰火星其星北上十尺為日月五星中道七星明大則王道行人主昌暗小則賢良不用天下空賢士遁動搖則兵起不明則執政不平天子疾病離徙則天下易政室家離散芒動則后妃賢人憂若金水來守之女主惡也軒轅為權太微為衡月五星守犯者如衡占內平四星在中台南爟之北平罪之官也明則刑罰平暗則否酒旗南三星曰天相丞相之象也其占與相星同天稷五星在七星南主農政也取平百榖為號明大則嵗大豐不明則歉不見則人相食星七星距大星去極九十六度軒轅十七星距大星去極七十五度入張宿二度內平四星距西星去極五十二度入張宿六度天相三星距北星去極九十五度入星宿六度天稷五星距大星去極一百三十七度入栁宿十三度張宿總敘張六星為天府一曰天昌實為朱鳥之象火星也主天廟明堂御史之位金玉珠寶宗廟所用之物天子內官之服逺方入貢之庫主天厨飲食賞賚之事又主長養萬物其北十三尺為日月五星中道張宿明大則人主治民物阜蕃五禮修厨養具暗小則禮失天子多疾病少子孫移徙則天下有逆民就聚則兵起失色則宗廟不安明堂禮廢動搖則有賜與之令若金火守之亦為兵象日食則禮虧月昏則其地旱榖鹽貴月食大潦魚行人道火孛犯兵起土水犯國不寧張南十四星曰天廟天子祖廟也客星守之祠官有憂其占與虛梁同長垣四星在少微南主界域及外國火守之邊兵入中國太白入之九卿謀反少微四星在太微西南北列士大夫之位亦名處士亦天子副主或曰博士官一曰主衛掖門南第一星為處士第二星為議士第三星為博士第四星為大夫明大而黃則賢士舉用五星犯守之處士女憂宰相易張六星距西第二星去極一百二度半天廟十四星距西北星去極一百十三度半入栁宿十三度長垣四星去極七十六度入張宿十四度少微四星距東南大星去極六十五度半入張宿十五度半翼宿總敘翼二十有二星曰化宫一曰天郗市一曰天除一曰天旗土星也是為朱雀之翼為天之樂府主和五音調六律五樂八佾以御天宫實為南宫之羽儀文物聲名之所豐茂主三公化道文籍及蠻夷逺客負海之賔排優狄鞮戲娛之事其北上十有三尺為日月五星中道其星光明有敘則君明臣賢禮樂興天下平四夷服星暗大小失次則帝主失禮王道衰微動搖則有蠻夷之使來就聚則天下相伐徙移則三公廢離徙則民流失色則日月五星亂行星亡則化道不行文籍壞滅明大芒動則王者用兵征伐四方若使五星孛流客犯大凶又東甌五星在翼之南蠻夷是也張衡云主東越宰南越三夷金守之其地有兵芒角移動兵內叛翼二十二星距中央西第二星去極一百四度東甌五星距西南星去極一百二十九度入張宿七度軫宿總敘軫四星曰天車主車騎任載盜賊戰伐之事亦為喪車􅀈輴之象主死喪四星為天府冢宰之官主察殃咎知凶災水星也主風其右星北上十三尺為日月五星中道軫東一小星曰左轄西一小星曰右轄左轄主同姓諸侯右轄主異姓諸侯軫星明大則法駕備車馬用移徙則天子憂就聚則兵起動搖則車騎動轄星欲其近軫去軫近則上下和睦逺則君臣相疑七寸以上為近一尺以上為逺軫欲小而明不欲大而明小而明則國祚安大明南與四星等則兵大起微暗則諸侯有憂星芒則天下傾左右轄不見國有大憂長沙二星在軫之中主夀命也長沙明則人夀長子孫盛軍門二黃星在西天子六軍之門主營猴豹尾威旗占以移其處為道不通土司空四黃星在軍門南主土功巫咸云金火犯之天下田不得耕女不得織隋志一曰司徒主界域青丘七黑星在軫東南主東方三韓之國占與東甌同甌南三十二星名器府主樂器之府也明則樂器調理暗有咎軫四星距西北星去極一百三度半右轄星去極一百一十度半入翼宿十六度半左轄星去極一百一度半入軫宿五度軍門二星距西南星去極一百十度半入軫宿十三度土司空四星距西南星去極一百二十度入翼宿十四度青丘七星距西北星去極一百二十四度半入軫宿五度器府三十二星去極一百三十七度半入翼宿八度半二十八宿總括蒼龍之角左刑右兵亢為朝廷疾病氐為宫室妃嬪房為布政之官上下分相將之位心為天王之位前後别大庶之名尾主君臣亦為后宫之府箕為嬪御亦主口舌之爭南斗為宰相而受爵祿牽牛主道路而作犧牲女作布帛之製虛為禱祀之稱危主宗廟營造室為宫室土功壁為文章圖府奎主兵戎溝瀆婁為天獄苑牧胃為倉廩五榖昴主邊主又為喪獄畢弋獵而邊兵觜行軍之葆旅參掌行殺伐井當水府鬼主祠祀死喪栁為庖厨祭具星為文繡之羽衣張作珍寶之衣物翼為娛樂以徘徊軫主軍騎而風雨鈎鈴有管鑰之稱神宫為解衣之所離宫乃天子之别宫墳墓即兆域之所處附耳聽以得失井鉞掌之誅戮東方雜座四十二座平道主除道路途轍天田乃躬耕之田野周鼎神器也為運祚而主流亡攝提魁罡也伺禨祥而建時節天門為朝聘待客之所居平星主執法平刑之典獄庫樓為天庫以藏兵陽門主險隘而逺戍南門天子之外門守兵禁備戎之處亢池乃舟楫津渡大角為紀綱棟梁帝席宴樂獻酬梗河矛鋒兵喪招搖矛楯畨戎玄戈邊僥興兵折威以斷軍獄頡頏考察囚情天乳飴􅀈之事天車兵革之軍騎官主宿衛而衛王者騎陳為統攝而帥萬夫車騎主部陳行列天輻主鸞駕乘輿賤人之牢名貫索鍵閉主管鑰以掌開閉七公主刑法而别善惡西咸以防淫佚日為太陽之表積卒為衛士而掃除不祥從官醫巫而病疾祝禱罰星金作贖刑東咸亦如西咸天紀理獄訟天江主太隂女牀御女侍從傅説巫祝神靈魚主雲雨風氣龜贊神明吉凶天鑰主閉關農丈人稼穡老農粳星以給豢養杵星以給庖舂北方雜座五十二座河鼓軍之鈇鉞拒南亦名三武二旗設險以知敵謀建為謀事亦名旗鼓織女天女也瓜果絲綿漸臺晷漏也吹灰律吕輦道嬉逰之路天辨市官之主奚仲車正天淵水府天雞主伺候狗星守主禦狗國為烏桓獫狁之屬鱉星主水族魚蟲之物天桴主桴鼓漏刻天津主四瀆津梁離珠后宫之府藏羅堰瀦畜之池塘九坎溝渠水旱天田壟畝農桑匏敗二瓜瓜果園囿十二諸國列土之王離瑜桂衣玉飾哭星哭泣死喪司祿兮官祿年德司危兮臺榭安危掌生算者為司命主過失者為司非人星主萬民亦為巡夜車府為客館亦其官也壘壁天軍營壘疊城鬼方北夷敗臼敗亡災咎流移土公吏設備而主土杵與臼給軍而舂糧造父御馬也亦其官也騰蛇水蟲也風雨北方治天子室宫者為蓋屋主陵廟禱祀者為虛梁綱為戈綱武帳泣者墳墓死喪天錢軍之府藏師門蕃落夷荒雷電霹靂雲雨各以其事所主羽林衛之天軍斧鉞行誅而用戮王良車馬也御車之官天廄馬官也驛遞之廄土公主營造而起土也西方雜座四十六座附路乃閣道之便路天溷乃養豢之穢場外屏所以遮天溷而沮臭穢天倉所以待邦用而藏五榖土司空乃功利之官鈇鑕乃芟刈之器左更主仁智而為山虞右更為司牧而主禮義軍之南門禁出入以防姦天大將軍為用兵而主武御廩之處為天廩積榖之所為天庾隂私濳謀兮天隂陵墓死喪兮大陵積尸陵中之墓天河察候山林積水候水之災異天船主舟楫之津芻藁天園主給粢盛天苑兮收飬禽獸天園兮園囿蔬珍月星后臣之别天街夷夏之分礪石礪百工之器天讒主醫巫之羣言語樞機兮卷舌持節奉使兮天節參旗天子之兵旗天髙觀雲之臺榭諸王為王室之蕃屏車柱乃天子之車舍天潢津渡河梁咸池陂澤魚鱉珠口傳驛也逺方通俗九斿咸旗也威防不虞玉井主水泉而給厨用軍井給師旅而奏軍營天屏陳擁天厠天厠積穢溷圚子孫主孝愛而侍老者丈人主夀考而哀孤煢座旗為旌表尊卑天關主關防邊境司怪史臣也語言災變水府水官也隄防波湧南方雜座三十九座四瀆江河淮濟水位主水奚疑積水供酒食之正積薪給烹飪之為南北二河所以分諸夏而定夷貊闕丘兩觀所以象布魏而别尊卑爟星烽火也四時變火天樽饘粥也以給貧羸五諸侯決疑斷獄弧與矢備盜防私軍市主天軍貨易野雞備變怪不虞天狗守禦之良蓄天狼侵掠之凶徒天社土地之主老人夀考之符三台星列抵太微為三公宣符開德主烹宰者名外厨為農正者號天稷天紀知禽獸之嵗齒天旗主饗宴之酒食天相宰相也朝服之制天廟祖廟也祭祀所值軒轅為權后妃雷電長垣城邑無界不防少微師保也無微不諫內平平罪之官天尊貴戚之宦東甌為南越蠻夷之區軍門乃天子軍門之辨明堂玉堂也布政垂裳靈臺觀臺也仰觀候變土司空九土之界域亦人民風土之所宜器府主八音之樂伎長沙主夀命以延期青丘為南方蠻夷之國進賢者舉逸卿相之為天文總論晉天文志曰張衡云文曜麗乎天其動者有七日月五星是也日者陽精之宗月者隂精之宗五星五行之精衆星布列體生於地精成於天列居錯峙各有攸屬在野象務在朝象官在人象神其以神差有五列焉是為三十五名一居中央謂之北斗四布于方各七為二十八舍日月運行歷示吉凶五緯躔次用告禍福中外之官常明者百有二十四可名者三百二十為星二千五百微星之數蓋萬一千五百二十庶物蠢蠢咸得繫命不然何得總而理諸後武帝時太史令陳卓總甘石巫咸三家所著星圖大凡二百八十三官一千四百六十四星以為定今略其昭昭者以備天官云宋中興天文志總論曰甘石巫咸三家後代所宗也顧或不深考以故三垣大角之列衛二十八舍內官外官之分𨽻不無異同今於三家參諸説考定二百九十座所以不知者闕如也蓋諸星有以一星為一座者有以二三十星為一座者有相為比附者有相比而不附者杠附華蓋凡十八星為一座衡附庫樓凡二十九星為一座也鉞不附井耳不附畢粳不附箕長沙不附軫鈎鈴鍵閉不附房則以屬吏自為官故也矢得以附弧臼不得以附杵以弧矢一人司之杵臼二人司之故也野雞不附軍市雞自守其所司也南門不附庫樓南門不但為庫樓門也他如積水不附天船積尸不附大陵天讒不附卷舌咸池天潢三淵不附五車石氏甘氏皆有其辨不可臆説也若夫稱名取類傳記錯見則又有不可槩舉者北極為北辰參為大辰而大火亦曰大辰宋大辰之墟是也見左氏昭十七年孫炎曰龍星明者以為時刻故曰大辰星在中最明時刻主焉玄枵亦曰天黿是也見國語武王伐商星在天黿昭十九年疏天黿玄枵别名也娵訾亦曰豕韋嵗在豕韋是也見襄十八年疏豕韋亦名娵訾也鶉尾亦曰鳥帑以害鳥帑是也見襄二十八年禆竈曰嵗棄其次而旅於明年之次以害鳥帑注南為朱鳥鳥尾曰帑疏曰人妻子為帑鳥尾曰帑妻子為人後鳥尾亦鳥之後故俱以帑為言也氐謂之天根見爾雅天根氐也鄭璞曰角亢下繫於氐猶木之有根國語曰天根見而水涸也室謂之定見爾雅云營室謂之定郭璞曰定正也作宫室以營室中為正詩定之方中作於楚宫昴謂之留見史記索隱曰留昴也而毛傳亦以留為昴也畢謂之濁見爾雅濁謂之畢也柳謂之咮丁救反見襄九年咮為鶉火疏曰柳謂之咮咮鳥口也若斯名類昉於堯典詳於爾雅左氏國語諸書而所入之度則未悉也若夫二十八舍諸言度分亦或差殊斗井度視諸舍為闊參僅一度古昏旦至觀弧建為定亦由所見而著之其度近世王奕所述十二次二十八度有可考焉按史志言三家所考三垣大角之列衛二十八舍內外官之分𨽻不無異同今按歷代天文志惟宋兩朝及中興志與隋丹元子步天歌能言諸星之分𨽻然大角一星兩朝志以為屬角庫樓十星丹元子以為屬角而兩朝志以為屬軫其為異同大槩若此蓋自唐開元中一行所造渾儀其所測宿度已與舊經異而宋太平興國中渾儀所測又與唐異所爭或一二度或三五度以管窺天豈能無誤於是此以為軫彼以為角甲以為氐乙以為房所差者常在禆鄰之次舍則亦不過三五度間耳天道幽逺術家各持一説固未有以訂其是非也至如南斗六星即斗牛之斗其分野反在北方北斗天樞在張宿十度其分野反在南方其理有不可究詰者當伺知星者而質之東方蒼龍七宿角二星度十二亢四星度十六氐四星度十六房四星五度心三星五度尾九星度十七箕四星度十二北方玄武七宿斗六星四度二十牛六星七度女四星度半十一虛二星芬十度危三星度十八室二星度十七壁二星十度西方白虎七宿奎十六星半十七度婁三星度十二胃三星度半十四昴七星度十一畢八星度十六觜三星一度參十星九度南方朱雀七宿井八星度三十鬼五星三度栁八星度十四星七星七度張六星度十九翼二十二星十九度軫四星度半十八天本無度以二十八宿為度然則二十八宿果有度耶不過因日行躔度而假星象之著明者以計其度耳故其度之多者如井至三十三度少者如觜止一度要亦以日躔適與各宿相值者分之故其度之多寡於是乎生也但井三十三度或以為三十一度觜一度或增為度半或減為半度強是則古今論天之度數者若此紛紜不齊又何怪乎厯之無定法也况經星一度統地一千九百餘里占分野者豈易言哉天度類考天本無度推厯者無以寓其數因日之行一晝夜所躔濶狹強名曰度蓋日之行也三百六十五度之外又行四分日之一以一年而周于天焉以一日所行為一度故分為三百六十五度四分度之一范蔚宗謂日之所行在天成度在厯成日是也然天體沖漠度頗難别必有物記之然後可窺而數于是以富度之星記之度如傘撩當度謂正傘撩上者是也循黃道日之行一期其當者止二十八宿而已今所謂距度星是也渾天奏議亦曰度不可見可見者星也二十八宿亦未始有度作厯者𨽻天之度于二十八宿用以記日月所躔而已二十八宿之度濶狹不齊者蓋日之所躔或多或寡適當其星者凡二十八故度之多寡于是生焉如井斗之間非無星也然日躔不相當故其度不得不濶觜鬼之旁非無星也然日躔一二日適與之相當故度不得不狹而其得度濶狹又非舉一宿全體盡占此度也如南斗六星舉全體言合距杓星為度今厯家距魁第四星為度蓋杓二星不當日之度而魁第四星當日之度也綜之古之造厯假設是法以步日躔耳南北極星按極星北極者北辰也天如水車北辰乃軸處水車動而軸未嘗動北辰間有五星北辰則指五星中之一星邊天壤而言緣人要指此為極不可無記認故就辰傍一小星指之為辰謂之極星即第三星所謂太乙也北極則兼連五星而言南極與北極髙下隱見不同北辰髙于地者三十六度南極下于地者三十六度故北極之下三十六度常見南極之上三十六度常沒不見天之運有常度而無停機南北極則其所管轄處如輪藏之心藏在外面動而心則不動也角赤十二度黃十三度亢赤九度度黃十九氐赤十六度大黃十五度房赤六度黃五度心赤六度黃四度尾赤十九度黃十七度箕赤十一度黃十度少斗赤二十五度黃二十二度牛赤七度大黃七度女赤十一度少黃十一度虛赤九度半少強黃十度危赤十六度大黃十七度室赤十七度少黃十七度壁赤九度少黃九度奎赤十六度半黃十七度婁赤十二度半黃十二度胃赤十五度大黃十四度昴赤十一度黃十一度畢赤十七度半黃十六度觜赤一度黃一度參赤十度少黃九度井赤三十四度黃三十度鬼赤二度大黃二度柳赤十四度少黃十四度星赤七度大黃六度張赤十七度大黃十八度翼赤十九度少黃十九度軫赤十七度大黃十六度赤道分南北之中黃道出入於赤道之內外赤道橫而黃道斜斜長於橫故黃道為之增赤道居中黃道旁出旁狹於中故黃道為之減蓋亦自然之數非人能增損之也雖然赤黃二道本皆天度但以赤分天中故為天度日行黃道故為日度日行天之內天運日之外外則有餘內則不足孰非自然之勢哉赤道黃道者占天之法以二十八宿為綱維分列四方南北去極各九十有一度有竒南低而北昻去地各三十六度一定不易者名之曰赤道以日躔半在赤道內半在赤道外出入內外極逺者皆有二十四度以其行赤道之中者名之曰黃道凡五緯皆隨日由黃道而行惟月之行有九道四時交會歸極于黃道而轉變焉要之黃赤之色特借之别算位耳厯家以為實有黃赤九道繆矣氐一在辰氐二過卯尾二在卯尾三在寅斗三在寅斗四過丑女一在丑女二過子危十二在子十三過亥奎一在亥奎二過戌胃二在戌胃三過酉畢六在酉畢七過申井七在申井八過未二十八宿萬古不移所以定天之體而分十二宫也日一月而遍一宫月一月而遍十二宫而復追及於日而成一月也經星過宫度數古今不同即以十二宫言之辰宫舊謂終于氐四今終氐一卯舊終尾九今尾二寅舊終斗十一今斗三丑舊終女七今女一子舊終危十五今危十二亥舊終奎四今奎一戌舊終胃六今胃二酉舊終畢十一今畢六申舊終井十五今井七未舊終栁八今栁三午舊終張十七今張十四已舊終軫十一今終軫九是差之多者至七度少亦不下二度而各家之差又不可勝言矣古今天度一也所分宫度其差若此欲推步之不差也其可得哉故併存之以備考二十八宿逐月昏中位次角亢二宿為五月昏星正月在寅二月在卯三月辰四月巳五月午六月未七月申八月酉九月戌十月亥十一月子十二月丑氐房心三宿為六月昏星正月在丑至十二月在子尾箕二宿為七月昏星正月在子至十二月在亥斗牛二宿為八月昏星正月在亥至十二月在戌女虛危三宿為九月昏星正月正戌至十二月在酉室壁二宿為十月昏星正月在酉至十二月在申奎婁二宿為十一月昏星正月在申至十二月在未胃昴畢三宿為十二月昏星正月在未至十二月在午觜參二宿為正月昏星正月在午至十二月在巳井鬼二宿為二月昏星正月在巳至十二月在辰栁星張三宿為三月昏星正月在辰至十二月在卯翼軫二宿為四月昏星正月在卯至十二月在寅總記古今冬至日在宿度大明萬厯二年嵗次甲戌仲冬三十日庚子辰正二刻冬至日在箕四度元十八年辛巳冬至日在箕九度昏室中宋延祐冬至日在箕八度昏壁中去作月令時一千七百餘年月令冬至日在斗二十二度昏奎中去堯時一千九百餘年堯時冬至日在虛七度昏昴中二十八宿上而在天則有度數之多寡下而在地則有分野之盈縮在人則有庶類之司在物則有禽獸之肖在星則有列位之配在位則有分金之類角二星十三度少為權為賊將在氣為木在肖為蛟亢四星九度為賊病為蠱毒在氣為金在肖為龍其餘氣為暗金氐四星十六度半在氣為土在肖為貉房四星五度半在氣為日在肖為兔心三星五度為營室在氣為月在肖為狐尾九星十九度為不和為賊盜在氣為火在肖為虎箕四星十度為口舌為公訟在氣為水在肖為豹此七宿三十星七十五度配東方蒼龍之位斗六宿二十四度為文職為科名在氣為木在肖為獬牛六星七度為僧道在氣為金在肖為牛其餘地殺也為暗金女四星十一度半為巧藝為淫亂在氣為土在肖為蝠虛二星九度半為哭泣為喪死在氣為日在肖為鼠危三星十八度為蓋屋為離宫在氣為月在肖為燕室二星十七度為廟食為王侯在氣為火在肖為豬壁二星十度為文章為祕府在氣為水在肖為㺄此七宿二十五星九十八度四分度之一配北方玄武之位奎十六星十度半為文藻為書府在氣為木在肖為狼婁三星十三度為聚衆在氣為金在肖為狗其餘氣為暗金胃三星十四度半為倉庫為商賈在氣為土在肖為雉昴七星十一度為白衣為儒林在氣為日在肖為雞畢八星十六度為獵弋為逰田在氣為月在肖為烏觜三星一度為葆旅為行商在氣為火在肖為猴參十星九度為斬艾在氣為水在肖為猿此七宿五十星八十一度配西方白虎之位井八星三十一度為水患為行舟在氣為木在肖為犴鬼五星三度為淫辭為妖孽在氣為金在肖為羊其餘氣為暗金柳八星十四度為木果為器皿在氣為土在肖為獐星七星七度為吉事在氣為日在肖為馬張六星十九度為觴客在氣為火在肖為蛇軫四星十八度半為車服為警蹕在氣為水在肖為蚓此七宿六十星一百一十二度配南方朱雀之位按二十八宿各分列四方而四方七宿各分列七政其來尚矣然列宿各分屬諸禽則莫知其所自也氣相貫通天之于物誠有然者但所肖之物即此以充其類是亦博物之一端而通神明類物情則又自有與天通者在矣二十八宿度總論宋中興天文志王奕按自古言天者皆曰周天三百六十五度四分度之一何從而知之也曰天本無度因日之行一晝夜所躔濶狹強名曰度蓋日之行也三百六十五日之外又行四分度之一以一年而周於天焉以一日所行為一度故分為三百六十五度四分度之一范蔚宗謂日之所行在天成度在厯成日是也曰天固有其度而二十八宿亦各有度何從而定之也曰二十八宿亦未始有度也天體沖漠雖分為三百六十五度然其度難别也故作厯者𨽻其度於二十八宿用以紀日月所躔而已蓋天之有度也猶地之有里也二十八宿所分之度猶九州列縣所占之里也二十八宿各有其度則日之行於天也孟春在某星幾度仲春在某星幾度日躔可得而名也九州列縣各有其里則人之行於地也某日至某州幾里某日至某縣幾里驛可得而計也此星度所由起也曰二十八宿之度或闊狹何也曰日之所躔偶與此宿相當此闊狹於是分也故説渾天者曰日之所躔或多或寡適當其星者凡二十八故度之多寡於是生焉井斗之舍非無星也然不與日躔相當故其度不得不闊也觜鬼之傍非無星也然與日躔相當故其度不得不狹也夫其得度闊狹非舉一宿全體盡占此度也南斗六星也舉全體而言之合距杓星為度而今歷家距魁第四星為度杓二星則入於箕牽午六星也舉全體言之合距西二星為度今厯家距中二星為度而西星則入於斗虛二星也舉全體言之合距北星為度而今厯家距南星為度北星則入於牽牛蓋南斗六星之中杓二星不當日之度而魁第四星當度故距於魁而得二十六度牽牛六星之中西星不當日之度而中二星當度故牽牛距魁而得六度虛二星之中北一星不當日之度而南一星當度故虛距南星而得十度古之造厯假設是法以步日躔或者不察謂二十八宿本有其度又見其宿得幾度遂謂舉一宿而全星在焉則又非矣又按唐志一行所謂北星舊圖入虛今側在須女九度危北星舊圖入危今側在虛六度半又奎誤距以西大星故壁損二度今復距西南大星即奎壁各得本度又柳誤距以第四星今復用第三星張中央四星為朱鳥嗉外二星為翼北距以翼而距以膺故張增二度半七星減二度半今復以膺為距則七星張各得半度吳興沈氏曰二十八宿當度故立以為宿前世測候每或改變如唐書測得畢十有七度半觜只有半度此皆繆説也星既不當度自不當為宿次是渾儀度距踈密不等耳凡二十八宿度數皆以赤道為法推黃道不合度者蓋黃道有斜有直故度數與赤道不等即復以當度星為宿惟虛道未有竒數自是日之餘分厯家取於斗分者此也餘宿則不然沈氏筆談曰豫編校昭文書時預詳定渾天儀官長問豫二十八宿多者三十三度少者止一度如何不均何也豫對曰天本無度推厯者無以寓其數乃以日所行分天為三百六十五度有竒曰平行三百六十五日有餘而一期天故以一日為一度也既分之必有物記之然後可窺而數於是以當度之星記之循黃道日之所行一期當者止二十八宿星而已度如傘撩當度謂正當傘撩上者故車二十八弓以象二十八宿則如渾儀奏議所謂度不可見可見者星也日月五星之所由有星焉當度之盡者凡二十有八謂之舍舍所以挈度所以生數也今所謂距度星者是也非不欲均也黃道所由當度之星止有此而已按中興志所載王奕之説即沈括之説也王沈二公不知其孰先孰後孰倡孰襲然王説詳而明沈説簡而當昔者武王伐殷訪問箕子以天道箕子陳洪範九疇四曰協用五紀厯法備焉按天官書曰斗為帝運于中央臨制四鄉分隂陽建四時均五行移節度定諸紀皆繫於斗又按古厯書曰玉衡杓建天之綱也日月初躔冬至日在牽牛合朔建星星之紀綱紀之交以原始也是故冬至天日交會曰周嵗古者步戌為嵗説文曰嵗從步從戌杓為斗端北斗尾三星措辰中角十度辰為龍故為龍角以冬至日躔星紀牛初加戌中則斗綱之端杓連貫營室亥織女子之紀指牽牛之初元辰星紀又自牛初連貫平星角元辰斗杓前後各九十一度此之謂杓攜龍角攜連也有畨手左右連貫之義玉衡斗中北斗第五星在巽中軫十一度與乾中奎五相值唐志自乾攜巽為天綱是也南斗十二在艮建星臨之冬至牛初加戌中則玉衡當斗艮中相距元辰乾綱巽衡左右各九十一度此之謂衡殷南斗殷中也兼有平分之義魁為斗首北斗首四星當戌中婁四與辰中角十斗杓相值為首尾參星在申漢書參三星外四星為實沈於辰在申冬至牛初加戌中則斗魁在未天綱乾在坤馬藉申中參宿如首伏枕然此之謂魁枕參首其去元辰杓魁亦各九十一度是則天綱星紀交會之本始聖人原始造設履端舉正歸邪以紀嵗昏杓旦魁夜衡以紀月中星步戌以紀日氣節初中以紀星辰九道隂陽以紀厯數五紀協用而其為彌綸贊參之道不能外矣十二辰乃十二月斗綱所指之地也斗綱所指之辰即一月元氣所在正月指寅二月指卯三月指辰四月指巳五月指午六月指未七月指申八月指酉九月指戌十月指亥十一月指子十二月指丑謂之月建天之元氣無形可見觀斗綱所指之辰即可知矣斗有七星第一曰魁第五曰衡第七曰杓此三星謂之斗綱假如建寅之月昏則杓指寅夜則衡指寅平旦魁指寅他月倣此天樞主秦天璇主楚天璣主齊天權主吳天衡主燕闓陽主趙瑶光主宋玄戈主代招搖主周天樞北斗一星即貪狼也卦配艮丙禽位天任門應生門地分秦分故秦隴之俗多尚節輕死好義勇敢悍戾多忠烈之氣有剛毅之才天璇北斗二星巨門也卦配巽辛禽位天輔門應杜門地分楚分故荆楚之俗多尚貨賂重商賈輕浮多詐少質實之風天璣北斗三星祿存也卦配乾甲禽位天心門應開門地分齊分故淄清之俗多尚文章重祿仕剛毅明達有禮樂之風天權北斗四星文曲也卦配離壬禽位天英門應景門地分吳分故閩浙之俗多逰蕩少貞烈尚浮繁詞藻少忠朴之風有淫慝之意天衡北斗五星即亷貞也卦配震庚禽位天沖門應傷門地分燕分故幽燕之俗多忠武尚信義儉約質實有清節之風無戾道之習闓陽北斗武曲星也卦配兊丁禽位天柱門應驚門地分趙分故山東之俗多英豪尚攻戰果敢驍勇有死忠輕己之心無姦詐欺人之習瑶光北斗七星破軍也卦配坎癸禽位天蓬門應休門地分宋分故宋地多武節尚忠義忠厚誠實有明達朴忠之風少浮靡奢華之習招搖北斗九星左輔右弼也卦配坤乙禽位天芮天禽門應死門地分周壤故河南三河之俗多忠良少姦詐然美惡亦相半文武兼資邵子曰天渾渾於上而不可測也故觀斗數以占天也斗之所建天之行也又曰夏則日隨斗而北冬則日隨斗而南故天地交而寒暑和而物乃生也斗一南而萬物生一北而萬物死日一北而萬物生一南而萬物死斗日互行而成嵗功也斗隨天而左旋故一日而進一度日退天而右轉故一日而不及天一度斗日一周而成一嵗也圖書編卷十七
