  - {type: page-break, offset: 0, content: '', id: KR3k0050_WYG_017-1a, image: WYG0969/WYG0969-0074a.png}
body:
  text: 圖書編卷十七明章潢撰二十八宿總敘天以一氣周流無端倪也謂天無體以二十八宿為體信然矣列宿果有所謂度所謂道哉日月五星之行與列宿相值由北至南而縱分之故曰度由東至西而橫計之故曰道度也道也皆強名耳是故二十八宿者天之經星也如角亢氐房心尾箕東方七宿也北則斗牛女虛危室壁西則奎婁胃昴畢觜參南則井鬼栁星張翼軫厯家候昏旦中星以為節候之準故堯典曰厯象日月星辰如日中星鳥日永星火宵中星虛日短星昴指此也惟其在天一定不易故謂之為經而七政者其緯耳其天體所由名乎列之為十二次而玄枵陬訾降婁大梁實沈鶉首鶉火鶉尾夀星大火析木星紀所由名凡列國分野皆定於兹焉别之為四方而蒼龍朱雀白虎玄武所由名凡四時節氣皆準於兹焉然而各方七宿又分之以七政如角之木亢之金氐之土與房日心月尾火箕水各宿所分皆然若以為星家之説不可盡信而其説未嘗不驗其亦有所自乎觀嚴子陵動客星之占陳仲弓應德星之聚雖匹夫之微且與天象相關是又不特星隕如雨而周替彗長竟天而秦亡驗諸國君為然也至分為二十八禽如角木蛟亢金龍之類則有不可得而知者况天道髙逺未易言也奎壁號文章之府斗牛分吳楚之墟箕畢以候風雨房心以候明堂軫主樂昴主胡其占候之術愈窈𡨕愈不可測矣獨考中星以欽若昊天敬授人時君子其敢忽諸角宿總敘角二星十二度為主造化萬物布君之威信謂之天關其門天門也其內天庭也故黃道經其中七曜之所行也其星明則太平芒動則國不寧日食右角國不寧月食左角天下道斷金火犯有戰敵金守之大將持政左角近天田為理主刑其南為太陽道五星犯之為旱右將為將主兵其北為太隂道五星犯之為水蓋天三門猶房之四表也左右間二星曰平道為天子八達之衢明正則吉動搖則法駕有虞天田主天子畿內封疆金守之主兵火守之主旱水守之主潦平道西一星曰進賢在太微宫東明則賢者在位暗則在野又曰主卿相舉逸才周鼎三星在攝提西國之神器不見或移徙則運祚不寧天門二黑星在平星北角之南主天之門為朝聘待客之所明則四方歸化不見兵革起邪佞生平星二星在庫樓北平天下之法獄廷尉之象也庫樓十星其六大星為庫南四星為樓在角南一曰天庫兵車之府也傍十五星三三而聚者柱也中央四小星衡也主陳兵其占曰庫中心不見兵四合無星則下臣謀上明而動搖則兵出四方盡不見則國無君庫樓東北二星曰陽門主守隘塞也南門二星在庫樓南天之外門也主守兵明則外方入貢暗則四境叛客星守之主兵至角二星距南星去極九十七度半庫樓十星距西北星去極一百二十三度入軫十五度半南門二星距西星去極一百三十七度入軫十一度平道二星距東星去極九十一度入角二度天門二星距西星去極一百四度半入軫十六度平星二星去極一百二度半入軫十六度天田二星距西星去極八十三度半入角二度半周鼎三星距東北星去極六十四度半入角宿七度半亢宿總敘亢四星九度日月之中道主天一內朝天下之禮法也又曰攝提天下奏事聽訟理獄録功者也亦為疏廟主疾疫其星明大四海歸王輔臣納忠人無疾疫移動多病不見天下鼎沸而旱潦作矣大角一星在攝提間天王座也又為天子梁棟金守之則兵起日食主凶亢南七黑星曰折威主斬殺金火守之兵戈犯邊將有棄市者攝提六星直斗之南主建時節司禨祥攝提為盾以夾擁帝座也主九卿眀大三公恣橫客星入之聖人受制一曰大臣之象頡頏二星在折威東南主考囚察誠偽也陽門在庫樓東北主邊塞險阻之地客星出陽門兵戈犯邊亢四星距南第二星去極九十六度攝提大星其右距北大星去極六十七度入亢七度其左距南星去極七十二度半入亢七度大陽門二星距西星去極一百一十三度入角十度折威七星距西第三大星去極一百二度入亢三度大角一星去極六十六度去極二度半頡頏二星距東南星去極一百一十二度半入亢四度氐宿總敘氐十六度下二星為五星日月中道為天子之路寢明則大臣后妃奉君不失節如不見或移動則臣將謀內禍亂生矣日月食主火亂木犯之立后妃火犯之臣僭上金犯拜將水犯百官憂客星犯婚禮不整彗孛犯暴兵起月暈人不安一曰氐為后妃之府休解之房前二星適也後二星妾也將有徭役之事氐先動星明大則民無勞天乳在氐北主甘露明則潤澤甘露降招搖一星在梗河北次北斗柄端主邊兵芒角變也搖動則甲兵大起梗河二星在大角北天子以備不虞其色變動有兵喪帝席三星在大角西北宴樂獻夀之所其星不見大臣失位亢池六黑星為沈舟楫主迎送移徙則凶騎官二十七星在氐南天子騎士之象星衆則安不見兵起車騎三黑星在氐南騎官之上都車馬之將也金火犯為殃動搖車騎行天輻兩黃星在房西主鸞駕客星來守之則輦轂有憂也騎陳將軍一星在騎官東南主騎將也動搖則騎將出氐四星距西南星去極一百四度半亢池六星距北大星去極七十度半入亢三度天乳一星去極九十二度入氐十四度招搖一星去極九十一度入亢四度半梗河三星距大星去極五十九度入氐二度騎官二十七星距西北星去極一百二十度入氐宿初度車騎三星距東南星去極一百四十度入氐二度帝席三星距東星去極六十七度半入氐宿一度半房宿總敘房六度為明堂天子布政之宫也亦四輔也下第四星上將也次星次相也上星上相也南二星君位北二星夫人位又四表中間為天衢之大道亦謂之天闕黃道之所經也南門曰陽環亦曰陽道其南曰大陽北間曰隂間亦曰隂道其北曰大隂七曜由乎天衢則天下和平由陽道則主旱喪由隂主水兵房星亦曰天駟為天馬主車駕南星曰左驂次左服次右服次右驂亦曰天廄又主開閉為畜藏之所由也房星明則主王者明驂星大則起兵星離則夭流日月食則主昏亂權臣橫彗孛犯之兵起下二星為隂五星犯之為水上二星為陽五星犯之為旱房北二小星田鈎鈐房之鈐鍵天之管籥主閉藏鍵天心也王者孝則鈎鈐明近房則天下同心逺則天下不和王者絶后房鈎鈐間有星及疏折則地動河清東咸西咸各四星在房心北日月五星之道也為房之户所以防淫佚明則吉暗則凶日月五星犯守之有隂謀大火守之兵起罰三星在東咸正西南北而列主受金贖罪正而列則法令太平曲而斜則刑罰不中日一星在房中道前太陽之精主明德金火犯守之有憂從官二星在積卒西見北房四星距南第二星去極一百一十四度半鍵閉一星去極一百八度入房四度罰三星距南星去極一百八度入心一度半東咸四星距西南星去極一百一十一度入心一度日一星去極一百一十三度入氐十四度半從官二星距西星去極一百二十二度入氐十四度西咸四星距西南星去極一百四度半入氐十五度鈎鈐二小星去極一百九度半入房二度半心宿總敘心六度一名天火天王位也中心星曰明堂為大辰天子之位也前星為太子不明則太子不得位後星為庶子眀則庶子繼心上四尺為日月五星之中道中心眀則化成道昌直則地動移徙不見國亡又曰心變黑色夫人有憂直則王失勢動則國有憂離則民流金火犯血光不止土木犯吉月暈兵起火來守之國無主客星及孛犯天下兵荒積卒十二星在房星西南五營軍士也微而小則吉明大動搖兵火起一星亡兵出二星亡兵半出三星亡兵盡出他星守之兵火起近臣誅心三星距西前星去極一百四十四度半積卒十二星距大星去極一百二十二度半入氐宿十五度尾宿總敘尾十九度后妃之府后宫之場也北之一丈為天之中道上第一星后也第二星夫人也次則嬪妾第三星傍一星名曰神宫解衣之內室尾亦為九子星色欲均明大小相仍則后妃妬忌後宫有序多子孫星微細暗后有憂疾疏逺則后失勢動則君臣不和天下亂就聚則大水水犯之及月暈則后妃死火犯宫中內亂土犯吉水犯宫中有事客星犯大臣諫日月食主飢一曰金火守之後宫兵起龜五星在尾南漢中主定吉凶明則君臣和不明則為乖戾亡則赤地千里火守之兵起在外土守之兵罷天江四星在尾之北主太隂不欲明明而動水暴出參差則馬貴其星不見則河津關道不通火守之有立主客入河津絶傅説一星在尾後河中主后宫女巫祝祀神靈祈禱一孕故曰主后宫之內祭祀以求子孫詩曰克禋克祀以弗無子此之象也其星明大王者多子孫小而暗后宫少子動移則后宫不安星搖則天子無嗣魚一星在尾後河中主隂事知雲雨之期大明則隂陽和風雨時暗則魚多亡搖動則大水暴出出漢中大魚多死火守在南則旱在北則水起按傅説一星専主后宫女巫禱神之事謂之傅説古有傅母有保母傅而説者謂無母不喜之也今之婦人求子祀婆神此傳説之義也偶商之傅説與此同音諸子更不詳審其義則曰傅説騎箕尾而去殊不知箕尾専主后室之事故有傅説之佐焉尾九星去極一百二十七度半龜五星距南第二星去極一百一十四度半入尾宿十度魚一星去極一百二十六度入尾宿十五度半傅説一星去極一百零八度入尾宿十四度半箕宿總敘箕十一度亦謂之天津後宫妃后之位上六尺為天之中道箕一曰天雞主八風凡日月五星在箕東壁翼軫者風起又主口舌主客蠻夷諸國故蠻夷將動先表箕星大明直則五榖熟君無讒間疏暗則無君世亂五榖貴蠻夷不服內外有差就聚細微天下憂動則蠻夷有使來離徙則人流若移入河國災相食月暈金火犯之兵起流星犯大臣叛月宿其野風起杵三星在箕南主杵舂之用也縱為豐橫為飢移徙人失業不見人相食客星入杵臼天下有急變粳一星在箕口前杵舂西北明則為豐暗則為飢不見人相食箕四星距西北星去極一百二十一度半杵三星距中星去極一百三十八度入箕宿三度粳一星去極一百一十七度半入尾十七度半斗宿總敘南斗六星曰天廟曰天位一曰天闕一曰天機一曰天府一曰天庫一曰天洞玄龜之首丞相天宰之位木星也主天子夀命之期主酌量政事稟受爵祿日月五星貫之為中道其南首二星曰魁為天庫又為天梁主兵革二星為天相主爵祿比尾二星曰杓為天府主夀命將有天子之事占之於斗其魁第一星主吳第二星主會稽第三星主丹陽第四星主豫章第五星主廬江杓尾第六星主九江斗北大星亦曰天關天子之正旗也土宫也六星欲其均明盛君臣同心天下安寧爵祿不僭風雨順時主夀康五榖蕃昌暗小則君臣失位天下不安芒角動搖則君臣失勢天下愁悲大小不齊則上下乖違移徙則賢臣逐天下病變色失常則隂陽不調宰相憂之日月五星逆入斗天下流蕩孛犯之兵起星小暗則廢宰相及死鱉十四星在南斗南鱉為水蟲歸太隂有星守之曰永會主有水火守之旱建六星在斗背亦曰天旗臨於黃道天之都關也建斗之間七曜之道建為謀事為天鼓為天馬南二星天庫也中央二星市也鐵銷也上二星旗附也見動搖則人勞月暈之蛟龍見牛馬疫月食五星犯守大臣相譖臣謀主亦為關梁不通有大水天辨九星在建星北入河市宫之長也主列肆闤闠若市籍之事以知市珍也星明則吉彗星守之糴貴兵起天雞二星在狗國北主候時也金火守之兵大起天籥八星在斗杓西主鎖籥關閉明吉暗凶狗國四星在建東北主鮮畢烏桓沃旦明則邊寇作金火犯守外夷有變太白逆守其國亂客星守之有大盜其王且來天淵十黑星在鱉