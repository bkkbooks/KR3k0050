仁宗英宗孝宗武宗東向至期上詣太廟行禮儀同時享祝文孝𤣥孫嗣皇帝御名敢昭告於德祖𤣥皇帝𤣥皇后懿祖恒皇帝恒皇后熈祖裕皇帝裕皇后仁祖淳皇帝淳皇后太祖髙皇帝孝慈髙皇后成祖文皇帝仁孝文皇后仁宗昭皇帝誠孝昭皇后宣宗章皇帝孝恭章皇后皇髙祖考英宗睿皇帝皇髙祖妣孝莊睿皇后皇曽祖考憲宗純皇帝皇曽祖妣孝貞純皇后皇伯祖考孝宗敬皇帝皇伯祖妣孝康敬皇后皇祖考睿宗獻皇帝皇祖妣慈孝獻皇后皇伯考武宗毅皇帝皇伯妣孝静毅皇后皇考世宗肅皇帝皇妣孝㓗肅皇后時當嵗暮明旦新正謹率羣臣以牲醴庶品恭詣太廟特修祭祫用伸追慕之情尚享國朝廟祀總論自昔帝王之興曷嘗不本始神聖肇廟祀以仁祖考哉虞夏而徃無述已在王制曰天子七廟三昭三穆與太祖之廟而七蓋凖乎商道矣有時享以祀在廟之主而舉於四時有大祫以合已祧之主而行於嵗暮坐次曰位致詞曰祝掲主曰稱侑食曰配雖不皆經見而禮儀具之未聞其有九也九廟之制始自唐之𤣥宗至宋祔獻懿以配太祖而後世因沿遂不可變君子訾之曰非古也夫禮有以多爲名者王者德厚流光自仁率祖即増七爲九何侈哉我太祖髙皇帝命稽古首建廟闕左以享德熈懿仁四親而夀春諸王咸以次而侑享焉文皇帝繼統上承先德建廟北平以享列祖太祖四親而夀春諸王以次在侑於時廟數猶未定也至憲宗純皇帝以世代既足始備九廟之制四列祖一太祖一成祖並仁宣英三宗爲九而規制於是大定矣於時升祧之禮猶未講也至世宗肅皇帝以世數既盈復更九廟之制一太祖一成祖六仁宣英憲孝武並獻帝升祔爲九而典禮於是乎益詳矣春月特享則分祭於各室三時合享則共食於前殿而已祧之廟不與焉時享之禮則以太祖爲尊嵗暮之祫則升四祖於上而祧廟之主咸出而共享焉當憲廟時四祖並列殆體太祖之心乎而九廟未足禮固不得而有祧也至世廟之時四祖並祧固尊太祖之位乎而世數已足勢不容於無祧矣其或祧或升之次合享分享之儀孰非酌之今而諧揆之古而不悖者乎歴世滋乆訛舛相承蓋於名實莫可致詰矣以今日言之𢎞治中時享祝文稱八廟太皇太后皇考憲宗皇帝蓋親禰也而九廟之數若减其一至嘉靖中孝宗而上本七廟也而稱六及仁宗奉祧猶六廟也而稱五倐損倐益何廟數之不常耶五廟之中仁宣並祧惟三廟設祭而祝文猶五是祭省而祝増矣自皇髙祖憲宗至皇考穆宗既備六廟而太祖成英三廟猶仍五廟之稱是廟加而祝减矣何位號之無定耶夀春王於太祖爲叔霍丘七王爲兄而寳應七王姪也英廟時誤稱夀春及霍丘七王爲皇髙伯祖寳應七王爲皇曽伯祖紊矣今世系益逺而槩稱爲皇曽伯祖是紊而又紊也何稱名之弗當耶夫禮順人情辨尊卑定名分明嫌疑使坐者辨於席也行者辨於途也而後理得順人心得安焉幽明一也夫祭者察鬼神之情通幽明之交先王用之以禮神而鬼神享人倫明矣故曰宗廟之禮所以序昭穆也燕毛所以序齒也烏有處非其位席非其次稱非其名而足以成禮者乎難以享矣我皇上睿哲誠敬通於神明一抉紕繆而釐正之至篤孝也愚無所識知謹輙以臆決夫太廟者太祖之廟也我皇祖開天啓運功德無比德祖雖尊不得以情掩義謂宜世享南面東侑成祖其餘升遐則祔親盡則遷位止於九而勿之過則升祧定而世次明矣諸廟帝后並掲徽稱及時享而謹核之祭必一其祀祀必一其廟使神各有嚴則繁簡當而位號秩矣由太祖而上下之諸王之分雖百世可知也或者謂位定爲難惟各稱本爵而勿概以皇曽伯祖加焉則稱謂有經而名言順矣世次明則昭穆定位號秩則浮假易名言順則觀聽諧釐此三者庶幾哉盡倫乎嘻猶其節爾記曰有其舉之莫敢廢也言率古也曰耻無其實而有其名言思義也昭穆之制非古乎曷名其爲昭也居祖之左面南而明已爾曷名其爲穆也居祖之右面北而穆已爾今也廟分九室室各南向即太祖前殿亦南上而旁列本楹也而曰廟本一也而曰九本同堂異室之制而猶仍昭穆世次之稱其於義何居焉或者曰祭從先祖夫有所受之也蓋自闕左而已然矣夫聖祖之然也草創之未暇也成祖之然也考据之未詳也至於世廟斯不得已而遷就之爾語曰禮失求之野今素封之家奉其始祖考旁列四親犁然序也安有生爲天子歿居一楹而僂居並列厪厪然者商周之事豈其冺冺而奈何執拘攣之說而隳閎廓之規躡沿流之蹤以詘神靈之尊乎草茅主臣雖然猶願有一言者革除之嵗削紀錄矣而五載之正朔何所於頒監國之君歸郕邸矣而八年之重噐誰與爲守今死事諸臣已蒙曠除景帝位號旋已議復宜下掌故略議享祀所宜以補聖朝禮儀之闕宗廟時享有虞氏四時之祭春曰禴夏曰禘秋曰嘗冬曰烝夏殷因虞之祭周祭春曰祠夏曰禴秋曰嘗冬曰烝以禘爲殷祭之名皆以孟月無常日擇月中柔日卜得吉則祭之又王制天子犆礿祫禘祫嘗祫烝蓋天子之禮春則特祭夏秋冬則合享特祭各於其廟合享同於太廟漢制時祭於便殿光武立廟洛陽四時祫祭髙祖文帝武帝祀餘帝則春以正月夏以四月秋以七月冬以十月及臘一嵗五祀唐四時各以孟月享太廟宋制嵗以四孟月及季冬凡五享元一年四享太廟國朝時享用四孟月惟孟春特祭於廟其夏秋則合祭於髙祖廟嵗除復率百官朝祖合祭於髙祖廟朔望祭春秋外傳國語祭公謀父曰日祭月祀時享先王之訓也韋昭曰天子日上食於祖禰月祭於髙曽時享於二祧論語曰子貢欲去告朔之餼羊蓋告朔於廟餼以牲特謂之月祭漢制日祭於寢月祭於廟寢日四上食月祭朔望皆用太牢唐天寳中初令尚食朔望進食於太廟每室奠享宋如唐制元不行朔望祭國朝朔祭各廟共用羊一豕一各用籩八豆八簠二簋二豋二硎二酒尊三及常饌鵝羮飯用祝文行禮官服常服望祭則用常饌酒果鵝湯飯行禮官服常服四時近親也禮有時祭無時祫時祫之說何所起乎王制曰天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝天子犆礿祫禘祫嘗祫烝諸侯礿則不禘禘則不嘗嘗則不烝礿犆禘一犆一祫嘗祫烝祫程子曰諸侯祠禴烝嘗之祭爲廟禮煩故每年於四仲之中三祭合食於祖廟惟春則祭諸廟殊不知時祭如生時事父母祖父母之禮故其祭宻欲考妣相安故其廟異不宜合也時祭而合徒取自逸而已不亦怠乎圖書編卷九十八
