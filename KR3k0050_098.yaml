body:
  text: 圖書編卷九十八明章潢撰廟祀考王制曰天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庻人祭於寢天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝天子祭天地諸侯祭社稷大夫祭五祀天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭名山大川之在其地者天子諸侯祭因國之在其地而無主後者天子犆礿祫禘祫嘗祫烝諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿諸侯犆禘一犆一祫嘗祫烝祫天子社稷皆太牢諸侯社稷皆少牢大夫士宗廟之祭有田則祭無田則薦庻人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈祭天地之牛角繭栗宗廟之牛角握賔客之牛角尺諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍庶羞不踰牲燕衣不踰祭服寢不踰廟大夫祭器不假祭器未成不造燕器張子曰殷而上七廟自祖考而下五并逺廟爲祧者二無不遷之太祖廟至周有百世不毁之祖則三昭三穆四爲親廟二爲文世室武世室并始祖而七諸侯無二祧故五大夫無不遷之祖則一昭一穆與祖考而三故以祖考通謂爲太祖若祫則請於其君并髙祖干祫之干祫之不當祧而特祫之也孔註王制謂周制粗及之而不詳爾朱子禘祫議曰王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無二祖而皆及其祖考也鄭氏曰夏五廟商六廟周七廟今按商書已云七世之廟鄭說恐非顔師古曰父爲昭子爲穆孫復爲昭昭明也穆美也後以司馬氏諱昭故學者改昭爲韶也其制皆在中門外之左外爲中宫内各有寢廟别有門垣太祖在北左昭右穆次而南晉博士孫毓議天子太祖百世不遷一昭一穆爲宗亦百世不遷宗亦曰世室亦曰祧鄭註周禮守祧曰宗亦曰祧亦曰世室周禮有守祧之官鄭氏曰逺廟爲祧周爲文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏於太祖后稷之廟先王之遷主藏於文武之廟羣穆於文羣昭於武明堂位有文世室武世室鄭氏曰世室者不毀之名也二昭二穆爲四親廟髙祖以上親盡則毁而逓遷昭常爲昭穆常爲穆昭之二廟親盡則毀而遷其主於昭之宗曽祖遷於昭之二新入廟祔於昭之三而髙祖及祖在穆如故穆廟親盡放此新死者如昭爲昭則祔於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者爲曽祖自次廟遷其髙祖於昭之世室蓋於主祭者爲五世而親盡故也其穆之兩廟如故不動其次廟於主祭者爲髙祖其近廟於主祭者爲祖也主祭者歿則附於穆之近廟而逓遷其上倣此凡毁廟遷主改􅀢易檐示有所變非盡毁見榖梁傳及傳註諸侯則無二宗大夫又無二廟其遷毁之次則與天子同但毁廟之主藏於太祖儀禮所謂以其班祔檀弓所謂祔於祖父者也曲禮云君子抱孫不抱子此言孫可以爲王父尸子不可以爲父尸鄭氏曰以孫與祖昭穆同也周制自后稷爲太祖不窋爲昭鞠爲穆以下十二世至太王復爲穆十三世至王季復爲昭十四世至文王又爲穆十五世至武王又爲昭書稱文王爲穆考詩稱武王爲昭考而左氏傳曰太伯虞仲太王之昭也虢仲虢叔王季之穆也又曰管蔡魯衛文之昭也邗晉應韓武之穆也蓋其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊初不以左右爲尊卑也三代之制其詳雖不得聞然其大略不過如此周時饗九獻儀節有虞氏四時之祭春禴夏禘秋嘗冬烝祭尚氣郊特牲云血腥爛祭用氣也法先迎牲殺之取血告於室以降神然後用樂而行祭祀祭貴首夏氏時祭之名因有虞祭貴心殷因虞夏之制祭尚聲郊特牲云臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以昭告於天地之間也祭貴肝周祭春曰祠夏曰禴秋曰嘗冬曰烝以禘爲殷祭之名祭尚臭灌用鬯臭隂逹於淵泉致隂氣也祭貴肺行九獻之祀祭之日王服衮冕而入立東序工奏王夏后副禕而入立西序就西房工奏齊夏尸服衮冕入奏肆夏王及於室而不迎王以圭瓚酌雞彛之鬰鬯以獻尸尸以祼祭之啐之奠之此爲祼神之一獻后以璋瓚酌鳥彛之鬰鬯以獻尸尸祭之奠之啐之此二獻也王乃袒而迎牲於門牲入奏昭夏王親牽牲公卿大夫執幣以從入於庭告博碩肥腯王麗牲於碑親執鸞刀啟血毛授祝祝入告幽全乃殺牲一牢始行朝踐之事尸出於室坐戶西南靣主在西東靣薦籩豆脯醢乃取牲膟膋燎於爐炭入詔神於室於時王親洗肝於鬰鬯燔之墮於主親制其肝所謂制祭也乃升牲首於室中薦腥於尸王前謂之朝踐王以玉爵酌玉罇中醴齊以獻此三獻也后於是踐朝事籩堂上歌以夾鍾堂下調以無斁作大武之樂后以玉爵酌獻罇醴齊以獻尸此四獻也於時上自阼階西獻后從西階東酌獻至薦熟先薦於堂有机設饌乃更設尸主之席於室在戶内西方東南尸在其北布席訖遷所設於堂上之饌置尸主前祝以斚酌奠奠於饌南又取腸間脂􅌊之蕭合羶薌燎於爐炭所謂臭陽逹於墻屋乃迎尸主入室即席舉奠斚祝詔王妥尸王拜尸祭酒以青茅白縮酒遂啐之奠之乃坐王以玉爵酌象罇盎齊以獻尸五獻也后薦饋食之籩又以玉爵酌象罇醴齊以獻六獻也尸食訖王以玉爵酌朝踐獻罇醴齊以酳尸謂之朝獻罇相因此七獻也后薦加事之豆籩尸飲七王獻工尸飲訖授祝祝清酒以授尸尸酢王設酢席於户内尸取祭饌黍稷并嘏王王以出量大與鬰人受之后以玉爵酌饋食象罇之盎齊曰再獻亦罇相因尸酢后如王此八獻也尸飲八王獻卿諸侯爲賔者以玉爵盎齊備卒食三獻合九獻及后王各四諸侯爲賔者一也尸飲九王獻大夫士九獻後王降冕而總干舞大武之樂以樂尸爲嗣子舉奠與諸臣進獻更行三爵爲加爵用璧散璧角而旅酬爵行旅訖尸出嗣子餕厥明更以一牢繹於枋宗廟饗祀考易王假有廟致孝享也商書七世之廟可以觀德盤庚兹予大享于先王爾祖其從與享之廟以功臣配享三代已有之矣周禮大宗伯以肆獻祼享先王以饋食享先王以祀春享先王以祫夏享先王以嘗秋享先王以烝冬享先王吳澂曰肆獻祼五年之禘也饋食三年之祫也祠禴烝嘗四時祭名春物初生未有以享以祠爲主故曰祠夏物未成用薄物以祭故曰禴秋物漸成以薦新爲主故曰嘗冬物畢成可進者衆故曰烝小宗伯辨廟祧之昭穆按昭穆之名始見於此商雖有七廟之文見於書然未明言其爲昭穆也周雖有昭考穆考之頌見於詩然未並舉以爲言也夫宗廟有迭毁而昭穆則一成而不可易此小宗伯所以爲之辨别歟司勲凡有功者銘書於王之太常祭於大烝司勲詔之按周書洛誥曰記功宗以功作元祀君牙曰厥有成績紀於太常商書曰兹予大享于先王爾祖其從與享之皆是祀先王而以功臣配享也歴代相承率循是典本朝廟祀以中山武寧王徐逹開平忠武王常遇春岐陽武靖王李文忠寧和武順王鄧愈東甌㐮武王湯和黔寧昭靖王沐英虢國忠烈公俞通海蔡國忠毅公張徳勝越國忠壯公胡大海梁國武桓公趙德勝泗國武壯公耿再成永義侯桑世傑十二人者配享於太祖以河間忠武王張玉東平武烈王朱能寧國公王真榮國恭靖公姚廣孝四人者配享太宗自中山王以下十二人者皆武臣也河間王以下四人者其一人姚廣孝文臣也臣觀前代功臣配享文武並用乞下禮官議請於今開國元勲中擇一文臣終始全節者以配享太祖又於仁宗宣宗英宗三廟皆如二廟故事推擇文武大臣配享以成一代崇徳報功之典王制天子七廟三昭三穆與太祖之廟而七按漢儒七廟之制有兩說所謂周之所以七廟者以后稷始封文王武王受命而三廟不毁與親廟四而七韋𤣥成等之說也七者其正數可常數者宗不在此數者茍有功德則宗之不可預爲設數劉歆之說也朱熹以劉歆之說爲是若從諸儒之說則王者不過立四親廟與太祖爲五其與諸侯五廟又何别乎况商書已云七世之廟可以觀徳則自昔已有七廟矣天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝天子置礿祫祫禘祫嘗祫烝陳皓曰祫合也其禮有二時祭之祫則羣廟之主皆升而合食於太祖之廟而毁廟之主不與三年大祫則毁廟之主亦與焉陳祥道曰君子以義處禮則祭不至於煩數以仁處禮則祭不至於疏怠朱熹曰漢承秦弊不能深考古制諸帝之廟各在一處不容合爲都宫以序昭穆貢禹韋𤣥成匡衡之徒雖用正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無寢廟但藏其主於光武廟中更衣别食章帝復如之後世遂不敢加而公私廟皆爲同堂異室之制自是以來歴魏晉隋唐其間非無奉先思孝之君據經守禮之臣而皆不能有所裁正至太祖之位下同孫子而更僻處於一隅既無以見其爲七廟之尊羣廟之神則又上壓祖而不得以爲一廟之主以人情論之則生居九重窮極壯麗而殁祭一室不過尋文之間甚或無地以容鼎爼而隂損其數孝子順孫之心宜有所不安矣按儀禮無天子宗廟之禮雖諸侯之禮亦少所存者特牲饋食少牢饋食乃大夫士之禮而已然其散見於禮運禮器郊特牲祭義祭統諸篇者其儀文名物之義猶有存者茍因其言繹其義而尋其脉絡之所自部分之所屬分析而條理之而又酌取周禮與諸儒註疏有及於禮者推類而求之則墜緒可尋古禮可復矣又按禮經無墓祭之文而上陵之禮三代以前雖不經見然自漢以後歴代相承率不敢廢非不敢也蓋不忍也光武凡三幸長安皆有事於十一陵唐開元禮有天子上陵儀注又嵗有清明設祭朔望時節之祀宋又行於春秋嵗以爲常我朝上陵之禮歳凡三舉焉清明也中元也冬至也每遇行禮文武諸司各遣官一員而以親王或駙馬主祀事天下無事天子於清明日亦或一行其藩王或來朝者亦許謁孝陵在南京内外臣僚有事經過者必先拜謁否則有罪國朝太廟祀國初建四親廟於闕左中德祖東懿祖次仁祖西熈祖廟與主皆南向東西有夾室有廡三門門設二十四㦸繚以周垣略如都宫之制洪武元年定四孟嵗除五享洪武元年命製太廟祭器曰今之不可爲古猶古之不可爲今禮順人情可以義起所貴斟酌得宜必有損益近世泥古好用古籩豆之属以祭其先王既不用之似亦無謂其制祭噐如事生之宜於是祭用金造金祭噐樿椸枕簟篋笥帷帳浴室皆備二年令清明端午中元冬至時享嵗除如故祝稱孝子皇帝不稱臣遣皇太子祀云命長子某不得稱皇太子三年時享仍用四孟孟春特享四廟三祖合享於德祖之廟德祖南向三祖東西向初獻各奏其廟樂餘奏德廟樂四年遣大臣分獻親王功臣上曰國家祭祀太廟除特享外其餘合祭之時正見同歆同樂之際凡有親戚功臣皆可共享其樂九年改建太廟前殿後寢殿殿翼兩廡寢殿九間間一室中室奉德祖帝后神主懿祖東一室仁祖東二室主皆南向几席諸噐備如生儀時享殿中設德祖帝后衣冠神座南向懿祖座左西向熈祖座右東向仁祖次懿祖西向親王配享於東壁功臣於西壁孟春擇上旬吉日三孟朔日嵗暮除日皆合享奏德廟之樂罷特享二十五年令廟享値國䘮樂備而不作三十一年太祖神主祔寢殿西二室南向正殿神主座次熈祖東向成祖遷都北平建廟亦如之成祖升祔東三室殿座次仁祖仁宗升祔西三室殿座次太祖宣宗升祔東四室殿座次成祖英宗升祔西四室殿座次仁宗𢎞治元年憲宗將升祔議祧禮禮官言國家九廟已備憲宗祔廟議者咸謂德懿熙仁四廟宜以次祧而尊太祖爲百世不遷之祖是知尊太祖而不知太祖之尊其祖也昔周旣追王太王王季又上祀先公以天子之禮國家自德祖以上莫推其次則德祖視周后稷不可祧明甚懿僖仁三祖以次當祧太祖太宗視周文武世室百世不遷禮也憲宗升祔當祧懿祖宜於太廟寢殿後别建祧廟如古夾室之制嵗暮則奉祧主合享如古祫祭之禮吏部侍郎楊守陳言禮官議請尊德祖百世不遷如宋僖祖故事非是禮天子七廟祖功而宗德故凡號大祖者即始祖也始祖必配天若商周契稷皆有功德非直原本也宋僖祖及我德祖可比商報乙周亞圉非契稷比議者習見宋儒嘗取王安石說遂使七廟旣有始祖又有太祖太祖既配天又不得正位南向名與實乖非禮或曰降而合食以尊就卑不可謂禮不又有大禘乎憲宗升祔請并祧德懿熈三祖自仁祖下爲七廟異時祧盡則太祖擬契稷而祧主藏於後寢祫禮行於前廟時享尊太祖祫祭尊德祖如此功德是崇恩義亦備庻無悖禮上從禮官議始建祧廟於寢殿後奉藏懿祖神主神座熈祖寢主遷東一室殿座還西向一位仁祖以下逓遷憲宗升祔西四室殿座次宣宗孝宗升祔祧熙祖武宗升祔祧仁祖睿宗升祔不得不祧德祖以故九廟太祖居尊而四祖之主皆祧矣嘉靖四年立世廟於太廟東享皇考獻皇帝九年春世宗皇帝復行特享禮令祠官廟殿帷幄如九廟各奠獻讀祝三孟如舊奉太祖南向十年冬上諭禮官太祖以恩降德祖今日當以義尊太祖祫祭宜奉四祖同太祖皆南向庶見太廟爲特尊太祖禮官言合羣廟之主而祭於太祖之廟是爲大祫亦以尊太祖也太廟太祖之廟不當與昭穆同序太祖太廟之主不可與子孫並列自今大祫宜奉四祖太祖皆南向德祖居中懿熙仁祖太祖東西並叙列聖左右列東西相向如故不惟我太祖列於羣廟之上足以申皇上尊太祖之心而懿熈仁三祖得全其尊尤足以體太祖之心上曰善是年上坐文華殿東室召見輔臣時鑾禮官言議復古七廟之制太廟及寢殿祧廟宜存弗撤惟量地分建羣廟議未决諸大臣退㑹中允廖道南疏請建九廟上得疏喜下廷議既上議古者天子廟制唐虞五廟夏后因之殷周大抵皆七廟而祭法王制與劉歆諸說又各不同宋儒朱熹古今廟制引王制天子七廟外爲都宫内序昭穆漢不考古諸帝異廟不合都宫不序昭穆明帝遵儉自抑遺命勿列爲廟遂有同堂異室之制嗣後魏晋隋唐宋皆然我太祖初别立四親廟廟皆南向似近古禮後改建太廟又用明帝之制不能無疑形諸翰札宣諸召問謀諸臣弼者屢矣但今太廟南近宫牆東邇世廟西阻前朝地勢有限上諭太廟三殿勿撤則太廟垣外左右隙地不盈數十丈若依古制昭穆六廟在太廟前以次而南則今太廟都宫之南至承天門墻不遠即使盡闢其地分爲左昭右穆尤恐勢不能容若欲稍减規模不必别門異寢又恐禮未必恊况古七廟九廟制度皆同今太廟巍然宏壯而羣廟隤然湫隘亦恐於義未安議者欲就太廟兩廡即分羣廟不惟去尊即卑不足以稱聖孝而遷就一時裁損廟貌尤非細故且有廟無寢神將何棲諸王功臣置之何所議者又欲藏主夾室夫夾室者側室也以藏祧主可也以藏親廟未毁之主情理舛矣至謂周人廟制約儉宜放爲之夫周廟門大扄七箇闈門容小扄三箇則大門實容二丈一尺小門實容六尺其制過於今廟烏在其爲儉約也今捐太廟羣廟可又損於世廟乎且太宗功業比隆太祖憲宗獻皇父也又可减於世廟乎今之廟主太宗之下凡有七聖將如古制爲三昭三穆而止立六廟乎抑如商周以太宗爲百世不遷之宗而加立七廟乎即使廟字既成皇上冠冕佩玉執圭服衮循紆曲之途徧立羣廟而行興俯伏拜起奠獻之禮非獨筋力不逮而日亦不給矣議曰周禮宗伯代后獻羣廟可遣攝也夫古者廟祭君后祭獻后不與祭宗伯代獻謂一廟之中代亞獻之禮未聞人臣可以主廟祭也且古者助祭諸侯類多同姓罔非天𦙍今陪禮者可擬古諸侯乎皇上仁孝誠敬可以終嵗舉祭上對越太祖之廟而不一至羣廟乎且規制必備而後成廟門垣廡寢是也儀文必備而後成禮樂之類是也今分為各廟廟祭是不得不降簡易是欲尊之而反卑親之而反疎祗見其貶損而未見其隆重矣大學士丘濬謂宜一日間祭一廟歴十四日徧七廟此蓋無處而强爲之說不自知其言之迂也馬端臨曰後世失禮豈獨廟制漢儒以來講究非不詳明而卒不能復古者以昭穆難定故也必如古制父子相世則可兄弟相及不知其序紊矣周孝王以共王之弟懿王之叔繼懿王而立故朱子廟圖宣王之世則以穆懿夷爲昭共孝厲爲穆夫穆王昭也共王穆王孫也懿爲穆孫則繼穆而爲昭是也孝爲共弟而繼共爲穆雖於世次不紊然以弟而處孫之廟矣夷王懿王子也穆也而圖居昭厲王夷王子也昭也而圖居穆如此則夷厲之昭穆易位於是朱子亦無以處此不過即其繼立之先後以爲昭穆而不能自守其初説矣又况宣王時三昭三穆爲六代所祀合始於昭王今孝王居其間於是昭王以六世祖雖未當祧而已在三昭三穆之外名爲六廟而祀止三世耳前乎周者爲商商武丁之時所謂六廟祖丁南庚陽甲盤庚小辛小乙也然南庚者祖丁兄子陽甲盤庚小辛小乙又皆祖丁之子小乙之弟姑以祖丁爲昭言之則南庚至小乙皆祖丁子行爲穆是一昭五穆而武丁所祀上不及曽祖未當祧而祧者四世矣後乎周者爲唐懿宗之時所謂六廟者憲宗穆宗敬宗文宗武宗宣宗也然穆宣宗皆憲宗之子敬宗文宗武宗又皆穆宗之子姑以憲宗爲昭言之則穆宣爲穆敬文宗爲昭是四昭三穆而懿宗所祀上不及髙祖未當祧而祧者三世矣若必欲祀及六世則武丁時太祖之外必十廟懿宗時太祖之外必九廟而後可葢繼祖者既不能必其爲弟爲子建廟者亦安能預定其爲昭爲穆或穆多昭少如殷或昭多穆少如唐哉若必欲昭穆世叙則建廟之時昭齒者必在太祖之廟之左穆齒者必在太祖之廟之右如此則左右六廟定三昭三穆以次遞遷之説又不可行矣故東都以來同堂異室未可以盡爲非禮也皇上以皇考専享世廟而太祖列聖乃不得以專廟以全其尊然列聖同享太祖已極尊崇而皇考專歸廟猶爲退遜若廟制大小不倫行祀親攝或異則尊卑厚薄之間似不足以稱皇上孝敬之誠皇上劄諭輔臣亦言祀典宜正廟制難更大哉皇言實萬世之寳訓也疏入上允竟撤故廟改建祖宗各爲專廟諸廟合爲都宫太廟居中昭穆六廟左右列成祖廟在六廟之上各有殿各有寢主太廟寢後别有祧寢藏祧主太廟門殿皆南向羣廟門東西兩向内門殿寢皆南向十一年罷設衣裳請主十三年南京太廟災上欲勿建敇廷臣議禮官言京師宗廟行將復古而南京太廟脩飭方新遽罹回禄皇天卷德之意聖祖啓後之靈恐不可不黙㑹於昭昭之表嘉靖十四年欽依皇祖文皇帝廟曰太宗廟昭穆迭遷之意要必昭不動穆穆不動昭方是正義可著爲令上喜令亟起新廟罷建南京太廟廟址築周垣香火并入南京奉先殿膳節祀獻新儀如舊十五年十二月廟成詔曰朕創昭穆羣廟以祀祖宗彰太祖爲專尊之主復作太宗廟於羣廟之外表功德不遷享百世祀更創皇考廟曰獻皇帝廟别擇吉區以避渠道止脩時祭以避豐禰之嫌十七年九月遂尊皇考廟號爲睿宗附享太廟又改尊太宗爲成祖立春特享各出於殿成祖廟迎神樂别歌三獻徹饌還宫樂如太廟仁宣英憲四廟樂歌同孝武二廟迎神樂别歌三獻徹饌還宫樂歌同睿宗樂别歌異諸廟上親獻太祖列聖廟遣大臣攝之立夏時祫出太祖成祖七宗主於大殿立秋時祫如夏禮樂歌異於夏立冬時祫如秋禮迎神徹饌還宫樂歌異於秋季冬中旬擇日大祫出四祖太祖成祖七宗主於大殿祭畢各歸於其寢是年皇后助獻二十年四月宗廟災初雷火起仁廟風大發仁廟燬俄而成祖廟主又燬延爇太廟及昭穆羣廟惟睿廟獨存上奉列聖主於景成殿遣大臣入長陵獻陵告題成祖仁宗帝后主奉景神殿二十四年七月新廟成復同堂異室之制寢殿太祖正位居尊成祖仁宣英憲孝睿武左右次列皆南向設衣冠合享四祖皆祧寢南向二十八年孝烈皇后升祔祧仁宗四十四年改睿宗廟爲玉芝宫奉安睿宗帝后神主宫後東北爲景神殿奉藏列位御容乾清宫東爲攷孝殿又東爲神睿殿又東爲奉先設奉安列聖帝后神主四十五年世宗升祔奉孝烈皇后祔廟隆慶元年奉安孝烈皇后神主於𢎞孝殿孝恪皇太后孝懿皇太后神主於神睿殿凡册封等項告祭於内洪武二年夀春十五王進侑四祖廟夀春於孝陵爲伯南昌七王兄寳應七王從子也廡中木主稱夀春八王爲髙伯祖考寳應七王爲曾伯祖考禮官誤矣是年祔享戰殁功臣也乃設青布幃於廟庭祀之尋更定功臣十三人令大海通海張趙德勝世傑再成楚國公廖永安七人已卒祔廟逹等六人俟卒進侑八年設黄布幄殿左右即於廟中殿上祀四祖左祀楊王皇兄徐王右祀功臣九年定夀春王王妃二十一人侑享於東壁功臣十二人西壁罷永安祀洪熈元年以靖難功臣玉能真榮國恭靖公姚廣孝侑享文廟嘉靖九年中允廖道南言廣孝髠徒不宜入廟移祀大興隆寺十年以刑部郎中李瑜議進基侑祀髙廟位次六王十六年武定侯勛乞進其祖英侑享髙廟下廷議不可戶部侍郎唐胄疏争言廟次諸臣位次上下且不可易况有無之額敢輙增損乎勛言徃年進基祔享以文故舉朝翕然順從臣祖英武臣乃紛然阻忌上是勛言進英祀先是二廟侑享功臣位各以爵及進基伯位公侯上上不喜曰何以上基而下英也令禮官考議乃合二廟功臣叙爵於是列英永義侯上河間東平二王黔寧王下基永義侯下英未進侑時禮官建言禮有功宗之祀漢祭功臣於廟廷魏祀尚書令荀攸於太祖廟唐髙祖至憲宗廟或六七八人或二三四人宋太祖至哲宗亦然如魏徴李沆司馬光皆文臣不必皆武功也守成諸君亦各有與享不必皆創業也我朝二祖開國靖難固有功臣仁宗以後無事武功其間與輔贊治平豈無有如魏徴李沆軰者今侑享二祖凡十七人十七人中惟基廣孝二人文臣耳自後六廟缺焉無聞乞下廷議考來六廟文武大臣有功在當時澤在後世者請上裁定進侑廟廷上不允太廟以下太常寺在闕左前殿後寢寢殿後有祧殿皆九楹各翼两廡寢殿藏主如同堂異室之制祭出主於前殿畢歸主於寢殿太祖開天行道肇紀立極大聖至神仁文義武峻德成功髙皇帝孝慈貞化哲順仁徽成天育聖至徳髙皇后中室成祖啓天宏道髙明肇運聖武神功純仁至孝文皇帝仁孝慈懿誠明莊獻配天齊聖文皇后仁宗敬天體道純誠至德宏文欽武章逹孝昭皇帝誠孝恭肅明德宏仁順天啓聖昭皇后宣宗憲天崇道英明神聖欽文昭武寛仁純孝章皇帝孝恭懿憲慈仁莊烈齊天配聖章皇后英宗法天立道仁明誠敬昭文憲武至德廣孝睿皇帝孝莊憲穆宏惠顯仁恭天欽聖睿皇后憲宗繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝孝貞莊懿恭靖仁慈欽天輔聖純皇后孝宗建天明道誠純中正聖文神武至仁大德敬皇帝孝康靖肅莊慈哲懿翊天贊聖敬皇后睿宗知天守道洪德淵仁寛穆純聖恭儉敬文獻皇帝慈孝貞順仁敬誠一安天誕聖獻皇后武宗承天逹道英肅睿哲昭德顯功寵文思孝毅皇帝孝靖莊惠安肅温誠順天偕聖毅皇后叙列左右室皆南向世宗睿宗世宗父也於武宗爲叔以故隮武廟上祧殿藏德祖𤣥皇帝后懿祖恒皇帝后熈祖裕皇帝后仁祖淳皇帝后祧主廟殿兩廡侑享親王十五人夀春王劉妃一壇霍丘王翟妃下蔡王妃安豐王趙妃南昌王共一壇䝉城王田妃盰眙王唐妃臨