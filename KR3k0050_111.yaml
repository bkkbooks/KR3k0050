body:
  text: 圖書編卷一百十一明章潢撰祭禮叙夫子答季路問事鬼神曰未能事人焉能事鬼問死曰未知生焉知死及宰我問鬼神之名曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也可見人鬼生死氣魄一也人子之於親生事之以禮死𦵏之以禮祭之以禮非徒儀文之備具乃其心之不容自己者也是故祖考精神即是自家精神惟子孫能盡誠敬以奉祭祀則已之精神既聚而祖考之精神亦聚洋洋乎如在其上如在其左右乃其感通之必然者所以築宫室以為廟設宗祧以序逺邇親疎凡祭必有燔燎羶薌見以蕭光以報氣氣神也教民反始以通乎祖考之神也薦黍稷羞肝肺首心加以鬱鬯以報魄魄鬼也教民致愛以通乎祖考之魄也故曰事死如事生事亡如事存以人鬼生死本無二也奈何人不知生不能事人而生不能事之以禮故不知死不能事鬼而死不能祭之以禮矣噫豺獺尚知報本人其能以忘祖考哉春雨秋霜必有悽愴怵惕之心其能已於祭祀之禮哉洪武六年詔定公侯以下家廟禮儀禮部議凡公侯品官别為祠屋三間於所居之東以祀髙曽祖考并祔位二品以上羊一豕一五品以上羊一以下豕一器皿隨官品第稱家有無於四仲之月擇吉日或春秋分冬至夏至亦可備著儀節即丘氏所述祭禮卜日每四仲月用官厯上旬宜祭祀日或以正旦端午中元冬至日代之齋戒前期一日男齋于外女齋于内沐浴更衣不飲酒不茹葷不弔喪聴樂及預一切幽穢事陳器各神主前㓗掃具香燭陳祭器設祝版省牲具饌爽明夙興設蔬果酒饌之類主人以下各就位參神鞠躬四拜興平身降神詣盥洗所盥手進巾詣酒尊所執事者酌酒詣香案前焚香跪獻爵酹酒俯伏興平身復位進饌或湯飯亦進以子弟代之行初獻禮詣酒尊所酌酒詣髙祖考妣神位前跪獻酒俯伏興平身詣曾祖考妣神位前跪獻酒俯伏興平身詣顯祖考妣神位前跪獻酒俯伏興平身詣顯考妣神位前跪獻酒俯伏興平身詣讀祝位跪讀祝文云某年歲月朔日嗣孫某等敢昭告于髙祖考某官府君髙祖妣某氏孺人曽祖顯祖考妣俱同尊靈曰氣序流易時維仲春夏秋冬追感歲時不勝永慕謹以㓗俎醴齊粢盛庶品祇薦歲事以某親某官府君某親某封某氏祔養尚享俯伏興平身復位亞獻如初獻儀終獻如亞獻儀辭神鞠躬四拜興平身焚祝文納主執事者納之原櫝中禮畢餕遣僕執書歸胙于親友遂設席各順尊畢之序迭相酬飲立春祭先祖儀同上季秋祭禰儀同上考妣忌日至日變服行禮如時祭儀祝文云痛惟考妣杳隔幽明光隂易逝復臨忌日昊天罔極號慕曷勝肅陳醴饌用伸哀悃尚享生辰儀同祝云痛惟考妣兹届誕辰追感存亡不勝永慕墓祭三月上旬擇前一日齋戒具饌厥明灑掃布席陳饌儀同上祭義朱子云古人三年喪不祭今人居喪事事與古人異豈獨廢祭以衰服特祭几筵墨衰常祀家廟三獻讀祝皆免四時之祭司馬公曰王制大夫士有田則祭無田則薦何休云有牲曰祭無牲曰薦大夫牲用羔士牲特豚猪也庶人無常牲春薦韭以卵夏薦麥以魚秋薦黍以豚冬薦稻以鴈取其物之相宜凡庶羞不踰牲若祭以羊則不以牛為羞也今人鮮用牲唯設庶羞而已居喪卒哭前此祭亦廢不可行或問家禮曰代為四祝版逐龕祭讀其事謹嚴今乃四代共一祝版亦有據乎曰家禮告事祝文四代亦只共一版焚祝文按孫氏祭儀云祝文焚於燈燭上近世焚楮錢唐以前無之一切宜斥去不用今天下文廟祀孔子不敢用紙錢䙝凟只用幣可見尊崇之意家禮云以楮錢代幣帛是謂從宜今若欲從俗用楮錢則祝文就焚于上祭忌日按眉山劉氏曰忌祭當兼設考妣若考忌日祝文後増一句曰謹奉妣某氏配妣忌日則謹奉考某公配生忌附親生之日按家禮親生辰無祭鄭氏曰祭死不祭生今俗皆有祭及觀義門鄭氏麟漢集云四月一日乃始遷祖初生之辰奉神主于有序堂上行一獻禮此為可據竊念親在生辰既有慶禮歿遇此日能不感慕如死忌之祭可也墓祭附或問増註問墓祭有儀否先生曰無儀大槩畧如家祭古人無墓祭唐人亦不見祭但是拜掃而已今宜祭否曰按朱子云祭儀以墓祭節祠為不可然先正皆言墓祭不害義又按劉氏云人死𦵏形原野與世隔絶者子追慕之心何有限極當寒暑變移之際益用増感是宜省謁墳墓以寓時思之敬今寒食上墓之祭雖禮經無文世代相傳寖以成俗上自萬乘有上陵之禮下達庶人有上墓之祭是則貴賤皆宜墓祭也曰祭儀祭物如何曰朱子云畧如家祭今放其儀物為圖于下祭禮考記曰祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故君子合諸天道春禘秋嘗霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心齋之日思其居處思其笑語思其志意思其所樂思其所嗜齋三日乃見其所為齊者祭之日入室僾然必有見于其位周還出戸肅然必有聞乎其歎息之聲孝子將祭祀必有齋莊之心以慮事以具服物以脩宫室以治百事及祭之日顔色必温行必恐如懼不及愛然其奠之也容貌必温身必詘如語焉而未之然宿者皆出其立卑静以正如將弗見然及祭之後陶陶遂遂如將復入然是故慤善不違身耳目不違心思慮不違親結諸心形諸色而術省之孝子之志也按祭禮有祠有田方可舉行非仕宦不能士庶之家有事及朔望正至皆告于正寢神主前嵗時亦量力具蔬果殽羞祇薦于正寢可也如墓祭亦從俗無害但毋忽毋忘必敬必慎盡此心焉耳國朝教民榜文祝文式維某年嵗次月朔日孝孫某同闔門眷屬告于髙曽祖考妣之靈曰昔者祖宗相維鞠育子孫懷抱提擕劬勞萬狀每逢四時交代隨其寒暖増減衣服樽節飲食或憂近於水火或恐傷於蚉蟲或懼罹於疾病百計調䕶惟恐不安此心懸懸未嘗暫息使子孫成立至有今日者皆祖宗劬勞之恩也雖欲報之莫知所以為報兹者節届孟春夏秋冬天氣將温熱涼寒追感昔時不勝永慕謹備酒殽羮飯率闔門眷屬以獻尚享墓祭南軒張氏謂墓祭非古然考之周禮有冢人之官凡祭于墓為尸是成周盛時已有祭于墓者又唐開元敇許寒食上墓我朝有謁陵上陵之禮士庶遵之為墓祭焉不其情禮之俱愜耶祀土地每季仲月擇日及歲暮布席陳饌春於所居之東夏南秋西冬北隨俗設饌儀節就位主人以下序立降神詣香席前跪上香祭酒俯伏興參神再拜初獻禮跪讀祝亞獻酒三獻酒辭神再拜焚祝文禮畢祝文維年月日某官姓名敢昭告于土地之神維此仲春夏秋冬隨時惟歳暮則曰歳律將更歳功云始夏時物暢茂秋歳功將就冬歳功告畢歳暮幸兹吉安若時昭事夏秋冬改昭為報敢有弗䖍蘋藻雖微庻將誠意惟神鑒享永奠厥居尚享此祝文出大全集俗曰土地古曰中霤州縣主社家主中霤某今家於此依神而居神無大小道通為一上下通天地旁通萬物神道如此人亦如此某敢不脩其在人以敬事神祀竈歲暮祭之其饌儀節與祀土地同祝文維年月日某官姓名敢昭告于司竈之神歳云暮矣一門康吉享兹火食皆賴神休若時報事罔敢弗䖍菲禮將誠惟神顧歆尚享五祀總論言五祀之制詳於曲禮舉五祀之時著於月令辨五祀之名見於白虎通夫五祀者何謂也謂門户井竈中霤也人而知夫出處之所以安佚飲食之所以饜飫則知五祀誠不可以一闕然舉是祀者獨大夫以上得祭之位畢禄薄葢有非其所當祭者然則五祀之典其可輕乎哉是故祭戸以春取萬物始出之義祭竈以夏取火德生旺之義秋為閉藏之時故祭門於秋冬為水王之候故祭井於冬六月正土王之辰故祭中霤於六月歲僅一遍順五行也士不得祭慮黷祀也户祭先脾竈祭先肺門祭先肝井祭先腎中霤祭先心明五祀之各有所主也戸祭以羊竈祭以雉中霤祭以豚門祭以犬井祭以豕明五祀之各有所薦也吁人生而詳出處之所以安佚飲食之所以饜飫獨不可尊五祀之神乎雖然誠敬不存祭如不祭暗室有愧媚竈奚為故必視如面日星聽如耳雷霆戒謹於潔蠲藏息之日悚懼於威儀動作之間然後可以舉是祭否則謂之淫祀鬼神其歆之乎司馬氏居家雜儀凡為家長必謹守禮法以御羣子弟及家衆分之以職謂使之掌倉廪廐庫庖厨舍業田園之類授之以事謂朝夕所幹及非常之事而責其成功制財用之節量入以為出稱家之有無以給上下之衣食及吉凶之費皆有品節而莫不均一裁省冗費禁止奢華常須稍存贏餘以備不虞凡諸卑㓜事無大小母得專行必咨禀於家長易曰家人有嚴君焉父母之謂也安有嚴君在上而其下敢直行自恣不顧者乎雖非父母當時為家長者亦當咨禀而行之則號令出於一人家政始可得而治矣凡為子為婦者毋得蓄私財俸禄及田宅所入盡歸之父母舅姑當用則請而用之不敢私假不敢私與内則曰子婦無私貨無私蓄無私器不敢私假不敢私與婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如反受賜藏之以待乏鄭康成曰待舅姑之乏也不得命者不見許也又曰婦若有私親兄弟將與之則必復請其故賜而後與之夫人子之身父母之身也身已不敢自有况敢有財帛乎若父子異財互相假借則是有子婦富而父母貧者父母饑而子飽者賈誼所謂借父耰鉏慮有德色母取箕箒立而誶語不孝不義孰甚於此茝昌改切耰音憂誶音碎凡子事父母孫事祖父母同婦事舅姑孫婦亦同天欲明咸起盥音管洗手也潄櫛阻瑟切梳頭也總所以束髪今之頭􅣎具冠帶丈夫㡌子衫帶婦人冠子背子昧爽謂天明暗相交之際適父母舅姑之所省問丈夫唱喏婦人道萬福仍問侍者夜來安否何如侍者曰安乃退其不安節則侍者以告此即禮之晨省也父母舅姑起子供藥物藥物乃闗身之切務人子當親自檢數調煑供進不可但委婢僕脱若有誤即其禍不測婦具晨饈俗謂㸃心易曰在中饋詩云惟酒食是議凡烹調飲膳婦人之職也近年婦女驕倨皆不肯入庖厨今縱不親執刀匕亦當檢校監視務令精潔供具畢乃退各從其事將食婦請所欲於家長謂父母舅姑或當時家長也卑㓜各不得恣所欲退具而供之尊長舉筯子婦乃各退就食丈夫婦人各設食於他所依長幼而坐其飲食必均一㓜子又食於他所亦依長㓜席地而坐男坐於左女坐於右及夕食亦如之既夜父母舅姑將寢則安置而退丈夫唱喏婦人道安置此即禮之昏定也居閒無事則侍於父母舅姑之所容貌必恭執事必謹言語應對必下氣怡聲出入起居必謹扶衛之不敢涕唾喧呼於父母舅姑之側父母舅姑不命之坐不敢坐不命之退不敢退凡子受父母之命必籍記而佩之時省而速行之事畢則返命焉或所命有不可行者則和色柔聲具是非利害而白之待父母之許然後改之若不許茍於事無大害者亦當曲從若以父母之命為非而直行已志雖所執皆是猶為不順之子况未必是乎凡父母有過下氣怡色柔聲以諫諫若不入起敬起孝悦則復諌不悦與其得罪於鄉黨州閭寧熟諫父母怒不悦而撻之流血不敢疾怨起敬起孝楊氏復曰父母有過下氣怡聲以諫所謂幾諫也父母怒而撻之猶不敢怨况下于此者乎諫不入起敬起孝諫而怒亦起敬起孝此外豈容他念哉是説也聖人著之論語矣凡為人子弟者不敢以貴富加於父兄宗族加謂恃其富貴不率卑㓜之禮凡為人子者出必告反必面有賔客不敢坐於正㕔有賔客坐於書院無書院則坐於㕔之旁側升降不敢由東階上下馬不敢當㕔凡事不敢自擬於其父楊氏復曰告工毒反告與面同反言面者從外來宜知顔色安否為人親者無一念而忘其子故有倚閭倚門之望為人子者無一念而忘其親故有出告反面之禮生出告反面没則告行飲至事亡如事存也凡父母舅姑有疾子婦無故不離側親調嘗藥餌而供之父母有疾子色不滿容不戲笑不宴遊舍置餘事專以迎醫檢方合藥為務疾已復初顔氏家訓曰父母有疾子拜醫以求藥葢以醫者親之存亡所繫豈可傲忽也凡子事父母父母所愛亦當愛之所敬亦當敬之至於犬馬盡然而况於人乎楊氏復曰孝子愛敬之心無所不至故父母之所愛敬者雖犬馬之賤亦愛敬之况人乎哉故舉其尤者言之若兄若弟吾父母之所愛也吾其可以不愛乎若薄之是薄吾父母也若親若賢吾父母之所敬也吾其可以不敬乎若嫚之是嫚吾父母也推類而長莫不皆然若晉武惑馮紞之讒不思太后之言而疎齊王攸唐髙宗溺武氏之寵不念太宗顧託之命而誅長孫無忌皆禮經之罪人也凡子事父母樂其心不違其志樂其耳目安其寢處以其飲食忠養之㓜事長賤事貴皆倣此劉氏璟曰樂其心者謂左右侍養也晨昏定省也出入從遊也起居奉侍也必當賾討其心之所好者所惡者何在苟非悖乎大義則蔑不可從所以安固老者之行以適其氣也樂其耳目者非聲色之末也善言常入於親耳善行常悦於親目皆所以樂之也安其寢處者謂堂室庭除必完㓗簟席氊耨衾枕帳幄必脩治之類凡子婦未敬未孝不可遽有憎疾姑教之若不可教然後怒之若不可怒然後笞之屢笞而終不改子放婦出然亦不明言其犯禮也子甚宜其妻父母不悦出子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰凡為宫室必辯内外深宫固門内外不共井不共浴堂不共厠男治外事女治内事男子晝無故不處私室婦人無故不窺中門男子夜行以燭婦人有故出中門必擁蔽其面如葢頭面㡌之類男僕非有繕脩及有大故謂水火盗賊之類不入中門入中門婦人必避之不可避亦謂如水火盗賊之類亦必以袖遮其面女僕無故不出中門有故出中門亦必擁蔽其面雖小婢亦然鈴下蒼頭但主通内外之言傳致内外之物毋得輒升堂室入庖厨凡卑㓜於尊長晨亦省問夜亦安置大夫唱喏婦人道萬福安置坐而尊長過之則起出遇尊長於塗則下馬不見尊長經再宿以上則再拜五宿以上則四拜賀冬至正旦六拜朔望四拜凡拜數或尊長臨時減而止之則從尊長之命吾家同居宗族衆多冬至朔望聚於堂上此假設南面之堂若宅舍異制臨時從宜丈夫處左西婦人處右東上左右謂家長之左右皆北向共為一列各以長㓜為序婦以夫之長㓜為序不以身之長㓜為序共拜家長畢長兄立於門之左長姊立於門之右皆南向諸弟妹以次拜訖各就列丈夫西上婦人東上共受卑㓜拜以宗族多若人人致拜則不勝繁勞故同列共受之受拜訖先退後輩立受拜於門東西如前輩之儀若卑㓜自逺方致見尊長遇尊長三人以上同處者先共再拜叙寒暄問起居訖又三再拜而止晨夜唱喏萬福安置若尊長三人以上申處亦三而止所以避煩也凡受女壻及外甥拜立而扶之扶謂搊策外孫則立而受之可也凡節序及非時家宴上壽於家長卑㓜盛服序立如朔望之儀先再拜子弟之最長者一人進立於家長之前長者一人搢笏執酒盞立於其左一人搢笏執酒注立於其右長者搢笏跪斟酒祝曰伏願某官備膺五福保室宜家尊長飲畢授㓜者盞注反其故處長者出笏俛伏興退與卑㓜皆再拜家長命諸卑㓜坐皆再拜而坐家長命侍者徧酢諸卑㓜諸卑㓜皆起序立如前俱再拜就坐飲訖家長命易服皆退易便服還復就坐凡子始生若為之求乳母必擇良家婦人稍温謹者乳母不良非惟敗亂家法兼令所飼之子性行亦類之子能食飼之教以右手子能言教之自名及唱喏萬福安置稍有知則教之以恭敬尊長有不識尊卑長㓜者則嚴訶禁之古有胎教况於巳生子始生未有知固舉以禮况於巳有知孔子曰㓜成若天性習慣如自然顔氏家訓曰教婦初來教子嬰孩故於其始有知不可不使之知尊卑長㓜之禮若侮詈父母歐撃兄姊父母不加訶禁反笑而奬之彼既未辨好惡謂禮當然及其既長習以成性乃怒而禁之不可復制於是父疾其子子怨其父殘忍悖逆無所不至葢父母無深識逺慮不能防微杜漸溺於小慈養成其惡故也六歲教之數謂一十百千萬與方名謂東西南北男子始習書字女子始習女工之小者七歲男女不同席不共食始誦孝經論語雖女子亦宜誦之自七歲以下謂之孺子早寢晏起飲食無時八歲出入門户及即席飲食必後長者教之以謙讓男子誦易書女子不出中門九歲男子誦春秋及諸史始為之講解使曉義理女子亦為之講解論語孝經及列女傳女戒之類畧曉大意古之賢女無不觀圖史以自鑒如曹大家之徒皆精通經術議論明正今人或教女子以作歌詩執俗樂殊非所宜也十歲男子出就外傅居宿於外讀詩禮傳為之講解使知仁義禮智信自是以往可以讀孟荀揚子博觀羣書凡所讀書必擇其精要者而讀之如禮記學記大學中庸樂記之類他書倣此其異端非聖賢之書傅宜禁之勿使妄觀以惑亂其志觀書皆通始可學文辭女子則教以婉娩娩音晩婉娩柔順貌聽從及女工之大者女工謂蠶桑織績裁縫及為飲膳不惟正是婦人之職兼欲使之知衣食所來之艱難不致恣為奢麗至於纂組華巧之物亦不必習也未冠筓者質明而起總角靧靧音悔洗面也面以見尊長佐長者供養祭祀則佐執酒食若既冠筓則皆責以成人之禮不得復言童㓜矣凡内外僕妾雞初鳴咸起櫛總盥潄衣服男僕灑掃㕔事及庭鈴下蒼頭灑掃中庭女僕灑掃堂室設椅桌陳盥漱櫛靧之具主婦主母既起則拂牀襞襞音壁疊衣也也侍立左右以備使令退而具飲食得間則浣濯紉縫先公後私及夜則復拂牀展衾當晝内外僕妾惟主人之命各從其事以供百役凡女僕同輩謂兄弟所使謂長者為姊後輩謂諸子舍所使謂前輩為姨内則云雖衣服飲食必後長者鄭康成曰人貴賤不可以無禮故使之序長㓜務相雍睦其有鬬爭者主父主母聞之即訶禁之不止即杖之理曲者杖多一止一不止獨杖不止者凡男僕有忠信可任者重其禄能幹家事次之其專務欺詐背公徇私屢為盗竊弄權犯上者逐之凡女僕年滿不願留者從之勤舊少過者資而嫁之其兩面二舌飾虛造讒離間骨肉者逐之屢為盗竊逐之放蕩不謹者逐之有離叛之志者逐之四禮總論禮也者禮也人之有禮也猶其有是體也體不備不可以成人禮不備其得謂之人乎先王之世教明而化成上自王公大人而下至於比閭族黨無非禮樂之布濩忽然而有不由禮之人出于其間則將視而駭之如鬼物然故相鼠之詩曰人而無禮胡不遄死言其自絶於人道也及教之衰禮俗廢壞士以詞藝為學而吏以法律為師相尚以鄙詐相便以易慢間有讀先王之典則將視而駭之噫何其與古異也四禮成讀而嘆曰是固貌人之形也畫師之貌人也耳目鼻口四肢百體毛髪爪甲儼然成人矣而精神命脈則非畫之所能載也仁也者人之精神命脈也古之君子無終食之間違仁造次於是顛沛於是舉富貴貧賤無所於奪故所履中正而禮行焉所樂和平而樂生焉禮樂之文非自外至也由中出者也由人之精神命脈完固而凝定則晬然見面盎背以施於四體無弗順正而克盡者矣故冠筓之禮所以重男女之始也婚娶之禮所以謹夫婦之交也喪祭之禮所以愛親敬長也雜儀所以正家也鄉約所以睦鄉也皆仁之推也若徒以崇其儀節肄其聲容而無忠信惻怛以主之是精脈枯竭而支體爪髪徒存終亦必亡而已凡我士民相與反而誠於身篤其實以充其華盡其自有之禮以自别於禽獸匪直為觀美而已聖朝禮樂之化其庶有小補乎辨深衣之制禮記深衣古者深衣葢有制度以應規矩繩權衡短母見膚長母被土續衽鈎邊要縫半下袷之髙下可以運肘袂之長短反詘之及肘帶下母厭體上母厭脅當無骨者制十有二幅以應十有二月袂環圜以應規曲袷如矩以應方負繩及踝以應直下齊如權衡以應平故規者行舉手負繩抱方以直其正方其義也故易曰坤六二之動直以方也下齊如權衡者以安志而平心也五法已施故聖人服之規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅完且弗費葢衣之次也具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純袂縁純邊廣各寸半黄帝堯舜垂衣裳而天下治取諸乾坤有乾必有坤而乾上坤下其定分也衣裳之製所由起也凡衣之制未有有衣而無裳者然乾足以統夫坤衣獨不可以該夫裳乎衣與裳必欲分裁以相綴此深衣之制所以不明于後世也何也因其名而度其制此衣既以深名則不必兼夫裳而後深也味及踝之義固知其深若裳之及踝亦其裳焉耳况深衣之及踝豈獨謂其無裳哉朱子謂今之公服上衣下裳相屬者也上即謂之衣下即謂之裳何獨衣之深者必欲兩折裁裳以相綴而不可以相屬哉或曰衣裳凡今之公服莫不然也以之製深衣可也記云制十有二幅以應十有二月此以裳名始與制合雖欲不分裁以相綴也其可得乎果如此言何為獨詳夫裳之制渾不及衣也且負繩及踝以應直既裳與衣分而背之縫安得其直如繩耶若謂衣之縫與裳之縫固如繩焉則裳十二幅顛倒斜裁豈不論闊狹惟取兩縫之相當為然哉或曰衣裳相屬其縫自直無疑也十二幅之制何居葢統論衣之制也身材兩幅兩袖各兩幅襟内兩幅脅兩旁當要縫半下處各兩幅非十二幅而何完且弗費正謂此也然則曲袷如矩以應方必有取于四方之制而後愜乎葢凡衣除員領之外其領未有不曲而方者即今常服大領之制是也若續衽鉤邊惟玩味續字則非對襟之制也明矣至于規矩平直與夫袷袂之度純縁之色則本文已詳不必更為之説嘗考之有虞氏深衣而養老諸侯大夫夕皆深衣將軍文子除喪而受越人弔練冠深衣親迎女在塗壻之父母死深衣縞總以趨喪自天子至庶人貴賤吉凶皆可服也故曰可以為文為武擯相治軍旅也取其簡而便也後之製深衣者何其繁且難哉自鄭康成注曲禮以贄為至而後世始以贄為言禮之至自班固纂白虎通以質為質而後世始以贄為質已之誠夫古人相見之禮必有質者所以明贄守之義而致已之敬也故公侯以玉卿以羔大夫以鴈士以雉以公侯卿大夫士而所質不同者是必有等差之辨也姑試論之葢公卿之德欲其精白純粹而玉者取其燥不輕濕不重之義故公侯之贄必以玉也九卿之職貴於盡忠率下而羔者取其羣而不黨之義故九卿之贄必以羔也大夫之職在於奉命通四方而鴈者取其俟時而行之義故大夫之贄必以鴈也士之氣節本乎剛方勁直而雉者取其死不失節之義故士之贄者必以雉也不然古人何以為是區别哉然卿大夫質古以麑鹿今以羔鴈而公侯士之䞇惟用玉與雉何耶吁此可以公侯之德有常而士以一介仗節不變也孔氏釋書類皆亡據有如舜之東巡肆覲東后雖曰脩五禮五玉三帛二生一死贄而未嘗有纁元黄之説與夫羔鴈雉之言此孔氏據周禮大宗伯之文因以意而解之其失亦甚矣且禮諸侯所執者玉而已幣帛禽鳥皆非所執也葢彼據周官書有執之文孔氏之失正自周官書誤之也大宗伯以禽作六摯以等諸臣曰孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞據春秋魯莊公娶夫人使宗婦以幣見春秋書曰大夫宗婦覿用幣不聞其執帛也惟左氏曰禹㑹諸侯於塗山執玉帛者萬國葢用玉帛連文其實執玉奠帛也若信周禮謂帛可執則皮亦可執乎烏乎執乎帛猶可也曰羔鴈雉之物其可執乎方卿大夫之見天子鞠躬屏氣傴僂不暇而乃手執羔執鴈執雉果謂禮容乎至尊之前羔鴈生禮執持惟恐或失不知何如拜趨俯伏乎至於執死雉以見君豈其宜哉且必取此三物何義鄭氏曰卿執羔者取其羣而不失其類或曰羔羣而不黨凡鳥獸各以其類聚何特羔不失其類乎又安知羔之不黨乎陋説之甚也大夫執鴈者取其俟時而行如大夫之隨君也凡人臣皆當隨君而大夫獨取此義何耶士執雉者謂士當如雉耿介為君致死也凡為人臣者皆為致君死何特士也哉若如所説則卿之所執亦可以為大夫之所執大夫之所執亦可以為士之所執皆不通之説葢作周官書者但見舜典上有五玉之文以玉為可執則下之三帛二生一死之物皆可執諸侯既執玉矣則其餘所執者不得不强以孤卿士大夫當之是不思之甚不知舜典之旨不然舜之行狩諸侯各執玉以見而三帛二生一死之物特以為贄見之禮爾古者君臣相見必以土地所生之物而為之贄康王之誥曰皆布乘黄朱賔稱奉主兼幣曰一二臣衛敢執壞奠方康王既為天子諸侯皆布四黄馬朱鬛以為庭實謂之壤奠舜之諸侯以三帛二生一死贄者亦壤奠之謂也禽鳥之物性馴擾者則生致之性耿介者則死致之此皆使人致之於天子天子受其贄而還其玉故曰如五器卒乃復使孤卿大夫士常執之物天子不容受之不與五器俱復也觀此則可見執羔執帛等之説為謬矣執帛執羔固不可而又謂庶人執鶩工商執雞愈可鄙也謂之孤卿執鷙何所見耶此又因舜典之文而増益之惑世之甚也矣士相見禮考儀禮曰士相見之禮摯用雉左頭奉之曰某也願見無由達某子以命命某見主人對曰某子命某見吾子有辱謂吾子之就家也某將走見賔對曰某不足以辱命請終賜見主人對曰某也固辭不得命敢不敬從出迎于門外再拜賔荅再拜主人揖入門右賔奉摯入門左主人再拜受賔再拜送摯出主人送于門外再拜下大夫相見以鴈飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結于面左頭如麛執之如士相見之禮始見于君執鷙至下容彌蹙庶人見于君不為容進退走凡言非對也安而後傳言與君言言使臣與大人言言事君與老者言言使弟子與㓜者言言孝弟于父兄與衆言言忠信慈祥與居官者言言忠信凡與大人言始視面中視抱卒視面母改衆皆若是若父則遊目母上於面母下於帶若不言立則視足坐則視膝凡侍坐于君子君子欠伸問日之早晏以食具告改居則請退可也夜侍坐問夜膳畢請退可也大夫則辭退下比及門三辭若先生異爵者請見之則辭辭不得命則曰某無以見辭不得命將走見先見之凡執幣者不趨容彌蹙以為儀執玉者則唯舒舉武前曳踵按古者士之相見儀文曲折而心本忠誠體貌謙恭而事實簡易如摯用雉鴈羔麛達其情耳後世漸加以貨幣遂至視多寡為厚薄尚德之風微矣賔主相接揖讓有度尊揖卑者拱手卑揖尊者磬折稍有差等恭敬自存今則折腰掃地卑伏失容足恭過禮虛文盛而實德衰矣夫相見之禮止于再拜後世以親師尊長加至四拜前輩襲以為常近則漫無隆殺増益日多恭而無禮則勞何為者哉古人接談隨在皆有規警使人正聽而無邪思近世忠信薄而人心叵測忌諱多而直道難行面諛背憎言不由衷喋喋何益哉夫尊卑相交瞻視有式古人容貌辭氣罔不將之以令儀故卒度卒獲一以敬為主耳若夫心志靡定自遊目失常斯有上傲下憂傾姦之病可不慎與鄉相見儀附諸司職掌凡民間子孫弟姪甥壻見尊長生徒見師範奴婢見家長久别行四拜禮尋常近别行揖禮其餘親戚長㓜照依等第久别行兩拜禮尋常近别行揖禮平交同洪武五年三月定官民相見禮凡子孫之於祖父母父母毎旦必詣前肅揖若逺出隔旬日而見及節序慶賀皆四拜餘尊長亦然若尊長之疎逺行肅揖禮逺出隔旬日而見及節序慶賀止行兩拜禮凡民間平交者亦如之凡鄉黨序齒民間士農工商人等平居相見揖拜之禮㓜者先施歲時宴㑹坐次之則長者居上如佃户見佃主不論序齒並行以少事長之禮若親屬不拘主佃止行親屬禮十二年令内外官致仕居鄉惟於宗族序尊卑如家人禮於其外祖父妻家亦序尊卑若筵宴則設别席不許坐於無官者之下如與致仕官㑹則序爵爵同序齒其與異姓無官者相見不須答禮庶民則以官禮謁見敢有凌侮者論如律十六年五月禮部言百官軍民人等於御前及東宫親王前叩頭禮者所以達感戴懇切之誠也今於官長前往往亦行此禮甚為未當宜申禁之其行者受者俱坐以罪從之二十年頒禮儀定式以五拜為臣見君之禮四拜為子見親之禮餘雖貴不過二拜圖書編卷一百十一
