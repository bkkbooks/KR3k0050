body:
  text: 圖書編卷三十一明章潢撰禹貢九州總叙昔堯時禹别九州至舜分為十二州周職方復分為九州而又與禹異漢承秦分天下為郡國而復以十三州統之晉時分州為十九自晉以後為州罙多所統罙狹且始建之地亦不一所姑以揚州言之自漢以來或治歴陽或治夀春或治曲阿或治合肥或治建業而唐始治廣陵至南北分裂之後務為夸大僑置諸州以㑹稽為東京口為南廣陵為南兖歴陽為南豫歴城為南冀襄陽為南雍魯郡在禹跡為徐州而漢則屬豫州所領陳留在禹跡為豫州而晉則屬兖州所領離析磔裂循名失實而禹跡之九州罙不獲可考矣夾漈鄭氏曰州縣之設有時而更山川之秀千古不易故禹貢分州必以山川定疆界使兖州可移而濟河之兖州不可移梁州可遷而華陽黒水之梁不可遷故禹貢為萬世不易之書後之作史者主於郡縣故州縣移易其書遂廢矣善哉言也杜氏通典亦以歴代郡縣析於禹九州之中今所論著九州則以禹跡所統為準庶歴代之郡縣可考矣禹貢奠髙山大川其九州之名以地名州而不以州分地葢荆衡萬古不徙之山而河濟者萬古不冺之水也以故荆兖之名得附河濟荆衡而不滅萬世而下求禹貢九州之域者皆可得而考也九州惟冀無所至者舉八州而界自見亦所以别帝都而大一統也九疇之皇極貢法之公田見於此矣揚不言南青雍不言北以其境接外國提封叛服不常乎古九州冀州禹貢曰冀州既載壺口雷首至於太嶽既修太原至於岳陽太原霍山覃懐底績至于衡漳厥土惟白壤恒衛既從太陸既作島夷皮服夾右碣石入于河舜以冀州南北濶大分衛水為并州燕以北為幽州並置牧周禮職方曰河内曰冀州山曰霍藪曰楊紆川曰漳浸曰汾潞其利松栢人五男二女畜宜牛羊榖宜麥稷東北曰幽州其山川毉無閭藪曰貕養川曰河泲浸曰菑時其利魚鹽人一男三女畜宜四擾榖宜三種正北曰并州山曰恒山藪曰昭餘祁川曰虖池漚夷浸曰淶易其利布帛人二男三女畜宜五擾榖宜五種其地險易帝王所都亂則冀安弱則冀强荒則冀豐故曰冀州風俗冀州堯都所在疆域尤廣山東之人性緩尚儒仗氣任俠而鄴郡髙齊國都浮巧成俗山西土瘠其人勤儉而河東魏晉以降文學盛興閭井之間習於成法并州近邊俗尚武藝左右山河古稱重鎮寄任之者必文武兼資焉揚州禹貢曰淮海惟揚州彭蠡既豬陽鳥攸居三江既入震澤底定篠簜既敷草夭木喬厥土塗泥島夷卉服沿于江海達于淮泗舜置十二牧揚其一也周禮職方曰東南曰揚州其山曰㑹稽藪曰具區川曰三江浸曰五湖其利金錫竹箭民二男五女畜宜鳥獸榖宜稻揚州以為江南之氣躁勁厥性輕揚亦曰州界多水水波揚也風俗揚州人性輕揚而尚鬼好祀每王綱解紐宇内分崩江淮濵海地非形勢得之與失未必輕重故不暇先爭然長淮大江皆可拒守閩越遐阻僻在一隅憑山負海難以得撫永嘉之後帝室東遷衣冠避難多所萃止藝文儒術斯之為盛今雖閭閻賤品處力役之際吟詠不輟葢因顔謝徐庾之風扇焉兖州禹貢曰濟河惟兖州九河既道雷夏既澤灉沮㑹同厥土黒墳其草繇其木條浮于濟漯達于河浮于汶達于濟舜置十二牧兖其一也周禮職方曰河東曰兖州其山曰岱藪曰大野川曰河泲浸曰盧濰其利蒲魚人二男三女畜宜六擾榖宜四種葢以兖水為名又兖之為言端也信也風俗兖州舊疆界于河濟地非險固風雜數國秦漢以降政里混同人情朴厚俗有儒學及西晉之末為戰爭之地三百年間傷夷經甚自宇内平一又如近古之風焉青州禹貢曰海岱惟青州嵎夷既畧濰淄其道厥土白墳海濵廣斥萊夷作牧舜分青州為營州皆置牧周以徐州合青州其土益大周禮職方曰正東曰青州其山曰沂藪曰孟豬川曰淮泗浸曰沂沭其利蒲魚人二男二女畜宜鷄狗榖宜稻麥葢以土居少陽其色為青故曰青州風俗青州古齊號稱强國憑負山海擅利鹽鐵太公用之而稱富管仲資之而稱霸人情變詐好行機術豈因輕重而為弊乎固知𨗳人之方先務推以誠信逮于漢氏封立近戚武帝臨極儒雅盛興晉惠之後淪沒僭偽慕容建國二代而亡今古風俗頗革亦有文學自國初立都督府命親王鎮之後漢氏之制信可取也徐州禹貢曰海岱及淮徐州淮沂其又蒙羽其藝厥土赤殖草木漸苞羽畎夏狄嶧陽孤桐浮于淮泗達于河亦舜十二牧之一周併徐州屬青州今分入兖州之域葢取舒緩之義或云因徐丘以為名風俗徐方鄒魯舊國漢興猶有儒風自晉失其政天下分製分居二境尤被傷殘彭城要害藩捍南國必爭之地常置重兵數百年中無復講誦況今去聖久逺人情遷蕩大抵徐兖其俗畧同䂊州禹貢曰荆河惟豫州伊洛瀍澗既入于河滎波既豬導菏澤被孟諸厥土惟壤下土墳壚浮于洛河舜為十二牧之一周禮職方河南曰豫州其山曰華藪曰圃田川曰滎雒浸曰波溠其利麻漆絲枲人二男三女畜宜六擾種宜五榖風俗荆河之間四方輻輳故周人善賈趨利而纎嗇韓國分野亦有險阻自東漢魏晉宅於洛陽永嘉以後戰爭不息元魏徙居纔過三紀建平二魏爰及齊周河洛汝潁迭為攻守夫土中風雨所交宜乎建都立社均天下之漕輸便萬國之享獻不恃隘害務修徳刑卜代之期可延久也雍州禹貢曰黒水西河惟雍州弱水既西涇屬渭汭漆沮既從灃水攸同荆岐既旅終南惇物至于鳥鼠原隰底績至于豬野三危既宅三苗丕叙厥土黄壤浮于積石至于龍門西河㑹于渭汭舜置十二牧雍其一也以其四山之地故曰雍州周禮職方正西曰雍州其山曰嶽藪曰弦蒲川曰涇汭浸曰渭洛其利玉石人三男二女畜宜馬牛榖宜黍稷兼得禹貢梁州之地矣風俗雍州之地厥田上上鄠杜之饒號稱陸海四塞為固披山帶河秦氏資之遂平海内漢氏髙帝納婁敬説入都焉又徙齊諸田楚昭屈燕韓趙魏之後及豪族名家於闗中强本弱末以制天下自是每因諸帝山陵則遷户立縣率以為常故五方錯雜風俗不一漢朝京輔稱為難理其安定彭原之北汧陽天水之西接近邊陲多尚武節自東漢魏晉羌氐屢擾旋則苻姚迭據五凉更亂三百餘祀戰爭方息帝都所在是曰浩穰其餘郡縣習俗如舊荆州禹貢曰荆及衡陽惟荆州江漢同歸於海九江孔殷沱灊既道雲土夢作乂浮于江沱潜漢逾于洛至于南河舜置十二牧荆其一也周禮職方曰正南曰荆州其山曰衡藪曰雲夢川曰江漢浸曰潁湛其利丹銀齒革民一男二女畜及榖宜與荆州同荆强也言其氣躁强亦言荆驚也或取名於荆山焉葢蠻夷之國槃瓠之種即大戎詩人所謂蠻荆也風俗荆楚風俗畧同揚州雜以蠻夷率多勁悍南朝鼎立皆以為重鎮然兵强財富地迫勢危稱兵䟦扈無代不有是以上游之寄必詳擇其人焉梁州禹貢曰華陽黒水惟梁州岷嶓既藝沱灊既道蔡蒙旅平和夷底績厥土青黎自漢川以下諸郡皆其封域舜置十二牧梁其一也以西方金剛其氣强梁故曰梁州周禮以梁州併雍州當夏殷之間為蠻夷之國所謂巴賨彭濮之人也風俗巴蜀之人少愁苦而輕易淫佚周初從武王勝殷東遷之後楚子强大而役屬之暨於戰國又為秦有資其財力國以豐贍漢景帝時文翁為蜀郡守建立學校自是蜀士學者比齊魯焉土肥沃無㓙嵗山重複四塞險固王政微缺䟦扈先起故一方之寄非親賢勿居南越自嶺而南當唐虞三代為蠻夷之國是百越之地亦謂之南越古謂之雕題非禹貢九州之域又非周禮職方之限晉志隋書並㑹交廣之地為禹貢揚州之域云風俗五嶺之南人雜夷獠不知教義以富為雄珠崖環海尤難賔伏是以漢室嘗罷棄之大抵南方遐阻人强吏懦豪富兼併役屬貧弱俘掠不忌古今是同其性輕悍易興逆節爰自前代及于國朝多委舊徳重臣撫寧其地也統論九州風俗司馬温公曰國家之治亂本于禮而風俗之善惡繫乎習赤子之啼無有五方其聲一也及其長則言語不通飲食不同有至死莫能相為者是無他所習異也至于古今亦然有服古之衣冠于今之世則駭于州里矣服今之衣冠于古之世則僇于有司矣衣冠烏有是非哉習與不習而已矣夫民朝夕見之其心安焉以為天下之事正應如此一旦奪之使去而就彼則無不憂疑而莫肯從矣昔秦廢井田而民愁怨王莽復井田而民亦愁怨趙武靈王變華服效夷服而臣下不悦彼魏孝文帝變夷服效華服而羣下亦不悦由此觀之世俗之情安于所習駭所未見固其常也是故上行下傚謂之風薫蒸漸漬謂之化淪胥委靡謂之流衆心安定謂之俗及風化已失流俗已成則雖辨智弗能諭也强毅不能制也重賞不能勸也嚴刑不能止也自非聖人得位而臨之積百年之功莫能變也總論九州風土唐虞三代風化尚矣春秋以降列國殊俗去古未逺自秦漢以後千八百年總天下風土五變愈下葢自漢迄西晉一變六朝南北至周隋一變隋唐至安史之亂一變五代一變宋金之交又一變安史滅君臣之義未盡至五代則㡬矣六朝南北正統未絶迨金宋則危矣是皆闗天地大運非若春秋戰國異政殊俗專可以人事論也故今之天下四海九州特山川所隔有聲音之殊土地所生有飲食之異小小習尚不同謂之土俗可也其好惡趨向則繫乎一氣之運一代之治不得以異俗書也然自漢以來亦不得不考古以証今必欲其道徳一風俗同焉噫我太祖髙皇帝旋乾轉坤雷厲風行復古帝王所自有之疆土明厥初生民所固有之彛倫禮樂衣冠九州一致以功言之雖湯武不得與之比隆迨列聖相承二百餘年禮教漸被民之心志耳目惟時之政令教誨是訓是傚由此一變至道易易也振作鼓舞返樸還淳祛佛老之詖亂崇周孔之正學以求復唐虞三代風化誠于今之司風教者有厚望焉冀州之域今山西之太原府平陽府大同府潞安府汾州澤州沁州遼州所屬河南之懐慶府彰徳府衛輝府所屬北直𨽻之順徳府真定府順天府宣府河間府永平府廣平府大名府之滑縣濬縣開州長垣縣𨗳河云至大伾今大伾在濬縣故知濬滑在冀州之域古志謂開州長垣在河故道之北則知開州長垣亦在冀州之域冀三面皆河東北阻陰山一帶故河折而南流為冀西河至華陽折而東流為冀南河至大伾折而北流為冀東河自西河出孟門之下南河壅砥柱之西東河縈旋於大陸之野故禹首事壺口梁岐等處以殺河勢大原則汾水所出大岳則汾水所經也兖州之域山東濟南府所屬濟河禹城臨邑長清肥城青城陵縣泰安州新泰萊蕪徳州徳平平原武定陽信海豐樂陵商河濵州利津霑化蒲臺東昌府所屬州縣兖州府陽谷東阿平陰東平汶上夀張直𨽻大名府所屬元城大名南樂清豐内黄開州冀長垣東明魏縣河南開封府所屬延津封丘原武陽武胙城河間府吳橋縣有黄河故道而滄州古志徒駭在滄州廢清池縣太史簡潔在本州南皮縣馬頰在景州東光縣胡蘇鬲津在滄州慶雲縣鈎盤在獻縣此九河相去不逺又與黄河故道相近葢先儒皆于紙上求之此古志得之士人父老之相傳為是所謂禮失求之于野者况有文典可徵乎一則近海一則在正北一則相去不逺似當時分合之迹河雖為冀兖之界然兖地下九河之分則皆在兖地而其治之也惟兖為多故九河於兖言之兖不言山多平地也青州之域山東之青州府萊州府登州府濟南所屬歴城章丘鄒平淄川長山新城齊南濟陽及遼東廣寧以東濰水出山東青州府莒州箕屋山莒州即箕縣也經本府諸城入萊州府髙密經本府昌邑濰縣東北入海濰縣即都昌也淄水出本省濟南府泰安州萊蕪縣原山北入本省青州府臨淄至博興縣入濟博興即博昌今却至夀光入青州北據海西南距岱據謂跨之也故海北遼東西之地皆青州之域舜十二州青州為營州即遼東也淄汶雖俱出原山惟汶入濟淄濰二水俱不達于河徐州之域南直𨽻徐州所屬淮安府海州所屬邳州所屬淮安府桃源縣沭陽縣清河縣安東縣山東青州府所屬莒州沂水日照安丘諸城蒙陰兖州府所屬金鄉魚臺城武單縣濟寧州嘉祥鉅野鄆城曹州南境曹縣定陶揚徐二州當以淮為界淮北為徐淮南為揚徐即魯境其川莫大於淮淮受泗沂泗受漷沭大野即鉅野澤今南旺湖是也大江以北長河以南諸水皆與大野相聨屬在當時已為入貢之路揚州之域南直𨽻應天府揚州府鎮江府蘇州府常州府松江府池州府徽州府寧國府太平府安慶府廬州府鳳陽府淮安府所屬山陽縣監城縣廣徳州和州滁州浙江杭州府嚴州府嘉興府湖州府金華府衢州府處州府温州府寧波府紹興府台州府江西南昌府饒州府廣信府臨江府吉安府瑞州府袁州府贛州府南安府建昌府撫州府九江府所屬瑞昌縣南康府揚北距淮南距海中貫長江大江之南西偏諸水莫大於彭蠡東偏之水莫大於震澤三江即震澤下流荆州之域湖廣武昌府漢陽府荆州府岳州府襄陽府襄陽縣宜城南漳房縣徳安府黄州府辰州府永州府長沙府寶慶府衡州府常徳府沔陽州承天府舊安陸州靖州郴州永順軍民宣慰使司保靖軍民宣慰使司施州衛所屬大田軍民千户所散毛宣慰司所屬郴江西袁州府所屬萍鄉縣吉安府所屬龍泉縣永寧縣所屬建昌地四川䕫州府巫山縣大昌縣大寧縣荆州據荆山南及衡山之陽江漢發源于梁入海于揚而二水㑹合于荆故曰朝宗于海九江即今洞庭諸水是也豫州之域河南開封府祥符縣陳留杞縣通許太康尉氏洧川鄢陵扶溝中牟蘭陽及六州所屬河南府所屬南陽府所屬汝寧府所屬湖廣襄陽府均州鄖縣上津竹山光化棗陽榖城山東曹州西南地及定陶縣據地勢則直𨽻之東明當亦屬豫豫于九州為中土南跨漢抵荆山北距南河洛自西來中分豫境受伊瀍澗三水以入于河梁州之域四州成都府重慶府順慶府保寧府叙州府馬湖府潼川州所屬眉州所屬瀘州所屬雅州所屬䕫州府所屬奉節雲陽萬縣開縣達縣新寧梁山建始陜西鞏昌府成縣西和泰州漢中府金州所屬及沔縣芒部軍民府龍川宣撫司平茶洞長官司疊溪軍民千户所湖廣施州軍民指揮使司西境其烏蒙等處原不係域中者不載梁東據華山之南西距黒水岷山江源所自出嶓冡漢水所自出凡蜀中山南谿谷諸水皆至江謂之沱山北谿谷諸水皆至漢謂之潛雍州之域陜西西安府延安府慶陽府平涼府鳳翔府臨洮府鞏昌府所屬隴西安定㑹寧通渭漳縣寧逺伏羌階州徽州兩當漢中府所屬南鄭褒城城固洋縣西鄉鳳縣畧陽陜西行都司所屬及岷州衛洮州衛文縣守禦千户所古沙州又據岷嶓既藝則鞏昌府大半當屬梁州據西傾因桓是來則臨洮州縣亦當有屬梁者雍西距黒水東據河弱水既西者衆水皆東惟此水獨西也雍水莫大於渭中貫雍境涇漆沮皆在渭水之北涇自北來注渭漆沮自東北來注渭惟灃水在渭之南自東南來注于渭九州總論禹别四海為九州宜若有均一之制而校其道里廣狹全不相侔濟河兖州淮岱徐州相去不能千里荆河豫州千里而近海岱青州千五百里而縮荆山衡陽荆州二千里而遙東海西河冀州二千里而近夀春之淮潮陽之海揚州相去且五千里龍門之黄河燉煌之黒水雍州相去以西千里至華陽黒水竆數千里而未知所經是何廣狹之殊也或者九州之别品殊墳壤因土宜而别也故其道里無得而均然而荆河淮濟之間徐兖豫三州之境也截長補短不能當淮海一州之半借使三州土壤既殊不可得而并揚州之大獨不得而釐耶古今名儒訓釋禹貢多矣未始及此葢難言之也竊嘗討之九州之别葢倣井田之法田井之法始于黄帝方里而井九百畆中為公田八家皆私百畆同養公田而九州之制一州為王圻八州建國以蕃王室是同養公田之義也故其區别境壤不因土宇之小大不限山川之間阻唯據民田多寡而均之耳然而四海之内夷險不齊如荆河淮濟之間百舍坦夷萬頃一瞬而又當中原要區民力修地利盡良疇既闢曠土實稀故三州徐兖豫境土最為狹也至淮漢以南揚州淮南荆州漢南函劍以西雍州在函谷之西梁州在劍閣之西江湖盡濫闗山重複又僻在遐陬濶疎稼政平土葢寡闢田甚難故四州境土最為濶也嘗考西漢之時去古未逺方其極甚九有民户總計千二百餘萬而徐兖豫三州當五百五十萬户而荆揚雍梁四州僅當三百萬户夫民非榖不生榖非民不殖推其户口之多寡足以見田疇之廣濶據今驗古畧可知則九州之别唯民田是均㫁可考矣鳴呼治有本要帝王一道其來久矣神農之教曰金城千仭湯池百步帶甲百萬而無粟不能守也故舜咨十二牧以食哉惟時洪範八政以食為首周官九軄以農為先誠以國以民為本民以食為命而食非田不給非民不耕有田而後可以賦民有民而後可以立市朝建國家故先王所重唯民與田其所以體國經野設官分職侯甸之制軍國之用皆取足於民田故官無閒冗則兵無聚散家無豐儉民無勞逸而國有致一之歛民有不二之業有田斯墾有榖斯積雖遇水旱兵㐫而民無菜色故得禮節著而榮辱彰時雍之治由之而致也爰自秦開阡陌而廢井田罷侯置守以要害為先而不復以民田為制魏晉而下因仍不改坐水陸而建都㑹革山河而峙城郭民物所聚南畆實遥形勢之地良田更寡至於平土多疇衣食所資則反以為敞夷不守之地而不知務大抵所重非所本所本非所重先王之制數口之家受田一頃後世邊隅小邑民户不盈數百則地利安能有盡至名大郡多至數十萬户則又安能有數十萬頃之田乎民無常産則荒於末業有天下國家者既不能為之閑禁又從因之以䂓利遂致不耕之民多於南畆有司者徒知日計之有餘而不知嵗計之不足也古之三年耕必有一年之蓄謂人皆土墾也今耜耒之民僅能當天下十之三使嵗皆有年則斯民僅能糊口設一榖不登所在不免告糴然後知先王之制所以為後世生民之計矣後王之治所以有愧前王者匪惟徳教之有虧固亦法制之未良也嗟乎今之天下亦古之天下豈先王之制唯可行於古之天下而不復可行於後世耶抑亦復之者未得其漸耳捨先王經國之制未易遽服而先王愛民之心詎可弭忘哉後王之治信能一政之設一令之施惟民與田是崇是重則王制雖未必更張而時雍之治豈云難致因考九州之制知先王以民田為重故備論於此庶㡬按九州之國則足以見先王之心無徒論其道里逺近山川夷險而已崑崙九州鄒衍言九州之外復有九州載於史記按其説曰東南神州曰旦土旦音與晨同正南卭州隋書作迎曰深土西南戎州曰滔土正南弇州隋書作拾州曰升土正中冀州曰白土西南柱州曰肥土西北𤣥州隋書作營州曰成土東北咸州曰隠土管子作急土正東陽州曰信州其言本荒唐漢唐人作河圖括地象全祖其説隋代郊天遂以其名入從祀之位史炤通鑑釋文曰此九州其崑崙統四方之九州乎或曰神農地過日月之表葢神農之九州也柱州一本作桂州營州一本宫州近是𤣥與宫相近未知孰正九有左傳九丘八索九丘即九州也八索即八澤也見淮南子或以八索為八卦謬矣通鑑外記云人皇氏依山川土地之勢財度為九州謂之九有各居其一而為之長人皇居中州以制八輔此引春秋命厯敘文也九有取育草為義即後世所謂九州也中州則人皇之都所謂寓逢中囿也八輔則餘八囿也囿亦作有古字省文書以有九有之師詩九有有截又奄有九有作九有解義尤明暢左傳謂之九藪陽紆雲夢之屬總而言之九有也九囿也九州也九藪也一也九州區域九州之區域在昔顓頊及于陶唐分而為九其制最大雍州西據黒水東距西河豫州西南至荆山北距河冀州唐虞之都以餘州所至則是其境兖州舊為濟河之間青州東北據海西距岱徐州東距海北至岱南及淮梁州東據華山之陽西距黒水揚州北據淮東南距海荆州北據山南及衡山之陽其雍州西境流沙之西荆州南境五嶺之南所置郡縣並非九州封域之内禹貢一篇葢夏史之追書也夫既夏史之追書則紀成功之書爾夫既紀成功之書則禹之治水其先後次第䂓模不盡見於此而於此可以推見爾何者禹貢於九州獨冀州載修治之辭於上餘州則皆曰某山既藝既旅某水既道既從某澤既豬底定是皆紀其成功耳其先後次第不盡見於此矣而謂於此可以推見何也曰禹貢一篇分敘九州以經之數敘山川以緯之每州之下奠山川豬藪澤而後繼之以物土宜定田制又繼之以經賦法通朝貢其總敘於後則列山川敘原委總成功定封建别限制同教化是禹八年之間其先後次第經理䂓模廣大周密本末具備葢可想見而其先後次第則証諸禹所自言者而尤可見禹曰洪水滔天懐山襄陵予乘四載隨山刋木暨益奏庶鮮食此禹功之始也孟子所謂龍蛇禽獸之害消列山澤而焚之者也此禹貢分敘所以先於刋定諸山總敘所以先於𨗳山是也禹曰予決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食此禹功之中也孔子所謂盡力乎溝洫者也此禹貢分敘所以定山澤辨厥土等田制所以有𨗳川則壤成賦甸服等事也葢禹之治水不但疏決江河患鑿阻濬州而已凡天下平土皆制其井畆疏為溝澮以達于川所謂畎澮者即田間之畎一同之澮也所謂溝洫者即一井之溝一成之洫也則是井田之制自禹定之此禹中間功庸最為周密至於所謂懋遷有無萬邦作乂所謂弼成五服至于五千外薄四海咸建五長則禹功之終也分敘之浮于某水達于某水總敘之六府孔修庶土交正迄于四海皆是也或曰書者當時方言形容其勢耳愚昔聞之家廷曰洪水滔天即如後世淫雨大水河決之災但堯末年連嵗有此然彭蠡諸水而指為漢滙此猶有可疑者予已釋而辨之矣抑葢天地自然之變者如河徙而南沛涸而洑而冀兖青徐豫之支流水澤皆易其源委甚至九河淪而為小海碣石陷而在海中此尤其變之大者也大抵天地之間河海山陵土石自有消長之數而人之年夀有限則不及見其消長遂以為古今有定形爾山與土石且有消長而況水乎若沈存中奏使河北邊太行而北山崖之間往往銜螺蚌之殻及石子横亘石壁如帶謂必昔之海濵今東距海已千里以愚觀之此即昔之河濵也所謂自東河至東海千里而遥者也夫以昔之河濵今在山崖石壁之間即河日遷山日長石日凝葢可知也此皆天地之間今人尚可考見之理其類非一而人鮮不謂迂者朝􅌲不知晦朔夏蟲不可語冰其斯之謂矣然則禹貢地理古今之不同又安知其非天地之變遷消長若河碣之比邪或曰條列之説如之何曰予嘗疏於前矣王鄭分每段為列可爾若指為山勢之脈絡恐未然也夫天地常形固相為勾連貫通然其條理亦各有脈絡若以脈絡之可見者言之崑崙四垂而為海天下諸山皆起於崑崙而崑崙無定名地之最髙山之所聚江河諸源之所出即崑崙爾崑崙之山綿亘糾繆勾連盤錯其南為岷山而岷山最大而東北為積石諸峯其東為西傾朱圉鳥鼠諸峯其西南諸山尤為綿亘紛錯河之所以北弱水之所以西黒水之所以南皆是也惟江河淮漢行乎中國自崑崙而東北言之則自積石而北為湟水星海青海以至浩亹皆河源也入匈奴以東為陰山又東南自代北雲朔分而南趨為北嶽以至太行是為河北之脊壺口雷首泰嶽析城王屋皆其羣峯河之折而南汾晉諸水之所以西入河涿易􅋤漳恒衛之所以東入海也分而東趨者行幽燕之北為五闗之險以至營平而為碣石此北絡也自崑崙以東言之則東為西傾而洮水出其北入河恒水出其南入江又東為朱圉鳥鼠諸隴則為渭之源自渭源以北即夾河源而北以東若岍岐若荆山諸峯涇水漆沮諸源也自渭以南即西傾而下諸峯亘為終南屹為泰華東北為崤陜東南為熊耳外方嵩髙伊洛之源又南為桐栢淮源以達於淮西諸山此中絡也又自西傾諸圉而南分是為嶓冡漢源夾漢而趨者北即終南華熊諸隴南則蜀東諸峯説者謂蜀東諸山皆嶓冡正謂其岡岫綿亘爾又東則為荆山内方此中絡之次也自崑崙之東南言之是為岷山江源夾江而東者北支即西傾以南嶓冡以西之脈為桓水西漢水嘉陵江諸源其南支即南趨為蒙蔡諸山青衣大渡馬湖江諸源又東包涪黔一盤而北為三峽其東出者包絡九江之源中盤為衡山其再盤而北為廬阜其嶺東出者又為袁吉章貢盱信諸江之源至分水魚梁嶺三盤而北趨過新安峙天目盡昇潤凡再盤之間其水聚為洞庭三盤之間其水聚為彭蠡三盤以東則南閩浙北為震澤此南絡也惟泰山則特起東方横亘左右以障中原此所以為異與大抵水者山之液故山盤而水之源出焉此所以聚為川流之盛地道以勾連為固故山束而水之流壅焉此所以資於疏闢之功凡此其大畧云耳圖書編卷三十一
