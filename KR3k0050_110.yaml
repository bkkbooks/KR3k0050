body:
  text: 圖書編卷一百十明章潢撰䘮禮叙曾子曰吾聞諸夫子人未有自致者也必也親䘮乎子游曰䘮致乎哀而止葢父母鞠育之恩昊天㒺極而䘮之必哀夫固其所自致而不待勉强焉者此所以䘮與其易也寧戚况有其情必有其文而送終之禮無所不用其至亦其情之所必至而三年之䘮不過稱情以立文耳但䘮禮之廢也久矣流俗之弊至有務觀美者侈宴饗儀文之華視其親之棺椁衣衾皆餘事也信浮屠者極齋薦布施之盛顧其身之衰麻哭踊若虚文也惑堪輿者恣其侵占攘禍之謀以致暴露不𦵏皆其心之所忍為矣斯人也是可忍也孰不可忍也甘於從俗而不從禮果盡無哀痛慘怛之情乎蔽於習俗故忍於䘮禮而莫之䆒心也昔人有言曰凡䘮禮制為斬衰功緦之服者其文也不飲酒不食肉不内處者其實也中有其實而外飾之以文是為情文之稱徒服其服而無其實則與不服等耳噫吾今之人甚至居䘮之儀文且未備也曾謂有哀親之心者甘於流俗而莫之反也耶洪武五年詔定官民䘮禮禮部議襲衣飯含銘旌斂衣棺椁墻翣明器引披鐸羽旛功布方相桞車誌石碑碣塋墳石人獸望柱祭物公侯品官各有等差六品以下無墻翣羽旛八品以下無方相七品以下無石獸庶人棺不得用硃紅明噐一事功布以白布三尺引柩桞車以衾覆棺誌石二片同品官大明集禮㑹典品官䘮禮庶人䘮禮具如五年所定䘮禮初終扶遷居正寢度病勢甚先設牀於正㕔扶病者居牀東首以受生氣戒内外毋得諠譁驚擾以待遺言屬纊置新綿於口鼻之間以俟氣絶否楔齒以一筯横口中使不合可以含復侍者一人以死者上服嘗經衣者左執領右執腰三呼於庭前或名或號乃卷衣覆尸上招魂而求生之也披髮徒跣易服不食諸子三日不食期九月之䘮三不食五月三月之䘮再不食立䘮主長子為主人無則次子或長孫以奉饋奠父在父為主主婦謂亡者之妻或主䘮者之妻䕶䘮以子弟知禮能幹者為之凡䘮事皆禀之司書司貨司書主書冩司貨主稽財物出入以子弟或使僕無力之家只立䕶䘮一人可也治棺棺木油杉為上栢次之棺取周身毋令髙大毋為虚簷為足内外皆用灰漆訃告於親戚僚友子姪以其名發書書式云孤哀子某泣血稽顙拜某罪深重不自殞滅禍延考妣不幸於今月某日以疾辭世黍居姻末不敢以訃聞設魂帛尸前置衣架覆以素幔前置校椅椅上置素褥褥上置遺衣服結白絹為魂帛上出其首旁出耳下垂餘之兩足稍似人形使神帛有所依也椅前置桌子桌子上置香燭酒果侍者朝夕設盥洗之具如平生執友親厚之人哭襲設幃及牀幃以白布為之遷尸於牀南首乃沭浴如北方不慣沭浴有不㓗處以水布而拭之襲以衾覆之設襲奠以桌子置脯果以親戚知禮者一人為祝盥手焚香斟酒為奠不酧之主人以下為位哭夜則寢於尸傍藉藳枕塊男女異室藳草也乃飯含生人以匙抄米飯實於尸口之右并實一錢文於左手中亦如之只實中一處亦得暑月恐生蟲不實飯亦可加幅巾即今唐巾充耳用白綿如棗核大以塞兩耳覆以枕衾乃代哭毎以一人相代而哭不絶聲小歛設牀布絞絞以布為之一幅而析其兩端為三横者取足以周身相結縱者取足以掩首至足而結於身中將歛先布絞之横者三於尸牀次布絞之縱者一於其上次布衾於絞之上次布小歛之衣於衾之上遷尸裹衾叠衣以藉其首卷兩端以補兩肩空處又卷衣夾其兩脛取其正方然後以餘衣掩尸左袵不紉絲屬極易生蟲惟細布之衣為貴裹之以衾而未結以絞不掩其靣者以猶俟復生欲時見其靣歛畢又以一衾覆之也主人主婦憑尸哭擗擗以手擊胸也袒衣括髮袒露背近世惟去上衣而已括以麻束髮也逺遷尸牀於堂中乃奠同襲奠主人以下再拜哭盡哀不作佛事今士大夫之家久革惟愚民尚行宜一體禁革大歛將大歛去結先結縱歛之覆衾次結横者布絞於棺中舉棺置堂中布絞與小歛同各垂衣於四外舉尸納棺中卷衣塞令充實毋得揺動毋置珍玩啟盗賊心收衾令棺中平滿結絞與小歛同主人主婦憑哭盡哀加蓋下釘覆柩以衣設靈牀於柩東牀帳席枕衣被之屬皆如平生乃設奠如小歛之儀四拜讀祝云惟年月日孤哀子孫某等昭告於顯考某府君或顯妣人孺人或祖考妣云云泣血而言曰釁積厥躬禍延某親一疾遽嬰九原弗起兹焉歛棺千祀已矣嗚呼痛哉謹告又哭四拜立銘旌以絳帛為之六品以下七尺士庶五尺或三尺粉筆大書某官某公某號之柩妣則書某封某母某氏孺人或宜人安人之柩無官則書處士某號某母某氏之柩置之於靈座之右主人以下各歸䘮次中門之外擇樸陋之室為男子䘮次寢苫枕塊不脫帶絰婦人居中門之内不得輒至男子䘮次成服以大歛之眀日五服之制具見家禮朝奠晨起主人以下各服其服入就位尊長坐哭卑者立哭侍者設盥櫛之具於靈牀則少頃執事者設殽果湯飯隨宜祝盥手焚香酌酒主人以下四拜哭盡哀夕奠亦如朝奠儀以後毎日皆如此行之七七四十九日而止今俗每遇七日及百日設奠比朝夕上食加盛主人以下四拜哭盡哀當從之朔望亦同此之禮弔奠弔謂弔慰生者弔奠謂奠祭亡者弔皆素服奠用香燭酒果賻用錢帛弔者至具刺通名與禮物俱入䘮家燃燭布席哭以俟䕶䘮迎賔至㕔事䕶䘮揖引賔至靈座之前哭盡哀再拜跪上香進酒讀奠賻狀䕶䘮止哭者祝跪讀於賔之右讀畢賔主皆哭興再拜主人亦拜主人哭出稽顙再拜西向謝之賔亦哭東向荅拜賔向弔主人曰不意某親某官奄棄榮養無官則曰色養伏惟哀慕何以堪處主人對曰某罪逆深重禍延某親伏䝉慰吊不勝哀感又再拜賔荅拜又相向哭賔慰主人曰修短有數痛毒奈何願抑孝思俯從禮制乃揖而出主人哭而入䕶䘮送至㕔事茶湯而退今人設酒饌非禮也聞䘮奔䘮如聞新䘮哭荅使者又哭盡哀問故易服遂行日行百里不以夜行道中哀至則哭哭避市邑喧繁之處望其州境縣境其城其鄉其家皆哭入門詣柩前哭拜被髪徒跣不食次日成服若未得行日為位不奠設一椅子以代尸柩若䘮側無子孫則設奠如儀若既䘮則先之墓哭拜望墓哭未成服者變服於墓歸家詣靈座前哭拜齊衰以下聞䘮為位而哭成服如前作神主作主用栗木趺方四寸髙一尺二寸身博三寸身趺背厚一寸二分剡上五分為圎首寸之下勒前頷而判之一居前二居後四分後八分䧟中長六寸濶一寸深四分䧟中書云故某公某官諱某字某第幾神主合之置於趺身出趺身上一尺八分共趺共髙一尺二寸竅其傍以通中粉塗其前書云顯考某官封諡府君神主無官稱處士某公旁題主祀之名曰孝子某奉祀尺用今之匠人尺庶人無力者以木作牌位代之亦可刻誌石用石二片其上為葢刻云某官某公之墓無官則書其字曰處士某甫之墓其一為底刻云某官某公諱某字某某州某縣人考諱某官母某氏某封某年月日生叙歴官遷次某年月日終某年月日䘮𦵏於某鄉某處娶於某氏某之女子某某官女某適某官某婦人夫在則葢云某官姓名某封某氏之墓無封則曰妻夫亡則云某官某公某封某氏夫無官則云夫某君甫某氏其底叙年月於適某氏因夫子致封號無則否𦵏之日以二石字靣相向用鐵束束之埋於壙前近地靣三四尺間造明器刻木為車馬僕從侍女各執奉養之物象平生而小五品六品三十事七品八品二十事非朝官十五事今人以紙人紙馬代之亦可大轝今縳木為之甚便若路逺仍依家禮製之更好翣以木為之如扇而方兩角髙廣二尺髙二尺四寸柄長五尺畫黼黻狀四旁皆畫雲氣紫色柩行執於兩旁夾之𦵏前期擇地之土厚水深雖使他日不為城郭溝池道路不為貴勢所奪耕犁所及又須避村落逺井窰即美地擇日開塋域祠后土設香案於壙左設酒果盞注脯醢盥盆帨巾請親朋一人吉冠素服就位立神位前北向㕘神鞠躬再拜興盥洗詣香案前三獻酒俱酹於神位前讀祝文曰維某年嵗月朔甲子某官姓名敢昭告於后土之神庶民改曰土地今為某官姓名營建宅兆神其保佑俾享兹土謹以清酌醢脯祗薦於神尚饗俯伏興復位辭神鞠躬再拜平身焚祝文禮畢遂穿壙古者惟天子得穿隧道其餘皆直下為壙而懸棺以窆今宜遵之作灰隔先布炭末於壙㡳厚二三寸築實然後布石灰三分細沙黄土各一分挫勻者於其上築實厚二三尺用薄板為灰隔墻高於棺四寸許置於灰上乃於四旁旋下四物亦以薄板隔之炭末居外三物居内如底之厚而築之及墻之平而止築之既實則旋抽其板近上復下炭灰等炭禦樹根又避水蟻石灰得沙而實得土而黏嵗久結為金石盗賊不能近也又有不用木作隔只以三合土上下四傍築厚尺許尤佳此比磚基甚省且永久可以不壞行之則無疑製功布以白布三尺繫之竿上祝御轝執此以指麾役者備方相狂夫為之冠服如道士執戈揚盾四品以上四目為方相以下兩目為魌頭告遷柩發引前一日因朝奠設饌祝斟訖跪曰今以吉辰遷柩敢告主人以下哭盡哀再拜奉柩朝於祖古禮奉柩置祠堂前席上北首主人以下哭從今只告於祠堂可也遂遷柩於㕔事南首主人以下就位坐哭乃代哭親賔致奠賵日晡設祖奠祝告曰永遷之禮靈神不留今奉柩車式遵祖道餘如朝奠之儀陳器厥明陳器方相在前次明器次銘旌次靈車以奉魂帛香火次功布次大轝轝傍使人執翣遷柩就轝祝跪告曰今遷柩就轝敢告主人以下哭降視載載畢遷靈座於柩前南向設遣奠饌如朝奠祝跪告曰昭告某尊靈前泣血而言曰痛惟某親奄棄眷親兹奉靈柩安厝某處之原載陳遣奠永訣終天輀車載道勿驚勿怖謹告孝子拜哭祝奉魂帛升車焚香别以箱盛主置帛後發引柩行方相等前導主人以下男女以序哭歩從婦人以白幕夾障之親賔設奠於道􅀈若墓逺則毎舍設靈座於柩前朝夕哭奠時食上時食夜則主人兄弟皆宿柩傍親戚共守衛之未至執事者先設靈幄次親賔幄次婦人幄方相至以戈擊壙四隅靈車至設奠柩至主人男女各就位哭賔客相辭而歸乃窆灰隔上横加厚板三物拌勻居下炭末居上各拌倍於底以水灑而築之乃漸實以土毎半尺許輕手築之勿令震動柩中祠后土於墓左儀同開塋域但祝文改營建宅兆云窆兹幽宅俾享兹土云俾無後艱藏明器等俟實土及半旁穿便房貯之以板塞其門下誌石壙前先布磚一重置石其上又磚四圍之而覆其上題主設桌子於靈座東南西向置筆硯墨對桌置盥盆帨巾孝子就位主盥盆前北向立出主祝盥手舉主卧置桌上請題主者題主人以善書者為之今以鄉士大夫代之塋東南隅西向立孝子詣於其前東向鞠躬四拜平身尊者不荅平等人荅兩拜詣盥洗所孝子隨其後酌水進巾詣題主位西向立揖平身孝子北向上題主先題䧟中次題粉靣題畢祝奉置靈座今皆先冩定只臨時加點亦可揖平身復位孝子詣靈座前鞠躬四拜平身焚香奠酒跪讀祝文云形歸窀穸神返室堂神主既成伏惟尊靈舍舊從新是憑是依謹告俯伏興復位四拜哭盡哀興平身謝題主者儀同前祝奉神主升車魂帛箱在後執事者徹靈座遂行反哭主人以下奉靈車哭從囘宅留子弟一人監視實土成墳虞祭古人既𦵏而反虞虞猶安也魄歸於土而魂氣則無所不之故徬徨三祭以安之也𦵏之日日中而虞或墓逺則但不出是日可也執事者先期陳器具饌主人奉車入門出主奉安於座主人以下各就位哭降神盥洗詣靈座前焚香跪酌酒一人執酒注西向跪主人跪受一人受奉盤盞東向跪主人酌酒於盞以注授執事者左手取盤右手執盞酹酒盡傾地上以盞授執事者俯伏興平身復位㕘神鞠躬四拜平身初獻詣酒罇所主人執注北向立一人取盤盞立於主人之左酌酒主人酌酒反注於卓上詣靈座前北向立跪執事者跪進盤盞主人受盞獻酒執事者受盞置於靈座前讀祝文云痛惟尊靈奄忽捐棄今以某日之吉安厝某所敬奉神主歸於靈筵用陳虞祭薦兹哀悃靈其永安以歆祭禮尚饗俯伏興平身復位亞獻同初獻諸弟主之但不讀祀終獻同亞獻諸弟或長子主之主人以下哭盡哀乃止辭神鞠躬四拜興平身焚祝文禮畢埋魂帛於屏處㓗也罷朝夕奠朝夕哭哀至哭如初再虞遇乙丁己辛癸為柔日再虞儀同初虞但祝詞改云日月不居奄及再虞夙夜悲思不遑寧處敬陳薄奠薦此哀忱靈其永安以歆祭祀尚饗三虞遇甲丙戊庚壬為剛日三虞儀同再虞但祝詞改云三虞卒哭三虞後遇剛日卒哭儀同虞祭但讀祝於主人之左東向改三虞為卒哭哀薦成事下云來日躋附於祖考某官府君尚饗自是朝夕之間哀至不哭祔卒哭之明日而祔質明陳器具饌於祠堂奉新主入祠堂主人以下皆詣靈座前舉哀哀止跪告神主升祔祖廟乃奉新主詣祠堂主人以下哭從及門哀止奉神主升座主人以下序立㕘神降神辭神儀俱同前但獻酒舊主新主各獻一爵讀祝文云維某年月日敢昭告於髙曽祖考某府君髙曾祖妣某氏暨顯考某府君或顯妣某氏罪逆深重禍延先考或先妣未即殞滅勉襄大事謹以是日恭奉神主升祔祖廟敬陳清酌庶羞伏伸祭告尚饗小祥期而小祥不計閏凡十二月止用初忌日前期一日主人以下沭浴陳器具饌設次陳練服男子以練服為冠去首巾負版辟領衰服人去腰絰應服期者改吉服質明出主主人以下入哭乃出就次易服復入哭祝止之降神餘同之卒哭之儀但祝版改云小祥薦此常事大祥再期而大祥至此不計閏二十五月亦止用第二忌日儀同小祥但陳禫服改祝版曰大祥常事曰祥事祭畢祝奉神主入於祠堂主人以下哭從至祠堂前哭止徹靈座㫁杖奉遷主埋於墓側始飲酒食肉而復寢告祔遷祝文曰年月日孝𤣥孫某敢昭告於五世祖考某府君祖妣某氏古人制禮祀止四世心雖無窮分則有限神主當祧不勝感愴謹以清酌庶羞用伸祭告尚饗祭畢埋主禫禫者澹也澹澹然平安之意也大祥之後間一月而禫至此不計閏凡二十七月卜日質明主人以下詣祠堂奉主櫝置於靈座故處主人以下皆哭盡哀儀同大祥但祝版改云禫祭祥事辭神哭盡哀送神主至祠堂不哭聞䘮奔䘮始聞親䘮哭親謂父母易服遂行道中哀至則哭哭避市邑喧譁之處望其州境其縣境其城其家皆哭入門詣柩前再拜再變服就位哭初變服如初䘮又變服如大小歛後四日成服與家人相弔賔至拜之如初若未得行則為位不奠居䘮次無子孫則此處設位如儀變服亦以聞後之第四日在道至家皆如上儀若䘮無子孫則在道朝夕為位設奠至家但不變服相吊拜賔如儀若既𦵏則先之墓拜哭之墓者望墓哭至墓哭拜如在家之儀未成服者變服於墓歸家詣靈座前哭拜至第四日成服如儀已成服者亦然但不變服齊衰以下聞䘮為位而哭尊長於正堂卑㓜於别室司馬温公曰今日皆擇日舉哀凡悲哀之至在初聞䘮即當哭之何暇擇日在法人有不得於州縣公廨舉哀之文則在官者當哭於僧舍其他皆哭於夲家可也若奔䘮則至家成服奔䘮者釋去華服就行齊衰望鄉而哭大功望門而哭小功以下皆至門而哭入門詣柩前再拜成服就位哭弔皆如儀若不奔䘮則四日成服不奔䘮者三日中朝夕為位㑹哭四日之朝成服亦如之大功以下始聞䘮為位㑹哭四日成服亦如之皆毎月朔為位㑹哭月朔既滿次月之朔乃為位㑹哭而除之其間哀至則哭可也吊奠賵凡弔皆素服朱子謂𤣥冠以弔者與孔子相反奠用香茶燭酒果有狀或用食物即别為文賵用錢帛有狀惟親友分厚者有之具刺通名賔主皆有官則具門狀否則名紙題其隂靣先使人通之與禮物俱入入哭奠訖乃吊而退既通名䘮家炷火燃燭布席皆哭以俟䕶䘮出迎賔賔入哭盡哀再拜焚香跪酹茶酒祝跪讀祭文奠賵狀畢興主賔皆哭盡哀各拜興慰問畢揖而退按凡弔皆素服奠用香茶燭酒果賵用錢帛皆有狀先通名䘮家焚香燃燭布席皆哭以俟䕶䘮出迎賔入至靈座前哭盡哀再拜焚香跪酹茶酒俯伏興䕶䘮止哭止哭者祝跪讀祭文奠賵狀於賔右畢興主賔皆哭盡哀再拜主人哭出靈幃西向再拜賔亦哭東向答拜興慰問畢乃揖出主人哭而入䕶䘮送賔至㕔事茶湯而退薄俗有設酒食待賔者非禮宜痛禁之疾病醫禱按伊川先生曰病卧於牀委之庸醫比之不慈不孝事親者亦不可不知醫遷居正寢按温公曰近世孫宣公臨薨遷於外寢葢君子謹終不得不爾父在母䘮按父在父為主父在子無主䘮之禮楊氏謂子為母䘮恩重服重父在母䘮長子主奉饋奠至於朔奠虞卒哭祭則父自主之凡妻之䘮夫自主也兄弟妻䘮按父没兄弟同居各自主其妻子之䘮子孫妻子之䘮按父在而子孫有妻子之䘮祖父主之統於尊也䘮大記曰子孫執䘮祖父拜賔妾䘮按雜記曰自祔至於練祥皆使其子主之其殯祭不於正室妻黨不主䘮按本註姑姊妹夫死其黨無人妻黨雖親勿主當隣里主之居䘮有疾按小學曰若有疾暫須飲食疾止亦當復初又曰久而羸憊恐成疾者可以肉汁及脯醢或肉少許助其滋味乃飯含或問飯含之義曰檀弓云不忍其口之虚故用此美潔之物以實之今俗以珠銀之屑置其口其遺意與立銘旌或問銘旌之義如何曰記云以死者不可别故以其旗識之不作佛事司馬公曰世俗信浮屠誑誘於始死及七七日百日朞年再朞餘䘮飯僧設道塲或作水陸大會修經造像脩建塔廟云為此者滅弭大罪惡必生天堂受種種快樂不為者必入地獄剉燒舂磨受無邊波吒之苦殊不知人生含氣血知痛痒或剪爪剃髮從而燒斫之已不知苦况於死者形神相離形則入於黄壤朽腐消滅與木石等神則飄若風火不知何之借使剉燒舂磨豈復知之且浮屠所謂天堂地獄者計亦以勸善而懲惡也茍不以至公行之雖鬼可得而治乎是以唐廬州刺史李丹與妹書曰天堂無則已有則君子登地獄無則已有則小人入世人親死而禱浮屠是不以其親為君子而為積惡有罪之小人也何待其親之不厚哉就使其親實積惡有罪豈賂浮屠所能免乎此則中智所共知而舉世滔滔奉信之何其易惑而難曉也甚者至有傾家破産然後已與其如此曷若早賣田營墓而𦵏之乎彼天堂地獄若果有之當與天地俱生自佛法未入中國之前人死而復生者亦有之矣何故無一人誤入地獄見閻羅等十王者耶不學者固不足言讀書知古者亦可以少悟矣髙氏襲斂禮按士襲衣三稱既襲有冐小斂士衣十九稱有布絞大斂士衣三十稱大夫五十稱君百稱有布絞布衾衣衾惟欲厚温公襲斂禮按襲衣一稱大小斂據死者所有之衣但襲無冐小斂用布絞大斂無絞紟紟單被也或問二家孰優曰髙氏復曰家禮何以用温公曰朱子後遺命治䘮則用髙氏曰用衣多貧者能辦乎曰註云古士䘮有禭親者禭朋友君使人禭贈衣曰禭故襲斂衣多當温公時世俗亦只有襲而無大小斂故禮亦從而廢矣亦有絞冐不施以入棺為小斂葢棺為大斂者與今時俗無以異也為今之計當如附註之説悉從髙氏雖善誠非貧者能辦有如温公所慮者但當量其力之所及可也又問斂用許多衣為何曰温公謂保其肌體也雜記謂人死斯惡之矣聖人不忍言但使厚其衣衾以朽肉而形體深秘可以使人之弗惡又問用絞束縳為何曰髙氏謂斂衣為主斂衣既多非束縳則不能堅實代哭按䘮大記云為其不食疲倦大夫以上使官屬相代士則親疎之屬與家人自相代也弔哭不同按廣記曰凡弔謂弔生者哭謂哭死者與生者死者皆識則既弔且哭但識死者不識生者則哭而不弔但識生者則弔而不哭三不弔按檀弓曰死而不弔者三有三事畏本註謂戰陣無勇及自經溝瀆者壓謂死於巖墻之下者溺謂死於水中者凡不得正命而死者皆不弔或能殺身成仁者又不可不弔也賔主弔見禮按楊氏曰弔禮主人拜賔賔不荅拜此何義也葢弔賔來有哭拜或奠禮主人拜賔以謝之此賔所以不荅拜也書儀家禮從俗有賔答拜之文亦是主人拜賔賔不敢當乃荅拜今世俗弔賔來見几筵哭拜主人亦拜謂代亡者答拜非禮也既而賔弔主人又相與交拜亦非禮也或問世俗代亡者答拜承習久矣今欲據禮不答拜世俗反謂失禮當如何曰家禮稱主人拜賔謝禮賔不敢當乃荅拜然則弔賔拜几筵主人亦安敢立視而不省乎大抵主人謝賔賔拜几筵世俗荅拜久矣未能猝變也若賔卑於亡者可不荅拜若尊於亡者或執友仍從俗荅拜亦無奈也若賔弔主人相與交拜則㫁然不可矣治𦵏按司馬温公曰天子七月諸侯五月大夫三月士踰月而𦵏五服年月敕王公以下皆三月而葬孝子之心慮患深逺淺則恐易暴露抇則濕潤速朽故必求土厚水深之地而𦵏之所以不可不擇也程子曰卜其宅兆卜其地之美惡也非隂陽家所謂禍福也地之美則神靈安其子孫盛若培擁其根而枝葉茂理固然矣地之惡者則反是然則何謂地之美者土色光潤草木茂盛乃其驗也父祖子孫同氣彼安則此安彼危則此危亦其理也而拘忌者惑以擇地之方位安日之吉凶不亦泥乎甚者不以奉先為計而専以利後為計况非孝子安厝之用心也造明器或問明器之義曰檀弓註云謂以禮送死者以死者之禮待之是無愛親之心為不仁不可行也以生者之禮待之是無燭理之明為不智亦不可行也故備物而不可用也其謂之明器者葢以神明之道待之也方相按軒轅本紀云帝周遊時元妃螺祖死於道因置方相亦曰防䘮葢始於此周禮方相氏蒙熊皮黄金四目𤣥裳朱衣執戈揚盾大䘮先柩及墓入壙以戈擊四隅毆方良又風俗酉陽雜爼其説大同小異題主或問無官者則書處士秀才而可書府君否曰按祠堂章有事則告條下註云有官者皆封諡無官者則以生時行第稱號加於府君之上是則庶民皆可稱其先為府君也又問今人又於神主䧟中兩旁增書生於何年月日卒於何年月日享年幾嵗𦵏某處如何曰亦自詳備宜從之也旁註按本註問夫在妻之神主宜書何人奉祀朱子曰旁註施於所尊以下則不必書也或問本註其下左旁題奉祀之名近見他書反以上右為下左者當何從曰凡言右皆是上文言左皆是下文詳觀大學右傳十章與别為序次於左則左為下文不待辨説自明矣曰據子之言左誠為下文矣然則祠堂逓列神主以西為上如子所言豈不奉祀之名反在西而居上祖宗之名反在東而居下乎曰西上之制起於漢明帝漢之前論昭穆無此也葢旁題乃為宗子承家主祭而設初不以所書前後較尊卑也即如彼以上文為上而今陽道皆尚左凡臣子上書於君親皆具名於前亦豈嫌其名而為僭乎碑按温公曰古人有大勲徳勒名鍾鼎蔵之宗廟其葬則有豐碑以下棺耳豐碑大木為之乃下棺之具也其說詳見檀弓石碑起於秦漢按秦漢以來始命文士褒贊功徳刻之於石亦謂之碑銘誌起於南朝按世降南朝復有銘誌埋之墓中或問今士民之家皆有碑誌可乎曰温公謂人果賢耶則衆所稱頌豈待碑誌始為人知若果不然雖以巧言强加采飾徒取議誚其誰肯信今既欲為銘誌但可直述鄉里世家生死年月男女子孫終始而已不在多言也遷𦵏附按韓文曰山崩水湧毁其墓則改塟或遊或仕千里之外子㓜妻穉不能自還因𦵏其地則改葬其服則子為父母妻為夫服緦麻三月而除餘親無服虞祭𦵏之日日中而虞或墓逺但不出是日可也若去家經宿以上則初虞於所館行之鄭氏曰骨肉歸於土魂氣則無所不之孝子為防隍三祭以安之朱子曰未塟時奠而不祭但酌酒陳饌再拜虞始用祭禮卒哭謂之吉祭或問祭何謂之虞曰劉氏璋云既𦵏虞祭其神氣之返於是祭以安之且為木主以憑依焉故謂虞主又按傳註天子九虞以九日為節諸侯七虞以七日為節大夫五虞士三虞春秋末世大夫僭用諸侯之禮後世遂以人死之後每七日必供佛飯僧言當見地府某王吁古人七虞之説乃如此哉後世妄誕不足信也居䘮雜儀檀弓曰始死充充如有窮既殯瞿瞿如有求而弗得既𦵏皇皇如有望而弗至練而慨然祥而廓然顔丁善居䘮始死皇皇如有求而弗得及殯望望焉如有從而弗及既𦵏慨然如不及其反而息雜記孔子曰少連大連善居䘮三日不怠三月不懈期悲哀三年憂䘮服四制曰仁者可以觀其愛焉知者可以觀其理焉强者可以觀其志焉禮以治之義以正之孝子悌弟貞婦皆可得而察焉曲禮曰居䘮未塟讀䘮禮既䘮讀祭禮䘮復常讀樂章檀弓曰大功廢業或曰大功誦可也今居䘮但勿讀樂章可也雜記三年之䘮言而不語對而不問言言已事也為人説為語䘮大記父母之䘮非䘮事不言既葬與人立君言王事不言國事大夫士言公事不言家事檀弓髙子臯執親之䘮未嘗見齒言笑之㣲雜記疏衰之䘮既䘮人請見之則見不請見人小功請見人可也又凡䘮小功以上非虞祔練祥無沐浴曲禮頭有瘡則沐身有痬則浴䘮服四制百官備百物具不言而事行者扶而起言而後事行者杖而起身自執事而後行者靣垢而已凡此皆古禮今之賢孝君子必有能盡之者自餘相時量力而行之可也記曰有殯聞逺兄弟之䘮雖緦必徃非兄弟雖隣不徃齊衰不以弔䘮容纍纍色容顛顛視容瞿瞿梅梅言容繭繭凡異居始聞兄弟之䘮唯以哭對可也三年之䘮言而不語對而不問廬堊之中不與人坐焉在堊室之中非時見乎母也不入中門䘮者不遺人人遺之雖酒肉受也彼父昆弟以下既卒哭遺人可也父母之䘮非䘮事不言有服人召之食不徃大功以下既𦵏適人人食之其黨也食之非其黨勿食也疏衰之䘮旣𦵏人請見之則見不請見人小功請見人可也大功不以執摯婦人非三年之䘮不踰封而弔百官備百物具不言而事行者扶而起言而後事行者杖而起身自執事而後行者靣垢而已秃者不免傴者不袒跛者不踊非不悲也身有錮疾不可以備禮也曲禮曰居䘮之禮頭有創則沐身有痬則浴有疾則飲酒食肉疾止復初不勝䘮乃比於不慈不孝五十不致毁六十不毁七十唯衰麻在身飲酒食肉處於内子貢問䘮子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服士䘮禮考儀禮曰死於適室憮用斂衾屬纊以俟絶氣男子不絶於婦人之手婦人不絶於男子之手乃行禱於五祀乃卒主人啼兄弟哭孔子曰哭不偯曾申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有復者一人以爵弁服簪裳於衣左何之扱領於帶升自前東榮中屋北靣招以衣曰臯某復男子稱名婦人稱字受用篋升自阼階以衣尺夫復者求其反而生也西州尚有此俗今多不行姑録以備之楔齒用角柶綴足用燕几如赴賔如哭位皆古禮也今多不行姑録以備之主人以下易服不食為位而哭袒而括髮哭不絶聲記曰男子免婦人髽親者禭不將命以即陳夫禭者贈衣以衣尸也今亦不行姑録以備之為銘各以其物夫銘明旌也以死者為不可别故以其旗識之愛之斯録之矣掘坎為垼一沭浴一飯含一襲設明衣裳南方僅有行者而北方之禮大略不同各從宜無害詳具於冊姑録以備之小斂衣十有九稱大斂衣凡三十稱紟不在算不必盡用夫始死有襲明日有小斂又明日有大斂束以絞衿韜以衾冐皆所以保其肌體也今多忽而不用雖貧不能辦量其力而為大斂可也記曰凡祔於身者必誠必信勿之有悔焉耳矣可盡廢乎始死奠奠於尸東小斂奠饌於東堂下大斂奠設於奥東西是後朝夕哭奠食時上食朔月殷奠有薦新如朔奠記曰居䘮未塟讀䘮禮故有奠而無祭今人多於䘮間用祭不知何所取義且用樂以饗神酒肉以讌客乃曰文公家祭不考文公之祭為虞祭也且士大夫家猶踵訛行之而况於閭閻市井乎三日而殯設熬傍一筐乃塗踊無算卒塗祝取銘置於肂主人復位踊襲既殯主人設髦夫塗殯所以備不虞古人廬於中門外宮門不闢今鮮用塗如孝子寢於殯宫期塟不逺雖不塗可也若廬於中門外𦵏期稍逺者不可以不塗主人揖就次居倚廬寢苫枕塊不說絰帶哭晝夜無時非䘮事不言歠粥朝一溢米夕一溢米不食菜果親始死雞斯徒跣扱上袵交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄉里為之糜粥以飲食之夫悲哀在中故形變於外也痛疾在心故口不甘味身不安美也申之父曰哭泣之齊斬之情饘粥之食自天子逹記曰䘮食雖惡必充饑饑而廢事非禮也飽而忘哀亦非禮也視不明聴不聰行不正不知哀君子病之嗚呼此天理人心哀心真切有不容以偽為者禮特其疏節耳三日成服記曰死與徃日謂死之第四日也三日絞垂冠六升外縪纓條屬厭衰三升履外納杖下本竹桐一也父用苴杖苴杖竹也毋用削杖削杖桐也朝夕哭不避子卯三月而𦵏筮宅冢人營之筮者與主人占之曰從主人絰哭不踊若不從筮如初儀既井椁反位哭不踊婦人哭於堂明器獻材於殯門外如哭椁卜日而𦵏占曰某日從授卜人龜告於異爵者使人告於衆賔若不從卜擇如初儀宅兆必筮塟日以卜聴以質諸鬼神次吉凶而定猶豫必慎必重凡為死者慮耳顧世之人拘於風水美惡隂陽禁忌至暴露棺柩歴嵗時而不塟忘父母而求庇䕃子孫甚有侵損他人而自求福利者不亦謬乎既夕哭請啟期告於賔既夕塟之前一夕也此謂塗殯者啟肂未塗者但因奠以期告可也奉柩朝祖奉柩朝祖禮亦甚詳然柩既重大房室卑隘者且不能周旋近人但奉魂帛朝祖亦權宜之道也家禮曰遂穿壙作灰隔記曰凡附於棺者必誠必信勿之有悔焉耳矣世人有薄棺椁而忽於壙中者乃竭力以作紙彩人馬虚華無用之物徒以悅人耳目惑亦甚矣家禮曰刻誌石夫誌古本無之昉於南朝然亦但記姓名識鄉里慮異日陵谷變遷或誤為人所動而此石先見庶有掩之者後人多為不情溢美之言徒取譏誚復有立豐碑而妄頌功徳者亦獨何哉嗚呼仁人孝子必不以此誣其親也載柩陳器載柩陳器事亦甚詳然中有苞筲脯醢之類入壙之時脯醢宜不必用記曰陳器之道多陳之而省納之可也省陳之而盡納之可也家禮曰日晡時設祖奠厥明遷柩就輿設遣奠祝奉帛升車焚香乃發引啇祝執功布以御柩執披主人袒乃行踊無算出宫踊襲柩至於壙斂服載之乃窆主人哭踊無算卒窆而歸不驅記曰其徃也如慕其反也如疑乃反哭遂適殯宫皆如啓位拾踊三兄弟出主人拜送衆人出門哭止闔門主人揖衆主人乃就次猶朝夕哭不奠記曰成壙而歸不敢入處室居於倚廬哀親之在外也寢苫枕塊哀親之在土也故哭泣無時服勤三年思慕之心孝子之至也人情之實也三虞卒哭明日以其班祔記曰既反哭主人與有司視虞牲有司以几筵舍奠於墓左反日中而虞塟日虞弗忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易䘮祭明日祔於祖父家禮曰遇柔日再虞遇剛日三虞曲禮曰既塟讀祭禮夫䘮以哀戚為本故有奠而無祭至虞而後有祭漸用吉禮矣近世人多於䘮間用祭至𦵏後遂不復舉行不亦悖乎親賔賵奠􅉠贈凡將禮必請而後拜送兄弟賵奠可也所知則賵而不奠知死者贈知生者􅉠記曰弔於人是日不樂行弔之日不飲酒食肉焉曲禮曰臨䘮不笑望柩不歌鄰有䘮舂不相里有殯不巷歌適墓不歌弔日不歌送䘮不由徑送䘮不避塗潦臨䘮則必有哀色詩曰凡民有䘮匍匐救之記曰無服之䘮内恕恐悲夫見死而哀本出於惻怛之心其􅉠奠贈賻乃弔慰矜恤之禮非可以強致而偽為也今人惇本情亡而浪為虚靡談笑歡謔了無戚容甚有引滿呼白管絃燿煜孝子情奪於賔客方且周旋勸勞焉其不同於夷狄者㡬希記曰君子不奪人之䘮亦不可奪䘮也風俗移易非士君子其誰與歸稽諸禮經所載凡親賔賵奠賻贈曰主人拜於位不踊主人拜賔坐委之至於𦵏後踵門謝未之前聞也行之俗以為重親不思衰絰不可以入市愛人以徳者必不以非禮而責人也期而小祥曰薦此常事家禮曰設次陳練服始食菜果記曰三年之䘮練不祥立不旅行恐忘哀也又期而大祥曰薦此祥事中月而禫是月也吉祭猶未配記曰䘮復常讀樂章記曰其恩厚者其服重故為父斬衰三年以恩制者也門内之治恩揜門外之治義斷恩資於事父以事君而敬同貴貴尊尊義之大者也故為君亦斬衰三年以義制者也三日而食三月而沭期而練毀不㓕性不以死傷生也始死三日不怠三月不懈期悲哀三年憂恩之殺也聖人因殺以制節此䘮之所以三年賢者不得過不肖者不得不及此䘮之中庸也王者之所常行也禮斬衰之䘮唯而不對齊衰之䘮對而不言大功之䘮言而不議緦麻小功之䘮議而不及樂父母之䘮衰冠繩纓菅屨三日而食粥三月而沐期十三月而練冠三年而祥比終兹三節者仁者可以觀其愛焉知者可以觀其理焉强者可以觀其志焉禮以治之義以正之孝子悌弟貞婦皆可得而察焉按記曰君子行禮不求變俗祭祀之禮居䘮之服哭泣之位皆如其國之故謹脩其法而審行之嗚呼事莫大於送死禮莫大於居䘮考諸士䘮禮所載皆縁人情而節文之奈何學士大夫忽焉而不講閭閻市井昧焉而不知至使送終之禮廢哀戚之情忘而人道幾乎熄矣故曰䘮祭之禮廢則臣子之恩薄而倍死忘生者衆矣孝慈録斬衰三年子為父母庶子為所生母子為繼母子為慈母母卒父命他妾養己者子為養母謂自㓜過房與人女在室為父母女嫁反在室為父母謂已嫁被出而歸在父母家者嫡孫為祖父母承重及曾髙祖父母承重者同父不在故嫡孫為祖承重服若父祖俱亡而子孫為曾髙祖後者同為人後者為所後父母人後者為所後祖父母承重夫為人後則妻從服婦為舅姑即公婆庶子之妻為夫之所生母妻妾為夫齊衰杖期嫡子衆子為庶母謂父之妾嫡子衆子之妻為夫之庶母為嫁母出母即親生母因父卒改嫁及父在母被所出者父卒繼母改嫁而已從之者夫為妻齊衰不杖期父母為嫡長子及衆子父母為女在室者雖適人而無夫與子者亦同繼母為長子及衆子慈母為長子及衆子孫為祖父母女雖適人不降為伯叔父母即伯伯姆姆叔叔嬸嬸妾為夫之長子及衆子為所生子為兄弟為兄弟之子及兄弟之女在室者即姪男女姪女為姑及姊妹在室者雖適人而無夫與子者同妾為嫡妻嫁母出母為其子女在室及雖適人而無夫與子者為其兄弟及兄弟之子姊妹及姪女在室者繼母改嫁為前夫之子從巳者為繼父同居兩無大功之親者謂繼父無子孫伯叔兄弟已身亦無伯叔兄弟之類婦人為夫親兄弟之子婦人為夫親兄弟之女在室者女出嫁為父母妾為其父母為人後者為其父母即本生父母女適人為兄弟之為父後者祖為嫡孫母為長子婦齊衰五月為曾祖父母女雖適人不降齊衰三月為髙祖父母女雖適人不降為繼父先曾同居今不同者為繼父雖同居而兩有大功以上親者大功為同堂兄弟及姊妹在室者為姑及姊及兄弟之女出嫁者父母為衆子婦為女之出嫁者祖為衆孫女在室同為兄弟之子之婦即姪婦婦人為夫之祖父母即夫之公㜑婦人為夫之伯叔父母即夫之伯姆叔嬸婦人為夫之兄弟之子婦即姪婦婦人為夫兄弟女嫁人者女出嫁為本宗伯叔父母即伯伯姆姆叔叔嬸嬸女出嫁為本宗兄弟及兄弟之子女出嫁為本宗姑姊妹及兄弟之女在室者為人後者為其兄弟及姑姊妹在室者夫為後人者妻為夫本生父母為兄弟之子為人後者小功為伯叔祖父母謂祖之兄弟即伯公伯㜑叔公叔婆為同堂伯叔父母謂父之伯叔兄弟為再從兄弟及再從姊妹在室者謂同曾祖兄弟即父伯叔兄弟之子女為同堂兄弟兄弟之子即堂姪為從祖祖姑在室者謂祖之親姊妹即姑婆為從祖姑在室者即堂姑是父之同堂伯叔姊妹為同堂兄弟之女在室者即堂姪女為兄弟之妻為人後者為其姑姊妹適人者為嫡孫婦為同堂姊妹之出嫁者為孫女適人者為兄弟之孫及兄弟之孫女在室者即姪孫為外祖父母即外公外㜑為母之兄弟姊妹即舅舅姨姨為同母異父之兄弟姊妹為姊妹之子即甥為夫之姑及夫之姊妹在室出嫁同為夫兄弟及夫兄弟之妻為夫兄弟之孫及夫兄弟之孫女在室者為夫同堂兄弟之子及夫同堂兄弟之女在室者緦麻為族曽祖父母謂曾祖之兄弟及妻即大伯公伯婆叔公叔婆為族伯叔祖父母謂祖之同堂兄弟及妻即堂伯公伯婆叔公叔婆為族父母謂父之再從兄弟同曽祖者即族伯伯姆姆叔叔嬸嬸為族兄弟及族姊妹在室者謂三從兄弟姊妹同髙祖者為族曾祖姑在室者謂曽祖之姊妹即大姑㜑為族祖姑在室者謂祖之同堂姊妹即堂姑婆為族姑在室者謂父之再從姊妹即族姑為兄弟之曾孫女在室同即曾姪孫為曾孫𤣥孫為同堂兄弟之孫女在室同出嫁則無服為再從兄弟之子女在室同即同曾祖兄弟之子為從祖祖姑及從祖姑及從祖姊妹之出嫁者從祖祖姑謂祖之親姊妹從祖姑父之同堂姊妹從祖姊妹已身再從姊妹為兄弟之孫女出嫁者為同堂兄弟之女出嫁者堂姪女為乳母為舅之子為姑之子為兩姨兄弟為外孫男女同為壻為妻之父母妻亡而别娶亦同妻之親母雖嫁出猶服為兄弟孫之婦為同堂兄弟子之婦為同堂兄弟之妻為外孫婦為甥婦婦人為夫之曾祖髙祖父母為夫之從祖祖父母即夫之祖親兄弟伯公伯婆叔公叔婆為夫之從祖父母夫之堂伯叔為夫兄弟之曾孫為夫之同堂兄弟為夫同堂兄弟之孫孫女同為夫再從兄弟之子為夫兄弟孫之婦為夫同堂兄弟子之婦為夫同堂兄弟之妻為夫同堂姊妹在室出嫁者䘮服經傳繹䘮服本天天一氣而二體其生物也使之一本故䘮之無二斬者無二天之道也斬衰父父者子之天父一而已親莫親焉故為父致䘮三年其䘮之也疑於死恩服也隆恩以親親也是立隆為極矣曰為君不斬乎為君斬不二斬乎曰資於事父以事君而敬同君者臣之天君一而已尊莫尊焉故為君亦方䘮三年疑於父義服以尊尊也恩者仁也義者義也生物者仁成物者義父生之君成之一氣二體之道也然則何以謂二斬乎曰君取其敬母取其愛其所本者一也故為父衰三年為君衰三年有半明無二本也爾其為母齊衰三年何也曰母至恩也資於事父以事母而愛同故為母申之則齊衰三年然衰斬而齊矣父在厭而期矣義服嫡繼母如母矣天之尊地不得而亢焉父之尊母不得而並焉故曰無二斬也此䘮服之本制生人之大義天地之性也故服術有六一曰親親二曰尊尊其親親以三為五為九何也天函三為一也播一氣於五行宣五氣為九類也父子一體譬則手足然何可得解故人之生上父下子慈孝不可解於其心故為父斬衰子為巳亦斬衰為嫡長子亦斬衰三而一者也其夫婦一體何也譬左右胖之合焉亦焉可得解夫者妻之天故為夫斬衰子為母杖齊衰母為子亦杖齊衰夫為妻則杖痛矣斷而期則無斬也天地尊卑之義也昆弟一體何也譬則手足然亦焉可得觧然而支矣世叔叔父於父昆弟也則亦一體也然而旁尊矣服斬衰而下期故世父叔父期昆弟期昆弟之子報亦期皆期而不杖圖中有上有下有中皆凾三為一而一統於中其所本者一也曰父子一體昆弟之子非子也其期何也形日隔而疎各親其親各子其子孰為手足一體之念乎又旁尊也不足以加尊故庶子期兄弟之子猶子報亦期引而進之以聯恩其以三為五何也曰父子一體父之父曰祖子之子曰孫析二氣而四時象也自仁率祖等而上能無殺乎而祖至尊也父之所尊尊莫重焉尊之故嚴之嚴之故為祖疏衰期以是為正尊其不杖何也曰父之所杖子不得而杖焉何也不敢也無二斬之義也父卒承正體之重則斬三年而祖為嫡孫報期重正體之義也生克嗣續之道葢取諸五行以五為九何也自義率祖等而上一本而生不尊尊乎祖之父則曾矣祖之祖則髙矣皆正尊也皆正尊至嚴也故皆衰齊疏然而恩有等矣不得自邇於尊焉故疏衰裳齊牡麻絰無受三月而上塟為期其承重亦斬傳曰不敢以小功之服加之所尊此立隆殺之極明尊親之至也孫之子曰曾孫之孫曰𤣥殺而下故上殺下殺以五為九而服屬盡矣其旁殺何也曰同父昆弟期同祖昆弟大功同曾祖昆弟小功同髙祖昆弟緦麻是由身而推者也父昆弟無大功服不及三從矣祖昆弟亦無大功服不及再從矣曽祖昆弟無大小功服不及從矣何也旁尊也不足加於正孫曾𤣥之旁殺也亦然旁親也不足以加正也世叔父期從祖祖父母從祖父母報皆殺而小功無已遽乎曰世叔父從斬而殺昆弟之子猶隆焉爾也不可格於從於從而殺者正也族父緦族祖父族曾祖父從祖昆弟之子亦皆緦何也曾祖父衰衰而三月矣庸得加乎曾祖孫緦其旁從庸得加乎旁不得加正故降之也故曰上殺下殺旁殺而新盡戚盡於上殫於下而生人之道窮故通於五屬之服者其知自然之體乎其名服何也曰傳有之同姓從宗合族屬異姓主名治際㑹也異姓乎於途之人幾矣聚於異姓以合體而同尊卑名以命之禮之治也由身而上名之母之矣義同母而尊故從祖祖父母從祖父母皆曰母報皆小功族祖父母族父母亦皆曰母報緦尊隆從而隆也由身而下名之婦婦之矣恩同父而親故夫之諸祖父母報皆緦昆弟五服具乃嫂弟婦無服何也以名治之也謂兄之妻嫂嫂之言叟也尊同母使不敢邇焉謂弟之妻婦卑同婦使不得邇焉名彰義逺之也㣲然者兄非屬父道也弟非屬子道也嫂婦之名此何以稱焉名以治之尊尊長長男女有别治際㑹之大也是名服也服有出入何也曰恩義之權也女在室從父天吾父為父斬出嫁從夫天吾夫為夫斬葢天移而斬異矣傳曰有受我而厚之者是也令内屬而恩隆不二斬乎無以長亂乎故女子入在親為親恩同子在夫為夫降同昆弟之子降其昆弟同從父昆弟嫁而反在室同在室此以義而權恩者也無二斬之道也子為父後為父斬出為人後為所後者斬父天也為所後者受重為正體亦天也傳曰受重者以尊服服之令為本生者恩重而服隆不二斬乎無以長亂乎故出為所後者斬為其父母報不杖期為其昆弟大功亦以義而權恩而為本生父母申心䘮曰女子出適人者為其私親皆降惟髙曾祖父母不降為昆弟為父後者不降何也不足以二斬焉故得以全恩其嫁而無主後者亦加隆焉以全恩此權制也其從服何也屬之而從之也子從母而服母黨妻從夫而服夫黨夫從妻而服妻黨庸得已乎以有屬而成恩而妻屬夫其重矣則自斬而推故也夫婦人無身以夫之身為身故婦人無親以夫之親為親非無親也不敢恩其私親也故為夫斬三年夫為父母從為之斬若齊亦三年為長子亦齊三年夫祖父母而上上殺雖其殺也從為之服亦加隆焉爾也移天易服所殺為其所從服者服是從服之道也妻父母緦母父母小功母重於妻也母兄弟舅小功母姊妹從母亦小功舅若從母之子緦重母之義也妻黨自妻父母而止義不得復推何也母疏齊衰妻疏衰杖期本服異故也其甥外孫報何也古無施不施也已爾乃從服有六自屬從而下推恩義降厭屈申以從文記具之又貴爵而上文降其上下殤有上下諸從從服輕重上下焉今制省質矣故服有恩有義有節有權皆取之人情恩觀仁義觀禮權節觀知本諸天地順隂陽四時以為經夫安可得訾哉古䘮服制儀禮䘮服傳曰凡衰外削幅裳内削幅幅三袧疏若齊裳内衰外疏負廣出於適寸疏適博四寸出於衰疏衰長六寸疏衣帶下尺疏祍二尺有五寸疏袂屬幅疏衣二尺有二尺疏袪尺二寸疏衰三升有半其冠六升以其冠為受受冠七升疏齊衰四升其冠七升以其冠為受受冠八升疏繐衰四升有半其冠八升疏大功八升若九升小功十升若十一升凡衣之設必有用然必有制以彰其義亦必有名以稱其情也以今考古世代沿革不齊故制度難得其精詳矣而䘮服有儀禮傳在名不可循名以度其制而用之乎䘮有五等斯有五服名之為五衰則五服皆有衰而衰為重焉五服者斬齊大小功緦是也斬衰裳苴絰杖絞帶冠繩纓菅屨者疏衰裳齊牡麻絰冠布纓削杖布帶疏屨三年者大功布衰裳牡麻絰無受者小功布衰裳澡麻帶絰五月者緦麻三月者斬衰大功小功緦麻異其名即異其用如此也斬不緝而齊緝齊取具齊以下皆齊可知也緝衰削杖斬衰不削杖可知也大功無受則小功緦無他變服可知也斬衰裳疏衰裳大功布衰裳言裳不言衣則上衰下裳而衰在衣可知也所謂凡衰外削幅裳内削幅幅三袧若齊裳外衰内是衰之與裳特削縫有内外之殊耳此其䘮有不同而服之制亦因之義之所由定也彼名之為負者何横布負於背也負廣出於適寸而與背相稱也名之為適者何適即領言適體也適博四寸出於衰若辟領兩分何以綴乎衰也名之為衰者何方布綴於前哀不忍於心也衰長六寸博四寸五衰特布麄細之不同也衣帶下尺言繫帶之下衣尚長尺許而其下為裳非别添一要使衣與裳異處也衽即襟之名也衽二尺有五寸有衽則知對襟者非也袂即䄂之口也袂屬幅衣有二尺二寸袪本與衣接則一句分作二句者非也袪即袖口之名也袪尺二寸袖口狹於袖中則知袖口與袂末接而謂三袪為三倍尺二寸者非也自齊衰以下言衣之制而不言裳豈略於裳哉裳之制幅三袧盡之矣前去疏衰裳齊何為獨緝其裳哉裳與衣相連齊裳即齊其衣所以不必更言衣齊而明乎齊則斬不待辨奈何制本有襟而去其襟制本無要而增其要至宋人又用直領大袖布衫而無三袧之裳皆不免以後代見聞釋經傳不肯縁其名以詳其制耳所以五衰之用不明乎世何有於制作之情義哉至若情稱其服又在用衰者之自致耳故曰喪致乎哀而止或問性理大全乃當代諸儒所㑹纂者其喪服一本諸先代温公文公家禮是編於今之喪服諸圖皆未之收何歟曰性理大全因國朝頒者而孝慈録非聖祖所欽定乎何父母斬齊之異一仍乎先儒之舊也是五服圖且與孝慈録異矣即服以衰名而今則以對衿燕尾為宜是無所用衰矣又曷取夫衰服之名哉國朝䘮服制斬衰斬不緝也衣裳皆用極麄生布旁及下際皆不緝也裳前三幅後四幅縫内向前後不連每幅作三輒謂屈其兩邉相著而空其中也衣長過膝足以掩裳上際縫外向背有負板用布方尺八寸綴於領下垂之前當心有衰用布長六寸廣四寸綴於左衿之前左右有辟領各用布方八寸屈其兩端相著為廣四寸綴於領下在負板兩旁各攙負板一寸兩腋下有祍各用布三尺五寸上下各留一尺正方一尺之外上於左旁裁入六寸下於右旁裁於六寸便於盡處相望斜裁却以兩方左右相沓綴於兩旁垂之向下狀如燕尾以掩裳旁際齊衰之制並如斬衰但用次等麄生布緝其旁及下際杖期服制同齊衰又用次等生布不杖期又用次等生布大功用稍麄熟布無負板辟領小功稍熟細布緦麻用極細熟布婦人斬衰服用極麄生布為大袖長裙葢頭皆不緝布頭􅔮竹釵麻屨齊衰服同但用次等布為異鄭氏曰禮記曰三年之䘮何也曰稱情而立文以别親疎貴賤之節而不可損益也創鉅者其日久痛深者其愈遲三年者所以為至痛極也斬衰苴杖食粥枕塊所以為至痛飾也凡生天地之間有血氣之屬莫不知愛其類今鳥獸失其羣匹越月踰時反其故鄉則回翔鳴號然後能去之故有血氣之屬莫智於人故人於其親也至死不窮將由夫邪淫之人則彼朝死而夕亡之然而從之則鳥獸之不若也將由夫修飾之君子則三年之䘮若駟馬過隙之易然而從之是無窮也故先王為之中制止於三年使足以成文理則去之矣然則何以朞年曰天地則已易矣四時則已變矣其在天地之間者莫不更始焉故以朞也九月以下則漸殺之使勿及也故三年以為隆朞九月以為間小功緦麻以為殺上取法於天下取法於地中取法於人所以羣居和一之理盡矣斬衰貎若苴齊衰貌若枲大功貎若止小功緦麻容貌可也此哀之發於容體者也斬衰之哭若徃而不返齊衰之哭若徃而返大功之曲三曲而哀小功緦麻哀容可也此哀之發於聲音者也斬衰唯而不對齊衰對而不言大功言而不議緦麻議而不及樂此哀之發於言語者也斬衰三日不食齊衰二日不食大功三不食緦麻再不食父母之䘮既殯食粥朝一溢米暮一溢米齊衰之䘮蔬食水飲不食菜果大功之䘮不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之䘮居廬寢苫枕塊不脱絰帶齊衰之䘮居堊室編蒲而寢大功之䘮寢有席小功緦麻牀可也此哀之發於居處者也斬衰布三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升此哀之發於衣服者也聖人馭於人情制為五服其等降如此今民間親屬相犯問以服紀年月皆言不知以此言之則死而不為服服而不終其制者亦多矣其去禽獸豈逺哉先師朱文公曰湖南楚王馬希聲塟父之日因食雞臛為官屬潘起所議是五代之時居䘮食肉者人情以為異事今之人乃有親肉未寒而食肉者有初䘮未歛親賔齎酒徃勞之名曰煖䘮者是禽獸之不若也尚可以三年之禮責之乎雖然南齊傅聘君實之居䘮蔬食逺近化之未可謂今之風俗不古也特在士大夫一轉移間耳負鄉曲之望者宜表率之應氏曰孔子曰少連大連善居䘮三日不怠三月不懈期悲哀三年憂東夷之子也言生於夷狄而知禮所以警中國不知禮者也然塟祭二事尤孝子所當盡心焉葢孝子之䘮親也𦵏之以禮則可以盡慎終之道祭之以禮則可以盡追逺之誠世之人固有不塟其親者况望其能以禮𦵏之乎固有不祭其先者况望其能以禮祭之乎故司馬温公嘗論之曰塟者人子之大事死者以窀穸為安宅死而未𦵏猶行而未得歸也是以孝子雖愛親留之不敢久也古者天子七月諸侯五月大夫三月士踰月而𦵏今五服年月敇王公以下皆三月而𦵏是舉其中制而言之按禮未𦵏不變服啜粥居廬寢苫枕塊葢孝子之心以為親未獲所安已故不敢安也南史海虞令何子平母䘮去官哀啜踰禮每至哭踊頓絶方蘇屬大明末東土饑荒繼以師旅八年不得營塟晝夜號哭常如拮据之日冬不衣絮夏不就清凉一日以米數合為粥不進鹽菜所居室敗不蔽風日兄子伯興欲為葺理子平不肯曰我情事未申天地一罪人耳屋何宜覆蔡興宗為會稽太守甚加矜賞為營塜壙今世信𦵏師之説既擇年月日時又擇山川形勢以為子孫貧富貴賤賢愚壽夭盡係於此而其為術又多不同爭論紛紜無時可决乃至終䘮除服或十年或二十年或終身或累世猶不𦵏至為水火所漂焚他人所投棄失亡尸柩不知所之者豈不哀哉唐太常博士吕才叙塟書曰按禮天子諸侯大夫塟皆有月數則是古人不擇年月也春秋丁巳塟定公雨不克塟戊午日下昃乃克𦵏己丑𦵏敬嬴兩不克𦵏庚寅日中而𦵏是不擇日也鄭塟簡公司墓之室當路毀之則朝而塴弗毀則日中而塴子産弗毀是不擇時也古之𦵏者皆以國都之北域兆有常處是不擇地也司馬公曰孝經云卜其宅兆而安厝之謂卜地决其吉凶耳非若今隂陽家相其山岡風水也程正公云卜其宅兆卜其地之美惡也地羙則其神靈安其子孫盛然則何為地之羙者土色之光潤草木之茂盛乃其驗而拘忌者或以擇地之方位决日之吉凶甚者不以奉先為計而専以利後為心尤非孝子安厝之用心惟五患則不得不謹須使異日不為道路不為城郭不為溝池不為貴勢所奪不為耕犁所及葢以安親為心則地不可以不擇其擇也不可太拘擇而不拘則𦵏不失其時矣人所貴有子孫者為其死而形體有所付也既而不𦵏則與無子孫而死於道路者奚以異乎詩云行有死人尚或殣之况為人子乃忍棄其親而不𦵏哉大抵世之遷延不𦵏者多以昆弟各懷自利之心唐温大雅改𦵏其祖卜人占其地曰地則吉不利於君若何大雅曰如子言我含笑入地矣官中書侍郎子孫亦為御史而野師俗巫又從而誑惑之志在偏納其賂而紿之以私也受兄賂則紿曰此地利於兄受弟賂則紿曰此地利於弟愚而無知者安受其欺而弗悟也曹仙姑詩風水山龍善脱空指南指北指西東山頭若有王侯地何不歸家𦵏乃翁夫某山強則某支富某山弱則某支貧非惟義理所不當問雖近世隂陽書亦有深排其説者惟野師俗巫則張皇扇惑以為取利之資擇地者必先破此謬説而後無大拘之患為人子者所當深察也大觀中南劒州羅鞏在太學學有神祠甚靈鞏每以前程事黙祝一夕夢曰子有罪宜急還鄉耳鞏曰鞏生平鮮有過願告以得罪之因曰子無他過惟父母久不𦵏耳鞏曰家有兄弟罪獨歸鞏何也曰以子習禮義為儒者故任其咎餘子碌碌不足責也鞏既寤悔恨束裝遽歸郷人同舍者悉訝之鞏以夢告行未及家而卒此亦可以為鑒也世之人又有用羌人法而火化者列子曰秦之西有夷狄之國其親戚死聚柴積而焚之重則煙上謂之登遐世親死而焚之何異羌人積習既久視以為常曾不知古者背叛惡逆之人乃有焚骨揚灰之戮魯夏父弗忌獻逆祀之説既其𦵏也焚煙徹於上謂已𦵏而火焚其棺椁也又王莽作焚如之刑燒陳良等則古人以焚屍為大戮也哀哉今親肉未寒為人子者何忍付之烈熖使為灰燼乎言之猶可痛心况復忍為其事或曰旅寓逺方貧不能致其柩不焚之何以致其歸塟曰亷范輩豈富耶漢亷范父䘮亂客死於蜀漢遂流寓西川西川平歸鄉里年十五辭母西迎父䘮蜀守張穆重資送范范不受與客卒負䘮歸延陵季子有言骨肉復歸於土命也魂氣則無不之也舜為天子巡狩至蒼梧而殂䘮於其野彼天子猶然况士民乎必也竭力不能歸其柩即所死之地而塟之不猶愈於火焚乎温公又曰世俗信浮屠誑誘於始死及亡七日百日朞年再朞除䘮飯僧設道塲或作水陸大會云為死者滅彌天罪惡必生天堂受種種快樂不為者必入地獄剉燒舂磨受無邊波吒之苦殊不知人生含氣血知痛痒或剪爪剃髮從而燒斫之已不知苦况於死者形神相離形則入於黄壤朽腐消滅與木石等神則飄若風火不知何之借使剉燒舂磨豈復知之且浮屠所謂天堂地獄者計亦以勸善而懲惡也茍不以至公行之雖鬼神可得而治乎唐人有言刺史李丹與妺書天堂無則已有則君子登地獄無則已有則小人入世人親死而禱浮屠是不以其親為君子而為積惡有罪之小人也何待其親之不厚哉就使其親實積惡有罪豈賂浮屠所能免乎昔伊川程先生家治䘮不用浮屠洛人有化之者自江西言之南齊先生傅聘君實之以孝行化鄉人亦如伊洛其門人鄒宗居䘮蔬食公雅敬之而銘其母吴夫人之墓且告之曰蔬食禮也更不要作佛事嘗聞西山真文忠公彼之教得行由吾之禮先廢使今之居䘮者始死有朔奠虞祔祥禫皆有祭既足以盡人子追慕之情則於世俗之禮且將不暇為之矣不復祭禮而徒曰不用浮屠使居䘮者悵悵然無以報其親未見其可也經曰卜其宅兆而安厝之春秋祭祀以時思之孝子之事親終矣程伊川曰豺獺皆知報本今士大夫多厚於奉養而薄於先祖甚不可也余嘗修六禮大畧家必有廟廟必有主月朔必薦親時祭用仲月冬至祭始祖立春祭先祖季秋祭禰忌日迎主祭於正寢凡事死者皆當厚於奉生者人家能存得此數件雖㓜者可使漸知禮義家或問俗節之祭朱子曰韓魏公處得好謂節祠某依之但七月十五不用浮屠素饌初欽夫廢俗節某日公於五月須喫粽重陽須喫茱茰酒不祭而自享於女安乎唐顔魯公張司業家祭不用紙錢衣冠效之紙錢起於𤣥宗時王璵古無有此也雖然君子有終身之䘮忌日之謂也忌日不用非不祥也言夫志有所至而不敢盡其私也朱子母夫人忌日著黑墨布衫其巾亦然學者問今日服何為曰公豈不聞禮君子子有終身之䘮又丁晉公云侍郎孺祖母歸時於衣笥中得一墨衰妯娌駭而問之云父母教以候翁姑忌日著此衣出慰當時士族之家猶有此禮今未之聞也或又曰人子之於生日茍無父母亦當以忌日之禮自處人子者可不知此意乎伊川曰人無父母生日當倍悲痛更安忍置酒張樂以為樂若具慶者可矣唐太宗謂長孫無忌曰今日吾生日世俗皆以樂在朕翻成傷感今君臨天下富有四海而承歡膝下永不可得此子路有負米之嘆也詩曰哀哀父母生我劬勞奈何以劬勞之日更為宴樂因泣涕數行下左右皆悲師友服胡澹菴為清節先生制師之服張魏公為張無垢制友之服蔡忠襄公聞朋友䘮不御酒肉楊誠齋尤篤師友義凡少時有一字之益者必謹而稱之曰某先生未嘗獨以字稱清純劉先生卒乃遂為之制服論保墳墓鄭氏曰墳墓祖父體魄所歸而子孫之心所由安也故人所貴有子孫者以身死而墳𦵏有所托耳世未有墳墓不守而子孫昌盛者唐栁子厚謫永州與許孟容書曰先墓在城南無異子弟為主懼便毁傷松栢芻牧不禁以成大戾此惟恐亡墓為人毁伐也今之人乃有望其木思以為材視其榛棘思以為薪登其丘墓思發其所藏者郭原平賣家貲貴買墓前田數十畆今之人乃有賣其贍塋田者程伊川擇地法要使異日不為耕犁所及今之人乃有侵耕墓田者禮曰君子為宫室不斬於丘木世之人乃有伐墓木以為宫室者寳祐開慶間鄉人艱食盗伐人冡甚多亦有其不肖子弟自伐其三代之冡者然祖父子孫同氣亡者不安其後未有不流亡者嗚呼尚忍言之哉昔有富兒題壁間曰家有千萬貫一世不求人有續其後曰未歸三尺土難保一生身又有續其後曰既歸三尺土難保百年墳政為此也雖然吾聞之髙墳厚壠珍物畢備也此適所以為親累非曰孝也虞世南諌厚塟書云故後周太祖郭威屢戒晉王曰柴榮即世宗也昔吾西征見唐十八陵無不發掘者此無他惟多藏金玉故也我死當衣以紙衣歛以瓦棺速營𦵏勿久留宫中勿置守陵宫人勿作石羊虎人馬惟刻石置陵前云周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也夫以天子之尊猶慮及此况庶人乎世之欲侈其𦵏者尚念之哉為人子孫須時月一省墳墓非但不忘祖宗亦使人不敢犯漢孝武時人楊王孫家富厚於養生病將終令其子曰吾死以祼𦵏以反吾真若王孫者亦可謂逹生死矣然非禮也此又不可以不知故其子孫終不忍從古禮之亡人不知事親之道今䘮禮朝夕奠之儀其事生之常禮乎孔子曰至於犬馬皆能有養不敬何以别乎噫行鮮矣三年之䘮自中出者也非强乎人也因其心之不安筦簟也故枕塊寢苫因其心之不甘於厚肥也故啜粟飲水因其不忍佚樂也故居外次不聞樂豈制於禮而不為哉情之不能止也今世之能䘮者寡矣飲食居處於平時談笑容服無所更變古之戮民與欲正天下之俗非始諸此夫安始圖書編卷一百十
