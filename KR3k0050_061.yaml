body:
  text: 圖書編巻六十一明章潢撰東嶽總序粤稽重華咨牧肇州封山濬川葢曰地有名山大川則國為之重乃若名山莫重於嶽莫尊於岱而巡狩柴望亦獨先之是故宗稱於書瞻詠於詩鎮於禮書於春秋下逮子史百氏擴其功用出震配乾豈徒以盤礴崱屴矣乎况我國家定鼎燕冀實惟兹山雄峙於東侈形勢壯輿圖以奠王畿國計漕源亦維兹是賴宜有以志之是故探賾索隐以彚經籍之文發山川之秘首之以泰嶽而峰巖水石諸名勝附焉猶之言天而不外乎日月星辰言海而必及乎蓬瀛桑碣將使遐方之人亦得而盡覽之卧遊乎洞天福地必有曠心逸度黙契吾夫子之所以小天下者矣山東濟南府山曰泰山泰安高四十餘里見東嶽函山城南泰山北麓龍洞山府東南山如重甗土有東西二洞西洞深透一里東洞出萬仭絶壁之上又有翠屏巖獨秀三秀峯龍洞黒龍潭黌山章丘鄭𤣥注書於此大峪鄒平夾谷淄川即齊魯㑹盟處長白長山抱朴子曰即泰山副嶽繡江源自此山高二千九百丈周六十里雲雨長白醴泉寺即范仲淹讀書處方山長清即水經玉符山通明山峭壁中有二石孔日光東西明透陶山肥城范蠡浮海出齊止此石閭泰安漢封泰山禪處亭亭梁父云云俱泰安宫山新泰原山菜蕪淄水出其隂汶水出其陽馬谷海豐日觀峯泰山頂東鷄鳴時見日出高三丈龍堂洞章丘縣南有東西二洞東高廣深䆳有卧龍跡旁一石卓立如柱西深可數里有泉自上滴下有石盆盛之四時不竭趵突泉濟南名泉七十二趵突為上金線珍珠次之兗州府山曰曲阜一名尼丘山孔子應禱所生之地五峯連峙今其麓有宣聖廟中和壑西南有觀川亭遺趾東有坤寧洞甑山城東雲山寧陽鳬山鄒縣形如鳬飛南有吕公洞世傳伏羲畫卦於此故土人呼其處為八卦山嶧山峯巒秀特洞窟玲瓏石門孔穴相通謂之嶧孔秦始皇刻石頌徳禹貢嶧陽孤桐即此山也昌平鄒孔子生於昌平郷即此龜山泗水龜蒙即此桃山滕雪山上有𣑽王太子廟有盤陀石悟真有丹陽白雲黄龍青龍觀音諸洞君山嶧縣陽山金郷棲霞單文亭武城曹南曹州即詩南山朝隮景山曹縣即詩景山與京髣山定陶兩城濟寧郗山嘉祥金郷鉅野獨孤鄆城黄華東平蜀山汶上榖城東阿即張良得黄石處孔子平隂梁山壽張艾山沂龜山蒙山禹貢蒙羽其藝詩奄有龜蒙居魯東即孟子所謂東山論語所謂東蒙是也大沬洞根盤三十里壁立聳霄若鉅柱之撑大厦鉅野澤即禹貢大野既潴周職方藪曰大野東昌府山曰茌山府城歴山漢有舜廟陶山館陶禹貢陶丘西山恩弇山萃古蹟姚墟濮東南援神契曰舜生于姚墟應卲曰姚墟與雷澤相近青州府山曰雲門城南牛山臨淄愚公山東有愚公冡北有愚公谷商山高苑孤山昌樂伯夷北海之濵即此山側沂山臨朐周禮青州之鎮曰東泰山即此仰天山記云仰天勝絶甲于東方又云自臨朐歴五井而西捨井山行如錦屏者二十里又云禮觀音像謁豐濟祠探黒龍淵息白雲洞聽水簾之潺湲望陂門之屹嶫真竒境也岞山安丘瑯琊諸城即齊景欲觀者九仙山蘇軾云九仙在東武竒秀不减雁蕩百丈崖在沂山東鎮廟西壁立萬仭形如斧削路皆䝉翳有泉自山巔而下灑若飛雨曰瀑布泉宛有廬山之勝喬宇篆百丈崖三字剡于巖壁蒙隂蒙隂浮來莒州文峯沂水孤奎日照絲山山形陡絶懸溜浸石如絲縷狀絲水發源于此大峴即穆陵關其山峻險僅容一軌故為齊南天險峱山臨淄齊風遭我乎峱之間兮即此水簾洞在雲門山之隂中有泉清洌常枯旁有石洞六石枕九又仰天山亦有水簾洞泉登州府山曰羽山府城東南即書殛鯀萊山黄縣封禪書萊為陽主之罘福周圍五十里三面瀕海史記始皇登之罘刻石紀功武帝至此聞稱萬歲兩石銘尚存丹崖山府城北二面石壁巉巖上有蓬萊閣及半山獅子南十三洞秀麗竒絶為一郡山冠珠磯巖在丹山下石壁千尺水中小石狀若珠璣沙門島城北海中六十里凡海舟渡遼者必泊此以避風又有鼉磯牽羊大竹四島海市見滅多在五島之上又島中多産美石齊山招逺岠嵎山棲霞五龍萊陽山下五水合流入海大崑崙寧海有大白嶺烟霞洞秀拔冠羣山即崑崙文登文登始皇集文士登此論功徳成山文登封禪書成山為日主召石山成山東海牛島文登北海中又海驢島與此島相近五壘山文登南北成行入海如壘又南石門山兩石聳立如門今按文登有鐵查山東連斤山甚竒秀圖經弗載何歟萊州府山曰塞同城東一名神山掖水出焉神仙洞府城東南十五里有洞七曰虚皇三清五祖六真長生披雲靈官又有神仙石像四十九數金泉吾度之萊山州北五十里東連大澤御駕明堂諸山多秦篆懸崖斷莫能辨天柱山絶頂巉巖聳立如柱孤山維夷齊廟在陸山昌邑霍光封此膠山膠山膠水源焉一名鐵撅礪阜高宻石城即墨淮渉發源于此不其漢鄭康成教授此山勞山濵海山有二其一高大曰大勞山其二差小曰小勞山二山聨屬高二十五里周圍八十里齊記曰泰山雖云高不如海東勞天井山即墨上有一井極甘故名北有三穴湯泉出焉熱甚三山萊州北漢志蓬萊方丈瀛洲此三神山者在渤海中豈海岸之三山也萬里沙夾萬歲水兩岸沙長三百里遼東山附首山都司西南山頂平石上有掌指之狀泉出其中挹之不竭輝山瀋陽層巒疊嶂為諸山之冠又有蛇山狼山黒山巾子山皆在衛境醫巫閭山廣寧舜封十有二山以此山為幽州之鎮自是遂為北鎮其山掩抱六重故又名六山上有桃花洞中可容五六人又聖水盆三其水自懸巖下瀉雖冬不冰又有仙人巖飛瀑巖山下又有吕公巖大團山寧逺中高四百四丈守之可斷北方出沒之途長白山三萬衡東北横亘千里其巔有潭周八十里淵深莫測南流為鴨緑江北為混同江桃花島寧逺濵海漕舟泊此孤石廣寧屹立海中高百餘尺周圍三十餘歩上有仙石棋盤下有黒石棋子歴山府南五里一名舜耕山古有舜祠曽南豐齊二堂記云舜耕歴山漁雷澤陶河濵作什器於壽丘就時於負夏鄭康成釋歴山在河東雷澤在濟隂負夏在衛地皇甫謐釋壽丘在魯東門之北河濵在濟隂定陶西南陶丘亭是也以余考之耕稼陶漁皆舜之初宜同時則其地不宜相逺孟子又謂舜東夷之人二家所釋雷澤河濵壽丘負夏皆在魯衛之間東方之地歴山不宜獨在河東在齊者是也世因河東雷首山一號歴山溈水所出舜娶堯女所居遷就附㑹謂歴山為雷首之别號不考其實由是言之則圖記皆謂齊之南山為歴山舜所耕處故其城名歴城為信然也或者不此之論乃備陸魯望象耕鳥耘之辯可見其贅龜䝉云世謂舜田歴山象為之耕鳥為之耘聖徳感物非也葢耕者行端而履深似象歩耘者舉疾而畏晩如鳥啄通典云山有太甲冢未詳歴山南屬泰山東連瑯琊崇岡疊嶂脊脉下斷欽嘗有詩云濟南山水天下無晴雲曉日開畫圖羣山尾岱東走音奏海鵲華落星青照湖此濟南山勢也長白山長山縣南三十里太平御覽云長白山者因此山雲雨長白故名西南又有太湖山二山並有石室敗漆船上有記皆謂堯時物元和志云於陵城西長白山高二千九百丈周六十里昔陳仲子夫婦隐此宋范文正公讀書寺中九仙山宻州東南百二十里坡云九仙在東武竒秀不减雁蕩所謂九仙今已壓京大是也龜蒙山魯頌閟宫曰奄有龜蒙遂荒大東傳曰龜蒙魯國二山也龜山近魯在今費縣西北七十里後人指為蒙山者山頂宛如龜形名不虚得夫子龜山操曰余欲望魯兮龜山蔽之韓退之擬曰龜之大兮祗以奄魯則龜為魯之大山明矣蒙山在龜山東二山聨屬長八十里禹貢之蒙羽論語之東蒙正蒙山也先王封顓臾為附庸之君使主蒙山祭山在東故曰東蒙後人疑於東蒙之説遂以龜山當蒙山蒙為東蒙而隐沒龜山之本名夫魯人頌其本國之山川辭必審矣故今定蒙山為龜山東蒙為蒙山以復古焉帝王世紀少昊自窮桑都曲阜註謂窮桑在魯東蒙山屬魯地未知果否龜山下有古顓臾城山前玉虚宫唐仙人賈神翁所建有英烈昭濟惠民王祠即顓臾也山西南十里餘有漏澤澤有五宂春夏積水秋冬漏竭將漏之時有聲居人扈穴取魚隨種麥比水至麥已收矣費縣廨有唐大中間校書郎李潜漏澤賦并序石刻宋至和間出于泥中今斷裂為二在醉翁亭記碑旁醉翁碑者歐公同時人蘇唐卿為費縣宰篆記文刻石立于此并刻歐公往復手帖皆精蒙山前陽口村有玉皇廟相傳老萊子故宅也陽口亦山名羽山地記舊在朐縣西北九十里今屬沂州東南百二十里殛鯀山也前有羽潭一名羽池左傳鯀化為黄熊入于羽淵即此淵君山一名抱犢山嶧州六十里述征記曰承縣君山有抱犢固壁立千仭去海三百里天氣澄明宛然在目山上有池深纔數尺水旱不増减平田數頃昔有隐者王老抱一犢于上耕種後遇異人仙去故以名焉漢曰樓山魏號仙臺其高九里周四十五里然今嶧州城北别有仙壇山亦竒秀豈即仙臺而誤為君山所掩邪夾山嶧州北七十里通典東海懐仁縣有夾山即夾谷也左傳定公十年公㑹齊侯于祝其實夾谷孔子相漢有祝其縣石屋泰山東行三四里無復溪徑披蒙茸攀巉巖傴僂而上愈進愈險下瞰嶺崖驚汗浹背又三里盤旋轉一岡而石屋在望矣有羽士迓於青松絶壑間前牽後擁迺獲躋焉瞠目縱晀上有削鐵竒峯千朶前有夷地可半畝入其中窈然深朗然虚明石竇涓涓凝結玉柱大十圍高丈餘晶瑩可鑒崖有元君手印玉指宛然後有石床則元君偃息處左偏一竅透絶頂頂有石樓可坐三四人水滑不能升躋攀數蹬而下力疲卧石床毛骨灑灑旁有聖水池清冽而甘不盈不涸下有石曰牛心甚竒怪又下有洗鶴灣深不可測鶴鳴於上似與人聲相應和真仙境也遊泰山者每以道左日窮為畫於斯罕到孰知石屋之多竒標山綽然亭西四三里有雙山曰標各廣四十畝童無樹林東西並峙皆青山疊矗勢陂陀可歩而上按圖輿經無其名葢土人以旁無他山惟此石標可望故以名之其上有洞如屋可避風雨始登若小勞既戾其上神超氣逸身欲羽飛環視衆山手若可即其聨巖屬巘盛於東南而㣲殺於西北諸支流之水縈絡交碧練横繩引析而復合葢郊外可登眺者莫此勝焉龍洞山山如重甗上有東西二洞邃深一里許東洞出萬仭絶壁之上洞口釡􅑄尚存烟火之跡如墨昔人避兵引絙以上中心有泉不知其深幾許又有翠屏巖獨秀三秀峯峯側又有龍洞禱雨輒應宋封靈虚宫下有黒龍潭懸珠泉俱近洛口九域志又云禹登山謂禹治水嘗登此雲門山府城南五里上方號大雲頂有通穴如門可容百餘人逺望如懸鏡泉極甘冽崖壁上衘蚌殻結石相傳海田所變如沈存中筆談載大竹山崖螺蚌石子横亘如帶之類齊地尤多又有碎石子或間瓦礫凝結作石殆不可曉葢蚌石雜沙土凝者水所積也石子自凝成石者氣所化也豈天地之終萬物皆碎為塵及其開闢漸復凝聚元氣渣滓中融化未盡者猶有其質耶以理逆之無足怪者雲門之東曰劈山山峰分裂如劈古名劈頭山西則駝山三山聨翠障城如畫瑯琊山宻州東南百五十里齊景公放於瑯琊即此吳越春秋越王句踐徙瑯琊立觀臺以望東海秦始皇卄八年南登瑯琊大樂之留三月徙黔首三萬户於臺下立石頌徳御覽云碑有六百字可讀臺側有四時祠臺上有神泉人或汚之即竭漢於此置瑯琊縣武帝亦嘗登焉隋開皇十六年於此置豐泉縣大業初復為瑯琊唐省之今山下井邑遺跡猶存登山石道如故土人名曰御路艾山棲霞西北三十里山前温泉可浴按棲霞縣本以山得名曰百澗北曲方嶺唐山靈峯覆甑積金芝陽公山棊山磁山哈㠠山哈㠠在福山南岠嵎山不能具述大抵環縣皆山耳宋李常云吾州有重巖疊嶂不可名狀信然鄒嶧山嶧之為山雖非名嶽巨鎮其洞府玲瓏巖竇﨑峭千態萬狀他山之秀未必可竝道家所謂洞天此非其一歟頃導江張先生題嶧山詩云淮堧有葛繹其陽孤桐生地里殊逈隔山名難混并葢謂此山去今徐地逺非禹貢所載嶧陽孤桐之山也竊嘗考之書曰海岱及淮惟徐州詩閟宫云保有鳬繹奄有龜蒙遂荒徐宅春秋文公十三年杜預註云嶧山在鄒縣北今山之西南有村曰故縣疑其為古鄒縣也唐杜佑通典云故鄒國城在縣東南周圍四十里上冠峯巒下屬巖壑窮險勝景有鄒嶧山宋逸齋王氏詩補傳云鳬繹二山皆徐國之地繹與嶧同李迂仲詩解曰保有鳬繹之繹即禹貢所謂嶧陽也陳大猷書解旁註薛氏云嶧山在襲慶府鄒縣此山始無土壤故山陽孤桐可貴程氏春秋分記嶧山在鄒縣東南三十里高秀獨出太平御覽嶧山事迹引爾雅曰鄒嶧純石相積連屬而成山鄒山記云鄒山古之嶧山也孤桐之所植邾文公之所卜山下是鄒縣本是邾國魯穆公改鄒山從邑變故謂鄒山嶧陽猶多柏樹之睘山在福山縣東北三十五里連文登縣界周圍五十里三面瀕海史記秦始皇登之睘刻石紀功郊祀志齊有八祀之睘為陽主漢武登睘山聞稱萬歲即此其東南海水中有疊石俗傳武帝造橋有雨石銘尚存歐陽修云古秦篆遺文纔二十一字曰於久逺也如後嗣焉成功盛徳臣去疾御史大夫臣徳其文與嶧山碑泰山刻石二世詔語同而字畫皆異惟泰山為真李斯篆爾鰲山鰲山一曰勞山有大勞小勞齊記謂泰山高不如東海勞始皇登勞盛山即此以勞於陟也在今即墨之東南四十里東西南直距海上山形延亘若城雉峯起如堞縱横高卑直突旁擁相系凡五百餘里其竒峯怪石不能以狀崩崖幽谷深巖絶壑峻嶺曲崦不盡以名棲禪錬真靈異之蹟不可以徧土人以峯名崓山多因名嘉靖癸巳秋余按縣至自膠聞藍侍御玉夫悉山之勝云土人不易到不能自遏與玉夫出東郭三十里由三標山出海上蒿莽中十里纍纍數丘一高起曰鶴山至則攀陟亦峻石㟏岈磊砢憑籍為磴松多偃枝古幹夾石而上一道宫曰通真庵後有洞傍巨石鑱道人丘長春大書鶴山洞余亦勒同游嵗月鰲之東麓也西南諸峯挿天横亘數重望之若劍㦸羽鏃森列而恍然若雲並海濵東南行二十里山皆巉巖一峯深秀多長松怪石由叢石歴塊轉折成路至獅子巖下有臺宇乃宋太平宫也巖側有三石結架如户出其上時夕陽在峯頂海濤撞激直至峯下是夜宿道人居夜半月色潮聲不能寐起坐臺際雞鳴與玉夫登巖見日自海隅湧出雲霞異色海氣蒼漭日光浮金萬里世之大觀也是日巖下題石門曰寅賔巖壁大書一詩從宫之南渡飛仙橋尋白龍老君華陽諸洞降巘乘小兠從者徒歩縁海灘亂石間行轉入山麓遵海而東歴畨眼嶺下臨不測屢䇿杖惴惴由惡水河亂石灘皆海濤中行山迴從蛟龍嘴歇肚石黒松林皆山腹處極險非人跡所至有下清宫在山之隅不能至從黄水灘西北入山中凡三十里始有人居就樹下飯由山徑歴黄山崓黒山崓觀音崦皆矗起數百仭極竒秀又三十里入羣岫間北峯峻極山半隐隐臺殿至則巉削攀絶僧垂木階下乃援而升上有石洞洞額大書明霞洞大安辛未題余勒詩一章其中空同上如厦環石如堵前設户牖洞左有佛宇僧廬右石門從磴數百級上絶壁數仭下視滄海與天浮動島嶼皆空壁下一草庵老僧定處是夜宿洞中明日晨飯畢下山經石瓢清凉甸聚寳峯三里山峯下有道院亦宋所建上清宫宫傍石間跨朝真迎仙二橋橋側巨石鑱詩十絶亦丘長春書字畫端整余書如夢令詞于右由寳珠山八水河十五里登天門山極峻險峯多竒狀如仙釋擁出山口復有二峯若石疊就高數十仭兩楹相峙上逼雲際下瞰滄海峯有丘長春大書南天門三字大抵道上之山人跡罕至道釋之外鮮有登陟丘葢宋南渡後避世於此者從天門南下歴數十峯初視若蟻壤且近行數十里不絶每峯皆峻大而仰莫及者降至麓瀕海上曰韓寨上有聚仙宫碑勒元學士張起巖記飯於宫復從西北入山循渰牛澗磚塔嶺僧㡌石大風口三里河小風口瘦龍嶺清凉寺仙跡橋金剛崓二十里至巨峯其峯最高而竒周山之峯異狀百出徘徊不能去巨峯下數石百仭壁立梯窮徑絶有兩石若劈劈處見一竅上聞大聲一僧乘木梯下請升遂援之而上由壁中行轉至一茅庵甚明㓗左有佛宇嵌崖隙甚幽西北羣峯直出其後東南海色相映庵前牡丹諸竒花偃松異木從故道十五里出海濵循山麓西北行皆平地四十里至華樓山下數里至巔松千株皆偃葢從石隙間深入有萬壽宫老君殿少憇尋翠屏巖余梯而大書之時已晩宿道人庵明日晨起與玉夫尋古遺跡周山之石摩勒殆遍多金元人作者從王喬崓至凌烟崓下題同游嵗月峯隙見海色逺映道人吹笙笛於高架崓上飄然有物外之想遂尋金液泉夕陽洞石門山至清風嶺題名於嶺之石門又歩至華表峯下一曰聚仙臺其峰疊石數十仭峻拔且秀竒少焉海中諸島東有大管小管車門滄洲南有鮑魚老公車屋大古小古浮島皆登陟所見者趵突泉按圖泰山之北與齊東南諸谷之水西北匯於黒水之灣又西北滙于栢崖之灣而至於渴馬之崖葢水之來也衆其北折而西也悍疾尤甚及至于崖下則泊然而止而自崖以北至於歴城之西葢五十里而有泉湧出高或至數尺其旁之人名之曰趵突之泉齊人皆謂嘗有棄糠於黒水之灣者而見之於此葢泉自渴馬之崖濳流地中而至此復出也趵突之泉冬温泉旁之蔬甲經冬常榮故又謂之温泉其注而北則謂之濼水達於清河以入於海舟之通於濟者皆於是出也沂山舜肇十有二州封十有二山濬川禹奠高山大川沂山其一也周禮職方氏正東青州其山鎮曰沂山沂山在臨朐南百餘里即古葢與朱虚地顔師古曰沂山在葢鄭志曰朱虚有東泰山考之水經云巨洋水出朱虚縣泰山酈道元注曰泰山者東泰山也巨洋水即國語所謂巨水袁宏所謂具昧王韶之以為巨蔑亦或曰朐瀰一水也而廣其目焉西則逺宗岱嶽東則俯視瑯琊山之巔為百丈崖有飛泉下灑曰瀑布左麓為東鎮廟或曰中有堯栢背負鳳凰嶺南有穆陵關界長城書案二嶺之間管仲所謂南至穆陵是也大峴栁龍諸山環其左石門仰天逢山繞其右嵩朐委粟奠其北金泉瀰水經其後斯則沂山之靈秀為東方之巨鎮也自虞夏有望秩之典至周有埋沉之祭秦祠加車乘騮駒岱嶽泰山泰山在泰安州北東方之嶽也一曰岱宗又曰兗鎮周禮職方河東曰兗州其山鎮曰岱山書曰二月東巡狩至於岱宗五經通義云王者受命易姓報功告成必於岱宗東方萬物始交之處宗長也言為羣嶽之長詩曰泰山巖巖魯邦所瞻博物志云一曰天孫言為天帝孫也主召魂東方萬物始成故知人生命之長短白虎通云王者受命必封禪封者増高也禪者廣厚也皆刻石紀號著已之功績以自效也天以高為尊地以厚為徳故増泰山之高以示報天禪梁甫之阯以報地漢官儀及泰山記云盤道屈曲而上凡五十餘盤經小天門大天門仰視天門如從穴中視天忩矣自下至古封禪處凡四十里山頂西巖為仙人石閭東巖為介丘東南峯名日觀雞鳴時見日始欲出長三丈所又東南名秦觀可望長安秦李斯碑篆毁僅存數字吳觀者可望㑹稽周觀者望見齊黄河去泰山二百餘里於祠所瞻黄河如帶若在山趾葢侈言也又云山南有廟種栢千株大者十五六圍相傳云漢武所種今所餘無幾小天門有秦五大夫松尚存嶽頂有秦無字碑人云内有字葢韜之也斵崖數丈唐開元紀泰山銘𨽻書大四寸乾封年登封文在其右字寸許類聖教序集右軍書為近時閩人葢以忠孝節義四大字盡鑱毁見者痛惜山有丈人獨秀雞籠老雅獅子蓮花懸石諸峰百丈捨身馬棚鵓鴿諸崖石經石壁佛寺鬼椒子酆都桃花馬蹄溪里諸峪迴馬雁飛黄峴思郷青峰西横諸嶺牛心龍口試劍龍紋虎阜諸石迎陽吕公白雲遥觀思仙諸峒玉女王母白鶴白龍水簾諸池又有明月嶂登仙臺下有東西中三溪有云云亭亭梁甫杜首肅然萬里諸山皆先代所禪者上有嶽廟碧霞仙女祠四方乞靈者歲無虚日所施牛羊馬金綺錢帛甚多有司掌之歲數萬金山東之財用實資焉泰山自濟南往謁闕里回抵泰安公館夜酌景賢曰喜兹和煦明當同登泰山一覽竒勝可乎余諾之明晨起與景賢聨騎出州城北望輕烟薄靄横帶山腰適㕘政葉拱宸副使莊尚源邂逅而至遂與偕往北行二里過白鶴泉泉出石罅湁潗鼎沸久旱則滲漉距西百餘歩曰梳洗樓不知剏於何時惟存故址從西折北二里有王母池泉甘而冽瀵沸潾㵾不竭不溢郷人取水禜雨頗驗又北五十餘歩曰吕巖有吕仙石像宋時建樓閣堙圮獨荒基破礎猶存今圍以石垣其中深林茂草森布蒙宻曄曄猗猗頗有佳致至山麓時日出扶桑雲霞絢綵目前羣峰錯立逺近異態景物之竒似快心意自山麓抵迴馬嶺十餘里羣峰對峙嶻㠔峥嶸勢相噬齧中夾溪流轉騰潎洌觸崖石激堆琦其聲澎湃瀥瀥浤浤縈迂數里入汶又有巨石大者如輪小者如甕􅀈砊碨礧偃卧路徑難以數計䇿馬單行﨑嶇至嶺下是嶺岌嶪陡絶車騎不可前馳余四人神思覺疲僕從亦有倦色少憇石上飲茗易肩輿穿深林踰大石行可四里陡崖劖削中夾石徑䧢陀險阨有石磴可躋復行二里許即宋真宗東封帳宿處曰御幛其地夷衍嘉木榬榬繁隂布地前即深澗黛蓄膏渟水光映天巉石錯雜如齗齶有小魚色青黒浮遊水面臨溪觀之時羅道士獻茶餅余試以餅餌之翕然聚已而尚源投以小石悉潜去復三里餘至黄峴山秦時有松五株始皇登山封五大夫枯沒後人續植者有百餘年老幹拳曲擁腫宛若蒼龍勢欲飛騰余四人休憇其下嗟賞竒態又行二百餘歩曰百丈崖崖广音眼如屋可容十餘人臨瞰道傍紫蔓青蘿摇綴蒙絡傍有石洞谽谺而黒莫測深廣人亦慴愳不敢窺又經石壁峪至十八盤兩峰對挿峭削如壁其間累石為徑盤當西南天門幾五里逺望如梯懸倚山畔此最險絶易出轎盤道而上入又門東行數里詣昭真觀易冠服薦祀紫霞元君問道士云不知創始每歲春月四方謁者踵至心弗䖍立致竒報余聞而驗之數矣已即祠後觀碑唐𤣥宗紀泰山銘字大如手歲久風雨多剥蝕其字距東十數歩觀始皇封泰山制李斯所篆其石埋植土中高五尺形制似方非方四面廣狹不等余刮磨垢蝕而細觀之總二十二行行各十二字多不可識又西行數歩上太平頂此泰山最高處上有磐石方丈亷隅尚整黧色光潤可愛余四人坐石上少頃拱宸尚源足疲怯還昭真觀余與景賢蹇裳徑往頂上俛瞰羣峰攅簇伏地若培塿獨神霄兩峰􅀈嶙特起佳花異草含丹吐白者駢羅列布於巖谷靈禽怪獸啾鳴嘯號之聲雜沓應耳最為泰山竒勝又有三峰曰日觀吳觀周觀余與景賢縱目四顧渺然無極而崧華恒霍諸山以及江漢河濟諸水皆可指數誠天下諸山莫踰其高時日正午風清氣爽徘徊既乆頓覺神思飄洒逈隔塵寰而不知身踞青霄上也復從頂東下數十歩有玉女泉水清甘美道士時汲㵸茗又東行二十歩曰龍口泉大石有罅如龍哆其口水自中出其流㵿㵿有聲潨然復從險陘南行四十歩懸崖􅀈峍絶壑古木蒙蔽余俯身覘之毛髮𥪡聳有怪石形如大匱虚倚崖畔風至摇撼問道士云此謂捨身崖人修道從兹捨身入僊境余與景賢深惻道士惑世者戕人之生遂命州官塞路徑絶往來崖之西有五峰嶙峋巉簇其狀若蓮名蓮花峰自西山小山折旋而東層嶂疊出泉湧石上奔㵼數十丈縷縷如簾名水簾泉其鷄籠諸峰桃花諸峪多有靈跡竒勝獨嶺嶠巃嵸巖壑嵽嵲荆蓁交迷路徑不可到從天門盤舊道而下至半嶺正夕陽西照回視山色玲瓏水光蕩漾樵翁牧子隐隐樹林間恍若畫圖中人物欲乘餘興往徂徠尋竹溪六逸堂故基石守道隐居日已暮矣尼山居曲阜東六十里出城十里左右累累然盡魯漢諸陵去二十里茂林葱鬱中有馬鬛封者顔墓也及二十里餘逺近岡巒秀列隐若龍虎蟠踞環結而為五峰者此即尼山也山下有夫子廟廟東有中和壑南有觀川亭亭下有智源溪滙衆流為川川有坤靈洞俯視之深黒不可入相傳中有石床石枕諸公徘徊久之相與嘆曰天下之大非無名山大川可觀而千萬年斯文一脉獨肇於此得非天地五行精華之氣自開闢初已秘於此一旦吾夫子應禱而生有以獨得之盡奪天下古今之秀為人之至又為聖之至也闕里廟圖廟之制中為大成殿十楹崇八丈邃有竒廣倍其半為左右廡百餘楹後為寢殿八楹前為門四重中為橋三殿之左為家廟後為神厨前為詩禮堂為神庫又為燕申門殿之右為啟聖王殿後為寢前為金絲堂又前為啟聖門前左右為齋室室之外為快覩仰高二門與觀徳毓粹二門而四又左右為鐘鼓樓與角樓而六閣之前後為碑亭各四前四亭則本朝御製而祝勑諸文皆附焉闕里嘉靖二年閏月芬舟抵濟寧問道謁闕里得九川言君為主伍寒泉適以部事至偕行甲子發濟寧東趨昌平驛六十里又東趨四十里乃至是夕薄公舘沐浴明日早具菜果擕麻姑泉入廟修釋菜禮九川曰此禮廢久矣禮畢入寢殿拜鄆國夫人入右殿拜啟聖王出觀杏壇壇在正殿前有新杏衍亭出大成門觀手植檜孤幹古色若虬旋起未已出奎文閣至大中門又至儀門見兩墀栢隂鹿數十皆黄色乳而馴却登奎文望之北南東皆山環抱若人冠冕佩玉執圭秉笏端拱正揖逡巡於三十里外正南為綱山其外為鳬山山之麓為伏羲畫卦所東南為防山其外為尼山尼山之南為黄山又其外為顔母山為嶧山為三峰山亦名車稍山葢二百里而遥正東為東山其外為九龍山又其外為鳳凰山為陪尾為蒙山山之南為夾谷葢三百里而近東北為馬鞍山山之夕陽為夫子刪述所其外為臨樂山為昌平山又其外為龜山葢二百里而近正北為九峯山其外為甑山為杏山又其外為梁父為云云為亭亭為介丘為徂徠至所聚􅀈為泰山望之烟雲縹緲葢百里而遥其西則廓然惟淺壠平阜依稀環抱若宫牆若城郭周遭數十界水曲曲可辨其内為沂為洙為泗其外為漕為洸又其外為汶為濟大抵皆西南流㑹於今之濟河乃折而東徑徐以入於淮也然沂水出於尼山徑闕里之南西流滙於逵泉溢於雩水行七十里入於泗非東出於岱麓之沂山至於下邳行六百里之沂也洙水出臨樂山西北流浮孔林入於泗非出於兖城北之洙也泗水出陪尾山西流徑闕里之北百里强折而南㑹於沂入於濟非東出乘氏南東流至眭陵行千餘里入淮之泗也汶水有仙臺原山寨村三源皆西流合於泰安之下又西流六十里合徂徠源之小汶河乃注於洸而南入於濟惟良泉則仰出於黄山北流徑東峙羣峯之外以入於泗竒矣九川曰凡山皆發於崑崙至於都㑹山必西峙水必東流闕里之山環北南東三面而沂汶泗又皆西遊葢逆矣芬曰地勢東南傾而水流焉氣澌盡也中原地氣此其障與夫黄河排積石入中國衝潰突厥其患不啻獫狁金元非岱嶽諸山東奠之則青徐之境與碣石俱淪矣兹土山水俱逆實啟中國元氣之運故岱於五嶽得稱宗焉而伏羲畫八卦以始斯文孔子作六經以終斯文皆於兹土亦萬古人心之障也九川曰闕里當奎分漢書云魯奎婁之分野與歩天歌言角亢氐為兖州之分野異今以漢書云衛文徙曹楚丘仍占東壁東壁衛分野曹楚丘魯地也然則斯文在兹其天地之交元氣之㑹與聖公曰予今日始有聞矣遂下東登詩禮堂堂舊名延賔又入觀孔聖家廟廟前為舊金絲堂基即魯共王欲壊處九川曰事亦神哉芬曰不然昔夫子厄於陳蔡大夫而絃歌不衰大夫乃感而去共王壊宅時孔氏子孫無如之何亦惟金石絲竹是修耳共王果亦感而止故君子貴自艾聖公寒泉皆躍然曰子於處憂患之道幾矣已訪聖公宅與修士相見禮公固讓廢之日午公留餉設酒樂具絲竹有琵琶短篴而琴簫闕焉酒七行罷往拜顔廟於街之東北有樂亭於前儀門外有古井其陋巷在廟之街東南是行也聖公不與既而出城北比四里所拜孔林至則聖公及博士聞禮先生亦集矣導自漸門入二百餘歩為夫子墓土封高丈餘芬升之林木深秀無禽鳥聲洙水漾於前緑浄可染其西南有子貢舊場時有為除草築室者東南隧道左有駐驆亭未入出饗殿前觀二石人四石獸竒古予三人摩挲久之聖公曰人則翁仲獸則或以前為角端然與芳曰獸則外一為神羊即獬豸内二為駁馬人則魏明帝鑄銅列於司馬門外者號翁仲恐墓前石人别有稱或者方相之類與上前門坐少頃九川復引至刪述所距孔林東北亦四里因元有書院九川増大之且易書院名為洙泗講壇壇實據二水之勝而馬鞍山又别委三峯如筆架於前果神秀哉壇後為聖公别墅亦造焉因與之别而往拜周公廟於城之東北其地隆聳葢足俯詧北南東三面之竒也公之後有東野氏殊零落孟廟墓鄒本古邾小國兗州之南鄙也至繆公時改邾為鄒鄒城東南隅有岡曰文賢其勢回旋掩抱有溝曰因利水自巽方而來灌城壕而西之古人傳之曰因此山川之秀而孟子生焉今魯國鄒興郷鄒儒里即其地也卒𦵏於四基山之陽郭璞云邾城東北有嶧山嶧山北有牙山牙山北有唐口山唐口山北有陽山陽山北有孟軻塜在焉今四基山者是也河南開封府山曰夷山府城黒陽原武酸棗延津黒山封邱首山襄城縣南史記申公曰天下名山八而三在夷狄五在中國皆黄帝所嘗游首山其一也邢山新鄭上有子産冡禹山鈞州狗脊中年雲壠宻梅山鄭嵩渚榮陽敖山河隂即敖倉方山汜水開陽宻洪溝河隂縣東即楚漢分界處北接廣武山與滎澤連葵丘考城縣治東春秋諸侯盟于葵丘鴻溝即楚漢分界處隋堤即隋焬帝所築歸徳府山曰虞永甘露嶺寧陵隋文帝幸岱至此甘露降故名河南府山曰嵩山登封縣北五嶽之中嶽也東大室西少室首陽偃師轘轅鞏有十二曲將去復還故名漢于此置關女几宜陽白蘭香神女上升遺几在焉北邙府城北連偃師鞏孟津多漢唐陵塜金門永寧竹可笙管天壇山永陵縣西一名壇屋山宋王子由紀異云早暮有影其色深碧旦則在西直挿天際日高則卧與海接暮影在東先卧後立他山所無也壇上有仙燈王母洞中有仙藥中巖有仙猫洞青要新安白石渑池澗水自出三塗嵩砥柱陜即禹貢云三門禹鑿通河曰鬼門中曰神門北曰人門雞足陜上有虎巖洞臨河宛如雞足峴山靈寳閿山閿郷熊耳盧氏即禹貢云龍門龕在府南二十五里兩山對峙東曰香山西曰龍石壁峙立伊水中出又名伊闕壁間鑿石龕石佛大小千數王喬洞新安洞上二木皆化為石而復産枝葉與凡木類南陽府山曰豫山城東杏花鎮平桐栢唐淮水自出銅山泌紫金鄧熊耳内郷丹崖其石悉赤壁峙霞障若江雲秀空二岫更為竒出方山裕即曰方城以為城箕山舞陽黄城葉即子路問津崆峒汝昔廣成子隐此然崆峒有三一在安定一在臨洮莊周述黄帝問道崆峒接遂言游襄城登貝茨訪大隗皆與此山魯山魯山峨眉郊卧龍岡府城西南汝寧府山曰天中府城北亦名天台山高丈餘上土下石以其在天地之中故曰天中自古考日景測分數莫正于此蟠山確山石城信陽洪山遂平羅山羅山浮光光山安陽固始彰徳府山曰韓陵府城東北賀蘭磁五巖湯險東涸臨漳隆慮林負大行按恒嶽景最竒絶黄華在隆慮山内有三峯名仙人樓玉女臺魯般門其頂突出雲表名摩雲峯連峙若屏名連屏峯羣峯磊落如仙人聚集名聚仙峯下有黄華谷北巖出瀑布又有抱犢岡馬鞍山棲霞谷景頗幽勝又有挂鏡臺皷山武安崇山渉流沙嶺林縣其嶺多沙遇暴風飛走如流衛輝府山曰神山城西一名仙翁同盟獲嘉蘇門輝晉孫登隐處朝陽淇牧野府城南青巖山在淇縣西南上有水簾洞懐慶府山曰太行府城北其山西自濟源東北接河内修武輝縣林縣至磁州界緜亘數十里峯谷巖洞景物萬狀雖各因地立名然實皆太行為中州巨鎮禹貢大恒山至于碣石亦相聨屬之意王屋濟源縣西百里禹貢底柱析城至于王屋是也以其山形如王者車葢故名天門修武紫金孟明月山層巒疊嶂左右迴抱宛如城闕大行之支峯也西有蒼公洞洞方一丈有天平石光瑩如碧玉然百家巖河北諸郡山之所至隨地異石其實皆大行也修武北五十里有曰百家巖者以巖首稍平可容百家故名白鹿山下百家巖並大行之麓北行三十里至白鹿山山之半有白茅寺一曰白雲泉中有三鳳嶺西有二泉左曰金沙右曰銀因像異名石門山白茅寺東比至石門山兩山壁立相拒如門下冇三潭深不可測盤谷濟源縣北有韓愈送李愿歸盤谷序王母洞天壇山北洞下淵深莫測王屋山王屋山在濟源縣西百里禹貢曰底柱析城至於王屋是也以其山形如王者車葢故名或曰山伏如屋也又曰山空其中列仙宅之其内廣濶如王者之宫也按龜山白玉上經暨茅君内傳皆云大天之内有𤣥中洞三十六第一曰王屋之洞周回萬里名清虚小有之天杜甫詩憶昔北尋小有洞即此山也其絶頂曰天壇常有雲氣覆之輪囷紛郁雷雨在其下飛鳥視其背相傳自古仙靈朝㑹之所世人謂之西頂葢以武當山為南頂泰山為東頂而竝稱三頂云夙慕天壇王屋之勝顧塵事羈縛恒以未獲一游為憾歲乙巳三月十三日乙亥蚤起渡河徃游是夕宿元武翌日丙子宿武陟丁丑宿覃懐戊寅宿濟源己夘晨出縣城西走溝中四十里飯胡嶺又折西南行十五里度秦嶺皆行山上逾五里至劔河堡南行又折西北行十五里陽臺宫在王屋山之麓唐司馬承禎修真之所也明皇御書寥陽殿三巨字殿中塑昊天上帝像旁侍十二元辰皆偉麗而白雲道院乃巨寥陽之東曰白雲者承禎别號也宋徽宗嘗游幸其中天尊殿壁繪神仙龍鶴雲氣升降輦節羽儀之屬甚竒葢開元中人筆殿左有唐大中八年碑上刻睿宗與子㣲書并送還天台詩入道院見大鑊一徑丈深數尺勝國時物也宫之南有八仙嶺其勢如八仙飭冠佩下天拱揖而嚮陽臺又有仙猫洞燕真人丹成雞犬皆仙去而猫獨不飛昇至今在洞呼之即應者又不老泉皆去宫不逺出陽臺宫東北行下山百餘武謁烟蘿子祠祠前有洗參井祠即烟蘿子宅址也烟蘿子者晉天福間人世傳烟蘿子佃陽臺宫田苦積功行忽一日於山中得異參闔家食之拔宅上昇云過祠北行磵道中褰亂藤履危石東西兩山壁立千仭風颼颼起巖谷林木間令人震恐磵道中行八里復上山坂壘巘盤曲莫記層數乃循石磴道士導引入紫薇宫仰視臺殿如在天上至門金書榜曰王屋山朝真門門内為天王殿榜曰天下第一洞天又上一層曰三清殿面對華葢山如几案又上一層曰通明殿設昊天上帝像殿中環列朱龕貯國朝御賜道藏經若千幽有碑數十通皆宋金元時物薄暮酌方丈之松菊堂翌日庚辰興為天壇絶頂之遊乃乗小山轎僕夫持絙牽輿以上出紫㣲宫西上二里至望仙坡閲披雲子修煉之跡又上四里至憇息亭凡登絶頂者至此必飲茗少憇故名其地有仰天池四面高而中凹舊有泉今涸至此則山徑愈峻險轎不可行乃歩以上過此則躡瘦龍嶺登一天門曰痩龍者以山脊之癯如瘦龍露骨也過一天門登十八盤山石壁陡絶旋繞而上至躡雲橋觀烟蘿子登仙石石上有足跡下有澗曰避秦溝又稍上則紫金巖巖之右有三官洞洞前有仙人橋少頃至南天門愈陡絶手攀鐵索以上觀軒轅黄帝御愛松小憇換衣亭謁玉皇殿殿之東曰清風臺西曰明月臺皆巨石也又行數十武至絶頂入虚皇觀謁軒轅觀真君祠乃陟三級瑶臺極其遐覽東曰日精峯日始出時晶彩爛然西曰月華峯月上時光華先見也於是東望海岱西眺崑丘北顧析城南俯黄河如緜如嵩山少室隔河對峙咸聚目前下視華葢諸山卑如培塿竊意天下竒觀無踰此者余徘徊久之乃下三級瑶臺偏觀古今諸石刻而日已晡矣是夕宿上方院入寢室將就枕道士走報請觀天燈亟出視之則見逺火如流星下上明滅杳無定跡時從行者咸相顧駭異辛巳昧爽起觀日始出之景甚竒天既明隂雲蔽翳移時頃之霽歩至北天門見古松十數株夭蹻如虬龍環列成行儼如侍衛皆千百年物也遂觀捨身崖志心石在東北虚巖之上突出一石濶尺許長丈餘勢欲飛墜下瞰峭壑神悸股栗又觀老子煉丹池池上有老子祠古碑存焉又二里至李道人庵聞東北有王母洞奥邃莫測人跡罕至元歲時投金龍玉簡于此余欲往游之道士曰徑險不可行且有蛇虎潜其中乃下南天門一里許游黒龍洞洞前有太乙泉一曰太乙池葢濟水發源處也世傳悉城之山升白氣於天落五斗峯化為濕雲自石竇中滴水降太乙池云道士曰每歲諸元㑹日五更之初輒聞仙鐘自逺洞中發聲悠揚清婉可聽又曰日出沒時間有倒影之意王喬洞新安有王喬洞在縣西二十里石皆土所成取而破之木葉之形交錯其間若雕刻者盡山石皆然洞之上二木亦皆化石而復産枝葉與凡木類按王喬有三其一乃周靈王太子其一漢葉縣令其一蜀之益都人俱有仙術今未知孰是而神仙之事皆昔固有之矣霖落山州西北四十里有山曰霖落寺曰香泉者初自寺莊入山門約行六七里峯回路轉得古浮圖亭亭出杳靄間清嶂回抱真畫圖也望東北諸峯頂歴蒼穹足注絶壑山之椒萬石林立極太湖竒特之狀半空磊落勢若飛來蒼巖老栢儼視上下雲烟空翠顧接不暇即霖落山也行百餘歩徑漸狹束石犖确不能騎青鞋竹丈推挽以進還自絶澗底陟西磴道入寺殿廢基巔崖上東西二佛龕歲月峥嶸皆開元間物南瞰哀壑心魄為動王子與客循東崖而下抵霖落足仰看青壁斗絶如削今謂之捨身崖者是也少憇轉而升東北石磴攀蘿蹴鱗度滴乳古崖再折華嚴壁下壁磨崖為之作𨽻書刻華嚴部特精緻可觀字約萬數寺僧誕誇時出光怪中鑿巨龕古佛䕶以龍象其香泉自經洞石罅中流出穿雲霤石復從乳巖半腹下瀉作瀑布流飛濺叢石間珠跳玉迸盤旋百折山藉以潤寺仰以清也西崖對峙老藤怪石出槲樹間蹲踞騰拏如衆獸相搏望之愕然而恐野人曰此獅子巖也其西北一峯天成如臺石徑作梯盤曲而上若雌霓掛樹連巻未收即寺之眺月臺也其故趾相傳昔魏安王起雪宫於此林慮太行之秀至吾郷西山融結為最觀郡乘載栁仲塗居聞僧惟深言天平泉石過衡嶽逺甚明日夙興拜韓公墳讀富鄭公所撰碑碑有亭故無損石極美碑隂有樹如水墨所畫墳皆甓甃所完者尚多兵荒中有僧紀公奮身捍蔽卒賴其力宅兆形勢風水家圖以為式以為天地間不多見者憑高歴覽又登寺西南經閣果極其妙高下隂顯與圖所傳不異也小酌遂行林州知州李祐之迓于諸翟晩至州宿萬安寺丙寅謁廟學游黄華山和叔送予出郭北門行十餘里至其麓皆小石槲􅈪是日大霜水皆冰人謂地高寒較他地早一月槲葉青紅可愛路漸高聞水聲於灌叢亂石中又數里山益高峯益峻壁益峭澗益深路益險水聲益大峯回路轉掩抱重疊使人應接不暇澗皆盤石高下為蹬級泉流其上懸而為練激而為湍飛花旋碧喧豗飄洒其瀦而為泓者清徹如空纎芥可見寺相近屏嶂益竒亂石不可騎過盤石道左有水磑作屋其上自麓又十里至寺石柱刻張商英絶句詩言高歡避暑事棊字韻叶來字註切其下他柱多題刻漫滅不可盡讀大率多崇觀間人少憇遂入山觀水簾逾三里許遂不可騎矣始見懸瀑如練於半天騎留林石間相率牽擁而登焉峻坂㣲徑亂石犖确如梯而無級樛木交錯攀蘿挽條尺寸而進賴健卒曳絙于前挽之而登因思東漢封禪記所載登太山事此近似焉問俗至否以僧言逺近為喜畏又三里許始至有石突出如屏四向無所連着其高入雲所謂挂鏡臺也前有盤石疲甚坐其上望水簾北崖者僅如匹練下濺崖飛白始濶其西者崖上垂白亦不過丈許意謂昔人傳誇過實俄從卒持三冰柱長五尺許以獻云至簾下得之且盛言其偉遂欲即之發火一酒引滿數爵諸生暨從者遍飲之乃縁南崖㣲徑迤邐而西而北坡極陡峻草石皆冰滑不可拔足尺寸展移栗栗危甚乃至西崖下水簾内仰面望之目力為窮始見崖上之水飛灑散布踈宻勻整自崖而下至澗底其長不知幾百丈其濶百餘尺光明透徹去人尚五丈許真所謂迸珠簾者也負崖坐石久之折而東至北崖簾下有嵓坐數十人簾之長又過於西者東邊頗濃厚自巔至地時如團雪投墜而散連屬不斷加以動摇飛舞如玉龍蜿蜒狀餘皆與西簾同兩簾皆清氣襲人時時飛灑如細雪着人面信天下之竒觀也簾下沾灑細草皆為清水日夕凝積或聳直如玉筍或披踈如珊瑚蔽崖彌澗竒形異狀不可殫記瓊田瑶草殆此謂也西崖下望挂鏡臺則培塿矣此山之形竒峯重疊如展畫屏不知高挂鏡臺又幾百丈周圍環抱而開豁其東臺如門屏而位置偏南䑓前之山一遮一掩又不知幾百重也始坐盤石疑水簾之小葢遼逺空濶掩映崖石淡然而無加以老目茫茫故也北簾之東又有懸瀑望之差小青壁無路不能即觀久之循來跡而歸石間多蘭臺上石墜於下者皆為水波龍鱗之狀方平可愛且乗且步俄至寺前就盤石列壺觴以坐又以紅樹及山果如丹砂者與僧所持冰列于前清泉冷泠非迫於暮不忍歸也復延子敬同至黒竈山寺殿東椒壁有梅軒佚老真元癸酉歲所題文字皆竒其下殘缺石柱多宋人題名縁石磴登方丈鳴筝小酌從者得雄雉炙以侑觴題詩於東壁而出至􅛲峪東二里餘支題龕琢石崖為之有開元十九年蔡景所撰碑刻甚精寺前流泉怪石不減黄華寺有巨槐䕃地數畝山門有白松皮葉皆異磚塔嵌張商英聖燈石刻聖燈寺在西北峯絶頂望之隐隐見其殿宇僧云葢四十里之遥余獨乘月登陟坐松下盤石僧有普寺者善觱篥終日獻藝至是又率其徒按羯皷笙笛鑑鍧交奏迭作於月明松影中清風颯然山鳴谷應不知此身之在人世也昔歐謝諸公游嵩山見石室汪僧叩厥至論余之游乃得此軰可為一笑不意此山秀拔在黄華之右至於水簾之竒偉與夫遮掩環抱重疊深逺則不及也二山之泉皆去山數里洑入地中東迴過諸翟翟曲宿下洹庚午至鳳寧山山在洹水之隂峭拔竒秀望之如鳳聳石為兩翼上有亭其巔又為亭亭上為屋兩重塐三聖女其上有金泰和間碑載赫舍哩氏所建三女則不能究其氏族也山多古栢路甚險登之甚勞既至其巔則俯瞰二亭若井底坐久風急始徹俎而下過南齋觀丈八佛大磚浮屠貯佛其中有紹聖間石刻過槎牙嶺至善應宿儲祥宫宫有洞洞有房以甓為之伊闕河南府南三十里横亘一山為禹所鑿引伊水北注伊源從悶頓嶺五百餘里四山扼阻至是獨窪且薄禹順其勢導之使民得免於魚又不煩重費非大聖人精靈與造化争功能及此乎且丹崖並峙萬仭斷裂潺湲中注後世因作技巧崖體遍劃龕居佛佛大小不同龕洞淺深宏窄不一競竒呈異星布櫛比不能以萬千記名其總曰鑼鼓洞曰蓮花洞曰雙塔洞曰水歛洞曰金佛洞激以水聲其流響鏜鏜是名鑼鼓上旋頂作菡萏瓣是名為蓮花下臨諸瀾勢甚激搏立洞口悉收聽之是名為水歛洞上建雙塔洞内有金佛是名為雙塔金佛竒莫如鑼鼓盛莫如蓮花自鑼鼓蓮花而下石罅中迸湧三泉由金佛直下石罅中迸湧五泉山南北有鳳仙乾元香山看經天竺濳溪廣化寳應八寺徑口有五龍廟蘇門山蘇門山古士率棲焉其著者魏阮籍晉孫登宋李之才邵雍元許衡姚樞耳然諸皆有祠獨籍不祠也蘇門有九峯山亦竒絶然其上無泉侯趙川亦無川可恨也大行山至蘇門峯萬餘數森森若排劔北寺中有三峯獨竒可三寺各當一竒有一泉繞之流乃其泉數里觸大石輒入地故不至侯趙川予觀三湖之險葢虎豹之窟而魑魅所宅也西踞壼關北跨陵川東扼林慮上黨有盗賊恒數百騎來則彀弓弩持刀出沒林阻巖谷間號曰青羊白戈云而盤山路石岈岈嶄嶄行若登天然過此豁然曠川而四面皆山所謂侯趙川也葢若桃源焉三湖有巨竹蓊茂登山西望亭亭縁崖而緑者竹也中湖則有石鏡半規耳而黙瑩能鑒天日山河人物焉豈不異哉砥柱在陜州東五十里黄河中以其形似柱故名禹貢謂導河東至於砥柱即此乙夘往游砥柱離州二十里午食又二十里循河行十里至三門集津三門者中曰神門南曰鬼門北曰人門其始特一巨石而平如砥想昔河水汎濫禹鑿之為三今水行其間聲激如雷而鬼門尤為險惡舟筏一入鮮得脱者名之曰鬼宜矣三門廣約二十丈其東百五十歩即砥柱崇約三丈周數丈相傳上有唐太宗碑銘今不存蔡氏書傳以三門為砥柱州志亦謂砥柱即三門山皆未嘗親履其地故謬誤若此嵩嶽叙五嶽均擅天地之竒觀而詩獨稱嵩高惟嶽者何白虎通云以麗四嶽之中故高之也其山峙二室環五乳列三臺皆屹然天表手可捫星其下大河東注碧洛南折矗矗乎枕地軸應天樞五精凝藏矣故降為聖哲則申甫生發為義烈則夷齊巢許出秘而為𤣥真則有面壁仙去者皆騰光吐圖之休禎也若夫時雨暘祛災沴則嶽之餘耳自昔聖朝明王秩祀摛文而騷雅窮竒之士息焉游焉咏焉歌焉皆所以發揮中極宣洩元靈信疆場明祗組繡鉅觀也斯志也置之几案時一觀焉全嵩之佳勝嶐嶐在目固不必履登封之趾陟二室之巔而後為遊嵩也嵩山至洛陽欲圖嵩山之游二日至偃師縣三日自偃師沿洛河南行五里渡河十里登唐廬陵王墓石表猶存中一牌高大字漫㓕不可讀三十里至萼嶺口兩山對峙巖道﨑嶇乃唐高宗幸少林寺時所鑿山行八里至其少林寺寺在少室山北麓有碑後魏孝文為胡僧跋陀建者唐太宗為秦王時賜寺僧教當時寺僧之立功者十有三人惟曇宗授大將軍其餘不欲受官賜地四十頃此可補唐書之缺少林僧至今以武勇聞所從來逺矣寺佛殿後為講堂堂後左有立雪亭昔僧慧可常侍達摩雪深至腰不去卒嗣其法今僧中稱為二祖出于西廊百歩有甘露臺胡僧跋陀於此翻經天降甘露故名西北上山一里至達摩庵殿前有六祖手植栢又上一室門外石刻達摩面壁之庵六大字宋蔡汴書室中塑達摩像案前石高僅二尺廣半之達摩之形宛然其上拭之益顯葢庵之上四里有達摩洞兹石乃其九年所面者古謂精神可通金石諒哉回至方丈寺僧文載言經閣後有古槐往視之其高十丈圍三十尺文載復誦文潞公游寺詩有五品封槐今尚在之句則其壽可知第未知封自何時也出寺東行十五里折而東北三里至戒壇寺破屋三楹中四碑刻元學士李溥光所書茶榜字徑四寸遒偉可愛又旁有唐大厯二年勑戒壇碑寺左百歩為㑹善寺法堂中有後周嵩陽寺碑後刻云大唐麟徳元年移植於此可謂古矣佛殿東偏有泉出自山中東南行時有飛雪十里至登封雪乃大作庚午雪霽東行嵩山近目雪蒙其巔如玉田璚樹復相帶映其清逼人恨無工畫者如范寛軰以圖之耳八里至嵩山神祠祠在黄葢峯下葢嵩山巍然中國之中其周幾二百里羣山拱列有類兒曹宜其秀鍾靈聚為五嶽之尊而黄葢一峯在山東南盡處其宅神靈尤宜祀之外有亭扁曰草參過客憚於入謁多展拜於此入門三重咸有古栢或喬或偃或俯或欹或屈而蟠或怒而攫或奮而欲騰又或如帷葢之張幾二百株三門内左右列四嶽祠又有降神殿壁繪古甫申像嵗久剥落謁嶽神殿西為御祠祠多歴代碑刻南行二里折而東北又二里北麓入廬巖寺葢唐盧鴻隐處後為僧廬其上四里有盧巖上寺聞石壁飛瀑數丈視此殊勝路陡雪深竟莫能至辛未登封北三里所嵩陽廢觀其中所存唯唐李林甫記元五祖堂記二碑及三古栢栢之高皆不逾三丈大可六人圍舊有石刻云漢武帝封大將軍其次亦可四人圍道士云此次將軍也皆形狀怪甚不可圖繪又東三里據山陽為崇福宫其後名萬歲山昔漢武臨幸聞空中呼萬歲者三因即其地建萬歲觀唐更名太乙下山東行一里觀啟母石石旁之祠及唐崔融碑今皆不存按啟母石事見淮南子其説不經後人葢嘗辨之圖書編卷六十一
