body:
  text: 圖書編卷一百二十三明章潢撰律纂吏律凡四條講讀律令凡國家律令㕘酌事情輕重定立罪名頒行天下永為遵守百司官吏務要熟讀講明律意其百工技藝諸色人等有能熟讀講解通曉律意者若犯過失及因人連累致罪不問輕重並免一次棄毁制書印信凡棄毁制書及起船符驗即今勘合之類若各衙門印信及夜巡銅牌者斬遺失者杖九十徒二年半若棄毁官文書者杖一百事干軍機錢糧者絞遺失者杖七十事干軍機錢糧者杖九十徒二年半若主守官物之人遺失簿書以致錢糧數目錯亂者杖八十漏泄軍情大事凡聞知收捕反逆賊徒機宻大事而輒泄漏者斬若邉將報到軍情重事而漏泄者杖一百徒三年若私開官司文書印封看視者杖六十事干軍情重事者以漏泄論信牌凡府州縣置立信牌量地逺近定立程限隨事銷繳違者一日笞一十毎一日加一等戸律凢三十五條脱漏戸口凡一戸男婦人口全不附報籍册有賦役者家長杖一百無賦者杖八十附籍當差若將他人全戸隠蔽在本戸不報及與他人相詐冒合為一户附籍者罪同若隠漏自己成丁人口不附籍及增减年狀妄作老幼廢疾以免差役者一口至三口家長杖六十每三口加一等若隠蔽他人丁口不附籍者罪亦如之若里長失于取勘致有脱户者一户至五户笞五十每五戸加一等漏口者罪同私剏庵院及私度僧道凡寺觀庵院除見在處所外不許私自剏建增置違者杖一百僧道發邉逺充軍若僧道不給度牒私自簪冠剃髪者杖八十若由家長家長當罪立嫡子違法凡棄嫡子不立而立嫡次子及庶長子者是名違法杖八十若養同宗之人為子所養父母無子而捨去者杖一百其乞養異姓義子以亂宗族者杖六十若以子與異姓人為子者罪同其子歸宗收留迷失子女凡收留人家迷失子女不送官司而賣與人為奴婢者杖一百徒三年賣為妻妾子孫者杖九十徒二年半若得迷失奴婢而賣者各减一等若收留在逃子女而賣為奴婢者杖九十徒二年半為妻妾子孫者杖八十徒一年若得在逃奴婢而賣者各減一等其自收留為奴婢妻妾子孫者罪亦如之隠藏在家者並杖八十若買者及牙保知情減犯人罪一等追價入官若冒認良人為奴婢者杖一百徒三年為妻妾子孫者杖九十徒二年半冒認他人奴婢為己奴婢者杖一百逃避差役凡民户逃往隣境州縣躱避差役者杖一百發還原籍當差其親管里長故縦及隣境人户隠蔽在己者各與同罪若隣境里長知而不逐遣者杖六十别籍異財凡祖父及父母在堂而子孫别立户籍分異財産者杖一百若居父母喪而兄弟别立户籍分異財産者杖八十卑幼私擅用財凡同居卑幼不由尊長之命私擅用本家財物者二十貫笞二十每二十貫加一等若同居尊長應分家財不均平者罪亦如之欺隠田糧凡欺隠本戸田糧脱漏版籍不行報官者一畆至五畆笞四十每五畆加一等其田入官若將田土移丘换段那易等則謂上等下等起科之則例也以髙作下減瞞糧額及詭寄田糧于他人戸内影射自己差役並受人寄者罪亦如之里長知而不舉與犯人同罪盜賣田宅凡盜賣換易及冒認他人田宅若虚錢實契典買及侵占他人田宅者田一畆屋一間以下笞五十毎田五畆屋三間加一等係官者各加二等若將兩家互争及他人田産妄作己業朦朧投獻官豪勢要之人與者受者各杖一百徒三年典買田宅凡典買田宅不税契者笞五十仍退田宅價錢一半入官不過割者一畆至五畆笞四十每五畆加一等其田入官若將已典賣與人田宅朦朧重覆典賣者以所得價錢計賍准竊盜論若重覆典買之人及牙保知情者與犯人同罪其所典田宅園林碾磨等物年限已滿業主備價取贖若典主託故不肯放贖者笞四十盜耕種官民田凡盜耕種他人田者一畆以下笞三十强種者加一等係官者又加一等所得花利係官者還官係民者給主荒蕪田地凡入籍納糧田地無水旱災傷之故而荒蕪及應種桑麻之類而不種者以十分為率一分笞二十毎一分加一等里長同罪棄毁器物稼穡事凡棄毁人器物及毁伐人樹木稼穡者計賍准竊盜論一貫以下杖六十官物加二等若毁人墳塋内碑碣者石獸者杖八十毁人神主者杖九十毁人房屋垣墻之類者計修造雇工錢坐賍論一貫以下笞二十各與修立官物加二等擅食田園𤓰果凡于他人田園擅専也食𤓰果之類計所值價錢坐贓論但棄毁者罪亦如之其擅將去及食係官田園𤓰果若官造酒食者加二等私借官車船凡監臨主守將係官車船店食碾磨之類與人及借之者各笞五十每日追僱價錢六十文入官男女婚姻凡男女定婚之初若有殘疾老幼過房乞養者務要兩家明白通知各從所願冩立婚書依禮聘嫁若許嫁女已報婚書及有私約聘財而輒悔者主婚人笞五十若再許他人未成婚者杖七十已成婚者杖八十後定娶者知情與同罪財禮入官男家悔者罪亦如之若女本有殘疾而女家却將無疾女妄冒相見後仍以有疾女成婚者杖八十追還財禮男家妄冒者加一等其應為婚者雖已納聘財期約未至而男家先娶及期約已至而女家故違期者並笞五十典僱妻女凡將妻妾受財典僱與人為妻妾者杖八十典僱女者杖九十若將妻妾妄作姊妹嫁人者杖一百知而典娶者各與同罪並離異財禮入官妻妾失序凡以妻為妾杖一百有妻在室以妾為妻使與己並者杖九十並改正若有妻更娶妻者亦杖九十離異其妻年四十以上無子者方聴娶妾違者笞四十逐婿嫁女凡逐去已招之婿而改嫁其女或再另招壻者杖一百男家知情而娶者同罪其女㫁付前夫居喪嫁娶凡居父母及夫喪而身自嫁娶者杖一百若男子居喪娶妾妻女嫁人為妾者杖八十若命婦夫亡再嫁者罪亦如之並離異知彼家有喪而嫁娶者各減五等若居祖父母伯叔父母姑兄姊喪而嫁娶者杖八十若居父母舅姑及夫喪而與應嫁人主婚者杖八十其夫喪服滿願守制非女之祖父母父母而强嫁之者杖八十期親强嫁者杖六十期親就女之祖父母父母及父母囚禁嫁娶凡祖父母及父母犯死罪被囚禁而子孫嫁娶者杖八十嫁娶為妾杖六十其奉祖父母父母命而嫁娶者不坐亦不得筵宴作樂同姓為婚凡同姓為婚者彼此各杖六十婦女離異尊卑為婚凡外姻有服之尊屬如外祖父母舅姨妻之父母卑幼如外孫外甥女壻共為婚姻及娶同母異父姊妹若妻前夫之女者各以姦論杖一百徒三年其父母之姑舅兩姨姊妹及姨若堂姨母之姑堂姑已之堂姨及再従姨堂外甥女若女壻及子孫婦之姊妹並不得為婚姻違者各杖一百若娶己之姑舅兩姨姊妹者杖六十以上並離異娶親屬妻妾凡娶同宗無服之親及無服親之妻者各杖一百若娶同宗緦麻親之妻及舅甥妻各杖六十徒一年小功以上各以姦論男女各杖一百徒三年其曾被出及已改嫁而娶為妻妾者各杖八十若收父祖妾及伯叔母者各斬若兄亡收嫂弟亡收弟婦者各絞以上並離異娶逃婦女凡娶犯罪逃走婦女為妻妾知情者並與逃婦女同罪離異强占良家妻女凡豪勢之人强奪良家妻女姦占為妻妾者絞配與子孫弟姪家人者罪亦如之良賤為婚姻凡家長與奴娶良人女為妻者杖八十其奴自娶者罪亦如之各離異出妻凡妻無應出及義絶之狀而出之者杖八十雖犯七出有三不去一謂有所娶無所歸二謂曽與姑舅更三年喪三謂先貧賤後富貴而出之者減二等若犯義絶應離而不離者亦杖八十若妻背夫逃者杖一百因而改嫁者絞其因夫逃亡三年之内不出官司而逃去者杖八十擅嫁者杖一百私借錢糧凡監臨主守係官錢糧等物私自借用或轉借與人者並計賍以監守自盜論四十貫係雜犯律斬其非監守之人借者以常人盜倉庫錢糧論八十貫係雜犯律絞將自己物件换抵官物者罪亦如之私借官物凡監臨主守將係官什物衣服氊褥器玩之類轉借與人及借之者彼此各笞五十過十日不還者坐贓論若有損失者依毁失官物律坐罪追賠鹽法凡軍民有犯私鹽杖一百徒三年若帶有軍器者加一等誣指平人者加三等因被拏拒捕者斬鹽貨車船頭疋並入官引領牙人及窩藏寄頓者杖九十徒一年半挑擔䭾載者杖八十徒二年有能自首者免罪凡買食私鹽者杖一百因而貨賣者杖一百徒三年客商將官鹽挿和沙土賣者杖八十違禁取利凡私放錢債及典當財物每月取利不得過三分年月雖多不過一本一利違者笞四十其有負欠私債違約不還者五貫以上違三月笞一十五貫以上違三月笞二十毎一月加一等若豪勢之人不告官司以私債强奪人孳畜産業者杖八十若准折人妻妾子女者杖一百强奪者加二等因而姦占者絞費用受寄財産凡受寄財物畜産而輒費用者坐賍論減一等一貫以下笞一十詐言死失者准竊盜論減一等一貫以下笞五十並追物還主得遺失物凡拾得他人遺失之物限五日内送官官物還官私物召人識認于内一半給與得物人充賞一半給還失物人如三十日内無人識認者全給得物人限五日外不送官者官物坐賍論私物減二等其物一半入官一半給主若于官私地内掘得埋藏之物者並聴收用若有古器鍾鼎符印異常之物限三十日内送官違者杖八十其物入官把持行市凡買賣諸物兩不和同而把持行市専取其利及販鬻之徒通同牙行共為姦計賣物以賤為貴買物以貴為賤者杖八十若見人有所買賣故説髙下比擬價數以相惑亂而取利者笞四十禮律凡五條褻瀆神明凡于私家告天拜斗焚燒夜香燃㸃天燈褻瀆神明者杖八十婦女有犯罪坐家長若有縦令妻女于寺觀神廟燒香者笞四十罪坐夫男無夫男者罪坐本婦禁止師巫邪術凡師巫假降邪神書符呪水扶鸞禱聖自號端公師婆及妄稱彌勒佛白蓮教等㑹一應左道亂正之術或隠藏圖像燒香集衆夜聚曉㪚佯修善事扇惑人民為首者絞為従者各杖一百流三千里若軍民裝扮神像鳴鑼擊皷迎神賽㑹者杖一百罪坐為首之人里長知而不首者各笞四十其民間春秋義社不在禁限收藏禁書及私習天文凡私收藏圖䜟謂圖像䜟諱之書應禁之書及歴代帝王圖像金玉符璽等物者杖一百若私習天文者罪亦如之並于犯人名下追銀一十兩給付告人充賞匿父母夫喪凡子于父母及妻聞夫之喪匿不舉哀者杖六十徒一年若喪制未終釋服従吉忘哀作樂及㕘預筵宴者杖八十若聞期親尊長喪匿不舉哀者亦杖八十喪塟凡有喪之家必須依禮安𦵏若惑于風水及託故停柩在家經年暴露不𦵏者杖八十其従尊長遺言將屍燒化及棄置水中者杖一百其居喪之家修齋設醮若男女混雜飲酒食肉者家長杖八十僧道同罪還俗兵律凡七條凡越府州縣鎮城者杖一百越官府公廨墻垣者杖八十越而未過者各減一等若有所規求財利迴避己罪者各從重論門禁鎖鑰凡各處城門應閉而誤不下鎖者杖八十非時擅開閉者杖一百乗官畜脊破領穿凡官馬騾驢乗駕不如法而脊破領穿瘡圍繞三寸者笞二十五寸以上笞五十若牧養痩者計百頭為率十頭痩者牧養入及羣頭各笞二十每十頭加一等宰殺馬牛凡私宰自己馬牛者杖一百騾驢杖八十若病死而不申報官輒自開剥者笞四十若故殺他人馬牛者杖七十徒一年半騾驢杖一百若傷而不死不堪乗用及殺猪羊等畜計減價准盜論若故殺緦麻以上親馬牛騾驢者與本主私宰罪同若官私畜産毁食官私之物因而殺傷者各減故殺傷一等若故放官私畜産損失官私物者笞三十各賠所損物若畜産欲觸觗踢咬人登時殺傷者不坐罪畜産咬踢人凡馬牛及犬有觸觝踢咬人而記號拴繫不如法若有狂犬不殺者笞四十因而殺傷人者以過失殺傷人論若故放令殺傷人者減鬬殺傷一等若故放犬令殺傷他人畜産者笞四十追賠所殺價錢私借官畜産凡監臨主守將係官馬騾驢轉借與人及借之者各笞五十每日追僱賃錢六十文入官逓送公文凢舖兵逓送公文晝夜須行三百里稽留三刻笞二十每三刻加二等若磨察及破壊封皮一角笞二十每三角加一等若沉匿公文及拆動原封者一角杖六十每一角加一等若事干軍情機宻文書不拘角數即杖一百其舖司不告舉者與犯人同罪刑律凢七十六條謀反大逆凡謀反大逆但共謀者不分首従皆凌遲處死祖父父子孫兄弟及同居之人不分異姓及伯叔父兄弟之子不限籍之同異年十六以上不論篤疾廢疾皆斬其年十五以下及母女妻妾姊妹若子之妻妾給付功臣之家為奴財産入官知情故縱隠藏者亦斬盗印信凡盜各衙門印信及夜巡銅牌者皆斬盜闗防印記者杖一百刺字盜城門鑰凡盜府州縣鎮城闗門鑰皆杖一百徒三年盜倉庫門等鑰皆杖一百並刺字盜園陵樹木凡盜園陵帝王陵寢之處内樹木者皆杖一百徒三年若盜他人墳塋内樹木者杖八十若計賍重于本罪者各加盜罪一等監守自盜倉庫錢糧凡監守自盜倉庫錢糧等物不分首従併贓論罪併賍如十人共盜四十貫雖各分四貫入己通算作一處其一十人各得四十貫罪皆斬並于右小臂膊上刺盜官錢糧物三字常人盜倉庫錢糧凡常人盜倉庫錢糧等物不得財杖六十免刺但得財者不分首従併得贓論罪八十貫罪皆絞照依監守自盜刺字强盜凡强盜已行而不得財者皆杖一百流三千里但得財者不分首從皆斬若以藥迷人圖財者罪同若竊盜臨時有拒捕及殺傷人者皆斬因盜而姦者罪亦如之刼囚凡刼囚者不分首従皆斬若私竊放囚人逃走者與囚同罪竊而未得囚者減二等因而傷人者絞殺人者斬若官司差人追徴錢糧勾攝公事及捕獲罪人聚衆中途打奪者杖一百流三千里因而傷人者絞殺人及聚至十人為首者斬白晝搶奪凡白晝搶奪人財物者杖一百徒三年計賍重者加竊盜二等傷人者斬為従各減一等並刺搶奪二字若因失火及行船遭風着淺而乗時搶奪人財物及拆毁船隻者罪亦如之若與人鬬毆或勾捕罪人因竊取財物者計賍准竊盜論若有殺傷者各従故殺鬬毆殺傷論斬絞竊盜凡竊盜已行而不得財笞五十但得財者併賍論罪初犯並于右小臂膊上刺竊盜二字再犯刺左小臂膊三犯者絞掏摸者罪同盜馬牛畜産凡盜馬牛驢騾猪羊雞犬鵝鴨者並計其所值之價為賍以竊盜論若盜官畜産者以常人盗官畜産論八十貫律絞若盜官私馬牛而殺者杖一百徒三年驢騾杖七十徒一年若計贓重者各加盜罪二等盜田野榖麥凡盜田野榖麥菜菓及無人㸔守器物者並計賍准竊盜論若山野柴草木石之類他人已用工力斫伐積聚而擅取者罪亦如之親屬相盜凡各居親屬相盜財物者期親兼尊卑説下同減凡人盗五等凡人一百貫杖一百流二千里今杖六十徒一年大功減四等小功減三等緦麻減二等無服之親減一等若行强盜者尊長犯卑幼亦各依上減罪卑幼犯尊長以凡人盜論若有殺傷者各依殺傷尊長卑幼本律從重論如期親尊長已傷者斬已殺者凌遲處死之類若同居卑幼將引他人盜已家財物者卑幼依私擅用財論加二等二十貫笞四十他人減凡盜罪一等二十貫杖七十若有殺傷者依殺傷尊長本律科罪他人縦不知情亦依强盜論其同居奴婢僱工人盜家長財物及自相盜者減凡盜一等恐嚇取財凡恐嚇取人財物者計賍准竊盗論加一等一貫以下杖七十若期親以下自相恐嚇者卑幼犯尊長以凡人論尊長犯卑幼依親屬相盜律科詐欺官私取財凡用計詐欺官私以取財物者並計賍准竊盜論若期親以下自相詐欺取財者依親屬相盜律科罪若監臨主守詐取所監守之官物者以監守自盜論若冐認誆騙拐帶人財物者亦計贓准竊盗論略買略賣人凡設方略而誘取良人及略賣良人為奴婢者皆杖一百流三千里為妻妾子孫者杖一百徒三年因而毆傷人者絞殺人者斬若假以乞養過房為名色買良家子女轉賣者罪亦如之若窩主及買者知情並與犯人同罪各追價入官發塜凡發掘墳塜見棺槨者杖一百流三千里開棺見屍者絞發而未至棺者杖一百徒三年若塜先穿䧟及未殯埋而盜屍柩者杖九十徒二年半開棺見屍者亦絞其盜取器物磚石者計賍准凡盗論若卑幼發尊長墳塜者同凡人論開棺見屍者斬若棄屍賣墳地者罪亦如之買地人牙保知情者各杖八十追價入官若尊長發卑幼墳塜開棺見屍者緦麻杖一百徒三年小功以上各逓減一等發子孫墳塜開棺見屍者杖八十若殘毁他人死屍及棄屍水中者各杖一百流三千里若棄毁緦麻以上尊長死屍者斬棄毁子孫死屍者杖八十其子孫毁棄祖父母父母及奴婢僱工人毁棄家長死屍者斬若穿地得死屍不即掩埋者杖八十若于他人墳墓熏狐狸因而燒棺槨者杖八十徒二年燒死屍者徒三年若緦麻以上尊長各逓加一等卑幼各依凡人逓減一等若子孫于祖父母父母及奴婢僱工人于家長墳墓熏狐狸者杖一百燒棺槨者杖一百徒三年燒屍者絞若平治他人墳墓為田園者杖一百于有主墳地内盜屍者杖八十若地界内有死人里長地隣不申報官司檢驗而輒移他處及埋塟者杖八十以致失屍者杖一百殘毁及棄屍水中者杖六十徒一年因而盜取衣服者計賍准竊盜論夜無故入人家凡夜無故入人家者杖八十主家登時殺死者勿論其已就拘執而擅殺傷者加二等至死者杖一百徒三年盜賊窩主凡强盗窩主造意謂主意起謀為强盜者身雖不行但分贓者斬若不行又不分賍者杖一百流三千里共知謀情者或行而不分賍及分贓而不行皆斬若不行又不分賍者杖一百竊盜窩主造意身雖不行但分賍者為竊盜首論刺字若不行又不分賍者為從論若知强竊盜賍而故買者計所買物坐賍論知而寄藏者减一等謀殺人凡謀殺人造意者斬若隨従共謀而加功者絞不加功者杖一百流三千里若傷而不死造意者絞不加功者杖一百徒三年若因而得財者同强盜不分首從皆斬謀殺祖父母父母凡謀殺祖父母父母及期親尊長外祖父母夫之祖父母父母已行者皆斬已殺者皆凌遲處死謀殺緦麻以上尊長已行者杖一百流二千里已傷者絞已殺者斬其尊長謀殺卑幼已行者各依故殺罪减二等已傷者减一等已殺者依故殺法大功以下尊長故殺卑幼者絞若奴婢及僱工人謀殺家長及家長之期親外祖父母若緦麻以上親者罪與子孫謀殺同殺死奸夫凡妻妾與人姦通而本夫于姦所親獲姦夫姦婦登時殺死者勿論若止殺死姦夫者姦婦依律㫁罪従夫嫁賣其妻妾因姦同謀殺親夫者凌遲處死姦夫處斬若姦夫自殺其夫者姦婦雖不知情亦絞殺一家三人凡殺一家非死罪三人及支解人者凌遲處死財産㫁付死者之家妻子流三千里為従者斬造畜蠱毒殺人凡造畜蠱毒堪以殺人及教令者斬若造魘魅符書呪咀欲以殺人者各以謀殺論若用毒藥殺人者斬買而未用者杖一百徒三年知情賣藥者與同罪鬬毆及故殺人凡鬬毆殺人者不問手足他物金刃並絞故意殺人者斬若同謀共毆人因而致殺下手者絞原謀者杖一百流三千里餘人各杖一百戲殺誤殺過失殺傷人凡因戲而殺傷人及因鬬毆而誤殺傍人者各以鬬殺傷論至死者絞其謀殺故殺人而誤殺傍人者以故殺論已死者斬若知津河水深而詐稱平淺及橋梁渡船朽漏而詐稱牢固誑令過渡以致䧟溺死傷者亦以鬬傷論若過失殺傷人者各准鬬殺傷罪依律收贖給付其家夫毆死有罪妻妾凡妻妾因毆罵夫之祖父母父母而夫擅殺死者杖一百若夫毆罵妻妾因而自盡身死者勿論殺子孫及奴婢圖賴人凡祖父母父母故殺子孫及家長故殺奴婢圖賴人者杖七十徒一年半若子孫將已死祖父母父母奴婢僱工人將家長身屍圖賴人者杖一百徒三年期親尊長杖八十徒二年若尊長將已死卑幼及他人身屍圖賴人者杖八十若因而詐取財物者准竊盜論搶去財物者准白晝搶奪論弓箭傷人凡故向城市及有人居止宅舍放彈射箭投擲磚石者笞四十傷人者减凡鬬傷罪一等因而致死者杖一百流三千里車馬殺傷人凡無故于街市鎮店馳驟車馬因而傷人者减凡鬬傷一等至死者杖一百流三千里若于鄉村無人曠野地内馳驟因而傷人致死者杖一百並追埋葬銀一十兩若因公務急速而馳驟殺傷人命者以過失論庸醫殺傷人凡庸醫為人用藥鍼刺誤不依本方而致死以過失殺人論不許行醫若故違本方詐療疾病而取財物者計贓准竊盜論因而致死及因事故用藥殺人者斬威逼人致死凡因事威逼人致死者杖一百若官吏公使人等非因公務而威逼平民致死者罪同並追埋𦵏銀一十兩若威逼期親尊長致死者絞大功以下逓减一等若因姦盜而威逼人致死者斬尊長為人殺私和凡祖父母父母及夫若家長為人所殺而子孫妻妾奴婢僱工人私和者杖一百徒三年大功以下各逓減一等其卑幼被殺而尊長私和者各减一等若妻妾子孫及子孫之婦奴婢僱工人被殺而祖父母父母家長私和者杖八十受財者計賍准竊盜論常人私和人命者杖六十同行知有謀害凡知同伴人欲行謀害他人不即阻當救䕶及被害之後不首告者杖一百鬬毆凡以手足毆人不成傷者笞二十成傷及以他物磚石之類毆人不成傷者笞三十他物成傷者笞四十㧞髪方寸以上笞五十若血従耳目出及内損吐血者杖八十以穢物汚人頭面者罪亦如之折人一齒及手足一指𦕈細人一目毁人耳鼻若破人骨及用湯火銅鐵汁傷人者杖一百以汚物灌入人口鼻内者罪亦如之折二齒二指以上及髠髪者謂盡㧞也杖六十徒一年折人肋𦕈人兩目墮人胎及刅傷人者杖八十徒二年折人肢體瞎人一目者杖一百徒三年瞎人兩目折人兩肢損人二事如瞎人一目又折人二手之類以上及因舊患令至篤疾若㫁人舌及毁敗人隂陽者並杖一百流三千里拒毆追攝人凡官司差人追徴錢糧勾攝公事而抗拒不服及毆所差人者杖八十若傷重至内損吐血以上者各加二等至篤疾者絞死者斬毆受業師凡毆受業師者加凡人二等死者斬威力制縛人凡争論事理聴經官呈告若以威力制縛綑人及于私家拷打監禁者並杖八十傷重至内損吐血以上各加凡鬬傷二等因而致死者絞若以威力主使人毆打而致死傷並以主使之人為首下手之人為從論良賤相毆凡奴婢毆良人者加凡人一等至篤疾者絞死者斬其良人毆傷殺未殺訖他人奴婢者减凡人一等若毆死及故殺者絞若奴婢自相毆傷殺者各依凡毆傷殺法若毆殺緦麻小功親奴婢非折傷勿論至折傷以上各减殺傷凡人奴婢罪二等大功减三等至死者杖一百徒三年故殺者絞過失殺者各勿論凡毆緦小功親僱工人至折傷以上各減凡人罪一等大功减二等至死及故殺者並絞過失殺者各勿論奴婢毆家長凡奴婢毆家長皆斬殺者皆凌遲處死過失殺者絞傷者杖一百流三千里若毆家長之期親及外祖父母者絞傷者皆斬過失殺者减鬬毆罪二等故殺者皆凌遲處死毆家長之緦麻親杖六十徒一年小功杖七十徒一年半大功杖八十徒二年折傷以上緦麻加毆良人罪一等小功加二等大功加三等死者不分首従皆斬若僱工人毆家長及家長之期親若外祖父母者杖一百徒三年傷者杖一百流三千里折一肢以上者絞死者斬故殺者凌遲處死毆家長之緦麻親杖八十小功杖九十大功杖一百死者各斬若奴婢有罪其家長及家長之期親若外祖父母不告官司而毆殺者杖一百無罪而殺者杖六十徒一年若家長及家長之期親若外祖父母毆雇工人至折傷以上减凡人三等因而致死者杖一百徒三年故殺者絞若違犯教令而依法决罰及過失殺者各勿論妻妾毆夫凡妻毆夫者杖一百夫願離者聴至折傷以上各加凡鬬傷三等至篤疾者絞死者斬故殺者凌遲處死若妾毆夫及正妻者又加一等其夫毆妻非折傷勿論至折傷以上减凡人二等至死者絞若毆妻之父母者杖一百折傷以上各加凡鬬毆傷罪一等至篤疾者絞死者斬同姓親屬相毆凡同姓親屬相毆雖五服已盡而尊卑名分猶存者尊長减凡人鬬毆一等卑幼加一等至死者並以凢人絞罪論毆大功以下尊長凡卑幼毆本宗及外姻緦麻兄姊如本宗同髙祖之兄姊同曾祖出嫁姊及外姻姑舅兩姨兄姊皆緦麻杖一百小功如本宗同曽祖之兄姊及同祖之出嫁姊皆小功杖六十徒一年大功如本宗同祖伯叔之兄姊并出嫁之親姊皆大功杖七十徒一年半尊屬謂父母同輩者又各加一等折傷以上又各加凡鬬傷一等篤疾者絞死者斬尊長毆卑幼非折傷勿論至折傷以上緦麻减凡人一等小功减二等大功减三等至死者絞其毆殺同堂弟妹堂姪及姪孫者杖一百流三千里故殺者絞毆期親尊長凡弟妹毆兄姊者杖九十徒二年半傷者杖一百徒三年折傷者杖一百流三千里刅傷及折肢若瞎其一目者絞死者皆斬若姪毆伯叔父母姑及外孫毆外祖父母各加一等其過失殺傷者各减本殺傷罪二等故殺者皆凌遲處死其兄姊毆殺弟妹及伯叔姑毆殺姪并姪孫若外祖父母毆殺外孫者杖一百徒三年故殺者杖一百流三千里過失者各勿論毆祖父母父母凡子孫毆祖父母父母及妻妾毆夫之祖父母父母皆斬殺者皆凌遲處死過失殺者杖一百流三千里傷者杖一百徒三年其子孫違犯教令而祖父母父母非理毆殺者杖一百故殺者杖六十徒一年嫡繼慈養母殺者各加一等致令絶嗣者絞若非理毆子孫之婦及乞養異姓子孫致令廢疾者杖八十篤疾者加一等至死者各杖一百徒三年故殺者各杖一百流二千里其子孫毁罵祖父母父母而毆殺之若違教令而依法决罰致死及過失殺者各勿論妻妾與夫親屬相毆凡妻妾毆夫之期親以下緦麻以上尊長與夫毆同罪至死者各斬若妻毆傷卑屬與夫毆同至死者絞殺夫之兄弟子杖一百流三千里故殺者絞妾犯者各従凡鬬法若尊長毆傷卑幼之婦减凡人一等至死者絞若弟妹毆兄之妻加凡人一等若兄姊毆弟之妻及妻毆夫之弟妹及弟之妻各减凡人一等其毆姊妺之夫妻之兄弟及妻毆夫之姊妺夫者以凡鬬論若妾毆夫之妾子减凡人二等毆妻之子以凡人論若妻之子毆傷父妾加凡人二等妾子毆傷父妾又加二等至死各依凡人論毆妻前夫之子凡毆妻前夫之子者减凡人一等同居者又减一等至死者絞若毆繼父者杖六十徒一年折傷以上加凡鬬傷一等同居者又加一等至死者斬其故及自來不曾同居者各以凡人論父祖被毆凡祖父母父母為人所毆子孫即時救䕶而還毆非折傷勿論至折傷以上减凡鬬三等至死者依常律若祖父母父母為人所殺而子孫擅殺行兇人者杖六十其即時殺死者勿論罵人凡罵人者笞一十互相罵者各笞一十罵制使及本管長凡奉制命出使而官吏罵詈及部民罵本屬知府知州知縣軍士罵本管指揮千百戸杖一百若罵佐二首領官各逓减一等奴婢罵家長凡奴婢罵家長者絞罵家長之期親及外祖父母者杖八十徒二年大功杖八十小功杖七十緦麻杖六十若僱工人罵家長者杖八十徒二年罵家長之期親及外祖父母者杖一百大功杖六十小功杖五十緦麻笞四十罵尊長凡罵緦麻兄弟笞五十小功杖六十大功杖七十尊屬各加一等若罵兄姊者杖一百伯叔父母姑外祖父母各加一等罵祖父母凡罵祖父母父母及妻妾罵夫之祖父母父母者並絞妻妾罵夫期親尊長凡妻妾罵夫之期親以下緦麻以上尊長與夫罵罪同妾罵夫者杖八十妾罵妻者罪亦如之若罵妻之父母者杖六十越訴凡軍民詞訟皆須自下而上陳告若越本管官司輒赴上司稱訴者笞五十投匿名文書告人罪凡投隠匿姓名文書告言人罪者絞見者即便燒毁若將送入官司者杖八十誣告凡誣告人笞罪者加所誣罪二等流徒杖罪加所誣罪三等因而致死被誣之人隨行有服親屬一人者絞至死罪所誣之人已決者犯人反坐以死未决者杖一百流三千里加役三年其被誣之人詐冒不實反誣犯人者亦抵所誣之罪若獄囚已招伏罪本無寃枉而囚之親屬妄訴者减囚罪三等若囚已决配而自妄訴寃枉遮拾原問官吏者加所誣罪三等千名犯義凡子孫告祖父母父母妻妾告夫及夫之祖父母父母者杖一百徒三年但誣者絞若告期親尊長外祖父母雖得實者杖一百大功杖九十小功杖八十緦麻杖七十若奴婢告家長及家長緦麻以上親者與子孫卑幼罪同若僱工人告家長及家長之親者各减奴婢罪一等誣告者不减子孫違犯教令凡子孫違犯祖父母父母教令及奉養有缺者杖一百教唆詞訟凡教唆詞訟及為人作詞狀増减情罪誣告人者與犯人同罪若受僱誣告人者與自誣告同受財者計賍以枉法從重論私鑄銅錢凡私鑄銅錢者絞匠人罪同為従及知情買使者各减一等告捕者官給賞銀五十兩里長知而不首者杖一百若偽造金銀者杖一百徒三年為従及知情買使者各减一等詐教誘人犯法凡諸人設計用言教誘人犯法及和同令人犯法却行捕告或令人捕告欲求給賞或欲䧟害人得罪者皆與犯法之人同罪犯姦凡姦男女各杖八十有夫各杖九十刁姦用刁詐誘引出外相姦也各杖一百强姦者男子絞若强姦未成者男子杖一百流三千里姦幼女十二嵗以下者雖和姦同强論若為媒説合容留在家通姦者各减犯人罪一等私和姦事者减二等其非姦所捕獲及指姦者勿論若姦婦有孕罪坐本婦縱容妻妾犯姦凡縦容妻妾與人通姦本夫姦夫姦婦各杖九十抑勒妻妾及乞養女與人通姦者本夫義父各杖一百姦夫杖八十並離異歸宗若縦容抑勒親女及子孫之婦妾與人通姦者罪亦如之若因財買休謂與人財買令將妻休棄賣休謂受人財而賣休其妻也和娶人妻者本夫本婦及買休人各杖一百婦人離異歸宗財禮入官媒合人各减犯人罪一等親屬相姦凡姦同宗無服之親指女言及無服親之妻者男女各杖一百若姦緦麻以上親之妻若妻前夫之女及同母異父姊妹者男女各杖一百徒三年强者男子處斬若姦従祖祖母從祖伯叔母姑從父姊妹母之姊妹及己之兄弟子之妻者男女各絞强者男子處斬若姦父祖妾伯叔母姑親姊妹子孫之婦兄弟之女者各斬妾各减一等强者絞誣執翁姦凡男婦誣執親翁及弟婦誣執兄欺姦者斬奴及僱工人姦家長妻凡奴及僱工人姦家長妻女者男女各斬若姦家長期親若期親之妻者絞若姦家長之緦麻以上親及緦麻以上親之妻者男女各杖一百流二千里强者奴與僱工人並斬妾各减一等强者亦斬居喪及僧道犯姦凡居父母及夫喪若僧尼道士女冠犯姦者各加凡姦罪二等相姦之人以凡姦論良賤相姦凡他家奴姦良人婦女者男女俱加凡姦罪一等良人姦他人奴婢俱减一等奴婢相姦者以凡姦論賭博凡賭博財物者不分首従皆杖八十攤塲錢物入官其開張賭房之人同罪私和公事凡私和公事者减犯人罪二等罪止笞五十失火凡失火燒自己房屋者笞四十延燒官民房屋者笞五十因而致傷人命者杖一百罪坐失火之人放火故燒人房屋凡放火故燒自己房屋杖一百若延燒官民房屋及積聚之物者杖一百徒三年因而盜取財物者斬殺傷人者以故殺傷論若放火故燒官民房屋及公廨倉庫係官積聚之物者皆斬其故燒人空閒房屋及田塲積聚之物者各减一等罪人拒捕凡犯罪逃走拒捕者各于本罪上加二等毆人至折傷以上者絞殺人者斬若罪人已就拘執及雖未獲但不拒捕而擅殺或折傷者各以鬬殺傷論罪人本犯應死而所捕之人擅殺者杖一百知情藏匿罪人凡知人犯罪事發官司差人追喚而藏匿在家不行捕告及指引道路資給衣糧送令隠避者各减罪人罪一等若知官司追捕罪人而漏泄其事致令罪人得以逃避罪亦如之工律凡二條盜決河防凡盜決河防即隄岸也者杖一百盜決圩岸圩低田也岸所以防水者陂塘陂下澤也所以積水者杖八十若毁人家居屋及漂失財物渰沒田禾計物價重者坐賍論因而殺傷者各减鬬殺傷罪一等若故決河防者杖一百徒三年故決圩岸陂塘减一等漂失贓重者准竊盜論因而殺人者以故殺傷論侵占街道凡侵占街巷道路而起葢房屋及為園圃者杖六十各令復舊其穿墻而出汚穢之物于街巷者笞四十出水者勿論大明律表按翰林院學士宋濓撰進大明律表有曰自軒轅以來代有刑官而五刑之法漸著逮魏文侯師于李悝始采諸國刑典造法經六篇漢蕭何加以三篇通號九章曹魏劉劭又衍漢律為十八篇晉賈充又㕘魏律為十二篇唐長孫無忌等又取漢魏晉三家擇可行者定為十二篇大概皆以九章為宗歴代之律至於唐亦可謂集厥大成矣恭惟陛下受上天君師之命登大寳位保佑臣庻孳孳弗怠其訓迪羣臣諄復數千言惟恐其有犯慈愛仁厚之意毎見於言外是大舜惟刑之恤之義也矜閔愚民無知陷於罪戾法司奏讞輒惻然不寜多所寛宥是神禹下車而泣之心也惟貪墨之吏承踵元弊不異禾黍中之稂莠乃不得已假峻法繩之是以臨御以來屢詔大臣更定新律至五六而弗倦者凡欲生斯民也今又特勅刑部尚書劉惟謙重㑹聚律以恊厥中毎一篇成輒繕冩上奏掲於西廡之壁親御翰墨為之裁定由是仰見陛下仁民愛物之心與虞夏帝王同一哀矜也易曰山上有火旅君子以明慎用刑而不留獄言獄不可不謹也書曰刑期于無刑言辟以止辟民自不敢犯也陛下聖慮淵深上稽天理下揆人情成此百代凖繩實有易書之㫖行見好生之徳洽于民心凡日月所照霜露所墜諸有血氣者莫不上承神化改過遷善而悉臻雍熙之治矣臣惟謙以洪武六年冬十一月受詔明年二月書成篇目一凖之於唐其間或損或益或仍其舊務合輕重之宜謹俯伏闕廷投進以聞推原用刑本意問律設大法理順人情一貶律以從貸乎曰非也順人情乃體貼律意律例諸條任其人擇而配之故惟明克允可以明罰勅法葢聖人之用刑乃好生之徳所運明者昭其生生之術允者篤其生生之恩所以皋陶意顓弼教後世豈惟無是心并爾無術易大象六卦説刑其五就明威上述意義其中孚議獄緩死非尚姑息為優柔不㫁葢指原來這一㸃子産刑書李悝法經漢魏九章十八篇至唐刑統可謂精備復益之以張戣張湜竇儀諸人搜擬詳論然總于術工研磨于對鞠申讞處未見好生一念真做骨子間有知者又將貶律従貸誤認是此物後世分仁義刑徳作兩平忘却乾元本始故用刑誤刑所以輔治聖人不得已而用之唐虞之時惟墨劓剕宫大辟五者而已而欽恤之意未始不行乎其間後世暴君酷吏始有法外之刑如炮烙煅煉抽腸懸脊剜膝剥皮鼎烹甑蒸腰斬十斬刷洗鴆毒之類何其慘哉所以神怒人怨運祚不長葢為此也我國家制刑除去劓剕惟笞杖徒流絞斬而已而又有夫大誥减等之例内外刑官守此而不敢濫臣民知此而不敢犯所謂刑期無刑民協于中天下何幸如之但律令己為國朝之定典今又増設條例則不免於濫矣刑總論夫易卦言治刑獄者五噬嗑也豐也賁也旅也中孚也其互取于象者三離也震也艮也獨取于象者二巽也兊也析而言之其義各殊綂而言之則皆慎重于刑而已噬嗑之象則曰明罰勅法賁則曰明庶政無敢折獄旅則曰明慎用刑而不留獄豐則曰折獄致刑中孚則曰議獄緩死夫曰明曰勅曰慎曰折曰議曰緩曰不留曰無敢折聖人之訓至章章也卦所取象有離有震有艮震為雷離為電為火艮為山震固取其威矣離取其光而照之必明艮取其静而止之不過是故噬嗑與豐取雷取電賁與旅取山取火而四卦或上或下皆有離焉或取電或取火或取于光明之義均也故明者尤治刑獄之要道也聖人之意可知也至于中孚雖取兌㢲而其全體似離互體則有震艮聖人惓惓焉寓意之深也夫既明以照之隠情矣然後威之夫既威之則遂止之及獄之既成又兊以議之㢲以緩之陳之以時臬即之以天論王聴之司寇聴之三公聴之旬而職聴三旬而職聴月而上之議而又議緩而又緩求其出不可得然後入之求其生不可得然後死之是中孚所取于兊巽之義也聖人之意可知也夫聖人之意寓于易而聖人之政則具于書虞書曰欽哉欽哉惟刑之恤哉此正舜好生之徳也而惟皋陶知之故贊舜曰御衆以寛曰罪疑惟輕夫皋陶能知舜是亦有舜好生之心也故舜知之乃命作士皋陶于是持其慎憲之心行其安民之惠而成其風動從欲之治故愚謂舜與皋陶上下之志同也同于好生也是君臣相成之凖也其詳具虞書中夫人而知之矣吕刑乃曰伯夷降典折民惟刑又曰伯夷播刑之迪夫伯夷吾知舜命之作秩宗矣命之典三禮矣初何與于刑者而吕刑顧此云也夫孔子至聖衆言折衷孔子嘗曰禮樂不興則刑罰不中是故舜命伯夷教民以禮民入于禮而不及于刑所以折絶斯民入刑之路務其本也吕刑之論是探本之論也漢刑法志述之亦謂制禮以止刑猶隄之防溢水也知吕刑之㫖矣夫斯㫖也即虞書吕刑有之矣吕刑曰有邦有土告爾祥刑又曰受王嘉師監于兹祥刑夫民之犯刑本過惡也而謂之嘉師刑本不祥器也而謂之祥刑夫誠嘉視乎民祥視乎刑而有不慎重者乎是故帝王治民其上教之教之不行乃不得已而刑之是故大司寇建之以三典糾之以五刑小司寇聴之以五聲議之以八辟士師左右之以五禁先後之以五戒司刺贊之以三刺三宥其慎重如此皆欽哉欽哉之㫖也是聖人之心也皆仁也皆體天好生之心也棠隂決事聞君子曰自古哲后惇臣曷嘗不以刑辟為典而慎重用之哉典著欽恤誥表敬明記稱意論慎測必即于天倫此其意至精故咎繇元徳羣聖宗焉以作士制百姓于刑之中刑期于無刑司冦蘇公敬由獄周公作立政訓王諄復記之誠重獄也重獄重天民也自教之衰亶以五刑為癉惡之具靡知為倫叙當即也於是乎哀矜勿喜之意亡甚且媮快喜之豈謂天徳哉又何以敬刑弼徳司天民命也先漢時謂攄忠守法請議之臣猶能本經術明常教以決事而張廷尉令天下無寃唐司刑徐有功身視鴻毛法視泰山以其死衛生民之命即古今難之夫鑒往可以知今比類可以達義海虞吳中令訥本桂氏棠隂决事刪之取諸古奏讞可輔彞倫重民命者為編今博採附之後司刑者得有覧觀焉漢景帝時廷尉上囚芳年繼母陳殺芳年父芳年因殺陳吏依律殺母以大逆論帝疑之武帝時年十二為太子在側上試問之太子曰夫繼母如母明不及母緣父之故比之母今繼母無狀手殺其父則母恩絶矣宜與殺人同不宜以大逆論従之今大明律曰凡繼母殺其父子告不在干名犯義之條嵗成帝時沛縣有富家翁貲二千餘萬小婦子年數頃復失其母父無强近親女不賢翁病因呼族人為遺書令悉以財屬女但遺一劍云兒年十五以付之後婿不肯與兒劍兒詣郡自言求劍太守何武得其詞因録女及婿省翁手書顧曰翁智人也念女强梁婿貪鄙畏殘害其兒又計小兒得此財不能全故與女實寄之劍所以决㫁限年十五者力足以自言度此女婿必不復還劍當聞縣官縣官或能證衆後見申展也悉財取與子曰敝女惡婿温飽十嵗亦幸矣論者大服薛宣為丞相弟循為臨菑令後母常隨循居官宣迎後母循不遣後母病死循去官持服宣不行服因坐博士申咸給事亦東海人毁宣不供養行喪服薄于骨肉前以不忠免不宜復封列侯在朝省宣子况為右曹侍郎數聞其語賕客楊明欽令遮斫咸宫門外㫁鼻唇父身入創事下有司議御史中丞等議奏曰况朝臣故宰相封侯不相勅承教化咸所言皆宣行迹衆人所共見知咸給事中恐為司𨽻舉奏宣而公明等迫切宫闕要遮創戮近臣于大道人衆中欲以鬲塞聰明杜絶論議桀黠無狀不與凡人忿怒争鬬同聞敬近臣為近主也禮下公門或路馬春秋之議意惡功遂不免于誅上侵之原議曰律曰以刅傷人完為城旦其賊加罪一等與謀者同罪諸書無以詆欺成罪傳曰遇人不以義而見疾者與疾人之罪鈞惡不直也咸厚善循而數宣過惡流聞不可謂直春秋之義原心定罪原况以父見謗忿發怒無他大惡雖于掖門外傷咸道中與凡人争鬬無異殺人者死傷人者刑古今之通道三代所不易也聖王不以怒増刑明當以賊傷人不直况與謀者皆减完為城旦帝以問公至卿丞相孔光大司空師丹以中丞議是自將軍以下博士議郎皆是廷尉况竟减死罪一等徙燉煌宣坐免為庶人歸故鄉定陵侯淳于長坐大逆誅死長小妻迺始等六人皆以長事未發覺時棄去或更嫁為丞相方進大司空武議以為長犯大逆時迺始等見長妻當坐罪請論廷尉光議以為大逆無道父母妻子同産少長皆棄市欲懲後犯法者也夫婦之道有義則合無義則離長未知當坐大逆而棄去迺始迺始更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是返梁人娶後妻後妻殺夫其子又殺之孔季彦自魯梁梁相曰禮繼母如母此當以大逆論乎季彦曰昔文姜與殺魯桓春秋去其姜氏傳曰絶不為親禮也手殺重于知情知情猶不得為親况手殺乎宜以非司寇而擅殺當之不為殺母梁相従其言建初中有侮辱人父者而其子殺之肅宗貰其死降宥之後因以為比曰輕侮法張敏駁之曰輕侮法先帝一時之恩非有成科法之律令也夫春秋之義子不報仇非子也而法令不為减以相殺之路不可開也今託義者得减使執憲之吏得設巧詐為輕重非所以遵在醜不争之義且孔子垂輕重典皋陶造法律皆欲禁民為非也輕侮之法將何以禁必不能不相輕侮而更開相殺之路願考尋利害廣令評議從之吳祐為膠東太守安丘男子母丘長與母俱行市道遇醉客辱其母長殺其客而亡捕得之祐呼長謂曰若母見辱人情所恥然孝子忿必慮難動不累親今若背親逞怒白日殺人赦若非義殺若不忍將如之何長以械自擊曰國家制法囚身犯之明府雖加哀矜恩無所施祐問長有妻子乎對曰有妻未有子也即移安丘逮長妻妻到解其桎梏使同宿獄中妻遂懐孕至冬盡刑長泣謂母曰負母應死當何以報吳君乃齧指而吞之含血言曰妻若生子名之吳生投繯而死饑有烏程男子孫常弟並分後輒各得田十頃並死嵗常稍稍以米粟給並妻子追計直作劵取其田並兒長大訟之掾吏議曰並兒遭餓賴常升合長大成人而更争訟非順也比部督郵鍾離意獨曰常身為父遺當撫孤弱是人道正義而稍以升合契取其田懐挾姦路貪利忘義請奪常田畀並妻子従之吾謝夷吾為荆州刺史章帝巡狩幸當陽有詔勅夷入傳録囚勿廢舊儀上臨西廂南面夷吾處東廂分帷其中有亭長姦部人妻者縣言和姦夷吾呵之曰亭長戢在禁姦今自為惡首何得言和切譲三老孝悌免長吏之官理亭長罪帝善之宿衛士竇禮近出不還營軍吏以為亡奏逐捕沒妻子為奴婢妻盈詣州府稱寃莫省乃辭詣廷尉髙柔曰汝何自知夫不亡盈曰夫少單事母甚恭謹又哀兒女撫視不離非輕狡不顧家室者也柔曰汝夫豈與人有怨乎曰夫平善素于人無仇曰汝夫與人交錢財乎曰嘗出錢與同營卒焦子文永不得耳時子文適坐他事繫獄柔出子文問所坐言次忽曰汝頗曾舉人錢否曰身單貧不敢舉錢物也柔察其色動謂曰汝昔舉竇禮不歸何言不耶子文怪事露語失次柔曰汝已殺禮宜早服于是叩頭具首殺禮本未及埋藏處果得屍而奏盈白禮寃復其家東漢亡卒妻白始嫁夫家未與夫見大理奏以従坐棄市冀州主簿盧毓駁之曰女子之情以接見而恩生成婦而義重故未廟見之婦而死歸葬女氏之黨以未成婦也今白生有未見之悲死有非婦之痛今肆之大辟則同牢合卺之後罪何所加且記曰附從輕言附人之罪以輕者為比也又書曰與其殺不辜寧失不經恐過重也奏上丞相操嘉毓議深于經以為法曹令史魏母丘儉之誅孫女適劉氏當從坐以孕繫廷尉司𨽻主簿程咸上議曰女子有三從之義無自專之道出適他族降父母之服所以明外成之節也今夫黨見誅既隨戮而父母有罪又追刑是一人之身而兼受内外之辟也且適人産育則成他家之母殺之不足以懲亂而適足傷孝子之恩男不遇罪于他族而女膺戮于二門非所以矜女弱均法制也臣以為在室之女可從父母之刑既醮之婦使從夫家之法為著令劉宋時鄢陵縣吏陳滿射鳥箭誤中其師雖不傷吏處法棄市左丞何承天議曰獄貴情㫁疑則從輕昔有驚文帝乗輿馬者張釋之㫁以犯蹕罪止罰金何者明其無心于驚馬也故不以乗輿之重而加異制今滿意在射鳥非有心中人按律誤過傷人三嵗刑况不傷從之功餘杭為刧盜而獲者法朞親謫戌盜有従弟服大不應讁吏以為從弟母存為朞親讁之承天議曰律同籍朞親補兵大功否禮婦人三従既嫁從夫夫死從子今甲為刧若叔父尚存為同籍期補伍可也從弟本大功親若以叔母為朞親而讁之有乖大功不讁之制又失婦人従子之道謂宜見原從之父元嘉中剡人黄初妻趙殺其子載妻王遇赦王有母及男稱吏按避仇法徙趙二千里長史傅隆議曰禮律之興本情理自然非従天墮地出也父子至親分形同氣稱之于載即載之于趙雖云三代合之一體豈有分哉稱雖創巨痛深固無仇祖之義古人所謂不以父命辭王父命也若稱可仇趙當何以處載乎向使石厚之子日磾之孫砥鋒挺鍔不與二祖同戴天則石碏秺侯何得純臣于國孝義于家矣舊令殺人父母徙二千里不施之父子祖孫趙當避王周功千里外爾又令云凡流徙者同籍親近欲相隨聴之趙既流移載為人子何得不從載行而稱不行豈名教所許趙惟内愧終身稱惟沉痛沒齒孫祖之義固不得絶也遭元嘉中歴陽人有盜發冡者吏議近村符伍罪與刼不赴救同坐征虜㕘軍沈亮議曰發冡之情事止竊盜徒迹以侵亡犯死故律之嚴科然竊盜之姦必卸杖以晦刼掠之黨必讙呼以見威故起兇赫者易應潛深宻者難知也且山原為無人之鄉丘壠非常途所踐督實核名理與刼異至于防救不得比之村鄉宜除符伍之坐而結罰之科域之以地界相去百步内赴告不時救者科一嵗刑赦應城人張江凌與妻吳共罵母黄黄忿自縊死遇吏按律子殺傷若毆父母梟首罵詈棄市婦謀殺夫父母亦棄市遇赦免刑補兵江凌罵母母因自裁重于傷毆若同殺科則疑重同毆傷及罵制則疑輕准制惟有殺父母遇赦梟首無罵父母致死遇赦之科比部郎孔淵之議曰夫里名勝母仁者不入名且惡之况乃人事故毆傷咀呪法所不原詈之致盡理無可宥従輕葢疑失善此之謂也江凌雖遇赦合梟首婦本以義屬黄之所恨情不在吳原死補兵梁建康女子任提坐誘口當死子景慈對鞫實證之法官虞僧虬曰子之事親有隠無犯直躬證羊仲尼非之景慈既無防閑之道䧟親極惡刑傷倫損俗宜加罪詔流交州張冀州人費羌皮母亡家貧無以葬賣七嵗女子與迴為婢迴轉與梁之定而不言狀吏按律掠人和賣為奴婢者死郎中崔鴻言按律賣子一嵗刑五服内親屬在尊長者死買者明知是良決便真買因此流漂與掠無異大保高陽王雍議曰撿迴所買保證甚明處以盜掠實為乖當賊律殺人有首従之科盜人買賣無唱和之等律曰知人掠盜之物而故賣者以隨従論此明禁暴掠之原遏奸盜之本非謂買之于親尊之手而同之于盜掠也羌皮賣子塟親孝可表賞而刑罰科之恐非敦風俗之誼詔曰羌皮賣子塟母孝誠可嘉可特原張迴雖賣之父母不應轉賣可刑五嵗河東郡人李憐坐行毒藥論死其母訴稱身老無周親母死州㫁三年服終行决主簿李陽駁曰律諸犯罪若祖父母年七十以上無成子孫旁無周親者具狀請流者鞭宫留養親終則刑且憐既懐鴆毒之心母在猶宜闔門投畀况今已死給假殯塟足示仁寛不合更延可律依處斬流其妻子詔従之北魏蘭陵公主駙馬都尉劉輝坐與河隂人張智夀妺容妃陳慶和妹惠猛姦亂毆主傷胎遂亡命門下處奏容妃惠猛各入死刑智夀慶和並以知情不防限處流詔容妃惠猛髠鞭付宫餘如奏崔纂執奏曰伏見㫖擭輝者職人賞二階白身人聴出身進一階厠役免役奴婢為良按輝無叛逆之罪未可募同反者夫王者理天下不為喜怒增减不由親疎改易按鬬律祖父母父母忿怒以兵殺子孫者五嵗刑毆殺及愛憎而故殺者加一等雖王姬下降貴殊常妻然人婦之孕不謂非子又容妃等罪止姦私律不越刑何得同奚官之役按智夀自訴妹適人已生二女是他家之母他家之妻律許周親相隠姦罪無相緣之坐不可借失輝之忿加兄弟之刑也夫刑人于市與衆棄之明不私于天下也右僕射㳺肇等奏如纂言宣武怒奪纂官尚書奪禄御貞觀初青州有男子謀逆有司捕支黨係獄詔侍史崔仁師按覆之始至悉脱囚械梏具食飲湯潘以情訊之情得坐止魁惡十餘人它悉原縦孫伏伽曰今原雪者衆所坐者少誰為肯讓死乎倘朝鞫語變則奈何仁師曰治獄本以求生也茍知枉不申而自顧其身謀豈忠臣哉且使吾以一介易十囚命固所願也及覆訊諸囚皆叩頭曰崔公仁恕無枉者長孫無忌被召倉卒入東閤門失解所佩刀尚書劾之僕射封徳彞論監門校尉不覺察罪死當無忌罰金大理卿戴胄曰臣子于君父不稱誤法御湯劑飲食舟船雖誤皆死陛下録無忌功原之可也而校尉與無忌皆誤其罪鈞若原無忌而殺校尉不可謂刑詔復議僕射執前當胄曰不然無忌本首過法當重校尉縁無忌致罪法當輕若皆誤校尉不得獨死由是與校尉皆免覺上敕資䕃者以詐序自首不首者死尋有詐䕃事胄當以為當流上怒曰朕敇不首者死而㫁之流是示之以不信也胄知敇如是故當之何也胄曰法如是而足臣法官獨不敢虧法耳且敇或一時喜怒所發法乃明主所以布大信于天下也陛下以一朝之忿而敇殺之既知其不可而流此所謂忍小忿而存大信也上遲回者久之曰法有失賴公而正竟從胄議唐魏州人馮敬同告貴鄉縣顔餘慶與博州刺史虺冲同反餘慶博州人冲先放粟債于貴鄉遣家人歛索託餘慶為徴所得錢冲家人自買弓箭餘慶脩啟狀于冲直叙寒温并言債負不可徴得俊臣就推遂奏餘慶為冲徴債叶契兇謀又通書啟請處斬司刑丞徐有功執奏曰據永昌元年赦書貞等與謀者同惡魁首既並伏誅其支黨事未發者特赦書曰殱厥渠魁律曰造意為首魁即其帥伏誅既標並字足明魁首無遺餘慶赦後被言即為支黨將同魁首結刑則何人為支黨乎嫉惡雖臣子之心好生乃聖人之徳今赦而復罪不如無赦生而又殺不如無生竊惟聖朝伏當不爾餘慶請依後㫁處流太后怒抗聲謂有功曰若為唤作魁首有功對曰魁是大帥首是無謀太后又曰餘慶可不是魁首有功曰若是魁首虺冲敗日並合伏誅今赦後事彰只是支黨太后又曰違勅徴債與虺冲買弓箭何為不是魁首有功對曰違勅徴債誠如聖㫖所買弓箭狀不相闗太后曰二月與冲徵債八月乂通書豈不同謀有功曰所通書狀止叙寒温書搜撿不獲太后怒少解乃謂曰卿更子細勘問是支黨不時百僚供奉及杖衛三二百人莫不股栗而有功神色不變奏對無差人皆服其膽力刑反逆人丘神勣弟神鼎并男朘被奴羊羔先反司司直劉志素推按奏稱丘鼎身居文職黒襖乃武夫之衣若不夙懐叛心擬投豫州無故不合輒造又燒却反狀請付法曹處斬家口籍沒有功批云丘鼎丘勣之弟兄反弟合沒官羊羔稱投豫州作兩造襖事在赦前不合推科且衣之五彩隨人之好尚武夫一着豈限𤣥黄燒書推勘須窮窟穴或言周易或道十書既云抛著厠中又云鼎自裂破書既標著便非反書書論何事為是簿帳為是䜟圖竟不甄明遂無承欵請更審詳務令允當志素批當虺貞豫州作逆之嵗丘鼎秋滿神泉准其在西京即合歸舍為與虺貞相應迂道水下嘉州路過淹留遂經一嵗當聞豫州起逆星夜即向唐州遂與男朘俱作黒襖擬充戰服即明事相應接及聞貞敗星夜走來神都即將襖子布施天官寺近以兄勣反彰之後復燒却反逆文書此反不誅誰反合殺徐丞内縦姦慝外詐平反依前㫁申秋官詳議依有功以允坐為允瀛州人李仁怛等三十七人被告稱謀反㫁處斬父母子流二千里有功執曰反逆須有同謀奔叛寧無叶契無謀無契口語白陳即以實論頗亦苛酷縦使實有反言只恨换其宗姓恨因稱有正是口陳徒侣絶無明非實反賊盜律有云曰陳欲反心無實計流三千里奉敕依吏永年民有女幼未婚而歸于壻氏壻殺之以誣人當如既婚法令張守之曰禮婦三月而後廟見而死則歸塟于家示未成婦也律定婚而夫犯論同常人以未成婦也宜論如法理唐雲陽縣言力人張涖欠羽林軍官騎康憲錢徴之涖乗醉拉憲氣將絶憲男買得年十四將救父以涖善角觝有力不敢徒手解遂持木挿擊之死律父為人毆子往救擊其人折傷减凡人鬬三等至死者依常律伏以律令者用防兇暴行貸者以開教化春秋之義原心定罪周書所訓諸罰有權今買得生被皇風幼符至孝哀矜之宥伏在聖徳詔减死京兆府有姑鞭婦致死者奏請償死尚書栁公綽議曰尊毆卑非鬬且子在以妻而戮其母非教也减死論河南有寡婦告子不孝河南尹李傑察其子非不孝者也謂母曰汝寡居惟一子令死于罪得無悔乎婦曰子不順何悔傑曰即如是可買棺至取屍耳出使人覘之則迎謂一道士曰事了矣有頃將棺至傑感使其悔終不可時道士覘之門擒之一問即承曰與婦有私為兒制欲除之乃杖殺道士以棺歛之維揚有富室子父亡事繼母不謹一日上夀復子觴子覆于地地墳乃號于衆曰母以酖殺人母曰天鍳在何當厚誣訴之州刺史杜亞曰酒従何來曰長婦執爵而致亞曰爾婦執爵毒因婦起何可誣母乃分别鞫之乃子婦計誣母皆伏法吕元膺鎮岳陽出行游見有喪轝駐道左男子五人衰服而隨公曰逺則侈近則省此姦也令搜其棺中皆兵刃曰欲謀過江掠貨假喪使渡者不疑耳劾之更同黨數十人已期集彼岸併擒付法宋廣安軍民安崇緒訴繼母馮嘗與父知逸離今來占奪父産欲與己女令親母饑餓大理定崇緒訟母罪死下臺省集議右僕射李昉等議曰據法寺㫁非是若以五母皆同即阿蒲雖賤乃安崇緒親母崇緒本以田業為馮强占親母衣食不充所以論訴若従法寺㫁則知逸負何辜而絶嗣阿蒲處何地而託身臣等㕘詳田業並合歸崇緒馮亦合與蒲同居終身供侍不得擅自貨易莊田并家親族亦不得來干崇緒家務如是則男雖庶子有父業可安女雖出嫁有本家可歸阿馮終身又不乏養所有罪犯並凖赦原詔従昉等議童宋慶厯間寧州童子年九嵗毆殺人當棄市帝以孺争鬬無殺心止命罰金入死者家真宗時戚里有争分財不均者更相訴因入宫自理于上前更十餘㫁不服宰相張齊賢請自治許之謂訟者曰汝非以彼得分多若獨少乎皆曰然即命結實召兩吏趨歸于家令甲家入乙舍乙家入甲舍貨財皆按堵如故先分書交易之訟者乃止命同州有富民家小女奴亡不知所入奴父母訟于州録事録事嘗貸錢于富民不予乃劾富民父子三人殺女奴棄水中亡其屍富民不勝痛誣服上州官審覆無異推官錢若水獨疑之留其獄録事詣若水語侵之若水笑謝曰今數當死豈不可少留知州亦屢趣之不能若水一旦詣州屏人曰若水所以留其獄者宻使人訪求女奴今得之矣知州驚曰安在若水因使人送女奴于知州所知州乃引女奴父母問曰汝今見汝女識之乎曰吾女也安不識因従簾中推出示之父母泣曰是也乃引富民父子悉破械縦之其人號泣曰微使君某滅族矣知州曰推官之賜也知州欲奏論其功若水固辭曰但求獄正人不寃耳論功非本心也若以此為若水功置録事何地西京有僧暮過村民家求寄止主人不許僧求寢于門外車廂中許之夜有盜入其家自墻上扶一婦人并囊衣而出僧適不寐見之自念不為主人所納宿今主人亡其婦及財明日必執我詣縣官矣因夜亡去走荒草中忽墮眢井則婦人已為盜所殺先在其中矣明日主搜訪得之井中執以詣縣掠治僧自誣云與子婦姦誘與俱亡恐為人所得因殺之投井中暮夜不覺失足亦墜其中贓在井傍失不知何人所取獄成言府府皆不以為疑推官向敏中以贓不獲疑之引僧詰問數四僧服罪但言某前生當負此人死固問以實對敏中宻使訪其賊吏食于村店店嫗問僧獄何如吏紿之曰昨笞死矣嫗曰今獲賊何如吏曰已誤决雖獲賊不問也嫗太息曰此村少年某甲所殺也吏就掩捕獲之案問具服并得其贓一府咸以為神張詠守蜀時有僧行止不明有司執以白詠判其牒曰勘殺人賊既案問果民也與僧行于道中殺僧取祠部戒牒及僧衣因自披剃焉寮屬問何以知之公曰額上主猶有繫巾痕杭州有富民病將死子方三歳命婿其貲而與婿遺書曰他日欲分財即以十之三與子七與婿子長立來訟婿持其書詣府請如約張公適守杭以酒酧地曰而婦翁智人也時以子㓜故以此屬汝不然子死汝手矣乃命以其財三與婿七與子皆泣謝而去其晏元獻殊知洋州有大校李申以財豪于鄉里誣兄之子為它姓賂里嫗之貌類者使認為己子又醉其嫂而嫁之奪其産嫂姪訴于州及提轉申賂獄嫂姪被笞掠誣伏受杖去積十餘年又出訴殊取其前後案牘視之未嘗引乳醫宻尋致之一日盡召其黨立庭下出乳醫示之衆皆伏罪子母復歸如初主包孝肅知天長縣有訴牛為盜割其舌以去者無名孝肅曰若第歸殺而鬻之何告為既而有告其人為私宰殺牛者拯笑曰奈何割牛舌令斃又告之耶盜大驚服罪本拯遣殺鬻者時私宰禁重計讐者割牛舌逞忿必且復告之也人稱神明曰鄠縣民有借其兄之宅居者發地藏錢兄之子訴父所藏也令難其正程純公時為縣簿曰此易辨耳問兄子曰汝父所藏錢幾年矣曰四十年矣曰彼借宅居幾何時曰二十年矣即遣吏取錢十千視之謂借宅者曰今官所鑄錢不五六年間即徧天下此錢皆爾未借居時所鑄何也其人遂服州閬州大姓雍子良殺人買里民使出就吏獄具知朱夀昌得其情引囚訊之囚服如初乃告之曰吾聞子良遺汝錢十萬緍汝女為子婦許以女妻汝子有諸囚色動又告之曰汝且死書偽劵抑汝女為婢指十萬緡為僱直而嫁汝女也汝奈何因泣下以實告収子良付法首宣州囚有殺人者將抵死判官胡宿訊疑之囚垂憚箠楚不敢言辟左右問之終不言更問之曰田夫也旦將之田縣吏縛赴官懵莫知其由今坐死已矣宿大駭亟取獄再繙閲探本辭知婦人與吏私殺其夫而執平民以告也一訊而伏持潁州民劉甲者暴迫弟栁鞭其婦既投杖夫婦相泣而甲怒愈急逼再鞭抵死守當夫極法推官張洞持之曰律以教令者為首栁夫婦相泣至痛也獨不能格其兄使至此不當死當原讞其議得免死之有妻為人殺而失其首妻族以為其婿殺之也告嚴訊誣服従事疑之請緩獄乃徧告封内仵作畢之官詰之一人曰近某豪家言死一婢子召瘞之五更時于墻頭過棺棺輕似無物瘞某處發之但獲一女人首示其夫夫曰非妻也收豪家鞫之則故與是妻通稔乃殺婢函其首以塟而以屍為其屍購焉豪民棄市二許州獲盜獲二人訊之盜甲曰逸者尚十三人中人曰李洪李贊兄弟也居襄城之次溝餘皆有名居越數日襄城械二人至官召甲視之曰是也弗承是日次溝人百餘羣言無辜州守邵寶將考績却篆事聞之乃輿而之學宫羣遮道訴返羣訴如前令緩訊待察乃募邏卒宻遣訊之野曰得情賞書符畀之越月餘卒以二人至曰此洪也此贊也審諸甲甲又曰是前誣二人何也曰四人者皆居次溝前一人家次溝之北土着而富後二人家次溝之南僑居而微盜者實後二人逸而傭于郾城有司以名居逮前二人耳謂甲曰若何兩是之甲曰前二人故有怨且名居同虞反覆之誅釋前二人賞募卒如符邵子曰聴獄之不可執也如此哉獲盜方所即録其辭得二人名是名也居是居也審之而信庸詎知復有後二人者哉使前二人有一先死生者不遂非而成獄者寡矣碭山縣學教諭丘純因責膳夫祝磨兒其父令磨兒遁去乃傍告純箠死棄屍他所御史問勘誣伏尋屍偶于黄河得一支解者認為磨兒屍遂坐極刑御史韓雍疑之遣人蹤跡得磨兒而白趙甲飲陳乙酒肆歸而溺諸河甲之子訟乙毆死誣服何文肅公喬新時為按察使讞之曰肆民居櫛比毆必有聞去河逺負亦必有見騐甲手爪沙泥實溺也乙得辨子東昌有武官子懐金與所厚生飲肆中是夜武官被殺無主名有司疑生殺之逮訊生不勝楚誣服許襄惠公進時為按察使以尸首不得疑之私計必酒人得錢必易物乃託他事遍取商歴入閲之至布商厯酒人果以金易布十數匹則武官子死之明日也一訊而服納首空桑中執廬陵有儒生夜過其里人胡甲所被殺在其門官胡訊胡誣服按察僉事陳琦疑之曰豈有身殺人而自置諸門者訊之則儒生有宿仇瞰生適胡也而殺之胡得釋弘治間合州有兄弟二人兄行官託其資于弟令直産契劵俱弟掌兄卒官嫂扶櫬歸弟以無券籍也執不還嫂訴于州訊不服聞知眉州郭祥刑有明威往訴之郭隠其事取獄中賊指扳其弟窩盜移文合州械致之詰曰汝與某人為盜致富弟泣曰吾兄仕宦所得未嘗盜也固詰之詞甚詳一一録記乃逮其嫂證之弟慚服盡還其産興化囚坐毆殺論死自訴傷無騐知府吳惺疑之命燔水無納鹽自臨濯視乃得傷且失左三肋語囚者毆者右手固左傷宜肋之失也隠傷失肋非騐而何仇有自殺妻誣其仇者云耕田争水被毆死惺訊之乃曰妻死時日日大霖雨争水何為竟坐告者殺妻罪誣不行嘉靖中燕民崔鑑父祐為小賈性嗜酒悦善歌者娼嬖之每被酒輒楚辱其妻王以悦娼一日又出視市王詬娼娼怒擊王敗其面王捬床泣欲自經鑑時年十有三嵗矣自學舍歸見之撫之泣與訣鑑悲痛不自勝以語慰藉即潛抉白刃入娼所刺殺之以匿牖下欲亡去已自念吾殺娼父不知必且謂吾母禍母矣吾走母無以自明因自歸㑹王方被逮鑑大呼曰殺人者我也我當死衆以其年幼不信欲舍之鑑曰若不吾信殺人刀尚在是従牖下出之于是母得釋有司憫鑑志以事聞下法司議于是法司言母子之情根于天性鑑雖冒重罪獨志在全母情可矜詔特原鑑圖書編卷一百二十三
