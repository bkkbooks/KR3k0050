body:
  text: 圖書編卷五十三明章潢撰黄河圖叙漢使張騫持節西域訪河源以為二水發葱嶺趨于闐滙鹽澤伏流千里至積石再出唐薛元鼎使吐蕃訪河源得之悶磨黎山世之論河源率皆本此莫知其非也至元始命都實為招討使佩金虎符徃求之四越月而得其說如圖所載還具以聞其地庫庫楚授其説翰林學士潘昻霄撰而臨州朱思本於巴爾濟蘇家得帝師所藏梵宇圖書譯之與潘互有小異俱載元史黄河本東北流厯西畨至蘭州凡四千五百餘里始入中國又東北流過畨境凢二千五百餘里始轉河東又南流至蒲州凢一千八百餘里通計屈曲九千餘里而張騫所訪乃在其西萬里外皆為吐蕃遮隔不得假道故也世之受蔽於外舎近求逺者何以異此朱思本姓名因河源記始傳其為圖與所記山水道里不少差舛特存之以代輶軒之對或言天下之山皆原於崑崙今觀之圖豈足與辨未能實詣而狥傳聞不獨於山然也河源元史元命招討使都實窮黄河源都實受命行四閲月始抵其地既還圖其形勢來上言河出吐蕃朶甘思西鄙有泉百餘泓方可七八十里沮洳散渙不可逼視登髙望之如列星然名火敦腦兒火敦腦兒華言星宿海也羣源奔輳近五七里滙為二巨澤名阿剌腦兒自西而東連屬成川號赤賔河又合亦里赤忽蘭也里木三河其流寖大始名黄河又岐為八九股行二十日至大雪山名騰乞里㙮即崑崙也由崑崙南至闊即及闊提二地始相屬又經哈利别里赤兒之地合細黄河及乞兒馬赤二水北行復折而西流過崑崙北又轉而東北行約二十餘日至積石始入中國云大約自河發源至中國計及萬里然其間溪澗流絡莫知紀極崑崙之西人跡罕少而山皆草石至積石方林木暢茂世言河九折盖彼地有二折焉黄河源流大約説約河源倣經為之辭曰河源于星宿海滙為二澤流合三水岐為九渡行二千餘里經崑崙山由山南又合二水北流折而西復過崑崙之北又轉而之東又北行二千餘里至于積石河源辯王鏊客有問河源者王子曰是非予所及履也雖然予以為必出於崑崙曰子何以知之曰予以理知之山與水同原天下之山起於崑崙天下之水出於崑崙無疑也曰子不聞乎昔元世祖欲窮河源遣使行四五千里至吐蕃朶甘思西部有曰火敦腦兒者華言星宿海也有水百泓望之如列星此河源也踰崑崙二十餘日矣予曰西域之跡發自張騫騫所厯諸國甚久且逺東漢之世大秦條支安息至於海濵四萬里外重譯貢獻班超遣掾甘英窮臨西海而還皆未覩所謂崑崙也何元使得之易乎禹本紀言河出崑崙去嵩髙五萬里外國圖云從大晉西七萬里得崑崙之墟今元使行不及五千里云已踰之何崑崙之近乎自昔言崑崙者皆在西北元使所圖乃在西南何也然則元使所謂崑崙者果崑崙乎所謂星宿海者果河源乎未可知也爾雅云河出崑崙墟色白并千七百川色黄山海經云崑崙之丘河水出焉東南流注於杞天之水洋水出焉西南流注於醜塗之水黒水出焉西流注於大杅淮南子云崑崙之墟河水出其東北陬赤水出其東南陬洋水出其西北陬雪山髙五百由旬山頂有阿耨逹池池東有恒伽河從象口出共五百河流入東海南有新頴河從牛口出共五百河流入南海西有博义河從馬口出共五百河流入西海北有斯陁河從獅子口出共五百河流入北海康泰扶南傳曰恒水之源出崑崙有五大源分流為諸水洛書曰河自崑崙出重野逕積石為中國之河張騫云于闐之西水皆西流注西海其東水東流注塩澤塩澤濳行地下其南則河源出焉古書所記先後一轍豈皆不可信而元使獨可信乎曰為其得之親見也曰古之至人夫獨非親見鑿空以欺後世乎釋氏生於天竺穆王宴於瑶池夫豈非親見乎而疑之也然則元使其信乎曰吾嘗考之河有兩源一出于闐一出崑崙之墟且漢使亦嘗窮河源矣謂出于闐其山多玉石采來天子案古圖書名其山為崑崙然非古所謂崑崙也元使所見其殆是乎若崑崙之墟彼固未之覩也且天竺諸國有身熱頭痛之坂縣度之阨熱風夏雪毒龍惡鬼猛虎獅子之害元使亦嘗厯此乎禹本紀言河出崑崙崑崙其髙二千五百餘里日月所相避隱為光明也其上有醴泉瑶池淮南子載崑崙之上有木禾珠光樹玉樹懸圃閬風十洲記謂弱水繞之上有金臺玉闕之類元使亦嘗覩此乎雖其神怪恍惚不可盡信而河源之出於是不可誣也近有佛圖調者謂鍾山西六百里有崑崙郭璞謂别自有小崑崙也則崑崙固非一乎曰崑崙之逺近不一然則河源惡乎定曰水經崑崙在西北河水出其東北陬東南流入渤海其一源出于闐之南山北流與葱嶺合東注蒲昌海郭璞云河出崑崙濳行地下至于闐國復分流岐出合而東注塩澤復行積石為中國河此定論也予見近世之論河源者每以一夫之目廢千古之論故為之辯河源總論古今河源之說異禹貢云導河自積石未窮其源也漢張騫云河有兩源一出于闐一出葱嶺唐薛元鼎云得河源於崑崙之水赤黄黒青色以方異穆天子傳言陽紆之山河伯所居是為河宗佛書言阿耨逹山有大淵水即崑崙也其山名徃徃不同者或古今變易或畨漢異稱不然記者之妄耳按潘侍讀昻霄河源志今朝之究河源盖得目觀非傳聞者也元太祖嘗征西夏過沙陀至黄河九渡九渡者在崑崙西南憲宗命皇弟錫里征西域凢六年拓地四萬里而河源在域内矣至元庚辰世祖命臣都實徃西域將城其地以通互市自河州行五千里抵河源及還圖城郭位置以聞上恱以吐蕃都元帥領工徒以徃使其弟庫庫楚馳奏大臣沮之次年還河源在吐蕃西鄙有泉百餘竇地方七八十里而皆沮洳不勝人跡泉不可逼觀登其旁嶺下視竇厯厯如列星然故名火敦腦兒火敦者漢言星宿也腦兒者海也星宿海合流而東滙為二澤復合流始名黄河然猶清可渉河析為九即九渡也廣五七里下復合流漸逺水益渾土人抱革囊騎過之其聚落之處多編木為舟以濟附以毛革中僅容二人又東則兩山峽束廣可一二里或半里深叵測矣崑崙腹頂皆雪盛夏不消河過其南距山麓僅五六十里又南為四逹之衝地多盗常鎮以兵崑崙之西人民少山居其南山峻獸有旄牛野馬狼狍獂羊之屬東則山益峻而地漸下岩至狹或狐可躍渡河至貴德州始有官治厯積石至河州東北流厯蘭州鳴沙州應吉里州流正東自星宿海至漢地河南北小水旁注者衆其山或草或石至積石始林木暢茂世言河九曲而彼地有二折云漢書言葱嶺至蒲昌海水洑流而出臨洮今洮水自南下非蒲昌也土人言于闐葱嶺水下流散之沙磧則其洑流信然其復出者莫知矣或又云黄河與天通又云崑崙去嵩髙五萬里閬風𤣥圃積瑶華盖仙人所居皆妄也世多言河出崑崙者盖自積石而上望之若源於是矣而不知星宿之源在崑崙之西北東流過山之南然後折而抵山之東北其繞山之三靣玦玦焉實非源於是山也然凡水者山之血胍也山髙而廣則其水必衆而鉅崑崙至髙廣者也而謂無一水源於其間耶其不言之者盖欲破昔之謬著今之竒故畧之爾黄河九曲黄河九曲其説出河圖絳象今録於此河導崑崙山名地首上為權勢星一曲也東流千里至規其山名地契上為鉅樓星二曲也邠南千里至積石山名地肩上為别符星三曲也邠南千里入隴首間抵龍門首名地根上為營石星四曲也南流千里抵龍首至卷重山名地咽上為卷舌星五曲也東流貫砥柱觸閼流山名地喉上為樞星以運七政六曲也西距卷重山千里東至雒㑹名地神上為紀星七曲也東流至太坯山名地宏上為輔星八曲也東流過浲水千里至太陸名地腹上為虚星九曲也元學士潘昻霄河源撰云黄河九折儌外有二折蓋乞兒馬出反必赤里也禹貢導河自積石以此參考之絳象河圖及河源志與禹貢一一皆合黄河四大折黄河自塩澤西來暨逹潼關其靣勢所向凡四大折或與匈奴分境或當匈奴來路其初一折由積石而逕湟中則鄯蘭也是一折也及至靈州西南遂轉北而行凡千餘里北河西岸即為肅凉甘沙四郡是又一折也迨其北流千里而遥至九原豐州則又轉而東流故豐州北靣正拄大河是又一折也豐州之東為榆林北境固抵大河而河從此州之東又轉而南故勝州北東兩靣皆抵大河也自此而徃直至潼關皆是河南矣此又一折也三門三門集津在平陸縣治東六十里道由東西延至黄堐循河東下再行十里至其處河南山脊峻下其尾屬於北山鑿山作三門以道河流南者為鬼門中為人門次北為神門又次北及開元新開河又以中為夜义門北為金門新開河為公主河未詳其説也鬼門廹窄水勢極峻急人門遂稍平緩直東河十五歩中流有小山乃底柱也東流又十歩其水瀠廻謂之海眼深不可測神門最脩廣水安妥盖唐宋漕運之道山嵓上有閣道其牽泐石深尺許正南下五十歩有石聳起側視若香爐然東又三十歩一峯可髙數丈不甚竒新河南北廣約二丈其峯石如甃又如繩之取直者行百餘歩與神門水合其南一峯壁立度二百尺許極竒秀石紋青黄相襍其嶺多鵠鸛巢疊石為爐形非飛舉者不可至不知其始或謂老君煉丹爐盖神之也新開河左就嵓石下刻宋金人題名并詩且刻翠隂禹功二嵓稍東刻忠孝清慎四字字畫若顔魯公書者其南山上有石巉然如鴟蹲者人號掛鼓石盖禹用以節時齊力也自新開河東口渉水上山舊有開化寺今不存有小祠象龍神者前碑剥落不可摸不知何時立祠擔下二石其狀如碑無字上作三竅一碑盖金元興定十二年修禹廟之記也禹門禹門禹貢龍門也亦曰禹門渡云兩山石立河出其中廣不百歩世謂禹鑿所謂三月魚上渡而為龍也其東岸曰看鶴臺尤孤峭不可下瞰西為梁山即河梁也北曰建極宫道家祠神禹者也刻石十餘多元名臣文地極幽其間煙雲水石之聚蟲蛇㒺象之居相傳桃花開時河水噴激聲震萬雷始異今也並河之東為太史公墓前為廟有晉永嘉中殷濟樹碑今皆圯於河徘徊良久作龍門之歌下山日昃道過子夏墓墓在新豐里新豐南曰通化里即文中子講學處也底柱底柱在平陸縣東五十里大河自蒲津西來至是㣲折而南是柱正當轉曲之間在三門山之陽紫金駱駝二峯之西其形如柱植立中河今年内濵初公谷泉儲公約徃觀之乃七月三日至平陸同劉虞州縁河北岸﨑嶇而東至其下登拜禹廟出先臨門蹈禾黍中迤邐南望彷彿窺其形狀但為雙樹所蔽翳爾既坐三公問底柱何在羣指而未得予曰兩岸雙樹蔽翳而突兀祠前者是也乃自先臨門之磴而下東縁河滸至於懸崕去河咫尺倚崕而立南望底柱形狀峭㧞與河中諸峯不同時暴雨新落大河泛漲是柱頗偏西岸予又疑曰徃何以謂之柱在中流邪虞州子曰河至秋䦨冬後則東流倒于西岸而是柱正當中爾諸人欲前進求至其所而路益隘阢内濵子乃命繪人扶二吏徃直至紫金峯東與柱相對而東㟁山碑有古刻底柱二字及唐宋人銘詩繪人皆謄來以觀遂開尊河滸之上内濵子浩然嘆曰斯河也自崑崙積石而來北過龍門東至底柱納水不啻萬流過山不啻千重雖崇嶺峻巘俱避左右無一能當之者獨此柱髙不及數尋圍不及百丈乃巋然中流上撑昊天下係厚地汚濁不染波盪不去亘萬古而不磨乃人之一心本與乾坤相通或為巧言所入或為正議所拂遂移其正理變其常性乃不若此柱何耶古河辯漢許昌言九河故道謂徒駭在成平今獻州樂壽縣景城鎮古有成平城胡蘇在東光今景州東光縣東連滄州古有胡蘇亭鬲津在鬲縣德州有鬲縣城曰太史曰馬頰曰覆釜在東光之北成平之南曰簡曰潔曰鉤盤在東光之南鬲縣之北斯言簡而近實後世圖志雖詳反見淆亂嘗往來燕齊西道河間東履清滄熟訪九河故道蓋㫺北流衛漳注之今之御河漢初猶入河漢魏時名漳水隋唐以來名御河河旣東徙漳自入海安知北流之漳非古徒駭河歟宋會要神宗熙寧三年議開御河臣寮奏云可于恩州武城縣開約二十餘里入黃河北流故道下五股河詳此則御河入黃河北流故道無疑也踰漳而南清滄二州之間有古河堤岸數重地皆沮洳沙鹵太史等河當在其地滄州之南有大連澱今曰大梁五龍堂宋碑作大連疑即隋末羣盜所據之豆子也西踰東光東至海此非胡蘇河歟澱南至西無棣縣百餘里間有曰大河曰沙河皆瀕古堤縣北地名八會口土人云因河㑹得名縣城南枕無棣溝兹非簡潔等河歟無棣溝通海隋末廢塞唐薛元鼎開之百姓歌曰新河得通舟楫利直達滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被凡此溝澱今皆為鹽司堰塞平時瀦水不通纔遇霪雨水即潰溢故河間清滄之地常被水害無有寧歳東無棣縣北有䧟河闊數里西通埭東至海兹非所謂鈎盤河歟德州有盤河鎮濵州北有士傷河西踰德棣東至海兹非鬲津河歟士傷河最南比他河差狹是謂鬲津無疑也所謂士傷者土人云昔人戰塲因傷賢人故云按水經漢安帝時劇縣賊畢豪等東船宼平原縣令劉雄門下小吏所輔浮舟追至厭次津戰敗為賊所擒輔求代雄豪縱雄殺輔于此津盖此河也蔡氏書傳乃曰自漢以來講求九河皆無依據祖王横之言引碣石為證謂九河已淪于海按禹貢文北過洚水至于大陸又北播為九河同為逆河入于海大陸在邢趙深三州之地爾雅之廣河澤也去海岸已數百里大鹿又曰巨鹿吕氏春秋曰鉅鹿之北遂分為九河路史云九河始元城大名縣西三百有故瀆鄭夾漈謂大陸非趙地之廣河澤乃汲郡之吴澤也如此則又逺之矣又東至海中始叙九河則大陸與九河相離千里如是之逺而絶表志不合禹貢之文其不可信一也王横謂海溢出浸數百里而青兖營平郡邑不聞有漂没之處而獨浸九河其不可信二也今平原迤北清滄之間雖為樹藝城邑相望而地形河勢髙隱曲折徃徃可尋但禹初為九厥後或三或五變遷多寡不同必欲按名而索故致後儒紛紛之論不得不辯黄河流入中國黄河源出西畨星宿海貫山中至西戎名細黄河繞崑崙至積石經陜西山西境界至河中潼關流經河南之閿鄉靈寳陜沔池新安濟源孟津孟鞏温汜水武陟河隂原武滎澤陽武中牟祥符尉氏陳留通許杞太康睢寧陵歸德諸縣至直𨽻亳縣馬丘村合馬腸河城西北合渦河東至直𨽻懐逺縣之荆山合淮其在孟津西有楊家灘西北有繀家灘杏園灘馬糞灘築䕶民堤三百十五丈永安堤一百二十丈以防漫流又有支流一自祥符縣西南八角决八安家河一股從朱仙鎮閙店流經尉氏一股從三里岡劉岡流經通許北境西至扶溝鐵佛寺合流經西華㑹沙河潁河入北湖又經商水項城之南頓至直𨽻夀州西至正陽鎮合淮一自祥符縣白墓子岡決入流經通許杞大康之馬厰集舊名馬厰河又經柘城縣鹿邑東北境合渦河至亳縣北關仍入本河合淮俱入海黄河故道古自陽武北新鄉西南入境東北經延津汲胙城至北直𨽻濬縣大伾山北入海即禹貢導河東過洛汭至於大伾處至魏郡鄴縣有故大河在東北直逹於海疑即禹之故河也周定王五年河徙則非禹之所穿漢文帝十二年河决酸棗東南流經豐丘入北直𨽻長垣縣至山東東昌府濮州張秋入海五代至宋兩决鄭州及原武東南陽武南流經封丘于家店祥符金龍口陳橋北經蘭陽儀封入山東曹縣境分為二𣲖其一東南流至滁州入泗其一東北流合㑹通河國朝洪武七年至十八年二十四年陽武原武祥符凡四度渰没䕶城堤又决陽武西南東南流經封丘至通許分九道名九龍口又南經諸州入南直𨽻大和縣入淮正統十三年河溢仍循陽武故道直抵張秋入海河源考夏書禹貢導河積石至於龍門南至於華隂東至於底柱又東至于孟津東過洛汭至於大伾北過洚水至于大陸又北播為九州同為逆河入於海蔡傳曰河自積石三千里而後至龍門但一書積石不言方向荒逺在所畧也龍門而下因其所經記其自北而南則曰南至華隂記其自南而東則曰東至底柱又詳記其東向所經之地則曰孟津曰洛汭曰大伾又記其自東而北則曰北過洚水又詳記其北向所經之地則曰大陸曰九河又記其入海之處則曰逆河自洛汭而上河行于山其地皆可考自大伾而下垠岸髙于平地故决齧流移水陸變遷而降水大陸九河逆河皆難指實然上求大伾下得積石因其方向辯其故迹則猶可考也程氏曰自洛汭以上山水名稱迹道古今如一自大伾以下不特水道難考雖名山舊嘗憑河者亦復不可究辨非山有徙移也河既變遷年世又逺人知新河之為河不知舊山之不附新河輙並河求之安得舊山之真歟西漢書張騫傳漢使窮河源其山多玉石采來天子案古圖名河所出山崑崙云西漢書西域志西域中央有河其河有兩源一出葱嶺山下一出于闐于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名塩澤者也去玉門陽關三百餘里廣袤三百里其水停居冬夏不増减皆以為濳行地下南出於積石為中國河云山海經崑崙山縱横萬里髙萬一千去嵩山五萬里有青河白河赤河黒河環其墟其白水出其東北陬屈向東南流為中國河河百里一小曲千里一大曲發源及中國大率常然東流濳行地下至規期山北流分為兩源一出葱嶺一出于闐其河復合東注蒲昌海復濳行地下南出積石山西南流又東廻入塞過燉煌酒泉張掖郡南與洮河合過安定北地郡北流過朔方郡西又南流過五原郡南又東流過雲中西河郡東又南流過上都河東郡西而出龍門汾水從東於北入河東即龍門所在龍門未開河出孟門東大溢是謂洪水禹鑿龍門始南流至華隂潼關與渭水合又東廻砥柱砥柱山名河水分流包山而過山見水中若柱然今陜州東河北陜縣三縣界及洛陽孟津所在至鞏縣與洛水合成臯與濟水合濟水出河北至王屋山而南截河渡正對成臯又東北流過武德與沁水合至黎陽信都信都今冀州絳水所在絳水亦曰潰水一曰漳水鉅鹿之北遂分為九河鉅鹿今邢州大陸所在大陸澤名九河一曰徒駭二太史三馬頰四覆釜五胡蘇六簡七㓗八鈎盤九鬲津又合為一河而入海齊桓公塞九河以廣田居故館陶貝丘廣川信都東光河間以東城池九河舊跡猶存漢代河决金堤南北多罹其害議者常欲求九河舊迹而穿之未知其所是以班固云自兹鉅漢以亡其八枝河之故瀆自沙丘堰南分地出焉故尚書稱導河積石至於龍門今絳州龍門縣界南至于華隂北至于砥柱東至于孟津在洛北都道所凑古今以為津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所也大伾山今汜水縣即故成臯也山再成曰伾北過絳水至於大陸其絳水今冀州信都大陸澤名今邢州鉅鹿又北播為九河同為逆河入海是也同合出九河又合為一名為逆河逆行也言海日有朝夕潮以迎河水河决考按河決之患三代已然漢文帝時河決酸棗今開封府延津縣武帝而後則決于瓠子在大名府開州城南二十五里決于館陶今東昌府館陶縣分為屯氏河即今衛河東北入海至元成時河始決東郡今東昌府地方分流於愽州今聊城縣後又決平原今德州決渤海今景州滄州武定州皆是決清河今廣平府清河縣及真定棗強縣是決信都今真定冀州深州地皆東北並青冀之境以逹於海自東漢厯魏晉隋唐以及宋初並鮮河患迨宋仁宗至和間河始决大名神宗熈寧始决於澶州曹村今開州地北流斷絶河道南徙東滙于梁山濼在東平州西分為二𣲖一入南清河入於滙在今淮安清河縣即泗水下流發源㤗安州經徐邳南流入淮一合北清河入於海即濟水故自兖州東北流經濟南府長清齊河濟陽武定蒲臺利津等州縣界入于海黄河入淮自兹濫觴矣舊黄河在開封城北四十里至我朝洪武二十四年河決原武東經開封城北五里又南行至項城經潁州潁上縣東至夀州正陽鎮全入于淮而故道遂淤至是又決滎陽過開封城之西南而城北之新河又淤自是汴城在河之北矣隋唐以前河自河淮自淮各自入海宋中葉以後河合於淮以趨海矣此古今河道遷徙不同之大畧然前代河决不過壊民田廬而已我朝河决則慮併妨漕運而關繫國計故我朝治河視前代為尤急治黄河議黄河發源具載史傳今不敢煩瀆姑自寧夏為始言之自寧夏流至延綏山西兩界之間兩岸皆髙山石麓黄河流于其中並無衝决之患及過潼關一入河南之境兩岸無山地勢平衍土少沙多無所拘制而水縱其性兼之各處小水皆趨于河而河道漸廣矣方其在於洛陽河内之境必東之勢未嘗拂逆且地無髙下之分水無傾㵼之勢河道雖大衝决罕聞及至入開封地界而必東之勢少折向南其性已拂逆矣况又接南北直𨽻山東地方地勢既有髙下之殊而小水之入於河者愈多淤塞衝决之患自此始矣此黄河之大槩也今之論黄河者惟言其瀰漫之勢又以其遷徙不常而謂之神水遂以為不可治此盖以河視河而未嘗以理視河也夫以河視河則河大而難治以理視河則河易而可為瀰漫之勢盖因夏秋雨多而各處之水皆歸於河水多河小不能容納遂至瀰漫然亦不過旬日至於春冬則鮮矣是則瀰漫者不得已也水之變也豈其常性哉至於所謂神水者尤為無據其故何耶盖以黄河之水泥沙相半流之急則泥沙並行流之緩則泥沙停積而停積則淤之漸矣今日淤之明日淤之今歳淤之明歳淤之淤之既久則河髙而不能行然水性就下必於其地勢之下者而趨焉趨之既久則岸靣雖若堅固水行地下岸之根基已浸灌䟽散而不可支矣及遇大雨時至連旬不晴河水泛漲瀰漫浩蕩以不可支之岸基而遇此莫能禦之水勢傾刻奔潰一㵼千里遂成河道近日蘭陽縣父老謂黄河未徙之先數年城中井水已是黄水足為證驗故人徒見一時之遷徙而不見累歳之浸灌乃以為神無足怪也為照河南山東及南北直𨽻臨河州縣所管地方多不過百里少則四五百里若使各該州縣各造船隻各置鐵扒并尖鐵鋤每遇淤淺即用人夫在船扒濬若是土硬則用尖鋤使泥沙與水並行既無淤塞之患自少衝决之虞用力甚少成功甚多且黄河水激湍而泥沙則又易起更有船隻則人夫不惟免渉水之苦而風雨可蔽宿食有所是修河之智而寓愛民之仁推而言之其利甚博若夫瀰漫之勢殆不能免所可自盡者則在築堤防患不與水争地耳宋太祖曰夏后治水但言導河至海隨山濬川未聞力制湍流廣營髙岸自戰國專利堙塞故道以小防大以私害公九河之制遂隳厯代之患弗弭神宗曰後世以事治水故常有礙以道治水無違其性可也如能順水所向遷徙城邑以避之復有何患雖禹復生不過如此歐陽修曰開河如放火又曰避髙就下水之本性河流已棄之道自古難復文彦博曰河不出於東則出於西利害一也今發夫修治徙東從西何利之有自古治河之説多矣若宋二帝之見二臣之言可為百世法黄河治法今之治河者難於禹焉夫三代以上或都秦雍或都陳貢道皆遡黄河水擊數千里直逹耳而江南之貢賦猶未入中國也且王畿自以公田之入足上供祭祀宴享軍國之需故餉道不經見禹特治河之患播大伾析九河至今天津入于海事畢矣彼一時也河利於北而不利於南徙今則餉事大半仰給江南而江南之舟泛長江厯揚淮而北非河以濟之則五百四十里當陸運耳京師若何故治水者必不可使北行由禹之故道必約之使由徐邳以救五百四十里餉道之缺是不徒去河之害而又欲資河之利者也不亦難乎若不為餉道計而徒欲去河之害以復禹故道則從河南銅瓦廂一决之使東趨東海則河南徐邳永絶河患是居髙屋建瓴水也而可乎故九河故道必不可復者為餉道也而非難復也黄河由小浮橋㑹徐洪自小浮橋之上皆閘河也故汶水出髙家閘與小浮橋大河㑹是汶與河交㑹在髙家閘嘉靖末水北徙由秦溝則自小浮橋以上遂四十里至茶城悉為大河髙閘沉河中不復見則汶與河交㑹在茶城矣黄河自清河迄茶城五百四十里全河經徐邳則二洪平舟以不敗是黄河決堤之害有限而濟運之利無窮今惡其害也而欲去之河南是河南歳治黄河徐邳歳治運河滋多事耳今以五百四十里治運河即所以治黄河治黄河即所以治運河其功合一不亦便哉黄河自宿遷而下河博而流迅治法宜縱之必勿隄宿遷而上河窄而流舒治法宜束之亟隄可也又徐邳水髙而岸平泛溢之患在上宜築堤以制其上河南水正而岸髙衝刷之患在下宜捲埽以制其下不知者河南以堤治是滅址崇頂者也徐邳以埽治是摩頂擁踵者也其失䇿均也黄河上源支河一道自歸德飲馬池厯虞城夏邑永城宿州靈壁睢寧出宿州小河口𢎞治中侍郎白昻濬之一殺河勢一利商船今淤若河趨則因勢利導之而豐沛蕭碭徐邳之患紓矣黄河為中國患久矣神禹以來或言于三代或言于漢唐宋時固不同或言于秦晉或言于宋鄭徐淮地固不同今治河者動泥古說則以三代治河之法用之漢唐宋可乎又以秦晉治河之法用之宋鄭徐淮可乎特以數事拘儒牢不可破者列于左一多穿漕渠以殺水勢此漢人之言也特可言之秦晉峽中之河耳若入河南水滙土䟽大穿則全河由渠而舊河淤小穿則水性不趨水過即平陸耳夫水專則急分則緩河急則通緩則淤治正河可使分而緩之道之使淤哉今治河者第幸其合勢急如奔馬吾從而順其勢隄防之約束之範我馳驅以入於海淤安可得停淤不得停則河深河深則永不溢亦不舎其下而趨其髙河乃不决故曰黄河合流國家之福也一我朝之運不頼黄河此先臣之言也盖欲黄河由禹故道而以為山東汶水三分流入徐吕二洪為可以濟運遂倡為不頼黄河之說耳夫徐吕至清河入淮五百四十里嘉靖中河身直趨河南孫家渡趙皮寨或南㑹于淮或出小河口而二洪幾斷漕事大困則以失黄河之助也今欲不頼之而欲由禹故道則弱汶三分之水曾不足以濕徐吕二洪之沙是覆杯水于積灰之上者也焉能盪舟二洪而下經徐邳厯宿桃河身皆廣百餘丈皆深二丈有竒汶河勺水能流若是之逺乎能濟運否乎故曰我朝之運半頼黄河也一黄河北徙國家之利此先臣之言堪輿家之說也不知三代以上都冀州黄河若張弓然其時大江以南多未貢賦故山東之運東而至西秦之運西而至原不藉南運也若河南徙則東運既不便而黄河之水從大行而望之勢若反而挑王氣乃㣲古今貢賦全給于江南又都燕據上游以臨南服黄河南徙則萬艘渡長江穿淮揚入黄河而直逹于閘河浮衛貫白河抵于京且王㑹萬國其便若是茍北徙則徐邳五百里之運道絶矣故曰黄河南徙國家之福也一黄河不能復禹故道必使復河南故道此近臣之議也盖懲徐邳連歳河患激而云然耳不知徐邳之患由邳河之淤又由先年河行房村口近年曲頭集口旁流既急而盛正流必緩而淤而徐邳之水患博矣然河患不在徐邳必在河南不在河南必在徐邳嘉靖以前河經河南河南大患九重拊膺百工蹙額思與河南圖一旦之命䇿力畢舉竟莫支吾而河南適有天幸河併行徐邳而後河南息二百年之大患居平土者僅二十餘年今若復河南之故道豈惟人力不勝即勝之是又徙徐邳之患於河南而又生二洪乾涸阻運之患也第隄徐邳三百里有竒河不泛濫而徐邳之患消故河由徐邳則民稍患而運利由河南則民與運兩患之姑母論王土王民鄰國為壑之大義也又况堤固水深即碭徐之患直河秋一季耳利害豈不明甚故曰河南故道不必復也一黄河清聖人生此史臣之言也彼盖謂五百年王者興說也非河渠說也夫王者興非臣所當言而今拘儒每以黄河清為上瑞誤哉夫黄河濁者常也清者變也欲其常濁而不清彼濁者盡沙泥水急則滚沙泥晝夜不得停息而入於海而後黄河常深常通而不决清則水澄水泥不復行不能入海徒積墊河身與岸平耳夫身與岸平河乃益弱欲衝泥沙則勢不得去欲入於海則滯不得䟽飽悶偪廹然後擇下地一决以快其勢此豈待上智而後知哉夫河决矣餉道敗矣猶賀曰上瑞非迂則愚故河清則治河者當被髪纓冠而救之不爾憂方大耳故曰黄河清變也非常也災也非瑞也行水之法治有餘先下流治不足先上源國家餉道延袤幾三千里黃河之水每患其大盈有法以制其盈令不溢閘河之水每患其大縮有法以濟其縮令不竭蓋有𤣥運存焉未可以言而盡也瓜洲上曰通惠閘下曰廣惠閘青石市諸蘇州麻石市諸上元閘匠取諸夏鎮丁夫募諸江北經三月而後成排萬口而始定議百年而方興難矣哉黄河若河南銅瓦廂陶家店練口判官村穵泥河榮花樹劉獸醫口若山東武家壩瓦堽口皆要害也以頭年下埽為次年之防一年積料為兩年之用則桑土早備隂雨無虞矣慎之哉治黄河之淺者舊制列方舟數百如墻而以五齒爬杏葉杓䟽底㳺乗急流衝去之效莫覩也上䟽則下積此深則彼淤奈何以人力勝黄河哉虞城生員獻䇿為余言以人治河不若以河治河也夫河性急借其性而役其力則可淺可深治在吾掌耳法曰如欲深北則南其隄而北自深如欲深南則北其隄而南自深如欲中深則南北隄兩束之衝中堅焉而中自深此借其性而役其力者也功當萬之於人又其始也假隄以使河之深其終也河深而任隄之毁余曰此深河之法也欲淺河以為洲法若何曰反用之耳其法為之固隄令漲可得而踰矣漲衝之不去而又踰其頂漲落則隄復漲急流使之别出而隄外水皆緩固隄之外悉淤為洲矣余試之為茶城之洲為徐邳之河無弗效者故曰以人治人以事處事以將選將以兵練兵治兩河議我國家漕河形勝誠天造地設而有所待者夫自通州以至儀真凡三千里而南旺分水適當其中南由閘抵徐州則㑹黄河至淮安入海而揚州湖水接之以逹于江北由閘抵臨清則㑹衛河至天津入海而通州白沙接之以逹于京南北地里之逺近既侔而水道之接濟亦類雖圖畫亦不能盡其妙誠天下河道第一形勝我聖明億萬載無疆之業也每思兩河修治大要不同竊謂治運河者須治其源而河有體用源乃體也河其用也治黄河者惟治其流而水有常變小則常也大其變也治運河者濬泉導流不少懈惰則體立矣而又挑淺修閘築壩治堤之類其用亦行河其少艱乎治黄河者於水之常遇有泥沙淤塞則用人夫駕船於水中以鐵扒併尖鐵鋤濬之使沙泥隨水而去夫淤塞既除則水得其道自無衝决之患更修築堤岸以禦水之變或䕶城池或防耕種使民得遂其安養而免渰沒之虞則黄河之事可少濟矣今黄河三委一由蘭陽大名山東至蕭縣出徐州一由寧陵夏邑宿州出宿遷一由亳州合渦河㑹淮水出清河三委俱當䟽濬通流以殺水勢第人多狃于俗見惟以瀰漫之勢為言謂黄河為神水不可治要在斷然行之耳若夫今日徐吕二洪則在用黄河之水由蕭縣出者經小浮橋閘河泉水合流共濟焉是其於其要處致力如此嘗考之元史其建國之始江南糧餉或自浙西渉江入淮逆流至中灤陸運至淇門入御河以逹京師或自利津河或開膠萊河入海元建都于燕其漕運自海道浙東西之粟自浙入海江東西之粟自江入海淮東西之粟自淮入海而其得人則有若朱清羅壁之徒至元十九年始至海運二十六年乃鑿渠起安山西南由夀張西北至臨清引汶絶濟直屬漳衛名曰㑹通河盖汶水自古東北入海而以智力導引使南接淮泗北通白衛則自元人始也是時汶渠雖開而海運如故至我朝永樂以來始用守臣之議大濬㑹通以便糧於是江淮一帶萬里通津尺寸之水盡為我國家有矣頃者徐吕吕梁徐州二洪河流斷絶自淮以北不可以舟歳漕重事急如湧泉是可不為之重慮乎今之漕渠北自海口南至漕河二千餘里其間不過汶泗諸流而已必賴黄河之水自西入之而後漕運流通水利深廣故曰黄河南徙國家之福運道之利也丘文莊亦曰江南賦貢之來必由濟博之境則河决不可使之東行一决而東則漕渠乾涸歳運不繼其害非獨在民且移之國矣盖言運道之利必資於河也然河勢播遷靡有定向今或自趙皮寨南向亳泗或復經流徐邳衝决乾涸不常又汶泉遇旱則㣲南旺以淤而狹此漕之害也為今之計法在䟽築而已河有故道徙有決口獨不可因其舊而為之乎其或河流亢悍不可復回則計出於引沁矣沁之源出自綿山向嘗合流於徐而頃為黄河所併要惟自武陟而上導濟源引沁厯曹州由舊分水處出永通閘以逹于二洪可也或謂徐吕二洪黄河南徙盖嘗引沁矣沁流㣲弱不足以濟則如晉謝𤣥之樹柵立埭㙲二岸之流以利漕宋人之開修月河上下置堰増閘以時開閉此又計之不得已者也漕河詳節宋少保禮河南永寧人永樂初治㑹通河先是國朝都金陵餉道悉仰給于南江右湖廣之粟江而至兩浙吳㑹之粟浙河而至鳯泗之粟淮而至河南山東之粟黄河而至而金陵至舟楫之㑹而灌輸焉置餉道弗講永樂中治北京上供百官六軍悉待哺于江南之稲梁永樂初治海運運艘兩浙自浙入於海吳㑹自三江入于海湖廣江西自洋子江入於海淮北河南自河淮入於海山東各以濵海州縣入於海皆㑹直沽逹於天津而懐慶衛輝以其舟順衛河入天津來㑹俱遡白河逆於張家灣輸上都而舟溺亡算計臣曰海道險不可運乃令江南之運皆由髙寳諸湖渡淮逹黄河陸運百七十里入衛河指天津輸上都而車費算計臣曰陸道費不可運少保乃請治㑹通故道顧元末鼎沸不暇治餉事故道廢自汶上至臨清五百里悉為平沙乃究尉遲公之舊迹及元人之遺則自汶之上流唐元為堽城壩遏汶入洸河㑹泗水東南注濟寧濟寧今天井閘尉遲建也以天井之南注淮安以天井之北注天津而南旺地特聳濟寧水上行終元之世第舟載上供數十石耳海運若故少保公患之適有戴村老人白英者獻䇿曰南旺地聳盍分水焉第勿令汶南注洸河北傾坎河導使趨南旺南九十里流於天井北百八十里流於張秋樓船可濟也少保乃造梁窒汶之入洸者大壩戴村遏汶之入坎河者開新渠百十有餘里抵南旺而分注之九年道大通淺船約萬艘載約四百石糧約四百萬石浮閘從徐州至臨清幾九百里直渉虚然為罷海運河成坎河口者其運漕之槖鑰乎旱則止汶以濟漕澇衍則洩汶以全漕石灘天壤俱弊可也後來者時為槖時為鑰有權存焉酌而用之存乎人耳諸閘漕以汶為主而以諸湖輔之若蜀山馬踏南旺安山沙灣諸湖皆輔汶北流者也獨山㣲山昭陽吕孟諸湖皆輔汶南流者也顧汶水㣲於春夏之交而灌輸方盛湖水溢於夏秋之交而運事已竣要在節宣諸湖秋終則悉閉之以待運春終則漸發之以濟運則得之矣閘河原屬人為河身博不踰六丈故水束而深惟自留城以下徃年為黄水所盪漕博至有數十丈者夫以半汶南流而鋪數十丈淺宜然今立小河之法於秋盡水落之候因勢創築縷水小隄以小漕身如平淺則兩旁夾縷之延袤以淺為度大都漕博止六丈隄髙止五尺根四尺頂二丈攔以小椿草夏秋水漲則任其敗水落復脩每千夫日可小二三里漕立小則水立深浮舟俄頃耳此歳功也夏春運盛之時正汶水㣲弱之候南北分流之則不足併流之則有餘特為番休之法如運舸淺於濟寧之間則閉南旺北閘令汶盡南流灌茶城逆舟屯於汶之上源以待北决如運舸淺於東昌之間則閉南旺南閘令汶盡北流灌臨清此役汶全力者也萬厯元年始用此法漕大利南旺脊水也閉諸北閘則南流閉諸南閘則北流水如人意者莫如汶故命之左則左灌濟寧命之右則右灌臨清萬厯元年臨清稍滯運余以尾入幫南旺閉之南閘令全汶趨臨清一日而出板閘者七百十日而出運艘六千有竒此所謂役水者也漕河十月徴税十一月兑軍十二月開幫次年二月過淮三月四月過徐州洪入閘今之令萬全之䇿也黄河中河道助夫輓運以二旬而渡河則粒米皆太倉有矣閘漕與河接若河下而易傾則萃漕船塞閘河之口數重閘水為船所扼不得急奔則停廻即深留一口牽而上遞相為塞障而擁水也命曰船隄是以船治船者也閘漕下流通河者必流一淺長數丈戒勿濬以蓄上流諸淺見矣此以淺治淺也閘漕一里藉令舟漕可容九十艘舊制魚貫三十艘而過之余令之九十艘盈漕焉漕盈則水溢且上閘之水不得直遂也而善停蓄水可逆灌上閘矣每啓踰九十艘閘人大駭此以漕治漕者也白河天津至通州凢五十九淺夫以濬淺有隄夫築隄百八十年隄夫猶故也而以淺夫為引舟夫者誤余為之復舊制云治漕有八因河之未泛而北運因河之未凍而南還因風之南北為運期因河之順流為運道因河安則修隄以固本因河危則塞决以治標因冬春則沿隄以修因夏秋則據隄以守是謂八因有三策四月方終舟悉入閘夏秋之際河復安流上策也運艘入閘國制無虞黄水齧隄隨缺隨補中策也夏秋水發運舸渡河漕既愆期河無全算斯血策矣是謂三策漕河事宜竊惟今之語治河者其説有二主防運河者則以隄必亟築主順水性者則以隄必勿築臣以為古之治河者求以去河之害而已縱其性而順下焉則無事矣勿築誠是也今則不惟去河之害而復欲資河之利萬一縱其性之所之如昔年河决張秋東注于海則今運道悉為平陸雖欲勿築不可得也故禦盗必資夫城守禦河必藉夫隄防但河東趨則順其性而為之東隄不可激之使西河南徙則順其性而為之南隄不可障之使北隄逺河則所匯者廣可使安流隄近河則所容者隘必致激搏尋常水漲隄有全功異常水災隄無勝算此河隄之大較也河道流動譬之人身清河以下其尾閭也邳宿之間其水道也徐吕之間其肚腹也旁流既多正道自塞是以有邳河之淤水道既湮肚腹自漲是以有徐州之患故清河之流迅則邳宿之道自通而徐州之患自减此運河之大較也修築長隄必頼夫力然白夫不如徭夫徭夫不如募夫白夫者州縣借𣲖之夫未行則有幫貼安家之苦既行則有徃返之勞在役則有支給飯食之費且騷百姓竭民事河臣所憂有大於河者徭夫者定編舖淺閘溜之夫相沿已久官民俱安募夫者雇募貧困之民損官而不擾民工作而寓賑濟民心既樂用力尤勤大率白夫除幫貼安家外官復給之飯食徭夫除編僉工食外官復給之犒賞皆有重複費用若募夫則每工給官銀四分始量力而分工終計工而受食應補給者補給應扣除者扣除伹不失信即可子來故白夫不如徭夫徭夫不如募夫此徭夫之大較也修𤓰洲閘議照𤓰洲為運道咽喉而下江等總歳運漕儲貳百萬石咸必由之一向建設土壩凢江北之空船南兑必掣壩以出江南之重船北運必盤壩以入運船有靠損之虞盤剥有脚價之費停泊江濵有風濤之患船隻輻輳有守候之苦諸臣累次建白該部累次題覆欲於花園港瀦市等處建閘慎嚴啓閉俾運艘徃來直逹江滸委屬利便而竟格不得行者徒以本鎮壟斷之徒欲牟大利每假走洩水利為辭查得儀真亦近大江國初亦設土壩後因車盤不便𢎞治年間改建閘座迄今上江漕運便不可言且髙寳諸湖之水歳以瀰漫决隄為患未聞以走洩涸竭為患也况國家之事未有全利而無害者惟擇其利多而害少者為之今閘成之後漕舟通利若履平地一便盡免車盤船無靠損二便隨到隨過風波無虞三便閘座既通髙寳諸湖水有䟽洩不致敗隄四便閘道通行商舶雲集市㕓交易水陸必至五便夫愚民不可慮始國計亟宜逺圖茍有利於漕儲少不利於百姓即所謂利多而害少者尚為之也而况官民俱便有利而無害者乎議得防河既如防冦則守隄當如守邉故有隄不守與無隄同守隄不宻與無守同先年河南累被河患大為隄防今數十年幸獲安堵者則防守嚴而備禦素也諺云河决夜豈誠如漢人隂氣盛則河多决穿鑿附㑹云爾哉徒以人力晝則防而夜則懈故河不决於所防而决於所懈耳夫河南運道上源也猶然晝夜防守而後得數十年之安而况徐邳為糧運正道既多方以隄之可不多方以守之乎臣等同總督漕運都御史王宗沭廵按直𨽻御史王應吉儹運御史張憲翔廵塩御史張守約備勘前隄聨絡即以去年水漲為凖尚髙五尺若使尋常水泛僅及隄根但令河安則沿隄以修河危則據隄以守修時即守守時即修人力日加綿宻隄防歳加髙厚則徐邳運道似可久安夫千里之隄潰於蟻穴言貴守也一議定期夫號令一則觀聽明期限嚴則心志定查得各邉事例以七月十五日上邉十月十五日下邉期限定如四時號令堅如金石九邉聨屬萬里響應法至詳宻也今守隄法制悉備宜照上邉事例行之查得黄河二月則有桃花水三月則有清明水四月則有麥黄水然小者瀰灘大亦平岸若遽議令上隄既妨挑濬築塞之功又率民力於無所休息之地非計之得者也應以伏秋水至百川灌河之時為候各夫悉以五月十五日上隄九月十五日下隄其携有室家不願下隄者聽夫在隄者享完聚之安則上隄者得炊爨之便河即泛溢吾不患於無守即不泛溢亦不失其所以為修肆閲月間修守兼施上下如法人力不困而功成工食不加而事集似為長便停開泇河親詣該勘地方逐一踏勘先自徐沛吕梁邳州以至直河口次自直河周湖柳湖以至泇河口良城侯家灣彭河葛墟嶺馬家橋復自葛墟嶺以下一帶該桃河兩岸各六七里以至直河口徃返數四左右旁求勘得地里東西相去計長二百五十餘里委比黄河長三百里者不惟可以避徐吕之險抑且得㨗徑之利兼之中間原有河形間亦可舟雖淪漣於周柳蛤鰻土山距山連汪吕孟等湖然障水築堤未盡不便雖横射於十里泉黄河溝雙溝沂河營河成子諸河然打壩建閘未盡稱難創議渠漕誠為有見但自馬家橋量至葛墟嶺相距三十里中間吕孟湖水週圍七十餘里接連㣲山湖赤山湖陵溝橋金溝泉關橋河玉花泉諸泉俱由薛河流入此湖其水停蓄瀠廻終難注㵼以便築隄又據鄉民張世禄等呈稱夏秋山水泛漲衝蕩激射勢甚洶湧可虞又勘得葛墟嶺與馬家橋河底相較原量髙六丈一尺或五丈二三足不等今於嶺頂先次掘處迤西另穵一工自四月初七日起至十五日止前後共用過夫匠八百三十四工給過工食銀二十五兩二分掘開南北長一十五丈除兩斜坡實長六丈闢一丈八尺七寸深二丈四尺以下錐探俱係礓石難掘果有泉水湧出且此嶺非係孤岡陡起實漫從遠處積髙迤東量至曹兒莊天齊廟計長二十里俱屬髙坡逈無河勢盡鑿深四五丈不等且地脉相通礓沙無異今有原試二十餘井可照又自嶺西南馬山旁張莊湖邉利國驛郝家莊由中心溝亦可逹曹兒莊南湖内河流計長三十餘里但道既廻逺地復濵山雖有溝形中多斷續又自曹兒莊東踰大房嶺棗兒莊小房嶺萬家莊彭河韓家莊過臺兒莊至侯家灣共長六十餘里自棗兒莊以下俱有河形但兩岸寛窄不一河底深淺不等水流斷續不常其夾岸土石不為赤礓之堅確難掘即係黒沙之散漫難築固已號稱不易然較之侯家灣良城之積石此猶土礓之易為者若侯家灣至郭家林岔河口李家道口良城橋至馬蹄灣水静溝抵泇河橋共計長二十餘里水雖順流但侯家灣良城水静溝岔河口等處間多大石皆横亘河底巉巗河外試鑿數處寸斷惟艱隨於良城迤西南北兩岸各離五六十丈或百餘丈挑試三井俱長濶一丈或八九尺掘深方與河平輙遇大石不下又於侯家灣南并郭家林北亦共挑試三井各長一丈五六尺濶一丈三尺或八九尺不等掘深二丈三四尺不測與水平俱有大石截底自四月初一日起至初六日止前後六井共用過夫匠二百零四工給過工食銀六兩一錢二分意欲遵依移於六七里外另道開穵奈左右去山愈近則伏石愈多委難䟽鑿又自泇口橋由譚家園瓦子埠齊家杲家嚴家宋家等莊以至直河口共計長一百三十餘里中貫諸湖固沙淤衝射之可虞幸底鮮伏石無開礓鑿石之大苦用工濬築似亦成漕尚可虞者周柳二湖地勢卑窪取土獨難議者又欲開泇口由隅頭集以出直河共長九十餘里併力開挑或逺諸湖尚可慮者泇南一帶地勢直下停蓄不易是豈可輕議哉大約馬家橋水從此入者也其道有二一由葛墟嶺一由利國驛皆㑹曹兒莊而東然葛墟嶺止礓土猶未易鑿也矧利國驛林頭村之伏石乎直河口水從此出者也其道亦有二一由周桞湖一由隅頭集皆接泇口鎮上流然周柳湖隄岸尚不易築也矧泇口鎮隅頭集之開鑿乎縱利國驛隅頭集為可開周柳湖葛墟嶺為可避至如中間良城侯家灣等處中阻伏石無從宛轉旁逼諸山莫可遷就卒難成功等因到司據此猶恐不的覆該兩司㑹同各道逐一踏勘與各官大約相同㑹議得厯查黄河之徙決惟在沛縣飛雲橋以南邳州以北徐吕二洪上下之間今自馬家橋以至直河口開通運道不惟可避二洪之險實可暫免河決之患但葛墟嶺良城侯家灣地形髙者有徹水鑿石之艱吕孟周桞諸湖地勢汙者有運土築堤之苦羣議畢集無容復贅且一興大工所費不貲即今公私匱乏財用不敷而差賦日繁民力愈竭况西自葛墟嶺東至臺兒莊約七十餘里南北相去約三十餘里俱係嶧縣地方連漕水潦居民逃徙十已六七職等驅馳竟日杳無人煙停訛缺之地即欲興工動衆時勢委難合無候呈允日俯賜題覆停寢前工以紓民困庶財力不致徒費而地方得以少息矣漕河合一竊照漕運河道原屬一體今承大壊極弊救急補偏竭盡心思僅獲早運疲瘁精力始盡回空然倉皇之秋未暇酌議漕臣言漕河臣言河靡通條貫血􅍺未融夫言漕而不言河是進飲食而不理脾胃者也言河而不言漕是理脾胃而不進飲食者也來年全運比之今年多糧一百萬石多船二十餘艘而又比今年少一開月此誠危急遲速之秋也若不早圖噬臍何及臣謹㑹同漕運都御史王宗沭酌議漕河合一事宜條為四欵開具上聞濬淺縷堤國家相傳治河之策不過濬淺以防淤塞築堤以防潰决舎此之外别無策矣然濬淺有二法有漕河黄河之淺有二水交㑹之淺濬漕黄者或逼水而衝或引水而避此以人力勝之者也乃濬二水交㑹之淺則不然如黄水與閘水相㑹則在茶城與淮水相㑹則在清河茶城清河之淺無歳無之良以二水互為勝負黄河水勝則壅塞而淤及其消也淮漕水勝則衝沙而通要之人力居二三而水力居其七八此濬淺之大槩也築堤亦有二法有截水之堤有縷水之堤截水之隄可閒施於閘河而不可施於黄河盖黄河負悍湍之性挾川潦之勢投之所向何堅不瑕乃欲以一堤當之此鯀之所以方命而宋人之所以耗財也乃若縷水之堤則河自宋以來由淮逹海我朝資之為運故於兩岸築隄者正不使其從旁潰溢始得遂其潤水入海之性非若戰國之疆界彼此趙障之而入梁宋障之而入齊避害於國而委壑於鄰亦非若宋人之畿輔濵河河趨東則排之使西趨西則排之使東及其末季倡為回河之説乃欲以人力勝水性盖皆拂之而非順之也昔禹之治水非任水之所之其决其䟽其排其瀹皆自人力治之特以順為治故曰行所無事國家縷水長堤實存大禹遺智故百六七十年頼藉而不變者以此要之可縷水而不可截水此築隄之大槩也查得清河之淺每歳有之應照茶城行南河分司督同管河通判帶領官夫器具遇黄河水漲落之時穵挑河溝導令淮水衝刷則雖遇漲而淤必遇落而通抑何妨於舟楫之利渉惟清江浦之水勢最弱而出口處所適與黄水相值比因聽許民船由閘徃來不閉遂至沙淤而閘身卑矮水每溢過科臣所謂外水平髙閘座脊沒汪然巨浸盡成濁流盖得於目擊者既有妨於運道復貽患於淮郡誠當議處至於海口訪自隆慶三年海嘯之後壅水倒灌低窪之地積瀦難洩御史所謂河潦内出海潮逆流停蓄奠聚愈壅愈溢盖亦得於目擊者今看得前水亦已消涸居民云據今所見與二年之前逈異海中雖有沙灘離海口之二十餘里土人稱係古跡亦無積石淺堵給事中謂不必加功不能加工二言蔽之矣創復諸閘惟善治者宜永其法於不匱謀國者當通其變於未窮比年黄河横流運道艱阻朝臣拊髀而太息河臣蓬累而奔馳淮水之南棄焉不講盖淮南之運道盡壊矣祖宗之初制盡失矣非當事者故棄淮南也智窮於閘道力竭於黄河其不得不棄淮南者勢也臣以上年十一月浮河淮厯髙寳諸湖以逹於𤓰儀逺覽遐思可為流涕夫髙寳諸湖周廻數百里西受天長七十餘河秋水灌湖徒恃百里長堤若障之使無䟽洩是潰隄也以故祖宗之法徧置數十小閘於長堤之間又為之令曰但許深湖不許髙堤是故以淺船淺夫取河之淤厚湖之堤夫閘多則水易落而堤固濬勤則湖愈深而隄厚意至深逺也比年畏修閘之勞每壊一閘即堙一閘歳月既久諸閘盡堙而長堤為死障矣若畏濬淺之苦每湖淺一尺則加隄一尺歳月既久湖水擁起而髙寳為盂城矣循此安窮此豈可不為寒心哉臣是以有復諸閘復淺船淺夫之議諸閘欲宻欲狹欲平閘宻則水䟽亡脹悶之患狹則勢緩無衝擊之虞平則湖溢耶水從上透湖即涸耶閘底截住亡起閉之勞髙寳興化諸州縣亡潰隄昏墊之苦此祖宗之法所當議復者一也淮安清江浦河六十里先臣陳瑄濬至天妃祠東其口决而至於黄河運艘出天妃口入黄河穿清河半餉耳嗣縁黄河水漲則逆注入天妃口而清江浦多淤第開天妃口可也議臣乃塞天妃口令淮水勿與黄水值而費十餘萬開新河創通濟閘以北接淮河其説曰接清流勿接濁流可不淤不知黄河非安流之水也伏秋盛發則西擁淮流數十里併灌新開河彼天妃口一黄水之淤耳今淮黄㑹於新開河口是二淤也夫防一淤生二淤又生淮黄交㑹之淺歳役丁夫千百隨濬水過隨合而又使運艘迂八百里淺滯而始逹於清河孰與出天妃口者便且利今年黄淮交㑹太淺運艘阻梗臣預開天妃口河以待一掘而通之四日而出南船四千二百艘于黄河運道盡矣臣是以有建天妃閘之議盖今早運之期黄水正落由清江浦啟天妃閘順出黄河既無淺阻又免挑濬漕船魚貫直逹清河運盡黄水盛發則閉天妃閘謝絶黄水彼河雖善淤安所假道而犯及清江浦哉黄水一落又啟天妃閘以利商舶新河口勿濬可也勿用可也坐省年年淮黄交㑹挑濬之憂足補陳瑄之所未備此祖宗之法所當議補者二也由黄河入閘河為茶城出臨清板閘七百餘里舊有七十二淺自創開新河汶流平衍地勢無復髙下相懸七十淺悉為通渠斯萬世之利也惟茶黄交㑹之間運盛之時正值黄河水落之候髙下不相接則相失而相傾是以有茶城黄家閘之淺連年患之祖宗時建有境山閘今自新河水平閘沒泥淖中幾丈餘棄不復用臣於茶城為之西隄束水急衝而茶城不淺茶城之上為之四活閘束水急衝而黄家閘不淺然非久計也臣是以有復境山之議境山閘上距黄家閘二十里下接茶城十里而基故在今特於故基之上累石而為之工費可省七分之五夫此閘成則既可以留黄家閘外二十里之上流又可以接茶城内十里之下流而又挾二十里之水勢衝十里之狹流蔑不勝矣何徒苦丁夫之挑濬運船之盤剥為此祖宗之法所當議復者三也是皆臣也便宜事行者也但念善始者不必善終若不仰仗皇上威嚴垂諸令典則作者之志久而或湮述者之心逺而或怠將使臣今日之流涕者便後人之復流涕矣請復淺船事莫善於法祖法莫病於因循今年之運既得以善其終明年之運又不可以不䖍其始臣於三月二十二日艤舟黄家閘四月初三日移泊茶城初五日移入徐州憑艦而觀之則運卒如雲操舟如雨南風拂拂既得天時河流㴞㴞又得地利數千里糧運夜行無盗警又恊人和快心暢意逺慮深懐未嘗不欣然仰歎祖制之善又未嘗不蹙然痛悼今時之弊也敢根極為皇上陳之夫祖宗以四百萬之漕糧免近萬之淺船又令每船止約四百餘石僅半載焉既為有餘之船又為不盡之載豈不知滿載省舟之為便而為是經年造舟紛紛者以閘河故也夫七省之粟使盡渉江踰淮厯黄河則長江大河巨艦滿載奚不可者奈㑹通河因元之舊元人𨗳汶入洸出濟寧分水焉而陽榖汶上東平之間地髙於濟寧故南旺之間倒行而逆施之水淺膠舟即運亦每舟十數石耳不足餉上都議海運開賈魯河而元人竟困於餉道國朝雖因㑹通河之舊然不令汶水入洸出濟寧而𨗳汶西南注南旺南旺者運河之脊也又得全汶之利故每舟可運四百石然夏旱則汶流㣲又不敢過四百石特為淺船之制其制底甚平而倉甚淺夫底平則入水不深倉淺則負載不滿又為之限曰淺船用閘水不得過六拏六拏者三尺也祖制之善何如哉而今變矣船漸少矣各省不務足淺船而務雇民船不務遵原運而務搭原運雇船有三害民船底尖入水深而易膠牽挽不前一害運官勒掯水脚携妻子泣告者踵踵矣累及民船二害一民船膠則干淺船皆阻閘漕不能速進三害此雇船之病河道也搭運有五害今年全運四百萬石江南糧多船少則搭三十石五十石甚至一百石彼倉淺去水甚近江河巨浪壓之即沉徃徃見告矣一害以十卒而挽四百石猶懼不勝今挽五百石其艱苦若之何二害搭運重則淺船入水有至八拏以上者臣熟察之亡有六拏舊制矣是困河道也三害搭運多即幸不膠抵灣必遲安能早運四害抵灣遲必回空遲直守凍耳胡以待新運五害此搭運之病河道也今時之弊何如哉而今年竟利者悉頼皇上主持諸臣竭力或預大挑之法或灘坎河之口或括山東之泉或發諸湖之水或察風色或候泉流故茶城溜溝魚脊梁黄家閘上水諸淺深皆四尺至七尺天旱水枯之時幸不敗事然亦竭澤而漁非全算也若不早圖此坐困之術耳而或者曰白糧以民長船運千石以上不苦獨奈何苦雇船搭運哉臣以為長船之運甚遲每候六七月間秋水時至直以九月十月抵灣彼不回空亡慮守凍明年又有長船雇矣豈若淺船有一回空則足一船之運有一阻凍則少一船之運者胡可一律語也伏乞皇上敕下該部勿以目前之幸濟而忽逺圖勿循今時之弊端而廢祖制足四百萬之額船載四百萬之額糧盡復入水不過六拏之舊制令船力勝水力水力勝船力其雇船搭運坐困之弊一切痛革夫造船之費與沉溺之患孰多滯運之害與快運之利孰便祖宗之法與今時之弊孰善伏惟皇上留神則河道幸甚國計幸甚造船管造運船大肆侵漁釘稀板薄欲船堅久不可得也十三把總徒寄空名刻剥尤甚指揮千户百户吏書皆肆侵漁欲軍不窮不可得也把總皆畫船運船乃破船欲米不浥爛不可得也把總船過牐撥運軍為助運船漫不如意欲船不漂沉不可得也至京費又取于軍矣故免運多取糧長糧長多取細民民窮起而為盜盜起必用兵用兵必費財故造船須堅把總須革軍士須行畨休之法須差主事提督河路驗視船隻可也又差主事數員代把總管發運上納可也又聽三堂考察之科道紏彈之可也運軍例帶隨船器械每年過淮三堂教閲之常例賞軍銀就教閲時賞彼得實惠威武因之奮掦如此久習運軍皆精兵也奚至徃年流賊刼掠焚燒之禍哉竊見河道通塞不常臨清德州去邉實近不可不講海運之法以防意外之虞也漕河總叙國朝黄河入運洪武元年河决曹州從雙河口入魚臺大將軍徐逹開塌塲口入於泗以通運時戴村未壩汶由坎河注海運阻故引河入塌塲以濟之二十四年河决陽武東南由陳潁入淮而元故㑹通河悉淤永樂九年以濟寧同知潘叔正言命尚書宋禮役丁夫一十六萬五千濬㑹通河乃開新河自汶上縣袁家口左陟二十里至夀昌之沙灣接舊河九閲月而成侍郎金純從汴城金龍口下逹塌塲口經二洪南入淮漕事定為罷海運正統十三年河决滎陽衝張秋尚書石璞侍郎王永和都御史王文相繼塞之弗績景泰四年都御史孫有貞役丁夫五萬八千作九堰八閘以制水勢塞之凡十有八月而成𢎞治三年河决原武支流為三一决封丘金龍口漫祥符下曹濮衝張秋長堤一出中牟下尉氏一汜濫儀封考城歸德入于宿遷以布政使徐恪言命侍郎白昂役丁夫二十五萬塞之𢎞治五年復决金龍口潰黄陵岡再犯張秋侍郎陳政治之弗績六年訛言沸騰有云河不可治宜復海運有云陸運雖費餉事亦辦朝議弗之是也乃命都御史劉大夏平江伯陳鋭役丁夫十三萬有竒一濬蘇家渡口開新河道水南行由中牟至潁州東入於淮一濬四府營淤河由陳留至歸德分為二𣲖一由宿遷小河口入淮一由亳州渦河入淮分土命工始塞張秋二年告成自是河南歳計河工矣正德四年河東决曹縣楊家口趨沛縣之飛雲橋入運患之工部侍郎崔巖役丁四萬二千有竒塞垂成暴漲之潰巖以憂去侍郎李鏜代之四月弗績盗起而罷七年都御史劉愷築大堤自魏家灣至雙堌集亘八十餘里都御史趙璜又堤三十里績之嘉靖六年河決曹單城武楊家口梁靖口吳士舉莊衝雞鳴臺七年淤廟道口三十里都御史盛應期開趙皮寨白河諸支流殺水勢役丁夫五萬八千三月而成乃議開夏村新河役夫九萬八千閲月朝議不一罷之八年飛雲橋之水北徙魚臺谷亭舟行閘靣九年由單縣侯家林决塌塲口衝谷亭十一年十二年水竟不耗十三年廟道口淤都御史劉天和役丁夫一十四萬三千九百九十四濬之四月始成而忽由趙皮寨向亳泗俄驟溢而東回梁靖口漸奔坌河口東出谷亭之流遂絶運河淤二洪阻涸秋冬忽自河南夏邑縣大丘四村諸集攻開數口轉向東北流經蕭縣城之南仍出徐州小浮橋下濟二洪趙皮寨俄塞十九年决野雞岡由渦河經亳州入淮二洪大涸兵部侍郎王以旂開李景髙支河一道引水出徐洪濟役丁夫七萬有竒八月而成尋淤二十六年决曹縣衝亭運河不淤三十二年决房村約淤三十里都御史曽鈞役丁夫五萬六千有竒濬之二月而成三十七年新集淤七月忽向東北衝成大河而新集河由曹縣循夏邑丁家道司家道出蕭縣薊門由小浮橋入洪七月七月淤凡二百五十餘里趨東北走叚家口析為六股曰大溜溝小溜溝秦溝濁河胭脂溝飛雲橋俱由運河至徐洪又分一股由碭山堅城集下郭貫樓又析五小股為龍溝母河梁樓溝楊氏溝胡店溝亦由小浮橋㑹徐洪河分為十一流遂不淤然分多則水力弱水力弱則并淤之幾也四十年七月河果大淤郭貫樓淤平全逆行自沙河至徐州俱入北股至漕縣崇朴集而下北向分二股内南之一遶沛縣戚山徐州楊家集入秦溝至徐州北一遶豐縣華山北又分二股南之一自華山東馬村集漫入秦溝接大小溜濫入運河逹徐北一大股自華山向東北由三教堂出飛雲橋而又分十三股或横截或逆流入漕河至胡陵城口漫散胡坡逹徐從沙河至二洪浩𣺌無際而河變極矣八月少保尚書朱衡乃請開盛應期新河濬流留城舊河同都御史潘季馴開新河自南陽逹留城一百四十一里有竒濬舊河自留城逹境山五十三里有竒役丁夫九萬一千八閲月而成七月河復決沛縣衝運河而運河亦由胡陵城口入湖坡九月馬家橋堤成水始南趨秦溝冬沛流遂斷隆慶元年正月河南衝濁河雞𤓰溝入洪二年專由秦溝入河而河南北諸支河悉併秦溝三年四年河大漲徐州上下悉為巨浸舟行梁山之麓而茶城至吕梁兩岸為山所束不得下又不得決五年乃自雙溝而下北決由房口曹房口青羊口南決關家口曲頭集口馬家淺口閻張家擺渡口王家口房家口白浪淺口凡十一口枝流既散幹流遂㣲乃淤自匙頭灣八十里而河變又極矣議者欲棄幹河而行舟於曲頭集大枝間冬初水落則幹已平沙而枝復阻淺損漕舟千有竒則又議棄黄河運而膠河泇河海運紛沓焉莫可歸一都御史潘季馴乃役丁夫五萬開匙頭灣僅僅一溝遂塞十一口併衝溝溝大流導而八十里之故道漸復明年議大堤兩岸北堤起磨臍溝迄邳州之直河南堤起離林舖迄宿遷之小河口六年二月少保尚書朱衡兵部侍郎萬恭至悉罷膠泇之議而一意事徐邳河役丁夫五萬有竒分工畫地而築之夏四月兩堤成各延袤三百七十里始列舖布夫議修如河南山東黄河例河乃安運通萬厯元年運又大通議始定夫黄河有幹有枝嘉靖四十四年以前析十一枝上流而復歸於徐州之幹河故幹通而枝淤隆慶五年以前析十一枝上決而不歸于邳州之幹河故枝通而幹淤若植木焉枝榮則幹瘁幹榮則枝瘁與其瘁幹孰若瘁枝治河者與其枝通孰若幹通故黄河合流防守為難然運之利也國家全藉河運徃事鏡之何嘗一年廢修守哉或者欲分河以苟免修守之勞而不欲事堤以圖永餉道之利又不虞河分之易淤隄廢之易決其未逹祖宗之所以事河與河之所以利運者余故備著於篇大智者採擇焉治河大要總考賈讓治河三䇿隄防之作近起戰國齊與趙魏以河為境齊地卑下作堤去河二十五里雖非其正水尚有所遊盪時至而去則填淤肥美民耕田之或久無害稍築室宅排水澤而居之湛溺固其宜也今隄防陿者去水數百歩逺者數里此皆前世所排也今行上䇿徙冀州之民當水衝者放河北入海此功一立河定民安千載無患謂之上䇿若廼多穿漕渠旱則開東方下水溉冀州水則開西方髙門分河流富國安民興利除害支數百嵗謂之中䇿若繕完故隄増卑倍薄勞費無已數逢其害此最下䇿也歐陽修曰河本泥沙無不淤之理淤常先下流下流淤髙水行漸壅乃決上流之低處此勢之常也然避髙就下水之本性故河流已棄之道自古難復是則決河非不能力塞故道非不能力復所復不久終必決於上流者由故道淤而水不能行故也智者之於事有所不能必則較其利害之輕重擇其害少者而為之猶愈害多而利少歐陽𤣥至正河防記治河一也有疏有濬有塞三者異焉釃河之流因而導之謂之疏去河之淤因而深之謂之濬抑河之暴因而扼之謂之塞疏濬之别有四曰生地曰故道曰河身曰減水河生地有直有紆因直而鑿之故道有髙有卑髙者平之趨卑髙卑相就則髙不壅卑不瀦慮夫壅生潰瀦生湮也河深者水雖通行身有廣狹狹難受水水溢悍故狹者以計闢之廣難為㟁㟁善崩故廣者以計禦之減水河者水放曠則以制其狂水隳突則以殺其怒治隄一也有剏築修築補築之名有剌水隄有截河隄有䕶岸隄有縷水隄有石船隄治埽一也有岸埽水埽有龍馬攔頭馬頭等埽其為埽臺及推捲牽制薶掛之法有用土用石用鐵用草用木用栰用絙之方塞河一也有缺口有豁口有龍口缺口者已成川豁口者舊常為水所豁水退則口下於隄水漲則溢出於口龍口者水之所㑹自新河入故道之源也曰折者用古算法因此推彼知其勢之低昻相因相凖折而取匀停也宋濂曰夫以數千里湍悍難治之河而欲使一淮以疏其怒勢萬萬無此理也分其半水使之北流以殺其力河之患可平矣譬猶百人為隊則力全莫敢與爭若分為十則頓損又各分為一則全屈矣治河之要孰踰於此胡子曰兹論固然然又當因勢否則宋人囘河之患可鑒已劉天和曰河之水至則衝決退則淤填而廢壊閘座衝廣河身阻隔泉源害豈小耶前此張秋之決廟道口之淤新河之役今兹數百里之淤可鑒已議者有引狼兵以除内㓂之喻真名言也故先朝宋司空禮陳平江瑄之經理亦惟導汶建閘不復引河且於北岸築堤捲埽嵗費億計防河北徙如防㓂盜然百餘年來縱遇旱涸亦不盤剥寄頓及抵京稍遲爾未始有壅塞不通之患也惟汶泉之流遇旱則㣲匯水諸湖以淤而狹引河之議或亦慮此然國計所繫當圖萬全無已吾寧引沁之為愈爾盖勞費正藝而限以斗門澇則縱之俾南入河旱則約之俾東入運易於節制之為萬全也若徐吕二洪而下必資河水之入而後深廣惟當時疏濬慎防禦相髙下順逆之宜酌緩急輕重之勢因其所向而利導之爾兩河修治大要不同治運河者須治其源而河有體用源乃體也河其用也治黄河者惟治其流而水有常變小則常也大其變也斯言實國家治河要義彼宋元竭民事河卒無成績所以為無䇿之甚也若謂沛縣水患可憫但河流經行不在豐沛則在蕭碭即開新集龎家屯等處不過移沛縣之患於蕭碭之間去嵗勘議之初蕭碭方脱水患之民嗷嗷惶怖不忍見聞况今沛縣四圍漸已淤髙詢之土人皆謂一二年間水必他徙似不宜以一邑之故動列省三十餘萬之衆費三百餘萬之資以徼不可必成之功而貽有害無益之悔也所謂欲開舊河者其説有二一則開新集由浮橋出徐吕二洪免黄河北徙之勢此以黄河舊河言也臣度之自新集至浮橋一百六十餘里不知該幾百萬銀錢糧無處一難也夫取資黄河不過為濟二洪之險今於二洪無礙即其北徙害在地方不在河道似不必更興不急之工二難也是黄河舊河不必議也一則以南陽等閘至湖陵城等處即今堅硬可鑿此以運河舊河言也臣度之黄河北徙之勢未艾也即今開鑿能保其不再衝乎此一難也再新河費四十餘萬銀役幾十萬夫死於工作者幾百十人命僅成此河又欲舍此而他圖則前項工費皆成無用矣此二難也且府庫既虚民力已竭再行用之勞傷之下必有他變此三難也是運河舊河不必議也至所謂新河不可行者其説有三一則馬家橋易淺一則沙河易淤一則薛河易衝謂之三難臣愚以為此三者其委也但在因地修補隨時救治臣不謂難臣之所謂難者則其源也夫新河與青原山相近而兖州以南費嶧鄒滕四縣之水實注焉夫以一堤而障四縣之水又當大山瀉下之勢必不能支且其地水利素不疏通每遇陰雨彌望白水遍地成湖若不尋其源分其流則自濟寧至南陽至秦溝無處不可衝決不特三河口一口為然也臣愚以為善治水者不與水爭水有所歸流行無滯必有分殺之處則不至於暴溢大都順其勢而利導之耳即今河工已成宜急為疏濬分殺之謀又夏村一帯地形稍髙非薛河之水又不足以濟運道臣愚以為薛河上流須别濬支河以分其勢至於三河口鮎魚泉等口對過之處鑿開大口令其順流西去仍於下流百步外再築一矮隄或為湖為塘髙六七尺仍作一水閘水溢則任其西流水淺則所蓄之水以資運舟其上流低窪之處亦因其勢捲埽為湖以為停水之所多置放水閘以為開閉之具夫有處以分其流則水自不至暴溢不暴溢則自不至衝決自不至淤淺而所謂三難者可免矣又多方處置蓄水之所以為運舟之資則既去其害又取其利雖未遽為經久之計而亦不失為一時之便其開鑿舊河二説俟財力充足之時為之未為不可也國家運河漕東南之粟以實京師自臨清而北徐州而南悉資衛淮諸水惟徐州至臨清一帯閘河則藉山東泉水然與黄河相近故多衝決之患𢎞治以前決在河南正徳以後決在徐沛查自嘉靖四十五年之間沛縣被決凡八次矣而未有如四十四年之甚者盖縁沛縣舊河積沙為岸而其東昭陽湖地勢卑窪黄水乗虚就下自西奔入昭陽湖必先横截舊河而始成抵於湖水過沙停不數年必一淤者勢固然也自築馬家橋隄成而沛縣之流遂斷沛縣斷流而秦溝濁河之勢日盛即今徐沛一望盡是髙地舊河河身淤深宜稻方數百里魚鼈之區皆變為桑麻之地矣臣又慮留城至舊山係黄水故道乃築東堤五十餘里為障禦計則黄水可無壅塞之虞又建復黄家閘則泉水有所節宣亦無膠淺之患二年間新舊相接水流充滿舟楫通行惟薛沙二河亦嘗慮其伏漲衝突方興工分殺其勢工未及就而水已至矣是以有去夏之患然臣思之運河之患患在黄河彼其排山倒海之勢經年累嵗之害來則難禦去則必淤若山水則乍盈乍消涸可立待或一嵗而再至或數嵗而一見此可以人力勝者也今皆在於上源改水在薛河則於東邵王家口各開支河築厚壩三道引水經赤山㣲山吕孟等三湖從地浜溝下徐在沙河於黄甫開支河經趙溝歸獨山湖南建減水閘一十三座洩出昭陽湖而又於翟家口宋家口楊家口杜家口各開支河築厚壩二道以防末流引之而入甄家窪尹家湖而歸於印馬池等處是沙河薛河之水俱有歸宿又何衝突之足患乎治河説治河之䇿大約不過數説或築堤以塞之或開渠以疏之或築堤落而下以石或聽其自決以觀其勢或欲徙民居放河入海或欲穿水門以殺水勢或欲空流所注之地或欲尋九河故道而立文莊則云古今言治河者莫出於賈讓三䇿而其治之之術又莫出于賈魯之三法盖謂二賈不失禹意也然以今之勢與今之時考之則讓之䇿不可行魯之法亦不行矣尋禹故道放河入海讓所謂上䇿今挽河而北則運道將置之乎據堅地開水門讓所謂中䇿今自雍西建瓴而下所經冀兖淮獨安所擇堅地乎水門在在如是多與河流不相直安所分水勢乎増築隄防讓所謂下䇿今中州而下徐沛而下堤更善瑕烏在約攔水勢乎廼魯之三法當事者踵行之殺河之流因而深之之謂疏也嵗用疏法而河流未嘗殺矣去河之淤因而深之之謂濬也嵗用濬法而旋通旋壅矣抑河之暴因而扼之之謂塞也嵗用塞決口而暴溢如故矣治而覩明效者暫也不治而治安瀾者幸也二百二十年于兹封事朝夕上曽有出此三者而建必然之畫乎亦曾有行此三者而享一再世之利乎故丘文莊又謂賈讓諸人皆隨時制宜之䇿今日未必皆便惟元時去今未逺地勢物力大叚相似宜今河南潘憲每年循行並河郡縣如尚文所建之策元大徳中時河決紀縣浦口文議不塞便相地所宜或築長垣以禦泛濫或開淤塞以通束隘從民所便或遷村落以避衝潰或給退灘以償所失如此雖不能使沿河州郡百年無害而避患居民亦可漸蘇息矣六漕治法綜之為六漕自潞河順天津為白漕不宜治自天津逆臨清為衛漕不必治自臨清逆南旺又自南旺順出茶城為閘漕宜少治自茶城順流睢陽為河漕宜數治自睢陽踰髙寶連𤓰儀為河漕宜亟治自𤓰州渡長江入京口以入于杭為浙漕宜間治夫白漕從宻雲而南下霽十日則平沙彌河雨一日則泛運卒急則挽舟又急則直易舟耳其節短不病運故其法治之以不宜治也衛漕渠甚斂而流甚深渠斂則流專流深則渠利故其法治之以不必治也閘漕強半藉汶萬厯前汶乘勢東而下于青海即西注者㣲西注㣲則不能七灌北三灌南二百年春夏水竭往往閘漕斬焉弱不能續數里之流萬厯以後坎河既灘乃驅汶全流于春夏之交閘道遂溢直時啓閉耳故其法治之以少治也河漕有源之水也崇堤約之以專其流隨流堤之以若其性運畢則修以清漕漕畢則清以待運嵗相循環也故其法治之以數治也湖漕無源之水也夏秋多雨則脹悶而決隄冬春多旱則涸竭而膠舟脹之既不可涸之又不可夫養生者虚其腹則神耗而液乾實其腹則腸急而腹潰虚其實實其虚此豈能一日忘備哉故其法治之以亟治也浙漕治或在潤或在常或在姑蘇或在崇徳直踰年一深通之耳故其法以間治也若孟津而下河運之崑崙也運所不經若勿治可也然脩身者能不脩崑崙乎法反宜亟治襄江而下江運之頭顱也運所必經若急治可也然藥病者能先藥頭顱乎法反宜勿治夫理餉道者其猶理氣血乎閘漕浙漕患在氣血之不足宜補之使羸衛漕河漕患氣血之有餘宜瀉之使縮白漕湖漕則有餘不足無定形故補㵼無定執羸縮無定衡余故取治水見諸行事存案牘者括而紀諸筌蹄漕渠七議形勝國家大計在轉輸轉輸資漕渠漕渠資隄民之富藏於田田之利藏於水無水溉禾即民貧轉輸焉給也淮揚大勢泗水由石梁洩於淮旴眙破釡山陽諸水由雲山衡陽諸澗洩於寶應蓄於二塘天長銅城諸水東洩髙郵蓄於三塘西連大儀甘泉盤古山澗諸水蓄於江都五塘儀真四塘是時田多墾治壩堰具存北不洩於諸湖東不洩於運河故湖平水淺河隄鮮衝決之患舟行無風波之險近壩堰圮廢塘不蓄水小新雷陂由淮子河而洩句城由烏塔溝而洩陳公北山由帯子溝而洩直渀漕渠益以郵應五塘之水盡奔諸湖則漕渠烏得不溢諸湖烏得不險哉且昔人創置塘堰豈輕用民力捐土田空帑藏乎必有經世之畧遺後世之利者矣何也江都句城塘周迴四十餘里灌田八百餘頃小新二雷鴛鴦陂塘積之當句城之灌儀真陳公塘周迴九十里灌田千頃有竒北山水匱茅家山劉塘積之當陳公髙郵白馬茅拓三塘灌田視江儀寶應白水塘獨深廣周迴百二十里合羡塘灌田二千百頃是四邑諸塘之勝槩也平時蓄之資以灌禾旱年水涸決之通運揚之富斗粟十錢乃原於此兹閘壩不設塘水渀潰或時雨浹旬山水驟發甚為漕渠大患也廼今昔異宜險夷區别豈無故哉昔之塘壩蓄水其洩少近塘鬻堰廢其洩大河也水無瀦制即充溢浩渺主者不知以漸而洩於閘洞輸於海口惟務增築加挿毋論旱潦障之其與昔人設鋪撈淺平水蓄洩深慮逺眺異矣失今不治是使岡陸千五百里之水悉以運河為壑湖闊增險勢必潰決又以下河為壑也夫上河腴田沒於湖不啻什百千萬嵗損糧運客載奚直十百千艘非湖險為患乎湖險為患實由隄髙隄髙則水大水大則澎湃洶湧加之積潤土酥西風觸浪髙崖丈許即更加數尺水亦隨滿寔增其險亦焉能以一線之隄禦尋丈之勢耶且造化惟洩始蓄理也積之滿者其潰大勢也障之而使之常蓄豈理也哉勢所不能也昔禹治水以四海為壑皆自下流疏殺其勢先決九川距海使大水有所歸復濬畆距川則小水有所洩今諸塘漕渠五湖及上下諸湖皆設隄防凡以蓄水也由塘達渠由渠達湖由閘洞達下河諸湖達濛喻及中十鹽塲海口皆所以洩水也上自西山逮下河田疏水道資蓄洩灌注濬畆澮距川也洩濛喻海口則決川距海也欲治水舍禹奚適哉茍俾百姓殷富惟長吏舉農政司空興水利修廢塘建平水實䃮立水摯增斗門以次漸洩於海則湖不揚波豈惟方物畢獻運舟不損貨賄不滯河隄不決塘堰蓄濟兼防異常之變已耶蕞爾淮揚尚得腴田十數萬頃不加賦而民足矧天下乎當有握其樞者源委善田者能以髙為下卑為髙明於原隰之理可語治塘壩達蓄洩之義可語建洞閘審於就下之性可語設隄防察於深淺之宜可語避湖險此其樞在上不在下也旴泗天長地勢距諸塘髙十數丈距漕河五湖復二三丈距下河又丈許近隄之田距廣洋湖數丈距海口隄下又不啻數十丈也海口之隄厯諸鹽塲延袤百八十里曰范公隄捍禦漲滷毋令侵稼建海口閘蓄淡水灌禾潦則洩之旱納潮水通鹽運閘外髙築埠墩防衝決海溢任之藉以棲息謀深慮逺文正之遺愛也濛喻地髙無閘則泰州十塲髙郵興化寶應鹽城由支河徑洩於海尤為要害之區今雖湮塞故跡尚存可修而舉也兹欲纉禹之績師其意先導濛喻疏下河俾二州三邑十塲之水有所洩復詢求張王清溝二海口故道使之盡洩於海於是始修河隄増設平水實䃮易牐加圏立水摯淺則蓄之溢任洩去涵洞變通宜民修復十四塘廢堰增設泰州姜堰海安壩下涵洞規石䃮水勢稍髙洩於西溪諸塲由西溪諸塲海河壩下均設涵洞髙水摯以次洩之其要也大都漕渠非河源東臨大海易洩就其地言之自旴泗破釡山陽雲衡黎銅二城諸澗連亘大儀西山甘泉盤古諸水蓄於塘者源也渟於湖者源之匯也漕隄而下濛喻鹽塲諸口紆曲洩於海者則委之委也茍潰其源不使之蓄溢其匯不使之流塞其委不使之漏泄即潦増湖險旱易水涸廼歸咎天時不預為之所予不知其可也矧窮甿罹旱乾水溢之患哉亟宜修復塘堰蓄其源増置限水實䃮節其流疏濬海口水道洩其委俾潦不渀潰漕渠旱決塘水濟運非漕渠逺猷乎忽逺猷思政本坐失事機也何也旴泗西出岡陸也得水資灌埒於低田是謂髙為下瀕湖沒於水者下也得洩成畬與阜田等是謂卑為髙易亢瘠而嘉禾變沮洳為沃壤剰水險湖沮洳棄地皆藏富之區也豈惟不滯轉運哉遺淮揚土田之利成萬世永賴之功於謀國致厚望云平水平水減水制不同而名異金門啓閉曰減水閘閘牐也甃石實砌立水摯曰平水䃮䃮達也䃮加圏如橋曰斗門斗小也楊太僕最畢湖東鸞得其意未悉其制何也啓閉由金門木牐資弊端實䃮一成不易均之洩水利害頓殊也王端毅公恕造減水二十四閘夫豈無利於國不便於民顧創造於前陳水部毓賢柱史戴公金王公鼎聞人公銓抑豈無見復欲增造於後予豈無所見必欲徹金門廢木牐易實膊哉誠地因於時事以義制殆有不容已者何也前輩創建更置可語並善矣詎知後人盡失其意顧遺漕渠痼疾不可救藥以隄夫司啓閉勢家得請託當事不察之過也昔三代民命制於君三代而下民命制於天戕於人當事不知而威柄下移非農政不舉水利不興之故哉予著論累千百言獨諄諄歸重平水至謂民命可制於君非謾語也夫利於灌不利於漕即予不敢不病於運病於民予實不能當民窮財盡之時非利百廢一予寧為之乎且前輩議減水之制奚不知盡牐而洩其洩速孰知流弊至大潦不啓即啓又止一牐塞責未幾即閉猶夫不啓也設之何用哉莫若平水實䃮仍閘洞故道因舊址資磚石椿木更新制鑿金門木牐之害視河洪行舟昔深穴尺今增一為七定立水摯不容增減過之任洩而自流不及盡蓄而自止小涸紏淺夫挑濬大涸決塘水濟之即盗洩何由售奸請托毋從升其詞説隄夫不操予奪之權勢家不專蓄洩之利所謂民命制於君此也矧漕隄永不崩決瀕年無事興修轉輸免漂折之慮土田舒旱潦之憂以君養民其利甚溥而功易集何憚不為哉嘗計平水實䃮興利什一除害什九民田之利不與也旱年蓄而不洩一潦年洩而不蓄二以漸而洩不決河隄三上河不受水患四下河得水灌溉五腴田不沒於湖六水淺免於風濤七募栽漁麻饒鮮食之利八淺種蒹葭深種葦極深施葑芻飼之利與民共之九菱芡蓮藕資窮民終嵗之食十禁風罟網䈑船抹索傷茭蘆擁䕶河隄避湖險十一何謂十九害旱年增築加挿徒費人工害一得賄盜洩竭澤不顧害二水涸不撈淺虚設淺夫害三冬宜蓄水賄通貨載輕洩害四罾斷資閘洞水不慮下運害五潦年藉口閘敝恐官不啓蓄水患害六夏閉渰上河隄下不得水利害七秋洩渰下河上河過時難佈害八蓄洩不時倚官守為奸害九文移往來動淹旬日害十𣲖草捕船拖葑遍及窮鄉非賂不免害十一旱年帯土大船必僦小船登岸受缷復逗遛不進害十二居民利隄決貿易害十三豪右爭趣任事害十四河隄經費難稽害十五將決不即修補初決故緩紏工已決難與湖勢爭險害十六將竣故留丈口已竣大洩運舟澁滯不謀挑濬遺搬剥之擾害十七隄決必先渰上河後渰下河村無寧居旅多恐怖害十八瀕年椿木捲埽勞費足任建䃮害十九予謂利興則害自除存公平正大之體絶私恩小恵之施毋為姑息茍免以甘悦臨人往常移増築之粟建平水興工役活饑民即財無徒費禍亂不作河防猶故乃爾士民不靖何哉兹嵗非霖霪積雨顧湖溢隄決載胥及溺實縁隄髙蓄患固經畧之失計也老農謂二百年來無此大變非不靖之餘烈乎諸塘漕渠必培其源始蓄疏其委始輸能使旱不滯舟潦不決隄可與論國家大計籌生民休戚已江都五塘儀真四塘髙郵三塘寶應二塘山則西皆髙東南皆下循就下之性因岡嶺之勢於東南築隄引山澗諸水障之為塘灌民田資漕運厯漢唐迨明興未之有改成化間王端毅公工部郎郭公於二雷各造石閘一水達二句城陳公如之正徳間撫院戴公疏復修諸塘嘉靖間撫院周公河院郭公鹽院戴公洪公焦公工部郎畢公先後檄郡守侯公劉公朱公委邑令江都谷公張公儀真楊公督工修築厯百七十年名卿碩輔茍留心經濟未有不謀繕治者豈無見哉顧鄰甿倔強盗種尚畏官法未敢明為已業後二雷小新陂塘漸為勢豪謀佃因而侵越猶未遽廢也邇年巨猾投獻權貴明鬻句城官為𣲖給莫敢異同則諸塘攘臂侵占盡矣稽陞賦之入率多滋弊合諸邑僅二千金迺豪猾逋負租吏侵尅工所冐濫無俾於國不利於民何至上干厲禁下遺饑阻迺大壊漕運壯圖俾厯代經畧逺計聖人深慮隱憂蕩然無復顧忌何哉率由守令遷轉不常監司無暇逺慮僥倖無事事過即已不思在昔定鼎金陵江北適當畿輔今建都燕冀淮揚即為襟喉向使勍敵決𤓰儀則畿輔難守近不逞襲故智即中原坐困杞人之憂當路所宜軫念也鄙見欲盡復廢塘先築壩堰以次修復閘䃮考景泰先規分屬運司資其恊治除厲禁許令積水灌禾旱則洩之濟運思患預防緩急有偹誠億萬斯年之利也惟諸塘乆廢為民耕墾視猶已業彼愚民久假不歸烏知非有一旦復之於官則蘇軾之論不為無見必廣詢芻蕘務恊人情宜土俗其閒受佃之家固多荒廢不治有苦於逋負自願還官有疲於旱潦徙而之他又有昔貧今富欲求轉佃復有官為𣲖給恐貽子孫之累殆什居六七尚餘二三可曲處而得也詢之既廣得之必真即為還官等殺察其心不強其所不欲懐之以恩體之以恕而喻之以義明示諸塘為漕渠要害中原命脈有不能狥民私情而忘國家隱憂者民雖至愚即獧狡負固可以理喻或地居上㳺過費壅治則給還佃值或授新墾召田給流徙故業及置荒廢易之處以禮不廹以威行有漸不驅以勢焉有不樂從者乎惟身任國事痛恤民隱不牽於毁譽不怵於利害則水利可興漕源可蓄安得不重望當路乎必俟非常之才始建非常之業謂世無陳元龍李襲譽范文正王端毅吾不信也越河往語畢湖東水部道平水甚悉出四疏評之稱楊太僕越河不若平水詳而覈劉梅國文爾雅唐漁石事核實畢於平水特詳多踵楊議文昌達比觀寶應志畧不載四公之疏近閲陳水部疏平水詳於越河指畫利害不愧職業陳之次䇿乃其上䇿戴龍山疏濬隄下久壅河道欲洩湖水導下流予謂治委則源自輸誠為卓見聞北江尹寳應奏開越河造減水閘五走海渠五湖水洩於五閘五閘下於五湖可語瀦泄之宜矣惟木挿滋弊大潦不啓若濛喻束隘終非善圖王柱史奏開内河行舟保漕運建閘座固河防則北江之議也北江督學復申前疏條陳河堤利害湖勢險惡至渰沒城邑漂蕩鹽塲可語敷奏詳明實心建業惟估計大少取土實難來後議之勘阻耳范少㕘疏諸湖合塘周迴五百里可語險矣乃延袤當不止此仲㢘憲疏錬達墾至謂見知湖險是已若身厯其所度髙卑審難易始免於聞知也二公産於其地且爾詎可責之視官為傳舍者乎周約菴疏條達充蔚文則佳矣未得源委之説猶昧於治險之道乎淮揚諸湖惟寶應至險然非河源近委可洩豈若洞庭彭蠡天險不可制哉能以人力障之使之深以廣亦能以人力導之使之淺且隘是裁成轉相之道也不此之計惟務開濬何哉以今湖險言之自邵伯湖達郵應抵白馬周迴不啻千里盖自天長六合旴泗山陽諸水匯為十四巨塘連亘千五百里其堰既廢其水駢集於湖惟可隄一線之路闊數丈顧欲捍禦數渀騰大勢湖烏得不險隄烏得不崩舟烏得不覆抱憂世之志寧不為寒心耶兹欲除國之患興民之利豈必越河重費哉寧若建石䃮立水摯一成不易疏濬下河使達於海上下流通不蓄水患為萬世漕河長䇿越河可無建也矧無禆國計非切民隱又事勢大不同於康濟何也髙郵地形止低河身七尺挑河之土淤積兩岸北河閘隄亦髙厚加之成化殷富白康敏陳恭襄經畧得宜故財贍而工亦易集今寶應瓦店厯北田至三官嘴隄下舊有溝溪通舟楫距湖防低丈四五尺無土可取須載客土實之髙以髙則工大費多而難成低且薄則不任蓄水而易崩塌即兩岸甃石亦須培土尤重費不貲顧悉索已匱之財興此無益大役又與河隄絶無干涉予不知其可也茍確守前議喜建事功杞人竊慮數千里大浪衝此一線之隄焉知新河未竣舊隄不先決哉名田鄧艾墾淮揚荒廢為屯築塘灌溉幾成陸海王介甫議墾大湖後人開白茅港輸海遂成蘇松之富虞集議瀕海沃壤募浙人種稻至托克托始墾直沽遺海口之饒三公之䇿創於盛世顧行窮蹙之時具有成效矧今全盛資官力墾棄田藏富於民奚不可耶予欲復四邑廢塘引水耕治效鄧艾屯營蕪修吉甫襲譽陳登之政則岡陸可埒低田延石䃮洩湖水㕘酌單諤之議使上下河壖棄地並獲常稔導下河洩海口舉虞集疏議托克托規畫則退水沮洳瀕海草蕩易為嘉禾大都淮揚迤西髙亢之田奚啻百萬餘頃皆有糧墾於水利猶民故業也至上下可退水之地自邵伯湖厯髙郵寶應抵白馬而北上下四岸奚止數十萬頃下河如之瀕海草蕩又不止此合三墾無紀極即少許亦百萬餘頃無糧而墾於棄水居三之二顧創造勞煩必資官力為經畫疆理始任耕耨其地率旴曠平衍無陵阜限閡可施井制為名田求聖王經世之蹟召來流徙募能召百夫為田即任百夫之長千夫萬夫如之量優給授厚廩餼猶武官承襲令世世無與則敖蕩技能之徒莫不奮臂爭趣願為之長閒民失業靡不哀怜乞訴願為之氓何也河壖棄地非田也可使耕耨游食漂泊非農也令秉執耒耜豈強之使然哉方今無田不税乃耕無税之田無農不耕顧役不耕之民設田官修稼政驅天下於農豈直淮揚已耶此未可與秦越其民傳舍其官者語也其制以瀕湖上下退水界以舊塍退盡限止築隄髙厚為徑畛涂道路師遂人匠人之法濬倍深廣因畆遂溝洫澮川之形制而縱横之葢井田水多路廣路廣通車馬達國都水多資灌溉饒鮮食之利惟退水沮洳特艱取土必溝洫澮川深廣倍於徑畛涂道路始任髙厚而豈徒哉溝深種魚苗岸廣結廬㑹築場圃䈑泥植靛治蔬種麥非棄地也復教之雜植榆栁桑槐夾岸葱鬰始無崩塌之患也平時置車灌溉旱設涵洞引水潦資隄防捍禦風車倒水兼用曲竹必使旱潦有備俯仰有資數稔始議薄征髙田仍故賦惟修堰充塘夫瀕海主海口閘洞中下主隄充淺夫淺老此外徭役一切蠲免盖三代之賦雖重而力役甚輕國朝賦法輕於三代而役法特重於漢唐不可不變而通之也兹欲特加䘏典召來逺人俾家給頃田永為恒産禁毋得買賣豪強兼併著為令甲制之在官不輕予奪有百畆之授無什一之征躭口分世業之樂省稚老還受之煩豈其獨厚流徙之民哉茍利於國益於民不得不養其全力以勵創造之艱風天下俾旱則極力挑濬潦即百法培補將毋論朝昏不憚寒暑猶渇思汲饑待哺至水火不避白刃可蹈遇有興作百十萬家家役一力不崇朝而事集矣非有法令驅之以生息之利在是也捐蓄患之水開富庶之源又焉得與窮甿計租賦較盈縮哉矧河隄永不崩潰土闗不設椿木芻草磚石工費嵗省不貲困敝之民不可息肩乎此其任在守令貴在監司經畧在司空舉劾在撫按考課在銓曹覈實在都院茍宰輔莫執其樞忽易之亦猶近世之講學空談耳何益於國何禆於民哉經費計工易經費難非費之難經之難也民窮財盡豈惟費一利百始動哉即利萬萬費止一二未可輕議也方今淮揚大患莫甚漕渠民苦旱潦莫甚水利然非上脩廢堰中建實䃮下疏海口則水利不興運舟莫濟殆非重費不可故曰經之難也瀕年河隄衝決多自北而南縁黄河合淮泗倒灌先自寶應甚則入江下河灘漫亦先自應鹽郵興直奔泰之十場而止惟興化獨窪受害尤劇必起集近水處所人夫量給食米千石四百金鳩工先濬濛喻乃其急務訪求輸海故道議於十塲海河壩下増十涵洞髙其水勢費止千金關係甚重也計修二十四閘更實䃮水摯因故址磚石五千金足舉大事矣近黄河南徙徐邳渾濁已非清河流冷灘塌則漫入寶應下河革灣淤塞則直衝淮安二城近圏上開渠則泗水直渀倒灌尤捷惟黄浦平河二處北受黄淮濁水南當白馬巨衝尤為要害之區也宜各造聫絡大閘疏隄下水道逕趣濛喻既洩渾汗尤殺湖險費千金則淮揚交㑹之地所宜經畧軫念也郡治霖雨新城積水病涉尤不利堆鹽宜沙壩下設涵洞水摯百五十金髙郵三大閘非昔矣宜更新制三百金寶應水浸城市三官殿嘴將盡沒於湖茍潰外防即城無寧宇宜南北各造聫絡三閘五百金泰州海安姜堰壩下增三涵洞髙水摯加斗門三百金十四廢塘即起近塘人夫資水之家修補缺堰日給米二升不過千金大要萬金可辦若䃮制既定水必漸洩則上下河及瀕海退水之地為築隄濬溝如井制又為結廬舍貸牛種必俟水退始蠲重貲非四五萬金不任充費惟帑藏空虚取之有司無可應給告之工部已成侵冐量移軍餉即事體重大欲暫設開則一舟三𣙜民復何堪貸之運司彼自有定額季解何所責償取之商人無重臣清理百弊叢生實縁坐𣲖定價坐𣲖涉禁錮定價類齊物此豈近人情哉守法之家捐重貲需之數年必買邊引始封摯所得不過數錢販商則購南貨權子母走邊徼售於土著一嵗再獲相逺懸絶非真邊商也安得不啓獧狡睥睨巧為速化之術方圖出橋已逕封掣殆有素稱窘迫一旦驟得巨萬之貲視義子鼎鐺公擅鹽利尤為得䇿其法則始壊於殘鹽繼壊於王本再壊於河鹽大壊於超掣遂使祖宗舊制蕩覆無遺皆變法不善有以致之夫定價坐𣲖本以消引不知消猶火之銷鑠無復煨燼始免壅滯矧同一引同一闗支在内商則任其積在邊商則許其消不知其引尚在何謂消也計邊商嵗多售金二十餘萬皆内傷之膏血與其無故而厚販商孰若暫取内商十之一二興水利墾名田為萬世之利乎茍欲消引何不悉免坐𣲖定價每鹽合給一空引消毁餘鹽之外許増百斤以八十償引值以二十助興修即一年可消七十餘萬三年消之殆盡引值頓增其法自止内商得息肩邊商免坐守取之賦外不病於國嵗終則止何病於商是一舉拯敝法保漕運墾名田取償於餘鹽遺澤復省瀕修之累免墊溺之危驅游食閒民俾盡力於沮洳棄地内消隱憂外化強梗復得田百萬餘畆得粟三四百萬石悉藏富於民數稔始三十税一得賦米十七八萬石當江北賦算之入髙田資灌畆增一石得粟千萬不與也纉禹治水之功収稷樹藝之効達諸天下荒廢盡墾則百姓可富禮樂可興文景之小康奚足言哉漕河議漕之役當嘉靖末黄河決而東注自華山入飛雲橋截沛以入昭陽湖逆厯湖陵以至谷亭四十里其南溢於徐為巨浸天子為之南顧而興嗟亦數四勤宵旰而大司空出計以為仍故道則河益狎而攻無已強捍之則暫見其利而終釀害謀於捍與徙之間而循求廢趾有河自南陽折而南東至於夏村又東南至於留城而浚橇檋板築之役興而謗騰矣竊謂捐天下之財以填無益之壑天子意不能無動而㑹采輔臣言委計視河者乃正前後役夫九萬有竒白金以兩計者四十萬而粟米稱是兩嵗之間漕道通而大司空再受賞吏士賜爵有差或謂河不久復當變湖以費水衡錢萬萬者非也漢武帝之塞瓠子避河害耳而至發卒數萬人自湛白馬玉璧羣臣從官自將軍而下皆負薪置決口功成而築宫以侈之今兹通漕大計胡言費也或謂不當逆拒河也逆之則決而為漕害順之則借以為漕利又非也夫河性能決而不能安為順也言借河利者引㓂而入室者也然則為今之計者如之何曰河決有漸也度其來或増築隄以抗之或決其下流而别引之霖溢有時也多集木石以為楗嚴耳目以為偵而已自淮而北則多横潰而成溢自淮而南則或漲入而成塞皆不可不預計而逆為之所也夫漕河通而海運之説漸絀矣海運之説得之漕河阻而後入其言大計二曰嵗往返不過四月而艘卒以三之二自便耗餘可小裁而羡鏹可積也曰縣官即萬一以咽憂能别於喉咽之外而濟大命誠亦利便哉然而不克如勝國始終之海利者何也勝國業下宋而宋之戈船下瀨之卒嘯聚而不敢歸者無慮數萬此其人皆習風濤躑躅待命者也朱清張瑄一劇盜耳驟以東南天下之半而委之金虎符萬戶而下聽其自爵賞而不從中命也錢榖聽其自出沒而不從中訾也故清瑄得以畢見其才而為百餘年之利然國紀潰而清瑄亦併族矣今毋論守臣自一瀕笑外斤斤束三尺士亦安能舍燕中牘而見富貴乎夫艘與卒陽為募而陰則拘攝也别妻子若脱褓見制閫若束濕不待納之鯨鯢之口而稱就死矣吾固筴海漕之不可以久也然亦知創之者甚難而湮之者甚易乎哉一旦有緩急鑿空而後思其故則晩矣治河議粤考黄河之源出自星宿踰崑崙九曲而入中國此河之所自來也禹之治河自積石鑿龍門厯華陰下砥柱抵孟津洛汭至於大伾釃為二渠過洚水至於大陸播為九河盖方大伾以下河始出峻而就平地則析之為二自大陸以下地平土疏益善潰則播之為九故厯三代之久免衝決之患者禹之功也此所謂相時審勢得治水之道者也自周定王時河始南徙已非禹之故道迨漢元光以後或徙東郡或決瓠子或決館陶或分而為二或合而為一遷徙不常而河之患於是乎益甚是非禹績之替也時勢之變為之也自漢以來明智之君每廣詢而博訪宣力之臣恒竭思以効勞是雖倡議疏治者代不乏人然河無常處治無定䇿卒皆託諸空言而已若夫賈讓當哀平之世陳上中下三䇿丘濬常稱其治河之法莫備於此矣夫謂增築隄防約攔水勢使不汜濫者其法固無容議也至於上䇿放河使北入海是即禹之故智今妨運道已不可行中策據堅地作石堤開水門分殺水勢然自漢至今千數百年中州大名之境泥沙填委無復堅地而河流與水門每不相值讓之䇿盖就漢之時勢論爾而今可盡行乎賈魯任河防之職言疏濬塞三法丘濬嘗稱其治河之法莫要於此矣然殺河之流因而導之之謂疏去河之淤因而深之之謂濬抑河之暴因而扼之之謂塞是三者疏為上濬次之塞之法又不得已而用之爾而豈可一概行乎故濬又以為賈讓諸人皆隨時制宜之䇿今日亦未必便者盖有見於時勢之不同耳我國家建都上游漕㑹通之河輸東南之賦以給京師往因二洪梗澁取濟黄流合於汶上諸泉滔滔平流浮舟水面不煩牽挽之勞以濟我國家漕運之利誠天啓之恵也比嵗大雨水溢河決於徐之飛雲浦逆流而上横衝運河沙淤百里中外驚惶莫知所措先帝特勅總督大臣畢集羣䇿鳩工分理懼水之東奔也而挑新河以讓其地懼水之北徙也而築長堤以遏其衝所以相時權勢而為目前濟運便民之計者誠善矣然或者猶以為河從西北極髙之地建瓴而下以萬里轉折之勢而乘之以雨水交發百川灌集之威而出之以秦溝一股不溢而北徙則溢而東奔况芝麻莊崔家壩等處倒灣崩岸是北徙之勢方殷曹單之隄一失則南陽魯橋一帯運河淤塞之患不免議欲於上流别開支河以殺其勢是亦永圖久大之謨以濟邦民之患者也執事又謂使有濟漕之利而無衝決之患執畫一之䇿而不惑於紛紛之議然事闗大計非愚生之所敢議也考之宋儒任伯雨曰河流混濁淤沙相半久而必決者勢也安可以人力制哉惟宜寛立堤防約攔水勢使不至大叚漫流耳朱熹氏曰禹之治水只是從低處下手下面之水既殺則上面之水必洩是故通乎任朱二君子之言而可以知支河之不必開矣歐陽修曰黄河已棄之故道自古難復盖河流既久底岸皆髙水行漸壅自不能行乃棄而他徙非若人力堵塞之河渠道猶存也吕祖謙曰禹不惜數百里之地流為九河以分其勢善治水者不與水爭地也是故通乎歐吕二君子之言而可以知舊河之不必復矣盖黄河之流其東趨固一也而時不能無古今之異其利害相對也而勢不能無輕重之殊以今日之時言之河自孟津而下經中州平坦之地迤邐而東洩於徐沛之間大河南北悉皆故道土雜泥沙善崩易決非若禹引水自大伾兩山極髙之地而下矣此其時之有不同也而欲效疏九河之法將見河流細分則益緩而易淤矣而古今可以並論耶以今日之勢言之取河水以濟徐吕二洪而又阻其東奔以免祖陵之害制其北決以防運道之淤况徐沛之間復多阻山治之倍難非若禹播九河棄數百里之地為受水之區矣此其勢之有不同也而欲圖萬全之䇿吾恐利之所在害之所伏也而輕重可弗審耶噫此當事諸臣雖有謀國之忠長顧之慮而卒紛紛莫之定也雖然知時勢之難而不有以處其難不可也知治河之無上䇿而卒諉之無策不可也今惟相古今之時權輕重之勢師禹之意而不泥禹之迹如秦溝一股果可以納大河之流也則傚禹行所無事之智焉疏其下流以導其自然之歸固其長隄以防其衝決之患而又於芝麻莊崔家壩等處下椿捲埽以抑其北徙之勢各於沿河南岸去淤撈沙以疏其壅塞之患使水由地中行而不至於汜濫斯已矣支河固不必開也如秦溝一股不能容全河之水也則傚禹決排之法焉淺者濬之使遂其下就之性隘者疏之使緩其湍迅之威務使上無所激而接河濟洪之道如故下有所納而由清達淮由淮入海之道如故斯已矣支河亦不必開也如此則不惟運河疏通獲轉漕之利久役疲民獲蘇息之休而東奔之流既阻則陵寢無衝決之虞北徙之勢既防則曹單免墊溺之患庶乎永賴之績可復見於今日而三䇿三法之説亦㑹通於異世之下矣否則徒知用古人之法而不能相古今之宜泥一定之迹而不能權輕重之勢則膠柱鼓瑟徒勞而㒺功也烏足以語通天下之變而成天下之功耶治河總論惟河出星宿踰崑崙抵積石數千里又自積石至汴至淮數千里其逺且峻而湍悍未有所容挾山陜河汴之諸流溢霖潦之後其衝激而横決固其常也自漢以來明智之君勤勞博咨于上謀議任事之臣竭思畢力于下然河未有不決治河亦未有定䇿也其在漢文武間則務塞如塞酸棗塞宣房是也其在哀成間則議不塞如賈讓所謂徙民當水衝者不與河爭地李尋解光所謂因其自決以觀水勢聽河欲居之者是也後之言治河者大槩不出此二端然河者數變而不可逆者也使塞之於此而復決於彼是不知河之變而逆其性者也故丘文莊獨稱賈讓者盖見河之不易塞也然地不可以數徙水不可以徐觀即河所欲居林莽荒曠之墟待其自定可也即貫城郭厯郡縣國家所繫者大其亦可待否也故文莊又以賈讓諸人皆隨時制宜之策今日未必便者盖見河之不易議也而在今日尤有難者河自汴而南則鳯陽淮泗之間祖陵及王墳在焉王氣所鍾天下之根本也東則㑹通河在焉漕江南數百萬之粟集百貨以充京師天下之咽喉也皆國家所甚繫者也河不東則漕不通而河之勢非㑹通所能當也故方欲引而東又防其有決㑹通之患及其障而南又防其為陵寢之患自古治河兩難未有如今日之甚者使漢人復生亦未知何以措其智也今徐房之間河既横決或者徒見天變方甚以為其道必不可復不若任其所決而别徙道以屬之于邳獨不知河之入徐束之以徐吕二洪而當兩崕之險此天之設竒以濟漕而制河者也尚不能制而至於決況去崇山之險無兩洪之束而循漫流以通道勢之必不可者也故議者專意于新安以為新安淤而徐房決今開淤以容水而塞其決以制横流則故道宜復然亦不知徐房者受上流之輸而建瓴于新安者也今不急治其上流而欲開數十里之淤以當横潰無涯之水則塞者必復決而開者必復淤此亦勢之所不可也故禹之治河自積石鑿龍門闢伊闕下砥柱抵孟津洛津至於大伾釃為二渠過洚水至於大陸播為九河方大伾以下河始出峻而就平地則釃之而為二大陸以下地益平土益疏水益善潰則播之而為九此所以導其上流而分其支者也導而分之則河雖欲決而不可得也明興九河之迹既逺然其始自汴而出者河猶有六其二入淮其四合漕以入于淮出滎澤者至夀入淮出祥符者至懐入淮出長垣者至陽榖入漕出曹州者至魚臺入漕出儀封者至徐之小浮橋入漕出沛之南者飛雲橋入漕出徐沛之中鏡山之北者溜溝入漕是其猶有禹分之遺意也及其後或塞或㣲或并為二或合為一而河之道愈寡其力愈專則其決固宜也愚嘗觀明興以來河凡數決矣洪武間決魚臺其後魚臺塞而正統間決沙灣大洪之口沙灣塞而𢎞治間決金龍口又決張秋當是時沙灣之功成乃作九堰八閘開渠二十里而猶不免于決及張秋之功成乃浚賈魯河孫家渡諸口其法尤備然其後又決曹單及正徳間曹單塞又決豐沛及嘉靖初豐沛塞又復決魚臺及魚臺決乃濬趙皮寨而數年復決夏邑遂徙而入渦奔亳泗而趙皮寨又塞復數年諸河之入漕者皆不來清濟間流幾絶而入渦者溢於泗震驚陵寢於是諸臣皆惶恐待罪開孫繼口而渦河塞漕復得通及孫繼口入徐又有今日之決始孫繼口之役諸臣之受切責懼無以報命也故盡截野鷄岡之水以入新口又捲埽築壩横亘而逼之不容入渦所以為漕計而䕶陵寢者非不甚重然河之正𣲖皆歸孫繼而以全力入徐矣是河之所以暴決者以其專而不分故也愚嘗問長老皆言今諸河已塞惟孫家渡與孫繼口而孫家渡廣不能數丈不足以分孫繼獨趙皮寨廣加數倍河之正𣲖也今誠急濬趙皮寨道河之四以入淮而其六之由孫繼以入徐者開别支以殺其勢又於孫家渡諸口按河脉而時疏之彼其力既分則可以漸制既不至為陵寢患而漕亦宜通故言當先治上流者此一計也然禹導九河自碣石北入於海及隋鑿汴始南通于淮則淮者非受河之正也故余闕宋學士皆謂以河之大不宜以一淮為之委者明淮不足以當河也今聞淮之安東其淤畧與新安等矣夫以全淮注河而又不能即達於海則河益激而淮益不能容其於新安之淤相乗而積亦其所必至者故當併治下流者又一計也夫治上流以救其源治下流以疏其委然後徐房之決可塞而新安可開矣治河總論夫河與海皆天下之至大海尤百川所歸然海無患者水之流其未殺而得所容故也惟河出星宿踰崑崙抵積石數千里又自積石至汴至淮數千里其逺且峻而湍悍未有所容挾山陜河汴諸流溢霖潦之後其衡激而横決固其常也自漢以來明智之君勤勞博咨於上謀議任事之臣竭思畢力于下然河未有不決治河亦未有定䇿也其在漢文武間則務塞如塞酸棗宣房是也其在哀成間則議不塞如賈讓所謂徙民當水衝者不與河爭地李尋解光所謂因其自決以觀水勢聽河欲居之者是也後之言治河者大槩不出此二端然河者數變而不可逆者也使塞之于此而復決于彼是不知河之變而逆其性者也故丘文莊獨稱賈讓者盖見河之不易塞也然地不可以數徙水不可以徐觀即河所欲居林莾荒曠之墟待其自定可也即貫城郭厯郡縣國家所繫者大其亦可待否也故文莊又以賈讓諸人皆隨時制宜之策今日未必便者盖見河之不易議也而在今日尤有難者河自沛而南則鳯陽淮泗之間祖陵及王墳在焉王氣所鍾天下之根本也東則㑹通河在焉漕江南數百萬之粟集百貨以充京師天下之咽喉也皆國家之所甚繫者也河不東則漕不通而河之勢非㑹通所能當也故方欲引而東又防其有決㑹通之患及其障而南又防其為陵寢之患自古治河兩難未有如今日之甚者使漢人復生亦未知何以措其智也今徐房之間河既横決或者徒見天變方甚以為其道必不可復不若任其所決而别徙道以屬之於邳獨不知河之入徐束之以徐吕二洪而當兩涯之險此天之設竒以濟漕而制河者也尚不能制而至於決況去崇山之險無兩洪之䇿而循漫流以通道勢之必不可者也故議者專意于新安以為新安淤而徐房決今開淤以容水而塞其決以制横流則故道宜復然亦不知徐房者受上流之輸而建瓴於新安者也今不急治其上流而欲開數十里之淤以當横潰無涯之水則塞者必復決而開者必復淤此亦勢之所不可也故禹之治河自積石鑿龍門闢伊闕下砥柱抵孟津洛汭至於大伾厮為二渠過浲水至于大陸播為九河方大伾以下河始出峻而就平地則厮之而為二大陸以下地益平土已疏水益善潰則播之而為九此所以導其上流而分其支者也導而分之則河雖欲決而不可得也明興九河之迹既逺然其始自汴而出者河猶有六其二入淮其四合漕以入于淮出滎澤者至夀入淮出祥符者至懐逺入淮出長垣者至陽榖入漕出曹州者至魚臺入漕出儀封者至徐之小浮橋入漕出浦之南者飛雲橋入漕出徐沛之中鏡山之北者溜溝入漕是其始猶有禹分之遺意也及其後或塞或㣲或并為二或合為一而河之道愈寡其力愈專則其決固宜也愚嘗觀明興以來河凡數決矣洪武間決魚臺其後魚臺塞而正統間決沙灣大洪之口沙灣塞而𢎞治間決金龍口又決張秋當是時沙灣之功成乃作九堰八閘開渠二十里而猶不免於決及張秋之功成乃浚賈魯河孫家渡諸口其法尤備然其後又決曹單及正徳間曹單塞又決豐沛及嘉靖初豐沛塞又復決魚臺及魚臺決乃濬趙皮寨而數年復決夏邑遂徙而入渦奔亳泗而趙皮寨又塞復數年諸河之入漕者皆不來清濟間流幾絶而入渦者溢于泗震驚陵寢於是諸臣皆惶恐待罪開孫繼口而渦河塞漕復得通及孫繼口入徐又有今日之決始孫繼口之役諸臣之受切責懼無以報命也故盡絶野鷄崗之水以入新口又捲埽築壩横亘而逼之不容入渦所以為漕計而䕶陵寢者非不甚重然河之正𣲖皆歸孫繼而以全力入徐矣是河之所以暴決者以其專而不分故也愚嘗問長老皆言今諸河已塞惟孫家渡與孫繼口而孫家渡廣不能數丈不足以分孫繼獨趙皮寨廣加數倍河之正𣲖也今誠急濬趙皮寨導河之四以入淮而其六之由孫繼以入徐者開别支以殺其勢又於孫家渡諸口按河脉而時疏之彼其力既分則可以漸制既不至為陵寢患而漕亦宜通故言當先治上流者此一計也然禹導九河自碣石北放於海及隋鑿汴始南通于淮則淮者非受河之正也故余闕宋學士皆謂以河之大不宜以一淮為之委者明淮不足以當河也今聞淮之安東其淤畧與新安等矣夫以全淮注河而又不能即達于海則河益激而淮亦不能容其與新安之淤相乗而積亦其所必至者故當并治下流者又一計也夫治上流以救其源治下流以疏其委然後徐房之決可塞而新安可開此四役者宜同時而並舉不可闕一者也然察執事之意顧以同時舉天下之四大役非所以惜財而體國者嗟乎愚之為此議者正恐財之妄費也夫興天下之役而成天下之功此自古用財之道也不得謂之費惟顧惜而功不成則其所用乃所謂費也昔秦王將伐楚問王翦曰非六十萬人不可問李信曰二十萬人然李信以二十萬人而不勝則二十萬人皆費也王翦之勝則六十萬人而不為費治河亦若是也去年天子閔被水之地蠲郡縣以萬計遣大臣往賑又十萬計失今河不治則他日宜蠲宜賑者又不知其幾也今以蠲與賑者倍其數即河可成民得其業是愈于蠲與賑者甚逺也宋人防河與防冦等矣夫冦之可憂未必如中原之可憂惜財之説非所以施于遇變不得已之時者也然執事又以罷民不可以重勞灾地不可以處衆斯固慮之深也而愚以為是則在夫撫之得失而不可以議役之興沮也何者興四大役法當用數萬人不可謂不勞以數萬人之衆而合處千里荒蕪之間不可以不備此所謂深慮也然令數萬人急者得錢饑者得食如逐貨于市趨稼于田仰給而有藉則所以収離散之民而為救荒之策者也其何勞之得怨令千里之間畫地而居分功而作如身之使臂臂之使指輻輳而得所歸則所以御部伍之法而兼制變之術者也其何衆之能為是誠在夫官之得人而撫之有道也不可以是而議夫役也治河總論盖聞河之害中國所從來久矣自昔君臣相與蒿目嘔心未聞有稱善治者何也以治之者誠難也河源自星宿踰崑崙已折而趨積石乃㑹雍浮汴以達于淮夫以萬里奔騰之勢無重岡巨磵以闌之故當衝決而不可禁此一難也河有出有過有逕有合有分有屈有注有入何多變也乃其行則至悍猛而不安其順豈緩急能釃其流而殺其怒此二難也河之性善下斯得其平而不爭今亘齊梁之野曠衍如砥而以洪濤洄洑于其間卒有方數千里之水欲其建瓴於地中也得乎此三難也河雜灩沙淤泥非有迅流常滌之則勢必益墊而其身反欝起而髙於岸夫堆出於岸流自湍之况值霖潦百川復為之灌集此四難也夫誠難其治也而遂委之於不治則非也治之已難也而使不得其所治之道則尤難也盖上世惟陶唐時鴻水沸出民人升降移徙﨑嶇而不安禹起而治之乃行山表木灑沈澹菑故道河自積石下砥柱厯盟津雒汭至於大伾乃厮為二渠過洚水至大陸又播為九河夫由大伾以上地形髙而水峻急易㵼合乎其所不得不合也由大伾以下地形卑而土輕脆善潰分乎其所不得不分也故曰禹之治水水之道也此禹所以通其法也嗣後殫碩畫之思者發盈庭之論逞竒譎之虚者競作舍之謀故有欲以人力勝者則曰塞之便愚以為是障之也有惟諉于天運勝者則曰不塞便愚以為是猶滋漫也何也水氣之導也過為防壅終必盈溢焉能築垣而久居水乎然蟻孔之變禍且不測而欲徐觀其所自定又惡可得也眉山氏曰不塞汜濫不止塞之則水未必聽是塞與不塞皆非所以永持至安之長䇿也夫使其決也而幸不至戎毒可且勿塞脱或溢臯汨陸將有閭殫為河之患固莫若隨決隨塞即不能保其勿壊尚足支數十載寛近憂歐陽氏曰治水本無竒䇿相地勢謹隄防而已是塞也者猶為猝可倚救敗術也胡不引漢事觀之乎盖自周定王時河徙砱礫禹之故道無可求者故迄于西京而其為害益綿綿不絶孝文時嘗決酸棗矣乃大興東郡卒塞之故金隄之潰旋復而白馬之波不揚終帝之世瀕河民不識濡足之患孝武時再決瓠子矣乃自臨河湛壁馬扈從將軍已下皆負薪使公卿將卒寘決口已而築宫宣防侈其盛由是而觀用塞之效可覩已夫孝文海内富庶非不足修禹之業而計卒出於塞且僅再傳而復決武以雄才大畧猶然長歌悲感既徼靈于河祇窮數年之力而始塞盖即一塞且不易如此甚矣河之難治也我朝嵗漕淮取濟黄流宋之疏汴元之引汶皆所倚為用焉利盡東南半天下之賦由此以進若人之咽喉然繫至重矣然惟南行則利漕或東決則害漕今之言計者正利害相持之際也乃欲盡去其害而獨資其利則難之難矣盖嘗槩水患而測之河非汴不得合于淮故漕之憂常在汴猶之内闗之疾也假令汴可無憂矣則虞其轉而危我之汶泗汶泗定又虞其盤而危我之清濟清濟定又危其越而危我之豐沛即幸底定俱勿割又虞其畔而不南重為運道之厄然則奈何其治之易哉往事不具論比者河失其行決于崔鎮黄池其縣邑魚鼈其人民行河使以菑告上喟然南顧特為置督府假以事權令一切理水形便於是改邑起蕭縣之溺布揵堙崔鎮之洪絙葦埽髙隁之壩隤石櫬清口之隄一日之内四役竝興諸使腠胝無胈庶工膚革不毛而朝廷重憫被灾之地首詔賜民租又為出司農錢鉅萬以哺諸隄繇使鱗集竝河而為之作吏有謀撓其計者即褫厥官或媮墮僨事輙収逮之不貰乃今天心叶順川靈效職水得所壑而緒業漸用即功夫新顛木之邑非徙民當衝之上策乎闐滅決口非疏塞竝舉之故智乎捲諸埽治遥隄又非圖上請行之遺謀乎盖昔人焦心銷志殫數百年錯出之竒顧卒崇空語者而盡施行于今日此曠世之業也乃議者猶謂河有故道宜及時恢圖興復兹過計也河流既久走沙漸淤水沈滯難行自不得不棄而他徙兹欲奪新河之河必趨強幹而囘注于已滅難明之故道非所以察形也往者孫渡之役不有覆轍耶或又謂當别開一河以備運道之阻兹又過計也逺圖不可倖致將糈糒傭作必倚辦縣官勞費且什伯卒未有能濟而乃設不必然之慮以徼難竟之功非所以軌事也近日膠泇之役不苦蹠盭耶揆今之計亦曰慎預防之術規善後之宜而已是故長隄逺䕶非不可約攔水勢然東強西傷之語未必妄也則畚鍤之工可弗常飭與墮崇填閼非不可抑遏浚流然止啼塞口之喻未必誣也則柵落之具可弗時集與嵗當夏秋信水既漲而忽有非時之客水乘之則其潰也必暴故平凖之候人宜議選也地居河壖寸壤方齧而即數百丈之息壤因之則其陷也必廣故巡視之番卒宜議補也上流不暢斯騰涌而為灾水之由泗入者不可漸以濬之乎下流不疾斯羡漫而為害水之由徐入者不可漸以疏之乎而又于青兖冀豫可由之處各正溝洫以引水之溉而披其勢則治田亦以治河也衛博徐邳經漕之所多開月河以伺水之横而折其猛則漕通亦河之通也夫飭畚鍤而集柵落則成業保矣選候人而補番卒則警備嚴矣上流濬而下流疏則原委導矣溝洫正而月河開則水利廣矣所謂預防而善後者或以斯乎昔管子論備害之道首請置水官故其要尤在以擇官為本謂宜妙簡經明禹貢之士俾領河隄而又博求習水者分置其屬使之共行視圖方畧得便宜經理則職任專而事功自立嘗聞江河在天地間猶脈絡在人身中然則河之為患非即脈絡之病乎而擇官之説則良醫之求也由前數説則鍼砭湯熨之法也試采而行之河之患庶其有瘳乎泇河附泇口河從馬家橋入㣲山諸湖穿梁城侯家灣取道于利國監經蟃蛤栁諸湖出邳州直河入黄河有六難焉㣲山諸湖水中不可隄一也梁城侯家灣葛虚嶺皆數十里頑石不可鑿二也碙石水中隨撤隨合金火不可施三也嶺南去徐吕二洪一舍耳二洪髙下相等避徐吕二洪險葛墟洪險復生四也假令治泇河即不治徐邳河猶可萬一泇河成嵗治之而徐邳河非無事之水也而又治是兩役也勞不已甚乎五也計鑿良城侯家灣非五百萬不可視今治徐邳河五百年之費况未必成六也治泇河策宜永罷之漕運考附程頥曰禹貢冀州為帝都東西南三面距河他州貢賦皆以達河為止按禹貢所謂達于河即達京師也然叙水路于貢賦之後每州皆同亦後世漕運之法也但未明言其為漕耳管子曰粟行三百里則國無一年之積粟行四百里則國無二年之積粟行五百里則國衆有饑色左傳晉薦饑乞糴于秦輸粟于晉自雍及綘相繼命之曰汎舟之役呉城䢴溝通江淮按汎舟以輸粟開渠以通糧道已見于春秋之世秦欲攻匈奴運糧使天下飛芻輓粟起于黄腄瑯琊負海之郡轉輸北河率三十鍾而致一石按飛輓始于秦盖由海道以入河也海運在秦時已有之漢興髙祖時漕運山東之粟以給中都官嵗不過數十萬石孝文時賈誼上疏曰天子都長安而以淮南東南邊為奉地古者天子地方千里中之而為都輸將繇使逺者不在五百里而至公侯地方百里中之而為都輸將繇使逺者不在五十里而至輸者不苦其繇繇者不傷其費故逺方人安及秦不能分人寸地欲自有之輸將起海上而來一錢之賦數十錢之費不輕而致也上之所得甚少人之所苦甚多也武帝時通西南夷滅朝鮮擊匈奴築衛朔方轉漕甚逺山東咸被其勞武帝勞中國人漕中國粟以爭無用之地是以璀璨之珠而彈啁啾之雀也務虚名而受實害損有用之財而易無用之地豈盛徳事哉鄭當時言闗中運粟請引渭穿渠涇易漕度而渠下民田萬餘頃又可得以溉此損漕省卒上以為然發卒穿渠以漕運大便利吕祖謙曰漢初中都所用者省漕運之法未講也鄭當時議開漕渠引渭入河盖縁是時用粟之多漕法不得不講宣帝時耿夀昌奏故事嵗漕闗東榖四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原諸郡榖足供京師可省闗東漕卒過半夀昌此議遇京輔豐穰之嵗亦可行之趙充國條留屯十二便其五曰至春省甲士卒循河湟漕榖至臨羌以威羌虜揚武折衝之具也充國此議遇嵗豐稔邊方無事亦可行之光武北征命㓂恂守河内収四百萬斛以給軍以輦車驪駕轉輸不絶諸葛亮在蜀勸農講武作木牛流馬運米集斜谷口治斜谷邸閣息民休士三十年而後用之後魏於水運之次隨便置倉每軍國有須應機漕引此法亦民便隋文帝以倉廩尚虚議為水旱之備詔于蒲陜等十三州募運米丁又各置倉轉相灌注漕闗東及汾晉之粟以給京師隋制凡經過之處以丁夫逓運要害之處置倉塲収貯次第運之以至京師運丁得以畨休而不久勞漕船得以囘轉而不長運而所漕之粟亦得以隨宜措置而或發或留也唐都闗中嵗漕東南之粟髙祖太宗時用物有節而易贍水陸漕運不過二十萬石𤣥宗時裴耀卿請於河口置倉有武牢洛口等名使江南之舟不入黄河黄河之舟不入洛口而諸倉節級轉運水通則舟行水淺則寓於倉以待不滯比于曠年長運利便一倍有餘在當時未行又請罷陸運而置倉于河口凡三嵗漕七百萬石代宗時劉晏主漕事故時陸運斗米費錢十九晏命囊米而載減錢十江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河陰河船之運積渭口渭船之運入太倉嵗轉粟一十萬石無升斗溺者宋建都于汴漕運之法分為四路東南之粟自淮入汴至京師陜西之粟自黄河入汴至陳蔡之粟自闗河即恵民河入汴至京師京東之粟厯漕濟及鄆入五丈渠至京師四河惟汴最重漢唐建都于闗中漢漕仰於山東唐漕仰於江淮其運道所經止於河渭一路宋都汴梁四衝八達之地故其運道所至凡四路宋嵗漕東南米麥六萬斛漕運以儲積為本故置轉般倉于真今儀真楚今淮安泗今泗州三州以發運官董之江南之船輸米至三倉缷納即載官鹽以歸舟還其郡卒還其家汴船詣轉般倉漕米輸京師三倉有數年之備按宋人以東南六路之粟載于轉般之倉江船之入至此而止無留滯也汴船之出至此而發無覆溺也江船不入汴汴船不入江豈非良法歟竊以宋人都汴漕運比漢唐為便易前代所運之夫皆是民丁惟今朝則以兵運前代所運之粟皆是轉逓惟今日則是長運唐宋之船江不入汴汴不入河河不入渭今日江湖之湖各逺自嶺北湖南直達于京師唐宋之漕卒猶有畨休今則嵗嵗不易矣宋人又有載鹽之利今之漕卒比之宋時其勞有倍一嵗之間大半在途無室家之樂有風波之險洪牐之停留舳艫之衝激陰雨則慮浥漏淺澁則費推移沿途為將領之科率上倉為官攢之阻滯及其囘家之日席未暇暖而文移又催以兑糧矣運糧士卒其勞苦萬狀有如此者伏乞推行宋人轉船載鹽之法于今日少寛士卒之一分寛一分則受一分賜矣况其所賜非止一分哉按沙河即今淮安府板牐至新莊一帯是也本朝永樂十三年平江伯陳瑄因運舟泝淮險惡乃尋宋劉璠議開沙河以避淮水之險喬惟嶽繼自楚州至淮陰故道於是開清江浦五十餘里置四閘以通漕又於沿江一帯增堰以防走泄蓄水以資灌注引泉以備乾涸至今為利今日運道自儀真直抵潞河其間最險者有二所髙郵湖隄及徐吕二洪是也然二洪之險地也地有定形人可以用其力湖隄之險天也天無常變雖若非人力可為然人力勝天亦有此理髙郵之湖南起杭家觜北至張家溝共三十餘里唐李吉甫為淮南節度使始于潮之東亘南北築平津堰以防水患即今牽路在宋時又有斗門水牐本朝洪武九年知州趙原者始甃以甎永樂十九年加以甎之大者景泰五年又䕶以木椿實以甎土以備風浪往來舟楫方其天色晴霽風恬浪靜如行鏡中一遇西風驟起波濤洶湧人物淪亡不可勝計建議者往往欲于舊隄之外湖泊之傍别為隄一帯約去舊隄一二十丈下覆鐵釡以定其基旁樹木椿以固其勢就浚其中之土以實之用甎包砌一如舊隄其中舊有減水牐三座就用改作通水橋洞引湖水于内以行舟楫仍于外隄造減水牐以節水摯如此則人力足以勝天省官物之失䧟免人物之死亡為利實亦不小元史食貨志元都于燕去江南極逺而百司庶府之繁衛士編民之衆無不仰給于江南自伯顔獻海運之言而江南之糧分為春夏二運盖至於京師者嵗至三百餘萬石民無輓輸之勞國有儲蓄之富豈非一代良法歟按海運之法自秦已有之而唐人亦轉東呉粳􅀈以給幽燕然以給邊方之用而已用之以足國則始於元焉考元史論海運有云民無輓輸之勞國有儲積之富又云海運視河漕之數所得盖多故終元之世海運不廢作元史者皆國初史臣生長勝國習見海運之利所言非無徴者我朝洪武三十年海運糧七十萬石給遼東軍餉永樂初海運七十萬石至北京至十三年會通河通利始罷海運竊以自古漕運所從之道有三曰陸曰河曰海陸運以車水運以舟所運有多寡所費有繁省河漕視陸運之費省什三四海運視陸運之費省什七八今漕河通利嵗運充積固無資於海運也然會通一河譬則人身之咽喉也一日食不下咽立有死亡之禍請于未事之先而為意外之慮尋元人海運之故道别通海運一路與河漕並行江西湖廣江東之粟照舊河運而以浙東西瀕海一帯由海道運使人習知海道一旦漕渠少有滯塞此不來而彼來亦思患預防之計也夫海運之利以其放洋而其險也亦以其放洋今欲免放洋之害宜預遣習知海道者起自蘇州劉家港訪問傍海居民漁户竈丁逐一次第踏視泊舟港汊沙石多寡洲渚逺近委曲為之設法圖畫具本以防傍海通運之法是亦一良法且元史載海運自至元二十年始至天厯二年止備載嵗運所至之數以見其所失不無意也竊恐今日河運之糧每年所失不止此數况海運無剥淺之費無挨次之守而國家亦有水戰之備可以制服朝鮮安南邊海之患誠萬世之利也至元時韓仲暉等言自安民山開河北至臨清凡二百五十里引汶絶濟直屬漳御建閘三十有一度髙低分逺近以節蓄洩賜名會通河按會通河之名始此至我朝洪武二十四年會河淤往來者悉由陸以至徳州下河永樂初起造北京糧道由江入淮由淮入黄河運至陽武由陸運水運至北京厥後濟寧州同知潘叙正因州夫逓運之難請開會通河朝命工部尚書宋禮發丁夫疏鑿以復故道又命刑部侍郎金純開黄河故道分水以益漕河自是始罷海運專事河運盖永樂十三年也明年平江伯陳瑄又請濬淮安安莊牐一帯沙河自淮以北沿河立淺舖築牽路樹栁木穿井泉于是漕法通便噫元之為此河河成而不盡以通漕盖天假元人之力以為我朝之用也又按厯代建都於西北者皆仰給東南之漕都長安者阻闗陜之險漕運極難所資者江淮渭河都洛陽汴梁兼資汴洛汝蔡而已惟我朝建都幽燕東至於海西暨於河南盡於江北至大漠水涓滴皆為我國家用其功最鉅者其運河由江而入䢴溝繇淮而度上清口經徐吕二洪沂沁泗水至濟一居運道之中所謂天井牐即元史所謂會源牐也諸水畢會于此而分流于南北此盖居兩京之間南北中分之處通議諸牐天井居其中臨清總其會居中者如人身之有腰脊也總會如人身之有咽喉腰脊損則四支莫運咽喉閉則五臟不通濟寧居腹裏之地而多有旁出之途臨清乃會通河之極處漕路之要害也東控青齊北臨燕趙且去邊闗不逺疾馳之騎不浹旬可到為國家深長之思者請跨河為城兩際各為水門以通舟楫而包圍巨牐在于其中設官以司啓閉屯兵以為防守亦思患預防之一事也圖書編卷五十三
