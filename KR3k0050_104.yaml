body:
  text: 圖書編卷一百四明章潢撰先師廟總敘記曰凡始立學必釋奠於先聖先師又曰凡學春官釋奠於先師秋官亦如之周禮建國之學校凡有道有德者使教焉死則以為樂祖祭於瞽宗右所謂右學也樂祖之祀先師之謂也故釋者以先聖為周公若孔子先師為禮樂詩書之師若禮則高堂生樂則制氏詩則毛公書則伏生可以為師者生則師之死則祀之四時之學將習其道則釋奠各以其師此則自漢以上其禮可知也東漢以來始以孔子為先師蓋孔子刪述六經以教萬世非復一鄉之道德一經之師承誠萬世斯文所共師報德報功無盡崇祀之典於是為不可易矣先師廟制先師廟唐武德二年詔國子監立孔子廟以四時致祭貞觀四年詔州郡縣皆作孔子廟崇寧中詔辟雍文宣王殿命大成嘉靖九年改稱大成殿為先師殿額用丹字用黃金飾兩廡俱用朱塗之郡縣學同廟門宋初國子監文宣王廟門立戟十六枚政和中廟門增立二十四戟後改大成門嘉靖九年改稱大成門仍為廟門額用丹字用黃金飾泮池天子之制辟雍四圍皆水象全壁也郡縣學皆用其半魯頌采芹采藻采茒皆在泮水象半壁也櫺星門中為神道入謁先師者由左出由右以石為柱以水為門上半如窗櫺下全用板先師廟祀典廟建于大學東中奉安先師孔子南向復聖顔子宗聖曽子述聖子思子亞聖孟子東西列稍後為十哲兩廡先賢先儒九十一位丹墀西為瘞位南為廟門門東宰牲亭神厨西神庫特敬門南為外門國初祀孔子于國學洪武十五年建大成殿大成門永樂年建廟京師如制嘉靖九年改殿為先師廟門為廟門廟北建啓聖公祀中奉安啓聖公神位左右先賢顔無繇曽點孔鯉孟孫氏配兩廡先儒程珦朱松蔡元定從祀祠前有門祭期每嵗春秋二仲月二丁日祭之其時用仲以四時之正也其日用丁取隂火文明之象也先師廟南京在南京國子監東中至聖先師孔子南向主朱地金書復聖顔子宗聖曽子述聖子思子亞聖孟子配享以下主俱赤地黑書東西相向稍從先賢閔損冉耕冉雍宰豫端木賜冉求仲由言偃卜商顓師十哲從祀亦東西相向兩廡從祀東先賢淡臺滅明原憲南宫適商瞿漆雕開司馬耕有若巫馬施顔辛曹恤公孫龍秦商顔高壤駟赤石作蜀公夏首石虔奚容針顔祖秦祖句井疆公孫句兹縣成燕伋顔之僕樂咳狄黑孔忠公西蒧施之常秦非申棖顔噲先儒穀梁赤高堂生毛萇杜子春韓愈程皓邵雍司馬光胡安國許衡歐陽修西先賢宓不齊公冶長公哲哀高柴樊須公西赤梁鱣冉孺伯虔冉季漆雕哆漆雕徒父商澤任不齊公良孺公肩定塢單罕父黑榮旗左人郢鄭國原亢亷潔叔仲會邽巽公西輿如陳亢琴張步叔乘先儒左丘明公羊高伏勝孔安國董仲舒后蒼王通周惇頥程頥張載朱熹呂祖謙張栻胡瑗楊時陸九淵蔡沈真德秀凡九十一人丹墀西為瘞位南為廟門東為宰牲亭神厨西為神庫南為外門嵗仲春秋上丁遣國子監祭酒祭先十五日本寺委協律郎提調樂舞生執事于神樂觀演禮樂先十日案令典簿廳通行南京文職大小衙門知會陪祭某日午後沐浴更衣于本衙門宿歇某日為始致齋二日至日早各具祭服隨班行禮乃委監禮官二員呈堂行屬一體知會施行先四日寺卿少卿會同禮部尚書侍郎祭酒司業詣神樂觀更衣演樂仍同往犧牲所省滌牲先三日博士典簿同禮部四司司務詣觀演樂是日博士書寫祝文呈堂先一日清晨寺官俱乘馬鼓樂迎香亭祝文牲帛詣先師廟同祭酒司業監禮御史祠祭司郎中導引至丹墀行一拜禮詣彞倫堂上相見遣官填祝版名觀演禮同詣宰牲所省牲排陳設牲品樂舞生陳設樂器午後寺官同看陳設先師祭品禮神帛一白色磁爵三黝牛一羊一豕一登一鉶二簠簋各二籩豆各十四配各禮神帛一白色爵三羊一豕一鉶二簠簋各二籩豆各八十哲各爵三豬肘一鉶一簠簋各一籩豆各四共帛二白色西廡每三位爵三豬肉三簠簋各一籩豆各四是夜寺官具服入殿內行一拜禮立于西哲下贊引對引導遣官哲廡分獻官由廟左門入典儀唱樂舞生就位執事官各司其事分獻官陪祭官各就位贊引引遣官至盥所贊搢笏訖訖出笏贊就位典儀唱迎神奏樂樂止贊四拜傳贊同典儀唱奠帛行初獻禮執事官各捧帛爵詣神位前贊引引遣官由東級上至先師廟左門入贊詣至聖先師孔子神位前搢笏奠帛獻爵出笏贊詣讀祝位樂暫止贊跪傳贊同贊讀祝贊俯伏興平身傳贊同奏樂贊詣復聖顔子神位前搢笏奠帛獻爵出笏詣宗聖曽子神位前儀同詣述聖子思子神位前儀同詣亞聖孟子神位前儀同贊復位樂典儀唱亞獻禮執事官各捧爵自獻訖典儀終獻禮儀同典儀唱飲福受胙贊引贊詣飲福位引遣官至殿內贊跪搢笏飲福酒受胙贊出笏俯伏興平身復位贊二拜傳贊同典儀唱徹饌奏樂樂止典儀唱送神奏樂贊四拜傳贊同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣瘞位唱望瘞奏樂執事官各捧祝帛饌下級贊詣望瘞位贊引引遣官哲廡分獻官瘞所焚訖贊禮畢其分獻官初獻讀祝時贊引引十哲分獻官至先師廟左右門外立兩廡分獻官至廡門外立待廟內贊詣亞聖孟子神位前哲廡分獻官進詣各神位前奠帛獻爵復位亞獻終獻同祝文皇帝謹遣某致祭于至聖先師孔子惟師德配天地道冠古今刪述六經垂憲萬世惟兹仲春秋謹以牲帛醴齊粢盛庶品祇奉舊章式陳明薦以復聖顔子宗聖曾子述聖子思子亞聖孟子配尚饗樂章樂六奏樂生四十六人舞六佾文生三十六人迎神咸和大哉孔聖道德尊崇維持王化斯民是宗典祀有常精純並隆神其來格於昭聖容奠帛初獻寧和自生民來誰底其盛維師神明度越前聖粢帛具成禮容斯稱黍稷非馨維神之聽亞獻安和大哉聖師實天生德作樂以崇時祀無斁酒酤惟馨嘉牲孔碩薦羞神明庶幾昭格終獻景和百王宗師生民物軌瞻之洋洋神其寧止酌彼金罍惟清且旨登獻惟三於嘻成禮徹饌咸和犧象在前籩豆在列以饗以薦既芬既潔禮成樂備人和神悅祭則受福率遵無越送神咸和有嚴學宮四方來宗恪恭祀事威儀雍雍歆兹惟馨神馭還復明禋斯畢咸膺百福月朔釋菜先師爵三葅一醢一果二厥明獻官進廟門通贊唱排班班齊闢戶贊冉拜引贊贊詣盥洗所洗訖贊詣至聖先師孔子神位前跪獻爵俯伏興平身贊詣復聖顔子宗聖曽子述聖子思子亞聖孟子神位前儀同哲廡分獻官同獻訖贊復位通贊贊冉拜闔戶唱禮畢啓聖祠啓聖公左右先賢顔無繇曽點孔鯉孟孫氏配享兩廡先儒程珦朱松蔡元定從祀祭先師日遣南京國子監司業祭啓聖公祭品帛一爵三羊一豕一簠簋各二籩豆各十四配東西各帛一爵三豬肉二簠簋各一籩豆各四廡東西同是夜導引引遣官至盥所贊引贊詣盥洗所搢笏洗訖出笏典儀唱執事官各司其事贊就位典儀唱迎神贊四拜分獻官同典儀唱奠帛行多獻禮執事各捧帛爵三于神位前贊引引遣官由廟門左入贊詣啓聖公孔氏神位前搢笏奠帛獻爵出笏詣讀祝位跪贊讀祝贊俯伏興平身分獻官同贊詣先賢顔氏神位前搢笏奠帛獻爵出笏贊詣先賢曽氏神位前詣先賢孔氏神位前詣先賢孟氏神位前儀同分獻官同贊復位典儀唱亞獻禮執事各捧爵跪獻于神位前唱終獻禮儀同唱徹饌唱送神贊四拜分獻官同典儀唱讀祝官捧祝掌祭官捧帛饌各詣瘞位唱望瘞捧祝帛至瘞所贊詣望瘞位焚訖贊禮畢祝文皇帝謹遣某致祭于啓聖公孔氏云云惟公誕生至聖為萬世王者之師功德顯著惟兹仲春秋特用遣祭以先賢顔氏先賢曾氏先賢孔氏先賢孟孫氏配尚享國初上如江淮府先謁文廟幸學至南昌亦如之洪武元年令仲春秋上下傳制遣官祭先師於國學丞相初獻翰林學士國子祭酒亞終獻四年國子司業濂上孔子廟堂議曰世之倫莫此為甚吾不知其何説也古者士見師以菜為贄故始入學者必釋菜以禮其先師其學官時祭皆釋奠今專用春秋非矣釋奠有樂無尸釋菜有尸無樂是二釋之重輕以樂之有無也今襲用魏漢律所製大晟樂乃先師所謂亂世之音可乎哉古者釋奠釋菜名義雖存而儀注皆不可考開元禮倣佛儀禮饋食篇節文為詳所謂三獻獻後各飲福即君胙主人主婦及賔之義也今憚其煩唯初獻得行之可乎哉他如廟制之非宜冕服之無章器用雜乎雅俗升降昧乎左右此類甚多雖更僕不可盡若乃建安熊氏欲以伏羲為道統之宗神農皇帝堯舜禹湯文武次而列焉臯陶伊尹太公周公暨稷契夷益傅説箕子皆天子公卿之師式宜秩祀天子之學若孔子實兼祖述憲章之任其為通祀則自天子下達茍如其言則道統益尊三皇不汨於醫師太公不辱於武夫矣昔周立四代之學學有先聖虞庠為舜夏學以禹殷學以湯東校以文王復可取當時左右四聖成其德業為之先師以配享焉此固為天子立學之法也上不喜謫濓安逺知縣是年令進士釋褐行釋菜禮更定釋奠祭器禮物擇監生及文職大臣子弟在學校者充樂舞生五年罷孟子配享踰年上曰我聞孟子辨異端闢邪説發眀孔子之道宜配享如故六年翰林國史院學士承旨詹同侍講學士樂韶鳳上釋奠樂章舞六佾禮部尚書牛諒上禮儀制曰可遣御史大夫陳寧釋奠胡丞相言誠意伯不陪祭顧受胙上曰基學聖人之道不陪祀使勿學者何以勸既不與祭而享胙禮乎奪俸一月寧坐不舉奪半月七年仲春上丁日食改仲丁仍以正月三十日降香用禮記曽子問當祭日食牲至未殺則止也五年新作文廟成遣官以太牢祭上遂視學釋菜始詔司府州縣衛學通祀孔子頒釋奠儀正嶽鎮海瀆城隍及忠臣烈士封號大成至聖文宣王及配享通祀諸賢儒如故十七年議大成樂二十六年頒大成樂器於天下府學令州縣學式於府學二十九年從行人司副楊砥議罷揚雄從祀進祀董仲舒文皇帝即位之八月遣官釋奠先師永樂八年正文廟聖賢繪塑衣冠正統元年刋定從祀名爵位次二年進宋儒胡安國蔡沉真德秀從祀三年禁祀孔子於釋老宫今祭物非所産者以所産代八年從輔臣士竒議追封元吳澄為臨州郡公從祀景泰六年加太學兩廡祭物成化二年追封仲舒為廣川伯安國建寧伯沉崇安伯德秀浦城伯十二年祭酒周洪謨請改大成至聖為神聖廣運加服衮冕十二籩豆舞八佾又著古者鳴球琴瑟堂上之樂笙鏞祝敔堂下之樂而干羽舞於兩階今干羽居上而樂器俱下宜正如禮下禮官議尚書鄒幹言正統十二年御史請加封孔子英宗不允今考聖神廣運乃伯益贊堯之詞不若大成至聖於孟子中庸猶可擬議洪武中建南京大學廟用神聖當時祭酒訥碑文曰像不土繪陋習乃革今廟望像徒仍元舊不忍撤毁故有冕旒原非國典籩豆佾舞之數祖宗品式且在不敢撤議惟佾數居下宜令太師考正上從之洪謨又請上曰専崇孔子朝廷盛典籩豆佾舞從洪謨言𢎞治元年上視學從吏部尚書忠請薄奠用太牢加幣是年諫官請罷况融弼雄從祀進祀禮部侍郎兼翰林學士薛瑄下禮官集議言雄已出於洪武時瑄無著述况等皆有羽翼聖經之功遂以當是時以詹事兼侍講學士敏政言融弼戴聖劉向賈逵何休王肅杜預八人宜罷從祀鄭衆盧植鄭玄服虔范寧五人宜祀於其鄉况雄實相伯仲言者併欲黜向宜也申棖申黨本一人祀宜存棖家語七十弟子不及公寮秦冉顔何遽爰林放宜祀瑗於衛祀放於魯寮及冉何宜罷祀禮記傳於后蒼王通胡瑗皆宜從祀顔淵子思配于廟殿而父坐庭廡非禮宜别立祠廟中祀啓聖王以把國公無繇萊蕪侯點泗水侯鯉邾國公孟孫氏配享永年伯珦獻靖公松從祀下禮官議不可遂已郴陽何孟春言七年子有公孫尼子者作樂記緇衣宜從祀敏政不及尼子何也或曰尼子即龍也四年祭酒鐸疏言宋儒楊時息邪放淫承孟氏之傳衍晦翁之𣲖雖晚年一出不克盡行其志而力闢新經足衛吾道若吳澄年長于淳祐舉貢於咸淳受宋之恩已如此其久為國子司業為翰林學士厯元之官乃如彼其榮迹其所為曽不及洛邑之頑民何敢望首陽之高士况二人皆太學之師乞升時上祔宋諸賢之位斥澄下從莽大夫之列不報八年大學士溥又言時入朝首請罷安石配享廢其新經有衛道之功或疑其出處之際而少其著述殆未之考也上從之追封時將樂伯從祀十四年鐸以侍郎領祭酒事又言人倫莫大於君臣父子顔曽思三子配享堂上而其父列兩廡下非禮宜於闕里則祀叔梁紇而以路晳子魚配吳澄宋氏遺臣不恥事元名節掃地宜罷從祀禮官議不合遂已嘉靖九年世宗皇帝從輔臣璁議作正孔子祀典説改大成文宣王為至聖先師孔子四配為復聖顔子宗聖曽子述聖子思子亞聖孟子從祀及門弟子先賢左丘明以下稱先儒去塑像設木主罷公侯伯諸封爵申黨申棖二人存棖去黨寮冉何况聖向逵融休肅弼預澄十三人罷祀放瑗玄衆植虔寧七人祀于其鄉進后蒼王通胡瑗歐陽修從祀又以行人薛侃議進陸九淵從祀改稱大成殿為先師廟大成門為廟門璁又引敏政説請别立祠祀齊公叔梁紇稱啓聖公孔氏以無繇點鯉孟孫氏祀稱先賢珦松蔡元定從祀稱先儒撤無繇點鯉從祀從之上以改稱先師故皮并服謁廟用特奠帛行釋奠禮迎送神各冉拜三樂三奏六武六佾配從祀賢儒又啓聖祠分奠用酒脯遂幸太學南京遣官祭告先師先是稱大成至聖文宣王四配兖國復聖公郕國宗聖公沂國述聖公鄒國亞聖公十哲左費公閔損薛公冉雍黎公端木賜衛公仲由魏公卜商右鄆公冉耕齊公宰豫徐公冉求吳公言偃陳公顓孫師兩廡東金鄉侯淡臺滅明任成侯原憲汝陽侯南宫適萊蕪侯曽點須昌侯商瞿平輿侯漆雕開睢陽侯司馬耕平陰侯有若東阿侯巫馬施陽榖侯顔辛上蔡侯曹恤枝江侯公孫龍馮翊侯秦商靁澤侯顔高上邽侯壤駟赤成紀侯石作蜀巨平侯公夏首膠東侯后處濟陽侯奚容針富陽侯顔祖滏陽侯句升疆鄄城侯秦祖即墨侯公祖句兹武城侯縣成汧源侯燕伋􅬁句侯顔之僎建成侯樂㰰堂邑侯顔何林慮侯狄黑鄆城侯孔忠徐城侯公西赤臨濮侯施之常華亭侯秦非文登侯申棖濟隂侯顔會泗水侯孔鯉蘭陵伯荀况睢陽侯榖梁赤蕪侯高堂生樂夀伯毛萇彭城伯劉向中牟伯鄭象緱氏伯杜子春長鄉伯盧植司空王肅司徒杜預昌黎伯韓愈豫國公程皓新安伯邵雍溫國公司馬光建寧伯胡安國華陽伯張栻將樂伯楊時魏國公許衡西單父侯宓不齊高密侯公冶長北海侯公晢哀曲阜侯顔無繇共城侯高柴夀張侯公伯寮益都侯樊須巨野侯公西赤千乘侯梁鱣臨沂侯冉儒沭陽侯伯虔諸城侯冉季濮陽侯漆雕哆高苑侯漆雕徒父鄒平侯商澤當陽侯仕不齊辨平侯公羊儒新息侯秦冉梁父侯公肩定聊城侯塢單祁鄉侯罕父黑淄川侯申黨厭次侯榮旗南華侯左人郢朐山侯鄭國樂平侯原亢胙城侯亷潔博平侯叔仲會高堂侯邽選臨朐侯公西輿如內黃侯蘧伯玉長山侯林放南頓侯陳亢陽年侯琴張博昌侯步叔乘中都伯左丘明臨淄伯公羊高乘氏伯伏勝考城伯戴聖曲阜伯孔安國廣川伯董仲舒岐陽伯賈逵扶風伯馬融髙密伯鄭玄任城伯何休偃師伯王弼新野伯范寧道國公周敦頥洛國公程頥郿伯張載徽國公朱熹開封伯吕祖謙崇安伯蔡沉浦城伯真德秀臨川郡公吳澄先師廟太常寺在國子監永樂年建廟京師制如南京嵗仲春秋上丁祭先十五日題遣輔臣一員行禮委協律郎率樂舞生演禮樂先四日奏致齋示長安門先一日示持敬門是日百官朝服侍班上御皇極殿傳制遣官博士詣先師廟同遣官填祝版本寺官同遣省牲詣彞倫堂演禮是午陳設同看籩豆是夜行禮祝文樂章兩京皆同月朔釋菜禮兩京同皇帝幸學行釋奠禮先十五日禮部題請欽定分奠官九員本寺委協律郎率樂舞生演禮樂先二日同光祿寺奏看牲次日具本復命午後樂舞生陳設樂器是夜陳設先師祭品禮神帛一白色爵三太牢一脯醢各一果三四配十哲兩廡及啓聖公配廡同惟無帛太牢至日上至廟門外降輦禮部鴻臚導入廟門御幄禮部奏請具服上具皮辨服禮部請行禮太常寺官導上出導引官導上由中道進廟門級上典儀唱樂舞生就位執事官各司其事內贊對引導上入廟內奏就位百官各就位分獻官各列于百官前北向立典議唱迎神作樂樂止奏兩拜傳贊同典儀唱行釋奠作樂奏搢圭寺卿捧帛跪進於右上受帛獻畢授御奠於神位前少卿捧爵跪進於右上受爵獻畢授少卿奠于神位前內贊奏出圭分奠官以次獻官爵于各神位前退樂止典儀唱送神作冉拜傳贊同寺卿詣先師前啓帛奉出中門奏禮畢內贊導上由中道出導引官導至御幄更翼善冠黃袍禮部入奏請幸彞倫堂上升輿禮部鴻臚導大學樂止樂章迎神初獻送神俱同正祭𢎞治元年奉欽依尊先師當以禮只孔子前加幣用太牢改分獻為分奠其餘儀物俱照永樂年例行初即位幸學行釋奠禮又遣官祭告于闕里啓聖公祠兩京同先期題遣國子監祭酒行禮天下各布政司府州縣學釋奠儀注凡祭器品物樂章樂器舞佾俱與國學同又釋菜禮同前各布政司及府州縣長官一員行三獻禮或提調官及儒學教授等官行一獻禮齋戒正祭前三日獻官并陪祭官執事人等沐浴更衣散齋二日致齋一日省牲正祭前一日執事者設香案于宰牲房外贊引引獻官常服詣省牲所贊省牲執事者牽牲從香案前過入宰牲房宰之遂