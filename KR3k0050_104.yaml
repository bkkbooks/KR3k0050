説齊梁諸君不能用退與萬章之徒序詩書述孔子之意作孟子七篇以正人心濟世之功不在禹下宋元豐追封鄒國公配享次顔子元至順加亞聖公今祀稱亞聖孟子十哲先賢閔子東孔位稱名損字子騫魯人少孔子十五嵗子其孝季氏使為費邑宰辭曰如有復我者則吾必在汶上矣唐開元贈費侯宋大中祥符加琅琊公咸淳改封費公今祀稱先賢閔子後倣此先賢冉子西一位子名耕字伯牛魯人以德行名有惡疾孔惜之曰斯人也而有斯疾也唐贈魯侯宋大中祥符加封東平侯咸淳改鄆公先賢冉子東二位以名雍字仲弓魯人伯牛之族寬洪簡重德行名子貢曰不遷怒不深怨不録舊罪是冉雍之行也餘見魯論家語唐贈薛侯宋封下邳公咸淳改薛公先賢宰子西二位五名豫字子我魯人以言稱問三年之喪帝之德皇帝之年及他言行具魯論家語唐贈齊侯宋大中祥符封臨淄公咸淳改齊公先賢端木子東三位頴名賜字子貢衛人少孔子三十一嵗悟冠孔門弟好掦人美亦不匿人過孔子化之卒聞性與天道受一貫之旨田常欲作亂于齊憚高國鮑晏故移其兵欲以伐魯孔子聞之謂門弟子曰夫魯父母之國國危如此二三子何為莫出子路請行孔子止之子張子石請行孔子弗許子貢請行許之至齊説田常以次説吳越及晉諸君遂亂齊存魯破吳強晉而霸越孔子曰夫存魯善之初願若夫強晉以弊吳使吳亡而越霸者賜之説也美言傷信慎言哉後厯相魯衛卒終于齊餘見魯論家語越記史記唐贈黎侯宋大中祥符加黎陽公咸淳改黎公先賢冉子西三位十名求字子有魯人仲弓之族少孔子二有九嵗好學博藝省物而勤恭老恤幼不忘賔旅季氏卒以政事稱唐贈徐侯宋大中祥符封彭城公咸淳改封徐公先賢仲子東四位直名由好勇亢喜聞子路卞人少孔子九嵗治蒲三年孔子過蒲入其境曰善哉由也恭敬以信矣入其邑曰善哉由也忠信以寬矣至其庭曰善哉由也明察以斷矣田疇盡易草萊甚辟溝洫深治此其恭敬以信故其民盡力也墉屋完固樹木甚茂此其忠信以寬故其民不偷也庭甚清間諸下用命此其明察以斷故其政不擾也由事衛事出公輒蒯瞶與大夫孔悝謀入衛出公奔魯蒯瞶入由在外聞之造蒯瞶瞶與孔悝登臺由曰君焉用孔悝請得而殺之蒯瞶弗聽於是子路欲燔臺蒯瞶懼乃下石乞盂黶攻由擊斷其纓由曰君子死而不冠不免遂結纓而死唐贈衛侯宋大中祥符改河內侯咸淳加衛公先賢言子西四位文名偃字子遊吳人少孔子四十五嵗以學名行履不妄先成其慮及事而用之宰武城以禮樂教民邑人皆絃歌詳見魯論唐贈吳侯宋大中祥符加封丹陽公咸淳改封吳公先賢卜子東五位信名商字子夏衛人少孔子四十四嵗篤謹守善説詩見魯論世傳詩序云出卜氏孔子沒商居西河教授為魏文侯師唐開元追封魏侯宋大中祥符加封河東公咸淳改封魏公先賢顓孫子西五位嵗名師字子張陽城人少孔子四十八習于容止問行則書諸紳學干祿孔子教以慎言行詳見魯論家語子貢稱其美功不伐貴位不喜不侮不佚不傲無教非聞聖人之教而進德之驗與唐贈陳伯宋大中祥符加宛丘侯咸淳改陳國公升十哲位東廡四十七位先賢淡臺子名滅明字子羽武城人少孔子三十九嵗有君子之資貴之不喜賤之不怒行不由徑非公事不見邑宰唐開元贈江伯宋天中祥加加金鄉侯宋高宗曰南止江沱學者雲從先賢原子名憲字子思宋人少孔子三十六嵗問耻聞克伐怨欲語見魯論孔子卒憲亡在草澤中子貢相衛而結駟連騎排藜藿入窮閻過謝憲攝敝衣冠見子貢子貢耻之曰夫子豈病乎憲曰吾聞之無財者謂之貧學道而不能行者謂之病若憲也貧也非病也子貢慙不懌而去終身耻其言之過也唐追封原伯宋大中祥符加任城侯宋高宗曰軾彼窮原達士所賔先賢南宫子名適字子容一字子芝亦曰南容孟僖子之子仲孫閲也獨居思仁以智自將慚羿奡師禹稷日三復白圭孔子以其兄之子妻之唐追封剡伯宋大中祥符加汝陽侯宋高宗曰尚德君子爾乃兼之先賢商子名瞿字子木少孔子二十九嵗受易于孔子傳楚人馯臂子𢎞𢎞傳江東人矯子庸疪疪傳燕人周子家堅堅傳淳十人光子乘羽傳齊人田子莊何何傳宋武人王子傳同同傳災川人楊何何元朔中以治易為漢中大夫先是瞿年長無子其母為取室孔子使之齊瞿母請之孔子曰無憂瞿年四十後當有五文夫子已而果然唐追封蒙伯宋太中祥符加封須昌侯宋高宗曰洗心傳世知幾其神先賢漆雕子名開字子若一字子開蔡人習尚書不樂仕孔子使開仕對曰吾斯之未能信子説唐追封滕伯宋大中祥符加封平輿侯宋髙宗曰謙以有立多士莫及先賢司馬子名耕字子牛宋人兄桓魋作亂牛憂之魯孔子曰內省不疚夫何憂何懼餘詳見論唐贈向伯宋大中祥符加封楚丘侯政和改封㫿陽侯宋高宗曰在汚能潔危而有慮先賢有子名若字子若魯人少孔子十三嵗強識好古道言孝弟為仁之本禮貴和而有節比哀公厚斂以鳳麟海嶽狀孔子詳見語孟禮經孔子既沒弟子以事孔子之禮事之唐追封汴伯宋大中祥符加封平陰侯宋高宗曰兩端發問末啓機鋒先賢巫馬子名施字子斯陳人少孔子三十嵗陳司馬以孔子問巫馬施語見魯論唐追封魯伯宋大中祥符加封東河侯宋高宗曰天清日明密雲曷有師命持蓋子亦善扣惟夫子博三才允究學者之樂所得遂茂先賢顔子名辛字子桞魯人少孔子四十六嵗唐追封蕭伯宋大中祥符加封陽榖侯宋髙宗曰孰封于蕭實為子桞夙飲格言克尊善誘明德期馨賢業所就以侑于儒傳芳逾茂先賢曹子名恤字子循蔡人少孔子五十嵗唐贈曹伯宋大中祥符加封上蔡侯宋高宗曰肅肅曹伯王室之裔積習樂道切磋明義惟善則主爾德是類史筆有煥令名永祀先賢公孫子名龍字子石楚人少孔子五十三嵗齊田常為亂將移其兵以代魯孔子欲止其兵以存魯子石請行孔子弗許唐贈黃伯宋大中祥符加封枝江侯宋髙宗曰黃伯著祀公孫是云彌縫中道協輔斯文藏修方異漸漬甚勤史詞不忘播為清芬先賢秦子名商字丕茲魯人父董與孔子父以德力並稱家語書丕慈史記書子丕今書從左傳云唐贈上洛伯宋大中祥符加封馮翊侯宋高宗曰孔父秦父相尚以德俱生賢嗣相與維則是父是子致結疇克會辨儒林令名無極先賢顔子名高一名刻字子驕魯之有力人也孔子去衛適陳過匡高為僕以其䇿指之曰晉吾入此由彼缺也唐追封琅琊伯宋大中祥符加封雷澤侯宋高宗曰微言既彰德音孔昭已詠雩舞同聽齊韶先賢穰子名駟赤字子徒秦人唐贈徽伯宋大中祥符加封上邽侯宋高宗曰執經請益載道若無詩書規矩問字楷模得時而駕領就諸儒先賢石子名作蜀字子明成紀人唐贈成紀伯宋大中祥符加封成紀侯宋高宗曰懋依有德克述無言鼓篋槐市掦名里閈此道久視彼美常存先賢公子名夏首字子乘魯人唐贈元父伯宋大觀加封巨平侯先賢石子名虔一名石虔字里之齊人唐贈營丘伯宋政和加封膠東侯宋高宗曰攬道之華秉德之柄深造間城不乖言行先賢奚容子名針字子晳魯人唐贈下邳伯宋大中祥符加封濟陽侯宋高宗曰幼則有造成則祖述文采日化儒效力弼永觀厥成德音秩秩先賢顔子名祖一名相字子襄魯人唐贈臨邑伯宋大觀加封富陽侯先賢句子名井疆字子孟衛人唐贈淇伯宋大觀加封滏陽侯先賢秦子名祖字子南魯人唐贈少梁伯宋大中祥符加封鄄城侯宋高宗曰守道之淵成德之博範若鑄金契猶發藥先賢公祖子名句兹字子之魯人唐贈期思伯宋大中祥符加封即墨侯宋高宗曰與賢俱進得聖而師彬彬雅道翼翼令儀先賢縣子名成字子橫一字子棋魯人唐贈巨野伯宋大中祥符加封武城侯宋高宗曰擅譽魯邦啓祚巨野煒矣風猷時哉用舍先賢燕子名汲一名級字子思秦人唐贈漁陽伯宋大中祥符加封汧源侯宋髙宗曰至道克傳賢達斯執善政云茂儒風可即先賢顔子名之僕字子叔魯人唐贈東武伯大中祥符加封寃句侯宋高宗曰志鋭所期道尊是輔泥在釣陶木就規矩先賢樂子名㰰字子聲秦人唐贈昌平伯宋大中祥符加封建成侯宋高宗曰信道之篤見善乃明引領高節載思惟誠先賢狄子名黑字晢之一字子晢亦字子素衛人唐贈臨濟伯宋大中祥符加封林慮侯宋髙宗曰遊泳德化掦厲素風偉識既異持教乃隆先賢子蔑子名忠字子蔑孔子伯皮之子唐贈汶陽伯宋大中祥符加封鄆城侯宋髙宗曰佩服至倫鯉則弟昆三問三已所問殊溫君子歸密義不掩恩先賢公西子名蒧字子上一字子尚魯人唐贈祝何伯宋大觀加封徐城侯宋髙宗曰以德則貴惟道是倡師聰師明友直友諒先賢施子名之常字子恆魯人唐贈乘氏伯宋大中祥符加封臨濮侯宋高宗曰參稽百行贊理三綱自拔行間䇿名甚光先賢秦子名非字子之魯人唐贈汧陽伯宋大中祥符加封華亭侯宋髙宗曰傳道克正垂名允藏執德以𢎞用心必剛先賢申子名棖字子續孔子曰吾未見剛者或對曰申棖唐贈魯伯宋大中祥符加封文登侯宋髙宗曰逸駕文囿鼓枻儒流冠佩既然言動允休先賢顔子名噲字子聲魯人唐贈濟隂伯宋大中祥符加封濟陰侯宋髙宗曰儒室振領聖門曵裾賢業素藴美才以攄先賢榖梁子名赤字元始魯人作春秋傳與左氏公羊并行于世或曰榖梁得春秋之旨而失之短或曰春秋聖人之作其辭危其旨逺其義微得其旨于一字一句之間亦難乎其為功矣唐貞觀詔從祀宋大中祥符追封襲丘伯政和睢陽伯今祀稱先儒榖梁子云後倣此先儒高堂子名生字漢之魯郡人禮經秦火而書不具獨髙堂生能言之傳十七篇后蒼戴慶等明其業唐貞觀詔從祀宋大中祥符追封萊蕪伯先賢毛子名萇趙人大毛公亨之子受詩于大毛公為河間獻王博士號小毛公馬融賈逵鄭康成皆宗之唐孔頴達為疏傳學者迄于北宋歐陽修王質下逮朱子乃盡舍其説而言詩唐貞觀詔從祀宋大中祥符追封樂昌伯先儒后子名蒼字近君東海剡人也事夏侯始昌始昌通五經蒼通詩禮為博士至少府事漢文帝授翼奉蕭望之匡衡衡授琅琊師丹伏里遊君頴州蒲昌君都君都為詹事理高密太傅太傅家世傳業丹大司空由是齊詩有翼匡師伏之學昌滿授九江張邯琅琊皮容皆至大顯益衍其傳嘉靖九年詔從祀先儒杜子名子春東漢人授周禮于劉歆傳鄭興鄭衆時號囊括六典網羅衆家云唐貞觀從祀宋大中祥符加封緱氏伯先儒韓子名愈字退之唐南陽人舉進士操行堅正為監察御史時極論宫市德宗怒貶山陽令民感其惠愛生子多以韓名為裴度行軍司馬説韓𢎞協平吳元濟遷刑部侍郎憲宗迎佛骨入禁中愈極諫貶潮州刺史為文祛鱷魚患潮人知學自愈始鎮州亂殺田𢎞正立王庭湊愈奉詔宣撫既行衆皆危之穆宗悔詔愈度事從宜無必入愈曰安有受君命而滯留自顧疾驅入及復喻庭湊及諸叛卒平之轉吏部侍郎長慶四年年五十卒贈禮部尚書諡文當貞元元和間愈以六經之文為諸儒倡著原道原性師説諸篇粹然一出于正日光玉潔用排佛老一也宋元豐七年從祀追封昌黎伯先儒程子名皓字伯淳河南洛陽人厯官諸邑務德化為御史論新法終宗正丞詳具國史上殿劄子具大儒奏議其學得之周敦頤傳楊時諸子著定性書語録具五經四書注性理大全傳布學宫文彥博題其墓曰明道先生弟頥志之曰先生得不傳之學于遺經以興起斯文為己任辨異端息邪説使聖人之道煥然復明於世孟子之後一人而已宋淳祐詔從祀元至順加封豫國公諡純先儒邵子名雍字堯夫其先范陽人從父古徙衡漳又徙共城弱冠遊河南葬其親伊水之上遂家焉少慷慨欲樹功業於書無所不讀既而受學于李之才得河圖洛書宓羲易卦圖象妙語神契得先天之旨著皇極經世今入性理大全傳布學宫雍初至洛蓬蓽環堵不芘風雨躬樵㸑以事父母屢空而怡然自樂富弼司馬光吕公著程皓程頥張載雅重之恆相從遊嘉祐舉遺留守王拱辰以雍應詔詔授將作監簿復舉逸士補潁州團練推官皆固辭其言必依仁義賢者悅其德不肖者服其化熙寧十年卒六十有六贈祕書省著作郎元祐中贈諡康節咸淳詔從記追封新安伯先儒司馬子名光字君實陜州夏縣人七嵗通左氏春秋寶元初進士纍官端文殿學士先是知永興軍上疏極言青苖役法不便出判西京留臺退居洛十五年哲宗初詔拜左僕射罷青苖法人謂元祐相業有旋轉乾坤之功元豐間受詔編治通鑑十九年始成嘗作稽古録厯年圖以備戒勸講濳虛太玄經注傳學者卒贈太師溫國公諡文正人稱洓水先生咸淳詔從祀先儒胡子名安國字康侯崇安人紹聖中進士授太學博士靖康初太常少卿起居舍人皆辭高宗時張浚薦為中書舍人兼侍講獻政論二十一篇以疾求去留兼侍講専講春秋纍官給事中謝良佐稱如大冬嚴雪百草萎死而松柏挺然著春秋傳其學本于程頥而義有激于時云卒諡文定正統三年追封建寧伯詔從祀先儒張子名栻字敬夫綿竹人魏公浚之子頴悟夙成以古聖賢自期仕為直祕閣浚開府治戎栻內贊密謀外參庶務間以軍事入奏孝宗異其對召為吏部左侍郎每召對皆修身務學畏天恤民後知江陵府卒諡曰宣所著有論孟太極諸書解學者稱南軒先生其語録今取入經書及性理大全傳布學宫宋景定詔從祀追封華陽伯先儒薛子名瑄字德閏河泮人登永樂辛丑進士厯官禮部左侍郎兼翰林學士體貌清竒五臟露如水晶年七嵗嵗即通論孟垂髫李參議請見而不往及為山東提學僉事王振以士竒薦尋擢大理少卿瑄受命不謝竟以罪繫獄猶讀易不置也時石亨請敕與歸教授鄉里瑄引許衡故事固辭不受其學一宗朱子以復性為本以居敬為要清而不詭和而不同實可與宋大儒相伯仲而視許衡則過焉者也所著有讀書録河汾集行于世學者宗之稱薛天子云贈禮部尚書諡文清隆慶五年詔從祀先儒胡子名瑗字翼之泰州人纍舉不第以范仲淹薦官至太常博士嘗為蘇湖二州教授立經義治事二齋倡明體適用之學嚴條約以身先之經解至有要義懇懇為諸生言治己而後治人出其門者皆敦尚行實其後主太學四方歸之庠舍不能容自乾道景祐以來學者有師惟瑗與孫明復石守道三人而瑗之徒最盛弟子記其經論曰胡氏口議程頥言凡從安定先生學其醇厚和易之氣望之可知也嘉靖九年詔從祀先儒陳子名獻章字公甫新會人正德間卿薦後徴授翰林院檢討初學於吳康齋歸而求之書册未得乃靜坐久之然後心體隱然呈露去耳目支離之用全虛圓不測之神故其學以超然致虛為宗涵養沖粹所著白沙遺集萬厯十年從祀先儒王子名守仁字伯安諡文成餘姚人舉進士後以擒宸濠功封新建伯天性超卓其學無所不究自謂良知兩字從千辛萬苦中得來故隨人提揭指示海內翕然宗之若夫功業文章皆其緒餘耳萬厯十年從祀啓聖祠啓聖公孔氏按叔梁大夫紇無子求娶于顔氏顔氏有三女其父問曰陬大夫雖父祖為卿士然其先聖王之裔今其人身長十尺武力絶倫吾甚貪之雖年高性嚴不足為疑三子孰能為之妻二女莫對其幼徴在進曰從父所制將何問焉父曰即爾能矣遂以妻之禱于尼丘而生孔子宋大中祥符元年封孔子父叔梁紇為齊國公元大德十一年詔加封啓聖王國朝因之至嘉靖九年始改稱啓聖公云配享先賢顔氏名無繇字季路回之父也少孔子六嵗為魯卿士孔子始教闕里而受學焉唐贈把伯宋大中祥符加封曲阜侯元元統加贈杞國公先賢曽子名點字晢參之父也點侍孔子言志孔子喟然嘆曰吾與點也家語云點欲修禮教孔子善之記稱狂士唐贈宿伯宋大中祥符加封萊蕪侯先賢孔氏名鯉字伯魚孔子年十九娶宋之开官氏二十仕魯為委吏昭公以鯉魚賜孔子因以命名鯉過庭詩經之教與靣墻之戒俱見論語鯉學既通魯哀以帛聘之稱疾不行母死期年猶哭夫子聞之曰與誰門人曰鯉也孔子曰噫甚矣鯉聞遂除之宋崇寧贈泗水侯咸熙詔從祀先賢孟孫氏名激公宜鄒人魯公族也孟子之父或曰孟子之祖元追封邾國公嘉靖九年從祀兩廡先儒程氏名珦洛陽人宋仁宗朝纍官大中大夫周敦頥倡明道學官南安時年少不為守所知珦攝通守獨知之因與為友命二子皓頥從學焉及為郎故事當舉代每一遷輒以孰頥名聞于朝今祀稱先儒程氏云先儒朱氏名松字喬年婺源人舉進士厯仕詳國史性孝友重然諾不以生死二其心聞龜山楊氏傳河洛之學益自刻厲以敦本實用力于誠意致知時國步日艱人心日汨請建太學明人倫以倡節義教子熹從李延年學自知褊急害道取佩韋之義號曰韋齊今祀稱先儒程氏先儒蔡子名元定字季通建陽人沉之父也八嵗能詩日記數千言及長登西山絶頂忍飢啖虀于書無所不讀明隂陽消長逹古今盛衰居家以孝弟忠信為本教人以性與天道為先初往事朱熹知其學曰此吾老友也不當在弟子列韓伌胄禁偽學謫道州卒後賜諡文節所著有律吕新書今取入性理大全傳布學宫學者稱西山先生今祀稱先儒蔡氏釋奠先師考周禮大司樂掌成均五帝學名之法以治建國之學政而合國之子弟焉凡有道者有德者使教焉死則以為樂祖祭于瞽宗大胥春入學舍菜合舞舍音釋王制天子出征反釋奠於學以訊馘告月令仲春上丁命樂正習舞釋菜仲丁又命樂正入學習樂馬晞孟曰釋奠用丁為文明故也文王世子凡學春官釋奠于先師秋冬亦如之漢高祖過魯以太牢祀孔子平帝追諡孔子曰褒成宣尼公是時政出王莽假崇儒之名以收譽望遂姦謀安帝祀孔子及七十二弟子於闕里此祀孔子弟子之始魏正始中令太常釋奠祀孔子於辟雍以顔淵配晉武帝皇太子親釋奠于太學此太子釋奠之始南宋文帝採晉故事裴松之議應舞八佾宜設軒懸之樂元魏文成帝詔宣尼廟别敕有司行薦享禮有司薦享及有尼宣廟始于此唐太宗時房玄齡等議武德中詔釋奠于太學以周公為先聖孔子配享臣謂周公孔子俱稱聖人庠序置奠本緣孔子故學宋梁陳及隋皆以孔子為先聖顔淵為先師請停周公升孔子為先聖顔配從之又詔皇太子于國學釋奠于先師先聖皇太子為初獻國子祭酒為亞獻司業為中獻府州刺史為初獻上佐為亞獻博士為終獻縣學令為初獻丞為亞獻無博士以主簿為終獻又詔以左丘明卜子夏公羊高榖梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭康成服子慎何休王肅王輔嗣杜元凱范寧賈逵二十二人代用其書垂于國胄並合配享尼父廟高宗追贈孔子為太師顔回太子少師曽參太子少保並配享孔子廟玄宗時李元瓘言孔子廟顔回配其像立侍凖禮授坐不立授立不跪合從坐侍又四科閔子騫等雖列像廟堂不參享祀謹按何休等二十二賢猶霑從祀豈有升堂入室弟子獨不霑祀享之餘望請列享在二十二賢之上曽參孝道可崇凖二十二賢從享顔子等十哲宜為坐像悉令從祀曽參特為坐像坐十哲之次馬端臨曰禮記釋奠于先師先聖之説鄭康成釋先師以為聖禮有高堂生樂有制氏詩有毛公書有伏生之類自是後儒言釋奠者本禮記言先師者本鄭氏唐貞觀時遂以左丘明以下二十二人為先師配食孔聖夫聖作之者也師述之者也述夫子之道則莫如十哲七十二賢子思孟子舍是不録而皆取之釋經不知諸儒二十二子獨子夏無以議焉左丘明公羊高榖梁赤猶曰受經于聖人而得其大義至于高堂生以下謂之經師可矣非人師也如毛鄭之釋繹於名物固為該洽而義理間有差舛至王輔嗣之宗旨老莊賈景伯之附會讖緯則其學已非聖人之學矣又况戴聖馬融之貪鄙則其素履固當見擯于洙泗今乃俱在侑食之列而高第弟子除顔回外反不得與李元瓘雖懇懇言之而僅升十哲曽子儕于二十二子之列而七十二賢俱不霑享祀蓋拘于鄭康成之注而以専門訓詁為盡得聖人之傳也按塑像之設中國無人至佛教入中國始有也觀李元瓘言顔子立侍則像在唐前已有矣姚燧有言北史敢有造泥人銅人者有誅則泥人固非中國為主以祀聖人法也我聖祖灼見千古之非自天子以下像不土繪祀以神主數百年其教乃革夫國學廟貌天子視學實于是乎致禮聖人百世之師坐而不起猶之可也若夫從祀諸儒皆前代之縉紳或當代之臣子君拜于下而臣坐于上可乎竊恐聖賢在天之靈亦有所不安也或者謂已摶土為之一旦毁之似乎不恭竊觀聖祖詔毁郡邑城隍塑像用其土泥壁以繪雲山載在令用可考也矧此塑者豈真聖賢之遺貌哉今文廟之在南京者已行聖祖之制令京師國學乃因元人之舊正統中重修廟學惜無以此上聞者又追封孔子為文宣王顔子為兖國公閔損等九人為侯曾參等為伯宋真宗追諡孔子為玄聖文宣王費侯閔損以下皆為公郕伯曽參以下為侯魯史左丘明以下為伯尋以犯聖祖諱改玄聖為至聖聖祖御製文集其國子祭酒誥略曰太學之設所以教君之嗣貴臣之子名曰太學官稱祭酒司官之首者不徒教生從而已其職亦有在祀事且仲尼厯代崇其德王者親祭必寡故設官以代祭名曰祭酒所以祭酒之職潔牲牢精籩豆祭不失時則禮焉尚竭乃恭而臨祭靜乃心以對神庶不負委任之意神宗以孟子同顔子配食宣聖荀况楊雄韓愈並從祀徽宗從蔣靜請文宣王用冕十二旒服九章又詔躋子思從祀又詔先聖廟用戟二十四文宣王執鎮圭並用王者之制理宗加周惇頤張載程皓程頤封爵與朱熹並從祀孔子廟庭又加張栻吕祖謙伯爵從祀孔子度宗以顔回曾參孔伋孟軻並配孔子升顓孫師于十哲以邵雍司馬光從祀元成宗制加孔子號曰大成仁宗以許衡從祀孔子文宗加封顔回為兖國復聖公曽參郕國宗聖公孔伋沂國述聖公孟軻鄒國亞聖公又加孔子父母封爵始以董仲舒從祀孔子洪邁曰顔子之父路曽子之父點乃在廡下從祀之列子處父上神靈有知何以自安所謂子雖齊聖不先父食正此謂也姚燧曰江之左進曽子子思並顔孟列躋子張于曽子之舊由孟子而視子思師也由子思而視曽子又師也子思孔子孫也弟子于師孫于祖坐語道者有之非可並南靣燧之知四子也避讓于冥冥中不能一日自安其身一堂之上况又祀無繇點鯉于庭其失在于崇子而抑父夫為是學官將以明人倫于天下而倒施措置于數筵之地加此奚以為訓熊禾謂宜别設一室以齊國公叔梁紇居中南靣顔路曽晢孔鯉孟孫氏侑食西嚮春秋二祀當先聖酌獻之時以齒德之尊者為分獻官行禮于齊國之前其配位如之如此亦可以示有尊而教民孝矣國朝洪武三年禮部更定釋奠孔子祭器禮物正位犢一羊一豕一籩豆各十登一鉶一簠簋各二酒尊三爵三初孔子之祀像設高座而器物陳于座下弗稱其儀其來已久至是定擬各為高案其籩豆簠簋悉代以磁器是年詔曰孔子善明先王之要道為天下師以濟後世非有功于一方一時者所可比所有封爵仍宜其舊洪武十七年敕每月朔望祭酒以下行釋菜禮郡縣長以下詣學行香正統中以宋胡安國蔡沉真德秀元吳澄從祀按以先儒從祀非但崇德蓋以報功也是以在宋言者屢以歐陽修蘇軾孫復胡瑗為請而近日亦往往有以楊時羅從彥李侗為言事下儒臣議議者皆不之從以其無功于經也其已列從祀者若荀况戴聖馬融王弼杜預之輩屢有建請革去其祀者至今猶列在祀典豈不以弼等雖于德行有虧然弼有功于易預有功于春秋聖有功于禮有其舉之莫敢廢也臣考禮上釋奠于先聖先師而無從祀之説從祀之説始于唐太宗以左丘明等二十二人配先師也自是之後益以荀况揚雄韓愈宋南渡後始加以周程張朱邵馬及張栻吕祖謙元人又加以董仲舒許衡皇朝又加以此四人者蓋安國傳春秋沈注書德秀注太學衍義澄著諸經纂言是皆有功于聖門者已祀而黜者惟揚雄一人若孔孟以後之儒有功于聖經者無不祀夫惟楊時者從學于二程載道而南使之時則無朱熹矣宋金分裂之時程學分于南蘇學行于北雖伊洛之間不復知有程氏之學則時載二聖之道而南使堯舜禹湯文武周孔之道大行於斯世其功不可泯也乃不得於言性惡之荀况宗旨老莊之王弼附會讖緯之賈逵並祀于孔子之廟庭以從于二程之後朱吕之前豈非闕典歟先師祀典自嘉靖九年釐正改大成至聖文宣王為至聖先師孔子四配為復聖顔子宗聖曽子述聖子思子亞聖孟子從祀及門弟子俱稱先賢左丘明以下稱先儒去塑像設木主罷公侯伯諸封爵申黨申棖二人存棖去黨如公伯寮秦冉顔何家語原不載如荀况戴聖劉向賈逵馬融何休王弼王肅杜預吳澄俱照揚雄例罷祀于林放蘧瑗原不在弟子列并鄭衆盧植鄭玄服虔范寧各祀于其鄉近年復進本朝薛瑄從祀俱為定議然宋儒如謝良佐羅仲素李侗本朝如吳與弼胡居仁陳憲章王守仁舉入從祀不無望于今日崇儒重道之朝云范寧祀于其鄉宜也鄭玄雖未聞道而行誼之端訓釋之博恐不在高堂生后蒼之下至宋儒如吕大臨譙定胡宏張九成陸九齡李燔楊簡陳傅良葉適我朝羅綸蔡清羅欽順莊昶張元貞賀欽陳貞晟張倫弼議特祀於其鄉也得非其所宜乎噫况以言性惡黜弼以崇莊老黜逵以忽細行黜至揚雄吳澄所學又非諸儒比又皆以事莽事見黜士君子立身行已其于一言一行可不慎哉圖書編卷一百四
