body:
  text: 圖書編卷一百十八明章潢撰古陳法敘古陳法圖籍皆録舊記所傳風后握竒圖云初受之於玄女佐黃帝破蚩尤於涿鹿其文本三百六十字鎮名而已其後太公又增填之漢武帝令丞相公孫𢎞敷演其義授霍光常習八陳於長樂館而輔少主以令天下史稱諸葛亮推演八陳圖得其新意今夔州之南北崖沙中纍石為八陳形勢凡八行行相去二丈桓溫伐蜀路由之僚佐觀之無能知者視之曰此常山蛇勢也晉馬隆征西羌依八陳法且戰且行誅斬萬計遂復涼州以此論之公孫𢎞既已討論諸葛亮又能推演桓溫知其率然其後馬隆依以破敵則八陳之用無廢矣唐李簽所載八陳圖配四正四竒之位於八卦其形天圓地方風鋭其首雲左右向而垂飛龍盤屈虎張兩翼蛇宛轉鳥翔為突擊之勢定而不變及觀握竒經義則簽盡出臆度殊乖本文經曰天地前衝為虎翼風為蛇蟠天地後軸為飛龍雲之目變之則為龍虎蛇鳥之名所謂竒亦為正正亦為竒出則就列歸則復列正合此義也其圖已亡今載其經以侯識者宗陳法之始也右握竒經雖其圖不傳久矣今採其説列而為圖恐未必與古合更俟識者參訂之金鼓旌旗數角音二初警衆末收衆革音五一特召二結陳三鬭四赴五急鬬金音五一緩二止三退四背五急背麾色五一黑二黃三白四赤五青旗法八一天黑二地黃三風赤四青雲五天前上黑下赤六天後上黑下白七地前上黑下青八地後上黃下赤二革二金為天三革三金為地二革三金為風三革二金為雲四革三金為龍三革四金為虎四革五金為鳥五革四金為蛇此八陳各用金鼓之制也其金革之間加一角音者在天為兼風在地為兼雲在龍為兼鳥在虎兼蛇加二角音者全師進東加三角音者全師進西加四角音者全師進南加五角音者全師進北鞉音不止者師不整金革既息而角音不止者師並旋天圓不動前為右龍為左天地四望之屬是也風象天居兩端其次風其次雲在左右相向是也公孫𢎞曰地為靜地方布風雲各在後衡之前天居兩端其次地居中間兩地為北是也地為動天為從天陳變為地陳或即張形布勢破敵攻圍不定其形故為動也雲象龍縱布兩天兩天次之縱布四地四地次於天後縱布四風挾天地之左右天前衡居其左雲居端人多傳韓信注釋者與此微有差異而有范蠡樂毅之説相雜今亦錯綜於其中公孫𢎞解續説之意謂之上語其於部隊或三或五或三十或五十陳圖如此變通由人其八陳用方圓陳法以寡禦衆靣靣相向背背相承騎出其間出騎突擊馬隆以三千步卒敗羌萬騎用此術也按古所傳握竒經云出於風后即廖廓莫考然兵乘之法實自黃帝至周為尤詳比閭族黨州鄉之間隱然有勝兵焉天子無事嵗三田以供三品王親執路鼓教以坐作進退不用命者隨僇之凛凛若臨師然夫惟不以獵戲也乃其不以兵戲與甘誓牧誓左右步伐丁寧告戒皆先為不可勝故能決勝第不至詐如後世耳謂帝王無兵者誣也武侯八陳實出握竒法倣於井田善兵者莫能窮謂後世之法又加於古昔者淺矣握機經凡一十九字乃風后握機經古文也黃帝立井田之法因以制兵為握機陳法破蚩尤于涿鹿之野其臣風后實佐為萬世兵法之祖天地風雲龍虎鳥蛇四為正四為竒餘竒為握機此八陳方位四方龍虎鳥蛇當震兌坎離之位為正兵四隅天地風雲當乾坤艮巽之位為竒兵其餘竒零之兵大將居中所握猶弩之有機故曰握機易範曰以內制外必重輕之勢足以相權而無尾大不掉之患寧使之有餘不可使之不足也先出後躡棲盛擊虛潛見出入惟變所適故無一定之數昔人有泥八陳之名因謂八人為伍八伍為隊八隊為部八部為將八將為軍每圖皆虛其中遂使大將居中而無所握是尚得為兵制也哉不知陳名雖八陳數實九惟中之所握倍于外四正四正之兵倍于四隅所以為居重馭輕之勢也此圖名握機後圖名握竒而陳之隊伍稍異兹兩存之以備考八陳圖總敘夫冦不可與並生兵之不可弛也不教而戰是謂棄之師出以律否臧凶是故訓兵以禦敵申律以練兵安不忘危之義也八陳者象八卦以定位因井地而制形兵之紀律也武侯推演盡得其妙司馬懿之所以甘受辱而不敢輕出也自今觀之天有衡地有軸前後左右衝風雲之列四隅八陳之定位也却月環衛於後所以應八陳而為之羽翼也天覆出於南地載出於北雲垂變於東風揚變於西東南之變為龍飛西北之變為龍翼蛇蟠於西南鳥翔于東北却月則隨方分陳應之不滯乃間隊分兵聨絡互發其中之八陳却月固自若也是定位辨方設伏為援竒正之體也因敵變陳形由方遷遊以擁衛正以迭出竒正之用也竒正之相生端倪莫測小大視乎衆進退因乎敵散之有經聨之若一勞逸既均強弱適用兵之紀律孰有善於八陳者乎武侯既往世鮮有洞其趣者雖師律提綱具載圖設而遺却月夫遺却月則無遊兵何以為聲援而取勝乎握竒經曰四為正四為竒餘竒為握竒或總稱之先出遊軍定兩端天有衡地有軸前後為風左右為雲風輔於天雲輔於地衝重列各四隊前後之衝各三隊風居四維故以圓軸重列各三隊前後之軸各三隊雲居四角故以方天居兩端地居中間總有八陳陳訖遊軍從右躡其敵或警左或警右聽音望麾以出四竒天地前衡為虎翼風為蛇蟠圍繞之義也虎居於中張翼而進蛇居兩端向敵而蟠以應之天地後軸為龍飛雲為鳥翔突擊之義也龍居於中張翼而進鳥拔兩端向敵而翔以應之髙氏子略曰風后握竒經三百八十四字其妙本乎竒正相生變化不測蓋潛乎伏羲之畫所謂天地風雲龍鳥蛇虎則其為八卦之象明矣蓋注竒讀如竒偶之竒則尤可與易凖諸儒多稱諸葛武侯八陳唐李衛公六花皆出乎此唐裴緒之稱又以六十四卦之變其出也無窮若此則所謂八陳者八卦之統爾焦氏易學卦變至於四千九十有六竒正相錯變化無窮是可以名數該之乎然觀太公武韜且言牧野之師有天陳有地陳此同出于握竒而又有人陳焉此又出於天地之外者非八陳六花所能盡也獨孤及作風后八陳圖記有曰黃帝順煞氣以作兵法文昌以命將風后握機制勝作為陳圖故八其陳所以定位衡抗於外軸布于內風雲負其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔島上下其勢所以致用也至若疑兵以固其餘地遊軍以案其後列門具將發然後合戰弛張則二廣迭舉犄角則四正皆出圖成樽俎帝用經略北逐獯鬻南平蚩尤遺風冥冥神機昧昧唐天寶中客有得其遺制於黃帝書之外篇裂素而圖之按魚復之圖全夲於握機賾其妙窮其神者武侯而已師律提綱曰黃帝因井田以制兵井分四道八家共之其形井字開方九焉五為陳法四為間地虛其中大將居焉環其四靣諸部連繞此黃帝之陳法也風后因之以乾坤艮巽四間地為天地風雲四正以水火金木方向為龍虎鳥蛇四竒此風后之陳法也其陳制或六十步或六百步或千二百步而為開方之形或以竒為正或以正為竒竒正相生如循環之無端不可終窮也自是而降寥寥數千百年間世莫逹其藴奧惟諸葛孔明善推演其法故於平沙之上壘石為紋縱橫皆八其法六十四陳天衡十六陳居兩端地軸十二陳居中間天前衝四陳居右後衝四陳居左地前衝六陳居前後衝六陳居後風八陳附天雲八陳附地合為八陳天衡并前後衝二十四陳合風八陳為三十二陽地軸并前後衝二十四陳合雲八陳為三十二隂遊兵二十四陳在六十四陳之後凡行軍結陳合戰設疑補缺全在遊兵天地之前衝為虎翼風為蛇蟠兵家先隂以後為前又風從虎虎與蛇皆隂數同衛西北也天地之後衝為龍飛雲為鳥翔兵家後隂以左為後又雲從龍龍與鳥皆陽數同衛東南也以天地風雲為四正以龍虎鳥蛇為四竒謂八陳也每以二陳相從一陳之中又有兩陳一戰一守中外有輕重之權隂陽有剛柔之節彼此有虛實之地主客有先後之數所謂陳間容陳隊間容隊以前為後以後為前進無速奔退無遽走擊首則尾應擊尾則首應擊其中央則首尾俱應此桓溫所謂常山蛇勢也及夫蜀地險窄道出斜谷則裁之為六至唐李靖因之為六花陳此陳之大略也嚴陵計饒曰八陳圖有三一在沔陽一在廣都一在瞿塘而沔陽廣都者世莫覩獨瞿唐者在白帝城西魚復平沙之上每四月末至十月中則江漲所沒不可得見冬春復出如故信哉杜詩有云江流石不轉非虛誕也推演八陳始於隊伍而成營陳武經總要凡百人曰隊二隊曰官二官曰曲二曲曰部伍者五行生成之數也陳者八卦之象也八卦之象生於太極太極生兩儀兩儀生四象生八卦故將臺左列四陳右列四陳兩儀之象也左前十六隊左後十六隊右前十六隊右後十六隊四象之四象也南八隊北八隊東八隊西八隊南東八隊東北八隊西南八隊西北八隊八卦之象也遊兵者二十四氣之象也合圖遊兵環伏于後二層却月其義未顯惟變圖分為兩哨左列十二陳右列十二陳宛若天道之周旋然則十四陳者對待之隂陽也二十四陳者流行之隂陽也易有交易變易之義而八陳有分合變合之精所以五人為伍十伍為一隊加五旗軍而五十有五終於生成之數也天一地二天三地四天五地六天七地八天九地十天數二十有五地數三十凡天地之數五十有五所以成變化而行鬼神也八隊為一陳有四百四十人每隊以五十五人乘之八陳為一部有三千五百二十人而為小成可變陳也每陳四百四十人乘之其却月遊兵不載焉即一變而為天覆地載二陳回營已畢又二變而為風揚雲垂二陳回營已畢又三變而為龍飛虎翼二陳回營已畢又四變而鳥翔蛇蟠二陳是也八部為一將有二萬八千一百六十人而為中成八陳齊可觀也每小成三千五百二十人加遊兵一千三百二十八人以全隊出攻全隊留守南一部變天覆一陳北一部變地載陳東一部變雲垂陳西一部變風揚陳東南一部變龍飛陳西北一部變虎翼陳東北一部變鳥翔陳西南一部變蛇蟠陳遊兵却月於外有變仍分兩哨一守一攻其號令約束前後左右大小將士各從其局特入門中軍専設守警權命悉由中將以制治焉其所以謂天地風雲為四正龍虎鳥蛇為四竒者豈兵家䇿應而有常形哉如八靣有警則八靣正兵為正遊兵為竒如四靣正向有警則出四面正兵夾擊豈非以謂竒乎如四隅有警則出四正兵夾擊豈非以謂正亦以為竒乎是以活物隨形應變以勢非知道者其能然哉終於六十四卦也八將為一軍有二十二萬五千二百八十人而為大成故韓信曰多多益善每中成二萬八千一百六十人加遊兵一萬五百六十人共有三十萬九千七百六十人以前隊出攻前隊留守南一將變八陳東西四隅各變八陳遊兵一依中成分列隨機應變號令約束前後左右大將士各司其局特入門中軍専設守警權命悉由大將以裁成焉其布列營陳以將臺左列四陳右列四陳分作兩層駐劄而為小將左列四部右列四部亦分兩層而為中將左列四將右列四將亦分兩層而為大將其制陳以為千人可布六花陳每靣用六十步六華陳起於李靖外六軍一曰前鋒一曰後軍一曰左虞侯一曰右虞侯一曰左箱軍一曰右箱軍環而圍之象六出華中軍為竒外六軍為正內今三道其隔落鈎連曲折相對與八陳者同但八陳者方陳也六華陳者圖陳也以小成三千五百二十人布八陳每靣用一百二十步以中成二萬八千一百六十人每靣用六百步以大成二十二萬五千二百八十人每靣用一千二百步此言一靣方所用地步其小成每隊相離十八步中成每隊相離八十六步大成每隊相離一百七十二步此言四方相離步則內餘步數加中軍而為閠也小成小將居之中成中將居之大成大將居之是謂握竒之説也或夲握機以天後衝四隊東北西北風雲各二隊定作一號以地後衝四隊東北西北風雲各二隊定作二號以後地軸地後衝各二隊左右後天衡各二隊定作三號以後地軸四隊左右後天衡各二隊定作四號以前地軸四隊左右前天衡各二隊定作五號以前地軸地前衝各二隊左右前衡各二隊定作六號以地前衝四隊東南西南風雲各二隊定作七號以天前衝四隊東南西南風雲各二隊定作八號書於本隊旗上布列下營不得錯亂聞中軍舉號每陳皆間隊一二五六號先出三十六步止單擺開戰畢仍收作八陳為第一陳二次舉號三四七八號出過第一陳前三十六步止單擺開戰畢收作八陳為第二陳三次舉號第一隊又間隊每陳出五六號過第二陳前三十六步止單擺開戰畢仍收八陳為第三陳四次舉號第三陳又間隊每陳出七八號過第三陳前三十六步止單擺開戰畢仍收作八陳為第四陳次視中軍舉起火點鼓每陳又間隊一三五號不動二四六八號出前行十八步止天前衝四陳居前天後衝四陳居後天衡十六隊居兩端地軸十二陳居中間地前衝六陳居前地後衝六陳居後風八陳居四維雲八陳居四角自然而成八陳之規也直衝南前一靣之法如遇左右後有警亦依前例定號以次壘衝則不雜亂而行陳始整矣遊兵二十四陳分列兩哨每哨十二陳三陳定作一號共作四號分列兩層進止開闔間隊與八陳皆同惟下營之際掣環於後而伏之取勝衝擊全在乎遊兵也下營之時十二陳為一層共為二層以候遣用若分變各陳聽天鵝聲即時分列兩哨左哨十二陳如變天覆陳一號却月二號擊伏地載陳四號却月三號擊伏餘陳詳具分撥圖兩哨項下亦量隊內兵士衆寡全隊間隊分變守攻惟勤練勇悍者可充選鋒其實乃竒兵也四衝三成分撥圖説按圖説曰八陳為一部而為小成八部為一將而為中成八將為一軍而為大成是故三成者統同辨異之義也舉小成而中成可推也由中成而大成可推也譬之元氣雖無所不貫而耳目手足各有其司理一分殊兵法之所以為竒也舊圖舉小成以見例其詳不可悉聞也是故四衝者疉陳合體間亂而不亂之例也小成者分門立疊之詳也分撥者括八陳之用通進止之方緣義立圖因圖審機武侯之兵法不可推乎四正變例如南方有警南一將出四部天覆陳屬副統領之各至地界如小成令團營援敵以為正兵西南出二部蛇蟠陳東南出二部龍飛陳各屬副統節制以為竒兵兵為八陳遊軍從後躡焉餘三正方準此例推增損量形四竒變例如東北有警東北一將出四部鳥翔陳屬副統領之各至地界團營援陳以為正兵東出二部雲垂陳北出二部地載陳各屬副統節制以為竒兵餘三竒方準此例推總圖如隂陽之互藏其宅八陳分變實清濁之異其施故天雲龍鳥四陳屬陽清而垣居東南地風虎蛇四陳屬隂濁而垣居西北遊兵亦各以類相從進退開闔一隂一陽不啻春秋之有分節啓閉之有顯藏然元氣未嘗不周流統貫於其中是故大將者馭衆行師之元氣也智慮少滯則兵形無所統攝運動失其度外邪得以乘隙而入三軍之司命無寄寓矣可不慎與已上各陳變畢吹轉身喇叭鳴金吹打左右二哨各自八號起依次回營行歸本哨地方立定聽候擂鼓下旗放炮散隊右八陳敵法急則直衝緩則從門排擊乃一靣應敵之例桓溫所謂擊首則尾應是也若夫擊尾則撥在首各隊如例編號更相疉攻所謂擊尾則首應是也至于擊腹而撥首尾各隊如例編號左右合圍三靣掩擊所謂擊中則首尾皆應是也所以兵貴神速變貴風生是以謂之率然者速然也欲其應之速然而有氣也故應速而不亂接敵而不敗至若設伏據險圍合追襲夾攻衝擊引翼遊兵乃因形制利隨勢審機故應兵為正則夾擊圍伏為竒夾擊圍伏為正則應兵為竒彼此相用循環無窮固非廢陳以失律亦無泥陳以滯形為將者誠能習演精明應變開闔互發通貫可以行師矣夫旁流曲化神明時措則存乎推轂受鉞之重臣焉大抵用兵之法攻守而已量敵而進慮勝而會不為近功不事淺效若敵可攻則攻雖危地絶衢冒險犯逺有所不恤也可守則守雖挫辱百端攻撓窘迫有所不校也酌機審勢動惟厥時非天聰明睿智萬夫之望其孰能與於此圖説舊本示守之義居多布陳既成不務衝擊以治待亂堅壁而固使士卒一心敵無釁進是亦萬全禦侮之法也然守而無攻不知守也止而不動不知其靜也前勞後佚擊莫間遊軍無號令將安遣用觸首尾應兩廂俱救之説何驗哉是故攻之法熟則守之義行攻之義盡則守之法明攻守兼練坐作並修所以勞佚協軍勇怯同事上下融流聽聞不滯三軍有氣因勢受形號令日間攻守不亦善乎若夫將士有弓馬之修旗軍有長操之法朝習暮練較勇計功是亦司兵柄者之有事也右以常山陳步卒五部凡四千人居中前後左右等軍量山川土地之形按陳而已可以逸待勞以飽待飢其揚竒備伏皆馬騎分而為八凡二十人逐便而居以應權也六鼓舉龍旗則為常山矣按戰國䇿曰常山蛇擊尾其首救擊首其尾救擊其中首尾皆救此義也李靖陳法古今以來臨戎對敵每作四靣陳周回受敵以為必勝儻若選鋒而擊之其陳必破此非天殃將之失也亦或作長陳或作蛇陳皆以隊伍步騎相接或被之破一處即敗敗不全大將避潰師之罪移過於下遂使驍勇小將無罪受誅今則畫成定制各立陳名部曲分鬭各明竒正若失一陳則斬一將形勢既就諸戰陳相應猶手臂相救以此攻守萬無一失然以中軍為中黃陳次有若前衝行衝左突右擊白雲青蛇大赤大黑推凶決勝先鋒破敵以上除中黃之外餘十二陳以應十二辰大黑子大赤午破敵丑左突寅青蛇卯摧凶辰前衝已先鋒未右擊申白雲酉決勝戌後衝亥凡每八百人為一小方陳陳周圍十二隊五十人中間二百人並騎射長槍短兵等伏在陳中隨便衝擊其白雲青蛇大赤大黑既礙掩尾趁退每陳加騎長槍一百人凡都計馬步軍共萬八百人成一大陳其中三千人是騎射長槍馬軍除中黃大黑大赤白雲青蛇之外餘八陳每陳抽騎射弓弩一百人共八百人充遊突軍挑戰亂兵引敵如兵少即於隊中減人兵多即於隊中加數必要存其陳隊止即為營動即為陳逄賊告急鼓聲一發陳即立成更不在勞煩指布此則應變之法出入如神攻取皆勝所向無敵其小陳皆有四頭每頭配勇將一人用戰鼓一靣中兵立一大旗號凡每靣如有賊來攻擊即諸陳相應欲救南陳即南靣鼓動八百人一時順日向南轉戰東西北同此只轉步人騎兵不移每陳相去廣狹一百狀如街陌設詐挑戰引之令入即背他陳突出弓弩騎射長槍左右夾擊前抄其胸後掩其尾是以先為不可勝以待敵之可勝也此圖得之瞿太素乃兵家約之以為出入之道者也其次第一根諸洛書之九數從一而入由二歷三四以至五六七八而出之於九其中巷道委婉曲折周旋不爽苟一紊其次則在處堵截窒塞無從而出矣但識其門而入之也易由其道而出其門也難雖兵家之陳圖却有不可泥其圖而輕之者况引而伸之人心之應感天地之化生有出機焉有入機焉一本而萬殊殊途而同歸藴蓄中含未易窺測咸於此乎寓也若神明變化則存乎其人握竒八陳九疇陳圖總論用兵陳法肇於握竒非握竒外别有八卦九疇陳圖也兵之行止大將居中以握其樞機而兵之竒零分撥悉由大將以為之節制故握竒一也除中軍即八連中軍即九如井田區畫除中公即為八家連公田即為九區其義一而已矣真識此義凡四門六花十二二十四多寡錯綜皆不越八陳九疇之分合又孰能越乎握竒以為之變化哉陳法總説昔稱善師者不陳善陳者不戰此言伐謀制變先聲後實軍志素定奪敵人之心不待旗壘之相摩兵矢之相接而勝負之勢決于前矣其次則立部曲度權謀先偏後伍彌縫其闕用以乘機而佐勝由中古以來未之或改大要在士卒訓練兵械堅良號令以伸之賞罰以督之因山川形勢講步騎離合之要不囂不隘按陳而居常以我逸待彼勞常以我治待彼亂常以我近待彼逺常以我飽待彼飢故其疾如風其徐如林不動如山難知如隂震動如雷侵掠如火此制勝之道也法曰以正合以竒勝然則正者行陳也竒者無方以用變也竒不得正雖鋭而無恃正不得竒雖整而無攻故必交相用而後能百戰百勝矣故曰治衆如治寡非分數不能鬬衆如鬬寡非形名不輯三軍之衆可使受敵而無敗非竒正不成故有天陳地陳人陳以象三才直陳鋭陳曲陳方陳圓陳以法五行其體易明其習易成從昔之成法當今之可用且古者以言不相聞故為金鼓視不相見故為旌旗金鼓旌旗所以一人之耳目耳目既一則勇者不得獨進怯者不得獨怯勇怯並用出生入死誰與我敵哉若夫鳴一鼓舉黑旗則為曲陳鳴二鼓舉赤旗則為鋭陳鳴三鼓舉青旗則為直陳鳴四鼓舉白旗則為方陳鳴五鼓舉黃旗則為圓陳此應敵之略也凡卒一人居地廣縱各二步十人為列為隊則廣縱各二十步陳間容陳隊間容隊曲間容曲此行列之法也前禦其前後禦其後左防其左右防其右行必魚貫立必鴈行長以參短短以參長回軍轉陳以後為前以前為後進無速奔退無遽走四頭八尾觸處為首敵衝其中兩頭俱救此教習之詳也然則定兵誓衆者胡可忽而不務耶議者或曰武夫介士出于閭井非有明逹之資強敏之性而令心存進退耳聽金鼓手知擊刺足趨坐作隨旗變陳焱馳電發俄頃之際事自繁多則心迷意倦勞而無暇安能乘便奮鋭獵敵爭勝哉若但使聞鼓知進聞金知退辨旌旗之指麾習器械之便利粗知三四不必遍知亦足勒兵示法殺敵致果兹誠一端之論不為無旨然特施於忘戰之久市人之合或庶幾焉若乃提卒十萬深入賊境大軍在前堅城未下欲戰則勝負未決欲攻則利害難知非整飭車徒部分營壘或先據地之要害或先扼敵之襟喉蛇蟠月偃中權後徑疇能收萬全之勝哉秪如平原大野深林險道前丘後澤乘髙趨下頓兵擁衆呼吸俟命若不素練施設敢問何以處之然後知議者之言粗而不精也或曰唐人李簽號能言兵者其説曰兵猶水也水因地以制形兵因敵以制勝能與敵變化而取勝者謂之神則戰陳無圖明矣而庸將自以教習之法為戰敵之陳不亦謬歟是大不然簽之八合八離則雜而無章四竒四正則定而不變自膠其柱而謂瑟無五音其愚而妄決矣昔謂諸葛亮推衍八陳得其新意以巴蜀弱卒數萬東屯渭水天下震動司馬宣王以十萬之衆抗之堅壁不敢出會亮死僅能取勝馬隆以步卒三千案八陳圖轉戰千里破鮮卑數萬騎之衆以復涼州今謂二人為庸將可乎謂不為戰陳之陳可乎此簽之不足為凖也今取古今陳法繪出其圖以存梗槩俾將師度宜而行之若能沿古以便今聞一而悟十觸類以長此又寄之明哲要之與孫吳暗合為極致耳陳法考附黃帝制陳法獨孤及曰黃帝立井田之法因以制兵故其受命之始順殺氣以作兵法文昌以命將握機制勝作為陳圖夫八卦之位正則數不僣神不忒故八其陳所以定位也衡抗于外軸布於內風雲附其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢所以致用也至若疑兵以固其餘地遊車以按其後列弛張則二廣迭舉犄角則四竒皆出孫子曰善戰者其勢險其節短勢如彍弩節如機發紛紛紜紜間亂而不亂也渾渾沌沌形圓而不散也曲禮曰前朱雀而後玄武左青龍而右白虎招搖在上急繕其怒進退有度左右有局各司其局楚之陳名魚麗鄭之陳名鸛鵝即物以為名其布置之形狀殆類之歟吳起教戰之令短者持矛戟長者持弓弩強者持旌旗勇者持金鼓弱者給厮養智者為謀士鄉里相比什里相保一鼓整兵二鼓習陳三鼓趨食四鼓嚴辦五鼓就行聞鼓聲合然復舉旗唐太宗問李靖曰卿所制六花陳法出何術乎靖曰臣本諸葛亮八陳法也大陳包小陳大營包小營隅落鈎連曲折相對古制如此臣為圖因之故外畫之方內環之圜是成六花所號耳方生於正圜生於竒方所以矩其步圜所以綴其旋是以步數定於地綴應於天步定齊則變化不亂八陳為六武侯之舊法焉太宗曰天地風雲龍虎鳥蛇八陳何義也靖曰傳之者誤也古人祕藏此法故詭設八名爾陳本一也分為八焉若天地者夲乎旗號風雲者本乎蟠名龍虎鳥蛇者本乎隊伍之别後世誤傳詭設物象何止八而已乎太宗曰五行陳如何靖曰夲因五方色立此名方圓曲直才實因地形使然凡軍不素習此五者安可臨敵乎按韓擒虎每與李靖論兵輒歎曰可與論孫吳非斯人而誰其後仕唐平蕭銑於江陵獲輔公祏于丹陽擒頡利平吐谷渾太宗謂古韓白霍衛無以加矣説者謂靖與太宗問對之書乃宋阮逸假托考宋神宗命王震校正武經已有其書豈其然哉宋神宗曰黃帝始制八陳法敗蚩尤於涿鹿諸葛亮造八陳圖於魚復平沙之上壘石為八行此即九軍陳法也韓擒虎深明其法以授其甥李靖靖以時遭久亂將帥通逹其法者頗多故造六花陳以變九軍之法使世人不能曉之大抵八陳即九軍九軍者方陳也六花陳即七軍七軍者圓陳也蓋陳以圓為體方陳者內圓而外方圓陳則內外皆圓矣故以圓物驗之則方以八包一圓以六包一此九軍六花陳之大體也六軍者左右虞侯各一軍為二虞侯軍左右各二軍為四廂軍與中軍共為七軍八陳者加前後二軍共為九軍朕采古之法酌今之宜曰營曰陳本出乎一法而已止則為營行則為陳竒正則營為正陳為竒也按自古出師必有營有陳止而無營則無以自守行而無陳則無以制敵周禮大司馬四時之教中春振旅中秋治兵中冬大閲教以行陳之治也若夫中夏之茇舍教以止營之法也宋吳璘為疉陳法後張柔直之退范汝為用此法又劉信叔順昌之勝大槩亦是如此疉陳法大要在畨休遞上景泰四年兵科給事中鄭林操練團營軍士以軒轅氏之陳教閲軍伍具繪圖以進曰臣通考五經陳法莫有過於軒轅黃帝破蚩尤之陳夫古之蚩尤素稱善戰者也黃帝按井田作陳法大軍歸中權主旗鼓八節旋繞悉聽指揮若正北受敵則東北西北二陳為竒兵張左右翼以援之若正南受敵則東南西南二陳為竒兵張左右翼以援之其正東正西及四隅受敵亦如之所謂常山之蛇擊其首則尾應擊其尾則首應擊其中則首尾俱應者也古之名將知此法者惟太公望孫武子韓信諸葛孔明李靖諸人而已吳起以下莫能知也其名之曰天地風雲龍虎鳥蛇八陳者則諸葛孔明也一大陳之中固有八陳而小八陳之中亦各有八陳大陳則法伏羲八卦小陳則法文王六十四卦所謂陳間乎陳隊間乎隊者也若夫造遁甲有九星開八門用三竒者則自黃帝命風后為之也蓋聖人神道設教以神其術使人莫知其所以然也大將居以玄武之位而北嶽則常山蛇也故曰常山蛇陳兵不可以形求孔子則慎戰不命學軍旅露則潰陳可限而入又次而出之旋歷以為用誰其神哉圖非不言變化索神於可求非握非機餘竒為握竒所以九其八者有先司而無豫設其立圖虛布全局以待其一之相值規乎其為龍鳥皆言意也八陳圖陳列不圖戰演法陳不能演戰又動言竒靜言正又天冒而地顯又善為兵者不陳雖各有指亦各言其志也乎新都魚腹任其意之所就無慮其不同總論陳法師曷為而有陳也師者衆也衆之所萃易於混亂而無統將兵者無法以制之則分而不知所以合合而不知所以分金鼓之聲旌旗之節雜陳莫辨一遇衝擊則彼此不相顧而獸奔鳥散不可阻遏即自謀且不暇也而暇於謀人乎哉吁此陳法之不可不講也考之於古營陳法備於周禮而尤莫詳於握竒篇大司馬三軍之制萬有二千五百人為一軍小司徒乃合萬民之卒旅而用之伍兩軍師之中四竒四正而陳法寓焉至于四時之教仲春振旅仲夏茇舍仲秋治兵仲冬大閲又孰非使之習坐作進退之宜徐疾疏數之節乎黃帝征蚩尤之迹遐不可稽矣而戰國之時兵家著述謂八陳圖乃黃帝臣風后所制以取勝于涿鹿之野者今觀握竒所載八其圖所以定位衡抗于外軸布於內風雲附其四維所以構物而虎踞蛇蟠飛龍翔鳥弛張犄角離合不窮竒哉圖也雖未必出於風后之製而後之欲立營陳之法者孰能外之乎周之文武大聖人也神武不殺其用兵冝不必于圖矣而降崇之績鉤陳之壘且不廢焉宣王中興亦用此以制淮夷詩人歌之曰截彼淮浦王師之所又曰綿綿翼翼不測不克蓋美王師之無敵也漢興去周未逺陳法猶有能通之者而其君相亦究心武略敷演陳法以五營士為六十四壘習之於長樂館故當時將兵諸臣俱能勒功萬里之外大振中國之威豈非陳法章明而將士有所憑藉與自後精于圖者于三國有諸葛孔明為鼎立之時魏已有天下之半孔明提孤軍出斜谷司馬懿以蓋世之英雄率步騎四十萬而不敢決戰者知其陳之不可犯也至今魚復平沙之上舊迹不磨六十四壘播於前者八陳也二十四壘環於後如却月者遊兵也或直而方或曲而圓出入無方變化無滯其奪造化之神機晉桓溫見之謂為常山蛇勢蓋會之意義之表而非妄言者矣孔明而下能通其術者于唐有李靖焉靖之陳法雖授於韓擒虎而六花之陳方圓異其形九軍七軍異其數矣但七軍即九軍之變六花者內外俱圓八陳又未嘗不外方而內圓也觀其對太宗自言臣本諸葛亮八陳法但靖以時久戰伐將帥能逹是法者頗多故更亮之制使人不能窺耳若宋蘇軾謂司馬之法主於環曲所以固拒管子之法主於直鋭所以克捷則是古法局於營守後世専於進戰二者殆不相為用矣豈所以盡圖法之妙哉夫圖以決勝則治兵者之練兵盡于圖可也而張巡之教戰惟使士知將意將識士情嶽武穆之言亦曰陳而後戰兵家之常運用之妙存乎一心則二子之見有自得於陳法之外者故睢陽之守卒致江淮之保全而朱仙鎮之捷金將帥大懼且將棄城逺避焉此其故何也蓋法寓乎機而心寄於法可相和而不可相離者養由基以射名天下其法不盡於彀率而公輸子之巧又未有舍繩墨而専以目中者也是故孔明李靖精於法者兵固極天下之至安矣而機以神之又未嘗不及天下至變張巡武穆妙于機者兵固極天下之至變矣而法以紀之又未常不極天下之安譬之醫焉岐黃製方者也用方治病百無不中者而庸醫用之則反有以古方而誤人者盧醫扁鵲不用方者也膏盲之疾一望之而可知焉故有岐黃盧扁之術則用方可也不用方亦可也若非其人則用方不應不用方亦不應何者方不出于心而心亦無有以神乎方故也治兵者亦若是而已孔明李靖非所謂岐黃而張巡武穆非所謂盧扁也不知趙括知書長平敗績任福違制易水隳功皆往事之明鑒也歟機其可偏廢哉圖書編卷一百一十八
