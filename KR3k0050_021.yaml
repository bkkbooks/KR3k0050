body:
  text: 圖書編卷二十一明章潢撰四餘總叙日月水火土金水謂之七政亦曰七曜今術家増入月孛紫􅉋羅㬋計都四餘星為十一曜計生于天尾羅生於天首孛生於月􅉋生於閏葢日月行道如兩環兩環相交一處曰天首一處曰天尾天尾為計天首為羅月之行遲速有常度遲之處即孛也炁生于閏二十八年十閏而炁行一周天炁孛皆有度數無光象故與羅計同謂之四餘今七政厯亦有四餘躔度天首羅㬋續火之餘乃厯家之交初天尾計都續土之餘乃厯家之交終故羅㬋對照則日計都交終乃日月交㑹之坎交深則有餘在天無象其行度無伏順留遲萬厯五年十二月朔日羅㬋角七度計都者為天尾星續土之行常與羅㬋相對故曰首尾星也逆行於天逢日月則食從月交黄道求之月交之終始該三百六十三度七十九分三十四秒厯二十七日二十一分二十二秒二十四毫羅計於其間各逆行一度四十六分三十秒逆實順也其數併月行交終之度即黄道周天之度凡十八年有餘而周天九十三年而五周天至交初復在舊躔矣取上古甲子日月之交分為九十三號每號分為十二月而置閏於其下閏在號前那前一月閏在號後那後一月天乙紫氣續木之餘在天無象以木德最厚立此名以道歩其餘先其行度無伏見遲疾退留行平一日行三分五十七秒紫氣即景星也狀如半月生於晦朔助月為明其度起於閏法約二十八年而周天授時厯以十一日八十七分五十三秒八十四毫為一嵗之閏紫氣則一嵗行十三度五分四秒六十毫八十芒兩數比之乃加二之算二十八年十閏紫氣行十二宫亦加二之算也取上古甲子分為八十號每號分為十二月而置於其下閏在號前那前一月閏在號後那後一月萬厯五年十二月朔日紫氣張十四度太乙月孛乃水之餘在天無象古人以水星在天其行最疾其行無伏見遲疾平行日行十一分二十九秒星從月之盈縮而求盈縮一轉該二十七日五十五分四十六秒月行三百六十八度三十七分四秒半孛行二度十一分四十秒半黄道周天之度併孛行數即月行之數也凡六十二年而七周天月行最遲之處與之同躔矣取上古甲子分為六十二號每號分十二月而置閏於其下閏在號前那前一月閏在號後那後一月萬厯五年十二月朔日孛危十三度五星雖各一其明也雖各一其行度也要之皆視日以為隠伏遲疾若羅計紫氣孛星則皆隨乎月何也羅計躔度其數併月行交終之度月之盈縮視孛星所在與之同位為最遲與之同衝為最疾紫氣則狀如半月生於晦朔助月為明其平行之度皆與日無異是四餘皆助乎月者也雖無形象光明可覩而其魄之行于天者亦萬古常存如月之晦時也觀紫氣有時而見謂之為景星可類推矣夫羅乃火之餘孛乃水之餘紫氣乃木之餘金獨無餘氣焉彼以月為金精故無餘或亦有見於斯歟七政四餘總叙夫日月木火土金水謂之七政紫炁月孛羅㬋計都謂之四餘合七政四餘謂之十一曜凡天地之所以位萬物之所以育與夫四時之代謝隂陽之消長何莫而非七政四餘為之運行為之施化者乎故人事之吉凶悔吝得喪休咎亦莫能逃此古之聖人仰觀天文以驗人事良有以也然七政運行于天有遲有速有順有逆各司其職如人君之有政事故曰七政日月太陽人君之象月曰太隂君后之象其所照臨之位亦君后所至莫不福澤于民是為諸星之主但與羅計同度則為天變日食五星者木曰嵗星火曰熒惑土曰鎮星金曰太白水曰辰星其行度各有順逆遲留伏退之殊當其順軌入垣旺樂皆為福祥如值退逆尅鬭大為凶咎四餘者木之餘曰紫􅉋水之餘曰月孛火之餘曰羅㬋土之餘曰計都皆無形可見黙行于天亦無遲留伏逆而吉凶則各有所主金獨無餘者或謂金本不可分而月為金精故無餘也是五星四餘人臣之象職司執法亦各有所秉惟太陽太隂各安其位五星四餘各順其軌如聖君賢相都俞吁咈於朝堂故海宇黎庶並受其福一有不軌薄蝕凌犯如君相失德權奸操弄國柄海宇黎庶有不遭其荼毒者哉矧天人一氣上下感應㨗於影響君相果能克謹天戒則雖星象示警亦不為災一或侮慢自賢謂天變為不足畏未有不禍生靈而自罹其咎者可見天象之休徴咎徴所闗甚鉅故此卷獨詳於太陽太隂五星四餘各詳於後云十二月次乃日月所㑹之處凡日月一嵗十二㑹故有十二次建子之月次名元枵建丑之月次名星紀建寅之月次名析木建邜之月次名大火建辰之月次名夀星建巳之月次名鶉尾建午之月次名鶉火建未之月次名鶉首建申之月次名實沈建酉之月次名大梁建戌之月次名降婁建亥之月次名陬訾十二分野即辰次所臨之地也在天為十二辰十二次在地為十二國十二州凡日月之交食星辰之變異以所臨分野占之或吉或㐫各有當之者矣朱子辰天壤也每一辰各有幾度謂如日月宿於角幾度即所謂宿處為辰日月所㑹是謂辰注云一嵗日月十二㑹所㑹為辰十一月辰在星紀十二月辰在元枵之類是也然此特在天之位耳若以地而言之則南面而立其前後左右亦有四方十二辰之位焉但在地之位一定不易而在天之象運轉不停惟天之鶉火于地之午位乃與地合而得天運之正耳十二辰次考夀星爾雅角亢夀星也水土墓于辰木得水土氣故有夀後漢志自軫十二度至氐四度曰夀星之次漢地理志韓地角亢之分野也韓分晉南陽郡及詩風陳鄭之國與韓同星分焉唐志氐渉夀星當洛邑衆山之東與亳土相接次南直𨽻水之間為亢分又南渉淮氣連鶉尾在成周之東陽為角分唐地理志河南鄭許潁陳蔡諸州左𫝊魯梓慎曰陳大昊之墟鄭祝融之墟大火春秋左氏𫝊晉士弱曰心為大火公羊𫝊大火為大辰爾雅大辰房心尾也諸宿中唯房心尾及參㝡明故曰大辰書曰日永星火指房心也後漢郡國志自氐五度至尾九度曰大火之次漢地理志宋地房心之分野也今之睢陽是也濟隂定陶詩風曹國是也唐志商亳負北河陽氣之所升也為心分豐沛負南河陽氣之所布也為房分西接陳鄭為氐分其下流與尾同唐地理志河南宋亳徐宿鄲曹濮等州左氏𫝊晉士弱曰陶唐氏之火正閼伯居商丘相土因之故商主大火又鄭子産曰昔髙辛氏遷長子閼伯于商丘主辰大辰故辰為商星魯梓慎曰宋大辰之墟也析木爾雅尾箕析木津也木生于寅故名析木天漢所起故名曰津後郡國志自尾十度至南斗十一度曰析木之次漢地理志燕地尾箕分野也東有漁陽右北平遼東西有上谷代郡鴈門樂浪𤣥莬亦屬焉唐志析木為雲漢末派山河極焉尾得雲漢末派龜魚麗焉當九河之下流濱于勃􅀈皆北紀之所窮也箕與南斗相近為遼東之陽冬韓鮮三韓之地在呉越之東唐地理志河北瀛莫幽易涿平媯檀薊營安東諸州星紀古者厯紀日月五星皆起於牽牛之次故曰星紀後漢郡國志自南斗十二度至須女七度為星紀之次漢地理志呉地斗分野也今之㑹稽九江丹陽豫章廬江廣陵六安臨淮郡葢呉分也越地牽牛婺女之分野也今之蒼梧鬱林合浦交阯九真南海日南皆粤之分野也唐志南斗在雲漢下流當淮海間為呉牽牛去南河浸逺自豫章迄㑹稽南踰嶺徼為越分島夷蠻貊之人聲敎所不及皆狥國所繫云唐地理志河南濠淮揚楚滁和廬夀舒江南浙江福建嶺南詔廣康端封梧藤羅雷厓以東諸州韶𤣥枵爾雅𤣥枵虚也𤣥黒色枵虚中也後漢郡國志自須女八度至危十五度曰𤣥枵之次國語星在天黿星辰星天黿即𤣥武也漢地理志齊地虚危之分野也東有菑川東萊琅琊髙密膠東南有泰山城陽北有千乘清河西有濟南平原皆齊分野也唐志齊地得娵訾下流自濟東達於河外故其象著為天津絶雲漢之陽凡司人之星與羣臣之録皆主虚危故岱宗為十二諸侯受命之府又下流得婺女當九河末派比於星紀與呉越同占唐志地理河北滄景德河南青淄登萊齊棣州左氏傳魯梓慎曰今兹宋鄭其饑乎嵗在景紀雨滛於𤣥枵以有時菑不堪陽蛇乗龍蒼龍即嵗星也龍宋鄭之星嵗虚民耗不饑何為鄭裨竈曰今兹周土及楚子皆將死也嵗棄其次兩旅於明年之次以害烏帑周楚惡之娵訾爾雅營室東壁娵訾也室壁各五星如口象又在西北隅娵隅置也訾口象也後漢郡國志自危十六度至奎四度為娵訾之次漢地理志衛地東壁營室之分野也今之東郡及魏郡黎陽河内之野王朝歌皆衛分也唐志自閤道王良至東壁在豕韋上流當河内及漳鄴之南得山河之㑹為離宫又循河濟而東接𤣥枵為營室分唐地理河北孟懷澶衛及魏博相之南境河南滑等州左𫝊魯梓慎曰衛顓頊之虚也故為帝丘其星為大水營室也周萇𢎞曰嵗在豕韋弗過此矣衛在豕韋之國降婁爾雅降婁婁也萬物至戍皆降而聚於婁故曰降婁後漢郡國志自奎五度至胃六度為降婁之次漢地理志魯地奎婁之分野也東至東海南有泗水得臨淮之下相睢陵皆魯分唐志奎為大澤在娵訾下流鉅野之東陽至於淮泗婁胃之虚東北負山葢中國膏腴之地百榖之所阜也胃得馬牧之氣與翼之北土同占大梁爾雅大梁昴畢也昴畢間七曜所入要道若梁然又胃一名大梁後漢郡國志自胃七度至畢十一度為大梁之次漢地理志趙地昴畢之分野也趙分晉得趙北有信都真定常山中山東有廣平鉅鹿清河河間南至浮水繁陽内黄斥丘西有大原定襄雲中五原上黨唐志北紀之東陽表裏山河以藩屏中國為畢分循北河之表西盡塞垣皆髦頭之地為昴分翼之北土馬牧之所蕃庶故天苑之象在焉唐地理志河東代雲朔蔚武新嵐憲河北邢名慈具冀深趙鎮定及魏博相之北境實沈髙辛氏季子實沈主參後漢郡國志自畢十二度至東井十五度為實沈之次漢地理志魏地觜觹參之分野也其界自髙陵以東盡河東河内本殷之舊南有陳留及汝南之召陵潁川之舞陽河南之開封中牟陽武酸棗皆魏分唐志西河之濱所以設險秦晉故其地上應天闗南曲之隂在晉地衆山之陽南曲之陽在晉地衆山之隂隂陽之氣并故與東井通河東河北及河曲諸州皆東井分參代為戎索為武政當盡大夏之虚上黨與韓魏接為觜觹分唐地理志闗内麟豐勝銀夏單于安北河東河中潞澤以西至河河南洛陜負河而北左𫝊鄭子産曰昔髙辛氏遷季子實沈于大夏主參唐人是因武王邑姜夢帝謂已予命而子曰虞將與之唐屬諸參及成王滅唐而封大故參為晉星則實沈參神也蜀秦宓𫝊天帝布治房决政參代則益州分野三皇乘祗車出谷口今之斜谷是也鶉首後漢郡國志自東井十六度至栁八度為鶉首之次漢地理志秦地與東井輿鬼之分野也自𢎞農故闗以西三輔六郡南有巴蜀以南西有金城以西西南有䍧牱越嶲唐志東井居西河之隂自山河上流當地輅之西北輿鬼居兩河之陽自漢東盡華陽與鶉火相接當地絡之東南鶉首之外雲漢潜流而未達故狼星在江河上原之西􅋃矢犬雞皆徼外之備也西羌吐蕃吐谷渾及西南徼外夷人皆直狼星魏徙大梁則兩河合於東井秦拔宜陽則上黨入於輿鬼唐地理志闗内京兆華同鳳翔邠隴涇原渭武寧慶鄜坊丹延靈威雄㑹塩綏宥山南興元金洋以西及劒南余道鶉火栁為烏啄星為烏頸張為烏嗦三宿連體故總謂之鶉火後漢郡國志自栁九度至張十六度為鶉火之次漢地理志周地栁七星張之分野也今之河南淮陽諸孫是其分也唐志栁在輿鬼東又接漢源當商洛之陽接南河上流七星係軒轅得土行正位中央象也河南之分張直南陽漢東與鶉尾同占唐志地理河南洛陜員河而南虢汝許闗内商山南鄧隨泌諸州鶉尾南方七宿取朱鳥為象井鬼為首翼軫為尾故曰鶉尾後漢郡國志自張十七度至軫十一度為鶉尾之次漢志楚地翼軫之分野也今之南郡江下零陵桂陽武陵長沙及漢中汝南郡盡楚分也唐志翼與張同象當南河之北軫在天闗之外當南河之南其中一星主長沙逾嶺徼而南為東甌青丘之分安南諸州在雲漢上源之東陽宜屬鶉火而栁七星張皆當中州不得連負海之地故麗于鶉尾唐地理志江南江陵歸峽燕灃朗浚郢襄房淮南安黄中光蘄嶺南桂鬱林昭象容亷而西及安南黔中諸州天漢四瀆之精也起於鶉火經於西方之宿而過北方至於箕而入地下中興天文志石氏云天漢葢天一所生凝毓而成者天所以為東西南北襟帶之限也天下河漢之源葢出於此亦地所以為東西南北之限也漢張氏二八極之維徑二億三萬二千三百里南北則短减千里東西則廣増千里自地至天半於八極則地之深亦如之唐袁氏云以是觀之天漢起東北而止西南其脩徑可知矣自鶉首踰河戒東曰鶉火得重離正位軒轅之祗在焉葢寒燠之所均也自析木紀天漢而南曰大火得明堂升氣天市之都在焉皆和氣之所布也斗柄謂之外廷陽精之所布也斗魁謂之㑹府陽精之所復也柄以治外故鶉尾為南方負海之國魁以治内故娵訾為中州四戰之國其餘列舍在雲漢之隂者八為負海之國在雲漢之陽者四為四戰之國風者大塊之噫氣也天地之信化工之著也生物斂物終於艮始於艮止則生之義也東北調風言條治萬物而出東為明庶爾雅謂谷風東南為清明南為景風月令為温風西南涼也西為閶闔月令謂盲風西北不周也北為廣莫也順時而行為和夫時而行為姤道之變也春得西風麥不實夏秋得東風稻不實應盲風谷口之變八方風北方坎名曰廣莫風主冬至四十五日京房曰四時暴風起北方主盗賊起天下兵皆動令人病星帶下不起居北方主水主盗賊東北艮風名曰條風主立春四十五日四時暴風起北方鬼行人道多旱疫天下水令人病洩寒容冬春之交萬物改變艮為鬼門東方震風名曰明庶主春分四十五日四時暴風起東方人流盗起相攻天下旱宜相嵗飢令人病變節四肢不摇動東南巽風名曰清明主立夏四十五日四時暴風起東南方人多病洩痌乳婦暴病死南方離風名曰景風主夏至四十五日四時暴風起南方有火災來年旱人多病熱生瘡曰肓離為日西南方坤風名曰涼風主立秋四十五日四時暴風起西南方天下兵動日月失色令人食不入口病腰脊股膝眉皆腫坤為象故兵動陽衰故日月失色西方兑風名曰閶闔風主秋分四十五日四時暴風起西方主秋分早霜天下兵動日月食人多病瘡疥癬西北方乾風名曰不周風主立冬四十五日四時暴風起西北方有兵起天下饑荒盗賊相攻人流亡有兵不起日月失色地動人多病疸疥癘惡瘡病疫死喪暴右八方暴風起其方即依上占京房曰八方風候及八方卦氣春白夏黒秋赤冬黄紫下逢上兵革動各隨其部日辰占之乾為風一曰衝風坎為大割風艮為凶風震為嬰兒風巽為弱風離為大弱風坤為隂謀風一曰諫風兑為小弱風已上八風折木發屋飛沙走石三日不雨則占大凡風為陽雨為隂陽怒得隂則解故風怒得雨為解洪範庻民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨星指經星云者庻民之象言如星之衆而星之所尚有不同有好風者箕星是也有好雨者畢星是也漢志言軫星亦好雨星占言東井好風雨日月之行冬夏各有常度月之從星入箕則多風離畢則多雨宿軫則雨宿井則風夫日行黄道而月有九行每月周天則又以日為紀日有常度其從星者惟月按占書凡太隂所行各有變異此但舉風雨二者為例耳時有春夏秋冬風有東西南北是亦風氣一周而成一嵗也然恒風不應而有休廢之氣是則時政之失而廢天常也於是而有風角之占耳隕星總叙隕星者自上墜也星附麗於上者也君失道紀綱紊天下將叛去故星畔而隕以見其象大星隕下陽失其位灾害之萌也凡星所墜其國易政又曰當其有兵列宿下墜大亂三年又曰奔星所墜其下有兵列宿所墜滅家邦衆星所墜衆庶亡又曰隕星墜海水淡黄星騁海水躍太白􅀈星墜而渤海决周襄星墜隕如雨天子㣲諸侯為政五伯代興更為盟主衆暴寡大併小地天之分由此壞滅故隕星之灾比之流星為甚大也雲氣總叙周禮㬆侵氏掌十輝之法以觀妖祥辨吉凶一曰被謂隂陽五行之氣涵滛相侵也或曰抱弭背璚之屬如虹而短是也二曰象謂雲氣如赤鳥夾日之類也三曰觿日旁之氣刺日形如童子所佩之觿也四曰監謂雲氣監臨在日上也五曰暗謂日月食或曰先晩也六曰瞢不明也七曰彌謂如虹蜺彌天而日賈也八曰序謂雲氣若山而在氣上或曰冠珥背璚重叠次序在日旁也九曰隮謂暈氣或曰虹也詩所謂朝隮于西是也十曰想謂五色氣有形可想而知也風雨氣風雨氣色如魚龍行其色蒼潤或黄氣蔽日皆慘或如土或如累盆黄色潤厚朝東夕西壓日或掩之皆風雨之氣也朝視日上有黒雲氣如霧壓白日光旁射其色慘淡黄白者其日有風雨晩日欲入有之則夜有風雨雲氣如亂穰大風將至視其從來避之雲甚而潤大雨必暴至四餘之日有雲氣如陣厚而潤者多雨日始出有暈氣如車葢在日上者其日雨日上下有黒雲氣如蛟龍者必有風雨雲氣如黒蛇衡日其下有大雨月初生色黄者多晴色青多雨色潤白者大雨蒼白色入北斗多大風黄雲氣蔽北斗明日雨白氣掩北斗不過三日雨青雲掩北斗五日内必雨天無雲北斗上下獨有雲五日内必大雨日入後有白光如氣自地至天直入北斗所歴星皆失色其夜必大風太白出氣長數丈多風雨所指處兵大起辰星出氣長一丈大雨水霧蒙霾附總叙春秋元命苞曰隂陽氣亂為霧霧者百邪之氣本于地而應于天是謂冒陽其占為臣蔽主明小人擅權不利於上䝉者濛濛日不明也京房曰臣私禄及親兹謂罔碎厥異䝉又曰在天為䝉在地為霧日月不見為䝉前後人不見為霧䝉霧交錯隂邪干正人君不悟必有亡國河圖曰山冬大霧連十日以上不散者山崩之候也霧者水脉也雜占凡霧氣不順四時逆相交錯㣲風小雨積日不解晝夜昏暗者天下欲分離凡隂連十日晝不見日夜不見星亂風四起欲雨不雨其名曰䝉下人有謀上者洪範𫝊曰皇之不極厥罰恒隂將必有下人伐上霧氣若晝若夜其色赤黄更相掩冒乍合乍散者亦如之虹蜺總叙虹蜺者隂陽之交氣也隂陽之氣和則為雨露怒則為雷霆滛則為虹蜺虹者攻也陽攻隂也蜺者齧也災氣傷害於物如有所齧也一曰鎮星之精散則虹蜺又曰虹蜺者斗之亂精斗失其度則生之雄曰虹雌曰蜺日月之衝雙出色鮮明者為虹暗者為蜺蔡邕曰見於日衝曲而青紅者曰虹見於日旁魄而直者曰蜺虹蜺主内滛主惑心雷總叙雷於天地為長子主發生二月出地八十日雷出則萬物出八月入地八十日雷入則萬物入入則除害出則興利人君之柄也人君發號施令上合天道則雷以時而出以時而入若有不當發而發或當發而不發則皆號令失常之所致也霹靂總叙春秋繁露霹靂者金氣也其音商其霹靂振物者也釋名霹靂也者所厯皆破折震戰也所擊輒破若攻戰也霆總叙京房曰霆者金之餘氣也金者内鏡而外明㝠雜占風無雲而霆人君以暴罰也霆中天而見人君自以為明也霆如交蛇光明而正者人君行明而直也霆正赤下至地而復上者人君好聽䜛言也霆東西南北皆有者人君役行不避四時也霆直而長光明者人君行㣲人不知之也霆正黄而光澤人君行明電總叙電者陽精之發也先電而雷隨之者正雷先鳴而後電者隂勝陽也其占為人君失德賊臣將起電色黄電色白赤有大風雜占電而無雷君絶命雷而既息或未雨不雨發於潭洞溪壑之中者龍所為也不占雷先鳴而後電執法之人貪刻雷如聚火而從人君絶命電光晝夜爍地三日已上不止其所發處兵起電從日邊向月人多恐怖霧而人君黙行不得實而任情天下多寃雹總叙雹者勝陽雨水濕熱隂氣脅之而成雹也五行𫝊其占為臣制君亦為隂慘無思之象故凡雨雹所起必有愁怨不平之事在國都則咎在君相在外則各方之長吏當之感精符曰臣擅法則天雨雹雜占雹下殺飛鳥君信䜛言行罰於人也京房曰雹下毁瓦破軍殺馬者君任小人為政妄作威福也雹下剥木枝害五榖者上以酷政賦斂而殺人者也雹下多如精雪者臣欲殺君也雹下極地而暉者君私邪人而臣成之也雹下而積水者邊將臣為逆也雹下生芒狀如霜雪者人君酷欲害人也雹下而大風者君罰過度也霜總叙天氣下降而為露薄之而成霜霜所以肅萬物消漫沴當降而不降與當殺物而不殺物者政弛而慢不當降而降與不當殺物而殺者政急而殘故隕霜不殺草與隕霜不殺菽春秋皆書以記異在國都則戒在君相在外則戒在守土之官京房曰人君誅無辜則非時殞霜雜占京房曰霜所以成萬物刑罰所以誅不仁人君刑罰不當妄行誅殺則天應之以殞霜於春於夏臣依公結私誅罰無罪則霜下在土依公結私以宥有罪則霜附木殺罰不由上則霜見風而飛此皆刑罰不法之所致也雪總叙雪本雨也寒甚而空中風結以成之雪或過多或非時則為災雜占冬雪盈尺來年大豐八節占曰冬有積雪嵗美人和穆天子𫝊冬雪盈尺年豐之候京房曰雪附木不著地人君聽䜛殺忠臣也雪未至地而復上久而復下人君欲寛死罪也雪而温者君脱人有罪也氷總叙氷者太陽之精至柔而為剛隂極而生陽也當冰而不氷者政失之緩也未當氷而氷與當釋而不釋者政失之急故春秋書無氷皆國君失政雨總叙雨隂陽和而天氣交之所為也太平之世十日一雨不破塊京房曰太平之時一嵗三十六雨是謂休徴時若之應凡雨五日以上為霖久雨謂之霪雜占天無雲而雨謂之天泣其占為國易政若出軍逢之其軍必不還河圖曰主怒恚則無雲而雨抱朴子曰無雲而雨是謂雨血將軍當揚兵講武以應之雨大軍中尤甚者將死軍敗京房曰人君進無德庶無坊則不雲而雨露雜占露不降者天氣不下施也君不恤民之應其占為旱亦為其地有火災雲漢總叙雲漢一曰天漢一曰天河一曰河漢河漢起東尾箕之間乃分二道其南經𫝊説魚星天淵天籥天弁河鼓其北經歸星貫箕次絡南斗魁在旗至天津下而合南道乃西南行又分而夾匏𤓰絡人星杵星造父騰蛇王良附路閣道北端經太陵天船卷舌而南行經五車經北河之南入東井水位而東南行終南河闕立天狗天紀天稷至七星南而沒凡經十有九宿石氏曰漢乃為天一所凝毓而成者天所以東西南北襟帶之限也天下河漢之源葢出於此天文志河漢自坤抵艮為地之紀爾雅析木謂之津箕斗之間津也雜占漢天文志曰漢者金之氣也其本曰水漢中星多則少水星少則多旱風爾雅曰風迺雨土霾隂之氣曰噎日出而風曰暴迴風為飄焚輪謂之頺扶摇謂之颷李淳風曰按占風家多云發屋折木揚沙走石等語若每占中俱著此語其文至繁今取以一家列之古云發屋折木飛沙走石今謂之怒風多為不吉之象一日之内三移轉方占云四轉五復今謂之亂風亂風者狂亂不定之象無雲晴爽忽起大風不經刻而止絶絶忽復起古云暴風卒起乍有乍無今謂之暴風暴風至有卒暴事鳴條擺樹蕭蕭有聲今謂之飄風善惡依經㫖迅風逐塵蓬勃古云獨巨蓬勃今謂之勃風迴旋羊角古云扶摇羊角今謂之迴風迴風者旋風也迴風卒起而圜轉扶摇如羊角向上輪有自下而上者或平條長直或磨地而起總謂之迴風亦専有占古云温涼清和塵埃不起今謂和風古云暗㝠昏濁寒尅者今總謂之霾噎凡風和暢清緩温涼適時塵埃不起人情恬澹是謂祥風天氣晦暝雲氣昏濁聲寒隂慘埃壒蓬勃是謂灾風風勢紛錯交亂乍起乍止深藏難測其聲䀨耳是謂小人魅魊風風勢暴起南北不定離合氣埃是謂上下不寧風風勢𡨕㝠白日隂慘黄霧四合是謂政化未明風風勢戚戚南北雜亂髙下蓬勃是謂大兵將至風風勢凛烈人懷戰憟是謂刑罰慘刻風風勢聲啾唧慘切令人悲憯謂之喪風風聲欻欻如火奔馳乍起乍息為大旱風連風㝠晦四日五日人皆悲傷為水火殺人風凡吉祥之風日色清明風勢和緩從嵗月時日德上來或乗旺相而來去地稍髙不揚塵沙人心喜悦是為祥風人君得令下施之應凡凶災之風日色白濁天氣昏寒風聲呌怒飛沙捲塵乗刑殺而至當詳五音定八風觀其起止占之今畧諸家寒尅白濁為例諸稱寒尅白濁今謂之災風諸稱清明温和今謂之和風李淳風曰巽為風風占災異最騐凡候風築臺髙二十四尺於上設竿令其四達無隠則逺近皆知期刻不爽矣凡鳴條以上怒風起止皆詳其五音與嵗月日時刻德衝墓殺五行生刻旺相囚死以言吉㐫仍以六情推之萬不失一巫咸曰諸甲日大風丙丁日必雨不雨則海中兵起乙日大風粟貴邊夷内侵丙日大風有猝兵來圍邊城丁日大風大傷物人畜俱有疫主旱戊己日大風土功興食物貴庚辛日大風蟲生人病宜急防邊壬癸日大風北夷侵邊子日大風兵起水中丑日大風粟猝貴寅日大風黄赤雲四塞有火災邜日大風蝗蟲大起辰日大風人民移堡居集大將出行巳日大風大旱午日大風邊防事急未日大風土功大作申日大風暴賊攻刼榖貴酉日大風肅肅潤潤大雨水災戌日大風邊兵大起亥日大風兵敗相攻人民哭泣已上不論五音五情但風起鳴條已上呌怒逢勃揚沙走石折木發屋吹塵漲天日色昏沉大風寒慘則以上占之仍以是占其災之大小程子曰雹者隂陽相摶之氣葢沴氣也聖人在上無雹雖有亦不為災朱子曰露氣與霜氣不同露能滋物霜殺物也雪霜亦有異霜能殺物而雪不殺物也雨與露不同雨氣昏而露氣清也露與霧不同露氣肅而霧氣昏也天文總論聖經闡天地之道是故衆言無可信折諸經天地妙太極之精是故聖經無可考折諸理夫太極者動靜之源也隂陽者法象之本也陽以隂為基隂以陽為唱是故闔闢互為其根體用互藏其宅也别而言之陽以燥為性以竒為數以剛為體其為氣炎其為形圓浮而明動而吐皆是也凡隂以濕為性以耦為數以柔為體其為氣涼為形方沈而暗靜而翕皆是也是故象起於形也數起於質也名起於言也意起於用也而莫非一理之磅礴也論造化者權衡於此而已矣茍於理一有未窮則荒唐妖誕之言鴉鳴蟬噪以貫耳横胸其何以精一自信卓然不為其所動摇哉今夫一元之氣周流太虚之間未有天地先有水火此一則神兩故化之理也地所以兩分剛柔男女而效法之也天所以參一太極兩儀而象之性也一物而二氣也一故神兩故化此天之所以參也惟火極清則為天為日星為風雷水極濁則為山嶽為雨月為霜雪此所為發㣲而不可禦為氣清通而不可象為神是也盈天地間孰有離隂陽而可以為造化者哉夫輕清上浮曰天乃隂陽法象之最大者也晉天文志謂天如磨形日月蟻行於上葢惑於日月右行之説黄勉齋言太極不是㑹動靜底物動靜水火也所以圖解云動靜所乘之機也譬如蟻在磨盤上一般磨動則蟻隨磨動磨止則蟻隨磨止蟻隨磨轉而因蟻之動靜可以見磨之動靜彼吕氏春秋及繁露分九野十端皆妄也而况云斷鼇錬石尤為不經天一氣也可以鼇而立石而補有是理耶懸象著明曰日乃隂陽發見之尤盛者也屈原天問謂西北無光燭龍御火以照此葢惑於天不足西北之説彼淮南子謂行九州七舍皆妄也而况謂揮戈棄杖尤為不稽日一火也可以戈而揮杖而逐有是理耶倬彼雲漢昭回于天倬彼雲漢昭回於天王曰於乎何辜今之人詩之論天河是也葢折木形如匹練在箕斗之間故絶漢曰天潢抵艮曰地紀若彼圖記所云得支石博物志所云乗仙槎皆小人無憚忌之言也彼君平雖善卜吾不知所卜何理哉三五而闕記之論月然也葢月形如冰輪乃太隂之精故借光曰銀丸黒子曰地形若酉陽書所云得玉斧五經通義所云化蟾蜍齊東野人之語也彼有黄雖善筮吾不知所筮何理哉以星言之乃結在地五行之氣又受在天大明之光者也星以五錯落若太白熒惑武德九年六月太白經天慈湖王氏曰天官書太白出不經天經天上下革故韓詩外𫝊云太白出見東方以辰為啟明秋見西方以夕為長庚晉杓曰太白水星上公大將軍之象出東當伏東出西過午為經天謂晝見午上也洪範五行𫝊云太白少月之星以巳未為界不得經天而行經天為不臣兵起也鎮辰嵗星與天日謂之七政呉澄謂有疾徐則謂金水附日鎮星最疾辰星最遲理固然也地純隂凝聚於中天浮陽運旋於外此天地之常體也云云間有緩速不齊者七政之性殊也故其退而左行最速日陽精其質本月故其退而右行雖緩亦不純係乎天如恒星不動金水附日前後進退而行者其理精深存乎物感可知矣如金星在東方則先日而出謂之啟明在西方則後日而出謂之長庚水星晨候之東方夕候之西方其行皆有遲有速鎮星地類常根本五行雖其行最緩亦不純係乎地也若夫妖星曰孛絶跡而去曰飛跡相連曰流其詳見於漢書至於足萬二千五百二十之名數者與物數相當也吾不知其何所考而遽以為定數耶以風言之乃隂之周旋不舍如天之旋轉不停者也風以八扶摇若明庶清明條景閶涼與廣莫不周謂之八風鄭𤣥曰八風從律而不姦風八節之風也律十二月之律也距冬至四十五日條風至四十五日明庶風至四十五日清明風至四十五日景風至四十五日涼風至四十五日閶闔風至四十五日不周風至四十五日廣莫風至陸機謂有離合謂列子御風來而草生去而木落理所無也若夫上下曰頺日出曰暴隂風曰噎其詳見於爾雅至於換七十二畨花信者與七十二候相當也然吾不知何所憑而遽以為實信耶雨之所以降以隂陽相和而成故詩曰朝隮于西崇朝其雨朝隮于西崇朝其雨女子有行逺父母兄弟皆以為雨之兆是可信也至朱子謂雨如飯甑極為著明若董仲舒之用桐魚仲尼之識商羊吾尚恐其未真彼石牛黒蜧之説好事者為之也何足辨乎雷之所以鳴以陽在内不得出而㑹故易曰動萬物者莫疾乎雷而驚百里震九廟是可信也至朱子所謂雷如爆杖最為親切若宋使之謝仙火興地記之往金門吾尚以為未確彼石室仙車之説好辨者為之也何足難乎雲之所以興者吾聞時雨將降山川出雲觸石而出膚寸而合戴記公羊𫝊有是言矣保章氏以五侵辨吉㓙則青為蟲白為喪赤為兵荒黒為水黄為豐於理有之若尚書中候及漢書所云堯璧漢鼎繆矣况夫金枝玉葉見於崔豹古今註者又皆道聽而塗説者也是何足與較是非哉雪之所以凝者吾聞上天同雲雨雪紛紛詩經上天同雲雨雪紛紛益之以霡霂既優既渥天地隂陽温則為雨寒則為雪周大戴禮有是言矣韓詩外𫝊謂凡草木花多五出雪獨六出以應太隂之數於禮有之若毛詩之咏蜉蝣蜉蝣之羽衣裳楚楚心之憂矣於我歸處謝靈運之咏栁絮近矣若夫銅駝玉馬見於真定記者真喪心病狂者也是何足與辨真偽哉大抵天地間無一物而非造化之跡無一物而非隂陽之理故嘗合而論之日隨天而轉月隨日而行星隨月而見天之半明半晦日之半盈半縮月之半盈半虧星之半動半靜皆隂陽之相兼相制欲一之不能也若雲隨雨而凝雨隨雲而降雲隨風而飛風隨雲而烈雷之出入風之上下雨之作止雲之升降雪之消息何莫非隂陽之氣其來幾㣲其究廣大哉圖書編巻二十一
